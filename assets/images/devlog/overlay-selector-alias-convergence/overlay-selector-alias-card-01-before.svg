<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='900' viewBox='0 0 1600 900' role='img' aria-labelledby='title desc'>
  <title>Before — thin alias는 얇았지만 계약은 분산돼 있었다</title>
  <desc>live/result/reset overlay마다 비슷한 wrapper와 helper wiring이 따로 흩어져 있던 상태 — 중복 제거보다 먼저, 어떤 레이어가 계약을 책임지는지 다시 보여줘야 했다.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#081226'/>
      <stop offset='55%' stop-color='#0f2744'/>
      <stop offset='100%' stop-color='#1e1b4b'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='20' stdDeviation='20' flood-color='#020617' flood-opacity='0.28'/>
    </filter>
  </defs>

  <style>
    .bg { fill: url(#bg); }
    .panel { fill: rgba(10,17,35,0.72); stroke: rgba(148,163,184,0.22); stroke-width: 2; }
    .soft { fill: rgba(15,23,42,0.88); stroke: rgba(96,165,250,0.22); stroke-width: 2; }
    .accent { fill: #5eead4; }
    .accent2 { fill: #a78bfa; }
    .warn { fill: #f59e0b; }
    .hot { fill: #fb7185; }
    .line { stroke: rgba(191,219,254,0.75); stroke-width: 4; stroke-linecap: round; }
    .dash { stroke: rgba(191,219,254,0.45); stroke-width: 3; stroke-dasharray: 10 12; stroke-linecap: round; }
    .title { fill: white; font: 800 56px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #bfdbfe; font: 600 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #e2e8f0; font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .body { fill: #cbd5e1; font: 500 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mini { fill: #93c5fd; font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 1.8px; }
    .chip { fill: rgba(15,23,42,0.88); stroke: rgba(94,234,212,0.38); stroke-width: 2; }
    .chiptext { fill: #ecfeff; font: 700 21px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .code { fill: #dbeafe; font: 600 20px SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .footer { fill: #e0f2fe; font: 700 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width='1600' height='900' class='bg'/>
  <circle cx='1330' cy='120' r='220' fill='rgba(94,234,212,0.08)'/>
  <circle cx='1440' cy='780' r='260' fill='rgba(167,139,250,0.10)'/>
  <g filter='url(#shadow)'>
    <rect x='48' y='48' width='1504' height='804' rx='38' class='panel'/>
  </g>
  <text x='96' y='120' class='mini'>HORSE RACING DEVLOG VISUAL PACK</text>
  <text x='96' y='198' class='title'>Before — thin alias는 얇았지만 계약은 분산돼 있었다</text>
  <text x='96' y='240' class='subtitle'>live/result/reset overlay마다 비슷한 wrapper와 helper wiring이 따로 흩어져 있던 상태</text>
  
  <g>
    <rect x='96' y='300' width='418' height='410' rx='28' class='soft'/>
    <rect x='591' y='300' width='418' height='410' rx='28' class='soft'/>
    <rect x='1086' y='300' width='418' height='410' rx='28' class='soft'/>

    <text x='136' y='360' class='label'>live overlay</text>
    <text x='631' y='360' class='label'>result overlay</text>
    <text x='1126' y='360' class='label'>reset overlay</text>

    <rect x='136' y='392' width='338' height='70' rx='18' class='chip'/>
    <rect x='136' y='484' width='338' height='70' rx='18' class='chip'/>
    <rect x='136' y='576' width='338' height='70' rx='18' class='chip'/>
    <text x='166' y='437' class='code'>resolveNamedPayloads(...)</text>
    <text x='166' y='529' class='code'>resolveBridgePayloads(...)</text>
    <text x='166' y='621' class='code'>helper lifecycle wiring</text>

    <rect x='631' y='392' width='338' height='70' rx='18' class='chip'/>
    <rect x='631' y='484' width='338' height='70' rx='18' class='chip'/>
    <rect x='631' y='576' width='338' height='70' rx='18' class='chip'/>
    <text x='661' y='437' class='code'>resolveResultNamed(...)</text>
    <text x='661' y='529' class='code'>resolveResultBridge(...)</text>
    <text x='661' y='621' class='code'>prefixed ordering glue</text>

    <rect x='1126' y='392' width='338' height='70' rx='18' class='chip'/>
    <rect x='1126' y='484' width='338' height='70' rx='18' class='chip'/>
    <rect x='1126' y='576' width='338' height='70' rx='18' class='chip'/>
    <text x='1156' y='437' class='code'>resolveResetNamed(...)</text>
    <text x='1156' y='529' class='code'>resolveResetBridge(...)</text>
    <text x='1156' y='621' class='code'>override + helper resets</text>

    <text x='136' y='686' class='body'>비슷한 wrapper가 세 곳에 흩어져 있고,</text>
    <text x='136' y='716' class='body'>ordered payload / bridge ordering / override가 함께 분산돼 있었다.</text>
  </g>

  <rect x='96' y='792' width='1408' height='1' fill='rgba(191,219,254,0.24)'/>
  <text x='96' y='836' class='footer'>중복 제거보다 먼저, 어떤 레이어가 계약을 책임지는지 다시 보여줘야 했다.</text>
</svg>
