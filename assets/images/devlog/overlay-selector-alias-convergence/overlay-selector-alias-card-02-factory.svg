<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='900' viewBox='0 0 1600 900' role='img' aria-labelledby='title desc'>
  <title>After — 공통 selector factory로 구조를 접고 차이는 주입 경계로 남겼다</title>
  <desc>createOverlaySemanticPayloadSelectorAlias(...)를 중심으로 live/result/reset alias를 수렴 — 반복은 중앙으로 모으고, result/reset의 bridge ordering 차이는 주입으로 살렸다.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#081226'/>
      <stop offset='55%' stop-color='#0f2744'/>
      <stop offset='100%' stop-color='#1e1b4b'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='20' stdDeviation='20' flood-color='#020617' flood-opacity='0.28'/>
    </filter>
  </defs>

  <style>
    .bg { fill: url(#bg); }
    .panel { fill: rgba(10,17,35,0.72); stroke: rgba(148,163,184,0.22); stroke-width: 2; }
    .soft { fill: rgba(15,23,42,0.88); stroke: rgba(96,165,250,0.22); stroke-width: 2; }
    .accent { fill: #5eead4; }
    .accent2 { fill: #a78bfa; }
    .warn { fill: #f59e0b; }
    .hot { fill: #fb7185; }
    .line { stroke: rgba(191,219,254,0.75); stroke-width: 4; stroke-linecap: round; }
    .dash { stroke: rgba(191,219,254,0.45); stroke-width: 3; stroke-dasharray: 10 12; stroke-linecap: round; }
    .title { fill: white; font: 800 56px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #bfdbfe; font: 600 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #e2e8f0; font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .body { fill: #cbd5e1; font: 500 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mini { fill: #93c5fd; font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 1.8px; }
    .chip { fill: rgba(15,23,42,0.88); stroke: rgba(94,234,212,0.38); stroke-width: 2; }
    .chiptext { fill: #ecfeff; font: 700 21px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .code { fill: #dbeafe; font: 600 20px SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .footer { fill: #e0f2fe; font: 700 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width='1600' height='900' class='bg'/>
  <circle cx='1330' cy='120' r='220' fill='rgba(94,234,212,0.08)'/>
  <circle cx='1440' cy='780' r='260' fill='rgba(167,139,250,0.10)'/>
  <g filter='url(#shadow)'>
    <rect x='48' y='48' width='1504' height='804' rx='38' class='panel'/>
  </g>
  <text x='96' y='120' class='mini'>HORSE RACING DEVLOG VISUAL PACK</text>
  <text x='96' y='198' class='title'>After — 공통 selector factory로 구조를 접고 차이는 주입 경계로 남겼다</text>
  <text x='96' y='240' class='subtitle'>createOverlaySemanticPayloadSelectorAlias(...)를 중심으로 live/result/reset alias를 수렴</text>
  
  <g>
    <rect x='110' y='360' width='330' height='260' rx='28' class='soft'/>
    <text x='146' y='420' class='label'>live</text>
    <text x='146' y='470' class='body'>기본 bridge key resolver</text>
    <text x='146' y='515' class='code'>alias.setHelpers(...)</text>

    <rect x='635' y='252' width='330' height='432' rx='32' class='panel'/>
    <text x='676' y='326' class='mini'>COMMON FACTORY</text>
    <text x='676' y='388' class='label'>createOverlaySemantic</text>
    <text x='676' y='424' class='label'>PayloadSelectorAlias(...)</text>
    <rect x='676' y='468' width='248' height='62' rx='16' class='chip'/>
    <rect x='676' y='548' width='248' height='62' rx='16' class='chip'/>
    <text x='704' y='508' class='code'>resolveNamedPayloads</text>
    <text x='704' y='588' class='code'>resolveBridgePayloads</text>
    <text x='676' y='646' class='body'>반복 로직은 중앙에 수렴</text>

    <rect x='1160' y='360' width='330' height='120' rx='24' class='soft'/>
    <text x='1194' y='418' class='label'>result</text>
    <text x='1194' y='454' class='body'>result:* bridge key 주입</text>

    <rect x='1160' y='520' width='330' height='120' rx='24' class='soft'/>
    <text x='1194' y='578' class='label'>reset</text>
    <text x='1194' y='614' class='body'>reset:* bridge key 주입</text>

    <path d='M440 490 C515 490, 550 468, 635 468' class='line' fill='none'/>
    <path d='M965 468 C1030 468, 1085 420, 1160 420' class='line' fill='none'/>
    <path d='M965 588 C1030 588, 1085 580, 1160 580' class='line' fill='none'/>
    <text x='483' y='455' class='mini'>shared structure</text>
    <text x='1026' y='401' class='mini'>inject difference</text>
    <text x='1026' y='560' class='mini'>inject difference</text>
  </g>

  <rect x='96' y='792' width='1408' height='1' fill='rgba(191,219,254,0.24)'/>
  <text x='96' y='836' class='footer'>반복은 중앙으로 모으고, result/reset의 bridge ordering 차이는 주입으로 살렸다.</text>
</svg>
