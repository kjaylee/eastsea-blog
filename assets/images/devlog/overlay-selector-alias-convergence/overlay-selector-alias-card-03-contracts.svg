<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='900' viewBox='0 0 1600 900' role='img' aria-labelledby='title desc'>
  <title>Contracts preserved — 공통화 후에도 세 계약은 그대로 살아 있다</title>
  <desc>ordered payload, bridge contract, explicit override precedence를 동시에 지킨 구조 — 공통화의 성공 기준은 줄 수가 아니라 순서·브리지·override 우선권을 잃지 않는 것이다.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#081226'/>
      <stop offset='55%' stop-color='#0f2744'/>
      <stop offset='100%' stop-color='#1e1b4b'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='20' stdDeviation='20' flood-color='#020617' flood-opacity='0.28'/>
    </filter>
  </defs>

  <style>
    .bg { fill: url(#bg); }
    .panel { fill: rgba(10,17,35,0.72); stroke: rgba(148,163,184,0.22); stroke-width: 2; }
    .soft { fill: rgba(15,23,42,0.88); stroke: rgba(96,165,250,0.22); stroke-width: 2; }
    .accent { fill: #5eead4; }
    .accent2 { fill: #a78bfa; }
    .warn { fill: #f59e0b; }
    .hot { fill: #fb7185; }
    .line { stroke: rgba(191,219,254,0.75); stroke-width: 4; stroke-linecap: round; }
    .dash { stroke: rgba(191,219,254,0.45); stroke-width: 3; stroke-dasharray: 10 12; stroke-linecap: round; }
    .title { fill: white; font: 800 56px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #bfdbfe; font: 600 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #e2e8f0; font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .body { fill: #cbd5e1; font: 500 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mini { fill: #93c5fd; font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 1.8px; }
    .chip { fill: rgba(15,23,42,0.88); stroke: rgba(94,234,212,0.38); stroke-width: 2; }
    .chiptext { fill: #ecfeff; font: 700 21px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .code { fill: #dbeafe; font: 600 20px SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .footer { fill: #e0f2fe; font: 700 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width='1600' height='900' class='bg'/>
  <circle cx='1330' cy='120' r='220' fill='rgba(94,234,212,0.08)'/>
  <circle cx='1440' cy='780' r='260' fill='rgba(167,139,250,0.10)'/>
  <g filter='url(#shadow)'>
    <rect x='48' y='48' width='1504' height='804' rx='38' class='panel'/>
  </g>
  <text x='96' y='120' class='mini'>HORSE RACING DEVLOG VISUAL PACK</text>
  <text x='96' y='198' class='title'>Contracts preserved — 공통화 후에도 세 계약은 그대로 살아 있다</text>
  <text x='96' y='240' class='subtitle'>ordered payload, bridge contract, explicit override precedence를 동시에 지킨 구조</text>
  
  <g>
    <rect x='96' y='328' width='392' height='280' rx='28' class='soft'/>
    <text x='138' y='392' class='label'>1. ordered payload</text>
    <text x='138' y='446' class='body'>selector가 정한 배열 순서를</text>
    <text x='138' y='482' class='body'>bridge까지 그대로 보낸다.</text>
    <rect x='138' y='524' width='260' height='54' rx='14' class='chip'/>
    <text x='164' y='558' class='code'>label → titleRaw → badge</text>

    <rect x='604' y='328' width='392' height='280' rx='28' class='soft'/>
    <text x='646' y='392' class='label'>2. bridge contract</text>
    <text x='646' y='446' class='body'>contract chain이 다시 payload key를</text>
    <text x='646' y='482' class='body'>재조합하지 않게 막는다.</text>
    <rect x='646' y='524' width='250' height='54' rx='14' class='chip'/>
    <text x='672' y='558' class='code'>selector output == bridge input</text>

    <rect x='1112' y='328' width='392' height='280' rx='28' class='soft'/>
    <text x='1154' y='392' class='label'>3. explicit override</text>
    <text x='1154' y='446' class='body'>suite default보다 사용자가 넘긴</text>
    <text x='1154' y='482' class='body'>resolver가 마지막 우선권을 가진다.</text>
    <rect x='1154' y='524' width='230' height='54' rx='14' class='chip'/>
    <text x='1180' y='558' class='code'>explicit > defaults</text>

    <path d='M488 468 C535 468, 552 468, 604 468' class='line' fill='none'/>
    <path d='M996 468 C1043 468, 1060 468, 1112 468' class='line' fill='none'/>
    <text x='648' y='688' class='mini'>selector → bridge → target</text>
    <path d='M518 694 H1084' class='dash' fill='none'/>
    <circle cx='518' cy='694' r='9' class='accent'/>
    <circle cx='801' cy='694' r='9' class='accent2'/>
    <circle cx='1084' cy='694' r='9' class='warn'/>
  </g>

  <rect x='96' y='792' width='1408' height='1' fill='rgba(191,219,254,0.24)'/>
  <text x='96' y='836' class='footer'>공통화의 성공 기준은 줄 수가 아니라 순서·브리지·override 우선권을 잃지 않는 것이다.</text>
</svg>
