<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='675' viewBox='0 0 1200 675' role='img' aria-labelledby='title desc'>
  <title>One selector factory, three contracts intact — Discord preview</title>
  <desc>live/result/reset alias를 공통 selector factory로 수렴하면서 ordered payload, bridge contract, override precedence를 그대로 보존한 구조를 설명하는 Discord preview 이미지.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#081226'/>
      <stop offset='60%' stop-color='#0f2744'/>
      <stop offset='100%' stop-color='#1e1b4b'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='18' stdDeviation='18' flood-color='#020617' flood-opacity='0.28'/>
    </filter>
  </defs>
  <style>
    .bg { fill: url(#bg); }
    .panel { fill: rgba(10,17,35,0.74); stroke: rgba(148,163,184,0.22); stroke-width: 2; }
    .soft { fill: rgba(15,23,42,0.88); stroke: rgba(96,165,250,0.24); stroke-width: 2; }
    .mini { fill: #93c5fd; font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 2px; }
    .title { fill: white; font: 800 48px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #bfdbfe; font: 600 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #e2e8f0; font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .body { fill: #cbd5e1; font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .chip { fill: rgba(15,23,42,0.88); stroke: rgba(94,234,212,0.38); stroke-width: 2; }
    .chiptext { fill: #ecfeff; font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .code { fill: #dbeafe; font: 600 18px SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .footer { fill: #e0f2fe; font: 700 19px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
  <rect width='1200' height='675' class='bg'/>
  <circle cx='1040' cy='104' r='156' fill='rgba(94,234,212,0.08)'/>
  <circle cx='1088' cy='612' r='188' fill='rgba(167,139,250,0.10)'/>
  <g filter='url(#shadow)'>
    <rect x='34' y='34' width='1132' height='607' rx='32' class='panel'/>
  </g>
  <text x='74' y='92' class='mini'>DISCORD PREVIEW · DEVLOG TEASER</text>
  <text x='74' y='156' class='title'>One selector factory, three contracts intact</text>
  <text x='74' y='198' class='subtitle'>phase338~341 · live/result/reset alias convergence without quiet regressions</text>

  <rect x='74' y='256' width='342' height='230' rx='26' class='soft'/>
  <text x='104' y='312' class='mini'>HOOK</text>
  <text x='104' y='360' class='label'>Refactor less, preserve more</text>
  <text x='104' y='404' class='body'>같은 helper를 줄이는 것보다,</text>
  <text x='104' y='432' class='body'>payload order와 override precedence를</text>
  <text x='104' y='460' class='body'>끝까지 지키는 편이 더 중요했다.</text>

  <rect x='458' y='256' width='654' height='230' rx='28' class='soft'/>
  <rect x='498' y='312' width='140' height='58' rx='16' class='chip'/>
  <rect x='714' y='286' width='146' height='86' rx='16' class='panel'/>
  <rect x='932' y='312' width='140' height='58' rx='16' class='chip'/>
  <rect x='714' y='392' width='146' height='58' rx='16' class='chip'/>
  <text x='546' y='349' class='code'>live</text>
  <text x='739' y='330' class='code'>selector</text>
  <text x='739' y='354' class='code'>factory</text>
  <text x='967' y='349' class='code'>result</text>
  <text x='757' y='429' class='code'>reset</text>

  <rect x='458' y='522' width='188' height='44' rx='12' class='chip'/>
  <rect x='690' y='522' width='182' height='44' rx='12' class='chip'/>
  <rect x='916' y='522' width='196' height='44' rx='12' class='chip'/>
  <text x='480' y='550' class='chiptext'>ordered payload</text>
  <text x='718' y='550' class='chiptext'>bridge contract</text>
  <text x='944' y='550' class='chiptext'>override &gt; defaults</text>

  <text x='74' y='598' class='footer'>다음 단계: OG·Pinterest·Discord preview를 같은 메시지 계층으로 배포면에 맞춰 재사용</text>
</svg>
