<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='630' viewBox='0 0 1200 630' role='img' aria-labelledby='title desc'>
  <title>overlay selector alias 공통화 — OG preview</title>
  <desc>ordered payload, bridge contract, explicit override precedence를 지키며 live/result/reset alias를 공통 factory로 수렴한 horse-racing devlog용 OG preview 이미지.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#081226'/>
      <stop offset='60%' stop-color='#0f2744'/>
      <stop offset='100%' stop-color='#1e1b4b'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='18' stdDeviation='18' flood-color='#020617' flood-opacity='0.28'/>
    </filter>
  </defs>
  <style>
    .bg { fill: url(#bg); }
    .panel { fill: rgba(10,17,35,0.74); stroke: rgba(148,163,184,0.22); stroke-width: 2; }
    .soft { fill: rgba(15,23,42,0.88); stroke: rgba(96,165,250,0.24); stroke-width: 2; }
    .mini { fill: #93c5fd; font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 2px; }
    .title { fill: white; font: 800 54px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #bfdbfe; font: 600 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #e2e8f0; font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .body { fill: #cbd5e1; font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .chip { fill: rgba(15,23,42,0.88); stroke: rgba(94,234,212,0.38); stroke-width: 2; }
    .chiptext { fill: #ecfeff; font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .code { fill: #dbeafe; font: 600 18px SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .line { stroke: rgba(191,219,254,0.76); stroke-width: 4; stroke-linecap: round; }
    .footer { fill: #e0f2fe; font: 700 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
  <rect width='1200' height='630' class='bg'/>
  <circle cx='1040' cy='88' r='150' fill='rgba(94,234,212,0.08)'/>
  <circle cx='1088' cy='560' r='180' fill='rgba(167,139,250,0.10)'/>
  <g filter='url(#shadow)'>
    <rect x='34' y='34' width='1132' height='562' rx='32' class='panel'/>
  </g>
  <text x='74' y='88' class='mini'>HORSE RACING DEVLOG · OG PREVIEW</text>
  <text x='74' y='152' class='title'>overlay selector alias 공통화</text>
  <text x='74' y='192' class='subtitle'>ordered payload · bridge contract · override precedence</text>

  <rect x='74' y='248' width='358' height='214' rx='26' class='soft'/>
  <text x='104' y='302' class='mini'>WHY IT MATTERS</text>
  <text x='104' y='352' class='label'>중복 제거보다 중요한 건</text>
  <text x='104' y='384' class='label'>계약 보존 경로였다</text>
  <text x='104' y='430' class='body'>live/result/reset thin alias를 하나의</text>
  <text x='104' y='458' class='body'>factory로 접으면서도 quiet regression을 막았다.</text>

  <rect x='498' y='220' width='604' height='296' rx='30' class='panel'/>
  <rect x='560' y='300' width='160' height='64' rx='18' class='chip'/>
  <text x='615' y='340' class='code'>live</text>
  <rect x='716' y='252' width='170' height='96' rx='18' class='soft'/>
  <text x='742' y='304' class='code'>createOverlay</text>
  <text x='742' y='330' class='code'>SelectorAlias</text>
  <rect x='880' y='300' width='180' height='64' rx='18' class='chip'/>
  <text x='926' y='340' class='code'>result</text>
  <rect x='716' y='402' width='170' height='64' rx='18' class='chip'/>
  <text x='764' y='442' class='code'>reset</text>
  <path d='M720 300 C678 308, 632 316, 560 332' class='line' fill='none'/>
  <path d='M886 300 C944 314, 1000 320, 1060 332' class='line' fill='none'/>
  <path d='M801 402 C801 376, 801 358, 801 344' class='line' fill='none'/>

  <rect x='498' y='532' width='178' height='44' rx='12' class='chip'/>
  <rect x='690' y='532' width='182' height='44' rx='12' class='chip'/>
  <rect x='886' y='532' width='216' height='44' rx='12' class='chip'/>
  <text x='520' y='560' class='chiptext'>ordered payload</text>
  <text x='720' y='560' class='chiptext'>bridge contract</text>
  <text x='916' y='560' class='chiptext'>override precedence</text>

  <text x='74' y='560' class='footer'>phase338~341 검증 스택을 잃지 않은 공통화 기록</text>
</svg>
