<svg xmlns='http://www.w3.org/2000/svg' width='1000' height='1500' viewBox='0 0 1000 1500' role='img' aria-labelledby='title desc'>
  <title>세 개의 계약을 지키며 하나로 접다 — Pinterest preview</title>
  <desc>thin alias를 공통 factory로 수렴하면서 ordered payload, bridge contract, explicit override precedence를 지킨 구조를 설명하는 세로형 Pinterest preview 이미지.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#081226'/>
      <stop offset='58%' stop-color='#0f2744'/>
      <stop offset='100%' stop-color='#1e1b4b'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='18' stdDeviation='18' flood-color='#020617' flood-opacity='0.28'/>
    </filter>
  </defs>
  <style>
    .bg { fill: url(#bg); }
    .panel { fill: rgba(10,17,35,0.76); stroke: rgba(148,163,184,0.22); stroke-width: 2; }
    .soft { fill: rgba(15,23,42,0.88); stroke: rgba(96,165,250,0.24); stroke-width: 2; }
    .mini { fill: #93c5fd; font: 700 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 2px; }
    .title { fill: white; font: 800 66px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #bfdbfe; font: 600 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #e2e8f0; font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .body { fill: #cbd5e1; font: 500 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .chip { fill: rgba(15,23,42,0.88); stroke: rgba(94,234,212,0.38); stroke-width: 2; }
    .chiptext { fill: #ecfeff; font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .code { fill: #dbeafe; font: 600 22px SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .line { stroke: rgba(191,219,254,0.76); stroke-width: 4; stroke-linecap: round; }
    .footer { fill: #e0f2fe; font: 700 26px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
  <rect width='1000' height='1500' class='bg'/>
  <circle cx='840' cy='160' r='180' fill='rgba(94,234,212,0.08)'/>
  <circle cx='910' cy='1320' r='220' fill='rgba(167,139,250,0.10)'/>
  <g filter='url(#shadow)'>
    <rect x='38' y='38' width='924' height='1424' rx='36' class='panel'/>
  </g>
  <text x='88' y='112' class='mini'>PINTEREST PREVIEW · HORSE RACING DEVLOG</text>
  <text x='88' y='212' class='title'>세 개의 계약을</text>
  <text x='88' y='286' class='title'>지키며 하나로 접다</text>
  <text x='88' y='340' class='subtitle'>thin alias → common factory</text>
  <text x='88' y='380' class='subtitle'>phase338~341 · live/result/reset</text>

  <rect x='88' y='448' width='824' height='250' rx='30' class='soft'/>
  <text x='128' y='514' class='mini'>THE DECISION</text>
  <text x='128' y='570' class='label'>공통화는 했지만, 남겨야 할 차이는</text>
  <text x='128' y='608' class='label'>resolver injection 경계로 보냈다</text>
  <text x='128' y='664' class='body'>과공통화를 피해야 result/reset의 prefixed ordering과</text>
  <text x='128' y='698' class='body'>explicit override precedence를 잃지 않는다.</text>

  <rect x='88' y='760' width='824' height='148' rx='28' class='soft'/>
  <text x='126' y='824' class='label'>1. ordered payload</text>
  <text x='126' y='864' class='body'>selector가 만든 배열 순서를 bridge까지 그대로 밀어 보낸다.</text>
  <rect x='88' y='934' width='824' height='148' rx='28' class='soft'/>
  <text x='126' y='998' class='label'>2. bridge contract</text>
  <text x='126' y='1038' class='body'>contract chain이 payload key를 다시 조합하지 못하게 막는다.</text>
  <rect x='88' y='1108' width='824' height='148' rx='28' class='soft'/>
  <text x='126' y='1172' class='label'>3. explicit override precedence</text>
  <text x='126' y='1212' class='body'>suite defaults보다 사용자가 준 resolver가 마지막 우선권을 가진다.</text>

  <rect x='88' y='1308' width='262' height='56' rx='14' class='chip'/>
  <rect x='370' y='1308' width='250' height='56' rx='14' class='chip'/>
  <rect x='640' y='1308' width='272' height='56' rx='14' class='chip'/>
  <text x='114' y='1344' class='chiptext'>ordered payload</text>
  <text x='398' y='1344' class='chiptext'>bridge contract</text>
  <text x='666' y='1344' class='chiptext'>override precedence</text>

  <text x='88' y='1420' class='footer'>공통화의 성공 기준은 줄 수가 아니라 quiet regression을 막는 것이다.</text>
</svg>
