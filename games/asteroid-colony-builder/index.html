<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;color:#d8d8e8;
font-family:'Courier New',monospace;touch-action:none;user-select:none;-webkit-user-select:none}
#gc{width:100%;height:100%;display:flex;flex-direction:column}
#rbar{display:flex;flex-wrap:wrap;padding:6px 8px;background:rgba(10,10,26,.97);
border-bottom:1px solid #1a1a3a;gap:4px 10px;z-index:10;min-height:36px}
.ri{display:flex;align-items:center;gap:3px;font-size:12px;white-space:nowrap}
.ri .rv{font-weight:700;min-width:32px;text-align:right}
#cc{flex:1;position:relative;overflow:hidden;min-height:200px}
#cv{display:block;width:100%;height:100%}
#bp{height:44%;max-height:240px;min-height:160px;background:rgba(10,10,26,.98);
border-top:1px solid #1a1a3a;display:flex;flex-direction:column;z-index:10}
#pc{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
#tb{display:flex;border-top:1px solid #1a1a3a;background:#060612}
.tbtn{flex:1;padding:10px 4px;text-align:center;background:none;border:none;
color:#666;font-family:inherit;font-size:11px;cursor:pointer;transition:color .2s}
.tbtn.act{color:#00d4ff;border-top:2px solid #00d4ff;padding-top:8px}
.tbtn:active{opacity:.7}
.bg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.bc{background:#12122a;border:1px solid #222244;border-radius:8px;padding:8px 4px;
text-align:center;cursor:pointer;transition:background .15s,border-color .15s}
.bc:active{background:#1a1a40}
.bc.dis{opacity:.35;pointer-events:none}
.bc .bi{font-size:22px;line-height:1.2}
.bc .bn{font-size:10px;margin-top:2px;color:#aaa}
.bc .bco{font-size:10px;color:#00ff88;margin-top:1px}
.ritem{background:#12122a;border:1px solid #222244;border-radius:8px;padding:10px;
margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ritem .rl{flex:1}
.ritem .rn{font-size:12px;font-weight:700}
.ritem .rd{font-size:10px;color:#888;margin-top:2px}
.ritem .rlv{font-size:10px;color:#7b68ee;margin-top:1px}
.rbtn{background:#5b2fd7;border:none;color:#fff;padding:6px 10px;border-radius:4px;
cursor:pointer;font-family:inherit;font-size:11px;white-space:nowrap;transition:background .15s}
.rbtn:active{background:#7b4ff7}
.rbtn:disabled{background:#333;color:#666;cursor:default}
#bi{position:absolute;bottom:0;left:0;right:0;background:rgba(8,8,22,.98);
border-top:1px solid #00d4ff44;padding:10px;z-index:20;display:none;
max-height:55%;overflow-y:auto}
#bi .bih{display:flex;align-items:center;gap:8px;margin-bottom:6px}
#bi .bih .ic{font-size:28px}
#bi .bih .nm{font-size:14px;font-weight:700}
#bi .bih .lv{font-size:11px;color:#7b68ee;margin-left:4px}
#bi .bis{font-size:11px;color:#aaa;margin-bottom:6px;line-height:1.4}
.conn-item{font-size:11px;padding:3px 0;display:flex;align-items:center;gap:6px}
.conn-item .cx{color:#f44;cursor:pointer;font-size:14px}
.bia{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.abtn{padding:7px 12px;border-radius:4px;border:none;cursor:pointer;
font-family:inherit;font-size:11px;transition:background .15s}
.abtn:active{opacity:.8}
.abtn.up{background:#00885a;color:#fff}
.abtn.cn{background:#0088cc;color:#fff}
.abtn.rm{background:#882222;color:#fff}
.abtn.cl{background:#444;color:#ddd}
.abtn:disabled{opacity:.4;cursor:default}
#toast{position:absolute;top:44px;left:50%;transform:translateX(-50%);
background:rgba(0,180,220,.15);border:1px solid #00aacc88;color:#aaddff;
padding:6px 14px;border-radius:6px;font-size:11px;z-index:50;pointer-events:none;
opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90%;text-align:center}

#tut{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);
z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.tbox{background:#12122a;border:1px solid #00d4ff;border-radius:12px;padding:20px;
max-width:300px;text-align:center;line-height:1.5}
.tbox h3{color:#00d4ff;margin-bottom:8px;font-size:15px}

cursor:pointer;font-family:inherit;font-weight:700;font-size:12px}
.tutb:active{background:#00d4ff}
.sec-nav{display:flex;gap:4px;position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:5}
.sec-btn{background:rgba(20,20,40,.8);border:1px solid #2a2a4a;color:#888;
padding:4px 10px;border-radius:4px;font-size:10px;font-family:inherit;cursor:pointer}
.sec-btn.act{color:#00d4ff;border-color:#00d4ff88}
.sec-btn:disabled{opacity:.3;cursor:default}

border-bottom:1px solid #1a1a2a}
.stat-row .sl{color:#888}

<body>
<div id="gc">
<div id="rbar"></div>
<div id="cc">
<canvas id="cv"></canvas>
<div class="sec-nav" id="secnav"></div>
<div id="cm-hint">Tap a target building to connect</div>
<div id="toast"></div>
<div id="bi"></div>
</div>
<div id="bp">
<div id="pc"></div>
<div id="tb">
<button class="tbtn act" data-tab="colony" onclick="showTab('colony')">⛰ Colony</button>
<button class="tbtn" data-tab="build" onclick="showTab('build')">🔨 Build</button>
<button class="tbtn" data-tab="research" onclick="showTab('research')">🔬 Research</button>
<button class="tbtn" data-tab="stats" onclick="showTab('stats')">📊 Stats</button>
</div>
</div>
</div>
<div id="tut" style="display:none"></div>

<script>
'use strict';

/* ═══════════════════════════════════════
   CONFIGURATION
   ═══════════════════════════════════════ */
const TICK_MS=100,SAVE_INTERVAL=15000,MAX_OFFLINE_S=43200,OFFLINE_RATE=.5;
const SLOT_R=26,HIT_R=34;
const RES_COLORS={ore:'#a8b0b8',crystal:'#00d4ff',energy:'#ffcc00',alloy:'#ff7744',credits:'#00ff88',research:'#9966ff'};
const RES_ICONS={ore:'⛏',crystal:'💎',energy:'⚡',alloy:'🔥',credits:'💰',research:'🔬'};
const PIPELINE_RES=['ore','crystal','energy','alloy'];
const GLOBAL_RES=['credits','research'];

/* ═══════════════════════════════════════
   BUILDING DEFINITIONS
   ═══════════════════════════════════════ */
const BDEFS={
  reactor:{name:'Reactor',icon:'⚡',color:'#ffcc00',cost:20,
    inputs:{},outputs:{energy:3},bufCap:30,
    desc:'Core heat → energy. No input needed.',maxLv:10,
    upgradeMul:1.6,outBoost:.25,inBoost:.15},
  mine:{name:'Mine',icon:'⛏',color:'#a8b0b8',cost:15,
    inputs:{energy:1},outputs:{ore:2.5},bufCap:25,
    desc:'Drills ore from asteroid deposits.',maxLv:10,
    upgradeMul:1.5,outBoost:.25,inBoost:.12},
  extractor:{name:'Extractor',icon:'💎',color:'#00d4ff',cost:35,
    inputs:{energy:2},outputs:{crystal:1.2},bufCap:20,
    desc:'Extracts rare crystal veins.',maxLv:10,
    upgradeMul:1.6,outBoost:.25,inBoost:.12},
  foundry:{name:'Foundry',icon:'🔥',color:'#ff7744',cost:45,
    inputs:{ore:3,energy:1},outputs:{alloy:1.5},bufCap:20,
    desc:'Smelts ore+energy into alloy.',maxLv:10,
    upgradeMul:1.6,outBoost:.25,inBoost:.12},
  market:{name:'Market',icon:'💰',color:'#00ff88',cost:55,
    inputs:{alloy:1},outputs:{credits:8},bufCap:20,
    desc:'Sells alloy for credits.',maxLv:8,
    upgradeMul:1.7,outBoost:.3,inBoost:.1,globalOut:true},
  crystalMarket:{name:'Crystal Market',icon:'💎💰',color:'#00eebb',cost:65,
    inputs:{crystal:1},outputs:{credits:12},bufCap:20,
    desc:'Sells crystal for premium credits.',maxLv:8,
    upgradeMul:1.7,outBoost:.3,inBoost:.1,globalOut:true},
  lab:{name:'Lab',icon:'🔬',color:'#9966ff',cost:85,
    inputs:{alloy:.5,energy:2},outputs:{research:.25},bufCap:15,
    desc:'Researches colony upgrades.',maxLv:8,
    upgradeMul:1.8,outBoost:.2,inBoost:.1,globalOut:true},
  storage:{name:'Storage',icon:'📦',color:'#667788',cost:30,
    inputs:{},outputs:{},bufCap:0,
    desc:'Boosts buffer capacity of connected buildings by +20.',maxLv:5,
    upgradeMul:1.5,outBoost:0,inBoost:0,passive:true,bufBoost:20}
};

/* ═══════════════════════════════════════
   RESEARCH DEFINITIONS
   ═══════════════════════════════════════ */
const RDEFS={
  overclock:{name:'Overclock',maxLv:5,
    costs:[5,12,22,35,55],
    desc:'+20% production speed per level',
    effect:lv=>({prodMul:1+lv*.2})},
  efficiency:{name:'Efficiency',maxLv:5,
    costs:[8,18,32,50,75],
    desc:'-12% input consumption per level',
    effect:lv=>({inputMul:1-lv*.12})},
  deepScan:{name:'Deep Scan',maxLv:3,
    costs:[10,25,50],
    desc:'+25% ore/crystal output per level',
    effect:lv=>({miningMul:1+lv*.25})},
  expansion:{name:'Expansion',maxLv:2,
    costs:[20,50],
    desc:'Unlock new asteroid sector',
    effect:lv=>({sectors:1+lv})},
  automation:{name:'Automation',maxLv:3,
    costs:[15,35,60],
    desc:'Auto-overflow sell + smart routing hints',
    effect:lv=>({autoLevel:lv})}
};

/* ═══════════════════════════════════════
   GAME STATE
   ═══════════════════════════════════════ */
let G={
  credits:200,research:0,
  sectors:[
    {id:0,name:'Alpha',unlocked:true,buildings:[]},
    {id:1,name:'Beta',unlocked:false,buildings:[]},
    {id:2,name:'Gamma',unlocked:false,buildings:[]}
  ],
  rLevels:{overclock:0,efficiency:0,deepScan:0,expansion:0,automation:0},
  curSector:0,
  selectedId:null,connectMode:false,connectFrom:null,
  buildMode:null,
  tutStep:0,tutDone:false,
  lastTick:Date.now(),lastSave:Date.now(),
  totalTime:0,
  stats:{oreProduced:0,crystalProduced:0,alloySmelted:0,creditsEarned:0,
    built:0,pipelines:0,researched:0,upgraded:0},
  soundOn:true,
  nextBuildingId:1
};

let canvas,ctx,cw,ch,dpr;
let slotPos=[];
let particles=[];
let stars=[];
let toastTimer=null;
let audioCtx=null;
let lastFrame=0;
let tickAccum=0;
let bgCache=null;

/* ═══════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════ */
function fmt(n){
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e4)return(n/1e3).toFixed(1)+'K';
  if(n>=100)return Math.floor(n).toString();
  if(n>=10)return n.toFixed(1);
  return n.toFixed(2);
}
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function hexPath(x,y,r){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=Math.PI/3*i-Math.PI/6;
    const px=x+r*Math.cos(a),py=y+r*Math.sin(a);
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
}

/* ═══════════════════════════════════════
   AUDIO
   ═══════════════════════════════════════ */
function initAudio(){
  if(audioCtx)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
}
function sfx(type){
  if(!G.soundOn||!audioCtx)return;
  try{
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    g.gain.value=.12;
    switch(type){
      case'build':o.frequency.setValueAtTime(280,t);o.frequency.linearRampToValueAtTime(560,t+.12);
        g.gain.linearRampToValueAtTime(0,t+.15);o.start(t);o.stop(t+.15);break;
      case'connect':o.frequency.setValueAtTime(350,t);o.frequency.setValueAtTime(500,t+.08);
        g.gain.linearRampToValueAtTime(0,t+.18);o.start(t);o.stop(t+.18);break;
      case'upgrade':o.type='triangle';o.frequency.setValueAtTime(400,t);
        o.frequency.setValueAtTime(500,t+.08);o.frequency.setValueAtTime(630,t+.16);
        g.gain.linearRampToValueAtTime(0,t+.28);o.start(t);o.stop(t+.28);break;
      case'error':o.type='sawtooth';o.frequency.setValueAtTime(120,t);
        g.gain.value=.08;g.gain.linearRampToValueAtTime(0,t+.2);o.start(t);o.stop(t+.2);break;
      case'research':o.type='sine';o.frequency.setValueAtTime(600,t);
        o.frequency.linearRampToValueAtTime(1200,t+.2);
        g.gain.linearRampToValueAtTime(0,t+.3);o.start(t);o.stop(t+.3);break;
      case'click':o.frequency.setValueAtTime(800,t);g.gain.value=.06;
        g.gain.linearRampToValueAtTime(0,t+.05);o.start(t);o.stop(t+.05);break;
      default:o.frequency.setValueAtTime(440,t);g.gain.linearRampToValueAtTime(0,t+.1);
        o.start(t);o.stop(t+.1);
    }
  }catch(e){}
}

/* ═══════════════════════════════════════
   SAVE / LOAD
   ═══════════════════════════════════════ */
const SAVE_KEY='asteroid-forge-save-v1';
function save(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(G))}catch(e){}
  G.lastSave=Date.now();
}
function load(){
  try{
    const d=localStorage.getItem(SAVE_KEY);
    if(!d)return false;
    const s=JSON.parse(d);
    // Merge carefully
    Object.assign(G,s);
    // Ensure arrays/objects exist
    if(!G.sectors)G.sectors=[{id:0,name:'Alpha',unlocked:true,buildings:[]},{id:1,name:'Beta',unlocked:false,buildings:[]},{id:2,name:'Gamma',unlocked:false,buildings:[]}];
    if(!G.rLevels)G.rLevels={overclock:0,efficiency:0,deepScan:0,expansion:0,automation:0};
    if(!G.stats)G.stats={oreProduced:0,crystalProduced:0,alloySmelted:0,creditsEarned:0,built:0,pipelines:0,researched:0,upgraded:0};
    return true;
  }catch(e){return false}
}

/* ═══════════════════════════════════════
   SECTOR & SLOT MANAGEMENT
   ═══════════════════════════════════════ */
function curBuildings(){return G.sectors[G.curSector].buildings}
function allBuildings(si){return G.sectors[si!==undefined?si:G.curSector].buildings}
function findBuilding(id){
  for(const s of G.sectors)for(const b of s.buildings)if(b.id===id)return b;
  return null;
}
function buildingAtSlot(si,sector){
  const bs=allBuildings(sector!==undefined?sector:G.curSector);
  return bs.find(b=>b.slot===si)||null;
}

function calcSlotPositions(){
  const cx=cw/2,cy=ch*.42;
  const r=Math.min(cw,ch)*.19;
  slotPos=[{x:cx,y:cy}];
  for(let i=0;i<6;i++){
    const a=Math.PI/3*i-Math.PI/2;
    slotPos.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});
  }
}

/* ═══════════════════════════════════════
   PIPELINE ENGINE
   ═══════════════════════════════════════ */
function getEffectiveRate(b,def,isOutput){
  let rate=1;
  const lv=b.level-1;
  if(isOutput){
    rate*=(1+lv*def.outBoost);
    const oc=RDEFS.overclock.effect(G.rLevels.overclock);
    rate*=oc.prodMul;
    if((def===BDEFS.mine||def===BDEFS.extractor)&&G.rLevels.deepScan>0){
      const ds=RDEFS.deepScan.effect(G.rLevels.deepScan);
      rate*=ds.miningMul;
    }
  }else{
    rate*=(1+lv*def.inBoost);
    const ef=RDEFS.efficiency.effect(G.rLevels.efficiency);
    rate*=ef.inputMul;
  }
  return Math.max(0,rate);
}

function getStorageBoost(sectorIdx){
  let boost=0;
  for(const b of allBuildings(sectorIdx)){
    if(b.type==='storage'){
      const def=BDEFS.storage;
      boost+=def.bufBoost*(1+(b.level-1)*.5);
    }
  }
  return boost;
}

function runTick(scale){
  scale=scale||1;
  const dt=.1*scale; // 100ms tick scaled
  const sec=G.curSector;

  for(let si=0;si<G.sectors.length;si++){
    if(!G.sectors[si].unlocked)continue;
    const bs=G.sectors[si].buildings;
    const storBoost=getStorageBoost(si);

    // Phase 1: Production
    for(const b of bs){
      const def=BDEFS[b.type];
      if(!def||def.passive)continue;
      const bufMax=def.bufCap+storBoost;

      // Check inputs
      let canProd=true;
      const inMul=getEffectiveRate(b,def,false);
      for(const[res,base]of Object.entries(def.inputs)){
        const need=base*inMul*dt;
        if((b.inBuf[res]||0)<need){canProd=false;break}
      }

      b.producing=canProd;
      if(!canProd)continue;

      // Consume inputs
      for(const[res,base]of Object.entries(def.inputs)){
        b.inBuf[res]-=base*inMul*dt;
        if(b.inBuf[res]<0)b.inBuf[res]=0;
      }

      // Produce outputs
      const outMul=getEffectiveRate(b,def,true);
      for(const[res,base]of Object.entries(def.outputs)){
        const amt=base*outMul*dt;
        if(def.globalOut){
          if(res==='credits'){G.credits+=amt;G.stats.creditsEarned+=amt}
          else if(res==='research'){G.research+=amt}
        }else{
          b.outBuf[res]=Math.min((b.outBuf[res]||0)+amt,bufMax);
          // Track stats
          if(res==='ore')G.stats.oreProduced+=amt;
          if(res==='crystal')G.stats.crystalProduced+=amt;
          if(res==='alloy')G.stats.alloySmelted+=amt;
        }
      }
    }

    // Phase 2: Pipeline transfer
    for(const b of bs){
      const def=BDEFS[b.type];
      if(!def||def.passive)continue;
      if(!b.connections||b.connections.length===0)continue;
      const storBoostB=getStorageBoost(si);

      for(const res of Object.keys(b.outBuf)){
        const avail=b.outBuf[res];
        if(avail<=.001)continue;
        const targets=[];
        for(const tid of b.connections){
          const tb=findBuilding(tid);
          if(!tb)continue;
          const tdef=BDEFS[tb.type];
          if(!tdef)continue;
          if(tdef.inputs[res]!==undefined){
            targets.push(tb);
          }
        }
        if(targets.length===0)continue;
        const share=avail/targets.length;
        for(const tb of targets){
          const tdef=BDEFS[tb.type];
          const tbMax=tdef.bufCap+storBoostB;
          const space=tbMax-(tb.inBuf[res]||0);
          const xfer=Math.min(share,space,avail*dt*10);
          if(xfer>.001){
            tb.inBuf[res]=(tb.inBuf[res]||0)+xfer;
            b.outBuf[res]-=xfer;
            // Spawn particle
            if(si===G.curSector&&scale<=1){
              spawnParticle(b,tb,res);
            }
          }
        }
      }
    }

    // Phase 3: Auto-overflow (automation research)
    if(G.rLevels.automation>=1){
      for(const b of bs){
        const def=BDEFS[b.type];
        if(!def||def.passive||def.globalOut)continue;
        for(const res of Object.keys(b.outBuf)){
          const bufMax=def.bufCap+storBoost;
          if(b.outBuf[res]>=bufMax*.9){
            // Auto sell overflow
            const sell=b.outBuf[res]*.1*dt;
            b.outBuf[res]-=sell;
            const rate=res==='crystal'?6:res==='alloy'?4:1;
            G.credits+=sell*rate;
            G.stats.creditsEarned+=sell*rate;
          }
        }
      }
    }

    // Mark reactors as always producing (they have no inputs)
    for(const b of bs){
      if(b.type==='reactor')b.producing=true;
    }
  }

  G.totalTime+=.1*scale;
}

/* ═══════════════════════════════════════
   BUILDING ACTIONS
   ═══════════════════════════════════════ */
function placeBuilding(type,slotIdx){
  const def=BDEFS[type];
  if(!def)return false;
  if(G.credits<def.cost)return false;
  if(buildingAtSlot(slotIdx))return false;

  G.credits-=def.cost;
  const b={
    id:G.nextBuildingId++,
    type:type,
    level:1,
    slot:slotIdx,
    sector:G.curSector,
    inBuf:{},outBuf:{},
    connections:[],
    producing:false
  };
  // Init buffers
  for(const r of Object.keys(def.inputs))b.inBuf[r]=0;
  for(const r of Object.keys(def.outputs)){
    if(!def.globalOut)b.outBuf[r]=0;
  }
  curBuildings().push(b);
  G.stats.built++;
  sfx('build');
  toast(`Built ${def.name}`);
  checkTutorial();
  return true;
}

function removeBuilding(id){
  const b=findBuilding(id);
  if(!b)return;
  const def=BDEFS[b.type];
  // Remove all connections to/from this building
  for(const s of G.sectors){
    for(const ob of s.buildings){
      ob.connections=ob.connections.filter(c=>c!==id);
    }
  }
  // Remove from sector
  const sec=G.sectors[b.sector];
  sec.buildings=sec.buildings.filter(x=>x.id!==id);
  // Refund 40%
  if(def){
    const totalCost=def.cost*Math.pow(def.upgradeMul,b.level-1);
    G.credits+=Math.floor(totalCost*.4);
  }
  if(G.selectedId===id){G.selectedId=null;hideInfo()}
  sfx('click');
  toast('Building removed');
}

function upgradeBuilding(id){
  const b=findBuilding(id);
  if(!b)return;
  const def=BDEFS[b.type];
  if(b.level>=def.maxLv)return;
  const cost=Math.floor(def.cost*Math.pow(def.upgradeMul,b.level));
  if(G.credits<cost)return;
  G.credits-=cost;
  b.level++;
  G.stats.upgraded++;
  sfx('upgrade');
  toast(`${def.name} → Lv ${b.level}`);
  showBuildingInfo(id);
}

function getUpgradeCost(b){
  const def=BDEFS[b.type];
  if(b.level>=def.maxLv)return Infinity;
  return Math.floor(def.cost*Math.pow(def.upgradeMul,b.level));
}

/* ═══════════════════════════════════════
   PIPELINE CONNECTIONS
   ═══════════════════════════════════════ */
function canConnect(fromId,toId){
  if(fromId===toId)return false;
  const fb=findBuilding(fromId),tb=findBuilding(toId);
  if(!fb||!tb)return false;
  if(fb.sector!==tb.sector)return false;
  if(fb.connections.includes(toId))return false;
  const fdef=BDEFS[fb.type],tdef=BDEFS[tb.type];
  if(!fdef||!tdef)return false;
  if(fdef.passive)return false;
  // Check if source outputs something target needs
  for(const res of Object.keys(fdef.outputs)){
    if(fdef.globalOut)continue;
    if(tdef.inputs[res]!==undefined)return true;
  }
  // Storage can connect to anything (passive boost)
  if(fb.type==='storage'||tb.type==='storage')return true;
  return false;
}

function connect(fromId,toId){
  if(!canConnect(fromId,toId))return false;
  const fb=findBuilding(fromId);
  fb.connections.push(toId);
  G.stats.pipelines++;
  sfx('connect');
  const fdef=BDEFS[fb.type],tdef=BDEFS[findBuilding(toId).type];
  toast(`Pipeline: ${fdef.name} → ${tdef.name}`);
  checkTutorial();
  return true;
}

function disconnect(fromId,toId){
  const fb=findBuilding(fromId);
  if(!fb)return;
  fb.connections=fb.connections.filter(c=>c!==toId);
  sfx('click');
}

function getValidTargets(fromId){
  const targets=[];
  for(const b of curBuildings()){
    if(canConnect(fromId,b.id))targets.push(b.id);
  }
  return targets;
}

/* ═══════════════════════════════════════
   PARTICLES
   ═══════════════════════════════════════ */
function spawnParticle(from,to,res){
  if(particles.length>150)return;
  const fp=slotPos[from.slot],tp=slotPos[to.slot];
  if(!fp||!tp)return;
  particles.push({
    x1:fp.x,y1:fp.y,x2:tp.x,y2:tp.y,
    t:0,speed:.6+Math.random()*.4,
    color:RES_COLORS[res]||'#fff',
    size:2+Math.random()*1.5
  });
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.t+=p.speed*dt;
    if(p.t>=1)particles.splice(i,1);
  }
}

/* ═══════════════════════════════════════
   STARS GENERATION
   ═══════════════════════════════════════ */
function genStars(){
  stars=[];
  for(let i=0;i<180;i++){
    stars.push({
      x:Math.random()*cw,y:Math.random()*ch,
      r:.5+Math.random()*1.5,
      a:.3+Math.random()*.7,
      twinkle:Math.random()*Math.PI*2,
      speed:.5+Math.random()*2
    });
  }
}

/* ═══════════════════════════════════════
   CANVAS RENDERING
   ═══════════════════════════════════════ */
function resizeCanvas(){
  const cont=document.getElementById('cc');
  const rect=cont.getBoundingClientRect();
  dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';
  canvas.style.height=rect.height+'px';
  cw=canvas.width;ch=canvas.height;
  ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  cw=rect.width;ch=rect.height;
  calcSlotPositions();
  genStars();
  bgCache=null;
}

function renderBg(time){
  // Stars
  for(const s of stars){
    const a=s.a*(.7+.3*Math.sin(s.twinkle+time*s.speed));
    ctx.globalAlpha=a;
    ctx.fillStyle='#cceeff';
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  // Asteroid body
  const cx=cw/2,cy=ch*.42;
  const ar=Math.min(cw,ch)*.32;
  const grad=ctx.createRadialGradient(cx-ar*.2,cy-ar*.2,ar*.1,cx,cy,ar);
  grad.addColorStop(0,'#2a2a3a');
  grad.addColorStop(.6,'#1e1e2e');
  grad.addColorStop(1,'#0e0e1e');
  ctx.beginPath();
  ctx.arc(cx,cy,ar,0,Math.PI*2);
  ctx.fillStyle=grad;
  ctx.fill();

  // Craters
  ctx.globalAlpha=.15;
  const craters=[[.15,.2,.08],[-.2,.15,.06],[.1,-.18,.07],[-.15,-.12,.05],[.25,-.05,.04],[-.08,.25,.06]];
  for(const[dx,dy,dr]of craters){
    ctx.beginPath();
    ctx.arc(cx+ar*dx,cy+ar*dy,ar*dr,0,Math.PI*2);
    ctx.fillStyle='#0a0a18';
    ctx.fill();
  }
  ctx.globalAlpha=1;

  // Surface details
  ctx.strokeStyle='#1a1a2a';
  ctx.lineWidth=.5;
  ctx.globalAlpha=.2;
  for(let i=0;i<15;i++){
    const a=Math.random()*Math.PI*2;
    const r2=Math.random()*ar*.7;
    ctx.beginPath();
    ctx.arc(cx+r2*Math.cos(a),cy+r2*Math.sin(a),3+Math.random()*8,0,Math.PI*2);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function renderPipelines(){
  const bs=curBuildings();
  for(const b of bs){
    if(!b.connections||b.connections.length===0)continue;
    const fp=slotPos[b.slot];
    if(!fp)continue;
    const def=BDEFS[b.type];
    for(const tid of b.connections){
      const tb=findBuilding(tid);
      if(!tb||tb.sector!==G.curSector)continue;
      const tp=slotPos[tb.slot];
      if(!tp)continue;

      // Determine resource color
      let pColor='#445';
      if(def&&!def.globalOut){
        const tdef=BDEFS[tb.type];
        for(const res of Object.keys(def.outputs)){
          if(tdef&&tdef.inputs[res]!==undefined){
            pColor=RES_COLORS[res]||'#445';
            break;
          }
        }
      }

      // Control point for curve
      const mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2;
      const dx=tp.x-fp.x,dy=tp.y-fp.y;
      const cpx=mx-dy*.15,cpy=my+dx*.15;

      // Draw pipeline
      ctx.beginPath();
      ctx.moveTo(fp.x,fp.y);
      ctx.quadraticCurveTo(cpx,cpy,tp.x,tp.y);
      ctx.strokeStyle=pColor;
      ctx.globalAlpha=b.producing?.6:.25;
      ctx.lineWidth=2.5;
      ctx.stroke();
      ctx.globalAlpha=1;

      // Direction arrow at midpoint
      const mt=.5;
      const mpx=(1-mt)**2*fp.x+2*(1-mt)*mt*cpx+mt**2*tp.x;
      const mpy=(1-mt)**2*fp.y+2*(1-mt)*mt*cpy+mt**2*tp.y;
      ctx.fillStyle=pColor;
      ctx.globalAlpha=.4;
      ctx.beginPath();
      ctx.arc(mpx,mpy,3,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

function renderParticles(){
  for(const p of particles){
    const mx=(p.x1+p.x2)/2,my=(p.y1+p.y2)/2;
    const dx=p.x2-p.x1,dy=p.y2-p.y1;
    const cpx=mx-dy*.15,cpy=my+dx*.15;
    const t=p.t;
    const px=(1-t)**2*p.x1+2*(1-t)*t*cpx+t**2*p.x2;
    const py=(1-t)**2*p.y1+2*(1-t)*t*cpy+t**2*p.y2;

    ctx.globalAlpha=1-t*.3;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=6;
    ctx.beginPath();
    ctx.arc(px,py,p.size,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  }
}

function renderSlots(){
  const bs=curBuildings();
  for(let i=0;i<7;i++){
    const sp=slotPos[i];
    if(!sp)continue;
    const bld=buildingAtSlot(i);

    if(!bld){
      // Empty slot
      ctx.globalAlpha=.2;
      hexPath(sp.x,sp.y,SLOT_R);
      ctx.strokeStyle='#445566';
      ctx.lineWidth=1.5;
      ctx.setLineDash([4,4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Plus icon
      ctx.fillStyle='#445566';
      ctx.font='16px monospace';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('+',sp.x,sp.y);
      ctx.globalAlpha=1;

      // Highlight if in build mode
      if(G.buildMode){
        ctx.globalAlpha=.15+.1*Math.sin(Date.now()*.004);
        hexPath(sp.x,sp.y,SLOT_R+3);
        ctx.fillStyle='#00d4ff';
        ctx.fill();
        ctx.globalAlpha=1;
      }
    }else{
      // Building
      const def=BDEFS[bld.type];
      const selected=G.selectedId===bld.id;
      const validTarget=G.connectMode&&G.connectFrom!==bld.id&&canConnect(G.connectFrom,bld.id);

      // Glow
      if(selected||validTarget){
        ctx.shadowColor=selected?'#00d4ff':'#00ff88';
        ctx.shadowBlur=12;
      }
      if(bld.producing){
        ctx.shadowColor=def.color;
        ctx.shadowBlur=8;
      }

      // Hex fill
      hexPath(sp.x,sp.y,SLOT_R);
      const hc=def.color;
      ctx.fillStyle=`${hc}22`;
      ctx.fill();
      ctx.strokeStyle=selected?'#00d4ff':bld.producing?hc:'#334';
      ctx.lineWidth=selected?2.5:2;
      ctx.stroke();
      ctx.shadowBlur=0;

      // Valid target indicator
      if(validTarget){
        ctx.globalAlpha=.3+.2*Math.sin(Date.now()*.005);
        hexPath(sp.x,sp.y,SLOT_R+4);
        ctx.strokeStyle='#00ff88';
        ctx.lineWidth=2;
        ctx.stroke();
        ctx.globalAlpha=1;
      }

      // Icon
      ctx.font='18px serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillStyle='#fff';
      ctx.fillText(def.icon,sp.x,sp.y-2);

      // Level
      if(bld.level>1){
        ctx.font='bold 9px monospace';
        ctx.fillStyle='#aaf';
        ctx.fillText('Lv'+bld.level,sp.x,sp.y+14);
      }

      // Buffer bar
      if(!def.passive&&!def.globalOut){
        const barW=SLOT_R*1.4,barH=3;
        const bx=sp.x-barW/2,by=sp.y+SLOT_R+4;
        let totalCap=0,totalFill=0;
        for(const res of Object.keys(bld.outBuf)){
          totalCap+=def.bufCap+getStorageBoost(G.curSector);
          totalFill+=bld.outBuf[res]||0;
        }
        if(totalCap>0){
          const fill=clamp(totalFill/totalCap,0,1);
          ctx.fillStyle='#1a1a2a';
          ctx.fillRect(bx,by,barW,barH);
          ctx.fillStyle=fill>.85?'#ff4444':fill>.5?'#ffaa00':'#00ff88';
          ctx.fillRect(bx,by,barW*fill,barH);
        }
      }

      // Input buffer indicator (small dots)
      if(Object.keys(def.inputs).length>0){
        let ix=sp.x-SLOT_R*.6;
        for(const res of Object.keys(def.inputs)){
          const fill=(bld.inBuf[res]||0)/((def.bufCap+getStorageBoost(G.curSector))||1);
          ctx.fillStyle=fill>.1?RES_COLORS[res]:'#333';
          ctx.globalAlpha=.5+fill*.5;
          ctx.beginPath();
          ctx.arc(ix,sp.y-SLOT_R-4,2.5,0,Math.PI*2);
          ctx.fill();
          ctx.globalAlpha=1;
          ix+=8;
        }
      }

      // Stalled indicator
      if(!bld.producing&&Object.keys(def.inputs).length>0&&!def.passive){
        ctx.globalAlpha=.5+.3*Math.sin(Date.now()*.006);
        ctx.font='10px monospace';
        ctx.fillStyle='#ff4444';
        ctx.fillText('⏸',sp.x+SLOT_R*.7,sp.y-SLOT_R*.5);
        ctx.globalAlpha=1;
      }
    }
  }
}

function render(time){
  ctx.clearRect(0,0,cw,ch);
  renderBg(time*.001);
  renderPipelines();
  renderParticles();
  renderSlots();
}

/* ═══════════════════════════════════════
   UI MANAGEMENT
   ═══════════════════════════════════════ */
function updateResourceBar(){
  const bar=document.getElementById('rbar');
  // Calculate production rates
  let rates={ore:0,crystal:0,energy:0,alloy:0,credits:0,research:0};
  for(const s of G.sectors){
    if(!s.unlocked)continue;
    for(const b of s.buildings){
      const def=BDEFS[b.type];
      if(!def||!b.producing)continue;
      const outMul=getEffectiveRate(b,def,true);
      const inMul=getEffectiveRate(b,def,false);
      for(const[res,base]of Object.entries(def.outputs)){
        rates[res]=(rates[res]||0)+base*outMul;
      }
      for(const[res,base]of Object.entries(def.inputs)){
        rates[res]=(rates[res]||0)-base*inMul;
      }
    }
  }

  const items=[
    {res:'credits',val:G.credits,rate:rates.credits},
    {res:'research',val:G.research,rate:rates.research},
    {res:'energy',val:null,rate:rates.energy,rateOnly:true},
    {res:'ore',val:null,rate:rates.ore,rateOnly:true},
    {res:'crystal',val:null,rate:rates.crystal,rateOnly:true},
    {res:'alloy',val:null,rate:rates.alloy,rateOnly:true}
  ];

  let html='';
  for(const it of items){
    const icon=RES_ICONS[it.res];
    const color=RES_COLORS[it.res];
    let display='';
    if(it.rateOnly){
      const r=it.rate;
      const sign=r>=0?'+':'';
      display=`<span class="rv" style="color:${r>=0?color:'#f66'}">${sign}${fmt(r)}/s</span>`;
    }else{
      display=`<span class="rv" style="color:${color}">${fmt(it.val)}</span>`;
      if(it.rate){
        const sign=it.rate>=0?'+':'';
        display+=`<span style="color:${it.rate>=0?'#8a8':'#f66'};font-size:10px;margin-left:2px">${sign}${fmt(it.rate)}/s</span>`;
      }
    }
    html+=`<div class="ri">${icon} ${display}</div>`;
  }
  bar.innerHTML=html;
}

function showTab(tab){
  document.querySelectorAll('.tbtn').forEach(b=>{
    b.classList.toggle('act',b.dataset.tab===tab);
  });
  const pc=document.getElementById('pc');
  switch(tab){
    case'colony':renderColonyPanel(pc);break;
    case'build':renderBuildPanel(pc);break;
    case'research':renderResearchPanel(pc);break;
    case'stats':renderStatsPanel(pc);break;
  }
  if(tab!=='colony'){
    exitModes();
  }
}

  if(!b)return;
  const def=BDEFS[b.type];
  const bi=document.getElementById('bi');
  const upgCost=getUpgradeCost(b);
  const canUpg=upgCost!==Infinity&&G.credits>=upgCost;
  const outMul=getEffectiveRate(b,def,true);
  const inMul=getEffectiveRate(b,def,false);

  let html=`<div class="bih">
    <span class="ic">${def.icon}</span>
    <span class="nm">${def.name}</span>
    <span class="lv">Lv ${b.level}/${def.maxLv}</span>
    <span style="flex:1"></span>
    <span style="cursor:pointer;font-size:18px;color:#888" onclick="hideInfo()">✕</span>
  </div>`;
  html+=`<div class="bis">${def.desc}</div>`;

  // Production info
  if(!def.passive){
    html+='<div style="font-size:11px;margin-bottom:4px">';
    if(Object.keys(def.inputs).length>0){
      html+='<span style="color:#f88">IN:</span> ';
      for(const[r,base]of Object.entries(def.inputs)){
        html+=`${RES_ICONS[r]} ${fmt(base*inMul)}/s `;
      }
      html+='<br>';
    }
    html+='<span style="color:#8f8">OUT:</span> ';
    for(const[r,base]of Object.entries(def.outputs)){
      html+=`${RES_ICONS[r]} ${fmt(base*outMul)}/s `;
    }
    html+='</div>';

    // Buffer status
    if(!def.globalOut){
      html+='<div style="font-size:10px;color:#778;margin-bottom:4px">';
      const bufMax=def.bufCap+getStorageBoost(b.sector);
      for(const r of Object.keys(b.outBuf)){
        html+=`Out ${RES_ICONS[r]}: ${fmt(b.outBuf[r]||0)}/${bufMax} `;
      }
      for(const r of Object.keys(b.inBuf)){
        html+=`In ${RES_ICONS[r]}: ${fmt(b.inBuf[r]||0)}/${bufMax} `;
      }
      html+='</div>';
    }

    html+=`<div style="font-size:10px;color:${b.producing?'#0f8':'#f66'}">${b.producing?'● Producing':'● Stalled — check inputs'}</div>`;
  }else{
    const boost=def.bufBoost*(1+(b.level-1)*.5);
    html+=`<div style="font-size:11px;color:#8af">Buffer boost: +${Math.floor(boost)} capacity</div>`;
  }

  // Connections
  if(b.connections.length>0){
    html+='<div style="font-size:11px;margin-top:6px;color:#aaa">Pipelines:</div>';
    for(const tid of b.connections){
      const tb=findBuilding(tid);
      if(!tb)continue;
      const tdef=BDEFS[tb.type];
      let resName='';
      for(const r of Object.keys(def.outputs||{})){
        if(!def.globalOut&&tdef.inputs[r]!==undefined)resName=RES_ICONS[r];
      }
      html+=`<div class="conn-item">→ ${tdef.icon} ${tdef.name} ${resName}
        <span class="cx" onclick="disconnect(${b.id},${tid});showBuildingInfo(${b.id})">✕</span></div>`;
    }
  }

  // Incoming connections
  const incoming=[];
  for(const ob of curBuildings()){
    if(ob.connections.includes(b.id))incoming.push(ob);
  }
  if(incoming.length>0){
    html+='<div style="font-size:11px;margin-top:4px;color:#aaa">Receiving from:</div>';
    for(const ob of incoming){
      const odef=BDEFS[ob.type];
      html+=`<div class="conn-item">← ${odef.icon} ${odef.name}</div>`;
    }
  }

  // Actions
  html+='<div class="bia">';
  if(b.level<def.maxLv){
    html+=`<button class="abtn up" ${canUpg?'':`disabled`} onclick="upgradeBuilding(${b.id})">⬆ Upgrade ${upgCost===Infinity?'':'('+upgCost+'💰)'}</button>`;
  }
  const targets=getValidTargets(b.id);
  if(targets.length>0&&!def.passive){
    html+=`<button class="abtn cn" onclick="enterConnectMode(${b.id})">🔗 Connect</button>`;
  }
  html+=`<button class="abtn rm" onclick="if(confirm('Remove this building?'))removeBuilding(${b.id})">🗑 Remove</button>`;
  html+=`<button class="abtn cl" onclick="hideInfo()">Close</button>`;
  html+='</div>';

  bi.innerHTML=html;
  bi.style.display='block';
  G.selectedId=b.id;
}

function hideInfo(){
  document.getElementById('bi').style.display='none';
  G.selectedId=null;
}

/* ═══════════════════════════════════════
   INPUT HANDLING
   ═══════════════════════════════════════ */
function getCanvasPos(e){
  const rect=canvas.getBoundingClientRect();
  const touch=e.touches?e.touches[0]:e;
  return{
    x:touch.clientX-rect.left,
    y:touch.clientY-rect.top
  };
}

function findSlotAt(x,y){
  for(let i=0;i<slotPos.length;i++){
    const s=slotPos[i];
    if(Math.sqrt((x-s.x)**2+(y-s.y)**2)<HIT_R)return i;
  }
  return-1;
}

function handleCanvasTap(e){
  e.preventDefault();
  initAudio();
  const pos=getCanvasPos(e);
  const si=findSlotAt(pos.x,pos.y);

  if(si<0){
    // Tapped empty space
    exitModes();
    hideInfo();
    return;
  }

  const bld=buildingAtSlot(si);

  // Connect mode
  if(G.connectMode&&G.connectFrom!==null){
    if(bld&&canConnect(G.connectFrom,bld.id)){
      connect(G.connectFrom,bld.id);
      exitConnectMode();
      showBuildingInfo(G.connectFrom);
    }else if(bld){
      sfx('error');
      toast('Cannot connect these buildings');
    }
    return;
  }

  // Build mode
  if(G.buildMode&&!bld){
    if(placeBuilding(G.buildMode,si)){
      G.buildMode=null;
      showTab('colony');
    }else{
      sfx('error');
      toast('Cannot build here');
    }
    return;
  }

  // Select building
  if(bld){
    sfx('click');
    G.selectedId=bld.id;
    showBuildingInfo(bld.id);
  }else{
    // Empty slot, suggest build tab
    if(!G.buildMode){
      toast('Tap Build tab to place structures');
    }
  }
}

function enterBuildMode(type){
  const def=BDEFS[type];
  if(!def||G.credits<def.cost)return;
  if(curBuildings().length>=7){sfx('error');toast('Sector full');return}
  G.buildMode=type;
  G.connectMode=false;
  hideInfo();
  toast(`Tap an empty slot to place ${def.name}`);
  sfx('click');
}

function enterConnectMode(fromId){
  G.connectMode=true;
  G.connectFrom=fromId;
  G.buildMode=null;
  document.getElementById('cm-hint').style.display='block';
  hideInfo();
  sfx('click');
}

function exitConnectMode(){
  G.connectMode=false;
  G.connectFrom=null;
  document.getElementById('cm-hint').style.display='none';
}

function exitModes(){
  G.buildMode=null;
  exitConnectMode();
}

function selectBuilding(id){
  sfx('click');
  showBuildingInfo(id);
}

function switchSector(idx){
  if(!G.sectors[idx].unlocked)return;
  G.curSector=idx;
  G.selectedId=null;
  G.connectMode=false;
  G.buildMode=null;
  hideInfo();
  exitConnectMode();
  updateSectorNav();
  showTab('colony');
  sfx('click');
}

function toggleSound(){
  G.soundOn=!G.soundOn;
  showTab('stats');
}

/* ═══════════════════════════════════════
   RESEARCH
   ═══════════════════════════════════════ */
function doResearch(key){
  const rd=RDEFS[key];
  const lv=G.rLevels[key];
  if(lv>=rd.maxLv)return;
  const cost=rd.costs[lv];
  if(G.research<cost)return;
  G.research-=cost;
  G.rLevels[key]++;
  G.stats.researched++;
  sfx('research');
  toast(`Researched ${rd.name} Lv ${G.rLevels[key]}`);

  // Expansion unlocks sectors
  if(key==='expansion'){
    updateSectorNav();
  }

  renderResearchPanel(document.getElementById('pc'));
  checkTutorial();
}

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ═══════════════════════════════════════
   TUTORIAL
   ═══════════════════════════════════════ */
const TUT_STEPS=[
  {title:'Welcome to Asteroid Forge!',
   text:'Build mining colonies by connecting buildings with resource pipelines. Each building needs specific inputs to produce outputs.',
   btn:'Start'},
  {title:'Step 1: Build a Reactor',
   text:'Reactors generate ⚡ Energy from asteroid core heat. Tap the Build tab, select Reactor, then tap an empty slot on the asteroid.',
   btn:'Got it',check:()=>curBuildings().some(b=>b.type==='reactor')},
  {title:'Step 2: Build a Mine',
   text:'Mines extract ⛏ Ore, but need ⚡ Energy. Build one near your Reactor.',
   btn:'Got it',check:()=>curBuildings().some(b=>b.type==='mine')},
  {title:'Step 3: Connect Pipeline!',
   text:'Tap your Reactor on the map, then tap "Connect" to route energy to the Mine. Without this pipeline, the Mine gets no energy!',
   btn:'Got it',check:()=>{
    const r=curBuildings().find(b=>b.type==='reactor');
    return r&&r.connections.length>0;
   }},
  {title:'Pipeline Active! 🎉',
   text:'Resources now flow through your pipeline. The Mine produces ore! Build a Foundry (ore+energy→alloy) and a Market (alloy→credits) to complete your production chain.',
   btn:'Let\'s go!',check:()=>curBuildings().some(b=>b.type==='market'||b.type==='crystalMarket')},
  {title:'Production Chain Complete!',
   text:'Credits are flowing! Remember: connect ALL buildings via pipelines. Disconnected buildings produce nothing. Build a Lab to research upgrades!',
   btn:'Finish Tutorial'}
];

function checkTutorial(){
  if(G.tutDone||G.tutStep>=TUT_STEPS.length)return;
  const step=TUT_STEPS[G.tutStep];
  if(step.check&&step.check()){
    G.tutStep++;
    if(G.tutStep<TUT_STEPS.length){
      showTutorial();
    }else{
      G.tutDone=true;
      hideTutorial();
    }
  }
}

function showTutorial(){
  if(G.tutStep>=TUT_STEPS.length){G.tutDone=true;hideTutorial();return}
  const step=TUT_STEPS[G.tutStep];
  const el=document.getElementById('tut');
  el.style.display='flex';
  el.innerHTML=`<div class="tbox">
    <h3>${step.title}</h3>
    <p>${step.text}</p>
    <button class="tutb" onclick="advanceTutorial()">${step.btn}</button>
  </div>`;
}

function advanceTutorial(){
  const step=TUT_STEPS[G.tutStep];
  if(!step.check){
    G.tutStep++;
    if(G.tutStep>=TUT_STEPS.length){
      G.tutDone=true;
      hideTutorial();
    }else{
      showTutorial();
    }
  }else{
    hideTutorial();
  }
}

function hideTutorial(){
  document.getElementById('tut').style.display='none';
}

/* ═══════════════════════════════════════
   OFFLINE PROGRESS
   ═══════════════════════════════════════ */
function processOffline(){
  const now=Date.now();
  const elapsed=Math.min((now-G.lastTick)/1000,MAX_OFFLINE_S);
  if(elapsed<2)return;

  const totalTicks=Math.floor(elapsed*10*OFFLINE_RATE);
  const simTicks=Math.min(totalTicks,2000);
  const scale=totalTicks/simTicks;

  const prevCredits=G.credits;
  for(let i=0;i<simTicks;i++)runTick(scale);

  const earned=G.credits-prevCredits;
  if(earned>0){
    const mins=Math.floor(elapsed/60);
    toast(`Welcome back! +${fmt(earned)}💰 earned in ${mins}m`);
  }
  G.lastTick=now;
}

/* ═══════════════════════════════════════
   GAME LOOP
   ═══════════════════════════════════════ */
function gameLoop(ts){
  const dt=(ts-lastFrame)/1000;
  lastFrame=ts;

  tickAccum+=dt*1000;
  while(tickAccum>=TICK_MS){
    runTick(1);
    tickAccum-=TICK_MS;
  }

  updateParticles(dt);
  render(ts);

  // Periodic UI updates
  if(Math.floor(ts/500)!==Math.floor((ts-dt*1000)/500)){
    updateResourceBar();
    // Refresh current panel if colony
    const activeTab=document.querySelector('.tbtn.act');
    if(activeTab&&activeTab.dataset.tab==='colony'){
      renderColonyPanel(document.getElementById('pc'));
    }
  }

  // Auto-save
  if(Date.now()-G.lastSave>SAVE_INTERVAL)save();

  // Check tutorial
  if(!G.tutDone)checkTutorial();

  G.lastTick=Date.now();
  requestAnimationFrame(gameLoop);
}

/* ═══════════════════════════════════════
   INITIALIZATION
   ═══════════════════════════════════════ */
function init(){
  canvas=document.getElementById('cv');
  const loaded=load();

  // Telegram integration
  try{
    if(window.Telegram&&Telegram.WebApp){
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      // Match Telegram theme if available
      if(Telegram.WebApp.colorScheme==='dark'||true){
        document.body.style.background='#0a0a1a';
      }
    }
  }catch(e){}

  resizeCanvas();
  window.addEventListener('resize',()=>{resizeCanvas();});

  // Canvas events
  canvas.addEventListener('touchstart',handleCanvasTap,{passive:false});
  canvas.addEventListener('mousedown',handleCanvasTap);

  // Process offline time
  if(loaded){
    processOffline();
  }

  updateResourceBar();
  updateSectorNav();
  showTab('colony');

  // Tutorial
  if(!G.tutDone&&G.tutStep<TUT_STEPS.length){
    showTutorial();
  }

  lastFrame=performance.now();
  requestAnimationFrame(gameLoop);
}

// Expose functions to HTML onclick handlers
window.showTab=showTab;
window.enterBuildMode=enterBuildMode;
window.enterConnectMode=enterConnectMode;
window.selectBuilding=selectBuilding;
window.switchSector=switchSector;
window.toggleSound=toggleSound;
window.doResearch=doResearch;
window.upgradeBuilding=upgradeBuilding;
window.removeBuilding=removeBuilding;
window.disconnect=disconnect;
window.hideInfo=hideInfo;
window.advanceTutorial=advanceTutorial;

document.addEventListener('DOMContentLoaded',init);
</script>
