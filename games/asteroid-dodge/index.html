<html lang="ko">

<title>Asteroid Dodge - 소행성 회피</title>
<meta name="description" content="Play Asteroid Dodge - 소행성 회피 - Free HTML5 browser game on eastsea.monster. No download required.">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Arial',sans-serif;overflow:hidden;}
#gameContainer{position:relative;width:360px;max-width:100vw;touch-action:none;}
canvas{display:block;border-radius:12px;box-shadow:0 0 60px rgba(100,200,255,.15);}
</style>

<body>
<div id="gameContainer">
<canvas id="c" width="360" height="600"></canvas>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=360,H=600;
let state='start',score=0,best=+(localStorage.getItem('ad_best')||0);
let ship,asteroids,stars,bullets,particles;
let lastTime=0,spawnTimer=0,spawnInterval=1.2,scoreTimer=0;
let touchX=null,touchActive=false,mouseX=null;
let level=1,levelTimer=0;
let invincible=0;

function initStars(){
  stars=[];
  for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,spd:Math.random()*40+20,br:Math.random()});
}
function initGame(){
  ship={x:W/2,y:H-80,w:28,h:36,speed:180,targetX:W/2};
  asteroids=[];bullets=[];particles=[];
  score=0;level=1;spawnInterval=1.4;spawnTimer=0;scoreTimer=0;levelTimer=0;
  invincible=1.5;
  initStars();
}
function spawnAsteroid(){
  const r=Math.random()*18+10;
  const x=r+Math.random()*(W-r*2);
  const spd=(60+level*15+Math.random()*30);
  const rot=Math.random()*Math.PI*2;
  const rotSpd=(Math.random()-.5)*2;
  const sides=Math.floor(Math.random()*4)+5;
  const col=`hsl(${Math.random()*40+10},${60+Math.random()*30}%,${40+Math.random()*20}%)`;
  asteroids.push({x,y:-r,r,spd,rot,rotSpd,sides,col,hp:r>20?2:1});
}
function spawnParticles(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=Math.random()*150+50;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,maxLife:.8+Math.random()*.4,r:Math.random()*4+2,col});
  }
}
function drawShip(x,y,alpha=1){
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);
  // engine glow
  const eg=ctx.createRadialGradient(0,16,0,0,16,18);
  eg.addColorStop(0,'rgba(100,200,255,.8)');eg.addColorStop(1,'transparent');
  ctx.fillStyle=eg;ctx.fillRect(-18,8,36,26);
  // body
  ctx.fillStyle='#7FDBFF';
  ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(14,16);ctx.lineTo(0,10);ctx.lineTo(-14,16);ctx.closePath();ctx.fill();
  // cockpit
  ctx.fillStyle='#00b4d8';
  ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(7,10);ctx.lineTo(0,5);ctx.lineTo(-7,10);ctx.closePath();ctx.fill();
  // wings
  ctx.fillStyle='#5fa8d3';
  ctx.beginPath();ctx.moveTo(14,16);ctx.lineTo(22,20);ctx.lineTo(14,8);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-14,16);ctx.lineTo(-22,20);ctx.lineTo(-14,8);ctx.closePath();ctx.fill();
  // thruster
  if(Math.random()>.3){
    ctx.fillStyle=`rgba(${100+Math.random()*155},${200+Math.random()*55},255,.9)`;
    ctx.beginPath();ctx.ellipse(0,18,5,6+Math.random()*6,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function drawAsteroid(a){
  ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
  ctx.beginPath();
  for(let i=0;i<a.sides;i++){
    const angle=i/a.sides*Math.PI*2;
    const noise=.7+Math.random()*.3;
    const r2=a.r*(noise*.4+.6);
    i===0?ctx.moveTo(Math.cos(angle)*r2,Math.sin(angle)*r2):ctx.lineTo(Math.cos(angle)*r2,Math.sin(angle)*r2);
  }
  ctx.closePath();
  ctx.fillStyle=a.col;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}
function updateStars(dt){
  stars.forEach(s=>{s.y+=s.spd*dt;if(s.y>H)s.y=0;});
}
function drawStars(){
  stars.forEach(s=>{
    ctx.fillStyle=`rgba(255,255,255,${.3+s.br*.7})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function circleRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  return Math.hypot(cx-nx,cy-ny)<cr;
}
function drawHUD(){
  // top bar
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,50);
  ctx.textAlign='left';ctx.font='bold 13px Arial';ctx.fillStyle='#888';
  ctx.fillText('점수',12,18);
  ctx.font='bold 26px Arial';ctx.fillStyle='#fff';
  ctx.fillText(score,12,44);
  ctx.textAlign='center';ctx.font='bold 14px Arial';ctx.fillStyle='#7FDBFF';
  ctx.fillText(`LV ${level}`,W/2,30);
  ctx.textAlign='right';ctx.font='bold 13px Arial';ctx.fillStyle='#888';
  ctx.fillText('최고',W-12,18);
  ctx.font='bold 20px Arial';ctx.fillStyle='#FFD700';
  ctx.fillText(best,W-12,44);
}
function drawStart(){
  // space bg
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
  drawStars();
  // nebula
  const nb=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,200);
  nb.addColorStop(0,'rgba(20,40,100,.4)');nb.addColorStop(1,'transparent');
  ctx.fillStyle=nb;ctx.fillRect(0,0,W,H);
  drawShip(W/2,H/2-30);
  ctx.textAlign='center';
  ctx.font='bold 34px Arial';
  ctx.fillStyle='#7FDBFF';
  ctx.fillText('🚀 Asteroid Dodge',W/2,130);
  ctx.font='16px Arial';ctx.fillStyle='#aaa';
  ctx.fillText('소행성 회피 생존 게임',W/2,162);
  const tips=['마우스/터치로 우주선 조종','소행성을 피하면서 시간 생존','시간이 같수록 소행성 증가'];
  ctx.font='13px Arial';ctx.fillStyle='#ccc';
  tips.forEach((t,i)=>ctx.fillText(t,W/2,330+i*24));
  ctx.font='bold 16px Arial';ctx.fillStyle='#FFD700';
  ctx.fillText(`최고 기록: ${best}점`,W/2,430);
  // btn
  roundedRect(W/2-80,460,160,56,12,'#7FDBFF');
  ctx.font='bold 22px Arial';ctx.fillStyle='#05050f';
  ctx.fillText('시작!',W/2,495);
}
function drawOver(){
  ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(0,0,W,H);
  drawStars();
  ctx.textAlign='center';
  ctx.font='bold 38px Arial';ctx.fillStyle='#FF4136';
  ctx.fillText('게임 오버',W/2,170);
  ctx.font='bold 26px Arial';ctx.fillStyle='#fff';
  ctx.fillText(`${score}점`,W/2,228);
  if(score>=best){
    ctx.font='bold 22px Arial';ctx.fillStyle='#FFD700';
    ctx.fillText('🏆 신기록!',W/2,268);
  }
  ctx.font='18px Arial';ctx.fillStyle='#aaa';
  ctx.fillText(`최고: ${best}점 | LV${level}`,W/2,308);
  roundedRect(W/2-80,360,160,52,12,'#7FDBFF');
  ctx.font='bold 20px Arial';ctx.fillStyle='#05050f';
  ctx.fillText('다시 도전',W/2,392);
  roundedRect(W/2-80,428,160,44,12,'#333');
  ctx.font='bold 16px Arial';ctx.fillStyle='#ccc';
  ctx.fillText('메인으로',W/2,456);
}
function roundedRect(x,y,w,h,r,fill,stroke,sw){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}
function update(dt){
  updateStars(dt);
  if(state!=='play')return;
  // score
  scoreTimer+=dt;
  if(scoreTimer>=.5){score+=level;scoreTimer=0;}
  // level
  levelTimer+=dt;
  if(levelTimer>=15){level++;levelTimer=0;spawnInterval=Math.max(.5,spawnInterval-.1);}
  // invincible
  if(invincible>0)invincible-=dt;
  // move ship
  let targetX=ship.targetX;
  if(touchActive&&touchX!==null)targetX=touchX;
  else if(mouseX!==null)targetX=mouseX;
  const dx=targetX-ship.x;
  const moveAmt=ship.speed*dt;
  if(Math.abs(dx)<moveAmt)ship.x=targetX;
  else ship.x+=Math.sign(dx)*moveAmt;
  ship.x=Math.max(ship.w/2,Math.min(W-ship.w/2,ship.x));
  // spawn
  spawnTimer+=dt;
  if(spawnTimer>=spawnInterval){spawnAsteroid();spawnTimer=0;}
  // update asteroids
  for(let i=asteroids.length-1;i>=0;i--){
    const a=asteroids[i];
    a.y+=a.spd*dt;
    a.rot+=a.rotSpd*dt;
    if(a.y>H+a.r){asteroids.splice(i,1);continue;}
    // collision
    if(invincible<=0&&circleRect(a.x,a.y,a.r*0.85,ship.x-14,ship.y-18,28,36)){
      spawnParticles(ship.x,ship.y,'#FF4136',20);
      spawnParticles(a.x,a.y,a.col,12);
      asteroids.splice(i,1);
      if(score>best)best=score;
      localStorage.setItem('ad_best',best);
      state='over';
      return;
    }
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=80*dt;
    p.life-=dt/p.maxLife;
    if(p.life<=0)particles.splice(i,1);
  }
}
function render(){
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
  drawStars();
  if(state==='start'){drawStart();return;}
  if(state==='over'){drawOver();return;}
  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  // asteroids
  asteroids.forEach(a=>drawAsteroid(a));
  // ship
  const alpha=invincible>0?(Math.sin(Date.now()*.02)*.4+.6):1;
  drawShip(ship.x,ship.y,alpha);
  drawHUD();
}
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;
  update(dt);render();
  requestAnimationFrame(loop);
}
function getCanvasPos(clientX){
  const rect=c.getBoundingClientRect();
  return (clientX-rect.left)*(W/rect.width);
}
c.addEventListener('mousemove',e=>{mouseX=getCanvasPos(e.clientX);});
c.addEventListener('touchmove',e=>{e.preventDefault();touchActive=true;touchX=getCanvasPos(e.touches[0].clientX);},{passive:false});
c.addEventListener('touchstart',e=>{
  e.preventDefault();
  const cx=getCanvasPos(e.touches[0].clientX);
  const cy=(e.touches[0].clientY-c.getBoundingClientRect().top)*(H/c.getBoundingClientRect().height);
  touchActive=true;touchX=cx;
  handleTap(cx,cy);
},{passive:false});
c.addEventListener('touchend',e=>{touchActive=false;});
c.addEventListener('click',e=>{
  const rect=c.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(W/rect.width);
  const cy=(e.clientY-rect.top)*(H/rect.height);
  handleTap(cx,cy);
});
function handleTap(x,y){
  if(state==='start'){
    if(x>=W/2-80&&x<=W/2+80&&y>=460&&y<=516){state='play';initGame();}
  } else if(state==='over'){
    if(x>=W/2-80&&x<=W/2+80&&y>=360&&y<=412){state='play';initGame();}
    if(x>=W/2-80&&x<=W/2+80&&y>=428&&y<=472){state='start';initStars();}
  }
}
initStars();
requestAnimationFrame(loop);
</script>
