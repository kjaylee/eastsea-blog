<script>
(function(){
'use strict';
const I18N={
ko:{shots:'발사',hits:'적중',sunk:'격침',enemySea:'적 바다',mySea:'내 바다',hit:'적중!',miss:'빗나감',youSunk:'격침!',enemyHit:'피격!',enemyMiss:'회피!',win:'승리!',lose:'패배...',replay:'다시하기',share:'공유',yourTurn:'당신의 차례',enemyTurn:'적의 차례...',accuracy:'정확도',wonMsg:'적 함대를 전멸시켰습니다!',lostMsg:'아군 함대가 전멸했습니다...'},
en:{shots:'SHOTS',hits:'HITS',sunk:'SUNK',enemySea:'Enemy Sea',mySea:'My Sea',hit:'Hit!',miss:'Miss',youSunk:'Sunk!',enemyHit:'Hit!',enemyMiss:'Missed!',win:'Victory!',lose:'Defeat...',replay:'Play Again',share:'Share',yourTurn:'Your Turn',enemyTurn:'Enemy Turn...',accuracy:'Accuracy',wonMsg:'Enemy fleet destroyed!',lostMsg:'Your fleet destroyed...'},
ja:{shots:'発射',hits:'命中',sunk:'撃沈',enemySea:'敵の海',mySea:'自分の海',hit:'命中！',miss:'外れ',youSunk:'撃沈！',enemyHit:'被弾！',enemyMiss:'回避！',win:'勝利！',lose:'敗北…',replay:'もう一度',share:'シェア',yourTurn:'あなたの番',enemyTurn:'敵の番…',accuracy:'命中率',wonMsg:'敵艦隊を全滅させた！',lostMsg:'味方艦隊が全滅…'}
};
const ulang=(window.TG?.getLang?.()||navigator.language||'en').slice(0,2);
const lang=['ko','ja'].includes(ulang)?ulang:'en';
const t=k=>I18N[lang]?.[k]||I18N.en[k]||k;
document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t(k))el.textContent=t(k)});

const SIZE=10;
const SHIPS=[{name:'Carrier',len:5},{name:'Battleship',len:4},{name:'Cruiser',len:3},{name:'Submarine',len:3},{name:'Destroyer',len:2}];
const cellSize=Math.floor((Math.min(window.innerWidth,420)-40)/SIZE);
const gridTemp=`repeat(${SIZE},${cellSize}px)`;

let enemyBoard=[],myBoard=[],enemyShips=[],myShips=[];
let enemyRevealed=[],myRevealed=[];
let shotCount=0,hitCount=0,sunkCount=0,myTurn=true,gameActive=true;
let aiHits=[],aiMode='hunt',aiDir=null,aiOrigin=null;

function createBoard(){return Array.from({length:SIZE},()=>Array(SIZE).fill(0))}
function createRevealed(){return Array.from({length:SIZE},()=>Array(SIZE).fill(false))}

function placeShips(board){
const ships=[];
SHIPS.forEach(ship=>{
let placed=false;
while(!placed){
const horiz=Math.random()>0.5;
const r=Math.floor(Math.random()*(horiz?SIZE:SIZE-ship.len));
const c=Math.floor(Math.random()*(horiz?SIZE-ship.len:SIZE));
let ok=true;
const cells=[];
for(let i=0;i<ship.len;i++){
const rr=horiz?r:r+i;
const cc=horiz?c+i:c;
if(board[rr][cc]!==0){ok=false;break}
cells.push([rr,cc]);
}
if(ok){
cells.forEach(([rr,cc])=>board[rr][cc]=ships.length+1);
ships.push({...ship,cells,sunk:false});
placed=true;
}
}
});
return ships;
}

function renderGrid(gridEl,board,revealed,isEnemy){
gridEl.innerHTML='';
gridEl.style.gridTemplateColumns=gridTemp;
gridEl.style.gridTemplateRows=gridTemp;
for(let r=0;r<SIZE;r++){
for(let c=0;c<SIZE;c++){
const cell=document.createElement('div');
cell.className='cell';
if(revealed[r][c]){
if(board[r][c]>0){
const shipIdx=board[r][c]-1;
const ships=isEnemy?enemyShips:myShips;
cell.className='cell '+(ships[shipIdx]?.sunk?'cell-sunk':'cell-hit');
}else{
cell.className='cell cell-miss';
}
}else if(!isEnemy&&board[r][c]>0){
cell.className='cell cell-ship';
}else{
cell.className='cell cell-water';
}
if(isEnemy&&!revealed[r][c]&&gameActive){
cell.addEventListener('click',()=>playerShoot(r,c));
}
gridEl.appendChild(cell);
}
}
}

function renderFleet(fleetEl,ships){
fleetEl.innerHTML='';
ships.forEach(s=>{
const el=document.createElement('span');
el.className='ship-ind'+(s.sunk?' sunk':'');
el.textContent=s.name+' ('+s.len+')';
fleetEl.appendChild(el);
});
}

function playerShoot(r,c){
if(!myTurn||!gameActive||enemyRevealed[r][c])return;
myTurn=false;
enemyRevealed[r][c]=true;
shotCount++;
document.getElementById('shots').textContent=shotCount;
const val=enemyBoard[r][c];
if(val>0){
hitCount++;
document.getElementById('hits').textContent=hitCount;
const ship=enemyShips[val-1];
if(ship.cells.every(([rr,cc])=>enemyRevealed[rr][cc])){
ship.sunk=true;
sunkCount++;
document.getElementById('sunk').textContent=sunkCount;
document.getElementById('msg').textContent='💥 '+ship.name+' '+t('youSunk');
window.TG?.haptic?.('notification','success');
}else{
document.getElementById('msg').textContent='🔥 '+t('hit');
window.TG?.haptic?.('impact','heavy');
}
}else{
document.getElementById('msg').textContent='💨 '+t('miss');
window.TG?.haptic?.('impact','light');
}
renderGrid(document.getElementById('enemyGrid'),enemyBoard,enemyRevealed,true);
renderFleet(document.getElementById('enemyFleet'),enemyShips);
if(enemyShips.every(s=>s.sunk)){endGame(true);return}
document.getElementById('turnInd').textContent=t('enemyTurn');
setTimeout(aiShoot,600+Math.random()*400);
}

function aiShoot(){
if(!gameActive)return;
let r,c;
if(aiMode==='target'&&aiHits.length>0){
const tries=getTargetCells();
if(tries.length>0){
[r,c]=tries[Math.floor(Math.random()*tries.length)];
}else{
aiMode='hunt';
aiHits=[];
aiDir=null;
}
}
if(aiMode==='hunt'||r===undefined){
const options=[];
for(let rr=0;rr<SIZE;rr++)for(let cc=0;cc<SIZE;cc++){
if(!myRevealed[rr][cc])options.push([rr,cc]);
}
// Checkerboard pattern for smarter hunting
const parity=options.filter(([rr,cc])=>(rr+cc)%2===0);
const pool=parity.length>0?parity:options;
if (pool.length === 0) {
endGame(false);
return;
}
[r,c]=pool[Math.floor(Math.random()*pool.length)];
}
myRevealed[r][c]=true;
const val=myBoard[r][c];
if(val>0){
aiHits.push([r,c]);
aiMode='target';
const ship=myShips[val-1];
if(ship.cells.every(([rr,cc])=>myRevealed[rr][cc])){
ship.sunk=true;
document.getElementById('msg').textContent='⚠️ '+ship.name+' '+t('enemyHit');
aiHits=aiHits.filter(([hr,hc])=>!ship.cells.some(([sr,sc])=>sr===hr&&sc===hc));
if(aiHits.length===0)aiMode='hunt';
}else{
document.getElementById('msg').textContent='⚠️ '+t('enemyHit');
}
}else{
document.getElementById('msg').textContent='✓ '+t('enemyMiss');
}
renderGrid(document.getElementById('myGrid'),myBoard,myRevealed,false);
renderFleet(document.getElementById('myFleet'),myShips);
if(myShips.every(s=>s.sunk)){endGame(false);return}
myTurn=true;
document.getElementById('turnInd').textContent=t('yourTurn');
}

function getTargetCells(){
const dirs=[[0,1],[0,-1],[1,0],[-1,0]];
const targets=[];
aiHits.forEach(([hr,hc])=>{
dirs.forEach(([dr,dc])=>{
const nr=hr+dr,nc=hc+dc;
if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&!myRevealed[nr][nc])targets.push([nr,nc]);
});
});
return targets;
}

function endGame(won){
gameActive=false;
const acc=shotCount>0?Math.round(hitCount/shotCount*100):0;
document.getElementById('mTitle').textContent=won?t('win'):t('lose');
document.getElementById('mTitle').style.color=won?'#4ea8ff':'#e94560';
document.getElementById('mScore').textContent=won?'🎉':'💀';
document.getElementById('mSub').textContent=(won?t('wonMsg'):t('lostMsg'))+'\n'+t('accuracy')+': '+acc+'% ('+shotCount+' '+t('shots').toLowerCase()+')';
document.getElementById('modalBg').style.display='flex';
window.TG?.haptic?.(won?'notification':'notification',won?'success':'error');
const score=won?Math.max(0,1000-shotCount*10):0;
window.TG?.save?.('battleship_best',Math.max(score,window.TG?.load?.('battleship_best',0)||0));
}

document.getElementById('mReplay').addEventListener('click',()=>{document.getElementById('modalBg').style.display='none';init()});
document.getElementById('mShare').addEventListener('click',()=>{window.TG?.shareScore?.(Math.max(0,1000-shotCount*10),'Battleship','battleship')});

function init(){
enemyBoard=createBoard();myBoard=createBoard();
enemyRevealed=createRevealed();myRevealed=createRevealed();
enemyShips=placeShips(enemyBoard);myShips=placeShips(myBoard);
shotCount=0;hitCount=0;sunkCount=0;myTurn=true;gameActive=true;
aiHits=[];aiMode='hunt';aiDir=null;
document.getElementById('shots').textContent='0';
document.getElementById('hits').textContent='0';
document.getElementById('sunk').textContent='0';
document.getElementById('msg').textContent='';
document.getElementById('turnInd').textContent=t('yourTurn');
renderGrid(document.getElementById('enemyGrid'),enemyBoard,enemyRevealed,true);
renderGrid(document.getElementById('myGrid'),myBoard,myRevealed,false);
renderFleet(document.getElementById('enemyFleet'),enemyShips);
renderFleet(document.getElementById('myFleet'),myShips);
}
init();
})();
</script>

    <div id="leaderboard" data-lb-slug="battleship" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "battleship";
      const CANDIDATE_OBJECTS = ["I18N"];
      const END_METHODS = ["endGame", "gameOver", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["init", "startGame", "newGame", "restart", "retry", "resetGame", "initGame", "start", "beginGame", "playAgain"];
      const SCORE_KEYS = ["score", "points", "gold", "coins", "wave", "level", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
