<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="google-adsense-account" content="ca-pub-7252382819928130">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7252382819928130" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Bloom Cascade — 개화 연쇄 퍼즐</title>
<meta name="description" content="Play Bloom Cascade — 개화 연쇄 퍼즐 - Free HTML5 browser game on eastsea.monster. No download required.">
<script src="https://killedbyapixel.github.io/LittleJS/dist/littlejs.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f8f0e4; }
  body { font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const BASE_W = 480, BASE_H = 700;
let scale = 1, ox = 0, oy = 0;

function resize() {
  const sw = window.innerWidth, sh = window.innerHeight;
  scale = Math.min(sw / BASE_W, sh / BASE_H);
  canvas.width = sw; canvas.height = sh;
  ox = (sw - BASE_W * scale) / 2;
  oy = (sh - BASE_H * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

// Watercolor palette
const CLIST = [
  { id:0, bud:'#f2c4ce', bloom:'#e87fa8', text:'#c45a7a', glow:'rgba(232,127,168,0.4)', name:'Rose' },
  { id:1, bud:'#b8d4f0', bloom:'#6099e0', text:'#3a6ab0', glow:'rgba(96,153,224,0.4)', name:'Azure' },
  { id:2, bud:'#b8e0c4', bloom:'#5ab880', text:'#2a8050', glow:'rgba(90,184,128,0.4)', name:'Sage' },
];

const GRID_N = 5;
const CELL = 72;
const GRID_X = (BASE_W - GRID_N * CELL) / 2;
const GRID_Y = 170;

// [colorIdx, energyNeeded]
const LEVELS = [
  { taps:10, label:'Easy',
    cells:[[0,2],[1,2],[0,1],[1,2],[0,1],[1,1],[0,2],[1,1],[0,2],[1,1],[0,1],[1,2],[0,2],[1,1],[0,1],[1,2],[0,1],[1,2],[0,1],[1,2],[0,2],[1,1],[0,1],[1,2],[0,2]] },
  { taps:11, label:'Medium',
    cells:[[0,2],[1,2],[2,1],[0,1],[1,2],[2,2],[0,1],[1,1],[2,2],[0,1],[1,2],[2,2],[0,2],[1,1],[2,1],[0,1],[1,2],[2,1],[0,2],[1,1],[2,2],[0,1],[1,2],[2,1],[0,2]] },
  { taps:12, label:'Hard',
    cells:[[2,2],[0,2],[1,2],[2,2],[0,2],[1,2],[2,1],[0,2],[1,2],[2,2],[0,2],[1,2],[2,2],[0,2],[1,1],[2,1],[0,2],[1,1],[2,2],[0,2],[1,2],[2,2],[0,2],[1,2],[2,1]] },
  { taps:13, label:'Expert',
    cells:[[0,3],[1,2],[2,2],[0,2],[1,3],[2,2],[0,2],[1,3],[2,2],[0,3],[1,2],[2,3],[0,2],[1,2],[2,3],[0,3],[1,2],[2,2],[0,2],[1,3],[2,2],[0,3],[1,2],[2,3],[0,2]] },
  { taps:14, label:'Master',
    cells:[[0,3],[1,3],[2,3],[0,2],[1,2],[2,3],[0,3],[1,2],[2,3],[0,3],[1,3],[2,2],[0,3],[1,3],[2,3],[0,2],[1,3],[2,2],[0,3],[1,2],[2,3],[0,3],[1,2],[2,3],[0,2]] },
];

let grid = [], tapsLeft = 0, level = 0, score = 0, gameState = 'title';
let bloomAnims = [], sparkles = [];
let bestLevel = +(localStorage.getItem('bloom-best-lv') || 0);
let bestScore = +(localStorage.getItem('bloom-best-sc') || 0);

function initLevel(lv) {
  const data = LEVELS[lv % LEVELS.length];
  tapsLeft = data.taps;
  bloomAnims = []; sparkles = [];
  score = (gameState === 'play') ? score : 0;
  grid = data.cells.map(([ci, en]) => ({
    color: CLIST[ci], energy: 0, maxEnergy: en,
    bloomed: false, animT: 0, sparkle: 0,
  }));
  gameState = 'play';
}

function propagateBloom(r, c, depth) {
  if (depth > 20) return;
  const cell = grid[r * GRID_N + c];
  if (!cell || !cell.bloomed) return;
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  dirs.forEach(([dr, dc]) => {
    const nr = r + dr, nc = c + dc;
    if (nr < 0 || nr >= GRID_N || nc < 0 || nc >= GRID_N) return;
    const nb = grid[nr * GRID_N + nc];
    if (!nb || nb.bloomed) return;
    if (nb.color.id !== cell.color.id) return;
    nb.energy++;
    nb.sparkle = 0.8;
    addSparkles(GRID_X + nc * CELL + CELL/2, GRID_Y + nr * CELL + CELL/2, nb.color.bloom, 5);
    if (nb.energy >= nb.maxEnergy) {
      nb.bloomed = true;
      nb.animT = 1.2;
      score += 15;
      bloomAnims.push({ r: nr, c: nc, t: 1, color: nb.color });
      setTimeout(() => propagateBloom(nr, nc, depth + 1), 80);
    }
  });
}

function tapCell(r, c) {
  if (gameState !== 'play' || tapsLeft <= 0) return;
  const cell = grid[r * GRID_N + c];
  if (!cell || cell.bloomed) return;
  tapsLeft--;
  cell.energy++;
  cell.sparkle = 1.0;
  addSparkles(GRID_X + c * CELL + CELL/2, GRID_Y + r * CELL + CELL/2, cell.color.bloom, 8);
  if (cell.energy >= cell.maxEnergy) {
    cell.bloomed = true;
    cell.animT = 1.2;
    score += 20;
    bloomAnims.push({ r, c, t: 1, color: cell.color });
    setTimeout(() => propagateBloom(r, c, 0), 50);
  }
  setTimeout(checkWinLose, 200);
}

function checkWinLose() {
  if (grid.every(c => c.bloomed)) {
    gameState = 'win';
    const bonus = tapsLeft * 10;
    score += bonus;
    level++;
    if (level > bestLevel) { bestLevel = level; localStorage.setItem('bloom-best-lv', bestLevel); }
    if (score > bestScore) { bestScore = score; localStorage.setItem('bloom-best-sc', bestScore); }
  } else if (tapsLeft <= 0 && !grid.every(c => c.bloomed)) {
    gameState = 'lose';
  }
}

function addSparkles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 20 + Math.random() * 60;
    sparkles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v, life: 0.5 + Math.random()*0.3, maxLife: 0.8, color, size: 2 + Math.random()*4 });
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  bloomAnims = bloomAnims.filter(a => { a.t -= dt * 1.5; return a.t > 0; });
  sparkles = sparkles.filter(p => {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 80 * dt;
    p.life -= dt; return p.life > 0;
  });
  grid.forEach(c => { if (c.sparkle > 0) c.sparkle -= dt * 2; if (c.animT > 0) c.animT -= dt * 0.9; });

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);

  drawBg();
  if (gameState === 'title') { drawTitle(); }
  else { drawHeader(); drawGrid(); drawSparkles(); drawAnims(); }
  if (gameState === 'win') drawOverlay('win');
  if (gameState === 'lose') drawOverlay('lose');

  ctx.restore();
  requestAnimationFrame(loop);
}

function drawBg() {
  const g = ctx.createLinearGradient(0, 0, BASE_W, BASE_H);
  g.addColorStop(0, '#fdf8f2'); g.addColorStop(0.5, '#f8f0e8'); g.addColorStop(1, '#f0e8dc');
  ctx.fillStyle = g; ctx.fillRect(0, 0, BASE_W, BASE_H);
  // Watercolor blobs
  ctx.globalAlpha = 0.07;
  [[80,120,100,'#e87fa8'],[400,200,120,'#6099e0'],[200,600,110,'#5ab880'],[350,420,70,'#f0c060']].forEach(([bx,by,br,bc]) => {
    ctx.fillStyle = bc; ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawTitle() {
  drawBg();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#7a5a4a';
  ctx.font = 'bold 38px "Segoe UI", Arial';
  ctx.fillText('🌸 Bloom Cascade', BASE_W/2, 180);
  ctx.font = '17px "Segoe UI", Arial';
  ctx.fillStyle = '#9a7a6a';
  ctx.fillText('개화 연쇄 퍼즐', BASE_W/2, 215);

  ctx.font = '14px "Segoe UI", Arial';
  ctx.fillStyle = '#b09080';
  const lines = [
    '꽃봉오리를 탭하면 에너지가 +1 충전됩니다.',
    '에너지가 최대에 달하면 꽃이 개화합니다.',
    '개화 시 같은 색 인접 꽃에 에너지가 전파돼',
    '연쇄 개화가 일어납니다!',
    '',
    '제한된 탭 횟수 안에 모든 꽃을 피워보세요.',
  ];
  lines.forEach((l, i) => ctx.fillText(l, BASE_W/2, 265 + i*24));

  // Legend
  CLIST.forEach((col, i) => {
    const bx = BASE_W/2 - 80 + i * 80;
    ctx.fillStyle = col.bloom;
    ctx.beginPath(); ctx.arc(bx, 440, 16, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = col.text;
    ctx.font = '12px "Segoe UI", Arial';
    ctx.fillText(col.name, bx, 468);
  });

  ctx.fillStyle = '#e87fa8';
  roundRect(BASE_W/2-90, 500, 180, 56, 14);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px "Segoe UI", Arial';
  ctx.fillText('START GAME', BASE_W/2, 534);

  if (bestLevel > 0) {
    ctx.fillStyle = '#b09080';
    ctx.font = '13px "Segoe UI", Arial';
    ctx.fillText(`Best: Level ${bestLevel}  |  Score: ${bestScore}`, BASE_W/2, 590);
  }
}

function drawHeader() {
  const data = LEVELS[level % LEVELS.length];
  ctx.textAlign = 'center';
  ctx.fillStyle = '#7a5a4a';
  ctx.font = 'bold 22px "Segoe UI", Arial';
  ctx.fillText(`🌸 Bloom Cascade`, BASE_W/2, 36);
  ctx.font = '14px "Segoe UI", Arial';
  ctx.fillStyle = '#9a7a6a';
  ctx.fillText(`Level ${level+1} · ${data.label} · Taps: ${tapsLeft} · Score: ${score}`, BASE_W/2, 58);

  const unbloomed = grid.filter(c => !c.bloomed).length;
  const total = grid.length;
  ctx.fillStyle = '#b09080';
  ctx.font = '12px "Segoe UI", Arial';
  ctx.fillText(`Bloomed: ${total - unbloomed}/${total}   Best Lv: ${bestLevel}`, BASE_W/2, 78);

  // Progress bar
  const bw = 300, bx = (BASE_W-bw)/2, by = 88;
  ctx.fillStyle = '#e8d8c8'; roundRect(bx, by, bw, 8, 4); ctx.fill();
  ctx.fillStyle = '#e87fa8'; roundRect(bx, by, bw * ((total-unbloomed)/total), 8, 4); ctx.fill();

  // Color legend
  CLIST.forEach((col, i) => {
    const lx = BASE_W/2 - 70 + i * 70;
    ctx.fillStyle = col.bloom;
    ctx.beginPath(); ctx.arc(lx, 125, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = col.text;
    ctx.font = '11px "Segoe UI", Arial';
    ctx.fillText(col.name, lx + 14, 129);
  });
}

function drawGrid() {
  for (let r = 0; r < GRID_N; r++) {
    for (let c = 0; c < GRID_N; c++) {
      const cell = grid[r * GRID_N + c];
      const x = GRID_X + c * CELL, y = GRID_Y + r * CELL;
      drawCell(cell, x, y);
    }
  }
}

function drawCell(cell, x, y) {
  const cx = x + CELL/2, cy = y + CELL/2;
  const R = CELL * 0.38;

  // Card shadow
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  roundRect(x+6, y+6, CELL-8, CELL-8, 13);
  ctx.fill();

  // Card
  ctx.fillStyle = '#fffaf5';
  ctx.strokeStyle = '#e0d0c0';
  ctx.lineWidth = 1.5;
  roundRect(x+4, y+4, CELL-8, CELL-8, 12);
  ctx.fill(); ctx.stroke();

  if (cell.bloomed) {
    drawBloom(cell, cx, cy, R);
  } else {
    drawBud(cell, cx, cy, R);
  }
}

function drawBud(cell, cx, cy, R) {
  const prog = cell.energy / cell.maxEnergy;

  // Energy ring bg
  ctx.strokeStyle = '#e8d0c4';
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.arc(cx, cy, R - 6, 0, Math.PI * 2); ctx.stroke();

  // Energy ring fill
  ctx.strokeStyle = cell.color.bloom;
  ctx.lineWidth = 5;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.arc(cx, cy, R - 6, -Math.PI/2, -Math.PI/2 + prog * Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Bud body
  const budR = R * 0.38 + prog * R * 0.15;
  if (cell.sparkle > 0) {
    ctx.fillStyle = cell.color.glow;
    ctx.globalAlpha = cell.sparkle * 0.5;
    ctx.beginPath(); ctx.arc(cx, cy, budR + 10, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = cell.color.bud;
  ctx.beginPath(); ctx.arc(cx, cy, budR, 0, Math.PI*2); ctx.fill();

  // Small leaves at bottom
  ctx.fillStyle = '#c8e8c0';
  ctx.globalAlpha = 0.7;
  ctx.beginPath(); ctx.ellipse(cx - 8, cy + budR, 7, 4, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 8, cy + budR, 7, 4, 0.5, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // Energy text
  ctx.fillStyle = cell.color.text;
  ctx.font = `bold 13px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(`${cell.energy}/${cell.maxEnergy}`, cx, cy + 4);
}

function drawBloom(cell, cx, cy, R) {
  const t = Math.max(0, cell.animT);
  const sc = 0.6 + (1.2 - t) * 0.4;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(Math.min(sc, 1.08), Math.min(sc, 1.08));

  // Outer petals
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.fillStyle = cell.color.bloom;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.ellipse(Math.cos(a)*R*0.5, Math.sin(a)*R*0.5, R*0.34, R*0.2, a, 0, Math.PI*2);
    ctx.fill();
  }
  // Inner petals
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + Math.PI/6;
    ctx.fillStyle = cell.color.bud;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.ellipse(Math.cos(a)*R*0.28, Math.sin(a)*R*0.28, R*0.2, R*0.13, a, 0, Math.PI*2);
    ctx.fill();
  }
  // Center
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff7cc';
  ctx.beginPath(); ctx.arc(0, 0, R*0.22, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0c050';
  ctx.beginPath(); ctx.arc(0, 0, R*0.12, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawSparkles() {
  sparkles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawAnims() {
  bloomAnims.forEach(a => {
    const x = GRID_X + a.c * CELL + CELL/2;
    const y = GRID_Y + a.r * CELL + CELL/2;
    ctx.globalAlpha = a.t * 0.5;
    ctx.strokeStyle = a.color.bloom;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(x, y, CELL * (1 - a.t) * 1.2, 0, Math.PI*2); ctx.stroke();
  });
  ctx.globalAlpha = 1;
}

function drawOverlay(type) {
  ctx.fillStyle = 'rgba(255,250,244,0.92)';
  ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.textAlign = 'center';

  if (type === 'win') {
    ctx.fillStyle = '#c45a7a';
    ctx.font = 'bold 46px "Segoe UI", Arial';
    ctx.fillText('🌸 All Bloomed!', BASE_W/2, 240);
    ctx.fillStyle = '#7a5a4a';
    ctx.font = '22px "Segoe UI", Arial';
    ctx.fillText(`Score: ${score}  |  Level: ${level}`, BASE_W/2, 290);
    ctx.font = '16px "Segoe UI", Arial';
    ctx.fillStyle = '#9a7a6a';
    ctx.fillText(`Best Level: ${bestLevel}  ·  Best Score: ${bestScore}`, BASE_W/2, 325);
    ctx.fillStyle = '#e87fa8';
    roundRect(BASE_W/2-90, 370, 180, 54, 14);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px "Segoe UI", Arial';
    ctx.fillText('Next Level →', BASE_W/2, 403);
    ctx.fillStyle = '#b09080';
    roundRect(BASE_W/2-70, 438, 140, 44, 10);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '15px "Segoe UI", Arial';
    ctx.fillText('Back to Title', BASE_W/2, 465);
  } else {
    ctx.fillStyle = '#5a7a9a';
    ctx.font = 'bold 40px "Segoe UI", Arial';
    ctx.fillText('🥀 Out of Taps', BASE_W/2, 240);
    const bloomed = grid.filter(c => c.bloomed).length;
    ctx.fillStyle = '#7a5a4a';
    ctx.font = '20px "Segoe UI", Arial';
    ctx.fillText(`Bloomed: ${bloomed}/${grid.length}  ·  Score: ${score}`, BASE_W/2, 290);
    ctx.fillStyle = '#6099e0';
    roundRect(BASE_W/2-80, 340, 160, 52, 14);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px "Segoe UI", Arial';
    ctx.fillText('Try Again', BASE_W/2, 372);
    ctx.fillStyle = '#b09080';
    roundRect(BASE_W/2-70, 406, 140, 44, 10);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '15px "Segoe UI", Arial';
    ctx.fillText('Back to Title', BASE_W/2, 433);
  }
}

function getGP(clientX, clientY) {
  return { x: (clientX - ox) / scale, y: (clientY - oy) / scale };
}

function handleClick(gx, gy) {
  if (gameState === 'title') {
    if (gx > BASE_W/2-90 && gx < BASE_W/2+90 && gy > 500 && gy < 556) {
      level = 0; score = 0; initLevel(level);
    }
    return;
  }
  if (gameState === 'win') {
    if (gx > BASE_W/2-90 && gx < BASE_W/2+90 && gy > 370 && gy < 424) {
      initLevel(level);
    } else if (gx > BASE_W/2-70 && gx < BASE_W/2+70 && gy > 438 && gy < 482) {
      gameState = 'title'; score = 0;
    }
    return;
  }
  if (gameState === 'lose') {
    if (gx > BASE_W/2-80 && gx < BASE_W/2+80 && gy > 340 && gy < 392) {
      initLevel(level);
    } else if (gx > BASE_W/2-70 && gx < BASE_W/2+70 && gy > 406 && gy < 450) {
      gameState = 'title'; score = 0;
    }
    return;
  }
  const c = Math.floor((gx - GRID_X) / CELL);
  const r = Math.floor((gy - GRID_Y) / CELL);
  if (r >= 0 && r < GRID_N && c >= 0 && c < GRID_N) tapCell(r, c);
}

canvas.addEventListener('click', e => { const p = getGP(e.clientX, e.clientY); handleClick(p.x, p.y); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0], p = getGP(t.clientX, t.clientY);
  handleClick(p.x, p.y);
}, { passive: false });

requestAnimationFrame(ts => { lastTime = ts; loop(ts); });
</script>
