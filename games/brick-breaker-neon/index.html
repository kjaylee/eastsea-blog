<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Brick Breaker Neon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;
     min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;touch-action:none}
canvas{display:block;cursor:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const CV=document.getElementById('c');
const cx=CV.getContext('2d');
const W=480,H=640;
let scale=1;

function resize(){
  scale=Math.min(innerWidth/W,innerHeight/H);
  CV.width=W;CV.height=H;
  CV.style.width=W*scale+'px';CV.style.height=H*scale+'px';
}
window.addEventListener('resize',resize);resize();

// ─── Audio ──────────────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,type,dur,vol,t0=0){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=f;
  const at=AC.currentTime+t0;
  g.gain.setValueAtTime(vol,at);
  g.gain.exponentialRampToValueAtTime(0.0001,at+dur);
  o.start(at);o.stop(at+dur+0.05);
}
const snd={
  paddle:()=>tone(220,'sine',0.08,0.3),
  wall:  ()=>tone(160,'square',0.06,0.2),
  death: ()=>{tone(80,'sawtooth',0.5,0.4);tone(55,'sawtooth',0.7,0.4,0.3);},
  brick: (tier)=>{const f=[800,500,320][tier-1];tone(f,'sine',0.12,0.35);tone(f*1.5,'sine',0.08,0.2,0.05);},
  pwrup: ()=>{tone(440,'sine',0.1,0.3);tone(550,'sine',0.1,0.3,0.1);tone(660,'sine',0.15,0.3,0.2);},
  fanfare:()=>{[440,550,660,880].forEach((f,i)=>tone(f,'sine',0.2,0.4,i*0.15));
               [880,1100].forEach((f,i)=>tone(f,'triangle',0.3,0.5,0.6+i*0.2));}
};

// ─── Constants ──────────────────────────────────────────────────────────
const ST={START:0,PLAY:1,LCLEAR:2,GAMEOVER:3,VICTORY:4};
const BW=50,BH=18,BCOLS=8,BROWS=5,BOX=15,BOY=80;
const BCLR=['#00ffff','#ff00ff','#ffd700'];
const LAYOUTS=[
  [[1,1,1,1,1,1,1,1],[1,2,1,1,1,1,2,1],[2,2,2,2,2,2,2,2],[1,2,3,2,2,3,2,1],[1,1,1,3,3,1,1,1]],
  [[3,2,1,2,2,1,2,3],[2,3,2,1,1,2,3,2],[1,2,3,2,2,3,2,1],[2,1,2,3,3,2,1,2],[3,2,1,2,2,1,2,3]],
  [[3,3,3,3,3,3,3,3],[3,2,2,2,2,2,2,3],[3,2,1,1,1,1,2,3],[3,2,2,2,2,2,2,3],[3,3,3,3,3,3,3,3]]
];

// ─── State ──────────────────────────────────────────────────────────────
let state=ST.START,level=1,lives=3,score=0;
let bestScore=+localStorage.getItem('bnBest')||0;
let frame=0;

// Paddle
const PAD={x:200,y:H-40,w:80,h:12,wide:0};
let mouseX=W/2;

// Collections
let balls=[],bricks=[],pwrups=[],parts=[];

// ─── Init ────────────────────────────────────────────────────────────────
function mkBall(x,y,vx,vy){return{x,y,vx,vy,r:7,fire:false,trail:[]};}
function mkBrick(x,y,tier){return{x,y,w:BW,h:BH,tier,max:tier,alive:true,flash:0};}
function mkPart(x,y,col){
  const a=Math.random()*Math.PI*2,s=1+Math.random()*3.5;
  return{x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,col,alpha:1,life:0,max:30+Math.random()*25};
}

function buildBricks(lv){
  bricks=[];
  const lay=LAYOUTS[(lv-1)%3];
  for(let r=0;r<BROWS;r++)
    for(let c=0;c<BCOLS;c++){
      const t=lay[r][c];
      if(t>0)bricks.push(mkBrick(BOX+c*(BW+4),BOY+r*(BH+6),t));
    }
}

function launchBall(){
  const spd=3.8+level*0.35;
  const ang=-Math.PI/2+(Math.random()-0.5)*0.5;
  balls.push(mkBall(PAD.x+PAD.w/2,PAD.y-10,Math.cos(ang)*spd,Math.sin(ang)*spd));
}

function startGame(){
  level=1;lives=3;score=0;
  PAD.w=80;PAD.x=W/2-40;PAD.wide=0;
  balls=[];bricks=[];pwrups=[];parts=[];
  buildBricks(level);
  state=ST.PLAY;
  launchBall();
}

function nextLevel(){
  level++;
  if(level>3){state=ST.VICTORY;snd.fanfare();return;}
  PAD.w=80;PAD.wide=0;
  balls=[];pwrups=[];parts=[];
  buildBricks(level);
  state=ST.PLAY;
  launchBall();
}

// ─── Input ───────────────────────────────────────────────────────────────
function resume(){if(AC.state==='suspended')AC.resume();}
function click(){
  resume();
  if(state===ST.START)startGame();
  else if(state===ST.LCLEAR)nextLevel();
  else if(state===ST.GAMEOVER||state===ST.VICTORY){state=ST.START;}
  else if(state===ST.PLAY&&balls.length===0)launchBall();
}
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;resume();if(e.code==='Space'||e.code==='Enter')click();});
window.addEventListener('keyup',e=>keys[e.code]=false);
CV.addEventListener('mousemove',e=>{const r=CV.getBoundingClientRect();mouseX=(e.clientX-r.left)/scale;});
CV.addEventListener('click',click);
CV.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=CV.getBoundingClientRect();mouseX=(e.touches[0].clientX-r.left)/scale;
},{passive:false});
CV.addEventListener('touchstart',e=>{e.preventDefault();resume();click();},{passive:false});

// ─── Helpers ─────────────────────────────────────────────────────────────
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function burst(x,y,col,n=12){for(let i=0;i<n;i++)parts.push(mkPart(x,y,col));}

// ─── Update ───────────────────────────────────────────────────────────────
function update(){
  frame++;

  // Paddle
  if(keys['ArrowLeft'])mouseX-=5;
  if(keys['ArrowRight'])mouseX+=5;
  const tx=clamp(mouseX-PAD.w/2,0,W-PAD.w);
  PAD.x+=(tx-PAD.x)*0.25;
  if(PAD.wide>0){PAD.wide--;if(PAD.wide===0)PAD.w=80;}

  // Balls
  for(let bi=balls.length-1;bi>=0;bi--){
    const b=balls[bi];
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>10)b.trail.shift();
    b.x+=b.vx;b.y+=b.vy;

    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);snd.wall();}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx);snd.wall();}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy);snd.wall();}

    // Paddle
    if(b.vy>0&&b.x>PAD.x&&b.x<PAD.x+PAD.w&&b.y+b.r>PAD.y&&b.y-b.r<PAD.y+PAD.h){
      const hit=(b.x-(PAD.x+PAD.w/2))/(PAD.w/2);
      const spd=Math.hypot(b.vx,b.vy);
      const ang=-Math.PI/2+hit*(Math.PI/3);
      b.vx=Math.cos(ang)*spd;b.vy=Math.sin(ang)*spd;
      b.y=PAD.y-b.r;snd.paddle();
      burst(b.x,PAD.y,'#00ffff',5);
    }

    // Death
    if(b.y-b.r>H){
      balls.splice(bi,1);
      if(balls.length===0){
        lives--;snd.death();burst(W/2,H/2,'#ff2255',20);
        if(lives<=0){
          if(score>bestScore){bestScore=score;localStorage.setItem('bnBest',bestScore);}
          state=ST.GAMEOVER;
        }
      }
      continue;
    }

    // Bricks
    for(let i=bricks.length-1;i>=0;i--){
      const k=bricks[i];
      if(!k.alive)continue;
      const cx2=clamp(b.x,k.x,k.x+k.w)-b.x;
      const cy2=clamp(b.y,k.y,k.y+k.h)-b.y;
      if(cx2*cx2+cy2*cy2>=b.r*b.r)continue;
      k.flash=15;
      if(!b.fire){
        const ox=b.r-Math.abs(cx2),oy=b.r-Math.abs(cy2);
        if(ox<oy)b.vx=-b.vx;else b.vy=-b.vy;
      }
      k.tier--;score+=([10,20,30])[k.max-1];snd.brick(k.max);
      if(k.tier<=0){
        k.alive=false;
        const col=BCLR[k.max-1];
        burst(k.x+k.w/2,k.y+k.h/2,col,14);
        if(Math.random()<0.15){
          const types=['wide','multi','fire'],colors=['#00ff88','#ff8800','#ff2200'];
          const ti=Math.floor(Math.random()*3);
          pwrups.push({x:k.x+k.w/2,y:k.y,vy:2,w:18,h:10,type:types[ti],color:colors[ti],alive:true});
        }
      }
      if(b.fire)break;
    }
  }

  // Power-ups
  for(let i=pwrups.length-1;i>=0;i--){
    const p=pwrups[i];
    if(!p.alive){pwrups.splice(i,1);continue;}
    p.y+=p.vy;
    if(p.y>H){pwrups.splice(i,1);continue;}
    if(p.y+p.h>PAD.y&&p.y<PAD.y+PAD.h&&p.x>PAD.x-p.w&&p.x<PAD.x+PAD.w+p.w){
      snd.pwrup();burst(p.x,p.y,p.color,10);
      if(p.type==='wide'){PAD.w=clamp(PAD.w*1.5,80,160);PAD.wide=600;}
      else if(p.type==='multi'){
        const src=balls[0]||{x:PAD.x+PAD.w/2,y:PAD.y-10,vx:0,vy:-4};
        const spd=Math.hypot(src.vx,src.vy)||4;
        [-0.45,0.45].forEach(da=>{
          const a=Math.atan2(src.vy,src.vx)+da;
          balls.push(mkBall(src.x,src.y,Math.cos(a)*spd,Math.sin(a)*spd));
        });
      }
      else if(p.type==='fire'){
        balls.forEach(b=>b.fire=true);
        setTimeout(()=>balls.forEach(b=>b.fire=false),8000);
      }
      p.alive=false;
    }
  }

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life++;
    p.alpha=1-p.life/p.max;
    if(p.life>=p.max)parts.splice(i,1);
  }

  // Level clear
  if(state===ST.PLAY&&bricks.every(b=>!b.alive)){
    if(score>bestScore){bestScore=score;localStorage.setItem('bnBest',bestScore);}
    snd.fanfare();
    state=ST.LCLEAR;
  }
}

// ─── Draw ─────────────────────────────────────────────────────────────────
function glowRect(x,y,w,h,col,blur=15){
  cx.save();cx.shadowBlur=blur;cx.shadowColor=col;cx.fillStyle=col;
  cx.fillRect(x,y,w,h);cx.restore();
}

function drawHUD(){
  cx.save();cx.shadowBlur=8;cx.shadowColor='#00ffff';
  cx.fillStyle='#00ffff';cx.font='bold 13px Courier New';
  cx.textAlign='left';
  cx.fillText('SCORE: '+score,10,20);
  cx.fillText('BEST: '+bestScore,10,37);
  cx.textAlign='center';cx.fillText('LEVEL '+level,W/2,20);
  cx.textAlign='right';cx.fillStyle='#ff2255';cx.shadowColor='#ff2255';
  cx.font='15px serif';
  for(let i=0;i<lives;i++)cx.fillText('♥',W-12-i*20,20);
  cx.restore();
}

function drawBricks(){
  for(const k of bricks){
    if(!k.alive)continue;
    const col=BCLR[k.max-1];
    const glow=k.flash>0?28:10;if(k.flash>0)k.flash--;
    cx.save();cx.shadowBlur=glow;cx.shadowColor=col;
    const g=cx.createLinearGradient(k.x,k.y,k.x,k.y+k.h);
    g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0.6)');
    cx.fillStyle=g;cx.fillRect(k.x,k.y,k.w,k.h);
    if(k.tier<k.max){cx.fillStyle='rgba(0,0,0,'+(0.45*(1-k.tier/k.max))+')';cx.fillRect(k.x,k.y,k.w,k.h);}
    cx.strokeStyle=col;cx.lineWidth=1;cx.strokeRect(k.x+.5,k.y+.5,k.w-1,k.h-1);
    cx.fillStyle='rgba(255,255,255,0.7)';
    for(let t=0;t<k.tier;t++){cx.beginPath();cx.arc(k.x+8+t*8,k.y+k.h/2,2,0,Math.PI*2);cx.fill();}
    cx.restore();
  }
}

function drawPaddle(){
  const col=PAD.wide>0?'#00ff88':'#00ffff';
  cx.save();cx.shadowBlur=20;cx.shadowColor=col;
  const g=cx.createLinearGradient(PAD.x,PAD.y,PAD.x+PAD.w,PAD.y);
  g.addColorStop(0,'rgba(0,255,255,0.35)');g.addColorStop(0.5,col);g.addColorStop(1,'rgba(0,255,255,0.35)');
  cx.fillStyle=g;
  cx.beginPath();cx.roundRect(PAD.x,PAD.y,PAD.w,PAD.h,5);cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.8)';cx.lineWidth=1;
  cx.strokeRect(PAD.x+.5,PAD.y+.5,PAD.w-1,PAD.h-1);
  cx.restore();
}

function drawBalls(){
  for(const b of balls){
    const fcol=b.fire?'#ff6600':'#ffffff';
    const fglow=b.fire?'#ff4400':'#88ddff';
    for(let t=0;t<b.trail.length;t++){
      const pt=b.trail[t],a=(t/b.trail.length)*0.4,r=b.r*(t/b.trail.length)*0.8;
      cx.save();cx.globalAlpha=a;cx.shadowBlur=6;cx.shadowColor=fcol;
      cx.fillStyle=fcol;cx.beginPath();cx.arc(pt.x,pt.y,r,0,Math.PI*2);cx.fill();cx.restore();
    }
    cx.save();cx.shadowBlur=b.fire?25:15;cx.shadowColor=fglow;
    const g=cx.createRadialGradient(b.x-2,b.y-2,0,b.x,b.y,b.r);
    g.addColorStop(0,'white');g.addColorStop(0.4,fcol);g.addColorStop(1,b.fire?'#ff0000':'#0088ff');
    cx.fillStyle=g;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.restore();
  }
}

function drawPwrups(){
  for(const p of pwrups){
    if(!p.alive)continue;
    cx.save();cx.shadowBlur=12;cx.shadowColor=p.color;cx.fillStyle=p.color;
    cx.fillRect(p.x-p.w/2,p.y,p.w,p.h);
    cx.fillStyle='#fff';cx.font='bold 8px Courier New';cx.textAlign='center';
    cx.fillText({wide:'W',multi:'M',fire:'F'}[p.type],p.x,p.y+p.h-1);
    cx.restore();
  }
}

function drawParts(){
  for(const p of parts){
    cx.save();cx.globalAlpha=p.alpha;cx.shadowBlur=5;cx.shadowColor=p.col;
    cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.r*p.alpha,0,Math.PI*2);cx.fill();cx.restore();
  }
}

function crtLines(){
  cx.save();cx.globalAlpha=0.03;cx.strokeStyle='#fff';cx.lineWidth=1;
  for(let y=0;y<H;y+=4){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  cx.restore();
}

function overlay(title,l1,l2,l3){
  cx.save();cx.fillStyle='rgba(0,0,0,0.78)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.shadowBlur=30;cx.shadowColor='#00ffff';cx.fillStyle='#00ffff';
  cx.font='bold 40px Courier New';cx.fillText(title,W/2,H/2-65);
  cx.shadowColor='#ff00ff';cx.fillStyle='#ff00ff';cx.font='bold 18px Courier New';
  if(l1)cx.fillText(l1,W/2,H/2);
  cx.shadowColor='#ffd700';cx.fillStyle='#ffd700';cx.font='16px Courier New';
  if(l2)cx.fillText(l2,W/2,H/2+32);
  cx.shadowBlur=0;cx.fillStyle='#888';cx.font='13px Courier New';
  if(l3)cx.fillText(l3,W/2,H/2+64);
  cx.restore();
}

function drawStart(){
  // Animated bricks bg
  cx.save();
  for(let r=0;r<5;r++) for(let c=0;c<8;c++){
    const col=BCLR[(r+c)%3],p=0.5+0.5*Math.sin(frame*0.025+r*0.7+c*0.5);
    cx.globalAlpha=0.12+0.1*p;cx.shadowBlur=8*p;cx.shadowColor=col;cx.fillStyle=col;
    cx.fillRect(BOX+c*(BW+4),BOY+r*(BH+6),BW,BH);
  }
  cx.restore();
  cx.save();cx.textAlign='center';
  const p=0.8+0.2*Math.sin(frame*0.05);
  cx.shadowBlur=30*p;cx.shadowColor='#00ffff';cx.fillStyle='#00ffff';
  cx.font='bold 40px Courier New';cx.fillText('BRICK',W/2,H/2-95);
  cx.shadowColor='#ff00ff';cx.fillStyle='#ff00ff';cx.fillText('BREAKER',W/2,H/2-50);
  cx.shadowColor='#ffd700';cx.fillStyle='#ffd700';cx.font='bold 28px Courier New';cx.fillText('N E O N',W/2,H/2-8);
  cx.fillStyle='#aaa';cx.shadowBlur=0;cx.font='13px Courier New';cx.fillText('BEST: '+bestScore,W/2,H/2+20);
  if(Math.floor(frame/30)%2===0){
    cx.shadowBlur=10;cx.shadowColor='#00ffff';cx.fillStyle='#00ffff';cx.font='bold 14px Courier New';
    cx.fillText('[ CLICK / TAP / SPACE ]',W/2,H/2+60);
  }
  cx.fillStyle='#444';cx.font='11px Courier New';
  cx.fillText('♥♥♥  3 LIVES   3 LEVELS   POWER-UPS',W/2,H-30);
  cx.restore();
}

function draw(){
  cx.fillStyle='#050510';cx.fillRect(0,0,W,H);
  crtLines();
  if(state===ST.START){
    drawStart();
  } else if(state===ST.PLAY){
    drawBricks();drawPaddle();drawBalls();drawPwrups();drawParts();drawHUD();
    if(balls.length===0&&Math.floor(frame/20)%2===0){
      cx.save();cx.textAlign='center';cx.fillStyle='rgba(255,255,255,0.75)';cx.font='13px Courier New';
      cx.fillText('CLICK / SPACE to launch',W/2,H/2);cx.restore();
    }
  } else if(state===ST.LCLEAR){
    drawBricks();drawParts();drawHUD();
    const msg=level<3?'NEXT LEVEL INCOMING...':'FINAL STAGE CLEARED!';
    overlay('LEVEL '+level,'CLEAR!','SCORE: '+score,msg+' [ CLICK ]');
  } else if(state===ST.GAMEOVER){
    drawParts();
    overlay('GAME','OVER','SCORE: '+score+'  |  BEST: '+bestScore,'[ CLICK TO RETRY ]');
  } else if(state===ST.VICTORY){
    cx.save();cx.globalAlpha=0.1;cx.fillStyle='hsl('+(frame*3%360)+',100%,50%)';cx.fillRect(0,0,W,H);cx.restore();
    drawParts();
    overlay('★ VICTORY ★','ALL LEVELS CLEARED!','SCORE: '+score+'  |  BEST: '+bestScore,'[ CLICK TO PLAY AGAIN ]');
  }
}

function loop(){
  if(state===ST.PLAY)update();else frame++;
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
