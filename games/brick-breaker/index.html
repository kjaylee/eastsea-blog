  <div id="gameContainer">

  <script>
  (function(){
    'use strict';
    const T = (typeof GameI18n === 'function') ? GameI18n({}) : s=>s;

    // ═══════════════ CANVAS SETUP ═══════════════
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GW = 400, GH = 533;
    canvas.width = GW; canvas.height = GH;

    // ═══════════════ ASSET LOADER ═══════════════
    const IMG = {};
    const imgList = [
      'paddle','paddle_wide','ball','ball_fire',
      'brick_red','brick_red_hard','brick_yellow','brick_yellow_hard',
      'brick_green','brick_green_hard','brick_blue','brick_blue_hard',
      'brick_purple','brick_purple_hard','brick_explosive','brick_metal',
      'powerup_paddle','powerup_fire','powerup_multi','powerup_shield','powerup_slow',
      'particle_star','particle_spark','particle_glow',
      'sound_on','sound_off','heart','heart_empty','bg','logo','shield_line'
    ];
    let imgLoaded = 0;
    function loadImages(){
      return new Promise(resolve=>{
        if(imgList.length===0){ resolve(); return; }
        imgList.forEach(name=>{
          const img = new Image();
          img.onload = ()=>{ imgLoaded++; if(imgLoaded>=imgList.length) resolve(); };
          img.onerror = ()=>{ console.warn('Failed to load:',name); imgLoaded++; if(imgLoaded>=imgList.length) resolve(); };
          img.src = 'assets/img/'+name+'.png';
          IMG[name] = img;
        });
      });
    }

    // ═══════════════ SOUND SETUP ═══════════════
    const sm = new SoundManager();
    function loadAudio(){
      sm.loadBGM('main','assets/audio/bgm.wav');
      ['hit','break','paddle','wall','powerup','explosion','levelclear','gameover','combo'].forEach(n=>{
        sm.loadSFX(n,'assets/audio/'+n+'.wav');
      });
    }

    // ═══════════════ JUICE & PARTICLES ═══════════════
    const juice = new Juice();
    const ps = new ParticleSystem(ctx);

    // ═══════════════ CONSTANTS ═══════════════
    const PAD_H = 15, PAD_W = 80, BALL_R = 8;
    const BK_ROWS = 5, BK_COLS = 8, BK_W = 45, BK_H = 18, BK_PAD = 4;
    const BK_TOP = 60, BK_LEFT = 12;

    const BRICK_NAMES = ['red','yellow','green','blue','purple'];
    const POWERUP_MAP = {
      LONG_PADDLE:{ img:'powerup_paddle', color:'#00d9ff', dur:15000 },
      FIRE_BALL:  { img:'powerup_fire',   color:'#ff6b35', dur:10000 },
      MULTI_BALL: { img:'powerup_multi',  color:'#ffd700', instant:true },
      SHIELD:     { img:'powerup_shield', color:'#7fff00', instant:true },
      SLOW:       { img:'powerup_slow',   color:'#da70d6', dur:8000 }
    };
    const PU_KEYS = Object.keys(POWERUP_MAP);

    // ═══════════════ STATE ═══════════════
    let S = resetState();
    function resetState(){
      const storedHi = parseInt(localStorage.getItem('bbHighScore') || '0', 10);
      return {
        score:0, hiScore:Number.isFinite(storedHi) ? storedHi : 0,
        level:1, lives:3,
        pad:{ x:GW/2-PAD_W/2, w:PAD_W },
        balls:[], bricks:[], powerups:[], activePU:{},
        hasShield:false, running:false, combo:0,
        comboTimer:0, lastTime:0
      };
    }

    // ═══════════════ BRICK INIT ═══════════════
    function initBricks(){
      S.bricks = [];
      const rows = Math.min(BK_ROWS + Math.floor(S.level/3), 8);
      const hardR = Math.min(0.1+S.level*0.02, 0.4);
      const exploR = Math.min(0.05+S.level*0.01, 0.15);
      for(let r=0;r<rows;r++){
        for(let c=0;c<BK_COLS;c++){
          const rnd = Math.random();
          let type='normal', hp=1;
          if(rnd<hardR){ type='hard'; hp=2; }
          else if(rnd<hardR+exploR){ type='explosive'; }
          const colorIdx = r % 5;
          S.bricks.push({
            x: BK_LEFT+c*(BK_W+BK_PAD), y: BK_TOP+r*(BK_H+BK_PAD),
            type, hp, maxHp:hp, colorIdx,
            colorName: BRICK_NAMES[colorIdx],
            shake:0 // hit animation
          });
        }
      }
    }

    function makeBall(){
      const spd = 5+S.level*0.3;
      const ang = -Math.PI/4 - Math.random()*Math.PI/2;
      return { x:GW/2, y:GH-100, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, speed:spd, fire:false };
    }

    // ═══════════════ UI ═══════════════
    function updateLives(){
      const el = document.getElementById('livesDisplay');
      el.innerHTML = '';
      for(let i=0;i<3;i++){
        const img = document.createElement('img');
        img.src = i<S.lives ? 'assets/img/heart.png' : 'assets/img/heart_empty.png';
        img.alt = i<S.lives?'♥':'♡';
        el.appendChild(img);
      }
    }
    function updateUI(){
      document.getElementById('scoreDisplay').textContent = S.score;
      document.getElementById('levelDisplay').textContent = 'Lv '+S.level;
      updateLives();
      // Powerup bar
      const bar = document.getElementById('powerupBar');
      bar.innerHTML = '';
      for(const[k,end] of Object.entries(S.activePU)){
        const rem = Math.ceil((end-Date.now())/1000);
        if(rem<=0) continue;
        const info = POWERUP_MAP[k];
        const badge = document.createElement('div');
        badge.className='pu-badge';
        badge.style.background=info.color;
        badge.innerHTML = `<img src="assets/img/${info.img}.png" alt=""> ${rem}s`;
        bar.appendChild(badge);
      }
      if(S.hasShield){
        const badge = document.createElement('div');
        badge.className='pu-badge';
        badge.style.background='#7fff00';
        badge.innerHTML = `<img src="assets/img/powerup_shield.png" alt=""> ON`;
        bar.appendChild(badge);
      }
    }

    function showCombo(n){
      const el = document.getElementById('comboDisplay');
      el.textContent = n+'x COMBO!';
      el.classList.add('show');
      S.comboTimer = 60;
    }

    // ═══════════════ SOUND TOGGLE ═══════════════
    let soundOn = true;
    document.getElementById('soundBtn').addEventListener('click', ()=>{
      soundOn = !soundOn;
      sm.setMute('master', !soundOn);
      document.querySelector('#soundBtn img').src = soundOn ? 'assets/img/sound_on.png' : 'assets/img/sound_off.png';
    });

    // ═══════════════ GAME FLOW ═══════════════
    function startGame(){
      if (S.running) return;
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('lvlClearScreen').classList.add('hidden');
      S = resetState();
      S.balls = [makeBall()];
      initBricks();
      updateUI();
      S.running = true;
      S.lastTime = performance.now();
      sm.playBGM('main',{loop:true, fade:500});
      juice.reset();
      ps.clear();
      requestAnimationFrame(loop);
    }

    function nextLevel(){
      document.getElementById('lvlClearScreen').classList.add('hidden');
      S.level++;
      S.score += 1000;
      S.balls = [makeBall()];
      S.powerups = [];
      S.activePU = {};
      S.hasShield = false;
      S.pad.w = PAD_W;
      S.combo = 0;
      initBricks();
      updateUI();
      S.running = true;
      S.lastTime = performance.now();
      juice.reset();
      requestAnimationFrame(loop);
    }

    function gameOver(){
      S.running = false;
      sm.playSFX('gameover');
      sm.stopBGM(800);
      if(S.score > S.hiScore){
        S.hiScore = S.score;
        localStorage.setItem('bbHighScore', S.hiScore);
      }
      document.getElementById('goScore').textContent = S.score;
      document.getElementById('goLevel').textContent = S.level;
      document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    function levelClear(){
      S.running = false;
      sm.playSFX('levelclear');
      juice.flash('#FFFFFF', 200);
      ps.burst(GW/2, GH/2, 'confetti', {count:50});
      document.getElementById('lvlClearScreen').classList.remove('hidden');
    }

    // Button bindings
    document.getElementById('btnStart').addEventListener('click', startGame);
    document.getElementById('btnRetry').addEventListener('click', startGame);
    document.getElementById('btnNext').addEventListener('click', nextLevel);

    // ═══════════════ POWERUPS ═══════════════
    function spawnPU(x,y){
      if(Math.random()>0.15) return;
      const type = PU_KEYS[Math.floor(Math.random()*PU_KEYS.length)];
      S.powerups.push({ x, y, type, vy:2 });
    }

    function activatePU(type){
      sm.playSFX('powerup');
      juice.flash(POWERUP_MAP[type].color, 80);
      const info = POWERUP_MAP[type];
      switch(type){
        case'LONG_PADDLE':
          S.pad.w=PAD_W*1.8;
          S.activePU[type]=Date.now()+info.dur;
          break;
        case'FIRE_BALL':
          S.balls.forEach(b=>b.fire=true);
          S.activePU[type]=Date.now()+info.dur;
          break;
        case'MULTI_BALL':
          const nb=[];
          S.balls.forEach(b=>{
            for(let i=0;i<2;i++){
              const a=Math.atan2(b.vy,b.vx)+(i===0?0.3:-0.3);
              nb.push({...b, x:b.x, y:b.y, vx:Math.cos(a)*b.speed, vy:Math.sin(a)*b.speed});
            }
          });
          S.balls.push(...nb);
          break;
        case'SHIELD':
          S.hasShield=true;
          break;
        case'SLOW':
          S.balls.forEach(b=>{ b.vx*=0.6; b.vy*=0.6; b.speed*=0.6; });
          S.activePU[type]=Date.now()+info.dur;
          break;
      }
    }

    function checkPUExpiry(){
      const now=Date.now();
      if(S.activePU.LONG_PADDLE && now>S.activePU.LONG_PADDLE){
        S.pad.w=PAD_W; delete S.activePU.LONG_PADDLE;
      }
      if(S.activePU.FIRE_BALL && now>S.activePU.FIRE_BALL){
        S.balls.forEach(b=>b.fire=false); delete S.activePU.FIRE_BALL;
      }
      if(S.activePU.SLOW && now>S.activePU.SLOW){
        S.balls.forEach(b=>{ b.vx/=0.6; b.vy/=0.6; b.speed/=0.6; });
        delete S.activePU.SLOW;
      }
    }

    // ═══════════════ BRICK DESTROY ═══════════════
    function destroyBrick(brick, idx){
      const pts = brick.type==='hard'?30:brick.type==='explosive'?20:10;
      S.score += Math.floor(pts*(1+S.combo*0.1));
      S.combo++;

      if(S.combo>=3){
        showCombo(S.combo);
        sm.playSFX('combo',{rate:1+S.combo*0.05});
      }

      sm.playSFX('break');
      const cx=brick.x+BK_W/2, cy=brick.y+BK_H/2;
      ps.burst(cx, cy, 'explosion', {count:12});
      ps.textPop(cx, cy-10, '+'+pts, {color:'#ffd93d', size:16});
      spawnPU(cx, cy);
      juice.shake(4, 100);

      S.bricks.splice(idx,1);

      // Explosive chain
      if(brick.type==='explosive'){
        sm.playSFX('explosion');
        juice.shake(10, 200);
        juice.flash('#ff4757', 120);
        ps.burst(cx, cy, 'explosion', {count:25, colors:['#ff4757','#ff8800','#ffcc00']});
        const nearby = S.bricks.filter(b=>
          Math.abs(b.x-brick.x)<BK_W*2 && Math.abs(b.y-brick.y)<BK_H*2
        );
        nearby.forEach(b=>{
          b.hp--;
          if(b.hp<=0){
            const ni=S.bricks.indexOf(b);
            if(ni>-1){
              S.score+=10;
              ps.burst(b.x+BK_W/2, b.y+BK_H/2, 'explosion', {count:8});
              S.bricks.splice(ni,1);
            }
          } else {
            b.shake = 5;
          }
        });
      }
    }

    // ═══════════════ UPDATE ═══════════════
    function update(dt){
      if(!S.running) return;

      const jdt = juice.update(dt);
      ps.update(dt);
      checkPUExpiry();

      // Combo display fade
      if(S.comboTimer>0){
        S.comboTimer--;
        if(S.comboTimer<=0) document.getElementById('comboDisplay').classList.remove('show');
      }

      // Brick shake decay
      S.bricks.forEach(b=>{ if(b.shake>0) b.shake*=0.85; });

      // Balls
      for(let i=S.balls.length-1;i>=0;i--){
        const ball=S.balls[i];
        ball.x+=ball.vx; ball.y+=ball.vy;

        // Wall collision
        if(ball.x-BALL_R<0||ball.x+BALL_R>GW){
          ball.vx*=-1;
          ball.x=Math.max(BALL_R, Math.min(GW-BALL_R, ball.x));
          sm.playSFX('wall');
        }
        if(ball.y-BALL_R<0){
          ball.vy*=-1; ball.y=BALL_R;
          sm.playSFX('wall');
        }

        // Paddle collision
        if(ball.y+BALL_R>GH-30 && ball.y+BALL_R<GH-15 &&
           ball.x>S.pad.x && ball.x<S.pad.x+S.pad.w && ball.vy>0){
          const hit=(ball.x-S.pad.x)/S.pad.w;
          const ang=(hit-0.5)*Math.PI*0.7-Math.PI/2;
          ball.vx=Math.cos(ang)*ball.speed;
          ball.vy=Math.sin(ang)*ball.speed;
          S.combo=0;
          sm.playSFX('paddle');
          ps.burst(ball.x, GH-30, 'hit', {count:4, colors:['#00d9ff','#FFFFFF']});
          juice.shake(2, 50);
        }

        // Bottom
        if(ball.y+BALL_R>GH){
          if(S.hasShield){
            ball.vy*=-1; ball.y=GH-BALL_R;
            S.hasShield=false;
            ps.burst(ball.x, GH, 'sparkle', {count:15, colors:['#7fff00','#FFFFFF']});
            sm.playSFX('hit');
          } else {
            S.balls.splice(i,1);
          }
        }

        // Brick collision
        for(let j=S.bricks.length-1;j>=0;j--){
          const bk=S.bricks[j];
          if(ball.x+BALL_R>bk.x && ball.x-BALL_R<bk.x+BK_W &&
             ball.y+BALL_R>bk.y && ball.y-BALL_R<bk.y+BK_H){
            if(!ball.fire){
              const oL=ball.x+BALL_R-bk.x, oR=bk.x+BK_W-(ball.x-BALL_R);
              const oT=ball.y+BALL_R-bk.y, oB=bk.y+BK_H-(ball.y-BALL_R);
              if(Math.min(oL,oR)<Math.min(oT,oB)) ball.vx*=-1;
              else ball.vy*=-1;
            }
            bk.hp--;
            if(bk.hp<=0){
              destroyBrick(bk,j);
            } else {
              sm.playSFX('hit');
              bk.shake = 3;
              ps.burst(ball.x, ball.y, 'hit', {count:4});
            }
            if(!ball.fire) break;
          }
        }
      }

      // All balls lost
      if(S.balls.length===0){
        S.lives--;
        juice.shake(8, 300);
        juice.flash('#D32F2F', 150);
        if(S.lives<=0){
          gameOver();
          return;
        } else {
          S.balls=[makeBall()];
          S.combo=0;
        }
      }

      // Powerup drops
      for(let i=S.powerups.length-1;i>=0;i--){
        const p=S.powerups[i];
        p.y+=p.vy;
        if(p.y>GH-30 && p.x>S.pad.x-15 && p.x<S.pad.x+S.pad.w+15){
          activatePU(p.type);
          S.powerups.splice(i,1);
        } else if(p.y>GH){
          S.powerups.splice(i,1);
        }
      }

      // Level clear
      if(S.bricks.length===0) levelClear();

      updateUI();
    }

    // ═══════════════ DRAW ═══════════════
    function draw(){
      const shk = juice.getShakeOffset();
      ctx.save();
      ctx.translate(shk.x, shk.y);

      // Background (image)
      if(IMG.bg && IMG.bg.complete){
        ctx.drawImage(IMG.bg, 0, 0, GW, GH);
      } else {
        ctx.fillStyle='#0f0f23';
        ctx.fillRect(0,0,GW,GH);
      }

      // Shield line
      if(S.hasShield && IMG.shield_line && IMG.shield_line.complete){
        ctx.globalAlpha=0.8+0.2*Math.sin(Date.now()/200);
        ctx.drawImage(IMG.shield_line, 0, GH-6, GW, 6);
        ctx.globalAlpha=1;
      }

      // Bricks
      S.bricks.forEach(bk=>{
        let imgName;
        if(bk.type==='explosive') imgName='brick_explosive';
        else if(bk.type==='hard') imgName='brick_'+bk.colorName+'_hard';
        else imgName='brick_'+bk.colorName;

        const img=IMG[imgName];
        const sx=bk.shake?(Math.random()-0.5)*bk.shake:0;
        if(img && img.complete){
          ctx.drawImage(img, bk.x+sx, bk.y, BK_W, BK_H);
        } else {
          // Fallback
          ctx.fillStyle='#E53935';
          ctx.fillRect(bk.x+sx, bk.y, BK_W, BK_H);
        }
      });

      // Powerup drops
      S.powerups.forEach(p=>{
        const info=POWERUP_MAP[p.type];
        const img=IMG[info.img];
        if(img && img.complete){
          ctx.drawImage(img, p.x-12, p.y-12, 24, 24);
        } else {
          ctx.fillStyle=info.color;
          ctx.beginPath(); ctx.arc(p.x,p.y,10,0,Math.PI*2); ctx.fill();
        }
      });

      // Paddle
      const padImg = S.pad.w>PAD_W*1.5 ? IMG.paddle_wide : IMG.paddle;
      if(padImg && padImg.complete){
        ctx.drawImage(padImg, S.pad.x, GH-30, S.pad.w, PAD_H);
      } else {
        ctx.fillStyle='#00d9ff';
        ctx.fillRect(S.pad.x, GH-30, S.pad.w, PAD_H);
      }

      // Balls
      S.balls.forEach(ball=>{
        const img = ball.fire ? IMG.ball_fire : IMG.ball;
        if(img && img.complete){
          ctx.drawImage(img, ball.x-BALL_R, ball.y-BALL_R, BALL_R*2, BALL_R*2);
        } else {
          ctx.fillStyle=ball.fire?'#ff6b35':'white';
          ctx.beginPath(); ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2); ctx.fill();
        }
        // Fire trail
        if(ball.fire){
          ps.burst(ball.x-ball.vx, ball.y-ball.vy, 'trail', {count:1, colors:['#ff6b35','#ffcc00']});
        }
      });

      // Particles
      ps.draw();

      // Juice flash overlay
      juice.drawFlash(ctx, GW, GH);

      ctx.restore();
    }

    // ═══════════════ GAME LOOP ═══════════════
    function loop(now){
      const dt = Math.min((now-S.lastTime)/1000, 0.05);
      S.lastTime = now;
      update(dt);
      draw();
      if(S.running) requestAnimationFrame(loop);
    }

    // ═══════════════ INPUT ═══════════════
    function handleMove(cx){
      const rect=canvas.getBoundingClientRect();
      const scale=GW/rect.width;
      const x=(cx-rect.left)*scale;
      S.pad.x=Math.max(0,Math.min(GW-S.pad.w, x-S.pad.w/2));
    }
    canvas.addEventListener('mousemove',e=>handleMove(e.clientX));
    canvas.addEventListener('touchmove',e=>{e.preventDefault();handleMove(e.touches[0].clientX);},{passive:false});

    // ═══════════════ INIT ═══════════════
    loadImages().then(()=>{
      loadAudio();
      document.getElementById('hiScoreVal').textContent = S.hiScore;
      console.log('Brick Breaker Blast loaded:', imgLoaded, 'images');
    });

  })();
  </script>

    <!-- leaderboard-integration:brick-breaker -->
    <div id="leaderboard" data-lb-slug="brick-breaker" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "brick-breaker";
      const CANDIDATE_OBJECTS = ["IMG", "POWERUP_MAP"];
      const END_METHODS = ["gameOver", "endGame", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["startGame", "reset", "newGame", "restart", "retry", "resetGame", "initGame", "start", "beginGame", "playAgain"];
      const SCORE_KEYS = ["score", "level", "combo", "points", "gold", "coins", "wave", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
