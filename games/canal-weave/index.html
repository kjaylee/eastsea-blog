    } catch {}

      straight:[1,0,1,0],
      elbow:[1,1,0,0],
      tee:[1,1,0,1],

    function fallbackI18n(bundle, initialLang) {
      let lang = initialLang;
      const fn = (key, vars={}) => {
        const base = bundle[key] && (bundle[key][lang] || bundle[key].ko || bundle[key].en) || key;
        return base.replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? '');
      };
      fn.setLang = (next) => { lang = next; };
      fn.getLang = () => lang;
      return fn;
    }

    const T = window.GameI18n ? window.GameI18n(I18N) : fallbackI18n(I18N, save.lang);

    function loadSave() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) Object.assign(save, JSON.parse(raw));
      } catch {}
      save.upgrades = Object.assign({ flow:0, reserve:0, grace:0 }, save.upgrades || {});
      save.missions = Object.assign({ day6:false, bloom3:false, repair4:false }, save.missions || {});
      save.lang = save.lang === 'en' ? 'en' : 'ko';
      state.lang = save.lang;
      if (typeof T.setLang === 'function') T.setLang(state.lang);
    }

    function persistSave() {
      save.lang = state.lang;

      try { if (tg && typeof tg.save === 'function') tg.save(STORAGE_KEY, JSON.stringify(save)); } catch {}
    }

    function rand(n) { return Math.random() * n; }
    function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }
    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }

    function showToast(text, ms = 1100) {
      toast.textContent = text;
      toast.classList.add('show');
      state.toastTimer = performance.now() + ms;

    function showBanner(text, ms = 1200) {

    function hideToastAndBanner(now) {
      if (state.toastTimer && now > state.toastTimer) toast.classList.remove('show');
      if (state.bannerTimer && now > state.bannerTimer) banner.classList.remove('show');
    }

    function tileOpenings(tile) {
      const out = [0,0,0,0];
      const base = connBase[tile.kind];
      for (let i = 0; i < 4; i++) out[(i + tile.rot) % 4] = base[i];
      return out;
    }

    function makeBoard() {
      return tileKinds.map((row, y) => row.map((kind, x) => ({
        kind,
        rot: (Math.random() * 4) | 0,
        cracked: false,
        glow: 0,
        pulse: rand(Math.PI * 2),
        x,
        y,
      })));
    }

    function districtBand(run, index) {
      const baseMin = 44;
      const baseMax = 56;
      const southShift = index >= 2 ? (run.weather?.southBand || 0) : 0;
      return [baseMin - run.bandBonus + southShift, baseMax + run.bandBonus - southShift];
    }

    function makeRun() {
      return {
        board: makeBoard(),
        districts: districtsDef.map((d, i) => ({
          def: d,
          humidity: 48 + rand(8) - 4,
          supplied: false,
          trend: 0,
          labelKey: d.key,
          band:[44,56],
          flash: 0
        })),
        mode: 'play',
        time: 0,
        simAcc: 0,
        dayAcc: 0,
        day: 1,
        score: 0,
        bestBloom: 0,
        bloomCombo: 0,
        harmonyTicks: 0,
        repairs: 1 + save.upgrades.reserve,
        repairMode: false,
        pulseCharge: 1,
        pulseCooldown: 0,
        crackedLeak: 0,
        waterBonus: save.upgrades.flow * 0.9,
        bandBonus: 0,
        graceBonus: save.upgrades.grace * 0.22,
        bloomBonus: 1,
        decreesChosen: 0,
        maxStability: 62 + save.upgrades.reserve * 7,
        stability: 62 + save.upgrades.reserve * 7,
        activeSet: new Set(),
        activeCracks: 0,
        rotations: 0,
        repaired: 0,
        earnedSeals: 0,
        decreeOptions: [],
        weatherIndex: 0,
        weather: null,
        weatherName: '',
        weatherDesc: '',
        forceGameOver: false,
        lastSupplyCount: 0,
      };
    }

    function setWeatherForDay(run) {
      const index = (run.day - 1) % weatherPool.length;
      run.weatherIndex = index;
      run.weather = weatherPool[index];
      run.weatherName = T(run.weather.key + 'Name');
      run.weatherDesc = T(run.weather.key + 'Desc');
      run.districts.forEach((district, i) => {
        district.band = districtBand(run, i);
      });
      weatherStrip.textContent = `${T('weatherLabel')}: ${run.weatherName} · ${run.weatherDesc}`;
    }

    function renderUpgradeGrid() {

        { key:'flow', name:T('upgradeFlowName'), desc:T('upgradeFlowDesc') },

      ];

      defs.forEach((def) => {

    function buyUpgrade(key) {
      const level = save.upgrades[key] || 0;
      if (level >= 5) return;
      const cost = 4 + level * 3;
      if (save.seals < cost) {
        showToast(T('notEnough'));
        snd.play('warn', 0.8);
        return;
      }
      save.seals -= cost;
      save.upgrades[key] = level + 1;
      persistSave();
      syncMeta();
      showToast(T('bought'));
      haptic('impact', 'medium');

    function updateControls() {

    function showOnly(panel) {

    }

    function setMode(next) {
      state.mode = next;
      if (state.run) state.run.mode = next;
      showOnly(next === 'title' ? 'title' : next === 'decree' ? 'decree' : next === 'gameover' ? 'gameover' : '');
      hud.classList.toggle('show', next === 'play');

    function startRun() {
      state.run = makeRun();
      save.totalRuns += 1;
      setWeatherForDay(state.run);
      state.run.districts.forEach((district, i) => district.band = districtBand(state.run, i));
      persistSave();
      updateHUD();
      updateControls();
      setMode('play');
      showToast(T('startToast'));
      computeFlow();
      haptic('notification', 'success');
    }

    function finishRun() {
      const run = state.run;
      if (!run) return;
      run.earnedSeals = Math.max(2, Math.floor(run.score / 120) + run.day + Math.floor(run.bestBloom * 1.5));
      save.seals += run.earnedSeals;
      save.bestScore = Math.max(save.bestScore || 0, Math.floor(run.score));
      save.bestDay = Math.max(save.bestDay || 0, run.day);
      if (run.day >= 6) save.missions.day6 = true;
      if (run.bestBloom >= 3) save.missions.bloom3 = true;
      if (run.repaired >= 4) save.missions.repair4 = true;
      persistSave();
      if (window.Leaderboard && typeof window.Leaderboard.submit === 'function') {
        try { window.Leaderboard.submit(GAME_ID, 'player', Math.floor(run.score)); } catch {}
      }
      $('goDay').textContent = String(run.day);
      $('goScore').textContent = String(Math.floor(run.score));
      $('goBloom').textContent = `x${run.bestBloom}`;
      $('goEarned').textContent = String(run.earnedSeals);
      syncMeta();
      setMode('gameover');
    }

    function openingsMatch(tileA, dir, tileB) {
      const openA = tileOpenings(tileA);
      const openB = tileOpenings(tileB);
      return !!(openA[dir] && openB[opposite[dir]]);
    }

    function computeFlow() {
      const run = state.run;
      if (!run) return;
      const active = new Set();
      const queue = [];
      const startTile = run.board[source.y][source.x];
      if (tileOpenings(startTile)[source.inDir]) {
        active.add(`${source.x},${source.y}`);
        queue.push([source.x, source.y]);
      }
      while (queue.length) {
        const [x, y] = queue.shift();
        const tile = run.board[y][x];
        const openings = tileOpenings(tile);
        for (let dir = 0; dir < 4; dir++) {
          if (!openings[dir]) continue;
          const nx = x + dirs[dir][0];
          const ny = y + dirs[dir][1];
          if (nx < 0 || ny < 0 || nx >= GRID || ny >= GRID) continue;
          const next = run.board[ny][nx];
          if (!openingsMatch(tile, dir, next)) continue;
          const key = `${nx},${ny}`;
          if (!active.has(key)) {
            active.add(key);
            queue.push([nx, ny]);
          }
        }
      }
      run.activeSet = active;
      run.activeCracks = 0;
      run.districts.forEach((district, i) => {
        const key = `${district.def.x},${district.def.y}`;
        const tile = run.board[district.def.y][district.def.x];
        const supplied = active.has(key) && !!tileOpenings(tile)[district.def.out];
        district.supplied = supplied;
        district.band = districtBand(run, i);
      });
      run.board.flat().forEach((tile) => {
        const key = `${tile.x},${tile.y}`;
        tile.glow = active.has(key) ? 1 : 0;
        if (tile.cracked && active.has(key)) run.activeCracks += 1;
      });
      run.lastSupplyCount = run.districts.filter(d => d.supplied).length;
    }

    function randomInteriorTiles(run) {
      return run.board.flat().filter((tile) => !(tile.x === source.x && tile.y === source.y));
    }

    function injectCrack() {
      const run = state.run;
      if (!run) return false;
      const candidates = randomInteriorTiles(run).filter(tile => !tile.cracked);
      if (!candidates.length) return false;
      const tile = pick(candidates);
      tile.cracked = true;
      tile.pulse = rand(Math.PI * 2);
      showToast(T('crackHit'));
      snd.play('warn', 0.9);
      return true;
    }

    function repairTile(tile) {
      const run = state.run;
      if (!run || !tile || !tile.cracked || run.repairs <= 0) return false;
      tile.cracked = false;
      run.repairs -= 1;
      run.repaired += 1;
      run.repairMode = false;
      showToast(T('crackFixed'));
      snd.play('repair', 1.0);
      haptic('notification', 'success');
      updateControls();
      return true;
    }

    function nextDay() {
      const run = state.run;
      if (!run) return;
      run.day += 1;
      run.dayAcc = 0;
      setWeatherForDay(run);
      if (run.day >= 3) injectCrack();
      if (run.day >= 6 && run.day % 3 === 0) {
        const tile = pick(randomInteriorTiles(run));
        tile.rot = (tile.rot + 1) % 4;
      }
      if (run.day % 4 === 0) {
        run.decreeOptions = [...decreePool].sort(() => Math.random() - 0.5).slice(0, 3);
        renderDecreeCards(run.decreeOptions);
        setMode('decree');
      }
      computeFlow();
      showToast(T('dayToast', { day: run.day }));
    }

    function applyPulse() {
      const run = state.run;
      if (!run || state.mode !== 'play' || run.pulseCharge < 1) return;
      run.pulseCharge = 0;
      run.pulseCooldown = 14;
      run.stability = Math.min(run.maxStability, run.stability + 10);
      run.districts.forEach((district) => {
        district.humidity = lerp(district.humidity, 50, 0.4);
      });
      showToast(T('pulseUsed'));
      snd.play('pulse', 1.0);
      haptic('impact', 'medium');
      updateControls();
    }

    function chooseDecree(index) {
      const run = state.run;
      if (!run || state.mode !== 'decree') return;
      const choice = run.decreeOptions[index];
      if (!choice) return;
      choice.apply(run);
      run.decreesChosen += 1;
      run.districts.forEach((district, i) => district.band = districtBand(run, i));
      computeFlow();
      setMode('play');
      showToast(T(choice.key + 'Name'));
      updateControls();
    }

    function renderDecreeCards(cards) {
      decreeCards.innerHTML = '';
      cards.forEach((card, index) => {
        const wrap = document.createElement('div');
        wrap.className = 'decreeCard';
        wrap.innerHTML = `
          <h3>${T(card.key + 'Name')}</h3>
          <p>${T(card.key + 'Desc')}</p>
          <div class="tag">${T('decreeTitle')} ${index + 1}</div>
          <div class="row"><button class="btn primary">${T(card.key + 'Name')}</button></div>
        `;
        wrap.querySelector('button').addEventListener('click', () => chooseDecree(index));
        decreeCards.appendChild(wrap);
      });
    }

    function tickRun(step) {
      const run = state.run;
      if (!run || state.mode !== 'play') return;
      run.time += step;
      run.dayAcc += step;
      run.pulseCooldown = Math.max(0, run.pulseCooldown - step);
      if (run.pulseCooldown <= 0) run.pulseCharge = 1;
      computeFlow();

      const weather = run.weather || weatherPool[0];
      const leakPenalty = run.activeCracks * Math.max(0.22, 0.58 - run.graceBonus * 0.18);
      let harmonyCount = 0;
      let crisisLoss = 0;
      let suppliedCount = 0;

      run.districts.forEach((district, index) => {
        const drift = weather.drift[index] + Math.sin(run.time * 0.55 + index * 1.6) * 0.45;
        const inflow = district.supplied ? (8.4 + weather.supply + run.waterBonus - run.activeCracks * 0.85) : 0;
        district.humidity = clamp(district.humidity + inflow + drift - weather.demand, 0, 100);
        district.trend = inflow + drift - weather.demand;
        if (district.supplied) suppliedCount += 1;
        const [bandMin, bandMax] = district.band;
        if (district.humidity >= bandMin && district.humidity <= bandMax) harmonyCount += 1;
        if (district.humidity < 18) crisisLoss += (18 - district.humidity) * (0.045 - run.graceBonus * 0.008);
        if (district.humidity > 82) crisisLoss += (district.humidity - 82) * (0.045 - run.graceBonus * 0.008);
        district.flash = district.humidity < 18 || district.humidity > 82 ? 1 : Math.max(0, district.flash - step * 0.6);
      });

      run.stability = clamp(run.stability - crisisLoss - leakPenalty, 0, run.maxStability);
      run.score += suppliedCount * 6 + harmonyCount * 10 * (weather.bloom || 1);

      if (harmonyCount === 4 && suppliedCount >= 3) {
        run.harmonyTicks += 1;
        if (run.harmonyTicks >= 2) {
          run.bloomCombo += 1;
          run.bestBloom = Math.max(run.bestBloom, run.bloomCombo);
          run.score += 70 * run.bloomCombo * run.bloomBonus * (weather.bloom || 1);
          showBanner(T('bloomBanner', { n: run.bloomCombo }));
          snd.play('bloom', 1.0);
          haptic('notification', 'success');
          run.harmonyTicks = 0;
        }
      } else {
        run.harmonyTicks = 0;
        run.bloomCombo = 0;
      }

      if (run.dayAcc >= DAY_SECONDS) nextDay();
      if (run.forceGameOver || run.stability <= 0) finishRun();
      updateHUD();
      updateControls();
    }

    function resize() {
      const dpr = Math.min(DPR_MAX, window.devicePixelRatio || 1);
      const w = window.innerWidth;
      const h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      state.layout = computeLayout(w, h);
    }

    function computeLayout(w, h) {
      const side = Math.min(w - 32, h - 250, 470);
      const boardSize = Math.max(250, side);
      const x = (w - boardSize) / 2;
      const y = Math.max(140, (h - boardSize) / 2 + 12);
      const cell = boardSize / GRID;
      return { w, h, boardSize, x, y, cell };
    }

    function drawRoundedRect(x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.stroke(); }
    }

    function districtAnchor(def, layout) {
      const { x, y, cell } = layout;
      if (def.id === 'west') return { x:x - 34, y:y + cell * 1.5 };
      if (def.id === 'east') return { x:x + cell * 5 + 34, y:y + cell * 1.5 };
      if (def.id === 'southwest') return { x:x + cell * 1.5, y:y + cell * 5 + 34 };
      return { x:x + cell * 3.5, y:y + cell * 5 + 34 };
    }

    function drawDistrict(district, layout, index) {
      const anchor = districtAnchor(district.def, layout);
      const [bandMin, bandMax] = district.band;
      const height = 58;
      const width = 78;
      drawRoundedRect(anchor.x - width / 2, anchor.y - 32, width, height, 14, 'rgba(255,248,238,.9)', 'rgba(95,75,54,.14)');
      ctx.fillStyle = 'rgba(79,64,50,.86)';
      ctx.font = '700 12px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(T(district.labelKey), anchor.x, anchor.y - 13);
      ctx.fillStyle = 'rgba(100,85,64,.22)';
      ctx.fillRect(anchor.x - 28, anchor.y + 1, 56, 8);
      ctx.fillStyle = district.def.color;
      ctx.fillRect(anchor.x - 28, anchor.y + 1, clamp(district.humidity, 0, 100) * 0.56, 8);
      ctx.strokeStyle = 'rgba(79,64,50,.18)';
      ctx.strokeRect(anchor.x - 28, anchor.y + 1, 56, 8);
      ctx.fillStyle = 'rgba(79,64,50,.62)';
      ctx.font = '800 11px Inter, sans-serif';
      ctx.fillText(`${Math.round(district.humidity)}%`, anchor.x, anchor.y + 24);
      ctx.strokeStyle = district.flash ? 'rgba(201,92,71,.9)' : 'rgba(110,163,92,.65)';
      ctx.lineWidth = district.flash ? 3 : 2;
      const yBand = anchor.y - 27;
      const left = anchor.x - 25 + bandMin * 0.52;
      const right = anchor.x - 25 + bandMax * 0.52;
      ctx.beginPath(); ctx.moveTo(left, yBand); ctx.lineTo(right, yBand); ctx.stroke();
      if (district.supplied) {
        ctx.fillStyle = 'rgba(74,142,184,.82)';
        ctx.beginPath(); ctx.arc(anchor.x + 31, anchor.y - 18, 5 + Math.sin(state.run.time * 4 + index) * 1.2, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawPipeCenter(cx, cy, dir, length, active, thickness) {
      ctx.strokeStyle = active ? 'rgba(74,142,184,.96)' : 'rgba(125,104,82,.55)';
      ctx.lineWidth = thickness;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      if (dir === 0) ctx.lineTo(cx, cy - length);
      if (dir === 1) ctx.lineTo(cx + length, cy);
      if (dir === 2) ctx.lineTo(cx, cy + length);
      if (dir === 3) ctx.lineTo(cx - length, cy);
      ctx.stroke();
    }

    function drawBoard() {
      const run = state.run;
      const L = state.layout;
      if (!L) return;
      ctx.clearRect(0, 0, L.w, L.h);

      const bg = ctx.createLinearGradient(0, 0, 0, L.h);
      bg.addColorStop(0, '#f9f0dc');
      bg.addColorStop(.58, '#e5d2b1');
      bg.addColorStop(1, '#c9ae84');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, L.w, L.h);

      ctx.save();
      drawRoundedRect(L.x - 14, L.y - 14, L.boardSize + 28, L.boardSize + 28, 26, 'rgba(255,249,238,.7)', 'rgba(95,73,54,.12)');
      drawRoundedRect(L.x, L.y, L.boardSize, L.boardSize, 24, 'rgba(244,230,202,.96)', 'rgba(100,76,56,.12)');

      for (let gy = 0; gy < GRID; gy++) {
        for (let gx = 0; gx < GRID; gx++) {
          const tile = run ? run.board[gy][gx] : { kind:'straight', rot:0, cracked:false, glow:0, pulse:0, x:gx, y:gy };
          const tx = L.x + gx * L.cell;
          const ty = L.y + gy * L.cell;
          const pad = 6;
          const active = run ? run.activeSet.has(`${gx},${gy}`) : false;
          const bodyFill = active ? 'rgba(194,228,238,.96)' : 'rgba(231,213,182,.96)';
          drawRoundedRect(tx + pad, ty + pad, L.cell - pad * 2, L.cell - pad * 2, 18, bodyFill, 'rgba(110,89,69,.12)');
          ctx.save();
          ctx.translate(tx + L.cell / 2, ty + L.cell / 2);
          const branchLen = L.cell * 0.28;
          const thickness = L.cell * 0.16;
          const openings = tileOpenings(tile);
          for (let dir = 0; dir < 4; dir++) {
            if (openings[dir]) drawPipeCenter(0, 0, dir, branchLen, active, thickness);
          }
          ctx.globalCompositeOperation = 'destination-in';
          ctx.beginPath();
          ctx.arc(0, 0, thickness * 0.62, 0, Math.PI * 2);
          ctx.rect(-branchLen - thickness, -branchLen - thickness, (branchLen + thickness) * 2, (branchLen + thickness) * 2);
          ctx.fill();
          ctx.globalCompositeOperation = 'source-over';
          ctx.fillStyle = active ? 'rgba(139,209,221,.94)' : 'rgba(129,106,81,.72)';
          ctx.beginPath(); ctx.arc(0, 0, thickness * 0.72, 0, Math.PI * 2); ctx.fill();

          if (tile.cracked) {
            ctx.strokeStyle = 'rgba(169,72,60,.88)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-12, -10);
            ctx.lineTo(-4, -4);
            ctx.lineTo(-10, 6);
            ctx.lineTo(2, 13);
            ctx.lineTo(10, 4);
            ctx.stroke();
          }

          if (gx === source.x && gy === source.y) {
            ctx.fillStyle = 'rgba(74,142,184,.18)';
            ctx.beginPath(); ctx.arc(0, -L.cell * 0.24, 14, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(74,142,184,.9)';
            ctx.beginPath(); ctx.moveTo(0, -L.cell * 0.42); ctx.lineTo(-10, -L.cell * 0.18); ctx.lineTo(10, -L.cell * 0.18); ctx.closePath(); ctx.fill();
          }
          ctx.restore();
        }
      }
      ctx.restore();

      if (run) {
        districtsDef.forEach((def, i) => drawDistrict(run.districts[i], L, i));
        ctx.fillStyle = 'rgba(79,64,50,.78)';
        ctx.textAlign = 'center';
        ctx.font = '800 14px Inter, sans-serif';
        ctx.fillText(run.weatherName || '', L.w / 2, L.y - 26);
      } else {
        ctx.fillStyle = 'rgba(79,64,50,.78)';
        ctx.textAlign = 'center';
        ctx.font = '800 14px Inter, sans-serif';
        ctx.fillText(T('titleWeatherNote'), L.w / 2, L.y - 26);
      }
    }

    function cellAtClient(clientX, clientY) {
      const L = state.layout;
      if (!L) return null;
      const x = clientX - L.x;
      const y = clientY - L.y;
      if (x < 0 || y < 0 || x >= L.boardSize || y >= L.boardSize) return null;
      return { x: Math.floor(x / L.cell), y: Math.floor(y / L.cell) };
    }

    function rotateCell(x, y) {
      const run = state.run;
      if (!run || state.mode !== 'play') return false;
      const tile = run.board[y] && run.board[y][x];
      if (!tile) return false;
      if (run.repairMode) return repairTile(tile);
      tile.rot = (tile.rot + 1) % 4;
      run.rotations += 1;
      computeFlow();
      snd.play('turn', 0.9);
      haptic('impact', 'light');
      return true;
    }

    function onPointerDown(e) {
      if (state.mode !== 'play') return;
      const cell = cellAtClient(e.clientX, e.clientY);
      if (!cell) return;
      state.pointer.active = true;
      state.pointer.id = e.pointerId;
      state.pointer.visited = new Set([`${cell.x},${cell.y}`]);
      rotateCell(cell.x, cell.y);
      canvas.setPointerCapture?.(e.pointerId);
    }

    function onPointerMove(e) {
      if (!state.pointer.active || state.pointer.id !== e.pointerId || state.mode !== 'play') return;
      const cell = cellAtClient(e.clientX, e.clientY);
      if (!cell) return;
      const key = `${cell.x},${cell.y}`;
      if (state.pointer.visited.has(key)) return;
      state.pointer.visited.add(key);
      rotateCell(cell.x, cell.y);
    }

    function onPointerUp(e) {
      if (state.pointer.id === e.pointerId) {
        state.pointer.active = false;
        state.pointer.id = null;
        state.pointer.visited.clear();
      }
    }

    function toggleRepairMode() {
      const run = state.run;
      if (!run || state.mode !== 'play') return;
      if (!run.repairMode && run.repairs <= 0) {
        showToast(T('repairNeed'));
        return;
      }
      run.repairMode = !run.repairMode;
      if (run.repairMode) showToast(T('repairPrompt'));
      updateControls();
    }

    function toggleLang() {
      state.lang = state.lang === 'ko' ? 'en' : 'ko';
      if (typeof T.setLang === 'function') T.setLang(state.lang);
      persistSave();
      syncMeta();
      if (state.run) setWeatherForDay(state.run);
    }

    function renderLoop(now) {
      const dt = Math.min(0.033, (now - state.lastFrame) / 1000 || 0.016);
      state.lastFrame = now;
      hideToastAndBanner(now);
      if (state.run && state.mode === 'play') {
        state.run.simAcc += dt;
        while (state.run.simAcc >= SIM_STEP) {
          tickRun(SIM_STEP);
          state.run.simAcc -= SIM_STEP;
        }
      }
      drawBoard();
      requestAnimationFrame(renderLoop);
    }

    startBtn.addEventListener('click', startRun);
    retryBtn.addEventListener('click', startRun);
    homeBtn.addEventListener('click', () => { state.run = null; setMode('title'); syncMeta(); });
    langBtn.addEventListener('click', toggleLang);
    repairBtn.addEventListener('click', toggleRepairMode);
    pulseBtn.addEventListener('click', applyPulse);
    canvas.addEventListener('pointerdown', onPointerDown);
    canvas.addEventListener('pointermove', onPointerMove);
    canvas.addEventListener('pointerup', onPointerUp);
    canvas.addEventListener('pointercancel', onPointerUp);
    window.addEventListener('resize', resize);

    function mountDebug() {
      window.startRun = startRun;
      window.toggleLang = toggleLang;
      window.__canalWeaveDebug = {
        getState: () => ({
          mode: state.mode,
          lang: state.lang,
          save: JSON.parse(JSON.stringify(save)),
          layout: state.layout ? { x: state.layout.x, y: state.layout.y, cell: state.layout.cell, boardSize: state.layout.boardSize, w: state.layout.w, h: state.layout.h } : null,
          run: state.run ? {
            day: state.run.day,
            score: Math.floor(state.run.score),
            stability: state.run.stability,
            bestBloom: state.run.bestBloom,
            repairs: state.run.repairs,
            weather: state.run.weatherName,
            supplied: state.run.districts.map(d => d.supplied),
            humidity: state.run.districts.map(d => Math.round(d.humidity)),
            activeCracks: state.run.activeCracks,
            mode: state.run.mode,
            boardRots: state.run.board.map(row => row.map(tile => tile.rot)),
            cracked: state.run.board.map(row => row.map(tile => tile.cracked ? 1 : 0)),
          } : null
        }),
        startRun,
        rotateCell,
        computeFlow,
        tick: (n = 1) => { for (let i = 0; i < n; i++) tickRun(1); return window.__canalWeaveDebug.getState(); },
        setHumidity: (index, value) => {
          if (!state.run || !state.run.districts[index]) return null;
          state.run.districts[index].humidity = value;
          return window.__canalWeaveDebug.getState();
        },
        fillHarmony: () => {
          if (!state.run) return null;
          state.run.board.flat().forEach((tile) => { tile.kind = 'cross'; tile.rot = 0; tile.cracked = false; });
          state.run.districts.forEach((d) => { d.humidity = 50; d.supplied = true; });
          state.run.harmonyTicks = 1;
          computeFlow();
          tickRun(1);
          return window.__canalWeaveDebug.getState();
        },
        forceDecree: () => {
          if (!state.run) startRun();
          state.run.decreeOptions = decreePool.slice(0, 3);
          renderDecreeCards(state.run.decreeOptions);
          setMode('decree');
          return window.__canalWeaveDebug.getState();
        },
        chooseDecree: chooseDecree,
        injectCrack: () => { const ok = injectCrack(); computeFlow(); return ok; },
        repairAt: (x, y) => {
          if (!state.run) return false;
          const tile = state.run.board[y] && state.run.board[y][x];
          return repairTile(tile);
        },
        triggerGameOver: () => { if (state.run) { state.run.forceGameOver = true; finishRun(); } return window.__canalWeaveDebug.getState(); },
      };
    }

    loadSave();
    resize();
    syncMeta();
    setMode('title');
    mountDebug();
    if (window.Leaderboard && typeof window.Leaderboard.renderBoard === 'function') {
      try { window.Leaderboard.renderBoard('leaderboard'); } catch {}
    }
    requestAnimationFrame(renderLoop);
  })();
  </script>
</body>
</html>
