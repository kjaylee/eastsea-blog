<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Canyon Cargo Switchback — 캐니언 카고 스위치백</title>
  <meta name="description" content="화물 무게를 옮겨 트럭을 돌리는 스위치백 다운힐 레이서. 보너스, 실드, 부스트 계약 게이트를 고르며 바위와 절벽을 버텨 최고 거리에 도전하세요." />
  <style>
    :root {
      color-scheme: light;
      --bg: #f7ead5;
      --panel: rgba(255, 248, 236, 0.88);
      --panel-strong: rgba(255, 244, 224, 0.96);
      --line: rgba(101, 72, 40, 0.2);
      --ink: #3a2417;
      --muted: #7b5d49;
      --sand: #f2cf9c;
      --canyon: #cf7a53;
      --canyon-deep: #8d4f35;
      --road: #7a5b45;
      --road-edge: #f6d9a8;
      --teal: #2f9c95;
      --boost: #56b4ff;
      --bonus: #ffbf47;
      --shield: #65c26e;
      --danger: #c74444;
      --shadow: rgba(45, 21, 5, 0.15);
      font-family: "Pretendard", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% -15%, rgba(255, 248, 229, 0.95) 0%, rgba(247, 234, 213, 0.92) 40%, rgba(235, 215, 188, 0.96) 100%),
        linear-gradient(180deg, #f8edd8 0%, #f2ddba 100%);
      color: var(--ink);
    }

    body {
      display: flex;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top) + 10px)
        10px
        calc(env(safe-area-inset-bottom) + 14px);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .app {
      width: min(100%, 520px);
      display: grid;
      gap: 10px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 2px 2px 0;
    }

    .title-wrap {
      min-width: 0;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .title {
      margin: 2px 0 0;
      font-size: clamp(1rem, 3.6vw, 1.28rem);
      font-weight: 900;
      line-height: 1.15;
    }

    .tagline {
      margin: 2px 0 0;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.35;
    }

    .badge {
      flex: 0 0 auto;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px var(--shadow);
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--canyon-deep);
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .card {
      padding: 9px 8px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px var(--shadow);
      backdrop-filter: blur(8px);
      text-align: center;
    }

    .card span {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 800;
    }

    .card strong {
      display: block;
      margin-top: 4px;
      font-size: 1rem;
      line-height: 1.1;
    }

    .stage {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(83, 44, 20, 0.18);
      border: 1px solid rgba(121, 85, 53, 0.18);
      background: #f5dcc0;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 390 / 844;
      background: linear-gradient(180deg, #fee8b8 0%, #f9d59e 42%, #da9360 100%);
      touch-action: none;
    }

    .overlay,
    .toast,
    .banner {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
    }

    .overlay {
      inset: 0;
      transform: none;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(180deg, rgba(106, 61, 33, 0.18), rgba(60, 30, 12, 0.38));
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-card {
      width: min(100%, 360px);
      padding: 18px 18px 16px;
      border-radius: 24px;
      background: var(--panel-strong);
      border: 1px solid rgba(109, 74, 40, 0.18);
      box-shadow: 0 20px 40px rgba(67, 34, 14, 0.22);
    }

    .overlay-card h1,
    .overlay-card h2,
    .overlay-card p,
    .overlay-card ul {
      margin: 0;
    }

    .overlay-title {
      font-size: 1.5rem;
      line-height: 1.05;
      font-weight: 950;
      margin-bottom: 10px;
    }

    .overlay-sub {
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.92rem;
      margin-bottom: 14px;
    }

    .overlay-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .mini {
      padding: 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(100, 71, 40, 0.12);
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .mini b {
      display: block;
      margin-bottom: 4px;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .ladder {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(104, 73, 43, 0.12);
      font-size: 0.84rem;
      line-height: 1.35;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(112, 80, 49, 0.18);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 249, 240, 0.96), rgba(249, 226, 193, 0.96));
      color: var(--ink);
      padding: 13px 12px;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 850;
      letter-spacing: 0.02em;
      box-shadow: 0 12px 24px rgba(83, 44, 20, 0.12);
      cursor: pointer;
      transition: transform 100ms ease, box-shadow 100ms ease, border-color 100ms ease;
      min-height: 58px;
    }

    button:active,
    button.on {
      transform: translateY(1px) scale(0.99);
      box-shadow: 0 6px 14px rgba(83, 44, 20, 0.16);
      border-color: rgba(112, 80, 49, 0.32);
    }

    .primary {
      background: linear-gradient(180deg, #f19d63, #d97549);
      color: #fffdf8;
      border-color: rgba(141, 79, 53, 0.2);
    }

    .action-left { color: #8b4a2e; }
    .action-right { color: #8b4a2e; }
    .action-mid { color: #2b5f69; }

    .footer-hint {
      margin: 0;
      padding: 2px 4px 0;
      text-align: center;
      font-size: 0.8rem;
      line-height: 1.45;
      color: var(--muted);
    }

    .toast {
      top: 12px;
      max-width: calc(100% - 28px);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(58, 36, 23, 0.8);
      color: #fffdf6;
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
      opacity: 0;
      transition: opacity 140ms ease;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }

    .banner {
      top: 72px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 248, 227, 0.92);
      border: 1px solid rgba(107, 73, 42, 0.14);
      color: #84552f;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 12px 24px rgba(83, 44, 20, 0.12);
      opacity: 0;
      transition: opacity 140ms ease;
      pointer-events: none;
    }

    .banner.show { opacity: 1; }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(98, 68, 39, 0.12);
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--muted);
    }

    @media (max-width: 440px) {
      .title { font-size: 1rem; }
      .overlay-card { padding: 16px; }
      .overlay-title { font-size: 1.32rem; }
      .controls button { font-size: 0.88rem; padding: 12px 8px; }
      .card strong { font-size: 0.94rem; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="title-wrap">
        <div class="eyebrow">Downhill Contract Run</div>
        <h1 class="title">Canyon Cargo Switchback — 캐니언 카고 스위치백</h1>
        <p class="tagline">핸들이 아니라 짐의 무게로 코너를 버티는 캐니언 러너</p>
      </div>
      <div class="badge" id="bestBadge">BEST 0m · No Medal</div>
    </section>

    <section class="hud" aria-label="game hud">
      <div class="card"><span>Distance</span><strong id="distanceText">0m</strong></div>
      <div class="card"><span>Best</span><strong id="bestText">0m</strong></div>
      <div class="card"><span>Hull</span><strong id="hullText">♥♥♥</strong></div>
      <div class="card"><span>Cargo Bias</span><strong id="cargoText">CENTER</strong></div>
      <div class="card"><span>Spotlight</span><strong id="spotText">0 / 3</strong></div>
      <div class="card"><span>Medal</span><strong id="medalText">None</strong></div>
    </section>

    <section class="stage">
      <canvas id="gameCanvas" width="390" height="844" aria-label="Canyon Cargo Switchback game canvas"></canvas>
      <div id="toast" class="toast" aria-live="polite"></div>
      <div id="banner" class="banner" aria-live="polite">Spotlight Save</div>
      <div id="overlay" class="overlay show">
        <div class="overlay-card" id="overlayCard"></div>
      </div>
    </section>

    <section class="controls" aria-label="touch controls">
      <button id="leftBtn" class="action-left">⟵ SHIFT LEFT</button>
      <button id="actionBtn" class="action-mid">BRAKE / HOLD</button>
      <button id="rightBtn" class="action-right">SHIFT RIGHT ⟶</button>
    </section>

    <p class="footer-hint">좌우로 화물을 밀면 트럭이 조금 늦게 따라옵니다. 절벽 가장자리와 바위를 아슬아슬하게 스치면 Spotlight가 켜지고, 계약 게이트에서는 원하는 계약 쪽으로 진입하세요.</p>
  </main>

  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'canyon-cargo-switchback-save-v1';
      const WIDTH = 390;
      const HEIGHT = 844;
      const HORIZON = 142;
      const PLAYER_Y = 690;
      const VIEW_DISTANCE = 580;
      const CENTER_X = WIDTH * 0.5;

      const EFFECT_COLORS = {
        BONUS: '#ffbf47',
        SHIELD: '#65c26e',
        BOOST: '#56b4ff'
      };

      const EFFECT_TEXT = {
        BONUS: 'BONUS',
        SHIELD: 'SHIELD',
        BOOST: 'BOOST'
      };

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('overlay');
      const overlayCard = document.getElementById('overlayCard');
      const toastEl = document.getElementById('toast');
      const bannerEl = document.getElementById('banner');

      const distanceText = document.getElementById('distanceText');
      const bestText = document.getElementById('bestText');
      const hullText = document.getElementById('hullText');
      const cargoText = document.getElementById('cargoText');
      const spotText = document.getElementById('spotText');
      const medalText = document.getElementById('medalText');
      const bestBadge = document.getElementById('bestBadge');

      const leftBtn = document.getElementById('leftBtn');
      const actionBtn = document.getElementById('actionBtn');
      const rightBtn = document.getElementById('rightBtn');

      let audioCtx = null;
      let previousTime = 0;
      let startButton = null;

      const input = {
        left: false,
        right: false,
        brake: false
      };

      const state = {
        mode: 'title',
        time: 0,
        distance: 0,
        bestDistance: 0,
        bestMedal: 0,
        hull: 3,
        shield: 0,
        truckX: CENTER_X,
        truckLean: 0,
        lateralVel: 0,
        cargoTarget: 0,
        cargoBias: 0,
        speed: 24,
        boostTimer: 0,
        invulnerable: 0,
        spotlightMeter: 0,
        spotlightTimer: 0,
        spotlightFlash: 0,
        shake: 0,
        combo: 0,
        nextObstacleZ: 110,
        nextGateZ: 280,
        obstacles: [],
        gates: [],
        dust: [],
        edgeRisk: 0,
        edgeCooldown: 0,
        toast: '',
        toastTimer: 0,
        toastColor: '#3a2417',
        nearMisses: 0,
        contracts: 0,
        contractPayout: 0
      };

      loadProgress();
      resetRun();
      state.mode = 'title';
      updateHud();
      renderOverlay();

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeOut(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function difficultyAt(distance) {
        return clamp((distance - 180) / 2200, 0, 1);
      }

      function medalRank(distance) {
        if (distance >= 2200) return 3;
        if (distance >= 1500) return 2;
        if (distance >= 800) return 1;
        return 0;
      }

      function medalName(rank) {
        return ['None', 'Bronze', 'Silver', 'Gold'][rank] || 'None';
      }

      function medalColor(rank) {
        return ['#8c6a52', '#c88a42', '#94a8b7', '#e2b84f'][rank] || '#8c6a52';
      }

      function effectPair() {
        const effects = ['BONUS', 'SHIELD', 'BOOST'];
        const firstIndex = Math.floor(Math.random() * effects.length);
        const first = effects[firstIndex];
        const rest = effects.filter((effect) => effect !== first);
        const second = rest[Math.floor(Math.random() * rest.length)];
        if (Math.random() < 0.5) {
          return { left: first, right: second };
        }
        return { left: second, right: first };
      }

      function ensureAudio() {
        if (!audioCtx) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return;
          audioCtx = new AudioContextClass();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }

      function beep(frequency, duration = 0.07, type = 'sine', gainValue = 0.035) {
        if (!audioCtx) return;
        const startAt = audioCtx.currentTime;
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, startAt);
        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(gainValue, startAt + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
        oscillator.connect(gain).connect(audioCtx.destination);
        oscillator.start(startAt);
        oscillator.stop(startAt + duration + 0.02);
      }

      function loadProgress() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          state.bestDistance = Number(parsed.bestDistance) || 0;
          state.bestMedal = Number(parsed.bestMedal) || 0;
        } catch (error) {
          state.bestDistance = 0;
          state.bestMedal = 0;
        }
      }

      function saveProgress() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          bestDistance: Math.round(state.bestDistance),
          bestMedal: state.bestMedal
        }));
      }

      function updateBestBadge() {
        bestBadge.textContent = `BEST ${Math.floor(state.bestDistance)}m · ${medalName(state.bestMedal)}`;
      }

      function resetRun() {
        state.time = 0;
        state.distance = 0;
        state.hull = 3;
        state.shield = 0;
        state.truckX = CENTER_X;
        state.truckLean = 0;
        state.lateralVel = 0;
        state.cargoTarget = 0;
        state.cargoBias = 0;
        state.speed = 24;
        state.boostTimer = 0;
        state.invulnerable = 0;
        state.spotlightMeter = 0;
        state.spotlightTimer = 0;
        state.spotlightFlash = 0;
        state.shake = 0;
        state.combo = 0;
        state.nextObstacleZ = 115;
        state.nextGateZ = 270 + Math.random() * 40;
        state.obstacles.length = 0;
        state.gates.length = 0;
        state.dust.length = 0;
        state.edgeRisk = 0;
        state.edgeCooldown = 0;
        state.toast = '';
        state.toastTimer = 0;
        state.toastColor = '#3a2417';
        state.nearMisses = 0;
        state.contracts = 0;
        state.contractPayout = 0;
        updateBestBadge();
      }

      function startGame() {
        ensureAudio();
        resetRun();
        state.mode = 'play';
        overlay.classList.remove('show');
        beep(420, 0.08, 'triangle', 0.045);
      }

      function endGame() {
        state.mode = 'gameover';
        const runMedal = medalRank(state.distance);
        if (state.distance > state.bestDistance) {
          state.bestDistance = state.distance;
        }
        if (runMedal > state.bestMedal) {
          state.bestMedal = runMedal;
        }
        saveProgress();
        updateHud();
        renderOverlay();
        overlay.classList.add('show');
        beep(180, 0.18, 'sawtooth', 0.045);
      }

      function roadProfile(z) {
        const difficulty = difficultyAt(z);
        const teaching = clamp(z / 520, 0, 1);
        const ampA = lerp(16, 62, difficulty) * teaching;
        const ampB = lerp(8, 34, difficulty) * teaching;
        const ampC = lerp(0, 18, difficulty) * teaching;
        const center = CENTER_X
          + Math.sin(z * 0.0062) * ampA
          + Math.sin(z * 0.013 + 1.4) * ampB
          + Math.sin(z * 0.022 + 4.2) * ampC;
        const halfWidth = lerp(122, 88, difficulty) - Math.sin(z * 0.003 + 0.8) * 7;
        return { center, halfWidth };
      }

      function project(z) {
        const relative = z - state.distance;
        if (relative < 0 || relative > VIEW_DISTANCE) return null;
        const depth = relative / VIEW_DISTANCE;
        const near = 1 - depth;
        const profile = roadProfile(z);
        const factor = 0.22 + near * 0.78;
        const center = CENTER_X + (profile.center - CENTER_X) * factor;
        const roadHalf = 20 + profile.halfWidth * near;
        const y = HORIZON + Math.pow(near, 1.75) * (PLAYER_Y - HORIZON);
        const scale = 0.26 + near * 1.04;
        return { center, roadHalf, y, scale, near, relative };
      }

      function playerRoad() {
        const profile = roadProfile(state.distance + 8);
        return {
          center: profile.center,
          roadHalf: profile.halfWidth + 20
        };
      }

      function pushDust(amount, color, x) {
        for (let index = 0; index < amount; index += 1) {
          state.dust.push({
            x: x + (Math.random() - 0.5) * 18,
            y: PLAYER_Y + 18 + Math.random() * 18,
            vx: (Math.random() - 0.5) * 0.9,
            vy: -1.6 - Math.random() * 1.2,
            life: 0.42 + Math.random() * 0.3,
            radius: 2 + Math.random() * 4,
            color
          });
        }
      }

      function showToast(text, color = '#3a2417') {
        state.toast = text;
        state.toastTimer = 1.4;
        state.toastColor = color;
        toastEl.textContent = text;
        toastEl.style.background = color;
        toastEl.classList.add('show');
      }

      function showBanner(text) {
        bannerEl.textContent = text;
        bannerEl.classList.add('show');
      }

      function clearBanner() {
        bannerEl.classList.remove('show');
      }

      function spawnObstacleCluster() {
        const difficulty = difficultyAt(state.nextObstacleZ);
        let clusters = 1;
        if (Math.random() < 0.16 + difficulty * 0.28) clusters = 2;
        for (let index = 0; index < clusters; index += 1) {
          const offset = (Math.random() * 1.4 - 0.7) * (clusters === 2 ? 0.9 : 1);
          state.obstacles.push({
            id: `${Math.round(state.nextObstacleZ)}-${index}-${Math.random().toString(36).slice(2, 6)}`,
            z: state.nextObstacleZ + index * (clusters === 2 ? 22 : 0),
            offset,
            radius: 18 + Math.random() * 12,
            passed: false,
            nearDone: false
          });
        }
        const interval = lerp(96, 56, difficulty) + Math.random() * 22;
        state.nextObstacleZ += interval;
        if (Math.abs(state.nextObstacleZ - state.nextGateZ) < 72) {
          state.nextObstacleZ += 76;
        }
      }

      function spawnGate() {
        const pair = effectPair();
        state.gates.push({
          z: state.nextGateZ,
          left: pair.left,
          right: pair.right,
          chosen: false,
          flash: 0
        });
        state.nextGateZ += 230 + Math.random() * 90;
      }

      function grantNearMiss(label, color) {
        state.nearMisses += 1;
        state.combo += 1;
        state.spotlightMeter += 1;
        showToast(label, color);
        beep(660, 0.05, 'triangle', 0.03);
        if (state.spotlightMeter >= 3) {
          triggerSpotlight();
        }
      }

      function triggerSpotlight() {
        state.spotlightMeter = 0;
        state.spotlightTimer = 1.4;
        state.spotlightFlash = 0.9;
        state.distance += 70;
        state.contractPayout += 70;
        showBanner('SPOTLIGHT SAVE');
        showToast('+70m Spotlight payout', 'rgba(47, 156, 149, 0.9)');
        beep(780, 0.12, 'sine', 0.045);
      }

      function applyGateEffect(effect) {
        state.contracts += 1;
        state.combo += 1;
        if (effect === 'BONUS') {
          const payout = 90 + Math.round(Math.random() * 30);
          state.distance += payout;
          state.contractPayout += payout;
          showToast(`Contract ${EFFECT_TEXT[effect]} +${payout}m`, 'rgba(255, 191, 71, 0.92)');
          beep(520, 0.09, 'triangle', 0.045);
        } else if (effect === 'SHIELD') {
          if (state.shield < 1) {
            state.shield = 1;
            showToast('Contract SHIELD armed', 'rgba(101, 194, 110, 0.92)');
          } else {
            state.distance += 45;
            state.contractPayout += 45;
            showToast('Shield converted to salvage +45m', 'rgba(101, 194, 110, 0.92)');
          }
          beep(380, 0.1, 'sine', 0.04);
        } else if (effect === 'BOOST') {
          state.boostTimer = Math.max(state.boostTimer, 5.4);
          showToast('Contract BOOST 5s', 'rgba(86, 180, 255, 0.92)');
          beep(620, 0.08, 'square', 0.035);
        }
      }

      function takeHit(reason) {
        if (state.invulnerable > 0 || state.mode !== 'play') return;
        state.invulnerable = 1.15;
        state.shake = 12;
        state.combo = 0;
        pushDust(12, 'rgba(168, 94, 58, 0.42)', state.truckX);
        if (state.shield > 0) {
          state.shield = 0;
          showToast(`Shield broke on ${reason}`, 'rgba(101, 194, 110, 0.92)');
          beep(280, 0.12, 'triangle', 0.05);
          return;
        }
        state.hull -= 1;
        showToast(`Hull hit by ${reason}`, 'rgba(199, 68, 68, 0.92)');
        beep(160, 0.14, 'sawtooth', 0.055);
        if (state.hull <= 0) {
          state.hull = 0;
          endGame();
        }
      }

      function updateHud() {
        const currentMedal = medalRank(state.distance);
        distanceText.textContent = `${Math.floor(state.distance)}m`;
        bestText.textContent = `${Math.floor(state.bestDistance)}m`;
        hullText.textContent = `${'♥'.repeat(state.hull)}${'·'.repeat(3 - state.hull)}${state.shield ? ' ◈' : ''}`;
        const cargoPercent = Math.round(Math.abs(state.cargoBias) * 100);
        cargoText.textContent = cargoPercent < 8 ? 'CENTER' : `${state.cargoBias < 0 ? 'LEFT' : 'RIGHT'} ${cargoPercent}%`;
        spotText.textContent = state.spotlightTimer > 0 ? 'LIVE' : `${Math.min(3, state.spotlightMeter)} / 3`;
        medalText.textContent = medalName(currentMedal);
        medalText.style.color = medalColor(currentMedal);
        updateBestBadge();
      }

      function renderOverlay() {

          overlayCard.innerHTML = `

            <div class="overlay-grid">
              <div class="mini"><b>Controls</b>← / A, → / D 로 화물 이동<br>Space 또는 가운데 버튼으로 브레이크</div>
              <div class="mini"><b>Wow Loop</b>Weight-Shift, Contract Gate, Spotlight Save가 한 런 안에서 겹쳐집니다</div>
            </div>
            <div class="ladder">
              <div><strong>Medal Ladder</strong></div>
              <div>Bronze 800m, Silver 1500m, Gold 2200m</div>
              <div>Best ${best}m · Best Medal ${bestMedalName}</div>
            </div>
            <div class="row">
              <span class="chip">Contract BONUS, SHIELD, BOOST</span>
              <span class="chip">Near-miss 3회로 Spotlight</span>

              <button id="overlayStartBtn" class="primary" style="width: 100%;">Start Run</button>
            </div>
          `;
        } else if (state.mode === 'gameover') {
          const runDistance = Math.floor(state.distance);
          const runMedal = medalName(medalRank(state.distance));
          overlayCard.innerHTML = `
            <div class="overlay-title">Run Over</div>
            <p class="overlay-sub">캐니언이 화물을 끝내 버텨내지 못했습니다. 그래도 계약은 남습니다. 다시 싣고 바로 내려가죠.</p>
            <div class="overlay-grid">
              <div class="mini"><b>Run</b>${runDistance}m<br>${runMedal} Contract</div>
              <div class="mini"><b>Best</b>${best}m<br>${bestMedalName}</div>
              <div class="mini"><b>Spotlight</b>${state.nearMisses} near-miss<br>${state.contracts} contracts</div>
              <div class="mini"><b>Payout</b>${Math.floor(state.contractPayout)}m salvage<br>Hull ${state.hull}/3</div>
            </div>
            <div class="ladder">
              <div><strong>Try a new route</strong></div>
              <div>초반은 넓고, 30초 이후부터 도로가 좁아집니다. 절벽에서 빠져나온 직후 Spotlight를 노리고 다음 게이트에서 BOOST나 SHIELD를 고르세요.</div>
            </div>
            <div class="row" style="margin-top: 14px;">
              <button id="overlayStartBtn" class="primary" style="width: 100%;">Restart</button>
            </div>
          `;
        }
        startButton = document.getElementById('overlayStartBtn');
        if (startButton) {
          startButton.addEventListener('click', startGame);
        }
      }

      function updateButtons() {
        const disabled = state.mode !== 'play';
        leftBtn.disabled = disabled;
        actionBtn.disabled = disabled;
        rightBtn.disabled = disabled;
      }

      function bindHold(button, key) {
        const down = (event) => {
          event.preventDefault();
          ensureAudio();
          if (state.mode !== 'play') return;
          input[key] = true;
          button.classList.add('on');
        };
        const up = (event) => {
          event.preventDefault();
          input[key] = false;
          button.classList.remove('on');
        };
        button.addEventListener('pointerdown', down);
        button.addEventListener('pointerup', up);
        button.addEventListener('pointercancel', up);
        button.addEventListener('pointerleave', up);
      }

      bindHold(leftBtn, 'left');
      bindHold(actionBtn, 'brake');
      bindHold(rightBtn, 'right');

      window.addEventListener('keydown', (event) => {
        if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'Space', 'Enter'].includes(event.code)) {
          event.preventDefault();
        }
        if (event.repeat) return;
        if (event.code === 'Enter') {
          if (state.mode !== 'play') {
            startGame();
          }
          return;
        }
        if (event.code === 'Space') {
          if (state.mode !== 'play') {
            startGame();
          } else {
            ensureAudio();
            input.brake = true;
            actionBtn.classList.add('on');
          }
          return;
        }
        if (state.mode !== 'play') return;
        if (event.code === 'ArrowLeft' || event.code === 'KeyA') {
          input.left = true;
          leftBtn.classList.add('on');
        }
        if (event.code === 'ArrowRight' || event.code === 'KeyD') {
          input.right = true;
          rightBtn.classList.add('on');
        }
      }, { passive: false });

      window.addEventListener('keyup', (event) => {
        if (event.code === 'ArrowLeft' || event.code === 'KeyA') {
          input.left = false;
          leftBtn.classList.remove('on');
        }
        if (event.code === 'ArrowRight' || event.code === 'KeyD') {
          input.right = false;
          rightBtn.classList.remove('on');
        }
        if (event.code === 'Space') {
          input.brake = false;
          actionBtn.classList.remove('on');
        }
      });

      window.addEventListener('blur', () => {
        input.left = false;
        input.right = false;
        input.brake = false;
        leftBtn.classList.remove('on');
        rightBtn.classList.remove('on');
        actionBtn.classList.remove('on');
      });

      function updatePlay(delta) {
        const timeScale = state.spotlightTimer > 0 ? 0.55 : 1;
        const dt = delta * timeScale;
        state.time += dt;
        state.invulnerable = Math.max(0, state.invulnerable - dt);
        state.boostTimer = Math.max(0, state.boostTimer - dt);
        state.spotlightTimer = Math.max(0, state.spotlightTimer - dt);
        state.spotlightFlash = Math.max(0, state.spotlightFlash - delta * 1.6);
        state.shake = Math.max(0, state.shake - delta * 30);
        state.edgeCooldown = Math.max(0, state.edgeCooldown - dt);
        if (state.spotlightTimer === 0) {
          clearBanner();
        }

        const difficulty = difficultyAt(state.distance);
        const targetSpeed = 23 + difficulty * 13 + (state.boostTimer > 0 ? 6.4 : 0) - (input.brake ? 6.5 : 0);
        state.speed = lerp(state.speed, targetSpeed, 0.055);
        state.distance += Math.max(10, state.speed) * dt;

        if (input.left && !input.right) {
          state.cargoTarget -= dt * 2.4;
        } else if (input.right && !input.left) {
          state.cargoTarget += dt * 2.4;
        } else {
          state.cargoTarget *= Math.max(0, 1 - dt * 2.2);
        }
        state.cargoTarget = clamp(state.cargoTarget, -1, 1);
        state.cargoBias += (state.cargoTarget - state.cargoBias) * Math.min(1, dt * 4.2);
        state.lateralVel += state.cargoBias * 230 * dt;
        state.lateralVel *= Math.max(0, 1 - dt * (input.brake ? 4.8 : 2.8));
        state.truckX += state.lateralVel * dt;
        state.truckLean = lerp(state.truckLean, state.cargoBias * 12 + state.lateralVel * 0.03, 0.12);

        while (state.nextObstacleZ < state.distance + VIEW_DISTANCE + 80) {
          spawnObstacleCluster();
        }
        while (state.nextGateZ < state.distance + VIEW_DISTANCE + 120) {
          spawnGate();
        }

        const road = playerRoad();
        const edgeDistance = road.roadHalf - Math.abs(state.truckX - road.center);
        if (edgeDistance < 18 && state.edgeCooldown <= 0) {
          state.edgeRisk += dt;
          if (edgeDistance < -10) {
            state.truckX = road.center + Math.sign(state.truckX - road.center || 1) * (road.roadHalf - 18);
            state.lateralVel *= -0.24;
            state.edgeRisk = 0;
            state.edgeCooldown = 0.8;
            takeHit('the cliff');
          }
        } else {
          if (state.edgeRisk > 0.18 && state.edgeCooldown <= 0) {
            state.edgeCooldown = 0.9;
            grantNearMiss('Edge save', 'rgba(47, 156, 149, 0.9)');
          }
          state.edgeRisk = Math.max(0, state.edgeRisk - dt * 4);
        }

        state.obstacles = state.obstacles.filter((obstacle) => obstacle.z > state.distance - 40);
        state.gates = state.gates.filter((gate) => gate.z > state.distance - 28);

        for (const gate of state.gates) {
          gate.flash = Math.max(0, gate.flash - dt * 2.2);
          if (!gate.chosen && gate.z - state.distance <= 4) {
            const side = state.truckX < road.center ? 'left' : 'right';
            const effect = gate[side];
            gate.chosen = true;
            gate.flash = 1;
            applyGateEffect(effect);
          }
        }

        for (const obstacle of state.obstacles) {
          const sample = project(obstacle.z);
          if (!sample) continue;
          const obstacleX = sample.center + obstacle.offset * (sample.roadHalf - 16);
          const obstacleY = sample.y;
          const renderRadius = obstacle.radius * sample.scale;
          if (!obstacle.nearDone && obstacleY >= PLAYER_Y - 18) {
            obstacle.nearDone = true;
            const dx = Math.abs(obstacleX - state.truckX);
            const dy = Math.abs(obstacleY - PLAYER_Y);
            const collisionRange = renderRadius + 22;
            if (dx < collisionRange && dy < 30) {
              state.lateralVel *= -0.22;
              takeHit('a rock');
            } else if (dx < renderRadius + 40 && dy < 34) {
              grantNearMiss('Rock skim', 'rgba(255, 191, 71, 0.92)');
            }
          }
        }

        for (let index = state.dust.length - 1; index >= 0; index -= 1) {
          const puff = state.dust[index];
          puff.life -= delta;
          puff.x += puff.vx * 18;
          puff.y += puff.vy * 12;
          puff.radius *= 0.985;
          if (puff.life <= 0 || puff.radius < 0.6) {
            state.dust.splice(index, 1);
          }
        }

        if (Math.random() < 0.45) {
          const side = Math.random() < 0.5 ? -1 : 1;
          const roadEdge = road.center + side * (road.roadHalf - 8);
          pushDust(1, side < 0 ? 'rgba(198, 133, 87, 0.25)' : 'rgba(222, 167, 107, 0.24)', roadEdge);
        }

        if (state.toastTimer > 0) {
          state.toastTimer -= delta;
          if (state.toastTimer <= 0) {
            toastEl.classList.remove('show');
          }
        }

        if (state.mode === 'play' && state.hull <= 0) {
          endGame();
        }
      }

      function drawBackground() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
        sky.addColorStop(0, '#fee8b8');
        sky.addColorStop(0.45, '#f8d39b');
        sky.addColorStop(1, '#d98b5c');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = 'rgba(255, 245, 213, 0.65)';
        ctx.beginPath();
        ctx.arc(300, 108, 44, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
        for (let index = 0; index < 5; index += 1) {
          const x = 54 + index * 72 + Math.sin(state.time * 0.3 + index) * 8;
          const y = 80 + (index % 2) * 22;
          ctx.beginPath();
          ctx.ellipse(x, y, 22, 10, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawRoad() {
        const leftWall = [];
        const rightWall = [];
        const roadLeft = [];
        const roadRight = [];
        const stripes = [];

        for (let step = 0; step <= 34; step += 1) {
          const z = state.distance + (VIEW_DISTANCE * step) / 34;
          const sample = project(z);
          if (!sample) continue;
          const left = sample.center - sample.roadHalf;
          const right = sample.center + sample.roadHalf;
          roadLeft.push({ x: left, y: sample.y });
          roadRight.push({ x: right, y: sample.y });
          leftWall.push({ x: Math.max(-30, left - (46 + sample.near * 54)), y: sample.y + 5 });
          rightWall.push({ x: Math.min(WIDTH + 30, right + (46 + sample.near * 54)), y: sample.y + 5 });
          if (step < 34) {
            stripes.push({ x: sample.center, y: sample.y, w: 4 + sample.near * 7, h: 12 + sample.near * 24 });
          }
        }

        ctx.beginPath();
        ctx.moveTo(0, HEIGHT);
        for (let index = 0; index < leftWall.length; index += 1) {
          ctx.lineTo(leftWall[index].x, leftWall[index].y);
        }
        for (let index = roadLeft.length - 1; index >= 0; index -= 1) {
          ctx.lineTo(roadLeft[index].x, roadLeft[index].y);
        }
        ctx.closePath();
        const canyonLeft = ctx.createLinearGradient(0, HORIZON, 0, HEIGHT);
        canyonLeft.addColorStop(0, '#d3885f');
        canyonLeft.addColorStop(1, '#9b5a3a');
        ctx.fillStyle = canyonLeft;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(WIDTH, HEIGHT);
        for (let index = 0; index < rightWall.length; index += 1) {
          ctx.lineTo(rightWall[index].x, rightWall[index].y);
        }
        for (let index = roadRight.length - 1; index >= 0; index -= 1) {
          ctx.lineTo(roadRight[index].x, roadRight[index].y);
        }
        ctx.closePath();
        const canyonRight = ctx.createLinearGradient(0, HORIZON, 0, HEIGHT);
        canyonRight.addColorStop(0, '#e49a67');
        canyonRight.addColorStop(1, '#a25f3f');
        ctx.fillStyle = canyonRight;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(roadLeft[0].x, roadLeft[0].y);
        for (let index = 1; index < roadLeft.length; index += 1) {
          ctx.lineTo(roadLeft[index].x, roadLeft[index].y);
        }
        for (let index = roadRight.length - 1; index >= 0; index -= 1) {
          ctx.lineTo(roadRight[index].x, roadRight[index].y);
        }
        ctx.closePath();
        const asphalt = ctx.createLinearGradient(0, HORIZON, 0, PLAYER_Y + 80);
        asphalt.addColorStop(0, '#8b6b54');
        asphalt.addColorStop(1, '#6f5341');
        ctx.fillStyle = asphalt;
        ctx.fill();

        ctx.strokeStyle = 'rgba(246, 217, 168, 0.95)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        for (let index = 0; index < roadLeft.length; index += 1) {
          const point = roadLeft[index];
          if (index === 0) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        }
        ctx.stroke();

        ctx.beginPath();
        for (let index = 0; index < roadRight.length; index += 1) {
          const point = roadRight[index];
          if (index === 0) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        }
        ctx.stroke();

        ctx.fillStyle = 'rgba(252, 235, 203, 0.66)';
        for (let index = 0; index < stripes.length; index += 2) {
          const stripe = stripes[index];
          ctx.fillRect(stripe.x - stripe.w * 0.5, stripe.y - stripe.h * 0.5, stripe.w, stripe.h);
        }
      }

      function drawGate(gate) {
        const sample = project(gate.z);
        if (!sample) return;
        const width = sample.roadHalf * 0.88;
        const height = 22 + sample.scale * 24;
        const leftX = sample.center - width;
        const rightX = sample.center + 8;
        const panelWidth = width - 8;
        const y = sample.y - height * 0.78;

        ctx.save();
        ctx.globalAlpha = 0.84 + gate.flash * 0.12;
        ctx.fillStyle = EFFECT_COLORS[gate.left];
        ctx.fillRect(leftX, y, panelWidth, height);
        ctx.fillStyle = EFFECT_COLORS[gate.right];
        ctx.fillRect(rightX, y, panelWidth, height);
        ctx.fillStyle = 'rgba(255,255,255,0.16)';
        ctx.fillRect(leftX, y, panelWidth, 5 + sample.scale * 2);
        ctx.fillRect(rightX, y, panelWidth, 5 + sample.scale * 2);
        ctx.restore();

        ctx.strokeStyle = 'rgba(90, 53, 29, 0.45)';
        ctx.lineWidth = 2;
        ctx.strokeRect(leftX, y, panelWidth, height);
        ctx.strokeRect(rightX, y, panelWidth, height);

        ctx.fillStyle = 'rgba(58, 36, 23, 0.92)';
        ctx.font = `${Math.max(10, 9 + sample.scale * 4)}px system-ui`;
        ctx.textAlign = 'center';
        ctx.fillText(EFFECT_TEXT[gate.left], leftX + panelWidth * 0.5, y + height * 0.62);
        ctx.fillText(EFFECT_TEXT[gate.right], rightX + panelWidth * 0.5, y + height * 0.62);
      }

      function drawObstacle(obstacle) {
        const sample = project(obstacle.z);
        if (!sample) return;
        const x = sample.center + obstacle.offset * (sample.roadHalf - 16);
        const radius = obstacle.radius * sample.scale;
        const y = sample.y;
        ctx.fillStyle = '#6a4a38';
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 223, 183, 0.18)';
        ctx.beginPath();
        ctx.arc(x - radius * 0.24, y - radius * 0.28, radius * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawDust() {
        for (const puff of state.dust) {
          ctx.globalAlpha = clamp(puff.life * 1.2, 0, 1);
          ctx.fillStyle = puff.color;
          ctx.beginPath();
          ctx.arc(puff.x, puff.y, puff.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawTruck() {
        const road = playerRoad();
        const lean = clamp(state.truckLean, -18, 18) * Math.PI / 180;
        const flicker = state.invulnerable > 0 && Math.floor(state.time * 16) % 2 === 0;
        const x = state.truckX + (Math.random() - 0.5) * state.shake;
        const y = PLAYER_Y;
        const cargoOffset = state.cargoBias * 16;

        if (state.spotlightTimer > 0) {
          const beam = ctx.createRadialGradient(x, y - 14, 12, x, y - 14, 180);
          beam.addColorStop(0, 'rgba(255, 255, 245, 0.42)');
          beam.addColorStop(1, 'rgba(255, 255, 245, 0)');
          ctx.fillStyle = beam;
          ctx.beginPath();
          ctx.ellipse(x, y - 30, 132, 208, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(lean);
        ctx.globalAlpha = flicker ? 0.5 : 1;

        ctx.fillStyle = 'rgba(56, 31, 16, 0.22)';
        ctx.beginPath();
        ctx.ellipse(0, 44, 36, 14, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ba6944';
        ctx.fillRect(-20, -40, 40, 56);
        ctx.fillStyle = '#dd8555';
        ctx.fillRect(-28, -12, 56, 30);
        ctx.fillStyle = '#fbf1df';
        ctx.fillRect(-13, -32, 26, 14);

        ctx.fillStyle = '#80523a';
        ctx.fillRect(-18 + cargoOffset, -8, 36, 22);
        ctx.fillStyle = '#f8d28b';
        ctx.fillRect(-12 + cargoOffset, -4, 24, 12);

        ctx.fillStyle = '#3e2d25';
        ctx.fillRect(-28, -6, 8, 24);
        ctx.fillRect(20, -6, 8, 24);
        ctx.fillRect(-26, -42, 8, 18);
        ctx.fillRect(18, -42, 8, 18);

        ctx.strokeStyle = 'rgba(80, 47, 27, 0.5)';
        ctx.lineWidth = 3;
        ctx.strokeRect(-28, -12, 56, 30);
        ctx.strokeRect(-20, -40, 40, 56);

        ctx.restore();

        if (Math.abs(state.cargoBias) > 0.2) {
          pushDust(1, 'rgba(235, 199, 138, 0.16)', x + Math.sign(state.cargoBias) * 18);
        }

        const edgeDistance = road.roadHalf - Math.abs(state.truckX - road.center);
        if (edgeDistance < 26) {
          ctx.fillStyle = 'rgba(199, 68, 68, 0.16)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
        }
      }

      function fillRoundRect(x, y, width, height, radius) {
        const r = Math.min(radius, width * 0.5, height * 0.5);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + width - r, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + r);
        ctx.lineTo(x + width, y + height - r);
        ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        ctx.lineTo(x + r, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        ctx.fill();
      }

      function drawTopCallouts() {
        ctx.save();
        ctx.fillStyle = 'rgba(255, 250, 241, 0.92)';
        fillRoundRect(16, HEIGHT - 124, 156, 64, 18);
        ctx.fillStyle = 'rgba(58, 36, 23, 0.88)';
        ctx.font = '800 13px system-ui';
        ctx.textAlign = 'left';
        ctx.fillText(`Speed ${Math.floor(state.speed)} m/s`, 28, HEIGHT - 95);
        ctx.fillText(`Contracts ${state.contracts}`, 28, HEIGHT - 74);
        ctx.fillText(`Payout ${Math.floor(state.contractPayout)}m`, 28, HEIGHT - 53);

        if (state.boostTimer > 0) {
          ctx.fillStyle = 'rgba(86, 180, 255, 0.9)';
          fillRoundRect(WIDTH - 140, HEIGHT - 112, 112, 38, 16);
          ctx.fillStyle = '#fffdf7';
          ctx.textAlign = 'center';
          ctx.fillText(`BOOST ${state.boostTimer.toFixed(1)}s`, WIDTH - 84, HEIGHT - 87);
        }
        ctx.restore();
      }

      function drawScene() {
        drawBackground();
        drawRoad();
        for (const gate of state.gates) drawGate(gate);
        for (const obstacle of state.obstacles) drawObstacle(obstacle);
        drawDust();
        drawTruck();
        drawTopCallouts();

        if (state.spotlightFlash > 0) {
          ctx.fillStyle = `rgba(255,255,245,${state.spotlightFlash * 0.18})`;
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
        }

        if (state.mode === 'title') {
          ctx.fillStyle = 'rgba(58, 36, 23, 0.26)';
          ctx.font = '700 18px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText('Cargo first, truck second.', WIDTH * 0.5, HEIGHT * 0.52);
        }
      }

      function tick(timestamp) {
        if (!previousTime) previousTime = timestamp;
        const delta = Math.min(0.032, (timestamp - previousTime) / 1000);
        previousTime = timestamp;

        if (state.mode === 'play') {
          updatePlay(delta);
        } else if (state.toastTimer > 0) {
          state.toastTimer -= delta;
          if (state.toastTimer <= 0) {
            toastEl.classList.remove('show');
          }
        }

        updateHud();
        updateButtons();
        drawScene();
        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
