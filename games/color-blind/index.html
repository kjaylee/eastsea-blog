<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
<meta name="google-adsense-account" content="ca-pub-7252382819928130">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7252382819928130" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Color Blind — 색맹 시뮬레이션 퍼즐</title>
<meta name="description" content="Play Color Blind — 색맹 시뮬레이션 퍼즐 - Free HTML5 browser game on eastsea.monster. No download required.">
  <meta name="theme-color" content="#0a0a1a" />
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: rgba(14, 18, 40, 0.92);
      --line: rgba(96, 214, 255, 0.34);
      --text: #e8f4ff;
      --muted: #9db5da;
      --cyan: #61e8ff;
      --purple: #c58bff;
      --pink: #ff6fb4;
      --good: #6dffbc;
      --warn: #ffd86f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at 20% -20%, #1c2058 0%, #0a0a1a 55%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 10px;
      touch-action: manipulation;
    }

    .app {
      width: min(100vw, 980px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 0 24px rgba(97, 232, 255, 0.18);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: end;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.05rem, 4vw, 1.4rem);
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(97, 232, 255, 0.46);
    }

    .pitch { font-size: 0.83rem; color: #d8e6ff; }
    .mini { font-size: 0.75rem; color: var(--muted); }

    .hud {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .card {
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10, 12, 30, 0.9);
      min-height: 60px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .k {
      font-size: 0.64rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .v { font-size: 1.02rem; font-weight: 700; }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1.2fr 1.2fr;
      gap: 8px;
    }

    button, select {
      border: 1px solid rgba(97, 232, 255, 0.5);
      background: rgba(97, 232, 255, 0.08);
      color: #e8f8ff;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 10px 8px;
    }

    button:disabled { opacity: 0.4; }

    .power-btn {
      border-color: rgba(197, 139, 255, 0.7);
      background: rgba(197, 139, 255, 0.14);
      color: #f4e9ff;
      box-shadow: 0 0 14px rgba(197, 139, 255, 0.24);
    }

    .canvas-wrap {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #070714;
      box-shadow: 0 0 28px rgba(97, 232, 255, 0.16);
    }

    canvas {
      width: 100%;
      aspect-ratio: 16 / 10;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .status {
      min-height: 22px;
      margin: 0;
      font-size: 0.83rem;
      color: #d6e7ff;
      padding: 0 2px;
    }

    .toast {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.58);
      padding: 6px 12px;
      font-size: 0.78rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100% - 20px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show { opacity: 1; }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(4, 6, 18, 0.76);
      backdrop-filter: blur(2px);
      padding: 12px;
    }

    .overlay.show { display: flex; }

    .result {
      width: min(92vw, 460px);
      border-radius: 14px;
      border: 1px solid rgba(97, 232, 255, 0.5);
      background: linear-gradient(180deg, rgba(20, 24, 58, 0.95), rgba(8, 10, 26, 0.93));
      box-shadow: 0 0 24px rgba(97, 232, 255, 0.24);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result h2 {
      margin: 0;
      color: var(--cyan);
      font-size: 1.14rem;
    }

    .result-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    @media (max-width: 840px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .actions { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">
      <div>
        <h1>Color Blind · 색맹 시뮬레이션 퍼즐</h1>
        <div class="pitch">"색이 달라 보이는 세계에서 진짜 같은 색을 찾아라"</div>
      </div>
      <div class="mini">탭/클릭으로 타일 2개 선택 · 파워업: 진짜 색 보기(3초)</div>
    </div>

    <div class="hud">
      <div class="card"><div class="k">레벨</div><div id="levelText" class="v">1 / 10</div></div>
      <div class="card"><div class="k">필터</div><div id="filterText" class="v">적녹색맹</div></div>
      <div class="card"><div class="k">남은 쌍</div><div id="pairsText" class="v">4</div></div>
      <div class="card"><div class="k">진행도</div><div id="progressText" class="v">1 / 10</div></div>
      <div class="card"><div class="k">시간</div><div id="timeText" class="v">0.0s</div></div>
    </div>

    <div class="actions">
      <button id="prevBtn">이전</button>
      <button id="restartBtn">재시작</button>
      <button id="nextBtn">다음</button>
      <button id="revealBtn" class="power-btn">진짜 색 보기 (3)</button>
      <select id="levelSelect" aria-label="레벨 선택"></select>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="960" height="600"></canvas>
      <div id="toast" class="toast"></div>
      <div id="overlay" class="overlay">
        <div class="result">
          <h2 id="resultTitle">레벨 클리어!</h2>
          <div id="resultBody" class="mini"></div>
          <div class="result-row">
            <button id="againBtn">현재 레벨 다시</button>
            <button id="goNextBtn">다음 레벨</button>
          </div>
        </div>
      </div>
    </div>

    <p id="statusText" class="status"></p>
  </div>

  <script>
    (() => {
      'use strict';

      const SAVE_KEY = 'color_blind_save_v1';
      const FILTER_KEYS = ['protanopia', 'tritanopia', 'achromatopsia'];
      const FILTER_LABEL = {
        protanopia: '적녹색맹',
        tritanopia: '청황색맹',
        achromatopsia: '완전색맹'
      };

      const LEVELS = [
        { pairs: 4, filter: 'protanopia', powerups: 3 },
        { pairs: 4, filter: 'protanopia', powerups: 3 },
        { pairs: 4, filter: 'protanopia', powerups: 3 },
        { pairs: 6, filter: 'tritanopia', powerups: 3 },
        { pairs: 6, filter: 'tritanopia', powerups: 3 },
        { pairs: 6, filter: 'tritanopia', powerups: 2 },
        { pairs: 8, filter: 'achromatopsia', powerups: 2 },
        { pairs: 8, filter: 'achromatopsia', powerups: 2 },
        { pairs: 10, filter: 'random', powerups: 2 },
        { pairs: 10, filter: 'random', powerups: 2 }
      ];

      // RGB -> LMS -> RGB (Brettel 계열 행렬)
      const RGB_TO_LMS = [
        [17.8824, 43.5161, 4.11935],
        [3.45565, 27.1554, 3.86714],
        [0.0299566, 0.184309, 1.46709]
      ];

      const LMS_TO_RGB = [
        [0.0809444479, -0.130504409, 0.116721066],
        [-0.0102485335, 0.0540193266, -0.113614708],
        [-0.000365296938, -0.00412161469, 0.693511405]
      ];

      const LMS_FILTERS = {
        protanopia: [
          [0, 1.05118294, -0.05116099],
          [0, 1, 0],
          [0, 0, 1]
        ],
        tritanopia: [
          [1, 0, 0],
          [0, 1, 0],
          [-0.86744736, 1.86727089, 0]
        ],
        achromatopsia: [
          [0.3333, 0.3333, 0.3333],
          [0.3333, 0.3333, 0.3333],
          [0.3333, 0.3333, 0.3333]
        ]
      };

      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const levelText = document.getElementById('levelText');
      const filterText = document.getElementById('filterText');
      const pairsText = document.getElementById('pairsText');
      const progressText = document.getElementById('progressText');
      const timeText = document.getElementById('timeText');
      const statusText = document.getElementById('statusText');

      const prevBtn = document.getElementById('prevBtn');
      const restartBtn = document.getElementById('restartBtn');
      const nextBtn = document.getElementById('nextBtn');
      const revealBtn = document.getElementById('revealBtn');
      const levelSelect = document.getElementById('levelSelect');

      const toastEl = document.getElementById('toast');
      const overlay = document.getElementById('overlay');
      const resultTitle = document.getElementById('resultTitle');
      const resultBody = document.getElementById('resultBody');
      const againBtn = document.getElementById('againBtn');
      const goNextBtn = document.getElementById('goNextBtn');

      const state = {
        viewW: 960,
        viewH: 600,
        levelIndex: 0,
        unlocked: 1,
        bestTimes: {},
        cfg: LEVELS[0],
        tiles: [],
        selected: [],
        pairsLeft: 0,
        cols: 4,
        rows: 2,
        lock: false,
        pending: null,
        particles: [],
        revealLeft: 0,
        powerupsLeft: 3,
        activeFilter: 'protanopia',
        randomSwitchLeft: 0,
        startedAt: performance.now(),
        elapsed: 0,
        cleared: false,
        toastLeft: 0,
        stars: Array.from({ length: 80 }, () => ({
          x: Math.random(),
          y: Math.random(),
          r: 0.4 + Math.random() * 1.8,
          s: 0.2 + Math.random() * 0.7,
          p: Math.random() * Math.PI * 2
        }))
      };

      let audioCtx = null;
      let audioReady = false;

      function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        audioReady = true;
      }

      function tone(freq, duration = 0.1, type = 'sine', volume = 0.12, toFreq = null, offset = 0) {
        if (!audioReady || !audioCtx) return;
        const t0 = audioCtx.currentTime + offset;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        if (toFreq) osc.frequency.exponentialRampToValueAtTime(toFreq, t0 + duration);
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), t0 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + duration + 0.02);
      }

      const sfx = {
        select() { tone(520, 0.05, 'triangle', 0.07, 610); },
        success() {
          tone(520, 0.12, 'sine', 0.11, 780);
          tone(780, 0.1, 'triangle', 0.08, 980, 0.03);
        },
        fail() {
          tone(210, 0.11, 'sawtooth', 0.15, 140);
          tone(140, 0.1, 'square', 0.11, null, 0.06);
        },
        reveal() {
          tone(420, 0.14, 'sine', 0.12, 930);
          tone(930, 0.08, 'triangle', 0.1, 420, 0.04);
        },
        clear() {
          [560, 740, 920, 1120].forEach((f, i) => tone(f, 0.13, 'sine', 0.11, null, i * 0.05));
        }
      };

      function clamp(v, min = 0, max = 1) {
        return Math.max(min, Math.min(max, v));
      }

      function srgbToLinear(v) {
        if (v <= 0.04045) return v / 12.92;
        return Math.pow((v + 0.055) / 1.055, 2.4);
      }

      function linearToSrgb(v) {
        if (v <= 0.0031308) return 12.92 * v;
        return 1.055 * Math.pow(v, 1 / 2.4) - 0.055;
      }

      function mulMat3Vec3(m, v) {
        return [
          m[0][0] * v[0] + m[0][1] * v[1] + m[0][2] * v[2],
          m[1][0] * v[0] + m[1][1] * v[1] + m[1][2] * v[2],
          m[2][0] * v[0] + m[2][1] * v[1] + m[2][2] * v[2]
        ];
      }

      function applyFilterRGB(rgb, filterKey) {
        if (!filterKey || filterKey === 'none') return rgb.slice();
        const lrgb = rgb.map((c) => srgbToLinear(clamp(c / 255)));
        const lms = mulMat3Vec3(RGB_TO_LMS, lrgb);
        const filteredLms = mulMat3Vec3(LMS_FILTERS[filterKey], lms);
        const outLinear = mulMat3Vec3(LMS_TO_RGB, filteredLms);
        return outLinear.map((c) => Math.round(clamp(linearToSrgb(clamp(c))) * 255));
      }

      function hsvToRgb(h, s, v) {
        const c = v * s;
        const hh = h / 60;
        const x = c * (1 - Math.abs((hh % 2) - 1));
        let r = 0, g = 0, b = 0;
        if (hh >= 0 && hh < 1) [r, g, b] = [c, x, 0];
        else if (hh < 2) [r, g, b] = [x, c, 0];
        else if (hh < 3) [r, g, b] = [0, c, x];
        else if (hh < 4) [r, g, b] = [0, x, c];
        else if (hh < 5) [r, g, b] = [x, 0, c];
        else [r, g, b] = [c, 0, x];
        const m = v - c;
        return [
          Math.round((r + m) * 255),
          Math.round((g + m) * 255),
          Math.round((b + m) * 255)
        ];
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = (Math.random() * (i + 1)) | 0;
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }

      function loadSave() {
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          state.unlocked = Math.max(1, Math.min(LEVELS.length, Number(parsed.unlocked) || 1));
          if (parsed.bestTimes && typeof parsed.bestTimes === 'object') state.bestTimes = parsed.bestTimes;
        } catch {}
      }

      function persist() {
        try {
          localStorage.setItem(SAVE_KEY, JSON.stringify({ unlocked: state.unlocked, bestTimes: state.bestTimes }));
        } catch {}
      }

      function randomFilter(except = null) {
        const pool = FILTER_KEYS.filter((k) => k !== except);
        return pool[(Math.random() * pool.length) | 0];
      }

      function computeGrid(tileCount) {
        if (tileCount <= 8) return { cols: 4, rows: 2 };
        if (tileCount <= 12) return { cols: 4, rows: 3 };
        if (tileCount <= 16) return { cols: 4, rows: 4 };
        return { cols: 5, rows: Math.ceil(tileCount / 5) };
      }

      function buildLevel(levelIndex) {
        state.levelIndex = levelIndex;
        state.cfg = LEVELS[levelIndex];
        const pairCount = state.cfg.pairs;
        const colors = [];

        for (let i = 0; i < pairCount; i++) {
          const h = (i * (360 / pairCount) + levelIndex * 19 + Math.random() * 16) % 360;
          const s = 0.65 + Math.random() * 0.28;
          const v = 0.66 + Math.random() * 0.26;
          colors.push(hsvToRgb(h, s, v));
        }

        const tiles = [];
        for (let pairId = 0; pairId < pairCount; pairId++) {
          for (let c = 0; c < 2; c++) {
            tiles.push({
              id: `${pairId}-${c}-${Math.random().toString(36).slice(2, 8)}`,
              pairId,
              realColor: colors[pairId],
              jitter: [Math.random() * 18 - 9, Math.random() * 18 - 9, Math.random() * 18 - 9],
              matched: false,
              vanish: 0,
              shake: 0,
              pop: 0,
              x: 0,
              y: 0,
              w: 0,
              h: 0
            });
          }
        }
        shuffle(tiles);

        const grid = computeGrid(tiles.length);
        state.tiles = tiles;
        state.cols = grid.cols;
        state.rows = grid.rows;
        state.pairsLeft = pairCount;
        state.selected = [];
        state.pending = null;
        state.lock = false;
        state.particles = [];
        state.cleared = false;
        state.revealLeft = 0;
        state.powerupsLeft = state.cfg.powerups;
        state.activeFilter = state.cfg.filter === 'random' ? randomFilter() : state.cfg.filter;
        state.randomSwitchLeft = 1.6 + Math.random() * 2.2;
        state.startedAt = performance.now();
        state.elapsed = 0;

        closeOverlay();
        refreshLevelSelect();
        updateHud();
      }

      function showToast(msg, sec = 1.1) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        state.toastLeft = sec;
      }

      function closeOverlay() {
        overlay.classList.remove('show');
      }

      function openOverlay(title, body, nextEnabled) {
        resultTitle.textContent = title;
        resultBody.innerHTML = body;
        goNextBtn.disabled = !nextEnabled;
        overlay.classList.add('show');
      }

      function refreshLevelSelect() {
        levelSelect.innerHTML = LEVELS.map((lv, i) => {
          const unlocked = i < state.unlocked;
          const lock = unlocked ? '' : '🔒 ';
          const done = state.bestTimes[i] ? `🏁${Number(state.bestTimes[i]).toFixed(1)}s` : '';
          const filterLabel = lv.filter === 'random' ? '랜덤' : FILTER_LABEL[lv.filter];
          return `<option value="${i}" ${unlocked ? '' : 'disabled'}>${lock}L${i + 1} (${filterLabel}, ${lv.pairs}쌍) ${done}</option>`;
        }).join('');
        levelSelect.value = String(state.levelIndex);
      }

      function updateHud() {
        const best = state.bestTimes[state.levelIndex];
        const revealOn = state.revealLeft > 0;
        const filterLabel = revealOn
          ? '진짜 색'
          : `${FILTER_LABEL[state.activeFilter]}${state.cfg.filter === 'random' ? ' (랜덤)' : ''}`;

        levelText.textContent = `${state.levelIndex + 1} / ${LEVELS.length}`;
        filterText.textContent = filterLabel;
        filterText.style.color = revealOn ? '#6dffbc' : (state.activeFilter === 'achromatopsia' ? '#ffd86f' : '#cfe8ff');
        pairsText.textContent = String(state.pairsLeft);
        progressText.textContent = `${state.unlocked} / ${LEVELS.length}`;
        timeText.textContent = `${state.elapsed.toFixed(1)}s`;
        revealBtn.textContent = revealOn
          ? `진짜 색 보기 ${state.revealLeft.toFixed(1)}s`
          : `진짜 색 보기 (${state.powerupsLeft})`;
        revealBtn.disabled = state.powerupsLeft <= 0 || revealOn || state.cleared;

        prevBtn.disabled = state.levelIndex <= 0;
        nextBtn.disabled = state.levelIndex + 1 >= state.unlocked || state.levelIndex >= LEVELS.length - 1;

        let line = `L${state.levelIndex + 1} · ${state.cfg.pairs}쌍 매칭`; 
        if (best) line += ` · 최고 ${Number(best).toFixed(1)}s`;
        if (revealOn) line += ` · 필터 해제 중`;
        else if (state.cfg.filter === 'random') line += ' · 필터 자동 전환';
        statusText.textContent = line;
      }

      function activateReveal() {
        if (state.powerupsLeft <= 0 || state.revealLeft > 0 || state.cleared) return;
        ensureAudio();
        sfx.reveal();
        state.powerupsLeft -= 1;
        state.revealLeft = 3;
        showToast('3초 동안 진짜 색이 보입니다');
        updateHud();
      }

      function spawnParticles(cx, cy, color) {
        for (let i = 0; i < 26; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 45 + Math.random() * 120;
          state.particles.push({
            x: cx,
            y: cy,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: 0.25 + Math.random() * 0.5,
            size: 2 + Math.random() * 3,
            color
          });
        }
      }

      function roundedRect(x, y, w, h, r) {
        const rr = Math.min(r, w * 0.5, h * 0.5);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function computeLayout() {
        const marginX = 24;
        const marginY = 24;
        const gap = 12;
        const availW = state.viewW - marginX * 2;
        const availH = state.viewH - marginY * 2;
        const tileSize = Math.min(
          (availW - gap * (state.cols - 1)) / state.cols,
          (availH - gap * (state.rows - 1)) / state.rows
        );

        const boardW = tileSize * state.cols + gap * (state.cols - 1);
        const boardH = tileSize * state.rows + gap * (state.rows - 1);
        const startX = (state.viewW - boardW) * 0.5;
        const startY = (state.viewH - boardH) * 0.5;

        for (let i = 0; i < state.tiles.length; i++) {
          const c = i % state.cols;
          const r = (i / state.cols) | 0;
          const t = state.tiles[i];
          t.w = tileSize;
          t.h = tileSize;
          t.x = startX + c * (tileSize + gap);
          t.y = startY + r * (tileSize + gap);
        }
      }

      function tileVisualColor(tile) {
        let rgb = tile.realColor;
        if (state.revealLeft <= 0) {
          rgb = applyFilterRGB(rgb, state.activeFilter);
          rgb = [
            clamp((rgb[0] + tile.jitter[0]) / 255) * 255,
            clamp((rgb[1] + tile.jitter[1]) / 255) * 255,
            clamp((rgb[2] + tile.jitter[2]) / 255) * 255
          ];
        }
        return rgb.map((v) => Math.round(v));
      }

      function drawBackground(nowSec) {
        const g = ctx.createLinearGradient(0, 0, 0, state.viewH);
        g.addColorStop(0, '#13153a');
        g.addColorStop(0.55, '#0a0c23');
        g.addColorStop(1, '#060611');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, state.viewW, state.viewH);

        for (const s of state.stars) {
          const tw = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(nowSec * s.s + s.p));
          const x = s.x * state.viewW;
          const y = (s.y * state.viewH + nowSec * s.s * 16) % state.viewH;
          ctx.fillStyle = `rgba(158,196,255,${tw})`;
          ctx.beginPath();
          ctx.arc(x, y, s.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawTiles(nowSec) {
        for (let i = 0; i < state.tiles.length; i++) {
          const t = state.tiles[i];
          if (t.matched && t.vanish <= 0) continue;

          const selected = state.selected.includes(i);
          const shake = t.shake > 0 ? Math.sin((1 - t.shake) * 40) * 6 * t.shake : 0;
          const popScale = 1 + t.pop * 0.08;
          const alpha = t.matched ? clamp(t.vanish / 0.28) : 1;

          const w = t.w * popScale;
          const h = t.h * popScale;
          const x = t.x - (w - t.w) * 0.5 + shake;
          const y = t.y - (h - t.h) * 0.5;

          const c = tileVisualColor(t);
          const fill = `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${alpha})`;

          if (state.revealLeft > 0) {
            const glow = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(nowSec * 10 + i));
            ctx.shadowColor = `rgba(255,255,255,${0.45 * glow})`;
            ctx.shadowBlur = 16 + glow * 8;
          } else {
            ctx.shadowBlur = 0;
          }

          roundedRect(x, y, w, h, 13);
          ctx.fillStyle = fill;
          ctx.fill();

          ctx.shadowBlur = 0;
          roundedRect(x, y, w, h, 13);
          ctx.lineWidth = selected ? 3.4 : 1.3;
          ctx.strokeStyle = selected
            ? 'rgba(255,255,255,0.95)'
            : `rgba(201,228,255,${0.38 + 0.2 * alpha})`;
          ctx.stroke();

          if (!t.matched) {
            ctx.fillStyle = 'rgba(255,255,255,0.10)';
            roundedRect(x + 4, y + 4, w - 8, h * 0.22, 8);
            ctx.fill();
          }
        }
      }

      function drawParticles() {
        for (const p of state.particles) {
          ctx.globalAlpha = clamp(p.life * 2);
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x - p.size * 0.5, p.y - p.size * 0.5, p.size, p.size);
        }
        ctx.globalAlpha = 1;
      }

      function draw(nowSec) {
        drawBackground(nowSec);
        drawTiles(nowSec);
        drawParticles();
      }

      function pointInTile(x, y, tile) {
        return x >= tile.x && x <= tile.x + tile.w && y >= tile.y && y <= tile.y + tile.h;
      }

      function findTileAt(x, y) {
        for (let i = state.tiles.length - 1; i >= 0; i--) {
          const t = state.tiles[i];
          if (t.matched || t.vanish <= 0 && t.matched) continue;
          if (pointInTile(x, y, t)) return i;
        }
        return -1;
      }

      function handleSelection(index) {
        if (state.cleared || state.lock || overlay.classList.contains('show')) return;
        if (index < 0) return;
        const t = state.tiles[index];
        if (!t || t.matched) return;
        if (state.selected.includes(index)) return;

        ensureAudio();
        sfx.select();
        t.pop = 0.18;
        state.selected.push(index);

        if (state.selected.length === 2) {
          const [a, b] = state.selected;
          const match = state.tiles[a].pairId === state.tiles[b].pairId;
          state.pending = { a, b, match, left: match ? 0.16 : 0.34 };
          state.lock = true;
        }
      }

      function clearLevel() {
        if (state.cleared) return;
        state.cleared = true;
        ensureAudio();
        sfx.clear();

        const totalTime = state.elapsed;
        const best = state.bestTimes[state.levelIndex];
        const isBest = !best || totalTime < best;
        if (isBest) state.bestTimes[state.levelIndex] = Number(totalTime.toFixed(3));

        if (state.unlocked < state.levelIndex + 2) {
          state.unlocked = Math.min(LEVELS.length, state.levelIndex + 2);
        }
        persist();
        refreshLevelSelect();
        updateHud();

        const nextEnabled = state.levelIndex + 1 < state.unlocked;
        openOverlay(
          '레벨 클리어!',
          `클리어 시간: <b>${totalTime.toFixed(1)}s</b><br>` +
          `최고 기록: <b>${Number(state.bestTimes[state.levelIndex]).toFixed(1)}s</b>${isBest ? ' (신기록!)' : ''}<br>` +
          `해금 진행: <b>${state.unlocked} / ${LEVELS.length}</b>`,
          nextEnabled
        );
      }

      function update(dt) {
        if (!state.cleared) state.elapsed = (performance.now() - state.startedAt) / 1000;

        if (state.revealLeft > 0) {
          state.revealLeft = Math.max(0, state.revealLeft - dt);
          if (state.revealLeft === 0) showToast('필터가 다시 적용됩니다');
        }

        if (state.cfg.filter === 'random' && state.revealLeft <= 0 && !state.cleared) {
          state.randomSwitchLeft -= dt;
          if (state.randomSwitchLeft <= 0) {
            state.activeFilter = randomFilter(state.activeFilter);
            state.randomSwitchLeft = 1.4 + Math.random() * 2.1;
            showToast(`필터 전환: ${FILTER_LABEL[state.activeFilter]}`, 0.75);
          }
        }

        if (state.pending) {
          state.pending.left -= dt;
          if (state.pending.left <= 0) {
            const { a, b, match } = state.pending;
            if (match) {
              const ta = state.tiles[a];
              const tb = state.tiles[b];
              ta.matched = true;
              tb.matched = true;
              ta.vanish = 0.28;
              tb.vanish = 0.28;
              spawnParticles(ta.x + ta.w * 0.5, ta.y + ta.h * 0.5, 'rgba(109,255,188,0.95)');
              spawnParticles(tb.x + tb.w * 0.5, tb.y + tb.h * 0.5, 'rgba(97,232,255,0.95)');
              ensureAudio();
              sfx.success();
              state.pairsLeft -= 1;
              if (state.pairsLeft <= 0) clearLevel();
            } else {
              state.tiles[a].shake = 0.35;
              state.tiles[b].shake = 0.35;
              ensureAudio();
              sfx.fail();
            }
            state.selected = [];
            state.pending = null;
            state.lock = false;
          }
        }

        for (const t of state.tiles) {
          if (t.shake > 0) t.shake = Math.max(0, t.shake - dt * 2.8);
          if (t.pop > 0) t.pop = Math.max(0, t.pop - dt * 2.2);
          if (t.matched && t.vanish > 0) t.vanish = Math.max(0, t.vanish - dt);
        }

        for (let i = state.particles.length - 1; i >= 0; i--) {
          const p = state.particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= Math.pow(0.18, dt);
          p.vy *= Math.pow(0.18, dt);
          p.life -= dt;
          if (p.life <= 0) state.particles.splice(i, 1);
        }

        if (state.toastLeft > 0) {
          state.toastLeft -= dt;
          if (state.toastLeft <= 0) toastEl.classList.remove('show');
        }

        updateHud();
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        state.viewW = rect.width;
        state.viewH = rect.height;
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        computeLayout();
      }

      function getCanvasPoint(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      canvas.addEventListener('pointerdown', (e) => {
        ensureAudio();
        const p = getCanvasPoint(e);
        const idx = findTileAt(p.x, p.y);
        handleSelection(idx);
        e.preventDefault();
      }, { passive: false });

      revealBtn.addEventListener('click', () => {
        ensureAudio();
        activateReveal();
      });

      prevBtn.addEventListener('click', () => {
        ensureAudio();
        if (state.levelIndex > 0) buildLevel(state.levelIndex - 1);
      });

      nextBtn.addEventListener('click', () => {
        ensureAudio();
        const n = state.levelIndex + 1;
        if (n < state.unlocked && n < LEVELS.length) buildLevel(n);
      });

      restartBtn.addEventListener('click', () => {
        ensureAudio();
        buildLevel(state.levelIndex);
      });

      levelSelect.addEventListener('change', () => {
        ensureAudio();
        const idx = Number(levelSelect.value);
        if (!Number.isFinite(idx)) return;
        if (idx >= state.unlocked) {
          showToast('잠긴 레벨입니다');
          levelSelect.value = String(state.levelIndex);
          return;
        }
        buildLevel(idx);
      });

      againBtn.addEventListener('click', () => buildLevel(state.levelIndex));
      goNextBtn.addEventListener('click', () => {
        const n = state.levelIndex + 1;
        if (n < state.unlocked && n < LEVELS.length) buildLevel(n);
      });
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeOverlay();
      });

      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
          ensureAudio();
          activateReveal();
          e.preventDefault();
        }
      }, { passive: false });

      window.addEventListener('resize', resizeCanvas);

      loadSave();
      refreshLevelSelect();
      buildLevel(0);
      persist();
      resizeCanvas();

      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw(now / 1000);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
