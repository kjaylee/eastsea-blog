<script src="https://cdn.jsdelivr.net/npm/littlejsengine/dist/littlejs.min.js"></script>
<script>'use strict';
showSplashScreen=false;
debugWatermark=false;
showEngineVersion=false;
canvasClearColor=hsl(0,0,.04);
touchGamepadEnable=true;
cameraScale=34;

const SAVE_KEY='littlejs-color-chain-reaction-best';
const HUES=[.00,.15,.33,.56,.82];
const PALETTE=[hsl(.00,1,.62),hsl(.15,1,.64),hsl(.33,1,.62),hsl(.56,1,.65),hsl(.82,1,.66)];

const tapSound=new Sound([.65,.01,520,.003,0,.08,0,1.8,3,0,0,0,0,0,0,0,0,.68]);
const chainSound=new Sound([.72,.01,700,.004,0,.11,0,2,8,0,0,0,0,0,0,0,0,.72]);
const clearSound=new Sound([.9,.02,840,.004,0,.26,0,1.4,6,0,0,0,0,0,0,0,0,.84]);
const failSound=new Sound([.9,.02,160,.03,0,.24,0,1.7,-6,0,0,0,0,0,0,0,0,.8]);

let state='start';
let orbs=[];
let blasts=[];
let stars=[];

let runScore=0,bestScore=0;
let level=1,levelScore=0,targetScore=0,clicksLeft=0;
let chainCount=0,colorCount=4;
let hoverOrb;
let infoText='',infoTimer=0;

class Orb extends EngineObject {
  constructor(pos,colorIndex){
    super(pos,vec2(.82));
    this.setCollision(false,false,false,false);
    this.colorIndex=colorIndex;
    this.radius=.4;
    this.seed=rand(PI*2);
    this.triggered=false;
  }
  update(){
    if(state!=='play'||this.triggered) return;

    for(const b of blasts){
      if(b.destroyed||b.colorIndex!==this.colorIndex) continue;
      if(this.pos.distance(b.pos)<=b.radius+this.radius*.45){
        detonateOrb(this,false);
        return;
      }
    }
  }
  render(){
    const pulse=.55+.45*Math.sin((timeReal||0)*3+this.seed);
    const c=PALETTE[this.colorIndex];
    drawCircle(this.pos,this.radius,c);
    drawCircle(this.pos,this.radius*.56,c.mutate(.08,.06));
    drawCircle(this.pos,this.radius*1.5,hsl(this.colorIndex*.18,1,.65,.06+.08*pulse));

    if(hoverOrb===this)
      drawCircle(this.pos,this.radius*1.9,hsl(.56,1,.74,.25));

    if((keyIsDown('ShiftLeft')||keyIsDown('ShiftRight'))&&hoverOrb&&hoverOrb.colorIndex===this.colorIndex)
      drawCircle(this.pos,this.radius*2.1,hsl(.33,1,.67,.18));
  }
}

class Blast extends EngineObject {
  constructor(pos,colorIndex,power){
    super(pos,vec2(.2));
    this.setCollision(false,false,false,false);
    this.colorIndex=colorIndex;
    this.radius=.26;
    this.growth=4.2+power*.05;
    this.life=.52;
  }
  update(){
    if(state!=='play') return;
    const dt=timeDelta||1/60;
    this.radius+=this.growth*dt;
    this.life-=dt;
    if(this.life<=0) this.destroy();
  }
  render(){
    const hue=HUES[this.colorIndex]||.56;
    drawCircle(this.pos,this.radius,hsl(hue,1,.6,Math.max(0,this.life*.35)));
    drawCircle(this.pos,this.radius*.46,hsl(hue,1,.68,Math.max(0,this.life*.55)));
  }
}

function actionPressed(){
  return keyWasPressed('Space')||keyWasPressed('Enter')||mouseWasPressed(0);
}

function burst(pos,color,count,size){
  new ParticleEmitter(
    pos,0,.12,.08,count*34,PI,undefined,
    color,color.mutate(.2,.08),hsl(0,0,0,0),hsl(0,0,0,0),
    .45,size||.052,.33,.15,.05,.96,1,.25,PI,.15,.45,false,true,true,1,false
  );
}

function findOrbAt(pos){
  for(let i=orbs.length-1;i>=0;i--){
    const o=orbs[i];
    if(o.destroyed||o.triggered) continue;
    if(o.pos.distance(pos)<=o.radius) return o;
  }
}

function detonateOrb(orb,manual){
  if(!orb||orb.triggered||state!=='play') return;
  orb.triggered=true;
  orb.destroy();

  chainCount++;
  const gain=manual?8:10+Math.min(28,chainCount*2);
  runScore+=gain;
  levelScore+=gain;

  blasts.push(new Blast(orb.pos,orb.colorIndex,chainCount));
  burst(orb.pos,PALETTE[orb.colorIndex],manual?16:20,manual?.05:.058);
  (manual?tapSound:chainSound).play(orb.pos);
}

function boardBounds(){
  return {minX:-11.6,maxX:11.6,minY:-6.8,maxY:6.8};
}

function populateLevel(){
  engineObjectsDestroy();
  orbs=[];
  blasts=[];
  chainCount=0;
  hoverOrb=undefined;

  colorCount=Math.min(5,4+Math.floor((level-1)/3));
  clicksLeft=Math.max(3,7-Math.floor((level-1)/2));
  targetScore=30+level*24;
  levelScore=0;

  const count=Math.min(52,28+level*5);
  const b=boardBounds();
  for(let i=0;i<count;i++){
    let pos=vec2(),ok=false;
    for(let tries=0;tries<100&&!ok;tries++){
      pos=vec2(rand(b.minX,b.maxX),rand(b.minY,b.maxY));
      ok=true;
      for(const o of orbs){
        if(o.pos.distance(pos)<.92){ ok=false; break; }
      }
    }
    if(ok) orbs.push(new Orb(pos,randInt(colorCount)));
  }

  infoText=`LEVEL ${level}`;
  infoTimer=1.2;
}

function startRun(){
  runScore=0;
  level=1;
  state='play';
  infoText='';
  infoTimer=0;
  populateLevel();
}

function nextLevel(){
  level++;
  state='play';
  clearSound.play();
  populateLevel();
}

function endGame(){
  state='gameover';
  failSound.play();
  if(runScore>bestScore){
    bestScore=runScore;
    localStorage.setItem(SAVE_KEY,String(bestScore));
  }
}

function gameInit(){
  bestScore=Number(localStorage.getItem(SAVE_KEY)||0);
  for(let i=0;i<180;i++)
    stars.push(vec2(rand(-17,17),rand(-10,10)));
}

function resolveStateTransitions(){
  blasts=blasts.filter(b=>!b.destroyed);
  orbs=orbs.filter(o=>!o.destroyed&&!o.triggered);

  const settled=blasts.length===0;
  if(levelScore>=targetScore&&settled){
    state='levelclear';
    infoText='TARGET CLEARED';
    infoTimer=.9;
  }
  else if(clicksLeft<=0&&settled){
    endGame();
  }
}

function gameUpdate(){
  if(state==='start'){
    if(actionPressed()) startRun();
    return;
  }

  if(state==='gameover'){
    if(actionPressed()) startRun();
    return;
  }

  if(state==='levelclear'){
    if(actionPressed()) nextLevel();
    return;
  }

  if(keyWasPressed('KeyR')){
    startRun();
    return;
  }

  infoTimer=Math.max(0,infoTimer-(timeDelta||1/60));
  hoverOrb=findOrbAt(mousePos);

  if(mouseWasPressed(0)&&clicksLeft>0){
    const picked=findOrbAt(mousePos);
    if(picked){
      clicksLeft--;
      detonateOrb(picked,true);
    }
  }

  resolveStateTransitions();
}

function gameUpdatePost(){
  cameraPos=cameraPos.lerp(vec2(),.1);
}

function gameRender(){
  const t=timeReal||0;
  for(const s of stars)
    drawCircle(s,.045,hsl(.6,1,.8,.26+.16*Math.sin(t+s.x*.9)));

  const b=boardBounds();
  drawRect(vec2((b.minX+b.maxX)/2,(b.minY+b.maxY)/2),vec2(b.maxX-b.minX,b.maxY-b.minY),hsl(.56,1,.2,.12));
  drawRect(vec2((b.minX+b.maxX)/2,(b.minY+b.maxY)/2),vec2(b.maxX-b.minX+.2,b.maxY-b.minY+.2),hsl(.56,1,.5,.08));
}

function gameRenderPost(){
  const W=mainCanvasSize.x,H=mainCanvasSize.y;
  drawTextScreen('COLOR CHAIN REACTION',vec2(W/2,40),42,hsl(.56,1,.73),3,hsl(0,0,0));
  drawTextScreen(`BEST ${bestScore}`,vec2(W-116,30),22,hsl(.33,1,.67),2,hsl(0,0,0));

  if(state==='start'){
    drawTextScreen('Tap a circle to detonate that color',vec2(W/2,H/2-38),30,hsl(.57,.74,.79),2,hsl(0,0,0));
    drawTextScreen('Only same-color circles chain explode',vec2(W/2,H/2),26,hsl(.15,1,.66),2,hsl(0,0,0));
    drawTextScreen('Limited clicks. Reach target score.',vec2(W/2,H/2+36),26,hsl(.33,1,.67),2,hsl(0,0,0));
    drawTextScreen('Hold SHIFT: highlight matching color',vec2(W/2,H/2+72),22,hsl(.56,1,.74),2,hsl(0,0,0));
    drawTextScreen('TAP / SPACE TO START',vec2(W/2,H/2+122),40,hsl(.33,1,.67),3,hsl(0,0,0));
    return;
  }

  drawTextScreen(`RUN SCORE ${runScore}`,vec2(118,30),24,hsl(.15,1,.67),2,hsl(0,0,0));
  drawTextScreen(`LEVEL ${level}`,vec2(84,58),21,hsl(.56,1,.74),2,hsl(0,0,0));
  drawTextScreen(`TARGET ${targetScore}`,vec2(112,84),20,hsl(.33,1,.68),2,hsl(0,0,0));
  drawTextScreen(`LEVEL SCORE ${levelScore}`,vec2(W-118,58),20,hsl(.56,1,.74),2,hsl(0,0,0));
  drawTextScreen(`CLICKS ${clicksLeft}`,vec2(W-98,84),22,clicksLeft>1?hsl(.15,1,.67):hsl(.01,1,.62),2,hsl(0,0,0));
  drawTextScreen('Tap circles / R restart',vec2(W/2,H-20),18,hsl(0,0,.78),1,hsl(0,0,0));

  if(infoTimer>0)
    drawTextScreen(infoText,vec2(W/2,84),30,hsl(.33,1,.67),2,hsl(0,0,0));

  if(state==='levelclear'){
    drawTextScreen('LEVEL CLEAR',vec2(W/2,H/2-18),62,hsl(.33,1,.67),4,hsl(0,0,0));
    drawTextScreen(`+${levelScore} points`,vec2(W/2,H/2+30),30,hsl(.56,1,.74),2,hsl(0,0,0));
    drawTextScreen('TAP / SPACE FOR NEXT LEVEL',vec2(W/2,H/2+82),30,hsl(.15,1,.67),2,hsl(0,0,0));
  }

  if(state==='gameover'){
    drawTextScreen('OUT OF CLICKS',vec2(W/2,H/2-18),62,hsl(.01,1,.62),4,hsl(0,0,0));
    drawTextScreen(`FINAL SCORE ${runScore}`,vec2(W/2,H/2+30),34,hsl(.56,1,.74),3,hsl(0,0,0));
    drawTextScreen('TAP / SPACE TO RETRY',vec2(W/2,H/2+86),30,hsl(.33,1,.67),2,hsl(0,0,0));
  }
}

engineInit(gameInit,gameUpdate,gameUpdatePost,gameRender,gameRenderPost);
</script><footer style="text-align:center;padding:12px 8px;font-size:12px;opacity:0.6;font-family:system-ui,sans-serif">
