<body>
    <div id="gameContainer">
        <div id="info">
            <div id="moves">Moves: 25</div>
            <div id="percent">0%</div>
        </div>
        <canvas id="canvas" width="400" height="400"></canvas>
        <div id="colorPicker"></div>
        <div id="startScreen">
            <h1>🎨 COLOR<br>FLOOD</h1>
            <p>Fill the board with one color!</p>
            <p>Start from top-left corner</p>
            <button class="start" onclick="startGame()">START GAME</button>
        </div>
        <div id="gameOver">
            <h2 id="gameOverTitle">YOU WIN!</h2>
            <p id="finalStats"></p>
            <button class="start" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const movesEl = document.getElementById('moves');
        const percentEl = document.getElementById('percent');
        const colorPickerEl = document.getElementById('colorPicker');
        const startScreenEl = document.getElementById('startScreen');
        const gameOverEl = document.getElementById('gameOver');

        const gridSize = 14;
        const tileSize = canvas.width / gridSize;
        const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];
        
        let grid = [];
        let moves = 25;
        let maxMoves = 25;
        let gameRunning = false;

        let audioCtx = null;
        function playSound(freq, duration) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = freq;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function initGrid() {
            grid = [];
            for (let row = 0; row < gridSize; row++) {
                grid[row] = [];
                for (let col = 0; col < gridSize; col++) {
                    grid[row][col] = Math.floor(Math.random() * colors.length);
                }
            }
        }

        function drawGrid() {
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    ctx.fillStyle = colors[grid[row][col]];
                    ctx.fillRect(col * tileSize, row * tileSize, tileSize, tileSize);
                    
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(col * tileSize, row * tileSize, tileSize, tileSize);
                }
            }
        }

        function createColorPicker() {
            colorPickerEl.innerHTML = '';
            colors.forEach((color, index) => {
                const btn = document.createElement('div');
                btn.className = 'colorBtn';
                btn.style.backgroundColor = color;
                btn.onclick = () => selectColor(index);
                colorPickerEl.appendChild(btn);
            });
        }

        function flood(row, col, oldColor, newColor, visited = new Set()) {
            if (row < 0 || row >= gridSize || col < 0 || col >= gridSize) return;
            
            const key = `${row},${col}`;
            if (visited.has(key)) return;
            if (grid[row][col] !== oldColor) return;
            
            visited.add(key);
            grid[row][col] = newColor;
            
            flood(row - 1, col, oldColor, newColor, visited);
            flood(row + 1, col, oldColor, newColor, visited);
            flood(row, col - 1, oldColor, newColor, visited);
            flood(row, col + 1, oldColor, newColor, visited);
        }

        function calculateProgress() {
            const targetColor = grid[0][0];
            const visited = new Set();
            let count = 0;

            function countConnected(row, col) {
                if (row < 0 || row >= gridSize || col < 0 || col >= gridSize) return;
                const key = `${row},${col}`;
                if (visited.has(key)) return;
                if (grid[row][col] !== targetColor) return;

                visited.add(key);
                count++;

                countConnected(row - 1, col);
                countConnected(row + 1, col);
                countConnected(row, col - 1);
                countConnected(row, col + 1);
            }

            countConnected(0, 0);
            return Math.floor((count / (gridSize * gridSize)) * 100);
        }

        function checkWin() {
            const firstColor = grid[0][0];
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    if (grid[row][col] !== firstColor) return false;
                }
            }
            return true;
        }

        function selectColor(colorIndex) {
            if (!gameRunning) return;
            
            const currentColor = grid[0][0];
            if (currentColor === colorIndex) return;
            
            flood(0, 0, currentColor, colorIndex);
            moves--;
            movesEl.textContent = `Moves: ${moves}`;
            
            const progress = calculateProgress();
            percentEl.textContent = `${progress}%`;
            
            drawGrid();
            playSound(600 + progress * 5, 0.08);
            
            if (checkWin()) {
                winGame();
            } else if (moves <= 0) {
                loseGame();
            }
        }

        function startGame() {
            moves = maxMoves;
            movesEl.textContent = `Moves: ${moves}`;
            percentEl.textContent = '0%';
            
            initGrid();
            createColorPicker();
            drawGrid();
            
            const progress = calculateProgress();
            percentEl.textContent = `${progress}%`;
            
            gameRunning = true;
            startScreenEl.style.display = 'none';
            gameOverEl.style.display = 'none';
        }

        function winGame() {
            gameRunning = false;
            playSound(1200, 0.4);
            
            const movesUsed = maxMoves - moves;
            const titleEl = document.getElementById('gameOverTitle');
            titleEl.textContent = '🎉 YOU WIN!';
            titleEl.className = 'win';
            
            const bestMoves = localStorage.getItem('colorFloodBest') || 999;
            if (movesUsed < bestMoves) {
                localStorage.setItem('colorFloodBest', movesUsed);
                document.getElementById('finalStats').textContent = 
                    `🏆 NEW RECORD: ${movesUsed} moves!\nPrevious best: ${bestMoves}`;
            } else {
                document.getElementById('finalStats').textContent = 
                    `Completed in ${movesUsed} moves\nBest: ${bestMoves} moves`;
            }
            
            gameOverEl.style.display = 'block';
        }

        function loseGame() {
            gameRunning = false;
            playSound(200, 0.5);
            
            const progress = calculateProgress();
            const titleEl = document.getElementById('gameOverTitle');
            titleEl.textContent = '💔 OUT OF MOVES!';
            titleEl.className = 'lose';
            
            document.getElementById('finalStats').textContent = 
                `Progress: ${progress}%\nTry again!`;
            
            gameOverEl.style.display = 'block';
        }

        function restartGame() {
            startGame();
        }

        // Initial draw
        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>

    <!-- leaderboard-integration:color-flood -->
    <div id="leaderboard" data-lb-slug="color-flood" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "color-flood";
      const CANDIDATE_OBJECTS = [];
      const END_METHODS = ["gameOver", "endGame", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["startGame", "start", "newGame", "restart", "retry", "resetGame", "initGame", "beginGame", "playAgain"];
      const SCORE_KEYS = ["score", "points", "gold", "coins", "wave", "level", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
