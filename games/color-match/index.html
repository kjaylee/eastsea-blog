<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Color Match - 색깔 매칭 게임</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Arial',sans-serif;overflow:hidden;}
#gameContainer{position:relative;width:360px;max-width:100vw;}
canvas{display:block;border-radius:16px;box-shadow:0 0 40px rgba(255,255,255,.1);}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="c" width="360" height="600"></canvas>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=360,H=600;
const COLORS=[
  {name:'빨강',hex:'#FF4136',r:255,g:65,b:54},
  {name:'파랑',hex:'#0074D9',r:0,g:116,b:217},
  {name:'초록',hex:'#2ECC40',r:46,g:204,b:64},
  {name:'노랑',hex:'#FFDC00',r:255,g:220,b:0},
  {name:'보라',hex:'#B10DC9',r:177,g:13,b:201},
  {name:'주황',hex:'#FF851B',r:255,g:133,b:27},
  {name:'분홍',hex:'#FF69B4',r:255,g:105,b:180},
  {name:'하늘',hex:'#7FDBFF',r:127,g:219,b:255}
];
let state='start',score=0,best=+(localStorage.getItem('cm_best')||0);
let lives=3,timeLeft=0,timerMax=3.5,targetColor,btnColors=[],correct;
let lastTime=0,flashAlpha=0,flashColor='',combo=0,msgTimer=0,msg='';

function pick(n,arr){
  const a=[...arr];const r=[];
  for(let i=0;i<n;i++){const j=Math.floor(Math.random()*(a.length-i));r.push(a.splice(j,1)[0]);}
  return r;
}
function newRound(){
  const chosen=pick(4,COLORS);
  targetColor=chosen[Math.floor(Math.random()*chosen.length)];
  btnColors=chosen;
  // shuffle
  for(let i=btnColors.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[btnColors[i],btnColors[j]]=[btnColors[j],btnColors[i]];}
  correct=btnColors.findIndex(x=>x.hex===targetColor.hex);
  timeLeft=timerMax;
}
function roundedRect(x,y,w,h,r,fill,stroke,sw){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}
function drawStar(cx,cy,r,col){
  ctx.fillStyle=col;ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=Math.PI/2+i*Math.PI*2/5;
    const b=a+Math.PI/5;
    i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.lineTo(cx+r*.45*Math.cos(b),cy+r*.45*Math.sin(b));
  }
  ctx.closePath();ctx.fill();
}
function drawHeart(cx,cy,sz,col){
  ctx.fillStyle=col;ctx.beginPath();
  ctx.moveTo(cx,cy+sz*.3);
  ctx.bezierCurveTo(cx,cy-sz*.3,cx-sz,cy-sz*.3,cx-sz,cy);
  ctx.bezierCurveTo(cx-sz,cy+sz*.5,cx,cy+sz*.9,cx,cy+sz*.9);
  ctx.bezierCurveTo(cx,cy+sz*.9,cx+sz,cy+sz*.5,cx+sz,cy);
  ctx.bezierCurveTo(cx+sz,cy-sz*.3,cx,cy-sz*.3,cx,cy+sz*.3);
  ctx.fill();
}
function draw(ts){
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;
  // bg
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  if(state==='start'){
    drawStart();
  } else if(state==='play'){
    updatePlay(dt);
    drawPlay();
  } else if(state==='over'){
    drawOver();
  }
  // flash
  if(flashAlpha>0){
    ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha;ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;flashAlpha=Math.max(0,flashAlpha-.05);
  }
  requestAnimationFrame(draw);
}
function drawStart(){
  // gradient bg
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#1a1a2e');g.addColorStop(1,'#16213e');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // title
  ctx.textAlign='center';
  ctx.font='bold 36px Arial';ctx.fillStyle='#fff';
  ctx.fillText('🎨 Color Match',W/2,160);
  ctx.font='16px Arial';ctx.fillStyle='#aaa';
  ctx.fillText('색깔 매칭 반응속도 게임',W/2,195);
  // instructions
  const lines=['화면 상단의 색깔 이름을 보고','동일한 색의 버튼을 빠르게 탭!','콤보로 추가 점수 획득!','시간 초과 또는 오답 → 목숨 -1'];
  ctx.font='14px Arial';ctx.fillStyle='#ccc';
  lines.forEach((l,i)=>ctx.fillText(l,W/2,270+i*26));
  // best
  ctx.font='bold 18px Arial';ctx.fillStyle='#FFD700';
  ctx.fillText(`최고 기록: ${best}점`,W/2,400);
  // start btn
  roundedRect(W/2-80,440,160,56,12,'#4ecdc4');
  ctx.font='bold 22px Arial';ctx.fillStyle='#111';
  ctx.fillText('시작하기',W/2,475);
}
function updatePlay(dt){
  if(msgTimer>0)msgTimer-=dt;
  timeLeft-=dt;
  if(timeLeft<=0){loseLife('시간초과!');}
}
function drawPlay(){
  // top bar bg
  roundedRect(0,0,W,90,0,'#1a1a2e');
  // score
  ctx.textAlign='left';ctx.font='bold 14px Arial';ctx.fillStyle='#aaa';
  ctx.fillText('점수',14,22);
  ctx.font='bold 30px Arial';ctx.fillStyle='#fff';
  ctx.fillText(score,14,54);
  // combo
  if(combo>1){
    ctx.font='bold 16px Arial';ctx.fillStyle='#FFD700';
    ctx.fillText(`x${combo} 콤보!`,14,74);
  }
  // lives
  ctx.textAlign='right';
  for(let i=0;i<3;i++){
    const col=i<lives?'#FF4136':'#333';
    drawHeart(W-20-i*28,30,9,col);
  }
  // timer bar
  const barW=(W-28)*Math.max(0,timeLeft/timerMax);
  const barCol=timeLeft>timerMax*.5?'#2ECC40':timeLeft>timerMax*.25?'#FFDC00':'#FF4136';
  roundedRect(14,68,W-28,10,5,'#333');
  if(barW>0)roundedRect(14,68,barW,10,5,barCol);
  // target display
  const tg=ctx.createLinearGradient(0,100,0,230);
  tg.addColorStop(0,'#1a1a2e');tg.addColorStop(1,'#0d0d1a');
  ctx.fillStyle=tg;ctx.fillRect(0,100,W,130);
  ctx.textAlign='center';
  ctx.font='bold 20px Arial';ctx.fillStyle='#888';
  ctx.fillText('이 색깔의 버튼을 클릭!',W/2,128);
  // color name display
  const grd=ctx.createLinearGradient(W/2-100,140,W/2+100,200);
  grd.addColorStop(0,targetColor.hex);grd.addColorStop(1,'#fff');
  ctx.font='bold 52px Arial';ctx.fillStyle=grd;
  ctx.fillText(targetColor.name,W/2,192);
  // buttons 2x2
  const bw=150,bh=100,gap=12;
  const startX=(W-(bw*2+gap))/2;
  const startY=250;
  btnColors.forEach((col,i)=>{
    const bx=startX+(i%2)*(bw+gap);
    const by=startY+Math.floor(i/2)*(bh+gap);
    roundedRect(bx,by,bw,bh,14,col.hex);
    // glow
    ctx.shadowColor=col.hex;ctx.shadowBlur=12;
    roundedRect(bx,by,bw,bh,14,null,col.hex,2);
    ctx.shadowBlur=0;
    ctx.textAlign='center';ctx.font='bold 16px Arial';ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.fillText(col.name,bx+bw/2,by+bh/2+6);
  });
  // msg
  if(msgTimer>0){
    ctx.globalAlpha=Math.min(1,msgTimer/.3);
    ctx.font='bold 40px Arial';ctx.textAlign='center';
    ctx.fillStyle=msg==='정답!'?'#2ECC40':'#FF4136';
    ctx.fillText(msg,W/2,220);
    ctx.globalAlpha=1;
  }
}
function loseLife(reason){
  flashColor='rgba(255,0,0,.5)';flashAlpha=.5;
  msg=reason;msgTimer=.6;
  combo=0;
  lives--;
  if(lives<=0){endGame();}else{newRound();}
}
function drawOver(){
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#1a0000');g.addColorStop(1,'#0d0d0d');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 40px Arial';ctx.fillStyle='#FF4136';
  ctx.fillText('게임 오버',W/2,160);
  ctx.font='bold 24px Arial';ctx.fillStyle='#fff';
  ctx.fillText(`최종 점수: ${score}점`,W/2,220);
  if(score>=best){
    ctx.font='bold 20px Arial';ctx.fillStyle='#FFD700';
    ctx.fillText('🏆 신기록!',W/2,258);
    for(let i=0;i<7;i++)drawStar(40+i*45,310,10,`hsl(${i*50},100%,60%)`);
  }
  ctx.font='18px Arial';ctx.fillStyle='#aaa';
  ctx.fillText(`최고 기록: ${best}점`,W/2,300);
  roundedRect(W/2-80,380,160,56,12,'#4ecdc4');
  ctx.font='bold 22px Arial';ctx.fillStyle='#111';
  ctx.fillText('다시하기',W/2,415);
  roundedRect(W/2-80,454,160,44,12,'#333');
  ctx.font='bold 16px Arial';ctx.fillStyle='#ccc';
  ctx.fillText('메인으로',W/2,482);
}
function endGame(){
  if(score>best){best=score;localStorage.setItem('cm_best',best);}
  state='over';
}
function getBtnIndex(x,y){
  const bw=150,bh=100,gap=12;
  const startX=(W-(bw*2+gap))/2,startY=250;
  for(let i=0;i<4;i++){
    const bx=startX+(i%2)*(bw+gap),by=startY+Math.floor(i/2)*(bh+gap);
    if(x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh)return i;
  }
  return -1;
}
function handleClick(cx,cy){
  const rect=c.getBoundingClientRect();
  const scaleX=W/rect.width,scaleY=H/rect.height;
  const x=(cx-rect.left)*scaleX,y=(cy-rect.top)*scaleY;
  if(state==='start'){
    if(x>=W/2-80&&x<=W/2+80&&y>=440&&y<=496){startGame();}
  } else if(state==='play'){
    const idx=getBtnIndex(x,y);
    if(idx>=0){
      if(idx===correct){
        combo++;const pts=10+combo*2;
        score+=pts;
        msg=`+${pts}`;msgTimer=.5;
        flashColor='rgba(46,204,64,.3)';flashAlpha=.3;
        if(timerMax>1.5)timerMax=Math.max(1.5,timerMax-.05);
        newRound();
      } else {
        loseLife('틀렸어요!');
      }
    }
  } else if(state==='over'){
    if(x>=W/2-80&&x<=W/2+80&&y>=380&&y<=436){startGame();}
    if(x>=W/2-80&&x<=W/2+80&&y>=454&&y<=498){state='start';score=0;lives=3;combo=0;timerMax=3.5;}
  }
}
function startGame(){
  state='play';score=0;lives=3;combo=0;timerMax=3.5;
  newRound();
}
c.addEventListener('click',e=>handleClick(e.clientX,e.clientY));
c.addEventListener('touchstart',e=>{e.preventDefault();handleClick(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
requestAnimationFrame(draw);
</script>
</body>
</html>
