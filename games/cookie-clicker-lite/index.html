<style>

<body>
<div id="game-container">
<h1>🍪 Cookie Clicker</h1>
<div id="stats">
<div>🍪 쿠키: <span id="cookies">0</span></div>
<div style="font-size:14px;color:#666;margin-top:5px">초당 <span id="cps">0</span> 쿠키</div>
</div>
<div id="cookie">🍪</div>
<div id="upgrades">
<h3 style="margin-bottom:10px;color:#333">업그레이드</h3>
<div class="upgrade">
<div class="upgrade-info">
<div class="upgrade-name">👆 클릭 파워 (<span id="clickLevel">1</span>)</div>
<div class="upgrade-desc">클릭당 쿠키 +1</div>
</div>
<button class="upgrade-btn" id="clickUpgrade">10 🍪</button>
</div>
<div class="upgrade">
<div class="upgrade-info">
<div class="upgrade-name">👵 할머니 (<span id="grandmaCount">0</span>)</div>
<div class="upgrade-desc">초당 +1 쿠키</div>
</div>
<button class="upgrade-btn" id="grandmaUpgrade">100 🍪</button>
</div>
<div class="upgrade">
<div class="upgrade-info">
<div class="upgrade-name">🏭 공장 (<span id="factoryCount">0</span>)</div>
<div class="upgrade-desc">초당 +10 쿠키</div>
</div>
<button class="upgrade-btn" id="factoryUpgrade">500 🍪</button>
</div>
<div class="upgrade">
<div class="upgrade-info">
<div class="upgrade-name">🚀 우주선 (<span id="rocketCount">0</span>)</div>
<div class="upgrade-desc">초당 +50 쿠키</div>
</div>
<button class="upgrade-btn" id="rocketUpgrade">2000 🍪</button>
</div>
</div>
</div>
<script>
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function playSound(f,d){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d)}
function loadNonNegativeInt(key, fallback){
  const raw = parseInt(localStorage.getItem(key), 10);
  return Number.isFinite(raw) && raw >= 0 ? raw : fallback;
}
let cookies=loadNonNegativeInt('cookies',0);
let clickPower=Math.max(1, loadNonNegativeInt('clickPower',1));
let grandmas=loadNonNegativeInt('grandmas',0);
let factories=loadNonNegativeInt('factories',0);
let rockets=loadNonNegativeInt('rockets',0);
const cookieEl=document.getElementById('cookie'),cookiesEl=document.getElementById('cookies'),cpsEl=document.getElementById('cps'),clickLevelEl=document.getElementById('clickLevel'),grandmaCountEl=document.getElementById('grandmaCount'),factoryCountEl=document.getElementById('factoryCount'),rocketCountEl=document.getElementById('rocketCount'),clickUpgradeBtn=document.getElementById('clickUpgrade'),grandmaUpgradeBtn=document.getElementById('grandmaUpgrade'),factoryUpgradeBtn=document.getElementById('factoryUpgrade'),rocketUpgradeBtn=document.getElementById('rocketUpgrade');
function getCPS(){return grandmas*1+factories*10+rockets*50}
function update(){cookiesEl.textContent=Math.floor(cookies);cpsEl.textContent=getCPS();clickLevelEl.textContent=clickPower;grandmaCountEl.textContent=grandmas;factoryCountEl.textContent=factories;rocketCountEl.textContent=rockets;const clickCost=clickPower*10;clickUpgradeBtn.textContent=clickCost+' 🍪';clickUpgradeBtn.disabled=cookies<clickCost;const grandmaCost=100+grandmas*50;grandmaUpgradeBtn.textContent=grandmaCost+' 🍪';grandmaUpgradeBtn.disabled=cookies<grandmaCost;const factoryCost=500+factories*200;factoryUpgradeBtn.textContent=factoryCost+' 🍪';factoryUpgradeBtn.disabled=cookies<factoryCost;const rocketCost=2000+rockets*1000;rocketUpgradeBtn.textContent=rocketCost+' 🍪';rocketUpgradeBtn.disabled=cookies<rocketCost}
cookieEl.addEventListener('click',()=>{audioCtx.resume();cookies+=clickPower;playSound(400,0.05);update();save()});
cookieEl.addEventListener('touchstart',e=>{e.preventDefault();audioCtx.resume();cookies+=clickPower;playSound(400,0.05);update();save()});
clickUpgradeBtn.addEventListener('click',()=>{const cost=clickPower*10;if(cookies>=cost){cookies-=cost;clickPower++;playSound(600,0.1);update();save()}});
grandmaUpgradeBtn.addEventListener('click',()=>{const cost=100+grandmas*50;if(cookies>=cost){cookies-=cost;grandmas++;playSound(700,0.1);update();save()}});
factoryUpgradeBtn.addEventListener('click',()=>{const cost=500+factories*200;if(cookies>=cost){cookies-=cost;factories++;playSound(800,0.1);update();save()}});
rocketUpgradeBtn.addEventListener('click',()=>{const cost=2000+rockets*1000;if(cookies>=cost){cookies-=cost;rockets++;playSound(900,0.1);update();save()}});
function save(){localStorage.setItem('cookies',cookies);localStorage.setItem('clickPower',clickPower);localStorage.setItem('grandmas',grandmas);localStorage.setItem('factories',factories);localStorage.setItem('rockets',rockets)}
setInterval(()=>{cookies+=getCPS()/10;update();save()},100);
update();
</script>

<script>
(function(){
  if (window.__interactionProbeInstalled) return;
  window.__interactionProbeInstalled = true;

  let count = 0;
  const probe = document.createElement('div');
  probe.id = 'interactionProbe';
  probe.setAttribute('aria-live', 'polite');
  probe.style.position = 'fixed';
  probe.style.left = '-9999px';
  probe.style.top = '0';
  probe.style.pointerEvents = 'none';
  probe.textContent = 'interaction:0';

  function ensureProbe(){
    if (!probe.isConnected && document.body) document.body.appendChild(probe);
  }

  function mark(kind){
    count += 1;
    probe.textContent = `interaction:${count}:${kind}`;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ensureProbe, { once:true });
  } else {
    ensureProbe();
  }

  document.addEventListener('pointerdown', () => mark('pointer'), true);
  document.addEventListener('keydown', () => mark('key'), true);
  window.__markInteraction = mark;
})();
</script>
