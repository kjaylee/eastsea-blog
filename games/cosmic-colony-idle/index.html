        };
        
        const achievementDefs = {
            click1: { icon: '👆', name: '첫 클릭', desc: '1번 클릭', check: () => game.stats.totalClicks >= 1 },
            click100: { icon: '👆', name: '클릭 마스터', desc: '100번 클릭', check: () => game.stats.totalClicks >= 100 },

            build10: { icon: '🏗️', name: '작은 식민지', desc: '건물 10개 건설', check: () => game.stats.totalBuildings >= 10 },
            build50: { icon: '🏗️', name: '대도시', desc: '건물 50개 건설', check: () => game.stats.totalBuildings >= 50 },
            build100: { icon: '🏗️', name: '거대 식민지', desc: '건물 100개 건설', check: () => game.stats.totalBuildings >= 100 },
            mineral1k: { icon: '⛏️', name: '광물 수집가', desc: '광물 1000 보유', check: () => game.resources.minerals >= 1000 },

            food1k: { icon: '🌾', name: '식량 확보', desc: '식량 1000 보유', check: () => game.resources.food >= 1000 },
            research100: { icon: '🔬', name: '연구 시작', desc: '연구 100 보유', check: () => game.resources.research >= 100 },
            research1k: { icon: '🔬', name: '과학 선구자', desc: '연구 1000 보유', check: () => game.resources.research >= 1000 },
            prestige1: { icon: '✨', name: '첫 탐사', desc: '프레스티지 1회', check: () => game.stats.prestiges >= 1 },
            prestige5: { icon: '✨', name: '탐험가', desc: '프레스티지 5회', check: () => game.stats.prestiges >= 5 },
            prestige10: { icon: '✨', name: '우주 개척자', desc: '프레스티지 10회', check: () => game.stats.prestiges >= 10 },
            allBuildings: { icon: '🏆', name: '완전한 식민지', desc: '모든 건물 보유', check: () => Object.keys(buildingDefs).every(k => (game.buildings[k] || 0) > 0) },
            quantum1: { icon: '💻', name: '양자 시대', desc: '양자컴퓨터 1개 건설', check: () => (game.buildings.quantum || 0) >= 1 },
            terraform1: { icon: '🌍', name: '행성 개조', desc: '테라포머 1개 건설', check: () => (game.buildings.terraform || 0) >= 1 },
            stardust100: { icon: '⭐', name: '스타더스트 수집가', desc: '스타더스트 100 보유', check: () => game.stardust >= 100 }
        };
        
        // === Utility Functions ===
        function formatNumber(num) {
            if (num < 1000) return Math.floor(num).toString();
            const suffixes = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc'];
            let tier = Math.floor(Math.log10(num) / 3);
            if (tier >= suffixes.length) tier = suffixes.length - 1;
            const scaled = num / Math.pow(1000, tier);
            return scaled.toFixed(2) + suffixes[tier];
        }
        
        function getClickPower() {
            let power = 1;
            Object.keys(game.upgrades).forEach(u => {
                if (upgradeDefs[u] && upgradeDefs[u].click) power += upgradeDefs[u].click;
            });
            return power * getStardustMultiplier();
        }
        
        function getBuildingMultiplier(building) {
            let multi = 1;
            Object.keys(game.upgrades).forEach(u => {
                const def = upgradeDefs[u];
                if (def && def.building === building && def.multi) {
                    multi += def.multi;
                }
            });
            Object.keys(game.upgrades).forEach(u => {
                const def = upgradeDefs[u];
                if (def && def.global) multi += def.global;
            });
            return multi * getStardustMultiplier();
        }
        
        function getStardustMultiplier() {
            return 1 + game.stardust * 0.01;
        }
        
        function calculatePotentialStardust() {
            let total = 0;
            Object.keys(game.buildings).forEach(k => {
                total += game.buildings[k] || 0;
            });
            return Math.floor(Math.sqrt(total));
        }
        
        function canAfford(costs) {
            return Object.keys(costs).every(r => game.resources[r] >= costs[r]);
        }
        
        function spend(costs) {
            Object.keys(costs).forEach(r => game.resources[r] -= costs[r]);
        }
        
        function getBuildingCost(building, count) {
            const def = buildingDefs[building];
            const costs = {};
            Object.keys(def.cost).forEach(r => {
                costs[r] = Math.floor(def.cost[r] * Math.pow(1.15, count));
            });
            return costs;
        }
        
        // === Core Game Loop ===
        function gameLoop(delta) {
            // Production
            Object.keys(buildingDefs).forEach(key => {
                const count = game.buildings[key] || 0;
                if (count > 0) {
                    const def = buildingDefs[key];
                    const multi = getBuildingMultiplier(key);
                    Object.keys(def.prod).forEach(res => {
                        game.resources[res] += def.prod[res] * count * multi * (delta / 1000);
                    });
                }
            });
            
            // Update play time
            game.stats.playTime = Math.floor((Date.now() - game.startTime) / 1000);
            
            // Check achievements
            checkAchievements();
            
            // Render
            render();
        }
        
        function checkAchievements() {
            Object.keys(achievementDefs).forEach(key => {
                if (!game.achievements[key] && achievementDefs[key].check()) {
                    game.achievements[key] = true;
                    showNotification(`🏆 업적 달성: ${achievementDefs[key].name}`);
                    playSound(800, 0.2);
                }
            });
        }
        
        function showNotification(text) {
            const notif = document.createElement('div');
            notif.textContent = text;
            notif.style.position = 'fixed';
            notif.style.top = '50px';
            notif.style.left = '50%';
            notif.style.transform = 'translateX(-50%)';
            notif.style.background = 'linear-gradient(135deg, #00d4ff, #0088ff)';
            notif.style.padding = '12px 24px';
            notif.style.borderRadius = '8px';
            notif.style.zIndex = '2000';
            notif.style.boxShadow = '0 4px 20px rgba(0,212,255,0.6)';
            notif.style.animation = 'float-up 2s forwards';
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        // === Rendering ===
        function render() {
            renderResources();
            renderBuildings();
            renderUpgrades();
            renderAchievements();
            renderPrestige();
            renderStats();
        }
        
        function renderResources() {
            const container = document.getElementById('resources');
            container.innerHTML = '';
            Object.keys(resourceDefs).forEach(key => {
                const def = resourceDefs[key];
                const value = game.resources[key];
                const rate = calculateResourceRate(key);
                const div = document.createElement('div');
                div.className = 'resource';
                div.innerHTML = `
                    <div class="icon">${def.icon}</div>
                    <div class="name">${def.name}</div>
                    <div class="value">${formatNumber(value)}</div>
                    ${rate > 0 ? `<div class="rate">+${formatNumber(rate)}/초</div>` : ''}
                `;
                container.appendChild(div);
            });
        }
        
        function calculateResourceRate(resource) {
            let rate = 0;
            Object.keys(buildingDefs).forEach(key => {
                const count = game.buildings[key] || 0;
                const def = buildingDefs[key];
                if (def.prod[resource]) {
                    rate += def.prod[resource] * count * getBuildingMultiplier(key);
                }
            });
            return rate;
        }
        
        function renderBuildings() {
            const container = document.getElementById('buildings');
            container.innerHTML = '';
            Object.keys(buildingDefs).forEach(key => {
                const def = buildingDefs[key];
                const count = game.buildings[key] || 0;
                const totalBuildings = game.stats.totalBuildings;
                const locked = totalBuildings < def.unlock;
                const cost = getBuildingCost(key, count);
                const canBuy = !locked && canAfford(cost);
                
                const div = document.createElement('div');
                div.className = `building ${locked ? 'locked' : ''}`;
                
                let prodText = '';
                if (Object.keys(def.prod).length > 0) {
                    const prodList = Object.keys(def.prod).map(r => 
                        `${resourceDefs[r].icon} +${formatNumber(def.prod[r] * getBuildingMultiplier(key))}/초`
                    ).join(', ');
                    prodText = `<div class="building-production">${prodList}</div>`;
                }
                
                const costText = Object.keys(cost).map(r => 
                    `${resourceDefs[r].icon} ${formatNumber(cost[r])}`
                ).join(', ');
                
                div.innerHTML = `
                    <div class="building-header">
                        <div class="building-title">
                            <span class="icon">${def.icon}</span>
                            <div class="info">
                                <h3>${def.name}</h3>
                                <div class="count">보유: ${count}개</div>
                            </div>
                        </div>
                    </div>
                    ${prodText}
                    <div class="building-cost">${locked ? `🔒 건물 ${def.unlock}개 필요` : `비용: ${costText}`}</div>
                    <button class="btn" ${!canBuy ? 'disabled' : ''}>건설</button>
                `;
                
                div.querySelector('.btn').onclick = () => buyBuilding(key);
                container.appendChild(div);
            });
        }
        
        function renderUpgrades() {
            const container = document.getElementById('upgradeGrid');
            container.innerHTML = '';
            Object.keys(upgradeDefs).forEach(key => {
                const def = upgradeDefs[key];
                const owned = game.upgrades[key];
                if (owned) return;
                
                // Check requirements
                if (def.requires && !def.requires.every(r => game.upgrades[r])) return;
                
                const cost = def.cost;
                const canBuy = canAfford(cost);
                
                const div = document.createElement('div');
                div.className = 'upgrade';
                const costText = Object.keys(cost).map(r => 
                    `${resourceDefs[r].icon} ${formatNumber(cost[r])}`
                ).join(', ');
                
                div.innerHTML = `
                    <h4>${def.name}</h4>
                    <p>${def.desc}</p>
                    <div class="cost">${costText}</div>
                    <button class="btn" ${!canBuy ? 'disabled' : ''}>연구</button>
                `;
                
                div.querySelector('.btn').onclick = () => buyUpgrade(key);
                container.appendChild(div);
            });
        }
        
        function renderAchievements() {
            const container = document.getElementById('achievementList');
            container.innerHTML = '';
            Object.keys(achievementDefs).forEach(key => {
                const def = achievementDefs[key];
                const unlocked = game.achievements[key];
                
                const div = document.createElement('div');
                div.className = `achievement ${unlocked ? 'unlocked' : ''}`;
                div.innerHTML = `
                    <div class="icon">${def.icon}</div>
                    <div class="name">${def.name}</div>
                `;
                div.title = def.desc;
                container.appendChild(div);
            });
        }
        
        function renderPrestige() {
            const potential = calculatePotentialStardust();
            document.getElementById('potentialStardust').textContent = potential;
            document.getElementById('currentStardust').textContent = game.stardust;
            document.getElementById('stardustBonus').textContent = (game.stardust * 1).toFixed(0);
            document.getElementById('prestigeBtn').disabled = potential === 0;
        }
        
        function renderStats() {
            document.getElementById('statClicks').textContent = formatNumber(game.stats.totalClicks);
            document.getElementById('statBuildings').textContent = game.stats.totalBuildings;
            document.getElementById('statPrestiges').textContent = game.stats.prestiges;
            const time = game.stats.playTime;
            const hours = Math.floor(time / 3600);
            const mins = Math.floor((time % 3600) / 60);
            const secs = time % 60;
            document.getElementById('statTime').textContent = hours > 0 
                ? `${hours}시간 ${mins}분` 
                : mins > 0 ? `${mins}분 ${secs}초` : `${secs}초`;
        }
        
        // === Actions ===
        function clickPlanet(e) {
            const power = getClickPower();
            game.resources.minerals += power;
            game.stats.totalClicks++;
            
            playSound(300, 0.05, 'square');
            
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = `+${formatNumber(power)}`;
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            particle.style.color = resourceDefs.minerals.color;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 1000);
            
            const planet = document.getElementById('planet');
            planet.style.transform = 'scale(0.95)';
            setTimeout(() => planet.style.transform = '', 100);
            
            render();
        }
        
        function buyBuilding(key) {
            const count = game.buildings[key] || 0;
            const cost = getBuildingCost(key, count);
            if (canAfford(cost)) {
                spend(cost);
                game.buildings[key] = count + 1;
                game.stats.totalBuildings++;
                playSound(500, 0.15);
                render();
            }
        }
        
        function buyUpgrade(key) {
            const def = upgradeDefs[key];
            if (canAfford(def.cost)) {
                spend(def.cost);
                game.upgrades[key] = true;
                playSound(700, 0.2);
                showNotification(`⚡ 업그레이드 완료: ${def.name}`);
                render();
            }
        }
        
        function prestige() {
            const potential = calculatePotentialStardust();
            if (potential === 0) return;
            
            if (!confirm(`정말 새 행성으로 탐사하시겠습니까?\n\n현재 진행도가 초기화되고 ${potential} 스타더스트를 획득합니다.\n스타더스트는 영구적으로 모든 생산량을 증가시킵니다.`)) {
                return;
            }
            
            game.stardust += potential;
            game.stats.prestiges++;
            
            // Reset
            game.resources = { minerals: 0, energy: 0, food: 0, research: 0 };
            game.buildings = {};
            game.upgrades = {};
            
            playSound(1000, 0.5, 'sawtooth');
            showNotification(`✨ 새 행성 도착! +${potential} 스타더스트`);
            
            // Screen shake
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 300);
            
            render();
            save();
        }
        
        // === Events ===
        const events = [
            {
                name: '운석 충돌',
                desc: '거대 운석이 다가옵니다! 빠르게 클릭해서 파괴하세요!',
                type: 'meteor',
                action: () => {
                    let clicks = 0;
                    const required = 20;
                    const overlay = document.getElementById('eventOverlay');
                    const popup = document.getElementById('eventPopup');
                    
                    popup.innerHTML = `
                        <h2>☄️ 운석 충돌!</h2>
                        <p>운석을 파괴하세요! ${clicks}/${required}</p>
                        <button class="btn" id="meteorBtn">💥 파괴!</button>
                    `;
                    overlay.classList.add('active');
                    
                    const btn = document.getElementById('meteorBtn');
                    btn.onclick = () => {
                        clicks++;
                        playSound(400, 0.05);
                        if (clicks >= required) {
                            const reward = Math.floor(game.resources.minerals * 0.5);
                            game.resources.minerals += reward;
                            showNotification(`✅ 운석 파괴! +${formatNumber(reward)} 광물`);
                            overlay.classList.remove('active');
                        } else {
                            popup.querySelector('p').textContent = `운석을 파괴하세요! ${clicks}/${required}`;
                        }
                    };
                }
            },
            {
                name: '외계인 교역',
                desc: '평화로운 외계인이 교역을 제안합니다.',
                type: 'trade',
                action: () => {
                    const overlay = document.getElementById('eventOverlay');
                    const popup = document.getElementById('eventPopup');
                    
                    popup.innerHTML = `
                        <h2>👽 외계인 교역</h2>
                        <p>광물 500을 에너지 300으로 교환하시겠습니까?</p>
                        <div class="choices">
                            <button class="btn" id="acceptTrade">수락</button>
                            <button class="btn" id="declineTrade">거절</button>
                        </div>
                    `;
                    overlay.classList.add('active');
                    
                    document.getElementById('acceptTrade').onclick = () => {
                        if (game.resources.minerals >= 500) {
                            game.resources.minerals -= 500;
                            game.resources.energy += 300;
                            showNotification('✅ 교역 완료!');
                            playSound(600, 0.2);
                        } else {
                            showNotification('❌ 광물이 부족합니다');
                        }
                        overlay.classList.remove('active');
                    };
                    
                    document.getElementById('declineTrade').onclick = () => {
                        overlay.classList.remove('active');
                    };
                }
            },
            {
                name: '태양 폭풍',
                desc: '태양 폭풍이 다가옵니다! 방어 시스템을 가동하세요.',
                type: 'storm',
                action: () => {
                    const defenses = game.buildings.defense || 0;
                    const damage = Math.max(0, 10 - defenses);
                    const loss = Math.floor(game.resources.energy * 0.01 * damage);
                    
                    game.resources.energy = Math.max(0, game.resources.energy - loss);
                    
                    const overlay = document.getElementById('eventOverlay');
                    const popup = document.getElementById('eventPopup');
                    
                    popup.innerHTML = `
                        <h2>⚠️ 태양 폭풍!</h2>
                        <p>${defenses > 0 ? `방어탑 ${defenses}개가 피해를 막았습니다!` : '방어 시설이 없어 피해를 입었습니다!'}</p>
                        <p>에너지 손실: ${formatNumber(loss)}</p>
                        <button class="btn" id="closeStorm">확인</button>
                    `;
                    overlay.classList.add('active');
                    
                    document.getElementById('closeStorm').onclick = () => {
                        overlay.classList.remove('active');
                    };
                    
                    playSound(200, 0.3, 'sawtooth');
                    document.body.classList.add('shake');
                    setTimeout(() => document.body.classList.remove('shake'), 300);
                }
            }
        ];
        
        function triggerRandomEvent() {
            if (game.stats.totalBuildings < 5) return; // Don't trigger early
            const event = events[Math.floor(Math.random() * events.length)];
            event.action();
        }
        
        // === Save/Load ===
        function save() {
            localStorage.setItem('cosmicColonyIdleSave', JSON.stringify(game));
        }
        
        function load() {
            const saved = localStorage.getItem('cosmicColonyIdleSave');
            if (!saved) return;

            try {
                const data = JSON.parse(saved);
                if (!data || typeof data !== 'object') return;

                Object.assign(game, data);

                if (!game.stats || typeof game.stats !== 'object') {
                    game.stats = { totalClicks: 0, totalResources: 0, totalBuildings: 0, totalResearch: 0, playTime: 0 };
                }
                const playTime = Number.isFinite(game.stats.playTime) ? game.stats.playTime : 0;
                game.stats.playTime = Math.max(0, playTime);
                game.startTime = Date.now() - (game.stats.playTime * 1000);
            } catch (e) {
                console.warn('Failed to load save data:', e);
            }
        }
        
        // === Tab System ===
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            };
        });
        
        // === Initialize ===
        function init() {
            // Create stars
            const starsEl = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsEl.appendChild(star);
            }
            
            load();
            render();
            
            // Click handler
            document.getElementById('clickArea').onclick = clickPlanet;
            document.getElementById('prestigeBtn').onclick = prestige;
            
            // Game loop
            let lastTime = Date.now();
            setInterval(() => {
                const now = Date.now();
                const delta = now - lastTime;
                lastTime = now;
                gameLoop(delta);
            }, 100);
            
            // Auto-save
            setInterval(save, 30000);
            
            // Random events
            setInterval(() => {
                if (Math.random() < 0.1) { // 10% chance every 30s
                    triggerRandomEvent();
                }
            }, 30000);
            
            // Resume from offline
            if (game.lastSave) {
                const offlineTime = (Date.now() - game.lastSave) / 1000;
                if (offlineTime > 60) {
                    const offlineGains = {};
                    Object.keys(buildingDefs).forEach(key => {
                        const count = game.buildings[key] || 0;
                        const def = buildingDefs[key];
                        const multi = getBuildingMultiplier(key);
                        Object.keys(def.prod).forEach(res => {
                            offlineGains[res] = (offlineGains[res] || 0) + def.prod[res] * count * multi * Math.min(offlineTime, 3600);
                        });
                    });
                    
                    Object.keys(offlineGains).forEach(r => {
                        game.resources[r] += offlineGains[r];
                    });
                    
                    const gainText = Object.keys(offlineGains)
                        .filter(r => offlineGains[r] > 0)
                        .map(r => `${resourceDefs[r].icon} +${formatNumber(offlineGains[r])}`)
                        .join(', ');
                    
                    if (gainText) {
                        showNotification(`⏰ 오프라인 수익: ${gainText}`);
                    }
                }
            }
            game.lastSave = Date.now();
        }
        
        init();
        
        // === Additional Game Systems ===
        
        /**
         * Achievement System Enhancement
         * Tracks detailed player progression and milestones
         * Provides additional gameplay motivation through meta-progression
         */
        const extendedAchievements = {
            speedRunner1: {
                icon: '⚡',
                name: '스피드러너',
                desc: '10분 안에 건물 10개 건설',
                check: () => game.stats.totalBuildings >= 10 && game.stats.playTime < 600
            },
            hoarder: {
                icon: '💰',
                name: '수집광',
                desc: '모든 자원 10000 이상 보유',
                check: () => Object.values(game.resources).every(v => v >= 10000)
            },
            scientist: {
                icon: '🔬',
                name: '과학자',
                desc: '모든 업그레이드 완료',
                check: () => Object.keys(upgradeDefs).every(k => game.upgrades[k])
            },
            megaColony: {
                icon: '🌟',
                name: '메가 식민지',
                desc: '건물 1000개 건설',
                check: () => game.stats.totalBuildings >= 1000
            },
            clickMaster: {
                icon: '👑',
                name: '클릭 마스터',
                desc: '10000번 클릭',
                check: () => game.stats.totalClicks >= 10000
            },
            prestigeMaster: {
                icon: '✨',
                name: '프레스티지 마스터',
                desc: '프레스티지 25회',
                check: () => game.stats.prestiges >= 25
            },
            marathonPlayer: {
                icon: '⏱️',
                name: '마라톤 플레이어',
                desc: '총 플레이 시간 1시간 이상',
                check: () => game.stats.playTime >= 3600
            }
        };
        
        // Merge extended achievements
        Object.assign(achievementDefs, extendedAchievements);
        
        /**
         * Building Production Calculator
         * Calculates optimal building ratios for maximum efficiency
         */
        function calculateOptimalRatio() {
            const ratios = {};
            let total = 0;
            Object.keys(buildingDefs).forEach(key => {
                ratios[key] = game.buildings[key] || 0;
                total += ratios[key];
            });
            return total > 0 ? ratios : null;
        }
        
        /**
         * Resource Efficiency Metrics
         * Tracks production efficiency and identifies bottlenecks
         */
        function analyzeEfficiency() {
            const analysis = {};
            Object.keys(resourceDefs).forEach(res => {
                const rate = calculateResourceRate(res);
                const current = game.resources[res];
                analysis[res] = {
                    rate: rate,
                    timeToDouble: rate > 0 ? current / rate : Infinity,
                    efficiency: rate * current
                };
            });
            return analysis;
        }
        
        /**
         * Event System Enhancements
         * Additional random events for variety
         */
        const additionalEvents = [
            {
                name: '고대 유적 발견',
                desc: '고대 문명의 유적을 발견했습니다!',
                type: 'ruins',
                action: () => {
                    const bonus = Math.floor(game.resources.research * 0.3);
                    game.resources.research += bonus;
                    showNotification(`🏛️ 고대 유적! +${formatNumber(bonus)} 연구`);
                    playSound(750, 0.3);
                }
            },
            {
                name: '풍부한 광맥',
                desc: '거대한 광맥을 발견했습니다!',
                type: 'vein',
                action: () => {
                    const bonus = Math.floor(game.resources.minerals * 0.5);
                    game.resources.minerals += bonus;
                    showNotification(`⛏️ 광맥 발견! +${formatNumber(bonus)} 광물`);
                    playSound(350, 0.3);
                }
            },
            {
                name: '에너지 오버로드',
                desc: '에너지 시스템이 과충전되었습니다!',
                type: 'overload',
                action: () => {
                    const bonus = Math.floor(game.resources.energy * 0.4);
                    game.resources.energy += bonus;
                    showNotification(`⚡ 에너지 급증! +${formatNumber(bonus)} 에너지`);
                    playSound(850, 0.25);
                }
            },
            {
                name: '대풍년',
                desc: '식량 생산이 급증했습니다!',
                type: 'harvest',
                action: () => {
                    const bonus = Math.floor(game.resources.food * 0.6);
                    game.resources.food += bonus;
                    showNotification(`🌾 대풍년! +${formatNumber(bonus)} 식량`);
                    playSound(450, 0.3);
                }
            }
        ];
        
        events.push(...additionalEvents);
        
        /**
         * Advanced Building Upgrade System
         * Allows buildings to be upgraded individually for enhanced production
         */
        const buildingUpgrades = {
            mine: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 },
            solar: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 },
            farm: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 },
            lab: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 },
            factory: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 },
            habitat: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 },
            defense: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 },
            spaceport: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 },
            terraform: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 },
            quantum: { level: 0, maxLevel: 5, costMulti: 2, prodMulti: 1.5 }
        };
        
        /**
         * Milestone System
         * Tracks major progression milestones and rewards player
         */
        const milestones = {
            buildings10: { threshold: 10, reward: 'minerals', amount: 1000, claimed: false },
            buildings25: { threshold: 25, reward: 'energy', amount: 500, claimed: false },
            buildings50: { threshold: 50, reward: 'research', amount: 200, claimed: false },
            buildings100: { threshold: 100, reward: 'all', amount: 5000, claimed: false },
            prestige3: { threshold: 3, type: 'prestige', reward: 'stardust', amount: 10, claimed: false },
            prestige10: { threshold: 10, type: 'prestige', reward: 'stardust', amount: 50, claimed: false }
        };
        
        function checkMilestones() {
            Object.keys(milestones).forEach(key => {
                const m = milestones[key];
                if (m.claimed) return;
                
                const value = m.type === 'prestige' ? game.stats.prestiges : game.stats.totalBuildings;
                if (value >= m.threshold) {
                    if (m.reward === 'all') {
                        Object.keys(game.resources).forEach(r => {
                            game.resources[r] += m.amount;
                        });
                        showNotification(`🎉 마일스톤! 모든 자원 +${formatNumber(m.amount)}`);
                    } else if (m.reward === 'stardust') {
                        game.stardust += m.amount;
                        showNotification(`🎉 마일스톤! +${m.amount} 스타더스트`);
                    } else {
                        game.resources[m.reward] += m.amount;
                        showNotification(`🎉 마일스톤! +${formatNumber(m.amount)} ${resourceDefs[m.reward].name}`);
                    }
                    m.claimed = true;
                    playSound(900, 0.4);
                }
            });
        }
        
        // Enhanced game loop with milestones
        setInterval(checkMilestones, 5000);
        
        /**
         * Statistics Tracking Enhancement
         * Detailed statistics for advanced players
         */
        const detailedStats = {
            totalResourcesGained: { minerals: 0, energy: 0, food: 0, research: 0 },
            totalResourcesSpent: { minerals: 0, energy: 0, food: 0, research: 0 },
            buildingsBuilt: {},
            upgradesPurchased: 0,
            eventsTriggered: 0,
            achievementsUnlocked: 0
        };
        
        /**
         * Export/Import Save System
         * Allows players to backup and restore their progress
         */
        function exportSave() {
            const saveData = JSON.stringify(game);
            const encoded = btoa(saveData);
            return encoded;
        }
        
        function importSave(encoded) {
            try {
                const decoded = atob(encoded);
                const data = JSON.parse(decoded);
                Object.assign(game, data);
                render();
                showNotification('✅ 저장 데이터 불러오기 성공!');
                return true;
            } catch (e) {
                showNotification('❌ 잘못된 저장 데이터');
                return false;
            }
        }
        
        /**
         * Performance Optimization
         * Throttle rendering for better performance on low-end devices
         */
        let renderQueued = false;
        function queueRender() {
            if (!renderQueued) {
                renderQueued = true;
                requestAnimationFrame(() => {
                    render();
                    renderQueued = false;
                });
            }
        }
        
        /**
         * Tutorial System
         * Guide new players through basic mechanics
         */
        const tutorialSteps = [
            { condition: () => game.stats.totalClicks === 0, message: '행성을 클릭해서 광물을 채굴하세요!' },
            { condition: () => game.resources.minerals >= 10 && (game.buildings.mine || 0) === 0, message: '광산을 건설해서 자동으로 광물을 생산하세요!' },
            { condition: () => (game.buildings.mine || 0) >= 1 && (game.buildings.solar || 0) === 0, message: '에너지가 필요합니다. 태양광패널을 건설하세요!' },
            { condition: () => Object.keys(game.upgrades).length === 0 && game.resources.research >= 10, message: '업그레이드 탭에서 연구를 시작하세요!' },
            { condition: () => game.stats.totalBuildings >= 10 && game.stats.prestiges === 0, message: '프레스티지로 영구 보너스를 받으세요!' }
        ];
        
        let currentTutorialStep = 0;
        function checkTutorial() {
            if (currentTutorialStep >= tutorialSteps.length) return;
            const step = tutorialSteps[currentTutorialStep];
            if (step.condition()) {
                showNotification(`💡 ${step.message}`);
                currentTutorialStep++;
            }
        }
        
        setInterval(checkTutorial, 10000);
    </script>

    <!-- leaderboard-integration:cosmic-colony-idle -->
    <div id="leaderboard" data-lb-slug="cosmic-colony-idle" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "cosmic-colony-idle";
      const CANDIDATE_OBJECTS = ["game", "resourceDefs", "buildingDefs", "upgradeDefs", "achievementDefs", "costs", "offlineGains", "extendedAchievements", "ratios", "analysis", "buildingUpgrades", "milestones", "detailedStats"];
      const END_METHODS = ["gameOver", "endGame", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["start", "init", "startGame", "newGame", "restart", "retry", "resetGame", "initGame", "beginGame", "playAgain"];
      const SCORE_KEYS = ["level", "time", "score", "points", "gold", "coins", "wave", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
