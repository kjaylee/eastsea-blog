<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>컬트 타이쿤 — 풍자/교육 시뮬레이터</title>
  <style>
    :root{
      --bg:#0a0812;
      --panel:#1a1228;
      --accent:#9b59b6;
      --danger:#e74c3c;
      --text:#f2eaff;
      --muted:#b7a4cc;
      --ok:#2ecc71;
      --line:#34244f;
      --warn:#f39c12;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,"Noto Sans KR",sans-serif}
    a{color:#c99cff}
    button{border:1px solid var(--line);background:#281a3d;color:var(--text);padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13px}
    button:hover{filter:brightness(1.08)}
    button:disabled{opacity:.4;cursor:not-allowed}
    .danger{background:#3a1621;border-color:#6c2737}
    .accent{background:#2f1b45;border-color:#5e3185}
    .ghost{background:transparent}
    .tag{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;border:1px solid var(--line);background:#211433;color:var(--muted)}
    .tag-danger{border-color:#6c2737;background:#2d131a;color:#ffb3b3}
    .tag-ok{border-color:#296040;background:#0e2118;color:#9ff1c0}

    #app{min-height:100vh;display:flex;flex-direction:column}
    .topbar{
      display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;
      padding:10px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#120b1d,#0b0814);
      position:sticky;top:0;z-index:40
    }
    .top-left,.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .stat{padding:6px 10px;border:1px solid var(--line);border-radius:10px;background:#130d1f;font-size:13px}
    .speed-group{display:flex;gap:4px}
    .speed-btn.active{background:#4b2a6d;border-color:#8d56c2}

    .layout{display:flex;min-height:0;flex:1}
    .sidebar{width:190px;border-right:1px solid var(--line);background:#120c1d;padding:10px;display:flex;flex-direction:column;gap:6px}
    .tab-btn{text-align:left;padding:10px;border-radius:12px;background:#180f26}
    .tab-btn.active{background:#3a2055;border-color:#8754bc}

    .main{flex:1;display:flex;flex-direction:column;min-width:0}
    .content{padding:12px;display:grid;gap:10px;align-content:flex-start}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px}
    .panel h3{margin:0 0 8px 0;font-size:16px}
    .grid{display:grid;gap:8px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{border:1px solid var(--line);background:#181026;border-radius:12px;padding:8px;display:grid;gap:6px}
    .card-title{font-weight:700;font-size:13px}
    .desc{color:var(--muted);font-size:12px;line-height:1.35}
    .mini{font-size:11px;color:var(--muted)}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .bar{height:8px;background:#0e0a16;border:1px solid var(--line);border-radius:999px;overflow:hidden}
    .fill{height:100%;background:linear-gradient(90deg,var(--accent),#d486ff)}

    .eventbar{border-top:1px solid var(--line);background:#0f0a19;padding:8px 10px;max-height:130px;overflow:auto;font-size:12px}
    .event{padding:3px 0;border-bottom:1px dashed #2a1c40;color:#d8c5ef}

    .table{width:100%;border-collapse:collapse;font-size:12px}
    .table th,.table td{border-bottom:1px solid #2e2045;padding:6px;text-align:left}
    .table th{color:#c8abeb;font-weight:600}

    canvas{width:100%;height:180px;background:#130d20;border:1px solid var(--line);border-radius:10px}

    .modal{
      position:fixed;inset:0;background:rgba(5,3,8,.85);display:none;align-items:center;justify-content:center;
      z-index:100;padding:16px
    }
    .modal.show{display:flex}
    .modal-box{max-width:760px;width:min(96vw,760px);background:#161022;border:1px solid var(--line);border-radius:16px;padding:14px;display:grid;gap:10px}
    .modal-box h2{margin:0}

    .bottom-tabs{display:none}
    .crime{color:#ffb3b3;font-size:11px}

    @media (max-width:960px){
      .grid.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid.cols-3{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:760px){
      .sidebar{display:none}
      .layout{padding-bottom:62px}
      .content{padding:10px}
      .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}
      .topbar{position:sticky;top:0}
      .bottom-tabs{
        display:flex;position:fixed;left:0;right:0;bottom:0;z-index:50;
        border-top:1px solid var(--line);background:#110b1b;padding:6px;gap:6px;overflow:auto
      }
      .bottom-tabs button{min-width:84px;white-space:nowrap}
      .eventbar{margin-bottom:62px;max-height:150px}
    }
    @media (max-width:360px){
      .stat{font-size:12px;padding:5px 8px}
      button{font-size:12px;padding:7px 8px}
    }
  </style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="top-left">
      <div class="speed-group" id="speedGroup">
        <button class="speed-btn" data-speed="0">⏸</button>
        <button class="speed-btn active" data-speed="1">×1</button>
        <button class="speed-btn" data-speed="2">×2</button>
        <button class="speed-btn" data-speed="5">×5</button>
        <button class="speed-btn" data-speed="10">×10</button>
      </div>
      <div class="stat" id="dayStat">1일차</div>
      <div class="stat" id="cashStat">💰 $0</div>
      <div class="stat" id="followerStat">👥 0</div>
      <div class="stat" id="charismaStat">⭐ 0</div>
      <div class="stat" id="scrutinyStat">👁️ 0</div>
      <div class="stat" id="staminaStat">⚡ 0/0</div>
    </div>
    <div class="top-right">
      <button id="saveQuick">빠른저장</button>
      <button id="loadQuick">빠른불러오기</button>
      <button id="newGameBtn" class="danger">새 게임</button>
      <a href="/" class="tag">포탈로 돌아가기</a>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main">
      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="bottom-tabs" id="bottomTabs"></div>

  <section class="eventbar" id="eventLog"></section>
</div>

<div class="modal" id="disclaimerModal">
  <div class="modal-box">
    <h2>⚠️ 면책 고지</h2>
    <div>
      이 게임은 사이비 교단의 포섭 수법을 풍자/교육 목적으로 시뮬레이션합니다.<br>
      실제 피해 예방과 비판적 사고를 위한 콘텐츠이며, 현실에서의 모방·권장 목적이 아닙니다.
    </div>
    <div class="row">
      <button class="accent" id="agreeStart">동의하고 시작</button>
    </div>
  </div>
</div>

<div class="modal" id="choiceModal">
  <div class="modal-box">
    <h2 id="choiceTitle"></h2>
    <div id="choiceBody"></div>
    <div class="row" id="choiceActions"></div>
  </div>
</div>

<div class="modal" id="endingModal">
  <div class="modal-box">
    <h2 id="endingTitle">엔딩</h2>
    <div id="endingBody"></div>
    <div class="panel">
      <b>피해 상담/도움</b><br>
      - 자살·정신건강 상담 1393 (24시간)<br>
      - 경찰청 112 / 긴급 119<br>
      - 지역 정신건강복지센터 및 법률구조공단 상담
    </div>
    <div class="row">
      <button id="endingNewGame">새 게임 시작</button>
      <button id="endingContinue" class="accent">엔딩 이후 계속</button>
      <a href="/" class="tag">포탈로 돌아가기</a>
    </div>
  </div>
</div>

    if(!amount) return;

    state.monthlyIncome += amount;

    if(!amount) return false;

    state.cash -= amount;
    state.stats.totalSpent += amount;
    state.monthlyExpense += amount;
    return true;

    return choice(lastNames)+choice(firstNames)+choice(["수","민","현","아","진","호",""]);

  function createFollower(){
    return {
      id: state.nextFollowerId++,
      name: genName(),
      loyalty: clamp(rand(8,24)+Math.floor(state.charisma*0.2),0,100),
      suspicion: clamp(rand(5,20),0,100),
      wealth: rand(1,5),
      ability: rand(1,5),
      network: rand(1,5),
      weakness: choice(weaknesses),
      stage: 1,
      secret: 0,
    };
  }

  function createFollowers(count, reason="포교"){
    const cap = baseCap();
    let can = count;
    if(Number.isFinite(cap)) can = Math.max(0, Math.min(count, cap - state.followers.length));
    if(can<=0){
      log("⚠️ 거점 수용 한계로 신규 유입 실패");
      return 0;
    }
    for(let i=0;i<can;i++) state.followers.push(createFollower());
    state.stats.recruited += can;
    log(`➕ ${reason}: ${can}명 유입`);
    return can;
  }

  function countTier(name){
    return state.followers.filter(f=>tierNameByLoyalty(f.loyalty)===name).length;
  }

  function followersByStage(stage){
    return state.followers.filter(f=>f.stage===stage);
  }

  function eligibleFollowers(minTier="간부"){
    const order = {"수련생":0,"정회원":1,"간부":2,"장로":3,"측근":4};
    const need = order[minTier];
    return state.followers.filter(f=>order[tierNameByLoyalty(f.loyalty)]>=need);
  }

  function stageShift(f){
    if(f.stage===1 && f.loyalty>=36) f.stage=2;
    if(f.stage===2 && f.loyalty>=54) f.stage=3;
    if(f.stage===3 && f.loyalty>=72) f.stage=4;
    if(f.stage===4 && f.loyalty>=88) f.stage=5;
  }

  function massSuspicion(delta, filter=()=>true){
    state.followers.forEach(f=>{
      if(filter(f)) f.suspicion = clamp(f.suspicion+delta,0,100);
    });
  }

  function boostWeakness(w, amount){
    state.followers.forEach(f=>{
      if(f.weakness===w){
        f.loyalty = clamp(f.loyalty+amount,0,100);
        stageShift(f);
      }
    });
  }

    const idx = state.followers.findIndex(f=>f.id===fid);

    const f = state.followers[idx];
    state.followers.splice(idx,1);
    state.stats.left++;
    const roles = Object.keys(state.executives);
    for(const r of roles){
      if(state.executives[r]===fid){
        state.executives[r]=null;

      if(p<=0){log("참가자가 부족합니다.");return}
      let gain=0;
      for(let i=0;i<p;i++) gain += rand(50,500);
      addCash(gain,"세미나 참가비");
      state.stats.seminarEarned += gain;
      log(`🎟️ 세미나참가비 ${p}명 / ${fmt(gain)}`);
    },
    estate(){
      if(!safeSpend(12,0)) return;
      const conf = state.followers.filter(f=>tierNameByLoyalty(f.loyalty)==="측근" && f.stage>=5);
      if(!conf.length){log("측근(착취 단계) 필요");return}
      const donor = choice(conf);
      const gain = rand(10000,100000);
      addCash(gain,"부동산 헌납");
      state.stats.realEstateEarned += gain;
      donor.suspicion = clamp(donor.suspicion+20,0,100);
      adjScrutiny(10);
      log(`🏢 ${donor.name} 부동산 헌납 ${fmt(gain)} (⚠️ 실제 범죄)`);
    }
  };

  function assignExecutive(role){
    const pool = eligibleFollowers("간부").filter(f=>!Object.values(state.executives).includes(f.id));
    if(!pool.length){log("배치 가능한 간부가 없습니다.");return}
    const f = choice(pool);
    state.executives[role] = f.id;
    state.hadAnyExecutive = true;
    log(`👤 ${f.name} → ${roleName(role)} 배치`);
    render();
  }

  function removeExecutive(role){
    if(!state.executives[role]) return;
    state.executives[role]=null;
    log(`${roleName(role)} 해임`);
    render();
  }

  function hireFreelancer(id){
    const p = state.freelancerPool.find(v=>v.id===id);
    if(!p){log("해당 프리랜서가 풀에 없습니다.");return}
    if(state.cash< p.cost){log("고용 비용 부족");return}
    spendCash(p.cost,"프리랜서 고용");
    state.stats.freelancerHired++;
    state.freelancersActive.push({
      id:p.id,
      name:p.name,
      remain:rand(p.days[0],p.days[1]),
      reward:rand(p.reward[0],p.reward[1]),
      betrayal:p.betrayal,
      effect:p.effect
    });
    state.freelancerPool = state.freelancerPool.filter(v=>v.id!==id);
    log(`🧑‍💻 ${p.name} 고용 완료`);
    render();
  }

  function unlockItem(id){
    if(hasItem(id)) return;
    const it = ITEMS.find(v=>v.id===id);
    if(!it) return;
    if(!spendCash(it.cost,"아이템 구매")){log("현금 부족");return}
    state.items.push(id);
    if(id==="speech") state.charisma = clamp(state.charisma+2,1,100);
    if(id==="image") state.charisma = clamp(state.charisma+3,1,100);
    if(id==="charisma") state.charisma = clamp(state.charisma+5,1,100);
    log(`🎒 ${it.name} 구매`);
    render();
  }

  function buyFacility(id){
    if(hasFacility(id)) return;
    const f = FACILITIES.find(v=>v.id===id);
    if(!f) return;
    if(!spendCash(f.cost,"시설 구매")){log("현금 부족");return}
    state.facilities.push(id);
    log(`🏗️ ${f.name} 설치 완료`);
    render();
  }

  function researchDoctrine(){
    if(state.doctrine>=10){log("교리 레벨 최대");return}
    const needCash = 100*state.doctrine;
    if(!safeSpend(30,needCash)) return;
    state.doctrine++;
    state.charisma = clamp(state.charisma+1,1,100);
    log(`📿 교리 레벨 ${state.doctrine} 달성`);
    render();
  }

  function startRelocation(){
    if(state.baseLevel>=BASES.length-1){log("최종 거점입니다.");return}
    if(state.relocating){log("이미 이전 진행 중입니다.");return}
    const next = BASES[state.baseLevel+1];
    const moveCost = next.monthly*3;
    if(!spendCash(moveCost,"거점 이전 비용")){log("이전 비용 부족");return}
    state.relocating={to:state.baseLevel+1, days:rand(3,5)};
    log(`🚚 ${next.name} 이전 시작 (${state.relocating.days}일)`);
    render();
  }

  function processRelocation(){
    if(!state.relocating) return;
    state.relocating.days--;
    if(state.relocating.days<=0){
      const to = state.relocating.to;
      state.baseLevel = to;
      state.staminaMax = BASES[to].stamina;
      state.stamina = Math.min(state.stamina, state.staminaMax);
      const lossRate = rand(5,15)/100;
      const loss = Math.floor(state.followers.length*lossRate);
      for(let i=0;i<loss;i++){
        if(!state.followers.length) break;
        const idx = rand(0,state.followers.length-1);
        markFollowerLeft(state.followers[idx].id,true);
      }
      log(`✅ 거점 이전 완료: ${BASES[to].name} / 이탈 ${loss}명`);
      state.relocating = null;
    }
  }

  function generateFreelancerPool(){
    if(state.cash<3000 && state.day<20) return;
    const count = rand(2,4);
    const list = [...FREELANCERS];
    const out = [];
    while(out.length<count && list.length){
      const i = rand(0,list.length-1);
      out.push(list.splice(i,1)[0]);
    }
    state.freelancerPool = out;
  }

  function autoExecutiveWork(){
    for(const role of EXEC_ROLES){
      const fid = state.executives[role.id];
      if(!fid) continue;
      const f = state.followers.find(v=>v.id===fid);
      if(!f){state.executives[role.id]=null; continue;}
      switch(role.id){
        case "recruit": {
          const n = rand(0,2);
          if(n>0) createFollowers(n,"간부 자동 포교");
          break;
        }
        case "counsel": {
          const t = getTargets(v=>v.suspicion>10,3);
          t.forEach(v=>v.suspicion=clamp(v.suspicion-rand(2,6),0,100));
          break;
        }
        case "finance": {
          addCash(80+f.ability*20,"재무 자동화");
          break;
        }
        case "security": {
          adjScrutiny(-1);
          break;
        }
        case "media": {
          if(state.scrutiny>25) adjScrutiny(-2);
          break;
        }
        case "edu": {
          const t=getTargets(v=>v.stage>=2&&v.stage<=4,3);
          t.forEach(v=>{v.loyalty=clamp(v.loyalty+2,0,100);stageShift(v)});
          break;
        }
      }
    }
  }

  function resolveFreelancers(){
    for(let i=state.freelancersActive.length-1;i>=0;i--){
      const f = state.freelancersActive[i];
      f.remain--;
      if(f.remain<=0){
        if(Math.random()<f.betrayal){
          adjScrutiny(20);
          log(`☠️ 프리랜서 ${f.name} 배신! 감시도 급등`);
        }else{
          addCash(f.reward,`프리랜서 성과(${f.name})`);
          if(f.id==="pr") adjScrutiny(-5);
          if(f.id==="real" && Math.random()<0.35) state.overseasSites++;
          if(f.id==="data") createFollowers(rand(1,4),"데이터 타겟팅 성과");
          log(`✅ 프리랜서 ${f.name} 작업 완료: ${fmt(f.reward)}`);
        }
        state.freelancersActive.splice(i,1);
      }
    }
  }

  function settleDailyIncome(){
    const members = state.followers.filter(f=>tierNameByLoyalty(f.loyalty)!=="수련생");
    const labor = members.length*30;
    if(labor>0){
      addCash(labor,"봉사노동");
      state.stats.dailyLaborEarned += labor;
    }

    if(state.doctrine>=3 && state.followers.length>0){
      const sales = rand(0,Math.min(8,Math.floor(state.followers.length/20)));
      if(sales>0){
        let gain=0;
        for(let i=0;i<sales;i++) gain+=rand(20,200);
        addCash(gain,"일일 상품판매");
        state.stats.productEarned += gain;
      }
    }

    if(state.day%30===0){
      const donors = members;
      const basic = donors.reduce((a,f)=>a+f.wealth*50,0);
      if(basic>0){
        addCash(basic,"기본헌금");
        state.stats.monthlyDonationEarned += basic;
      }
      if(state.doctrine>=4){
        const tithe = donors.reduce((a,f)=>a+f.wealth*150,0);
        addCash(tithe,"십일조");
        state.stats.titheEarned += tithe;
      }
      if(state.baseLevel>=4){
        let ext = rand(1000,5000);
        if(hasItem("offshore")) ext=Math.round(ext*1.2);
        addCash(ext,"외부사업");
        state.stats.externalBusinessEarned += ext;
      }

      let monthlyCost = BASES[state.baseLevel].monthly;
      monthlyCost += state.facilities.reduce((a,id)=>a+Math.round((FACILITIES.find(f=>f.id===id)?.cost||0)*0.03),0);
      spendCash(monthlyCost,"월간 유지비");

      if(hasItem("corp")) adjScrutiny(-2);
      if(hasFacility("lobby")) adjScrutiny(-3);
      if(hasFacility("vault")) addCash(Math.round(state.cash*0.01),"금고 이자");

      state.stats.lastMonthlyNet = state.monthlyIncome - state.monthlyExpense;
      log(`📅 월말 정산: 수입 ${fmt(state.monthlyIncome)} / 지출 ${fmt(state.monthlyExpense)}`);
      state.monthlyIncome = 0;
      state.monthlyExpense = 0;
      generateFreelancerPool();
    }
  }

  function recoverStamina(){
    let rec = 18 + Math.floor(state.charisma/20);
    if(hasFacility("kitchen")) rec += 8;
    state.stamina = clamp(state.stamina + rec,0,state.staminaMax);
  }

  function processFollowersDay(){
    for(let i=state.followers.length-1;i>=0;i--){
      const f = state.followers[i];

      let susDrift = rand(-2,3);
      if(hasFacility("meditate")) susDrift -= 1;
      if(state.day<=14 && susDrift>1) susDrift = 1;
      f.suspicion = clamp(f.suspicion + susDrift,0,100);

      if(f.stage>=4) f.loyalty = clamp(f.loyalty + rand(0,2),0,100);
      if(f.stage<=2 && state.scrutiny>50) f.suspicion = clamp(f.suspicion+2,0,100);

      if(f.suspicion > f.loyalty * 0.8){
        markFollowerLeft(f.id,false);
        continue;
      }

      if(f.loyalty>95 && f.stage<5) f.stage++;
      stageShift(f);
    }

    if(state.hadAnyExecutive && Object.values(state.executives).every(v=>!v) && eligibleFollowers("간부").length===0){
      triggerEnding("내부붕괴");
    }
  }

  function maybeRandomEvent(){
    if(state.pendingChoice || state.ended) return;
    if(Math.random()>0.20) return;

    const daysSinceChoice = state.day - (state._lastChoiceDay||0);
    const r = Math.random();
    if(r<0.15 && daysSinceChoice>=15){
      const ev = choice(CHOICE_EVENTS);
      state.pendingChoice = ev;
      state._lastChoiceDay = state.day;
      state._speedBeforeChoice = speed;
      speed = 0;
      renderSpeedButtons();
      openChoice(ev);
      return;
    }

    const usePos = Math.random()<0.45;
    if(usePos){
      const pool = POS_EVENTS.filter(v=>Math.random()<v.p);
      if(pool.length){
        const e = choice(pool);
        e.run(state);
      }
    }else{
      if(state.day<=14 && Math.random()<0.75) return; // 초기 억제
      const pool = NEG_EVENTS.filter(v=>Math.random()<v.p);
      if(pool.length){
        const e = choice(pool);
        e.run(state);
      }
    }
  }

  function updateStageCount(){
    state.stageCount = [1,2,3,4,5].map(s=>state.followers.filter(f=>f.stage===s).length);
  }

  function updateProgress(){
    MILESTONES.forEach(m=>{
      if(!state.milestones.includes(m.id) && m.done(state)){
        state.milestones.push(m.id);
        log(`🏁 마일스톤 달성: ${m.name}`);
      }
    });
    CHALLENGES.forEach(c=>{
      if(!state.challenges.includes(c.id) && c.done(state)){
        state.challenges.push(c.id);
        log(`🏆 도전과제 달성: ${c.name}`);
      }
    });
    if(state.scrutiny>=60) state.stats.highScrutinyDays++;
  }

  function recordHistory(){
    state.history.cash.push(state.cash);
    state.history.followers.push(state.followers.length);
    if(state.history.cash.length>120) state.history.cash.shift();
    if(state.history.followers.length>120) state.history.followers.shift();
  }

  function checkEndingConditions(){
    if(state.ended) return;
    if(state.scrutiny>=100){triggerEnding("법의심판"); return;}
    if(state.followers.length>=10000 && state.overseasSites>=3){triggerEnding("세계정복"); return;}
    if(state.followers.length>=5000 && state.scrutiny<40){triggerEnding("종교제국"); return;}
  }

  function triggerEnding(kind){
    if(state.ended) return;
    state.ended = true;
    speed = 0;
    renderSpeedButtons();

    let title = "";
    let body = "";
    switch(kind){
      case "종교제국":
        title = "🏆 엔딩: 종교제국";
        body = "신도 5,000+와 낮은 감시도로 조직은 제도권 주변까지 확장되었습니다. 풍자는 끝났지만 현실의 피해는 계속됩니다.";
        break;
      case "황금탈출":
        title = "💰 엔딩: 황금탈출";
        body = "거액을 확보한 뒤 도주를 선택했습니다. 남겨진 사람들의 삶은 붕괴했습니다.";
        break;
      case "법의심판":
        title = "⚖️ 엔딩: 법의심판";
        body = "감시도 100 도달. 수사와 재판이 시작되며 조직은 공중분해됩니다.";
        break;
      case "참된각성":
        title = "🕊️ 히든 엔딩: 참된각성";
        body = "자수를 선택했습니다. 피해 회복과 진실 규명이 시작됩니다.";
        break;
      case "내부붕괴":
        title = "🔥 엔딩: 내부붕괴";
        body = "핵심 간부가 모두 이탈하여 조직 구조가 붕괴했습니다.";
        break;
      case "세계정복":
        title = "🌍 엔딩: 세계정복";
        body = "신도 10,000+와 해외 3거점. 영향력은 커졌지만 감시 또한 전지구적이 되었습니다.";
        break;
      default:
        title = "엔딩";
        body = "시뮬레이션 종료";
    }
    state.endings.push(kind);
    $("#endingTitle").textContent = title;
    $("#endingBody").innerHTML = `<div>${body}</div>`;
    $("#endingModal").classList.add("show");
    log(`=== ${title} ===`);
    saveAuto();
  }

  function dayTick(){
    if(state.ended || speed===0) return;

    state.day++;
    recoverStamina();
    settleDailyIncome();
    autoExecutiveWork();
    processRelocation();
    resolveFreelancers();
    maybeRandomEvent();
    processFollowersDay();
    updateStageCount();
    updateProgress();
    recordHistory();
    checkEndingConditions();
    if(state.day%3===0) saveAuto();
    render();
  }

  function gameLoop(){
    if(speed===0 || state.ended) return;
    for(let i=0;i<speed;i++) dayTick();
  }

  function startLoop(){
    if(loopHandle) clearInterval(loopHandle);
    loopHandle = setInterval(gameLoop,1000);
  }

  function renderSpeedButtons(){
    document.querySelectorAll(".speed-btn").forEach(b=>{
      b.classList.toggle("active", Number(b.dataset.speed)===speed);
    });
  }

  function stageSummary(){
    const total = state.followers.length||1;
    return [1,2,3,4,5].map(i=>{
      const c = state.stageCount[i-1]||0;
      const p = Math.round(c/total*100);
      return `<div class="row"><span class="mini">${STAGE_NAMES[i-1]} ${c}명 (${p}%)</span><div class="bar" style="flex:1"><div class="fill" style="width:${p}%"></div></div></div>`;
    }).join("");
  }

  function render(){
    $("#dayStat").textContent = `${state.day}일차`;
    $("#cashStat").textContent = `💰 ${fmt(state.cash)}`;
    $("#followerStat").textContent = `👥 ${state.followers.length.toLocaleString("ko-KR")}`;
    $("#charismaStat").textContent = `⭐ ${state.charisma}`;
    $("#scrutinyStat").textContent = `👁️ 감시도 ${state.scrutiny} (${scrutinyLabel(state.scrutiny)})`;
    $("#staminaStat").textContent = `⚡ ${Math.round(state.stamina)}/${state.staminaMax}`;

    renderTabs();
    renderContent();
  }

  function renderTabs(){
    const tabHtml = TABS.map(t=>`<button class="tab-btn ${currentTab===t.id?"active":""}" data-tab="${t.id}">${t.label}</button>`).join("");
    sidebarEl.innerHTML = tabHtml;
    bottomTabsEl.innerHTML = TABS.map(t=>`<button class="${currentTab===t.id?"active":""}" data-tab="${t.id}">${t.label}</button>`).join("");

    sidebarEl.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{currentTab=btn.dataset.tab;render();});
    bottomTabsEl.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{currentTab=btn.dataset.tab;render();});
  }

  function actionCard(id,name,cost,desc,danger=false){
    return `<div class="card">
      <div class="card-title">${name}</div>
      <div class="mini">비용: ${cost}</div>
      <div class="desc">${desc}</div>
      ${danger?'<div class="crime" title="이것은 실제 범죄입니다">⚠ 이것은 실제 범죄입니다</div>':''}
      <button data-action="${id}" class="${danger?"danger":""}" title="${danger?"이것은 실제 범죄입니다":""}">실행</button>
    </div>`;
  }

  function renderContent(){
    switch(currentTab){
      case "proselyte": renderProselyte(); break;
      case "followers": renderFollowers(); break;
      case "base": renderBase(); break;
      case "items": renderItems(); break;
      case "finance": renderFinance(); break;
      case "workforce": renderWorkforce(); break;
      case "doctrine": renderDoctrine(); break;
      case "events": renderEvents(); break;
      case "challenge": renderChallenge(); break;
    }
  }

  function renderProselyte(){
    contentEl.innerHTML = `
      <div class="panel">
        <h3>5단계 포섭 파이프라인</h3>
        ${stageSummary()}
      </div>

      <div class="panel">
        <h3>1단계 포교 활동</h3>
        <div class="grid cols-3">
          ${actionCard("street","거리전도","기력20","1~3명 유입")}
          ${actionCard("sns","SNS 홍보","기력15 / 감시도+1","2~5명 유입")}
          ${actionCard("seminarFree","무료세미나","기력40 + $100","5~15명 유입")}
          ${actionCard("selfClass","자기계발강좌","기력30","3~8명 유입")}
          ${actionCard("fakeService","봉사위장","기력25 / 감시도-2","4~10명 유입")}
          ${actionCard("referral","신도소개","기력10","인맥 기반 유입")}
        </div>
      </div>

      <div class="panel">
        <h3>2단계 확신 전환</h3>
        <div class="grid cols-3">
          ${actionCard("oneOnOne","1:1 상담","기력15","충성 +10~20")}
          ${actionCard("retreat","수련회","기력30 + $200","충성 +25 / 의심 -10")}
          ${actionCard("miracle","기적연출","기력20 / 교리3+","충성 +30 / 감시도+3")}
          ${actionCard("testimony","성공증언","기력10 / 헌신1+","충성 +15")}
          ${actionCard("heal","치유세션","기력25","건강 취약 대상 +35")}
        </div>
      </div>

      <div class="panel">
        <h3>3단계 헌신 강화</h3>
        <div class="grid cols-3">
          ${actionCard("duty","의무부여","기력12","충성 증가, 헌신 단계 진입")}
          ${actionCard("hierarchy","계층화","기력14","구조화로 소속 압박")}
          ${actionCard("belonging","소속감 의식","기력16","소속감 강화")}
        </div>
      </div>

      <div class="panel">
        <h3>4단계 락인 기법</h3>
        <div class="grid cols-3">
          ${actionCard("confession","고해성사","기력15 / 간부+","비밀 수집 / 의심 -20")}
          ${actionCard("isolate","외부차단","기력20 / 장로+","충성 +15")}
          ${actionCard("camp","합숙","기력30 / 거점3+","의심 -30 / 충성 +20")}
          ${actionCard("secretRite","비밀의식","기력25 / 교리5+","충성 +25")}
          ${actionCard("punish","이탈자처벌","기력10","전체 의심 -15 / 감시도+5")}

  function resizeCanvas(c){
    const dpr = window.devicePixelRatio||1;
    const w = Math.max(260, c.clientWidth);
    const h = Math.max(160, c.clientHeight);
    c.width = Math.floor(w*dpr);
    c.height = Math.floor(h*dpr);
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    return ctx;
  }

  function drawFunnel(){
    const c = $("#funnelChart");
    if(!c) return;
    const ctx = resizeCanvas(c);
    const w = c.clientWidth, h = c.clientHeight;
    ctx.clearRect(0,0,w,h);

    const max = Math.max(1,...state.stageCount);
    const pad = 18;
    const bw = (w-pad*2)/5 - 8;
    for(let i=0;i<5;i++){
      const x = pad + i*((w-pad*2)/5) + 4;
      const val = state.stageCount[i]||0;
      const bh = (h-40)*(val/max);
      const y = h-22-bh;
      ctx.fillStyle = ["#6d4ea8","#8257b8","#9b59b6","#b4558a","#e74c3c"][i];
      ctx.fillRect(x,y,bw,bh);
      ctx.fillStyle = "#e7d7ff";
      ctx.font = "11px sans-serif";
      ctx.fillText(STAGE_NAMES[i],x,h-8);
      ctx.fillText(String(val),x,y-4);
    }
  }

  function drawLine(id,data,color,label){
    const c = document.getElementById(id);
    if(!c) return;
    const ctx = resizeCanvas(c);
    const w = c.clientWidth, h = c.clientHeight;
    ctx.clearRect(0,0,w,h);

    const arr = data.slice(-60);
    if(!arr.length) return;
    const min = Math.min(...arr), max = Math.max(...arr);
    const pad = 24;

    ctx.strokeStyle="#3c2b57";
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,h-pad);ctx.lineTo(w-pad,h-pad);ctx.stroke();

    ctx.strokeStyle=color;
    ctx.lineWidth=2;
    ctx.beginPath();
    arr.forEach((v,i)=>{
      const x = pad + (w-pad*2)*(i/(arr.length-1||1));
      const y = h-pad - (h-pad*2)*((v-min)/(max-min||1));
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();

    ctx.fillStyle="#e7d7ff";
    ctx.font="11px sans-serif";
    ctx.fillText(`${label} (최근 ${arr.length}일)`,pad,14);
    ctx.fillText(min.toLocaleString("ko-KR"),4,h-pad);
    ctx.fillText(max.toLocaleString("ko-KR"),4,pad+6);
  }

  function encodeState(s){
    const json = JSON.stringify(s);
    return btoa(unescape(encodeURIComponent(json)));
  }

  function decodeState(code){
    const json = decodeURIComponent(escape(atob(code)));
    return JSON.parse(json);
  }

  function hydrateState(raw){
    const d = defaultState();
    const s = Object.assign(d, raw||{});
    s.executives = Object.assign({recruit:null,counsel:null,finance:null,security:null,media:null,edu:null}, raw.executives||{});
    s.followers = Array.isArray(raw.followers)?raw.followers:[];
    s.facilities = Array.isArray(raw.facilities)?raw.facilities:[];
    s.items = Array.isArray(raw.items)?raw.items:[];
    s.freelancerPool = Array.isArray(raw.freelancerPool)?raw.freelancerPool:[];
    s.freelancersActive = Array.isArray(raw.freelancersActive)?raw.freelancersActive:[];
    s.logs = Array.isArray(raw.logs)?raw.logs:[];
    s.history = raw.history && typeof raw.history==="object" ? raw.history : {cash:[],followers:[]};
    s.stageCount = Array.isArray(raw.stageCount)?raw.stageCount:[0,0,0,0,0];
    s.milestones = Array.isArray(raw.milestones)?raw.milestones:[];
    s.challenges = Array.isArray(raw.challenges)?raw.challenges:[];
    s.stats = Object.assign(defaultState().stats, raw.stats||{});
    s.staminaMax = BASES[s.baseLevel||0]?.stamina || 100;
    s.stamina = clamp(s.stamina||s.staminaMax,0,s.staminaMax);
    s.scrutiny = clamp(s.scrutiny||0,0,100);
    s.charisma = clamp(s.charisma||10,1,100);
    s.doctrine = clamp(s.doctrine||1,1,10);
    s.pendingChoice = null;
    s.ended = false;
    return s;
  }

  }

  function bindGlobal(){
    document.querySelectorAll(".speed-btn").forEach(btn=>{
      btn.addEventListener("click",()=>{
        speed = Number(btn.dataset.speed);
        renderSpeedButtons();
      });
    });

    $("#saveQuick").onclick = ()=>saveSlot(1);
    $("#loadQuick").onclick = ()=>loadSlot(1);
    $("#newGameBtn").onclick = ()=>{
      if(!confirm("새 게임을 시작하시겠습니까?")) return;
      if(!confirm("정말 진행할까요? 자동저장이 초기화됩니다.")) return;
      try{ localStorage.removeItem("cultTycoonAuto"); }catch(e){}
      state = defaultState();
      speed = 1;
      updateStageCount();
      recordHistory();
      generateFreelancerPool();
      renderSpeedButtons();
      render();
      $("#endingModal").classList.remove("show");
      $("#disclaimerModal").classList.add("show");
      log("🆕 새 게임 시작");
    };

    $("#agreeStart").onclick = ()=>{
      $("#disclaimerModal").classList.remove("show");
      if(!state.logs.length) log("시뮬레이션 시작");
      render();
    };

    $("#endingNewGame").onclick = ()=>{
      if(!confirm("새 게임을 시작하시겠습니까? 현재 자동저장이 초기화됩니다.")) return;
      try{ localStorage.removeItem("cultTycoonAuto"); }catch(e){}
      state = defaultState();
      speed = 1;
      updateStageCount();
      recordHistory();
      generateFreelancerPool();
      renderSpeedButtons();
      render();
      $("#endingModal").classList.remove("show");
      $("#disclaimerModal").classList.add("show");
      log("🆕 새 게임 시작");
    };

    $("#endingContinue").onclick = ()=>{
      state.ended = false;
      state.scrutiny = Math.min(state.scrutiny, 80);
      state.cash = Math.max(state.cash, 500);
      speed = 1;
      renderSpeedButtons();
      render();
      $("#endingModal").classList.remove("show");
      log("⚠️ 엔딩 이후 계속 — 감시도 80으로 조정됨");
      saveAuto();
    };
  }

  function init(){
    bindGlobal();
    loadAuto();
    if(!state.history.cash.length){
      updateStageCount();
      recordHistory();
      generateFreelancerPool();
    }
    renderSpeedButtons();
    render();
    renderLog();
    startLoop();
    setInterval(saveAuto,15000);
    if(state.day<=1) $("#disclaimerModal").classList.add("show");
  }

  init();
})();
</script>
</body>
</html>
