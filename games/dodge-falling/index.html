<body>
    <div id="game-container">
        <h1>🎮 Dodge Falling</h1>
        
        <div id="game-start">
            <p class="instruction">
                <strong>좌우로 이동</strong>하여 떨어지는 장애물을 피하세요!<br>
                버튼을 탭하거나 화면을 스와이프하세요.<br>
                오래 살아남으면 높은 점수!
            </p>
            <button onclick="startGame()">게임 시작</button>
        </div>

        <div id="game-play" style="display: none;">
            <div id="score-display">⏱️ 0.0초 | 🎯 0점</div>
            <canvas id="canvas" width="360" height="480"></canvas>
            <div id="controls">
                <button class="control-btn" onclick="moveLeft()">◀️</button>
                <button class="control-btn" onclick="moveRight()">▶️</button>
            </div>
        </div>

        <div id="game-over">
            <h2>게임 종료!</h2>
            <div id="final-score"></div>
            <div id="final-time"></div>
            <button onclick="startGame()">다시 하기</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let player = {
            x: 180,
            y: 420,
            width: 40,
            height: 40,
            speed: 60,
            targetX: 180
        };
        
        let obstacles = [];
        let gameActive = false;
        let score = 0;
        let startTime = 0;
        let animationId = null;
        let lastTime = 0;
        
        let touchStartX = 0;
        let keys = {};

        function startGame() {
            player.x = 180;
            player.targetX = 180;
            player.y = 420;
            obstacles = [];
            score = 0;
            startTime = Date.now();
            gameActive = true;
            
            document.getElementById('game-start').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('game-play').style.display = 'block';
            
            lastTime = performance.now();
            gameLoop(lastTime);
        }

        function gameLoop(currentTime) {
            if (!gameActive) return;
            
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            update(deltaTime);
            draw();
            
            animationId = requestAnimationFrame(gameLoop);
        }

        function update(deltaTime) {
            // Update score
            const elapsed = (Date.now() - startTime) / 1000;
            score = Math.floor(elapsed * 10);
            document.getElementById('score-display').textContent = 
                `⏱️ ${elapsed.toFixed(1)}초 | 🎯 ${score}점`;
            
            // Smooth player movement
            if (player.x < player.targetX) {
                player.x = Math.min(player.x + player.speed * deltaTime * 6, player.targetX);
            } else if (player.x > player.targetX) {
                player.x = Math.max(player.x - player.speed * deltaTime * 6, player.targetX);
            }
            
            // Keep player in bounds
            player.x = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.x));
            
            // Spawn obstacles
            if (Math.random() < 0.02 + elapsed * 0.0005) {
                obstacles.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -40,
                    width: 30 + Math.random() * 20,
                    height: 30 + Math.random() * 20,
                    speed: 100 + elapsed * 5
                });
            }
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += obstacles[i].speed * deltaTime;
                
                // Remove off-screen obstacles
                if (obstacles[i].y > canvas.height) {
                    obstacles.splice(i, 1);
                    continue;
                }
                
                // Check collision
                if (checkCollision(player, obstacles[i])) {
                    endGame();
                    return;
                }
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw player
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(
                player.x - player.width/2,
                player.y - player.height/2,
                player.width,
                player.height
            );
            
            // Draw player emoji
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🚗', player.x, player.y);
            
            // Draw obstacles
            for (let obs of obstacles) {
                ctx.fillStyle = '#f44336';
                ctx.fillRect(obs.x - obs.width/2, obs.y - obs.height/2, obs.width, obs.height);
                
                ctx.font = '20px Arial';
                ctx.fillText('💥', obs.x, obs.y);
            }
        }

        function checkCollision(player, obstacle) {
            return Math.abs(player.x - obstacle.x) < (player.width + obstacle.width) / 2 &&
                   Math.abs(player.y - obstacle.y) < (player.height + obstacle.height) / 2;
        }

        function moveLeft() {
            player.targetX -= 60;
        }

        function moveRight() {
            player.targetX += 60;
        }

        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            
            document.getElementById('game-play').style.display = 'none';
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').textContent = `${score}점`;
            document.getElementById('final-time').textContent = `생존 시간: ${elapsed}초`;
        }

        // Touch controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            
            if (Math.abs(diff) > 20) {
                player.targetX += diff * 0.5;
                touchStartX = touchX;
            }
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });

        // Prevent double-tap zoom on iOS
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>

    <div id="leaderboard" data-lb-slug="dodge-falling" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "dodge-falling";
      const CANDIDATE_OBJECTS = ["player", "keys"];
      const END_METHODS = ["endGame", "gameOver", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["startGame", "newGame", "restart", "retry", "resetGame", "initGame", "start", "beginGame", "playAgain"];
      const SCORE_KEYS = ["score", "time", "points", "gold", "coins", "wave", "level", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
