  <title>Driftglass Parry</title>
<meta name="description" content="Play Driftglass Parry - Free HTML5 browser game on eastsea.monster. No download required.">
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a1a;
      --panel: #121a33;
      --line: #2f3f75;
      --neon: #62f3ff;
      --accent: #ff7ab6;
      --text: #eaf2ff;
      --muted: #97a9d3;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      background: radial-gradient(circle at 50% 0%, #19193c 0%, var(--bg) 58%);
      color: var(--text);
      padding: 12px;
    }
    .app { width: min(480px, 100%); display: grid; gap: 10px; }
    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      font-size: 12px;
    }
    .card {
      background: linear-gradient(180deg, #182241, #121a33);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      text-align: center;
    }
    canvas {
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 16px;
      border: 1px solid #32457f;
      background: linear-gradient(180deg, #121530, #080913);
      box-shadow: 0 0 24px #40d7ff2e;
      touch-action: none;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      padding: 12px 8px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    button:active,
    button.on { transform: translateY(1px) scale(0.99); border-color: var(--neon); }
    .hint {
      margin: 0;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hud">
      <div class="card">SCORE<br><strong id="score">0</strong></div>
      <div class="card">BEST<br><strong id="best">0</strong></div>
      <div class="card">HP<br><strong id="hp">3</strong></div>
      <div class="card">PARRY<br><strong id="parry">100%</strong></div>
    </section>

    <canvas id="game" width="360" height="640" aria-label="Driftglass Parry canvas"></canvas>

    <section class="controls">
      <button id="leftBtn" aria-label="Move left">◀ LEFT</button>
      <button id="parryBtn" aria-label="Hold parry">🛡️ HOLD</button>
      <button id="rightBtn" aria-label="Move right">RIGHT ▶</button>
    </section>
    <button id="restartBtn">RESTART</button>
    <p class="hint">←/→ 또는 좌우 버튼으로 이동, Space/가운데 버튼 홀드로 패링. 분홍 파편은 패링 반사(+18), 직격 시 HP 감소.</p>
  </main>

  <script>
    (() => {
      const KEY = 'best-driftglass-parry';
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const hpEl = document.getElementById('hp');
      const parryEl = document.getElementById('parry');
      const leftBtn = document.getElementById('leftBtn');
      const rightBtn = document.getElementById('rightBtn');
      const parryBtn = document.getElementById('parryBtn');
      const restartBtn = document.getElementById('restartBtn');

      let audio;
      function tone(freq = 440, dur = 0.06, type = 'sine', gain = 0.02) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        if (!audio) audio = new AC();
        if (audio.state === 'suspended') audio.resume();
        const osc = audio.createOscillator();
        const g = audio.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.value = gain;
        osc.connect(g).connect(audio.destination);
        osc.start();
        osc.stop(audio.currentTime + dur);
      }

      const lanes = [90, 180, 270];
      let best = Number(localStorage.getItem(KEY) || 0);
      let state;
      let holdParry = false;
      let last = performance.now();

      function reset() {
        state = {
          lane: 1,
          y: 560,
          score: 0,
          hp: 3,
          speed: 2.5,
          parry: 100,
          shards: [],
          over: false,
          flash: 0
        };
      }

      function spawnShard() {
        state.shards.push({
          lane: (Math.random() * 3) | 0,
          y: -24,
          size: 10 + Math.random() * 8,
          vel: state.speed + Math.random() * 1.5
        });
      }

      function move(delta) {
        if (state.over) return;
        const next = Math.max(0, Math.min(2, state.lane + delta));
        if (next !== state.lane) {
          state.lane = next;
          tone(280 + next * 55, 0.04, 'square', 0.014);
        }
      }

      function setHold(v) {
        holdParry = v;
        parryBtn.classList.toggle('on', v);
      }

      function gameOver() {
        state.over = true;
        best = Math.max(best, Math.floor(state.score));
        localStorage.setItem(KEY, String(best));
        tone(120, 0.16, 'sawtooth', 0.04);
      }

      function update(dt) {
        if (state.over) return;
        state.speed = Math.min(8, state.speed + dt * 0.00018);
        if (Math.random() < 0.05 + state.score / 140000) spawnShard();

        const activeParry = holdParry && state.parry > 0;
        if (activeParry) state.parry = Math.max(0, state.parry - dt * 0.065);
        else state.parry = Math.min(100, state.parry + dt * 0.03);

        const px = lanes[state.lane];
        const py = state.y;

        state.shards = state.shards.filter((s) => {
          s.y += s.vel + state.speed * 0.38;
          const hit = Math.abs(lanes[s.lane] - px) < 16 && Math.abs(s.y - py) < s.size + 14;
          if (hit) {
            if (activeParry) {
              state.score += 18;
              state.parry = Math.max(0, state.parry - 8);
              tone(760, 0.05, 'triangle', 0.028);
              return false;
            }
            state.hp -= 1;
            state.flash = 150;
            tone(150, 0.12, 'square', 0.04);
            if (state.hp <= 0) gameOver();
            return false;
          }
          return s.y < canvas.height + 24;
        });

        state.score += dt * 0.012 + state.speed * 0.03;
        if (state.flash > 0) state.flash -= dt;
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < 3; i++) {
          const x = lanes[i];
          ctx.strokeStyle = i === state.lane ? '#61efff' : '#26345f';
          ctx.lineWidth = i === state.lane ? 3 : 2;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }

        for (const s of state.shards) {
          ctx.fillStyle = '#ff76b5';
          ctx.beginPath();
          ctx.moveTo(lanes[s.lane], s.y - s.size);
          ctx.lineTo(lanes[s.lane] + s.size, s.y + s.size);
          ctx.lineTo(lanes[s.lane] - s.size, s.y + s.size);
          ctx.closePath();
          ctx.fill();
        }

        const parryActive = holdParry && state.parry > 0;
        ctx.beginPath();
        ctx.fillStyle = parryActive ? '#9cf9ff' : '#6be2ff';
        ctx.arc(lanes[state.lane], state.y, 14, 0, Math.PI * 2);
        ctx.fill();

        if (parryActive) {
          ctx.strokeStyle = '#ccfaff';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(lanes[state.lane], state.y, 25, -0.9, Math.PI + 0.9);
          ctx.stroke();
        }

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255,80,140,${Math.min(0.32, state.flash / 300)})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        if (state.over) {
          ctx.fillStyle = '#070812dd';
          ctx.fillRect(30, 250, 300, 140);
          ctx.strokeStyle = '#ff76b5';
          ctx.strokeRect(30, 250, 300, 140);
          ctx.fillStyle = '#eef4ff';
          ctx.textAlign = 'center';
          ctx.font = '700 28px system-ui';
          ctx.fillText('GAME OVER', 180, 304);
          ctx.font = '600 15px system-ui';
          ctx.fillText('RESTART 버튼 또는 Enter', 180, 338);
        }
      }

      function frame(now) {
        const dt = Math.min(32, now - last);
        last = now;
        update(dt);
        draw();

        scoreEl.textContent = Math.floor(state.score);
        bestEl.textContent = best;
        hpEl.textContent = state.hp;
        parryEl.textContent = `${Math.round(state.parry)}%`;

        requestAnimationFrame(frame);
      }

      function bindHoldButton(el) {
        el.addEventListener('pointerdown', (e) => { e.preventDefault(); setHold(true); });
        el.addEventListener('pointerup', () => setHold(false));
        el.addEventListener('pointercancel', () => setHold(false));
        el.addEventListener('pointerleave', () => setHold(false));
      }

      window.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        if (e.key === 'ArrowLeft') move(-1);
        if (e.key === 'ArrowRight') move(1);
        if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); setHold(true); }
        if (e.key === 'Enter' && state.over) reset();
      });
      window.addEventListener('keyup', (e) => {
        if (e.key === ' ' || e.key === 'Spacebar') setHold(false);
      });

      leftBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); move(-1); });
      rightBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); move(1); });
      bindHoldButton(parryBtn);
      restartBtn.addEventListener('click', reset);

      canvas.addEventListener('pointerdown', (e) => {
        const x = e.offsetX / canvas.clientWidth;
        if (x < 0.34) move(-1);
        else if (x > 0.66) move(1);
        else setHold(true);
      });
      canvas.addEventListener('pointerup', () => setHold(false));
      canvas.addEventListener('pointercancel', () => setHold(false));

      reset();
      bestEl.textContent = best;
      requestAnimationFrame(frame);
    })();
  </script>
