<script>
(() => {
'use strict';

const T = GameI18n({
  title: { ko: '던전 다이스', en: 'Dungeon Dice' },
  subtitle: { ko: '두 개의 주사위로 운명을 굴려라', en: 'Roll two dice and decide your fate' },
  tapStart: { ko: '탭해서 시작', en: 'Tap to Start' },
  tapRoll: { ko: 'ROLL', en: 'ROLL' },
  tapForge: { ko: '강화', en: 'Forge' },
  boss: { ko: '보스', en: 'Boss' },
  hp: { ko: '체력', en: 'HP' },
  gold: { ko: '골드', en: 'Gold' },
  floor: { ko: '층', en: 'Floor' },
  lvl: { ko: '레벨', en: 'Lv' },
  xp: { ko: '경험치', en: 'XP' },
  gameOver: { ko: '게임 오버', en: 'Game Over' },
  retry: { ko: '다시 도전', en: 'Retry' },
  bestFloor: { ko: '최고 층수', en: 'Best Floor' },
  totalGold: { ko: '누적 골드', en: 'Total Gold' },
  inv: { ko: '장비', en: 'Inventory' },
  hint: { ko: '주사위 2개 결과로 전투/회복/보물/함정이 결정됩니다', en: 'Two dice decide battle/heal/treasure/trap each turn' },
  rules: { ko: '1=함정 2=회복 3=보물 4=공격 5=강타 6=장비', en: '1=Trap 2=Heal 3=Treasure 4=Attack 5=Smash 6=Gear' },
  bossRush: { ko: '보스전: 3연속 굴림!', en: 'Boss: 3 consecutive rolls!' },
  noItem: { ko: '없음', en: 'None' },
  defeated: { ko: '처치!', en: 'Defeated!' },
  levelUp: { ko: '레벨 업!', en: 'Level Up!' },
  gotItem: { ko: '장비 획득!', en: 'Got gear!' },
  forgeUp: { ko: '강화 성공', en: 'Forge upgraded' },
  notEnough: { ko: '골드 부족', en: 'Not enough gold' }
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

const TG = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (TG) {
  try { TG.ready(); TG.expand(); } catch (_) {}
}

const sound = new SoundManager();

function makeToneWavUrl(freq, duration = 0.08, volume = 0.45) {
  const sampleRate = 22050;
  const samples = Math.max(1, Math.floor(sampleRate * duration));
  const buffer = new ArrayBuffer(44 + samples * 2);
  const view = new DataView(buffer);
  const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };

  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + samples * 2, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, samples * 2, true);

  let offset = 44;
  for (let i = 0; i < samples; i++) {
    const t = i / sampleRate;
    const env = Math.exp(-6 * t / duration);
    const s = Math.sin(2 * Math.PI * freq * t) * env * volume;
    view.setInt16(offset, Math.max(-1, Math.min(1, s)) * 32767, true);
    offset += 2;
  }
  return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
}

function loadGameSfx() {
  sound.loadSFX('roll', makeToneWavUrl(520, 0.06, 0.32));
  sound.loadSFX('hit', makeToneWavUrl(180, 0.12, 0.55));
  sound.loadSFX('heal', makeToneWavUrl(760, 0.11, 0.38));
  sound.loadSFX('coin', makeToneWavUrl(1080, 0.08, 0.35));
  sound.loadSFX('gear', makeToneWavUrl(920, 0.1, 0.42));
  sound.loadSFX('gameover', makeToneWavUrl(120, 0.35, 0.5));
}
loadGameSfx();

const SAVE_KEY = 'dungeonDiceSave_v1';
let meta = { bestFloor: 1, totalGold: 0 };

function loadMeta() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (typeof data.bestFloor === 'number') meta.bestFloor = Math.max(1, data.bestFloor);
    if (typeof data.totalGold === 'number') meta.totalGold = Math.max(0, data.totalGold);
  } catch (_) {}
}

function saveMeta() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(meta));
  } catch (_) {}
}

const STATE = {
  TITLE: 'title',
  PLAY: 'play',
  GAMEOVER: 'gameover'
};

const ITEMS = [
  { id: 'loaded', name: 'Loaded Die', ko: '장전된 주사위', desc: '1이 나오면 재굴림 확률 +55%' },
  { id: 'clover', name: 'Lucky Clover', ko: '행운의 클로버', desc: '낮은 눈금(+1) 확률 증가' },
  { id: 'axe', name: 'Orc Axe', ko: '오크 도끼', desc: '공격/강타 피해 증가' },
  { id: 'herb', name: 'Healing Herb', ko: '회복 약초', desc: '회복량 증가' },
  { id: 'shield', name: 'Bone Shield', ko: '해골 방패', desc: '함정 피해 감소' },
  { id: 'coin', name: 'Mimic Coin', ko: '미믹 코인', desc: '보물 골드 증가' }
];

let state = STATE.TITLE;
let run = null;
let enemy = null;
let dice = {
  values: [1, 1],
  rolling: false,
  timer: 0,
  roundsLeft: 0,
  roundDelay: 0,
  totalRounds: 0
};
let particles = [];
let logs = [];
let flash = 0;
let time = 0;
let lastTs = 0;

let buttons = {
  roll: { x: 0, y: 0, w: 0, h: 0 },
  forge: { x: 0, y: 0, w: 0, h: 0 },
  retry: { x: 0, y: 0, w: 0, h: 0 }
};

function haptic(kind = 'impact', style = 'light') {
  if (!TG || !TG.HapticFeedback) return;
  try {
    if (kind === 'impact') TG.HapticFeedback.impactOccurred(style);
    else if (kind === 'notification') TG.HapticFeedback.notificationOccurred(style);
    else TG.HapticFeedback.selectionChanged();
  } catch (_) {}
}

function resetRun() {
  run = {
    floor: 1,
    hp: 100,
    maxHp: 100,
    gold: 0,
    xp: 0,
    level: 1,
    forge: 0,
    inventory: [],
    totalRolls: 0,
    turns: 0
  };
  logs = [];
  createEnemy();
  addLog('Dungeon entered.');
}

function addLog(text) {
  logs.unshift(text);
  if (logs.length > 6) logs.pop();
}

function getItemCount(id) {
  let n = 0;
  for (const x of run.inventory) if (x === id) n++;
  return n;
}

function addItem(force = false) {
  const item = ITEMS[(Math.random() * ITEMS.length) | 0];
  const over = run.inventory.length >= 10;
  if (over && !force) {
    run.gold += 12;
    addLog('+12G (bag full)');
    return;
  }
  if (over && force) run.inventory.shift();
  run.inventory.push(item.id);
  addLog((T('gotItem') || 'Got gear!') + `: ${_name(item)}`);
  spawnParticles(W * 0.5, H * 0.52, '#8ef7ff', 18);
  sound.playSFX('gear', { volume: 0.8 });
  haptic('notification', 'success');
}

function _name(item) {
  return _i18nLang === 'ko' ? item.ko : item.name;
}

function recalcStats() {
  const hpBase = 100 + (run.level - 1) * 6 + run.forge * 2;
  run.maxHp = hpBase;
  run.hp = Math.min(run.hp, run.maxHp);
}

function createEnemy() {
  const isBoss = run.floor % 5 === 0;
  const baseHp = isBoss ? 72 + run.floor * 16 : 26 + run.floor * 10;
  const baseAtk = isBoss ? 9 + run.floor * 1.8 : 4 + run.floor * 1.15;
  enemy = {
    isBoss,
    name: isBoss ? `Abyss Lord ${run.floor / 5}` : `Foe ${run.floor}`,
    hp: Math.floor(baseHp),
    maxHp: Math.floor(baseHp),
    atk: Math.floor(baseAtk)
  };
}

function forgeCost() {
  return 35 + run.forge * 25;
}

function tryForge() {
  if (state !== STATE.PLAY || dice.rolling) return;
  const cost = forgeCost();
  if (run.gold < cost) {
    flash = 0.4;
    addLog(T('notEnough') || 'Not enough gold');
    haptic('notification', 'warning');
    return;
  }
  run.gold -= cost;
  run.forge += 1;
  recalcStats();
  addLog((T('forgeUp') || 'Forge upgraded') + ` Lv.${run.forge}`);
  spawnParticles(buttons.forge.x + buttons.forge.w / 2, buttons.forge.y + buttons.forge.h / 2, '#ffcc55', 14);
  sound.playSFX('gear', { rate: 1.15 });
  haptic('impact', 'medium');
}

function startRoll() {
  if (state !== STATE.PLAY || dice.rolling) return;
  dice.rolling = true;
  dice.timer = 0.52;
  dice.roundsLeft = enemy.isBoss ? 3 : 1;
  dice.totalRounds = dice.roundsLeft;
  dice.roundDelay = 0;
  run.turns += 1;
  run.totalRolls += 1;
  sound.playSFX('roll', { rate: 1 });
  haptic('impact', 'light');
}

function applyDieMods(value) {
  const loaded = getItemCount('loaded');
  const clover = getItemCount('clover');

  if (value === 1 && loaded > 0 && Math.random() < Math.min(0.55 + loaded * 0.08, 0.9)) {
    value = 2 + ((Math.random() * 5) | 0);
  }

  let upChance = 0.07 * clover + run.forge * 0.03;
  if (value <= 3 && Math.random() < Math.min(upChance, 0.55)) value += 1;

  if (run.forge >= 4 && Math.random() < 0.08) value = Math.min(6, value + 1);
  return Math.max(1, Math.min(6, value));
}

function resolveRoll(v1, v2, comboIndex) {
  let dmg = 0;
  let heal = 0;
  let gain = 0;
  let selfDmg = 0;

  const axe = getItemCount('axe');
  const herb = getItemCount('herb');
  const shield = getItemCount('shield');
  const mimic = getItemCount('coin');

  const atkBonus = axe * 2 + run.forge;
  const healBonus = herb * 2 + ((run.forge / 2) | 0);
  const trapReduce = shield * 1.6;
  const goldBoost = 1 + mimic * 0.18 + run.forge * 0.02;

  const applyFace = (v) => {
    if (v === 1) {
      const trap = Math.max(1, Math.floor(7 + run.floor * 0.2 - trapReduce));
      selfDmg += trap;
      addLog(`☠ Trap -${trap}`);
    } else if (v === 2) {
      const h = 8 + healBonus;
      heal += h;
      addLog(`💚 Heal +${h}`);
    } else if (v === 3) {
      const g = Math.floor((9 + run.floor * 0.6) * goldBoost);
      gain += g;
      addLog(`💰 +${g}G`);
    } else if (v === 4) {
      const a = 10 + atkBonus;
      dmg += a;
      addLog(`⚔ Hit ${a}`);
    } else if (v === 5) {
      const a = 16 + atkBonus * 2;
      dmg += a;
      addLog(`🪓 Smash ${a}`);
    } else if (v === 6) {
      run.xp += 10 + run.floor;
      if (Math.random() < 0.42 + run.forge * 0.02) addItem();
      else gain += Math.floor((6 + run.floor * 0.4) * goldBoost);
      addLog('✨ Mystic die');
    }
  };

  applyFace(v1);
  applyFace(v2);

  const sum = v1 + v2;
  if (v1 === v2) {
    if (v1 <= 2) {
      heal += 10 + healBonus;
      addLog('🔁 Double sustain');
    } else if (v1 === 3) {
      gain += Math.floor(18 * goldBoost);
      addLog('🔁 Double treasure');
    } else {
      dmg += 12 + atkBonus;
      addLog('🔁 Double strike');
    }
  }

  if (sum >= 10) {
    const burst = 8 + run.level + comboIndex * 3;
    dmg += burst;
    addLog(`🔥 High sum bonus ${burst}`);
  }

  if (enemy.isBoss && comboIndex === dice.totalRounds) {
    dmg += 8 + run.forge;
    addLog('👑 Boss combo finisher');
  }

  run.hp = Math.min(run.maxHp, run.hp + heal);
  run.hp -= selfDmg;
  run.gold += gain;
  enemy.hp -= dmg;

  if (heal > 0) sound.playSFX('heal', { rate: 1.04 });
  if (gain > 0) sound.playSFX('coin', { rate: 1.08 });
  if (dmg > 0 || selfDmg > 0) sound.playSFX('hit', { rate: 0.98 + Math.random() * 0.05 });

  spawnParticles(W * 0.5, H * 0.53, dmg > 0 ? '#f97575' : '#7bfdb5', 10 + ((dmg + heal) / 7 | 0));

  if (enemy.hp > 0) {
    let retaliation = Math.floor(enemy.atk + Math.random() * 4);
    if (enemy.isBoss) retaliation += 2;
    retaliation = Math.max(1, retaliation - Math.floor(getItemCount('shield') * 0.8));
    run.hp -= retaliation;
    addLog(`👹 Counter -${retaliation}`);
    spawnParticles(W * 0.23, H * 0.44, '#f58c8c', 8);
  }

  if (run.hp <= 0) {
    run.hp = 0;
    doGameOver();
    return;
  }

  if (enemy.hp <= 0) {
    const reward = Math.floor((enemy.isBoss ? 34 : 14) + run.floor * (enemy.isBoss ? 1.8 : 0.8));
    run.gold += reward;
    run.xp += enemy.isBoss ? 20 : 9;
    addLog(`${enemy.name} ${T('defeated') || 'Defeated!'} +${reward}G`);
    if (enemy.isBoss) {
      addItem(true);
      haptic('notification', 'success');
    }
    run.floor += 1;
    meta.bestFloor = Math.max(meta.bestFloor, run.floor - 1);
    createEnemy();
  }

  while (run.xp >= xpNeed()) {
    run.xp -= xpNeed();
    run.level += 1;
    recalcStats();
    run.hp = Math.min(run.maxHp, run.hp + 24);
    addLog(T('levelUp') || 'Level Up!');
    haptic('impact', 'heavy');
    spawnParticles(W * 0.5, H * 0.62, '#fff08e', 24);
  }
}

function xpNeed() {
  return 30 + run.level * 16;
}

function doGameOver() {
  state = STATE.GAMEOVER;
  meta.bestFloor = Math.max(meta.bestFloor, run.floor);
  meta.totalGold += run.gold;
  saveMeta();
  sound.playSFX('gameover', { volume: 1 });
  haptic('notification', 'error');

  if (window.Leaderboard) {
    try {
      const score = (run.floor * 1000) + run.gold + run.level * 100;
      const player = resolvePlayerName();
      window.Leaderboard.submit('dungeon-dice', player, score, { reason: 'gameover' });
    } catch (_) {}
  }
}

function resolvePlayerName() {
  try {
    const user = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
    if (user) {
      const full = [user.first_name, user.last_name].filter(Boolean).join(' ').trim();
      if (full) return full;
      if (user.username) return user.username;
    }
  } catch (_) {}
  const key = 'lb_player_name';
  try {
    const saved = localStorage.getItem(key);
    if (saved) return saved;
    const name = 'Player' + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem(key, name);
    return name;
  } catch (_) {
    return 'Player' + Math.floor(1000 + Math.random() * 9000);
  }
}

function rollOnceVisual() {
  dice.values[0] = 1 + ((Math.random() * 6) | 0);
  dice.values[1] = 1 + ((Math.random() * 6) | 0);
}

function finishOneRoll() {
  let v1 = applyDieMods(1 + ((Math.random() * 6) | 0));
  let v2 = applyDieMods(1 + ((Math.random() * 6) | 0));
  dice.values[0] = v1;
  dice.values[1] = v2;
  const comboIndex = dice.totalRounds - dice.roundsLeft + 1;
  resolveRoll(v1, v2, comboIndex);
  dice.roundsLeft -= 1;

  if (state !== STATE.PLAY) {
    dice.rolling = false;
    return;
  }

  if (dice.roundsLeft > 0) {
    dice.roundDelay = 0.24;
    dice.timer = 0;
    sound.playSFX('roll', { rate: 1.06 + comboIndex * 0.03, volume: 0.85 });
  } else {
    dice.rolling = false;
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 0.5 + Math.random() * 2.4;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 0.5 + Math.random() * 0.8,
      color,
      r: 1 + Math.random() * 2.5
    });
  }
}

function update(dt) {
  time += dt;
  flash = Math.max(0, flash - dt * 2.4);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.99;
    p.vy = p.vy * 0.99 + 0.02;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (state === STATE.PLAY && dice.rolling) {
    if (dice.roundDelay > 0) {
      dice.roundDelay -= dt;
      rollOnceVisual();
      return;
    }

    dice.timer += dt;
    if ((dice.timer * 1000 | 0) % 55 < 16) rollOnceVisual();
    if (dice.timer >= 0.48) finishOneRoll();
  }
}

function resize() {
  DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  const phase = run ? (run.floor % 7) : 1;
  const hues = [220, 250, 280, 320, 190, 12, 40];
  const hue = hues[phase];
  g.addColorStop(0, `hsl(${hue},45%,11%)`);
  g.addColorStop(0.52, `hsl(${(hue + 22) % 360},42%,8%)`);
  g.addColorStop(1, '#08090d');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 42; i++) {
    const sx = (i * 97.1 + time * 17) % (W + 80) - 40;
    const sy = ((i * 53.4 + Math.sin(time * 0.5 + i) * 40) % (H * 0.7));
    ctx.fillStyle = `rgba(255,255,255,${0.03 + (i % 4) * 0.012})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 1 + (i % 3), 0, Math.PI * 2);
    ctx.fill();
  }

  if (flash > 0) {
    ctx.fillStyle = `rgba(255,80,80,${flash * 0.25})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawRounded(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  if (fill) {
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.stroke();
  }
}

function drawHpBar(x, y, w, h, ratio, color, label) {
  drawRounded(x, y, w, h, h / 2, 'rgba(255,255,255,0.15)');
  drawRounded(x, y, Math.max(3, w * Math.max(0, Math.min(1, ratio))), h, h / 2, color);
  ctx.fillStyle = '#eaf0ff';
  ctx.font = '12px sans-serif';
  ctx.fillText(label, x + 8, y - 4);
}

function drawDie(x, y, size, value, glow) {
  const r = size * 0.16;
  drawRounded(x, y, size, size, r, glow ? 'rgba(255,250,230,0.98)' : 'rgba(245,247,255,0.95)', 'rgba(50,58,84,0.9)');
  const pip = (px, py) => {
    ctx.beginPath();
    ctx.fillStyle = '#2c3650';
    ctx.arc(x + px * size, y + py * size, size * 0.08, 0, Math.PI * 2);
    ctx.fill();
  };
  if (value === 1) pip(0.5, 0.5);
  if (value === 2) { pip(0.28, 0.28); pip(0.72, 0.72); }
  if (value === 3) { pip(0.28, 0.28); pip(0.5, 0.5); pip(0.72, 0.72); }
  if (value === 4) { pip(0.28, 0.28); pip(0.72, 0.28); pip(0.28, 0.72); pip(0.72, 0.72); }
  if (value === 5) { pip(0.28, 0.28); pip(0.72, 0.28); pip(0.5, 0.5); pip(0.28, 0.72); pip(0.72, 0.72); }
  if (value === 6) { pip(0.28, 0.25); pip(0.72, 0.25); pip(0.28, 0.5); pip(0.72, 0.5); pip(0.28, 0.75); pip(0.72, 0.75); }
}

function drawPlay() {
  drawBackground();

  const pad = Math.max(10, Math.min(16, W * 0.04));
  const top = pad + 20;

  ctx.fillStyle = '#f2f5ff';
  ctx.font = 'bold 18px sans-serif';
  ctx.fillText(`${T('floor')}: ${run.floor}`, pad, top);
  ctx.fillText(`${T('gold')}: ${run.gold}`, pad, top + 24);

  ctx.textAlign = 'right';
  ctx.fillText(`${T('lvl')}.${run.level}`, W - pad, top);
  ctx.fillText(`${T('xp')}: ${run.xp}/${xpNeed()}`, W - pad, top + 24);
  ctx.textAlign = 'left';

  drawHpBar(pad, top + 46, W - pad * 2, 12, run.hp / run.maxHp, '#64e88e', `${T('hp')}: ${run.hp}/${run.maxHp}`);
  drawHpBar(pad, top + 72, W - pad * 2, 12, enemy.hp / enemy.maxHp, enemy.isBoss ? '#ff5b6e' : '#ff8c66', `${enemy.isBoss ? T('boss') : enemy.name}: ${Math.max(0, enemy.hp)}/${enemy.maxHp}`);

  const arenaTop = top + 100;
  const arenaH = H * 0.38;
  drawRounded(pad, arenaTop, W - pad * 2, arenaH, 18, 'rgba(8,11,18,0.52)', 'rgba(255,255,255,0.16)');

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 5; i++) {
    const y = arenaTop + 28 + i * ((arenaH - 52) / 4);
    ctx.fillRect(pad + 18, y, W - pad * 2 - 36, 1);
  }

  const dieSize = Math.min(96, W * 0.22);
  const dx1 = W * 0.5 - dieSize - 12;
  const dx2 = W * 0.5 + 12;
  const dy = arenaTop + arenaH * 0.32;
  drawDie(dx1, dy, dieSize, dice.values[0], dice.rolling);
  drawDie(dx2, dy, dieSize, dice.values[1], dice.rolling);

  ctx.fillStyle = '#eaf1ff';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center';
  const statusText = enemy.isBoss ? T('bossRush') : T('hint');
  ctx.fillText(statusText, W * 0.5, dy + dieSize + 26);
  ctx.textAlign = 'left';

  const btnY = arenaTop + arenaH + 12;
  const btnW = (W - pad * 3) * 0.5;
  const btnH = 52;

  buttons.roll = { x: pad, y: btnY, w: btnW, h: btnH };
  buttons.forge = { x: pad * 2 + btnW, y: btnY, w: btnW, h: btnH };

  drawRounded(buttons.roll.x, buttons.roll.y, buttons.roll.w, buttons.roll.h, 14,
    dice.rolling ? 'rgba(120,130,150,0.45)' : 'rgba(77,188,255,0.88)', 'rgba(255,255,255,0.35)');
  drawRounded(buttons.forge.x, buttons.forge.y, buttons.forge.w, buttons.forge.h, 14,
    'rgba(255,178,74,0.85)', 'rgba(255,255,255,0.35)');

  ctx.fillStyle = '#06101f';
  ctx.font = 'bold 19px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(dice.rolling ? '...' : T('tapRoll'), buttons.roll.x + buttons.roll.w / 2, buttons.roll.y + 33);
  ctx.fillText(`${T('tapForge')} (${forgeCost()}G)`, buttons.forge.x + buttons.forge.w / 2, buttons.forge.y + 33);
  ctx.textAlign = 'left';

  const invY = btnY + btnH + 10;
  drawRounded(pad, invY, W - pad * 2, H - invY - 14, 14, 'rgba(15,18,30,0.62)', 'rgba(255,255,255,0.14)');
  ctx.fillStyle = '#dce6ff';
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText(`${T('inv')} (${run.inventory.length}/10)  Forge Lv.${run.forge}`, pad + 10, invY + 20);
  ctx.font = '12px sans-serif';

  const bagText = ITEMS
    .map(it => ({ it, n: getItemCount(it.id) }))
    .filter(x => x.n > 0)
    .map(x => `${_name(x.it)} x${x.n}`)
    .join('  ·  ');

  const finalBag = bagText || T('noItem');
  wrapText(finalBag, pad + 10, invY + 38, W - pad * 2 - 18, 16, '#c6d2f5');

  const logStart = invY + 88;
  for (let i = 0; i < logs.length; i++) {
    ctx.fillStyle = i === 0 ? '#f3f6ff' : 'rgba(220,230,255,0.78)';
    ctx.fillText(`• ${logs[i]}`, pad + 10, logStart + i * 16);
  }

  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 0.95);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function wrapText(text, x, y, maxW, lineH, color) {
  const words = text.split(' ');
  let line = '';
  let yy = y;
  ctx.fillStyle = color;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line, x, yy);
      line = words[i] + ' ';
      yy += lineH;
      if (yy > y + lineH * 3) break;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, yy);
}

function drawTitle() {
  drawBackground();

  ctx.textAlign = 'center';
  const cX = W * 0.5;
  const cY = H * 0.42;

  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${Math.min(46, W * 0.1)}px sans-serif`;
  ctx.fillText('🎲', cX, cY - 64);
  ctx.fillText(T('title'), cX, cY - 16);

  ctx.fillStyle = 'rgba(236,242,255,0.85)';
  ctx.font = '16px sans-serif';
  ctx.fillText(T('subtitle'), cX, cY + 18);
  ctx.fillStyle = 'rgba(255,255,255,0.72)';
  ctx.font = '13px sans-serif';
  ctx.fillText(T('rules'), cX, cY + 44);

  const pulse = 0.72 + Math.sin(time * 3.1) * 0.28;
  drawRounded(cX - 120, cY + 78, 240, 56, 16, `rgba(86,201,255,${0.58 + pulse * 0.2})`, 'rgba(255,255,255,0.4)');
  ctx.fillStyle = '#031020';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(T('tapStart'), cX, cY + 112);

  ctx.fillStyle = '#dce6ff';
  ctx.font = '14px sans-serif';
  ctx.fillText(`${T('bestFloor')}: ${meta.bestFloor}   |   ${T('totalGold')}: ${meta.totalGold}`, cX, cY + 162);
  ctx.textAlign = 'left';
}

function drawGameOver() {
  drawPlay();
  ctx.fillStyle = 'rgba(0,0,0,0.66)';
  ctx.fillRect(0, 0, W, H);

  const bw = Math.min(340, W - 36);
  const bh = 268;
  const bx = (W - bw) * 0.5;
  const by = (H - bh) * 0.5;
  drawRounded(bx, by, bw, bh, 18, 'rgba(20,24,38,0.95)', 'rgba(255,255,255,0.26)');

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff9aa6';
  ctx.font = 'bold 34px sans-serif';
  ctx.fillText(T('gameOver'), W * 0.5, by + 56);

  ctx.fillStyle = '#f0f4ff';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(`${T('floor')}: ${run.floor}`, W * 0.5, by + 96);
  ctx.fillText(`${T('gold')}: ${run.gold}`, W * 0.5, by + 126);
  ctx.fillText(`${T('lvl')}: ${run.level}`, W * 0.5, by + 156);

  buttons.retry = { x: bx + 28, y: by + bh - 76, w: bw - 56, h: 48 };
  drawRounded(buttons.retry.x, buttons.retry.y, buttons.retry.w, buttons.retry.h, 13, 'rgba(104,227,168,0.94)', 'rgba(255,255,255,0.45)');
  ctx.fillStyle = '#062113';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(T('retry'), W * 0.5, buttons.retry.y + 31);
  ctx.textAlign = 'left';
}

function render() {
  if (state === STATE.TITLE) drawTitle();
  else if (state === STATE.PLAY) drawPlay();
  else drawGameOver();
}

function contains(r, x, y) {
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function handleTap(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left;
  const y = clientY - rect.top;

  sound._initOnInteraction();

  if (state === STATE.TITLE) {
    resetRun();
    state = STATE.PLAY;
    haptic('impact', 'light');
    return;
  }

  if (state === STATE.GAMEOVER) {
    if (contains(buttons.retry, x, y)) {
      resetRun();
      state = STATE.PLAY;
      haptic('selection');
    }
    return;
  }

  if (state === STATE.PLAY) {
    if (contains(buttons.roll, x, y)) startRoll();
    else if (contains(buttons.forge, x, y)) tryForge();
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  handleTap(e.clientX, e.clientY);
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  if (e.changedTouches && e.changedTouches[0]) {
    e.preventDefault();
    handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (state === STATE.PLAY) startRoll();
    else if (state === STATE.TITLE) { resetRun(); state = STATE.PLAY; }
    else if (state === STATE.GAMEOVER) { resetRun(); state = STATE.PLAY; }
  } else if (e.code === 'KeyF' && state === STATE.PLAY) {
    tryForge();
  }
});

function loop(ts) {
  const now = ts || performance.now();
  if (!lastTs) lastTs = now;
  const dt = Math.min(0.033, (now - lastTs) / 1000);
  lastTs = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
loadMeta();
resize();
loop();

window.run = run;
window.enemy = enemy;
window.state = state;
window.startRoll = startRoll;
window.resetRun = resetRun;

})();
</script>

<div id="leaderboard" data-lb-slug="dungeon-dice" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
<script src="../shared/leaderboard.js"></script>
<script>
(() => {
  const GAME_SLUG = 'dungeon-dice';
  const CANDIDATE_OBJECTS = ['run', 'enemy', 'state'];
  const END_METHODS = ['doGameOver', 'gameOver', 'endGame', 'showResult', 'showGameOver', 'defeat'];
  const START_METHODS = ['resetRun', 'startGame', 'newGame', 'restart', 'retry', 'startRoll'];
  const SCORE_KEYS = ['floor', 'gold', 'level', 'score', 'totalScore', 'bestFloor'];

  function resolvePlayerName() {
    try {
      const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
      if (tgUser) {
        const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
        if (fullName) return fullName;
        if (tgUser.username) return tgUser.username;
      }
    } catch (_) {}

    try {
      const saved = localStorage.getItem('lb_player_name');
      if (saved) return saved;
      const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
      localStorage.setItem('lb_player_name', generated);
      return generated;
    } catch (_) {
      return 'Player' + Math.floor(1000 + Math.random() * 9000);
    }
  }

  if (!window.Leaderboard) return;

  const playerName = resolvePlayerName();
  let lastSubmit = { score: null, at: 0 };
  let hooksInstalled = false;

  function toNumber(value) {
    if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
    if (typeof value === 'string') {
      const cleaned = value.replace(/[^\d.-]/g, '');
      if (!cleaned) return NaN;
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : NaN;
    }
    return NaN;
  }

  function collectFromObject(obj) {
    const found = [];
    if (!obj || typeof obj !== 'object') return found;
    for (const key of SCORE_KEYS) {
      if (key in obj) {
        const n = toNumber(obj[key]);
        if (Number.isFinite(n)) found.push(n);
      }
    }
    return found;
  }

  function extractScore() {
    const values = [];

    for (const key of SCORE_KEYS) {
      try {
        if (key in window) {
          const n = toNumber(window[key]);
          if (Number.isFinite(n)) values.push(n);
        }
      } catch (_) {}
    }

    const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
    for (const name of CANDIDATE_OBJECTS) {
      try {
        if (name && window[name]) objectRefs.push(window[name]);
      } catch (_) {}
    }

    for (const obj of objectRefs) {
      values.push(...collectFromObject(obj));
    }

    const domIds = [
      'finalScore', 'score', 'scoreValue', 'points', 'gold', 'coins', 'money', 'cash', 'souls', 'wave', 'level',
      'resultScore', 'bestScore', 'highScore', 'totalScore', 'earnedGold', 'finalFloor', 'finalWave'
    ];

    for (const id of domIds) {
      const el = document.getElementById(id);
      if (!el) continue;
      const n = toNumber(el.textContent || el.innerText || '');
      if (Number.isFinite(n)) values.push(n);
    }

    const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i], [id*="floor" i]');
    let checked = 0;
    for (const el of scoreLikeEls) {
      if (checked > 30) break;
      checked += 1;
      const n = toNumber(el.textContent || el.innerText || '');
      if (Number.isFinite(n)) values.push(n);
    }

    if (!values.length) return null;
    return Math.max(...values.filter(v => Number.isFinite(v)));
  }

  function refreshBoard() {
    Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
  }

  function submitScore(reason) {
    const score = extractScore();
    if (!Number.isFinite(score)) return;

    const now = Date.now();
    if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

    lastSubmit = { score, at: now };
    Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
    refreshBoard();
  }

  function wrapMethod(target, methodName, onAfter) {
    if (!target || typeof target[methodName] !== 'function') return false;
    const wrappedFlag = '__lbWrapped_' + methodName;
    if (target[wrappedFlag]) return true;

    const original = target[methodName];
    target[methodName] = function(...args) {
      const result = original.apply(this, args);
      try { onAfter(methodName); } catch (_) {}
      return result;
    };
    target[wrappedFlag] = true;
    return true;
  }

  function installHooks() {
    let installedAny = false;
    const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
    for (const name of CANDIDATE_OBJECTS) {
      try {
        if (name && window[name]) targets.push(window[name]);
      } catch (_) {}
    }

    for (const t of targets) {
      if (!t) continue;
      for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
      for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
    }

    hooksInstalled = hooksInstalled || installedAny;
  }

  function observeEndScreens() {
    const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

    const maybeSubmit = () => {
      const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
      for (const el of markers) {
        const style = window.getComputedStyle(el);
        const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
        if (visible) {
          submitScore('screen-visible');
          return;
        }
      }

      const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
      if (endPattern.test(text)) submitScore('text-match');
    };

    const observer = new MutationObserver(() => maybeSubmit());
    observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

    document.addEventListener('click', (e) => {
      const t = e.target;
      if (!t) return;
      const txt = (t.innerText || t.textContent || '').toLowerCase();
      if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
        setTimeout(refreshBoard, 300);
      }
      if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
        setTimeout(() => submitScore('button-click'), 300);
      }
    }, true);
  }

  refreshBoard();
  installHooks();
  observeEndScreens();

  let hookTry = 0;
  const hookTimer = setInterval(() => {
    hookTry += 1;
    if (!hooksInstalled) installHooks();
    if (hookTry > 30) clearInterval(hookTimer);
  }, 1000);

  setInterval(refreshBoard, 30000);
})();
</script>
