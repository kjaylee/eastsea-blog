  const state = {
    lang: 'ko',
    gold: 25,

    special: {
      eclipse: 0,

      currentEra: 0,

      expedition: 0,
      runeDust: 0,

  const el = {
    title: document.getElementById('gameTitle'),
    sub: document.getElementById('gameSub'),
    vGold: document.getElementById('vGold'),
    kEssence: document.getElementById('kEssence'),
    vEssence: document.getElementById('vEssence'),

    logBox: document.getElementById('logBox'),
    modeChip: document.getElementById('modeChip'),

    prestigeHead: document.getElementById('prestigeHeadline'),

    prestigeMeterLabel: document.getElementById('prestigeMeterLabel'),
    btnStrike: document.getElementById('btnStrike'),

    btnModeB: document.getElementById('btnModeB'),

    btnBulkHero: document.getElementById('btnBulkHero'),

    toast: document.getElementById('toast')
  };

  const ELES = ['Fire', 'Water', 'Earth', 'Air'];
  const ADV = { Fire: 'Earth', Earth: 'Air', Air: 'Water', Water: 'Fire' };
  const ERA_NAMES = ['Stone', 'Bronze', 'Medieval', 'Industrial', 'Modern', 'Future', 'Singularity'];

  function t(k) {
    return I18N[state.lang][k] || I18N.en[k] || k;
  }

  function fmt(n) {
    if (!isFinite(n)) return '0';
    if (n < 1000) return n.toFixed(n >= 100 ? 0 : n >= 10 ? 1 : 2);
    const units = ['K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp'];
    let u = -1;
    while (n >= 1000 && u < units.length - 1) {
      n /= 1000;
      u++;
    }
    return n.toFixed(n >= 100 ? 0 : n >= 10 ? 1 : 2) + units[u];
  }

  function clamp(v, a, b) {
    return Math.max(a, Math.min(b, v));
  }

  function addLog(msg) {
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    state.logs.unshift('[' + time + '] ' + msg);
    if (state.logs.length > 30) state.logs.length = 30;
  }

  function showToast(msg) {
    el.toast.textContent = msg;
    el.toast.classList.add('show');
    setTimeout(() => el.toast.classList.remove('show'), 1200);
  }

  function heroCost(i, lvOffset = 0) {
    const h = GAME.heroes[i];
    const lv = (state.heroLv[h[0]] || 0) + lvOffset;
    return h[4] * Math.pow(1.16 + i * 0.005, lv);
  }

  function upgradeCost(i, lvOffset = 0) {
    const u = GAME.upgrades[i];
    const lv = (state.upLv[u[0]] || 0) + lvOffset;
    return u[3] * Math.pow(u[4], lv);
  }

  function getUpgradeEffect(type) {
    let sum = 0;
    for (const u of GAME.upgrades) {
      if (u[6] !== type) continue;
      sum += (state.upLv[u[0]] || 0) * u[7];
    }
    return sum;
  }

  function elementalDistribution() {
    const d = { fire: 0, water: 0, earth: 0, air: 0 };
    for (const h of GAME.heroes) {
      const lv = state.heroLv[h[0]] || 0;
      if (!lv) continue;
      const tag = h[5];
      if (d[tag] !== undefined) d[tag] += lv;
    }
    return d;
  }

  function eraProgress() {
    const stage = state.stage;
    if (stage < 20) return 0;
    if (stage < 40) return 1;
    if (stage < 60) return 2;
    if (stage < 85) return 3;
    if (stage < 115) return 4;
    if (stage < 150) return 5;
    return 6;
  }

  function runeComboLevel() {
    const arr = state.special.runes;
    const sum = arr.reduce((a,b) => a+b, 0);
    const uniq = new Set(arr.filter(v => v > 0)).size;
    let score = sum * 0.04;
    if (uniq >= 3) score += 0.18;
    if (arr.every(v => v >= 2)) score += 0.22;
    return score;
  }

  function modeMultiplier() {
    if (GAME.mode === 'shadow') {
      const e = 1 + state.special.eclipse * 0.012;
      const r = 1 + (state.special.shadowRank - 1) * 0.09;
      const skill = 1 + state.special.skillCharge * 0.02;
      return e * r * skill * (1 + getUpgradeEffect('modeMult'));
    }
    if (GAME.mode === 'elemental') {
      const d = elementalDistribution();
      const min4 = Math.min(d.fire || 0, d.water || 0, d.earth || 0, d.air || 0);
      const combo = 1 + Math.log10(1 + min4) * 0.45;
      const pulse = 1 + state.special.comboPulse * 0.015;
      return combo * pulse * (1 + getUpgradeEffect('modeMult'));
    }
    if (GAME.mode === 'time') {
      state.special.currentEra = eraProgress();
      const era = 1 + state.special.currentEra * 0.12;
      const flux = 1 + Math.log10(1 + state.special.timeFlux) * 0.3;
      return era * flux * (1 + getUpgradeEffect('modeMult'));
    }
    if (GAME.mode === 'beast') {
      const pack = 1 + state.special.beasts * 0.018;
      const tier = 1 + (state.special.beastTier - 1) * 0.35;
      const exp = 1 + (state.special.expedition > 0 ? 0.25 : 0);
      return pack * tier * exp * (1 + getUpgradeEffect('modeMult'));
    }
    if (GAME.mode === 'rune') {
      const combo = 1 + runeComboLevel();
      const depth = 1 + Math.log10(1 + state.special.dungeonDepth) * 0.18;
      return combo * depth * (1 + getUpgradeEffect('modeMult'));
    }
    return 1;
  }

  function elementAdvantageBonus() {
    if (GAME.mode !== 'elemental') return 1;
    const dist = elementalDistribution();
    const enemy = state.enemyElement;
    let strong = 0;
    if (enemy === 'Fire') strong = dist.water;
    if (enemy === 'Water') strong = dist.earth;
    if (enemy === 'Earth') strong = dist.air;
    if (enemy === 'Air') strong = dist.fire;
    if (!strong) return 1;
    return 1 + Math.min(0.85, Math.log10(1 + strong) * 0.65);
  }

  function calcDps() {
    let total = 0;
    for (const h of GAME.heroes) {
      const lv = state.heroLv[h[0]] || 0;
      if (!lv) continue;
      const base = h[3] * lv * Math.pow(1.055, lv - 1);
      total += base;
    }

    const global = 1 + getUpgradeEffect('globalMult');
    const prestige = 1 + state.prestige * 0.12;
    const critChance = clamp(0.05 + getUpgradeEffect('critChance'), 0.05, 0.65);
    const critPower = 1.8 + getUpgradeEffect('critPower');
    const expectedCrit = 1 + critChance * (critPower - 1);
    const mode = modeMultiplier();
    const adv = elementAdvantageBonus();

    let dps = total * global * prestige * expectedCrit * mode * adv;
    if (isBossStage(state.stage)) dps *= (1 + getUpgradeEffect('bossMult'));
    return dps;
  }

  function strikeDamage() {
    const tapBase = 12 + Math.pow(state.stage, 0.84) * 2.2;
    const tapMul = 1 + getUpgradeEffect('tapMult');
    return tapBase * tapMul * (1 + state.prestige * 0.08) * modeMultiplier();
  }

  function enemyTemplate(stage) {
    const idx = (stage - 1) % GAME.enemies.length;
    const isBoss = isBossStage(stage);
    const hpBase = 22 + Math.pow(stage, 1.34) * 28;
    const hp = hpBase * (1 + state.prestige * 0.14) * (isBoss ? 4.4 : 1);
    const gold = (8 + Math.pow(stage, 1.15) * 3.4) * (isBoss ? 3.4 : 1);
    const essence = (0.55 + Math.pow(stage, 1.05) * 0.11) * (isBoss ? 2.4 : 1);
    return {
      name: GAME.enemies[idx] + (isBoss ? ' Ω' : ''),
      hp,
      gold,
      essence,
      badge: isBoss ? t('boss') : t('normal')
    };
  }

  function isBossStage(stage) {
    return stage % 10 === 0;
  }

  function spawnEnemy() {
    const e = enemyTemplate(state.stage);
    state.enemyName = e.name;
    state.enemyMaxHP = e.hp;
    state.enemyHP = e.hp;
    state.enemyElement = ELES[(state.stage + state.special.elementFocus) % 4];
  }

  function onKillRewards(baseGold, baseEssence, offlineFactor = 1) {
    const goldMul = 1 + getUpgradeEffect('goldMult');
    const essMul = 1 + getUpgradeEffect('essenceMult');

    let goldGain = baseGold * goldMul;
    let essenceGain = baseEssence * essMul;

    if (GAME.mode === 'shadow') {
      state.special.eclipse += isBossStage(state.stage) ? 1 : 0.15;
      if (state.special.eclipse >= 100) {
        state.special.eclipse -= 100;
        state.special.shadowRank += 1;
        addLog(state.lang === 'ko' ? '🌑 그림자 계급이 상승했습니다!' : '🌑 Shadow rank increased!');
      }
      essenceGain *= (1 + state.special.shadowRank * 0.03);
    } else if (GAME.mode === 'elemental') {
      const adv = elementAdvantageBonus();
      goldGain *= adv;
      if (adv > 1.2) state.special.comboPulse += 1;
      state.special.comboPulse = Math.max(0, state.special.comboPulse - 0.02 * offlineFactor);
    } else if (GAME.mode === 'time') {
      state.special.currentEra = eraProgress();
      state.special.timeFlux += 1 + state.special.currentEra * 0.1;
      if (isBossStage(state.stage)) state.special.timeFlux += 8;
      goldGain *= 1 + state.special.currentEra * 0.08;
    } else if (GAME.mode === 'beast') {
      const captureChance = Math.min(0.35, 0.06 + state.stage * 0.0012);
      if (Math.random() < captureChance * offlineFactor) {
        state.special.beasts += 1;
        addLog(state.lang === 'ko' ? '🐾 야수 포획 성공!' : '🐾 Beast captured!');
      }
      if (state.special.expedition > 0) {
        goldGain *= 1.22;
        essenceGain *= 1.17;
      }
    } else if (GAME.mode === 'rune') {
      state.special.runeDust += 0.35 + baseEssence * 0.35;
      if (Math.random() < 0.12 * offlineFactor) {
        const slot = Math.floor(Math.random() * 4);
        state.special.runes[slot] = Math.min(7, state.special.runes[slot] + 1);
      }
      if (isBossStage(state.stage)) state.special.dungeonDepth += 1;
    }

    state.gold += goldGain;
    state.essence += essenceGain;
  }

  function processCombat(seconds, offline = false) {
    if (seconds <= 0) return { kills: 0, gold: 0, essence: 0 };
    let sec = seconds;
    let kills = 0;
    let g0 = state.gold;
    let e0 = state.essence;

    while (sec > 0.0001 && kills < 5000) {
      const dps = Math.max(0.001, calcDps());
      const tKill = state.enemyHP / dps;
      if (sec >= tKill) {
        sec -= tKill;
        state.enemyHP = 0;

        const e = enemyTemplate(state.stage);
        onKillRewards(e.gold, e.essence, offline ? 0.9 : 1);
        state.kills += 1;
        kills += 1;
        state.stage += 1;
        spawnEnemy();
      } else {
        state.enemyHP -= dps * sec;
        sec = 0;
      }
    }

    return { kills, gold: state.gold - g0, essence: state.essence - e0 };
  }

  function clickStrike() {
    const dmg = strikeDamage();
    state.enemyHP -= dmg;
    state.manualHits += 1;
    state.special.skillCharge = Math.min(100, state.special.skillCharge + 2.6);
    fxText('-' + fmt(dmg), '#ffe2ef');
    if (state.enemyHP <= 0) {
      const e = enemyTemplate(state.stage);
      onKillRewards(e.gold, e.essence, 1);
      state.kills += 1;
      state.stage += 1;
      addLog((state.lang === 'ko' ? '⚔️ 적 처치: ' : '⚔️ Enemy defeated: ') + e.name);
      spawnEnemy();
    }
    render();
  }

  function modeSkill() {
    if (GAME.mode === 'shadow') {
      if (state.essence < 30) return showToast('Need 30');
      state.essence -= 30;
      state.special.skillCharge = Math.min(100, state.special.skillCharge + 25);
      state.special.eclipse += 7;
      addLog(state.lang === 'ko' ? '🌒 암영 의식으로 스킬 충전!' : '🌒 Umbral rite charged your skill!');
    } else if (GAME.mode === 'elemental') {
      if (state.essence < 26) return showToast('Need 26');
      state.essence -= 26;
      state.special.comboPulse += 10;
      state.special.elementFocus = (state.special.elementFocus + 1) % 4;
      addLog(state.lang === 'ko' ? '🌈 원소 초점이 전환되었습니다.' : '🌈 Element focus rotated.');
    } else if (GAME.mode === 'time') {
      if (state.essence < 28) return showToast('Need 28');
      state.essence -= 28;
      state.special.timeFlux += 25;
      const jump = 1 + Math.floor(state.special.currentEra / 2);
      state.stage += jump;
      addLog(state.lang === 'ko' ? '⏱ 시간 점프로 스테이지 +'+jump : '⏱ Time jump: +'+jump+' stages');
      spawnEnemy();
    } else if (GAME.mode === 'beast') {
      if (state.essence < 24) return showToast('Need 24');
      state.essence -= 24;
      state.special.expedition = 180;
      addLog(state.lang === 'ko' ? '🧭 야수 원정 출발! 3분 보너스.' : '🧭 Expedition started! 3-minute bonus.');
    } else if (GAME.mode === 'rune') {
      if (state.special.runeDust < 18) return showToast('Need dust 18');
      state.special.runeDust -= 18;
      const slot = Math.floor(Math.random() * 4);
      state.special.runes[slot] = Math.max(1, state.special.runes[slot] + 1);
      addLog(state.lang === 'ko' ? '🜂 룬 강화 성공!' : '🜂 Rune empowered!');
    }
    render();
  }

  function modeAction() {
    if (GAME.mode === 'shadow') {
      if (state.essence < 75) return showToast('Need 75');
      state.essence -= 75;
      state.special.shadowRank += 1;
      addLog(state.lang === 'ko' ? '🕶️ 그림자 장군이 합류했습니다.' : '🕶️ A shadow general joined.');
    } else if (GAME.mode === 'elemental') {
      const d = elementalDistribution();
      const min4 = Math.min(d.fire, d.water, d.earth, d.air);
      if (min4 < 12) return showToast(state.lang === 'ko' ? '4원소 레벨 합이 부족합니다.' : 'Need stronger four-element roster.');
      state.special.comboPulse += 25;
      addLog(state.lang === 'ko' ? '💠 4원소 공명이 폭발합니다!' : '💠 Four-element resonance unleashed!');
    } else if (GAME.mode === 'time') {
      if (state.special.timeFlux < 120) return showToast('Need Flux 120');
      state.special.timeFlux -= 120;
      for (const h of GAME.heroes) {
        const key = h[0];
        state.heroLv[key] = Math.max(0, (state.heroLv[key] || 0) + 1);
      }
      addLog(state.lang === 'ko' ? '🌀 시간 공명으로 전 영웅 +1 레벨!' : '🌀 Time resonance: all heroes +1 level!');
    } else if (GAME.mode === 'beast') {
      if (state.special.beasts < 6) return showToast('Need beasts 6');
      state.special.beasts -= 6;
      state.special.beastTier += 1;
      addLog(state.lang === 'ko' ? '🧬 융합 성공! 야수 티어 상승.' : '🧬 Fusion success! Beast tier increased.');
    } else if (GAME.mode === 'rune') {
      if (state.special.runeDust < 55) return showToast('Need dust 55');
      state.special.runeDust -= 55;
      const arr = state.special.runes;
      const minIdx = arr.indexOf(Math.min(...arr));
      arr[minIdx] = Math.min(8, arr[minIdx] + 2);
      addLog(state.lang === 'ko' ? '🜁 소켓 재각인 완료.' : '🜁 Socket reforged.');
    }
    render();
  }

  function buyHero(i, bulk = 1) {
    const h = GAME.heroes[i];
    let bought = 0;
    for (let n=0; n<bulk; n++) {
      const c = heroCost(i);
      if (state.gold < c) break;
      state.gold -= c;
      state.heroLv[h[0]] = (state.heroLv[h[0]] || 0) + 1;
      bought++;
    }
    if (bought > 0) {
      addLog((state.lang === 'ko' ? '🛡️ 영웅 강화: ' : '🛡️ Hero upgraded: ') + h[1] + ' +' + bought);
      render();
    }
  }

  function buyUpgrade(i, bulk = 1) {
    const u = GAME.upgrades[i];
    let bought = 0;
    for (let n=0; n<bulk; n++) {
      const lv = state.upLv[u[0]] || 0;
      if (lv >= u[5]) break;
      const c = upgradeCost(i);
      if (state.gold < c) break;
      state.gold -= c;
      state.upLv[u[0]] = lv + 1;
      bought++;
    }
    if (bought > 0) {
      addLog((state.lang === 'ko' ? '📜 업그레이드: ' : '📜 Upgrade: ') + u[2] + ' +' + bought);
      render();
    }
  }

  function prestigeGainPreview() {
    const requirement = 55;
    if (state.stage < requirement) return 0;
    const base = Math.floor(Math.pow(state.stage / requirement, 1.28));
    const essenceBonus = Math.floor(Math.log10(1 + state.essence) * 1.8);
    return Math.max(1, base + essenceBonus);
  }

  function doPrestige() {
    const gain = prestigeGainPreview();
    if (gain <= 0) return showToast(t('prestigeNeed'));

    state.prestige += gain;
    state.stage = 1;
    state.gold = 25;
    state.essence = 0;
    state.enemyHP = 10;
    state.enemyMaxHP = 10;
    state.kills = 0;

    for (const h of GAME.heroes) state.heroLv[h[0]] = 0;
    for (const u of GAME.upgrades) state.upLv[u[0]] = 0;

    state.special.eclipse = 0;
    state.special.comboPulse = 0;
    state.special.currentEra = 0;
    state.special.timeFlux = 0;
    state.special.beasts = 0;
    state.special.expedition = 0;
    state.special.skillCharge = 0;
    state.special.runes = [0,0,0,0];
    state.special.runeDust = 0;

    addLog((state.lang === 'ko' ? '🔁 환생 완료! 누적 환생력 +' : '🔁 Prestige complete! Total +' ) + gain);
    spawnEnemy();
    render();
    save();
  }

  function renderHeroes() {
    let html = '';
    GAME.heroes.forEach((h, i) => {
      const lv = state.heroLv[h[0]] || 0;
      const c = heroCost(i);
      const dps = h[3] * (lv || 1) * Math.pow(1.055, Math.max(0, lv - 1));
      html += `
      <div class="row">
        <div>
          <div class="n">${h[2]} ${state.lang==='ko'?h[1]:h[0]}</div>
          <div class="d">${state.lang==='ko'?'역할':'Role'}: ${h[5]} • ${t('level')} ${lv}</div>
          <div class="meta">Base DPS: ${fmt(dps)}</div>
          <div class="tag">${t('cost')}: ${fmt(c)} Gold</div>
        </div>
        <div class="right">
          <button onclick="window.__buyHero(${i},1)">+1</button>
          <button onclick="window.__buyHero(${i},10)">+10</button>
        </div>
      </div>`;
    });
    el.heroList.innerHTML = html;
  }

  function renderUpgrades() {
    let html = '';
    GAME.upgrades.forEach((u, i) => {
      const lv = state.upLv[u[0]] || 0;
      const c = upgradeCost(i);
      const maxed = lv >= u[5];
      const desc = state.lang === 'ko' ? u[2] : u[1];
      html += `
      <div class="row">
        <div>
          <div class="n">${desc}</div>
          <div class="d">${u[8]}</div>
          <div class="meta">${t('level')}: ${lv}/${u[5]}</div>
          <div class="tag">${t('cost')}: ${fmt(c)} Gold</div>
        </div>
        <div class="right">
          <button ${maxed?'disabled':''} onclick="window.__buyUpgrade(${i},1)">+1</button>
          <button ${maxed?'disabled':''} onclick="window.__buyUpgrade(${i},5)">+5</button>
        </div>
      </div>`;
    });
    el.upgradeList.innerHTML = html;
  }

  function modeDetailText() {
    if (GAME.mode === 'shadow') {
      return `${state.lang==='ko'?'그림자 계급':'Shadow Rank'}: ${state.special.shadowRank} · Eclipse ${fmt(state.special.eclipse)}% · Skill ${fmt(state.special.skillCharge)}%`;
    }
    if (GAME.mode === 'elemental') {
      const d = elementalDistribution();
      return `${state.lang==='ko'?'원소 분포':'Elements'} F:${d.fire} W:${d.water} E:${d.earth} A:${d.air} · Pulse ${fmt(state.special.comboPulse)}`;
    }
    if (GAME.mode === 'time') {
      return `${state.lang==='ko'?'시대':'Era'}: ${ERA_NAMES[state.special.currentEra]} · Flux ${fmt(state.special.timeFlux)} · ${state.lang==='ko'?'루프 가속':'Loop Accel'} x${fmt(1+state.special.currentEra*0.12)}`;
    }
    if (GAME.mode === 'beast') {
      return `${state.lang==='ko'?'포획 수':'Captured'}: ${state.special.beasts} · ${state.lang==='ko'?'융합 티어':'Fusion Tier'} ${state.special.beastTier} · ${state.lang==='ko'?'원정':'Expedition'} ${Math.ceil(state.special.expedition)}s`;
    }
    if (GAME.mode === 'rune') {
      return `${state.lang==='ko'?'룬 소켓':'Rune Slots'} [${state.special.runes.join(' / ')}] · Dust ${fmt(state.special.runeDust)} · Depth ${state.special.dungeonDepth}`;
    }
    return '';
  }

  function render() {
    const dps = calcDps();
    const pGain = prestigeGainPreview();

    el.title.textContent = GAME.title;
    el.sub.textContent = t('sub');
    el.vGold.textContent = fmt(state.gold);
    el.kEssence.textContent = GAME.special_label + (state.lang === 'ko' ? ' 정수' : ' Essence');
    el.vEssence.textContent = fmt(state.essence);
    el.vDps.textContent = fmt(dps);
    el.vPrestige.textContent = fmt(state.prestige);
    el.enemyName.textContent = state.enemyName;
    el.stageText.textContent = `${t('stage')} ${state.stage}`;
    el.enemyBadge.textContent = isBossStage(state.stage) ? t('boss') : t('normal');
    el.enemyFill.style.width = (state.enemyHP / state.enemyMaxHP * 100).toFixed(2) + '%';
    el.enemyHpText.textContent = `${fmt(Math.max(0,state.enemyHP))} / ${fmt(state.enemyMaxHP)}`;
    el.enemyMood.textContent = `${t('line1')} ${t('line2')} ${t('line3')}`;

    el.modeChip.textContent = `${state.lang==='ko'?'모드':'Mode'}: ${GAME.title_en}`;
    el.modeDetails.textContent = modeDetailText();

    const meter = clamp(state.stage / 55, 0, 1) * 100;
    el.prestigeMeter.style.width = meter.toFixed(1) + '%';
    el.prestigeMeterLabel.textContent = `${t('stage')} ${state.stage} / 55 · ${state.lang==='ko'?'예상 보상':'Expected'} +${pGain}`;
    el.prestigeBody.textContent = state.lang==='ko'
      ? `스테이지 55 이상에서 환생 가능. 현재 예상 환생력 +${pGain}.`
      : `Prestige available at Stage 55+. Current expected prestige gain: +${pGain}.`;

    el.btnStrike.textContent = t('strike');
    el.btnModeA.textContent = t('modeSkill');
    el.btnModeB.textContent = t('modeAction');
    el.btnSave.textContent = t('save');
    el.btnHardReset.textContent = t('reset');
    el.btnPrestige.textContent = t('prestige');
    el.btnBulkHero.textContent = t('buy10');
    el.btnBulkUpgrade.textContent = t('buy5');

    renderHeroes();
    renderUpgrades();

    el.logBox.innerHTML = state.logs.slice(0, 8).map(line => `<div class="logline">${line}</div>`).join('');
  }

  function fxText(text, color='#fff') {
    const d = document.createElement('div');
    d.className = 'hitfx';
    d.textContent = text;
    d.style.left = (window.innerWidth * (0.43 + Math.random() * 0.14)) + 'px';
    d.style.top = (window.innerHeight * (0.24 + Math.random() * 0.12)) + 'px';
    d.style.color = color;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 900);
  }

  function save() {
    state.lastSave = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    showToast(t('saved'));
  }

  function load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    try {
      const data = JSON.parse(raw);
      Object.assign(state, data);
      state.heroLv = Object.assign({}, data.heroLv || {});
      state.upLv = Object.assign({}, data.upLv || {});
      state.special = Object.assign({}, state.special, data.special || {});
      state.logs = Array.isArray(data.logs) ? data.logs.slice(0, 30) : [];
      return true;
    } catch (e) {
      console.warn(e);
      return false;
    }
  }

  function hardReset() {
    if (!confirm(t('resetWarn'))) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }

  function applyOffline() {
    const now = Date.now();
    const elapsed = Math.floor((now - (state.lastSave || now)) / 1000);
    if (elapsed < 3) return;
    const sec = Math.min(MAX_OFFLINE, elapsed);
    const result = processCombat(sec, true);
    state.playSeconds += sec;
    addLog(`${t('offline')}: +${fmt(result.gold)} Gold, +${fmt(result.essence)} Essence, ${result.kills} kills (${Math.floor(sec/60)}m)`);
  }

  function bind() {
    el.btnStrike.addEventListener('click', clickStrike);
    el.btnModeA.addEventListener('click', modeSkill);
    el.btnModeB.addEventListener('click', modeAction);
    el.btnSave.addEventListener('click', save);
    el.btnHardReset.addEventListener('click', hardReset);
    el.btnPrestige.addEventListener('click', doPrestige);
    el.btnBulkHero.addEventListener('click', () => {
      for (let i=0; i<GAME.heroes.length; i++) buyHero(i, 10);
    });
    el.btnBulkUpgrade.addEventListener('click', () => {
      for (let i=0; i<GAME.upgrades.length; i++) buyUpgrade(i, 5);
    });
    el.btnLang.addEventListener('click', () => {
      state.lang = state.lang === 'ko' ? 'en' : 'ko';
      render();
    });

    window.__buyHero = buyHero;
    window.__buyUpgrade = buyUpgrade;
  }

  function bootDefaults() {
    for (const h of GAME.heroes) {
      if (state.heroLv[h[0]] == null) state.heroLv[h[0]] = 0;
    }
    for (const u of GAME.upgrades) {
      if (state.upLv[u[0]] == null) state.upLv[u[0]] = 0;
    }
    if (!state.enemyMaxHP || !state.enemyName) spawnEnemy();
  }

  function loop(ts) {
    const dt = Math.min(0.25, (ts - state.lastTick) / 1000 || 0.016);
    state.lastTick = ts;

    processCombat(dt, false);
    state.playSeconds += dt;

    if (GAME.mode === 'shadow') {
      state.special.skillCharge = Math.max(0, state.special.skillCharge - dt * 0.8);
    }
    if (GAME.mode === 'elemental') {
      state.special.comboPulse = Math.max(0, state.special.comboPulse - dt * 0.35);
    }
    if (GAME.mode === 'beast') {
      state.special.expedition = Math.max(0, state.special.expedition - dt);
    }

    if (Math.random() < dt * 1.5) {
      const d = calcDps() * dt * (0.75 + Math.random() * 0.7);
      fxText('-' + fmt(d), '#bde6ff');
    }

    if ((ts - state.lastSave) > 15000) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      state.lastSave = Date.now();
    }

    if ((ts | 0) % 400 < 20) render();
    requestAnimationFrame(loop);
  }

  function init() {
    const loaded = load();
    bootDefaults();
    bind();
    if (loaded) applyOffline();
    addLog(state.lang==='ko' ? '게임 시작! 영웅을 모집하고 자동 전투를 지켜보세요.' : 'Game started! Recruit heroes and watch auto battle.');
    render();
    requestAnimationFrame((t0) => {
      state.lastTick = t0;
      loop(t0);
    });
  }

  init();
})();
</script>
</body>
</html>
