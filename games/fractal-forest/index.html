<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
<meta name="google-adsense-account" content="ca-pub-7252382819928130">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7252382819928130" crossorigin="anonymous"></script>

  <title>Fractal Forest</title>
<meta name="description" content="Play Fractal Forest - Free HTML5 browser game on eastsea.monster. No download required.">
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{--bg:#0a0a1a;--panel:#111733;--ink:#eaf6ff;--cyan:#42ebff;--pink:#ff4ac6;--lime:#8cff9f}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,#1b1f4c,var(--bg) 45%);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:flex;justify-content:center;padding:12px}
    .app{width:min(940px,100%);display:grid;gap:10px}
    .hud{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
    .card{background:rgba(17,23,51,.92);border:1px solid #2e4286;border-radius:12px;padding:8px;text-align:center;box-shadow:0 0 14px #00eeff33}
    .v{font-weight:800;color:var(--cyan)}
    .panel{background:var(--panel);border:1px solid #2d4388;border-radius:14px;padding:10px;box-shadow:0 0 18px #00a6ff33}
    canvas{display:block;width:100%;height:auto;aspect-ratio:3/2;background:#040615;border-radius:10px;touch-action:none}
    .controls{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
    button{border:1px solid #3551a8;border-radius:12px;background:linear-gradient(180deg,#1f2d67,#17224f);color:#eaf6ff;padding:10px 8px;font-weight:800;box-shadow:0 0 12px #2ce9ff55;touch-action:manipulation}
    button:active{transform:translateY(1px);filter:brightness(1.12)}
    .hint{margin:0;text-align:center;font-size:12px;opacity:.86}
    @media (max-width:780px){
      .hud{grid-template-columns:repeat(2,minmax(0,1fr))}
      .controls{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
  </style>
</head>
<body>
<main class="app">
  <section class="hud">
    <div class="card">Level<div id="level" class="v">1/6</div></div>
    <div class="card">Best<div id="best" class="v">1</div></div>
    <div class="card">Match<div id="match" class="v">0%</div></div>
    <div class="card">Cuts<div id="cuts" class="v">0</div></div>
    <div class="card">Status<div id="status" class="v">Prune branches</div></div>
  </section>

  <section class="panel">
    <canvas id="game" width="960" height="640" aria-label="Fractal Forest canvas"></canvas>
  </section>

  <section class="controls">
    <button data-act="prev">◀ Branch</button>
    <button data-act="next">Branch ▶</button>
    <button data-act="prune">✂ Prune</button>
    <button data-act="undo">↶ Undo</button>
    <button data-act="reset">↺ Reset</button>
  </section>
  <p class="hint">L-system 트리: 목표(마젠타)와 현재(시안)를 맞추세요 · 키보드: ←/→, Space, U, R, N</p>
</main>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const bestKey = 'fractalForestBestLevel';
  const ui = {
    level: document.getElementById('level'),
    best: document.getElementById('best'),
    match: document.getElementById('match'),
    cuts: document.getElementById('cuts'),
    status: document.getElementById('status')
  };

  const levels = [
    { name:'Seedling', iterations:3, angle:18, step:24, seed:11, cutCount:2 },
    { name:'Canopy', iterations:3, angle:22, step:23, seed:23, cutCount:3 },
    { name:'Spiral Grove', iterations:4, angle:17, step:18, seed:31, cutCount:4 },
    { name:'Twilight Oak', iterations:4, angle:20, step:17, seed:41, cutCount:5 },
    { name:'Mirror Thicket', iterations:4, angle:24, step:16, seed:55, cutCount:6 },
    { name:'Prime Arbor', iterations:4, angle:27, step:15, seed:77, cutCount:7 }
  ];

  const state = {
    level: 0,
    best: Math.max(1, Number(localStorage.getItem(bestKey) || 1)),
    tree: null,
    playerCuts: [],
    removed: null,
    targetCuts: [],
    targetRemoved: null,
    selectedIdx: 0,
    solved: false
  };

  let ac;
  const v = (x,y) => ({x,y});
  const sub = (a,b) => v(a.x-b.x,a.y-b.y);
  const dot = (a,b) => a.x*b.x+a.y*b.y;
  const len = (a) => Math.hypot(a.x,a.y);
  const clamp = (n,min,max) => Math.max(min, Math.min(max,n));

  function beep(freq=460,dur=0.05,type='sine',vol=0.025){
    try{
      ac = ac || new (window.AudioContext || window.webkitAudioContext)();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g).connect(ac.destination);
      o.start();
      o.stop(ac.currentTime + dur);
    }catch(_){ }
  }

  function lcg(seed){
    let s = (seed >>> 0) || 1;
    return () => {
      s = (1664525 * s + 1013904223) >>> 0;
      return s / 4294967296;
    };
  }

  function expandLSystem(iterations){
    let str = 'F';
    const rule = 'F[+F]F[-F]F';
    for(let i=0;i<iterations;i++){
      let next = '';
      for(const ch of str) next += (ch === 'F' ? rule : ch);
      str = next;
    }
    return str;
  }

  function buildTree(params){
    const cmd = expandLSystem(params.iterations);
    const turn = params.angle * Math.PI / 180;
    const step = params.step;

    let x = 0, y = 0, ang = -Math.PI/2;
    let parent = -1;
    let depth = 0;
    const stack = [];
    const segments = [];

    for(const ch of cmd){
      if(ch === 'F'){
        const nx = x + Math.cos(ang) * step;
        const ny = y + Math.sin(ang) * step;
        const id = segments.length;
        segments.push({ id, parent, depth, a:v(x,y), b:v(nx,ny) });
        parent = id;
        x = nx; y = ny;
      } else if(ch === '+') {
        ang += turn;
      } else if(ch === '-') {
        ang -= turn;
      } else if(ch === '[') {
        stack.push({ x, y, ang, parent, depth });
        depth += 1;
      } else if(ch === ']') {
        const st = stack.pop();
        if(st){ x = st.x; y = st.y; ang = st.ang; parent = st.parent; depth = st.depth; }
      }
    }

    const children = Array.from({length:segments.length}, () => []);
    for(const seg of segments){
      if(seg.parent >= 0) children[seg.parent].push(seg.id);
    }

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for(const s of segments){
      minX = Math.min(minX, s.a.x, s.b.x);
      maxX = Math.max(maxX, s.a.x, s.b.x);
      minY = Math.min(minY, s.a.y, s.b.y);
      maxY = Math.max(maxY, s.a.y, s.b.y);
    }

    const pad = 48;
    const spanX = Math.max(1, maxX - minX);
    const spanY = Math.max(1, maxY - minY);
    const scale = Math.min((canvas.width - pad*2) / spanX, (canvas.height - pad*2) / spanY);
    const tx = canvas.width/2 - ((minX + maxX)/2) * scale;
    const ty = canvas.height - pad - maxY * scale;

    const tSegments = segments.map(s => ({
      ...s,
      ta: v(s.a.x*scale + tx, s.a.y*scale + ty),
      tb: v(s.b.x*scale + tx, s.b.y*scale + ty)
    }));

    return { segments: tSegments, children };
  }

  function isAncestor(tree, a, b){
    let p = tree.segments[b].parent;
    while(p >= 0){
      if(p === a) return true;
      p = tree.segments[p].parent;
    }
    return false;
  }

  function pickTargetCuts(tree, seed, count){
    const rnd = lcg(seed);
    const candidates = tree.segments
      .filter(s => tree.children[s.id].length > 0 && s.depth >= 1)
      .map(s => s.id);

    for(let i=candidates.length-1;i>0;i--){
      const j = Math.floor(rnd()*(i+1));
      const t = candidates[i];
      candidates[i] = candidates[j];
      candidates[j] = t;
    }

    const selected = [];
    for(const id of candidates){
      if(selected.length >= count) break;
      let bad = false;
      for(const s of selected){
        if(isAncestor(tree,s,id) || isAncestor(tree,id,s) || s===id){ bad = true; break; }
      }
      if(!bad) selected.push(id);
    }

    let idx = 0;
    while(selected.length < count && idx < candidates.length){
      const id = candidates[idx++];
      if(!selected.includes(id)) selected.push(id);
    }
    return selected;
  }

  function removedFromCuts(tree, cuts){
    const removed = new Uint8Array(tree.segments.length);
    for(const root of cuts){
      const stack = [root];
      while(stack.length){
        const cur = stack.pop();
        if(removed[cur]) continue;
        removed[cur] = 1;
        for(const c of tree.children[cur]) stack.push(c);
      }
    }
    return removed;
  }

  function getPrunable(){
    if(!state.tree || !state.removed) return [];
    const arr = [];
    for(const seg of state.tree.segments){
      if(!state.removed[seg.id] && state.tree.children[seg.id].length > 0) arr.push(seg.id);
    }
    return arr;
  }

  function scoreMatch(){
    const t = state.targetRemoved;
    const p = state.removed;
    if(!t || !p) return {match:0, diff:0, total:1};
    let diff = 0;
    for(let i=0;i<t.length;i++) if(t[i] !== p[i]) diff++;
    const total = t.length || 1;
    return { match: 1 - diff/total, diff, total };
  }

  function unlock(){
    state.best = Math.max(state.best, state.level + 2);
    localStorage.setItem(bestKey, String(Math.min(levels.length, state.best)));
  }

  function resetCuts(){
    state.playerCuts = [];
    state.removed = removedFromCuts(state.tree, state.playerCuts);
    state.selectedIdx = 0;
    state.solved = false;
    ui.status.textContent = 'Prune branches';
  }

  function loadLevel(i){
    state.level = clamp(i,0,levels.length-1);
    state.tree = buildTree(levels[state.level]);
    state.targetCuts = pickTargetCuts(state.tree, levels[state.level].seed, levels[state.level].cutCount);
    state.targetRemoved = removedFromCuts(state.tree, state.targetCuts);
    resetCuts();
  }

  function nextLevel(){
    if(state.level < levels.length - 1){
      loadLevel(state.level + 1);
      beep(860,0.08,'triangle',0.05);
    } else {
      alert('Forest Complete! You mastered all fractal forms.');
      loadLevel(0);
    }
  }

  function doPrune(id){
    if(state.solved || id == null) return;
    if(state.removed[id]) return;
    state.playerCuts.push(id);
    state.removed = removedFromCuts(state.tree, state.playerCuts);
    beep(420,0.06,'sawtooth',0.03);
    evaluateSolved();
  }

  function doUndo(){
    if(!state.playerCuts.length) return;
    state.playerCuts.pop();
    state.removed = removedFromCuts(state.tree, state.playerCuts);
    state.solved = false;
    ui.status.textContent = 'Prune branches';
    beep(300,0.05,'triangle',0.02);
  }

  function evaluateSolved(){
    const s = scoreMatch();
    if(s.match >= 0.985 && s.diff <= Math.max(1, Math.floor(s.total*0.01))){
      state.solved = true;
      unlock();
      ui.status.textContent = 'Silhouette Matched!';
      beep(900,0.08,'triangle',0.05);
      setTimeout(()=>beep(1220,0.09,'triangle',0.04),80);
      setTimeout(nextLevel, 750);
    }
  }

  function distPointSeg(p,a,b){
    const ab = sub(b,a);
    const t = clamp(dot(sub(p,a),ab) / (dot(ab,ab) || 1), 0, 1);
    const q = v(a.x + ab.x*t, a.y + ab.y*t);
    return len(sub(p,q));
  }

  function pickSegmentAt(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    const p = v((clientX-rect.left)*canvas.width/rect.width, (clientY-rect.top)*canvas.height/rect.height);
    let best = null;
    for(const id of getPrunable()){
      const seg = state.tree.segments[id];
      const d = distPointSeg(p, seg.ta, seg.tb);
      if(d < 18 && (!best || d < best.d)) best = {id, d};
    }
    return best ? best.id : null;
  }

  function drawGrid(){
    ctx.strokeStyle = '#16254d';
    ctx.lineWidth = 1;
    for(let x=0;x<=canvas.width;x+=40){
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    }
    for(let y=0;y<=canvas.height;y+=40){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
    }
  }

  function drawScene(){
    if(!state.tree) return;
    ctx.fillStyle = '#050615';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawGrid();

    const segs = state.tree.segments;

    ctx.save();
    ctx.globalAlpha = 0.34;
    ctx.strokeStyle = '#ff4ac6';
    ctx.lineWidth = 1.8;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff4ac6';
    for(const s of segs){
      if(state.targetRemoved[s.id]) continue;
      ctx.beginPath(); ctx.moveTo(s.ta.x,s.ta.y); ctx.lineTo(s.tb.x,s.tb.y); ctx.stroke();
    }
    ctx.restore();

    ctx.strokeStyle = '#46eaff';
    ctx.lineWidth = 2.8;
    ctx.shadowBlur = 14;
    ctx.shadowColor = '#46eaff';
    for(const s of segs){
      if(state.removed[s.id]) continue;
      ctx.beginPath(); ctx.moveTo(s.ta.x,s.ta.y); ctx.lineTo(s.tb.x,s.tb.y); ctx.stroke();
    }
    ctx.shadowBlur = 0;

    const prunable = getPrunable();
    if(prunable.length){
      state.selectedIdx = ((state.selectedIdx % prunable.length) + prunable.length) % prunable.length;
      const sid = prunable[state.selectedIdx];
      const ss = segs[sid];
      ctx.strokeStyle = '#8dff9f';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(ss.ta.x, ss.ta.y);
      ctx.lineTo(ss.tb.x, ss.tb.y);
      ctx.stroke();

      const mx = (ss.ta.x + ss.tb.x)/2;
      const my = (ss.ta.y + ss.tb.y)/2;
      ctx.fillStyle = '#8dff9f';
      ctx.beginPath(); ctx.arc(mx,my,5,0,Math.PI*2); ctx.fill();
    }

    for(const root of state.playerCuts){
      const s = segs[root];
      if(!s) continue;
      ctx.fillStyle = '#ff6f91';
      ctx.beginPath();
      ctx.arc((s.ta.x+s.tb.x)/2,(s.ta.y+s.tb.y)/2,4.5,0,Math.PI*2);
      ctx.fill();
    }
  }

  function updateHud(){
    const lv = levels[state.level];
    const s = scoreMatch();
    ui.level.textContent = `${state.level+1}/${levels.length}`;
    ui.best.textContent = String(state.best);
    ui.match.textContent = `${Math.round(s.match*100)}%`;
    ui.cuts.textContent = `${state.playerCuts.length}/${lv.cutCount}`;
  }

  function cycleSelected(dir){
    const list = getPrunable();
    if(!list.length) return;
    state.selectedIdx = (state.selectedIdx + dir + list.length) % list.length;
    beep(260,0.015,'sine',0.01);
  }

  function pruneSelected(){
    const list = getPrunable();
    if(!list.length) return;
    state.selectedIdx = (state.selectedIdx + list.length) % list.length;
    doPrune(list[state.selectedIdx]);
  }

  document.querySelectorAll('button[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const a = btn.dataset.act;
      if(a==='prev') cycleSelected(-1);
      if(a==='next') cycleSelected(1);
      if(a==='prune') pruneSelected();
      if(a==='undo') doUndo();
      if(a==='reset') resetCuts();
    });
    btn.addEventListener('pointerdown', () => beep(320,0.02,'sine',0.012));
    btn.addEventListener('touchstart', () => {}, {passive:true});
  });

  canvas.addEventListener('pointerdown', (e) => {
    const id = pickSegmentAt(e.clientX, e.clientY);
    if(id != null){
      const list = getPrunable();
      const idx = list.indexOf(id);
      if(idx >= 0) state.selectedIdx = idx;
      doPrune(id);
    }
  });

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if(e.key === 'ArrowLeft'){ e.preventDefault(); cycleSelected(-1); }
    else if(e.key === 'ArrowRight'){ e.preventDefault(); cycleSelected(1); }
    else if(e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); pruneSelected(); }
    else if(k === 'u'){ e.preventDefault(); doUndo(); }
    else if(k === 'r'){ e.preventDefault(); resetCuts(); }
    else if(k === 'n' && state.solved){ e.preventDefault(); nextLevel(); }
  }, {passive:false});

  function loop(){
    drawScene();
    updateHud();
    requestAnimationFrame(loop);
  }

  loadLevel(0);
  requestAnimationFrame(loop);
})();
</script>
