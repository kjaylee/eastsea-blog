<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='38' r='11' fill='%2342ff8e'/%3E%3Cpath d='M32 36v-18' stroke='%239dff9d' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='M32 20c8 0 12-7 12-7s-12-2-12 7Z' fill='%23ff79ba'/%3E%3C/svg%3E" />
  <title>Gravity Garden — 중력 정원</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: rgba(16, 18, 40, 0.92);
      --line: rgba(210, 220, 255, 0.2);
      --text: #e8eeff;
      --muted: #98a4cb;
      --cyan: #00ebff;
      --green: #42ff8e;
      --brown: #8c5a2a;
      --gray: #8e95ab;
      --danger: #ff72b5;
      --ok: #9affc8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at 20% 0%, #17173f 0%, #0a0a1a 58%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      touch-action: manipulation;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    .app {
      width: min(100vw, 920px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .header {
      border: 1px solid rgba(0, 235, 255, 0.28);
      border-radius: 14px;
      background: var(--panel);
      padding: 12px;
      box-shadow: 0 0 24px rgba(0, 235, 255, 0.14);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.1rem, 4.3vw, 1.55rem);
      letter-spacing: 0.04em;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0, 235, 255, 0.45);
    }

    .pitch { margin-top: 4px; font-size: 0.82rem; color: #d9f6ff; }
    .helper { font-size: 0.76rem; color: #bfcbf4; }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(11, 13, 31, 0.88);
      padding: 8px 10px;
      min-height: 58px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .k {
      font-size: 0.66rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .v { font-size: 1rem; font-weight: 700; }
    .v.cyan { color: var(--cyan); text-shadow: 0 0 8px rgba(0, 235, 255, 0.4); }
    .v.green { color: var(--green); text-shadow: 0 0 8px rgba(66, 255, 142, 0.3); }

    .canvas-wrap {
      border: 1px solid rgba(170, 180, 210, 0.32);
      border-radius: 14px;
      background: #070713;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 26px rgba(0, 235, 255, 0.16);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      background: transparent;
    }

    .hint {
      position: absolute;
      left: 10px;
      bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.46);
      color: #d7ddff;
      font-size: 0.74rem;
      pointer-events: none;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      border: 1px solid rgba(0, 235, 255, 0.32);
      border-radius: 10px;
      background: rgba(0, 235, 255, 0.09);
      color: #ddf8ff;
      font-weight: 700;
      padding: 10px 8px;
      cursor: pointer;
      min-height: 44px;
    }

    button:active { transform: translateY(1px) scale(0.995); }

    .danger {
      border-color: rgba(255, 114, 181, 0.42);
      background: rgba(255, 114, 181, 0.12);
      color: #ffd6e9;
    }

    .ghost {
      border-color: rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.08);
      color: #e8ebff;
    }

    .levels {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      background: rgba(9, 11, 26, 0.9);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .levels-title {
      font-size: 0.78rem;
      color: #b9c5ef;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .lv {
      min-height: 52px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.06);
      color: #dce5ff;
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 3px;
      padding: 6px 4px;
    }

    .lv.active {
      border-color: rgba(0, 235, 255, 0.66);
      color: #abfbff;
      box-shadow: 0 0 10px rgba(0, 235, 255, 0.2);
    }

    .lv.lock {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .lv .mark {
      font-size: 0.72rem;
      color: #ffd88b;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 5, 16, 0.82);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 20;
    }

    .overlay.show { display: flex; }

    .card {
      width: min(92vw, 420px);
      border-radius: 14px;
      border: 1px solid rgba(0, 235, 255, 0.34);
      box-shadow: 0 0 24px rgba(0, 235, 255, 0.2);
      background: linear-gradient(180deg, rgba(20, 25, 56, 0.96), rgba(8, 10, 26, 0.95));
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }

    .card h2 {
      margin: 0;
      color: var(--green);
      text-shadow: 0 0 10px rgba(66, 255, 142, 0.45);
      letter-spacing: 0.05em;
    }

    .small { font-size: 0.84rem; color: #c7d3ff; }

    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }

    @media (max-width: 760px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .level-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .header { padding: 10px; }
      .hint { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="header">
      <div>
        <h1>Gravity Garden · 중력 정원</h1>
        <div class="pitch">"중력 방향을 90도씩 돌려 씨앗을 물에 닿게 하는 퍼즐"</div>
      </div>
      <div class="helper">스와이프/방향키로 중력 전환 · R 다시 시작</div>
    </section>

    <section class="hud">
      <div class="stat"><div class="k">레벨</div><div id="levelValue" class="v cyan">1 / 10</div></div>
      <div class="stat"><div class="k">중력</div><div id="gravityValue" class="v">↓ 하</div></div>
      <div class="stat"><div class="k">발아</div><div id="sproutValue" class="v green">0 / 0</div></div>
      <div class="stat"><div class="k">메시지</div><div id="messageValue" class="v" style="font-size:0.9rem;">레벨 시작</div></div>
    </section>

    <section class="canvas-wrap">
      <canvas id="gameCanvas" aria-label="중력 정원 캔버스"></canvas>
      <div id="hintText" class="hint">씨앗을 물 타일에 멈추게 하세요</div>
    </section>

    <section class="controls">
      <button data-dir="up">↑ 위</button>
      <button data-dir="left">← 왼쪽</button>
      <button data-dir="down">↓ 아래</button>
      <button data-dir="right">→ 오른쪽</button>
      <button id="restartBtn" class="danger">레벨 재시작</button>
    </section>

    <section class="levels">
      <div class="levels-title">레벨 선택</div>
      <div id="levelGrid" class="level-grid"></div>
    </section>
  </div>

  <div id="clearOverlay" class="overlay" role="dialog" aria-modal="true">
    <div class="card">
      <h2>🌸 발아 성공!</h2>
      <div id="clearText" class="small">모든 씨앗이 꽃을 피웠어요.</div>
      <div class="row">
        <button id="nextBtn">다음 레벨</button>
        <button id="retryBtn" class="ghost">다시 하기</button>
      </div>
      <button id="closeOverlayBtn" class="ghost">계속 플레이</button>
    </div>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = 'gravityGardenProgressV1';
      const LEVELS = [
        {
          name: 'L1 단순 낙하',
          tip: '아래로 중력을 전환해 씨앗을 물에 착지시키세요.',
          map: [
            '########',
            '#......#',
            '#..S...#',
            '#......#',
            '#..W...#',
            '#..X...#',
            '#......#',
            '########'
          ]
        },
        {
          name: 'L2 단순 수평',
          tip: '오른쪽 중력으로 씨앗을 물에 멈추게 하세요.',
          map: [
            '########',
            '#......#',
            '#.S.W#.#',
            '#......#',
            '#......#',
            '#......#',
            '#......#',
            '########'
          ]
        },
        {
          name: 'L3 흙 블록 기초',
          tip: '흙 블록이 씨앗의 받침대가 됩니다.',
          map: [
            '########',
            '#......#',
            '#S...WD#',
            '#......#',
            '#......#',
            '#......#',
            '#......#',
            '########'
          ]
        },
        {
          name: 'L4 흙 블록 활용',
          tip: '이동하는 흙 블록과 씨앗 순서를 읽어보세요.',
          map: [
            '########',
            '#......#',
            '#S.D.W.#',
            '#......#',
            '#......#',
            '#......#',
            '#......#',
            '########'
          ]
        },
        {
          name: 'L5 고정 블록 + 다중 씨앗',
          tip: '고정 블록을 이용해 두 씨앗을 동시에 발아시키세요.',
          map: [
            '########',
            '#..S.S.#',
            '#......#',
            '#..W.W.#',
            '#..X.X.#',
            '#......#',
            '#......#',
            '########'
          ]
        },
        {
          name: 'L6 고정 블록 분리',
          tip: '중력을 두 번 바꿔 두 씨앗을 모두 물에 닿게 하세요.',
          map: [
            '########',
            '#S..WX.#',
            '#.....X#',
            '#.....W#',
            '#......#',
            '#.....S#',
            '#......#',
            '########'
          ]
        },
        {
          name: 'L7 연쇄 이동 I',
          tip: '칸막이 안쪽 씨앗과 바깥 씨앗을 순서대로 처리하세요.',
          map: [
            '########',
            '#S.D.W.#',
            '#......#',
            '#..S#..#',
            '#..W#..#',
            '#..D#..#',
            '#......#',
            '########'
          ]
        },
        {
          name: 'L8 연쇄 이동 II',
          tip: '위/오른쪽 중력의 조합으로 멀리 떨어진 씨앗을 발아시키세요.',
          map: [
            '########',
            '#S..WD.#',
            '#.....X#',
            '#.....W#',
            '#..D...#',
            '#.....S#',
            '#......#',
            '########'
          ]
        },
        {
          name: 'L9 복합 퍼즐 I',
          tip: '고정 블록/흙 블록/다중 씨앗을 순차적으로 정리하세요.',
          map: [
            '########',
            '#S.D.W.#',
            '#..#...#',
            '#..S#W.#',
            '#..D#X.#',
            '#S..W..#',
            '#..X...#',
            '########'
          ]
        },
        {
          name: 'L10 복합 퍼즐 II',
          tip: '마지막 정원입니다. 중력 회전을 길게 설계해보세요.',
          map: [
            '########',
            '#S.DW#S#',
            '#..X#..#',
            '#..W#D.#',
            '#S..#W.#',
            '#.DX#..#',
            '#..W...#',
            '########'
          ]
        }
      ];

      const DIRS = {
        up: { dx: 0, dy: -1, label: '↑ 상', idx: 0 },
        right: { dx: 1, dy: 0, label: '→ 우', idx: 1 },
        down: { dx: 0, dy: 1, label: '↓ 하', idx: 2 },
        left: { dx: -1, dy: 0, label: '← 좌', idx: 3 }
      };

      const state = {
        levelIndex: 0,
        cols: 8,
        rows: 8,
        walls: new Set(),
        waters: new Set(),
        fixed: new Set(),
        objects: [],
        gravity: 'down',
        moveT: 1,
        moving: false,
        twistT: 0,
        twistSign: 1,
        particles: [],
        levelWon: false,
        clearShown: false,
        message: '레벨 시작',
        progress: {
          unlocked: 1,
          cleared: Array(LEVELS.length).fill(false)
        }
      };

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const levelValue = document.getElementById('levelValue');
      const gravityValue = document.getElementById('gravityValue');
      const sproutValue = document.getElementById('sproutValue');
      const messageValue = document.getElementById('messageValue');
      const hintText = document.getElementById('hintText');
      const levelGrid = document.getElementById('levelGrid');
      const clearOverlay = document.getElementById('clearOverlay');
      const clearText = document.getElementById('clearText');
      const restartBtn = document.getElementById('restartBtn');
      const nextBtn = document.getElementById('nextBtn');
      const retryBtn = document.getElementById('retryBtn');
      const closeOverlayBtn = document.getElementById('closeOverlayBtn');

      let audioCtx = null;
      let pointerStart = null;
      let rafId = 0;
      let lastTs = performance.now();

      function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
      function key(x, y) { return `${x},${y}`; }

      function loadProgress() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object') return;
          const unlocked = Number(parsed.unlocked) || 1;
          const cleared = Array.isArray(parsed.cleared)
            ? parsed.cleared.slice(0, LEVELS.length).map(Boolean)
            : Array(LEVELS.length).fill(false);
          while (cleared.length < LEVELS.length) cleared.push(false);
          state.progress.unlocked = clamp(unlocked, 1, LEVELS.length);
          state.progress.cleared = cleared;
        } catch (_) {}
      }

      function saveProgress() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
      }

      function parseLevel(level) {
        const walls = new Set();
        const waters = new Set();
        const fixed = new Set();
        const objects = [];
        const rows = level.map.length;
        const cols = level.map[0].length;
        let id = 0;

        for (let y = 0; y < rows; y += 1) {
          const row = level.map[y];
          for (let x = 0; x < cols; x += 1) {
            const ch = row[x];
            if (ch === '#') walls.add(key(x, y));
            else if (ch === 'W') waters.add(key(x, y));
            else if (ch === 'X') fixed.add(key(x, y));
            else if (ch === 'S') {
              objects.push({ id: `seed-${id++}`, type: 'seed', x, y, px: x, py: y, sprouted: false, sproutAnim: 0 });
            } else if (ch === 'D') {
              objects.push({ id: `dirt-${id++}`, type: 'dirt', x, y, px: x, py: y, sprouted: false, sproutAnim: 0 });
            }
          }
        }

        return { walls, waters, fixed, objects, cols, rows };
      }

      function buildLevelButtons() {
        levelGrid.innerHTML = '';
        for (let i = 0; i < LEVELS.length; i += 1) {
          const btn = document.createElement('button');
          btn.className = 'lv';
          btn.type = 'button';
          btn.dataset.index = String(i);
          const isCleared = !!state.progress.cleared[i];
          btn.innerHTML = `<div>L${i + 1}</div><div class="mark">${isCleared ? '🌸' : '·'}</div>`;
          if (i + 1 > state.progress.unlocked) {
            btn.classList.add('lock');
            btn.disabled = true;
            btn.innerHTML = `<div>L${i + 1}</div><div class="mark">🔒</div>`;
          } else {
            btn.addEventListener('click', () => {
              closeOverlay();
              loadLevel(i);
            });
          }
          levelGrid.appendChild(btn);
        }
      }

      function highlightActiveLevel() {
        Array.from(levelGrid.children).forEach((el, idx) => {
          el.classList.toggle('active', idx === state.levelIndex);
        });
      }

      function loadLevel(index) {
        const level = LEVELS[index];
        const parsed = parseLevel(level);
        state.levelIndex = index;
        state.cols = parsed.cols;
        state.rows = parsed.rows;
        state.walls = parsed.walls;
        state.waters = parsed.waters;
        state.fixed = parsed.fixed;
        state.objects = parsed.objects;
        state.gravity = 'down';
        state.moveT = 1;
        state.moving = false;
        state.twistT = 0;
        state.levelWon = false;
        state.clearShown = false;
        state.particles.length = 0;
        state.message = level.name;
        hintText.textContent = level.tip;
        updateHud();
        buildLevelButtons();
        highlightActiveLevel();
      }

      function countSeeds() {
        let total = 0;
        let sprouted = 0;
        state.objects.forEach((o) => {
          if (o.type === 'seed') {
            total += 1;
            if (o.sprouted) sprouted += 1;
          }
        });
        return { total, sprouted };
      }

      function updateHud() {
        const { total, sprouted } = countSeeds();
        levelValue.textContent = `${state.levelIndex + 1} / ${LEVELS.length}`;
        gravityValue.textContent = DIRS[state.gravity].label;
        sproutValue.textContent = `${sprouted} / ${total}`;
        messageValue.textContent = state.message;
      }

      function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }

      function tone(freq, duration = 0.12, type = 'triangle', gain = 0.05, freq2 = null) {
        if (!audioCtx) return;
        const t0 = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        if (freq2) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq2), t0 + duration);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + duration + 0.03);
      }

      function sfxMove() {
        tone(180, 0.1, 'square', 0.03, 110);
      }

      function sfxSprout() {
        tone(280, 0.12, 'triangle', 0.045, 380);
        setTimeout(() => tone(420, 0.13, 'sine', 0.035, 520), 50);
      }

      function sfxClear() {
        [330, 440, 550].forEach((f, i) => setTimeout(() => tone(f, 0.25, 'sine', 0.04, f * 1.25), i * 45));
      }

      function spawnFlowerParticles(x, y, count = 14) {
        for (let i = 0; i < count; i += 1) {
          const a = Math.random() * Math.PI * 2;
          const sp = 0.8 + Math.random() * 1.8;
          state.particles.push({
            x: x + 0.5,
            y: y + 0.5,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp - 0.8,
            life: 0.65 + Math.random() * 0.45,
            max: 0.65 + Math.random() * 0.45,
            hue: Math.random() < 0.6 ? 145 : 320
          });
        }
      }

      function turnSign(fromDir, toDir) {
        const a = DIRS[fromDir].idx;
        const b = DIRS[toDir].idx;
        const diff = (b - a + 4) % 4;
        if (diff === 1) return 1;
        if (diff === 3) return -1;
        return 1;
      }

      function applyGravity(dirName) {
        if (!DIRS[dirName] || state.moving || state.levelWon) return;
        ensureAudio();
        const prevDir = state.gravity;
        state.gravity = dirName;
        state.twistSign = turnSign(prevDir, dirName);
        state.twistT = 1;

        const { dx, dy } = DIRS[dirName];
        const blockers = new Set([...state.walls, ...state.fixed]);
        state.objects.forEach((o) => {
          if (o.type === 'seed' && o.sprouted) blockers.add(key(o.x, o.y));
        });

        const movable = state.objects.filter((o) => !(o.type === 'seed' && o.sprouted));
        movable.sort((a, b) => {
          if (dx > 0) return b.x - a.x;
          if (dx < 0) return a.x - b.x;
          if (dy > 0) return b.y - a.y;
          return a.y - b.y;
        });

        let moved = false;
        const occupied = new Set(blockers);

        movable.forEach((o) => {
          o.px = o.x;
          o.py = o.y;
          let nx = o.x;
          let ny = o.y;
          while (true) {
            const tx = nx + dx;
            const ty = ny + dy;
            if (tx < 0 || ty < 0 || tx >= state.cols || ty >= state.rows) break;
            if (occupied.has(key(tx, ty))) break;
            nx = tx;
            ny = ty;
          }
          if (nx !== o.x || ny !== o.y) moved = true;
          o.x = nx;
          o.y = ny;
          occupied.add(key(nx, ny));
        });

        let sproutedNow = 0;
        state.objects.forEach((o) => {
          if (o.type === 'seed' && !o.sprouted && state.waters.has(key(o.x, o.y))) {
            o.sprouted = true;
            o.sproutAnim = 0;
            sproutedNow += 1;
            spawnFlowerParticles(o.x, o.y);
          }
        });

        if (moved) {
          state.moving = true;
          state.moveT = 0;
          sfxMove();
        } else {
          state.moving = false;
          state.moveT = 1;
        }

        if (sproutedNow > 0) {
          sfxSprout();
          state.message = `새싹 ${sproutedNow}개 발아!`;
        } else if (moved) {
          state.message = `중력 ${DIRS[dirName].label} 전환`;
        } else {
          state.message = '움직일 수 없어요';
        }

        updateHud();
        checkClear();
      }

      function checkClear() {
        const seeds = state.objects.filter((o) => o.type === 'seed');
        if (seeds.length > 0 && seeds.every((s) => s.sprouted)) {
          if (!state.levelWon) {
            state.levelWon = true;
            state.message = '정원이 깨어났어요!';
            updateHud();
            state.progress.cleared[state.levelIndex] = true;
            if (state.progress.unlocked < state.levelIndex + 2) {
              state.progress.unlocked = clamp(state.levelIndex + 2, 1, LEVELS.length);
            }
            saveProgress();
            buildLevelButtons();
            highlightActiveLevel();
            sfxClear();
            setTimeout(() => {
              if (state.levelWon && !state.clearShown) showClearOverlay();
            }, 340);
          }
        }
      }

      function showClearOverlay() {
        state.clearShown = true;
        clearText.textContent = `레벨 ${state.levelIndex + 1} 클리어 · ${LEVELS[state.levelIndex].name}`;
        clearOverlay.classList.add('show');
      }

      function closeOverlay() {
        clearOverlay.classList.remove('show');
      }

      function nextLevel() {
        const next = state.levelIndex + 1;
        closeOverlay();
        if (next < LEVELS.length && next + 1 <= state.progress.unlocked) {
          loadLevel(next);
        } else {
          state.message = '모든 레벨 완료! 정원이 만개했습니다 🌼';
          updateHud();
        }
      }

      function resizeCanvas() {
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
      }

      function getBoardMetrics() {
        const w = canvas.width;
        const h = canvas.height;
        const pad = Math.floor(Math.min(w, h) * 0.06);
        const boardSize = Math.min(w - pad * 2, h - pad * 2);
        const cell = Math.floor(boardSize / Math.max(state.cols, state.rows));
        const bw = cell * state.cols;
        const bh = cell * state.rows;
        const ox = Math.floor((w - bw) / 2);
        const oy = Math.floor((h - bh) / 2);
        return { w, h, cell, bw, bh, ox, oy };
      }

      function roundRect(x, y, w, h, r) {
        const rr = Math.min(r, w * 0.5, h * 0.5);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function draw() {
        const t = performance.now() * 0.001;
        const m = getBoardMetrics();
        ctx.clearRect(0, 0, m.w, m.h);

        const bg = ctx.createLinearGradient(0, 0, 0, m.h);
        bg.addColorStop(0, '#0b0b1f');
        bg.addColorStop(1, '#06060f');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, m.w, m.h);

        ctx.save();
        const twistAngle = Math.sin(state.twistT * Math.PI) * 0.16 * state.twistSign;
        ctx.translate(m.w * 0.5, m.h * 0.5);
        ctx.rotate(twistAngle);
        ctx.translate(-m.w * 0.5, -m.h * 0.5);

        roundRect(m.ox - 4, m.oy - 4, m.bw + 8, m.bh + 8, m.cell * 0.28);
        ctx.fillStyle = 'rgba(15,18,38,0.92)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(162,175,205,0.26)';
        ctx.lineWidth = Math.max(1, m.cell * 0.03);
        ctx.stroke();

        for (let y = 0; y < state.rows; y += 1) {
          for (let x = 0; x < state.cols; x += 1) {
            const x0 = m.ox + x * m.cell;
            const y0 = m.oy + y * m.cell;

            ctx.strokeStyle = 'rgba(188,197,223,0.11)';
            ctx.lineWidth = Math.max(1, m.cell * 0.02);
            ctx.strokeRect(x0 + 0.5, y0 + 0.5, m.cell - 1, m.cell - 1);

            if (state.walls.has(key(x, y))) {
              roundRect(x0 + m.cell * 0.08, y0 + m.cell * 0.08, m.cell * 0.84, m.cell * 0.84, m.cell * 0.16);
              ctx.fillStyle = '#35344f';
              ctx.fill();
              ctx.strokeStyle = 'rgba(255,255,255,0.15)';
              ctx.stroke();
            }

            if (state.waters.has(key(x, y))) {
              const pulse = 0.75 + Math.sin(t * 3 + x * 0.6 + y * 0.45) * 0.12;
              ctx.save();
              ctx.shadowColor = 'rgba(0,235,255,0.72)';
              ctx.shadowBlur = m.cell * 0.28;
              roundRect(x0 + m.cell * 0.12, y0 + m.cell * 0.15, m.cell * 0.76, m.cell * 0.7, m.cell * 0.16);
              ctx.fillStyle = `rgba(36, 228, 255, ${0.35 * pulse})`;
              ctx.fill();
              ctx.restore();

              ctx.strokeStyle = 'rgba(117,247,255,0.5)';
              ctx.strokeRect(x0 + m.cell * 0.2, y0 + m.cell * 0.23, m.cell * 0.6, m.cell * 0.46);
            }

            if (state.fixed.has(key(x, y))) {
              roundRect(x0 + m.cell * 0.14, y0 + m.cell * 0.14, m.cell * 0.72, m.cell * 0.72, m.cell * 0.15);
              ctx.fillStyle = '#7d859b';
              ctx.fill();
              ctx.strokeStyle = 'rgba(255,255,255,0.24)';
              ctx.stroke();

              ctx.fillStyle = 'rgba(15,18,35,0.9)';
              ctx.font = `${Math.floor(m.cell * 0.26)}px sans-serif`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText('🔒', x0 + m.cell * 0.5, y0 + m.cell * 0.52);
            }
          }
        }

        const moveP = state.moving ? easeOutCubic(state.moveT) : 1;

        state.objects.forEach((o) => {
          const gx = lerp(o.px, o.x, moveP);
          const gy = lerp(o.py, o.y, moveP);
          const x = m.ox + gx * m.cell;
          const y = m.oy + gy * m.cell;

          if (o.type === 'dirt') {
            roundRect(x + m.cell * 0.14, y + m.cell * 0.14, m.cell * 0.72, m.cell * 0.72, m.cell * 0.14);
            ctx.fillStyle = '#8d5b2b';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,230,180,0.16)';
            ctx.stroke();

            ctx.fillStyle = 'rgba(58,34,16,0.42)';
            for (let i = 0; i < 4; i += 1) {
              const px = x + m.cell * (0.22 + i * 0.16);
              const py = y + m.cell * (0.22 + ((i % 2) * 0.2));
              ctx.fillRect(px, py, m.cell * 0.08, m.cell * 0.08);
            }
          } else if (o.type === 'seed') {
            if (!o.sprouted) {
              ctx.save();
              ctx.shadowColor = 'rgba(66,255,142,0.9)';
              ctx.shadowBlur = m.cell * 0.35;
              ctx.beginPath();
              ctx.arc(x + m.cell * 0.5, y + m.cell * 0.5, m.cell * 0.2, 0, Math.PI * 2);
              ctx.fillStyle = '#42ff8e';
              ctx.fill();
              ctx.restore();

              ctx.strokeStyle = 'rgba(220,255,230,0.52)';
              ctx.lineWidth = Math.max(1, m.cell * 0.03);
              ctx.strokeRect(x + m.cell * 0.34, y + m.cell * 0.34, m.cell * 0.32, m.cell * 0.32);
            } else {
              const p = clamp(o.sproutAnim, 0, 1);
              const stemH = m.cell * (0.12 + 0.42 * p);
              const sx = x + m.cell * 0.5;
              const sy = y + m.cell * 0.72;

              ctx.strokeStyle = '#8dff8d';
              ctx.lineWidth = Math.max(2, m.cell * 0.08);
              ctx.beginPath();
              ctx.moveTo(sx, sy);
              ctx.lineTo(sx, sy - stemH);
              ctx.stroke();

              const flowerY = sy - stemH;
              const petalR = m.cell * (0.05 + 0.12 * p);
              for (let i = 0; i < 6; i += 1) {
                const a = (Math.PI * 2 * i) / 6 + t * 0.5;
                ctx.beginPath();
                ctx.arc(sx + Math.cos(a) * petalR * 1.25, flowerY + Math.sin(a) * petalR * 1.25, petalR, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 121, 186, 0.92)';
                ctx.fill();
              }

              ctx.beginPath();
              ctx.arc(sx, flowerY, petalR * 0.95, 0, Math.PI * 2);
              ctx.fillStyle = '#ffe680';
              ctx.fill();
            }
          }
        });

        state.particles.forEach((p) => {
          const x = m.ox + p.x * m.cell;
          const y = m.oy + p.y * m.cell;
          const alpha = clamp(p.life / p.max, 0, 1);
          ctx.fillStyle = `hsla(${p.hue}, 92%, 66%, ${alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, m.cell * 0.06 * alpha + 1.2, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.restore();
      }

      function update(dt) {
        if (state.moving) {
          state.moveT = clamp(state.moveT + dt * 4.8, 0, 1);
          if (state.moveT >= 1) state.moving = false;
        }

        if (state.twistT > 0) {
          state.twistT = Math.max(0, state.twistT - dt * 3.2);
        }

        state.objects.forEach((o) => {
          if (o.type === 'seed' && o.sprouted) {
            o.sproutAnim = clamp(o.sproutAnim + dt * 1.6, 0, 1);
          }
        });

        for (let i = state.particles.length - 1; i >= 0; i -= 1) {
          const p = state.particles[i];
          p.life -= dt;
          if (p.life <= 0) {
            state.particles.splice(i, 1);
            continue;
          }
          p.vy += dt * 3.2;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
        }
      }

      function loop(ts) {
        const dt = Math.min(0.033, (ts - lastTs) / 1000);
        lastTs = ts;
        update(dt);
        draw();
        rafId = requestAnimationFrame(loop);
      }

      function onKeyDown(e) {
        if (e.key === 'ArrowUp') { e.preventDefault(); applyGravity('up'); }
        else if (e.key === 'ArrowDown') { e.preventDefault(); applyGravity('down'); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); applyGravity('left'); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); applyGravity('right'); }
        else if (e.key.toLowerCase() === 'r') { e.preventDefault(); closeOverlay(); loadLevel(state.levelIndex); }
      }

      function bindInputs() {
        document.querySelectorAll('button[data-dir]').forEach((btn) => {
          btn.addEventListener('click', () => {
            applyGravity(btn.dataset.dir);
          });
        });

        restartBtn.addEventListener('click', () => {
          closeOverlay();
          loadLevel(state.levelIndex);
        });

        nextBtn.addEventListener('click', nextLevel);
        retryBtn.addEventListener('click', () => {
          closeOverlay();
          loadLevel(state.levelIndex);
        });
        closeOverlayBtn.addEventListener('click', closeOverlay);

        window.addEventListener('keydown', onKeyDown, { passive: false });
        window.addEventListener('resize', resizeCanvas);

        canvas.addEventListener('pointerdown', (e) => {
          pointerStart = { x: e.clientX, y: e.clientY };
          ensureAudio();
        });

        canvas.addEventListener('pointerup', (e) => {
          if (!pointerStart) return;
          const dx = e.clientX - pointerStart.x;
          const dy = e.clientY - pointerStart.y;
          pointerStart = null;
          const adx = Math.abs(dx);
          const ady = Math.abs(dy);
          if (Math.max(adx, ady) < 24) return;
          if (adx > ady) applyGravity(dx > 0 ? 'right' : 'left');
          else applyGravity(dy > 0 ? 'down' : 'up');
        });

        canvas.addEventListener('pointercancel', () => { pointerStart = null; });
      }

      function boot() {
        loadProgress();
        resizeCanvas();
        buildLevelButtons();
        loadLevel(Math.max(0, state.progress.unlocked - 1));
        bindInputs();
        cancelAnimationFrame(rafId);
        lastTs = performance.now();
        rafId = requestAnimationFrame(loop);
      }

      boot();
    })();
  </script>
</body>
</html>
