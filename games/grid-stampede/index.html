<canvas id="game"></canvas>
<script>
'use strict';
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const BASE_W=480,BASE_H=700;
let scale=1,ox=0,oy=0;
function resize(){
  const sw=window.innerWidth,sh=window.innerHeight;
  scale=Math.min(sw/BASE_W,sh/BASE_H);
  canvas.width=sw;canvas.height=sh;
  ox=(sw-BASE_W*scale)/2;oy=(sh-BASE_H*scale)/2;
}
window.addEventListener('resize',resize);resize();

// Retro 8-bit palette
const C={
  bg:'#0e1a08',bg2:'#162210',sky:'#1a2e18',
  grass1:'#1e3010',grass2:'#243816',
  cattle:'#c89048',cattleD:'#8a6030',cattleE:'#f0d080',
  wolf:'#586878',wolfD:'#38485a',wolfE:'#f0e040',
  lasso:'#f8e040',lassoR:'#e8c020',
  pen:'#6a4018',penL:'#8a5820',
  star:'#f8f840',
  hit:'#ff4040',
  boost:'#f0e040',
  text:'#f0ead0',textD:'#a09870',
  hud:'#d0c8a0',
  combo:'#f8c040',
  fence:'#8a6030',
  dust:'rgba(180,140,60,',
};

// Play area
const PLAY_Y=90, PLAY_H=500;
const PLAY_X=0, PLAY_W=BASE_W;
const PEN_X=BASE_W-60; // pen on right

// State
let gs='title';
let score=0,combo=0,lives=5;
let wave=1,waveTimer=0,nextSpawn=0,spawnInterval=2.2;
let entities=[];    // {type:'cattle'|'wolf', x,y, vx,vy, w,h, hp,state,stateT,id}
let lassos=[];      // {x,y,r,t:1→0, maxR:55}
let particles=[];   // {x,y,vx,vy,t,col,sz}
let eid=0;
let animT=0,lastTs=0;
let penAnim=0; // cattle recently scored
let bestScore=+(localStorage.getItem('gs_best')||0);
let scorePopups=[];  // {x,y,v,t,text}

const CATTLE_W=38,CATTLE_H=28;
const WOLF_W=34,WOLF_H=26;
const LASSO_R=55;
const CATTLE_SPD=()=>55+Math.random()*30+wave*5;
const WOLF_SPD=()=>65+Math.random()*30+wave*8;
const LANES=[140,200,265,330,395,455,520]; // y spawn positions

function randLane(){return LANES[Math.floor(Math.random()*LANES.length)];}

function spawnCattle(){
  entities.push({
    type:'cattle',x:-CATTLE_W,y:randLane(),
    vx:CATTLE_SPD(),vy:0,w:CATTLE_W,h:CATTLE_H,
    hp:1,state:'normal',stateT:0,id:eid++,
    legT:0
  });
}
function spawnWolf(){
  entities.push({
    type:'wolf',x:BASE_W+WOLF_W,y:randLane(),
    vx:-WOLF_SPD(),vy:0,w:WOLF_W,h:WOLF_H,
    hp:1,state:'normal',stateT:0,id:eid++,
    legT:0
  });
}

function addParticles(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=30+Math.random()*80;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-40,
      t:1,col,sz:3+Math.random()*4});
  }
}

function addPopup(x,y,text,col){
  scorePopups.push({x,y,v:-70,t:1,text,col:col||C.text});
}

function lassoAt(wx,wy){
  // place lasso ring (max 3)
  if(lassos.length>=3) lassos.shift();
  lassos.push({x:wx,y:wy,r:8,maxR:LASSO_R,t:1});
  // check hits
  let cattleHit=0,wolfHit=0;
  entities.forEach(e=>{
    const dx=e.x+e.w/2-wx,dy=e.y+e.h/2-wy;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<LASSO_R+e.w/2){
      if(e.type==='cattle'&&e.state==='normal'){
        e.state='boosted';e.stateT=2.5;
        e.vx*=2;
        addParticles(e.x+e.w/2,e.y,C.lasso,5);
        cattleHit++;
      } else if(e.type==='wolf'&&e.state==='normal'){
        e.state='stunned';e.stateT=2.2;
        addParticles(e.x+e.w/2,e.y,C.star,6);
        wolfHit++;
        score+=3;addPopup(e.x,e.y,'STUN +3',C.star);
      }
    }
  });
  if(cattleHit>0) addPopup(wx,wy-20,`x${cattleHit} BOOST!`,C.boost);
}

function update(dt){
  waveTimer+=dt;
  if(waveTimer>25){waveTimer=0;wave++;spawnInterval=Math.max(0.8,spawnInterval-0.15);}

  nextSpawn-=dt;
  if(nextSpawn<=0){
    nextSpawn=spawnInterval*(0.7+Math.random()*0.6);
    const wolfChance=0.2+wave*0.05;
    if(Math.random()<wolfChance) spawnWolf(); else spawnCattle();
  }

  // lasso expand
  lassos.forEach(l=>{
    l.r=Math.min(l.maxR,l.r+l.maxR*3*dt);
    l.t=Math.max(0,l.t-dt*1.8);
  });
  lassos=lassos.filter(l=>l.t>0);

  // particles
  particles.forEach(p=>{
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;
    p.t=Math.max(0,p.t-dt*2);
  });
  particles=particles.filter(p=>p.t>0);

  // score popups
  scorePopups.forEach(p=>{p.y+=p.v*dt;p.t=Math.max(0,p.t-dt*2);});
  scorePopups=scorePopups.filter(p=>p.t>0);

  penAnim=Math.max(0,penAnim-dt);

  // entities
  const dead=[];
  entities.forEach(e=>{
    if(e.state==='stunned'){
      e.stateT-=dt;
      if(e.stateT<=0){e.state='normal';e.vx=e.type==='wolf'?-WOLF_SPD():CATTLE_SPD();}
    } else if(e.state==='boosted'){
      e.stateT-=dt;
      if(e.stateT<=0){e.state='normal';e.vx=CATTLE_SPD();}
    } else if(e.state==='hit'){
      e.stateT-=dt;
      if(e.stateT<=0) dead.push(e.id);
    }
    e.x+=e.vx*dt;
    e.y+=e.vy*dt;
    e.legT+=Math.abs(e.vx)*dt*0.04;

    // cattle reaches pen
    if(e.type==='cattle'&&e.x>PEN_X){
      combo++;
      const pts=10*Math.min(combo,5);
      score+=pts;penAnim=0.4;
      addParticles(PEN_X,e.y,C.cattleE,8);
      addPopup(PEN_X-20,e.y-30,`+${pts}${combo>1?' ×'+Math.min(combo,5):''}`,C.combo);
      dead.push(e.id);
    }
    // cattle exits left (missed)
    if(e.type==='cattle'&&e.x<-200){dead.push(e.id);combo=0;}
    // wolf exits right (missed)
    if(e.type==='wolf'&&e.x>BASE_W+100){dead.push(e.id);}
    // wolf exits left (caught cattle somewhere)
    if(e.type==='wolf'&&e.x<-100){dead.push(e.id);}
  });

  // wolf-cattle collision
  for(let i=0;i<entities.length;i++){
    const a=entities[i];if(a.type!=='wolf'||a.state==='stunned') continue;
    for(let j=0;j<entities.length;j++){
      const b=entities[j];if(b.type!=='cattle'||b.state==='hit') continue;
      const dx=Math.abs((a.x+a.w/2)-(b.x+b.w/2));
      const dy=Math.abs((a.y+a.h/2)-(b.y+b.h/2));
      if(dx<(a.w+b.w)/2*0.8&&dy<(a.h+b.h)/2*0.9){
        b.state='hit';b.stateT=0.4;combo=0;
        addParticles(b.x+b.w/2,b.y+b.h/2,C.hit,10);
        addPopup(b.x,b.y-20,'CAUGHT!',C.hit);
        lives--;
        if(lives<=0){gs='dead';bestScore=Math.max(bestScore,score);localStorage.setItem('gs_best',bestScore);}
      }
    }
  }

  entities=entities.filter(e=>!dead.includes(e.id));
}

// -- Drawing --
function drawBG(){
  // sky gradient
  const g=ctx.createLinearGradient(0,PLAY_Y,0,PLAY_Y+PLAY_H);
  g.addColorStop(0,'#203018');g.addColorStop(1,'#0e1a08');
  ctx.fillStyle=g;ctx.fillRect(0,PLAY_Y,PLAY_W,PLAY_H);
  // grass stripes
  for(let i=0;i<7;i++){
    ctx.fillStyle=i%2===0?C.grass1:C.grass2;
    ctx.fillRect(0,PLAY_Y+i*(PLAY_H/7),PLAY_W,PLAY_H/7);
  }
  // pixel grid dots (retro feel)
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let y=PLAY_Y+8;y<PLAY_Y+PLAY_H;y+=16)
    for(let x=8;x<PLAY_W;x+=16)
      ctx.fillRect(x,y,1,1);
}

function drawPen(){
  // wooden fence at right
  const px=PEN_X,ph=PLAY_H,py=PLAY_Y;
  ctx.fillStyle=C.pen;ctx.fillRect(px,py,10,ph);
  ctx.fillStyle=C.penL;
  for(let y=py+10;y<py+ph;y+=30){ctx.fillRect(px-2,y,14,5);}
  // glow when cattle just scored
  if(penAnim>0){
    ctx.save();ctx.globalAlpha=penAnim*0.6;
    ctx.fillStyle=C.lasso;ctx.fillRect(px,py,16,ph);
    ctx.restore();
  }
  ctx.save();ctx.font='bold 13px Courier New';ctx.fillStyle=C.penL;
  ctx.textAlign='center';ctx.fillText('PEN',px+20,py+PLAY_H-8);ctx.restore();
}

function drawCattle(e){
  const x=e.x,y=e.y-e.h/2;
  const isBoost=e.state==='boosted',isHit=e.state==='hit';
  // body
  ctx.fillStyle=isHit?C.hit:isBoost?C.cattleE:C.cattle;
  ctx.fillRect(x+4,y+6,e.w-8,e.h-10);
  // head
  ctx.fillStyle=isHit?C.hit:C.cattle;
  ctx.fillRect(x+e.w-14,y+2,14,14);
  // horns
  ctx.fillStyle=C.cattleE;
  ctx.fillRect(x+e.w-12,y-3,3,6);ctx.fillRect(x+e.w-5,y-3,3,6);
  // eye
  ctx.fillStyle='#1a0a00';ctx.fillRect(x+e.w-8,y+6,3,3);
  // legs (animated)
  const lp=Math.sin(e.legT)*4;
  ctx.fillStyle=C.cattleD;
  ctx.fillRect(x+8,y+e.h-6,4,6+lp);ctx.fillRect(x+14,y+e.h-6,4,6-lp);
  ctx.fillRect(x+e.w-18,y+e.h-6,4,6+lp);ctx.fillRect(x+e.w-12,y+e.h-6,4,6-lp);
  // tail
  ctx.fillStyle=C.cattleD;ctx.fillRect(x,y+8,5,4);
  // boost glow
  if(isBoost){
    ctx.save();ctx.strokeStyle=C.lasso;ctx.lineWidth=2;
    ctx.strokeRect(x+3,y+1,e.w-6,e.h-2);ctx.restore();
  }
}

function drawWolf(e){
  const x=e.x,y=e.y-e.h/2;
  const isStun=e.state==='stunned';
  // body
  ctx.fillStyle=isStun?'#788898':C.wolf;ctx.fillRect(x+4,y+6,e.w-8,e.h-10);
  // head
  ctx.fillStyle=isStun?'#788898':C.wolfD;ctx.fillRect(x+2,y+2,14,14);
  // snout
  ctx.fillStyle='#6a5868';ctx.fillRect(x+2,y+10,10,7);
  // eyes (menacing)
  ctx.fillStyle=isStun?'#f8f840':'#f04020';
  ctx.fillRect(x+4,y+4,3,3);
  // ears
  ctx.fillStyle=C.wolfD;ctx.fillRect(x+5,y-4,5,6);
  // legs
  const lp=Math.sin(e.legT)*4;
  ctx.fillStyle=C.wolfD;
  ctx.fillRect(x+6,y+e.h-6,3,6+lp);ctx.fillRect(x+12,y+e.h-6,3,6-lp);
  ctx.fillRect(x+e.w-14,y+e.h-6,3,6+lp);ctx.fillRect(x+e.w-8,y+e.h-6,3,6-lp);
  // tail
  ctx.fillStyle=C.wolf;ctx.fillRect(x+e.w-2,y+6,6,4);
  // stun stars
  if(isStun){
    const si=Math.floor(animT*8)%3;
    ctx.save();ctx.fillStyle=C.star;ctx.font='bold 14px Courier';ctx.textAlign='center';
    ctx.fillText(['★','✦','✶'][si],x+e.w/2,y-4);ctx.restore();
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.t;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    ctx.restore();
  });
}

function drawLassos(){
  lassos.forEach(l=>{
    ctx.save();ctx.globalAlpha=l.t*0.7;
    ctx.strokeStyle=C.lasso;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(l.x,l.y,l.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=l.t*0.15;ctx.fillStyle=C.lasso;ctx.fill();
    ctx.restore();
  });
}

function drawHUD(){
  // top bar
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,BASE_W,88);
  ctx.strokeStyle=C.fence;ctx.lineWidth=1;
  ctx.strokeRect(0,0,BASE_W,88);

  ctx.textAlign='left';ctx.fillStyle=C.hud;
  ctx.font='bold 18px Courier New';ctx.fillText('GRID STAMPEDE',10,22);
  ctx.font='12px Courier New';ctx.fillStyle=C.textD;ctx.fillText('그리드 스탬피드',10,38);

  // lives (cattle icons)
  ctx.textAlign='right';
  ctx.font='16px Courier New';ctx.fillStyle=C.text;
  ctx.fillText('LIVES',BASE_W-10,22);
  for(let i=0;i<lives;i++){
    ctx.fillStyle=C.cattle;
    ctx.fillRect(BASE_W-15-i*18,28,12,10);
  }

  ctx.textAlign='center';
  ctx.font='bold 26px Courier New';ctx.fillStyle=C.combo;
  ctx.fillText(score,BASE_W/2,30);
  ctx.font='12px Courier New';ctx.fillStyle=C.textD;
  ctx.fillText(`WAVE ${wave}  COMBO ×${Math.min(combo,5)}`,BASE_W/2,50);

  // wave progress bar
  const bw=200,bh=6,bx=BASE_W/2-bw/2,by=62;
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=C.lasso;ctx.fillRect(bx,by,bw*(waveTimer/25),bh);
  ctx.fillStyle=C.textD;ctx.font='10px Courier New';
  ctx.fillText(`next wave: ${Math.ceil(25-waveTimer)}s`,BASE_W/2,77);

  // bottom bar
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,BASE_H-50,BASE_W,50);
  ctx.fillStyle=C.textD;ctx.font='12px Courier New';ctx.textAlign='center';
  ctx.fillText('TAP to lasso · boost 🐄 · stun 🐺 · max 3 rings',BASE_W/2,BASE_H-28);
  ctx.fillText(`Best: ${bestScore}`,BASE_W/2,BASE_H-10);
}

function drawScorePopups(){
  scorePopups.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.t;
    ctx.font='bold 16px Courier New';ctx.textAlign='center';
    ctx.fillStyle=p.col;ctx.fillText(p.text,p.x,p.y);
    ctx.restore();
  });
}

function drawGame(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);

  // full bg
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,BASE_W,BASE_H);
  drawBG();drawPen();

  entities.forEach(e=>{
    if(e.type==='cattle') drawCattle(e);
    else drawWolf(e);
  });
  drawLassos();drawParticles();drawHUD();drawScorePopups();
  ctx.restore();
}

function drawTitle(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,BASE_W,BASE_H);

  // grass bg animation
  for(let i=0;i<7;i++){
    ctx.fillStyle=i%2===0?C.grass1:C.grass2;
    ctx.fillRect(0,80+i*70,BASE_W,70);
  }
  // scanlines
  ctx.save();ctx.globalAlpha=0.06;ctx.fillStyle='#fff';
  for(let y=0;y<BASE_H;y+=2) ctx.fillRect(0,y,BASE_W,1);
  ctx.restore();

  // animated cattle parade
  for(let i=0;i<5;i++){
    const cx=(animT*55+i*110)%(BASE_W+60)-30;
    const cy=200+i*55;
    ctx.save();ctx.translate(cx,cy);
    ctx.fillStyle=C.cattle;ctx.fillRect(4,0,30,20);
    ctx.fillRect(30,-6,14,14);
    ctx.fillStyle=C.cattleE;ctx.fillRect(32,-10,3,5);ctx.fillRect(38,-10,3,5);
    ctx.fillStyle='#1a0a00';ctx.fillRect(36,-2,3,3);
    ctx.restore();
  }

  ctx.textAlign='center';
  ctx.font='bold 36px Courier New';ctx.fillStyle=C.lasso;
  ctx.fillText('GRID STAMPEDE',BASE_W/2,90);
  ctx.font='16px Courier New';ctx.fillStyle=C.textD;
  ctx.fillText('그리드 스탬피드',BASE_W/2,114);

  ctx.font='14px Courier New';ctx.fillStyle=C.text;
  ctx.fillText('Tap to toss a LASSO ring!',BASE_W/2,460);
  ctx.fillText('🐄 Boost cattle to the pen',BASE_W/2,484);
  ctx.fillText('🐺 Stun wolves before they strike',BASE_W/2,508);

  // play button pixel style
  ctx.fillStyle=C.fence;ctx.fillRect(BASE_W/2-100,540,200,50);
  ctx.fillStyle=C.penL;ctx.fillRect(BASE_W/2-98,542,196,46);
  ctx.font='bold 22px Courier New';ctx.fillStyle=C.cattleE;
  ctx.fillText('▶  START',BASE_W/2,572);

  if(bestScore>0){
    ctx.font='13px Courier New';ctx.fillStyle=C.textD;
    ctx.fillText(`Best: ${bestScore}`,BASE_W/2,610);
  }
  ctx.font='11px Courier New';ctx.fillStyle=C.textD;
  ctx.fillText('Max 3 rings active · Combo ×5 max',BASE_W/2,648);
  ctx.restore();
}

function drawDead(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,BASE_W,BASE_H);

  ctx.save();ctx.globalAlpha=0.06;ctx.fillStyle='#fff';
  for(let y=0;y<BASE_H;y+=2) ctx.fillRect(0,y,BASE_W,1);ctx.restore();

  ctx.textAlign='center';
  ctx.font='bold 14px Courier New';ctx.fillStyle=C.hit;
  ctx.fillText('> GAME OVER <',BASE_W/2,130);
  ctx.font='bold 28px Courier New';ctx.fillStyle=C.lasso;
  ctx.fillText('STAMPEDE FAILED',BASE_W/2,170);

  ctx.font='22px Courier New';ctx.fillStyle=C.text;
  ctx.fillText(`SCORE: ${score}`,BASE_W/2,230);
  ctx.fillText(`WAVE: ${wave}`,BASE_W/2,258);
  if(score>=bestScore){
    ctx.fillStyle=C.star;ctx.font='bold 18px Courier New';
    ctx.fillText('★ NEW BEST! ★',BASE_W/2,292);
  } else {
    ctx.fillStyle=C.textD;ctx.font='16px Courier New';
    ctx.fillText(`Best: ${bestScore}`,BASE_W/2,292);
  }

  // retry button
  ctx.fillStyle=C.fence;ctx.fillRect(BASE_W/2-100,330,200,50);
  ctx.fillStyle=C.penL;ctx.fillRect(BASE_W/2-98,332,196,46);
  ctx.font='bold 20px Courier New';ctx.fillStyle=C.cattleE;
  ctx.fillText('↺  RETRY',BASE_W/2,362);

  ctx.font='12px Courier New';ctx.fillStyle=C.textD;
  ctx.fillText('All 5 cattle were caught!',BASE_W/2,400);
  ctx.restore();
}

// Input
function toGame(ex,ey){return[(ex-ox)/scale,(ey-oy)/scale];}
function handleTap(ex,ey){
  const [gx,gy]=toGame(ex,ey);
  if(gs==='title'){
    if(gx>=BASE_W/2-100&&gx<=BASE_W/2+100&&gy>=540&&gy<=590){
      gs='play';score=0;combo=0;lives=5;wave=1;waveTimer=0;
      nextSpawn=0.5;spawnInterval=2.2;entities=[];lassos=[];particles=[];scorePopups=[];
    }
    return;
  }
  if(gs==='dead'){
    if(gx>=BASE_W/2-100&&gx<=BASE_W/2+100&&gy>=330&&gy<=380){
      gs='play';score=0;combo=0;lives=5;wave=1;waveTimer=0;
      nextSpawn=0.5;spawnInterval=2.2;entities=[];lassos=[];particles=[];scorePopups=[];
    }
    return;
  }
  if(gs==='play'){
    if(gy>PLAY_Y&&gy<PLAY_Y+PLAY_H) lassoAt(gx,gy);
  }
}
canvas.addEventListener('pointerdown',e=>handleTap(e.clientX,e.clientY));

// Game loop
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;animT+=dt;
  if(gs==='play') update(dt);
  if(gs==='title') drawTitle();
  else if(gs==='play') drawGame();
  else if(gs==='dead') drawDead();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTs=ts;loop(ts);});
</script>
