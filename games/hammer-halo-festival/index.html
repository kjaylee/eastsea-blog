<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#d7a15d">
<title>Hammer Halo Festival — 해머 헤일로 페스티벌</title>
<meta name="description" content="선수 주위를 원형으로 감아 해머 회전을 쌓고, 바람 밴드와 골든 헤일로를 꿰뚫어 최고 거리를 노리는 모바일 육상 아케이드.">
<meta property="og:title" content="Hammer Halo Festival — 해머 헤일로 페스티벌">
<meta property="og:description" content="원을 그려 토크를 쌓고, Golden Halo와 Coach Draft로 스타디움 필드를 지배하는 스포츠 아케이드.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://eastsea-blog.pages.dev/games/hammer-halo-festival/">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://eastsea-blog.pages.dev/games/hammer-halo-festival/">
<link rel="manifest" href="/games/manifest.json">
<script src="../i18n.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/games/tg-sdk-wrapper.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#efe7d8;color:#2b2d38;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;overflow:hidden;touch-action:none}
body{display:flex;justify-content:center;align-items:center;min-height:100vh}
#app{position:relative;width:min(100vw,460px);height:min(100vh,900px);height:calc(var(--tg-viewport-height,100vh));max-height:100vh;background:linear-gradient(180deg,#f7efe2 0%,#dbe8ef 24%,#a7cbe3 52%,#d7a15d 80%,#c8804d 100%);overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%}
button{border:none;border-radius:18px;padding:14px 18px;font:inherit;font-weight:800;cursor:pointer}
button:active{transform:scale(.98)}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:22px;z-index:6}
.panel{width:min(100%,368px);background:rgba(255,249,241,.9);border:1px solid rgba(88,72,53,.12);backdrop-filter:blur(10px);border-radius:28px;box-shadow:0 24px 50px rgba(68,45,27,.2);padding:22px}
.title{font-size:34px;line-height:1.02;font-weight:900;letter-spacing:-.05em;margin:0 0 10px;color:#3b3028}
.subtitle{margin:0 0 16px;font-size:14px;line-height:1.45;color:#65584e}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0 16px}
.stat{background:#fff9f2;border-radius:18px;padding:12px 10px;text-align:center;border:1px solid rgba(96,73,57,.08)}
.stat .label{display:block;font-size:11px;color:#8e7464;margin-bottom:4px}
.stat .value{display:block;font-size:19px;font-weight:900;color:#4e3b31}
.row{display:flex;gap:10px;align-items:center}.row>*{flex:1}
.primary{background:linear-gradient(135deg,#d78d4a 0%,#ebc26a 100%);color:#fff;box-shadow:0 10px 24px rgba(215,141,74,.35)}
.secondary{background:#fff;color:#5a4538}
.small{padding:10px 12px;border-radius:14px;font-size:12px}
.help,.card{margin-top:12px;padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.74);font-size:12px;line-height:1.45;color:#664d42;border:1px solid rgba(92,61,44,.08)}
.card strong{display:block;font-size:12px;color:#4c372d;margin-bottom:4px}
.hidden{display:none!important}
#hud{position:absolute;inset:0;pointer-events:none;z-index:4}
#topBar{position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);left:10px;right:10px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.hudCard{background:rgba(255,249,242,.84);border:1px solid rgba(98,73,56,.1);border-radius:16px;padding:8px 10px;min-height:58px;box-shadow:0 10px 24px rgba(60,32,17,.12)}
.hudCard .k{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#8e7262}.hudCard .v{display:block;font-size:16px;font-weight:900;color:#44342b;margin-top:4px}
#banner{position:absolute;left:50%;top:calc(env(safe-area-inset-top,0px) + 138px);transform:translateX(-50%);padding:10px 16px;border-radius:999px;background:rgba(63,47,34,.88);color:#fff;font-size:12px;font-weight:800;letter-spacing:.03em;opacity:0;transition:opacity .18s ease;max-width:88%;text-align:center}
#banner.show{opacity:1}
#aimTip{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 138px);transform:translateX(-50%);padding:10px 14px;border-radius:999px;background:rgba(255,250,244,.92);color:#5a4538;font-size:12px;font-weight:700;border:1px solid rgba(92,68,51,.08)}
#draftScreen .panel{padding-bottom:18px}
#draftButtons{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.draftBtn{background:#fff8ef;color:#4d382e;border:1px solid rgba(94,63,46,.1);border-radius:18px;padding:14px;text-align:left}
.draftBtn .name{display:block;font-size:15px;font-weight:900;margin-bottom:4px}.draftBtn .desc{display:block;font-size:12px;line-height:1.4;color:#6d5749}
#gameover .panel{padding-bottom:18px}
#resultHeadline{font-size:28px;font-weight:900;letter-spacing:-.03em;color:#432f25;margin-bottom:10px}
#resultMeta{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.resultBox{background:#fff8f1;border-radius:16px;padding:12px;border:1px solid rgba(87,58,42,.08)}
.resultBox .label{display:block;font-size:11px;color:#937667;margin-bottom:4px}.resultBox .value{display:block;font-size:18px;font-weight:900;color:#50362c}
#sharePreview{font-size:12px;line-height:1.4;color:#6f574b;background:#fffaf5;border-radius:16px;padding:12px;margin-top:10px;border:1px solid rgba(90,59,44,.08);white-space:pre-line}
@media (max-width:390px){.title{font-size:30px}#topBar{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div id="topBar">
      <div class="hudCard"><span class="k" data-i18n="score">Score</span><span class="v" id="scoreValue">0</span></div>
      <div class="hudCard"><span class="k" data-i18n="time">Time</span><span class="v" id="timeValue">60</span></div>
      <div class="hudCard"><span class="k" data-i18n="throws">Throws</span><span class="v" id="throwValue">0</span></div>
      <div class="hudCard"><span class="k" data-i18n="spin">Spin</span><span class="v" id="spinValue">0.0x</span></div>
    </div>
    <div id="banner"></div>
    <div id="aimTip"></div>
  </div>

  <div id="titleScreen" class="overlay">
    <div class="panel">
      <h1 class="title">Hammer Halo<br>Festival</h1>
      <p class="subtitle" id="titleSubtitle"></p>
      <div class="stats">
        <div class="stat"><span class="label" data-i18n="bestScore">Best Score</span><span class="value" id="bestScoreTitle">0</span></div>
        <div class="stat"><span class="label" data-i18n="bestDistance">Best Distance</span><span class="value" id="bestDistanceTitle">0m</span></div>
        <div class="stat"><span class="label" data-i18n="medals">Medals</span><span class="value" id="medalsTitle">0</span></div>
        <div class="stat"><span class="label" data-i18n="haloHits">Halo Hits</span><span class="value" id="bestHaloTitle">0</span></div>
      </div>
      <div class="row">
        <button class="primary" id="startBtn"></button>
        <button class="secondary small" id="langBtn">KO</button>
      </div>
      <div class="card"><strong id="dailyTitle"></strong><span id="dailyCardText"></span></div>
      <div class="help" id="howText"></div>
    </div>
  </div>

  <div id="draftScreen" class="overlay hidden">
    <div class="panel">
      <h2 class="title" style="font-size:28px;margin-bottom:8px" id="draftTitle"></h2>
      <p class="subtitle" id="draftSubtitle"></p>
      <div id="draftButtons"></div>
    </div>
  </div>

  <div id="gameover" class="overlay hidden">
    <div class="panel">
      <div id="resultHeadline"></div>
      <div id="resultMeta">
        <div class="resultBox"><span class="label" data-i18n="score">Score</span><span class="value" id="finalScore">0</span></div>
        <div class="resultBox"><span class="label" data-i18n="bestDistance">Best Distance</span><span class="value" id="finalDistance">0m</span></div>
        <div class="resultBox"><span class="label" data-i18n="medals">Medals</span><span class="value" id="finalMedals">0</span></div>
        <div class="resultBox"><span class="label" data-i18n="haloHits">Halo Hits</span><span class="value" id="finalHaloHits">0</span></div>
      </div>
      <div class="row">
        <button class="primary" id="retryBtn"></button>
        <button class="secondary" id="homeBtn"></button>
      </div>
      <div class="row" style="margin-top:10px"><button class="secondary small" id="copyBtn"></button></div>
      <div id="sharePreview"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'hammerHaloFestival.v1';
const defaultSave = { bestScore:0, bestDistance:0, medals:0, bestHaloHits:0, lang:'ko', dailySeed:'', dailyDate:'', dailyCard:'' };
const drafts = {
  heavy:{ name:{ko:'Heavy Head',en:'Heavy Head'}, desc:{ko:'기본 거리 +12%, 안정성 -10%',en:'Base distance +12%, stability -10%'}, apply(buff){ buff.power *= 1.12; buff.control *= 0.9; } },
  chalk:{ name:{ko:'Chalk Grip',en:'Chalk Grip'}, desc:{ko:'릴리스 흔들림 -18%, 헤일로 배수 -15%',en:'Release wobble -18%, halo bonus -15%'}, apply(buff){ buff.control *= 1.18; buff.haloBonus *= 0.85; } },
  echo:{ name:{ko:'Echo Sector',en:'Echo Sector'}, desc:{ko:'중심 존 보너스 +80, 파울 폭 -8%',en:'Center zone bonus +80, foul width -8%'}, apply(buff){ buff.zoneBonus += 80; buff.foulWidth *= 0.92; } }
};
const tMap = {
  subtitle:{ko:'선수 주위를 원형으로 감아 토크를 쌓고, 골든 헤일로를 꿰뚫어 오늘의 최고 거리를 만드세요.',en:'Circle around the athlete to build torque and pierce the golden halo for today\'s longest throw.'},
  start:{ko:'축제 시작',en:'Start Festival'}, retry:{ko:'다시 던지기',en:'Retry'}, home:{ko:'타이틀로',en:'Home'}, copy:{ko:'하이라이트 복사',en:'Copy Highlight'},
  how:{ko:'선수 주위를 둥글게 문질러 회전을 쌓고 손을 떼어 투척하세요. 2회마다 코치 드래프트가 열리고, 바람 밴드와 헤일로를 통과하면 큰 보너스를 얻습니다.',en:'Circle around the athlete to build spin, then release to throw. Every two throws opens a coach draft, and crossing wind bands plus halos brings big bonuses.'},
  dailyTitle:{ko:'오늘의 바람 카드',en:'Today\'s Wind Card'},
  score:{ko:'점수',en:'Score'}, time:{ko:'시간',en:'Time'}, throws:{ko:'투척',en:'Throws'}, spin:{ko:'회전',en:'Spin'},
  bestScore:{ko:'최고 점수',en:'Best Score'}, bestDistance:{ko:'최고 거리',en:'Best Distance'}, medals:{ko:'메달',en:'Medals'}, haloHits:{ko:'헤일로',en:'Halo Hits'},
  aim:{ko:'선수 주위를 원으로 그린 뒤 놓으세요',en:'Circle the athlete, then release'},
  resultTitle:{ko:'축제 종료',en:'Festival Over'},
  draftTitle:{ko:'Coach Call Draft',en:'Coach Call Draft'}, draftSubtitle:{ko:'다음 두 번의 투척에 적용할 업그레이드를 고르세요.',en:'Choose an upgrade for the next two throws.'},
  foul:{ko:'파울',en:'Foul'}, short:{ko:'짧은 투척',en:'Too Short'}, halo:{ko:'HALO SHOT!',en:'HALO SHOT!'}, band:{ko:'WIND RIBBON +35',en:'WIND RIBBON +35'}, finalRoar:{ko:'FINAL ROAR',en:'FINAL ROAR'},
  share:{ko:'Hammer Halo Festival\n점수 {score}\n최고 거리 {distance}m\n메달 {medals}\n헤일로 {halo}회\nhttps://eastsea-blog.pages.dev/games/hammer-halo-festival/',en:'Hammer Halo Festival\nScore {score}\nBest Distance {distance}m\nMedals {medals}\nHalo Hits {halo}\nhttps://eastsea-blog.pages.dev/games/hammer-halo-festival/'},
  zoneCenter:{ko:'CENTER',en:'CENTER'}, zoneMid:{ko:'MID',en:'MID'}, zoneOuter:{ko:'OUTER',en:'OUTER'},
  throwSummary:{ko:'{distance}m · {zone}',en:'{distance}m · {zone}'},
  copied:{ko:'복사됨',en:'Copied'}
};

const app = document.getElementById('app');
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreValue = document.getElementById('scoreValue');
const timeValue = document.getElementById('timeValue');
const throwValue = document.getElementById('throwValue');
const spinValue = document.getElementById('spinValue');
const banner = document.getElementById('banner');
const aimTip = document.getElementById('aimTip');
const hud = document.getElementById('hud');
const titleScreen = document.getElementById('titleScreen');
const draftScreen = document.getElementById('draftScreen');
const gameoverScreen = document.getElementById('gameover');
const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const homeBtn = document.getElementById('homeBtn');
const copyBtn = document.getElementById('copyBtn');
const langBtn = document.getElementById('langBtn');
const titleSubtitle = document.getElementById('titleSubtitle');
const howText = document.getElementById('howText');
const bestScoreTitle = document.getElementById('bestScoreTitle');
const bestDistanceTitle = document.getElementById('bestDistanceTitle');
const medalsTitle = document.getElementById('medalsTitle');
const bestHaloTitle = document.getElementById('bestHaloTitle');
const dailyTitle = document.getElementById('dailyTitle');
const dailyCardText = document.getElementById('dailyCardText');
const draftTitle = document.getElementById('draftTitle');
const draftSubtitle = document.getElementById('draftSubtitle');
const draftButtons = document.getElementById('draftButtons');
const resultHeadline = document.getElementById('resultHeadline');
const finalScore = document.getElementById('finalScore');
const finalDistance = document.getElementById('finalDistance');
const finalMedals = document.getElementById('finalMedals');
const finalHaloHits = document.getElementById('finalHaloHits');
const sharePreview = document.getElementById('sharePreview');

let save = loadSave();
let W = 0, H = 0, DPR = 1;
let pageErrors = [];
window.addEventListener('error', e => pageErrors.push(String(e.message || 'error')));

const athlete = { x:0, y:0, r:16 };
const field = { topY:0, leftBase:0, rightBase:0, topWidth:0, baseWidth:0 };
const bands = [
  { y:0, phase:0, strength:0.9, hue:'#8fd6ff' },
  { y:0, phase:1.6, strength:-1.1, hue:'#fff2a0' },
  { y:0, phase:3.1, strength:0.7, hue:'#f8c0d0' }
];
const halo = { active:false, hit:false, x:0, y:0, r:30 };

const state = {
  mode:'title', score:0, timeLeft:60, throws:0, fouls:0, stage:1,
  spin:0, spinPeak:0, stability:1, arcTravel:0, lastAngle:null, pointerActive:false,
  pointer:null, orbitTrail:[], shot:null, banner:'', bestDistanceRun:0, lastDistance:0,
  haloHits:0, bandHits:0, runMedals:0, finalRoar:false, draftChoices:[], pendingDraft:false,
  buff:null, particles:[], trail:[], resolveTimer:0, nextMode:'play', throwStarted:false
};

function loadSave(){
  try { return { ...defaultSave, ...JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') }; }
  catch { return { ...defaultSave }; }
}
function persistSave(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(save)); }
function todayKey(){
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}${m}${d}`;
}
function ensureDailyCard(){
  const key = todayKey();
  if (save.dailyDate === key && save.dailyCard) return;
  const seed = [...key].reduce((a,c)=>a+Number(c),0);
  const dirsKo = ['서풍 우세','횡풍 교차','후반 역풍','좌회전 상승'];
  const dirsEn = ['West push','Crosswind split','Late headwind','Left lift'];
  const bandsLevel = (seed % 4) + 2;
  const drift = ((seed * 7) % 33 + 12) / 10;
  const idx = seed % dirsKo.length;
  save.dailySeed = String(seed);
  save.dailyDate = key;
  save.dailyCard = JSON.stringify({ ko:`${dirsKo[idx]} · 밴드 ${bandsLevel} · ${drift.toFixed(1)}m/s`, en:`${dirsEn[idx]} · Bands ${bandsLevel} · ${drift.toFixed(1)}m/s` });
  persistSave();
}
ensureDailyCard();
function dailyCard(){ try { return JSON.parse(save.dailyCard); } catch { return { ko:'기본 풍향', en:'Base wind' }; } }
function T(key){ const pack=tMap[key]; return pack ? (pack[save.lang] || pack.ko || key) : key; }
function format(n){ return Math.round(n).toLocaleString(); }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function normAngle(a){ while (a > Math.PI) a -= Math.PI*2; while (a < -Math.PI) a += Math.PI*2; return a; }
function showBanner(text){
  banner.textContent = text; banner.classList.add('show');
  clearTimeout(showBanner._timer);
  showBanner._timer = setTimeout(()=>banner.classList.remove('show'), 1100);
}

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = app.clientWidth; H = app.clientHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  athlete.x = W/2; athlete.y = H - 150; athlete.r = 16;
  field.topY = 150; field.baseWidth = Math.min(W * .82, 320); field.topWidth = Math.min(W * .16, 56);
  field.leftBase = athlete.x - field.baseWidth/2; field.rightBase = athlete.x + field.baseWidth/2;
  bands[0].y = field.topY + 70; bands[1].y = field.topY + 145; bands[2].y = field.topY + 220;
}
window.addEventListener('resize', resize);
resize();

function setMode(mode){
  state.mode = mode;
  titleScreen.classList.toggle('hidden', mode !== 'title');
  draftScreen.classList.toggle('hidden', mode !== 'draft');
  gameoverScreen.classList.toggle('hidden', mode !== 'gameover');
  hud.classList.toggle('hidden', mode !== 'play');
}
function updateTitleStats(){
  bestScoreTitle.textContent = format(save.bestScore);
  bestDistanceTitle.textContent = `${format(save.bestDistance)}m`;
  medalsTitle.textContent = format(save.medals);
  bestHaloTitle.textContent = format(save.bestHaloHits || 0);
  const card = dailyCard();
  dailyCardText.textContent = card[save.lang] || card.ko;
}
function updateHud(){
  scoreValue.textContent = format(state.score);
  timeValue.textContent = Math.max(0, state.timeLeft).toFixed(0);
  throwValue.textContent = `${state.throws}/${Math.max(6, state.throws + 2)}`;
  spinValue.textContent = `${state.spin.toFixed(1)}x`;
  aimTip.textContent = state.pointerActive ? `${T('spin')} ${state.spin.toFixed(1)}x` : T('aim');
}
function applyText(){
  titleSubtitle.textContent = T('subtitle');
  howText.textContent = T('how');
  startBtn.textContent = T('start'); retryBtn.textContent = T('retry'); homeBtn.textContent = T('home'); copyBtn.textContent = T('copy');
  dailyTitle.textContent = T('dailyTitle'); draftTitle.textContent = T('draftTitle'); draftSubtitle.textContent = T('draftSubtitle');
  resultHeadline.textContent = T('resultTitle'); langBtn.textContent = save.lang.toUpperCase();
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = T(el.dataset.i18n));
  renderDraftButtons(); updateTitleStats(); updateHud();
}

function resetBuff(){ return { power:1, control:1, zoneBonus:0, haloBonus:1, foulWidth:1 }; }
function startGame(){
  state.score = 0; state.timeLeft = 60; state.throws = 0; state.fouls = 0; state.stage = 1;
  state.spin = 0; state.spinPeak = 0; state.stability = 1; state.arcTravel = 0; state.lastAngle = null; state.pointerActive = false; state.pointer = null;
  state.orbitTrail = []; state.shot = null; state.banner = ''; state.bestDistanceRun = 0; state.lastDistance = 0; state.haloHits = 0; state.bandHits = 0;
  state.runMedals = 0; state.finalRoar = false; state.draftChoices = []; state.pendingDraft = false; state.buff = resetBuff(); state.particles = []; state.trail = [];
  state.resolveTimer = 0; state.nextMode = 'play'; state.throwStarted = false;
  halo.active = false; halo.hit = false;
  setMode('play'); updateHud();
}

function drawChoice(def){ return `<button class="draftBtn"><span class="name">${def.name[save.lang] || def.name.ko}</span><span class="desc">${def.desc[save.lang] || def.desc.ko}</span></button>`; }
function pickDraftChoices(){
  const pool = Object.keys(drafts).sort(() => Math.random() - 0.5);
  state.draftChoices = pool.slice(0,2);
  renderDraftButtons();
}
function renderDraftButtons(){
  draftButtons.innerHTML = '';
  state.draftChoices.forEach((key, index) => {
    const wrap = document.createElement('div');
    wrap.innerHTML = drawChoice(drafts[key]);
    const btn = wrap.firstChild;
    btn.addEventListener('click', () => chooseDraft(index));
    draftButtons.appendChild(btn);
  });
}
function openDraft(){ pickDraftChoices(); setMode('draft'); }
function chooseDraft(index=0){
  const key = state.draftChoices[index];
  if (!key || !drafts[key]) return false;
  drafts[key].apply(state.buff);
  showBanner(drafts[key].name[save.lang] || drafts[key].name.ko);
  state.draftChoices = [];
  renderDraftButtons();
  setMode('play');
  return true;
}

function pointerPos(e){
  const rect = canvas.getBoundingClientRect();
  const src = e.touches?.[0] || e.changedTouches?.[0] || e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}
function canStartSpin(p){
  const d = Math.hypot(p.x - athlete.x, p.y - athlete.y);
  return state.mode === 'play' && !state.shot && state.resolveTimer <= 0 && d > 24 && d < 110;
}
function startSpinInput(e){
  const p = pointerPos(e);
  if (!canStartSpin(p)) return;
  state.pointerActive = true; state.pointer = p; state.lastAngle = Math.atan2(p.y - athlete.y, p.x - athlete.x);
  state.orbitTrail = [{ x:p.x, y:p.y, life:20 }]; state.spin = 0.3; state.arcTravel = 0; state.stability = 1; state.throwStarted = true;
}
function moveSpinInput(e){
  if (!state.pointerActive || state.mode !== 'play') return;
  const p = pointerPos(e);
  const angle = Math.atan2(p.y - athlete.y, p.x - athlete.x);
  const delta = normAngle(angle - state.lastAngle);
  const travel = Math.abs(delta);
  state.arcTravel += travel;
  state.spin = clamp(state.spin + travel * 0.92, 0, 8.6);
  state.spinPeak = Math.max(state.spinPeak, state.spin);
  state.stability = clamp(state.stability * 0.94 + (travel > 0.04 && travel < 0.42 ? 0.08 : 0.02), 0.4, 1.25);
  state.lastAngle = angle; state.pointer = p;
  state.orbitTrail.push({ x:p.x, y:p.y, life:18 });
  if (state.orbitTrail.length > 24) state.orbitTrail.shift();
  updateHud();
}
function endSpinInput(e){
  if (!state.pointerActive) return;
  state.pointer = pointerPos(e);
  state.pointerActive = false;
  releaseShot();
}
canvas.addEventListener('mousedown', startSpinInput);
canvas.addEventListener('mousemove', moveSpinInput);
window.addEventListener('mouseup', endSpinInput);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startSpinInput(e); }, { passive:false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveSpinInput(e); }, { passive:false });
window.addEventListener('touchend', e => { if (state.throwStarted){ e.preventDefault(); endSpinInput(e); state.throwStarted = false; } }, { passive:false });

function sectorHalfWidthAt(y){
  const t = clamp((y - field.topY) / (athlete.y - field.topY), 0, 1);
  const width = field.topWidth + (field.baseWidth - field.topWidth) * t;
  return width / 2;
}
function buildHalo(px){
  halo.active = true; halo.hit = false;
  halo.x = athlete.x + clamp((px.x - athlete.x) * 0.55, -70, 70);
  halo.y = field.topY + 140 + Math.sin(state.throws + state.spin) * 18;
  halo.r = 22 + clamp(state.spin * 3, 0, 16);
}
function clearAimState(){ state.spin = 0; state.arcTravel = 0; state.lastAngle = null; state.orbitTrail = []; updateHud(); }
function releaseShot(){
  if (state.mode !== 'play' || state.shot || state.resolveTimer > 0) { clearAimState(); return false; }
  const p = state.pointer || { x:athlete.x, y:athlete.y - 80 };
  const lateral = clamp((p.x - athlete.x) / 88, -1, 1);
  const lift = clamp((athlete.y - p.y) / 84, 0.35, 1);
  const quality = clamp((state.spin / 5.6) * 0.65 + (state.stability / 1.05) * 0.35, 0, 1);
  state.throws += 1;
  if (state.spin < 1.1 || lift < 0.34) {
    foulThrow(T('short'));
    clearAimState();
    return false;
  }
  const noise = (1 - clamp(state.buff.control, 0.72, 1.4)) * 0.75;
  const wobble = (Math.random() - 0.5) * noise;
  state.shot = {
    x: athlete.x, y: athlete.y - 14,
    vx: (lateral * (1.2 + state.spin * 0.24) + wobble),
    vy: -(5.8 + state.spin * 0.95 + lift * 2.6) * state.buff.power,
    quality, spin: state.spin, bandMask: [false,false,false], haloEligible: state.spin > 3.1 && quality > 0.72,
    haloHit:false, life:0
  };
  if (state.shot.haloEligible) buildHalo(p); else halo.active = false;
  clearAimState();
  return true;
}
function foulThrow(label){
  state.fouls += 1;
  state.resolveTimer = 0.55; state.nextMode = state.fouls >= 3 || state.timeLeft <= 0 ? 'gameover' : ((state.throws % 2 === 0 && state.timeLeft > 6) ? 'draft' : 'play');
  state.pendingDraft = state.nextMode === 'draft';
  state.shot = null;
  showBanner(label || T('foul'));
}
function spawnParticles(x,y,color,count,spread=2.4){
  for(let i=0;i<count;i++) state.particles.push({ x, y, vx:(Math.random()-.5)*spread, vy:(Math.random()-.5)*spread-1.4, life:28 + Math.random()*18, color });
}
function resolveLanding(x,y){
  const half = sectorHalfWidthAt(y) * state.buff.foulWidth;
  const dx = Math.abs(x - athlete.x);
  const progress = clamp((athlete.y - y) / (athlete.y - field.topY), 0, 1);
  if (progress < 0.18) return foulThrow(T('short'));
  if (dx > half - 4) return foulThrow(T('foul'));
  const zone = dx < half * 0.22 ? 'center' : (dx < half * 0.48 ? 'mid' : 'outer');
  const zoneBonus = zone === 'center' ? (120 + state.buff.zoneBonus) : zone === 'mid' ? 60 : 20;
  const distance = Math.round(28 + progress * 72 + state.shot.spin * 3.4 * state.buff.power);
  let gained = distance * 4 + zoneBonus;
  let medals = zone === 'center' ? 2 : zone === 'mid' ? 1 : 0;
  if (state.shot.haloHit) gained += Math.round(180 * state.buff.haloBonus);
  if (state.finalRoar && medals > 0) medals += 1;
  state.runMedals += medals;
  state.lastDistance = distance;
  state.bestDistanceRun = Math.max(state.bestDistanceRun, distance);
  state.score += gained;
  state.resolveTimer = 0.65;
  state.nextMode = state.timeLeft <= 0 ? 'gameover' : ((state.throws % 2 === 0 && state.timeLeft > 6) ? 'draft' : 'play');
  state.pendingDraft = state.nextMode === 'draft';
  state.shot = null;
  const zoneKey = zone === 'center' ? T('zoneCenter') : zone === 'mid' ? T('zoneMid') : T('zoneOuter');
  showBanner(T('throwSummary').replace('{distance}', distance).replace('{zone}', zoneKey));
  spawnParticles(x, y, zone === 'center' ? '#ffe37f' : zone === 'mid' ? '#bce2ff' : '#fff4d8', 14, 4);
}

function update(dt){
  if (state.mode === 'play') {
    state.timeLeft -= dt;
    state.stage = Math.min(4, 1 + Math.floor((60 - state.timeLeft) / 15));
    state.finalRoar = state.timeLeft <= 12;
    if (state.finalRoar && !state._roarShown) { state._roarShown = true; showBanner(T('finalRoar')); }
    if (state.timeLeft <= 0 && !state.shot && state.resolveTimer <= 0) { endGame(); return; }

    bands.forEach((band, i) => band.phase += dt * (0.7 + state.stage * 0.28 + i * 0.07));
    if (state.shot) {
      const s = state.shot;
      s.life += dt;
      bands.forEach((band, i) => {
        if (!s.bandMask[i] && Math.abs(s.y - band.y) < 10) {
          s.bandMask[i] = true;
          s.vx += Math.sin(band.phase) * band.strength * 0.55;
          state.score += 35; state.bandHits += 1;
          showBanner(T('band')); spawnParticles(s.x, s.y, band.hue, 8, 3);
        }
      });
      s.x += s.vx * dt * 60;
      s.y += s.vy * dt * 60;
      s.vy += 0.12 * dt * 60;
      s.vx *= 0.995;
      state.trail.push({ x:s.x, y:s.y, life:18, color:s.haloHit ? '#ffe37f' : '#ffffff' });
      if (state.trail.length > 18) state.trail.shift();
      if (halo.active && !halo.hit && Math.hypot(s.x - halo.x, s.y - halo.y) < halo.r) {
        halo.hit = true; s.haloHit = true; state.haloHits += 1; showBanner(T('halo')); spawnParticles(halo.x, halo.y, '#ffe37f', 18, 4.5);
      }
      if (s.y <= field.topY + 12 || s.vy >= -0.18) resolveLanding(s.x, s.y);
    }
    if (state.resolveTimer > 0) {
      state.resolveTimer -= dt;
      if (state.resolveTimer <= 0) {
        state.resolveTimer = 0;
        if (state.nextMode === 'draft') openDraft();
        else if (state.nextMode === 'gameover') endGame();
      }
    }
    updateHud();
  }

  state.orbitTrail.forEach(p => p.life -= dt * 60);
  state.orbitTrail = state.orbitTrail.filter(p => p.life > 0);
  state.trail.forEach(p => p.life -= dt * 60);
  state.trail = state.trail.filter(p => p.life > 0);
  state.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += .03; p.life -= 1; });
  state.particles = state.particles.filter(p => p.life > 0);
}

function endGame(){
  if (state.mode === 'gameover') return;
  save.bestScore = Math.max(save.bestScore, state.score);
  save.bestDistance = Math.max(save.bestDistance, state.bestDistanceRun);
  save.medals += state.runMedals;
  save.bestHaloHits = Math.max(save.bestHaloHits || 0, state.haloHits);
  persistSave();
  finalScore.textContent = format(state.score);
  finalDistance.textContent = `${format(state.bestDistanceRun)}m`;
  finalMedals.textContent = format(state.runMedals);
  finalHaloHits.textContent = format(state.haloHits);
  sharePreview.textContent = makeShareText();
  updateTitleStats();
  setMode('gameover');
}
function makeShareText(){
  return T('share').replace('{score}', format(state.score)).replace('{distance}', format(state.bestDistanceRun)).replace('{medals}', String(state.runMedals)).replace('{halo}', String(state.haloHits));
}

startBtn.addEventListener('click', startGame);
retryBtn.addEventListener('click', startGame);
homeBtn.addEventListener('click', () => { updateTitleStats(); setMode('title'); });
langBtn.addEventListener('click', () => { save.lang = save.lang === 'ko' ? 'en' : 'ko'; persistSave(); applyText(); });
copyBtn.addEventListener('click', async () => {
  const text = makeShareText();
  try { await navigator.clipboard.writeText(text); showBanner(T('copied')); }
  catch { showBanner(text); }
});

function drawField(){
  ctx.clearRect(0,0,W,H);
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#f7efe2'); sky.addColorStop(.26,'#dbe8ef'); sky.addColorStop(.55,'#a7cbe3'); sky.addColorStop(.82,'#d7a15d'); sky.addColorStop(1,'#c8804d');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.beginPath(); ctx.moveTo(athlete.x - field.topWidth/2, field.topY); ctx.lineTo(field.leftBase, athlete.y + 90); ctx.lineTo(field.rightBase, athlete.y + 90); ctx.lineTo(athlete.x + field.topWidth/2, field.topY); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,250,245,.85)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(athlete.x, field.topY); ctx.lineTo(athlete.x, athlete.y + 90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(field.leftBase, athlete.y + 90); ctx.lineTo(athlete.x - field.topWidth/2, field.topY); ctx.lineTo(athlete.x + field.topWidth/2, field.topY); ctx.lineTo(field.rightBase, athlete.y + 90); ctx.stroke();

  [0.28,0.52,0.76].forEach((t, i) => {
    const y = athlete.y - (athlete.y - field.topY) * t;
    const half = sectorHalfWidthAt(y);
    ctx.strokeStyle = i === 0 ? 'rgba(255,232,173,.6)' : 'rgba(255,255,255,.28)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(athlete.x - half, y); ctx.lineTo(athlete.x + half, y); ctx.stroke();
  });

  bands.forEach((band, i) => {
    const half = sectorHalfWidthAt(band.y);
    const drift = Math.sin(band.phase) * 16;
    ctx.strokeStyle = band.hue; ctx.lineWidth = 9; ctx.globalAlpha = .42;
    ctx.beginPath(); ctx.moveTo(athlete.x - half + 10, band.y + drift); ctx.quadraticCurveTo(athlete.x, band.y - drift, athlete.x + half - 10, band.y + drift); ctx.stroke();
    ctx.globalAlpha = 1;
  });

  if (halo.active) {
    ctx.strokeStyle = halo.hit ? '#fff6b3' : 'rgba(255,227,127,.9)';
    ctx.lineWidth = halo.hit ? 6 : 4;
    ctx.beginPath(); ctx.arc(halo.x, halo.y, halo.r, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(halo.x, halo.y, halo.r + 8, 0, Math.PI*2); ctx.globalAlpha = .25; ctx.stroke(); ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#b96a3f';
  ctx.fillRect(0, athlete.y + 92, W, H - athlete.y - 92);
  ctx.fillStyle = '#deb68a'; ctx.fillRect(22, athlete.y + 70, W - 44, 16);

  ctx.fillStyle = '#3e4f73';
  ctx.beginPath(); ctx.arc(athlete.x, athlete.y, athlete.r, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(athlete.x - 6, athlete.y + 8, 12, 26);
  ctx.beginPath(); ctx.moveTo(athlete.x - 4, athlete.y + 34); ctx.lineTo(athlete.x - 16, athlete.y + 58); ctx.lineTo(athlete.x - 8, athlete.y + 62); ctx.lineTo(athlete.x + 4, athlete.y + 40); ctx.fill();
  ctx.beginPath(); ctx.moveTo(athlete.x + 4, athlete.y + 34); ctx.lineTo(athlete.x + 18, athlete.y + 58); ctx.lineTo(athlete.x + 10, athlete.y + 62); ctx.lineTo(athlete.x - 2, athlete.y + 40); ctx.fill();
  ctx.fillStyle = '#f5e8d8'; ctx.beginPath(); ctx.arc(athlete.x, athlete.y - 18, 12, 0, Math.PI*2); ctx.fill();

  state.orbitTrail.forEach((p, idx) => {
    ctx.globalAlpha = Math.max(0, p.life / 18);
    ctx.fillStyle = idx % 2 ? '#fff3b6' : '#ffffff';
    ctx.beginPath(); ctx.arc(p.x, p.y, 3.2, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (state.pointerActive && state.pointer) {
    ctx.strokeStyle = '#fff7d0'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(athlete.x, athlete.y, 52 + Math.sin(state.arcTravel*2)*4, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#f4f8ff'; ctx.beginPath(); ctx.arc(state.pointer.x, state.pointer.y, 9, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#9cb0c8'; ctx.lineWidth = 1.4; ctx.stroke();
  } else {
    const idleX = athlete.x + 48; const idleY = athlete.y - 12;
    ctx.fillStyle = '#f4f8ff'; ctx.beginPath(); ctx.arc(idleX, idleY, 10, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#a8b7ca'; ctx.stroke();
  }

  state.trail.forEach(p => {
    ctx.globalAlpha = p.life / 18; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (state.shot) {
    ctx.fillStyle = state.shot.haloHit ? '#fff0a3' : '#ffffff';
    ctx.beginPath(); ctx.arc(state.shot.x, state.shot.y, 9.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#b2bfd1'; ctx.lineWidth = 1.4; ctx.stroke();
  }

  state.particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life / 46); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 2.8, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.fillStyle = 'rgba(255,248,240,.94)'; ctx.font = '600 12px sans-serif'; ctx.textAlign = 'center';
  const card = dailyCard();
  ctx.fillText(`${card[save.lang] || card.ko} · STAGE ${state.stage}${state.finalRoar ? ' · FINAL' : ''}`, W/2, athlete.y + 118);
}

let last = performance.now();
function loop(now){
  const dt = Math.min(.033, (now - last) / 1000); last = now;
  update(dt); drawField(); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function snapshot(){
  const visibleText = document.body.innerText || '';
  return {
    state: state.mode, score: state.score, throws: state.throws, fouls: state.fouls, spin: Number(state.spin.toFixed(2)),
    bestDistance: Math.max(save.bestDistance, state.bestDistanceRun), medals: save.medals + state.runMedals, draftOpen: state.mode === 'draft',
    haloHits: state.haloHits, pageErrors:[...pageErrors], undefinedTexts:(visibleText.match(/undefined/g) || []).length,
    dailyCard: (dailyCard()[save.lang] || dailyCard().ko), lastDistance: state.lastDistance, bandHits: state.bandHits
  };
}
window.__hammerHalo = {
  start(){ startGame(); return snapshot(); },
  spin(samples=18){
    if (state.mode !== 'play') startGame();
    state.pointerActive = true; state.pointer = { x: athlete.x + 52, y: athlete.y };
    state.lastAngle = 0;
    for (let i=0;i<samples;i++) {
      const a = (Math.PI * 2 * i) / samples;
      const fake = { x: athlete.x + Math.cos(a) * 58, y: athlete.y + Math.sin(a) * 58 };
      const delta = normAngle(a - state.lastAngle);
      state.arcTravel += Math.abs(delta); state.spin = clamp(state.spin + Math.abs(delta) * 0.92, 0, 8.6); state.lastAngle = a; state.pointer = fake;
    }
    state.pointerActive = false;
    updateHud();
    return snapshot();
  },
  release(){ const ok = releaseShot(); return { ok, ...snapshot() }; },
  debugResolve(zone='center'){
    if (state.mode !== 'play') startGame();
    if (!state.shot) {
      state.spin = 5.2;
      releaseShot();
    }
    const y = field.topY + 120;
    const half = sectorHalfWidthAt(y);
    const x = zone === 'center' ? athlete.x : zone === 'mid' ? athlete.x + half * 0.34 : athlete.x + half * 0.7;
    state.shot.haloHit = zone === 'center';
    if (zone === 'center') state.haloHits += 1;
    resolveLanding(x, y);
    return snapshot();
  },
  forceDraft(){ if (state.mode !== 'play') startGame(); openDraft(); return snapshot(); },
  chooseDraft(index=0){ const ok = chooseDraft(index); return { ok, ...snapshot() }; },
  forceGameOver(){ state.timeLeft = 0; state.resolveTimer = 0; state.shot = null; endGame(); return snapshot(); },
  snapshot
};

async function runAutoSmoke(){
  const params = new URLSearchParams(location.search);
  if (params.get('autotest') !== '1') return;
  const mount = document.createElement('pre');
  mount.id = 'qa-result';
  mount.style.position = 'fixed';
  mount.style.left = '8px';
  mount.style.right = '8px';
  mount.style.bottom = '8px';
  mount.style.zIndex = '9999';
  mount.style.background = 'rgba(255,255,255,.92)';
  mount.style.padding = '8px';
  mount.style.fontSize = '11px';
  mount.style.whiteSpace = 'pre-wrap';
  mount.style.borderRadius = '12px';
  document.body.appendChild(mount);
  const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
  const result = { steps: [] };
  try {
    result.steps.push({ step:'start', data: window.__hammerHalo.start() });
    result.steps.push({ step:'spin', data: window.__hammerHalo.spin(24) });
    result.steps.push({ step:'release', data: window.__hammerHalo.release() });
    await wait(1800);
    result.steps.push({ step:'postFlight', data: window.__hammerHalo.snapshot() });
    if (window.__hammerHalo.snapshot().score === 0) {
      result.steps.push({ step:'debugResolve', data: window.__hammerHalo.debugResolve('center') });
    }
    await wait(300);
    result.steps.push({ step:'forceDraft', data: window.__hammerHalo.forceDraft() });
    result.steps.push({ step:'chooseDraft', data: window.__hammerHalo.chooseDraft(0) });
    await wait(300);
    result.steps.push({ step:'forceGameOver', data: window.__hammerHalo.forceGameOver() });
    result.final = window.__hammerHalo.snapshot();
  } catch (error) {
    result.error = String(error && error.message ? error.message : error);
  }
  mount.textContent = JSON.stringify(result, null, 2);
}

applyText();
updateTitleStats();
setMode('title');
runAutoSmoke();
</script>
