<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0a0a1a;color:#e8efff;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;touch-action:manipulation}
#app{position:relative;width:100%;height:100%}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#hud{position:absolute;left:0;right:0;top:0;padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 8px;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pill{pointer-events:auto;background:rgba(10,16,34,.8);border:1px solid rgba(101,159,255,.28);border-radius:12px;padding:8px 10px;font-size:12px;backdrop-filter:blur(4px);box-shadow:0 0 20px rgba(29,99,255,.12)}
#actions{position:absolute;left:0;right:0;bottom:0;padding:8px 12px calc(env(safe-area-inset-bottom,0px) + 12px);display:flex;gap:8px;pointer-events:none}
.btn{pointer-events:auto;flex:1;border:0;border-radius:12px;padding:12px 10px;background:linear-gradient(135deg,#2867ff,#27d4ff);color:#fff;font-weight:700;font-size:14px;box-shadow:0 8px 28px rgba(39,134,255,.35)}
.btn.secondary{background:linear-gradient(135deg,#3b3f62,#636aa2)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn:disabled{opacity:.45;filter:saturate(.4);box-shadow:none}
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,rgba(35,67,130,.36),rgba(4,6,16,.92));padding:18px;z-index:10}
.card{width:min(430px,100%);background:rgba(8,12,26,.94);border:1px solid rgba(104,171,255,.38);border-radius:18px;padding:20px 16px;text-align:center;box-shadow:0 16px 46px rgba(0,0,0,.48)}
.card h1{margin:0 0 6px;font-size:30px;letter-spacing:.3px}
.card p{margin:8px 0;color:#b7c5ea;font-size:14px;line-height:1.45}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.mini{border-radius:10px;padding:10px;background:rgba(255,255,255,.04);font-size:12px}
.mini b{display:block;font-size:16px;color:#7df0ff;margin-top:4px}
#toast{position:absolute;left:50%;transform:translateX(-50%);top:84px;background:rgba(13,21,46,.92);border:1px solid rgba(123,196,255,.5);padding:8px 12px;border-radius:10px;font-size:12px;opacity:0;transition:.2s;pointer-events:none;z-index:11}
#upgradeBox{position:absolute;right:10px;top:122px;display:flex;flex-direction:column;gap:8px;width:min(220px,52vw);pointer-events:auto}
.upg{border-radius:10px;padding:9px;background:rgba(6,13,28,.85);border:1px solid rgba(115,176,255,.28);font-size:11px}
.upg-title{font-size:12px;font-weight:700;margin-bottom:5px;color:#90f2ff}
.upg button{margin-top:6px;width:100%;border:0;border-radius:8px;padding:8px;background:linear-gradient(135deg,#6448ff,#26d8ff);color:#fff;font-weight:700;font-size:12px}
.upg button:disabled{opacity:.35}
#leaderboard{position:absolute;left:-9999px;top:-9999px}
@media (max-width:420px){
  .card h1{font-size:26px}
  #upgradeBox{width:48vw}
}
</style>

<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="row">
      <div class="pill" id="vRound">Round 1</div>
      <div class="pill" id="vScore">Score 0</div>
      <div class="pill" id="vBest">Best 0</div>
    </div>
    <div class="row">
      <div class="pill" id="vAp">AP 0/0</div>
      <div class="pill" id="vTerritory">You 0 · AI 0</div>
      <div class="pill" id="vTurns">Turn You</div>
    </div>
  </div>

  <div id="upgradeBox">
    <div class="upg">
      <div class="upg-title" id="uLogiTitle"></div>
      <div id="uLogiDesc"></div>
      <button id="btnLogi"></button>
    </div>
    <div class="upg">
      <div class="upg-title" id="uSiegeTitle"></div>
      <div id="uSiegeDesc"></div>
      <button id="btnSiege"></button>
    </div>
  </div>

  <div id="actions">
    <button class="btn secondary" id="btnReset"></button>
    <button class="btn" id="btnEndTurn"></button>
  </div>

  <div id="toast"></div>

  <div id="overlay">
    <div class="card" id="overlayCard"></div>
  </div>

  <div id="leaderboard" data-lb-slug="hex-empire" data-lb-mode="auto"></div>
</div>

<script src="../shared/sound-manager.js"></script>
<script>
(() => {
  'use strict';

  const T = GameI18n({
    gameTitle: { ko: '헥스 엠파이어', en: 'Hex Empire' },
    gameSub: { ko: '육각 영토를 확장해 AI 제국을 밀어내세요.', en: 'Expand your hex territory and push back the AI empire.' },
    tapStart: { ko: '시작', en: 'Start' },
    retry: { ko: '다시 시작', en: 'Retry' },
    resume: { ko: '계속', en: 'Resume' },
    tutorial1: { ko: '인접 타일만 점령할 수 있습니다.', en: 'You can capture only adjacent tiles.' },
    tutorial2: { ko: '중립 1 AP / 적 2 AP가 필요합니다.', en: 'Neutral costs 1 AP / enemy costs 2 AP.' },
    round: { ko: '라운드', en: 'Round' },
    score: { ko: '점수', en: 'Score' },
    bestRound: { ko: '최고 라운드', en: 'Best Round' },
    ap: { ko: '행동력', en: 'AP' },
    you: { ko: '나', en: 'You' },
    ai: { ko: 'AI', en: 'AI' },
    yourTurn: { ko: '내 턴', en: 'Your Turn' },
    aiTurn: { ko: 'AI 턴', en: 'AI Turn' },
    endTurn: { ko: '턴 종료', en: 'End Turn' },
    newRun: { ko: '새 게임', en: 'New Run' },
    logistics: { ko: '물류 기술', en: 'Logistics Tech' },
    logisticsDesc: { ko: '턴당 행동력 +1', en: '+1 AP per turn' },
    siege: { ko: '공성 기술', en: 'Siege Tech' },
    siegeDesc: { ko: '턴마다 적 타일 1회 비용 -1', en: 'Once per turn, enemy capture cost -1' },
    buy: { ko: '업그레이드', en: 'Upgrade' },
    maxed: { ko: '최대', en: 'MAX' },
    points: { ko: '기술 포인트', en: 'Tech Points' },
    winRound: { ko: '라운드 승리!', en: 'Round Cleared!' },
    loseGame: { ko: '제국이 붕괴했습니다', en: 'Your empire has fallen' },
    finalScore: { ko: '최종 점수', en: 'Final Score' },
    totalWins: { ko: '누적 승리', en: 'Total Wins' },
    needAdj: { ko: '인접한 타일만 점령 가능', en: 'Only adjacent tiles can be captured' },
    noAp: { ko: '행동력이 부족합니다', en: 'Not enough AP' },
    upgradeFail: { ko: '포인트가 부족합니다', en: 'Not enough points' },
    howTo: { ko: '중립/적 타일을 점령해 영토를 늘리고, 과반을 차지하면 라운드 승리!', en: 'Capture neutral/enemy tiles, take majority, and clear rounds!' }
  });

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayCard = document.getElementById('overlayCard');
  const toast = document.getElementById('toast');

  const vRound = document.getElementById('vRound');
  const vScore = document.getElementById('vScore');
  const vBest = document.getElementById('vBest');
  const vAp = document.getElementById('vAp');
  const vTerritory = document.getElementById('vTerritory');
  const vTurns = document.getElementById('vTurns');

  const btnEndTurn = document.getElementById('btnEndTurn');
  const btnReset = document.getElementById('btnReset');
  const btnLogi = document.getElementById('btnLogi');
  const btnSiege = document.getElementById('btnSiege');

  document.getElementById('uLogiTitle').textContent = T('logistics');
  document.getElementById('uLogiDesc').textContent = T('logisticsDesc');
  document.getElementById('uSiegeTitle').textContent = T('siege');
  document.getElementById('uSiegeDesc').textContent = T('siegeDesc');
  btnEndTurn.textContent = T('endTurn');
  btnReset.textContent = T('newRun');

  const STORAGE_KEY = 'hexEmpireSaveV1';
  const STATE = { title: 'title', play: 'play', gameover: 'gameover' };

  const NEI = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
  let W = 0, H = 0, DPR = 1;
  let state = STATE.title;

  let board = [];
  let boardRadius = 3;
  let round = 1;
  let score = 0;
  let bestRound = 1;
  let totalWins = 0;
  let techPoints = 0;
  let upgrades = { logistics: 0, siege: 0 };
  let playerAP = 0;
  let maxAP = 0;
  let playerTurn = true;
  let siegeUsed = false;
  let animT = 0;
  let particles = [];
  let selectedKey = null;

  const sounds = (typeof SoundManager !== 'undefined') ? new SoundManager() : null;
  if (sounds && sounds.loadSFX) {
    sounds.loadSFX('tap', '/games/shared/sfx/click.mp3');
    sounds.loadSFX('ok', '/games/shared/sfx/success.mp3');
    sounds.loadSFX('bad', '/games/shared/sfx/error.mp3');
    sounds.loadSFX('over', '/games/shared/sfx/game-over.mp3');
  }

  function sfx(name){ try{ sounds && sounds.playSFX && sounds.playSFX(name); }catch(e){} }
  function haptic(type='light'){
    try {
      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred(type);
      }
    } catch(e){}
  }

  function save(){
    const data = { bestRound, totalWins, upgrades, techPoints };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function load(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      bestRound = Math.max(1, d.bestRound || 1);
      totalWins = Math.max(0, d.totalWins || 0);
      upgrades.logistics = Math.max(0, Math.min(8, d.upgrades?.logistics || 0));
      upgrades.siege = Math.max(0, Math.min(6, d.upgrades?.siege || 0));
      techPoints = Math.max(0, d.techPoints || 0);
    } catch(e){}
  }

  function qrsKey(q,r){ return q + ',' + r; }

  function makeBoard(radius){
    board = [];
    for (let q = -radius; q <= radius; q++) {
      const r1 = Math.max(-radius, -q-radius);
      const r2 = Math.min(radius, -q+radius);
      for (let r = r1; r <= r2; r++) {
        board.push({ q, r, owner: 0, pulse: 0 });
      }
    }

    const center = board.find(t => t.q === 0 && t.r === 0);
    if (center) center.owner = 1;

    const aiStart = board
      .slice()
      .sort((a,b) => (Math.abs(b.q)+Math.abs(b.r)) - (Math.abs(a.q)+Math.abs(a.r)))[0];
    if (aiStart) aiStart.owner = 2;
  }

  function findTile(q,r){
    for (let i=0;i<board.length;i++) if (board[i].q===q && board[i].r===r) return board[i];
    return null;
  }

  function neighbors(tile){
    const out=[];
    for (const [dq,dr] of NEI) {
      const t = findTile(tile.q + dq, tile.r + dr);
      if (t) out.push(t);
    }
    return out;
  }

  function hasAdjacentOwned(tile, owner){
    const ns = neighbors(tile);
    for (let i=0;i<ns.length;i++) if (ns[i].owner===owner) return true;
    return false;
  }

  function captureCost(tile, who){
    if (tile.owner === who) return 99;
    if (tile.owner === 0) return 1;
    let c = 2;
    if (who === 1 && upgrades.siege > 0 && !siegeUsed) c -= 1;
    return Math.max(1,c);
  }

  function countOwner(owner){
    let c=0;
    for (let i=0;i<board.length;i++) if (board[i].owner===owner) c++;
    return c;
  }

  function spawnBurst(x,y,color){
    for(let i=0;i<11;i++){
      const a = Math.random()*Math.PI*2;
      const sp = 0.8 + Math.random()*2.5;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,size:2+Math.random()*3});
    }
  }

  function beginRound(nextRound){
    round = nextRound;
    boardRadius = Math.min(6, 3 + Math.floor((round-1)/2));
    makeBoard(boardRadius);
    playerTurn = true;
    siegeUsed = false;
    maxAP = 3 + upgrades.logistics;
    playerAP = maxAP;
    selectedKey = null;
    showToast(T('round') + ' ' + round);
    refreshUI();
  }

  function startNewRun(){
    round = 1;
    score = 0;
    playerTurn = true;
    beginRound(1);
    state = STATE.play;
    overlay.style.display = 'none';
    refreshUI();
  }

  function renderTitle(){
    overlay.style.display = 'flex';
    overlayCard.innerHTML = `
      <h1>${T('gameTitle')}</h1>
      <p>${T('gameSub')}</p>
      <p>${T('tutorial1')}<br>${T('tutorial2')}</p>
      <div class="stats-grid">
        <div class="mini">${T('bestRound')}<b>${bestRound}</b></div>
        <div class="mini">${T('totalWins')}<b>${totalWins}</b></div>
      </div>
      <p style="font-size:12px;opacity:.85">${T('howTo')}</p>
      <button class="btn" id="startBtn" style="width:100%;margin-top:8px">${T('tapStart')}</button>
    `;
    document.getElementById('startBtn').onclick = () => {
      sfx('ok'); haptic('medium'); startNewRun();
    };
  }

  function renderGameOver(){
    overlay.style.display = 'flex';
    overlayCard.innerHTML = `
      <h1>${T('loseGame')}</h1>
      <div class="stats-grid">
        <div class="mini">${T('finalScore')}<b>${Math.floor(score)}</b></div>
        <div class="mini">${T('bestRound')}<b>${bestRound}</b></div>
      </div>
      <button class="btn" id="retryBtn" style="width:100%">${T('retry')}</button>
    `;
    document.getElementById('retryBtn').onclick = () => {
      sfx('ok'); haptic('light'); renderTitle(); state = STATE.title;
    };
  }

  function refreshUI(){
    vRound.textContent = T('round') + ' ' + round;
    vScore.textContent = T('score') + ' ' + Math.floor(score);
    vBest.textContent = T('bestRound') + ' ' + bestRound;
    vAp.textContent = T('ap') + ' ' + playerAP + '/' + maxAP;
    vTerritory.textContent = T('you') + ' ' + countOwner(1) + ' · ' + T('ai') + ' ' + countOwner(2);
    vTurns.textContent = playerTurn ? T('yourTurn') : T('aiTurn');

    const canPress = state === STATE.play && playerTurn;
    btnEndTurn.disabled = !canPress;

    const cLog = 2 + upgrades.logistics * 2;
    btnLogi.textContent = upgrades.logistics >= 8 ? T('maxed') : `${T('buy')} (${cLog})`;
    btnLogi.disabled = upgrades.logistics >= 8 || techPoints < cLog || state !== STATE.play;

    const cSiege = 3 + upgrades.siege * 2;
    btnSiege.textContent = upgrades.siege >= 6 ? T('maxed') : `${T('buy')} (${cSiege})`;
    btnSiege.disabled = upgrades.siege >= 6 || techPoints < cSiege || state !== STATE.play;

    document.getElementById('uLogiDesc').textContent = `${T('logisticsDesc')} · Lv.${upgrades.logistics}`;
    document.getElementById('uSiegeDesc').textContent = `${T('siegeDesc')} · Lv.${upgrades.siege}`;
  }

  function showToast(msg){
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.style.opacity = '0', 1200);
  }

  function evaluateRound(){
    const p = countOwner(1);
    const a = countOwner(2);
    const total = board.length;
    const neutral = total - p - a;

    if (p <= 0) {
      state = STATE.gameover;
      sfx('over');
      haptic('heavy');
      save();
      submitScore(Math.floor(score));
      renderGameOver();
      refreshUI();
      return;
    }

    if (neutral === 0 || p > total * 0.52 || a <= 0) {
      const reward = Math.max(2, Math.floor(p / 4));
      techPoints += reward;
      totalWins += 1;
      bestRound = Math.max(bestRound, round + 1);
      score += p * 100 + round * 500 + playerAP * 50;
      showToast(`${T('winRound')} +${reward} ${T('points')}`);
      sfx('ok');
      haptic('medium');
      save();
      beginRound(round + 1);
      return;
    }

    refreshUI();
  }

  function endPlayerTurn(){
    if (state !== STATE.play || !playerTurn) return;
    playerTurn = false;
    refreshUI();

    const aiMax = 2 + Math.floor(round / 2);
    let aiAP = aiMax;

    const aiStep = () => {
      if (state !== STATE.play) return;
      if (aiAP <= 0) {
        playerTurn = true;
        maxAP = 3 + upgrades.logistics;
        playerAP = maxAP;
        siegeUsed = false;
        evaluateRound();
        return;
      }

      const targets = [];
      for (const t of board) {
        if (t.owner === 2) continue;
        if (!hasAdjacentOwned(t, 2)) continue;
        const cost = (t.owner === 1 ? 2 : 1);
        if (cost <= aiAP) targets.push({ t, cost, prio: t.owner === 1 ? 10 : 3 });
      }

      if (!targets.length) {
        aiAP = 0;
        aiStep();
        return;
      }

      targets.sort((x,y)=> y.prio - x.prio || Math.random() - 0.5);
      const pick = targets[0];
      pick.t.owner = 2;
      pick.t.pulse = 1;
      aiAP -= pick.cost;

      const pt = axialToPixel(pick.t.q, pick.t.r);
      spawnBurst(pt.x, pt.y, '#ff4fb4');
      score = Math.max(0, score - 25 * pick.cost);
      refreshUI();
      setTimeout(aiStep, 190);
    };

    setTimeout(aiStep, 220);
  }

  function tryCapture(tile){
    if (state !== STATE.play || !playerTurn) return;
    if (!tile || tile.owner === 1) return;

    if (!hasAdjacentOwned(tile, 1)) {
      showToast(T('needAdj'));
      sfx('bad');
      return;
    }

    const cost = captureCost(tile, 1);
    if (playerAP < cost) {
      showToast(T('noAp'));
      sfx('bad');
      return;
    }

    playerAP -= cost;
    if (tile.owner === 2 && upgrades.siege > 0 && !siegeUsed) siegeUsed = true;
    tile.owner = 1;
    tile.pulse = 1;
    score += 90 + round * 8;

    const pxy = axialToPixel(tile.q, tile.r);
    spawnBurst(pxy.x, pxy.y, '#4de9ff');
    sfx('tap');
    haptic('light');
    evaluateRound();

    if (state === STATE.play && playerAP <= 0) {
      endPlayerTurn();
    }
  }

  function upgrade(kind){
    if (state !== STATE.play) return;
    if (kind === 'logistics') {
      const cost = 2 + upgrades.logistics * 2;
      if (upgrades.logistics >= 8 || techPoints < cost) return showToast(T('upgradeFail'));
      techPoints -= cost;
      upgrades.logistics += 1;
      maxAP = 3 + upgrades.logistics;
      playerAP = Math.min(maxAP, playerAP + 1);
    } else {
      const cost = 3 + upgrades.siege * 2;
      if (upgrades.siege >= 6 || techPoints < cost) return showToast(T('upgradeFail'));
      techPoints -= cost;
      upgrades.siege += 1;
    }
    sfx('ok');
    haptic('soft');
    save();
    refreshUI();
  }

  function axialToPixel(q,r){
    const size = Math.min(W, H) * 0.062;
    const x = W * 0.5 + size * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r);
    const y = H * 0.56 + size * (1.5 * r);
    return {x,y,size};
  }

  function pixelToHex(px,py){
    const size = Math.min(W, H) * 0.062;
    const q = ((Math.sqrt(3)/3 * (px - W*0.5)) - (1/3 * (py - H*0.56))) / size;
    const r = (2/3 * (py - H*0.56)) / size;
    return hexRound(q, r);
  }

  function hexRound(q,r){
    let x=q, z=r, y=-x-z;
    let rx=Math.round(x), ry=Math.round(y), rz=Math.round(z);
    const dx=Math.abs(rx-x), dy=Math.abs(ry-y), dz=Math.abs(rz-z);
    if (dx>dy && dx>dz) rx=-ry-rz;
    else if (dy>dz) ry=-rx-rz;
    else rz=-rx-ry;
    return {q:rx,r:rz};
  }

  function drawHex(x,y,size,fill,stroke,w=1.5){
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a = Math.PI/180 * (60*i - 30);
      const px = x + size * Math.cos(a);
      const py = y + size * Math.sin(a);
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.lineWidth = w;
    ctx.strokeStyle = stroke;
    ctx.stroke();
  }

  function drawBoard(){
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0a0b18');
    grad.addColorStop(1,'#121a33');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    for (let i=0;i<board.length;i++) {
      const t = board[i];
      const p = axialToPixel(t.q, t.r);
      const selected = selectedKey === qrsKey(t.q,t.r);
      const canGrab = state===STATE.play && playerTurn && t.owner!==1 && hasAdjacentOwned(t,1);

      let fill = '#1a2340';
      let stroke = 'rgba(120,160,230,.36)';
      if (t.owner === 1) {
        fill = 'rgba(48,212,255,.28)';
        stroke = '#5ce8ff';
      } else if (t.owner === 2) {
        fill = 'rgba(255,78,176,.25)';
        stroke = '#ff6fcb';
      }
      if (canGrab && t.owner===0) {
        fill = 'rgba(138,169,255,.25)';
      }

      const pulseScale = 1 + t.pulse * 0.15;
      const size = p.size * (selected ? 1.08 : pulseScale);
      drawHex(p.x,p.y,size,fill,stroke, selected ? 2.8 : 1.5);

      if (canGrab && state===STATE.play && playerTurn) {
        ctx.fillStyle = 'rgba(255,255,255,.86)';
        ctx.font = `${Math.max(10, p.size*0.5)}px system-ui`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const c = captureCost(t,1);
        ctx.fillText(String(c), p.x, p.y+1);
      }

      t.pulse *= 0.88;
      if (t.pulse < 0.03) t.pulse = 0;
    }

    for (let i=particles.length-1;i>=0;i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.life -= 0.025;
      if (p.life <= 0) { particles.splice(i,1); continue; }
      ctx.globalAlpha = Math.max(0,p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.restore();

    ctx.fillStyle = 'rgba(228,236,255,.88)';
    ctx.font = '12px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(`${T('points')}: ${techPoints}`, 14, 122);
  }

  function tick(ts){
    requestAnimationFrame(tick);
    const dt = Math.min(0.032, (ts - animT) / 1000 || 0.016);
    animT = ts;
    if (state === STATE.play) score += dt * 1.8;
    drawBoard();
  }

  function onPointer(e){
    if (state !== STATE.play || !playerTurn) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || (e.touches && e.touches[0]?.clientX) || 0) - rect.left;
    const y = (e.clientY || (e.touches && e.touches[0]?.clientY) || 0) - rect.top;

    const h = pixelToHex(x,y);
    const tile = findTile(h.q,h.r);
    if (!tile) return;

    selectedKey = qrsKey(tile.q, tile.r);
    tryCapture(tile);
    refreshUI();
  }

  function resize(){
    DPR = window.devicePixelRatio || 1;
    W = Math.max(320, window.innerWidth);
    H = Math.max(500, window.innerHeight);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    refreshUI();
  }

  function submitScore(v){
    try {
      if (window.Leaderboard && window.Leaderboard.submitScore) {
        window.Leaderboard.submitScore('hex-empire', v);
      }
    } catch(e){}
  }

  // Inputs
  canvas.addEventListener('pointerdown', onPointer);
  canvas.addEventListener('touchstart', onPointer, { passive: true });
  btnEndTurn.addEventListener('click', () => { sfx('tap'); endPlayerTurn(); });
  btnReset.addEventListener('click', () => { state = STATE.title; renderTitle(); });
  btnLogi.addEventListener('click', () => upgrade('logistics'));
  btnSiege.addEventListener('click', () => upgrade('siege'));

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') endPlayerTurn();
    if (e.key.toLowerCase() === 'r') {
      if (state === STATE.play) { state = STATE.title; renderTitle(); }
      else if (state === STATE.gameover) { renderTitle(); state = STATE.title; }
    }
  });

  window.addEventListener('resize', resize);

  load();
  resize();
  renderTitle();
  requestAnimationFrame(tick);
})();
</script>
<script src="/games/cross-promo.js"></script>
<script src="../shared/leaderboard.js"></script>
</body>
</html>
