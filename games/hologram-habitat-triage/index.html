<html lang="ko">
<head>
  <meta charset="UTF-8" />
<meta name="google-adsense-account" content="ca-pub-7252382819928130">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7252382819928130" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="theme-color" content="#0a0a1a" />
  <title>Hologram Habitat Triage</title>
<meta name="description" content="Play Hologram Habitat Triage - Free HTML5 browser game on eastsea.monster. No download required.">
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #13132d;
      --text: #eaf0ff;
      --muted: #9ea6c8;
      --cyan: #68efff;
      --magenta: #ff66dd;
      --ok: #65ffad;
      --warn: #ffd56d;
      --danger: #ff6f96;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1d1d4c 0%, var(--bg) 50%, #05050f 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 14px;
    }
    .app {
      width: min(100%, 980px);
      background: rgba(12, 14, 32, 0.95);
      border: 1px solid rgba(104,239,255,0.28);
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(104,239,255,0.17);
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    h1 { margin: 0; font-size: clamp(1.1rem, 2.8vw, 1.7rem); }
    .sub { margin: 3px 0 0; color: var(--muted); font-size: 0.9rem; }
    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .pill {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      text-align: center;
      padding: 8px;
      font-size: 0.85rem;
    }
    .pill b { color: var(--cyan); font-size: 1rem; }

    .modules {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .module {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 13px;
      padding: 10px;
      background: linear-gradient(160deg, rgba(20,20,48,0.9), rgba(9,9,24,0.9));
    }
    .module.active {
      border-color: var(--magenta);
      box-shadow: 0 0 14px rgba(255,102,221,0.45);
    }
    .m-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .m-title b { color: var(--cyan); }
    .bar {
      position: relative;
      height: 10px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      margin-bottom: 7px;
    }
    .fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, #5effbe, #5ddfff);
    }
    .fill.heat { background: linear-gradient(90deg, #ffd56d, #ff7d6f); }
    .fill.stress { background: linear-gradient(90deg, #b78dff, #ff6f96); }
    .small { font-size: 0.8rem; color: var(--muted); margin-bottom: 2px; }

    .actions {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 8px;
      font-weight: 700;
      color: #021018;
      background: linear-gradient(120deg, #68efff, #b38cff);
      cursor: pointer;
    }
    button:active { transform: scale(0.98); }
    .action { background: linear-gradient(120deg, #64ffc5, #68d7ff); }
    #msg { color: var(--muted); font-size: 0.9rem; }
    .danger { color: var(--danger); font-weight: 700; }
    .ok { color: var(--ok); font-weight: 700; }

    @media (max-width: 760px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .modules { grid-template-columns: 1fr; }
      .actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>🏙️ Hologram Habitat Triage</h1>
      <p class="sub">4개 모듈을 순환 관리해 붕괴를 막으세요. 키보드: 1~4 선택, Q/W/E 조치, Space 긴급 안정화.</p>
    </header>

    <section class="hud">
      <div class="pill">Integrity<br><b id="integrity">100</b></div>
      <div class="pill">Energy<br><b id="energy">100</b></div>
      <div class="pill">Score<br><b id="score">0</b></div>
      <div class="pill">Best<br><b id="best">0</b></div>
    </section>

    <section id="modules" class="modules"></section>

    <section class="actions">
      <button id="startBtn">Start / Restart</button>
      <button class="action" id="ventBtn">Q Vent</button>
      <button class="action" id="oxyBtn">W Oxygen</button>
      <button class="action" id="calmBtn">E Calm</button>
      <button id="muteBtn">Sound: ON</button>
      <button id="mod1Btn">Module 1</button>
      <button id="mod2Btn">Module 2</button>
      <button id="mod3Btn">Module 3</button>
      <button id="mod4Btn">Module 4</button>
      <button id="stabilizeBtn">Space Stabilize</button>
    </section>

    <div id="msg">Ready. Start를 눌러 triage cycle을 시작하세요.</div>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = 'hologram-habitat-triage-best';
      const modulesEl = document.getElementById('modules');
      const integrityEl = document.getElementById('integrity');
      const energyEl = document.getElementById('energy');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const msgEl = document.getElementById('msg');
      const muteBtn = document.getElementById('muteBtn');

      let modules = [];
      let selected = 0;
      let integrity = 100;
      let energy = 100;
      let score = 0;
      let running = false;
      let lastTime = 0;
      let muted = false;
      let audioCtx = null;
      bestEl.textContent = String(Number(localStorage.getItem(STORAGE_KEY) || 0));

      function initAudio() {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx = new Ctx();
        }
      }
      function beep(freq = 440, dur = 0.08, type = 'sine', gain = 0.05) {
        if (muted) return;
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.value = gain;
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.stop(audioCtx.currentTime + dur);
      }

      function newModule(name) {
        return {
          name,
          oxygen: 50 + Math.random() * 35,
          heat: 25 + Math.random() * 35,
          stress: 15 + Math.random() * 35,
          trend: Math.random() * Math.PI * 2
        };
      }

      function reset() {
        modules = ['AURORA', 'DELTA', 'NOVA', 'ORBIT'].map(newModule);
        selected = 0;
        integrity = 100;
        energy = 100;
        score = 0;
        running = true;
        msgEl.textContent = 'Triage started. 위험 모듈을 우선 안정화하세요.';
        beep(520, 0.08, 'triangle', 0.05);
        render();
      }

      function clamp(v, lo = 0, hi = 100) { return Math.max(lo, Math.min(hi, v)); }

      function actionVent() {
        if (!running || energy < 12) return;
        const m = modules[selected];
        m.heat = clamp(m.heat - 23);
        m.stress = clamp(m.stress - 8);
        energy -= 12;
        beep(760, 0.08, 'square', 0.05);
        msgEl.textContent = `${m.name} Vent 성공`;
        render();
      }

      function actionOxygen() {
        if (!running || energy < 14) return;
        const m = modules[selected];
        m.oxygen = clamp(m.oxygen + 30);
        m.heat = clamp(m.heat + 6);
        energy -= 14;
        beep(880, 0.09, 'triangle', 0.06);
        msgEl.textContent = `${m.name} Oxygen 주입`;
        render();
      }

      function actionCalm() {
        if (!running || energy < 10) return;
        const m = modules[selected];
        m.stress = clamp(m.stress - 26);
        m.oxygen = clamp(m.oxygen - 3);
        energy -= 10;
        beep(680, 0.08, 'sine', 0.05);
        msgEl.textContent = `${m.name} Calm 필드 적용`;
        render();
      }

      function actionStabilize() {
        if (!running || energy < 28) return;
        modules.forEach((m) => {
          m.oxygen = clamp(m.oxygen + 10);
          m.heat = clamp(m.heat - 10);
          m.stress = clamp(m.stress - 10);
        });
        energy -= 28;
        beep(1020, 0.12, 'sawtooth', 0.06);
        msgEl.textContent = '긴급 안정화 완료';
        render();
      }

      function hazardState(m) {
        const danger = m.oxygen < 20 || m.heat > 80 || m.stress > 80;
        const critical = m.oxygen < 8 || m.heat > 95 || m.stress > 95;
        return { danger, critical };
      }

      function tick(dt) {
        modules.forEach((m, i) => {
          m.trend += dt * (0.8 + i * 0.05);
          m.oxygen = clamp(m.oxygen - dt * (4.8 + Math.sin(m.trend) * 1.5));
          m.heat = clamp(m.heat + dt * (4.3 + Math.cos(m.trend * 1.2) * 1.8));
          m.stress = clamp(m.stress + dt * (3.8 + Math.sin(m.trend * 1.6) * 1.6));
        });

        let leak = 0;
        modules.forEach((m) => {
          const hz = hazardState(m);
          if (hz.danger) leak += 3.2;
          if (hz.critical) leak += 8.5;
        });

        integrity = clamp(integrity - leak * dt, 0, 100);
        energy = clamp(energy + dt * 9.5, 0, 100);
        score += dt * (10 + integrity * 0.08);

        if (integrity <= 0) {
          running = false;
          beep(170, 0.26, 'sawtooth', 0.08);
          const now = Math.floor(score);
          const prev = Number(localStorage.getItem(STORAGE_KEY) || 0);
          if (now > prev) {
            localStorage.setItem(STORAGE_KEY, String(now));
            bestEl.textContent = String(now);
            msgEl.innerHTML = `<span class="ok">New best ${now}.</span> Restart로 추가 갱신 가능.`;
          } else {
            msgEl.innerHTML = '<span class="danger">Habitat collapse.</span> Restart로 다시 시도하세요.';
          }
        }
      }

      function bar(name, value, cls = '') {
        return `<div class="small">${name}: ${Math.round(value)}</div><div class="bar"><div class="fill ${cls}" style="width:${value}%"></div></div>`;
      }

      function render() {
        integrityEl.textContent = Math.round(integrity).toString();
        energyEl.textContent = Math.round(energy).toString();
        scoreEl.textContent = Math.floor(score).toString();

        modulesEl.innerHTML = modules.map((m, i) => {
          const hz = hazardState(m);
          const state = hz.critical ? 'CRITICAL' : hz.danger ? 'DANGER' : 'STABLE';
          const stateColor = hz.critical ? 'var(--danger)' : hz.danger ? 'var(--warn)' : 'var(--ok)';
          return `
          <article class="module ${i === selected ? 'active' : ''}" data-module="${i}">
            <div class="m-title"><b>${m.name}</b><span style="color:${stateColor};font-size:.8rem;font-weight:700">${state}</span></div>
            ${bar('Oxygen', m.oxygen)}
            ${bar('Heat', m.heat, 'heat')}
            ${bar('Stress', m.stress, 'stress')}
          </article>`;
        }).join('');

        modulesEl.querySelectorAll('[data-module]').forEach((el) => {
          const pickModule = () => {
            selected = Number(el.dataset.module);
            beep(380 + selected * 60, 0.05, 'triangle', 0.04);
            render();
          };
          el.addEventListener('click', pickModule);
          el.addEventListener('touchstart', (e) => {
            e.preventDefault();
            pickModule();
          }, { passive: false });
        });
      }

      function loop(ts) {
        if (!lastTime) lastTime = ts;
        const dt = Math.min(0.05, (ts - lastTime) / 1000);
        lastTime = ts;
        if (running) {
          tick(dt);
          render();
        }
        requestAnimationFrame(loop);
      }

      document.getElementById('startBtn').addEventListener('click', reset);
      document.getElementById('ventBtn').addEventListener('click', actionVent);
      document.getElementById('oxyBtn').addEventListener('click', actionOxygen);
      document.getElementById('calmBtn').addEventListener('click', actionCalm);
      document.getElementById('stabilizeBtn').addEventListener('click', actionStabilize);
      document.getElementById('mod1Btn').addEventListener('click', () => { selected = 0; render(); });
      document.getElementById('mod2Btn').addEventListener('click', () => { selected = 1; render(); });
      document.getElementById('mod3Btn').addEventListener('click', () => { selected = 2; render(); });
      document.getElementById('mod4Btn').addEventListener('click', () => { selected = 3; render(); });
      muteBtn.addEventListener('click', () => {
        muted = !muted;
        muteBtn.textContent = `Sound: ${muted ? 'OFF' : 'ON'}`;
      });

      [
        'startBtn','ventBtn','oxyBtn','calmBtn','stabilizeBtn',
        'mod1Btn','mod2Btn','mod3Btn','mod4Btn','muteBtn'
      ].forEach((id) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => {
          e.preventDefault();
          el.click();
        }, { passive: false });
      });

      window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === '1') { selected = 0; render(); }
        else if (key === '2') { selected = 1; render(); }
        else if (key === '3') { selected = 2; render(); }
        else if (key === '4') { selected = 3; render(); }
        else if (key === 'q') { actionVent(); }
        else if (key === 'w') { actionOxygen(); }
        else if (key === 'e') { actionCalm(); }
        else if (key === ' ' || key === 'enter') { e.preventDefault(); actionStabilize(); }
        else if (key === 'r') { reset(); }
      }, { passive: false });

      modules = ['AURORA', 'DELTA', 'NOVA', 'ORBIT'].map(newModule);
      render();
      requestAnimationFrame(loop);
    })();
  </script>
