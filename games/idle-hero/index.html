<script>
(function(){
'use strict';
const I18N={
ko:{atk:'공격력',hp:'체력',speed:'속도',crit:'크리티컬',gold:'골드 보너스',upgrade:'강화',maxLvl:'MAX',stage:'스테이지',defeated:'처치!',heroDied:'영웅이 쓰러졌습니다...',revive:'부활 (3초)'},
en:{atk:'Attack',hp:'HP',speed:'Speed',crit:'Critical',gold:'Gold Bonus',upgrade:'Upgrade',maxLvl:'MAX',stage:'Stage',defeated:'Defeated!',heroDied:'Hero has fallen...',revive:'Reviving (3s)'},
ja:{atk:'攻撃',hp:'HP',speed:'速度',crit:'クリティカル',gold:'ゴールドボーナス',upgrade:'強化',maxLvl:'MAX',stage:'ステージ',defeated:'撃破！',heroDied:'ヒーローが倒れた…',revive:'復活中 (3秒)'}
};
const ulang=(window.TG?.getLang?.()||'en').slice(0,2);
const lang=['ko','ja'].includes(ulang)?ulang:'en';
const t=k=>I18N[lang]?.[k]||I18N.en[k]||k;

const ENEMIES=[
{name:'Slime',img:'assets/enemies/enemy_1.png',hpMult:1,atkMult:0.5,goldDrop:5},
{name:'Goblin',img:'assets/enemies/enemy_2.png',hpMult:1.5,atkMult:0.8,goldDrop:8},
{name:'Skeleton',img:'assets/enemies/enemy_3.png',hpMult:2,atkMult:1,goldDrop:12},
{name:'Orc',img:'assets/enemies/enemy_4.png',hpMult:3,atkMult:1.2,goldDrop:20},
{name:'Dragon',img:'assets/enemies/enemy_5.png',hpMult:5,atkMult:2,goldDrop:50},
{name:'Demon',img:'assets/enemies/enemy_6.png',hpMult:8,atkMult:2.5,goldDrop:80},
{name:'Reaper',img:'assets/enemies/enemy_7.png',hpMult:12,atkMult:3,goldDrop:120},
{name:'Titan',img:'assets/enemies/enemy_8.png',hpMult:20,atkMult:4,goldDrop:200}
];

let hero={level:1,atk:10,maxHp:100,hp:100,speed:1,crit:0.05,goldBonus:1};
let upgrades={atk:0,hp:0,speed:0,crit:0,gold:0};
let gold=0,gems=0,stage=1,wave=1,maxStage=1;
let enemy=null,battleInterval=null,enemyAttackTimeout=null,logLines=[];
let activeTab='upgrades';
let paywallUnlocked=!window.TG?.isTelegram?.();
let paywallInitDone=false;

async function setupPaywall(){
if(paywallInitDone)return;
paywallInitDone=true;
if(!window.Paywall){paywallUnlocked=true;return;}
paywallUnlocked=await window.Paywall.init('idle-hero');
window.addEventListener('gameUnlocked',()=>{
paywallUnlocked=true;
addLog('🌟 풀버전 해금 완료!');
});
if(!paywallUnlocked&&stage>5){
stage=5;wave=1;
spawnEnemy();updateUI();save();
}
}

function showIdleHeroPaywall(){
if(!window.Paywall||paywallUnlocked)return;
window.Paywall.show({
title:'⚔️ Idle Hero 풀버전 해금',
message:'스테이지 6부터는 풀버전에서 도전할 수 있어요!',
stars:49,
features:[
'스테이지 6+ 무한 돌파',
'고급 적/보스와 보상',
'성장 로그와 기록 확장',
'장기 플레이 밸런스 전체 해금'
]
});
}

function save(){
const data={hero,upgrades,gold,gems,stage,wave,maxStage};
window.TG?.save?.('ih_data',data);
}
function load(){
const d=window.TG?.load?.('ih_data',null);
if(d){hero=d.hero;upgrades=d.upgrades;gold=d.gold||0;gems=d.gems||0;stage=d.stage||1;wave=d.wave||1;maxStage=d.maxStage||1;
// Offline earnings
}
}
async function init(){
load();await setupPaywall();recalcStats();updateUI();spawnEnemy();startBattle();
document.querySelectorAll('.tab').forEach(tab=>{
tab.addEventListener('click',()=>{
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
tab.classList.add('active');activeTab=tab.dataset.tab;renderPanel();
});
});
renderPanel();
setInterval(save,5000);
}
function recalcStats(){
hero.atk=10+upgrades.atk*5+hero.level*2;
hero.maxHp=100+upgrades.hp*20+hero.level*10;
hero.speed=1+upgrades.speed*0.1;
hero.crit=0.05+upgrades.crit*0.03;
hero.goldBonus=1+upgrades.gold*0.2;
}
function updateUI(){
document.getElementById('vGold').textContent=formatNum(gold);
document.getElementById('vGems').textContent=gems;
document.getElementById('stageInfo').textContent=`${t('stage')} ${stage}-${wave}`;
document.getElementById('heroName').textContent=`Hero Lv.${hero.level}`;
document.getElementById('heroHp').style.width=`${Math.max(0,hero.hp/hero.maxHp*100)}%`;
if(enemy){
document.getElementById('enemyHp').style.width=`${Math.max(0,enemy.hp/enemy.maxHp*100)}%`;
}
if(activeTab==='upgrades')syncUpgradeButtons();
}
function syncUpgradeButtons(){
document.querySelectorAll('.upgrade-btn').forEach(btn=>{
const cost=parseInt(btn.dataset.cost,10);
btn.disabled=Number.isNaN(cost)||gold<cost;
});
}
function formatNum(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toString()}
function spawnEnemy(){
const template=ENEMIES[Math.min(Math.floor((stage-1)/3),ENEMIES.length-1)];
const mult=1+stage*0.3+wave*0.1;
enemy={
name:template.name,img:template.img,
maxHp:Math.floor(template.hpMult*mult*50),
hp:Math.floor(template.hpMult*mult*50),
atk:Math.floor(template.atkMult*mult*5),
goldDrop:Math.floor(template.goldDrop*mult*hero.goldBonus)
};
const imgEl=document.getElementById('enemyChar').querySelector('.char-img');
if(imgEl)imgEl.src=enemy.img;
document.getElementById('enemyName').textContent=`${enemy.name} Lv.${stage}`;
updateUI();
}
function startBattle(){
if(battleInterval)clearInterval(battleInterval);
if(enemyAttackTimeout){clearTimeout(enemyAttackTimeout);enemyAttackTimeout=null;}
battleInterval=setInterval(()=>{
if(!enemy||hero.hp<=0)return;
// Hero attacks
const isCrit=Math.random()<hero.crit;
let dmg=hero.atk*(isCrit?2:1);
dmg=Math.floor(dmg*(0.9+Math.random()*0.2));
enemy.hp-=dmg;
showDmg(dmg,isCrit,true);
document.getElementById('heroChar').classList.add('attacking');
setTimeout(()=>document.getElementById('heroChar').classList.remove('attacking'),300);
if(enemy.hp<=0){
enemyDefeated();return;
}
// Enemy attacks back
const attackEnemy=enemy;
enemyAttackTimeout=setTimeout(()=>{
if(!enemy||hero.hp<=0||enemy!==attackEnemy)return;
let eDmg=Math.floor(enemy.atk*(0.9+Math.random()*0.2));
hero.hp-=eDmg;
showDmg(eDmg,false,false);
document.getElementById('enemyChar').classList.add('attacking');
setTimeout(()=>document.getElementById('enemyChar').classList.remove('attacking'),300);
if(hero.hp<=0){heroDied()}
updateUI();
},500);
updateUI();
},Math.max(400,1200-hero.speed*100));
}
function showDmg(val,crit,isHero){
const area=document.getElementById('battleArea');
const el=document.createElement('div');
el.className='dmg-text';
el.textContent=(crit?'💥 ':'')+val;
el.style.color=isHero?(crit?'#ffd700':'#50c878'):'#e94560';
el.style.left=isHero?'65%':'25%';
el.style.top='30%';
area.appendChild(el);setTimeout(()=>el.remove(),800);
}
function enemyDefeated(){
if(enemyAttackTimeout){clearTimeout(enemyAttackTimeout);enemyAttackTimeout=null;}
gold+=enemy.goldDrop;
hero.level+=Math.random()>0.8?1:0;
addLog(`${enemy.name} ${t('defeated')} +${enemy.goldDrop}💰`);
wave++;
if(wave>3){
wave=1;
if(stage>=5&&!paywallUnlocked){
showIdleHeroPaywall();
addLog('🔒 Stage 6부터는 풀버전 해금이 필요합니다');
}else{
stage++;
if(stage>maxStage){maxStage=stage;gems+=1}
}
}
recalcStats();hero.hp=Math.min(hero.hp+hero.maxHp*0.3,hero.maxHp);
spawnEnemy();updateUI();
window.TG?.haptic?.('impact','light');
if(window.GameScore)GameScore.save('idle-hero',stage*1000+gold);
}
function heroDied(){
addLog(t('heroDied'));
window.TG?.haptic?.('notification','error');
clearInterval(battleInterval);
if(enemyAttackTimeout){clearTimeout(enemyAttackTimeout);enemyAttackTimeout=null;}
setTimeout(()=>{
hero.hp=hero.maxHp;wave=1;
updateUI();spawnEnemy();startBattle();
addLog(t('revive'));
},3000);
}
function addLog(msg){logLines.unshift(`[${new Date().toLocaleTimeString().slice(0,5)}] ${msg}`);if(logLines.length>50)logLines.pop();if(activeTab==='log')renderPanel()}
function renderPanel(){
const panel=document.getElementById('panel');
if(activeTab==='upgrades'){
const stats=[
{key:'atk',icon:'⚔️',name:t('atk'),desc:`+5 per level`,cost:()=>Math.floor(20*(1.3**upgrades.atk))},
{key:'hp',icon:'❤️',name:t('hp'),desc:`+20 per level`,cost:()=>Math.floor(15*(1.3**upgrades.hp))},
{key:'speed',icon:'💨',name:t('speed'),desc:`+0.1 per level`,cost:()=>Math.floor(30*(1.4**upgrades.speed))},
{key:'crit',icon:'💥',name:t('crit'),desc:`+3% per level`,cost:()=>Math.floor(40*(1.5**upgrades.crit))},
{key:'gold',icon:'💰',name:t('gold'),desc:`+20% per level`,cost:()=>Math.floor(25*(1.4**upgrades.gold))}
];
panel.innerHTML=stats.map(s=>{
const c=s.cost();
return`<div class="upgrade-row"><div class="upgrade-info"><div class="upgrade-name">${s.icon} ${s.name} <span style="color:#ffd700">Lv.${upgrades[s.key]}</span></div><div class="upgrade-desc">${s.desc}</div></div><button class="upgrade-btn" data-key="${s.key}" data-cost="${c}" ${gold<c?'disabled':''}>${c}💰</button></div>`;
}).join('');
panel.querySelectorAll('.upgrade-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
const key=btn.dataset.key;const cost=parseInt(btn.dataset.cost);
if(gold>=cost){gold-=cost;upgrades[key]++;recalcStats();if(key==='speed')startBattle();updateUI();renderPanel();window.TG?.haptic?.('impact','light');save()}
});
});
}else if(activeTab==='skills'){
panel.innerHTML='<div style="text-align:center;padding:40px;opacity:0.5">🔮 스킬 — 곧 업데이트!</div>';
}else{
panel.innerHTML=`<div class="log">${logLines.join('<br>')}</div>`;
}
}
init();
})();
</script>

    <div id="leaderboard" data-lb-slug="idle-hero" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "idle-hero";
      const CANDIDATE_OBJECTS = ["I18N", "hero", "upgrades"];
      const END_METHODS = ["gameOver", "endGame", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["init", "startGame", "newGame", "restart", "retry", "resetGame", "initGame", "start", "beginGame", "playAgain"];
      const SCORE_KEYS = ["gold", "wave", "level", "score", "points", "coins", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
