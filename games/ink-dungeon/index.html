<script>
// Prevent LittleJS from hijacking our canvas if it auto-inits
if (typeof engineInit === 'function') { try { window.engineCanvasSize = undefined; } catch(e){} }
// ===== Web Audio SFX =====
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, dur, vol=0.3) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur);
  } catch(e){}
}
function sfxShoot(){ playTone(440,'square',0.1,0.15); }
function sfxHit(){ playTone(200,'sawtooth',0.15,0.25); }
function sfxDie(){ playTone(100,'sawtooth',0.5,0.4); playTone(80,'square',0.5,0.3); }
function sfxUpgrade(){ playTone(523,'sine',0.1,0.2); setTimeout(()=>playTone(659,'sine',0.1,0.2),120); setTimeout(()=>playTone(784,'sine',0.2,0.3),240); }
function sfxWave(){ playTone(300,'triangle',0.05,0.2); setTimeout(()=>playTone(400,'triangle',0.08,0.3),80); }

// ===== Canvas Setup =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== Game State =====
let state = 'menu'; // menu, playing, upgrade, dead
let player, enemies, bullets, particles;
let wave, score, bestScore;
let keys = {};
let frameId;
let lastTime = 0;

// Joystick
let joyActive = false, joyId = -1;
let joyDx = 0, joyDy = 0;
const joyArea = document.getElementById('joystick-area');
const joyKnob = document.getElementById('joystick-knob');
const joyBase = document.getElementById('joystick-base');

// Touch detection
const isMobile = /Mobi|Android|iPhone|iPad/.test(navigator.userAgent) || window.innerWidth < 768;
if (isMobile) { joyArea.style.display = 'block'; }

bestScore = parseInt(localStorage.getItem('inkdungeon_best') || '0');
document.getElementById('best-display').textContent = bestScore;
document.getElementById('best-val').textContent = bestScore;

// ===== Player =====
class Player {
  constructor() {
    this.x = W / 2; this.y = H / 2;
    this.r = 16; this.hp = 100; this.maxHp = 100;
    this.speed = 180; this.atkSpeed = 1.2; this.atkTimer = 0;
    this.atkDmg = 18; this.piercing = false;
    this.invincible = 0;
    this.angle = 0;
  }
  update(dt) {
    let dx = 0, dy = 0;
    if (keys['w'] || keys['arrowup']) dy -= 1;
    if (keys['s'] || keys['arrowdown']) dy += 1;
    if (keys['a'] || keys['arrowleft']) dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;
    if (joyActive) { dx += joyDx; dy += joyDy; }
    const len = Math.sqrt(dx*dx+dy*dy);
    if (len > 0) { dx/=len; dy/=len; this.angle = Math.atan2(dy,dx); }
    this.x = Math.max(this.r, Math.min(W-this.r, this.x + dx*this.speed*dt));
    this.y = Math.max(this.r, Math.min(H-this.r, this.y + dy*this.speed*dt));

    this.atkTimer -= dt;
    if (this.atkTimer <= 0 && enemies.length > 0) {
      this.atkTimer = 1 / this.atkSpeed;
      // find nearest enemy
      let nearest = null, nd = Infinity;
      for (const e of enemies) {
        const d = Math.hypot(e.x - this.x, e.y - this.y);
        if (d < nd) { nd = d; nearest = e; }
      }
      if (nearest) {
        const a = Math.atan2(nearest.y - this.y, nearest.x - this.x);
        bullets.push(new Bullet(this.x, this.y, a, this.atkDmg, this.piercing, false));
        sfxShoot();
      }
    }
    if (this.invincible > 0) this.invincible -= dt;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    // ink wash character — brushstroke style
    ctx.fillStyle = '#1a1008';
    ctx.globalAlpha = this.invincible > 0 ? (Math.sin(Date.now()*0.02)>0?1:0.3) : 1;
    // body
    ctx.beginPath();
    ctx.ellipse(0, 0, this.r, this.r*1.1, 0, 0, Math.PI*2);
    ctx.fill();
    // head dot
    ctx.fillStyle = '#e8dfc8';
    ctx.beginPath();
    ctx.arc(this.r*0.4, -this.r*0.2, this.r*0.28, 0, Math.PI*2);
    ctx.fill();
    // brush stroke accent
    ctx.strokeStyle = '#3d2b1a';
    ctx.lineWidth = 2;
    ctx.globalAlpha *= 0.6;
    ctx.beginPath();
    ctx.moveTo(-this.r*0.8, -this.r*0.3);
    ctx.quadraticCurveTo(-this.r*0.2, -this.r*0.8, this.r*0.3, -this.r*0.5);
    ctx.stroke();
    ctx.restore();
    // HP bar
    const bw = 40, bh = 5;
    ctx.fillStyle = 'rgba(200,180,150,0.7)';
    ctx.fillRect(this.x - bw/2, this.y - this.r - 10, bw, bh);
    ctx.fillStyle = this.hp > 30 ? '#2d4a1e' : '#8b1a1a';
    ctx.fillRect(this.x - bw/2, this.y - this.r - 10, bw*(this.hp/this.maxHp), bh);
  }
  hurt(dmg) {
    if (this.invincible > 0) return;
    this.hp -= dmg;
    this.invincible = 0.8;
    sfxHit();
    for (let i=0;i<8;i++) particles.push(new Particle(this.x,this.y,'#8b1a1a'));
    if (this.hp <= 0) { this.hp = 0; endGame(); }
    document.getElementById('hp-val').textContent = Math.max(0,Math.round(this.hp));
  }
}

// ===== Enemy =====
let enemyId = 0;
class Enemy {
  constructor(x, y, tier) {
    this.id = enemyId++;
    this.x = x; this.y = y;
    this.tier = tier || 1;
    this.r = 10 + tier * 5;
    this.hp = (15 + tier * 20) * (1 + wave * 0.15);
    this.maxHp = this.hp;
    this.speed = 60 + tier * 10 + wave * 3;
    this.dmg = 8 + tier * 4;
    this.shootTimer = tier >= 3 ? (1.5 + Math.random()) : Infinity;
    this.shootInterval = 2 + Math.random();
    this.angle = 0;
    this.wobble = Math.random() * Math.PI * 2;
  }
  update(dt) {
    const a = Math.atan2(player.y - this.y, player.x - this.x);
    this.angle = a;
    this.wobble += dt * 2;
    this.x += Math.cos(a) * this.speed * dt;
    this.y += Math.sin(a) * this.speed * dt;
    if (this.shootTimer !== Infinity) {
      this.shootTimer -= dt;
      if (this.shootTimer <= 0) {
        this.shootTimer = this.shootInterval;
        bullets.push(new Bullet(this.x, this.y, a, this.dmg * 0.7, false, true));
      }
    }
    // collision with player
    if (Math.hypot(this.x - player.x, this.y - player.y) < this.r + player.r) {
      player.hurt(this.dmg * dt * 3);
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle + this.wobble * 0.1);
    const alpha = 0.7 + 0.3*(this.hp/this.maxHp);
    ctx.globalAlpha = alpha;
    if (this.tier === 1) {
      ctx.fillStyle = '#2d1f0e';
      ctx.beginPath();
      // star-like ink splatter
      for (let i=0;i<5;i++){
        const a = (i/5)*Math.PI*2 - Math.PI/2;
        const r = i%2===0 ? this.r : this.r*0.5;
        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      ctx.closePath(); ctx.fill();
    } else if (this.tier === 2) {
      ctx.fillStyle = '#1a1008';
      ctx.beginPath();
      ctx.arc(0, 0, this.r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#4a3020';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i=0;i<4;i++){
        const a2 = (i/4)*Math.PI*2;
        ctx.moveTo(0,0); ctx.lineTo(Math.cos(a2)*this.r,Math.sin(a2)*this.r);
      }
      ctx.stroke();
    } else {
      ctx.fillStyle = '#0d0a06';
      ctx.beginPath();
      ctx.rect(-this.r*0.8,-this.r*0.8,this.r*1.6,this.r*1.6);
      ctx.fill();
      ctx.strokeStyle = '#6b4c2a'; ctx.lineWidth=3;
      ctx.beginPath();
      ctx.arc(0,0,this.r*0.5,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
    // HP bar
    const bw = this.r*2.5, bh = 4;
    ctx.fillStyle = 'rgba(200,180,150,0.6)';
    ctx.fillRect(this.x-bw/2, this.y-this.r-8, bw, bh);
    ctx.fillStyle = '#2d4a1e';
    ctx.fillRect(this.x-bw/2, this.y-this.r-8, bw*(this.hp/this.maxHp), bh);
  }
  hit(dmg, piercing) {
    this.hp -= dmg;
    for (let i=0;i<5;i++) particles.push(new Particle(this.x,this.y,'#1a1008'));
    if (this.hp <= 0) {
      score += 10 + this.tier * 15;
      document.getElementById('score-val').textContent = score;
      for (let i=0;i<12;i++) particles.push(new Particle(this.x,this.y,'#2d1f0e'));
      return true; // dead
    }
    return false;
  }
}

// ===== Bullet =====
class Bullet {
  constructor(x, y, angle, dmg, piercing, isEnemy) {
    this.x = x; this.y = y; this.angle = angle;
    this.dmg = dmg; this.piercing = piercing;
    this.isEnemy = isEnemy;
    this.speed = isEnemy ? 180 : 320;
    this.r = isEnemy ? 5 : 4;
    this.life = 2;
    this.hit = new Set();
  }
  update(dt) {
    this.x += Math.cos(this.angle) * this.speed * dt;
    this.y += Math.sin(this.angle) * this.speed * dt;
    this.life -= dt;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.life = 0;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = 0.9;
    if (this.isEnemy) {
      ctx.fillStyle = '#8b1a1a';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#1a1008';
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.r*2, this.r, this.angle, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ===== Particle =====
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    this.vx = (Math.random()-0.5)*150;
    this.vy = (Math.random()-0.5)*150;
    this.life = 0.4 + Math.random()*0.4;
    this.maxLife = this.life;
    this.r = 2 + Math.random()*4;
  }
  update(dt) { this.x+=this.vx*dt; this.y+=this.vy*dt; this.life-=dt; this.vy+=60*dt; }
  draw() {
    ctx.globalAlpha = this.life/this.maxLife;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r*(this.life/this.maxLife), 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ===== Upgrade Pool =====
const UPGRADES = [
  { title:'연속 공격', desc:'공격 속도 +30%', apply:(p)=>{ p.atkSpeed *= 1.3; } },
  { title:'강철 붓', desc:'공격력 +25%', apply:(p)=>{ p.atkDmg *= 1.25; } },
  { title:'질주', desc:'이동 속도 +25%', apply:(p)=>{ p.speed *= 1.25; } },
  { title:'관통탄', desc:'탄환이 적을 관통', apply:(p)=>{ p.piercing = true; } },
  { title:'체력 회복', desc:'HP 최대치의 30% 회복', apply:(p)=>{ p.hp = Math.min(p.maxHp, p.hp + p.maxHp*0.3); } },
  { title:'강화 체력', desc:'최대 HP +40%', apply:(p)=>{ p.maxHp *= 1.4; p.hp = Math.min(p.maxHp, p.hp + p.maxHp*0.2); } },
  { title:'폭발탄', desc:'공격력 +40% (소비 특성)', apply:(p)=>{ p.atkDmg *= 1.4; } },
  { title:'분열탄', desc:'공격 속도 +50%, 속도 -10%', apply:(p)=>{ p.atkSpeed*=1.5; p.speed*=0.9; } },
  { title:'영기', desc:'공격 속도 +20%, 이동 속도 +20%', apply:(p)=>{ p.atkSpeed*=1.2; p.speed*=1.2; } },
];

function pickUpgrades() {
  const pool = [...UPGRADES];
  const chosen = [];
  while (chosen.length < 3 && pool.length > 0) {
    const i = Math.floor(Math.random() * pool.length);
    chosen.push(pool.splice(i, 1)[0]);
  }
  return chosen;
}

function showUpgrade() {
  state = 'upgrade';
  const ups = pickUpgrades();
  const panel = document.getElementById('upgradePanel');
  panel.style.display = 'flex';
  for (let i=0;i<3;i++) {
    const btn = document.getElementById('up'+i);
    btn.querySelector('.up-title').textContent = ups[i].title;
    btn.querySelector('.up-desc').textContent = ups[i].desc;
    btn.onclick = () => {
      ups[i].apply(player);
      sfxUpgrade();
      panel.style.display = 'none';
      state = 'playing';
      spawnWave();
    };
  }
}

// ===== Wave Logic =====
let enemiesLeft = 0;
function spawnWave() {
  wave++;
  document.getElementById('hud-wave').textContent = '웨이브: ' + wave;
  const count = 3 + wave * 2;
  enemiesLeft = count;
  enemies = [];
  sfxWave();
  const ann = document.getElementById('wave-announce');
  ann.textContent = 'WAVE ' + wave;
  ann.style.opacity = '1';
  setTimeout(()=>{ ann.style.opacity='0'; }, 1500);
  for (let i=0;i<count;i++) {
    setTimeout(()=>{
      if (state !== 'playing') return;
      const side = Math.floor(Math.random()*4);
      let x, y;
      if (side===0){x=Math.random()*W;y=-30;}
      else if(side===1){x=W+30;y=Math.random()*H;}
      else if(side===2){x=Math.random()*W;y=H+30;}
      else{x=-30;y=Math.random()*H;}
      const tier = Math.min(3, 1 + Math.floor(Math.random()*Math.min(wave/2,3)));
      enemies.push(new Enemy(x, y, tier));
    }, i * (600 - wave * 20));
  }
}

// ===== Init Game =====
function initGame() {
  player = new Player();
  enemies = []; bullets = []; particles = [];
  wave = 0; score = 0;
  document.getElementById('score-val').textContent = 0;
  document.getElementById('hp-val').textContent = player.hp;
  document.getElementById('hud-wave').textContent = 'WAVE 1';
  state = 'playing';
  spawnWave();
  if (!frameId) gameLoop(performance.now());
}

function endGame() {
  sfxDie();
  state = 'dead';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('inkdungeon_best', bestScore);
  }
  document.getElementById('best-val').textContent = bestScore;
  const ov = document.getElementById('overlay');
  ov.querySelector('h1').textContent = '쓰러졌습니다';
  ov.querySelector('p:nth-child(2)').textContent = '점수: ' + score;
  ov.querySelector('p:nth-child(3)').textContent = '최고: ' + bestScore;
  document.getElementById('best-display').textContent = bestScore;
  document.getElementById('startBtn').textContent = '다시 시작';
  ov.style.display = 'flex';
}

// ===== Ink Wash Background =====
let bgCanvas, bgCtx;
function buildBg() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  bgCtx = bgCanvas.getContext('2d');
  bgCtx.fillStyle = '#e8dfc8';
  bgCtx.fillRect(0, 0, W, H);
  // ink wash streaks
  bgCtx.strokeStyle = 'rgba(61,43,26,0.06)';
  for (let i=0;i<30;i++) {
    const x = Math.random()*W, y = Math.random()*H;
    bgCtx.lineWidth = Math.random()*40+10;
    bgCtx.beginPath();
    bgCtx.moveTo(x, y);
    bgCtx.quadraticCurveTo(x+Math.random()*200-100, y+Math.random()*200-100, x+Math.random()*300-150, y+Math.random()*200-100);
    bgCtx.stroke();
  }
  // subtle grid
  bgCtx.strokeStyle = 'rgba(61,43,26,0.03)';
  bgCtx.lineWidth = 1;
  for (let x=0;x<W;x+=60){ bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,H); bgCtx.stroke(); }
  for (let y=0;y<H;y+=60){ bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(W,y); bgCtx.stroke(); }
}
buildBg();
window.addEventListener('resize', () => { resize(); buildBg(); });

// ===== Game Loop =====
function gameLoop(ts) {
  frameId = requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (state !== 'playing') {
    // still render
    ctx.drawImage(bgCanvas, 0, 0);
    return;
  }
  // BG
  ctx.drawImage(bgCanvas, 0, 0);
  // Update
  player.update(dt);
  for (const b of bullets) b.update(dt);
  for (const e of enemies) e.update(dt);
  for (const p of particles) p.update(dt);
  // Bullet collisions
  for (const b of bullets) {
    if (b.life <= 0) continue;
    if (!b.isEnemy) {
      for (const e of enemies) {
        if (b.hit.has(e.id)) continue;
        if (Math.hypot(b.x-e.x, b.y-e.y) < b.r + e.r) {
          const dead = e.hit(b.dmg, b.piercing);
          if (!b.piercing) b.life = 0;
          else b.hit.add(e.id);
          break;
        }
      }
    } else {
      if (Math.hypot(b.x-player.x, b.y-player.y) < b.r + player.r) {
        player.hurt(b.dmg);
        b.life = 0;
      }
    }
  }
  // Clean up
  bullets = bullets.filter(b => b.life > 0);
  enemies = enemies.filter(e => e.hp > 0);
  particles = particles.filter(p => p.life > 0);
  // Draw
  for (const p of particles) p.draw();
  for (const b of bullets) b.draw();
  for (const e of enemies) e.draw();
  player.draw();
  // Wave clear?
  if (enemies.length === 0 && state === 'playing') {
    state = 'upgrade';
    setTimeout(()=>{ if(state==='upgrade') showUpgrade(); }, 800);
  }
  document.getElementById('hp-val').textContent = Math.max(0,Math.round(player.hp));
}
frameId = requestAnimationFrame(gameLoop);
lastTime = performance.now();

// ===== Input =====
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (AC.state==='suspended') AC.resume(); });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
document.getElementById('startBtn').addEventListener('click', () => {
  if (AC.state==='suspended') AC.resume();
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('upgradePanel').style.display = 'none';
  initGame();
});

// ===== Joystick Touch =====
const joyEl = document.getElementById('joystick-area');
const joyBaseEl = document.getElementById('joystick-base');
joyEl.addEventListener('touchstart', e => {
  e.preventDefault();
  if (AC.state==='suspended') AC.resume();
  const t = e.changedTouches[0];
  joyId = t.identifier;
  joyActive = true;
}, {passive:false});
joyEl.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== joyId) continue;
    const rect = joyBaseEl.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const maxR = 35;
    if (dist > maxR) { dx=dx/dist*maxR; dy=dy/dist*maxR; }
    joyKnob.style.left = (35+dx) + 'px';
    joyKnob.style.top = (35+dy) + 'px';
    joyDx = dx/maxR; joyDy = dy/maxR;
  }
}, {passive:false});
function endJoy(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === joyId) {
      joyActive = false; joyId = -1; joyDx = 0; joyDy = 0;
      joyKnob.style.left = '35px'; joyKnob.style.top = '35px';
    }
  }
}
joyEl.addEventListener('touchend', endJoy, {passive:false});
joyEl.addEventListener('touchcancel', endJoy, {passive:false});
</script>
