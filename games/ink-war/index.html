<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ink War - 실시간 영역 칠하기 전략</title>
  <meta name="theme-color" content="#0a0a1a" />
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #111129;
      --empty: #1a1a2e;
      --player: #00ffff;
      --ai: #ff00ff;
      --text: #e7e9ff;
      --muted: #8890b8;
      --ok: #00ff9f;
      --warn: #ffc857;
      --danger: #ff4d9a;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: radial-gradient(circle at 20% 10%, #15153b 0%, var(--bg) 60%); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif; }
    body { min-height: 100vh; display: flex; justify-content: center; }

    .app {
      width: min(100vw, 760px);
      min-height: 100vh;
      padding: 12px 12px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(0, 255, 255, 0.25);
      border-radius: 12px;
      background: rgba(20, 20, 45, 0.85);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.12);
    }

    .title {
      margin: 0;
      font-size: clamp(1.05rem, 3.6vw, 1.4rem);
      letter-spacing: 0.08em;
      color: var(--player);
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.75);
    }

    .subtitle { font-size: 0.72rem; color: var(--muted); }

    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .panel {
      background: rgba(15, 16, 40, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 9px 10px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 6px;
      font-weight: 700;
    }

    .score-item { display: flex; flex-direction: column; gap: 2px; align-items: center; }
    .score-item .label { font-size: 0.67rem; color: var(--muted); letter-spacing: 0.08em; }
    .score-item .value { font-size: 1.2rem; }
    .score-item.player .value { color: var(--player); text-shadow: 0 0 10px rgba(0,255,255,.7); }
    .score-item.ai .value { color: var(--ai); text-shadow: 0 0 10px rgba(255,0,255,.7); }

    .timer {
      font-size: clamp(1rem, 5vw, 1.7rem);
      font-weight: 800;
      text-align: center;
      color: var(--warn);
      text-shadow: 0 0 10px rgba(255, 200, 87, 0.5);
    }

    .ink-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .ink-box { display: flex; flex-direction: column; gap: 6px; }
    .ink-top { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); }
    .ink-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.05);
    }
    .ink-fill { height: 100%; width: 100%; transition: width .12s linear; }
    .ink-fill.player { background: linear-gradient(90deg, #0088ff 0%, var(--player) 100%); box-shadow: 0 0 10px rgba(0,255,255,.65); }
    .ink-fill.ai { background: linear-gradient(90deg, #9a00ff 0%, var(--ai) 100%); box-shadow: 0 0 10px rgba(255,0,255,.65); }

    .board-shell {
      position: relative;
      border-radius: 14px;
      border: 1px solid rgba(0,255,255,.25);
      background: rgba(8, 8, 20, 0.95);
      box-shadow: 0 0 28px rgba(0,255,255,.1);
      overflow: hidden;
      padding: 8px;
    }

    canvas {
      width: 100%;
      display: block;
      border-radius: 10px;
      background: #0c0c20;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .skills {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .skill-btn {
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      color: var(--text);
      padding: 8px 6px;
      text-align: center;
      font-weight: 700;
      letter-spacing: .02em;
      cursor: pointer;
      transition: transform .08s ease, box-shadow .2s ease, opacity .2s;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .skill-btn .k { font-size: .65rem; color: var(--muted); font-weight: 600; }
    .skill-btn.ready:hover { transform: translateY(-1px); box-shadow: 0 0 16px rgba(0,255,255,.35); }
    .skill-btn.cooldown { opacity: .45; cursor: not-allowed; }

    .bottom {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .status {
      font-size: .78rem;
      color: var(--muted);
      min-height: 20px;
      display: flex;
      align-items: center;
    }

    .btn {
      border: 1px solid rgba(0,255,255,.4);
      border-radius: 10px;
      background: rgba(0,255,255,.06);
      color: var(--player);
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 14, .75);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 20;
      backdrop-filter: blur(3px);
    }
    .overlay.show { display: flex; }

    .card {
      width: min(94vw, 520px);
      border-radius: 14px;
      border: 1px solid rgba(0,255,255,.28);
      background: linear-gradient(180deg, rgba(18,20,50,.95), rgba(8,8,22,.95));
      box-shadow: 0 0 28px rgba(0,255,255,.22);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card h2 { margin: 0; color: var(--player); letter-spacing: .08em; }
    .pitch { color: #c8eaff; font-weight: 600; }

    .diffs { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 8px; }
    .diff-btn {
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      background: rgba(255,255,255,.03);
      color: #cfd3ff;
      padding: 10px 8px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
    }
    .diff-btn.sel.easy { border-color: #00ff9f; color: #00ff9f; box-shadow: inset 0 0 15px rgba(0,255,159,.15), 0 0 12px rgba(0,255,159,.2); }
    .diff-btn.sel.normal { border-color: #ffd166; color: #ffd166; box-shadow: inset 0 0 15px rgba(255,209,102,.15), 0 0 12px rgba(255,209,102,.2); }
    .diff-btn.sel.hard { border-color: var(--ai); color: var(--ai); box-shadow: inset 0 0 15px rgba(255,0,255,.15), 0 0 12px rgba(255,0,255,.2); }

    .records {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 6px;
      text-align: center;
      font-size: .76rem;
      color: var(--muted);
    }
    .records b { display: block; color: #ffffff; font-size: .95rem; }

    .help {
      line-height: 1.45;
      font-size: .76rem;
      color: #aab1de;
      background: rgba(255,255,255,.03);
      border-radius: 10px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .result-title { font-size: 1.6rem; font-weight: 800; text-align: center; }
    .result-title.win { color: var(--player); text-shadow: 0 0 16px rgba(0,255,255,.7); }
    .result-title.lose { color: var(--ai); text-shadow: 0 0 16px rgba(255,0,255,.7); }
    .result-title.draw { color: var(--warn); text-shadow: 0 0 16px rgba(255,200,87,.7); }

    @media (max-width: 520px) {
      .app { padding: 10px 8px 14px; }
      .title-row { padding: 8px 10px; }
      .panel { padding: 8px; }
      .skills { gap: 6px; }
      .skill-btn { min-height: 52px; font-size: .84rem; }
      .bottom { grid-template-columns: 1fr auto; }
      .bottom .btn:last-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title-row">
      <div>
        <h1 class="title">INK WAR</h1>
        <div class="subtitle">터치로 칠하고 영역을 뺏는 실시간 잉크 전쟁</div>
      </div>
      <div id="modeBadge" class="subtitle">난이도: 보통</div>
    </div>

    <div class="hud">
      <div class="panel">
        <div class="score-grid">
          <div class="score-item player"><div class="label">플레이어</div><div class="value" id="playerCount">0</div></div>
          <div class="timer" id="timer">60</div>
          <div class="score-item ai"><div class="label">AI</div><div class="value" id="aiCount">0</div></div>
        </div>
      </div>
      <div class="panel">
        <div class="records">
          <div>최고점<b id="bestScore">0</b></div>
          <div>승<b id="winCount">0</b></div>
          <div>패<b id="loseCount">0</b></div>
          <div>무<b id="drawCount">0</b></div>
        </div>
      </div>
    </div>

    <div class="panel ink-wrap">
      <div class="ink-box">
        <div class="ink-top"><span>내 잉크</span><span id="playerInkText">0/0</span></div>
        <div class="ink-bar"><div class="ink-fill player" id="playerInkFill"></div></div>
      </div>
      <div class="ink-box">
        <div class="ink-top"><span>AI 잉크</span><span id="aiInkText">0/0</span></div>
        <div class="ink-bar"><div class="ink-fill ai" id="aiInkFill"></div></div>
      </div>
    </div>

    <div class="board-shell">
      <canvas id="board" aria-label="Ink War 보드"></canvas>
    </div>

    <div class="skills">
      <button class="skill-btn" id="skillBomb">🌊 폭탄 <span class="k">[1]</span></button>
      <button class="skill-btn" id="skillShield">🛡️ 실드 <span class="k">[2]</span></button>
      <button class="skill-btn" id="skillDrain">⚡ 드레인 <span class="k">[3]</span></button>
    </div>

    <div class="panel bottom">
      <div id="status" class="status">시작 버튼을 눌러 전투를 시작하세요.</div>
      <button class="btn" id="menuBtn">메뉴</button>
      <button class="btn" id="restartBtn">다시 시작</button>
    </div>
  </div>

  <div class="overlay show" id="startOverlay">
    <div class="card">
      <h2>INK WAR</h2>
      <div class="pitch">“터치로 칠하고 영역을 뺏는 실시간 잉크 전쟁”</div>
      <div class="diffs">
        <button class="diff-btn easy" data-diff="easy">Easy<br><small>느린 AI</small></button>
        <button class="diff-btn normal" data-diff="normal">Normal<br><small>보통 AI</small></button>
        <button class="diff-btn hard" data-diff="hard">Hard<br><small>공격적 AI</small></button>
      </div>
      <div class="help">
        • 드래그/스와이프로 인접 칸 칠하기<br>
        • 잉크 0이면 3초 후 전량 충전<br>
        • 키보드: WASD/방향키 이동 + Enter/Space 칠하기 + 1/2/3 스킬
      </div>
      <button class="btn" id="startBtn">전투 시작</button>
    </div>
  </div>

  <div class="overlay" id="resultOverlay">
    <div class="card">
      <div id="resultTitle" class="result-title">결과</div>
      <div class="records">
        <div>내 영역<b id="finalPlayer">0</b></div>
        <div>AI 영역<b id="finalAi">0</b></div>
        <div>빈칸<b id="finalEmpty">0</b></div>
        <div>최고점<b id="finalBest">0</b></div>
      </div>
      <button class="btn" id="resultRestart">한 판 더</button>
      <button class="btn" id="resultMenu">난이도 선택</button>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const EMPTY = 0, PLAYER = 1, AI = 2;
  const KEY = 'inkWarSaveV1';
  const GAME_SECONDS = 60;
  const INK_REFILL_MS = 3000;
  const SKILL_COOLDOWN = 30000;
  const SHIELD_MS = 5000;

  const DIFF = {
    easy: {
      label: '쉬움', size: 12, inkMax: 8,
      aiDelay: 430, aiSkillMode: 'none', aiAttackBias: 1.0, aiTargetPlayerBias: 0.9
    },
    normal: {
      label: '보통', size: 14, inkMax: 7,
      aiDelay: 260, aiSkillMode: 'normal', aiAttackBias: 1.4, aiTargetPlayerBias: 1.3
    },
    hard: {
      label: '어려움', size: 16, inkMax: 6,
      aiDelay: 150, aiSkillMode: 'hard', aiAttackBias: 2.0, aiTargetPlayerBias: 2.2
    }
  };

  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');

  const el = {
    modeBadge: document.getElementById('modeBadge'),
    timer: document.getElementById('timer'),
    playerCount: document.getElementById('playerCount'),
    aiCount: document.getElementById('aiCount'),
    bestScore: document.getElementById('bestScore'),
    winCount: document.getElementById('winCount'),
    loseCount: document.getElementById('loseCount'),
    drawCount: document.getElementById('drawCount'),
    playerInkFill: document.getElementById('playerInkFill'),
    aiInkFill: document.getElementById('aiInkFill'),
    playerInkText: document.getElementById('playerInkText'),
    aiInkText: document.getElementById('aiInkText'),
    status: document.getElementById('status'),
    startOverlay: document.getElementById('startOverlay'),
    resultOverlay: document.getElementById('resultOverlay'),
    resultTitle: document.getElementById('resultTitle'),
    finalPlayer: document.getElementById('finalPlayer'),
    finalAi: document.getElementById('finalAi'),
    finalEmpty: document.getElementById('finalEmpty'),
    finalBest: document.getElementById('finalBest'),
    skillBomb: document.getElementById('skillBomb'),
    skillShield: document.getElementById('skillShield'),
    skillDrain: document.getElementById('skillDrain'),
    menuBtn: document.getElementById('menuBtn'),
    restartBtn: document.getElementById('restartBtn'),
    startBtn: document.getElementById('startBtn'),
    resultRestart: document.getElementById('resultRestart'),
    resultMenu: document.getElementById('resultMenu')
  };

  const SFX = (() => {
    let ac = null;
    let on = true;
    function ensure() {
      if (!on) return null;
      if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
      if (ac.state === 'suspended') ac.resume();
      return ac;
    }
    function tone(freq, dur, type = 'sine', vol = 0.08, delay = 0) {
      const a = ensure();
      if (!a) return;
      const o = a.createOscillator();
      const g = a.createGain();
      o.type = type;
      o.frequency.value = freq;
      o.connect(g);
      g.connect(a.destination);
      const t = a.currentTime + delay;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t);
      o.stop(t + dur + 0.02);
    }
    return {
      set enabled(v) { on = !!v; },
      unlock: ensure,
      paint() { tone(440, .08, 'square', .06); tone(660, .06, 'triangle', .04, .05); },
      bomb() { tone(120, .2, 'sawtooth', .1); tone(260, .12, 'square', .08, .08); tone(520, .12, 'triangle', .06, .14); },
      shield() { tone(360, .09, 'sine', .08); tone(480, .1, 'sine', .07, .08); tone(720, .14, 'sine', .06, .16); },
      drain() { tone(500, .06, 'square', .08); tone(260, .15, 'sawtooth', .08, .07); tone(130, .22, 'sawtooth', .08, .16); },
      win() { [440, 660, 880, 1040].forEach((f, i) => tone(f, .16, 'triangle', .08, i * 0.09)); },
      lose() { [320, 220, 150].forEach((f, i) => tone(f, .22, 'sawtooth', .08, i * 0.1)); },
      click() { tone(380, .06, 'triangle', .05); }
    };
  })();

  let save = loadSave();

  let currentDiff = save.lastDifficulty && DIFF[save.lastDifficulty] ? save.lastDifficulty : 'normal';
  let size = 14;
  let board = new Uint8Array(size * size);
  let changedAt = new Float64Array(size * size);
  let shields = new Map();
  let ink = { 1: 7, 2: 7 };
  let maxInk = { 1: 7, 2: 7 };
  let refillAt = { 1: 0, 2: 0 };
  let skillsReady = {
    1: { bomb: 0, shield: 0, drain: 0 },
    2: { bomb: 0, shield: 0, drain: 0 }
  };

  let running = false;
  let startTime = 0;
  let remainSec = GAME_SECONDS;
  let lastTime = performance.now();
  let nextAiAt = 0;
  let pointerDown = false;
  let lastPaintCell = null;
  let hoverCell = null;
  let kbCursor = { r: 1, c: 1 };
  let boardPx = 420;
  let cellPx = 30;

  const splashes = [];
  const particles = [];

  initUI();
  resizeCanvas();
  requestAnimationFrame(loop);

  function initUI() {
    renderSave();
    markDiffSelected();

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        SFX.unlock();
        currentDiff = btn.dataset.diff;
        save.lastDifficulty = currentDiff;
        saveData();
        markDiffSelected();
        el.modeBadge.textContent = `난이도: ${DIFF[currentDiff].label}`;
      });
    });

    el.startBtn.addEventListener('click', () => {
      SFX.unlock();
      startGame();
    });

    el.restartBtn.addEventListener('click', () => {
      SFX.unlock();
      startGame();
    });
    el.menuBtn.addEventListener('click', () => {
      SFX.click();
      running = false;
      el.startOverlay.classList.add('show');
      el.resultOverlay.classList.remove('show');
      status('난이도를 고르고 시작하세요.');
    });

    el.skillBomb.addEventListener('click', () => playerUseSkill('bomb'));
    el.skillShield.addEventListener('click', () => playerUseSkill('shield'));
    el.skillDrain.addEventListener('click', () => playerUseSkill('drain'));

    el.resultRestart.addEventListener('click', () => {
      SFX.unlock();
      el.resultOverlay.classList.remove('show');
      startGame();
    });

    el.resultMenu.addEventListener('click', () => {
      el.resultOverlay.classList.remove('show');
      el.startOverlay.classList.add('show');
      status('난이도를 고르고 다시 시작하세요.');
    });

    window.addEventListener('resize', resizeCanvas);

    canvas.addEventListener('pointerdown', onPointerDown);
    canvas.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    canvas.addEventListener('pointerleave', () => { pointerDown = false; });

    window.addEventListener('keydown', onKeyDown, { passive: false });
    window.addEventListener('pointerdown', () => SFX.unlock(), { once: true });
    window.addEventListener('touchstart', () => SFX.unlock(), { once: true, passive: true });
  }

  function startGame() {
    const diff = DIFF[currentDiff];
    size = diff.size;
    board = new Uint8Array(size * size);
    changedAt = new Float64Array(size * size);
    shields.clear();

    maxInk[PLAYER] = diff.inkMax;
    maxInk[AI] = Math.max(5, diff.inkMax - 1);
    ink[PLAYER] = maxInk[PLAYER];
    ink[AI] = maxInk[AI];
    refillAt[PLAYER] = 0;
    refillAt[AI] = 0;

    skillsReady[PLAYER].bomb = 0;
    skillsReady[PLAYER].shield = 0;
    skillsReady[PLAYER].drain = 0;
    skillsReady[AI].bomb = 0;
    skillsReady[AI].shield = 0;
    skillsReady[AI].drain = 0;

    splashes.length = 0;
    particles.length = 0;

    seedBoard();

    const now = performance.now();
    startTime = now;
    remainSec = GAME_SECONDS;
    running = true;
    nextAiAt = now + DIFF[currentDiff].aiDelay;
    kbCursor = { r: 1, c: 1 };
    lastPaintCell = null;

    el.startOverlay.classList.remove('show');
    el.resultOverlay.classList.remove('show');
    el.modeBadge.textContent = `난이도: ${DIFF[currentDiff].label}`;
    save.lastDifficulty = currentDiff;
    saveData();

    status('전투 시작! 드래그해서 인접 칸을 칠하세요.');
    updateHud(now);
    resizeCanvas();
  }

  function seedBoard() {
    const pSeeds = [[1,1],[1,2],[2,1],[2,2]];
    const a0 = size - 3;
    const aSeeds = [[a0,a0],[a0,a0+1],[a0+1,a0],[a0+1,a0+1]];

    for (const [r,c] of pSeeds) {
      const i = idx(r,c);
      board[i] = PLAYER;
      changedAt[i] = performance.now();
    }
    for (const [r,c] of aSeeds) {
      const i = idx(r,c);
      board[i] = AI;
      changedAt[i] = performance.now();
    }
  }

  function onPointerDown(e) {
    if (!running) return;
    SFX.unlock();
    pointerDown = true;
    canvas.setPointerCapture?.(e.pointerId);
    const c = eventToCell(e);
    hoverCell = c;
    if (!c) return;
    tryPaintPlayer(c.r, c.c, true);
  }

  function onPointerMove(e) {
    const c = eventToCell(e);
    hoverCell = c;
    if (!running || !pointerDown || !c) return;

    if (!lastPaintCell) {
      tryPaintPlayer(c.r, c.c, true);
      return;
    }

    paintTowards(lastPaintCell, c);
  }

  function onPointerUp() {
    pointerDown = false;
    lastPaintCell = null;
  }

  function paintTowards(from, to) {
    let r = from.r;
    let c = from.c;
    let guard = size * 2;
    while ((r !== to.r || c !== to.c) && guard-- > 0) {
      const dr = to.r - r;
      const dc = to.c - c;
      if (Math.abs(dr) >= Math.abs(dc)) r += Math.sign(dr);
      else c += Math.sign(dc);
      if (Math.abs(r - from.r) + Math.abs(c - from.c) > size) break;
      tryPaintPlayer(r, c, true);
      from = { r, c };
    }
  }

  function onKeyDown(e) {
    const key = e.key.toLowerCase();

    if (['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d',' ','enter','1','2','3'].includes(key)) {
      e.preventDefault();
    }

    if (!running) return;

    if (key === 'arrowup' || key === 'w') kbCursor.r = Math.max(0, kbCursor.r - 1);
    else if (key === 'arrowdown' || key === 's') kbCursor.r = Math.min(size - 1, kbCursor.r + 1);
    else if (key === 'arrowleft' || key === 'a') kbCursor.c = Math.max(0, kbCursor.c - 1);
    else if (key === 'arrowright' || key === 'd') kbCursor.c = Math.min(size - 1, kbCursor.c + 1);
    else if (key === ' ' || key === 'enter') tryPaintPlayer(kbCursor.r, kbCursor.c, false);
    else if (key === '1') playerUseSkill('bomb');
    else if (key === '2') playerUseSkill('shield');
    else if (key === '3') playerUseSkill('drain');
  }

  function eventToCell(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    if (x < 0 || y < 0 || x > rect.width || y > rect.height) return null;
    const c = Math.floor((x / rect.width) * size);
    const r = Math.floor((y / rect.height) * size);
    if (r < 0 || c < 0 || r >= size || c >= size) return null;
    return { r, c };
  }

  function tryPaintPlayer(r, c, fromDrag) {
    if (!running) return false;
    if (ink[PLAYER] <= 0) {
      status('잉크 고갈! 3초 후 재충전됩니다.');
      return false;
    }

    if (!canPlayerCapture(r, c, fromDrag)) return false;

    const i = idx(r, c);
    board[i] = PLAYER;
    changedAt[i] = performance.now();
    consumeInk(PLAYER, 1);
    lastPaintCell = { r, c };
    splashAt(r, c, PLAYER);
    SFX.paint();
    return true;
  }

  function canPlayerCapture(r, c, fromDrag) {
    if (!inBounds(r, c)) return false;
    const i = idx(r, c);
    const cur = board[i];
    if (cur === PLAYER) return false;
    if (isProtectedCell(i, cur)) return false;

    if (fromDrag && lastPaintCell) {
      const md = Math.abs(lastPaintCell.r - r) + Math.abs(lastPaintCell.c - c);
      if (md === 1) return true;
    }

    return hasAdjacentOwner(r, c, PLAYER);
  }

  function hasAdjacentOwner(r, c, owner) {
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dr, dc] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (!inBounds(nr, nc)) continue;
      if (board[idx(nr, nc)] === owner) return true;
    }
    return false;
  }

  function consumeInk(actor, amount) {
    ink[actor] = Math.max(0, ink[actor] - amount);
    if (ink[actor] === 0) refillAt[actor] = performance.now() + INK_REFILL_MS;
  }

  function refillInkIfNeeded(now) {
    [PLAYER, AI].forEach(actor => {
      if (ink[actor] === 0 && now >= refillAt[actor]) {
        ink[actor] = maxInk[actor];
        refillAt[actor] = 0;
      }
    });
  }

  function updateAi(now) {
    if (!running) return;
    if (now < nextAiAt) return;

    const delay = DIFF[currentDiff].aiDelay;
    nextAiAt = now + delay;

    if (ink[AI] <= 0) return;

    if (maybeUseAiSkill(now)) return;

    const move = findGreedyAiMove();
    if (!move) return;

    const i = idx(move.r, move.c);
    const cur = board[i];
    if (cur === AI) return;
    if (isProtectedCell(i, cur)) return;

    board[i] = AI;
    changedAt[i] = now;
    consumeInk(AI, 1);
    splashAt(move.r, move.c, AI);
  }

  function maybeUseAiSkill(now) {
    const d = DIFF[currentDiff];
    if (d.aiSkillMode === 'none') return false;

    const ready = {
      bomb: now >= skillsReady[AI].bomb,
      shield: now >= skillsReady[AI].shield,
      drain: now >= skillsReady[AI].drain
    };

    const counts = countCells();
    const losing = counts.ai + 6 < counts.player;

    if (d.aiSkillMode === 'hard') {
      if (ready.drain && losing && castDrain(AI)) return true;
      if (ready.bomb) {
        const target = findBombTarget(AI, true);
        if (target && castBomb(AI, target.r, target.c)) return true;
      }
      if (ready.shield && Math.random() < 0.45 && castShield(AI)) return true;
      if (ready.drain && Math.random() < 0.26 && castDrain(AI)) return true;
      return false;
    }

    if (Math.random() > 0.18) return false;
    const pool = [];
    if (ready.bomb) pool.push('bomb');
    if (ready.shield) pool.push('shield');
    if (ready.drain) pool.push('drain');
    if (!pool.length) return false;

    const pick = pool[Math.floor(Math.random() * pool.length)];
    if (pick === 'bomb') {
      const target = findBombTarget(AI, false);
      if (target) return castBomb(AI, target.r, target.c);
      return false;
    }
    if (pick === 'shield') return castShield(AI);
    return castDrain(AI);
  }

  function findGreedyAiMove() {
    const d = DIFF[currentDiff];
    const frontier = new Set();

    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (board[idx(r, c)] !== AI) continue;
        const neigh = [[1,0],[-1,0],[0,1],[0,-1]];
        for (const [dr, dc] of neigh) {
          const nr = r + dr, nc = c + dc;
          if (!inBounds(nr, nc)) continue;
          const ni = idx(nr, nc);
          if (board[ni] === AI) continue;
          if (isProtectedCell(ni, board[ni])) continue;
          frontier.add(ni);
        }
      }
    }

    let best = null;
    let bestScore = -Infinity;

    frontier.forEach(i => {
      const r = Math.floor(i / size);
      const c = i % size;
      const cur = board[i];

      let score = 0;
      // 기본 그리디: 빈 칸을 우선 확장
      if (cur === EMPTY) score += 12;
      if (cur === PLAYER) score += 7.5;

      let emptyN = 0;
      let playerN = 0;
      let aiN = 0;
      const neigh = [[1,0],[-1,0],[0,1],[0,-1]];
      for (const [dr, dc] of neigh) {
        const nr = r + dr, nc = c + dc;
        if (!inBounds(nr, nc)) continue;
        const v = board[idx(nr, nc)];
        if (v === EMPTY) emptyN++;
        else if (v === PLAYER) playerN++;
        else if (v === AI) aiN++;
      }

      score += emptyN * 1.6;
      score += playerN * d.aiTargetPlayerBias;
      score += aiN * 0.4;

      if (d.aiSkillMode === 'hard' && cur === PLAYER) {
        // Hard는 플레이어 영역을 더 집요하게 압박
        score += 2.6 + playerN * 0.8;
      }

      const centerDist = Math.abs(r - size / 2) + Math.abs(c - size / 2);
      score += (size - centerDist) * 0.05;
      score += Math.random() * 0.8;

      if (score > bestScore) {
        bestScore = score;
        best = { r, c };
      }
    });

    return best;
  }

  function playerUseSkill(type) {
    if (!running) return;
    const now = performance.now();
    if (now < skillsReady[PLAYER][type]) {
      status(`${skillName(type)} 쿨다운 중입니다.`);
      return;
    }

    let used = false;
    if (type === 'bomb') {
      const target = hoverCell || kbCursor || findBombTarget(PLAYER, false);
      if (target) used = castBomb(PLAYER, target.r, target.c);
    } else if (type === 'shield') {
      used = castShield(PLAYER);
    } else if (type === 'drain') {
      used = castDrain(PLAYER);
    }

    if (!used) {
      status(`${skillName(type)} 사용 실패: 조건을 만족하는 대상이 없습니다.`);
      return;
    }

    status(`${skillName(type)} 발동!`);
  }

  function castBomb(actor, r, c) {
    const now = performance.now();
    if (now < skillsReady[actor].bomb) return false;

    let changed = 0;
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        if (!inBounds(nr, nc)) continue;
        const i = idx(nr, nc);
        const cur = board[i];
        if (cur === actor) continue;
        if (isProtectedCell(i, cur)) continue;
        board[i] = actor;
        changedAt[i] = now;
        changed++;
        splashAt(nr, nc, actor, true);
      }
    }

    if (changed === 0) return false;
    skillsReady[actor].bomb = now + SKILL_COOLDOWN;
    pulseParticles(r, c, actor === PLAYER ? '#00ffff' : '#ff00ff', 22, 2.2);
    if (actor === PLAYER) SFX.bomb();
    return true;
  }

  function castShield(actor) {
    const now = performance.now();
    if (now < skillsReady[actor].shield) return false;

    const own = [];
    for (let i = 0; i < board.length; i++) {
      if (board[i] !== actor) continue;
      const r = Math.floor(i / size), c = i % size;
      let risk = 0;
      const neigh = [[1,0],[-1,0],[0,1],[0,-1]];
      for (const [dr,dc] of neigh) {
        const nr = r + dr, nc = c + dc;
        if (!inBounds(nr, nc)) continue;
        const v = board[idx(nr, nc)];
        if (v !== actor) risk += (v === EMPTY ? 1 : 2);
      }
      own.push({ i, r, c, risk: risk + Math.random() });
    }

    if (!own.length) return false;
    own.sort((a, b) => b.risk - a.risk);
    const picks = own.slice(0, 3);
    for (const p of picks) {
      shields.set(p.i, { owner: actor, until: now + SHIELD_MS });
      pulseParticles(p.r, p.c, '#7efbff', 8, 1.2);
    }

    skillsReady[actor].shield = now + SKILL_COOLDOWN;
    if (actor === PLAYER) SFX.shield();
    return true;
  }

  function castDrain(actor) {
    const now = performance.now();
    if (now < skillsReady[actor].drain) return false;

    const enemy = actor === PLAYER ? AI : PLAYER;
    const cells = [];
    for (let i = 0; i < board.length; i++) {
      if (board[i] !== enemy) continue;
      if (isProtectedCell(i, enemy)) continue;
      cells.push(i);
    }
    if (!cells.length) return false;

    shuffle(cells);
    const take = cells.slice(0, Math.min(3, cells.length));
    for (const i of take) {
      const r = Math.floor(i / size), c = i % size;
      board[i] = EMPTY;
      changedAt[i] = now;
      pulseParticles(r, c, '#ffffff', 12, 1.7);
    }

    skillsReady[actor].drain = now + SKILL_COOLDOWN;
    if (actor === PLAYER) SFX.drain();
    return true;
  }

  function isProtectedCell(i, owner) {
    if (owner !== PLAYER && owner !== AI) return false;
    const sh = shields.get(i);
    if (!sh) return false;
    if (performance.now() > sh.until) {
      shields.delete(i);
      return false;
    }
    return sh.owner === owner;
  }

  function clearExpiredShields(now) {
    shields.forEach((v, k) => {
      if (now > v.until) shields.delete(k);
    });
  }

  function findBombTarget(actor, strategic) {
    const enemy = actor === PLAYER ? AI : PLAYER;
    let best = null;
    let bestScore = -Infinity;

    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        let score = 0;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (!inBounds(nr, nc)) continue;
            const i = idx(nr, nc);
            const cur = board[i];
            if (isProtectedCell(i, cur)) continue;
            if (cur === enemy) score += strategic ? 2.6 : 2;
            else if (cur === EMPTY) score += 1.4;
            else score += 0.25;
          }
        }

        if (strategic && actor === AI) {
          const nearPlayer = neighborCount(r, c, PLAYER);
          score += nearPlayer * 1.2;
        }

        score += Math.random() * 0.4;
        if (score > bestScore) {
          bestScore = score;
          best = { r, c };
        }
      }
    }

    return best;
  }

  function neighborCount(r, c, owner) {
    let n = 0;
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dr, dc] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (!inBounds(nr, nc)) continue;
      if (board[idx(nr, nc)] === owner) n++;
    }
    return n;
  }

  function loop(now) {
    const dt = Math.min(33, now - lastTime);
    lastTime = now;

    if (running) {
      remainSec = Math.max(0, GAME_SECONDS - (now - startTime) / 1000);
      if (remainSec <= 0) {
        endGame();
      } else {
        refillInkIfNeeded(now);
        clearExpiredShields(now);
        updateAi(now);
      }
    }

    updateEffects(dt);
    updateHud(now);
    draw(now);
    requestAnimationFrame(loop);
  }

  function updateEffects(dt) {
    for (let i = splashes.length - 1; i >= 0; i--) {
      const s = splashes[i];
      s.life -= dt;
      s.radius += s.grow * dt * 0.03;
      if (s.life <= 0) splashes.splice(i, 1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      p.x += p.vx * dt * 0.06;
      p.y += p.vy * dt * 0.06;
      p.vy += 0.01 * dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function draw(now) {
    ctx.clearRect(0, 0, boardPx, boardPx);
    ctx.fillStyle = '#0f1028';
    ctx.fillRect(0, 0, boardPx, boardPx);

    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        const i = idx(r, c);
        const x = c * cellPx;
        const y = r * cellPx;
        const v = board[i];

        let color = '#1a1a2e';
        if (v === PLAYER) color = 'rgba(0,255,255,.25)';
        else if (v === AI) color = 'rgba(255,0,255,.25)';

        ctx.fillStyle = color;
        ctx.fillRect(x + 1, y + 1, cellPx - 2, cellPx - 2);

        const pulse = Math.max(0, 1 - (now - changedAt[i]) / 240);
        if (pulse > 0.01 && v !== EMPTY) {
          const cx = x + cellPx / 2;
          const cy = y + cellPx / 2;
          const grd = ctx.createRadialGradient(cx, cy, 1, cx, cy, cellPx * 0.7);
          const tint = v === PLAYER ? '0,255,255' : '255,0,255';
          grd.addColorStop(0, `rgba(${tint},${0.28 * pulse})`);
          grd.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = grd;
          ctx.fillRect(x, y, cellPx, cellPx);
        }

        const sh = shields.get(i);
        if (sh && now <= sh.until) {
          const alpha = 0.35 + Math.sin(now * 0.015) * 0.2;
          ctx.strokeStyle = sh.owner === PLAYER ? `rgba(0,255,255,${alpha})` : `rgba(255,0,255,${alpha})`;
          ctx.lineWidth = 2;
          ctx.strokeRect(x + 2.5, y + 2.5, cellPx - 5, cellPx - 5);
        }
      }
    }

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= size; i++) {
      const p = i * cellPx;
      ctx.beginPath();
      ctx.moveTo(0, p); ctx.lineTo(boardPx, p); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p, 0); ctx.lineTo(p, boardPx); ctx.stroke();
    }

    // keyboard cursor
    if (running) {
      ctx.strokeStyle = 'rgba(255,220,130,.95)';
      ctx.lineWidth = 2;
      ctx.strokeRect(kbCursor.c * cellPx + 2, kbCursor.r * cellPx + 2, cellPx - 4, cellPx - 4);
    }

    // splashes
    splashes.forEach(s => {
      const a = Math.max(0, s.life / s.maxLife);
      const grd = ctx.createRadialGradient(s.x, s.y, 1, s.x, s.y, s.radius);
      grd.addColorStop(0, `${s.color}${Math.min(0.45, a).toFixed(3)})`);
      grd.addColorStop(1, `${s.color}0)`);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
      ctx.fill();
    });

    // particles
    particles.forEach(p => {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = hexToRgba(p.color, a * 0.95);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function splashAt(r, c, actor, strong = false) {
    const x = c * cellPx + cellPx * 0.5;
    const y = r * cellPx + cellPx * 0.5;
    const color = actor === PLAYER ? 'rgba(0,255,255,' : 'rgba(255,0,255,';
    splashes.push({ x, y, radius: strong ? cellPx * 0.55 : cellPx * 0.38, grow: strong ? 2.1 : 1.1, life: strong ? 260 : 170, maxLife: strong ? 260 : 170, color });
  }

  function pulseParticles(r, c, color, count, speedMul) {
    const x = c * cellPx + cellPx * 0.5;
    const y = r * cellPx + cellPx * 0.5;
    for (let i = 0; i < count; i++) {
      const ang = (Math.PI * 2 * i) / count + Math.random() * 0.3;
      const sp = (0.6 + Math.random() * 1.4) * speedMul;
      particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        life: 260 + Math.random() * 240,
        maxLife: 260 + Math.random() * 240,
        size: 1.5 + Math.random() * 1.8,
        color
      });
    }
  }

  function updateHud(now) {
    const counts = countCells();
    el.playerCount.textContent = counts.player;
    el.aiCount.textContent = counts.ai;
    el.timer.textContent = Math.ceil(remainSec).toString();

    setInkHud(PLAYER, el.playerInkFill, el.playerInkText);
    setInkHud(AI, el.aiInkFill, el.aiInkText);

    renderSkillButton(el.skillBomb, 'bomb', now);
    renderSkillButton(el.skillShield, 'shield', now);
    renderSkillButton(el.skillDrain, 'drain', now);
  }

  function setInkHud(actor, fillEl, textEl) {
    const max = maxInk[actor] || 1;
    const ratio = (ink[actor] / max) * 100;
    fillEl.style.width = `${ratio}%`;

    const onCd = ink[actor] === 0 && refillAt[actor] > performance.now();
    if (onCd) {
      const sec = Math.max(0, ((refillAt[actor] - performance.now()) / 1000)).toFixed(1);
      textEl.textContent = `재충전 ${sec}s`;
    } else {
      textEl.textContent = `${ink[actor]}/${max}`;
    }
  }

  function renderSkillButton(btn, type, now) {
    const left = Math.max(0, skillsReady[PLAYER][type] - now);
    btn.classList.toggle('cooldown', left > 0);
    btn.classList.toggle('ready', left <= 0);

    const label = type === 'bomb' ? '🌊 폭탄' : type === 'shield' ? '🛡️ 실드' : '⚡ 드레인';
    const key = type === 'bomb' ? '[1]' : type === 'shield' ? '[2]' : '[3]';
    if (left > 0) {
      btn.innerHTML = `${label} <span class="k">${(left / 1000).toFixed(1)}s</span>`;
    } else {
      btn.innerHTML = `${label} <span class="k">${key}</span>`;
    }
  }

  function endGame() {
    running = false;
    remainSec = 0;

    const counts = countCells();
    const p = counts.player;
    const a = counts.ai;
    const e = counts.empty;

    save.played += 1;
    if (p > save.bestScore) save.bestScore = p;

    let title = '무승부';
    let cls = 'draw';
    if (p > a) {
      title = '승리!';
      cls = 'win';
      save.wins += 1;
      SFX.win();
    } else if (a > p) {
      title = '패배...';
      cls = 'lose';
      save.losses += 1;
      SFX.lose();
    } else {
      save.draws += 1;
      SFX.shield();
    }

    saveData();
    renderSave();

    el.resultTitle.textContent = title;
    el.resultTitle.className = `result-title ${cls}`;
    el.finalPlayer.textContent = p;
    el.finalAi.textContent = a;
    el.finalEmpty.textContent = e;
    el.finalBest.textContent = save.bestScore;
    el.resultOverlay.classList.add('show');

    status(`게임 종료 · 내 영역 ${p}칸 / AI ${a}칸`);
  }

  function countCells() {
    let p = 0, a = 0;
    for (let i = 0; i < board.length; i++) {
      if (board[i] === PLAYER) p++;
      else if (board[i] === AI) a++;
    }
    return { player: p, ai: a, empty: board.length - p - a };
  }

  function resizeCanvas() {
    const viewportW = Math.min(window.innerWidth, 760);
    const viewportH = window.innerHeight;
    boardPx = Math.max(260, Math.min(viewportW - 30, viewportH * 0.55, 620));
    canvas.style.height = `${boardPx}px`;

    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(boardPx * dpr);
    canvas.height = Math.floor(boardPx * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cellPx = boardPx / size;
  }

  function status(msg) {
    el.status.textContent = msg;
  }

  function renderSave() {
    el.bestScore.textContent = save.bestScore;
    el.winCount.textContent = save.wins;
    el.loseCount.textContent = save.losses;
    el.drawCount.textContent = save.draws;
    el.modeBadge.textContent = `난이도: ${DIFF[currentDiff].label}`;
  }

  function markDiffSelected() {
    document.querySelectorAll('.diff-btn').forEach(btn => {
      const diff = btn.dataset.diff;
      btn.classList.toggle('sel', diff === currentDiff);
    });
  }

  function loadSave() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return { bestScore: 0, wins: 0, losses: 0, draws: 0, played: 0, lastDifficulty: 'normal', sound: true };
      const p = JSON.parse(raw);
      return {
        bestScore: Number(p.bestScore) || 0,
        wins: Number(p.wins) || 0,
        losses: Number(p.losses) || 0,
        draws: Number(p.draws) || 0,
        played: Number(p.played) || 0,
        lastDifficulty: DIFF[p.lastDifficulty] ? p.lastDifficulty : 'normal',
        sound: p.sound !== false
      };
    } catch {
      return { bestScore: 0, wins: 0, losses: 0, draws: 0, played: 0, lastDifficulty: 'normal', sound: true };
    }
  }

  function saveData() {
    localStorage.setItem(KEY, JSON.stringify(save));
  }

  function skillName(type) {
    if (type === 'bomb') return '잉크 폭탄';
    if (type === 'shield') return '잉크 실드';
    return '잉크 드레인';
  }

  function idx(r, c) { return r * size + c; }
  function inBounds(r, c) { return r >= 0 && c >= 0 && r < size && c < size; }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function hexToRgba(hex, alpha) {
    const n = hex.replace('#', '');
    const r = parseInt(n.slice(0, 2), 16);
    const g = parseInt(n.slice(2, 4), 16);
    const b = parseInt(n.slice(4, 6), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
})();
</script>
