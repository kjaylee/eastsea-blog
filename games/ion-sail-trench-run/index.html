  <title>Ion Sail Trench Run</title>
<meta name="description" content="Play Ion Sail Trench Run - Free HTML5 browser game on eastsea.monster. No download required.">
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root{--bg:#0a0a1a;--panel:#12122a;--ink:#e8ecff;--sub:#9aa4d6;--acc:#5cf2ff;--pink:#ff5cd6;--warn:#ff7367}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 50% -10%,#1a1a3f 0%,var(--bg) 45%,#060611 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:grid;place-items:center;padding:12px}
    .wrap{width:min(100%,480px);background:linear-gradient(180deg,#131330,#0d0d22);border:1px solid #2e2e66;border-radius:18px;padding:14px;box-shadow:0 0 30px rgba(92,242,255,.18),inset 0 0 20px rgba(255,92,214,.06)}
    h1{font-size:1.05rem;margin:0 0 8px;letter-spacing:.3px}
    .hud{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px}
    .card{background:#11112a;border:1px solid #2a2a5a;border-radius:10px;padding:8px;text-align:center}
    .k{display:block;font-size:.7rem;color:var(--sub)}
    .v{font-weight:700}
    canvas{width:100%;aspect-ratio:9/14;background:linear-gradient(180deg,#111228,#0b0b1a);border-radius:12px;border:1px solid #282855;touch-action:none}
    .controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
    button{appearance:none;border:1px solid #303066;background:#171738;color:var(--ink);padding:10px 12px;border-radius:10px;font-weight:700}
    button:active{transform:translateY(1px);filter:brightness(1.1)}
    .start{width:100%;margin-top:10px;background:linear-gradient(90deg,#174b65,#3a1b64);border-color:#4d3a8f}
    .tip{font-size:.78rem;color:var(--sub);margin-top:8px;line-height:1.45}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>🌊 Ion Sail Trench Run</h1>
    <section class="hud">
      <div class="card"><span class="k">SCORE</span><span id="score" class="v">0</span></div>
      <div class="card"><span class="k">BEST</span><span id="best" class="v">0</span></div>
      <div class="card"><span class="k">HULL</span><span id="hull" class="v">3</span></div>
      <div class="card"><span class="k">COMBO</span><span id="combo" class="v">x1</span></div>
    </section>
    <canvas id="game" width="360" height="560" aria-label="game canvas"></canvas>
    <div class="controls">
      <button id="leftBtn">⬅ LEFT</button>
      <button id="boostBtn">⚡ BOOST</button>
      <button id="rightBtn">RIGHT ➡</button>
    </div>
    <button id="startBtn" class="start">Start / Restart</button>
    <p class="tip">키보드: ←/→ 또는 A/D 이동, Space 부스트. 터치: 하단 버튼. 에너지 코어를 모으고 파편을 피하세요.</p>
  </main>

  <script>
    (() => {
      const cvs = document.getElementById('game');
      const ctx = cvs.getContext('2d');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const hullEl = document.getElementById('hull');
      const comboEl = document.getElementById('combo');
      const leftBtn = document.getElementById('leftBtn');
      const rightBtn = document.getElementById('rightBtn');
      const boostBtn = document.getElementById('boostBtn');
      const startBtn = document.getElementById('startBtn');

      const W = cvs.width, H = cvs.height;
      const laneX = [W * 0.2, W * 0.5, W * 0.8];
      const keyBest = 'isr_best';
      let best = Number(localStorage.getItem(keyBest) || 0);
      bestEl.textContent = best;

      let ac;
      function beep(f = 440, d = 0.06, t = 'sine', g = 0.04) {
        try {
          ac ||= new (window.AudioContext || window.webkitAudioContext)();
          if (ac.state === 'suspended') ac.resume();
          const o = ac.createOscillator();
          const v = ac.createGain();
          o.type = t; o.frequency.value = f;
          v.gain.value = g;
          o.connect(v); v.connect(ac.destination);
          o.start();
          v.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + d);
          o.stop(ac.currentTime + d);
        } catch {}
      }

      const state = {
        running: false,
        lane: 1,
        hull: 3,
        score: 0,
        combo: 1,
        speed: 2.8,
        boost: 0,
        items: [],
        frame: 0,
        msg: 'START'
      };

      function reset() {
        state.running = true;
        state.lane = 1;
        state.hull = 3;
        state.score = 0;
        state.combo = 1;
        state.speed = 2.8;
        state.boost = 0;
        state.items = [];
        state.frame = 0;
        state.msg = '';
        syncHUD();
      }

      function syncHUD() {
        scoreEl.textContent = state.score;
        hullEl.textContent = state.hull;
        comboEl.textContent = 'x' + state.combo;
        bestEl.textContent = best;
      }

      function move(dir) {
        if (!state.running) return;
        state.lane = Math.max(0, Math.min(2, state.lane + dir));
        beep(560, 0.04, 'triangle', 0.03);
      }

      function boost() {
        if (!state.running || state.boost > 0) return;
        state.boost = 35;
        beep(920, 0.08, 'sawtooth', 0.05);
      }

      function spawn() {
        const roll = Math.random();
        const lane = (Math.random() * 3) | 0;
        if (roll < 0.62) {
          state.items.push({ type: 'rock', lane, y: -24, r: 14 + Math.random() * 10 });
        } else {
          state.items.push({ type: 'core', lane, y: -20, r: 9 });
        }
      }

      function over() {
        state.running = false;
        state.msg = 'GAME OVER';
        if (state.score > best) {
          best = state.score;
          localStorage.setItem(keyBest, String(best));
        }
        beep(170, 0.2, 'square', 0.06);
        syncHUD();
      }

      function update() {
        if (!state.running) return;
        state.frame++;
        if (state.frame % Math.max(16, 34 - Math.floor(state.speed * 2)) === 0) spawn();

        const spd = state.speed + (state.boost > 0 ? 2.8 : 0);
        if (state.boost > 0) state.boost--;

        for (const it of state.items) it.y += spd;

        const py = H - 70;
        const px = laneX[state.lane];

        for (let i = state.items.length - 1; i >= 0; i--) {
          const it = state.items[i];
          if (it.y > H + 30) {
            state.items.splice(i, 1);
            if (it.type === 'core') {
              state.combo = 1;
              state.hull = Math.max(0, state.hull - 1);
              if (state.hull === 0) over();
            }
            continue;
          }

          const dx = laneX[it.lane] - px;
          const dy = it.y - py;
          const hit = dx * dx + dy * dy < (it.r + 16) * (it.r + 16);
          if (!hit) continue;

          if (it.type === 'core') {
            state.score += 10 * state.combo;
            state.combo = Math.min(9, state.combo + 1);
            beep(760 + state.combo * 25, 0.06, 'sine', 0.045);
          } else {
            state.hull--;
            state.combo = 1;
            beep(220, 0.12, 'square', 0.05);
            if (state.hull <= 0) {
              state.items.splice(i, 1);
              over();
              break;
            }
          }
          state.items.splice(i, 1);
        }

        state.score += state.boost > 0 ? 2 : 1;
        state.speed = Math.min(7.8, state.speed + 0.0018);
        syncHUD();
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        const grd = ctx.createLinearGradient(0, 0, 0, H);
        grd.addColorStop(0, '#12173a');
        grd.addColorStop(1, '#090916');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = 'rgba(92,242,255,0.28)';
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(laneX[i], 0);
          ctx.lineTo(laneX[i], H);
          ctx.stroke();
        }

        for (const it of state.items) {
          const x = laneX[it.lane], y = it.y;
          if (it.type === 'core') {
            ctx.fillStyle = '#5cf2ff';
            ctx.beginPath(); ctx.arc(x, y, it.r, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#d7faff'; ctx.lineWidth = 2;
            ctx.stroke();
          } else {
            ctx.fillStyle = '#ff5c89';
            ctx.beginPath();
            ctx.moveTo(x, y - it.r);
            ctx.lineTo(x + it.r, y + it.r);
            ctx.lineTo(x - it.r, y + it.r);
            ctx.closePath();
            ctx.fill();
          }
        }

        const px = laneX[state.lane], py = H - 70;
        ctx.fillStyle = state.boost > 0 ? '#ffe66d' : '#86b5ff';
        ctx.beginPath();
        ctx.moveTo(px, py - 20);
        ctx.lineTo(px + 18, py + 18);
        ctx.lineTo(px - 18, py + 18);
        ctx.closePath();
        ctx.fill();

        if (!state.running) {
          ctx.fillStyle = 'rgba(4,6,18,0.75)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 30px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText(state.msg || 'ION SAIL', W / 2, H / 2 - 8);
          ctx.font = '16px system-ui';
          ctx.fillStyle = '#a9b7ff';
          ctx.fillText('Start 버튼으로 재도전', W / 2, H / 2 + 24);
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') move(-1);
        if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') move(1);
        if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); boost(); }
      }, { passive: false });

      const bindPress = (el, fn) => {
        el.addEventListener('pointerdown', (e) => { e.preventDefault(); fn(); }, { passive: false });
      };
      bindPress(leftBtn, () => move(-1));
      bindPress(rightBtn, () => move(1));
      bindPress(boostBtn, boost);
      bindPress(startBtn, () => { beep(520, 0.05, 'triangle', 0.04); reset(); });

      draw();
      loop();
    })();
  </script>
