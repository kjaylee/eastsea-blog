*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1C1917;--bg2:#292524;--bg3:#44403C;
  --gold:#D97706;--gold2:#F59E0B;--gold3:#FDE68A;
  --crim:#DC2626;--crim2:#B91C1C;--crim3:#7F1D1D;
  --cream:#F5F0E8;--muted:#A8A29E;
  --atk:#EF4444;--def:#3B82F6;--heal:#10B981;--skill:#A855F7;--draw:#F59E0B;
  --en-col:#60A5FA;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,-apple-system,sans-serif;touch-action:none;user-select:none;color:var(--cream)}

/* Screens */
.scr{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.scr.on{display:flex}

/* Title */
#s-title{background:radial-gradient(ellipse at 50% 30%,#3D1A1A 0%,#1C1917 60%,#0D0B09 100%)}
#s-title h1{font-size:clamp(28px,7vw,56px);font-weight:900;color:var(--gold2);letter-spacing:3px;text-align:center;text-shadow:0 0 20px rgba(217,119,6,.6),0 0 40px rgba(217,119,6,.2);margin-bottom:6px}
#s-title .tagline{font-size:clamp(12px,3vw,16px);color:var(--muted);margin-bottom:24px;text-align:center;line-height:1.7}
.crest{font-size:52px;margin-bottom:14px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.best-d{font-size:13px;color:var(--gold);margin-bottom:16px}
.btn{padding:13px 36px;font-size:17px;font-weight:700;cursor:pointer;border-radius:10px;transition:all .18s;letter-spacing:.5px;border:none}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1C1917;box-shadow:0 0 18px rgba(217,119,6,.4)}
.btn-gold:active{transform:scale(.97)}
.btn-crim{background:linear-gradient(135deg,var(--crim2),var(--crim));color:#fff}
.btn-sm{padding:9px 20px;font-size:14px;border-radius:8px}

/* Battle */
#s-battle{flex-direction:column;background:var(--bg);justify-content:flex-start;padding:0}

.enemy-card.stunned{opacity:.55;border-color:var(--en-col)}
.en-name{font-size:13px;font-weight:700;color:var(--gold3)}
.en-hp-bar{height:6px;background:rgba(255,255,255,.12);border-radius:3px;margin:5px 0;overflow:hidden}
.en-hp-fill{height:100%;border-radius:3px;transition:width .3s}
.en-hp-txt{font-size:11px;color:var(--muted)}
.en-intent{font-size:10px;color:#FCA5A5;margin-top:3px}
.en-shield{font-size:10px;color:var(--en-col)}
.en-debuff{font-size:10px;color:var(--skill)}
#status-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;background:rgba(0,0,0,.3);flex-shrink:0}
#player-hp-area{display:flex;align-items:center;gap:8px}
.php-bar{width:80px;height:8px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden}
.php-fill{height:100%;background:linear-gradient(90deg,var(--crim),#EF4444);border-radius:4px;transition:width .3s}
#en-info{font-size:12px;color:var(--muted);text-align:center}
#turn-info{font-size:12px;color:var(--gold);text-align:right}
#energy-bar{display:flex;gap:5px}
.en-pip{width:14px;height:14px;border-radius:50%;background:var(--gold2);box-shadow:0 0 6px rgba(245,158,11,.5)}
.en-pip.used{background:rgba(245,158,11,.18);box-shadow:none}
#msgbox{flex:1;overflow-y:auto;padding:6px 12px;font-size:12px;color:var(--muted);max-height:80px;flex-shrink:0;background:rgba(0,0,0,.2)}
.mline{padding:1px 0;border-left:2px solid var(--bg3);padding-left:6px;margin-bottom:2px}
.mline.g{border-color:var(--heal);color:#A7F3D0}
.mline.b{border-color:var(--atk);color:#FCA5A5}
.mline.i{border-color:var(--gold);color:var(--gold3)}
#hand-area{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:6px}
#hand{display:flex;gap:7px;justify-content:center;flex-wrap:nowrap;overflow-x:auto;padding:4px;align-items:flex-end;min-height:120px;scrollbar-width:none}
#hand::-webkit-scrollbar{display:none}
.card{min-width:72px;max-width:90px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:2px solid var(--bg3);border-radius:10px;padding:8px 6px;cursor:pointer;transition:all .18s;flex-shrink:0;text-align:center;position:relative}
.card:hover,.card:active{transform:translateY(-8px) scale(1.05);box-shadow:0 8px 20px rgba(0,0,0,.5)}
.card.playable{border-color:var(--gold)}
.card.atk-t{border-color:var(--atk)}
.card.def-t{border-color:var(--def)}
.card.heal-t{border-color:var(--heal)}
.card.skill-t{border-color:var(--skill)}
.card.draw-t{border-color:var(--draw)}
.card-cost{position:absolute;top:4px;left:5px;width:18px;height:18px;background:var(--gold2);border-radius:50%;font-size:11px;font-weight:700;color:#1C1917;display:flex;align-items:center;justify-content:center;line-height:1}
.card-icon{font-size:22px;margin:6px 0 4px}
.card-name{font-size:10px;font-weight:700;color:var(--cream)}
.card-effect{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.3}
.card.selected{transform:translateY(-14px) scale(1.07);box-shadow:0 0 16px rgba(245,158,11,.6);border-color:var(--gold2)}
#action-row{display:flex;gap:8px;padding:6px 12px 10px;justify-content:center;flex-shrink:0}

/* Reward */
#s-reward{background:rgba(15,10,5,.95)}
#s-reward h2{font-size:22px;color:var(--gold2);margin-bottom:6px}
.reward-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.reward-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.rc{min-width:90px;padding:14px 12px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:2px solid var(--bg3);border-radius:12px;cursor:pointer;text-align:center;transition:all .2s}
.rc:hover,.rc:active{border-color:var(--gold);transform:scale(1.05);box-shadow:0 0 14px rgba(245,158,11,.3)}
.rc-icon{font-size:28px;margin-bottom:6px}
.rc-name{font-size:13px;font-weight:700;color:var(--cream)}
.rc-desc{font-size:11px;color:var(--muted);margin-top:3px}
.skip-link{font-size:12px;color:var(--muted);margin-top:18px;cursor:pointer;text-decoration:underline}

/* Camp */
#s-camp{background:radial-gradient(ellipse at 50% 60%,#2D1A0A,var(--bg))}
#s-camp h2{font-size:24px;color:var(--gold2);margin-bottom:6px}
.camp-info{font-size:13px;color:var(--muted);margin-bottom:20px;text-align:center}
.camp-opts{display:flex;flex-direction:column;gap:10px;width:min(300px,88vw)}
.camp-opt{padding:14px;background:var(--bg2);border:2px solid var(--bg3);border-radius:10px;cursor:pointer;transition:all .18s;text-align:left}
.camp-opt:hover{border-color:var(--gold);background:var(--bg3)}
.camp-opt .co-title{font-size:15px;font-weight:700;color:var(--cream);margin-bottom:3px}
.camp-opt .co-desc{font-size:12px;color:var(--muted)}
.chap-label{font-size:12px;color:var(--gold);letter-spacing:2px;margin-bottom:16px;text-align:center}

/* Gameover */
#s-gameover{background:radial-gradient(ellipse at 50% 40%,var(--crim3),#0D0B09)}
#s-gameover h1{font-size:clamp(32px,8vw,60px);font-weight:900;color:var(--crim);text-shadow:0 0 20px rgba(220,38,38,.5);margin-bottom:10px}
.go-sub{font-size:15px;color:var(--muted);margin-bottom:20px;text-align:center;line-height:1.7}
.go-score{font-size:20px;font-weight:700;color:var(--gold2);margin-bottom:16px}

/* Victory */
#s-victory{background:radial-gradient(ellipse at 50% 40%,#2D2000,#0D0B09)}
#s-victory h1{font-size:clamp(28px,7vw,52px);font-weight:900;color:var(--gold2);text-shadow:0 0 24px rgba(245,158,11,.6);text-align:center;margin-bottom:10px}

@media(max-width:420px){
  .card{min-width:62px;max-width:78px}
  .card-icon{font-size:18px}
  .card-name{font-size:9px}
  .card-effect{font-size:8px}
  .en-name{font-size:12px}
}
</style>
</head>
<body>
<div id="app">
<!-- Title -->
<div id="s-title" class="scr on">
  <div class="crest">⚔</div>
  <h1>철왕관 연대기</h1>
  <div class="tagline">덱빌딩 턴제 카드 RPG<br>카드를 조합하고 최후의 보스를 무찔러라</div>
  <div class="best-d" id="bd-title"></div>
  <button class="btn btn-gold" id="startBtn">탐험 시작</button>
  <div class="hint-t">카드를 클릭하여 시전 · 에너지 범위 내 플레이<br>📱 터치 지원 · 최대 3장 에너지</div>
</div>

<!-- Battle -->
<div id="s-battle" class="scr">
  <div id="battle-top">
    <div id="enemy-zone"></div>
  </div>
  <div id="status-bar">
    <div id="player-hp-area">
      <span style="font-size:12px">❤</span>
      <div class="php-bar"><div class="php-fill" id="php-fill"></div></div>
      <span id="php-txt" style="font-size:11px"></span>
      <span id="shield-txt" style="font-size:11px;color:var(--en-col);margin-left:4px"></span>
    </div>
    <div id="en-info"></div>
    <div id="turn-info">
      <div id="energy-bar"></div>
    </div>
  </div>
  <div id="msgbox"></div>
  <div id="hand-area">
    <div id="hand"></div>
  </div>
  <div id="action-row">
    <button class="btn btn-crim btn-sm" id="endTurnBtn">턴 종료</button>
    <button class="btn btn-sm" style="background:var(--bg3);color:var(--muted)" id="deckBtn">덱 (0)</button>
  </div>
</div>

<!-- Reward -->
<div id="s-reward" class="scr">
  <h2>🏆 전투 승리!</h2>
  <div class="reward-sub" id="reward-sub">카드 1장을 덱에 추가하세요</div>
  <div class="reward-cards" id="reward-cards"></div>
  <div class="skip-link" id="skip-reward">건너뛰기</div>
</div>

<!-- Camp -->
<div id="s-camp" class="scr">
  <div class="chap-label" id="chap-label">CHAPTER 1</div>
  <h2>🏕 야영지</h2>
  <div class="camp-info" id="camp-info">잠시 쉬어가세요</div>
  <div class="camp-opts" id="camp-opts"></div>
</div>

<!-- Gameover -->
<div id="s-gameover" class="scr">
  <h1>💀 패배</h1>
  <div class="go-sub" id="go-sub"></div>
  <div class="go-score" id="go-score"></div>
  <button class="btn btn-crim" id="restartBtn">다시 시작</button>
  <div style="font-size:11px;color:var(--muted);margin-top:12px">철왕관 연대기 — J&amp;J Games</div>
</div>

<!-- Victory -->
<div id="s-victory" class="scr">
  <h1>👑 철왕관 탈환!</h1>
  <div class="go-sub" id="vic-sub"></div>
  <div class="go-score" id="vic-score"></div>
  <button class="btn btn-gold" id="vicBtn">처음으로</button>
  <div style="font-size:11px;color:var(--muted);margin-top:12px">철왕관 연대기 — J&amp;J Games</div>
</div>
</div>

<script>
'use strict';
// ===== WEB AUDIO =====
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t2,tp,d,v=0.2){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=tp;o.frequency.value=f;if(t2)o.frequency.linearRampToValueAtTime(t2,AC.currentTime+d);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}}
function sfxAtk(){tone(440,200,'sawtooth',.1,.25);} // attack
function sfxDef(){tone(180,220,'sine',.12,.2);tone(260,260,'square',.12,.12);} // defend/shield
function sfxHeal(){[392,494,659].forEach((f,i)=>setTimeout(()=>tone(f,null,'sine',.1,.16),i*80));} // heal
function sfxSkill(){tone(600,300,'square',.15,.22);} // skill
function sfxDie(){[300,180,90].forEach((f,i)=>setTimeout(()=>tone(f,f*.5,'sawtooth',.18,.28),i*100));} // enemy dies
function sfxGameover(){[260,220,180,140].forEach((f,i)=>setTimeout(()=>tone(f,f*.6,'sawtooth',.2,.3),i*130));} // game over
function sfxVictory(){[523,659,784,988,1047].forEach((f,i)=>setTimeout(()=>tone(f,null,'sine',.12,.22),i*90));}

const SAVE='ironveil-best-v1';

// ===== CARD DEFINITIONS =====
const CARDS={
  strike:{n:'강타',ic:'⚔',e:1,type:'atk',fn:(G)=>{dmgAllTargeted(G,6);}   ,d:'적에게 6 피해'},
  heavyStrike:{n:'중격',ic:'🪓',e:2,type:'atk',fn:(G)=>{dmgAllTargeted(G,14);}  ,d:'적에게 14 피해'},
  defend:{n:'방어',ic:'🛡',e:1,type:'def',fn:(G)=>{G.shield+=5;msg('방어막 +5','i');}  ,d:'방어막 +5'},
  ironGuard:{n:'철벽',ic:'🏰',e:2,type:'def',fn:(G)=>{G.shield+=14;msg('방어막 +14','i');}  ,d:'방어막 +14'},
  mend:{n:'치료',ic:'💚',e:2,type:'heal',fn:(G)=>{G.hp=Math.min(G.mhp,G.hp+10);msg('HP +10','g');sfxHeal();}  ,d:'HP 10 회복'},
  greatHeal:{n:'대회복',ic:'✨',e:3,type:'heal',fn:(G)=>{G.hp=Math.min(G.mhp,G.hp+20);msg('HP +20','g');sfxHeal();}  ,d:'HP 20 회복'},
  fireball:{n:'화염구',ic:'🔥',e:3,type:'skill',fn:(G)=>{G.battle.enemies.filter(e=>e.alive).forEach(e=>dealDmg(G,e,12));}  ,d:'모든 적에게 12 피해'},
  thunder:{n:'번개',ic:'⚡',e:2,type:'skill',fn:(G)=>{dmgAllTargeted(G,8);G.battle.stunTarget&&(G.battle.stunTarget.stun=1);msg('기절!','i');}  ,d:'8 피해 + 기절 1턴'},
  drain:{n:'흡수',ic:'🩸',e:1,type:'skill',fn:(G)=>{const d=4;dmgAllTargeted(G,d);G.hp=Math.min(G.mhp,G.hp+d);msg('흡수!','g');}  ,d:'4 피해 + 4 흡수'},
  fury:{n:'분노',ic:'💢',e:0,type:'draw',fn:(G)=>{drawCards(G,2);G.energy=Math.min(G.maxEnergy,G.energy+1);msg('카드 2장 드로우, 에너지 +1','i');}  ,d:'드로우 2 + 에너지 +1'},
  curse:{n:'저주',ic:'💀',e:2,type:'skill',fn:(G)=>{dmgAllTargeted(G,8);const t=G.battle.stunTarget;if(t)t.atkDebuff=(t.atkDebuff||0)+3;msg('저주 부여!','i');}  ,d:'8 피해 + 적 공격력 -3'},
  doubleStrike:{n:'연격',ic:'⚔⚔',e:2,type:'atk',fn:(G)=>{dmgAllTargeted(G,6);dmgAllTargeted(G,6);}  ,d:'6 피해 2회'},
  whirlwind:{n:'회오리',ic:'🌀',e:3,type:'skill',fn:(G)=>{G.battle.enemies.filter(e=>e.alive).forEach(e=>dealDmg(G,e,8));G.shield+=6;}  ,d:'전체 8 피해 + 방어막 +6'},
  quickDraw:{n:'속사',ic:'🏹',e:1,type:'draw',fn:(G)=>{drawCards(G,3);}  ,d:'카드 3장 드로우'},
  reinforce:{n:'강화',ic:'🔩',e:1,type:'def',fn:(G)=>{G.shield+=3;G.battle.enemies.filter(e=>e.alive).forEach(e=>e.atkDebuff=(e.atkDebuff||0)+1);msg('전체 적 공격력 -1','i');}  ,d:'방어막 +3, 전체 적 -1 공격'},
};

const ENEMY_POOL={
  goblinThief:{n:'고블린 도적',hp:30,atk:6,def:0,icon:'👺',reward:20,intent:'🗡',acts:['atk']},
  orcWarrior:{n:'오크 전사',hp:55,atk:9,def:2,icon:'👹',reward:30,intent:'💪',acts:['atk','atk','def']},
  skeletonArcher:{n:'해골 궁수',hp:28,atk:8,def:0,icon:'💀',reward:22,intent:'🏹',acts:['atk','atk']},
  necromancer:{n:'사령술사',hp:42,atk:7,def:0,icon:'🧙',reward:35,intent:'☠️',acts:['atk','heal','atk']},
  darkKnight:{n:'암흑 기사',hp:70,atk:10,def:4,icon:'⚔',reward:45,intent:'⚔',acts:['atk','def','atk','atk']},
  boneGiant:{n:'뼈의 거인',hp:90,atk:11,def:3,icon:'🦴',reward:55,intent:'💀',acts:['atk','def','atk']},
  demonMage:{n:'악마 마법사',hp:65,atk:12,def:2,icon:'😈',reward:50,intent:'🔥',acts:['atk','buff','atk']},
  lichKing:{n:'리치 왕',hp:120,atk:13,def:5,icon:'👑',reward:80,intent:'☠',acts:['atk','atk','aoe','def'],isBoss:true},
  dragonWarlord:{n:'용군주',hp:160,atk:15,def:6,icon:'🐉',reward:100,intent:'🔥',acts:['atk','aoe','def','atk','buff'],isBoss:true},
  ironKing:{n:'철왕관 군주',hp:200,atk:16,def:8,icon:'💎',reward:150,intent:'⚔',acts:['atk','aoe','buff','def','atk','atk'],isBoss:true},
};

// Chapter encounter maps
const CHAPTERS=[
  {name:'고블린 황야',label:'CHAPTER 1',
   enc:[['goblinThief'],['goblinThief','skeletonArcher'],['orcWarrior'],['lichKing']]},
  {name:'저주받은 성채',label:'CHAPTER 2',
   enc:[['necromancer'],['darkKnight','skeletonArcher'],['boneGiant'],['dragonWarlord']]},
  {name:'철왕관 요새',label:'CHAPTER 3',
   enc:[['demonMage'],['darkKnight','necromancer'],['boneGiant','orcWarrior'],['ironKing']]},
];

// Reward card pool
const REWARD_POOL=['heavyStrike','ironGuard','mend','fireball','thunder','drain','fury','curse','doubleStrike','whirlwind','quickDraw','reinforce','greatHeal'];

// ===== GAME STATE =====
let G={};
function initG(){
  G={
    hp:60,mhp:60,shield:0,gold:0,
    energy:3,maxEnergy:3,
    deck:[],discard:[],hand:[],
    chapter:0,encounter:0,
    score:0,turn:0,
    battle:null,msgs:[],
    selectedCard:-1,
  };
  // Starter deck
  for(let i=0;i<5;i++)G.deck.push('strike');
  for(let i=0;i<4;i++)G.deck.push('defend');
  G.deck.push('mend');
  shuffleDeck();
}

function shuffleDeck(){for(let i=G.deck.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[G.deck[i],G.deck[j]]=[G.deck[j],G.deck[i]];}}

// ===== MESSAGES =====
function msg(t,type=''){
  G.msgs.unshift({t,type});if(G.msgs.length>8)G.msgs.length=8;
  const el=document.getElementById('msgbox');
  el.innerHTML=G.msgs.slice(0,5).map(m=>`<div class="mline ${m.type}">${m.t}</div>`).join('');
}

// ===== BATTLE SETUP =====
function startBattle(){
  const chap=CHAPTERS[G.chapter];
  const enc=chap.enc[G.encounter];
  G.shield=0;G.battle={
    enemies:enc.map(k=>{
      const e=ENEMY_POOL[k];
      const scale=1+G.chapter*0.2;
      return{key:k,n:e.n,hp:~~(e.hp*scale),mhp:~~(e.hp*scale),atk:e.atk+G.chapter,def:e.def,icon:e.icon,acts:e.acts,actI:0,alive:true,shield:0,stun:0,atkDebuff:0,isBoss:e.isBoss};
    }),
    stunTarget:null,
  };
  G.battle.stunTarget=G.battle.enemies[0];
  G.hand=[];drawCards(G,5);
  G.energy=G.maxEnergy;
  G.selectedCard=-1;
  showScreen('s-battle');
  msg(`⚔ 전투 시작: ${chap.name}`,'i');
  renderBattle();
}

function drawCards(G2,n){
  for(let i=0;i<n;i++){
    if(G2.deck.length===0){G2.deck=G2.discard.splice(0);shuffleDeck();}
    if(G2.deck.length===0)break;
    G2.hand.push(G2.deck.pop());
  }
}

function dmgAllTargeted(G2,d){
  const t=G2.battle.stunTarget||(G2.battle.enemies.find(e=>e.alive));
  if(!t)return;dealDmg(G2,t,d);
}

function dealDmg(G2,e,d){
  if(!e.alive)return;
  const actual=Math.max(0,d-e.def);
  let rem=actual;
  if(e.shield>0){const abs=Math.min(e.shield,rem);e.shield-=abs;rem-=abs;}
  e.hp-=rem;sfxAtk();
  if(e.hp<=0){e.alive=false;sfxDie();G2.score+=ENEMY_POOL[e.key].reward;msg(`${e.n} 처치!`,'g');}
  else msg(`${e.n}에게 ${rem}(방어 ${actual-rem}) 피해`);
}

// ===== CARD PLAY =====
function playCard(idx){
  if(G.selectedCard===idx){G.selectedCard=-1;renderHand();return;}
  const cid=G.hand[idx];const cd=CARDS[cid];
  if(G.energy<cd.e){msg('에너지 부족!','b');return;}
  if(G.battle.enemies.filter(e=>e.alive).length===0)return;
  G.energy-=cd.e;G.selectedCard=-1;
  cd.fn(G);sfxSkill();
  G.discard.push(cid);G.hand.splice(idx,1);
  // Check victory
  if(G.battle.enemies.every(e=>!e.alive)){setTimeout(winBattle,300);return;}
  renderBattle();
}

function endTurn(){
  if(!G.battle)return;
  // Discard hand
  G.discard.push(...G.hand);G.hand=[];
  // Enemy turns
  for(const e of G.battle.enemies){
    if(!e.alive)continue;
    if(e.stun>0){e.stun--;msg(`${e.n} 기절 중`,'i');continue;}
    const act=e.acts[e.actI%e.acts.length];e.actI++;
    if(act==='atk'){
      let d=Math.max(0,e.atk-(e.atkDebuff||0));
      let rem=d;
      if(G.shield>0){const abs=Math.min(G.shield,rem);G.shield-=abs;rem-=abs;}
      G.hp-=rem;sfxAtk();
      msg(`${e.n} 공격: ${rem} 피해`,'b');
      if(G.hp<=0){G.hp=0;setTimeout(gameOver,300);return;}
    }else if(act==='def'){
      e.shield=Math.min(e.shield+(e.def+3),20);sfxDef();msg(`${e.n} 방어막 +${e.def+3}`);
    }else if(act==='heal'){
      const h=~~(e.mhp*.15);e.hp=Math.min(e.mhp,e.hp+h);msg(`${e.n} 회복 +${h}`,'i');
    }else if(act==='buff'){
      e.atk++;msg(`${e.n} 공격력 상승!`,'b');
    }else if(act==='aoe'){
      let d=Math.max(0,Math.floor(e.atk*.7)-(e.atkDebuff||0));
      if(G.shield>0){const a=Math.min(G.shield,d);G.shield-=a;d-=a;}
      G.hp-=d;sfxAtk();msg(`${e.n} 광역 공격: ${d} 피해`,'b');
      if(G.hp<=0){G.hp=0;setTimeout(gameOver,300);return;}
    }
  }
  // Decay shields
  if(G.shield>0)G.shield=Math.max(0,G.shield-2);
  // Refresh
  G.energy=G.maxEnergy;G.turn++;
  drawCards(G,5);G.selectedCard=-1;
  renderBattle();
}

function winBattle(){
  const encDef=CHAPTERS[G.chapter].enc[G.encounter];
  G.gold+=encDef.map(k=>ENEMY_POOL[k].reward).reduce((a,b)=>a+b,0);
  G.score+=100*(G.chapter+1);
  // Offer rewards
  const pool=[...REWARD_POOL].sort(()=>Math.random()-.5).slice(0,3);
  showScreen('s-reward');
  const rc=document.getElementById('reward-cards');
  rc.innerHTML=pool.map((cid,i)=>{
    const cd=CARDS[cid];
    return`<div class="rc" onclick="pickReward(${i})"><div class="rc-icon">${cd.ic}</div><div class="rc-name">${cd.n}</div><div class="rc-desc">${cd.d}</div><div class="rc-desc" style="color:var(--gold);margin-top:4px">에너지 ${cd.e}</div></div>`;
  }).join('');
  document.getElementById('reward-sub').textContent='덱에 카드 1장 추가';
  document.getElementById('skip-reward').textContent='건너뛰기';
  window._rewardPool=pool;
}

window.pickReward=function(i){
  G.deck.push(window._rewardPool[i]);shuffleDeck();
  afterReward();
};
document.getElementById('skip-reward').addEventListener('click',afterReward);

function afterReward(){
  G.encounter++;
  const chap=CHAPTERS[G.chapter];
  if(G.encounter>=chap.enc.length){
    // Next chapter or victory
    G.chapter++;G.encounter=0;
    if(G.chapter>=CHAPTERS.length){showVictory();return;}
    G.maxEnergy=Math.min(5,G.maxEnergy+1);
    G.mhp+=10;G.hp=Math.min(G.hp+10,G.mhp);
    showCamp(true);
  }else{
    showCamp(false);
  }
}

// ===== CAMP =====
function showCamp(newChapter){
  showScreen('s-camp');
  const chap=CHAPTERS[G.chapter];
  document.getElementById('chap-label').textContent=chap.label+': '+chap.name;
  document.getElementById('camp-info').textContent=`HP: ${G.hp}/${G.mhp} · 골드: ${G.gold} · 점수: ${G.score}`;
  const opts=[
    {t:'⛺ 휴식 (골드 20)',d:'HP 20 회복',fn(){if(G.gold>=20){G.gold-=20;G.hp=Math.min(G.mhp,G.hp+20);sfxHeal();afterCamp();}else msg('골드 부족!','b');}},
    {t:'💪 훈련 (골드 30)',d:'최대 HP +15, 공격 카드 강화',fn(){if(G.gold>=30){G.gold-=30;G.mhp+=15;G.hp=Math.min(G.hp,G.mhp);G.deck.push('heavyStrike');shuffleDeck();afterCamp();}else msg('골드 부족!','b');}},
    {t:'➡ 다음 전투',d:'바로 진행',fn(){afterCamp();}},
  ];
  if(newChapter)opts.unshift({t:'🏆 챕터 클리어! +에너지',d:`최대 에너지 ${G.maxEnergy}, 최대 HP +10`,fn(){afterCamp();}});
  document.getElementById('camp-opts').innerHTML=opts.map((o,i)=>`<div class="camp-opt" onclick="campAct(${i})"><div class="co-title">${o.t}</div><div class="co-desc">${o.d}</div></div>`).join('');
  window._campOpts=opts;
}
window.campAct=function(i){window._campOpts[i].fn();};
function afterCamp(){startBattle();}

// ===== RENDER BATTLE =====
function renderBattle(){
  renderEnemies();renderHand();renderStatus();
}
function renderEnemies(){
  const ez=document.getElementById('enemy-zone');
  ez.innerHTML=G.battle.enemies.map((e,i)=>`
    <div class="enemy-card${e.stun?' stunned':''}" onclick="targetEnemy(${i})">
      <div class="en-name">${e.icon} ${e.n}${i===G.battle.enemies.indexOf(G.battle.stunTarget)?'<span style="font-size:9px;color:var(--gold)"> ◀</span>':''}</div>
      <div class="en-hp-bar"><div class="en-hp-fill" style="width:${~~(e.hp/e.mhp*100)}%;background:${e.hp/e.mhp>.5?'#DC2626':e.hp/e.mhp>.25?'#F59E0B':'#EF4444'}"></div></div>
      <div class="en-hp-txt">${e.hp}/${e.mhp}</div>
      ${e.shield?`<div class="en-shield">🛡${e.shield}</div>`:''}
      ${e.stun?`<div class="en-debuff">💫기절 ${e.stun}턴</div>`:''}
      ${e.atkDebuff?`<div class="en-debuff">⬇공격력-${e.atkDebuff}</div>`:''}
      <div class="en-intent">${e.acts[e.actI%e.acts.length]==='atk'?'🗡 공격':e.acts[e.actI%e.acts.length]==='heal'?'💚 회복':e.acts[e.actI%e.acts.length]==='def'?'🛡 방어':e.acts[e.actI%e.acts.length]==='aoe'?'💥 광역':'💪 강화'}</div>
    </div>
  `).join('');
}
window.targetEnemy=function(i){
  const e=G.battle.enemies[i];if(!e.alive)return;
  G.battle.stunTarget=e;renderEnemies();
};
function renderHand(){
  const hd=document.getElementById('hand');
  hd.innerHTML=G.hand.map((cid,i)=>{
    const cd=CARDS[cid];const can=G.energy>=cd.e;
    return`<div class="card ${cd.type}-t${can?' playable':''}${G.selectedCard===i?' selected':''}" onclick="clickCard(${i})">
      <div class="card-cost">${cd.e}</div>
      <div class="card-icon">${cd.ic}</div>
      <div class="card-name">${cd.n}</div>
      <div class="card-effect">${cd.d}</div>
    </div>`;
  }).join('');
}
window.clickCard=function(i){
  if(G.selectedCard===i){playCard(i);}else{G.selectedCard=i;sfxDef();renderHand();}
};
function renderStatus(){
  const pct=G.hp/G.mhp*100;
  document.getElementById('php-fill').style.width=pct+'%';
  document.getElementById('php-txt').textContent=`${G.hp}/${G.mhp}`;
  document.getElementById('shield-txt').textContent=G.shield?`🛡${G.shield}`:'';
  document.getElementById('en-info').textContent=`덱:${G.deck.length} 버림:${G.discard.length}`;
  document.getElementById('turn-info').innerHTML=`턴 ${G.turn+1}`;
  const eb=document.getElementById('energy-bar');
  eb.innerHTML=Array.from({length:G.maxEnergy},(_, i)=>`<div class="en-pip${i>=G.energy?' used':''}"></div>`).join('');
  document.getElementById('deckBtn').textContent=`덱 (${G.deck.length})`;
}

// ===== SCREENS =====
function showScreen(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// ===== GAME OVER / VICTORY =====
function gameOver(){
  sfxGameover();
  const best=parseInt(localStorage.getItem(SAVE)||'0');
  const nb=Math.max(G.score,best);localStorage.setItem(SAVE,nb);
  showScreen('s-gameover');
  document.getElementById('go-sub').textContent=`챕터 ${G.chapter+1}에서 패배\n처치 점수: ${G.score}`;
  document.getElementById('go-score').textContent=`최고 점수: ${nb}${G.score>=best&&best>0?' 🏆 신기록!':''}`;
}
function showVictory(){
  sfxVictory();
  const best=parseInt(localStorage.getItem(SAVE)||'0');
  const nb=Math.max(G.score,best);localStorage.setItem(SAVE,nb);
  showScreen('s-victory');
  document.getElementById('vic-sub').textContent=`모든 챕터 클리어!\n총 점수: ${G.score}`;
  document.getElementById('vic-score').textContent=`최고 점수: ${nb}${G.score>=best&&best>0?' 🏆 신기록!':''}`;
}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(document.getElementById('s-battle').classList.contains('on')){
    if(e.key==='Enter'||e.key==' '){e.preventDefault();endTurn();}
    const n=parseInt(e.key);if(n>=1&&n<=G.hand.length){e.preventDefault();clickCard(n-1);}
  }
});

// ===== INIT =====
document.getElementById('startBtn').addEventListener('click',()=>{
  AC.resume();initG();startBattle();
});
document.getElementById('endTurnBtn').addEventListener('click',endTurn);
document.getElementById('restartBtn').addEventListener('click',()=>{AC.resume();initG();startBattle();});
document.getElementById('vicBtn').addEventListener('click',()=>showScreen('s-title'));

// Best score
const bestSaved=localStorage.getItem(SAVE);
document.getElementById('bd-title').textContent=bestSaved?`최고 점수: ${bestSaved}`:'첫 번째 탐험!';
</script>
