<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ff2d78">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>K-Deck Arena</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card-bg:#12122a;--neon-pink:#ff2d78;--neon-blue:#00d4ff;--neon-green:#39ff14;--neon-purple:#b347ff;--neon-gold:#ffd700;--neon-red:#ff4444;--text:#e8e8f0;--text-dim:#8888aa}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
#app{width:100%;height:100%;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;align-items:center;width:100%;height:100%;position:absolute;top:0;left:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}

/* Title */
#title-screen{justify-content:center;gap:16px;background:radial-gradient(ellipse at 50% 30%,#1a1040 0%,var(--bg) 70%);overflow:hidden}
.title-logo{font-size:clamp(2.2rem,8vw,4rem);font-weight:900;background:linear-gradient(135deg,var(--neon-pink),var(--neon-blue),var(--neon-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;text-align:center;filter:drop-shadow(0 0 20px rgba(255,45,120,.4))}
.title-sub{color:var(--text-dim);font-size:clamp(.7rem,2.5vw,.95rem);letter-spacing:6px;text-transform:uppercase}
.title-stats{display:flex;gap:16px;color:var(--text-dim);font-size:.85rem;flex-wrap:wrap;justify-content:center}
.title-stats span{background:rgba(255,255,255,.05);padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.08)}
.title-rating{color:var(--neon-gold);font-size:1.2rem;font-weight:700}
.btn{padding:14px 36px;border:2px solid var(--neon-pink);background:transparent;color:var(--neon-pink);font-size:1rem;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:2px;outline:none;min-width:180px}
.btn:active,.btn:hover{background:var(--neon-pink);color:#fff;box-shadow:0 0 30px rgba(255,45,120,.4)}
.btn-blue{border-color:var(--neon-blue);color:var(--neon-blue)}
.btn-blue:active,.btn-blue:hover{background:var(--neon-blue);color:#000}
.btn-green{border-color:var(--neon-green);color:var(--neon-green)}
.btn-green:active,.btn-green:hover{background:var(--neon-green);color:#000}
.btn-sm{padding:8px 18px;font-size:.8rem;min-width:auto}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-icon{display:flex;align-items:center;gap:6px;justify-content:center}

/* Battle Screen */
#battle-screen{padding:6px;justify-content:space-between}
.battle-hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(0,0,0,.3);border-radius:8px;margin-bottom:4px}
.hud-player{display:flex;align-items:center;gap:8px}
.hud-player .name{font-weight:700;font-size:.85rem}
.hud-score{background:var(--neon-pink);color:#fff;padding:2px 10px;border-radius:10px;font-weight:700;font-size:.9rem;min-width:28px;text-align:center}
.hud-score.ai{background:var(--neon-red)}
.hud-center{text-align:center}
.hud-round{color:var(--neon-gold);font-weight:700;font-size:1rem}
.hud-turn{font-size:.7rem;color:var(--text-dim)}

/* Type advantage */
.type-hint{display:flex;gap:8px;justify-content:center;font-size:.65rem;color:var(--text-dim);padding:2px}
.type-hint span{padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.05)}

/* Arena */
.arena{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;width:100%;position:relative;min-height:0}
.arena-zone{width:100%;display:flex;justify-content:center;align-items:center;min-height:100px;padding:4px}
.arena-zone.empty{border:2px dashed rgba(255,255,255,.1);border-radius:12px;margin:0 20px}
.vs-badge{font-size:1.4rem;font-weight:900;color:var(--neon-pink);text-shadow:0 0 15px rgba(255,45,120,.5);animation:vsPulse 1.5s ease-in-out infinite}
@keyframes vsPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.95)}}

/* Cards */
.card{width:96px;height:136px;border-radius:10px;position:relative;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.card:active{transform:scale(.95)}
.card.selected{transform:translateY(-10px) scale(1.05);z-index:2}
.card.selected .card-inner{box-shadow:0 0 20px rgba(255,45,120,.5)}
.card-inner{width:100%;height:100%;border-radius:10px;padding:6px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;transition:box-shadow .2s}
.card-type-atk .card-inner{background:linear-gradient(145deg,#1a0810,#2a1025);border:2px solid var(--neon-red)}
.card-type-def .card-inner{background:linear-gradient(145deg,#081020,#102038);border:2px solid var(--neon-blue)}
.card-type-spc .card-inner{background:linear-gradient(145deg,#120824,#201044);border:2px solid var(--neon-purple)}
.card-type-sup .card-inner{background:linear-gradient(145deg,#0a1808,#183010);border:2px solid var(--neon-green)}
.card-badge{position:absolute;top:3px;right:3px;font-size:.45rem;padding:1px 4px;border-radius:3px;font-weight:700;text-transform:uppercase;color:#fff}
.card-type-atk .card-badge{background:var(--neon-red)}
.card-type-def .card-badge{background:var(--neon-blue)}
.card-type-spc .card-badge{background:var(--neon-purple)}
.card-type-sup .card-badge{background:var(--neon-green)}
.card-cost{position:absolute;top:3px;left:3px;font-size:.55rem;width:16px;height:16px;border-radius:50%;background:var(--neon-gold);color:#000;display:flex;align-items:center;justify-content:center;font-weight:900}
.card-icon{font-size:1.8rem;text-align:center;line-height:1;margin:2px 0}
.card-name{font-size:.5rem;text-align:center;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-ability{font-size:.4rem;text-align:center;color:var(--neon-gold);font-style:italic;line-height:1.1;min-height:14px}
.card-stats{display:flex;justify-content:space-between;font-size:.6rem;font-weight:700}
.stat-atk{color:var(--neon-red)}
.stat-def{color:var(--neon-blue)}
.stat-pwr{color:var(--neon-purple)}

/* Arena cards */
.arena-card{width:120px;height:168px}
.arena-card .card-icon{font-size:2.4rem}
.arena-card .card-name{font-size:.65rem}
.arena-card .card-ability{font-size:.5rem}
.arena-card .card-stats{font-size:.75rem}

/* AI Hand */
.ai-hand{display:flex;justify-content:center;gap:4px;padding:2px}
.ai-card-back{width:48px;height:68px;border-radius:6px;background:linear-gradient(145deg,#1a1a3a,#0a0a28);border:1.5px solid #333;display:flex;align-items:center;justify-content:center;font-size:.8rem;opacity:.5}

/* Player Hand */
.hand-area{width:100%;padding:4px 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hand-area::-webkit-scrollbar{display:none}
.hand{display:flex;justify-content:center;gap:4px;min-height:140px;padding:2px 4px}
.hand .card{animation:dealIn .3s ease-out backwards}
@keyframes dealIn{from{opacity:0;transform:translateY(30px) scale(.85)}}

/* Action Prompt */
.action-bar{text-align:center;padding:4px;min-height:28px;font-size:.8rem;color:var(--neon-pink)}
.action-bar.waiting{animation:actionBlink 1.2s ease-in-out infinite}
@keyframes actionBlink{0%,100%{opacity:1}50%{opacity:.4}}

/* Battle Result Overlay */
.battle-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(1.5rem,6vw,2.5rem);font-weight:900;padding:10px 28px;border-radius:12px;z-index:10;animation:popIn .35s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(0);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.overlay-win{background:rgba(57,255,20,.12);color:var(--neon-green);border:2px solid var(--neon-green);text-shadow:0 0 20px rgba(57,255,20,.5)}
.overlay-lose{background:rgba(255,68,68,.12);color:var(--neon-red);border:2px solid var(--neon-red);text-shadow:0 0 20px rgba(255,68,68,.5)}
.overlay-draw{background:rgba(255,215,0,.12);color:var(--neon-gold);border:2px solid var(--neon-gold);text-shadow:0 0 20px rgba(255,215,0,.5)}
.overlay-type{font-size:.6em;display:block;font-weight:400;margin-top:4px}

/* Particles */
.fx-particle{position:absolute;pointer-events:none;border-radius:50%;animation:particleFly .8s ease-out forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

/* Result Screen */
#result-screen{justify-content:center;gap:16px;background:radial-gradient(ellipse at 50% 40%,#1a1040 0%,var(--bg) 70%)}
.result-title{font-size:clamp(2rem,8vw,3.5rem);font-weight:900}
.result-win{color:var(--neon-green);text-shadow:0 0 30px rgba(57,255,20,.4)}
.result-lose{color:var(--neon-red);text-shadow:0 0 30px rgba(255,68,68,.4)}
.result-draw{color:var(--neon-gold);text-shadow:0 0 30px rgba(255,215,0,.4)}
.result-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px 24px;max-width:300px;width:90%}
.result-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.result-row:last-child{border-bottom:none}
.result-label{color:var(--text-dim);font-size:.85rem}
.result-value{font-weight:700;font-size:.95rem}
.rating-up{color:var(--neon-green)}
.rating-down{color:var(--neon-red)}

/* Deck Screen */
#deck-screen{padding:12px;padding-top:48px;padding-bottom:60px}
.deck-header{position:fixed;top:0;left:0;right:0;z-index:10;background:var(--bg);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1)}
.deck-header h2{font-size:1.1rem;color:var(--neon-blue)}
.deck-filter{display:flex;gap:4px;padding:4px 0;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.filter-btn{padding:4px 10px;font-size:.7rem;border:1px solid var(--text-dim);background:transparent;color:var(--text-dim);border-radius:12px;cursor:pointer;transition:all .15s}
.filter-btn.active{border-color:var(--neon-pink);color:var(--neon-pink);background:rgba(255,45,120,.1)}
.deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;width:100%}
.deck-card-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.deck-toggle{font-size:.65rem;padding:3px 8px;border:1px solid var(--text-dim);background:transparent;color:var(--text-dim);border-radius:4px;cursor:pointer}
.deck-toggle.active{border-color:var(--neon-green);color:var(--neon-green);background:rgba(57,255,20,.1)}
.deck-count-bar{position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--card-bg);border-top:2px solid var(--neon-pink);padding:10px;text-align:center;font-weight:700}
.deck-count-bar.full{border-top-color:var(--neon-green)}

/* Battle Pass Screen */
#pass-screen{padding:12px;padding-top:48px;padding-bottom:20px}
.pass-header{position:fixed;top:0;left:0;right:0;z-index:10;background:var(--bg);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1)}
.pass-header h2{font-size:1.1rem;background:linear-gradient(135deg,var(--neon-gold),#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pass-progress{width:100%;height:8px;background:#1a1a2e;border-radius:4px;margin:8px 0;overflow:hidden}
.pass-fill{height:100%;background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple));border-radius:4px;transition:width .3s}
.pass-xp-text{text-align:center;font-size:.8rem;color:var(--text-dim);margin-bottom:12px}
.pass-tiers{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px}
.pass-tier{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;transition:all .2s}
.pass-tier.claimed{border-color:var(--neon-green);background:rgba(57,255,20,.05)}
.pass-tier.locked{opacity:.5}
.pass-tier-num{font-size:1.2rem;font-weight:900;color:var(--neon-gold);min-width:28px;text-align:center}
.pass-tier-reward{flex:1}
.pass-tier-name{font-weight:700;font-size:.85rem}
.pass-tier-desc{font-size:.7rem;color:var(--text-dim)}
.pass-tier-status{font-size:.7rem;font-weight:700}

/* Card Detail Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-card{background:var(--card-bg);border:2px solid var(--neon-pink);border-radius:16px;padding:20px;max-width:280px;width:90%;text-align:center}
.modal-card .card-icon{font-size:3rem;margin:8px 0}
.modal-card .card-name{font-size:1.2rem;font-weight:700;margin:4px 0}
.modal-card .card-type-label{font-size:.75rem;padding:2px 10px;border-radius:8px;display:inline-block;margin:4px 0}
.modal-card .card-ability{font-size:.85rem;color:var(--neon-gold);margin:8px 0}
.modal-card .stat-row{display:flex;justify-content:space-around;margin:12px 0}
.modal-card .stat-item{text-align:center}
.modal-card .stat-num{font-size:1.4rem;font-weight:900}
.modal-card .stat-label{font-size:.65rem;color:var(--text-dim)}

/* Responsive */
@media(max-width:380px){
  .card{width:80px;height:114px}
  .card-icon{font-size:1.4rem}
  .card-name{font-size:.45rem}
  .arena-card{width:100px;height:140px}
  .arena-card .card-icon{font-size:2rem}
  .ai-card-back{width:40px;height:56px;font-size:.6rem}
  .btn{padding:10px 24px;font-size:.85rem}
}
@media(max-width:480px){
  .deck-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
}
@media(min-width:500px){
  .card{width:110px;height:154px}
  .card-icon{font-size:2.2rem}
  .arena-card{width:140px;height:196px}
}
</style>
</head>
<body>
<div id="app">

<div id="title-screen" class="screen active">
  <div class="title-logo">K-DECK<br>ARENA</div>
  <p class="title-sub">K-Culture Card Battle</p>
  <div class="title-rating">⭐ <span id="t-rating">1000</span></div>
  <div class="title-stats">
    <span>🏆 <span id="t-wins">0</span>W</span>
    <span>💀 <span id="t-losses">0</span>L</span>
    <span>🔥 <span id="t-streak">0</span> Streak</span>
  </div>
  <div class="btn-row">
    <button class="btn" id="btn-battle">⚔ BATTLE</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-blue btn-sm" id="btn-deck">🃏 DECK</button>
    <button class="btn btn-green btn-sm" id="btn-pass">🎖 PASS</button>
  </div>
</div>

<div id="battle-screen" class="screen">
  <div class="battle-hud">
    <div class="hud-player"><span class="name">YOU</span><span class="hud-score" id="b-pscore">0</span></div>
    <div class="hud-center"><div class="hud-round">R<span id="b-round">1</span>/5</div><div class="hud-turn" id="b-turn">YOUR TURN</div></div>
    <div class="hud-player"><span class="hud-score ai" id="b-ascore">0</span><span class="name">AI</span></div>
  </div>
  <div class="type-hint"><span>⚔ATK &gt; 🔮SPC</span><span>🔮SPC &gt; 🛡DEF</span><span>🛡DEF &gt; ⚔ATK</span></div>
  <div class="ai-hand" id="ai-hand"></div>
  <div class="arena" id="arena">
    <div class="arena-zone empty" id="ai-zone"></div>
    <div class="vs-badge" id="vs-badge">VS</div>
    <div class="arena-zone empty" id="player-zone"></div>
  </div>
  <div class="action-bar waiting" id="action-bar">카드를 선택하세요</div>
  <div class="hand-area"><div class="hand" id="player-hand"></div></div>
</div>

<div id="result-screen" class="screen">
  <div class="result-title" id="r-title">VICTORY</div>
  <div class="result-card">
    <div class="result-row"><span class="result-label">스코어</span><span class="result-value" id="r-score">3 - 2</span></div>
    <div class="result-row"><span class="result-label">레이팅</span><span class="result-value" id="r-rating">+25</span></div>
    <div class="result-row"><span class="result-label">전적</span><span class="result-value" id="r-record">1W 0L</span></div>
    <div class="result-row"><span class="result-label">연승</span><span class="result-value" id="r-streak">1</span></div>
    <div class="result-row"><span class="result-label">XP 획득</span><span class="result-value" id="r-xp" style="color:var(--neon-gold)">+50</span></div>
  </div>
  <div class="btn-row">
    <button class="btn" id="btn-rematch">⚔ REMATCH</button>
    <button class="btn btn-blue btn-sm" id="btn-home">🏠 HOME</button>
  </div>
</div>

<div id="deck-screen" class="screen">
  <div class="deck-header">
    <button class="btn btn-sm" id="btn-deck-back">← BACK</button>
    <h2>🃏 Deck Builder</h2>
  </div>
  <p style="color:var(--text-dim);font-size:.75rem;text-align:center;margin-bottom:8px">12장을 선택하세요 (매 배틀 5장 드로우)</p>
  <div class="deck-filter" id="deck-filter"></div>
  <div class="deck-grid" id="deck-grid"></div>
  <div class="deck-count-bar" id="deck-count">DECK: 0 / 12</div>
</div>

<div id="pass-screen" class="screen">
  <div class="pass-header">
    <button class="btn btn-sm" id="btn-pass-back">← BACK</button>
    <h2>🎖 BATTLE PASS</h2>
  </div>
  <div class="pass-progress"><div class="pass-fill" id="pass-fill" style="width:0%"></div></div>
  <div class="pass-xp-text" id="pass-xp-text">0 / 100 XP</div>
  <div class="pass-tiers" id="pass-tiers"></div>
</div>

<div class="modal-overlay" id="card-modal">
  <div class="modal-card" id="modal-content"></div>
</div>

</div>

<script>
'use strict';
(function(){

// ===== TELEGRAM =====
try{window.Telegram?.WebApp?.expand()}catch(e){}

// ===== CARD DATABASE =====
const CARDS=[
// ATK - K-Pop (id 1-8)
{id:1,name:"BTS 파이어",type:"atk",atk:9,def:3,pwr:7,icon:"🔥",cat:"kpop",ability:"Burn: ATK+2 vs DEF타입",fx:function(p,a){if(a.type==='def')return{atkBonus:2}}},
{id:2,name:"블랙핑크 스트라이크",type:"atk",atk:8,def:4,pwr:6,icon:"⚡",cat:"kpop",ability:"Pierce: 상대 DEF 1 무시",fx:function(p,a){return{defReduce:1}}},
{id:3,name:"스트레이키즈 돌격",type:"atk",atk:10,def:2,pwr:5,icon:"🗡️",cat:"kpop",ability:"Rush: 최고 ATK, 낮은 DEF"},
{id:4,name:"에스파 사이버슬래시",type:"atk",atk:7,def:5,pwr:8,icon:"💫",cat:"kpop",ability:"Cyber: PWR+2 판정시",fx:function(){return{pwrBonus:2}}},
{id:5,name:"세븐틴 캐럿러쉬",type:"atk",atk:8,def:3,pwr:7,icon:"💎",cat:"kpop",ability:"Carat: 승리시 다음 라운드 ATK+1"},
{id:6,name:"NCT 드림킥",type:"atk",atk:9,def:2,pwr:6,icon:"🌟",cat:"kpop",ability:"Dream: 선공 보너스 ATK+1",fx:function(){return{atkBonus:1}}},
{id:7,name:"투모로우 문슬래시",type:"atk",atk:7,def:4,pwr:7,icon:"🌙",cat:"kpop",ability:"Moon: SPC타입에 ATK+3",fx:function(p,a){if(a.type==='spc')return{atkBonus:3}}},

// ===== AUDIO =====
const SFX={
  ctx:null,
  init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume()},
  tone(f,d,t,v){try{this.init();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=t||'square';o.frequency.value=f;g.gain.setValueAtTime(v||.12,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+d);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d)}catch(e){}},
  select(){this.tone(880,.04,'sine',.08)},
  play(){this.tone(523,.07);setTimeout(()=>this.tone(659,.05),50)},
  hit(){this.tone(180,.12,'sawtooth',.1);setTimeout(()=>this.tone(130,.08,'sawtooth',.08),70)},
  win(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.tone(f,.18),i*100))},
  lose(){[400,350,300,250].forEach((f,i)=>setTimeout(()=>this.tone(f,.2,'sawtooth',.1),i*130))},
  rWin(){this.tone(784,.1);setTimeout(()=>this.tone(1047,.12),80)},
  rLose(){this.tone(280,.18,'sawtooth',.08)},
  draw(){this.tone(440,.12,'triangle',.08)},
  levelUp(){[660,770,880,990,1100].forEach((f,i)=>setTimeout(()=>this.tone(f,.15,'sine',.1),i*80))}
};

// ===== UTILS =====
const $=id=>document.getElementById(id);
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.random()*i+1|0;[b[i],b[j]]=[b[j],b[i]]}return b}
function elo(r,w,l){const K=32,e=1/(1+Math.pow(10,(1000-r)/400));const s=w>l?1:w<l?0:.5;return Math.round(r+K*(s-e))}

// ===== BATTLE LOGIC =====
function startBattle(){
  SFX.select();
  ST.round=1;ST.pScore=0;ST.aScore=0;ST.selected=null;ST.busy=false;ST.bonusAtk=0;
  const deckCards=ST.deck.map(id=>CARDS.find(c=>c.id===id)).filter(Boolean);
  ST.pHand=shuffle(deckCards).slice(0,5);
  // AI builds smarter deck
  const aiDeck=shuffle([...CARDS]).slice(0,12);
  ST.aHand=shuffle(aiDeck).slice(0,5);
  showScreen('battle');
  $('action-bar').textContent='카드를 선택하세요';
  $('action-bar').classList.add('waiting');
  $('player-zone').innerHTML='';$('player-zone').classList.add('empty');
  $('ai-zone').innerHTML='';$('ai-zone').classList.add('empty');
  $('vs-badge').textContent='VS';
  updateBattle();
}

function selectCard(id){
  if(ST.busy)return;
  SFX.select();
  ST.selected=id;
  updateBattle();
  ST.busy=true;
  $('action-bar').textContent='대결 중...';
  $('action-bar').classList.remove('waiting');
  setTimeout(()=>playRound(id),350);
}

function resolve(pC,aC){
  let pA=pC.atk+ST.bonusAtk,pD=pC.def,pP=pC.pwr;
  let aA=aC.atk,aD=aC.def,aP=aC.pwr;
  let forceTotal=false,forcePwr=false,reverseType=false,shield=false,pwrAutoWin=false;

  // Player ability
  if(pC.fx){
    const fx=pC.fx(pC,aC);
    if(fx){
      if(fx.atkBonus)pA+=fx.atkBonus;
      if(fx.defBonus)pD+=fx.defBonus;
      if(fx.pwrBonus)pP+=fx.pwrBonus;
      if(fx.defReduce)aD=Math.max(0,aD-fx.defReduce);
      if(fx.atkDebuff)aA=Math.max(0,aA-fx.atkDebuff);
      if(fx.reflect)pA+=fx.reflect;
      if(fx.counterAtk)pA+=fx.counterAtk;
      if(fx.swap){const t=pA;pA=pD;pD=t}
      if(fx.copyStats){pA=aA;pD=aD}
      if(fx.totalJudge)forceTotal=true;
      if(fx.pwrOnly)forcePwr=true;
      if(fx.reverseType)reverseType=true;
      if(fx.shield)shield=true;
      if(fx.pwrAutoWin)pwrAutoWin=true;
    }
  }
  // AI ability
  if(aC.fx){
    const fx=aC.fx(aC,pC);
    if(fx){
      if(fx.atkBonus)aA+=fx.atkBonus;
      if(fx.defBonus)aD+=fx.defBonus;
      if(fx.pwrBonus)aP+=fx.pwrBonus;
      if(fx.defReduce)pD=Math.max(0,pD-fx.defReduce);
      if(fx.atkDebuff)pA=Math.max(0,pA-fx.atkDebuff);
      if(fx.reflect)aA+=fx.reflect;
      if(fx.counterAtk)aA+=fx.counterAtk;
      if(fx.swap){const t=aA;aA=aD;aD=t}
      if(fx.copyStats){aA=pA;aD=pD}
      if(fx.totalJudge)forceTotal=true;
      if(fx.pwrOnly)forcePwr=true;
    }
  }

  // Type advantage
  let typeAdv=0; // +1 player advantage, -1 AI advantage
  const ta=(reverseType)?
    {atk:'def',def:'spc',spc:'atk',sup:'sup'}:
    {atk:'spc',spc:'def',def:'atk',sup:'sup'};
  if(ta[pC.type]===aC.type)typeAdv=1;
  if(ta[aC.type]===pC.type)typeAdv=-1;

  let result,reason;
  if(pwrAutoWin){
    result='win';reason='PWR 무조건 승';
  }else if(forcePwr){
    const pp=pP+typeAdv*2,ap=aP-typeAdv*2;
    result=pp>ap?'win':pp<ap?'lose':'draw';
    reason=`PWR ${pp} vs ${ap}`;
  }else if(forceTotal){
    const pT=pA+pD+typeAdv*2,aT=aA+aD-typeAdv*2;
    result=pT>aT?'win':pT<aT?'lose':'draw';
    reason=`TOTAL ${pT} vs ${aT}`;
  }else{
    const pDmg=Math.max(0,pA-aD)+typeAdv*2;
    const aDmg=Math.max(0,aA-pD)-typeAdv*2;
    const finalADmg=shield?0:aDmg;
    result=pDmg>finalADmg?'win':pDmg<finalADmg?'lose':'draw';
    reason=`DMG ${pDmg} vs ${finalADmg}${typeAdv!==0?(typeAdv>0?' (타입↑)':' (타입↓)'):''}${shield?' [Shield!]':''}`;
  }
  return{result,reason};
}

function playRound(cardId){
  const pC=ST.pHand.find(c=>c.id===cardId);
  const aiIdx=Math.floor(Math.random()*ST.aHand.length);
  const aC=ST.aHand[aiIdx];
  ST.pHand=ST.pHand.filter(c=>c.id!==cardId);
  ST.aHand=ST.aHand.filter((_,i)=>i!==aiIdx);

  SFX.play();
  $('player-zone').innerHTML=cardHTML(pC,'arena-card');$('player-zone').classList.remove('empty');
  $('ai-zone').innerHTML=cardHTML(aC,'arena-card');$('ai-zone').classList.remove('empty');

  const{result,reason}=resolve(pC,aC);

  setTimeout(()=>{
    SFX.hit();
    const arena=$('arena');
    const ov=document.createElement('div');
    ov.className=`battle-overlay overlay-${result}`;
    ov.innerHTML=(result==='win'?'WIN!':result==='lose'?'LOSE':'DRAW')+`<span class="overlay-type">${reason}</span>`;
    arena.appendChild(ov);

    if(result==='win'){ST.pScore++;SFX.rWin();if(pC.id===5)ST.bonusAtk=1}
    else if(result==='lose'){ST.aScore++;SFX.rLose();ST.bonusAtk=0}
    else{SFX.draw();ST.bonusAtk=0}

    spawnFx(arena,result);
    $('b-pscore').textContent=ST.pScore;
    $('b-ascore').textContent=ST.aScore;

    setTimeout(()=>{
      ov.remove();
      $('player-zone').innerHTML='';$('player-zone').classList.add('empty');
      $('ai-zone').innerHTML='';$('ai-zone').classList.add('empty');
      if(ST.round>=ST.maxRounds)endBattle();
      else{ST.round++;ST.selected=null;ST.busy=false;$('action-bar').textContent='카드를 선택하세요';$('action-bar').classList.add('waiting');updateBattle()}
    },1100);
  },550);
}

function spawnFx(container,r){
  const cols=r==='win'?['#39ff14','#00d4ff']:r==='lose'?['#ff4444','#ff2d78']:['#ffd700','#ffaa00'];
  for(let i=0;i<10;i++){
    const p=document.createElement('div');
    p.className='fx-particle';
    const sz=4+Math.random()*6;
    const dx=(Math.random()-.5)*120,dy=-30-Math.random()*80;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%2]};left:calc(50% + ${(Math.random()-.5)*40}px);top:calc(50% + ${(Math.random()-.5)*20}px);--dx:${dx}px;--dy:${dy}px`;
    container.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

function endBattle(){
  const pS=ST.pScore,aS=ST.aScore;
  const oldR=ST.rating;
  ST.rating=elo(ST.rating,pS,aS);
  const diff=ST.rating-oldR;
  let xpGain=30;

  if(pS>aS){ST.wins++;ST.streak++;xpGain=50+ST.streak*10;SFX.win()}
  else if(pS<aS){ST.losses++;ST.streak=0;xpGain=20;SFX.lose()}
  else{ST.draws++;xpGain=35;SFX.draw()}

  ST.xp+=xpGain;
  // Check pass level ups
  let leveled=false;
  while(ST.passLevel<PASS_TIERS.length&&ST.xp>=PASS_TIERS[ST.passLevel].xp){ST.passLevel++;leveled=true}
  if(leveled)setTimeout(()=>SFX.levelUp(),500);

  save();

  const el=$('r-title');
  if(pS>aS){el.textContent='VICTORY!';el.className='result-title result-win'}
  else if(pS<aS){el.textContent='DEFEAT';el.className='result-title result-lose'}
  else{el.textContent='DRAW';el.className='result-title result-draw'}

  $('r-score').textContent=`${pS} - ${aS}`;
  const rd=$('r-rating');
  rd.textContent=`${diff>=0?'+':''}${diff} (${ST.rating})`;
  rd.className=`result-value ${diff>=0?'rating-up':'rating-down'}`;
  $('r-record').textContent=`${ST.wins}W ${ST.losses}L ${ST.draws}D`;
  $('r-streak').textContent=ST.streak;
  $('r-streak').style.color=ST.streak>=3?'var(--neon-gold)':'var(--text)';
  $('r-xp').textContent=`+${xpGain} XP${leveled?' 🆙':''}`;
  showScreen('result');
}

// ===== DECK BUILDER =====
function renderDeck(){
  // Filters
  const filters=[{key:'all',label:'전체'},{key:'atk',label:'⚔ ATK'},{key:'def',label:'🛡 DEF'},{key:'spc',label:'🔮 SPC'},{key:'sup',label:'🌿 SUP'}];
  $('deck-filter').innerHTML=filters.map(f=>`<button class="filter-btn ${ST.filter===f.key?'active':''}" data-f="${f.key}">${f.label}</button>`).join('');
  $('deck-filter').querySelectorAll('.filter-btn').forEach(b=>{b.onclick=()=>{ST.filter=b.dataset.f;renderDeck()}});

  const filtered=ST.filter==='all'?CARDS:CARDS.filter(c=>c.type===ST.filter);
  $('deck-grid').innerHTML=filtered.map(c=>{
    const inDeck=ST.deck.includes(c.id);
    return`<div class="deck-card-wrap">
${cardHTML(c)}
<button class="deck-toggle ${inDeck?'active':''}" data-id="${c.id}">${inDeck?'✓ 편성':'+ 추가'}</button>
</div>`}).join('');

  // Card click = detail modal
  $('deck-grid').querySelectorAll('.card').forEach(el=>{
    el.onclick=()=>showCardDetail(+el.dataset.id);
  });
  $('deck-grid').querySelectorAll('.deck-toggle').forEach(b=>{
    b.onclick=e=>{e.stopPropagation();toggleDeck(+b.dataset.id)};
  });
  const cnt=ST.deck.length;
  const bar=$('deck-count');
  bar.textContent=`DECK: ${cnt} / 12`;
  bar.classList.toggle('full',cnt===12);
}

function toggleDeck(id){
  SFX.select();
  if(ST.deck.includes(id))ST.deck=ST.deck.filter(x=>x!==id);
  else{if(ST.deck.length>=12)return;ST.deck.push(id)}
  save();renderDeck();
}

function showCardDetail(id){

  const typeColors={atk:'var(--neon-red)',def:'var(--neon-blue)',spc:'var(--neon-purple)',sup:'var(--neon-green)'};
  $('modal-content').innerHTML=`
<div class="card-icon">${c.icon}</div>
<div class="card-name">${c.name}</div>
<span class="card-type-label" style="background:${typeColors[c.type]};color:#fff">${c.type.toUpperCase()} · ${c.cat}</span>
<div class="card-ability">${c.ability}</div>
<div class="stat-row">
<div class="stat-item"><div class="stat-num stat-atk">${c.atk}</div><div class="stat-label">ATK</div></div>
<div class="stat-item"><div class="stat-num stat-def">${c.def}</div><div class="stat-label">DEF</div></div>
<div class="stat-item"><div class="stat-num stat-pwr">${c.pwr}</div><div class="stat-label">PWR</div></div>
</div>
<button class="btn btn-sm" style="margin-top:12px" onclick="document.getElementById('card-modal').classList.remove('show')">닫기</button>`;
  $('card-modal').classList.add('show');
}

// ===== BATTLE PASS =====
function renderPass(){
  const curXP=ST.xp;
  const nextTier=PASS_TIERS[ST.passLevel]||PASS_TIERS[PASS_TIERS.length-1];
  const prevXP=ST.passLevel>0?PASS_TIERS[ST.passLevel-1].xp:0;
  const pct=Math.min(100,((curXP-prevXP)/(nextTier.xp-prevXP))*100);
  $('pass-fill').style.width=pct+'%';
  $('pass-xp-text').textContent=`${curXP} / ${nextTier.xp} XP (Tier ${ST.passLevel+1})`;
  $('pass-tiers').innerHTML=PASS_TIERS.map((t,i)=>{
    const claimed=i<ST.passLevel;
    const current=i===ST.passLevel;
    return`<div class="pass-tier ${claimed?'claimed':current?'':'locked'}">
<div class="pass-tier-num">${t.tier}</div>
<div class="pass-tier-reward"><div class="pass-tier-name">${t.name}</div><div class="pass-tier-desc">${t.desc}</div></div>
<div class="pass-tier-status" style="color:${claimed?'var(--neon-green)':current?'var(--neon-gold)':'var(--text-dim)'}">${claimed?'✓ 획득':current?'진행중':'🔒'}</div>
</div>`}).join('');
}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(ST.screen==='title'){
    if(e.key==='Enter'||e.key===' ')startBattle();
    if(e.key==='d')openDeck();
    if(e.key==='p')openPass();
  }else if(ST.screen==='battle'&&!ST.busy){
    const n=+e.key;
    if(n>=1&&n<=ST.pHand.length)selectCard(ST.pHand[n-1].id);
  }else if(ST.screen==='result'){
    if(e.key==='Enter'||e.key===' ')startBattle();
    if(e.key==='Escape')goHome();
  }else if(ST.screen==='deck'||ST.screen==='pass'){
    if(e.key==='Escape')goHome();
  }
});

function openDeck(){SFX.select();renderDeck();showScreen('deck')}
function openPass(){SFX.select();renderPass();showScreen('pass')}
function goHome(){SFX.select();updateTitle();showScreen('title')}

// ===== EVENTS =====
$('btn-battle').onclick=startBattle;
$('btn-deck').onclick=openDeck;
$('btn-pass').onclick=openPass;
$('btn-rematch').onclick=startBattle;
$('btn-home').onclick=goHome;
$('btn-deck-back').onclick=goHome;
$('btn-pass-back').onclick=goHome;
$('card-modal').onclick=e=>{if(e.target===$('card-modal'))$('card-modal').classList.remove('show')};

// Prevent zoom
document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault()},{passive:false});

// ===== INIT =====
loadSave();
updateTitle();

})();
</script>
