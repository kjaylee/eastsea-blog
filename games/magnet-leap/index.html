<body>

<script>
// ── Audio Engine ──────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, dur, vol=0.3, attack=0.01, decay=0.1) {
  try {
    const osc = AC.createOscillator();
    const gain = AC.createGain();
    osc.connect(gain); gain.connect(AC.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, AC.currentTime);
    gain.gain.setValueAtTime(0, AC.currentTime);
    gain.gain.linearRampToValueAtTime(vol, AC.currentTime + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    osc.start(); osc.stop(AC.currentTime + dur + 0.05);
  } catch(e){}
}
function sfxJump() {
  playTone(440, 'sine', 0.15, 0.25, 0.01, 0.12);
  playTone(660, 'sine', 0.1, 0.1, 0.02, 0.08);
}
function sfxBounce() {
  playTone(880, 'sine', 0.2, 0.35, 0.005, 0.15);
  playTone(1320, 'sine', 0.18, 0.2, 0.005, 0.12);
  playTone(1760, 'sine', 0.1, 0.1, 0.01, 0.1);
}
function sfxStick() {
  playTone(110, 'sawtooth', 0.2, 0.3, 0.01, 0.15);
  playTone(80, 'square', 0.15, 0.15, 0.01, 0.12);
}
function sfxGem() {
  [880,1100,1320,1760].forEach((f,i)=>{
    const g = AC.createGain(), o = AC.createOscillator();
    o.connect(g); g.connect(AC.destination);
    o.type='sine'; o.frequency.value=f;
    const t = AC.currentTime + i*0.06;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.15,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.start(t); o.stop(t+0.2);
  });
}
function sfxDie() {
  [440,330,220,110].forEach((f,i)=>{
    playTone(f,'sawtooth',0.25,0.2,0.01,0.2, 0); // staggered
    setTimeout(()=>playTone(f,'sawtooth',0.25,0.2),i*80);
  });
}

// ── Canvas Setup ─────────────────────────────────────────────
const wrap = document.getElementById('wrap');
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H;

function resize() {
  W = wrap.clientWidth; H = wrap.clientHeight;
  cv.width = W; cv.height = H;
}
resize();
new ResizeObserver(resize).observe(wrap);

// ── Game State ───────────────────────────────────────────────
const GRAVITY = 0.45;
const JUMP_VEL = -12;
const PLAT_W_MIN = 60, PLAT_W_MAX = 120;
const PLAT_H = 14;
const SCROLL_SPEED_BASE = 1.2;
const GEM_SIZE = 8;
const COLORS = {
  BLUE: { plat1:'#1565c0', plat2:'#42a5f5', player:'#4fc3f7', label:'🔵' },
  RED:  { plat1:'#b71c1c', plat2:'#ef5350', player:'#ef5350', label:'🔴' },
  GREY: { plat1:'#37474f', plat2:'#78909c', player:'#90a4ae', label:'⚪' }
};

let player, platforms, gems, score, best, cameraY, gameActive, keys, scrollSpeed;
let lastJump = 0, onGround = false, jumpPressed = false, togglePressed = false;

best = parseInt(localStorage.getItem('magnetleap_best') || '0');
document.getElementById('best').textContent = best;
document.getElementById('bestShow').textContent = best;

function initGame() {
  W = wrap.clientWidth; H = wrap.clientHeight;
  cv.width = W; cv.height = H;

  player = {
    x: W/2 - 12, y: H - 120,
    w: 24, h: 28,
    vy: 0, vx: 0,
    polarity: 'BLUE', // BLUE or RED
    onPlatform: null,
    bounceFlash: 0,
    stickFlash: 0
  };

  cameraY = 0;
  scrollSpeed = SCROLL_SPEED_BASE;
  score = 0;
  onGround = false;

  // Generate initial platforms
  platforms = [];
  gems = [];
  // Starting platform (always grey, wide)
  platforms.push({ x: W/2 - 80, y: H - 80, w: 160, h: PLAT_H, type:'GREY', vy:0 });
  // Generate more above
  for (let i = 0; i < 18; i++) generatePlatform(H - 80 - 80*(i+1));
  generateGems();
}

function getPlatformType(y) {
  // Higher up = more colored platforms
  const heightScore = (H - 80 - y) / 80; // how many platforms up
  if (heightScore < 3) return 'GREY';
  const r = Math.random();
  if (heightScore < 7) return r < 0.6 ? 'GREY' : (r < 0.8 ? 'BLUE' : 'RED');
  return r < 0.15 ? 'GREY' : (r < 0.6 ? 'BLUE' : 'RED');
}

function generatePlatform(y) {
  const pw = PLAT_W_MIN + Math.random() * (PLAT_W_MAX - PLAT_W_MIN);
  const px = Math.random() * (W - pw - 20) + 10;
  const type = getPlatformType(y);
  const moving = score > 500 && Math.random() < 0.3;
  platforms.push({
    x: px, y: y, w: pw, h: PLAT_H, type,
    vy: moving ? (Math.random() < 0.5 ? -0.8 : 0.8) * Math.random() * 0.8 : 0,
    velDir: 1,
    rangeY: y,
    rangeAmp: 30 + Math.random() * 20
  });
}

function generateGems() {
  const topY = platforms.length > 0 ? Math.min(...platforms.map(p => p.y)) : 0;
  for (let p of platforms) {
    if (Math.random() < 0.35 && p.type !== 'GREY') {
      gems.push({ x: p.x + p.w/2, y: p.y - 25, collected: false, flash: 0 });
    }
  }
}

// ── Input ────────────────────────────────────────────────────
keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code==='Space' || e.code==='ArrowUp' || e.code==='KeyW') {
    if (!jumpPressed) { jumpPressed = true; handleJump(); }
  }
  if (e.code==='KeyX' || e.code==='KeyZ') {
    if (!togglePressed) { togglePressed = true; handleToggle(); }
  }
  e.preventDefault && ['Space','ArrowUp','ArrowDown'].includes(e.code) && e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') jumpPressed = false;
  if (e.code==='KeyX'||e.code==='KeyZ') togglePressed = false;
});

// Touch controls
document.getElementById('tJump').addEventListener('touchstart', e => {
  e.preventDefault(); AC.resume(); handleJump();
}, {passive:false});
document.getElementById('tToggle').addEventListener('touchstart', e => {
  e.preventDefault(); AC.resume(); handleToggle();
}, {passive:false});

function handleJump() {
  if (!gameActive) return;
  const now = Date.now();
  if (onGround && now - lastJump > 200) {
    player.vy = JUMP_VEL;
    onGround = false;
    lastJump = now;
    sfxJump();
  }
}

function handleToggle() {
  if (!gameActive) return;
  player.polarity = player.polarity === 'BLUE' ? 'RED' : 'BLUE';
  // Flash
  player.bounceFlash = 0;
  updatePolarDisplay();
}

function updatePolarDisplay() {
  const pd = document.getElementById('polarDisplay');
  const c = COLORS[player.polarity];
  pd.textContent = c.label + ' ' + (player.polarity === 'BLUE' ? '청자극' : '홍자극');
  pd.style.background = player.polarity === 'BLUE' ? 'rgba(21,101,192,0.7)' : 'rgba(183,28,28,0.7)';
}

// ── Game Loop ────────────────────────────────────────────────
let raf;
function gameLoop() {
  if (!gameActive) return;
  update();
  draw();
  raf = requestAnimationFrame(gameLoop);
}

let frameCount = 0;
function update() {
  frameCount++;
  // Difficulty ramp
  scrollSpeed = SCROLL_SPEED_BASE + Math.min(score / 800, 2.5);

  // Scroll platforms down
  for (let p of platforms) {
    p.y += scrollSpeed;
    if (p.vy !== 0) {
      p.rangeY += scrollSpeed;
      p.y += p.vy * p.velDir;
      if (Math.abs(p.y - p.rangeY) > p.rangeAmp) p.velDir *= -1;
    }
  }
  for (let g of gems) g.y += scrollSpeed;

  // Remove off-screen platforms and add new ones
  platforms = platforms.filter(p => p.y < H + 50);
  while (platforms.length < 20) {
    const topY = platforms.length > 0 ? Math.min(...platforms.map(p => p.y)) : 0;
    generatePlatform(topY - 70 - Math.random() * 40);
    generateGems();
  }

  // Physics
  player.vy += GRAVITY;
  player.vy = Math.min(player.vy, 18); // terminal velocity
  player.y += player.vy;

  // Platform collision
  onGround = false;
  if (player.vy >= 0) {
    for (let p of platforms) {
      const px = player.x, py = player.y;
      const pw = player.w, ph = player.h;
      // Feet overlap check
      if (px + pw > p.x + 4 && px < p.x + p.w - 4 &&
          py + ph >= p.y && py + ph <= p.y + PLAT_H + Math.abs(player.vy) + 2 &&
          py + ph - player.vy <= p.y + 2) {
        
        const effect = getPlatformEffect(p.type, player.polarity);
        if (effect === 'bounce') {
          player.vy = JUMP_VEL * 2.4; // big bounce
          player.y = p.y - ph;
          player.bounceFlash = 12;
          sfxBounce();
        } else if (effect === 'stick') {
          player.vy = Math.abs(player.vy) * -0.15;
          player.y = p.y - ph;
          player.stickFlash = 10;
          onGround = true;
          sfxStick();
        } else {
          player.vy = 0;
          player.y = p.y - ph;
          onGround = true;
        }
        break;
      }
    }
  }

  // Score: height climbed = scrollSpeed × frames
  score += scrollSpeed * 0.05;
  score = Math.round(score);
  document.getElementById('score').textContent = score;

  // Gem collection
  for (let g of gems) {
    if (!g.collected &&
        player.x < g.x + GEM_SIZE && player.x + player.w > g.x - GEM_SIZE &&
        player.y < g.y + GEM_SIZE && player.y + player.h > g.y - GEM_SIZE) {
      g.collected = true;
      g.flash = 20;
      score += 10;
      sfxGem();
    }
  }
  gems = gems.filter(g => !g.collected || g.flash > 0);
  for (let g of gems) if (g.flash > 0) g.flash--;

  // Decrease flashes
  if (player.bounceFlash > 0) player.bounceFlash--;
  if (player.stickFlash > 0) player.stickFlash--;

  // Player stays in horizontal bounds
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > W) player.x = W - player.w;

  // Keyboard horizontal
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= 4;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += 4;

  // Die: fell off bottom
  if (player.y > H + 40) {
    endGame();
  }

  updatePolarDisplay();
}

function getPlatformEffect(platType, playerPolarity) {
  if (platType === 'GREY') return 'normal';
  if (platType === playerPolarity) return 'bounce';
  return 'stick';
}

function draw() {
  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a0050');
  bg.addColorStop(1, '#12003e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Starfield
  ctx.fillStyle = 'rgba(200,180,255,0.5)';
  const seed = frameCount * 0.5;
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 73 + 17) % W);
    const sy = ((i * 97 + 31 + frameCount * 0.2) % H);
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Platforms
  for (let p of platforms) {
    if (p.y > H + 20 || p.y < -20) continue;
    const c = COLORS[p.type];
    const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    grad.addColorStop(0, c.plat2);
    grad.addColorStop(1, c.plat1);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, p.w, p.h, 4);
    ctx.fill();
    // Glow for colored platforms
    if (p.type !== 'GREY') {
      ctx.shadowColor = c.plat2;
      ctx.shadowBlur = 8;
      ctx.strokeStyle = c.plat2;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  // Gems
  for (let g of gems) {
    if (g.collected) continue;
    const pulse = 0.7 + 0.3 * Math.sin(frameCount * 0.1 + g.x);
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(frameCount * 0.03);
    ctx.shadowColor = '#ffd54f';
    ctx.shadowBlur = 10 * pulse;
    ctx.fillStyle = '#ffd54f';
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(0, -GEM_SIZE); ctx.lineTo(GEM_SIZE, 0);
    ctx.lineTo(0, GEM_SIZE); ctx.lineTo(-GEM_SIZE, 0);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Player
  drawPlayer();
}

function drawPlayer() {
  const c = COLORS[player.polarity];
  const px = Math.round(player.x), py = Math.round(player.y);
  const pw = player.w, ph = player.h;

  // Bounce flash: white ring
  if (player.bounceFlash > 0) {
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 20 + player.bounceFlash * 2;
  } else if (player.stickFlash > 0) {
    ctx.shadowColor = '#ff6f00';
    ctx.shadowBlur = 15;
  } else {
    ctx.shadowColor = c.player;
    ctx.shadowBlur = 12;
  }

  // Body
  ctx.fillStyle = c.player;
  ctx.beginPath();
  ctx.roundRect(px, py, pw, ph, 6);
  ctx.fill();

  // Polarity symbol on body
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${pw - 6}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(player.polarity === 'BLUE' ? '−' : '+', px + pw/2, py + ph/2 + 1);

  // Magnetic aura
  const alpha = 0.15 + 0.1 * Math.sin(frameCount * 0.12);
  ctx.strokeStyle = c.player;
  ctx.lineWidth = 2;
  ctx.globalAlpha = alpha;
  for (let r = 1; r <= 2; r++) {
    ctx.beginPath();
    ctx.roundRect(px - r*6, py - r*4, pw + r*12, ph + r*8, 8 + r*4);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ── Game Start / End ─────────────────────────────────────────
function startGame() {
  AC.resume();
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('gameOver').style.display = 'none';
  gameActive = true;
  initGame();
  updatePolarDisplay();
  if (raf) cancelAnimationFrame(raf);
  gameLoop();
}

function endGame() {
  gameActive = false;
  cancelAnimationFrame(raf);
  sfxDie();
  if (score > best) {
    best = score;
    localStorage.setItem('magnetleap_best', best);
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalBest').textContent = best;
  document.getElementById('best').textContent = best;
  document.getElementById('bestShow').textContent = best;
  document.getElementById('gameOver').style.display = 'flex';
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
cv.addEventListener('touchstart', e => {
  AC.resume();
  if (!gameActive) return;
  // Left half = jump, right half = toggle (handled by touch buttons)
}, {passive:true});

// Initial draw of background
(function initDraw() {
  resize();
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a0050');
  bg.addColorStop(1, '#12003e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
})();
