  <style>
    :root{
      --bg:#0a0a1a;
      --panel:#14142b;
      --neon:#4de8ff;
      --accent:#ff4dc4;
      --good:#7dff8a;
      --warn:#ffd166;
      --text:#ecf4ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:radial-gradient(circle at top,var(--panel),var(--bg) 50%);
      color:var(--text);
      font-family:"Pretendard","Apple SD Gothic Neo",system-ui,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .wrap{
      width:min(94vw,460px);
      background:rgba(14,14,30,.94);
      border:1px solid rgba(77,232,255,.4);
      border-radius:18px;
      padding:14px;
      box-shadow:0 0 28px rgba(77,232,255,.22);
    }
    h1{margin:0;font-size:clamp(1.1rem,4.3vw,1.45rem)}
    p{margin:.4rem 0 .7rem;color:#bfcae6;font-size:.92rem}
    .hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
    .card{background:#101026;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px;text-align:center;font-size:.8rem}
    .card b{display:block;font-size:1rem;color:var(--neon)}
    canvas{
      width:100%;
      aspect-ratio:9/14;
      background:linear-gradient(#0f1024,#090915);
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      display:block;
      touch-action:none;
    }
    .controls{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    button{
      border:none;
      border-radius:12px;
      padding:11px 8px;
      color:#fff;
      background:#1b1b36;
      border:1px solid rgba(255,255,255,.14);
      font-weight:700;
      letter-spacing:.02em;
    }
    button:active{transform:translateY(1px)}
    .pulse{background:linear-gradient(120deg,#372056,#572f86)}
    .note{font-size:.78rem;color:#9da9cc;margin-top:8px}

<body>
  <main class="wrap">
    <h1>🚄 Magnet Metro Marshal</h1>
    <p>좌우 차선 변경과 Pulse 방벽으로 승객 캡슐을 모으고 차단벽을 회피하세요.</p>
    <section class="hud">
      <div class="card">Score<b id="score">0</b></div>
      <div class="card">Best<b id="best">0</b></div>
      <div class="card">Lives<b id="lives">3</b></div>
    </section>
    <canvas id="game" width="360" height="560" aria-label="Magnet Metro Marshal"></canvas>
    <div class="controls">
      <button id="leftBtn">◀ LEFT</button>
      <button id="pulseBtn" class="pulse">⚡ PULSE</button>
      <button id="rightBtn">RIGHT ▶</button>
    </div>
    <div class="note">키보드: ←/→ 이동 · Space 펄스 · Enter 재시작</div>
  </main>

  <script>
  (() => {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const livesEl = document.getElementById('lives');

    const storeKey = 'magnet-metro-marshal-best';
    let best = Number(localStorage.getItem(storeKey) || 0);
    bestEl.textContent = best;

    let audioCtx;
    function beep(freq = 440, dur = 0.08, type = 'sine', vol = 0.05){
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime + dur);
    }

    const lanes = [90, 180, 270];
    let state;

    function reset(){
      state = {
        targetLane: 1,
        playerX: lanes[1],
        y: 505,
        score: 0,
        lives: 3,
        speed: 2.6,
        items: [],
        spawn: 0,
        over: false,
        pulseCd: 0,
        pulseFlash: 0,
      };
      syncHud();
    }

    function syncHud(){
      scoreEl.textContent = Math.floor(state.score);
      livesEl.textContent = state.lives;
      bestEl.textContent = best;
    }

    function addItem(){
      const kind = Math.random() < 0.67 ? 'capsule' : 'wall';
      state.items.push({lane: Math.floor(Math.random()*3), y: -40, kind});
    }

    function move(dir){
      if(state.over) return;
      state.targetLane = Math.max(0, Math.min(2, state.targetLane + dir));
      beep(280 + state.targetLane * 50, .05, 'triangle', .04);
    }

    function pulse(){
      if(state.over || state.pulseCd > 0) return;
      state.pulseCd = 130;
      state.pulseFlash = 12;
      state.items = state.items.filter(i => {
        const near = Math.abs(i.y - state.y) < 115;
        if(near && i.kind === 'wall') beep(760,.04,'square',.05);
        return !(near && i.kind === 'wall');
      });
      beep(910, .1, 'sawtooth', .07);
    }

    function loseLife(){
      state.lives--;
      beep(120,.12,'sawtooth',.07);
      if(state.lives <= 0){
        state.over = true;
        if(state.score > best){
          best = Math.floor(state.score);
          localStorage.setItem(storeKey, best);
        }
      }
      syncHud();
    }

    function update(){
      if(state.over) return;

      state.spawn--;
      if(state.spawn <= 0){
        addItem();
        state.spawn = Math.max(16, 42 - Math.floor(state.score / 100));
      }

      state.speed += 0.0007;
      if(state.pulseCd > 0) state.pulseCd--;
      if(state.pulseFlash > 0) state.pulseFlash--;

      const tx = lanes[state.targetLane];
      if(Math.abs(tx - state.playerX) > 1){
        state.playerX += (tx - state.playerX) * 0.22;
      } else {
        state.playerX = tx;
      }

      state.items.forEach(i => i.y += state.speed);
      state.items = state.items.filter(i => i.y < canvas.height + 40);

      const playerX = state.playerX;
      for(const i of state.items){
        const hitY = Math.abs(i.y - state.y) < 30;
        const hitX = Math.abs(lanes[i.lane] - playerX) < 34;
        if(hitY && hitX){
          if(i.kind === 'capsule'){
            state.score += 24;
            beep(640,.04,'triangle',.05);
            i.y = 9999;
          } else {
            i.y = 9999;
            loseLife();
          }
        }
      }

      state.score += 0.42;
      syncHud();
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for(let i=0;i<3;i++){
        const x = lanes[i];
        ctx.strokeStyle = 'rgba(77,232,255,.26)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();
      }

      state.items.forEach(i => {
        const x = lanes[i.lane];
        if(i.kind === 'capsule'){
          ctx.fillStyle = '#7dff8a';
          ctx.beginPath();ctx.arc(x,i.y,11,0,Math.PI*2);ctx.fill();
          ctx.strokeStyle = 'rgba(125,255,138,.45)';
          ctx.stroke();
        } else {
          ctx.fillStyle = '#ff4d6d';
          ctx.fillRect(x-20,i.y-13,40,26);
        }
      });

      const px = state.playerX;
      ctx.fillStyle = '#4de8ff';
      ctx.beginPath();
      ctx.moveTo(px,state.y-22);
      ctx.lineTo(px-22,state.y+20);
      ctx.lineTo(px+22,state.y+20);
      ctx.closePath();
      ctx.fill();

      if(state.pulseFlash > 0){
        ctx.strokeStyle = `rgba(255,77,196,${state.pulseFlash/12})`;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(px,state.y,70 + (12-state.pulseFlash)*6,0,Math.PI*2);
        ctx.stroke();
      }

      if(state.over){
        ctx.fillStyle = 'rgba(10,10,26,.82)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
        ctx.font = '16px sans-serif';
        ctx.fillText(`Score ${Math.floor(state.score)} / Best ${best}`, canvas.width/2, canvas.height/2 + 10);
        ctx.fillText('Enter 또는 화면 탭으로 재시작', canvas.width/2, canvas.height/2 + 38);
      }
    }

    function loop(){
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function restartIfOver(){
      if(state.over) reset();
    }

    window.addEventListener('keydown', e => {
      if(['ArrowLeft','ArrowRight',' ','Enter'].includes(e.key)) e.preventDefault();
      if(e.key === 'ArrowLeft') move(-1);
      if(e.key === 'ArrowRight') move(1);
      if(e.key === ' ') pulse();
      if(e.key === 'Enter') restartIfOver();
    }, {passive:false});

    function bindHold(btn, fn){
      const run = (e) => { e.preventDefault(); fn(); if(state.over) restartIfOver(); };
      btn.addEventListener('touchstart', run, {passive:false});
      btn.addEventListener('mousedown', run);
    }

    bindHold(document.getElementById('leftBtn'), () => move(-1));
    bindHold(document.getElementById('rightBtn'), () => move(1));
    bindHold(document.getElementById('pulseBtn'), pulse);

    canvas.addEventListener('touchstart', e => { e.preventDefault(); restartIfOver(); }, {passive:false});
    canvas.addEventListener('mousedown', restartIfOver);

    reset();
    loop();
  })();
  </script>
