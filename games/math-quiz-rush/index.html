<body>
    <div id="gameContainer">
        <div id="gamePlay">
            <div id="header">
                <div>Score: <span id="score">0</span></div>
                <div>Best: <span id="best">0</span></div>
            </div>
            <div id="timer">
                <div id="timerBar" style="width: 100%"></div>
            </div>
            <div id="question">5 + 3 = ?</div>
            <div id="answers"></div>
        </div>
        <div id="gameOver">
            <h2>Time's Up! ⏰</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <p>Best: <span id="finalBest">0</span></p>
            <p>Correct: <span id="correctCount">0</span></p>
            <button id="restart">Play Again</button>
        </div>
    </div>

    <script>
        const questionEl = document.getElementById('question');
        const answersEl = document.getElementById('answers');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const timerBarEl = document.getElementById('timerBar');
        const gamePlayEl = document.getElementById('gamePlay');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const finalBestEl = document.getElementById('finalBest');
        const correctCountEl = document.getElementById('correctCount');
        const restartBtn = document.getElementById('restart');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq, duration, type = 'sine') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        let score = 0;
        let best = parseInt(localStorage.getItem('mathQuizBest') || '0');
        let correctAnswers = 0;
        let currentAnswer = 0;
        let timeLeft = 100;
        let gameActive = true;
        let difficulty = 1;

        const operators = ['+', '-', '×', '÷'];

        function generateQuestion() {
            difficulty = Math.min(10, Math.floor(score / 5) + 1);
            
            const operator = operators[Math.floor(Math.random() * operators.length)];
            let num1, num2, answer;

            switch(operator) {
                case '+':
                    num1 = Math.floor(Math.random() * (10 * difficulty)) + 1;
                    num2 = Math.floor(Math.random() * (10 * difficulty)) + 1;
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * (10 * difficulty)) + difficulty;
                    num2 = Math.floor(Math.random() * num1) + 1;
                    answer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * (5 + difficulty)) + 1;
                    num2 = Math.floor(Math.random() * (5 + difficulty)) + 1;
                    answer = num1 * num2;
                    break;
                case '÷':
                    num2 = Math.floor(Math.random() * (5 + difficulty)) + 1;
                    answer = Math.floor(Math.random() * (5 + difficulty)) + 1;
                    num1 = num2 * answer;
                    break;
            }

            currentAnswer = answer;
            questionEl.textContent = `${num1} ${operator} ${num2} = ?`;

            // Generate answer options
            const answers = [answer];
            while (answers.length < 4) {
                const offset = Math.floor(Math.random() * (difficulty * 4)) + 1;
                const wrong = answer + (Math.random() > 0.5 ? offset : -offset);
                if (wrong > 0 && !answers.includes(wrong)) {
                    answers.push(wrong);
                }
            }

            // Shuffle answers
            answers.sort(() => Math.random() - 0.5);

            // Display answers
            answersEl.innerHTML = '';
            answers.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = ans;
                btn.addEventListener('click', () => checkAnswer(ans, btn));
                answersEl.appendChild(btn);
            });

            // Reset timer
            timeLeft = 100;
        }

        function checkAnswer(selected, btn) {
            if (!gameActive) return;

            const buttons = answersEl.querySelectorAll('.answer-btn');
            buttons.forEach(b => b.disabled = true);

            if (selected === currentAnswer) {
                btn.classList.add('correct');
                score++;
                correctAnswers++;
                scoreEl.textContent = score;
                playSound(523, 0.1, 'sine');
                
                setTimeout(() => {
                    generateQuestion();
                }, 300);
            } else {
                btn.classList.add('wrong');
                // Highlight correct answer
                buttons.forEach(b => {
                    if (parseInt(b.textContent) === currentAnswer) {
                        b.classList.add('correct');
                    }
                });
                playSound(200, 0.2, 'sawtooth');
                
                setTimeout(() => {
                    gameOver();
                }, 800);
            }
        }

        function updateTimer() {
            if (!gameActive) return;

            timeLeft -= 0.5;
            timerBarEl.style.width = timeLeft + '%';

            if (timeLeft <= 0) {
                gameOver();
            }
        }

        function gameOver() {
            gameActive = false;
            if (score > best) {
                best = score;
                localStorage.setItem('mathQuizBest', best);
            }
            finalScoreEl.textContent = score;
            finalBestEl.textContent = best;
            correctCountEl.textContent = correctAnswers;
            bestEl.textContent = best;
            gamePlayEl.style.display = 'none';
            gameOverEl.style.display = 'block';
        }

        function restart() {
            score = 0;
            correctAnswers = 0;
            timeLeft = 100;
            gameActive = true;
            difficulty = 1;
            scoreEl.textContent = '0';
            timerBarEl.style.width = '100%';
            gamePlayEl.style.display = 'block';
            gameOverEl.style.display = 'none';
            generateQuestion();
        }

        restartBtn.addEventListener('click', restart);
        bestEl.textContent = best;

        // Start game
        generateQuestion();
        setInterval(updateTimer, 100);
    </script>

    <!-- leaderboard-integration:math-quiz-rush -->
    <div id="leaderboard" data-lb-slug="math-quiz-rush" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "math-quiz-rush";
      const CANDIDATE_OBJECTS = [];
      const END_METHODS = ["gameOver", "endGame", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["restart", "start", "startGame", "newGame", "retry", "resetGame", "initGame", "beginGame", "playAgain"];
      const SCORE_KEYS = ["score", "time", "finalScore", "points", "gold", "coins", "wave", "level", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
