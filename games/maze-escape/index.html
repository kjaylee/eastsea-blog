<title>Maze Escape — Neon Labyrinth</title>
<meta name="description" content="Play Maze Escape — Neon Labyrinth - Free HTML5 browser game on eastsea.monster. No download required.">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a1a;--accent:#00f5ff;--accent2:#ff00ff;--accent3:#ffff00;
    --accent4:#00ff88;--wall:#1a1a3a;--red:#ff3366;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
    color:#e0e0ff;font-family:'Courier New',monospace;touch-action:none}
  #app{width:100%;height:100%;display:flex;flex-direction:column;
    align-items:center;position:relative}

  /* Header */
  #hud{width:100%;display:flex;justify-content:space-between;align-items:center;
    padding:8px 14px;background:rgba(10,10,26,0.95);
    border-bottom:1px solid rgba(0,245,255,0.2);z-index:10;flex-shrink:0}
  #hud-title{font-size:clamp(13px,3vw,18px);font-weight:bold;
    color:var(--accent);text-shadow:0 0 10px var(--accent)}
  .hud-stats{display:flex;gap:14px}
  .hud-stat{font-size:clamp(10px,2.5vw,14px);color:#aaa}
  .hud-stat span{color:var(--accent3);font-weight:bold}

  /* Canvas wrap */
  #canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;overflow:hidden;position:relative}
  #gc{display:block;image-rendering:crisp-edges;cursor:none}

  /* D-pad */
  #dpad{flex-shrink:0;width:100%;display:flex;justify-content:center;
    align-items:center;padding:10px 0;gap:0;
    background:rgba(10,10,26,0.95);border-top:1px solid rgba(0,245,255,0.15)}
  .dpad-grid{display:grid;grid-template-columns:repeat(3,54px);
    grid-template-rows:repeat(3,54px);gap:4px}
  .dpad-btn{width:54px;height:54px;border-radius:10px;
    background:rgba(0,245,255,0.07);border:1px solid rgba(0,245,255,0.25);
    color:var(--accent);font-size:22px;display:flex;align-items:center;
    justify-content:center;cursor:pointer;user-select:none;
    -webkit-tap-highlight-color:transparent;transition:background 0.1s}
  .dpad-btn:active,.dpad-btn.pressed{background:rgba(0,245,255,0.22);
    box-shadow:0 0 10px var(--accent)}
  .dpad-empty{background:transparent;border:none;pointer-events:none}

  /* Screens */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:30;
    background:rgba(10,10,26,0.97);gap:14px;padding:20px;text-align:center}
  .screen.hidden{display:none}
  .screen h1{font-size:clamp(22px,7vw,46px);font-weight:900;letter-spacing:2px}
  .screen p{font-size:clamp(11px,3vw,15px);color:#aaa;max-width:340px;line-height:1.6}
  .neon-btn{padding:10px 28px;font-size:clamp(13px,4vw,18px);font-weight:bold;
    background:transparent;border:2px solid var(--accent);color:var(--accent);
    border-radius:10px;cursor:pointer;font-family:'Courier New',monospace;
    text-shadow:0 0 8px var(--accent);box-shadow:0 0 12px var(--accent);
    transition:all 0.2s;letter-spacing:1px}
  .neon-btn:hover,.neon-btn:active{background:rgba(0,245,255,0.12);
    box-shadow:0 0 24px var(--accent)}
  .neon-btn.pink{border-color:var(--accent2);color:var(--accent2);
    text-shadow:0 0 8px var(--accent2);box-shadow:0 0 12px var(--accent2)}
  .neon-btn.pink:hover{background:rgba(255,0,255,0.12);box-shadow:0 0 24px var(--accent2)}
  .score-big{font-size:clamp(30px,9vw,60px);font-weight:900;color:var(--accent3);
    text-shadow:0 0 20px var(--accent3)}
  .hi-label{font-size:clamp(11px,2.5vw,14px);color:#888}
  .level-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  #levelIndicator{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
    margin-top:4px}
  .dot{width:10px;height:10px;border-radius:50%;background:#333;
    transition:background 0.3s}
  .dot.done{background:var(--accent4)}
  .dot.current{background:var(--accent3)}
</style>
</head>
<body>
<div id="app">

  <!-- Start Screen -->
  <div class="screen" id="startScreen">
    <h1 style="color:var(--accent);text-shadow:0 0 20px var(--accent)">🌀 MAZE ESCAPE</h1>
    <p>Navigate through procedurally generated neon labyrinths.<br>
       Reach the <span style="color:var(--accent4)">✦ exit</span> before time runs out!</p>
    <div style="color:var(--accent3);font-size:clamp(11px,2.5vw,14px)">
      Best: <span id="startHi">0</span>
    </div>
    <div class="level-btns">
      <button class="neon-btn" onclick="startGame(1)">EASY<br><small style="font-size:10px;opacity:0.7">10×10</small></button>
      <button class="neon-btn pink" onclick="startGame(2)">NORMAL<br><small style="font-size:10px;opacity:0.7">15×15</small></button>
      <button class="neon-btn" style="border-color:#ff3366;color:#ff3366;box-shadow:0 0 12px #ff3366" onclick="startGame(3)">HARD<br><small style="font-size:10px;opacity:0.7">20×20</small></button>
    </div>
    <p style="font-size:11px;color:#555">Arrow keys / WASD &nbsp;|&nbsp; D-pad on mobile</p>
  </div>

  <!-- Win Screen -->
  <div class="screen hidden" id="winScreen">
    <h1 style="color:var(--accent4);text-shadow:0 0 20px var(--accent4)">ESCAPED! 🎉</h1>
    <div class="score-big" id="winScore">0</div>
    <div class="hi-label" id="winHi"></div>
    <p id="winMsg"></p>
    <div id="levelIndicator"></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="neon-btn" id="nextLvlBtn" onclick="nextLevel()">NEXT LEVEL ▶</button>
      <button class="neon-btn pink" onclick="showStart()">MENU</button>
    </div>
  </div>

  <!-- Fail Screen -->
  <div class="screen hidden" id="failScreen">
    <h1 style="color:var(--red);text-shadow:0 0 20px var(--red)">TIME'S UP! ⏱</h1>
    <div class="score-big" id="failScore">0</div>
    <div class="hi-label" id="failHi"></div>
    <div style="display:flex;gap:12px">
      <button class="neon-btn" onclick="restartLevel()">RETRY</button>
      <button class="neon-btn pink" onclick="showStart()">MENU</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-title">🌀 MAZE ESCAPE</div>
    <div class="hud-stats">
      <div class="hud-stat">LVL <span id="hudLvl">1</span></div>
      <div class="hud-stat">⏱ <span id="hudTime">60</span>s</div>
      <div class="hud-stat">SCORE <span id="hudScore">0</span></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
  </div>

  <!-- D-pad -->
  <div id="dpad">
    <div class="dpad-grid">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btn-up" ontouchstart="dpadPress('up')" ontouchend="dpadRelease('up')">▲</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btn-left" ontouchstart="dpadPress('left')" ontouchend="dpadRelease('left')">◀</button>
      <div class="dpad-empty" style="background:rgba(0,245,255,0.03);border-radius:50%"></div>
      <button class="dpad-btn" id="btn-right" ontouchstart="dpadPress('right')" ontouchend="dpadRelease('right')">▶</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btn-down" ontouchstart="dpadPress('down')" ontouchend="dpadRelease('down')">▼</button>
      <div class="dpad-empty"></div>
    </div>
  </div>
</div>

<script>
// ── Audio ─────────────────────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(freq,dur,type='sine',vol=0.12){
  try{const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndStep(){tone(220+Math.random()*40,0.04,'sine',0.06)}
function sndWall(){tone(110,0.06,'sawtooth',0.08)}
function sndWin(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.15),i*80));
}
function sndFail(){
  [440,330,220].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sawtooth',0.1),i*100));
}
function sndTick(){tone(880,0.03,'square',0.05)}

// ── Maze Generation (Recursive Backtracker) ───────────────────────────────────
// cells[y][x]: bitmask NESW = bits 0,1,2,3  (open=1, wall=0)
const N=1,S=2,E=4,W=8;
const OPPOSITE={[N]:S,[S]:N,[E]:W,[W]:E};
const DX={[N]:0,[S]:0,[E]:1,[W]:-1};
const DY={[N]:-1,[S]:1,[E]:0,[W]:0};

function generateMaze(cols,rows){
  const cells=Array.from({length:rows},()=>new Uint8Array(cols));
  const visited=Array.from({length:rows},()=>new Uint8Array(cols));
  function carve(x,y){
    visited[y][x]=1;
    const dirs=[N,S,E,W].sort(()=>Math.random()-0.5);
    for(const d of dirs){
      const nx=x+DX[d], ny=y+DY[d];
      if(nx<0||ny<0||nx>=cols||ny>=rows)continue;
      if(visited[ny][nx])continue;
      cells[y][x]|=d;
      cells[ny][nx]|=OPPOSITE[d];
      carve(nx,ny);
    }
  }
  carve(0,0);
  return cells;
}

// ── Canvas & Render ────────────────────────────────────────────────────────────
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');

let COLS=15,ROWS=15,CELL=32;
let maze=null, px=0,py=0, ex=0,ey=0;
let score=0, level=1, timeLeft=60, maxTime=60;
let gameActive=false, timerInterval=null;
let currentDiff=2, levelsCompleted=0;
let trailPts=[];

function diffSettings(d){
  if(d===1) return{cols:10,rows:10,time:90};
  if(d===2) return{cols:15,rows:15,time:75};
  return{cols:20,rows:20,time:60};
}

function fitCanvas(){
  const wrap=document.getElementById('canvas-wrap');
  const maxW=wrap.clientWidth-4;
  const maxH=wrap.clientHeight-4;
  const cellW=Math.floor(maxW/COLS);
  const cellH=Math.floor(maxH/ROWS);
  CELL=Math.max(12,Math.min(cellW,cellH,40));
  canvas.width=COLS*CELL;
  canvas.height=ROWS*CELL;
}

function render(){
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);

  // Draw trail
  ctx.globalAlpha=0.25;
  for(let i=0;i<trailPts.length;i++){
    const t=trailPts[i];
    const alpha=i/trailPts.length*0.4;
    ctx.fillStyle=`rgba(0,245,255,${alpha})`;
    ctx.fillRect(t.x*CELL+CELL*0.3,t.y*CELL+CELL*0.3,CELL*0.4,CELL*0.4);
  }
  ctx.globalAlpha=1;

  if(!maze)return;

  // Draw maze walls
  ctx.strokeStyle='#1e2060';
  ctx.lineWidth=1;

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const c=maze[y][x];
      const cx=x*CELL, cy=y*CELL;
      ctx.strokeStyle='rgba(40,40,120,0.9)';
      ctx.lineWidth=1;
      // Draw walls that are CLOSED (bit not set)
      if(!(c&N)){
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+CELL,cy);ctx.stroke();
      }
      if(!(c&W)){
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+CELL);ctx.stroke();
      }
      if(y===ROWS-1 && !(c&S)){
        ctx.beginPath();ctx.moveTo(cx,cy+CELL);ctx.lineTo(cx+CELL,cy+CELL);ctx.stroke();
      }
      if(x===COLS-1 && !(c&E)){
        ctx.beginPath();ctx.moveTo(cx+CELL,cy);ctx.lineTo(cx+CELL,cy+CELL);ctx.stroke();
      }
    }
  }

  // Neon wall overlay — brighter lines
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const c=maze[y][x];
      const cx=x*CELL, cy=y*CELL;
      ctx.strokeStyle='rgba(0,245,255,0.35)';
      ctx.lineWidth=1.5;
      ctx.shadowColor='rgba(0,245,255,0.6)';
      ctx.shadowBlur=3;
      if(!(c&N)){drawLine(cx,cy,cx+CELL,cy);}
      if(!(c&W)){drawLine(cx,cy,cx,cy+CELL);}
      if(y===ROWS-1&&!(c&S)){drawLine(cx,cy+CELL,cx+CELL,cy+CELL);}
      if(x===COLS-1&&!(c&E)){drawLine(cx+CELL,cy,cx+CELL,cy+CELL);}
    }
  }
  ctx.shadowBlur=0;

  // Exit glow
  const exCx=ex*CELL+CELL/2, exCy=ey*CELL+CELL/2;
  const grad=ctx.createRadialGradient(exCx,exCy,2,exCx,exCy,CELL*0.7);
  grad.addColorStop(0,'rgba(0,255,136,0.5)');
  grad.addColorStop(1,'rgba(0,255,136,0)');
  ctx.fillStyle=grad;
  ctx.fillRect(ex*CELL,ey*CELL,CELL,CELL);
  ctx.fillStyle='#00ff88';
  ctx.font=`${Math.floor(CELL*0.6)}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#00ff88';ctx.shadowBlur=10;
  ctx.fillText('✦',exCx,exCy);
  ctx.shadowBlur=0;

  // Player
  const plX=px*CELL+CELL/2, plY=py*CELL+CELL/2;
  const pr=CELL*0.32;
  // glow ring
  ctx.beginPath();ctx.arc(plX,plY,pr+3,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,245,255,0.4)';ctx.lineWidth=2;ctx.stroke();
  // fill
  const pg=ctx.createRadialGradient(plX-pr*0.3,plY-pr*0.3,pr*0.1,plX,plY,pr);
  pg.addColorStop(0,'#80ffff');pg.addColorStop(1,'#00c8ff');
  ctx.beginPath();ctx.arc(plX,plY,pr,0,Math.PI*2);
  ctx.fillStyle=pg;ctx.shadowColor='#00f5ff';ctx.shadowBlur=12;ctx.fill();
  ctx.shadowBlur=0;
}

function drawLine(x1,y1,x2,y2){
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
}

// ── Game Logic ─────────────────────────────────────────────────────────────────
function tryMove(dir){
  if(!gameActive)return;
  if(AC.state==='suspended')AC.resume();
  const cell=maze[py][px];
  if(!(cell&dir)){sndWall();return;}
  trailPts.push({x:px,y:py});
  if(trailPts.length>30) trailPts.shift();
  px+=DX[dir]; py+=DY[dir];
  sndStep();
  updateHUD();
  render();
  if(px===ex&&py===ey) onWin();
}

function updateHUD(){
  document.getElementById('hudLvl').textContent=level;
  document.getElementById('hudScore').textContent=score;
  document.getElementById('hudTime').textContent=timeLeft;
  const timeEl=document.getElementById('hudTime');
  timeEl.style.color=timeLeft<=10?'#ff3366':timeLeft<=20?'#ffff00':'#ffff00';
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!gameActive)return;
    timeLeft--;
    if(timeLeft<=5) sndTick();
    updateHUD();
    if(timeLeft<=0){clearInterval(timerInterval);onFail();}
  },1000);
}

function onWin(){
  gameActive=false;
  clearInterval(timerInterval);
  sndWin();
  levelsCompleted++;
  const timeBonus=timeLeft*5;
  const sizeBonus=COLS*ROWS;
  score+=timeBonus+sizeBonus;
  const hiKey='mazeescape_hi';
  const prev=parseInt(localStorage.getItem(hiKey)||'0');
  const isNew=score>prev;
  if(isNew)localStorage.setItem(hiKey,score);
  document.getElementById('winScore').textContent=score;
  document.getElementById('winHi').textContent=isNew?'🏆 NEW HIGH SCORE!':'Best: '+prev;
  document.getElementById('winMsg').textContent=
    `+${timeBonus} time bonus  +${sizeBonus} size bonus`;
  buildDots(levelsCompleted);
  document.getElementById('winScreen').classList.remove('hidden');
}

function buildDots(done){
  const el=document.getElementById('levelIndicator');
  el.innerHTML='';
  for(let i=0;i<10;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<done?' done':i===done?' current':'');
    el.appendChild(d);
  }
}

function onFail(){
  gameActive=false;
  sndFail();
  const hiKey='mazeescape_hi';
  const prev=parseInt(localStorage.getItem(hiKey)||'0');
  const isNew=score>prev;
  if(isNew)localStorage.setItem(hiKey,score);
  document.getElementById('failScore').textContent=score;
  document.getElementById('failHi').textContent=isNew?'🏆 NEW HIGH SCORE!':'Best: '+prev;
  document.getElementById('failScreen').classList.remove('hidden');
}

function initLevel(){
  const s=diffSettings(currentDiff);
  // Increase size slightly each level
  COLS=Math.min(s.cols+Math.floor((level-1)*2), s.cols+12);
  ROWS=Math.min(s.rows+Math.floor((level-1)*2), s.rows+12);
  maxTime=Math.max(30, s.time-Math.floor((level-1)*5));
  timeLeft=maxTime;

  fitCanvas();
  maze=generateMaze(COLS,ROWS);
  px=0;py=0;
  ex=COLS-1;ey=ROWS-1;
  trailPts=[];
  gameActive=true;
  updateHUD();
  render();
  startTimer();
}

function startGame(diff){
  if(AC.state==='suspended')AC.resume();
  currentDiff=diff;
  level=1;score=0;levelsCompleted=0;
  hideAllScreens();
  initLevel();
}

function nextLevel(){
  level++;
  hideAllScreens();
  initLevel();
}

function restartLevel(){
  hideAllScreens();
  initLevel();
}

function showStart(){
  gameActive=false;
  clearInterval(timerInterval);
  hideAllScreens();
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('startHi').textContent=localStorage.getItem('mazeescape_hi')||0;
}

function hideAllScreens(){
  ['startScreen','winScreen','failScreen'].forEach(id=>
    document.getElementById(id).classList.add('hidden'));
}

// ── Keyboard ───────────────────────────────────────────────────────────────────
const KEY_MAP={
  ArrowUp:N, ArrowDown:S, ArrowRight:E, ArrowLeft:W,
  w:N, s:S, d:E, a:W,
  W:N, S:S, D:E, A:W
};
document.addEventListener('keydown',e=>{
  const dir=KEY_MAP[e.key];
  if(dir!==undefined){e.preventDefault();tryMove(dir);}
});

// ── D-pad ──────────────────────────────────────────────────────────────────────
const DPAD_MAP={up:N,down:S,left:W,right:E};
function dpadPress(name){
  const btn=document.getElementById('btn-'+name);
  if(btn)btn.classList.add('pressed');
  tryMove(DPAD_MAP[name]);
  // repeat while held
  if(window._dpadHold) clearInterval(window._dpadHold);
  window._dpadHold=setInterval(()=>tryMove(DPAD_MAP[name]),160);
}
function dpadRelease(name){
  const btn=document.getElementById('btn-'+name);
  if(btn)btn.classList.remove('pressed');
  clearInterval(window._dpadHold);
}

// ── Swipe detection ────────────────────────────────────────────────────────────
let touchStart=null;
canvas.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  touchStart={x:t.clientX,y:t.clientY};
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(!touchStart)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStart.x, dy=t.clientY-touchStart.y;
  touchStart=null;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)) tryMove(dx>0?E:W);
  else tryMove(dy>0?S:N);
  e.preventDefault();
},{passive:false});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{if(gameActive){fitCanvas();render();}});

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('startHi').textContent=localStorage.getItem('mazeescape_hi')||0;
</script>
