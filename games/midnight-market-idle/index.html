<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="icon" href="data:," />
  <title>Midnight Market Idle</title>
  <style>
    :root{--bg:#0a0a1a;--panel:#141733;--line:#35408b;--text:#eaf0ff;--mint:#64ffd6;--pink:#ff57c3;--amber:#ffd166}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 20% -20%,#23275f 0%,var(--bg) 55%);color:var(--text);font-family:Inter,system-ui,sans-serif;display:flex;justify-content:center;min-height:100dvh}
    .app{width:min(980px,100%);padding:12px;display:grid;gap:10px}
    .top{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .card{background:linear-gradient(180deg,#171a3a,#101229);border:1px solid var(--line);border-radius:12px;padding:8px 10px}
    .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.74}
    .v{font-size:20px;font-weight:800}
    .meter{height:8px;background:#0d1030;border:1px solid #2d3a86;border-radius:999px;overflow:hidden}
    .meter > i{display:block;height:100%;background:linear-gradient(90deg,var(--mint),var(--pink));width:0%}
    .market{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .stall{background:linear-gradient(180deg,#171a3a,#101229);border:1px solid var(--line);border-radius:12px;padding:10px;display:grid;gap:8px}
    .stall h3{margin:0;font-size:16px}
    .row{display:flex;justify-content:space-between;align-items:center;font-size:13px}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    button{background:#10163b;border:1px solid #3242a0;color:var(--text);padding:9px;border-radius:10px;font-weight:700;font-size:13px}
    button:active{transform:translateY(1px)}
    .actions{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}
    .hint{font-size:12px;line-height:1.45;opacity:.9}
    .flash{padding:10px;border-radius:12px;border:1px solid #7f5b14;background:linear-gradient(180deg,#30230a,#1d1408)}
    @media (max-width:860px){
      .top{grid-template-columns:repeat(3,1fr)}
      .market{grid-template-columns:1fr}
      .actions{grid-template-columns:1fr 1fr}
      .hint{grid-column:1/-1}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="card"><div class="k">Credits</div><div id="credits" class="v">0</div></div>
    <div class="card"><div class="k">Income / sec</div><div id="ips" class="v">0</div></div>
    <div class="card"><div class="k">Hype Multiplier</div><div id="hype" class="v">x1.00</div></div>
    <div class="card"><div class="k">Burst Charge</div><div id="burst" class="v">0%</div><div class="meter"><i id="burstBar"></i></div></div>
    <div class="card"><div class="k">Best Credits</div><div id="best" class="v">0</div></div>
  </div>

  <div id="flash" class="flash">Flash Deal: idle... keep scaling your market!</div>

  <div class="market" id="market"></div>

  <div class="actions">
    <button id="manualBurst">Space: Manual Burst (+2.5x)</button>
    <button id="startPause">Start</button>
    <button id="reset">Reset</button>
    <div class="hint card">Keyboard: 1/2/3 hire, Q/W/E upgrade, Space burst.<br>
      Touch: same buttons. Offline earnings enabled (up to 8h).</div>
  </div>
</div>

<script>
(() => {
  const STORE = 'midnight_market_idle_v1';
  const marketEl = document.getElementById('market');
  const flashEl = document.getElementById('flash');
  const burstBar = document.getElementById('burstBar');

  let audioCtx = null;
  const beep = (f=440,t=0.08,type='sine',g=0.03) => {
    if (!audioCtx) return;
    const o=audioCtx.createOscillator(), a=audioCtx.createGain();
    o.type=type; o.frequency.value=f; a.gain.value=g;
    o.connect(a); a.connect(audioCtx.destination); o.start();
    a.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+t);
    o.stop(audioCtx.currentTime+t);
  };
  const ensureAudio = () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state==='suspended') audioCtx.resume();
  };

  const saved = JSON.parse(localStorage.getItem(STORE) || '{}');

  const stalls = [
    {id:'noodle',name:'Neon Noodle Bar',emoji:'🍜',base:1.5,workers:1,level:1},
    {id:'tea',name:'Pulse Tea Lounge',emoji:'🍵',base:2.2,workers:0,level:1},
    {id:'relic',name:'Relic Night Auction',emoji:'🏺',base:3.1,workers:0,level:1},
  ];

  if (saved.stalls && Array.isArray(saved.stalls)) {
    saved.stalls.forEach((s,i)=>{
      if (!stalls[i]) return;
      stalls[i].workers = Math.max(0, Number(s.workers||0));
      stalls[i].level = Math.max(1, Number(s.level||1));
    });
  }

  const state = {
    running:false,
    credits: Math.max(0, Number(saved.credits || 32)),
    best: Math.max(0, Number(saved.best || 0)),
    burst: Math.max(0, Math.min(100, Number(saved.burst || 0))),
    burstTime: 0,
    hype: 1,
    tick: performance.now(),
    flashKey: null,
    flashUntil: 0,
    flashCooldown: 8,
    lastSave: Number(saved.lastSave || Date.now()),
  };

  const fmt = n => {
    if (n>=1e12) return (n/1e12).toFixed(2)+'T';
    if (n>=1e9) return (n/1e9).toFixed(2)+'B';
    if (n>=1e6) return (n/1e6).toFixed(2)+'M';
    if (n>=1e3) return (n/1e3).toFixed(2)+'K';
    return n.toFixed(1);
  };

  function workerCost(i){ return Math.floor((24 + i*15) * Math.pow(1.16, stalls[i].workers)); }
  function levelCost(i){ return Math.floor((56 + i*35) * Math.pow(1.34, stalls[i].level-1)); }
  function stallRate(s){ return s.base * s.workers * (1 + (s.level-1)*0.55); }
  function totalRate(){ return stalls.reduce((a,s)=>a + stallRate(s),0) * state.hype * (state.burstTime>0?2.5:1); }

  function renderMarket(){
    marketEl.innerHTML = '';
    stalls.forEach((s,i)=>{
      const box = document.createElement('div');
      box.className = 'stall';
      box.innerHTML = `
        <h3>${s.emoji} ${s.name}</h3>
        <div class="row"><span>Workers</span><b id="w${i}">${s.workers}</b></div>
        <div class="row"><span>Upgrade Lv</span><b id="l${i}">${s.level}</b></div>
        <div class="row"><span>Rate</span><b id="r${i}">${fmt(stallRate(s))}/s</b></div>
        <div class="btns">
          <button data-act="hire" data-i="${i}">${i+1}: Hire (${workerCost(i)})</button>
          <button data-act="up" data-i="${i}">${['Q','W','E'][i]}: Upgrade (${levelCost(i)})</button>
        </div>
      `;
      marketEl.appendChild(box);
    });

    marketEl.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click', () => {
        ensureAudio();
        const i = Number(b.dataset.i);
        if (b.dataset.act === 'hire') hire(i); else upgrade(i);
      });
    });
  }

  function save(){
    localStorage.setItem(STORE, JSON.stringify({
      credits: state.credits,
      best: state.best,
      burst: state.burst,
      stalls: stalls.map(s=>({workers:s.workers,level:s.level})),
      lastSave: Date.now()
    }));
  }

  function applyOffline(){
    const now = Date.now();
    const gap = Math.max(0, now - state.lastSave);
    const sec = Math.min(gap/1000, 8*3600);
    const base = stalls.reduce((a,s)=>a + stallRate(s),0);
    const earned = base * sec * 0.72;
    if (earned > 0){
      state.credits += earned;
      flashEl.textContent = `Offline earnings: +${fmt(earned)} credits (${Math.floor(sec/60)}m)`;
    }
  }

  function updateHUD(){
    document.getElementById('credits').textContent = fmt(state.credits);
    document.getElementById('ips').textContent = fmt(totalRate());
    document.getElementById('hype').textContent = 'x' + state.hype.toFixed(2);
    document.getElementById('best').textContent = fmt(state.best);
    document.getElementById('burst').textContent = Math.floor(state.burst) + '%';
    burstBar.style.width = state.burst + '%';

    stalls.forEach((s,i)=>{
      const w = document.getElementById('w'+i); if (w) w.textContent = s.workers;
      const l = document.getElementById('l'+i); if (l) l.textContent = s.level;
      const r = document.getElementById('r'+i); if (r) r.textContent = fmt(stallRate(s))+'/s';
      const btns = marketEl.querySelectorAll(`[data-i="${i}"]`);
      if (btns[0]) btns[0].textContent = `${i+1}: Hire (${workerCost(i)})`;
      if (btns[1]) btns[1].textContent = `${['Q','W','E'][i]}: Upgrade (${levelCost(i)})`;
    });
  }

  function hire(i){
    const c = workerCost(i);
    if (state.credits < c){ beep(140,0.06,'sawtooth',0.03); return; }
    state.credits -= c;
    stalls[i].workers++;
    state.hype = Math.min(3, state.hype + 0.03);
    beep(520,0.06,'square',0.025);
    updateHUD();
  }

  function upgrade(i){
    const c = levelCost(i);
    if (state.credits < c){ beep(160,0.06,'sawtooth',0.03); return; }
    state.credits -= c;
    stalls[i].level++;
    state.hype = Math.min(3, state.hype + 0.05);
    beep(820,0.08,'triangle',0.03);
    updateHUD();
  }

  function manualBurst(){
    if (!state.running) return;
    if (state.burst < 100){ beep(180,0.05,'square',0.02); return; }
    state.burst = 0;
    state.burstTime = 10;
    state.hype = Math.min(3.5, state.hype + 0.22);
    flashEl.textContent = 'Manual Burst active! Income x2.5 for 10s';
    beep(980,0.1,'triangle',0.05);
  }

  function spawnFlashDeal(){
    const keys = ['J','K','L'];
    const idx = Math.floor(Math.random()*3);
    state.flashKey = keys[idx];
    state.flashUntil = performance.now() + 2300;
    flashEl.textContent = `FLASH DEAL! Press ${state.flashKey} in 2.3s for +35% hype`;
    flashEl.style.borderColor = '#ffd166';
    beep(660,0.07,'square',0.03);
  }

  function hitFlash(k){
    if (!state.flashKey) return;
    if (performance.now() <= state.flashUntil && k.toUpperCase() === state.flashKey){
      state.hype = Math.min(4, state.hype + 0.35);
      state.credits += totalRate()*1.4;
      flashEl.textContent = 'Flash Deal success! Bonus credits + hype acquired.';
      flashEl.style.borderColor = '#2e8f64';
      beep(1050,0.09,'triangle',0.04);
      state.flashKey = null;
      state.flashCooldown = 9;
    }
  }

  function loop(ts){
    const dt = Math.min(0.2, (ts - state.tick)/1000 || 0);
    state.tick = ts;

    if (state.running){
      state.credits += totalRate() * dt;
      state.burst = Math.min(100, state.burst + dt*9.2);
      if (state.burstTime > 0) state.burstTime = Math.max(0, state.burstTime - dt);
      state.hype = Math.max(1, state.hype - dt*0.022);
      state.flashCooldown -= dt;

      if (!state.flashKey && state.flashCooldown <= 0) spawnFlashDeal();
      if (state.flashKey && ts > state.flashUntil){
        flashEl.textContent = 'Flash deal missed. Keep expanding your market.';
        flashEl.style.borderColor = '#7f5b14';
        state.flashKey = null;
        state.flashCooldown = 7 + Math.random()*5;
        beep(190,0.08,'sawtooth',0.03);
      }

      if (state.credits > state.best){
        state.best = state.credits;
      }
    }

    if (Math.random() < 0.015) save();
    updateHUD();
    requestAnimationFrame(loop);
  }

  function resetAll(){
    if (!confirm('Reset all market progress?')) return;
    localStorage.removeItem(STORE);
    location.reload();
  }

  document.getElementById('manualBurst').addEventListener('click', () => { ensureAudio(); manualBurst(); });
  document.getElementById('startPause').addEventListener('click', () => {
    ensureAudio();
    state.running = !state.running;
    document.getElementById('startPause').textContent = state.running ? 'Pause' : 'Start';
    flashEl.textContent = state.running ? 'Market opened. Keep profits flowing!' : 'Market paused.';
  });
  document.getElementById('reset').addEventListener('click', resetAll);

  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === '1') { ensureAudio(); hire(0); }
    else if (k === '2') { ensureAudio(); hire(1); }
    else if (k === '3') { ensureAudio(); hire(2); }
    else if (k === 'q') { ensureAudio(); upgrade(0); }
    else if (k === 'w') { ensureAudio(); upgrade(1); }
    else if (k === 'e') { ensureAudio(); upgrade(2); }
    else if (k === ' ') { e.preventDefault(); ensureAudio(); manualBurst(); }
    else if (['j','k','l'].includes(k)) { ensureAudio(); hitFlash(k); }
    else if (k === 'enter') document.getElementById('startPause').click();
  });

  window.addEventListener('beforeunload', save);

  renderMarket();
  applyOffline();
  updateHUD();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
