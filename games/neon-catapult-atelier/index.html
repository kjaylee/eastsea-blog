<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="icon" href="data:," />
  <title>Neon Catapult Atelier</title>
  <style>
    :root{--bg:#0a0a1a;--panel:#12132a;--line:#35408b;--cyan:#45e8ff;--pink:#ff4ab8;--lime:#86ff7a;--amber:#ffd166;--txt:#ebf0ff}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 15% -10%,#23295e 0%,var(--bg) 52%);color:var(--txt);font-family:Inter,system-ui,sans-serif;display:flex;justify-content:center;min-height:100dvh}
    .app{width:min(960px,100%);padding:12px;display:grid;gap:10px}
    .hud{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
    .item{background:linear-gradient(180deg,#171a3a,#101127);border:1px solid var(--line);border-radius:12px;padding:8px 10px}
    .item .k{font-size:11px;opacity:.74;text-transform:uppercase;letter-spacing:.08em}
    .item .v{font-size:19px;font-weight:800}
    #wrap{border:1px solid #2d356f;border-radius:14px;overflow:hidden;background:#090917;box-shadow:inset 0 0 24px #29317877,0 0 20px #0008}
    canvas{display:block;width:100%;height:min(58vh,560px)}
    .buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    button{background:#10163a;border:1px solid #3342a0;color:var(--txt);padding:11px;border-radius:12px;font-weight:700}
    button:active{transform:translateY(1px)}
    .hint{background:linear-gradient(180deg,#171a3a,#101127);border:1px solid var(--line);border-radius:12px;padding:10px;font-size:13px;line-height:1.4;opacity:.9}
    @media (max-width:760px){
      .hud{grid-template-columns:repeat(3,1fr)}
      .buttons{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="hud">
    <div class="item"><div class="k">Level</div><div id="level" class="v">1</div></div>
    <div class="item"><div class="k">Shots</div><div id="shots" class="v">3</div></div>
    <div class="item"><div class="k">Targets</div><div id="targets" class="v">0</div></div>
    <div class="item"><div class="k">Score</div><div id="score" class="v">0</div></div>
    <div class="item"><div class="k">Best Score</div><div id="best" class="v">0</div></div>
    <div class="item"><div class="k">Best Level</div><div id="bestLv" class="v">1</div></div>
  </div>

  <div id="wrap"><canvas id="cv"></canvas></div>

  <div class="buttons">
    <button id="launch">Space: Launch</button>
    <button id="reset">R: Reset Level</button>
    <button id="next">N: Next Level</button>
    <button id="start">Start / Pause</button>
  </div>

  <div class="hint">
    Drag from catapult to aim + power. Keyboard: ←/→ power, ↑/↓ angle, Space launch.<br>
    Hit all targets with limited shots. Bounce off neon plates to solve the puzzle.
  </div>
</div>

<script>
(() => {
  const cv = document.getElementById('cv');
  const cx = cv.getContext('2d');
  const wrap = document.getElementById('wrap');
  const el = id => document.getElementById(id);

  const STORE = 'neon_catapult_atelier_save';
  const save = JSON.parse(localStorage.getItem(STORE) || '{}');

  const state = {
    running:false,
    level:1,
    unlocked:Math.max(1, Number(save.unlocked||1)),
    bestScore:Number(save.bestScore||0),
    score:Number(save.lastScore||0),
    angle:58,
    power:310,
    shots:3,
    projectile:null,
    won:false,
    lost:false,
    drag:false,
    aimX:0,
    aimY:0,
    pulse:0,
  };

  const levels = [
    {shots:3, targets:[{x:.78,y:.26,r:16}], walls:[{x:.52,y:.62,w:.22,h:.03}]},
    {shots:3, targets:[{x:.83,y:.2,r:15}], walls:[{x:.46,y:.57,w:.12,h:.03},{x:.62,y:.42,w:.24,h:.03}]},
    {shots:4, targets:[{x:.86,y:.24,r:14},{x:.72,y:.14,r:12}], walls:[{x:.52,y:.60,w:.26,h:.03},{x:.66,y:.43,w:.13,h:.03}]},
    {shots:4, targets:[{x:.82,y:.18,r:15}], walls:[{x:.43,y:.61,w:.12,h:.03},{x:.57,y:.52,w:.12,h:.03},{x:.71,y:.43,w:.12,h:.03}]},
    {shots:4, targets:[{x:.88,y:.23,r:14},{x:.9,y:.48,r:14}], walls:[{x:.54,y:.66,w:.18,h:.03},{x:.64,y:.30,w:.16,h:.03}]},
    {shots:5, targets:[{x:.84,y:.17,r:13},{x:.84,y:.35,r:13},{x:.84,y:.53,r:13}], walls:[{x:.60,y:.58,w:.20,h:.03},{x:.60,y:.40,w:.20,h:.03}]},
    {shots:5, targets:[{x:.74,y:.16,r:14},{x:.88,y:.30,r:14}], walls:[{x:.50,y:.66,w:.24,h:.03},{x:.66,y:.48,w:.12,h:.03},{x:.80,y:.41,w:.12,h:.03}]},
    {shots:6, targets:[{x:.86,y:.17,r:13},{x:.90,y:.34,r:13},{x:.84,y:.51,r:13}], walls:[{x:.48,y:.68,w:.16,h:.03},{x:.62,y:.56,w:.16,h:.03},{x:.76,y:.44,w:.16,h:.03},{x:.64,y:.30,w:.12,h:.03}]},
  ];

  let world = null;
  let audioCtx = null;

  function beep(f=440,t=0.06,type='sine',g=0.03){
    if (!audioCtx) return;
    const o=audioCtx.createOscillator(), a=audioCtx.createGain();
    o.type=type; o.frequency.value=f; a.gain.value=g; o.connect(a); a.connect(audioCtx.destination);
    o.start(); a.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+t); o.stop(audioCtx.currentTime+t);
  }

  function ensureAudio(){
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state==='suspended') audioCtx.resume();
  }

  function persist(){
    localStorage.setItem(STORE, JSON.stringify({
      unlocked: state.unlocked,
      bestScore: state.bestScore,
      lastScore: Math.floor(state.score)
    }));
  }

  function resize(){
    const r = wrap.getBoundingClientRect();
    const ratio = Math.max(1, Math.min(2, window.devicePixelRatio||1));
    const hCss = Math.floor(Math.min(560, window.innerHeight*0.58));
    cv.width = Math.floor(r.width*ratio);
    cv.height = Math.floor(hCss*ratio);
    cv.style.height = hCss + 'px';
    cx.setTransform(ratio,0,0,ratio,0,0);
    if (world) buildLevel(state.level);
  }

  function buildLevel(lv){
    const idx = Math.min(levels.length-1, Math.max(0, lv-1));
    const L = levels[idx];
    const w = cv.clientWidth, h = cv.clientHeight;
    world = {
      w,h,
      cat:{x:72,y:h-72,r:16},
      targets: L.targets.map(t => ({x:t.x*w, y:t.y*h, r:t.r, hit:false})),
      walls: L.walls.map(k => ({x:k.x*w,y:k.y*h,w:k.w*w,h:k.h*h})),
    };
    state.shots = L.shots;
    state.projectile = null;
    state.won = false;
    state.lost = false;
    state.angle = 58;
    state.power = 310;
    updateHUD();
  }

  function updateHUD(){
    el('level').textContent = state.level;
    el('shots').textContent = state.shots;
    el('targets').textContent = world ? world.targets.filter(t=>!t.hit).length : 0;
    el('score').textContent = Math.floor(state.score);
    el('best').textContent = Math.floor(state.bestScore);
    el('bestLv').textContent = state.unlocked;
  }

  function launch(){
    if (!state.running || !world || state.projectile || state.shots<=0 || state.won || state.lost) return;
    const rad = state.angle*Math.PI/180;
    const p = state.power;
    state.projectile = {
      x: world.cat.x + Math.cos(rad)*22,
      y: world.cat.y - Math.sin(rad)*22,
      vx: Math.cos(rad)*p,
      vy: -Math.sin(rad)*p,
      r:10,
      life:0,
      sleeping:false,
    };
    state.shots--;
    beep(300,0.08,'triangle',0.04);
    updateHUD();
  }

  function reflect(vx,vy,nx,ny,b=0.78){
    const dot = vx*nx + vy*ny;
    return {vx:(vx-2*dot*nx)*b, vy:(vy-2*dot*ny)*b};
  }

  function update(dt){
    if (!state.running || !world) return;

    const ball = state.projectile;
    if (ball){
      ball.life += dt;
      ball.vy += 680*dt;
      ball.x += ball.vx*dt;
      ball.y += ball.vy*dt;

      // bounds
      if (ball.x < ball.r){ ball.x = ball.r; ({vx:ball.vx,vy:ball.vy}=reflect(ball.vx,ball.vy,1,0)); beep(180,0.03,'square',0.02); }
      if (ball.x > world.w-ball.r){ ball.x = world.w-ball.r; ({vx:ball.vx,vy:ball.vy}=reflect(ball.vx,ball.vy,-1,0)); beep(180,0.03,'square',0.02); }
      if (ball.y < ball.r){ ball.y = ball.r; ({vx:ball.vx,vy:ball.vy}=reflect(ball.vx,ball.vy,0,1)); beep(180,0.03,'square',0.02); }
      if (ball.y > world.h-ball.r){
        ball.y = world.h-ball.r;
        ({vx:ball.vx,vy:ball.vy}=reflect(ball.vx,ball.vy,0,-1,0.72));
      }

      // wall collisions
      for (const w of world.walls){
        const cxp = Math.max(w.x, Math.min(ball.x, w.x+w.w));
        const cyp = Math.max(w.y, Math.min(ball.y, w.y+w.h));
        const dx = ball.x-cxp, dy = ball.y-cyp;
        const d2 = dx*dx+dy*dy;
        if (d2 < ball.r*ball.r){
          const len = Math.hypot(dx,dy)||1;
          const nx = dx/len, ny = dy/len;
          ball.x = cxp + nx*(ball.r+0.1);
          ball.y = cyp + ny*(ball.r+0.1);
          ({vx:ball.vx,vy:ball.vy}=reflect(ball.vx,ball.vy,nx,ny));
          beep(220,0.03,'square',0.02);
        }
      }

      // target collisions
      for (const t of world.targets){
        if (t.hit) continue;
        const dx = ball.x-t.x, dy = ball.y-t.y;
        if (dx*dx+dy*dy <= (ball.r+t.r)*(ball.r+t.r)){
          t.hit = true;
          state.score += 260;
          state.pulse = 1;
          beep(760,0.09,'sine',0.05);
        }
      }

      const speed = Math.hypot(ball.vx, ball.vy);
      if (ball.life > 0.45 && speed < 44 && ball.y > world.h-26){
        state.projectile = null;
      }
    }

    const left = world.targets.filter(t=>!t.hit).length;
    if (left===0 && !state.won){
      state.won = true;
      state.running = false;
      state.score += state.shots*120 + state.level*80;
      state.unlocked = Math.max(state.unlocked, Math.min(levels.length, state.level+1));
      if (state.score > state.bestScore) state.bestScore = Math.floor(state.score);
      persist();
      beep(980,0.15,'triangle',0.05);
      beep(1320,0.22,'triangle',0.04);
    }

    if (!state.projectile && state.shots<=0 && left>0 && !state.lost){
      state.lost = true;
      state.running = false;
      state.score = Math.max(0, state.score-60);
      persist();
      beep(120,0.22,'sawtooth',0.05);
    }

    updateHUD();
  }

  function draw(){
    if (!world) return;
    const {w,h,cat,targets,walls} = world;
    cx.clearRect(0,0,w,h);

    cx.fillStyle = '#0a0a1a';
    cx.fillRect(0,0,w,h);

    // grid
    cx.strokeStyle = '#1d234f';
    cx.lineWidth = 1;
    for (let x=0;x<=w;x+=40){ cx.beginPath(); cx.moveTo(x,0); cx.lineTo(x,h); cx.stroke(); }
    for (let y=0;y<=h;y+=40){ cx.beginPath(); cx.moveTo(0,y); cx.lineTo(w,y); cx.stroke(); }

    // walls
    for (const r of walls){
      cx.fillStyle = '#141a3f';
      cx.fillRect(r.x,r.y,r.w,r.h);
      cx.strokeStyle = '#4aaeff';
      cx.strokeRect(r.x,r.y,r.w,r.h);
    }

    // catapult
    cx.strokeStyle = '#9ab7ff';
    cx.lineWidth = 4;
    cx.beginPath();
    cx.moveTo(cat.x-20, cat.y+16);
    cx.lineTo(cat.x, cat.y-16);
    cx.lineTo(cat.x+20, cat.y+16);
    cx.stroke();

    const rad = state.angle*Math.PI/180;
    const tipX = cat.x + Math.cos(rad)*34;
    const tipY = cat.y - Math.sin(rad)*34;
    cx.strokeStyle = '#ffd166';
    cx.beginPath();
    cx.moveTo(cat.x,cat.y);
    cx.lineTo(tipX,tipY);
    cx.stroke();

    // aim dots
    if (!state.projectile){
      cx.fillStyle = '#ffd166aa';
      for (let i=1;i<=7;i++){
        const t=i*0.11;
        const vx=Math.cos(rad)*state.power;
        const vy=-Math.sin(rad)*state.power + 680*t;
        const x=tipX + vx*t*0.68;
        const y=tipY + vy*t*0.68;
        cx.beginPath(); cx.arc(x,y,2.4,0,Math.PI*2); cx.fill();
      }
    }

    // targets
    for (const t of targets){
      if (t.hit) continue;
      cx.beginPath();
      cx.arc(t.x,t.y,t.r,0,Math.PI*2);
      cx.fillStyle = '#ff4ab8';
      cx.shadowColor = '#ff4ab8';
      cx.shadowBlur = 18;
      cx.fill();
      cx.shadowBlur = 0;
      cx.strokeStyle = '#fff';
      cx.lineWidth = 2;
      cx.stroke();
      cx.beginPath();
      cx.arc(t.x,t.y,t.r*0.36,0,Math.PI*2);
      cx.fillStyle = '#ffd166';
      cx.fill();
    }

    // projectile
    if (state.projectile){
      const p = state.projectile;
      cx.beginPath();
      cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle = '#45e8ff';
      cx.shadowColor = '#45e8ff';
      cx.shadowBlur = 18;
      cx.fill();
      cx.shadowBlur = 0;
      cx.strokeStyle = '#fff';
      cx.stroke();
    }

    if (state.pulse>0){
      cx.fillStyle = `rgba(255,255,255,${state.pulse*0.25})`;
      cx.fillRect(0,0,w,h);
      state.pulse = Math.max(0, state.pulse-0.03);
    }

    if (!state.running){
      let title='Tap Start';
      let sub='Launch orbs and clear all targets.';
      if (state.won){ title='Level Cleared'; sub='Press N for next level'; }
      if (state.lost){ title='Out of Shots'; sub='Press R to retry'; }
      cx.fillStyle = '#0008';
      cx.fillRect(w*0.23,h*0.34,w*0.54,h*0.24);
      cx.strokeStyle='#4255b1'; cx.strokeRect(w*0.23,h*0.34,w*0.54,h*0.24);
      cx.textAlign='center';
      cx.fillStyle='#ebf0ff';
      cx.font='700 28px Inter,sans-serif';
      cx.fillText(title,w/2,h*0.44);
      cx.font='500 14px Inter,sans-serif';
      cx.fillStyle='#b7c8ff';
      cx.fillText(sub,w/2,h*0.51);
    }
  }

  let prev = 0;
  function loop(ts){
    if (!prev) prev = ts;
    const dt = Math.min(34, ts-prev)/1000;
    prev = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // input
  function pointerPos(ev){
    const r = cv.getBoundingClientRect();
    return {x: ev.clientX-r.left, y: ev.clientY-r.top};
  }

  cv.addEventListener('pointerdown', ev => {
    if (!world) return;
    ensureAudio();
    const p = pointerPos(ev);
    const c = world.cat;
    if (Math.hypot(p.x-c.x, p.y-c.y) < 120){
      state.drag = true;
      state.aimX = p.x; state.aimY = p.y;
      cv.setPointerCapture(ev.pointerId);
    }
  });

  cv.addEventListener('pointermove', ev => {
    if (!state.drag || !world) return;
    const p = pointerPos(ev);
    const c = world.cat;
    const dx = c.x - p.x;
    const dy = c.y - p.y;
    const ang = Math.atan2(dy, dx) * 180 / Math.PI;
    state.angle = Math.max(12, Math.min(82, ang));
    state.power = Math.max(170, Math.min(560, Math.hypot(dx,dy)*4.6));
  });

  cv.addEventListener('pointerup', () => {
    if (!state.drag) return;
    state.drag = false;
    launch();
  });

  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k==='arrowup') state.angle = Math.min(82, state.angle+2);
    else if (k==='arrowdown') state.angle = Math.max(12, state.angle-2);
    else if (k==='arrowright') state.power = Math.min(560, state.power+12);
    else if (k==='arrowleft') state.power = Math.max(170, state.power-12);
    else if (k===' '){ e.preventDefault(); ensureAudio(); launch(); }
    else if (k==='r'){ resetLevel(); }
    else if (k==='n'){ nextLevel(); }
    else if (k==='enter'){ toggleRun(); }
  });

  function resetLevel(){
    ensureAudio();
    buildLevel(state.level);
    state.running = true;
    state.won = false; state.lost = false;
    beep(360,0.05,'square',0.02);
  }

  function nextLevel(){
    ensureAudio();
    if (!state.won && state.level>=state.unlocked) return;
    state.level = Math.min(levels.length, state.level+1);
    buildLevel(state.level);
    state.running = true;
  }

  function toggleRun(){
    ensureAudio();
    if (state.won || state.lost){
      resetLevel();
      return;
    }
    state.running = !state.running;
    if (state.running && !world) buildLevel(state.level);
  }

  el('launch').addEventListener('click', ()=>{ensureAudio(); launch();});
  el('reset').addEventListener('click', resetLevel);
  el('next').addEventListener('click', nextLevel);
  el('start').addEventListener('click', toggleRun);

  window.addEventListener('resize', resize);
  resize();
  state.level = Math.min(state.level, state.unlocked);
  buildLevel(state.level);
  updateHUD();
  draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
