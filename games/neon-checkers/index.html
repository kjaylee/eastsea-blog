<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Checkers — 네온 체커스</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none}
#app{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:480px;padding:10px}
h1{font-size:clamp(18px,5vw,28px);letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,#ff3c6e,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;filter:drop-shadow(0 0 8px rgba(0,229,255,.5))}
#status-bar{display:flex;justify-content:space-between;align-items:center;width:100%;font-size:13px;gap:8px}
.status-pill{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 12px;font-size:12px;min-width:80px;text-align:center}
#turn-indicator{font-size:14px;font-weight:bold;letter-spacing:1px;padding:5px 16px;border-radius:20px;border:2px solid;transition:all .3s}
#turn-indicator.red{color:#ff3c6e;border-color:#ff3c6e;box-shadow:0 0 10px rgba(255,60,110,.4)}
#turn-indicator.blue{color:#00e5ff;border-color:#00e5ff;box-shadow:0 0 10px rgba(0,229,255,.4)}
#board-wrap{position:relative}
canvas{border-radius:8px;box-shadow:0 0 30px rgba(0,229,255,.2),0 0 60px rgba(255,60,110,.1);cursor:pointer;display:block;touch-action:none}
#btn-row{display:flex;gap:10px}
.btn{background:transparent;border:2px solid;border-radius:8px;padding:8px 20px;font-size:14px;cursor:pointer;letter-spacing:1px;transition:all .2s;font-family:inherit}
.btn-cyan{color:#00e5ff;border-color:#00e5ff}
.btn-cyan:hover{background:rgba(0,229,255,.15);box-shadow:0 0 12px rgba(0,229,255,.4)}
.btn-red{color:#ff3c6e;border-color:#ff3c6e}
.btn-red:hover{background:rgba(255,60,110,.15);box-shadow:0 0 12px rgba(255,60,110,.4)}
/* Screens */
#screen{position:fixed;inset:0;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:100;text-align:center;padding:20px}
#screen.hidden{display:none}
#screen h2{font-size:clamp(22px,6vw,40px);letter-spacing:3px;margin-bottom:8px}
#screen p{color:rgba(255,255,255,.7);font-size:14px;max-width:340px;line-height:1.6}
#screen .big-emoji{font-size:60px;margin-bottom:10px}
.neon-red{color:#ff3c6e;text-shadow:0 0 20px #ff3c6e}
.neon-blue{color:#00e5ff;text-shadow:0 0 20px #00e5ff}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0}
.score-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 20px}
.score-box .val{font-size:28px;font-weight:bold}
.score-box .lbl{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-top:2px}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="screen" id="start-screen">
  <div class="big-emoji">♟️</div>
  <h2 class="neon-blue">NEON CHECKERS</h2>
  <p>Red (you) vs Blue (AI) · Mandatory captures · Kings rule the board</p>
  <div class="score-grid">
    <div class="score-box"><div class="val neon-red" id="s-wins">0</div><div class="lbl">WINS</div></div>
    <div class="score-box"><div class="val neon-blue" id="s-losses">0</div><div class="lbl">LOSSES</div></div>
  </div>
  <button class="btn btn-cyan" id="btn-start">▶ PLAY</button>
</div>

<div id="app" class="hidden">
  <h1>NEON CHECKERS</h1>
  <div id="status-bar">
    <div class="status-pill" id="red-count">🔴 12</div>
    <div id="turn-indicator" class="red">YOUR TURN</div>
    <div class="status-pill" id="blue-count">🔵 12</div>
  </div>
  <div id="board-wrap"><canvas id="canvas"></canvas></div>
  <div id="btn-row">
    <button class="btn btn-red" id="btn-resign">RESIGN</button>
    <button class="btn btn-cyan" id="btn-menu">MENU</button>
  </div>
</div>

<!-- Game Over Screen -->
<div id="go-screen" class="hidden" style="position:fixed;inset:0;background:#0a0a1a;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:100;text-align:center;padding:20px">
  <div class="big-emoji" id="go-emoji">🎉</div>
  <h2 id="go-title" class="neon-blue">YOU WIN!</h2>
  <p id="go-msg"></p>
  <div class="score-grid">
    <div class="score-box"><div class="val neon-red" id="go-wins">0</div><div class="lbl">WINS</div></div>
    <div class="score-box"><div class="val neon-blue" id="go-losses">0</div><div class="lbl">LOSSES</div></div>
  </div>
  <button class="btn btn-cyan" id="btn-again">▶ PLAY AGAIN</button>
  <button class="btn btn-red" id="btn-gomenu">MENU</button>
</div>

<script>
// ─── Audio ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq=440, dur=0.1, type='square', vol=0.15) {
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur);
  } catch(e){}
}
function sndPick(){beep(600,0.07,'sine',0.12)}
function sndMove(){beep(400,0.1,'triangle',0.1)}
function sndCapture(){beep(280,0.15,'sawtooth',0.15);setTimeout(()=>beep(340,0.1,'sawtooth',0.1),80)}
function sndKing(){beep(880,0.1,'sine',0.15);setTimeout(()=>beep(1100,0.15,'sine',0.15),120)}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'sine',0.2),i*100))}
function sndLose(){[400,320,260].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'sawtooth',0.15),i*120))}

// ─── State ──────────────────────────────────────────────────────────────────
// Pieces: 0=empty,1=red,2=blue,3=red-king,4=blue-king
// Red=player (rows 5-7 start, moves up toward row 0)
// Blue=AI (rows 0-2 start, moves down toward row 7)
const EMPTY=0,RED=1,BLUE=2,RKING=3,BKING=4;
let board, selected, validMoves, turn, animating, mustCapture;
let wins=0, losses=0;
const LS_WINS='neon-checkers-wins', LS_LOSS='neon-checkers-losses';

function loadStats(){
  wins=parseInt(localStorage.getItem(LS_WINS)||'0');
  losses=parseInt(localStorage.getItem(LS_LOSS)||'0');
}
function saveStats(){
  localStorage.setItem(LS_WINS,wins);
  localStorage.setItem(LS_LOSS,losses);
}

function initBoard(){
  board=[];
  for(let r=0;r<8;r++){
    board[r]=[];
    for(let c=0;c<8;c++){
      board[r][c]=EMPTY;
      if((r+c)%2===1){
        if(r<3) board[r][c]=BLUE;
        else if(r>4) board[r][c]=RED;
      }
    }
  }
  selected=null; validMoves=[]; turn='red'; animating=false;
  mustCapture=null;
}

// ─── Move generation ────────────────────────────────────────────────────────
function isRed(p){return p===RED||p===RKING}
function isBlue(p){return p===BLUE||p===BKING}
function isKing(p){return p===RKING||p===BKING}
function owns(p,t){return t==='red'?isRed(p):isBlue(p)}
function opponent(t){return t==='red'?'blue':'red'}
function oppPiece(t,p){return t==='red'?isBlue(p):isRed(p)}

function dirs(p){
  if(p===RED) return [[-1,-1],[-1,1]];
  if(p===BLUE) return [[1,-1],[1,1]];
  return [[-1,-1],[-1,1],[1,-1],[1,1]];
}

function getCaptures(b,r,c){
  const p=b[r][c]; if(!p) return [];
  const res=[];
  for(const[dr,dc] of dirs(p)){
    const mr=r+dr, mc=c+dc, lr=r+2*dr, lc=c+2*dc;
    if(lr<0||lr>7||lc<0||lc>7) continue;
    const mid=b[mr][mc];
    if(mid&&oppPiece(isRed(p)?'red':'blue',mid)&&b[lr][lc]===EMPTY){
      res.push({from:[r,c],to:[lr,lc],cap:[mr,mc]});
    }
  }
  return res;
}

function getMoves(b,r,c){
  const p=b[r][c]; if(!p) return [];
  const res=[];
  for(const[dr,dc] of dirs(p)){
    const nr=r+dr, nc=c+dc;
    if(nr<0||nr>7||nc<0||nc>7) continue;
    if(b[nr][nc]===EMPTY) res.push({from:[r,c],to:[nr,nc],cap:null});
  }
  return res;
}

function allCaptures(b,t){
  const res=[];
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    if(owns(b[r][c],t)) res.push(...getCaptures(b,r,c));
  }
  return res;
}

function allMoves(b,t){
  const caps=allCaptures(b,t);
  if(caps.length) return caps; // mandatory capture
  const res=[];
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    if(owns(b[r][c],t)) res.push(...getMoves(b,r,c));
  }
  return res;
}

function applyMove(b,mv){
  const nb=b.map(r=>[...r]);
  const[fr,fc]=mv.from,[tr,tc]=mv.to;
  nb[tr][tc]=nb[fr][fc]; nb[fr][fc]=EMPTY;
  if(mv.cap) nb[mv.cap[0]][mv.cap[1]]=EMPTY;
  // King promotion
  if(nb[tr][tc]===RED&&tr===0) nb[tr][tc]=RKING;
  if(nb[tr][tc]===BLUE&&tr===7) nb[tr][tc]=BKING;
  return nb;
}

function countPieces(b,t){
  let n=0;
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const p=b[r][c];
    if(t==='red'&&isRed(p)) n++;
    if(t==='blue'&&isBlue(p)) n++;
  }
  return n;
}

// ─── AI Minimax ─────────────────────────────────────────────────────────────
function evaluate(b){
  let score=0;
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const p=b[r][c];
    if(p===BLUE) score+=3+(r*0.1);
    else if(p===BKING) score+=6;
    else if(p===RED) score-=3+((7-r)*0.1);
    else if(p===RKING) score-=6;
  }
  return score;
}

function minimax(b,depth,alpha,beta,maximizing){
  const t=maximizing?'blue':'red';
  const moves=allMoves(b,t);
  if(!moves.length||depth===0){
    if(!moves.length) return maximizing?-1000:1000;
    return evaluate(b);
  }
  if(maximizing){
    let best=-Infinity;
    for(const mv of moves){
      const nb=applyMove(b,mv);
      // check multi-jump
      let val;
      if(mv.cap){
        const caps2=getCaptures(nb,mv.to[0],mv.to[1]);
        if(caps2.length&&depth>0){
          // allow more jumps
          val=minimax(nb,depth-1,alpha,beta,true);
        } else {
          val=minimax(nb,depth-1,alpha,beta,false);
        }
      } else {
        val=minimax(nb,depth-1,alpha,beta,false);
      }
      best=Math.max(best,val);
      alpha=Math.max(alpha,best);
      if(beta<=alpha) break;
    }
    return best;
  } else {
    let best=Infinity;
    for(const mv of moves){
      const nb=applyMove(b,mv);
      let val;
      if(mv.cap){
        const caps2=getCaptures(nb,mv.to[0],mv.to[1]);
        if(caps2.length&&depth>0){
          val=minimax(nb,depth-1,alpha,beta,false);
        } else {
          val=minimax(nb,depth-1,alpha,beta,true);
        }
      } else {
        val=minimax(nb,depth-1,alpha,beta,true);
      }
      best=Math.min(best,val);
      beta=Math.min(beta,best);
      if(beta<=alpha) break;
    }
    return best;
  }
}

function bestAIMove(b){
  const moves=allMoves(b,'blue');
  if(!moves.length) return null;
  let best=-Infinity, bestMv=null;
  for(const mv of moves){
    const nb=applyMove(b,mv);
    const val=minimax(nb,3,-Infinity,Infinity,false);
    if(val>best){best=val;bestMv=mv;}
  }
  return bestMv;
}

// ─── Canvas ─────────────────────────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let CELL, OFF;

function resize(){
  const maxW=Math.min(window.innerWidth-20, window.innerHeight-200, 460);
  const sz=Math.floor(maxW/8)*8;
  canvas.width=sz; canvas.height=sz;
  CELL=sz/8; OFF=0;
  draw();
}

function glow(color,blur=15){ctx.shadowColor=color;ctx.shadowBlur=blur}
function noGlow(){ctx.shadowBlur=0}

function draw(){
  if(!board) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Board
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const x=c*CELL, y=r*CELL;
    const dark=(r+c)%2===1;
    ctx.fillStyle=dark?'#0d1829':'#0a0f1a';
    ctx.fillRect(x,y,CELL,CELL);
    if(dark){
      ctx.strokeStyle='rgba(0,229,255,0.06)';
      ctx.strokeRect(x+.5,y+.5,CELL-1,CELL-1);
    }
  }
  // Valid move highlights
  for(const mv of validMoves){
    const[tr,tc]=mv.to;
    const x=tc*CELL, y=tr*CELL;
    glow(mv.cap?'#ff3c6e':'#00e5ff',20);
    ctx.fillStyle=mv.cap?'rgba(255,60,110,0.25)':'rgba(0,229,255,0.15)';
    ctx.beginPath();
    ctx.arc(x+CELL/2,y+CELL/2,CELL*0.28,0,Math.PI*2);
    ctx.fill();
    noGlow();
  }
  // Captured piece indicators
  for(const mv of validMoves){
    if(mv.cap){
      const[cr,cc]=mv.cap;
      ctx.strokeStyle='rgba(255,60,110,0.5)';
      ctx.lineWidth=2;
      glow('#ff3c6e',10);
      ctx.strokeRect(cc*CELL+2,cr*CELL+2,CELL-4,CELL-4);
      noGlow();
    }
  }
  // Selected highlight
  if(selected){
    const[sr,sc]=selected;
    glow('#ffe135',20);
    ctx.strokeStyle='#ffe135';
    ctx.lineWidth=3;
    ctx.strokeRect(sc*CELL+2,sr*CELL+2,CELL-4,CELL-4);
    noGlow();
  }
  // Pieces
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const p=board[r][c];
    if(!p) continue;
    drawPiece(ctx,r,c,p);
  }
}

function drawPiece(ctx,r,c,p){
  const x=c*CELL+CELL/2, y=r*CELL+CELL/2, rad=CELL*0.38;
  const isR=isRed(p);
  const col=isR?'#ff3c6e':'#00e5ff';
  const colDark=isR?'#7a1030':'#005f7a';
  // Shadow/glow
  glow(col,isKing(p)?25:15);
  // Outer ring
  ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2);
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.stroke();
  // Inner fill
  const grad=ctx.createRadialGradient(x-rad*.3,y-rad*.3,rad*.1,x,y,rad);
  grad.addColorStop(0,isR?'rgba(255,100,130,0.8)':'rgba(80,220,255,0.8)');
  grad.addColorStop(1,isR?'rgba(120,10,40,0.9)':'rgba(0,60,100,0.9)');
  ctx.fillStyle=grad; ctx.fill();
  // Shine
  ctx.beginPath(); ctx.arc(x-rad*.3,y-rad*.35,rad*.25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fill();
  noGlow();
  // King crown
  if(isKing(p)){
    glow('#ffe135',20);
    ctx.strokeStyle='#ffe135'; ctx.lineWidth=2;
    const cr=rad*.45, cy=y;
    // Simple crown: 3 points up
    ctx.beginPath();
    ctx.moveTo(x-cr,cy+cr*.3);
    ctx.lineTo(x-cr,cy-cr*.6);
    ctx.lineTo(x-cr*.33,cy-cr*.1);
    ctx.lineTo(x,cy-cr*.8);
    ctx.lineTo(x+cr*.33,cy-cr*.1);
    ctx.lineTo(x+cr,cy-cr*.6);
    ctx.lineTo(x+cr,cy+cr*.3);
    ctx.closePath();
    ctx.fillStyle='rgba(255,225,53,0.25)'; ctx.fill();
    ctx.stroke();
    noGlow();
  }
}

// ─── Interaction ─────────────────────────────────────────────────────────────
function getCell(evt){
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  let clientX, clientY;
  if(evt.touches){
    clientX=evt.touches[0].clientX;
    clientY=evt.touches[0].clientY;
  } else {
    clientX=evt.clientX; clientY=evt.clientY;
  }
  const x=(clientX-rect.left)*scaleX;
  const y=(clientY-rect.top)*scaleY;
  return [Math.floor(y/CELL),Math.floor(x/CELL)];
}

function handleClick(evt){
  if(animating||turn!=='red') return;
  AC.resume();
  const [r,c]=getCell(evt);
  if(r<0||r>7||c<0||c>7) return;

  const forced=allCaptures(board,'red');
  // If clicking on a move target
  if(selected){
    const mv=validMoves.find(m=>m.to[0]===r&&m.to[1]===c);
    if(mv){
      doPlayerMove(mv);
      return;
    }
  }
  // Clicking on own piece
  if(isRed(board[r][c])){
    // If forced captures, only allow clicking pieces that have captures
    if(forced.length){
      const caps=getCaptures(board,r,c);
      if(!caps.length){sndPick();return;} // can't select this piece
      selected=[r,c]; validMoves=caps; sndPick(); draw(); return;
    }
    selected=[r,c];
    validMoves=getMoves(board,r,c);
    sndPick(); draw(); return;
  }
  selected=null; validMoves=[]; draw();
}

function doPlayerMove(mv, chainBoard){
  animating=true;
  const b=chainBoard||board;
  const nb=applyMove(b,mv);
  const wasCapture=!!mv.cap;
  const wasKing=isRed(b[mv.from[0]][mv.from[1]])?false:(nb[mv.to[0]][mv.to[1]]===RKING&&b[mv.from[0]][mv.from[1]]===RED);
  if(wasCapture) sndCapture(); else sndMove();
  if(nb[mv.to[0]][mv.to[1]]===RKING&&b[mv.from[0]][mv.from[1]]===RED) sndKing();
  board=nb;
  // Multi-jump: check more captures from landing square
  if(wasCapture){
    const moreJumps=getCaptures(board,mv.to[0],mv.to[1]);
    if(moreJumps.length){
      selected=mv.to; validMoves=moreJumps;
      animating=false; updateUI(); draw(); return;
    }
  }
  selected=null; validMoves=[]; animating=false;
  updateUI(); draw();
  checkWin();
  if(turn==='red'&&!checkWin()){
    turn='blue'; updateUI(); setTimeout(doAIMove,500);
  }
}

function doAIMove(){
  if(turn!=='blue') return;
  animating=true;
  const mv=bestAIMove(board);
  if(!mv){endGame('red');return;}
  const wasCapture=!!mv.cap;
  board=applyMove(board,mv);
  if(wasCapture) sndCapture(); else sndMove();
  if(board[mv.to[0]][mv.to[1]]===BKING&&board[mv.to[0]][mv.to[1]]!==board[mv.from[0]][mv.from[1]]) sndKing();
  // Multi-jump for AI
  if(wasCapture){
    const more=getCaptures(board,mv.to[0],mv.to[1]);
    if(more.length){
      animating=false; updateUI(); draw();
      setTimeout(()=>{
        const mv2=more[Math.floor(Math.random()*more.length)];
        board=applyMove(board,mv2);
        sndCapture(); updateUI(); draw();
        setTimeout(()=>{
          animating=false; turn='red'; updateUI(); draw(); checkWin();
        },400);
      },400);
      return;
    }
  }
  animating=false; turn='red'; updateUI(); draw();
  checkWin();
}

function checkWin(){
  const rc=countPieces(board,'red'), bc=countPieces(board,'blue');
  const rm=allMoves(board,'red'), bm=allMoves(board,'blue');
  if(bc===0||!bm.length){endGame('red');return true;}
  if(rc===0||!rm.length){endGame('blue');return true;}
  return false;
}

function endGame(winner){
  if(winner==='red'){wins++;sndWin();}else{losses++;sndLose();}
  saveStats();
  setTimeout(()=>showGameOver(winner),600);
}

function updateUI(){
  const rc=countPieces(board,'red'), bc=countPieces(board,'blue');
  document.getElementById('red-count').textContent='🔴 '+rc;
  document.getElementById('blue-count').textContent='🔵 '+bc;
  const ti=document.getElementById('turn-indicator');
  if(turn==='red'){ti.textContent='YOUR TURN';ti.className='red';}
  else{ti.textContent='AI THINKING';ti.className='blue';}
}

// ─── Screens ─────────────────────────────────────────────────────────────────
const startScreen=document.getElementById('screen');
const appDiv=document.getElementById('app');
const goScreen=document.getElementById('go-screen');

function showStart(){
  loadStats();
  document.getElementById('s-wins').textContent=wins;
  document.getElementById('s-losses').textContent=losses;
  startScreen.classList.remove('hidden');
  appDiv.classList.add('hidden');
  goScreen.style.display='none';
}

function startGame(){
  startScreen.classList.add('hidden');
  appDiv.classList.remove('hidden');
  goScreen.style.display='none';
  initBoard();
  resize();
  updateUI();
  draw();
}

function showGameOver(winner){
  const won=winner==='red';
  document.getElementById('go-emoji').textContent=won?'🏆':'💀';
  document.getElementById('go-title').textContent=won?'YOU WIN!':'AI WINS!';
  document.getElementById('go-title').className=won?'neon-blue':'neon-red';
  document.getElementById('go-msg').textContent=won?'Excellent moves! The blue pieces are vanquished.':'The AI outmaneuvered you. Try again!';
  document.getElementById('go-wins').textContent=wins;
  document.getElementById('go-losses').textContent=losses;
  appDiv.classList.add('hidden');
  goScreen.style.display='flex';
}

// ─── Event listeners ─────────────────────────────────────────────────────────
document.getElementById('btn-start').onclick=startGame;
document.getElementById('btn-again').onclick=startGame;
document.getElementById('btn-gomenu').onclick=showStart;
document.getElementById('btn-resign').onclick=()=>{if(!animating){endGame('blue');}};
document.getElementById('btn-menu').onclick=showStart;
canvas.addEventListener('click',handleClick);
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleClick(e);},{passive:false});
window.addEventListener('resize',resize);

// ─── Init ─────────────────────────────────────────────────────────────────────
loadStats();
document.getElementById('s-wins').textContent=wins;
document.getElementById('s-losses').textContent=losses;
</script>
</body>
</html>
