<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎨 Neon Color Switch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier New',monospace;color:#fff}
canvas{display:block;touch-action:none}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;transition:opacity .3s}
.hidden{opacity:0;pointer-events:none!important}

.title{font-size:clamp(2rem,8vw,3.5rem);font-weight:bold;text-align:center;line-height:1.2}
.t1{color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff}
.t2{color:#f0f;text-shadow:0 0 20px #f0f,0 0 40px #f0f}
.t3{color:#ff0;text-shadow:0 0 20px #ff0}
.t4{color:#0f0;text-shadow:0 0 20px #0f0}
.subtitle{color:#666;font-size:.9rem;margin:.8rem 0 2rem;text-align:center;line-height:1.6;max-width:280px}

.btn{padding:.8rem 2.4rem;border-radius:8px;font-size:1rem;font-family:inherit;cursor:pointer;background:transparent;transition:all .2s;letter-spacing:1px}
.btn-start{color:#0ff;border:2px solid #0ff;box-shadow:0 0 10px #0ff3}
.btn-start:hover,.btn-start:active{background:#0ff1;box-shadow:0 0 20px #0ff}
.btn-retry{color:#f0f;border:2px solid #f0f;box-shadow:0 0 10px #f0f3;margin:.5rem}
.btn-retry:hover,.btn-retry:active{background:#f0f1}
.btn-home{color:#888;border:2px solid #444;margin:.5rem}
.btn-home:hover,.btn-home:active{border-color:#888;background:#8881}

.hi-label{color:#ff0;font-size:.8rem;margin-top:1rem;text-shadow:0 0 8px #ff0}
.tip{color:#555;font-size:.7rem;margin-top:.8rem}
.go-score{font-size:3rem;font-weight:bold;color:#0ff;text-shadow:0 0 20px #0ff;margin:.5rem 0}
.go-hi{font-size:.9rem;color:#ff0;margin-bottom:1rem}

#hud{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:.6rem 1rem;pointer-events:none}
.hud-score{font-size:1.4rem;font-weight:bold;color:#0ff;text-shadow:0 0 10px #0ff}
.hud-stars{font-size:1rem;color:#ff0;text-shadow:0 0 8px #ff0}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" class="hidden">
  <div class="hud-score" id="scoreLbl">0</div>
  <div class="hud-stars" id="starsLbl">⭐ 0</div>
</div>

<!-- Start -->
<div id="startScreen" class="overlay">
  <div class="title"><span class="t1">NEON</span> <span class="t2">COLOR</span><br><span class="t3">SWITCH</span></div>
  <div class="subtitle">Match your ball's color to pass through the rotating barriers.<br>Tap / Space to bounce!</div>
  <button class="btn btn-start" id="startBtn">▶ PLAY</button>
  <div class="hi-label" id="hiLabel"></div>
  <div class="tip">Collect ⭐ stars for bonus points</div>
</div>

<!-- Game Over -->
<div id="gameOverScreen" class="overlay hidden">
  <div class="title" style="font-size:2rem"><span class="t2">GAME</span> <span style="color:#f44;text-shadow:0 0 20px #f44">OVER</span></div>
  <div class="go-score" id="goScore">0</div>
  <div class="go-hi" id="goHi"></div>
  <div style="display:flex;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-retry" onclick="startGame()">↺ RETRY</button>
    <button class="btn btn-home" onclick="showStart()">🏠 MENU</button>
  </div>
</div>

<script>
// ── Canvas Setup ───────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){
  W=canvas.width=Math.min(window.innerWidth,400);
  H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',()=>{resize();if(state==='game')rebuildOnResize()});

// ── Audio ──────────────────────────────────────────────
let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC}
function resumeAC(){const ac=getAC();if(ac.state==='suspended')ac.resume()}
function tone(freq,type,dur,vol=0.2,t=0){
  const ac=getAC();
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=type;o.frequency.value=freq;
  const s=ac.currentTime+t;
  g.gain.setValueAtTime(vol,s);
  g.gain.exponentialRampToValueAtTime(0.001,s+dur);
  o.start(s);o.stop(s+dur);
}
function sfxBounce(){tone(300,'sine',.08,.15)}
function sfxPass(){tone(523,'sine',.06,.1);tone(659,'sine',.06,.08,.06);tone(784,'sine',.1,.1,.12)}
function sfxStar(){tone(880,'sine',.1,.15);tone(1047,'sine',.1,.15,.08)}
function sfxDie(){tone(200,'sawtooth',.08,.2);tone(150,'sawtooth',.1,.2,.1);tone(100,'square',.2,.2,.2)}
function sfxChange(){tone(440,'triangle',.06,.12)}

// ── Colors ─────────────────────────────────────────────
const COLORS=['#0ff','#f0f','#ff0','#0f0'];
const CGLOW=['#0ff','#f0f','#ff0','#0f0'];
const COL_NAME=['cyan','magenta','yellow','green'];

// ── State ──────────────────────────────────────────────
let state='start'; // start | game | over
let ball,barriers,stars,particles,score,starCount,raf;
const BALL_R=12;
const BARRIER_GAP=170; // vertical gap between barriers
const BARRIER_FIRST_Y=H*0.55; // first barrier below ball start
const BARRIER_OUTER_R=55;
const BARRIER_INNER_R=30;
const STAR_R=10;

// ── Ball ───────────────────────────────────────────────
function makeBall(){
  return{x:W/2,y:H*0.72,vy:0,colIdx:0,trail:[],alive:true}
}
function ballTap(){
  if(!ball.alive)return;
  ball.vy=-11;
  sfxBounce();
}

// ── Barrier generation ─────────────────────────────────
let barrierIdCounter=0;
function makeBarrier(y,speed){
  const offset=Math.random()*Math.PI*2;
  return{id:barrierIdCounter++,y,angle:offset,speed,segments:4,passed:false,warping:false,warpAlpha:0};
}
function initBarriers(){
  barriers=[];
  let y=BARRIER_FIRST_Y;
  for(let i=0;i<8;i++){
    barriers.push(makeBarrier(y,0.018+i*0.004));
    y-=BARRIER_GAP;
  }
}

// ── Stars ──────────────────────────────────────────────
function initStars(){
  stars=[];
  barriers.forEach((b,i)=>{
    if(i%2===1){
      stars.push({x:W/2+(Math.random()-.5)*80,y:b.y+BARRIER_GAP/2,r:STAR_R,collected:false,pulse:Math.random()*Math.PI*2});
    }
  });
}

// ── Particles ─────────────────────────────────────────
function spawnParticles(x,y,color,n=12){
  for(let i=0;i<n;i++){
    const angle=Math.random()*Math.PI*2;
    const sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(angle)*sp,vy:Math.sin(angle)*sp,life:1,color,r:3+Math.random()*3});
  }
}

// ── Camera scroll ─────────────────────────────────────
let camY=0; // world Y of camera top — camera follows ball

function worldToScreen(wy){return wy-camY}
function screenToWorld(sy){return sy+camY}

// ── Game Init ──────────────────────────────────────────
function startGame(){
  resumeAC();
  state='game';
  score=0;starCount=0;
  ball=makeBall();
  particles=[];
  camY=0;
  initBarriers();
  initStars();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  updateHUD();
  if(raf)cancelAnimationFrame(raf);
  loop();
}
function showStart(){
  state='start';
  if(raf)cancelAnimationFrame(raf);
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden');
  updateHiLabel();
}
function gameOver(){
  state='over';
  sfxDie();
  const hi=parseInt(localStorage.getItem('neon-color-switch-hi')||0);
  const newHi=Math.max(hi,score);
  localStorage.setItem('neon-color-switch-hi',newHi);
  document.getElementById('goScore').textContent=score;
  document.getElementById('goHi').textContent=newHi>hi?`🏆 NEW HI-SCORE: ${newHi}`:`Best: ${newHi}`;
  setTimeout(()=>{
    document.getElementById('gameOverScreen').classList.remove('hidden');
  },800);
}
function updateHiLabel(){
  const hi=localStorage.getItem('neon-color-switch-hi')||0;
  document.getElementById('hiLabel').textContent=hi>0?`Best: ${hi}`:'';
}
function updateHUD(){
  document.getElementById('scoreLbl').textContent=score;
  document.getElementById('starsLbl').textContent=`⭐ ${starCount}`;
}
function rebuildOnResize(){}

// ── Color segment check ────────────────────────────────
// Barrier has 4 equal segments. Segment i = angles [i*PI/2,(i+1)*PI/2]
// The segment at 12-o'clock (top) = segment whose range includes -PI/2
// Ball hits top of barrier circle → check which segment aligns with top
function getSegmentAtTop(barrier){
  // top of circle = angle -PI/2 (or 3PI/2)
  const topAngle=-Math.PI/2;
  const normalized=((topAngle-barrier.angle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  return Math.floor(normalized/(Math.PI*2/barrier.segments))%barrier.segments;
}

// ── Barrier collision ──────────────────────────────────
function checkBarrierCollision(b){
  const bsy=worldToScreen(b.y);
  const bsx=W/2;
  const dx=ball.x-bsx, dy=ball.y-bsy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<BARRIER_INNER_R+BALL_R||dist>BARRIER_OUTER_R+BALL_R)return false; // outside ring
  // Inside the ring zone
  const ballAngle=Math.atan2(dy,dx);
  const normalized=((ballAngle-b.angle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  const segIdx=Math.floor(normalized/(Math.PI*2/b.segments))%b.segments;
  const ballColor=COLORS[ball.colIdx];
  const segColor=COLORS[segIdx%COLORS.length];
  if(ballColor===segColor){
    // Pass through!
    return 'pass';
  } else {
    return 'die';
  }
}

// ── Color orbs (color-change pickups on barriers) ─────
// Actually: when ball passes through a barrier, its color changes to
// the next barrier's color hint. Let's implement color orbs as inline
// items attached to star positions with specific colors.

// Actually per spec: "Ball changes color on pickup" — we'll place color orbs
// distinct from stars. Let's make the star pickups also change color.

// ── Main Loop ──────────────────────────────────────────
let lastTime=0;
function loop(ts=0){
  if(state!=='game'){return}
  raf=requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;

  update(dt);
  draw();
}

function update(dt){
  if(!ball.alive)return;

  // Gravity
  ball.vy+=0.45*dt;
  ball.y+=ball.vy*dt;

  // Trail
  ball.trail.push({x:ball.x,y:ball.y,alpha:1});
  if(ball.trail.length>18)ball.trail.shift();

  // Camera: keep ball at ~70% down
  const targetCamY=ball.y-H*0.72;
  if(targetCamY<camY)camY+=(targetCamY-camY)*0.12*dt;

  // Fell below screen
  if(ball.y>screenToWorld(H+80)){
    ball.alive=false;
    spawnParticles(ball.x,ball.y,COLORS[ball.colIdx],20);
    gameOver();
    return;
  }

  // Update barriers
  for(const b of barriers){
    b.angle+=b.speed*dt;
    if(b.warping){b.warpAlpha=Math.min(b.warpAlpha+0.05*dt,1)}
  }

  // Check pass / collision
  for(const b of barriers){
    if(b.passed)continue;
    const bsy=worldToScreen(b.y);
    // Only check when ball is in vertical range
    if(Math.abs(ball.y-b.y)<(BARRIER_OUTER_R+BALL_R)){
      const res=checkBarrierCollision(b);
      if(res==='pass'){
        b.passed=true;
        score++;
        sfxPass();
        spawnParticles(ball.x,ball.y,COLORS[ball.colIdx],16);
        // change ball color
        const nextIdx=(ball.colIdx+1)%COLORS.length;
        ball.colIdx=nextIdx;
        sfxChange();
        updateHUD();
      } else if(res==='die'){
        ball.alive=false;
        spawnParticles(ball.x,ball.y,COLORS[ball.colIdx],24);
        gameOver();
        return;
      }
    }
  }

  // Extend barriers upward
  if(barriers.length>0){
    const topB=barriers.reduce((a,b)=>a.y<b.y?a:b);
    if(worldToScreen(topB.y)>-BARRIER_GAP*2){
      const newY=topB.y-BARRIER_GAP;
      const newSpeed=topB.speed+0.003;
      barriers.push(makeBarrier(newY,newSpeed));
      // Add star
      if(Math.random()<0.6){
        stars.push({x:W/2+(Math.random()-.5)*80,y:newY+BARRIER_GAP/2,r:STAR_R,collected:false,pulse:Math.random()*Math.PI*2});
      }
    }
  }

  // Remove off-screen barriers
  barriers=barriers.filter(b=>worldToScreen(b.y)<H+100);

  // Star collection
  for(const s of stars){
    if(s.collected)continue;
    s.pulse+=0.08*dt;
    const sy=worldToScreen(s.y);
    const dx=ball.x-s.x, dy=ball.y-sy;
    if(Math.sqrt(dx*dx+dy*dy)<BALL_R+s.r+4){
      s.collected=true;
      starCount++;score+=3;
      sfxStar();
      spawnParticles(s.x,sy,'#ff0',10);
      updateHUD();
    }
  }
  stars=stars.filter(s=>!s.collected&&worldToScreen(s.y)<H+100);

  // Particles
  for(const p of particles){
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=0.15*dt;
    p.life-=0.04*dt;
  }
  particles=particles.filter(p=>p.life>0);
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);

  // Grid lines
  ctx.save();
  ctx.globalAlpha=0.04;
  ctx.strokeStyle='#0ff';
  ctx.lineWidth=1;
  const gridSpacing=40;
  const offsetY=(-camY)%gridSpacing;
  for(let y=offsetY;y<H;y+=gridSpacing){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  for(let x=0;x<W;x+=gridSpacing){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  ctx.restore();

  // Barriers
  for(const b of barriers){
    drawBarrier(b);
  }

  // Stars
  for(const s of stars){
    const sy=worldToScreen(s.y);
    if(sy<-30||sy>H+30)continue;
    const pulse=0.7+0.3*Math.sin(s.pulse);
    ctx.save();
    ctx.shadowColor='#ff0';ctx.shadowBlur=10*pulse;
    ctx.fillStyle='#ff0';
    ctx.globalAlpha=pulse;
    drawStar5(s.x,sy,s.r*0.5,s.r);
    ctx.restore();
  }

  // Particles
  for(const p of particles){
    const sy=worldToScreen(p.y);
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(p.x,sy,p.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Ball trail
  for(let i=0;i<ball.trail.length;i++){
    const t=ball.trail[i];
    const alpha=(i/ball.trail.length)*0.5;
    const r=BALL_R*(i/ball.trail.length)*0.7;
    const sy=worldToScreen(t.y);
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle=COLORS[ball.colIdx];
    ctx.shadowColor=COLORS[ball.colIdx];ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(t.x,sy,r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Ball
  if(ball.alive){
    const sy=worldToScreen(ball.y);
    const col=COLORS[ball.colIdx];
    ctx.save();
    ctx.shadowColor=col;ctx.shadowBlur=20;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(ball.x,sy,BALL_R,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=40;
    ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(ball.x,sy,BALL_R+4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Score
  // (HUD is HTML)
}

function drawBarrier(b){
  const cx=W/2, cy=worldToScreen(b.y);
  if(cy<-BARRIER_OUTER_R-10||cy>H+BARRIER_OUTER_R+10)return;
  const seg=b.segments;
  const arc=Math.PI*2/seg;
  const THICKNESS=BARRIER_OUTER_R-BARRIER_INNER_R;

  for(let i=0;i<seg;i++){
    const col=COLORS[i%COLORS.length];
    const startA=b.angle+i*arc;
    const endA=startA+arc-0.04; // tiny gap
    ctx.save();
    ctx.shadowColor=col;ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.arc(cx,cy,BARRIER_OUTER_R,startA,endA);
    ctx.arc(cx,cy,BARRIER_INNER_R,endA,startA,true);
    ctx.closePath();
    ctx.fillStyle=col;
    ctx.globalAlpha=b.passed?0.25:0.85;
    ctx.fill();
    // Glow ring
    ctx.shadowBlur=20;
    ctx.globalAlpha=b.passed?0.1:0.4;
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.stroke();
    ctx.restore();
  }

  // Center dot
  if(!b.passed){
    ctx.save();
    ctx.fillStyle='#fff2';
    ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawStar5(cx,cy,innerR,outerR){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const angle=Math.PI/5*i-Math.PI/2;
    const r=i%2===0?outerR:innerR;
    const x=cx+Math.cos(angle)*r;
    const y=cy+Math.sin(angle)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.fill();
}

// ── Input ──────────────────────────────────────────────
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state==='game'){ballTap()}else if(state==='start'){startGame()}},{passive:false});
canvas.addEventListener('mousedown',e=>{if(state==='game'){ballTap()}else if(state==='start'){startGame()}});
document.addEventListener('keydown',e=>{
  if((e.code==='Space'||e.code==='ArrowUp')){
    e.preventDefault();
    if(state==='game'){ballTap()}
    else if(state==='start'){startGame()}
  }
});
document.getElementById('startBtn').addEventListener('click',e=>{e.stopPropagation();startGame()});

// ── Init ───────────────────────────────────────────────
updateHiLabel();
// Draw static background on canvas
ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
</script>
</body>
</html>
