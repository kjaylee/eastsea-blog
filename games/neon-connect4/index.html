<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Connect 4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;touch-action:manipulation}
#app{width:100%;max-width:520px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:12px}
h1{font-size:clamp(1.4rem,5vw,2.2rem);color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff8;letter-spacing:3px;text-transform:uppercase;text-align:center}
.status-bar{width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:clamp(0.75rem,2.5vw,0.95rem)}
.turn-indicator{display:flex;align-items:center;gap:8px;padding:6px 14px;border:1px solid #333;border-radius:20px;background:#111;min-width:120px;justify-content:center;transition:border-color .3s}
.turn-indicator.p1{border-color:#0ff;box-shadow:0 0 10px #0ff4}
.turn-indicator.p2{border-color:#f0f;box-shadow:0 0 10px #f0f4}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block}
.dot.p1{background:#0ff;box-shadow:0 0 8px #0ff}
.dot.p2{background:#f0f;box-shadow:0 0 8px #f0f}
.scores{display:flex;gap:16px;align-items:center}
.score-box{text-align:center;font-size:0.8rem;color:#888}
.score-box span{display:block;font-size:1.2rem;font-weight:700}
.score-box.p1 span{color:#0ff;text-shadow:0 0 8px #0ff}
.score-box.p2 span{color:#f0f;text-shadow:0 0 8px #f0f}
#board-wrap{position:relative;width:100%;cursor:pointer}
#col-hints{display:grid;grid-template-columns:repeat(7,1fr);width:100%;margin-bottom:4px;height:24px}
.col-hint{display:flex;justify-content:center;align-items:center;opacity:0;transition:opacity .2s;font-size:14px;color:#0ff}
.col-hint.active{opacity:1}
#board-canvas{display:block;width:100%;border-radius:8px;box-shadow:0 0 30px #0ff2,0 0 60px #0ff1;background:#050515}
.mode-btns{display:flex;gap:10px}
.mode-btn{padding:8px 18px;border:1.5px solid #0ff4;background:#0ff1;color:#0ff;border-radius:20px;font-size:0.85rem;cursor:pointer;transition:all .2s;letter-spacing:1px}
.mode-btn.active,.mode-btn:hover{background:#0ff2;border-color:#0ff;box-shadow:0 0 12px #0ff4}
.mode-btn.p2{border-color:#f0f4;background:#f0f1;color:#f0f}
.mode-btn.p2.active,.mode-btn.p2:hover{background:#f0f2;border-color:#f0f;box-shadow:0 0 12px #f0f4}
.btn{padding:10px 28px;border:2px solid #0ff;background:transparent;color:#0ff;font-size:1rem;border-radius:4px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
.btn:hover,.btn:active{background:#0ff2;box-shadow:0 0 16px #0ff}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,26,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:100}
#overlay h2{font-size:clamp(1.5rem,5vw,2.5rem);text-transform:uppercase;letter-spacing:3px}
#overlay .result-sub{color:#aaa;font-size:1rem}
#overlay.hidden{display:none}
.win-p1 h2{color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff}
.win-p2 h2{color:#f0f;text-shadow:0 0 20px #f0f,0 0 40px #f0f}
.win-draw h2{color:#ff0;text-shadow:0 0 20px #ff0}
.hi-record{color:#f90;font-size:0.9rem;text-shadow:0 0 8px #f90}
footer{color:#333;font-size:0.75rem;text-align:center;margin-top:4px}
</style>
</head>
<body>
<div id="app">
  <h1>⬡ CONNECT 4</h1>
  <div class="mode-btns">
    <button class="mode-btn active" id="btn-ai">🤖 vs AI</button>
    <button class="mode-btn p2" id="btn-2p">👥 2 Players</button>
  </div>
  <div class="status-bar">
    <div class="turn-indicator p1" id="turn-ind">
      <span class="dot p1"></span>
      <span id="turn-label">Your Turn</span>
    </div>
    <div class="scores">
      <div class="score-box p1"><small>CYAN</small><span id="s1">0</span></div>
      <div class="score-box" style="color:#555"><small>DRAW</small><span id="sd">0</span></div>
      <div class="score-box p2"><small id="p2-label">AI</small><span id="s2">0</span></div>
    </div>
  </div>
  <div id="board-wrap">
    <div id="col-hints"></div>
    <canvas id="board-canvas"></canvas>
  </div>
  <button class="btn" id="new-btn">↺ NEW GAME</button>
  <footer>Tap column to drop · <span id="hi-txt"></span></footer>
</div>

<div id="overlay" class="hidden">
  <h2 id="ov-title">Draw!</h2>
  <p class="result-sub" id="ov-sub"></p>
  <p class="hi-record" id="ov-hi"></p>
  <button class="btn" id="ov-btn">↺ PLAY AGAIN</button>
</div>

<script>
(function(){
'use strict';
const COLS=7,ROWS=6;
const HI_KEY='neon-connect4-hi';
const P1=1,P2=2;

// Audio
let ac=null;
function ensureAC(){if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}}
function tone(freq,type,dur,vol=0.25){
  ensureAC();if(!ac)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start();o.stop(ac.currentTime+dur);
  }catch(e){}
}
function sfxDrop(){tone(300,'sine',0.08,0.2)}
function sfxWin(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.2,0.3),i*80));
}
function sfxDraw(){tone(300,'triangle',0.4,0.2)}
function sfxClick(){tone(800,'sine',0.06,0.15)}

// State
let board,current,gameOver,mode,animating;
let scores={1:0,2:0,d:0};
let winLine=null;
let dropping=null; // {col,row,y,targetY,disc}
let hoverCol=-1;
let hiWins=parseInt(localStorage.getItem(HI_KEY)||'0');

const canvas=document.getElementById('board-canvas');
const ctx=canvas.getContext('2d');
let CW,CH,CELL,RADIUS;

function resize(){
  const wrap=document.getElementById('board-wrap');
  const maxW=Math.min(wrap.clientWidth||360,500);
  CELL=Math.floor(maxW/COLS);
  CW=CELL*COLS; CH=CELL*ROWS;
  canvas.width=CW; canvas.height=CH;
  canvas.style.width=CW+'px';
  RADIUS=CELL*0.38;
  buildHints();
}

function buildHints(){
  const hints=document.getElementById('col-hints');
  hints.innerHTML='';
  hints.style.gridTemplateColumns=`repeat(${COLS},${CELL}px)`;
  for(let c=0;c<COLS;c++){
    const d=document.createElement('div');
    d.className='col-hint';
    d.textContent='▼';
    d.style.width=CELL+'px';
    hints.appendChild(d);
  }
}

function newGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  current=P1;
  gameOver=false;
  winLine=null;
  dropping=null;
  animating=false;
  updateTurnUI();
  document.getElementById('overlay').className='hidden';
  draw();
  if(mode==='ai'&&current===P2) aiMove();
}

function setMode(m){
  mode=m;
  document.getElementById('btn-ai').className='mode-btn'+(m==='ai'?' active':'');
  document.getElementById('btn-2p').className='mode-btn p2'+(m==='2p'?' active':'');
  document.getElementById('p2-label').textContent=m==='ai'?'AI':'MAGENTA';
  newGame();
}

function updateTurnUI(){
  const ind=document.getElementById('turn-ind');
  const lbl=document.getElementById('turn-label');
  if(current===P1){
    ind.className='turn-indicator p1';
    lbl.textContent='Cyan\'s Turn';
  } else {
    ind.className='turn-indicator p2';
    lbl.textContent=mode==='ai'?'AI Thinking…':'Magenta\'s Turn';
  }
}

// Board logic
function inBounds(r,c){return r>=0&&r<ROWS&&c>=0&&c<COLS;}
function getRow(col){for(let r=ROWS-1;r>=0;r--){if(!board[r][col])return r;}return -1;}

function checkWin(b,player){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(b[r][c]!==player) continue;
      for(const [dr,dc] of dirs){
        let line=[{r,c}];
        for(let k=1;k<4;k++){
          const nr=r+dr*k,nc=c+dc*k;
          if(!inBounds(nr,nc)||b[nr][nc]!==player) break;
          line.push({r:nr,c:nc});
        }
        if(line.length===4) return line;
      }
    }
  }
  return null;
}

function isFull(b){return b[0].every(v=>v!==0);}

// Minimax
function scoreWindow(w,player){
  const opp=player===P1?P2:P1;
  let score=0;
  const pc=w.filter(v=>v===player).length;
  const ec=w.filter(v=>v===0).length;
  const oc=w.filter(v=>v===opp).length;
  if(pc===4) score+=1000;
  else if(pc===3&&ec===1) score+=10;
  else if(pc===2&&ec===2) score+=2;
  if(oc===3&&ec===1) score-=80;
  else if(oc===2&&ec===2) score-=5;
  return score;
}

function scoreBoard(b,player){
  let score=0;
  // Center preference
  const centerCol=3;
  for(let r=0;r<ROWS;r++) if(b[r][centerCol]===player) score+=3;
  // Horizontal
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-3;c++) score+=scoreWindow([b[r][c],b[r][c+1],b[r][c+2],b[r][c+3]],player);
  }
  // Vertical
  for(let r=0;r<ROWS-3;r++){
    for(let c=0;c<COLS;c++) score+=scoreWindow([b[r][c],b[r+1][c],b[r+2][c],b[r+3][c]],player);
  }
  // Diagonals
  for(let r=0;r<ROWS-3;r++){
    for(let c=0;c<COLS-3;c++) score+=scoreWindow([b[r][c],b[r+1][c+1],b[r+2][c+2],b[r+3][c+3]],player);
    for(let c=3;c<COLS;c++) score+=scoreWindow([b[r][c],b[r+1][c-1],b[r+2][c-2],b[r+3][c-3]],player);
  }
  return score;
}

function validCols(b){return Array.from({length:COLS},(_,i)=>i).filter(c=>b[0][c]===0);}

function minimax(b,depth,alpha,beta,maximizing){
  const wl=checkWin(b,maximizing?P2:P1);
  if(wl) return maximizing?-100000:100000;
  if(isFull(b)||depth===0) return scoreBoard(b,P2)-scoreBoard(b,P1);
  const cols=validCols(b);
  if(maximizing){
    let best=-Infinity;
    for(const c of cols){
      const r=getRowB(b,c);
      const nb=b.map(row=>[...row]);
      nb[r][c]=P2;
      const v=minimax(nb,depth-1,alpha,beta,false);
      best=Math.max(best,v);
      alpha=Math.max(alpha,best);
      if(beta<=alpha) break;
    }
    return best;
  } else {
    let best=Infinity;
    for(const c of cols){
      const r=getRowB(b,c);
      const nb=b.map(row=>[...row]);
      nb[r][c]=P1;
      const v=minimax(nb,depth-1,alpha,beta,true);
      best=Math.min(best,v);
      beta=Math.min(beta,best);
      if(beta<=alpha) break;
    }
    return best;
  }
}

function getRowB(b,c){for(let r=ROWS-1;r>=0;r--){if(!b[r][c])return r;}return -1;}

function bestAICol(){
  const cols=validCols(board);
  // Check immediate win
  for(const c of cols){
    const r=getRowB(board,c);
    board[r][c]=P2;
    if(checkWin(board,P2)){board[r][c]=0;return c;}
    board[r][c]=0;
  }
  // Block player win
  for(const c of cols){
    const r=getRowB(board,c);
    board[r][c]=P1;
    if(checkWin(board,P1)){board[r][c]=0;return c;}
    board[r][c]=0;
  }
  // Minimax
  let best=-Infinity,bestCol=cols[Math.floor(cols.length/2)];
  for(const c of cols){
    const r=getRowB(board,c);
    const nb=board.map(row=>[...row]);
    nb[r][c]=P2;
    const v=minimax(nb,4,-Infinity,Infinity,false);
    if(v>best){best=v;bestCol=c;}
  }
  return bestCol;
}

function aiMove(){
  if(gameOver||animating) return;
  setTimeout(()=>{
    const col=bestAICol();
    drop(col);
  },350);
}

function drop(col){
  if(gameOver||animating) return;
  const row=getRow(col);
  if(row<0) return;
  animating=true;
  sfxDrop();
  dropping={col,row,disc:current,y:-(CELL*0.5),targetY:row*CELL+CELL/2};
  board[row][col]=current;
  requestAnimationFrame(animateDrop);
}

function animateDrop(){
  if(!dropping){animating=false;return;}
  const speed=CELL*0.35;
  dropping.y+=speed;
  if(dropping.y>=dropping.targetY){
    dropping.y=dropping.targetY;
    const {col,row,disc}=dropping;
    dropping=null;
    animating=false;
    draw();
    // Check result
    const wl=checkWin(board,disc);
    if(wl){
      winLine=wl;
      draw();
      endGame(disc);
    } else if(isFull(board)){
      draw();
      endGame(0);
    } else {
      current=current===P1?P2:P1;
      updateTurnUI();
      draw();
      if(mode==='ai'&&current===P2) aiMove();
    }
  } else {
    draw();
    requestAnimationFrame(animateDrop);
  }
}

function endGame(winner){
  gameOver=true;
  if(winner===P1) scores[1]++;
  else if(winner===P2) scores[2]++;
  else scores.d++;
  if(winner===P1){
    if(scores[1]>hiWins){hiWins=scores[1];localStorage.setItem(HI_KEY,hiWins);}
    sfxWin();
  } else if(winner===P2){
    sfxWin();
  } else {
    sfxDraw();
  }
  document.getElementById('s1').textContent=scores[1];
  document.getElementById('s2').textContent=scores[2];
  document.getElementById('sd').textContent=scores.d;
  const ov=document.getElementById('overlay');
  const title=document.getElementById('ov-title');
  const sub=document.getElementById('ov-sub');
  const hi=document.getElementById('ov-hi');
  if(winner===0){
    ov.className='win-draw';
    title.textContent='DRAW!';
    sub.textContent='The board is full.';
  } else if(winner===P1){
    ov.className='win-p1';
    title.textContent='CYAN WINS!';
    sub.textContent=mode==='ai'?'You beat the AI!':'Player 1 wins!';
  } else {
    ov.className='win-p2';
    title.textContent=mode==='ai'?'AI WINS!':'MAGENTA WINS!';
    sub.textContent=mode==='ai'?'Better luck next time.':'Player 2 wins!';
  }
  hi.textContent=`Cyan best win streak: ${hiWins}`;
  setTimeout(()=>ov.classList.remove('hidden'),600);
}

// Drawing
function drawDisc(x,y,player,alpha=1,glowMult=1){
  const col=player===P1?'#00ffff':'#ff00ff';
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.shadowBlur=20*glowMult;
  ctx.shadowColor=col;
  ctx.beginPath();
  ctx.arc(x,y,RADIUS,0,Math.PI*2);
  ctx.fillStyle=col;
  ctx.fill();
  // Inner highlight
  ctx.shadowBlur=0;
  ctx.beginPath();
  ctx.arc(x-RADIUS*0.25,y-RADIUS*0.25,RADIUS*0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fill();
  ctx.restore();
}

function drawCell(r,c,val){
  const x=c*CELL+CELL/2;
  const y=r*CELL+CELL/2;
  // Hole background
  ctx.save();
  ctx.shadowBlur=8;
  ctx.shadowColor='#000';
  ctx.beginPath();
  ctx.arc(x,y,RADIUS+2,0,Math.PI*2);
  ctx.fillStyle='#0a0a1a';
  ctx.fill();
  ctx.restore();
  if(val) drawDisc(x,y,val);
}

function draw(){
  ctx.clearRect(0,0,CW,CH);
  // Board background
  ctx.fillStyle='#050520';
  ctx.fillRect(0,0,CW,CH);
  // Grid lines
  ctx.strokeStyle='#0ff1';
  ctx.lineWidth=0.5;
  for(let c=1;c<COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,CH);ctx.stroke();}
  for(let r=1;r<ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(CW,r*CELL);ctx.stroke();}
  // Cells
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++){
      const val=board[r][c];
      // Skip dropping disc position
      if(dropping&&dropping.col===c&&dropping.row===r) drawCell(r,c,0);
      else drawCell(r,c,val);
    }
  // Dropping animation
  if(dropping){
    const x=dropping.col*CELL+CELL/2;
    const y=dropping.y;
    drawDisc(x,y,dropping.disc,1,1.5);
  }
  // Win highlight
  if(winLine){
    winLine.forEach(({r,c})=>{
      const x=c*CELL+CELL/2,y=r*CELL+CELL/2;
      const col=board[r][c]===P1?'#0ff':'#f0f';
      ctx.save();
      ctx.shadowBlur=35;ctx.shadowColor=col;
      ctx.strokeStyle=col;
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.arc(x,y,RADIUS+3,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    });
    // Draw line through them
    const fr=winLine[0],lr=winLine[3];
    const col=board[fr.r][fr.c]===P1?'#0ff':'#f0f';
    ctx.save();
    ctx.shadowBlur=20;ctx.shadowColor=col;
    ctx.strokeStyle=col;
    ctx.lineWidth=4;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(fr.c*CELL+CELL/2,fr.r*CELL+CELL/2);
    ctx.lineTo(lr.c*CELL+CELL/2,lr.r*CELL+CELL/2);
    ctx.stroke();
    ctx.restore();
  }
  // Hover column highlight
  if(!gameOver&&!animating&&hoverCol>=0){
    ctx.save();
    const hcol=current===P1?'#0ff3':'#f0f3';
    ctx.fillStyle=hcol;
    ctx.fillRect(hoverCol*CELL,0,CELL,CH);
    ctx.restore();
  }
}

// Input
function colFromEvent(e){
  const rect=canvas.getBoundingClientRect();
  let cx;
  if(e.touches) cx=e.touches[0].clientX-rect.left;
  else cx=e.clientX-rect.left;
  const scale=CW/rect.width;
  return Math.floor(cx*scale/CELL);
}

canvas.addEventListener('click',e=>{
  if(gameOver||animating) return;
  if(mode==='ai'&&current===P2) return;
  sfxClick();
  const col=colFromEvent(e);
  if(col>=0&&col<COLS) drop(col);
});
canvas.addEventListener('mousemove',e=>{
  if(gameOver||animating) return;
  const col=colFromEvent(e);
  const prev=hoverCol;
  hoverCol=(col>=0&&col<COLS)?col:-1;
  if(hoverCol!==prev) draw();
  // Hint arrows
  const hints=document.querySelectorAll('.col-hint');
  hints.forEach((h,i)=>h.classList.toggle('active',i===hoverCol));
});
canvas.addEventListener('mouseleave',()=>{
  hoverCol=-1;
  document.querySelectorAll('.col-hint').forEach(h=>h.classList.remove('active'));
  draw();
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(gameOver||animating) return;
  if(mode==='ai'&&current===P2) return;
  sfxClick();
  const col=colFromEvent(e);
  if(col>=0&&col<COLS) drop(col);
},{passive:false});

document.getElementById('btn-ai').addEventListener('click',()=>setMode('ai'));
document.getElementById('btn-2p').addEventListener('click',()=>setMode('2p'));
document.getElementById('new-btn').addEventListener('click',()=>newGame());
document.getElementById('ov-btn').addEventListener('click',()=>newGame());

// Update hi score display
function updateHi(){
  document.getElementById('hi-txt').textContent=`Cyan record: ${hiWins} wins`;
}

// Init
window.addEventListener('resize',()=>{resize();draw();});
resize();
mode='ai';
newGame();
updateHi();
})();
</script>
</body>
</html>
