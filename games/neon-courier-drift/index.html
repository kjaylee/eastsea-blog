<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Neon Courier Drift</title>
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root{--bg:#0a0a1a;--panel:#121232;--cyan:#43d8ff;--mag:#ff57d1;--lime:#adff57;--text:#eef4ff}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 20% 0%,#1a1a44,var(--bg) 52%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;justify-content:center;min-height:100vh}
    .wrap{width:min(96vw,760px);padding:14px 12px 24px}
    .title{font-size:clamp(20px,4.8vw,32px);font-weight:900;text-shadow:0 0 16px rgba(255,87,209,.45)}
    .hud{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}
    .cell{background:rgba(18,18,45,.9);border:1px solid rgba(67,216,255,.45);border-radius:12px;padding:8px 10px;font-size:13px;min-height:54px}
    canvas{display:block;width:100%;max-width:640px;height:auto;margin:12px auto;background:#070713;border:2px solid rgba(255,87,209,.45);border-radius:14px;touch-action:none;box-shadow:0 0 30px rgba(67,216,255,.2)}
    .row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    button{appearance:none;border:1px solid rgba(67,216,255,.6);background:#11193a;color:var(--text);padding:11px 14px;border-radius:10px;font-weight:700}
    button.primary{border-color:rgba(255,87,209,.7);box-shadow:0 0 14px rgba(255,87,209,.25)}
    .note{margin-top:10px;font-size:12px;line-height:1.45;opacity:.85}
    @media (max-width:560px){.hud{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="title">📦 Neon Courier Drift</div>
    <div class="hud">
      <div class="cell"><b>Score</b><br><span id="score">0</span></div>
      <div class="cell"><b>Best</b><br><span id="best">0</span></div>
      <div class="cell"><b>HP</b><br><span id="hp">3</span></div>
      <div class="cell"><b>Threat</b><br><span id="threat">1x</span></div>
    </div>
    <canvas id="game" width="640" height="420" aria-label="courier arena"></canvas>
    <div class="row">
      <button class="primary" id="restartBtn">새 라운드</button>
      <button id="pauseBtn">일시정지 (Space)</button>
    </div>
    <p class="note">
      키보드: WASD/방향키 이동, Space 일시정지. 터치: 화면을 드래그하면 드리프트 조향.<br>
      패킷(청록)을 회수하며 추적 드론을 피하세요. 점수가 오를수록 드론 수와 속도가 증가합니다. (무한 모드)
    </p>
  </main>
<script>
(() => {
  const STORAGE_KEY = 'neon_courier_drift_best';
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const ui = {
    score: document.getElementById('score'),
    best: document.getElementById('best'),
    hp: document.getElementById('hp'),
    threat: document.getElementById('threat')
  };

  let W = canvas.width;
  let H = canvas.height;
  let audioCtx;
  function ensureAudio() {
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function tone(freq = 420, dur = 0.06, type = 'sine', vol = 0.03) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  }

  const keys = new Set();
  const pointer = {active:false,x:0,y:0};

  let best = Number(localStorage.getItem(STORAGE_KEY) || 0);
  let state;

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function spawnDrone(level = 1) {
    const edge = Math.floor(Math.random() * 4);
    let x = 0, y = 0;
    if (edge === 0) { x = rand(0, W); y = -20; }
    if (edge === 1) { x = W + 20; y = rand(0, H); }
    if (edge === 2) { x = rand(0, W); y = H + 20; }
    if (edge === 3) { x = -20; y = rand(0, H); }
    return {x, y, r: 10, speed: 48 + level * 10 + rand(0, 14)};
  }

  function spawnPacket() {
    return {x: rand(30, W - 30), y: rand(30, H - 30), r: 8};
  }

  function reset() {
    state = {
      score: 0,
      hp: 3,
      player: {x: W/2, y: H/2, vx:0, vy:0, r:11},
      packet: spawnPacket(),
      drones: [spawnDrone(1), spawnDrone(1)],
      paused: false,
      over: false,
      hitCooldown: 0,
      drift: 0
    };
    updateUI();
  }

  function updateUI() {
    ui.score.textContent = String(state.score);
    ui.best.textContent = String(best);
    ui.hp.textContent = String(state.hp);
    ui.threat.textContent = `${(1 + state.score * 0.06).toFixed(2)}x`;
  }

  function gameOver() {
    state.over = true;
    if (state.score > best) {
      best = state.score;
      localStorage.setItem(STORAGE_KEY, String(best));
    }
    tone(140, 0.2, 'sawtooth', 0.04);
    updateUI();
  }

  function handleInput(dt) {
    const p = state.player;
    let ax = 0;
    let ay = 0;

    if (keys.has('arrowup') || keys.has('w')) ay -= 1;
    if (keys.has('arrowdown') || keys.has('s')) ay += 1;
    if (keys.has('arrowleft') || keys.has('a')) ax -= 1;
    if (keys.has('arrowright') || keys.has('d')) ax += 1;

    if (pointer.active) {
      const dx = pointer.x - p.x;
      const dy = pointer.y - p.y;
      const len = Math.hypot(dx, dy) || 1;
      ax += dx / len;
      ay += dy / len;
    }

    const accel = 380;
    p.vx += ax * accel * dt;
    p.vy += ay * accel * dt;

    const damping = 0.9;
    p.vx *= damping;
    p.vy *= damping;

    const maxV = 230;
    const sp = Math.hypot(p.vx, p.vy);
    if (sp > maxV) {
      p.vx = (p.vx / sp) * maxV;
      p.vy = (p.vy / sp) * maxV;
    }

    p.x = Math.max(p.r, Math.min(W - p.r, p.x + p.vx * dt));
    p.y = Math.max(p.r, Math.min(H - p.r, p.y + p.vy * dt));
    state.drift = Math.min(1, sp / maxV);
  }

  function update(dt) {
    if (state.paused || state.over) return;

    handleInput(dt);
    if (state.hitCooldown > 0) state.hitCooldown -= dt;

    const p = state.player;
    const level = 1 + Math.floor(state.score / 6);
    const targetDrones = Math.min(2 + Math.floor(state.score / 8), 9);
    while (state.drones.length < targetDrones) state.drones.push(spawnDrone(level));

    state.drones.forEach(d => {
      const dx = p.x - d.x;
      const dy = p.y - d.y;
      const len = Math.hypot(dx, dy) || 1;
      const speedMul = 1 + state.score * 0.03;
      d.x += (dx / len) * d.speed * speedMul * dt;
      d.y += (dy / len) * d.speed * speedMul * dt;
    });

    const pdx = p.x - state.packet.x;
    const pdy = p.y - state.packet.y;
    if (Math.hypot(pdx, pdy) < p.r + state.packet.r + 2) {
      state.score += 1;
      state.packet = spawnPacket();
      tone(720, 0.06, 'triangle', 0.045);
      updateUI();
    }

    if (state.hitCooldown <= 0) {
      for (const d of state.drones) {
        if (Math.hypot(p.x - d.x, p.y - d.y) < p.r + d.r) {
          state.hp -= 1;
          state.hitCooldown = 1.1;
          tone(180, 0.08, 'square', 0.04);
          if (state.hp <= 0) {
            gameOver();
          }
          updateUI();
          break;
        }
      }
    }
  }

  function drawGrid() {
    ctx.fillStyle = '#070713';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(67,216,255,.09)';
    for (let x = 0; x < W; x += 32) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += 32) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
  }

  function draw() {
    drawGrid();

    const p = state.player;
    const glow = 12 + state.drift * 10;

    ctx.shadowBlur = glow;
    ctx.shadowColor = '#adff57';
    ctx.fillStyle = '#adff57';
    ctx.beginPath();
    ctx.moveTo(p.x + 12, p.y);
    ctx.lineTo(p.x - 8, p.y - 8);
    ctx.lineTo(p.x - 8, p.y + 8);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#43d8ff';
    ctx.beginPath();
    ctx.arc(state.packet.x, state.packet.y, state.packet.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(67,216,255,.8)';
    ctx.strokeRect(state.packet.x - 13, state.packet.y - 13, 26, 26);

    state.drones.forEach((d, i) => {
      ctx.fillStyle = i % 2 ? '#ff57d1' : '#ff8ec8';
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,87,209,.75)';
      ctx.strokeRect(d.x - d.r - 3, d.y - d.r - 3, d.r * 2 + 6, d.r * 2 + 6);
    });

    if (state.hitCooldown > 0) {
      ctx.strokeStyle = 'rgba(255,110,140,.8)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + 6, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (state.paused || state.over) {
      ctx.fillStyle = 'rgba(10,10,26,.72)';
      ctx.fillRect(0,0,W,H);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#eef4ff';
      ctx.font = '700 28px sans-serif';
      ctx.fillText(state.over ? 'GAME OVER' : 'PAUSED', W/2, H/2 - 8);
      ctx.font = '500 15px sans-serif';
      ctx.fillText(`Score ${state.score} · Best ${best}`, W/2, H/2 + 22);
    }
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function resize() {
    const width = Math.min(window.innerWidth * 0.92, 640);
    canvas.style.maxWidth = width + 'px';
  }

  function togglePause() {
    if (state.over) return;
    state.paused = !state.paused;
    tone(state.paused ? 260 : 520, 0.05, 'sine', 0.025);
  }

  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === ' ') {
      e.preventDefault();
      ensureAudio();
      togglePause();
      return;
    }
    if (['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(k)) {
      e.preventDefault();
      keys.add(k);
      ensureAudio();
    }
  }, {passive:false});
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));

  function pointerPos(ev) {
    const rect = canvas.getBoundingClientRect();
    const t = ev.touches ? ev.touches[0] : ev;
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    return {x:(t.clientX - rect.left)*sx,y:(t.clientY - rect.top)*sy};
  }

  canvas.addEventListener('mousedown', (e) => {
    ensureAudio();
    pointer.active = true;
    Object.assign(pointer, pointerPos(e));
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!pointer.active) return;
    Object.assign(pointer, pointerPos(e));
  });
  window.addEventListener('mouseup', () => pointer.active = false);

  canvas.addEventListener('touchstart', (e) => {
    ensureAudio();
    pointer.active = true;
    Object.assign(pointer, pointerPos(e));
  }, {passive:true});
  canvas.addEventListener('touchmove', (e) => {
    Object.assign(pointer, pointerPos(e));
  }, {passive:true});
  canvas.addEventListener('touchend', () => pointer.active = false, {passive:true});

  document.getElementById('restartBtn').addEventListener('click', () => { ensureAudio(); tone(540,0.05,'triangle',0.03); reset(); });
  document.getElementById('pauseBtn').addEventListener('click', () => { ensureAudio(); togglePause(); });

  window.addEventListener('resize', resize);
  resize();
  ui.best.textContent = String(best);
  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
