<script>
'use strict';

const T = GameI18n({
  gameTitle: { ko: 'Neon Drift', en: 'Neon Drift' },
  gameSub: { ko: '원터치 드리프트 타이밍으로 네온 커브를 공략하세요.', en: 'Master neon curves with one-touch drift timing.' },
  gameMeta: { ko: '커브에서 홀드하면 안정 드리프트 · 콤보로 Boost 발동', en: 'Hold on curves to drift stable · Build combo to trigger Boost' },
  start: { ko: '레이스 시작', en: 'Start Run' },
  retry: { ko: '다시 달리기', en: 'Retry Run' },
  backToTitle: { ko: '타이틀로', en: 'Back to Title' },
  gameOver: { ko: '게임 오버', en: 'Game Over' },
  score: { ko: '점수', en: 'Score' },
  combo: { ko: '콤보', en: 'Combo' },
  level: { ko: '레벨', en: 'Level' },
  distance: { ko: '거리', en: 'Distance' },
  shield: { ko: '실드', en: 'Shield' },
  best: { ko: '최고', en: 'Best' },
  time: { ko: '남은시간', en: 'Time' },
  holdHint: { ko: '커브에서 홀드하세요', en: 'Hold on curves' },
  boost: { ko: '부스트', en: 'Boost' },
  perfect: { ko: '퍼펙트 드리프트', en: 'Perfect Drift' },
  good: { ko: '굿 드리프트', en: 'Good Drift' },
  miss: { ko: '드리프트 실패', en: 'Missed Drift' },
  crash: { ko: '충돌', en: 'Crash' },
  runScore: { ko: '최종 점수', en: 'Final Score' },
  runBest: { ko: '최고 점수', en: 'Best Score' },
  statDistance: { ko: '주행', en: 'Distance' },
  statCombo: { ko: '최대 콤보', en: 'Max Combo' },
  statReasonCrash: { ko: '이탈 충돌', en: 'Road Crash' },
  statReasonTime: { ko: '타임 오버', en: 'Time Up' }
});

const GAME_ID = 'neon-drift';
const SAVE_KEY = 'neon-drift-save-v1';
const MODE = { TITLE:'title', PLAY:'play', GAMEOVER:'gameover' };

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const hud = document.getElementById('hud');
const boostFill = document.getElementById('boostFill');
const boostText = document.getElementById('boostText');
const hintHold = document.getElementById('hintHold');
const titleOverlay = document.getElementById('titleOverlay');
const gameoverOverlay = document.getElementById('gameoverOverlay');

const scoreCard = document.getElementById('scoreCard');
const comboCard = document.getElementById('comboCard');
const levelCard = document.getElementById('levelCard');
const distCard = document.getElementById('distCard');
const shieldCard = document.getElementById('shieldCard');
const timerCard = document.getElementById('timerCard');
const bestCard = document.getElementById('bestCard');

const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const backBtn = document.getElementById('backBtn');

const sound = new SoundManager();
sound.loadSFX('good', '../gravity-orbit/assets/audio/orbit_enter.wav');
sound.loadSFX('perfect', '../gravity-orbit/assets/audio/combo.wav');
sound.loadSFX('miss', '../gravity-orbit/assets/audio/asteroid_hit.wav');
sound.loadSFX('boost', '../gravity-orbit/assets/audio/star_collect.wav');
sound.loadSFX('crash', '../gravity-orbit/assets/audio/gameover.wav');

const game = {
  mode: MODE.TITLE,
  dpr: 1,
  W: 0,
  H: 0,
  lastTs: 0,
  progress: 0,
  distanceM: 0,
  speed: 180,
  timer: 75,
  score: 0,
  combo: 0,
  maxCombo: 0,
  level: 1,
  shield: 100,
  boost: 0,
  boostSec: 0,
  bestScore: 0,
  bestDistance: 0,
  totalRuns: 0,
  laneOffset: 0,
  steering: 0,
  reason: 'time',
  submittedScore: -1,
  floatTexts: [],
  particles: [],
  stars: [],
  road: {
    segments: [],
    nextZ: 0,
    cursor: 0,
    idSeq: 0
  },
  input: {
    down: false,
    changedAt: 0
  }
};

const ROAD_HALF = 120;
const DRAW_DISTANCE = 1800;
const CAR_LOOK_AHEAD = 90;

function setTexts() {
  document.getElementById('titleText').textContent = T('gameTitle');
  document.getElementById('titleSub').textContent = T('gameSub');
  document.getElementById('titleMeta').textContent = T('gameMeta');
  startBtn.textContent = T('start');
  retryBtn.textContent = T('retry');
  backBtn.textContent = T('backToTitle');
  document.getElementById('overTitle').textContent = T('gameOver');
  hintHold.textContent = T('holdHint');
}

function storageGet() {
  let tgData = null;
  try { if (window.TG && window.TG.load) tgData = window.TG.load(SAVE_KEY, null); } catch (_) {}
  if (tgData) return tgData;
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) {
    return null;
  }
}

function storageSet(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch (_) {}
  try { if (window.TG && window.TG.save) window.TG.save(SAVE_KEY, data); } catch (_) {}
}

function loadPersist() {
  const d = storageGet();
  if (!d) return;
  game.bestScore = Number(d.bestScore || 0);
  game.bestDistance = Number(d.bestDistance || 0);
  game.totalRuns = Number(d.totalRuns || 0);
}

function savePersist() {
  storageSet({
    bestScore: Math.floor(game.bestScore),
    bestDistance: Math.floor(game.bestDistance),
    totalRuns: Math.floor(game.totalRuns)
  });
}

function resize() {
  game.dpr = window.devicePixelRatio || 1;
  game.W = window.innerWidth;
  game.H = window.innerHeight;
  canvas.width = Math.floor(game.W * game.dpr);
  canvas.height = Math.floor(game.H * game.dpr);
  ctx.setTransform(game.dpr, 0, 0, game.dpr, 0, 0);
}

function resetRoad() {
  game.road.segments = [];
  game.road.nextZ = 0;
  game.road.cursor = 0;
  game.road.idSeq = 0;
  ensureRoad(DRAW_DISTANCE + 2400);
}

function addSegment(curve, length) {
  const road = game.road;
  const prev = road.segments.length ? road.segments[road.segments.length - 1] : null;
  const start = road.nextZ;
  const end = start + length;
  const startOffset = prev ? prev.endOffset : 0;
  const endOffset = startOffset + curve * length * 0.58;
  road.segments.push({
    id: road.idSeq++,
    start,
    end,
    length,
    curve,
    startOffset,
    endOffset,
    scorable: Math.abs(curve) >= 0.22,
    holdSec: 0,
    judged: false,
    seen: false
  });
  road.nextZ = end;
}

function ensureRoad(toZ) {
  const road = game.road;
  while (road.nextZ < toZ) {
    const makeCurve = Math.random() < 0.62;
    if (!makeCurve) {
      addSegment(0, 170 + Math.random() * 130);
    } else {
      const sign = Math.random() < 0.5 ? -1 : 1;
      const mag = 0.24 + Math.random() * 0.46 + (game.level - 1) * 0.016;
      addSegment(sign * Math.min(0.9, mag), 220 + Math.random() * 170);
    }
  }
}

function segmentAt(z) {
  const road = game.road;
  const segs = road.segments;
  let i = road.cursor;
  if (!segs.length) return null;

  while (i < segs.length - 1 && z > segs[i].end) i += 1;
  while (i > 0 && z < segs[i].start) i -= 1;
  road.cursor = i;
  return segs[i];
}

function smooth01(t) {
  const v = Math.max(0, Math.min(1, t));
  return v * v * (3 - 2 * v);
}

function sampleRoad(z) {
  const seg = segmentAt(z);
  if (!seg) return { offset: 0, curve: 0, seg: null, t: 0 };
  const t = (z - seg.start) / seg.length;
  const e = smooth01(t);
  const offset = seg.startOffset + (seg.endOffset - seg.startOffset) * e;
  const midWeight = 0.55 + 0.45 * Math.sin(Math.PI * Math.max(0, Math.min(1, t)));
  const curve = seg.curve * midWeight;
  return { offset, curve, seg, t: Math.max(0, Math.min(1, t)) };
}

function startRun() {
  game.mode = MODE.PLAY;
  game.progress = 0;
  game.distanceM = 0;
  game.speed = 180;
  game.timer = 75;
  game.score = 0;
  game.combo = 0;
  game.maxCombo = 0;
  game.level = 1;
  game.shield = 100;
  game.boost = 0;
  game.boostSec = 0;
  game.laneOffset = 0;
  game.steering = 0;
  game.reason = 'time';
  game.submittedScore = -1;
  game.floatTexts = [];
  game.particles = [];
  game.input.down = false;
  game.input.changedAt = performance.now();

  resetRoad();

  titleOverlay.classList.add('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.remove('hidden');
  hintHold.classList.remove('hidden');

  if (window.TG && window.TG.haptic) window.TG.haptic('impact', 'light');
}

function backToTitle() {
  game.mode = MODE.TITLE;
  titleOverlay.classList.remove('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.add('hidden');
  hintHold.classList.add('hidden');
  boostText.style.display = 'none';
}

function retryRun() {
  startRun();
}

function comboMultiplier() {
  if (game.combo >= 15) return 2.2;
  if (game.combo >= 8) return 1.7;
  if (game.combo >= 4) return 1.35;
  return 1;
}

function pushText(text, color) {
  game.floatTexts.push({ text, color, life: 0.9, y: game.H * 0.56 });
}

function pushDriftParticles(x, y, amount, color) {
  for (let i = 0; i < amount; i += 1) {
    const a = Math.random() * Math.PI + Math.PI * 0.08;
    const sp = 40 + Math.random() * 120;
    game.particles.push({
      x,
      y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 0.28 + Math.random() * 0.42,
      color
    });
  }
}

function judgeCurveSegment(seg) {
  if (!seg || !seg.scorable || seg.judged) return;
  seg.judged = true;

  const required = (seg.length / Math.max(120, game.speed)) * 0.32;
  const perfectNeed = (seg.length / Math.max(120, game.speed)) * 0.58;

  if (seg.holdSec >= required) {
    game.combo += 1;
    if (game.combo > game.maxCombo) game.maxCombo = game.combo;

    const perfect = seg.holdSec >= perfectNeed;
    const base = perfect ? 135 : 90;
    const boostGain = perfect ? 26 : 16;
    const gain = Math.floor(base * comboMultiplier() * (game.boostSec > 0 ? 1.3 : 1));

    game.score += gain;
    game.boost = Math.min(100, game.boost + boostGain);

    if (perfect) {
      pushText(T('perfect'), '#6bfbff');
      sound.playSFX('perfect', { volume: 0.85 });
      if (window.TG && window.TG.haptic) window.TG.haptic('notification', 'success');
    } else {
      pushText(T('good'), '#b2c2ff');
      sound.playSFX('good', { volume: 0.75 });
      if (window.TG && window.TG.haptic) window.TG.haptic('impact', 'light');
    }
  } else {
    game.combo = 0;
    game.shield = Math.max(0, game.shield - 18);
    pushText(T('miss'), '#ff7aa8');
    sound.playSFX('miss', { volume: 0.8 });
    if (window.TG && window.TG.haptic) window.TG.haptic('impact', 'medium');
  }
}

function finishRun(reason) {
  game.mode = MODE.GAMEOVER;
  game.reason = reason;

  if (game.score > game.bestScore) game.bestScore = game.score;
  if (game.distanceM > game.bestDistance) game.bestDistance = game.distanceM;
  game.totalRuns += 1;
  savePersist();

  hud.classList.add('hidden');
  hintHold.classList.add('hidden');
  boostText.style.display = 'none';
  gameoverOverlay.classList.remove('hidden');

  const reasonLabel = reason === 'crash' ? T('statReasonCrash') : T('statReasonTime');
  document.getElementById('resultText').textContent = `${T('runScore')}: ${Math.floor(game.score).toLocaleString()} · ${reasonLabel}`;
  document.getElementById('bestText').textContent = `${T('runBest')}: ${Math.floor(game.bestScore).toLocaleString()}`;
  document.getElementById('statsText').textContent = `${T('statDistance')} ${Math.floor(game.distanceM)}m · ${T('statCombo')} x${game.maxCombo}`;

  submitLeaderboard();
  if (window.GameScore && window.GameScore.save) {
    window.GameScore.save(GAME_ID, Math.floor(game.score));
  }
  sound.playSFX('crash', { volume: 0.95 });
}

function submitLeaderboard() {
  if (!window.Leaderboard) return;
  const score = Math.floor(game.score);
  if (game.submittedScore === score) return;
  game.submittedScore = score;

  let player = 'Player';
  try {
    const u = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
    if (u) player = (u.first_name || u.username || 'Player');
  } catch (_) {}

  window.Leaderboard.submit(GAME_ID, player, score, { reason: game.reason });
  refreshBoard();
}

function refreshBoard() {
  if (!window.Leaderboard) return;
  window.Leaderboard.getTop(GAME_ID)
    .then((scores) => window.Leaderboard.renderBoard('leaderboard', scores))
    .catch(() => {});
}

function updatePlay(dt) {
  const carSample = sampleRoad(game.progress + CAR_LOOK_AHEAD);
  const seg = carSample.seg;
  const absCurve = Math.abs(carSample.curve);

  if (seg && seg.scorable && !seg.seen) {
    seg.seen = true;
  }

  if (seg && seg.scorable && !seg.judged && game.input.down) {
    seg.holdSec += dt;
  }

  const shouldJudge = seg && seg.scorable && !seg.judged && carSample.t > 0.97;
  if (shouldJudge) judgeCurveSegment(seg);

  if (game.boost >= 100 && game.boostSec <= 0) {
    game.boost = 0;
    game.boostSec = 3;
    pushText(T('boost').toUpperCase(), '#ffd86b');
    sound.playSFX('boost', { volume: 0.9 });
    if (window.TG && window.TG.haptic) window.TG.haptic('notification', 'success');
  }

  if (game.boostSec > 0) {
    game.boostSec = Math.max(0, game.boostSec - dt);
  }

  const levelByDistance = 1 + Math.floor(game.distanceM / 420);
  game.level = Math.max(1, levelByDistance);

  const baseSpeed = 170 + game.level * 8;
  const speedMult = game.boostSec > 0 ? 1.35 : 1;
  game.speed = baseSpeed * speedMult;

  const steerInput = game.input.down ? 1 : 0;
  const driftForce = carSample.curve * game.speed * (steerInput ? 1.12 : -0.72);
  const restoreForce = -game.laneOffset * (1.02 + absCurve * 1.4);

  game.steering = game.steering * 0.82 + (steerInput ? 1 : 0) * 0.18;
  game.laneOffset += (driftForce + restoreForce) * dt;

  if (steerInput && absCurve > 0.12) {
    const px = game.W * 0.5 + game.laneOffset * 0.75;
    const py = game.H * 0.82;
    pushDriftParticles(px - 10, py + 12, 2, '#7ff9ff');
    pushDriftParticles(px + 10, py + 12, 2, '#ff6cd0');
  }

  game.progress += game.speed * dt;
  game.distanceM = game.progress * 0.12;
  game.timer = Math.max(0, game.timer - dt);

  const passiveScore = (26 + game.level * 2.1) * dt * comboMultiplier() * (game.boostSec > 0 ? 1.2 : 1);
  game.score += passiveScore;

  ensureRoad(game.progress + DRAW_DISTANCE + 900);

  if (Math.abs(game.laneOffset) > ROAD_HALF * 0.96) {
    game.shield = 0;
    pushText(T('crash'), '#ff5d8c');
    finishRun('crash');
    return;
  }

  if (game.shield <= 0) {
    finishRun('crash');
    return;
  }

  if (game.timer <= 0) {
    finishRun('time');
    return;
  }

  for (let i = game.floatTexts.length - 1; i >= 0; i -= 1) {
    const f = game.floatTexts[i];
    f.life -= dt;
    f.y -= dt * 36;
    if (f.life <= 0) game.floatTexts.splice(i, 1);
  }

  for (let i = game.particles.length - 1; i >= 0; i -= 1) {
    const p = game.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life -= dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, game.H);
  g.addColorStop(0, '#15113a');
  g.addColorStop(0.46, '#090b22');
  g.addColorStop(1, '#02020a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, game.W, game.H);

  const t = performance.now() * 0.0002;
  for (let i = 0; i < game.stars.length; i += 1) {
    const s = game.stars[i];
    const tw = 0.4 + Math.sin(t * 10 + s.seed) * 0.6;
    ctx.globalAlpha = 0.25 + tw * 0.6;
    ctx.fillStyle = '#9ec1ff';
    ctx.fillRect(s.x, s.y, s.r, s.r);
  }
  ctx.globalAlpha = 1;
}

function drawRoad() {
  const horizon = game.H * 0.16;
  const step = 5;

  const cameraX = sampleRoad(game.progress + CAR_LOOK_AHEAD).offset + game.laneOffset * 0.28;

  for (let y = game.H; y >= horizon; y -= step) {
    const p = (game.H - y) / (game.H - horizon);
    const z = game.progress + (p * p) * DRAW_DISTANCE;
    const sample = sampleRoad(z);

    const perspective = 1 - p * 0.84;
    const center = game.W * 0.5 + (sample.offset - cameraX) * perspective * 0.9;
    const roadHalf = 44 + (1 - p) * 182;

    const stripe = Math.floor((z / 60) % 2);
    const bright = 0.24 + Math.abs(sample.curve) * 0.2;

    ctx.strokeStyle = stripe ? `rgba(40,63,130,${0.85 + bright})` : `rgba(25,34,80,${0.8 + bright})`;
    ctx.lineWidth = step + 1;
    ctx.beginPath();
    ctx.moveTo(center - roadHalf, y);
    ctx.lineTo(center + roadHalf, y);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(95,235,255,.92)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(center - roadHalf, y);
    ctx.lineTo(center - roadHalf + 16, y);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,93,181,.88)';
    ctx.beginPath();
    ctx.moveTo(center + roadHalf - 16, y);
    ctx.lineTo(center + roadHalf, y);
    ctx.stroke();

    const lanePulse = (Math.floor(z / 38) % 5 === 0) ? 1 : 0;
    if (lanePulse) {
      ctx.strokeStyle = 'rgba(206,220,255,.72)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(center - 10, y);
      ctx.lineTo(center + 10, y);
      ctx.stroke();
    }
  }

  const carY = game.H * 0.82;
  const warning = Math.abs(game.laneOffset) / ROAD_HALF;
  if (warning > 0.75) {
    const alpha = (warning - 0.75) * 2.2;
    ctx.fillStyle = `rgba(255,92,140,${Math.max(0, Math.min(0.45, alpha))})`;
    ctx.fillRect(0, horizon, game.W, game.H - horizon);
  }

  if (game.boostSec > 0) {
    ctx.fillStyle = 'rgba(255,220,120,.08)';
    ctx.fillRect(0, horizon, game.W, game.H - horizon);
  }

  ctx.fillStyle = 'rgba(160,190,255,.12)';
  ctx.fillRect(0, horizon, game.W, 2);

  const centerNow = game.W * 0.5 + game.laneOffset * 0.75;
  drawCar(centerNow, carY, sampleRoad(game.progress + CAR_LOOK_AHEAD).curve);
}

function drawCar(x, y, curve) {
  const angle = (curve * 0.5 + game.steering * 0.55) * 0.5;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  const glow = ctx.createRadialGradient(0, 4, 3, 0, 4, 44);
  glow.addColorStop(0, 'rgba(82,240,255,.55)');
  glow.addColorStop(1, 'rgba(82,240,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.ellipse(0, 8, 26, 34, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#0c1026';
  ctx.beginPath();
  ctx.moveTo(0, -22);
  ctx.lineTo(16, -2);
  ctx.lineTo(12, 22);
  ctx.lineTo(-12, 22);
  ctx.lineTo(-16, -2);
  ctx.closePath();
  ctx.fill();

  const body = ctx.createLinearGradient(-12, -20, 14, 20);
  body.addColorStop(0, '#59f3ff');
  body.addColorStop(0.5, '#6f76ff');
  body.addColorStop(1, '#ff5cb0');
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(11, -2);
  ctx.lineTo(9, 17);
  ctx.lineTo(-9, 17);
  ctx.lineTo(-11, -2);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(233,243,255,.88)';
  ctx.fillRect(-6, -8, 12, 6);

  ctx.fillStyle = '#060912';
  ctx.fillRect(-10, -4, 4, 16);
  ctx.fillRect(6, -4, 4, 16);

  if (game.input.down && Math.abs(curve) > 0.1) {
    ctx.fillStyle = '#7af7ff';
    ctx.fillRect(-8, 17, 3, 10);
    ctx.fillStyle = '#ff77c6';
    ctx.fillRect(5, 17, 3, 10);
  }

  ctx.restore();
}

function drawEffects() {
  for (let i = 0; i < game.particles.length; i += 1) {
    const p = game.particles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.8, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  for (let i = 0; i < game.floatTexts.length; i += 1) {
    const f = game.floatTexts[i];
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.fillStyle = f.color;
    ctx.font = '700 17px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, game.W * 0.5, f.y);
  }
  ctx.globalAlpha = 1;
}

function renderHud() {
  scoreCard.textContent = `${T('score')} ${Math.floor(game.score).toLocaleString()}`;
  comboCard.textContent = `${T('combo')} x${game.combo}`;
  levelCard.textContent = `${T('level')} ${game.level}`;
  distCard.textContent = `${T('distance')} ${Math.floor(game.distanceM)}m`;
  shieldCard.textContent = `${T('shield')} ${Math.floor(game.shield)}`;
  timerCard.textContent = `${T('time')} ${game.timer.toFixed(1)}s`;
  bestCard.textContent = `${T('best')} ${Math.floor(game.bestScore).toLocaleString()}`;

  const b = game.boostSec > 0 ? 100 : game.boost;
  boostFill.style.width = `${Math.max(0, Math.min(100, b))}%`;
  boostText.style.display = game.boostSec > 0 ? 'block' : 'none';
  boostText.textContent = `${T('boost').toUpperCase()} x1.35`;

  const nearCurve = Math.abs(sampleRoad(game.progress + CAR_LOOK_AHEAD).curve) > 0.16;
  hintHold.style.opacity = nearCurve ? '1' : '0.3';
}

function render() {
  drawSky();
  if (game.mode === MODE.PLAY || game.mode === MODE.GAMEOVER) {
    drawRoad();
    drawEffects();
  }
  renderHud();
}

function frame(ts) {
  if (!game.lastTs) game.lastTs = ts;
  const dt = Math.min(0.033, (ts - game.lastTs) / 1000);
  game.lastTs = ts;

  if (game.mode === MODE.PLAY) {
    updatePlay(dt);
  }

  render();
  requestAnimationFrame(frame);
}

function pointerDown(e) {
  if (e.cancelable) e.preventDefault();
  if (game.mode !== MODE.PLAY) return;
  game.input.down = true;
  game.input.changedAt = performance.now();
}

function pointerUp(e) {
  if (e && e.cancelable) e.preventDefault();
  game.input.down = false;
  game.input.changedAt = performance.now();
}

startBtn.addEventListener('click', startRun);
retryBtn.addEventListener('click', retryRun);
backBtn.addEventListener('click', backToTitle);
canvas.addEventListener('pointerdown', pointerDown, { passive: false });
canvas.addEventListener('pointerup', pointerUp, { passive: false });
canvas.addEventListener('pointercancel', pointerUp, { passive: false });
canvas.addEventListener('pointerleave', pointerUp, { passive: false });
canvas.addEventListener('touchstart', pointerDown, { passive: false });
canvas.addEventListener('touchend', pointerUp, { passive: false });
window.addEventListener('mouseup', pointerUp, { passive: false });
window.addEventListener('blur', pointerUp, { passive: false });
window.addEventListener('resize', resize);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    if (game.mode === MODE.PLAY) {
      game.input.down = true;
      if (e.cancelable) e.preventDefault();
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    if (game.mode === MODE.PLAY) {
      game.input.down = false;
      if (e.cancelable) e.preventDefault();
    }
  }
});

function initStars() {
  game.stars = [];
  for (let i = 0; i < 120; i += 1) {
    game.stars.push({
      x: Math.random() * game.W,
      y: Math.random() * game.H * 0.65,
      r: Math.random() * 1.8 + 0.4,
      seed: Math.random() * 1000
    });
  }
}

loadPersist();
setTexts();
resize();
initStars();
refreshBoard();
renderHud();
requestAnimationFrame(frame);
</script>

<script src="/games/cross-promo.js"></script>
<div id="leaderboard" data-lb-slug="neon-drift"></div>
<script src="../shared/leaderboard.js"></script>
</body>
