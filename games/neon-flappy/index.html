<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Flappy — Neon Bird</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none}
canvas{display:block;border:1px solid #0ff3;box-shadow:0 0 40px #0ff4,0 0 80px #0ff1;border-radius:4px;max-width:100vw;max-height:100vh}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}
#start-screen,#gameover-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,0.85);pointer-events:all;gap:20px}
#gameover-screen{display:none}
h1{font-size:clamp(2rem,6vw,4rem);color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff;letter-spacing:4px;text-transform:uppercase}
h2{font-size:clamp(1.5rem,4vw,2.5rem);color:#f0f;text-shadow:0 0 20px #f0f,0 0 40px #f0f;letter-spacing:3px}
.subtitle{color:#aaa;font-size:clamp(0.8rem,2vw,1.1rem);text-align:center;padding:0 20px}
.score-display{font-size:clamp(1rem,3vw,1.5rem);color:#ff0;text-shadow:0 0 10px #ff0}
.btn{padding:14px 40px;border:2px solid #0ff;background:transparent;color:#0ff;font-size:clamp(1rem,2.5vw,1.3rem);letter-spacing:2px;cursor:pointer;border-radius:4px;text-transform:uppercase;transition:all .2s;pointer-events:all}
.btn:hover,.btn:active{background:#0ff2;box-shadow:0 0 20px #0ff,0 0 40px #0ff4;transform:scale(1.05)}
.hi-score{color:#f90;font-size:clamp(0.9rem,2vw,1.1rem);text-shadow:0 0 10px #f90}
.controls-hint{color:#555;font-size:0.8rem;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="start-screen">
    <h1>🐦 NEON FLAPPY</h1>
    <p class="subtitle">Tap / Space to flap · Dodge the pipes!</p>
    <div class="hi-score" id="start-hi">Best: 0</div>
    <button class="btn" id="start-btn">▶ START</button>
    <p class="controls-hint">Tap screen or press SPACE</p>
  </div>
  <div id="gameover-screen">
    <h2>GAME OVER</h2>
    <div class="score-display" id="final-score">Score: 0</div>
    <div class="hi-score" id="go-hi">Best: 0</div>
    <button class="btn" id="retry-btn">↺ RETRY</button>
  </div>
</div>

<script>
(function(){
'use strict';
const HI_KEY = 'neon-flappy-hi';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Audio
const AC = window.AudioContext || window.webkitAudioContext;
let ac = null;
function ensureAC(){if(!ac){try{ac=new AC()}catch(e){}}  }
function playTone(freq,type,dur,vol=0.3){
  ensureAC(); if(!ac) return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start(); o.stop(ac.currentTime+dur);
  }catch(e){}
}
function sfxFlap(){playTone(600,'sine',0.1,0.25)}
function sfxScore(){playTone(880,'square',0.15,0.2);setTimeout(()=>playTone(1100,'square',0.15,0.2),80)}
function sfxDie(){
  playTone(200,'sawtooth',0.3,0.4);
  setTimeout(()=>playTone(150,'sawtooth',0.3,0.5),100);
}

// State
let state='start'; // start | playing | dead
let score=0, hiScore=parseInt(localStorage.getItem(HI_KEY)||'0');
let bird, pipes, particles, frameCount, shakeFrames;
let W=0,H=0;

function resize(){
  const mw=Math.min(window.innerWidth,480);
  const mh=Math.min(window.innerHeight,720);
  const ratio=Math.min(mw/360,mh/640);
  W=Math.floor(360*ratio); H=Math.floor(640*ratio);
  canvas.width=W; canvas.height=H;
}

function initGame(){
  bird={
    x:W*0.25, y:H*0.4,
    vy:0, vx:0,
    r:W*0.035,
    alive:true,
    angle:0,
    trail:[]
  };
  pipes=[];
  particles=[];
  score=0;
  frameCount=0;
  shakeFrames=0;
}

const GRAVITY=0.016;
const FLAP=-0.42;
const PIPE_W=0.11;
const BASE_GAP=0.35;
const MIN_GAP=0.22;
const PIPE_SPEED_BASE=0.003;
const PIPE_SPEED_MAX=0.008;

function getPipeSpeed(){
  return Math.min(PIPE_SPEED_BASE + score*0.00008, PIPE_SPEED_MAX);
}
function getGap(){
  return Math.max(BASE_GAP - score*0.003, MIN_GAP);
}

function spawnPipe(){
  const gap=getGap();
  const minTop=0.12, maxTop=0.6;
  const topH=minTop+(Math.random()*(maxTop-minTop));
  pipes.push({x:1.0, topH, gap, scored:false});
}

function flap(){
  if(state==='start'){startGame(); return;}
  if(state==='playing'&&bird.alive){
    bird.vy=FLAP;
    sfxFlap();
    for(let i=0;i<6;i++){
      particles.push({
        x:bird.x,y:bird.y,
        vx:(Math.random()-0.5)*0.012,
        vy:(Math.random()-0.5)*0.012-0.005,
        life:1,decay:0.04+Math.random()*0.04,
        r:W*(0.004+Math.random()*0.008),
        color:`hsl(${180+Math.random()*60},100%,70%)`
      });
    }
  }
}

function startGame(){
  state='playing';
  initGame();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('gameover-screen').style.display='none';
}

function gameOver(){
  state='dead';
  bird.alive=false;
  shakeFrames=20;
  sfxDie();
  // Burst particles
  for(let i=0;i<30;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=0.005+Math.random()*0.02;
    particles.push({
      x:bird.x,y:bird.y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd,
      life:1,decay:0.02+Math.random()*0.03,
      r:W*(0.005+Math.random()*0.012),
      color:`hsl(${Math.random()*60},100%,70%)`
    });
  }
  if(score>hiScore){hiScore=score;localStorage.setItem(HI_KEY,hiScore);}
  document.getElementById('final-score').textContent=`Score: ${score}`;
  document.getElementById('go-hi').textContent=`Best: ${hiScore}`;
  setTimeout(()=>{document.getElementById('gameover-screen').style.display='flex';},800);
}

function update(){
  if(state!=='playing') return;
  frameCount++;

  // Bird physics
  bird.vy+=GRAVITY;
  bird.vy=Math.max(Math.min(bird.vy,0.7),-0.6);
  bird.y+=bird.vy*H;
  bird.angle=Math.min(Math.max(bird.vy*2.5,-0.4),1.2);

  // Trail
  bird.trail.unshift({x:bird.x,y:bird.y});
  if(bird.trail.length>12) bird.trail.pop();

  // Boundaries
  if(bird.y-bird.r<0||bird.y+bird.r>H){ gameOver(); return; }

  // Pipes
  if(frameCount===1||frameCount%Math.floor(90/Math.max(1,getPipeSpeed()/PIPE_SPEED_BASE))===0){
    if(pipes.length===0||pipes[pipes.length-1].x<0.72) spawnPipe();
  }

  const spd=getPipeSpeed();
  const pw=PIPE_W*W;
  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i];
    p.x-=spd;
    const px=p.x*W;
    const topPx=p.topH*H;
    const botPx=topPx+p.gap*H;
    // Collision
    if(bird.x+bird.r>px&&bird.x-bird.r<px+pw){
      if(bird.y-bird.r<topPx||bird.y+bird.r>botPx){
        gameOver(); return;
      }
    }
    // Score
    if(!p.scored&&px+pw<bird.x){
      p.scored=true;
      score++;
      sfxScore();
      // Score particles
      for(let j=0;j<8;j++){
        particles.push({
          x:px+pw/2,y:bird.y,
          vx:(Math.random()-0.5)*0.015,
          vy:-0.01-Math.random()*0.01,
          life:1,decay:0.05,
          r:W*0.006,
          color:'#ff0'
        });
      }
    }
    if(px+pw<-0.1) pipes.splice(i,1);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*W; p.y+=p.vy*H;
    p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }

  if(shakeFrames>0) shakeFrames--;
}

function drawPipeGlow(x,y,w,h,color){
  ctx.shadowBlur=18;
  ctx.shadowColor=color;
  const g=ctx.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#0a2a0a');
  g.addColorStop(0.5,color+'88');
  g.addColorStop(1,'#0a2a0a');
  ctx.fillStyle=g;
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=color;
  ctx.lineWidth=2;
  ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // BG
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);

  // BG grid
  ctx.strokeStyle='#0ff08';
  ctx.lineWidth=0.5;
  const gs=40;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  const pw=PIPE_W*W;

  // Pipes
  pipes.forEach(p=>{
    const px=p.x*W;
    const topPx=p.topH*H;
    const botPx=topPx+p.gap*H;
    // Top pipe
    drawPipeGlow(px,0,pw,topPx,'#0f0');
    // Cap
    ctx.fillStyle='#0f04';
    ctx.shadowBlur=10;ctx.shadowColor='#0f0';
    ctx.fillRect(px-W*0.01,topPx-W*0.04,pw+W*0.02,W*0.04);
    ctx.shadowBlur=0;
    // Bottom pipe
    drawPipeGlow(px,botPx,pw,H-botPx,'#0f0');
    ctx.fillRect(px-W*0.01,botPx,pw+W*0.02,W*0.04);
  });

  // Particles
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.shadowBlur=12;
    ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Bird trail
  bird.trail.forEach((t,i)=>{
    const a=(1-i/bird.trail.length)*0.35;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.shadowBlur=8;ctx.shadowColor='#0ff';
    ctx.fillStyle='#0ff4';
    ctx.beginPath();
    ctx.arc(t.x,t.y,bird.r*(1-i/bird.trail.length*0.6),0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Bird
  ctx.save();
  ctx.translate(bird.x,bird.y);
  ctx.rotate(bird.angle);
  // Glow
  ctx.shadowBlur=25;ctx.shadowColor='#0ff';
  // Body
  ctx.fillStyle='#0ff';
  ctx.beginPath();
  ctx.ellipse(0,0,bird.r*1.2,bird.r,0,0,Math.PI*2);
  ctx.fill();
  // Eye
  ctx.fillStyle='#0a0a1a';
  ctx.beginPath();
  ctx.arc(bird.r*0.5,-bird.r*0.2,bird.r*0.28,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(bird.r*0.55,-bird.r*0.25,bird.r*0.1,0,Math.PI*2);
  ctx.fill();
  // Wing
  ctx.fillStyle='#08f8';
  ctx.shadowColor='#08f';
  ctx.beginPath();
  ctx.ellipse(-bird.r*0.3,bird.r*0.4,bird.r*0.7,bird.r*0.35,0.3,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Score
  if(state==='playing'){
    ctx.save();
    ctx.font=`bold ${W*0.1}px monospace`;
    ctx.textAlign='center';
    ctx.fillStyle='#fff';
    ctx.shadowBlur=15;ctx.shadowColor='#0ff';
    ctx.fillText(score,W/2,H*0.1);
    ctx.restore();
  }
}

function loop(){
  if(shakeFrames>0){
    ctx.save();
    ctx.translate((Math.random()-0.5)*shakeFrames*0.5,(Math.random()-0.5)*shakeFrames*0.5);
  }
  update();
  draw();
  if(shakeFrames>0) ctx.restore();
  requestAnimationFrame(loop);
}

// Events
function onInput(e){
  e.preventDefault();
  flap();
}
canvas.addEventListener('touchstart',onInput,{passive:false});
canvas.addEventListener('mousedown',onInput);
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap();}
});
document.getElementById('start-btn').addEventListener('click',()=>{startGame();});
document.getElementById('retry-btn').addEventListener('click',()=>{startGame();});

// Init
resize();
window.addEventListener('resize',()=>{resize();if(state==='playing')initGame();});
document.getElementById('start-hi').textContent=`Best: ${hiScore}`;
loop();
})();
</script>
</body>
</html>
