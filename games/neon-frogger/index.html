<script>
const T = GameI18n({
  title: { ko: '네온 프로거', en: 'Neon Frogger' },
  subtitle: { ko: '사이버펑크 도시를 건너라!\n차량을 피하고 스트림을 타고\n목적지에 도달하세요.', en: 'Cross the cyberpunk city!\nDodge neon cars and ride\ndata streams to safety.' },
  start: { ko: '게임 시작', en: 'Start Game' },
  retry: { ko: '다시 시작', en: 'Play Again' },
  gameOver: { ko: '게임 오버', en: 'Game Over' },
  gameOverDesc: { ko: '모든 생명을 잃었습니다!', en: 'All lives lost!' },
  score: { ko: '점수', en: 'Score' },
  best: { ko: '최고', en: 'Best' },
  levelUp: { ko: '레벨 업!', en: 'Level Up!' }
});
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 390, H = 844;
canvas.width = W; canvas.height = H;
canvas.style.width = W+'px'; canvas.style.height = H+'px';
const CELL = 52;
const COLS = 7;
const ROWS = 13;
const GRID_X = (W - COLS * CELL) / 2;
const GRID_Y_TOP = 80;
const SAFE_MARGIN = 20;
const HOME_ROW = 0;
const STREAM_ROWS = [1, 2, 3, 4];
const SAFE_ROW = 5;
const ROAD_ROWS = [6, 7, 8, 9, 10, 11];
const START_ROW = 12;
const TOTAL_ROWS = 13;
const C = {
  bg: '#050010', road: '#0a0818', roadLine: '#1a1040',
  safe: '#0a1a0a', safeStripe: '#0f2f0f',
  stream: '#000a20', streamGlow: '#003060',
  homeBg: '#080010', homeSlot: '#0d0028', homeFilled: '#001040', homeGlow: '#00ffcc',
  carColors: ['#ff4f96','#ff9f33','#33cfff','#ff3f3f','#cc44ff'],
  logColors: ['#005f8f','#006b6b','#004f9f','#00406f'],
  player: '#00ffcc', playerGlow: '#00ffcc', shield: '#00ffff'
};
let state = 'title';
let score = 0;
let hiScore = parseInt(localStorage.getItem('nf_hi') || '0');
let lives = 3;
let level = 1;
let homeSlots = [false,false,false,false,false];
let player = { col: 3, row: START_ROW, x: 0, y: 0, shield: 0, moving: false, animT: 0, fromX: 0, fromY: 0, toX: 0, toY: 0 };
let cars = [];
let logs = [];
let particles = [];
let levelUpTimer = 0;
let deadTimer = 0;
let flashTimer = 0;
let bgStars = [];
let swipeStart = null;
function initStars() {
  bgStars = [];
  for (let i = 0; i < 60; i++) {
    bgStars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.2+0.3, speed: Math.random()*0.2+0.05, alpha: Math.random() });
  }
}
function cellX(col) { return GRID_X + col * CELL + CELL/2; }
function cellY(row) { return GRID_Y_TOP + row * CELL + CELL/2; }
function initPlayer() {
  player.col = 3; player.row = START_ROW;
  player.x = cellX(3); player.y = cellY(START_ROW);
  player.shield = 0; player.moving = false; player.animT = 1;
}
function setupLevel() {
  cars = []; logs = [];
  homeSlots = [false,false,false,false,false];
  const spd = 0.8 + (level-1) * 0.25;
  const carDefs = [
    { row:6, count:3, dir:1, speed:spd*0.9, color:C.carColors[0], w:2.5 },
    { row:7, count:2, dir:-1, speed:spd*1.1, color:C.carColors[1], w:3 },
    { row:8, count:4, dir:1, speed:spd*0.7, color:C.carColors[2], w:2 },
    { row:9, count:2, dir:-1, speed:spd*1.3, color:C.carColors[3], w:3.5 },
    { row:10, count:3, dir:1, speed:spd*1.0, color:C.carColors[4], w:2 },
    { row:11, count:2, dir:-1, speed:spd*0.85, color:C.carColors[0], w:3 },
  ];
  carDefs.forEach(d => {
    const gap = (COLS * CELL + W) / d.count;
    for (let i = 0; i < d.count; i++) {
      const startX = d.dir === 1 ? -W + i * gap : W + i * gap;
      cars.push({ row: d.row, x: startX, y: cellY(d.row), w: d.w * CELL, h: CELL*0.55, dir: d.dir, speed: d.speed * CELL/60, color: d.color });
    }
  });
  const logDefs = [
    { row:1, count:3, dir:-1, speed:spd*0.6, color:C.logColors[0], w:3 },
    { row:2, count:4, dir:1, speed:spd*0.8, color:C.logColors[1], w:2.5 },
    { row:3, count:2, dir:-1, speed:spd*1.0, color:C.logColors[2], w:4 },
    { row:4, count:3, dir:1, speed:spd*0.75, color:C.logColors[3], w:3.5 },
  ];
  logDefs.forEach(d => {
    const gap = (COLS * CELL + W) / d.count;
    for (let i = 0; i < d.count; i++) {
      const startX = d.dir === 1 ? -W + i * gap : W + i * gap;
      logs.push({ row: d.row, x: startX, y: cellY(d.row), w: d.w * CELL, h: CELL*0.5, dir: d.dir, speed: d.speed * CELL/60, color: d.color });
    }
  });
}
function spawnParticles(x, y, color, count=12) {
  for (let i=0;i<count;i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const spd = 2 + Math.random()*4;
    particles.push({ x,y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life:1, color, r: 3+Math.random()*3 });
  }
}
function movePlayer(dx, dy) {
  if (state !== 'play' || player.moving) return;
  const nc = player.col + dx;
  const nr = player.row + dy;
  if (nc < 0 || nc >= COLS) return;
  if (nr < HOME_ROW || nr > START_ROW) return;
  player.moving = true;
  player.animT = 0;
  player.fromX = player.x; player.fromY = player.y;
  player.toX = cellX(nc); player.toY = cellY(nr);
  player.col = nc; player.row = nr;
  if (window.TgSDK) TgSDK.haptic && TgSDK.haptic('light');
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.impactOccurred('light');
}
document.getElementById('dp-up').addEventListener('touchstart',e=>{e.preventDefault();movePlayer(0,-1)},{passive:false});
document.getElementById('dp-down').addEventListener('touchstart',e=>{e.preventDefault();movePlayer(0,1)},{passive:false});
document.getElementById('dp-left').addEventListener('touchstart',e=>{e.preventDefault();movePlayer(-1,0)},{passive:false});
document.getElementById('dp-right').addEventListener('touchstart',e=>{e.preventDefault();movePlayer(1,0)},{passive:false});
document.addEventListener('keydown', e => {
  if (state === 'title' || state === 'gameover') { startGame(); return; }
  const map = { ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0], w:[0,-1],s:[0,1],a:[-1,0],d:[1,0] };
  const m = map[e.key];
  if (m) { e.preventDefault(); movePlayer(m[0],m[1]); }
});
canvas.addEventListener('touchstart', e => {
  if (state === 'title' || state === 'gameover') { startGame(); return; }
  swipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (!swipeStart) return;
  const dx = e.changedTouches[0].clientX - swipeStart.x;
  const dy = e.changedTouches[0].clientY - swipeStart.y;
  swipeStart = null;
  if (Math.abs(dx) > Math.abs(dy)) { movePlayer(dx > 0 ? 1 : -1, 0); }
  else if (Math.abs(dy) > 20) { movePlayer(0, dy > 0 ? 1 : -1); }
}, { passive: false });
document.getElementById('ov-btn').addEventListener('click', startGame);
function updateHUD() {
  document.getElementById('score-label').textContent = score;
  document.getElementById('hi-val').textContent = hiScore;
  document.getElementById('lvl-val').textContent = level;
  const heartsArr = Array(lives).fill('❤️').concat(Array(3-lives).fill('🖤'));
  document.getElementById('lives-val').textContent = heartsArr.join('');
}
function showOverlay(title, desc, btn) {
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-desc').textContent = desc;
  document.getElementById('ov-btn').textContent = btn;
}
function hideOverlay() { document.getElementById('overlay').style.display = 'none'; }
function startGame() {
  state = 'play'; score = 0; lives = 3; level = 1;
  hiScore = parseInt(localStorage.getItem('nf_hi') || '0');
  hideOverlay();
  document.getElementById('dpad').style.display = 'grid';
  initPlayer(); setupLevel(); updateHUD();
}
function respawn() {
  state = 'play'; initPlayer(); flashTimer = 0; updateHUD();
}
function triggerDeath() {
  if (player.shield > 0) { player.shield = 0; flashTimer = 60; return; }
  lives--;
  spawnParticles(player.x, player.y, '#ff4f96', 16);
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.notificationOccurred('error');
  if (lives <= 0) {
    state = 'gameover';
    if (score > hiScore) { hiScore = score; localStorage.setItem('nf_hi', hiScore); }
    document.getElementById('dpad').style.display = 'none';
    showOverlay(T('gameOver'), T('gameOverDesc') + '\n' + T('score') + ': ' + score, T('retry'));
  } else { state = 'dead'; deadTimer = 60; updateHUD(); }
}
function checkHome() {
  if (player.row !== HOME_ROW) return;
  const slotCol = [1,2,3,4,5];
  const idx = slotCol.indexOf(player.col);
  if (idx === -1) { triggerDeath(); return; }
  if (homeSlots[idx]) { score += 50*level; updateHUD(); initPlayer(); return; }
  homeSlots[idx] = true;
  score += 200 * level;
  spawnParticles(player.x, player.y, C.homeGlow, 20);
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.notificationOccurred('success');
  updateHUD(); initPlayer();
  if (homeSlots.every(v=>v)) { level++; levelUpTimer = 90; state = 'levelup'; setupLevel(); state = 'play'; }
}
function update(dt) {
  bgStars.forEach(s => { s.y += s.speed; if (s.y > H) s.y = 0; });
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.9; p.vy *= 0.9; p.life -= 0.04; });
  if (state === 'dead') { deadTimer--; if (deadTimer <= 0) respawn(); return; }
  if (state !== 'play') return;
  if (flashTimer > 0) flashTimer--;
  if (player.shield > 0) player.shield--;
  if (player.moving) {
    player.animT = Math.min(1, player.animT + 0.15);
    const t = player.animT < 0.5 ? 2*player.animT*player.animT : -1+(4-2*player.animT)*player.animT;
    player.x = player.fromX + (player.toX - player.fromX) * t;
    player.y = player.fromY + (player.toY - player.fromY) * t;
    if (player.animT >= 1) { player.moving = false; player.x = player.toX; player.y = player.toY; checkHome(); }
  }
  cars.forEach(car => {
    car.x += car.dir * car.speed;
    if (car.dir === 1 && car.x > W + car.w) car.x = -car.w;
    if (car.dir === -1 && car.x < -car.w) car.x = W + car.w;
  });
  let onLog = false; let logCarryDx = 0;
  logs.forEach(log => {
    log.x += log.dir * log.speed;
    if (log.dir === 1 && log.x > W + log.w) log.x = -log.w;
    if (log.dir === -1 && log.x < -log.w) log.x = W + log.w;
    if (!player.moving && STREAM_ROWS.includes(player.row) && player.row === log.row) {
      const px = player.x, py = player.y;
      const lx1 = log.x, lx2 = log.x + log.w;
      const ly1 = log.y - log.h/2, ly2 = log.y + log.h/2;
      if (px >= lx1 && px <= lx2 && py >= ly1 && py <= ly2) { onLog = true; logCarryDx += log.dir * log.speed; }
    }
  });
  if (!player.moving && STREAM_ROWS.includes(player.row)) {
    if (onLog) {
      player.x += logCarryDx; player.toX = player.x;
      player.col = Math.round((player.x - GRID_X - CELL/2) / CELL);
      if (player.x < GRID_X || player.x > GRID_X + COLS * CELL) { triggerDeath(); return; }
    } else { triggerDeath(); return; }
  }
  if (!player.moving && ROAD_ROWS.includes(player.row)) {
    for (const car of cars) {
      if (car.row !== player.row) continue;
      const px = player.x, py = player.y;
      const cx1 = car.x + 4, cx2 = car.x + car.w - 4;
      const cy1 = car.y - car.h/2 - 4, cy2 = car.y + car.h/2 + 4;
      if (px >= cx1 && px <= cx2 && py >= cy1 && py <= cy2) { triggerDeath(); return; }
    }
  }
  if (player.moving && ROAD_ROWS.includes(player.row)) {
    for (const car of cars) {
      if (car.row !== player.row) continue;
      const px = player.x, py = player.y;
      const cx1 = car.x + 6, cx2 = car.x + car.w - 6;
      const cy1 = car.y - car.h/2 - 2, cy2 = car.y + car.h/2 + 2;
      if (px >= cx1 && px <= cx2 && py >= cy1 && py <= cy2) { triggerDeath(); return; }
    }
  }
}
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
  bgStars.forEach(s => {
    ctx.save(); ctx.globalAlpha = 0.3 + s.alpha * 0.5;
    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
  });
  const gx = GRID_X, gw = COLS * CELL, gy = GRID_Y_TOP, gh = TOTAL_ROWS * CELL;
  for (let r = 0; r < TOTAL_ROWS; r++) {
    const rx = gx, ry = gy + r * CELL, rw = gw, rh = CELL;
    if (r === HOME_ROW) { ctx.fillStyle = C.homeBg; ctx.fillRect(rx, ry, rw, rh); }
    else if (STREAM_ROWS.includes(r)) {
      ctx.fillStyle = C.stream; ctx.fillRect(rx, ry, rw, rh);
      ctx.save(); ctx.globalAlpha = 0.15; ctx.fillStyle = C.streamGlow; ctx.fillRect(rx, ry+2, rw, rh-4); ctx.restore();
    } else if (r === SAFE_ROW) {
      ctx.fillStyle = C.safe; ctx.fillRect(rx, ry, rw, rh);
      for (let c=0;c<COLS;c++) { if ((c+r)%2===0) { ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle=C.safeStripe; ctx.fillRect(rx+c*CELL,ry,CELL,CELL); ctx.restore(); } }
    } else if (r === START_ROW) { ctx.fillStyle = C.safe; ctx.fillRect(rx, ry, rw, rh); }
    else {
      ctx.fillStyle = C.road; ctx.fillRect(rx, ry, rw, rh);
      ctx.save(); ctx.setLineDash([20,15]); ctx.strokeStyle = C.roadLine; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(rx, ry+CELL/2); ctx.lineTo(rx+rw, ry+CELL/2); ctx.stroke(); ctx.restore();
    }
  }
  const slotCols = [1,2,3,4,5];
  slotCols.forEach((sc, idx) => {
    const sx = gx + sc * CELL + 4, sy = gy + 4, sw = CELL - 8, sh = CELL - 8;
    ctx.save();
    if (homeSlots[idx]) { ctx.shadowColor = C.homeGlow; ctx.shadowBlur = 18; ctx.fillStyle = C.homeGlow; ctx.globalAlpha = 0.9; }
    else { ctx.fillStyle = C.homeSlot; ctx.globalAlpha = 0.8; }
    ctx.beginPath(); ctx.roundRect(sx, sy, sw, sh, 8); ctx.fill(); ctx.restore();
    ctx.save(); ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(homeSlots[idx] ? '🤖' : '🏠', gx+sc*CELL+CELL/2, gy+CELL/2); ctx.restore();
  });
  logs.forEach(log => {
    ctx.save(); ctx.shadowColor = log.color; ctx.shadowBlur = 8; ctx.fillStyle = log.color; ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.roundRect(log.x, log.y - log.h/2, log.w, log.h, 8); ctx.fill(); ctx.restore();
    ctx.save(); ctx.globalAlpha = 0.3; ctx.fillStyle = '#ffffff'; ctx.fillRect(log.x+8, log.y-4, log.w-16, 3); ctx.restore();
  });
  cars.forEach(car => {
    ctx.save(); ctx.shadowColor = car.color; ctx.shadowBlur = 14; ctx.fillStyle = car.color;
    const cx = car.x, cy = car.y - car.h/2, cw = car.w, ch = car.h;
    ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 8); ctx.fill();
    ctx.globalAlpha = 0.9; ctx.fillStyle = '#ffffc0';
    const hl = car.dir === 1 ? cx + cw - 10 : cx + 4;
    ctx.beginPath(); ctx.arc(hl, cy+6, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hl, cy+ch-6, 4, 0, Math.PI*2); ctx.fill(); ctx.restore();
  });
  particles.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.life; ctx.shadowColor = p.color; ctx.shadowBlur = 8; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill(); ctx.restore();
  });
  if (state !== 'gameover') {
    const visible = state === 'dead' ? Math.floor(Date.now()/120)%2===0 : true;
    const shieldFlash = flashTimer > 0 && Math.floor(Date.now()/80)%2===0;
    if (visible && !shieldFlash) {
      const px = player.x, py = player.y, pr = CELL*0.35;
      ctx.save();
      if (player.shield > 0) { ctx.shadowColor = C.shield; ctx.shadowBlur = 24; ctx.strokeStyle = C.shield; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(px, py, pr+6, 0, Math.PI*2); ctx.stroke(); }
      else { ctx.shadowColor = C.playerGlow; ctx.shadowBlur = 20; }
      ctx.fillStyle = C.player; ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#050010'; ctx.beginPath(); ctx.arc(px-6, py-5, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+6, py-5, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#00ff88'; ctx.beginPath(); ctx.arc(px-6, py-5, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+6, py-5, 2, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
  }
  if (levelUpTimer > 0) {
    levelUpTimer--; ctx.save(); ctx.globalAlpha = levelUpTimer/90;
    ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 24; ctx.fillStyle = '#00ffcc';
    ctx.fillText(T('levelUp') + ' ' + level, W/2, H/2); ctx.restore();
  }
  ctx.save(); ctx.strokeStyle = 'rgba(0,255,204,0.2)'; ctx.lineWidth = 2;
  ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 8; ctx.strokeRect(gx, gy, gw, gh); ctx.restore();
}
let last = 0;
function loop(ts) { const dt = (ts - last) / 1000; last = ts; update(dt); draw(); requestAnimationFrame(loop); }
initStars();
hiScore = parseInt(localStorage.getItem('nf_hi') || '0');
document.getElementById('ov-title').textContent = T('title');
document.getElementById('ov-desc').textContent = T('subtitle');
document.getElementById('ov-btn').textContent = T('start');
updateHUD();
requestAnimationFrame(loop);
</script>
