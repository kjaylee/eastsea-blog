<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<title>Neon Gems — Match-3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  #hud {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px 6px;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }
  .hud-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hud-label { font-size: 0.65rem; text-transform: uppercase; opacity: 0.5; }
  .hud-val { font-size: 1.2rem; font-weight: 700; color: #c8ffb0; text-shadow: 0 0 12px #80ff40; }
  #timer-val { color: #ffcc44; text-shadow: 0 0 12px #ff8800; }
  #combo-banner {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    font-size: 2rem; font-weight: 900; color: #fff;
    text-shadow: 0 0 24px #ff44ff, 0 0 48px #ff44ff;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    letter-spacing: 0.1em; z-index: 10;
  }
  canvas {
    display: block;
    max-width: 100vw;
    max-height: calc(100dvh - 120px);
    touch-action: none;
  }
  #overlay {
    position: fixed; inset: 0; background: rgba(10,10,26,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px; z-index: 20;
  }
  #overlay h1 {
    font-size: 2.8rem; font-weight: 900;
    background: linear-gradient(135deg, #ff44ff, #44ffff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none; letter-spacing: 0.08em;
  }
  #overlay p { font-size: 1rem; opacity: 0.7; text-align: center; max-width: 300px; line-height: 1.6; }
  #overlay .score-line {
    font-size: 1.5rem; font-weight: 700;
    color: #c8ffb0; text-shadow: 0 0 16px #80ff40;
  }
  #overlay button {
    padding: 14px 40px; font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, #6600cc, #cc0088);
    border: none; border-radius: 50px; color: #fff;
    cursor: pointer; letter-spacing: 0.08em;
    box-shadow: 0 0 24px #cc0088aa;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #overlay button:hover { transform: scale(1.06); box-shadow: 0 0 36px #ff44ffcc; }
  #overlay .best { font-size: 0.85rem; opacity: 0.5; }
</style>
</head>
<body>
<div id="hud">
  <div class="hud-block">
    <span class="hud-label">Score</span>
    <span class="hud-val" id="score-val">0</span>
  </div>
  <div class="hud-block">
    <span class="hud-label">Time</span>
    <span class="hud-val" id="timer-val">90</span>
  </div>
  <div class="hud-block">
    <span class="hud-label">Best</span>
    <span class="hud-val" id="best-val">0</span>
  </div>
</div>
<div id="combo-banner"></div>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>NEON GEMS</h1>
  <p>Swap adjacent gems to match 3 or more.<br>Chain reactions earn combo multipliers!</p>
  <div class="score-line" id="final-score" style="display:none"></div>
  <div class="best" id="best-line"></div>
  <button id="btn">▶ PLAY</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLS = 8, ROWS = 8;
let CELL = 54;

// Responsive sizing
function resize() {
  const maxW = Math.min(window.innerWidth, 480);
  const maxH = window.innerHeight - 110;
  CELL = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
  canvas.width = CELL * COLS;
  canvas.height = CELL * ROWS;
}
resize();
window.addEventListener('resize', () => { resize(); if (state !== 'idle') draw(); });

// Audio
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, type, dur, vol=0.18, delay=0) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.value = freq; o.type = type;
    const t = AC.currentTime + delay;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e){}
}
function playMatch(combo) {
  const notes = [261, 329, 392, 523, 659, 784, 1047];
  for (let i = 0; i < Math.min(combo, 5); i++)
    beep(notes[i], 'sine', 0.18, 0.2, i * 0.06);
}
function playSwap() { beep(440, 'triangle', 0.08, 0.1); }
function playBad() { beep(160, 'sawtooth', 0.12, 0.1); }
function playSelect() { beep(600, 'sine', 0.05, 0.08); }

// Gems
const GEM_COLORS = [
  { fill: '#ff3366', glow: '#ff003355' },
  { fill: '#33aaff', glow: '#0044ff55' },
  { fill: '#44ff88', glow: '#00ff4455' },
  { fill: '#ffcc00', glow: '#ff880055' },
  { fill: '#cc44ff', glow: '#aa00ff55' },
  { fill: '#ff8844', glow: '#ff440055' },
];

let grid = [], selected = null, state = 'idle';
let score = 0, best = +localStorage.getItem('neon-gems-best') || 0;
let timeLeft = 90, timerInterval = null;
let animating = false, particles = [], fallingGems = [];
let combo = 0;

function randGem() { return Math.floor(Math.random() * GEM_COLORS.length); }

function initGrid() {
  do {
    grid = Array.from({length: ROWS}, () => Array.from({length: COLS}, () => randGem()));
  } while (!hasMoves());
  removeMatchesInit();
}

function removeMatchesInit() {
  let found;
  do {
    found = false;
    const matches = findMatches();
    if (matches.length > 0) {
      found = true;
      for (const [r, c] of matches) {
        grid[r][c] = randGem();
      }
    }
  } while (found);
}

function findMatches() {
  const matched = new Set();
  // horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const g = grid[r][c];
      if (g === grid[r][c+1] && g === grid[r][c+2]) {
        let e = c + 2;
        while (e + 1 < COLS && grid[r][e+1] === g) e++;
        for (let x = c; x <= e; x++) matched.add(`${r},${x}`);
      }
    }
  }
  // vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const g = grid[r][c];
      if (g === grid[r+1][c] && g === grid[r+2][c]) {
        let e = r + 2;
        while (e + 1 < ROWS && grid[e+1][c] === g) e++;
        for (let y = r; y <= e; y++) matched.add(`${y},${c}`);
      }
    }
  }
  return [...matched].map(k => k.split(',').map(Number));
}

function hasMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c + 1 < COLS) {
        swap(r,c,r,c+1);
        if (findMatches().length > 0) { swap(r,c,r,c+1); return true; }
        swap(r,c,r,c+1);
      }
      if (r + 1 < ROWS) {
        swap(r,c,r+1,c);
        if (findMatches().length > 0) { swap(r,c,r+1,c); return true; }
        swap(r,c,r+1,c);
      }
    }
  }
  return false;
}

function swap(r1,c1,r2,c2) {
  [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
}

function spawnParticles(r, c, color) {
  const cx = c * CELL + CELL/2, cy = r * CELL + CELL/2;
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * (2 + Math.random() * 3),
      vy: Math.sin(angle) * (2 + Math.random() * 3),
      life: 1, color, size: 4 + Math.random() * 4
    });
  }
}

let gemOffsets = []; // for drop animation
function initOffsets() {
  gemOffsets = Array.from({length: ROWS}, () => new Array(COLS).fill(0));
}
initOffsets();

async function processMatches() {
  if (animating) return;
  let chainCombo = 0;
  let anyMatch = true;
  while (anyMatch) {
    const matches = findMatches();
    if (matches.length === 0) { anyMatch = false; break; }
    chainCombo++;
    combo = chainCombo;
    const pts = matches.length * 10 * chainCombo;
    score += pts;
    document.getElementById('score-val').textContent = score;
    playMatch(chainCombo);
    showCombo(chainCombo, matches.length);
    for (const [r,c] of matches) spawnParticles(r, c, GEM_COLORS[grid[r][c]].fill);
    for (const [r,c] of matches) grid[r][c] = -1;
    await animateClear();
    gravity();
    await animateFall();
    fillEmpty();
    if (!hasMoves()) {
      shuffleGrid();
    }
  }
  combo = 0;
  animating = false;
}

function gravity() {
  for (let c = 0; c < COLS; c++) {
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== -1) {
        if (empty !== r) {
          const drop = empty - r;
          gemOffsets[r][c] = -drop * CELL;
          grid[empty][c] = grid[r][c];
          grid[r][c] = -1;
          gemOffsets[empty][c] = -drop * CELL;
        }
        empty--;
      }
    }
  }
}

function fillEmpty() {
  for (let c = 0; c < COLS; c++) {
    let dropCount = 0;
    for (let r = 0; r < ROWS; r++) {
      if (grid[r][c] === -1) {
        dropCount++;
        grid[r][c] = randGem();
        gemOffsets[r][c] = -dropCount * CELL;
      }
    }
  }
}

function animateClear() {
  return new Promise(resolve => {
    let flash = 0, maxFlash = 6;
    const loop = () => {
      draw();
      flash++;
      if (flash < maxFlash) requestAnimationFrame(loop);
      else resolve();
    };
    requestAnimationFrame(loop);
  });
}

function animateFall() {
  return new Promise(resolve => {
    const speed = CELL * 0.22;
    const loop = () => {
      let moving = false;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          if (gemOffsets[r][c] < 0) {
            gemOffsets[r][c] = Math.min(0, gemOffsets[r][c] + speed);
            moving = true;
          }
        }
      draw();
      if (moving) requestAnimationFrame(loop);
      else resolve();
    };
    requestAnimationFrame(loop);
  });
}

function shuffleGrid() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      grid[r][c] = randGem();
  removeMatchesInit();
}

let comboTimeout;
function showCombo(n, count) {
  const el = document.getElementById('combo-banner');
  if (n >= 2 || count >= 5) {
    let text = count >= 5 ? `MEGA ${count}×!` : n >= 3 ? `${n}× COMBO!` : `${count} MATCH!`;
    el.textContent = text;
    el.style.opacity = '1';
    clearTimeout(comboTimeout);
    comboTimeout = setTimeout(() => { el.style.opacity = '0'; }, 900);
  }
}

// Drawing
function drawGem(r, c, alpha = 1, scale = 1) {
  const gIdx = grid[r][c];
  if (gIdx === -1) return;
  const gc = GEM_COLORS[gIdx];
  const ox = c * CELL + CELL/2;
  const oy = r * CELL + CELL/2 + (gemOffsets[r][c] || 0);
  const rad = (CELL / 2 - 4) * scale;
  const isSelected = selected && selected[0] === r && selected[1] === c;

  ctx.save();
  ctx.translate(ox, oy);
  if (isSelected) {
    ctx.scale(1.12, 1.12);
  }

  // glow
  ctx.shadowColor = gc.fill;
  ctx.shadowBlur = isSelected ? 24 : 12;

  // gem shape (rounded diamond)
  ctx.beginPath();
  ctx.moveTo(0, -rad);
  ctx.lineTo(rad * 0.7, -rad * 0.3);
  ctx.lineTo(rad * 0.7, rad * 0.3);
  ctx.lineTo(0, rad);
  ctx.lineTo(-rad * 0.7, rad * 0.3);
  ctx.lineTo(-rad * 0.7, -rad * 0.3);
  ctx.closePath();

  const grad = ctx.createRadialGradient(-rad*0.2, -rad*0.3, 0, 0, 0, rad);
  grad.addColorStop(0, '#ffffff99');
  grad.addColorStop(0.3, gc.fill);
  grad.addColorStop(1, gc.fill + '99');
  ctx.fillStyle = grad;
  ctx.globalAlpha = alpha;
  ctx.fill();

  if (isSelected) {
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // shine
  ctx.beginPath();
  ctx.ellipse(-rad*0.2, -rad*0.3, rad*0.25, rad*0.18, -0.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // grid bg
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.015)';
      ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
    }
  }

  // gems
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] !== -1) drawGem(r, c);

  // particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.05;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // timer pulse when low
  if (timeLeft <= 10) {
    ctx.strokeStyle = `rgba(255,60,60,${0.3 + 0.3 * Math.sin(Date.now()/150)})`;
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
  }
}

// Input
function getCell(x, y) {
  const rect = canvas.getBoundingClientRect();
  const cx = (x - rect.left) * (canvas.width / rect.width);
  const cy = (y - rect.top) * (canvas.height / rect.height);
  return [Math.floor(cy / CELL), Math.floor(cx / CELL)];
}

async function handleClick(x, y) {
  if (animating || state !== 'playing') return;
  if (AC.state === 'suspended') AC.resume();
  const [r, c] = getCell(x, y);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;

  if (!selected) {
    selected = [r, c];
    playSelect();
    draw();
    return;
  }

  const [sr, sc] = selected;
  if (sr === r && sc === c) {
    selected = null;
    draw();
    return;
  }

  const adjacent = (Math.abs(sr-r) + Math.abs(sc-c)) === 1;
  if (!adjacent) {
    selected = [r, c];
    playSelect();
    draw();
    return;
  }

  selected = null;
  animating = true;
  swap(sr, sc, r, c);
  playSwap();
  draw();

  const matches = findMatches();
  if (matches.length === 0) {
    await new Promise(res => setTimeout(res, 180));
    swap(sr, sc, r, c);
    playBad();
    draw();
    animating = false;
    return;
  }

  initOffsets();
  await processMatches();
}

canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  handleClick(t.clientX, t.clientY);
}, { passive: false });

// Touch drag support
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStart = getCell(t.clientX, t.clientY);
  if (touchStart[0] >= 0 && touchStart[0] < ROWS && touchStart[1] >= 0 && touchStart[1] < COLS) {
    selected = touchStart;
    playSelect();
    draw();
  }
}, { passive: false });

canvas.addEventListener('touchmove', async e => {
  e.preventDefault();
  if (!touchStart || animating || state !== 'playing') return;
  const t = e.touches[0];
  const [r, c] = getCell(t.clientX, t.clientY);
  const [sr, sc] = touchStart;
  if (r === sr && c === sc) return;
  const adjacent = (Math.abs(sr-r) + Math.abs(sc-c)) === 1;
  if (!adjacent) return;

  touchStart = null;
  selected = null;
  animating = true;
  swap(sr, sc, r, c);
  playSwap();
  draw();

  const matches = findMatches();
  if (matches.length === 0) {
    await new Promise(res => setTimeout(res, 180));
    swap(sr, sc, r, c);
    playBad();
    draw();
    animating = false;
    return;
  }
  initOffsets();
  await processMatches();
}, { passive: false });

// Timer
function startTimer() {
  const el = document.getElementById('timer-val');
  timerInterval = setInterval(() => {
    timeLeft--;
    el.textContent = timeLeft;
    if (timeLeft <= 10) el.style.color = '#ff4444';
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  clearInterval(timerInterval);
  state = 'idle';
  if (score > best) {
    best = score;
    localStorage.setItem('neon-gems-best', best);
  }
  document.getElementById('best-val').textContent = best;
  document.getElementById('final-score').textContent = `Score: ${score}`;
  document.getElementById('final-score').style.display = 'block';
  document.getElementById('best-line').textContent = `Best: ${best}`;
  document.getElementById('overlay').style.display = 'flex';
  document.querySelector('#overlay h1').textContent = 'GAME OVER';
  document.getElementById('btn').textContent = '▶ PLAY AGAIN';
}

function startGame() {
  if (AC.state === 'suspended') AC.resume();
  state = 'playing';
  score = 0; timeLeft = 90; combo = 0; animating = false;
  particles = [];
  document.getElementById('score-val').textContent = '0';
  document.getElementById('timer-val').textContent = '90';
  document.getElementById('timer-val').style.color = '#ffcc44';
  document.getElementById('best-val').textContent = best;
  document.getElementById('overlay').style.display = 'none';
  initGrid();
  initOffsets();
  clearInterval(timerInterval);
  startTimer();
  draw();

  // particle loop
  const loop = () => {
    if (state === 'playing') {
      if (particles.length > 0) draw();
      requestAnimationFrame(loop);
    }
  };
  requestAnimationFrame(loop);
}

document.getElementById('btn').addEventListener('click', startGame);
document.getElementById('best-line').textContent = `Best: ${best}`;
document.getElementById('best-val').textContent = best;

draw();
</script>
</body>
</html>
