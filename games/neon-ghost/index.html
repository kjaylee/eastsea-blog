<script>
'use strict';

// ── CANVAS ────────────────────────────────────────────────────
const C = document.getElementById('gc');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
addEventListener('resize', resize); resize();

// ── AUDIO ─────────────────────────────────────────────────────
let AC;
function getAC() { return AC || (AC = new (window.AudioContext || window.webkitAudioContext)()); }

function sfxGhostSpawn() {
  const a = getAC();
  [330, 440, 550].forEach((f, i) => {
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = 'sine'; o.frequency.value = f;
    const t = a.currentTime + i * 0.05;
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.start(t); o.stop(t + 0.2);
  });
}
function sfxKill() {
  const a = getAC(), o = a.createOscillator(), g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(880, a.currentTime);
  o.frequency.exponentialRampToValueAtTime(220, a.currentTime + 0.15);
  g.gain.setValueAtTime(0.2, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.2);
  o.start(); o.stop(a.currentTime + 0.2);
}
function sfxHurt() {
  const a = getAC();
  const buf = a.createBuffer(1, a.sampleRate * 0.3, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.06));
  const s = a.createBufferSource(), gn = a.createGain();
  s.buffer = buf; s.connect(gn); gn.connect(a.destination); gn.gain.value = 0.35; s.start();
}
function sfxNoGhost() {
  const a = getAC(), o = a.createOscillator(), g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type = 'square'; o.frequency.value = 110;
  g.gain.setValueAtTime(0.1, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.1);
  o.start(); o.stop(a.currentTime + 0.1);
}

// ── CONSTANTS ─────────────────────────────────────────────────
const PLAYER_SPEED = 220;
const PLAYER_R = 12;
const ENEMY_R = 11;
const GHOST_R = 13;
const MAX_GHOSTS = 3;
const GHOST_DURATION = 3.2;  // seconds a ghost lives
const HISTORY_LEN = 180;     // frames of position history (3s at 60fps)
const GHOST_DELAY = 3.0;     // seconds ghost replays from
const GHOST_CHARGE_TIME = 5; // seconds to charge one ghost use

// ── STATE ─────────────────────────────────────────────────────
let px, py;           // player position
let score = 0;
let best = parseInt(localStorage.getItem('neonGhost_best') || '0');
let lives = 3;
let level = 1;
let gameRunning = false;
let gameTime = 0;
let ghosts = [];
let enemies = [];
let particles = [];
let posHistory = [];  // [{x,y}] ring buffer
let histIdx = 0;
let ghostCharge = 0;  // 0..1
let ghostCount = 0;   // available ghost uses (max MAX_GHOSTS)
let enemySpawnTimer = 0;
let flashTimer = 0;

// Input
let inputX = 0, inputY = 0;
let pointerActive = false;
let pointerX = 0, pointerY = 0;
const keys = {};

function initGame() {
  px = W / 2; py = H * 0.75;
  score = 0; lives = 3; level = 1; gameTime = 0;
  ghosts = []; enemies = []; particles = [];
  posHistory = new Array(HISTORY_LEN).fill(null).map(() => ({ x: px, y: py }));
  histIdx = 0;
  ghostCharge = 0; ghostCount = 1;
  enemySpawnTimer = 0; flashTimer = 0;
  inputX = 0; inputY = 0;
  updateUI();
}

function updateUI() {
  document.getElementById('score-val').textContent = score;
  const hearts = ['♥','♥','♥'].map((h, i) => i < lives ? h : '♡').join(' ');
  document.getElementById('lives-dots').textContent = hearts;
  const fillPct = (ghostCharge * 100).toFixed(0);
  document.getElementById('ghost-fill').style.width = fillPct + '%';
  document.getElementById('ghost-lbl').textContent =
    'GHOST ×' + ghostCount + (ghostCount >= MAX_GHOSTS ? ' (MAX)' : '');
}

// ── GHOST MECHANICS ───────────────────────────────────────────
function spawnGhost() {
  if (!gameRunning) return;
  if (ghostCount <= 0) { sfxNoGhost(); return; }
  ghostCount--;
  sfxGhostSpawn();

  // Copy the last HISTORY_LEN frames of position history
  const path = [];
  const startIdx = (histIdx - 1 + HISTORY_LEN) % HISTORY_LEN;
  for (let i = 0; i < HISTORY_LEN; i++) {
    const idx = (startIdx - i + HISTORY_LEN) % HISTORY_LEN;
    if (posHistory[idx]) path.push({ ...posHistory[idx] });
  }
  path.reverse(); // chronological order

  ghosts.push({
    path,
    pathIdx: 0,
    x: path[0]?.x || px,
    y: path[0]?.y || py,
    life: GHOST_DURATION,
    maxLife: GHOST_DURATION,
    alpha: 1
  });
  updateUI();
}

// ── ENEMY SPAWNING ────────────────────────────────────────────
function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let ex, ey, vx, vy;
  const spd = 50 + level * 15 + Math.random() * 40;
  switch (side) {
    case 0: ex = Math.random()*W; ey = -ENEMY_R; vx = (px-ex)*0.01; vy = spd; break;
    case 1: ex = W+ENEMY_R; ey = Math.random()*H; vx = -spd; vy = (py-ey)*0.01; break;
    case 2: ex = Math.random()*W; ey = H+ENEMY_R; vx = (px-ex)*0.01; vy = -spd; break;
    case 3: ex = -ENEMY_R; ey = Math.random()*H; vx = spd; vy = (py-ey)*0.01; break;
  }
  // Normalize vel
  const mag = Math.sqrt(vx*vx + vy*vy);
  enemies.push({ x: ex, y: ey, vx: vx/mag*spd, vy: vy/mag*spd, r: ENEMY_R, hp: 1 });
}

// ── PARTICLES ─────────────────────────────────────────────────
function burst(bx, by, color, count, spd) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (spd || 80) * (0.5 + Math.random());
    particles.push({ x: bx, y: by, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, color });
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────────
let lastTime = 0;
const FPS_HIST = 1 / 60;

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  X.fillStyle = '#0a0a1a';
  X.fillRect(0, 0, W, H);

  if (!gameRunning) { requestAnimationFrame(loop); return; }

  gameTime += dt;
  flashTimer = Math.max(0, flashTimer - dt);

  // ── PLAYER MOVEMENT ────────────────────────────────────────
  let mx = inputX, my = inputY;

  // Keyboard WASD / arrows
  if (keys['ArrowLeft']  || keys['KeyA']) mx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) mx += 1;
  if (keys['ArrowUp']    || keys['KeyW']) my -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) my += 1;

  // Pointer drag toward pointer
  if (pointerActive) {
    const dx = pointerX - px, dy = pointerY - py;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 8) {
      mx += dx / dist;
      my += dy / dist;
    }
  }

  // Normalize
  const mlen = Math.sqrt(mx*mx + my*my);
  if (mlen > 1) { mx /= mlen; my /= mlen; }

  px = Math.max(PLAYER_R, Math.min(W - PLAYER_R, px + mx * PLAYER_SPEED * dt));
  py = Math.max(PLAYER_R, Math.min(H - PLAYER_R, py + my * PLAYER_SPEED * dt));

  // Record position history
  posHistory[histIdx] = { x: px, y: py };
  histIdx = (histIdx + 1) % HISTORY_LEN;

  // ── GHOST CHARGE ───────────────────────────────────────────
  if (ghostCount < MAX_GHOSTS) {
    ghostCharge += dt / GHOST_CHARGE_TIME;
    if (ghostCharge >= 1) {
      ghostCharge = 0;
      ghostCount++;
    }
  }

  // ── UPDATE GHOSTS ──────────────────────────────────────────
  ghosts = ghosts.filter(g => {
    g.life -= dt;
    g.alpha = Math.min(1, g.life / g.maxLife * 2);

    // Advance along stored path
    const pathSpeed = HISTORY_LEN / GHOST_DURATION * dt;
    g.pathIdx = Math.min(g.pathIdx + pathSpeed, g.path.length - 1);
    const pi = Math.floor(g.pathIdx);
    const pf = g.pathIdx - pi;
    if (pi < g.path.length - 1) {
      g.x = g.path[pi].x + (g.path[pi+1].x - g.path[pi].x) * pf;
      g.y = g.path[pi].y + (g.path[pi+1].y - g.path[pi].y) * pf;
    }

    return g.life > 0;
  });

  // ── ENEMY SPAWN ────────────────────────────────────────────
  enemySpawnTimer += dt;
  const spawnRate = Math.max(0.35, 1.6 - level * 0.08);
  if (enemySpawnTimer > spawnRate) {
    enemySpawnTimer = 0;
    spawnEnemy();
    if (level > 3 && Math.random() < 0.3) spawnEnemy();
  }

  // ── UPDATE ENEMIES ─────────────────────────────────────────
  enemies = enemies.filter(e => {
    e.x += e.vx * dt;
    e.y += e.vy * dt;

    // Off-screen
    if (e.x < -50 || e.x > W+50 || e.y < -50 || e.y > H+50) return false;

    // Ghost collision
    for (const g of ghosts) {
      const dx = g.x - e.x, dy = g.y - e.y;
      if (dx*dx + dy*dy < (GHOST_R + e.r)**2) {
        // Ghost kills enemy
        score += 10 * level;
        if (score > best) { best = score; localStorage.setItem('neonGhost_best', best); }
        burst(e.x, e.y, '#a0f', 12, 100);
        sfxKill();
        if (score % 150 === 0 && score > 0) level++;
        updateUI();
        return false;
      }
    }

    // Player collision
    const pdx = px - e.x, pdy = py - e.y;
    if (pdx*pdx + pdy*pdy < (PLAYER_R + e.r)**2) {
      lives--;
      flashTimer = 0.5;
      burst(px, py, '#f04', 14, 90);
      sfxHurt();
      updateUI();
      if (lives <= 0) endGame();
      return false;
    }

    return true;
  });

  // ── UPDATE PARTICLES ───────────────────────────────────────
  particles = particles.filter(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.9; p.vy *= 0.9;
    p.life -= dt * 1.8;
    return p.life > 0;
  });

  // ── DRAW ───────────────────────────────────────────────────

  // Flash
  if (flashTimer > 0) {
    X.fillStyle = `rgba(255,0,50,${flashTimer * 0.45})`;
    X.fillRect(0, 0, W, H);
  }

  // Draw ghost paths (faint trail)
  ghosts.forEach(g => {
    const steps = Math.min(40, g.path.length);
    const start = Math.floor(g.pathIdx) - steps;
    for (let i = Math.max(0, start); i < Math.floor(g.pathIdx); i++) {
      const t = (i - start) / steps;
      const pt = g.path[i];
      X.beginPath();
      X.arc(pt.x, pt.y, 3 * t, 0, Math.PI * 2);
      X.fillStyle = `rgba(160,0,255,${t * g.alpha * 0.4})`;
      X.fill();
    }
  });

  // Draw particles
  particles.forEach(p => {
    X.beginPath();
    X.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
    X.fillStyle = p.color + Math.floor(p.life * 200).toString(16).padStart(2,'0');
    X.fill();
  });

  // Draw enemies
  enemies.forEach(e => {
    const pulse = 0.85 + 0.15 * Math.sin(gameTime * 8 + e.x);
    X.beginPath();
    X.arc(e.x, e.y, e.r * pulse, 0, Math.PI * 2);
    X.fillStyle = '#ff3344';
    X.shadowColor = '#ff3344';
    X.shadowBlur = 16;
    X.fill();
    X.shadowBlur = 0;
    // Core
    X.beginPath();
    X.arc(e.x, e.y, e.r * 0.45, 0, Math.PI * 2);
    X.fillStyle = '#ffaaaa';
    X.fill();
    // X mark
    X.strokeStyle = '#ff000099';
    X.lineWidth = 2;
    X.beginPath();
    X.moveTo(e.x - 5, e.y - 5); X.lineTo(e.x + 5, e.y + 5);
    X.moveTo(e.x + 5, e.y - 5); X.lineTo(e.x - 5, e.y + 5);
    X.stroke();
  });

  // Draw ghosts
  ghosts.forEach((g, gi) => {
    const col = '#a0f';
    // Outer glow ring
    X.beginPath();
    X.arc(g.x, g.y, GHOST_R + 4, 0, Math.PI * 2);
    X.strokeStyle = `rgba(160,0,255,${g.alpha * 0.5})`;
    X.lineWidth = 2;
    X.shadowColor = col;
    X.shadowBlur = 20;
    X.stroke();
    X.shadowBlur = 0;
    // Main circle
    X.beginPath();
    X.arc(g.x, g.y, GHOST_R, 0, Math.PI * 2);
    X.fillStyle = `rgba(160,0,255,${g.alpha * 0.35})`;
    X.fill();
    // Core
    X.beginPath();
    X.arc(g.x, g.y, 5, 0, Math.PI * 2);
    X.fillStyle = `rgba(220,160,255,${g.alpha})`;
    X.shadowColor = col;
    X.shadowBlur = 14;
    X.fill();
    X.shadowBlur = 0;
    // Life bar
    const barW = 26, barH = 3;
    X.fillStyle = '#111';
    X.fillRect(g.x - barW/2, g.y - GHOST_R - 8, barW, barH);
    X.fillStyle = `rgba(160,0,255,${g.alpha})`;
    X.fillRect(g.x - barW/2, g.y - GHOST_R - 8, barW * (g.life / g.maxLife), barH);
  });

  // Draw player trail
  const trailLen = 12;
  for (let t = 1; t <= trailLen; t++) {
    const ti = (histIdx - 1 - t + HISTORY_LEN) % HISTORY_LEN;
    const pt = posHistory[ti];
    if (!pt) continue;
    const alpha = (1 - t / trailLen) * 0.5;
    X.beginPath();
    X.arc(pt.x, pt.y, PLAYER_R * 0.6 * (1 - t/trailLen), 0, Math.PI * 2);
    X.fillStyle = `rgba(0,200,255,${alpha})`;
    X.fill();
  }

  // Draw player
  {
    const pulse = 1 + 0.07 * Math.sin(gameTime * 10);
    X.beginPath();
    X.arc(px, py, PLAYER_R * pulse, 0, Math.PI * 2);
    X.fillStyle = '#fff';
    X.shadowColor = '#0af';
    X.shadowBlur = 20;
    X.fill();
    X.shadowBlur = 0;
    X.beginPath();
    X.arc(px, py, PLAYER_R * 0.45, 0, Math.PI * 2);
    X.fillStyle = '#0af';
    X.shadowColor = '#0af';
    X.shadowBlur = 10;
    X.fill();
    X.shadowBlur = 0;
  }

  // Level indicator
  X.fillStyle = 'rgba(160,0,255,0.4)';
  X.font = '11px Courier New';
  X.textAlign = 'center';
  X.fillText('LV ' + level, W/2, H - 8);

  // Tutorial hint
  if (gameTime < 4) {
    const alpha = Math.max(0, 1 - gameTime / 4);
    X.globalAlpha = alpha;
    X.fillStyle = '#a0f';
    X.font = '13px Courier New';
    X.textAlign = 'center';
    X.fillText('탭/Space: 고스트 소환 👻', W/2, H * 0.4);
    X.globalAlpha = 1;
  }

  // Ghost count icons in bottom corner
  for (let i = 0; i < MAX_GHOSTS; i++) {
    const gx = W/2 - 30 + i * 30, gy = H - 52;
    X.beginPath();
    X.arc(gx, gy, 8, 0, Math.PI * 2);
    X.fillStyle = i < ghostCount ? 'rgba(160,0,255,0.7)' : 'rgba(60,20,80,0.4)';
    X.shadowColor = '#a0f';
    X.shadowBlur = i < ghostCount ? 10 : 0;
    X.fill();
    X.shadowBlur = 0;
  }

  updateUI();
  requestAnimationFrame(loop);
}

// ── END GAME ──────────────────────────────────────────────────
function endGame() {
  gameRunning = false;
  if (score > best) { best = score; localStorage.setItem('neonGhost_best', best); }
  const ov = document.getElementById('overlay');
  document.getElementById('final-score').style.display = 'block';
  document.getElementById('final-score').textContent = '점수: ' + score;
  document.getElementById('best-final').style.display = 'block';
  document.getElementById('best-final').textContent = '최고 기록: ' + best;
  document.getElementById('start-btn').textContent = '다시 시작 RETRY';
  ov.style.display = 'flex';
}

// ── INPUT ─────────────────────────────────────────────────────
// Pointer (touch / mouse) for movement
C.addEventListener('pointermove', e => {
  e.preventDefault();
  pointerX = e.clientX;
  pointerY = e.clientY;
});
C.addEventListener('pointerdown', e => {
  e.preventDefault();
  pointerActive = true;
  pointerX = e.clientX;
  pointerY = e.clientY;
  // Tap to spawn ghost (if not dragging far from player)
  const dx = pointerX - px, dy = pointerY - py;
  if (Math.sqrt(dx*dx+dy*dy) < 60) spawnGhost();
});
C.addEventListener('pointerup', e => { pointerActive = false; });
C.addEventListener('pointerleave', e => { pointerActive = false; });

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); spawnGhost(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

document.getElementById('start-btn').addEventListener('click', () => {
  getAC();
  initGame();
  gameRunning = true;
  document.getElementById('overlay').style.display = 'none';
});

requestAnimationFrame(loop);
</script>
</body>
</html>
