<!DOCTYPE html><head>
<title>Neon Gravity Golf</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<link rel="manifest" href="manifest.webmanifest">
<style>body{margin:0;background:#0a0a1a;overflow:hidden}</style>
</head><body>
<script src="https://cdn.jsdelivr.net/npm/littlejsengine/dist/littlejs.min.js"></script>
<script>'use strict';
showSplashScreen=false;
debugWatermark=false;
showEngineVersion=false;
canvasClearColor=hsl(0,0,.04);
touchGamepadEnable=true;
gravity=vec2(0,-.004);
cameraScale=34;

const SAVE_KEY='littlejs-neon-gravity-golf-best-stars';
const launchSound=new Sound([.8,.02,210,.02,0,.1,0,1.4,0,0,0,0,0,0,0,0,0,.7]);
const bounceSound=new Sound([.5,.04,420,.001,0,.05,0,2.1,-5,0,0,0,0,0,0,0,0,.6]);
const sinkSound=new Sound([1,.02,680,.01,0,.35,0,1.2,-1,0,0,0,0,0,0,0,0,.8]);
const failSound=new Sound([.8,.03,150,.02,0,.25,0,1.6,-4,0,0,0,0,0,0,0,0,.7]);
const starSound=new Sound([.8,.03,760,.01,0,.2,0,1.6,6,0,0,0,0,0,0,0,0,.8]);

const levels=[
  {tee:[-11,6], hole:[11,-5], par:2, wells:[[-2,0,2.1,.014],[5,-1,1.6,.01]], blocks:[[0,-6,6,.6]]},
  {tee:[-12,-4], hole:[10,5], par:3, wells:[[-3,1,2.2,.016],[2,-2,2.1,.014],[7,2,1.8,.012]], blocks:[[-2,3,8,.6],[3,-4,6,.6]]},
  {tee:[-11,0], hole:[11,0], par:3, wells:[[-6,0,1.8,.012],[0,0,2.6,.019],[6,0,1.8,.012]], blocks:[[0,4,8,.6],[0,-4,8,.6]]},
  {tee:[-10,6], hole:[10,6], par:4, wells:[[-5,2,1.8,.012],[0,-1,2.7,.02],[5,3,1.8,.012]], blocks:[[0,0,12,.7],[-2,-5,5,.6],[7,-3,4,.6]]},
  {tee:[-11,-6], hole:[11,6], par:4, wells:[[-6,-2,1.8,.012],[-1,1,2.2,.015],[5,4,2.2,.016]], blocks:[[-2,-1,8,.6],[4,2,7,.6]]},
  {tee:[-12,5], hole:[11,-6], par:5, wells:[[-7,2,2,.013],[-2,-2,2.4,.016],[3,2,2.4,.017],[8,-2,2,.013]], blocks:[[-4,4,7,.6],[4,-4,7,.6],[0,0,5,.6]]},
  {tee:[-12,0], hole:[12,0], par:5, wells:[[-8,3,1.9,.013],[-4,-3,2,.014],[0,0,2.8,.022],[4,3,2,.014],[8,-3,1.9,.013]], blocks:[[-6,0,3,.6],[-2,0,3,.6],[2,0,3,.6],[6,0,3,.6]]}
];

let state='start';
let ball, hole=vec2(), walls=[], wells=[], stars=[];
let levelIndex=0, shots=0, bestStars=0, totalStars=0, levelStars=[];
let dragging=false, dragAnchor=vec2(), dragNow=vec2();
let keyCharge=0, keyAim=vec2(1,.3);
let statusMessage='';

class Wall extends EngineObject {
  constructor(pos,size){
    super(pos,size);
    this.mass=0;
    this.setCollision(true,true,true,true);
    this.isWall=true;
    this.color=hsl(.62,.8,.28,.9);
  }
  render(){
    drawRect(this.pos,this.size,this.color);
    drawRect(this.pos,this.size.scale(1.2),hsl(.54,1,.55,.08));
  }
}

class GolfBall extends EngineObject {
  constructor(pos){
    super(pos,vec2(.36));
    this.setCollision(true,true,true,true);
    this.restitution=.82;
    this.damping=.997;
    this.friction=.99;
    this.gravityScale=0;
    this.color=hsl(.54,1,.65);
  }
  collideWithObject(o){
    if(o&&o.isWall){
      bounceSound.play(this.pos);
      burst(this.pos,hsl(.56,1,.58),14,.05);
    }
    return true;
  }
  update(){
    if(state==='flight'){
      applyGravityWells();
      const speed=Math.hypot(this.velocity.x,this.velocity.y);
      if(speed<.035) this._idle=(this._idle||0)+(timeDelta||1/60);
      else this._idle=0;

      if(this._idle>1.05) settleShot('stopped');
      if(this.pos.x<-13.5||this.pos.x>13.5||this.pos.y<-8.5||this.pos.y>8.5)
        settleShot('out');

      const dx=this.pos.x-hole.x, dy=this.pos.y-hole.y;
      if(Math.hypot(dx,dy)<.52 && speed<.45) sinkHole();
    }
    super.update();
  }
  render(){
    drawCircle(this.pos,this.size.x,hsl(.54,1,.72));
    drawCircle(this.pos,this.size.x*1.8,hsl(.54,1,.6,.2));
  }
}

function makeBoundary(){
  walls.push(new Wall(vec2(0,8.9),vec2(28,.6)));
  walls.push(new Wall(vec2(0,-8.9),vec2(28,.6)));
  walls.push(new Wall(vec2(-13.9,0),vec2(.6,18)));
  walls.push(new Wall(vec2(13.9,0),vec2(.6,18)));
}

function burst(pos,color,count,size){
  new ParticleEmitter(
    pos,0,.1,.08,count*35,PI,undefined,
    color,color.mutate(.2,.1),hsl(color.r,color.g?0:0,color.b?0:0,0),hsl(.56,1,.4,0),
    .45,size||.06,.35,.16,.06,.96,1,.25,PI,.15,.45,false,true,true,1,false
  );
}

function applyGravityWells(){
  for(const w of wells){
    const dx=w.pos.x-ball.pos.x, dy=w.pos.y-ball.pos.y;
    const d2=Math.max(.55,dx*dx+dy*dy);
    const f=Math.min(.028,w.str/d2);
    ball.applyForce(vec2(dx*f,dy*f));
  }
}

function sumStars(){ return levelStars.reduce((a,b)=>a+(b||0),0); }

function loadLevel(i){
  engineObjectsDestroy();
  walls=[];
  wells=[];
  const lv=levels[i];
  hole=vec2(lv.hole[0],lv.hole[1]);
  ball=new GolfBall(vec2(lv.tee[0],lv.tee[1]));
  ball.velocity=vec2();
  shots=0;
  statusMessage='';
  dragging=false;
  keyCharge=0;
  keyAim=vec2(1,.3);

  makeBoundary();
  for(const b of lv.blocks)
    walls.push(new Wall(vec2(b[0],b[1]),vec2(b[2],b[3])));
  for(const g of lv.wells)
    wells.push({pos:vec2(g[0],g[1]), radius:g[2], str:g[3]});

  state='play';
  cameraPos=vec2(0,0);
}

function sinkHole(){
  if(state!=='flight') return;
  sinkSound.play(hole);
  burst(hole,hsl(.33,1,.65),26,.08);
  ball.gravityScale=0;
  ball.velocity=vec2();
  state='levelClear';

  const par=levels[levelIndex].par;
  const stars=shots<=par?3:shots===par+1?2:1;
  levelStars[levelIndex]=Math.max(levelStars[levelIndex]||0,stars);
  totalStars=sumStars();
  if(stars===3) starSound.play();

  if(levelIndex===levels.length-1){
    state='campaignClear';
    if(totalStars>bestStars){
      bestStars=totalStars;
      localStorage.setItem(SAVE_KEY,String(bestStars));
    }
  }
}

function settleShot(reason){
  if(state!=='flight') return;
  ball.gravityScale=0;
  ball.velocity=vec2();
  dragging=false;
  keyCharge=0;

  const par=levels[levelIndex].par;
  if(shots>par+3){
    state='levelFail';
    statusMessage=reason==='out'?'Out of bounds':'Too many shots';
    failSound.play();
  }
  else state='play';
}

function launch(vec){
  const len=Math.hypot(vec.x,vec.y);
  if(len<.12) return;
  const p=clamp(len,0,1.8);
  const sx=vec.x/len*p, sy=vec.y/len*p;
  ball.velocity=vec2(sx,sy);
  ball.gravityScale=1;
  ball._idle=0;
  shots++;
  state='flight';
  launchSound.play(ball.pos);
  burst(ball.pos,hsl(.53,1,.64),16,.05);
}

function startCampaign(){
  levelIndex=0;
  totalStars=0;
  levelStars=[];
  loadLevel(0);
}

function nextLevel(){
  if(levelIndex<levels.length-1){
    levelIndex++;
    loadLevel(levelIndex);
  }
}

function retryLevel(){ loadLevel(levelIndex); }

function actionPressed(){
  return keyWasPressed('Space')||keyWasPressed('Enter')||mouseWasPressed(0);
}

function gameInit(){
  bestStars=Number(localStorage.getItem(SAVE_KEY)||0);
  for(let i=0;i<140;i++)
    stars.push(vec2(rand(-16,16),rand(-10,10)));
}

function handleAimInput(){
  if(mouseWasPressed(0)){
    const dx=mousePos.x-ball.pos.x, dy=mousePos.y-ball.pos.y;
    if(Math.hypot(dx,dy)<1){
      dragging=true;
      dragAnchor=vec2(ball.pos.x,ball.pos.y);
      dragNow=vec2(mousePos.x,mousePos.y);
    }
  }
  if(dragging&&mouseIsDown(0))
    dragNow=vec2(mousePos.x,mousePos.y);
  if(dragging&&mouseWasReleased(0)){
    const v=vec2(dragAnchor.x-dragNow.x,dragAnchor.y-dragNow.y);
    dragging=false;
    launch(v.scale(.6));
  }

  const x=(keyIsDown('ArrowRight')||keyIsDown('KeyD')?1:0)-(keyIsDown('ArrowLeft')||keyIsDown('KeyA')?1:0);
  const y=(keyIsDown('ArrowUp')||keyIsDown('KeyW')?1:0)-(keyIsDown('ArrowDown')||keyIsDown('KeyS')?1:0);
  if(x||y){
    const len=Math.hypot(x,y)||1;
    keyAim=vec2(x/len,y/len);
  }
  if(keyIsDown('Space')) keyCharge=Math.min(1,keyCharge+(timeDelta||1/60)*1.6);
  if(keyWasReleased('Space')){
    const pow=lerp(.28,1.15,keyCharge);
    launch(keyAim.scale(pow));
    keyCharge=0;
  }
}

function gameUpdate(){
  if(state==='start'){
    if(actionPressed()) startCampaign();
    return;
  }

  if(keyWasPressed('KeyR')){
    if(state==='campaignClear') state='start';
    else retryLevel();
    return;
  }

  if(state==='play') handleAimInput();

  if(state==='levelFail'){
    if(actionPressed()) retryLevel();
    return;
  }

  if(state==='levelClear'){
    if(actionPressed()) nextLevel();
    return;
  }

  if(state==='campaignClear'){
    if(actionPressed()) startCampaign();
  }
}

function gameUpdatePost(){
  cameraPos=cameraPos.lerp(vec2(0,0),.1);
}

function gameRender(){
  for(const s of stars)
    drawCircle(s,.05,hsl(.6,1,.8,.35));

  for(const w of wells){
    drawCircle(w.pos,w.radius,hsl(.79,1,.5,.12));
    drawCircle(w.pos,w.radius*.55,hsl(.62,1,.55,.2));
    drawCircle(w.pos,.2,hsl(.55,1,.8));
  }

  drawCircle(hole,.5,hsl(.58,.5,.08));
  drawCircle(hole,.32,hsl(.57,.9,.2));
  drawCircle(hole,.6,hsl(.52,1,.6,.13));

  if(state==='play'||dragging){
    drawCircle(ball.pos,.55,hsl(.53,1,.75,.08));
  }

  if(dragging){
    drawLine(ball.pos,dragNow,.09,hsl(.05,1,.65));
    const vx=(dragAnchor.x-dragNow.x), vy=(dragAnchor.y-dragNow.y);
    const p=clamp(Math.hypot(vx,vy)/2.1,0,1);
    drawRect(vec2(-10.5,8),vec2(5.5*p,.22),hsl(.06,1,.6));
  }
}

function gameRenderPost(){
  const W=mainCanvasSize.x, H=mainCanvasSize.y;

  drawTextScreen('NEON GRAVITY GOLF',vec2(W/2,40),44,hsl(.56,1,.72),3,hsl(0,0,0));
  drawTextScreen(`BEST STARS ${bestStars}`,vec2(W-130,28),24,hsl(.33,1,.68),2,hsl(0,0,0));

  if(state!=='start'){
    const par=levels[levelIndex].par;
    drawTextScreen(`LEVEL ${levelIndex+1}/${levels.length}`,vec2(130,26),26,hsl(.56,1,.7),2,hsl(0,0,0));
    drawTextScreen(`SHOTS ${shots} / PAR ${par}`,vec2(145,56),22,hsl(.15,1,.66),2,hsl(0,0,0));
    drawTextScreen(`TOTAL STARS ${sumStars()}`,vec2(145,86),20,hsl(.33,1,.67),2,hsl(0,0,0));
  }

  if(state==='start'){
    drawTextScreen('Drag from the ball to launch',vec2(W/2,H/2-30),32,hsl(.56,1,.74),2,hsl(0,0,0));
    drawTextScreen('Keyboard: Aim with WASD/Arrows, hold Space to charge',vec2(W/2,H/2+20),24,hsl(.58,.6,.75),2,hsl(0,0,0));
    drawTextScreen('Touch + Keyboard supported',vec2(W/2,H/2+58),22,hsl(.33,1,.65),2,hsl(0,0,0));
    drawTextScreen('TAP TO START',vec2(W/2,H/2+116),38,hsl(.05,1,.64),3,hsl(0,0,0));
  }

  if(state==='levelFail'){
    drawTextScreen('LEVEL FAILED',vec2(W/2,H/2-20),58,hsl(.01,1,.62),4,hsl(0,0,0));
    drawTextScreen(statusMessage||'Try a cleaner path',vec2(W/2,H/2+28),28,hsl(.58,.5,.8),2,hsl(0,0,0));
    drawTextScreen('TAP / SPACE TO RETRY',vec2(W/2,H/2+76),30,hsl(.33,1,.66),2,hsl(0,0,0));
  }

  if(state==='levelClear'){
    const par=levels[levelIndex].par;
    const starsWon=shots<=par?3:shots===par+1?2:1;
    drawTextScreen('LEVEL CLEAR',vec2(W/2,H/2-16),56,hsl(.33,1,.67),4,hsl(0,0,0));
    drawTextScreen(`STARS +${starsWon}`,vec2(W/2,H/2+34),36,hsl(.09,1,.67),3,hsl(0,0,0));
    drawTextScreen('TAP / SPACE FOR NEXT',vec2(W/2,H/2+82),30,hsl(.56,1,.76),2,hsl(0,0,0));
  }

  if(state==='campaignClear'){
    drawTextScreen('CAMPAIGN COMPLETE',vec2(W/2,H/2-30),58,hsl(.56,1,.75),4,hsl(0,0,0));
    drawTextScreen(`TOTAL STARS ${sumStars()} / ${levels.length*3}`,vec2(W/2,H/2+20),36,hsl(.33,1,.67),3,hsl(0,0,0));
    drawTextScreen('TAP / SPACE TO PLAY AGAIN',vec2(W/2,H/2+72),30,hsl(.07,1,.65),2,hsl(0,0,0));
  }

  if(state==='play'){
    drawTextScreen('R: retry level',vec2(W-90,H-20),16,hsl(0,0,.7),1,hsl(0,0,0));
    if(keyCharge>.01)
      drawRect(vec2(0,8.5),vec2(3.8*keyCharge,.24),hsl(.06,1,.62));
  }
}

engineInit(gameInit,gameUpdate,gameUpdatePost,gameRender,gameRenderPost);
</script></body></html>
