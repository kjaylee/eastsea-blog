<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neon Guard — Tower Defense</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 6px 4px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #title {
      font-size: clamp(1em, 4vw, 1.4em);
      font-weight: bold;
      color: #0ff;
      text-shadow: 0 0 15px #0ff;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }
    #hud {
      display: flex;
      gap: 12px;
      margin-bottom: 4px;
      font-size: clamp(0.65em, 2.5vw, 0.8em);
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hud-item { display: flex; align-items: center; gap: 3px; }
    .hud-lives { color: #f55; text-shadow: 0 0 8px #f55; }
    .hud-gold  { color: #ff0; text-shadow: 0 0 8px #ff0; }
    .hud-wave  { color: #0ff; text-shadow: 0 0 8px #0ff; }
    .hud-score { color: #f0f; text-shadow: 0 0 8px #f0f; }
    #canvas-wrap {
      position: relative;
      border: 1px solid #1a1a3a;
      box-shadow: 0 0 30px rgba(0,255,255,0.15);
    }
    canvas { display: block; }
    #tower-bar {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tower-btn {
      background: #0a0a2a;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: clamp(0.65em, 2.5vw, 0.75em);
      color: #ccc;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      touch-action: manipulation;
    }
    .tower-btn:active { transform: scale(0.95); }
    .tower-btn.t-basic  { border-color: #7030b0; }
    .tower-btn.t-rapid  { border-color: #006688; }
    .tower-btn.t-heavy  { border-color: #885500; }
    .tower-btn.t-basic.selected  { border-color: #b04dff; box-shadow: 0 0 12px #b04dff; color: #c580ff; }
    .tower-btn.t-rapid.selected  { border-color: #00e5ff; box-shadow: 0 0 12px #00e5ff; color: #80f5ff; }
    .tower-btn.t-heavy.selected  { border-color: #ff8800; box-shadow: 0 0 12px #ff8800; color: #ffaa44; }
    .tower-cost { color: #ff0; font-weight: bold; }
    #msg-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    #msg-overlay h2 {
      font-size: clamp(1.3em, 5vw, 2em);
      color: #0ff;
      text-shadow: 0 0 20px #0ff;
    }
    #msg-overlay p { color: #aaa; font-size: clamp(0.7em, 2.5vw, 0.85em); text-align: center; line-height: 1.7; }
    .overlay-btn {
      background: #0a0a2a;
      border: 2px solid #0ff;
      border-radius: 10px;
      padding: 9px 26px;
      color: #0ff;
      font-size: clamp(0.8em, 3vw, 1em);
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 0 15px #0ff;
      transition: all 0.15s;
      touch-action: manipulation;
    }
    .overlay-btn:hover, .overlay-btn:active { background: #0ff; color: #000; }
    #hint { font-size: clamp(0.6em, 2vw, 0.72em); color: #555; margin-top: 3px; text-align: center; }
    #wave-announce {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(1em, 4vw, 1.5em);
      color: #0ff;
      text-shadow: 0 0 20px #0ff;
      font-weight: bold;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="title">⚡ NEON GUARD</div>
  <div id="hud">
    <div class="hud-item hud-lives">❤️ <span id="lives-val">20</span></div>
    <div class="hud-item hud-gold">💰 <span id="gold-val">150</span></div>
    <div class="hud-item hud-wave">🌊 Wave <span id="wave-val">1</span>/15</div>
    <div class="hud-item hud-score">⭐ <span id="score-val">0</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="wave-announce"></div>
    <div id="msg-overlay">
      <h2>⚡ NEON GUARD</h2>
      <p>
        Tower Defense — 15 Waves<br><br>
        💜 <b style="color:#c580ff">Basic $50</b> — Balanced<br>
        💙 <b style="color:#80f5ff">Rapid $75</b> — Fast, low dmg<br>
        🧡 <b style="color:#ffaa44">Heavy $100</b> — Slow, high dmg<br><br>
        Tap/click a cell to place selected tower<br>
        Keys: <b style="color:#0ff">1</b> Basic &nbsp; <b style="color:#0ff">2</b> Rapid &nbsp; <b style="color:#0ff">3</b> Heavy
      </p>
      <button class="overlay-btn" id="start-btn">▶ START</button>
      <p id="best-disp" style="color:#ff0; font-size:0.85em;"></p>
    </div>
  </div>
  <div id="tower-bar">
    <button class="tower-btn t-basic selected" id="btn-basic" onclick="selectTower('basic')">
      <span>💜 Basic</span><span class="tower-cost">$50</span>
    </button>
    <button class="tower-btn t-rapid" id="btn-rapid" onclick="selectTower('rapid')">
      <span>💙 Rapid</span><span class="tower-cost">$75</span>
    </button>
    <button class="tower-btn t-heavy" id="btn-heavy" onclick="selectTower('heavy')">
      <span>🧡 Heavy</span><span class="tower-cost">$100</span>
    </button>
  </div>
  <div id="hint">Tap empty cell to place · 1/2/3 to switch tower</div>

<script>
// ===================== CONFIG =====================
const COLS = 15, ROWS = 11;
let CELL = 40;

const TOWER_DEF = {
  basic: { color: '#b04dff', glow: '#8020cc', cost: 50, dmg: 25, range: 3.2, rate: 55,  name: 'Basic' },
  rapid: { color: '#00e5ff', glow: '#009dba', cost: 75, dmg: 12, range: 2.8, rate: 22,  name: 'Rapid' },
  heavy: { color: '#ff8800', glow: '#bb5500', cost:100, dmg: 70, range: 3.8, rate: 130, name: 'Heavy' },
};

// Snake-like path through the grid
const PATH = [
  [0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],[7,1],[8,1],
  [8,2],[8,3],[8,4],
  [7,4],[6,4],[5,4],[4,4],[3,4],[2,4],[1,4],
  [1,5],[1,6],
  [2,6],[3,6],[4,6],[5,6],[6,6],[7,6],[8,6],[9,6],[10,6],[11,6],[12,6],[13,6],
  [13,7],[13,8],
  [12,8],[11,8],[10,8],[9,8],[8,8],[7,8],[6,8],[5,8],[4,8],[3,8],[2,8],[1,8],
  [1,9],[1,10],[2,10],[3,10],[4,10],[5,10],[6,10],[7,10],[8,10],[9,10],[10,10],[11,10],[12,10],[13,10],[14,10]
];
const PATH_SET = new Set(PATH.map(([c,r]) => `${c},${r}`));

// ===================== STATE =====================
let canvas, ctx, W, H;
let lives, gold, score, wave;
let towers, enemies, bullets, particles;
let selectedType = 'basic';
let gameState = 'menu';
let enemiesLeft, spawnTimer, spawnInterval;
let waveTimer, waveDelay = 150;
let frameCount = 0;
let highScore = parseInt(localStorage.getItem('ng_hs') || '0');
let audioCtx = null;

// ===================== AUDIO =====================
function ac() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  return audioCtx;
}
function beep(freq, endFreq, dur, vol, type='sine', delay=0) {
  const a = ac(); if (!a) return;
  try {
    const o = a.createOscillator(), g = a.createGain();
    o.type = type;
    o.connect(g); g.connect(a.destination);
    const t = a.currentTime + delay;
    o.frequency.setValueAtTime(freq, t);
    if (endFreq !== freq) o.frequency.exponentialRampToValueAtTime(endFreq, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
function snd(type) {
  if (type==='shoot') { beep(900,250,0.07,0.06,'sine'); }
  else if (type==='hit')  { beep(280,120,0.06,0.05,'square'); }
  else if (type==='place'){ beep(550,900,0.15,0.14,'sine'); }
  else if (type==='die')  { beep(450,90, 0.22,0.09,'sawtooth'); }
  else if (type==='wave') { beep(440,880,0.28,0.18,'sine'); beep(660,1320,0.28,0.12,'sine',0.1); }
  else if (type==='over') { beep(300,60, 1.0, 0.18,'sawtooth'); }
  else if (type==='win')  { [0,0.15,0.3,0.45,0.6].forEach((d,i)=>beep(440*Math.pow(1.25,i),440*Math.pow(1.25,i)*1.05,0.25,0.15,'sine',d)); }
}

// ===================== SETUP =====================
function initCanvas() {
  canvas = document.getElementById('canvas');
  const maxW = Math.min(window.innerWidth - 8, 620);
  CELL = Math.floor(maxW / COLS);
  W = COLS * CELL; H = ROWS * CELL;
  canvas.width = W; canvas.height = H;
  ctx = canvas.getContext('2d');
}

function initGame() {
  lives = 20; gold = 150; score = 0; wave = 1;
  towers = []; enemies = []; bullets = []; particles = [];
  enemiesLeft = 0; spawnTimer = 0; waveTimer = 0;
  frameCount = 0;
  hud();
  beginWave();
}

function beginWave() {
  enemiesLeft = 4 + wave * 4;
  spawnInterval = Math.max(12, 52 - wave * 2);
  spawnTimer = 0;
  snd('wave');
  showAnnounce(`⚡ WAVE ${wave}`);
  hud();
}

function showAnnounce(txt) {
  const el = document.getElementById('wave-announce');
  el.textContent = txt;
  el.style.opacity = 1;
  setTimeout(() => { el.style.opacity = 0; }, 1400);
}

function hud() {
  document.getElementById('lives-val').textContent = lives;
  document.getElementById('gold-val').textContent = gold;
  document.getElementById('wave-val').textContent = wave;
  document.getElementById('score-val').textContent = score;
}

// ===================== ENEMIES =====================
function enemyHP()    { return Math.round(50 + wave * 25 + wave * wave * 1.5); }
function enemySpeed() { return 0.75 + wave * 0.06; }
function enemyReward(){ return 10 + wave * 2; }
function enemyColor() {
  const hues = [0,30,60,120,180,240,280,320];
  return `hsl(${hues[wave % hues.length]}, 90%, 62%)`;
}

function spawnEnemy() {
  const hp = enemyHP();
  enemies.push({
    pi: 0,                      // path index
    x: PATH[0][0]*CELL + CELL/2,
    y: PATH[0][1]*CELL + CELL/2,
    hp, maxHp: hp,
    speed: enemySpeed(),
    reward: enemyReward(),
    color: enemyColor(),
    r: CELL * 0.28,
    flash: 0,
  });
}

function stepEnemies() {
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    if (e.pi >= PATH.length - 1) {
      lives--;
      snd('hit');
      spark(e.x, e.y, '#f55', 6);
      enemies.splice(i, 1);
      hud();
      if (lives <= 0) endGame(false);
      continue;
    }
    const [nc, nr] = PATH[e.pi + 1];
    const tx = nc*CELL + CELL/2, ty = nr*CELL + CELL/2;
    const dx = tx - e.x, dy = ty - e.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < e.speed + 1) { e.pi++; e.x = tx; e.y = ty; }
    else { e.x += dx/d*e.speed; e.y += dy/d*e.speed; }
    if (e.flash > 0) e.flash--;
  }
}

// ===================== TOWERS =====================
function placeTower(col, row) {
  if (gameState !== 'playing') return;
  if (col<0||col>=COLS||row<0||row>=ROWS) return;
  if (PATH_SET.has(`${col},${row}`)) return;
  if (towers.find(t => t.col===col && t.row===row)) return;
  const def = TOWER_DEF[selectedType];
  if (gold < def.cost) { showAnnounce('Not enough gold!'); return; }
  gold -= def.cost;
  towers.push({ col, row, x: col*CELL+CELL/2, y: row*CELL+CELL/2, ...def, cd: 0 });
  snd('place');
  hud();
}

function stepTowers() {
  for (const t of towers) {
    if (t.cd > 0) { t.cd--; continue; }
    let best = null, bestD = Infinity;
    const rangeP = t.range * CELL;
    for (const e of enemies) {
      const dx=e.x-t.x, dy=e.y-t.y, d=Math.sqrt(dx*dx+dy*dy);
      if (d <= rangeP && d < bestD) { best=e; bestD=d; }
    }
    if (best) {
      bullets.push({ x: t.x, y: t.y, tx: best, dmg: t.dmg, color: t.color, spd: 6, r: 4 });
      t.cd = t.rate;
      snd('shoot');
    }
  }
}

// ===================== BULLETS =====================
function stepBullets() {
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if (!enemies.includes(b.tx)) { bullets.splice(i,1); continue; }
    const dx=b.tx.x-b.x, dy=b.tx.y-b.y, d=Math.sqrt(dx*dx+dy*dy);
    if (d < b.spd + 3) {
      b.tx.hp -= b.dmg;
      b.tx.flash = 5;
      spark(b.tx.x, b.tx.y, b.color, 3);
      if (b.tx.hp <= 0) {
        score += b.tx.reward;
        gold  += b.tx.reward;
        snd('die');
        spark(b.tx.x, b.tx.y, b.tx.color, 10);
        enemies.splice(enemies.indexOf(b.tx), 1);
        hud();
      }
      bullets.splice(i,1);
    } else {
      b.x += dx/d*b.spd;
      b.y += dy/d*b.spd;
    }
  }
}

// ===================== PARTICLES =====================
function spark(x, y, color, n) {
  for (let i=0; i<n; i++) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*3;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, color, life: 22, max: 22, r: 2+Math.random()*2 });
  }
}
function stepParticles() {
  for (let i=particles.length-1; i>=0; i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.9; p.vy*=0.9;
    p.life--;
    if (p.life<=0) particles.splice(i,1);
  }
}

// ===================== WAVE MANAGEMENT =====================
function stepWave() {
  if (enemiesLeft > 0) {
    spawnTimer++;
    if (spawnTimer >= spawnInterval) { spawnEnemy(); enemiesLeft--; spawnTimer=0; }
  } else if (enemies.length===0 && bullets.length===0) {
    waveTimer++;
    if (waveTimer >= waveDelay) {
      waveTimer=0; wave++;
      if (wave > 15) { endGame(true); return; }
      gold += 30;
      hud();
      beginWave();
    }
  }
}

// ===================== DRAW =====================
function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = '#11112a';
  ctx.lineWidth = 0.5;
  for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++) ctx.strokeRect(c*CELL,r*CELL,CELL,CELL);

  // Path tiles
  for (let i=0;i<PATH.length;i++) {
    const [c,r]=PATH[i];
    const t = i/PATH.length;
    ctx.fillStyle = `hsl(${220+t*40},40%,${8+t*4}%)`;
    ctx.fillRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2);
  }

  // Path direction arrows
  ctx.strokeStyle = '#1e1e40';
  ctx.lineWidth = 1.5;
  for (let i=0;i<PATH.length-1;i+=2) {
    const [c1,r1]=PATH[i],[c2,r2]=PATH[i+1];
    const x1=c1*CELL+CELL/2, y1=r1*CELL+CELL/2;
    const x2=c2*CELL+CELL/2, y2=r2*CELL+CELL/2;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  // Start / End markers
  const [sc,sr]=PATH[0], [ec,er]=PATH[PATH.length-1];
  ctx.font = `bold ${CELL*0.55}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('▶', sc*CELL+CELL/2, sr*CELL+CELL/2);
  ctx.fillStyle='#ff4444';
  ctx.fillText('★', ec*CELL+CELL/2, er*CELL+CELL/2);

  // Tower range preview (selected cell hover not tracked, just skip)

  // Towers
  for (const t of towers) {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.shadowBlur = 14; ctx.shadowColor = t.color;
    // Base
    ctx.fillStyle = '#0c0c20';
    ctx.beginPath(); ctx.arc(0,0,CELL*0.42,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = t.color; ctx.lineWidth = 2.5;
    ctx.stroke();
    // Core
    ctx.fillStyle = t.color;
    ctx.beginPath(); ctx.arc(0,0,CELL*0.14,0,Math.PI*2); ctx.fill();
    // Barrel (rotating)
    const rot = (frameCount * (t.rate < 30 ? 0.08 : 0.03)) % (Math.PI*2);
    ctx.rotate(rot);
    ctx.fillStyle = t.color;
    ctx.fillRect(-CELL*0.05, -CELL*0.4, CELL*0.1, CELL*0.28);
    ctx.restore();
  }

  // Enemies
  for (const e of enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.shadowBlur = 10; ctx.shadowColor = e.color;
    const col = e.flash>0 ? '#fff' : e.color;
    ctx.fillStyle = col;
    // Triangle shape
    const s = e.r;
    ctx.beginPath();
    ctx.moveTo(0,-s); ctx.lineTo(s*0.9,s*0.7); ctx.lineTo(-s*0.9,s*0.7);
    ctx.closePath(); ctx.fill();
    // HP bar
    const bw = CELL*0.72, bh = 4;
    ctx.fillStyle = '#222'; ctx.fillRect(-bw/2,-s-7,bw,bh);
    const hpRatio = Math.max(0,e.hp/e.maxHp);
    const hpColor = hpRatio>0.6?'#0f0':hpRatio>0.3?'#ff0':'#f44';
    ctx.fillStyle = hpColor;
    ctx.fillRect(-bw/2,-s-7,bw*hpRatio,bh);
    ctx.restore();
  }

  // Bullets
  for (const b of bullets) {
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = b.color;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life/p.max;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Between-wave countdown
  if (gameState==='playing' && enemiesLeft===0 && enemies.length===0 && waveTimer>0 && wave<=15) {
    const secs = Math.ceil((waveDelay-waveTimer)/60);
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.fillRect(W/2-120,H/2-22,240,38);
    ctx.fillStyle='#0ff';
    ctx.font=`bold ${CELL*0.55}px Courier New`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=10; ctx.shadowColor='#0ff';
    ctx.fillText(`Next wave in ${secs}s…`,W/2,H/2);
    ctx.shadowBlur=0;
  }
}

// ===================== GAME LOOP =====================
function loop() {
  frameCount++;
  if (gameState==='playing') {
    stepEnemies(); stepTowers(); stepBullets();
    stepParticles(); stepWave();
  }
  draw();
  requestAnimationFrame(loop);
}

// ===================== END GAME =====================
function endGame(won) {
  gameState = won?'victory':'gameover';
  if (score > highScore) { highScore=score; localStorage.setItem('ng_hs',highScore); }
  snd(won?'win':'over');
  const overlay = document.getElementById('msg-overlay');
  overlay.innerHTML = `
    <h2 style="color:${won?'#0f0':'#f44'};text-shadow:0 0 20px ${won?'#0f0':'#f44'}">${won?'🏆 VICTORY!':'💀 GAME OVER'}</h2>
    <p>Wave: ${wave} / 15<br>Score: ${score}<br><span style="color:#ff0">Best: ${highScore}</span></p>
    <button class="overlay-btn" onclick="restart()">▶ PLAY AGAIN</button>
  `;
  overlay.style.display='flex';
}

function restart() {
  document.getElementById('msg-overlay').style.display='none';
  gameState='playing';
  initGame();
}

// ===================== TOWER SELECT =====================
function selectTower(t) {
  selectedType=t;
  ['basic','rapid','heavy'].forEach(k => {
    const el=document.getElementById('btn-'+k);
    el.classList.toggle('selected',k===t);
  });
}

// ===================== INPUT =====================
function canvasInput(e) {
  if (gameState!=='playing') return;
  const rect=canvas.getBoundingClientRect();
  let cx,cy;
  if (e.changedTouches) { cx=e.changedTouches[0].clientX-rect.left; cy=e.changedTouches[0].clientY-rect.top; }
  else { cx=e.clientX-rect.left; cy=e.clientY-rect.top; }
  const sx=W/rect.width, sy=H/rect.height;
  placeTower(Math.floor(cx*sx/CELL), Math.floor(cy*sy/CELL));
}

document.addEventListener('keydown', e => {
  if (e.key==='1') selectTower('basic');
  if (e.key==='2') selectTower('rapid');
  if (e.key==='3') selectTower('heavy');
});

// ===================== INIT =====================
window.addEventListener('load', () => {
  initCanvas();
  canvas.addEventListener('click', canvasInput);
  canvas.addEventListener('touchend', e => { e.preventDefault(); canvasInput(e); }, { passive: false });

  if (highScore>0) document.getElementById('best-disp').textContent = `🏅 Best: ${highScore}`;
  document.getElementById('start-btn').onclick = () => {
    document.getElementById('msg-overlay').style.display='none';
    gameState='playing';
    initGame();
  };
  selectTower('basic');
  loop();
});
</script>
</body>
</html>
