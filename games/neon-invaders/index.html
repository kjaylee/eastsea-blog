<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Invaders</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 6px;
    gap: 6px;
  }

  h1 {
    font-size: clamp(14px, 3.5vw, 24px);
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 8px #f0f, 0 0 18px #f0f, 0 0 35px #f0f;
  }

  #hud {
    display: flex;
    gap: 14px;
    font-size: clamp(11px, 2.5vw, 14px);
    color: #cce;
    letter-spacing: 1px;
  }

  .hud-item span { color: #fff; text-shadow: 0 0 6px #f0f; font-weight: bold; }

  #game-wrap {
    position: relative;
    flex: 1;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  #gc {
    display: block;
    border: 2px solid #f0f;
    box-shadow: 0 0 10px #f0f, 0 0 20px #f0f4, inset 0 0 6px #f0f2;
    background: #05051a;
    touch-action: none;
  }

  /* lives display */
  #lives-bar {
    display: flex; gap: 6px; align-items: center;
  }
  .life-icon {
    width: 16px; height: 16px;
    display: inline-block;
    background: #0ff;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    box-shadow: 0 0 6px #0ff;
  }

  /* power-up bar */
  #power-bar {
    display: flex; gap: 8px; font-size: 11px; letter-spacing: 1px;
  }
  .pw { padding: 2px 8px; border-radius: 4px; border: 1px solid #0ff4; opacity: 0.4; transition: opacity 0.2s; }
  .pw.active { opacity: 1; border-color: #0ff; text-shadow: 0 0 6px #0ff; box-shadow: 0 0 6px #0ff3; }

  /* touch controls */
  #touch-controls {
    display: flex; gap: 10px; width: 100%; max-width: 360px; justify-content: center;
  }
  .btn {
    flex: 1; height: 56px;
    background: #0d0d2a;
    border: 1px solid #f0f5;
    border-radius: 8px;
    color: #f0f;
    font-size: 22px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:active { background: #2a0a2a; }

  /* screens */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a1aee;
    z-index: 10; gap: 16px; padding: 20px; text-align: center;
  }
  .screen.hidden { display: none; }
  .screen h2 {
    font-size: clamp(22px, 6vw, 40px);
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 10px #f0f, 0 0 24px #f0f;
  }
  .screen p { color: #aaf; font-size: clamp(12px, 2.8vw, 15px); line-height: 1.7; max-width: 320px; }
  .screen-score { font-size: clamp(18px, 5vw, 28px); color: #ff0; text-shadow: 0 0 8px #ff0; }
  .screen-best  { font-size: clamp(13px, 3vw, 17px); color: #0f0; text-shadow: 0 0 6px #0f0; }
  .play-btn {
    padding: 12px 36px; font-size: clamp(13px, 3.5vw, 17px); letter-spacing: 3px;
    background: transparent; border: 2px solid #f0f; color: #f0f;
    border-radius: 8px; cursor: pointer; text-transform: uppercase;
    text-shadow: 0 0 8px #f0f; box-shadow: 0 0 12px #f0f4;
    transition: all 0.2s;
  }
  .play-btn:hover { background: #f0f2; }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen">
  <h2>NEON INVADERS</h2>
  <p>Destroy alien invaders before they reach you!<br>
     ← → Move &nbsp; Space: Fire<br>
     Defeat boss every 5 waves for power-ups!</p>
  <div id="start-best" class="screen-best"></div>
  <button class="play-btn" id="start-btn">PLAY</button>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameover-screen" class="screen hidden">
  <h2>GAME OVER</h2>
  <div id="go-score" class="screen-score"></div>
  <div id="go-best"  class="screen-best"></div>
  <div id="go-wave"  style="color:#aaf; font-size:14px;"></div>
  <button class="play-btn" id="restart-btn">RESTART</button>
</div>

<!-- WAVE CLEAR SCREEN -->
<div id="wave-screen" class="screen hidden">
  <h2 id="wave-title">WAVE CLEAR!</h2>
  <div id="wave-msg" style="color:#ff0; font-size:20px; text-shadow:0 0 8px #ff0;"></div>
  <p id="wave-hint"></p>
</div>

<!-- MAIN LAYOUT -->
<div id="app">
  <h1>NEON INVADERS</h1>
  <div id="hud">
    <div class="hud-item">SCORE <span id="score-val">0</span></div>
    <div class="hud-item">BEST <span id="best-val">0</span></div>
    <div class="hud-item">WAVE <span id="wave-val">1</span></div>
    <div class="hud-item" id="lives-bar">LIVES </div>
  </div>
  <div id="power-bar">
    <div class="pw" id="pw-rapid">⚡ RAPID</div>
    <div class="pw" id="pw-shield">🛡 SHIELD</div>
    <div class="pw" id="pw-spread">💥 SPREAD</div>
  </div>
  <div id="game-wrap">
    <canvas id="gc"></canvas>
  </div>
  <div id="touch-controls">
    <button class="btn" id="btn-left">◀</button>
    <button class="btn" id="btn-fire">🔥</button>
    <button class="btn" id="btn-right">▶</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  NEON INVADERS — Main Script
// ══════════════════════════════════════════════

// ── Audio ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playTone(freq, type, dur, vol = 0.3, freqEnd) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (freqEnd !== undefined)
      osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + dur);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function sfxShoot()    { playTone(880, 'square', 0.1, 0.18, 440); }
function sfxEnemyHit() { playTone(300, 'sawtooth', 0.12, 0.2, 150); }
function sfxEnemyDie() { playTone(200, 'square', 0.18, 0.3, 60); }
function sfxPlayerHit(){ playTone(120, 'sawtooth', 0.25, 0.45, 50); }
function sfxBoss()     { playTone(440, 'square', 0.06, 0.2, 220); }
function sfxPowerup()  { [523,659,784,1047].forEach((f,i) => setTimeout(()=>playTone(f,'sine',0.15,0.3),i*60)); }
function sfxWaveClear(){ [261,329,392,523].forEach((f,i) => setTimeout(()=>playTone(f,'triangle',0.2,0.3),i*80)); }
function sfxGameover() { [440,330,220,110].forEach((f,i) => setTimeout(()=>playTone(f,'sawtooth',0.3,0.4),i*150)); }

// ── Constants ──
const LS_KEY = 'neon-invaders-hi';

// Enemy type definitions: { rows, color, glow, hp, pts, symbol }
const ENEMY_TYPES = [
  { color: '#ff2244', glow: '#f22', hp: 1, pts: 10, sym: '👾' }, // row 0: weak
  { color: '#ff8800', glow: '#f80', hp: 2, pts: 20, sym: '🛸' }, // row 1: medium
  { color: '#cc00ff', glow: '#c0f', hp: 3, pts: 40, sym: '🔮' }, // row 2: strong
];

const BOSS_DEF = { color: '#00ffff', glow: '#0ff', hpBase: 20, pts: 500, sym: '💀' };

// Canvas & state
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

let W, H, CW, CH;     // canvas dims, cell width/height for grid
let best, score, wave, lives;
let player, bullets, enemyBullets, enemies, powerups, boss;
let running, gameOver, waveDone;
let lastTime, frameId;

// Active power-ups with timer
let pwRapid = 0, pwShield = 0, pwSpread = 0;

// Input state
const keys = {};
let shooting = false, shootCooldown = 0;
let moveDir = 0; // touch left/right

// Enemy march
let enemyDir = 1; // 1=right, -1=left
let enemyMarchTimer = 0, enemyMarchInterval = 1200;
let enemyShootTimer = 0, enemyShootInterval = 1800;
let enemyDescend = false, enemyDescendAmount = 0;

// ── Resize ──
function resize() {
  const pw = document.getElementById('game-wrap');
  const maxW = Math.min(pw.clientWidth, 520);
  const maxH = window.innerHeight - 230;
  W = Math.floor(Math.min(maxW, maxH * 0.65));
  H = Math.floor(W * 1.5);
  canvas.width  = W;
  canvas.height = H;
  CW = W / 11; // cell width
  CH = H / 22; // cell height
}

// ── Init ──
function loadBest() { best = parseInt(localStorage.getItem(LS_KEY) || '0', 10); }
function saveBest()  { if (score > best) { best = score; localStorage.setItem(LS_KEY, best); } }

function initPlayer() {
  player = {
    x: W / 2,
    y: H - 40,
    w: 40, h: 20,
    speed: W * 0.005,
  };
}

function spawnEnemies() {
  enemies = [];
  const cols = 10, rows = 3;
  const spacingX = W / (cols + 1);
  const spacingY = H * 0.065;
  const startY = H * 0.14;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const type = ENEMY_TYPES[r];
      enemies.push({
        x: spacingX * (c + 1),
        y: startY + r * spacingY,
        w: W * 0.058, h: W * 0.042,
        type: r,
        hp: type.hp + Math.floor((wave - 1) * 0.5),
        maxHp: type.hp + Math.floor((wave - 1) * 0.5),
        pts: type.pts + (wave - 1) * 5,
        alive: true,
        flashTimer: 0,
      });
    }
  }
  enemyDir = 1;
  enemyMarchTimer = 0;
  enemyMarchInterval = Math.max(300, 1200 - wave * 80);
  enemyShootTimer = 0;
  enemyShootInterval = Math.max(600, 1800 - wave * 120);
}

function spawnBoss() {
  boss = {
    x: W / 2,
    y: H * 0.1,
    w: W * 0.14, h: W * 0.1,
    hp: BOSS_DEF.hpBase + wave * 4,
    maxHp: BOSS_DEF.hpBase + wave * 4,
    pts: BOSS_DEF.pts + wave * 100,
    dir: 1,
    speed: W * 0.003 * (1 + wave * 0.15),
    shootTimer: 0,
    shootInterval: Math.max(600, 1800 - wave * 100),
    alive: true,
    flashTimer: 0,
    phase: 0,
  };
}

function startWave() {
  bullets = []; enemyBullets = []; powerups = [];
  boss = null; enemyDescend = false;
  waveDone = false;
  if (wave % 5 === 0) {
    spawnBoss();
  } else {
    spawnEnemies();
  }
  updateHUD();
}

function startGame() {
  loadBest();
  resize();
  score = 0; wave = 1; lives = 3;
  pwRapid = 0; pwShield = 0; pwSpread = 0;
  bullets = []; enemyBullets = []; powerups = [];
  boss = null; waveDone = false;
  running = true; gameOver = false;
  initPlayer();
  startWave();
  updateHUD();
  lastTime = performance.now();
  cancelAnimationFrame(frameId);
  frameId = requestAnimationFrame(loop);
}

// ── HUD ──
function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('best-val').textContent  = Math.max(score, best);
  document.getElementById('wave-val').textContent  = wave;

  // Lives
  const lb = document.getElementById('lives-bar');
  lb.innerHTML = 'LIVES ';
  for (let i = 0; i < lives; i++) {
    const s = document.createElement('span');
    s.className = 'life-icon';
    lb.appendChild(s);
  }

  // Power-up indicators
  document.getElementById('pw-rapid').classList.toggle('active', pwRapid > 0);
  document.getElementById('pw-shield').classList.toggle('active', pwShield > 0);
  document.getElementById('pw-spread').classList.toggle('active', pwSpread > 0);
}

// ── Shoot ──
function firePlayer() {
  sfxShoot();
  if (pwSpread > 0) {
    // Spread: 3 bullets
    [-0.3, 0, 0.3].forEach(angle => {
      bullets.push({ x: player.x, y: player.y - player.h / 2,
        vx: Math.sin(angle) * 5, vy: -(H * 0.012), w: 3, h: 10 });
    });
  } else {
    bullets.push({ x: player.x, y: player.y - player.h / 2,
      vx: 0, vy: -(H * 0.012), w: 3, h: 12 });
  }
}

function fireEnemy(e) {
  sfxBoss();
  enemyBullets.push({ x: e.x, y: e.y + e.h / 2,
    vx: 0, vy: H * 0.006, w: 3, h: 8 });
}

function fireBoss() {
  // Boss fires 3-way
  const bx = boss.x, by = boss.y + boss.h / 2;
  [-0.4, 0, 0.4].forEach(angle => {
    enemyBullets.push({ x: bx, y: by,
      vx: Math.sin(angle) * 4, vy: H * 0.007, w: 4, h: 10 });
  });
}

// ── Collision ──
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 && ax + aw/2 > bx - bw/2
      && ay - ah/2 < by + bh/2 && ay + ah/2 > by - bh/2;
}

// ── Power-up drop ──
const PW_TYPES = ['rapid','shield','spread'];
function dropPowerup(x, y) {
  const type = PW_TYPES[Math.floor(Math.random() * PW_TYPES.length)];
  powerups.push({ x, y, type, w: 22, h: 14, vy: H * 0.0035, timer: 5000 });
}

// ── Draw Helpers ──
function drawGlowRect(x, y, w, h, color, glow, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = glow || color;
  ctx.shadowBlur  = 16;
  ctx.strokeStyle = color;
  ctx.lineWidth   = 2;
  ctx.strokeRect(x - w/2, y - h/2, w, h);
  ctx.fillStyle = color + '22';
  ctx.fillRect(x - w/2, y - h/2, w, h);
  ctx.restore();
}

function drawShip(x, y, w, h, color) {
  // Simple pixel-art ship shape
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur  = 14;
  ctx.fillStyle   = color;
  // fuselage
  ctx.fillRect(x - w * 0.1, y - h * 0.5, w * 0.2, h * 0.9);
  // wings
  ctx.fillRect(x - w * 0.5, y, w, h * 0.25);
  // cockpit
  ctx.fillStyle = '#fff8';
  ctx.fillRect(x - w * 0.06, y - h * 0.35, w * 0.12, h * 0.25);
  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive) return;
  const type = ENEMY_TYPES[e.type];
  const flash = e.flashTimer > 0;
  const color = flash ? '#fff' : type.color;
  const glow  = flash ? '#fff' : type.glow;
  ctx.save();
  ctx.shadowColor = glow;
  ctx.shadowBlur  = flash ? 20 : 12;
  ctx.fillStyle   = color + (flash ? '' : '44');
  ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
  // eyes
  ctx.fillStyle = flash ? '#0a0a1a' : '#fff';
  ctx.fillRect(e.x - e.w*0.28, e.y - e.h*0.15, e.w*0.18, e.h*0.22);
  ctx.fillRect(e.x + e.w*0.10, e.y - e.h*0.15, e.w*0.18, e.h*0.22);
  // HP bar (multi-hp enemies)
  if (e.maxHp > 1) {
    const bw = e.w * 0.8, bh = 3;
    const bx = e.x - bw/2, by = e.y + e.h/2 + 2;
    ctx.fillStyle = '#333';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = type.color;
    ctx.shadowBlur = 4;
    ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);
  }
  ctx.restore();
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  const flash = boss.flashTimer > 0;
  const color = flash ? '#fff' : BOSS_DEF.color;
  const glow  = flash ? '#fff' : BOSS_DEF.glow;
  ctx.save();
  ctx.shadowColor = glow;
  ctx.shadowBlur  = flash ? 30 : 22;
  // Body
  ctx.fillStyle = color + '33';
  ctx.fillRect(boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h);
  // Eyes
  ctx.fillStyle = flash ? '#0a0a1a' : '#f0f';
  ctx.shadowColor = '#f0f';
  ctx.shadowBlur = 10;
  ctx.fillRect(boss.x - boss.w*0.28, boss.y - boss.h*0.1, boss.w*0.15, boss.h*0.2);
  ctx.fillRect(boss.x + boss.w*0.13, boss.y - boss.h*0.1, boss.w*0.15, boss.h*0.2);
  // HP bar
  const bw = boss.w * 1.2, bh = 6;
  const bx = boss.x - bw/2, by = boss.y - boss.h/2 - 10;
  ctx.fillStyle = '#222';
  ctx.shadowBlur = 0;
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 6;
  ctx.fillRect(bx, by, bw * (boss.hp / boss.maxHp), bh);
  ctx.restore();
}

function drawBullet(b, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  ctx.restore();
}

function drawPowerup(p) {
  const colors = { rapid: '#ffff00', shield: '#00ffff', spread: '#ff00ff' };
  const labels  = { rapid: '⚡',     shield: '🛡',     spread: '💥' };
  const c = colors[p.type] || '#fff';
  ctx.save();
  ctx.shadowColor = c; ctx.shadowBlur = 14;
  ctx.strokeStyle = c; ctx.lineWidth = 1.5;
  ctx.strokeRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
  ctx.fillStyle = c + '22';
  ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = `${p.h * 0.85}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(labels[p.type], p.x, p.y + 1);
  ctx.restore();
}

function drawStars() {
  // simple static star field
  ctx.fillStyle = '#ffffff18';
  if (!drawStars._stars) {
    drawStars._stars = Array.from({length: 60}, () =>
      [Math.random() * 640, Math.random() * 960, Math.random() * 1.5 + 0.5]);
  }
  for (const [sx, sy, r] of drawStars._stars) {
    ctx.beginPath();
    ctx.arc(sx % W, sy % H, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Main Loop ──
function loop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  if (running && !waveDone) {
    update(dt);
  }
  render();

  if (running) frameId = requestAnimationFrame(loop);
}

function update(dt) {
  // Power-up timers
  if (pwRapid  > 0) { pwRapid  -= dt; if (pwRapid  <= 0) pwRapid  = 0; }
  if (pwShield > 0) { pwShield -= dt; if (pwShield <= 0) pwShield = 0; }
  if (pwSpread > 0) { pwSpread -= dt; if (pwSpread <= 0) pwSpread = 0; }
  updateHUD();

  // Player movement
  let dx = 0;
  if (keys['ArrowLeft']  || keys['a']) dx = -1;
  if (keys['ArrowRight'] || keys['d']) dx =  1;
  if (moveDir !== 0) dx = moveDir;
  player.x += dx * player.speed * dt;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));

  // Player shoot
  const shootRate = pwRapid > 0 ? 150 : 350;
  if (shootCooldown > 0) shootCooldown -= dt;
  if ((keys[' '] || shooting) && shootCooldown <= 0) {
    firePlayer();
    shootCooldown = shootRate;
  }

  // Update player bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.y > -20;
  });

  // Update enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.y < H + 20;
  });

  // Update power-ups
  powerups = powerups.filter(p => {
    p.y += p.vy * dt * 0.06;
    p.timer -= dt;
    // Collect
    if (rectsOverlap(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
      applyPowerup(p.type);
      sfxPowerup();
      return false;
    }
    return p.y < H + 20 && p.timer > 0;
  });

  // Boss wave
  if (boss && boss.alive) {
    updateBoss(dt);
  } else if (boss && !boss.alive) {
    // Boss cleared
    if (!waveDone) {
      waveDone = true;
      sfxWaveClear();
      showWaveClear(true);
    }
  }

  // Enemy wave
  if (!boss) {
    updateEnemies(dt);
    // Check all enemies dead
    if (enemies.length > 0 && enemies.every(e => !e.alive)) {
      if (!waveDone) {
        waveDone = true;
        sfxWaveClear();
        showWaveClear(false);
      }
    }
  }

  // Bullet vs enemies
  bullets.forEach((b, bi) => {
    // vs enemies
    if (!boss) {
      enemies.forEach(e => {
        if (!e.alive) return;
        if (rectsOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
          e.hp--;
          e.flashTimer = 120;
          sfxEnemyHit();
          if (e.hp <= 0) {
            e.alive = false;
            score += e.pts;
            sfxEnemyDie();
            // 15% drop chance
            if (Math.random() < 0.15) dropPowerup(e.x, e.y);
          }
          bullets[bi] = null;
        }
      });
    }
    // vs boss
    if (boss && boss.alive && b) {
      if (rectsOverlap(b.x, b.y, b.w, b.h, boss.x, boss.y, boss.w, boss.h)) {
        boss.hp--;
        boss.flashTimer = 80;
        sfxEnemyHit();
        if (boss.hp <= 0) {
          boss.alive = false;
          score += boss.pts;
          sfxEnemyDie();
          dropPowerup(boss.x, boss.y);
          dropPowerup(boss.x + 30, boss.y);
        }
        bullets[bi] = null;
      }
    }
  });
  bullets = bullets.filter(Boolean);

  // Enemy bullets vs player
  enemyBullets.forEach((b, bi) => {
    if (rectsOverlap(b.x, b.y, b.w, b.h, player.x, player.y, player.w * 0.7, player.h)) {
      if (pwShield > 0) {
        // Shield absorbs one hit
        pwShield = 0;
        updateHUD();
      } else {
        lives--;
        sfxPlayerHit();
        updateHUD();
        if (lives <= 0) {
          triggerGameOver();
          return;
        }
      }
      enemyBullets[bi] = null;
    }
  });
  enemyBullets = enemyBullets.filter(Boolean);

  // Enemy reaches bottom
  if (!boss) {
    for (const e of enemies) {
      if (e.alive && e.y + e.h/2 >= player.y - player.h/2) {
        triggerGameOver();
        return;
      }
    }
  }
}

function updateBoss(dt) {
  // Move side to side
  boss.x += boss.dir * boss.speed * dt;
  if (boss.x > W - boss.w/2 - 10) { boss.x = W - boss.w/2 - 10; boss.dir = -1; }
  if (boss.x < boss.w/2 + 10)     { boss.x = boss.w/2 + 10;     boss.dir =  1; }
  // Flash
  if (boss.flashTimer > 0) boss.flashTimer -= dt;
  // Shoot
  boss.shootTimer += dt;
  if (boss.shootTimer >= boss.shootInterval) {
    boss.shootTimer = 0;
    fireBoss();
  }
  // Phase 2: faster when below half HP
  if (boss.hp < boss.maxHp / 2) boss.speed = W * 0.005 * (1 + wave * 0.2);
}

function updateEnemies(dt) {
  // Flash timers
  enemies.forEach(e => { if (e.flashTimer > 0) e.flashTimer -= dt; });

  // Marching
  enemyMarchTimer += dt;
  if (enemyMarchTimer >= enemyMarchInterval) {
    enemyMarchTimer = 0;
    const alive = enemies.filter(e => e.alive);
    if (alive.length === 0) return;

    // Check bounds
    let minX = Math.min(...alive.map(e => e.x - e.w/2));
    let maxX = Math.max(...alive.map(e => e.x + e.w/2));
    const step = W * 0.04;

    if ((enemyDir > 0 && maxX + step >= W - 4) || (enemyDir < 0 && minX - step <= 4)) {
      // Reverse and descend
      enemyDir = -enemyDir;
      alive.forEach(e => e.y += H * 0.04);
    } else {
      alive.forEach(e => e.x += enemyDir * step);
    }

    // Speed up as fewer enemies remain
    enemyMarchInterval = Math.max(120, (1200 - wave * 80) * (alive.length / 30));
  }

  // Enemy shooting
  enemyShootTimer += dt;
  if (enemyShootTimer >= enemyShootInterval) {
    enemyShootTimer = 0;
    const alive = enemies.filter(e => e.alive);
    if (alive.length > 0) {
      // Pick bottom-most enemy in a random column
      const shooter = alive[Math.floor(Math.random() * alive.length)];
      fireEnemy(shooter);
    }
  }
}

function applyPowerup(type) {
  const dur = 8000;
  if (type === 'rapid')  pwRapid  = dur;
  if (type === 'shield') pwShield = dur;
  if (type === 'spread') pwSpread = dur;
}

// ── Wave Clear ──
function showWaveClear(isBoss) {
  const ws = document.getElementById('wave-screen');
  document.getElementById('wave-title').textContent = isBoss ? `⚡ BOSS DEFEATED! ⚡` : `WAVE ${wave} CLEAR!`;
  document.getElementById('wave-msg').textContent   = `+${isBoss ? boss.pts : enemies.reduce((s,e)=>s+(e.alive?0:e.pts),0)} PTS`;
  document.getElementById('wave-hint').textContent  = isBoss
    ? 'Power-ups collected! Next wave incoming...'
    : 'Enemies vanquished! Prepare for next wave...';
  ws.classList.remove('hidden');
  setTimeout(() => {
    ws.classList.add('hidden');
    wave++;
    startWave();
  }, 2200);
}

function triggerGameOver() {
  running = false; gameOver = true;
  sfxGameover();
  saveBest();
  setTimeout(() => {
    document.getElementById('go-score').textContent = `Score: ${score}`;
    document.getElementById('go-best').textContent  = `Best: ${best}`;
    document.getElementById('go-wave').textContent  = `Reached Wave ${wave}`;
    document.getElementById('gameover-screen').classList.remove('hidden');
  }, 600);
  cancelAnimationFrame(frameId);
}

// ── Render ──
function render() {
  ctx.clearRect(0, 0, W, H);

  // Stars
  drawStars();

  // Enemies
  if (!boss) enemies.forEach(drawEnemy);

  // Boss
  if (boss) drawBoss();

  // Player
  const shipColor = pwShield > 0 ? '#00ffff' : '#00ff44';
  drawShip(player.x, player.y, player.w, player.h, shipColor);
  // Shield ring
  if (pwShield > 0) {
    ctx.save();
    ctx.strokeStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 16;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.w * 0.75, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // Bullets
  bullets.forEach(b => drawBullet(b, pwSpread > 0 ? '#ff00ff' : '#00ff88'));
  enemyBullets.forEach(b => drawBullet(b, '#ff4466'));

  // Power-ups
  powerups.forEach(drawPowerup);
}

// ── Input Handlers ──
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
function attachBtn(id, down, up) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); down(); }, {passive: false});
  el.addEventListener('touchend',   e => { e.preventDefault(); if(up) up(); }, {passive: false});
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup', up || (() => {}));
  el.addEventListener('mouseleave', up || (() => {}));
}
attachBtn('btn-left',  () => moveDir = -1, () => { if (moveDir === -1) moveDir = 0; });
attachBtn('btn-right', () => moveDir =  1, () => { if (moveDir ===  1) moveDir = 0; });
attachBtn('btn-fire',  () => shooting = true, () => shooting = false);

// Canvas touch swipe + tap
let tcStartX = 0, tcStartT = 0;
canvas.addEventListener('touchstart', e => {
  tcStartX = e.touches[0].clientX;
  tcStartT = Date.now();
}, {passive: true});
canvas.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - tcStartX;
  if (Math.abs(dx) > 8) { moveDir = dx > 0 ? 1 : -1; }
}, {passive: true});
canvas.addEventListener('touchend', e => {
  moveDir = 0;
  if (Date.now() - tcStartT < 200) shooting = true;
  setTimeout(() => shooting = false, 120);
}, {passive: true});

// Buttons
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('hidden');
  startGame();
});
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('gameover-screen').classList.add('hidden');
  startGame();
});

// Resize
window.addEventListener('resize', () => {
  resize();
  drawStars._stars = null; // reset star positions
});

// ── Boot ──
resize();
loadBest();
document.getElementById('start-best').textContent = best > 0 ? `Best: ${best}` : '';
document.getElementById('best-val').textContent = best;
</script>
