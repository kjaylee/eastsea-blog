    <canvas id="c"></canvas>
</div>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 700;
canvas.width = W; canvas.height = H;

function resize() {
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width  = (W * s) + 'px';
    canvas.style.height = (H * s) + 'px';
    document.getElementById('gameContainer').style.width  = (W * s) + 'px';
    document.getElementById('gameContainer').style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── Audio ──────────────────────────────────────────────────────────────────
let AC = null;
function getAC() { if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(freq, type, dur, vol, detune) {
    try {
        const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type=type||'sine';
        o.frequency.setValueAtTime(freq, ac.currentTime);
        if (detune) o.detune.setValueAtTime(detune, ac.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq*(detune?1.5:0.4), ac.currentTime+dur);
        g.gain.setValueAtTime(vol||0.25, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
        o.start(); o.stop(ac.currentTime+dur);
    } catch(e){}
}
function sfxBounce(combo) {
    const f = 300 + combo * 80;
    beep(Math.min(f, 1200), 'sine', 0.12, 0.3);
}
function sfxCombo(combo) {
    const notes=[220,277,330,415,523,659,830,1047];
    const n=notes[Math.min(combo-1, notes.length-1)];
    beep(n,'triangle',0.18,0.35);
    if (combo>=3) beep(n*1.5,'sine',0.1,0.2);
}
function sfxDrop() { beep(80,'sawtooth',0.5,0.4); }
function sfxStart() { [330,440,550,660].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.15,0.25),i*80)); }
function sfxOver() { [440,330,220,110].forEach((f,i)=>setTimeout(()=>beep(f,'sawtooth',0.2,0.3),i*120)); }

// ─── Ball Pool ───────────────────────────────────────────────────────────────
const BALL_COLORS = [
    { main:'#0ff', glow:'#0cf', dark:'#023' },
    { main:'#f0f', glow:'#c0c', dark:'#202' },
    { main:'#ff0', glow:'#cc0', dark:'#220' },
    { main:'#0f0', glow:'#0a0', dark:'#020' },
    { main:'#f80', glow:'#c60', dark:'#210' },
    { main:'#80f', glow:'#60c', dark:'#102' },
];
const BALL_R = 22;
const TAP_R  = 38; // tap detection radius (larger than ball for touch)
const DRAIN_Y = H + BALL_R + 10;
const SPAWN_Y = -BALL_R - 5;

let balls = [];
let particles = [];
let floatTexts = [];
let score = 0;
let hi = parseInt(localStorage.getItem('nj-hi') || '0');
let lives = 3;
let combo = 0;
let lastTapTime = 0;
let phase = 'title'; // title | playing | over
let frameN = 0;
let spawnTimer = 0;
let spawnInterval = 120; // frames between spawns
let diffLevel = 0; // increases score-based

// ─── Ball factory ────────────────────────────────────────────────────────────
let _ballId = 0;
function spawnBall() {
    const margin = BALL_R + 10;
    const x = margin + Math.random() * (W - 2*margin);
    const col = BALL_COLORS[Math.floor(Math.random()*BALL_COLORS.length)];
    const baseSpeed = 1.2 + diffLevel * 0.15;
    balls.push({
        id: _ballId++,
        x, y: SPAWN_Y,
        vx: (Math.random()-0.5)*2.5,
        vy: baseSpeed + Math.random()*0.8,
        r: BALL_R,
        col,
        pulse: Math.random()*Math.PI*2, // phase offset for glow pulse
        trail: [],
        hitFlash: 0,
        alive: true,
    });
}

// ─── Particles ───────────────────────────────────────────────────────────────
function burst(x, y, col, n) {
    for (let i=0; i<n; i++) {
        const ang = Math.random()*Math.PI*2;
        const spd = 2 + Math.random()*5;
        particles.push({
            x, y,
            vx: Math.cos(ang)*spd,
            vy: Math.sin(ang)*spd - 2,
            life: 1,
            decay: 0.04+Math.random()*0.04,
            r: 2+Math.random()*3,
            col: col.main,
        });
    }
}

// ─── Float text ──────────────────────────────────────────────────────────────
function showText(x, y, text, col) {
    floatTexts.push({ x, y, vy:-1.5, text, col, life:1, decay:0.025 });
}

// ─── Input ───────────────────────────────────────────────────────────────────
function handleTap(cx, cy) {
    getAC().resume();
    if (phase === 'title' || phase === 'over') {
        startGame();
        return;
    }
    if (phase !== 'playing') return;

    let hit = false;
    // Sort by closest to tap first
    const sorted = [...balls].sort((a,b)=>{
        return Math.hypot(a.x-cx,a.y-cy) - Math.hypot(b.x-cx,b.y-cy);
    });
    for (const ball of sorted) {
        if (!ball.alive) continue;
        const d = Math.hypot(ball.x-cx, ball.y-cy);
        if (d < TAP_R) {
            // Hit!
            const now = performance.now();
            if (now - lastTapTime < 600) combo++;
            else combo = 1;
            lastTapTime = now;

            const baseScore = 10;
            const gained = baseScore * combo;
            score += gained;
            if (score > hi) { hi = score; localStorage.setItem('nj-hi', hi); }

            // Launch ball upward
            const upForce = 9 + Math.min(combo, 6) * 0.5;
            ball.vy = -upForce;
            ball.vx += (Math.random()-0.5)*2;
            ball.hitFlash = 10;

            // FX
            burst(ball.x, ball.y, ball.col, 8 + combo*2);
            showText(ball.x, ball.y - ball.r - 10,
                combo >= 3 ? `${combo}x COMBO! +${gained}` : `+${gained}`,
                combo >= 3 ? '#ff0' : ball.col.main);

            sfxBounce(combo);
            if (combo >= 2) sfxCombo(combo);

            // Difficulty check
            updateDiff();
            hit = true;
            break;
        }
    }
    if (!hit) {
        // Missed tap — reset combo
        combo = 0;
    }
}

function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    return { x: (e.clientX - rect.left)*scaleX, y: (e.clientY - rect.top)*scaleY };
}

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        const p = getCanvasPos(t);
        handleTap(p.x, p.y);
    }
}, {passive:false});
canvas.addEventListener('mousedown', e => {
    const p = getCanvasPos(e);
    handleTap(p.x, p.y);
});
document.addEventListener('keydown', e => {
    if (e.code==='Space' || e.code==='Enter') {
        getAC().resume();
        if (phase==='title'||phase==='over') startGame();
        e.preventDefault();
    }
});

// ─── Game logic ──────────────────────────────────────────────────────────────
function updateDiff() {
    diffLevel = Math.floor(score / 300);
    spawnInterval = Math.max(40, 120 - diffLevel * 8);
}

function startGame() {
    score=0; lives=3; combo=0; diffLevel=0;
    spawnInterval=120; spawnTimer=0;
    balls=[]; particles=[]; floatTexts=[];
    _ballId=0; lastTapTime=0;
    phase='playing';
    // Spawn first ball immediately
    spawnBall();
    sfxStart();
}

function update() {
    frameN++;
    if (phase !== 'playing') return;

    // Spawn logic
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
        spawnTimer=0;
        if (balls.filter(b=>b.alive).length < 6) {
            spawnBall();
        }
    }

    // Update particles
    particles = particles.filter(p => {
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.12;
        p.life-=p.decay;
        return p.life>0;
    });

    // Update float texts
    floatTexts = floatTexts.filter(t => {
        t.y+=t.vy; t.life-=t.decay;
        return t.life>0;
    });

    // Update balls
    for (const b of balls) {
        if (!b.alive) continue;

        // Trail
        b.trail.push({x:b.x, y:b.y});
        if (b.trail.length > 8) b.trail.shift();

        b.pulse += 0.08;
        if (b.hitFlash>0) b.hitFlash--;

        // Physics
        b.vy += 0.18; // light gravity
        b.x += b.vx;
        b.y += b.vy;

        // Wall bounce
        if (b.x - b.r < 0)   { b.x=b.r;   b.vx=Math.abs(b.vx)*0.85; }
        if (b.x + b.r > W)   { b.x=W-b.r; b.vx=-Math.abs(b.vx)*0.85; }
        if (b.y - b.r < 0)   { b.y=b.r;   b.vy=Math.abs(b.vy)*0.7; }

        // Fell off bottom
        if (b.y > DRAIN_Y) {
            b.alive = false;
            lives--;
            combo = 0;
            sfxDrop();
            // Shake effect
            shakeTimer = 12;
            if (lives <= 0) {
                lives=0;
                phase='over';
                sfxOver();
                updateHi();
            }
        }
    }
    balls = balls.filter(b => b.alive);
}

function updateHi() {
    if (score > hi) { hi=score; localStorage.setItem('nj-hi', hi); }
}

// ─── Shake effect ────────────────────────────────────────────────────────────
let shakeTimer = 0;
function getShake() {
    if (shakeTimer <= 0) return {dx:0,dy:0};
    shakeTimer--;
    return { dx:(Math.random()-0.5)*8, dy:(Math.random()-0.5)*8 };
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
    const {dx,dy} = getShake();
    ctx.save();
    if (dx||dy) ctx.translate(dx,dy);

    // Background
    ctx.fillStyle='#0a0a1a';
    ctx.fillRect(-dx-2,-dy-2,W+4,H+4);

    // Grid background (subtle)
    ctx.save();
    ctx.strokeStyle='rgba(0,255,255,0.04)';
    ctx.lineWidth=1;
    for (let x=0;x<W;x+=40) { ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
    for (let y=0;y<H;y+=40) { ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
    ctx.restore();

    // Danger zone at bottom
    const dangerGrad = ctx.createLinearGradient(0, H-80, 0, H);
    dangerGrad.addColorStop(0,'rgba(255,0,0,0)');
    dangerGrad.addColorStop(1,'rgba(255,0,0,0.08)');
    ctx.fillStyle=dangerGrad;
    ctx.fillRect(0,H-80,W,80);

    // Drain line
    ctx.save();
    ctx.strokeStyle='rgba(255,50,50,0.35)';
    ctx.lineWidth=2;
    ctx.setLineDash([8,6]);
    ctx.beginPath(); ctx.moveTo(0,H-5); ctx.lineTo(W,H-5); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();

    // Particles
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha=p.life;
        ctx.shadowBlur=8; ctx.shadowColor=p.col;
        ctx.fillStyle=p.col;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }

    // Balls
    for (const b of balls) {
        if (!b.alive) continue;

        // Trail
        for (let t=0; t<b.trail.length; t++) {
            const tr=b.trail[t];
            const a = (t/b.trail.length)*0.35;
            ctx.save();
            ctx.globalAlpha=a;
            ctx.beginPath(); ctx.arc(tr.x,tr.y,b.r*(t/b.trail.length)*0.8,0,Math.PI*2);
            ctx.fillStyle=b.col.main; ctx.fill();
            ctx.restore();
        }

        const pulse = 0.7+0.3*Math.sin(b.pulse);
        const fl = b.hitFlash > 0;

        // Outer glow
        ctx.save();
        ctx.shadowBlur = fl?45:22*pulse;
        ctx.shadowColor = fl?'#fff':b.col.glow;
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.5,0,Math.PI*2);
        ctx.fillStyle=`rgba(${fl?'255,255,255':hexToRgb(b.col.main)},${fl?0.15:0.06*pulse})`;
        ctx.fill();
        ctx.restore();

        // Main ball
        ctx.save();
        ctx.shadowBlur=fl?40:18; ctx.shadowColor=fl?'#fff':b.col.glow;
        const grad = ctx.createRadialGradient(b.x-b.r*0.3, b.y-b.r*0.3, 1, b.x, b.y, b.r);
        grad.addColorStop(0, fl?'#fff':'rgba(255,255,255,0.6)');
        grad.addColorStop(0.4, b.col.main);
        grad.addColorStop(1, b.col.dark);
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle=grad; ctx.fill();
        ctx.strokeStyle=fl?'#fff':b.col.main; ctx.lineWidth=2; ctx.stroke();
        ctx.restore();

        // Tap hint ring (pulsing)
        if (b.y > 0 && b.y < H) {
            ctx.save();
            ctx.globalAlpha=0.2*pulse;
            ctx.strokeStyle=b.col.main;
            ctx.lineWidth=1.5;
            ctx.setLineDash([4,4]);
            ctx.beginPath(); ctx.arc(b.x,b.y,TAP_R,0,Math.PI*2); ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }
    }

    // Float texts
    for (const t of floatTexts) {
        ctx.save();
        ctx.globalAlpha=t.life;
        ctx.shadowBlur=12; ctx.shadowColor=t.col;
        ctx.fillStyle=t.col;
        ctx.font='bold 16px Courier New';
        ctx.textAlign='center';
        ctx.fillText(t.text, t.x, t.y);
        ctx.restore();
    }

    // HUD
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,60);
    // Score
    ctx.shadowBlur=14; ctx.shadowColor='#0ff';
    ctx.fillStyle='#0ff'; ctx.font='bold 22px Courier New';
    ctx.textAlign='left'; ctx.fillText(score.toLocaleString(),12,30);
    ctx.shadowBlur=5; ctx.fillStyle='#077'; ctx.font='11px Courier New';
    ctx.fillText('BEST '+hi.toLocaleString(),12,50);
    // Title
    ctx.shadowBlur=16; ctx.shadowColor='#f0f';
    ctx.fillStyle='#f0f'; ctx.font='bold 15px Courier New';
    ctx.textAlign='center'; ctx.fillText('NEON JUGGLER',W/2,30);
    ctx.shadowBlur=5; ctx.fillStyle='#a08';
    ctx.font='11px Courier New'; ctx.fillText('LV.'+(diffLevel+1),W/2,50);
    // Lives
    ctx.shadowBlur=10; ctx.shadowColor='#f55';
    ctx.fillStyle='#f55'; ctx.font='bold 20px Courier New';
    ctx.textAlign='right'; ctx.fillText('♥'.repeat(lives)+'♡'.repeat(Math.max(0,3-lives)),W-10,34);
    // Combo
    if (combo >= 2) {
        const comboAlpha=0.6+0.4*Math.sin(frameN*0.25);
        ctx.globalAlpha=comboAlpha;
        ctx.shadowBlur=20; ctx.shadowColor='#ff0';
        ctx.fillStyle='#ff0'; ctx.font=`bold ${16+combo}px Courier New`;
        ctx.textAlign='center'; ctx.fillText(`${combo}x COMBO`, W/2, 58);
        ctx.globalAlpha=1;
    }
    ctx.restore();

    // Title screen
    if (phase === 'title') {
        ctx.save();
        ctx.fillStyle='rgba(0,0,16,0.88)'; ctx.fillRect(0,0,W,H);
        const cx=W/2, cy=H/2;
        // Animated title balls
        for (let i=0;i<6;i++) {
            const col=BALL_COLORS[i];
            const ang = frameN*0.02+i*Math.PI/3;
            const bx2=cx+Math.cos(ang)*80, by2=cy-80+Math.sin(ang*0.7)*30;
            ctx.shadowBlur=20; ctx.shadowColor=col.glow;
            ctx.fillStyle=col.main;
            ctx.beginPath(); ctx.arc(bx2,by2,14,0,Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur=35; ctx.shadowColor='#f0f';
        ctx.fillStyle='#f0f'; ctx.font='bold 58px Courier New';
        ctx.textAlign='center'; ctx.fillText('NEON',cx,cy+20);
        ctx.shadowBlur=25; ctx.shadowColor='#0ff';
        ctx.fillStyle='#0ff'; ctx.font='bold 38px Courier New';
        ctx.fillText('JUGGLER',cx,cy+65);
        const p=0.55+0.45*Math.sin(frameN*0.07);
        ctx.globalAlpha=p;
        ctx.shadowBlur=10; ctx.shadowColor='#0f0';
        ctx.fillStyle='#0f0'; ctx.font='14px Courier New';
        ctx.fillText('TAP BALLS TO JUGGLE — DON\'T DROP THEM!',cx,cy+120);
        ctx.fillText('TAP / PRESS SPACE TO START',cx,cy+145);
        ctx.globalAlpha=1;
        ctx.fillStyle='#555'; ctx.font='11px Courier New';
        ctx.fillText(`BEST: ${hi.toLocaleString()}`,cx,cy+180);
        ctx.restore();
    }

    // Game over
    if (phase === 'over') {
        ctx.save();
        ctx.fillStyle='rgba(0,0,16,0.87)'; ctx.fillRect(0,0,W,H);
        const cx=W/2, cy=H/2-20;
        ctx.shadowBlur=35; ctx.shadowColor='#f0f';
        ctx.fillStyle='#f0f'; ctx.font='bold 52px Courier New';
        ctx.textAlign='center'; ctx.fillText('GAME',cx,cy-40);
        ctx.fillText('OVER',cx,cy+10);
        ctx.shadowBlur=16; ctx.shadowColor='#0ff';
        ctx.fillStyle='#0ff'; ctx.font='22px Courier New';
        ctx.fillText('SCORE: '+score.toLocaleString(),cx,cy+55);
        ctx.fillStyle='#ff0'; ctx.shadowColor='#ff0';
        ctx.fillText('BEST:  '+hi.toLocaleString(),cx,cy+85);
        const p=0.55+0.45*Math.sin(frameN*0.07);
        ctx.globalAlpha=p;
        ctx.shadowBlur=10; ctx.shadowColor='#0f0';
        ctx.fillStyle='#0f0'; ctx.font='14px Courier New';
        ctx.fillText('TAP / PRESS SPACE TO PLAY AGAIN',cx,cy+130);
        ctx.restore();
    }

    ctx.restore(); // shake restore
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function hexToRgb(hex) {
    const r=parseInt(hex.slice(1,3),16);
    const g=parseInt(hex.slice(3,5),16);
    const b=parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

// ─── Loop ────────────────────────────────────────────────────────────────────
function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}
loop();
})();
</script>
