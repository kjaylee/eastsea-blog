<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Neon Kite Telegraph</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a1a;
      --panel: #121b36;
      --line: #2d417d;
      --text: #ecf1ff;
      --muted: #99acd8;
      --good: #67f6ff;
      --warn: #ffd56b;
      --bad: #ff6ca8;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 50% 0%, #1c2450 0%, var(--bg) 58%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 12px;
    }
    .app { width: min(520px, 100%); display: grid; gap: 10px; }
    .hud {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      font-size: 12px;
    }
    .card {
      background: linear-gradient(180deg, #17244c, #101934);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 7px;
      text-align: center;
    }
    canvas {
      width: 100%;
      aspect-ratio: 9 / 15;
      border-radius: 16px;
      border: 1px solid #35509a;
      background: linear-gradient(180deg, #0f1640, #080b1b);
      box-shadow: 0 0 24px #66f6ff30;
      touch-action: none;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    button:active,
    button.on {
      transform: translateY(1px) scale(0.99);
      border-color: var(--good);
      box-shadow: 0 0 0 1px #67f6ff66 inset;
    }
    .dash { min-width: 92px; }
    .restart { width: 100%; }
    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-align: center;
    }
    @media (max-width: 430px) {
      .hud { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hud">
      <div class="card">SCORE<br><strong id="score">0</strong></div>
      <div class="card">BEST<br><strong id="best">0</strong></div>
      <div class="card">COMBO<br><strong id="combo">0</strong></div>
      <div class="card">HP<br><strong id="hp">5</strong></div>
      <div class="card">WIND<br><strong id="wind">0</strong></div>
      <div class="card">TIME<br><strong id="time">75</strong></div>
    </section>

    <canvas id="game" width="360" height="600" aria-label="Neon Kite Telegraph canvas"></canvas>

    <section class="controls" aria-label="controls">
      <button id="left" aria-label="left">◀ LEFT</button>
      <button id="right" aria-label="right">RIGHT ▶</button>
      <button id="dash" class="dash" aria-label="dash">DASH (Space)</button>
    </section>
    <button id="restart" class="restart">RESTART</button>
    <p class="hint">←/→ 이동 · Space 대시. 터치 버튼도 동일하게 동작합니다. 비콘(청록)은 먹고, 드론(분홍)은 피하세요.</p>
  </main>

  <script>
    (() => {
      const KEY = 'best-neon-kite-telegraph';
      const DURATION = 75;
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const comboEl = document.getElementById('combo');
      const hpEl = document.getElementById('hp');
      const windEl = document.getElementById('wind');
      const timeEl = document.getElementById('time');
      const leftBtn = document.getElementById('left');
      const rightBtn = document.getElementById('right');
      const dashBtn = document.getElementById('dash');
      const restartBtn = document.getElementById('restart');

      let audio;
      function beep(freq = 440, dur = 0.06, type = 'sine', vol = 0.025) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        if (!audio) audio = new AC();
        if (audio.state === 'suspended') audio.resume();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        osc.connect(gain).connect(audio.destination);
        osc.start();
        osc.stop(audio.currentTime + dur);
      }

      const input = { left: false, right: false };
      let best = Number(localStorage.getItem(KEY) || 0);
      let last = performance.now();
      let spawnBeacon = 0;
      let spawnDrone = 0;
      let windTimer = 0;
      let state;

      function reset() {
        state = {
          score: 0,
          combo: 0,
          hp: 5,
          time: DURATION,
          active: true,
          wind: 0,
          beacons: [],
          drones: [],
          player: { x: canvas.width / 2, y: 520, r: 16, dashCd: 0, dashT: 0, invuln: 0 }
        };
        spawnBeacon = 0.2;
        spawnDrone = 0.8;
        windTimer = 2;
        updateHud();
      }

      function updateHud() {
        scoreEl.textContent = Math.floor(state.score);
        bestEl.textContent = best;
        comboEl.textContent = state.combo;
        hpEl.textContent = state.hp;
        windEl.textContent = state.wind.toFixed(1);
        timeEl.textContent = Math.max(0, state.time).toFixed(1);
      }

      function endGame() {
        state.active = false;
        if (state.score > best) {
          best = Math.floor(state.score);
          localStorage.setItem(KEY, String(best));
        }
        beep(140, 0.16, 'square', 0.04);
        updateHud();
      }

      function spawn(type) {
        const obj = {
          x: 28 + Math.random() * (canvas.width - 56),
          y: -24,
          r: type === 'beacon' ? 11 : 13,
          vy: type === 'beacon' ? 150 + Math.random() * 70 : 170 + Math.random() * 80,
          drift: (Math.random() - 0.5) * 24
        };
        if (type === 'beacon') state.beacons.push(obj);
        else state.drones.push(obj);
      }

      function hit(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y) < a.r + b.r;
      }

      function triggerDash() {
        if (!state.active) return;
        const p = state.player;
        if (p.dashCd > 0) return;
        p.dashCd = 1.2;
        p.dashT = 0.2;
        p.invuln = 0.22;
        beep(820, 0.05, 'triangle', 0.03);
      }

      function controlButton(btn, key, on) {
        btn.classList.toggle('on', on);
        input[key] = on;
      }

      function bindHold(btn, key) {
        btn.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          controlButton(btn, key, true);
          beep(420, 0.03, 'sine', 0.015);
        });
        const off = () => controlButton(btn, key, false);
        btn.addEventListener('pointerup', off);
        btn.addEventListener('pointercancel', off);
        btn.addEventListener('pointerleave', off);
      }

      bindHold(leftBtn, 'left');
      bindHold(rightBtn, 'right');
      dashBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        dashBtn.classList.add('on');
        triggerDash();
      });
      ['pointerup', 'pointercancel', 'pointerleave'].forEach((ev) => {
        dashBtn.addEventListener(ev, () => dashBtn.classList.remove('on'));
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') input.left = true;
        if (e.key === 'ArrowRight') input.right = true;
        if (e.key === ' ') {
          e.preventDefault();
          triggerDash();
        }
      });
      document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft') input.left = false;
        if (e.key === 'ArrowRight') input.right = false;
      });

      restartBtn.addEventListener('click', () => {
        beep(520, 0.05, 'triangle', 0.02);
        reset();
      });

      function update(dt) {
        if (!state.active) return;

        state.time -= dt;
        if (state.time <= 0) {
          state.time = 0;
          endGame();
          return;
        }

        const p = state.player;
        p.dashCd = Math.max(0, p.dashCd - dt);
        p.dashT = Math.max(0, p.dashT - dt);
        p.invuln = Math.max(0, p.invuln - dt);

        windTimer -= dt;
        if (windTimer <= 0) {
          state.wind = (Math.random() * 2 - 1) * (1.4 + Math.min(1.6, state.score / 250));
          windTimer = 2 + Math.random() * 1.8;
          beep(240 + Math.abs(state.wind) * 160, 0.03, 'sine', 0.015);
        }

        const speed = (p.dashT > 0 ? 390 : 230);
        if (input.left) p.x -= speed * dt;
        if (input.right) p.x += speed * dt;
        p.x += state.wind * 38 * dt;
        p.x = Math.max(20, Math.min(canvas.width - 20, p.x));

        spawnBeacon -= dt;
        spawnDrone -= dt;
        if (spawnBeacon <= 0) {
          spawn('beacon');
          spawnBeacon = Math.max(0.25, 0.75 - state.score / 500);
        }
        if (spawnDrone <= 0) {
          spawn('drone');
          spawnDrone = Math.max(0.3, 1 - state.score / 900);
        }

        for (const b of state.beacons) {
          b.y += b.vy * dt;
          b.x += (state.wind * 18 + b.drift) * dt;
        }
        for (const d of state.drones) {
          d.y += d.vy * dt;
          d.x += (state.wind * 22 + d.drift) * dt;
        }

        for (let i = state.beacons.length - 1; i >= 0; i--) {
          const b = state.beacons[i];
          if (hit(p, b)) {
            state.beacons.splice(i, 1);
            state.combo += 1;
            state.score += 14 + Math.min(44, state.combo * 2.2);
            state.hp = Math.min(7, state.hp + (state.combo % 7 === 0 ? 1 : 0));
            beep(560 + Math.min(520, state.combo * 10), 0.05, 'triangle', 0.028);
          } else if (b.y > canvas.height + 30 || b.x < -30 || b.x > canvas.width + 30) {
            state.beacons.splice(i, 1);
            state.combo = 0;
          }
        }

        for (let i = state.drones.length - 1; i >= 0; i--) {
          const d = state.drones[i];
          if (hit(p, d)) {
            state.drones.splice(i, 1);
            if (p.invuln <= 0) {
              state.hp -= 1;
              state.combo = 0;
              p.invuln = 0.4;
              beep(180, 0.1, 'sawtooth', 0.035);
              if (state.hp <= 0) {
                state.hp = 0;
                endGame();
              }
            }
          } else if (d.y > canvas.height + 30 || d.x < -40 || d.x > canvas.width + 40) {
            state.drones.splice(i, 1);
          }
        }

        updateHud();
      }

      function draw() {
        const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
        g.addColorStop(0, '#111b48');
        g.addColorStop(1, '#080b1b');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#7edbff35';
        for (let y = 40; y < canvas.height; y += 40) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y + state.wind * 5);
          ctx.stroke();
        }

        for (const b of state.beacons) {
          ctx.beginPath();
          ctx.fillStyle = '#62f6ff';
          ctx.shadowColor = '#62f6ff';
          ctx.shadowBlur = 12;
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
        }

        for (const d of state.drones) {
          ctx.save();
          ctx.translate(d.x, d.y);
          ctx.rotate(d.y * 0.02);
          ctx.fillStyle = '#ff6ca8';
          ctx.shadowColor = '#ff6ca8';
          ctx.shadowBlur = 10;
          ctx.fillRect(-d.r, -4, d.r * 2, 8);
          ctx.fillRect(-4, -d.r, 8, d.r * 2);
          ctx.restore();
        }

        const p = state.player;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.fillStyle = p.invuln > 0 ? '#ffd56b' : '#8ff8ff';
        ctx.strokeStyle = '#d7f4ff';
        ctx.shadowColor = '#8ff8ff';
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.lineTo(14, 0);
        ctx.lineTo(0, 18);
        ctx.lineTo(-14, 0);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#d6e1ff';
        ctx.fillRect(-1, -22, 2, 44);
        ctx.restore();

        if (!state.active) {
          ctx.fillStyle = '#040612cc';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#ecf1ff';
          ctx.textAlign = 'center';
          ctx.font = '700 26px system-ui';
          ctx.fillText('SHIFT ENDED', canvas.width / 2, 260);
          ctx.font = '600 16px system-ui';
          ctx.fillText(`SCORE ${Math.floor(state.score)} · BEST ${best}`, canvas.width / 2, 295);
          ctx.fillStyle = '#99acd8';
          ctx.fillText('Restart로 재시작', canvas.width / 2, 325);
        }
      }

      function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      reset();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
