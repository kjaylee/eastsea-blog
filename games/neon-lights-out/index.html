<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Lights Out — Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;user-select:none}
h1{font-size:clamp(1.4rem,4vw,2rem);text-align:center;letter-spacing:.1em;text-shadow:0 0 20px #0ff,0 0 40px #0ff;color:#0ff;margin-bottom:.3em}
.tagline{color:#66f;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;text-align:center;margin-bottom:1.2em}
#screen-start,#screen-game,#screen-over{display:none;width:100%;max-width:480px;padding:1rem;flex-direction:column;align-items:center}
#screen-start{display:flex}
.btn{background:transparent;border:2px solid #0ff;color:#0ff;padding:.6em 1.4em;border-radius:8px;font-size:1rem;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;box-shadow:0 0 12px #0ff4;margin:.3em}
.btn:hover,.btn:active{background:#0ff2;box-shadow:0 0 24px #0ff}
.btn-mag{border-color:#f0f;color:#f0f;box-shadow:0 0 12px #f0f4}.btn-mag:hover{background:#f0f2;box-shadow:0 0 24px #f0f}
.btn-gold{border-color:#ff0;color:#ff0;box-shadow:0 0 12px #ff04}.btn-gold:hover{background:#ff02;box-shadow:0 0 24px #ff0}
.diff-row{display:flex;gap:.5em;margin-bottom:1em;flex-wrap:wrap;justify-content:center}
.diff-btn{padding:.4em 1em;font-size:.85rem;border-radius:6px}
.diff-btn.active{background:#0ff3;box-shadow:0 0 16px #0ff}
#hiscore-display{font-size:.75rem;color:#66f;letter-spacing:.1em;text-align:center;margin-bottom:.6em;line-height:1.6}
.hud{display:flex;gap:1.5em;margin-bottom:.8em;font-size:.9rem;color:#0ff;letter-spacing:.05em}
.hud span b{color:#fff}
#grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:.8em}
.cell{width:min(14vw,72px);height:min(14vw,72px);border-radius:10px;cursor:pointer;transition:background .12s,box-shadow .12s;border:2px solid #111}
.cell.on{background:#0ff3;box-shadow:0 0 16px #0ff,inset 0 0 10px #0ff8;border-color:#0ff}
.cell.off{background:#0a0a1a;box-shadow:none;border-color:#1a1a3a}
.cell.hint-glow{animation:hintPulse 1s infinite alternate}
@keyframes hintPulse{from{box-shadow:0 0 10px #ff0;border-color:#ff0}to{box-shadow:0 0 30px #ff0,0 0 60px #ff04;border-color:#ff0}}
#msg{min-height:1.4em;text-align:center;color:#f0f;font-size:.85rem;letter-spacing:.1em;margin-bottom:.4em}
.action-row{display:flex;gap:.5em;flex-wrap:wrap;justify-content:center}
#screen-over .over-title{font-size:1.8rem;color:#0ff;text-shadow:0 0 20px #0ff;margin-bottom:.5em}
#screen-over .over-stats{color:#aaf;font-size:.95rem;line-height:2;text-align:center;margin-bottom:1em}
.moves-record{color:#ff0;font-size:.8rem;letter-spacing:.1em}
</style>
</head>
<body>

<!-- START -->
<div id="screen-start">
  <h1>NEON LIGHTS OUT</h1>
  <p class="tagline">Turn all lights off</p>
  <div id="hiscore-display"></div>
  <div class="diff-row">
    <button class="btn diff-btn active" data-diff="easy">Easy</button>
    <button class="btn diff-btn" data-diff="medium">Medium</button>
    <button class="btn diff-btn" data-diff="hard">Hard</button>
  </div>
  <button class="btn" id="btn-start" style="font-size:1.1rem;padding:.7em 2em">▶ START</button>
  <p style="color:#336;font-size:.7rem;margin-top:1em;text-align:center">Tap a cell to toggle it + 4 neighbours</p>
</div>

<!-- GAME -->
<div id="screen-game">
  <h1 style="font-size:1.2rem;margin-bottom:.3em">NEON LIGHTS OUT</h1>
  <div class="hud">
    <span>Moves <b id="hud-moves">0</b></span>
    <span>Time <b id="hud-time">0:00</b></span>
    <span id="hud-diff-label" style="color:#f0f"></span>
  </div>
  <div id="grid"></div>
  <div id="msg"></div>
  <div class="action-row">
    <button class="btn btn-gold" id="btn-hint">💡 Hint</button>
    <button class="btn btn-mag" id="btn-reset">↺ Reset</button>
    <button class="btn" style="font-size:.8rem;border-color:#336;color:#336" id="btn-menu">Menu</button>
  </div>
</div>

<!-- GAME OVER (WIN) -->
<div id="screen-over">
  <div class="over-title">✨ SOLVED!</div>
  <div class="over-stats" id="over-stats"></div>
  <button class="btn" id="btn-again">▶ Play Again</button>
  <button class="btn btn-mag" id="btn-harder">Next Level →</button>
  <button class="btn" style="font-size:.8rem;border-color:#336;color:#336;margin-top:.5em" id="btn-over-menu">Menu</button>
</div>

<script>
const DIFFS=['easy','medium','hard'];
const DIFF_MOVES={easy:8,medium:14,hard:20};
let diff='easy', board=[], solution=[], moveCount=0, seconds=0, timer=null, hintIdx=-1;
const LS_KEY=d=>`neon-lights-out-hi-${d}`;

// Audio
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,t,type='sine',vol=0.15){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+t);
  o.start();o.stop(AC.currentTime+t);
}
function sndToggle(){beep(440,.08,'square',0.08)}
function sndHint(){beep(660,.15,'sine',0.12);setTimeout(()=>beep(880,.1,'sine',0.08),120)}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.2,'sine',0.18),i*120))}

// Screens
function show(id){['screen-start','screen-game','screen-over'].forEach(s=>document.getElementById(s).style.display=s===id?'flex':'none')}

// GF2 Gaussian elimination solver → returns null-space basis (hint: one pivot move)
function solve(b){
  const N=25;
  // Build 25×25 matrix where column j = effect of pressing cell j
  const mat=[];
  for(let r=0;r<N;r++){
    const row=new Array(N+1).fill(0);
    row[N]=b[r];
    mat.push(row);
  }
  // effect: pressing j toggles j and its neighbors
  // Actually we need: A * x = b (mod 2), A[i][j]=1 if pressing j toggles i
  // So A[i][j] = 1 if i==j or i is neighbor of j
  const A=[];
  for(let i=0;i<N;i++){
    const row=new Array(N).fill(0);
    row[i]=1;
    const r=Math.floor(i/5),c=i%5;
    if(r>0)row[i-5]=1;if(r<4)row[i+5]=1;if(c>0)row[i-1]=1;if(c<4)row[i+1]=1;
    A.push(row);
  }
  // Augmented [A|b]
  const aug=A.map((row,i)=>[...row,b[i]]);
  // Gaussian elimination mod 2
  const pivots=[];
  let piv=0;
  for(let col=0;col<N&&piv<N;col++){
    let found=-1;
    for(let r2=piv;r2<N;r2++){if(aug[r2][col]===1){found=r2;break;}}
    if(found===-1)continue;
    [aug[piv],aug[found]]=[aug[found],aug[piv]];
    for(let r2=0;r2<N;r2++){
      if(r2!==piv&&aug[r2][col]===1){
        for(let c2=0;c2<=N;c2++)aug[r2][c2]^=aug[piv][c2];
      }
    }
    pivots.push([piv,col]);
    piv++;
  }
  // Back-substitute: x[col] = aug[pivRow][N]
  const x=new Array(N).fill(0);
  for(const [pr,pc] of pivots)x[pc]=aug[pr][N];
  return x; // x[i]=1 means press cell i
}

// Generate solvable puzzle: start from solved (all 0), press random cells
function genBoard(d){
  const moves=DIFF_MOVES[d];
  const b=new Array(25).fill(0);
  const pressed=new Array(25).fill(0);
  for(let m=0;m<moves;m++){
    const idx=Math.floor(Math.random()*25);
    toggle(b,idx);
    pressed[idx]^=1;
  }
  // If already solved (unlikely but handle)
  if(b.every(v=>v===0)){b[0]=1;b[1]=1;b[5]=1;}
  return b;
}

function toggle(b,idx){
  const r=Math.floor(idx/5),c=idx%5;
  b[idx]^=1;
  if(r>0)b[idx-5]^=1;if(r<4)b[idx+5]^=1;if(c>0)b[idx-1]^=1;if(c<4)b[idx+1]^=1;
}

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  for(let i=0;i<25;i++){
    const cell=document.createElement('div');
    cell.className='cell '+(board[i]?'on':'off');
    cell.dataset.i=i;
    if(hintIdx===i)cell.classList.add('hint-glow');
    cell.addEventListener('click',()=>handleCell(i));
    grid.appendChild(cell);
  }
}

function handleCell(i){
  if(AC.state==='suspended')AC.resume();
  hintIdx=-1;
  toggle(board,i);
  moveCount++;
  document.getElementById('hud-moves').textContent=moveCount;
  sndToggle();
  renderGrid();
  checkWin();
}

function checkWin(){
  if(board.every(v=>v===0)){
    clearInterval(timer);
    sndWin();
    const prev=parseInt(localStorage.getItem(LS_KEY(diff)))||Infinity;
    const best=Math.min(prev,moveCount);
    localStorage.setItem(LS_KEY(diff),best);
    showOver();
  }
}

function fmtTime(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}

function startGame(){
  clearInterval(timer);
  board=genBoard(diff);
  moveCount=0;
  seconds=0;
  hintIdx=-1;
  document.getElementById('hud-moves').textContent='0';
  document.getElementById('hud-time').textContent='0:00';
  document.getElementById('hud-diff-label').textContent=diff.toUpperCase();
  document.getElementById('msg').textContent='';
  show('screen-game');
  renderGrid();
  timer=setInterval(()=>{seconds++;document.getElementById('hud-time').textContent=fmtTime(seconds);},1000);
}

function showOver(){
  const prev=parseInt(localStorage.getItem(LS_KEY(diff)))||moveCount;
  const isRecord=moveCount<=prev;
  document.getElementById('over-stats').innerHTML=
    `Difficulty: <b style="color:#0ff">${diff.toUpperCase()}</b><br>
     Moves: <b style="color:#fff">${moveCount}</b><br>
     Time: <b style="color:#fff">${fmtTime(seconds)}</b><br>
     Best Moves: <b style="color:#ff0">${prev}</b>${isRecord&&moveCount===prev&&prev!==Infinity?' 🏆':''}`;
  // harder button
  const nextDiff=DIFFS[DIFFS.indexOf(diff)+1];
  const btn=document.getElementById('btn-harder');
  if(nextDiff){btn.textContent=`${nextDiff.toUpperCase()} →`;btn.style.display='';}
  else btn.style.display='none';
  show('screen-over');
}

function updateHiDisplay(){
  let html='Best Moves — ';
  DIFFS.forEach(d=>{
    const v=localStorage.getItem(LS_KEY(d));
    html+=`<span style="color:#0ff">${d}</span>: ${v||'—'}  `;
  });
  document.getElementById('hiscore-display').innerHTML=html;
}

// Diff buttons
document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    diff=btn.dataset.diff;
  });
});

document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-reset').addEventListener('click',()=>{hintIdx=-1;startGame();});
document.getElementById('btn-menu').addEventListener('click',()=>{clearInterval(timer);updateHiDisplay();show('screen-start');});
document.getElementById('btn-over-menu').addEventListener('click',()=>{clearInterval(timer);updateHiDisplay();show('screen-start');});
document.getElementById('btn-again').addEventListener('click',startGame);
document.getElementById('btn-harder').addEventListener('click',()=>{
  const next=DIFFS[DIFFS.indexOf(diff)+1];
  if(next){diff=next;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.diff===diff));}
  startGame();
});

document.getElementById('btn-hint').addEventListener('click',()=>{
  if(AC.state==='suspended')AC.resume();
  const sol=solve(board);
  const moves=sol.map((v,i)=>v?i:-1).filter(i=>i>=0);
  if(moves.length===0){document.getElementById('msg').textContent='Already solved!';return;}
  hintIdx=moves[0];
  sndHint();
  document.getElementById('msg').textContent='💡 Highlighted move is one step closer!';
  renderGrid();
  setTimeout(()=>{document.getElementById('msg').textContent='';},2500);
});

updateHiDisplay();
show('screen-start');
</script>
</body>
</html>
