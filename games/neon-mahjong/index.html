<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🀄 Neon Mahjong — Solitaire</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--tile-bg:#12122a;--tile-border:#2a2a5a;
  --cyan:#00ffff;--pink:#ff00aa;--yellow:#ffff00;
  --green:#00ff88;--purple:#aa00ff;
  --tile-w:52px;--tile-h:66px;
}
body{background:var(--bg);color:#e0e0ff;font-family:'Segoe UI',sans-serif;
  min-height:100vh;overflow-x:hidden;user-select:none}
#screen-start,#screen-game,#screen-over{display:none;position:fixed;inset:0}
#screen-start.active,#screen-game.active,#screen-over.active{display:flex}
/* START */
#screen-start{flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg)}
.logo{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;letter-spacing:.1em;
  text-shadow:0 0 20px var(--cyan),0 0 40px var(--cyan);color:var(--cyan);margin-bottom:.3em}
.logo span{color:var(--pink);text-shadow:0 0 20px var(--pink),0 0 40px var(--pink)}
.tagline{color:#8888bb;margin-bottom:2rem;font-size:1rem}
.btn{padding:.75em 2.5em;border:2px solid var(--cyan);background:transparent;
  color:var(--cyan);font-size:1.1rem;border-radius:8px;cursor:pointer;
  text-shadow:0 0 8px var(--cyan);box-shadow:0 0 12px var(--cyan);
  transition:all .2s;letter-spacing:.1em}
.btn:hover{background:rgba(0,255,255,.1);box-shadow:0 0 24px var(--cyan)}
.btn.pink{border-color:var(--pink);color:var(--pink);text-shadow:0 0 8px var(--pink);
  box-shadow:0 0 12px var(--pink)}
.btn.pink:hover{background:rgba(255,0,170,.1);box-shadow:0 0 24px var(--pink)}
.hi-display{color:#8888bb;margin-top:1.5rem;font-size:.9rem}
.hi-display b{color:var(--yellow)}
/* HUD */
#screen-game{flex-direction:column;align-items:center;background:var(--bg)}
#hud{display:flex;gap:1rem;padding:.6rem 1rem;background:rgba(0,0,0,.4);
  width:100%;justify-content:center;align-items:center;flex-wrap:wrap;
  border-bottom:1px solid #1a1a3a;font-size:.85rem}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:.1rem}
.hud-label{color:#666;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em}
.hud-val{color:var(--cyan);font-weight:700;font-size:1rem;
  text-shadow:0 0 8px var(--cyan)}
#btn-hint,.btn-sm{padding:.4em 1em;border:1px solid;border-radius:6px;cursor:pointer;
  background:transparent;font-size:.75rem;letter-spacing:.05em;transition:all .2s}
#btn-hint{border-color:var(--yellow);color:var(--yellow);text-shadow:0 0 6px var(--yellow)}
#btn-hint:hover{background:rgba(255,255,0,.1)}
#btn-shuffle{border-color:var(--purple);color:var(--purple);text-shadow:0 0 6px var(--purple)}
#btn-shuffle:hover{background:rgba(170,0,255,.1)}
#board-wrap{flex:1;overflow:auto;display:flex;align-items:flex-start;
  justify-content:center;padding:1rem;width:100%}
#board{position:relative}
/* TILE */
.tile{position:absolute;width:var(--tile-w);height:var(--tile-h);
  border-radius:6px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:1.6rem;transition:transform .1s,box-shadow .15s;
  border:1.5px solid var(--tile-border);background:var(--tile-bg);
  box-shadow:2px 3px 8px rgba(0,0,0,.6);}
.tile::after{content:'';position:absolute;inset:-1px;border-radius:6px;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 60%);
  pointer-events:none}
.tile.free{background:linear-gradient(145deg,#16163a,#0e0e28);
  border-color:#3a3a7a;box-shadow:2px 3px 8px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06)}
.tile.free:hover{box-shadow:0 0 14px var(--cyan),2px 3px 8px rgba(0,0,0,.7);
  border-color:var(--cyan);transform:translateY(-2px)}
.tile.selected{border-color:var(--cyan);box-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,255,255,.3);
  transform:translateY(-3px)}
.tile.hint{border-color:var(--yellow);box-shadow:0 0 16px var(--yellow),0 0 32px rgba(255,255,0,.3)}
.tile.blocked{background:linear-gradient(145deg,#0c0c1e,#0a0a18);
  border-color:#1c1c3a;opacity:.75;cursor:default}
.tile.removing{animation:tileOut .3s forwards}
@keyframes tileOut{0%{transform:scale(1);opacity:1}50%{transform:scale(1.15)}100%{transform:scale(0);opacity:0}}
/* GAME OVER */
#screen-over{flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,10,26,.95)}
.result-icon{font-size:4rem;margin-bottom:.5rem}
.result-title{font-size:2rem;font-weight:900;margin-bottom:.5rem}
.result-title.win{color:var(--green);text-shadow:0 0 20px var(--green)}
.result-title.lose{color:var(--pink);text-shadow:0 0 20px var(--pink)}
.result-stats{color:#8888bb;margin-bottom:2rem;text-align:center;line-height:1.8}
.result-stats b{color:var(--yellow)}
.btn-group{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
/* particle */
.particle{position:fixed;pointer-events:none;border-radius:50%;animation:particleFly .6s forwards}
@keyframes particleFly{0%{opacity:1;transform:scale(1) translate(0,0)}
  100%{opacity:0;transform:scale(0) translate(var(--dx),var(--dy))}}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start" class="active">
  <div class="logo">🀄 NEON <span>MAHJONG</span></div>
  <div class="tagline">Classic solitaire · Neon glow</div>
  <button class="btn" onclick="startGame()">▶ PLAY</button>
  <div class="hi-display" id="hi-display">Best: <b>--:--</b></div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game">
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">⏱ Time</span>
      <span class="hud-val" id="hud-time">00:00</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">♟ Moves</span>
      <span class="hud-val" id="hud-moves">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">🀄 Left</span>
      <span class="hud-val" id="hud-left">--</span>
    </div>
    <button class="btn-sm" id="btn-hint" onclick="doHint()">💡 Hint</button>
    <button class="btn-sm" id="btn-shuffle" onclick="doShuffle()">🔀 Shuffle <span id="shuf-cnt">3</span></button>
    <button class="btn-sm" style="border-color:#555;color:#888" onclick="goStart()">✕</button>
  </div>
  <div id="board-wrap"><div id="board"></div></div>
</div>

<!-- GAME OVER SCREEN -->
<div id="screen-over">
  <div class="result-icon" id="result-icon">🎉</div>
  <div class="result-title" id="result-title">You Win!</div>
  <div class="result-stats" id="result-stats"></div>
  <div class="btn-group">
    <button class="btn" onclick="startGame()">▶ Play Again</button>
    <button class="btn pink" onclick="goStart()">🏠 Menu</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq,dur,type='sine',vol=.18){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.frequency.value=freq;o.type=type;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);
}
function sndSelect(){beep(660,.12,'triangle',.14)}
function sndMatch(){beep(880,.1);setTimeout(()=>beep(1100,.15),80);setTimeout(()=>beep(1320,.2),180)}
function sndError(){beep(200,.2,'sawtooth',.12)}
function sndHint(){beep(550,.15,'sine',.12);setTimeout(()=>beep(660,.2),130)}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.3),i*120))}
function sndLose(){[400,300,200].forEach((f,i)=>setTimeout(()=>beep(f,.25,'sawtooth'),i*150))}

// ═══════════════════════════════════════════════
// TILE TYPES (36 unique)
// ═══════════════════════════════════════════════
const TILES=[
  '🍎','🍊','🍋','🍇','🍓','🍑','🥝','🍒','🍍','🥭',
  '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯',
  '⭐','🌙','☀️','❄️','⚡','🌊','🔥','🌸','🍀','🎃',
  '💎','🔮','🎯','🎲','🎸','🎵'
];

// ═══════════════════════════════════════════════
// LAYOUT — pyramid, positions: [layer, row, col]
// col & row in half-tile units so tiles interleave nicely
// ═══════════════════════════════════════════════
function buildLayout(){
  const pos=[];
  // Layer 0: 8×5 but as 16×10 half-units
  for(let r=0;r<10;r+=2)for(let c=0;c<16;c+=2) pos.push([0,r,c]);
  // Layer 1: 6×4
  for(let r=1;r<9;r+=2)for(let c=1;c<13;c+=2) pos.push([1,r,c]);
  // Layer 2: 4×3
  for(let r=2;r<8;r+=2)for(let c=2;c<10;c+=2) pos.push([2,r,c]);
  // Layer 3: 2×2
  for(let r=3;r<7;r+=2)for(let c=3;c<7;c+=2) pos.push([3,r,c]);
  // Layer 4: center
  pos.push([4,4,5]);pos.push([4,4,7]);
  return pos; // 40+24+12+4+2 = 82 → trim to 72
}

// Generate exactly 72 tiles (36 pairs) shuffled into layout positions
let tiles=[], selected=null, moves=0, elapsed=0, timerID=null, shufflesLeft=3;
let hintTiles=[], gameActive=false;

function buildTiles(){
  const layout=buildLayout().slice(0,72);
  // 36 types × 2 = 72
  const types=[...TILES,...TILES]; // 72 items
  shuffle(types);
  tiles=layout.map((pos,i)=>({
    id:i, layer:pos[0], row:pos[1], col:pos[2],
    type:types[i], removed:false, el:null
  }));
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

// Check if tile A blocks tile B from above
function blocksAbove(a,b){
  // a is above b if a.layer === b.layer+1 and grids overlap
  return a.layer===b.layer+1 && Math.abs(a.row-b.row)<2 && Math.abs(a.col-b.col)<2;
}

// Is tile blocked from above?
function hasAbove(t){
  return tiles.some(x=>!x.removed && blocksAbove(x,t));
}

// Is tile blocked on the left side?
function hasLeft(t){
  return tiles.some(x=>!x.removed && x.layer===t.layer && Math.abs(x.row-t.row)<2 && x.col===t.col-2);
}

// Is tile blocked on the right side?
function hasRight(t){
  return tiles.some(x=>!x.removed && x.layer===t.layer && Math.abs(x.row-t.row)<2 && x.col===t.col+2);
}

function isFree(t){
  if(t.removed) return false;
  return !hasAbove(t) && (!hasLeft(t) || !hasRight(t));
}

function freeTiles(){return tiles.filter(t=>!t.removed && isFree(t))}

function matchablePairs(){
  const free=freeTiles();
  const pairs=[];
  for(let i=0;i<free.length;i++)
    for(let j=i+1;j<free.length;j++)
      if(free[i].type===free[j].type) pairs.push([free[i],free[j]]);
  return pairs;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
const TW=56, TH=70, SHADOW=4; // px per half-unit

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  let maxX=0,maxY=0;
  tiles.forEach(t=>{
    if(t.removed) return;
    const x=t.col*(TW/2)+t.layer*3;
    const y=t.row*(TH/2)-t.layer*5;
    maxX=Math.max(maxX,x+TW);maxY=Math.max(maxY,y+TH);
    const el=document.createElement('div');
    el.className='tile '+(isFree(t)?'free':'blocked');
    el.style.left=x+'px'; el.style.top=y+'px';
    el.style.zIndex=t.layer*100+t.row;
    el.textContent=t.type;
    el.dataset.id=t.id;
    el.addEventListener('click',()=>onTileClick(t.id));
    el.addEventListener('touchstart',e=>{e.preventDefault();onTileClick(t.id)},{passive:false});
    t.el=el;
    board.appendChild(el);
  });
  board.style.width=maxX+16+'px';
  board.style.height=maxY+16+'px';
  document.getElementById('hud-left').textContent=tiles.filter(t=>!t.removed).length;
}

function updateFreeState(){
  tiles.forEach(t=>{
    if(!t.el||t.removed) return;
    const f=isFree(t);
    t.el.className='tile '+(f?'free':'blocked');
    if(selected===t.id) t.el.classList.add('selected');
    if(hintTiles.includes(t.id)) t.el.classList.add('hint');
  });
}

// ═══════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════
function onTileClick(id){
  if(!gameActive) return;
  if(AC.state==='suspended') AC.resume();
  const t=tiles[id];
  if(!isFree(t)) return;
  clearHint();
  if(selected===null){
    selected=id;
    t.el.classList.add('selected');
    sndSelect();
  } else if(selected===id){
    selected=null;
    t.el.classList.remove('selected');
  } else {
    const s=tiles[selected];
    if(s.type===t.type){
      // Match!
      sndMatch();
      moves++;
      document.getElementById('hud-moves').textContent=moves;
      s.el.classList.add('removing');
      t.el.classList.add('removing');
      spawnParticles(s.el);
      spawnParticles(t.el);
      setTimeout(()=>{
        s.removed=true; t.removed=true;
        s.el.remove(); t.el.remove();
        selected=null;
        updateFreeState();
        document.getElementById('hud-left').textContent=tiles.filter(x=>!x.removed).length;
        checkEndCondition();
      },310);
    } else {
      sndError();
      tiles[selected].el.classList.remove('selected');
      selected=id;
      t.el.classList.add('selected');
    }
  }
}

function checkEndCondition(){
  const remaining=tiles.filter(t=>!t.removed);
  if(remaining.length===0){endGame(true);return;}
  if(matchablePairs().length===0){endGame(false);}
}

function clearHint(){
  hintTiles=[];
  tiles.forEach(t=>{if(t.el)t.el.classList.remove('hint');});
}

function doHint(){
  if(!gameActive) return;
  if(AC.state==='suspended') AC.resume();
  clearHint();
  const pairs=matchablePairs();
  if(pairs.length===0){sndError();return;}
  sndHint();
  const pair=pairs[Math.floor(Math.random()*pairs.length)];
  hintTiles=[pair[0].id,pair[1].id];
  pair.forEach(t=>{if(t.el)t.el.classList.add('hint');});
  setTimeout(clearHint,2000);
}

function doShuffle(){
  if(!gameActive||shufflesLeft<=0) return;
  if(AC.state==='suspended') AC.resume();
  shufflesLeft--;
  document.getElementById('shuf-cnt').textContent=shufflesLeft;
  clearHint(); selected=null;
  // Collect remaining tile types and re-shuffle among positions
  const remaining=tiles.filter(t=>!t.removed);
  const types=remaining.map(t=>t.type);
  shuffle(types);
  remaining.forEach((t,i)=>t.type=types[i]);
  renderBoard();
  updateFreeState();
  beep(440,.2,'triangle',.15); setTimeout(()=>beep(550,.15),150);
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function startTimer(){
  elapsed=0;
  timerID=setInterval(()=>{
    elapsed++;
    const m=String(Math.floor(elapsed/60)).padStart(2,'0');
    const s=String(elapsed%60).padStart(2,'0');
    document.getElementById('hud-time').textContent=`${m}:${s}`;
  },1000);
}

function stopTimer(){clearInterval(timerID);}

// ═══════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════
function spawnParticles(el){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const colors=[getComputedStyle(document.documentElement).getPropertyValue('--cyan'),
    getComputedStyle(document.documentElement).getPropertyValue('--pink'),
    getComputedStyle(document.documentElement).getPropertyValue('--yellow')];
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*Math.PI*2;
    const dist=40+Math.random()*40;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:6px;height:6px;
      background:${colors[i%3]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),650);
  }
}

// ═══════════════════════════════════════════════
// FLOW
// ═══════════════════════════════════════════════
function showScreen(id){
  ['screen-start','screen-game','screen-over'].forEach(s=>
    document.getElementById(s).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(){
  if(AC.state==='suspended') AC.resume();
  buildTiles();
  selected=null; moves=0; shufflesLeft=3;
  gameActive=true;
  document.getElementById('hud-moves').textContent='0';
  document.getElementById('shuf-cnt').textContent='3';
  stopTimer(); startTimer();
  showScreen('screen-game');
  renderBoard();
}

function endGame(win){
  gameActive=false;
  stopTimer();
  if(win){
    sndWin();
    const best=localStorage.getItem('neon-mahjong-hi');
    let newBest=false;
    if(!best||elapsed<parseInt(best)){
      localStorage.setItem('neon-mahjong-hi',elapsed);newBest=true;
    }
    const bestVal=localStorage.getItem('neon-mahjong-hi');
    const bm=String(Math.floor(bestVal/60)).padStart(2,'0');
    const bs=String(bestVal%60).padStart(2,'0');
    const m=String(Math.floor(elapsed/60)).padStart(2,'0');
    const s=String(elapsed%60).padStart(2,'0');
    document.getElementById('result-icon').textContent='🎉';
    document.getElementById('result-title').textContent='You Win!';
    document.getElementById('result-title').className='result-title win';
    document.getElementById('result-stats').innerHTML=
      `Time: <b>${m}:${s}</b> · Moves: <b>${moves}</b><br>`+
      `Best Time: <b>${bm}:${bs}</b>${newBest?' 🏆 New Record!':''}`;
  } else {
    sndLose();
    document.getElementById('result-icon').textContent='😔';
    document.getElementById('result-title').textContent='No More Moves';
    document.getElementById('result-title').className='result-title lose';
    const left=tiles.filter(t=>!t.removed).length;
    document.getElementById('result-stats').innerHTML=
      `<b>${left}</b> tiles remaining<br>Moves made: <b>${moves}</b><br>Use Shuffle next time!`;
  }
  setTimeout(()=>showScreen('screen-over'),400);
}

function goStart(){
  gameActive=false; stopTimer();
  const best=localStorage.getItem('neon-mahjong-hi');
  if(best){
    const m=String(Math.floor(best/60)).padStart(2,'0');
    const s=String(best%60).padStart(2,'0');
    document.getElementById('hi-display').innerHTML=`Best: <b>${m}:${s}</b>`;
  }
  showScreen('screen-start');
}

// Init
goStart();
</script>
</body>
</html>
