<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Match-3 Roguelite ⚔️💎</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;user-select:none}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.hidden{display:none!important}
/* START SCREEN */
#startScreen{background:#0a0a1a}
.title-glow{font-size:clamp(24px,6vw,48px);font-weight:900;text-align:center;background:linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;filter:drop-shadow(0 0 20px #00ffff88);letter-spacing:2px;margin-bottom:8px}
.subtitle{color:#888;font-size:14px;text-align:center;margin-bottom:32px}
.btn{padding:14px 36px;font-size:16px;font-weight:700;border:2px solid #00ffff;background:transparent;color:#00ffff;border-radius:8px;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:2px;box-shadow:0 0 16px #00ffff44;margin:6px}
.btn:hover,.btn:active{background:#00ffff22;box-shadow:0 0 32px #00ffff88}
.hi-display{margin-top:20px;font-size:13px;color:#666}
.hi-display span{color:#00ffff;font-weight:700}
/* GAME SCREEN */
#gameScreen{background:#0a0a1a;padding:8px 4px;gap:6px;justify-content:flex-start;overflow:hidden}
/* ENEMY BAR */
#enemySection{width:100%;max-width:380px}
.enemy-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.enemy-name{font-size:13px;font-weight:700;color:#ff00ff;text-shadow:0 0 8px #ff00ff}
.floor-label{font-size:12px;color:#666}
.hp-bar-wrap{width:100%;height:14px;background:#111;border-radius:7px;overflow:hidden;border:1px solid #ff00ff44}
.hp-bar-fill{height:100%;background:linear-gradient(90deg,#ff0066,#ff00ff);transition:width .3s;border-radius:7px;box-shadow:0 0 8px #ff00ff66}
/* PLAYER INFO */
#playerSection{width:100%;max-width:380px;display:flex;align-items:center;gap:12px}
.player-hp-wrap{flex:1;height:12px;background:#111;border-radius:6px;overflow:hidden;border:1px solid #00ffff44}
.player-hp-fill{height:100%;background:linear-gradient(90deg,#00ff88,#00ffff);transition:width .3s;border-radius:6px;box-shadow:0 0 6px #00ffff66}
.player-stats{display:flex;gap:12px;font-size:12px}
.player-stats span{color:#888}
.player-stats b{color:#00ffff}
/* GRID */
#gridWrapper{width:100%;max-width:380px;display:flex;justify-content:center}
#grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;width:100%;max-width:380px;aspect-ratio:1}
.cell{aspect-ratio:1;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,22px);transition:transform .1s,box-shadow .1s;border:2px solid transparent;position:relative;overflow:hidden}
.cell:hover{transform:scale(1.08)}
.cell.selected{border-color:#fff;transform:scale(1.12);box-shadow:0 0 12px #ffffff88}
.cell.matched{animation:matchPop .35s ease-out forwards}
.cell.bomb{animation:bombPulse 1s ease-in-out infinite}
@keyframes matchPop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(0);opacity:0}}
@keyframes bombPulse{0%,100%{box-shadow:0 0 8px #ff9900}50%{box-shadow:0 0 20px #ff9900,0 0 40px #ff9900}}
.gem-0{background:#ff006688;box-shadow:0 0 6px #ff006666}
.gem-1{background:#00ffff44;box-shadow:0 0 6px #00ffff66}
.gem-2{background:#ffff0044;box-shadow:0 0 6px #ffff0066}
.gem-3{background:#00ff8844;box-shadow:0 0 6px #00ff8866}
.gem-4{background:#ff00ff44;box-shadow:0 0 6px #ff00ff66}
.gem-5{background:#ff880044;box-shadow:0 0 6px #ff880066}
.gem-bomb{background:#ff990044;box-shadow:0 0 10px #ff9900;border:2px solid #ff9900!important}
/* COMBO/DMG POPUP */
#comboDisplay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:900;color:#ff00ff;text-shadow:0 0 20px #ff00ff;pointer-events:none;opacity:0;transition:none;z-index:100}
#comboDisplay.show{animation:comboPop .7s ease-out forwards}
@keyframes comboPop{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}30%{transform:translate(-50%,-80%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-150%) scale(1)}}
/* STATUS ROW */
#statusRow{width:100%;max-width:380px;display:flex;justify-content:space-between;font-size:12px;padding:0 2px}
#statusRow .tag{background:#ffffff11;border-radius:4px;padding:2px 8px;color:#aaa}
#statusRow .tag span{color:#00ffff;font-weight:700}
/* POWER-UP SCREEN */
#powerupScreen{background:#0a0a1aee;z-index:50}
.powerup-title{font-size:22px;font-weight:900;color:#ffff00;text-shadow:0 0 16px #ffff00;margin-bottom:24px}
.powerup-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.pu-card{width:140px;min-height:140px;background:#0d0d2a;border:2px solid #333;border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.pu-card:hover{border-color:#ffff00;box-shadow:0 0 20px #ffff0066;transform:translateY(-4px)}
.pu-icon{font-size:36px}
.pu-name{font-size:13px;font-weight:700;color:#fff}
.pu-desc{font-size:11px;color:#888;line-height:1.4}
/* GAMEOVER */
#gameoverScreen{background:#0a0a1a}
.go-title{font-size:clamp(28px,7vw,52px);font-weight:900;color:#ff0066;text-shadow:0 0 30px #ff0066;margin-bottom:8px}
.go-floor{font-size:18px;color:#888;margin-bottom:24px}
.go-floor b{color:#00ffff}
.go-stats{background:#0d0d2a;border:1px solid #333;border-radius:10px;padding:16px 24px;margin-bottom:24px;text-align:center;min-width:220px}
.go-stats .row{display:flex;justify-content:space-between;gap:32px;margin:4px 0;font-size:14px}
.go-stats .row span:first-child{color:#666}
.go-stats .row span:last-child{color:#00ffff;font-weight:700}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen">
  <div class="title-glow">NEON MATCH-3<br>ROGUELITE</div>
  <div class="subtitle">Match gems. Defeat enemies. Go deeper.</div>
  <button class="btn" onclick="startGame()">▶ START RUN</button>
  <div class="hi-display">Best Floor: <span id="hiBestFloor">0</span></div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen hidden">
  <div id="enemySection">
    <div class="enemy-row">
      <div class="enemy-name" id="enemyName">Void Crawler</div>
      <div class="floor-label">Floor <span id="floorNum">1</span>/10</div>
    </div>
    <div class="hp-bar-wrap"><div class="hp-bar-fill" id="enemyHpBar"></div></div>
    <div style="font-size:11px;color:#666;text-align:right;margin-top:2px" id="enemyHpText">100 / 100</div>
  </div>

  <div id="playerSection">
    <div style="font-size:11px;color:#00ffff88;white-space:nowrap">HP</div>
    <div class="player-hp-wrap" style="flex:1"><div class="player-hp-fill" id="playerHpBar"></div></div>
    <div class="player-stats">
      <span><b id="playerHpText">100</b>/100</span>
      <span>Score:<b id="scoreText"> 0</b></span>
    </div>
  </div>

  <div id="statusRow">
    <div class="tag">Combo: <span id="comboText">0×</span></div>
    <div class="tag">Turn: <span id="turnText">1</span></div>
    <div class="tag" id="buffDisplay" style="display:none">🔥 Buff</div>
  </div>

  <div id="gridWrapper"><div id="grid"></div></div>
  <div style="font-size:11px;color:#555;margin-top:4px">Swap 2 gems · Match 3+ · Enemy ⚔ each turn</div>
</div>

<!-- POWER-UP SCREEN -->
<div id="powerupScreen" class="screen hidden">
  <div class="powerup-title">⚡ CHOOSE A POWER-UP</div>
  <div class="powerup-cards" id="powerupCards"></div>
</div>

<!-- GAMEOVER SCREEN -->
<div id="gameoverScreen" class="screen hidden">
  <div class="go-title">GAME OVER</div>
  <div class="go-floor">Reached Floor <b id="goFloor">1</b></div>
  <div class="go-stats">
    <div class="row"><span>Total Score</span><span id="goScore">0</span></div>
    <div class="row"><span>Enemies Slain</span><span id="goKills">0</span></div>
    <div class="row"><span>Best Floor</span><span id="goBest">0</span></div>
  </div>
  <button class="btn" onclick="startGame()">↩ TRY AGAIN</button>
  <button class="btn" style="border-color:#ff00ff;color:#ff00ff;box-shadow:0 0 16px #ff00ff44" onclick="showStart()">🏠 MENU</button>
</div>

<div id="comboDisplay">COMBO!</div>

<script>
// ──────────────────────────────────────────────
//  Audio
// ──────────────────────────────────────────────
let ctx;
function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
function beep(freq,dur,type='square',vol=0.15){
  try{const c=getCtx();const o=c.createOscillator();const g=c.createGain();
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);}catch(e){}}
function sndMatch(){beep(440,.08);setTimeout(()=>beep(660,.08),80);setTimeout(()=>beep(880,.12),160);}
function sndDmg(){beep(220,.15,'sawtooth',0.2);}
function sndHurt(){beep(110,.2,'sawtooth',0.25);}
function sndLevel(){[0,100,200,300].forEach(d=>setTimeout(()=>beep(660+d*2,.12),d));}
function sndGameOver(){[0,150,300].forEach(d=>setTimeout(()=>beep(220-d,.3,'sawtooth',0.2),d));}

// ──────────────────────────────────────────────
//  Constants
// ──────────────────────────────────────────────
const GRID=7,COLORS=6;
const GEM_EMOJI=['🔴','🔵','🟡','🟢','🟣','🟠'];
const GEM_LABEL=['Ruby','Sapphire','Topaz','Emerald','Amethyst','Amber'];
const ENEMY_NAMES=['Void Crawler','Neon Wraith','Plasma Fiend','Glitch Golem','Pixel Demon','Circuit Drake','Data Specter','Hex Hound','Binary Titan','FINAL BOSS'];
const BASE_HP=[80,130,180,240,310,390,480,580,700,900];
const ENEMY_ATK=[8,10,13,16,20,24,28,33,38,50];

// ──────────────────────────────────────────────
//  State
// ──────────────────────────────────────────────
let board=[],selected=null,floor=1,enemyHp=0,enemyMaxHp=0,playerHp=100,playerMaxHp=100;
let score=0,kills=0,comboMult=0,turnCount=0,isAnimating=false,buffs={};
let activePowerups=[];

// ──────────────────────────────────────────────
//  Init
// ──────────────────────────────────────────────
function showStart(){
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('gameoverScreen').classList.add('hidden');
  document.getElementById('powerupScreen').classList.add('hidden');
  document.getElementById('hiBestFloor').textContent=localStorage.getItem('neon-match3-roguelite-hi')||0;
}
showStart();

function startGame(){
  board=[];selected=null;floor=1;playerHp=100;playerMaxHp=100;score=0;kills=0;turnCount=0;buffs={};activePowerups=[];
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameoverScreen').classList.add('hidden');
  document.getElementById('powerupScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  initEnemy();
  buildBoard();
  render();
}

function initEnemy(){
  enemyMaxHp=BASE_HP[floor-1];
  enemyHp=enemyMaxHp;
  document.getElementById('enemyName').textContent=ENEMY_NAMES[floor-1];
  document.getElementById('floorNum').textContent=floor;
  updateEnemyHpBar();
}

// ──────────────────────────────────────────────
//  Board Logic
// ──────────────────────────────────────────────
function randomGem(){
  if(buffs.extraBomb&&Math.random()<0.08)return 'bomb';
  return Math.floor(Math.random()*COLORS);
}

function buildBoard(){
  board=[];
  for(let r=0;r<GRID;r++){board.push([]);for(let c=0;c<GRID;c++)board[r].push(randomGem());}
  // ensure no initial matches
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    let tries=0;
    while(hasMatchAt(r,c)&&tries<20){board[r][c]=randomGem();tries++;}
  }
}

function hasMatchAt(r,c){
  const v=board[r][c];if(v==='bomb')return false;
  let h=1;let c2=c-1;while(c2>=0&&board[r][c2]===v){h++;c2--;}c2=c+1;while(c2<GRID&&board[r][c2]===v){h++;c2++;}
  if(h>=3)return true;
  let v2=1;let r2=r-1;while(r2>=0&&board[r2][c]===v){v2++;r2--;}r2=r+1;while(r2<GRID&&board[r2][c]===v){v2++;r2++;}
  return v2>=3;
}

function findAllMatches(){
  const matched=new Set();
  // horizontal
  for(let r=0;r<GRID;r++){
    let c=0;while(c<GRID){
      if(board[r][c]==='bomb'){c++;continue;}
      let end=c+1;while(end<GRID&&board[r][end]===board[r][c])end++;
      if(end-c>=3){for(let x=c;x<end;x++)matched.add(r*GRID+x);}
      c=end;
    }
  }
  // vertical
  for(let c=0;c<GRID;c++){
    let r=0;while(r<GRID){
      if(board[r][c]==='bomb'){r++;continue;}
      let end=r+1;while(end<GRID&&board[end][c]===board[r][c])end++;
      if(end-r>=3){for(let x=r;x<end;x++)matched.add(x*GRID+c);}
      r=end;
    }
  }
  return matched;
}

function countMatchSize(matched){
  // largest single match chain
  let max=0,cur=0,prev=-2;
  const sorted=[...matched].sort((a,b)=>a-b);
  sorted.forEach(i=>{cur=(i===prev+1)?cur+1:1;max=Math.max(max,cur);prev=i;});
  return max;
}

async function processMatches(cascade=0){
  const matched=findAllMatches();
  if(matched.size===0){
    // end of turn — enemy attacks if player made no 4+ match
    if(cascade===0){
      turnCount++;
      document.getElementById('turnText').textContent=turnCount;
      const attackDamage=Math.ceil(ENEMY_ATK[floor-1]*(buffs.shield?0.5:1));
      if(comboMult===0){
        playerHp=Math.max(0,playerHp-attackDamage);
        sndHurt();
        showCombo('-'+attackDamage+'⚔️','#ff0066');
      }
      comboMult=0;
      document.getElementById('comboText').textContent='0×';
      updatePlayerHpBar();
      if(playerHp<=0){gameOver();return;}
    }
    return;
  }

  // mark and explode bombs
  const bombCells=[];
  matched.forEach(idx=>{
    const r=Math.floor(idx/GRID),c=idx%GRID;
    if(board[r][c]==='bomb'){
      // explode 3×3
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<GRID&&nc>=0&&nc<GRID)bombCells.push(nr*GRID+nc);
      }
    }
  });
  bombCells.forEach(i=>matched.add(i));

  const matchSize=matched.size;
  cascade++;
  const cascadeMult=Math.min(cascade,5);
  comboMult=Math.max(comboMult,cascadeMult);

  // calc damage
  let baseDmg=matchSize*2;
  if(buffs.colorBoost!==undefined){
    let bonus=0;matched.forEach(idx=>{if(board[Math.floor(idx/GRID)][idx%GRID]===buffs.colorBoost)bonus+=3;});
    baseDmg+=bonus;
  }
  const dmg=Math.ceil(baseDmg*cascadeMult*(buffs.doubleDmg?2:1));
  enemyHp=Math.max(0,enemyHp-dmg);
  score+=dmg*floor;
  document.getElementById('scoreText').textContent=' '+score;
  if(cascade>1)showCombo('CASCADE ×'+cascade+'  -'+dmg+'💥','#ffff00');
  else if(matchSize>=5)showCombo('SUPER! -'+dmg+'💥','#ff00ff');
  else{sndDmg();}
  updateEnemyHpBar();

  // animate removal
  matched.forEach(idx=>{
    const cell=document.querySelector(`[data-i="${idx}"]`);
    if(cell)cell.classList.add('matched');
  });
  await sleep(350);

  // remove matched cells
  matched.forEach(idx=>{board[Math.floor(idx/GRID)][idx%GRID]=null;});

  // gravity
  for(let c=0;c<GRID;c++){
    let fill=GRID-1;
    for(let r=GRID-1;r>=0;r--){if(board[r][c]!==null){board[fill][c]=board[r][c];if(fill!==r)board[r][c]=null;fill--;}}
    for(let r=fill;r>=0;r--)board[r][c]=randomGem();
  }
  render();

  if(enemyHp<=0){
    sndLevel();
    kills++;
    if(floor>=10){victory();return;}
    await sleep(400);
    showPowerup();
    return;
  }

  await sleep(200);
  await processMatches(cascade);
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ──────────────────────────────────────────────
//  Swap
// ──────────────────────────────────────────────
async function onCellClick(r,c){
  if(isAnimating)return;
  getCtx(); // unlock audio
  const idx=r*GRID+c;
  if(selected===null){
    selected={r,c};render();return;
  }
  const {r:sr,c:sc}=selected;
  if(sr===r&&sc===c){selected=null;render();return;}
  // check adjacent
  if(Math.abs(sr-r)+Math.abs(sc-c)!==1){selected={r,c};render();return;}
  // swap
  const tmp=board[sr][sc];board[sr][sc]=board[r][c];board[r][c]=tmp;
  selected=null;render();
  isAnimating=true;
  await sleep(100);
  const matches=findAllMatches();
  if(matches.size===0){
    // swap back
    const t=board[sr][sc];board[sr][sc]=board[r][c];board[r][c]=t;
    render();isAnimating=false;return;
  }
  sndMatch();
  comboMult=0;
  await processMatches(0);
  isAnimating=false;
}

// ──────────────────────────────────────────────
//  Touch support
// ──────────────────────────────────────────────
let touchStart=null;
function onTouchStart(r,c,e){e.preventDefault();touchStart={r,c};}
function onTouchEnd(r,c,e){
  e.preventDefault();
  if(!touchStart)return;
  const dr=r-touchStart.r,dc=c-touchStart.c;
  if(Math.abs(dr)+Math.abs(dc)===0){onCellClick(r,c);}
  else if(Math.abs(dr)+Math.abs(dc)===1){
    if(selected===null)selected=touchStart;
    const target={r:touchStart.r+Math.sign(dr)*Math.min(1,Math.abs(dr)),c:touchStart.c+Math.sign(dc)*Math.min(1,Math.abs(dc))};
    selected=touchStart;onCellClick(target.r,target.c);
  }
  touchStart=null;
}

// ──────────────────────────────────────────────
//  Render
// ──────────────────────────────────────────────
function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const v=board[r][c];const idx=r*GRID+c;
    const cell=document.createElement('div');
    cell.className='cell '+(v==='bomb'?'gem-bomb':`gem-${v}`);
    cell.dataset.i=idx;
    cell.textContent=v==='bomb'?'💣':(GEM_EMOJI[v]||'?');
    cell.style.fontSize=v==='bomb'?'clamp(12px,3.5vw,20px)':'clamp(14px,4vw,22px)';
    if(selected&&selected.r===r&&selected.c===c)cell.classList.add('selected');
    cell.onclick=()=>onCellClick(r,c);
    cell.addEventListener('touchstart',e=>onTouchStart(r,c,e),{passive:false});
    cell.addEventListener('touchend',e=>onTouchEnd(r,c,e),{passive:false});
    grid.appendChild(cell);
  }
}

function updateEnemyHpBar(){
  const pct=Math.max(0,enemyHp/enemyMaxHp*100);
  document.getElementById('enemyHpBar').style.width=pct+'%';
  document.getElementById('enemyHpText').textContent=enemyHp+' / '+enemyMaxHp;
}
function updatePlayerHpBar(){
  const pct=Math.max(0,playerHp/playerMaxHp*100);
  document.getElementById('playerHpBar').style.width=pct+'%';
  document.getElementById('playerHpText').textContent=playerHp;
}

function showCombo(msg,color='#ff00ff'){
  const el=document.getElementById('comboDisplay');
  el.textContent=msg;el.style.color=color;
  el.style.textShadow=`0 0 20px ${color}`;
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
}

// ──────────────────────────────────────────────
//  Power-ups
// ──────────────────────────────────────────────
const POWERUP_POOL=[
  {id:'heal',icon:'💚',name:'Holy Surge',desc:'Restore 30 HP',apply:()=>{playerHp=Math.min(playerMaxHp,playerHp+30);updatePlayerHpBar();}},
  {id:'healMax',icon:'🌿',name:'Overheal',desc:'Max HP +20, heal 20',apply:()=>{playerMaxHp+=20;playerHp=Math.min(playerMaxHp,playerHp+20);updatePlayerHpBar();}},
  {id:'doubleDmg',icon:'⚡',name:'Voltage',desc:'Double match damage (permanent)',apply:()=>{buffs.doubleDmg=true;}},
  {id:'shield',icon:'🛡️',name:'Neon Shield',desc:'Halve enemy attack (permanent)',apply:()=>{buffs.shield=true;}},
  {id:'extraBomb',icon:'💣',name:'Bomb Supply',desc:'Bomb gems appear on board',apply:()=>{buffs.extraBomb=true;}},
  {id:'colorBoostR',icon:'🔴',name:'Ruby Power',desc:'Red gems deal +3 bonus dmg',apply:()=>{buffs.colorBoost=0;}},
  {id:'colorBoostB',icon:'🔵',name:'Sapphire Surge',desc:'Blue gems deal +3 bonus dmg',apply:()=>{buffs.colorBoost=1;}},
  {id:'colorBoostY',icon:'🟡',name:'Topaz Blaze',desc:'Yellow gems deal +3 bonus dmg',apply:()=>{buffs.colorBoost=2;}},
  {id:'regenerate',icon:'♻️',name:'Regenerate',desc:'Heal 5 HP every turn',apply:()=>{buffs.regen=true;}},
];

function showPowerup(){
  document.getElementById('powerupScreen').classList.remove('hidden');
  const cards=document.getElementById('powerupCards');cards.innerHTML='';
  // pick 3 random unique powerups
  const pool=[...POWERUP_POOL].sort(()=>Math.random()-.5).slice(0,3);
  pool.forEach(pu=>{
    const card=document.createElement('div');card.className='pu-card';
    card.innerHTML=`<div class="pu-icon">${pu.icon}</div><div class="pu-name">${pu.name}</div><div class="pu-desc">${pu.desc}</div>`;
    card.onclick=()=>choosePowerup(pu);
    cards.appendChild(card);
  });
}

function choosePowerup(pu){
  pu.apply();
  activePowerups.push(pu.id);
  // update buff display
  if(Object.keys(buffs).length>0){
    document.getElementById('buffDisplay').style.display='';
    document.getElementById('buffDisplay').textContent='⚡ '+Object.keys(buffs).length+' buffs';
  }
  document.getElementById('powerupScreen').classList.add('hidden');
  floor++;
  initEnemy();
  buildBoard();
  render();
  sndMatch();
}

// ──────────────────────────────────────────────
//  End States
// ──────────────────────────────────────────────
function gameOver(){
  sndGameOver();
  const best=Math.max(floor,parseInt(localStorage.getItem('neon-match3-roguelite-hi')||'0'));
  localStorage.setItem('neon-match3-roguelite-hi',best);
  document.getElementById('goFloor').textContent=floor;
  document.getElementById('goScore').textContent=score;
  document.getElementById('goKills').textContent=kills;
  document.getElementById('goBest').textContent=best;
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('gameoverScreen').classList.remove('hidden');
}

function victory(){
  sndLevel();sndLevel();
  const best=Math.max(10,parseInt(localStorage.getItem('neon-match3-roguelite-hi')||'0'));
  localStorage.setItem('neon-match3-roguelite-hi',best);
  score+=5000;
  document.getElementById('goFloor').textContent='10 ✅ VICTORY!';
  document.getElementById('goScore').textContent=score;
  document.getElementById('goKills').textContent=kills;
  document.getElementById('goBest').textContent=best;
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('gameoverScreen').classList.remove('hidden');
}

// Regen tick
setInterval(()=>{
  if(buffs.regen&&playerHp<playerMaxHp&&!document.getElementById('gameScreen').classList.contains('hidden')){
    playerHp=Math.min(playerMaxHp,playerHp+5);updatePlayerHpBar();
  }
},3000);
</script>
