<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Neon Nocturne Switchboard</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a1a;
      --panel: #111934;
      --line: #2c3a70;
      --text: #e7eeff;
      --muted: #9fb0db;
      --good: #64f7ff;
      --bad: #ff6ea8;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 50% 0%, #1a1a3d 0%, var(--bg) 58%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 12px;
    }
    .app { width: min(500px, 100%); display: grid; gap: 10px; }
    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      font-size: 12px;
    }
    .card {
      background: linear-gradient(180deg, #182245, #101a34);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      text-align: center;
    }
    canvas {
      width: 100%;
      aspect-ratio: 9 / 15;
      border-radius: 16px;
      border: 1px solid #34467f;
      background: linear-gradient(180deg, #121530, #080913);
      box-shadow: 0 0 24px #64f7ff33;
      touch-action: none;
    }
    .pad {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      padding: 12px 8px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    button:active,
    button.on { transform: translateY(1px) scale(0.99); border-color: var(--good); }
    .hint {
      margin: 0;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hud">
      <div class="card">SCORE<br><strong id="score">0</strong></div>
      <div class="card">BEST<br><strong id="best">0</strong></div>
      <div class="card">COMBO<br><strong id="combo">0</strong></div>
      <div class="card">STAB<br><strong id="stability">100</strong></div>
    </section>

    <canvas id="game" width="360" height="600" aria-label="Neon Nocturne Switchboard canvas"></canvas>

    <section class="pad" aria-label="Routing pads">
      <button data-lane="0" id="p0" aria-label="lane A">A</button>
      <button data-lane="1" id="p1" aria-label="lane S">S</button>
      <button data-lane="2" id="p2" aria-label="lane D">D</button>
      <button data-lane="3" id="p3" aria-label="lane F">F</button>
    </section>
    <button id="restart">RESTART</button>
    <p class="hint">A/S/D/F 또는 터치 패드로 신호를 맞춰 라우팅하세요. 히트 라인(하단 밝은 선)에서 입력하면 콤보 상승, 미스 시 STAB 하락.</p>
  </main>

  <script>
    (() => {
      const KEY = 'best-neon-nocturne-switchboard';
      const lanesX = [54, 135, 225, 306];
      const hitY = 520;
      const hitWindow = 32;

      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const comboEl = document.getElementById('combo');
      const stabEl = document.getElementById('stability');
      const restartBtn = document.getElementById('restart');
      const pads = [...document.querySelectorAll('[data-lane]')];

      let audio;
      function beep(freq = 440, dur = 0.07, type = 'sine', vol = 0.02) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        if (!audio) audio = new AC();
        if (audio.state === 'suspended') audio.resume();
        const o = audio.createOscillator();
        const g = audio.createGain();
        o.type = type;
        o.frequency.value = freq;
        g.gain.value = vol;
        o.connect(g).connect(audio.destination);
        o.start();
        o.stop(audio.currentTime + dur);
      }

      let best = Number(localStorage.getItem(KEY) || 0);
      let state;
      let last = performance.now();
      let spawnTimer = 0;

      function reset() {
        state = {
          score: 0,
          combo: 0,
          stability: 100,
          active: true,
          signals: []
        };
        spawnTimer = 0;
        updateHud();
      }

      function spawnSignal() {
        const speed = 165 + Math.min(220, state.score * 0.2);
        state.signals.push({
          lane: Math.floor(Math.random() * 4),
          y: -20,
          speed,
          hue: Math.random() > 0.5 ? '#64f7ff' : '#ff79be'
        });
      }

      function handleLaneInput(lane) {
        if (!state.active) return;
        const nearest = state.signals
          .map((s, i) => ({ s, i, d: Math.abs(s.y - hitY) }))
          .filter((x) => x.d <= hitWindow)
          .sort((a, b) => a.d - b.d)[0];

        if (nearest && nearest.s.lane === lane) {
          state.signals.splice(nearest.i, 1);
          state.combo += 1;
          state.score += 10 + Math.min(40, state.combo * 2);
          state.stability = Math.min(100, state.stability + 1);
          beep(560 + Math.min(400, state.combo * 8), 0.05, 'triangle', 0.025);
        } else {
          state.combo = 0;
          state.stability -= 8;
          beep(180, 0.09, 'sawtooth', 0.03);
        }

        if (state.stability <= 0) {
          state.stability = 0;
          state.active = false;
          beep(120, 0.15, 'square', 0.04);
          if (state.score > best) {
            best = state.score;
            localStorage.setItem(KEY, String(best));
          }
        }
        updateHud();
      }

      function update(dt) {
        if (!state.active) return;

        spawnTimer -= dt;
        const interval = Math.max(0.22, 0.8 - state.score / 1800);
        if (spawnTimer <= 0) {
          spawnSignal();
          spawnTimer = interval;
        }

        for (const s of state.signals) s.y += s.speed * dt;

        for (let i = state.signals.length - 1; i >= 0; i--) {
          if (state.signals[i].y > canvas.height + 20) {
            state.signals.splice(i, 1);
            state.combo = 0;
            state.stability -= 10;
            beep(150, 0.08, 'square', 0.03);
          }
        }

        if (state.stability <= 0) {
          state.stability = 0;
          state.active = false;
          if (state.score > best) {
            best = state.score;
            localStorage.setItem(KEY, String(best));
          }
        }
        updateHud();
      }

      function drawLanes() {
        const w = 70;
        lanesX.forEach((x, i) => {
          ctx.fillStyle = i % 2 ? '#111a37' : '#0f1731';
          ctx.fillRect(x - w / 2, 0, w, canvas.height);
          ctx.strokeStyle = '#253a6c';
          ctx.strokeRect(x - w / 2, 0, w, canvas.height);
        });

        ctx.fillStyle = '#64f7ff';
        ctx.fillRect(18, hitY - 2, canvas.width - 36, 4);
      }

      function drawSignals() {
        for (const s of state.signals) {
          ctx.beginPath();
          ctx.arc(lanesX[s.lane], s.y, 15, 0, Math.PI * 2);
          ctx.fillStyle = s.hue;
          ctx.shadowColor = s.hue;
          ctx.shadowBlur = 12;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      function drawOverlay() {
        if (state.active) return;
        ctx.fillStyle = '#05070ee0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e7eeff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 28px sans-serif';
        ctx.fillText('SIGNAL LOST', canvas.width / 2, 250);
        ctx.font = '16px sans-serif';
        ctx.fillText(`Score ${state.score} · Best ${best}`, canvas.width / 2, 285);
        ctx.fillText('Restart를 눌러 재시작', canvas.width / 2, 315);
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawLanes();
        drawSignals();
        drawOverlay();
      }

      function updateHud() {
        scoreEl.textContent = state.score;
        bestEl.textContent = best;
        comboEl.textContent = state.combo;
        stabEl.textContent = state.stability;
      }

      function frame(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      document.addEventListener('keydown', (e) => {
        const map = { a: 0, s: 1, d: 2, f: 3 };
        const lane = map[e.key?.toLowerCase()];
        if (lane !== undefined) {
          e.preventDefault();
          handleLaneInput(lane);
          const btn = pads[lane];
          btn.classList.add('on');
          setTimeout(() => btn.classList.remove('on'), 90);
        }
      });

      pads.forEach((btn) => {
        const lane = Number(btn.dataset.lane);
        const trigger = (e) => {
          e.preventDefault();
          handleLaneInput(lane);
          btn.classList.add('on');
          setTimeout(() => btn.classList.remove('on'), 90);
        };
        btn.addEventListener('pointerdown', trigger, { passive: false });
      });

      restartBtn.addEventListener('click', () => {
        beep(420, 0.05, 'triangle', 0.02);
        reset();
      });

      reset();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
