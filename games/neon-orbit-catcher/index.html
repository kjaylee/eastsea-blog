<!DOCTYPE html><head>
<title>Neon Orbit Catcher</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<link rel="manifest" href="manifest.webmanifest">
<style>body{margin:0;background:#0a0a1a;overflow:hidden}</style>
</head><body>
<script src="https://cdn.jsdelivr.net/npm/littlejsengine/dist/littlejs.min.js"></script>
<script>'use strict';
showSplashScreen=false;
debugWatermark=false;
showEngineVersion=false;
canvasClearColor=hsl(0,0,.04);
touchGamepadEnable=true;
cameraScale=34;

const SAVE_KEY='littlejs-neon-orbit-catcher-best';
const ORBIT_R=6.2;

const pulseSound=new Sound([.55,.03,540,.004,0,.05,0,2.1,3,0,0,0,0,0,0,0,0,.7]);
const catchSound=new Sound([.9,.01,760,.01,0,.2,0,1.6,8,0,0,0,0,0,0,0,0,.85]);
const missSound=new Sound([.8,.02,180,.02,0,.17,0,1.8,-5,0,0,0,0,0,0,0,0,.75]);
const overSound=new Sound([1,.02,130,.02,0,.35,0,2,-6,0,0,0,0,0,0,0,0,.8]);

let state='start';
let catcher;
let satellites=[];
let stars=[];
let score=0,bestScore=0,combo=0,maxCombo=0,misses=0;
let elapsed=0,spawnTimer=0;

class Catcher extends EngineObject {
  constructor(){
    super(vec2(ORBIT_R,0),vec2(.42));
    this.setCollision(false,false,false,false);
    this.angle=0;
    this.cooldown=0;
    this.swing=0;
  }
  update(){
    if(state!=='play') return;
    const dt=timeDelta||1/60;
    const steer=getSteerInput();
    this.angle+=dt*(1.85+elapsed*.05+steer*2.4);
    this.pos=vec2(Math.cos(this.angle)*ORBIT_R,Math.sin(this.angle)*ORBIT_R);
    this.cooldown=Math.max(0,this.cooldown-dt);
    this.swing=Math.max(0,this.swing-dt*4.2);
  }
  render(){
    drawLine(vec2(),this.pos,.06,hsl(.56,1,.44,.4));
    drawCircle(this.pos,.36,hsl(.54,1,.68));
    drawCircle(this.pos,.9,hsl(.54,1,.6,.15+.18*this.swing));
  }
  pulse(){
    if(state!=='play'||this.cooldown>0) return;
    this.cooldown=.16;
    this.swing=1;
    pulseSound.play(this.pos);

    let target=null;
    let bestMetric=999;
    for(const sat of satellites){
      if(sat.dead) continue;
      const da=Math.abs(angleDiff(this.angle,sat.angle));
      const dr=Math.abs(sat.radius-ORBIT_R);
      const metric=da*2+dr*.2;
      if(da<.24&&dr<1.45&&metric<bestMetric){
        bestMetric=metric;
        target=sat;
      }
    }

    if(target) catchSatellite(target);
    else registerMiss(this.pos,true);
  }
}

class Satellite extends EngineObject {
  constructor(){
    const radius=rand(3.1,7.9);
    super(vec2(radius,0),vec2(.25));
    this.setCollision(false,false,false,false);
    this.radius=radius;
    this.angle=rand(PI*2);
    this.speed=(rand(.8,1.45)*(randInt(2)?1:-1));
    this.progress=0;
    this.dead=false;
    this.hue=rand(.5,.62);
  }
  update(){
    if(state!=='play'||this.dead) return;
    const dt=timeDelta||1/60;
    const tempo=1+elapsed*.035;
    const s=this.speed*tempo;
    this.angle+=s*dt;
    this.progress+=Math.abs(s)*dt/(PI*2);
    this.pos=vec2(Math.cos(this.angle)*this.radius,Math.sin(this.angle)*this.radius);

    if(this.progress>1.45){
      this.dead=true;
      this.destroy();
      registerMiss(this.pos,false);
    }
  }
  render(){
    drawCircle(this.pos,.25,hsl(this.hue,1,.62));
    drawCircle(this.pos,.66,hsl(this.hue,1,.58,.14));
    drawLine(vec2(),this.pos,.018,hsl(.56,1,.55,.2));
  }
}

function angleDiff(a,b){
  let d=(a-b+PI)%(PI*2)-PI;
  if(d<-PI) d+=PI*2;
  return d;
}

function burst(pos,color,count,size){
  new ParticleEmitter(
    pos,0,.1,.08,count*36,PI,undefined,
    color,color.mutate(.2,.1),hsl(0,0,0,0),hsl(0,0,0,0),
    .45,size||.05,.33,.15,.05,.96,1,.25,PI,.15,.45,false,true,true,1,false
  );
}

function getSteerInput(){
  let steer=(keyIsDown('ArrowRight')||keyIsDown('KeyD')?1:0)-(keyIsDown('ArrowLeft')||keyIsDown('KeyA')?1:0);
  if(mouseIsDown(0)){
    const nx=mousePosScreen.x/mainCanvasSize.x;
    if(nx<.3) steer-=1;
    else if(nx>.7) steer+=1;
  }
  return clamp(steer,-1,1);
}

function actionPressed(){
  return keyWasPressed('Space')||keyWasPressed('Enter')||mouseWasPressed(0);
}

function spawnSatellite(){
  satellites.push(new Satellite());
}

function catchSatellite(sat){
  if(sat.dead) return;
  sat.dead=true;
  sat.destroy();
  combo++;
  maxCombo=Math.max(maxCombo,combo);
  score+=Math.floor(14+combo*6+elapsed*.4);
  catchSound.play(sat.pos);
  burst(sat.pos,hsl(.33,1,.67),18,.06);
}

function registerMiss(pos,manual){
  if(state!=='play') return;
  combo=0;
  misses++;
  missSound.play(pos);
  burst(pos,manual?hsl(.01,1,.64):hsl(.08,1,.58),manual?16:10,manual?.055:.045);
  if(misses>=3) endGame();
}

function startRun(){
  engineObjectsDestroy();
  satellites=[];
  catcher=new Catcher();
  score=0;
  combo=0;
  maxCombo=0;
  misses=0;
  elapsed=0;
  spawnTimer=.2;
  state='play';
}

function endGame(){
  if(state==='gameover') return;
  state='gameover';
  overSound.play();
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem(SAVE_KEY,String(bestScore));
  }
}

function gameInit(){
  bestScore=Number(localStorage.getItem(SAVE_KEY)||0);
  for(let i=0;i<150;i++)
    stars.push(vec2(rand(-16,16),rand(-10,10)));
}

function gameUpdate(){
  if(state==='start'){
    if(actionPressed()) startRun();
    return;
  }

  if(state==='gameover'){
    if(actionPressed()) startRun();
    return;
  }

  const dt=timeDelta||1/60;
  elapsed+=dt;
  spawnTimer-=dt;
  const interval=Math.max(.3,1.1-elapsed*.02-combo*.03);
  if(spawnTimer<=0){
    spawnSatellite();
    spawnTimer=interval;
  }

  if(actionPressed()) catcher.pulse();

  satellites=satellites.filter(s=>!s.dead);
}

function gameUpdatePost(){
  cameraPos=cameraPos.lerp(vec2(0,0),.12);
}

function gameRender(){
  for(const s of stars)
    drawCircle(s,.05,hsl(.6,1,.8,.35));

  for(let i=0;i<12;i++){
    const a=i/12*PI*2+elapsed*.08;
    drawLine(vec2(),vec2(Math.cos(a)*8.2,Math.sin(a)*8.2),.02,hsl(.57,1,.45,.08));
  }

  for(const r of [3.2,4.4,5.6,6.8,8])
    drawCircle(vec2(),r,hsl(.56,1,.52,.09));

  drawCircle(vec2(),1,hsl(.78,1,.46,.2));
  drawCircle(vec2(),.45,hsl(.15,1,.65));

  if(state==='play'){
    const pulse=.5+.5*Math.sin(elapsed*6);
    drawCircle(vec2(),ORBIT_R+.15,hsl(.54,1,.65,.08+.08*pulse));
  }
}

function gameRenderPost(){
  const W=mainCanvasSize.x,H=mainCanvasSize.y;
  drawTextScreen('NEON ORBIT CATCHER',vec2(W/2,40),44,hsl(.56,1,.73),3,hsl(0,0,0));
  drawTextScreen(`BEST ${bestScore}`,vec2(W-120,28),24,hsl(.33,1,.67),2,hsl(0,0,0));

  if(state==='start'){
    drawTextScreen('Tap the beat to catch orbiting satellites',vec2(W/2,H/2-30),30,hsl(.57,.75,.78),2,hsl(0,0,0));
    drawTextScreen('Hold left/right side (or A/D) to nudge orbit',vec2(W/2,H/2+14),24,hsl(.15,1,.66),2,hsl(0,0,0));
    drawTextScreen('3 misses = shutdown',vec2(W/2,H/2+52),24,hsl(.02,1,.64),2,hsl(0,0,0));
    drawTextScreen('TAP / SPACE TO START',vec2(W/2,H/2+114),38,hsl(.33,1,.67),3,hsl(0,0,0));
    return;
  }

  drawTextScreen(`SCORE ${score}`,vec2(100,30),26,hsl(.15,1,.67),2,hsl(0,0,0));
  drawTextScreen(`COMBO x${Math.max(1,combo)}`,vec2(120,60),22,hsl(.33,1,.68),2,hsl(0,0,0));
  drawTextScreen(`MAX COMBO ${maxCombo}`,vec2(132,88),18,hsl(.56,1,.73),1,hsl(0,0,0));
  drawTextScreen(`MISSES ${misses}/3`,vec2(W-110,58),22,hsl(.02,1,.65),2,hsl(0,0,0));
  drawTextScreen('TAP / SPACE: pulse catch',vec2(W/2,H-20),20,hsl(0,0,.78),1,hsl(0,0,0));

  if(state==='gameover'){
    drawTextScreen('ORBIT LOST',vec2(W/2,H/2-18),64,hsl(.01,1,.62),4,hsl(0,0,0));
    drawTextScreen(`FINAL SCORE ${score}`,vec2(W/2,H/2+32),36,hsl(.56,1,.74),3,hsl(0,0,0));
    drawTextScreen('TAP / SPACE TO RETRY',vec2(W/2,H/2+86),30,hsl(.33,1,.67),2,hsl(0,0,0));
  }
}

engineInit(gameInit,gameUpdate,gameUpdatePost,gameRender,gameRenderPost);
</script></body></html>
