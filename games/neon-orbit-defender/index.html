<!DOCTYPE html><head>
<title>Neon Orbit Defender</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<link rel="manifest" href="manifest.webmanifest">
<style>body{margin:0;background:#0a0a1a;overflow:hidden}</style>
</head><body>
<script src="https://cdn.jsdelivr.net/npm/littlejsengine/dist/littlejs.min.js"></script>
<script>'use strict';
showSplashScreen=false;
debugWatermark=false;
showEngineVersion=false;
canvasClearColor=hsl(0,0,.04);
touchGamepadEnable=true;
cameraScale=36;

const SAVE_KEY='littlejs-neon-orbit-defender-best';
const PLANET_R=1.2;
const ORBIT_R=5.3;

const flipSound=new Sound([.8,.02,400,.003,0,.08,0,2.5,5,0,0,0,0,0,0,0,0,.75]);
const shootSound=new Sound([.55,.01,700,.002,0,.05,0,1.8,8,0,0,0,0,0,0,0,0,.62]);
const hitSound=new Sound([.7,.01,280,.01,0,.11,0,1.3,-1,0,0,0,0,0,0,0,0,.72]);
const damageSound=new Sound([.9,.02,140,.02,0,.22,0,1.7,-6,0,0,0,0,0,0,0,0,.8]);
const powerSound=new Sound([.8,.02,620,.004,0,.17,0,1.9,6,0,0,0,0,0,0,0,0,.8]);
const waveSound=new Sound([.9,.03,460,.003,0,.18,0,1.4,3,0,0,0,0,0,0,0,0,.8]);
const overSound=new Sound([1,.03,120,.03,0,.35,0,2,-7,0,0,0,0,0,0,0,0,.85]);

let state='start';
let defender;
let asteroids=[];
let bolts=[];
let powerups=[];
let stars=[];

let score=0,bestScore=0,shield=3,wave=1,kills=0;
let waveQuota=0,waveSpawned=0,spawnTimer=0,runTime=0;
let messageText='',messageTimer=0;

class Defender extends EngineObject {
  constructor(){
    super(vec2(ORBIT_R,0),vec2(.38));
    this.setCollision(false,false,false,false);
    this.angle=0;
    this.dir=1;
    this.fireCooldown=.12;
    this.flipFlash=0;
    this.rapidTimer=0;
  }
  update(){
    if(state!=='play') return;
    const dt=timeDelta||1/60;
    const steer=(keyIsDown('ArrowRight')||keyIsDown('KeyD')?1:0)-(keyIsDown('ArrowLeft')||keyIsDown('KeyA')?1:0);
    const speed=1.85+wave*.07+steer*.75;
    this.angle+=dt*speed*this.dir;
    this.pos=vec2(Math.cos(this.angle)*ORBIT_R,Math.sin(this.angle)*ORBIT_R);

    this.fireCooldown-=dt;
    this.rapidTimer=Math.max(0,this.rapidTimer-dt);
    this.flipFlash=Math.max(0,this.flipFlash-dt*4);

    const period=this.rapidTimer>0?.09:.2;
    if(this.fireCooldown<=0){
      const target=getNearestAsteroid(this.pos,9.8);
      if(target){
        this.fireCooldown=period;
        fireBolt(this.pos,target.pos.subtract(this.pos).normalize());
      }
      else this.fireCooldown=.06;
    }
  }
  render(){
    drawLine(vec2(),this.pos,.06,hsl(.55,1,.46,.45));
    drawCircle(this.pos,.34,hsl(.56,1,.7));
    drawCircle(this.pos,.85,hsl(.56,1,.6,.12+.15*this.flipFlash));
  }
  flip(){
    if(state!=='play') return;
    this.dir*=-1;
    this.flipFlash=1;
    flipSound.play(this.pos);
  }
}

class Asteroid extends EngineObject {
  constructor(pos,vel,radius){
    super(pos,vec2(radius*2));
    this.setCollision(false,false,false,false);
    this.velocity=vel;
    this.radius=radius;
    this.spin=rand(-3,3);
    this.angle=rand(PI*2);
    this.hp=radius>.58?2:1;
    this.hue=rand(.06,.12);
  }
  update(){
    if(state!=='play') return;
    const dt=timeDelta||1/60;
    this.angle+=this.spin*dt;
    super.update();

    if(this.pos.length()<PLANET_R+.2){
      hitPlanet(this);
      return;
    }
    if(this.pos.length()>17) this.destroy();
  }
  render(){
    drawCircle(this.pos,this.radius,hsl(this.hue,.8,.45));
    drawCircle(this.pos,this.radius*.55,hsl(this.hue,.65,.3));
    const edge=this.pos.add(vec2(Math.cos(this.angle),Math.sin(this.angle)).scale(this.radius));
    drawLine(this.pos,edge,.04,hsl(this.hue,1,.7,.35));
  }
}

class Bolt extends EngineObject {
  constructor(pos,dir){
    super(pos,vec2(.14));
    this.setCollision(false,false,false,false);
    this.velocity=dir.scale(7.8);
    this.life=1.25;
    this.radius=.14;
  }
  update(){
    if(state!=='play') return;
    this.life-=timeDelta||1/60;
    if(this.life<=0){ this.destroy(); return; }

    super.update();
    for(const a of asteroids){
      if(a.destroyed) continue;
      if(this.pos.distance(a.pos)<=this.radius+a.radius){
        this.destroy();
        damageAsteroid(a,this.pos);
        return;
      }
    }
  }
  render(){
    drawCircle(this.pos,.13,hsl(.15,1,.68));
    drawCircle(this.pos,.28,hsl(.15,1,.6,.2));
  }
}

class Powerup extends EngineObject {
  constructor(pos,type){
    super(pos,vec2(.4));
    this.setCollision(false,false,false,false);
    this.type=type;
    this.velocity=pos.scale(-1).normalize().scale(rand(.7,1.1)).add(vec2(rand(-.3,.3),rand(-.3,.3)));
    this.life=8;
  }
  update(){
    if(state!=='play') return;
    const dt=timeDelta||1/60;
    this.life-=dt;
    super.update();

    if(this.life<=0){ this.destroy(); return; }
    if(this.pos.distance(defender.pos)<.85){
      collectPowerup(this);
      this.destroy();
    }
  }
  render(){
    const isRapid=this.type==='rapid';
    const isShield=this.type==='shield';
    const hue=isRapid?.56:isShield?.33:.02;
    drawRect(this.pos,vec2(.44,.44),hsl(hue,1,.66));
    drawRect(this.pos,vec2(.64,.64),hsl(hue,1,.62,.24));
  }
}

function actionPressed(){
  return keyWasPressed('Space')||keyWasPressed('Enter')||mouseWasPressed(0);
}

function burst(pos,color,count,size){
  new ParticleEmitter(
    pos,0,.12,.08,count*34,PI,undefined,
    color,color.mutate(.2,.1),hsl(0,0,0,0),hsl(0,0,0,0),
    .45,size||.055,.34,.16,.05,.96,1,.25,PI,.15,.45,false,true,true,1,false
  );
}

function fireBolt(pos,dir){
  bolts.push(new Bolt(pos.add(dir.scale(.45)),dir));
  shootSound.play(pos);
}

function spawnAsteroid(){
  const a=rand(PI*2);
  const spawnPos=vec2(Math.cos(a),Math.sin(a)).scale(rand(11.3,13.6));
  const towardCenter=spawnPos.scale(-1).normalize();
  const tangent=vec2(-towardCenter.y,towardCenter.x).scale(rand(-.45,.45));
  const speed=rand(.8,1.25)+wave*.06;
  const vel=towardCenter.add(tangent).normalize().scale(speed);
  const radius=rand(.38,.72);
  asteroids.push(new Asteroid(spawnPos,vel,radius));
}

function getNearestAsteroid(pos,maxDist){
  let best=null,bestDist=maxDist;
  for(const a of asteroids){
    if(a.destroyed) continue;
    const d=pos.distance(a.pos);
    if(d<bestDist){ bestDist=d; best=a; }
  }
  return best;
}

function damageAsteroid(a,hitPos){
  if(a.destroyed) return;
  a.hp--;
  hitSound.play(hitPos);
  burst(hitPos,hsl(.15,1,.67),14,.045);
  if(a.hp>0) return;

  kills++;
  score+=Math.floor(12+wave*2+runTime*.2);
  burst(a.pos,hsl(.08,1,.6),22,.065);
  maybeDropPowerup(a.pos);
  a.destroy();
}

function maybeDropPowerup(pos){
  if(rand()>.2) return;
  const roll=rand();
  const type=roll<.5?'rapid':roll<.82?'shield':'pulse';
  powerups.push(new Powerup(pos,type));
}

function collectPowerup(p){
  if(p.type==='rapid'){
    defender.rapidTimer=8;
    score+=45;
    messageText='RAPID FIRE';
  }
  else if(p.type==='shield'){
    shield=Math.min(5,shield+1);
    score+=30;
    messageText='SHIELD +1';
  }
  else{
    let wiped=0;
    for(const a of asteroids){
      if(a.destroyed) continue;
      wiped++;
      burst(a.pos,hsl(.01,1,.62),12,.05);
      a.destroy();
    }
    score+=wiped*14;
    messageText='PULSE BLAST';
  }
  messageTimer=1.4;
  powerSound.play(p.pos);
}

function hitPlanet(a){
  if(a.destroyed||state!=='play') return;
  shield--;
  damageSound.play(a.pos);
  burst(vec2(),hsl(.01,1,.62),28,.08);
  a.destroy();

  if(shield<=0) endGame();
}

function prepareWave(){
  waveQuota=6+wave*3;
  waveSpawned=0;
  spawnTimer=.8;
  messageText=`WAVE ${wave}`;
  messageTimer=1.2;
  waveSound.play();
}

function startRun(){
  engineObjectsDestroy();
  asteroids=[];
  bolts=[];
  powerups=[];

  defender=new Defender();
  score=0;
  shield=3;
  kills=0;
  wave=1;
  runTime=0;
  messageText='';
  messageTimer=0;
  prepareWave();
  state='play';
}

function endGame(){
  if(state==='gameover') return;
  state='gameover';
  overSound.play();
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem(SAVE_KEY,String(bestScore));
  }
}

function gameInit(){
  bestScore=Number(localStorage.getItem(SAVE_KEY)||0);
  for(let i=0;i<190;i++)
    stars.push(vec2(rand(-17,17),rand(-11,11)).add(vec2(rand(-.2,.2),rand(-.2,.2))));
}

function gameUpdate(){
  if(state==='start'){
    if(actionPressed()) startRun();
    return;
  }

  if(state==='gameover'){
    if(actionPressed()) startRun();
    return;
  }

  if(keyWasPressed('KeyR')){
    startRun();
    return;
  }

  if(state==='play'&&actionPressed()) defender.flip();

  const dt=timeDelta||1/60;
  runTime+=dt;
  messageTimer=Math.max(0,messageTimer-dt);

  spawnTimer-=dt;
  const interval=Math.max(.24,.95-wave*.06);
  if(waveSpawned<waveQuota&&spawnTimer<=0){
    spawnAsteroid();
    waveSpawned++;
    spawnTimer=interval;
  }

  asteroids=asteroids.filter(a=>!a.destroyed);
  bolts=bolts.filter(b=>!b.destroyed);
  powerups=powerups.filter(p=>!p.destroyed);

  if(waveSpawned>=waveQuota&&asteroids.length===0){
    score+=wave*38;
    wave++;
    prepareWave();
  }
}

function gameUpdatePost(){
  cameraPos=cameraPos.lerp(vec2(),.09);
}

function gameRender(){
  const twinkle=.45+.55*Math.sin(runTime*1.5);
  for(const s of stars)
    drawCircle(s,.045,hsl(.6,1,.8,.22+.18*twinkle));

  for(const r of [2.3,3.6,4.8,6,7.2])
    drawCircle(vec2(),r,hsl(.56,1,.55,.09));

  drawCircle(vec2(),PLANET_R+.28,hsl(.75,1,.35,.28));
  drawCircle(vec2(),PLANET_R,hsl(.56,.85,.4));
  drawCircle(vec2(),PLANET_R*.52,hsl(.15,1,.65));

  if(defender&&state==='play'){
    drawCircle(vec2(),ORBIT_R+.16,hsl(.55,1,.6,.12+.08*Math.sin(runTime*7)));
  }
}

function gameRenderPost(){
  const W=mainCanvasSize.x,H=mainCanvasSize.y;
  drawTextScreen('NEON ORBIT DEFENDER',vec2(W/2,40),44,hsl(.56,1,.73),3,hsl(0,0,0));
  drawTextScreen(`BEST ${bestScore}`,vec2(W-124,30),24,hsl(.33,1,.67),2,hsl(0,0,0));

  if(state==='start'){
    drawTextScreen('Protect the core from asteroid waves',vec2(W/2,H/2-38),30,hsl(.57,.72,.78),2,hsl(0,0,0));
    drawTextScreen('Tap / Space: flip orbit direction',vec2(W/2,H/2),26,hsl(.15,1,.66),2,hsl(0,0,0));
    drawTextScreen('Arrow keys: nudge orbital speed',vec2(W/2,H/2+36),24,hsl(.56,1,.74),2,hsl(0,0,0));
    drawTextScreen('Powerups: rapid fire, shield, pulse blast',vec2(W/2,H/2+72),22,hsl(.33,1,.67),2,hsl(0,0,0));
    drawTextScreen('TAP / SPACE TO START',vec2(W/2,H/2+122),40,hsl(.33,1,.67),3,hsl(0,0,0));
    return;
  }

  drawTextScreen(`SCORE ${score}`,vec2(104,30),26,hsl(.15,1,.67),2,hsl(0,0,0));
  drawTextScreen(`WAVE ${wave}`,vec2(90,60),22,hsl(.56,1,.74),2,hsl(0,0,0));
  drawTextScreen(`SHIELD ${Math.max(0,shield)}`,vec2(102,88),22,shield>1?hsl(.33,1,.68):hsl(.01,1,.62),2,hsl(0,0,0));
  drawTextScreen(`KILLS ${kills}`,vec2(W-110,58),20,hsl(.58,.65,.78),1,hsl(0,0,0));
  drawTextScreen('Tap / Space: reverse orbit',vec2(W/2,H-22),20,hsl(0,0,.78),1,hsl(0,0,0));

  if(defender&&defender.rapidTimer>0)
    drawTextScreen(`RAPID ${defender.rapidTimer.toFixed(1)}s`,vec2(W-118,86),18,hsl(.15,1,.67),2,hsl(0,0,0));

  if(messageTimer>0)
    drawTextScreen(messageText,vec2(W/2,84),30,hsl(.33,1,.67),2,hsl(0,0,0));

  if(state==='gameover'){
    drawTextScreen('CORE BREACHED',vec2(W/2,H/2-16),60,hsl(.01,1,.62),4,hsl(0,0,0));
    drawTextScreen(`FINAL SCORE ${score}`,vec2(W/2,H/2+32),34,hsl(.56,1,.74),3,hsl(0,0,0));
    drawTextScreen('TAP / SPACE TO RETRY',vec2(W/2,H/2+88),30,hsl(.33,1,.67),2,hsl(0,0,0));
  }
}

engineInit(gameInit,gameUpdate,gameUpdatePost,gameRender,gameRenderPost);
</script></body></html>
