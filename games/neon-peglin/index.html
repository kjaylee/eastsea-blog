<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Peglin — Pinball Roguelite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Courier New',monospace;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;user-select:none}
canvas{display:block;touch-action:none;cursor:crosshair}
#ui{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;pointer-events:none;z-index:10}
.panel{background:rgba(10,10,26,0.92);border:1px solid #0ff4;padding:8px 12px;text-align:center}
#overlay{position:fixed;inset:0;background:rgba(10,10,26,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:14px}
#overlay.hidden{display:none}
.title{font-size:2.4em;font-weight:bold;text-shadow:0 0 20px #0ff,0 0 40px #0ff;color:#0ff;letter-spacing:4px}
.sub{color:#888;font-size:.85em}
.btn{background:transparent;border:2px solid #0ff;color:#0ff;padding:12px 32px;font-size:1em;font-family:inherit;cursor:pointer;letter-spacing:2px;transition:all .2s;text-transform:uppercase}
.btn:hover,.btn:active{background:#0ff;color:#0a0a1a;box-shadow:0 0 20px #0ff}
.btn.fire{border-color:#f60;color:#f60}.btn.fire:hover{background:#f60;color:#0a0a1a;box-shadow:0 0 20px #f60}
.btn.ice{border-color:#6cf;color:#6cf}.btn.ice:hover{background:#6cf;color:#0a0a1a;box-shadow:0 0 20px #6cf}
.btn.lightning{border-color:#ff0;color:#ff0}.btn.lightning:hover{background:#ff0;color:#0a0a1a;box-shadow:0 0 20px #ff0}
.hiscore{color:#ff0;font-size:.8em}
.ball-choice{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.ball-info{border:1px solid #333;padding:10px;width:130px;text-align:center;font-size:.75em;color:#aaa}
.ball-info b{display:block;margin-bottom:4px;font-size:1em}
</style>
</head>
<body>
<div id="ui">
  <div class="panel" id="hud" style="display:none">
    <span id="hudFloor">Floor 1</span> &nbsp;|&nbsp;
    <span id="hudBalls">🔵 3</span> &nbsp;|&nbsp;
    <span id="hudScore">Score: 0</span> &nbsp;|&nbsp;
    <span id="hudType">Normal</span>
  </div>
</div>
<canvas id="c"></canvas>

<div id="overlay">
  <div class="title">NEON<br>PEGLIN</div>
  <div class="sub">Pinball Roguelite — Survive 5 Floors</div>
  <div class="hiscore" id="startHi"></div>
  <button class="btn" id="startBtn">▶ START</button>
  <div class="sub" style="font-size:.7em">Drag from launcher ↓ to aim &amp; fire<br>🔥Fire=AoE | ❄️Ice=Slow | ⚡Lightning=Chain</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const HI_KEY = 'neon-peglin-hi';

let W, H, scale;
function resize(){
  const maxW=420, maxH=window.innerHeight;
  W=Math.min(maxW,window.innerWidth); H=maxH;
  canvas.width=W; canvas.height=H;
}
resize();
window.addEventListener('resize',resize);

// Audio
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,type='sine',vol=0.3){
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start(); o.stop(AC.currentTime+dur);
}
function playHit(gold){beep(gold?800:400,0.1,'square',0.2)}
function playFire(){beep(200,0.3,'sawtooth',0.25)}
function playLaunch(){beep(600,0.08,'sine',0.15)}
function playDead(){beep(150,0.5,'square',0.3)}
function playVictory(){[523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'sine',0.3),i*120))}

// Game state
const STATES={START:0,AIMING:1,BALL_FLYING:2,BALL_SELECT:3,GAME_OVER:4,WIN:5};
let state=STATES.START;
let score=0, floor=1, ballsLeft=3, ballType='normal';
let pegs=[], ball=null, particles=[], floatTexts=[];
let enemy={hp:0,maxHp:0,name:'',color:'',dmgFlash:0};
let aimX=0, aimY=0, isDragging=false, dragStart={x:0,y:0};
const LAUNCHER_Y_FRAC=0.88;
const FLOORS=[
  {name:'SLIME',hp:60,color:'#0f0',emoji:'🟢'},
  {name:'GOBLIN',hp:110,color:'#0f8',emoji:'👺'},
  {name:'KNIGHT',hp:170,color:'#08f',emoji:'⚔️'},
  {name:'DRAGON',hp:280,color:'#f40',emoji:'🐉'},
  {name:'BOSS',hp:420,color:'#f0f',emoji:'💀'}
];

function getLauncherPos(){return {x:W/2,y:H*LAUNCHER_Y_FRAC}}

function randPegs(){
  pegs=[];
  const rows=6,cols=6,padX=40,padY=60;
  const gw=(W-padX*2)/(cols-1), gh=(H*0.45-padY)/(rows-1);
  let id=0;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const ox=(r%2)*gw/2;
      const x=padX+c*gw+ox+(Math.random()-0.5)*10;
      const y=padY+H*0.12+r*gh+(Math.random()-0.5)*8;
      const gold=Math.random()<0.15;
      pegs.push({id:id++,x,y,r:7,hit:false,gold,alpha:1});
    }
  }
}

function setEnemy(f){
  const d=FLOORS[f-1];
  enemy.hp=d.hp; enemy.maxHp=d.hp;
  enemy.name=d.name; enemy.color=d.color; enemy.emoji=d.emoji;
  enemy.dmgFlash=0;
}

function startGame(){
  score=0; floor=1; ballsLeft=3; ballType='normal';
  state=STATES.AIMING;
  setEnemy(1);
  randPegs();
  overlay.classList.add('hidden');
  document.getElementById('hud').style.display='block';
  updateHUD();
}

function updateHUD(){
  document.getElementById('hudFloor').textContent=`Floor ${floor}/5`;
  document.getElementById('hudBalls').textContent=`🔵 ${ballsLeft}`;
  document.getElementById('hudScore').textContent=`Score: ${score}`;
  const types={normal:'⚪Normal',fire:'🔥Fire',ice:'❄️Ice',lightning:'⚡Lightning'};
  document.getElementById('hudType').textContent=types[ballType]||ballType;
}

// Physics constants
const GRAVITY=0.25, DAMPING=0.72, BALL_R=9;

function launchBall(fromX,fromY,toX,toY){
  const dx=fromX-toX, dy=fromY-toY;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const speed=Math.min(12,dist*0.12+4);
  ball={x:fromX,y:fromY,vx:(-dx/dist)*speed,vy:(-dy/dist)*speed,r:BALL_R,active:true,hitCount:0};
  state=STATES.BALL_FLYING;
  playLaunch();
}

function applyBallEffect(peg){
  let dmg=0;
  if(ballType==='fire'){
    dmg=18;
    // AoE: also hit adjacent pegs
    pegs.forEach(p=>{
      if(!p.hit&&p.id!==peg.id){
        const d=Math.hypot(p.x-peg.x,p.y-peg.y);
        if(d<70){p.hit=true;addParticle(p.x,p.y,'#f60');score+=peg.gold?5:2;}
      }
    });
    addParticle(peg.x,peg.y,'#f80',12);
    playFire();
  } else if(ballType==='lightning'){
    dmg=14;
    // Chain to 2 nearest pegs
    const nearby=pegs.filter(p=>!p.hit&&p.id!==peg.id)
      .sort((a,b)=>Math.hypot(a.x-peg.x,a.y-peg.y)-Math.hypot(b.x-peg.x,b.y-peg.y))
      .slice(0,2);
    nearby.forEach(p=>{p.hit=true;addParticle(p.x,p.y,'#ff0');dmg+=7;score+=peg.gold?5:2;});
    addParticle(peg.x,peg.y,'#ff0',8);
    beep(900,0.15,'square',0.2);
  } else if(ballType==='ice'){
    dmg=10;
    addParticle(peg.x,peg.y,'#6cf',8);
    beep(500,0.1,'sine',0.2);
  } else {
    dmg=peg.gold?20:10;
    playHit(peg.gold);
  }
  return dmg;
}

function pegHit(peg){
  if(peg.hit)return;
  peg.hit=true;
  const dmg=applyBallEffect(peg);
  enemy.hp=Math.max(0,enemy.hp-dmg);
  enemy.dmgFlash=8;
  score+=peg.gold?15:5;
  addFloatText(peg.x,peg.y-10,`-${dmg}`,peg.gold?'#ff0':'#f44');
  updateHUD();
}

function addParticle(x,y,col,n=6){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:20+Math.random()*20,col});
  }
}

function addFloatText(x,y,txt,col){
  floatTexts.push({x,y,txt,col,life:40});
}

function updatePhysics(){
  if(!ball||!ball.active)return;
  ball.vy+=GRAVITY;
  ball.x+=ball.vx; ball.y+=ball.vy;

  // Wall bounce
  if(ball.x<ball.r){ball.x=ball.r;ball.vx=Math.abs(ball.vx)*DAMPING;}
  if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx)*DAMPING;}
  if(ball.y<ball.r){ball.y=ball.r;ball.vy=Math.abs(ball.vy)*DAMPING;}

  // Peg collisions
  pegs.forEach(peg=>{
    if(peg.hit)return;
    const dx=ball.x-peg.x, dy=ball.y-peg.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<ball.r+peg.r){
      // Resolve overlap
      const nx=dx/dist, ny=dy/dist;
      ball.x=peg.x+nx*(ball.r+peg.r+0.5);
      ball.y=peg.y+ny*(ball.r+peg.r+0.5);
      // Reflect velocity
      const dot=ball.vx*nx+ball.vy*ny;
      ball.vx=(ball.vx-2*dot*nx)*DAMPING;
      ball.vy=(ball.vy-2*dot*ny)*DAMPING;
      pegHit(peg);
    }
  });

  // Ball exits bottom
  if(ball.y>H+20){
    ball.active=false;
    ball=null;
    ballsLeft--;
    if(enemy.hp<=0){
      floorClear();
    } else if(ballsLeft<=0){
      gameOver();
    } else {
      state=STATES.AIMING;
      updateHUD();
    }
  }
}

function floorClear(){
  playVictory();
  score+=floor*50;
  if(floor>=5){showWin();return;}
  // Reset pegs with 1 more ball
  pegs.forEach(p=>p.hit=false);
  showBallSelect();
}

function showBallSelect(){
  state=STATES.BALL_SELECT;
  overlay.classList.remove('hidden');
  overlay.innerHTML=`
    <div class="title" style="font-size:1.6em">FLOOR ${floor} CLEAR!</div>
    <div class="sub">+${floor*50} bonus pts — Choose next ball type</div>
    <div class="ball-choice">
      <div class="ball-info">
        <b style="color:#f66">🔥 FIRE</b>
        AoE explosion<br>hits nearby pegs<br>+18 dmg
        <br><br><button class="btn fire" onclick="selectBall('fire')">SELECT</button>
      </div>
      <div class="ball-info">
        <b style="color:#6cf">❄️ ICE</b>
        Freezes pegs<br>visual slow effect<br>+10 dmg
        <br><br><button class="btn ice" onclick="selectBall('ice')">SELECT</button>
      </div>
      <div class="ball-info">
        <b style="color:#ff0">⚡ LIGHTNING</b>
        Chains to 2<br>nearby pegs<br>+14+7 dmg
        <br><br><button class="btn lightning" onclick="selectBall('lightning')">SELECT</button>
      </div>
    </div>
  `;
}

window.selectBall=function(type){
  ballType=type;
  floor++;
  ballsLeft=Math.max(ballsLeft,1)+1; // carry over + 1 bonus
  setEnemy(floor);
  randPegs();
  state=STATES.AIMING;
  overlay.classList.add('hidden');
  overlay.innerHTML=''; // reset
  // rebuild overlay for future game over
  updateHUD();
};

function showWin(){
  state=STATES.WIN;
  const hi=Math.max(score,parseInt(localStorage.getItem(HI_KEY)||'0'));
  localStorage.setItem(HI_KEY,hi);
  overlay.classList.remove('hidden');
  overlay.innerHTML=`
    <div class="title" style="color:#ff0">VICTORY!</div>
    <div class="sub">All 5 floors conquered!</div>
    <div style="color:#0ff;font-size:1.3em">Score: ${score}</div>
    <div class="hiscore">Best: ${hi}</div>
    <button class="btn" onclick="resetToStart()">▶ PLAY AGAIN</button>
  `;
}

function gameOver(){
  state=STATES.GAME_OVER;
  playDead();
  const hi=Math.max(floor,parseInt(localStorage.getItem(HI_KEY)||'0'));
  localStorage.setItem(HI_KEY,hi);
  setTimeout(()=>{
    overlay.classList.remove('hidden');
    overlay.innerHTML=`
      <div class="title" style="color:#f44">GAME OVER</div>
      <div class="sub">Defeated on Floor ${floor}</div>
      <div style="color:#0ff;font-size:1.2em">Score: ${score}</div>
      <div class="hiscore">Best Floor: ${hi}</div>
      <button class="btn" onclick="resetToStart()">▶ RETRY</button>
    `;
  },800);
}

window.resetToStart=function(){
  overlay.classList.remove('hidden');
  overlay.innerHTML=`
    <div class="title">NEON<br>PEGLIN</div>
    <div class="sub">Pinball Roguelite — Survive 5 Floors</div>
    <div class="hiscore" id="startHi">Best Floor: ${localStorage.getItem(HI_KEY)||0}</div>
    <button class="btn" id="startBtn">▶ START</button>
    <div class="sub" style="font-size:.7em">Drag from launcher ↓ to aim & fire</div>
  `;
  document.getElementById('startBtn').addEventListener('click',()=>{AC.resume();startGame();});
  state=STATES.START;
};

// Drawing
function drawGlow(x,y,r,col,alpha=1){
  ctx.save();
  ctx.globalAlpha=alpha;
  const g=ctx.createRadialGradient(x,y,0,x,y,r*2.5);
  g.addColorStop(0,col);
  g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*2.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPegs(){
  pegs.forEach(p=>{
    if(p.hit){p.alpha=Math.max(0,p.alpha-0.05);if(p.alpha<=0)return;}
    ctx.save();
    ctx.globalAlpha=p.alpha*(p.hit?0.3:1);
    const col=p.gold?'#ff8c00':'#00ccff';
    drawGlow(p.x,p.y,p.r,col,p.alpha*0.4);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.restore();
  });
}

function drawBall(){
  if(!ball)return;
  const cols={normal:'#0ff',fire:'#f60',ice:'#6cf',lightning:'#ff0'};
  const col=cols[ballType]||'#0ff';
  drawGlow(ball.x,ball.y,ball.r,col,0.6);
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fillStyle=col; ctx.fill();
}

function drawEnemy(){
  const ex=W/2, ey=H*0.07, ew=W*0.7;
  // Enemy icon
  ctx.save();
  ctx.font=`${Math.min(36,W*0.09)}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  if(enemy.dmgFlash>0){ctx.globalAlpha=0.5+0.5*Math.sin(enemy.dmgFlash*1.2);enemy.dmgFlash--;}
  ctx.fillText(enemy.emoji||'👾',ex,ey-4);
  ctx.restore();
  // HP bar bg
  const bx=ex-ew/2, by=H*0.115, bh=10;
  ctx.fillStyle='#333';
  ctx.fillRect(bx,by,ew,bh);
  // HP fill
  const pct=Math.max(0,enemy.hp/enemy.maxHp);
  const hcol=pct>0.5?'#0f0':pct>0.25?'#ff0':'#f00';
  ctx.shadowColor=hcol; ctx.shadowBlur=6;
  ctx.fillStyle=hcol;
  ctx.fillRect(bx,by,ew*pct,bh);
  ctx.shadowBlur=0;
  // HP text
  ctx.fillStyle='#fff'; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText(`${enemy.name} ${enemy.hp}/${enemy.maxHp}`,ex,by+bh+10);
}

function drawAimLine(){
  if(state!==STATES.AIMING||!isDragging)return;
  const lp=getLauncherPos();
  const dx=lp.x-aimX, dy=lp.y-aimY;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  ctx.save();
  ctx.setLineDash([6,8]);
  ctx.strokeStyle='rgba(0,255,255,0.5)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(lp.x,lp.y);
  // Predict trajectory (simplified arc)
  const sp=Math.min(12,dist*0.12+4);
  let px=lp.x,py=lp.y,pvx=(-dx/dist)*sp,pvy=(-dy/dist)*sp;
  for(let i=0;i<30;i++){
    pvy+=GRAVITY;pvx*=0.999;
    px+=pvx;py+=pvy;
    if(px<0||px>W||py>H)break;
    ctx.lineTo(px,py);
  }
  ctx.stroke();
  ctx.restore();
}

function drawLauncher(){
  const lp=getLauncherPos();
  const cols={normal:'#0ff',fire:'#f60',ice:'#6cf',lightning:'#ff0'};
  const col=cols[ballType]||'#0ff';
  // Base
  ctx.save();
  ctx.strokeStyle=col; ctx.lineWidth=2;
  ctx.shadowColor=col; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.arc(lp.x,lp.y,15,0,Math.PI*2); ctx.stroke();
  // Inner circle
  ctx.beginPath(); ctx.arc(lp.x,lp.y,6,0,Math.PI*2);
  ctx.fillStyle=col; ctx.fill();
  ctx.restore();
  // Ball count indicator
  ctx.fillStyle='rgba(0,255,255,0.6)'; ctx.font='11px monospace'; ctx.textAlign='center';
  ctx.fillText(`×${ballsLeft}`,lp.x,lp.y+28);
}

function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    ctx.save();
    ctx.globalAlpha=p.life/40;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  particles=particles.filter(p=>p.life>0);
}

function drawFloatTexts(){
  floatTexts.forEach(ft=>{
    ft.y-=0.8; ft.life--;
    ctx.save();
    ctx.globalAlpha=ft.life/40;
    ctx.fillStyle=ft.col;
    ctx.font='bold 13px monospace';
    ctx.textAlign='center';
    ctx.fillText(ft.txt,ft.x,ft.y);
    ctx.restore();
  });
  floatTexts=floatTexts.filter(ft=>ft.life>0);
}

function draw(){
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);

  // Grid lines faint
  ctx.save();
  ctx.strokeStyle='rgba(0,255,255,0.04)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();

  if(state===STATES.AIMING||state===STATES.BALL_FLYING){
    drawEnemy();
    drawPegs();
    drawAimLine();
    drawLauncher();
    drawBall();
    drawParticles();
    drawFloatTexts();
  } else if(state===STATES.START||state===STATES.BALL_SELECT||
            state===STATES.GAME_OVER||state===STATES.WIN){
    // background animation
    drawParticles();
  }

  // Score overlay during play
  if(state===STATES.AIMING||state===STATES.BALL_FLYING){
    ctx.fillStyle='rgba(0,255,255,0.15)';
    ctx.font='bold 48px monospace';
    ctx.textAlign='center';
    ctx.fillText(score,W/2,H-50);
  }
}

function loop(){
  requestAnimationFrame(loop);
  if(state===STATES.BALL_FLYING)updatePhysics();
  draw();
}

// Input
function getPos(e){
  const r=canvas.getBoundingClientRect();
  const touch=e.touches?e.touches[0]:e;
  return {x:(touch.clientX-r.left),y:(touch.clientY-r.top)};
}

canvas.addEventListener('mousedown',e=>{
  if(state!==STATES.AIMING)return;
  AC.resume();
  isDragging=true;
  const p=getPos(e);
  dragStart={x:p.x,y:p.y};
  aimX=p.x; aimY=p.y;
});
canvas.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const p=getPos(e);
  aimX=p.x; aimY=p.y;
});
canvas.addEventListener('mouseup',e=>{
  if(!isDragging||state!==STATES.AIMING)return;
  isDragging=false;
  const lp=getLauncherPos();
  const p=getPos(e);
  if(Math.hypot(p.x-lp.x,p.y-lp.y)>20){
    launchBall(lp.x,lp.y,p.x,p.y);
  }
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state!==STATES.AIMING)return;
  AC.resume();
  isDragging=true;
  const p=getPos(e);
  aimX=p.x; aimY=p.y;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!isDragging)return;
  const p=getPos(e);
  aimX=p.x; aimY=p.y;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!isDragging||state!==STATES.AIMING)return;
  isDragging=false;
  const lp=getLauncherPos();
  if(Math.hypot(aimX-lp.x,aimY-lp.y)>20){
    launchBall(lp.x,lp.y,aimX,aimY);
  }
},{passive:false});

document.getElementById('startBtn').addEventListener('click',()=>{AC.resume();startGame();});

// Init hi-score display
const hiVal=localStorage.getItem(HI_KEY)||0;
document.getElementById('startHi').textContent=`Best Floor: ${hiVal}`;

loop();
</script>
</body>
</html>
