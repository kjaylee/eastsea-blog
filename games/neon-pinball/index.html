<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<title>Neon Pinball</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:#0a0a1a;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  font-family:'Courier New',monospace;color:#fff;
  overflow:hidden;touch-action:none;user-select:none;
}
#hud{
  width:100%;max-width:380px;
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 12px;
  background:rgba(0,255,255,0.05);
  border-bottom:1px solid rgba(0,255,255,0.2);
  font-size:13px;
}
.score-label{color:#888;font-size:10px;letter-spacing:1px;text-transform:uppercase}
.score-val{color:#0ff;font-size:20px;font-weight:bold;text-shadow:0 0 10px #0ff;line-height:1.1}
.lives{display:flex;gap:4px;align-items:center;font-size:18px}
#canvas-wrap{position:relative;width:100%;max-width:380px;flex:1;display:flex;justify-content:center}
canvas{display:block;background:#0a0a1a}
#overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  background:rgba(10,10,26,0.88);
}
#overlay h1{font-size:32px;color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff;letter-spacing:3px}
#overlay p{font-size:13px;color:#aaa;text-align:center;max-width:280px;line-height:1.6}
#overlay .hi{color:#ff0;font-size:14px;text-shadow:0 0 8px #ff0}
#btn{
  padding:12px 36px;background:transparent;border:2px solid #0ff;
  color:#0ff;font-size:16px;letter-spacing:2px;cursor:pointer;
  font-family:inherit;text-shadow:0 0 8px #0ff;
  box-shadow:0 0 15px #0ff4;transition:.2s;
}
#btn:hover{background:#0ff2;box-shadow:0 0 25px #0ff8}
#tip{position:absolute;bottom:56px;left:0;right:0;text-align:center;font-size:10px;color:#444;pointer-events:none}
</style>
</head>
<body>
<div id="hud">
  <div><div class="score-label">Score</div><div class="score-val" id="sc">0</div></div>
  <div style="text-align:center"><div class="score-label">Best</div><div class="score-val" id="hi" style="color:#ff0;text-shadow:0 0 10px #ff0">0</div></div>
  <div><div class="score-label">Balls</div><div class="lives" id="lives">●●●</div></div>
</div>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>PINBALL</h1>
    <p>Z / ← Left Flipper<br>X / → Right Flipper<br>SPACE = Launch<br><br>Touch left/right bottom half for flippers</p>
    <div class="hi" id="ob-hi"></div>
    <button id="btn">PLAY</button>
  </div>
  <div id="tip">Z/← Left · X/→ Right · SPACE Launch</div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const btnEl=document.getElementById('btn');
const scEl=document.getElementById('sc');
const hiEl=document.getElementById('hi');
const livesEl=document.getElementById('lives');
const obHiEl=document.getElementById('ob-hi');

// Audio
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur=0.06,vol=0.3,type='square'){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.value=freq;o.type=type;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
function sndBumper(){beep(600+Math.random()*200,0.08,0.4,'sawtooth')}
function sndFlipper(){beep(180,0.05,0.2,'sine')}
function sndLose(){
  [300,250,200,150].forEach((f,i)=>setTimeout(()=>beep(f,0.15,0.3,'sawtooth'),i*100));
}
function sndScore(){beep(880,0.06,0.3,'sine');setTimeout(()=>beep(1100,0.06,0.2,'sine'),80)}
function sndLaunch(){
  [100,150,200,250,350].forEach((f,i)=>setTimeout(()=>beep(f,0.04,0.25,'sine'),i*30));
}

// Sizing
let W,H,scale;
function resize(){
  const wrap=document.getElementById('canvas-wrap');
  const maxW=Math.min(380,window.innerWidth);
  const maxH=window.innerHeight-document.getElementById('hud').offsetHeight-4;
  // maintain 380:640 aspect, fit in maxW x maxH
  const asp=380/640;
  if(maxW/maxH>asp){H=maxH;W=H*asp;}
  else{W=maxW;H=W/asp;}
  W=Math.floor(W);H=Math.floor(H);
  canvas.width=W;canvas.height=H;
  scale=W/380;
}
window.addEventListener('resize',()=>{resize();if(game.state!=='playing')drawIdle()});
resize();

// Game state
const game={
  state:'idle', // idle | ready | playing | dead | over
  score:0, hi:parseInt(localStorage.getItem('pb-hi')||0),
  balls:3,
  ballOnPlunger:true,
  plungerCharge:0, // 0-1
  plungerHeld:false,
  combo:0,
  comboTimer:0
};

// Physics constants (all in 380x640 space, scaled by 'scale')
const G=0.28; // gravity
const BALL_R=9;

// Ball
const ball={x:0,y:0,vx:0,vy:0,active:false};

// Flippers
const FL={ // left flipper
  px:112,py:582,len:75,
  restAngle:28, activeAngle:-18, // degrees from horizontal
  angle:28, targetAngle:28, active:false
};
const FR={ // right flipper
  px:268,py:582,len:75,
  restAngle:152, activeAngle:198,
  angle:152, targetAngle:152, active:false
};

// Bumpers
const bumpers=[
  {x:140,y:220,r:22,pts:200,lit:0,col:'#ff00ff'},
  {x:240,y:200,r:22,pts:200,lit:0,col:'#00ffff'},
  {x:190,y:160,r:22,pts:300,lit:0,col:'#ffff00'},
  {x:120,y:300,r:20,pts:150,lit:0,col:'#ff4400'},
  {x:260,y:310,r:20,pts:150,lit:0,col:'#44ff00'},
];

// Lane guides (left and right rails, slanted walls near flippers)
const walls=[
  // main walls
  {x1:30,y1:0,x2:30,y2:530,w:4},
  {x1:350,y1:0,x2:350,y2:530,w:4},
  // top wall
  {x1:30,y1:10,x2:350,y2:10,w:4},
  // launch lane right wall
  {x1:364,y1:0,x2:364,y2:600,w:4},
  // launch lane left wall (plunger lane)
  {x1:350,y1:100,x2:350,y2:580,w:4},
  // left inlane guide
  {x1:30,y1:530,x2:80,y2:580,w:4},
  // right inlane guide
  {x1:350,y1:530,x2:300,y2:580,w:4},
  // flipper gap walls (small side walls below flippers)
  {x1:30,y1:580,x2:80,y2:620,w:4},
  {x1:350,y1:580,x2:300,y2:620,w:4},
];

// Slingshots (triangular bumpers near flippers)
const slings=[
  {x1:55,y1:430,x2:80,y2:510,pts:50,col:'#ff8800',lit:0},
  {x1:325,y1:430,x2:300,y2:510,pts:50,col:'#ff8800',lit:0},
];

// Score popups
const pops=[];

function resetBall(){
  ball.x=(350+364)/2*scale;
  ball.y=(560)*scale;
  ball.vx=0;ball.vy=0;
  ball.active=false;
  game.ballOnPlunger=true;
  game.plungerCharge=0;
  game.plungerHeld=false;
}

function startGame(){
  game.score=0;game.balls=3;
  game.state='playing';game.combo=0;game.comboTimer=0;
  resetBall();
  overlay.style.display='none';
  updateHUD();
  loop();
}

function updateHUD(){
  scEl.textContent=game.score;
  hiEl.textContent=game.hi;
  obHiEl.textContent=game.hi>0?`Best: ${game.hi}`:'';
  let l='';for(let i=0;i<game.balls;i++)l+='●';
  livesEl.textContent=l||'';
}

// --- Flipper helpers ---
function flipperTip(f){
  const a=f.angle*Math.PI/180;
  return{x:f.px+Math.cos(a)*f.len,y:f.py+Math.sin(a)*f.len};
}
function closestPointOnSegment(ax,ay,bx,by,px,py){
  const dx=bx-ax,dy=by-ay;
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));
  return{x:ax+t*dx,y:ay+t*dy,t};
}
function dist2(ax,ay,bx,by){return(ax-bx)**2+(ay-by)**2}

// --- Collision: ball vs line segment ---
function collideLine(x1,y1,x2,y2,normalFlip=1){
  const s=scale;
  const sx1=x1*s,sy1=y1*s,sx2=x2*s,sy2=y2*s;
  const cp=closestPointOnSegment(sx1,sy1,sx2,sy2,ball.x,ball.y);
  const d=Math.sqrt(dist2(cp.x,cp.y,ball.x,ball.y));
  const r=BALL_R*s;
  if(d<r&&d>0.001){
    const nx=(ball.x-cp.x)/d,ny=(ball.y-cp.y)/d;
    ball.x=cp.x+nx*r*1.01;ball.y=cp.y+ny*r*1.01;
    const dot=ball.vx*nx+ball.vy*ny;
    if(dot<0){ball.vx-=2*dot*nx*0.7;ball.vy-=2*dot*ny*0.7;}
    return true;
  }
  return false;
}

// Ball vs circle bumper
function collideBumper(b){
  const s=scale;
  const bx=b.x*s,by=b.y*s,br=b.r*s;
  const dx=ball.x-bx,dy=ball.y-by;
  const d=Math.sqrt(dx*dx+dy*dy);
  const r=BALL_R*s+br;
  if(d<r&&d>0.001){
    const nx=dx/d,ny=dy/d;
    ball.x=bx+nx*r*1.01;ball.y=by+ny*r*1.01;
    const spd=Math.sqrt(ball.vx**2+ball.vy**2);
    const boost=Math.max(spd*1.2,8*s);
    ball.vx=nx*boost;ball.vy=ny*boost;
    b.lit=20;
    game.combo++;game.comboTimer=120;
    const pts=b.pts*(1+Math.floor(game.combo/3));
    game.score+=pts;
    if(game.score>game.hi){game.hi=game.score;localStorage.setItem('pb-hi',game.hi);}
    pops.push({x:b.x*s,y:(b.y-30)*s,txt:'+'+pts,t:60,col:b.col});
    sndBumper();updateHUD();
    return true;
  }
  return false;
}

// Ball vs flipper
function collideFlipper(f){
  const s=scale;
  const tip=flipperTip(f);
  const cp=closestPointOnSegment(f.px*s,f.py*s,tip.x*s,tip.y*s,ball.x,ball.y);
  const dx=ball.x-cp.x,dy=ball.y-cp.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  const r=(BALL_R+4)*s;
  if(d<r&&d>0.001){
    const nx=dx/d,ny=dy/d;
    ball.x=cp.x+nx*r*1.02;ball.y=cp.y+ny*r*1.02;
    const dot=ball.vx*nx+ball.vy*ny;
    if(dot<0){
      ball.vx-=2*dot*nx;ball.vy-=2*dot*ny;
      // Add flipper velocity boost if active
      if(f.active){ball.vy-=5*s;ball.vx+=(f===FL?-1:1)*2*s;}
      ball.vx*=0.75;ball.vy*=0.75;
    }
    return true;
  }
  return false;
}

let animId=null;
function loop(){
  if(game.state!=='playing'){return;}
  update();draw();
  animId=requestAnimationFrame(loop);
}

function update(){
  const s=scale;
  // Update flipper angles
  [FL,FR].forEach(f=>{
    f.targetAngle=f.active?f.activeAngle:f.restAngle;
    const diff=f.targetAngle-f.angle;
    f.angle+=diff*0.35;
  });

  // Combo timer
  if(game.comboTimer>0){game.comboTimer--;if(game.comboTimer===0)game.combo=0;}
  // Bumper lit decay
  bumpers.forEach(b=>{if(b.lit>0)b.lit--;});
  slings.forEach(b=>{if(b.lit>0)b.lit--;});
  // Pop timers
  for(let i=pops.length-1;i>=0;i--){
    pops[i].t--;pops[i].y-=s*0.3;
    if(pops[i].t<=0)pops.splice(i,1);
  }

  if(game.ballOnPlunger){
    // Plunger charging
    if(game.plungerHeld){
      game.plungerCharge=Math.min(1,game.plungerCharge+0.025);
    }
    return;
  }

  // Ball physics
  ball.vy+=G*s;
  ball.vx*=0.999;ball.vy*=0.999;
  ball.x+=ball.vx;ball.y+=ball.vy;

  // Wall collisions
  const lx=30*s,rx=350*s,ty=10*s;
  const lr=(BALL_R)*s;

  // Left wall
  if(ball.x-lr<lx){ball.x=lx+lr;ball.vx=Math.abs(ball.vx)*0.75;}
  // Right wall (only if not in plunger lane)
  if(ball.x+lr>rx&&ball.y>100*s){ball.x=rx-lr;ball.vx=-Math.abs(ball.vx)*0.75;}
  // Top wall
  if(ball.y-lr<ty){ball.y=ty+lr;ball.vy=Math.abs(ball.vy)*0.8;}
  // Right outer wall
  if(ball.x+lr>364*s){ball.x=364*s-lr;ball.vx=-Math.abs(ball.vx)*0.75;}

  // Left inlane guide
  collideLine(30,530,80,580);
  // Right inlane guide
  collideLine(350,530,300,580);

  // Slingshots
  slings.forEach(sl=>{
    if(collideLine(sl.x1,sl.y1,sl.x2,sl.y2)){
      sl.lit=15;
      game.score+=sl.pts;
      if(game.score>game.hi){game.hi=game.score;localStorage.setItem('pb-hi',game.hi);}
      updateHUD();
    }
  });

  // Bumpers
  bumpers.forEach(b=>collideBumper(b));

  // Flippers
  collideFlipper(FL);collideFlipper(FR);

  // Lost ball
  if(ball.y>640*s){
    ball.active=false;
    game.balls--;
    sndLose();
    updateHUD();
    if(game.balls<=0){
      game.state='over';
      if(game.score>game.hi){game.hi=game.score;localStorage.setItem('pb-hi',game.hi);}
      showOver();
    } else {
      game.state='playing';
      setTimeout(()=>resetBall(),1200);
    }
  }
}

function showOver(){
  overlay.style.display='flex';
  overlay.querySelector('h1').textContent='GAME OVER';
  overlay.querySelector('p').textContent=`Score: ${game.score}\n`;
  obHiEl.textContent=`Best: ${game.hi}`;
  btnEl.textContent='PLAY AGAIN';
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const s=scale;

  // Background grid
  ctx.strokeStyle='rgba(0,255,255,0.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=20*s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=20*s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Draw walls
  function glowLine(x1,y1,x2,y2,col='#0ff',w=2){
    ctx.save();
    ctx.strokeStyle=col;ctx.lineWidth=w*s;
    ctx.shadowColor=col;ctx.shadowBlur=8*s;
    ctx.beginPath();ctx.moveTo(x1*s,y1*s);ctx.lineTo(x2*s,y2*s);ctx.stroke();
    ctx.restore();
  }
  glowLine(30,0,30,560);glowLine(350,0,350,100);
  glowLine(30,10,350,10);
  glowLine(30,530,80,580,'#08f');
  glowLine(350,530,300,580,'#08f');
  glowLine(364,0,364,600,'#08f');
  glowLine(350,100,364,100,'#08f');

  // Slingshots
  slings.forEach(sl=>{
    const col=sl.lit>0?'#fff':sl.col;
    glowLine(sl.x1,sl.y1,sl.x2,sl.y2,col,3);
  });

  // Bumpers
  bumpers.forEach(b=>{
    const bx=b.x*s,by=b.y*s,br=b.r*s;
    const lit=b.lit>0;
    ctx.save();
    ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);
    ctx.fillStyle=lit?b.col+'88':'#1a1a2e';
    ctx.shadowColor=b.col;ctx.shadowBlur=lit?24*s:10*s;
    ctx.fill();
    ctx.strokeStyle=b.col;ctx.lineWidth=2*s;
    ctx.stroke();
    ctx.fillStyle=lit?'#fff':b.col;
    ctx.font=`bold ${10*s}px Courier New`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowBlur=6*s;ctx.fillText(b.pts,bx,by);
    ctx.restore();
  });

  // Flippers
  function drawFlipper(f,col='#0ff'){
    const tip=flipperTip(f);
    ctx.save();
    ctx.strokeStyle=col;ctx.lineWidth=10*s;ctx.lineCap='round';
    ctx.shadowColor=col;ctx.shadowBlur=14*s;
    ctx.beginPath();ctx.moveTo(f.px*s,f.py*s);ctx.lineTo(tip.x*s,tip.y*s);ctx.stroke();
    ctx.lineWidth=4*s;ctx.shadowBlur=6*s;
    ctx.strokeStyle='#fff';ctx.globalAlpha=0.4;ctx.stroke();
    ctx.restore();
  }
  drawFlipper(FL,'#0ff');drawFlipper(FR,'#ff00aa');

  // Plunger lane
  if(game.ballOnPlunger){
    const charge=game.plungerCharge;
    const px=357*s,py=(580-charge*80)*s;
    // plunger bar
    ctx.save();
    ctx.fillStyle=`hsl(${120-charge*120},100%,55%)`;
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10*s;
    ctx.fillRect(352*s,py,10*s,(580*s-py));
    // power indicator
    ctx.fillStyle='#fff';ctx.globalAlpha=0.6;
    ctx.font=`${9*s}px Courier New`;ctx.textAlign='center';
    ctx.fillText(`${Math.round(charge*100)}%`,357*s,572*s);
    ctx.restore();
  }

  // Ball
  if(!game.ballOnPlunger||true){
    const bx=ball.x,by=ball.y;
    ctx.save();
    const grad=ctx.createRadialGradient(bx-2*s,by-2*s,0,bx,by,BALL_R*s);
    grad.addColorStop(0,'#fff');
    grad.addColorStop(0.4,'#aef');
    grad.addColorStop(1,'#0af');
    ctx.fillStyle=grad;
    ctx.shadowColor='#0ff';ctx.shadowBlur=20*s;
    ctx.beginPath();ctx.arc(bx,by,BALL_R*s,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Score popups
  pops.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.t/60;
    ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=8*s;
    ctx.font=`bold ${12*s}px Courier New`;ctx.textAlign='center';
    ctx.fillText(p.txt,p.x,p.y);
    ctx.restore();
  });

  // Combo
  if(game.combo>=3){
    ctx.save();
    ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';ctx.shadowBlur=10*s;
    ctx.font=`bold ${11*s}px Courier New`;ctx.textAlign='center';
    ctx.fillText(`x${game.combo} COMBO`,W/2,30*s);
    ctx.restore();
  }
}

function drawIdle(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,255,255,0.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=20*scale){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=20*scale){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}
drawIdle();
hiEl.textContent=game.hi;obHiEl.textContent=game.hi>0?`Best: ${game.hi}`:'';

// Input
const keys={};
window.addEventListener('keydown',e=>{
  if(game.state!=='playing')return;
  if(e.code==='ArrowLeft'||e.code==='KeyZ'){if(!FL.active){FL.active=true;sndFlipper();}}
  if(e.code==='ArrowRight'||e.code==='KeyX'){if(!FR.active){FR.active=true;sndFlipper();}}
  if((e.code==='Space')&&game.ballOnPlunger){game.plungerHeld=true;e.preventDefault();}
});
window.addEventListener('keyup',e=>{
  if(game.state!=='playing')return;
  if(e.code==='ArrowLeft'||e.code==='KeyZ')FL.active=false;
  if(e.code==='ArrowRight'||e.code==='KeyX')FR.active=false;
  if(e.code==='Space'&&game.ballOnPlunger){
    // Launch!
    const charge=game.plungerCharge;
    game.plungerHeld=false;game.plungerCharge=0;
    game.ballOnPlunger=false;
    ball.vy=-(8+charge*14)*scale;
    ball.vx=0;ball.active=true;
    sndLaunch();
  }
});

// Touch controls
let touchLeftActive=false,touchRightActive=false;
let touchPlungerHeld=false,touchPlungerStart=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(AC.state==='suspended')AC.resume();
  if(game.state!=='playing')return;
  Array.from(e.changedTouches).forEach(t=>{
    const x=t.clientX-canvas.getBoundingClientRect().left;
    const y=t.clientY-canvas.getBoundingClientRect().top;
    if(y>H*0.7){
      if(x<W*0.5){if(!FL.active){FL.active=true;sndFlipper();}}
      else{if(!FR.active){FR.active=true;sndFlipper();}}
    } else if(x>W*0.82&&game.ballOnPlunger){
      touchPlungerHeld=true;game.plungerHeld=true;
    }
  });
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(game.state!=='playing')return;
  Array.from(e.changedTouches).forEach(t=>{
    const x=t.clientX-canvas.getBoundingClientRect().left;
    const y=t.clientY-canvas.getBoundingClientRect().top;
    if(y>H*0.7){
      if(x<W*0.5)FL.active=false;
      else FR.active=false;
    }
    if(touchPlungerHeld){
      touchPlungerHeld=false;game.plungerHeld=false;
      const charge=game.plungerCharge;
      game.plungerCharge=0;
      if(game.ballOnPlunger){
        game.ballOnPlunger=false;
        ball.vy=-(8+charge*14)*scale;
        ball.vx=0;ball.active=true;
        sndLaunch();
      }
    }
  });
},{passive:false});

btnEl.addEventListener('click',()=>{
  if(AC.state==='suspended')AC.resume();
  startGame();
});
btnEl.addEventListener('touchend',e=>{
  e.preventDefault();
  if(AC.state==='suspended')AC.resume();
  startGame();
});
</script>
