<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a1a">
  <title>Neon Pipe Grid Overdrive</title>
  <style>
    :root{
      --bg:#0a0a1a;
      --panel:#101632;
      --neon:#43f7ff;
      --neon2:#ff4ed1;
      --text:#d9edff;
      --good:#67ff9f;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    body{display:flex;justify-content:center;align-items:stretch}
    .app{width:min(100vw,620px);padding:12px;display:flex;flex-direction:column;gap:10px}
    .hud{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .card{background:var(--panel);border:1px solid #2d3f84;border-radius:12px;padding:10px;text-align:center;font-weight:700;font-size:13px}
    canvas{width:100%;max-width:100%;aspect-ratio:1/1;border-radius:14px;border:1px solid #2d3f84;background:radial-gradient(circle at 50% 10%,#1a2350 0%,#0a0a1a 48%,#070712 100%);touch-action:manipulation}
    .row{display:flex;gap:8px}
    .btn{flex:1;padding:12px;border-radius:12px;border:1px solid #3456c0;background:#18255f;color:var(--text);font-weight:700;font-size:15px}
    .btn:active{transform:translateY(1px);box-shadow:0 0 18px #43f7ff77 inset}
    .hint{font-size:12px;text-align:center;color:#a4beff}
  </style>
</head>
<body>
  <main class="app">
    <section class="hud">
      <div class="card">Level<br><span id="level">1</span></div>
      <div class="card">Best<br><span id="best">1</span></div>
      <div class="card">Moves<br><span id="moves">0</span></div>
      <div class="card">Time<br><span id="time">0.0s</span></div>
    </section>
    <canvas id="board" width="600" height="600"></canvas>
    <div class="row">
      <button type="button" id="newBtn" class="btn">New Puzzle</button>
      <button type="button" id="muteBtn" class="btn">🔊 Sound On</button>
    </div>
    <div class="hint">Touch/Click: rotate tile. Keyboard: arrows move cursor, Space/Enter rotate.</div>
  </main>

  <script>
  (() => {
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const levelEl = document.getElementById('level');
    const bestEl = document.getElementById('best');
    const movesEl = document.getElementById('moves');
    const timeEl = document.getElementById('time');
    const newBtn = document.getElementById('newBtn');
    const muteBtn = document.getElementById('muteBtn');

    const STORAGE_KEY = 'esb_neon_pipe_grid_overdrive_best';
    let best = Number(localStorage.getItem(STORAGE_KEY) || 1);
    bestEl.textContent = String(best);

    let audioCtx = null;
    let muted = false;

    const N = 6;
    const dirs = [
      {dx:0, dy:-1, bit:1, opp:4}, // top
      {dx:1, dy:0, bit:2, opp:8},  // right
      {dx:0, dy:1, bit:4, opp:1},  // bottom
      {dx:-1, dy:0, bit:8, opp:2}  // left
    ];

    const state = {
      level: 1,
      moves: 0,
      startTs: performance.now(),
      solved: false,
      board: [],
      path: [],
      cursorX: 0,
      cursorY: 0
    };

    function setupPWA() {
      const manifest = {
        name: 'Neon Pipe Grid Overdrive',
        short_name: 'PipeOverdrive',
        start_url: '.',
        display: 'standalone',
        theme_color: '#0a0a1a',
        background_color: '#0a0a1a',
        icons: [{
          src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128"><rect width="128" height="128" rx="20" fill="%230a0a1a"/><path d="M24 64h24V40h32v24h24v24H80v-24H48v24H24z" fill="%2343f7ff"/><circle cx="64" cy="64" r="10" fill="%23ff4ed1"/></svg>',
          sizes: '128x128',
          type: 'image/svg+xml'
        }]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);

      if ('serviceWorker' in navigator) {
        const code = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',()=>{});`;
        navigator.serviceWorker.register(URL.createObjectURL(new Blob([code], {type:'text/javascript'}))).catch(()=>{});
      }
    }

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function beep(freq = 480, dur = 0.08, type = 'square', gain = 0.03) {
      if (muted) return;
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(gain, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + dur + 0.02);
    }

    function rotateMask(mask, rot) {
      let m = mask;
      for (let i = 0; i < rot; i++) {
        const t = (m & 1) ? 2 : 0;
        const r = (m & 2) ? 4 : 0;
        const b = (m & 4) ? 8 : 0;
        const l = (m & 8) ? 1 : 0;
        m = t | r | b | l;
      }
      return m;
    }

    function inBounds(x,y){ return x>=0 && y>=0 && x<N && y<N; }

    function buildPath() {
      const path = [[0,0]];
      let x = 0, y = 0;
      while (x !== N-1 || y !== N-1) {
        if (x === N-1) y++;
        else if (y === N-1) x++;
        else if (Math.random() < 0.5) x++;
        else y++;
        path.push([x,y]);
      }
      return path;
    }

    function dirBit(ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      if (dx === 1 && dy === 0) return 2;
      if (dx === -1 && dy === 0) return 8;
      if (dx === 0 && dy === 1) return 4;
      if (dx === 0 && dy === -1) return 1;
      return 0;
    }

    function newPuzzle() {
      state.moves = 0;
      state.solved = false;
      state.startTs = performance.now();
      state.path = buildPath();
      const pathSet = new Set(state.path.map(([x,y]) => `${x},${y}`));
      state.board = Array.from({length:N}, () => Array.from({length:N}, () => ({base:0, rot:0})));

      for (let i = 0; i < state.path.length; i++) {
        const [x,y] = state.path[i];
        let mask = 0;
        if (i > 0) {
          const [px,py] = state.path[i-1];
          mask |= dirBit(x,y,px,py);
        }
        if (i < state.path.length - 1) {
          const [nx,ny] = state.path[i+1];
          mask |= dirBit(x,y,nx,ny);
        }
        state.board[y][x].base = mask;
      }

      const filler = [0,5,10,3,6,12,9,7,11,13,14,15];
      for (let y = 0; y < N; y++) {
        for (let x = 0; x < N; x++) {
          if (!pathSet.has(`${x},${y}`)) {
            state.board[y][x].base = filler[Math.floor(Math.random() * filler.length)];
          }
          const tile = state.board[y][x];
          tile.rot = Math.floor(Math.random() * 4);
        }
      }
      levelEl.textContent = String(state.level);
      movesEl.textContent = '0';
      beep(420, 0.07, 'triangle', 0.03);
    }

    function currentMask(x,y) {
      const t = state.board[y][x];
      return rotateMask(t.base, t.rot);
    }

    function connected(a, b) {
      const [ax, ay] = a;
      const [bx, by] = b;
      const bitAB = dirBit(ax, ay, bx, by);
      const bitBA = dirBit(bx, by, ax, ay);
      if (!bitAB || !bitBA) return false;
      const am = currentMask(ax, ay);
      const bm = currentMask(bx, by);
      return !!(am & bitAB) && !!(bm & bitBA);
    }

    function isSolved() {
      for (let i = 0; i < state.path.length - 1; i++) {
        if (!connected(state.path[i], state.path[i+1])) return false;
      }
      return true;
    }

    function rotateTile(x,y) {
      if (state.solved || !inBounds(x,y)) return;
      const tile = state.board[y][x];
      tile.rot = (tile.rot + 1) % 4;
      state.moves++;
      movesEl.textContent = String(state.moves);
      beep(560, 0.05, 'square', 0.025);
      if (isSolved()) {
        state.solved = true;
        const elapsed = ((performance.now() - state.startTs)/1000).toFixed(1);
        timeEl.textContent = `${elapsed}s`;
        beep(740, 0.08, 'triangle', 0.04);
        setTimeout(() => beep(980, 0.1, 'sine', 0.045), 90);
        state.level++;
        if (state.level > best) {
          best = state.level;
          localStorage.setItem(STORAGE_KEY, String(best));
          bestEl.textContent = String(best);
        }
        setTimeout(newPuzzle, 700);
      }
    }

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0,0,W,H);
      const cell = W / N;

      for (let y = 0; y < N; y++) {
        for (let x = 0; x < N; x++) {
          const px = x * cell;
          const py = y * cell;
          const m = currentMask(x,y);

          ctx.fillStyle = '#0f1738';
          ctx.fillRect(px+2, py+2, cell-4, cell-4);

          const isStart = x===0 && y===0;
          const isEnd = x===N-1 && y===N-1;
          if (isStart || isEnd) {
            ctx.fillStyle = isStart ? '#43f7ff22' : '#ff4ed122';
            ctx.fillRect(px+3, py+3, cell-6, cell-6);
          }

          const cx = px + cell/2;
          const cy = py + cell/2;
          const r = cell * 0.32;

          ctx.lineWidth = Math.max(5, cell * 0.11);
          ctx.strokeStyle = '#58f8ff';
          ctx.shadowColor = '#43f7ff';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          if (m & 1) { ctx.moveTo(cx, cy); ctx.lineTo(cx, py + 4); }
          if (m & 2) { ctx.moveTo(cx, cy); ctx.lineTo(px + cell - 4, cy); }
          if (m & 4) { ctx.moveTo(cx, cy); ctx.lineTo(cx, py + cell - 4); }
          if (m & 8) { ctx.moveTo(cx, cy); ctx.lineTo(px + 4, cy); }
          ctx.stroke();

          ctx.beginPath();
          ctx.fillStyle = '#ff4ed1';
          ctx.shadowColor = '#ff4ed1';
          ctx.shadowBlur = 8;
          ctx.arc(cx, cy, r * 0.34, 0, Math.PI*2);
          ctx.fill();

          if (x === state.cursorX && y === state.cursorY) {
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#ffffffcc';
            ctx.lineWidth = 2;
            ctx.strokeRect(px+4, py+4, cell-8, cell-8);
          }
        }
      }

      if (state.solved) {
        ctx.fillStyle = 'rgba(6,10,28,0.55)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#dff3ff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '700 44px system-ui, sans-serif';
        ctx.fillText('CONNECTED!', W/2, H/2);
      }

      if (!state.solved) {
        const elapsed = ((performance.now() - state.startTs) / 1000).toFixed(1);
        timeEl.textContent = `${elapsed}s`;
      }

      requestAnimationFrame(draw);
    }

    function posToCell(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = (clientX - rect.left) / rect.width * canvas.width;
      const y = (clientY - rect.top) / rect.height * canvas.height;
      const cell = canvas.width / N;
      return {
        x: Math.floor(x / cell),
        y: Math.floor(y / cell)
      };
    }

    canvas.addEventListener('pointerdown', (e) => {
      ensureAudio();
      const c = posToCell(e.clientX, e.clientY);
      if (!inBounds(c.x,c.y)) return;
      state.cursorX = c.x;
      state.cursorY = c.y;
      rotateTile(c.x,c.y);
    });

    window.addEventListener('keydown', (e) => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter'].includes(e.code)) e.preventDefault();
      if (e.code === 'ArrowUp') state.cursorY = Math.max(0, state.cursorY - 1);
      if (e.code === 'ArrowDown') state.cursorY = Math.min(N-1, state.cursorY + 1);
      if (e.code === 'ArrowLeft') state.cursorX = Math.max(0, state.cursorX - 1);
      if (e.code === 'ArrowRight') state.cursorX = Math.min(N-1, state.cursorX + 1);
      if (e.code === 'Space' || e.code === 'Enter') {
        ensureAudio();
        rotateTile(state.cursorX, state.cursorY);
      }
    }, {passive:false});

    newBtn.addEventListener('click', () => {
      ensureAudio();
      state.level = 1;
      newPuzzle();
    });

    muteBtn.addEventListener('click', () => {
      muted = !muted;
      muteBtn.textContent = muted ? '🔇 Sound Off' : '🔊 Sound On';
    });

    setupPWA();
    newPuzzle();
    draw();
  })();
  </script>
</body>
</html>
