<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Pipe — Pipe Connection Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0ff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;touch-action:none;user-select:none}
h1{font-size:clamp(1.4rem,4vw,2.2rem);text-align:center;color:#39ff14;text-shadow:0 0 20px #39ff14,0 0 40px #00ff88;letter-spacing:4px;margin-bottom:4px}
.subtitle{color:#8888cc;font-size:.8rem;letter-spacing:2px;text-align:center;margin-bottom:16px}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:600px;padding:16px}
.screen.active{display:flex}
.btn{background:transparent;border:1px solid #39ff14;color:#39ff14;padding:10px 28px;border-radius:4px;cursor:pointer;font-size:.9rem;letter-spacing:2px;text-transform:uppercase;transition:all .2s;margin:6px;text-shadow:0 0 8px #39ff14;box-shadow:0 0 8px #39ff1433}
.btn:hover,.btn:active{background:#39ff1422;box-shadow:0 0 16px #39ff14}
.btn.diff{font-size:.8rem;padding:8px 20px}
.btn.diff.easy{border-color:#39ff14;color:#39ff14;text-shadow:0 0 8px #39ff14}
.btn.diff.medium{border-color:#ffcc00;color:#ffcc00;text-shadow:0 0 8px #ffcc00;box-shadow:0 0 8px #ffcc0033}
.btn.diff.medium:hover{background:#ffcc0022;box-shadow:0 0 16px #ffcc00}
.btn.diff.hard{border-color:#ff3366;color:#ff3366;text-shadow:0 0 8px #ff3366;box-shadow:0 0 8px #ff336633}
.btn.diff.hard:hover{background:#ff336622;box-shadow:0 0 16px #ff3366}
.btn.back{border-color:#8888cc;color:#8888cc;font-size:.75rem;padding:6px 16px}
.hiscores{display:flex;gap:24px;margin:12px 0}
.hi-item{text-align:center;font-size:.75rem;color:#8888cc}
.hi-item span{display:block;color:#39ff14;font-size:.9rem;text-shadow:0 0 8px #39ff14}
.game-ui{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:10px;flex-wrap:wrap}
.ui-stat{font-size:.75rem;color:#8888cc;text-align:center}
.ui-stat span{display:block;font-size:1rem;color:#39ff14;text-shadow:0 0 8px #39ff14}
canvas{display:block;margin:0 auto;cursor:pointer;touch-action:none;border:1px solid #39ff1444;box-shadow:0 0 20px #39ff1422}
.win-title{font-size:2rem;color:#39ff14;text-shadow:0 0 20px #39ff14,0 0 40px #39ff14;letter-spacing:4px;margin-bottom:8px}
.win-sub{font-size:.85rem;color:#8888cc;margin-bottom:16px;text-align:center}
.hint{font-size:.68rem;color:#555;text-align:center;margin-top:6px}
</style>
</head>
<body>

<div id="start-screen" class="screen active">
  <h1>🔧 NEON PIPE</h1>
  <div class="subtitle">PIPE CONNECTION PUZZLE</div>
  <div class="hiscores">
    <div class="hi-item">EASY BEST<span id="hi-easy">---</span></div>
    <div class="hi-item">MED BEST<span id="hi-med">---</span></div>
    <div class="hi-item">HARD BEST<span id="hi-hard">---</span></div>
  </div>
  <p style="font-size:.75rem;color:#8888cc;margin-bottom:12px;text-align:center">Rotate pipe tiles to connect<br>SOURCE ⬛ to DRAIN ⬛.<br>Tap any tile to rotate 90°.</p>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn diff easy" onclick="startGame(5)">5×5 EASY</button>
    <button class="btn diff medium" onclick="startGame(7)">7×7 MEDIUM</button>
    <button class="btn diff hard" onclick="startGame(9)">9×9 HARD</button>
  </div>
</div>

<div id="game-screen" class="screen">
  <div class="game-ui">
    <div class="ui-stat">TIME<span id="timer-display">00:00</span></div>
    <div class="ui-stat">MOVES<span id="moves-display">0</span></div>
    <div class="ui-stat" style="cursor:pointer" onclick="showStart()">⬅ QUIT</div>
  </div>
  <canvas id="gc" oncontextmenu="return false"></canvas>
  <div class="hint">Tap to rotate · Connect ⊕ SOURCE to ⊗ DRAIN</div>
</div>

<div id="win-screen" class="screen">
  <div class="win-title">CONNECTED!</div>
  <div class="win-sub" id="win-msg"></div>
  <canvas id="win-canvas" style="border:1px solid #39ff1444;box-shadow:0 0 20px #39ff1422;margin-bottom:16px"></canvas>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn diff easy" onclick="startGame(5)">5×5</button>
    <button class="btn diff medium" onclick="startGame(7)">7×7</button>
    <button class="btn diff hard" onclick="startGame(9)">9×9</button>
    <button class="btn back" onclick="showStart()">MENU</button>
  </div>
</div>

<script>
// ── Audio ─────────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t='sine',d=0.08,v=0.12,dl=0){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=t;o.frequency.value=f;
  const T=AC.currentTime+dl;
  g.gain.setValueAtTime(0,T);g.gain.linearRampToValueAtTime(v,T+0.01);
  g.gain.linearRampToValueAtTime(0,T+d);
  o.start(T);o.stop(T+d+0.01);
}
function sndRotate(){tone(440,'sine',0.05,0.08)}
function sndFlow(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.18,0.2,i*0.1))}

// ── Directions: N=0 E=1 S=2 W=3 ──────────────────────────────────
const DR=[-1,0,1,0],DC=[0,1,0,-1];// N E S W

// Pipe types: each entry is array of open sides at rotation 0
// S=straight [N,S], C=corner [N,E], T=tee [N,E,S], X=cross [N,E,S,W], P=cap [S]
const PIPE_SIDES={
  S:[0,2],// straight: N,S
  C:[0,1],// corner: N,E
  T:[0,1,2],// tee: N,E,S
  X:[0,1,2,3],// cross: all
  P:[2],// end cap: S only (source/drain)
};

function getOpenSides(type,rot){
  return PIPE_SIDES[type].map(s=>(s+rot)%4);
}
function hasOpen(type,rot,dir){
  return getOpenSides(type,rot).includes(dir);
}

// ── Game State ────────────────────────────────────────────────────
let G={};
let timerInterval=null;
let canvas,ctx,CELL;
let animFrame=null;

function showStart(){
  clearInterval(timerInterval);
  if(animFrame)cancelAnimationFrame(animFrame);
  ['start-screen','game-screen','win-screen'].forEach(id=>{
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById('start-screen').classList.add('active');
  const fmt=v=>v===null?'---':`${v}🔧`;
  document.getElementById('hi-easy').textContent=fmt(parseInt(localStorage.getItem('neon-pipe-hi-5'))||null);
  document.getElementById('hi-med').textContent=fmt(parseInt(localStorage.getItem('neon-pipe-hi-7'))||null);
  document.getElementById('hi-hard').textContent=fmt(parseInt(localStorage.getItem('neon-pipe-hi-9'))||null);
}

function showScreen(id){
  ['start-screen','game-screen','win-screen'].forEach(sid=>{
    document.getElementById(sid).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

// ── Puzzle Generation ─────────────────────────────────────────────
function generatePuzzle(n){
  // 1. Create grid cells
  const grid=[];
  for(let i=0;i<n;i++){grid.push([]);for(let j=0;j<n;j++)grid[i].push({type:'X',rot:0,solved_rot:0,flowing:false});}

  // 2. DFS path from (0,0) to (n-1,n-1)
  const visited=Array.from({length:n},()=>Array(n).fill(false));
  const path=[];
  function dfs(r,c){
    if(r===n-1&&c===n-1){path.push([r,c]);return true;}
    if(visited[r][c])return false;
    visited[r][c]=true;
    path.push([r,c]);
    // random order
    const dirs=[0,1,2,3].sort(()=>Math.random()-0.5);
    for(const d of dirs){
      const nr=r+DR[d],nc=c+DC[d];
      if(nr>=0&&nr<n&&nc>=0&&nc<n&&!visited[nr][nc]){
        if(dfs(nr,nc))return true;
      }
    }
    path.pop();
    return false;
  }
  dfs(0,0);

  // 3. For each path cell, determine connections (which neighbors on path)
  const pathSet=new Set(path.map(([r,c])=>`${r},${c}`));
  const connections=Array.from({length:n},()=>Array(n).fill(null).map(()=>([])));
  for(let k=0;k<path.length-1;k++){
    const[r1,c1]=path[k],[r2,c2]=path[k+1];
    if(r2-r1===1)connections[r1][c1].push(2),connections[r2][c2].push(0);// S,N
    else if(r2-r1===-1)connections[r1][c1].push(0),connections[r2][c2].push(2);// N,S
    else if(c2-c1===1)connections[r1][c1].push(1),connections[r2][c2].push(3);// E,W
    else connections[r1][c1].push(3),connections[r2][c2].push(1);// W,E
  }

  // 4. Assign pipe types for path cells
  for(let i=0;i<n;i++)for(let j=0;j<n;j++){
    const conn=connections[i][j];
    if(conn.length===0){
      // not on path or isolated: random pipe
      const types=['S','S','C','C','T'];
      grid[i][j].type=types[Math.floor(Math.random()*types.length)];
      grid[i][j].solved_rot=Math.floor(Math.random()*4);
      grid[i][j].rot=(grid[i][j].solved_rot+1+Math.floor(Math.random()*3))%4;
      continue;
    }
    if(conn.length===1){
      // end cap (source or drain)
      grid[i][j].type='P';
      const dir=conn[0];
      // P at rot 0 opens S=2; to open dir, need rot=(dir-2+4)%4
      grid[i][j].solved_rot=(dir-2+4)%4;
      grid[i][j].rot=grid[i][j].solved_rot;// don't scramble source/drain
    } else if(conn.length===2){
      const[a,b]=conn.sort((x,y)=>x-y);
      // opposite sides: straight
      if((a===0&&b===2)||(a===1&&b===3)){
        grid[i][j].type='S';
        // S at rot 0 opens [0,2]; at rot 1 opens [1,3]
        grid[i][j].solved_rot=(a===0&&b===2)?0:1;
      } else {
        // corner
        grid[i][j].type='C';
        // C at rot 0 opens [0,1]; need to find rot for [a,b]
        // corners: rot0=[0,1] rot1=[1,2] rot2=[2,3] rot3=[3,0]
        const pairs=[[0,1],[1,2],[2,3],[0,3]];
        let rot=0;
        for(let r=0;r<4;r++){
          const p=pairs[r].sort((x,y)=>x-y);
          const test=[a,b];
          if(p[0]===test[0]&&p[1]===test[1]){rot=r;break;}
        }
        grid[i][j].solved_rot=rot;
      }
    } else if(conn.length===3){
      grid[i][j].type='T';
      // T at rot 0 opens [0,1,2]; missing=3
      // find which side is missing
      const all=[0,1,2,3];
      const missing=all.find(x=>!conn.includes(x));
      // T at rot r opens [(0+r)%4,(1+r)%4,(2+r)%4], missing=(3+r)%4
      // so r = (missing-3+4)%4
      grid[i][j].solved_rot=(missing-3+4)%4;
    } else {
      grid[i][j].type='X';
      grid[i][j].solved_rot=0;
    }
    // Scramble rotation (not for source/drain caps)
    if(grid[i][j].type!=='P'){
      const offset=1+Math.floor(Math.random()*3);
      grid[i][j].rot=(grid[i][j].solved_rot+offset)%4;
    }
  }

  // Source and drain cells
  const src={r:0,c:0};
  const drn={r:n-1,c:n-1};

  return{n,grid,src,drn,path,pathSet};
}

function startGame(n){
  if(AC.state==='suspended')AC.resume();
  clearInterval(timerInterval);
  if(animFrame)cancelAnimationFrame(animFrame);
  const puzzle=generatePuzzle(n);
  G={
    ...puzzle,
    moves:0,
    seconds:0,
    done:false,
    flowAnim:null
  };
  document.getElementById('moves-display').textContent='0';
  document.getElementById('timer-display').textContent='00:00';
  showScreen('game-screen');
  initCanvas(n);
  drawBoard(false);
  timerInterval=setInterval(()=>{
    if(G.done)return;
    G.seconds++;
    const m=Math.floor(G.seconds/60),s=G.seconds%60;
    document.getElementById('timer-display').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },1000);
}

function initCanvas(n){
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  const maxW=Math.min(window.innerWidth-32,window.innerHeight-160,480);
  CELL=Math.floor(maxW/n);
  canvas.width=n*CELL;
  canvas.height=n*CELL;
  canvas.style.maxWidth='100%';
  canvas.onclick=handleClick;
  canvas.ontouchstart=handleTouch;
}

function handleClick(e){
  if(G.done)return;
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/canvas.offsetWidth;
  const sy=canvas.height/canvas.offsetHeight;
  const col=Math.floor((e.clientX-r.left)*sx/CELL);
  const row=Math.floor((e.clientY-r.top)*sy/CELL);
  if(col<0||col>=G.n||row<0||row>=G.n)return;
  const cell=G.grid[row][col];
  if(cell.type==='P')return;// don't rotate source/drain
  cell.rot=(cell.rot+1)%4;
  G.moves++;
  document.getElementById('moves-display').textContent=G.moves;
  sndRotate();
  drawBoard(false);
  checkSolved();
}

function handleTouch(e){
  e.preventDefault();
  const t=e.touches[0];
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/canvas.offsetWidth;
  const sy=canvas.height/canvas.offsetHeight;
  const col=Math.floor((t.clientX-r.left)*sx/CELL);
  const row=Math.floor((t.clientY-r.top)*sy/CELL);
  if(col<0||col>=G.n||row<0||row>=G.n)return;
  const cell=G.grid[row][col];
  if(cell.type==='P')return;
  cell.rot=(cell.rot+1)%4;
  G.moves++;
  document.getElementById('moves-display').textContent=G.moves;
  sndRotate();
  drawBoard(false);
  checkSolved();
}

// BFS to find flowing cells from source
function getFlowingCells(){
  const{n,grid,src}=G;
  const flowing=Array.from({length:n},()=>Array(n).fill(false));
  const q=[[src.r,src.c]];
  flowing[src.r][src.c]=true;
  while(q.length){
    const[r,c]=q.shift();
    const cell=grid[r][c];
    for(const d of[0,1,2,3]){
      if(!hasOpen(cell.type,cell.rot,d))continue;
      const nr=r+DR[d],nc=c+DC[d];
      if(nr<0||nr>=n||nc<0||nc>=n)continue;
      if(flowing[nr][nc])continue;
      const nb=grid[nr][nc];
      const opp=(d+2)%4;
      if(hasOpen(nb.type,nb.rot,opp)){
        flowing[nr][nc]=true;
        q.push([nr,nc]);
      }
    }
  }
  return flowing;
}

function checkSolved(){
  const{drn}=G;
  const flowing=getFlowingCells();
  if(flowing[drn.r][drn.c]){
    G.done=true;
    clearInterval(timerInterval);
    sndFlow();
    // animate water
    animateFlow(flowing,()=>{
      const key=`neon-pipe-hi-${G.n}`;
      const prev=parseInt(localStorage.getItem(key))||Infinity;
      const score=G.moves+Math.floor(G.seconds/2);
      if(score<prev)localStorage.setItem(key,score);
      const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      document.getElementById('win-msg').textContent=`Time: ${fmt(G.seconds)} · Moves: ${G.moves}`;
      setTimeout(()=>{
        showScreen('win-screen');
        drawWinCanvas(flowing);
      },400);
    });
  }
}

// Progressive water fill animation
function animateFlow(flowing,done){
  const{n,src}=G;
  const fillOrder=[];
  const visited=Array.from({length:n},()=>Array(n).fill(false));
  const q=[[src.r,src.c,0]];
  visited[src.r][src.c]=true;
  while(q.length){
    const[r,c,dist]=q.shift();
    fillOrder.push({r,c,dist});
    const cell=G.grid[r][c];
    for(const d of[0,1,2,3]){
      if(!hasOpen(cell.type,cell.rot,d))continue;
      const nr=r+DR[d],nc=c+DC[d];
      if(nr<0||nr>=G.n||nc<0||nc>=G.n)continue;
      if(visited[nr][nc])continue;
      if(!flowing[nr][nc])continue;
      const nb=G.grid[nr][nc];
      if(hasOpen(nb.type,nb.rot,(d+2)%4)){
        visited[nr][nc]=true;
        q.push([nr,nc,dist+1]);
      }
    }
  }
  const maxDist=fillOrder.reduce((a,v)=>Math.max(a,v.dist),0);
  let prog=0;
  const step=()=>{
    prog+=0.04;
    // mark cells up to current progress
    fillOrder.forEach(({r,c,dist})=>{
      G.grid[r][c].flowing=dist<=prog*maxDist;
    });
    drawBoard(true);
    if(prog<1.1){animFrame=requestAnimationFrame(step);}
    else{
      fillOrder.forEach(({r,c})=>G.grid[r][c].flowing=true);
      drawBoard(true);
      done&&done();
    }
  };
  animFrame=requestAnimationFrame(step);
}

// ── Drawing ───────────────────────────────────────────────────────
const COL_BG='#0a0a1a';
const COL_CELL='#0d0d22';
const COL_PIPE='#1e3a1e';
const COL_FLOW='#39ff14';
const COL_FLOW2='#00ff88';
const COL_SRC='#ffcc00';
const COL_DRN='#ff3366';
const COL_GRID='#1a1a3a';

function drawBoard(showFlow){
  const{n,grid,src,drn}=G;
  ctx.fillStyle=COL_BG;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    const x=c*CELL,y=r*CELL;
    const cell=grid[r][c];
    const isSrc=r===src.r&&c===src.c;
    const isDrn=r===drn.r&&c===drn.c;
    const flowing=showFlow&&cell.flowing;
    drawCell(x,y,cell,flowing,isSrc,isDrn);
  }
  // grid lines
  ctx.strokeStyle=COL_GRID;ctx.lineWidth=1;
  for(let i=0;i<=n;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,n*CELL);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(n*CELL,i*CELL);ctx.stroke();
  }
}

function drawCell(x,y,cell,flowing,isSrc,isDrn){
  const hw=CELL/2;
  const pipeW=Math.max(4,Math.floor(CELL*0.22));
  const pipeColor=flowing?COL_FLOW:COL_PIPE;
  const glowColor=flowing?COL_FLOW:null;

  // cell bg
  ctx.fillStyle=flowing?'#0a2210':COL_CELL;
  ctx.fillRect(x+1,y+1,CELL-2,CELL-2);

  // draw pipe segments
  if(glowColor){ctx.shadowColor=glowColor;ctx.shadowBlur=8;}
  ctx.fillStyle=pipeColor;
  ctx.strokeStyle=pipeColor;
  ctx.lineWidth=pipeW;
  ctx.lineCap='round';

  const open=getOpenSides(cell.type,cell.rot);
  // center circle
  ctx.beginPath();
  ctx.arc(x+hw,y+hw,pipeW*0.6,0,Math.PI*2);
  ctx.fill();

  // draw segment to each open direction
  for(const d of open){
    const ex=x+hw+DC[d]*hw*0.9;
    const ey=y+hw+DR[d]*hw*0.9;
    ctx.beginPath();
    ctx.moveTo(x+hw,y+hw);
    ctx.lineTo(ex,ey);
    ctx.stroke();
  }
  ctx.shadowBlur=0;

  // source marker
  if(isSrc){
    ctx.strokeStyle=flowing?COL_FLOW:COL_SRC;
    ctx.lineWidth=2;
    ctx.shadowColor=flowing?COL_FLOW:COL_SRC;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(x+hw,y+hw,pipeW*1.2,0,Math.PI*2);ctx.stroke();
    // + symbol
    ctx.fillStyle=flowing?COL_FLOW:COL_SRC;
    ctx.font=`bold ${Math.floor(CELL*0.3)}px monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⊕',x+hw,y+hw);
    ctx.shadowBlur=0;
  }
  // drain marker
  if(isDrn){
    ctx.strokeStyle=flowing?COL_FLOW:COL_DRN;
    ctx.lineWidth=2;
    ctx.shadowColor=flowing?COL_FLOW:COL_DRN;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(x+hw,y+hw,pipeW*1.2,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=flowing?COL_FLOW:COL_DRN;
    ctx.font=`bold ${Math.floor(CELL*0.3)}px monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⊗',x+hw,y+hw);
    ctx.shadowBlur=0;
  }
}

function drawWinCanvas(flowing){
  const wc=document.getElementById('win-canvas');
  const{n,grid,src,drn}=G;
  const SZ=Math.min(240,window.innerWidth-64);
  const cs=Math.floor(SZ/n);
  wc.width=n*cs;wc.height=n*cs;
  const wctx=wc.getContext('2d');
  wctx.fillStyle=COL_BG;wctx.fillRect(0,0,wc.width,wc.height);
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    const x=c*cs,y=r*cs;
    const cell=grid[r][c];
    const pipeW=Math.max(3,Math.floor(cs*0.22));
    const open=getOpenSides(cell.type,cell.rot);
    const hw=cs/2;
    wctx.fillStyle='#0a2210';wctx.fillRect(x+1,y+1,cs-2,cs-2);
    wctx.shadowColor=COL_FLOW;wctx.shadowBlur=6;
    wctx.fillStyle=COL_FLOW;wctx.strokeStyle=COL_FLOW;
    wctx.lineWidth=pipeW;wctx.lineCap='round';
    wctx.beginPath();wctx.arc(x+hw,y+hw,pipeW*0.6,0,Math.PI*2);wctx.fill();
    for(const d of open){
      wctx.beginPath();wctx.moveTo(x+hw,y+hw);
      wctx.lineTo(x+hw+DC[d]*hw*0.9,y+hw+DR[d]*hw*0.9);wctx.stroke();
    }
    wctx.shadowBlur=0;
  }
  // grid
  wctx.strokeStyle=COL_GRID;wctx.lineWidth=1;
  for(let i=0;i<=n;i++){
    wctx.beginPath();wctx.moveTo(i*cs,0);wctx.lineTo(i*cs,n*cs);wctx.stroke();
    wctx.beginPath();wctx.moveTo(0,i*cs);wctx.lineTo(n*cs,i*cs);wctx.stroke();
  }
}

// Init
showStart();
</script>
