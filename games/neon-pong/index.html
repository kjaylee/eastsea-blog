<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡ Neon Pong</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a1a;
    color: #fff;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  /* ===== LAYOUT ===== */
  #app {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  canvas { display: block; }

  /* ===== SCREENS ===== */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    background: rgba(10,10,26,0.95);
    z-index: 10;
  }
  .screen.hidden { display: none; }

  .logo {
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #0ff;
    text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #0af;
    animation: pulse 2s infinite alternate;
  }
  @keyframes pulse {
    from { text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #0af; }
    to   { text-shadow: 0 0 20px #0ff, 0 0 50px #0ff, 0 0 90px #0af; }
  }

  .subtitle {
    font-size: clamp(0.75rem, 2.5vw, 1rem);
    color: #88aacc;
    letter-spacing: 2px;
    text-align: center;
  }

  /* ===== DIFFICULTY BUTTONS ===== */
  .diff-group {
    display: flex; gap: 12px;
    flex-wrap: wrap; justify-content: center;
  }
  .diff-btn {
    padding: 10px 24px;
    border: 2px solid #0ff;
    background: transparent;
    color: #0ff;
    font-family: inherit;
    font-size: 0.9rem;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .15s;
    border-radius: 4px;
  }
  .diff-btn:hover, .diff-btn.active {
    background: #0ff;
    color: #0a0a1a;
    box-shadow: 0 0 16px #0ff;
  }

  /* ===== START BUTTON ===== */
  .start-btn {
    margin-top: 8px;
    padding: 14px 48px;
    border: 2px solid #f0f;
    background: transparent;
    color: #f0f;
    font-family: inherit;
    font-size: clamp(1rem, 3vw, 1.2rem);
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 4px;
    transition: all .15s;
  }
  .start-btn:hover {
    background: #f0f;
    color: #0a0a1a;
    box-shadow: 0 0 20px #f0f;
  }

  .hint { font-size: 0.75rem; color: #446688; letter-spacing: 1px; text-align: center; }

  /* ===== GAME OVER SCREEN ===== */
  .result-title {
    font-size: clamp(1.5rem, 6vw, 2.5rem);
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .win  { color: #0f0; text-shadow: 0 0 20px #0f0; }
  .lose { color: #f40; text-shadow: 0 0 20px #f40; }

  .score-display {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: #0ff;
    text-shadow: 0 0 10px #0ff;
    text-align: center;
  }
  .best-display {
    font-size: 0.9rem;
    color: #88aacc;
    letter-spacing: 1px;
  }

  /* ===== TOUCH ZONES ===== */
  #touch-up, #touch-down {
    position: fixed;
    left: 0; width: 50%;
    z-index: 5;
    background: transparent;
  }
  #touch-up   { top: 0; height: 50%; }
  #touch-down { top: 50%; height: 50%; }
</style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div class="screen" id="startScreen">
  <div class="logo">⚡ NEON PONG</div>
  <div class="subtitle">FIRST TO 11 WINS</div>

  <div class="subtitle" style="margin-top:8px">DIFFICULTY</div>
  <div class="diff-group">
    <button class="diff-btn" data-diff="easy">EASY</button>
    <button class="diff-btn active" data-diff="medium">MEDIUM</button>
    <button class="diff-btn" data-diff="hard">HARD</button>
  </div>

  <button class="start-btn" id="startBtn">▶ PLAY</button>
  <div class="hint">W/S or ↑/↓ · Touch upper/lower half</div>
</div>

<!-- ===== GAME OVER SCREEN ===== -->
<div class="screen hidden" id="gameOverScreen">
  <div class="result-title" id="resultTitle">YOU WIN!</div>
  <div class="score-display" id="finalScore">11 — 7</div>
  <div class="best-display" id="bestScore">BEST WIN: 11 — 5</div>
  <button class="start-btn" id="restartBtn">↺ PLAY AGAIN</button>
  <button class="diff-btn" id="menuBtn" style="border-color:#88aacc;color:#88aacc;margin-top:4px">MENU</button>
</div>

<!-- ===== CANVAS ===== -->
<div id="app"><canvas id="c"></canvas></div>

<!-- ===== TOUCH ZONES ===== -->
<div id="touch-up"></div>
<div id="touch-down"></div>

<script>
"use strict";
/* =====================================================
   NEON PONG — Main Script
   ===================================================== */

// ── Canvas setup ──────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const W = 800, H = 500; // logical resolution
canvas.width  = W;
canvas.height = H;

// Responsive scaling
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Audio (Web Audio API) ─────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq = 440, dur = 0.06, type = 'square', vol = 0.15) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
const SFX = {
  hit    : () => beep(400, 0.05, 'square'),
  wall   : () => beep(300, 0.05, 'triangle'),
  score  : () => beep(220, 0.18, 'sawtooth'),
  win    : () => { beep(660,0.1,'sine'); setTimeout(()=>beep(880,0.15,'sine'),120); setTimeout(()=>beep(1100,0.2,'sine'),260); },
  lose   : () => { beep(200,0.2,'sawtooth'); setTimeout(()=>beep(150,0.3,'sawtooth'),200); },
};

// ── Constants ─────────────────────────────────────────
const PADDLE_W   = 12;
const BALL_R     = 7;
const WIN_SCORE  = 11;
const COLORS     = { player: '#0ff', ai: '#f0f', ball: '#ff0', net: '#1a2a4a' };

// Difficulty settings: {aiSpeed, aiError, ballSpeedBase, paddleShrink}
const DIFFICULTIES = {
  easy:   { aiSpeed: 3.5, aiError: 60,  ballSpeedBase: 4.5, paddleShrink: false },
  medium: { aiSpeed: 5.0, aiError: 30,  ballSpeedBase: 5.0, paddleShrink: true  },
  hard:   { aiSpeed: 7.0, aiError: 10,  ballSpeedBase: 5.5, paddleShrink: true  },
};

// ── State ─────────────────────────────────────────────
const LS_KEY = 'neon-pong-hi';

let difficulty = 'medium';
let cfg        = DIFFICULTIES[difficulty];
let gameActive = false;

let playerY, aiY, ballX, ballY, ballVX, ballVY;
let playerScore, aiScore;
let rallyCount;        // hits since last score
let playerPaddleH;     // shrinks over time
let aiPaddleH;

// Scores persist as fewest opponent points when winning
function loadBest() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || { wins: 0, minOpp: 999 }; }
  catch { return { wins: 0, minOpp: 999 }; }
}
function saveBest(oppScore) {
  const b = loadBest();
  b.wins++;
  if (oppScore < b.minOpp) b.minOpp = oppScore;
  localStorage.setItem(LS_KEY, JSON.stringify(b));
}

// ── UI helpers ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  if (id) document.getElementById(id).classList.remove('hidden');
}

// Difficulty buttons
document.querySelectorAll('.diff-btn[data-diff]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn[data-diff]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    cfg = DIFFICULTIES[difficulty];
  });
});

// ── Init game ─────────────────────────────────────────
function resetBall(dir = 1) {
  ballX = W / 2;
  ballY = H / 2;
  const angle = (Math.random() * 0.8 - 0.4); // -0.4..0.4 rad
  const speed = cfg.ballSpeedBase;
  ballVX = dir * speed * Math.cos(angle);
  ballVY = speed * Math.sin(angle);
  rallyCount = 0;
}

function startGame() {
  cfg          = DIFFICULTIES[difficulty];
  playerScore  = 0;
  aiScore      = 0;
  playerPaddleH = 90;
  aiPaddleH     = 90;
  playerY      = H / 2 - playerPaddleH / 2;
  aiY          = H / 2 - aiPaddleH / 2;
  resetBall(Math.random() < 0.5 ? 1 : -1);
  gameActive   = true;
  showScreen(null);
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('menuBtn').addEventListener('click', () => showScreen('startScreen'));

// ── Input ─────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// Touch: upper half = move up, lower half = move down
let touchDir = 0;
document.getElementById('touch-up').addEventListener('touchstart',  e => { e.preventDefault(); touchDir = -1; }, { passive: false });
document.getElementById('touch-up').addEventListener('touchend',    e => { e.preventDefault(); touchDir = 0; },  { passive: false });
document.getElementById('touch-down').addEventListener('touchstart', e => { e.preventDefault(); touchDir = 1; }, { passive: false });
document.getElementById('touch-down').addEventListener('touchend',   e => { e.preventDefault(); touchDir = 0; }, { passive: false });

// ── Game Loop ─────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  if (!gameActive) return;
  const dt = Math.min((ts - lastTime) / 16.67, 3); // normalize to ~60fps steps
  lastTime = ts;

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── Update logic ──────────────────────────────────────
function update(dt) {
  // — Player input —
  const PLAYER_SPEED = 6;
  if (keys['KeyW'] || keys['ArrowUp'] || touchDir === -1) {
    playerY -= PLAYER_SPEED * dt;
  }
  if (keys['KeyS'] || keys['ArrowDown'] || touchDir === 1) {
    playerY += PLAYER_SPEED * dt;
  }
  playerY = Math.max(0, Math.min(H - playerPaddleH, playerY));

  // — AI logic —
  // AI tracks ball center with some error/lag
  const aiCenter   = aiY + aiPaddleH / 2;
  const targetY    = ballY + (Math.random() - 0.5) * cfg.aiError;
  const aiDiff     = targetY - aiCenter;
  const aiMove     = Math.min(Math.abs(aiDiff), cfg.aiSpeed * dt) * Math.sign(aiDiff);
  aiY += aiMove;
  aiY  = Math.max(0, Math.min(H - aiPaddleH, aiY));

  // — Ball movement —
  ballX += ballVX * dt;
  ballY += ballVY * dt;

  // — Wall bounce (top/bottom) —
  if (ballY - BALL_R <= 0) {
    ballY  = BALL_R;
    ballVY = Math.abs(ballVY);
    SFX.wall();
  }
  if (ballY + BALL_R >= H) {
    ballY  = H - BALL_R;
    ballVY = -Math.abs(ballVY);
    SFX.wall();
  }

  // — Paddle collisions —
  // Player paddle (left side, x=20)
  const PX = 20 + PADDLE_W;
  if (ballVX < 0 && ballX - BALL_R <= PX && ballX - BALL_R >= PX - 10) {
    if (ballY >= playerY && ballY <= playerY + playerPaddleH) {
      ballX = PX + BALL_R;
      // Angle based on hit position
      const relHit = (ballY - playerY - playerPaddleH / 2) / (playerPaddleH / 2);
      const angle  = relHit * 0.8;
      const speed  = getBallSpeed();
      ballVX = Math.abs(Math.cos(angle) * speed);
      ballVY = Math.sin(angle) * speed;
      rallyCount++;
      speedUpBall();
      shrinkPaddles();
      SFX.hit();
    }
  }

  // AI paddle (right side, x=W-20-PADDLE_W)
  const AX = W - 20 - PADDLE_W;
  if (ballVX > 0 && ballX + BALL_R >= AX && ballX + BALL_R <= AX + 10) {
    if (ballY >= aiY && ballY <= aiY + aiPaddleH) {
      ballX = AX - BALL_R;
      const relHit = (ballY - aiY - aiPaddleH / 2) / (aiPaddleH / 2);
      const angle  = relHit * 0.8;
      const speed  = getBallSpeed();
      ballVX = -Math.abs(Math.cos(angle) * speed);
      ballVY = Math.sin(angle) * speed;
      rallyCount++;
      speedUpBall();
      SFX.hit();
    }
  }

  // — Scoring —
  if (ballX - BALL_R <= 0) {
    aiScore++;
    SFX.score();
    checkWin() || resetBall(1);
  }
  if (ballX + BALL_R >= W) {
    playerScore++;
    SFX.score();
    checkWin() || resetBall(-1);
  }
}

function getBallSpeed() {
  // Speed up with rally count
  return cfg.ballSpeedBase + rallyCount * 0.08;
}

function speedUpBall() {
  const spd = getBallSpeed();
  const len = Math.hypot(ballVX, ballVY);
  if (len > 0) {
    ballVX = (ballVX / len) * spd;
    ballVY = (ballVY / len) * spd;
  }
}

function shrinkPaddles() {
  if (!cfg.paddleShrink) return;
  const minH = 40;
  if (playerPaddleH > minH) { playerPaddleH = Math.max(minH, playerPaddleH - 0.3); }
  if (aiPaddleH     > minH) { aiPaddleH     = Math.max(minH, aiPaddleH     - 0.3); }
}

function checkWin() {
  if (playerScore >= WIN_SCORE || aiScore >= WIN_SCORE) {
    gameActive = false;
    const won = playerScore >= WIN_SCORE;
    if (won) saveBest(aiScore);

    const b = loadBest();
    document.getElementById('resultTitle').textContent  = won ? '🏆 YOU WIN!' : '💀 YOU LOSE';
    document.getElementById('resultTitle').className    = 'result-title ' + (won ? 'win' : 'lose');
    document.getElementById('finalScore').textContent   = `${playerScore}  —  ${aiScore}`;
    document.getElementById('bestScore').textContent    = b.wins > 0
      ? `WINS: ${b.wins}  ·  BEST SCORE: 11—${b.minOpp}`
      : 'No wins yet';

    if (won) SFX.win(); else SFX.lose();
    setTimeout(() => showScreen('gameOverScreen'), 600);
    return true;
  }
  return false;
}

// ── Draw ──────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Center net
  ctx.setLineDash([12, 16]);
  ctx.strokeStyle = COLORS.net;
  ctx.lineWidth   = 3;
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Scores
  ctx.font      = 'bold 52px Courier New';
  ctx.textAlign = 'center';

  ctx.fillStyle = COLORS.player;
  ctx.shadowColor = COLORS.player;
  ctx.shadowBlur  = 16;
  ctx.fillText(playerScore, W / 4, 70);

  ctx.fillStyle = COLORS.ai;
  ctx.shadowColor = COLORS.ai;
  ctx.fillText(aiScore, (W * 3) / 4, 70);
  ctx.shadowBlur = 0;

  // Win target
  ctx.font      = '13px Courier New';
  ctx.fillStyle = '#334455';
  ctx.shadowBlur = 0;
  ctx.fillText('FIRST TO ' + WIN_SCORE, W / 2, H - 10);

  // Player paddle
  drawPaddle(20, playerY, playerPaddleH, COLORS.player);

  // AI paddle
  drawPaddle(W - 20 - PADDLE_W, aiY, aiPaddleH, COLORS.ai);

  // Ball
  drawBall(ballX, ballY);
}

function drawPaddle(x, y, h, color) {
  ctx.shadowColor = color;
  ctx.shadowBlur  = 18;
  ctx.fillStyle   = color;
  ctx.beginPath();
  ctx.roundRect(x, y, PADDLE_W, h, 4);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBall(x, y) {
  ctx.shadowColor = COLORS.ball;
  ctx.shadowBlur  = 20;
  ctx.fillStyle   = COLORS.ball;
  ctx.beginPath();
  ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
  ctx.fill();

  // inner bright core
  ctx.fillStyle  = '#fff';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(x, y, BALL_R * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}
</script>
</body>
</html>
