<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Racer — 네온 레이서</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #ui-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    pointer-events: none;
  }
  .ui-stat { display: flex; flex-direction: column; align-items: center; }
  .ui-lbl { font-size: 10px; color: #666; letter-spacing: 1px; }
  .ui-val { font-size: 18px; font-weight: bold; }
  #scoreDisp { color: #44ffaa; text-shadow: 0 0 10px #44ffaa; }
  #speedDisp { color: #ff8844; text-shadow: 0 0 10px #ff8844; }
  #bestDisp  { color: #aa88ff; text-shadow: 0 0 8px #aa88ff; }
  #boost-bar-wrap {
    position: fixed;
    bottom: 120px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }
  #boost-label { font-size: 10px; color: #ffcc44; letter-spacing: 2px; }
  #boost-track {
    width: 120px; height: 8px;
    background: rgba(255,200,50,0.15);
    border: 1px solid rgba(255,200,50,0.3);
    border-radius: 4px;
    overflow: hidden;
  }
  #boost-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff8800, #ffdd00);
    border-radius: 4px;
    width: 100%;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px #ffaa00;
  }
  canvas { display: block; touch-action: none; }
  #touch-zones {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 110px;
    z-index: 4;
    display: flex;
    gap: 8px;
    padding: 8px;
  }
  .t-zone {
    flex: 1;
    background: rgba(100,0,200,0.12);
    border: 1px solid rgba(150,50,255,0.25);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(180,120,255,0.5);
    transition: background 0.1s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .t-zone:active, .t-zone.pressed {
    background: rgba(150,50,255,0.3);
    border-color: rgba(200,100,255,0.5);
  }
  #t-boost {
    flex: 0.7;
    background: rgba(200,100,0,0.12);
    border-color: rgba(255,160,0,0.3);
    color: rgba(255,180,50,0.6);
    font-size: 22px;
  }
  #t-boost.pressed { background: rgba(255,120,0,0.3); }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #overlay h1 {
    font-size: 32px;
    color: #ff8844;
    text-shadow: 0 0 25px #ff8844, 0 0 50px #ff4400;
    letter-spacing: 4px;
  }
  #overlay .sub {
    color: #888; font-size: 13px; text-align: center;
    padding: 0 30px; line-height: 1.6;
  }
  .stat-row {
    display: flex; gap: 30px; align-items: center;
  }
  .stat-row .s { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-row .s .v { font-size: 22px; font-weight: bold; }
  .stat-row .s .l { font-size: 11px; color: #666; }
  .start-btn {
    padding: 14px 50px;
    background: linear-gradient(135deg, #cc4400, #ff8800);
    border: none; border-radius: 30px;
    color: white; font-size: 16px; font-family: inherit;
    cursor: pointer; font-weight: bold; letter-spacing: 3px;
    box-shadow: 0 0 25px rgba(255,130,0,0.5);
    transition: transform 0.1s;
  }
  .start-btn:active { transform: scale(0.96); }
  #combo-flash {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: bold;
    color: #ffcc44;
    text-shadow: 0 0 20px #ffaa00;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>
<div id="ui-bar">
  <div class="ui-stat"><div class="ui-lbl">SCORE</div><div class="ui-val" id="scoreDisp">0</div></div>
  <div class="ui-stat"><div class="ui-lbl">KM/H</div><div class="ui-val" id="speedDisp">0</div></div>
  <div class="ui-stat"><div class="ui-lbl">BEST</div><div class="ui-val" id="bestDisp">0</div></div>
</div>
<canvas id="c"></canvas>
<div id="boost-bar-wrap">
  <span id="boost-label">BOOST</span>
  <div id="boost-track"><div id="boost-fill"></div></div>
</div>
<div id="touch-zones">
  <div class="t-zone" id="t-left">◀◀</div>
  <div class="t-zone" id="t-boost">⚡</div>
  <div class="t-zone" id="t-right">▶▶</div>
</div>
<div id="combo-flash"></div>
<div id="overlay">
  <h1>🚗 NEON RACER</h1>
  <div class="sub">네온 고속도로를 질주하라! 상대방 차를 피하고, 가능한 한 멀리 달려라.</div>
  <div class="sub">← → 차선 변경 &nbsp;|&nbsp; SPACE 부스터<br>터치: 좌/우 탭으로 차선 변경, 가운데 ⚡ 부스터</div>
  <div class="stat-row">
    <div class="s"><div class="v" style="color:#44ffaa" id="bestScoreOvr">0</div><div class="l">최고 점수</div></div>
    <div class="s"><div class="v" style="color:#ff8844" id="bestDistOvr">0m</div><div class="l">최장 거리</div></div>
  </div>
  <button class="start-btn" id="startBtn">▶ START</button>
</div>

<script>
// ============================================================
// NEON RACER — Highway Racing Game
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive
function resize() {
  const maxW = Math.min(window.innerWidth, 480);
  const maxH = window.innerHeight;
  canvas.width = maxW;
  canvas.height = maxH;
}
window.addEventListener('resize', resize);
resize();

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx, engineNode, engineGain;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioCtx();
  // Engine hum
  engineNode = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 300;
  engineNode.type = 'sawtooth';
  engineNode.frequency.value = 60;
  engineNode.connect(filter);
  filter.connect(engineGain);
  engineGain.connect(audioCtx.destination);
  engineGain.gain.value = 0;
  engineNode.start();
}

function setEngineFreq(speed) {
  if (!audioCtx) return;
  const freq = 50 + speed * 1.2;
  engineNode.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
  engineGain.gain.setTargetAtTime(0.06, audioCtx.currentTime, 0.1);
}
function stopEngine() { if (engineGain) engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05); }

function playTone(freq, type, dur, vol = 0.3) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxLane()  { playTone(400, 'sine', 0.08, 0.12); }
function sfxNear()  {
  playTone(800, 'sawtooth', 0.12, 0.15);
  playTone(600, 'sawtooth', 0.1, 0.12);
}
function sfxBoost() {
  [200,300,450,600].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.1,0.15),i*40));
}
function sfxCrash() {
  [150,100,80,60].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.3,0.35),i*80));
  setTimeout(()=>playTone(200,'square',0.6,0.4),0);
}
function sfxCombo(n) { playTone(400+n*80,'triangle',0.15,0.2); }

// === GAME CONSTANTS ===
const LANES = 4;
const CAR_W_FRAC = 0.18; // car width as fraction of road width
const CAR_H_FRAC = 0.09; // car height as fraction of canvas height

// NPC car colors
const NPC_COLORS = [
  { body: '#ff3366', trim: '#ff88aa', glow: '#ff0044' },
  { body: '#3366ff', trim: '#88aaff', glow: '#0044ff' },
  { body: '#33ffaa', trim: '#88ffdd', glow: '#00ffaa' },
  { body: '#ffaa33', trim: '#ffdd88', glow: '#ff8800' },
  { body: '#aa33ff', trim: '#dd88ff', glow: '#8800ff' },
];

// === STATE ===
let G = null;
let keys = {};
let rafId = null;
let lastTime = 0;

function newGame() {
  G = {
    running: true,
    playerLane: 1,      // 0-3
    playerX: 0,         // animated X
    playerTargetX: 0,
    score: 0,
    dist: 0,            // meters
    speed: 80,          // km/h
    maxSpeed: 280,
    boostEnergy: 100,
    boosting: false,
    lane_y: 0,          // road scroll offset
    npcs: [],
    particles: [],
    explosionFrames: 0,
    dead: false,
    nearMissCount: 0,
    comboTimer: 0,
    roadStripeOffset: 0,
    spawnTimer: 0,
    spawnInterval: 1.8,
    diffTimer: 0,
    flashMsg: '',
    flashAlpha: 0,
  };
  G.playerX = laneX(G.playerLane);
  G.playerTargetX = G.playerX;
}

function laneX(lane) {
  // Lanes are equally spaced across road width
  const roadX = canvas.width * 0.1;
  const roadW = canvas.width * 0.8;
  const laneW = roadW / LANES;
  return roadX + laneW * lane + laneW * 0.5;
}

function laneFromX(x) {
  const roadX = canvas.width * 0.1;
  const roadW = canvas.width * 0.8;
  const laneW = roadW / LANES;
  const lane = Math.round((x - roadX - laneW * 0.5) / laneW);
  return Math.max(0, Math.min(LANES - 1, lane));
}

function carW() { return canvas.width * 0.8 / LANES * 0.7; }
function carH() { return canvas.height * CAR_H_FRAC; }

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  if (!G || !G.running) return;
  const g = G;

  // Speed
  const baseSpeed = g.boosting ? Math.min(g.speed * 1.7, g.maxSpeed) : g.speed;
  const kmhDisplay = Math.round(baseSpeed);

  // Boost
  if (g.boosting) {
    g.boostEnergy -= dt * 35;
    if (g.boostEnergy <= 0) { g.boostEnergy = 0; g.boosting = false; }
  } else {
    g.boostEnergy = Math.min(100, g.boostEnergy + dt * 12);
  }
  document.getElementById('boost-fill').style.width = g.boostEnergy + '%';
  document.getElementById('speedDisp').textContent = kmhDisplay;

  // Distance & score
  const meterThisTick = baseSpeed * dt / 3.6;
  g.dist += meterThisTick;
  g.score += Math.floor(meterThisTick * (g.boosting ? 3 : 1));

  // Road scroll
  const scrollSpeed = baseSpeed * dt * 0.6;
  g.roadStripeOffset = (g.roadStripeOffset + scrollSpeed) % 80;

  // Difficulty ramp
  g.diffTimer += dt;
  if (g.diffTimer > 5) {
    g.speed = Math.min(g.maxSpeed, g.speed + 3);
    g.spawnInterval = Math.max(0.5, g.spawnInterval - 0.04);
    g.diffTimer = 0;
  }

  // Player lane movement (keyboard)
  // Handled in keydown handler

  // Smooth player X
  const tx = laneX(g.playerLane);
  g.playerTargetX = tx;
  g.playerX += (g.playerTargetX - g.playerX) * Math.min(1, dt * 14);

  // Spawn NPC
  g.spawnTimer += dt;
  if (g.spawnTimer >= g.spawnInterval) {
    g.spawnTimer = 0;
    spawnNPC();
  }

  // Update NPCs
  const playerCarH = carH();
  const playerY = canvas.height * 0.75;

  g.npcs.forEach(npc => {
    npc.y += scrollSpeed * npc.speedMult;
  });

  // Remove off-screen NPCs
  g.npcs = g.npcs.filter(npc => npc.y < canvas.height + carH() * 2);

  // Collision & near-miss
  const pw = carW() * 0.85, ph = playerCarH * 0.85;
  g.npcs.forEach(npc => {
    if (npc.hit) return;
    const nx = npc.laneX, ny = npc.y;
    const nw = carW() * 0.85, nh = carH() * 0.85;

    // AABB
    if (Math.abs(g.playerX - nx) < (pw + nw) / 2 &&
        Math.abs(playerY - ny) < (ph + nh) / 2) {
      // Collision!
      npc.hit = true;
      g.dead = true;
      g.running = false;
      sfxCrash();
      stopEngine();
      spawnCrashParticles(g.playerX, playerY);
      return;
    }

    // Near miss: within 1.5x car width but not overlapping
    const xDist = Math.abs(g.playerX - nx);
    const yDist = Math.abs(playerY - ny);
    if (!npc.nearMissed && yDist < ph * 1.5 && xDist < pw * 1.8 && xDist > (pw + nw)/2) {
      npc.nearMissed = true;
      g.nearMissCount++;
      const bonus = 50 + g.nearMissCount * 25;
      g.score += bonus;
      sfxNear();
      showFlash(`NEAR MISS! +${bonus}`, '#ffcc44');
    }
  });

  // Near miss combo
  if (g.comboTimer > 0) {
    g.comboTimer -= dt;
  }

  // Particles
  g.particles = g.particles.filter(p => p.life > 0);
  g.particles.forEach(p => {
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.1 * dt * 60;
    p.life -= p.decay * dt * 60;
  });

  // Flash
  if (g.flashAlpha > 0) g.flashAlpha -= dt * 2;

  // Update score display
  document.getElementById('scoreDisp').textContent = g.score.toLocaleString();
}

function spawnNPC() {
  const g = G;
  // Pick a lane, avoid crowding
  const occupied = new Set(g.npcs.filter(n => n.y < carH() * 3).map(n => n.lane));
  const free = [0,1,2,3].filter(l => !occupied.has(l));
  if (!free.length) return;
  const lane = free[Math.floor(Math.random() * free.length)];
  const colorSet = NPC_COLORS[Math.floor(Math.random() * NPC_COLORS.length)];
  g.npcs.push({
    lane,
    laneX: laneX(lane),
    y: -carH(),
    speedMult: 0.8 + Math.random() * 0.5,
    color: colorSet,
    hit: false,
    nearMissed: false,
    type: Math.floor(Math.random() * 3), // car shape variant
  });
}

function spawnCrashParticles(cx, cy) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    G.particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed * 0.3,
      vy: Math.sin(angle) * speed * 0.3 - 2,
      life: 1,
      decay: 0.018 + Math.random() * 0.015,
      color: Math.random() < 0.5 ? '#ff6600' : '#ffcc00',
      size: 3 + Math.random() * 5,
    });
  }
}

function showFlash(msg, color) {
  const el = document.getElementById('combo-flash');
  el.textContent = msg;
  el.style.color = color || '#ffcc44';
  el.style.opacity = '1';
  G.flashAlpha = 1;
  setTimeout(() => { el.style.opacity = '0'; }, 800);
}

// ============================================================
// RENDER
// ============================================================
function draw() {
  if (!G) return;
  const g = G;
  const W = canvas.width, H = canvas.height;

  // Background
  ctx.fillStyle = '#05050f';
  ctx.fillRect(0, 0, W, H);

  const roadX = W * 0.1, roadW = W * 0.8;

  // Road surface
  const roadGrad = ctx.createLinearGradient(0, 0, 0, H);
  roadGrad.addColorStop(0, '#0a0a1f');
  roadGrad.addColorStop(1, '#0d0d2a');
  ctx.fillStyle = roadGrad;
  ctx.fillRect(roadX, 0, roadW, H);

  // Side gutters
  ctx.fillStyle = '#070715';
  ctx.fillRect(0, 0, roadX, H);
  ctx.fillRect(roadX + roadW, 0, W - roadX - roadW, H);

  // Road edge glow
  drawRoadEdge(roadX, roadW, H);

  // Lane markings
  drawLaneMarkings(roadX, roadW, H);

  // Road horizon glow
  const hGrad = ctx.createLinearGradient(0, 0, 0, H * 0.3);
  hGrad.addColorStop(0, 'rgba(50,0,120,0.3)');
  hGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = hGrad;
  ctx.fillRect(roadX, 0, roadW, H * 0.3);

  // Draw NPCs
  g.npcs.forEach(npc => drawNPC(npc));

  // Draw player
  if (!g.dead || g.particles.length > 0) {
    if (!g.dead) drawPlayerCar(g.playerX, H * 0.75);
    else if (g.particles.length > 0) {
      // Draw explosion
      drawExplosion(g.playerX, H * 0.75);
    }
  }

  // Particles
  g.particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Boost flame trail
  if (g.boosting && !g.dead) {
    drawBoostFlame(g.playerX, H * 0.75);
  }

  // Speed lines
  if (g.speed > 120 || g.boosting) {
    drawSpeedLines(W, H, g.boosting);
  }

  // Vignette
  drawVignette(W, H);
}

function drawRoadEdge(rx, rw, H) {
  // Left edge
  ctx.shadowColor = '#6600ff';
  ctx.shadowBlur = 15;
  ctx.strokeStyle = '#6600ff';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx, H); ctx.stroke();
  // Right edge
  ctx.beginPath(); ctx.moveTo(rx + rw, 0); ctx.lineTo(rx + rw, H); ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawLaneMarkings(rx, rw, H) {
  const laneW = rw / LANES;
  const stripeH = 60, gapH = 40;
  const offset = G.roadStripeOffset % (stripeH + gapH);

  ctx.strokeStyle = 'rgba(100,80,200,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([stripeH, gapH]);
  ctx.lineDashOffset = -offset;

  for (let i = 1; i < LANES; i++) {
    const x = rx + laneW * i;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Center dots
  ctx.fillStyle = 'rgba(80,60,160,0.3)';
  for (let i = 1; i < LANES; i++) {
    const x = rx + laneW * i;
    for (let y = -offset; y < H; y += stripeH + gapH) {
      ctx.beginPath(); ctx.arc(x, y + stripeH/2, 2, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawPlayerCar(cx, cy) {
  const w = carW(), h = carH();
  const g = G;
  const boosting = g.boosting;

  ctx.save();
  ctx.translate(cx, cy);

  // Body glow
  ctx.shadowColor = boosting ? '#ff8800' : '#44ffaa';
  ctx.shadowBlur = boosting ? 30 : 18;

  // Car body
  ctx.fillStyle = boosting ? '#ffaa00' : '#00ffaa';
  roundRect(ctx, -w/2, -h/2, w, h, w * 0.15);
  ctx.fill();

  // Car top (darker center)
  ctx.fillStyle = boosting ? '#cc7700' : '#00cc88';
  roundRect(ctx, -w*0.3, -h*0.45, w*0.6, h*0.55, w*0.1);
  ctx.fill();

  // Headlights (bottom)
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(-w*0.3, h*0.42, w*0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( w*0.3, h*0.42, w*0.1, 0, Math.PI*2); ctx.fill();

  // Taillights (top)
  ctx.fillStyle = '#ff3333';
  ctx.shadowColor = '#ff0000';
  ctx.beginPath(); ctx.arc(-w*0.3, -h*0.42, w*0.08, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( w*0.3, -h*0.42, w*0.08, 0, Math.PI*2); ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawNPC(npc) {
  const w = carW(), h = carH();
  const cx = npc.laneX, cy = npc.y;
  const c = npc.color;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.shadowColor = c.glow;
  ctx.shadowBlur = 12;

  // Body
  ctx.fillStyle = c.body;
  roundRect(ctx, -w/2, -h/2, w, h, w*0.12);
  ctx.fill();

  // Top stripe
  ctx.fillStyle = c.trim;
  roundRect(ctx, -w*0.28, -h*0.42, w*0.56, h*0.5, w*0.08);
  ctx.fill();

  // Headlights (facing down = bottom of this car)
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffee88';
  ctx.shadowColor = '#ffee88';
  ctx.beginPath(); ctx.arc(-w*0.28, h*0.4, w*0.09, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( w*0.28, h*0.4, w*0.09, 0, Math.PI*2); ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBoostFlame(cx, cy) {
  const w = carW(), h = carH();
  const t = Date.now() / 100;
  ctx.save();
  ctx.translate(cx, cy - h/2);

  for (let i = 0; i < 8; i++) {
    const ox = (Math.random() - 0.5) * w * 0.5;
    const len = h * (0.5 + Math.random() * 0.8);
    const alpha = 0.3 + Math.random() * 0.5;
    const grad = ctx.createLinearGradient(0, 0, 0, -len);
    grad.addColorStop(0, `rgba(255,180,0,${alpha})`);
    grad.addColorStop(0.5, `rgba(255,80,0,${alpha*0.7})`);
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grad;
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.ellipse(ox, 0, w*0.08, len/2, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawExplosion(cx, cy) {
  const t = Date.now() / 100;
  const rings = [0.5, 1.0, 1.5];
  rings.forEach((r, i) => {
    const alpha = Math.max(0, 0.8 - G.particles.length / 80);
    ctx.strokeStyle = `rgba(255,${100+i*50},0,${alpha})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 30 + Math.sin(t+i)*5, 0, Math.PI*2);
    ctx.stroke();
  });
  ctx.shadowBlur = 0;
}

let speedLineState = [];
function drawSpeedLines(W, H, boosting) {
  const alpha = boosting ? 0.5 : 0.2;
  const count = boosting ? 20 : 10;
  if (speedLineState.length < count) {
    speedLineState.push({
      x: Math.random() * W,
      y: Math.random() * H,
      len: 20 + Math.random() * 60,
      speed: 3 + Math.random() * 4,
    });
  }
  speedLineState.forEach(l => {
    ctx.strokeStyle = `rgba(180,150,255,${alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x, l.y + l.len);
    ctx.stroke();
    l.y += l.speed * (boosting ? 3 : 1);
    if (l.y > H + l.len) { l.y = -l.len; l.x = Math.random() * W; }
  });
}

function drawVignette(W, H) {
  const v = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.8);
  v.addColorStop(0, 'transparent');
  v.addColorStop(1, 'rgba(0,0,10,0.6)');
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, W, H);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (G) {
    update(dt);
    draw();
    if (!G.running && G.dead && G.particles.length === 0) {
      endGame();
      return;
    }
    if (G.boosting) setEngineFreq(G.speed * 1.7);
    else if (G.running) setEngineFreq(G.speed);
  }

  rafId = requestAnimationFrame(gameLoop);
}

function endGame() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  stopEngine();
  draw();

  const score = G.score;
  const dist = Math.floor(G.dist);
  const bestScore = Math.max(score, parseInt(localStorage.getItem('neon-racer-score') || '0'));
  const bestDist  = Math.max(dist,  parseInt(localStorage.getItem('neon-racer-dist')  || '0'));
  localStorage.setItem('neon-racer-score', bestScore);
  localStorage.setItem('neon-racer-dist',  bestDist);

  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h1>💥 GAME OVER</h1>
    <div class="sub">충돌! 더 멀리 달려보자.</div>
    <div class="stat-row">
      <div class="s"><div class="v" style="color:#44ffaa">${score.toLocaleString()}</div><div class="l">이번 점수</div></div>
      <div class="s"><div class="v" style="color:#ff8844">${dist}m</div><div class="l">거리</div></div>
    </div>
    <div class="stat-row">
      <div class="s"><div class="v" style="color:#aa88ff">${bestScore.toLocaleString()}</div><div class="l">최고 점수</div></div>
      <div class="s"><div class="v" style="color:#88aaff">${bestDist}m</div><div class="l">최장 거리</div></div>
    </div>
    <button class="start-btn" id="startBtn">▶ 다시 시작</button>
  `;
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function startGame() {
  initAudio();
  document.getElementById('overlay').style.display = 'none';
  speedLineState = [];
  newGame();
  G.playerX = laneX(G.playerLane);
  lastTime = performance.now();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(gameLoop);
  setEngineFreq(G.speed);
}

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', e => {
  if (!G || !G.running) return;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
    e.preventDefault();
    if (G.playerLane > 0) { G.playerLane--; sfxLane(); }
  } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
    e.preventDefault();
    if (G.playerLane < LANES - 1) { G.playerLane++; sfxLane(); }
  } else if (e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (G.boostEnergy > 20) { G.boosting = true; sfxBoost(); }
  }
});
document.addEventListener('keyup', e => {
  if (e.key === ' ' || e.key === 'ArrowUp') G && (G.boosting = false);
});

// Touch controls
function setupTouch(id, fn) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); el.classList.add('pressed'); fn(); }, {passive: false});
  el.addEventListener('touchend',   e => { e.preventDefault(); el.classList.remove('pressed'); }, {passive: false});
  el.addEventListener('click', fn);
}
setupTouch('t-left', () => {
  if (!G || !G.running) return;
  if (G.playerLane > 0) { G.playerLane--; sfxLane(); }
});
setupTouch('t-right', () => {
  if (!G || !G.running) return;
  if (G.playerLane < LANES - 1) { G.playerLane++; sfxLane(); }
});
const boostBtn = document.getElementById('t-boost');
boostBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  boostBtn.classList.add('pressed');
  if (G && G.running && G.boostEnergy > 20) { G.boosting = true; sfxBoost(); }
}, {passive: false});
boostBtn.addEventListener('touchend', e => {
  e.preventDefault();
  boostBtn.classList.remove('pressed');
  if (G) G.boosting = false;
}, {passive: false});
boostBtn.addEventListener('click', () => {
  if (G && G.running && G.boostEnergy > 20) { G.boosting = true; sfxBoost(); }
});

// Swipe on canvas
let swipeStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  swipeStart = { x: e.touches[0].clientX, t: Date.now() };
}, {passive: false});
canvas.addEventListener('touchend', e => {
  if (!swipeStart || !G || !G.running) return;
  const dx = e.changedTouches[0].clientX - swipeStart.x;
  const dt2 = Date.now() - swipeStart.t;
  swipeStart = null;
  if (dt2 > 400 || Math.abs(dx) < 20) return;
  if (dx < 0 && G.playerLane > 0) { G.playerLane--; sfxLane(); }
  else if (dx > 0 && G.playerLane < LANES - 1) { G.playerLane++; sfxLane(); }
}, {passive: false});

// Init best scores
const bs = localStorage.getItem('neon-racer-score');
const bd = localStorage.getItem('neon-racer-dist');
if (bs) {
  document.getElementById('bestScoreOvr').textContent = parseInt(bs).toLocaleString();
  document.getElementById('bestDisp').textContent = parseInt(bs).toLocaleString();
}
if (bd) document.getElementById('bestDistOvr').textContent = parseInt(bd) + 'm';

document.getElementById('startBtn').addEventListener('click', startGame);
resize();
draw(); // initial blank canvas draw
</script>
