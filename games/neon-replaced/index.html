<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ff00ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Neon Replaced</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Courier New',monospace;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hud{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;color:#0ff;font-size:14px;text-shadow:0 0 8px #0ff}
#hud>div{background:rgba(10,10,26,.7);padding:4px 10px;border:1px solid rgba(0,255,255,.3);border-radius:4px}
.hp-bar{width:120px;height:10px;background:#1a1a2e;border:1px solid #ff00ff;border-radius:2px;display:inline-block;vertical-align:middle}
.hp-fill{height:100%;background:linear-gradient(90deg,#ff00ff,#ff44aa);border-radius:1px;transition:width .2s}
#menu,#gameover,#stageclear,#skinselect,#pause-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,.92);color:#fff;pointer-events:auto;z-index:20}
.hidden{display:none!important}
h1{font-size:clamp(28px,6vw,56px);color:#ff00ff;text-shadow:0 0 20px #ff00ff,0 0 40px #ff00ff;margin-bottom:8px;letter-spacing:4px}
h2{font-size:clamp(14px,3vw,24px);color:#0ff;margin-bottom:24px;text-shadow:0 0 10px #0ff}
.btn{pointer-events:auto;background:transparent;border:2px solid #ff00ff;color:#ff00ff;padding:12px 32px;margin:6px;font-size:clamp(14px,2.5vw,20px);font-family:'Courier New',monospace;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all .2s;min-width:200px}
.btn:hover,.btn:active{background:#ff00ff;color:#0a0a1a;box-shadow:0 0 20px #ff00ff}
.btn-cyan{border-color:#0ff;color:#0ff}.btn-cyan:hover,.btn-cyan:active{background:#0ff;color:#0a0a1a;box-shadow:0 0 20px #0ff}
.subtitle{color:#888;font-size:12px;margin-top:16px}
.skin-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin:16px}
.skin-card{width:80px;height:100px;border:2px solid #333;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:rgba(10,10,26,.8)}
.skin-card.unlocked{border-color:#ff00ff}.skin-card.active{border-color:#0ff;box-shadow:0 0 12px #0ff}
.skin-card.locked{opacity:.4;cursor:not-allowed}
.skin-name{font-size:10px;color:#aaa;margin-top:4px}
#touch-controls{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 10px;pointer-events:none;z-index:15;opacity:0;transition:opacity .3s}
#touch-controls.visible{opacity:1}
.touch-btn{pointer-events:auto;width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,0,255,.5);background:rgba(255,0,255,.15);display:flex;align-items:center;justify-content:center;color:#ff00ff;font-size:20px;-webkit-tap-highlight-color:transparent}
.touch-btn:active{background:rgba(255,0,255,.4)}
.touch-group{display:flex;gap:8px;align-items:flex-end}
.combo-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:#ff00ff;text-shadow:0 0 20px #ff00ff;opacity:0;transition:opacity .3s;pointer-events:none}
.combo-display.show{opacity:1}
#loading{position:absolute;top:0;left:0;width:100%;height:100%;background:#0a0a1a;display:flex;align-items:center;justify-content:center;z-index:99;color:#ff00ff;font-size:18px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud" class="hidden">
    <div><span class="hp-bar"><span class="hp-fill" id="hp-fill" style="width:100%"></span></span> <span id="hp-text">HP</span></div>
    <div id="combo-hud">COMBO: <span id="combo-count">0</span></div>
    <div id="score-hud">SCORE: <span id="score-val">0</span></div>
    <div id="stage-hud">STAGE <span id="stage-val">1</span>-<span id="wave-val">1</span></div>
  </div>
  <div class="combo-display" id="combo-popup"></div>
</div>
<div id="menu">
  <h1>NEON REPLACED</h1>
  <h2>CYBERPUNK ACTION</h2>
  <button class="btn" onclick="G.startGame()">START MISSION</button>
  <button class="btn btn-cyan" onclick="G.showSkins()">SKINS</button>
  <p class="subtitle">WASD/Arrows + Space | Touch supported</p>
</div>
<div id="gameover" class="hidden">
  <h1>FLATLINED</h1>
  <h2>SCORE: <span id="go-score">0</span></h2>
  <button class="btn" onclick="G.startGame()">RETRY</button>
  <button class="btn btn-cyan" onclick="G.showMenu()">MENU</button>
</div>
<div id="stageclear" class="hidden">
  <h1>STAGE CLEAR</h1>
  <h2 id="clear-msg">SECTOR SECURED</h2>
  <p id="unlock-msg" style="color:#ff0;margin:8px 0"></p>
  <button class="btn" onclick="G.nextStage()">NEXT STAGE</button>
</div>
<div id="skinselect" class="hidden">
  <h2>SELECT SKIN</h2>
  <div class="skin-grid" id="skin-grid"></div>
  <button class="btn btn-cyan" onclick="G.showMenu()">BACK</button>
</div>
<div id="pause-screen" class="hidden">
  <h1>PAUSED</h1>
  <button class="btn" onclick="G.resume()">RESUME</button>
  <button class="btn btn-cyan" onclick="G.showMenu()">QUIT</button>
</div>
<div id="touch-controls">
  <div class="touch-group">
    <button class="touch-btn" id="tb-left">◀</button>
    <button class="touch-btn" id="tb-right">▶</button>
  </div>
  <div class="touch-group">
    <button class="touch-btn" id="tb-dash">⚡</button>
    <button class="touch-btn" id="tb-jump">▲</button>
    <button class="touch-btn" id="tb-attack">⚔</button>
  </div>
</div>
<div id="loading">INITIALIZING NEURAL LINK...</div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const canvas = $('c');
const ctx = canvas.getContext('2d');

// ─── AUDIO ENGINE ───
const Audio_ = {
  ctx: null, master: null,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.3;
    this.master.connect(this.ctx.destination);
  },
  play(type, freq, dur, vol) {
    if (!this.ctx) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime((vol || 0.2), this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    o.connect(g); g.connect(this.master);
    o.start(); o.stop(this.ctx.currentTime + dur);
  },
  jump() { this.play('square', 400, 0.1, 0.15); this.play('square', 600, 0.08, 0.1); },
  attack() { this.play('sawtooth', 200, 0.08, 0.2); this.play('sawtooth', 100, 0.06, 0.15); },
  hit() { this.play('square', 100, 0.15, 0.2); this.play('sawtooth', 80, 0.1, 0.15); },
  kill() { this.play('square', 300, 0.05, 0.15); this.play('square', 500, 0.08, 0.1); this.play('square', 800, 0.1, 0.08); },
  dash() { this.play('sawtooth', 150, 0.12, 0.1); },
  unlock() { for (let i = 0; i < 5; i++) setTimeout(() => this.play('square', 400 + i * 100, 0.1, 0.12), i * 80); },
  clear() { for (let i = 0; i < 8; i++) setTimeout(() => this.play('square', 300 + i * 80, 0.15, 0.1), i * 60); },
  bgmNode: null, bgmGain: null, bgmPlaying: false,
  startBGM() {
    if (!this.ctx || this.bgmPlaying) return;
    this.bgmPlaying = true;
    this.bgmGain = this.ctx.createGain();
    this.bgmGain.gain.value = 0.08;
    this.bgmGain.connect(this.master);
    const notes = [65,73,87,98,110,87,73,65];
    let idx = 0;
    const playNote = () => {
      if (!this.bgmPlaying) return;
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'square';
      o.frequency.value = notes[idx % notes.length];
      g.gain.setValueAtTime(0.06, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.25);
      o.connect(g); g.connect(this.bgmGain);
      o.start(); o.stop(this.ctx.currentTime + 0.3);
      // Sub bass
      const o2 = this.ctx.createOscillator();
      const g2 = this.ctx.createGain();
      o2.type = 'sine';
      o2.frequency.value = notes[idx % notes.length] * 0.5;
      g2.gain.setValueAtTime(0.04, this.ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.28);
      o2.connect(g2); g2.connect(this.bgmGain);
      o2.start(); o2.stop(this.ctx.currentTime + 0.3);
      idx++;
      this.bgmTimer = setTimeout(playNote, 280);
    };
    playNote();
  },
  stopBGM() { this.bgmPlaying = false; clearTimeout(this.bgmTimer); }
};

// ─── SAVE / LOAD ───
const Save = {
  key: 'neon-replaced-v1',
  load() {
    try { return JSON.parse(localStorage.getItem(this.key)) || this.defaults(); }
    catch { return this.defaults(); }
  },
  defaults() { return { highScore: 0, skins: ['cyber-blue'], activeSkin: 'cyber-blue', stagesCleared: 0 }; },
  save(data) { try { localStorage.setItem(this.key, JSON.stringify(data)); } catch {} }
};

// ─── SKIN DEFS ───
const SKINS = [
  { id: 'cyber-blue', name: 'Cyber Blue', body: '#00aaff', accent: '#0066cc', glow: '#0088ff', unlock: 0 },
  { id: 'red-fury', name: 'Red Fury', body: '#ff2244', accent: '#aa0022', glow: '#ff0033', unlock: 1 },
  { id: 'gold-phantom', name: 'Gold Phantom', body: '#ffcc00', accent: '#cc9900', glow: '#ffdd44', unlock: 2 },
  { id: 'neon-ghost', name: 'Neon Ghost', body: 'rgba(0,255,200,0.6)', accent: 'rgba(0,200,150,0.4)', glow: '#00ffcc', unlock: 3 }
];

// ─── STAGE DEFS ───
const STAGES = [
  { name: 'NEON STREETS', waves: 2, bgColor1: '#0a0a1a', bgColor2: '#12082a', enemies: [
    [{type:'melee',count:3},{type:'ranged',count:1}],
    [{type:'melee',count:4},{type:'ranged',count:2}]
  ]},
  { name: 'CYBER MARKET', waves: 3, bgColor1: '#0a0a1a', bgColor2: '#1a0820', enemies: [
    [{type:'melee',count:3},{type:'ranged',count:2}],
    [{type:'melee',count:4},{type:'ranged',count:2}],
    [{type:'melee',count:5},{type:'ranged',count:3}]
  ]},
  { name: 'ROOFTOP CHASE', waves: 3, bgColor1: '#0a0a1a', bgColor2: '#080a20', enemies: [
    [{type:'melee',count:4},{type:'ranged',count:3}],
    [{type:'melee',count:5},{type:'ranged',count:3}],
    [{type:'melee',count:6},{type:'ranged',count:4}]
  ]}
];

// ─── PARTICLES ───
class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = this.maxLife = life; this.size = size || 3;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.vy += 400 * dt; this.life -= dt;
  }
  draw(ctx) {
    const a = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
  get dead() { return this.life <= 0; }
}

// ─── PROJECTILE ───
class Projectile {
  constructor(x, y, vx, vy, friendly, color) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.friendly = friendly; this.color = color || '#ff0'; this.life = 3; this.w = 8; this.h = 4;
  }
  update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.life -= dt; }
  draw(ctx) {
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color; ctx.shadowBlur = 8;
    ctx.fillRect(this.x - this.w/2, this.y - this.h/2, this.w, this.h);
    ctx.shadowBlur = 0;
  }
  get dead() { return this.life <= 0; }
}

// ─── ENEMY ───
class Enemy {
  constructor(x, y, type) {
    this.x = x; this.y = y; this.type = type; this.w = 20; this.h = 28;
    this.vx = 0; this.vy = 0; this.dir = -1; this.grounded = false;
    this.hp = type === 'ranged' ? 2 : 3;
    this.maxHp = this.hp;
    this.speed = type === 'ranged' ? 40 : 70;
    this.attackCD = 0; this.attackRange = type === 'ranged' ? 250 : 30;
    this.hitFlash = 0; this.dead = false;
    this.bodyColor = type === 'ranged' ? '#ff4444' : '#ff8800';
    this.eyeColor = '#ff0';
    this.spawnAnim = 1;
  }
  update(dt, player, addProj, gY) {
    if (this.dead) return;
    this.spawnAnim = Math.max(0, this.spawnAnim - dt * 2);
    this.hitFlash = Math.max(0, this.hitFlash - dt * 5);
    // Gravity
    this.vy += 900 * dt;
    // AI
    const dx = player.x - this.x;
    const dist = Math.abs(dx);
    this.dir = dx > 0 ? 1 : -1;
    if (this.type === 'melee') {
      if (dist > 35) this.vx = this.dir * this.speed;
      else this.vx = 0;
      this.attackCD -= dt;
      if (dist < 35 && this.attackCD <= 0) {
        this.attackCD = 1.2;
        if (Math.abs(player.y - this.y) < 30) player.takeDamage(1);
      }
    } else {
      if (dist < 100) this.vx = -this.dir * this.speed * 0.5;
      else if (dist > 280) this.vx = this.dir * this.speed * 0.5;
      else this.vx = 0;
      this.attackCD -= dt;
      if (this.attackCD <= 0 && dist < 300) {
        this.attackCD = 2;
        const ang = Math.atan2(player.y - this.y, player.x - this.x);
        addProj(new Projectile(this.x, this.y - 8, Math.cos(ang) * 200, Math.sin(ang) * 200, false, '#ff4444'));
      }
    }
    this.x += this.vx * dt; this.y += this.vy * dt;
    // Ground collision
    if (this.y + this.h/2 > gY) { this.y = gY - this.h/2; this.vy = 0; this.grounded = true; }
    // Bounds
    if (this.x < 20) this.x = 20;
    if (this.x > canvas.width - 20) this.x = canvas.width - 20;
  }
  takeDamage(dmg) {
    this.hp -= dmg; this.hitFlash = 1;
    if (this.hp <= 0) this.dead = true;
  }
  draw(ctx) {
    if (this.dead) return;
    const s = 1 - this.spawnAnim;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(s, s);
    // Body flash
    const bc = this.hitFlash > 0 ? '#fff' : this.bodyColor;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-this.w/2 - 2, this.h/2 - 4, this.w + 4, 6);
    // Legs
    const legAnim = Math.sin(Date.now() * 0.008) * 3;
    ctx.fillStyle = '#444';
    ctx.fillRect(-6, 6, 5, 10 + legAnim);
    ctx.fillRect(2, 6, 5, 10 - legAnim);
    // Body
    ctx.fillStyle = bc;
    ctx.shadowColor = this.bodyColor; ctx.shadowBlur = 6;
    ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h - 4);
    ctx.shadowBlur = 0;
    // Eyes
    ctx.fillStyle = this.eyeColor;
    const ex = this.dir > 0 ? 2 : -6;
    ctx.fillRect(ex, -this.h/2 + 6, 3, 3);
    ctx.fillRect(ex + 5, -this.h/2 + 6, 3, 3);
    // Weapon indicator
    if (this.type === 'ranged') {
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(this.dir * 10, -2, 8, 3);
    }
    // HP bar
    const hpW = 20;
    ctx.fillStyle = '#333';
    ctx.fillRect(-hpW/2, -this.h/2 - 8, hpW, 3);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(-hpW/2, -this.h/2 - 8, hpW * (this.hp / this.maxHp), 3);
    ctx.restore();
  }
}

// ─── PLAYER ───
class Player {
  constructor() { this.reset(); }
  reset() {
    this.x = 80; this.y = 0; this.w = 18; this.h = 28;
    this.vx = 0; this.vy = 0; this.dir = 1; this.grounded = false;
    this.hp = 10; this.maxHp = 10;
    this.speed = 180; this.jumpForce = -420;
    this.attacking = false; this.attackTimer = 0; this.attackCD = 0;
    this.dashing = false; this.dashTimer = 0; this.dashCD = 0; this.dashDir = 1;
    this.sliding = false; this.slideTimer = 0;
    this.invincible = 0; this.combo = 0; this.comboTimer = 0;
    this.score = 0; this.canDoubleJump = true; this.jumps = 0;
  }
  takeDamage(dmg) {
    if (this.invincible > 0 || this.dashing) return;
    this.hp -= dmg;
    this.invincible = 0.5;
    this.combo = 0;
    Audio_.hit();
    G.addParticles(this.x, this.y, '#ff0044', 8);
    if (this.hp <= 0) G.gameOver();
  }
  attack() {
    if (this.attackCD > 0) return;
    this.attacking = true; this.attackTimer = 0.2; this.attackCD = 0.35;
    Audio_.attack();
  }
  jump() {
    if (this.grounded) {
      this.vy = this.jumpForce; this.grounded = false; this.jumps = 1;
      Audio_.jump();
      G.addParticles(this.x, this.y + this.h/2, '#0ff', 4);
    } else if (this.jumps < 2) {
      this.vy = this.jumpForce * 0.85; this.jumps = 2;
      Audio_.jump();
      G.addParticles(this.x, this.y + this.h/2, '#0ff', 3);
    }
  }
  dash() {
    if (this.dashCD > 0 || this.dashing) return;
    this.dashing = true; this.dashTimer = 0.18; this.dashCD = 0.6; this.dashDir = this.dir;
    Audio_.dash();
    G.addParticles(this.x, this.y, '#ff00ff', 6);
  }
  slide() {
    if (!this.grounded || this.sliding) return;
    this.sliding = true; this.slideTimer = 0.4;
    Audio_.dash();
  }
  update(dt, gY) {
    this.invincible = Math.max(0, this.invincible - dt);
    this.attackCD = Math.max(0, this.attackCD - dt);
    this.dashCD = Math.max(0, this.dashCD - dt);
    this.comboTimer -= dt;
    if (this.comboTimer <= 0) this.combo = 0;
    // Attack
    if (this.attacking) {
      this.attackTimer -= dt;
      if (this.attackTimer <= 0) this.attacking = false;
    }
    // Dash
    if (this.dashing) {
      this.dashTimer -= dt;
      this.vx = this.dashDir * 600;
      if (this.dashTimer <= 0) this.dashing = false;
    }
    // Slide
    if (this.sliding) {
      this.slideTimer -= dt;
      this.vx = this.dir * 300;
      if (this.slideTimer <= 0) this.sliding = false;
    }
    // Gravity
    if (!this.dashing) this.vy += 900 * dt;
    // Movement
    if (!this.dashing && !this.sliding) {
      this.vx *= 0.85;
      if (G.keys.left) { this.vx = -this.speed; this.dir = -1; }
      if (G.keys.right) { this.vx = this.speed; this.dir = 1; }
    }
    this.x += this.vx * dt; this.y += this.vy * dt;
    // Ground
    if (this.y + this.h/2 > gY) { this.y = gY - this.h/2; this.vy = 0; this.grounded = true; this.jumps = 0; }
    // Platforms
    for (const p of G.platforms) {
      if (this.vy > 0 && this.x > p.x && this.x < p.x + p.w &&
          this.y + this.h/2 > p.y && this.y + this.h/2 < p.y + 14 &&
          this.y - this.h/2 < p.y) {
        this.y = p.y - this.h/2; this.vy = 0; this.grounded = true; this.jumps = 0;
      }
    }
    // Bounds
    if (this.x < 15) this.x = 15;
    if (this.x > canvas.width - 15) this.x = canvas.width - 15;
  }
  getAttackBox() {
    if (!this.attacking) return null;
    const range = 32;
    return {
      x: this.dir > 0 ? this.x + 5 : this.x - range - 5,
      y: this.y - 14, w: range, h: 28
    };
  }
  draw(ctx) {
    const skin = SKINS.find(s => s.id === G.saveData.activeSkin) || SKINS[0];
    ctx.save();
    ctx.translate(this.x, this.y);
    // Blink when invincible
    if (this.invincible > 0 && Math.floor(this.invincible * 20) % 2) { ctx.restore(); return; }
    // Dash trail
    if (this.dashing) {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = skin.glow;
      ctx.fillRect(-this.w/2 - this.dashDir * 16, -this.h/2, this.w, this.h);
      ctx.globalAlpha = 0.2;
      ctx.fillRect(-this.w/2 - this.dashDir * 30, -this.h/2, this.w, this.h);
      ctx.globalAlpha = 1;
    }
    const faceDir = this.dir;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-this.w/2 - 2, this.h/2 - 4, this.w + 4, 6);
    // Slide squash
    if (this.sliding) {
      ctx.scale(1.4, 0.6);
    }
    // Legs
    const legAnim = this.grounded ? Math.sin(Date.now() * 0.01) * (Math.abs(this.vx) > 10 ? 4 : 0) : 3;
    ctx.fillStyle = skin.accent;
    ctx.fillRect(-5, 6, 4, 10 + legAnim);
    ctx.fillRect(2, 6, 4, 10 - legAnim);
    // Body
    ctx.fillStyle = skin.body;
    ctx.shadowColor = skin.glow; ctx.shadowBlur = this.dashing ? 16 : 8;
    ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h - 4);
    ctx.shadowBlur = 0;
    // Visor
    ctx.fillStyle = '#0ff';
    const vx = faceDir > 0 ? 2 : -5;
    ctx.fillRect(vx, -this.h/2 + 5, 7, 3);
    ctx.fillStyle = '#fff';
    ctx.fillRect(vx + (faceDir > 0 ? 4 : 0), -this.h/2 + 5, 3, 3);
    // Attack slash
    if (this.attacking) {
      ctx.strokeStyle = '#ff00ff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 12;
      ctx.beginPath();
      const sx = faceDir * 12;
      ctx.moveTo(sx, -16);
      ctx.quadraticCurveTo(sx + faceDir * 22, 0, sx, 16);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }
}

// ─── BACKGROUND ───
const BG = {
  buildings: [],
  stars: [],
  init(w, h) {
    this.buildings = [];
    this.stars = [];
    for (let i = 0; i < 40; i++) {
      this.buildings.push({
        x: Math.random() * w * 2, w: 30 + Math.random() * 60,
        h: 60 + Math.random() * 120, layer: Math.floor(Math.random() * 3)
      });
    }
    for (let i = 0; i < 60; i++) {
      this.stars.push({ x: Math.random() * w, y: Math.random() * h * 0.5, s: Math.random() * 2 + 0.5, b: Math.random() });
    }
  },
  draw(ctx, w, h, time, stage) {
    const s = STAGES[stage] || STAGES[0];
    // Sky gradient
    const grd = ctx.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, s.bgColor1); grd.addColorStop(1, s.bgColor2);
    ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);
    // Stars
    for (const st of this.stars) {
      const blink = 0.3 + 0.7 * Math.abs(Math.sin(time * 2 + st.b * 10));
      ctx.globalAlpha = blink * 0.7;
      ctx.fillStyle = '#fff';
      ctx.fillRect(st.x, st.y, st.s, st.s);
    }
    ctx.globalAlpha = 1;
    // Buildings - 3 layers parallax
    const layers = [
      { color: '#080818', yOff: 0, speed: 0.1, alpha: 0.6 },
      { color: '#0c0c24', yOff: 30, speed: 0.2, alpha: 0.7 },
      { color: '#10102e', yOff: 60, speed: 0.35, alpha: 0.8 }
    ];
    for (let l = 0; l < 3; l++) {
      const ly = layers[l];
      ctx.fillStyle = ly.color;
      ctx.globalAlpha = ly.alpha;
      for (const b of this.buildings) {
        if (b.layer !== l) continue;
        const bx = ((b.x - time * 20 * ly.speed) % (w * 2) + w * 2) % (w * 2) - w * 0.5;
        const by = h - b.h - ly.yOff;
        ctx.fillRect(bx, by, b.w, b.h);
        // Windows
        ctx.fillStyle = Math.random() > 0.7 ? '#ff00ff22' : '#0ff11';
        for (let wy = by + 6; wy < by + b.h - 8; wy += 12) {
          for (let wx = bx + 4; wx < bx + b.w - 8; wx += 10) {
            if (Math.random() > 0.4) {
              ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,0,255,0.2)' : 'rgba(0,255,255,0.15)';
              ctx.fillRect(wx, wy, 5, 6);
            }
          }
        }
        ctx.fillStyle = ly.color;
      }
    }
    ctx.globalAlpha = 1;
    // Neon signs (occasional)
    const signX = ((time * 15) % w + w) % w;
    ctx.fillStyle = '#ff00ff';
    ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 15;
    ctx.fillRect(signX, h - 200, 40, 8);
    ctx.shadowBlur = 0;
    // Ground line
    ctx.fillStyle = '#ff00ff';
    ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 8;
    ctx.fillRect(0, h - 50, w, 2);
    ctx.shadowBlur = 0;
    // Ground
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, h - 48, w, 48);
    // Ground grid lines
    ctx.strokeStyle = 'rgba(255,0,255,0.1)';
    ctx.lineWidth = 1;
    for (let gx = 0; gx < w; gx += 40) {
      const ox = ((gx - time * 30) % 40 + 40) % 40;
      ctx.beginPath(); ctx.moveTo(ox + gx - 40, h - 48); ctx.lineTo(ox + gx - 40, h); ctx.stroke();
    }
  }
};

// ─── GAME ───
const G = {
  state: 'menu', // menu, playing, paused, gameover, stageclear, skins
  keys: { left: false, right: false, up: false, attack: false, dash: false, slide: false },
  player: null, enemies: [], particles: [], projectiles: [], platforms: [],
  saveData: null, currentStage: 0, currentWave: 0, time: 0,
  waveSpawnTimer: 0, waveEnemiesLeft: 0, waveActive: false,
  screenShake: 0, comboPopupTimer: 0,

  init() {
    this.saveData = Save.load();
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.setupInput();
    $('loading').classList.add('hidden');
    this.showMenu();
    requestAnimationFrame(t => this.loop(t));
  },

  resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.imageSmoothingEnabled = false;
    BG.init(canvas.width, canvas.height);
  },

  setupInput() {
    // Keyboard
    const keyMap = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'slide',
      a: 'left', d: 'right', w: 'up', s: 'slide', ' ': 'attack', j: 'attack', k: 'dash',
      KeyA: 'left', KeyD: 'right', KeyW: 'up', KeyS: 'slide' };
    window.addEventListener('keydown', e => {
      Audio_.init();
      const k = keyMap[e.key] || keyMap[e.code];
      if (k) { this.keys[k] = true; e.preventDefault(); }
      if (e.key === 'Escape') this.togglePause();
      if (k === 'up' && this.state === 'playing') this.player.jump();
      if (k === 'attack' && this.state === 'playing') this.player.attack();
      if (k === 'dash' && this.state === 'playing') this.player.dash();
      if (k === 'slide' && this.state === 'playing') this.player.slide();
    });
    window.addEventListener('keyup', e => {
      const k = keyMap[e.key] || keyMap[e.code];
      if (k) this.keys[k] = false;
    });
    // Touch controls
    const bindTouch = (id, down, up) => {
      const el = $(id);
      el.addEventListener('touchstart', e => { e.preventDefault(); Audio_.init(); down(); });
      el.addEventListener('touchend', e => { e.preventDefault(); if (up) up(); });
    };
    bindTouch('tb-left', () => this.keys.left = true, () => this.keys.left = false);
    bindTouch('tb-right', () => this.keys.right = true, () => this.keys.right = false);
    bindTouch('tb-jump', () => { if (this.state === 'playing') this.player.jump(); });
    bindTouch('tb-attack', () => { if (this.state === 'playing') this.player.attack(); });
    bindTouch('tb-dash', () => { if (this.state === 'playing') this.player.dash(); });
    // Detect touch device
    window.addEventListener('touchstart', () => {
      $('touch-controls').classList.add('visible');
    }, { once: true });
  },

  showMenu() {
    this.state = 'menu';
    $('menu').classList.remove('hidden');
    $('gameover').classList.add('hidden');
    $('stageclear').classList.add('hidden');
    $('skinselect').classList.add('hidden');
    $('pause-screen').classList.add('hidden');
    $('hud').classList.add('hidden');
    Audio_.stopBGM();
  },

  showSkins() {
    this.state = 'skins';
    $('menu').classList.add('hidden');
    $('skinselect').classList.remove('hidden');
    const grid = $('skin-grid');
    grid.innerHTML = '';
    SKINS.forEach(skin => {
      const unlocked = this.saveData.skins.includes(skin.id);
      const active = this.saveData.activeSkin === skin.id;
      const card = document.createElement('div');
      card.className = `skin-card ${unlocked ? 'unlocked' : 'locked'} ${active ? 'active' : ''}`;
      card.innerHTML = `<div style="width:24px;height:32px;background:${unlocked ? skin.body : '#333'};box-shadow:0 0 8px ${unlocked ? skin.glow : 'transparent'};border-radius:2px"></div><div class="skin-name">${skin.name}</div><div class="skin-name">${unlocked ? (active ? '✓ ACTIVE' : 'SELECT') : '🔒 LOCKED'}</div>`;
      if (unlocked && !active) {
        card.onclick = () => {
          this.saveData.activeSkin = skin.id;
          Save.save(this.saveData);
          this.showSkins();
        };
      }
      grid.appendChild(card);
    });
  },

  startGame() {
    Audio_.init(); Audio_.startBGM();
    this.state = 'playing';
    this.player = new Player();
    this.enemies = []; this.particles = []; this.projectiles = [];
    this.currentStage = 0; this.currentWave = 0;
    this.player.score = 0;
    ['menu','gameover','stageclear','skinselect','pause-screen'].forEach(id => $(id).classList.add('hidden'));
    $('hud').classList.remove('hidden');
    this.buildPlatforms();
    this.startWave();
  },

  buildPlatforms() {
    this.platforms = [];
    const gY = canvas.height - 48;
    const h = 10;
    // Procedural platforms
    const configs = [
      [{ x: 0.15, y: -80 }, { x: 0.45, y: -130 }, { x: 0.75, y: -80 }],
      [{ x: 0.1, y: -100 }, { x: 0.35, y: -60 }, { x: 0.55, y: -140 }, { x: 0.8, y: -90 }],
      [{ x: 0.2, y: -70 }, { x: 0.4, y: -130 }, { x: 0.6, y: -70 }, { x: 0.85, y: -120 }]
    ];
    const cfg = configs[this.currentStage % 3];
    cfg.forEach(p => {
      this.platforms.push({ x: canvas.width * p.x - 40, y: gY + p.y, w: 80, h });
    });
  },

  startWave() {
    const stage = STAGES[this.currentStage];
    if (!stage || this.currentWave >= stage.waves) { this.stageClear(); return; }
    this.waveActive = true;
    const waveData = stage.enemies[this.currentWave];
    let totalEnemies = 0;
    waveData.forEach(group => {
      for (let i = 0; i < group.count; i++) {
        const side = Math.random() > 0.5 ? canvas.width + 30 : -30;
        const delay = i * 0.3 + Math.random() * 0.5;
        setTimeout(() => {
          if (this.state !== 'playing') return;
          const gY = canvas.height - 48;
          this.enemies.push(new Enemy(side, gY - 40, group.type));
        }, delay * 1000);
        totalEnemies++;
      }
    });
    this.waveEnemiesLeft = totalEnemies;
    $('wave-val').textContent = this.currentWave + 1;
  },

  stageClear() {
    this.state = 'stageclear';
    Audio_.clear();
    const stageIdx = this.currentStage;
    $('clear-msg').textContent = `${STAGES[stageIdx].name} SECURED`;
    // Unlock skin
    let unlockMsg = '';
    if (stageIdx + 1 > this.saveData.stagesCleared) {
      this.saveData.stagesCleared = stageIdx + 1;
      const unlockSkin = SKINS.find(s => s.unlock === stageIdx + 1);
      if (unlockSkin && !this.saveData.skins.includes(unlockSkin.id)) {
        this.saveData.skins.push(unlockSkin.id);
        unlockMsg = `UNLOCKED: ${unlockSkin.name}!`;
        Audio_.unlock();
      }
    }
    $('unlock-msg').textContent = unlockMsg;
    if (this.player.score > this.saveData.highScore) this.saveData.highScore = this.player.score;
    Save.save(this.saveData);
    $('stageclear').classList.remove('hidden');
    $('hud').classList.add('hidden');
  },

  nextStage() {
    this.currentStage++;
    if (this.currentStage >= STAGES.length) {
      // Game complete - show final score
      this.saveData.stagesCleared = 3;
      Save.save(this.saveData);
      $('stageclear').classList.add('hidden');
      $('gameover').classList.remove('hidden');
      $('go-score').textContent = this.player.score;
      document.querySelector('#gameover h1').textContent = 'MISSION COMPLETE';
      this.state = 'gameover';
      return;
    }
    this.currentWave = 0;
    this.enemies = []; this.projectiles = [];
    this.state = 'playing';
    $('stageclear').classList.add('hidden');
    $('hud').classList.remove('hidden');
    $('stage-val').textContent = this.currentStage + 1;
    this.buildPlatforms();
    this.startWave();
  },

  gameOver() {
    this.state = 'gameover';
    Audio_.stopBGM();
    if (this.player.score > this.saveData.highScore) this.saveData.highScore = this.player.score;
    Save.save(this.saveData);
    document.querySelector('#gameover h1').textContent = 'FLATLINED';
    $('go-score').textContent = this.player.score;
    $('gameover').classList.remove('hidden');
    $('hud').classList.add('hidden');
  },

  togglePause() {
    if (this.state === 'playing') {
      this.state = 'paused';
      $('pause-screen').classList.remove('hidden');
      Audio_.stopBGM();
    } else if (this.state === 'paused') {
      this.resume();
    }
  },

  resume() {
    this.state = 'playing';
    $('pause-screen').classList.add('hidden');
    Audio_.startBGM();
  },

  addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      this.particles.push(new Particle(x, y,
        (Math.random() - 0.5) * 200, -Math.random() * 200 - 50,
        color, 0.4 + Math.random() * 0.3, 2 + Math.random() * 3));
    }
  },

  // ─── MAIN LOOP ───
  lastTime: 0,
  loop(time) {
    const dt = Math.min((time - this.lastTime) / 1000, 0.05);
    this.lastTime = time;
    this.time += dt;

    // Clear
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background always draws
    BG.draw(ctx, canvas.width, canvas.height, this.time, this.currentStage);

    // Draw platforms
    this.platforms.forEach(p => {
      ctx.fillStyle = '#1a1a3a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#ff00ff';
      ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 6;
      ctx.fillRect(p.x, p.y, p.w, 2);
      ctx.shadowBlur = 0;
      // Cyan edge
      ctx.fillStyle = '#0ff';
      ctx.fillRect(p.x, p.y + p.h - 1, p.w, 1);
    });

    if (this.state === 'playing') {
      const gY = canvas.height - 48;
      this.player.update(dt, gY);

      // Enemies
      this.enemies.forEach(e => e.update(dt, this.player, p => this.projectiles.push(p), gY));

      // Attack collision
      const atk = this.player.getAttackBox();
      if (atk) {
        this.enemies.forEach(e => {
          if (e.dead) return;
          if (atk.x < e.x + e.w/2 && atk.x + atk.w > e.x - e.w/2 &&
              atk.y < e.y + e.h/2 && atk.y + atk.h > e.y - e.h/2) {
            e.takeDamage(1);
            this.addParticles(e.x, e.y, '#ff00ff', 4);
            this.screenShake = 0.08;
            if (e.dead) {
              this.player.combo++;
              this.player.comboTimer = 3;
              const comboMult = Math.min(this.player.combo, 10);
              const pts = 100 * comboMult;
              this.player.score += pts;
              Audio_.kill();
              this.addParticles(e.x, e.y, e.bodyColor, 10);
              this.waveEnemiesLeft--;
              if (this.player.combo > 2) {
                this.comboPopupTimer = 0.8;
                $('combo-popup').textContent = `${this.player.combo}x COMBO! +${pts}`;
                $('combo-popup').classList.add('show');
              }
            }
          }
        });
      }

      // Projectile collision
      this.projectiles.forEach(p => {
        if (!p.friendly && !p.dead) {
          if (Math.abs(p.x - this.player.x) < 14 && Math.abs(p.y - this.player.y) < 18) {
            this.player.takeDamage(1);
            p.life = 0;
          }
        }
      });

      // Dash damage
      if (this.player.dashing) {
        this.enemies.forEach(e => {
          if (e.dead) return;
          if (Math.abs(this.player.x - e.x) < 25 && Math.abs(this.player.y - e.y) < 25) {
            e.takeDamage(2);
            this.addParticles(e.x, e.y, '#ff00ff', 6);
            this.screenShake = 0.1;
            if (e.dead) {
              this.player.combo++;
              this.player.comboTimer = 3;
              this.player.score += 100 * Math.min(this.player.combo, 10);
              Audio_.kill();
              this.addParticles(e.x, e.y, e.bodyColor, 12);
              this.waveEnemiesLeft--;
            }
          }
        });
      }

      // Clean dead
      this.enemies = this.enemies.filter(e => !e.dead);
      this.projectiles = this.projectiles.filter(p => !p.dead);

      // Particles
      this.particles.forEach(p => p.update(dt));
      this.particles = this.particles.filter(p => !p.dead);

      // Wave completion check
      if (this.waveActive && this.waveEnemiesLeft <= 0 && this.enemies.length === 0) {
        this.waveActive = false;
        this.currentWave++;
        setTimeout(() => {
          if (this.state === 'playing') this.startWave();
        }, 1000);
      }

      // Screen shake
      if (this.screenShake > 0) {
        this.screenShake -= dt;
        ctx.save();
        ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);
      }

      // Combo popup timer
      if (this.comboPopupTimer > 0) {
        this.comboPopupTimer -= dt;
        if (this.comboPopupTimer <= 0) $('combo-popup').classList.remove('show');
      }

      // Draw projectiles
      this.projectiles.forEach(p => p.draw(ctx));

      // Draw enemies
      this.enemies.forEach(e => e.draw(ctx));

      // Draw player
      this.player.draw(ctx);

      // Draw particles
      this.particles.forEach(p => p.draw(ctx));

      if (this.screenShake > 0) ctx.restore();

      // HUD updates
      const hpPct = Math.max(0, (this.player.hp / this.player.maxHp) * 100);
      $('hp-fill').style.width = hpPct + '%';
      $('hp-text').textContent = `${this.player.hp}/${this.player.maxHp}`;
      $('combo-count').textContent = this.player.combo;
      $('score-val').textContent = this.player.score;
    }

    requestAnimationFrame(t => this.loop(t));
  }
};

// ─── INIT ───
window.addEventListener('load', () => G.init());
</script>
