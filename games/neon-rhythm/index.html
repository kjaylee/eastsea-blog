<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Rhythm — Tap Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Courier New',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none}
canvas{display:block;touch-action:none}
#overlay{position:fixed;inset:0;background:rgba(10,10,26,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:16px}
#overlay.hidden{display:none}
.title{font-size:2.6em;font-weight:bold;text-shadow:0 0 20px #f0f,0 0 40px #f0f;color:#f0f;letter-spacing:4px;text-align:center}
.sub{color:#888;font-size:.85em;text-align:center}
.btn{background:transparent;border:2px solid #f0f;color:#f0f;padding:12px 32px;font-size:1em;font-family:inherit;cursor:pointer;letter-spacing:2px;transition:all .2s;text-transform:uppercase}
.btn:hover,.btn:active{background:#f0f;color:#0a0a1a;box-shadow:0 0 20px #f0f}
.song-list{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.song-btn{background:transparent;border:2px solid #0ff;color:#0ff;padding:10px 20px;font-size:.85em;font-family:inherit;cursor:pointer;transition:all .2s}
.song-btn:hover,.song-btn.active{background:#0ff;color:#0a0a1a}
.hiscore{color:#ff0;font-size:.8em}
.stat-row{display:flex;gap:24px;font-size:.85em}
.stat{text-align:center}
.stat b{display:block;font-size:1.3em;color:#0ff}
.stat span{color:#666;font-size:.8em}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay" id="overlay">
  <div class="title">NEON<br>RHYTHM</div>
  <div class="sub">Tap the lanes when notes reach the hit zone!</div>
  <div class="sub" style="margin-top:4px">Choose a song:</div>
  <div class="song-list" id="songList"></div>
  <div class="hiscore" id="startHi"></div>
  <button class="btn" id="startBtn">▶ PLAY</button>
  <div class="sub" style="font-size:.7em">Keys: A / S / D &nbsp;|&nbsp; Touch lanes</div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const HI_KEY='neon-rhythm-hi';

let W,H;
function resize(){
  W=Math.min(420,window.innerWidth);
  H=window.innerHeight;
  canvas.width=W; canvas.height=H;
}
resize();
window.addEventListener('resize',resize);

const AC=new(window.AudioContext||window.webkitAudioContext)();

function tone(freq,dur,type='sine',vol=0.25){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start(); o.stop(AC.currentTime+dur);
}
function hitSound(judge){
  if(judge==='PERFECT')tone(880,0.08,'sine',0.3);
  else if(judge==='GOOD')tone(660,0.08,'sine',0.2);
  else tone(220,0.1,'square',0.15);
}

// Songs: BPM + pattern (0=left,1=center,2=right, -1=pause)
const SONGS=[
  {
    name:'CYBER BEAT',color:'#0ff',bpm:128,
    freqs:[262,330,392,523,659,784],
    // Each beat: lane (0/1/2) or null
    pattern:[
      0,1,2,1, 0,2,1,0, 1,2,0,2, 1,0,2,1,
      0,0,1,2, 2,1,0,0, 1,1,2,0, 2,2,0,1,
      0,1,2,1, 0,2,1,0, 1,2,0,2, 1,0,2,1,
      0,1,2,0, 1,2,0,1, 2,0,1,2, 0,1,2,null,
      0,1,2,1, 0,2,1,0, 1,null,0,2, 1,0,2,1,
      0,0,1,2, 2,null,0,0, 1,1,2,0, 2,null,0,1,
      0,1,2,1, 0,2,1,0, 1,2,0,2, 1,0,2,1,
      0,1,null,0, 1,2,0,1, 2,0,1,2, null,1,2,null
    ]
  },
  {
    name:'NEON PULSE',color:'#f0f',bpm:140,
    freqs:[294,370,440,587,740,880],
    pattern:[
      0,null,1,null, 2,null,1,null, 0,null,2,null, 1,null,0,null,
      0,1,null,2, 1,null,2,0, null,1,2,1, 0,null,1,2,
      0,1,2,0, 1,2,0,1, 2,0,1,2, 0,1,2,0,
      null,1,null,2, 0,null,1,null, 2,0,null,1, null,2,0,null,
      0,1,2,1, null,2,1,0, 1,2,null,2, 1,0,2,1,
      0,null,1,2, 2,1,null,0, 0,1,2,null, 1,0,2,1,
      0,1,2,0, 1,2,0,1, 2,0,1,2, 0,1,2,null,
      0,1,null,0, null,2,0,1, 2,0,null,2, 0,1,2,null
    ]
  },
  {
    name:'OVERDRIVE',color:'#ff0',bpm:160,
    freqs:[330,415,494,622,830,988],
    pattern:[
      0,1,2,0, 1,2,0,1, 2,0,1,2, 0,1,2,1,
      0,1,2,1, 0,1,2,1, 0,1,2,1, 0,1,2,1,
      0,2,0,2, 1,null,1,null, 0,2,0,2, 1,0,1,0,
      2,1,0,2, 1,0,2,1, 0,2,1,0, 2,1,0,2,
      0,1,2,0, 1,2,0,1, 2,0,1,2, 0,1,2,0,
      0,1,2,1, 2,0,1,2, 0,2,1,0, 1,0,2,1,
      0,0,1,1, 2,2,0,0, 1,1,2,2, 0,0,1,2,
      0,1,2,0, 1,2,0,1, 2,0,1,2, 0,1,2,null
    ]
  }
];

let selectedSong=0;
let gameState='START'; // START, PLAYING, OVER
let notes=[], particles=[], flashEffects=[];
let score=0,combo=0,maxCombo=0,health=100;
let perfCount=0,goodCount=0,missCount=0;
let songBeatIdx=0, nextBeatTime=0, songInterval=0;
let gameTick=0, totalBeats=0, lastBeat=-1;
let judgeFade=[{txt:'',col:'',life:0},{txt:'',col:'',life:0},{txt:'',col:'',life:0}];
let hitFlash=[0,0,0]; // per lane flash timer
let songDone=false;

const LANE_COLS=['#ff3366','#33ffcc','#ff9900'];
const LANE_KEYS=[65,83,68]; // A S D
const NOTE_H=22, NOTE_W_FRAC=0.28;
const HIT_Y_FRAC=0.85;
const PERFECT_WINDOW=0.09, GOOD_WINDOW=0.18; // seconds

function laneX(i){return (W/2)+(i-1)*(W*NOTE_W_FRAC+4);}
function laneW(){return W*NOTE_W_FRAC;}

function buildNotes(song){
  notes=[];
  const beatMs=60000/song.bpm;
  let time=1200; // ms delay before first note
  song.pattern.forEach((lane,i)=>{
    if(lane!==null&&lane>=0&&lane<=2){
      const fi=Math.min(i%song.freqs.length,song.freqs.length-1);
      notes.push({lane,time,freq:song.freqs[fi%song.freqs.length],hit:false,miss:false,y:-NOTE_H});
    }
    time+=beatMs;
  });
  totalBeats=time+2000;
}

function startGame(){
  AC.resume();
  const song=SONGS[selectedSong];
  buildNotes(song);
  score=0;combo=0;maxCombo=0;health=100;
  perfCount=0;goodCount=0;missCount=0;
  particles=[];flashEffects=[];
  judgeFade=[{txt:'',col:'',life:0},{txt:'',col:'',life:0},{txt:'',col:'',life:0}];
  hitFlash=[0,0,0];
  songDone=false;
  gameState='PLAYING';
  overlay.classList.add('hidden');
  gameStartTime=performance.now();
}

let gameStartTime=0;

function tapLane(lane){
  if(gameState!=='PLAYING')return;
  const now=performance.now()-gameStartTime;
  const hitY=H*HIT_Y_FRAC;
  const song=SONGS[selectedSong];
  const beatMs=60000/song.bpm;
  const speed=H/(beatMs*2.5); // px/ms: note travels from top to hitY in 2.5 beats

  // Find nearest unhit note in this lane
  let best=null,bestErr=9999;
  notes.forEach(n=>{
    if(n.hit||n.miss||n.lane!==lane)return;
    const err=Math.abs(n.time-now)/1000;
    if(err<bestErr){bestErr=err;best=n;}
  });

  if(best&&bestErr<GOOD_WINDOW){
    best.hit=true;
    const judge=bestErr<PERFECT_WINDOW?'PERFECT':'GOOD';
    const pts=judge==='PERFECT'?100*(1+Math.floor(combo/10)):50*(1+Math.floor(combo/10));
    score+=pts;
    combo++;
    maxCombo=Math.max(maxCombo,combo);
    if(judge==='PERFECT')perfCount++;else goodCount++;
    hitFlash[lane]=10;
    judgeFade[lane]={txt:judge,col:judge==='PERFECT'?'#0ff':'#0f0',life:30};
    addParticle(laneX(lane),hitY,LANE_COLS[lane]);
    hitSound(judge);
    tone(best.freq,0.15,'sine',0.2);
  } else {
    // tap miss (empty tap)
    judgeFade[lane]={txt:'',col:'',life:0};
  }
}

function addParticle(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:20+Math.random()*15,col});
  }
}

function update(){
  if(gameState!=='PLAYING')return;
  const now=performance.now()-gameStartTime;
  const song=SONGS[selectedSong];
  const beatMs=60000/song.bpm;
  const travelTime=beatMs*2.5;
  const hitY=H*HIT_Y_FRAC;

  // Update note positions
  notes.forEach(n=>{
    if(n.hit||n.miss)return;
    const t=n.time-now; // ms until note should be hit
    n.y=hitY-(t/travelTime)*hitY*1.1;
  });

  // Check for missed notes (passed hit zone)
  notes.forEach(n=>{
    if(n.hit||n.miss)return;
    const elapsed=now-n.time;
    if(elapsed>GOOD_WINDOW*1000+100){
      n.miss=true;
      combo=0;
      missCount++;
      health=Math.max(0,health-12);
      judgeFade[n.lane]={txt:'MISS',col:'#f44',life:30};
      hitSound('MISS');
    }
  });

  if(health<=0){
    gameOver();
    return;
  }

  // Check song end
  if(now>totalBeats){
    songDone=true;
    gameOver();
  }
}

function gameOver(){
  gameState='OVER';
  const hiKey=HI_KEY+'-'+selectedSong;
  const prev=parseInt(localStorage.getItem(hiKey)||'0');
  const newHi=Math.max(score,prev);
  localStorage.setItem(hiKey,newHi);
  const song=SONGS[selectedSong];
  setTimeout(()=>{
    overlay.classList.remove('hidden');
    overlay.innerHTML=`
      <div class="title" style="font-size:1.6em;color:${song.color}">${songDone?'CLEAR!':'GAME OVER'}</div>
      <div class="sub">${song.name}</div>
      <div style="color:#0ff;font-size:1.5em;margin:4px 0">Score: ${score}</div>
      <div class="hiscore">Best: ${newHi}</div>
      <div class="stat-row">
        <div class="stat"><b style="color:#0ff">${maxCombo}</b><span>Max Combo</span></div>
        <div class="stat"><b style="color:#0f0">${perfCount}</b><span>Perfect</span></div>
        <div class="stat"><b style="color:#ff0">${goodCount}</b><span>Good</span></div>
        <div class="stat"><b style="color:#f44">${missCount}</b><span>Miss</span></div>
      </div>
      <button class="btn" onclick="goBack()">◀ BACK</button>
      <button class="btn" style="border-color:#0ff;color:#0ff" onclick="retryGame()">↺ RETRY</button>
    `;
  },600);
}

window.goBack=function(){
  gameState='START';
  overlay.classList.remove('hidden');
  overlay.innerHTML=startScreenHTML();
  bindStartScreen();
};
window.retryGame=function(){
  overlay.classList.add('hidden');
  startGame();
};

function startScreenHTML(){
  const hiKey=HI_KEY+'-'+selectedSong;
  const hi=localStorage.getItem(hiKey)||0;
  return `
    <div class="title">NEON<br>RHYTHM</div>
    <div class="sub">Tap the lanes when notes reach the hit zone!</div>
    <div class="sub" style="margin-top:4px">Choose a song:</div>
    <div class="song-list" id="songList"></div>
    <div class="hiscore" id="startHi">Best: ${hi}</div>
    <button class="btn" id="startBtn">▶ PLAY</button>
    <div class="sub" style="font-size:.7em">Keys: A / S / D &nbsp;|&nbsp; Touch lanes</div>
  `;
}

function bindStartScreen(){
  const sl=document.getElementById('songList');
  if(sl){
    sl.innerHTML='';
    SONGS.forEach((s,i)=>{
      const b=document.createElement('button');
      b.className='song-btn'+(i===selectedSong?' active':'');
      b.textContent=`${s.name} ${s.bpm}BPM`;
      b.style.borderColor=s.color; b.style.color=s.color;
      b.onclick=()=>{
        selectedSong=i;
        document.querySelectorAll('.song-btn').forEach((x,j)=>x.classList.toggle('active',j===i));
        const hi=localStorage.getItem(HI_KEY+'-'+i)||0;
        const sh=document.getElementById('startHi');
        if(sh)sh.textContent=`Best: ${hi}`;
      };
      sl.appendChild(b);
    });
  }
  const sb=document.getElementById('startBtn');
  if(sb)sb.addEventListener('click',()=>{AC.resume();startGame();});
}

// Drawing
function drawBG(){
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);
  // Scanlines
  ctx.save();
  ctx.globalAlpha=0.03;
  for(let y=0;y<H;y+=4){
    ctx.fillStyle='#000';
    ctx.fillRect(0,y,W,2);
  }
  ctx.restore();
}

function drawLanes(){
  const hitY=H*HIT_Y_FRAC;
  const lw=laneW();
  for(let i=0;i<3;i++){
    const x=laneX(i);
    const col=LANE_COLS[i];
    // Lane background
    ctx.save();
    ctx.globalAlpha=0.08+(hitFlash[i]>0?0.15:0);
    ctx.fillStyle=col;
    ctx.fillRect(x-lw/2,0,lw,H);
    ctx.restore();
    // Lane borders
    ctx.save();
    ctx.strokeStyle=col;
    ctx.globalAlpha=0.25;
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x-lw/2,0);ctx.lineTo(x-lw/2,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+lw/2,0);ctx.lineTo(x+lw/2,H);ctx.stroke();
    ctx.restore();
    // Hit zone
    ctx.save();
    ctx.globalAlpha=hitFlash[i]>0?0.9:0.55;
    ctx.strokeStyle=col;
    ctx.lineWidth=hitFlash[i]>0?4:2;
    ctx.shadowColor=col; ctx.shadowBlur=hitFlash[i]>0?20:8;
    ctx.beginPath();ctx.roundRect(x-lw/2+4,hitY-NOTE_H/2,lw-8,NOTE_H,4);ctx.stroke();
    ctx.restore();
    if(hitFlash[i]>0)hitFlash[i]--;
    // Lane label
    ctx.save();
    ctx.fillStyle=col;ctx.globalAlpha=0.7;
    ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText(['A','S','D'][i],x,hitY+NOTE_H+18);
    ctx.restore();
  }
}

function drawNotes(){
  const lw=laneW();
  notes.forEach(n=>{
    if(n.hit){return;}
    if(n.y<-NOTE_H*2||n.y>H+NOTE_H)return;
    const x=laneX(n.lane);
    const col=LANE_COLS[n.lane];
    const alpha=n.miss?0.2:1;
    ctx.save();
    ctx.globalAlpha=alpha;
    // Glow
    ctx.shadowColor=col; ctx.shadowBlur=12;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.roundRect(x-lw/2+4,n.y-NOTE_H/2,lw-8,NOTE_H,4);ctx.fill();
    // Highlight
    ctx.globalAlpha=alpha*0.5;
    ctx.fillStyle='#fff';
    ctx.fillRect(x-lw/2+8,n.y-NOTE_H/2+3,lw-16,4);
    ctx.restore();
  });
}

function drawHUD(){
  const song=SONGS[selectedSong];
  const hitY=H*HIT_Y_FRAC;
  // Health bar
  const bw=W-40,bh=8,bx=20,by=H*0.03;
  ctx.fillStyle='#222';ctx.fillRect(bx,by,bw,bh);
  const hpFrac=health/100;
  const hpCol=hpFrac>0.5?'#0f0':hpFrac>0.25?'#ff0':'#f00';
  ctx.shadowColor=hpCol;ctx.shadowBlur=6;
  ctx.fillStyle=hpCol;ctx.fillRect(bx,by,bw*hpFrac,bh);
  ctx.shadowBlur=0;
  ctx.fillStyle='#555';ctx.font='10px monospace';ctx.textAlign='left';
  ctx.fillText(`HP ${health}%`,bx,by-3);

  // Score & combo
  ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.textAlign='right';
  ctx.fillText(score.toLocaleString(),W-16,H*0.08+6);
  ctx.font='11px monospace';ctx.fillStyle='#888';
  ctx.fillText(combo>1?`×${combo} COMBO`:'',W-16,H*0.08+22);

  // Song name top center
  ctx.font='11px monospace';ctx.fillStyle=song.color;ctx.textAlign='center';ctx.globalAlpha=0.6;
  ctx.fillText(song.name,W/2,H*0.04+12);ctx.globalAlpha=1;

  // Judge texts per lane
  for(let i=0;i<3;i++){
    const jf=judgeFade[i];
    if(!jf.txt||jf.life<=0)continue;
    ctx.save();
    ctx.globalAlpha=jf.life/30;
    ctx.fillStyle=jf.col;
    ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.shadowColor=jf.col;ctx.shadowBlur=10;
    ctx.fillText(jf.txt,laneX(i),hitY-30-(30-jf.life)*0.4);
    ctx.restore();
    jf.life--;
  }

  // Progress bar at very bottom
  const pct=Math.min(1,(performance.now()-gameStartTime)/totalBeats);
  ctx.fillStyle='#333';ctx.fillRect(0,H-3,W,3);
  ctx.fillStyle=song.color;ctx.fillRect(0,H-3,W*pct,3);
}

function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life--;
    ctx.save();ctx.globalAlpha=p.life/35;
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  particles=particles.filter(p=>p.life>0);
}

function loop(){
  requestAnimationFrame(loop);
  if(gameState==='PLAYING')update();
  drawBG();
  if(gameState==='PLAYING'){
    drawLanes();
    drawNotes();
    drawParticles();
    drawHUD();
  }
}

// Keyboard
window.addEventListener('keydown',e=>{
  if(gameState!=='PLAYING')return;
  const lane=LANE_KEYS.indexOf(e.keyCode);
  if(lane!==-1){e.preventDefault();tapLane(lane);}
});

// Touch
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(gameState!=='PLAYING')return;
  AC.resume();
  Array.from(e.changedTouches).forEach(t=>{
    const r=canvas.getBoundingClientRect();
    const tx=t.clientX-r.left;
    const lw=laneW();
    for(let i=0;i<3;i++){
      if(Math.abs(tx-laneX(i))<lw/2+8){tapLane(i);break;}
    }
  });
},{passive:false});

// Mouse click
canvas.addEventListener('mousedown',e=>{
  if(gameState!=='PLAYING')return;
  AC.resume();
  const r=canvas.getBoundingClientRect();
  const tx=e.clientX-r.left;
  const lw=laneW();
  for(let i=0;i<3;i++){
    if(Math.abs(tx-laneX(i))<lw/2+8){tapLane(i);break;}
  }
});

// Init
const hiVal=localStorage.getItem(HI_KEY+'-0')||0;
document.getElementById('startHi').textContent=`Best: ${hiVal}`;
bindStartScreen();
loop();
</script>
</body>
</html>
