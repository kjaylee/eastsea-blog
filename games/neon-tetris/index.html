<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Tetris</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100%;
    padding: 8px;
    gap: 8px;
  }

  h1 {
    font-size: clamp(18px, 4vw, 28px);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
    margin: 4px 0;
  }

  #game-area {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    justify-content: center;
    flex: 1;
    width: 100%;
    max-width: 520px;
  }

  /* ── Canvas ── */
  #board {
    display: block;
    border: 2px solid #0ff;
    box-shadow: 0 0 12px #0ff, 0 0 24px #0ff4, inset 0 0 8px #0ff2;
    background: #05051a;
    flex-shrink: 0;
  }

  /* ── Side Panel ── */
  #panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 90px;
  }

  .panel-box {
    background: #0d0d2a;
    border: 1px solid #0ff4;
    border-radius: 6px;
    padding: 8px;
    text-align: center;
  }

  .panel-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #0ff;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: 0 0 6px #0ff;
  }

  .panel-value {
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 8px #fff6;
  }

  #next-canvas {
    display: block;
    margin: 0 auto;
  }

  /* ── Touch Controls ── */
  #touch-controls {
    display: flex;
    gap: 8px;
    justify-content: center;
    width: 100%;
    max-width: 340px;
  }

  .btn {
    flex: 1;
    height: 52px;
    background: #0d0d2a;
    border: 1px solid #0ff5;
    border-radius: 8px;
    color: #0ff;
    font-size: 20px;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }

  .btn:active { background: #1a1a4a; }

  /* ── Screens ── */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a1aee;
    z-index: 10;
    gap: 20px;
    padding: 20px;
    text-align: center;
  }

  .screen.hidden { display: none; }

  .screen h2 {
    font-size: clamp(24px, 6vw, 42px);
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 10px #f0f, 0 0 20px #f0f, 0 0 40px #f0f;
  }

  .screen p {
    color: #aaf;
    font-size: clamp(13px, 3vw, 16px);
    line-height: 1.6;
    max-width: 300px;
  }

  .screen-score {
    font-size: clamp(20px, 5vw, 32px);
    color: #ff0;
    text-shadow: 0 0 10px #ff0;
  }

  .screen-best {
    font-size: clamp(14px, 3vw, 18px);
    color: #0f0;
    text-shadow: 0 0 8px #0f0;
  }

  .play-btn {
    padding: 14px 40px;
    font-size: clamp(14px, 4vw, 18px);
    letter-spacing: 3px;
    background: transparent;
    border: 2px solid #0ff;
    color: #0ff;
    border-radius: 8px;
    cursor: pointer;
    text-transform: uppercase;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 12px #0ff4;
    transition: all 0.2s;
  }

  .play-btn:hover { background: #0ff2; box-shadow: 0 0 20px #0ff8; }

  /* ── Pause indicator ── */
  #pause-indicator {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 12px #0ff;
    display: none;
    z-index: 9;
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen">
  <h2>NEON TETRIS</h2>
  <p>Stack tetrominoes, clear lines, level up!<br>
     ← → Move &nbsp; ↑ Rotate &nbsp; ↓ Soft Drop<br>
     Space: Hard Drop &nbsp; P: Pause</p>
  <div id="start-best" class="screen-best"></div>
  <button class="play-btn" id="start-btn">PLAY</button>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameover-screen" class="screen hidden">
  <h2>GAME OVER</h2>
  <div id="go-score" class="screen-score"></div>
  <div id="go-best" class="screen-best"></div>
  <button class="play-btn" id="restart-btn">RESTART</button>
</div>

<div id="pause-indicator">PAUSED</div>

<!-- MAIN LAYOUT -->
<div id="app">
  <h1>NEON TETRIS</h1>
  <div id="game-area">
    <canvas id="board"></canvas>
    <div id="panel">
      <div class="panel-box">
        <div class="panel-label">Score</div>
        <div class="panel-value" id="score-val">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">Best</div>
        <div class="panel-value" id="best-val">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">Level</div>
        <div class="panel-value" id="level-val">1</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">Lines</div>
        <div class="panel-value" id="lines-val">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">Next</div>
        <canvas id="next-canvas" width="80" height="80"></canvas>
      </div>
    </div>
  </div>

  <!-- Mobile touch controls -->
  <div id="touch-controls">
    <button class="btn" id="btn-left" aria-label="Left">◀</button>
    <button class="btn" id="btn-rotate" aria-label="Rotate">↻</button>
    <button class="btn" id="btn-right" aria-label="Right">▶</button>
    <button class="btn" id="btn-down" aria-label="Down">▼</button>
    <button class="btn" id="btn-drop" aria-label="Hard Drop">⬇</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  NEON TETRIS — Main Script
// ══════════════════════════════════════════════

// ── Audio Engine ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTone(freq, type, dur, vol = 0.3, detune = 0) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function sfxMove()   { playTone(220, 'square', 0.05, 0.15); }
function sfxRotate() { playTone(330, 'triangle', 0.08, 0.2); }
function sfxDrop()   { playTone(110, 'sawtooth', 0.12, 0.25); }
function sfxLine(n)  {
  const freqs = [523, 659, 784, 1047];
  for (let i = 0; i < n; i++) {
    setTimeout(() => playTone(freqs[i] || 1047, 'sine', 0.2, 0.3), i * 80);
  }
}
function sfxGameover() {
  [440,330,220,110].forEach((f,i) => setTimeout(() => playTone(f,'sawtooth',0.3,0.4), i*150));
}

// ── Constants ──
const COLS = 10, ROWS = 20;
const LS_KEY = 'neon-tetris-hi';

// Neon color palette per piece type index (0–6: I O T S Z J L)
const COLORS = [
  '#00ffff', // I — cyan
  '#ffff00', // O — yellow
  '#cc00ff', // T — purple
  '#00ff44', // S — green
  '#ff2244', // Z — red
  '#4488ff', // J — blue
  '#ff8800', // L — orange
];

// Glow shadows
const GLOWS = [
  '0 0 8px #0ff, 0 0 16px #0ff',
  '0 0 8px #ff0, 0 0 16px #ff0',
  '0 0 8px #c0f, 0 0 16px #c0f',
  '0 0 8px #0f4, 0 0 16px #0f4',
  '0 0 8px #f22, 0 0 16px #f22',
  '0 0 8px #48f, 0 0 16px #48f',
  '0 0 8px #f80, 0 0 16px #f80',
];

// Tetromino shapes (4 rotations each stored as rotation sets)
const PIECES = [
  // I
  [[[0,1],[1,1],[2,1],[3,1]], [[2,0],[2,1],[2,2],[2,3]],
   [[0,2],[1,2],[2,2],[3,2]], [[1,0],[1,1],[1,2],[1,3]]],
  // O
  [[[1,0],[2,0],[1,1],[2,1]]],
  // T
  [[[1,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[2,1],[1,2]],
   [[0,1],[1,1],[2,1],[1,2]], [[1,0],[0,1],[1,1],[1,2]]],
  // S
  [[[1,0],[2,0],[0,1],[1,1]], [[1,0],[1,1],[2,1],[2,2]]],
  // Z
  [[[0,0],[1,0],[1,1],[2,1]], [[2,0],[1,1],[2,1],[1,2]]],
  // J
  [[[0,0],[0,1],[1,1],[2,1]], [[1,0],[2,0],[1,1],[1,2]],
   [[0,1],[1,1],[2,1],[2,2]], [[1,0],[1,1],[0,2],[1,2]]],
  // L
  [[[2,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[1,2],[2,2]],
   [[0,1],[1,1],[2,1],[0,2]], [[0,0],[1,0],[1,1],[1,2]]],
];

// Wall kick offsets (SRS-lite) — try for rotation attempts
const KICKS = [[0,0],[-1,0],[1,0],[-2,0],[2,0],[0,-1]];

// ── Canvas setup ──
const boardCanvas = document.getElementById('board');
const ctx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');

let CELL = 28; // computed per resize

function resize() {
  const avail = Math.min(
    window.innerWidth - 120,  // leave room for panel
    window.innerHeight - 180  // leave room for header + buttons
  );
  CELL = Math.max(18, Math.floor(Math.min(avail / ROWS, (avail * 0.6) / COLS)));
  boardCanvas.width  = COLS * CELL;
  boardCanvas.height = ROWS * CELL;
}

// ── Game State ──
let board, piece, pieceType, pieceRot, pieceX, pieceY;
let nextType;
let score, lines, level, best;
let running, paused, gameOver;
let dropInterval, lastDrop;
let animId;

function loadBest() {
  best = parseInt(localStorage.getItem(LS_KEY) || '0', 10);
}

function saveBest() {
  if (score > best) {
    best = score;
    localStorage.setItem(LS_KEY, best);
  }
}

function newBoard() {
  return Array.from({length: ROWS}, () => new Array(COLS).fill(-1));
}

function randomType() { return Math.floor(Math.random() * PIECES.length); }

function getShape(type, rot) {
  const rots = PIECES[type];
  return rots[rot % rots.length];
}

function spawnPiece() {
  pieceType = nextType !== undefined ? nextType : randomType();
  nextType  = randomType();
  pieceRot  = 0;
  const shape = getShape(pieceType, 0);
  const minX  = Math.min(...shape.map(([x]) => x));
  const maxX  = Math.max(...shape.map(([x]) => x));
  pieceX = Math.floor((COLS - (maxX - minX + 1)) / 2) - minX;
  pieceY = 0;

  if (!canPlace(shape, pieceX, pieceY)) {
    // Game over
    running = false;
    gameOver = true;
    sfxGameover();
    saveBest();
    setTimeout(showGameOver, 600);
    cancelAnimationFrame(animId);
  }
}

function canPlace(shape, ox, oy) {
  for (const [x, y] of shape) {
    const nx = x + ox, ny = y + oy;
    if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
    if (ny >= 0 && board[ny][nx] !== -1) return false;
  }
  return true;
}

function lockPiece() {
  const shape = getShape(pieceType, pieceRot);
  for (const [x, y] of shape) {
    const nx = x + pieceX, ny = y + pieceY;
    if (ny >= 0) board[ny][nx] = pieceType;
  }
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== -1)) {
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(-1));
      cleared++;
      r++; // recheck same row
    }
  }
  if (cleared > 0) {
    const MULTIPLIERS = [0, 100, 300, 500, 800];
    score += (MULTIPLIERS[cleared] || 1200) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(80, 1000 - (level - 1) * 85);
    sfxLine(cleared);
    updateHUD();
  }
}

function ghostY() {
  const shape = getShape(pieceType, pieceRot);
  let gy = pieceY;
  while (canPlace(shape, pieceX, gy + 1)) gy++;
  return gy;
}

function movePiece(dx, dy) {
  const shape = getShape(pieceType, pieceRot);
  if (canPlace(shape, pieceX + dx, pieceY + dy)) {
    pieceX += dx;
    pieceY += dy;
    return true;
  }
  return false;
}

function rotatePiece() {
  const shape = getShape(pieceType, pieceRot);
  const newRot = (pieceRot + 1) % PIECES[pieceType].length;
  const newShape = getShape(pieceType, newRot);
  for (const [kx, ky] of KICKS) {
    if (canPlace(newShape, pieceX + kx, pieceY + ky)) {
      pieceRot = newRot;
      pieceX += kx;
      pieceY += ky;
      sfxRotate();
      return;
    }
  }
}

function hardDrop() {
  const gy = ghostY();
  pieceY = gy;
  sfxDrop();
  lockPiece();
}

// ── Drawing ──
function drawCell(context, x, y, colorIdx, alpha = 1) {
  const px = x * CELL, py = y * CELL;
  const c = COLORS[colorIdx];
  context.globalAlpha = alpha;
  context.fillStyle = c;
  context.shadowColor = c;
  context.shadowBlur = 14;
  context.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
  // inner highlight
  context.globalAlpha = alpha * 0.4;
  context.fillStyle = '#fff';
  context.shadowBlur = 0;
  context.fillRect(px + 3, py + 3, CELL / 3, CELL / 3);
  context.globalAlpha = 1;
  context.shadowBlur = 0;
}

function drawBoard() {
  ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);

  // Background grid
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(boardCanvas.width, r * CELL); ctx.stroke();
  }
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, boardCanvas.height); ctx.stroke();
  }

  // Board cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] !== -1) drawCell(ctx, c, r, board[r][c]);
    }
  }

  if (!running) return;

  // Ghost piece
  const gy = ghostY();
  const shape = getShape(pieceType, pieceRot);
  if (gy !== pieceY) {
    for (const [x, y] of shape) {
      if (y + gy >= 0) drawCell(ctx, x + pieceX, y + gy, pieceType, 0.22);
    }
  }

  // Active piece
  for (const [x, y] of shape) {
    if (y + pieceY >= 0) drawCell(ctx, x + pieceX, y + pieceY, pieceType);
  }
}

function drawNext() {
  nctx.clearRect(0, 0, 80, 80);
  if (!running) return;
  const shape = getShape(nextType, 0);
  const minX = Math.min(...shape.map(([x]) => x));
  const minY = Math.min(...shape.map(([,y]) => y));
  const maxX = Math.max(...shape.map(([x]) => x));
  const maxY = Math.max(...shape.map(([,y]) => y));
  const w = maxX - minX + 1, h = maxY - minY + 1;
  const nc = 16;
  const ox = Math.floor((80 - w * nc) / 2) - minX * nc;
  const oy = Math.floor((80 - h * nc) / 2) - minY * nc;
  const c = COLORS[nextType];
  for (const [x, y] of shape) {
    nctx.fillStyle = c;
    nctx.shadowColor = c;
    nctx.shadowBlur = 10;
    nctx.fillRect(ox + x * nc + 1, oy + y * nc + 1, nc - 2, nc - 2);
  }
  nctx.shadowBlur = 0;
}

// ── HUD ──
function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('best-val').textContent = Math.max(score, best);
  document.getElementById('level-val').textContent = level;
  document.getElementById('lines-val').textContent = lines;
}

// ── Game Loop ──
function gameLoop(ts) {
  if (!running) return;
  if (!paused) {
    if (ts - lastDrop >= dropInterval) {
      lastDrop = ts;
      if (!movePiece(0, 1)) lockPiece();
    }
    drawBoard();
    drawNext();
  }
  animId = requestAnimationFrame(gameLoop);
}

// ── Start / Restart ──
function startGame() {
  loadBest();
  board = newBoard();
  score = 0; lines = 0; level = 1;
  dropInterval = 1000;
  pieceType = undefined; nextType = randomType();
  running = false; paused = false; gameOver = false;
  resize();
  spawnPiece();
  if (!running && !gameOver) return; // spawn triggered game over on empty board — shouldn't happen
  running = true;
  updateHUD();
  lastDrop = performance.now();
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(gameLoop);
}

// FIX: spawnPiece sets running=false on overlap, so set running before calling spawnPiece
function startGame2() {
  loadBest();
  board = newBoard();
  score = 0; lines = 0; level = 1;
  dropInterval = 1000;
  nextType = randomType();
  pieceType = nextType; nextType = randomType();
  pieceRot  = 0;
  const shape = getShape(pieceType, 0);
  const minX  = Math.min(...shape.map(([x]) => x));
  const maxX  = Math.max(...shape.map(([x]) => x));
  pieceX = Math.floor((COLS - (maxX - minX + 1)) / 2) - minX;
  pieceY = 0;
  running = true; paused = false; gameOver = false;
  updateHUD();
  resize();
  boardCanvas.width  = COLS * CELL;
  boardCanvas.height = ROWS * CELL;
  lastDrop = performance.now();
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(gameLoop);
}

// ── UI ──
function showStart() {
  loadBest();
  document.getElementById('start-best').textContent = best > 0 ? `Best: ${best}` : '';
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
}

function hideStart() {
  document.getElementById('start-screen').classList.add('hidden');
}

function showGameOver() {
  document.getElementById('go-score').textContent = `Score: ${score}`;
  document.getElementById('go-best').textContent  = `Best: ${best}`;
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function hideGameOver() {
  document.getElementById('gameover-screen').classList.add('hidden');
}

function togglePause() {
  if (!running || gameOver) return;
  paused = !paused;
  document.getElementById('pause-indicator').style.display = paused ? 'block' : 'none';
  if (!paused) {
    lastDrop = performance.now();
    cancelAnimationFrame(animId);
    animId = requestAnimationFrame(gameLoop);
  }
}

// ── Input ──
let softDropTimer = null;

document.addEventListener('keydown', e => {
  if (!running || gameOver) return;
  if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
  if (paused) return;
  switch(e.key) {
    case 'ArrowLeft':  e.preventDefault(); if(movePiece(-1,0)) sfxMove(); break;
    case 'ArrowRight': e.preventDefault(); if(movePiece(1,0)) sfxMove(); break;
    case 'ArrowUp':    e.preventDefault(); rotatePiece(); break;
    case 'ArrowDown':  e.preventDefault(); if(movePiece(0,1)) { sfxMove(); lastDrop = performance.now(); } break;
    case ' ':          e.preventDefault(); hardDrop(); break;
  }
});

// Touch: press-and-hold for move/soft-drop
function attachBtn(id, fn, repeat = false) {
  const el = document.getElementById(id);
  if (!el) return;
  let iv = null;
  const start = () => {
    fn();
    if (repeat) iv = setInterval(fn, 80);
  };
  const stop = () => { clearInterval(iv); iv = null; };
  el.addEventListener('touchstart', e => { e.preventDefault(); start(); }, {passive: false});
  el.addEventListener('touchend', stop, {passive: true});
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', stop);
  el.addEventListener('mouseleave', stop);
}

attachBtn('btn-left',   () => { if(running && !paused) { movePiece(-1,0); sfxMove(); } }, true);
attachBtn('btn-right',  () => { if(running && !paused) { movePiece(1,0);  sfxMove(); } }, true);
attachBtn('btn-rotate', () => { if(running && !paused)  rotatePiece(); });
attachBtn('btn-down',   () => { if(running && !paused) { movePiece(0,1); lastDrop = performance.now(); } }, true);
attachBtn('btn-drop',   () => { if(running && !paused)  hardDrop(); });

// Swipe support on canvas
let touchStartX = 0, touchStartY = 0;
boardCanvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
boardCanvas.addEventListener('touchend', e => {
  if (!running || paused) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx < 10 && ady < 10) { rotatePiece(); return; }
  if (adx > ady) { movePiece(dx > 0 ? 1 : -1, 0); sfxMove(); }
  else if (dy > 40) hardDrop();
}, {passive: true});

// Buttons
document.getElementById('start-btn').addEventListener('click', () => {
  hideStart();
  startGame2();
});
document.getElementById('restart-btn').addEventListener('click', () => {
  hideGameOver();
  startGame2();
});

// Resize
window.addEventListener('resize', () => {
  resize();
  boardCanvas.width  = COLS * CELL;
  boardCanvas.height = ROWS * CELL;
  drawBoard();
});

// ── Boot ──
resize();
showStart();
// Draw empty board on start
drawBoard();
</script>
</body>
</html>
