<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Word Chain ⚡🔤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;user-select:none}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.hidden{display:none!important}
.title-glow{font-size:clamp(24px,7vw,52px);font-weight:900;text-align:center;background:linear-gradient(90deg,#00ffff,#ff00ff,#ffff00,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 16px #00ffff88);letter-spacing:2px;margin-bottom:8px}
.subtitle{color:#888;font-size:14px;text-align:center;margin-bottom:28px;line-height:1.6}
.btn{padding:14px 36px;font-size:16px;font-weight:700;border:2px solid #00ffff;background:transparent;color:#00ffff;border-radius:8px;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:2px;box-shadow:0 0 16px #00ffff44;margin:6px}
.btn:hover,.btn:active{background:#00ffff22;box-shadow:0 0 32px #00ffff88}
.hi-display{margin-top:16px;font-size:13px;color:#666}
.hi-display span{color:#00ffff;font-weight:700}
/* GAME */
#gameScreen{gap:8px;justify-content:flex-start;padding-top:20px;overflow:hidden}
.panel{width:100%;max-width:420px;background:#0d0d2a;border:1px solid #ffffff11;border-radius:12px;padding:12px 16px}
/* SCOREBOARD TOP */
.score-row{display:flex;justify-content:space-between;align-items:center}
.score-box{text-align:center}
.score-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px}
.score-val{font-size:22px;font-weight:900;color:#00ffff;text-shadow:0 0 8px #00ffff}
/* TIMER */
.timer-wrap{width:100%;max-width:420px}
.timer-bar-bg{width:100%;height:10px;background:#111;border-radius:5px;overflow:hidden}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,#ff0066,#ffff00,#00ff88);transition:width .1s linear;border-radius:5px}
.timer-val{text-align:center;font-size:13px;font-weight:700;margin-top:2px}
/* TURN INDICATOR */
.turn-row{display:flex;align-items:center;gap:12px;justify-content:center;margin:4px 0}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid transparent;transition:all .3s}
.avatar.active{border-color:#00ffff;box-shadow:0 0 16px #00ffff88}
.avatar.ai-active{border-color:#ff00ff;box-shadow:0 0 16px #ff00ff88}
.turn-divider{font-size:22px;color:#333}
/* WORD DISPLAY */
.word-chain-area{width:100%;max-width:420px;min-height:64px;background:#060614;border-radius:10px;border:1px solid #ffffff11;padding:10px 12px;overflow-y:auto;max-height:120px;display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start}
.word-chip{padding:4px 10px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid;display:inline-flex;align-items:center;gap:4px}
.word-chip.player{border-color:#00ffff;color:#00ffff;background:#00ffff11}
.word-chip.ai{border-color:#ff00ff;color:#ff00ff;background:#ff00ff11}
.word-chip .pts{font-size:10px;opacity:.7}
/* CURRENT WORD */
.current-word-row{width:100%;max-width:420px;text-align:center}
.chain-letter{font-size:clamp(16px,4vw,22px);color:#888;margin-bottom:4px}
.chain-letter b{color:#ffff00;text-shadow:0 0 12px #ffff00;font-size:1.4em;letter-spacing:2px}
/* INPUT */
.input-row{width:100%;max-width:420px;display:flex;gap:8px}
#wordInput{flex:1;background:#0d0d2a;border:2px solid #00ffff44;border-radius:8px;padding:12px 16px;font-size:18px;color:#fff;outline:none;font-family:inherit;letter-spacing:1px;caret-color:#00ffff}
#wordInput:focus{border-color:#00ffff;box-shadow:0 0 12px #00ffff44}
#wordInput.error{border-color:#ff0066;box-shadow:0 0 12px #ff006666;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.submit-btn{padding:12px 18px;font-size:18px;background:transparent;border:2px solid #00ffff;color:#00ffff;border-radius:8px;cursor:pointer;transition:all .2s}
.submit-btn:hover{background:#00ffff22}
/* AI THINKING */
.ai-thinking{width:100%;max-width:420px;text-align:center;font-size:13px;color:#ff00ff88;min-height:20px}
.dots::after{content:'.';animation:dots 1s steps(3,end) infinite}
@keyframes dots{0%{content:'.';}33%{content:'..';}66%{content:'...';}100%{content:'.'}}
/* LIVES */
.lives-row{display:flex;gap:6px;justify-content:center;margin-top:4px}
.life{font-size:18px;transition:all .3s}
.life.lost{filter:grayscale(1);opacity:.3}
/* FEEDBACK */
#feedback{width:100%;max-width:420px;text-align:center;min-height:22px;font-size:13px;font-weight:700;transition:all .2s}
/* GAMEOVER */
#gameoverScreen{background:#0a0a1a}
.go-title{font-size:clamp(28px,7vw,52px);font-weight:900;text-shadow:0 0 30px currentColor;margin-bottom:8px}
.go-stats{background:#0d0d2a;border:1px solid #333;border-radius:10px;padding:16px 24px;margin-bottom:24px;text-align:center;min-width:240px}
.go-row{display:flex;justify-content:space-between;gap:40px;margin:5px 0;font-size:14px}
.go-row span:first-child{color:#666}
.go-row span:last-child{color:#00ffff;font-weight:700}
</style>
</head>
<body>

<!-- START -->
<div id="startScreen" class="screen">
  <div class="title-glow">NEON WORD CHAIN</div>
  <div class="subtitle">Type a word starting with the last letter.<br>Beat the AI. Score big. Don't run out of time!</div>
  <button class="btn" onclick="startGame()">▶ PLAY</button>
  <div class="hi-display">Hi-Score: <span id="hiScore">0</span></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen hidden">
  <div class="panel score-row" style="margin-bottom:2px">
    <div class="score-box"><div class="score-label">Your Score</div><div class="score-val" id="playerScore">0</div></div>
    <div class="lives-row" id="livesRow">
      <span class="life" id="life0">❤️</span>
      <span class="life" id="life1">❤️</span>
      <span class="life" id="life2">❤️</span>
    </div>
    <div class="score-box"><div class="score-label">AI Score</div><div class="score-val" id="aiScore" style="color:#ff00ff;text-shadow:0 0 8px #ff00ff">0</div></div>
  </div>

  <div class="timer-wrap">
    <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerBar"></div></div>
    <div class="timer-val" id="timerVal">10.0s</div>
  </div>

  <div class="turn-row">
    <div class="avatar" id="playerAvatar">😎</div>
    <div class="turn-divider" id="turnLabel">YOUR TURN</div>
    <div class="avatar" id="aiAvatar">🤖</div>
  </div>

  <div class="word-chain-area" id="wordChain"></div>

  <div class="current-word-row">
    <div class="chain-letter">Start with: <b id="currentLetter">?</b></div>
  </div>

  <div class="input-row">
    <input type="text" id="wordInput" placeholder="type a word..." autocomplete="off" autocorrect="off" spellcheck="false" autocapitalize="off">
    <button class="submit-btn" onclick="submitWord()">⏎</button>
  </div>

  <div class="ai-thinking" id="aiThinking"></div>
  <div id="feedback"></div>
</div>

<!-- GAMEOVER -->
<div id="gameoverScreen" class="screen hidden">
  <div class="go-title" id="goTitle" style="color:#ff0066">GAME OVER</div>
  <div class="go-stats">
    <div class="go-row"><span>Your Score</span><span id="goYou">0</span></div>
    <div class="go-row"><span>AI Score</span><span id="goAI">0</span></div>
    <div class="go-row"><span>Words Played</span><span id="goWords">0</span></div>
    <div class="go-row"><span>Best Score</span><span id="goBest">0</span></div>
  </div>
  <button class="btn" onclick="startGame()">↩ PLAY AGAIN</button>
  <button class="btn" style="border-color:#ff00ff;color:#ff00ff;box-shadow:0 0 16px #ff00ff44" onclick="showStart()">🏠 MENU</button>
</div>

<script>
// ──────────────────────────────────────────────
//  Word List (2000+ common English words)
// ──────────────────────────────────────────────
const WORDS = "able,above,absent,absorb,acid,actor,adapt,adept,admit,adopt,adult,after,agent,agree,ahead,alert,alien,align,alive,allay,allot,allow,alone,alter,angel,anger,angle,angry,anime,ankle,annex,apart,apple,apply,arena,argue,arise,armor,aroma,arose,arrow,arson,ashen,askew,asset,atlas,atone,attic,audit,aunts,avoid,awake,award,awful,bacon,badge,balls,bands,banks,banjo,barge,baron,basic,basis,batch,beach,beast,begin,being,bench,bills,bingo,birds,birth,black,blade,blame,bland,blast,blaze,bleed,blend,bless,blind,block,blood,blown,blue,blunt,board,boats,bogus,bones,bonus,books,boost,booth,boots,bound,boxer,brain,brand,brave,bread,breed,brew,brick,bride,brief,brine,brisk,broad,broke,brook,broth,brush,budge,build,burnt,burst,buyer,cabby,cable,cajun,camel,candy,cards,cargo,carry,cases,caste,catch,cause,cease,cells,chain,chair,chalk,champ,chaos,charm,chart,chase,cheap,check,cheek,cheer,chef,chief,child,china,civil,clamp,clasp,clave,clean,clear,clerk,click,cliff,climb,cling,cloak,clone,close,cloth,clout,clubs,clump,coast,cobra,cocoa,combo,comic,comma,coral,costly,count,coupe,court,cover,crack,craft,cramp,crane,crash,crazy,cream,creek,creep,crime,crisp,cross,crowd,crown,cruel,crush,crust,cubic,curse,curvy,cycle,daily,dance,dates,decay,delta,dense,depot,depth,derby,descend,devil,digit,dirty,disco,disco,dizzy,donor,doubt,dough,draft,drain,drama,drawn,dream,dress,dried,drift,drill,drink,drive,drone,drops,drown,drugs,drums,dryer,dunno,dusty,eagle,early,earth,elbow,elite,ember,empty,ended,enemy,enjoy,enter,equal,event,every,exact,exist,extra,fable,faced,facto,fairy,faith,falls,false,fancy,farce,fatal,feast,fence,ferry,feral,fetch,fever,fiber,field,fifth,fifty,fight,final,flair,flame,flank,flare,flask,flesh,float,flora,flour,flown,fluid,flush,flute,foamy,focal,foggy,folks,folio,force,forge,forge,found,franc,frank,freak,fresh,frogs,frost,froze,froze,fruit,fully,funny,gamma,gauze,ghost,girth,given,glade,gland,glare,glass,glide,glint,globe,gloss,glove,glyph,going,grace,grade,grain,grant,grasp,grass,gravel,graze,great,greed,green,greet,grill,grind,groan,groin,groom,grove,grown,gruel,gruff,guard,guide,guild,guile,guise,gulch,gusts,handy,harsh,haste,haven,heart,heavy,hence,herbs,holes,homer,honor,horns,hotel,house,hovel,human,humid,humor,hydra,hyena,hyper,icons,ideal,idler,image,imply,incur,index,indie,indie,inner,input,intel,inter,intro,irony,japan,jelly,jewel,joins,joker,joust,judge,juice,juicy,jumbo,karma,kebab,ketch,kneel,knife,knock,knoll,known,kraal,label,laser,later,laugh,layer,learn,lease,legal,lemon,level,lever,light,limit,liner,liver,lodge,loops,loose,lover,lower,lucky,lunar,lurid,lyric,magic,major,maker,manor,maple,march,marks,marsh,match,mayor,medal,mercy,merge,merch,merry,metro,might,mills,minor,minus,mirth,moist,money,monks,month,moose,moral,mover,muddy,music,nadir,nerve,nifty,ninja,noble,noise,novel,nymph,oaken,ocean,offer,often,omega,onion,optic,order,organ,other,outer,ovoid,oxide,ozone,paint,panel,panic,paper,parka,party,pasta,patch,pause,peace,peach,pearl,pedal,perky,perky,pilot,pinch,pirate,pixel,pizza,plaid,plain,plane,plank,plant,plaza,pluck,plumb,plume,plump,point,poker,polar,polar,porch,posed,poser,power,press,price,prism,prize,probe,prone,proxy,pulpy,punch,pupil,purge,quack,queen,query,quick,quiet,quota,quota,quote,rabbi,radar,radix,raise,rally,ramen,ranch,range,rapid,raven,reach,react,realm,rebel,relax,relay,reply,retro,rival,river,robot,rocky,rogue,rouge,rough,roast,round,route,rover,rules,rumor,rural,rusty,sadly,saint,salad,satire,sauce,savvy,scald,scalp,scant,scare,scarf,scene,scent,scone,scoop,scorn,scout,scram,screw,scrum,seize,sense,serum,serve,seven,sever,shade,shaft,shake,shall,shame,shape,share,shark,sharp,sheen,sheep,sheer,shelf,shell,shift,shine,shirt,shore,short,shown,shrub,siege,sigma,sight,silky,skill,slate,sleek,sleet,slice,slide,slime,sloth,slump,smack,smart,smell,smile,smith,smoke,snack,snake,snare,space,spare,spark,spawn,speed,spice,spine,split,spook,spore,sport,spray,spunk,squad,squid,stalk,stand,stark,start,stash,state,stave,steak,steam,stern,stick,stomp,stone,storm,story,stout,strep,swift,swirl,sworn,taste,teeth,temps,tense,tiger,tight,tired,title,today,token,total,touch,tough,toxic,trace,track,trade,trail,trait,tramp,traps,trend,tribe,trick,troop,trout,trove,truce,trunk,trust,truth,twist,ultra,uncle,under,unfed,union,unite,untie,urban,vague,valet,valor,valve,vault,veins,vicar,video,vigor,viral,virus,vivid,vocab,voice,voter,vying,wagon,waist,waste,watch,water,weave,weedy,weird,whack,whale,wheat,wheel,where,whiff,while,witch,world,worry,worth,wound,wrath,wring,yacht,yearn,yield,young,zebra,zesty,above,agile,alarm,album,amber,amble,ankle,anime,apron,argue,array,arrow,aster,attic,audit,auric,avid,azure,badge,baton,berry,blaze,blink,bloom,bolts,braid,briar,brine,brook,bubbles,bugle,bytes,cabal,cabin,caper,capos,cedar,charm,chess,cider,civic,claim,clang,cloak,cobra,comet,couch,crown,cubby,dance,dandy,depot,depth,derby,dingo,disco,doing,duchy,dunes,dusty,dwarf,early,easel,edges,elder,elfin,elven,ember,emits,enact,epoch,erode,evade,event,exalt,exhale,exist,exile,expel,exude,faded,false,fence,finch,fjord,flank,flash,fleet,float,flood,flute,forge,fraud,friar,frond,gaunt,gecko,giddy,gilded,glare,gleam,globe,gnome,gorge,grail,greet,grime,guise,gulch,gusto,habit,hatch,hazel,hedge,hefty,herds,humid,hyena,icons,idols,igloo,inept,infer,inlay,inner,ionic,irony,jaded,jerky,joist,joust,ketch,knave,kneel,lance,latch,lemon,lithe,llama,lofty,logic,lusty,lyric,magic,manor,maroon,mirth,mocha,monks,moose,mortar,mossy,muddy,musty,naval,newly,noble,nocturnal,nomad,nordic,notch,novel,oasis,offal,olive,onyx,opaque,optic,orchid,oxbow,ozone,parch,pasta,patch,patio,pedal,perch,peril,pilot,plaid,plank,pluck,plumb,ponce,porky,pound,prose,proxy,prune,psych,pygmy,pylon,quaff,quail,qualm,quirk,quota,rabid,radar,rafts,rainy,raven,realm,recon,redo,regal,repel,retry,risky,rogue,roman,roost,rotor,rubic,ruins,runny,rusty,saber,salty,satyr,scoff,score,scout,scrum,seeds,seize,septic,shale,shank,shine,shoal,shrub,siege,siren,sixth,skiff,skimp,skunk,slant,slick,slime,sloth,smear,snare,sneak,snowy,solar,solvent,somber,sonic,spasm,speck,spire,spite,spook,spore,sport,spree,spurn,staid,stain,stark,stern,stink,stir,stoic,strap,strip,strum,stung,style,sunlit,swamp,swept,swipe,taboo,talon,tango,tapir,taunt,tiara,tiger,tilde,tinge,titan,tonic,torso,totem,toxic,toxin,trace,tramp,traps,triad,truce,trump,tuber,tufted,tulip,tummy,tuner,twang,tweed,twirl,tying,udder,ultra,union,unkempt,unlit,unmet,upped,usher,valor,vibes,vigor,villa,virulent,visor,vivid,vogue,vowel,vulture,wager,waltz,wares,warty,woken,wooly,wordy,yacht,yells,yield,yodel,yoink,zap,zealot,zephyr,zippy,zone,zoom".split(',').filter(w=>w.length>=3);

const WORD_SET = new Set(WORDS);

// AI word bank by starting letter
const AI_BY_LETTER = {};
WORDS.forEach(w=>{
  const ch=w[0];
  if(!AI_BY_LETTER[ch])AI_BY_LETTER[ch]=[];
  AI_BY_LETTER[ch].push(w);
});

// ──────────────────────────────────────────────
//  Audio
// ──────────────────────────────────────────────
let ctx;
function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
function beep(f,d,type='square',vol=0.12){
  try{const c=getCtx();const o=c.createOscillator();const g=c.createGain();
  o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sndSuccess(){beep(440,.06);setTimeout(()=>beep(660,.08),60);setTimeout(()=>beep(880,.1),130);}
function sndError(){beep(220,.2,'sawtooth',0.18);}
function sndTick(){beep(880,.03,'square',0.06);}
function sndLife(){beep(110,.3,'sawtooth',0.22);}
function sndAI(){beep(330,.05);setTimeout(()=>beep(440,.08),80);}
function sndOver(){[0,150,300].forEach(d=>setTimeout(()=>beep(200-d,.3,'sawtooth',0.18),d));}

// ──────────────────────────────────────────────
//  State
// ──────────────────────────────────────────────
let playerScore=0,aiScore=0,lives=3,currentLetter='',usedWords=new Set();
let timerInterval=null,timeLeft=10,isPlayerTurn=true,isGameRunning=false,wordCount=0,round=0;

// ──────────────────────────────────────────────
//  UI Helpers
// ──────────────────────────────────────────────
function showStart(){
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('gameoverScreen').classList.add('hidden');
  document.getElementById('hiScore').textContent=localStorage.getItem('neon-word-chain-hi')||0;
}
showStart();

function setFeedback(msg,color='#00ffff'){
  const el=document.getElementById('feedback');
  el.textContent=msg;el.style.color=color;
}

function updateLives(){
  for(let i=0;i<3;i++){
    const el=document.getElementById('life'+i);
    el.classList.toggle('lost',i>=lives);
  }
}

function addWordChip(word,pts,who){
  const chip=document.createElement('span');
  chip.className='word-chip '+(who==='player'?'player':'ai');
  chip.innerHTML=`${who==='player'?'😎':'🤖'} ${word} <span class="pts">+${pts}</span>`;
  const chain=document.getElementById('wordChain');
  chain.appendChild(chip);
  chain.scrollTop=chain.scrollHeight;
}

// ──────────────────────────────────────────────
//  Timer
// ──────────────────────────────────────────────
function startTimer(){
  clearTimer();
  timeLeft=10;
  updateTimerUI();
  timerInterval=setInterval(()=>{
    timeLeft=Math.max(0,timeLeft-0.1);
    updateTimerUI();
    if(timeLeft<=3)sndTick();
    if(timeLeft<=0){clearTimer();onTimeout();}
  },100);
}
function clearTimer(){clearInterval(timerInterval);timerInterval=null;}
function updateTimerUI(){
  const pct=(timeLeft/10)*100;
  document.getElementById('timerBar').style.width=pct+'%';
  document.getElementById('timerVal').textContent=timeLeft.toFixed(1)+'s';
  const hue=Math.floor(pct*1.2);
  document.getElementById('timerBar').style.background=`hsl(${hue},100%,55%)`;
}
function getTimerBonus(){return Math.ceil(timeLeft*10);}

// ──────────────────────────────────────────────
//  Start / Round
// ──────────────────────────────────────────────
function startGame(){
  playerScore=0;aiScore=0;lives=3;usedWords=new Set();wordCount=0;round=0;isGameRunning=true;
  document.getElementById('playerScore').textContent='0';
  document.getElementById('aiScore').textContent='0';
  updateLives();
  document.getElementById('wordChain').innerHTML='';
  document.getElementById('wordInput').value='';
  document.getElementById('aiThinking').textContent='';
  setFeedback('');

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameoverScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');

  // pick random start word
  const starters=['apple','ocean','eagle','tiger','mango','novel','urban','prism','flame','candy','dance','brave','light','storm','music'];
  const starter=starters[Math.floor(Math.random()*starters.length)];
  usedWords.add(starter);
  currentLetter=starter[starter.length-1];
  document.getElementById('currentLetter').textContent=currentLetter.toUpperCase();

  // show starter chip as AI's first word
  addWordChip(starter,'—','ai');
  wordCount++;

  setPlayerTurn();
}

function setPlayerTurn(){
  isPlayerTurn=true;
  round++;
  document.getElementById('playerAvatar').className='avatar active';
  document.getElementById('aiAvatar').className='avatar';
  document.getElementById('turnLabel').textContent='YOUR TURN';
  document.getElementById('turnLabel').style.color='#00ffff';
  document.getElementById('wordInput').disabled=false;
  document.getElementById('wordInput').focus();
  setFeedback('Type a word starting with "'+currentLetter.toUpperCase()+'"','#aaa');
  startTimer();
}

function setAITurn(){
  isPlayerTurn=false;
  clearTimer();
  document.getElementById('playerAvatar').className='avatar';
  document.getElementById('aiAvatar').className='avatar ai-active';
  document.getElementById('turnLabel').textContent='AI TURN';
  document.getElementById('turnLabel').style.color='#ff00ff';
  document.getElementById('wordInput').disabled=true;
  setFeedback('');

  // AI "thinks" for random delay
  const thinkTime=600+Math.random()*900;
  document.getElementById('aiThinking').innerHTML='🤖 thinking<span class="dots"></span>';

  setTimeout(()=>{
    document.getElementById('aiThinking').textContent='';
    if(!isGameRunning)return;
    aiMove();
  },thinkTime);
}

// ──────────────────────────────────────────────
//  Submit Word (player)
// ──────────────────────────────────────────────
function submitWord(){
  if(!isPlayerTurn||!isGameRunning)return;
  getCtx();
  const input=document.getElementById('wordInput');
  const word=input.value.trim().toLowerCase().replace(/[^a-z]/g,'');
  input.value='';

  if(!word){setFeedback('Type something!','#888');return;}

  // Validate
  if(word[0]!==currentLetter){
    flashError('Must start with "'+currentLetter.toUpperCase()+'"!');return;
  }
  if(word.length<3){flashError('Word too short (min 3 letters)!');return;}
  if(usedWords.has(word)){flashError('"'+word+'" already used!');return;}
  if(!WORD_SET.has(word)){
    // allow if it starts correctly and is reasonable length (lenient)
    if(word.length<4){flashError('Not a valid word!');return;}
    // accept unknown words ≥4 letters that match chain rule (generous play)
  }

  clearTimer();
  usedWords.add(word);
  currentLetter=word[word.length-1];
  document.getElementById('currentLetter').textContent=currentLetter.toUpperCase();

  const timerBonus=getTimerBonus();
  const pts=word.length*10+timerBonus;
  playerScore+=pts;
  wordCount++;
  document.getElementById('playerScore').textContent=playerScore;
  addWordChip(word,pts,'player');
  sndSuccess();
  setFeedback('+'+pts+' pts (length bonus + speed bonus)','#00ff88');

  setTimeout(()=>setAITurn(),500);
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('wordInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitWord();});
});
// fallback if DOMContentLoaded already fired
document.getElementById('wordInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitWord();});

function flashError(msg){
  const input=document.getElementById('wordInput');
  input.classList.add('error');
  setTimeout(()=>input.classList.remove('error'),400);
  setFeedback(msg,'#ff0066');
  sndError();
}

// ──────────────────────────────────────────────
//  Timeout
// ──────────────────────────────────────────────
function onTimeout(){
  if(!isPlayerTurn||!isGameRunning)return;
  lives--;
  updateLives();
  sndLife();
  setFeedback('⏰ Time\'s up! -1 life','#ff0066');
  wordCount++;

  if(lives<=0){endGame();return;}

  // continue with same letter (player forfeits turn)
  setTimeout(()=>setAITurn(),800);
}

// ──────────────────────────────────────────────
//  AI Logic
// ──────────────────────────────────────────────
function aiMove(){
  if(!isGameRunning)return;
  const letter=currentLetter;
  const pool=(AI_BY_LETTER[letter]||[]).filter(w=>!usedWords.has(w)&&w.length>=3);

  // AI failure rate increases with round
  const failChance=Math.min(0.35,round*0.03);

  if(pool.length===0||Math.random()<failChance){
    // AI fails
    sndAI();
    setFeedback('🤖 AI couldn\'t find a word! +50 bonus pts!','#ffff00');
    playerScore+=50;wordCount++;
    document.getElementById('playerScore').textContent=playerScore;
    addWordChip('(failed)','—','ai');
    currentLetter=getLuckyLetter();
    document.getElementById('currentLetter').textContent=currentLetter.toUpperCase();
    setTimeout(()=>setPlayerTurn(),900);
    return;
  }

  // Pick a word: prefer long words at higher rounds
  pool.sort((a,b)=>b.length-a.length);
  const topN=Math.max(1,Math.floor(pool.length*0.3));
  const w=pool[Math.floor(Math.random()*topN)];

  usedWords.add(w);
  const pts=w.length*10+Math.floor(Math.random()*30);
  aiScore+=pts;
  wordCount++;
  currentLetter=w[w.length-1];
  document.getElementById('aiScore').textContent=aiScore;
  document.getElementById('currentLetter').textContent=currentLetter.toUpperCase();
  addWordChip(w,pts,'ai');
  sndAI();

  setTimeout(()=>setPlayerTurn(),500);
}

function getLuckyLetter(){
  // pick a letter with decent word pool
  const good=['a','b','c','d','e','f','g','h','l','m','n','o','p','r','s','t'];
  return good[Math.floor(Math.random()*good.length)];
}

// ──────────────────────────────────────────────
//  End Game
// ──────────────────────────────────────────────
function endGame(){
  isGameRunning=false;clearTimer();
  document.getElementById('wordInput').disabled=true;
  sndOver();

  const best=Math.max(playerScore,parseInt(localStorage.getItem('neon-word-chain-hi')||'0'));
  localStorage.setItem('neon-word-chain-hi',best);

  const won=playerScore>aiScore;
  document.getElementById('goTitle').textContent=won?'🏆 YOU WIN!':'😵 GAME OVER';
  document.getElementById('goTitle').style.color=won?'#00ffff':'#ff0066';
  document.getElementById('goYou').textContent=playerScore;
  document.getElementById('goAI').textContent=aiScore;
  document.getElementById('goWords').textContent=wordCount;
  document.getElementById('goBest').textContent=best;
  document.getElementById('hiScore').textContent=best;

  setTimeout(()=>{
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('gameoverScreen').classList.remove('hidden');
  },500);
}
</script>
