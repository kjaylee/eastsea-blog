  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #11142a;
      --line: #223065;
      --cyan: #37efff;
      --pink: #ff5fe0;
      --text: #edf2ff;
      --ok: #64ff9f;
      --bad: #ff6c8c;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: radial-gradient(circle at 50% -20%, #16204f 0%, var(--bg) 58%);
      color: var(--text);
      font-family: Inter, Pretendard, system-ui, -apple-system, Segoe UI, sans-serif;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(22, 29, 64, 0.9), rgba(12, 14, 31, 0.95));
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 0 24px rgba(55, 239, 255, 0.15), inset 0 0 20px rgba(255, 95, 224, 0.08);
      padding: 12px;
    }
    h1 {
      margin: 4px 0 10px;
      color: var(--cyan);
      font-size: clamp(1.2rem, 3.5vw, 1.7rem);
      text-shadow: 0 0 12px rgba(55, 239, 255, .55);
    }
    .hud {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(11, 18, 42, .9);
      text-align: center;
      padding: 8px;
      font-size: .9rem;
    }
    canvas {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #060a1d;
      display: block;
      touch-action: none;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      background: #18214a;
      padding: 11px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }
    button:active { transform: scale(0.99); }
    .launch { background: #1b3f4d; color: #b8f9ff; }
    .reset { background: #3f1f40; color: #ffd8f6; }
    .msg {
      min-height: 1.3em;
      margin: 8px 0 2px;
      font-weight: 700;
      color: #c8d8ff;
    }
    .hint {
      opacity: .86;
      margin: 4px 0 0;
      font-size: .87rem;
      line-height: 1.4;
    }
    @media (max-width: 760px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .controls { grid-template-columns: 1fr; }
    }

<body>
  <main class="app">
    <h1>🪐 Orbit Weaver</h1>
    <section class="hud">
      <div class="chip">레벨 <strong id="level">1</strong></div>
      <div class="chip">목표 유지 <strong id="goal">10.0s</strong></div>
      <div class="chip">유지 시간 <strong id="elapsed">0.0s</strong></div>
      <div class="chip">점수 <strong id="score">0</strong></div>
      <div class="chip">최고 레벨 <strong id="best">1</strong></div>
    </section>
    <canvas id="field" width="960" height="520" aria-label="orbit field"></canvas>
    <div class="msg" id="msg">드래그 또는 화살표로 벡터를 조정하고 LAUNCH.</div>
    <section class="controls">
      <button class="launch" id="launchBtn">LAUNCH / SPACE</button>
      <button class="reset" id="resetBtn">RESET</button>
    </section>
    <p class="hint">키보드: ↑↓←→ 벡터 조정, Space 발사, R 리셋. 터치: 위성에서 드래그 후 떼면 발사.</p>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('field');
      const ctx = canvas.getContext('2d');
      const msgEl = document.getElementById('msg');
      const levelEl = document.getElementById('level');
      const goalEl = document.getElementById('goal');
      const elapsedEl = document.getElementById('elapsed');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const launchBtn = document.getElementById('launchBtn');
      const resetBtn = document.getElementById('resetBtn');

      let audioCtx;
      const beep = (f, t = 0.08, type = 'sine', gain = 0.03) => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.value = f;
        g.gain.value = gain;
        o.connect(g).connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + t);
      };

      const BEST_KEY = 'orbitWeaverBestLevel';
      let bestLevel = Number(localStorage.getItem(BEST_KEY) || 1);
      bestEl.textContent = bestLevel;

      let level = 1;
      let score = 0;
      let targetStable = 10;
      let elapsed = 0;
      let running = false;
      let dragging = false;
      let trail = [];

      const center = { x: 0, y: 0 };
      const planetR = 28;
      let GM = 2600;
      const sat = {
        x: 0,
        y: 0,
        vx: 0,
        vy: -2.2,
        r: 6
      };
      let aim = { x: 0, y: -2.2 };

      function setMsg(text, tone) {
        msgEl.textContent = text;
        if (tone === 'ok') msgEl.style.color = '#64ff9f';
        else if (tone === 'bad') msgEl.style.color = '#ff6c8c';
        else msgEl.style.color = '#c8d8ff';
      }

      function resizeCanvas() {
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const cssW = canvas.clientWidth || 960;
        const cssH = Math.max(420, Math.round(cssW * 0.55));
        canvas.width = Math.round(cssW * dpr);
        canvas.height = Math.round(cssH * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        center.x = cssW * 0.5;
        center.y = cssH * 0.5;
        if (!running) placeSatellite();
      }

      function placeSatellite() {
        sat.x = center.x + 150;
        sat.y = center.y;
        sat.vx = aim.x;
        sat.vy = aim.y;
        trail = [];
        elapsed = 0;
      }

      function updateLevelStats() {
        targetStable = 8 + level * 2;
        GM = 2300 + level * 180;
        levelEl.textContent = level;
        goalEl.textContent = `${targetStable.toFixed(1)}s`;
        elapsedEl.textContent = `${elapsed.toFixed(1)}s`;
        scoreEl.textContent = score;
      }

      function resetSession(full = false) {
        running = false;
        if (full) {
          level = 1;
          score = 0;
          aim = { x: 0, y: -2.2 };
        }
        updateLevelStats();
        placeSatellite();
        setMsg('벡터를 맞춘 뒤 발사하세요.', '');
      }

      function launch() {
        if (running) return;
        sat.vx = aim.x;
        sat.vy = aim.y;
        running = true;
        trail = [];
        elapsed = 0;
        beep(520, 0.08, 'triangle', 0.035);
        setMsg('궤도 유지 중... 안정적으로 버티세요.', '');
      }

      function fail(reason) {
        running = false;
        beep(180, 0.18, 'sawtooth', 0.05);
        setMsg(reason, 'bad');
      }

      function winLevel() {
        running = false;
        score += 150 + Math.round(level * 90);
        level += 1;
        if (level > bestLevel) {
          bestLevel = level;
          localStorage.setItem(BEST_KEY, String(bestLevel));
          bestEl.textContent = bestLevel;
        }
        beep(640, 0.08, 'sine', 0.03);
        setTimeout(() => beep(900, 0.1, 'triangle', 0.03), 60);
        updateLevelStats();
        aim = { x: 0, y: -(2.0 + Math.min(2.5, level * 0.08)) };
        placeSatellite();
        setMsg('성공! 중력이 강화되었습니다. 다음 레벨 준비.', 'ok');
      }

      function physicsStep(dt) {
        const dx = sat.x - center.x;
        const dy = sat.y - center.y;
        const dist = Math.hypot(dx, dy);
        const acc = -GM / Math.max(1200, dist * dist * dist);
        sat.vx += dx * acc * dt;
        sat.vy += dy * acc * dt;
        sat.x += sat.vx * dt * 60;
        sat.y += sat.vy * dt * 60;

        trail.push({ x: sat.x, y: sat.y });
        if (trail.length > 320) trail.shift();

        const nd = Math.hypot(sat.x - center.x, sat.y - center.y);
        if (nd <= planetR + sat.r + 2) {
          fail('충돌! 벡터를 더 수평으로 맞춰보세요.');
          return;
        }
        if (nd > Math.max(canvas.clientWidth, canvas.clientHeight) * 0.75 + 120) {
          fail('이탈! 속도를 조금 줄여 안정 궤도를 노리세요.');
          return;
        }

        elapsed += dt;
        elapsedEl.textContent = `${elapsed.toFixed(1)}s`;
        if (elapsed >= targetStable) {
          winLevel();
        }
      }

      function drawStars(w, h) {
        for (let i = 0; i < 40; i++) {
          const x = (i * 53.7) % w;
          const y = (i * 89.3) % h;
          const a = 0.15 + ((i * 0.17) % 0.4);
          ctx.fillStyle = `rgba(130,170,255,${a.toFixed(2)})`;
          ctx.fillRect(x, y, 1.3, 1.3);
        }
      }

      function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#050919';
        ctx.fillRect(0, 0, w, h);
        drawStars(w, h);

        const aura = ctx.createRadialGradient(center.x, center.y, 10, center.x, center.y, 180);
        aura.addColorStop(0, 'rgba(55,239,255,0.26)');
        aura.addColorStop(1, 'rgba(55,239,255,0)');
        ctx.fillStyle = aura;
        ctx.beginPath();
        ctx.arc(center.x, center.y, 180, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(center.x, center.y, planetR, 0, Math.PI * 2);
        ctx.fillStyle = '#1aaad0';
        ctx.fill();

        if (trail.length > 1) {
          ctx.beginPath();
          trail.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          });
          ctx.strokeStyle = 'rgba(255,95,224,0.65)';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        if (!running) {
          const ax = sat.x + aim.x * 18;
          const ay = sat.y + aim.y * 18;
          ctx.beginPath();
          ctx.moveTo(sat.x, sat.y);
          ctx.lineTo(ax, ay);
          ctx.strokeStyle = 'rgba(255,95,224,0.9)';
          ctx.lineWidth = 3;
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(sat.x, sat.y, sat.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#37efff';
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;

        requestAnimationFrame(draw);
      }

      let last = performance.now();
      function loop(t) {
        const dt = Math.min(0.05, (t - last) / 1000);
        last = t;
        if (running) physicsStep(dt);
        requestAnimationFrame(loop);
      }

      function setAimFromPointer(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const dx = (x - sat.x) / 32;
        const dy = (y - sat.y) / 32;
        const maxMag = 5;
        const mag = Math.hypot(dx, dy) || 1;
        const scale = Math.min(1, maxMag / mag);
        aim.x = dx * scale;
        aim.y = dy * scale;
        sat.vx = aim.x;
        sat.vy = aim.y;
      }

      canvas.addEventListener('pointerdown', e => {
        if (running) return;
        dragging = true;
        setAimFromPointer(e.clientX, e.clientY);
      });
      canvas.addEventListener('pointermove', e => {
        if (!dragging || running) return;
        setAimFromPointer(e.clientX, e.clientY);
      });
      canvas.addEventListener('pointerup', () => {
        if (!dragging || running) return;
        dragging = false;
        launch();
      });
      canvas.addEventListener('pointercancel', () => dragging = false);

      document.addEventListener('keydown', e => {
        if (e.key === ' ') {
          e.preventDefault();
          launch();
          return;
        }
        if (e.key.toLowerCase() === 'r') {
          resetSession(true);
          return;
        }
        if (running) return;
        const step = 0.16;
        if (e.key === 'ArrowUp') aim.y -= step;
        if (e.key === 'ArrowDown') aim.y += step;
        if (e.key === 'ArrowLeft') aim.x -= step;
        if (e.key === 'ArrowRight') aim.x += step;
        const mag = Math.hypot(aim.x, aim.y);
        if (mag > 5) {
          aim.x = (aim.x / mag) * 5;
          aim.y = (aim.y / mag) * 5;
        }
        sat.vx = aim.x;
        sat.vy = aim.y;
        beep(300 + Math.random() * 40, 0.03, 'square', 0.01);
      });

      launchBtn.addEventListener('click', launch);
      resetBtn.addEventListener('click', () => resetSession(true));
      window.addEventListener('resize', resizeCanvas);

      updateLevelStats();
      resizeCanvas();
      resetSession();
      draw();
      requestAnimationFrame(loop);
    })();
  </script>
