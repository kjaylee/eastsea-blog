<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Orbital Sling — 중력 슬링샷 퍼즐</title>
  <meta name="theme-color" content="#0a0a1a" />
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: rgba(15, 18, 44, 0.9);
      --line: rgba(0, 255, 255, 0.25);
      --text: #e8ecff;
      --muted: #95a0c8;
      --cyan: #00f0ff;
      --gold: #ffd76a;
      --danger: #ff4f9d;
      --ok: #3dffb5;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at 20% 0%, #14143d 0%, var(--bg) 58%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    .app {
      width: min(100vw, 920px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px 12px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.12);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(1.05rem, 4.2vw, 1.45rem);
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.45);
      letter-spacing: 0.04em;
    }

    .pitch {
      font-size: 0.78rem;
      color: #cde8ff;
      opacity: 0.94;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(12, 14, 36, 0.86);
      padding: 8px 10px;
      min-height: 58px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .k {
      font-size: 0.67rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .v {
      font-size: 1rem;
      font-weight: 700;
    }

    .v.cyan { color: var(--cyan); text-shadow: 0 0 8px rgba(0,255,255,.45); }
    .v.gold { color: var(--gold); text-shadow: 0 0 8px rgba(255,215,106,.45); }

    .canvas-wrap {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #070713;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 28px rgba(0, 255, 255, 0.14);
    }

    canvas {
      width: 100%;
      aspect-ratio: 1000 / 620;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      background: transparent;
    }

    .hint {
      position: absolute;
      left: 10px;
      bottom: 10px;
      background: rgba(0, 0, 0, 0.48);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      color: #d2d8ff;
      font-size: 0.74rem;
      padding: 6px 10px;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    button {
      border: 1px solid rgba(0,255,255,0.34);
      border-radius: 10px;
      padding: 10px 10px;
      background: rgba(0,255,255,0.08);
      color: #d7faff;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .tip {
      margin: 0;
      min-height: 22px;
      color: #cdd5ff;
      font-size: 0.83rem;
      padding-inline: 2px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 4, 14, 0.8);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 20;
    }

    .overlay.show { display: flex; }

    .card {
      width: min(95vw, 620px);
      border-radius: 14px;
      border: 1px solid rgba(0,255,255,0.3);
      background: linear-gradient(180deg, rgba(18, 22, 52, 0.96), rgba(8, 9, 24, 0.95));
      box-shadow: 0 0 26px rgba(0,255,255,0.18);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 88vh;
      overflow: auto;
    }

    .card h2 {
      margin: 0;
      font-size: 1.15rem;
      color: var(--cyan);
      letter-spacing: 0.05em;
    }

    .small { font-size: 0.82rem; color: #b8c3f2; }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .lv {
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: #d8ddff;
      padding: 8px 4px;
      font-size: 0.8rem;
      cursor: pointer;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
    }

    .lv.lock { opacity: 0.35; cursor: not-allowed; }
    .lv.active { border-color: rgba(0,255,255,0.7); box-shadow: 0 0 12px rgba(0,255,255,0.2); color: #a6fcff; }
    .lv-stars { font-size: 0.72rem; color: #ffd76a; letter-spacing: 0.08em; }

    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }

    .result-stars {
      font-size: 1.5rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-shadow: 0 0 12px rgba(255, 215, 106, 0.45);
    }

    @media (max-width: 760px) {
      .hud { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .level-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">
      <div>
        <h1>Orbital Sling · 중력 슬링샷 퍼즐</h1>

      <div class="stat"><div class="k">총 별</div><div id="totalStarValue" class="v gold">0 / 30</div></div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="1000" height="620"></canvas>
      <div id="hint" class="hint">우주선을 뒤로 당겨 놓으면 발사됩니다</div>
    </div>

    <div class="controls">
      <button id="levelBtn">레벨 선택</button>
      <button id="resetBtn">재시작 (R)</button>
      <button id="nextBtn">다음 레벨</button>

    <p id="tip" class="tip"></p>
  </div>

  <div id="overlay" class="overlay">
    <div id="overlayCard" class="card"></div>
  </div>

      const LEVELS = [

        },

          ],

          belts: [{ x1: 260, y1: 300, x2: 770, y2: 205, count: 10, r: 10, spread: 14 }],

        },
        {
          name: '이동 행성',
          tip: '행성이 좌우로 움직입니다. 타이밍을 맞춰 발사하세요.',
          start: { x: 120, y: 540 },
          goal: { x: 900, y: 140, r: 22 },
          planets: [
            { x: 470, y: 300, r: 44, mass: 2.15, color: '#95f3ff', move: { axis: 'x', amp: 120, speed: 1.0, phase: 0.4 } },
            { x: 730, y: 430, r: 36, mass: 1.45, color: '#77cbff' }
          ],

          belts: [],
          blackholes: [],
          par: [2, 5]
        },
        {
          name: '최종 시험',
          tip: '모든 요소 조합! 최소 발사 횟수로 3별에 도전하세요.',
          start: { x: 95, y: 520 },
          goal: { x: 915, y: 95, r: 22 },
          planets: [
            { x: 290, y: 420, r: 34, mass: 1.2, color: '#65b4ff' },
            { x: 500, y: 250, r: 43, mass: 2.2, color: '#86ecff', move: { axis: 'x', amp: 85, speed: 0.9, phase: 2.0 } },
            { x: 760, y: 360, r: 39, mass: 1.85, color: '#70d6ff' }
          ],
          asteroids: [{ x: 410, y: 505, r: 12 }, { x: 560, y: 486, r: 13 }, { x: 640, y: 446, r: 13 }],
          belts: [{ x1: 310, y1: 340, x2: 860, y2: 190, count: 13, r: 10, spread: 18 }],
          blackholes: [{ x: 610, y: 265, r: 30, mass: 4.0 }],
          par: [3, 6]
        }
      ];

      let audioCtx = null;
      let audioReady = false;
      function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        audioReady = true;
      }

      function tone(freq, duration = 0.12, type = 'sine', volume = 0.15, offset = 0) {
        if (!audioCtx || !audioReady) return;
        const t0 = audioCtx.currentTime + offset;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), t0 + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + duration + 0.02);
      }

      function sfxLaunch() {
        tone(240, 0.1, 'triangle', 0.2, 0);
        tone(420, 0.14, 'sine', 0.13, 0.04);
      }
      function sfxSwing() {
        tone(980, 0.09, 'sine', 0.16, 0);
        tone(1280, 0.08, 'triangle', 0.1, 0.04);
      }
      function sfxCrash() {
        tone(190, 0.18, 'sawtooth', 0.22, 0);
        tone(130, 0.26, 'square', 0.14, 0.08);
      }
      function sfxClear() {
        [659, 880, 1047, 1318].forEach((f, i) => tone(f, 0.18, 'sine', 0.12, i * 0.06));
      }

      function defaultSave() {
        return {
          unlocked: 1,
          bestStars: Array(LEVELS.length).fill(0),
          bestShots: Array(LEVELS.length).fill(null)
        };
      }

      function loadSave() {
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (!raw) return defaultSave();
          const parsed = JSON.parse(raw);
          const fallback = defaultSave();
          return {
            unlocked: Math.min(LEVELS.length, Math.max(1, Number(parsed.unlocked) || 1)),
            bestStars: Array.from({ length: LEVELS.length }, (_, i) => Number(parsed.bestStars?.[i]) || 0),
            bestShots: Array.from({ length: LEVELS.length }, (_, i) => {
              const v = parsed.bestShots?.[i];
              return Number.isFinite(v) ? v : null;
            })
          };
        } catch {
          return defaultSave();
        }
      }

      function saveProgress() {
        try {
          localStorage.setItem(SAVE_KEY, JSON.stringify(save));
        } catch {}
      }

      const save = loadSave();

      const state = {
        mode: 'aim',
        levelIndex: 0,
        shots: 0,
        time: 0,
        elapsedFlight: 0,
        dragging: false,
        dragPos: null,
        hoverPos: null,
        hintHidden: false,
        runtime: null,
        ship: { x: 0, y: 0, vx: 0, vy: 0, r: SHIP_R },
        trail: [],
        sparks: [],
        proxFlags: [],
        justEnded: false,
        lastClearStars: 0
      };

      function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }

      function starsText(n) {
        return `${n >= 1 ? '★' : '☆'} ${n >= 2 ? '★' : '☆'} ${n >= 3 ? '★' : '☆'}`;
      }

      function totalStars() {
        return save.bestStars.reduce((a, b) => a + b, 0);
      }

      function calcStars(level, shots) {
        if (shots <= level.par[0]) return 3;
        if (shots <= level.par[1]) return 2;
        return 1;
      }

      function beltToAsteroids(belt) {
        const arr = [];
        const count = belt.count || 10;
        for (let i = 0; i < count; i++) {
          const t = count <= 1 ? 0.5 : i / (count - 1);
          const x = lerp(belt.x1, belt.x2, t);
          const y = lerp(belt.y1, belt.y2, t);
          const nx = Math.sin((i + 1.123) * 2.34) * (belt.spread || 16);
          const ny = Math.cos((i + 0.223) * 1.91) * (belt.spread || 16);
          arr.push({ x: x + nx, y: y + ny, r: (belt.r || 11) * (0.82 + ((i * 17) % 7) * 0.04) });
        }
        return arr;
      }

      function buildRuntime(level) {
        const planets = level.planets.map((p) => ({
          ...p,
          baseX: p.x,
          baseY: p.y
        }));

        const asteroids = [...level.asteroids.map(a => ({ ...a }))];
        for (const belt of level.belts || []) {
          asteroids.push(...beltToAsteroids(belt));
        }

        const blackholes = level.blackholes.map((b) => ({ ...b }));

        return { planets, asteroids, blackholes };
      }

      function planetPos(p, t) {
        let x = p.baseX;
        let y = p.baseY;
        if (p.move) {
          const phase = (t * p.move.speed) + (p.move.phase || 0);
          if (p.move.axis === 'x') x += Math.sin(phase) * p.move.amp;
          else y += Math.sin(phase) * p.move.amp;
        }
        return { x, y };
      }

      function gravityAt(x, y, t, runtime) {
        let ax = 0;
        let ay = 0;

        for (let i = 0; i < runtime.planets.length; i++) {
          const p = runtime.planets[i];
          const pos = planetPos(p, t);
          const dx = pos.x - x;
          const dy = pos.y - y;
          const d2raw = dx * dx + dy * dy;
          const minD2 = (p.r * 0.72) ** 2;
          const d2 = Math.max(minD2, d2raw);
          const d = Math.sqrt(d2);
          const a = G * p.mass / d2;
          ax += a * (dx / d);
          ay += a * (dy / d);
        }

        for (let i = 0; i < runtime.blackholes.length; i++) {
          const b = runtime.blackholes[i];
          const dx = b.x - x;
          const dy = b.y - y;
          const d2 = Math.max((b.r * 0.65) ** 2, dx * dx + dy * dy);
          const d = Math.sqrt(d2);
          const a = G * (b.mass || 4) / d2;
          ax += a * (dx / d);
          ay += a * (dy / d);
        }

        return { ax, ay };
      }

      function shipAtStart(level) {
        state.ship.x = level.start.x;
        state.ship.y = level.start.y;
        state.ship.vx = 0;
        state.ship.vy = 0;
      }

      function loadLevel(index) {
        state.levelIndex = clamp(index, 0, LEVELS.length - 1);
        const level = LEVELS[state.levelIndex];
        state.runtime = buildRuntime(level);
        state.time = 0;
        state.shots = 0;
        state.elapsedFlight = 0;
        state.mode = 'aim';
        state.dragging = false;
        state.dragPos = null;
        state.hoverPos = null;
        state.trail.length = 0;
        state.sparks.length = 0;
        state.proxFlags = Array(state.runtime.planets.length).fill(false);
        state.justEnded = false;
        shipAtStart(level);
        hintEl.style.opacity = '1';
        updateHud();
        tipEl.textContent = `L${state.levelIndex + 1}. ${level.tip}`;
      }

      function pointerToWorld(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (e.clientX - rect.left) * (W / rect.width),
          y: (e.clientY - rect.top) * (H / rect.height)
        };
      }

      function canAim() {
        return state.mode === 'aim' && overlay.classList.contains('show') === false;
      }

      function launchFromDrag() {
        if (!state.dragPos || !canAim()) return;
        const level = LEVELS[state.levelIndex];
        const sx = level.start.x;
        const sy = level.start.y;
        let dx = sx - state.dragPos.x;
        let dy = sy - state.dragPos.y;
        const len = Math.hypot(dx, dy);
        if (len < 8) {
          state.dragging = false;
          state.dragPos = null;
          return;
        }
        const clamped = Math.min(len, MAX_PULL);
        dx = (dx / len) * clamped;
        dy = (dy / len) * clamped;

        state.ship.x = sx;
        state.ship.y = sy;
        state.ship.vx = dx * LAUNCH_SCALE;
        state.ship.vy = dy * LAUNCH_SCALE;
        state.mode = 'flying';
        state.elapsedFlight = 0;
        state.shots += 1;
        state.trail.length = 0;
        state.dragging = false;
        state.dragPos = null;
        hintEl.style.opacity = '0';
        sfxLaunch();
        updateHud();
      }

      function failLevel(reason) {
        if (state.mode !== 'flying') return;
        state.mode = 'failed';
        state.justEnded = true;
        sfxCrash();
        showResult(false, 0, reason || '충돌');
      }

      function clearLevel() {
        if (state.mode !== 'flying') return;
        const level = LEVELS[state.levelIndex];
        state.mode = 'cleared';
        state.justEnded = true;
        const stars = calcStars(level, state.shots);
        state.lastClearStars = stars;

        if (stars > save.bestStars[state.levelIndex]) {
          save.bestStars[state.levelIndex] = stars;
        }
        const prevShots = save.bestShots[state.levelIndex];
        if (prevShots == null || state.shots < prevShots) {
          save.bestShots[state.levelIndex] = state.shots;
        }
        if (save.unlocked < state.levelIndex + 2) {
          save.unlocked = Math.min(LEVELS.length, state.levelIndex + 2);
        }

        saveProgress();
        sfxClear();
        updateHud();
        showResult(true, stars, '도착 성공');
      }

      function updateShip(dt) {
        if (state.mode !== 'flying') return;

        const rt = state.runtime;
        const g = gravityAt(state.ship.x, state.ship.y, state.time, rt);
        state.ship.vx += g.ax * dt;
        state.ship.vy += g.ay * dt;
        state.ship.x += state.ship.vx * dt;
        state.ship.y += state.ship.vy * dt;

        state.elapsedFlight += dt;

        state.trail.push({ x: state.ship.x, y: state.ship.y, life: 0.75 });
        if (state.trail.length > 75) state.trail.shift();

        state.sparks.push({
          x: state.ship.x - state.ship.vx * 0.015,
          y: state.ship.y - state.ship.vy * 0.015,
          vx: (Math.random() - 0.5) * 15 - state.ship.vx * 0.03,
          vy: (Math.random() - 0.5) * 15 - state.ship.vy * 0.03,
          life: 0.36 + Math.random() * 0.28,
          size: 1 + Math.random() * 1.2
        });

        for (let i = state.runtime.planets.length - 1; i >= 0; i--) {
          const p = state.runtime.planets[i];
          const pos = planetPos(p, state.time);
          const d = Math.hypot(state.ship.x - pos.x, state.ship.y - pos.y);
          if (d < p.r + 55 && !state.proxFlags[i]) {
            state.proxFlags[i] = true;
            sfxSwing();
          } else if (d > p.r + 75) {
            state.proxFlags[i] = false;
          }
        }

        for (const a of state.runtime.asteroids) {
          if (Math.hypot(state.ship.x - a.x, state.ship.y - a.y) < SHIP_R + a.r) {
            failLevel('소행성 충돌');
            return;
          }
        }

        for (const b of state.runtime.blackholes) {
          const d = Math.hypot(state.ship.x - b.x, state.ship.y - b.y);
          if (d < b.r) {
            failLevel('블랙홀 흡수');
            return;
          }
        }

        const goal = LEVELS[state.levelIndex].goal;
        if (Math.hypot(state.ship.x - goal.x, state.ship.y - goal.y) < goal.r + SHIP_R + 3) {
          clearLevel();
          return;
        }

        if (state.elapsedFlight > 0.25) {
          if (state.ship.x < -120 || state.ship.x > W + 120 || state.ship.y < -120 || state.ship.y > H + 120) {
            failLevel('우주 미아');
            return;
          }
        }
      }

      function updateEffects(dt) {
        for (let i = state.trail.length - 1; i >= 0; i--) {
          state.trail[i].life -= dt;
          if (state.trail[i].life <= 0) state.trail.splice(i, 1);
        }
        for (let i = state.sparks.length - 1; i >= 0; i--) {
          const s = state.sparks[i];
          s.x += s.vx * dt;
          s.y += s.vy * dt;
          s.vx *= 0.95;
          s.vy *= 0.95;
          s.life -= dt;
          if (s.life <= 0) state.sparks.splice(i, 1);
        }
      }

      function predictedPath() {
        if (!canAim() || !state.dragging || !state.dragPos) return null;
        const level = LEVELS[state.levelIndex];
        const sx = level.start.x;
        const sy = level.start.y;

        let dx = sx - state.dragPos.x;
        let dy = sy - state.dragPos.y;
        const len = Math.hypot(dx, dy);
        if (len < 8) return null;
        const clamped = Math.min(len, MAX_PULL);
        dx = (dx / len) * clamped;
        dy = (dy / len) * clamped;

        let x = sx;
        let y = sy;
        let vx = dx * LAUNCH_SCALE;
        let vy = dy * LAUNCH_SCALE;

        const points = [];
        let simT = state.time;
        for (let i = 0; i < 56; i++) {
          const g = gravityAt(x, y, simT, state.runtime);
          vx += g.ax * STEP;
          vy += g.ay * STEP;
          x += vx * STEP;
          y += vy * STEP;
          simT += STEP;

          if (i % 2 === 0) points.push({ x, y });

          if (x < -80 || x > W + 80 || y < -80 || y > H + 80) break;
          let hit = false;
          for (const a of state.runtime.asteroids) {
            if (Math.hypot(x - a.x, y - a.y) < SHIP_R + a.r) { hit = true; break; }
          }
          if (hit) break;
          for (const b of state.runtime.blackholes) {
            if (Math.hypot(x - b.x, y - b.y) < b.r) { hit = true; break; }
          }
          if (hit) break;
        }
        return points;
      }

      function drawBackground(t) {
        ctx.clearRect(0, 0, W, H);
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0f1030');
        grad.addColorStop(0.55, '#0a0a1a');
        grad.addColorStop(1, '#050510');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        for (const s of starField) {
          const tw = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin((t * s.speed) + s.phase));
          const driftX = Math.sin((t * 0.4) + s.phase * 1.2) * 1.8;
          ctx.globalAlpha = tw;
          ctx.fillStyle = s.hue ? `hsl(${190 + Math.sin(t + s.phase) * 18}, 95%, 80%)` : '#ffffff';
          ctx.beginPath();
          ctx.arc(s.x + driftX, s.y + t * s.drift * 15, s.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawGoal(goal, t) {
        const pulse = 0.7 + 0.3 * Math.sin(t * 3.5);
        const glow = ctx.createRadialGradient(goal.x, goal.y, 2, goal.x, goal.y, goal.r * 2.5);
        glow.addColorStop(0, `rgba(255, 238, 160, ${0.9 * pulse})`);
        glow.addColorStop(1, 'rgba(255, 210, 90, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(goal.x, goal.y, goal.r * 2.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ffd76a';
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = -Math.PI / 2 + i * (Math.PI * 2 / 5);
          const b = a + Math.PI / 5;
          const r1 = goal.r;
          const r2 = goal.r * 0.45;
          const x1 = goal.x + Math.cos(a) * r1;
          const y1 = goal.y + Math.sin(a) * r1;
          const x2 = goal.x + Math.cos(b) * r2;
          const y2 = goal.y + Math.sin(b) * r2;
          if (i === 0) ctx.moveTo(x1, y1);
          else ctx.lineTo(x1, y1);
          ctx.lineTo(x2, y2);
        }
        ctx.closePath();
        ctx.fill();
      }

      function drawPlanets(t) {
        for (const p of state.runtime.planets) {
          const pos = planetPos(p, state.time);
          const ringPulse = 0.65 + 0.35 * Math.sin(t * 2.4 + pos.x * 0.01);
          const outer = ctx.createRadialGradient(pos.x, pos.y, p.r * 0.2, pos.x, pos.y, p.r * 2.5);
          outer.addColorStop(0, 'rgba(255,255,255,0.2)');
          outer.addColorStop(1, 'rgba(64,180,255,0)');
          ctx.fillStyle = outer;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, p.r * 2.5, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = `rgba(120, 220, 255, ${0.14 * ringPulse})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, p.r + 52 + Math.sin(t * 2 + p.baseX * 0.02) * 4, 0, Math.PI * 2);
          ctx.stroke();

          const g = ctx.createRadialGradient(pos.x - p.r * 0.35, pos.y - p.r * 0.35, p.r * 0.15, pos.x, pos.y, p.r);
          g.addColorStop(0, '#ffffff');
          g.addColorStop(0.12, '#baf8ff');
          g.addColorStop(1, p.color);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawAsteroids(t) {
        for (const a of state.runtime.asteroids) {
          const spin = Math.sin(t * 1.4 + a.x * 0.02 + a.y * 0.01);
          ctx.fillStyle = '#6f748e';
          ctx.beginPath();
          ctx.moveTo(a.x + a.r * (0.7 + 0.06 * spin), a.y - a.r * 0.2);
          ctx.lineTo(a.x + a.r * 0.2, a.y - a.r * 0.9);
          ctx.lineTo(a.x - a.r * 0.72, a.y - a.r * 0.4);
          ctx.lineTo(a.x - a.r * 0.85, a.y + a.r * 0.35);
          ctx.lineTo(a.x - a.r * 0.15, a.y + a.r * 0.84);
          ctx.lineTo(a.x + a.r * 0.68, a.y + a.r * 0.52);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = 'rgba(255,255,255,0.14)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      function drawBlackholes(t) {
        for (const b of state.runtime.blackholes) {
          const halo = ctx.createRadialGradient(b.x, b.y, b.r * 0.4, b.x, b.y, b.r * 2.8);
          halo.addColorStop(0, 'rgba(130, 65, 255, 0.3)');
          halo.addColorStop(0.65, 'rgba(20, 8, 55, 0.22)');
          halo.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r * 2.8, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = `rgba(180, 120, 255, ${0.38 + Math.sin(t * 3 + b.x * 0.02) * 0.12})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r + 7 + Math.sin(t * 2.3) * 2.5, 0, Math.PI * 2);
          ctx.stroke();

          ctx.fillStyle = '#050308';
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawTrajectory(points) {
        if (!points || points.length < 2) return;
        ctx.save();
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.9)';
        ctx.setLineDash([6, 7]);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();
        ctx.restore();
      }

      function drawTrail() {
        if (state.trail.length < 2) return;
        ctx.save();
        for (let i = 1; i < state.trail.length; i++) {
          const a = state.trail[i - 1];
          const b = state.trail[i];
          const alpha = Math.min(a.life, b.life) * 0.65;
          ctx.strokeStyle = `rgba(0, 255, 255, ${alpha})`;
          ctx.lineWidth = 1.4 + i / state.trail.length * 1.6;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawSparks() {
        for (const s of state.sparks) {
          ctx.globalAlpha = Math.max(0, s.life * 2.2);
          ctx.fillStyle = '#7ffcff';
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawShip() {
        const ship = state.ship;
        let angle = -Math.PI / 2;
        if (state.mode === 'flying') angle = Math.atan2(ship.vy, ship.vx);
        else if (state.dragging && state.dragPos) angle = Math.atan2(ship.y - state.dragPos.y, ship.x - state.dragPos.x);

        const cos = Math.cos(angle);
        const sin = Math.sin(angle);

        const p1 = { x: ship.x + cos * 15, y: ship.y + sin * 15 };
        const p2 = { x: ship.x + Math.cos(angle + 2.45) * 11, y: ship.y + Math.sin(angle + 2.45) * 11 };
        const p3 = { x: ship.x + Math.cos(angle - 2.45) * 11, y: ship.y + Math.sin(angle - 2.45) * 11 };

        ctx.fillStyle = '#b8f8ff';
        ctx.shadowColor = 'rgba(0,255,255,0.8)';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        if (state.mode === 'aim') {
          ctx.strokeStyle = 'rgba(255,255,255,0.35)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(ship.x, ship.y, 17, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      function drawDragLine() {
        if (!state.dragging || !state.dragPos) return;
        const level = LEVELS[state.levelIndex];
        const sx = level.start.x;
        const sy = level.start.y;
        const dx = state.dragPos.x - sx;
        const dy = state.dragPos.y - sy;
        const len = Math.hypot(dx, dy);
        const c = len > MAX_PULL ? MAX_PULL / len : 1;
        const tx = sx + dx * c;
        const ty = sy + dy * c;

        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(tx, ty);
        ctx.stroke();
      }

      function render(t) {
        drawBackground(t);
        drawAsteroids(t);
        drawBlackholes(t);
        drawPlanets(t);
        drawGoal(LEVELS[state.levelIndex].goal, t);

        const pred = predictedPath();
        drawTrajectory(pred);
        drawTrail();
        drawSparks();
        drawDragLine();
        drawShip();

        if (state.mode === 'failed') {
          ctx.fillStyle = 'rgba(255, 79, 157, 0.15)';
          ctx.fillRect(0, 0, W, H);
        }
      }

      function updateHud() {
        const lv = LEVELS[state.levelIndex];
        levelValue.textContent = `${state.levelIndex + 1} / ${LEVELS.length}`;
        shotValue.textContent = String(state.shots);
        levelStarValue.textContent = starsText(save.bestStars[state.levelIndex] || 0);
        totalStarValue.textContent = `${totalStars()} / ${LEVELS.length * 3}`;
        nextBtn.disabled = state.levelIndex >= save.unlocked - 1 || state.levelIndex >= LEVELS.length - 1;
        tipEl.textContent = `L${state.levelIndex + 1}. ${lv.tip}`;
      }

      function closeOverlay() {
        overlay.classList.remove('show');
      }

      function showLevelSelect() {
        const rows = LEVELS.map((lv, i) => {
          const unlocked = i < save.unlocked;
          const stars = save.bestStars[i] || 0;
          return `
            <button class="lv ${unlocked ? '' : 'lock'} ${i === state.levelIndex ? 'active' : ''}" data-lv="${i}" ${unlocked ? '' : 'disabled'}>
              <div>Lv ${i + 1}</div>
              <div class="lv-stars">${starsText(stars)}</div>
            </button>
          `;
        }).join('');

        overlayCard.innerHTML = `
          <h2>레벨 선택</h2>
          <div class="small">총 별 ${totalStars()} / 30 · 잠금 해제 ${save.unlocked} / 10</div>
          <div class="level-grid">${rows}</div>
          <div class="row">
            <button id="closeOverlayBtn">닫기</button>
          </div>
        `;
        overlay.classList.add('show');

        overlayCard.querySelectorAll('[data-lv]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const idx = Number(btn.getAttribute('data-lv'));
            if (!Number.isFinite(idx) || idx >= save.unlocked) return;
            closeOverlay();
            loadLevel(idx);
          });
        });

        document.getElementById('closeOverlayBtn').addEventListener('click', closeOverlay);
      }

      function showResult(success, stars, reason) {
        const level = LEVELS[state.levelIndex];
        const best = save.bestStars[state.levelIndex] || 0;
        const bestShot = save.bestShots[state.levelIndex];

        overlayCard.innerHTML = success ? `
          <h2>레벨 클리어!</h2>
          <div class="small">${level.name}</div>
          <div class="result-stars">${starsText(stars)}</div>
          <div class="small">이번 발사 횟수: ${state.shots}회 · 최고 기록: ${bestShot ?? state.shots}회</div>
          <div class="small">누적 최고 별: ${starsText(best)}</div>
          <div class="row">
            <button id="retryBtn">다시 도전</button>
            <button id="nextLevelBtn" ${state.levelIndex >= LEVELS.length - 1 ? 'disabled' : ''}>다음 레벨</button>
          </div>
          <div class="row">
            <button id="selectBtn">레벨 목록</button>
          </div>
        ` : `
          <h2 style="color:#ff7cb6">실패</h2>
          <div class="small">원인: ${reason}</div>
          <div class="small">발사 횟수: ${state.shots}회</div>
          <div class="row">
            <button id="retryBtn">재시작</button>
            <button id="selectBtn">레벨 목록</button>
          </div>
        `;

        overlay.classList.add('show');

        document.getElementById('retryBtn')?.addEventListener('click', () => {
          closeOverlay();
          loadLevel(state.levelIndex);
        });

        document.getElementById('nextLevelBtn')?.addEventListener('click', () => {
          if (state.levelIndex >= LEVELS.length - 1) return;
          closeOverlay();
          loadLevel(state.levelIndex + 1);
        });

        document.getElementById('selectBtn')?.addEventListener('click', () => {
          showLevelSelect();
        });
      }

      canvas.addEventListener('pointerdown', (e) => {
        ensureAudio();
        if (!canAim()) return;
        const p = pointerToWorld(e);
        const level = LEVELS[state.levelIndex];
        const d = Math.hypot(p.x - level.start.x, p.y - level.start.y);
        if (d < 54) {
          state.dragging = true;
          state.dragPos = p;
          canvas.setPointerCapture?.(e.pointerId);
        }
      });

      canvas.addEventListener('pointermove', (e) => {
        const p = pointerToWorld(e);
        state.hoverPos = p;
        if (!state.dragging) return;
        state.dragPos = p;
      });

      function onPointerEnd() {
        if (!state.dragging) return;
        launchFromDrag();
      }

      canvas.addEventListener('pointerup', onPointerEnd);
      canvas.addEventListener('pointercancel', onPointerEnd);
      canvas.addEventListener('pointerleave', (e) => {
        if (state.dragging && e.buttons === 0) onPointerEnd();
      });

      levelBtn.addEventListener('click', () => {
        ensureAudio();
        showLevelSelect();
      });

      resetBtn.addEventListener('click', () => {
        ensureAudio();
        closeOverlay();
        loadLevel(state.levelIndex);
      });

      nextBtn.addEventListener('click', () => {
        ensureAudio();
        if (state.levelIndex < LEVELS.length - 1 && state.levelIndex + 1 < save.unlocked) {
          closeOverlay();
          loadLevel(state.levelIndex + 1);
        }
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'r' || e.key === 'R') {
          closeOverlay();
          loadLevel(state.levelIndex);
        }
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeOverlay();
      });

      let last = 0;
      let acc = 0;
      function loop(ts) {
        if (!last) last = ts;
        const dt = Math.min(0.033, (ts - last) / 1000);
        last = ts;

        state.time += dt;
        acc += dt;

        while (acc >= STEP) {
          updateShip(STEP);
          updateEffects(STEP);
          acc -= STEP;
        }

        render(state.time);
        requestAnimationFrame(loop);
      }

      loadLevel(0);
      updateHud();
      requestAnimationFrame(loop);

      setTimeout(() => {
        if (!state.hintHidden) hintEl.style.opacity = '1';
      }, 200);
    })();
  </script>
</body>
