<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Orbital Triage Command</title>
<meta name="description" content="Play Orbital Triage Command - Free HTML5 browser game on eastsea.monster. No download required.">
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --line: #2cf5ff;
      --line2: #ff4fd8;
      --text: #e9f7ff;
      --warn: #ffb347;
      --danger: #ff4d6d;
      --ok: #62ffb0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #17173a 0%, var(--bg) 58%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 12px;
    }
    .app {
      width: min(900px, 100%);
      display: grid;
      gap: 12px;
    }
    .panel {
      background: linear-gradient(160deg, rgba(18,18,42,.95), rgba(10,10,26,.95));
      border: 1px solid rgba(44,245,255,.35);
      border-radius: 14px;
      box-shadow: 0 0 22px rgba(44,245,255,.2);
      padding: 12px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.1rem, 3.8vw, 1.5rem);
      color: var(--line);
      letter-spacing: .4px;
    }
    .hint { opacity: .86; font-size: .92rem; margin: 4px 0 0; }
    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .stat {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }
    .stat b { display: block; font-size: .78rem; opacity: .8; margin-bottom: 4px; }
    .stat span { font-size: 1.05rem; font-weight: 700; }

    .modules {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .mod {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255,255,255,.03);
      cursor: pointer;
      transition: .15s ease;
    }
    .mod.active {
      border-color: var(--line);
      box-shadow: 0 0 14px rgba(44,245,255,.4);
      transform: translateY(-1px);
    }
    .mod .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .93rem;
      margin-bottom: 6px;
    }
    .bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }
    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--ok), var(--warn), var(--danger));
      width: 0;
      transition: width .13s linear;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    button {
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      padding: 10px;
      background: #1a1a33;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }
    button.active {
      border-color: var(--line2);
      box-shadow: 0 0 12px rgba(255,79,216,.45);
    }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .execute {
      width: 100%;
      margin-top: 8px;
      border-color: var(--line);
      background: linear-gradient(90deg, #173056, #2e1760);
      font-size: 1rem;
    }

    .log {
      min-height: 36px;
      font-size: .9rem;
      color: #c6f7ff;
    }

    @media (max-width: 640px) {
      body { padding: 8px; }
      .hud { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .modules { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
      button { padding: 12px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>🛰️ Orbital Triage Command</h1>
      <p class="hint">모듈 손상을 관리하며 정거장을 지키세요. 키보드: 1~4 모듈 / QWE 액션 / Space 실행</p>
    </section>

    <section class="panel hud">
      <div class="stat"><b>Score</b><span id="score">0</span></div>
      <div class="stat"><b>Wave</b><span id="wave">1</span></div>
      <div class="stat"><b>Integrity</b><span id="integrity">100</span></div>
      <div class="stat"><b>Energy</b><span id="energy">100</span></div>
    </section>

    <section class="panel">
      <div class="modules" id="modules"></div>
    </section>

    <section class="panel">
      <div class="actions" id="actions"></div>
      <button class="execute" id="execBtn">⚡ Execute Triage (Space)</button>
      <p class="hint">Best Wave: <b id="bestWave">0</b> · Best Score: <b id="bestScore">0</b></p>
      <div class="log" id="log">시스템 대기 중…</div>
    </section>
  </main>

  <script>
    (() => {
      const LS_KEY = 'orbital-triage-command-best-v1';
      const moduleNames = ['Reactor', 'Oxygen', 'Comms', 'Shield'];
      const actionDefs = [
        { key: 'Q', name: 'Patch Kit', energy: 14, heal: 24, bonus: 2, risk: 0.02 },
        { key: 'W', name: 'Coolant Pulse', energy: 22, heal: 30, bonus: 0, risk: 0.01 },
        { key: 'E', name: 'Overdrive Nanites', energy: 34, heal: 45, bonus: -6, risk: 0.11 }
      ];

      const state = {
        modules: moduleNames.map((name) => ({ name, damage: 8 + Math.random() * 10 })),
        selectedModule: 0,
        selectedAction: 0,
        score: 0,
        wave: 1,
        integrity: 100,
        energy: 100,
        time: 0,
        gameOver: false,
        bestWave: 0,
        bestScore: 0,
      };

      const els = {
        modules: document.getElementById('modules'),
        actions: document.getElementById('actions'),
        score: document.getElementById('score'),
        wave: document.getElementById('wave'),
        integrity: document.getElementById('integrity'),
        energy: document.getElementById('energy'),
        bestWave: document.getElementById('bestWave'),
        bestScore: document.getElementById('bestScore'),
        execBtn: document.getElementById('execBtn'),
        log: document.getElementById('log'),
      };

      let audioCtx;
      const ensureAudio = () => {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx = new Ctx();
        }
      };
      const beep = (freq = 440, len = 0.09, type = 'sine', vol = 0.03) => {
        ensureAudio();
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + len);
        o.connect(g).connect(audioCtx.destination);
        o.start(t);
        o.stop(t + len);
      };

      const loadBest = () => {
        try {
          const d = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
          state.bestWave = Number(d.bestWave || 0);
          state.bestScore = Number(d.bestScore || 0);
        } catch (_) {}
      };

      const saveBest = () => {
        localStorage.setItem(LS_KEY, JSON.stringify({
          bestWave: state.bestWave,
          bestScore: state.bestScore,
        }));
      };

      function setLog(msg, danger = false) {
        els.log.textContent = msg;
        els.log.style.color = danger ? '#ff9eb2' : '#c6f7ff';
      }

      function renderModules() {
        els.modules.innerHTML = '';
        state.modules.forEach((m, i) => {
          const card = document.createElement('button');
          card.className = 'mod' + (state.selectedModule === i ? ' active' : '');
          card.innerHTML = `
            <div class="top"><span>${i + 1}. ${m.name}</span><strong>${Math.round(m.damage)}%</strong></div>
            <div class="bar"><div class="fill" style="width:${Math.min(100, m.damage)}%"></div></div>
          `;
          card.addEventListener('click', () => {
            state.selectedModule = i;
            beep(520, 0.06, 'triangle');
            render();
          });
          els.modules.appendChild(card);
        });
      }

      function renderActions() {
        els.actions.innerHTML = '';
        actionDefs.forEach((a, i) => {
          const btn = document.createElement('button');
          btn.className = state.selectedAction === i ? 'active' : '';
          btn.innerHTML = `${a.key} · ${a.name}<br><small>Energy ${a.energy} · Heal ${a.heal}</small>`;
          btn.addEventListener('click', () => {
            state.selectedAction = i;
            beep(640, 0.05, 'square');
            render();
          });
          els.actions.appendChild(btn);
        });
      }

      function renderHud() {
        els.score.textContent = Math.floor(state.score);
        els.wave.textContent = state.wave;
        els.integrity.textContent = Math.max(0, Math.floor(state.integrity));
        els.energy.textContent = Math.floor(state.energy);
        els.bestWave.textContent = state.bestWave;
        els.bestScore.textContent = state.bestScore;
        els.execBtn.disabled = state.gameOver;
        els.execBtn.textContent = state.gameOver ? '🔁 Restart Mission' : '⚡ Execute Triage (Space)';
      }

      function render() {
        renderModules();
        renderActions();
        renderHud();
      }

      function applyAction() {
        if (state.gameOver) {
          reset();
          return;
        }
        const module = state.modules[state.selectedModule];
        const action = actionDefs[state.selectedAction];

        if (state.energy < action.energy) {
          setLog('에너지가 부족합니다.', true);
          beep(170, 0.12, 'sawtooth', 0.05);
          return;
        }

        state.energy -= action.energy;
        const efficiency = 0.9 + Math.random() * 0.4;
        const healed = action.heal * efficiency;
        module.damage = Math.max(0, module.damage - healed);
        state.score += Math.round(healed * 2 + (100 - module.damage) * 0.1);
        state.integrity = Math.min(100, state.integrity + Math.max(0, action.bonus));

        if (Math.random() < action.risk) {
          const backlash = 6 + Math.random() * 8;
          module.damage = Math.min(100, module.damage + backlash);
          state.integrity = Math.max(0, state.integrity - 3);
          setLog(`${module.name} 오버슈트! 역류 손상 +${backlash.toFixed(0)}%`, true);
          beep(210, 0.14, 'sawtooth', 0.05);
        } else {
          setLog(`${module.name} 안정화 성공 · -${healed.toFixed(0)}%`);
          beep(730, 0.08, 'triangle');
          beep(980, 0.06, 'sine');
        }

        render();
      }

      function reset() {
        state.modules.forEach((m) => {
          m.damage = 8 + Math.random() * 12;
        });
        state.selectedModule = 0;
        state.selectedAction = 0;
        state.score = 0;
        state.wave = 1;
        state.integrity = 100;
        state.energy = 100;
        state.time = 0;
        state.gameOver = false;
        setLog('새 미션 시작. 우주 정거장을 보호하세요.');
        beep(540, 0.08, 'triangle');
        render();
      }

      function tick() {
        if (state.gameOver) return;
        state.time += 0.1;
        if (state.time >= 20) {
          state.time = 0;
          state.wave += 1;
          setLog(`Wave ${state.wave} 진입: 손상 속도 증가`);
          beep(420, 0.08, 'square');
        }

        const decayBase = 0.18 + state.wave * 0.028;
        let criticalCount = 0;

        state.modules.forEach((m) => {
          m.damage += decayBase + Math.random() * (0.7 + state.wave * 0.015);
          if (m.damage > 72) criticalCount += 1;
          if (m.damage > 100) m.damage = 100;
        });

        const leak = state.modules.reduce((sum, m) => sum + Math.max(0, m.damage - 65), 0) * 0.01;
        state.integrity -= leak;
        state.energy = Math.min(100, state.energy + 0.75 + (state.wave * 0.03));
        state.score += 0.6 + state.wave * 0.08;

        if (criticalCount >= 2 && Math.random() < 0.18) {
          setLog('⚠️ 다중 모듈 임계치! 즉시 조치 필요', true);
          beep(240, 0.09, 'square', 0.05);
        }

        if (state.integrity <= 0) {
          state.integrity = 0;
          state.gameOver = true;
          state.bestWave = Math.max(state.bestWave, state.wave);
          state.bestScore = Math.max(state.bestScore, Math.floor(state.score));
          saveBest();
          setLog(`MISSION FAILED · Wave ${state.wave} · Score ${Math.floor(state.score)} (Space/버튼으로 재시작)`, true);
          beep(180, 0.24, 'sawtooth', 0.06);
        }

        render();
      }

      document.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if (k >= '1' && k <= '4') {
          state.selectedModule = Number(k) - 1;
          beep(510, 0.05, 'triangle');
          render();
        } else if (k === 'q' || k === 'w' || k === 'e') {
          state.selectedAction = { q: 0, w: 1, e: 2 }[k];
          beep(640, 0.05, 'square');
          render();
        } else if (k === ' ') {
          e.preventDefault();
          applyAction();
        }
      }, { passive: false });

      els.execBtn.addEventListener('click', () => applyAction());

      loadBest();
      render();
      setLog('모듈을 선택하고 액션을 실행하세요.');
      setInterval(tick, 100);
    })();
  </script>
