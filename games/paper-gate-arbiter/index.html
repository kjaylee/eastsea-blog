    *{box-sizing:border-box;}
    html,body{margin:0;height:100%;background:var(--paper);font-family:"Noto Sans KR",system-ui,sans-serif;color:var(--ink);touch-action:none;}
    body{display:flex;flex-direction:column;padding:calc(env(safe-area-inset-top) + 8px) 8px calc(env(safe-area-inset-bottom) + 8px);}

    .cell{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px;text-align:center;font-size:.72rem;line-height:1.2;}
    .cell b{display:block;font-size:.98rem;margin-top:2px;}
    canvas{width:100%;flex:1;display:block;border-radius:14px;border:2px solid var(--line);background:#efe1c4;box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);}

      {id:'origin-ban',ko:'서부 출신 금지',en:'West origin denied',check:a=>a.origin!=='West'},

    ];

    let state='title';
    let score=0, strikes=0, inspectTokens=3, timeLeft=75, level=1, processed=0;
    let msg='';
    let current=null;
    let rules=[];
    let shake=0;

    const pickRules=()=>{
      const n=Math.min(2+Math.floor(level/3),4);
      const shuffled=[...rulePool].sort(()=>Math.random()-.5);
      return shuffled.slice(0,n);
    };

    const makeApplicant=()=>{
      const forged=Math.random()<Math.min(.12+.03*level,.42);
      const vip=Math.random()<.12;
      return {
        name:`ID-${1000+Math.floor(Math.random()*9000)}`,
        origin:origins[(Math.random()*origins.length)|0],
        pass:passes[(Math.random()*passes.length)|0],
        days:2+((Math.random()*14)|0),
        cargo:cargos[(Math.random()*cargos.length)|0],
        forged,vip
      };
    };

    const evalApplicant=(app)=>{
      let failed=0;
      for(const r of rules) if(!r.check(app)) failed++;
      if(app.forged) failed++;
      const valid=failed===0 || (app.vip && failed===1);
      const ambiguity=(failed===1 && !app.forged) || (app.vip && failed===1);
      return {valid,failed,ambiguity};
    };

    const nextApplicant=()=>{ current=makeApplicant(); };

    const punish=()=>{
      strikes++; shake=10; sfx(160,.12,'sawtooth',.05);
      if(strikes>=3){
        state='gameover';
        if(score>best) best=score;
        maxLevel=Math.max(maxLevel,level);
        localStorage.setItem(LS_KEY,JSON.stringify({best,maxLevel,lang}));
      }
    };

    const reward=(v)=>{ score+=v; sfx(620,.08,'triangle',.04); if(score>best) best=score; };

    const judge=(action)=>{
      if(state!=='play'||!current) return;
      const r=evalApplicant(current);
      let ok=false;
      if(action==='approve') ok=r.valid;
      else if(action==='deny') ok=!r.valid;
      else if(action==='inspect'){
        if(inspectTokens<=0){ msg=T('noToken'); sfx(210,.07,'square',.03); return; }
        inspectTokens--;
        ok=r.ambiguity || r.failed>=2;
      }

      processed++;
      if(ok){
        reward(action==='inspect'?14:12);
        msg=T('passed');
      }else{
        msg=T('failed');
        punish();
      }

      if(processed%5===0){
        level++;
        inspectTokens=Math.min(5,inspectTokens+1);
        rules=pickRules();
      }

      nextApplicant();
      updateUI();
    };

      initAudio();
      state='play';score=0;strikes=0;inspectTokens=3;timeLeft=75;level=1;processed=0;

      msg='';
      nextApplicant();
      updateUI();
      sfx(480,.09,'sine',.04);
    };

      ui.time.textContent=Math.max(0,timeLeft|0);

      ui.approveBtn.textContent=T('approve');
      ui.inspectBtn.textContent=T('inspect');
      ui.denyBtn.textContent=T('deny');
      ui.titleText.textContent=T('title');
      ui.langBtn.textContent=lang.toUpperCase();
    };

    const drawPaper=(x,y,w,h)=>{
      ctx.fillStyle='#f8edd7';
      ctx.fillRect(x,y,w,h);
      ctx.strokeStyle='#c7ae88';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
      for(let i=0;i<8;i++){
        const yy=y+16+i*18;
        ctx.strokeStyle='rgba(78,52,35,.14)';
        ctx.beginPath();ctx.moveTo(x+12,yy);ctx.lineTo(x+w-12,yy);ctx.stroke();
      }
    };

    const label=(k,v,x,y,color='#3d2b1f')=>{
      ctx.fillStyle=color;ctx.font='600 14px system-ui';ctx.fillText(k,x,y);
      ctx.font='700 16px system-ui';ctx.fillText(v,x+94,y);
    };

    const render=()=>{
      const ox=shake? (Math.random()*6-3):0;
      const oy=shake? (Math.random()*6-3):0;
      ctx.save();ctx.translate(ox,oy);

      const g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'#efe4cb');g.addColorStop(1,'#e7d3ac');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

      if(state==='title'){
        ctx.fillStyle='#3d2b1f';ctx.font='800 34px system-ui';ctx.fillText('PAPER GATE',24,84);
        ctx.font='700 24px system-ui';ctx.fillText('ARBITER',24,118);
        ctx.font='500 16px system-ui';ctx.fillText(T('pressStart'),24,156);

        ctx.fillStyle='#2f241a';ctx.font='700 18px system-ui';ctx.fillText(`${T('rulesTitle')} (Lv.${level})`,30,44);

        ctx.font='600 14px system-ui';
        rules.forEach((r,i)=>{
          ctx.fillStyle='#523a2a';
          ctx.fillText(`• ${lang==='ko'?r.ko:r.en}`,34,68+i*20);
        });

        if(current){
          const boxY=160;
          ctx.fillStyle='#f2e4c6';ctx.fillRect(28,boxY,W-56,210);
          ctx.strokeStyle='#b99362';ctx.strokeRect(28,boxY,W-56,210);
          ctx.fillStyle='#3d2b1f';ctx.font='700 17px system-ui';ctx.fillText(`${T('applicant')} ${current.name}`,42,boxY+28);
          label(`${T('origin')}`,lang==='ko'?originKo[current.origin]:current.origin,42,boxY+62);
          label(`${T('pass')}`,lang==='ko'?passKo[current.pass]:current.pass,42,boxY+94);
          label(`${T('days')}`,`${current.days}`,42,boxY+126);
          label(`${T('cargo')}`,lang==='ko'?cargoKo[current.cargo]:current.cargo,42,boxY+158);

          ctx.fillStyle=current.vip?'#3b7a57':'#8f3b2f';
          ctx.font='700 14px system-ui';
          ctx.fillText(current.vip?'VIP':'STD',W-98,boxY+30);

          if(state==='gameover'){
            ctx.fillStyle='rgba(40,20,10,.68)';ctx.fillRect(28,boxY,W-56,210);
            ctx.fillStyle='#fff0dc';ctx.font='800 30px system-ui';ctx.fillText(T('gameOver'),48,boxY+114);
            ctx.font='700 18px system-ui';ctx.fillText(`Score ${score} / Best ${best}`,48,boxY+146);
          }
        }

        ctx.fillStyle='#6b513c';ctx.font='500 12px system-ui';ctx.fillText(bureauMemos[memoIndex],34,H-102, W-72);
        if(msg){
          ctx.fillStyle='#533623';ctx.font='700 16px system-ui';ctx.fillText(msg,32,H-80);
        }
      }

      ctx.restore();
    };

    let last=performance.now();
    const loop=(now)=>{
      const dt=(now-last)/1000;last=now;
      if(state==='play'){
        memoClock+=dt;
        if(memoClock>4.2){memoClock=0;memoIndex=(memoIndex+1)%bureauMemos.length;}
        timeLeft-=dt;
        if(timeLeft<=0){
          timeLeft=0;state='gameover';
          if(score>best) best=score;
          maxLevel=Math.max(maxLevel,level);
          localStorage.setItem(LS_KEY,JSON.stringify({best,maxLevel,lang}));
          sfx(130,.22,'sawtooth',.06);
        }
      }
      if(shake>0) shake--;
      updateUI();
      render();
      requestAnimationFrame(loop);
    };

    ui.startBtn.addEventListener('click',startGame);
    ui.approveBtn.addEventListener('click',()=>judge('approve'));
    ui.inspectBtn.addEventListener('click',()=>judge('inspect'));
    ui.denyBtn.addEventListener('click',()=>judge('deny'));
    ui.langBtn.addEventListener('click',()=>{lang=lang==='ko'?'en':'ko';localStorage.setItem(LS_KEY,JSON.stringify({best,maxLevel,lang}));updateUI();});

    window.addEventListener('keydown',(e)=>{
      if(e.key==='Enter'){startGame();}
      if(e.key==='a'||e.key==='A') judge('approve');
      if(e.key==='s'||e.key==='S') judge('inspect');
      if(e.key==='d'||e.key==='D') judge('deny');
    });

    // 터치 대응: 캔버스 하단 탭 시 빠른 액션
    canvas.addEventListener('pointerdown',(e)=>{
      if(state!=='play') return;
      const r=canvas.getBoundingClientRect();
      const x=e.clientX-r.left;
      if(x<r.width/3) judge('approve');
      else if(x<r.width*2/3) judge('inspect');
      else judge('deny');
    });

    updateUI();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
