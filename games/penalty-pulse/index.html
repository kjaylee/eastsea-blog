<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#040b18;color:#f5f7ff;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;touch-action:none}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#app{position:relative;width:100%;height:100%}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#hud{position:absolute;left:0;right:0;top:0;z-index:20;padding:calc(8px + env(safe-area-inset-top)) 10px 8px;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.row{display:flex;gap:6px;align-items:center}
.pill{background:rgba(8,16,35,.78);border:1px solid rgba(103,178,255,.33);border-radius:12px;padding:6px 9px;font-size:12px;font-weight:700;line-height:1.1;backdrop-filter:blur(6px)}
.pill.grow{flex:1}
#meterWrap{pointer-events:none;background:rgba(2,8,18,.9);border:1px solid rgba(120,200,255,.45);border-radius:12px;padding:6px 7px}
#meterBar{position:relative;height:10px;background:linear-gradient(90deg,#152745,#1d3f72);border-radius:999px;overflow:hidden}
#meterZone{position:absolute;top:0;height:100%;background:linear-gradient(90deg,rgba(98,255,165,.25),rgba(98,255,165,.48));border-left:1px solid rgba(150,255,186,.8);border-right:1px solid rgba(150,255,186,.8)}
#meterNeedle{position:absolute;top:-3px;width:3px;height:16px;background:#ffd96b;box-shadow:0 0 10px rgba(255,217,107,.9)}
#actions{position:absolute;left:0;right:0;bottom:0;z-index:22;display:flex;gap:8px;padding:8px 12px calc(12px + env(safe-area-inset-bottom));pointer-events:none}
.btn{pointer-events:auto;flex:1;border:0;border-radius:12px;padding:12px 10px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 10px 25px rgba(0,0,0,.35)}
.btn:active{transform:scale(.98)}
.btn.main{background:linear-gradient(135deg,#52f6ff,#4f7dff 56%,#885bff);color:#071225}
.btn.alt{background:linear-gradient(135deg,#f7d061,#ff9f58);color:#2b1600;max-width:150px}
.btn:disabled{opacity:.45;filter:saturate(.5);cursor:not-allowed;box-shadow:none}
.overlay{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:16px;background:radial-gradient(circle at 50% 20%,rgba(32,68,130,.48),rgba(3,8,18,.92))}
.panel{width:min(92vw,410px);border-radius:18px;padding:18px 16px;background:rgba(8,15,34,.95);border:1px solid rgba(122,185,255,.42);box-shadow:0 24px 50px rgba(0,0,0,.45)}
.panel h1{font-size:30px;line-height:1.05;letter-spacing:.2px}
.panel p{margin-top:10px;color:#bfcbef;font-size:13px;line-height:1.45}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.kpi div{background:rgba(255,255,255,.05);border-radius:10px;padding:8px 10px;font-size:12px}
.kpi b{display:block;font-size:17px;color:#7df2ff;margin-top:3px}
.upgrades{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.up{background:rgba(255,255,255,.04);border:1px solid rgba(148,201,255,.22);border-radius:11px;padding:8px;font-size:11px;line-height:1.35}
.up .nm{font-weight:800;font-size:12px;color:#8ee8ff}
.up button{margin-top:7px;width:100%;border:0;border-radius:8px;padding:8px 6px;font-size:12px;font-weight:800;background:linear-gradient(135deg,#5cf0ff,#5f84ff);color:#03112b;cursor:pointer}
.up button:disabled{opacity:.4;cursor:not-allowed}
.startBtn,.retryBtn{margin-top:12px;width:100%;border:0;border-radius:12px;padding:13px 10px;font-size:16px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#52f6ff,#4f7dff 56%,#8b5cff);color:#071225}
.subBtn{margin-top:8px;width:100%;border-radius:11px;padding:11px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.hidden{display:none!important}
#fxText{position:absolute;left:50%;top:26%;transform:translateX(-50%);z-index:24;font-size:22px;font-weight:900;letter-spacing:.6px;color:#fff;text-shadow:0 0 18px rgba(120,220,255,.75);pointer-events:none;opacity:0;transition:opacity .12s}
#leaderboard{position:absolute;left:-9999px;top:-9999px}
@media (max-width:420px){
  .panel h1{font-size:26px}
  .panel p{font-size:12px}
}
</style>

<body>
<div id="app">
  <canvas id="c"></canvas>

  <div id="hud" class="hidden">
    <div class="row">
      <div class="pill grow" id="vScore"></div>
      <div class="pill" id="vCombo"></div>
      <div class="pill" id="vBest"></div>

      <div id="meterBar">
        <div id="meterZone"></div>
        <div id="meterNeedle"></div>

  <div id="actions" class="hidden">
    <button id="focusBtn" class="btn alt"></button>
    <button id="shootBtn" class="btn main"></button>

  <div id="titleOverlay" class="overlay">
    <div class="panel">
      <h1 id="titleLabel"></h1>
      <p id="titleDesc"></p>
      <div class="kpi">
        <div><span id="kBestLabel"></span><b id="kBest"></b></div>
        <div><span id="kCoinsLabel"></span><b id="kCoins"></b></div>
      </div>
      <div class="upgrades">
        <div class="up">
          <div class="nm" id="upAssistNm"></div>
          <div id="upAssistDesc"></div>
          <button id="buyAssist"></button>
        </div>
        <div class="up">
          <div class="nm" id="upBonusNm"></div>
          <div id="upBonusDesc"></div>
          <button id="buyBonus"></button>
        </div>
      </div>
      <button id="startBtn" class="startBtn"></button>
    </div>
  </div>

  <div id="gameoverOverlay" class="overlay hidden">
    <div class="panel">
      <h1 id="overTitle"></h1>
      <p id="overDesc"></p>
      <div class="kpi">
        <div><span id="rScoreLabel"></span><b id="rScore"></b></div>
        <div><span id="rBestLabel"></span><b id="rBest"></b></div>
        <div><span id="rGoalsLabel"></span><b id="rGoals"></b></div>
        <div><span id="rCoinsLabel"></span><b id="rCoins"></b></div>
      </div>
      <button id="retryBtn" class="retryBtn"></button>
      <button id="backBtn" class="subBtn"></button>

  <div id="leaderboard" data-lb-slug="penalty-pulse"></div>
</div>

<script src="../tg-sdk-wrapper.js"></script>
<script src="../shared/sound-manager.js"></script>
<script>
(() => {
'use strict';

const T = GameI18n({
  gameTitle: { ko:'Penalty Pulse - 페널티 펄스', en:'Penalty Pulse' },
  gameDesc: { ko:'골대를 드래그로 조준하고, 펄스 미터가 초록 존에 들어올 때 슛하세요. 연속 골로 Focus를 채워 하이 스코어를 노리세요.', en:'Drag to aim in the goal and shoot when the pulse meter hits the green zone. Chain goals to charge Focus for high scores.' },
  start: { ko:'킥오프', en:'Kick Off' },
  retry: { ko:'다시 도전', en:'Retry' },
  backTitle: { ko:'타이틀로', en:'Back to Title' },
  score: { ko:'점수', en:'Score' },
  combo: { ko:'콤보', en:'Combo' },
  best: { ko:'최고', en:'Best' },
  timer: { ko:'남은 시간', en:'Time Left' },
  miss: { ko:'실패', en:'Miss' },
  level: { ko:'레벨', en:'Level' },
  shoot: { ko:'슛!', en:'Shoot!' },
  focusReady: { ko:'포커스', en:'Focus' },
  focusOn: { ko:'포커스 ON', en:'Focus ON' },
  perfect: { ko:'퍼펙트!', en:'Perfect!' },
  goal: { ko:'GOAL!', en:'GOAL!' },
  saved: { ko:'세이브!', en:'Saved!' },
  overTitle: { ko:'경기 종료', en:'Match Over' },
  overDesc: { ko:'골키퍼에게 읽혔습니다. 업그레이드 후 다시 도전하세요.', en:'The keeper read your rhythm. Upgrade and strike again.' },
  totalCoins: { ko:'코인', en:'Coins' },
  totalGoals: { ko:'누적 골', en:'Total Goals' },
  runScore: { ko:'이번 점수', en:'Run Score' },
  runGoals: { ko:'이번 골', en:'Run Goals' },
  gainCoins: { ko:'획득 코인', en:'Coins Earned' },
  assistNm: { ko:'Aim Assist', en:'Aim Assist' },
  assistDesc: { ko:'타이밍 존 +8%', en:'Timing zone +8%' },
  bonusNm: { ko:'Bonus Boot', en:'Bonus Boot' },
  bonusDesc: { ko:'기본 점수 +20', en:'Base score +20' },
  buy: { ko:'구매', en:'Buy' },
  max: { ko:'최대', en:'MAX' },
  cost: { ko:'비용', en:'Cost' }
});

const GAME_ID = 'penalty-pulse';
const SAVE_KEY = 'penalty-pulse-save-v1';
const STATE = { title:'title', play:'play', gameover:'gameover', retry:'retry' };

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const actions = document.getElementById('actions');
const titleOverlay = document.getElementById('titleOverlay');
const gameoverOverlay = document.getElementById('gameoverOverlay');
const fxText = document.getElementById('fxText');

const vScore = document.getElementById('vScore');
const vCombo = document.getElementById('vCombo');
const vBest = document.getElementById('vBest');
const vTimer = document.getElementById('vTimer');
const vMiss = document.getElementById('vMiss');
const vLevel = document.getElementById('vLevel');

const focusBtn = document.getElementById('focusBtn');
const shootBtn = document.getElementById('shootBtn');
const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const backBtn = document.getElementById('backBtn');
const buyAssist = document.getElementById('buyAssist');
const buyBonus = document.getElementById('buyBonus');

const meterZone = document.getElementById('meterZone');
const meterNeedle = document.getElementById('meterNeedle');

const sfx = (typeof SoundManager !== 'undefined') ? new SoundManager() : null;
if (sfx && sfx.loadSFX) {
  sfx.loadSFX('kick', '../shared/sfx/click.mp3');
  sfx.loadSFX('goal', '../shared/sfx/success.mp3');
  sfx.loadSFX('save', '../shared/sfx/error.mp3');
  sfx.loadSFX('over', '../shared/sfx/game-over.mp3');
}
function play(name){ try{ sfx && sfx.playSFX && sfx.playSFX(name); }catch(e){} }
function haptic(kind='light'){
  try {
    const h = window.Telegram?.WebApp?.HapticFeedback;
    if (h && h.impactOccurred) h.impactOccurred(kind);
  } catch(e){}
}

const game = {
  mode: STATE.title,
  dpr: 1,
  W: 0,
  H: 0,
  fieldTop: 0,
  fieldBottom: 0,
  goalLeft: 0,
  goalRight: 0,
  goalTop: 0,
  goalBottom: 0,
  score: 0,
  best: 0,
  combo: 0,
  miss: 0,
  level: 1,
  goals: 0,
  totalGoals: 0,
  coins: 0,
  runCoins: 0,
  timeLeft: 45,
  focus: 0,
  focusActive: false,
  focusTimer: 0,
  upgrades: { assist:0, bonus:0 },
  aim: { x:0.5, y:0.48 },
  pulsePhase: 0,
  keeperPhase: 0,
  keeperX: 0.5,
  shot: null,
  shotCooldown: 0,
  flash: 0,
  msgTimer: 0,
  lastTs: 0,
  particles: [],
  submittedScore: -1,
  pointerDown: false
};

function storageGet(){
  let tgData = null;
  try { if (window.TG && window.TG.load) tgData = window.TG.load(SAVE_KEY, null); } catch(_){}
  if (tgData) return tgData;
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(_) { return null; }
}

function storageSet(data){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(_){}
  try { if (window.TG && window.TG.save) window.TG.save(SAVE_KEY, data); } catch(_){}
}

function saveProgress(){
  storageSet({
    best: game.best,
    coins: game.coins,
    totalGoals: game.totalGoals,
    upgrades: game.upgrades
  });
}

function loadProgress(){
  const d = storageGet();
  if (!d) return;
  game.best = Math.max(0, Number(d.best || 0));
  game.coins = Math.max(0, Number(d.coins || 0));
  game.totalGoals = Math.max(0, Number(d.totalGoals || 0));
  game.upgrades.assist = Math.max(0, Math.min(5, Number(d.upgrades?.assist || 0)));
  game.upgrades.bonus = Math.max(0, Math.min(5, Number(d.upgrades?.bonus || 0)));
}

function setStaticText(){
  document.getElementById('titleLabel').textContent = T('gameTitle');
  document.getElementById('titleDesc').textContent = T('gameDesc');
  document.getElementById('kBestLabel').textContent = T('best');
  document.getElementById('kCoinsLabel').textContent = T('totalCoins');
  document.getElementById('upAssistNm').textContent = T('assistNm');
  document.getElementById('upAssistDesc').textContent = T('assistDesc');
  document.getElementById('upBonusNm').textContent = T('bonusNm');
  document.getElementById('upBonusDesc').textContent = T('bonusDesc');
  startBtn.textContent = T('start');
  focusBtn.textContent = T('focusReady');
  shootBtn.textContent = T('shoot');
  document.getElementById('overTitle').textContent = T('overTitle');
  document.getElementById('overDesc').textContent = T('overDesc');
  document.getElementById('rScoreLabel').textContent = T('runScore');
  document.getElementById('rBestLabel').textContent = T('best');
  document.getElementById('rGoalsLabel').textContent = T('runGoals');
  document.getElementById('rCoinsLabel').textContent = T('gainCoins');
  retryBtn.textContent = T('retry');
  backBtn.textContent = T('backTitle');
}

function triangle01(v){
  let x = v % 2;
  if (x < 0) x += 2;
  return x <= 1 ? x : 2 - x;
}

function meterWindow(){
  const base = 0.19 - (game.level - 1) * 0.009;
  const assist = game.upgrades.assist * 0.016;
  return Math.max(0.06, Math.min(0.28, base + assist));
}

function keeperRadius(){
  return Math.max(0.065, 0.122 - (game.level - 1) * 0.004);
}

function bonusBase(){
  return game.upgrades.bonus * 20;
}

function upgradeCost(kind){
  const lv = game.upgrades[kind];
  return 20 + lv * 18;
}

function showFx(text, color){
  fxText.textContent = text;
  fxText.style.color = color;
  fxText.style.opacity = '1';
  game.msgTimer = 0.55;
}

function refreshPanels(){
  document.getElementById('kBest').textContent = game.best.toLocaleString();
  document.getElementById('kCoins').textContent = game.coins.toLocaleString();

  vScore.textContent = `${T('score')} ${game.score.toLocaleString()}`;
  vCombo.textContent = `${T('combo')} x${(1 + game.combo * 0.15).toFixed(2)}`;
  vBest.textContent = `${T('best')} ${game.best.toLocaleString()}`;
  vTimer.textContent = `${T('timer')} ${Math.max(0, Math.ceil(game.timeLeft))}s`;
  vMiss.textContent = `${T('miss')} ${game.miss}/3`;
  vLevel.textContent = `${T('level')} ${game.level}`;

  const mW = meterWindow();
  const start = (0.5 - mW) * 100;
  const width = mW * 2 * 100;
  meterZone.style.left = `${start.toFixed(2)}%`;
  meterZone.style.width = `${width.toFixed(2)}%`;

  const ap = game.upgrades.assist;
  const bp = game.upgrades.bonus;
  const ac = upgradeCost('assist');
  const bc = upgradeCost('bonus');
  buyAssist.textContent = ap >= 5 ? T('max') : `${T('buy')} · ${ac}`;
  buyBonus.textContent = bp >= 5 ? T('max') : `${T('buy')} · ${bc}`;
  buyAssist.disabled = ap >= 5 || game.coins < ac;
  buyBonus.disabled = bp >= 5 || game.coins < bc;

  focusBtn.textContent = game.focusActive ? T('focusOn') : T('focusReady');
  focusBtn.disabled = game.mode !== STATE.play || game.focus < 100 || game.focusActive;
  shootBtn.disabled = game.mode !== STATE.play || !!game.shot || game.shotCooldown > 0;
}

function submitScoreIfNeeded(){
  if (game.score <= 0 || game.submittedScore === game.score) return;
  game.submittedScore = game.score;
  const user = window.Telegram?.WebApp?.initDataUnsafe?.user;
  const name = user?.username || user?.first_name || `guest-${Math.floor(Math.random()*1000)}`;
  try {
    if (window.Leaderboard && window.Leaderboard.submit) {
      window.Leaderboard.submit(GAME_ID, name, game.score, {
        level: game.level,
        goals: game.goals,
        combo: game.combo
      });
    }
  } catch(_){}
}

function startRun(){
  game.mode = STATE.play;
  game.score = 0;
  game.combo = 0;
  game.miss = 0;
  game.level = 1;
  game.goals = 0;
  game.runCoins = 0;
  game.timeLeft = 45;
  game.focus = 0;
  game.focusActive = false;
  game.focusTimer = 0;
  game.pulsePhase = 0;
  game.keeperPhase = 0;
  game.keeperX = 0.5;
  game.shot = null;
  game.shotCooldown = 0;
  game.flash = 0;
  game.particles.length = 0;
  titleOverlay.classList.add('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.remove('hidden');
  actions.classList.remove('hidden');
  refreshPanels();
}

function backToTitle(){
  game.mode = STATE.title;
  titleOverlay.classList.remove('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.add('hidden');
  actions.classList.add('hidden');
  refreshPanels();
}

function toGameOver(){
  if (game.mode !== STATE.play) return;
  game.mode = STATE.gameover;
  hud.classList.add('hidden');
  actions.classList.add('hidden');
  gameoverOverlay.classList.remove('hidden');
  document.getElementById('rScore').textContent = game.score.toLocaleString();
  document.getElementById('rBest').textContent = game.best.toLocaleString();
  document.getElementById('rGoals').textContent = game.goals.toLocaleString();
  document.getElementById('rCoins').textContent = game.runCoins.toLocaleString();
  play('over');
  haptic('heavy');
  submitScoreIfNeeded();
}

function retryRun(){
  game.mode = STATE.retry;
  setTimeout(() => {
    startRun();
  }, 60);
}

function onBuy(kind){
  if (game.mode !== STATE.title) return;
  const lv = game.upgrades[kind];
  if (lv >= 5) return;
  const c = upgradeCost(kind);
  if (game.coins < c) return;
  game.coins -= c;
  game.upgrades[kind] += 1;
  saveProgress();
  refreshPanels();
  play('kick');
  haptic('light');
}

function activateFocus(){
  if (game.mode !== STATE.play || game.focus < 100 || game.focusActive) return;
  game.focusActive = true;
  game.focus = 0;
  game.focusTimer = 4.2;
  refreshPanels();
  haptic('medium');
}

function pointerToAim(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width;
  const y = (clientY - rect.top) / rect.height;
  const gx = Math.min(0.9, Math.max(0.1, x));
  const gy = Math.min(0.72, Math.max(0.2, (y - 0.08) / 0.58));
  game.aim.x = gx;
  game.aim.y = gy;
}

function triggerShot(){
  if (game.mode !== STATE.play) return;
  if (game.shot || game.shotCooldown > 0) return;

  const meter = triangle01(game.pulsePhase);
  const err = Math.abs(meter - 0.5);
  const windowSize = meterWindow();
  const timing = Math.max(0, 1 - err / Math.max(0.0001, windowSize));
  const inWindow = err <= windowSize;

  const keeperDx = Math.abs(game.aim.x - game.keeperX);
  const keeperCover = keeperDx < keeperRadius() && game.aim.y < 0.92;

  const perfect = inWindow && timing > 0.82;
  const goal = inWindow && !keeperCover;

  let points = 0;
  if (goal) {
    const base = 100 + bonusBase() + Math.round(120 * timing);
    const mult = 1 + game.combo * 0.15;
    points = Math.round(base * mult);
  }

  game.shot = {
    fromX: 0.5,
    fromY: 0.92,
    toX: game.aim.x,
    toY: game.aim.y,
    t: 0,
    goal,
    perfect,
    points
  };
  game.shotCooldown = 0.22;
  play('kick');
  haptic('light');
}

function resolveShot(){
  if (!game.shot) return;
  const s = game.shot;

  if (s.goal) {
    game.score += s.points;
    game.combo += 1;
    game.goals += 1;
    game.totalGoals += 1;

    const gain = 8 + Math.floor((s.points / 100) * 0.3);
    game.coins += gain;
    game.runCoins += gain;

    game.focus = Math.min(100, game.focus + 24 + Math.min(18, game.combo * 2));
    if (s.perfect) {
      showFx(T('perfect'), '#91ffe2');
      haptic('medium');
    } else {
      showFx(T('goal'), '#80f2ff');
    }
    for (let i = 0; i < 22; i++) {
      game.particles.push({
        x: s.toX,
        y: s.toY,
        vx: (Math.random() - 0.5) * 0.9,
        vy: -Math.random() * 0.9,
        life: 0.8 + Math.random() * 0.4,
        c: i % 2 === 0 ? '#7bf6ff' : '#7effb3'
      });
    }
    if (game.goals % 3 === 0) game.level += 1;
    play('goal');
  } else {
    game.miss += 1;
    game.combo = 0;
    game.focus = Math.max(0, game.focus - 20);
    game.flash = 0.2;
    showFx(T('saved'), '#ff9e9e');
    play('save');
    haptic('heavy');
  }

  if (game.score > game.best) game.best = game.score;
  saveProgress();
  game.shot = null;

  if (game.miss >= 3) toGameOver();
}

function resize(){
  game.dpr = window.devicePixelRatio || 1;
  game.W = window.innerWidth;
  game.H = window.innerHeight;
  canvas.width = game.W * game.dpr;
  canvas.height = game.H * game.dpr;
  ctx.setTransform(game.dpr,0,0,game.dpr,0,0);

  game.fieldTop = game.H * 0.12;
  game.fieldBottom = game.H * 0.78;
  game.goalLeft = game.W * 0.17;
  game.goalRight = game.W * 0.83;
  game.goalTop = game.H * 0.16;
  game.goalBottom = game.H * 0.42;
}

function update(dt){
  if (game.mode !== STATE.play) {
    updateParticles(dt);
    updateFx(dt);
    return;
  }

  game.timeLeft -= dt;
  if (game.timeLeft <= 0) {
    game.timeLeft = 0;
    toGameOver();
  }

  const focusMeter = game.focusActive ? 0.5 : 1;
  const focusKeeper = game.focusActive ? 0.55 : 1;

  game.pulsePhase += dt * (1.65 + game.level * 0.08) * focusMeter;
  game.keeperPhase += dt * (1.4 + game.level * 0.1) * focusKeeper;
  game.keeperX = 0.5 + Math.sin(game.keeperPhase) * 0.24;

  if (game.focusActive) {
    game.focusTimer -= dt;
    if (game.focusTimer <= 0) {
      game.focusTimer = 0;
      game.focusActive = false;
    }
  }

  if (game.shotCooldown > 0) game.shotCooldown -= dt;

  if (game.shot) {
    game.shot.t += dt * 3.4;
    if (game.shot.t >= 1) resolveShot();
  }

  if (game.flash > 0) game.flash -= dt;

  updateParticles(dt);
  updateFx(dt);
  refreshPanels();
}

function updateParticles(dt){
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 1.3 * dt;
    p.life -= dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
}

function updateFx(dt){
  if (game.msgTimer > 0) {
    game.msgTimer -= dt;
    if (game.msgTimer <= 0) fxText.style.opacity = '0';
  }
}

function draw(){
  // Sky
  const g = ctx.createLinearGradient(0, 0, 0, game.H);
  g.addColorStop(0, '#0a1731');
  g.addColorStop(0.55, '#0f2d57');
  g.addColorStop(1, '#1e5f46');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, game.W, game.H);

  // field
  ctx.fillStyle = '#2e8e57';
  ctx.fillRect(0, game.fieldBottom, game.W, game.H - game.fieldBottom);

  // pitch lines
  ctx.strokeStyle = 'rgba(255,255,255,.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(game.W * 0.1, game.fieldBottom);
  ctx.lineTo(game.W * 0.9, game.fieldBottom);
  ctx.stroke();

  // goal frame
  const gw = game.goalRight - game.goalLeft;
  const gh = game.goalBottom - game.goalTop;
  ctx.fillStyle = 'rgba(255,255,255,.09)';
  ctx.fillRect(game.goalLeft, game.goalTop, gw, gh);
  ctx.strokeStyle = 'rgba(235,247,255,.82)';
  ctx.lineWidth = 4;
  ctx.strokeRect(game.goalLeft, game.goalTop, gw, gh);

  // goal net
  ctx.strokeStyle = 'rgba(190,220,255,.22)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 6; i++) {
    const x = game.goalLeft + (gw / 6) * i;
    ctx.beginPath();
    ctx.moveTo(x, game.goalTop);
    ctx.lineTo(x, game.goalBottom);
    ctx.stroke();
  }
  for (let i = 1; i < 4; i++) {
    const y = game.goalTop + (gh / 4) * i;
    ctx.beginPath();
    ctx.moveTo(game.goalLeft, y);
    ctx.lineTo(game.goalRight, y);
    ctx.stroke();
  }

  // keeper
  const kx = game.goalLeft + gw * game.keeperX;
  const ky = game.goalTop + gh * 0.62;
  const kw = gw * 0.11;
  const kh = gh * 0.36;
  ctx.fillStyle = game.focusActive ? '#ffe08a' : '#ffce66';
  ctx.fillRect(kx - kw*0.5, ky - kh*0.5, kw, kh);
  ctx.fillStyle = '#163552';
  ctx.fillRect(kx - kw*0.12, ky - kh*0.64, kw*0.24, kh*0.22);
  ctx.strokeStyle = 'rgba(18,35,58,.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(kx, ky - kh*0.55, kw*0.2, 0, Math.PI*2);
  ctx.stroke();

  // aim reticle
  const ax = game.goalLeft + gw * game.aim.x;
  const ay = game.goalTop + gh * game.aim.y;
  ctx.strokeStyle = 'rgba(133,245,255,.95)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(ax, ay, 14, 0, Math.PI * 2);
  ctx.moveTo(ax - 19, ay);
  ctx.lineTo(ax + 19, ay);
  ctx.moveTo(ax, ay - 19);
  ctx.lineTo(ax, ay + 19);
  ctx.stroke();

  // shot ball
  if (game.shot) {
    const t = Math.min(1, game.shot.t);
    const ease = 1 - Math.pow(1 - t, 2);
    const sx = game.W * game.shot.fromX + (ax - game.W * game.shot.fromX) * ease;
    const sy = game.H * game.shot.fromY + (ay - game.H * game.shot.fromY) * ease;
    const r = 12 - t * 6;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#27324a';
    ctx.beginPath();
    ctx.arc(sx - 2, sy - 1, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(game.W * 0.5, game.H * 0.92, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#27324a';
    ctx.beginPath();
    ctx.arc(game.W * 0.5 - 2, game.H * 0.92 - 1, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // particles
  for (const p of game.particles) {
    ctx.globalAlpha = Math.max(0, p.life * 1.2);
    ctx.fillStyle = p.c;
    ctx.beginPath();
    ctx.arc(game.goalLeft + (game.goalRight - game.goalLeft) * p.x, game.goalTop + (game.goalBottom - game.goalTop) * p.y, 2 + p.life * 2.8, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // focus gauge
  const gx = 12;
  const gy = game.H * 0.82;
  const gw2 = game.W - 24;
  ctx.fillStyle = 'rgba(5,10,24,.85)';
  ctx.fillRect(gx, gy, gw2, 14);
  const fg = Math.max(0, Math.min(1, game.focus / 100));
  const gg = ctx.createLinearGradient(gx, gy, gx + gw2, gy);
  gg.addColorStop(0, '#51d8ff');
  gg.addColorStop(1, '#83ffa9');
  ctx.fillStyle = gg;
  ctx.fillRect(gx, gy, gw2 * fg, 14);
  ctx.strokeStyle = 'rgba(140,210,255,.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(gx, gy, gw2, 14);
  ctx.fillStyle = '#d7ebff';
  ctx.font = '11px system-ui,sans-serif';
  ctx.fillText(`${T('focusReady')} ${Math.round(game.focus)}%`, gx + 8, gy - 4);

  if (game.flash > 0) {
    ctx.fillStyle = `rgba(255,90,90,${Math.min(0.28, game.flash * 1.2)})`;
    ctx.fillRect(0, 0, game.W, game.H);
  }

  // meter needle
  const meter = triangle01(game.pulsePhase);
  meterNeedle.style.left = `${(meter * 100).toFixed(2)}%`;
}

function frame(ts){
  if (!game.lastTs) game.lastTs = ts;
  const dt = Math.min(0.033, (ts - game.lastTs) / 1000);
  game.lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}

function onPointerDown(e){
  game.pointerDown = true;
  pointerToAim(e.clientX, e.clientY);
}
function onPointerMove(e){
  if (!game.pointerDown) return;
  pointerToAim(e.clientX, e.clientY);
}
function onPointerUp(){
  game.pointerDown = false;
}

startBtn.addEventListener('click', startRun);
retryBtn.addEventListener('click', retryRun);
backBtn.addEventListener('click', backToTitle);
shootBtn.addEventListener('click', triggerShot);
focusBtn.addEventListener('click', activateFocus);
buyAssist.addEventListener('click', () => onBuy('assist'));
buyBonus.addEventListener('click', () => onBuy('bonus'));

canvas.addEventListener('pointerdown', onPointerDown, { passive:true });
canvas.addEventListener('pointermove', onPointerMove, { passive:true });
window.addEventListener('pointerup', onPointerUp, { passive:true });
window.addEventListener('resize', resize);

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && game.mode === STATE.play) {
    if (e.cancelable) e.preventDefault();
    triggerShot();
  }
  if (e.code === 'Enter' && game.mode === STATE.title) {
    if (e.cancelable) e.preventDefault();
    startRun();
  }
});

loadProgress();
setStaticText();
resize();
refreshPanels();
requestAnimationFrame(frame);
})();
</script>

<script src="/games/cross-promo.js"></script>
<script src="../shared/leaderboard.js"></script>
