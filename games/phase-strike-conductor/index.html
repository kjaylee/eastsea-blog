<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="icon" href="data:," />
  <title>Phase Strike Conductor</title>
  <style>
    :root{
      --bg:#0a0a1a;--panel:#13132b;--neon:#44e7ff;--hot:#ff4db8;--good:#7dff8b;--warn:#ffd166;
      --text:#eef3ff;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;background:radial-gradient(circle at 50% -20%,#1f2150 0%,var(--bg) 55%);color:var(--text);min-height:100dvh;display:flex;justify-content:center}
    .app{width:min(940px,100%);padding:12px 12px 20px;display:grid;gap:10px}
    .top{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .card{background:linear-gradient(180deg,#17193b,#111228);border:1px solid #2f3470;border-radius:12px;padding:8px 10px;box-shadow:0 0 18px #0008}
    .label{font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.08em}
    .value{font-size:20px;font-weight:800}
    #gameWrap{position:relative;background:#090916;border:1px solid #2b2f6a;border-radius:14px;overflow:hidden;box-shadow:inset 0 0 28px #24307a55,0 0 24px #0009}
    canvas{display:block;width:100%;height:min(56vh,520px)}
    .phaseBadge{position:absolute;top:10px;right:10px;padding:8px 12px;border-radius:999px;font-weight:700;border:1px solid #36408c;background:#101435}
    .phaseInner{color:var(--neon);text-shadow:0 0 10px var(--neon)}
    .phaseOuter{color:var(--hot);text-shadow:0 0 10px var(--hot)}
    .controls{display:grid;gap:10px}
    .lanes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    button{background:#101538;color:var(--text);border:1px solid #30409a;border-radius:12px;padding:12px 10px;font-weight:700;font-size:14px}
    button:active{transform:translateY(1px) scale(.99)}
    .lane-btn{box-shadow:0 0 10px #1f3e9e66 inset}
    .lane-btn[data-lane="0"]{border-color:#44e7ff}.lane-btn[data-lane="1"]{border-color:#7dff8b}.lane-btn[data-lane="2"]{border-color:#ffd166}.lane-btn[data-lane="3"]{border-color:#ff4db8}
    .row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}
    .hint{font-size:12px;opacity:.82;line-height:1.4}
    .glow{box-shadow:0 0 0 2px #ffffff22,0 0 16px #5ec8ff66}
    @media (max-width:700px){
      .top{grid-template-columns:repeat(3,1fr)}
      .card .value{font-size:17px}
      .row{grid-template-columns:1fr 1fr}
      .hint{grid-column:1/-1}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="card"><div class="label">Score</div><div id="score" class="value">0</div></div>
      <div class="card"><div class="label">Combo</div><div id="combo" class="value">0</div></div>
      <div class="card"><div class="label">Accuracy</div><div id="acc" class="value">100%</div></div>
      <div class="card"><div class="label">Best</div><div id="best" class="value">0</div></div>
      <div class="card"><div class="label">HP</div><div id="hp" class="value">100</div></div>
    </div>

    <div id="gameWrap">
      <canvas id="game"></canvas>
      <div id="phaseBadge" class="phaseBadge phaseInner">PHASE: INNER</div>
    </div>

    <div class="controls">
      <div class="lanes">
        <button class="lane-btn" data-lane="0">A / ◀</button>
        <button class="lane-btn" data-lane="1">S / ▼</button>
        <button class="lane-btn" data-lane="2">D / ▲</button>
        <button class="lane-btn" data-lane="3">F / ▶</button>
      </div>
      <div class="row">
        <button id="phaseBtn">Space: Toggle Phase</button>
        <button id="startBtn">Start</button>
        <button id="restartBtn">Restart</button>
        <div class="hint card">Hit the right lane <b>and</b> matching phase color.<br>Inner = Cyan, Outer = Magenta.</div>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('gameWrap');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const accEl = document.getElementById('acc');
  const bestEl = document.getElementById('best');
  const hpEl = document.getElementById('hp');
  const phaseBadge = document.getElementById('phaseBadge');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const phaseBtn = document.getElementById('phaseBtn');

  const STORE_KEY = 'phase_strike_conductor_best';
  let best = Number(localStorage.getItem(STORE_KEY) || 0);
  bestEl.textContent = best;

  let audioCtx = null;
  const sfx = (f=440, t=0.07, type='sine', v=0.03) => {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = f;
    g.gain.value = v;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + t);
    o.stop(audioCtx.currentTime + t);
  };

  const state = {
    running:false,
    phase:0,
    score:0,
    combo:0,
    hp:100,
    hits:0,
    attempts:0,
    bpm:112,
    notes:[],
    lastTs:0,
    spawnAt:0,
    beatLeadMs:1700,
    windowGood:140,
    windowPerfect:60,
    gameOver:false,
    pulse:0,
  };

  const lanes = 4;
  const laneColors = ['#44e7ff','#7dff8b','#ffd166','#ff4db8'];

  function resize(){
    const r = wrap.getBoundingClientRect();
    const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(r.width * ratio);
    canvas.height = Math.floor(Math.min(window.innerHeight * 0.56, 520) * ratio);
    canvas.style.height = Math.floor(Math.min(window.innerHeight * 0.56, 520)) + 'px';
    ctx.setTransform(ratio,0,0,ratio,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function updateHUD(){
    scoreEl.textContent = Math.floor(state.score);
    comboEl.textContent = state.combo;
    hpEl.textContent = Math.max(0, Math.floor(state.hp));
    const acc = state.attempts ? Math.round((state.hits/state.attempts)*100) : 100;
    accEl.textContent = acc + '%';
    phaseBadge.textContent = `PHASE: ${state.phase===0?'INNER':'OUTER'}`;
    phaseBadge.className = 'phaseBadge ' + (state.phase===0?'phaseInner':'phaseOuter');
  }

  function resetGame(){
    state.running = false;
    state.phase = 0;
    state.score = 0;
    state.combo = 0;
    state.hp = 100;
    state.hits = 0;
    state.attempts = 0;
    state.bpm = 112;
    state.notes = [];
    state.lastTs = 0;
    state.spawnAt = performance.now() + 300;
    state.gameOver = false;
    state.pulse = 0;
    updateHUD();
    draw();
  }

  function spawnNote(now){
    const lane = Math.floor(Math.random()*lanes);
    const phase = Math.random() < 0.5 ? 0 : 1;
    state.notes.push({ lane, phase, hitAt: now + state.beatLeadMs, judged:false, y:0 });
  }

  function judgeLane(inputLane){
    if (!state.running || state.gameOver) return;
    state.attempts++;
    let chosen = null;
    let bestDiff = 1e9;
    const now = performance.now();
    for (const note of state.notes){
      if (note.judged || note.lane !== inputLane || note.phase !== state.phase) continue;
      const d = Math.abs(note.hitAt - now);
      if (d < bestDiff){ bestDiff = d; chosen = note; }
    }

    if (chosen && bestDiff <= state.windowGood){
      chosen.judged = true;
      state.hits++;
      state.combo++;
      state.pulse = 1;
      if (bestDiff <= state.windowPerfect){
        state.score += 180 + state.combo * 3;
        sfx(910,0.07,'triangle',0.04);
      } else {
        state.score += 100 + state.combo * 2;
        sfx(700,0.06,'sine',0.03);
      }
      if (state.combo % 12 === 0) state.hp = Math.min(100, state.hp + 4);
    } else {
      state.combo = 0;
      state.hp -= 7;
      sfx(180,0.1,'sawtooth',0.04);
    }
    updateHUD();
  }

  function togglePhase(){
    if (!state.running || state.gameOver) return;
    state.phase = state.phase ? 0 : 1;
    sfx(state.phase ? 330 : 530, 0.05, 'square', 0.025);
    updateHUD();
  }

  function update(ts){
    if (!state.running) return;
    if (!state.lastTs) state.lastTs = ts;
    const dt = Math.min(34, ts - state.lastTs);
    state.lastTs = ts;

    if (ts >= state.spawnAt){
      const beatMs = 60000 / state.bpm;
      spawnNote(ts);
      state.spawnAt += beatMs;
      state.bpm = Math.min(168, 112 + Math.floor(state.score / 2200));
      if (!state.gameOver) sfx(220 + (state.phase?40:0),0.03,'sine',0.01);
    }

    for (const note of state.notes){
      const p = 1 - (note.hitAt - ts) / state.beatLeadMs;
      note.y = p;
      if (!note.judged && ts - note.hitAt > state.windowGood){
        note.judged = true;
        state.attempts++;
        state.combo = 0;
        state.hp -= 6;
        sfx(140,0.08,'sawtooth',0.03);
      }
    }

    state.notes = state.notes.filter(n => ts - n.hitAt < 700);

    if (state.hp <= 0 && !state.gameOver){
      state.hp = 0;
      state.gameOver = true;
      state.running = false;
      if (state.score > best){
        best = Math.floor(state.score);
        localStorage.setItem(STORE_KEY, String(best));
        bestEl.textContent = best;
      }
      sfx(90,0.3,'sawtooth',0.06);
      startBtn.textContent = 'Start';
    }

    state.pulse = Math.max(0, state.pulse - dt * 0.0028);
    updateHUD();
    draw();
    requestAnimationFrame(update);
  }

  function draw(){
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    ctx.clearRect(0,0,w,h);

    const laneW = w/lanes;
    const hitY = h - 86;

    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0,0,w,h);

    for (let i=0;i<lanes;i++){
      const x = i*laneW;
      ctx.fillStyle = i%2 ? '#111430' : '#0d1027';
      ctx.fillRect(x,0,laneW-1,h);
      ctx.strokeStyle = '#273174';
      ctx.strokeRect(x+0.5,0.5,laneW-1,h-1);

      ctx.fillStyle = laneColors[i] + '55';
      ctx.fillRect(x+6, hitY, laneW-12, 8);
      ctx.shadowBlur = 16;
      ctx.shadowColor = laneColors[i];
      ctx.fillRect(x+6, hitY, laneW-12, 2);
      ctx.shadowBlur = 0;
    }

    for (const note of state.notes){
      const x = note.lane*laneW + laneW/2;
      const y = note.y * (hitY-18);
      const col = note.phase===0 ? '#44e7ff' : '#ff4db8';
      const r = 12;
      if (!note.judged){
        ctx.beginPath();
        ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle = col;
        ctx.shadowBlur = 18;
        ctx.shadowColor = col;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#fff8';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    if (state.pulse > 0){
      const alpha = state.pulse * 0.3;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillRect(0,0,w,h);
    }

    if (!state.running && state.score===0){
      drawCenter('TAP START', 'Match lane + phase to chain combos');
    } else if (state.gameOver){
      drawCenter('SYSTEM OVERLOAD', `Final Score ${Math.floor(state.score)} • Tap Restart`);
    }

    function drawCenter(title,sub){
      ctx.fillStyle = '#0008';
      ctx.fillRect(w*0.16,h*0.28,w*0.68,h*0.28);
      ctx.strokeStyle = '#4250a8';
      ctx.strokeRect(w*0.16,h*0.28,w*0.68,h*0.28);
      ctx.textAlign='center';
      ctx.fillStyle='#eef3ff';
      ctx.font='700 24px Inter, sans-serif';
      ctx.fillText(title,w/2,h*0.40);
      ctx.font='500 14px Inter, sans-serif';
      ctx.fillStyle='#b6c5ff';
      ctx.fillText(sub,w/2,h*0.48);
    }
  }

  document.querySelectorAll('.lane-btn').forEach(btn => {
    const lane = Number(btn.dataset.lane);
    const fn = () => judgeLane(lane);
    btn.addEventListener('click', fn);
    btn.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, {passive:false});
  });

  phaseBtn.addEventListener('click', togglePhase);
  phaseBtn.addEventListener('touchstart', e => { e.preventDefault(); togglePhase(); }, {passive:false});

  function ensureAudio(){
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  startBtn.addEventListener('click', () => {
    ensureAudio();
    if (state.gameOver) resetGame();
    if (!state.running){
      state.running = true;
      state.lastTs = 0;
      startBtn.textContent = 'Running';
      requestAnimationFrame(update);
    }
  });

  restartBtn.addEventListener('click', () => {
    ensureAudio();
    resetGame();
    state.running = true;
    startBtn.textContent = 'Running';
    requestAnimationFrame(update);
  });

  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (['a','arrowleft'].includes(k)) judgeLane(0);
    else if (['s','arrowdown'].includes(k)) judgeLane(1);
    else if (['d','arrowup'].includes(k)) judgeLane(2);
    else if (['f','arrowright'].includes(k)) judgeLane(3);
    else if (k === ' '){ e.preventDefault(); togglePhase(); }
    else if (k === 'enter' && !state.running){ startBtn.click(); }
  });

  resetGame();
})();
</script>
</body>
</html>
