  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #10152f;
      --line: #253267;
      --cyan: #36eeff;
      --pink: #ff5adb;
      --text: #eef2ff;
      --ok: #68ff9f;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: radial-gradient(circle at 50% -30%, #182457, #0a0a1a 62%);
      color: var(--text);
      font-family: Inter, Pretendard, system-ui, -apple-system, Segoe UI, sans-serif;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: min(920px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(23, 30, 66, .9), rgba(12, 14, 30, .95));
      box-shadow: 0 0 24px rgba(54, 238, 255, .16), inset 0 0 16px rgba(255, 90, 219, .09);
      padding: 12px;
    }
    h1 {
      margin: 4px 0 10px;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(54, 238, 255, .55);
      font-size: clamp(1.2rem, 3.3vw, 1.72rem);
    }
    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .chip {
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(13, 19, 43, .85);
      padding: 8px;
      font-size: .9rem;
    }
    .swatches {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .swatch {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      background: rgba(13, 19, 40, .75);
    }
    .color {
      height: 120px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 0 12px rgba(255,255,255,.15);
    }
    .label { margin: 6px 0 0; font-size: .88rem; }

    .mixers { margin-top: 10px; display: grid; gap: 10px; }
    .row {
      display: grid;
      grid-template-columns: 70px 1fr 56px 56px;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px;
      background: rgba(13, 19, 43, .7);
    }
    .row strong { text-align: center; }
    input[type="range"] { width: 100%; }
    .val {
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: center;
      font-weight: 700;
      background: #0d1330;
      padding: 8px 0;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #17204a;
      color: var(--text);
      padding: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }
    button:active { transform: scale(.99); }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .mixBtn { background: #193f4f; color: #bcf9ff; }
    .newBtn { background: #3f1f43; color: #ffd7f4; }
    .msg {
      margin: 8px 0 2px;
      min-height: 1.4em;
      font-weight: 700;
      color: #d2dcff;
    }
    .hint { opacity: .86; font-size: .87rem; line-height: 1.35; margin: 4px 0 0; }
    @media (max-width: 760px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .swatches { grid-template-columns: 1fr; }
      .row { grid-template-columns: 60px 1fr 52px 52px; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>🎨 Pixel Alchemist</h1>
    <section class="hud">
      <div class="chip">라운드 <strong id="round">1</strong></div>
      <div class="chip">정밀도 <strong id="acc">0.0%</strong></div>
      <div class="chip">누적 점수 <strong id="score">0</strong></div>
      <div class="chip">최고 점수 <strong id="best">0</strong></div>
    </section>

    <section class="swatches">
      <article class="swatch">
        <div class="color" id="targetColor"></div>
        <p class="label">타겟 색상 <span id="targetTxt">rgb(0,0,0)</span></p>
      </article>
      <article class="swatch">
        <div class="color" id="mixColor"></div>
        <p class="label">내 조합 <span id="mixTxt">rgb(0,0,0)</span></p>
      </article>
    </section>

    <section class="mixers" id="mixers">
      <div class="row" data-ch="r">
        <strong style="color:#ff6b7d">RED</strong>
        <input type="range" min="0" max="255" value="80" id="r" />
        <button class="minus" data-target="r">-</button>
        <div class="val" id="rVal">80</div>
      </div>
      <div class="row" data-ch="g">
        <strong style="color:#63ff9e">GREEN</strong>
        <input type="range" min="0" max="255" value="80" id="g" />
        <button class="minus" data-target="g">-</button>
        <div class="val" id="gVal">80</div>
      </div>
      <div class="row" data-ch="b">
        <strong style="color:#75b4ff">BLUE</strong>
        <input type="range" min="0" max="255" value="80" id="b" />
        <button class="minus" data-target="b">-</button>
        <div class="val" id="bVal">80</div>
      </div>
    </section>

    <section class="actions">
      <button class="mixBtn" id="mixBtn">MIX (Enter)</button>
      <button class="newBtn" id="newBtn">NEW TARGET (N)</button>
    </section>

    <div class="msg" id="msg">슬라이더를 조절해 타겟 색상에 맞추세요.</div>
    <p class="hint">키보드: Q/A=R±, W/S=G±, E/D=B±, Enter=Mix, N=New. 터치/드래그 지원.</p>
  </main>

  <script>
    (() => {
      const r = document.getElementById('r');
      const g = document.getElementById('g');
      const b = document.getElementById('b');
      const rVal = document.getElementById('rVal');
      const gVal = document.getElementById('gVal');
      const bVal = document.getElementById('bVal');
      const targetColor = document.getElementById('targetColor');
      const mixColor = document.getElementById('mixColor');
      const targetTxt = document.getElementById('targetTxt');
      const mixTxt = document.getElementById('mixTxt');
      const roundEl = document.getElementById('round');
      const accEl = document.getElementById('acc');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const msgEl = document.getElementById('msg');
      const mixBtn = document.getElementById('mixBtn');
      const newBtn = document.getElementById('newBtn');

      let audioCtx;
      const tone = (f, t = 0.08, type = 'sine', gain = 0.03) => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.value = f;
        g.gain.value = gain;
        o.connect(g).connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + t);
      };

      const BEST_KEY = 'pixelAlchemistBestScore';
      let best = Number(localStorage.getItem(BEST_KEY) || 0);
      let round = 1;
      let score = 0;
      let target = { r: 120, g: 120, b: 120 };
      bestEl.textContent = best;

      function setMsg(text, ok = false) {
        msgEl.textContent = text;
        msgEl.style.color = ok ? '#68ff9f' : '#d2dcff';
      }

      function clamp(v) {
        return Math.max(0, Math.min(255, v));
      }

      function currentMix() {
        return { r: Number(r.value), g: Number(g.value), b: Number(b.value) };
      }

      function updatePreview() {
        const c = currentMix();
        rVal.textContent = c.r;
        gVal.textContent = c.g;
        bVal.textContent = c.b;
        const text = `rgb(${c.r}, ${c.g}, ${c.b})`;
        mixColor.style.background = text;
        mixTxt.textContent = text;
      }

      function makeTarget() {
        target = {
          r: Math.floor(Math.random() * 256),
          g: Math.floor(Math.random() * 256),
          b: Math.floor(Math.random() * 256)
        };
        const t = `rgb(${target.r}, ${target.g}, ${target.b})`;
        targetColor.style.background = t;
        targetTxt.textContent = t;
      }

      function evaluateMix() {
        const c = currentMix();
        const dr = c.r - target.r;
        const dg = c.g - target.g;
        const db = c.b - target.b;
        const dist = Math.sqrt(dr * dr + dg * dg + db * db);
        const maxDist = Math.sqrt(255 * 255 * 3);
        const acc = Math.max(0, 100 - (dist / maxDist) * 100);
        accEl.textContent = `${acc.toFixed(1)}%`;

        const gain = Math.round(acc * 10 + round * 4);
        score += gain;
        scoreEl.textContent = score;

        if (score > best) {
          best = score;
          localStorage.setItem(BEST_KEY, String(best));
          bestEl.textContent = best;
        }

        if (acc >= 95) {
          tone(760, 0.08, 'triangle', 0.03);
          setTimeout(() => tone(990, 0.09, 'sine', 0.03), 60);
          setMsg(`완벽에 가까워요! +${gain}점`, true);
        } else if (acc >= 80) {
          tone(620, 0.07, 'sine', 0.025);
          setMsg(`훌륭해요! 정밀도 ${acc.toFixed(1)}%, +${gain}점`, true);
        } else {
          tone(260 + acc * 3, 0.09, 'square', 0.02);
          setMsg(`정밀도 ${acc.toFixed(1)}%, +${gain}점`);
        }

        round += 1;
        roundEl.textContent = round;
        makeTarget();
      }

      function bump(channel, delta) {
        const el = channel === 'r' ? r : channel === 'g' ? g : b;
        el.value = String(clamp(Number(el.value) + delta));
        updatePreview();
      }

      [r, g, b].forEach(el => {
        el.addEventListener('input', updatePreview);
        el.addEventListener('change', updatePreview);
      });

      [...document.querySelectorAll('.minus')].forEach(btn => {
        btn.addEventListener('click', () => {
          const ch = btn.dataset.target;
          bump(ch, -10);
          tone(280, 0.04, 'square', 0.012);
        });
        btn.addEventListener('touchstart', e => {
          e.preventDefault();
          const ch = btn.dataset.target;
          bump(ch, -10);
          tone(280, 0.04, 'square', 0.012);
        }, { passive: false });
      });

      mixBtn.addEventListener('click', evaluateMix);
      newBtn.addEventListener('click', () => {
        makeTarget();
        tone(420, 0.05, 'sine', 0.02);
        setMsg('새 타겟 색상을 생성했습니다.');
      });

      document.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        if (k === 'q') bump('r', 8);
        else if (k === 'a') bump('r', -8);
        else if (k === 'w') bump('g', 8);
        else if (k === 's') bump('g', -8);
        else if (k === 'e') bump('b', 8);
        else if (k === 'd') bump('b', -8);
        else if (k === 'enter') {
          evaluateMix();
          e.preventDefault();
          return;
        } else if (k === 'n') {
          makeTarget();
          setMsg('새 타겟 색상 생성.');
          return;
        } else {
          return;
        }
        tone(320, 0.03, 'triangle', 0.012);
      });

      makeTarget();
      updatePreview();
      roundEl.textContent = round;
      scoreEl.textContent = score;
      accEl.textContent = '0.0%';
    })();
  </script>
