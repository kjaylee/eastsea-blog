  <style>
    :root{
      --bg:#0a0a1a;
      --panel:#13132a;
      --line:#2ce6ff;
      --line2:#ff4fd8;
      --text:#e9f7ff;
      --ok:#69ffa8;
      --warn:#ff6b8d;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:radial-gradient(circle at 20% -10%,#1b1b42 0%,var(--bg) 55%);color:var(--text);font-family:"Pretendard","Noto Sans KR",system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center}
    .wrap{width:min(100vw,760px);padding:12px;display:flex;flex-direction:column;gap:10px}
    .hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .card{background:linear-gradient(180deg,#171739,#121228);border:1px solid #2a2a5c;border-radius:12px;padding:8px;text-align:center;box-shadow:0 0 14px #0008}
    .label{font-size:11px;opacity:.75}
    .value{font-weight:800;font-size:17px}
    .arena{position:relative;background:#0d0d22;border:1px solid #2b2b62;border-radius:14px;padding:10px;box-shadow:inset 0 0 40px #000}
    canvas{width:100%;aspect-ratio:1/1;display:block;background:radial-gradient(circle at 50% 50%,#14143b 0%,#0a0a1a 64%);border-radius:10px}
    .overlay{position:absolute;inset:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#050511bb;border-radius:10px;text-align:center;padding:20px}
    .overlay.hidden{display:none}
    button{appearance:none;border:none;background:linear-gradient(180deg,#2e2e71,#21214f);color:#fff;padding:10px 14px;font-weight:700;border-radius:10px;cursor:pointer}
    .controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .touch{padding:14px 6px;font-size:16px}
    .desc{font-size:13px;opacity:.84;line-height:1.45;background:#11112a;border:1px solid #2a2a5d;border-radius:12px;padding:10px}
    .accent{color:#7ae8ff}
    @media (max-width:480px){
      .hud{grid-template-columns:repeat(2,1fr)}
      .value{font-size:15px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hud">
      <div class="card"><div class="label">SCORE</div><div id="score" class="value">0</div></div>
      <div class="card"><div class="label">BEST</div><div id="best" class="value">0</div></div>
      <div class="card"><div class="label">CORE</div><div id="hp" class="value">5</div></div>
      <div class="card"><div class="label">COMBO</div><div id="combo" class="value">x1</div></div>
    </section>

    <section class="arena">
      <canvas id="game" width="540" height="540" aria-label="Plasma Net Defender play field"></canvas>
      <div id="overlay" class="overlay">
        <h2 style="margin:0">Plasma Net Defender</h2>
        <p style="margin:0;opacity:.85">좌/우로 실드를 회전하고 <span class="accent">Pulse</span>로 각도를 확장해 입자를 막아주세요.</p>
        <button id="startBtn">Start Mission</button>
      </div>
    </section>

    <section class="controls">
      <button class="touch" id="leftBtn">⟲ LEFT</button>
      <button class="touch" id="pulseBtn">⚡ PULSE</button>
      <button class="touch" id="rightBtn">RIGHT ⟳</button>
    </section>

    <section class="desc">
      키보드: <b>← / →</b> 회전, <b>Space</b> Pulse, <b>Enter</b> 재시작.
      터치: 하단 3버튼 사용. 네온 코어를 지키며 최고 점수를 갱신하세요.
    </section>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('overlay');
      const startBtn = document.getElementById('startBtn');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const hpEl = document.getElementById('hp');
      const comboEl = document.getElementById('combo');
      const leftBtn = document.getElementById('leftBtn');
      const rightBtn = document.getElementById('rightBtn');
      const pulseBtn = document.getElementById('pulseBtn');

      const storeKey = 'plasmaNetDefenderBest';
      let best = Number(localStorage.getItem(storeKey) || 0);
      bestEl.textContent = best;

      let audioCtx;
      function tone(freq, dur = 0.07, type = 'sine', gain = 0.035) {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.value = freq;
        g.gain.value = gain;
        o.connect(g).connect(audioCtx.destination);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        o.stop(audioCtx.currentTime + dur);
      }

      const center = { x: 270, y: 270 };
      const coreR = 28;
      const fieldR = 228;
      const state = {
        running: false,
        score: 0,
        hp: 5,
        combo: 0,
        rot: -Math.PI / 2,
        pulse: 0,
        time: 0,
        spawnClock: 0,
        particles: [],
        keyLeft: false,
        keyRight: false
      };

      function reset() {
        state.running = true;
        state.score = 0;
        state.hp = 5;
        state.combo = 0;
        state.rot = -Math.PI / 2;
        state.pulse = 0;
        state.time = 0;
        state.spawnClock = 0;
        state.particles.length = 0;
        overlay.classList.add('hidden');
        syncHud();
        tone(560, 0.09, 'triangle', 0.04);
      }

      function endGame() {
        state.running = false;
        if (state.score > best) {
          best = state.score;
          localStorage.setItem(storeKey, String(best));
          bestEl.textContent = best;
        }
        startBtn.textContent = 'Restart';
        overlay.innerHTML = `<h2 style="margin:0">Core Lost</h2>
          <p style="margin:0;opacity:.9">Score <b>${state.score}</b> · Best <b>${best}</b></p>
          <button id="startBtn">Restart Mission</button>`;
        overlay.classList.remove('hidden');
        document.getElementById('startBtn').addEventListener('click', reset, { once: true });
        tone(140, 0.2, 'sawtooth', 0.06);
      }

      function spawnParticle() {
        const a = Math.random() * Math.PI * 2;
        const speed = 95 + Math.min(200, state.time * 6) + Math.random() * 30;
        state.particles.push({
          x: center.x + Math.cos(a) * fieldR,
          y: center.y + Math.sin(a) * fieldR,
          vx: -Math.cos(a) * speed,
          vy: -Math.sin(a) * speed,
          r: 5 + Math.random() * 5,
          hue: 180 + Math.random() * 120
        });
      }

      const normalize = (ang) => {
        while (ang > Math.PI) ang -= Math.PI * 2;
        while (ang < -Math.PI) ang += Math.PI * 2;
        return ang;
      };

      function update(dt) {
        if (!state.running) return;
        state.time += dt;
        const turn = 3.4 * dt;
        if (state.keyLeft) state.rot -= turn;
        if (state.keyRight) state.rot += turn;
        if (state.pulse > 0) state.pulse -= dt;

        const spawnEvery = Math.max(0.16, 0.75 - state.time * 0.01);
        state.spawnClock += dt;
        while (state.spawnClock >= spawnEvery) {
          state.spawnClock -= spawnEvery;
          spawnParticle();
        }

        const shieldArc = Math.PI / 4 + (state.pulse > 0 ? Math.PI / 4 : 0);

        for (let i = state.particles.length - 1; i >= 0; i--) {
          const p = state.particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          const dx = p.x - center.x;
          const dy = p.y - center.y;
          const dist = Math.hypot(dx, dy);

          if (dist <= coreR + 10) {
            const hitAngle = Math.atan2(dy, dx);
            const delta = Math.abs(normalize(hitAngle - state.rot));
            if (delta <= shieldArc / 2) {
              state.score += 8 + Math.floor(state.combo * 0.7);
              state.combo += 1;
              tone(460 + Math.min(420, state.combo * 8), 0.05, 'square', 0.03);
            } else {
              state.hp -= 1;
              state.combo = 0;
              tone(180, 0.09, 'sawtooth', 0.05);
              if (state.hp <= 0) {
                state.particles.splice(i, 1);
                syncHud();
                endGame();
                return;
              }
            }
            state.particles.splice(i, 1);
          } else if (dist > fieldR + 24) {
            state.particles.splice(i, 1);
          }
        }

        syncHud();
      }

      function syncHud() {
        scoreEl.textContent = state.score;
        hpEl.textContent = state.hp;
        comboEl.textContent = 'x' + Math.max(1, state.combo);
        bestEl.textContent = best;
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let r = fieldR; r > 40; r -= 38) {
          ctx.beginPath();
          ctx.arc(center.x, center.y, r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(36,210,255,${(r / fieldR) * 0.09})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(center.x, center.y, coreR, 0, Math.PI * 2);
        ctx.fillStyle = '#6ae8ff';
        ctx.shadowColor = '#63e7ff';
        ctx.shadowBlur = 26;
        ctx.fill();
        ctx.shadowBlur = 0;

        const shieldArc = Math.PI / 4 + (state.pulse > 0 ? Math.PI / 4 : 0);
        ctx.beginPath();
        ctx.arc(center.x, center.y, coreR + 16, state.rot - shieldArc / 2, state.rot + shieldArc / 2);
        ctx.strokeStyle = state.pulse > 0 ? '#ff62df' : '#4cffc9';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = 14;
        ctx.stroke();
        ctx.shadowBlur = 0;

        for (const p of state.particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `hsl(${p.hue} 95% 68%)`;
          ctx.shadowColor = ctx.fillStyle;
          ctx.shadowBlur = 9;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      let last = performance.now();
      function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      function doPulse() {
        if (!state.running) return;
        state.pulse = 0.32;
        tone(720, 0.06, 'triangle', 0.04);
      }

      function setDir(left, on) {
        if (left) state.keyLeft = on;
        else state.keyRight = on;
      }

      function bindPress(el, onDown, onUp) {
        const down = (e) => { e.preventDefault(); onDown(); };
        const up = (e) => { e.preventDefault(); onUp && onUp(); };
        el.addEventListener('pointerdown', down);
        el.addEventListener('pointerup', up);
        el.addEventListener('pointercancel', up);
        el.addEventListener('pointerleave', up);
      }

      bindPress(leftBtn, () => setDir(true, true), () => setDir(true, false));
      bindPress(rightBtn, () => setDir(false, true), () => setDir(false, false));
      bindPress(pulseBtn, doPulse, () => {});

      document.addEventListener('keydown', (e) => {
        if (['ArrowLeft', 'ArrowRight', ' ', 'Enter'].includes(e.key)) e.preventDefault();
        if (e.key === 'ArrowLeft') state.keyLeft = true;
        if (e.key === 'ArrowRight') state.keyRight = true;
        if (e.key === ' ') doPulse();
        if (e.key === 'Enter' && !state.running) reset();
      });
      document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft') state.keyLeft = false;
        if (e.key === 'ArrowRight') state.keyRight = false;
      });

      startBtn.addEventListener('click', reset);
      draw();
      requestAnimationFrame(loop);
    })();
  </script>
