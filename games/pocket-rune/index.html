<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pocket Rune</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b2ff7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;color:#e0e0ff;font-family:'Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#app{width:100%;height:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* SCREENS */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;position:absolute;top:0;left:0;z-index:10}
.screen.active{display:flex}

/* TITLE */
#title-screen{background:radial-gradient(ellipse at 50% 30%,#1a0a3a 0%,#0a0a1a 70%)}
#title-screen h1{font-size:2.4em;color:#c77dff;text-shadow:0 0 30px #7b2ff7,0 0 60px #7b2ff780;margin-bottom:8px;letter-spacing:2px}
#title-screen .subtitle{font-size:0.95em;color:#8888bb;margin-bottom:40px}
.btn{background:linear-gradient(135deg,#7b2ff7,#c77dff);border:none;color:#fff;padding:14px 40px;font-size:1.1em;border-radius:12px;cursor:pointer;text-shadow:0 1px 2px #0008;box-shadow:0 0 20px #7b2ff740;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.btn:hover,.btn:active{transform:scale(1.04);box-shadow:0 0 30px #7b2ff780}
.btn-sm{padding:10px 24px;font-size:0.95em}
.stats-row{display:flex;gap:20px;margin-top:24px;font-size:0.85em;color:#8888bb}
.stats-row span{background:#ffffff10;padding:6px 14px;border-radius:8px}

/* GAME */
#game-screen{flex-direction:column;justify-content:flex-start;padding:0}

/* TOP BAR */
.top-bar{width:100%;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:#0a0a1a;border-bottom:1px solid #222240;z-index:5;flex-shrink:0}
.top-bar .room-info{font-size:0.85em;color:#8888bb}
.top-bar .room-info b{color:#c77dff}
.player-hp-bar,.enemy-hp-bar{height:6px;border-radius:3px;transition:width .4s}
.hp-wrap{width:100%;background:#1a1a2e;border-radius:3px;height:6px;margin-top:2px}
.player-hp-bar{background:linear-gradient(90deg,#00c896,#00ffc8)}
.enemy-hp-bar{background:linear-gradient(90deg,#ff4466,#ff7788)}

/* BATTLE AREA */
.battle-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}

/* ENEMY */
.enemy-panel{text-align:center;margin-bottom:12px;width:90%}
.enemy-name{font-size:1.05em;color:#ff7788;text-shadow:0 0 10px #ff446680;margin-bottom:4px}
.enemy-sprite{font-size:3.2em;margin:8px 0;transition:transform .2s;display:inline-block}
.enemy-sprite.hit{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.enemy-intent{font-size:0.82em;color:#bbbbdd;margin-top:4px}
.enemy-intent .atk{color:#ff7788}
.enemy-intent .def{color:#4488ff}

/* COMBO */
.combo-zone{width:90%;min-height:42px;display:flex;align-items:center;justify-content:center;gap:4px;margin:8px 0}
.combo-slot{width:36px;height:36px;border:2px solid #333355;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1em;background:#0f0f2a;transition:all .25s}
.combo-slot.filled{border-color:#7b2ff7;box-shadow:0 0 10px #7b2ff740}
.combo-label{font-size:0.75em;color:#7b2ff7;margin-right:8px;white-space:nowrap}
.combo-bonus{font-size:0.8em;color:#ffd700;text-shadow:0 0 8px #ffd70060;animation:fadeUp .8s forwards}
@keyframes fadeUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-20px)}}

/* LOG */
.battle-log{width:90%;min-height:28px;text-align:center;font-size:0.8em;color:#aaaacc;margin:4px 0;line-height:1.3}

/* PLAYER */
.player-panel{width:90%;display:flex;align-items:center;gap:12px;padding:8px 0;flex-shrink:0}
.player-sprite{font-size:2em}
.player-info{flex:1}
.player-name{font-size:0.85em;color:#00ffc8}
.player-stats{font-size:0.75em;color:#8888bb;margin-top:2px}
.player-stats .shield{color:#4488ff}
.player-stats .mana{color:#c77dff}

/* HAND */
.hand-area{width:100%;padding:8px 8px 16px;background:linear-gradient(0deg,#0d0d24,#0a0a1a00);flex-shrink:0}
.hand-label{font-size:0.7em;color:#666688;text-align:center;margin-bottom:6px}
.hand{display:flex;justify-content:center;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding:0 4px}
.card{width:68px;min-width:68px;height:96px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;-webkit-tap-highlight-color:transparent;border:2px solid}
.card:hover,.card:active{transform:translateY(-6px)}
.card .card-icon{font-size:1.6em;margin-bottom:4px}
.card .card-name{font-size:0.6em;letter-spacing:0.5px}
.card .card-val{font-size:0.72em;margin-top:2px;font-weight:bold}
.card.type-atk{background:linear-gradient(180deg,#2a0a0a,#1a0505);border-color:#ff4466;color:#ff7788;box-shadow:0 0 12px #ff446630}
.card.type-def{background:linear-gradient(180deg,#0a0a2a,#050520);border-color:#4488ff;color:#6699ff;box-shadow:0 0 12px #4488ff30}
.card.type-mag{background:linear-gradient(180deg,#1a0a2a,#100520);border-color:#c77dff;color:#d99eff;box-shadow:0 0 12px #c77dff30}
.card.type-cur{background:linear-gradient(180deg,#1a1a0a,#101005);border-color:#aaaa00;color:#cccc44;box-shadow:0 0 12px #aaaa0030}
.card.disabled{opacity:0.35;pointer-events:none}

/* END TURN */
.end-turn-area{text-align:center;padding:6px 0;flex-shrink:0}
.end-turn-btn{background:#1a1a2e;border:1px solid #444466;color:#aaaacc;padding:8px 28px;border-radius:8px;font-size:0.85em;cursor:pointer;transition:all .15s}
.end-turn-btn:hover{background:#2a2a3e;border-color:#7b2ff7}

/* REWARD */
#reward-screen{background:rgba(10,10,26,0.95)}
#reward-screen h2{color:#ffd700;text-shadow:0 0 20px #ffd70060;font-size:1.5em;margin-bottom:16px}
.reward-cards{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap;justify-content:center}
.reward-card{padding:16px 20px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid #333355;background:#0f0f2a;transition:all .2s;min-width:100px}
.reward-card:hover{border-color:#ffd700;box-shadow:0 0 16px #ffd70040;transform:translateY(-4px)}
.reward-card .r-icon{font-size:2em;margin-bottom:6px}
.reward-card .r-name{font-size:0.85em;color:#e0e0ff}
.reward-card .r-desc{font-size:0.7em;color:#8888bb;margin-top:4px}

/* GAME OVER */
#gameover-screen{background:rgba(10,10,26,0.95)}
#gameover-screen h2{font-size:1.8em;margin-bottom:8px}
#gameover-screen .go-sub{color:#8888bb;margin-bottom:24px}
.go-stats{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;align-items:center}
.go-stats div{background:#ffffff08;padding:8px 20px;border-radius:8px;font-size:0.9em}
.go-stats .label{color:#8888bb;margin-right:8px}

/* PARTICLES */
.particle{position:absolute;pointer-events:none;border-radius:50%;animation:particleFade 0.8s forwards}
@keyframes particleFade{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translateY(-30px)}}

/* RESPONSIVE */
@media(max-width:480px){
  #title-screen h1{font-size:2em}
  .card{width:60px;min-width:60px;height:86px}
  .card .card-icon{font-size:1.3em}
  .enemy-sprite{font-size:2.6em}
}
@media(max-height:600px){
  .card{height:78px}
  .enemy-sprite{font-size:2.2em}
  .combo-slot{width:30px;height:30px}
}
</style>
</head>
<body>
<div id="app">

<!-- TITLE -->
<div id="title-screen" class="screen active">
  <h1>Pocket Rune</h1>
  <div class="subtitle">로그라이크 덱런 · 5분 완결</div>
  <button class="btn" id="btn-start" onclick="G.startRun()">▶ 던전 입장</button>
  <div class="stats-row">
    <span>🏆 최고 <b id="stat-best">0</b></span>
    <span>⚔️ 클리어 <b id="stat-clears">0</b></span>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="top-bar">
    <div class="room-info">⚔️ 방 <b id="room-num">1</b>/6 · 턴 <span id="turn-num">1</span></div>
    <div style="font-size:0.82em;color:#ffd700">💰 <span id="gold-display">0</span></div>
  </div>

  <div class="battle-area">
    <!-- ENEMY -->
    <div class="enemy-panel">
      <div class="enemy-name" id="enemy-name">슬라임</div>
      <div class="hp-wrap"><div class="enemy-hp-bar" id="enemy-hp-bar" style="width:100%"></div></div>
      <div style="font-size:0.72em;color:#ff8888;margin-top:2px"><span id="enemy-hp-text">20/20</span></div>
      <div class="enemy-sprite" id="enemy-sprite">🟢</div>
      <div class="enemy-intent" id="enemy-intent"></div>
    </div>

    <!-- COMBO -->
    <div class="combo-zone">
      <span class="combo-label">콤보</span>
      <div class="combo-slot" id="cs0"></div>
      <div class="combo-slot" id="cs1"></div>
      <div class="combo-slot" id="cs2"></div>
      <span id="combo-bonus-text"></span>
    </div>

    <!-- LOG -->
    <div class="battle-log" id="battle-log"></div>

    <!-- PLAYER -->
    <div class="player-panel">
      <div class="player-sprite">🧙</div>
      <div class="player-info">
        <div class="player-name">룬 메이지</div>
        <div class="hp-wrap"><div class="player-hp-bar" id="player-hp-bar" style="width:100%"></div></div>
        <div class="player-stats">
          ❤️ <span id="player-hp-text">50/50</span>
          <span class="shield">🛡 <span id="player-shield">0</span></span>
          <span class="mana">✦ <span id="player-mana">3</span>/<span id="player-mana-max">3</span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- HAND -->
  <div class="hand-area">
    <div class="hand-label">카드를 선택하세요 (1~5키 또는 터치) · <span id="cards-left">20</span>장 남음</div>
    <div class="hand" id="hand"></div>
  </div>
  <div class="end-turn-area">
    <button class="end-turn-btn" id="btn-end-turn" onclick="G.endTurn()">턴 종료 (Space)</button>
  </div>
</div>

<!-- REWARD -->
<div id="reward-screen" class="screen">
  <h2>✨ 전리품</h2>
  <div class="reward-cards" id="reward-cards"></div>
  <button class="btn btn-sm" onclick="G.skipReward()" style="margin-top:12px">건너뛰기</button>
</div>

<!-- GAME OVER -->
<div id="gameover-screen" class="screen">
  <h2 id="go-title">💀 패배</h2>
  <div class="go-sub" id="go-sub"></div>
  <div class="go-stats" id="go-stats"></div>
  <button class="btn" onclick="G.backToTitle()">타이틀로</button>
</div>

</div>

<script>
// === AUDIO ===
const SFX={
  ctx:null,
  init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume()},
  play(type){
    this.init();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    const conf={
      hit:{f:220,t:'sawtooth',d:0.12,v:0.18},
      shield:{f:520,t:'sine',d:0.15,v:0.12},
      magic:{f:660,t:'triangle',d:0.25,v:0.15},
      curse:{f:140,t:'square',d:0.2,v:0.1},
      combo:{f:880,t:'sine',d:0.35,v:0.2},
      hurt:{f:110,t:'sawtooth',d:0.18,v:0.2},
      win:{f:523,t:'triangle',d:0.5,v:0.15},
      lose:{f:165,t:'sawtooth',d:0.6,v:0.15},
      draw:{f:440,t:'sine',d:0.08,v:0.08},
      btn:{f:600,t:'sine',d:0.06,v:0.06},
      boss:{f:80,t:'square',d:0.4,v:0.15},
      heal:{f:700,t:'sine',d:0.3,v:0.12},
      gold:{f:1200,t:'sine',d:0.1,v:0.08}
    }[type]||{f:440,t:'sine',d:0.1,v:0.1};
    o.type=conf.t;o.frequency.setValueAtTime(conf.f,now);
    if(type==='combo'){o.frequency.exponentialRampToValueAtTime(1760,now+conf.d)}
    if(type==='win'){o.frequency.setValueAtTime(523,now);o.frequency.setValueAtTime(659,now+0.12);o.frequency.setValueAtTime(784,now+0.24)}
    if(type==='lose'){o.frequency.exponentialRampToValueAtTime(55,now+conf.d)}
    g.gain.setValueAtTime(conf.v,now);g.gain.exponentialRampToValueAtTime(0.001,now+conf.d);
    o.start(now);o.stop(now+conf.d);
  }
};

// === CARD DEFS ===
const CARD_TYPES={
  atk:{icon:'⚔️',label:'공격',color:'#ff4466'},
  def:{icon:'🛡️',label:'방어',color:'#4488ff'},
  mag:{icon:'✨',label:'마법',color:'#c77dff'},
  cur:{icon:'💀',label:'저주',color:'#aaaa00'}
};

const BASE_CARDS=[
  {id:'slash',type:'atk',name:'베기',icon:'⚔️',val:6,cost:1,desc:'6 데미지'},
  {id:'stab',type:'atk',name:'찌르기',icon:'🗡️',val:8,cost:1,desc:'8 데미지'},
  {id:'cleave',type:'atk',name:'강타',icon:'💥',val:10,cost:2,desc:'10 데미지'},
  {id:'strike',type:'atk',name:'타격',icon:'👊',val:5,cost:1,desc:'5 데미지'},
  {id:'fury',type:'atk',name:'분노',icon:'🔥',val:12,cost:2,desc:'12 데미지'},
  {id:'guard',type:'def',name:'방패',icon:'🛡️',val:6,cost:1,desc:'방어 6'},
  {id:'barrier',type:'def',name:'결계',icon:'🔷',val:8,cost:1,desc:'방어 8'},
  {id:'wall',type:'def',name:'석벽',icon:'🧱',val:12,cost:2,desc:'방어 12'},
  {id:'dodge',type:'def',name:'회피',icon:'💨',val:5,cost:1,desc:'방어 5'},
  {id:'armor',type:'def',name:'갑옷',icon:'🪖',val:10,cost:2,desc:'방어 10'},
  {id:'bolt',type:'mag',name:'볼트',icon:'⚡',val:7,cost:1,desc:'7 마법 데미지'},
  {id:'flame',type:'mag',name:'화염',icon:'🔥',val:10,cost:2,desc:'10 마법 데미지'},
  {id:'frost',type:'mag',name:'빙결',icon:'❄️',val:5,cost:1,desc:'5 데미지+적 약화'},
  {id:'heal',type:'mag',name:'치유',icon:'💚',val:8,cost:2,desc:'HP 8 회복'},
  {id:'nova',type:'mag',name:'노바',icon:'💫',val:14,cost:3,desc:'14 마법 데미지'},
  {id:'hex',type:'cur',name:'저주',icon:'💀',val:4,cost:1,desc:'4 데미지+독 2'},
  {id:'drain',type:'cur',name:'흡수',icon:'🩸',val:5,cost:1,desc:'5 데미지+HP 3 회복'},
  {id:'doom',type:'cur',name:'파멸',icon:'☠️',val:15,cost:3,desc:'15 데미지(자해 5)'},
  {id:'weaken',type:'cur',name:'약화',icon:'🕸️',val:0,cost:1,desc:'적 공격 -4'},
  {id:'leech',type:'cur',name:'흡혈',icon:'🦇',val:8,cost:2,desc:'8 데미지+HP 4 회복'}
];

// === ENEMIES ===
const ENEMIES={
  normal:[
    {name:'슬라임',sprite:'🟢',hp:22,atk:5,def:0},
    {name:'고블린',sprite:'👺',hp:28,atk:7,def:2},
    {name:'해골',sprite:'💀',hp:25,atk:8,def:0},
    {name:'박쥐 떼',sprite:'🦇',hp:18,atk:6,def:0},
    {name:'독버섯',sprite:'🍄',hp:20,atk:4,def:3},
    {name:'코볼트',sprite:'🐉',hp:30,atk:6,def:2},
    {name:'도적',sprite:'🗡️',hp:24,atk:9,def:1},
    {name:'좀비',sprite:'🧟',hp:35,atk:5,def:0}
  ],
  miniboss:[
    {name:'오크 대장',sprite:'👹',hp:55,atk:10,def:4},
    {name:'그림자 기사',sprite:'🖤',hp:50,atk:12,def:3},
    {name:'독 하이드라',sprite:'🐍',hp:60,atk:8,def:5}
  ],
  boss:[
    {name:'용왕 발로스',sprite:'🐲',hp:80,atk:14,def:5},
    {name:'마왕 카르나',sprite:'👿',hp:90,atk:12,def:6},
    {name:'어둠 군주',sprite:'😈',hp:100,atk:16,def:4}
  ]
};

// === REWARD POOL ===
const REWARD_CARDS=[
  {id:'r_smite',type:'atk',name:'천벌',icon:'⚡',val:16,cost:2,desc:'16 데미지'},
  {id:'r_berserk',type:'atk',name:'광전사',icon:'🪓',val:20,cost:3,desc:'20 데미지'},
  {id:'r_fort',type:'def',name:'요새',icon:'🏰',val:16,cost:2,desc:'방어 16'},
  {id:'r_reflect',type:'def',name:'반사',icon:'🪞',val:8,cost:1,desc:'방어 8+반사 4'},
  {id:'r_meteor',type:'mag',name:'메테오',icon:'☄️',val:20,cost:3,desc:'20 마법 데미지'},
  {id:'r_regen',type:'mag',name:'재생',icon:'🌿',val:12,cost:2,desc:'HP 12 회복'},
  {id:'r_plague',type:'cur',name:'역병',icon:'☣️',val:10,cost:2,desc:'10 데미지+독 5'},
  {id:'r_siphon',type:'cur',name:'영혼흡수',icon:'👻',val:12,cost:2,desc:'12 데미지+HP 6 회복'}
];

// === GAME STATE ===
const G={
  // persistent
  bestScore:0,clears:0,
  // run
  deck:[],discard:[],hand:[],
  hp:0,maxHp:50,shield:0,mana:0,maxMana:3,
  room:0,turn:0,gold:0,score:0,
  enemy:null,enemyHp:0,enemyMaxHp:0,enemyWeaken:0,enemyPoison:0,
  combo:[],
  animating:false,

  // INIT
  loadSave(){
    try{
      const d=JSON.parse(localStorage.getItem('pocketrune')||'{}');
      this.bestScore=d.bestScore||0;
      this.clears=d.clears||0;
    }catch(e){}
    this.updateTitle();
  },
  save(){
    localStorage.setItem('pocketrune',JSON.stringify({bestScore:this.bestScore,clears:this.clears}));
  },
  updateTitle(){
    document.getElementById('stat-best').textContent=this.bestScore;
    document.getElementById('stat-clears').textContent=this.clears;
  },

  // SCREENS
  showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  },
  backToTitle(){
    SFX.play('btn');
    this.updateTitle();
    this.showScreen('title-screen');
  },

  // START RUN
  startRun(){
    SFX.play('btn');
    this.deck=BASE_CARDS.map(c=>({...c,uid:Math.random().toString(36).slice(2)}));
    this.discard=[];this.hand=[];
    this.hp=this.maxHp;this.shield=0;this.mana=this.maxMana;
    this.room=0;this.turn=0;this.gold=0;this.score=0;
    this.combo=[];this.animating=false;
    this.shuffleDeck();
    this.nextRoom();
  },

  shuffleDeck(){
    for(let i=this.deck.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]];
    }
  },

  // ROOMS
  nextRoom(){
    this.room++;
    if(this.room>6){this.victory();return}
    let ePool;
    if(this.room===3){
      ePool=ENEMIES.miniboss;SFX.play('boss');
    }else if(this.room===6){
      ePool=ENEMIES.boss;SFX.play('boss');
    }else{
      ePool=ENEMIES.normal;
    }
    const template=ePool[Math.floor(Math.random()*ePool.length)];
    const scale=1+((this.room-1)*0.12);
    this.enemy={...template};
    this.enemyHp=Math.floor(template.hp*scale);
    this.enemyMaxHp=this.enemyHp;
    this.enemyWeaken=0;this.enemyPoison=0;
    this.shield=0;
    this.combo=[];
    this.turn=0;
    this.showScreen('game-screen');
    this.startTurn();
  },

  // TURNS
  startTurn(){
    this.turn++;
    this.mana=this.maxMana;
    this.shield=0;
    this.drawCards(5);
    this.updateUI();
  },

  drawCards(n){
    for(let i=0;i<n;i++){
      if(this.deck.length===0){
        if(this.discard.length===0)break;
        this.deck=this.discard.splice(0);
        this.shuffleDeck();
      }
      this.hand.push(this.deck.pop());
    }
    SFX.play('draw');
  },

  // PLAY CARD
  playCard(idx){
    if(this.animating)return;
    if(idx<0||idx>=this.hand.length)return;
    const card=this.hand[idx];
    if(card.cost>this.mana)return;

    SFX.play(card.type==='atk'?'hit':card.type==='def'?'shield':card.type==='mag'?'magic':'curse');
    this.mana-=card.cost;

    // combo tracking
    this.combo.push(card.type);
    if(this.combo.length>3)this.combo.shift();
    let comboBonus=false;
    if(this.combo.length===3&&this.combo[0]===this.combo[1]&&this.combo[1]===this.combo[2]){
      comboBonus=true;
    }

    let dmg=0,logMsg='';

    switch(card.type){
      case 'atk':
        dmg=card.val+(comboBonus?8:0);
        dmg=Math.max(0,dmg-this.enemy.def);
        this.enemyHp=Math.max(0,this.enemyHp-dmg);
        logMsg=`${card.name}! ${dmg} 데미지`;
        this.shakeEnemy();
        this.spawnParticles(card.type);
        break;
      case 'def':
        const shieldVal=card.val+(comboBonus?6:0);
        this.shield+=shieldVal;
        logMsg=`${card.name}! 방어 +${shieldVal}`;
        break;
      case 'mag':
        if(card.id==='heal'||card.id==='r_regen'){
          const healVal=card.val+(comboBonus?6:0);
          this.hp=Math.min(this.maxHp,this.hp+healVal);
          logMsg=`${card.name}! HP +${healVal}`;
          SFX.play('heal');
        }else if(card.id==='frost'){
          dmg=card.val+(comboBonus?5:0);
          this.enemyHp=Math.max(0,this.enemyHp-dmg);
          this.enemyWeaken+=2;
          logMsg=`${card.name}! ${dmg} 데미지+약화`;
          this.shakeEnemy();
        }else{
          dmg=card.val+(comboBonus?10:0);
          this.enemyHp=Math.max(0,this.enemyHp-dmg);
          logMsg=`${card.name}! ${dmg} 마법 데미지`;
          this.shakeEnemy();
          this.spawnParticles(card.type);
        }
        break;
      case 'cur':
        if(card.id==='weaken'){
          this.enemyWeaken+=4+(comboBonus?3:0);
          logMsg=`${card.name}! 적 약화`;
        }else if(card.id==='drain'||card.id==='leech'||card.id==='r_siphon'){
          dmg=card.val+(comboBonus?6:0);
          dmg=Math.max(0,dmg-this.enemy.def);
          this.enemyHp=Math.max(0,this.enemyHp-dmg);
          const lifeSteal=card.id==='drain'?3:card.id==='leech'?4:6;
          this.hp=Math.min(this.maxHp,this.hp+lifeSteal);
          logMsg=`${card.name}! ${dmg} 데미지+HP ${lifeSteal} 흡수`;
          this.shakeEnemy();
        }else if(card.id==='doom'){
          dmg=card.val+(comboBonus?8:0);
          this.enemyHp=Math.max(0,this.enemyHp-dmg);
          this.hp-=5;
          logMsg=`${card.name}! ${dmg} 데미지 (자해 5)`;
          this.shakeEnemy();
        }else if(card.id==='hex'||card.id==='r_plague'){
          dmg=card.val+(comboBonus?4:0);
          this.enemyHp=Math.max(0,this.enemyHp-dmg);
          this.enemyPoison+=(card.id==='hex'?2:5);
          logMsg=`${card.name}! ${dmg} 데미지+독`;
          this.shakeEnemy();
        }else{
          dmg=card.val+(comboBonus?6:0);
          dmg=Math.max(0,dmg-this.enemy.def);
          this.enemyHp=Math.max(0,this.enemyHp-dmg);
          logMsg=`${card.name}! ${dmg} 데미지`;
          this.shakeEnemy();
        }
        break;
    }

    if(comboBonus){
      logMsg+=' 🔥콤보!';
      SFX.play('combo');
      this.combo=[];
    }

    // Remove card from hand → discard
    this.hand.splice(idx,1);
    this.discard.push(card);

    document.getElementById('battle-log').textContent=logMsg;
    this.updateUI();

    // Check enemy death
    if(this.enemyHp<=0){
      this.animating=true;
      setTimeout(()=>{this.animating=false;this.enemyDefeated()},500);
    }
    // Check player death
    if(this.hp<=0){
      this.animating=true;
      setTimeout(()=>{this.animating=false;this.defeat()},500);
    }
  },

  // END TURN
  endTurn(){
    if(this.animating)return;
    SFX.play('btn');

    // enemy poison
    if(this.enemyPoison>0){
      this.enemyHp=Math.max(0,this.enemyHp-this.enemyPoison);
      document.getElementById('battle-log').textContent=`독 ${this.enemyPoison} 데미지!`;
      this.enemyPoison=Math.max(0,this.enemyPoison-1);
      if(this.enemyHp<=0){this.updateUI();this.enemyDefeated();return}
    }

    // enemy attack
    let eAtk=Math.max(0,this.enemy.atk-this.enemyWeaken);
    if(this.enemyWeaken>0)this.enemyWeaken=Math.max(0,this.enemyWeaken-2);
    
    // enemy random behavior
    const roll=Math.random();
    let logMsg='';
    if(roll<0.7){
      // attack
      let dmgToPlayer=eAtk;
      if(this.shield>0){
        const blocked=Math.min(this.shield,dmgToPlayer);
        dmgToPlayer-=blocked;
        this.shield-=blocked;
      }
      this.hp-=dmgToPlayer;
      logMsg=`${this.enemy.name}의 공격! ${dmgToPlayer} 데미지`;
      SFX.play('hurt');
    }else if(roll<0.85){
      // heavy attack
      let dmgToPlayer=Math.floor(eAtk*1.5);
      if(this.shield>0){
        const blocked=Math.min(this.shield,dmgToPlayer);
        dmgToPlayer-=blocked;
        this.shield-=blocked;
      }
      this.hp-=dmgToPlayer;
      logMsg=`${this.enemy.name}의 강타! ${dmgToPlayer} 데미지`;
      SFX.play('hurt');
    }else{
      // defend (heal)
      const healAmt=Math.floor(this.enemy.atk*0.5);
      this.enemyHp=Math.min(this.enemyMaxHp,this.enemyHp+healAmt);
      logMsg=`${this.enemy.name}이(가) 회복! HP +${healAmt}`;
    }

    // discard remaining hand
    this.discard.push(...this.hand);
    this.hand=[];

    document.getElementById('battle-log').textContent=logMsg;
    this.updateUI();

    if(this.hp<=0){this.defeat();return}

    // next turn
    this.startTurn();
  },

  // ENEMY DEFEATED
  enemyDefeated(){
    SFX.play('win');
    const goldEarned=5+this.room*3+Math.floor(Math.random()*5);
    this.gold+=goldEarned;
    this.score+=this.room*100+this.turn*10;
    SFX.play('gold');

    // discard hand
    this.discard.push(...this.hand);
    this.hand=[];

    if(this.room>=6){this.victory();return}

    // show reward
    this.showReward(goldEarned);
  },

  showReward(goldEarned){
    const container=document.getElementById('reward-cards');
    container.innerHTML='';

    // gold reward info
    const goldDiv=document.createElement('div');
    goldDiv.className='reward-card';
    goldDiv.innerHTML=`<div class="r-icon">💰</div><div class="r-name">+${goldEarned} 골드</div><div class="r-desc">자동 획득</div>`;
    goldDiv.style.borderColor='#ffd700';
    goldDiv.style.pointerEvents='none';
    container.appendChild(goldDiv);

    // heal option
    const healDiv=document.createElement('div');
    healDiv.className='reward-card';
    healDiv.innerHTML='<div class="r-icon">❤️</div><div class="r-name">HP +10</div><div class="r-desc">생명력 회복</div>';
    healDiv.onclick=()=>{
      SFX.play('heal');
      this.hp=Math.min(this.maxHp,this.hp+10);
      this.nextRoom();
    };
    container.appendChild(healDiv);

    // random card rewards
    const pool=[...REWARD_CARDS].sort(()=>Math.random()-0.5).slice(0,2);
    pool.forEach(card=>{
      const div=document.createElement('div');
      div.className='reward-card';
      div.innerHTML=`<div class="r-icon">${card.icon}</div><div class="r-name">${card.name}</div><div class="r-desc">${card.desc} (${card.cost}✦)</div>`;
      div.onclick=()=>{
        SFX.play('draw');
        this.discard.push({...card,uid:Math.random().toString(36).slice(2)});
        this.nextRoom();
      };
      container.appendChild(div);
    });

    this.showScreen('reward-screen');
  },

  skipReward(){SFX.play('btn');this.nextRoom()},

  // VICTORY
  victory(){
    SFX.play('win');
    this.score+=500+this.hp*5+this.gold*2;
    this.clears++;
    if(this.score>this.bestScore)this.bestScore=this.score;
    this.save();

    document.getElementById('go-title').textContent='🏆 던전 클리어!';
    document.getElementById('go-title').style.color='#ffd700';
    document.getElementById('go-sub').textContent='모든 적을 물리쳤습니다!';
    document.getElementById('go-stats').innerHTML=`
      <div><span class="label">점수</span> ${this.score}</div>
      <div><span class="label">잔여 HP</span> ${this.hp}/${this.maxHp}</div>
      <div><span class="label">골드</span> ${this.gold}</div>
      <div><span class="label">클리어 횟수</span> ${this.clears}</div>
    `;
    this.showScreen('gameover-screen');
  },

  // DEFEAT
  defeat(){
    SFX.play('lose');
    this.score+=this.room*50+this.gold;
    if(this.score>this.bestScore)this.bestScore=this.score;
    this.save();

    document.getElementById('go-title').textContent='💀 패배';
    document.getElementById('go-title').style.color='#ff4466';
    document.getElementById('go-sub').textContent=`${this.room}번째 방에서 쓰러졌습니다`;
    document.getElementById('go-stats').innerHTML=`
      <div><span class="label">점수</span> ${this.score}</div>
      <div><span class="label">도달 방</span> ${this.room}/6</div>
      <div><span class="label">골드</span> ${this.gold}</div>
      <div><span class="label">최고 기록</span> ${this.bestScore}</div>
    `;
    this.showScreen('gameover-screen');
  },

  // EFFECTS
  shakeEnemy(){
    const el=document.getElementById('enemy-sprite');
    el.classList.add('hit');
    setTimeout(()=>el.classList.remove('hit'),300);
  },
  spawnParticles(type){
    const area=document.querySelector('.battle-area');
    const colors={atk:'#ff4466',def:'#4488ff',mag:'#c77dff',cur:'#aaaa00'};
    for(let i=0;i<6;i++){
      const p=document.createElement('div');
      p.className='particle';
      p.style.cssText=`width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[type]||'#fff'};left:${40+Math.random()*20}%;top:${20+Math.random()*20}%;box-shadow:0 0 6px ${colors[type]||'#fff'}`;
      area.appendChild(p);
      setTimeout(()=>p.remove(),800);
    }
  },

  // UI UPDATE
  updateUI(){
    // room/turn
    document.getElementById('room-num').textContent=this.room;
    document.getElementById('turn-num').textContent=this.turn;
    document.getElementById('gold-display').textContent=this.gold;

    // enemy
    if(this.enemy){
      document.getElementById('enemy-name').textContent=this.enemy.name+(this.room===3?' ⭐':this.room===6?' 👑':'');
      document.getElementById('enemy-sprite').textContent=this.enemy.sprite;
      const ehpPct=Math.max(0,(this.enemyHp/this.enemyMaxHp)*100);
      document.getElementById('enemy-hp-bar').style.width=ehpPct+'%';
      document.getElementById('enemy-hp-text').textContent=`${Math.max(0,this.enemyHp)}/${this.enemyMaxHp}`;

      // intent
      const eAtk=Math.max(0,this.enemy.atk-this.enemyWeaken);
      let intentHtml=`다음: <span class="atk">⚔️ ${eAtk}~${Math.floor(eAtk*1.5)}</span>`;
      if(this.enemyPoison>0)intentHtml+=` · 독 ${this.enemyPoison}`;
      if(this.enemyWeaken>0)intentHtml+=` · 약화 -${this.enemyWeaken}`;
      document.getElementById('enemy-intent').innerHTML=intentHtml;
    }

    // player
    const phpPct=Math.max(0,(this.hp/this.maxHp)*100);
    document.getElementById('player-hp-bar').style.width=phpPct+'%';
    document.getElementById('player-hp-text').textContent=`${Math.max(0,this.hp)}/${this.maxHp}`;
    document.getElementById('player-shield').textContent=this.shield;
    document.getElementById('player-mana').textContent=this.mana;
    document.getElementById('player-mana-max').textContent=this.maxMana;

    // combo
    for(let i=0;i<3;i++){
      const el=document.getElementById('cs'+i);
      if(this.combo[i]){
        el.textContent=CARD_TYPES[this.combo[i]].icon;
        el.classList.add('filled');
        el.style.borderColor=CARD_TYPES[this.combo[i]].color;
      }else{
        el.textContent='';
        el.classList.remove('filled');
        el.style.borderColor='#333355';
      }
    }

    // deck count
    document.getElementById('cards-left').textContent=this.deck.length;

    // hand
    this.renderHand();
  },

  renderHand(){
    const container=document.getElementById('hand');
    container.innerHTML='';
    this.hand.forEach((card,idx)=>{
      const div=document.createElement('div');
      div.className=`card type-${card.type}${card.cost>this.mana?' disabled':''}`;
      div.innerHTML=`<div class="card-icon">${card.icon}</div><div class="card-name">${card.name}</div><div class="card-val">${card.cost}✦</div>`;
      div.onclick=()=>this.playCard(idx);
      div.setAttribute('data-idx',idx);
      container.appendChild(div);
    });
  }
};

// === KEYBOARD ===
document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k>='1'&&k<='9'){
    const idx=parseInt(k)-1;
    if(document.getElementById('game-screen').classList.contains('active')){
      G.playCard(idx);e.preventDefault();
    }
  }
  if(k===' '||k==='Enter'){
    if(document.getElementById('game-screen').classList.contains('active')){
      G.endTurn();e.preventDefault();
    }
    if(document.getElementById('title-screen').classList.contains('active')){
      G.startRun();e.preventDefault();
    }
    if(document.getElementById('gameover-screen').classList.contains('active')){
      G.backToTitle();e.preventDefault();
    }
  }
  if(k==='Escape'){
    if(!document.getElementById('title-screen').classList.contains('active')){
      G.backToTitle();e.preventDefault();
    }
  }
});

// === INIT ===
G.loadSave();

// === TELEGRAM MINI APP ===
if(window.Telegram&&window.Telegram.WebApp){
  try{window.Telegram.WebApp.expand();window.Telegram.WebApp.ready()}catch(e){}
}
</script>
