<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="google-adsense-account" content="ca-pub-7252382819928130">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7252382819928130" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Polarity Dash — 자기장 아케이드</title>
<meta name="description" content="Play Polarity Dash — 자기장 아케이드 - Free HTML5 browser game on eastsea.monster. No download required.">
<script src="https://killedbyapixel.github.io/LittleJS/dist/littlejs.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #game { display: block; touch-action: none; }
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #0ff;
    background: rgba(0,0,0,0.7);
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 0 6px #0ff;
  }
  #mobileControls {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .m-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
    cursor: pointer;
    background: rgba(0,0,0,0.6);
  }
  #btn-north { border-color: #f00; color: #f00; text-shadow: 0 0 6px #f00; }
  #btn-south { border-color: #00f; color: #00f; text-shadow: 0 0 6px #00f; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <span id="scoreLabel">SCORE: 0</span>
  <span id="polLabel">⚡ NORTH</span>
  <span id="livesLabel">❤️❤️❤️</span>
</div>
<div id="mobileControls" id="mobileControls">
  <div class="m-btn" id="btn-north" ontouchstart="setPolarityTouch('N')" onmousedown="setPolarityTouch('N')">N</div>
  <div class="m-btn" id="btn-south" ontouchstart="setPolarityTouch('S')" onmousedown="setPolarityTouch('S')">S</div>
</div>

<script>
'use strict';

const GAME_W = 480, GAME_H = 640;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Retro 8-bit palette
const C = {
  bg:    '#000011',
  grid:  '#001122',
  north: '#ff2020',   // North polarity = red
  south: '#2020ff',   // South polarity = blue
  neutral:'#888888',
  yellow: '#ffff00',
  cyan:   '#00ffff',
  green:  '#00ff44',
  white:  '#ffffff',
  magenta:'#ff00ff',
  dark_r: '#880000',
  dark_b: '#000088',
};

// Scale/letterbox
let scale = 1, offX = 0, offY = 0;
function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww / GAME_W, wh / GAME_H);
  canvas.width = GAME_W * scale;
  canvas.height = GAME_H * scale;
  offX = 0; offY = 0;
}

// Game state
let state = 'menu';  // menu | play | gameover
let score = 0;
let hi = 0;
let lives = 3;
let polarity = 'N';  // N or S
let frame = 0;
let wave = 0;
let waveTimer = 0;
let spawnTimer = 0;
let combo = 0;
let comboTimer = 0;

// Player
const player = {
  x: GAME_W/2, y: GAME_H * 0.75,
  w: 24, h: 28,
  vx: 0, vy: 0,
  invincible: 0,
  shootTimer: 0,
};

// Bullets, enemies, particles
let bullets = [];
let enemies = [];
let particles = [];
let explosions = [];
let powerups = [];
let floatTexts = [];

// Input
const keys = {};
let touchLeft = false, touchRight = false;
let touchDrag = null;

// Enemy types
const ENEMY_TYPES = {
  N: { col: C.north, darkCol: C.dark_r, score: 100, hp: 1, speed: 1.2, size: 14 },
  S: { col: C.south, darkCol: C.dark_b, score: 100, hp: 1, speed: 1.2, size: 14 },
  BIG_N: { col: C.north, darkCol: C.dark_r, score: 300, hp: 3, speed: 0.7, size: 22 },
  BIG_S: { col: C.south, darkCol: C.dark_b, score: 300, hp: 3, speed: 0.7, size: 22 },
  NEUTRAL: { col: C.neutral, darkCol: '#444', score: 150, hp: 2, speed: 1.5, size: 12 },
};

function spawnEnemy(type) {
  const t = ENEMY_TYPES[type];
  enemies.push({
    x: 30 + Math.random() * (GAME_W - 60),
    y: -t.size,
    vx: (Math.random()-0.5) * 0.8,
    vy: t.speed,
    type,
    hp: t.hp,
    maxHp: t.hp,
    size: t.size,
    flashTimer: 0,
    wobble: Math.random() * Math.PI * 2,
  });
}

function spawnWave() {
  wave++;
  const baseCount = 3 + wave * 2;
  const types = wave < 2 ? ['N','S'] : ['N','S','NEUTRAL','BIG_N','BIG_S'];

  for (let i = 0; i < Math.min(baseCount, 12); i++) {
    setTimeout(() => {
      const t = types[Math.floor(Math.random() * Math.min(types.length, 2 + Math.floor(wave/2)))];
      spawnEnemy(t);
    }, i * 200);
  }
}

function resetGame() {
  score = 0;
  lives = 3;
  polarity = 'N';
  frame = 0;
  wave = 0;
  waveTimer = 0;
  spawnTimer = 0;
  combo = 0;
  comboTimer = 0;
  bullets = [];
  enemies = [];
  particles = [];
  explosions = [];
  powerups = [];
  floatTexts = [];
  player.x = GAME_W/2;
  player.y = GAME_H * 0.75;
  player.vx = 0;
  player.vy = 0;
  player.invincible = 0;
  player.shootTimer = 0;
}

function setPolarityTouch(p) {
  polarity = p;
}

// Physics: magnetic force
function magneticForce(enemy) {
  const dx = player.x - enemy.x;
  const dy = player.y - enemy.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 5) return {fx:0, fy:0};

  const ATTRACT_DIST = 200;
  const REPEL_DIST = 160;

  let force = 0;
  let samePolarity = false;

  if (enemy.type === 'NEUTRAL') {
    // Neutral: slightly attracted to player regardless
    force = 0.3;
    samePolarity = false;
  } else if (enemy.type === 'N' || enemy.type === 'BIG_N') {
    samePolarity = (polarity === 'N');
  } else {
    samePolarity = (polarity === 'S');
  }

  if (enemy.type !== 'NEUTRAL') {
    if (samePolarity && dist < REPEL_DIST) {
      // Repel
      force = -2.5 * (1 - dist/REPEL_DIST);
    } else if (!samePolarity && dist < ATTRACT_DIST) {
      // Attract
      force = 1.8 * (1 - dist/ATTRACT_DIST);
    }
  }

  return {
    fx: (dx/dist) * force,
    fy: (dy/dist) * force
  };
}

function spawnParticles(x, y, col, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      color: col,
      size: 2 + Math.random() * 3,
    });
  }
}

function addFloat(x, y, text, col) {
  floatTexts.push({ x, y, text, col, life: 50, vy: -1.2 });
}

function shoot() {
  const col = polarity === 'N' ? C.north : C.south;
  const pierce = polarity === 'N' ? 'N' : 'S';
  // Triple shot for visual flair
  bullets.push({x: player.x, y: player.y - 16, vy: -10, polarity: pierce, col, size: 5});
  if (wave >= 3) {
    bullets.push({x: player.x - 10, y: player.y - 10, vy: -9, vx: -1.5, polarity: pierce, col, size: 4});
    bullets.push({x: player.x + 10, y: player.y - 10, vy: -9, vx: 1.5, polarity: pierce, col, size: 4});
  }
}

function update() {
  frame++;
  if (state !== 'play') return;

  // Wave management
  waveTimer--;
  if (waveTimer <= 0 && enemies.length < 8) {
    spawnWave();
    waveTimer = 180 + Math.max(0, 120 - wave * 10);
  }

  // Combo decay
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) combo = 0;
  }

  // Player movement
  let ax = 0, ay = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A'] || touchLeft) ax -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || touchRight) ax += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) ay -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) ay += 1;

  // Touch drag
  if (touchDrag) {
    const tdx = touchDrag.x - player.x;
    const tdy = touchDrag.y - player.y;
    const dist = Math.sqrt(tdx*tdx + tdy*tdy);
    if (dist > 10) {
      ax = tdx / Math.max(dist, 1) * 2;
      ay = tdy / Math.max(dist, 1) * 2;
    }
  }

  player.vx = player.vx * 0.8 + ax * 0.5;
  player.vy = player.vy * 0.8 + ay * 0.5;
  player.x = Math.max(16, Math.min(GAME_W-16, player.x + player.vx * 4));
  player.y = Math.max(60, Math.min(GAME_H-60, player.y + player.vy * 4));

  if (player.invincible > 0) player.invincible--;

  // Polarity switch via Space
  if (keys[' '] && !keys['_prevSpace']) {
    polarity = polarity === 'N' ? 'S' : 'N';
  }
  keys['_prevSpace'] = keys[' '];

  // Auto shoot
  player.shootTimer--;
  if (player.shootTimer <= 0) {
    shoot();
    player.shootTimer = Math.max(8, 18 - wave);
  }

  // Update bullets
  bullets = bullets.filter(b => b.y > -10 && b.y < GAME_H+10 && b.x > -10 && b.x < GAME_W+10);
  bullets.forEach(b => {
    b.x = (b.x || player.x) + (b.vx||0);
    b.y += b.vy;
  });

  // Update enemies
  enemies.forEach(e => {
    e.wobble += 0.05;
    const { fx, fy } = magneticForce(e);
    e.vx = (e.vx + fx) * 0.95;
    e.vy = ENEMY_TYPES[e.type].speed + fy * 0.5;
    e.x += e.vx;
    e.y += e.vy;
    if (e.flashTimer > 0) e.flashTimer--;
  });

  // Bullet-enemy collision
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      const dx = b.x - e.x;
      const dy = b.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < e.size + (b.size||5)) {
        // Check polarity match — bullets with matching polarity do extra damage
        const typeIsN = (e.type === 'N' || e.type === 'BIG_N');
        const sameAsEnemy = (b.polarity === 'N') === typeIsN;
        const dmg = (e.type === 'NEUTRAL' || sameAsEnemy) ? 1 : 2; // opposite polarity bullet does double damage

        e.hp -= dmg;
        e.flashTimer = 6;
        spawnParticles(b.x, b.y, b.col, 5);
        bullets[bi]._dead = true;

        if (e.hp <= 0) {
          combo++;
          comboTimer = 90;
          const t = ENEMY_TYPES[e.type];
          const pts = t.score * combo;
          score += pts;
          if (score > hi) hi = score;
          addFloat(e.x, e.y, `+${pts}`, combo > 2 ? C.yellow : C.white);
          spawnParticles(e.x, e.y, t.col, 16);
          enemies[ei]._dead = true;
        }
      }
    });
  });

  bullets = bullets.filter(b => !b._dead);
  enemies = enemies.filter(e => !e._dead);

  // Enemy-player collision
  if (player.invincible === 0) {
    enemies.forEach(e => {
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < e.size + 14) {
        lives--;
        player.invincible = 120;
        combo = 0;
        spawnParticles(player.x, player.y, C.white, 20);
        enemies = enemies.filter(x => x !== e);
        if (lives <= 0) {
          state = 'gameover';
          if (score > hi) hi = score;
        }
      }
    });
  }

  // Remove enemies that pass the screen
  enemies = enemies.filter(e => e.y < GAME_H + 50);

  // Update particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--; });
  particles = particles.filter(p => p.life > 0);

  // Update float texts
  floatTexts.forEach(f => { f.y += f.vy; f.life--; });
  floatTexts = floatTexts.filter(f => f.life > 0);

  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreLabel').textContent = `SCORE: ${score}`;
  document.getElementById('polLabel').textContent = polarity === 'N' ?
    '⚡ NORTH [RED]' : '⚡ SOUTH [BLUE]';
  document.getElementById('polLabel').style.color = polarity === 'N' ? '#ff4444' : '#4444ff';
  document.getElementById('polLabel').style.textShadow = polarity === 'N' ? '0 0 8px #f00' : '0 0 8px #00f';
  const h = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3-lives));
  document.getElementById('livesLabel').textContent = h;
}

// Drawing
function drawBackground() {
  ctx.save();
  ctx.scale(scale, scale);

  // Dark grid background
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Grid lines
  ctx.strokeStyle = C.grid;
  ctx.lineWidth = 0.5;
  ctx.globalAlpha = 0.5;
  const gridSize = 32;
  const scrollY = (frame * 0.5) % gridSize;
  for (let y = -gridSize; y < GAME_H + gridSize; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y + scrollY);
    ctx.lineTo(GAME_W, y + scrollY);
    ctx.stroke();
  }
  for (let x = 0; x < GAME_W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, GAME_H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPlayer() {
  ctx.save();
  ctx.scale(scale, scale);
  const p = player;
  const blink = p.invincible > 0 && Math.floor(frame/4) % 2 === 0;
  if (!blink) {
    const col = polarity === 'N' ? C.north : C.south;
    ctx.shadowColor = col;
    ctx.shadowBlur = 16;

    // Ship body
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - 16);
    ctx.lineTo(p.x + 12, p.y + 12);
    ctx.lineTo(p.x, p.y + 6);
    ctx.lineTo(p.x - 12, p.y + 12);
    ctx.closePath();
    ctx.fill();

    // Engine glow
    ctx.fillStyle = C.yellow;
    ctx.shadowColor = C.yellow;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 12, 5, 3 + Math.sin(frame*0.3)*2, 0, 0, Math.PI*2);
    ctx.fill();

    // Polarity indicator
    ctx.fillStyle = C.white;
    ctx.shadowBlur = 0;
    ctx.font = `bold ${10}px "Courier New"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(polarity, p.x, p.y - 2);
  }
  ctx.restore();
}

function drawEnemies() {
  ctx.save();
  ctx.scale(scale, scale);
  enemies.forEach(e => {
    const t = ENEMY_TYPES[e.type];
    const flash = e.flashTimer > 0;
    const col = flash ? C.white : t.col;

    ctx.shadowColor = t.col;
    ctx.shadowBlur = 10;

    // Enemy shape based on type
    ctx.fillStyle = col;
    const wobX = Math.sin(e.wobble) * 2;

    if (e.type === 'BIG_N' || e.type === 'BIG_S') {
      // Pentagon
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const angle = (i/5) * Math.PI*2 - Math.PI/2 + e.wobble*0.1;
        const r = e.size;
        const px2 = e.x + Math.cos(angle)*r + wobX;
        const py2 = e.y + Math.sin(angle)*r;
        i === 0 ? ctx.moveTo(px2, py2) : ctx.lineTo(px2, py2);
      }
      ctx.closePath();
      ctx.fill();
    } else if (e.type === 'NEUTRAL') {
      // Diamond
      ctx.beginPath();
      ctx.moveTo(e.x + wobX, e.y - e.size);
      ctx.lineTo(e.x + e.size, e.y);
      ctx.lineTo(e.x + wobX, e.y + e.size);
      ctx.lineTo(e.x - e.size, e.y);
      ctx.closePath();
      ctx.fill();
    } else {
      // Regular triangle pointing down
      ctx.beginPath();
      ctx.moveTo(e.x + wobX, e.y + e.size);
      ctx.lineTo(e.x + e.size, e.y - e.size*0.5);
      ctx.lineTo(e.x - e.size, e.y - e.size*0.5);
      ctx.closePath();
      ctx.fill();
    }

    // HP bar for multi-hp enemies
    if (e.maxHp > 1) {
      const bw = e.size * 2;
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x - bw/2, e.y - e.size - 8, bw, 3);
      ctx.fillStyle = t.col;
      ctx.fillRect(e.x - bw/2, e.y - e.size - 8, bw * (e.hp/e.maxHp), 3);
    }

    // Polarity label
    if (e.type !== 'NEUTRAL') {
      ctx.shadowBlur = 0;
      ctx.fillStyle = C.white;
      ctx.font = `bold 9px "Courier New"`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(e.type.includes('N') ? 'N' : 'S', e.x, e.y);
    }
  });
  ctx.restore();
}

function drawBullets() {
  ctx.save();
  ctx.scale(scale, scale);
  bullets.forEach(b => {
    ctx.shadowColor = b.col;
    ctx.shadowBlur = 12;
    ctx.fillStyle = b.col;
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.size || 5, (b.size||5)*1.8, 0, 0, Math.PI*2);
    ctx.fill();
    // Trailing dot
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.ellipse(b.x - (b.vx||0)*2, b.y - b.vy*2, (b.size||5)*0.6, (b.size||5)*1.2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
  ctx.restore();
}

function drawParticles() {
  ctx.save();
  ctx.scale(scale, scale);
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawFloatTexts() {
  ctx.save();
  ctx.scale(scale, scale);
  floatTexts.forEach(f => {
    ctx.globalAlpha = f.life / 50;
    ctx.fillStyle = f.col;
    ctx.shadowColor = f.col;
    ctx.shadowBlur = 6;
    ctx.font = 'bold 14px "Courier New"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.text, f.x, f.y);
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCombo() {
  if (combo < 2 || comboTimer <= 0) return;
  ctx.save();
  ctx.scale(scale, scale);
  ctx.globalAlpha = Math.min(1, comboTimer / 30);
  ctx.fillStyle = C.yellow;
  ctx.shadowColor = C.yellow;
  ctx.shadowBlur = 12;
  ctx.font = `bold ${16 + combo}px "Courier New"`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(`${combo}x COMBO`, GAME_W - 10, 50);
  ctx.restore();
}

function drawMagneticField() {
  ctx.save();
  ctx.scale(scale, scale);
  const col = polarity === 'N' ? 'rgba(255,0,0,' : 'rgba(0,0,255,';
  const radius = 160;
  const rings = 3;
  for (let r = 0; r < rings; r++) {
    const t2 = (frame * 0.02 + r / rings) % 1;
    const rr = t2 * radius;
    ctx.globalAlpha = (1 - t2) * 0.15;
    ctx.strokeStyle = polarity === 'N' ? '#ff2020' : '#2020ff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(player.x, player.y, rr, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawMenu() {
  ctx.save();
  ctx.scale(scale, scale);

  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = C.cyan;
  ctx.shadowColor = C.cyan;
  ctx.shadowBlur = 20;
  ctx.font = 'bold 40px "Courier New"';
  ctx.fillText('POLARITY', GAME_W/2, GAME_H*0.25);
  ctx.fillStyle = C.magenta;
  ctx.shadowColor = C.magenta;
  ctx.fillText('DASH', GAME_W/2, GAME_H*0.25 + 48);

  ctx.shadowBlur = 0;
  ctx.fillStyle = C.white;
  ctx.font = '14px "Courier New"';
  ctx.fillText('자기장 극성 아케이드 슈터', GAME_W/2, GAME_H*0.42);

  ctx.fillStyle = '#888';
  ctx.font = '12px "Courier New"';
  ctx.fillText('N극 = 레드 적 밀치기 / S극 적 끌어당기기', GAME_W/2, GAME_H*0.50);
  ctx.fillText('SPACE: 극성 전환 | WASD/방향키: 이동', GAME_W/2, GAME_H*0.55);
  ctx.fillText('같은 극성 총알 = 적 색 일치 (2배 데미지)', GAME_W/2, GAME_H*0.60);

  // Blink start
  if (Math.floor(frame/20) % 2 === 0) {
    ctx.fillStyle = C.green;
    ctx.shadowColor = C.green;
    ctx.shadowBlur = 10;
    ctx.font = 'bold 20px "Courier New"';
    ctx.fillText('[ CLICK TO START ]', GAME_W/2, GAME_H*0.75);
  }

  if (hi > 0) {
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.yellow;
    ctx.font = '14px "Courier New"';
    ctx.fillText(`HI: ${hi}`, GAME_W/2, GAME_H*0.85);
  }

  ctx.restore();
}

function drawGameOver() {
  ctx.save();
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.textAlign = 'center';
  ctx.fillStyle = C.north;
  ctx.shadowColor = C.north;
  ctx.shadowBlur = 20;
  ctx.font = 'bold 36px "Courier New"';
  ctx.fillText('GAME OVER', GAME_W/2, GAME_H*0.35);

  ctx.shadowBlur = 0;
  ctx.fillStyle = C.white;
  ctx.font = '20px "Courier New"';
  ctx.fillText(`SCORE: ${score}`, GAME_W/2, GAME_H*0.48);
  ctx.fillStyle = C.yellow;
  ctx.fillText(`HI: ${hi}`, GAME_W/2, GAME_H*0.56);

  if (Math.floor(frame/20) % 2 === 0) {
    ctx.fillStyle = C.green;
    ctx.shadowColor = C.green;
    ctx.shadowBlur = 10;
    ctx.font = 'bold 18px "Courier New"';
    ctx.fillText('[ CLICK TO RETRY ]', GAME_W/2, GAME_H*0.72);
  }
  ctx.restore();
}

// Main loop
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime)/16, 3);
  lastTime = ts;

  update();

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  if (state === 'menu') {
    drawMenu();
  } else if (state === 'play') {
    drawMagneticField();
    drawBullets();
    drawEnemies();
    drawPlayer();
    drawParticles();
    drawFloatTexts();
    drawCombo();
  } else if (state === 'gameover') {
    drawEnemies();
    drawPlayer();
    drawParticles();
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

// Input handlers
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (state === 'play') {
      polarity = polarity === 'N' ? 'S' : 'N';
    }
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('click', e => {
  if (state === 'menu') {
    state = 'play';
    resetGame();
    spawnWave();
  } else if (state === 'gameover') {
    state = 'play';
    resetGame();
    spawnWave();
  }
});

// Touch controls
let touchIds = {};
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const x = t.clientX / scale;
    const y = t.clientY / scale;

    if (state !== 'play') {
      state = 'play';
      resetGame();
      spawnWave();
      return;
    }

    touchIds[t.identifier] = { x, y };
    touchDrag = { x, y };
  }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (touchIds[t.identifier]) {
      touchIds[t.identifier] = { x: t.clientX / scale, y: t.clientY / scale };
      touchDrag = { x: t.clientX / scale, y: t.clientY / scale };
    }
  }
}, {passive: false});

canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    delete touchIds[t.identifier];
  }
  if (Object.keys(touchIds).length === 0) touchDrag = null;
}, {passive: false});

window.addEventListener('resize', () => {
  resize();
});

function setPolarityTouch(p) {
  polarity = p;
}
window.setPolarityTouch = setPolarityTouch;

// Init
resize();
requestAnimationFrame(loop);
</script>
