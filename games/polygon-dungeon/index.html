    <script>
    const T = GameI18n({
      sub:{en:'Slay endless enemies and survive!',ko:'무한히 밀려오는 적들을 처치하고 생존하라!'},
      start:{en:'Start Game',ko:'게임 시작'}, ctrl:{en:'Move: WASD / Arrow keys / Touch',ko:'이동: WASD / 방향키 / 터치'},
      restart:{en:'Restart',ko:'다시 시작'}, lvUp:{en:'⚔️ Level Up!',ko:'⚔️ 레벨 업!'}
    });
    (function(){var s=function(){
      var ids={i18nSub:'sub',i18nStart:'start',i18nCtrl:'ctrl',i18nRestart:'restart',i18nLvUp:'lvUp'};
      for(var id in ids){var e=document.getElementById(id);if(e)e.textContent=T(ids[id]);}
    };if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',s);else s();})();


    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // Responsive canvas
    function resize() {
        const size = Math.min(window.innerWidth - 20, window.innerHeight - 20, 600);
        canvas.width = size;
        canvas.height = size;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // Game state
    let game = null;
    let animationId = null;
    
    // Colors - Low Poly Style
    const COLORS = {
        floor: '#1a1520',
        floorTile: '#252030',
        player: '#4af',
        playerOutline: '#2af',
        enemy: {
            skeleton: '#e8e0d0',
            zombie: '#5a8050',
            ghost: '#8080f0',
            boss: '#f04040'
        },
        gem: '#4ff',
        gold: '#ffd700',
        damage: '#f44',
        heal: '#4f4'
    };
    
    // Weapon types
    const WEAPONS = {
        sword: { name: _i18nLang==='ko'?'검':'Sword', icon: '⚔️', damage: 25, cooldown: 800, range: 60, type: 'melee' },
        bow: { name: _i18nLang==='ko'?'활':'Bow', icon: '🏹', damage: 15, cooldown: 500, range: 200, type: 'ranged', speed: 8 },
        magic: { name: _i18nLang==='ko'?'마법':'Magic', icon: '✨', damage: 20, cooldown: 1200, range: 120, type: 'aoe', radius: 80 },
        orb: { name: _i18nLang==='ko'?'오브':'Orb', icon: '🔮', damage: 10, cooldown: 300, range: 150, type: 'orbit' },
        lightning: { name: _i18nLang==='ko'?'번개':'Lightning', icon: '⚡', damage: 35, cooldown: 1500, range: 180, type: 'chain' }
    };
    
    // Upgrades
    const UPGRADES = [
        { id: 'sword', name: _i18nLang==='ko'?'검 강화':'Sword Upgrade', desc: _i18nLang==='ko'?'근접 검 획득/강화':'Get/upgrade melee sword', weapon: 'sword' },
        { id: 'bow', name: _i18nLang==='ko'?'활 강화':'Bow Upgrade', desc: _i18nLang==='ko'?'원거리 화살 획득/강화':'Get/upgrade ranged arrows', weapon: 'bow' },
        { id: 'magic', name: _i18nLang==='ko'?'마법 강화':'Magic Upgrade', desc: _i18nLang==='ko'?'범위 마법 획득/강화':'Get/upgrade AoE magic', weapon: 'magic' },
        { id: 'orb', name: _i18nLang==='ko'?'오브 강화':'Orb Upgrade', desc: _i18nLang==='ko'?'회전 오브 획득/강화':'Get/upgrade orbiting orb', weapon: 'orb' },
        { id: 'lightning', name: _i18nLang==='ko'?'번개 강화':'Lightning Upgrade', desc: _i18nLang==='ko'?'연쇄 번개 획득/강화':'Get/upgrade chain lightning', weapon: 'lightning' },
        { id: 'speed', name: _i18nLang==='ko'?'이동 속도':'Move Speed', desc: _i18nLang==='ko'?'이동 속도 +15%':'Move speed +15%', stat: 'speed', value: 0.15 },
        { id: 'maxHp', name: '체력 증가', desc: '최대 체력 +20', stat: 'maxHp', value: 20 },
        { id: 'regen', name: '재생력', desc: '초당 HP 회복 +0.5', stat: 'regen', value: 0.5 },
        { id: 'magnet', name: '자석', desc: '아이템 수집 범위 +20', stat: 'magnet', value: 20 },
        { id: 'luck', name: '행운', desc: '아이템 드랍률 +10%', stat: 'luck', value: 0.1 }
    ];
    
    class Game {
        constructor() {
            this.player = {
                x: canvas.width / 2,
                y: canvas.height / 2,
                radius: 16,
                hp: 100,
                maxHp: 100,
                speed: 3,
                xp: 0,
                xpToLevel: 10,
                level: 1,
                regen: 0,
                magnet: 50,
                luck: 0,
                weapons: {},
                invincible: 0
            };
            this.enemies = [];
            this.projectiles = [];
            this.gems = [];
            this.particles = [];
            this.effects = [];
            this.orbs = [];
            
            this.kills = 0;
            this.gold = 0;
            this.gameTime = 0;
            this.lastTime = Date.now();
            this.spawnTimer = 0;
            this.spawnRate = 2000;
            this.difficulty = 1;
            this.paused = false;
            this.gameOver = false;
            
            this.camera = { x: 0, y: 0 };
            this.input = { x: 0, y: 0 };
            
            this.setupInput();
            this.addWeapon('sword');
        }
        
        setupInput() {
            this.keys = {};
            window.addEventListener('keydown', e => this.keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => this.keys[e.key.toLowerCase()] = false);
            
            // Touch/mouse joystick
            this.touchStart = null;
            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                this.touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                if (this.touchStart) {
                    const dx = e.touches[0].clientX - this.touchStart.x;
                    const dy = e.touches[0].clientY - this.touchStart.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 10) {
                        this.input.x = dx / dist;
                        this.input.y = dy / dist;
                    }
                }
            });
            canvas.addEventListener('touchend', () => {
                this.touchStart = null;
                this.input = { x: 0, y: 0 };
            });
        }
        
        addWeapon(type) {
            if (!this.player.weapons[type]) {
                this.player.weapons[type] = { level: 1, cooldown: 0 };
            } else {
                this.player.weapons[type].level++;
            }
            this.updateWeaponUI();
        }
        
        updateWeaponUI() {
            const container = document.getElementById('weaponIcons');
            container.innerHTML = '';
            for (const [type, data] of Object.entries(this.player.weapons)) {
                const div = document.createElement('div');
                div.className = 'weapon-icon';
                div.innerHTML = WEAPONS[type].icon;
                div.title = `${WEAPONS[type].name} Lv.${data.level}`;
                container.appendChild(div);
            }
        }
        
        spawnEnemy() {
            const angle = Math.random() * Math.PI * 2;
            const dist = canvas.width / 2 + 50;
            const x = this.player.x + Math.cos(angle) * dist;
            const y = this.player.y + Math.sin(angle) * dist;
            
            const types = ['skeleton', 'zombie', 'ghost'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            const baseHp = { skeleton: 30, zombie: 50, ghost: 25 };
            const baseSpeed = { skeleton: 1.5, zombie: 1, ghost: 2 };
            const baseDamage = { skeleton: 10, zombie: 15, ghost: 8 };
            
            this.enemies.push({
                x, y,
                type,
                hp: baseHp[type] * this.difficulty,
                maxHp: baseHp[type] * this.difficulty,
                speed: baseSpeed[type],
                damage: baseDamage[type] * Math.sqrt(this.difficulty),
                radius: type === 'ghost' ? 12 : 14,
                hitFlash: 0
            });
        }
        
        spawnBoss() {
            const angle = Math.random() * Math.PI * 2;
            const dist = canvas.width / 2 + 100;
            this.enemies.push({
                x: this.player.x + Math.cos(angle) * dist,
                y: this.player.y + Math.sin(angle) * dist,
                type: 'boss',
                hp: 500 * this.difficulty,
                maxHp: 500 * this.difficulty,
                speed: 0.8,
                damage: 30,
                radius: 30,
                hitFlash: 0,
                isBoss: true
            });
        }
        
        update(dt) {
            if (this.paused || this.gameOver) return;
            
            this.gameTime += dt;
            this.difficulty = 1 + this.gameTime / 60; // Increase every minute
            
            // Player regen
            if (this.player.regen > 0) {
                this.player.hp = Math.min(this.player.maxHp, this.player.hp + this.player.regen * dt);
            }
            
            // Invincibility
            if (this.player.invincible > 0) this.player.invincible -= dt;
            
            // Input
            let dx = this.input.x, dy = this.input.y;
            if (this.keys['w'] || this.keys['arrowup']) dy -= 1;
            if (this.keys['s'] || this.keys['arrowdown']) dy += 1;
            if (this.keys['a'] || this.keys['arrowleft']) dx -= 1;
            if (this.keys['d'] || this.keys['arrowright']) dx += 1;
            
            const len = Math.sqrt(dx*dx + dy*dy);
            if (len > 0) {
                this.player.x += (dx / len) * this.player.speed;
                this.player.y += (dy / len) * this.player.speed;
            }
            
            // Spawn enemies
            this.spawnTimer += dt * 1000;
            if (this.spawnTimer >= this.spawnRate / this.difficulty) {
                this.spawnTimer = 0;
                const count = Math.floor(1 + this.difficulty / 2);
                for (let i = 0; i < count; i++) this.spawnEnemy();
            }
            
            // Boss every 60 seconds
            if (Math.floor(this.gameTime) % 60 === 0 && Math.floor(this.gameTime) > 0 && 
                !this.enemies.some(e => e.isBoss)) {
                this.spawnBoss();
            }
            
            // Update weapons
            this.updateWeapons(dt);
            
            // Update enemies
            for (const enemy of this.enemies) {
                const dx = this.player.x - enemy.x;
                const dy = this.player.y - enemy.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > 0) {
                    enemy.x += (dx / dist) * enemy.speed;
                    enemy.y += (dy / dist) * enemy.speed;
                }
                
                // Hit player
                if (dist < this.player.radius + enemy.radius && this.player.invincible <= 0) {
                    this.player.hp -= enemy.damage;
                    this.player.invincible = 0.5;
                    this.screenShake(10);
                    this.addParticle(this.player.x, this.player.y, COLORS.damage, 10);
                    
                    if (this.player.hp <= 0) {
                        this.endGame();
                    }
                }
                
                if (enemy.hitFlash > 0) enemy.hitFlash -= dt;
            }
            
            // Update projectiles
            for (let i = this.projectiles.length - 1; i >= 0; i--) {
                const p = this.projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= dt;
                
                // Hit enemies
                for (const enemy of this.enemies) {
                    const dx = p.x - enemy.x;
                    const dy = p.y - enemy.y;
                    if (Math.sqrt(dx*dx + dy*dy) < enemy.radius + p.radius) {
                        this.damageEnemy(enemy, p.damage);
                        if (!p.pierce) p.life = 0;
                        break;
                    }
                }
                
                if (p.life <= 0) this.projectiles.splice(i, 1);
            }
            
            // Update gems
            for (let i = this.gems.length - 1; i >= 0; i--) {
                const gem = this.gems[i];
                const dx = this.player.x - gem.x;
                const dy = this.player.y - gem.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > 0 && dist < this.player.magnet) {
                    gem.x += (dx / dist) * 5;
                    gem.y += (dy / dist) * 5;
                }
                
                if (dist < this.player.radius + 10) {
                    if (gem.type === 'xp') {
                        this.player.xp += gem.value;
                        if (this.player.xp >= this.player.xpToLevel) {
                            this.levelUp();
                        }
                    } else if (gem.type === 'gold') {
                        this.gold += gem.value;
                    } else if (gem.type === 'heal') {
                        this.player.hp = Math.min(this.player.maxHp, this.player.hp + 20);
                        this.addParticle(this.player.x, this.player.y, COLORS.heal, 8);
                    }
                    this.gems.splice(i, 1);
                }
            }
            
            // Update particles
            for (let i = this.particles.length - 1; i >= 0; i--) {
                const p = this.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= dt;
                p.vy += 0.1;
                if (p.life <= 0) this.particles.splice(i, 1);
            }
            
            // Update orbs
            for (const orb of this.orbs) {
                orb.angle += orb.speed;
                orb.x = this.player.x + Math.cos(orb.angle) * orb.dist;
                orb.y = this.player.y + Math.sin(orb.angle) * orb.dist;
                
                // Hit enemies
                for (const enemy of this.enemies) {
                    const dx = orb.x - enemy.x;
                    const dy = orb.y - enemy.y;
                    if (Math.sqrt(dx*dx + dy*dy) < enemy.radius + orb.radius) {
                        if (!orb.hitList.has(enemy)) {
                            this.damageEnemy(enemy, orb.damage);
                            orb.hitList.add(enemy);
                            setTimeout(() => orb.hitList.delete(enemy), 500);
                        }
                    }
                }
            }
            
            // Camera follow
            this.camera.x = this.player.x - canvas.width / 2;
            this.camera.y = this.player.y - canvas.height / 2;
            
            // Remove dead enemies
            this.enemies = this.enemies.filter(e => e.hp > 0);
            
            // Update UI
            this.updateUI();
        }
        
        updateWeapons(dt) {
            for (const [type, data] of Object.entries(this.player.weapons)) {
                data.cooldown -= dt * 1000;
                if (data.cooldown <= 0) {
                    const weapon = WEAPONS[type];
                    const cooldown = weapon.cooldown / (1 + data.level * 0.1);
                    data.cooldown = cooldown;
                    
                    const target = this.findNearestEnemy(weapon.range * (1 + data.level * 0.1));
                    if (!target && type !== 'orb') continue;
                    
                    const damage = weapon.damage * (1 + data.level * 0.2);
                    
                    if (type === 'sword') {
                        // Melee slash
                        this.effects.push({
                            type: 'slash',
                            x: this.player.x,
                            y: this.player.y,
                            angle: target ? Math.atan2(target.y - this.player.y, target.x - this.player.x) : 0,
                            radius: weapon.range * (1 + data.level * 0.1),
                            life: 0.2
                        });
                        for (const enemy of this.enemies) {
                            const dx = enemy.x - this.player.x;
                            const dy = enemy.y - this.player.y;
                            if (Math.sqrt(dx*dx + dy*dy) < weapon.range * (1 + data.level * 0.1)) {
                                this.damageEnemy(enemy, damage);
                            }
                        }
                    } else if (type === 'bow') {
                        const count = Math.min(data.level, 5);
                        for (let i = 0; i < count; i++) {
                            const spread = (i - (count-1)/2) * 0.2;
                            const angle = Math.atan2(target.y - this.player.y, target.x - this.player.x) + spread;
                            this.projectiles.push({
                                x: this.player.x,
                                y: this.player.y,
                                vx: Math.cos(angle) * weapon.speed,
                                vy: Math.sin(angle) * weapon.speed,
                                damage,
                                radius: 5,
                                life: 2,
                                color: '#fa0'
                            });
                        }
                    } else if (type === 'magic') {
                        this.effects.push({
                            type: 'explosion',
                            x: target.x,
                            y: target.y,
                            radius: weapon.radius * (1 + data.level * 0.1),
                            life: 0.3,
                            maxLife: 0.3
                        });
                        for (const enemy of this.enemies) {
                            const dx = enemy.x - target.x;
                            const dy = enemy.y - target.y;
                            if (Math.sqrt(dx*dx + dy*dy) < weapon.radius * (1 + data.level * 0.1)) {
                                this.damageEnemy(enemy, damage);
                            }
                        }
                    } else if (type === 'orb') {
                        if (this.orbs.length < data.level + 2) {
                            this.orbs.push({
                                angle: (this.orbs.length / (data.level + 2)) * Math.PI * 2,
                                dist: 60,
                                speed: 0.05,
                                damage: damage,
                                radius: 12,
                                x: this.player.x,
                                y: this.player.y,
                                hitList: new Set()
                            });
                        }
                    } else if (type === 'lightning') {
                        if (target) {
                            const chainCount = 2 + data.level;
                            let current = target;
                            const hit = new Set([current]);
                            
                            for (let i = 0; i < chainCount && current; i++) {
                                this.damageEnemy(current, damage * Math.pow(0.8, i));
                                this.effects.push({
                                    type: 'lightning',
                                    x1: i === 0 ? this.player.x : this.effects[this.effects.length-1]?.x2 || this.player.x,
                                    y1: i === 0 ? this.player.y : this.effects[this.effects.length-1]?.y2 || this.player.y,
                                    x2: current.x,
                                    y2: current.y,
                                    life: 0.2
                                });
                                
                                // Find next target
                                let next = null;
                                let minDist = 150;
                                for (const e of this.enemies) {
                                    if (hit.has(e)) continue;
                                    const d = Math.sqrt((e.x-current.x)**2 + (e.y-current.y)**2);
                                    if (d < minDist) {
                                        minDist = d;
                                        next = e;
                                    }
                                }
                                if (next) hit.add(next);
                                current = next;
                            }
                        }
                    }
                }
            }
        }
        
        findNearestEnemy(range) {
            let nearest = null;
            let minDist = range;
            for (const enemy of this.enemies) {
                const dx = enemy.x - this.player.x;
                const dy = enemy.y - this.player.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = enemy;
                }
            }
            return nearest;
        }
        
        damageEnemy(enemy, damage) {
            enemy.hp -= damage;
            enemy.hitFlash = 0.1;
            this.addParticle(enemy.x, enemy.y, '#fff', 5);
            this.screenShake(3);
            
            if (enemy.hp <= 0) {
                this.kills++;
                
                // Drop gems
                const xpCount = enemy.isBoss ? 10 : 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < xpCount; i++) {
                    this.gems.push({
                        x: enemy.x + (Math.random() - 0.5) * 20,
                        y: enemy.y + (Math.random() - 0.5) * 20,
                        type: 'xp',
                        value: enemy.isBoss ? 5 : 1
                    });
                }
                
                // Gold chance
                if (Math.random() < 0.3 + this.player.luck) {
                    this.gems.push({
                        x: enemy.x,
                        y: enemy.y,
                        type: 'gold',
                        value: enemy.isBoss ? 50 : 5
                    });
                }
                
                // Heal chance
                if (Math.random() < 0.05 + this.player.luck * 0.5) {
                    this.gems.push({
                        x: enemy.x,
                        y: enemy.y,
                        type: 'heal',
                        value: 20
                    });
                }
                
                // Death particles
                for (let i = 0; i < 8; i++) {
                    this.addParticle(enemy.x, enemy.y, COLORS.enemy[enemy.type], 6);
                }
            }
        }
        
        addParticle(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                this.particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    color,
                    radius: 3 + Math.random() * 3,
                    life: 0.3 + Math.random() * 0.3
                });
            }
        }
        
        screenShake(intensity) {
            this.shakeIntensity = intensity;
            setTimeout(() => this.shakeIntensity = 0, 100);
        }
        
        levelUp() {
            this.player.level++;
            this.player.xp -= this.player.xpToLevel;
            this.player.xpToLevel = Math.floor(this.player.xpToLevel * 1.5);
            this.paused = true;
            this.showLevelUpModal();
        }
        
        showLevelUpModal() {
            const modal = document.getElementById('levelUpModal');
            const options = document.getElementById('upgradeOptions');
            options.innerHTML = '';
            
            // Pick 3 random upgrades
            const available = [...UPGRADES].sort(() => Math.random() - 0.5).slice(0, 3);
            
            for (const upgrade of available) {
                const btn = document.createElement('button');
                btn.className = 'upgrade-btn';
                
                let levelText = '';
                if (upgrade.weapon) {
                    const current = this.player.weapons[upgrade.weapon]?.level || 0;
                    levelText = current > 0 ? ` (Lv.${current} → ${current+1})` : ' (신규!)';
                }
                
                btn.innerHTML = `<div class="name">${upgrade.name}${levelText}</div><div class="desc">${upgrade.desc}</div>`;
                btn.onclick = () => this.selectUpgrade(upgrade);
                options.appendChild(btn);
            }
            
            modal.style.display = 'flex';
        }
        
        selectUpgrade(upgrade) {
            if (upgrade.weapon) {
                this.addWeapon(upgrade.weapon);
            } else if (upgrade.stat) {
                this.player[upgrade.stat] += upgrade.value;
                if (upgrade.stat === 'maxHp') {
                    this.player.hp += upgrade.value;
                }
            }
            
            document.getElementById('levelUpModal').style.display = 'none';
            this.paused = false;
        }
        
        updateUI() {
            const time = Math.floor(this.gameTime);
            const mins = Math.floor(time / 60).toString().padStart(2, '0');
            const secs = (time % 60).toString().padStart(2, '0');
            
            document.getElementById('levelDisplay').textContent = `Lv.${this.player.level}`;
            document.getElementById('timeDisplay').textContent = `${mins}:${secs}`;
            document.getElementById('killDisplay').textContent = `처치: ${this.kills}`;
            document.getElementById('goldDisplay').textContent = `💰 ${this.gold}`;
            
            document.getElementById('hpFill').style.width = `${(this.player.hp / this.player.maxHp) * 100}%`;
            document.getElementById('xpFill').style.width = `${(this.player.xp / this.player.xpToLevel) * 100}%`;
        }
        
        draw() {
            ctx.save();
            
            // Camera shake
            if (this.shakeIntensity) {
                ctx.translate(
                    (Math.random() - 0.5) * this.shakeIntensity,
                    (Math.random() - 0.5) * this.shakeIntensity
                );
            }
            
            // Background
            ctx.fillStyle = COLORS.floor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Floor tiles (dungeon feel)
            ctx.fillStyle = COLORS.floorTile;
            const tileSize = 40;
            const offsetX = -this.camera.x % tileSize;
            const offsetY = -this.camera.y % tileSize;
            for (let x = -tileSize; x < canvas.width + tileSize; x += tileSize) {
                for (let y = -tileSize; y < canvas.height + tileSize; y += tileSize) {
                    if ((Math.floor((x + this.camera.x) / tileSize) + Math.floor((y + this.camera.y) / tileSize)) % 2 === 0) {
                        ctx.fillRect(x + offsetX, y + offsetY, tileSize - 2, tileSize - 2);
                    }
                }
            }
            
            ctx.translate(-this.camera.x, -this.camera.y);
            
            // Draw gems
            for (const gem of this.gems) {
                ctx.beginPath();
                if (gem.type === 'xp') {
                    ctx.fillStyle = COLORS.gem;
                    this.drawPolygon(gem.x, gem.y, 6, 6);
                } else if (gem.type === 'gold') {
                    ctx.fillStyle = COLORS.gold;
                    this.drawPolygon(gem.x, gem.y, 8, 5);
                } else if (gem.type === 'heal') {
                    ctx.fillStyle = COLORS.heal;
                    ctx.fillRect(gem.x - 4, gem.y - 2, 8, 4);
                    ctx.fillRect(gem.x - 2, gem.y - 4, 4, 8);
                }
            }
            
            // Draw enemies
            for (const enemy of this.enemies) {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                
                const color = enemy.hitFlash > 0 ? '#fff' : COLORS.enemy[enemy.type];
                ctx.fillStyle = color;
                
                if (enemy.type === 'skeleton') {
                    // Low poly skeleton
                    this.drawPolygon(0, 0, enemy.radius, 6);
                    ctx.fillStyle = '#222';
                    ctx.beginPath();
                    ctx.arc(-4, -3, 3, 0, Math.PI * 2);
                    ctx.arc(4, -3, 3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (enemy.type === 'zombie') {
                    // Low poly zombie
                    this.drawPolygon(0, 0, enemy.radius, 5);
                    ctx.fillStyle = '#2a4020';
                    ctx.fillRect(-5, 2, 10, 4);
                } else if (enemy.type === 'ghost') {
                    // Ghostly shape
                    ctx.globalAlpha = 0.7;
                    this.drawPolygon(0, 0, enemy.radius, 8);
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-3, -2, 2, 0, Math.PI * 2);
                    ctx.arc(3, -2, 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (enemy.type === 'boss') {
                    // Big boss
                    ctx.fillStyle = enemy.hitFlash > 0 ? '#fff' : COLORS.enemy.boss;
                    this.drawPolygon(0, 0, enemy.radius, 8);
                    ctx.fillStyle = '#800';
                    ctx.font = 'bold 20px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('👹', 0, 6);
                    
                    // HP bar
                    ctx.fillStyle = '#400';
                    ctx.fillRect(-25, -enemy.radius - 10, 50, 6);
                    ctx.fillStyle = '#f44';
                    ctx.fillRect(-25, -enemy.radius - 10, 50 * (enemy.hp / enemy.maxHp), 6);
                }
                
                ctx.restore();
            }
            
            // Draw orbs
            for (const orb of this.orbs) {
                ctx.fillStyle = '#a6f';
                ctx.shadowColor = '#a6f';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Draw projectiles
            for (const p of this.projectiles) {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw effects
            for (let i = this.effects.length - 1; i >= 0; i--) {
                const e = this.effects[i];
                e.life -= 0.016;
                
                if (e.type === 'slash') {
                    ctx.save();
                    ctx.translate(this.player.x, this.player.y);
                    ctx.rotate(e.angle);
                    ctx.fillStyle = `rgba(200, 220, 255, ${e.life * 3})`;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, e.radius, -0.5, 0.5);
                    ctx.fill();
                    ctx.restore();
                } else if (e.type === 'explosion') {
                    const progress = 1 - e.life / e.maxLife;
                    ctx.fillStyle = `rgba(150, 100, 255, ${e.life * 2})`;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius * progress, 0, Math.PI * 2);
                    ctx.fill();
                } else if (e.type === 'lightning') {
                    ctx.strokeStyle = `rgba(180, 200, 255, ${e.life * 5})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(e.x1, e.y1);
                    // Jagged line
                    const dx = e.x2 - e.x1, dy = e.y2 - e.y1;
                    const segments = 4;
                    for (let j = 1; j <= segments; j++) {
                        const t = j / segments;
                        const jitter = j < segments ? (Math.random() - 0.5) * 20 : 0;
                        ctx.lineTo(e.x1 + dx * t + jitter, e.y1 + dy * t + jitter);
                    }
                    ctx.stroke();
                }
                
                if (e.life <= 0) this.effects.splice(i, 1);
            }
            
            // Draw particles
            for (const p of this.particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life * 2;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            
            // Draw player
            ctx.save();
            ctx.translate(this.player.x, this.player.y);
            
            if (this.player.invincible > 0) {
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.02) * 0.3;
            }
            
            // Low poly player
            ctx.fillStyle = COLORS.player;
            this.drawPolygon(0, 0, this.player.radius, 6);
            
            ctx.strokeStyle = COLORS.playerOutline;
            ctx.lineWidth = 2;
            ctx.beginPath();
            this.drawPolygonPath(0, 0, this.player.radius, 6);
            ctx.stroke();
            
            // Face
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-4, -3, 3, 0, Math.PI * 2);
            ctx.arc(4, -3, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(-4, -3, 1.5, 0, Math.PI * 2);
            ctx.arc(4, -3, 1.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            ctx.restore();
        }
        
        drawPolygon(x, y, radius, sides) {
            ctx.beginPath();
            this.drawPolygonPath(x, y, radius, sides);
            ctx.fill();
        }
        
        drawPolygonPath(x, y, radius, sides) {
            for (let i = 0; i < sides; i++) {
                const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
                const px = x + Math.cos(angle) * radius;
                const py = y + Math.sin(angle) * radius;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        }
        
        endGame() {
            this.gameOver = true;
            document.getElementById('gameOverScreen').style.display = 'flex';
            
            const time = Math.floor(this.gameTime);
            const mins = Math.floor(time / 60).toString().padStart(2, '0');
            const secs = (time % 60).toString().padStart(2, '0');
            
            document.getElementById('finalTime').textContent = `생존 시간: ${mins}:${secs}`;
            document.getElementById('finalKills').textContent = `처치 수: ${this.kills}`;
            document.getElementById('finalLevel').textContent = `도달 레벨: ${this.player.level}`;
        }
    }
    
    function gameLoop() {
        if (game) {
            const now = Date.now();
            const dt = (now - game.lastTime) / 1000;
            game.lastTime = now;
            
            game.update(Math.min(dt, 0.1));
            game.draw();
        }
        animationId = requestAnimationFrame(gameLoop);
    }
    
    function startGame() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('levelUpModal').style.display = 'none';
        
        if (animationId) cancelAnimationFrame(animationId);
        
        game = new Game();
        game.lastTime = Date.now();
        gameLoop();
    }

    <!-- leaderboard-integration:polygon-dungeon -->
    <div id="leaderboard" data-lb-slug="polygon-dungeon" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "polygon-dungeon";
      const CANDIDATE_OBJECTS = ["ids", "COLORS", "WEAPONS", "baseHp", "baseSpeed", "baseDamage"];
      const END_METHODS = ["endGame", "gameOver", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["startGame", "newGame", "restart", "retry", "resetGame", "initGame", "start", "beginGame", "playAgain"];
      const SCORE_KEYS = ["gold", "level", "kills", "time", "xp", "score", "points", "coins", "wave", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
