  <text x="86" y="534" fill="#4E4034" font-family="system-ui, Apple SD Gothic Neo, sans-serif" font-size="28" font-weight="700">Rotate the prism, reflect the right color, and draft a new oath every two waves.</text>
  <text x="86" y="576" fill="#6B5849" font-family="system-ui, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="600">색이 맞는 면으로 볼트를 반사하고, 두 웨이브마다 초안으로 보루의 규칙을 바꾸세요.</text>
