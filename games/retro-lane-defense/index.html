<script>
// ── Web Audio SFX ──────────────────────────────────────────────
let _actx = null;
function getAC() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}
function sfxPlace() {
  const ctx = getAC(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'square'; o.frequency.value = 440;
  g.gain.setValueAtTime(0.12, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.12);
}
function sfxHit() {
  const ctx = getAC(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(300, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.15);
  g.gain.setValueAtTime(0.2, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.18);
}
function sfxDie() {
  const ctx = getAC(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(220, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(55, ctx.currentTime + 0.4);
  g.gain.setValueAtTime(0.3, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.45);
}
function sfxWave() {
  const ctx = getAC();
  [200,250,300].forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='triangle'; o.frequency.value=f;
    const t=ctx.currentTime+i*0.1;
    g.gain.setValueAtTime(0.15,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t+0.2);
  });
}
function sfxGameOver() {
  const ctx = getAC(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(440,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(55,ctx.currentTime+1.2);
  g.gain.setValueAtTime(0.35,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.3);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+1.3);
}
function sfxWin() {
  const ctx=getAC();
  [523,659,784,1047].forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='square'; o.frequency.value=f;
    const t=ctx.currentTime+i*0.1;
    g.gain.setValueAtTime(0.14,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t+0.18);
  });
}

// ── Constants & Palette ────────────────────────────────────────
const NUM_LANES = 5;
// Retro pixel palette: green+brown+gray
const PAL = {
  bg: '#3a3a2a',
  lane: ['#2e3820','#323c22','#2a3418','#2e3820','#323c22'],
  base: '#4a3010',
  baseWall: '#6a4a20',
  grass: '#4a6a2a',
  grassDark: '#3a5620',
  gridLine: '#3a4020',
  // units
  archer: '#5a8a3a',
  spearman: '#8a6a3a',
  cannon: '#5a5a5a',
  wall: '#8a7a5a',
  // enemies
  grunt: '#8a3a2a',
  runner: '#6a2a5a',
  brute: '#4a3a8a',
  // ui
  gold: '#c8a820',
  hp: '#c83030',
  text: '#b8c888',
  highlight: '#c8e840'
};

const UNIT_DEFS = {
  archer:   {cost:25, hp:30,  atk:12, range:180, atkSpd:1.2, color:PAL.archer,   label:'궁',  emoji:'🏹'},
  spearman: {cost:40, hp:80,  atk:20, range:60,  atkSpd:0.8, color:PAL.spearman, label:'창',  emoji:'🗡'},
  cannon:   {cost:70, hp:50,  atk:45, range:220, atkSpd:0.4, color:PAL.cannon,   label:'포',  emoji:'💣'},
  wall:     {cost:15, hp:150, atk:0,  range:0,   atkSpd:0,   color:PAL.wall,     label:'벽',  emoji:'🧱'}
};
const ENEMY_DEFS = {
  grunt:  {hp:40,  atk:8,  spd:40,  reward:10, color:PAL.grunt,  label:'졸'},
  runner: {hp:20,  atk:5,  spd:80,  reward:8,  color:PAL.runner, label:'속'},
  brute:  {hp:120, atk:18, spd:20,  reward:25, color:PAL.brute,  label:'괴'}
};

// ── Canvas Setup ───────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx2 = canvas.getContext('2d');

const LANE_H = 80;
const BASE_W = 60;
let CW, CH;

function resize() {
  const maxW = Math.min(window.innerWidth, 480);
  const topH = document.getElementById('topBar').offsetHeight;
  const shopH = document.getElementById('shopBar').offsetHeight;
  const availH = window.innerHeight - topH - shopH;
  const gameH = NUM_LANES * LANE_H;
  const scale = Math.min(maxW / 480, availH / gameH);
  CW = Math.floor(480 * scale);
  CH = Math.floor(gameH * scale);
  canvas.width = CW;
  canvas.height = CH;
  canvas.style.width = CW + 'px';
  canvas.style.height = CH + 'px';
}

// ── Game State ─────────────────────────────────────────────────
let state = 'idle'; // idle, wave, between, gameover
let score = 0, gold = 50, baseHp = 20, wave = 1;
let units = [], enemies = [], projectiles = [], particles = [];
let selectedUnit = 'archer';
let waveTimer = 0, spawnQueue = [], spawnTimer = 0;
let bestScore = parseInt(localStorage.getItem('rld_best') || '0');

document.getElementById('bestScore').textContent = bestScore;

// Scale factor for drawing (480 wide logical)
function sx(x) { return x * CW / 480; }
function sy(y) { return y * CH / (NUM_LANES * LANE_H); }
function laneY(lane) { return lane * LANE_H + LANE_H / 2; } // logical center Y of lane

// ── Spawn Wave ────────────────────────────────────────────────
function buildWave(w) {
  const q = [];
  const types = ['grunt'];
  if (w >= 3) types.push('runner');
  if (w >= 5) types.push('brute');
  const count = 5 + w * 3;
  for (let i = 0; i < count; i++) {
    const t = types[Math.floor(Math.random() * types.length)];
    const lane = Math.floor(Math.random() * NUM_LANES);
    q.push({type: t, lane, delay: i * 0.7});
  }
  return q;
}

function startWave() {
  if (state === 'gameover') return;
  spawnQueue = buildWave(wave);
  spawnTimer = 0;
  state = 'wave';
  sfxWave();
}

// ── Unit/Enemy helpers ─────────────────────────────────────────
function placeUnit(type, lane) {
  const def = UNIT_DEFS[type];
  if (gold < def.cost) { sfxDie(); return false; }
  // find slot in lane (max 3 slots from base)
  const slotsUsed = units.filter(u => u.lane === lane).length;
  if (slotsUsed >= 4) return false;
  gold -= def.cost;
  const slotX = 480 - BASE_W - 40 - slotsUsed * 50;
  units.push({
    type, lane, x: slotX,
    hp: def.hp, maxHp: def.hp,
    atk: def.atk, range: def.range, atkSpd: def.atkSpd,
    color: def.color, label: def.label,
    atkTimer: 0, dead: false
  });
  sfxPlace();
  updateUI();
  return true;
}

function spawnEnemy(type, lane) {
  const def = ENEMY_DEFS[type];
  enemies.push({
    type, lane, x: -20,
    hp: def.hp * (1 + (wave-1)*0.15),
    maxHp: def.hp * (1 + (wave-1)*0.15),
    atk: def.atk, spd: def.spd,
    reward: def.reward, color: def.color, label: def.label,
    atkTimer: 0, dead: false
  });
}

// ── Particles ─────────────────────────────────────────────────
function addParticle(x, y, color, count=5) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 20 + Math.random() * 60;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd,
      life: 0.5 + Math.random()*0.3,
      maxLife: 0.8,
      color, r: 2+Math.random()*3
    });
  }
}

// ── Update ────────────────────────────────────────────────────
let lastTime = 0;
function update(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (state === 'gameover') { draw(); requestAnimationFrame(update); return; }
  if (state === 'idle') { draw(); requestAnimationFrame(update); return; }

  // Spawn enemies
  if (state === 'wave') {
    spawnTimer += dt;
    while (spawnQueue.length && spawnQueue[0].delay <= spawnTimer) {
      const s = spawnQueue.shift();
      spawnEnemy(s.type, s.lane);
    }
    if (spawnQueue.length === 0 && enemies.filter(e=>!e.dead).length === 0) {
      // wave clear
      wave++;
      gold += 30 + wave * 5;
      score += wave * 50;
      sfxWin();
      state = 'between';
      updateUI();
    }
  }

  // Move enemies
  enemies.forEach(e => {
    if (e.dead) return;
    // Find nearest unit/wall in same lane ahead of enemy
    const targets = units.filter(u => !u.dead && u.lane === e.lane && u.x > e.x - 10);
    const nearest = targets.sort((a,b)=>a.x-b.x)[0];
    if (nearest && Math.abs(nearest.x - e.x) < 30) {
      // attack unit
      e.atkTimer += dt;
      if (e.atkTimer >= 1/0.8) {
        e.atkTimer = 0;
        nearest.hp -= e.atk;
        sfxHit();
        addParticle(sx(nearest.x), sy(nearest.y || laneY(nearest.lane)), '#ff6040', 3);
        if (nearest.hp <= 0) {
          nearest.dead = true;
          addParticle(sx(nearest.x), sy(laneY(nearest.lane)), nearest.color, 6);
        }
      }
    } else {
      e.x += e.spd * dt;
    }
    // Reached base
    if (e.x >= 480 - BASE_W - 5) {
      baseHp--;
      e.dead = true;
      sfxDie();
      addParticle(sx(480 - BASE_W), sy(laneY(e.lane)), PAL.hp, 8);
      updateUI();
      if (baseHp <= 0) {
        state = 'gameover';
        sfxGameOver();
        endGame();
      }
    }
  });

  // Unit attacks
  units.forEach(u => {
    if (u.dead || u.atk === 0) return;
    u.atkTimer += dt;
    if (u.atkTimer >= 1/u.atkSpd) {
      const targets = enemies.filter(e => !e.dead && e.lane === u.lane && Math.abs(e.x - u.x) <= u.range);
      if (targets.length > 0) {
        u.atkTimer = 0;
        const target = targets.sort((a,b)=>a.x-b.x)[0];
        target.hp -= u.atk;
        sfxHit();
        // projectile
        projectiles.push({
          x: u.x, y: laneY(u.lane),
          tx: target.x, ty: laneY(target.lane),
          color: u.type==='cannon'?'#f07030':'#c8e840',
          life: 0.2, maxLife: 0.2
        });
        if (target.hp <= 0) {
          target.dead = true;
          gold += target.reward;
          score += target.reward * 2;
          sfxWin();
          addParticle(sx(target.x), sy(laneY(target.lane)), target.color, 7);
          updateUI();
        }
      }
    }
  });

  // Projectiles
  projectiles.forEach(p => { p.life -= dt; });
  projectiles = projectiles.filter(p => p.life > 0);

  // Particles
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 80 * dt;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Cleanup
  units = units.filter(u => !u.dead);
  enemies = enemies.filter(e => !e.dead);

  draw();
  requestAnimationFrame(update);
}

// ── Draw ──────────────────────────────────────────────────────
function draw() {
  ctx2.clearRect(0,0,CW,CH);
  const scX = CW/480, scY = CH/(NUM_LANES*LANE_H);

  // Lanes background
  for (let i = 0; i < NUM_LANES; i++) {
    ctx2.fillStyle = PAL.lane[i];
    ctx2.fillRect(0, i*LANE_H*scY, CW, LANE_H*scY);
    // grass strips
    ctx2.fillStyle = i%2===0 ? PAL.grass : PAL.grassDark;
    ctx2.fillRect(0, i*LANE_H*scY, CW, 3*scY);
    ctx2.fillRect(0, (i+1)*LANE_H*scY - 3*scY, CW, 3*scY);
    // lane label
    ctx2.fillStyle = PAL.gridLine;
    ctx2.font = `${9*scY}px 'Courier New'`;
    ctx2.fillText(`LANE ${i+1}`, 5*scX, (i*LANE_H+14)*scY);
  }

  // Base
  ctx2.fillStyle = PAL.base;
  ctx2.fillRect((480-BASE_W)*scX, 0, BASE_W*scX, CH);
  ctx2.fillStyle = PAL.baseWall;
  ctx2.fillRect((480-BASE_W)*scX, 0, 6*scX, CH);
  // Base HP indicator
  ctx2.fillStyle = '#2a1a08';
  ctx2.font = `bold ${10*scY}px 'Courier New'`;
  ctx2.fillStyle = PAL.hp;
  ctx2.save();
  ctx2.translate((480-BASE_W/2)*scX, CH/2);
  ctx2.rotate(-Math.PI/2);
  ctx2.textAlign='center';
  ctx2.fillText(`❤ ${baseHp}`, 0, 5*scX);
  ctx2.restore();
  ctx2.textAlign='left';

  // Slot indicators
  for (let lane=0; lane<NUM_LANES; lane++) {
    for (let slot=0; slot<4; slot++) {
      const sx2 = (480-BASE_W-40-slot*50)*scX;
      const sy2 = (lane*LANE_H + LANE_H/2 - 15)*scY;
      ctx2.strokeStyle = '#2a3018';
      ctx2.lineWidth = 1;
      ctx2.strokeRect(sx2-15*scX, sy2, 30*scX, 30*scY);
    }
  }

  // Units
  units.forEach(u => {
    if (u.dead) return;
    const ux = u.x * scX, uy = laneY(u.lane) * scY;
    // body
    ctx2.fillStyle = u.color;
    ctx2.fillRect(ux-14*scX, uy-14*scY, 28*scX, 28*scY);
    // border
    ctx2.strokeStyle = '#c8e840';
    ctx2.lineWidth = 1.5;
    ctx2.strokeRect(ux-14*scX, uy-14*scY, 28*scX, 28*scY);
    // label
    ctx2.fillStyle = '#ffffff';
    ctx2.font = `bold ${11*scY}px 'Courier New'`;
    ctx2.textAlign = 'center';
    ctx2.fillText(u.label, ux, uy+4*scY);
    // HP bar
    const hpRatio = u.hp / u.maxHp;
    ctx2.fillStyle = '#1a1a1a';
    ctx2.fillRect(ux-14*scX, uy-20*scY, 28*scX, 4*scY);
    ctx2.fillStyle = hpRatio>0.5?'#4ac840':'#c84020';
    ctx2.fillRect(ux-14*scX, uy-20*scY, 28*hpRatio*scX, 4*scY);
    ctx2.textAlign='left';
  });

  // Enemies
  enemies.forEach(e => {
    if (e.dead) return;
    const ex = e.x * scX, ey = laneY(e.lane) * scY;
    ctx2.fillStyle = e.color;
    ctx2.fillRect(ex-12*scX, ey-12*scY, 24*scX, 24*scY);
    ctx2.strokeStyle = '#ff4040';
    ctx2.lineWidth = 1.5;
    ctx2.strokeRect(ex-12*scX, ey-12*scY, 24*scX, 24*scY);
    ctx2.fillStyle = '#ffffff';
    ctx2.font = `bold ${10*scY}px 'Courier New'`;
    ctx2.textAlign='center';
    ctx2.fillText(e.label, ex, ey+3*scY);
    const hpRatio = e.hp / e.maxHp;
    ctx2.fillStyle='#1a1a1a';
    ctx2.fillRect(ex-12*scX, ey-18*scY, 24*scX, 3.5*scY);
    ctx2.fillStyle='#c84020';
    ctx2.fillRect(ex-12*scX, ey-18*scY, 24*hpRatio*scX, 3.5*scY);
    ctx2.textAlign='left';
  });

  // Projectiles
  projectiles.forEach(p => {
    const prog = 1 - p.life/p.maxLife;
    const px = (p.x + (p.tx-p.x)*prog)*scX;
    const py = laneY(Math.round(p.y/LANE_H)*LANE_H/LANE_H)*scY;
    ctx2.beginPath();
    ctx2.arc(px, py, 4*scX, 0, Math.PI*2);
    ctx2.fillStyle = p.color;
    ctx2.fill();
  });

  // Particles
  particles.forEach(p => {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx2.globalAlpha = alpha;
    ctx2.beginPath();
    ctx2.arc(p.x, p.y, p.r*scX, 0, Math.PI*2);
    ctx2.fillStyle = p.color;
    ctx2.fill();
  });
  ctx2.globalAlpha = 1;

  // Between-wave overlay
  if (state === 'between') {
    ctx2.fillStyle = 'rgba(20,30,10,0.75)';
    ctx2.fillRect(0,0,CW,CH);
    ctx2.fillStyle = PAL.highlight;
    ctx2.font = `bold ${18*scY}px 'Courier New'`;
    ctx2.textAlign='center';
    ctx2.fillText(`웨이브 ${wave-1} 클리어!`, CW/2, CH/2-15*scY);
    ctx2.fillStyle = PAL.text;
    ctx2.font = `${11*scY}px 'Courier New'`;
    ctx2.fillText('스페이스 / 탭으로 다음 웨이브', CW/2, CH/2+10*scY);
    ctx2.textAlign='left';
  }
}

// ── UI ────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('hpVal').textContent = baseHp;
  document.getElementById('goldVal').textContent = gold;
  document.getElementById('waveVal').textContent = wave;
  document.getElementById('scoreVal').textContent = score;
}

function selectUnit(type) {
  selectedUnit = type;
  document.querySelectorAll('.unitCard').forEach(c => c.classList.remove('selected'));
  document.getElementById('card'+type.charAt(0).toUpperCase()+type.slice(1)).classList.add('selected');
}

// ── Input ─────────────────────────────────────────────────────
function getCanvasLane(clientY) {
  const rect = canvas.getBoundingClientRect();
  const relY = clientY - rect.top;
  const lane = Math.floor(relY / (CH / NUM_LANES));
  return Math.max(0, Math.min(NUM_LANES-1, lane));
}

canvas.addEventListener('click', e => {
  if (state === 'gameover') return;
  if (state === 'between') { startWave(); return; }
  if (state === 'idle') return;
  getAC();
  const lane = getCanvasLane(e.clientY);
  placeUnit(selectedUnit, lane);
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (state === 'gameover') return;
  if (state === 'between') { startWave(); return; }
  if (state === 'idle') return;
  getAC();
  const t = e.changedTouches[0];
  const lane = getCanvasLane(t.clientY);
  placeUnit(selectedUnit, lane);
}, {passive:false});

document.querySelectorAll('.unitCard').forEach(card => {
  card.addEventListener('click', () => { getAC(); selectUnit(card.dataset.type); });
  card.addEventListener('touchend', e => { e.preventDefault(); getAC(); selectUnit(card.dataset.type); }, {passive:false});
});

document.addEventListener('keydown', e => {
  if (e.key === '1') selectUnit('archer');
  if (e.key === '2') selectUnit('spearman');
  if (e.key === '3') selectUnit('cannon');
  if (e.key === '4') selectUnit('wall');
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    getAC();
    if (state === 'between') startWave();
    if (state === 'idle') { document.getElementById('overlay').style.display='none'; initGame(); }
  }
});

// ── Game lifecycle ────────────────────────────────────────────
function initGame() {
  score=0; gold=50; baseHp=20; wave=1;
  units=[]; enemies=[]; projectiles=[]; particles=[];
  spawnQueue=[]; spawnTimer=0;
  state='between';
  updateUI();
  document.getElementById('resultScreen').style.display='none';
}

function endGame() {
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('rld_best', bestScore);
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalBest').textContent = bestScore;
  document.getElementById('resultTitle').textContent = baseHp <= 0 ? '🏚 기지 함락!' : '🏆 승리!';
  document.getElementById('resultScreen').style.display='flex';
}

document.getElementById('startBtn').addEventListener('click', () => {
  getAC();
  document.getElementById('overlay').style.display='none';
  initGame();
});
document.getElementById('restartBtn').addEventListener('click', () => {
  getAC();
  document.getElementById('resultScreen').style.display='none';
  initGame();
});
document.getElementById('startBtn').addEventListener('touchend', e => {
  e.preventDefault(); getAC();
  document.getElementById('overlay').style.display='none';
  initGame();
}, {passive:false});
document.getElementById('restartBtn').addEventListener('touchend', e => {
  e.preventDefault(); getAC();
  document.getElementById('resultScreen').style.display='none';
  initGame();
}, {passive:false});

// ── Boot ──────────────────────────────────────────────────────
bestScore = parseInt(localStorage.getItem('rld_best') || '0');
document.getElementById('bestScore').textContent = bestScore;
resize();
window.addEventListener('resize', () => { resize(); });
requestAnimationFrame(ts => { lastTime=ts; update(ts); });
</script>
</body>
</html>
