<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rhythm Forge — 리듬 대장간</title>
  <meta name="theme-color" content="#0a0a1a" />
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #13132c;
      --panel-soft: #19193a;
      --line: rgba(255, 255, 255, 0.14);
      --gold: #ffd166;
      --neon-red: #ff4d7d;
      --neon-blue: #00d4ff;
      --neon-green: #31ffa6;
      --text: #e7ebff;
      --muted: #8f97bf;
      --danger: #ff638f;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at 18% 8%, #1a1a42 0%, #0a0a1a 52%, #070712 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(100vw, 980px);
      min-height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(24, 24, 58, 0.92), rgba(11, 11, 27, 0.9));
      box-shadow: inset 0 0 24px rgba(82, 90, 255, 0.08), 0 0 20px rgba(0, 0, 0, 0.25);
    }

    .title-panel {
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      border-color: rgba(255, 209, 102, 0.35);
      box-shadow: 0 0 18px rgba(255, 209, 102, 0.12), inset 0 0 24px rgba(255, 209, 102, 0.05);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.08rem, 4.1vw, 1.48rem);
      color: #ffe6a7;
      letter-spacing: 0.06em;
      text-shadow: 0 0 12px rgba(255, 209, 102, 0.52);
    }

    .pitch {
      margin-top: 2px;
      font-size: 0.8rem;
      color: #ffd9f0;
      opacity: 0.94;
    }

    .badge {
      font-size: 0.72rem;
      color: var(--gold);
      border: 1px solid rgba(255, 209, 102, 0.4);
      border-radius: 999px;
      padding: 4px 9px;
      background: rgba(255, 209, 102, 0.08);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .song-panel { padding: 10px; }

    .panel-title {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin: 0 0 8px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .song-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .song-btn {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      padding: 8px 6px;
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.01));
      color: #dce4ff;
      font-weight: 700;
      font-size: 0.74rem;
      cursor: pointer;
      text-align: left;
      line-height: 1.25;
      min-height: 66px;
    }

    .song-btn .meta { font-size: 0.66rem; color: var(--muted); font-weight: 600; }
    .song-btn .best { font-size: 0.65rem; color: #7df4ff; margin-top: 2px; }
    .song-btn.selected {
      border-color: rgba(49, 255, 166, 0.8);
      box-shadow: inset 0 0 16px rgba(49, 255, 166, 0.12), 0 0 12px rgba(49, 255, 166, 0.25);
      color: #b9ffde;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      background: rgba(10, 13, 36, 0.72);
      text-align: center;
    }

    .stat .label {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .stat .value {
      margin-top: 2px;
      font-size: clamp(0.92rem, 2.8vw, 1.2rem);
      font-weight: 800;
    }

    .value.score { color: #90e6ff; }
    .value.combo { color: #ff9fe1; }
    .value.quality { color: #ffe595; text-shadow: 0 0 10px rgba(255, 209, 102, 0.35); }

    .canvas-wrap {
      position: relative;
      border: 1px solid rgba(255, 209, 102, 0.3);
      border-radius: 14px;
      overflow: hidden;
      background: #070711;
      box-shadow: 0 0 26px rgba(0, 0, 0, 0.45), inset 0 0 28px rgba(255, 100, 140, 0.08);
    }

    canvas {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      background: radial-gradient(circle at 50% 65%, #181026 0%, #090913 68%);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .status {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 8px;
      font-size: 0.75rem;
      color: #aeb6e8;
      text-align: center;
      text-shadow: 0 0 8px rgba(0,0,0,.65);
      pointer-events: none;
      min-height: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.015));
      color: #dfe6ff;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 10px 8px;
      cursor: pointer;
      font-size: 0.78rem;
    }

    .btn.primary {
      border-color: rgba(49, 255, 166, 0.6);
      color: #b7ffd8;
      box-shadow: 0 0 12px rgba(49, 255, 166, 0.18);
    }

    .key-pad {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .key-btn {
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      min-height: 58px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
      color: #e7eaff;
      font-size: 1.08rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .key-btn small {
      margin-left: 6px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
    }

    .key-btn.active {
      border-color: rgba(255, 209, 102, 0.85);
      box-shadow: inset 0 0 16px rgba(255, 209, 102, 0.2), 0 0 16px rgba(255, 209, 102, 0.25);
      color: #fff2cf;
    }

    .collection { padding: 10px; }

    .collection-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 180px;
      overflow: auto;
      padding-right: 2px;
    }

    .collection-item {
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 9px;
      background: rgba(7, 8, 24, 0.78);
      padding: 7px 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 0.73rem;
    }

    .collection-item .name { font-weight: 700; color: #d8defe; }
    .collection-item .sub { margin-top: 1px; font-size: 0.66rem; color: var(--muted); }
    .collection-item .grade { font-weight: 800; color: #ffe595; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 15, 0.76);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 20;
    }

    .modal.show { display: flex; }

    .result-card {
      width: min(92vw, 460px);
      border-radius: 16px;
      border: 1px solid rgba(255, 209, 102, 0.5);
      background: linear-gradient(180deg, rgba(28, 26, 58, 0.95), rgba(10, 10, 26, 0.95));
      box-shadow: 0 0 24px rgba(255, 209, 102, 0.2);
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      text-align: center;
    }

    .result-card h2 {
      margin: 0;
      font-size: 1.2rem;
      color: #ffe7a9;
      letter-spacing: 0.05em;
    }

    .result-main {
      font-size: 1.45rem;
      font-weight: 900;
      color: #a8ffcd;
      text-shadow: 0 0 15px rgba(49, 255, 166, 0.35);
    }

    .result-sub { color: #cad2ff; font-size: 0.88rem; }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-top: 4px;
    }

    .mini {
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 9px;
      padding: 8px 5px;
      background: rgba(10, 12, 31, .74);
    }

    .mini .k { font-size: .64rem; color: var(--muted); }
    .mini .v { font-size: .95rem; font-weight: 800; margin-top: 2px; }

    @media (max-width: 820px) {
      .song-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hud { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .controls .btn:last-child { grid-column: span 2; }
      .key-btn { min-height: 64px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="title-panel panel">
      <div>
        <h1>Rhythm Forge — 리듬 대장간</h1>
        <div class="pitch">리듬에 맞춰 망치질해서 무기를 단조하는 리듬 게임</div>
      </div>
      <div class="badge">Canvas 2D + Web Audio</div>
    </section>

    <section class="song-panel panel">
      <p class="panel-title">곡 선택 (8곡 · BPM 80~160)</p>
      <div id="songGrid" class="song-grid"></div>
    </section>

    <section class="hud panel" style="padding:8px;">
      <div class="stat"><div class="label">점수</div><div class="value score" id="scoreEl">0</div></div>
      <div class="stat"><div class="label">콤보</div><div class="value combo" id="comboEl">0</div></div>
      <div class="stat"><div class="label">품질</div><div class="value quality" id="qualityEl">★</div></div>
      <div class="stat"><div class="label">판정</div><div class="value" id="judgeEl">P0 / G0 / M0</div></div>
      <div class="stat"><div class="label">진행</div><div class="value" id="timeEl">00:00</div></div>
    </section>

    <section class="canvas-wrap">
      <canvas id="gameCanvas" width="960" height="540"></canvas>
      <div class="status" id="statusEl">곡을 선택하고 단조를 시작하세요. (키보드 D/F/J/K 또는 터치)</div>
    </section>

    <section class="controls">
      <button id="startBtn" class="btn primary">▶ 단조 시작</button>
      <button id="restartBtn" class="btn">↺ 재시작</button>
      <button id="soundBtn" class="btn">🔊 사운드 ON</button>
    </section>

    <section class="key-pad">
      <div class="key-btn" data-lane="0">D <small>L1</small></div>
      <div class="key-btn" data-lane="1">F <small>L2</small></div>
      <div class="key-btn" data-lane="2">J <small>R1</small></div>
      <div class="key-btn" data-lane="3">K <small>R2</small></div>
    </section>

    <section class="collection panel">
      <p class="panel-title">완성 무기 컬렉션</p>
      <div id="collectionList" class="collection-list"></div>
    </section>
  </div>

  <div id="resultModal" class="modal">
    <div class="result-card">
      <h2>단조 완료</h2>
      <div class="result-main" id="resultMain">★★★★★ · S</div>
      <div class="result-sub" id="resultSub">무기명</div>
      <div class="result-grid">
        <div class="mini"><div class="k">점수</div><div class="v" id="resultScore">0</div></div>
        <div class="mini"><div class="k">최대 콤보</div><div class="v" id="resultCombo">0</div></div>
        <div class="mini"><div class="k">판정</div><div class="v" id="resultJudge">0/0/0</div></div>
      </div>
      <button id="resultClose" class="btn primary" style="margin-top:4px;">다시 단조하기</button>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      const W = 960;
      const H = 540;
      const JUDGE_X = W / 2;
      const LANE_Y = [152, 226, 316, 390];
      const KEY_MAP = { d: 0, f: 1, j: 2, k: 3 };
      const WINDOWS = { perfect: 0.08, good: 0.16 };
      const STORAGE_KEYS = {
        collection: 'rhythm_forge_collection_v1',
        best: 'rhythm_forge_best_v1'
      };

      const NOTE_META = {
        tap: { icon: '●', color: '#ff4d7d', radius: 16 },
        slam: { icon: '🔥', color: '#ff7a00', radius: 18, hold: true, duration: 0.55 },
        roll: { icon: '⚡', color: '#ffd84d', radius: 17, rapid: true, hits: 3 },
        quench: { icon: '💧', color: '#2ce7ff', radius: 17, hold: true, duration: 0.86 }
      };

      const SONG_BLUEPRINTS = [
        { id: 'rf-080', title: '불씨의 시작', bpm: 80, duration: 62, seed: 1101 },
        { id: 'rf-092', title: '강철의 맥', bpm: 92, duration: 64, seed: 1202 },
        { id: 'rf-104', title: '주홍 모루', bpm: 104, duration: 68, seed: 1303 },
        { id: 'rf-116', title: '전류 주조', bpm: 116, duration: 72, seed: 1404 },
        { id: 'rf-128', title: '용광 섬광', bpm: 128, duration: 76, seed: 1505 },
        { id: 'rf-140', title: '폭풍 담금질', bpm: 140, duration: 80, seed: 1606 },
        { id: 'rf-150', title: '번개 단련', bpm: 150, duration: 84, seed: 1707 },
        { id: 'rf-160', title: '신화의 주조', bpm: 160, duration: 88, seed: 1808 }
      ];

      function rngFactory(seed) {
        let t = seed >>> 0;
        return function() {
          t += 0x6D2B79F5;
          let s = Math.imul(t ^ (t >>> 15), 1 | t);
          s ^= s + Math.imul(s ^ (s >>> 7), 61 | s);
          return ((s ^ (s >>> 14)) >>> 0) / 4294967296;
        };
      }

      function to3(n) { return Number(n.toFixed(3)); }

      function buildBeatmap(song, level) {
        const rand = rngFactory(song.seed);
        const beat = 60 / song.bpm;
        const map = [];
        const lanePattern = [0, 1, 2, 3, 1, 0, 2, 3, 0, 2, 1, 3];
        const halfStep = beat / 2;
        const totalSteps = Math.floor((song.duration - 2.8) / halfStep);

        for (let i = 0; i < totalSteps; i++) {
          const time = 1.7 + i * halfStep;
          if (time > song.duration - 1.2) break;

          const baseChance = Math.min(0.94, 0.62 + level * 0.035);
          if (rand() < baseChance) {
            const lane = lanePattern[(i + Math.floor(rand() * lanePattern.length)) % lanePattern.length];
            map.push({ time: to3(time), type: 'tap', lane });
          }

          if (i % 6 === 3 && rand() < (0.3 + level * 0.035)) {
            const lane = Math.floor(rand() * 4);
            map.push({ time: to3(time + beat * 0.18), type: 'tap', lane });
          }

          if (level >= 4 && i % 8 === 0 && rand() < 0.38) {
            const lane = i % 16 < 8 ? 0 : 3;
            map.push({ time: to3(time + beat * 0.08), type: 'tap', lane: lane === 0 ? 2 : 1 });
          }

          if (i > 8 && i % 24 === 12) {
            const left = rand() < 0.5;
            const lane = left ? (rand() < 0.5 ? 0 : 1) : (rand() < 0.5 ? 2 : 3);
            const type = (Math.floor(i / 24) + level) % 2 === 0 ? 'slam' : 'quench';
            const extra = type === 'slam' ? 0.48 : 0.74;
            map.push({
              time: to3(time + beat * 0.14),
              type,
              lane,
              duration: to3(extra + level * 0.03)
            });
          }

          if (level >= 2 && i > 10 && i % 20 === 8) {
            map.push({
              time: to3(time + beat * 0.22),
              type: 'roll',
              lane: Math.floor(rand() * 4),
              hits: level >= 6 ? 4 : 3
            });
          }
        }

        map.sort((a, b) => a.time - b.time);
        return map;
      }

      const SONGS = SONG_BLUEPRINTS.map((song, i) => ({
        ...song,
        beatmap: buildBeatmap(song, i)
      }));

      const app = {
        phase: 'idle',
        selectedSong: 0,
        song: null,
        notes: [],
        startMs: 0,
        now: 0,
        score: 0,
        combo: 0,
        bestCombo: 0,
        perfect: 0,
        good: 0,
        miss: 0,
        quality: 18,
        cracks: 0,
        cracksVisual: [],
        laneDown: [false, false, false, false],
        holds: [null, null, null, null],
        sparks: [],
        feedbacks: [],
        shake: 0,
        status: '곡을 선택하고 단조를 시작하세요.',
        raf: null,
        lastTs: 0,
        progress: { collection: [], best: {} },
        soundOn: true,
        audioCtx: null,
        audioMaster: null,
        audioBus: null,
        noiseBuffer: null
      };

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('scoreEl');
      const comboEl = document.getElementById('comboEl');
      const qualityEl = document.getElementById('qualityEl');
      const judgeEl = document.getElementById('judgeEl');
      const timeEl = document.getElementById('timeEl');
      const statusEl = document.getElementById('statusEl');
      const songGridEl = document.getElementById('songGrid');
      const collectionListEl = document.getElementById('collectionList');
      const resultModal = document.getElementById('resultModal');

      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');
      const soundBtn = document.getElementById('soundBtn');
      const resultClose = document.getElementById('resultClose');

      const resultMain = document.getElementById('resultMain');
      const resultSub = document.getElementById('resultSub');
      const resultScore = document.getElementById('resultScore');
      const resultCombo = document.getElementById('resultCombo');
      const resultJudge = document.getElementById('resultJudge');

      const keyButtons = Array.from(document.querySelectorAll('.key-btn'));
      const pointerLaneMap = new Map();

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function formatTime(sec) {
        const s = Math.max(0, Math.floor(sec));
        const mm = String(Math.floor(s / 60)).padStart(2, '0');
        const ss = String(s % 60).padStart(2, '0');
        return `${mm}:${ss}`;
      }

      function starString() {
        return '★'.repeat(getStars()) + '☆'.repeat(5 - getStars());
      }

      function getStars() {
        return clamp(Math.floor(app.quality / 24) + 1, 1, 5);
      }

      function approachTime() {
        if (!app.song) return 1.2;
        return clamp(1.5 - ((app.song.bpm - 80) / 80) * 0.56, 0.72, 1.46);
      }

      function noteX(note, now) {
        const remain = note.time - now;
        const approach = approachTime();
        const distance = JUDGE_X + 130;
        if (note.lane < 2) {
          return JUDGE_X - (remain / approach) * distance;
        }
        return JUDGE_X + (remain / approach) * distance;
      }

      function loadProgress() {
        try {
          const collectionRaw = localStorage.getItem(STORAGE_KEYS.collection);
          const bestRaw = localStorage.getItem(STORAGE_KEYS.best);
          app.progress.collection = collectionRaw ? JSON.parse(collectionRaw) : [];
          app.progress.best = bestRaw ? JSON.parse(bestRaw) : {};
          if (!Array.isArray(app.progress.collection)) app.progress.collection = [];
          if (!app.progress.best || typeof app.progress.best !== 'object') app.progress.best = {};
        } catch (err) {
          app.progress = { collection: [], best: {} };
        }
      }

      function saveProgress() {
        localStorage.setItem(STORAGE_KEYS.collection, JSON.stringify(app.progress.collection.slice(0, 50)));
        localStorage.setItem(STORAGE_KEYS.best, JSON.stringify(app.progress.best));
      }

      function gradeRank(grade) {
        return { D: 1, C: 2, B: 3, A: 4, S: 5, SS: 6 }[grade] || 0;
      }

      function betterResult(a, b) {
        if (!b) return true;
        if (gradeRank(a.grade) !== gradeRank(b.grade)) return gradeRank(a.grade) > gradeRank(b.grade);
        if (a.stars !== b.stars) return a.stars > b.stars;
        return a.score > b.score;
      }

      function makeWeaponName(song, stars, grade) {
        const a = ['청염', '자홍', '황혼', '흑요', '서광', '빙결', '번개', '용광'];
        const b = ['단검', '대검', '도끼', '장창', '전투망치', '월도', '쌍검', '방패검'];
        const i = (song.bpm + stars * 7) % a.length;
        const j = (song.duration + gradeRank(grade) * 3) % b.length;
        return `${a[i]} ${b[j]}`;
      }

      function calcGrade() {
        const total = app.perfect + app.good + app.miss || 1;
        const acc = (app.perfect + app.good * 0.62) / total;
        const stars = getStars();
        if (stars >= 5 && acc > 0.95 && app.miss <= 2) return 'SS';
        if (stars >= 5 && acc > 0.88) return 'S';
        if (stars >= 4 && acc > 0.8) return 'A';
        if (stars >= 3 && acc > 0.68) return 'B';
        if (stars >= 2) return 'C';
        return 'D';
      }

      function pushCollection(song, grade, stars) {
        const entry = {
          id: `${song.id}-${Date.now()}`,
          songId: song.id,
          songTitle: song.title,
          stars,
          grade,
          score: Math.round(app.score),
          combo: app.bestCombo,
          weaponName: makeWeaponName(song, stars, grade),
          at: Date.now()
        };

        app.progress.collection.unshift(entry);
        app.progress.collection = app.progress.collection.slice(0, 50);

        const best = app.progress.best[song.id];
        if (betterResult(entry, best)) {
          app.progress.best[song.id] = {
            grade: entry.grade,
            stars: entry.stars,
            score: entry.score,
            at: entry.at
          };
        }

        saveProgress();
        renderSongs();
        renderCollection();
        return entry;
      }

      function renderCollection() {
        if (!app.progress.collection.length) {
          collectionListEl.innerHTML = '<div class="collection-item"><div><div class="name">아직 완성 무기가 없습니다.</div><div class="sub">플레이 후 자동 저장됩니다.</div></div><div class="grade">-</div></div>';
          return;
        }

        collectionListEl.innerHTML = app.progress.collection.slice(0, 10).map(item => {
          const date = new Date(item.at);
          const d = `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
          return `
            <div class="collection-item">
              <div>
                <div class="name">${item.weaponName}</div>
                <div class="sub">${item.songTitle} · ${'★'.repeat(item.stars)} · ${d}</div>
              </div>
              <div class="grade">${item.grade}</div>
            </div>
          `;
        }).join('');
      }

      function renderSongs() {
        const playing = app.phase === 'playing';
        songGridEl.innerHTML = SONGS.map((song, i) => {
          const best = app.progress.best[song.id];
          const selected = app.selectedSong === i;
          return `
            <button class="song-btn ${selected ? 'selected' : ''}" data-song-index="${i}" ${playing ? 'disabled' : ''}>
              <div>${i + 1}. ${song.title}</div>
              <div class="meta">BPM ${song.bpm} · ${song.duration}s</div>
              <div class="best">최고: ${best ? `${'★'.repeat(best.stars)} ${best.grade}` : '기록 없음'}</div>
            </button>
          `;
        }).join('');

        Array.from(songGridEl.querySelectorAll('.song-btn')).forEach(btn => {
          btn.addEventListener('click', () => {
            if (app.phase === 'playing') return;
            app.selectedSong = Number(btn.dataset.songIndex);
            app.status = `${SONGS[app.selectedSong].title} 선택 완료. 단조를 시작하세요.`;
            renderSongs();
            updateHud();
          });
        });
      }

      async function ensureAudio() {
        if (app.audioCtx) {
          if (app.audioCtx.state === 'suspended') await app.audioCtx.resume();
          return;
        }
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        app.audioCtx = new Ctx();
        app.audioMaster = app.audioCtx.createGain();
        app.audioMaster.gain.value = app.soundOn ? 0.9 : 0;
        app.audioMaster.connect(app.audioCtx.destination);

        app.noiseBuffer = app.audioCtx.createBuffer(1, app.audioCtx.sampleRate * 0.4, app.audioCtx.sampleRate);
        const data = app.noiseBuffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      }

      function clearAudioBus() {
        if (!app.audioBus || !app.audioCtx) return;
        const now = app.audioCtx.currentTime;
        app.audioBus.gain.cancelScheduledValues(now);
        app.audioBus.gain.setTargetAtTime(0.0001, now, 0.05);
        const old = app.audioBus;
        setTimeout(() => {
          try { old.disconnect(); } catch (_) {}
        }, 450);
        app.audioBus = null;
      }

      function hitKick(target, at, tone = 150) {
        const osc = app.audioCtx.createOscillator();
        const gain = app.audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(tone, at);
        osc.frequency.exponentialRampToValueAtTime(46, at + 0.16);
        gain.gain.setValueAtTime(0.0001, at);
        gain.gain.exponentialRampToValueAtTime(0.75, at + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, at + 0.18);
        osc.connect(gain).connect(target);
        osc.start(at);
        osc.stop(at + 0.2);
      }

      function hitSnare(target, at) {
        const src = app.audioCtx.createBufferSource();
        src.buffer = app.noiseBuffer;
        const hp = app.audioCtx.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 1300;
        const gain = app.audioCtx.createGain();
        gain.gain.setValueAtTime(0.0001, at);
        gain.gain.exponentialRampToValueAtTime(0.38, at + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, at + 0.16);
        src.connect(hp).connect(gain).connect(target);
        src.start(at);
        src.stop(at + 0.2);
      }

      function hitHat(target, at, open = false) {
        const src = app.audioCtx.createBufferSource();
        src.buffer = app.noiseBuffer;
        const hp = app.audioCtx.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = open ? 7000 : 8000;
        const gain = app.audioCtx.createGain();
        gain.gain.setValueAtTime(0.0001, at);
        gain.gain.exponentialRampToValueAtTime(open ? 0.2 : 0.15, at + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.0001, at + (open ? 0.16 : 0.05));
        src.connect(hp).connect(gain).connect(target);
        src.start(at);
        src.stop(at + (open ? 0.2 : 0.08));
      }

      function scheduleTrack(song, leadInSec) {
        if (!app.audioCtx || !app.audioMaster) return;

        clearAudioBus();
        const bus = app.audioCtx.createGain();
        bus.gain.value = app.soundOn ? 1 : 0;
        bus.connect(app.audioMaster);
        app.audioBus = bus;

        const beat = 60 / song.bpm;
        const startAt = app.audioCtx.currentTime + leadInSec;
        const beats = Math.floor(song.duration / beat) + 4;

        for (let i = 0; i < beats; i++) {
          const at = startAt + i * beat;
          if (i % 4 === 0) hitKick(bus, at, 156 - Math.min(44, i * 0.16));
          if (i % 4 === 2) hitSnare(bus, at);
          if (i % 8 === 6) hitHat(bus, at, true);
          hitHat(bus, at + beat * 0.5, false);
          if (song.bpm >= 128) hitHat(bus, at + beat * 0.25, false);
          if (song.bpm >= 140) hitHat(bus, at + beat * 0.75, false);
        }
      }

      function setStatus(text) {
        app.status = text;
        statusEl.textContent = text;
      }

      function resetRunState(songIndex) {
        app.song = SONGS[songIndex];
        app.notes = app.song.beatmap.map(n => ({
          ...n,
          judged: false,
          holding: false,
          holdStart: 0,
          holdDelta: 0,
          hitCount: 0,
          requiredHits: n.hits || NOTE_META[n.type].hits || 3,
          feedbackTicks: 0
        }));

        app.startMs = performance.now() + 900;
        app.now = -0.9;
        app.score = 0;
        app.combo = 0;
        app.bestCombo = 0;
        app.perfect = 0;
        app.good = 0;
        app.miss = 0;
        app.quality = 18;
        app.cracks = 0;
        app.cracksVisual = [];
        app.sparks = [];
        app.feedbacks = [];
        app.shake = 0;
        app.holds = [null, null, null, null];
        app.laneDown = [false, false, false, false];
      }

      async function startGame() {
        app.selectedSong = clamp(app.selectedSong, 0, SONGS.length - 1);
        resultModal.classList.remove('show');
        resetRunState(app.selectedSong);
        app.phase = 'playing';
        setStatus(`${app.song.title} · 가열 시작...`);
        renderSongs();
        updateHud();

        await ensureAudio();
        if (app.audioCtx) scheduleTrack(app.song, 0.9);
      }

      function finishGame() {
        if (app.phase !== 'playing') return;
        app.phase = 'ended';
        clearAudioBus();

        const stars = getStars();
        const grade = calcGrade();
        const entry = pushCollection(app.song, grade, stars);

        resultMain.textContent = `${'★'.repeat(stars)}${'☆'.repeat(5 - stars)} · ${grade}`;
        resultSub.textContent = `${entry.weaponName} 완성! (${app.song.title})`;
        resultScore.textContent = String(entry.score);
        resultCombo.textContent = String(entry.combo);
        resultJudge.textContent = `${app.perfect}/${app.good}/${app.miss}`;

        setStatus(`단조 완료 — ${entry.weaponName} [${grade}]`);
        resultModal.classList.add('show');
        renderSongs();
      }

      function updateHud() {
        scoreEl.textContent = String(Math.max(0, Math.round(app.score)));
        comboEl.textContent = String(app.combo);
        qualityEl.textContent = starString();
        judgeEl.textContent = `P${app.perfect} / G${app.good} / M${app.miss}`;

        if (app.phase === 'playing' && app.song) {
          const t = clamp(app.now, 0, app.song.duration);
          timeEl.textContent = `${formatTime(t)} / ${formatTime(app.song.duration)}`;
        } else {
          const song = SONGS[app.selectedSong];
          timeEl.textContent = `00:00 / ${formatTime(song.duration)}`;
        }
      }

      function pushFeedback(text, x, y, color = '#ffffff', life = 0.55) {
        app.feedbacks.push({ text, x, y, color, life, maxLife: life });
      }

      function spawnSparks(x, y, color, amount = 12) {
        for (let i = 0; i < amount; i++) {
          const speed = 90 + Math.random() * 190;
          const angle = -Math.PI + Math.random() * Math.PI;
          app.sparks.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 30,
            life: 0.34 + Math.random() * 0.26,
            color
          });
        }
      }

      function addCrack() {
        const len = 12 + Math.random() * 32;
        const angle = Math.random() * Math.PI * 2;
        const sx = -40 + Math.random() * 80;
        const sy = -20 + Math.random() * 40;
        app.cracksVisual.push({ sx, sy, ex: sx + Math.cos(angle) * len, ey: sy + Math.sin(angle) * len, life: 1 });
        if (app.cracksVisual.length > 26) app.cracksVisual.shift();
      }

      function judgeTiming(delta) {
        if (delta <= WINDOWS.perfect) return 'perfect';
        if (delta <= WINDOWS.good) return 'good';
        return 'miss';
      }

      function applyJudgement(note, result) {
        if (note.judged) return;
        note.judged = true;

        const x = JUDGE_X;
        const y = LANE_Y[note.lane];

        if (result === 'perfect') {
          app.perfect += 1;
          app.combo += 1;
          app.bestCombo = Math.max(app.bestCombo, app.combo);
          app.score += 120 + Math.min(90, app.combo * 2.3);
          app.quality = clamp(app.quality + 2.8 + Math.min(2, app.combo * 0.035), 0, 120);
          app.shake = Math.max(app.shake, 6);
          spawnSparks(x, y, '#ffd166', 13);
          pushFeedback('Perfect!', x, y - 20, '#ffe7aa', 0.62);
          setStatus(`완벽한 망치질! 콤보 ${app.combo}`);
        } else if (result === 'good') {
          app.good += 1;
          app.combo += 1;
          app.bestCombo = Math.max(app.bestCombo, app.combo);
          app.score += 72 + Math.min(52, app.combo * 1.2);
          app.quality = clamp(app.quality + 1.35, 0, 120);
          app.shake = Math.max(app.shake, 4);
          spawnSparks(x, y, '#7af2ff', 9);
          pushFeedback('Good', x, y - 16, '#9de8ff', 0.52);
        } else {
          app.miss += 1;
          app.combo = 0;
          app.score = Math.max(0, app.score - 34);
          app.quality = clamp(app.quality - 6.2, 0, 120);
          app.cracks += 1;
          addCrack();
          app.shake = Math.max(app.shake, 10);
          pushFeedback('Miss', x, y - 16, '#ff779d', 0.62);
          setStatus('타이밍이 어긋났어요! 균열이 생겼습니다.');
        }
      }

      function missNote(note) {
        if (note.judged) return;
        applyJudgement(note, 'miss');
      }

      function completeHold(note, lane, releaseTime) {
        if (!note || note.judged) return;
        const duration = note.duration || NOTE_META[note.type].duration;
        const held = releaseTime - note.holdStart;
        if (held + 0.04 < duration) {
          applyJudgement(note, 'miss');
          app.holds[lane] = null;
          return;
        }

        const result = note.holdDelta <= WINDOWS.perfect ? 'perfect' : 'good';
        applyJudgement(note, result);
        app.holds[lane] = null;
      }

      function findCandidate(lane, now) {
        let best = null;
        let bestScore = Infinity;

        for (const note of app.notes) {
          if (note.judged || note.lane !== lane) continue;

          if (note.type === 'tap') {
            const delta = now - note.time;
            if (delta < -0.23 || delta > WINDOWS.good + 0.05) continue;
            const score = Math.abs(delta);
            if (score < bestScore) {
              best = note;
              bestScore = score;
            }
          } else if (note.type === 'roll') {
            if (now < note.time - 0.2 || now > note.time + 0.45) continue;
            const score = Math.abs(now - note.time) * 0.5;
            if (score < bestScore) {
              best = note;
              bestScore = score;
            }
          } else {
            if (note.holding) continue;
            const delta = now - note.time;
            if (delta < -0.2 || delta > WINDOWS.good + 0.05) continue;
            const score = Math.abs(delta);
            if (score < bestScore) {
              best = note;
              bestScore = score;
            }
          }
        }

        return best;
      }

      function pressLane(lane) {
        if (app.phase !== 'playing') return;
        app.laneDown[lane] = true;
        const btn = keyButtons[lane];
        if (btn) btn.classList.add('active');

        const now = app.now;
        if (now < 0) return;

        const note = findCandidate(lane, now);
        if (!note) return;

        if (note.type === 'tap') {
          const result = judgeTiming(Math.abs(now - note.time));
          applyJudgement(note, result);
        } else if (note.type === 'roll') {
          note.hitCount = (note.hitCount || 0) + 1;
          note.feedbackTicks = 8;
          spawnSparks(JUDGE_X, LANE_Y[lane], '#ffe082', 5);
          pushFeedback(`⚡ ${note.hitCount}/${note.requiredHits}`, JUDGE_X, LANE_Y[lane] - 10, '#ffe082', 0.24);

          if (note.hitCount >= note.requiredHits) {
            const delta = Math.abs(now - note.time);
            const result = delta <= 0.14 ? 'perfect' : 'good';
            applyJudgement(note, result);
          }
        } else {
          const delta = Math.abs(now - note.time);
          if (delta > WINDOWS.good + 0.05) return;
          note.holding = true;
          note.holdStart = now;
          note.holdDelta = delta;
          app.holds[lane] = note;
          setStatus(`${note.type === 'slam' ? '강타' : '담금질'} 유지 중... 손을 떼지 마세요.`);
        }
      }

      function releaseLane(lane) {
        app.laneDown[lane] = false;
        const btn = keyButtons[lane];
        if (btn) btn.classList.remove('active');

        if (app.phase !== 'playing') return;
        const note = app.holds[lane];
        if (!note) return;

        completeHold(note, lane, app.now);
      }

      function updatePlaying(dt) {
        if (!app.song) return;

        for (const note of app.notes) {
          if (note.judged) continue;

          if (note.type === 'tap') {
            if (app.now > note.time + WINDOWS.good) missNote(note);
          } else if (note.type === 'roll') {
            if (app.now > note.time + 0.48) {
              if ((note.hitCount || 0) < note.requiredHits) missNote(note);
            }
          } else {
            const lane = note.lane;
            const duration = note.duration || NOTE_META[note.type].duration;
            if (note.holding) {
              if (app.now >= note.time + duration) {
                completeHold(note, lane, app.now);
              }
            } else if (app.now > note.time + WINDOWS.good) {
              missNote(note);
            }
          }
        }

        for (let i = app.sparks.length - 1; i >= 0; i--) {
          const p = app.sparks[i];
          p.life -= dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 260 * dt;
          if (p.life <= 0) app.sparks.splice(i, 1);
        }

        for (let i = app.feedbacks.length - 1; i >= 0; i--) {
          const f = app.feedbacks[i];
          f.life -= dt;
          f.y -= 44 * dt;
          if (f.life <= 0) app.feedbacks.splice(i, 1);
        }

        for (let i = app.cracksVisual.length - 1; i >= 0; i--) {
          const c = app.cracksVisual[i];
          c.life -= dt * 0.02;
          if (c.life <= 0) app.cracksVisual.splice(i, 1);
        }

        if (app.shake > 0) app.shake = Math.max(0, app.shake - dt * 20);

        const allDone = app.notes.every(n => n.judged);
        if (app.now > app.song.duration + 0.8 && allDone) finishGame();
      }

      function drawBackground(now) {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0d0d23');
        grad.addColorStop(0.6, '#140f22');
        grad.addColorStop(1, '#07070e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        const pulse = 0.5 + Math.sin(now * 2.4) * 0.5;
        ctx.fillStyle = `rgba(255, 96, 64, ${0.06 + pulse * 0.08})`;
        ctx.beginPath();
        ctx.ellipse(W * 0.5, H * 0.72, 210, 72, 0, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < 26; i++) {
          const x = (i * 113 + now * 46) % (W + 80) - 40;
          const y = ((i * 53 + now * 31) % (H + 140)) - 70;
          ctx.fillStyle = `rgba(255, ${130 + (i % 4) * 18}, 60, ${0.03 + (i % 5) * 0.01})`;
          ctx.beginPath();
          ctx.arc(x, y, 1.3 + (i % 3), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawLanes(now) {
        const pulse = 0.55 + Math.sin(now * 7) * 0.45;

        for (let i = 0; i < 4; i++) {
          const y = LANE_Y[i];
          const left = i < 2;

          ctx.strokeStyle = `rgba(120, 140, 255, ${0.18 + pulse * 0.08})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          if (left) {
            ctx.moveTo(20, y);
            ctx.lineTo(JUDGE_X, y);
          } else {
            ctx.moveTo(W - 20, y);
            ctx.lineTo(JUDGE_X, y);
          }
          ctx.stroke();

          ctx.fillStyle = '#a8b0e0';
          ctx.font = '700 15px -apple-system, sans-serif';
          const key = ['D', 'F', 'J', 'K'][i];
          ctx.fillText(key, left ? 10 : W - 26, y - 9);
        }

        ctx.strokeStyle = `rgba(255, 209, 102, ${0.55 + pulse * 0.2})`;
        ctx.shadowBlur = 20;
        ctx.shadowColor = 'rgba(255, 209, 102, 0.45)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(JUDGE_X, 88);
        ctx.lineTo(JUDGE_X, H - 80);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      function drawWeapon(progress, stars) {
        const cx = JUDGE_X;
        const cy = H * 0.59;

        ctx.save();

        ctx.fillStyle = '#3a3e54';
        ctx.beginPath();
        ctx.moveTo(cx - 112, cy + 42);
        ctx.lineTo(cx + 112, cy + 42);
        ctx.lineTo(cx + 90, cy + 82);
        ctx.lineTo(cx - 90, cy + 82);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#262b43';
        ctx.fillRect(cx - 46, cy + 22, 92, 20);

        const glow = ['#8d99ae', '#86c5ff', '#7cf7ff', '#c8ff87', '#ffe089'][stars - 1] || '#b7bfd7';
        ctx.shadowBlur = 16 + stars * 3;
        ctx.shadowColor = glow;

        const stage = progress < 0.33 ? 0 : progress < 0.67 ? 1 : 2;
        const local = stage === 0 ? progress / 0.33 : stage === 1 ? (progress - 0.33) / 0.34 : (progress - 0.67) / 0.33;

        if (stage === 0) {
          const w = 120 + local * 56;
          ctx.fillStyle = '#6f758a';
          ctx.fillRect(cx - w / 2, cy - 22, w, 22);
        } else if (stage === 1) {
          const blade = 110 + local * 120;
          ctx.fillStyle = '#9ca9c4';
          ctx.beginPath();
          ctx.moveTo(cx - 36, cy - 12);
          ctx.lineTo(cx + blade, cy - 20);
          ctx.lineTo(cx + blade + 14, cy - 8);
          ctx.lineTo(cx - 32, cy + 12);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#8a6a3c';
          ctx.fillRect(cx - 66, cy - 7, 28, 14);
        } else {
          const blade = 230;
          ctx.fillStyle = '#b3bfd7';
          ctx.beginPath();
          ctx.moveTo(cx - 30, cy - 12);
          ctx.lineTo(cx + blade, cy - 20);
          ctx.lineTo(cx + blade + 20, cy - 2);
          ctx.lineTo(cx - 30, cy + 12);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#8f6f41';
          ctx.fillRect(cx - 68, cy - 8, 36, 16);
          ctx.fillStyle = '#50607a';
          ctx.fillRect(cx - 84, cy - 5, 16, 10);
        }

        ctx.shadowBlur = 0;

        if (app.cracksVisual.length) {
          ctx.strokeStyle = 'rgba(255, 105, 130, 0.85)';
          ctx.lineWidth = 1.7;
          for (const c of app.cracksVisual) {
            ctx.beginPath();
            ctx.moveTo(cx + c.sx, cy - 14 + c.sy);
            ctx.lineTo(cx + c.ex, cy - 14 + c.ey);
            ctx.stroke();
          }
        }

        ctx.restore();
      }

      function drawNotes(now) {
        const approach = approachTime();

        for (const note of app.notes) {
          if (note.judged) continue;
          const x = noteX(note, now);
          const y = LANE_Y[note.lane];

          if (x < -180 || x > W + 180) continue;

          const meta = NOTE_META[note.type];

          if (meta.hold) {
            const endTime = note.time + (note.duration || meta.duration);
            const tailX = noteX({ ...note, time: endTime }, now);
            ctx.strokeStyle = note.type === 'slam' ? 'rgba(255, 122, 0, 0.45)' : 'rgba(44, 231, 255, 0.45)';
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(tailX, y);
            ctx.stroke();
          }

          const arrive = clamp(1 - Math.abs((note.time - now) / approach), 0, 1);
          const radius = meta.radius + arrive * 3;
          ctx.fillStyle = meta.color;
          ctx.shadowBlur = 20;
          ctx.shadowColor = meta.color;
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          if (note.type === 'roll') {
            ctx.strokeStyle = 'rgba(255, 233, 170, 0.88)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, radius + 5, 0, Math.PI * 2);
            ctx.stroke();
          }

          ctx.fillStyle = '#0a0a12';
          ctx.font = '800 16px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(meta.icon, x, y + 1);

          if (note.type === 'roll' && note.hitCount > 0) {
            ctx.fillStyle = '#ffeeb6';
            ctx.font = '700 12px -apple-system, sans-serif';
            ctx.fillText(`${note.hitCount}/${note.requiredHits}`, x, y - 24);
          }
        }
      }

      function drawEffects() {
        for (const p of app.sparks) {
          ctx.fillStyle = p.color.replace(')', `, ${clamp(p.life * 2, 0, 1)})`).replace('rgb', 'rgba');
          if (!ctx.fillStyle.includes('rgba')) {
            ctx.fillStyle = p.color;
          }
          ctx.beginPath();
          ctx.arc(p.x, p.y, 1.8 + p.life * 1.5, 0, Math.PI * 2);
          ctx.fill();
        }

        for (const f of app.feedbacks) {
          const a = clamp(f.life / f.maxLife, 0, 1);
          ctx.fillStyle = f.color;
          ctx.globalAlpha = a;
          ctx.font = '800 20px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(f.text, f.x, f.y);
          ctx.globalAlpha = 1;
        }
      }

      function drawComboBanner() {
        if (app.combo < 6) return;
        const pulse = 0.6 + Math.sin(performance.now() * 0.018) * 0.4;
        ctx.fillStyle = `rgba(255, 209, 102, ${0.12 + pulse * 0.14})`;
        ctx.fillRect(W * 0.36, 18, W * 0.28, 42);
        ctx.strokeStyle = 'rgba(255, 209, 102, 0.6)';
        ctx.strokeRect(W * 0.36, 18, W * 0.28, 42);
        ctx.fillStyle = '#ffe8ad';
        ctx.font = '900 22px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`COMBO x${app.combo}`, W * 0.5, 39);
      }

      function renderFrame(ts) {
        if (!app.lastTs) app.lastTs = ts;
        const dt = Math.min(0.05, (ts - app.lastTs) / 1000 || 0.016);
        app.lastTs = ts;

        if (app.phase === 'playing') {
          app.now = (ts - app.startMs) / 1000;
          if (app.now >= 0) updatePlaying(dt);
        }

        ctx.save();
        if (app.shake > 0) {
          const amp = app.shake;
          ctx.translate((Math.random() - 0.5) * amp, (Math.random() - 0.5) * amp);
        }

        drawBackground(ts / 1000);
        drawLanes(ts / 1000);

        const progress = app.song && app.phase === 'playing'
          ? clamp(app.now / app.song.duration, 0, 1)
          : 0;

        drawWeapon(progress, getStars());

        if (app.phase === 'playing') {
          drawNotes(app.now);
          if (app.now < 0) {
            ctx.fillStyle = '#ffd98d';
            ctx.font = '900 34px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('가열 중...', W / 2, H / 2 - 95);
          }
        }

        drawEffects();
        drawComboBanner();

        ctx.restore();

        updateHud();
        statusEl.textContent = app.status;

        app.raf = requestAnimationFrame(renderFrame);
      }

      function setupInputs() {
        window.addEventListener('keydown', (e) => {
          const lane = KEY_MAP[e.key?.toLowerCase()];
          if (lane === undefined) return;
          if (e.repeat) return;
          e.preventDefault();
          pressLane(lane);
        }, { passive: false });

        window.addEventListener('keyup', (e) => {
          const lane = KEY_MAP[e.key?.toLowerCase()];
          if (lane === undefined) return;
          e.preventDefault();
          releaseLane(lane);
        }, { passive: false });

        keyButtons.forEach((btn, idx) => {
          const lane = Number(btn.dataset.lane ?? idx);

          const down = (e) => {
            e.preventDefault();
            pressLane(lane);
          };
          const up = (e) => {
            e.preventDefault();
            releaseLane(lane);
          };

          btn.addEventListener('pointerdown', down, { passive: false });
          btn.addEventListener('pointerup', up, { passive: false });
          btn.addEventListener('pointercancel', up, { passive: false });
          btn.addEventListener('pointerleave', up, { passive: false });
          btn.addEventListener('touchstart', down, { passive: false });
          btn.addEventListener('touchend', up, { passive: false });
        });

        canvas.addEventListener('pointerdown', (e) => {
          if (app.phase !== 'playing') return;
          e.preventDefault();
          const rect = canvas.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * W;
          const y = ((e.clientY - rect.top) / rect.height) * H;

          let lane = 0;
          let dist = Infinity;
          for (let i = 0; i < LANE_Y.length; i++) {
            const d = Math.abs(y - LANE_Y[i]);
            if (d < dist) {
              dist = d;
              lane = i;
            }
          }

          if (x < JUDGE_X && lane > 1) lane = lane === 2 ? 1 : 0;
          if (x >= JUDGE_X && lane < 2) lane = lane === 1 ? 2 : 3;

          pointerLaneMap.set(e.pointerId, lane);
          pressLane(lane);
        }, { passive: false });

        const releasePointer = (e) => {
          const lane = pointerLaneMap.get(e.pointerId);
          if (lane === undefined) return;
          pointerLaneMap.delete(e.pointerId);
          releaseLane(lane);
        };

        canvas.addEventListener('pointerup', releasePointer, { passive: false });
        canvas.addEventListener('pointercancel', releasePointer, { passive: false });
      }

      startBtn.addEventListener('click', () => {
        if (app.phase === 'playing') return;
        startGame();
      });

      restartBtn.addEventListener('click', () => {
        startGame();
      });

      soundBtn.addEventListener('click', async () => {
        app.soundOn = !app.soundOn;
        soundBtn.textContent = app.soundOn ? '🔊 사운드 ON' : '🔇 사운드 OFF';
        await ensureAudio();
        if (app.audioMaster) {
          app.audioMaster.gain.setTargetAtTime(app.soundOn ? 0.9 : 0.0001, app.audioCtx.currentTime, 0.03);
        }
      });

      resultClose.addEventListener('click', () => {
        resultModal.classList.remove('show');
        startGame();
      });

      loadProgress();
      renderSongs();
      renderCollection();
      setupInputs();
      updateHud();
      app.raf = requestAnimationFrame(renderFrame);
    })();
  </script>
</body>
</html>
