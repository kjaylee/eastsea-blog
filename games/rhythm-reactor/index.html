<script>
'use strict';

const T = GameI18n({
  gameTitle: { ko: 'Rhythm Reactor', en: 'Rhythm Reactor' },
  gameSub: { ko: '4레인 탭으로 비트를 맞추고 Reactor를 안정화하세요.', en: 'Hit the beat on 4 lanes and stabilize the Reactor.' },
  gameMeta: { ko: 'Perfect로 Heat를 채우면 Fever 발동! · 키보드 D/F/J/K 지원', en: 'Build Heat with Perfect hits to trigger Fever! · Keyboard D/F/J/K supported' },
  startBtn: { ko: '시작하기', en: 'Start Run' },
  retryBtn: { ko: '다시 플레이', en: 'Retry Run' },
  backTitle: { ko: '타이틀로', en: 'Back to Title' },
  overTitle: { ko: '게임 오버', en: 'Game Over' },
  scoreLabel: { ko: '점수', en: 'Score' },
  comboLabel: { ko: '콤보', en: 'Combo' },
  levelLabel: { ko: '레벨', en: 'Level' },
  hpLabel: { ko: '실드', en: 'Shield' },
  bestLabel: { ko: '최고', en: 'Best' },
  timeLabel: { ko: '남은시간', en: 'Time' },
  fever: { ko: '피버', en: 'Fever' },
  perfect: { ko: '퍼펙트', en: 'Perfect' },
  good: { ko: '굿', en: 'Good' },
  miss: { ko: '미스', en: 'Miss' },
  resultLine: { ko: '최종 점수', en: 'Final Score' },
  bestLine: { ko: '최고 점수', en: 'Best Score' },
  statPerfect: { ko: 'Perfect', en: 'Perfect' },
  statMaxCombo: { ko: '최대 콤보', en: 'Max Combo' },
  statLevel: { ko: '최고 레벨', en: 'Top Level' }
});

const GAME_ID = 'rhythm-reactor';
const SAVE_KEY = 'rhythm-reactor-save-v1';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const hud = document.getElementById('hud');
const laneGuide = document.getElementById('laneGuide');
const titleOverlay = document.getElementById('titleOverlay');
const gameoverOverlay = document.getElementById('gameoverOverlay');
const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const backTitleBtn = document.getElementById('backTitleBtn');

const scoreCard = document.getElementById('scoreCard');
const comboCard = document.getElementById('comboCard');
const levelCard = document.getElementById('levelCard');
const hpCard = document.getElementById('hpCard');
const timerCard = document.getElementById('timerCard');
const bestCard = document.getElementById('bestCard');
const feverBadge = document.getElementById('feverBadge');
const heatFill = document.getElementById('heatFill');

const sound = new SoundManager();
sound.loadSFX('hit', '../gravity-orbit/assets/audio/star_collect.wav');
sound.loadSFX('miss', '../gravity-orbit/assets/audio/asteroid_hit.wav');
sound.loadSFX('fever', '../gravity-orbit/assets/audio/combo.wav');

const state = {
  mode: 'title',
  score: 0,
  combo: 0,
  maxCombo: 0,
  hp: 100,
  heat: 0,
  feverSec: 0,
  level: 1,
  noteDone: 0,
  timer: 75,
  bestScore: 0,
  maxLevel: 1,
  totalPerfect: 0,
  runPerfect: 0,
  lanes: 4,
  notes: [],
  effects: [],
  particles: [],
  spawnTick: 0,
  hitLineY: 0,
  laneWidth: 0,
  dpr: 1,
  width: 0,
  height: 0,
  lastTs: 0,
  laneFlash: [0,0,0,0],
  submittedScore: -1,
  isNewBest: false
};

function setTexts() {
  document.getElementById('titleText').textContent = T('gameTitle');
  document.getElementById('titleSub').textContent = T('gameSub');
  document.getElementById('titleMeta').textContent = T('gameMeta');
  startBtn.textContent = T('startBtn');
  retryBtn.textContent = T('retryBtn');
  backTitleBtn.textContent = T('backTitle');
  document.getElementById('overTitle').textContent = T('overTitle');
}

function storageSet(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch (_) {}
  try { if (window.TG && window.TG.save) window.TG.save(SAVE_KEY, data); } catch (_) {}
}

function storageGet() {
  let fromTG = null;
  try { if (window.TG && window.TG.load) fromTG = window.TG.load(SAVE_KEY, null); } catch (_) {}
  if (fromTG) return fromTG;
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) {
    return null;
  }
}

function loadPersist() {
  const d = storageGet();
  if (!d) return;
  state.bestScore = Number(d.bestScore || 0);
  state.maxLevel = Number(d.maxLevel || 1);
  state.totalPerfect = Number(d.totalPerfect || 0);
}

function savePersist() {
  storageSet({
    bestScore: state.bestScore,
    maxLevel: state.maxLevel,
    totalPerfect: state.totalPerfect
  });
}

function resize() {
  state.dpr = window.devicePixelRatio || 1;
  state.width = window.innerWidth;
  state.height = window.innerHeight;
  canvas.width = Math.floor(state.width * state.dpr);
  canvas.height = Math.floor(state.height * state.dpr);
  ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
  state.laneWidth = state.width / state.lanes;
  state.hitLineY = state.height - 130 - parseFloat(getComputedStyle(document.body).paddingBottom || '0');
}

function getBpm() {
  return 92 + (state.level - 1) * 8;
}

function getSpeed() {
  return 260 + (state.level - 1) * 24;
}

function getMult() {
  if (state.combo >= 20) return 2.0;
  if (state.combo >= 10) return 1.5;
  if (state.combo >= 5) return 1.2;
  return 1.0;
}

function startRun() {
  state.mode = 'play';
  state.score = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.hp = 100;
  state.heat = 0;
  state.feverSec = 0;
  state.level = 1;
  state.noteDone = 0;
  state.timer = 75;
  state.runPerfect = 0;
  state.notes = [];
  state.effects = [];
  state.particles = [];
  state.spawnTick = 0;
  state.submittedScore = -1;
  state.isNewBest = false;
  state.laneFlash = [0,0,0,0];

  titleOverlay.classList.add('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.remove('hidden');
  laneGuide.classList.remove('hidden');

  if (window.TG && window.TG.haptic) window.TG.haptic('impact', 'light');
}

function backToTitle() {
  state.mode = 'title';
  titleOverlay.classList.remove('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.add('hidden');
  laneGuide.classList.add('hidden');
}

function endRun() {
  state.mode = 'gameover';
  hud.classList.add('hidden');
  laneGuide.classList.add('hidden');
  gameoverOverlay.classList.remove('hidden');

  if (state.score > state.bestScore) {
    state.bestScore = Math.floor(state.score);
    state.isNewBest = true;
  }
  if (state.level > state.maxLevel) state.maxLevel = state.level;
  state.totalPerfect += state.runPerfect;
  savePersist();

  document.getElementById('resultLine').textContent = `${T('resultLine')}: ${Math.floor(state.score).toLocaleString()}`;
  document.getElementById('bestLine').textContent = `${T('bestLine')}: ${Math.floor(state.bestScore).toLocaleString()}`;
  document.getElementById('statsLine').textContent = `${T('statPerfect')} ${state.runPerfect} · ${T('statMaxCombo')} ${state.maxCombo} · ${T('statLevel')} ${state.level}`;

  submitLeaderboard();
  if (window.GameScore && window.GameScore.save) {
    window.GameScore.save(GAME_ID, Math.floor(state.score));
  }
  if (window.TG && window.TG.haptic) window.TG.haptic('notification', state.isNewBest ? 'success' : 'warning');
}

function spawnNote() {
  const lane = Math.floor(Math.random() * state.lanes);
  state.notes.push({ lane, y: -40, judged: false, born: performance.now() });
}

function pushEffect(lane, text, color) {
  state.effects.push({ lane, y: state.hitLineY - 14, life: 0.8, text, color });
}

function pushParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 70 + Math.random() * 120;
    state.particles.push({
      x, y,
      vx: Math.cos(a) * v,
      vy: Math.sin(a) * v,
      life: 0.5 + Math.random() * 0.5,
      color
    });
  }
}

function registerMiss(lane) {
  state.combo = 0;
  state.hp = Math.max(0, state.hp - 9);
  if (typeof lane === 'number') state.laneFlash[lane] = 0.2;
  pushEffect(typeof lane === 'number' ? lane : 0, T('miss'), '#ff6b9f');
  if (sound) sound.playSFX('miss', { volume: 0.7 });
  if (window.TG && window.TG.haptic) window.TG.haptic('impact', 'light');
}

function judgeLane(lane) {
  if (state.mode !== 'play') return;
  state.laneFlash[lane] = 0.25;

  let target = null;
  let bestDist = Infinity;
  const goodWindow = 68;
  const perfectWindow = 30;

  for (const n of state.notes) {
    if (n.judged || n.lane !== lane) continue;
    const dist = Math.abs(n.y - state.hitLineY);
    if (dist < bestDist) {
      bestDist = dist;
      target = n;
    }
  }

  if (!target || bestDist > goodWindow) {
    registerMiss(lane);
    return;
  }

  target.judged = true;
  state.noteDone += 1;
  state.combo += 1;
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;

  const laneCenterX = lane * state.laneWidth + state.laneWidth * 0.5;
  const scoreBase = bestDist <= perfectWindow ? 100 : 60;
  const mult = getMult();
  const feverBonus = state.feverSec > 0 ? 2 : 1;
  state.score += scoreBase * mult * feverBonus;

  if (bestDist <= perfectWindow) {
    state.runPerfect += 1;
    state.heat = Math.min(100, state.heat + 20);
    pushEffect(lane, T('perfect'), '#57f3ff');
    pushParticles(laneCenterX, state.hitLineY, '#57f3ff');
  } else {
    state.heat = Math.min(100, state.heat + 10);
    pushEffect(lane, T('good'), '#a0b4ff');
    pushParticles(laneCenterX, state.hitLineY, '#9ab4ff');
  }

  if (state.heat >= 100 && state.feverSec <= 0) {
    state.feverSec = 6;
    state.heat = 0;
    if (sound) sound.playSFX('fever', { volume: 0.95 });
    if (window.TG && window.TG.haptic) window.TG.haptic('notification', 'success');
  } else if (sound) {
    sound.playSFX('hit', { volume: 0.7 + Math.min(0.3, state.combo * 0.01) });
  }
}

function update(dt) {
  if (state.mode !== 'play') return;

  state.timer -= dt;
  if (state.timer <= 0) {
    state.timer = 0;
    endRun();
    return;
  }

  const levelByCount = 1 + Math.floor(state.noteDone / 18);
  state.level = Math.max(1, levelByCount);

  state.spawnTick += dt;
  const bpm = getBpm();
  const beatSec = 60 / bpm;
  while (state.spawnTick >= beatSec) {
    state.spawnTick -= beatSec;
    spawnNote();
  }

  const speed = getSpeed();
  for (const n of state.notes) {
    if (!n.judged) n.y += speed * dt;
  }

  for (let i = state.notes.length - 1; i >= 0; i--) {
    const n = state.notes[i];
    if (n.judged) {
      state.notes.splice(i, 1);
      continue;
    }
    if (n.y > state.hitLineY + 74) {
      state.notes.splice(i, 1);
      registerMiss(n.lane);
      state.noteDone += 1;
    }
  }

  if (state.feverSec > 0) {
    state.feverSec = Math.max(0, state.feverSec - dt);
  } else {
    state.heat = Math.max(0, state.heat - dt * 8);
  }

  for (let i = 0; i < state.effects.length; i++) {
    const e = state.effects[i];
    e.y -= dt * 34;
    e.life -= dt;
  }
  state.effects = state.effects.filter((e) => e.life > 0);

  for (let i = 0; i < state.particles.length; i++) {
    const p = state.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life -= dt;
  }
  state.particles = state.particles.filter((p) => p.life > 0);

  for (let i = 0; i < state.laneFlash.length; i++) {
    state.laneFlash[i] = Math.max(0, state.laneFlash[i] - dt);
  }

  if (state.hp <= 0) {
    state.hp = 0;
    endRun();
  }
}

function drawLanes() {
  const laneTop = 0;
  const laneBottom = state.height;

  for (let i = 0; i < state.lanes; i++) {
    const x = i * state.laneWidth;
    const pulse = state.laneFlash[i] > 0 ? state.laneFlash[i] / 0.25 : 0;
    const alpha = 0.1 + pulse * 0.38;
    ctx.fillStyle = `rgba(${40 + i*14},${80 + i*18},${160 + i*12},${alpha.toFixed(3)})`;
    ctx.fillRect(x + 2, laneTop, state.laneWidth - 4, laneBottom);

    ctx.strokeStyle = 'rgba(163,183,255,0.28)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + state.laneWidth, 0);
    ctx.lineTo(x + state.laneWidth, state.height);
    ctx.stroke();
  }

  const t = performance.now() * 0.004;
  const glow = state.feverSec > 0 ? 0.85 : 0.28 + Math.sin(t) * 0.08;
  ctx.fillStyle = `rgba(96,226,255,${glow.toFixed(3)})`;
  ctx.fillRect(0, state.hitLineY - 2, state.width, 4);
}

function drawNotes() {
  for (const n of state.notes) {
    const x = n.lane * state.laneWidth + state.laneWidth * 0.5;
    const y = n.y;
    const w = state.laneWidth * 0.62;
    const h = 16;

    const inWindow = Math.abs(y - state.hitLineY) < 72;
    const g = ctx.createLinearGradient(x - w/2, y - h/2, x + w/2, y + h/2);
    g.addColorStop(0, inWindow ? '#5ff2ff' : '#96a5ff');
    g.addColorStop(1, inWindow ? '#ff6ec8' : '#7488ff');

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(x - w/2, y - h/2, w, h, 6);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawEffects() {
  for (const e of state.effects) {
    const x = e.lane * state.laneWidth + state.laneWidth * 0.5;
    ctx.globalAlpha = Math.max(0, e.life);
    ctx.fillStyle = e.color;
    ctx.font = '700 16px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(e.text, x, e.y);
  }

  for (const p of state.particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.8, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBackgroundPulse() {
  const t = performance.now() * 0.0015;
  const feverAmp = state.feverSec > 0 ? 28 : 12;
  const radius = Math.max(state.width, state.height) * 0.58 + Math.sin(t * 3) * feverAmp;
  const g = ctx.createRadialGradient(state.width * 0.5, state.height * 0.18, 10, state.width * 0.5, state.height * 0.18, radius);
  g.addColorStop(0, state.feverSec > 0 ? 'rgba(255,108,198,.25)' : 'rgba(95,198,255,.16)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, state.width, state.height);
}

function renderHud() {
  const scoreText = `${T('scoreLabel')} ${Math.floor(state.score).toLocaleString()}`;
  const comboText = `${T('comboLabel')} x${state.combo}`;
  const levelText = `${T('levelLabel')} ${state.level}`;
  const hpText = `${T('hpLabel')} ${Math.floor(state.hp)}`;
  const timerText = `${T('timeLabel')} ${state.timer.toFixed(1)}s`;
  const bestText = `${T('bestLabel')} ${Math.floor(state.bestScore).toLocaleString()}`;

  scoreCard.textContent = scoreText;
  comboCard.textContent = comboText;
  levelCard.textContent = levelText;
  hpCard.textContent = hpText;
  timerCard.textContent = timerText;
  bestCard.textContent = bestText;

  const heatVal = state.feverSec > 0 ? 100 : state.heat;
  heatFill.style.width = `${Math.min(100, Math.max(0, heatVal))}%`;
  feverBadge.style.display = state.feverSec > 0 ? 'inline' : 'none';
  feverBadge.textContent = `${T('fever').toUpperCase()} x2`;
}

function render() {
  ctx.clearRect(0, 0, state.width, state.height);
  drawBackgroundPulse();

  if (state.mode === 'play') {
    drawLanes();
    drawNotes();
    drawEffects();
  }

  if (state.mode !== 'play') {
    drawLanes();
  }

  renderHud();
}

function frame(ts) {
  if (!state.lastTs) state.lastTs = ts;
  const dt = Math.min(0.033, (ts - state.lastTs) / 1000);
  state.lastTs = ts;

  update(dt);
  render();
  requestAnimationFrame(frame);
}

function laneFromPointer(clientX) {
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left;
  return Math.max(0, Math.min(state.lanes - 1, Math.floor(x / state.laneWidth)));
}

function handlePointer(e) {
  if (state.mode !== 'play') return;
  if (e.cancelable) e.preventDefault();
  const point = e.touches ? e.touches[0] : e;
  const lane = laneFromPointer(point.clientX);
  judgeLane(lane);
}

function handleKey(e) {
  if (state.mode !== 'play') return;
  const key = e.key.toLowerCase();
  const map = { d:0, f:1, j:2, k:3 };
  if (Object.prototype.hasOwnProperty.call(map, key)) {
    judgeLane(map[key]);
  }
}

function refreshBoard() {
  if (!window.Leaderboard) return;
  window.Leaderboard.getTop(GAME_ID).then((scores) => {
    window.Leaderboard.renderBoard('leaderboard', scores);
  }).catch(() => {});
}

function playerName() {
  try {
    const u = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
    if (u) return (u.first_name || u.username || 'Player');
  } catch (_) {}
  return 'Player';
}

function submitLeaderboard() {
  const s = Math.floor(state.score);
  if (!window.Leaderboard) return;
  if (s === state.submittedScore) return;
  state.submittedScore = s;
  window.Leaderboard.submit(GAME_ID, playerName(), s, { reason: 'gameover' });
  refreshBoard();
}

startBtn.addEventListener('click', startRun);
retryBtn.addEventListener('click', startRun);
backTitleBtn.addEventListener('click', backToTitle);
canvas.addEventListener('pointerdown', handlePointer, { passive: false });
canvas.addEventListener('touchstart', handlePointer, { passive: false });
document.addEventListener('keydown', handleKey);
window.addEventListener('resize', resize);

loadPersist();
setTexts();
resize();
refreshBoard();
renderHud();
requestAnimationFrame(frame);
</script>
