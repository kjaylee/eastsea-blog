<body>
<div id="container">
  <h1>🌴 로프 스윙</h1>
  <div id="stats">
    <div>거리: <span id="distance">0</span>m</div>
    <div>최고: <span id="best">0</span>m</div>
  </div>
  <canvas id="game" width="400" height="500"></canvas>
  <div id="instructions">탭/클릭으로 로프 잡기/놓기!</div>
  <button id="reset">새 게임</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const audio = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, duration) {
  const osc = audio.createOscillator();
  const gain = audio.createGain();
  osc.connect(gain);
  gain.connect(audio.destination);
  osc.frequency.value = freq;
  gain.gain.value = 0.08;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + duration);
  osc.stop(audio.currentTime + duration);
}

let player = { x: 100, y: 300, vx: 0, vy: 0, radius: 12 };
let ropes = [];
let currentRope = null;
let swingAngle = 0;
let distance = 0;
let best = parseInt(localStorage.getItem('rope-swing-best') || '0');
let gameOver = false;
let gameStarted = false;
let cameraX = 0;

function init() {
  player = { x: 100, y: 300, vx: 0, vy: 0, radius: 12 };
  ropes = [];
  currentRope = null;
  swingAngle = Math.PI / 4;
  distance = 0;
  gameOver = false;
  gameStarted = false;
  cameraX = 0;
  
  // Initial rope
  ropes.push({ x: 100, y: 100 });
  currentRope = ropes[0];
  
  // Generate more ropes
  for (let i = 1; i < 10; i++) {
    ropes.push({
      x: ropes[i-1].x + 120 + Math.random() * 80,
      y: 80 + Math.random() * 60
    });
  }
  
  document.getElementById('distance').textContent = distance;
  document.getElementById('best').textContent = best;
}

function toggleRope() {
  if (!gameStarted) gameStarted = true;
  if (gameOver) return;
  
  if (currentRope) {
    // Release rope
    const ropeLength = 150;
    player.vx = Math.sin(swingAngle) * 8;
    player.vy = Math.cos(swingAngle) * 8;
    currentRope = null;
    beep(500, 0.1);
  } else {
    // Try to grab nearest rope
    const nearby = ropes.filter(r => {
      const dx = r.x - player.x;
      const dy = r.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      return dist < 180 && r.x > player.x - 50;
    });
    
    if (nearby.length > 0) {
      currentRope = nearby[0];
      player.vx = 0;
      player.vy = 0;
      const dx = player.x - currentRope.x;
      const dy = player.y - currentRope.y;
      swingAngle = Math.atan2(dx, dy);
      beep(600, 0.1);
    }
  }
}

function update() {
  if (!gameStarted || gameOver) return;
  
  if (currentRope) {
    // Swinging physics
    const ropeLength = 150;
    swingAngle += 0.03;
    player.x = currentRope.x + Math.sin(swingAngle) * ropeLength;
    player.y = currentRope.y + Math.cos(swingAngle) * ropeLength;
  } else {
    // Free fall physics
    player.vy += 0.4;
    player.x += player.vx;
    player.y += player.vy;
  }
  
  // Camera follow
  if (player.x > cameraX + 200) {
    cameraX = player.x - 200;
  }
  
  // Update distance
  distance = Math.max(distance, Math.floor(player.x / 10));
  document.getElementById('distance').textContent = distance;
  
  // Generate new ropes
  while (ropes[ropes.length - 1].x < cameraX + 600) {
    const lastRope = ropes[ropes.length - 1];
    ropes.push({
      x: lastRope.x + 120 + Math.random() * 80,
      y: 80 + Math.random() * 60
    });
  }
  
  // Remove old ropes
  ropes = ropes.filter(r => r.x > cameraX - 100);
  
  // Check game over
  if (player.y > 500) {
    gameOver = true;
    beep(200, 0.5);
    if (distance > best) {
      best = distance;
      localStorage.setItem('rope-swing-best', best);
      document.getElementById('best').textContent = best;
      setTimeout(() => alert(`🎉 새 기록! ${distance}m!`), 100);
    } else {
      setTimeout(() => alert(`게임 종료! 거리: ${distance}m`), 100);
    }
  }
}

function render() {
  // Sky gradient
  const gradient = ctx.createLinearGradient(0, 0, 0, 500);
  gradient.addColorStop(0, '#87ceeb');
  gradient.addColorStop(1, '#98d8c8');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 400, 500);
  
  // Clouds
  ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
  for (let i = 0; i < 5; i++) {
    const x = ((cameraX + i * 150) % 600) - 100;
    ctx.beginPath();
    ctx.arc(x, 50 + i * 30, 30, 0, Math.PI * 2);
    ctx.arc(x + 30, 50 + i * 30, 25, 0, Math.PI * 2);
    ctx.arc(x + 50, 50 + i * 30, 30, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Ropes
  ropes.forEach(rope => {
    const screenX = rope.x - cameraX;
    if (screenX > -50 && screenX < 450) {
      // Rope anchor
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(screenX - 5, rope.y - 10, 10, 10);
      
      // Rope line (if attached)
      if (currentRope === rope) {
        ctx.strokeStyle = '#d2691e';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(screenX, rope.y);
        ctx.lineTo(player.x - cameraX, player.y);
        ctx.stroke();
      }
    }
  });
  
  // Player
  const screenX = player.x - cameraX;
  
  // Body
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.arc(screenX, player.y, player.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#e74c3c';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Face
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(screenX - 4, player.y - 3, 3, 0, Math.PI * 2);
  ctx.arc(screenX + 4, player.y - 3, 3, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = 'black';
  ctx.beginPath();
  ctx.arc(screenX - 4, player.y - 3, 1.5, 0, Math.PI * 2);
  ctx.arc(screenX + 4, player.y - 3, 1.5, 0, Math.PI * 2);
  ctx.fill();
  
  // Limbs
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(screenX - 8, player.y + 5);
  ctx.lineTo(screenX - 12, player.y + 15);
  ctx.moveTo(screenX + 8, player.y + 5);
  ctx.lineTo(screenX + 12, player.y + 15);
  ctx.stroke();
}

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

canvas.onclick = toggleRope;
canvas.ontouchstart = (e) => {
  e.preventDefault();
  toggleRope();
};

document.getElementById('reset').onclick = init;

init();
gameLoop();
</script>

    <div id="leaderboard" data-lb-slug="rope-swing" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "rope-swing";
      const CANDIDATE_OBJECTS = ["player"];
      const END_METHODS = ["gameOver", "endGame", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["start", "init", "startGame", "newGame", "restart", "retry", "resetGame", "initGame", "beginGame", "playAgain"];
      const SCORE_KEYS = ["distance", "score", "points", "gold", "coins", "wave", "level", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
