    ctx: null,

    resume() {
      if (!this.ctx) {
        const A = window.AudioContext || window.webkitAudioContext;
        if (!A) return;
        this.ctx = new A();
      }
      if (this.ctx.state === 'suspended') this.ctx.resume();
      this.enabled = true;

    tone(freq = 440, dur = 0.12, type = 'triangle', gain = 0.06, when = 0) {
      if (!this.ctx || !this.enabled) return;
      const t0 = this.ctx.currentTime + when;
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g).connect(this.ctx.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.01);
    },
    hit() {
      this.tone(120, 0.09, 'square', 0.05);
      this.tone(72, 0.11, 'square', 0.03, 0.02);
    },
    playCard(rune) {
      const f = { fire: 320, water: 270, lightning: 430, nature: 240, stone: 190 }[rune] || 300;
      this.tone(f, 0.08, 'triangle', 0.04);
      this.tone(f * 1.45, 0.06, 'sine', 0.025, 0.03);
    },
    fusion() {
      this.tone(480, 0.08, 'sawtooth', 0.04);
      this.tone(620, 0.08, 'sawtooth', 0.04, 0.06);
      this.tone(760, 0.12, 'triangle', 0.05, 0.13);
    },

      this.tone(440, 0.08, 'sine', 0.03, 0.04);
      this.tone(530, 0.12, 'sine', 0.03, 0.1);
    },
    bossLoop(start) {
      if (start) {
        this.stopBoss();
        if (!this.ctx || !this.enabled) return;
        this.bossTimer = setInterval(() => {
          const seq = [110, 165, 98, 147, 131, 175];
          const f = seq[this.bossSeq % seq.length];
          this.bossSeq++;
          this.tone(f, 0.45, 'triangle', 0.022);
          this.tone(f * 1.5, 0.2, 'sine', 0.012, 0.06);
        }, 420);
      } else {
        this.stopBoss();
      }
    },
    stopBoss() {
      if (this.bossTimer) {
        clearInterval(this.bossTimer);
        this.bossTimer = null;
      }
    }
  };

  function mulberry32(a) {
    return function() {
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = h << 13 | h >>> 19;
    }
    return function() {
      h = Math.imul(h ^ h >>> 16, 2246822507);
      h = Math.imul(h ^ h >>> 13, 3266489909);
      return (h ^= h >>> 16) >>> 0;
    };
  }

  class RNG {
    constructor(seed) {
      this.seed = String(seed);
      const h = xmur3(this.seed);
      this.rand = mulberry32(h());
    }
    next() { return this.rand(); }
    int(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
    pick(arr) { return arr[Math.floor(this.next() * arr.length)]; }
    shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(this.next() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
  }

  function makeParchmentTexture() {
    const t = document.createElement('canvas');
    t.width = 256;
    t.height = 256;
    const c = t.getContext('2d');
    const g = c.createLinearGradient(0, 0, 256, 256);
    g.addColorStop(0, '#f3e3c7');
    g.addColorStop(1, '#e2cfad');
    c.fillStyle = g;
    c.fillRect(0, 0, 256, 256);
    const img = c.getImageData(0, 0, 256, 256);
    for (let i = 0; i < img.data.length; i += 4) {
      const n = (Math.random() * 20 - 10) | 0;
      img.data[i] = Math.max(0, Math.min(255, img.data[i] + n));
      img.data[i + 1] = Math.max(0, Math.min(255, img.data[i + 1] + n));
      img.data[i + 2] = Math.max(0, Math.min(255, img.data[i + 2] + n));
    }
    c.putImageData(img, 0, 0);
    c.globalAlpha = 0.12;
    c.strokeStyle = '#6b4d31';
    for (let y = 10; y < 256; y += 14) {
      c.beginPath();
      c.moveTo(0, y + Math.random() * 3);
      for (let x = 0; x <= 256; x += 16) {
        c.lineTo(x, y + Math.sin((x + y) * 0.04) * 2);
      }
      c.stroke();
    }
    return ctx.createPattern(t, 'repeat');
  }

  function todaySeedKST() {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Asia/Seoul',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).formatToParts(new Date());
    const map = {};
    parts.forEach(p => { if (p.type !== 'literal') map[p.type] = p.value; });
    return `${map.year}${map.month}${map.day}`;
  }

  function cap(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function rectHit(x, y, r) {
    return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
  }

  function rrect(c, x, y, w, h, r, fill, stroke, lw = 1) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
    if (fill) {
      c.fillStyle = fill;
      c.fill();
    }
    if (stroke) {
      c.strokeStyle = stroke;
      c.lineWidth = lw;
      c.stroke();
    }
  }

  function shadowText(c, text, x, y, color, size, align = 'left', alpha = 1) {
    c.save();
    c.globalAlpha = alpha;
    c.font = `700 ${size}px Georgia, serif`;
    c.textAlign = align;
    c.fillStyle = 'rgba(0,0,0,.35)';
    c.fillText(text, x + 2, y + 2);
    c.fillStyle = color;
    c.fillText(text, x, y);
    c.restore();
  }

  function wrapText(c, txt, x, y, w, lh, maxLines = 3, color = PALETTE.ink, size = 16) {
    c.save();
    c.font = `600 ${size}px Georgia, serif`;
    c.fillStyle = color;
    const words = txt.split(' ');
    let line = '';
    let lineCount = 0;
    for (let i = 0; i < words.length; i++) {
      const test = line + words[i] + ' ';
      if (c.measureText(test).width > w && i > 0) {
        c.fillText(line.trim(), x, y + lineCount * lh);
        line = words[i] + ' ';
        lineCount++;
        if (lineCount >= maxLines) break;
      } else {
        line = test;
      }
    }
    if (lineCount < maxLines) c.fillText(line.trim(), x, y + lineCount * lh);
    c.restore();
  }

  function drawRune(c, rune, x, y, size) {
    const col = PALETTE.runes[rune] || '#fff';
    c.save();
    c.translate(x, y);
    c.strokeStyle = col;
    c.fillStyle = col;
    c.lineWidth = Math.max(2, size * 0.08);

    if (rune === 'fire') {
      c.beginPath();
      c.moveTo(0, -size * 0.52);
      c.bezierCurveTo(size * 0.4, -size * 0.3, size * 0.3, size * 0.2, 0, size * 0.48);
      c.bezierCurveTo(-size * 0.35, size * 0.18, -size * 0.45, -size * 0.22, 0, -size * 0.52);
      c.fill();
      c.globalAlpha = 0.4;
      c.beginPath();
      c.moveTo(0, -size * 0.2);
      c.bezierCurveTo(size * 0.18, -size * 0.08, size * 0.15, size * 0.1, 0, size * 0.26);
      c.bezierCurveTo(-size * 0.14, size * 0.08, -size * 0.22, -size * 0.05, 0, -size * 0.2);
      c.fill();
    } else if (rune === 'water') {
      c.beginPath();
      c.moveTo(0, -size * 0.55);
      c.quadraticCurveTo(size * 0.35, -size * 0.1, size * 0.18, size * 0.35);
      c.quadraticCurveTo(0, size * 0.58, -size * 0.18, size * 0.35);
      c.quadraticCurveTo(-size * 0.35, -size * 0.1, 0, -size * 0.55);
      c.fill();
      c.globalAlpha = 0.3;
      c.beginPath();
      c.arc(0, size * 0.12, size * 0.16, 0, Math.PI * 2);
      c.fill();
    } else if (rune === 'lightning') {
      c.beginPath();
      c.moveTo(-size * 0.24, -size * 0.5);
      c.lineTo(size * 0.08, -size * 0.5);
      c.lineTo(-size * 0.03, -size * 0.1);
      c.lineTo(size * 0.22, -size * 0.1);
      c.lineTo(-size * 0.14, size * 0.5);
      c.lineTo(-size * 0.02, size * 0.08);
      c.lineTo(-size * 0.27, size * 0.08);
      c.closePath();
      c.fill();
    } else if (rune === 'nature') {
      c.beginPath();
      c.ellipse(0, 0, size * 0.36, size * 0.5, -0.55, 0, Math.PI * 2);
      c.fill();
      c.globalCompositeOperation = 'destination-out';
      c.beginPath();
      c.ellipse(size * 0.08, -size * 0.05, size * 0.18, size * 0.24, -0.55, 0, Math.PI * 2);
      c.fill();
      c.globalCompositeOperation = 'source-over';
      c.strokeStyle = '#355f35';
      c.lineWidth = Math.max(1.2, size * 0.05);
      c.beginPath();
      c.moveTo(-size * 0.2, size * 0.28);
      c.lineTo(size * 0.12, -size * 0.22);
      c.stroke();
    } else if (rune === 'stone') {
      const r = size * 0.45;
      c.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = -Math.PI / 2 + i * Math.PI / 3;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
      }
      c.closePath();
      c.fillStyle = PALETTE.runes.stone;
      c.fill();
      c.strokeStyle = '#6f5f52';
      c.stroke();
      c.globalAlpha = 0.35;
      c.beginPath();
      c.moveTo(-r * 0.5, 0);
      c.lineTo(r * 0.4, -r * 0.2);
      c.lineTo(r * 0.1, r * 0.45);
      c.closePath();
      c.fill();
    }
    c.restore();
  }

  function generateMap(floor, rng) {
    const steps = rng.int(7, 10);
    const rows = [];
    for (let d = 0; d < steps; d++) {
      const row = [];
      for (let lane = 0; lane < 3; lane++) {
        let t = weightedNodeType(d, steps, floor, rng);
        if (d < 2 && t === 'elite') t = 'battle';
        row.push({ id: `${floor}-${d}-${lane}`, floor, depth: d, lane, type: t, cleared: false });
      }
      rows.push(row);
    }
    rows.push([
      null,
      { id: `${floor}-boss`, floor, depth: steps, lane: 1, type: 'boss', cleared: false },
      null
    ]);

    const links = {};
    for (let d = 0; d < rows.length - 1; d++) {
      for (let lane = 0; lane < 3; lane++) {
        const n = rows[d][lane];
        if (!n) continue;
        const key = `${d}-${lane}`;
        links[key] = [];
        if (d === rows.length - 2) {
          links[key].push(1);
          continue;
        }
        const options = [];
        for (let t = lane - 1; t <= lane + 1; t++) {
          if (t >= 0 && t <= 2 && rows[d + 1][t]) options.push(t);
        }
        while (options.length > 0) {
          const pick = options.splice(rng.int(0, options.length - 1), 1)[0];
          links[key].push(pick);
          if (links[key].length >= rng.int(1, 2)) break;
        }
        if (links[key].length === 0) links[key].push(lane);
      }
    }

    return { rows, links, steps };
  }

  function weightedNodeType(depth, steps, floor, rng) {
    if (depth === steps - 1) {
      const r = rng.next();
      if (r < 0.45) return 'rest';
      if (r < 0.75) return 'shop';
      return 'elite';
    }
    const r = rng.next();
    if (r < 0.54) return 'battle';
    if (r < 0.69) return 'event';
    if (r < 0.80) return 'rest';
    if (r < 0.91) return 'shop';
    return 'elite';
  }

  function pickEnemy(floor, nodeType, rng) {
    if (nodeType === 'boss') {
      return clone(ENEMIES.bosses[floor - 1]);
    }
    const pool = floor === 1 ? ENEMIES.floor1 : floor === 2 ? ENEMIES.floor2 : ENEMIES.floor3;
    const base = clone(rng.pick(pool));
    if (nodeType === 'elite') {
      base.hp = Math.floor(base.hp * 1.45);
      base.intents.forEach(i => {
        if (i.v) i.v = Math.floor(i.v * 1.35);
        if (i.block) i.block = Math.floor(i.block * 1.3);
      });
      base.name += ' (엘리트)';
    }
    return base;
  }

  function createCardInstance(id, run) {
    const base = CARD_BY_ID[id] || CARD_BY_ID.strike;
    const c = clone(base);
    c.uid = nextCardUid++;
    const mod = run.mods[id];
    if (mod) {
      c.cost = cap(c.cost - (mod.costDown || 0), 0, 4);
      if (c.effect.damage) c.effect.damage += mod.boost || 0;
      if (c.effect.block) c.effect.block += mod.boost || 0;
      if (c.effect.heal) c.effect.heal += Math.floor((mod.boost || 0) / 2);
    }
    return c;
  }

  function cloneEnemyIntent(enemy) {
    enemy.intent = clone(enemy.intents[enemy.intentIndex % enemy.intents.length]);
  }

  function advanceEnemyIntent(enemy) {
    enemy.intentIndex = (enemy.intentIndex + 1) % enemy.intents.length;
    cloneEnemyIntent(enemy);
  }

  function startPlayerTurn() {
    const c = state.combat;
    if (!c) return;

    c.player.block = 0;
    c.player.firstAttackBuff = 0;
    c.player.firstSkillDiscount = false;
    c.attackCounter = 0;

    triggerRelics('turnStart', c);
    tickStartStatus(c.player, c, true);
    tickStartStatus(c.enemy, c, false);

    if (c.enemy.hp <= 0 || c.player.hp <= 0) {
      checkBattleEnd();
      return;
    }

    c.player.energy = c.player.maxEnergy;
    if (c.player.tempEnergy) {
      c.player.energy += c.player.tempEnergy;
      c.player.tempEnergy = 0;
    }

    drawCards(c, 5);
    pushLog(`턴 ${c.turn} 시작. 에너지 ${c.player.energy}.`);
    if (c.fusionLock > 0) pushLog('이 턴은 합성 슬롯이 봉쇄됨');
  }

  function endPlayerTurn() {
    const c = state.combat;
    if (!c || c.phase !== 'player') return;
    if (c.fusionLock > 0) c.fusionLock--;
    c.phase = 'enemy';
    moveAllHandToDiscard(c);
    runEnemyTurn();
  }

  function runEnemyTurn() {
    const c = state.combat;
    if (!c) return;
    const enemy = c.enemy;
    const player = c.player;

    if (enemy.hp <= 0 || player.hp <= 0) {
      checkBattleEnd();
      return;
    }

    if (enemy.status.stun > 0) {
      enemy.status.stun--;
      pushLog(`${enemy.name}이(가) 기절로 행동하지 못했다.`);
    } else {
      executeIntent(c, enemy.intent);
    }

    tickEndStatus(player);
    tickEndStatus(enemy);

    if (player.hp <= 0 || enemy.hp <= 0) {
      checkBattleEnd();
      return;
    }

    advanceEnemyIntent(enemy);
    c.turn++;
    c.phase = 'player';
    startPlayerTurn();
  }

  function executeIntent(c, intent) {
    const enemy = c.enemy;
    const player = c.player;

    if (intent.kind === 'attack') {
      const hits = intent.hits || 1;
      for (let i = 0; i < hits; i++) {
        let dmg = intent.v + enemy.str;
        if (enemy.status.weak > 0) dmg = Math.floor(dmg * 0.75);
        if (hasRelic('warden_ring') && enemy.boss) dmg = Math.max(0, dmg - 2);
        playerDamage(c, dmg);
      }
      pushLog(`${enemy.name} ${INTENT_LABEL.attack} ${intent.v}${intent.hits ? 'x' + intent.hits : ''}`);
    } else if (intent.kind === 'guard') {
      gainBlock(enemy, intent.block || 8);
      if (enemy.id === 'rune_golem') c.fusionLock = 1;
      pushLog(`${enemy.name} 방어 ${intent.block || 8}`);
    } else if (intent.kind === 'curse') {
      if (intent.weak) addStatus(player, 'weak', intent.weak);
      if (intent.vuln) addStatus(player, 'vulnerable', intent.vuln);
      pushLog(`${enemy.name} 약화 효과 부여`);
    } else if (intent.kind === 'buff') {
      enemy.str += intent.str || 2;
      pushLog(`${enemy.name} 공격력 +${intent.str || 2}`);
    } else if (intent.kind === 'drain') {
      const dealt = playerDamage(c, intent.v || 8);
      enemy.hp = cap(enemy.hp + dealt, 0, enemy.maxHp);
      pushLog(`${enemy.name} 흡수 ${dealt}`);
    }
  }

  function tickStartStatus(t, c, isPlayer) {
    if (t.status.poison > 0) {
      const p = t.status.poison;
      if (isPlayer) playerDamage(c, p, true); else enemyDamage(c, p, false, true);
      t.status.poison = Math.max(0, t.status.poison - 1);
      pushLog(`${isPlayer ? '플레이어' : '적'} 독 ${p}`);
    }
    if (t.status.regen > 0) {
      const heal = t.status.regen;
      t.hp = cap(t.hp + heal, 0, t.maxHp);
      t.status.regen = Math.max(0, t.status.regen - 1);
      if (isPlayer) AUDIO.heal();
      pushLog(`${isPlayer ? '플레이어' : '적'} 재생 +${heal}`);
    }
  }

  function tickEndStatus(t) {
    if (t.status.weak > 0) t.status.weak--;
    if (t.status.vulnerable > 0) t.status.vulnerable--;
  }

  function addStatus(target, key, v) {
    target.status[key] = (target.status[key] || 0) + v;
  }

  function gainBlock(target, amount) {
    target.block += Math.max(0, amount);
  }

  function healPlayer(c, amount) {
    const p = c.player;
    const old = p.hp;
    p.hp = cap(p.hp + amount, 0, p.maxHp);
    const healed = p.hp - old;
    if (healed > 0) {
      AUDIO.heal();
      pushLog(`체력 +${healed}`);
      if (hasRelic('river_shell')) gainBlock(p, 4);
    }
  }

  function playerDamage(c, amount, pure = false) {
    const p = c.player;
    let dmg = Math.max(0, amount);
    if (p.status.vulnerable > 0) dmg = Math.ceil(dmg * 1.5);
    if (!pure && p.block > 0) {
      const b = Math.min(p.block, dmg);
      p.block -= b;
      dmg -= b;
    }
    if (dmg > 0) {
      p.hp -= dmg;
      AUDIO.hit();
      spawnFx('hitPlayer');
      if (p.status.reflect > 0) {
        const ref = Math.min(p.status.reflect, dmg);
        enemyDamage(c, ref, false);
      }
    }
    return dmg;
  }

  function enemyDamage(c, amount, aoe = false, pure = false) {
    const e = c.enemy;
    let dmg = Math.max(0, amount);
    if (c.player.status.weak > 0 && !pure) dmg = Math.floor(dmg * 0.75);
    if (e.status.vulnerable > 0 && !pure) dmg = Math.ceil(dmg * 1.5);

    if (!pure && e.block > 0) {
      const b = Math.min(e.block, dmg);
      e.block -= b;
      dmg -= b;
    }
    if (dmg > 0) {
      e.hp -= dmg;
      AUDIO.hit();
      spawnFx('hitEnemy');
      if (e.status.thorns > 0) playerDamage(c, e.status.thorns, true);
    }
    return dmg;
  }

  function drawCards(c, n) {
    for (let i = 0; i < n; i++) {
      if (c.hand.length >= 10) return;
      if (c.drawPile.length === 0) {
        if (c.discardPile.length === 0) return;
        c.drawPile = c.discardPile;
        c.discardPile = [];
        state.run.rng.shuffle(c.drawPile);
      }
      const card = c.drawPile.pop();
      if (card) c.hand.push(card);
    }
  }

  function moveAllHandToDiscard(c) {
    while (c.hand.length) c.discardPile.push(c.hand.pop());
  }

  function removeHandCard(uid) {
    const c = state.combat;
    const idx = c.hand.findIndex(k => k.uid === uid);
    if (idx < 0) return null;
    return c.hand.splice(idx, 1)[0];
  }

  function cardCostNow(card) {
    const c = state.combat;
    if (!c) return card.cost;
    let cost = card.cost;
    if (hasRelic('echo_bell') && card.type === 'skill' && !c.player.firstSkillDiscount) {
      cost = Math.max(0, cost - 1);
    }
    return cost;
  }

  function playCardByUid(uid, weakMode = false) {
    const c = state.combat;
    if (!c || c.phase !== 'player') return;
    const card = removeHandCard(uid);
    if (!card) return;

    let cost = cardCostNow(card);
    if (weakMode) cost = Math.max(0, cost - 1);
    if (c.player.energy < cost) {
      c.hand.push(card);
      flash('에너지가 부족합니다.');
      return;
    }

    c.player.energy -= cost;
    if (hasRelic('echo_bell') && card.type === 'skill') c.player.firstSkillDiscount = true;

    AUDIO.playCard(card.rune);
    resolveCard(c, card, weakMode ? 0.6 : 1);
    triggerRelics('cardPlay', c, card);
    c.discardPile.push(card);

    if (c.enemy.hp <= 0) checkBattleEnd();
  }

  function resolveCard(c, card, mul = 1) {
    const e = card.effect;
    const player = c.player;

    if (e.selfDamage) {
      playerDamage(c, Math.floor(e.selfDamage * mul), true);
    }
    if (e.damage) {
      let d = Math.floor(e.damage * mul);
      if (card.type === 'attack' && c.attackCounter === 0 && hasRelic('steel_mortar')) d += 4;
      if (e.bonusPoison && c.enemy.status.poison > 0) d += e.bonusPoison;
      enemyDamage(c, d, false);
      c.attackCounter++;
    }
    if (e.block) gainBlock(player, Math.floor(e.block * mul));
    if (e.heal) healPlayer(c, Math.floor(e.heal * mul));
    if (e.draw) drawCards(c, Math.floor(e.draw * mul));
    if (e.energy) player.energy += Math.floor(e.energy * mul);
    if (e.poison) addStatus(c.enemy, 'poison', Math.max(1, Math.floor(e.poison * mul)));
    if (e.regen) addStatus(player, 'regen', Math.max(1, Math.floor(e.regen * mul)));
    if (e.weak) addStatus(c.enemy, 'weak', Math.max(1, Math.floor(e.weak * mul)));
    if (e.vulnerable) {
      addStatus(c.enemy, 'vulnerable', Math.max(1, Math.floor(e.vulnerable * mul)));
      if (hasRelic('sable_ink')) enemyDamage(c, 2, false, true);
    }
    if (e.stun && !c.enemy.boss) addStatus(c.enemy, 'stun', Math.max(1, Math.floor(e.stun * mul)));
    if (e.thorns) addStatus(player, 'thorns', Math.max(1, Math.floor(e.thorns * mul)));
    if (e.reflect) addStatus(player, 'reflect', Math.max(1, Math.floor(e.reflect * mul)));
    if (e.maxEnergyBattle) player.maxEnergy += e.maxEnergyBattle;
    if (e.cleanse) {
      player.status.poison = 0;
      player.status.weak = Math.max(0, player.status.weak - 1);
      player.status.vulnerable = Math.max(0, player.status.vulnerable - 1);
    }
    if (e.weakSelf) addStatus(player, 'weak', e.weakSelf);
    pushLog(`${card.name} 사용`);
  }

  function placeCardFusion(uid, slot) {
    const c = state.combat;
    if (!c || c.phase !== 'player') return;
    if (c.fusionLock > 0) {
      flash('룬 골렘의 봉쇄로 이번 턴은 합성 불가!');
      return;
    }
    const card = removeHandCard(uid);
    if (!card) return;

    if (c.fusion[slot]) {
      c.hand.push(c.fusion[slot]);
    }
    c.fusion[slot] = card;
    AUDIO.playCard(card.rune);

    if (c.fusion[0] && c.fusion[1]) {
      castFusion();
    }
  }

  function castSingleFromFusion(slot) {
    const c = state.combat;
    if (!c || c.phase !== 'player') return;
    if (c.fusionLock > 0) {
      flash('합성 슬롯이 잠겨 있다.');
      return;
    }
    const card = c.fusion[slot];
    if (!card) {
      flash('빈 슬롯입니다.');
      return;
    }
    if (c.player.energy < 1) {
      flash('에너지가 부족합니다.');
      return;
    }
    c.player.energy -= 1;
    c.fusion[slot] = null;

    const weak = {
      fire: { damage: 8 },
      water: { block: 8, draw: 1 },
      lightning: { damage: 7, energy: 1 },
      nature: { heal: 5, poison: 2 },
      stone: { block: 10 }
    }[card.rune];

    const temp = { ...card, effect: weak, name: `${card.name}(단일)` };
    resolveCard(c, temp, 1);
    c.discardPile.push(card);
    pushLog(`단일 룬 발동 (${RUNE_LABEL[card.rune]})`);
    if (c.enemy.hp <= 0) checkBattleEnd();
  }

  function castFusion() {
    const c = state.combat;
    if (!c || c.phase !== 'player') return;
    if (c.fusionLock > 0) {
      flash('룬 봉쇄 상태에서는 합성할 수 없습니다.');
      return;
    }
    if (!(c.fusion[0] && c.fusion[1])) {
      flash('합성 슬롯 2칸이 필요합니다.');
      return;
    }
    const r0 = c.fusion[0].rune;
    const r1 = c.fusion[1].rune;
    const key = [r0, r1].sort().join('+');
    const f = FUSIONS[key];
    if (!f) {
      flash('알 수 없는 조합');
      return;
    }
    if (c.player.energy < f.cost) {
      flash(`에너지 ${f.cost} 필요`);
      return;
    }

    c.player.energy -= f.cost;
    const usedA = c.fusion[0];
    const usedB = c.fusion[1];
    c.fusion[0] = null;
    c.fusion[1] = null;
    c.discardPile.push(usedA, usedB);

    AUDIO.fusion();
    pushLog(`합성 ${f.name} 발동!`);
    f.run(c);
    triggerRelics('fusion', c, key);

    if (c.enemy.hp <= 0) checkBattleEnd();
  }

  function checkBattleEnd() {
    const c = state.combat;
    if (!c || c.resultReady) return;
    if (c.player.hp <= 0) {
      c.resultReady = true;
      AUDIO.bossLoop(false);
      loseRun();
      return;
    }
    if (c.enemy.hp <= 0) {
      c.resultReady = true;
      AUDIO.bossLoop(false);
      winBattle();
    }
  }

  function winBattle() {
    const c = state.combat;
    const run = state.run;
    run.hp = cap(c.player.hp, 0, run.maxHp);
    run.score += 55 + (c.nodeType === 'elite' ? 35 : 0) + (c.nodeType === 'boss' ? 120 : 0);

    let gold = c.nodeType === 'elite' ? 55 : 34;
    if (c.nodeType === 'boss') gold = 120;
    if (hasRelic('dawn_coin')) gold = Math.floor(gold * 1.2);
    if (run.flags.extraGoldNext) {
      gold += run.flags.extraGoldNext;
      run.flags.extraGoldNext = 0;
    }
    run.gold += gold;

    const rewards = {
      title: c.nodeType === 'boss' ? '보스 격파' : '전투 승리',
      gold,
      cards: randomRewardCards(run),
      relic: null,
      nodeType: c.nodeType
    };

    if (c.nodeType === 'elite' || c.nodeType === 'boss' || run.flags.forceEliteReward) {
      rewards.relic = randomRelic(run);
      run.flags.forceEliteReward = false;
    }

    if (run.currentNode) run.currentNode.cleared = true;
    state.reward = rewards;
    state.screen = 'reward';
    saveRun();
  }

  function loseRun() {
    const run = state.run;
    const p = state.profile;
    p.bestFloor = Math.max(p.bestFloor, run.floor);
    p.bestScore = Math.max(p.bestScore, run.score);
    p.runs += 1;
    saveProfile();
    localStorage.removeItem(SAVE_KEY);
    state.screen = 'gameover';
    state.combat = null;
  }

  function completeNodeAndBackMap() {
    const run = state.run;
    if (!run) return;
    if (run.currentNode) run.currentNode.cleared = true;
    run.currentNode = null;
    state.screen = 'map';
    saveRun();
  }

  function afterBossClear() {
    const run = state.run;
    if (run.floor >= 3) {
      run.score += 300;
      victoryRun();
      return;
    }
    run.floor += 1;
    run.hp = cap(run.hp + 18, 0, run.maxHp);
    run.map = generateMap(run.floor, run.rng);
    run.pos = { depth: -1, lane: 1 };
    run.currentNode = null;
    flash(`층 ${run.floor} 진입`);
    state.screen = 'map';
    saveRun();
  }

  function victoryRun() {
    const run = state.run;
    const p = state.profile;
    p.wins += 1;
    p.runs += 1;
    p.bestFloor = Math.max(p.bestFloor, 3);
    p.bestScore = Math.max(p.bestScore, run.score);
    p.unlockedRelics = Math.min(RELICS.length, p.unlockedRelics + 2);
    if (run.daily) p.dailyWins[todaySeedKST()] = true;
    saveProfile();
    localStorage.removeItem(SAVE_KEY);
    state.screen = 'victory';
    state.combat = null;
    state.reward = null;
  }

  function randomRewardCards(run) {
    const pool = CARD_LIBRARY.filter(c => !c.id.startsWith('curse_'));
    const arr = [];
    for (let i = 0; i < 3; i++) {
      arr.push(run.rng.pick(pool).id);
    }
    return arr;
  }

  function randomRelic(run) {
    const available = RELICS.slice(0, state.profile.unlockedRelics).filter(r => !run.relics.includes(r.id));
    if (available.length === 0) return run.rng.pick(RELICS).id;
    return run.rng.pick(available).id;
  }

  function addRelicToRun(run, relicId) {
    if (!relicId) return;
    if (!run.relics.includes(relicId)) {
      run.relics.push(relicId);
      flash(`유물 획득: ${relicName(relicId)}`);
    }
  }

  function relicName(id) {
    const r = RELICS.find(k => k.id === id);
    return r ? r.name : id;
  }

  function hasRelic(id) {
    return !!(state.run && state.run.relics.includes(id));
  }

  function triggerRelics(hook, c, payload) {
    const run = state.run;
    if (!run) return;
    for (const id of run.relics) {
      switch (id) {
        case 'catalyst':
          if (hook === 'fusion') enemyDamage(c, 5, false, true);
          break;
        case 'lens':
          if (hook === 'fusion') drawCards(c, 1);
          break;
        case 'amber_seal':
          if (hook === 'battleStart') gainBlock(c.player, 8);
          break;
        case 'silver_prayer':
          if (hook === 'turnStart') addStatus(c.player, 'regen', 1);
          break;
        case 'steel_mortar':
          if (hook === 'turnStart') c.attackCounter = 0;
          break;
        case 'glass_phial':
          if (hook === 'battleStart') c.player.tempEnergy = (c.player.tempEnergy || 0) + 1;
          break;
        case 'thorn_tiara':
          if (hook === 'battleStart') addStatus(c.player, 'thorns', 2);
          break;
        case 'echo_bell':
          if (hook === 'turnStart') c.player.firstSkillDiscount = false;
          break;
        case 'night_lantern':
          if (hook === 'battleStart' && c.nodeType === 'elite') drawCards(c, 1);
          break;
        case 'magnet':
          if (hook === 'cardPlay' && payload && payload.rune === 'lightning' && state.run.rng.next() < 0.30) {
            c.player.energy += 1;
            pushLog('자성 코어 발동: 에너지 +1');
          }
          break;
      }
    }
  }

  function spawnFx(type) {
    const c = state.combat;
    if (!c) return;
    c.fx.push({ type, t: 0, life: 0.35 + Math.random() * 0.25 });
  }

  function pushLog(msg) {
    const c = state.combat;
    if (!c) return;
    c.log.unshift(msg);
    if (c.log.length > 8) c.log.length = 8;
  }

  function flash(msg) {
    state.notice = msg;
    state.noticeTimer = 2.2;
  }

  function randomHighCard(rng) {
    const picks = CARD_LIBRARY.filter(c => c.cost >= 2 && !c.id.startsWith('curse_'));
    return rng.pick(picks).id;
  }

  function removeRandomCard(run, preferred = []) {
    const idx = run.deck.findIndex(id => preferred.includes(id));
    if (idx >= 0) {
      const removed = run.deck.splice(idx, 1)[0];
      flash(`카드 제거: ${CARD_BY_ID[removed].name}`);
      return;
    }
    if (run.deck.length <= 5) return;
    const i = run.rng.int(0, run.deck.length - 1);
    const removed = run.deck.splice(i, 1)[0];
    flash(`카드 제거: ${CARD_BY_ID[removed].name}`);
  }

  function boostRandomCard(run, amount) {
    const id = run.rng.pick(run.deck);
    if (!id) return;
    run.mods[id] = run.mods[id] || { boost: 0, costDown: 0 };
    run.mods[id].boost += amount;
    flash(`${CARD_BY_ID[id].name} 강화 +${amount}`);
  }

  function boostRandomTypeCard(run, type, amount) {
    const pool = run.deck.filter(id => CARD_BY_ID[id] && CARD_BY_ID[id].type === type);
    if (pool.length === 0) return boostRandomCard(run, amount);
    const id = run.rng.pick(pool);
    run.mods[id] = run.mods[id] || { boost: 0, costDown: 0 };
    run.mods[id].boost += amount;
    flash(`${CARD_BY_ID[id].name} 강화 +${amount}`);
  }

  function transformCard(run) {
    if (run.deck.length === 0) return;
    const i = run.rng.int(0, run.deck.length - 1);
    const old = run.deck[i];
    const targetRune = run.rng.pick(RUNES);
    const pool = CARD_LIBRARY.filter(c => c.rune === targetRune && !c.id.startsWith('curse_'));
    const next = run.rng.pick(pool);
    run.deck[i] = next.id;
    flash(`${CARD_BY_ID[old].name} → ${next.name}`);
  }

  function buyEventRelic(run, price) {
    if (run.gold < price) {
      flash('골드가 부족합니다.');
      return;
    }
    run.gold -= price;
    addRelicToRun(run, randomRelic(run));
  }

  function duplicateRandomCard(run) {
    const id = run.rng.pick(run.deck);
    if (!id) return;
    run.deck.push(id);
    flash(`${CARD_BY_ID[id].name} 복제됨`);
  }

  function healRun(run, amount) {
    const extra = hasRelic('deep_core') ? 10 : 0;
    run.hp = cap(run.hp + amount + extra, 0, run.maxHp);
  }

  function openEvent() {
    const ev = clone(state.run.rng.pick(EVENTS));
    state.event = ev;
    state.screen = 'event';
  }

  function openShop() {
    const run = state.run;
    const cardPool = CARD_LIBRARY.filter(c => !c.id.startsWith('curse_'));
    state.shop = {
      cards: [
        { id: run.rng.pick(cardPool).id, cost: 52 },
        { id: run.rng.pick(cardPool).id, cost: 58 },
        { id: run.rng.pick(cardPool).id, cost: 64 }
      ],
      relics: [
        { id: randomRelic(run), cost: 128 },
        { id: randomRelic(run), cost: 142 }
      ],
      removeCost: 75
    };
    state.screen = 'shop';
  }

  function openRest() {
    state.rest = { used: false };
    state.screen = 'rest';
  }

  function chooseMapNode(node) {
    const run = state.run;
    if (!run) return;
    const nextDepth = run.pos.depth + 1;
    if (node.depth !== nextDepth) return;

    if (run.pos.depth >= 0) {
      const links = run.map.links[`${run.pos.depth}-${run.pos.lane}`] || [];
      if (!links.includes(node.lane)) return;
    }

    run.pos = { depth: node.depth, lane: node.lane };
    run.currentNode = node;

    if (node.type === 'battle' || node.type === 'elite' || node.type === 'boss') {
      startBattle(node.type);
      return;
    }
    if (node.type === 'event') {
      openEvent();
      return;
    }
    if (node.type === 'shop') {
      openShop();
      return;
    }
    if (node.type === 'rest') {
      openRest();
      return;
    }
  }

  function update(dt) {
    state.frame++;
    if (state.noticeTimer > 0) {
      state.noticeTimer -= dt;
      if (state.noticeTimer <= 0) state.notice = '';
    }

    if (state.combat && state.combat.fx.length) {
      state.combat.fx = state.combat.fx.filter(f => {
        f.t += dt;
        return f.t < f.life;
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, V.w, V.h);
    drawBackground();
    state.uiButtons = [];
    state.cardRects = [];

    switch (state.screen) {
      case 'title': drawTitle(); break;
      case 'map': drawMap(); break;
      case 'battle': drawBattle(); break;
      case 'reward': drawReward(); break;
      case 'event': drawEvent(); break;
      case 'shop': drawShop(); break;
      case 'rest': drawRest(); break;
      case 'gameover': drawGameOver(); break;
      case 'victory': drawVictory(); break;
    }

    drawNotice();
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, V.h);
    g.addColorStop(0, '#6f583f');
    g.addColorStop(0.5, '#4a3725');
    g.addColorStop(1, PALETTE.bgDark);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, V.w, V.h);

    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = texture;
    ctx.fillRect(0, 0, V.w, V.h);
    ctx.restore();

    for (let i = 0; i < 7; i++) {
      const y = (i / 6) * V.h;
      ctx.strokeStyle = `rgba(245,232,209,${0.04 + i * 0.005})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, y + Math.sin((state.frame + i * 12) * 0.01) * 4);
      ctx.bezierCurveTo(V.w * 0.3, y + 20, V.w * 0.7, y - 12, V.w, y + 6);
      ctx.stroke();
    }
  }

  function drawPanel(x, y, w, h, title) {
    const g = ctx.createLinearGradient(x, y, x + w, y + h);
    g.addColorStop(0, 'rgba(242,229,204,.93)');
    g.addColorStop(1, 'rgba(228,209,177,.88)');
    rrect(ctx, x, y, w, h, 14, g, PALETTE.uiLine, 2);
    if (title) {
      shadowText(ctx, title, x + 18, y + 30, PALETTE.ink, 24, 'left');
      ctx.strokeStyle = 'rgba(79,59,39,.35)';
      ctx.beginPath();
      ctx.moveTo(x + 16, y + 40);
      ctx.lineTo(x + w - 16, y + 40);
      ctx.stroke();
    }
  }

  function addButton(x, y, w, h, label, enabled, onClick, style = 'dark') {
    const st = {
      dark: { fill: 'rgba(63,45,30,.95)', stroke: '#bfa175', text: '#f4e8d1' },
      light: { fill: 'rgba(235,214,181,.95)', stroke: '#8b7355', text: '#2f251a' },
      warn: { fill: 'rgba(168,94,43,.95)', stroke: '#f2c48e', text: '#fff3df' },
      good: { fill: 'rgba(66,122,68,.95)', stroke: '#b7dfb8', text: '#f2ffe9' }
    }[style] || { fill: '#333', stroke: '#666', text: '#fff' };

    const alpha = enabled ? 1 : 0.45;
    ctx.save();
    ctx.globalAlpha = alpha;
    rrect(ctx, x, y, w, h, 10, st.fill, st.stroke, 2);
    shadowText(ctx, label, x + w / 2, y + h / 2 + 7, st.text, Math.max(14, Math.min(24, h * 0.35)), 'center');
    ctx.restore();

    state.uiButtons.push({ x, y, w, h, enabled, onClick });
  }

  function drawNotice() {
    if (!state.notice) return;
    const alpha = Math.min(1, state.noticeTimer / 0.3, state.noticeTimer);
    ctx.save();
    ctx.globalAlpha = alpha;
    const w = Math.min(V.w * 0.74, 700);
    const x = (V.w - w) / 2;
    const y = V.h - 58;
    rrect(ctx, x, y, w, 42, 12, 'rgba(36,26,18,.88)', '#d0b38c', 2);
    shadowText(ctx, state.notice, x + w / 2, y + 27, '#f9edd9', 20, 'center');
    ctx.restore();
  }

  function drawTitle() {
    const centerX = V.w / 2;
    const panelW = Math.min(V.w * 0.86, 980);
    const panelH = Math.min(V.h * 0.82, 620);

    drawPanel(px, py, panelW, panelH, 'Rune Forge');

    shadowText(ctx, '합성 슬롯 2칸으로 10가지 원소 조합을 발동하세요.', centerX, py + 128, '#5f4b33', 22, 'center');

    ];

      shadowText(ctx, line, centerX, py + panelH - 18 - (2 - i) * 26, '#58442f', 20, 'center', 0.9);
    });

    drawRune(ctx, 'fire', px + 66, py + 76, 30);
    drawRune(ctx, 'water', px + 112, py + 76, 30);
    drawRune(ctx, 'lightning', px + panelW - 160, py + 76, 30);
    drawRune(ctx, 'nature', px + panelW - 114, py + 76, 30);
    drawRune(ctx, 'stone', px + panelW - 68, py + 76, 30);
  }

  function drawMiniStat(x, y, w, h, label, value) {
    rrect(ctx, x, y, w, h, 10, 'rgba(76,54,34,.86)', '#c7a87c', 2);
    shadowText(ctx, label, x + w / 2, y + 25, '#e6d2b3', 17, 'center');
    shadowText(ctx, value, x + w / 2, y + 56, '#fff5e1', 27, 'center');
  }

  function drawMap() {
    const run = state.run;
    const panelW = Math.min(V.w * 0.96, 1160);
    const panelH = Math.min(V.h * 0.94, 780);
    const px = (V.w - panelW) / 2;
    const py = (V.h - panelH) / 2;

    drawPanel(px, py, panelW, panelH, `층 ${run.floor} 지도`);

    drawRunHeader(px + 18, py + 54, panelW - 36, 56, run);

    const mapX = px + 70;
    const mapY = py + 132;
    const mapW = panelW - 140;
    const mapH = panelH - 240;

    const rows = run.map.rows;
    const depthCount = rows.length;

    const nodePos = [];
    for (let d = 0; d < depthCount; d++) {
      nodePos[d] = [];
      for (let lane = 0; lane < 3; lane++) {
        const node = rows[d][lane];
        if (!node) continue;
        const x = mapX + lane * (mapW / 2);
        const y = mapY + (d / (depthCount - 1)) * mapH;
        nodePos[d][lane] = { x, y, node };
      }
    }

    for (let d = 0; d < depthCount - 1; d++) {
      for (let lane = 0; lane < 3; lane++) {
        const cur = nodePos[d][lane];
        if (!cur) continue;
        const links = run.map.links[`${d}-${lane}`] || [];
        for (const tLane of links) {
          const nxt = nodePos[d + 1][tLane];
          if (!nxt) continue;
          ctx.strokeStyle = 'rgba(220,196,159,.35)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(cur.x, cur.y);
          ctx.bezierCurveTo(cur.x, (cur.y + nxt.y) * 0.5, nxt.x, (cur.y + nxt.y) * 0.5, nxt.x, nxt.y);
          ctx.stroke();
        }
      }
    }

    const nextDepth = run.pos.depth + 1;
    const allowed = new Set();
    if (run.pos.depth < 0) {
      for (let l = 0; l < 3; l++) {
        if (rows[0][l]) allowed.add(`0-${l}`);
      }
    } else {
      (run.map.links[`${run.pos.depth}-${run.pos.lane}`] || []).forEach(l => allowed.add(`${nextDepth}-${l}`));
    }

    for (let d = 0; d < depthCount; d++) {
      for (let lane = 0; lane < 3; lane++) {
        const p = nodePos[d][lane];
        if (!p) continue;
        const node = p.node;
        const isAllowed = allowed.has(`${d}-${lane}`);
        const isPassed = d < run.pos.depth || (d === run.pos.depth && lane === run.pos.lane);
        drawNode(p.x, p.y, node, isAllowed, isPassed);
        if (isAllowed) {
          state.uiButtons.push({ x: p.x - 26, y: p.y - 26, w: 52, h: 52, enabled: true, onClick: () => chooseMapNode(node) });
        }
      }
    }

    const markerY = run.pos.depth < 0 ? mapY - 28 : mapY + (run.pos.depth / (depthCount - 1)) * mapH;
    const markerX = mapX + run.pos.lane * (mapW / 2);
    ctx.fillStyle = 'rgba(248,226,192,.9)';
    ctx.beginPath();
    ctx.moveTo(markerX, markerY - 10);
    ctx.lineTo(markerX - 10, markerY + 8);
    ctx.lineTo(markerX + 10, markerY + 8);
    ctx.closePath();
    ctx.fill();

    addButton(px + 22, py + panelH - 84, 220, 48, '런 포기', true, () => {
      localStorage.removeItem(SAVE_KEY);
      state.run = null;
      state.screen = 'title';
      flash('런을 종료했습니다.');
    }, 'warn');

    addButton(px + panelW - 242, py + panelH - 84, 220, 48, '덱 보기', true, () => {
      flash(`덱 ${run.deck.length}장 | 유물 ${run.relics.length}개`);
    }, 'light');
  }

  function drawRunHeader(x, y, w, h, run) {
    rrect(ctx, x, y, w, h, 10, 'rgba(68,49,33,.88)', '#bb9c70', 2);
    const cols = [
      `체력 ${run.hp}/${run.maxHp}`,
      `골드 ${run.gold}`,
      `덱 ${run.deck.length}`,
      `유물 ${run.relics.length}`,
      `시드 ${run.seed}`
    ];
    cols.forEach((t, i) => {
      shadowText(ctx, t, x + 24 + i * (w - 48) / 5, y + 35, '#f4e8d1', 18, 'left');
    });
  }

  function nodeColor(type) {
    return {
      battle: '#915f3b',
      elite: '#aa6f47',
      event: '#6e6287',
      shop: '#5f7b51',
      rest: '#4b7c79',
      boss: '#9c3d3d'
    }[type] || '#888';
  }

  function nodeLabel(type) {
    return {
      battle: '전투',
      elite: '엘리트',
      event: '이벤트',
      shop: '상점',
      rest: '휴식',
      boss: '보스'
    }[type] || type;
  }

  function drawNode(x, y, node, active, passed) {
    const r = node.type === 'boss' ? 26 : 20;
    const base = nodeColor(node.type);
    const alpha = passed ? 0.45 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;

    const g = ctx.createRadialGradient(x - 4, y - 6, 2, x, y, r + 10);
    g.addColorStop(0, '#f8e8ca');
    g.addColorStop(1, base);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = active ? '#ffe7b8' : '#3d2a1d';
    ctx.lineWidth = active ? 3 : 2;
    ctx.stroke();

    if (node.type === 'battle' || node.type === 'elite') {
      ctx.strokeStyle = 'rgba(50,25,15,.7)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 8, y - 8);
      ctx.lineTo(x + 8, y + 8);
      ctx.moveTo(x + 8, y - 8);
      ctx.lineTo(x - 8, y + 8);
      ctx.stroke();
    } else if (node.type === 'shop') {
      ctx.fillStyle = 'rgba(255,245,216,.9)';
      ctx.fillRect(x - 8, y - 5, 16, 10);
      ctx.strokeRect(x - 8, y - 5, 16, 10);
    } else if (node.type === 'rest') {
      drawRune(ctx, 'nature', x, y, 16);
    } else if (node.type === 'event') {
      ctx.strokeStyle = 'rgba(255,243,219,.85)';
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 1.9);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,243,219,.85)';
      ctx.fillRect(x - 1, y + 10, 2, 2);
    } else if (node.type === 'boss') {
      ctx.strokeStyle = 'rgba(255,233,210,.95)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x - 11, y + 8);
      ctx.lineTo(x - 6, y - 12);
      ctx.lineTo(x, y - 4);
      ctx.lineTo(x + 6, y - 12);
      ctx.lineTo(x + 11, y + 8);
      ctx.stroke();
    }
    ctx.restore();

    shadowText(ctx, nodeLabel(node.type), x, y + r + 20, '#f2ddba', 14, 'center', passed ? 0.5 : 0.9);
  }

  function drawBattle() {
    const c = state.combat;
    if (!c) return;
    const run = state.run;

    const panelPad = V.portrait ? 10 : 14;
    const leftW = V.portrait ? V.w - panelPad * 2 : V.w * 0.36;
    const rightW = V.w - leftW - panelPad * 3;
    const topY = panelPad;

    const leftX = panelPad;
    const rightX = leftX + leftW + panelPad;

    drawPanel(leftX, topY, leftW, V.h * 0.52, '연금술사');
    drawPanel(rightX, topY, rightW, V.h * 0.52, c.enemy.name);

    drawCombatPlayer(leftX + 14, topY + 54, leftW - 28, V.h * 0.52 - 70, c);
    drawCombatEnemy(rightX + 14, topY + 54, rightW - 28, V.h * 0.52 - 70, c);

    const midY = V.h * 0.54;
    drawFusionArea(panelPad, midY, V.w - panelPad * 2, V.h * 0.17, c);

    const handY = V.h * 0.72;
    drawHandArea(panelPad, handY, V.w - panelPad * 2, V.h - handY - panelPad, c);

    drawBattleHud(c, run);
    drawCombatFx(c);

    if (state.drag && state.drag.card) drawDraggingCard();
  }

  function drawBattleHud(c, run) {
    const x = 14;
    const y = 10;
    const w = V.w - 28;
    rrect(ctx, x, y, w, 44, 8, 'rgba(49,34,23,.82)', '#c0a178', 2);

    const txt = [
      `층 ${run.floor}`,
      `턴 ${c.turn}`,
      `에너지 ${c.player.energy}/${c.player.maxEnergy}`,
      `덱 ${c.drawPile.length}`,
      `버림 ${c.discardPile.length}`,
      `골드 ${run.gold}`
    ];
    txt.forEach((t, i) => shadowText(ctx, t, x + 18 + i * 170, y + 28, '#f5e8ce', 18, 'left'));

    const endW = 150;
    addButton(V.w - endW - 24, y + 4, endW, 34, '턴 종료 [E]', c.phase === 'player', () => endPlayerTurn(), 'warn');
  }

  function drawCombatPlayer(x, y, w, h, c) {
    const p = c.player;
    shadowText(ctx, `HP ${p.hp}/${p.maxHp}`, x + 8, y + 24, '#3b2617', 26, 'left');
    drawBar(x + 8, y + 32, w - 16, 16, p.hp / p.maxHp, PALETTE.hp);
    shadowText(ctx, `방어 ${p.block}`, x + 8, y + 70, '#3b2617', 20, 'left');
    drawBar(x + 8, y + 78, w - 16, 12, cap(p.block / 45, 0, 1), PALETTE.block);

    drawStatusStack(x + 8, y + 102, p.status, true);

    const portraitX = x + w * 0.5;
    const portraitY = y + h * 0.68;
    drawPlayerPortrait(portraitX, portraitY, Math.min(w, h) * 0.36);
  }

  function drawCombatEnemy(x, y, w, h, c) {
    const e = c.enemy;
    shadowText(ctx, `HP ${e.hp}/${e.maxHp}`, x + 8, y + 24, '#3b2617', 26, 'left');
    drawBar(x + 8, y + 32, w - 16, 16, e.hp / e.maxHp, PALETTE.hp);
    shadowText(ctx, `방어 ${e.block}`, x + 8, y + 70, '#3b2617', 20, 'left');
    drawBar(x + 8, y + 78, w - 16, 12, cap(e.block / 55, 0, 1), PALETTE.block);

    drawStatusStack(x + 8, y + 102, e.status, false);

    const portraitX = x + w * 0.52;
    const portraitY = y + h * 0.67;
    drawEnemyPortrait(e, portraitX, portraitY, Math.min(w, h) * 0.34);

    drawIntentBadge(e, x + w - 180, y + 8);
  }

  function drawBar(x, y, w, h, ratio, color) {
    rrect(ctx, x, y, w, h, h / 2, 'rgba(36,26,19,.75)', '#3a2b1d', 1);
    const fill = cap(ratio, 0, 1);
    const g = ctx.createLinearGradient(x, y, x + w, y + h);
    g.addColorStop(0, color);
    g.addColorStop(1, '#f0dfc2');
    rrect(ctx, x + 1.5, y + 1.5, (w - 3) * fill, h - 3, (h - 3) / 2, g, null, 0);
  }

  function drawStatusStack(x, y, status, isPlayer) {
    const entries = [];
    ['poison', 'regen', 'weak', 'vulnerable', 'stun', 'thorns', 'reflect'].forEach(k => {
      const v = status[k] || 0;
      if (v > 0) entries.push({ k, v });
    });

    if (entries.length === 0) {
      shadowText(ctx, '상태 이상 없음', x, y + 18, '#6a563e', 15, 'left');
      return;
    }

    entries.forEach((e, i) => {
      const bx = x + (i % 4) * 92;
      const by = y + Math.floor(i / 4) * 24;
      rrect(ctx, bx, by, 86, 20, 6, 'rgba(60,42,27,.85)', '#b89e74', 1);
      shadowText(ctx, `${statusName(e.k)} ${e.v}`, bx + 8, by + 15, isPlayer ? '#ecdfc8' : '#ffe5cd', 14, 'left');
    });
  }

  function statusName(k) {
    return {
      poison: '독', regen: '재생', weak: '약화', vulnerable: '취약', stun: '기절',
      thorns: '가시', reflect: '반사'
    }[k] || k;
  }

  function drawIntentBadge(e, x, y) {
    rrect(ctx, x, y, 168, 52, 10, 'rgba(58,40,26,.9)', '#d2b58f', 2);
    const intent = e.intent;
    shadowText(ctx, `의도: ${INTENT_LABEL[intent.kind] || intent.kind}`, x + 10, y + 22, '#f8e8cb', 16, 'left');
    let detail = '';
    if (intent.v) detail += `${intent.v}${intent.hits ? 'x' + intent.hits : ''}`;
    if (intent.block) detail += `방어 ${intent.block}`;
    if (intent.str) detail += `힘+${intent.str}`;
    if (intent.weak) detail += `약화${intent.weak}`;
    if (intent.vuln) detail += ` 취약${intent.vuln}`;
    if (intent.note) detail += ` ${intent.note}`;
    shadowText(ctx, detail.trim(), x + 10, y + 42, '#f2d7b3', 14, 'left');
  }

  function drawPlayerPortrait(cx, cy, size) {
    ctx.save();
    const grad = ctx.createRadialGradient(cx - size * 0.2, cy - size * 0.3, 4, cx, cy, size * 1.1);
    grad.addColorStop(0, '#f0d9b7');
    grad.addColorStop(1, '#8f6f4c');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, size * 0.54, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#3a2a1b';
    ctx.beginPath();
    ctx.arc(cx - size * 0.16, cy - size * 0.08, size * 0.06, 0, Math.PI * 2);
    ctx.arc(cx + size * 0.16, cy - size * 0.08, size * 0.06, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#3a2a1b';
    ctx.lineWidth = size * 0.05;
    ctx.beginPath();
    ctx.arc(cx, cy + size * 0.08, size * 0.2, 0.15, Math.PI - 0.15);
    ctx.stroke();

    drawRune(ctx, 'fire', cx - size * 0.7, cy - size * 0.4, size * 0.25);
    drawRune(ctx, 'water', cx + size * 0.7, cy - size * 0.4, size * 0.25);
    drawRune(ctx, 'stone', cx, cy + size * 0.75, size * 0.22);
    ctx.restore();
  }

  function drawEnemyPortrait(enemy, cx, cy, size) {
    ctx.save();
    const hue = enemy.style?.hue || '#7e5f49';
    const g = ctx.createRadialGradient(cx - size * 0.15, cy - size * 0.15, 2, cx, cy, size * 0.95);
    g.addColorStop(0, '#f0dcc0');
    g.addColorStop(1, hue);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(cx, cy, size * 0.65, size * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();

    if (enemy.style?.horn) {
      ctx.fillStyle = '#5b3d2b';
      ctx.beginPath();
      ctx.moveTo(cx - size * 0.42, cy - size * 0.38);
      ctx.lineTo(cx - size * 0.25, cy - size * 0.74);
      ctx.lineTo(cx - size * 0.12, cy - size * 0.33);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + size * 0.42, cy - size * 0.38);
      ctx.lineTo(cx + size * 0.25, cy - size * 0.74);
      ctx.lineTo(cx + size * 0.12, cy - size * 0.33);
      ctx.closePath();
      ctx.fill();
    }

    if (enemy.style?.wings) {
      ctx.fillStyle = 'rgba(82,61,44,.65)';
      ctx.beginPath();
      ctx.ellipse(cx - size * 0.75, cy - size * 0.05, size * 0.28, size * 0.42, -0.5, 0, Math.PI * 2);
      ctx.ellipse(cx + size * 0.75, cy - size * 0.05, size * 0.28, size * 0.42, 0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = '#2e2015';
    ctx.beginPath();
    ctx.arc(cx - size * 0.18, cy - size * 0.08, size * 0.07, 0, Math.PI * 2);
    ctx.arc(cx + size * 0.18, cy - size * 0.08, size * 0.07, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#2e2015';
    ctx.lineWidth = size * 0.05;
    ctx.beginPath();
    ctx.moveTo(cx - size * 0.18, cy + size * 0.2);
    ctx.lineTo(cx + size * 0.18, cy + size * 0.2);
    ctx.stroke();

    ctx.restore();
  }

  function drawFusionArea(x, y, w, h, c) {
    drawPanel(x, y, w, h, '룬 합성 그리드');

    const slotW = Math.min(180, w * 0.18);
    const slotH = h - 54;
    const gap = Math.min(38, w * 0.03);
    const s1x = x + w * 0.5 - slotW - gap * 0.5;
    const s2x = x + w * 0.5 + gap * 0.5;
    const sy = y + 40;

    state.zones.fusion1 = { x: s1x, y: sy, w: slotW, h: slotH };
    state.zones.fusion2 = { x: s2x, y: sy, w: slotW, h: slotH };

    drawFusionSlot(state.zones.fusion1, c.fusion[0], 1);
    drawFusionSlot(state.zones.fusion2, c.fusion[1], 2);

    const playW = Math.min(220, w * 0.22);
    const playX = x + 24;
    const playY = sy;
    state.zones.play = { x: playX, y: playY, w: playW, h: slotH };
    drawPlayZone(state.zones.play);

    const infoX = x + w - 300;
    const infoW = 280;
    const infoY = sy;
    rrect(ctx, infoX, infoY, infoW, slotH, 10, 'rgba(64,46,30,.86)', '#c0a178', 2);

    const ready = c.fusion[0] && c.fusion[1];
    const locked = c.fusionLock > 0;
    let txt = locked ? '룬 골렘 봉쇄: 이번 턴 합성 불가' : '두 장을 넣어 합성하세요';
    if (ready) {
      const key = [c.fusion[0].rune, c.fusion[1].rune].sort().join('+');
      const f = FUSIONS[key];
      txt = f ? `${f.name}\n${f.desc}\n비용 ${f.cost}` : '정의되지 않은 조합';
      if (locked) txt = `봉쇄 중\n${txt}`;
    }
    wrapText(ctx, txt.replace(/\n/g, ' '), infoX + 12, infoY + 24, infoW - 24, 19, 4, '#f3e5cd', 16);

    addButton(infoX + 12, infoY + slotH - 48, 124, 36, '합성 [F]', ready && c.phase === 'player' && !locked, () => castFusion(), 'warn');
    const hasSingle = !!(c.fusion[0] || c.fusion[1]);
    addButton(infoX + 146, infoY + slotH - 48, 122, 36, '단일 [G]', hasSingle && c.phase === 'player' && !locked, () => {
      if (c.fusion[0]) castSingleFromFusion(0);
      else if (c.fusion[1]) castSingleFromFusion(1);
    }, 'light');
  }

  function drawPlayZone(z) {
    const g = ctx.createLinearGradient(z.x, z.y, z.x, z.y + z.h);
    g.addColorStop(0, 'rgba(102,67,45,.9)');
    g.addColorStop(1, 'rgba(63,42,27,.9)');
    rrect(ctx, z.x, z.y, z.w, z.h, 10, g, '#c9ab82', 2);
    shadowText(ctx, '플레이 영역', z.x + z.w / 2, z.y + z.h / 2 + 7, '#f5e8ce', 18, 'center');
  }

  function drawFusionSlot(slot, card, index) {
    const g = ctx.createLinearGradient(slot.x, slot.y, slot.x + slot.w, slot.y + slot.h);
    g.addColorStop(0, 'rgba(230,214,185,.9)');
    g.addColorStop(1, 'rgba(210,189,156,.9)');
    rrect(ctx, slot.x, slot.y, slot.w, slot.h, 10, g, '#8f7457', 2);
    shadowText(ctx, `슬롯 ${index}`, slot.x + 10, slot.y + 24, '#4a3522', 16, 'left');

    if (card) {
      drawCardMini(card, slot.x + slot.w / 2 - 58, slot.y + 28, 116, slot.h - 34, 1);
    } else {
      ctx.save();
      ctx.globalAlpha = 0.38;
      drawRune(ctx, RUNES[index - 1], slot.x + slot.w / 2, slot.y + slot.h / 2 + 6, 24);
      ctx.restore();
    }
  }

  function drawHandArea(x, y, w, h, c) {
    drawPanel(x, y, w, h, `손패 ${c.hand.length}`);

    const hand = c.hand;
    const count = hand.length;
    const cw = V.portrait ? 95 : 118;
    const ch = V.portrait ? 134 : 168;
    const spread = count > 1 ? Math.min(cw * 0.92, (w - 40 - cw) / (count - 1)) : 0;
    const baseX = x + (w - (cw + spread * Math.max(0, count - 1))) / 2;
    const cardY = y + h - ch - 12;

    for (let i = 0; i < count; i++) {
      const card = hand[i];
      if (state.drag && state.drag.uid === card.uid) continue;
      const cx = baseX + i * spread;
      drawCardMini(card, cx, cardY, cw, ch, 1);
      state.cardRects.push({ uid: card.uid, x: cx, y: cardY, w: cw, h: ch });
    }

    const deckX = x + 18;
    const stackY = y + 46;
    drawDeckStack(deckX, stackY, 80, 110, '뽑기', c.drawPile.length);
    drawDeckStack(deckX + 92, stackY, 80, 110, '버림', c.discardPile.length);
  }

  function drawDeckStack(x, y, w, h, label, n) {
    for (let i = 3; i >= 0; i--) {
      rrect(ctx, x + i * 2, y + i * 2, w, h, 8, 'rgba(180,160,131,.85)', '#79624b', 1);
    }
    shadowText(ctx, label, x + w / 2 + 3, y + h + 20, '#f0e0c7', 16, 'center');
    shadowText(ctx, String(n), x + w / 2 + 3, y + h + 40, '#ffeecf', 20, 'center');

  function drawCardMini(card, x, y, w, h, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;

    const g = ctx.createLinearGradient(x, y, x + w, y + h);
    g.addColorStop(0, PALETTE.cardBg);
    g.addColorStop(1, '#e1d2b7');
    rrect(ctx, x, y, w, h, 10, g, PALETTE.cardEdge, 2);

    const runeCol = PALETTE.runes[card.rune] || '#bbb';
    ctx.fillStyle = runeCol;
    ctx.fillRect(x + 4, y + 4, w - 8, 5);

    rrect(ctx, x + w - 34, y + 8, 26, 26, 8, 'rgba(75,54,37,.92)', '#e6d1af', 1.5);
    shadowText(ctx, String(card.cost), x + w - 21, y + 28, '#f9efdb', 18, 'center');

    drawRune(ctx, card.rune, x + 20, y + 21, 13);

    shadowText(ctx, card.name, x + w / 2, y + 52, '#2f251a', Math.max(12, Math.min(20, w * 0.12)), 'center');
    shadowText(ctx, CARD_TYPES[card.type], x + 10, y + 74, '#4a3a29', Math.max(10, Math.min(14, w * 0.1)), 'left');
    wrapText(ctx, card.desc, x + 10, y + 94, w - 20, 14, 5, '#312719', Math.max(10, Math.min(13, w * 0.1)));

    ctx.restore();
  }

  function drawDraggingCard() {
    const d = state.drag;
    const w = d.w;
    const h = d.h;
    drawCardMini(d.card, d.x - w / 2, d.y - h / 2, w, h, 0.96);
  }

  function drawCombatFx(c) {
    if (!c.fx.length) return;

    const enemyZone = { x: V.w * 0.66, y: V.h * 0.22 };
    const playerZone = { x: V.w * 0.19, y: V.h * 0.25 };

    c.fx.forEach(f => {
      const t = f.t / f.life;
      const alpha = 1 - t;
      ctx.save();
      ctx.globalAlpha = alpha;

      if (f.type === 'hitEnemy') {
        for (let i = 0; i < 8; i++) {
          const a = i / 8 * Math.PI * 2 + t * 5;
          const r = 10 + t * 90;
          const x = enemyZone.x + Math.cos(a) * r;
          const y = enemyZone.y + Math.sin(a) * r;
          ctx.strokeStyle = `rgba(232,93,58,${alpha})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x - 5, y - 5);
          ctx.lineTo(x + 5, y + 5);
          ctx.stroke();
        }
      }
      if (f.type === 'hitPlayer') {
        for (let i = 0; i < 6; i++) {
          const a = i / 6 * Math.PI * 2 + t * 4;
          const r = 8 + t * 70;
          const x = playerZone.x + Math.cos(a) * r;
          const y = playerZone.y + Math.sin(a) * r;
          ctx.fillStyle = `rgba(245,197,66,${alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, 2 + t * 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.restore();
    });
  }

    r.cards.forEach((id, i) => {

        finishReward();

    addButton(px + pw - 222, py + ph - 74, 200, 48, '보상 건너뛰기', true, () => finishReward(), 'light');

  function finishReward() {
    const run = state.run;
    const r = state.reward;

    if (r.relic) {
      addRelicToRun(run, r.relic);
      r.relic = null;
    }

    state.reward = null;
    state.combat = null;

    if (run.currentNode && run.currentNode.type === 'boss') {
      afterBossClear();
    } else {
      completeNodeAndBackMap();

  }

  function onPointerDown(e) {
    AUDIO.resume();
    const p = getPointerPos(e);
    state.pointer.x = p.x;
    state.pointer.y = p.y;
    state.pointer.down = true;
    state.pointer.moved = false;

    if (state.screen === 'battle') {
      for (let i = state.cardRects.length - 1; i >= 0; i--) {
        const r = state.cardRects[i];
        if (rectHit(p.x, p.y, r)) {
          const c = state.combat;
          const card = c.hand.find(k => k.uid === r.uid);
          if (!card) return;
          state.drag = {
            uid: card.uid,
            card,
            x: p.x,
            y: p.y,
            w: r.w,
            h: r.h
          };
          return;
        }
      }
    }
  }

  function onPointerMove(e) {
    const p = getPointerPos(e);
    state.pointer.x = p.x;
    state.pointer.y = p.y;
    if (state.pointer.down) state.pointer.moved = true;
    if (state.drag) {
      state.drag.x = p.x;
      state.drag.y = p.y;
    }
  }

  function onPointerUp(e) {
    const p = getPointerPos(e);
    state.pointer.x = p.x;
    state.pointer.y = p.y;

    if (state.drag) {
      const uid = state.drag.uid;
      const zones = state.zones;
      if (zones.fusion1 && rectHit(p.x, p.y, zones.fusion1)) {
        placeCardFusion(uid, 0);
      } else if (zones.fusion2 && rectHit(p.x, p.y, zones.fusion2)) {
        placeCardFusion(uid, 1);
      } else if (zones.play && rectHit(p.x, p.y, zones.play)) {
        playCardByUid(uid, false);
      }
      state.drag = null;
      state.pointer.down = false;
      return;
    }

    const clicked = !state.pointer.moved;
    if (clicked) {
      for (let i = state.uiButtons.length - 1; i >= 0; i--) {
        const b = state.uiButtons[i];
        if (!b.enabled) continue;
        if (rectHit(p.x, p.y, b)) {
          b.onClick();
          break;
        }
      }
    }

    state.pointer.down = false;
  }

  function onKey(e) {
    if (state.screen === 'battle') {
      const c = state.combat;
      if (!c || c.phase !== 'player') return;
      if (/^[1-9]$/.test(e.key)) {
        const idx = Number(e.key) - 1;
        if (c.hand[idx]) playCardByUid(c.hand[idx].uid, false);
      }
      if (e.key === 'f' || e.key === 'F') castFusion();
      if (e.key === 'g' || e.key === 'G') {
        if (c.fusion[0]) castSingleFromFusion(0);
        else if (c.fusion[1]) castSingleFromFusion(1);
      }
      if (e.key === 'e' || e.key === 'E' || e.key === 'Enter') endPlayerTurn();
    }
  }

  function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const pt = e.touches ? e.touches[0] || e.changedTouches[0] : e;
    const x = (pt.clientX - rect.left) * (V.w / rect.width);
    const y = (pt.clientY - rect.top) * (V.h / rect.height);
    return { x, y };
  }

  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    V.dpr = dpr;
    const cssW = window.innerWidth;
    const cssH = window.innerHeight;
    V.portrait = cssH > cssW;

    V.w = V.portrait ? 390 : 1280;
    V.h = V.portrait ? 844 : 720;

    canvas.width = Math.floor(V.w * dpr);
    canvas.height = Math.floor(V.h * dpr);
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
  }

  function loop(ts) {
    if (!state.then) state.then = ts;
    state.now = ts;
    state.dt = Math.min(0.05, (ts - state.then) / 1000);
    state.then = ts;

    update(state.dt);
    draw();

    requestAnimationFrame(loop);
  }

  function init() {
    state.profile = loadProfile();

    window.addEventListener('resize', resize);
    canvas.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);

    canvas.addEventListener('touchstart', onPointerDown, { passive: true });
    canvas.addEventListener('touchmove', onPointerMove, { passive: true });
    canvas.addEventListener('touchend', onPointerUp, { passive: true });

    window.addEventListener('keydown', onKey);

    resize();

    // 데이터 검증
    if (CARD_LIBRARY.length !== 47) {
      // 45 + 저주 2 = 47
      flash(`카드 수 검증: ${CARD_LIBRARY.length}`);
    }

    boot.style.display = 'none';
    requestAnimationFrame(loop);
  }

  init();
})();
</script>
</body>
</html>
