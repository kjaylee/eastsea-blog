const W=480,H=854;

const GRID_X=48, GRID_Y=90;

const C={
  bg:'#1a0d00', gold:'#c8860a', red:'#8b1a1a', paper:'#f5e6c8', green:'#3a6e3a', ink:'#2a1a0a',
  cover:'#5a4a3a', high:'#8a7a5a', panel:'#2a1a0a', line:'#7a4a16', swamp:'#4b5a2a'

const STATE={
  TITLE:'title', SQUAD:'squad', MAP:'map', COMBAT:'combat', REWARD:'reward',
  EVENT:'event', SHOP:'shop', GAMEOVER:'gameover', VICTORY:'victory'
};

const HEROES=[
  {id:'guan_yu',name:'관우',role:'중보병',passive:'청룡: 근접 +3',maxHp:42,atk:7,def:1,color:'#8b1a1a'},
  {id:'zhuge_liang',name:'제갈량',role:'전략가',passive:'신산: 매턴 드로우 +1',maxHp:34,atk:5,def:1,color:'#4b6a8b'},
  {id:'cao_cao',name:'조조',role:'지휘관',passive:'간웅: 전투 시작 공성계',maxHp:38,atk:6,def:1,color:'#6b4a2a'},
  {id:'zhang_fei',name:'장비',role:'돌격병',passive:'만부부당: 카드비용 -1(최소0)',maxHp:44,atk:7,def:0,color:'#5b2a2a'},
  {id:'zhou_yu',name:'주유',role:'화공전문',passive:'화공 +2',maxHp:35,atk:5,def:1,color:'#7a3a2a'},
  {id:'zhao_yun',name:'조운',role:'기병',passive:'상산: 이동 후 공격 +2',maxHp:39,atk:6,def:1,color:'#2f5f8a'}
];

const CARD_LIBRARY={
  march:{id:'march',name:'진군',kind:'move',cost:1,move:2,desc:'선택 유닛 2칸 이동'},
  swift:{id:'swift',name:'신속',kind:'move',cost:1,move:3,noAttack:true,desc:'선택 유닛 3칸 이동'},
  encircle:{id:'encircle',name:'포위',kind:'move_all',cost:2,move:1,desc:'전 유닛 1칸 전진'},

  strike:{id:'strike',name:'일격',kind:'attack',cost:1,dmg:5,range:1,desc:'인접 적 공격'},
  shoot:{id:'shoot',name:'사격',kind:'attack',cost:1,dmg:4,range:3,ranged:true,desc:'사거리 3칸'},
  smash:{id:'smash',name:'강타',kind:'attack',cost:2,dmg:10,range:1,desc:'단일 강공격'},
  twin:{id:'twin',name:'연격',kind:'attack_multi',cost:2,dmg:4,hits:2,range:1,desc:'같은 적 2회 타격'},
  arrows:{id:'arrows',name:'화살비',kind:'attack_aoe',cost:2,dmg:3,range:3,ranged:true,desc:'소형 범위 공격'},
  ambush:{id:'ambush',name:'기습',kind:'attack',cost:1,dmg:6,range:2,ignoreCover:true,desc:'엄폐 무시'},

  bagua:{id:'bagua',name:'팔진도',kind:'formation',cost:0,form:'bagua',desc:'전 유닛 방어 상승'},
  crane:{id:'crane',name:'학익진',kind:'formation',cost:0,form:'crane',desc:'전 유닛 공격 상승'},
  line:{id:'line',name:'장사진',kind:'formation',cost:0,form:'line',desc:'전열 AP 보너스'},

  fire:{id:'fire',name:'화공',kind:'strategy_dot',cost:1,range:3,burn:3,burnTurns:3,desc:'화상 3×3턴'},
  discord:{id:'discord',name:'반간계',kind:'strategy_cancel',cost:1,range:3,desc:'적 행동 취소'},
  siege:{id:'siege',name:'공성계',kind:'strategy_buff',cost:0,desc:'다음 공격 +8'}
};

const STARTER_DECK=[
  'march','swift','encircle',
  'strike','shoot','smash','twin','arrows','ambush',
  'bagua','crane','line',
  'fire','discord','siege'
];

const NODE_TYPES={
  combat:{icon:'⚔️',label:'전투'},
  expedition:{icon:'🗡️',label:'원정'},
  event:{icon:'❓',label:'이벤트'},
  shop:{icon:'🏪',label:'상점'},
  beacon:{icon:'🔥',label:'봉화대'},
  boss:{icon:'👑',label:'보스'}
};

const ui={buttons:[],toast:'',toastT:0};
let gameState=STATE.TITLE;
let run=null;
let combat=null;
let reward=null;
let eventData=null;
let shopData=null;
let squadPick=[];
let mapHits=[];
let mapScroll=0;
let mapPointer=null;

let pointerDown=false,pointerPressed=false,pointerReleased=false,pointerPos=vec2();
let dragCard=null; // {index, cardId, x, y}
let pendingAction=null; // {handIndex, cardId, actorId}

let ctx;

function applyLetterbox(){
  const scale=Math.min(window.innerWidth/W,window.innerHeight/H);
  const w=Math.floor(W*scale), h=Math.floor(H*scale);
  const c=mainCanvas;
  c.style.width=w+'px';
  c.style.height=h+'px';
  c.style.left=Math.floor((window.innerWidth-w)/2)+'px';
  c.style.top=Math.floor((window.innerHeight-h)/2)+'px';
}

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[randInt(0,arr.length-1)]; }
function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=randInt(0,i);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function distMan(a,b){ return Math.abs(a.x-b.x)+Math.abs(a.y-b.y); }
function inRect(p,r){ return p.x>=r.x&&p.y>=r.y&&p.x<=r.x+r.w&&p.y<=r.y+r.h; }
function alive(u){ return u.hp>0; }

function toast(msg,t=1.8){ ui.toast=msg; ui.toastT=t; }
function clearButtons(){ ui.buttons.length=0; }
function addButton(x,y,w,h,label,action,enabled=true,payload=null){
  ui.buttons.push({x,y,w,h,label,action,enabled,payload});
}
function hitButton(p){
  for(let i=ui.buttons.length-1;i>=0;i--){
    const b=ui.buttons[i];
    if(!b.enabled) continue;
    if(inRect(p,b)) return b;
  }
  return null;
}

function makeRun(){
  run={
    floor:1,maxFloor:3,gold:80,
    squad:squadPick.map(i=>({
      ...HEROES[i], hp:HEROES[i].maxHp, ap:2, buffs:{atk:0,atkT:0,def:0,defT:0,nextAtk:0,moved:false}
    })),
    deck:STARTER_DECK.slice(),
    map:{1:makeFloorMap(1),2:makeFloorMap(2),3:makeFloorMap(3)},
    route:[]
  };
  mapScroll=0;
  gameState=STATE.MAP;
  toast('분대를 선택했습니다. 첫 노드를 고르세요.');
}

function makeFloorMap(floor){
  const rows=7;
  const lanes=[100,240,380];
  const byRow=[]; const nodes=[];
  let id=1;

  const pickType=(r)=>{
    if(r===rows-1) return 'boss';
    if(r===0) return pick(['combat','event','shop']);
    if(r===rows-2) return Math.random()<0.5?'expedition':'combat';
    const t=Math.random();
    if(t<0.38) return 'combat';
    if(t<0.56) return 'event';
    if(t<0.72) return 'shop';
    if(t<0.88) return 'beacon';
    return 'expedition';
  };

  for(let r=0;r<rows;r++){
    const count=r===rows-1?1:3;
    const row=[];
    for(let i=0;i<count;i++){
      const lane=count===1?1:i;
      const node={
        id:'f'+floor+'n'+(id++), floor, row:r,
        x:lanes[lane]+randInt(-14,14), y:760-r*120,
        type:pickType(r), available:r===0, visited:false,
        children:[], parents:[]
      };
      row.push(node); nodes.push(node);
    }
    if(r===rows-1) row[0].type='boss';
    byRow.push(row);
  }

  function link(a,b){
    if(!a.children.includes(b.id)) a.children.push(b.id);
    if(!b.parents.includes(a.id)) b.parents.push(a.id);
  }

  for(let r=0;r<rows-1;r++){
    const cur=byRow[r], nxt=byRow[r+1];
    for(const n of cur){
      const near=[...nxt].sort((p,q)=>Math.abs(p.x-n.x)-Math.abs(q.x-n.x));
      link(n,near[0]);
      if(near[1]&&Math.random()<0.45) link(n,near[1]);
    }
    for(const n of nxt){
      if(n.parents.length) continue;
      const nearest=[...cur].sort((a,b)=>Math.abs(a.x-n.x)-Math.abs(b.x-n.x))[0];
      link(nearest,n);
    }
  }

  return {floor,rows,nodes,byRow,current:null};
}

function getFloorMap(){ return run.map[run.floor]; }
function getNodeById(id){ return getFloorMap().nodes.find(n=>n.id===id); }

function enterNode(node){
  const map=getFloorMap();
  if(!node.available||node.visited) return;
  node.visited=true;
  map.current=node.id;
  run.route.push({floor:run.floor,row:node.row,type:node.type});

  for(const n of map.nodes) n.available=false;
  for(const cid of node.children){ const c=getNodeById(cid); if(c && !c.visited) c.available=true; }

  if(node.type==='combat'||node.type==='expedition'||node.type==='boss'){
    beginCombat(node.type);
    return;
  }
  if(node.type==='event'){
    beginEvent();
    return;
  }
  if(node.type==='shop'){
    beginShop();
    return;
  }
  if(node.type==='beacon'){
    healSquad(8);
    run.gold += 12;
    toast('봉화대: 분대 회복 +8, 금화 +12');
    gameState=STATE.MAP;
    return;
  }
}

function healSquad(v){
  for(const s of run.squad){ s.hp=Math.min(s.maxHp,s.hp+v); }
}

function buildTerrain(){
  const grid=[];
  for(let y=0;y<GRID_H;y++){
    const row=[];
    for(let x=0;x<GRID_W;x++) row.push('plain');
    grid.push(row);
  }
  [[1,2],[4,2],[2,1],[3,3]].forEach(([x,y])=>grid[y][x]='cover');
  [[0,1],[5,1]].forEach(([x,y])=>grid[y][x]='high');
  [[2,3],[3,1]].forEach(([x,y])=>grid[y][x]='swamp');
  return grid;
}

function makeEnemy(name,elite=false,boss=false){
  const floor=run.floor;
  const hp=(boss?58:elite?38:30)+floor*8;
  const atk=(boss?9:elite?7:5)+floor;
  return {
    id:'e'+Math.random().toString(36).slice(2,8),
    name,team:'enemy',x:0,y:0,maxHp:hp,hp,ap:2,maxAp:2,atk,def:0,block:0,
    buffs:{atk:0,atkT:0,def:0,defT:0,nextAtk:0,moved:false},
    status:{burn:0,burnT:0,stun:0},
    intent:null
  };
}

function beginCombat(kind){
  const elite = kind==='expedition';
  const boss = kind==='boss';
  const enemyNames=boss?['명장','호위장','책사']:(elite?['정예 창병','정예 궁병','기마대']:[pick(['황건병','도적','군벌병']),pick(['궁수','책사','선봉']),pick(['호위병','창병','기마'])]);
  const enemies=enemyNames.map((n,i)=>makeEnemy(n,elite,boss&&i===0));

  enemies[0].x=1; enemies[0].y=0;
  enemies[1].x=3; enemies[1].y=0;
  enemies[2].x=4; enemies[2].y=1;

  const allies=run.squad.map((s,i)=>({
    ...s,
    x:[1,3,4][i], y:[4,4,3][i], team:'ally',
    block:0,
    status:{burn:0,burnT:0,stun:0}
  }));

  const drawPile=shuffle(run.deck.slice());

  combat={
    kind,terrain:buildTerrain(),allies,enemies,
    drawPile,discard:[],hand:[],
    turn:'player',turnIndex:1,
    teamBuff:{atk:0,atkT:0,def:0,defT:0},
    formation:{bagua:false,crane:false,line:false},
    aiQueue:[],aiTimer:0.45,aiIdx:0,
    handRects:[],allyRects:[],enemyRects:[],tileRects:[],
    msg:'',rewardGold:boss?44:elite?30:20,
    bossNode:kind==='boss'
  };

  if(run.squad.some(s=>s.id==='cao_cao')){
    combat.hand.push('siege');
  }

  startPlayerTurn(true);
  gameState=STATE.COMBAT;
}

function livingAllies(){ return combat.allies.filter(alive); }
function livingEnemies(){ return combat.enemies.filter(alive); }

function topDraw(){
  if(!combat.drawPile.length){
    if(!combat.discard.length) return null;
    combat.drawPile=shuffle(combat.discard.splice(0));
  }
  return combat.drawPile.pop()||null;
}

function applyFormationFlags(){
  const a=livingAllies();
  if(a.length<3){
    combat.formation={bagua:false,crane:false,line:false};
    return;
  }
  const ys=[...new Set(a.map(u=>u.y))];
  const line = ys.length===1;
  const sorted=[...a].sort((p,q)=>p.y-q.y);
  const front=sorted[0];
  const rear=sorted.slice(1);
  const crane = rear.length===2 && front.y < rear[0].y && front.y < rear[1].y && Math.abs(rear[0].x-rear[1].x)>=2;
  const bagua = ys.length===3 || (new Set(a.map(u=>u.x)).size===3 && ys.length>=2);
  combat.formation={bagua,crane,line};
}

function drawToHand(n){
  while(combat.hand.length<4 && n-->0){
    const c=topDraw();
    if(!c) break;
    combat.hand.push(c);
  }
}

function tickBurn(team){
  for(const u of team){
    if(!alive(u)) continue;
    if(u.status.burnT>0){
      u.hp-=u.status.burn;
      u.status.burnT--;
      if(u.hp<0) u.hp=0;
    }
  }
}

function tickBuff(unit){
  if(unit.buffs.atkT>0){ unit.buffs.atkT--; if(unit.buffs.atkT===0) unit.buffs.atk=0; }
  if(unit.buffs.defT>0){ unit.buffs.defT--; if(unit.buffs.defT===0) unit.buffs.def=0; }
}

function startPlayerTurn(first=false){
  combat.turn='player';
  combat.msg='';
  applyFormationFlags();
  tickBurn(combat.allies);
  tickBurn(combat.enemies);
  if(checkCombatEnd()) return;

  if(combat.teamBuff.atkT>0){ combat.teamBuff.atkT--; if(combat.teamBuff.atkT===0) combat.teamBuff.atk=0; }
  if(combat.teamBuff.defT>0){ combat.teamBuff.defT--; if(combat.teamBuff.defT===0) combat.teamBuff.def=0; }

  const drawBonus = run.squad.some(s=>s.id==='zhuge_liang') ? 1 : 0;
  for(const a of combat.allies){
    if(!alive(a)) continue;
    a.block=0;
    a.ap=2;
    a.buffs.moved=false;
    tickBuff(a);
  }
  if(combat.formation.line){
    const frontY=Math.min(...livingAllies().map(u=>u.y));
    for(const a of livingAllies()) if(a.y===frontY) a.ap += 1;
  }
  drawToHand(4+drawBonus);
  pendingAction=null;
  dragCard=null;
  if(!first) combat.turnIndex++;
  toast('아군 턴');
}

function planEnemyIntent(e){
  if(e.status.stun>0){
    e.intent={type:'stun',icon:'❌',value:0,label:'행동 불가'};
    return;
  }
  const r=Math.random();
  if(r<0.52) e.intent={type:'attack',icon:'⚔️',value:e.atk+randInt(0,3),label:'공격'};
  else if(r<0.70) e.intent={type:'guard',icon:'🛡️',value:6+run.floor*2,label:'방어'};
  else if(r<0.86) e.intent={type:'move',icon:'💨',value:1,label:'이동'};
  else e.intent={type:'fire',icon:'🔥',value:3+run.floor,label:'화공'};
}

function startEnemyTurn(){
  combat.turn='enemy';
  combat.msg='적 행동 중...';
  for(const e of livingEnemies()) planEnemyIntent(e);
  combat.aiQueue=livingEnemies();
  combat.aiIdx=0;
  combat.aiTimer=0.45;
}

function tileType(x,y){ return combat.terrain[y][x]; }

function unitAt(x,y){
  for(const a of combat.allies) if(alive(a)&&a.x===x&&a.y===y) return a;
  for(const e of combat.enemies) if(alive(e)&&e.x===x&&e.y===y) return e;
  return null;
}

function moveToward(u,target,steps=1){
  for(let i=0;i<steps;i++){
    const dirs=[
      {x:Math.sign(target.x-u.x),y:0},
      {x:0,y:Math.sign(target.y-u.y)}
    ].sort(()=>Math.random()-0.5);

    let moved=false;
    for(const d of dirs){
      if(!d.x&&!d.y) continue;
      const nx=clamp(u.x+d.x,0,GRID_W-1), ny=clamp(u.y+d.y,0,GRID_H-1);
      if(unitAt(nx,ny)) continue;
      u.x=nx; u.y=ny; moved=true; break;
    }
    if(!moved) break;
  }
}

function applyDamage(src,target,base,opts={}){
  if(!alive(src)||!alive(target)) return;
  let dmg=base;
  const srcBuff=(src.buffs.atk||0)+combat.teamBuff.atk;
  dmg += srcBuff;
  if(src.buffs.nextAtk){ dmg += src.buffs.nextAtk; src.buffs.nextAtk=0; }
  if(opts.ranged && tileType(src.x,src.y)==='high') dmg += 2;
  if(src.id==='guan_yu' && opts.range===1) dmg += 3;
  if(src.id==='zhou_yu' && opts.fire) dmg += 2;
  if(src.id==='zhao_yun' && src.buffs.moved) dmg += 2;

  const reduced = (target.buffs.def||0) + combat.teamBuff.def + (target.def||0);
  dmg = Math.max(1,dmg-reduced);
  if(!opts.ignoreCover && tileType(target.x,target.y)==='cover') dmg = Math.max(1,Math.floor(dmg*0.5));

  target.hp -= dmg;
  if(target.hp<0) target.hp=0;
}

function applyCardAction(cardId,actor,target){
  const card=CARD_LIBRARY[cardId];
  if(!card||!actor||!alive(actor)) return false;
  let cost=card.cost;
  if(actor.id==='zhang_fei') cost=Math.max(0,cost-1);
  if(actor.ap<cost){ toast('AP가 부족합니다'); return false; }

  const enemies=livingEnemies();
  const allies=livingAllies();

  if(card.kind==='formation'){
    if(card.form==='bagua'){
      const bonus=combat.formation.bagua?4:2;
      combat.teamBuff.def=bonus; combat.teamBuff.defT=3;
      toast(`팔진도 발동 · 방어 +${bonus}`);
    } else if(card.form==='crane'){
      const bonus=combat.formation.crane?3:1;
      combat.teamBuff.atk=bonus; combat.teamBuff.atkT=2;
      toast(`학익진 발동 · 공격 +${bonus}`);
    } else if(card.form==='line'){
      const bonus=combat.formation.line?2:1;
      const front=Math.min(...allies.map(u=>u.y));
      allies.filter(u=>u.y===front).forEach(u=>u.ap+=bonus);
      toast(`장사진 발동 · 전열 AP +${bonus}`);
    }
    actor.ap-=cost;
    return true;
  }

  if(card.kind==='strategy_buff'){
    actor.buffs.nextAtk += 8;
    actor.ap-=cost;
    toast('공성계: 다음 공격 +8');
    return true;
  }

  if(card.kind==='move_all'){
    for(const a of allies){
      const nearest=[...enemies].sort((p,q)=>distMan(a,p)-distMan(a,q))[0];
      if(nearest) moveToward(a,nearest,1);
      a.buffs.moved=true;
    }
    actor.ap-=cost;
    return true;
  }

  if(card.kind==='move'){
    if(!target || target.kind!=='tile'){ toast('이동할 타일을 선택하세요'); return false; }
    if(unitAt(target.x,target.y)){ toast('해당 타일은 점유 중입니다'); return false; }
    let range=card.move;
    if(tileType(actor.x,actor.y)==='swamp') range=Math.max(1,range-1);
    if(distMan(actor,target)>range){ toast('이동 거리 초과'); return false; }
    actor.x=target.x; actor.y=target.y;
    actor.buffs.moved=true;
    actor.ap-=cost;
    return true;
  }

  if(card.kind==='strategy_cancel'){
    if(!target||target.kind!=='enemy'){ toast('적을 선택하세요'); return false; }
    const e=target.unit;
    if(distMan(actor,e)>card.range){ toast('사거리 밖입니다'); return false; }
    e.status.stun=1;
    e.intent={type:'stun',icon:'❌',value:0,label:'행동 불가'};
    actor.ap-=cost;
    return true;
  }

  if(card.kind==='strategy_dot'){
    if(!target||target.kind!=='enemy'){ toast('적을 선택하세요'); return false; }
    const e=target.unit;
    if(distMan(actor,e)>card.range){ toast('사거리 밖입니다'); return false; }
    e.status.burn=card.burn;
    e.status.burnT=Math.max(e.status.burnT,card.burnTurns);
    actor.ap-=cost;
    return true;
  }

  if(card.kind==='attack' || card.kind==='attack_multi' || card.kind==='attack_aoe'){
    if(!target||target.kind!=='enemy'){ toast('공격 대상을 선택하세요'); return false; }
    const e=target.unit;
    if(distMan(actor,e) > card.range){ toast('사거리 밖입니다'); return false; }

    if(card.kind==='attack'){
      applyDamage(actor,e,card.dmg,{ignoreCover:card.ignoreCover,ranged:card.ranged,range:card.range});
    } else if(card.kind==='attack_multi'){
      for(let i=0;i<card.hits;i++) applyDamage(actor,e,card.dmg,{range:card.range});
    } else {
      for(const en of enemies){
        if(Math.abs(en.x-e.x)<=1 && Math.abs(en.y-e.y)<=1){
          applyDamage(actor,en,card.dmg,{ranged:true,range:card.range});
        }
      }
    }
    actor.ap-=cost;
    return true;
  }

  return false;
}

function executePending(target){
  if(!pendingAction) return;
  const actor=combat.allies.find(a=>a.id===pendingAction.actorId && alive(a));
  const ok=applyCardAction(pendingAction.cardId,actor,target);
  if(!ok) return;

  const idx=pendingAction.handIndex;
  if(idx>=0 && idx<combat.hand.length){
    const [used]=combat.hand.splice(idx,1);
    combat.discard.push(used);
  }
  pendingAction=null;
  applyFormationFlags();
  if(checkCombatEnd()) return;

  if(livingAllies().every(a=>a.ap<=0) && !combat.hand.length){
    endPlayerTurn();
  }
}

function enemyAct(e){
  if(!alive(e)) return;
  if(e.status.stun>0){ e.status.stun--; return; }
  const intent=e.intent;
  if(!intent) return;

  const target=[...livingAllies()].sort((a,b)=>distMan(e,a)-distMan(e,b))[0];
  if(!target) return;

  if(intent.type==='attack'){
    if(distMan(e,target)>1) moveToward(e,target,1);
    if(distMan(e,target)<=1) applyDamage(e,target,intent.value,{range:1});
  } else if(intent.type==='guard'){
    e.buffs.def=2+run.floor;
    e.buffs.defT=1;
  } else if(intent.type==='move'){
    moveToward(e,target,1);
  } else if(intent.type==='fire'){
    if(distMan(e,target)>2) moveToward(e,target,1);
    if(distMan(e,target)<=2){
      target.status.burn=3;
      target.status.burnT=Math.max(target.status.burnT,2);
    }
  }
}

function endPlayerTurn(){
  combat.discard.push(...combat.hand.splice(0));
  pendingAction=null;
  dragCard=null;
  startEnemyTurn();
}

function checkCombatEnd(){
  if(livingEnemies().length===0){
    for(const a of combat.allies){
      const save=run.squad.find(s=>s.id===a.id);
      if(save) save.hp=Math.max(0,a.hp);
    }
    run.gold += combat.rewardGold;
    const ids=Object.keys(CARD_LIBRARY);
    reward={
      fromBoss:combat.bossNode,
      cards:[pick(ids),pick(ids),pick(ids)],
      picked:false
    };
    combat=null;
    pendingAction=null;
    dragCard=null;
    gameState=STATE.REWARD;
    return true;
  }

  if(livingAllies().length===0){
    gameState=STATE.GAMEOVER;
    return true;
  }
  return false;
}

function beginEvent(){
  const events=[
    {
      title:'군사 회합',
      text:'떠돌이 책사가 계책을 제안합니다.',
      options:[
        {label:'책략 수락 (공성계 획득)', fn:()=>run.deck.push('siege')},
        {label:'신중히 거절 (금화 +20)', fn:()=>run.gold+=20}
      ]
    },
    {

      text:'은밀한 보급창을 발견했습니다.',
      options:[
        {label:'치유약 사용 (분대 +10)', fn:()=>healSquad(10)},
        {label:'무기 확보 (일격 획득)', fn:()=>run.deck.push('strike')}
      ]
    }
  ];
  eventData=pick(events);
  gameState=STATE.EVENT;
}

function beginShop(){
  const ids=Object.keys(CARD_LIBRARY);
  shopData={
    offers:[pick(ids),pick(ids),pick(ids)],
    prices:[28,34,40]
  };
  gameState=STATE.SHOP;
}

function afterNodeResolution(){
  const map=getFloorMap();
  const cur=getNodeById(map.current);
  if(cur && cur.type==='boss'){
    if(run.floor>=run.maxFloor){
      gameState=STATE.VICTORY;
      return;
    }
    run.floor++;
    mapScroll=0;
    toast(`Floor ${run.floor} 돌입`);
  }
  gameState=STATE.MAP;
}

function consumePointer(){
  pointerPos=mousePosScreen.copy();
  pointerDown=mouseIsDown(0);
  pointerPressed=mouseWasPressed(0);
  pointerReleased=mouseWasReleased(0);
}

function pointerForMap(){
  if(pointerPressed){
    mapPointer={x:pointerPos.x,y:pointerPos.y,scroll:mapScroll,drag:false};
  }
  if(mapPointer && pointerDown){
    const dy=pointerPos.y-mapPointer.y;
    if(Math.abs(dy)>6) mapPointer.drag=true;
    if(mapPointer.drag){
      mapScroll=clamp(mapPointer.scroll+dy,-360,140);
    }
  }
  if(mapPointer && pointerReleased){
    const wasDrag=mapPointer.drag;
    mapPointer=null;
    if(wasDrag) return true;
  }
  return false;
}

function updateTitle(){
  if(!pointerPressed) return;
  const btn={x:130,y:600,w:220,h:64};
  if(inRect(pointerPos,btn)){ squadPick=[]; gameState=STATE.SQUAD; }
}

function updateSquad(){
  if(!pointerPressed) return;
  for(let i=0;i<6;i++){
    const col=i%2,row=(i/2)|0;
    const r={x:26+col*228,y:150+row*160,w:210,h:146};
    if(inRect(pointerPos,r)){
      const idx=squadPick.indexOf(i);
      if(idx>=0) squadPick.splice(idx,1);
      else if(squadPick.length<3) squadPick.push(i);
      else toast('3인만 선택 가능합니다');
      return;
    }
  }
  const btn={x:120,y:750,w:240,h:56};
  if(squadPick.length===3 && inRect(pointerPos,btn)) makeRun();
}

function updateMap(){
  const scrolled=pointerForMap();
  if(scrolled||!pointerReleased) return;

  for(let i=mapHits.length-1;i>=0;i--){
    const h=mapHits[i];
    const dx=pointerPos.x-h.x,dy=pointerPos.y-h.y;
    if(dx*dx+dy*dy<=h.r*h.r){
      if(!h.node.available||h.node.visited){ toast('아직 이동할 수 없는 노드입니다'); return; }
      enterNode(h.node);
      return;
    }
  }
}

function cardAtPointer(){
  for(let i=combat.handRects.length-1;i>=0;i--){
    const r=combat.handRects[i];
    if(inRect(pointerPos,r)) return r.index;
  }
  return -1;
}

function targetAtPointer(){
  for(const r of combat.enemyRects){ if(inRect(pointerPos,r.rect)) return {kind:'enemy',unit:r.unit}; }
  for(const r of combat.tileRects){ if(inRect(pointerPos,r.rect)) return {kind:'tile',x:r.x,y:r.y}; }
  return null;
}

function updateCombat(){
  if(!combat) return;

  if(combat.turn==='enemy'){
    combat.aiTimer-=timeDelta;
    if(combat.aiTimer<=0){
      const unit=combat.aiQueue[combat.aiIdx++];
      if(unit) enemyAct(unit);
      if(checkCombatEnd()) return;
      if(combat.aiIdx>=combat.aiQueue.length){
        startPlayerTurn();
      } else {
        combat.aiTimer=0.55;
      }
    }
    return;
  }

  if(pointerPressed && !dragCard){
    const idx=cardAtPointer();
    if(idx>=0){
      dragCard={index:idx,cardId:combat.hand[idx],x:pointerPos.x,y:pointerPos.y};
      return;
    }
    const btn=hitButton(pointerPos);
    if(btn) handleButton(btn);
    else if(pendingAction){
      const t=targetAtPointer();
      if(t){ executePending(t); }
      else pendingAction=null;
    }
  }

  if(dragCard && pointerDown){
    dragCard.x=pointerPos.x; dragCard.y=pointerPos.y;
  }

  if(dragCard && pointerReleased){
    let actor=null;
    for(const ar of combat.allyRects){ if(inRect(pointerPos,ar.rect) && alive(ar.unit)){ actor=ar.unit; break; } }
    if(actor){
      pendingAction={handIndex:dragCard.index,cardId:dragCard.cardId,actorId:actor.id};
      const card=CARD_LIBRARY[dragCard.cardId];
      if(card.kind==='formation'||card.kind==='strategy_buff'||card.kind==='move_all'){
        executePending(null);
      } else {
        toast(`${actor.name} 선택 · 대상 지정`);
      }
    }
    dragCard=null;
  }

  if(pointerPressed && pendingAction){
    const t=targetAtPointer();
    if(t) executePending(t);
  }
}

function updateReward(){
  if(!pointerPressed) return;
  if(!reward.picked){
    for(let i=0;i<3;i++){
      const r={x:20+i*154,y:280,w:140,h:190};
      if(inRect(pointerPos,r)){
        run.deck.push(reward.cards[i]);
        reward.picked=true;
        toast(CARD_LIBRARY[reward.cards[i]].name+' 획득');
        return;
      }
    }
    if(inRect(pointerPos,{x:170,y:500,w:140,h:44})) reward.picked=true;
    return;
  }
  if(inRect(pointerPos,{x:130,y:560,w:220,h:56})){
    reward=null;
    afterNodeResolution();
  }
}

function updateEvent(){
  if(!pointerPressed||!eventData) return;
  for(let i=0;i<eventData.options.length;i++){
    const r={x:60,y:350+i*90,w:360,h:70};
    if(inRect(pointerPos,r)){
      eventData.options[i].fn();
      eventData=null;
      gameState=STATE.MAP;
      return;
    }
  }
}

function updateShop(){
  if(!pointerPressed||!shopData) return;
  for(let i=0;i<3;i++){
    const r={x:20+i*154,y:280,w:140,h:190};
    if(inRect(pointerPos,r)){
      if(run.gold<shopData.prices[i]){ toast('금화 부족'); return; }
      run.gold-=shopData.prices[i];
      run.deck.push(shopData.offers[i]);
      toast(CARD_LIBRARY[shopData.offers[i]].name+' 구매');
      shopData.offers.splice(i,1,'march');
      shopData.prices.splice(i,1,999);
      return;
    }
  }
  if(inRect(pointerPos,{x:40,y:520,w:180,h:52})){
    if(run.gold<24){ toast('금화 부족'); return; }
    run.gold-=24; healSquad(10); toast('분대 치유 +10');
    return;
  }
  if(inRect(pointerPos,{x:260,y:520,w:180,h:52})){
    shopData=null;
    gameState=STATE.MAP;
  }
}

function updateEnd(){
  if(!pointerPressed) return;
  if(inRect(pointerPos,{x:130,y:620,w:220,h:64})){
    run=null; combat=null; reward=null; squadPick=[];
    gameState=STATE.TITLE;
  }
}

function handleButton(btn){
  if(btn.action==='end_turn') endPlayerTurn();
  else if(btn.action==='cancel_pending') pendingAction=null;
}

function gameInit(){
  ctx=mainCanvas.getContext('2d');
  applyLetterbox();
  window.addEventListener('resize',applyLetterbox);
}

function gameUpdate(){
  consumePointer();
  clearButtons();
  if(ui.toastT>0) ui.toastT-=timeDelta;

  if(gameState===STATE.TITLE) updateTitle();
  else if(gameState===STATE.SQUAD) updateSquad();
  else if(gameState===STATE.MAP) updateMap();
  else if(gameState===STATE.COMBAT) updateCombat();
  else if(gameState===STATE.REWARD) updateReward();
  else if(gameState===STATE.EVENT) updateEvent();
  else if(gameState===STATE.SHOP) updateShop();
  else if(gameState===STATE.GAMEOVER||gameState===STATE.VICTORY) updateEnd();
}

function gameUpdatePost(){ cameraPos=vec2(); }

function gameRender(){
  drawRect(vec2(),vec2(200,200),new Color(0x1a/255,0x0d/255,0,1));
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function panel(x,y,w,h,a=0.96){
  ctx.save();
  ctx.globalAlpha=a;
  ctx.fillStyle=C.panel;
  roundRect(x,y,w,h,10); ctx.fill();
  ctx.strokeStyle=C.line; ctx.lineWidth=2; ctx.stroke();
  ctx.restore();
}

function txt(t,x,y,size=18,color=C.paper,align='center',weight='600'){
  ctx.fillStyle=color;
  ctx.font=`${weight} ${size}px Georgia`;
  ctx.textAlign=align;
  ctx.textBaseline='middle';
  ctx.fillText(t,x,y);
}

function drawButton(b){
  ctx.fillStyle=b.enabled?'#f0dfbf':'#9f8f76';
  roundRect(b.x,b.y,b.w,b.h,10); ctx.fill();
  ctx.strokeStyle=C.line; ctx.lineWidth=2; ctx.stroke();
  txt(b.label,b.x+b.w/2,b.y+b.h/2,18,b.enabled?C.ink:'#3d2f22');
}

function drawHeroChip(h,x,y,w,hg,selected=false){
  panel(x,y,w,hg,0.95);
  ctx.fillStyle=h.color; roundRect(x+10,y+10,56,56,8); ctx.fill();
  txt(h.name,x+78,y+24,20,C.paper,'left','700');
  txt(h.role,x+78,y+46,13,'#d4b88a','left','500');
  txt(h.passive,x+12,y+74,12,'#c7b089','left','500');
  if(selected){ ctx.strokeStyle=C.gold; ctx.lineWidth=3; ctx.strokeRect(x+3,y+3,w-6,hg-6); }
}

function gridToScreen(x,y){ return {x:GRID_X+x*TILE,y:GRID_Y+y*TILE}; }

function drawTile(x,y,type){
  const p=gridToScreen(x,y);
  let fill='#3a2a1a';
  if(type==='cover') fill=C.cover;
  else if(type==='high') fill=C.high;
  else if(type==='swamp') fill=C.swamp;
  ctx.fillStyle=fill; ctx.fillRect(p.x,p.y,TILE-2,TILE-2);
  ctx.strokeStyle='#3b2514'; ctx.strokeRect(p.x,p.y,TILE-2,TILE-2);
  if(type==='cover') txt('▦',p.x+30,p.y+30,18,'#d7c8b0');
  if(type==='high') txt('▲',p.x+30,p.y+30,14,'#efe1c8');
  if(type==='swamp') txt('≈',p.x+30,p.y+30,16,'#d4e6b0');
}

function drawUnit(u){
  const p=gridToScreen(u.x,u.y);
  const col=u.team==='ally'?'#3a6e3a':'#8b1a1a';
  ctx.fillStyle=col; roundRect(p.x+6,p.y+6,50,50,8); ctx.fill();
  ctx.strokeStyle='#efe1c8'; ctx.lineWidth=1.5; ctx.stroke();
  txt(u.name[0],p.x+31,p.y+30,20,'#f5e6c8');

  const hpR={x:p.x+4,y:p.y+56,w:56,h:6};
  ctx.fillStyle='#2b1a12'; ctx.fillRect(hpR.x,hpR.y,hpR.w,hpR.h);
  ctx.fillStyle='#c94a2a'; ctx.fillRect(hpR.x,hpR.y,hpR.w*(u.hp/u.maxHp),hpR.h);

  if(u.team==='enemy'&&u.intent){
    txt(u.intent.icon,p.x+52,p.y+10,14,C.paper);
  }
  if(u.status.burnT>0) txt('🔥',p.x+10,p.y+10,12,C.gold);
}

function drawCard(cardId,x,y,w,h,ghost=false){
  const c=CARD_LIBRARY[cardId];
  const typeColor = c.kind.includes('attack')?C.red:c.kind.includes('move')?C.green:'#6f5a2a';
  ctx.save();
  if(ghost) ctx.globalAlpha=0.92;
  ctx.fillStyle='#f1e3c7'; roundRect(x,y,w,h,10); ctx.fill();
  ctx.strokeStyle=typeColor; ctx.lineWidth=3; ctx.stroke();
  txt(c.name,x+w/2,y+20,16,C.ink);
  txt('AP '+c.cost,x+w/2,y+42,12,C.ink,'center','700');
  ctx.fillStyle=C.ink; ctx.font='500 11px Georgia'; ctx.textAlign='left'; ctx.textBaseline='top';
  const words=c.desc.split(' '); let line='', yy=y+56;
  for(const wd of words){
    const test=line+wd+' ';
    if(ctx.measureText(test).width>w-12){ ctx.fillText(line,x+6,yy); line=wd+' '; yy+=14; }
    else line=test;
  }
  ctx.fillText(line,x+6,yy);
  ctx.restore();
}

function renderMap(){
  mapHits=[];
  panel(14,12,452,72);

  txt(`금화 ${run.gold}`,430,40,16,C.paper,'right');

  for(const n of map.nodes){

function renderCombat(){
  // enemy bar
  panel(8,8,464,70);
  txt(`교전 Floor ${run.floor} · Turn ${combat.turnIndex}`,16,30,16,C.gold,'left');
  const intentTxt=livingEnemies().map(e=>`${e.name} ${e.intent?e.intent.icon:'·'}`).join('  ');
  txt(intentTxt,16,54,13,C.paper,'left');

  combat.tileRects=[];
  for(let y=0;y<GRID_H;y++) for(let x=0;x<GRID_W;x++){
    drawTile(x,y,tileType(x,y));
    const p=gridToScreen(x,y);
    combat.tileRects.push({x,y,rect:{x:p.x,y:p.y,w:TILE-2,h:TILE-2}});
  }

  combat.allyRects=[]; combat.enemyRects=[];
  for(const a of combat.allies){ if(!alive(a)) continue; drawUnit(a);
    const p=gridToScreen(a.x,a.y); combat.allyRects.push({unit:a,rect:{x:p.x,y:p.y,w:60,h:60}}); }
  for(const e of combat.enemies){ if(!alive(e)) continue; drawUnit(e);
    const p=gridToScreen(e.x,e.y); combat.enemyRects.push({unit:e,rect:{x:p.x,y:p.y,w:60,h:60}}); }

  panel(10,448,460,72);
  let x=18;
  for(const a of combat.allies){
    const hp=`${a.name} HP ${a.hp}/${a.maxHp} AP ${a.ap}`;
    txt(hp,x,472,12,alive(a)?C.paper:'#6f5f4a','left');
    x+=152;
  }

  const f=combat.formation;
  txt(`진형 ${f.bagua?'팔진도 ':'-'}${f.crane?'학익진 ':'-'}${f.line?'장사진':''}`,20,503,12,'#d5bf97','left');

  panel(8,524,464,224);
  combat.handRects=[];
  for(let i=0;i<combat.hand.length && i<4;i++){
    const x=16+i*114, y=548;
    if(dragCard && dragCard.index===i) continue;
    drawCard(combat.hand[i],x,y,106,152,false);
    combat.handRects.push({index:i,x,y,w:106,h:152});
  }

  if(dragCard){
    drawCard(dragCard.cardId,dragCard.x-53,dragCard.y-76,106,152,true);
  }

  const endBtn={x:352,y:756,w:112,h:46,label:'턴 종료',action:'end_turn',enabled:combat.turn==='player'};
  addButton(endBtn.x,endBtn.y,endBtn.w,endBtn.h,endBtn.label,endBtn.action,endBtn.enabled);
  drawButton(endBtn);

  txt(`덱 ${combat.drawPile.length} / 버림 ${combat.discard.length}`,16,776,13,C.paper,'left');

  if(pendingAction){
    const c=CARD_LIBRARY[pendingAction.cardId];
    const cancelBtn={x:224,y:756,w:112,h:46,label:'취소',action:'cancel_pending',enabled:true};
    addButton(cancelBtn.x,cancelBtn.y,cancelBtn.w,cancelBtn.h,cancelBtn.label,cancelBtn.action,true);
    drawButton(cancelBtn);
    txt(`선택 카드: ${c.name} · 대상 지정`,20,756,12,C.gold,'left');
  }

  if(combat.turn==='enemy'){
    txt('적 턴',428,756,14,C.red,'right');
  }
}

function renderReward(){
  panel(20,40,440,130);
  txt('승리 보상',240,80,30,C.gold);
  txt('카드 1장을 획득하거나 건너뛰세요',240,122,14,C.paper);
  txt(`금화 +${run ? run.gold : 0}`,240,146,13,'#d3ba8f');

  for(let i=0;i<3;i++){
    drawCard(reward.cards[i],20+i*154,280,140,190,false);
  }
  if(!reward.picked){
    const skip={x:170,y:500,w:140,h:44,label:'건너뛰기',enabled:true};
    drawButton(skip);
  } else {
    const cont={x:130,y:560,w:220,h:56,label:'맵으로 복귀',enabled:true};
    drawButton(cont);
  }
}

function renderEvent(){
  panel(24,70,432,200);
  txt(eventData.title,240,120,28,C.gold);
  txt(eventData.text,240,168,16,C.paper);
  for(let i=0;i<eventData.options.length;i++){
    const r={x:60,y:350+i*90,w:360,h:70,label:eventData.options[i].label,enabled:true};
    drawButton(r);
  }
}

function renderShop(){
  panel(20,30,440,140);
  txt('상점',240,78,32,C.gold);
  txt(`금화 ${run.gold}`,240,122,18,C.paper);

  for(let i=0;i<3;i++){
    drawCard(shopData.offers[i],20+i*154,280,140,190,false);
    txt(`${shopData.prices[i]} G`,92+i*154,485,14,C.gold);
  }

  drawButton({x:40,y:520,w:180,h:52,label:'분대 치유 (24G)',enabled:true});
  drawButton({x:260,y:520,w:180,h:52,label:'상점 나가기',enabled:true});
}

function renderEnd(victory){
  panel(32,110,416,260);
  txt(victory?'승리':'패배',240,170,48,victory?C.gold:C.red);
  txt(victory?'명장 대전을 돌파했습니다.':'분대가 전멸했습니다.',240,232,18,C.paper);
  if(run){ txt(`도달 Floor ${run.floor}`,240,264,14,'#d1b98d'); }
  drawButton({x:130,y:620,w:220,h:64,label:'타이틀로',enabled:true});
}

function gameRenderPost(){
  if(gameState===STATE.TITLE) renderTitle();
  else if(gameState===STATE.SQUAD) renderSquad();
  else if(gameState===STATE.MAP && run) renderMap();
  else if(gameState===STATE.COMBAT && combat) renderCombat();
  else if(gameState===STATE.REWARD && reward) renderReward();
  else if(gameState===STATE.EVENT && eventData) renderEvent();
  else if(gameState===STATE.SHOP && shopData) renderShop();
  else if(gameState===STATE.GAMEOVER) renderEnd(false);
  else if(gameState===STATE.VICTORY) renderEnd(true);

  for(const b of ui.buttons) drawButton(b);
  if(ui.toastT>0) txt(ui.toast,240,816,13,C.gold);
}

engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
</script>
</body>
</html>
