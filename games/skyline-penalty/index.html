<!DOCTYPE html>
<html lang="ko">
<head>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#f3e3cf;color:#2d2432;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;overflow:hidden;touch-action:none}
body{display:flex;justify-content:center;align-items:center;min-height:100vh}
#app{position:relative;width:min(100vw,460px);height:min(100vh,900px);height:calc(var(--tg-viewport-height,100vh));max-height:100vh;background:linear-gradient(180deg,#f7d7a8 0%,#efb36f 22%,#d97b4a 58%,#6e5863 100%);overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%}
button{border:none;border-radius:18px;padding:14px 18px;font:inherit;font-weight:800;cursor:pointer}
button:active{transform:scale(.98)}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;z-index:5}
.panel{width:min(100%,360px);background:rgba(255,247,236,.9);backdrop-filter:blur(10px);border:1px solid rgba(106,74,60,.16);border-radius:28px;box-shadow:0 24px 50px rgba(56,25,12,.25);padding:22px}
.title{font-size:34px;line-height:1.05;font-weight:900;letter-spacing:-.04em;margin:0 0 8px;color:#412d25}
.subtitle{margin:0 0 18px;font-size:14px;line-height:1.45;color:#6e5649}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0 18px}
.stat{background:#fff7ef;border-radius:18px;padding:12px 10px;text-align:center;border:1px solid rgba(96,63,49,.08)}
.stat .label{display:block;font-size:11px;color:#8a6c5f;margin-bottom:4px}
.stat .value{display:block;font-size:19px;font-weight:900;color:#51352b}
.row{display:flex;gap:10px;align-items:center}
.row>*{flex:1}
.primary{background:linear-gradient(135deg,#da6a3f 0%,#f0b15c 100%);color:#fff;box-shadow:0 10px 24px rgba(217,123,74,.35)}
.secondary{background:#fff;color:#5c4338}
.small{padding:10px 12px;border-radius:14px;font-size:12px}
.help{margin-top:14px;padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.72);font-size:12px;line-height:1.45;color:#664d42}
.hidden{display:none!important}
#hud{position:absolute;inset:0;pointer-events:none;z-index:4}
#topBar{position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);left:10px;right:10px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.hudCard{background:rgba(255,248,238,.84);border:1px solid rgba(94,59,45,.1);border-radius:16px;padding:8px 10px;min-height:58px;box-shadow:0 10px 26px rgba(59,30,14,.14)}
.hudCard .k{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#8e6e61}
.hudCard .v{display:block;font-size:17px;font-weight:900;color:#44332b;margin-top:4px}
#laneChooser{position:absolute;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;pointer-events:auto}
.laneBtn{background:rgba(255,247,239,.92);border:1px solid rgba(98,67,51,.12);color:#573f35;padding:12px 8px;border-radius:18px;box-shadow:0 10px 18px rgba(53,26,14,.12)}
.laneBtn.active{background:linear-gradient(135deg,#5f7ccf 0%,#8fb6ff 100%);color:#fff;border-color:transparent}
.laneBtn .tag{display:block;font-size:10px;text-transform:uppercase;opacity:.7}
.laneBtn .name{display:block;font-size:14px;font-weight:900;margin-top:4px}
#banner{position:absolute;left:50%;top:calc(env(safe-area-inset-top,0px) + 138px);transform:translateX(-50%);padding:10px 16px;border-radius:999px;background:rgba(71,44,35,.88);color:#fff;font-size:12px;font-weight:800;letter-spacing:.03em;opacity:0;transition:opacity .18s ease;max-width:88%;text-align:center}
#banner.show{opacity:1}
#gameover .panel{padding-bottom:18px}
#resultHeadline{font-size:28px;font-weight:900;letter-spacing:-.03em;color:#422d26;margin-bottom:10px}
#resultMeta{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}
.resultBox{background:#fff8f1;border-radius:16px;padding:12px;border:1px solid rgba(87,58,42,.08)}
.resultBox .label{display:block;font-size:11px;color:#937667;margin-bottom:4px}
.resultBox .value{display:block;font-size:18px;font-weight:900;color:#50362c}
#sharePreview{font-size:12px;line-height:1.4;color:#6f574b;background:#fffaf5;border-radius:16px;padding:12px;margin-top:10px;border:1px solid rgba(90,59,44,.08);white-space:pre-line}
#langBtn{max-width:74px}
@media (max-width:390px){
  .title{font-size:30px}
  #topBar{grid-template-columns:repeat(2,minmax(0,1fr))}
}
</style>

<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div id="topBar">
      <div class="hudCard"><span class="k" data-i18n="score">Score</span><span class="v" id="scoreValue">0</span></div>
      <div class="hudCard"><span class="k" data-i18n="time">Time</span><span class="v" id="timeValue">60</span></div>
      <div class="hudCard"><span class="k" data-i18n="combo">Combo</span><span class="v" id="comboValue">0</span></div>
      <div class="hudCard"><span class="k" data-i18n="miss">Miss</span><span class="v" id="missValue">0/3</span></div>
    </div>
    <div id="banner"></div>
    <div id="laneChooser">
      <button class="laneBtn active" data-lane="left"><span class="tag">CALL</span><span class="name" data-i18n="laneLeft">Left</span></button>
      <button class="laneBtn" data-lane="center"><span class="tag">CALL</span><span class="name" data-i18n="laneCenter">Center</span></button>
      <button class="laneBtn" data-lane="right"><span class="tag">CALL</span><span class="name" data-i18n="laneRight">Right</span></button>
    </div>
  </div>

  <div id="titleScreen" class="overlay">
    <div class="panel">
      <h1 class="title">Skyline<br>Penalty</h1>
      <p class="subtitle" id="titleSubtitle"></p>
      <div class="stats">
        <div class="stat"><span class="label" data-i18n="bestScore">Best Score</span><span class="value" id="bestScoreTitle">0</span></div>
        <div class="stat"><span class="label" data-i18n="coins">Coins</span><span class="value" id="coinsTitle">0</span></div>
        <div class="stat"><span class="label" data-i18n="bestCombo">Best Combo</span><span class="value" id="bestComboTitle">0</span></div>
        <div class="stat"><span class="label" data-i18n="showtimeHits">Showtime</span><span class="value" id="bestShowtimeTitle">0</span></div>
      </div>
      <div class="row">
        <button class="primary" id="startBtn"></button>
        <button class="secondary small" id="langBtn">KO</button>
      </div>
      <div class="help" id="howText"></div>
    </div>
  </div>

  <div id="gameover" class="overlay hidden">
    <div class="panel">
      <div id="resultHeadline"></div>
      <div id="resultMeta">
        <div class="resultBox"><span class="label" data-i18n="score">Score</span><span class="value" id="finalScore">0</span></div>
        <div class="resultBox"><span class="label" data-i18n="bestScore">Best Score</span><span class="value" id="resultBest">0</span></div>
        <div class="resultBox"><span class="label" data-i18n="accuracy">Call Rate</span><span class="value" id="callRate">0%</span></div>
        <div class="resultBox"><span class="label" data-i18n="showtimeHits">Showtime</span><span class="value" id="showtimeValue">0</span></div>
      </div>
      <div class="row">
        <button class="primary" id="retryBtn"></button>
        <button class="secondary" id="homeBtn"></button>
      </div>
      <div class="row" style="margin-top:10px">
        <button class="secondary small" id="copyBtn"></button>
      </div>
      <div id="sharePreview"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'skylinePenalty.v1';
const defaultSave = { bestScore:0, coins:0, bestCombo:0, bestShowtime:0, lang:'ko' };
const tMap = {
  subtitle:{ko:'선언 샷·바람 게이트·쇼타임 슬롯을 읽고 옥상 골대를 뚫으세요.',en:'Read the call shot, wind gate, and showtime slot to beat the rooftop keeper.'},
  start:{ko:'게임 시작',en:'Start Match'},
  retry:{ko:'다시 차기',en:'Retry'},
  home:{ko:'타이틀로',en:'Home'},
  copy:{ko:'하이라이트 복사',en:'Copy Highlight'},
  how:{ko:'공에서 위로 스와이프해 슛하세요. 아래 CALL 레인을 먼저 고르면 선언 보너스를 노릴 수 있습니다. 콤보 4부터 Showtime Slot이 열리고, 같은 방향을 반복하면 골키퍼가 읽습니다.',en:'Swipe upward from the ball to shoot. Pick a CALL lane below before the shot for a bonus. Showtime Slot opens from combo 4, and the keeper reads repeated habits.'},
  score:{ko:'점수',en:'Score'}, time:{ko:'시간',en:'Time'}, combo:{ko:'콤보',en:'Combo'}, miss:{ko:'실수',en:'Miss'},
  bestScore:{ko:'최고 점수',en:'Best Score'}, coins:{ko:'코인',en:'Coins'}, bestCombo:{ko:'최고 콤보',en:'Best Combo'}, showtimeHits:{ko:'쇼타임',en:'Showtime'},
  laneLeft:{ko:'왼쪽',en:'Left'}, laneCenter:{ko:'중앙',en:'Center'}, laneRight:{ko:'오른쪽',en:'Right'},
  accuracy:{ko:'선언 적중',en:'Call Rate'},
  resultTitle:{ko:'경기 종료',en:'Match Over'},
  saved:{ko:'세이브!',en:'Saved!'}, goal:{ko:'골!',en:'Goal!'}, skyline:{ko:'SKYLINE!',en:'SKYLINE!'},
  showtime:{ko:'SHOWTIME +3초',en:'SHOWTIME +3s'}, wind:{ko:'WIND GATE +40',en:'WIND GATE +40'}, callHit:{ko:'CALL 적중',en:'CALL HIT'},
  surge:{ko:'PRESSURE SURGE',en:'PRESSURE SURGE'},
  highlightTemplate:{ko:'Skyline Penalty\n점수 {score}\n선언 적중률 {rate}\n쇼타임 {showtime}회\n최고 콤보 {combo}\nhttps://eastsea-blog.pages.dev/games/skyline-penalty/',en:'Skyline Penalty\nScore {score}\nCall Rate {rate}\nShowtime {showtime}\nBest Combo {combo}\nhttps://eastsea-blog.pages.dev/games/skyline-penalty/'},
};

const app = document.getElementById('app');
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreValue = document.getElementById('scoreValue');
const timeValue = document.getElementById('timeValue');
const comboValue = document.getElementById('comboValue');
const missValue = document.getElementById('missValue');
const banner = document.getElementById('banner');
const hud = document.getElementById('hud');
const titleScreen = document.getElementById('titleScreen');
const gameoverScreen = document.getElementById('gameover');
const laneButtons = [...document.querySelectorAll('.laneBtn')];
const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const homeBtn = document.getElementById('homeBtn');
const copyBtn = document.getElementById('copyBtn');
const langBtn = document.getElementById('langBtn');
const titleSubtitle = document.getElementById('titleSubtitle');
const howText = document.getElementById('howText');
const bestScoreTitle = document.getElementById('bestScoreTitle');
const coinsTitle = document.getElementById('coinsTitle');
const bestComboTitle = document.getElementById('bestComboTitle');
const bestShowtimeTitle = document.getElementById('bestShowtimeTitle');
const finalScore = document.getElementById('finalScore');
const resultBest = document.getElementById('resultBest');
const resultHeadline = document.getElementById('resultHeadline');
const callRate = document.getElementById('callRate');
const showtimeValue = document.getElementById('showtimeValue');
const sharePreview = document.getElementById('sharePreview');

let save = loadSave();
let W = 0, H = 0, DPR = 1;
let pageErrors = [];
window.addEventListener('error', e => pageErrors.push(String(e.message || 'error')));

const state = {
  mode:'title',
  score:0,
  combo:0,
  bestComboRun:0,
  misses:0,
  stage:1,
  timeLeft:60,
  lane:'left',
  callAttempts:0,
  callHits:0,
  goals:0,
  showtimeHits:0,
  gateHits:0,
  lastShotLane:'center',
  shotCooldown:0,
  surge:false,
  message:'',
  messageTimer:0,
  particles:[],
  trail:[],
  keeperBias:'center',
  keeperPattern:['left','center','right'],
  showtimeActive:false,
  shot:null,
  aiming:false,
  pointerStart:null,
  pointerNow:null,
  stageTimer:0,
};

const goal = { x:0, y:0, w:0, h:0 };
const keeper = { x:0, y:0, w:0, h:0, vx:0, target:0 };
const gate = { x:0, y:0, w:0, h:18, phase:0, dir:1 };
const showtime = { x:0, y:0, w:54, h:30, active:false };
const ballRest = { x:0, y:0, r:11 };
const skyline = [];

function loadSave(){
  try { return { ...defaultSave, ...JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') }; }
  catch { return { ...defaultSave }; }
}
function persistSave(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(save)); }
function T(key){ const pack=tMap[key]; return pack ? (pack[save.lang] || pack.ko || key) : key; }
function format(n){ return Math.round(n).toLocaleString(); }
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = app.clientWidth; H = app.clientHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  goal.w = Math.min(W * .68, 290); goal.h = 88; goal.x = (W - goal.w) / 2; goal.y = 150;
  keeper.w = goal.w * .26; keeper.h = 20; keeper.y = goal.y + 36;
  keeper.x = goal.x + goal.w/2 - keeper.w/2;
  gate.y = goal.y + goal.h + 34; gate.w = Math.max(68, goal.w * .2);
  ballRest.x = W/2; ballRest.y = H - 124 - Math.max(0, parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom'))||0);
  skyline.length = 0;
  for(let i=0;i<9;i++) skyline.push({ x: i*(W/8.5), w: 28 + ((i*17)%40), h: 40 + ((i*31)%90) });
}
window.addEventListener('resize', resize);
resize();

function applyText(){
  titleSubtitle.textContent = T('subtitle');
  howText.textContent = T('how');
  startBtn.textContent = T('start');
  retryBtn.textContent = T('retry');
  homeBtn.textContent = T('home');
  copyBtn.textContent = T('copy');
  resultHeadline.textContent = T('resultTitle');
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T(el.dataset.i18n); });
  langBtn.textContent = save.lang.toUpperCase();
  updateTitleStats(); updateHud();
}

function updateTitleStats(){
  bestScoreTitle.textContent = format(save.bestScore);
  coinsTitle.textContent = format(save.coins);
  bestComboTitle.textContent = format(save.bestCombo);
  bestShowtimeTitle.textContent = format(save.bestShowtime || 0);
}

function setMode(mode){
  state.mode = mode;
  titleScreen.classList.toggle('hidden', mode !== 'title');
  gameoverScreen.classList.toggle('hidden', mode !== 'gameover');
  hud.classList.toggle('hidden', mode !== 'play');
}

function setLane(lane){
  state.lane = lane;
  laneButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.lane === lane));
}

laneButtons.forEach(btn => btn.addEventListener('click', () => setLane(btn.dataset.lane)));
langBtn.addEventListener('click', () => {
  save.lang = save.lang === 'ko' ? 'en' : 'ko';
  persistSave();
  applyText();
});
startBtn.addEventListener('click', () => startGame());
retryBtn.addEventListener('click', () => startGame());
homeBtn.addEventListener('click', () => { updateTitleStats(); setMode('title'); });
copyBtn.addEventListener('click', async () => {
  const text = makeShareText();
  try { await navigator.clipboard.writeText(text); showBanner('Copied'); }
  catch { showBanner(text); }
});

function startGame(){
  state.score = 0; state.combo = 0; state.bestComboRun = 0; state.misses = 0; state.stage = 1;
  state.timeLeft = 60; state.callAttempts = 0; state.callHits = 0; state.goals = 0;
  state.showtimeHits = 0; state.gateHits = 0; state.lastShotLane = 'center'; state.shotCooldown = 0;
  state.surge = false; state.message=''; state.messageTimer=0; state.particles=[]; state.trail=[];
  state.keeperBias = 'center'; state.showtimeActive=false; state.shot=null; state.aiming=false; state.pointerStart=null; state.pointerNow=null; state.stageTimer = 0;
  keeper.vx = 1.8; keeper.target = goal.x + goal.w/2;
  gate.phase = 0; gate.dir = 1;
  setLane('left');
  setupNextShot();
  updateHud();
  setMode('play');
}

function showBanner(text){
  banner.textContent = text;
  banner.classList.add('show');
  clearTimeout(showBanner._timer);
  showBanner._timer = setTimeout(() => banner.classList.remove('show'), 1100);
}

function laneFromX(x){
  const third = goal.w / 3;
  if (x < goal.x + third) return 'left';
  if (x > goal.x + third * 2) return 'right';
  return 'center';
}
function laneCenter(lane){
  if (lane === 'left') return goal.x + goal.w * 0.18;
  if (lane === 'right') return goal.x + goal.w * 0.82;
  return goal.x + goal.w * 0.5;
}
function keeperBiasFromHistory(){
  const lane = state.lastShotLane;
  if (state.combo >= 2) state.keeperBias = lane;
  else state.keeperBias = 'center';
}
function setupNextShot(){
  keeperBiasFromHistory();
  state.showtimeActive = state.combo >= 4;
  showtime.active = state.showtimeActive;
  showtime.w = state.surge ? 62 : 54;
  showtime.h = 28;
  const topLeft = state.combo % 2 === 0;
  showtime.x = topLeft ? goal.x + 14 : goal.x + goal.w - showtime.w - 14;
  showtime.y = goal.y + 16;
}

function spawnParticles(x, y, color, count, spread=2){
  for(let i=0;i<count;i++){
    state.particles.push({ x, y, vx:(Math.random()-.5)*spread, vy:(Math.random()-.5)*spread - 1.2, life:32 + Math.random()*18, color });
  }
}

function updateHud(){
  scoreValue.textContent = format(state.score);
  timeValue.textContent = Math.max(0, state.timeLeft).toFixed(0);
  comboValue.textContent = format(state.combo);
  missValue.textContent = `${state.misses}/3`;
}

function update(dt){
  if (state.mode !== 'play') return;
  state.timeLeft -= dt;
  state.stageTimer += dt;
  state.surge = state.timeLeft <= 10;
  if (state.stageTimer >= 12) {
    state.stageTimer = 0;
    state.stage = Math.min(5, state.stage + 1);
    showBanner(state.surge ? T('surge') : `STAGE ${state.stage}`);
  }
  if (state.timeLeft <= 0 || state.misses >= 3) {
    endGame();
    return;
  }

  if (state.shotCooldown > 0) state.shotCooldown = Math.max(0, state.shotCooldown - dt);

  gate.phase += dt * (0.8 + state.stage * 0.16);
  const drift = Math.sin(gate.phase) * (goal.w * (0.18 + state.stage * 0.02));
  gate.x = goal.x + goal.w/2 - gate.w/2 + drift;

  const keeperSpeed = 1.4 + state.stage * 0.45 + (state.surge ? 0.8 : 0);
  const biasTarget = laneCenter(state.keeperBias);
  keeper.target = biasTarget - keeper.w/2 + Math.sin(gate.phase * 1.5) * (goal.w * 0.18);
  keeper.x += Math.max(-keeperSpeed, Math.min(keeperSpeed, keeper.target - keeper.x));
  keeper.x = Math.max(goal.x, Math.min(goal.x + goal.w - keeper.w, keeper.x));

  if (state.shot) {
    const s = state.shot;
    s.life += dt;
    s.vx += s.curve * dt * 60;
    s.vx += s.wind * dt * 26;
    s.vy += 0.42 * dt * 60;
    s.x += s.vx * dt * 60;
    s.y += s.vy * dt * 60;
    s.r = 10 + Math.max(0, 1.6 - s.life * 0.7);
    state.trail.push({ x:s.x, y:s.y, life:18, color:s.showColor });
    if (state.trail.length > 18) state.trail.shift();

    if (!s.gateChecked && s.y <= gate.y + gate.h && s.y >= gate.y - 8 && s.x >= gate.x && s.x <= gate.x + gate.w) {
      s.gateChecked = true;
      state.gateHits += 1;
      state.score += 40;
      s.vx += (s.callLane === 'left' ? -0.45 : s.callLane === 'right' ? 0.45 : 0) + s.curve * 18;
      spawnParticles(s.x, s.y, '#a7e7ff', 8, 3);
      showBanner(T('wind'));
      updateHud();
    }

    const insideGoalBox = s.y <= goal.y + goal.h && s.y >= goal.y - 18 && s.x >= goal.x && s.x <= goal.x + goal.w;
    const hitsKeeper = insideGoalBox && s.x + s.r >= keeper.x && s.x - s.r <= keeper.x + keeper.w && s.y - s.r <= keeper.y + keeper.h && s.y + s.r >= keeper.y;
    if (hitsKeeper) {
      failShot(T('saved'));
      return;
    }

    if (insideGoalBox && s.y <= goal.y + goal.h * 0.66) {
      scoreGoal(s);
      return;
    }

    if (s.y < goal.y - 16 || s.x < -20 || s.x > W + 20 || s.y > H + 30) {
      failShot('MISS');
      return;
    }
  }

  state.trail.forEach(p => p.life -= dt * 60);
  state.trail = state.trail.filter(p => p.life > 0);
  state.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += .03; p.life -= 1; });
  state.particles = state.particles.filter(p => p.life > 0);
  updateHud();
}

function failShot(label){
  if (!state.shot) return;
  spawnParticles(state.shot.x, state.shot.y, '#fff3d4', 10, 4);
  state.misses += 1;
  state.combo = 0;
  state.shot = null;
  state.shotCooldown = state.surge ? 0.18 : 0.28;
  state.lastShotLane = 'center';
  setupNextShot();
  showBanner(label);
}

function scoreGoal(shot){
  const goalLane = laneFromX(shot.x);
  let gained = 100 + state.combo * 15;
  let copyTag = [];
  if (shot.callLane === goalLane) {
    state.callHits += 1;
    const mult = state.surge ? 2 : 1;
    gained += 70 * mult;
    copyTag.push(T('callHit'));
  }
  if (state.showtimeActive && shot.x >= showtime.x && shot.x <= showtime.x + showtime.w && shot.y <= showtime.y + showtime.h) {
    gained += 180;
    state.showtimeHits += 1;
    state.timeLeft += 3;
    spawnParticles(shot.x, shot.y, '#ffe17b', 16, 5);
    showBanner(T('showtime'));
    copyTag.push(T('skyline'));
  } else if (!copyTag.length) {
    showBanner(T('goal'));
  }
  state.score += gained;
  state.combo += 1;
  state.bestComboRun = Math.max(state.bestComboRun, state.combo);
  state.goals += 1;
  state.lastShotLane = goalLane;
  state.shot = null;
  state.shotCooldown = state.surge ? 0.16 : 0.24;
  setupNextShot();
  spawnParticles(goal.x + goal.w/2, goal.y + goal.h/2, copyTag.length ? '#ffe17b' : '#fff7f0', 14, 4);
  if (copyTag.length) sharePreview.textContent = copyTag.join(' · ');
}

function endGame(){
  if (state.mode !== 'play') return;
  const coinsGain = Math.max(8, Math.floor(state.score / 120));
  save.coins += coinsGain;
  save.bestScore = Math.max(save.bestScore, state.score);
  save.bestCombo = Math.max(save.bestCombo, state.bestComboRun);
  save.bestShowtime = Math.max(save.bestShowtime || 0, state.showtimeHits);
  persistSave();
  finalScore.textContent = format(state.score);
  resultBest.textContent = format(save.bestScore);
  const rate = state.callAttempts ? Math.round((state.callHits / state.callAttempts) * 100) : 0;
  callRate.textContent = `${rate}%`;
  showtimeValue.textContent = format(state.showtimeHits);
  sharePreview.textContent = makeShareText();
  updateTitleStats();
  setMode('gameover');
}

function makeShareText(){
  const rate = state.callAttempts ? Math.round((state.callHits / state.callAttempts) * 100) : 0;
  return T('highlightTemplate')
    .replace('{score}', format(state.score))
    .replace('{rate}', `${rate}%`)
    .replace('{showtime}', String(state.showtimeHits))
    .replace('{combo}', String(state.bestComboRun));
}

function pointerPos(e){
  const rect = canvas.getBoundingClientRect();
  const src = e.touches?.[0] || e.changedTouches?.[0] || e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}
function ballAtRest(){ return !state.shot && state.mode === 'play' && state.shotCooldown <= 0; }
function startAim(e){
  if (!ballAtRest()) return;
  const p = pointerPos(e);
  const dx = p.x - ballRest.x, dy = p.y - ballRest.y;
  if (Math.hypot(dx, dy) > 42) return;
  state.aiming = true;
  state.pointerStart = { x: ballRest.x, y: ballRest.y };
  state.pointerNow = p;
}
function moveAim(e){ if (state.aiming) state.pointerNow = pointerPos(e); }
function endAim(e){
  if (!state.aiming) return;
  state.pointerNow = pointerPos(e);
  shootFromPointer(state.pointerNow);
  state.aiming = false;
}
canvas.addEventListener('mousedown', startAim);
canvas.addEventListener('mousemove', moveAim);
window.addEventListener('mouseup', endAim);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startAim(e); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveAim(e); }, {passive:false});
window.addEventListener('touchend', e => { if (state.aiming){ e.preventDefault(); endAim(e); } }, {passive:false});

function shootFromPointer(p){
  if (!ballAtRest()) return false;
  const dragX = ballRest.x - p.x;
  const dragY = ballRest.y - p.y;
  if (dragY < 40) return false;
  const power = Math.min(1, Math.hypot(dragX, dragY) / 220);
  const laneTarget = laneCenter(state.lane);
  const laneGuide = (laneTarget - ballRest.x) / 160;
  state.callAttempts += 1;
  state.shot = {
    x: ballRest.x,
    y: ballRest.y,
    vx: dragX * 0.045 + laneGuide,
    vy: -10.5 - power * 9,
    curve: Math.max(-0.07, Math.min(0.07, dragX * 0.0006)),
    wind: Math.sin(gate.phase) * 0.01,
    r: 11,
    life:0,
    gateChecked:false,
    callLane:state.lane,
    showColor: state.lane === 'left' ? '#8fd3ff' : state.lane === 'right' ? '#ffd59b' : '#ffffff',
  };
  showBanner(state.surge ? T('surge') : `CALL ${state.lane.toUpperCase()}`);
  return true;
}

function drawPitch(){
  ctx.clearRect(0,0,W,H);
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#f7d7a8'); sky.addColorStop(.22,'#efb36f'); sky.addColorStop(.58,'#d97b4a'); sky.addColorStop(1,'#6e5863');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  skyline.forEach((b, i) => {
    ctx.fillStyle = i % 2 ? 'rgba(77,49,57,.46)' : 'rgba(103,66,77,.38)';
    ctx.fillRect(b.x, H - b.h - 100, b.w, b.h);
    for(let wy=0; wy<b.h-8; wy+=14){
      for(let wx=4; wx<b.w-6; wx+=12){
        if((wx + wy + i) % 3 === 0){
          ctx.fillStyle = 'rgba(255,231,173,.45)';
          ctx.fillRect(b.x+wx, H - b.h - 96 + wy, 6, 8);
        }
      }
    }
  });

  ctx.fillStyle = '#86554a';
  ctx.fillRect(0,H-112,W,112);
  ctx.fillStyle = '#d9b08c';
  ctx.fillRect(20,H-210,W-40,10);
  ctx.strokeStyle = 'rgba(255,246,228,.35)'; ctx.lineWidth = 2;
  for(let i=0;i<4;i++){ ctx.beginPath(); ctx.moveTo(38 + i*(W-76)/3, H-210); ctx.lineTo(38 + i*(W-76)/3, H-112); ctx.stroke(); }

  ctx.fillStyle = 'rgba(255,255,255,.22)';
  ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
  ctx.strokeStyle = '#fff8ef'; ctx.lineWidth = 6;
  ctx.strokeRect(goal.x, goal.y, goal.w, goal.h);
  ctx.beginPath(); ctx.moveTo(goal.x + goal.w/2, goal.y); ctx.lineTo(goal.x + goal.w/2, goal.y + goal.h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(goal.x + goal.w/3, goal.y); ctx.lineTo(goal.x + goal.w/3, goal.y + goal.h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(goal.x + goal.w*2/3, goal.y); ctx.lineTo(goal.x + goal.w*2/3, goal.y + goal.h); ctx.stroke();

  ctx.fillStyle = 'rgba(99,194,255,.48)';
  ctx.fillRect(gate.x, gate.y, gate.w, gate.h);
  ctx.strokeStyle = 'rgba(255,255,255,.72)'; ctx.lineWidth = 2; ctx.strokeRect(gate.x, gate.y, gate.w, gate.h);
  ctx.fillStyle = '#fff'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('WIND GATE', gate.x + gate.w/2, gate.y - 8);

  if (state.showtimeActive) {
    ctx.fillStyle = 'rgba(255,225,123,.58)';
    ctx.fillRect(showtime.x, showtime.y, showtime.w, showtime.h);
    ctx.strokeStyle = '#fff2be'; ctx.lineWidth = 2; ctx.strokeRect(showtime.x, showtime.y, showtime.w, showtime.h);
    ctx.fillStyle = '#4d2f1c'; ctx.font = 'bold 12px sans-serif'; ctx.fillText('SHOW', showtime.x + showtime.w/2, showtime.y + 18);
  }

  const laneColors = { left:'rgba(126,197,255,.24)', center:'rgba(255,255,255,.18)', right:'rgba(255,196,132,.24)' };
  ['left','center','right'].forEach((lane, i) => {
    ctx.fillStyle = state.lane === lane ? laneColors[lane] : 'rgba(255,255,255,.08)';
    ctx.fillRect(goal.x + i*(goal.w/3), goal.y, goal.w/3, goal.h);
  });

  ctx.fillStyle = '#473228';
  ctx.fillRect(keeper.x, keeper.y, keeper.w, keeper.h);
  ctx.fillStyle = '#f7efe8';
  ctx.beginPath(); ctx.arc(keeper.x + keeper.w/2, keeper.y - 6, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#32407a';
  ctx.fillRect(keeper.x + 16, keeper.y + 4, keeper.w - 32, 12);

  ctx.fillStyle = '#f7efe8';
  ctx.beginPath(); ctx.arc(ballRest.x, ballRest.y, ballRest.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c0b4ab'; ctx.lineWidth = 1.5; ctx.stroke();

  if (state.aiming && state.pointerNow) {
    ctx.strokeStyle = '#fff8ef'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(ballRest.x, ballRest.y); ctx.lineTo(state.pointerNow.x, state.pointerNow.y); ctx.stroke();
  }

  state.trail.forEach(p => {
    ctx.globalAlpha = p.life / 18;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  if (state.shot) {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(state.shot.x, state.shot.y, state.shot.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#d2c7bf'; ctx.lineWidth = 1.2; ctx.stroke();
  }

  state.particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life / 50);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.8, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  ctx.fillStyle = 'rgba(255,248,238,.92)';
  ctx.font = '600 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`CALL ${state.lane.toUpperCase()} · STAGE ${state.stage}${state.surge ? ' · SURGE' : ''}`, W/2, H - 234);
}

let last = performance.now();
function loop(now){
  const dt = Math.min(.033, (now - last) / 1000); last = now;
  update(dt);
  drawPitch();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function snapshot(){
  const visibleText = document.body.innerText || '';
  return {
    state: state.mode,
    score: state.score,
    combo: state.combo,
    misses: state.misses,
    lane: state.lane,
    stage: state.stage,
    bestScore: save.bestScore,
    showtimeHits: state.showtimeHits,
    timeLeft: Math.round(state.timeLeft),
    shotActive: !!state.shot,
    keeperBias: state.keeperBias,
    gateHits: state.gateHits,
    pageErrors: [...pageErrors],
    undefinedTexts: (visibleText.match(/undefined/g) || []).length,
  };
}

window.__skylinePenalty = {
  start(){ startGame(); return snapshot(); },
  setLane(lane){ setLane(lane); return snapshot(); },
  shoot(lane='center'){ setLane(lane); shootFromPointer({ x: ballRest.x - (lane==='left'?90:lane==='right'?-90:0), y: ballRest.y - 160 }); return snapshot(); },
  debugSetCombo(combo=4){ state.combo = combo; setupNextShot(); return snapshot(); },
  debugForceGoal(lane='center', options={}){
    const opts = options || {};
    setLane(lane);
    if (opts.showtime) {
      state.combo = Math.max(state.combo, 4);
      setupNextShot();
      scoreGoal({ x: showtime.x + showtime.w / 2, y: showtime.y + 2, callLane: state.lane });
    } else {
      scoreGoal({ x: laneCenter(lane), y: goal.y + 12, callLane: state.lane });
    }
    return snapshot();
  },
  snapshot,
  forceGameOver(){ state.timeLeft = 0.01; update(0.02); return snapshot(); },
};

applyText();
updateTitleStats();
setMode('title');
</script>
<script src="/games/cross-promo.js"></script>

<script src="../shared/leaderboard.js"></script>
