<style>

<body>
<div id="container">
  <h1>🎮 창고 퍼즐</h1>
  <div id="stats">
    <div>레벨: <span id="level">1</span></div>
    <div>움직임: <span id="moves">0</span></div>
    <div>최고: <span id="best">0</span></div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="controls">
    <button id="up">↑</button>
    <button id="left">←</button>
    <button id="reset">↺ 리셋</button>
    <button id="right">→</button>
    <button id="down">↓</button>
  </div>
</div>

<div id="menu" class="hidden">
  <h2 id="menuTitle">레벨 완료! 🎉</h2>
  <p id="menuText">움직임: <span id="finalMoves">0</span></p>
  <button id="nextLevel">다음 레벨 →</button>
  <button id="restart">처음부터</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const TILE = 40;

const audio = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, duration) {
  const osc = audio.createOscillator();
  const gain = audio.createGain();
  osc.connect(gain);
  gain.connect(audio.destination);
  osc.frequency.value = freq;
  gain.gain.value = 0.1;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + duration);
  osc.stop(audio.currentTime + duration);
}

const levels = [
  {
    map: [
      '########',
      '#  .   #',
      '# $@$  #',
      '#  .   #',
      '########'
    ]
  },
  {
    map: [
      '########',
      '#      #',
      '# $.$  #',
      '#  @   #',
      '# $.$  #',
      '#      #',
      '########'
    ]
  },
  {
    map: [
      '##########',
      '#   .    #',
      '# $$.$$ ##',
      '#   @    #',
      '# $$.$$ ##',
      '#   .    #',
      '##########'
    ]
  }
];

let currentLevel = 0;
let moves = 0;
let player = { x: 0, y: 0 };
let boxes = [];
let targets = [];
let walls = [];
let menuOpen = false;
let best = parseInt(localStorage.getItem('sokoban-best') || '0');

function loadLevel(n) {
  currentLevel = n;
  moves = 0;
  boxes = [];
  targets = [];
  walls = [];
  menuOpen = false;
  
  const map = levels[n].map;
  for (let y = 0; y < map.length; y++) {
    for (let x = 0; x < map[y].length; x++) {
      const c = map[y][x];
      if (c === '@') player = { x, y };
      else if (c === '$') boxes.push({ x, y });
      else if (c === '.') targets.push({ x, y });
      else if (c === '#') walls.push({ x, y });
    }
  }
  
  document.getElementById('level').textContent = n + 1;
  document.getElementById('moves').textContent = moves;
  document.getElementById('best').textContent = best;
  render();
}

function render() {
  ctx.fillStyle = '#2d3436';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Walls
  ctx.fillStyle = '#636e72';
  walls.forEach(w => {
    ctx.fillRect(w.x * TILE, w.y * TILE, TILE, TILE);
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 2;
    ctx.strokeRect(w.x * TILE, w.y * TILE, TILE, TILE);
  });
  
  // Targets
  ctx.fillStyle = '#00b894';
  targets.forEach(t => {
    ctx.beginPath();
    ctx.arc(t.x * TILE + TILE/2, t.y * TILE + TILE/2, TILE/3, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Boxes
  boxes.forEach(b => {
    const onTarget = targets.some(t => t.x === b.x && t.y === b.y);
    ctx.fillStyle = onTarget ? '#fdcb6e' : '#e17055';
    ctx.fillRect(b.x * TILE + 5, b.y * TILE + 5, TILE - 10, TILE - 10);
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x * TILE + 5, b.y * TILE + 5, TILE - 10, TILE - 10);
  });
  
  // Player
  ctx.fillStyle = '#0984e3';
  ctx.beginPath();
  ctx.arc(player.x * TILE + TILE/2, player.y * TILE + TILE/2, TILE/2.5, 0, Math.PI * 2);
  ctx.fill();
}

function move(dx, dy) {
  if (menuOpen) return;
  const newX = player.x + dx;
  const newY = player.y + dy;
  
  if (walls.some(w => w.x === newX && w.y === newY)) {
    beep(150, 0.05);
    return;
  }
  
  const box = boxes.find(b => b.x === newX && b.y === newY);
  if (box) {
    const boxNewX = newX + dx;
    const boxNewY = newY + dy;
    
    if (walls.some(w => w.x === boxNewX && w.y === boxNewY) ||
        boxes.some(b => b.x === boxNewX && b.y === boxNewY)) {
      beep(150, 0.05);
      return;
    }
    
    box.x = boxNewX;
    box.y = boxNewY;
  }
  
  player.x = newX;
  player.y = newY;
  moves++;
  document.getElementById('moves').textContent = moves;
  beep(400, 0.05);
  render();
  
  // Check win
  if (boxes.every(b => targets.some(t => t.x === b.x && t.y === b.y))) {
    beep(800, 0.3);
    if (best === 0 || moves < best) {
      best = moves;
      localStorage.setItem('sokoban-best', best);
      document.getElementById('best').textContent = best;
    }
    showMenu(true);
  }
}

function showMenu(win) {
  menuOpen = true;
  document.getElementById('menu').classList.remove('hidden');
  document.getElementById('menuTitle').textContent = win ? '레벨 완료! 🎉' : '소코반 퍼즐';
  document.getElementById('finalMoves').textContent = moves;
  document.getElementById('nextLevel').style.display = win && currentLevel < levels.length - 1 ? 'block' : 'none';
}

document.getElementById('up').onclick = () => move(0, -1);
document.getElementById('down').onclick = () => move(0, 1);
document.getElementById('left').onclick = () => move(-1, 0);
document.getElementById('right').onclick = () => move(1, 0);
document.getElementById('reset').onclick = () => loadLevel(currentLevel);
document.getElementById('nextLevel').onclick = () => {
  document.getElementById('menu').classList.add('hidden');
  loadLevel(currentLevel + 1);
};
document.getElementById('restart').onclick = () => {
  document.getElementById('menu').classList.add('hidden');
  loadLevel(0);
};

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') move(0, -1);
  else if (e.key === 'ArrowDown') move(0, 1);
  else if (e.key === 'ArrowLeft') move(-1, 0);
  else if (e.key === 'ArrowRight') move(1, 0);
  else if (e.key === 'r') loadLevel(currentLevel);
});

loadLevel(0);
</script>

<script>
(function(){
  if (window.__interactionProbeInstalled) return;
  window.__interactionProbeInstalled = true;

  let count = 0;
  const probe = document.createElement('div');
  probe.id = 'interactionProbe';
  probe.setAttribute('aria-live', 'polite');
  probe.style.position = 'fixed';
  probe.style.left = '-9999px';
  probe.style.top = '0';
  probe.style.pointerEvents = 'none';
  probe.textContent = 'interaction:0';

  function ensureProbe(){
    if (!probe.isConnected && document.body) document.body.appendChild(probe);
  }

  function mark(kind){
    count += 1;
    probe.textContent = `interaction:${count}:${kind}`;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ensureProbe, { once:true });
  } else {
    ensureProbe();
  }

  document.addEventListener('pointerdown', () => mark('pointer'), true);
  document.addEventListener('keydown', () => mark('key'), true);
  window.__markInteraction = mark;
})();
</script>

</body>
