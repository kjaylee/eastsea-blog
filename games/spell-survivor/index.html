<script>
'use strict';

const T = GameI18n({
  gameTitle: { ko:'Spell Survivor', en:'Spell Survivor' },
  gameSub: { ko:'자동 마법 공격과 수동 회피로 90초를 버티세요.', en:'Survive 90 seconds with auto spells and manual dodge.' },
  gameMeta: { ko:'레벨업마다 룬 선택 · 웨이브가 오를수록 난도 상승', en:'Choose runes on level-up · each wave increases danger' },
  start: { ko:'생존 시작', en:'Start Survival' },
  score: { ko:'점수', en:'Score' },
  wave: { ko:'웨이브', en:'Wave' },
  time: { ko:'남은시간', en:'Time' },
  level: { ko:'레벨', en:'Level' },
  kills: { ko:'처치', en:'Kills' },
  best: { ko:'최고', en:'Best' },
  hp: { ko:'체력', en:'HP' },
  xp: { ko:'경험치', en:'XP' },
  levelup: { ko:'레벨 업!', en:'Level Up!' },
  chooseRune: { ko:'룬 1개를 선택하세요', en:'Choose one rune upgrade' },
  retry: { ko:'다시 도전', en:'Retry' },
  backToTitle: { ko:'타이틀로', en:'Back to Title' },
  gameOver: { ko:'게임 오버', en:'Game Over' },
  runScore: { ko:'최종 점수', en:'Final Score' },
  runBest: { ko:'최고 점수', en:'Best Score' },
  runWave: { ko:'도달 웨이브', en:'Reached Wave' },
  runReasonDead: { ko:'마력 고갈', en:'Defeated by enemies' },
  runReasonTime: { ko:'시간 생존 성공', en:'Time survived' },
  uPowerN: { ko:'원소 강화', en:'Elemental Power' },
  uPowerD: { ko:'마법 탄환 피해량 +22%', en:'Spell damage +22%' },
  uRateN: { ko:'시전 가속', en:'Casting Tempo' },
  uRateD: { ko:'자동 시전 속도 +18%', en:'Auto-cast rate +18%' },
  uSpeedN: { ko:'유령 보폭', en:'Phantom Step' },
  uSpeedD: { ko:'이동 속도 +14%', en:'Move speed +14%' },
  uNovaN: { ko:'비전 파동', en:'Arcane Nova' },
  uNovaD: { ko:'6초마다 광역 충격파 발동', en:'Pulse nova every 6 seconds' },
  uHealN: { ko:'영혼 흡수', en:'Soul Siphon' },
  uHealD: { ko:'즉시 체력 22 회복', en:'Instantly restore 22 HP' }
});

const GAME_ID = 'spell-survivor';
const SAVE_KEY = 'spell-survivor-save-v1';
const STATE = { TITLE:'title', PLAY:'play', LEVELUP:'levelup', GAMEOVER:'gameover' };
// state machine target: title -> play -> gameover -> retry

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const titleOverlay = document.getElementById('titleOverlay');
const levelupOverlay = document.getElementById('levelupOverlay');
const gameoverOverlay = document.getElementById('gameoverOverlay');

const scoreCard = document.getElementById('scoreCard');
const waveCard = document.getElementById('waveCard');
const timeCard = document.getElementById('timeCard');
const levelCard = document.getElementById('levelCard');
const killCard = document.getElementById('killCard');
const bestCard = document.getElementById('bestCard');
const hpFill = document.getElementById('hpFill');
const xpFill = document.getElementById('xpFill');

const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const backBtn = document.getElementById('backBtn');

const sound = new SoundManager();
sound.loadSFX('cast','../gravity-orbit/assets/audio/orbit_enter.wav');
sound.loadSFX('hit','../gravity-orbit/assets/audio/asteroid_hit.wav');
sound.loadSFX('level','../gravity-orbit/assets/audio/combo.wav');
sound.loadSFX('orb','../gravity-orbit/assets/audio/star_collect.wav');
sound.loadSFX('over','../gravity-orbit/assets/audio/gameover.wav');

const game = {
  mode: STATE.TITLE,
  dpr: 1,
  W: 0,
  H: 0,
  camX: 0,
  camY: 0,
  lastTs: 0,
  timeLeft: 90,
  elapsed: 0,
  wave: 1,
  score: 0,
  kills: 0,
  xp: 0,
  level: 1,
  bestScore: 0,
  bestWave: 1,
  totalRuns: 0,
  reason: 'dead',
  submittedScore: -1,
  player: {
    x: 0,
    y: 0,
    r: 14,
    hp: 120,
    maxHp: 120,
    speed: 220,
    spellPower: 16,
    castInterval: 0.65,
    castTimer: 0,
    novaLevel: 0,
    novaTimer: 0
  },
  input: {
    down: false,
    x: 0,
    y: 0,
    wx: 0,
    wy: 0
  },
  enemies: [],
  bolts: [],
  particles: [],
  spawnTimer: 0,
  upgrades: [],
  uxFlash: 0
};

function setTexts() {
  document.getElementById('titleText').textContent = T('gameTitle');
  document.getElementById('titleSub').textContent = T('gameSub');
  document.getElementById('titleMeta').textContent = T('gameMeta');
  startBtn.textContent = T('start');
  document.getElementById('levelupTitle').textContent = T('levelup');
  document.getElementById('levelupSub').textContent = T('chooseRune');
  document.getElementById('overTitle').textContent = T('gameOver');
  retryBtn.textContent = T('retry');
  backBtn.textContent = T('backToTitle');
}

function storageGet() {
  let tgData = null;
  try { if (window.TG && window.TG.load) tgData = window.TG.load(SAVE_KEY, null); } catch (_) {}
  if (tgData) return tgData;
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) {
    return null;
  }
}

function storageSet(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch (_) {}
  try { if (window.TG && window.TG.save) window.TG.save(SAVE_KEY, data); } catch (_) {}
}

function loadPersist() {
  const d = storageGet();
  if (!d) return;
  game.bestScore = Number(d.bestScore || 0);
  game.bestWave = Number(d.bestWave || 1);
  game.totalRuns = Number(d.totalRuns || 0);
}

function savePersist() {
  storageSet({
    bestScore: Math.floor(game.bestScore),
    bestWave: Math.floor(game.bestWave),
    totalRuns: Math.floor(game.totalRuns)
  });
}

function resize() {
  game.dpr = window.devicePixelRatio || 1;
  game.W = window.innerWidth;
  game.H = window.innerHeight;
  canvas.width = Math.floor(game.W * game.dpr);
  canvas.height = Math.floor(game.H * game.dpr);
  ctx.setTransform(game.dpr, 0, 0, game.dpr, 0, 0);
}

function xpNeed(level) {
  return 16 + level * 8;
}

function resetRun() {
  game.timeLeft = 90;
  game.elapsed = 0;
  game.wave = 1;
  game.score = 0;
  game.kills = 0;
  game.xp = 0;
  game.level = 1;
  game.reason = 'dead';
  game.submittedScore = -1;
  game.enemies = [];
  game.bolts = [];
  game.particles = [];
  game.spawnTimer = 0;
  game.upgrades = [];
  game.uxFlash = 0;

  const p = game.player;
  p.x = 0;
  p.y = 0;
  p.hp = 120;
  p.maxHp = 120;
  p.speed = 220;
  p.spellPower = 16;
  p.castInterval = 0.65;
  p.castTimer = 0;
  p.novaLevel = 0;
  p.novaTimer = 0;

  game.camX = p.x;
  game.camY = p.y;
}

function startRun() {
  resetRun();
  game.mode = STATE.PLAY;
  titleOverlay.classList.add('hidden');
  levelupOverlay.classList.add('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.remove('hidden');
  if (window.TG && window.TG.haptic) window.TG.haptic('impact','light');
}

function retryRun() {
  startRun();
}

function backToTitle() {
  game.mode = STATE.TITLE;
  titleOverlay.classList.remove('hidden');
  levelupOverlay.classList.add('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.add('hidden');
}

function randomRange(min, max) {
  return min + Math.random() * (max - min);
}

function spawnEnemy() {
  const p = game.player;
  const ring = 280 + randomRange(0, 180);
  const a = Math.random() * Math.PI * 2;
  const hpScale = 1 + game.wave * 0.22;
  const speedScale = 1 + game.wave * 0.06;
  game.enemies.push({
    x: p.x + Math.cos(a) * ring,
    y: p.y + Math.sin(a) * ring,
    r: randomRange(10, 16),
    hp: (26 + game.wave * 8) * hpScale,
    maxHp: (26 + game.wave * 8) * hpScale,
    speed: randomRange(48, 84) * speedScale,
    dmg: 8 + game.wave * 1.2,
    touchCd: 0,
    hue: Math.floor(randomRange(190, 320))
  });
}

function createBolt(target) {
  const p = game.player;
  const dx = target.x - p.x;
  const dy = target.y - p.y;
  const d = Math.hypot(dx, dy) || 1;
  const speed = 520;
  game.bolts.push({
    x: p.x,
    y: p.y,
    vx: (dx / d) * speed,
    vy: (dy / d) * speed,
    life: 1.1,
    dmg: p.spellPower,
    r: 4
  });
  sound.playSFX('cast',{ volume:0.35, rate:1 + Math.random() * 0.12 });
}

function emit(x, y, color, count) {
  for (let i = 0; i < count; i += 1) {
    const a = Math.random() * Math.PI * 2;
    const sp = randomRange(30, 170);
    game.particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: randomRange(0.2, 0.7),
      r: randomRange(1.5, 3.8),
      color
    });
  }
}

function nearestEnemy() {
  const p = game.player;
  let best = null;
  let bestD = Infinity;
  for (let i = 0; i < game.enemies.length; i += 1) {
    const e = game.enemies[i];
    const d = (e.x - p.x) ** 2 + (e.y - p.y) ** 2;
    if (d < bestD) {
      bestD = d;
      best = e;
    }
  }
  return best;
}

function healPlayer(amount) {
  game.player.hp = Math.min(game.player.maxHp, game.player.hp + amount);
  emit(game.player.x, game.player.y, '#59ffc6', 12);
}

function upgradePool() {
  return [
    { id:'power', name:T('uPowerN'), desc:T('uPowerD'), apply:() => { game.player.spellPower *= 1.22; } },
    { id:'rate', name:T('uRateN'), desc:T('uRateD'), apply:() => { game.player.castInterval *= 0.82; } },
    { id:'speed', name:T('uSpeedN'), desc:T('uSpeedD'), apply:() => { game.player.speed *= 1.14; } },
    { id:'nova', name:T('uNovaN'), desc:T('uNovaD'), apply:() => { game.player.novaLevel += 1; } },
    { id:'heal', name:T('uHealN'), desc:T('uHealD'), apply:() => { healPlayer(22); } }
  ];
}

function openLevelUp() {
  game.mode = STATE.LEVELUP;
  const pool = upgradePool();
  game.upgrades = [];

  while (game.upgrades.length < 3) {
    const pick = pool[Math.floor(Math.random() * pool.length)];
    if (!game.upgrades.find((u) => u.id === pick.id)) game.upgrades.push(pick);
  }

  const box = document.getElementById('upgradeChoices');
  box.innerHTML = '';
  game.upgrades.forEach((u, idx) => {
    const btn = document.createElement('button');
    btn.className = 'upgradeBtn';
    btn.innerHTML = `<strong>${u.name}</strong>${u.desc}`;
    btn.addEventListener('click', () => chooseUpgrade(idx));
    box.appendChild(btn);
  });

  levelupOverlay.classList.remove('hidden');
  if (window.TG && window.TG.haptic) window.TG.haptic('notification','success');
  sound.playSFX('level',{ volume:0.65 });
}

function chooseUpgrade(index) {
  const u = game.upgrades[index];
  if (!u) return;
  u.apply();
  game.mode = STATE.PLAY;
  levelupOverlay.classList.add('hidden');
}

function finishRun(reason) {
  game.mode = STATE.GAMEOVER;
  game.reason = reason;

  const finalScore = Math.floor(game.score + game.timeLeft * 3 + game.wave * 40);
  game.score = finalScore;
  if (finalScore > game.bestScore) game.bestScore = finalScore;
  if (game.wave > game.bestWave) game.bestWave = game.wave;
  game.totalRuns += 1;
  savePersist();

  hud.classList.add('hidden');
  gameoverOverlay.classList.remove('hidden');
  levelupOverlay.classList.add('hidden');

  const reasonText = reason === 'time' ? T('runReasonTime') : T('runReasonDead');
  document.getElementById('resultText').textContent = `${T('runScore')}: ${finalScore.toLocaleString()} · ${reasonText}`;
  document.getElementById('bestText').textContent = `${T('runBest')}: ${Math.floor(game.bestScore).toLocaleString()}`;
  document.getElementById('statsText').textContent = `${T('runWave')} ${game.wave} · ${T('kills')} ${game.kills}`;

  submitLeaderboard(finalScore);
  if (window.GameScore && window.GameScore.save) window.GameScore.save(GAME_ID, finalScore);

  sound.playSFX('over',{ volume:0.9 });
  if (window.TG && window.TG.haptic) window.TG.haptic('notification','error');
}

function submitLeaderboard(score) {
  if (!window.Leaderboard) return;
  if (game.submittedScore === score) return;
  game.submittedScore = score;

  let playerName = 'Player';
  try {
    const u = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
    if (u) playerName = u.first_name || u.username || 'Player';
  } catch (_) {}

  window.Leaderboard.submit(GAME_ID, playerName, score, { reason: game.reason });
  refreshBoard();
}

function refreshBoard() {
  if (!window.Leaderboard) return;
  window.Leaderboard.getTop(GAME_ID)
    .then((scores) => window.Leaderboard.renderBoard('leaderboard', scores))
    .catch(() => {});
}

function updateHud() {
  scoreCard.textContent = `${T('score')} ${Math.floor(game.score).toLocaleString()}`;
  waveCard.textContent = `${T('wave')} ${game.wave}`;
  timeCard.textContent = `${T('time')} ${Math.max(0, game.timeLeft).toFixed(1)}s`;
  levelCard.textContent = `${T('level')} ${game.level} · ${T('xp')} ${Math.floor(game.xp)}/${xpNeed(game.level)}`;
  killCard.textContent = `${T('kills')} ${game.kills}`;
  bestCard.textContent = `${T('best')} ${Math.floor(game.bestScore).toLocaleString()}`;
  hpFill.style.width = `${Math.max(0, (game.player.hp / game.player.maxHp) * 100)}%`;
  xpFill.style.width = `${Math.max(0, Math.min(100, (game.xp / xpNeed(game.level)) * 100))}%`;
}

function updatePlay(dt) {
  const p = game.player;
  game.elapsed += dt;
  game.timeLeft = Math.max(0, 90 - game.elapsed);
  game.wave = 1 + Math.floor(game.elapsed / 15);

  // input movement
  if (game.input.down) {
    const dx = game.input.wx - p.x;
    const dy = game.input.wy - p.y;
    const d = Math.hypot(dx, dy);
    if (d > 4) {
      const step = p.speed * dt;
      p.x += (dx / d) * Math.min(step, d);
      p.y += (dy / d) * Math.min(step, d);
    }
  }

  // enemy spawn
  const baseSpawn = Math.max(0.12, 0.78 - game.wave * 0.04);
  game.spawnTimer -= dt;
  if (game.spawnTimer <= 0) {
    game.spawnTimer = baseSpawn;
    const count = (game.wave > 3 && Math.random() < 0.36) ? 2 : 1;
    for (let i = 0; i < count; i += 1) spawnEnemy();
  }

  // auto cast
  p.castTimer -= dt;
  if (p.castTimer <= 0) {
    const target = nearestEnemy();
    if (target) {
      createBolt(target);
      p.castTimer = Math.max(0.17, p.castInterval);
    }
  }

  // nova tick
  if (p.novaLevel > 0) {
    p.novaTimer -= dt;
    if (p.novaTimer <= 0) {
      p.novaTimer = Math.max(2.6, 6 - p.novaLevel * 0.7);
      for (let i = game.enemies.length - 1; i >= 0; i -= 1) {
        const e = game.enemies[i];
        const dx = e.x - p.x;
        const dy = e.y - p.y;
        const d = Math.hypot(dx, dy);
        const radius = 94 + p.novaLevel * 22;
        if (d < radius) {
          e.hp -= 15 + p.novaLevel * 9;
          if (e.hp <= 0) killEnemy(i, '#95b8ff');
        }
      }
      emit(p.x, p.y, '#8ca7ff', 28);
      sound.playSFX('orb',{ volume:0.58, rate:1.08 });
    }
  }

  // update bolts
  for (let i = game.bolts.length - 1; i >= 0; i -= 1) {
    const b = game.bolts[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    let hit = false;
    for (let j = game.enemies.length - 1; j >= 0; j -= 1) {
      const e = game.enemies[j];
      const dx = e.x - b.x;
      const dy = e.y - b.y;
      if (dx * dx + dy * dy < (e.r + b.r) ** 2) {
        e.hp -= b.dmg;
        emit(b.x, b.y, '#84deff', 7);
        if (e.hp <= 0) killEnemy(j, '#6bffbc');
        hit = true;
        break;
      }
    }
    if (hit || b.life <= 0) game.bolts.splice(i, 1);
  }

  // update enemies
  for (let i = game.enemies.length - 1; i >= 0; i -= 1) {
    const e = game.enemies[i];
    const dx = p.x - e.x;
    const dy = p.y - e.y;
    const d = Math.hypot(dx, dy) || 1;
    e.x += (dx / d) * e.speed * dt;
    e.y += (dy / d) * e.speed * dt;
    e.touchCd = Math.max(0, e.touchCd - dt);

    if (d < e.r + p.r + 2 && e.touchCd <= 0) {
      p.hp -= e.dmg;
      e.touchCd = 0.55;
      game.uxFlash = 0.15;
      emit(p.x, p.y, '#ff6f9c', 16);
      sound.playSFX('hit',{ volume:0.55, rate:1 + Math.random() * 0.06 });
      if (window.TG && window.TG.haptic) window.TG.haptic('impact','medium');
      if (p.hp <= 0) {
        finishRun('dead');
        return;
      }
    }
  }

  // particles
  for (let i = game.particles.length - 1; i >= 0; i -= 1) {
    const q = game.particles[i];
    q.x += q.vx * dt;
    q.y += q.vy * dt;
    q.vx *= 0.9;
    q.vy *= 0.9;
    q.life -= dt;
    if (q.life <= 0) game.particles.splice(i, 1);
  }

  game.score += dt * (6 + game.wave * 1.8);

  if (game.xp >= xpNeed(game.level)) {
    game.xp -= xpNeed(game.level);
    game.level += 1;
    openLevelUp();
    return;
  }

  if (game.timeLeft <= 0) {
    finishRun('time');
    return;
  }

  updateHud();
}

function killEnemy(index, color) {
  const e = game.enemies[index];
  if (!e) return;
  game.kills += 1;
  game.score += 24 + game.wave * 6;
  game.xp += 6 + game.wave * 0.7;
  emit(e.x, e.y, color, 14);
  game.enemies.splice(index, 1);
}

function worldToScreen(x, y) {
  return {
    x: x - game.camX + game.W * 0.5,
    y: y - game.camY + game.H * 0.5
  };
}

function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, game.H);
  g.addColorStop(0, '#121538');
  g.addColorStop(0.45, '#0a1230');
  g.addColorStop(1, '#060913');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, game.W, game.H);

  const grid = 48;
  const ox = ((-game.camX % grid) + grid) % grid;
  const oy = ((-game.camY % grid) + grid) % grid;
  ctx.strokeStyle = 'rgba(118,146,255,0.13)';
  ctx.lineWidth = 1;
  for (let x = ox; x < game.W; x += grid) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, game.H);
    ctx.stroke();
  }
  for (let y = oy; y < game.H; y += grid) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(game.W, y);
    ctx.stroke();
  }

  if (game.uxFlash > 0) {
    ctx.fillStyle = `rgba(255,72,118,${Math.min(0.35, game.uxFlash * 2)})`;
    ctx.fillRect(0, 0, game.W, game.H);
    game.uxFlash *= 0.92;
  }
}

function drawPlayer() {
  const p = game.player;
  const pos = worldToScreen(p.x, p.y);

  const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 35);
  glow.addColorStop(0, 'rgba(123,229,255,0.8)');
  glow.addColorStop(1, 'rgba(123,229,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 35, 0, Math.PI * 2);
  ctx.fill();

  const aimX = game.input.down ? game.input.wx : p.x + 1;
  const aimY = game.input.down ? game.input.wy : p.y;
  const ang = Math.atan2(aimY - p.y, aimX - p.x);

  ctx.save();
  ctx.translate(pos.x, pos.y);
  ctx.rotate(ang + Math.PI / 2);
  ctx.fillStyle = '#9df2ff';
  ctx.beginPath();
  ctx.moveTo(0, -16);
  ctx.lineTo(10, 12);
  ctx.lineTo(-10, 12);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#dff6ff';
  ctx.beginPath();
  ctx.arc(0, 1, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawEnemies() {
  for (let i = 0; i < game.enemies.length; i += 1) {
    const e = game.enemies[i];
    const p = worldToScreen(e.x, e.y);
    if (p.x < -60 || p.x > game.W + 60 || p.y < -60 || p.y > game.H + 60) continue;

    const body = ctx.createRadialGradient(p.x - 4, p.y - 4, 2, p.x, p.y, e.r * 1.6);
    body.addColorStop(0, `hsla(${e.hue},95%,72%,0.95)`);
    body.addColorStop(1, `hsla(${e.hue + 40},80%,35%,0.85)`);
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.arc(p.x, p.y, e.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,.65)';
    ctx.beginPath();
    ctx.arc(p.x - e.r * 0.35, p.y - e.r * 0.3, 2, 0, Math.PI * 2);
    ctx.fill();

    const hpRatio = Math.max(0, e.hp / e.maxHp);
    ctx.fillStyle = 'rgba(12,16,30,.7)';
    ctx.fillRect(p.x - e.r, p.y - e.r - 8, e.r * 2, 4);
    ctx.fillStyle = '#65ffbf';
    ctx.fillRect(p.x - e.r, p.y - e.r - 8, e.r * 2 * hpRatio, 4);
  }
}

function drawBolts() {
  for (let i = 0; i < game.bolts.length; i += 1) {
    const b = game.bolts[i];
    const p = worldToScreen(b.x, b.y);

    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 12);
    glow.addColorStop(0, 'rgba(166,239,255,0.95)');
    glow.addColorStop(1, 'rgba(120,220,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#dbfcff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  for (let i = 0; i < game.particles.length; i += 1) {
    const q = game.particles[i];
    const p = worldToScreen(q.x, q.y);
    ctx.globalAlpha = Math.max(0, q.life * 1.2);
    ctx.fillStyle = q.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, q.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function render() {
  drawBackground();

  if (game.mode === STATE.PLAY || game.mode === STATE.LEVELUP || game.mode === STATE.GAMEOVER) {
    game.camX += (game.player.x - game.camX) * 0.12;
    game.camY += (game.player.y - game.camY) * 0.12;
    drawEnemies();
    drawBolts();
    drawParticles();
    drawPlayer();
  }
}

function screenToWorld(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = clientX - rect.left;
  const sy = clientY - rect.top;
  return {
    x: game.camX - game.W * 0.5 + sx,
    y: game.camY - game.H * 0.5 + sy
  };
}

function onPointerDown(e) {
  if (e.cancelable) e.preventDefault();
  if (game.mode !== STATE.PLAY) return;
  game.input.down = true;
  const w = screenToWorld(e.clientX, e.clientY);
  game.input.x = e.clientX;
  game.input.y = e.clientY;
  game.input.wx = w.x;
  game.input.wy = w.y;
}

function onPointerMove(e) {
  if (game.mode !== STATE.PLAY || !game.input.down) return;
  if (e.cancelable) e.preventDefault();
  const w = screenToWorld(e.clientX, e.clientY);
  game.input.x = e.clientX;
  game.input.y = e.clientY;
  game.input.wx = w.x;
  game.input.wy = w.y;
}

function onPointerUp(e) {
  if (e && e.cancelable) e.preventDefault();
  game.input.down = false;
}

function frame(ts) {
  if (!game.lastTs) game.lastTs = ts;
  const dt = Math.min(0.033, (ts - game.lastTs) / 1000);
  game.lastTs = ts;

  if (game.mode === STATE.PLAY) updatePlay(dt);
  render();
  requestAnimationFrame(frame);
}

startBtn.addEventListener('click', startRun);
retryBtn.addEventListener('click', retryRun);
backBtn.addEventListener('click', backToTitle);

canvas.addEventListener('pointerdown', onPointerDown, { passive:false });
canvas.addEventListener('pointermove', onPointerMove, { passive:false });
canvas.addEventListener('pointerup', onPointerUp, { passive:false });
canvas.addEventListener('pointercancel', onPointerUp, { passive:false });
canvas.addEventListener('pointerleave', onPointerUp, { passive:false });
canvas.addEventListener('touchstart', onPointerDown, { passive:false });
canvas.addEventListener('touchmove', onPointerMove, { passive:false });
canvas.addEventListener('touchend', onPointerUp, { passive:false });
window.addEventListener('blur', onPointerUp, { passive:false });
window.addEventListener('mouseup', onPointerUp, { passive:false });
window.addEventListener('resize', resize);

document.addEventListener('keydown', (e) => {
  if ((e.code === 'Enter' || e.code === 'Space') && game.mode === STATE.TITLE) {
    startRun();
    if (e.cancelable) e.preventDefault();
  }
});

loadPersist();
setTexts();
resize();
refreshBoard();
updateHud();
requestAnimationFrame(frame);
</script>
