<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a1a">
  <title>Starforged Asteroid Miner</title>
  <style>
    :root{
      --bg:#0a0a1a;
      --panel:#111733;
      --neon:#3ef7ff;
      --neon2:#ff4dcb;
      --text:#d9ecff;
      --good:#59ff9c;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    body{display:flex;justify-content:center;align-items:stretch}
    .wrap{width:min(100vw,560px);margin:0 auto;padding:10px;display:flex;flex-direction:column;gap:10px}
    .hud{display:flex;justify-content:space-between;gap:8px;background:var(--panel);border:1px solid #2c3c75;border-radius:12px;padding:10px;font-weight:700;font-size:14px}
    #game{width:100%;aspect-ratio:3/4;background:radial-gradient(circle at 50% 10%,#1a2455 0%,#0a0a1a 45%,#070712 100%);border:1px solid #2a3774;border-radius:14px;touch-action:none;box-shadow:0 0 20px #122a6e inset}
    .row{display:flex;gap:10px}
    .btn{flex:1;background:#162356;border:1px solid #3152bb;color:var(--text);padding:12px;border-radius:12px;font-size:16px;font-weight:700;touch-action:manipulation}
    .btn:active,.btn.on{background:#2743a0;box-shadow:0 0 18px #3ef7ff66 inset}
    .ctrls{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .ctrls .btn{padding:14px 0}
    .hint{text-align:center;font-size:12px;color:#9fbbff}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hud">
      <div>⛏️ Ore: <span id="score">0</span></div>
      <div>🏆 Best: <span id="best">0</span></div>
      <div>⚡ <span id="state">Ready</span></div>
    </section>
    <canvas id="game" width="540" height="720"></canvas>
    <div class="row">
      <button type="button" id="startBtn" class="btn">Start / Restart</button>
      <button type="button" id="muteBtn" class="btn">🔊 Sound On</button>
    </div>
    <div class="ctrls" id="controls">
      <button type="button" class="btn" data-key="ArrowUp">▲</button>
      <button type="button" class="btn" data-key="Space">FIRE</button>
      <button type="button" class="btn" data-key="ArrowRight">▶</button>
      <button type="button" class="btn" data-key="ArrowLeft">◀</button>
      <button type="button" class="btn" data-key="ArrowDown">▼</button>
      <button type="button" class="btn" data-key="KeyZ">BOOST</button>
    </div>
    <div class="hint">Keyboard: Arrow keys/WASD + Space. Touch: use control buttons.</div>
  </main>

  <script>
  (() => {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const stateEl = document.getElementById('state');
    const startBtn = document.getElementById('startBtn');
    const muteBtn = document.getElementById('muteBtn');
    const controls = document.getElementById('controls');

    const STORAGE_KEY = 'esb_starforged_asteroid_miner_best';
    let best = Number(localStorage.getItem(STORAGE_KEY) || 0);
    bestEl.textContent = String(best);

    const keys = new Set();
    let audioCtx = null;
    let muted = false;

    const game = {
      running: false,
      over: false,
      score: 0,
      time: 0,
      spawnTimer: 0,
      fireCd: 0,
      stars: [],
      bullets: [],
      asteroids: [],
      ore: [],
      player: {x: canvas.width/2, y: canvas.height-90, r: 18, speed: 260}
    };

    function setupPWA() {
      const manifest = {
        name: 'Starforged Asteroid Miner',
        short_name: 'AsteroidMiner',
        start_url: '.',
        display: 'standalone',
        background_color: '#0a0a1a',
        theme_color: '#0a0a1a',
        icons: [{
          src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128"><rect width="128" height="128" rx="20" fill="%230a0a1a"/><path d="M18 78L64 20l46 58-18 30H36z" fill="%233ef7ff"/><circle cx="64" cy="76" r="12" fill="%23ff4dcb"/></svg>',
          sizes: '128x128',
          type: 'image/svg+xml'
        }]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);

      if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',()=>{});`;
        const swBlob = new Blob([swCode], {type:'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
      }
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function beep(freq = 440, duration = 0.08, type = 'sine', gain = 0.03) {
      if (muted) return;
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(gain, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + duration);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + duration + 0.02);
    }

    function resetGame() {
      game.running = true;
      game.over = false;
      game.score = 0;
      game.time = 0;
      game.spawnTimer = 0;
      game.fireCd = 0;
      game.bullets = [];
      game.asteroids = [];
      game.ore = [];
      game.player.x = canvas.width / 2;
      game.player.y = canvas.height - 90;
      game.stars = Array.from({length: 90}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, z: 0.3 + Math.random()*1.8}));
      scoreEl.textContent = '0';
      stateEl.textContent = 'Mining';
      beep(520, 0.06, 'triangle', 0.04);
    }

    function spawnAsteroid() {
      const r = 15 + Math.random() * 20;
      game.asteroids.push({
        x: 30 + Math.random() * (canvas.width - 60),
        y: -r - 10,
        r,
        vx: (Math.random() - 0.5) * 50,
        vy: 50 + Math.random() * 90,
        hp: 1 + (r > 28 ? 1 : 0)
      });
    }

    function fire() {
      if (game.fireCd > 0 || !game.running || game.over) return;
      game.fireCd = 0.2;
      game.bullets.push({x: game.player.x, y: game.player.y - 18, vx: 0, vy: -420});
      beep(860, 0.05, 'square', 0.028);
    }

    function asteroidHit(a) {
      for (let i = 0; i < 2 + Math.floor(Math.random()*2); i++) {
        game.ore.push({
          x: a.x,
          y: a.y,
          r: 6,
          vx: (Math.random() - 0.5) * 110,
          vy: 30 + Math.random() * 60,
          life: 3.5
        });
      }
      beep(160, 0.08, 'sawtooth', 0.05);
    }

    function gameOver() {
      game.over = true;
      game.running = false;
      stateEl.textContent = 'Destroyed';
      beep(90, 0.25, 'sawtooth', 0.06);
      if (game.score > best) {
        best = game.score;
        localStorage.setItem(STORAGE_KEY, String(best));
        bestEl.textContent = String(best);
        stateEl.textContent = 'New Best!';
        beep(640, 0.1, 'triangle', 0.05);
      }
    }

    function update(dt) {
      if (!game.running || game.over) return;

      game.time += dt;
      game.spawnTimer -= dt;
      game.fireCd -= dt;

      if (game.spawnTimer <= 0) {
        game.spawnTimer = Math.max(0.35, 1.0 - game.time * 0.015);
        spawnAsteroid();
      }

      const p = game.player;
      const speedMul = keys.has('KeyZ') ? 1.5 : 1;
      const vx = (keys.has('ArrowRight') || keys.has('KeyD') ? 1 : 0) - (keys.has('ArrowLeft') || keys.has('KeyA') ? 1 : 0);
      const vy = (keys.has('ArrowDown') || keys.has('KeyS') ? 1 : 0) - (keys.has('ArrowUp') || keys.has('KeyW') ? 1 : 0);
      p.x += vx * p.speed * speedMul * dt;
      p.y += vy * p.speed * speedMul * dt;
      p.x = Math.max(p.r, Math.min(canvas.width - p.r, p.x));
      p.y = Math.max(p.r + 10, Math.min(canvas.height - p.r, p.y));

      if (keys.has('Space')) fire();

      for (const s of game.stars) {
        s.y += s.z * 35 * dt;
        if (s.y > canvas.height) { s.y = -2; s.x = Math.random() * canvas.width; }
      }

      for (const b of game.bullets) {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
      }
      game.bullets = game.bullets.filter(b => b.y > -20);

      for (const a of game.asteroids) {
        a.x += a.vx * dt;
        a.y += a.vy * dt;
        if (a.x < a.r || a.x > canvas.width - a.r) a.vx *= -1;
      }
      game.asteroids = game.asteroids.filter(a => a.y < canvas.height + 40);

      for (let bi = game.bullets.length - 1; bi >= 0; bi--) {
        const b = game.bullets[bi];
        for (let ai = game.asteroids.length - 1; ai >= 0; ai--) {
          const a = game.asteroids[ai];
          const dx = b.x - a.x, dy = b.y - a.y;
          if (dx*dx + dy*dy <= (a.r + 4) * (a.r + 4)) {
            game.bullets.splice(bi, 1);
            a.hp -= 1;
            if (a.hp <= 0) {
              asteroidHit(a);
              game.asteroids.splice(ai, 1);
              game.score += 12;
            }
            break;
          }
        }
      }

      for (const o of game.ore) {
        o.x += o.vx * dt;
        o.y += o.vy * dt;
        o.life -= dt;
      }
      game.ore = game.ore.filter(o => o.life > 0 && o.y < canvas.height + 20);

      for (let i = game.ore.length - 1; i >= 0; i--) {
        const o = game.ore[i];
        const dx = p.x - o.x, dy = p.y - o.y;
        if (dx*dx + dy*dy <= (p.r + o.r) * (p.r + o.r)) {
          game.ore.splice(i, 1);
          game.score += 18;
          beep(980, 0.05, 'triangle', 0.03);
        }
      }

      for (const a of game.asteroids) {
        const dx = p.x - a.x, dy = p.y - a.y;
        if (dx*dx + dy*dy <= (p.r + a.r - 6) * (p.r + a.r - 6)) {
          gameOver();
          break;
        }
      }

      game.score += dt * 3;
      scoreEl.textContent = String(Math.floor(game.score));
    }

    function drawShip(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.beginPath();
      ctx.moveTo(0, -22);
      ctx.lineTo(14, 16);
      ctx.lineTo(0, 8);
      ctx.lineTo(-14, 16);
      ctx.closePath();
      ctx.fillStyle = '#8ef5ff';
      ctx.shadowColor = '#3ef7ff';
      ctx.shadowBlur = 16;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, 2, 5, 0, Math.PI*2);
      ctx.fillStyle = '#ff4dcb';
      ctx.fill();
      ctx.restore();
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const s of game.stars) {
        ctx.fillStyle = `rgba(130,210,255,${0.35 + s.z * 0.2})`;
        ctx.fillRect(s.x, s.y, s.z, s.z);
      }

      for (const o of game.ore) {
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
        ctx.fillStyle = '#59ff9c';
        ctx.shadowColor = '#59ff9c';
        ctx.shadowBlur = 14;
        ctx.fill();
      }

      for (const b of game.bullets) {
        ctx.strokeStyle = '#ff82e2';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#ff4dcb';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + 7);
        ctx.lineTo(b.x, b.y - 10);
        ctx.stroke();
      }

      for (const a of game.asteroids) {
        ctx.beginPath();
        ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
        ctx.fillStyle = '#9aa7c8';
        ctx.shadowColor = '#7ac4ff';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.strokeStyle = '#d5e0ff55';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      drawShip(game.player);

      if (!game.running && !game.over) {
        overlay('Tap Start to mine the belt');
      }
      if (game.over) {
        overlay(`Ship destroyed\nOre: ${Math.floor(game.score)}\nTap Start`);
      }
    }

    function overlay(text) {
      ctx.fillStyle = 'rgba(6,10,30,0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#d5ebff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '700 32px system-ui, sans-serif';
      const lines = text.split('\n');
      lines.forEach((line, i) => ctx.fillText(line, canvas.width/2, canvas.height/2 + i*42));
    }

    let last = performance.now();
    function loop(t) {
      const dt = Math.min(0.033, (t - last) / 1000);
      last = t;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    function press(k, isDown) {
      if (isDown) {
        keys.add(k);
      } else {
        keys.delete(k);
      }
    }

    window.addEventListener('keydown', (e) => {
      const key = e.code === 'Space' ? 'Space' : e.code;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD','KeyZ'].includes(key)) {
        e.preventDefault();
        press(key, true);
      }
    }, {passive:false});

    window.addEventListener('keyup', (e) => {
      const key = e.code === 'Space' ? 'Space' : e.code;
      press(key, false);
    });

    controls.querySelectorAll('[data-key]').forEach(btn => {
      const key = btn.dataset.key;
      const down = (e) => {
        e.preventDefault();
        ensureAudio();
        btn.classList.add('on');
        press(key, true);
        if (key === 'Space') fire();
      };
      const up = (e) => {
        e.preventDefault();
        btn.classList.remove('on');
        press(key, false);
      };
      btn.addEventListener('pointerdown', down);
      btn.addEventListener('pointerup', up);
      btn.addEventListener('pointercancel', up);
      btn.addEventListener('pointerleave', up);
    });

    startBtn.addEventListener('click', () => {
      ensureAudio();
      resetGame();
    });

    muteBtn.addEventListener('click', () => {
      muted = !muted;
      muteBtn.textContent = muted ? '🔇 Sound Off' : '🔊 Sound On';
    });

    canvas.addEventListener('pointerdown', () => {
      ensureAudio();
      if (!game.running && !game.over) resetGame();
      else if (game.running) fire();
    });

    setupPWA();
    game.stars = Array.from({length: 90}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, z: 0.3 + Math.random()*1.8}));
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
