<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Stormglass Skiff Runner</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --neon: #6cfbff;
      --neon2: #ff66d9;
      --text: #eaf6ff;
      --warn: #ffd166;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: radial-gradient(circle at 15% 0%, #182040 0%, var(--bg) 55%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: grid;
      place-items: center;
      padding: 12px;
    }
    .wrap {
      width: min(94vw, 460px);
      background: linear-gradient(180deg, #141433, #101028);
      border: 1px solid #27406f;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 0 24px #00f7ff22;
    }
    h1 {
      margin: 4px 0 8px;
      font-size: clamp(18px, 4vw, 24px);
      text-align: center;
      color: var(--neon);
      text-shadow: 0 0 14px #6cfbff66;
    }
    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .card {
      background: #0f1631;
      border: 1px solid #26497a;
      border-radius: 10px;
      padding: 6px 8px;
      text-align: center;
    }
    .card b { display: block; font-size: 16px; color: #fff; margin-top: 2px; }
    canvas {
      width: 100%;
      aspect-ratio: 3 / 5;
      border-radius: 12px;
      background: linear-gradient(180deg, #0d1330, #090916 72%);
      border: 1px solid #2f4f82;
      touch-action: none;
      display: block;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: 1px solid #2f5f94;
      border-radius: 10px;
      background: #13203a;
      color: #eaf6ff;
      padding: 10px 8px;
      font-weight: 700;
      cursor: pointer;
    }
    button:active { transform: translateY(1px) scale(0.99); }
    #startBtn {
      width: 100%;
      margin-top: 10px;
      background: linear-gradient(180deg, #1e3868, #14315f);
    }
    .help {
      margin: 8px 0 2px;
      font-size: 12px;
      color: #c9dcff;
      line-height: 1.4;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>🌩️ Stormglass Skiff Runner</h1>
    <section class="hud">
      <div class="card">Score<b id="score">0</b></div>
      <div class="card">Best<b id="best">0</b></div>
      <div class="card">Hull<b id="hull">3</b></div>
      <div class="card">Charge<b id="charge">0</b></div>
    </section>
    <canvas id="game" width="360" height="600" aria-label="stormglass skiff game"></canvas>
    <div class="controls">
      <button data-act="left">⬅️ Left</button>
      <button data-act="shield">🛡️ Shield</button>
      <button data-act="right">Right ➡️</button>
    </div>
    <button id="startBtn">Start / Restart</button>
    <p class="help">키보드: ←/→ 또는 A/D 이동, Space 방어막<br />폭풍 파편 회피 + 비컨 수집, 기록은 자동 저장됩니다.</p>
  </main>

  <script>
    (() => {
      const KEY = 'p1w_stormglass_best';
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const hullEl = document.getElementById('hull');
      const chargeEl = document.getElementById('charge');
      const startBtn = document.getElementById('startBtn');
      const controlButtons = document.querySelectorAll('[data-act]');

      const lanes = [78, 180, 282];
      const state = {
        running: false,
        lane: 1,
        hull: 3,
        charge: 0,
        shieldMs: 0,
        score: 0,
        best: Number(localStorage.getItem(KEY) || 0),
        speed: 2.7,
        tick: 0,
        hazards: [],
        beacons: [],
        raf: 0
      };

      let audio;
      function ensureAudio() {
        if (!audio) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          audio = Ctx ? new Ctx() : null;
        }
        if (audio && audio.state === 'suspended') audio.resume();
      }
      function blip(freq = 420, dur = 0.08, type = 'sine', gain = 0.04) {
        if (!audio) return;
        const t = audio.currentTime;
        const osc = audio.createOscillator();
        const g = audio.createGain();
        osc.frequency.value = freq;
        osc.type = type;
        g.gain.setValueAtTime(gain, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.connect(g).connect(audio.destination);
        osc.start(t);
        osc.stop(t + dur);
      }

      function reset() {
        state.running = true;
        state.lane = 1;
        state.hull = 3;
        state.charge = 0;
        state.shieldMs = 0;
        state.score = 0;
        state.speed = 2.7;
        state.tick = 0;
        state.hazards = [];
        state.beacons = [];
        updateHud();
      }

      function updateHud() {
        scoreEl.textContent = Math.floor(state.score);
        bestEl.textContent = Math.floor(state.best);
        hullEl.textContent = state.hull;
        chargeEl.textContent = state.charge;
      }

      function move(d) {
        if (!state.running) return;
        state.lane = Math.max(0, Math.min(2, state.lane + d));
        blip(520, 0.04, 'square');
      }

      function shield() {
        if (!state.running || state.charge < 2 || state.shieldMs > 0) return;
        state.charge -= 2;
        state.shieldMs = 1200;
        blip(220, 0.14, 'sawtooth', 0.06);
        updateHud();
      }

      function spawn() {
        const lane = Math.floor(Math.random() * 3);
        if (Math.random() < 0.72) {
          state.hazards.push({ x: lanes[lane], y: -30, r: 14 + Math.random() * 5, vy: state.speed + Math.random() * 2.1 });
        } else {
          state.beacons.push({ x: lanes[lane], y: -22, r: 10, vy: state.speed + 1.1 });
        }
      }

      function hitCircle(ax, ay, ar, bx, by, br) {
        const dx = ax - bx;
        const dy = ay - by;
        return dx * dx + dy * dy < (ar + br) * (ar + br);
      }

      function endGame() {
        state.running = false;
        if (state.score > state.best) {
          state.best = Math.floor(state.score);
          localStorage.setItem(KEY, String(state.best));
        }
        blip(130, 0.18, 'triangle', 0.06);
        updateHud();
      }

      function drawSkiff(x, y) {
        ctx.save();
        ctx.translate(x, y);
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(18, 14);
        ctx.lineTo(-18, 14);
        ctx.closePath();
        ctx.fillStyle = '#8de9ff';
        ctx.shadowColor = '#6cfbff';
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.fillStyle = '#ff66d9';
        ctx.fillRect(-3, 2, 6, 10);
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
        g.addColorStop(0, '#0e1f44');
        g.addColorStop(1, '#080814');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < lanes.length; i++) {
          ctx.strokeStyle = '#66d1ff22';
          ctx.setLineDash([8, 10]);
          ctx.beginPath();
          ctx.moveTo(lanes[i], 0);
          ctx.lineTo(lanes[i], canvas.height);
          ctx.stroke();
        }
        ctx.setLineDash([]);

        const py = 520;
        const px = lanes[state.lane];

        state.hazards.forEach(h => {
          h.y += h.vy;
          ctx.beginPath();
          ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2);
          ctx.fillStyle = '#ff6d8a';
          ctx.shadowColor = '#ff6d8a';
          ctx.shadowBlur = 8;
          ctx.fill();
        });

        state.beacons.forEach(b => {
          b.y += b.vy;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fillStyle = '#ffd166';
          ctx.shadowColor = '#ffe29a';
          ctx.shadowBlur = 10;
          ctx.fill();
          ctx.fillStyle = '#0a0a1a';
          ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
        });

        state.hazards = state.hazards.filter(h => h.y < 660);
        state.beacons = state.beacons.filter(b => b.y < 650);

        for (const h of state.hazards) {
          if (hitCircle(px, py, 17, h.x, h.y, h.r)) {
            h.y = 700;
            if (state.shieldMs > 0) {
              blip(260, 0.06, 'sine');
            } else {
              state.hull -= 1;
              blip(95, 0.14, 'sawtooth', 0.07);
              if (state.hull <= 0) endGame();
            }
          }
        }

        for (const b of state.beacons) {
          if (hitCircle(px, py, 17, b.x, b.y, b.r)) {
            b.y = 700;
            state.score += 32;
            state.charge = Math.min(6, state.charge + 1);
            blip(720, 0.05, 'triangle');
          }
        }

        state.score += state.running ? 0.23 : 0;
        if (state.running) {
          state.tick += 16;
          state.speed += 0.0009;
          if (state.tick > 540) {
            spawn();
            state.tick = 0;
          }
          state.shieldMs = Math.max(0, state.shieldMs - 16);
        }

        drawSkiff(px, py);

        if (state.shieldMs > 0) {
          ctx.beginPath();
          ctx.arc(px, py, 27, 0, Math.PI * 2);
          ctx.strokeStyle = '#6cfbffaa';
          ctx.lineWidth = 3;
          ctx.shadowColor = '#6cfbff';
          ctx.shadowBlur = 12;
          ctx.stroke();
        }

        if (!state.running) {
          ctx.fillStyle = '#081024cc';
          ctx.fillRect(42, 236, 276, 122);
          ctx.strokeStyle = '#6cfbff88';
          ctx.strokeRect(42, 236, 276, 122);
          ctx.fillStyle = '#eaf6ff';
          ctx.font = '700 24px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText('Ready Skipper', 180, 280);
          ctx.font = '500 14px system-ui';
          ctx.fillStyle = '#c6dcff';
          ctx.fillText('Press Start / Restart', 180, 309);
          ctx.fillText('Best ' + Math.floor(state.best), 180, 334);
        }

        updateHud();
        state.raf = requestAnimationFrame(draw);
      }

      function handleAction(action) {
        ensureAudio();
        if (action === 'left') move(-1);
        if (action === 'right') move(1);
        if (action === 'shield') shield();
      }

      document.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if (k === 'arrowleft' || k === 'a') { e.preventDefault(); handleAction('left'); }
        if (k === 'arrowright' || k === 'd') { e.preventDefault(); handleAction('right'); }
        if (k === ' ') { e.preventDefault(); handleAction('shield'); }
      }, { passive: false });

      controlButtons.forEach(btn => {
        btn.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          handleAction(btn.dataset.act);
        });
      });

      startBtn.addEventListener('click', () => {
        ensureAudio();
        reset();
        blip(300, 0.09, 'triangle');
      });

      bestEl.textContent = Math.floor(state.best);
      draw();
    })();
  </script>
</body>
</html>
