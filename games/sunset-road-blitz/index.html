<script>
// ── Audio ─────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playEngine(speed) {
  // Called continuously — managed via oscillator node
}
let engineNode = null, engineGain = null;
function startEngineSound() {
  const ctx = getAudio();
  if (engineNode) { try { engineNode.stop(); } catch(e){} }
  engineNode = ctx.createOscillator();
  engineGain = ctx.createGain();
  engineNode.type = 'sawtooth';
  engineNode.frequency.value = 60;
  engineGain.gain.value = 0.04;
  engineNode.connect(engineGain);
  engineGain.connect(ctx.destination);
  engineNode.start();
}
function updateEngineSound(speed, drifting) {
  if (!engineNode) return;
  const baseFreq = 60 + speed * 1.2;
  engineNode.frequency.setTargetAtTime(baseFreq + (drifting ? 40 : 0), audioCtx.currentTime, 0.1);
  engineGain.gain.setTargetAtTime(drifting ? 0.06 : 0.04, audioCtx.currentTime, 0.1);
}
function stopEngineSound() {
  if (engineNode) {
    try { engineNode.stop(); } catch(e){}
    engineNode = null; engineGain = null;
  }
}
function playNitro() {
  const ctx = getAudio();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(100, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.2);
  g.gain.setValueAtTime(0.3, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.3);
}
function playCrash() {
  const ctx = getAudio();
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const t = i / ctx.sampleRate;
    d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 12) * 0.8;
  }
  const src = ctx.createBufferSource(), g = ctx.createGain();
  src.buffer = buf; g.gain.value = 0.6;
  src.connect(g); g.connect(ctx.destination);
  src.start();
}
function playDriftSound() {
  const ctx = getAudio();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(800, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.3);
  g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.35);
}
function playPickup() {
  const ctx = getAudio();
  const freqs = [523, 659, 784];
  freqs.forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.setValueAtTime(0, ctx.currentTime + i * 0.05);
    g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i * 0.05 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.05 + 0.1);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + i * 0.05 + 0.12);
  });
}

// ── Game State ────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const c = canvas.getContext('2d');
let W, H;

const COLORS = {
  skyTop:    '#1a0028',
  skyMid:    '#6b0f7a',
  skyHoriz:  '#ff4400',
  sunGlow:   '#ff8800',
  sunCore:   '#ffd700',
  road:      '#1e1e36',
  roadDark:  '#141428',
  shoulder:  '#8b3a3a',
  stripe:    '#ff9944',
  stripeAlt: '#444466',
  car:       '#ffe033',
  carDark:   '#cc9900',
  carAccent: '#ff4444',
  obstacle1: '#ff4444',
  obstacle2: '#4488ff',
  obstacle3: '#44cc44',
  nitroItem: '#ffd700',
  particle:  '#ff6b35',
  driftSmoke:'rgba(200,120,50,0.4)',
  guardrail: '#5a2d6e'
};

let running = false, over = false;
let distance = 0, bestDist = parseInt(localStorage.getItem('sunset_road_best') || '0');
let baseSpeed = 3.5, speed = 0;
let nitro = 1.0, nitroActive = false;
let drifting = false, driftAngle = 0, driftTimer = 0, driftBonus = 0;
let steerDir = 0;
let frameCount = 0;
let crashFlash = 0;
let particles = [];

// Road generation
let roadX = 0;       // center x offset
let roadWidth = 0;
let roadCurve = 0;   // current curve (-1 to 1)
let roadTargetCurve = 0;
let roadSegments = [];
let segmentH = 0;
let SEGMENTS = 0;
let scrollY = 0;

// Obstacles & pickups
let obstacles = [];
let pickups = [];
let obSpawnTimer = 60;
let pickupSpawnTimer = 150;

// Player
let player = { x: 0, y: 0, w: 28, h: 48, vx: 0 };
let playerAngle = 0;

function resize() {
  W = canvas.width = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
  roadWidth = Math.min(W * 0.70, 380);
  segmentH = H / 14;
  SEGMENTS = Math.ceil(H / segmentH) + 3;
  initRoad();
  player.x = W / 2;
  player.y = H * 0.78;
}

function initRoad() {
  roadX = W / 2;
  roadSegments = [];
  roadCurve = 0; roadTargetCurve = 0;
  let cx = W / 2;
  for (let i = 0; i < SEGMENTS + 5; i++) {
    roadSegments.push({ cx: cx, curve: 0 });
  }
}

function initPlayer() {
  player.x = W / 2;
  player.y = H * 0.78;
  player.vx = 0;
  playerAngle = 0;
}

function getSkyGradient() {
  const grad = c.createLinearGradient(0, 0, 0, H * 0.60);
  grad.addColorStop(0, COLORS.skyTop);
  grad.addColorStop(0.4, COLORS.skyMid);
  grad.addColorStop(0.85, COLORS.skyHoriz);
  grad.addColorStop(1, COLORS.sunGlow);
  return grad;
}

function drawSky() {
  // Sky gradient
  c.fillStyle = getSkyGradient();
  c.fillRect(0, 0, W, H * 0.62);

  // Sun
  const sunX = W / 2 + Math.sin(frameCount * 0.002) * W * 0.05;
  const sunY = H * 0.35;
  const sunR = W * 0.10;
  const sg = c.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
  sg.addColorStop(0, COLORS.sunCore);
  sg.addColorStop(0.4, '#ff8800cc');
  sg.addColorStop(1, 'transparent');
  c.fillStyle = sg;
  c.beginPath();
  c.arc(sunX, sunY, sunR, 0, Math.PI * 2);
  c.fill();

  // Horizon glow
  const hg = c.createLinearGradient(0, H*0.55, 0, H*0.65);
  hg.addColorStop(0, 'rgba(255,140,0,0.5)');
  hg.addColorStop(1, 'rgba(255,100,0,0)');
  c.fillStyle = hg;
  c.fillRect(0, H*0.55, W, H*0.12);

  // Silhouette mountains
  c.fillStyle = '#2d0044';
  c.beginPath();
  const mw = W / 4;
  for (let i = 0; i < 5; i++) {
    const mx = W * 0.1 + i * mw * 0.55;
    const mh = H * (0.08 + Math.sin(i * 1.7) * 0.04);
    c.moveTo(mx - mw * 0.4, H * 0.60);
    c.lineTo(mx, H * 0.60 - mh);
    c.lineTo(mx + mw * 0.4, H * 0.60);
  }
  c.closePath();
  c.fill();
}

function computeRoadPoints() {
  // Returns array of {left, right, cx} for each row band
  const result = [];
  const totalOffset = scrollY % segmentH;
  for (let i = 0; i < SEGMENTS; i++) {
    const si = (SEGMENTS - 1 - i);
    const seg = roadSegments[si % roadSegments.length] || roadSegments[0];
    const y0 = i * segmentH - totalOffset;
    const y1 = y0 + segmentH;
    // Perspective: road narrows toward horizon
    const pct = (H * 0.60 - y0) / (H * 0.60 - H * 1.0); // 0=ground, negative toward horizon
    const horizonBlend = Math.max(0, Math.min(1, y0 / (H * 0.62)));
    const rw = roadWidth * 0.4 * horizonBlend + roadWidth * 0.9 * (1 - horizonBlend);
    const cx = seg.cx;
    result.push({ cx, rw, y0, y1, alt: Math.floor((i + Math.floor(scrollY / segmentH)) % 2 === 0) });
  }
  return result;
}

function drawRoad() {
  const segs = computeRoadPoints();
  segs.forEach((seg, i) => {
    if (seg.y0 > H || seg.y1 < H * 0.60) return;
    const y0 = Math.max(seg.y0, H * 0.60);
    const y1 = seg.y1;
    if (y1 <= y0) return;

    const blend = (seg.y0 - H * 0.60) / (H - H * 0.60);
    const rw = seg.rw * blend + roadWidth * 0.1 * (1 - blend);
    const cx = seg.cx;

    // Shoulder
    c.fillStyle = COLORS.shoulder;
    c.fillRect(0, y0, W, y1 - y0);

    // Road body
    c.fillStyle = seg.alt ? COLORS.road : COLORS.roadDark;
    c.fillRect(cx - rw, y0, rw * 2, y1 - y0);

    // Lane stripes
    const stripeW = rw * 0.04;
    const stripeMid = rw * 0.5;
    if (rw > 20) {
      c.fillStyle = seg.alt ? COLORS.stripe : COLORS.stripeAlt;
      c.fillRect(cx - stripeW / 2, y0, stripeW, y1 - y0);
      // Side dashes
      c.fillStyle = '#fff3';
      c.fillRect(cx - rw + stripeW, y0, stripeW * 0.6, y1 - y0);
      c.fillRect(cx + rw - stripeW * 1.6, y0, stripeW * 0.6, y1 - y0);
    }

    // Guardrails at road edge
    if (rw > 20) {
      c.fillStyle = COLORS.guardrail;
      c.fillRect(cx - rw - 8, y0, 8, y1 - y0);
      c.fillRect(cx + rw, y0, 8, y1 - y0);
    }
  });

  // Ground below
  c.fillStyle = '#0e0018';
  c.fillRect(0, H * 0.60, W, H * 0.40);
}

function getCurrentRoadBounds() {
  // Get road bounds at player Y
  const pctY = (player.y - H * 0.60) / (H - H * 0.60);
  const blend = Math.max(0, Math.min(1, pctY));
  const rw = roadWidth * 0.4 * blend + roadWidth * 0.1 * (1 - blend);
  const cx = roadSegments[Math.floor(SEGMENTS * 0.25) % roadSegments.length]?.cx || W / 2;
  return { left: cx - rw, right: cx + rw, cx };
}

function drawObstacles() {
  obstacles.forEach(ob => {
    const pct = (ob.y - H * 0.60) / (H - H * 0.60);
    const scale = 0.3 + pct * 0.7;
    const ow = ob.w * scale, oh = ob.h * scale;
    c.save();
    c.translate(ob.x, ob.y);

    if (ob.type === 0) {
      // Cone
      c.fillStyle = '#ff4400';
      c.beginPath();
      c.moveTo(0, -oh/2);
      c.lineTo(ow/2, oh/2);
      c.lineTo(-ow/2, oh/2);
      c.closePath();
      c.fill();
      c.fillStyle = '#ffffff';
      c.fillRect(-ow/2, 0, ow, oh/8);
    } else if (ob.type === 1) {
      // Car (blue)
      c.fillStyle = '#3366cc';
      c.fillRect(-ow/2, -oh/2, ow, oh);
      c.fillStyle = '#88aaff';
      c.fillRect(-ow/2+2, -oh/2+4, ow-4, oh*0.4);
      c.fillStyle = '#ff4444';
      c.fillRect(-ow/2, oh/2-4, ow, 4);
    } else {
      // Oil slick
      c.fillStyle = 'rgba(20,20,40,0.7)';
      c.beginPath();
      c.ellipse(0, 0, ow, oh/2, 0, 0, Math.PI*2);
      c.fill();
      c.fillStyle = 'rgba(60,60,120,0.4)';
      c.beginPath();
      c.ellipse(0, 0, ow*0.6, oh*0.3, 0, 0, Math.PI*2);
      c.fill();
    }
    c.restore();
    ob.hitW = ow * 0.85;
    ob.hitH = oh * 0.85;
  });
}

function drawPickups() {
  pickups.forEach(pk => {
    const pct = (pk.y - H * 0.60) / (H - H * 0.60);
    const scale = 0.3 + pct * 0.7;
    const r = 10 * scale;
    const pulse = Math.sin(frameCount * 0.12) * 3;
    c.save();
    c.translate(pk.x, pk.y);
    // Diamond shape
    c.fillStyle = '#ffd700';
    c.shadowColor = '#ffd700';
    c.shadowBlur = 10 + pulse * 2;
    c.beginPath();
    c.moveTo(0, -(r+pulse));
    c.lineTo(r+pulse, 0);
    c.lineTo(0, r+pulse);
    c.lineTo(-(r+pulse), 0);
    c.closePath();
    c.fill();
    c.shadowBlur = 0;
    c.fillStyle = '#fff8c0';
    c.font = `${r}px Arial`;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText('⚡', 0, 0);
    c.restore();
    pk.hitR = (r + pulse) * 1.2;
  });
}

function drawPlayer() {
  c.save();
  c.translate(player.x, player.y);
  const tilt = drifting ? driftAngle * 0.3 : playerAngle * 0.3;
  c.rotate(tilt);

  const pw = player.w, ph = player.h;

  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.beginPath();
  c.ellipse(4, ph/2 + 4, pw*0.5, 6, 0, 0, Math.PI*2);
  c.fill();

  // Car body
  c.fillStyle = nitroActive ? '#fff07a' : COLORS.car;
  c.beginPath();
  c.roundRect(-pw/2, -ph/2, pw, ph, 6);
  c.fill();

  // Windshield
  c.fillStyle = '#aaddff';
  c.beginPath();
  c.roundRect(-pw/2+3, -ph/2+4, pw-6, ph*0.3, 3);
  c.fill();

  // Rear window
  c.fillStyle = '#aaddff';
  c.fillRect(-pw/2+3, ph*0.15, pw-6, ph*0.18);

  // Hood accent
  c.fillStyle = COLORS.carAccent;
  c.fillRect(-pw/2, -ph/2 - 2, pw, 4);

  // Wheels
  c.fillStyle = '#222';
  [[-(pw/2+2), -ph/3, 5, 10], [(pw/2-2), -ph/3, 5, 10],
   [-(pw/2+2), ph/4, 5, 10], [(pw/2-2), ph/4, 5, 10]].forEach(([x, y, rw, rh]) => {
    c.fillRect(x - rw/2, y - rh/2, rw, rh);
  });

  // Nitro flame
  if (nitroActive) {
    c.fillStyle = '#ff6b35';
    c.beginPath();
    c.moveTo(-pw/3, ph/2);
    c.lineTo(0, ph/2 + 20 + Math.random() * 10);
    c.lineTo(pw/3, ph/2);
    c.closePath();
    c.fill();
    c.fillStyle = '#ffd700';
    c.beginPath();
    c.moveTo(-pw/5, ph/2);
    c.lineTo(0, ph/2 + 12 + Math.random() * 6);
    c.lineTo(pw/5, ph/2);
    c.closePath();
    c.fill();
  }

  c.restore();

  // Drift smoke
  if (drifting) {
    addParticle(player.x + (Math.random()-0.5)*player.w, player.y + player.h/2, COLORS.driftSmoke, 1.5);
  }
}

function addParticle(x, y, color, size) {
  particles.push({
    x, y,
    vx: (Math.random()-0.5) * 2,
    vy: -Math.random() * 1.5,
    life: 1,
    color,
    r: size + Math.random() * 2
  });
}

function drawParticles() {
  particles.forEach(p => {
    c.globalAlpha = p.life * 0.8;
    c.fillStyle = p.color;
    c.beginPath();
    c.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    c.fill();
  });
  c.globalAlpha = 1;
}

const keys = {};
const touchInput = { left: false, right: false, nitro: false };

function update() {
  if (!running || over) return;
  frameCount++;

  // Speed ramp
  const targetSpeed = baseSpeed + distance * 0.0008;
  speed += (targetSpeed - speed) * 0.01;
  const effSpeed = nitroActive ? speed * 2.2 : speed;

  // Road curve evolution
  if (frameCount % 120 === 0) {
    roadTargetCurve = (Math.random() * 2 - 1) * 0.8;
  }
  roadCurve += (roadTargetCurve - roadCurve) * 0.015;

  // Scroll road
  scrollY += effSpeed;

  // Shift road segments
  const shiftAmount = effSpeed * roadCurve * 0.5;
  roadSegments.forEach(seg => { seg.cx += shiftAmount; });
  // Clamp road center
  const roadCenter = roadSegments[Math.floor(SEGMENTS/2)]?.cx || W/2;
  if (roadCenter < W * 0.2) roadSegments.forEach(s => s.cx += W * 0.01);
  if (roadCenter > W * 0.8) roadSegments.forEach(s => s.cx -= W * 0.01);

  // Recycle road segments
  if (scrollY > segmentH) {
    scrollY -= segmentH;
    const newSeg = { cx: roadSegments[roadSegments.length-1].cx + (Math.random()-0.5)*20, curve: roadCurve };
    roadSegments.push(newSeg);
    roadSegments.shift();
  }

  // Player steering
  const steerLeft = keys['ArrowLeft'] || keys['a'] || keys['A'] || touchInput.left;
  const steerRight = keys['ArrowRight'] || keys['d'] || keys['D'] || touchInput.right;
  const steerStrength = 4.5 + effSpeed * 0.2;

  if (steerLeft) { player.vx -= steerStrength; steerDir = -1; }
  else if (steerRight) { player.vx += steerStrength; steerDir = 1; }
  else { steerDir = 0; }

  // Road push (curve shifts player)
  player.vx += shiftAmount * 1.2;

  player.vx *= 0.80;
  player.x += player.vx;
  playerAngle = player.vx * 0.04;

  // Drift detection
  const prevDrift = drifting;
  drifting = Math.abs(player.vx) > 5 && (steerLeft || steerRight);
  if (drifting && !prevDrift) { driftAngle = playerAngle; playDriftSound(); }
  if (drifting) {
    driftTimer++;
    if (driftTimer % 30 === 0) {
      driftBonus += 10;
      distance += 5;
    }
  } else {
    driftTimer = 0;
  }

  // Nitro
  const nitroWant = keys[' '] || keys['z'] || keys['Z'] || touchInput.nitro;
  if (nitroWant && nitro > 0) {
    nitroActive = true;
    nitro = Math.max(0, nitro - 0.012);
    if (!running) return;
  } else {
    nitroActive = false;
    nitro = Math.min(1, nitro + 0.002);
  }
  document.getElementById('nitroFill').style.width = (nitro * 100) + '%';
  updateEngineSound(effSpeed, drifting);

  // Bounds check (hit road edge)
  const bounds = getCurrentRoadBounds();
  const carHalfW = player.w / 2;
  if (player.x - carHalfW < bounds.left - 30 || player.x + carHalfW > bounds.right + 30) {
    if (crashFlash <= 0) {
      crashFlash = 40;
      playCrash();
      endGame();
      return;
    }
  }
  player.x = Math.max(bounds.left - 20, Math.min(bounds.right + 20, player.x));
  player.y = Math.max(H * 0.65, Math.min(H * 0.85, player.y));

  // Distance
  distance += effSpeed * 0.1;
  document.getElementById('distScore').textContent = Math.floor(distance);
  document.getElementById('speedVal').textContent = Math.floor(effSpeed * 15);

  // Drift display
  if (drifting && driftTimer > 0) {
    document.getElementById('driftDisplay').textContent = `🔥 드리프트 +${driftBonus}`;
  } else if (!drifting && driftBonus > 0) {
    document.getElementById('driftDisplay').textContent = `✅ 드리프트 보너스 +${driftBonus}`;
    setTimeout(() => { document.getElementById('driftDisplay').textContent = ''; driftBonus = 0; }, 800);
  }

  // Obstacle spawn
  obSpawnTimer--;
  if (obSpawnTimer <= 0) {
    const obX = bounds.left + (bounds.right - bounds.left) * (0.1 + Math.random() * 0.8);
    obstacles.push({
      x: obX, y: H * 0.62,
      w: 30, h: 50,
      type: Math.floor(Math.random() * 3),
      hitW: 25, hitH: 40
    });
    obSpawnTimer = Math.max(30, 80 - Math.floor(distance * 0.05));
  }

  // Pickup spawn
  pickupSpawnTimer--;
  if (pickupSpawnTimer <= 0) {
    const pkX = bounds.left + (bounds.right - bounds.left) * (0.15 + Math.random() * 0.7);
    pickups.push({ x: pkX, y: H * 0.62, hitR: 15 });
    pickupSpawnTimer = 200;
  }

  // Move obstacles + pickups downward
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.y += effSpeed;
    if (ob.y > H + 60) { obstacles.splice(i, 1); continue; }
    // Collision with player
    if (crashFlash <= 0) {
      const dx = Math.abs(player.x - ob.x), dy = Math.abs(player.y - ob.y);
      if (dx < (player.w/2 + (ob.hitW||25)/2) * 0.7 && dy < (player.h/2 + (ob.hitH||40)/2) * 0.7) {
        crashFlash = 40;
        playCrash();
        for (let k = 0; k < 12; k++) {
          particles.push({
            x: player.x + (Math.random()-0.5)*40,
            y: player.y + (Math.random()-0.5)*40,
            vx: (Math.random()-0.5)*5, vy: -Math.random()*4,
            life: 1, color: '#ff6600', r: 4
          });
        }
        endGame();
        return;
      }
    }
  }
  if (crashFlash > 0) crashFlash--;

  for (let i = pickups.length - 1; i >= 0; i--) {
    const pk = pickups[i];
    pk.y += effSpeed;
    if (pk.y > H + 40) { pickups.splice(i, 1); continue; }
    const d = Math.hypot(player.x - pk.x, player.y - pk.y);
    if (d < pk.hitR + player.w/2) {
      nitro = Math.min(1, nitro + 0.4);
      playPickup();
      pickups.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function draw() {
  c.clearRect(0, 0, W, H);
  drawSky();
  drawRoad();
  drawParticles();
  drawObstacles();
  drawPickups();

  // Crash flash
  if (crashFlash > 0) {
    c.fillStyle = `rgba(255,0,0,${crashFlash/40 * 0.4})`;
    c.fillRect(0, 0, W, H);
  }

  if (running) drawPlayer();

  // Drift smoke trails (behind player)
  if (drifting) {
    const sm = 8;
    c.fillStyle = 'rgba(200,120,50,0.25)';
    for (let i = 0; i < sm; i++) {
      const x = player.x + (Math.random()-0.5)*20;
      const y = player.y + player.h/2 + Math.random()*15;
      c.beginPath();
      c.arc(x, y, 4 + Math.random()*4, 0, Math.PI*2);
      c.fill();
    }
  }

  // HUD speed tint
  if (nitroActive) {
    const sg = c.createLinearGradient(0, 0, W, 0);
    sg.addColorStop(0, 'rgba(255,107,53,0.12)');
    sg.addColorStop(0.5, 'rgba(255,215,0,0.05)');
    sg.addColorStop(1, 'rgba(255,107,53,0.12)');
    c.fillStyle = sg;
    c.fillRect(0, 0, W, H);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  distance = 0; speed = 0; baseSpeed = 3.5;
  nitro = 1.0; nitroActive = false;
  drifting = false; driftAngle = 0; driftTimer = 0; driftBonus = 0;
  obstacles = []; pickups = []; particles = [];
  obSpawnTimer = 80; pickupSpawnTimer = 150;
  crashFlash = 0; frameCount = 0;
  initRoad();
  initPlayer();
  running = true; over = false;
  document.getElementById('distScore').textContent = '0';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('driftDisplay').textContent = '';
  startEngineSound();
}

function endGame() {
  running = false; over = true;
  stopEngineSound();
  const finalDist = Math.floor(distance);
  if (finalDist > bestDist) {
    bestDist = finalDist;
    localStorage.setItem('sunset_road_best', bestDist);
  }
  document.getElementById('finalScore').textContent = finalDist + 'm';
  document.getElementById('finalBest').textContent = bestDist + 'm';
  setTimeout(() => {
    document.getElementById('gameOver').style.display = 'flex';
  }, 600);
}

// ── Input ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  if (e.key === ' ' && !running && !over) startGame();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

const btnL = document.getElementById('touchLeft');
const btnR = document.getElementById('touchRight');
const btnN = document.getElementById('touchNitro');
btnL.addEventListener('touchstart', e => { e.preventDefault(); touchInput.left = true; }, { passive: false });
btnL.addEventListener('touchend', e => { e.preventDefault(); touchInput.left = false; }, { passive: false });
btnR.addEventListener('touchstart', e => { e.preventDefault(); touchInput.right = true; }, { passive: false });
btnR.addEventListener('touchend', e => { e.preventDefault(); touchInput.right = false; }, { passive: false });
btnN.addEventListener('touchstart', e => { e.preventDefault(); touchInput.nitro = true; }, { passive: false });
btnN.addEventListener('touchend', e => { e.preventDefault(); touchInput.nitro = false; }, { passive: false });

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// ── roundRect polyfill ────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2*r) r = w/2; if (h < 2*r) r = h/2;
    this.beginPath();
    this.moveTo(x+r, y);
    this.arcTo(x+w, y, x+w, y+h, r);
    this.arcTo(x+w, y+h, x, y+h, r);
    this.arcTo(x, y+h, x, y, r);
    this.arcTo(x, y, x+w, y, r);
    this.closePath();
    return this;
  };
}

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('resize', resize);
const storedBest = bestDist;
document.getElementById('bestScore').textContent = storedBest + 'm';
document.getElementById('bestScoreMenu').textContent = storedBest + 'm';

resize();
gameLoop();
</script>
