<script>
// ═══════════════════════════════════════════════
//  TAP AWAY PUZZLE — Full Game
// ═══════════════════════════════════════════════

const DIRS = {
  up:    { dr: -1, dc: 0, arrow: '↑' },
  down:  { dr: 1,  dc: 0, arrow: '↓' },
  left:  { dr: 0,  dc: -1, arrow: '←' },
  right: { dr: 0,  dc: 1,  arrow: '→' }
};
const DIR_KEYS = ['up', 'down', 'left', 'right'];
const TOTAL_LEVELS = 50;

let currentLevel = 0;
let blocks = [];
let moveHistory = [];
let moveCount = 0;
let optimalMoves = 0;
let animating = false;
let gridSize = 5;
let hintBlock = null;
let saveData = loadSave();

// ── Save/Load ──
function loadSave() {
  try { return JSON.parse(localStorage.getItem('tapaway_save')) || {}; } catch { return {}; }
}
function save() { localStorage.setItem('tapaway_save', JSON.stringify(saveData)); }
function getLevelData(n) { return saveData[`l${n}`] || { cleared: false, stars: 0 }; }
function setLevelData(n, stars) {
  const k = `l${n}`;
  const prev = saveData[k] || { cleared: false, stars: 0 };
  saveData[k] = { cleared: true, stars: Math.max(prev.stars, stars) };
  save();
}

// ── Level Generation ──
function getGridSize(level) {
  if (level <= 15) return 5;
  if (level <= 35) return 6;
  return 7;
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 4294967296;
  };
}

function generateLevel(levelNum) {
  gridSize = getGridSize(levelNum);
  const rng = seededRandom(levelNum * 7919 + 3571);

  // Tutorial levels (1-5): very simple
  if (levelNum <= 5) return generateTutorialLevel(levelNum, rng);

  // Generate by reverse: place blocks that can be removed one by one
  const numBlocks = Math.min(gridSize * gridSize - 2, Math.floor(4 + levelNum * 0.6 + rng() * 3));
  return generateSolvableLevel(numBlocks, rng, levelNum);
}

function generateTutorialLevel(num, rng) {
  const layouts = [
    // Level 1: single block pointing right on edge
    [{ r: 2, c: 0, dir: 'right' }],
    // Level 2: two blocks, clear order
    [{ r: 1, c: 4, dir: 'right' }, { r: 3, c: 2, dir: 'up' }],
    // Level 3: three blocks
    [{ r: 0, c: 2, dir: 'down' }, { r: 4, c: 3, dir: 'right' }, { r: 2, c: 0, dir: 'right' }],
    // Level 4: ordering matters
    [{ r: 2, c: 1, dir: 'right' }, { r: 2, c: 3, dir: 'right' }, { r: 0, c: 2, dir: 'up' }, { r: 4, c: 4, dir: 'right' }],
    // Level 5: five blocks
    [{ r: 1, c: 0, dir: 'right' }, { r: 1, c: 3, dir: 'right' }, { r: 3, c: 4, dir: 'down' }, { r: 0, c: 2, dir: 'up' }, { r: 4, c: 1, dir: 'left' }]
  ];
  const layout = layouts[num - 1];
  return { blocks: layout, optimal: layout.length, gridSize: 5 };
}

function generateSolvableLevel(numBlocks, rng, levelNum) {
  // Strategy: place blocks in removal order (reverse construction)
  // Each block must have a clear path to the edge in its direction
  let placed = [];
  let grid = Array.from({ length: gridSize }, () => Array(gridSize).fill(false));
  let attempts = 0;
  const maxAttempts = 500;

  while (placed.length < numBlocks && attempts < maxAttempts) {
    attempts++;
    const r = Math.floor(rng() * gridSize);
    const c = Math.floor(rng() * gridSize);
    if (grid[r][c]) continue;

    // Pick a direction that can potentially exit
    const shuffled = [...DIR_KEYS].sort(() => rng() - 0.5);
    let validDir = null;

    for (const dir of shuffled) {
      const { dr, dc } = DIRS[dir];
      // Check if there's at least a path to edge
      let cr = r + dr, cc = c + dc;
      let clear = true;
      while (cr >= 0 && cr < gridSize && cc >= 0 && cc < gridSize) {
        if (grid[cr][cc]) { clear = false; break; }
        cr += dr; cc += dc;
      }
      if (clear) { validDir = dir; break; }
    }

    if (validDir) {
      placed.push({ r, c, dir: validDir });
      grid[r][c] = true;
    }
  }

  // Now verify solvability by simulation
  const solution = findSolution(placed, gridSize);
  const optimal = solution ? solution.length : placed.length;

  return { blocks: placed, optimal, gridSize };
}

function findSolution(initialBlocks, gs) {
  // BFS to find optimal solution
  const encode = (bks) => bks.map(b => `${b.r},${b.c},${b.dir}`).sort().join('|');

  const queue = [{ blocks: initialBlocks.map(b => ({...b})), moves: [] }];
  const visited = new Set();
  visited.add(encode(initialBlocks));

  let iterations = 0;
  const maxIter = 10000;

  while (queue.length > 0 && iterations < maxIter) {
    iterations++;
    const state = queue.shift();

    if (state.blocks.length === 0) return state.moves;

    for (let i = 0; i < state.blocks.length; i++) {
      const block = state.blocks[i];
      if (canMove(block, state.blocks, gs)) {
        const newBlocks = state.blocks.filter((_, idx) => idx !== i);
        const key = encode(newBlocks);
        if (!visited.has(key)) {
          visited.add(key);
          queue.push({
            blocks: newBlocks,
            moves: [...state.moves, { r: block.r, c: block.c }]
          });
        }
      }
    }
  }

  // If BFS couldn't find in time, try greedy
  return greedySolve(initialBlocks, gs);
}

function greedySolve(initialBlocks, gs) {
  let bks = initialBlocks.map(b => ({...b}));
  let moves = [];
  let maxIter = bks.length * 3;

  while (bks.length > 0 && maxIter-- > 0) {
    let found = false;
    for (let i = 0; i < bks.length; i++) {
      if (canMove(bks[i], bks, gs)) {
        moves.push({ r: bks[i].r, c: bks[i].c });
        bks.splice(i, 1);
        found = true;
        break;
      }
    }
    if (!found) break;
  }

  return bks.length === 0 ? moves : null;
}

function canMove(block, allBlocks, gs) {
  const { dr, dc } = DIRS[block.dir];
  let r = block.r + dr;
  let c = block.c + dc;

  while (r >= 0 && r < gs && c >= 0 && c < gs) {
    if (allBlocks.some(b => b !== block && b.r === r && b.c === c)) return false;
    r += dr;
    c += dc;
  }
  return true;
}

// ── Level Select ──
function buildLevelGrid() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';

  const sections = [
    { label: '📘 튜토리얼 (1-5)', start: 1, end: 5 },
    { label: '📗 초급 (6-15)', start: 6, end: 15 },
    { label: '📙 중급 (16-35)', start: 16, end: 35 },
    { label: '📕 고급 (36-50)', start: 36, end: 50 }
  ];

  for (const sec of sections) {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = sec.label;
    grid.appendChild(label);

    for (let i = sec.start; i <= sec.end; i++) {
      const btn = document.createElement('button');
      btn.className = 'level-btn';
      const data = getLevelData(i);
      const unlocked = i === 1 || getLevelData(i - 1).cleared;

      if (!unlocked) btn.classList.add('locked');
      if (data.cleared) btn.classList.add('cleared');

      let starsHtml = '';
      if (data.cleared) {
        for (let s = 1; s <= 3; s++) {
          starsHtml += s <= data.stars ? '★' : '<span class="empty">★</span>';
        }
      }

      btn.innerHTML = `${i}${starsHtml ? `<div class="stars">${starsHtml}</div>` : ''}`;
      btn.onclick = () => startLevel(i);
      grid.appendChild(btn);
    }
  }
}

function showLevelSelect() {
  document.getElementById('levelSelect').classList.add('active');
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('winModal').classList.remove('active');
  buildLevelGrid();
}

// ── Game Logic ──
function startLevel(num) {
  currentLevel = num;
  const levelData = generateLevel(num);
  gridSize = levelData.gridSize;
  blocks = levelData.blocks.map((b, i) => ({ ...b, id: i }));
  optimalMoves = levelData.optimal;
  moveCount = 0;
  moveHistory = [];
  hintBlock = null;
  animating = false;

  document.getElementById('levelSelect').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  document.getElementById('levelInfo').textContent = `Level ${num}`;

  renderBoard();
  updateUI();

  // Tutorial tips for level 1
  if (num === 1) {
    setTimeout(() => showTutorialTip(), 500);
  }
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const container = document.getElementById('boardContainer');
  const size = container.offsetWidth;
  const cellSize = size / (gridSize + 0.5);
  const padding = cellSize * 0.25;
  const gap = 3;

  // Background cells
  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell-bg';
      cell.style.left = (padding + c * (cellSize + gap)) + 'px';
      cell.style.top = (padding + r * (cellSize + gap)) + 'px';
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      board.appendChild(cell);
    }
  }

  // Blocks
  blocks.forEach(block => {
    const el = document.createElement('div');
    el.className = 'block';
    el.dataset.id = block.id;
    el.dataset.dir = block.dir;
    el.style.left = (padding + block.c * (cellSize + gap)) + 'px';
    el.style.top = (padding + block.r * (cellSize + gap)) + 'px';
    el.style.width = cellSize + 'px';
    el.style.height = cellSize + 'px';
    el.innerHTML = makeArrow(block.dir, cellSize);
    el.addEventListener('click', () => tapBlock(block.id));
    el.addEventListener('touchend', (e) => { e.preventDefault(); tapBlock(block.id); });
    board.appendChild(el);
  });
}

function makeArrow(dir, size) {
  const s = Math.floor(size * 0.45);
  const rotations = { up: 0, right: 90, down: 180, left: 270 };
  return `<svg class="arrow" width="${s}" height="${s}" viewBox="0 0 24 24" style="transform: rotate(${rotations[dir]}deg)">
    <path d="M12 4l-8 12h5v4h6v-4h5z" fill="rgba(255,255,255,0.9)"/>
  </svg>`;
}

function tapBlock(id) {
  if (animating) return;

  const block = blocks.find(b => b.id === id);
  if (!block) return;

  // Clear hint
  clearHint();

  if (canMove(block, blocks, gridSize)) {
    animating = true;
    moveCount++;
    moveHistory.push({ block: { ...block }, blocksSnapshot: blocks.map(b => ({ ...b })) });

    // Calculate slide-out position
    const container = document.getElementById('boardContainer');
    const size = container.offsetWidth;
    const cellSize = size / (gridSize + 0.5);
    const padding = cellSize * 0.25;
    const gap = 3;
    const { dr, dc } = DIRS[block.dir];

    const el = document.querySelector(`.block[data-id="${id}"]`);
    if (!el) { animating = false; return; }

    // Slide to edge + beyond
    let targetR = block.r, targetC = block.c;
    if (dr === -1) targetR = -2;
    else if (dr === 1) targetR = gridSize + 1;
    if (dc === -1) targetC = -2;
    else if (dc === 1) targetC = gridSize + 1;

    el.style.left = (padding + targetC * (cellSize + gap)) + 'px';
    el.style.top = (padding + targetR * (cellSize + gap)) + 'px';
    el.classList.add('removing');

    // Particles at last visible position
    const rect = el.getBoundingClientRect();
    setTimeout(() => spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, block.dir), 200);

    setTimeout(() => {
      blocks = blocks.filter(b => b.id !== id);
      el.remove();
      animating = false;
      updateUI();

      if (blocks.length === 0) {
        setTimeout(() => showWin(), 300);
      }
    }, 450);
  } else {
    // Shake animation
    const el = document.querySelector(`.block[data-id="${id}"]`);
    if (el) {
      el.classList.remove('shake');
      void el.offsetWidth;
      el.classList.add('shake');
      el.style.boxShadow = '0 0 16px rgba(255,50,50,0.6)';
      setTimeout(() => {
        el.style.boxShadow = '';
        el.classList.remove('shake');
      }, 400);
    }
  }
}

function undo() {
  if (moveHistory.length === 0 || animating) return;
  const prev = moveHistory.pop();
  blocks = prev.blocksSnapshot;
  moveCount = Math.max(0, moveCount - 1);
  clearHint();
  renderBoard();
  updateUI();
}

function resetLevel() {
  if (animating) return;
  startLevel(currentLevel);
}

function showHint() {
  if (animating || blocks.length === 0) return;
  clearHint();

  // Find first moveable block
  for (const block of blocks) {
    if (canMove(block, blocks, gridSize)) {
      hintBlock = block.id;
      const el = document.querySelector(`.block[data-id="${block.id}"]`);
      if (el) el.classList.add('hint-glow');
      break;
    }
  }

  // If no block can move, try solving from current state
  if (hintBlock === null) {
    const solution = findSolution(blocks, gridSize);
    if (solution && solution.length > 0) {
      const first = solution[0];
      const block = blocks.find(b => b.r === first.r && b.c === first.c);
      if (block) {
        hintBlock = block.id;
        const el = document.querySelector(`.block[data-id="${block.id}"]`);
        if (el) el.classList.add('hint-glow');
      }
    }
  }
}

function clearHint() {
  if (hintBlock !== null) {
    const el = document.querySelector(`.block[data-id="${hintBlock}"]`);
    if (el) el.classList.remove('hint-glow');
    hintBlock = null;
  }
}

function updateUI() {
  document.getElementById('movesInfo').textContent = `${moveCount} / ${optimalMoves}`;
  document.getElementById('undoBtn').disabled = moveHistory.length === 0;

  // Stars
  const starEls = document.querySelectorAll('#starDisplay .star');
  const stars = calcStars(moveCount, optimalMoves, blocks.length > 0);
  starEls.forEach((el, i) => {
    el.classList.toggle('earned', i < stars);
  });
}

function calcStars(moves, optimal, incomplete) {
  if (incomplete) {
    if (moves <= optimal) return 3;
    if (moves <= optimal + 2) return 2;
    if (moves <= optimal + 5) return 1;
    return 0;
  }
  // Completed
  if (moves <= optimal) return 3;
  if (moves <= optimal + 3) return 2;
  return 1;
}

function showWin() {
  const stars = calcStars(moveCount, optimalMoves, false);
  setLevelData(currentLevel, stars);

  document.getElementById('winStars').innerHTML =
    Array.from({length: 3}, (_, i) =>
      i < stars ? '⭐' : '<span style="opacity:0.2">⭐</span>'
    ).join('');

  const msgs = [
    '', 
    '클리어! 다음엔 더 잘 할 수 있어요 💪',
    '잘했어요! 거의 완벽해요 ✨',
    '퍼펙트! 최적 해를 찾았어요! 🏆'
  ];
  document.getElementById('winMsg').textContent = msgs[stars] || msgs[1];

  document.getElementById('nextBtn').style.display =
    currentLevel < TOTAL_LEVELS ? '' : 'none';

  document.getElementById('winModal').classList.add('active');
}

function replayLevel() {
  document.getElementById('winModal').classList.remove('active');
  startLevel(currentLevel);
}

function nextLevel() {
  document.getElementById('winModal').classList.remove('active');
  if (currentLevel < TOTAL_LEVELS) {
    startLevel(currentLevel + 1);
  } else {
    showLevelSelect();
  }
}

// ── Particles ──
function spawnParticles(x, y, dir) {
  const colors = ['#F5F5F5', '#7c4dff', '#ff6090', '#ffd740', '#69f0ae'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 6;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 60;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

// ── Tutorial ──
function showTutorialTip() {
  if (currentLevel !== 1 || blocks.length === 0) return;
  const el = document.querySelector('.block[data-id="0"]');
  if (!el) return;

  const tip = document.createElement('div');
  tip.className = 'tutorial-tip';
  tip.textContent = '👆 이 블록을 탭하세요!';
  tip.id = 'tutorialTip';

  const board = document.getElementById('board');
  const rect = el.getBoundingClientRect();
  const boardRect = board.getBoundingClientRect();
  tip.style.left = (rect.left - boardRect.left + rect.width/2 - 80) + 'px';
  tip.style.top = (rect.top - boardRect.top - 50) + 'px';
  board.appendChild(tip);

  setTimeout(() => { const t = document.getElementById('tutorialTip'); if (t) t.remove(); }, 5000);
}

// ── Init ──
buildLevelGrid();
</script>
<script src="../cross-promo.js"></script>

    <!-- leaderboard-integration:tap-away -->
    <div id="leaderboard" data-lb-slug="tap-away" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "tap-away";
      const CANDIDATE_OBJECTS = ["DIRS", "rotations"];
      const END_METHODS = ["gameOver", "endGame", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["startGame", "newGame", "restart", "retry", "resetGame", "initGame", "start", "beginGame", "playAgain"];
      const SCORE_KEYS = ["level", "time", "score", "points", "gold", "coins", "wave", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
