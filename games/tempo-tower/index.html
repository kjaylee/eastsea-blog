  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #13132c;
      --line: rgba(255,255,255,.15);
      --text: #e8ecff;
      --muted: #96a0d0;
      --gold: #ffd166;
      --mint: #37ffc7;
      --pink: #ff69b4;
      --danger: #ff5f91;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at 20% 5%, #1a1a42 0%, #0a0a1a 52%, #070712 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      min-height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(100vw, 860px);
      min-height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(21, 21, 47, .95), rgba(11, 11, 27, .92));
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: inset 0 0 24px rgba(90, 103, 255, .09), 0 8px 22px rgba(0,0,0,.32);

    .title {
      padding: 12px 14px;

      box-shadow: 0 0 18px rgba(255, 209, 102, .12), inset 0 0 24px rgba(255, 209, 102, .06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.05rem, 4.6vw, 1.52rem);
      letter-spacing: .04em;
      color: #ffe8ac;
      text-shadow: 0 0 12px rgba(255, 209, 102, .5);
    }

    .pitch {
      margin-top: 4px;
      font-size: .82rem;
      color: #ffd9ef;
    }

    .badge {
      font-size: .72rem;
      border: 1px solid rgba(255, 209, 102, .45);
      border-radius: 999px;
      color: var(--gold);
      background: rgba(255, 209, 102, .09);

      white-space: nowrap;
    }

    .hud {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;

    .stat {
      background: rgba(9, 12, 30, .78);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      text-align: center;
      padding: 7px 6px;
    }

    .stat .label {
      font-size: .62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;

    .stat .value {

    .value.combo { color: #ff9fda; }
    .value.life { color: #ff87aa; }
    .value.best { color: #92ecff; }

    .levels {
      padding: 10px;
    }

    .levels .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: .76rem;
      color: var(--muted);
      letter-spacing: .04em;

    .level-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));

    }

    .level-btn {
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      color: #dfe7ff;
      padding: 8px 6px;
      text-align: left;
      min-height: 62px;

      font-weight: 700;

    }

    .level-btn small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: .64rem;
      font-weight: 600;
    }

    .level-btn.active {
      border-color: rgba(55, 255, 199, .8);
      box-shadow: inset 0 0 15px rgba(55, 255, 199, .12), 0 0 12px rgba(55, 255, 199, .2);
      color: #b8ffe9;
    }

    .canvas-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid rgba(255, 209, 102, .28);
      box-shadow: 0 0 26px rgba(0,0,0,.45), inset 0 0 28px rgba(255, 105, 180, .08);
      background: #070711;
      touch-action: none;
    }

    canvas {
      width: 100%;
      display: block;
      aspect-ratio: 9 / 16;

      background: transparent;
      user-select: none;

    }

    .overlay {
      position: absolute;
      left: 8px;
      right: 8px;

    .btn {

      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.015));
      color: #e3e9ff;

      color: #b8ffe9;

    .tips {

    }

    @media (max-width: 620px) {
      .app { padding: 10px; gap: 8px; }
      .hud { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .controls .btn:last-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel title">
      <div>
        <h1>Tempo Tower — 리듬 빌딩 타워</h1>
        <div class="pitch">"리듬에 맞춰 블록을 쌓아 하늘 끝까지 올라가라"</div>
      </div>
      <div class="badge">NEON RHYTHM</div>
    </section>

    <section class="panel hud">
      <div class="stat"><div class="label">레벨</div><div class="value" id="statLevel">1 / 8</div></div>
      <div class="stat"><div class="label">BPM</div><div class="value" id="statBpm">60</div></div>
      <div class="stat"><div class="label">높이</div><div class="value" id="statHeight">0 / 12</div></div>
      <div class="stat"><div class="label">콤보</div><div class="value combo" id="statCombo">0</div></div>
      <div class="stat"><div class="label">라이프</div><div class="value life" id="statLife">❤❤❤</div></div>
      <div class="stat"><div class="label">베스트</div><div class="value best" id="statBest">0 / 0</div></div>
    </section>

    <section class="panel levels">
      <div class="head">
        <span>8개 레벨 · BPM 60 → 180</span>
        <span id="levelTargetMeta">목표 높이 12</span>
      </div>
      <div class="level-grid" id="levelGrid"></div>
    </section>

    <section class="canvas-wrap">
      <canvas id="gameCanvas" width="420" height="760" aria-label="Tempo Tower 게임 캔버스"></canvas>
      <div class="overlay" id="overlayText">탭 또는 Space로 시작하세요</div>
    </section>

    <section class="panel controls">
      <button class="btn primary" id="btnStart">시작 / 일시재개</button>
      <button class="btn" id="btnRestart">레벨 재시작</button>
      <button class="btn warn" id="btnNext">다음 레벨</button>
    </section>

    <div class="tips">
      조작: <b>터치 탭</b> 또는 <b>Space</b> · Perfect(정중앙)면 콤보 유지 · 5콤보마다 블록 확장 보너스
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      const ui = {
        level: document.getElementById('statLevel'),
        bpm: document.getElementById('statBpm'),
        height: document.getElementById('statHeight'),
        combo: document.getElementById('statCombo'),
        life: document.getElementById('statLife'),
        best: document.getElementById('statBest'),
        targetMeta: document.getElementById('levelTargetMeta'),
        overlay: document.getElementById('overlayText'),
        levelGrid: document.getElementById('levelGrid')
      };

      const LEVELS = [
        { name: '입문 비트', bpmMin: 60, bpmMax: 80, target: 12 },
        { name: '웨이브', bpmMin: 72, bpmMax: 95, target: 16 },
        { name: '네온 펄스', bpmMin: 84, bpmMax: 110, target: 20 },
        { name: '업시프트', bpmMin: 96, bpmMax: 125, target: 24 },
        { name: '하이 텐션', bpmMin: 108, bpmMax: 140, target: 28 },
        { name: '오버클럭', bpmMin: 126, bpmMax: 156, target: 32 },
        { name: '하이퍼 비트', bpmMin: 145, bpmMax: 170, target: 36 },
        { name: '템포 한계', bpmMin: 165, bpmMax: 180, target: 42 }
      ];

      const WORLD_W = 420;
      const WORLD_H = 760;
      const BASE_Y = 665;
      const BLOCK_H = 28;
      const BASE_WIDTH = 212;
      const MAX_WIDTH = 290;
      const MOVE_RANGE = 152;
      const PERFECT_WINDOW = 7;
      const MIN_OVERLAP = 18;
      const STORAGE_KEY = 'tempo_tower_records_v1';

      const state = {
        phase: 'ready',
        levelIndex: 0,
        lives: 3,
        combo: 0,
        bestComboRun: 0,
        height: 0,
        stack: [],
        active: null,
        falling: [],
        particles: [],
        bursts: [],
        stars: [],
        clouds: [],
        cameraY: 0,
        currentBpm: 60,
        beatTimer: 0,
        beatCount: 0,
        beatPulse: 0,
        status: '탭 또는 Space로 시작하세요',
        lastJudge: '',
        judgeTimer: 0,
        records: loadRecords(),
        audioCtx: null
      };

      function loadRecords() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch {
          return {};
        }
      }

      function saveRecords() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.records));
        } catch {
          // ignore persistence errors
        }
      }

      function getRecord(levelNumber) {
        return state.records[levelNumber] || { bestHeight: 0, bestCombo: 0 };
      }

      function updateRecord() {
        const levelNumber = state.levelIndex + 1;
        const rec = getRecord(levelNumber);
        const next = {
          bestHeight: Math.max(rec.bestHeight || 0, state.height),
          bestCombo: Math.max(rec.bestCombo || 0, state.bestComboRun)
        };
        state.records[levelNumber] = next;
        saveRecords();
      }

      function buildLevelButtons() {
        ui.levelGrid.innerHTML = '';
        LEVELS.forEach((lv, idx) => {
          const btn = document.createElement('button');
          btn.className = 'level-btn';
          btn.innerHTML = `Lv.${idx + 1} ${lv.name}<small>${lv.bpmMin}-${lv.bpmMax} BPM · 목표 ${lv.target}</small>`;
          btn.addEventListener('click', () => {
            if (state.phase === 'playing') return;
            state.levelIndex = idx;
            resetLevel();
            refreshUI();
            refreshLevelButtons();
          });
          ui.levelGrid.appendChild(btn);
        });
        refreshLevelButtons();
      }

      function refreshLevelButtons() {
        [...ui.levelGrid.children].forEach((el, i) => {
          el.classList.toggle('active', i === state.levelIndex);
        });
      }

      function createSky() {
        state.stars = Array.from({ length: 92 }, () => ({
          x: Math.random() * WORLD_W,
          y: Math.random() * 2600,
          r: Math.random() * 1.8 + 0.4,
          tw: Math.random() * Math.PI * 2,
          spd: 0.2 + Math.random() * 0.8
        }));

        state.clouds = Array.from({ length: 12 }, () => ({
          x: Math.random() * (WORLD_W + 120) - 60,
          y: Math.random() * 2200,
          w: 60 + Math.random() * 80,
          h: 20 + Math.random() * 20,
          a: 0.06 + Math.random() * 0.08,
          drift: (Math.random() - 0.5) * 8
        }));
      }

      function resetLevel() {
        const level = LEVELS[state.levelIndex];
        state.phase = 'ready';
        state.lives = 3;
        state.combo = 0;
        state.bestComboRun = 0;
        state.height = 0;
        state.stack = [{ x: 0, y: BASE_Y, width: BASE_WIDTH, h: 0 }];
        state.active = null;
        state.falling = [];
        state.particles = [];
        state.bursts = [];
        state.cameraY = 0;
        state.currentBpm = level.bpmMin;
        state.beatTimer = 0;
        state.beatCount = 0;
        state.beatPulse = 0;
        state.lastJudge = '';
        state.judgeTimer = 0;
        state.status = '탭 또는 Space로 시작하세요';
        spawnActive(BASE_WIDTH, true);
      }

      function startPlay() {
        if (state.phase === 'playing') return;
        if (state.phase === 'clear' || state.phase === 'gameover') return;
        state.phase = 'playing';
        state.status = '리듬에 맞춰 탭!';
        ensureAudio();
        if (state.audioCtx && state.audioCtx.state === 'suspended') {
          state.audioCtx.resume().catch(() => {});
        }
      }

      function ensureAudio() {
        if (!state.audioCtx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) state.audioCtx = new AC();
        }
      }

      function playClick(accent = false) {
        if (!state.audioCtx) return;
        const t = state.audioCtx.currentTime;
        const osc = state.audioCtx.createOscillator();
        const gain = state.audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(accent ? 1450 : 1080, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(accent ? 0.14 : 0.09, t + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.085);
        osc.connect(gain).connect(state.audioCtx.destination);
        osc.start(t);
        osc.stop(t + 0.09);
      }

      function playJudgeTone(type) {
        if (!state.audioCtx) return;
        const t = state.audioCtx.currentTime;
        const osc = state.audioCtx.createOscillator();
        const gain = state.audioCtx.createGain();
        osc.type = type === 'miss' ? 'sawtooth' : 'sine';
        const f = type === 'perfect' ? 980 : type === 'good' ? 720 : 220;
        osc.frequency.setValueAtTime(f, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(type === 'miss' ? 0.1 : 0.12, t + 0.006);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + (type === 'miss' ? 0.16 : 0.11));
        osc.connect(gain).connect(state.audioCtx.destination);
        osc.start(t);
        osc.stop(t + (type === 'miss' ? 0.17 : 0.12));
      }

      function spawnActive(width, fromStart = false) {
        const top = state.stack[state.stack.length - 1];
        const dir = fromStart ? 1 : (Math.random() > 0.5 ? 1 : -1);
        state.active = {
          x: fromStart ? -MOVE_RANGE * 0.85 : (dir > 0 ? -MOVE_RANGE : MOVE_RANGE),
          y: top.y - BLOCK_H,
          width,
          dir,
          speed: bpmToSpeed(state.currentBpm),
          h: state.height + 1,
          wobble: Math.random() * Math.PI * 2
        };
      }

      function bpmToSpeed(bpm) {
        return 62 + (bpm - 60) * 1.25;
      }

      function levelProgress() {
        const lv = LEVELS[state.levelIndex];
        return Math.min(1, state.height / Math.max(1, lv.target));
      }

      function computeBpm() {
        const lv = LEVELS[state.levelIndex];
        const t = levelProgress();
        return lv.bpmMin + (lv.bpmMax - lv.bpmMin) * t;
      }

      function actionInput() {
        if (state.phase === 'ready') {
          startPlay();
          return;
        }
        if (state.phase === 'playing') {
          placeBlock();
          return;
        }
        if (state.phase === 'clear') {
          gotoNextLevel();
          return;
        }
        if (state.phase === 'gameover') {
          resetLevel();
          refreshUI();
          return;
        }
      }

      function placeBlock() {
        if (!state.active) return;

        const prev = state.stack[state.stack.length - 1];
        const cur = state.active;

        const prevL = prev.x - prev.width / 2;
        const prevR = prev.x + prev.width / 2;
        const curL = cur.x - cur.width / 2;
        const curR = cur.x + cur.width / 2;

        const ovL = Math.max(prevL, curL);
        const ovR = Math.min(prevR, curR);
        const overlap = ovR - ovL;
        const absOffset = Math.abs(cur.x - prev.x);

        ensureAudio();

        if (absOffset <= PERFECT_WINDOW) {
          state.combo += 1;
          state.bestComboRun = Math.max(state.bestComboRun, state.combo);

          const bonus = state.combo > 0 && state.combo % 5 === 0;
          const nextWidth = bonus ? Math.min(prev.width + 22, MAX_WIDTH) : prev.width;

          cur.x = prev.x;
          cur.width = prev.width;
          settleBlock('perfect', nextWidth, bonus);
          spawnPerfectFx(cur.x, cur.y);
          playJudgeTone('perfect');
          return;
        }

        if (overlap >= MIN_OVERLAP) {
          const newCenter = (ovL + ovR) / 2;
          const newWidth = overlap;

          if (curL < ovL) createCutPiece((curL + ovL) / 2, cur.y, ovL - curL, -58);
          if (curR > ovR) createCutPiece((ovR + curR) / 2, cur.y, curR - ovR, 58);

          state.combo = 0;
          cur.x = newCenter;
          cur.width = newWidth;
          settleBlock('good', newWidth, false);
          playJudgeTone('good');
          return;
        }

        state.combo = 0;
        state.lives -= 1;
        createFall(cur.x, cur.y, cur.width, BLOCK_H, (Math.random() > 0.5 ? 1 : -1) * 120, -60, 0.95, true);
        state.active = null;
        state.lastJudge = 'MISS! 라이프 -1';
        state.judgeTimer = 0.8;
        state.status = 'MISS! 중심선에 더 가깝게 맞추세요';
        playJudgeTone('miss');

        if (state.lives <= 0) {
          state.phase = 'gameover';
          updateRecord();
          state.status = '게임 오버 · 탭/Space 또는 재시작 버튼으로 재도전';
          return;
        }

        const top = state.stack[state.stack.length - 1];
        spawnActive(top.width, false);
      }

      function settleBlock(result, nextWidth, bonus) {
        const cur = state.active;
        state.stack.push({
          x: cur.x,
          y: cur.y,
          width: cur.width,
          h: state.height + 1
        });
        state.height += 1;
        state.active = null;

        const lv = LEVELS[state.levelIndex];

        if (result === 'perfect') {
          state.lastJudge = bonus ? 'PERFECT! 5콤보 달성 · 블록 확장!' : 'PERFECT!';
          state.status = bonus ? '리듬 폭주! 다음 블록 폭 증가' : '완벽 정렬! 콤보를 이어가세요';
        } else {
          state.lastJudge = 'GOOD';
          state.status = '좋아요! 중심에 맞추면 Perfect';
        }

        state.judgeTimer = 0.64;
        updateRecord();

        if (state.height >= lv.target) {
          state.phase = 'clear';
          state.status = state.levelIndex === LEVELS.length - 1
            ? '최종 클리어! Tempo Tower 정복 완료'
            : '레벨 클리어! 다음 레벨로 이동하세요';
          return;
        }

        spawnActive(nextWidth, false);
      }

      function gotoNextLevel() {
        if (state.phase !== 'clear') return;
        state.levelIndex = (state.levelIndex + 1) % LEVELS.length;
        resetLevel();
        refreshLevelButtons();
        refreshUI();
      }

      function createCutPiece(x, y, width, vx) {
        if (width <= 1) return;
        createFall(x, y, width, BLOCK_H, vx, -40, 0.88, false);
      }

      function createFall(x, y, width, height, vx, vy, alpha, danger) {
        state.falling.push({
          x, y, width, height,
          vx,
          vy,
          rot: (Math.random() - 0.5) * 1.5,
          vr: (Math.random() - 0.5) * 3.5,
          alpha,
          life: 2.3,
          h: Math.max(1, state.height),
          danger
        });
      }

      function spawnPerfectFx(x, y) {
        state.bursts.push({ x, y, r: 6, life: 0.6 });
        for (let i = 0; i < 14; i++) {
          const ang = (Math.PI * 2 * i) / 14 + Math.random() * 0.25;
          const sp = 70 + Math.random() * 90;
          state.particles.push({
            x,
            y: y + BLOCK_H * 0.5,
            vx: Math.cos(ang) * sp,
            vy: Math.sin(ang) * sp - 20,
            life: 0.7 + Math.random() * 0.35,
            size: 2 + Math.random() * 2.8,
            color: Math.random() > 0.35 ? '#ffd166' : '#fff3c2'
          });
        }
      }

      function update(dt) {
        if (state.phase === 'playing' && state.active) {
          state.currentBpm = computeBpm();
          state.active.speed = bpmToSpeed(state.currentBpm);
          state.active.x += state.active.dir * state.active.speed * dt;

          if (state.active.x > MOVE_RANGE) {
            state.active.x = MOVE_RANGE;
            state.active.dir *= -1;
          } else if (state.active.x < -MOVE_RANGE) {
            state.active.x = -MOVE_RANGE;
            state.active.dir *= -1;
          }

          state.beatTimer += dt;
          const beatInterval = 60 / Math.max(1, state.currentBpm);
          while (state.beatTimer >= beatInterval) {
            state.beatTimer -= beatInterval;
            state.beatCount += 1;
            state.beatPulse = 1;
            playClick(state.beatCount % 4 === 1);
          }
        } else {
          state.currentBpm = computeBpm();
        }

        if (state.judgeTimer > 0) state.judgeTimer = Math.max(0, state.judgeTimer - dt);
        state.beatPulse = Math.max(0, state.beatPulse - dt * 2.7);

        state.falling = state.falling.filter(p => {
          p.vy += 520 * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.rot += p.vr * dt;
          p.life -= dt;
          return p.life > 0 && p.y - state.cameraY < WORLD_H + 120;
        });

        state.particles = state.particles.filter(p => {
          p.vy += 260 * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= dt;
          return p.life > 0;
        });

        state.bursts = state.bursts.filter(b => {
          b.r += 170 * dt;
          b.life -= dt;
          return b.life > 0;
        });

        const targetCamera = Math.max(0, (BASE_Y - 320) - state.height * BLOCK_H);
        state.cameraY += (targetCamera - state.cameraY) * Math.min(1, dt * 6.2);
      }

      function colorForHeight(h) {
        const hue = (188 + (h * 9)) % 360;
        return {
          a: `hsl(${hue} 92% 64%)`,
          b: `hsl(${(hue + 36) % 360} 95% 48%)`
        };
      }

      function drawBackground(timeSec) {
        const pulse = state.beatPulse;
        const g = ctx.createLinearGradient(0, 0, 0, WORLD_H);
        g.addColorStop(0, `rgba(${18 + pulse * 20}, ${16 + pulse * 12}, 46, 1)`);
        g.addColorStop(0.55, 'rgba(11, 10, 28, 1)');
        g.addColorStop(1, 'rgba(7, 7, 18, 1)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);

        for (const s of state.stars) {
          const y = ((s.y - state.cameraY * (0.24 + s.spd * 0.08)) % 2400 + 2400) % 2400;
          const drawY = (y / 2400) * (WORLD_H + 120) - 60;
          const tw = 0.42 + 0.58 * Math.sin(timeSec * (1.8 + s.spd) + s.tw);
          ctx.fillStyle = `rgba(180, 220, 255, ${0.14 + tw * 0.58})`;
          ctx.beginPath();
          ctx.arc(s.x, drawY, s.r * (0.7 + tw * 0.6), 0, Math.PI * 2);
          ctx.fill();
        }

        for (const c of state.clouds) {
          const y = ((c.y - state.cameraY * 0.13) % 2400 + 2400) % 2400;
          const drawY = (y / 2400) * (WORLD_H + 180) - 90;
          const driftX = c.x + Math.sin(timeSec * 0.08 + c.y * 0.01) * c.drift;
          ctx.fillStyle = `rgba(170, 195, 255, ${c.a})`;
          ctx.beginPath();
          ctx.ellipse(driftX, drawY, c.w, c.h, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        const laneX = WORLD_W / 2;
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.08 + pulse * 0.16})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 8]);
        ctx.beginPath();
        ctx.moveTo(laneX, 0);
        ctx.lineTo(laneX, WORLD_H);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawBlock(block, glow = false) {
        const x = WORLD_W / 2 + block.x - block.width / 2;
        const y = block.y - state.cameraY;
        if (y < -60 || y > WORLD_H + 60) return;

        const col = colorForHeight(block.h || 0);
        const grad = ctx.createLinearGradient(x, y, x, y + BLOCK_H);
        grad.addColorStop(0, col.a);
        grad.addColorStop(1, col.b);

        if (glow) {
          ctx.shadowColor = 'rgba(255, 215, 120, 0.9)';
          ctx.shadowBlur = 16;
        }

        ctx.fillStyle = grad;
        roundRect(ctx, x, y, block.width, BLOCK_H, 6, true, false);
        ctx.shadowBlur = 0;

        ctx.strokeStyle = 'rgba(255,255,255,.22)';
        ctx.lineWidth = 1;
        roundRect(ctx, x + 0.5, y + 0.5, block.width - 1, BLOCK_H - 1, 6, false, true);
      }

      function draw() {
        const now = performance.now() / 1000;
        drawBackground(now);

        for (const b of state.stack) drawBlock(b, false);

        if (state.active) {
          const pulseGlow = 0.18 + state.beatPulse * 0.35;
          ctx.save();
          ctx.shadowColor = `rgba(83, 255, 213, ${pulseGlow})`;
          ctx.shadowBlur = 18 + state.beatPulse * 20;
          drawBlock(state.active, true);
          ctx.restore();
        }

        for (const p of state.falling) {
          const x = WORLD_W / 2 + p.x - p.width / 2;
          const y = p.y - state.cameraY;
          ctx.save();
          ctx.translate(x + p.width / 2, y + p.height / 2);
          ctx.rotate(p.rot);
          const c = colorForHeight(p.h || 0);
          const g = ctx.createLinearGradient(-p.width / 2, -p.height / 2, -p.width / 2, p.height / 2);
          g.addColorStop(0, c.a);
          g.addColorStop(1, c.b);
          ctx.globalAlpha = Math.max(0, Math.min(1, p.alpha * (p.life / 2.3)));
          ctx.fillStyle = g;
          roundRect(ctx, -p.width / 2, -p.height / 2, p.width, p.height, 5, true, false);
          if (p.danger) {
            ctx.strokeStyle = 'rgba(255,95,145,.65)';
            ctx.lineWidth = 1;
            roundRect(ctx, -p.width / 2, -p.height / 2, p.width, p.height, 5, false, true);
          }
          ctx.restore();
        }

        for (const b of state.bursts) {
          const x = WORLD_W / 2 + b.x;
          const y = b.y - state.cameraY + BLOCK_H / 2;
          ctx.strokeStyle = `rgba(255, 210, 120, ${Math.max(0, b.life / 0.6)})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(x, y, b.r, 0, Math.PI * 2);
          ctx.stroke();
        }

        for (const p of state.particles) {
          const y = p.y - state.cameraY;
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(WORLD_W / 2 + p.x, y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        drawTopInfoOverlay();
      }

      function drawTopInfoOverlay() {
        const lv = LEVELS[state.levelIndex];
        const progress = lv.target > 0 ? state.height / lv.target : 0;
        const w = WORLD_W - 36;
        const x = 18;
        const y = 16;

        ctx.fillStyle = 'rgba(0,0,0,.35)';
        roundRect(ctx, x - 8, y - 8, w + 16, 54, 10, true, false);

        ctx.fillStyle = 'rgba(255,255,255,.2)';
        roundRect(ctx, x, y + 24, w, 10, 6, true, false);
        ctx.fillStyle = 'rgba(55,255,199,.85)';
        roundRect(ctx, x, y + 24, Math.max(0, Math.min(w, w * progress)), 10, 6, true, false);

        ctx.fillStyle = '#f5f8ff';
        ctx.font = '700 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
        ctx.fillText(`목표 높이 ${state.height}/${lv.target}`, x, y + 12);

        if (state.judgeTimer > 0 && state.lastJudge) {
          const alpha = Math.min(1, state.judgeTimer / 0.64);
          ctx.fillStyle = state.lastJudge.includes('PERFECT')
            ? `rgba(255, 209, 102, ${alpha})`
            : state.lastJudge.includes('MISS')
              ? `rgba(255, 95, 145, ${alpha})`
              : `rgba(142, 230, 255, ${alpha})`;
          ctx.font = '800 20px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
          const txt = state.lastJudge;
          const tw = ctx.measureText(txt).width;
          ctx.fillText(txt, (WORLD_W - tw) / 2, y + 70);
        }
      }

      function roundRect(context, x, y, w, h, r, fill, stroke) {
        const rr = Math.min(r, w / 2, h / 2);
        context.beginPath();
        context.moveTo(x + rr, y);
        context.arcTo(x + w, y, x + w, y + h, rr);
        context.arcTo(x + w, y + h, x, y + h, rr);
        context.arcTo(x, y + h, x, y, rr);
        context.arcTo(x, y, x + w, y, rr);
        context.closePath();
        if (fill) context.fill();
        if (stroke) context.stroke();
      }

      function refreshUI() {
        const lv = LEVELS[state.levelIndex];
        const rec = getRecord(state.levelIndex + 1);

        ui.level.textContent = `${state.levelIndex + 1} / ${LEVELS.length}`;
        ui.bpm.textContent = Math.round(state.currentBpm).toString();
        ui.height.textContent = `${state.height} / ${lv.target}`;
        ui.combo.textContent = String(state.combo);
        ui.life.textContent = '❤'.repeat(Math.max(0, state.lives)) + '·'.repeat(Math.max(0, 3 - state.lives));
        ui.best.textContent = `${rec.bestHeight || 0} / ${rec.bestCombo || 0}`;
        ui.targetMeta.textContent = `목표 높이 ${lv.target} · ${lv.bpmMin}-${lv.bpmMax} BPM`;

        if (state.phase === 'ready') {
          ui.overlay.textContent = '탭 또는 Space로 시작하세요';
        } else if (state.phase === 'playing') {
          ui.overlay.textContent = state.status;
        } else if (state.phase === 'clear') {
          ui.overlay.textContent = state.status;
        } else if (state.phase === 'gameover') {
          ui.overlay.textContent = state.status;
        }
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      document.getElementById('btnStart').addEventListener('click', () => {
        if (state.phase === 'ready') startPlay();
        else if (state.phase === 'gameover') { resetLevel(); }
        else if (state.phase === 'clear') gotoNextLevel();
      });

      document.getElementById('btnRestart').addEventListener('click', () => {
        resetLevel();
      });

      document.getElementById('btnNext').addEventListener('click', () => {
        if (state.phase === 'clear') gotoNextLevel();
        else {
          state.levelIndex = (state.levelIndex + 1) % LEVELS.length;
          resetLevel();
          refreshLevelButtons();
        }
      });

      canvas.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        actionInput();
      }, { passive: false });

      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
          e.preventDefault();
          actionInput();
        }
      }, { passive: false });

      window.addEventListener('resize', resizeCanvas);

      let last = performance.now();
      function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        refreshUI();
        requestAnimationFrame(loop);
      }

      createSky();
      buildLevelButtons();
      resetLevel();
      resizeCanvas();
      refreshUI();
      requestAnimationFrame(loop);
    })();
  </script>
