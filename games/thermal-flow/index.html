<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Thermal Flow — 열전도 퍼즐</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: rgba(13, 17, 40, 0.92);
      --line: rgba(0, 245, 255, 0.3);
      --text: #eaf0ff;
      --muted: #98a4cc;
      --cyan: #00f5ff;
      --pink: #ff59d4;
      --lime: #68ff9e;
      --gold: #ffd973;
      --blue: #75b5ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at 20% -10%, #1c1e50 0%, #121741 36%, #0b0d22 70%, #080914 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    .app {
      width: min(980px, 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.16);
    }

    .title {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.08rem, 4.8vw, 1.5rem);
      letter-spacing: 0.02em;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0, 245, 255, 0.4);
    }

    .pitch {
      margin-top: 4px;
      font-size: 0.84rem;
      color: #d2e8ff;
    }

    .mini {
      text-align: right;
      font-size: 0.76rem;
      color: #b7c5f6;
      line-height: 1.42;
    }

    .hud {
      padding: 0 10px 10px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      min-height: 56px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(8, 11, 29, 0.84);
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .k {
      color: var(--muted);
      font-size: 0.63rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .v { font-weight: 700; font-size: 0.94rem; }
    .cyan { color: var(--cyan); text-shadow: 0 0 8px rgba(0, 245, 255, 0.34); }
    .pink { color: var(--pink); text-shadow: 0 0 8px rgba(255, 89, 212, 0.34); }
    .lime { color: var(--lime); text-shadow: 0 0 8px rgba(104, 255, 158, 0.34); }
    .gold { color: var(--gold); text-shadow: 0 0 8px rgba(255, 217, 115, 0.34); }
    .blue { color: var(--blue); text-shadow: 0 0 8px rgba(117, 181, 255, 0.34); }

    .levels {
      padding: 0 10px 10px;
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 6px;
    }

    .lv {
      min-height: 36px;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      color: #dce5ff;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .lv.active {
      border-color: rgba(0, 245, 255, 0.75);
      color: #b9fcff;
      background: rgba(0, 245, 255, 0.13);
      box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
    }

    .lv.done {
      border-color: rgba(104, 255, 158, 0.72);
      color: #d2ffe2;
      background: rgba(104, 255, 158, 0.13);
    }

    .lv.lock {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .canvas-wrap {
      margin: 0 10px 10px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #070712;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 40px rgba(0, 245, 255, 0.08), 0 0 16px rgba(0, 245, 255, 0.16);
    }

    canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      background: linear-gradient(180deg, rgba(8, 10, 28, 0.9), rgba(6, 8, 16, 0.95));
    }

    .floating {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.54);
      padding: 6px 10px;
      font-size: 0.74rem;
      color: #dce5ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .toolbar, .actions {
      display: grid;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .toolbar { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .actions { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .ctrl {
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(0, 245, 255, 0.36);
      background: rgba(0, 245, 255, 0.1);
      color: #d7faff;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .ctrl.alt {
      border-color: rgba(255, 217, 115, 0.5);
      background: rgba(255, 217, 115, 0.16);
      color: #ffe7ae;
    }

    .ctrl.warn {
      border-color: rgba(255, 89, 212, 0.5);
      background: rgba(255, 89, 212, 0.16);
      color: #ffd8f7;
    }

    .ctrl.good {
      border-color: rgba(104, 255, 158, 0.55);
      background: rgba(104, 255, 158, 0.18);
      color: #d9ffea;
    }

    .ctrl.active {
      border-color: rgba(104, 255, 158, 0.8);
      background: rgba(104, 255, 158, 0.24);
      color: #e5fff0;
      box-shadow: 0 0 10px rgba(104, 255, 158, 0.26);
    }

    .ctrl:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .legend {
      margin: 0 10px 10px;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(8, 11, 27, 0.74);
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 6px;
      font-size: 0.71rem;
      color: #d5dfff;
    }

    .it {
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px;
      text-align: center;
      line-height: 1.34;
    }

    .status {
      min-height: 24px;
      padding: 0 12px 12px;
      font-size: 0.84rem;
      color: #d4dcff;
    }

    .status.ok { color: var(--lime); }
    .status.warn { color: #ff9fd8; }

    @media (max-width: 760px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .levels { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .legend { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <header class="title">
        <div>
          <h1>Thermal Flow — 열전도 퍼즐</h1>
          <div class="pitch">열원을 배치하고 단열재를 깔아 목표 온도를 맞추는 열역학 퍼즐</div>
        </div>
        <div class="mini">
          L1-3: 단일 열원 · 도체<br/>
          L4-6: 냉각기 · 정밀 온도<br/>
          L7-10: 단방향 · 열 싱크 · 시간 제한
        </div>
      </header>

      <div class="hud">
        <div class="stat"><div class="k">레벨</div><div id="levelStat" class="v cyan">1 / 10</div></div>
        <div class="stat"><div class="k">목표 범위</div><div id="targetStat" class="v gold">+0.0°C ~ +0.0°C</div></div>
        <div class="stat"><div class="k">현재 목표온도</div><div id="currentStat" class="v blue">+0.0°C</div></div>
        <div class="stat"><div class="k">안정화</div><div id="stableStat" class="v pink">0%</div></div>
        <div class="stat"><div class="k">남은 시간</div><div id="timeStat" class="v lime">∞</div></div>
      </div>

      <div id="levels" class="levels"></div>

      <div class="canvas-wrap">
        <canvas id="board" width="900" height="900" aria-label="열전도 퍼즐 보드"></canvas>
        <div id="hint" class="floating">시작하려면 툴을 고르고 셀을 터치하세요.</div>
      </div>

      <div id="toolbar" class="toolbar"></div>

      <div class="actions">
        <button id="playBtn" class="ctrl good">▶ 실행</button>
        <button id="resetBtn" class="ctrl alt">↺ 리셋</button>
        <button id="nextBtn" class="ctrl warn">다음 레벨</button>
      </div>

      <div class="legend">
        <div class="it">🔴/🔵<br/>열원</div>
        <div class="it">🟦<br/>도체</div>
        <div class="it">⬛<br/>단열재</div>
        <div class="it">🎯<br/>목표 셀</div>
        <div class="it">🕳️<br/>열 싱크</div>
        <div class="it">➜<br/>단방향 도체</div>
      </div>

      <div id="status" class="status">도체를 배치해 열 흐름을 만들고 목표 온도 범위를 안정화하세요.</div>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const STORE_KEY = 'thermal-flow-progress-v1';
      const STEP = 0.12;
      const TEMP_MIN = -10;
      const TEMP_MAX = 10;

      const TOOL_INFO = {
        hot: { label: '🔴 열원', short: '열원', cls: '' },
        cold: { label: '🔵 냉각기', short: '냉각', cls: '' },
        conductor: { label: '🟦 도체', short: '도체', cls: 'alt' },
        insulator: { label: '⬛ 단열재', short: '단열', cls: 'warn' },
        erase: { label: '🧽 지우개', short: '지우개', cls: 'good' }
      };

      const LEVELS = [
        {
          id: 1,
          name: '기초 열원',
          map: [
            '.....',
            '..T..',
            '.....',
            '.....',
            '.....'
          ],
          inventory: { hot: 1, cold: 0, conductor: 6, insulator: 0 },
          range: [2.0, 3.5],
          stableSeconds: 1.6,
          hint: '열원 1개와 도체로 목표 온도를 +2.0 ~ +3.5°C에 맞추세요.'
        },
        {
          id: 2,
          name: '우회 전도',
          map: [
            '......',
            '.####.',
            '.T..#.',
            '.#..#.',
            '.#....',
            '......'
          ],
          inventory: { hot: 1, cold: 0, conductor: 8, insulator: 0 },
          range: [2.8, 4.4],
          stableSeconds: 1.7,
          hint: '벽을 피해 도체 라인을 만들어 목표를 가열하세요.'
        },
        {
          id: 3,
          name: '과열 억제',
          map: [
            '..#...',
            '..#T..',
            '..#...',
            '......',
            '...#..',
            '......'
          ],
          inventory: { hot: 1, cold: 0, conductor: 9, insulator: 2 },
          range: [1.6, 2.8],
          stableSeconds: 1.8,
          hint: '도체로 열을 보내고 단열재로 과열 구간을 차단하세요.'
        },
        {
          id: 4,
          name: '정밀 혼합 I',
          map: [
            '......',
            '..T...',
            '.####.',
            '......',
            '...#..',
            '......'
          ],
          inventory: { hot: 1, cold: 1, conductor: 8, insulator: 3 },
          range: [0.8, 1.6],
          stableSeconds: 1.9,
          hint: '열원과 냉각기를 함께 써서 정밀한 온도를 만드세요.'
        },
        {
          id: 5,
          name: '정밀 혼합 II',
          map: [
            '.......',
            '.#####.',
            '.T...#.',
            '.#.#.#.',
            '.#...#.',
            '.#####.',
            '.......'
          ],
          inventory: { hot: 1, cold: 1, conductor: 10, insulator: 4 },
          range: [0.0, 0.8],
          stableSeconds: 2.0,
          hint: '좁은 통로에서 열/냉을 섞어 0°C 근처를 유지하세요.'
        },
        {
          id: 6,
          name: '정밀 혼합 III',
          map: [
            '..#....',
            '..#T...',
            '..###..',
            '.......',
            '.###...',
            '...#...',
            '.......'
          ],
          inventory: { hot: 1, cold: 1, conductor: 11, insulator: 4 },
          range: [1.2, 1.9],
          stableSeconds: 2.0,
          hint: '도체 분기와 단열 벽으로 목표 온도 변동폭을 줄이세요.'
        },
        {
          id: 7,
          name: '단방향 도체 I',
          map: [
            '.......',
            '.>...S.',
            '.###.#.',
            '.T...#.',
            '.#.^.#.',
            '.#...#.',
            '.......'
          ],
          inventory: { hot: 1, cold: 1, conductor: 10, insulator: 5 },
          range: [0.6, 1.3],
          stableSeconds: 2.1,
          hint: '화살표 방향으로만 열이 흐릅니다. 싱크를 피해 경로를 설계하세요.'
        },
        {
          id: 8,
          name: '단방향 도체 II',
          map: [
            '........',
            '.S..>..T',
            '.####.#.',
            '.#....#.',
            '.#.^..#.',
            '.#.##.#.',
            '.#....#.',
            '........'
          ],
          inventory: { hot: 1, cold: 1, conductor: 12, insulator: 5 },
          range: [-0.4, 0.4],
          stableSeconds: 2.2,
          hint: '단방향 도체와 싱크를 고려해 0°C 근방으로 수렴시키세요.'
        },
        {
          id: 9,
          name: '복합 안정화 I',
          map: [
            '....S...',
            '.###.##.',
            '.T..>..T',
            '.#.###..',
            '.#..^#..',
            '.##.#..#',
            '...#....',
            '........'
          ],
          inventory: { hot: 1, cold: 1, conductor: 14, insulator: 6 },
          range: [0.5, 1.2],
          stableSeconds: 2.5,
          timeLimit: 45,
          hint: '두 목표 셀을 동시에 맞춰야 합니다. 45초 내 안정화하세요.'
        },
        {
          id: 10,
          name: '복합 안정화 II',
          map: [
            '.........',
            '.###.###.',
            '.T..S..T.',
            '.#.###.#.',
            '.#..>..#.',
            '.###.###.',
            '.#..^..#.',
            '.#.....#.',
            '.........'
          ],
          inventory: { hot: 1, cold: 1, conductor: 16, insulator: 8 },
          range: [0.2, 0.9],
          stableSeconds: 2.8,
          timeLimit: 60,
          hint: '최종 스테이지: 다중 목표를 시간 내 안정화시키세요.'
        }
      ];

      const DIRS = [
        { key: 'up', dx: 0, dy: -1 },
        { key: 'right', dx: 1, dy: 0 },
        { key: 'down', dx: 0, dy: 1 },
        { key: 'left', dx: -1, dy: 0 }
      ];
      const OPP = { up: 'down', down: 'up', left: 'right', right: 'left' };
      const ARROW_CHAR = { up: '↑', right: '→', down: '↓', left: '←' };
      const ONE_WAY_FROM_TOKEN = { '^': 'up', '>': 'right', 'v': 'down', '<': 'left' };

      const board = document.getElementById('board');
      const ctx = board.getContext('2d');
      const levelStat = document.getElementById('levelStat');
      const targetStat = document.getElementById('targetStat');
      const currentStat = document.getElementById('currentStat');
      const stableStat = document.getElementById('stableStat');
      const timeStat = document.getElementById('timeStat');
      const levelsWrap = document.getElementById('levels');
      const toolbarWrap = document.getElementById('toolbar');
      const hintEl = document.getElementById('hint');
      const statusEl = document.getElementById('status');
      const playBtn = document.getElementById('playBtn');
      const resetBtn = document.getElementById('resetBtn');
      const nextBtn = document.getElementById('nextBtn');

      const audio = { ctx: null, unlocked: false };
      const state = {
        progress: loadProgress(),
        levelIndex: 0,
        running: false,
        failed: false,
        cleared: false,
        selectedTool: 'conductor',
        size: 0,
        cells: [],
        targets: [],
        inventoryBase: null,
        inventoryRemain: null,
        elapsed: 0,
        stable: 0,
        acc: 0,
        pointerDown: false,
        lastPaintKey: ''
      };

      function loadProgress() {
        try {
          const raw = localStorage.getItem(STORE_KEY);
          if (!raw) return { unlocked: 1, cleared: {} };
          const parsed = JSON.parse(raw);
          return {
            unlocked: Math.min(Math.max(Number(parsed.unlocked) || 1, 1), LEVELS.length),
            cleared: parsed.cleared && typeof parsed.cleared === 'object' ? parsed.cleared : {}
          };
        } catch {
          return { unlocked: 1, cleared: {} };
        }
      }

      function saveProgress() {
        localStorage.setItem(STORE_KEY, JSON.stringify(state.progress));
      }

      function ensureAudio() {
        if (!audio.ctx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return;
          audio.ctx = new Ctx();
        }
        if (audio.ctx && audio.ctx.state === 'suspended') {
          audio.ctx.resume();
        }
        audio.unlocked = !!audio.ctx;
      }

      function beep(type) {
        if (!audio.unlocked || !audio.ctx) return;
        const now = audio.ctx.currentTime;
        const osc = audio.ctx.createOscillator();
        const gain = audio.ctx.createGain();
        osc.connect(gain);
        gain.connect(audio.ctx.destination);

        let freq = 420;
        let dur = 0.09;
        let wave = 'triangle';
        if (type === 'place') { freq = 520; dur = 0.08; wave = 'square'; }
        else if (type === 'erase') { freq = 250; dur = 0.07; wave = 'sine'; }
        else if (type === 'toggle') { freq = 350; dur = 0.09; wave = 'triangle'; }
        else if (type === 'fail') { freq = 150; dur = 0.2; wave = 'sawtooth'; }
        else if (type === 'clear') { freq = 720; dur = 0.24; wave = 'triangle'; }

        osc.type = wave;
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.13, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        osc.start(now);
        osc.stop(now + dur + 0.01);
      }

      function fmtTemp(v) {
        const s = v >= 0 ? '+' : '';
        return `${s}${v.toFixed(1)}°C`;
      }

      function getLevel() {
        return LEVELS[state.levelIndex];
      }

      function buildLevelsUI() {
        levelsWrap.innerHTML = '';
        LEVELS.forEach((lv, idx) => {
          const btn = document.createElement('button');
          btn.className = 'lv';
          btn.textContent = String(lv.id);

          const unlocked = idx + 1 <= state.progress.unlocked;
          const done = !!state.progress.cleared[lv.id];
          if (!unlocked) btn.classList.add('lock');
          if (done) btn.classList.add('done');
          if (idx === state.levelIndex) btn.classList.add('active');

          btn.disabled = !unlocked;
          btn.addEventListener('click', () => {
            if (idx + 1 > state.progress.unlocked) return;
            loadLevel(idx);
            beep('toggle');
          });
          levelsWrap.appendChild(btn);
        });
      }

      function buildToolbar() {
        const lv = getLevel();
        const order = ['hot', 'cold', 'conductor', 'insulator', 'erase'];
        toolbarWrap.innerHTML = '';

        order.forEach((key) => {
          if (key !== 'erase' && !(lv.inventory[key] > 0)) return;
          const btn = document.createElement('button');
          const info = TOOL_INFO[key];
          const remain = state.inventoryRemain[key] ?? 0;
          btn.className = `ctrl ${info.cls}`.trim();
          if (key === state.selectedTool) btn.classList.add('active');

          if (key === 'erase') {
            btn.textContent = info.label;
          } else {
            btn.textContent = `${info.label} (${remain})`;
            if (remain <= 0) btn.disabled = true;
          }

          btn.addEventListener('click', () => {
            if (btn.disabled) return;
            state.selectedTool = key;
            buildToolbar();
            setHint(`선택 툴: ${info.short}`);
            beep('toggle');
          });
          toolbarWrap.appendChild(btn);
        });
      }

      function setStatus(msg, mode = '') {
        statusEl.textContent = msg;
        statusEl.className = `status ${mode}`.trim();
      }

      function setHint(msg) {
        hintEl.textContent = msg;
      }

      function parseCell(ch, x, y) {
        if (ch === '#') {
          return { x, y, base: 'wall', placeable: false, dir: null, temp: 0, placed: null };
        }
        if (ch === 'T') {
          return { x, y, base: 'target', placeable: false, dir: null, temp: 0, placed: null };
        }
        if (ch === 'S') {
          return { x, y, base: 'sink', placeable: false, dir: null, temp: 0, placed: null };
        }
        if (ch === 'H') {
          return { x, y, base: 'hot', placeable: false, dir: null, temp: 10, placed: null };
        }
        if (ch === 'C') {
          return { x, y, base: 'cold', placeable: false, dir: null, temp: -10, placed: null };
        }
        if (ONE_WAY_FROM_TOKEN[ch]) {
          return { x, y, base: 'oneway', placeable: false, dir: ONE_WAY_FROM_TOKEN[ch], temp: 0, placed: null };
        }
        return { x, y, base: 'empty', placeable: true, dir: null, temp: 0, placed: null };
      }

      function loadLevel(index) {
        state.levelIndex = index;
        state.running = false;
        state.failed = false;
        state.cleared = false;
        state.elapsed = 0;
        state.stable = 0;
        state.acc = 0;
        state.pointerDown = false;
        state.lastPaintKey = '';

        const lv = getLevel();
        state.size = lv.map.length;
        state.inventoryBase = { ...lv.inventory };
        state.inventoryRemain = { ...lv.inventory };
        state.cells = [];
        state.targets = [];

        for (let y = 0; y < state.size; y += 1) {
          for (let x = 0; x < state.size; x += 1) {
            const cell = parseCell(lv.map[y][x], x, y);
            state.cells.push(cell);
            if (cell.base === 'target') state.targets.push(cell);
          }
        }

        if (!(state.selectedTool in lv.inventory) && state.selectedTool !== 'erase') {
          state.selectedTool = lv.inventory.conductor > 0 ? 'conductor' : 'erase';
        }

        setHint(lv.hint);
        setStatus('배치를 완료한 뒤 ▶ 실행 버튼을 눌러 열 확산을 시작하세요.');
        buildLevelsUI();
        buildToolbar();
        updateHUD();
      }

      function resetLevel() {
        const lv = getLevel();
        state.running = false;
        state.failed = false;
        state.cleared = false;
        state.elapsed = 0;
        state.stable = 0;
        state.acc = 0;
        state.inventoryRemain = { ...lv.inventory };

        state.cells.forEach((cell) => {
          cell.placed = null;
          if (cell.base === 'hot') cell.temp = 10;
          else if (cell.base === 'cold') cell.temp = -10;
          else cell.temp = 0;
        });

        buildToolbar();
        updateHUD();
        setHint(lv.hint);
        setStatus('배치를 초기화했습니다. 새 전략으로 다시 시도하세요.');
      }

      function idx(x, y) {
        if (x < 0 || y < 0 || x >= state.size || y >= state.size) return -1;
        return y * state.size + x;
      }

      function getCell(x, y) {
        const i = idx(x, y);
        return i >= 0 ? state.cells[i] : null;
      }

      function effectiveType(cell) {
        if (cell.placed === 'hot') return 'hot';
        if (cell.placed === 'cold') return 'cold';
        if (cell.placed === 'conductor') return 'conductor';
        if (cell.placed === 'insulator') return 'insulator';
        return cell.base;
      }

      function k(type) {
        switch (type) {
          case 'wall': return 0;
          case 'insulator': return 0.02;
          case 'conductor': return 0.75;
          case 'hot':
          case 'cold': return 0.42;
          case 'target': return 0.28;
          case 'sink': return 0.32;
          case 'oneway': return 0.58;
          default: return 0.24;
        }
      }

      function canReceive(cell, incomingDir) {
        if (effectiveType(cell) !== 'oneway') return true;
        return cell.dir === incomingDir;
      }

      function canSend(cell, outgoingDir) {
        if (effectiveType(cell) !== 'oneway') return true;
        return cell.dir === outgoingDir;
      }

      function edgeReceiveCoeff(selfCell, neighborCell, dirSelfToNeighbor) {
        const incoming = OPP[dirSelfToNeighbor];
        if (!canReceive(selfCell, incoming)) return 0;
        if (!canSend(neighborCell, incoming)) return 0;

        const a = effectiveType(selfCell);
        const b = effectiveType(neighborCell);
        if (a === 'wall' || b === 'wall') return 0;

        const ka = k(a);
        const kb = k(b);
        if (ka <= 0 || kb <= 0) return 0;
        return Math.min(ka, kb);
      }

      function simulateStep() {
        const lv = getLevel();
        const next = new Array(state.cells.length);

        for (let y = 0; y < state.size; y += 1) {
          for (let x = 0; x < state.size; x += 1) {
            const cell = getCell(x, y);
            const type = effectiveType(cell);
            const i = idx(x, y);

            if (type === 'hot') {
              next[i] = 10;
              continue;
            }
            if (type === 'cold') {
              next[i] = -10;
              continue;
            }
            if (type === 'wall') {
              next[i] = cell.temp * 0.98;
              continue;
            }
            if (type === 'insulator') {
              next[i] = cell.temp * 0.985;
              continue;
            }

            let sum = cell.temp * 1.2;
            let weight = 1.2;

            for (const d of DIRS) {
              const nb = getCell(x + d.dx, y + d.dy);
              if (!nb) continue;
              const g = edgeReceiveCoeff(cell, nb, d.key);
              if (g <= 0) continue;
              sum += nb.temp * g;
              weight += g;
            }

            let t = sum / weight;
            t += (0 - t) * 0.012;
            if (type === 'sink') {
              t += (0 - t) * 0.24;
            }
            next[i] = Math.max(TEMP_MIN, Math.min(TEMP_MAX, t));
          }
        }

        for (let i = 0; i < state.cells.length; i += 1) {
          state.cells[i].temp = next[i];
        }

        state.elapsed += STEP;

        const [minT, maxT] = lv.range;
        let inRangeCount = 0;
        let sumTarget = 0;
        for (const t of state.targets) {
          const current = getCell(t.x, t.y).temp;
          sumTarget += current;
          if (current >= minT && current <= maxT) inRangeCount += 1;
        }

        const allInRange = inRangeCount === state.targets.length && state.targets.length > 0;
        if (allInRange) {
          state.stable += STEP;
        } else {
          state.stable = 0;
        }

        const needed = lv.stableSeconds || 2;
        if (!state.cleared && state.stable >= needed) {
          onLevelClear();
        }

        if (!state.cleared && lv.timeLimit && state.elapsed >= lv.timeLimit) {
          onLevelFail();
        }

        const avgTarget = state.targets.length ? sumTarget / state.targets.length : 0;
        updateHUD(avgTarget);
      }

      function onLevelClear() {
        state.running = false;
        state.cleared = true;
        const lv = getLevel();

        if (!state.progress.cleared[lv.id]) {
          state.progress.cleared[lv.id] = true;
        }
        const newUnlock = Math.min(LEVELS.length, Math.max(state.progress.unlocked, lv.id + 1));
        state.progress.unlocked = newUnlock;
        saveProgress();
        buildLevelsUI();

        beep('clear');
        setStatus(`✅ 레벨 ${lv.id} 클리어! 목표 온도 안정화 성공.`, 'ok');
        setHint('좋습니다. 다음 레벨에서 더 까다로운 열 흐름을 설계해 보세요.');
      }

      function onLevelFail() {
        if (state.failed) return;
        state.running = false;
        state.failed = true;
        beep('fail');
        setStatus('⏰ 시간 초과! 배치를 조정해 다시 안정화를 시도하세요.', 'warn');
        setHint('리셋 후 열원/냉각기 위치를 바꿔보세요.');
      }

      function updateHUD(avgTarget = null) {
        const lv = getLevel();
        if (avgTarget === null) {
          let sum = 0;
          for (const t of state.targets) sum += getCell(t.x, t.y).temp;
          avgTarget = state.targets.length ? sum / state.targets.length : 0;
        }

        levelStat.textContent = `${lv.id} / ${LEVELS.length}`;
        targetStat.textContent = `${fmtTemp(lv.range[0])} ~ ${fmtTemp(lv.range[1])}`;
        currentStat.textContent = fmtTemp(avgTarget);

        const need = lv.stableSeconds || 2;
        const pct = Math.max(0, Math.min(100, Math.round((state.stable / need) * 100)));
        stableStat.textContent = `${pct}%`;

        if (lv.timeLimit) {
          const left = Math.max(0, lv.timeLimit - state.elapsed);
          timeStat.textContent = `${left.toFixed(1)}s`;
          timeStat.className = `v ${left <= 8 ? 'pink' : 'lime'}`;
        } else {
          timeStat.textContent = '∞';
          timeStat.className = 'v lime';
        }

        playBtn.textContent = state.running ? '⏸ 일시정지' : '▶ 실행';
        nextBtn.disabled = state.levelIndex + 1 >= state.progress.unlocked;
      }

      function useInventory(tool, delta) {
        if (!(tool in state.inventoryRemain)) return true;
        const next = state.inventoryRemain[tool] + delta;
        if (next < 0) return false;
        if (next > state.inventoryBase[tool]) return false;
        state.inventoryRemain[tool] = next;
        return true;
      }

      function removePlaced(cell) {
        if (!cell.placed) return false;
        const old = cell.placed;
        cell.placed = null;
        if (old in state.inventoryRemain) useInventory(old, +1);
        return true;
      }

      function applyTool(cell, tool) {
        if (!cell.placeable || state.cleared || state.failed) return;

        if (tool === 'erase') {
          const changed = removePlaced(cell);
          if (changed) {
            beep('erase');
            buildToolbar();
          }
          return;
        }

        if (!(tool in state.inventoryRemain)) return;

        if (cell.placed === tool) {
          removePlaced(cell);
          beep('erase');
          buildToolbar();
          return;
        }

        if (cell.placed) removePlaced(cell);

        if (!useInventory(tool, -1)) {
          setStatus('남은 수량이 부족합니다. 다른 툴을 사용하세요.', 'warn');
          return;
        }

        cell.placed = tool;
        if (tool === 'hot') cell.temp = 10;
        if (tool === 'cold') cell.temp = -10;
        beep('place');
        buildToolbar();
      }

      function pointerToCell(ev) {
        const rect = board.getBoundingClientRect();
        const scaleX = board.width / rect.width;
        const scaleY = board.height / rect.height;
        const px = (ev.clientX - rect.left) * scaleX;
        const py = (ev.clientY - rect.top) * scaleY;

        const n = state.size;
        const pad = board.width * 0.04;
        const area = board.width - pad * 2;
        const cell = area / n;

        const x = Math.floor((px - pad) / cell);
        const y = Math.floor((py - pad) / cell);
        if (x < 0 || y < 0 || x >= n || y >= n) return null;
        return { x, y, key: `${x},${y}` };
      }

      function handlePaint(ev) {
        const p = pointerToCell(ev);
        if (!p) return;
        if (p.key === state.lastPaintKey) return;
        const cell = getCell(p.x, p.y);
        if (!cell) return;
        state.lastPaintKey = p.key;
        applyTool(cell, state.selectedTool);
      }

      function bindInput() {
        board.addEventListener('pointerdown', (ev) => {
          ensureAudio();
          state.pointerDown = true;
          state.lastPaintKey = '';
          handlePaint(ev);
        });
        board.addEventListener('pointermove', (ev) => {
          if (!state.pointerDown) return;
          if (state.selectedTool === 'hot' || state.selectedTool === 'cold') return;
          handlePaint(ev);
        });
        window.addEventListener('pointerup', () => {
          state.pointerDown = false;
          state.lastPaintKey = '';
        });

        board.addEventListener('contextmenu', (ev) => ev.preventDefault());
      }

      function colorByTemp(temp) {
        const t = Math.max(-10, Math.min(10, temp));
        if (t >= 0) {
          const a = t / 10;
          const r = Math.round(90 + 165 * a);
          const g = Math.round(50 + 90 * (1 - a));
          const b = Math.round(90 + 30 * (1 - a));
          return `rgb(${r},${g},${b})`;
        }
        const a = -t / 10;
        const r = Math.round(60 + 40 * (1 - a));
        const g = Math.round(90 + 110 * (1 - a));
        const b = Math.round(140 + 100 * a);
        return `rgb(${r},${g},${b})`;
      }

      function drawArrow(cx, cy, size, dir) {
        ctx.save();
        ctx.translate(cx, cy);
        const rot = { up: -Math.PI / 2, right: 0, down: Math.PI / 2, left: Math.PI }[dir] || 0;
        ctx.rotate(rot);
        ctx.strokeStyle = 'rgba(0,245,255,0.95)';
        ctx.lineWidth = Math.max(2, size * 0.12);
        ctx.beginPath();
        ctx.moveTo(-size * 0.25, -size * 0.2);
        ctx.lineTo(size * 0.18, -size * 0.2);
        ctx.lineTo(size * 0.18, -size * 0.35);
        ctx.lineTo(size * 0.34, 0);
        ctx.lineTo(size * 0.18, size * 0.35);
        ctx.lineTo(size * 0.18, size * 0.2);
        ctx.lineTo(-size * 0.25, size * 0.2);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }

      function render() {
        const w = board.width;
        const h = board.height;
        ctx.clearRect(0, 0, w, h);

        const n = state.size;
        if (!n) return;

        const pad = w * 0.04;
        const area = w - pad * 2;
        const cellW = area / n;

        ctx.save();
        ctx.translate(pad, pad);

        for (let y = 0; y < n; y += 1) {
          for (let x = 0; x < n; x += 1) {
            const cell = getCell(x, y);
            const px = x * cellW;
            const py = y * cellW;
            const t = effectiveType(cell);

            let fill = 'rgba(24,30,56,0.9)';
            if (t === 'wall') fill = 'rgba(8,10,18,0.98)';
            else if (t === 'conductor') fill = 'rgba(73,145,255,0.28)';
            else if (t === 'insulator') fill = 'rgba(35,35,44,0.95)';
            else if (t === 'target') fill = 'rgba(255,217,115,0.14)';
            else if (t === 'sink') fill = 'rgba(255,89,212,0.16)';
            else if (t === 'hot') fill = 'rgba(255,108,127,0.22)';
            else if (t === 'cold') fill = 'rgba(100,166,255,0.22)';
            else if (t === 'oneway') fill = 'rgba(0,245,255,0.12)';

            ctx.fillStyle = fill;
            ctx.fillRect(px, py, cellW, cellW);

            const glow = colorByTemp(cell.temp);
            ctx.strokeStyle = t === 'target'
              ? 'rgba(255,217,115,0.9)'
              : t === 'wall'
                ? 'rgba(120,130,170,0.18)'
                : 'rgba(0,245,255,0.26)';
            ctx.lineWidth = Math.max(1, cellW * 0.04);
            ctx.strokeRect(px + 0.5, py + 0.5, cellW - 1, cellW - 1);

            if (t !== 'wall') {
              ctx.fillStyle = glow;
              ctx.globalAlpha = 0.22;
              ctx.beginPath();
              ctx.arc(px + cellW * 0.5, py + cellW * 0.5, cellW * 0.28, 0, Math.PI * 2);
              ctx.fill();
              ctx.globalAlpha = 1;
            }

            if (t === 'target') {
              ctx.strokeStyle = 'rgba(255,217,115,0.95)';
              ctx.lineWidth = Math.max(2, cellW * 0.08);
              ctx.strokeRect(px + cellW * 0.18, py + cellW * 0.18, cellW * 0.64, cellW * 0.64);
            }

            if (t === 'sink') {
              ctx.fillStyle = 'rgba(255,89,212,0.85)';
              ctx.beginPath();
              ctx.arc(px + cellW * 0.5, py + cellW * 0.5, cellW * 0.2, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = 'rgba(255,89,212,0.95)';
              ctx.lineWidth = Math.max(1.5, cellW * 0.05);
              ctx.beginPath();
              ctx.arc(px + cellW * 0.5, py + cellW * 0.5, cellW * 0.3, 0, Math.PI * 2);
              ctx.stroke();
            }

            if (t === 'oneway') {
              drawArrow(px + cellW * 0.5, py + cellW * 0.5, cellW * 0.7, cell.dir);
            }

            if (t === 'hot' || t === 'cold') {
              ctx.fillStyle = t === 'hot' ? 'rgba(255,136,144,0.95)' : 'rgba(130,186,255,0.95)';
              ctx.font = `${Math.max(10, cellW * 0.34)}px sans-serif`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(t === 'hot' ? 'H' : 'C', px + cellW * 0.5, py + cellW * 0.5);
            }

            if (cellW >= 44 && t !== 'wall') {
              ctx.fillStyle = 'rgba(236,243,255,0.86)';
              ctx.font = `${Math.max(8, cellW * 0.18)}px monospace`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'bottom';
              ctx.fillText(cell.temp.toFixed(1), px + cellW * 0.5, py + cellW * 0.94);
            }

            if (cell.placeable && !cell.placed && t === 'empty') {
              ctx.fillStyle = 'rgba(255,255,255,0.06)';
              ctx.beginPath();
              ctx.arc(px + cellW * 0.5, py + cellW * 0.5, cellW * 0.06, 0, Math.PI * 2);
              ctx.fill();
            }

            if (cell.placed && cell.base === 'empty' && t !== 'hot' && t !== 'cold' && t !== 'conductor' && t !== 'insulator') {
              ctx.fillStyle = 'rgba(255,255,255,0.15)';
              ctx.font = `${Math.max(8, cellW * 0.22)}px sans-serif`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText('•', px + cellW * 0.5, py + cellW * 0.5);
            }
          }
        }

        ctx.restore();
      }

      function resizeCanvas() {
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const rect = board.getBoundingClientRect();
        const size = Math.max(320, Math.floor(Math.min(rect.width || 800, window.innerWidth - 20)));
        board.width = Math.floor(size * dpr);
        board.height = Math.floor(size * dpr);
        render();
      }

      function gameLoop(ts) {
        if (!gameLoop.last) gameLoop.last = ts;
        const dt = Math.min(0.05, (ts - gameLoop.last) / 1000);
        gameLoop.last = ts;

        if (state.running && !state.cleared && !state.failed) {
          state.acc += dt;
          while (state.acc >= STEP) {
            state.acc -= STEP;
            simulateStep();
          }
        }

        render();
        requestAnimationFrame(gameLoop);
      }
      gameLoop.last = 0;

      function boot() {
        buildLevelsUI();
        const initialIndex = Math.max(0, Math.min(LEVELS.length - 1, state.progress.unlocked - 1));
        loadLevel(initialIndex);
        resizeCanvas();

        playBtn.addEventListener('click', () => {
          ensureAudio();
          if (state.cleared || state.failed) {
            setStatus('리셋 후 다시 실행해 주세요.', 'warn');
            return;
          }
          state.running = !state.running;
          if (state.running) {
            setStatus('열 확산 시뮬레이션 실행 중... 목표 범위를 유지하세요.');
          } else {
            setStatus('일시정지됨. 배치를 조정한 뒤 다시 실행하세요.');
          }
          updateHUD();
          beep('toggle');
        });

        resetBtn.addEventListener('click', () => {
          resetLevel();
          beep('erase');
        });

        nextBtn.addEventListener('click', () => {
          const next = state.levelIndex + 1;
          if (next >= LEVELS.length) return;
          if (next + 1 > state.progress.unlocked) {
            setStatus('이전 레벨을 먼저 클리어해 주세요.', 'warn');
            return;
          }
          loadLevel(next);
          beep('toggle');
        });

        bindInput();
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);

        document.addEventListener('visibilitychange', () => {
          if (document.hidden) state.running = false;
          updateHUD();
        });

        requestAnimationFrame(gameLoop);
      }

      boot();
    })();
  </script>
</body>
</html>
