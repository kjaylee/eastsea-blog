<script>
'use strict';

const T = GameI18n({
  gameTitle: { ko:'Tower Siege', en:'Tower Siege' },
  gameSub: { ko:'3개 레인을 탭해 타워를 배치·합성하고 성채를 지키세요.', en:'Tap 3 lanes to place and merge towers, then defend your fortress.' },
  gameMeta: { ko:'배치: 빈 레인 탭 · 합성: 같은 레인 재탭 · 수리로 버티기', en:'Place on empty lane · tap again to merge · repair to survive.' },
  start: { ko:'방어 시작', en:'Start Defense' },
  score: { ko:'점수', en:'Score' },
  wave: { ko:'웨이브', en:'Wave' },
  kills: { ko:'처치', en:'Kills' },
  best: { ko:'최고', en:'Best' },
  gold: { ko:'골드', en:'Gold' },
  energy: { ko:'에너지', en:'Energy' },
  fortress: { ko:'성채', en:'Fortress' },
  laneTip: { ko:'레인을 탭해 타워 배치/합성', en:'Tap a lane to place/merge tower' },
  repair: { ko:'성채 수리', en:'Repair Fortress' },
  gameOver: { ko:'게임 오버', en:'Game Over' },
  finalScore: { ko:'최종 점수', en:'Final Score' },
  bestScore: { ko:'최고 점수', en:'Best Score' },
  reachedWave: { ko:'도달 웨이브', en:'Reached Wave' },
  retry: { ko:'다시 방어', en:'Defend Again' },
  backTitle: { ko:'타이틀로', en:'Back to Title' },
  laneLbl: { ko:'레인', en:'Lane' },
  repairNeed: { ko:'수리비', en:'Repair Cost' },
  hpShort: { ko:'내구', en:'HP' },
  lvShort: { ko:'Lv', en:'Lv' },
  noEnergy: { ko:'에너지 부족', en:'Not enough energy' },
  maxTower: { ko:'최대 타워 레벨', en:'Max tower level' }
});

const GAME_ID = 'tower-siege';
const SAVE_KEY = 'tower-siege-save-v1';
const STATE = { TITLE:'title', PLAY:'play', GAMEOVER:'gameover', RETRY:'retry' };

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const hud = document.getElementById('hud');
const titleOverlay = document.getElementById('titleOverlay');
const gameoverOverlay = document.getElementById('gameoverOverlay');

const scoreCard = document.getElementById('scoreCard');
const waveCard = document.getElementById('waveCard');
const killCard = document.getElementById('killCard');
const bestCard = document.getElementById('bestCard');
const goldCard = document.getElementById('goldCard');
const energyCard = document.getElementById('energyCard');
const hpFill = document.getElementById('hpFill');
const energyFill = document.getElementById('energyFill');
const repairBtn = document.getElementById('repairBtn');
const hint = document.getElementById('hint');

const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const backBtn = document.getElementById('backBtn');

const sound = new SoundManager();
sound.loadSFX('place','../gravity-orbit/assets/audio/orbit_enter.wav');
sound.loadSFX('shoot','../gravity-orbit/assets/audio/star_collect.wav');
sound.loadSFX('hit','../gravity-orbit/assets/audio/asteroid_hit.wav');
sound.loadSFX('over','../gravity-orbit/assets/audio/gameover.wav');

const game = {
  mode: STATE.TITLE,
  dpr: 1,
  W: 0,
  H: 0,
  laneY: [0, 0, 0],
  laneH: 0,
  laneStartX: 76,
  laneEndX: 0,
  towerX: 146,
  fortressX: 54,
  lastTs: 0,
  elapsed: 0,
  wave: 1,
  spawnTimer: 0,
  score: 0,
  kills: 0,
  gold: 0,
  energy: 10,
  energyMax: 10,
  energyRegen: 2.3,
  fortressHp: 100,
  fortressMax: 100,
  bestScore: 0,
  bestWave: 1,
  totalRuns: 0,
  finalScore: 0,
  damageFlash: 0,
  textFx: [],
  enemies: [],
  projectiles: [],
  particles: [],
  towers: [null, null, null],
  submittedScore: -1,
  lastHint: '',
  hintTimer: 0
};

function setTexts() {
  document.getElementById('titleText').textContent = T('gameTitle');
  document.getElementById('titleSub').textContent = T('gameSub');
  document.getElementById('titleMeta').textContent = T('gameMeta');
  startBtn.textContent = T('start');
  document.getElementById('overTitle').textContent = T('gameOver');
  retryBtn.textContent = T('retry');
  backBtn.textContent = T('backTitle');
  repairBtn.textContent = `${T('repair')} (0)`;
  hint.textContent = T('laneTip');
}

function storageGet() {
  let tgData = null;
  try { if (window.TG && window.TG.load) tgData = window.TG.load(SAVE_KEY, null); } catch (_) {}
  if (tgData) return tgData;
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) {
    return null;
  }
}

function storageSet(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch (_) {}
  try { if (window.TG && window.TG.save) window.TG.save(SAVE_KEY, data); } catch (_) {}
}

function loadPersist() {
  const d = storageGet();
  if (!d) return;
  game.bestScore = Number(d.bestScore || 0);
  game.bestWave = Number(d.bestWave || 1);
  game.totalRuns = Number(d.totalRuns || 0);
}

function savePersist() {
  storageSet({
    bestScore: Math.floor(game.bestScore),
    bestWave: Math.floor(game.bestWave),
    totalRuns: Math.floor(game.totalRuns)
  });
}

function resize() {
  game.dpr = window.devicePixelRatio || 1;
  game.W = window.innerWidth;
  game.H = window.innerHeight;
  canvas.width = Math.floor(game.W * game.dpr);
  canvas.height = Math.floor(game.H * game.dpr);
  ctx.setTransform(game.dpr, 0, 0, game.dpr, 0, 0);
  game.laneH = Math.min(136, Math.max(98, game.H * 0.23));
  const center = game.H * 0.52;
  game.laneY[0] = center - game.laneH;
  game.laneY[1] = center;
  game.laneY[2] = center + game.laneH;
  game.laneEndX = game.W - 28;
}

function showHint(text, secs) {
  game.lastHint = text;
  game.hintTimer = secs || 1.2;
}

function repairCost() {
  const missing = game.fortressMax - game.fortressHp;
  return Math.max(15, Math.floor(12 + missing * 0.9));
}

function energyCostForLane(lane) {
  const tower = game.towers[lane];
  if (!tower) return 3;
  return 2 + tower.level;
}

function towerDamage(level) {
  return 15 * Math.pow(1.53, level - 1);
}

function towerRate(level) {
  return Math.max(0.2, 0.95 - level * 0.11);
}

function makeEnemy() {
  const lane = Math.floor(Math.random() * 3);
  const tierRoll = Math.random();
  const type = tierRoll < 0.62 ? 0 : (tierRoll < 0.9 ? 1 : 2);
  const hpMul = [1, 1.6, 2.3][type];
  const spMul = [1, 1.15, 0.9][type];
  const baseHp = 26 + game.wave * 9;
  const baseSpeed = 42 + game.wave * 3.8;
  const y = game.laneY[lane];
  const wobble = (Math.random() - 0.5) * 10;
  return {
    lane,
    x: game.W + 40,
    y: y + wobble,
    hp: baseHp * hpMul,
    maxHp: baseHp * hpMul,
    speed: baseSpeed * spMul,
    dmg: 8 + game.wave * 1.2 + type * 3,
    r: 14 + type * 4,
    tint: type
  };
}

function createPop(x, y, color, amount) {
  for (let i = 0; i < amount; i += 1) {
    const a = Math.random() * Math.PI * 2;
    const sp = 30 + Math.random() * 190;
    game.particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 0.2 + Math.random() * 0.5,
      r: 1 + Math.random() * 3,
      color
    });
  }
}

function addFloatText(x, y, txt, color) {
  game.textFx.push({ x, y, txt, color, life: 0.8 });
}

function resetRun() {
  game.elapsed = 0;
  game.wave = 1;
  game.spawnTimer = 0.75;
  game.score = 0;
  game.kills = 0;
  game.gold = 35;
  game.energy = 10;
  game.fortressHp = game.fortressMax;
  game.finalScore = 0;
  game.damageFlash = 0;
  game.hintTimer = 0;
  game.enemies = [];
  game.projectiles = [];
  game.particles = [];
  game.textFx = [];
  game.towers = [null, null, null];
  game.submittedScore = -1;
}

function startRun() {
  resetRun();
  game.mode = STATE.PLAY;
  titleOverlay.classList.add('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.remove('hidden');
  showHint(T('laneTip'), 2.2);
  if (window.TG && window.TG.haptic) window.TG.haptic('impact','light');
}

function retryRun() {
  game.mode = STATE.RETRY;
  startRun();
}

function backToTitle() {
  game.mode = STATE.TITLE;
  titleOverlay.classList.remove('hidden');
  gameoverOverlay.classList.add('hidden');
  hud.classList.add('hidden');
}

function submitLeaderboard(score) {
  if (!window.Leaderboard) return;
  if (game.submittedScore === score) return;
  game.submittedScore = score;

  let playerName = 'Player';
  try {
    const u = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
    if (u) playerName = u.first_name || u.username || 'Player';
  } catch (_) {}

  window.Leaderboard.submit(GAME_ID, playerName, score, { wave: game.wave, kills: game.kills });
  refreshBoard();
}

function refreshBoard() {
  if (!window.Leaderboard) return;
  window.Leaderboard.getTop(GAME_ID)
    .then((scores) => window.Leaderboard.renderBoard('leaderboard', scores))
    .catch(() => {});
}

function finishRun() {
  game.mode = STATE.GAMEOVER;
  game.finalScore = Math.floor(game.score + game.wave * 90 + game.kills * 7 + game.gold * 0.7);

  if (game.finalScore > game.bestScore) game.bestScore = game.finalScore;
  if (game.wave > game.bestWave) game.bestWave = game.wave;
  game.totalRuns += 1;
  savePersist();

  hud.classList.add('hidden');
  gameoverOverlay.classList.remove('hidden');

  document.getElementById('resultText').textContent = `${T('finalScore')}: ${game.finalScore.toLocaleString()}`;
  document.getElementById('bestText').textContent = `${T('bestScore')}: ${Math.floor(game.bestScore).toLocaleString()}`;
  document.getElementById('statsText').textContent = `${T('reachedWave')} ${game.wave} · ${T('kills')} ${game.kills}`;

  submitLeaderboard(game.finalScore);
  if (window.GameScore && window.GameScore.save) window.GameScore.save(GAME_ID, game.finalScore);

  sound.playSFX('over',{ volume:0.88 });
  if (window.TG && window.TG.haptic) window.TG.haptic('notification','error');
}

function updateHud() {
  scoreCard.textContent = `${T('score')} ${Math.floor(game.score).toLocaleString()}`;
  waveCard.textContent = `${T('wave')} ${game.wave}`;
  killCard.textContent = `${T('kills')} ${game.kills}`;
  bestCard.textContent = `${T('best')} ${Math.floor(game.bestScore).toLocaleString()}`;
  goldCard.textContent = `${T('gold')} ${Math.floor(game.gold)}`;
  energyCard.textContent = `${T('energy')} ${game.energy.toFixed(1)}`;

  const hpRatio = Math.max(0, Math.min(1, game.fortressHp / game.fortressMax));
  const energyRatio = Math.max(0, Math.min(1, game.energy / game.energyMax));
  hpFill.style.width = `${hpRatio * 100}%`;
  energyFill.style.width = `${energyRatio * 100}%`;

  const cost = repairCost();
  repairBtn.textContent = `${T('repair')} (${cost})`;
  repairBtn.disabled = game.gold < cost || game.fortressHp >= game.fortressMax;

  if (game.hintTimer > 0) hint.textContent = game.lastHint;
  else hint.textContent = `${T('fortress')} ${T('hpShort')}: ${Math.ceil(game.fortressHp)}/${game.fortressMax}`;
}

function attackWithTower(lane, tower, dt) {
  tower.cd -= dt;
  if (tower.cd > 0) return;

  let target = null;
  let bestX = Infinity;
  for (let i = 0; i < game.enemies.length; i += 1) {
    const e = game.enemies[i];
    if (e.lane !== lane) continue;
    if (e.x < bestX) {
      bestX = e.x;
      target = e;
    }
  }

  if (!target) return;
  tower.cd = towerRate(tower.level);
  const sx = game.towerX + 14;
  const sy = game.laneY[lane] - 2;
  const dx = target.x - sx;
  const dy = target.y - sy;
  const dist = Math.hypot(dx, dy) || 1;
  const speed = 620;

  game.projectiles.push({
    x: sx,
    y: sy,
    vx: (dx / dist) * speed,
    vy: (dy / dist) * speed,
    life: 0.7,
    dmg: towerDamage(tower.level),
    lane
  });

  sound.playSFX('shoot',{ volume:0.22, rate:1 + Math.random() * 0.06 });
}

function killEnemy(index, lane) {
  const e = game.enemies[index];
  if (!e) return;

  const goldGain = 4 + game.wave * 0.7 + e.tint * 2;
  const scoreGain = 16 + game.wave * 5 + e.tint * 8;
  game.gold += goldGain;
  game.score += scoreGain;
  game.kills += 1;

  createPop(e.x, e.y, '#7fe6ff', 10 + e.tint * 3);
  addFloatText(e.x, e.y - 12, `+${Math.floor(scoreGain)}`, '#7fe6ff');

  game.enemies.splice(index, 1);
}

function deployOrMergeLane(lane) {
  if (game.mode !== STATE.PLAY) return;
  if (lane < 0 || lane > 2) return;

  const tower = game.towers[lane];
  const cost = energyCostForLane(lane);

  if (game.energy < cost) {
    showHint(T('noEnergy'), 0.9);
    if (window.TG && window.TG.haptic) window.TG.haptic('notification','warning');
    return;
  }

  if (!tower) {
    game.energy -= cost;
    game.towers[lane] = { lane, level: 1, cd: 0.15 };
    game.score += 10;
    addFloatText(game.towerX, game.laneY[lane] - 18, `${T('laneLbl')} ${lane + 1}`, '#a3beff');
    createPop(game.towerX, game.laneY[lane], '#a3beff', 10);
    sound.playSFX('place',{ volume:0.4, rate:1.02 });
    if (window.TG && window.TG.haptic) window.TG.haptic('impact','light');
    return;
  }

  if (tower.level >= 6) {
    showHint(T('maxTower'), 0.9);
    return;
  }

  game.energy -= cost;
  tower.level += 1;
  tower.cd = Math.min(tower.cd, 0.16);
  game.score += 18 + tower.level * 6;
  createPop(game.towerX + 8, game.laneY[lane], '#d7a4ff', 14);
  addFloatText(game.towerX + 12, game.laneY[lane] - 16, `${T('lvShort')}.${tower.level}`, '#d7a4ff');
  sound.playSFX('place',{ volume:0.55, rate:1.18 });
  if (window.TG && window.TG.haptic) window.TG.haptic('impact','medium');
}

function onRepair() {
  if (game.mode !== STATE.PLAY) return;
  const cost = repairCost();
  if (game.gold < cost) {
    showHint(`${T('repairNeed')}: ${cost}`, 1);
    return;
  }
  if (game.fortressHp >= game.fortressMax) return;

  game.gold -= cost;
  const heal = Math.min(game.fortressMax - game.fortressHp, 24 + game.wave * 0.7);
  game.fortressHp += heal;
  addFloatText(game.fortressX + 4, game.laneY[1] - 44, `+${Math.floor(heal)}`, '#6cffca');
  createPop(game.fortressX + 14, game.laneY[1], '#6cffca', 16);
  sound.playSFX('place',{ volume:0.45, rate:0.86 });
  if (window.TG && window.TG.haptic) window.TG.haptic('impact','light');
}

function updateProjectiles(dt) {
  for (let i = game.projectiles.length - 1; i >= 0; i -= 1) {
    const p = game.projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    let hit = false;
    for (let j = game.enemies.length - 1; j >= 0; j -= 1) {
      const e = game.enemies[j];
      if (e.lane !== p.lane) continue;
      const dx = e.x - p.x;
      const dy = e.y - p.y;
      if (dx * dx + dy * dy < (e.r + 4) * (e.r + 4)) {
        e.hp -= p.dmg;
        createPop(p.x, p.y, '#b8f1ff', 4);
        if (e.hp <= 0) killEnemy(j, p.lane);
        hit = true;
        break;
      }
    }

    if (hit || p.life <= 0 || p.x > game.W + 40) game.projectiles.splice(i, 1);
  }
}

function updateEnemies(dt) {
  for (let i = game.enemies.length - 1; i >= 0; i -= 1) {
    const e = game.enemies[i];
    e.x -= e.speed * dt;
    e.y += Math.sin((game.elapsed + i) * 4.3) * 0.08;

    if (e.x <= game.fortressX + 18) {
      game.fortressHp -= e.dmg;
      addFloatText(game.fortressX + 26, e.y - 8, `-${Math.floor(e.dmg)}`, '#ff7d9f');
      createPop(game.fortressX + 20, e.y, '#ff6a93', 10);
      game.damageFlash = 0.26;
      game.enemies.splice(i, 1);
      sound.playSFX('hit',{ volume:0.45, rate:0.96 });
      if (window.TG && window.TG.haptic) window.TG.haptic('impact','heavy');
      if (game.fortressHp <= 0) {
        game.fortressHp = 0;
        finishRun();
        return;
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = game.particles.length - 1; i >= 0; i -= 1) {
    const p = game.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life -= dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }

  for (let i = game.textFx.length - 1; i >= 0; i -= 1) {
    const t = game.textFx[i];
    t.y -= 34 * dt;
    t.life -= dt;
    if (t.life <= 0) game.textFx.splice(i, 1);
  }
}

function updatePlay(dt) {
  game.elapsed += dt;
  game.wave = 1 + Math.floor(game.elapsed / 18);
  game.energy = Math.min(game.energyMax, game.energy + game.energyRegen * dt);
  game.score += dt * (3.8 + game.wave * 0.6);

  game.spawnTimer -= dt;
  const interval = Math.max(0.3, 1.25 - game.wave * 0.06);
  if (game.spawnTimer <= 0) {
    game.spawnTimer = interval;
    const extra = game.wave >= 5 && Math.random() < 0.32 ? 1 : 0;
    game.enemies.push(makeEnemy());
    if (extra) game.enemies.push(makeEnemy());
  }

  for (let lane = 0; lane < 3; lane += 1) {
    const tower = game.towers[lane];
    if (!tower) continue;
    attackWithTower(lane, tower, dt);
  }

  updateProjectiles(dt);
  updateEnemies(dt);
  updateParticles(dt);

  game.damageFlash = Math.max(0, game.damageFlash - dt * 1.7);
  if (game.hintTimer > 0) game.hintTimer -= dt;

  updateHud();
}

function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, game.H);
  g.addColorStop(0, '#111837');
  g.addColorStop(0.48, '#0b1230');
  g.addColorStop(1, '#080f24');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, game.W, game.H);

  const strip = ctx.createLinearGradient(0, game.H * 0.24, 0, game.H * 0.84);
  strip.addColorStop(0, 'rgba(87,120,210,.09)');
  strip.addColorStop(1, 'rgba(31,46,99,.07)');
  ctx.fillStyle = strip;
  ctx.fillRect(0, game.H * 0.2, game.W, game.H * 0.68);

  for (let i = 0; i < 3; i += 1) {
    const y = game.laneY[i];
    const laneGlow = ctx.createLinearGradient(game.laneStartX, y - 26, game.laneEndX, y + 26);
    laneGlow.addColorStop(0, 'rgba(83,129,255,.15)');
    laneGlow.addColorStop(1, 'rgba(92,237,255,.08)');
    ctx.fillStyle = laneGlow;
    ctx.fillRect(game.laneStartX, y - 22, game.laneEndX - game.laneStartX, 44);

    ctx.strokeStyle = 'rgba(156,187,255,.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(game.laneStartX, y - 22);
    ctx.lineTo(game.laneEndX, y - 22);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(game.laneStartX, y + 22);
    ctx.lineTo(game.laneEndX, y + 22);
    ctx.stroke();
  }
}

function drawFortress() {
  const x = game.fortressX;
  const y = game.laneY[1] - 58;
  const h = 116;

  const grd = ctx.createLinearGradient(x - 16, y, x + 48, y + h);
  grd.addColorStop(0, '#76ffc5');
  grd.addColorStop(1, '#4a7fff');
  ctx.fillStyle = grd;
  ctx.fillRect(x - 12, y + 8, 34, h - 16);

  ctx.fillStyle = '#dff6ff';
  ctx.fillRect(x - 8, y + 14, 8, h - 28);
  ctx.fillRect(x + 10, y + 14, 8, h - 28);

  ctx.fillStyle = 'rgba(170,210,255,.38)';
  ctx.beginPath();
  ctx.arc(x + 5, game.laneY[1], 36, 0, Math.PI * 2);
  ctx.fill();

  if (game.damageFlash > 0) {
    ctx.fillStyle = `rgba(255,77,122,${Math.min(0.5, game.damageFlash)})`;
    ctx.fillRect(x - 20, y - 8, 48, h + 16);
  }
}

function drawTowers() {
  for (let lane = 0; lane < 3; lane += 1) {
    const y = game.laneY[lane];
    const x = game.towerX;
    const tower = game.towers[lane];

    ctx.fillStyle = 'rgba(159,184,255,.25)';
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.fill();

    if (!tower) continue;

    const lv = tower.level;
    const r = 10 + lv * 1.8;
    const b = Math.min(255, 120 + lv * 18);
    const col = `rgb(${130 + lv * 16},${220 - lv * 10},${b})`;

    const glow = ctx.createRadialGradient(x, y, 0, x, y, 30);
    glow.addColorStop(0, 'rgba(145,219,255,.52)');
    glow.addColorStop(1, 'rgba(145,219,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(x - r, y + r * 0.7);
    ctx.lineTo(x, y - r);
    ctx.lineTo(x + r, y + r * 0.7);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#e8f9ff';
    ctx.beginPath();
    ctx.arc(x, y + 2, Math.max(2.6, 5.4 - lv * 0.4), 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(5,10,20,.86)';
    ctx.fillRect(x - 14, y + 17, 28, 12);
    ctx.fillStyle = '#a9c2ff';
    ctx.font = 'bold 10px system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${T('lvShort')}.${lv}`, x, y + 26);
  }
}

function drawEnemies() {
  for (let i = 0; i < game.enemies.length; i += 1) {
    const e = game.enemies[i];
    const tone = e.tint === 0 ? ['#82a8ff','#4863e3'] : e.tint === 1 ? ['#ffa36e','#ff5f6b'] : ['#ffe084','#ff8f45'];

    const body = ctx.createRadialGradient(e.x - 4, e.y - 4, 2, e.x, e.y, e.r * 1.5);
    body.addColorStop(0, tone[0]);
    body.addColorStop(1, tone[1]);
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,.72)';
    ctx.beginPath();
    ctx.arc(e.x - e.r * 0.28, e.y - e.r * 0.3, Math.max(2, e.r * 0.2), 0, Math.PI * 2);
    ctx.fill();

    const hpRatio = Math.max(0, e.hp / e.maxHp);
    ctx.fillStyle = 'rgba(7,10,22,.74)';
    ctx.fillRect(e.x - e.r, e.y - e.r - 9, e.r * 2, 4);
    ctx.fillStyle = '#74ffc5';
    ctx.fillRect(e.x - e.r, e.y - e.r - 9, e.r * 2 * hpRatio, 4);
  }
}

function drawProjectiles() {
  for (let i = 0; i < game.projectiles.length; i += 1) {
    const p = game.projectiles[i];
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 11);
    glow.addColorStop(0, 'rgba(193,244,255,.95)');
    glow.addColorStop(1, 'rgba(193,244,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 11, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#f2fdff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3.3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  for (let i = 0; i < game.particles.length; i += 1) {
    const p = game.particles[i];
    ctx.globalAlpha = Math.max(0, p.life * 1.3);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.font = 'bold 13px system-ui,sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < game.textFx.length; i += 1) {
    const t = game.textFx[i];
    ctx.globalAlpha = Math.max(0, t.life * 1.2);
    ctx.fillStyle = t.color;
    ctx.fillText(t.txt, t.x, t.y);
  }
  ctx.globalAlpha = 1;
}

function drawTitleBackdrop() {
  if (game.mode !== STATE.TITLE) return;
  ctx.fillStyle = 'rgba(176,203,255,.08)';
  ctx.beginPath();
  ctx.arc(game.W * 0.72, game.H * 0.35, 120, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(game.W * 0.34, game.H * 0.64, 150, 0, Math.PI * 2);
  ctx.fill();
}

function render() {
  drawBackground();
  drawFortress();
  drawTowers();
  drawEnemies();
  drawProjectiles();
  drawParticles();
  drawTitleBackdrop();
}

function laneFromPointer(clientY) {
  const rect = canvas.getBoundingClientRect();
  const y = clientY - rect.top;

  let bestLane = 0;
  let bestDist = Infinity;
  for (let lane = 0; lane < 3; lane += 1) {
    const d = Math.abs(y - game.laneY[lane]);
    if (d < bestDist) {
      bestDist = d;
      bestLane = lane;
    }
  }
  if (bestDist > game.laneH * 0.55) return -1;
  return bestLane;
}

function onCanvasPointerDown(e) {
  if (e.cancelable) e.preventDefault();
  if (game.mode !== STATE.PLAY) return;
  const lane = laneFromPointer(e.clientY);
  if (lane >= 0) deployOrMergeLane(lane);
}

function frame(ts) {
  if (!game.lastTs) game.lastTs = ts;
  const dt = Math.min(0.033, (ts - game.lastTs) / 1000);
  game.lastTs = ts;

  if (game.mode === STATE.PLAY) updatePlay(dt);
  render();
  requestAnimationFrame(frame);
}

startBtn.addEventListener('click', startRun);
retryBtn.addEventListener('click', retryRun);
backBtn.addEventListener('click', backToTitle);
repairBtn.addEventListener('click', onRepair);

canvas.addEventListener('pointerdown', onCanvasPointerDown, { passive:false });
canvas.addEventListener('touchstart', onCanvasPointerDown, { passive:false });
window.addEventListener('resize', resize);

document.addEventListener('keydown', (e) => {
  if ((e.code === 'Enter' || e.code === 'Space') && game.mode === STATE.TITLE) {
    if (e.cancelable) e.preventDefault();
    startRun();
  }
});

loadPersist();
setTexts();
resize();
refreshBoard();
updateHud();
requestAnimationFrame(frame);
</script>
