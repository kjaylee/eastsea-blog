<script>
// ── Tile Types ─────────────────────────────────────────────────
const TILES = [
  { id:0, name:'지우기',    color:'#c8d8c4', border:'#a0b89a', sym:'✕', desc:'타일 지우기' },
  { id:1, name:'잔디',      color:'#5cb85c', border:'#3a9a3a', sym:'🌿', desc:'잔디밭 (1점)' },
  { id:2, name:'흙',        color:'#8d6e63', border:'#6d4e43', sym:'🟫', desc:'맨땅 (1점)' },
  { id:3, name:'강물',      color:'#29b6f6', border:'#0086c3', sym:'💧', desc:'강 (3점, 행복+)' },
  { id:4, name:'나무',      color:'#2e7d32', border:'#1b5e20', sym:'🌲', desc:'숲 (2점, 행복+)' },
  { id:5, name:'돌',        color:'#78909c', border:'#546e7a', sym:'🪨', desc:'돌밭 (2점)' },
  { id:6, name:'오두막',    color:'#bf7131', border:'#8d4e1a', sym:'🏠', desc:'오두막 (10점, 인구+5)' },
  { id:7, name:'농장',      color:'#7cb518', border:'#5a8a10', sym:'🌾', desc:'농장 (6점, 식량+3)' },
  { id:8, name:'모닥불',    color:'#e64a19', border:'#bf360c', sym:'🔥', desc:'모닥불 (8점, 행복++)' },
];

const TILE_EMPTY = 0;

// ── Audio ──────────────────────────────────────────────────────
let _actx = null;
function getAC() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}

function sfxPlaceBuild() {
  const ctx = getAC(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(180, ctx.currentTime);
  o.frequency.setValueAtTime(240, ctx.currentTime + 0.05);
  g.gain.setValueAtTime(0.2, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.18);
}

function sfxPlaceWater() {
  const ctx = getAC();
  const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.12), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(d.length*0.35))*0.22;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = 0.5;
  src.connect(g); g.connect(ctx.destination); src.start();
}

function sfxPlaceNature() {
  const ctx = getAC(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(440, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(330, ctx.currentTime + 0.15);
  g.gain.setValueAtTime(0.12, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.2);
}

function sfxErase() {
  const ctx = getAC();
  const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.07), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*0.15*(1-i/d.length);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 800;
  src.connect(lp); lp.connect(ctx.destination); src.start();
}

function sfxScoreUp() {
  const ctx = getAC(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'triangle'; o.frequency.value = 880;
  g.gain.setValueAtTime(0.13, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.15);
}

// ── State ──────────────────────────────────────────────────────
let canvas, ctx2d, CELL, COLS, ROWS;
let grid = [];
let selectedTile = 1;
let isDragging = false;
let lastPlacedCell = null;
let score = 0, prevScore = 0;
let gameRunning = false;
let animFrame = 0;
let ripples = [];

function initGrid() {
  grid = [];
  for (let r=0;r<ROWS;r++) {
    grid[r] = [];
    for (let c=0;c<COLS;c++) grid[r][c] = TILE_EMPTY;
  }
}

// ── Scoring ────────────────────────────────────────────────────
function calcScore() {
  let base = 0, pop = 0, food = 0, happy = 0;
  const counts = new Array(TILES.length).fill(0);
  let distinct = 0;

  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const t = grid[r][c];
      if (t === TILE_EMPTY) continue;
      counts[t]++;
      switch (t) {
        case 1: base += 1; break;
        case 2: base += 1; break;
        case 3: base += 3; happy += 4; break;
        case 4: base += 2; happy += 3; break;
        case 5: base += 2; break;
        case 6: base += 10; pop += 5; break;
        case 7: base += 6; food += 3; break;
        case 8: base += 8; happy += 8; food += 1; break;
      }
    }
  }
  // Distinct non-empty types
  for (let i=1;i<TILES.length;i++) if(counts[i]>0) distinct++;
  const varietyBonus = distinct * 15;

  // Adjacency bonus
  let adjBonus = 0;
  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      if (grid[r][c] !== 6) continue; // only huts
      [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc]) => {
        if (nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
        if (grid[nr][nc] === 7 || grid[nr][nc] === 8) adjBonus += 5;
      });
    }
  }

  const totalScore = base + varietyBonus + adjBonus;
  const happyPct = Math.min(100, Math.floor(happy * 2));
  return { totalScore, pop, food, happy: happyPct, base, varietyBonus, adjBonus, distinct };
}

function updateScoreUI() {
  const s = calcScore();
  score = s.totalScore;
  document.getElementById('popVal').textContent    = s.pop;
  document.getElementById('foodVal').textContent   = s.food;
  document.getElementById('happyVal').textContent  = s.happy;
  document.getElementById('scoreVal').textContent  = score;
  const prev = parseInt(localStorage.getItem('tb-best')||'0');
  const best = Math.max(score, prev);
  document.getElementById('bestVal').textContent   = best;
  if (score > prev) localStorage.setItem('tb-best', best);
  document.getElementById('scoreDetail').innerHTML =
    `기본 ${s.base} + 다양성 ${s.varietyBonus}(${s.distinct}종) + 인접 보너스 ${s.adjBonus}`;

  if (score > prevScore && score > 0 && (score - prevScore) >= 5) sfxScoreUp();
  prevScore = score;
}

// ── Particles / Ripples ────────────────────────────────────────
function addRipple(c, r) {
  ripples.push({c, r, radius:0.1, maxRadius:0.8, alpha:1, speed:0.06});
}

function updateRipples() {
  for (const rp of ripples) { rp.radius += rp.speed; rp.alpha = Math.max(0, 1-rp.radius/rp.maxRadius); }
  ripples = ripples.filter(rp => rp.alpha > 0);
}

// ── Render ─────────────────────────────────────────────────────
function resize() {
  const topH  = document.getElementById('topBar').offsetHeight;
  const palH  = document.getElementById('palette').offsetHeight;
  const actH  = document.getElementById('actionRow').offsetHeight;
  const availW = Math.min(window.innerWidth, 800);
  const availH = window.innerHeight - topH - palH - actH;
  const targetCols = 20, targetRows = 12;
  CELL = Math.max(18, Math.floor(Math.min(availW/targetCols, availH/targetRows)));
  COLS = Math.max(8, Math.floor(availW/CELL));
  ROWS = Math.max(6, Math.floor(availH/CELL));
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
  ctx2d = canvas.getContext('2d');
  // Re-init grid if needed
  if (grid.length !== ROWS || (grid[0]||[]).length !== COLS) {
    const oldGrid = grid.map(row => [...row]);
    grid = [];
    for (let r=0;r<ROWS;r++) {
      grid[r] = [];
      for (let c=0;c<COLS;c++) {
        grid[r][c] = (oldGrid[r] && oldGrid[r][c] !== undefined) ? oldGrid[r][c] : TILE_EMPTY;
      }
    }
  }
}

function drawTileDecor(t, x, y, C) {
  ctx2d.fillStyle = TILES[t].border;
  switch (t) {
    case 1: // Grass - blades
      for (let i=0;i<4;i++) {
        const bx = x + C*0.15 + i*(C*0.22), by = y + C*0.65;
        ctx2d.fillRect(Math.round(bx), Math.round(by-C*0.25), 2, Math.round(C*0.25));
      }
      break;
    case 2: // Dirt - dots
      for (let i=0;i<3;i++) for(let j=0;j<3;j++) {
        ctx2d.fillRect(Math.round(x+C*0.2+i*C*0.22), Math.round(y+C*0.2+j*C*0.22), 2, 2);
      }
      break;
    case 3: // Water - wave lines
      ctx2d.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx2d.lineWidth = 1.5;
      for (let wy=0;wy<2;wy++) {
        ctx2d.beginPath();
        const baseY = y + C*0.35 + wy*C*0.25;
        ctx2d.moveTo(x+C*0.1, baseY);
        ctx2d.quadraticCurveTo(x+C*0.35, baseY-C*0.1, x+C*0.6, baseY);
        ctx2d.quadraticCurveTo(x+C*0.85, baseY+C*0.1, x+C*0.95, baseY);
        ctx2d.stroke();
      }
      break;
    case 4: // Tree - triangle
      ctx2d.fillStyle = '#1b5e20';
      ctx2d.beginPath();
      ctx2d.moveTo(x+C/2, y+C*0.1);
      ctx2d.lineTo(x+C*0.8, y+C*0.7);
      ctx2d.lineTo(x+C*0.2, y+C*0.7);
      ctx2d.closePath(); ctx2d.fill();
      ctx2d.fillStyle = '#4e342e';
      ctx2d.fillRect(Math.round(x+C*0.43), Math.round(y+C*0.65), Math.round(C*0.14), Math.round(C*0.28));
      break;
    case 5: // Stone - polygon
      ctx2d.fillStyle = '#546e7a';
      ctx2d.beginPath();
      ctx2d.ellipse(x+C/2, y+C*0.55, C*0.35, C*0.25, 0.3, 0, Math.PI*2);
      ctx2d.fill();
      ctx2d.fillStyle = '#90a4ae';
      ctx2d.fillRect(Math.round(x+C*0.35), Math.round(y+C*0.38), Math.round(C*0.13), Math.round(C*0.18));
      break;
    case 6: // Hut - house shape
      ctx2d.fillStyle = '#6d3a1a';
      // Roof
      ctx2d.beginPath();
      ctx2d.moveTo(x+C*0.5, y+C*0.1);
      ctx2d.lineTo(x+C*0.85, y+C*0.42);
      ctx2d.lineTo(x+C*0.15, y+C*0.42);
      ctx2d.closePath(); ctx2d.fill();
      // Walls
      ctx2d.fillStyle = '#d4a373';
      ctx2d.fillRect(Math.round(x+C*0.2), Math.round(y+C*0.4), Math.round(C*0.6), Math.round(C*0.5));
      // Door
      ctx2d.fillStyle = '#4e2a04';
      ctx2d.fillRect(Math.round(x+C*0.4), Math.round(y+C*0.65), Math.round(C*0.2), Math.round(C*0.25));
      break;
    case 7: // Farm - rows
      ctx2d.fillStyle = '#558b2f';
      for (let i=0;i<3;i++) {
        ctx2d.fillRect(Math.round(x+C*0.12), Math.round(y+C*(0.25+i*0.22)), Math.round(C*0.76), Math.round(C*0.1));
      }
      ctx2d.fillStyle = '#f9a825';
      for (let i=0;i<3;i++) for(let j=0;j<4;j++) {
        ctx2d.beginPath();
        ctx2d.arc(x+C*(0.18+j*0.22), y+C*(0.2+i*0.22), C*0.045, 0, Math.PI*2);
        ctx2d.fill();
      }
      break;
    case 8: // FirePit - circle + flames
      ctx2d.fillStyle = '#4e342e';
      ctx2d.beginPath();
      ctx2d.ellipse(x+C*0.5, y+C*0.72, C*0.3, C*0.15, 0, 0, Math.PI*2);
      ctx2d.fill();
      // Flame
      ctx2d.fillStyle = '#ffcc02';
      ctx2d.beginPath();
      ctx2d.moveTo(x+C*0.5, y+C*0.18);
      ctx2d.quadraticCurveTo(x+C*0.62, y+C*0.45, x+C*0.5, y+C*0.6);
      ctx2d.quadraticCurveTo(x+C*0.38, y+C*0.45, x+C*0.5, y+C*0.18);
      ctx2d.fill();
      ctx2d.fillStyle = '#ff6d00';
      ctx2d.beginPath();
      ctx2d.moveTo(x+C*0.5, y+C*0.28);
      ctx2d.quadraticCurveTo(x+C*0.58, y+C*0.48, x+C*0.5, y+C*0.58);
      ctx2d.quadraticCurveTo(x+C*0.42, y+C*0.48, x+C*0.5, y+C*0.28);
      ctx2d.fill();
      break;
  }
}

function drawAll() {
  const C = CELL;
  // Sky gradient background
  const grad = ctx2d.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,'#b3e5fc');
  grad.addColorStop(1,'#e1f5fe');
  ctx2d.fillStyle = grad;
  ctx2d.fillRect(0,0,canvas.width,canvas.height);

  // Grid
  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const t = grid[r][c];
      const x = c*C, y = r*C;

      if (t === TILE_EMPTY) {
        // Empty slot outline
        ctx2d.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx2d.lineWidth = 0.5;
        ctx2d.strokeRect(x+0.5, y+0.5, C-1, C-1);
        continue;
      }

      // Tile bg
      ctx2d.fillStyle = TILES[t].color;
      ctx2d.fillRect(x, y, C, C);

      // Draw details
      drawTileDecor(t, x, y, C);

      // Border
      ctx2d.strokeStyle = TILES[t].border;
      ctx2d.lineWidth = 1;
      ctx2d.strokeRect(x+0.5, y+0.5, C-1, C-1);
    }
  }

  // Ripples (water animation)
  for (const rp of ripples) {
    if (rp.c<0||rp.c>=COLS||rp.r<0||rp.r>=ROWS) continue;
    const cx = rp.c*C+C/2, cy = rp.r*C+C/2;
    ctx2d.save();
    ctx2d.globalAlpha = rp.alpha * 0.6;
    ctx2d.strokeStyle = '#fff';
    ctx2d.lineWidth = 1.5;
    ctx2d.beginPath();
    ctx2d.arc(cx, cy, rp.radius*C, 0, Math.PI*2);
    ctx2d.stroke();
    ctx2d.restore();
  }

  // Hover cursor
  if (hoverCell && gameRunning) {
    const {c, r} = hoverCell;
    if (c>=0&&c<COLS&&r>=0&&r<ROWS) {
      ctx2d.strokeStyle = selectedTile === 0 ? 'rgba(255,80,80,0.8)' : 'rgba(255,255,255,0.7)';
      ctx2d.lineWidth = 2;
      ctx2d.strokeRect(c*C+1, r*C+1, C-2, C-2);
    }
  }
}

// ── Palette UI ─────────────────────────────────────────────────
function buildPalette() {
  const pal = document.getElementById('palette');
  pal.innerHTML = '';
  TILES.forEach((tile, i) => {
    const btn = document.createElement('button');
    btn.className = 'tile-btn' + (i === selectedTile ? ' active' : '');
    btn.title = tile.desc;
    btn.dataset.id = i;
    const ico = document.createElement('div');
    ico.className = 'tile-icon';
    ico.style.background = tile.color;
    ico.style.border = `2px solid ${tile.border}`;
    ico.textContent = '';
    const lbl = document.createElement('div');
    lbl.className = 'tile-label';
    lbl.textContent = (i===0?'✕ ':`${i} `) + tile.name;
    btn.appendChild(ico);
    btn.appendChild(lbl);
    btn.addEventListener('click', () => {
      getAC();
      selectedTile = i;
      document.querySelectorAll('.tile-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
    pal.appendChild(btn);
  });
}

// ── Input ──────────────────────────────────────────────────────
let hoverCell = null;

function cellFromXY(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  const sx = (cx - rect.left) / rect.width;
  const sy = (cy - rect.top)  / rect.height;
  const c  = Math.floor(sx * COLS);
  const r  = Math.floor(sy * ROWS);
  return {
    c: Math.max(0, Math.min(COLS-1, c)),
    r: Math.max(0, Math.min(ROWS-1, r))
  };
}

function placeTile(c, r, tileId, isErase) {
  if (!gameRunning) return;
  if (c<0||c>=COLS||r<0||r>=ROWS) return;
  const key = `${r},${c}`;
  if (lastPlacedCell === key) return;
  lastPlacedCell = key;

  const old = grid[r][c];
  const newTile = isErase ? TILE_EMPTY : tileId;
  if (old === newTile) return;

  grid[r][c] = newTile;

  // SFX based on tile type
  if (isErase || newTile === TILE_EMPTY) {
    sfxErase();
  } else if (newTile === 3) {
    sfxPlaceWater();
    addRipple(c, r);
  } else if (newTile === 4 || newTile === 1 || newTile === 7) {
    sfxPlaceNature();
  } else {
    sfxPlaceBuild();
  }

  updateScoreUI();
}

canvas.addEventListener('mousemove', e => {
  hoverCell = cellFromXY(e.clientX, e.clientY);
});
canvas.addEventListener('mouseleave', () => { hoverCell = null; });

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  getAC();
  isDragging = true;
  lastPlacedCell = null;
  const {c, r} = cellFromXY(e.clientX, e.clientY);
  placeTile(c, r, selectedTile, e.button === 2);
});

canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const {c, r} = cellFromXY(e.clientX, e.clientY);
  placeTile(c, r, selectedTile, e.buttons === 2);
});

canvas.addEventListener('mouseup', () => { isDragging = false; lastPlacedCell = null; });
canvas.addEventListener('contextmenu', e => { e.preventDefault(); });

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  getAC();
  isDragging = true;
  lastPlacedCell = null;
  const t = e.touches[0];
  const {c, r} = cellFromXY(t.clientX, t.clientY);
  hoverCell = {c, r};
  placeTile(c, r, selectedTile, false);
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const {c, r} = cellFromXY(t.clientX, t.clientY);
  hoverCell = {c, r};
  placeTile(c, r, selectedTile, false);
}, {passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  isDragging = false;
  lastPlacedCell = null;
}, {passive:false});

document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  const n = parseInt(e.key);
  if (n >= 1 && n <= 8) {
    selectedTile = n;
    document.querySelectorAll('.tile-btn').forEach((b,i) => {
      b.classList.toggle('active', i === n);
    });
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    selectedTile = 0;
    document.querySelectorAll('.tile-btn').forEach((b,i) => {
      b.classList.toggle('active', i === 0);
    });
  }
  if (e.key === 's' || e.key === 'S') saveVillage();
  if (e.key === 'l' || e.key === 'L') loadVillage();
});

// ── Save / Load ────────────────────────────────────────────────
function saveVillage() {
  const data = {grid: grid.map(r=>[...r]), cols: COLS, rows: ROWS, score};
  localStorage.setItem('tb-village', JSON.stringify(data));
  showTooltip('💾 마을이 저장되었습니다!');
}

function loadVillage() {
  const raw = localStorage.getItem('tb-village');
  if (!raw) { showTooltip('저장된 마을이 없습니다.'); return; }
  try {
    const data = JSON.parse(raw);
    for (let r=0;r<ROWS;r++) {
      for (let c=0;c<COLS;c++) {
        grid[r][c] = (data.grid[r] && data.grid[r][c] !== undefined) ? data.grid[r][c] : TILE_EMPTY;
      }
    }
    updateScoreUI();
    showTooltip('📂 마을을 불러왔습니다!');
  } catch(e) { showTooltip('불러오기 실패'); }
}

function showTooltip(msg) {
  const tt = document.getElementById('tooltip');
  tt.textContent = msg;
  tt.style.display = 'block';
  setTimeout(() => { tt.style.display = 'none'; }, 2000);
}

document.getElementById('saveBtn').addEventListener('click', () => { getAC(); saveVillage(); });
document.getElementById('loadBtn').addEventListener('click', () => { getAC(); loadVillage(); });
document.getElementById('clearBtn').addEventListener('click', () => {
  getAC();
  if (confirm('마을을 초기화하시겠습니까?')) {
    initGrid();
    updateScoreUI();
    sfxErase();
  }
});

// ── Game Loop ──────────────────────────────────────────────────
let lastTS = 0;

function loop(ts) {
  if (!gameRunning) return;
  lastTS = ts;
  animFrame++;
  updateRipples();
  drawAll();
  requestAnimationFrame(loop);
}

// ── Bootstrap ──────────────────────────────────────────────────
canvas = document.getElementById('gameCanvas');
resize();
window.addEventListener('resize', () => { resize(); if(gameRunning) updateScoreUI(); });
buildPalette();

const _best = parseInt(localStorage.getItem('tb-best')||'0');
document.getElementById('bestScoreOvl').textContent = _best;

document.getElementById('startBtn').addEventListener('click', () => {
  getAC();
  document.getElementById('overlay').style.display = 'none';
  gameRunning = true;
  initGrid();
  updateScoreUI();
  requestAnimationFrame(loop);
});
</script>
</body>
