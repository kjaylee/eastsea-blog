  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Vault Echo Cartographer</title>
<meta name="description" content="Play Vault Echo Cartographer - Free HTML5 browser game on eastsea.monster. No download required.">
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{--bg:#0a0a1a;--panel:#151533;--ink:#eff8ff;--neon:#65f5ff;--pink:#ff70eb;--warn:#ffd166;--bad:#ff6b6b}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:radial-gradient(circle at 80% 0%,#1d1d47 0%,#0a0a1a 58%,#060611 100%);color:var(--ink);display:flex;justify-content:center}
    .app{width:min(900px,100%);padding:12px;display:flex;flex-direction:column;gap:10px}
    .hud{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
    .box{background:rgba(21,21,51,.85);border:1px solid #323273;border-radius:12px;padding:8px;text-align:center}
    .box b{display:block;color:var(--neon);font-size:1.08rem}
    .panel{background:rgba(10,10,26,.78);border:1px solid #343472;border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:10px}
    .grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;max-width:540px;margin:0 auto;width:100%}
    .cell{aspect-ratio:1;border-radius:10px;border:1px solid #3b3b82;background:#121236;color:#b7d8ff;font-weight:700;font-size:1.1rem}
    .cell.cursor{outline:2px solid #ffd166}
    .cell.active{background:#1f4f70;border-color:#65f5ff;box-shadow:0 0 14px #65f5ff66;color:#e9fbff}
    .cell.echo{background:#63296b;border-color:#ff70eb;box-shadow:0 0 14px #ff70eb66;color:#fff}
    .controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    button{background:#191947;color:#fff;border:1px solid #44448d;border-radius:11px;padding:10px;font-weight:700;min-height:44px}
    button:active{transform:translateY(1px)}
    .moves{font-size:.9rem;opacity:.9;line-height:1.45}
    .overlay{position:fixed;inset:0;background:#02020ce8;display:none;justify-content:center;align-items:center;padding:20px}
    .overlay.show{display:flex}
    .card{width:min(430px,100%);background:#11112a;border:1px solid #40408f;border-radius:14px;padding:18px;text-align:center}
    .card h2{margin:0 0 10px;color:var(--pink)}
    @media (max-width:740px){.hud{grid-template-columns:repeat(2,minmax(0,1fr))}.controls{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hud">
      <div class="box">Stage<b id="stage">1</b></div>
      <div class="box">Score<b id="score">0</b></div>
      <div class="box">Mistakes<b id="mistakes">3</b></div>
      <div class="box">Sequence<b id="seq">3</b></div>
      <div class="box">Best<b id="best">S1 / 0</b></div>
    </section>

    <section class="panel">
      <div id="grid" class="grid" aria-label="echo map"></div>
      <div class="controls">
        <button id="replayBtn">R · Replay Echo</button>
        <button id="confirmBtn">Enter · Confirm</button>
        <button id="clearBtn">Clear Input</button>
        <button id="restartBtn">Restart</button>
      </div>
      <div class="moves" id="msg">에코 경로를 재생한 뒤 같은 순서로 셀을 입력하세요. 키보드: 화살표 이동, Enter 입력, R 재생.</div>
    </section>
  </main>

  <div id="overlay" class="overlay" role="dialog" aria-modal="true">
    <div class="card">
      <h2>Map Integrity Lost</h2>
      <p id="final"></p>
      <button id="retryBtn">다시 매핑</button>
    </div>
  </div>

  <script>
    (()=>{
      const size=5,total=size*size,key='vaultEchoCartographer.v1';
      const gridEl=document.getElementById('grid');
      const stageEl=document.getElementById('stage');
      const scoreEl=document.getElementById('score');
      const mistakesEl=document.getElementById('mistakes');
      const seqEl=document.getElementById('seq');
      const bestEl=document.getElementById('best');
      const msgEl=document.getElementById('msg');
      const overlay=document.getElementById('overlay');
      const finalEl=document.getElementById('final');

      const audio={ctx:null};
      const initAudio=()=>{if(!audio.ctx){const C=window.AudioContext||window.webkitAudioContext;if(C)audio.ctx=new C();}};
      const tone=(f=440,t=.08,type='sine',g=.05)=>{
        if(!audio.ctx)return;
        const now=audio.ctx.currentTime,o=audio.ctx.createOscillator(),gn=audio.ctx.createGain();
        o.type=type;o.frequency.setValueAtTime(f,now);gn.gain.setValueAtTime(g,now);gn.gain.exponentialRampToValueAtTime(.0001,now+t);
        o.connect(gn).connect(audio.ctx.destination);o.start(now);o.stop(now+t);
      };
      ['pointerdown','keydown'].forEach(ev=>window.addEventListener(ev,initAudio,{once:true}));

      let best={stage:1,score:0};
      try{best=Object.assign(best,JSON.parse(localStorage.getItem(key)||'{}'));}catch{}

      const S={
        cursor:12,sequence:[],input:[],stage:1,score:0,mistakes:3,locked:false,playing:false,running:true
      };

      const cells=[];
      for(let i=0;i<total;i++){
        const b=document.createElement('button');
        b.className='cell';
        b.textContent=i+1;
        b.addEventListener('click',()=>{if(!S.running||S.locked)return;S.cursor=i;markCursor();pushInput(i);});
        gridEl.appendChild(b);cells.push(b);
      }

      const neighbors=(i)=>{
        const r=Math.floor(i/size),c=i%size,res=[];
        if(r>0)res.push(i-size);if(r<size-1)res.push(i+size);if(c>0)res.push(i-1);if(c<size-1)res.push(i+1);
        return res;
      };

      function genSequence(){
        const len=Math.min(12,2+S.stage);
        const seq=[];
        let cur=(Math.random()*total)|0;
        seq.push(cur);
        while(seq.length<len){
          const nexts=neighbors(cur).filter(n=>n!==seq[seq.length-2]);
          cur=nexts[(Math.random()*nexts.length)|0];
          seq.push(cur);
        }
        S.sequence=seq;
      }

      async function flashCell(i,type='echo',ms=220){
        cells[i].classList.add(type);
        tone(type==='echo'?320+i*10:650,.08,'triangle',.04);
        await new Promise(r=>setTimeout(r,ms));
        cells[i].classList.remove(type);
      }

      async function replay(){
        if(!S.running||S.playing)return;
        S.playing=true;S.locked=true;msgEl.textContent='에코 재생 중...';
        for(const idx of S.sequence){await flashCell(idx,'echo',200);await new Promise(r=>setTimeout(r,90));}
        S.locked=false;S.playing=false;msgEl.textContent='입력을 시작하세요.';
      }

      function markCursor(){
        cells.forEach((c,i)=>c.classList.toggle('cursor',i===S.cursor));
      }

      function clearInput(){
        S.input=[];
        cells.forEach(c=>c.classList.remove('active'));
        msgEl.textContent='입력을 초기화했습니다.';
      }

      async function pushInput(idx){
        if(S.locked)return;
        if(S.input.length>=S.sequence.length)return;
        S.input.push(idx);
        cells[idx].classList.add('active');
        tone(540+idx*6,.05,'sine',.033);
        msgEl.textContent=`입력 ${S.input.length}/${S.sequence.length}`;
      }

      async function confirm(){
        if(S.locked||!S.running)return;
        if(S.input.length!==S.sequence.length){msgEl.textContent='길이가 부족합니다. 재생(R) 후 다시 입력하세요.';tone(190,.08,'square',.04);return;}
        S.locked=true;
        let ok=true;
        for(let i=0;i<S.sequence.length;i++){
          if(S.input[i]!==S.sequence[i]){ok=false;break;}
        }
        if(ok){
          S.score+=S.sequence.length*20+S.stage*15;
          S.stage++;
          tone(860,.1,'triangle',.05);
          msgEl.textContent='정확합니다. 다음 단계로 이동합니다.';
          if(S.stage>best.stage||S.score>best.score){best.stage=Math.max(best.stage,S.stage);best.score=Math.max(best.score,S.score);localStorage.setItem(key,JSON.stringify(best));}
          prepareRound();
        }else{
          S.mistakes--;
          tone(210,.12,'sawtooth',.055);
          msgEl.textContent='오입력! 남은 기회가 감소했습니다.';
          if(S.mistakes<=0){
            gameOver();
          }else{
            clearInput();
            await replay();
          }
        }
        syncHud();
        S.locked=false;
      }

      function gameOver(){
        S.running=false;S.locked=true;
        if(S.stage>best.stage||S.score>best.score){best.stage=Math.max(best.stage,S.stage);best.score=Math.max(best.score,S.score);localStorage.setItem(key,JSON.stringify(best));}
        finalEl.textContent=`Stage ${S.stage} · Score ${S.score} · Best ${best.stage}/${best.score}`;
        overlay.classList.add('show');
        tone(150,.25,'triangle',.06);setTimeout(()=>tone(110,.28,'sawtooth',.05),160);
      }

      async function prepareRound(){
        clearInput();
        genSequence();
        seqEl.textContent=String(S.sequence.length);
        syncHud();
        await replay();
      }

      function restart(){
        S.cursor=12;S.sequence=[];S.input=[];S.stage=1;S.score=0;S.mistakes=3;S.locked=false;S.playing=false;S.running=true;
        overlay.classList.remove('show');
        cells.forEach(c=>{c.classList.remove('active','echo')});
        markCursor();
        prepareRound();
      }

      function moveCursor(dr,dc){
        const r=Math.floor(S.cursor/size),c=S.cursor%size;
        const nr=Math.max(0,Math.min(size-1,r+dr));
        const nc=Math.max(0,Math.min(size-1,c+dc));
        S.cursor=nr*size+nc;markCursor();tone(330,.03,'triangle',.02);
      }

      function syncHud(){
        stageEl.textContent=String(S.stage);
        scoreEl.textContent=String(S.score);
        mistakesEl.textContent=String(S.mistakes);
        seqEl.textContent=String(Math.max(0,S.sequence.length));
        bestEl.textContent=`S${best.stage} / ${best.score}`;
      }

      window.addEventListener('keydown',e=>{
        if(!S.running && !['r','R'].includes(e.key)) return;
        if(e.key==='ArrowUp'){e.preventDefault();moveCursor(-1,0);}
        else if(e.key==='ArrowDown'){e.preventDefault();moveCursor(1,0);}
        else if(e.key==='ArrowLeft'){e.preventDefault();moveCursor(0,-1);}
        else if(e.key==='ArrowRight'){e.preventDefault();moveCursor(0,1);}
        else if(e.key==='Enter'){e.preventDefault();if(S.input.length<S.sequence.length)pushInput(S.cursor);else confirm();}
        else if(e.key==='r'||e.key==='R'){if(S.running)replay();else restart();}
        else if(e.key==='Backspace'){e.preventDefault();clearInput();}
      });

      document.getElementById('replayBtn').addEventListener('click',replay);
      document.getElementById('confirmBtn').addEventListener('click',confirm);
      document.getElementById('clearBtn').addEventListener('click',clearInput);
      document.getElementById('restartBtn').addEventListener('click',restart);
      document.getElementById('retryBtn').addEventListener('click',restart);

      markCursor();syncHud();prepareRound();
    })();
  </script>
