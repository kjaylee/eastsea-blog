<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Vector Vine Swing</title>
  <style>
    :root{
      --bg:#0a0a1a;--panel:#14142e;--ink:#ecf1ff;--muted:#9aa3c8;
      --neon:#66f6ff;--pink:#ff63de;--warn:#ffd569;--ok:#70ffa5;
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      background:radial-gradient(circle at 20% 10%,#1b1b44,var(--bg) 46%,#050510 100%);
      color:var(--ink);display:flex;justify-content:center;padding:14px;
    }
    .app{
      width:min(100%,900px);display:grid;gap:12px;background:linear-gradient(160deg,rgba(20,20,46,.95),rgba(10,10,26,.96));
      border:1px solid rgba(102,246,255,.3);border-radius:18px;padding:14px;box-shadow:0 0 24px rgba(102,246,255,.2);
    }
    h1{margin:0;font-size:clamp(1.1rem,2.8vw,1.7rem)}
    p{margin:6px 0 0;color:var(--muted);font-size:.92rem;line-height:1.35}
    .hud{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .pill{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:8px;text-align:center;font-size:.86rem}
    .pill b{display:block;color:var(--neon);font-size:1.02rem}
    canvas{width:100%;max-height:62vh;background:linear-gradient(#090914,#111132);border-radius:14px;border:1px solid rgba(255,255,255,.15)}
    .row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    button{
      border:0;border-radius:11px;padding:11px 10px;font-weight:800;letter-spacing:.02em;
      background:linear-gradient(120deg,#70f8ff,#9780ff);color:#071018;cursor:pointer
    }
    button.alt{background:linear-gradient(120deg,#ff8ee8,#c9a2ff)}
    .touch{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .touch button{font-size:1rem}
    .legend{font-size:.84rem;color:var(--muted)}
    .good{color:var(--ok);font-weight:700}
    .warn{color:var(--warn);font-weight:700}
    @media (max-width:700px){
      .hud{grid-template-columns:repeat(2,minmax(0,1fr))}
      .row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>🌿 Vector Vine Swing</h1>
      <p>덩굴을 좌우로 스윙해 <b class="good">에너지 링</b>을 수집하고, 균열 기둥을 피하세요. (키보드: ←/→ 또는 A/D, 터치: 좌/우 버튼)</p>
    </header>

    <section class="hud">
      <div class="pill">Score<b id="score">0</b></div>
      <div class="pill">Best<b id="best">0</b></div>
      <div class="pill">Vines<b id="lives">3</b></div>
      <div class="pill">Speed<b id="speed">1.0x</b></div>
    </section>

    <canvas id="game" width="420" height="640" aria-label="Vector Vine Swing game canvas"></canvas>

    <section class="row">
      <button id="startBtn">Start / Restart</button>
      <button id="pauseBtn" class="alt">Pause</button>
      <button id="muteBtn">Sound: ON</button>
    </section>

    <section class="touch" aria-label="Touch controls">
      <button id="leftBtn">⬅ Left</button>
      <button id="rightBtn">Right ➡</button>
    </section>

    <p class="legend">수집(+12), 근접회피(+2), 충돌(-1 vine). Game Over 후 재시작 가능합니다. 최고점은 localStorage에 저장됩니다.</p>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const livesEl = document.getElementById('lives');
      const speedEl = document.getElementById('speed');
      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const muteBtn = document.getElementById('muteBtn');
      const leftBtn = document.getElementById('leftBtn');
      const rightBtn = document.getElementById('rightBtn');

      const STORAGE_KEY = 'vector-vine-swing-best';
      let bestScore = Number(localStorage.getItem(STORAGE_KEY) || 0);
      bestEl.textContent = String(bestScore);

      let audioCtx = null;
      let muted = false;
      function sfx(freq = 440, type = 'sine', dur = 0.07, gain = 0.05) {
        if (muted) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        g.gain.setValueAtTime(gain, now);
        g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur);
      }

      const state = {
        running: false,
        paused: false,
        score: 0,
        lives: 3,
        speed: 1,
        frame: 0,
        player: { x: canvas.width / 2, y: canvas.height - 70, w: 34, h: 36, vx: 0 },
        keys: { left: false, right: false },
        rings: [],
        rocks: [],
        sparks: []
      };

      function reset() {
        state.score = 0;
        state.lives = 3;
        state.speed = 1;
        state.frame = 0;
        state.player.x = canvas.width / 2;
        state.player.vx = 0;
        state.rings.length = 0;
        state.rocks.length = 0;
        state.sparks.length = 0;
        state.running = true;
        state.paused = false;
        pauseBtn.textContent = 'Pause';
        syncHud();
      }

      function syncHud() {
        scoreEl.textContent = String(Math.floor(state.score));
        livesEl.textContent = String(state.lives);
        speedEl.textContent = state.speed.toFixed(1) + 'x';
      }

      function spawn() {
        const laneX = 30 + Math.random() * (canvas.width - 60);
        if (Math.random() < 0.58) {
          state.rings.push({ x: laneX, y: -20, r: 12, vy: 2.2 + Math.random() * 1.8 });
        } else {
          const w = 24 + Math.random() * 20;
          state.rocks.push({ x: laneX, y: -26, w, h: 24 + Math.random() * 22, vy: 2.3 + Math.random() * 1.8 });
        }
      }

      function addSpark(x, y, hue = 190) {
        for (let i = 0; i < 8; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 1 + Math.random() * 3;
          state.sparks.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 20 + Math.random() * 14, hue });
        }
      }

      function update() {
        if (!state.running || state.paused) return;
        state.frame += 1;
        state.speed = Math.min(3.4, 1 + state.frame / 1700);

        if (state.frame % Math.max(16, Math.floor(38 - state.speed * 6)) === 0) spawn();

        const move = 5.8 * state.speed;
        state.player.vx = (state.keys.left ? -move : 0) + (state.keys.right ? move : 0);
        state.player.x += state.player.vx;
        state.player.x = Math.max(16, Math.min(canvas.width - 16, state.player.x));

        for (let i = state.rings.length - 1; i >= 0; i--) {
          const r = state.rings[i];
          r.y += r.vy * state.speed;
          const dx = r.x - state.player.x;
          const dy = r.y - state.player.y;
          if (Math.hypot(dx, dy) < r.r + 14) {
            state.score += 12;
            addSpark(r.x, r.y, 182);
            sfx(740, 'triangle', 0.09, 0.07);
            state.rings.splice(i, 1);
            continue;
          }
          if (r.y > canvas.height + 30) state.rings.splice(i, 1);
        }

        for (let i = state.rocks.length - 1; i >= 0; i--) {
          const o = state.rocks[i];
          o.y += o.vy * state.speed;
          const hit = Math.abs(o.x - state.player.x) < (o.w * 0.5 + state.player.w * 0.5 - 4) &&
                      Math.abs(o.y - state.player.y) < (o.h * 0.5 + state.player.h * 0.5 - 5);
          if (hit) {
            state.lives -= 1;
            addSpark(state.player.x, state.player.y, 330);
            sfx(130, 'sawtooth', 0.18, 0.09);
            state.rocks.splice(i, 1);
            if (state.lives <= 0) {
              gameOver();
              return;
            }
            continue;
          }
          if (o.y > canvas.height + 50) {
            state.score += 2;
            state.rocks.splice(i, 1);
          }
        }

        for (let i = state.sparks.length - 1; i >= 0; i--) {
          const p = state.sparks[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.03;
          p.life -= 1;
          if (p.life <= 0) state.sparks.splice(i, 1);
        }

        syncHud();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#0b0b18');
        grad.addColorStop(1, '#151538');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let s = 0; s < 40; s++) {
          const x = (s * 53 + state.frame * 0.6) % canvas.width;
          const y = (s * 97 + state.frame * 1.3) % canvas.height;
          ctx.fillStyle = 'rgba(130,210,255,0.35)';
          ctx.fillRect(x, y, 2, 2);
        }

        for (const r of state.rings) {
          ctx.strokeStyle = '#70f8ff';
          ctx.lineWidth = 4;
          ctx.shadowColor = '#70f8ff';
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        for (const o of state.rocks) {
          ctx.fillStyle = '#31103c';
          ctx.strokeStyle = '#ff63de';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h, 6);
          ctx.fill();
          ctx.stroke();
        }

        const pl = state.player;
        ctx.save();
        ctx.translate(pl.x, pl.y);
        ctx.fillStyle = '#89ffe7';
        ctx.shadowColor = '#89ffe7';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(16, 16);
        ctx.lineTo(-16, 16);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#0a0a1a';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();

        for (const p of state.sparks) {
          ctx.fillStyle = `hsla(${p.hue},95%,65%,${Math.max(0, p.life / 28)})`;
          ctx.fillRect(p.x, p.y, 3, 3);
        }

        if (!state.running) {
          ctx.fillStyle = 'rgba(5,5,12,0.72)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.textAlign = 'center';
          ctx.fillStyle = '#ecf1ff';
          ctx.font = '700 30px sans-serif';
          ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 16);
          ctx.fillStyle = '#9aa3c8';
          ctx.font = '600 18px sans-serif';
          ctx.fillText('Start / Restart 버튼으로 재시작', canvas.width / 2, canvas.height / 2 + 20);
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      function gameOver() {
        state.running = false;
        sfx(88, 'square', 0.25, 0.09);
        const final = Math.floor(state.score);
        if (final > bestScore) {
          bestScore = final;
          localStorage.setItem(STORAGE_KEY, String(bestScore));
          bestEl.textContent = String(bestScore);
          sfx(920, 'triangle', 0.12, 0.06);
        }
      }

      function setDir(dir, active) {
        if (dir === 'left') state.keys.left = active;
        if (dir === 'right') state.keys.right = active;
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') setDir('left', true);
        if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') setDir('right', true);
      });
      document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') setDir('left', false);
        if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') setDir('right', false);
      });

      function bindPress(btn, on, off) {
        const down = (ev) => { ev.preventDefault(); on(); };
        const up = (ev) => { ev.preventDefault(); off(); };
        btn.addEventListener('pointerdown', down);
        btn.addEventListener('pointerup', up);
        btn.addEventListener('pointerleave', up);
        btn.addEventListener('touchstart', down, { passive: false });
        btn.addEventListener('touchend', up, { passive: false });
      }
      bindPress(leftBtn, () => setDir('left', true), () => setDir('left', false));
      bindPress(rightBtn, () => setDir('right', true), () => setDir('right', false));

      startBtn.addEventListener('click', () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        reset();
      });
      pauseBtn.addEventListener('click', () => {
        if (!state.running) return;
        state.paused = !state.paused;
        pauseBtn.textContent = state.paused ? 'Resume' : 'Pause';
      });
      muteBtn.addEventListener('click', () => {
        muted = !muted;
        muteBtn.textContent = `Sound: ${muted ? 'OFF' : 'ON'}`;
      });

      if (!state.running) draw();
      loop();
    })();
  </script>
</body>
</html>
