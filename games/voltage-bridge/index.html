<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Voltage Bridge — 전압 회로 퍼즐</title>
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a1a'/%3E%3Cpath d='M8 32h14l6-12 10 24 8-14h10' stroke='%2300f5ff' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='12' cy='32' r='4' fill='%23ff4d6d'/%3E%3Ccircle cx='54' cy='32' r='4' fill='%238eb0ff'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: rgba(16, 20, 44, 0.92);
      --line: rgba(0, 245, 255, 0.28);
      --text: #eaf0ff;
      --muted: #98a4cc;
      --cyan: #00f5ff;
      --pink: #ff59d4;
      --lime: #68ff9e;
      --gold: #ffd973;
      --red: #ff4d6d;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at 20% -10%, #1a1b4f 0%, #111537 34%, #090916 70%, #070712 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    .app {
      width: min(980px, 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 0 22px rgba(0, 245, 255, 0.14);
    }

    .title {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      color: var(--cyan);
      font-size: clamp(1.08rem, 4.6vw, 1.5rem);
      text-shadow: 0 0 10px rgba(0, 245, 255, 0.45);
      letter-spacing: 0.02em;
    }

    .pitch {
      margin-top: 4px;
      font-size: 0.82rem;
      color: #cde6ff;
    }

    .mini {
      font-size: 0.76rem;
      color: #b7c5f6;
      text-align: right;
      line-height: 1.4;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 0 10px 10px;
    }

    .stat {
      min-height: 56px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      background: rgba(8, 11, 29, 0.84);
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .k {
      font-size: 0.64rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .v { font-size: 0.95rem; font-weight: 700; }
    .v.cyan { color: var(--cyan); text-shadow: 0 0 8px rgba(0,245,255,0.35); }
    .v.lime { color: var(--lime); text-shadow: 0 0 8px rgba(104,255,158,0.32); }
    .v.gold { color: var(--gold); text-shadow: 0 0 8px rgba(255,217,115,0.3); }
    .v.pink { color: var(--pink); text-shadow: 0 0 8px rgba(255,89,212,0.3); }

    .levels {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 6px;
    }

    .lv {
      min-height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      color: #dce5ff;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .lv.active {
      border-color: rgba(0,245,255,0.75);
      box-shadow: 0 0 10px rgba(0,245,255,0.3);
      color: #aff7ff;
      background: rgba(0,245,255,0.13);
    }

    .lv.done {
      border-color: rgba(104,255,158,0.75);
      color: #bbffd8;
      background: rgba(104,255,158,0.12);
    }

    .lv.lock { opacity: 0.35; cursor: not-allowed; }

    .canvas-wrap {
      margin: 0 10px 10px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #070712;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 40px rgba(0,245,255,0.07), 0 0 18px rgba(0,245,255,0.15);
    }

    canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .floating {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.52);
      padding: 6px 10px;
      font-size: 0.74rem;
      color: #dce5ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .toolbar,
    .actions {
      display: grid;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .toolbar { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .actions { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    button.ctrl {
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(0,245,255,0.38);
      background: rgba(0,245,255,0.1);
      color: #d7faff;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    button.ctrl.alt {
      border-color: rgba(255,217,115,0.5);
      background: rgba(255,217,115,0.15);
      color: #ffe8b2;
    }

    button.ctrl.warn {
      border-color: rgba(255,89,212,0.5);
      background: rgba(255,89,212,0.15);
      color: #ffd8f7;
    }

    button.ctrl.active {
      border-color: rgba(104,255,158,0.72);
      background: rgba(104,255,158,0.2);
      color: #d1ffe5;
    }

    button.ctrl:disabled { opacity: 0.45; cursor: not-allowed; }

    .legend {
      margin: 0 10px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(8, 11, 27, 0.76);
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      font-size: 0.72rem;
      color: #d5dfff;
    }

    .it {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 6px;
      text-align: center;
    }

    .status {
      min-height: 24px;
      padding: 0 12px 12px;
      font-size: 0.82rem;
      color: #d4dcff;
    }

    .status.ok { color: var(--lime); }
    .status.warn { color: #ff9fd8; }

    @media (max-width: 760px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .legend { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .toolbar, .actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .levels { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="title">
        <div>
          <h1>⚡ Voltage Bridge — 전압 회로 퍼즐</h1>
          <div class="pitch">전선과 저항을 배치해 목표 전압을 맞추는 물리 퍼즐</div>
        </div>
        <div class="mini">옴의 법칙(V=IR) 기반 시뮬레이션<br />모든 LED 점등 시 클리어</div>
      </div>
      <div class="hud">
        <div class="stat"><div class="k">레벨</div><div class="v cyan" id="hudLevel">1 / 10</div></div>
        <div class="stat"><div class="k">전원 전압</div><div class="v gold" id="hudSupply">9.0V</div></div>
        <div class="stat"><div class="k">목표 LED</div><div class="v pink" id="hudTargets">-</div></div>
        <div class="stat"><div class="k">진행도</div><div class="v lime" id="hudProgress">0 / 10</div></div>
      </div>
    </section>

    <section class="card">
      <div class="levels" id="levelStrip"></div>
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="900" height="900" aria-label="전압 브리지 게임 캔버스"></canvas>
        <div class="floating" id="floatingHint">빈 칸에 부품을 놓고 LED 목표 전압 범위를 맞춰주세요.</div>
      </div>

      <div class="toolbar" id="toolbar">
        <button class="ctrl active" data-tool="wire">전선 (1Ω)</button>
        <button class="ctrl" data-tool="res10">저항 10Ω</button>
        <button class="ctrl" data-tool="res22">저항 22Ω</button>
        <button class="ctrl warn" data-tool="erase">지우기</button>
      </div>

      <div class="actions">
        <button class="ctrl alt" id="prevBtn">◀ 이전 레벨</button>
        <button class="ctrl" id="resetBtn">↺ 현재 레벨 초기화</button>
        <button class="ctrl alt" id="nextBtn">다음 레벨 ▶</button>
        <button class="ctrl" id="refillBtn">추천 배치 보기</button>
      </div>

      <div class="legend">
        <div class="it">🔴 + 전원</div>
        <div class="it">🔵 - 접지</div>
        <div class="it">💡 LED 목표 전압</div>
        <div class="it">🎚 가변저항 탭으로 변경</div>
        <div class="it">⏻ 스위치 탭으로 ON/OFF</div>
      </div>
      <div class="status" id="statusLine"></div>
    </section>
  </main>

            { kind: 'switch', r: 3, c: 4, on: false },
            { kind: 'led', r: 1, c: 3 },
            { kind: 'led', r: 3, c: 2 },
            { kind: 'led', r: 3, c: 3 },
            { kind: 'led', r: 5, c: 3 },
            { kind: 'fixedWire', r: 3, c: 5 },
            { kind: 'sourceG', r: 3, c: 6 }
          ],
          editable: [
            { r: 3, c: 2 },
            { r: 2, c: 1 }, { r: 2, c: 3 }, { r: 2, c: 4 }, { r: 1, c: 2 }, { r: 1, c: 4 },
            { r: 4, c: 1 }, { r: 4, c: 3 }, { r: 4, c: 4 }, { r: 5, c: 2 }, { r: 5, c: 4 }
          ],
          recommended: {
            placements: {
              '3,2': 'wire',
              '2,1': 'wire',
              '2,3': 'wire',
              '2,4': 'res22',
              '1,2': 'wire',
              '1,4': 'wire',
              '4,1': 'wire',
              '4,3': 'wire',
              '4,4': 'res10',
              '5,2': 'wire',
              '5,4': 'wire'
            },
            switches: { '3,4': true },
            vars: { '2,2': 3, '4,2': 1 }
          }
        }
      ];

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const statusLine = document.getElementById('statusLine');
      const floatingHint = document.getElementById('floatingHint');
      const hudLevel = document.getElementById('hudLevel');
      const hudSupply = document.getElementById('hudSupply');
      const hudTargets = document.getElementById('hudTargets');
      const hudProgress = document.getElementById('hudProgress');
      const levelStrip = document.getElementById('levelStrip');
      const toolbar = document.getElementById('toolbar');
      const prevBtn = document.getElementById('prevBtn');
      const resetBtn = document.getElementById('resetBtn');
      const nextBtn = document.getElementById('nextBtn');
      const refillBtn = document.getElementById('refillBtn');

      let progress = loadProgress();
      let currentLevel = Math.max(0, Math.min(progress.unlocked - 1, LEVELS.length - 1));
      let tool = 'wire';
      let state = null;
      let sim = null;
      let pointerDown = false;
      let lastPaintKey = '';
      let cellGeom = null;
      let audioCtx = null;

      LEVELS.forEach(prepareTargetsFromRecommended);
      init();

      function init() {
        setupToolbar();
        setupButtons();
        buildLevelStrip();
        loadLevel(currentLevel, false);
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        canvas.addEventListener('pointerdown', onPointerDown);
        canvas.addEventListener('pointermove', onPointerMove);
        canvas.addEventListener('pointerup', onPointerUp);
        canvas.addEventListener('pointercancel', onPointerUp);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
      }

      function setupToolbar() {
        toolbar.addEventListener('click', (e) => {
          const btn = e.target.closest('button[data-tool]');
          if (!btn) return;
          tool = btn.dataset.tool;
          updateToolbarUI();
          playTone(420, 0.035, 'triangle', 0.02);
          draw();
        });
        updateToolbarUI();
      }

      function setupButtons() {
        prevBtn.addEventListener('click', () => {
          if (currentLevel > 0) loadLevel(currentLevel - 1, true);
        });
        nextBtn.addEventListener('click', () => {
          if (currentLevel < progress.unlocked - 1 && currentLevel < LEVELS.length - 1) {
            loadLevel(currentLevel + 1, true);
          }
        });
        resetBtn.addEventListener('click', () => {
          loadLevel(currentLevel, true);
          setStatus('현재 레벨을 초기화했습니다.', 'warn');
          playTone(250, 0.05, 'sawtooth', 0.018);
        });
        refillBtn.addEventListener('click', () => {
          applyRecommended(state, LEVELS[currentLevel]);
          recompute(true);
          if (!state.cleared) {
            setStatus('추천 배치를 적용했습니다. 전압 값을 확인해보세요.', 'warn');
          }
          playTone(520, 0.06, 'square', 0.03);
        });
      }

      function buildLevelStrip() {
        levelStrip.innerHTML = '';
        for (let i = 0; i < LEVELS.length; i += 1) {
          const b = document.createElement('button');
          b.className = 'lv';
          b.textContent = String(i + 1);
          b.addEventListener('click', () => {
            if (i > progress.unlocked - 1) return;
            loadLevel(i, true);
          });
          levelStrip.appendChild(b);
        }
        updateLevelStrip();
      }

      function updateLevelStrip() {
        const btns = levelStrip.querySelectorAll('.lv');
        btns.forEach((btn, idx) => {
          btn.classList.toggle('active', idx === currentLevel);
          btn.classList.toggle('done', !!progress.cleared[idx]);
          btn.classList.toggle('lock', idx > progress.unlocked - 1);
        });
      }

      function loadLevel(levelIndex, withSound) {
        currentLevel = levelIndex;
        const blueprint = LEVELS[currentLevel];
        state = buildStateFromBlueprint(blueprint);
        sim = simulate(state, blueprint.supply);
        updateHud();
        updateLevelStrip();
        setStatus(blueprint.note, '');
        floatingHint.textContent = buildFloatingHint(sim, blueprint);
        if (withSound) playTone(340, 0.04, 'triangle', 0.02);
        draw();
      }

      function buildStateFromBlueprint(blueprint) {
        const n = blueprint.n;
        const cells = [];
        for (let r = 0; r < n; r += 1) {
          const row = [];
          for (let c = 0; c < n; c += 1) {
            row.push({ kind: 'void', placed: null, ohm: null, switchOn: false, varValues: null, varIndex: 0, led: null });
          }
          cells.push(row);
        }

        for (const pos of blueprint.editable) {
          const cell = cells[pos.r][pos.c];
          cell.kind = 'editable';
          cell.placed = null;
        }

        for (const comp of blueprint.components) {
          const cell = cells[comp.r][comp.c];
          cell.kind = comp.kind;
          if (comp.kind === 'fixedRes') {
            cell.ohm = comp.ohm || 12;
          }
          if (comp.kind === 'switch') {
            cell.switchOn = !!comp.on;
          }
          if (comp.kind === 'varRes') {
            cell.varValues = Array.isArray(comp.values) ? comp.values.slice() : [4, 8, 12, 16, 20];
            cell.varIndex = Math.max(0, Math.min(cell.varValues.length - 1, comp.index || 0));
          }
          if (comp.kind === 'led') {
            const meta = blueprint.ledMeta.find((m) => m.r === comp.r && m.c === comp.c);
            cell.led = {
              target: meta ? meta.target : 0,
              tol: meta ? meta.tol : 0.2,
              value: 0,
              on: false
            };
          }
        }

        return { n, cells, cleared: false, touched: false };
      }

      function prepareTargetsFromRecommended(blueprint) {
        const tmp = buildStateFromBlueprint(blueprint);
        applyRecommended(tmp, blueprint);
        const result = simulate(tmp, blueprint.supply);
        for (const meta of blueprint.ledMeta) {
          const key = cellKey(meta.r, meta.c);
          const val = result.ledValues[key];
          meta.target = Number.isFinite(val) ? round1(val) : 0;
        }
      }

      function applyRecommended(targetState, blueprint) {
        const rec = blueprint.recommended || {};
        const placements = rec.placements || {};
        const switches = rec.switches || {};
        const vars = rec.vars || {};

        for (const key in placements) {
          const [r, c] = key.split(',').map(Number);
          if (targetState.cells[r]?.[c]?.kind === 'editable') {
            targetState.cells[r][c].placed = placements[key];
          }
        }

        for (const key in switches) {
          const [r, c] = key.split(',').map(Number);
          if (targetState.cells[r]?.[c]?.kind === 'switch') {
            targetState.cells[r][c].switchOn = !!switches[key];
          }
        }

        for (const key in vars) {
          const [r, c] = key.split(',').map(Number);
          if (targetState.cells[r]?.[c]?.kind === 'varRes') {
            const cell = targetState.cells[r][c];
            cell.varIndex = Math.max(0, Math.min(cell.varValues.length - 1, vars[key]));
          }
        }
      }

      function onPointerDown(e) {
        pointerDown = true;
        lastPaintKey = '';
        canvas.setPointerCapture(e.pointerId);
        processPointer(e);
      }

      function onPointerMove(e) {
        if (!pointerDown) return;
        processPointer(e);
      }

      function onPointerUp(e) {
        pointerDown = false;
        lastPaintKey = '';
        if (canvas.hasPointerCapture(e.pointerId)) {
          canvas.releasePointerCapture(e.pointerId);
        }
      }

      function processPointer(e) {
        if (!cellGeom) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const { offset, size, n } = cellGeom;
        const c = Math.floor((x - offset) / size);
        const r = Math.floor((y - offset) / size);

        if (r < 0 || c < 0 || r >= n || c >= n) return;
        const key = cellKey(r, c);
        if (lastPaintKey === key && tool !== 'erase') return;
        lastPaintKey = key;

        const cell = state.cells[r][c];
        let changed = false;

        if (cell.kind === 'editable') {
          const next = tool === 'erase' ? null : tool;
          if (cell.placed !== next) {
            cell.placed = next;
            changed = true;
          }
        } else if (cell.kind === 'switch') {
          if (e.type === 'pointerdown') {
            cell.switchOn = !cell.switchOn;
            changed = true;
          }
        } else if (cell.kind === 'varRes') {
          if (e.type === 'pointerdown') {
            cell.varIndex = (cell.varIndex + 1) % cell.varValues.length;
            changed = true;
          }
        }

        if (!changed) return;
        state.touched = true;
        recompute(true);
        playTone(cell.kind === 'editable' ? 470 : 620, 0.03, 'triangle', 0.018);
      }

      function recompute(redraw) {
        sim = simulate(state, LEVELS[currentLevel].supply);
        const wasCleared = state.cleared;
        state.cleared = sim.allLedOn;
        updateHud();
        floatingHint.textContent = buildFloatingHint(sim, LEVELS[currentLevel]);

        if (state.cleared && !wasCleared) {
          progress.cleared[currentLevel] = true;
          progress.unlocked = Math.max(progress.unlocked, Math.min(LEVELS.length, currentLevel + 2));
          saveProgress(progress);
          updateLevelStrip();
          updateHud();
          setStatus(`레벨 ${currentLevel + 1} 클리어! 모든 LED가 목표 전압에 도달했습니다.`, 'ok');
          playVictoryChord();
        } else if (!state.cleared && state.touched) {
          setStatus('회로를 조정해 모든 LED를 목표 범위에 맞춰주세요.', '');
        }

        if (redraw) draw();
      }

      function buildFloatingHint(result, blueprint) {
        const lines = [];
        for (let i = 0; i < blueprint.ledMeta.length; i += 1) {
          const meta = blueprint.ledMeta[i];
          const key = cellKey(meta.r, meta.c);
          const value = result.ledValues[key];
          const on = result.ledStatus[key];
          lines.push(`LED${i + 1} ${fmt(meta.target)}V±${meta.tol.toFixed(2)} / 현재 ${Number.isFinite(value) ? fmt(value) : '연결 없음'} ${on ? '✅' : '❌'}`);
        }
        return lines.join('  •  ');
      }

      function updateHud() {
        const level = LEVELS[currentLevel];
        hudLevel.textContent = `${currentLevel + 1} / ${LEVELS.length}`;
        hudSupply.textContent = `${fmt(level.supply)}V`;

        const tgt = level.ledMeta.map((m, idx) => `L${idx + 1}:${fmt(m.target)}V±${m.tol.toFixed(2)}`).join(' · ');
        hudTargets.textContent = tgt;

        const done = progress.cleared.filter(Boolean).length;
        hudProgress.textContent = `${done} / ${LEVELS.length}`;

        prevBtn.disabled = currentLevel <= 0;
        nextBtn.disabled = !(currentLevel < progress.unlocked - 1 && currentLevel < LEVELS.length - 1);
      }

      function setStatus(text, cls) {
        statusLine.textContent = text;
        statusLine.className = `status ${cls || ''}`.trim();
      }

      function simulate(levelState, supplyVoltage) {
        const nodes = [];
        const nodeIndexByCell = new Map();
        const n = levelState.n;

        for (let r = 0; r < n; r += 1) {
          for (let c = 0; c < n; c += 1) {
            const cell = levelState.cells[r][c];
            if (!isConductive(cell)) continue;
            const idx = nodes.length;
            nodes.push({ r, c, cell });
            nodeIndexByCell.set(cellKey(r, c), idx);
          }
        }

        const edges = [];
        const neighbors = Array.from({ length: nodes.length }, () => []);
        const dir = [[1,0],[-1,0],[0,1],[0,-1]];

        for (let i = 0; i < nodes.length; i += 1) {
          const a = nodes[i];
          for (const [dr, dc] of dir) {
            const nr = a.r + dr;
            const nc = a.c + dc;
            if (nr < 0 || nc < 0 || nr >= n || nc >= n) continue;
            const key = cellKey(nr, nc);
            const j = nodeIndexByCell.get(key);
            if (j === undefined || j <= i) continue;
            const b = nodes[j];
            const rOhm = edgeResistance(a.cell, b.cell);
            if (!Number.isFinite(rOhm) || rOhm <= 0) continue;
            edges.push([i, j, rOhm]);
            neighbors[i].push([j, rOhm]);
            neighbors[j].push([i, rOhm]);
          }
        }

        const fixedVoltages = new Map();
        nodes.forEach((node, idx) => {
          if (node.cell.kind === 'sourceP') fixedVoltages.set(idx, supplyVoltage);
          if (node.cell.kind === 'sourceG') fixedVoltages.set(idx, 0);
        });

        const reachable = findReachableFromFixed(nodes.length, neighbors, fixedVoltages);
        const filteredNeighbors = neighbors.map((list, i) => (reachable.has(i) ? list.filter(([j]) => reachable.has(j)) : []));

        const unknown = [];
        const unknownMap = new Map();

        for (let i = 0; i < nodes.length; i += 1) {
          if (!reachable.has(i)) continue;
          if (fixedVoltages.has(i)) continue;
          unknownMap.set(i, unknown.length);
          unknown.push(i);
        }

        const N = unknown.length;
        const A = Array.from({ length: N }, () => Array(N).fill(0));
        const b = Array(N).fill(0);

        for (let ui = 0; ui < N; ui += 1) {
          const idx = unknown[ui];
          for (const [j, rOhm] of filteredNeighbors[idx]) {
            const g = 1 / rOhm;
            A[ui][ui] += g;
            if (fixedVoltages.has(j)) {
              b[ui] += g * fixedVoltages.get(j);
            } else {
              const uj = unknownMap.get(j);
              if (uj !== undefined) A[ui][uj] -= g;
            }
          }
        }

        const x = N > 0 ? solveLinear(A, b) : [];
        const voltages = new Map(fixedVoltages);

        for (let i = 0; i < N; i += 1) {
          const idx = unknown[i];
          const v = x[i];
          if (Number.isFinite(v)) voltages.set(idx, v);
        }

        const ledStatus = {};
        const ledValues = {};
        let allLedOn = true;

        for (let r = 0; r < n; r += 1) {
          for (let c = 0; c < n; c += 1) {
            const cell = levelState.cells[r][c];
            if (cell.kind !== 'led') continue;
            const idx = nodeIndexByCell.get(cellKey(r, c));
            const v = idx !== undefined ? voltages.get(idx) : undefined;
            cell.led.value = Number.isFinite(v) ? v : NaN;
            const on = Number.isFinite(v) && Math.abs(v - cell.led.target) <= cell.led.tol;
            cell.led.on = on;
            ledStatus[cellKey(r, c)] = on;
            ledValues[cellKey(r, c)] = Number.isFinite(v) ? v : NaN;
            if (!on) allLedOn = false;
          }
        }

        const activeEdges = [];
        for (const [a, bNode] of edges) {
          if (!reachable.has(a) || !reachable.has(bNode)) continue;
          const va = voltages.get(a);
          const vb = voltages.get(bNode);
          if (!Number.isFinite(va) || !Number.isFinite(vb)) continue;
          activeEdges.push([nodes[a].r, nodes[a].c, nodes[bNode].r, nodes[bNode].c, (va + vb) * 0.5]);
        }

        return { voltages, ledValues, ledStatus, allLedOn, activeEdges };
      }

      function findReachableFromFixed(nodeCount, neighbors, fixed) {
        const q = [];
        const seen = new Set();
        for (const idx of fixed.keys()) {
          q.push(idx);
          seen.add(idx);
        }
        while (q.length) {
          const cur = q.shift();
          for (const [next] of neighbors[cur]) {
            if (seen.has(next)) continue;
            seen.add(next);
            q.push(next);
          }
        }
        return seen;
      }

      function isConductive(cell) {
        if (!cell) return false;
        if (cell.kind === 'editable') return !!cell.placed;
        if (cell.kind === 'switch') return !!cell.switchOn;
        return cell.kind !== 'void';
      }

      function edgeResistance(a, b) {
        const ra = getCellResistance(a);
        const rb = getCellResistance(b);
        if (!Number.isFinite(ra) || !Number.isFinite(rb)) return Infinity;
        return Math.max(0.25, (ra + rb) * 0.5);
      }

      function getCellResistance(cell) {
        if (cell.kind === 'editable') {
          return RES_VALUE[cell.placed] ?? Infinity;
        }
        if (cell.kind === 'fixedRes') {
          return Number.isFinite(cell.ohm) ? cell.ohm : RES_VALUE.fixedRes;
        }
        if (cell.kind === 'varRes') {
          return cell.varValues[cell.varIndex] ?? RES_VALUE.varRes;
        }
        if (cell.kind === 'switch') {
          return cell.switchOn ? RES_VALUE.switch : Infinity;
        }
        return RES_VALUE[cell.kind] ?? Infinity;
      }

      function solveLinear(A, b) {
        const n = A.length;
        if (n === 0) return [];
        const M = A.map((row, i) => [...row, b[i]]);

        for (let col = 0; col < n; col += 1) {
          let pivot = col;
          let best = Math.abs(M[col][col]);
          for (let r = col + 1; r < n; r += 1) {
            const v = Math.abs(M[r][col]);
            if (v > best) {
              best = v;
              pivot = r;
            }
          }

          if (best < 1e-10) continue;
          if (pivot !== col) {
            const tmp = M[col];
            M[col] = M[pivot];
            M[pivot] = tmp;
          }

          const div = M[col][col];
          for (let j = col; j <= n; j += 1) M[col][j] /= div;

          for (let r = 0; r < n; r += 1) {
            if (r === col) continue;
            const f = M[r][col];
            if (Math.abs(f) < 1e-12) continue;
            for (let j = col; j <= n; j += 1) {
              M[r][j] -= f * M[col][j];
            }
          }
        }

        const x = Array(n).fill(0);
        for (let i = 0; i < n; i += 1) {
          x[i] = Number.isFinite(M[i][n]) ? M[i][n] : 0;
        }
        return x;
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const side = Math.max(280, Math.floor(rect.width));
        canvas.width = Math.floor(side * dpr);
        canvas.height = Math.floor(side * dpr);
        draw();
      }

      function draw() {
        if (!state || !sim) return;
        const n = state.n;
        const w = canvas.width;
        const h = canvas.height;
        const side = Math.min(w, h);
        const margin = side * 0.08;
        const board = side - margin * 2;
        const cell = board / n;
        const offset = (side - board) * 0.5;

        cellGeom = { n, size: cell, offset };

        ctx.clearRect(0, 0, w, h);
        drawBgGlow(w, h);
        drawActiveEdges(sim.activeEdges, cell, offset);

        for (let r = 0; r < n; r += 1) {
          for (let c = 0; c < n; c += 1) {
            drawCell(r, c, state.cells[r][c], cell, offset);
          }
        }

        drawBoardInfo(cell, offset);
      }

      function drawBgGlow(w, h) {
        const g = ctx.createRadialGradient(w * 0.5, h * 0.5, w * 0.08, w * 0.5, h * 0.5, w * 0.68);
        g.addColorStop(0, '#0e1538');
        g.addColorStop(1, '#05050d');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
      }

      function drawActiveEdges(edges, cell, offset) {
        ctx.save();
        ctx.lineWidth = Math.max(2, cell * 0.12);
        ctx.lineCap = 'round';
        for (const [r1, c1, r2, c2, vmid] of edges) {
          const p1 = centerOf(r1, c1, cell, offset);
          const p2 = centerOf(r2, c2, cell, offset);
          const t = Math.max(0, Math.min(1, vmid / (LEVELS[currentLevel].supply || 1)));
          const hue = 190 - t * 130;
          ctx.strokeStyle = `hsla(${hue}, 100%, 65%, 0.45)`;
          ctx.shadowColor = `hsla(${hue}, 100%, 60%, 0.6)`;
          ctx.shadowBlur = cell * 0.22;
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawCell(r, c, cellObj, cell, offset) {
        const x = offset + c * cell;
        const y = offset + r * cell;
        const pad = cell * 0.08;
        const bx = x + pad;
        const by = y + pad;
        const bs = cell - pad * 2;

        let fill = 'rgba(255,255,255,0.02)';
        let stroke = 'rgba(255,255,255,0.08)';

        if (cellObj.kind === 'void') {
          fill = 'rgba(9,11,24,0.9)';
          stroke = 'rgba(255,255,255,0.03)';
        } else if (cellObj.kind === 'editable') {
          fill = cellObj.placed ? 'rgba(0,245,255,0.11)' : 'rgba(255,255,255,0.04)';
          stroke = cellObj.placed ? 'rgba(0,245,255,0.55)' : 'rgba(255,255,255,0.14)';
        } else if (cellObj.kind === 'sourceP') {
          fill = 'rgba(255,77,109,0.22)';
          stroke = 'rgba(255,77,109,0.85)';
        } else if (cellObj.kind === 'sourceG') {
          fill = 'rgba(120,155,255,0.22)';
          stroke = 'rgba(120,155,255,0.85)';
        } else if (cellObj.kind === 'led') {
          fill = cellObj.led.on ? 'rgba(255,230,120,0.3)' : 'rgba(255,255,255,0.08)';
          stroke = cellObj.led.on ? 'rgba(255,230,120,0.9)' : 'rgba(255,210,120,0.48)';
        } else if (cellObj.kind === 'switch') {
          fill = cellObj.switchOn ? 'rgba(104,255,158,0.2)' : 'rgba(255,89,212,0.16)';
          stroke = cellObj.switchOn ? 'rgba(104,255,158,0.82)' : 'rgba(255,89,212,0.75)';
        } else if (cellObj.kind === 'varRes') {
          fill = 'rgba(255,217,115,0.2)';
          stroke = 'rgba(255,217,115,0.85)';
        } else if (cellObj.kind === 'fixedRes') {
          fill = 'rgba(255,217,115,0.16)';
          stroke = 'rgba(255,217,115,0.72)';
        } else if (cellObj.kind === 'fixedWire') {
          fill = 'rgba(0,245,255,0.12)';
          stroke = 'rgba(0,245,255,0.62)';
        }

        roundRect(ctx, bx, by, bs, bs, Math.max(4, cell * 0.08), fill, stroke, Math.max(1, cell * 0.03));

        if (cellObj.kind === 'editable' && !cellObj.placed) {
          drawEmptyDot(bx, by, bs);
          return;
        }

        if (cellObj.kind === 'sourceP') {
          drawSourceSign(bx, by, bs, '+', '#ff6f8f');
          return;
        }
        if (cellObj.kind === 'sourceG') {
          drawSourceSign(bx, by, bs, '−', '#8eb0ff');
          return;
        }

        const effectiveKind = cellObj.kind === 'editable' ? cellObj.placed : cellObj.kind;
        if (effectiveKind === 'wire' || effectiveKind === 'fixedWire') {
          drawWireSymbol(bx, by, bs, '#9df8ff');
        } else if (effectiveKind === 'res10' || effectiveKind === 'res22' || effectiveKind === 'fixedRes' || effectiveKind === 'varRes') {
          const value = effectiveKind === 'res10' ? 10
            : effectiveKind === 'res22' ? 22
            : effectiveKind === 'fixedRes' ? (cellObj.ohm || 12)
            : cellObj.varValues[cellObj.varIndex];
          drawResistorSymbol(bx, by, bs, value, effectiveKind === 'varRes');
        } else if (effectiveKind === 'led') {
          drawLedSymbol(bx, by, bs, cellObj.led.on);
        } else if (effectiveKind === 'switch') {
          drawSwitchSymbol(bx, by, bs, cellObj.switchOn);
        }
      }

      function drawBoardInfo(cell, offset) {
        ctx.save();
        ctx.font = `${Math.max(14, cell * 0.24)}px -apple-system, BlinkMacSystemFont, sans-serif`;
        ctx.fillStyle = 'rgba(220,232,255,0.78)';
        ctx.textAlign = 'left';
        ctx.fillText(LEVELS[currentLevel].title, offset, offset - Math.max(16, cell * 0.25));
        ctx.restore();
      }

      function drawEmptyDot(x, y, s) {
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.beginPath();
        ctx.arc(x + s * 0.5, y + s * 0.5, s * 0.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawSourceSign(x, y, s, sign, color) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = Math.max(2, s * 0.06);
        ctx.shadowColor = color;
        ctx.shadowBlur = s * 0.2;
        ctx.beginPath();
        ctx.arc(x + s * 0.5, y + s * 0.5, s * 0.26, 0, Math.PI * 2);
        ctx.stroke();
        ctx.font = `bold ${Math.max(14, s * 0.34)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(sign, x + s * 0.5, y + s * 0.53);
        ctx.restore();
      }

      function drawWireSymbol(x, y, s, color) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = Math.max(2, s * 0.08);
        ctx.lineCap = 'round';
        ctx.shadowColor = color;
        ctx.shadowBlur = s * 0.16;
        ctx.beginPath();
        ctx.moveTo(x + s * 0.24, y + s * 0.5);
        ctx.lineTo(x + s * 0.76, y + s * 0.5);
        ctx.stroke();
        ctx.restore();
      }

      function drawResistorSymbol(x, y, s, value, isVar) {
        ctx.save();
        ctx.strokeStyle = '#ffd973';
        ctx.lineWidth = Math.max(2, s * 0.05);
        ctx.lineJoin = 'round';
        ctx.shadowColor = 'rgba(255,217,115,0.6)';
        ctx.shadowBlur = s * 0.16;
        const yMid = y + s * 0.5;
        ctx.beginPath();
        ctx.moveTo(x + s * 0.18, yMid);
        ctx.lineTo(x + s * 0.28, yMid);
        ctx.lineTo(x + s * 0.34, yMid - s * 0.12);
        ctx.lineTo(x + s * 0.42, yMid + s * 0.12);
        ctx.lineTo(x + s * 0.50, yMid - s * 0.12);
        ctx.lineTo(x + s * 0.58, yMid + s * 0.12);
        ctx.lineTo(x + s * 0.66, yMid - s * 0.12);
        ctx.lineTo(x + s * 0.74, yMid);
        ctx.lineTo(x + s * 0.82, yMid);
        ctx.stroke();

        if (isVar) {
          ctx.strokeStyle = '#68ff9e';
          ctx.lineWidth = Math.max(2, s * 0.04);
          ctx.beginPath();
          ctx.moveTo(x + s * 0.26, y + s * 0.26);
          ctx.lineTo(x + s * 0.72, y + s * 0.68);
          ctx.stroke();
        }

        ctx.fillStyle = 'rgba(255,240,198,0.95)';
        ctx.font = `bold ${Math.max(9, s * 0.16)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(`${value}Ω`, x + s * 0.5, y + s * 0.94);
        ctx.restore();
      }

      function drawLedSymbol(x, y, s, on) {
        ctx.save();
        const color = on ? '#ffe877' : '#ffd37a';
        ctx.strokeStyle = color;
        ctx.fillStyle = on ? 'rgba(255,232,119,0.45)' : 'rgba(255,211,122,0.15)';
        ctx.lineWidth = Math.max(2, s * 0.05);
        ctx.shadowColor = on ? 'rgba(255,232,119,0.8)' : 'rgba(255,211,122,0.28)';
        ctx.shadowBlur = s * (on ? 0.22 : 0.08);
        ctx.beginPath();
        ctx.arc(x + s * 0.5, y + s * 0.5, s * 0.23, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x + s * 0.5, y + s * 0.24);
        ctx.lineTo(x + s * 0.5, y + s * 0.1);
        ctx.moveTo(x + s * 0.76, y + s * 0.5);
        ctx.lineTo(x + s * 0.9, y + s * 0.5);
        ctx.moveTo(x + s * 0.24, y + s * 0.5);
        ctx.lineTo(x + s * 0.1, y + s * 0.5);
        ctx.stroke();
        ctx.restore();
      }

      function drawSwitchSymbol(x, y, s, on) {
        ctx.save();
        ctx.strokeStyle = on ? '#68ff9e' : '#ff59d4';
        ctx.lineWidth = Math.max(2, s * 0.06);
        ctx.lineCap = 'round';
        ctx.shadowColor = on ? 'rgba(104,255,158,0.65)' : 'rgba(255,89,212,0.6)';
        ctx.shadowBlur = s * 0.15;

        const yMid = y + s * 0.5;
        ctx.beginPath();
        ctx.moveTo(x + s * 0.18, yMid);
        ctx.lineTo(x + s * 0.38, yMid);
        ctx.moveTo(x + s * 0.62, yMid);
        ctx.lineTo(x + s * 0.82, yMid);
        ctx.stroke();

        ctx.beginPath();
        if (on) {
          ctx.moveTo(x + s * 0.38, yMid);
          ctx.lineTo(x + s * 0.62, yMid);
        } else {
          ctx.moveTo(x + s * 0.38, yMid);
          ctx.lineTo(x + s * 0.62, yMid - s * 0.17);
        }
        ctx.stroke();

        ctx.fillStyle = 'rgba(240,248,255,0.9)';
        ctx.font = `bold ${Math.max(8, s * 0.15)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(on ? 'ON' : 'OFF', x + s * 0.5, y + s * 0.95);
        ctx.restore();
      }

      function roundRect(context, x, y, w, h, r, fill, stroke, lineW) {
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + w, y, x + w, y + h, r);
        context.arcTo(x + w, y + h, x, y + h, r);
        context.arcTo(x, y + h, x, y, r);
        context.arcTo(x, y, x + w, y, r);
        context.closePath();
        context.fillStyle = fill;
        context.fill();
        context.lineWidth = lineW;
        context.strokeStyle = stroke;
        context.stroke();
      }

      function centerOf(r, c, cell, offset) {
        return {
          x: offset + c * cell + cell * 0.5,
          y: offset + r * cell + cell * 0.5
        };
      }

      function updateToolbarUI() {
        const btns = toolbar.querySelectorAll('button[data-tool]');
        btns.forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.tool === tool);
        });
      }

      function playTone(freq, duration, type, gain) {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const now = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = type || 'sine';
          osc.frequency.setValueAtTime(freq, now);
          g.gain.setValueAtTime(0.0001, now);
          g.gain.exponentialRampToValueAtTime(gain || 0.02, now + 0.01);
          g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
          osc.connect(g).connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + duration + 0.01);
        } catch (_) {
          // ignore audio init errors
        }
      }

      function playVictoryChord() {
        playTone(523.25, 0.1, 'triangle', 0.03);
        setTimeout(() => playTone(659.25, 0.12, 'triangle', 0.03), 90);
        setTimeout(() => playTone(783.99, 0.15, 'triangle', 0.03), 180);
      }

      function loadProgress() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return { unlocked: 1, cleared: Array(LEVELS.length).fill(false) };
          }
          const obj = JSON.parse(raw);
          const unlocked = Math.max(1, Math.min(LEVELS.length, Number(obj.unlocked) || 1));
          const cleared = Array(LEVELS.length).fill(false);
          if (Array.isArray(obj.cleared)) {
            for (let i = 0; i < Math.min(LEVELS.length, obj.cleared.length); i += 1) {
              cleared[i] = !!obj.cleared[i];
            }
          }
          return { unlocked, cleared };
        } catch (_) {
          return { unlocked: 1, cleared: Array(LEVELS.length).fill(false) };
        }
      }

      function saveProgress(next) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
        } catch (_) {
          // ignore storage errors
        }
      }

      function cellKey(r, c) {
        return `${r},${c}`;
      }

      function fmt(v) {
        return Number.isFinite(v) ? v.toFixed(1) : '-';
      }

      function round1(v) {
        return Math.round(v * 10) / 10;
      }

      window.VoltageBridgeDebug = {
        getLevel: () => currentLevel + 1,
        getState: () => state,
        getSim: () => sim,
        applyRecommended: () => {
          applyRecommended(state, LEVELS[currentLevel]);
          recompute(true);
        }
      };
    })();
  </script>
</body>
</html>
