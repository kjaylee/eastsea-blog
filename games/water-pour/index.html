<script>
const sm = new SoundManager();
sm.loadSFX('pour', 'assets/audio/pour.wav');
sm.loadSFX('complete', 'assets/audio/complete.wav');
sm.loadSFX('click', 'assets/audio/click.wav');
sm.loadSFX('select', 'assets/audio/select.wav');
sm.loadSFX('win', 'assets/audio/win.wav');
sm.loadSFX('undo', 'assets/audio/undo.wav');
sm.loadSFX('error', 'assets/audio/error.wav');

/* ═══ Sound Manager ═══ */
const SoundManager = {
  sounds: {},
  init() {
    ['pour', 'complete', 'click', 'select'].forEach(name => {
      this.sounds[name] = new Audio(`assets/audio/${name}.wav`);
      this.sounds[name].load();
    });
  },
  play(name, volume = 0.5) {
    if (this.sounds[name]) {
      const s = this.sounds[name].cloneNode();
      s.volume = volume;
      s.play().catch(() => {});
    }
  }
};

/* ═══ Game Logic ═══ */
(function(){
'use strict';

const WATER_COLORS=['#e94560','#4ea8ff','#50c878','#ffd700','#e070d0','#ff8c42','#00d2d3','#a29bfe','#fd79a8','#55efc4'];
const TUBE_CAP=4;

let level=1, moves=0, selected=-1;
let tubes=[], history=[], initialState=[];
let extraTubesUsed=0;

/* Particle System */
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = (Math.random() - 0.5) * 4;
    this.life = 1.0;
    this.size = Math.random() * 4 + 2;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.1; // gravity
    this.life -= 0.02;
  }
  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
  }
}

function spawnParticles(x, y, color, count = 10) {
  for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
}

function updateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(updateParticles);
}
updateParticles();

function initGame() {
  SoundManager.init();
  generateLevel();
}

function generateLevel(){
  const numColors=Math.min(2+Math.floor(level/1.5), 10);
  const numTubes=numColors+2;
  const colors=[];
  for(let i=0; i<numColors; i++){
    for(let j=0; j<TUBE_CAP; j++) colors.push(i);
  }
  for(let i=colors.length-1; i>0; i--){
    const j=Math.floor(Math.random()*(i+1));
    [colors[i],colors[j]]=[colors[j],colors[i]];
  }
  tubes=[];
  let ci=0;
  for(let i=0; i<numColors; i++){
    const tube=[];
    for(let j=0; j<TUBE_CAP; j++) tube.push(colors[ci++]);
    tubes.push(tube);
  }
  for(let i=0; i<2; i++) tubes.push([]);
  moves=0; selected=-1; history=[]; extraTubesUsed=0;
  initialState=tubes.map(t=>[...t]);
  render();
}

function render(){
  const area=document.getElementById('tubesArea');
  area.innerHTML='';
  document.getElementById('movesVal').textContent=moves;
  document.getElementById('levelVal').textContent=level;
  
  tubes.forEach((tube, i) => {
    const container = document.createElement('div');
    container.className = 'tube-container' + (i === selected ? ' selected' : '');
    
    const div = document.createElement('div');
    div.className = 'tube';
    if(isComplete(tube) && tube.length === TUBE_CAP) div.style.borderColor = varColor(tube[0]);

    tube.forEach((colorIdx, j) => {
      const layer = document.createElement('div');
      layer.className = 'water-layer';
      const color = WATER_COLORS[colorIdx];
      layer.style.backgroundColor = color;
      layer.style.height = `${(j+1)*25}%`;
      layer.style.boxShadow = `inset 0 0 10px rgba(0,0,0,0.2), 0 0 5px ${color}33`;
      
      // Top wave for the topmost layer
      if (j === tube.length - 1) {
        const wave = document.createElement('div');
        wave.className = 'wave';
        wave.style.backgroundColor = color;
        layer.appendChild(wave);
      }
      
      div.appendChild(layer);
    });
    
    container.appendChild(div);
    container.addEventListener('click', (e) => handleTubeClick(i, e));
    area.appendChild(container);
  });
  
  if(checkWin()) setTimeout(() => showWin(), 500);
}

function varColor(idx) { return WATER_COLORS[idx]; }

function handleTubeClick(i, e){
  if(selected < 0){
    if(tubes[i].length > 0){
      selected = i;
      SoundManager.play('select');
      window.Telegram?.WebApp?.HapticFeedback?.selectionChanged();
    }
  } else if(selected === i){
    selected = -1;
    SoundManager.play('click');
  } else {
    if(canPour(selected, i)){
      const color = tubes[selected][tubes[selected].length - 1];
      const rect = e.currentTarget.getBoundingClientRect();
      spawnParticles(rect.left + rect.width/2, rect.top, WATER_COLORS[color], 20);
      
      pour(selected, i);
      selected = -1;
      moves++;
      SoundManager.play('pour');
      window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('medium');
      
      if (isComplete(tubes[i]) && tubes[i].length === TUBE_CAP) {
        juiceShake();
        window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred('success');
      }
    } else {
      selected = i;
      SoundManager.play('select');
    }
  }
  render();
}

function canPour(from, to){
  if(tubes[from].length === 0) return false;
  if(tubes[to].length >= TUBE_CAP) return false;
  if(tubes[to].length === 0) return true;
  return tubes[to][tubes[to].length-1] === tubes[from][tubes[from].length-1];
}

function pour(from, to){
  const color = tubes[from][tubes[from].length-1];
  let count = 0;
  while(tubes[from].length > 0 && tubes[to].length < TUBE_CAP && tubes[from][tubes[from].length-1] === color){
    tubes[to].push(tubes[from].pop());
    count++;
  }
  history.push({from, to, count});
}

function isComplete(tube){
  if(tube.length === 0) return true;
  if(tube.length !== TUBE_CAP) return false;
  return tube.every(c => c === tube[0]);
}

function checkWin(){
  return tubes.every(t => isComplete(t));
}

function juiceShake() {
  document.getElementById('app').classList.add('shake');
  setTimeout(() => document.getElementById('app').classList.remove('shake'), 300);
}

function showWin(){
  const stars = extraTubesUsed === 0 ? 3 : extraTubesUsed === 1 ? 2 : 1;
  document.getElementById('modalScore').textContent = '★'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('modalSub').textContent = `Moves: ${moves}`;
  document.getElementById('modalBg').style.display = 'flex';
  SoundManager.play('complete');
  window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred('success');
}

document.getElementById('undoBtn').addEventListener('click', () => {
  if(history.length === 0) return;
  const action = history.pop();
  for(let i=0; i<action.count; i++) tubes[action.from].push(tubes[action.to].pop());
  moves--; selected = -1;
  SoundManager.play('click');
  render();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  tubes = initialState.map(t => [...t]);
  moves = 0; selected = -1; history = [];
  SoundManager.play('click');
  render();
});

document.getElementById('addTubeBtn').addEventListener('click', () => {
  if(extraTubesUsed < 2){
    tubes.push([]);
    extraTubesUsed++;
    SoundManager.play('click');
    render();
  }
});

document.getElementById('modalNext').addEventListener('click', () => {
  level++;
  document.getElementById('modalBg').style.display = 'none';
  generateLevel();
});

document.getElementById('modalShare').addEventListener('click', () => {
  const text = `💧 I completed Level ${level} of Water Pour with ${moves} moves! Can you beat me?`;
  const url = `https://t.me/eastsea_games_bot?startapp=water-pour`;
  window.Telegram?.WebApp?.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`);
});

initGame();
})();
</script>

    <!-- leaderboard-integration:water-pour -->
    <div id="leaderboard" data-lb-slug="water-pour" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "water-pour";
      const CANDIDATE_OBJECTS = ["SoundManager"];
      const END_METHODS = ["gameOver", "endGame", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["initGame", "init", "startGame", "newGame", "restart", "retry", "resetGame", "start", "beginGame", "playAgain"];
      const SCORE_KEYS = ["score", "wave", "level", "points", "gold", "coins", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>

</body>
