      codexRelay: { ko:'Relay Loom · 두 팬 이상을 거친 첫 개화가 기록됐다.', en:'Relay Loom · The first bloom routed through multiple fans was recorded.' },
      codexChain: { ko:'Chain Arbor · 같은 색 연쇄가 정원의 리듬을 만든다.', en:'Chain Arbor · Consecutive same-color blooms create the garden rhythm.' },
      codexStage: { ko:'High Terrace · 상층 정원 바람은 규칙 자체를 바꾼다.', en:'High Terrace · Upper garden winds change the rules themselves.' },
      codexStorm: { ko:'Storm Glyph · 난류를 버틴 정원만 다음 품종을 연다.', en:'Storm Glyph · Only gardens that survive shear unlock the next cultivar.' },
      codexPalette: { ko:'Prism Ledger · 모든 꽃가루 색을 수확한 날의 기록.', en:'Prism Ledger · A log for the day every pollen color was harvested.' }
    };

    const CODex = [
      { id:'relay-first', textKey:'codexRelay' },
      { id:'chain-four', textKey:'codexChain' },
      { id:'stage-four', textKey:'codexStage' },
      { id:'survive-shear', textKey:'codexStorm' },
      { id:'all-colors', textKey:'codexPalette' }

    const tg = window.TG && typeof window.TG.init === 'function' ? window.TG : null;
    if (tg) { try { tg.init(); } catch {} }
    const haptic = (kind, style) => { try { if (tg && typeof tg.haptic === 'function') tg.haptic(kind, style); } catch {} };

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    const $ = (id) => document.getElementById(id);

    const hud = $('hud');
    const controls = $('controls');
    const hintBtn = $('hintBtn');
    const titlePanel = $('titlePanel');
    const draftPanel = $('draftPanel');
    const gameoverPanel = $('gameoverPanel');
    const startBtn = $('startBtn');
    const retryBtn = $('retryBtn');
    const homeBtn = $('homeBtn');
    const langBtn = $('langBtn');
    const upgradeForceBtn = $('upgradeForceBtn');
    const upgradeRadiusBtn = $('upgradeRadiusBtn');
    const upgradeUnlockBtn = $('upgradeUnlockBtn');
    const titleTxt = $('titleTxt');
    const subTxt = $('subTxt');
    const metaTxt = $('metaTxt');
    const titleLedger = $('titleLedger');
    const titleChips = $('titleChips');
    const draftTitle = $('draftTitle');
    const draftDesc = $('draftDesc');
    const draftMeta = $('draftMeta');
    const draftChoices = $('draftChoices');
    const goTitle = $('goTitle');
    const goDesc = $('goDesc');
    const goMeta = $('goMeta');
    const goLedger = $('goLedger');
    const goChips = $('goChips');
    const toast = $('toast');
    const mScore = $('mScore');
    const mBest = $('mBest');
    const mStorm = $('mStorm');
    const mCombo = $('mCombo');
    const mStage = $('mStage');
    const mFront = $('mFront');

    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const rnd = (a, b) => a + Math.random() * (b - a);
    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

    const COLORS = [
      { fill:'#8ac2d8', glow:'#e6f8ff' },
      { fill:'#8fb88e', glow:'#ecffe8' },
      { fill:'#d7b06d', glow:'#fff1cf' },
      { fill:'#d88fa2', glow:'#ffe1ec' }
    ];

    const FRONTS = [
      { id:'sun', labelKey:'frontSun', gravity:0.88, sideWind:0, spawnShift:0.04, rareBias:0, relayMult:1 },
      { id:'cross', labelKey:'frontCross', gravity:1.0, sideWind:52, spawnShift:0, rareBias:0, relayMult:1.05 },
      { id:'shear', labelKey:'frontShear', gravity:1.16, sideWind:28, spawnShift:-0.06, rareBias:0, relayMult:1.1 },
      { id:'tide', labelKey:'frontTide', gravity:0.98, sideWind:0, spawnShift:0, rareBias:0.18, relayMult:1.18 }
    ];

    const DRAFTS = [
      { id:'wideArc', name:{ ko:'Canopy Arc', en:'Canopy Arc' }, desc:{ ko:'팬 반경 +18. 더 넓은 곡선을 만든다.', en:'Fan radius +18. Draw wider curves.' }, apply:g=>{ g.mods.radiusBonus += 18; } },
      { id:'relayWire', name:{ ko:'Relay Wire', en:'Relay Wire' }, desc:{ ko:'Relay Bloom 추가 점수 +12.', en:'Relay Bloom bonus score +12.' }, apply:g=>{ g.mods.relayBonus += 12; } },
      { id:'calmLoop', name:{ ko:'Calm Loop', en:'Calm Loop' }, desc:{ ko:'Bloom Chain 유지 시간 +0.35초.', en:'Bloom Chain timer +0.35s.' }, apply:g=>{ g.mods.comboWindow += 0.35; } },
      { id:'stormLatch', name:{ ko:'Storm Latch', en:'Storm Latch' }, desc:{ ko:'즉시 Storm +12, 이후 단계 상승 회복 +4.', en:'Gain Storm +12 now and +4 on future stage ups.' }, apply:g=>{ g.mods.stageStormBonus += 4; g.storm = clamp(g.storm + 12, 0, 100); } },
      { id:'petalMint', name:{ ko:'Petal Mint', en:'Petal Mint' }, desc:{ ko:'일반 수확 점수 +3.', en:'Base harvest score +3.' }, apply:g=>{ g.mods.harvestBonus += 3; } },
      { id:'prismLedger', name:{ ko:'Prism Ledger', en:'Prism Ledger' }, desc:{ ko:'최고 색상 수확 보너스 강화.', en:'Boost the highest color harvest score.' }, apply:g=>{ g.mods.rareBonus += 0.45; } },
      { id:'tailwind', name:{ ko:'Tailwind Coil', en:'Tailwind Coil' }, desc:{ ko:'팬 출력 +28.', en:'Fan power +28.' }, apply:g=>{ g.mods.forceBonus += 28; } }
    ];

    let W = 390;
    let H = 844;
    let DPR = Math.min(2, window.devicePixelRatio || 1);
    let audioCtx = null;

    function ensureAudio() {
      if (audioCtx) return audioCtx;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
      return audioCtx;
    }

    function tone(freq, dur = 0.06, type = 'sine', vol = 0.04, slide = 0) {
      const ac = ensureAudio();
      if (!ac) return;
      const t = ac.currentTime;
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t);
      if (slide) o.frequency.linearRampToValueAtTime(freq + slide, t + dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol, t + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(ac.destination);
      o.start(t); o.stop(t + dur + 0.01);
    }

    function sfxCollect() { tone(560, 0.07, 'triangle', 0.04, 90); }
    function sfxMiss() { tone(180, 0.14, 'sawtooth', 0.045, -30); }
    function sfxRotate() { tone(400, 0.05, 'square', 0.028, 24); }
    function sfxLevel() { tone(470, 0.07, 'triangle', 0.04, 80); setTimeout(() => tone(650, 0.08, 'triangle', 0.04, 140), 46); }
    function sfxRelay() { tone(720, 0.06, 'triangle', 0.038, 160); setTimeout(() => tone(960, 0.07, 'triangle', 0.038, 180), 55); }

    function fallbackSave() {
      return {
        best: 0,
        credits: 0,
        maxStage: 1,
        lang: 'ko',
        upgrades: { force: 0, radius: 0, unlock: 0 },
        codex: [],
        recentTitleId: 'titleFallback'
      };
    }

    function normalizeSave(raw) {
      const base = fallbackSave();
      const p = raw || {};
      return {
        best: Number.isFinite(+p.best) ? +p.best : base.best,
        credits: Number.isFinite(+p.credits) ? +p.credits : base.credits,
        maxStage: Number.isFinite(+p.maxStage) ? +p.maxStage : base.maxStage,
        lang: p.lang === 'en' ? 'en' : 'ko',
        upgrades: {
          force: clamp((p.upgrades && Number.isFinite(+p.upgrades.force) ? +p.upgrades.force : 0), 0, 5),
          radius: clamp((p.upgrades && Number.isFinite(+p.upgrades.radius) ? +p.upgrades.radius : 0), 0, 5),
          unlock: clamp((p.upgrades && Number.isFinite(+p.upgrades.unlock) ? +p.upgrades.unlock : 0), 0, 2)
        },
        codex: Array.isArray(p.codex) ? p.codex.filter(id => CODex.some(item => item.id === id)) : [],
        recentTitleId: TITLE_IDS.includes(p.recentTitleId) ? p.recentTitleId : 'titleFallback'
      };
    }

    function loadSave() {
      try {
        const v2 = localStorage.getItem(STORAGE_KEY);
        if (v2) return normalizeSave(JSON.parse(v2));
      } catch {}
      try {
        const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (legacy) return normalizeSave(JSON.parse(legacy));
      } catch {}
      return fallbackSave();
    }

    const meta = loadSave();
    let lang = meta.lang;

    function textOf(entry) {
      if (!entry) return '';
      return entry[lang] || entry.en || entry.ko || '';
    }
    function T(key, vars) {
      let text = textOf(TEXT[key]) || key;
      if (vars) Object.keys(vars).forEach((v) => { text = text.replaceAll(`{${v}}`, String(vars[v])); });
      return text;
    }

    function persist() {
      meta.lang = lang;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(meta));
    }

    const game = {
      state: 'title',
      score: 0,
      combo: 0,
      comboPeak: 0,
      comboTimer: 0,
      storm: 100,
      stage: 1,
      stageFill: 0,
      stageGoal: 8,
      earned: 0,
      fans: [],
      orbs: [],
      bursts: [],
      pods: [],
      spawnTimer: 0,
      backgroundPulse: 0,
      reachedStage: 1,
      relayHarvests: 0,
      lastHarvestColor: null,
      harvestedColors: new Set(),
      seenFronts: new Set(),
      offeredDrafts: [],
      frontIndex: 0,
      front: FRONTS[0],
      lastFrontMessage: '',
      codexUnlockedThisRun: [],
      mods: {
        forceBonus: 0,
        radiusBonus: 0,
        relayBonus: 0,
        comboWindow: 0,
        stageStormBonus: 0,
        harvestBonus: 0,
        rareBonus: 0
      },
      pointer: {
        active: false,
        id: -1,
        fanIndex: -1,
        sx: 0,
        sy: 0,
        moved: false
      }
    };

    const DIR = [
      { x:1, y:0 },
      { x:0, y:1 },
      { x:-1, y:0 },
      { x:0, y:-1 }
    ];

    function colorCount() { return 2 + meta.upgrades.unlock; }
    function baseForcePower() { return 220 + meta.upgrades.force * 42 + game.mods.forceBonus; }
    function baseFanRadius() { return 94 + meta.upgrades.radius * 14 + game.mods.radiusBonus; }

    function currentFrontLabel() {
      return T(game.front.labelKey);
    }

    function codexTextById(id) {
      const found = CODex.find(item => item.id === id);
      return found ? T(found.textKey) : '';
    }

    function titleLabel(id) {
      return T(id || 'titleFallback');
    }

    function makeFans() {
      const y0 = H * 0.53;
      return [
        { x: W * 0.24, y: y0, dir: 1 },
        { x: W * 0.50, y: y0 - 44, dir: 1 },
        { x: W * 0.76, y: y0, dir: 1 }
      ];
    }

    function makePods() {
      const count = 4;
      const arr = [];
      const usable = colorCount();
      const y = H - 122;
      const w = Math.max(56, W * 0.18);
      for (let i = 0; i < count; i++) {
        arr.push({ x: ((i + 0.5) / count) * W, y, w, h: 30, color: i % usable, pulse: 0 });
      }
      return arr;
    }

    function orbSpawnInterval() {
      return Math.max(0.24, 1.05 - game.stage * 0.05 - game.front.spawnShift);
    }

    function stageGoal(stage) {
      return 8 + Math.floor(Math.max(0, stage - 1) * 2.4);
    }

    function chooseFrontForStage(stage) {
      return FRONTS[(stage - 1) % FRONTS.length];
    }

    function setFront(stage, announce = false) {
      game.front = chooseFrontForStage(stage);
      game.frontIndex = FRONTS.indexOf(game.front);
      game.seenFronts.add(game.front.id);
      if (announce) {
        const msg = `${T('frontLabel')} · ${currentFrontLabel()}`;
        game.lastFrontMessage = msg;
        showToast(msg, 920);
      }
    }

    function resetRun() {
      game.score = 0;
      game.combo = 0;
      game.comboPeak = 0;
      game.comboTimer = 0;
      game.storm = 100;
      game.stage = 1;
      game.stageFill = 0;
      game.stageGoal = stageGoal(1);
      game.earned = 0;
      game.reachedStage = 1;
      game.relayHarvests = 0;
      game.lastHarvestColor = null;
      game.fans = makeFans();
      game.orbs = [];
      game.bursts = [];
      game.pods = makePods();
      game.spawnTimer = 0.3;
      game.backgroundPulse = 0;
      game.harvestedColors = new Set();
      game.seenFronts = new Set();
      game.offeredDrafts = [];
      game.codexUnlockedThisRun = [];
      game.mods = {
        forceBonus: 0,
        radiusBonus: 0,
        relayBonus: 0,
        comboWindow: 0,
        stageStormBonus: 0,
        harvestBonus: 0,
        rareBonus: 0
      };
      setFront(1, false);
    }

    function resize() {
      DPR = Math.min(2, window.devicePixelRatio || 1);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      if (game.state !== 'play' && game.state !== 'draft') {
        game.fans = makeFans();
        game.pods = makePods();
      }
    }

    function showToast(text, ms = 680) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
    }

    function setPanels(mode) {
      titlePanel.classList.toggle('hidden', mode !== 'title');
      draftPanel.classList.toggle('hidden', mode !== 'draft');
      gameoverPanel.classList.toggle('hidden', mode !== 'gameover');
    }

    function popcount(n) {
      let c = 0;
      let v = n >>> 0;
      while (v) { c += v & 1; v >>>= 1; }
      return c;
    }

    function unlockCodex(id) {
      if (meta.codex.includes(id)) return false;
      meta.codex.push(id);
      persist();
      game.codexUnlockedThisRun.push(id);
      showToast(codexTextById(id), 1250);
      return true;
    }

    function deriveRecentTitleId() {
      if (game.relayHarvests >= 8) return 'titleRelay';
      if (game.seenFronts.has('shear') && game.reachedStage >= 5) return 'titleStorm';
      if (game.harvestedColors.size >= colorCount()) return 'titlePrism';
      if (game.comboPeak >= 6) return 'titleConductor';
      return 'titleFallback';
    }

    function updateTitleLedger() {
      titleLedger.innerHTML = [
        { label:T('bestLabel'), value:meta.best },
        { label:T('stageLabel'), value:meta.maxStage },
        { label:T('earned'), value:meta.credits },
        { label:T('codexLabel'), value:meta.codex.length }
      ].map(item => `<div class="tile">${item.label}<b>${item.value}</b></div>`).join('');

      titleChips.innerHTML = '';
      const lastText = titleLabel(meta.recentTitleId);
      if (lastText) {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.textContent = `${T('recentTitleLabel')}: ${lastText}`;
        titleChips.appendChild(chip);
      }
      const latestCodex = meta.codex.length ? codexTextById(meta.codex[meta.codex.length - 1]) : '';
      if (latestCodex) {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.textContent = latestCodex;
        titleChips.appendChild(chip);
      }
    }

    function syncHud() {
      mScore.textContent = `${T('scoreLabel')} ${game.score}`;
      mBest.textContent = `${T('bestLabel')} ${meta.best}`;
      mStorm.innerHTML = `${T('stormLabel')} <b>${Math.max(0, Math.floor(game.storm))}</b>`;
      mCombo.textContent = `${T('comboLabel')} x${game.combo}`;
      mStage.textContent = `${T('stageLabel')} ${game.stage} · ${game.stageFill}/${game.stageGoal}`;
      mFront.textContent = `${T('frontLabel')} ${currentFrontLabel()}`;
      hintBtn.textContent = T('hint');
    }

    function syncText() {
      titleTxt.textContent = T('title');
      subTxt.textContent = T('subtitle');
      metaTxt.textContent = T('titleMeta', { best: meta.best, credits: meta.credits, maxStage: meta.maxStage, codex: meta.codex.length });
      startBtn.textContent = T('start');
      retryBtn.textContent = T('retry');
      homeBtn.textContent = T('home');
      goTitle.textContent = T('gameover');
      goDesc.textContent = T('gameoverDesc');
      draftTitle.textContent = T('draftTitle');
      draftDesc.textContent = T('draftDesc');
      langBtn.textContent = lang === 'ko' ? T('langEn') : T('langKo');
      syncUpgradeText();
      updateTitleLedger();
      syncHud();
    }

    function upCost(type) {
      if (type === 'force') return 70 + meta.upgrades.force * 50;
      if (type === 'radius') return 80 + meta.upgrades.radius * 55;
      if (type === 'unlock') return 140 + meta.upgrades.unlock * 120;
      return 999;
    }

    function syncUpgradeText() {
      const fLv = meta.upgrades.force;
      const rLv = meta.upgrades.radius;
      const uLv = meta.upgrades.unlock;
      upgradeForceBtn.textContent = fLv >= 5 ? `${T('forceUp')} · ${T('maxed')}` : `${T('forceUp')} Lv.${fLv} · ${upCost('force')}c`;
      upgradeRadiusBtn.textContent = rLv >= 5 ? `${T('radiusUp')} · ${T('maxed')}` : `${T('radiusUp')} Lv.${rLv} · ${upCost('radius')}c`;
      upgradeUnlockBtn.textContent = uLv >= 2 ? `${T('unlockUp')} · ${T('maxed')}` : `${T('unlockUp')} Lv.${uLv} · ${upCost('unlock')}c (2→${2 + meta.upgrades.unlock})`;
      metaTxt.textContent = T('titleMeta', { best: meta.best, credits: meta.credits, maxStage: meta.maxStage, codex: meta.codex.length });
      updateTitleLedger();
    }

    function buyUpgrade(key) {
      const lv = meta.upgrades[key];
      const max = key === 'unlock' ? 2 : 5;
      if (lv >= max) {
        showToast(T('maxed'));
        return false;
      }
      const cost = upCost(key);
      if (meta.credits < cost) {
        showToast(T('needCredit'));
        return false;
      }
      meta.credits -= cost;
      meta.upgrades[key] += 1;
      persist();
      syncUpgradeText();
      showToast(T('bought'));
      haptic('impact', 'light');
      return true;
    }

    function showTitle() {
      game.state = 'title';
      hud.classList.remove('show');
      controls.classList.remove('show');
      setPanels('title');
      syncText();
    }

    function startRun() {
      ensureAudio();
      resetRun();
      game.state = 'play';
      setPanels('none');
      hud.classList.add('show');
      controls.classList.add('show');
      syncHud();
      showToast(T('hint'), 1200);
      haptic('impact', 'light');
    }

    function endRun() {
      game.state = 'gameover';
      hud.classList.remove('show');
      controls.classList.remove('show');
      game.earned = Math.max(8, Math.floor(game.score / 18) + game.stage * 2 + game.relayHarvests);
      meta.credits += game.earned;
      if (game.score > meta.best) meta.best = game.score;
      if (game.reachedStage > meta.maxStage) meta.maxStage = game.reachedStage;
      meta.recentTitleId = deriveRecentTitleId();
      persist();

      goMeta.textContent = T('gameMeta', { score: game.score, stage: game.stage, earned: game.earned, relay: game.relayHarvests });
      goLedger.innerHTML = [
        { label:T('scoreLabel'), value:game.score },
        { label:T('stageLabel'), value:game.reachedStage },
        { label:T('earned'), value:game.earned },
        { label:T('codexLabel'), value:meta.codex.length }
      ].map(item => `<div class="tile">${item.label}<b>${item.value}</b></div>`).join('');
      goChips.innerHTML = '';
      const titleChip = document.createElement('div');
      titleChip.className = 'chip';
      titleChip.textContent = `${T('recentTitleLabel')}: ${titleLabel(meta.recentTitleId)}`;
      goChips.appendChild(titleChip);
      const relayChip = document.createElement('div');
      relayChip.className = 'chip';
      relayChip.textContent = `Relay ${game.relayHarvests}`;
      goChips.appendChild(relayChip);
      if (game.codexUnlockedThisRun.length) {
        const codexChip = document.createElement('div');
        codexChip.className = 'chip';
        codexChip.textContent = codexTextById(game.codexUnlockedThisRun[game.codexUnlockedThisRun.length - 1]);
        goChips.appendChild(codexChip);
      }
      setPanels('gameover');

      try {
        if (window.Leaderboard && typeof window.Leaderboard.submitScore === 'function') {
          window.Leaderboard.submitScore(game.score);
        }
      } catch {}
    }

    function spawnOrb(custom = null) {
      const colors = colorCount();
      let color = Math.floor(Math.random() * colors);
      if (!custom && game.front.id === 'tide' && Math.random() < game.front.rareBias) {
        color = colors - 1;
      }
      const o = custom || {
        x: rnd(30, W - 30),
        y: -24,
        vx: rnd(-36, 36),
        vy: rnd(34, 74) + game.stage * 4,
        r: rnd(8, 12),
        color,
        life: 0,
        touchMask: 0
      };
      game.orbs.push(o);
      return o;
    }

    function burst(x, y, color, power = 1) {
      for (let i = 0; i < 9 * power; i++) {
        const ang = rnd(0, Math.PI * 2);
        const sp = rnd(50, 160) * power;
        game.bursts.push({ x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, life: rnd(0.3, 0.65), age: 0, color });
      }
    }

    function openDraft() {
      game.state = 'draft';
      game.offeredDrafts = shuffle(DRAFTS).slice(0, 3);
      renderDraft();
      setPanels('draft');
    }

    function renderDraft() {
      draftMeta.textContent = T('draftMeta', { front: currentFrontLabel() });
      draftChoices.innerHTML = '';
      game.offeredDrafts.forEach(item => {
        const button = document.createElement('button');
        button.className = 'draft-card';
        button.innerHTML = `<strong>${textOf(item.name)}</strong><span>${textOf(item.desc)}</span>`;
        button.addEventListener('click', () => chooseDraft(item.id));
        draftChoices.appendChild(button);
      });
    }

    function chooseDraft(id) {
      const picked = game.offeredDrafts.find(item => item.id === id);
      if (!picked) return;
      picked.apply(game);
      setPanels('none');
      game.state = 'play';
      syncHud();
      showToast(`${T('draftTitle')} · ${textOf(picked.name)}`, 900);
      haptic('notification', 'success');
    }

    function handleHarvest(orb, pod) {
      const relayCount = popcount(orb.touchMask);
      const isRelay = relayCount >= 2;
      const sameColorChain = (game.comboTimer > 0 && game.lastHarvestColor === orb.color);
      game.combo = sameColorChain ? game.combo + 1 : 1;
      game.comboPeak = Math.max(game.comboPeak, game.combo);
      game.comboTimer = 1.1 + game.mods.comboWindow;
      game.lastHarvestColor = orb.color;
      game.harvestedColors.add(orb.color);
      pod.pulse = 1;

      const rareHit = orb.color === colorCount() - 1 ? (game.mods.rareBonus * 10) : 0;
      const relayBonus = isRelay ? (10 + relayCount * 6 + game.mods.relayBonus) * game.front.relayMult : 0;
      const gain = Math.round(7 + Math.floor(game.stage * 0.8) + game.combo * 2 + game.mods.harvestBonus + rareHit + relayBonus);
      game.score += gain;
      game.stageFill += 1;
      burst(orb.x, orb.y, COLORS[orb.color].fill, isRelay ? 2 : 1);
      isRelay ? sfxRelay() : sfxCollect();
      haptic('impact', isRelay ? 'medium' : 'light');

      if (isRelay) {
        game.relayHarvests += 1;
        showToast(`${T('relay')} +${Math.round(relayBonus)}`);
        unlockCodex('relay-first');
      }
      if (game.combo >= 4) unlockCodex('chain-four');
      if (game.harvestedColors.size >= colorCount()) unlockCodex('all-colors');

      if (game.stageFill >= game.stageGoal) {
        game.stage += 1;
        game.reachedStage = Math.max(game.reachedStage, game.stage);
        game.stageFill = 0;
        game.stageGoal = stageGoal(game.stage);
        game.storm = clamp(game.storm + 12 + game.mods.stageStormBonus, 0, 100);
        setFront(game.stage, true);
        sfxLevel();
        haptic('notification', 'success');
        if (game.stage >= 4) unlockCodex('stage-four');
        if (game.front.id === 'shear') unlockCodex('survive-shear');
        openDraft();
      }
    }

    function handleMiss(x, y) {
      game.combo = 0;
      game.comboTimer = 0;
      game.lastHarvestColor = null;
      game.storm -= game.front.id === 'shear' ? 15 : 13;
      burst(x, y, '#e9c1bd', 1);
      sfxMiss();
      haptic('notification', 'error');
      showToast(T('failed'), 420);
      if (game.storm <= 0) {
        game.storm = 0;
        endRun();
      }
    }

    function updatePlay(dt, now) {
      game.backgroundPulse += dt;
      game.comboTimer = Math.max(0, game.comboTimer - dt);
      if (game.comboTimer <= 0) {
        game.combo = 0;
        game.lastHarvestColor = null;
      }

      game.spawnTimer -= dt;
      if (game.spawnTimer <= 0) {
        spawnOrb();
        game.spawnTimer = orbSpawnInterval();
      }

      const g = (120 + game.stage * 8) * game.front.gravity;
      const fPower = baseForcePower();
      const fRadius = baseFanRadius();
      const playFloorY = H - 96;

      for (let i = game.orbs.length - 1; i >= 0; i--) {
        const o = game.orbs[i];
        o.life += dt;
        o.vy += g * dt;
        if (game.front.sideWind) {
          o.vx += Math.sin((now * 0.001) + o.y * 0.01 + i) * game.front.sideWind * dt;
        }

        for (let j = 0; j < game.fans.length; j++) {
          const f = game.fans[j];
          const dx = o.x - f.x;
          const dy = o.y - f.y;
          const dist = Math.hypot(dx, dy);
          if (dist < fRadius) {
            o.touchMask |= (1 << j);
            const p = (1 - dist / fRadius);
            const dir = DIR[f.dir];
            const accel = fPower * p;
            o.vx += dir.x * accel * dt;
            o.vy += dir.y * accel * dt;
            o.vx += (-dy / Math.max(12, dist)) * 16 * p * dt;
          }
        }

        o.x += o.vx * dt;
        o.y += o.vy * dt;

        if (o.x < o.r) { o.x = o.r; o.vx *= -0.62; }
        if (o.x > W - o.r) { o.x = W - o.r; o.vx *= -0.62; }

        if (o.y > playFloorY) {
          let podHit = null;
          for (let p = 0; p < game.pods.length; p++) {
            const pod = game.pods[p];
            if (Math.abs(o.x - pod.x) <= pod.w * 0.5) { podHit = pod; break; }
          }
          if (podHit && podHit.color === o.color) {
            handleHarvest(o, podHit);
          } else {
            handleMiss(o.x, Math.min(H - 110, o.y));
          }
          game.orbs.splice(i, 1);
          continue;
        }

        if (o.y > H + 60 || o.life > 12) {
          game.orbs.splice(i, 1);
          handleMiss(o.x, H - 110);
        }
      }

      for (let i = game.bursts.length - 1; i >= 0; i--) {
        const b = game.bursts[i];
        b.age += dt;
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.vx *= 0.98;
        b.vy *= 0.98;
        if (b.age > b.life) game.bursts.splice(i, 1);
      }

      for (const pod of game.pods) pod.pulse = Math.max(0, pod.pulse - dt * 2.6);
      syncHud();
    }

    function drawBackground(now) {
      const t = now * 0.001;
      const pulse = 0.08 + Math.sin(t * 1.3 + game.backgroundPulse * 2.1) * 0.05;
      const grd = ctx.createLinearGradient(0, 0, 0, H);
      grd.addColorStop(0, `rgba(245,249,246,${0.96 + pulse * 0.1})`);
      grd.addColorStop(0.35, '#d6ede8');
      grd.addColorStop(1, '#86af9f');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);

      ctx.globalAlpha = 0.09;
      ctx.strokeStyle = '#b6dcd3';
      ctx.lineWidth = 1;
      for (let y = 88; y < H - 120; y += 44) {
        ctx.beginPath();
        ctx.moveTo(0, y + Math.sin((t * 0.8) + y * 0.01) * 2.2);
        ctx.lineTo(W, y + Math.cos((t * 0.8) + y * 0.01) * 2.2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      if (game.front.id === 'cross') {
        ctx.globalAlpha = 0.14;
        ctx.strokeStyle = '#8ab8c4';
        for (let i = 0; i < 6; i++) {
          const y = 140 + i * 82;
          ctx.beginPath();
          ctx.moveTo(18, y);
          ctx.lineTo(W - 18, y - 20);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
    }

    function drawPods() {
      const y = H - 108;
      ctx.fillStyle = 'rgba(234,227,208,.84)';
      ctx.fillRect(0, y - 26, W, 70);

      for (const pod of game.pods) {
        const cc = COLORS[pod.color];
        const pulse = pod.pulse;
        const w = pod.w + pulse * 8;
        const h = pod.h + pulse * 4;

        ctx.fillStyle = 'rgba(255,248,236,.95)';
        roundRect(ctx, pod.x - w * 0.5, pod.y - h * 0.6, w, h, 8, true);
        ctx.globalAlpha = 0.38 + pulse * 0.4;
        ctx.fillStyle = cc.fill;
        roundRect(ctx, pod.x - w * 0.46, pod.y - h * 0.45, w * 0.92, h * 0.38, 6, true);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = cc.glow;
        ctx.lineWidth = 2;
        roundRect(ctx, pod.x - w * 0.5, pod.y - h * 0.6, w, h, 8, false);
      }
    }

    function drawFans() {
      const rad = baseFanRadius();
      for (let i = 0; i < game.fans.length; i++) {
        const f = game.fans[i];
        const active = game.pointer.active && game.pointer.fanIndex === i;
        ctx.globalAlpha = 0.14;
        ctx.fillStyle = '#9fc8b8';
        ctx.beginPath(); ctx.arc(f.x, f.y, rad, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.98;
        ctx.fillStyle = active ? '#e6d18b' : '#8ec5b0';
        ctx.beginPath(); ctx.arc(f.x, f.y, 22, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#fef8ee';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(f.x, f.y, 22, 0, Math.PI * 2); ctx.stroke();

        const d = DIR[f.dir];
        const tx = f.x + d.x * 15;
        const ty = f.y + d.y * 15;
        ctx.strokeStyle = '#465449';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(f.x - d.x * 10, f.y - d.y * 10); ctx.lineTo(tx, ty); ctx.stroke();
        const px = tx + d.x * 6;
        const py = ty + d.y * 6;
        const nx = -d.y;
        const ny = d.x;
        ctx.fillStyle = '#465449';
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px - d.x * 8 + nx * 5, py - d.y * 8 + ny * 5);
        ctx.lineTo(px - d.x * 8 - nx * 5, py - d.y * 8 - ny * 5);
        ctx.closePath();
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawOrbs() {
      for (const o of game.orbs) {
        const c = COLORS[o.color];
        const relayGlow = popcount(o.touchMask) >= 2 ? 1.45 : 1;
        ctx.globalAlpha = 0.26;
        ctx.fillStyle = c.glow;
        ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 2.1 * relayGlow, 0, Math.PI * 2); ctx.fill();
        const g = ctx.createRadialGradient(o.x - o.r * 0.3, o.y - o.r * 0.4, 1, o.x, o.y, o.r * relayGlow);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(0.42, c.glow);
        g.addColorStop(1, c.fill);
        ctx.globalAlpha = 1;
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawBursts() {
      for (const b of game.bursts) {
        const alpha = 1 - (b.age / b.life);
        if (alpha <= 0) continue;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 2.3 + alpha * 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawTitleBackdrop() {
      if (game.state === 'play') return;
      ctx.fillStyle = 'rgba(255,250,241,.16)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(173,210,199,.18)';
      for (let i = 0; i < 5; i++) {
        const x = (i + 1) * (W / 6);
        const y = H * (0.26 + i * 0.1);
        ctx.beginPath();
        ctx.arc(x, y, 14 + i * 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function roundRect(ctx2, x, y, w, h, r, fill = false) {
      const rr = Math.min(r, w * 0.5, h * 0.5);
      ctx2.beginPath();
      ctx2.moveTo(x + rr, y);
      ctx2.arcTo(x + w, y, x + w, y + h, rr);
      ctx2.arcTo(x + w, y + h, x, y + h, rr);
      ctx2.arcTo(x, y + h, x, y, rr);
      ctx2.arcTo(x, y, x + w, y, rr);
      ctx2.closePath();
      if (fill) ctx2.fill(); else ctx2.stroke();
    }

    function screenToCanvas(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function pickFan(x, y) {
      let best = -1;
      let bestD = Infinity;
      for (let i = 0; i < game.fans.length; i++) {
        const f = game.fans[i];
        const d = Math.hypot(x - f.x, y - f.y);
        if (d < 30 && d < bestD) { best = i; bestD = d; }
      }
      return best;
    }

    function rotateFan(idx) {
      const f = game.fans[idx];
      if (!f) return;
      f.dir = (f.dir + 1) % 4;
      sfxRotate();
      haptic('impact', 'soft');
    }

    function onPointerDown(e) {
      if (game.state !== 'play') return;
      ensureAudio();
      const p = screenToCanvas(e.clientX, e.clientY);
      const idx = pickFan(p.x, p.y);
      if (idx === -1) return;
      game.pointer.active = true;
      game.pointer.id = e.pointerId;
      game.pointer.fanIndex = idx;
      game.pointer.sx = p.x;
      game.pointer.sy = p.y;
      game.pointer.moved = false;
      canvas.setPointerCapture(e.pointerId);
    }

    function onPointerMove(e) {
      if (!game.pointer.active || e.pointerId !== game.pointer.id || game.state !== 'play') return;
      const p = screenToCanvas(e.clientX, e.clientY);
      const f = game.fans[game.pointer.fanIndex];
      if (!f) return;
      if (Math.hypot(p.x - game.pointer.sx, p.y - game.pointer.sy) > 8) game.pointer.moved = true;
      f.x = clamp(p.x, 34, W - 34);
      f.y = clamp(p.y, 118, H - 168);
    }

    function onPointerUp(e) {
      if (!game.pointer.active || e.pointerId !== game.pointer.id) return;
      if (game.state === 'play' && !game.pointer.moved && game.pointer.fanIndex >= 0) rotateFan(game.pointer.fanIndex);
      game.pointer.active = false;
      game.pointer.id = -1;
      game.pointer.fanIndex = -1;
      game.pointer.moved = false;
    }

    canvas.addEventListener('pointerdown', onPointerDown, { passive: true });
    canvas.addEventListener('pointermove', onPointerMove, { passive: true });
    canvas.addEventListener('pointerup', onPointerUp, { passive: true });
    canvas.addEventListener('pointercancel', onPointerUp, { passive: true });

    startBtn.addEventListener('click', startRun);
    retryBtn.addEventListener('click', startRun);
    homeBtn.addEventListener('click', showTitle);
    hintBtn.addEventListener('click', () => showToast(T('hint')));
    langBtn.addEventListener('click', () => {
      lang = lang === 'ko' ? 'en' : 'ko';
      persist();
      syncText();
    });
    upgradeForceBtn.addEventListener('click', () => buyUpgrade('force'));
    upgradeRadiusBtn.addEventListener('click', () => buyUpgrade('radius'));
    upgradeUnlockBtn.addEventListener('click', () => buyUpgrade('unlock'));

    function render(now) {
      drawBackground(now);
      drawPods();
      drawFans();
      drawOrbs();
      drawBursts();
      drawTitleBackdrop();
    }

    let last = performance.now();
    function loop(now) {
      const dt = clamp((now - last) / 1000, 0, 0.05);
      last = now;
      if (game.state === 'play') updatePlay(dt, now);
      render(now);
      requestAnimationFrame(loop);
    }

    function shuffle(arr) {
      const copy = arr.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    resize();
    window.addEventListener('resize', resize);

    try {
      if (window.Leaderboard && typeof window.Leaderboard.renderBoard === 'function') {
        window.Leaderboard.renderBoard('leaderboard');
      }
    } catch {}

    syncText();
    showTitle();
    requestAnimationFrame(loop);

    window.__windGardenForge = {
      start: startRun,
      retry: startRun,
      home: showTitle,
      getState: () => game.state,
      getMetrics: () => ({ score: game.score, stage: game.stage, storm: game.storm, combo: game.combo, fill: game.stageFill, goal: game.stageGoal, relay: game.relayHarvests, front: game.front.id }),
      getFans: () => game.fans.map(f => ({ x: f.x, y: f.y, dir: f.dir })),
      rotateFan,
      moveFan: (i, x, y) => {
        const f = game.fans[i];
        if (!f) return null;
        f.x = clamp(+x || f.x, 34, W - 34);
        f.y = clamp(+y || f.y, 118, H - 168);
        return { x: f.x, y: f.y, dir: f.dir };
      },
      debugHarvest: (n = 1, relay = false) => {
        if (game.state !== 'play') return false;
        for (let i = 0; i < n; i++) {
          const pod = game.pods[i % game.pods.length];
          handleHarvest({ x: pod.x, y: pod.y - 18, color: pod.color, touchMask: relay ? 3 : 1 }, pod);
        }
        return true;
      },
      debugMiss: (n = 1) => {
        if (game.state !== 'play') return false;
        for (let i = 0; i < n; i++) handleMiss(W * 0.5, H - 120);
        return true;
      },
      forceDraft: () => {
        if (game.state !== 'play') return false;
        openDraft();
        return true;
      },
      getDraftIds: () => game.offeredDrafts.map(item => item.id),
      getCodex: () => meta.codex.slice(),
      getRecentTitleId: () => meta.recentTitleId,
      chooseDraft,
      forceGameOver: () => {
        if (game.state !== 'play') return false;
        game.storm = 0;
        endRun();
        return true;
      },
      addCredits: (n = 0) => { meta.credits += Number(n) || 0; persist(); syncUpgradeText(); return meta.credits; },
      buy: buyUpgrade,
      toggleLang: () => { langBtn.click(); return lang; },
      setFront: (id) => {
        const found = FRONTS.find(item => item.id === id);
        if (!found) return null;
        game.front = found;
        syncHud();
        return found.id;
      },
      getSave: () => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
      },
      clearSave: () => {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(LEGACY_STORAGE_KEY);
        const base = fallbackSave();
        Object.assign(meta, base);
        lang = meta.lang;
        syncText();
        return true;
      },
      storageKey: STORAGE_KEY
    };
  })();
  </script>
