<style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;

        #container {
            background: white;

<body>
    <div id="container">
        <h1>🔍 Word Search</h1>
        <div id="game">
            <div id="board"></div>
            <div id="wordList"></div>
        </div>
        <div id="controls">
            <button onclick="newGame('easy')">Easy (8×8)</button>
            <button onclick="newGame('medium')">Medium (12×12)</button>
            <button onclick="newGame('hard')">Hard (15×15)</button>
        </div>
    </div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, dur) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        const wordLists = {
            easy: ['CAT', 'DOG', 'FISH', 'BIRD', 'LION', 'BEAR'],
            medium: ['TIGER', 'ELEPHANT', 'MONKEY', 'GIRAFFE', 'ZEBRA', 'PANDA', 'KOALA', 'SNAKE'],
            hard: ['BUTTERFLY', 'CROCODILE', 'HIPPOPOTAMUS', 'RHINOCEROS', 'CHEETAH', 'LEOPARD', 'KANGAROO', 'PENGUIN', 'DOLPHIN', 'OCTOPUS']
        };

        let size = 8;
        let grid = [];
        let words = [];
        let foundWords = new Set();
        let selecting = false;
        let selectedCells = [];

        function newGame(difficulty) {
            size = difficulty === 'easy' ? 8 : difficulty === 'medium' ? 12 : 15;
            words = [...wordLists[difficulty]];
            foundWords.clear();
            
            // Initialize grid
            grid = Array(size).fill().map(() => Array(size).fill(''));
            
            // Place words
            words.forEach(word => placeWord(word));
            
            // Fill empty cells
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (!grid[r][c]) {
                        grid[r][c] = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                    }
                }
            }
            
            render();
        }

        function placeWord(word) {
            const directions = [
                [0, 1],   // horizontal
                [1, 0],   // vertical
                [1, 1],   // diagonal down-right
                [1, -1]   // diagonal down-left
            ];
            
            let placed = false;
            let attempts = 0;
            
            while (!placed && attempts < 100) {
                attempts++;
                const dir = directions[Math.floor(Math.random() * directions.length)];
                const row = Math.floor(Math.random() * size);
                const col = Math.floor(Math.random() * size);
                
                if (canPlaceWord(word, row, col, dir)) {
                    for (let i = 0; i < word.length; i++) {
                        const r = row + dir[0] * i;
                        const c = col + dir[1] * i;
                        grid[r][c] = word[i];
                    }
                    placed = true;
                }
            }
        }

        function canPlaceWord(word, row, col, dir) {
            for (let i = 0; i < word.length; i++) {
                const r = row + dir[0] * i;
                const c = col + dir[1] * i;
                
                if (r < 0 || r >= size || c < 0 || c >= size) return false;
                if (grid[r][c] && grid[r][c] !== word[i]) return false;
            }
            return true;
        }

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = grid[r][c];
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    cell.addEventListener('mousedown', () => startSelection(r, c));
                    cell.addEventListener('mouseenter', () => continueSelection(r, c));
                    cell.addEventListener('mouseup', endSelection);
                    cell.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        startSelection(r, c);
                    });
                    cell.addEventListener('touchmove', (e) => {
                        e.preventDefault();
                        const touch = e.touches[0];
                        const el = document.elementFromPoint(touch.clientX, touch.clientY);
                        if (el && el.classList.contains('cell')) {
                            continueSelection(parseInt(el.dataset.row), parseInt(el.dataset.col));
                        }
                    });
                    cell.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        endSelection();
                    });
                    
                    board.appendChild(cell);
                }
            }

            renderWordList();
        }

        function renderWordList() {
            const list = document.getElementById('wordList');
            list.innerHTML = '<h3>Find These Words:</h3>';
            words.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word';
                div.textContent = word;
                if (foundWords.has(word)) div.classList.add('found');
                list.appendChild(div);
            });
        }

        function startSelection(row, col) {
            if (!audioCtx.state || audioCtx.state === 'suspended') audioCtx.resume();
            selecting = true;
            selectedCells = [[row, col]];
            updateSelection();
        }

        function continueSelection(row, col) {
            if (!selecting) return;
            
            const last = selectedCells[selectedCells.length - 1];
            if (last[0] === row && last[1] === col) return;
            
            // Check if aligned
            if (selectedCells.length > 0) {
                const [sr, sc] = selectedCells[0];
                const dr = row - sr;
                const dc = col - sc;
                
                if (dr !== 0 && dc !== 0 && Math.abs(dr) !== Math.abs(dc)) return;
            }
            
            selectedCells.push([row, col]);
            updateSelection();
        }

        function updateSelection() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('selected');
            });
            
            selectedCells.forEach(([r, c]) => {
                const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                if (cell) cell.classList.add('selected');
            });
        }

        function endSelection() {
            if (!selecting) return;
            selecting = false;
            
            const word = selectedCells.map(([r, c]) => grid[r][c]).join('');
            const reversed = word.split('').reverse().join('');
            
            if (words.includes(word) && !foundWords.has(word)) {
                foundWords.add(word);
                markFound();
                playSound(800, 0.2);
                
                if (foundWords.size === words.length) {
                    setTimeout(() => {
                        alert('🎉 Congratulations! All words found!');
                        playSound(1000, 0.3);
                    }, 100);
                }
            } else if (words.includes(reversed) && !foundWords.has(reversed)) {
                foundWords.add(reversed);
                markFound();
                playSound(800, 0.2);
                
                if (foundWords.size === words.length) {
                    setTimeout(() => alert('🎉 Congratulations! All words found!'), 100);
                }
            } else {
                playSound(300, 0.1);
            }
            
            selectedCells = [];
            render();
        }

        function markFound() {
            selectedCells.forEach(([r, c]) => {
                const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                if (cell) cell.classList.add('found');
            });
            renderWordList();
        }

        document.addEventListener('mouseup', endSelection);

        newGame('easy');
    </script>

<script>
(function(){
  if (window.__interactionProbeInstalled) return;
  window.__interactionProbeInstalled = true;

  let count = 0;
  const probe = document.createElement('div');
  probe.id = 'interactionProbe';
  probe.setAttribute('aria-live', 'polite');
  probe.style.position = 'fixed';
  probe.style.left = '-9999px';
  probe.style.top = '0';
  probe.style.pointerEvents = 'none';
  probe.textContent = 'interaction:0';

  function ensureProbe(){
    if (!probe.isConnected && document.body) document.body.appendChild(probe);
  }

  function mark(kind){
    count += 1;
    probe.textContent = `interaction:${count}:${kind}`;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ensureProbe, { once:true });
  } else {
    ensureProbe();
  }

  document.addEventListener('pointerdown', () => mark('pointer'), true);
  document.addEventListener('keydown', () => mark('key'), true);
  window.__markInteraction = mark;
})();
</script>
