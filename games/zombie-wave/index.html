    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const killsEl = document.getElementById('kills');
        const healthEl = document.getElementById('health');
        const bestEl = document.getElementById('best');
        const waveNumEl = document.getElementById('waveNum');
        const gameOverEl = document.getElementById('gameOver');
        const finalWaveEl = document.getElementById('finalWave');
        const finalKillsEl = document.getElementById('finalKills');
        const finalBestEl = document.getElementById('finalBest');
        const restartBtn = document.getElementById('restart');

        canvas.width = 600;
        canvas.height = 600;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq, duration, type = 'sine') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        let gameState = 'playing';
        let kills = 0;
        let best = parseInt(localStorage.getItem('zombieWaveBest') || '0');
        let wave = 1;
        let targetX = canvas.width / 2;
        let targetY = canvas.height / 2;

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            health: 100,
            maxHealth: 100,
            fireRate: 10,
            fireCooldown: 0
        };

        const zombies = [];
        const bullets = [];
        const particles = [];
        let spawnTimer = 0;
        let zombiesPerWave = 5;
        let zombiesSpawned = 0;

        function spawnZombie() {
            const angle = Math.random() * Math.PI * 2;
            const distance = canvas.width / 2 + 50;
            const x = player.x + Math.cos(angle) * distance;
            const y = player.y + Math.sin(angle) * distance;

            zombies.push({
                x: x,
                y: y,
                radius: 12,
                speed: 0.5 + wave * 0.1,
                health: 2 + Math.floor(wave / 3)
            });
            zombiesSpawned++;
        }

        function update() {
            if (gameState !== 'playing') return;

            // Auto-fire toward target
            player.fireCooldown--;
            if (player.fireCooldown <= 0) {
                const dx = targetX - player.x;
                const dy = targetY - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 10) {
                    bullets.push({
                        x: player.x,
                        y: player.y,
                        vx: (dx / dist) * 10,
                        vy: (dy / dist) * 10,
                        radius: 4
                    });
                    playSound(600, 0.05, 'square');
                }
                player.fireCooldown = player.fireRate;
            }

            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;

                // Remove if off screen
                if (bullets[i].x < 0 || bullets[i].x > canvas.width ||
                    bullets[i].y < 0 || bullets[i].y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }

            // Spawn zombies
            spawnTimer++;
            if (spawnTimer > 60 && zombiesSpawned < zombiesPerWave) {
                spawnZombie();
                spawnTimer = 0;
            }

            // Start new wave
            if (zombiesSpawned >= zombiesPerWave && zombies.length === 0) {
                wave++;
                waveNumEl.textContent = wave;
                zombiesPerWave += 3;
                zombiesSpawned = 0;
                player.health = Math.min(player.health + 20, player.maxHealth);
                healthEl.textContent = Math.floor(player.health);
            }

            // Update zombies
            for (let i = zombies.length - 1; i >= 0; i--) {
                const zombie = zombies[i];
                const dx = player.x - zombie.x;
                const dy = player.y - zombie.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                zombie.x += (dx / dist) * zombie.speed;
                zombie.y += (dy / dist) * zombie.speed;

                // Check bullet collision
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const bdx = bullets[j].x - zombie.x;
                    const bdy = bullets[j].y - zombie.y;
                    const bdist = Math.sqrt(bdx * bdx + bdy * bdy);

                    if (bdist < zombie.radius + bullets[j].radius) {
                        bullets.splice(j, 1);
                        zombie.health--;

                        if (zombie.health <= 0) {
                            // Create particles
                            for (let k = 0; k < 8; k++) {
                                particles.push({
                                    x: zombie.x,
                                    y: zombie.y,
                                    vx: (Math.random() - 0.5) * 6,
                                    vy: (Math.random() - 0.5) * 6,
                                    life: 20
                                });
                            }
                            zombies.splice(i, 1);
                            kills++;
                            killsEl.textContent = kills;
                            playSound(300, 0.1, 'sawtooth');
                        }
                        break;
                    }
                }

                // Check player collision
                if (dist < zombie.radius + player.radius) {
                    player.health -= 0.5;
                    healthEl.textContent = Math.floor(player.health);

                    if (player.health <= 0) {
                        gameOver();
                    }
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#2d2d2d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw bullets
            ctx.fillStyle = '#ffff00';
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw particles
            ctx.fillStyle = '#00ff00';
            particles.forEach(particle => {
                ctx.globalAlpha = particle.life / 20;
                ctx.fillRect(particle.x, particle.y, 3, 3);
            });
            ctx.globalAlpha = 1;

            // Draw zombies
            zombies.forEach(zombie => {
                ctx.fillStyle = '#00ff00';
                ctx.beginPath();
                ctx.arc(zombie.x, zombie.y, zombie.radius, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(zombie.x - 5, zombie.y - 3, 3, 3);
                ctx.fillRect(zombie.x + 2, zombie.y - 3, 3, 3);

                // Health bar
                if (zombie.health < 2 + Math.floor(wave / 3)) {
                    const barWidth = 20;
                    const healthPercent = zombie.health / (2 + Math.floor(wave / 3));
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(zombie.x - barWidth/2, zombie.y - zombie.radius - 8, barWidth, 4);
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(zombie.x - barWidth/2, zombie.y - zombie.radius - 8, barWidth * healthPercent, 4);
                }
            });

            // Draw player
            ctx.fillStyle = '#0099ff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            // Aim line
            ctx.strokeStyle = 'rgba(255,0,0,0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(targetX, targetY);
            ctx.stroke();

            // Player health bar
            const barWidth = 60;
            const healthPercent = player.health / player.maxHealth;
            ctx.fillStyle = '#333';
            ctx.fillRect(player.x - barWidth/2, player.y + player.radius + 10, barWidth, 6);
            ctx.fillStyle = healthPercent > 0.5 ? '#00ff00' : healthPercent > 0.25 ? '#ffaa00' : '#ff0000';
            ctx.fillRect(player.x - barWidth/2, player.y + player.radius + 10, barWidth * healthPercent, 6);
        }

        function gameOver() {
            gameState = 'gameover';
            if (kills > best) {
                best = kills;
                localStorage.setItem('zombieWaveBest', best);
            }
            finalWaveEl.textContent = wave;
            finalKillsEl.textContent = kills;
            finalBestEl.textContent = best;
            bestEl.textContent = best;
            gameOverEl.style.display = 'block';
            playSound(150, 1, 'sawtooth');
        }

        function restart() {
            gameState = 'playing';
            kills = 0;
            wave = 1;
            player.health = 100;
            zombies.length = 0;
            bullets.length = 0;
            particles.length = 0;
            zombiesPerWave = 5;
            zombiesSpawned = 0;
            spawnTimer = 0;
            gameOverEl.style.display = 'none';
            killsEl.textContent = '0';
            healthEl.textContent = '100';
            waveNumEl.textContent = '1';
        }

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            targetX = e.touches[0].clientX - rect.left;
            targetY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            targetX = e.clientX - rect.left;
            targetY = e.clientY - rect.top;
        });

        restartBtn.addEventListener('click', restart);

        bestEl.textContent = best;

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>

    <!-- leaderboard-integration:zombie-wave -->
    <div id="leaderboard" data-lb-slug="zombie-wave" style="position:fixed;right:10px;bottom:10px;z-index:1100;max-width:min(90vw,340px);pointer-events:none;"></div>
    <script src="../shared/leaderboard.js"></script>
    <script>
    (() => {
      const GAME_SLUG = "zombie-wave";
      const CANDIDATE_OBJECTS = ["player"];
      const END_METHODS = ["gameOver", "endGame", "showResult", "showResults", "showGameOver", "victory", "win", "lose", "die", "defeat", "completeGame", "levelComplete"];
      const START_METHODS = ["restart", "start", "startGame", "newGame", "retry", "resetGame", "initGame", "beginGame", "playAgain"];
      const SCORE_KEYS = ["wave", "kills", "distance", "score", "points", "gold", "coins", "level", "finalScore", "totalScore", "bestScore", "highScore"];

      function resolvePlayerName() {
        try {
          const tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ').trim();
            if (fullName) return fullName;
            if (tgUser.username) return tgUser.username;
          }
        } catch (_) {}

        try {
          const saved = localStorage.getItem('lb_player_name');
          if (saved) return saved;
          const generated = 'Player' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('lb_player_name', generated);
          return generated;
        } catch (_) {
          return 'Player' + Math.floor(1000 + Math.random() * 9000);
        }
      }

      if (!window.Leaderboard) return;

      const playerName = resolvePlayerName();
      let lastSubmit = { score: null, at: 0 };
      let hooksInstalled = false;

      function toNumber(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : NaN;
        if (typeof value === 'string') {
          const cleaned = value.replace(/[^\d.-]/g, '');
          if (!cleaned) return NaN;
          const num = Number(cleaned);
          return Number.isFinite(num) ? num : NaN;
        }
        return NaN;
      }

      function collectFromObject(obj) {
        const found = [];
        if (!obj || typeof obj !== 'object') return found;
        for (const key of SCORE_KEYS) {
          if (key in obj) {
            const n = toNumber(obj[key]);
            if (Number.isFinite(n)) found.push(n);
          }
        }
        return found;
      }

      function extractScore() {
        const values = [];

        for (const key of SCORE_KEYS) {
          try {
            if (key in window) {
              const n = toNumber(window[key]);
              if (Number.isFinite(n)) values.push(n);
            }
          } catch (_) {}
        }

        const objectRefs = [window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) objectRefs.push(window[name]);
          } catch (_) {}
        }

        for (const obj of objectRefs) {
          values.push(...collectFromObject(obj));
        }

        const domIds = [
          'finalScore','score','scoreValue','points','gold','coins','money','cash','souls','wave','level',
          'resultScore','bestScore','highScore','totalScore','earnedGold','finalFloor','finalWave'
        ];

        for (const id of domIds) {
          const el = document.getElementById(id);
          if (!el) continue;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        const scoreLikeEls = document.querySelectorAll('[id*="score" i], [class*="score" i], [id*="point" i], [id*="gold" i], [id*="coin" i], [id*="wave" i], [id*="level" i]');
        let checked = 0;
        for (const el of scoreLikeEls) {
          if (checked > 30) break;
          checked += 1;
          const n = toNumber(el.textContent || el.innerText || '');
          if (Number.isFinite(n)) values.push(n);
        }

        if (!values.length) return null;
        return Math.max(...values.filter(v => Number.isFinite(v)));
      }

      function refreshBoard() {
        Leaderboard.getTop(GAME_SLUG).then(scores => Leaderboard.renderBoard('leaderboard', scores));
      }

      function submitScore(reason) {
        const score = extractScore();
        if (!Number.isFinite(score)) return;

        const now = Date.now();
        if (lastSubmit.score === score && now - lastSubmit.at < 8000) return;

        lastSubmit = { score, at: now };
        Leaderboard.submit(GAME_SLUG, playerName, score, { reason });
        refreshBoard();
      }

      function wrapMethod(target, methodName, onAfter) {
        if (!target || typeof target[methodName] !== 'function') return false;
        const wrappedFlag = '__lbWrapped_' + methodName;
        if (target[wrappedFlag]) return true;

        const original = target[methodName];
        target[methodName] = function(...args) {
          const result = original.apply(this, args);
          try { onAfter(methodName); } catch (_) {}
          return result;
        };
        target[wrappedFlag] = true;
        return true;
      }

      function installHooks() {
        let installedAny = false;
        const targets = [window, window.game, window.Game, window.app, window.engine, window.state, window.G, window.gameState, window.gameManager];
        for (const name of CANDIDATE_OBJECTS) {
          try {
            if (name && window[name]) targets.push(window[name]);
          } catch (_) {}
        }

        for (const t of targets) {
          if (!t) continue;
          for (const m of END_METHODS) installedAny = wrapMethod(t, m, () => submitScore('end:' + m)) || installedAny;
          for (const m of START_METHODS) installedAny = wrapMethod(t, m, () => refreshBoard()) || installedAny;
        }

        hooksInstalled = hooksInstalled || installedAny;
      }

      function observeEndScreens() {
        const endPattern = /(game\s*over|victory|defeat|you\s*win|you\s*lose|final\s*score|result|패배|승리|클리어|결과|게임\s*오버|게임오버)/i;

        const maybeSubmit = () => {
          const markers = document.querySelectorAll('[id*="gameover" i], [id*="result" i], [class*="gameover" i], [class*="result" i], [id*="victory" i], [class*="victory" i]');
          for (const el of markers) {
            const style = window.getComputedStyle(el);
            const visible = style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            if (visible) {
              submitScore('screen-visible');
              return;
            }
          }

          const text = (document.body && document.body.innerText) ? document.body.innerText.slice(0, 5000) : '';
          if (endPattern.test(text)) submitScore('text-match');
        };

        const observer = new MutationObserver(() => maybeSubmit());
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true });

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!t) return;
          const txt = (t.innerText || t.textContent || '').toLowerCase();
          if (/start|retry|restart|play|begin|시작|재도전|다시/.test(txt)) {
            setTimeout(refreshBoard, 300);
          }
          if (/result|finish|end|win|lose|game over|결과|종료|패배|승리|클리어/.test(txt)) {
            setTimeout(() => submitScore('button-click'), 300);
          }
        }, true);
      }

      refreshBoard();
      installHooks();
      observeEndScreens();

      let hookTry = 0;
      const hookTimer = setInterval(() => {
        hookTry += 1;
        if (!hooksInstalled) installHooks();
        if (hookTry > 30) clearInterval(hookTimer);
      }, 1000);

      setInterval(refreshBoard, 30000);
    })();
    </script>
