<body>
<div class="container" style="position:relative;">
  <a href="/" class="home-link">← eastsea.monster</a>

  <header>
    <div class="header-top">
      <span class="logo-icon">🔥</span>
      <h1 class="logo">Game Hot Deals</h1>
    </div>
    <p class="subtitle">Steam · Epic · GOG · Humble 등 게임 핫딜 모아보기</p>
    <p class="update-time" id="update-time">업데이트 확인 중...</p>
  </header>

  <div class="stats-bar" id="stats-bar"></div>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="popular">🔥 인기 <span class="count"></span></button>
    <button class="tab-btn" data-tab="free">🆓 무료 <span class="count"></span></button>
    <button class="tab-btn" data-tab="lowest">📉 역대최저 <span class="count"></span></button>
    <button class="tab-btn" data-tab="korean">🇰🇷 한국어 <span class="count"></span></button>
    <button class="tab-btn" data-tab="top_rated">⭐ 고평가 <span class="count"></span></button>
    <button class="tab-btn" data-tab="all">📦 전체 <span class="count"></span></button>
  </nav>

  <!-- Filters -->
  <div class="filter-bar" id="filter-bar">
    <label class="filter-check">
      <input type="checkbox" id="filter-korean"> 🇰🇷 한국어 지원만
    </label>
    <div class="sort-group">
      <label class="sort-label">정렬:</label>
      <select id="sort-select" class="sort-select">
        <option value="default">기본</option>
        <option value="discount">할인율 ↓</option>
        <option value="rating">평점 ↓</option>
        <option value="price-asc">가격 ↑</option>
        <option value="price-desc">가격 ↓</option>
        <option value="reviews">리뷰수 ↓</option>
      </select>
    </div>
  </div>

  <div id="deals-container">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>핫딜 로딩 중...</p>
