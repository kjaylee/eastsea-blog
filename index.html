<div class="container">

    <button class="filter-btn active" data-filter="all">전체</button>

<script>
const API_BASE = 'https://blog-api.k-jaylee.workers.dev';

const CATEGORY_LABELS = {
  briefing: '브리핑',
  market: '마켓',
  digest: '다이제스트',
  research: '리서치',
  diary: '일기',
  report: '리포트',
  polish: '폴리싱',
  upgrade: '업그레이드',
  other: '기타'
};

const CATEGORY_ALIASES = {
  journal: 'diary',
  markets: 'market'
};

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

function normalizeCategory(value) {
  if (!value) return 'other';
  const normalized = String(value).toLowerCase().trim();
  const aliased = CATEGORY_ALIASES[normalized] || normalized;
  return CATEGORY_LABELS[aliased] ? aliased : 'other';
}

function detectCategory(post) {
  if (Array.isArray(post.categories) && post.categories.length > 0) {
    return normalizeCategory(post.categories[0]);
  }

  if (post.category) {
    return normalizeCategory(post.category);
  }

  const slug = String(post.slug || '').toLowerCase();
  if (slug.includes('briefing')) return 'briefing';
  if (slug.includes('market')) return 'market';
  if (slug.includes('digest')) return 'digest';
  if (slug.includes('report')) return 'report';
  if (slug.includes('diary') || slug.includes('journal')) return 'diary';
  if (slug.includes('polish')) return 'polish';
  if (slug.includes('upgrade')) return 'upgrade';
  if (slug.includes('research')) return 'research';
  return 'other';
}

function formatPostDate(rawDate) {
  const source = String(rawDate || '').trim();
  if (!source) return '';

  const match = source.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})/);
  if (match) {
    return `${match[1]} · ${match[2]}`;
  }

  const parsed = new Date(source.replace(' ', 'T').replace(/([+-]\d{2})(\d{2})$/, '$1:$2'));
  if (Number.isNaN(parsed.getTime())) {
    return source;
  }

  return new Intl.DateTimeFormat('ko-KR', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    hour12: false
  }).format(parsed);
}

function stripMarkdown(markdown) {
  return String(markdown || '')
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/^>\s?/gm, '')
    .replace(/^\s*[-*+]\s+/gm, '')
    .replace(/^\s*\d+\.\s+/gm, '')
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/__(.*?)__/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/_(.*?)_/g, '$1')
    .replace(/~~(.*?)~~/g, '$1')
    .replace(/\r?\n+/g, ' ')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function clampText(text, maxLength = 170) {
  if (text.length <= maxLength) return text;
  return `${text.slice(0, maxLength).replace(/\s+\S*$/, '').trim()}…`;
}

function extractTags(post) {
  if (Array.isArray(post.tags)) {
    return post.tags;
  }

  if (typeof post.tags === 'string') {
    return post.tags.split(',');
  }

  return [];
}

// Load posts from Cloudflare Worker API
async function renderPosts(filter = 'all') {
  const container = document.getElementById('posts-container');
  const normalizedFilter = filter === 'all' ? 'all' : normalizeCategory(filter);

  try {
    const params = new URLSearchParams({ page: '1', limit: '50' });
    const response = await fetch(`${API_BASE}/api/posts?${params.toString()}`);
    if (!response.ok) throw new Error('Failed to load posts from API');

    const { posts: apiPosts = [] } = await response.json();
    const posts = apiPosts
      .map(post => ({ ...post, category: detectCategory(post) }))
      .filter(post => normalizedFilter === 'all' || post.category === normalizedFilter)
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    if (posts.length === 0) {
      container.innerHTML = '<div class="empty-state">이 카테고리에 포스트가 없습니다.</div>';
      return;
    }

    const postsHTML = posts.map(post => {
      const postDate = escapeHtml(formatPostDate(post.date));
      const postExcerpt = escapeHtml(clampText(stripMarkdown(post.excerpt), 170));
      const postTitle = escapeHtml(post.title || '제목 없음');
      const postSlug = encodeURIComponent(String(post.slug || ''));
      const category = post.category || 'other';
      const categoryLabel = escapeHtml(CATEGORY_LABELS[category] || category);
      const tags = extractTags(post)
        .map(tag => String(tag || '').replace(/^#/, '').trim())
        .filter(Boolean)
        .slice(0, 6);
      const tagsHTML = tags.length > 0
        ? `<div class="post-tags">${tags.map(tag => `<span class="post-tag">#${escapeHtml(tag)}</span>`).join('')}</div>`
        : '';

      return `
        <article class="post-card" onclick="window.location.href='view.html?post=${postSlug}'">
          <div class="post-meta">
            <span class="post-date">${postDate}</span>
            <span class="post-category ${category}">${categoryLabel}</span>
          </div>
          <h2 class="post-title">${postTitle}</h2>
          <p class="post-excerpt">${postExcerpt}</p>
          ${tagsHTML}
          <a href="view.html?post=${postSlug}" class="post-link">전체 보기</a>
        </article>
      `;
    }).join('');

    container.innerHTML = `<div class="posts-grid">${postsHTML}</div>`;
  } catch (error) {
    container.innerHTML = '<div class="empty-state">포스트를 불러올 수 없습니다. 잠시 후 다시 시도해주세요.</div>';
    console.error('Error loading posts:', error);
  }
}

// Filter handlers
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.getAttribute('data-filter');
    renderPosts(filter);
  });
});

// Initial render
renderPosts();
</script>
