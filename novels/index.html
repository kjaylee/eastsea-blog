<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>novels.eastsea.xyz</title>
  <meta name="description" content="eastsea 웹소설 포털" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="topbar">
    <div class="container inner">
      <a class="brand" href="/">📚 novels.eastsea.xyz</a>
      <nav class="nav-links">
        <a href="https://eastsea.xyz">eastsea.xyz</a>
        <button id="themeBtn" class="btn" type="button">🌙 다크모드</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-title">
      <h1>소설 포털</h1>
      <p>최신 업데이트 순으로 정렬됩니다.</p>
    </section>

    <section class="controls">
      <input id="q" class="input" type="search" placeholder="제목/작가 검색" />
    </section>

    <section id="grid" class="grid">
      <div class="loading">소설 목록을 불러오는 중…</div>
    </section>

    <p class="footer-note">manifest.json + markdown 파일 기반 동적 렌더링</p>
  </main>

  <script src="app.js"></script>
  <script>
    const { loadManifest, formatDate, getCoverPath } = window.NovelsApp;
    const grid = document.getElementById('grid');
    const q = document.getElementById('q');

    document.getElementById('themeBtn').addEventListener('click', () => {
      const theme = window.NovelsApp.toggleTheme();
      document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️ 라이트모드' : '🌙 다크모드';
    });

    function card(novel) {
      const title = novel.title || novel.slug;
      const latest = novel.latestDate ? formatDate(novel.latestDate) : '-';
      const count = novel.totalEpisodes || (novel.episodes || []).length || 0;
      const genres = Array.isArray(novel.genre) ? novel.genre.slice(0, 4) : [];
      const cover = getCoverPath(novel.slug);

      return `
      <article class="card">
        <a class="cover-wrap" href="novel.html?slug=${encodeURIComponent(novel.slug)}">
          <img src="${cover}" alt="${title} 표지" loading="lazy" onerror="this.style.display='none'; this.parentNode.style.background='var(--bg-elevated)';" />
        </a>
        <div class="card-body">
          <a class="card-title" href="novel.html?slug=${encodeURIComponent(novel.slug)}">${title}</a>
          <div class="meta">✍️ ${novel.author || '작가 미상'}</div>
          <div class="meta">총 ${count}화 · 최신 ${latest}</div>
          <div class="chips">${genres.map(g => `<span class='chip'>${g}</span>`).join('')}</div>
          <a class="btn primary" href="novel.html?slug=${encodeURIComponent(novel.slug)}">작품 상세 보기</a>
        </div>
      </article>`;
    }

    function render(novels) {
      if (!novels.length) {
        grid.innerHTML = '<div class="empty">조건에 맞는 소설이 없습니다.</div>';
        return;
      }
      grid.innerHTML = novels.map(card).join('');
    }

    (async function init() {
      try {
        const { novels } = await loadManifest();
        const sorted = [...novels].sort((a, b) => String(b.latestDate || '').localeCompare(String(a.latestDate || '')));
        render(sorted);

        q.addEventListener('input', () => {
          const query = q.value.trim().toLowerCase();
          const filtered = sorted.filter((n) => {
            return (n.title || '').toLowerCase().includes(query)
              || (n.slug || '').toLowerCase().includes(query)
              || (n.author || '').toLowerCase().includes(query);
          });
          render(filtered);
        });

        const isDark = window.NovelsApp.getTheme() === 'dark';
        document.getElementById('themeBtn').textContent = isDark ? '☀️ 라이트모드' : '🌙 다크모드';
      } catch (err) {
        grid.innerHTML = `<div class='error'>목록을 불러오지 못했습니다: ${err.message}</div>`;
      }
    })();
  </script>
</body>
</html>
