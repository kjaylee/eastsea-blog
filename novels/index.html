<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹소설 - eastsea</title>
    <meta name="description" content="eastsea 웹소설 연재 플랫폼">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 2.8em;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        header p { font-size: 1.15em; opacity: 0.9; }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.15);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.95em;
            color: white;
        }

        .novels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }

        .novel-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(0,0,0,0.18);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
        }
        .novel-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 36px rgba(0,0,0,0.25);
        }

        .novel-header {
            padding: 0;
            color: white;
            position: relative;
            display: flex;
            min-height: 180px;
            overflow: hidden;
        }
        .novel-cover {
            width: 120px;
            min-height: 180px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .novel-cover-fallback {
            width: 120px;
            min-height: 180px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            opacity: 0.4;
        }
        .novel-header-info {
            padding: 20px 18px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            min-width: 0;
        }
        .novel-header-info h2 {
            font-size: 1.35em;
            margin-bottom: 6px;
            line-height: 1.3;
            word-break: keep-all;
        }
        .novel-header-info .author {
            opacity: 0.85;
            font-size: 0.85em;
        }
        .novel-header .badge {
            position: absolute;
            top: 12px;
            right: 14px;
            background: rgba(255,255,255,0.25);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        .genre-tags {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .genre-tag {
            background: rgba(255,255,255,0.2);
            padding: 2px 9px;
            border-radius: 10px;
            font-size: 0.73em;
        }

        .novel-body {
            padding: 18px 22px 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .episodes { flex: 1; }
        .episodes h3 {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .episode-item {
            padding: 10px 14px;
            margin-bottom: 6px;
            background: #f7f8fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            text-decoration: none;
            color: inherit;
        }
        .episode-item:hover {
            background: #edf0f5;
            transform: translateX(3px);
        }
        .ep-num {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
            white-space: nowrap;
            margin-right: 8px;
            min-width: 44px;
        }
        .ep-title {
            flex: 1;
            color: #555;
            font-size: 0.86em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .ep-date {
            color: #aaa;
            font-size: 0.8em;
            white-space: nowrap;
            margin-left: 10px;
        }

        .view-all {
            display: block;
            margin-top: 14px;
            text-align: center;
            padding: 10px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.92em;
            transition: background 0.2s;
        }
        .view-all:hover { background: #5a6fd6; }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.75);
            margin-top: 50px;
            padding-bottom: 20px;
        }
        footer a { color: white; }

        .loading {
            text-align: center;
            color: white;
            padding: 60px 20px;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2em; }
            .novels-grid { grid-template-columns: 1fr; }
            .novel-cover, .novel-cover-fallback { width: 100px; min-height: 150px; }
            .novel-header { min-height: 150px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 eastsea Novels</h1>
            <p>웹소설 연재 플랫폼</p>
            <div class="stats" id="stats"></div>
        </header>

        <div id="novels-grid" class="novels-grid">
            <div class="loading">소설 목록을 불러오는 중...</div>
        </div>

        <footer>
            <p>&copy; 2026 eastsea. All rights reserved.</p>
            <p style="margin-top:8px;"><a href="https://eastsea.monster">&larr; 메인으로 돌아가기</a></p>
        </footer>
    </div>

    <script>
    const GRADIENTS = [
        'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
        'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
        'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
        'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
        'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
        'linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)',
        'linear-gradient(135deg, #0250c5 0%, #d43f8d 100%)',
        'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
        'linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%)',
        'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
        'linear-gradient(135deg, #5ee7df 0%, #b490ca 100%)',
    ];

    const GENRE_KO = {
        'hunter': '헌터', 'regression': '회귀', 'system': '시스템',
        'mystery': '미스터리', 'guild': '길드', 'academy': '아카데미',
        'munchkin': '먼치킨', 'mentor': '멘토', 'comedy': '코미디',
        'constellation': '성좌', 'romance': '로맨스',
    };

    function translateGenre(g) {
        return GENRE_KO[g.toLowerCase()] || g;
    }

    /* Extract a meaningful episode title.
       If the raw title is just "[웹소설] NovelTitle - N화", return '' (generic).
       Otherwise return the actual episode-specific title. */
    function extractEpTitle(rawTitle, novelTitle) {
        if (!rawTitle) return '';
        let cleaned = rawTitle.trim()
            .replace(/^\[웹소설\]\s*/, '')
            .replace(/\s*-\s*\d+\s*화\s*$/, '')
            .trim();
        if (!cleaned) return '';
        /* If the cleaned result is just the novel title (or a substring), it's generic */
        const norm = s => s.replace(/\s+/g, '').toLowerCase();
        if (norm(novelTitle).includes(norm(cleaned)) || norm(cleaned).includes(norm(novelTitle))) {
            return '';
        }
        return cleaned;
    }

    async function loadNovels() {
        try {
            const resp = await fetch('manifest.json?t=' + Date.now());
            const data = await resp.json();
            const novels = data.novels || [];

            novels.sort((a, b) => (b.latestDate || '').localeCompare(a.latestDate || ''));

            const totalEps = novels.reduce((s, n) => s + (n.totalEpisodes || 0), 0);
            const authors = new Set(novels.map(n => (n.author || '').replace(/\s*\(Author-\d+\)/, '')));
            document.getElementById('stats').innerHTML = `
                <span class="stat">📖 ${novels.length}개 작품</span>
                <span class="stat">📝 ${totalEps}화 연재</span>
                <span class="stat">✍️ ${authors.size}명 작가</span>
            `;

            const grid = document.getElementById('novels-grid');
            if (novels.length === 0) {
                grid.innerHTML = '<div class="loading">연재 중인 소설이 없습니다.</div>';
                return;
            }

            grid.innerHTML = novels.map((novel, i) => {
                const grad = GRADIENTS[i % GRADIENTS.length];
                const novelTitle = novel.title || novel.slug.replace(/([a-z])([A-Z])/g, '$1 $2');
                const authorClean = (novel.author || '알 수 없음').replace(/\s*\(Author-\d+\)/, '');
                const genres = (novel.genre || []).map(g =>
                    `<span class="genre-tag">${translateGenre(g)}</span>`
                ).join('');
                const status = novel.status === '완결' ? '완결' :
                    `${novel.totalEpisodes || 0}화 연재중`;
                const coverUrl = `covers/${encodeURIComponent(novel.slug)}.png`;

                const eps = (novel.episodes || []).slice().reverse().slice(0, 3);
                const epItems = eps.map(ep => {
                    const epTitle = extractEpTitle(ep.title, novelTitle);
                    return `<a class="episode-item" href="view.html?series=${encodeURIComponent(novel.slug)}&episode=${ep.num}">
                        <span class="ep-num">제${parseInt(ep.num)}화</span>
                        ${epTitle ? `<span class="ep-title">${epTitle}</span>` : ''}
                        <span class="ep-date">${ep.date || ''}</span>
                    </a>`;
                }).join('');

                return `<div class="novel-card">
                    <div class="novel-header" style="background:${grad}">
                        <img class="novel-cover" src="${coverUrl}"
                             alt="${novelTitle}"
                             onerror="this.outerHTML='<div class=\\'novel-cover-fallback\\'>📖</div>'" />
                        <div class="novel-header-info">
                            <h2>${novelTitle}</h2>
                            <p class="author">✍️ ${authorClean}</p>
                            <div class="genre-tags">${genres}</div>
                        </div>
                        <span class="badge">${status}</span>
                    </div>
                    <div class="novel-body">
                        <div class="episodes">
                            <h3>최신 에피소드</h3>
                            ${epItems}
                        </div>
                        <a class="view-all" href="series.html?series=${encodeURIComponent(novel.slug)}">
                            전체 ${novel.totalEpisodes || 0}화 보기 ▶
                        </a>
                    </div>
                </div>`;
            }).join('');

        } catch (err) {
            document.getElementById('novels-grid').innerHTML =
                `<div class="loading">❌ 목록을 불러오지 못했습니다: ${err.message}</div>`;
        }
    }

    loadNovels();
    </script>
</body>
</html>
