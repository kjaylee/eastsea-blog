<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리더 - eastsea novels</title>
  <meta name="description" content="eastsea 웹소설 리더" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #faf8f5; --text: #2c2c2c; --muted: #888;
      --card: #fff; --border: #e8e4df; --accent: #667eea;
    }
    .dark {
      --bg: #1a1a2e; --text: #e0e0e0; --muted: #888;
      --card: #16213e; --border: #2a2a4a; --accent: #7c8cf8;
    }
    body {
      font-family: 'Noto Serif KR', Georgia, serif;
      background: var(--bg); color: var(--text);
      line-height: 1.9; font-size: 17px;
    }
    .topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 12px 20px; position: sticky; top: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
    }
    .topbar a { color: var(--accent); text-decoration: none; font-family: 'Noto Sans KR', sans-serif; font-weight: 600; }
    .topbar .controls { display: flex; gap: 10px; align-items: center; }
    .topbar button {
      background: var(--border); border: none; padding: 6px 14px;
      border-radius: 6px; cursor: pointer; font-size: 14px; color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
    }
    .topbar button:hover { opacity: 0.8; }

    .container { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }

    .ep-header {
      margin-bottom: 36px; padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    .ep-header .series-title {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88em; color: var(--muted); margin-bottom: 6px;
    }
    .ep-header h1 { font-size: 1.6em; line-height: 1.4; }
    .ep-header .meta {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.85em; color: var(--muted); margin-top: 8px;
    }

    .content p { margin-bottom: 1.2em; text-indent: 1em; }
    .content h1, .content h2, .content h3 {
      font-family: 'Noto Sans KR', sans-serif;
      margin: 2em 0 0.8em; line-height: 1.4;
    }
    .content h2 { font-size: 1.3em; }
    .content h3 { font-size: 1.15em; }
    .content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    .content blockquote {
      border-left: 3px solid var(--accent); padding-left: 16px;
      margin: 1.5em 0; color: var(--muted); font-style: italic;
    }

    .nav-footer {
      margin-top: 60px; padding-top: 24px;
      border-top: 2px solid var(--border);
      display: flex; justify-content: space-between; gap: 12px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .nav-footer a {
      padding: 12px 24px; background: var(--accent); color: white;
      text-decoration: none; border-radius: 8px; font-weight: 600;
      transition: opacity 0.2s;
    }
    .nav-footer a:hover { opacity: 0.85; }
    .nav-footer a.disabled { background: var(--border); color: var(--muted); pointer-events: none; }

    .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 1.1em; }
    .error { color: #e74c3c; }

    @media (max-width: 600px) {
      body { font-size: 16px; }
      .container { padding: 24px 16px 60px; }
      .nav-footer a { padding: 10px 16px; font-size: 0.9em; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">📚 소설 포털</a>
    <div class="controls">
      <button id="sizeDown">A-</button>
      <button id="sizeUp">A+</button>
      <button id="themeBtn">🌙</button>
    </div>
  </div>

  <div class="container">
    <div id="reader" class="loading">불러오는 중…</div>
  </div>

  <script>
  (function() {
    // --- Parse slug & episode from query params OR path ---
    let slug = '', ep = '001';

    const params = new URLSearchParams(location.search);
    slug = params.get('novel') || params.get('series') || '';
    ep = params.get('ep') || params.get('episode') || '';

    if (!slug) {
      // Try path: /novel/{slug}/episode/{num}
      const m = location.pathname.match(/\/novel\/([^/]+)(?:\/episode\/(\d+))?/);
      if (m) {
        slug = decodeURIComponent(m[1]);
        ep = m[2] || '001';
      }
    }
    if (!ep) ep = '001';
    ep = String(ep).replace(/^0+/, '') || '1';
    ep = ep.padStart(3, '0');

    // --- Theme ---
    const THEME_KEY = 'novels-theme';
    function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch(_) { return 'light'; } }
    function setTheme(t) { try { localStorage.setItem(THEME_KEY, t); } catch(_) {} document.documentElement.className = t; }
    setTheme(getTheme());
    document.getElementById('themeBtn').addEventListener('click', () => {
      const next = getTheme() === 'dark' ? 'light' : 'dark';
      setTheme(next);
      document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
    });
    document.getElementById('themeBtn').textContent = getTheme() === 'dark' ? '☀️' : '🌙';

    // --- Font size ---
    let fontSize = parseInt(localStorage.getItem('novels-fontsize') || '17');
    function applySize() { document.querySelector('.container').style.fontSize = fontSize + 'px'; }
    document.getElementById('sizeUp').addEventListener('click', () => { fontSize = Math.min(fontSize + 2, 28); localStorage.setItem('novels-fontsize', fontSize); applySize(); });
    document.getElementById('sizeDown').addEventListener('click', () => { fontSize = Math.max(fontSize - 2, 13); localStorage.setItem('novels-fontsize', fontSize); applySize(); });
    applySize();

    // --- Markdown to HTML (simple) ---
    function md2html(md) {
      return md
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^\*\*\*$|^---$|^___$/gm, '<hr>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .split(/\n\n+/)
        .map(block => {
          block = block.trim();
          if (!block) return '';
          if (block.startsWith('<h') || block.startsWith('<hr') || block.startsWith('<blockquote')) return block;
          return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
        })
        .join('\n');
    }

    // --- Load & Render ---
    const root = document.getElementById('reader');

    if (!slug) {
      root.innerHTML = '<p class="error">소설을 찾을 수 없습니다. <a href="index.html">목록으로</a></p>';
      return;
    }

    async function load() {
      try {
        // Fetch manifest for metadata
        const mRes = await fetch('manifest.json?v=' + Date.now());
        const manifest = await mRes.json();
        const novel = (manifest.novels || []).find(n => n.slug === slug);

        const epInt = parseInt(ep, 10);
        const totalEps = novel ? novel.totalEpisodes : 0;
        const epInfo = novel ? (novel.episodes || []).find(e => parseInt(e.num) === epInt) : null;

        // Fetch episode markdown
        const mdUrl = `_data/${encodeURIComponent(slug)}-${ep}.md`;
        const mdRes = await fetch(mdUrl);
        if (!mdRes.ok) throw new Error(`에피소드를 찾을 수 없습니다 (${mdRes.status})`);
        const raw = await mdRes.text();

        // Split frontmatter
        let body = raw, meta = {};
        const fm = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
        if (fm) {
          body = fm[2] || '';
          fm[1].split('\n').forEach(line => {
            const idx = line.indexOf(':');
            if (idx > 0) meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim().replace(/^['"]|['"]$/g, '');
          });
        }

        // Clean title
        let title = meta.title || (epInfo ? epInfo.title : '') || `제${epInt}화`;
        title = title.replace(/^\[웹소설\]\s*/i, '').replace(/\s*-\s*\d+\s*화\s*$/i, '').trim();

        const seriesTitle = novel ? novel.title : (meta.series || slug);
        const author = (novel ? novel.author : meta.author || '').replace(/\s*\(Author-\d+\)/, '');
        const date = meta.date || (epInfo ? epInfo.date : '');

        // Render
        const prevEp = epInt > 1 ? String(epInt - 1).padStart(3, '0') : null;
        const nextEp = epInt < totalEps ? String(epInt + 1).padStart(3, '0') : null;

        function epLink(e) {
          return `read.html?novel=${encodeURIComponent(slug)}&ep=${e}`;
        }

        root.innerHTML = `
          <div class="ep-header">
            <div class="series-title"><a href="series.html?series=${encodeURIComponent(slug)}" style="color:var(--accent);text-decoration:none;">${seriesTitle}</a></div>
            <h1>제${epInt}화: ${title}</h1>
            <div class="meta">${author ? author + ' · ' : ''}${date || ''} · ${totalEps}화 중 ${epInt}화</div>
          </div>
          <div class="content">${md2html(body)}</div>
          <div class="nav-footer">
            <a href="${prevEp ? epLink(prevEp) : '#'}" class="${prevEp ? '' : 'disabled'}">◀ 이전화</a>
            <a href="series.html?series=${encodeURIComponent(slug)}">목록</a>
            <a href="${nextEp ? epLink(nextEp) : '#'}" class="${nextEp ? '' : 'disabled'}">다음화 ▶</a>
          </div>
        `;

        document.title = `${title} - ${seriesTitle}`;

      } catch (err) {
        root.innerHTML = `<p class="error">❌ ${err.message}<br><a href="index.html">목록으로 돌아가기</a></p>`;
      }
    }

    load();
  })();
  </script>
</body>
</html>
