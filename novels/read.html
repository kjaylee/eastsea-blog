<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리더 - novels.eastsea.xyz</title>
  <meta name="description" content="eastsea 웹소설 마크다운 리더" />
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var slug = params.get('novel') || params.get('series');
      var ep = params.get('ep') || params.get('episode') || '001';
      if (slug) {
        var pad = String(ep).replace(/^0+/, '') || '1';
        pad = pad.padStart(3, '0');
        location.replace('https://novels.eastsea.xyz/novel/' + encodeURIComponent(slug) + '/episode/' + pad);
      } else {
        location.replace('https://novels.eastsea.xyz/');
      }
    })();
  </script>
</head>
<body>
  <p>novels.eastsea.xyz로 이동 중…</p>
</body>
</html>
