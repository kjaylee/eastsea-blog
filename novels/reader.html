<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리더 이동 중…</title>
</head>
<body>
<script>
  const p = new URLSearchParams(location.search);
  const novel = p.get('novel') || p.get('series') || '';
  const ep = p.get('ep') || p.get('episode') || '001';
  location.replace(`read.html?novel=${encodeURIComponent(novel)}&ep=${encodeURIComponent(String(ep).padStart(3,'0'))}`);
</script>
</body>
</html>
