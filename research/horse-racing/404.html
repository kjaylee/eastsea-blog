<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Found</title>
    <style>
      :root {
        --bg: #f4eee5;
        --paper: #fff8ef;
        --ink: #221914;
        --muted: #6e6156;
        --line: rgba(71, 52, 35, 0.14);
        --accent: #8e3d28;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iowan Old Style", "Noto Serif KR", serif;
        background: linear-gradient(180deg, #fbf6ee 0%, #ede2d2 100%);
        color: var(--ink);
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 36px 18px 56px;
      }
      .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--paper);
        padding: 26px;
      }
      h1 { margin: 0 0 10px; font-size: clamp(2rem, 4vw, 3rem); line-height: 0.96; }
      p { margin: 0 0 16px; color: var(--muted); line-height: 1.65; }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; }
      .actions a {
        text-decoration: none;
        color: inherit;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 9px 13px;
        background: rgba(255,255,255,0.75);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>문서를 찾지 못했습니다.</h1>
        <p>링크가 오래되었거나, 이동된 문서일 수 있습니다. 포털이나 라이브러리에서 다시 탐색하세요.</p>
        <div class="actions">
          <a href="./index.html">Portal</a>
          <a href="./library/index.html">Library</a>
          <a href="./search/index.html">Search</a>
        </div>
      </section>
    </main>
  </body>
</html>
