<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>books Library</title>
    <style>
      :root {
        --bg: #f5efe6;
        --paper: #fff9f1;
        --ink: #221914;
        --muted: #6e6156;
        --line: rgba(71, 52, 35, 0.14);
        --accent: #8e3d28;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iowan Old Style", "Noto Serif KR", serif;
        background: linear-gradient(180deg, #fbf6ee 0%, #ede2d2 100%);
        color: var(--ink);
      }
      main { max-width: 860px; margin: 0 auto; padding: 28px 18px 48px; }
      .panel {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 24px;
      }
      .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
      .nav a {
        text-decoration: none;
        color: inherit;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(255,255,255,0.72);
      }
      h1 { margin: 0 0 8px; font-size: clamp(2rem, 4vw, 3rem); line-height: 0.96; }
      p { margin: 0 0 16px; color: var(--muted); line-height: 1.65; }
      ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
      li a {
        display: block;
        text-decoration: none;
        color: inherit;
        padding: 13px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.82);
      }
      li a:hover { color: var(--accent); border-color: rgba(142, 61, 40, 0.28); }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="nav">
          <a href="../index.html">Portal</a>
          <a href="../library/index.html">Library</a>
        </div>
        <h1>books</h1>
        <p>books 폴더에 발행된 문서를 모아둔 인덱스입니다.</p>
        <ul>
          <li><a href="korean-racing-legends-analysis.html">books/korean-racing-legends-analysis</a></li><li><a href="modern-racing-statistics-guide.html">books/modern-racing-statistics-guide</a></li><li><a href="the-art-of-horse-racing-picking.html">books/the-art-of-horse-racing-picking</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
