<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로컬 검색 사용법</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --paper: #fffaf2;
        --ink: #211812;
        --muted: #6d6157;
        --line: rgba(71, 52, 35, 0.14);
        --accent: #8e3d28;
        --shadow: 0 20px 50px rgba(61, 41, 22, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iowan Old Style", "Noto Serif KR", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(191, 147, 92, 0.16), transparent 30%),
          linear-gradient(180deg, #fbf6ee 0%, #efe5d7 100%);
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 28px 18px 60px;
      }
      .masthead {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .nav {
        display: inline-flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .nav a, .meta {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        text-decoration: none;
        color: inherit;
        background: rgba(255, 252, 247, 0.88);
      }
      article {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 26px;
        padding: 28px;
        box-shadow: var(--shadow);
      }
      h1, h2, h3, h4, h5, h6 {
        line-height: 1.08;
        margin: 1.4em 0 0.5em;
      }
      h1 { margin-top: 0; font-size: clamp(2rem, 4vw, 3.1rem); }
      h2 { font-size: clamp(1.45rem, 2.6vw, 2rem); }
      h3 { font-size: 1.25rem; }
      p, li {
        font-size: 1.02rem;
        line-height: 1.7;
      }
      p { margin: 0 0 1em; }
      ul, ol { padding-left: 1.3rem; margin: 0 0 1.1em; }
      blockquote {
        margin: 0 0 1.2em;
        padding: 14px 18px;
        border-left: 4px solid rgba(142, 61, 40, 0.45);
        background: rgba(142, 61, 40, 0.06);
        border-radius: 0 14px 14px 0;
      }
      blockquote p:last-child {
        margin-bottom: 0;
      }
      .table-wrap {
        overflow-x: auto;
        margin: 0 0 1.2em;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 420px;
        background: rgba(255, 253, 249, 0.82);
      }
      th, td {
        padding: 10px 12px;
        border: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }
      th {
        background: rgba(142, 61, 40, 0.08);
        font-size: 0.92rem;
      }
      pre {
        overflow-x: auto;
        padding: 14px 16px;
        border-radius: 16px;
        background: #241e1a;
        color: #f7f0e8;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.92em;
      }
      a {
        color: var(--accent);
        text-underline-offset: 0.16em;
      }
      @media (max-width: 720px) {
        article { padding: 22px; border-radius: 20px; }
        main { padding: 18px 12px 36px; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="masthead">
        <div class="nav">
          <a href="../index.html">Portal</a>
          <a href="../library/index.html">Library</a>
          <a href="../search/index.html">Search</a>
        </div>
        <div class="meta">Source: search/README.md</div>
      </div>
      <article>
        <h1>로컬 검색 사용법</h1>
<h2>1. 인덱스 생성 또는 갱신</h2>
<pre><code>npm run index</code></pre>
<h2>2. 브라우저에서 검색</h2>
<ul>
<li><code>search/index.html</code> 파일을 직접 연다.</li>
<li>또는 현재 폴더에서 <code>python3 -m http.server</code> 실행 후 <code>http://localhost:8000/search/</code> 접속</li>
</ul>
<h2>3. 터미널에서 검색</h2>
<pre><code>npm run search -- "배당률 모델링"
npm run search -- "한국 규제" --limit 5</code></pre>
      </article>
    </main>
  </body>
</html>
