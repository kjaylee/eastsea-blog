<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad RPM Optimizer | 광고 RPM 최적화 계산기</title>
  <meta name="description" content="페이지뷰, 광고 슬롯, Fill Rate, CTR, CPC, CPM 기반으로 광고 수익과 RPM을 계산하고 목표 RPM 달성 갭을 분석합니다." />
  <style>
    :root{--bg:#081426;--card:#10213f;--line:#2d4a79;--txt:#eaf2ff;--muted:#a7bddf;--pri:#6aa7ff;--ok:#34d399;--warn:#fbbf24;--err:#fca5a5}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#274c86 0%,#081426 48%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.22rem,2.8vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#deebff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#11244a;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px}
    .card{background:linear-gradient(165deg,#16305d,#10213f);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0c1a35;color:var(--txt);font-size:.92rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5b80f2);font-weight:700}
    .soft{background:#18335f;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:100px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6d2f39;background:rgba(248,113,113,.12);color:var(--err);font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d39;border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800}
    .v.sm{font-size:.98rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.86rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;margin-top:10px;border-radius:999px;border:1px solid var(--line);background:#183461;color:#cfe1ff;font-size:.75rem}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📣 Ad RPM Optimizer</h1>
        <div class="sub">광고 노출·클릭·수익 구조를 수치화해 실제 RPM과 목표 RPM 갭을 빠르게 파악합니다.</div>
      </div>
      <a class="home" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="pageviews">월 페이지뷰</label><input id="pageviews" type="number" min="1" step="1" value="320000" /></div>
          <div><label for="sessions">월 세션 수 (선택)</label><input id="sessions" type="number" min="0" step="1" value="190000" /></div>
          <div><label for="slots">페이지당 광고 슬롯 수</label><input id="slots" type="number" min="0.1" max="20" step="0.1" value="2.6" /></div>
          <div><label for="fillRate">Fill Rate (%)</label><input id="fillRate" type="number" min="0" max="100" step="0.1" value="78" /></div>
          <div><label for="viewability">Viewability (%)</label><input id="viewability" type="number" min="0" max="100" step="0.1" value="66" /></div>
          <div><label for="ctr">CTR (%)</label><input id="ctr" type="number" min="0" max="100" step="0.01" value="1.45" /></div>
          <div><label for="cpc">평균 CPC (USD)</label><input id="cpc" type="number" min="0" step="0.01" value="0.38" /></div>
          <div><label for="cpm">평균 CPM (USD)</label><input id="cpm" type="number" min="0" step="0.01" value="1.95" /></div>
          <div><label for="invalidRate">무효 트래픽 손실률 (%)</label><input id="invalidRate" type="number" min="0" max="100" step="0.1" value="6" /></div>
          <div><label for="targetRpm">목표 Page RPM (USD)</label><input id="targetRpm" type="number" min="0" step="0.01" value="6.2" /></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">순 광고수익</div><div id="netRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">Page RPM</div><div id="pageRpm" class="v">-</div></div>
          <div class="kpi"><div class="k">목표 대비 수익 갭</div><div id="revenueGap" class="v sm">-</div></div>
          <div class="kpi"><div class="k">Session RPM</div><div id="sessionRpm" class="v sm">-</div></div>
          <div class="kpi"><div class="k">예상 클릭수</div><div id="clicks" class="v sm">-</div></div>
          <div class="kpi"><div class="k">무효 트래픽 손실</div><div id="invalidLoss" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">계산 대기</div>

        <h2 style="margin-top:12px">세부 계산</h2>
        <table>
          <tbody>
            <tr><th>이론 노출수</th><td id="rawImp">-</td></tr>
            <tr><th>서빙 노출수</th><td id="servedImp">-</td></tr>
            <tr><th>뷰어블 노출수</th><td id="viewableImp">-</td></tr>
            <tr><th>CPC 수익</th><td id="cpcRevenue">-</td></tr>
            <tr><th>CPM 수익</th><td id="cpmRevenue">-</td></tr>
            <tr><th>목표 RPM 달성 필요 순수익</th><td id="targetRevenue">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      pageviews:$('pageviews'), sessions:$('sessions'), slots:$('slots'), fillRate:$('fillRate'), viewability:$('viewability'),
      ctr:$('ctr'), cpc:$('cpc'), cpm:$('cpm'), invalidRate:$('invalidRate'), targetRpm:$('targetRpm'),
      netRevenue:$('netRevenue'), pageRpm:$('pageRpm'), revenueGap:$('revenueGap'), sessionRpm:$('sessionRpm'), clicks:$('clicks'), invalidLoss:$('invalidLoss'),
      rawImp:$('rawImp'), servedImp:$('servedImp'), viewableImp:$('viewableImp'), cpcRevenue:$('cpcRevenue'), cpmRevenue:$('cpmRevenue'), targetRevenue:$('targetRevenue'),
      status:$('status'), error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = { pageviews:320000, sessions:190000, slots:2.6, fillRate:78, viewability:66, ctr:1.45, cpc:0.38, cpm:1.95, invalidRate:6, targetRpm:6.2 };
    const money = (n)=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString('en-US',{maximumFractionDigits:d});

    function validate(v){
      const required = ['pageviews','slots','fillRate','viewability','ctr','cpc','cpm','invalidRate','targetRpm'];
      for (const key of required){
        if (!Number.isFinite(v[key])) return '모든 필수 입력값은 숫자여야 합니다.';
      }
      if (v.pageviews <= 0) return '월 페이지뷰는 1 이상이어야 합니다.';
      if (!Number.isFinite(v.sessions) || v.sessions < 0) return '월 세션 수는 0 이상이어야 합니다.';
      if (v.slots <= 0 || v.slots > 20) return '광고 슬롯 수는 0 초과 20 이하여야 합니다.';
      if (v.fillRate < 0 || v.fillRate > 100) return 'Fill Rate는 0~100% 범위여야 합니다.';
      if (v.viewability < 0 || v.viewability > 100) return 'Viewability는 0~100% 범위여야 합니다.';
      if (v.ctr < 0 || v.ctr > 100) return 'CTR은 0~100% 범위여야 합니다.';
      if (v.cpc < 0 || v.cpc > 1000 || v.cpm < 0 || v.cpm > 1000) return 'CPC/CPM은 0~1000 범위에서 입력하세요.';
      if (v.invalidRate < 0 || v.invalidRate > 100) return '무효 트래픽 손실률은 0~100% 범위여야 합니다.';
      if (v.targetRpm < 0 || v.targetRpm > 10000) return '목표 RPM은 0~10,000 범위에서 입력하세요.';
      return '';
    }

    function compute(v){
      const rawImp = v.pageviews * v.slots;
      const servedImp = rawImp * (v.fillRate / 100);
      const viewableImp = servedImp * (v.viewability / 100);
      const clicks = viewableImp * (v.ctr / 100);
      const cpcRevenue = clicks * v.cpc;
      const cpmRevenue = (viewableImp / 1000) * v.cpm;
      const grossRevenue = cpcRevenue + cpmRevenue;
      const invalidLoss = grossRevenue * (v.invalidRate / 100);
      const netRevenue = grossRevenue - invalidLoss;
      const pageRpm = (netRevenue / v.pageviews) * 1000;
      const sessionRpm = v.sessions > 0 ? (netRevenue / v.sessions) * 1000 : null;
      const targetRevenue = (v.targetRpm * v.pageviews) / 1000;
      const revenueGap = netRevenue - targetRevenue;

      const values = [rawImp, servedImp, viewableImp, clicks, cpcRevenue, cpmRevenue, grossRevenue, invalidLoss, netRevenue, pageRpm, targetRevenue, revenueGap];
      if (values.some(val => !Number.isFinite(val))) {
        throw new Error('계산 결과가 비정상입니다. 입력값 규모를 줄여 다시 시도하세요.');
      }

      return { rawImp, servedImp, viewableImp, clicks, cpcRevenue, cpmRevenue, invalidLoss, netRevenue, pageRpm, sessionRpm, targetRevenue, revenueGap };
    }

    function render(){
      const v = {
        pageviews:Number(refs.pageviews.value), sessions:Number(refs.sessions.value), slots:Number(refs.slots.value),
        fillRate:Number(refs.fillRate.value), viewability:Number(refs.viewability.value), ctr:Number(refs.ctr.value),
        cpc:Number(refs.cpc.value), cpm:Number(refs.cpm.value), invalidRate:Number(refs.invalidRate.value), targetRpm:Number(refs.targetRpm.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        ['netRevenue','pageRpm','revenueGap','sessionRpm','clicks','invalidLoss','rawImp','servedImp','viewableImp','cpcRevenue','cpmRevenue','targetRevenue'].forEach(k=>refs[k].textContent='-');
        refs.status.textContent = '입력값 확인 필요';
        refs.summary.value = '';
        return;
      }

      try {
        const r = compute(v);
        refs.netRevenue.textContent = money(r.netRevenue);
        refs.pageRpm.textContent = `${num(r.pageRpm,2)} USD`;
        refs.revenueGap.textContent = money(r.revenueGap);
        refs.sessionRpm.textContent = r.sessionRpm === null ? 'N/A (세션 0)' : `${num(r.sessionRpm,2)} USD`;
        refs.clicks.textContent = num(r.clicks,0);
        refs.invalidLoss.textContent = money(r.invalidLoss);

        refs.rawImp.textContent = num(r.rawImp,0);
        refs.servedImp.textContent = num(r.servedImp,0);
        refs.viewableImp.textContent = num(r.viewableImp,0);
        refs.cpcRevenue.textContent = money(r.cpcRevenue);
        refs.cpmRevenue.textContent = money(r.cpmRevenue);
        refs.targetRevenue.textContent = money(r.targetRevenue);

        refs.status.innerHTML = r.revenueGap >= 0
          ? `<span class="ok">●</span> 목표 RPM 초과 달성 (${money(r.revenueGap)} 여유)`
          : `<span class="warn">●</span> 목표 RPM 대비 ${money(Math.abs(r.revenueGap))} 부족`;

        refs.summary.value = [
          '[Ad RPM Optimizer Summary]',
          `Net revenue: ${money(r.netRevenue)}`,
          `Page RPM: ${num(r.pageRpm,2)} USD`,
          `Target revenue: ${money(r.targetRevenue)}`,
          `Revenue gap: ${money(r.revenueGap)}`,
          `Estimated clicks: ${num(r.clicks,0)}`,
          `Invalid traffic loss: ${money(r.invalidLoss)}`,
          `Session RPM: ${r.sessionRpm === null ? 'N/A' : num(r.sessionRpm,2)+' USD'}`
        ].join('\n');
      } catch (e) {
        refs.error.classList.add('show');
        refs.error.textContent = e.message || '계산 중 오류가 발생했습니다.';
      }
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('클립보드 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.pageviews, refs.sessions, refs.slots, refs.fillRate, refs.viewability, refs.ctr, refs.cpc, refs.cpm, refs.invalidRate, refs.targetRpm]
        .forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
