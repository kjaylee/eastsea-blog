<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affiliate Commission Planner | 제휴 커미션 플래너</title>
  <meta name="description" content="상품 가격, 주문수, 환불률, 티어별 수수료율을 입력해 제휴 파트너 최종 정산액과 실효 커미션율을 계산합니다." />
  <style>
    :root{--bg:#081327;--card:#112248;--line:#2a4d86;--txt:#eaf2ff;--muted:#a9bddf;--pri:#66a6ff;--err:#fca5a5;--ok:#34d399}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#214a87 0%,#081327 50%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#e5edff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#122956;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{background:linear-gradient(160deg,#17315f,#112248);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0b1a36;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5b86f2);font-weight:700}
    .soft{background:#183461;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:var(--err);font-size:.86rem}
    .error.show{display:block}
    textarea{min-height:98px;margin-top:10px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0e1d3f;border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 9px;border-radius:999px;border:1px solid var(--line);background:#173767;color:#d6e3ff;font-size:.75rem}
    .ok{color:var(--ok)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🤝 Affiliate Commission Planner</h1>
        <div class="sub">티어별 커미션 + 성과 보너스 + 네트워크 수수료를 반영해 최종 정산액을 계산합니다.</div>
      </div>
      <a class="home" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="price">상품 단가 (KRW)</label><input id="price" type="number" min="1" value="59000" /></div>
          <div><label for="orders">월 추천 주문 수</label><input id="orders" type="number" min="0" step="1" value="430" /></div>
          <div><label for="refundRate">환불률 (%)</label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="7" /></div>
          <div><label for="tier1Rate">Tier-1 커미션율 (%)</label><input id="tier1Rate" type="number" min="0" max="100" step="0.1" value="12" /></div>
          <div><label for="tier1Cap">Tier-1 주문 상한</label><input id="tier1Cap" type="number" min="0" step="1" value="300" /></div>
          <div><label for="tier2Rate">Tier-2 커미션율 (%)</label><input id="tier2Rate" type="number" min="0" max="100" step="0.1" value="18" /></div>
          <div><label for="bonusPerOrder">유효주문당 성과보너스 (KRW)</label><input id="bonusPerOrder" type="number" min="0" value="1200" /></div>
          <div><label for="networkFeeRate">네트워크 수수료 (%)</label><input id="networkFeeRate" type="number" min="0" max="100" step="0.1" value="8" /></div>
        </div>
        <div class="btns">
          <button class="soft" id="copy" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>정산 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">최종 정산액 (파트너)</div><div id="finalPayout" class="v">-</div></div>
          <div class="kpi"><div class="k">실효 지급률 (총매출 대비)</div><div id="effectiveRate" class="v">-</div></div>
          <div class="kpi"><div class="k">티어 커미션 합계</div><div id="tierCommission" class="v sm">-</div></div>
          <div class="kpi"><div class="k">성과 보너스</div><div id="bonusOut" class="v sm">-</div></div>
          <div class="kpi"><div class="k">네트워크 수수료</div><div id="networkFeeOut" class="v sm">-</div></div>
          <div class="kpi"><div class="k">판매자 잔존매출(환불 반영)</div><div id="merchantRevenue" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">계산 대기</div>

        <h2 style="margin-top:12px">세부 계산</h2>
        <table>
          <tbody>
            <tr><th>총매출 (환불 전)</th><td id="grossSales">-</td></tr>
            <tr><th>유효 주문 수</th><td id="validOrders">-</td></tr>
            <tr><th>Tier-1 적용 주문 수</th><td id="tier1Orders">-</td></tr>
            <tr><th>Tier-2 적용 주문 수</th><td id="tier2Orders">-</td></tr>
            <tr><th>총 커미션(보너스 포함)</th><td id="grossCommission">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      price:$('price'), orders:$('orders'), refundRate:$('refundRate'), tier1Rate:$('tier1Rate'), tier1Cap:$('tier1Cap'),
      tier2Rate:$('tier2Rate'), bonusPerOrder:$('bonusPerOrder'), networkFeeRate:$('networkFeeRate'),
      finalPayout:$('finalPayout'), effectiveRate:$('effectiveRate'), tierCommission:$('tierCommission'), bonusOut:$('bonusOut'),
      networkFeeOut:$('networkFeeOut'), merchantRevenue:$('merchantRevenue'), grossSales:$('grossSales'), validOrders:$('validOrders'),
      tier1Orders:$('tier1Orders'), tier2Orders:$('tier2Orders'), grossCommission:$('grossCommission'), status:$('status'),
      error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = { price:59000, orders:430, refundRate:7, tier1Rate:12, tier1Cap:300, tier2Rate:18, bonusPerOrder:1200, networkFeeRate:8 };
    const won = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const fmt = (n,d=1)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      const pctKeys = ['refundRate','tier1Rate','tier2Rate','networkFeeRate'];
      if (!Number.isFinite(v.price) || v.price <= 0) return '상품 단가는 0보다 커야 합니다.';
      if (!Number.isFinite(v.orders) || v.orders < 0) return '주문 수는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.tier1Cap) || v.tier1Cap < 0) return 'Tier-1 주문 상한은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.bonusPerOrder) || v.bonusPerOrder < 0) return '성과 보너스는 0 이상이어야 합니다.';
      for (const key of pctKeys){
        if (!Number.isFinite(v[key]) || v[key] < 0 || v[key] > 100) return `${key} 값은 0~100 범위여야 합니다.`;
      }
      if (v.orders > 0 && v.tier1Cap > v.orders * 10) return 'Tier-1 주문 상한이 주문 수 대비 비정상적으로 큽니다. 입력값을 확인하세요.';
      return '';
    }

    function compute(v){
      const grossSales = v.price * v.orders;
      const validOrders = v.orders * (1 - v.refundRate / 100);
      const tier1Orders = Math.min(validOrders, v.tier1Cap);
      const tier2Orders = Math.max(0, validOrders - v.tier1Cap);

      const tier1Commission = tier1Orders * v.price * (v.tier1Rate / 100);
      const tier2Commission = tier2Orders * v.price * (v.tier2Rate / 100);
      const tierCommission = tier1Commission + tier2Commission;
      const bonusAmount = validOrders * v.bonusPerOrder;
      const grossCommission = tierCommission + bonusAmount;
      const networkFee = grossCommission * (v.networkFeeRate / 100);
      const finalPayout = grossCommission - networkFee;

      const netCollectedSales = grossSales * (1 - v.refundRate / 100);
      const merchantRetainedRevenue = netCollectedSales - finalPayout;
      const effectiveRate = grossSales > 0 ? (finalPayout / grossSales) * 100 : 0;

      return { grossSales, validOrders, tier1Orders, tier2Orders, tierCommission, bonusAmount, grossCommission, networkFee, finalPayout, merchantRetainedRevenue, effectiveRate };
    }

    function render(){
      const v = {
        price:Number(refs.price.value), orders:Number(refs.orders.value), refundRate:Number(refs.refundRate.value), tier1Rate:Number(refs.tier1Rate.value),
        tier1Cap:Number(refs.tier1Cap.value), tier2Rate:Number(refs.tier2Rate.value), bonusPerOrder:Number(refs.bonusPerOrder.value), networkFeeRate:Number(refs.networkFeeRate.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        ['finalPayout','effectiveRate','tierCommission','bonusOut','networkFeeOut','merchantRevenue','grossSales','validOrders','tier1Orders','tier2Orders','grossCommission']
          .forEach(k=>refs[k].textContent='-');
        refs.status.textContent = '입력값을 확인하세요';
        refs.summary.value = '';
        return;
      }

      const r = compute(v);
      refs.finalPayout.textContent = won(r.finalPayout);
      refs.effectiveRate.textContent = `${fmt(r.effectiveRate,2)}%`;
      refs.tierCommission.textContent = won(r.tierCommission);
      refs.bonusOut.textContent = won(r.bonusAmount);
      refs.networkFeeOut.textContent = won(r.networkFee);
      refs.merchantRevenue.textContent = won(r.merchantRetainedRevenue);

      refs.grossSales.textContent = won(r.grossSales);
      refs.validOrders.textContent = `${fmt(r.validOrders,1)}건`;
      refs.tier1Orders.textContent = `${fmt(r.tier1Orders,1)}건`;
      refs.tier2Orders.textContent = `${fmt(r.tier2Orders,1)}건`;
      refs.grossCommission.textContent = won(r.grossCommission);

      refs.status.innerHTML = r.finalPayout > 0
        ? `<span class="ok">●</span> 파트너 예상 정산액 ${won(r.finalPayout)}`
        : `● 정산액 없음`;

      refs.summary.value = [
        '[Affiliate Commission Planner 요약]',
        `총매출: ${won(r.grossSales)}`,
        `유효 주문 수: ${fmt(r.validOrders,1)}건`,
        `티어 커미션 합계: ${won(r.tierCommission)}`,
        `성과 보너스: ${won(r.bonusAmount)}`,
        `네트워크 수수료: ${won(r.networkFee)}`,
        `최종 정산액: ${won(r.finalPayout)}`,
        `실효 지급률: ${fmt(r.effectiveRate,2)}%`,
        `판매자 잔존매출: ${won(r.merchantRetainedRevenue)}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.price,refs.orders,refs.refundRate,refs.tier1Rate,refs.tier1Cap,refs.tier2Rate,refs.bonusPerOrder,refs.networkFeeRate]
        .forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
