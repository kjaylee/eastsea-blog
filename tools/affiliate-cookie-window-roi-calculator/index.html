<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affiliate Cookie Window ROI Calculator | 제휴 쿠키 윈도우 ROI 계산기</title>
  <meta name="description" content="제휴 쿠키 유효기간(어트리뷰션 윈도우) 확장 시 추가 주문, 월 순이익, ROI, 회수기간, 손익분기 전환율을 계산합니다." />
  <meta name="keywords" content="affiliate, cookie window, attribution, roi calculator, commission, ecommerce, 제휴, 쿠키 윈도우, ROI" />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}
    .sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}
    .soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}
    th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🧷 제휴 쿠키 윈도우 ROI 계산기</h1>
        <div class="sub" id="subtitle">쿠키 어트리뷰션 기간 확장(예: 7일→30일)이 만드는 추가 매출 기여와 수익성을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/tools/">도구 목록</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_clicks" for="clicks"></label><input id="clicks" type="number" min="1" value="280000"></div>
          <div><label id="l_currentCvr" for="currentCvr"></label><input id="currentCvr" type="number" min="0" max="100" step="0.01" value="2.1"></div>
          <div><label id="l_targetCvr" for="targetCvr"></label><input id="targetCvr" type="number" min="0" max="100" step="0.01" value="2.7"></div>
          <div><label id="l_aov" for="aov"></label><input id="aov" type="number" min="0" step="100" value="72000"></div>
          <div><label id="l_grossMargin" for="grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="46"></div>
          <div><label id="l_commissionRate" for="commissionRate"></label><input id="commissionRate" type="number" min="0" max="100" step="0.1" value="12"></div>
          <div><label id="l_networkFeeRate" for="networkFeeRate"></label><input id="networkFeeRate" type="number" min="0" max="100" step="0.1" value="2.5"></div>
          <div><label id="l_refundRate" for="refundRate"></label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="4"></div>
          <div><label id="l_monthlyCost" for="monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="3800000"></div>
          <div><label id="l_setupCost" for="setupCost"></label><input id="setupCost" type="number" min="0" step="10000" value="7000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_incrementalOrders"></div><div class="v" id="incrementalOrders">-</div></div>
          <div class="kpi"><div class="k" id="k_contributionPerOrder"></div><div class="v" id="contributionPerOrder">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_cvrDelta"></div><div class="v" id="cvrDelta">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table>
          <tbody>
            <tr><th id="d_breakEvenCvr"></th><td id="breakEvenCvr">-</td></tr>
            <tr><th id="d_paybackMonths"></th><td id="paybackMonths">-</td></tr>
            <tr><th id="d_incrementalContribution"></th><td id="incrementalContribution">-</td></tr>
            <tr><th id="d_totalInvestment"></th><td id="totalInvestment">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="./calculator.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      clicks: $("clicks"), currentCvr: $("currentCvr"), targetCvr: $("targetCvr"), aov: $("aov"), grossMargin: $("grossMargin"),
      commissionRate: $("commissionRate"), networkFeeRate: $("networkFeeRate"), refundRate: $("refundRate"),
      monthlyCost: $("monthlyCost"), setupCost: $("setupCost"), months: $("months"),
      incrementalOrders: $("incrementalOrders"), contributionPerOrder: $("contributionPerOrder"), monthlyNet: $("monthlyNet"),
      roi: $("roi"), periodNet: $("periodNet"), cvrDelta: $("cvrDelta"), breakEvenCvr: $("breakEvenCvr"), paybackMonths: $("paybackMonths"),
      incrementalContribution: $("incrementalContribution"), totalInvestment: $("totalInvestment"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset"), langBtn: $("langBtn")
    };

    const defaults = {
      clicks: 280000, currentCvr: 2.1, targetCvr: 2.7, aov: 72000, grossMargin: 46,
      commissionRate: 12, networkFeeRate: 2.5, refundRate: 4, monthlyCost: 3800000, setupCost: 7000000, months: 12
    };

    const I18N = {
      ko: {
        title: "🧷 제휴 쿠키 윈도우 ROI 계산기",
        subtitle: "쿠키 어트리뷰션 기간 확장(예: 7일→30일)이 만드는 추가 매출 기여와 수익성을 계산합니다.",
        inputHeader: "입력값", kpiHeader: "핵심 KPI", detailHeader: "세부 지표", back: "도구 목록", copy: "요약 복사", reset: "기본값 복원",
        l_clicks: "월 제휴 클릭 수", l_currentCvr: "현재 어트리뷰션 전환율 (%)", l_targetCvr: "목표 어트리뷰션 전환율 (%)",
        l_aov: "평균 주문금액 AOV (₩)", l_grossMargin: "매출총이익률 (%)", l_commissionRate: "제휴 커미션율 (%)",
        l_networkFeeRate: "네트워크/플랫폼 수수료율 (%)", l_refundRate: "환불·취소율 (%)", l_monthlyCost: "월 운영비 (₩)",
        l_setupCost: "초기 셋업비 (₩)", l_months: "분석 기간 (개월)",
        k_incrementalOrders: "순증 주문 수", k_contributionPerOrder: "주문당 순기여", k_monthlyNet: "월 순이익", k_roi: "ROI",
        k_periodNet: "기간 순효과", k_cvrDelta: "전환율 증가폭", d_breakEvenCvr: "손익분기 목표 전환율", d_paybackMonths: "회수기간",
        d_incrementalContribution: "월 순증 기여이익", d_totalInvestment: "총 투자비용", ok: "쿠키 윈도우 확장 수익성 양호", warn: "현재 가정에서는 월 순이익이 음수입니다",
        invalid: "입력값을 확인해주세요", copied: "요약이 복사되었습니다.", copyFail: "클립보드 사용 불가: 수동 복사하세요.",
        summaryTitle: "[제휴 쿠키 윈도우 ROI 요약]", unitMonths: "개월", na: "계산 불가"
      },
      en: {
        title: "🧷 Affiliate Cookie Window ROI Calculator",
        subtitle: "Estimate the profit impact of extending affiliate attribution cookie window (e.g., 7-day to 30-day).",
        inputHeader: "Inputs", kpiHeader: "Key KPIs", detailHeader: "Details", back: "Tools", copy: "Copy Summary", reset: "Reset Defaults",
        l_clicks: "Monthly affiliate clicks", l_currentCvr: "Current attributed CVR (%)", l_targetCvr: "Target attributed CVR (%)",
        l_aov: "Average order value (KRW)", l_grossMargin: "Gross margin (%)", l_commissionRate: "Affiliate commission rate (%)",
        l_networkFeeRate: "Network/platform fee rate (%)", l_refundRate: "Refund/cancel rate (%)", l_monthlyCost: "Monthly program cost (KRW)",
        l_setupCost: "One-time setup cost (KRW)", l_months: "Analysis period (months)",
        k_incrementalOrders: "Incremental orders", k_contributionPerOrder: "Net contribution per order", k_monthlyNet: "Monthly net profit", k_roi: "ROI",
        k_periodNet: "Cumulative net impact", k_cvrDelta: "CVR uplift", d_breakEvenCvr: "Break-even target CVR", d_paybackMonths: "Payback period",
        d_incrementalContribution: "Monthly incremental contribution", d_totalInvestment: "Total investment", ok: "Economics look healthy", warn: "Monthly net profit is negative with current assumptions",
        invalid: "Please review your inputs.", copied: "Summary copied.", copyFail: "Clipboard unavailable. Please copy manually.",
        summaryTitle: "[Affiliate Cookie Window ROI Summary]", unitMonths: "months", na: "N/A"
      }
    };

    let lang = "ko";
    const t = (k) => I18N[lang][k] || k;
    const won = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(Number.isFinite(n) ? n : 0);
    const num = (n, d = 1) => Number(n).toLocaleString(lang === "ko" ? "ko-KR" : "en-US", { maximumFractionDigits: d });
    const pct = (n, d = 2) => `${num(n, d)}%`;

    function applyI18n() {
      document.documentElement.lang = lang;
      ["title", "subtitle", "inputHeader", "kpiHeader", "detailHeader"].forEach((k) => $(k).textContent = t(k));
      $("backLink").textContent = t("back");
      refs.copy.textContent = t("copy");
      refs.reset.textContent = t("reset");
      refs.langBtn.textContent = lang === "ko" ? "EN" : "KO";
      ["clicks", "currentCvr", "targetCvr", "aov", "grossMargin", "commissionRate", "networkFeeRate", "refundRate", "monthlyCost", "setupCost", "months"]
        .forEach((k) => $("l_" + k).textContent = t("l_" + k));
      ["incrementalOrders", "contributionPerOrder", "monthlyNet", "roi", "periodNet", "cvrDelta"].forEach((k) => $("k_" + k).textContent = t("k_" + k));
      ["breakEvenCvr", "paybackMonths", "incrementalContribution", "totalInvestment"].forEach((k) => $("d_" + k).textContent = t("d_" + k));
    }

    function readInputs() {
      return {
        clicks: Number(refs.clicks.value),
        currentCvr: Number(refs.currentCvr.value),
        targetCvr: Number(refs.targetCvr.value),
        aov: Number(refs.aov.value),
        grossMargin: Number(refs.grossMargin.value),
        commissionRate: Number(refs.commissionRate.value),
        networkFeeRate: Number(refs.networkFeeRate.value),
        refundRate: Number(refs.refundRate.value),
        monthlyCost: Number(refs.monthlyCost.value),
        setupCost: Number(refs.setupCost.value),
        months: Number(refs.months.value)
      };
    }

    function render() {
      const input = readInputs();
      const { result, error } = window.AffiliateCookieWindow.calculate(input, { lang });
      refs.error.classList.toggle("show", Boolean(error));
      refs.error.textContent = error || "";

      if (error || !result) {
        ["incrementalOrders", "contributionPerOrder", "monthlyNet", "roi", "periodNet", "cvrDelta", "breakEvenCvr", "paybackMonths", "incrementalContribution", "totalInvestment"]
          .forEach((k) => refs[k].textContent = "-");
        refs.status.textContent = t("invalid");
        refs.summary.value = "";
        return;
      }

      refs.incrementalOrders.textContent = num(result.incrementalOrders, 0);
      refs.contributionPerOrder.textContent = won(result.contributionPerOrder);
      refs.monthlyNet.textContent = won(result.monthlyNet);
      refs.roi.textContent = pct(result.roi, 1);
      refs.periodNet.textContent = won(result.periodNet);
      refs.cvrDelta.textContent = pct(result.cvrDelta, 2);
      refs.breakEvenCvr.textContent = Number.isFinite(result.breakEvenCvr) && result.breakEvenCvr <= 100 ? pct(result.breakEvenCvr, 3) : t("na");
      refs.paybackMonths.textContent = Number.isFinite(result.paybackMonths) ? `${num(result.paybackMonths, 1)} ${t("unitMonths")}` : t("na");
      refs.incrementalContribution.textContent = won(result.incrementalContribution);
      refs.totalInvestment.textContent = won(result.totalInvestment);

      refs.status.innerHTML = result.monthlyNet >= 0
        ? `<span style="color:var(--good)">●</span> ${t("ok")}`
        : `<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_incrementalOrders")}: ${num(result.incrementalOrders, 0)}`,
        `${t("k_contributionPerOrder")}: ${won(result.contributionPerOrder)}`,
        `${t("d_incrementalContribution")}: ${won(result.incrementalContribution)}`,
        `${t("k_monthlyNet")}: ${won(result.monthlyNet)}`,
        `${t("k_periodNet")}: ${won(result.periodNet)}`,
        `${t("d_breakEvenCvr")}: ${Number.isFinite(result.breakEvenCvr) && result.breakEvenCvr <= 100 ? pct(result.breakEvenCvr, 3) : t("na")}`,
        `${t("d_paybackMonths")}: ${Number.isFinite(result.paybackMonths) ? `${num(result.paybackMonths, 1)} ${t("unitMonths")}` : t("na")}`,
        `${t("k_roi")}: ${pct(result.roi, 1)}`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click", () => { lang = lang === "ko" ? "en" : "ko"; applyI18n(); render(); });
    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });
    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k, v]) => refs[k].value = v);
      render();
    });
    [refs.clicks, refs.currentCvr, refs.targetCvr, refs.aov, refs.grossMargin, refs.commissionRate, refs.networkFeeRate, refs.refundRate, refs.monthlyCost, refs.setupCost, refs.months]
      .forEach((el) => el.addEventListener("input", render));

    applyI18n();
    render();
  </script>
</body>
</html>
