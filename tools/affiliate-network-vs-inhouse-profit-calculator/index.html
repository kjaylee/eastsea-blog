<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affiliate Network vs In-house Profit Calculator | 제휴 네트워크 vs 인하우스 수익 계산기</title>
  <meta name="description" content="제휴 네트워크 운영과 인하우스 운영의 월 순이익, 전환비용 회수기간, 손익분기 주문수를 비교 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}.head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.8vw,1.7rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}textarea{min-height:100px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.08rem;font-weight:800;word-break:break-word}.v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🤝 제휴 네트워크 vs 인하우스 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">네트워크/인하우스 모델의 수수료·손실·고정비를 비교해 월 순이익, 전환 ROI, 손익분기 주문수를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="orders" data-i18n="orders">월 제휴 주문 수</label><input id="orders" type="number" min="1" value="3200" /></div>
          <div><label for="aov" data-i18n="aov">주문당 평균 매출 (AOV, KRW)</label><input id="aov" type="number" min="1" value="72000" /></div>
          <div><label for="margin" data-i18n="margin">매출총이익률 (%)</label><input id="margin" type="number" min="0" max="100" step="0.1" value="46" /></div>
          <div><label for="nComm" data-i18n="nComm">네트워크 커미션율 (%)</label><input id="nComm" type="number" min="0" max="100" step="0.1" value="18" /></div>
          <div><label for="nFee" data-i18n="nFee">네트워크 플랫폼 수수료율 (%)</label><input id="nFee" type="number" min="0" max="100" step="0.1" value="4" /></div>
          <div><label for="nLoss" data-i18n="nLoss">네트워크 무효/환불 손실률 (%)</label><input id="nLoss" type="number" min="0" max="100" step="0.1" value="2.5" /></div>
          <div><label for="iComm" data-i18n="iComm">인하우스 커미션율 (%)</label><input id="iComm" type="number" min="0" max="100" step="0.1" value="14" /></div>
          <div><label for="iLoss" data-i18n="iLoss">인하우스 무효/환불 손실률 (%)</label><input id="iLoss" type="number" min="0" max="100" step="0.1" value="1.6" /></div>
          <div><label for="software" data-i18n="software">인하우스 툴 월 비용 (KRW)</label><input id="software" type="number" min="0" value="2200000" /></div>
          <div><label for="manager" data-i18n="manager">인하우스 운영인력 월 비용 (KRW)</label><input id="manager" type="number" min="0" value="4800000" /></div>
          <div><label for="setup" data-i18n="setup">전환 초기 비용 (KRW)</label><input id="setup" type="number" min="0" value="19000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="48" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_network">네트워크 월 순이익</div><div id="networkNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_inhouse">인하우스 월 순이익</div><div id="inhouseNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_delta">월 순이익 증감</div><div id="monthlyDelta" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_period">기간 순효과(전환비 반영)</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_breakEven">인하우스 우위 손익분기 주문수</th><td id="breakEvenOrders">-</td></tr>
            <tr><th data-i18n="d_gpPool">월 매출총이익 풀</th><td id="gpPool">-</td></tr>
            <tr><th data-i18n="d_networkBurden">네트워크 변동비 부담률</th><td id="networkBurden">-</td></tr>
            <tr><th data-i18n="d_inhouseBurden">인하우스 변동비 부담률</th><td id="inhouseBurden">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      orders:$("orders"), aov:$("aov"), margin:$("margin"), nComm:$("nComm"), nFee:$("nFee"), nLoss:$("nLoss"), iComm:$("iComm"), iLoss:$("iLoss"), software:$("software"), manager:$("manager"), setup:$("setup"), months:$("months"),
      networkNet:$("networkNet"), inhouseNet:$("inhouseNet"), monthlyDelta:$("monthlyDelta"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      breakEvenOrders:$("breakEvenOrders"), gpPool:$("gpPool"), networkBurden:$("networkBurden"), inhouseBurden:$("inhouseBurden"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { orders:3200, aov:72000, margin:46, nComm:18, nFee:4, nLoss:2.5, iComm:14, iLoss:1.6, software:2200000, manager:4800000, setup:19000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"🤝 제휴 네트워크 vs 인하우스 수익 계산기", subtitle:"네트워크/인하우스 모델의 수수료·손실·고정비를 비교해 월 순이익, 전환 ROI, 손익분기 주문수를 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        orders:"월 제휴 주문 수", aov:"주문당 평균 매출 (AOV, KRW)", margin:"매출총이익률 (%)", nComm:"네트워크 커미션율 (%)", nFee:"네트워크 플랫폼 수수료율 (%)", nLoss:"네트워크 무효/환불 손실률 (%)", iComm:"인하우스 커미션율 (%)", iLoss:"인하우스 무효/환불 손실률 (%)", software:"인하우스 툴 월 비용 (KRW)", manager:"인하우스 운영인력 월 비용 (KRW)", setup:"전환 초기 비용 (KRW)", months:"분석 기간 (개월)",
        k_network:"네트워크 월 순이익", k_inhouse:"인하우스 월 순이익", k_delta:"월 순이익 증감", k_period:"기간 순효과(전환비 반영)", k_roi:"ROI", k_payback:"회수기간",
        d_breakEven:"인하우스 우위 손익분기 주문수", d_gpPool:"월 매출총이익 풀", d_networkBurden:"네트워크 변동비 부담률", d_inhouseBurden:"인하우스 변동비 부담률",
        errOrders:"주문 수는 1 이상이어야 합니다.", errAov:"AOV는 0보다 커야 합니다.", errRates:"비율 값은 0~100% 범위여야 합니다.", errCosts:"비용 값은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~48개월 범위여야 합니다.",
        impossible:"달성 불가", noPayback:"회수 불가", statusGood:"인하우스 전환이 수익적으로 유리합니다", statusBad:"네트워크 유지가 더 유리하거나 가정 재조정이 필요합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.", unitMonth:"개월", unitOrders:"건", summaryTitle:"[Affiliate Network vs In-house 요약]", summaryBreakEven:"손익분기 주문수"
      },
      en: {
        title:"🤝 Affiliate Network vs In-house Profit Calculator", subtitle:"Compare network vs in-house affiliate operations with commissions, loss rates, and fixed costs to estimate net impact and break-even order volume.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        orders:"Monthly referred orders", aov:"Average order value (KRW)", margin:"Gross margin rate (%)", nComm:"Network commission rate (%)", nFee:"Network platform fee rate (%)", nLoss:"Network invalid/refund loss rate (%)", iComm:"In-house commission rate (%)", iLoss:"In-house invalid/refund loss rate (%)", software:"In-house software monthly cost (KRW)", manager:"In-house manager monthly cost (KRW)", setup:"Transition setup cost (KRW)", months:"Analysis period (months)",
        k_network:"Network monthly net", k_inhouse:"In-house monthly net", k_delta:"Monthly net uplift", k_period:"Period net impact (after setup)", k_roi:"ROI", k_payback:"Payback period",
        d_breakEven:"Break-even orders for in-house advantage", d_gpPool:"Monthly gross-profit pool", d_networkBurden:"Network variable burden", d_inhouseBurden:"In-house variable burden",
        errOrders:"Orders must be at least 1.", errAov:"AOV must be greater than 0.", errRates:"Rates must be between 0 and 100.", errCosts:"Costs must be >= 0.", errMonths:"Analysis period must be 1 to 48 months.",
        impossible:"Not feasible", noPayback:"No payback", statusGood:"In-house transition is financially favorable", statusBad:"Network remains better or assumptions need adjustment", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard unavailable. Please copy manually.", unitMonth:"months", unitOrders:"orders", summaryTitle:"[Affiliate Network vs In-house Summary]", summaryBreakEven:"Break-even orders"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.orders) || v.orders < 1) return t("errOrders");
      if (!Number.isFinite(v.aov) || v.aov <= 0) return t("errAov");
      if ([v.margin,v.nComm,v.nFee,v.nLoss,v.iComm,v.iLoss].some((n)=>!Number.isFinite(n) || n < 0 || n > 100)) return t("errRates");
      if ([v.software,v.manager,v.setup].some((n)=>!Number.isFinite(n) || n < 0)) return t("errCosts");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 48) return t("errMonths");
      return "";
    }

    function compute(v){
      const revenue = v.orders * v.aov;
      const gpPool = revenue * (v.margin / 100);

      const networkVariableRate = (v.nComm + v.nFee + v.nLoss) / 100;
      const inhouseVariableRate = (v.iComm + v.iLoss) / 100;
      const networkNet = gpPool - (revenue * networkVariableRate);
      const inhouseNet = gpPool - (revenue * inhouseVariableRate) - v.software - v.manager;

      const monthlyDelta = inhouseNet - networkNet;
      const periodNet = (monthlyDelta * v.months) - v.setup;
      const roi = v.setup === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / v.setup) * 100;
      const payback = monthlyDelta > 0 ? (v.setup / monthlyDelta) : Infinity;

      const coeff = v.aov * (networkVariableRate - inhouseVariableRate);
      const breakEvenOrders = coeff > 0 ? ((v.software + v.manager) / coeff) : Infinity;

      return { networkNet, inhouseNet, monthlyDelta, periodNet, roi, payback, breakEvenOrders, gpPool, networkVariableRate, inhouseVariableRate };
    }

    function resetOutputs(){
      ["networkNet","inhouseNet","monthlyDelta","periodNet","roi","payback","breakEvenOrders","gpPool","networkBurden","inhouseBurden"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        orders:Number(refs.orders.value), aov:Number(refs.aov.value), margin:Number(refs.margin.value), nComm:Number(refs.nComm.value), nFee:Number(refs.nFee.value),
        nLoss:Number(refs.nLoss.value), iComm:Number(refs.iComm.value), iLoss:Number(refs.iLoss.value), software:Number(refs.software.value), manager:Number(refs.manager.value),
        setup:Number(refs.setup.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.networkNet.textContent = money(r.networkNet);
      refs.inhouseNet.textContent = money(r.inhouseNet);
      refs.monthlyDelta.textContent = money(r.monthlyDelta);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback");

      refs.breakEvenOrders.textContent = Number.isFinite(r.breakEvenOrders) ? `${num(r.breakEvenOrders,0)} ${t("unitOrders")}` : t("impossible");
      refs.gpPool.textContent = money(r.gpPool);
      refs.networkBurden.textContent = `${num(r.networkVariableRate * 100,2)}%`;
      refs.inhouseBurden.textContent = `${num(r.inhouseVariableRate * 100,2)}%`;

      refs.status.innerHTML = r.monthlyDelta >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_network")}: ${money(r.networkNet)}`,
        `${t("k_inhouse")}: ${money(r.inhouseNet)}`,
        `${t("k_delta")}: ${money(r.monthlyDelta)}`,
        `${t("k_period")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("summaryBreakEven")}: ${Number.isFinite(r.breakEvenOrders) ? `${num(r.breakEvenOrders,0)} ${t("unitOrders")}` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.orders,refs.aov,refs.margin,refs.nComm,refs.nFee,refs.nLoss,refs.iComm,refs.iLoss,refs.software,refs.manager,refs.setup,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
