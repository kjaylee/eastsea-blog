<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affiliate Tiered Commission ROI Calculator | 제휴 Tiered 커미션 ROI 계산기</title>
  <meta name="description" content="단일 커미션에서 티어드 커미션으로 전환할 때 전환율 변화와 커미션 비용을 반영해 월 순효과, ROI, 회수기간을 계산합니다." />
  <style>
    :root{--bg:#0b1220;--card:#14233d;--line:#2c4970;--txt:#eaf2ff;--muted:#a9bfdc;--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#1c3a64 0%,#0b1220 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 60px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.6vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#173258;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#19345d,#11203a);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d35;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 data-i18n="title">🤝 제휴 Tiered 커미션 ROI 계산기</h1>
        <div class="sub" data-i18n="subtitle">커미션 체계 변경(Flat → Tiered)의 전환율 개선과 비용 증가를 함께 반영해 순이익을 비교합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="chip" type="button">EN</button>
        <a class="chip" href="/" data-i18n="back">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="clicks" data-i18n="l_clicks"></label><input id="clicks" type="number" min="1" value="180000"></div>
          <div><label for="currentConv" data-i18n="l_currentConv"></label><input id="currentConv" type="number" min="0" max="100" step="0.01" value="2.4"></div>
          <div><label for="targetConv" data-i18n="l_targetConv"></label><input id="targetConv" type="number" min="0" max="100" step="0.01" value="2.9"></div>
          <div><label for="aov" data-i18n="l_aov"></label><input id="aov" type="number" min="1" step="100" value="78000"></div>
          <div><label for="grossMargin" data-i18n="l_grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="42"></div>
          <div><label for="currentCommission" data-i18n="l_currentCommission"></label><input id="currentCommission" type="number" min="0" max="100" step="0.1" value="14"></div>
          <div><label for="tier1Commission" data-i18n="l_tier1Commission"></label><input id="tier1Commission" type="number" min="0" max="100" step="0.1" value="12"></div>
          <div><label for="tier1Share" data-i18n="l_tier1Share"></label><input id="tier1Share" type="number" min="0" max="100" step="0.1" value="65"></div>
          <div><label for="tier2Commission" data-i18n="l_tier2Commission"></label><input id="tier2Commission" type="number" min="0" max="100" step="0.1" value="18"></div>
          <div><label for="monthlyCost" data-i18n="l_monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="4200000"></div>
          <div><label for="setup" data-i18n="l_setup"></label><input id="setup" type="number" min="0" step="10000" value="16000000"></div>
          <div><label for="months" data-i18n="l_months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button" data-i18n="copy"></button><button id="reset" type="button" data-i18n="reset"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_currentMonthly"></div><div class="v" id="currentMonthly">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_tieredMonthly"></div><div class="v" id="tieredMonthly">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback"></div><div class="v" id="payback">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 style="margin-top:12px" data-i18n="detailHeader"></h2>
        <table><tbody>
          <tr><th data-i18n="d_weightedCommission"></th><td id="weightedCommission">-</td></tr>
          <tr><th data-i18n="d_currentOrders"></th><td id="currentOrders">-</td></tr>
          <tr><th data-i18n="d_targetOrders"></th><td id="targetOrders">-</td></tr>
          <tr><th data-i18n="d_breakEvenConv"></th><td id="breakEvenConv">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={clicks:$("clicks"),currentConv:$("currentConv"),targetConv:$("targetConv"),aov:$("aov"),grossMargin:$("grossMargin"),currentCommission:$("currentCommission"),tier1Commission:$("tier1Commission"),tier1Share:$("tier1Share"),tier2Commission:$("tier2Commission"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),currentMonthly:$("currentMonthly"),tieredMonthly:$("tieredMonthly"),monthlyNet:$("monthlyNet"),periodNet:$("periodNet"),roi:$("roi"),payback:$("payback"),weightedCommission:$("weightedCommission"),currentOrders:$("currentOrders"),targetOrders:$("targetOrders"),breakEvenConv:$("breakEvenConv"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={clicks:180000,currentConv:2.4,targetConv:2.9,aov:78000,grossMargin:42,currentCommission:14,tier1Commission:12,tier1Share:65,tier2Commission:18,monthlyCost:4200000,setup:16000000,months:12};
    let lang="ko";

    const I18N={
      ko:{title:"🤝 제휴 Tiered 커미션 ROI 계산기",subtitle:"커미션 체계 변경(Flat → Tiered)의 전환율 개선과 비용 증가를 함께 반영해 순이익을 비교합니다.",back:"포털로",inputs:"입력값",copy:"요약 복사",reset:"기본값 복원",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",l_clicks:"월 제휴 유입 클릭 수",l_currentConv:"현재 전환율 (%)",l_targetConv:"목표 전환율 (%)",l_aov:"평균 주문금액 (₩)",l_grossMargin:"매출총이익률 (%)",l_currentCommission:"현재 커미션율 (%)",l_tier1Commission:"티어1 커미션율 (%)",l_tier1Share:"티어1 주문 비중 (%)",l_tier2Commission:"티어2 커미션율 (%)",l_monthlyCost:"월 운영비 (₩)",l_setup:"초기 전환비 (₩)",l_months:"분석 기간 (개월)",k_currentMonthly:"현재 월 순이익",k_tieredMonthly:"Tiered 월 순이익",k_monthlyNet:"월 순효과",k_periodNet:"기간 순효과",k_roi:"ROI",k_payback:"회수기간",d_weightedCommission:"가중 Tiered 커미션율",d_currentOrders:"현재 월 주문수",d_targetOrders:"목표 월 주문수",d_breakEvenConv:"손익분기 목표 전환율",ok:"Tiered 전환이 수익적으로 유효합니다",warn:"현재 가정에서는 월 순효과가 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"클릭/가격/기간은 1 이상, 비용은 0 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",unitMonths:"개월",unitOrders:"건",summaryTitle:"[Affiliate Tiered Commission ROI 요약]"},
      en:{title:"🤝 Affiliate Tiered Commission ROI Calculator",subtitle:"Compare profitability when moving from flat commission to tiered commission with conversion uplift and added operating cost.",back:"Back to Portal",inputs:"Inputs",copy:"Copy Summary",reset:"Reset Defaults",kpiHeader:"Key KPIs",detailHeader:"Details",l_clicks:"Monthly affiliate inbound clicks",l_currentConv:"Current conversion rate (%)",l_targetConv:"Target conversion rate (%)",l_aov:"Average order value (KRW)",l_grossMargin:"Gross margin (%)",l_currentCommission:"Current commission rate (%)",l_tier1Commission:"Tier-1 commission rate (%)",l_tier1Share:"Tier-1 order share (%)",l_tier2Commission:"Tier-2 commission rate (%)",l_monthlyCost:"Monthly operating cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_currentMonthly:"Current monthly net profit",k_tieredMonthly:"Tiered monthly net profit",k_monthlyNet:"Monthly net impact",k_periodNet:"Period net impact",k_roi:"ROI",k_payback:"Payback period",d_weightedCommission:"Weighted tiered commission rate",d_currentOrders:"Current monthly orders",d_targetOrders:"Target monthly orders",d_breakEvenConv:"Break-even target conversion",ok:"Tiered transition is financially favorable",warn:"Monthly net impact is negative under current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Clicks/price/months must be >= 1 and costs >= 0.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",unitMonths:"months",unitOrders:"orders",summaryTitle:"[Affiliate Tiered Commission ROI Summary]"}
    };

    const t=(k)=>I18N[lang][k]||k;
    const locale=()=>lang==="ko"?"ko-KR":"en-US";
    const won=(n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      document.querySelectorAll("[data-i18n]").forEach(el=>{el.textContent=t(el.dataset.i18n)});
      refs.langBtn.textContent=lang==="ko"?"EN":"KO";
    }

    function validate(v){
      if(!Number.isFinite(v.clicks)||v.clicks<1||!Number.isFinite(v.aov)||v.aov<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.monthlyCost,v.setup].some(n=>!Number.isFinite(n)||n<0)) return t("numErr");
      if([v.currentConv,v.targetConv,v.grossMargin,v.currentCommission,v.tier1Commission,v.tier1Share,v.tier2Commission].some(n=>!Number.isFinite(n)||n<0||n>100)) return t("rangeErr");
      return "";
    }

    function render(){
      const v={clicks:Number(refs.clicks.value),currentConv:Number(refs.currentConv.value),targetConv:Number(refs.targetConv.value),aov:Number(refs.aov.value),grossMargin:Number(refs.grossMargin.value),currentCommission:Number(refs.currentCommission.value),tier1Commission:Number(refs.tier1Commission.value),tier1Share:Number(refs.tier1Share.value),tier2Commission:Number(refs.tier2Commission.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v);
      refs.error.classList.toggle("show",Boolean(err));
      refs.error.textContent=err;
      if(err){
        ["currentMonthly","tieredMonthly","monthlyNet","periodNet","roi","payback","weightedCommission","currentOrders","targetOrders","breakEvenConv"].forEach(k=>refs[k].textContent="-");
        refs.status.textContent=t("invalid");
        refs.summary.value="";
        return;
      }

      const weightedTierCommission=v.tier1Commission*(v.tier1Share/100)+v.tier2Commission*(1-v.tier1Share/100);
      const currentOrders=v.clicks*(v.currentConv/100);
      const targetOrders=v.clicks*(v.targetConv/100);
      const unitGrossProfit=v.aov*(v.grossMargin/100);
      const currentPerOrderNet=unitGrossProfit-(v.aov*(v.currentCommission/100));
      const tierPerOrderNet=unitGrossProfit-(v.aov*(weightedTierCommission/100));

      const currentMonthly=currentOrders*currentPerOrderNet;
      const tieredMonthly=(targetOrders*tierPerOrderNet)-v.monthlyCost;
      const monthlyNet=tieredMonthly-currentMonthly;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const payback=monthlyNet>0?v.setup/monthlyNet:Infinity;
      const breakEvenConv=(v.clicks>0 && tierPerOrderNet>0)?((currentMonthly+v.monthlyCost)/(v.clicks*tierPerOrderNet))*100:Infinity;

      refs.currentMonthly.textContent=won(currentMonthly);
      refs.tieredMonthly.textContent=won(tieredMonthly);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.periodNet.textContent=won(periodNet);
      refs.roi.textContent=pct(roi,1);
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.weightedCommission.textContent=pct(weightedTierCommission,2);
      refs.currentOrders.textContent=`${num(currentOrders,0)} ${t("unitOrders")}`;
      refs.targetOrders.textContent=`${num(targetOrders,0)} ${t("unitOrders")}`;
      refs.breakEvenConv.textContent=Number.isFinite(breakEvenConv)&&breakEvenConv>=0?pct(breakEvenConv,2):t("na");
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--ok)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[
        t("summaryTitle"),
        `${t("k_currentMonthly")}: ${won(currentMonthly)}`,
        `${t("k_tieredMonthly")}: ${won(tieredMonthly)}`,
        `${t("k_monthlyNet")}: ${won(monthlyNet)}`,
        `${t("k_periodNet")}: ${won(periodNet)}`,
        `${t("k_roi")}: ${pct(roi,1)}`,
        `${t("k_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,
        `${t("d_breakEvenConv")}: ${Number.isFinite(breakEvenConv)&&breakEvenConv>=0?pct(breakEvenConv,2):t("na")}`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim())return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.clicks,refs.currentConv,refs.targetConv,refs.aov,refs.grossMargin,refs.currentCommission,refs.tier1Commission,refs.tier1Share,refs.tier2Commission,refs.monthlyCost,refs.setup,refs.months].forEach(el=>el.addEventListener("input",render));

    applyI18n();
    render();
  </script>
</body>
</html>
