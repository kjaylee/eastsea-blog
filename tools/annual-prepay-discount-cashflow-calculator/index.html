<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annual Prepay Discount Cashflow Calculator | 연간 선결제 할인 현금흐름 계산기</title>
  <meta name="description" content="월 구독자를 연간 선결제로 전환할 때 할인율, 전환율, 이탈률 개선을 반영해 현금흐름, ROI, 회수기간, 손익분기 전환율을 계산합니다." />
  <style>
    :root{--bg:#0a1527;--card:#152845;--line:#31547d;--txt:#e7f1ff;--muted:#acc3e1;--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#1c406f 0%,#0a1527 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 60px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.82rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#1a3961;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#18355f,#11233e);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1f39;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 data-i18n="title">💳 연간 선결제 할인 현금흐름 계산기</h1>
        <div class="sub" data-i18n="subtitle">월 과금 고객 일부를 연간 선결제로 전환할 때 할인·유지율 개선·결제손실 절감을 반영해 순효과를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="chip" type="button">EN</button>
        <a class="chip" href="/" data-i18n="back">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="subscribers" data-i18n="l_subscribers"></label><input id="subscribers" type="number" min="1" step="1" value="7200"></div>
          <div><label for="monthlyPrice" data-i18n="l_monthlyPrice"></label><input id="monthlyPrice" type="number" min="1" step="100" value="29000"></div>
          <div><label for="annualDiscount" data-i18n="l_annualDiscount"></label><input id="annualDiscount" type="number" min="0" max="95" step="0.1" value="18"></div>
          <div><label for="adoption" data-i18n="l_adoption"></label><input id="adoption" type="number" min="0" max="100" step="0.1" value="28"></div>
          <div><label for="monthlyChurn" data-i18n="l_monthlyChurn"></label><input id="monthlyChurn" type="number" min="0" max="100" step="0.1" value="3.2"></div>
          <div><label for="churnImprovement" data-i18n="l_churnImprovement"></label><input id="churnImprovement" type="number" min="0" max="100" step="0.1" value="1.1"></div>
          <div><label for="grossMargin" data-i18n="l_grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="84"></div>
          <div><label for="failureSaving" data-i18n="l_failureSaving"></label><input id="failureSaving" type="number" min="0" step="100" value="680"></div>
          <div><label for="monthlyCost" data-i18n="l_monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="4600000"></div>
          <div><label for="setup" data-i18n="l_setup"></label><input id="setup" type="number" min="0" step="10000" value="28000000"></div>
          <div><label for="months" data-i18n="l_months"></label><input id="months" type="number" min="1" max="36" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button" data-i18n="copy"></button><button id="reset" type="button" data-i18n="reset"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_baselineCash"></div><div class="v" id="baselineCash">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_scenarioCash"></div><div class="v" id="scenarioCash">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyAvgNet"></div><div class="v" id="monthlyAvgNet">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback"></div><div class="v" id="payback">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 style="margin-top:12px" data-i18n="detailHeader"></h2>
        <table><tbody>
          <tr><th data-i18n="d_annualPrice"></th><td id="annualPrice">-</td></tr>
          <tr><th data-i18n="d_convertedSubs"></th><td id="convertedSubs">-</td></tr>
          <tr><th data-i18n="d_failureSavings"></th><td id="failureSavings">-</td></tr>
          <tr><th data-i18n="d_breakEvenAdoption"></th><td id="breakEvenAdoption">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={subscribers:$("subscribers"),monthlyPrice:$("monthlyPrice"),annualDiscount:$("annualDiscount"),adoption:$("adoption"),monthlyChurn:$("monthlyChurn"),churnImprovement:$("churnImprovement"),grossMargin:$("grossMargin"),failureSaving:$("failureSaving"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),baselineCash:$("baselineCash"),scenarioCash:$("scenarioCash"),monthlyAvgNet:$("monthlyAvgNet"),periodNet:$("periodNet"),roi:$("roi"),payback:$("payback"),annualPrice:$("annualPrice"),convertedSubs:$("convertedSubs"),failureSavings:$("failureSavings"),breakEvenAdoption:$("breakEvenAdoption"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={subscribers:7200,monthlyPrice:29000,annualDiscount:18,adoption:28,monthlyChurn:3.2,churnImprovement:1.1,grossMargin:84,failureSaving:680,monthlyCost:4600000,setup:28000000,months:12};
    let lang="ko";

    const I18N={
      ko:{title:"💳 연간 선결제 할인 현금흐름 계산기",subtitle:"월 과금 고객 일부를 연간 선결제로 전환할 때 할인·유지율 개선·결제손실 절감을 반영해 순효과를 계산합니다.",back:"포털로",inputs:"입력값",copy:"요약 복사",reset:"기본값 복원",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",l_subscribers:"대상 월 구독자 수",l_monthlyPrice:"월 구독 가격 (₩)",l_annualDiscount:"연간 선결제 할인율 (%)",l_adoption:"선결제 전환율 (%)",l_monthlyChurn:"현재 월 이탈률 (%)",l_churnImprovement:"선결제 이탈률 개선폭 (%p)",l_grossMargin:"매출총이익률 (%)",l_failureSaving:"전환 고객당 월 결제실패 손실 절감액 (₩)",l_monthlyCost:"월 운영비 (₩)",l_setup:"초기 전환비 (₩)",l_months:"분석 기간 (개월)",k_baselineCash:"현재 시나리오 기간 현금유입",k_scenarioCash:"선결제 시나리오 기간 현금유입",k_monthlyAvgNet:"월 평균 순효과(설치비 제외)",k_periodNet:"기간 순효과",k_roi:"ROI",k_payback:"회수기간",d_annualPrice:"연간 선결제 가격",d_convertedSubs:"전환 구독자 수",d_failureSavings:"기간 결제손실 절감",d_breakEvenAdoption:"손익분기 선결제 전환율",ok:"선결제 전환 시나리오가 수익적으로 유효합니다",warn:"현재 가정에서는 손익분기 달성이 어렵습니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값 범위를 확인해주세요.",numErr:"구독자/가격/기간은 양수, 비용은 0 이상이어야 합니다.",churnErr:"이탈률 개선폭은 현재 이탈률보다 클 수 없습니다.",na:"N/A",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",unitMonths:"개월",unitSubs:"명",summaryTitle:"[Annual Prepay Discount Cashflow 요약]"},
      en:{title:"💳 Annual Prepay Discount Cashflow Calculator",subtitle:"Estimate cashflow and ROI when converting monthly subscribers to annual prepay with discount, retention improvement, and payment-failure savings.",back:"Back to Portal",inputs:"Inputs",copy:"Copy Summary",reset:"Reset Defaults",kpiHeader:"Key KPIs",detailHeader:"Details",l_subscribers:"Eligible monthly subscribers",l_monthlyPrice:"Monthly subscription price (KRW)",l_annualDiscount:"Annual prepay discount (%)",l_adoption:"Prepay adoption rate (%)",l_monthlyChurn:"Current monthly churn (%)",l_churnImprovement:"Churn improvement with prepay (pp)",l_grossMargin:"Gross margin (%)",l_failureSaving:"Monthly payment-failure loss saved per converted subscriber (KRW)",l_monthlyCost:"Monthly operating cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_baselineCash:"Baseline period cash inflow",k_scenarioCash:"Prepay scenario period cash inflow",k_monthlyAvgNet:"Average monthly net impact (excl. setup)",k_periodNet:"Period net impact",k_roi:"ROI",k_payback:"Payback period",d_annualPrice:"Annual prepay price",d_convertedSubs:"Converted subscribers",d_failureSavings:"Period payment-loss savings",d_breakEvenAdoption:"Break-even prepay adoption",ok:"Prepay conversion is financially favorable",warn:"Break-even is hard to reach under current assumptions",invalid:"Please review inputs",rangeErr:"Please check rate input ranges.",numErr:"Subscribers/price/months must be positive and costs >= 0.",churnErr:"Churn improvement cannot exceed current churn.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",unitMonths:"months",unitSubs:"subs",summaryTitle:"[Annual Prepay Discount Cashflow Summary]"}
    };

    const t=(k)=>I18N[lang][k]||k;
    const locale=()=>lang==="ko"?"ko-KR":"en-US";
    const won=(n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const pct=(n,d=2)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
      refs.langBtn.textContent=lang==="ko"?"EN":"KO";
    }

    function validate(v){
      if(!Number.isFinite(v.subscribers)||v.subscribers<1||!Number.isFinite(v.monthlyPrice)||v.monthlyPrice<1||!Number.isFinite(v.months)||v.months<1||v.months>36) return t("numErr");
      if([v.failureSaving,v.monthlyCost,v.setup].some(n=>!Number.isFinite(n)||n<0)) return t("numErr");
      if([v.annualDiscount,v.adoption,v.monthlyChurn,v.churnImprovement,v.grossMargin].some(n=>!Number.isFinite(n)||n<0||n>100)) return t("rangeErr");
      if(v.churnImprovement>v.monthlyChurn) return t("churnErr");
      return "";
    }

    function baselineCashflow(v){
      let active=v.subscribers;
      let cash=0;
      const retain=1-(v.monthlyChurn/100);
      for(let m=1;m<=v.months;m++){
        cash+=active*v.monthlyPrice;
        active*=retain;
      }
      return cash;
    }

    function scenarioCashflow(v, adoptionRate){
      const adoption=Math.min(Math.max(adoptionRate,0),1);
      const annualPrice=v.monthlyPrice*12*(1-v.annualDiscount/100);
      let annualActive=v.subscribers*adoption;
      let monthlyActive=v.subscribers-annualActive;
      const baseRetain=1-(v.monthlyChurn/100);
      const annualChurn=Math.max(0,v.monthlyChurn-v.churnImprovement);
      const annualRetain=1-(annualChurn/100);
      let cash=0;
      let savings=0;

      for(let m=1;m<=v.months;m++){
        if((m-1)%12===0) cash+=annualActive*annualPrice;
        cash+=monthlyActive*v.monthlyPrice;
        savings+=annualActive*v.failureSaving;
        annualActive*=annualRetain;
        monthlyActive*=baseRetain;
      }
      return {cash,savings,annualPrice,converted:v.subscribers*adoption};
    }

    function periodNetByAdoption(v, adoptionRate){
      const baselineCash=baselineCashflow(v);
      const sc=scenarioCashflow(v,adoptionRate);
      const margin=v.grossMargin/100;
      const baselineProfit=baselineCash*margin;
      const scenarioProfit=(sc.cash*margin)+sc.savings-(v.monthlyCost*v.months);
      return scenarioProfit-baselineProfit-v.setup;
    }

    function breakEvenAdoption(v){
      const f0=periodNetByAdoption(v,0);
      if(f0>=0) return 0;
      const f1=periodNetByAdoption(v,1);
      if(f1<0) return Infinity;
      let lo=0,hi=1;
      for(let i=0;i<50;i++){
        const mid=(lo+hi)/2;
        const fm=periodNetByAdoption(v,mid);
        if(fm>=0) hi=mid; else lo=mid;
      }
      return hi*100;
    }

    function render(){
      const v={subscribers:Number(refs.subscribers.value),monthlyPrice:Number(refs.monthlyPrice.value),annualDiscount:Number(refs.annualDiscount.value),adoption:Number(refs.adoption.value),monthlyChurn:Number(refs.monthlyChurn.value),churnImprovement:Number(refs.churnImprovement.value),grossMargin:Number(refs.grossMargin.value),failureSaving:Number(refs.failureSaving.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v);
      refs.error.classList.toggle("show",Boolean(err));
      refs.error.textContent=err;
      if(err){
        ["baselineCash","scenarioCash","monthlyAvgNet","periodNet","roi","payback","annualPrice","convertedSubs","failureSavings","breakEvenAdoption"].forEach(k=>refs[k].textContent="-");
        refs.status.textContent=t("invalid"); refs.summary.value=""; return;
      }

      const baselineCash=baselineCashflow(v);
      const sc=scenarioCashflow(v,v.adoption/100);
      const margin=v.grossMargin/100;
      const baselineProfit=baselineCash*margin;
      const scenarioProfit=(sc.cash*margin)+sc.savings-(v.monthlyCost*v.months);
      const deltaBeforeSetup=scenarioProfit-baselineProfit;
      const monthlyAvgNet=deltaBeforeSetup/v.months;
      const periodNet=deltaBeforeSetup-v.setup;
      const totalProgramCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const payback=monthlyAvgNet>0?v.setup/monthlyAvgNet:Infinity;
      const beAdoption=breakEvenAdoption(v);

      refs.baselineCash.textContent=won(baselineCash);
      refs.scenarioCash.textContent=won(sc.cash);
      refs.monthlyAvgNet.textContent=won(monthlyAvgNet);
      refs.periodNet.textContent=won(periodNet);
      refs.roi.textContent=pct(roi,1);
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.annualPrice.textContent=won(sc.annualPrice);
      refs.convertedSubs.textContent=`${num(sc.converted,0)} ${t("unitSubs")}`;
      refs.failureSavings.textContent=won(sc.savings);
      refs.breakEvenAdoption.textContent=Number.isFinite(beAdoption)?pct(beAdoption,2):t("na");
      refs.status.innerHTML=periodNet>=0?`<span style="color:var(--ok)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[
        t("summaryTitle"),
        `${t("k_baselineCash")}: ${won(baselineCash)}`,
        `${t("k_scenarioCash")}: ${won(sc.cash)}`,
        `${t("k_monthlyAvgNet")}: ${won(monthlyAvgNet)}`,
        `${t("k_periodNet")}: ${won(periodNet)}`,
        `${t("k_roi")}: ${pct(roi,1)}`,
        `${t("k_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,
        `${t("d_breakEvenAdoption")}: ${Number.isFinite(beAdoption)?pct(beAdoption,2):t("na")}`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim())return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.subscribers,refs.monthlyPrice,refs.annualDiscount,refs.adoption,refs.monthlyChurn,refs.churnImprovement,refs.grossMargin,refs.failureSaving,refs.monthlyCost,refs.setup,refs.months].forEach(el=>el.addEventListener("input",render));

    applyI18n();
    render();
  </script>
</body>
</html>
