<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annual Prepay Revenue Uplift Calculator | 연간 선결제 전환 수익 계산기</title>
  <meta name="description" content="월 구독 고객의 연간 선결제 전환 시 할인, 결제실패율, 유지율 개선을 반영해 순수익과 ROI를 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#1f4479 0%,#071427 50%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.7vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:98px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>💳 연간 선결제 전환 수익 계산기</h1>
        <div class="sub">월결제 고객 일부를 연간 선결제로 전환할 때 할인·유지율 개선·결제비용을 반영해 순수익을 검증합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="subs">활성 구독자 수 (명)</label><input id="subs" type="number" min="1" value="2800" /></div>
          <div><label for="monthlyPrice">월 구독료 (KRW)</label><input id="monthlyPrice" type="number" min="1" value="29000" /></div>
          <div><label for="discount">연간 선결제 할인율 (%)</label><input id="discount" type="number" min="0" max="80" step="0.1" value="16" /></div>
          <div><label for="adoption">연간 전환율 (%)</label><input id="adoption" type="number" min="0" max="100" step="0.1" value="28" /></div>
          <div><label for="failRate">월 결제실패율 (%)</label><input id="failRate" type="number" min="0" max="30" step="0.1" value="3.2" /></div>
          <div><label for="retentionLift">유지율 개선율 (%p 환산)</label><input id="retentionLift" type="number" min="0" max="60" step="0.1" value="6" /></div>
          <div><label for="fee">결제 수수료율 (%)</label><input id="fee" type="number" min="0" max="20" step="0.01" value="3.4" /></div>
          <div><label for="campaignCost">캠페인 비용 (KRW)</label><input id="campaignCost" type="number" min="0" value="18000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">연간 순효과</div><div id="annualNet" class="v">-</div></div>
          <div class="kpi"><div class="k">월 평균 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">기준 연 순매출</div><div id="baseline" class="v sm">-</div></div>
          <div class="kpi"><div class="k">전환 후 연 순매출</div><div id="scenario" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>연간 선결제 가격</th><td id="annualPrice">-</td></tr>
            <tr><th>전환 고객 수</th><td id="converted">-</td></tr>
            <tr><th>손익분기 전환율</th><td id="breakEvenAdoption">-</td></tr>
            <tr><th>유지율 개선 기여액</th><td id="retentionGain">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      subs:$("subs"), monthlyPrice:$("monthlyPrice"), discount:$("discount"), adoption:$("adoption"), failRate:$("failRate"),
      retentionLift:$("retentionLift"), fee:$("fee"), campaignCost:$("campaignCost"),
      annualNet:$("annualNet"), monthlyNet:$("monthlyNet"), roi:$("roi"), payback:$("payback"), baseline:$("baseline"), scenario:$("scenario"),
      annualPrice:$("annualPrice"), converted:$("converted"), breakEvenAdoption:$("breakEvenAdoption"), retentionGain:$("retentionGain"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { subs:2800, monthlyPrice:29000, discount:16, adoption:28, failRate:3.2, retentionLift:6, fee:3.4, campaignCost:18000000 };
    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.subs) || v.subs < 1) return "활성 구독자 수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.monthlyPrice) || v.monthlyPrice <= 0) return "월 구독료는 0보다 커야 합니다.";
      if (!Number.isFinite(v.discount) || v.discount < 0 || v.discount > 80) return "연간 선결제 할인율은 0~80% 범위여야 합니다.";
      if (!Number.isFinite(v.adoption) || v.adoption < 0 || v.adoption > 100) return "연간 전환율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.failRate) || v.failRate < 0 || v.failRate > 30) return "월 결제실패율은 0~30% 범위여야 합니다.";
      if (!Number.isFinite(v.retentionLift) || v.retentionLift < 0 || v.retentionLift > 60) return "유지율 개선율은 0~60 범위로 입력하세요.";
      if (!Number.isFinite(v.fee) || v.fee < 0 || v.fee > 20) return "결제 수수료율은 0~20% 범위여야 합니다.";
      if (!Number.isFinite(v.campaignCost) || v.campaignCost < 0) return "캠페인 비용은 0 이상이어야 합니다.";
      if (v.discount >= 100) return "연간 할인율이 과도합니다.";
      return "";
    }

    function compute(v){
      const feeFactor = 1 - v.fee / 100;
      const failureFactor = 1 - v.failRate / 100;
      const baselineAnnualNet = v.subs * v.monthlyPrice * 12 * failureFactor * feeFactor;

      const annualPrice = v.monthlyPrice * 12 * (1 - v.discount / 100);
      const converted = v.subs * (v.adoption / 100);
      const nonConverted = v.subs - converted;

      const annualPlanNet = converted * annualPrice * feeFactor;
      const monthlyPlanNet = nonConverted * v.monthlyPrice * 12 * failureFactor * feeFactor;
      const retentionGain = converted * v.monthlyPrice * 12 * (v.retentionLift / 100) * feeFactor;

      const scenarioAnnualNet = annualPlanNet + monthlyPlanNet + retentionGain;
      const annualNet = scenarioAnnualNet - baselineAnnualNet - v.campaignCost;
      const monthlyNet = annualNet / 12;

      const roi = v.campaignCost === 0 ? (annualNet >= 0 ? Infinity : -Infinity) : (annualNet / v.campaignCost) * 100;
      const payback = monthlyNet > 0 ? (v.campaignCost / monthlyNet) : Infinity;

      const deltaPerConverted = annualPrice * feeFactor
        - v.monthlyPrice * 12 * failureFactor * feeFactor
        + v.monthlyPrice * 12 * (v.retentionLift / 100) * feeFactor;

      const breakEvenAdoption = deltaPerConverted <= 0 ? Infinity : ((v.campaignCost / deltaPerConverted) / v.subs) * 100;

      return { annualPrice, converted, retentionGain, baselineAnnualNet, scenarioAnnualNet, annualNet, monthlyNet, roi, payback, breakEvenAdoption };
    }

    function resetOutputs(){
      ["annualNet","monthlyNet","roi","payback","baseline","scenario","annualPrice","converted","breakEvenAdoption","retentionGain"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        subs:Number(refs.subs.value), monthlyPrice:Number(refs.monthlyPrice.value), discount:Number(refs.discount.value), adoption:Number(refs.adoption.value),
        failRate:Number(refs.failRate.value), retentionLift:Number(refs.retentionLift.value), fee:Number(refs.fee.value), campaignCost:Number(refs.campaignCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.annualNet.textContent = money(r.annualNet);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가";
      refs.baseline.textContent = money(r.baselineAnnualNet);
      refs.scenario.textContent = money(r.scenarioAnnualNet);
      refs.annualPrice.textContent = money(r.annualPrice);
      refs.converted.textContent = `${num(r.converted,0)}명`;
      refs.breakEvenAdoption.textContent = Number.isFinite(r.breakEvenAdoption) ? `${num(r.breakEvenAdoption,2)}%` : "달성 불가";
      refs.retentionGain.textContent = money(r.retentionGain);

      refs.status.innerHTML = r.annualNet >= 0
        ? `<span class="ok">●</span> 연간 ${money(r.annualNet)} 순효과`
        : `<span class="warn">●</span> 연간 ${money(Math.abs(r.annualNet))} 순손실`;

      refs.summary.value = [
        "[Annual Prepay Revenue Uplift 요약]",
        `기준 연 순매출: ${money(r.baselineAnnualNet)}`,
        `전환 후 연 순매출: ${money(r.scenarioAnnualNet)}`,
        `연간 순효과(캠페인 비용 반영): ${money(r.annualNet)}`,
        `월 평균 순효과: ${money(r.monthlyNet)}`,
        `연 ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가"}`,
        `손익분기 전환율: ${Number.isFinite(r.breakEvenAdoption) ? `${num(r.breakEvenAdoption,2)}%` : "달성 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.subs,refs.monthlyPrice,refs.discount,refs.adoption,refs.failRate,refs.retentionLift,refs.fee,refs.campaignCost].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
