<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Minimum Commit + Overage Profit Calculator | API 최소 커밋 손익 계산기</title>
  <meta name="description" content="API 과금 모델을 종량제에서 최소 커밋+오버리지로 전환할 때 월 순이익, ROI, 회수기간, 손익분기 최소 커밋 금액을 계산합니다." />
  <meta name="keywords" content="api pricing, minimum commit, overage, profit calculator, roi calculator, saas monetization" />
  <link rel="canonical" href="https://eastsea.monster/tools/api-minimum-commit-overage-profit-calculator/" />
  <style>
    :root {
      --bg: #0b1220;
      --card: #131d33;
      --line: #2a3a5f;
      --text: #e8eefc;
      --muted: #9eb0d6;
      --brand: #60a5fa;
      --brand-2: #2563eb;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 12% 0%, #17325f 0%, var(--bg) 58%);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 14px 56px;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.22rem, 2.7vw, 1.85rem);
      letter-spacing: -0.01em;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
      max-width: 70ch;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .link {
      border: 1px solid var(--line);
      background: #182947;
      color: #dbeafe;
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 0.88rem;
      text-decoration: none;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.03fr 0.97fr;
      gap: 12px;
    }
    .card {
      background: linear-gradient(165deg, #17294a, #101b31 62%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      min-width: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 5px;
    }
    input, button, textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1b33;
      color: var(--text);
      font-size: 0.93rem;
      padding: 10px;
    }
    .btns {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      cursor: pointer;
      border: none;
      font-weight: 700;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #eff6ff;
    }
    .soft {
      background: #1c3459;
      border: 1px solid var(--line);
    }
    .err {
      margin-top: 10px;
      border: 1px solid #7b3444;
      background: rgba(248, 113, 113, 0.12);
      color: #fecaca;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 0.86rem;
      display: none;
    }
    .err.show { display: block; }
    textarea {
      margin-top: 10px;
      min-height: 120px;
      resize: vertical;
    }

    .kpis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .kpi {
      border: 1px solid var(--line);
      background: #10203a;
      border-radius: 11px;
      padding: 10px;
    }
    .k {
      color: var(--muted);
      font-size: 0.76rem;
      margin-bottom: 4px;
    }
    .v {
      font-size: 1.03rem;
      font-weight: 800;
      word-break: break-word;
    }
    .pill {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #1a355c;
      color: #dbeafe;
      padding: 6px 10px;
      font-size: 0.78rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.85rem;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 7px 6px;
      text-align: right;
    }
    th:first-child, td:first-child { text-align: left; }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .inputs { grid-template-columns: 1fr; }
      .top { flex-direction: column; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📦 API 최소 커밋 + 오버리지 손익 계산기</h1>
        <div class="sub">종량제 고객을 최소 커밋 + 오버리지 모델로 전환할 때, 월 순이익 변화·ROI·회수기간·손익분기 최소 커밋 금액을 빠르게 계산합니다.</div>
      </div>
      <div class="actions">
        <a class="link" href="/tools/">도구 목록</a>
        <a class="link" href="/">포털</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="accounts">전환 대상 계정 수</label><input id="accounts" type="number" min="1" step="1" value="240" /></div>
          <div><label for="currentArpa">현재 계정당 월 평균 매출 (₩)</label><input id="currentArpa" type="number" min="0" step="1000" value="85000" /></div>
          <div><label for="commitFee">제안 최소 커밋 금액 / 계정 (₩)</label><input id="commitFee" type="number" min="0" step="1000" value="70000" /></div>
          <div><label for="overageRevenue">예상 오버리지 매출 / 계정 (₩)</label><input id="overageRevenue" type="number" min="0" step="1000" value="32000" /></div>
          <div><label for="grossMargin">API 총마진율 (%)</label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="78" /></div>
          <div><label for="feeRate">결제/플랫폼 수수료율 (%)</label><input id="feeRate" type="number" min="0" max="100" step="0.1" value="4" /></div>
          <div><label for="monthlyProgramCost">월 운영비 (세일즈/운영/지원) (₩)</label><input id="monthlyProgramCost" type="number" min="0" step="10000" value="2800000" /></div>
          <div><label for="setupCost">초기 구축비 (₩)</label><input id="setupCost" type="number" min="0" step="10000" value="9000000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" step="1" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copyBtn" class="soft" type="button">요약 복사</button>
          <button id="resetBtn" type="button">기본값 복원</button>
        </div>

        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">현재 월 순이익(기준)</div><div class="v" id="baselineProfit">-</div></div>
          <div class="kpi"><div class="k">전환 후 월 순이익</div><div class="v" id="scenarioProfit">-</div></div>
          <div class="kpi"><div class="k">월 순이익 증감</div><div class="v" id="monthlyUplift">-</div></div>
          <div class="kpi"><div class="k">기간 순효과</div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div class="v" id="payback">-</div></div>
        </div>

        <div id="status" class="pill">계산 대기</div>

        <table>
          <tbody>
            <tr><th>손익분기 최소 커밋/계정</th><td id="breakEvenCommit">-</td></tr>
            <tr><th>운영비 손익분기 계정 수</th><td id="breakEvenAccounts">-</td></tr>
            <tr><th>전환 후 월 총매출</th><td id="scenarioRevenue">-</td></tr>
            <tr><th>기간 총 프로그램 비용</th><td id="totalProgramCost">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
