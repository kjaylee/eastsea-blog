<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Pricing Tier Shift Revenue Calculator | API 요금제 상향 전환 수익 계산기</title>
  <meta name="description" content="API 고객의 상위 요금제 전환 전략에서 순 MRR 상승, 비용, ROI, 회수기간, 손익분기 채택률을 계산합니다." />
  <style>
    :root{--bg:#0d1324;--card:#15213b;--line:#2a3e65;--txt:#e6eeff;--muted:#a7badf;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 0% 0%,#244b86 0%,var(--bg) 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#1b335a;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#1a3158,#121f38);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1b32;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#23426f;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10203a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1d3a63;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📡 API 요금제 상향 전환 수익 계산기</h1>
        <div class="sub" id="subtitle">상위 요금제 전환율과 리스크를 반영해 순 MRR 상승 및 ROI를 추정합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_accounts" for="accounts"></label><input id="accounts" type="number" min="0" value="1250"></div>
          <div><label id="l_arpa" for="arpa"></label><input id="arpa" type="number" min="0" step="1000" value="180000"></div>
          <div><label id="l_adoption" for="adoption"></label><input id="adoption" type="number" min="0" max="100" step="0.1" value="22"></div>
          <div><label id="l_uplift" for="uplift"></label><input id="uplift" type="number" min="0" max="100" step="0.1" value="35"></div>
          <div><label id="l_risk" for="risk"></label><input id="risk" type="number" min="0" max="100" step="0.1" value="4"></div>
          <div><label id="l_infra" for="infra"></label><input id="infra" type="number" min="0" step="100" value="9000"></div>
          <div><label id="l_support" for="support"></label><input id="support" type="number" min="0" step="100" value="6500"></div>
          <div><label id="l_enable" for="enable"></label><input id="enable" type="number" min="0" step="10000" value="2300000"></div>
          <div><label id="l_migration" for="migration"></label><input id="migration" type="number" min="0" step="10000" value="7800000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_upgraded"></div><div class="v" id="upgraded">-</div></div>
          <div class="kpi"><div class="k" id="k_grossUplift"></div><div class="v" id="grossUplift">-</div></div>
          <div class="kpi"><div class="k" id="k_netUplift"></div><div class="v" id="netUplift">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_payback"></div><div class="v" id="payback">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_riskLoss"></th><td id="riskLoss">-</td></tr>
          <tr><th id="d_incrementalCost"></th><td id="incrementalCost">-</td></tr>
          <tr><th id="d_breakEvenAdoption"></th><td id="breakEvenAdoption">-</td></tr>
          <tr><th id="d_periodNet"></th><td id="periodNet">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={accounts:$("accounts"),arpa:$("arpa"),adoption:$("adoption"),uplift:$("uplift"),risk:$("risk"),infra:$("infra"),support:$("support"),enable:$("enable"),migration:$("migration"),months:$("months"),upgraded:$("upgraded"),grossUplift:$("grossUplift"),netUplift:$("netUplift"),monthlyNet:$("monthlyNet"),roi:$("roi"),payback:$("payback"),riskLoss:$("riskLoss"),incrementalCost:$("incrementalCost"),breakEvenAdoption:$("breakEvenAdoption"),periodNet:$("periodNet"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={accounts:1250,arpa:180000,adoption:22,uplift:35,risk:4,infra:9000,support:6500,enable:2300000,migration:7800000,months:12};
    const I18N={
      ko:{title:"📡 API 요금제 상향 전환 수익 계산기",subtitle:"상위 요금제 전환율과 리스크를 반영해 순 MRR 상승 및 ROI를 추정합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_accounts:"활성 API 계정 수",l_arpa:"현재 ARPA (₩/월)",l_adoption:"상위 요금제 채택률 (%)",l_uplift:"요금 인상폭 (%)",l_risk:"하향/이탈 리스크율 (%)",l_infra:"업그레이드 계정당 인프라 증분비 (₩/월)",l_support:"업그레이드 계정당 지원비 (₩/월)",l_enable:"월 Enablement 비용 (₩)",l_migration:"초기 마이그레이션 비용 (₩)",l_months:"분석 기간 (개월)",k_upgraded:"업그레이드 계정 수",k_grossUplift:"총 상승 MRR",k_netUplift:"순 상승 MRR",k_monthlyNet:"월 순이익",k_roi:"ROI",k_payback:"회수기간",d_riskLoss:"리스크 반영 MRR 손실",d_incrementalCost:"월 증분 비용",d_breakEvenAdoption:"손익분기 채택률",d_periodNet:"기간 누적 순효과",ok:"요금제 상향 시뮬레이션 완료",warn:"현재 가정에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율은 0~100 범위여야 합니다.",numErr:"값은 0 이상이어야 하며 기간은 1 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[API 요금제 상향 수익 요약]",unitMonths:"개월"},
      en:{title:"📡 API Pricing Tier Shift Revenue Calculator",subtitle:"Estimate net MRR uplift, costs, ROI, and payback from tier-up migration strategy.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_accounts:"Active API accounts",l_arpa:"Current ARPA (KRW/mo)",l_adoption:"Target tier adoption rate (%)",l_uplift:"Tier price uplift (%)",l_risk:"At-risk downgrade/churn rate (%)",l_infra:"Infra cost increase per upgraded account (KRW/mo)",l_support:"Support cost per upgraded account (KRW/mo)",l_enable:"Monthly enablement cost (KRW)",l_migration:"One-time migration cost (KRW)",l_months:"Analysis period (months)",k_upgraded:"Upgraded accounts",k_grossUplift:"Gross uplift MRR",k_netUplift:"Net uplift MRR",k_monthlyNet:"Monthly net profit",k_roi:"ROI",k_payback:"Payback period",d_riskLoss:"At-risk MRR loss",d_incrementalCost:"Incremental monthly cost",d_breakEvenAdoption:"Break-even adoption rate",d_periodNet:"Cumulative net impact",ok:"Tier-shift simulation complete",warn:"Monthly net profit is negative under current assumptions",invalid:"Please review inputs",rangeErr:"Rates must be between 0 and 100.",numErr:"Values must be >= 0 and months must be >= 1.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[API Tier Shift Revenue Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["accounts","arpa","adoption","uplift","risk","infra","support","enable","migration","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["upgraded","grossUplift","netUplift","monthlyNet","roi","payback"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["riskLoss","incrementalCost","breakEvenAdoption","periodNet"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if([v.accounts,v.arpa,v.infra,v.support,v.enable,v.migration].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if(!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.adoption,v.uplift,v.risk].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      return "";
    }

    function render(){
      const v={accounts:Number(refs.accounts.value),arpa:Number(refs.arpa.value),adoption:Number(refs.adoption.value),uplift:Number(refs.uplift.value),risk:Number(refs.risk.value),infra:Number(refs.infra.value),support:Number(refs.support.value),enable:Number(refs.enable.value),migration:Number(refs.migration.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["upgraded","grossUplift","netUplift","monthlyNet","roi","payback","riskLoss","incrementalCost","breakEvenAdoption","periodNet"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const upgraded=v.accounts*(v.adoption/100);
      const grossUplift=upgraded*v.arpa*(v.uplift/100);
      const riskLoss=upgraded*v.arpa*(v.risk/100);
      const netUplift=grossUplift-riskLoss;
      const incrementalCost=upgraded*(v.infra+v.support)+v.enable;
      const monthlyNet=netUplift-incrementalCost;
      const periodNet=(monthlyNet*v.months)-v.migration;
      const totalInvestment=(incrementalCost*v.months)+v.migration;
      const roi=totalInvestment>0?(periodNet/totalInvestment)*100:0;
      const payback=monthlyNet>0?(v.migration/monthlyNet):Infinity;

      const perAccountContribution=(v.arpa*(v.uplift/100))-(v.arpa*(v.risk/100))-v.infra-v.support;
      let breakEvenAdoption=NaN;
      if(v.accounts>0&&perAccountContribution>0){
        breakEvenAdoption=(v.enable/(v.accounts*perAccountContribution))*100;
      }

      refs.upgraded.textContent=num(upgraded,1);
      refs.grossUplift.textContent=won(grossUplift);
      refs.netUplift.textContent=won(netUplift);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.riskLoss.textContent=won(riskLoss);
      refs.incrementalCost.textContent=won(incrementalCost);
      refs.breakEvenAdoption.textContent=Number.isFinite(breakEvenAdoption)?pct(breakEvenAdoption,2):t("na");
      refs.periodNet.textContent=won(periodNet);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_upgraded")}: ${num(upgraded,1)}`,`${t("k_grossUplift")}: ${won(grossUplift)}`,`${t("d_riskLoss")}: ${won(riskLoss)}`,`${t("k_netUplift")}: ${won(netUplift)}`,`${t("d_incrementalCost")}: ${won(incrementalCost)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("d_breakEvenAdoption")}: ${Number.isFinite(breakEvenAdoption)?pct(breakEvenAdoption,2):t("na")}`,`${t("k_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.accounts,refs.arpa,refs.adoption,refs.uplift,refs.risk,refs.infra,refs.support,refs.enable,refs.migration,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
