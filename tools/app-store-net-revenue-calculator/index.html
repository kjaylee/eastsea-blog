<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Store Net Revenue Calculator | 앱스토어 실수익 계산기</title>
  <meta name="description" content="앱 설치·전환율·수수료·VAT·환불·UA 비용을 반영해 앱스토어 코호트 기준 순이익, ROI, 손익분기 전환율을 계산합니다." />
  <style>
    :root{--bg:#081425;--card:#10243f;--line:#294b78;--txt:#e8f1ff;--muted:#abc0de;--pri:#6ea8ff;--soft:#1b3a64;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.14)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#214878 0%,#081425 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#143159;color:#deebff;border-radius:10px;padding:8px 12px;text-decoration:none;font-size:.86rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17355f,#10243f);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1e38;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{border:none;cursor:pointer;background:linear-gradient(135deg,var(--pri),#4f7ef0);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    textarea{margin-top:10px;min-height:108px;resize:vertical}.error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7a3341;background:var(--errbg);color:var(--err);font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1f3b;border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.05rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#163763;color:#d9e8ff;font-size:.77rem;margin-top:10px}.ok{color:var(--ok)}.warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.86rem;table-layout:fixed}th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">📱 앱스토어 실수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">설치 코호트 기준으로 수수료·세금·환불·운영비·UA비용을 반영한 순이익과 손익분기 전환율을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" class="chip" type="button">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="installs" data-i18n="installs">월 설치 수</label><input id="installs" type="number" min="1" value="120000"></div>
          <div><label for="conversion" data-i18n="conversion">설치→유료 전환율 (%)</label><input id="conversion" type="number" min="0" max="100" step="0.01" value="2.8"></div>
          <div><label for="price" data-i18n="price">월 구독 가격 (KRW, VAT 포함)</label><input id="price" type="number" min="1" value="9900"></div>
          <div><label for="paidMonths" data-i18n="paidMonths">평균 유료 유지개월</label><input id="paidMonths" type="number" min="0.1" step="0.1" value="7"></div>
          <div><label for="storeFee" data-i18n="storeFee">앱스토어 수수료율 (%)</label><input id="storeFee" type="number" min="0" max="100" step="0.1" value="15"></div>
          <div><label for="vat" data-i18n="vat">VAT/GST율 (%)</label><input id="vat" type="number" min="0" max="100" step="0.1" value="10"></div>
          <div><label for="refund" data-i18n="refund">환불률 (%)</label><input id="refund" type="number" min="0" max="100" step="0.1" value="4.2"></div>
          <div><label for="infraCost" data-i18n="infraCost">유료 사용자 월 운영비 (KRW)</label><input id="infraCost" type="number" min="0" value="1200"></div>
          <div><label for="cpi" data-i18n="cpi">설치당 UA 비용 CPI (KRW)</label><input id="cpi" type="number" min="0" value="1800"></div>
          <div><label for="oneTime" data-i18n="oneTime">원타임 도입비 (KRW)</label><input id="oneTime" type="number" min="0" value="25000000"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpi">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_paidUsers">유료 사용자 수</div><div id="paidUsers" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_netProceeds">정산매출</div><div id="netProceeds" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_variable">코호트 변동비</div><div id="variableCost" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_netProfit">코호트 순이익</div><div id="netProfit" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_breakEven">손익분기 전환율</div><div id="breakEven" class="v">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detail">세부 지표</h2>
        <table><tbody>
          <tr><th data-i18n="d_gross">총 청구액 (VAT 포함)</th><td id="grossBilled">-</td></tr>
          <tr><th data-i18n="d_exVat">VAT 제외 매출</th><td id="netExVat">-</td></tr>
          <tr><th data-i18n="d_storeFeeAmt">스토어 수수료</th><td id="storeFeeAmount">-</td></tr>
          <tr><th data-i18n="d_ua">UA 비용</th><td id="uaSpend">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      installs:$("installs"), conversion:$("conversion"), price:$("price"), paidMonths:$("paidMonths"), storeFee:$("storeFee"), vat:$("vat"), refund:$("refund"), infraCost:$("infraCost"), cpi:$("cpi"), oneTime:$("oneTime"),
      paidUsers:$("paidUsers"), netProceeds:$("netProceeds"), variableCost:$("variableCost"), netProfit:$("netProfit"), roi:$("roi"), breakEven:$("breakEven"),
      grossBilled:$("grossBilled"), netExVat:$("netExVat"), storeFeeAmount:$("storeFeeAmount"), uaSpend:$("uaSpend"),
      error:$("error"), summary:$("summary"), status:$("status"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { installs:120000, conversion:2.8, price:9900, paidMonths:7, storeFee:15, vat:10, refund:4.2, infraCost:1200, cpi:1800, oneTime:25000000 };
    let lang = "ko";

    const i18n = {
      ko:{
        title:"📱 앱스토어 실수익 계산기", subtitle:"설치 코호트 기준으로 수수료·세금·환불·운영비·UA비용을 반영한 순이익과 손익분기 전환율을 계산합니다.", back:"Back to Portal",
        inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpi:"핵심 KPI", waiting:"결과 계산 대기", detail:"세부 지표",
        installs:"월 설치 수", conversion:"설치→유료 전환율 (%)", price:"월 구독 가격 (KRW, VAT 포함)", paidMonths:"평균 유료 유지개월", storeFee:"앱스토어 수수료율 (%)", vat:"VAT/GST율 (%)", refund:"환불률 (%)", infraCost:"유료 사용자 월 운영비 (KRW)", cpi:"설치당 UA 비용 CPI (KRW)", oneTime:"원타임 도입비 (KRW)",
        k_paidUsers:"유료 사용자 수", k_netProceeds:"정산매출", k_variable:"코호트 변동비", k_netProfit:"코호트 순이익", k_roi:"ROI", k_breakEven:"손익분기 전환율",
        d_gross:"총 청구액 (VAT 포함)", d_exVat:"VAT 제외 매출", d_storeFeeAmt:"스토어 수수료", d_ua:"UA 비용",
        errInstalls:"설치 수는 1 이상이어야 합니다.", errRate:"비율 값은 0~100 범위여야 합니다.", errPositive:"가격/개월은 0보다 커야 합니다.", errCost:"비용 값은 0 이상이어야 합니다.",
        statusGood:"코호트 수익성이 양수입니다", statusWarn:"가정 기준 코호트 순이익이 음수입니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        impossible:"달성 불가", summaryTitle:"[앱스토어 실수익 계산 요약]"
      },
      en:{
        title:"📱 App Store Net Revenue Calculator", subtitle:"Estimate cohort net profit after store fee, tax, refunds, infra cost, and UA spend.", back:"Back to Portal",
        inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpi:"Key KPIs", waiting:"Waiting for calculation", detail:"Details",
        installs:"Monthly installs", conversion:"Install-to-paid conversion (%)", price:"Monthly subscription price (KRW, VAT-inclusive)", paidMonths:"Average paid lifetime (months)", storeFee:"App store fee (%)", vat:"VAT/GST rate (%)", refund:"Refund rate (%)", infraCost:"Monthly infra/support cost per paid user (KRW)", cpi:"UA cost per install CPI (KRW)", oneTime:"One-time setup cost (KRW)",
        k_paidUsers:"Paid users", k_netProceeds:"Net proceeds", k_variable:"Cohort variable cost", k_netProfit:"Cohort net profit", k_roi:"ROI", k_breakEven:"Break-even conversion",
        d_gross:"Gross billed (VAT incl.)", d_exVat:"Revenue ex. VAT", d_storeFeeAmt:"Store fee amount", d_ua:"UA spend",
        errInstalls:"Installs must be at least 1.", errRate:"Rate inputs must be between 0 and 100.", errPositive:"Price and paid months must be greater than 0.", errCost:"Cost inputs must be zero or above.",
        statusGood:"Cohort economics are positive", statusWarn:"Cohort net profit is negative with current assumptions", statusCheck:"Please review input values",
        copied:"Summary copied.", copyFail:"Clipboard unavailable. Please copy manually.",
        impossible:"Not achievable", summaryTitle:"[App Store Net Revenue Summary]"
      }
    };

    const t = (k)=>i18n[lang][k] ?? k;
    const locale = ()=>lang==="ko"?"ko-KR":"en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach(el=>{el.textContent=t(el.dataset.i18n);});
      refs.lang.textContent = lang === "ko" ? "EN" : "KO";
    }

    function validate(v){
      if(!Number.isFinite(v.installs) || v.installs < 1) return t("errInstalls");
      if(!Number.isFinite(v.price) || v.price <= 0 || !Number.isFinite(v.paidMonths) || v.paidMonths <= 0) return t("errPositive");
      if([v.conversion,v.storeFee,v.vat,v.refund].some(x=>!Number.isFinite(x) || x<0 || x>100)) return t("errRate");
      if([v.infraCost,v.cpi,v.oneTime].some(x=>!Number.isFinite(x) || x<0)) return t("errCost");
      return "";
    }

    function compute(v){
      const paidUsers = v.installs * (v.conversion/100);
      const grossBilled = paidUsers * v.price * v.paidMonths;
      const netExVat = grossBilled / (1 + v.vat/100);
      const afterRefund = netExVat * (1 - v.refund/100);
      const storeFeeAmount = afterRefund * (v.storeFee/100);
      const netProceeds = afterRefund - storeFeeAmount;

      const serviceCost = paidUsers * v.paidMonths * v.infraCost;
      const uaSpend = v.installs * v.cpi;
      const variableCost = serviceCost + uaSpend;
      const netProfit = netProceeds - variableCost - v.oneTime;

      const invested = variableCost + v.oneTime;
      const roi = invested === 0 ? (netProfit >= 0 ? Infinity : -Infinity) : (netProfit/invested)*100;

      const contributionPerPaid = (v.price * v.paidMonths / (1 + v.vat/100)) * (1 - v.refund/100) * (1 - v.storeFee/100) - (v.paidMonths * v.infraCost);
      const requiredPaid = contributionPerPaid > 0 ? (uaSpend + v.oneTime) / contributionPerPaid : Infinity;
      const breakEven = Number.isFinite(requiredPaid) ? (requiredPaid / v.installs) * 100 : Infinity;

      return {paidUsers,grossBilled,netExVat,storeFeeAmount,netProceeds,uaSpend,variableCost,netProfit,roi,breakEven};
    }

    function resetOutputs(){
      ["paidUsers","netProceeds","variableCost","netProfit","roi","breakEven","grossBilled","netExVat","storeFeeAmount","uaSpend"].forEach(k=>refs[k].textContent='-');
      refs.summary.value='';
    }

    function render(){
      const v = {
        installs:Number(refs.installs.value), conversion:Number(refs.conversion.value), price:Number(refs.price.value), paidMonths:Number(refs.paidMonths.value),
        storeFee:Number(refs.storeFee.value), vat:Number(refs.vat.value), refund:Number(refs.refund.value), infraCost:Number(refs.infraCost.value), cpi:Number(refs.cpi.value), oneTime:Number(refs.oneTime.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if(err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.paidUsers.textContent = num(r.paidUsers,0);
      refs.netProceeds.textContent = money(r.netProceeds);
      refs.variableCost.textContent = money(r.variableCost);
      refs.netProfit.textContent = money(r.netProfit);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi>0 ? '∞' : '-∞');
      refs.breakEven.textContent = Number.isFinite(r.breakEven) && r.breakEven >= 0 && r.breakEven <= 1000 ? `${num(r.breakEven,2)}%` : t("impossible");

      refs.grossBilled.textContent = money(r.grossBilled);
      refs.netExVat.textContent = money(r.netExVat);
      refs.storeFeeAmount.textContent = money(r.storeFeeAmount);
      refs.uaSpend.textContent = money(r.uaSpend);

      refs.status.innerHTML = r.netProfit >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusWarn")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_paidUsers")}: ${num(r.paidUsers,0)}`,
        `${t("d_gross")}: ${money(r.grossBilled)}`,
        `${t("k_netProceeds")}: ${money(r.netProceeds)}`,
        `${t("k_variable")}: ${money(r.variableCost)}`,
        `${t("k_netProfit")}: ${money(r.netProfit)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞')}`,
        `${t("k_breakEven")}: ${Number.isFinite(r.breakEven)&&r.breakEven>=0&&r.breakEven<=1000?`${num(r.breakEven,2)}%`:t("impossible")}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if(!refs.summary.value.trim()) return;
      try{ await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch{ alert(t("copyFail")); }
    });

    refs.reset.addEventListener('click', ()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });
    [refs.installs,refs.conversion,refs.price,refs.paidMonths,refs.storeFee,refs.vat,refs.refund,refs.infraCost,refs.cpi,refs.oneTime].forEach(el=>{
      el.addEventListener('input', render); el.addEventListener('change', render);
    });

    refs.lang.addEventListener('click', ()=>{ lang = lang==='ko' ? 'en' : 'ko'; applyI18n(); render(); });

    applyI18n();
    render();
  </script>
</body>
</html>
