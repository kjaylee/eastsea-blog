<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Search Ads CPT·LTV ROI Calculator | 애플 검색광고 ROI 계산기</title>
  <meta name="description" content="Apple Search Ads 캠페인의 CPT, 퍼널 전환율, 구독 LTV를 반영해 월 순이익·ROI·회수기간·손익분기 CPT를 계산합니다." />
  <meta name="keywords" content="apple search ads, cpt, ltv, roi calculator, app monetization, subscription profit" />
  <link rel="canonical" href="https://eastsea.monster/tools/apple-search-ads-cpt-ltv-roi-calculator/" />
  <style>
    :root {
      --bg: #0b1120;
      --card: #101a31;
      --line: #25365d;
      --text: #ecf2ff;
      --muted: #9bb0d8;
      --brand: #60a5fa;
      --brand2: #2563eb;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% 0%, #1b3560 0%, var(--bg) 56%);
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 14px 56px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.8vw, 1.9rem);
      letter-spacing: -0.01em;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
      max-width: 72ch;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .link {
      color: #dbeafe;
      text-decoration: none;
      border: 1px solid var(--line);
      background: #172849;
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 0.88rem;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.03fr 0.97fr;
      gap: 12px;
    }
    .card {
      background: linear-gradient(165deg, #162848, #0f1a31 62%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      min-width: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 5px;
    }
    input, button, textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0d1830;
      color: var(--text);
      padding: 10px;
      font-size: 0.93rem;
    }
    .btns {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      color: #eff6ff;
    }
    .soft {
      background: #1c3458;
      border: 1px solid var(--line);
    }
    .err {
      margin-top: 10px;
      border: 1px solid #7b3444;
      background: rgba(248, 113, 113, 0.12);
      color: #fecaca;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 0.86rem;
      display: none;
    }
    .err.show { display: block; }
    textarea {
      margin-top: 10px;
      min-height: 124px;
      resize: vertical;
    }
    .kpis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .kpi {
      border: 1px solid var(--line);
      background: #0f1f38;
      border-radius: 11px;
      padding: 10px;
    }
    .k {
      color: var(--muted);
      font-size: 0.76rem;
      margin-bottom: 4px;
    }
    .v {
      font-size: 1.03rem;
      font-weight: 800;
      word-break: break-word;
    }
    .pill {
      margin-top: 10px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border: 1px solid var(--line);
      background: #18345a;
      color: #dbeafe;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.85rem;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 7px 6px;
      text-align: right;
    }
    th:first-child, td:first-child { text-align: left; }
    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .inputs { grid-template-columns: 1fr; }
      .top { flex-direction: column; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🍎 Apple Search Ads CPT·LTV ROI 계산기</h1>
        <div class="sub">CPT·퍼널 전환율·구독 LTV를 한 번에 넣어 Apple Search Ads의 월 순이익, ROI, 회수기간, 손익분기 CPT를 빠르게 확인하세요.</div>
      </div>
      <div class="actions">
        <a class="link" href="/tools/">도구 목록</a>
        <a class="link" href="/">포털</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="monthlyBudget">월 광고비 (₩)</label><input id="monthlyBudget" type="number" min="0" step="10000" value="12000000" /></div>
          <div><label for="cpt">평균 CPT (₩/tap)</label><input id="cpt" type="number" min="1" step="1" value="3200" /></div>
          <div><label for="tapToInstall">Tap → Install 전환율 (%)</label><input id="tapToInstall" type="number" min="0" max="100" step="0.1" value="42" /></div>
          <div><label for="installToTrial">Install → Trial 시작률 (%)</label><input id="installToTrial" type="number" min="0" max="100" step="0.1" value="34" /></div>
          <div><label for="trialToPaid">Trial → Paid 전환율 (%)</label><input id="trialToPaid" type="number" min="0" max="100" step="0.1" value="29" /></div>
          <div><label for="price">월 구독 가격 (₩)</label><input id="price" type="number" min="0" step="100" value="12500" /></div>
          <div><label for="retentionMonths">유료 유지 개월 수 (LTV 기간)</label><input id="retentionMonths" type="number" min="0" step="0.1" value="5.5" /></div>
          <div><label for="storeFee">스토어 수수료율 (%)</label><input id="storeFee" type="number" min="0" max="100" step="0.1" value="15" /></div>
          <div><label for="serviceCostPerPaid">유료 유저당 서비스 원가 (₩)</label><input id="serviceCostPerPaid" type="number" min="0" step="100" value="6800" /></div>
          <div><label for="monthlyOps">월 운영비 (크리에이티브/툴링) (₩)</label><input id="monthlyOps" type="number" min="0" step="10000" value="1400000" /></div>
          <div><label for="setupCost">초기 세팅비 (₩)</label><input id="setupCost" type="number" min="0" step="10000" value="3500000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" step="1" value="6" /></div>
        </div>

        <div class="btns">
          <button id="copyBtn" class="soft" type="button">요약 복사</button>
          <button id="resetBtn" type="button">기본값 복원</button>
        </div>

        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">예상 월 유료 전환 수</div><div class="v" id="paidUsers">-</div></div>
          <div class="kpi"><div class="k">유료 1인당 순LTV</div><div class="v" id="netLtvPerPaid">-</div></div>
          <div class="kpi"><div class="k">월 순이익</div><div class="v" id="monthlyNetProfit">-</div></div>
          <div class="kpi"><div class="k">기간 순효과</div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div class="v" id="payback">-</div></div>
        </div>

        <div id="status" class="pill">계산 대기</div>

        <table>
          <tbody>
            <tr><th>손익분기 CPT</th><td id="breakEvenCpt">-</td></tr>
            <tr><th>손익분기 Trial→Paid 전환율</th><td id="breakEvenTrialToPaid">-</td></tr>
            <tr><th>월 예상 Tap 수</th><td id="taps">-</td></tr>
            <tr><th>월 총투자비(광고비+운영비)</th><td id="monthlySpend">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
