      function resetSession(){

      function answer(option, optionIndex){
        haptic();
        const weight = 1 + state.idx * 0.03;
        Object.keys(state.scores).forEach((k) => {
          state.scores[k] += (option.scores[k] || 0) * weight;
        });
        state.regTotal += (option.reg || 0) * weight;
        state.answers.push({q:state.idx, option:optionIndex});

        if (state.idx >= QUESTIONS.length - 1){
          state.screen = 'analyzing';
          render();
          runAnalyzingThenResult();
          return;
        }
        state.idx += 1;
        render();
      }

      function computeResult(){
        const adjusted = {
          secure: state.scores.secure + state.regTotal * 0.6,
          anxious: state.scores.anxious - state.regTotal * 0.2,
          avoidant: state.scores.avoidant - state.regTotal * 0.2,
          disorganized: state.scores.disorganized - state.regTotal * 0.2
        };

        const priority = { secure:0, anxious:1, avoidant:2, disorganized:3 };
        const sorted = Object.entries(adjusted).sort((a,b)=> {
          if (b[1] !== a[1]) return b[1]-a[1];
          return priority[a[0]] - priority[b[0]];
        });

        return {
          type: sorted[0][0],
          adjusted,
          raw: {...state.scores},
          regTotal: state.regTotal,
          ts: Date.now()
        };
      }

      function drawChart(adjusted){
        const cvs = document.getElementById('resultChart');
        if (!cvs) return;
        const ctx = cvs.getContext('2d');
        if (!ctx) return;

        const ratio = window.devicePixelRatio || 1;
        const w = cvs.clientWidth;
        const h = cvs.clientHeight;
        cvs.width = Math.max(1, Math.floor(w * ratio));
        cvs.height = Math.max(1, Math.floor(h * ratio));
        ctx.setTransform(ratio,0,0,ratio,0,0);

        ctx.clearRect(0,0,w,h);

        const labels = state.lang === 'ko'
          ? ['안정', '불안', '회피', '혼란']
          : ['Secure', 'Anxious', 'Avoidant', 'Disorg'];
        const keys = ['secure','anxious','avoidant','disorganized'];
        const values = keys.map(k => Math.max(0, adjusted[k] || 0));
        const max = Math.max(10, ...values);

        const pad = 26;
        const gap = 16;
        const bw = (w - pad*2 - gap*3) / 4;

        ctx.fillStyle = 'rgba(255,255,255,0.14)';
        ctx.fillRect(0,0,w,h);

        for (let i=0;i<4;i++){
          const x = pad + i*(bw+gap);
          const barH = ((h - 74) * values[i]) / max;
          const y = h - 46 - barH;

          const g = ctx.createLinearGradient(0,y,0,h);
          g.addColorStop(0,['#fde68a','#a7f3d0','#93c5fd','#f9a8d4'][i]);
          g.addColorStop(1,['#fb923c','#10b981','#3b82f6','#ec4899'][i]);

          ctx.fillStyle = 'rgba(255,255,255,0.14)';
          roundRect(ctx, x, 18, bw, h-64, 10, true, false);

          ctx.fillStyle = g;
          roundRect(ctx, x, y, bw, barH, 10, true, false);

          ctx.fillStyle = '#f8fafc';
          ctx.font = '700 12px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText(labels[i], x + bw/2, h - 22);

          ctx.font = '700 11px system-ui';
          ctx.fillStyle = 'rgba(248,250,252,0.92)';
          ctx.fillText(values[i].toFixed(1), x + bw/2, y - 6);
        }
      }

      function roundRect(ctx, x, y, w, h, r, fill, stroke){
        const radius = Math.min(r, w/2, h/2);
        ctx.beginPath();
        ctx.moveTo(x+radius, y);
        ctx.arcTo(x+w, y, x+w, y+h, radius);
        ctx.arcTo(x+w, y+h, x, y+h, radius);
        ctx.arcTo(x, y+h, x, y, radius);
        ctx.arcTo(x, y, x+w, y, radius);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
      }

        const qNo = state.idx + 1;
        setProgress(true, qNo, QUESTIONS.length);

        const optionsHtml = q.options.map((op, i)=>`
          <button class="choice" data-i="${i}">${L(op.text)}</button>
        `).join('');

        app.innerHTML = `
          <section class="card">
            <div class="card-inner">
              <h2 class="q-title">${L(q.q)}</h2>
              <p class="q-hint">${t.qHint}</p>
              <div class="choices">${optionsHtml}</div>
            </div>
          </section>
        `;

        app.querySelectorAll('.choice').forEach((btn)=>{
          btn.addEventListener('click', ()=>{
            const i = Number(btn.getAttribute('data-i'));
            answer(q.options[i], i);
          });
        });
      }

      function analyzingView(){
        const t = TEXT[state.lang];
        setProgress(true, QUESTIONS.length, QUESTIONS.length);
        app.innerHTML = `
          <section class="card">
            <div class="card-inner analyzing">
              <div class="spinner" aria-hidden="true"></div>
              <h2>${t.analyzingTitle}</h2>
              <p class="subtitle">${t.analyzingBody}</p>
              <div class="mini-track"><div id="miniFill" class="mini-fill"></div></div>
            </div>
          </section>
        `;
      }

      function resultView(){
        setProgress(false);
        const t = TEXT[state.lang];
        const result = state.result;
        const meta = RESULT_META[result.type];

        app.innerHTML = `
          <section class="card">
            <div class="card-inner">
              <div class="result-head">
                <div class="result-emoji">${meta.emoji}</div>
                <div>
                  <div class="pill">${t.resultPrefix}</div>
                  <h2 class="result-title">${L(meta.name)}</h2>
                  <p class="result-summary">${L(meta.summary)}</p>
                </div>
              </div>

              <div class="result-detail">${L(meta.detail)}</div>
              <div class="tip"><strong>${t.tipLabel}:</strong> ${L(meta.tip)}</div>
              <canvas id="resultChart" width="600" height="220" aria-label="${t.chartTitle}"></canvas>

              <div class="share-grid">
                <button id="btnKakao" class="share">${t.shareKakao}</button>
                <button id="btnTw" class="share">${t.shareTwitter}</button>
                <button id="btnCp" class="share">${t.shareCopy}</button>
              </div>

              <button id="restartBtn" class="btn btn-ghost">${t.restart}</button>
              <p class="notice">${t.disclaimer}</p>
            </div>
          </section>
        `;

        drawChart(result.adjusted);
        document.getElementById('btnKakao').addEventListener('click', shareKakao);
        document.getElementById('btnTw').addEventListener('click', shareTwitter);
        document.getElementById('btnCp').addEventListener('click', copyLink);
        document.getElementById('restartBtn').addEventListener('click', ()=>{
          resetSession();
          render();
        });
      }

      function render(){
        if (state.screen === 'intro') {
          setProgress(false);
          introView();
        } else if (state.screen === 'question') {
          questionView();
        } else if (state.screen === 'analyzing') {
          analyzingView();
        } else if (state.screen === 'result') {
          resultView();
        }
      }

      function initTelegram(){
        try{
          if (window.Telegram && window.Telegram.WebApp){
            state.tg = window.Telegram.WebApp;
            state.tg.ready();
            if (state.tg.expand) state.tg.expand();
          }
        }catch(e){}
      }

      window.addEventListener('resize', ()=>{
        if (state.screen === 'result' && state.result) drawChart(state.result.adjusted);
      });

      initTelegram();
      state.saved = loadSaved();
      render();
    })();
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
