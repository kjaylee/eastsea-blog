<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automation Payback Calculator | 자동화 투자 회수 계산기</title>
  <meta name="description" content="업무 자동화 도입 시 월 절감비용, 월 순효과, 투자 회수기간, 연간 ROI를 계산하는 자동화 투자 회수(Automation Payback) 계산기" />
  <style>
    :root{--bg:#071322;--card:#101d36;--line:#2a4068;--txt:#eef4ff;--muted:#9ab0d5;--pri:#818cf8;--ok:#34d399;--warn:#fbbf24;--err:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#2d3f86 0%,#071322 52%);color:var(--txt)}
    .wrap{max-width:1060px;margin:0 auto;padding:20px 14px 60px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#dbe7ff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#101a34;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#18294f,#101d36);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1830;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#6366f1);font-weight:700}
    .soft{background:#172750;border:1px solid var(--line);font-weight:600}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:98px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);border-radius:11px;padding:10px;background:#0f1934}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.16rem;font-weight:800}
    .v.sm{font-size:1.02rem}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);font-size:.75rem;background:#14234a;color:#bed0f1;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>⚙️ 자동화 투자 회수 계산기</h1>
        <div class="sub">업무 자동화 프로젝트의 월 순효과와 회수기간을 계산해 투자 우선순위를 빠르게 판단합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="hours">현재 월 작업시간 (시간)</label><input id="hours" type="number" min="1" value="420" /></div>
          <div><label for="hourlyCost">인건비 (시간당 KRW)</label><input id="hourlyCost" type="number" min="1" value="38000" /></div>
          <div><label for="saveRate">자동화 절감률 (%)</label><input id="saveRate" type="number" min="0.1" max="100" step="0.1" value="52" /></div>
          <div><label for="buildCost">초기 구축비 (KRW)</label><input id="buildCost" type="number" min="0" value="28000000" /></div>
          <div><label for="maintCost">월 유지비 (KRW)</label><input id="maintCost" type="number" min="0" value="1200000" /></div>
          <div><label for="addRevenue">월 추가 매출효과 (KRW)</label><input id="addRevenue" type="number" min="0" value="3600000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 절감비용</div><div id="monthlySavings" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">투자 회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">연간 운영 순효과</div><div id="annualOperating" class="v sm">-</div></div>
          <div class="kpi"><div class="k">1년 순효과(구축비 포함)</div><div id="firstYearNet" class="v sm">-</div></div>
          <div class="kpi"><div class="k">연간 ROI</div><div id="annualRoi" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">투자효율 해석 대기</div>

        <h2 style="margin-top:12px">운영 전/후 비교</h2>
        <table>
          <tbody>
            <tr><th>현재 월 인건비</th><td id="currentLabor">-</td></tr>
            <tr><th>자동화 후 절감 인건비</th><td id="savedLabor">-</td></tr>
            <tr><th>월 유지비</th><td id="maint">-</td></tr>
            <tr><th>월 추가 매출효과</th><td id="added">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      hours:$('hours'), hourlyCost:$('hourlyCost'), saveRate:$('saveRate'), buildCost:$('buildCost'), maintCost:$('maintCost'), addRevenue:$('addRevenue'),
      monthlySavings:$('monthlySavings'), monthlyNet:$('monthlyNet'), payback:$('payback'), annualOperating:$('annualOperating'), firstYearNet:$('firstYearNet'), annualRoi:$('annualRoi'),
      currentLabor:$('currentLabor'), savedLabor:$('savedLabor'), maint:$('maint'), added:$('added'),
      status:$('status'), error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = { hours:420, hourlyCost:38000, saveRate:52, buildCost:28000000, maintCost:1200000, addRevenue:3600000 };
    const money = (n)=> new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=> Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.hours) || v.hours <= 0) return '현재 월 작업시간은 1 이상이어야 합니다.';
      if (!Number.isFinite(v.hourlyCost) || v.hourlyCost <= 0) return '인건비(시간당)는 0보다 커야 합니다.';
      if (!Number.isFinite(v.saveRate) || v.saveRate <= 0 || v.saveRate > 100) return '자동화 절감률은 0~100 범위(0 제외)여야 합니다.';
      if (!Number.isFinite(v.buildCost) || v.buildCost < 0) return '초기 구축비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.maintCost) || v.maintCost < 0) return '월 유지비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.addRevenue) || v.addRevenue < 0) return '월 추가 매출효과는 0 이상이어야 합니다.';
      return '';
    }

    function compute(v){
      const currentLabor = v.hours * v.hourlyCost;
      const monthlySavings = currentLabor * (v.saveRate/100);
      const monthlyNet = monthlySavings + v.addRevenue - v.maintCost;
      const payback = (v.buildCost === 0) ? 0 : (monthlyNet > 0 ? v.buildCost / monthlyNet : Infinity);
      const annualOperating = monthlyNet * 12;
      const firstYearNet = annualOperating - v.buildCost;
      const annualRoi = v.buildCost === 0 ? Infinity : (firstYearNet / v.buildCost) * 100;
      return { currentLabor, monthlySavings, monthlyNet, payback, annualOperating, firstYearNet, annualRoi };
    }

    function render(){
      const v = {
        hours:Number(refs.hours.value), hourlyCost:Number(refs.hourlyCost.value), saveRate:Number(refs.saveRate.value),
        buildCost:Number(refs.buildCost.value), maintCost:Number(refs.maintCost.value), addRevenue:Number(refs.addRevenue.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        ['monthlySavings','monthlyNet','payback','annualOperating','firstYearNet','annualRoi','currentLabor','savedLabor','maint','added'].forEach(k=>refs[k].textContent='-');
        refs.status.textContent = '입력값을 확인하세요';
        refs.summary.value = '';
        return;
      }

      const r = compute(v);
      refs.monthlySavings.textContent = money(r.monthlySavings);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가';
      refs.annualOperating.textContent = money(r.annualOperating);
      refs.firstYearNet.textContent = money(r.firstYearNet);
      refs.annualRoi.textContent = Number.isFinite(r.annualRoi) ? `${num(r.annualRoi,1)}%` : '∞';

      refs.currentLabor.textContent = money(r.currentLabor);
      refs.savedLabor.textContent = money(r.monthlySavings);
      refs.maint.textContent = money(v.maintCost);
      refs.added.textContent = money(v.addRevenue);

      const fast = Number.isFinite(r.payback) && r.payback <= 12;
      const possible = Number.isFinite(r.payback) && r.payback <= 24;
      refs.status.innerHTML = fast
        ? `<span class="ok">●</span> ${num(r.payback,1)}개월 회수 (우선 투자 후보)`
        : possible
          ? `<span class="warn">●</span> ${num(r.payback,1)}개월 회수 (조건부 투자)`
          : `● 회수기간 24개월 초과/불가 (구축 범위 재설계 필요)`;

      refs.summary.value = [
        '[Automation Payback 요약]',
        `월 절감비용: ${money(r.monthlySavings)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `투자 회수기간: ${Number.isFinite(r.payback) ? num(r.payback,1)+'개월' : '회수 불가'}`,
        `연간 운영 순효과: ${money(r.annualOperating)}`,
        `1년 순효과(구축비 포함): ${money(r.firstYearNet)}`,
        `연간 ROI: ${Number.isFinite(r.annualRoi) ? num(r.annualRoi,1)+'%' : '∞'}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.hours,refs.hourlyCost,refs.saveRate,refs.buildCost,refs.maintCost,refs.addRevenue].forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
