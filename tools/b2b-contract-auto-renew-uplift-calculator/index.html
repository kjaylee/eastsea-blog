<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B Contract Auto-renew Uplift Calculator | B2B 계약 자동갱신 수익 계산기</title>
  <meta name="description" content="계약 자동갱신(또는 자동갱신 캠페인) 도입 시 갱신율 개선이 보존 총이익, 월 순이익, ROI, 회수기간에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📑 B2B 계약 자동갱신 수익 계산기</h1>
        <div class="sub" id="subtitle">자동갱신 정책으로 갱신율이 개선될 때 보존 총이익, 월 순효과, ROI를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_expiring" for="expiring"></label><input id="expiring" type="number" min="1" value="1250"></div>
          <div><label id="l_currentRenewal" for="currentRenewal"></label><input id="currentRenewal" type="number" min="0" max="100" step="0.1" value="71"></div>
          <div><label id="l_targetRenewal" for="targetRenewal"></label><input id="targetRenewal" type="number" min="0" max="100" step="0.1" value="79"></div>
          <div><label id="l_contractMrr" for="contractMrr"></label><input id="contractMrr" type="number" min="0" step="1000" value="520000"></div>
          <div><label id="l_grossMargin" for="grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="68"></div>
          <div><label id="l_discount" for="discount"></label><input id="discount" type="number" min="0" max="100" step="0.1" value="5"></div>
          <div><label id="l_opsCost" for="opsCost"></label><input id="opsCost" type="number" min="0" step="1000" value="48000"></div>
          <div><label id="l_adminSave" for="adminSave"></label><input id="adminSave" type="number" min="0" step="1000" value="22000"></div>
          <div><label id="l_fixedCost" for="fixedCost"></label><input id="fixedCost" type="number" min="0" step="10000" value="6500000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="11000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_incrementalRenewals"></div><div class="v" id="incrementalRenewals">-</div></div>
          <div class="kpi"><div class="k" id="k_perRenewalNet"></div><div class="v" id="perRenewalNet">-</div></div>
          <div class="kpi"><div class="k" id="k_retainedGrossProfit"></div><div class="v" id="retainedGrossProfit">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_breakEvenRenewal"></th><td id="breakEvenRenewal">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_upliftPp"></th><td id="upliftPp">-</td></tr>
          <tr><th id="d_programCost"></th><td id="programCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={expiring:$("expiring"),currentRenewal:$("currentRenewal"),targetRenewal:$("targetRenewal"),contractMrr:$("contractMrr"),grossMargin:$("grossMargin"),discount:$("discount"),opsCost:$("opsCost"),adminSave:$("adminSave"),fixedCost:$("fixedCost"),setup:$("setup"),months:$("months"),incrementalRenewals:$("incrementalRenewals"),perRenewalNet:$("perRenewalNet"),retainedGrossProfit:$("retainedGrossProfit"),monthlyNet:$("monthlyNet"),periodNet:$("periodNet"),roi:$("roi"),breakEvenRenewal:$("breakEvenRenewal"),payback:$("payback"),upliftPp:$("upliftPp"),programCost:$("programCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={expiring:1250,currentRenewal:71,targetRenewal:79,contractMrr:520000,grossMargin:68,discount:5,opsCost:48000,adminSave:22000,fixedCost:6500000,setup:11000000,months:12};
    const I18N={
      ko:{title:"📑 B2B 계약 자동갱신 수익 계산기",subtitle:"자동갱신 정책으로 갱신율이 개선될 때 보존 총이익, 월 순효과, ROI를 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_expiring:"월 만료 계약 수",l_currentRenewal:"현재 갱신율 (%)",l_targetRenewal:"목표 갱신율 (%)",l_contractMrr:"계약당 월 매출 (₩)",l_grossMargin:"매출총이익률 (%)",l_discount:"갱신 할인율 (%)",l_opsCost:"추가 운영비 (갱신 1건당, ₩)",l_adminSave:"법무/운영 절감액 (갱신 1건당, ₩)",l_fixedCost:"월 고정 프로그램비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_incrementalRenewals:"순증 갱신 계약 수",k_perRenewalNet:"갱신 1건당 순기여",k_retainedGrossProfit:"순증 보존 총이익(월)",k_monthlyNet:"월 순증 순이익",k_periodNet:"기간 순효과",k_roi:"ROI",d_breakEvenRenewal:"손익분기 목표 갱신율",d_payback:"회수기간",d_upliftPp:"갱신율 개선폭",d_programCost:"기간 총 프로그램비",ok:"자동갱신 수익성 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 만료 계약 수/기간은 1 이상이어야 합니다.",logicErr:"목표 갱신율은 현재 갱신율 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[B2B 자동갱신 수익 계산 요약]",unitMonths:"개월"},
      en:{title:"📑 B2B Contract Auto-renew Uplift Calculator",subtitle:"Estimate retained gross profit, monthly net impact, and ROI from improved renewal rates.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_expiring:"Monthly expiring contracts",l_currentRenewal:"Current renewal rate (%)",l_targetRenewal:"Target renewal rate (%)",l_contractMrr:"Monthly revenue per contract (KRW)",l_grossMargin:"Gross margin (%)",l_discount:"Renewal discount (%)",l_opsCost:"Additional ops cost (per renewed contract, KRW)",l_adminSave:"Legal/ops savings (per renewed contract, KRW)",l_fixedCost:"Monthly fixed program cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_incrementalRenewals:"Incremental renewed contracts",k_perRenewalNet:"Net contribution per renewal",k_retainedGrossProfit:"Incremental retained gross profit (monthly)",k_monthlyNet:"Monthly net profit",k_periodNet:"Cumulative net impact",k_roi:"ROI",d_breakEvenRenewal:"Break-even renewal rate",d_payback:"Payback period",d_upliftPp:"Renewal uplift (pp)",d_programCost:"Total program cost (period)",ok:"Auto-renew economics ready",warn:"Monthly net profit is negative with current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and expiring contracts/months must be >= 1.",logicErr:"Target renewal rate must be greater than or equal to current renewal rate.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[B2B Auto-renew Uplift Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["expiring","currentRenewal","targetRenewal","contractMrr","grossMargin","discount","opsCost","adminSave","fixedCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["incrementalRenewals","perRenewalNet","retainedGrossProfit","monthlyNet","periodNet","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenRenewal","payback","upliftPp","programCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.expiring)||v.expiring<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.contractMrr,v.opsCost,v.adminSave,v.fixedCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.currentRenewal,v.targetRenewal,v.grossMargin,v.discount].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetRenewal<v.currentRenewal) return t("logicErr");
      return "";
    }

    function render(){
      const v={expiring:Number(refs.expiring.value),currentRenewal:Number(refs.currentRenewal.value),targetRenewal:Number(refs.targetRenewal.value),contractMrr:Number(refs.contractMrr.value),grossMargin:Number(refs.grossMargin.value),discount:Number(refs.discount.value),opsCost:Number(refs.opsCost.value),adminSave:Number(refs.adminSave.value),fixedCost:Number(refs.fixedCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["incrementalRenewals","perRenewalNet","retainedGrossProfit","monthlyNet","periodNet","roi","breakEvenRenewal","payback","upliftPp","programCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const upliftRate=(v.targetRenewal-v.currentRenewal)/100;
      const incrementalRenewals=v.expiring*upliftRate;
      const perRenewalNet=(v.contractMrr*(v.grossMargin/100)*(1-v.discount/100))-v.opsCost+v.adminSave;
      const retainedGrossProfit=incrementalRenewals*perRenewalNet;
      const monthlyNet=retainedGrossProfit-v.fixedCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const programCost=(v.fixedCost*v.months)+v.setup;
      const roi=programCost>0?(periodNet/programCost)*100:0;
      const needRenewals=perRenewalNet>0?(v.fixedCost/perRenewalNet):Infinity;
      const breakEvenRenewal=Number.isFinite(needRenewals)?v.currentRenewal+((needRenewals/v.expiring)*100):Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.incrementalRenewals.textContent=num(incrementalRenewals,1);
      refs.perRenewalNet.textContent=won(perRenewalNet);
      refs.retainedGrossProfit.textContent=won(retainedGrossProfit);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.periodNet.textContent=won(periodNet);
      refs.roi.textContent=pct(roi,1);
      refs.breakEvenRenewal.textContent=(Number.isFinite(breakEvenRenewal)&&breakEvenRenewal<=100)?pct(breakEvenRenewal,2):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.upliftPp.textContent=pct(v.targetRenewal-v.currentRenewal,1);
      refs.programCost.textContent=won(programCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_incrementalRenewals")}: ${num(incrementalRenewals,1)}`,`${t("k_perRenewalNet")}: ${won(perRenewalNet)}`,`${t("k_retainedGrossProfit")}: ${won(retainedGrossProfit)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenRenewal")}: ${(Number.isFinite(breakEvenRenewal)&&breakEvenRenewal<=100)?pct(breakEvenRenewal,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.expiring,refs.currentRenewal,refs.targetRenewal,refs.contractMrr,refs.grossMargin,refs.discount,refs.opsCost,refs.adminSave,refs.fixedCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
