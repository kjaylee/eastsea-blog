<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B Discount Approval ROI Calculator | B2B 할인 승인 ROI 계산기</title>
  <meta name="description" content="할인 승인 체계 개선 시 할인율 방어와 수주율 상승을 반영해 월 순효과, ROI, 회수기간, 손익분기 목표 할인율을 계산하는 B2B 수익화 도구" />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📑 B2B 할인 승인 ROI 계산기</h1>
        <div class="sub" id="subtitle">할인율 방어와 수주율 개선을 함께 반영해 딜 운영 ROI를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_deals" for="deals"></label><input id="deals" type="number" min="1" value="130"></div>
          <div><label id="l_listPrice" for="listPrice"></label><input id="listPrice" type="number" min="0" step="10000" value="36000000"></div>
          <div><label id="l_baseDiscount" for="baseDiscount"></label><input id="baseDiscount" type="number" min="0" max="100" step="0.1" value="18"></div>
          <div><label id="l_targetDiscount" for="targetDiscount"></label><input id="targetDiscount" type="number" min="0" max="100" step="0.1" value="14"></div>
          <div><label id="l_baseWin" for="baseWin"></label><input id="baseWin" type="number" min="0" max="100" step="0.1" value="24"></div>
          <div><label id="l_targetWin" for="targetWin"></label><input id="targetWin" type="number" min="0" max="100" step="0.1" value="27"></div>
          <div><label id="l_marginRate" for="marginRate"></label><input id="marginRate" type="number" min="0" max="100" step="0.1" value="76"></div>
          <div><label id="l_dealCost" for="dealCost"></label><input id="dealCost" type="number" min="0" step="1000" value="1700000"></div>
          <div><label id="l_monthlyCost" for="monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="11000000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="23000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_baseGross"></div><div class="v" id="baseGross">-</div></div>
          <div class="kpi"><div class="k" id="k_targetGross"></div><div class="v" id="targetGross">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_breakEvenDiscount"></div><div class="v" id="breakEvenDiscount">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_baseDealsWon"></th><td id="baseDealsWon">-</td></tr>
          <tr><th id="d_targetDealsWon"></th><td id="targetDealsWon">-</td></tr>
          <tr><th id="d_baseNetPrice"></th><td id="baseNetPrice">-</td></tr>
          <tr><th id="d_targetNetPrice"></th><td id="targetNetPrice">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={deals:$("deals"),listPrice:$("listPrice"),baseDiscount:$("baseDiscount"),targetDiscount:$("targetDiscount"),baseWin:$("baseWin"),targetWin:$("targetWin"),marginRate:$("marginRate"),dealCost:$("dealCost"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),baseGross:$("baseGross"),targetGross:$("targetGross"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),breakEvenDiscount:$("breakEvenDiscount"),baseDealsWon:$("baseDealsWon"),targetDealsWon:$("targetDealsWon"),baseNetPrice:$("baseNetPrice"),targetNetPrice:$("targetNetPrice"),payback:$("payback"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={deals:130,listPrice:36000000,baseDiscount:18,targetDiscount:14,baseWin:24,targetWin:27,marginRate:76,dealCost:1700000,monthlyCost:11000000,setup:23000000,months:12};
    const I18N={
      ko:{title:"📑 B2B 할인 승인 ROI 계산기",subtitle:"할인율 방어와 수주율 개선을 함께 반영해 딜 운영 ROI를 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_deals:"월 딜 건수",l_listPrice:"평균 리스트 가격 (₩)",l_baseDiscount:"현재 평균 할인율 (%)",l_targetDiscount:"목표 평균 할인율 (%)",l_baseWin:"현재 수주율 (%)",l_targetWin:"목표 수주율 (%)",l_marginRate:"매출총이익률 (%)",l_dealCost:"딜당 추가 운영비 (₩)",l_monthlyCost:"월 운영비 (₩)",l_setup:"초기 도입비 (₩)",l_months:"분석 기간 (개월)",k_baseGross:"현재 월 총이익",k_targetGross:"개선 후 월 총이익",k_monthlyNet:"월 순효과",k_roi:"ROI",k_periodNet:"기간 순효과",k_breakEvenDiscount:"손익분기 목표 할인율",d_baseDealsWon:"현재 수주 건수",d_targetDealsWon:"목표 수주 건수",d_baseNetPrice:"현재 평균 순단가",d_targetNetPrice:"목표 평균 순단가",d_payback:"회수기간",ok:"할인 승인 개선 ROI 계산 완료",warn:"현재 가정에서는 월 순효과가 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 딜 건수/기간은 1 이상이어야 합니다.",orderErr:"목표 할인율은 현재 이하, 목표 수주율은 현재 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[B2B Discount Approval ROI 요약]",unitMonths:"개월"},
      en:{title:"📑 B2B Discount Approval ROI Calculator",subtitle:"Estimate ROI from discount governance improvements with both discount defense and win-rate uplift.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_deals:"Monthly deal volume",l_listPrice:"Average list price (KRW)",l_baseDiscount:"Current average discount (%)",l_targetDiscount:"Target average discount (%)",l_baseWin:"Current win rate (%)",l_targetWin:"Target win rate (%)",l_marginRate:"Gross margin (%)",l_dealCost:"Additional operating cost per deal (KRW)",l_monthlyCost:"Monthly operating cost (KRW)",l_setup:"One-time implementation cost (KRW)",l_months:"Analysis period (months)",k_baseGross:"Current monthly gross profit",k_targetGross:"Post-improvement monthly gross profit",k_monthlyNet:"Monthly net impact",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_breakEvenDiscount:"Break-even target discount",d_baseDealsWon:"Baseline won deals",d_targetDealsWon:"Target won deals",d_baseNetPrice:"Baseline average net price",d_targetNetPrice:"Target average net price",d_payback:"Payback period",ok:"Discount approval economics ready",warn:"Monthly net impact is negative under current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and deals/months must be >= 1.",orderErr:"Target discount must be <= baseline discount and target win rate must be >= baseline.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[B2B Discount Approval ROI Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["deals","listPrice","baseDiscount","targetDiscount","baseWin","targetWin","marginRate","dealCost","monthlyCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["baseGross","targetGross","monthlyNet","roi","periodNet","breakEvenDiscount"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["baseDealsWon","targetDealsWon","baseNetPrice","targetNetPrice","payback"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.deals)||v.deals<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.listPrice,v.dealCost,v.monthlyCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.baseDiscount,v.targetDiscount,v.baseWin,v.targetWin,v.marginRate].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetDiscount>v.baseDiscount || v.targetWin<v.baseWin) return t("orderErr");
      return "";
    }

    function render(){
      const v={deals:Number(refs.deals.value),listPrice:Number(refs.listPrice.value),baseDiscount:Number(refs.baseDiscount.value),targetDiscount:Number(refs.targetDiscount.value),baseWin:Number(refs.baseWin.value),targetWin:Number(refs.targetWin.value),marginRate:Number(refs.marginRate.value),dealCost:Number(refs.dealCost.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["baseGross","targetGross","monthlyNet","roi","periodNet","breakEvenDiscount","baseDealsWon","targetDealsWon","baseNetPrice","targetNetPrice","payback"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const margin=v.marginRate/100;
      const baseDealsWon=v.deals*(v.baseWin/100);
      const targetDealsWon=v.deals*(v.targetWin/100);
      const baseNetPrice=v.listPrice*(1-v.baseDiscount/100);
      const targetNetPrice=v.listPrice*(1-v.targetDiscount/100);

      const baseGross=baseDealsWon*((baseNetPrice*margin)-v.dealCost);
      const targetGross=targetDealsWon*((targetNetPrice*margin)-v.dealCost);
      const monthlyNet=(targetGross-baseGross)-v.monthlyCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalCost>0?(periodNet/totalCost)*100:0;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      let breakEvenDiscount=Infinity;
      if(targetDealsWon>0 && margin>0 && v.listPrice>0){
        const reqTargetGross=baseGross+v.monthlyCost;
        const reqPerDealNet=(reqTargetGross/targetDealsWon)+v.dealCost;
        const reqPrice=reqPerDealNet/margin;
        breakEvenDiscount=(1-(reqPrice/v.listPrice))*100;
      }

      refs.baseGross.textContent=won(baseGross);
      refs.targetGross.textContent=won(targetGross);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.breakEvenDiscount.textContent=(Number.isFinite(breakEvenDiscount)&&breakEvenDiscount>=0&&breakEvenDiscount<=100)?pct(breakEvenDiscount,2):t("na");
      refs.baseDealsWon.textContent=num(baseDealsWon,1);
      refs.targetDealsWon.textContent=num(targetDealsWon,1);
      refs.baseNetPrice.textContent=won(baseNetPrice);
      refs.targetNetPrice.textContent=won(targetNetPrice);
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_baseGross")}: ${won(baseGross)}`,`${t("k_targetGross")}: ${won(targetGross)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("k_breakEvenDiscount")}: ${(Number.isFinite(breakEvenDiscount)&&breakEvenDiscount>=0&&breakEvenDiscount<=100)?pct(breakEvenDiscount,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.deals,refs.listPrice,refs.baseDiscount,refs.targetDiscount,refs.baseWin,refs.targetWin,refs.marginRate,refs.dealCost,refs.monthlyCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
