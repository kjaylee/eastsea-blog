<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B Pilot-to-Contract Conversion ROI Calculator | B2B 파일럿 전환 ROI 계산기</title>
  <meta name="description" content="파일럿→유료 계약 전환율 개선 시 순증 계약, 월 순이익, ROI, 회수기간, 손익분기 전환율을 계산하는 B2B 수익화 도구" />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📘 B2B 파일럿 전환 ROI 계산기</h1>
        <div class="sub" id="subtitle">파일럿 전환율 개선 시 순증 계약 기반 월 순이익과 ROI를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_monthlyPilots" for="monthlyPilots"></label><input id="monthlyPilots" type="number" min="1" value="180"></div>
          <div><label id="l_currentConv" for="currentConv"></label><input id="currentConv" type="number" min="0" max="100" step="0.1" value="18"></div>
          <div><label id="l_targetConv" for="targetConv"></label><input id="targetConv" type="number" min="0" max="100" step="0.1" value="31"></div>
          <div><label id="l_arrPerDeal" for="arrPerDeal"></label><input id="arrPerDeal" type="number" min="0" step="10000" value="48000000"></div>
          <div><label id="l_grossMargin" for="grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="78"></div>
          <div><label id="l_onboardingCost" for="onboardingCost"></label><input id="onboardingCost" type="number" min="0" step="10000" value="900000"></div>
          <div><label id="l_commissionRate" for="commissionRate"></label><input id="commissionRate" type="number" min="0" max="100" step="0.1" value="2.5"></div>
          <div><label id="l_supportCost" for="supportCost"></label><input id="supportCost" type="number" min="0" step="10000" value="340000"></div>
          <div><label id="l_monthlyCost" for="monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="11000000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="17000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_incrementalDeals"></div><div class="v" id="incrementalDeals">-</div></div>
          <div class="kpi"><div class="k" id="k_netPerDeal"></div><div class="v" id="netPerDeal">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_convDelta"></div><div class="v" id="convDelta">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_breakEvenConv"></th><td id="breakEvenConv">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_monthlyContribution"></th><td id="monthlyContribution">-</td></tr>
          <tr><th id="d_totalProgramCost"></th><td id="totalProgramCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={monthlyPilots:$("monthlyPilots"),currentConv:$("currentConv"),targetConv:$("targetConv"),arrPerDeal:$("arrPerDeal"),grossMargin:$("grossMargin"),onboardingCost:$("onboardingCost"),commissionRate:$("commissionRate"),supportCost:$("supportCost"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),incrementalDeals:$("incrementalDeals"),netPerDeal:$("netPerDeal"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),convDelta:$("convDelta"),breakEvenConv:$("breakEvenConv"),payback:$("payback"),monthlyContribution:$("monthlyContribution"),totalProgramCost:$("totalProgramCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={monthlyPilots:180,currentConv:18,targetConv:31,arrPerDeal:48000000,grossMargin:78,onboardingCost:900000,commissionRate:2.5,supportCost:340000,monthlyCost:11000000,setup:17000000,months:12};
    const I18N={
      ko:{title:"📘 B2B 파일럿 전환 ROI 계산기",subtitle:"파일럿 전환율 개선 시 순증 계약 기반 월 순이익과 ROI를 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_monthlyPilots:"월 파일럿 수",l_currentConv:"현재 파일럿 전환율 (%)",l_targetConv:"목표 파일럿 전환율 (%)",l_arrPerDeal:"계약당 ARR (₩)",l_grossMargin:"매출총이익률 (%)",l_onboardingCost:"계약당 온보딩 비용 (₩)",l_commissionRate:"세일즈 커미션율 (ARR 대비, %)",l_supportCost:"계약당 월 지원비 (₩)",l_monthlyCost:"월 프로그램 운영비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_incrementalDeals:"순증 계약 수 (월)",k_netPerDeal:"계약 1건당 월 순기여",k_monthlyNet:"월 순이익",k_roi:"ROI",k_periodNet:"기간 순효과",k_convDelta:"전환율 개선폭",d_breakEvenConv:"손익분기 목표 전환율",d_payback:"회수기간",d_monthlyContribution:"월 순증 총기여",d_totalProgramCost:"기간 총 프로그램비",ok:"파일럿 전환 수익성 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 파일럿 수/기간은 1 이상이어야 합니다.",logicErr:"목표 전환율은 현재 전환율 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[B2B 파일럿 전환 ROI 요약]",unitMonths:"개월"},
      en:{title:"📘 B2B Pilot-to-Contract Conversion ROI Calculator",subtitle:"Estimate monthly net impact, ROI, and payback from pilot-to-paid conversion uplift.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_monthlyPilots:"Monthly pilot volume",l_currentConv:"Current pilot conversion rate (%)",l_targetConv:"Target pilot conversion rate (%)",l_arrPerDeal:"ARR per contract (KRW)",l_grossMargin:"Gross margin (%)",l_onboardingCost:"Onboarding cost per contract (KRW)",l_commissionRate:"Sales commission rate (% of ARR)",l_supportCost:"Monthly support cost per contract (KRW)",l_monthlyCost:"Monthly program operating cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_incrementalDeals:"Incremental contracts (monthly)",k_netPerDeal:"Net monthly contribution per contract",k_monthlyNet:"Monthly net profit",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_convDelta:"Conversion uplift",d_breakEvenConv:"Break-even target conversion rate",d_payback:"Payback period",d_monthlyContribution:"Monthly incremental contribution",d_totalProgramCost:"Total program cost (period)",ok:"Pilot conversion economics ready",warn:"Monthly net profit is negative under current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and pilots/months must be >= 1.",logicErr:"Target conversion rate must be greater than or equal to current rate.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[B2B Pilot Conversion ROI Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["monthlyPilots","currentConv","targetConv","arrPerDeal","grossMargin","onboardingCost","commissionRate","supportCost","monthlyCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["incrementalDeals","netPerDeal","monthlyNet","roi","periodNet","convDelta"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenConv","payback","monthlyContribution","totalProgramCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.monthlyPilots)||v.monthlyPilots<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.arrPerDeal,v.onboardingCost,v.supportCost,v.monthlyCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.currentConv,v.targetConv,v.grossMargin,v.commissionRate].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetConv<v.currentConv) return t("logicErr");
      return "";
    }

    function render(){
      const v={monthlyPilots:Number(refs.monthlyPilots.value),currentConv:Number(refs.currentConv.value),targetConv:Number(refs.targetConv.value),arrPerDeal:Number(refs.arrPerDeal.value),grossMargin:Number(refs.grossMargin.value),onboardingCost:Number(refs.onboardingCost.value),commissionRate:Number(refs.commissionRate.value),supportCost:Number(refs.supportCost.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["incrementalDeals","netPerDeal","monthlyNet","roi","periodNet","convDelta","breakEvenConv","payback","monthlyContribution","totalProgramCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const convDelta=Math.max(0,v.targetConv-v.currentConv);
      const incrementalDeals=v.monthlyPilots*(convDelta/100);
      const monthlyGrossProfit=(v.arrPerDeal/12)*(v.grossMargin/100);
      const commissionCost=v.arrPerDeal*(v.commissionRate/100);
      const netPerDeal=monthlyGrossProfit-v.supportCost-v.onboardingCost-commissionCost;
      const monthlyContribution=incrementalDeals*netPerDeal;
      const monthlyNet=monthlyContribution-v.monthlyCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;

      const requiredDeals=netPerDeal>0?(v.monthlyCost/netPerDeal):Infinity;
      const breakEvenConv=Number.isFinite(requiredDeals)?v.currentConv+((requiredDeals/v.monthlyPilots)*100):Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.incrementalDeals.textContent=num(incrementalDeals,1);
      refs.netPerDeal.textContent=won(netPerDeal);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.convDelta.textContent=pct(convDelta,2);
      refs.breakEvenConv.textContent=(Number.isFinite(breakEvenConv)&&breakEvenConv<=100)?pct(breakEvenConv,2):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.totalProgramCost.textContent=won(totalProgramCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_incrementalDeals")}: ${num(incrementalDeals,1)}`,`${t("k_netPerDeal")}: ${won(netPerDeal)}`,`${t("d_monthlyContribution")}: ${won(monthlyContribution)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenConv")}: ${(Number.isFinite(breakEvenConv)&&breakEvenConv<=100)?pct(breakEvenConv,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.monthlyPilots,refs.currentConv,refs.targetConv,refs.arrPerDeal,refs.grossMargin,refs.onboardingCost,refs.commissionRate,refs.supportCost,refs.monthlyCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
