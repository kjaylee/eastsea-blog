<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B Proposal Win Rate ROI Calculator | B2B 제안서 승률 ROI 계산기</title>
  <meta name="description" content="B2B 제안서 개선 프로그램 도입 시 승률 개선으로 발생하는 추가 수주, 추가 이익, 회수기간, ROI, 손익분기 승률을 계산합니다." />
  <style>
    :root{--bg:#0b1022;--card:#121a36;--line:#2d3d72;--txt:#ecf2ff;--muted:#acb8e5;--pri:#8b5cf6;--ok:#34d399;--warn:#f59e0b}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at top,#222f59 0%,#0b1022 54%);color:var(--txt)}
    .wrap{max-width:1060px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#ede9fe;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#1a2550;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#1d2851,#121a36);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;border-radius:10px;border:1px solid var(--line);background:#0f1732;color:var(--txt);padding:10px;font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,#8b5cf6,#7c3aed);font-weight:700}
    .soft{background:#202a55;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:104px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f1d1d;background:rgba(248,113,113,.14);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{padding:10px;border:1px solid var(--line);border-radius:10px;background:#0e1530}
    .k{font-size:.75rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.04rem;font-weight:800}
    .pill{display:inline-flex;gap:6px;align-items:center;margin-top:10px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#1f2a56;color:#e9d5ff;font-size:.78rem}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📑 B2B 제안서 승률 ROI 계산기</h1>
        <div class="sub">제안서 개선 프로젝트가 승률·수주액·영업이익에 미치는 영향을 수치로 검증합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="opps">월 제안 기회 수 (건)</label><input id="opps" type="number" min="1" value="32" /></div>
          <div><label for="baseWin">현재 승률 (%)</label><input id="baseWin" type="number" min="0.1" max="100" step="0.1" value="24" /></div>
          <div><label for="targetWin">목표 승률 (%)</label><input id="targetWin" type="number" min="0.1" max="100" step="0.1" value="31" /></div>
          <div><label for="acv">평균 계약금액 ACV (KRW)</label><input id="acv" type="number" min="1" value="68000000" /></div>
          <div><label for="grossMargin">매출총이익률 (%)</label><input id="grossMargin" type="number" min="1" max="100" step="0.1" value="46" /></div>
          <div><label for="variableCostRate">가변 실행비율 (% of ACV)</label><input id="variableCostRate" type="number" min="0" max="80" step="0.1" value="4" /></div>
          <div><label for="toolCost">월 도구/운영비 (KRW)</label><input id="toolCost" type="number" min="0" value="3800000" /></div>
          <div><label for="implementationCost">초기 도입비 (KRW)</label><input id="implementationCost" type="number" min="0" value="24000000" /></div>
          <div><label for="analysisMonths">분석 기간 (개월)</label><input id="analysisMonths" type="number" min="1" max="36" value="12" /></div>
          <div><label for="annualDiscountRate">연 할인율 (%)</label><input id="annualDiscountRate" type="number" min="0" max="40" step="0.1" value="10" /></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">증가 수주 건수 (월)</div><div id="incDeals" class="v">-</div></div>
          <div class="kpi"><div class="k">증가 수주액 (월)</div><div id="incBookings" class="v">-</div></div>
          <div class="kpi"><div class="k">순 월간 효과</div><div id="netMonthly" class="v">-</div></div>
          <div class="kpi"><div class="k">누적 순효과</div><div id="totalNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI (도입비 기준)</div><div id="roi" class="v">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v">-</div></div>
        </div>
        <div id="status" class="pill">계산 대기 중</div>

        <h2 style="margin-top:12px">세부 지표</h2>
        <table>
          <tbody>
            <tr><th>현재 월 이익</th><td id="baseProfit">-</td></tr>
            <tr><th>목표 월 이익</th><td id="targetProfit">-</td></tr>
            <tr><th>손익분기 승률</th><td id="beWinRate">-</td></tr>
            <tr><th>NPV (분석기간)</th><td id="npv">-</td></tr>
            <tr><th>월 도구/운영비</th><td id="toolCostOut">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      opps:$('opps'), baseWin:$('baseWin'), targetWin:$('targetWin'), acv:$('acv'), grossMargin:$('grossMargin'),
      variableCostRate:$('variableCostRate'), toolCost:$('toolCost'), implementationCost:$('implementationCost'),
      analysisMonths:$('analysisMonths'), annualDiscountRate:$('annualDiscountRate'),
      incDeals:$('incDeals'), incBookings:$('incBookings'), netMonthly:$('netMonthly'), totalNet:$('totalNet'), roi:$('roi'), payback:$('payback'),
      baseProfit:$('baseProfit'), targetProfit:$('targetProfit'), beWinRate:$('beWinRate'), npv:$('npv'), toolCostOut:$('toolCostOut'),
      status:$('status'), summary:$('summary'), error:$('error'), copy:$('copy'), reset:$('reset')
    };

    const defaults = {
      opps:32, baseWin:24, targetWin:31, acv:68000000, grossMargin:46,
      variableCostRate:4, toolCost:3800000, implementationCost:24000000, analysisMonths:12, annualDiscountRate:10
    };

    const won = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.opps) || v.opps <= 0) return '월 제안 기회 수는 0보다 커야 합니다.';
      if (!Number.isFinite(v.baseWin) || v.baseWin <= 0 || v.baseWin > 100) return '현재 승률은 0 초과 100 이하 범위여야 합니다.';
      if (!Number.isFinite(v.targetWin) || v.targetWin <= 0 || v.targetWin > 100) return '목표 승률은 0 초과 100 이하 범위여야 합니다.';
      if (!Number.isFinite(v.targetWin - v.baseWin) || v.targetWin < v.baseWin) return '목표 승률은 현재 승률 이상이어야 합니다.';
      if (!Number.isFinite(v.acv) || v.acv <= 0) return '평균 계약금액은 0보다 커야 합니다.';
      if (!Number.isFinite(v.grossMargin) || v.grossMargin <= 0 || v.grossMargin > 100) return '매출총이익률은 0 초과 100 이하 범위여야 합니다.';
      if (!Number.isFinite(v.variableCostRate) || v.variableCostRate < 0 || v.variableCostRate > 80) return '가변 실행비율은 0~80% 범위여야 합니다.';
      if (!Number.isFinite(v.toolCost) || v.toolCost < 0) return '월 도구/운영비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.implementationCost) || v.implementationCost < 0) return '초기 도입비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.analysisMonths) || v.analysisMonths < 1 || v.analysisMonths > 36) return '분석 기간은 1~36개월 범위여야 합니다.';
      if (!Number.isFinite(v.annualDiscountRate) || v.annualDiscountRate < 0 || v.annualDiscountRate > 40) return '연 할인율은 0~40% 범위여야 합니다.';
      const profitRate = (v.grossMargin - v.variableCostRate) / 100;
      if (profitRate <= 0) return '매출총이익률이 가변 실행비율보다 커야 합니다.';
      return '';
    }

    function compute(v){
      const baseWinRate = v.baseWin / 100;
      const targetWinRate = v.targetWin / 100;
      const profitRate = (v.grossMargin - v.variableCostRate) / 100;

      const baseDeals = v.opps * baseWinRate;
      const targetDeals = v.opps * targetWinRate;
      const incDeals = targetDeals - baseDeals;

      const incBookings = incDeals * v.acv;
      const baseProfit = baseDeals * v.acv * profitRate;
      const targetProfit = targetDeals * v.acv * profitRate;
      const incGrossProfit = targetProfit - baseProfit;

      const netMonthly = incGrossProfit - v.toolCost;
      const totalNet = (netMonthly * v.analysisMonths) - v.implementationCost;
      const roi = v.implementationCost === 0 ? Infinity : (totalNet / v.implementationCost) * 100;
      const payback = v.implementationCost === 0 ? 0 : (netMonthly > 0 ? v.implementationCost / netMonthly : Infinity);

      const requiredIncProfit = v.toolCost;
      const requiredIncDeals = requiredIncProfit / (v.acv * profitRate);
      const beWinRate = ((baseDeals + requiredIncDeals) / v.opps) * 100;

      const monthRate = (v.annualDiscountRate / 100) / 12;
      let npv = -v.implementationCost;
      for (let m = 1; m <= v.analysisMonths; m++) {
        npv += netMonthly / Math.pow(1 + monthRate, m);
      }

      return {incDeals, incBookings, baseProfit, targetProfit, netMonthly, totalNet, roi, payback, beWinRate, npv};
    }

    function render(){
      const v = {
        opps:Number(refs.opps.value), baseWin:Number(refs.baseWin.value), targetWin:Number(refs.targetWin.value),
        acv:Number(refs.acv.value), grossMargin:Number(refs.grossMargin.value), variableCostRate:Number(refs.variableCostRate.value),
        toolCost:Number(refs.toolCost.value), implementationCost:Number(refs.implementationCost.value),
        analysisMonths:Number(refs.analysisMonths.value), annualDiscountRate:Number(refs.annualDiscountRate.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err) {
        ['incDeals','incBookings','netMonthly','totalNet','roi','payback','baseProfit','targetProfit','beWinRate','npv','toolCostOut'].forEach(k=>refs[k].textContent='-');
        refs.summary.value = '';
        refs.status.textContent = '입력값을 확인하세요';
        return;
      }

      const r = compute(v);
      refs.incDeals.textContent = `${num(r.incDeals,2)}건`;
      refs.incBookings.textContent = won(r.incBookings);
      refs.netMonthly.textContent = won(r.netMonthly);
      refs.totalNet.textContent = won(r.totalNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : '∞';
      refs.payback.textContent = r.payback === 0 ? '즉시' : (Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가');
      refs.baseProfit.textContent = won(r.baseProfit);
      refs.targetProfit.textContent = won(r.targetProfit);
      refs.beWinRate.textContent = `${num(r.beWinRate,2)}%`;
      refs.npv.textContent = won(r.npv);
      refs.toolCostOut.textContent = won(v.toolCost);

      if (r.netMonthly > 0) {
        refs.status.innerHTML = `<span class="ok">●</span> 월 순효과 ${won(r.netMonthly)} (승률 개선 효과 유의미)`;
      } else if (r.netMonthly === 0) {
        refs.status.innerHTML = '● 월 손익분기';
      } else {
        refs.status.innerHTML = `<span class="warn">●</span> 월 순효과 ${won(r.netMonthly)} (비용/가정 재점검 필요)`;
      }

      refs.summary.value = [
        '[B2B Proposal Win Rate ROI 요약]',
        `증가 수주 건수(월): ${num(r.incDeals,2)}건`,
        `증가 수주액(월): ${won(r.incBookings)}`,
        `현재 월 이익: ${won(r.baseProfit)}`,
        `목표 월 이익: ${won(r.targetProfit)}`,
        `월간 순효과: ${won(r.netMonthly)}`,
        `${v.analysisMonths}개월 누적 순효과: ${won(r.totalNet)}`,
        `ROI(도입비 기준): ${Number.isFinite(r.roi) ? num(r.roi,1)+'%' : '∞'}`,
        `회수기간: ${r.payback===0 ? '즉시' : (Number.isFinite(r.payback)?num(r.payback,1)+'개월':'회수 불가')}`,
        `손익분기 승률: ${num(r.beWinRate,2)}%`,
        `NPV(${v.analysisMonths}개월): ${won(r.npv)}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('클립보드 권한이 없어 수동 복사가 필요합니다.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.opps, refs.baseWin, refs.targetWin, refs.acv, refs.grossMargin, refs.variableCostRate,
      refs.toolCost, refs.implementationCost, refs.analysisMonths, refs.annualDiscountRate].forEach(el=>{
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
