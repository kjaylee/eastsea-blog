<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B Renewal Uplift ROI Calculator | B2B 갱신율 개선 ROI 계산기</title>
  <meta name="description" content="만료 계약의 갱신율 개선 프로그램에서 추가 보존 ARR, 월 순효과, 손익분기 uplift, ROI를 계산합니다." />
  <style>
    :root{--bg:#1a1024;--card:#2a1838;--line:#5b3c75;--text:#f6f0ff;--muted:#d8c9eb;--pri:#c084fc;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#5b21b6 0%,var(--bg) 56%);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.18rem,2.8vw,1.84rem)}.sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btnLink,.lang{border:1px solid var(--line);background:#3c2552;color:#f3e8ff;text-decoration:none;border-radius:10px;padding:8px 11px;font-size:.88rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#39214d,#241430);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#221330;color:var(--text);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;background:linear-gradient(135deg,#d8b4fe,#a855f7);font-weight:700;color:#1f1033}.soft{background:#4c2f69;border:1px solid var(--line);color:#f3e8ff}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f1d1d;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:#261636;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.04rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#462b60;color:#f3e8ff;font-size:.77rem;margin-top:10px}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.actions{justify-content:flex-start}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🤝 B2B 갱신율 개선 ROI 계산기</h1>
        <div class="sub" id="subtitle">갱신 방어 프로그램의 추가 보존 ARR, 순효과, 손익분기 uplift를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a class="btnLink" href="/" id="backLink">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값 Inputs</h2>
        <div class="inputs">
          <div><label for="contracts" id="l_contracts"></label><input id="contracts" type="number" min="1" step="1" value="140"></div>
          <div><label for="baselineRenewal" id="l_baselineRenewal"></label><input id="baselineRenewal" type="number" min="0" max="100" step="0.1" value="78"></div>
          <div><label for="upliftPp" id="l_upliftPp"></label><input id="upliftPp" type="number" min="0" max="100" step="0.1" value="4.5"></div>
          <div><label for="avgArr" id="l_avgArr"></label><input id="avgArr" type="number" min="0" step="10000" value="28000000"></div>
          <div><label for="grossMargin" id="l_grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="74"></div>
          <div><label for="saveDiscount" id="l_saveDiscount"></label><input id="saveDiscount" type="number" min="0" max="100" step="0.1" value="8"></div>
          <div><label for="coverageRate" id="l_coverageRate"></label><input id="coverageRate" type="number" min="0" max="100" step="0.1" value="65"></div>
          <div><label for="touchCost" id="l_touchCost"></label><input id="touchCost" type="number" min="0" step="1000" value="180000"></div>
          <div><label for="monthlyToolCost" id="l_monthlyToolCost"></label><input id="monthlyToolCost" type="number" min="0" step="1000" value="3200000"></div>
          <div><label for="setupCost" id="l_setupCost"></label><input id="setupCost" type="number" min="0" step="10000" value="26000000"></div>
          <div><label for="months" id="l_months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button"></button>
          <button id="reset" type="button"></button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_additionalRenewals"></div><div id="additionalRenewals" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_incrementalArr"></div><div id="incrementalArr" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_incrementalGrossProfit"></div><div id="incrementalGrossProfit" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyProgramCost"></div><div id="monthlyProgramCost" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNetImpact"></div><div id="monthlyNetImpact" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill"></div>

        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table>
          <tbody>
            <tr><th id="d_targetedAccounts"></th><td id="targetedAccounts">-</td></tr>
            <tr><th id="d_breakEvenUplift"></th><td id="breakEvenUplift">-</td></tr>
            <tr><th id="d_paybackMonths"></th><td id="paybackMonths">-</td></tr>
            <tr><th id="d_cumulativeNet"></th><td id="cumulativeNet">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={
      contracts:$("contracts"),baselineRenewal:$("baselineRenewal"),upliftPp:$("upliftPp"),avgArr:$("avgArr"),grossMargin:$("grossMargin"),saveDiscount:$("saveDiscount"),coverageRate:$("coverageRate"),touchCost:$("touchCost"),monthlyToolCost:$("monthlyToolCost"),setupCost:$("setupCost"),months:$("months"),
      additionalRenewals:$("additionalRenewals"),incrementalArr:$("incrementalArr"),incrementalGrossProfit:$("incrementalGrossProfit"),monthlyProgramCost:$("monthlyProgramCost"),monthlyNetImpact:$("monthlyNetImpact"),roi:$("roi"),targetedAccounts:$("targetedAccounts"),breakEvenUplift:$("breakEvenUplift"),paybackMonths:$("paybackMonths"),cumulativeNet:$("cumulativeNet"),
      copy:$("copy"),reset:$("reset"),summary:$("summary"),error:$("error"),status:$("status"),langBtn:$("langBtn")
    };
    const defaults={contracts:140,baselineRenewal:78,upliftPp:4.5,avgArr:28000000,grossMargin:74,saveDiscount:8,coverageRate:65,touchCost:180000,monthlyToolCost:3200000,setupCost:26000000,months:12};

    const I18N={
      ko:{title:"🤝 B2B 갱신율 개선 ROI 계산기",subtitle:"갱신 방어 프로그램의 추가 보존 ARR, 순효과, 손익분기 uplift를 계산합니다.",inputHeader:"입력값 Inputs",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",
      l_contracts:"월 만료 계약 수",l_baselineRenewal:"기준 갱신율 (%)",l_upliftPp:"개선 uplift (%p)",l_avgArr:"계약당 평균 ARR (₩)",l_grossMargin:"매출총이익률 (%)",l_saveDiscount:"세이브 오퍼 할인율 (%)",l_coverageRate:"위험군 커버리지율 (%)",l_touchCost:"대상 계정당 터치 비용 (₩)",l_monthlyToolCost:"월 툴/운영비 (₩)",l_setupCost:"원타임 구축비 (₩)",l_months:"분석 기간 (개월)",
      k_additionalRenewals:"월 추가 갱신건수",k_incrementalArr:"추가 보존 ARR",k_incrementalGrossProfit:"추가 보존 총이익",k_monthlyProgramCost:"월 프로그램 비용",k_monthlyNetImpact:"월 순효과",k_roi:"ROI (기간)",
      d_targetedAccounts:"월 타겟 계정 수",d_breakEvenUplift:"손익분기 uplift",d_paybackMonths:"회수기간",d_cumulativeNet:"누적 순효과",good:"프로그램이 순이익을 창출합니다",bad:"현재 조건에서는 적자 가능성이 큽니다",invalid:"입력값을 확인해 주세요",
      e_rate:"비율 값은 0~100 범위여야 합니다.",e_renewal:"기준 갱신율 + uplift는 100%를 넘을 수 없습니다.",e_months:"분석 기간은 1개월 이상이어야 합니다.",copied:"요약이 복사되었습니다.",copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",summaryTitle:"[B2B 갱신율 개선 ROI 요약]"},
      en:{title:"🤝 B2B Renewal Uplift ROI Calculator",subtitle:"Estimate retained ARR and ROI impact from a renewal-defense program.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",
      l_contracts:"Monthly expiring contracts",l_baselineRenewal:"Baseline renewal rate (%)",l_upliftPp:"Renewal uplift (%p)",l_avgArr:"Average ARR per contract (KRW)",l_grossMargin:"Gross margin (%)",l_saveDiscount:"Save-offer discount (%)",l_coverageRate:"At-risk coverage rate (%)",l_touchCost:"Touch cost per targeted account (KRW)",l_monthlyToolCost:"Monthly enablement/tool cost (KRW)",l_setupCost:"One-time setup cost (KRW)",l_months:"Analysis period (months)",
      k_additionalRenewals:"Additional renewals per month",k_incrementalArr:"Incremental retained ARR",k_incrementalGrossProfit:"Incremental retained gross profit",k_monthlyProgramCost:"Monthly program cost",k_monthlyNetImpact:"Monthly net impact",k_roi:"ROI (period)",
      d_targetedAccounts:"Targeted accounts per month",d_breakEvenUplift:"Break-even uplift",d_paybackMonths:"Payback period",d_cumulativeNet:"Cumulative net impact",good:"Program is net-positive",bad:"Program may be loss-making",invalid:"Please review your inputs",
      e_rate:"Rate inputs must stay within 0 to 100.",e_renewal:"Baseline renewal + uplift cannot exceed 100%.",e_months:"Analysis period must be at least 1 month.",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[B2B Renewal Uplift ROI Summary]"}
    };

    let lang="ko";
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString("en-US",{maximumFractionDigits:d});
    const t=(k)=>I18N[lang][k]||k;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["contracts","baselineRenewal","upliftPp","avgArr","grossMargin","saveDiscount","coverageRate","touchCost","monthlyToolCost","setupCost","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["additionalRenewals","incrementalArr","incrementalGrossProfit","monthlyProgramCost","monthlyNetImpact","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["targetedAccounts","breakEvenUplift","paybackMonths","cumulativeNet"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      const rates=[v.baselineRenewal,v.upliftPp,v.grossMargin,v.saveDiscount,v.coverageRate];
      if(rates.some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("e_rate");
      if(v.baselineRenewal+v.upliftPp>100) return t("e_renewal");
      if(!Number.isFinite(v.months)||v.months<1) return t("e_months");
      return "";
    }

    function render(){
      const v={contracts:Number(refs.contracts.value),baselineRenewal:Number(refs.baselineRenewal.value),upliftPp:Number(refs.upliftPp.value),avgArr:Number(refs.avgArr.value),grossMargin:Number(refs.grossMargin.value),saveDiscount:Number(refs.saveDiscount.value),coverageRate:Number(refs.coverageRate.value),touchCost:Number(refs.touchCost.value),monthlyToolCost:Number(refs.monthlyToolCost.value),setupCost:Number(refs.setupCost.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["additionalRenewals","incrementalArr","incrementalGrossProfit","monthlyProgramCost","monthlyNetImpact","roi","targetedAccounts","breakEvenUplift","paybackMonths","cumulativeNet"].forEach((k)=>refs[k].textContent="-");refs.status.textContent=t("invalid");refs.summary.value="";return;}

      const additionalRenewals=v.contracts*(v.upliftPp/100);
      const incrementalArr=additionalRenewals*v.avgArr;
      const netArrAfterDiscount=incrementalArr*(1-v.saveDiscount/100);
      const incrementalGrossProfit=netArrAfterDiscount*(v.grossMargin/100);

      const targetedAccounts=v.contracts*(v.coverageRate/100);
      const monthlyProgramCost=targetedAccounts*v.touchCost+v.monthlyToolCost;
      const monthlyNetImpact=incrementalGrossProfit-monthlyProgramCost;

      const cumulativeNet=monthlyNetImpact*v.months-v.setupCost;
      const roiBase=v.setupCost>0?v.setupCost:(monthlyProgramCost*v.months||1);
      const roi=cumulativeNet/roiBase;

      const perPointProfit=v.contracts*v.avgArr*(1-v.saveDiscount/100)*(v.grossMargin/100)/100;
      const breakEvenUplift=perPointProfit>0?Math.max(0,monthlyProgramCost/perPointProfit):NaN;
      const paybackMonths=(v.setupCost>0&&monthlyNetImpact>0)?(v.setupCost/monthlyNetImpact):NaN;

      refs.additionalRenewals.textContent=`${num(additionalRenewals,2)} accts`;
      refs.incrementalArr.textContent=won(incrementalArr);
      refs.incrementalGrossProfit.textContent=won(incrementalGrossProfit);
      refs.monthlyProgramCost.textContent=won(monthlyProgramCost);
      refs.monthlyNetImpact.textContent=won(monthlyNetImpact);
      refs.roi.textContent=`${num(roi*100,1)}%`;
      refs.targetedAccounts.textContent=`${num(targetedAccounts,2)} accts`;
      refs.breakEvenUplift.textContent=Number.isFinite(breakEvenUplift)?`${num(breakEvenUplift,3)}%p`:"N/A";
      refs.paybackMonths.textContent=Number.isFinite(paybackMonths)?`${num(paybackMonths,2)} mo`:"N/A";
      refs.cumulativeNet.textContent=won(cumulativeNet);
      refs.status.innerHTML=monthlyNetImpact>=0?`<span class="good">●</span> ${t("good")}`:`<span class="bad">●</span> ${t("bad")}`;

      refs.summary.value=[
        t("summaryTitle"),
        `${t("k_additionalRenewals")}: ${num(additionalRenewals,2)}`,
        `${t("k_incrementalArr")}: ${won(incrementalArr)}`,
        `${t("k_incrementalGrossProfit")}: ${won(incrementalGrossProfit)}`,
        `${t("k_monthlyProgramCost")}: ${won(monthlyProgramCost)}`,
        `${t("k_monthlyNetImpact")}: ${won(monthlyNetImpact)}`,
        `${t("d_breakEvenUplift")}: ${Number.isFinite(breakEvenUplift)?`${num(breakEvenUplift,3)}%p`:"N/A"}`,
        `${t("d_cumulativeNet")} (${num(v.months,0)}m): ${won(cumulativeNet)}`,
        `${t("k_roi")}: ${num(roi*100,1)}%`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.contracts,refs.baselineRenewal,refs.upliftPp,refs.avgArr,refs.grossMargin,refs.saveDiscount,refs.coverageRate,refs.touchCost,refs.monthlyToolCost,refs.setupCost,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n();
    render();
  </script>
</body>
</html>
