<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>혈중알코올농도(BAC) 계산기 | 웹 도구 모음</title>
    <meta name="description" content="체중, 성별, 음주량을 입력하면 혈중알코올농도(BAC)와 예상 분해 시간을 계산합니다.">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent-solid: #f5576c;
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
            --input-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #121212;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #444;
            --shadow: rgba(0, 0, 0, 0.3);
            --card-bg: #2d2d2d;
            --input-bg: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn { text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .back-btn:hover { color: var(--text-primary); }
        .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.5rem; }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; color: var(--text-secondary); }
        input[type="number"], select {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent-solid); }
        .gender-group { display: flex; gap: 12px; }
        .gender-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s;
        }
        .gender-btn.active {
            border-color: var(--accent-solid);
            background: var(--accent-solid);
            color: #fff;
        }
        .drink-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .drink-row select { flex: 2; }
        .drink-row input { flex: 1; }
        .drink-row .remove-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 1.3rem; cursor: pointer; padding: 0 5px;
        }
        .add-drink-btn {
            background: none;
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .add-drink-btn:hover { border-color: var(--accent-solid); color: var(--accent-solid); }
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3); }
        .result { display: none; }
        .result.show { display: block; }
        .bac-display {
            text-align: center;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .bac-value { font-size: 3rem; font-weight: 800; }
        .bac-unit { font-size: 1rem; color: var(--text-secondary); }
        .bac-status { font-size: 1.1rem; font-weight: 700; margin-top: 8px; }
        .level-safe { background: #d4edda; color: #155724; }
        .level-low { background: #fff3cd; color: #856404; }
        .level-mid { background: #ffe0b2; color: #e65100; }
        .level-high { background: #f8d7da; color: #721c24; }
        .level-danger { background: #f5c6cb; color: #721c24; }
        [data-theme="dark"] .level-safe { background: #1b4332; color: #95d5b2; }
        [data-theme="dark"] .level-low { background: #5c4813; color: #ffd166; }
        [data-theme="dark"] .level-mid { background: #5c3a13; color: #ffb74d; }
        [data-theme="dark"] .level-high { background: #5c1313; color: #ef9a9a; }
        [data-theme="dark"] .level-danger { background: #5c1313; color: #ef9a9a; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .detail-item { text-align: center; padding: 15px; background: var(--bg-secondary); border-radius: 12px; }
        .detail-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; }
        .detail-value { font-size: 1.3rem; font-weight: 700; }
        .timeline { margin-top: 15px; }
        .timeline-bar {
            height: 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            overflow: hidden;
            margin: 10px 0;
        }
        .timeline-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 6px;
            transition: width 1s ease;
        }
        .warning {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 15px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 15px;
            line-height: 1.7;
        }
        .warning strong { color: var(--accent-solid); }
        @media (max-width: 480px) {
            .detail-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.4rem; }
            .bac-value { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-btn">← 도구 목록</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </header>

        <div class="card">
            <h1>🍺 혈중알코올농도(BAC) 계산기</h1>

            <div class="input-group">
                <label>성별</label>
                <div class="gender-group">
                    <button class="gender-btn active" onclick="setGender('male', this)">🙋‍♂️ 남성</button>
                    <button class="gender-btn" onclick="setGender('female', this)">🙋‍♀️ 여성</button>
                </div>
            </div>

            <div class="input-group">
                <label>체중 (kg)</label>
                <input type="number" id="weight" placeholder="예: 70" min="30" max="200" value="70">
            </div>

            <div class="input-group">
                <label>음주 시간 (시간 전부터 마시기 시작)</label>
                <input type="number" id="hours" placeholder="예: 2" min="0" max="24" step="0.5" value="1">
            </div>

            <div class="input-group">
                <label>마신 음료</label>
                <div id="drinks">
                    <div class="drink-row">
                        <select>
                            <option value="soju">소주 (17%)</option>
                            <option value="beer">맥주 (5%)</option>
                            <option value="wine">와인 (13%)</option>
                            <option value="makgeolli">막걸리 (6%)</option>
                            <option value="whiskey">위스키 (40%)</option>
                            <option value="highball">하이볼 (8%)</option>
                            <option value="custom">직접 입력</option>
                        </select>
                        <input type="number" placeholder="잔" min="0" max="50" value="3">
                        <button class="remove-btn" onclick="removeDrink(this)" title="삭제">×</button>
                    </div>
                </div>
                <button class="add-drink-btn" onclick="addDrink()">+ 음료 추가</button>
            </div>

            <button class="calc-btn" onclick="calculate()">BAC 계산하기</button>
        </div>

        <div class="card result" id="result">
            <div class="bac-display" id="bacDisplay">
                <div class="bac-value" id="bacValue">0.000</div>
                <div class="bac-unit">% BAC</div>
                <div class="bac-status" id="bacStatus"></div>
            </div>

            <div class="detail-grid">
                <div class="detail-item">
                    <div class="detail-label">총 알코올 섭취량</div>
                    <div class="detail-value" id="totalAlcohol">0g</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">예상 분해 시간</div>
                    <div class="detail-value" id="soberTime">0시간</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">예상 해소 시각</div>
                    <div class="detail-value" id="soberClock">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">운전 가능 여부</div>
                    <div class="detail-value" id="driveStatus">-</div>
                </div>
            </div>

            <div class="timeline">
                <label>분해 진행률</label>
                <div class="timeline-bar">
                    <div class="timeline-fill" id="timelineFill" style="width: 0%"></div>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-secondary)">
                    <span>현재</span>
                    <span id="timelineEnd">완전 분해</span>
                </div>
            </div>

            <div class="warning">
                <strong>⚠️ 주의:</strong> 이 계산기는 Widmark 공식 기반의 추정값입니다. 개인의 체질, 음식 섭취, 건강 상태 등에 따라 실제 BAC는 다를 수 있습니다. <strong>음주 후 절대 운전하지 마세요.</strong><br>
                🇰🇷 한국 기준: BAC 0.03% 이상 → 음주운전 (면허정지), 0.08% 이상 → 면허취소
            </div>
        </div>
    </div>

    <script>
        let gender = 'male';

        const drinkInfo = {
            soju: { abv: 0.17, mlPerGlass: 50 },
            beer: { abv: 0.05, mlPerGlass: 355 },
            wine: { abv: 0.13, mlPerGlass: 150 },
            makgeolli: { abv: 0.06, mlPerGlass: 300 },
            whiskey: { abv: 0.40, mlPerGlass: 45 },
            highball: { abv: 0.08, mlPerGlass: 355 },
            custom: { abv: 0.05, mlPerGlass: 100 }
        };

        function setGender(g, btn) {
            gender = g;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function addDrink() {
            const row = document.createElement('div');
            row.className = 'drink-row';
            row.innerHTML = `
                <select>
                    <option value="soju">소주 (17%)</option>
                    <option value="beer">맥주 (5%)</option>
                    <option value="wine">와인 (13%)</option>
                    <option value="makgeolli">막걸리 (6%)</option>
                    <option value="whiskey">위스키 (40%)</option>
                    <option value="highball">하이볼 (8%)</option>
                    <option value="custom">직접 입력</option>
                </select>
                <input type="number" placeholder="잔" min="0" max="50" value="1">
                <button class="remove-btn" onclick="removeDrink(this)" title="삭제">×</button>
            `;
            document.getElementById('drinks').appendChild(row);
        }

        function removeDrink(btn) {
            const rows = document.querySelectorAll('.drink-row');
            if (rows.length > 1) btn.parentElement.remove();
        }

        function calculate() {
            const weight = parseFloat(document.getElementById('weight').value) || 70;
            const hours = parseFloat(document.getElementById('hours').value) || 0;
            const rows = document.querySelectorAll('.drink-row');

            // Widmark r factor
            const r = gender === 'male' ? 0.68 : 0.55;
            const metabolismRate = 0.015; // BAC per hour

            let totalAlcoholGrams = 0;
            rows.forEach(row => {
                const type = row.querySelector('select').value;
                const glasses = parseFloat(row.querySelector('input').value) || 0;
                const info = drinkInfo[type];
                const alcoholMl = info.mlPerGlass * info.abv * glasses;
                totalAlcoholGrams += alcoholMl * 0.789; // density of ethanol
            });

            // Widmark formula: BAC = (alcohol in grams / (body weight in grams * r)) * 100 - metabolism
            const rawBAC = (totalAlcoholGrams / (weight * 1000 * r)) * 100;
            const metabolized = metabolismRate * hours;
            const currentBAC = Math.max(0, rawBAC - metabolized);

            // Time to sober
            const hoursToSober = currentBAC > 0 ? currentBAC / metabolismRate : 0;
            const soberDate = new Date(Date.now() + hoursToSober * 3600000);

            // Display
            const bacEl = document.getElementById('bacValue');
            bacEl.textContent = currentBAC.toFixed(3);

            const display = document.getElementById('bacDisplay');
            display.className = 'bac-display';
            const statusEl = document.getElementById('bacStatus');

            if (currentBAC <= 0) {
                display.classList.add('level-safe');
                statusEl.textContent = '✅ 알코올이 감지되지 않습니다';
            } else if (currentBAC < 0.03) {
                display.classList.add('level-safe');
                statusEl.textContent = '✅ 법적 기준 이하 (그래도 주의!)';
            } else if (currentBAC < 0.08) {
                display.classList.add('level-low');
                statusEl.textContent = '⚠️ 면허정지 수준 (0.03% 이상)';
            } else if (currentBAC < 0.2) {
                display.classList.add('level-mid');
                statusEl.textContent = '🚫 면허취소 수준 (0.08% 이상)';
            } else if (currentBAC < 0.3) {
                display.classList.add('level-high');
                statusEl.textContent = '🆘 매우 위험! 의료 조치 필요 가능';
            } else {
                display.classList.add('level-danger');
                statusEl.textContent = '💀 생명 위험 수준!';
            }

            document.getElementById('totalAlcohol').textContent = totalAlcoholGrams.toFixed(1) + 'g';

            const h = Math.floor(hoursToSober);
            const m = Math.round((hoursToSober - h) * 60);
            document.getElementById('soberTime').textContent = h > 0 ? `${h}시간 ${m}분` : `${m}분`;

            document.getElementById('soberClock').textContent = hoursToSober > 0
                ? soberDate.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
                : '지금 가능';

            const driveOk = currentBAC < 0.03;
            document.getElementById('driveStatus').textContent = driveOk ? '🟢 가능' : '🔴 불가';
            document.getElementById('driveStatus').style.color = driveOk ? '#28a745' : '#dc3545';

            // Timeline
            const elapsed = hours;
            const total = hours + hoursToSober;
            const pct = total > 0 ? Math.min(100, (elapsed / total) * 100) : 100;
            document.getElementById('timelineFill').style.width = pct + '%';
            document.getElementById('timelineEnd').textContent = hoursToSober > 0 ? `${h}시간 ${m}분 후` : '완료';

            document.getElementById('result').classList.add('show');
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        // Init theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
    </script>
</body>
</html>
