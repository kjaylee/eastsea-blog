<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Base64 Encoder/Decoder</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #111831;
      --panel-2: #1a2342;
      --text: #eaf0ff;
      --muted: #9aa7cc;
      --accent: #7c9bff;
      --ok: #35d399;
      --err: #fb7185;
      --border: #2a3563;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 800px at 10% -20%, #213165 0%, transparent 60%),
                  radial-gradient(900px 700px at 90% 120%, #2a1e52 0%, transparent 60%),
                  var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .app {
      width: min(980px, 100%);
      background: linear-gradient(160deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    h1 { margin: 6px 0 4px; font-size: clamp(1.2rem, 2.4vw, 1.8rem); }
    .sub { margin: 0 0 16px; color: var(--muted); font-size: .95rem; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    button, .chip {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { background: var(--panel-2); }
    button.primary { background: linear-gradient(90deg, #6487ff, #8f7bff); border: none; }
    button.primary:hover { filter: brightness(1.08); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    textarea {
      width: 100%;
      min-height: 230px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0a1024;
      color: var(--text);
      padding: 12px;
      line-height: 1.5;
      font: 500 .94rem/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .label {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; color: var(--muted); font-size: .88rem;
    }
    .status { margin-top: 10px; min-height: 20px; color: var(--muted); font-size: .9rem; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    .toggles { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-left: auto; }
    .toggles label { display: flex; gap: 7px; align-items: center; color: var(--muted); font-size: .9rem; }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      textarea { min-height: 180px; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="app">
    <h1>Base64 Encoder / Decoder</h1>
    <p class="sub">Encode plain text to Base64 or decode Base64 back to readable text. Works fully in your browser.</p>

    <div class="toolbar">
      <button id="encodeBtn" class="primary">Encode →</button>
      <button id="decodeBtn">← Decode</button>
      <button id="swapBtn">Swap</button>
      <button id="copyBtn">Copy Output</button>
      <button id="clearBtn">Clear</button>
      <div class="toggles">
        <label><input type="checkbox" id="urlSafe" /> URL-safe mode</label>
        <label><input type="checkbox" id="trimSpace" checked /> Trim whitespace on decode</label>
      </div>
    </div>

    <section class="grid">
      <div>
        <div class="label"><span>Input</span><span id="inCount">0 chars</span></div>
        <textarea id="input" placeholder="Type text or Base64 here..."></textarea>
      </div>
      <div>
        <div class="label"><span>Output</span><span id="outCount">0 chars</span></div>
        <textarea id="output" placeholder="Result appears here..." readonly></textarea>
      </div>
    </section>
    <p id="status" class="status">Ready.</p>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const input = $('input');
    const output = $('output');
    const statusEl = $('status');
    const inCount = $('inCount');
    const outCount = $('outCount');

    const utf8ToB64 = str => btoa(unescape(encodeURIComponent(str)));
    const b64ToUtf8 = b64 => decodeURIComponent(escape(atob(b64)));

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = `status ${type}`.trim();
    }

    function updateCounts() {
      inCount.textContent = `${input.value.length} chars`;
      outCount.textContent = `${output.value.length} chars`;
    }

    function normalizeBase64(v) {
      let value = $('trimSpace').checked ? v.replace(/\s+/g, '') : v;
      if ($('urlSafe').checked) {
        value = value.replace(/-/g, '+').replace(/_/g, '/');
      }
      while (value.length % 4 !== 0) value += '=';
      return value;
    }

    function toUrlSafe(v) {
      return v.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function encode() {
      try {
        let result = utf8ToB64(input.value);
        if ($('urlSafe').checked) result = toUrlSafe(result);
        output.value = result;
        setStatus('Encoded successfully.', 'ok');
      } catch {
        output.value = '';
        setStatus('Could not encode input.', 'err');
      }
      updateCounts();
    }

    function decode() {
      try {
        const normalized = normalizeBase64(input.value);
        output.value = b64ToUtf8(normalized);
        setStatus('Decoded successfully.', 'ok');
      } catch {
        output.value = '';
        setStatus('Invalid Base64 input.', 'err');
      }
      updateCounts();
    }

    $('encodeBtn').addEventListener('click', encode);
    $('decodeBtn').addEventListener('click', decode);
    $('swapBtn').addEventListener('click', () => {
      [input.value, output.value] = [output.value, input.value];
      setStatus('Input/output swapped.');
      updateCounts();
    });
    $('clearBtn').addEventListener('click', () => {
      input.value = '';
      output.value = '';
      setStatus('Cleared.');
      updateCounts();
    });
    $('copyBtn').addEventListener('click', async () => {
      if (!output.value) return setStatus('Nothing to copy.', 'err');
      try {
        await navigator.clipboard.writeText(output.value);
        setStatus('Output copied to clipboard.', 'ok');
      } catch {
        setStatus('Clipboard unavailable.', 'err');
      }
    });

    input.addEventListener('input', updateCounts);
    updateCounts();
  </script>
</body>
</html>
