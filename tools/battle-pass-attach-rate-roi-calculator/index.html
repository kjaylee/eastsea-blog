<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Pass Attach Rate ROI Calculator | 배틀패스 부착률 ROI 계산기</title>
  <meta name="description" content="배틀패스 부착률 개선 시 순증 구매자, 월 순효과, ROI, 회수기간, 손익분기 부착률을 계산합니다." />
  <meta name="keywords" content="battle pass, attach rate, roi, monetization, mobile game, revenue" />
  <link rel="canonical" href="https://eastsea.monster/tools/battle-pass-attach-rate-roi-calculator/" />
  <style>
    :root {
      --bg: #0a1222;
      --panel: #131f36;
      --soft: #1b2b4d;
      --line: #2c3f69;
      --text: #edf3ff;
      --muted: #9fb1d6;
      --accent: #7aa7ff;
      --accent-2: #4c6fff;
      --good: #37d59d;
      --warn: #f7c46b;
      --bad: #ff7b7b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 15% 0%, #1b3567 0%, var(--bg) 58%);
      color: var(--text);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 14px 48px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.7vw, 1.9rem);
      letter-spacing: -0.01em;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
      max-width: 72ch;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .link {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 0.86rem;
      text-decoration: none;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 12px;
    }
    .card {
      background: linear-gradient(170deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      min-width: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 5px;
    }
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--soft);
      color: var(--text);
      padding: 9px 10px;
      font-size: 0.92rem;
    }
    .btns {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.86rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b1428;
      cursor: pointer;
    }
    button.soft {
      background: rgba(122, 167, 255, 0.18);
      color: var(--text);
      border: 1px solid #385082;
    }
    .error {
      margin-top: 10px;
      min-height: 1.1em;
      color: var(--bad);
      font-size: 0.83rem;
      display: none;
    }
    .error.show { display: block; }
    textarea {
      margin-top: 9px;
      min-height: 130px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.8rem;
      line-height: 1.4;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .kpi {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      padding: 8px;
    }
    .k {
      color: var(--muted);
      font-size: 0.74rem;
    }
    .v {
      margin-top: 5px;
      font-size: 1.02rem;
      font-weight: 650;
      word-break: break-word;
    }
    .status {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.86rem;
    }
    .dot.good { color: var(--good); }
    .dot.warn { color: var(--warn); }
    .dot.bad { color: var(--bad); }
    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 0.86rem;
    }
    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: right;
      word-break: break-word;
    }
    th:first-child,
    td:first-child { text-align: left; }
    @media (max-width: 940px) {
      .grid { grid-template-columns: 1fr; }
      .inputs { grid-template-columns: 1fr; }
      .top { flex-direction: column; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🎮 배틀패스 부착률 ROI 계산기</h1>
        <div class="sub">배틀패스 부착률 개선이 실제로 이익인지 빠르게 판단하세요. 순증 구매자와 리텐션 가치까지 반영해 월 순효과·ROI·회수기간·손익분기 부착률을 계산합니다.</div>
      </div>
      <div class="actions">
        <a class="link" href="/tools/">도구 목록</a>
        <a class="link" href="/">포털</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="eligibleMau">배틀패스 대상 MAU</label><input id="eligibleMau" type="number" min="1" step="1" value="250000" /></div>
          <div><label for="currentAttachRate">현재 부착률 (%)</label><input id="currentAttachRate" type="number" min="0" max="100" step="0.1" value="4.5" /></div>
          <div><label for="targetAttachRate">목표 부착률 (%)</label><input id="targetAttachRate" type="number" min="0" max="100" step="0.1" value="6.5" /></div>
          <div><label for="battlePassPrice">배틀패스 가격 (₩)</label><input id="battlePassPrice" type="number" min="0" step="100" value="12000" /></div>
          <div><label for="platformFeePct">플랫폼 수수료 (%)</label><input id="platformFeePct" type="number" min="0" max="60" step="0.1" value="30" /></div>
          <div><label for="rewardCostPerBuyer">구매자당 보상/운영 원가 (₩)</label><input id="rewardCostPerBuyer" type="number" min="0" step="100" value="1800" /></div>
          <div><label for="retentionLiftPct">리텐션 개선폭 (pp)</label><input id="retentionLiftPct" type="number" min="0" max="100" step="0.01" value="0.35" /></div>
          <div><label for="profitPerRetainedUser">잔존 유저 1인당 월 공헌이익 (₩)</label><input id="profitPerRetainedUser" type="number" min="0" step="100" value="3200" /></div>
          <div><label for="monthlyOpsCost">월 운영비 (₩)</label><input id="monthlyOpsCost" type="number" min="0" step="10000" value="2500000" /></div>
          <div><label for="setupCost">초기 구축비 (₩)</label><input id="setupCost" type="number" min="0" step="10000" value="15000000" /></div>
          <div><label for="analysisMonths">분석 기간 (개월)</label><input id="analysisMonths" type="number" min="1" step="1" value="12" /></div>
          <div><label for="targetPaybackMonths">목표 회수기간 (개월)</label><input id="targetPaybackMonths" type="number" min="1" step="1" value="8" /></div>
        </div>

        <div class="btns">
          <button id="copyBtn" class="soft" type="button">요약 복사</button>
          <button id="resetBtn" type="button">기본값 복원</button>
        </div>

        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">순증 구매자</div><div class="v" id="incrementalBuyers">-</div></div>
          <div class="kpi"><div class="k">구매자당 순이익</div><div class="v" id="netPerBuyer">-</div></div>
          <div class="kpi"><div class="k">월 리텐션 가치</div><div class="v" id="monthlyRetentionValue">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div class="v" id="monthlyNetLift">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div class="v" id="roiPct">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div class="v" id="paybackMonths">-</div></div>
          <div class="kpi"><div class="k">손익분기 부착률</div><div class="v" id="breakEvenTargetAttachRate">-</div></div>
        </div>

        <div id="status" class="status">계산 대기</div>

        <h2 style="margin-top: 12px;">세부 지표</h2>
        <table>
          <tbody>
            <tr><th>순증 매출</th><td id="incrementalGrossRevenue">-</td></tr>
            <tr><th>플랫폼 수수료</th><td id="platformFees">-</td></tr>
            <tr><th>보상/운영 원가</th><td id="rewardCostTotal">-</td></tr>
            <tr><th>구매자 순이익</th><td id="buyerNetProfit">-</td></tr>
            <tr><th>기간 순효과</th><td id="periodNetBenefit">-</td></tr>
            <tr><th>기간 총 투자비</th><td id="totalInvestment">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script type="module" src="./app.mjs"></script>
</body>
</html>
