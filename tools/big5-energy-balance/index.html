                mainCanvas.style.position = 'fixed';
                mainCanvas.style.inset = '0';
                mainCanvas.style.zIndex = '0';
                mainCanvas.style.opacity = '.34';
                mainCanvas.style.pointerEvents = 'none';
              }
              cameraPos = vec2(16, 9);
              cameraScale = 42;
              clickSfx = new Sound([.7,,250,.01,.03,.08,1,1.4,,,,,,.05,.35,.2,.03]);
              new ParticleEmitter(
                vec2(16,9), 0, 22, 0, 32, Math.PI,
                tile(0,16),
                rgb(.32,.48,.42), rgb(.84,.62,.43),
                rgb(.32,.48,.42,0), rgb(.84,.62,.43,0),
                1.2, .12, .03, .05, .26,
                .99, 1, .2, Math.PI, .08,
                .28, 0, 1, 1, 0
              );
            },
            () => {},
            () => {},
            () => {
              const tt = typeof time === 'number' ? time : 0;
              for (let i=0; i<8; i++) {
                const y = 2 + i * 2.1;
                const wob = Math.sin(tt*.44 + i*.7) * 3.2;
                drawRect(vec2(16 + wob, y), vec2(34, .1), rgb(.21,.33,.3,.08));
                drawTile(vec2(4 + i*3.5 + wob*.05, y + .42), vec2(.26,.26), tile(0,16), rgb(.76,.6,.47,.22), tt+i);
              }
            },
            () => {}
          );
        } catch (err) {
          console.warn('LittleJS init failed:', err && err.message ? err.message : err);
        }
      }

      function pulseFx() {
        try { clickSfx && clickSfx.play && clickSfx.play(.35); } catch (_) {}
        try {
          if (typeof window.ParticleEmitter === 'function') {
            new ParticleEmitter(
              vec2(16 + (Math.random()-0.5)*2.8, 9 + (Math.random()-0.5)*1.6),
              0, 0, 0, 22, Math.PI,
              tile(0,16),
              rgb(.72,.56,.39), rgb(.4,.56,.48),
              rgb(.72,.56,.39,0), rgb(.4,.56,.48,0),
              .46, .09, .02, .03, .12,
              .96, 1, .22, Math.PI, .06,
              .22, 0, 1, 1, 0
            );
          }
        } catch (_) {}
      }

      function resetState() {
        state.screen = 'intro';
        state.idx = 0;
        state.answers = [];
        state.score = { O: 50, C: 50, E: 50, A: 50, N: 50, charge: 0, drain: 0 };
        state.result = null;
      }

      function startQuiz() {
        impact('medium'); pulseFx();
        state.screen = 'question';
        state.idx = 0;
        state.answers = [];
        state.score = { O: 50, C: 50, E: 50, A: 50, N: 50, charge: 0, drain: 0 };
        render();
      }

      function toggleLang() {
        state.lang = state.lang === 'ko' ? 'en' : 'ko';
        render();
      }

      function pickOption(optionIndex) {
        impact('light'); pulseFx();
        const q = QUESTIONS[state.idx];
        const opt = q.options[optionIndex];
        AXES.forEach(axis => {
          state.score[axis] = clamp(state.score[axis] + (opt.s[axis] || 0), 0, 100);
        });
        if ((opt.flux || 0) >= 0) state.score.charge += opt.flux || 0;
        else state.score.drain += Math.abs(opt.flux || 0);

        state.answers.push({ qid: q.id, optionIndex });

        if (state.idx < QUESTIONS.length - 1) {
          state.idx += 1;
          render();
          return;
        }
        state.screen = 'analyzing';
        render();
        runAnalyzeAnimation();
      }

      function runAnalyzeAnimation() {
        const mini = document.querySelector('.mini i');
        const txt = document.querySelector('.mini-txt');
        if (!mini || !txt) return;
        let p = 0;
        const lines = state.lang === 'ko'
          ? ['성향 축 정규화 중...', '에너지 플럭스 계산 중...', '유형 매칭 최적화 중...']
          : ['Normalizing trait axes...', 'Computing energy flux...', 'Optimizing type match...'];
        const it = setInterval(() => {
          p = Math.min(100, p + Math.random() * 17 + 8);
          mini.style.width = p + '%';
          txt.textContent = lines[Math.min(lines.length - 1, Math.floor(p / 34))];
        }, 170);
        setTimeout(() => {
          clearInterval(it);
          state.result = calculateResult();
          saveResult(state.result);
          state.screen = 'result';
          render();
        }, 1850);
      }

      function calculateResult() {
        const traits = {
          O: clamp(Math.round(state.score.O), 0, 100),
          C: clamp(Math.round(state.score.C), 0, 100),
          E: clamp(Math.round(state.score.E), 0, 100),
          A: clamp(Math.round(state.score.A), 0, 100),
          N: clamp(Math.round(state.score.N), 0, 100)
        };
        const energy = clamp(Math.round(50 + (state.score.charge - state.score.drain) * 4), 0, 100);
        const vector = { ...traits, EN: energy };

        const axisWeight = { O:1.02, C:1.08, E:1.05, A:1.04, N:1.08, EN:1.12 };
        let bestKey = null;
        let bestDist = Infinity;

        Object.entries(ARCHETYPES).forEach(([key, target]) => {
          let dist = 0;
          Object.keys(axisWeight).forEach(axis => {
            const d = (vector[axis] - target[axis]);
            dist += (d*d) * axisWeight[axis];
          });
          if (dist < bestDist) {
            bestDist = dist;
            bestKey = key;
          }
        });

        return {
          key: bestKey,
          traits,
          energy,
          confidence: clamp(Math.round(100 - Math.sqrt(bestDist) * 1.3), 52, 97),
          timestamp: Date.now()
        };
      }

      function scoreChipText(result) {
        return `${state.lang === 'ko' ? '적합도' : 'Fit'} ${result.confidence}%`;
      }

      function saveResult(result) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(result));
          const arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
          arr.unshift(result);
          localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, 12)));
        } catch (_) {}
      }

      function loadResult() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        } catch (_) { return null; }
      }

      function formatDate(ts) {
        try {
          return new Date(ts).toLocaleDateString(state.lang === 'ko' ? 'ko-KR' : 'en-US', { month:'short', day:'numeric' });
        } catch (_) { return ''; }
      }

      function shareText() {
        const r = state.result;
        if (!r) return '';
        const meta = RESULTS[r.key];
        const name = state.lang === 'ko' ? meta.ko : meta.en;
        return `${tr('sharePrefix')} "${name}" · ${location.href}`;
      }

      async function copyLink(withToast=true) {
        const payload = shareText();
        try {
          await navigator.clipboard.writeText(payload);
          withToast && showToast(tr('copied'));
        } catch (_) {
          const ta = document.createElement('textarea');
          ta.value = payload;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          withToast && showToast(tr('copied'));
        }
      }

      async function shareKakao() {
        impact('light'); pulseFx();
        const text = shareText();
        try {
          const u = 'https://story.kakao.com/share?url=' + encodeURIComponent(location.href) + '&text=' + encodeURIComponent(text);
          const opened = window.open(u, '_blank', 'noopener,noreferrer');
          if (!opened) throw new Error('blocked');
        } catch (_) {
          await copyLink(false);
          showToast(tr('kakaoFallback'));
        }
      }

      function shareX() {
        impact('light'); pulseFx();
        const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText());
        window.open(url, '_blank', 'noopener,noreferrer');
      }

      async function shareLink() {
        impact('light'); pulseFx();
        await copyLink(true);
        try {
          if (tg && tg.openTelegramLink) {
            const text = encodeURIComponent(shareText());
            tg.openTelegramLink('https://t.me/share/url?url=' + encodeURIComponent(location.href) + '&text=' + text);
          }
        } catch (_) {}
      }

      function drawResultChart() {
        const c = document.getElementById('resultChart');
        if (!c || !state.result) return;
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const rect = c.getBoundingClientRect();
        c.width = Math.floor(rect.width * dpr);
        c.height = Math.floor(rect.height * dpr);
        const ctx = c.getContext('2d');
        ctx.scale(dpr, dpr);

        const w = rect.width;
        const h = rect.height;
        const cx = w * 0.5;
        const cy = h * 0.53;
        const radius = Math.min(w, h) * 0.32;
        const axes = ['O','C','E','A','N','EN'];
        const vals = [state.result.traits.O, state.result.traits.C, state.result.traits.E, state.result.traits.A, state.result.traits.N, state.result.energy];

        ctx.clearRect(0,0,w,h);

        ctx.strokeStyle = 'rgba(82,104,92,.28)';
        ctx.lineWidth = 1;
        for (let ring=1; ring<=4; ring++) {
          ctx.beginPath();
          axes.forEach((_, i) => {
            const a = -Math.PI/2 + (Math.PI*2/axes.length)*i;
            const rr = radius * (ring/4);
            const x = cx + Math.cos(a)*rr;
            const y = cy + Math.sin(a)*rr;
            if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
          });
          ctx.closePath();
          ctx.stroke();
        }

        axes.forEach((axis, i) => {
          const a = -Math.PI/2 + (Math.PI*2/axes.length)*i;
          const x = cx + Math.cos(a)*radius;
          const y = cy + Math.sin(a)*radius;
          ctx.beginPath();
          ctx.moveTo(cx,cy);
          ctx.lineTo(x,y);
          ctx.strokeStyle = 'rgba(90,112,100,.25)';
          ctx.stroke();

          ctx.fillStyle = '#3b5048';
          ctx.font = '12px system-ui, -apple-system, Segoe UI';
          const lx = cx + Math.cos(a)*(radius+16);
          const ly = cy + Math.sin(a)*(radius+16);
          const label = AXIS_LABEL[state.lang][axis] || axis;
          ctx.fillText(label, lx - ctx.measureText(label).width/2, ly + 4);
        });

        ctx.beginPath();
        vals.forEach((v, i) => {
          const a = -Math.PI/2 + (Math.PI*2/axes.length)*i;
          const rr = radius * (clamp(v,0,100)/100);
          const x = cx + Math.cos(a)*rr;
          const y = cy + Math.sin(a)*rr;
          if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        });
        ctx.closePath();
        ctx.fillStyle = 'rgba(184,115,82,.33)';
        ctx.strokeStyle = 'rgba(118,73,53,.78)';
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();

        vals.forEach((v, i) => {
          const a = -Math.PI/2 + (Math.PI*2/axes.length)*i;
          const rr = radius * (clamp(v,0,100)/100);
          const x = cx + Math.cos(a)*rr;
          const y = cy + Math.sin(a)*rr;
          ctx.beginPath();
          ctx.arc(x,y,3.8,0,Math.PI*2);
          ctx.fillStyle = '#375b4f';
          ctx.fill();
        });
      }

      function introScreen() {
        const last = loadResult();
        const lastMeta = last && RESULTS[last.key] ? RESULTS[last.key] : null;
        return `
          <section class="glass in">
            <div class="pad">
              <div class="topbar">
                <span class="tag">${esc(tr('badge'))}</span>
                <button class="lang" id="langBtn">${esc(tr('langBtn'))}</button>
              </div>
              <div class="hero">
                <h1>${esc(tr('title'))}</h1>
                <p class="lead">${esc(tr('lead'))}</p>
                <div class="chips">${I18N[state.lang].chips.map(ch => `<span class="chip">${esc(ch)}</span>`).join('')}</div>
              </div>
              ${lastMeta ? `
                <div class="saved">${esc(tr('savedPrefix'))}: ${esc(state.lang==='ko'?lastMeta.ko:lastMeta.en)} · ${formatDate(last.timestamp)} · ${scoreChipText(last)}</div>
              ` : ''}
              <button class="btn main" id="startBtn">${esc(tr('start'))}</button>
            </div>
          </section>
        `;
      }

      function questionScreen() {
        const q = QUESTIONS[state.idx];
        const percent = Math.round(((state.idx+1)/QUESTIONS.length)*100);
        return `
          <div class="progress-wrap show in">
            <div class="track"><i style="width:${percent}%"></i></div>
            <div class="plabel">${state.idx+1}/${QUESTIONS.length} ${esc(tr('progressUnit'))}</div>
          </div>
          <section class="glass in">
            <div class="pad">
              <h2 class="q-title">${esc(qText(q, state.lang))}</h2>
              <p class="q-guide">${esc(tr('qGuide'))}</p>
              <div class="choices">
                ${q.options.map((op, idx) => `<button class="choice" data-opt="${idx}">${esc(oText(op, state.lang))}</button>`).join('')}
              </div>
            </div>
          </section>
        `;
      }

      function analyzingScreen() {
        return `
          <div class="progress-wrap show in">
            <div class="track"><i style="width:100%"></i></div>
            <div class="plabel">${QUESTIONS.length}/${QUESTIONS.length} ${esc(tr('progressUnit'))}</div>
          </div>
          <section class="glass in">
            <div class="pad analyzing">
              <div class="orb" aria-hidden="true"></div>
              <h2>${esc(tr('analyzing'))}</h2>
              <p class="q-guide" style="margin-top:8px">${esc(tr('analyzingSub'))}</p>
              <div class="mini"><i></i></div>
              <p class="mini-txt">${state.lang === 'ko' ? '시작 중...' : 'Booting...'}</p>
            </div>
          </section>
        `;
      }

      function resultScreen() {
        const r = state.result;
        const meta = RESULTS[r.key];
        const title = state.lang === 'ko' ? meta.ko : meta.en;
        const summary = state.lang === 'ko' ? meta.summaryKo : meta.summaryEn;
        const detail = state.lang === 'ko' ? meta.detailKo : meta.detailEn;
        const tipList = meta.tipsKo || [];
        const traits = [
          `${AXIS_LABEL[state.lang].O} ${r.traits.O}`,
          `${AXIS_LABEL[state.lang].C} ${r.traits.C}`,
          `${AXIS_LABEL[state.lang].E} ${r.traits.E}`,
          `${AXIS_LABEL[state.lang].A} ${r.traits.A}`,
          `${AXIS_LABEL[state.lang].N} ${r.traits.N}`,
          `${AXIS_LABEL[state.lang].EN} ${r.energy}`,
          scoreChipText(r)
        ];

        return `
          <section class="glass in">
            <div class="pad">
              <div class="topbar" style="margin-bottom:12px">
                <span class="tag">${esc(tr('resultTitle'))}</span>
                <button class="lang" id="langBtn">${esc(tr('langBtn'))}</button>
              </div>

              <div class="result-hero">
                <div style="font-size:1.5rem">${meta.icon}</div>
                <h2 class="rtype">${esc(title)}</h2>
                <p class="rsummary">${esc(summary)}</p>
                <div class="trait-row">${traits.map(t=>`<span class="trait">${esc(t)}</span>`).join('')}</div>
              </div>

              <div class="section">
                <h3>${esc(tr('detailTitle'))}</h3>
                <p class="detail">${esc(detail)}</p>
              </div>

              <div class="section">
                <h3>${esc(tr('chartTitle'))}</h3>
                <div class="chartbox"><canvas id="resultChart" width="600" height="270" aria-label="result chart"></canvas></div>
              </div>

              <div class="section">
                <h3>${esc(tr('tipsTitle'))}</h3>
                <ul class="tips">${tipList.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
              </div>

              <div class="share-grid">
                <button class="share kakao" id="shareKakao">${esc(tr('shareKakao'))}</button>
                <button class="share x" id="shareX">${esc(tr('shareX'))}</button>
                <button class="share link" id="shareLink">${esc(tr('shareLink'))}</button>
              </div>

              <button class="btn sub" id="restartBtn">${esc(tr('restart'))}</button>

              <div class="disclaimer">${esc(tr('disclaimer'))}</div>

              <div class="reco">
                <a href="/tools/love-attachment/">${esc(tr('reco1'))}</a>
                <a href="/tools/stress-coping/">${esc(tr('reco2'))}</a>
                <a href="/tools/eq-test/">${esc(tr('reco3'))}</a>
              </div>
            </div>
          </section>
        `;
      }

      function bindEvents() {
        const start = document.getElementById('startBtn');
        if (start) start.onclick = startQuiz;

        const langBtn = document.getElementById('langBtn');
        if (langBtn) langBtn.onclick = () => { impact('light'); toggleLang(); };

        document.querySelectorAll('[data-opt]').forEach(btn => {
          btn.addEventListener('click', () => pickOption(Number(btn.getAttribute('data-opt'))));
        });

        const kakao = document.getElementById('shareKakao');
        if (kakao) kakao.onclick = shareKakao;
        const sx = document.getElementById('shareX');
        if (sx) sx.onclick = shareX;
        const sl = document.getElementById('shareLink');
        if (sl) sl.onclick = shareLink;

        const restart = document.getElementById('restartBtn');
        if (restart) restart.onclick = () => { impact('medium'); pulseFx(); resetState(); render(); };
      }

      function render() {
        initLittleJS();
        if (state.screen === 'intro') app.innerHTML = introScreen();
        else if (state.screen === 'question') app.innerHTML = questionScreen();
        else if (state.screen === 'analyzing') app.innerHTML = analyzingScreen();
        else app.innerHTML = resultScreen();

        bindEvents();

        if (state.screen === 'result') {
          requestAnimationFrame(drawResultChart);
          try {
            if (tg) {
              tg.ready();
              tg.expand();
            }
          } catch (_) {}
        }
      }

      try {
        if (tg) {
          tg.ready();
          tg.expand();
          tg.setHeaderColor && tg.setHeaderColor('#375b4f');
          tg.setBackgroundColor && tg.setBackgroundColor('#f4efe6');
        }
      } catch (_) {}

      render();
      window.addEventListener('resize', () => {
        if (state.screen === 'result') drawResultChart();
      });
    })();
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
