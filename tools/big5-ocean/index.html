          ko: '통찰형 연구자는 개방성과 성실성이 높고 외향성은 상대적으로 낮아, 복잡한 문제를 깊게 파고드는 데 매우 강합니다. 표면 현상보다 구조와 패턴을 읽어 근본 원인을 찾으려 하며, 의사결정의 질을 높이는 근거 중심 사고를 제공합니다. 특히 전략 수립, 리서치, 데이터 해석, 장기 기획에서 높은 신뢰를 얻는 유형입니다. 다만 완성도를 높이려는 성향이 강할수록 결론 시점이 늦어질 수 있으므로, 분석 단계마다 타임박스를 걸고 중간 산출물을 공유하는 습관이 중요합니다. 당신의 강점은 조용한 집중력이 아니라, 그 집중으로 팀의 판단 정확도를 끌어올리는 데 있습니다. 통찰을 실행 리듬과 연결하면 영향력은 훨씬 커집니다.',
          en: 'Insight Researchers are high in openness and conscientiousness with relatively lower extraversion, making them excellent at deep problem decomposition. You look beyond surface signals to structural patterns and root causes, improving decision quality with evidence-driven reasoning. This profile shines in strategy, research, data interpretation, and long-range planning. The main risk is timing drag from perfection pursuit. Use timeboxed analysis cycles and share interim outputs to keep momentum. Your value is not quiet focus alone; it is raising the precision of team judgment. When your insight is connected to execution cadence, impact scales significantly.'
        },
        tips: {
          ko: ['분석 단계마다 시간 제한을 설정해 결론 지연을 막으세요.', '중간 인사이트를 짧게 공유해 팀 정렬 속도를 높이세요.', '완벽한 답보다 실행 가능한 1차 권고안을 먼저 제시하세요.'],
          en: ['Set time limits per analysis phase to avoid decision lag.', 'Share interim insights briefly for faster alignment.', 'Propose an executable first recommendation before perfect completion.']
        }
      }
    };

    const TYPE_PROFILES = {
      explorer: { openness: 88, conscientiousness: 56, extraversion: 62, agreeableness: 54, neuroticism: 44 },
      driver: { openness: 62, conscientiousness: 86, extraversion: 78, agreeableness: 58, neuroticism: 36 },
      harmonizer: { openness: 58, conscientiousness: 68, extraversion: 74, agreeableness: 90, neuroticism: 34 },
      steady: { openness: 44, conscientiousness: 88, extraversion: 46, agreeableness: 76, neuroticism: 28 },
      researcher: { openness: 90, conscientiousness: 82, extraversion: 36, agreeableness: 60, neuroticism: 40 }
    };

    const AXIS_WEIGHTS = {
      openness: 1.05,
      conscientiousness: 1.1,
      extraversion: 1.0,
      agreeableness: 1.05,
      neuroticism: 0.95
    };

    const PROMOS = [
      { href: '/tools/mbti-quick/', ko: '🧠 MBTI 빠른 진단', en: '🧠 Quick MBTI Test' },
      { href: '/tools/love-attachment/', ko: '💞 연애 애착유형 검사', en: '💞 Love Attachment Test' },
      { href: '/tools/animal-personality/', ko: '🐾 동물 성격 매칭', en: '🐾 Animal Personality Match' }
    ];

    const state = {
      lang: detectLang(),
      phase: 'intro',
      current: 0,
      scores: freshScores(),
      answers: [],
      result: null,
      analyzingPct: 0,
      savedRaw: loadSavedRaw()
    };

    let analyzingTimer = null;
    const app = document.getElementById('app');
    const topProgress = document.getElementById('topProgress');
    const topProgressFill = document.getElementById('topProgressFill');
    const topProgressText = document.getElementById('topProgressText');

    const tg = window.Telegram?.WebApp;
    try { tg?.ready?.(); tg?.expand?.(); } catch (_) {}

    const maybeI18n = typeof window.GameI18n === 'function'
      ? window.GameI18n({ defaultLang: state.lang, messages: UI })
      : null;

    function detectLang() {
      const nav = (navigator.language || 'ko').toLowerCase();
      return nav.startsWith('ko') ? 'ko' : 'en';
    }

    function freshScores() {
      return AXES.reduce((acc, axis) => {
        acc[axis] = 0;
        return acc;
      }, {});
    }

    function tr(key, vars = {}) {
      if (maybeI18n && typeof maybeI18n.t === 'function') {
        const byI18n = maybeI18n.t(key, { lang: state.lang });
        if (byI18n && byI18n !== key) return interpolate(byI18n, vars);
      }
      const raw = UI[state.lang]?.[key] ?? UI.ko?.[key] ?? key;
      return interpolate(raw, vars);
    }

    function tv(value) {
      if (value && typeof value === 'object') {
        return value[state.lang] ?? value.ko ?? Object.values(value)[0] ?? '';
      }
      return String(value ?? '');
    }

    function interpolate(template, vars) {
      return String(template).replace(/\{(\w+)\}/g, (_, key) => (vars[key] ?? ''));
    }

    function haptic(kind = 'impact') {
      try {
        if (!tg?.HapticFeedback) return;
        if (kind === 'selection') tg.HapticFeedback.selectionChanged();
        else tg.HapticFeedback.impactOccurred('light');
      } catch (_) {}
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function updateTopProgress() {
      const show = state.phase === 'question';
      topProgress.classList.toggle('show', show);
      if (!show) return;
      const done = state.current + 1;
      const pct = Math.round((done / QUESTIONS.length) * 100);
      topProgressFill.style.width = pct + '%';
      topProgressText.textContent = `${done}/${QUESTIONS.length}`;
    }

    function formatSavedTime(iso) {
      try {
        return new Date(iso).toLocaleString(state.lang === 'ko' ? 'ko-KR' : 'en-US', {
          month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        });
      } catch (_) {
        return iso;
      }
    }

    function loadSavedRaw() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && parsed.type ? parsed : null;
      } catch (_) {
        return null;
      }
    }

    function saveResult(result) {
      const payload = {
        type: result.type,
        scores: result.normalized,
        savedAt: result.savedAt
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      state.savedRaw = payload;
    }

    function startQuiz() {
      haptic('impact');
      clearInterval(analyzingTimer);
      state.phase = 'question';
      state.current = 0;
      state.scores = freshScores();
      state.answers = [];
      state.result = null;
      state.analyzingPct = 0;
      render();
    }

    function setLang(lang) {
      state.lang = lang;
      render();
    }

    function pickAnswer(index) {
      if (state.phase !== 'question') return;
      haptic('selection');
      const item = QUESTIONS[state.current];
      const option = item.options[index];
      if (!option) return;

      state.answers.push({ qIndex: state.current, optionIndex: index });
      AXES.forEach(axis => {
        state.scores[axis] += Number(option.score[axis] || 0);
      });

      if (state.current >= QUESTIONS.length - 1) {
        goAnalyze();
      } else {
        state.current += 1;
        render();
      }
    }

    function goAnalyze() {
      state.phase = 'analyzing';
      state.analyzingPct = 8;
      render();
      const started = Date.now();
      clearInterval(analyzingTimer);
      analyzingTimer = setInterval(() => {
        const elapsed = Date.now() - started;
        state.analyzingPct = Math.min(100, 8 + Math.round(elapsed / 15));
        const fill = document.getElementById('miniFill');
        const txt = document.getElementById('miniText');
        if (fill) fill.style.width = state.analyzingPct + '%';
        if (txt) txt.textContent = state.analyzingPct + '%';
        if (elapsed > 1500) {
          clearInterval(analyzingTimer);
          finalizeResult();
        }
      }, 40);
    }

    function totalMax() {
      return QUESTIONS.length * 3;
    }

    function normalizeScores() {
      const max = totalMax();
      return AXES.reduce((acc, axis) => {
        acc[axis] = clamp100(Math.round((state.scores[axis] / max) * 100));
        return acc;
      }, {});
    }

    function clamp100(v) {
      return Math.max(0, Math.min(100, Number(v) || 0));
    }

    function resolveType(normalized) {
      let bestType = 'explorer';
      let bestScore = -Infinity;

      Object.entries(TYPE_PROFILES).forEach(([type, profile]) => {
        let weightedDiff = 0;
        AXES.forEach(axis => {
          const w = AXIS_WEIGHTS[axis] || 1;
          weightedDiff += Math.abs(normalized[axis] - profile[axis]) * w;
        });

        const closeness = 100 - (weightedDiff / AXES.length);
        const tieBreaker = ((profile.conscientiousness || 0) + (profile.openness || 0)) * 0.005;
        const finalScore = closeness + tieBreaker;

        if (finalScore > bestScore) {
          bestScore = finalScore;
          bestType = type;
        }
      });

      return bestType;
    }

    function finalizeResult() {
      const normalized = normalizeScores();
      const type = resolveType(normalized);
      const result = {
        type,
        normalized,
        savedAt: new Date().toISOString()
      };
      state.result = result;
      saveResult(result);
      state.phase = 'result';
      render();
      setTimeout(drawChart, 30);
    }

    function serviceUrl() {
      return location.origin + '/tools/big5-ocean/';
    }

    function composeShareText() {
      const info = RESULTS[state.result.type];
      return tr('shareText', { type: tv(info.name) });
    }

    function shareKakao() {
      const url = serviceUrl();
      const text = encodeURIComponent(composeShareText());
      const target = `https://sharer.kakao.com/talk/friends/picker/link?url=${encodeURIComponent(url)}&text=${text}`;
      window.open(target, '_blank', 'noopener');
    }

    function shareTwitter() {
      const url = serviceUrl();
      const text = encodeURIComponent(composeShareText());
      const target = `https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(url)}`;
      window.open(target, '_blank', 'noopener');
    }

    async function copyLink() {
      const url = serviceUrl();
      try {
        await navigator.clipboard.writeText(url);
      } catch (_) {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      showToast(tr('copyDone'));
    }

    function axisLabel(axis) {
      const map = {
        openness: tr('axisOpenness'),
        conscientiousness: tr('axisConscientiousness'),
        extraversion: tr('axisExtraversion'),
        agreeableness: tr('axisAgreeableness'),
        neuroticism: tr('axisNeuroticism')
      };
      return map[axis] || axis;
    }

    function drawChart() {
      const canvas = document.getElementById('resultChart');
      if (!canvas || !state.result) return;
      const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);

      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const values = AXES.map(axis => state.result.normalized[axis] || 0);
      const labels = AXES.map(axis => axisLabel(axis));

      const left = 132;
      const right = width - 16;
      const top = 10;
      const rows = values.length;
      const gap = 12;
      const barH = Math.max(24, Math.floor((height - top * 2 - gap * (rows - 1)) / rows));

      ctx.font = '600 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Noto Sans KR,sans-serif';
      ctx.textBaseline = 'middle';

      values.forEach((v, i) => {
        const y = top + i * (barH + gap);
        const trackW = right - left;
        const fillW = Math.max(0, Math.min(trackW, (v / 100) * trackW));

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        roundRect(ctx, left, y, trackW, barH, 10);
        ctx.fill();

        const grad = ctx.createLinearGradient(left, y, left + fillW, y);
        grad.addColorStop(0, i % 2 === 0 ? '#9be3ff' : '#ffd181');
        grad.addColorStop(1, i % 2 === 0 ? '#67c8ff' : '#ff95b0');
        ctx.fillStyle = grad;
        roundRect(ctx, left, y, fillW, barH, 10);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.fillText(labels[i], 10, y + barH / 2);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.fillText(v + '%', right - 8, y + barH / 2);
        ctx.textAlign = 'left';
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function renderIntro() {
      const saved = state.savedRaw;
      const savedLine = saved
        ? `<div class="saved-note">${tr('prevResult', {
            type: tv(RESULTS[saved.type]?.name || { ko: saved.type, en: saved.type }),
            time: formatSavedTime(saved.savedAt)
          })}</div>`
        : '';

      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="lang-row">
              <div class="lang-group">
                <button class="lang-btn ${state.lang === 'ko' ? 'active' : ''}" data-lang="ko">한국어</button>
                <button class="lang-btn ${state.lang === 'en' ? 'active' : ''}" data-lang="en">English</button>
              </div>
              <a class="ghost-link" href="/tools/">All Tools ↗</a>
            </div>
            <h1>${tr('title')}</h1>
            <p class="subtitle">${tr('subtitle')}</p>
            <div class="hero-badges">
              <span class="badge">${tr('elapsed')}</span>
              <span class="badge">${tr('questionsBadge')}</span>
              <span class="badge">${tr('baseBadge')}</span>
            </div>
            ${savedLine}
            <button class="primary-btn" id="startBtn">${tr('start')}</button>
            <p class="disclaimer">${tr('disclaimer')}</p>
          </div>
        </section>
      `;

      app.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLang(btn.dataset.lang));
      });
      document.getElementById('startBtn').addEventListener('click', startQuiz);
    }

    function renderQuestion() {
      const item = QUESTIONS[state.current];
      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <h2 class="question-title">Q${state.current + 1}. ${tv(item.q)}</h2>
            <p class="question-hint">${tr('hint')}</p>
            <div class="choices">
              ${item.options.map((opt, idx) => `<button class="choice-btn" data-idx="${idx}">${tv(opt.text)}</button>`).join('')}
            </div>
          </div>
        </section>
      `;
      app.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => pickAnswer(Number(btn.dataset.idx)));
      });
    }

    function renderAnalyzing() {
      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="analyzing-wrap">
              <div class="spinner" aria-hidden="true"></div>
              <h2>${tr('analyzingTitle')}</h2>
              <p class="subtitle">${tr('analyzingDesc')}</p>
              <div class="mini-track"><div class="mini-fill" id="miniFill" style="width:${state.analyzingPct}%;"></div></div>
              <div class="mini-text" id="miniText">${state.analyzingPct}%</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderResult() {
      const typeInfo = RESULTS[state.result.type];
      const scores = state.result.normalized;
      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="result-head">
              <div>${tr('resultTitle')}</div>
              <h2 class="result-type">${typeInfo.emoji} ${tv(typeInfo.name)}</h2>
              <p class="result-summary">${tv(typeInfo.summary)}</p>
            </div>

            <h3 class="section-title">${tr('chartTitle')}</h3>
            <div class="chart-wrap"><canvas id="resultChart" width="640" height="290"></canvas></div>

            <h3 class="section-title">${tr('tipsTitle')}</h3>
            <p class="detail-text">${tv(typeInfo.detail)}</p>
            <ul class="tips-list">
              ${typeInfo.tips[state.lang].map(item => `<li>${item}</li>`).join('')}
            </ul>

            <div class="share-grid">
              <button class="share-btn" id="shareKakao">${tr('shareKakao')}</button>
              <button class="share-btn" id="shareTwitter">${tr('shareTwitter')}</button>
              <button class="share-btn" id="shareLink">${tr('shareLink')}</button>
            </div>

            <button class="secondary-btn" id="restartBtn">${tr('restart')}</button>

            <div class="promo-wrap">
              <div class="section-title" style="margin-top:0;">${tr('promoTitle')}</div>
              <div class="promo-list">
                ${PROMOS.map(p => `<a class="promo-link" href="${p.href}">${state.lang === 'ko' ? p.ko : p.en}</a>`).join('')}
              </div>
            </div>

            <p class="disclaimer">${tr('disclaimer')}</p>
          </div>
        </section>
      `;

      document.getElementById('shareKakao').addEventListener('click', shareKakao);
      document.getElementById('shareTwitter').addEventListener('click', shareTwitter);
      document.getElementById('shareLink').addEventListener('click', copyLink);
      document.getElementById('restartBtn').addEventListener('click', () => {
        haptic('impact');
        state.phase = 'intro';
        state.current = 0;
        state.scores = freshScores();
        state.answers = [];
        state.result = null;
        render();
      });

      drawChart();
    }

    function render() {
      updateTopProgress();
      if (state.phase === 'intro') renderIntro();
      else if (state.phase === 'question') renderQuestion();
      else if (state.phase === 'analyzing') renderAnalyzing();
      else renderResult();
    }

    render();
    window.addEventListener('resize', () => {
      if (state.phase === 'result') drawChart();
    });
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
