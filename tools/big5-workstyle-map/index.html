      {t:{ko:'문제 전조를 탐지하고 예방책 만드는 업무',en:'Detecting early warning signs and prevention plans'},w:{O:0,C:1,E:0,A:0,N:3}}
    ]
  }
];

const state = {
  lang: (location.search.includes('lang=en') || (navigator.language||'').toLowerCase().startsWith('en')) ? 'en' : 'ko',
  screen: 'intro',
  i: 0,
  answers: [],
  scores: {O:0,C:0,E:0,A:0,N:0},
  result: null,
  normalized: null,
  startedAt: 0
};

const ui = { root: document.getElementById('cardRoot') };

const LJ = {
  enabled:false,
  inited:false,
  particles:[],
  clickSound:null,
  doneSound:null,
  tileInfo:null,
  fallbackTimer:null
};

function t(k){
  return (I18N[state.lang] && I18N[state.lang][k]) || I18N.ko[k] || k;
}

function tgHaptic(level){
  try{
    if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback)
      Telegram.WebApp.HapticFeedback.impactOccurred(level || 'light');
  }catch(_e){}
}

function esc(s){
  return String(s).replace(/[&<>'"]/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[c]));
}

function getResultCopy(type){
  const r = RESULTS[type];
  const lang = state.lang;
  return {
    name:r.names[lang],
    tagline:r.taglines[lang],
    detail:r.detail[lang],
    tips:r.tips[lang],
    emoji:r.emoji,
    color:r.color
  };
}

function render(){
  if (state.screen === 'intro') return renderIntro();
  if (state.screen === 'question') return renderQuestion();
  if (state.screen === 'analyzing') return renderAnalyzing();
  return renderResult();
}

function langToggleHtml(){
  return `<button class="lang-toggle" id="langToggle">${state.lang==='ko'?'EN':'KO'}</button>`;
}

function renderIntro(){
  const last = loadLastResult();
  const L = I18N[state.lang];
  ui.root.innerHTML = `
    <div class="top-row">
      <span class="badge">${L.badge}</span>
      ${langToggleHtml()}
    </div>
    <section class="screen active">
      <div class="hero">
        <h1>${L.title}</h1>
        <p>${L.subtitle}</p>
        <div class="meta">
          <span>${L.mQuestions}</span><span>${L.mTime}</span><span>${L.mTypes}</span><span>${L.mFree}</span>
        </div>
      </div>
      <div class="preview-grid">
        <div class="preview"><b>${L.pv1t}</b><p>${L.pv1d}</p></div>
        <div class="preview"><b>${L.pv2t}</b><p>${L.pv2d}</p></div>
        <div class="preview"><b>${L.pv3t}</b><p>${L.pv3d}</p></div>
        <div class="preview"><b>${L.pv4t}</b><p>${L.pv4d}</p></div>
      </div>
      <button class="cta" id="startBtn">${L.start}</button>
      ${last ? `<div class="last-result"><b>${L.lastResultTitle}:</b> ${esc(last.name)} · ${new Date(last.at).toLocaleString()}<br>${esc(last.tagline)}</div>` : ''}
      <p class="subline">Big Five(OCEAN) 기반 비의료 자기이해 테스트</p>
      <p class="footer-note">© EastSea Tools · Big5 Workstyle Map</p>
    </section>`;
  bindCommon();
  const startBtn = document.getElementById('startBtn');
  if (startBtn) startBtn.addEventListener('click',startTest,{once:true});
}

function renderQuestion(){
  const q = QUESTIONS[state.i];
  const idx = state.i + 1;
  const total = QUESTIONS.length;
  const pct = Math.round((idx-1)/total*100);
  const L = I18N[state.lang];
  const opts = q.o.map((it, n)=>`<button class="opt" data-opt="${n}"><i>${String.fromCharCode(65+n)}</i><span>${esc(it.t[state.lang])}</span></button>`).join('');
  ui.root.innerHTML = `
    <div class="top-row"><span class="badge">${L.badge}</span>${langToggleHtml()}</div>
    <section class="screen active">
      <div class="progress-wrap">
        <div class="progress-head"><span>${L.progress}</span><span>${idx}/${total}</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="q-card">
        <div class="q-meta">Question ${idx}</div>
        <div class="q-text">${esc(q.q[state.lang])}</div>
      </div>
      <div class="opts">${opts}</div>
    </section>`;
  bindCommon();
  document.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const picked = q.o[Number(btn.dataset.opt)];
      answer(picked);
    },{once:true});
  });
}

function renderAnalyzing(){
  const L = I18N[state.lang];
  ui.root.innerHTML = `
    <div class="top-row"><span class="badge">${L.badge}</span>${langToggleHtml()}</div>
    <section class="screen active analyzing">
      <div class="pulse"></div>
      <h2>${L.analyzingTitle}</h2>
      <p>${L.analyzingDesc}</p>
    </section>`;
  bindCommon();
}

function renderResult(){
  const L = I18N[state.lang];
  const r = getResultCopy(state.result);
  const type = state.result;
  const tips = r.tips.map(row=>`<div class="tip"><b>${esc(row[0])}</b>${esc(row[1])}</div>`).join('');
  ui.root.innerHTML = `
    <div class="top-row"><span class="badge">${L.badge}</span>${langToggleHtml()}</div>
    <section class="screen active">
      <div class="result-hero" data-type="${type}">
        <span class="result-badge">${L.resultLabel}</span>
        <div style="font-size:56px;line-height:1;margin-top:6px">${r.emoji}</div>
        <h2 class="result-type">${esc(r.name)}</h2>
        <p class="result-tag">${esc(r.tagline)}</p>
      </div>

      <div class="panel"><h3>${L.detailTitle}</h3><p>${esc(r.detail)}</p></div>

      <div class="panel chart-box"><h3>${L.chartTitle}</h3><canvas id="resultChart" width="420" height="220" aria-label="result chart"></canvas></div>

      <div class="panel"><h3>${L.tipTitle}</h3><div class="tips">${tips}</div></div>

      <div class="panel">
        <h3>${L.shareTitle}</h3>
        <div class="share">
          <button class="kakao" id="shareKakao">${L.shareKakao}</button>
          <button class="twitter" id="shareTwitter">${L.shareTwitter}</button>
          <button class="copy" id="shareCopy">${L.shareCopy}</button>
        </div>
        <button class="retry" id="retryBtn">${L.retry}</button>
        <div class="disclaimer">${L.disclaimer}</div>
        <div class="cross">
          <h4>${L.crossTitle}</h4>
          <a href="/tools/disc-style/">나의 DISC 행동유형 검사</a>
          <a href="/tools/attachment-repair-compass/">연애 애착 리페어 컴퍼스</a>
          <a href="/tools/career-fit-compass/">커리어 핏 컴퍼스 테스트</a>
        </div>
      </div>
    </section>`;
  bindCommon();
  drawChart();
  wireShare();
  const retry = document.getElementById('retryBtn');
  if (retry) retry.addEventListener('click', resetTest);
}

function bindCommon(){
  const langToggle = document.getElementById('langToggle');
  if (langToggle) langToggle.addEventListener('click',()=>{
    state.lang = state.lang === 'ko' ? 'en' : 'ko';
    tgHaptic('light');
    render();
  });
}

function startTest(){
  tgHaptic('medium');
  playChoiceFx();
  state.screen = 'question';
  state.startedAt = performance.now();
  render();
}

function answer(opt){
  TRAITS.forEach(k=>{
    state.scores[k] += (opt.w[k] || 0);
  });
  state.answers.push(opt.w);
  tgHaptic('light');
  playChoiceFx();

  if (state.i < QUESTIONS.length - 1){
    state.i += 1;
    renderQuestion();
  } else {
    state.screen = 'analyzing';
    render();
    setTimeout(()=>{
      finalize();
      state.screen = 'result';
      playDoneFx();
      render();
    }, 1200);
  }
}

function finalize(){
  const entries = Object.entries(state.scores);
  entries.sort((a,b)=>{
    if (b[1] !== a[1]) return b[1] - a[1];
    return TYPE_ORDER.indexOf(a[0]) - TYPE_ORDER.indexOf(b[0]);
  });
  state.result = entries[0][0];

  const vals = entries.map(([,v])=>v);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const norm = {};
  TRAITS.forEach(k=>{
    if (maxV === minV) norm[k] = 50;
    else norm[k] = Math.round(((state.scores[k]-minV)/(maxV-minV))*100);
  });
  state.normalized = norm;

  const rc = getResultCopy(state.result);
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      at:Date.now(),
      type:state.result,
      name:rc.name,
      tagline:rc.tagline,
      scores:state.scores,
      normalized:norm,
      durationMs:Math.round(performance.now()-state.startedAt)
    }));
  }catch(_e){}
}

function loadLastResult(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  }catch(_e){ return null; }
}

function drawChart(){
  const c = document.getElementById('resultChart');
  if (!c || !state.normalized) return;
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);

  const colorMap = {O:'#8860d0',C:'#4b7bec',E:'#f39c12',A:'#27ae60',N:'#c0392b'};
  const labelMap = {
    O: state.lang==='ko'?'개방성 O':'Openness O',
    C: state.lang==='ko'?'성실성 C':'Conscientiousness C',
    E: state.lang==='ko'?'외향성 E':'Extraversion E',
    A: state.lang==='ko'?'친화성 A':'Agreeableness A',
    N: state.lang==='ko'?'신경성 N':'Neuroticism N'
  };

  const left = 88, top = 18, row = 38, barMax = W - left - 18;
  ctx.font = '12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
  ctx.textBaseline = 'middle';

  TRAITS.forEach((k,idx)=>{
    const y = top + idx*row;
    const v = state.normalized[k];
    ctx.fillStyle = '#efe8db';
    roundRect(ctx,left,y,barMax,16,8); ctx.fill();

    const w = Math.max(8,Math.round(barMax*(v/100)));
    const g = ctx.createLinearGradient(left,y,left+w,y+16);
    g.addColorStop(0,colorMap[k]); g.addColorStop(1,'#ffffff');
    ctx.fillStyle = g;
    roundRect(ctx,left,y,w,16,8); ctx.fill();

    ctx.fillStyle = '#4d4752';
    ctx.fillText(labelMap[k], 8, y+8);
    ctx.fillStyle = '#2f2b33';
    ctx.fillText(String(v), left+barMax+4, y+8);
  });
}

function roundRect(ctx,x,y,w,h,r){
  const rr = Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr,y);
  ctx.arcTo(x+w,y,x+w,y+h,rr);
  ctx.arcTo(x+w,y+h,x,y+h,rr);
  ctx.arcTo(x,y+h,x,y,rr);
  ctx.arcTo(x,y,x+w,y,rr);
  ctx.closePath();
}

function wireShare(){
  const kbtn = document.getElementById('shareKakao');
  const tbtn = document.getElementById('shareTwitter');
  const cbtn = document.getElementById('shareCopy');

  if (kbtn) kbtn.addEventListener('click',shareKakao);
  if (tbtn) tbtn.addEventListener('click',shareTwitter);
  if (cbtn) cbtn.addEventListener('click',copyLink);
}

function shareText(){
  const r = getResultCopy(state.result);
  return state.lang === 'ko'
    ? `내 Big5 워크스타일은 ${r.name} (${r.emoji}) — ${r.tagline}`
    : `My Big5 workstyle is ${r.name} (${r.emoji}) — ${r.tagline}`;
}

function shareKakao(){
  tgHaptic('light');
  playChoiceFx();
  const text = shareText();
  try{
    if (window.Kakao && Kakao.Share && typeof Kakao.Share.sendDefault === 'function'){
      Kakao.Share.sendDefault({
        objectType:'feed',
        content:{ title: text, description: 'Big5 Workstyle Map', imageUrl: 'https://tools.eastsea.xyz/assets/og-big5-workstyle-map.png', link:{mobileWebUrl:SHARE_URL,webUrl:SHARE_URL} }
      });
      return;
    }
  }catch(_e){}
  alert(t('kakaoFallback'));
  window.open('https://story.kakao.com/share?url='+encodeURIComponent(SHARE_URL), '_blank');
}

function shareTwitter(){
  tgHaptic('light');
  playChoiceFx();
  const url = 'https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText())+'&url='+encodeURIComponent(SHARE_URL);
  window.open(url, '_blank');
}

function copyLink(){
  tgHaptic('light');
  playChoiceFx();
  const payload = shareText()+'\n'+SHARE_URL;
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(payload)
      .then(()=>alert(t('copied')))
      .catch(()=>fallbackCopy(payload));
  } else fallbackCopy(payload);
}

function fallbackCopy(text){
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left='-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    alert(t('copied'));
  }catch(_e){
    alert(t('copyFail') + '\n' + SHARE_URL);
  }
}

function resetTest(){
  tgHaptic('medium');
  state.screen = 'intro';
  state.i = 0;
  state.answers = [];
  state.scores = {O:0,C:0,E:0,A:0,N:0};
  state.result = null;
  state.normalized = null;
  render();
}

// -------- LittleJS Integration (mandatory) --------
function initLittleJS(){
  if (!(window._ljReady && typeof engineInit === 'function')) {
    fallbackBackground();
    return;
  }
  try{
    LJ.enabled = true;
    engineInit(ljInit, ljUpdate, ljUpdatePost, ljRender, ljRenderPost, [], document.getElementById('lj-root'));
  }catch(e){
    console.warn('LittleJS init failed:', e && e.message ? e.message : e);
    fallbackBackground();
  }
}

function ljInit(){
  LJ.inited = true;
  try{
    showSplashScreen = false;
    cameraPos = vec2(0,0);
    cameraScale = 32;
    canvasClearColor = rgb(.98,.97,.93,1);
    LJ.tileInfo = (typeof tile === 'function') ? tile(vec2(0,0), vec2(1,1), 0, 0) : null;

    LJ.particles = Array.from({length:18}, (_,i)=>({
      p: vec2(-8 + (i%6)*3.2, -5 + Math.floor(i/6)*3.1),
      v: vec2((Math.random()-.5)*.02,(Math.random()-.5)*.02),
      s: .32 + Math.random()*.28,
      a: Math.random()*Math.PI*2
    }));

    if (typeof Sound === 'function'){
      LJ.clickSound = new Sound([.4,,220,.01,.03,.08,,1.7,-4,.2,,,,,,,.05,.7,.01]);
      LJ.doneSound  = new Sound([1.1,,600,.02,.2,.24,,1.3,,,.05,.2,,.3,.1,,,,.82,.07,.22]);
    }
  }catch(e){
    console.warn('LittleJS setup warning:', e && e.message ? e.message : e);
  }
}

function ljUpdate(){
  if (!LJ.inited) return;
  for (const orb of LJ.particles){
    orb.p = orb.p.add(orb.v);
    orb.a += .03;
    if (orb.p.x > 9) orb.p.x = -9;
    if (orb.p.x < -9) orb.p.x = 9;
    if (orb.p.y > 7) orb.p.y = -7;
    if (orb.p.y < -7) orb.p.y = 7;
  }
}

function ljUpdatePost(){}

function ljRender(){
  if (!LJ.inited) return;

  // drawRect usage
  drawRect(vec2(0,0), vec2(18,14), rgb(.97,.95,.9,.85), 0);

  const palette = [
    rgb(.42,.50,.28,.14),
    rgb(.18,.49,.45,.12),
    rgb(.77,.48,.34,.10)
  ];

  for (let i=0;i<LJ.particles.length;i++){
    const orb = LJ.particles[i];
    const wobble = Math.sin(orb.a) * .16;
    drawRect(orb.p.add(vec2(wobble,0)), vec2(orb.s,orb.s), palette[i%palette.length], orb.a*.2);

    // drawTile usage (fallback-safe tile info)
    if (LJ.tileInfo && typeof drawTile === 'function')
      drawTile(orb.p, vec2(.18,.18), LJ.tileInfo, palette[(i+1)%palette.length], orb.a, false);
  }
}

function ljRenderPost(){}

function playChoiceFx(){
  if (!LJ.enabled) return;
  try{
    if (LJ.clickSound && typeof LJ.clickSound.play === 'function')
      LJ.clickSound.play(vec2(0,0), .45, 1 + Math.random()*.08);

    if (typeof ParticleEmitter === 'function'){
      new ParticleEmitter(
        vec2((Math.random()-.5)*2.2, (Math.random()-.5)*1.4), 0,
        .2, .06, 60, Math.PI,
        LJ.tileInfo || tile(vec2()),
        rgb(.77,.48,.34,.85), rgb(.42,.50,.28,.65),
        rgb(.77,.48,.34,0), rgb(.18,.49,.45,0),
        .45, .14, .06, .08, .03,
        .94, 1, 0, Math.PI, .05,
        .4, 0, 0, 1
      );
    }
  }catch(_e){}
}

function playDoneFx(){
  if (!LJ.enabled) return;
  try{
    if (LJ.doneSound && typeof LJ.doneSound.play === 'function')
      LJ.doneSound.play(vec2(0,0), .7, 1);

    if (typeof ParticleEmitter === 'function'){
      new ParticleEmitter(
        vec2(0,0), 0,
        .8, .12, 180, Math.PI,
        LJ.tileInfo || tile(vec2()),
        rgb(.42,.50,.28,.9), rgb(.18,.49,.45,.9),
        rgb(.77,.48,.34,0), rgb(.52,.38,.81,0),
        .9, .22, .08, .16, .05,
        .92, 1, 0, Math.PI, .08,
        .6, 0, 0, 1
      );
    }
  }catch(_e){}
}

function fallbackBackground(){
  const root = document.getElementById('lj-root');
  if (!root) return;
  const c = document.createElement('canvas');
  c.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;opacity:.55';
  root.appendChild(c);
  const x = c.getContext('2d');
  const dots = Array.from({length:22},()=>({x:Math.random(),y:Math.random(),r:8+Math.random()*18,v:(Math.random()-.5)*.0007}));
  function resize(){ c.width = innerWidth; c.height = innerHeight; }
  addEventListener('resize',resize); resize();
  function frame(){
    x.clearRect(0,0,c.width,c.height);
    dots.forEach(d=>{
      d.y += d.v; if (d.y<0||d.y>1) d.v*=-1;
      const gx = d.x*c.width, gy = d.y*c.height;
      const g = x.createRadialGradient(gx,gy,0,gx,gy,d.r*2.2);
      g.addColorStop(0,'rgba(107,127,71,.20)');
      g.addColorStop(1,'rgba(107,127,71,0)');
      x.fillStyle = g;
      x.beginPath(); x.arc(gx,gy,d.r*2.2,0,Math.PI*2); x.fill();
    });
    LJ.fallbackTimer = requestAnimationFrame(frame);
  }
  frame();
}

function initTelegram(){
  try{
    if (window.Telegram && Telegram.WebApp){
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }
  }catch(_e){}
}

// Boot
initTelegram();
render();
initLittleJS();

})();
