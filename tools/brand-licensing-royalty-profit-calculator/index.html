<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Licensing Royalty Profit Calculator | 브랜드 라이선싱 로열티 수익 계산기</title>
  <meta name="description" content="브랜드 라이선싱 계약의 예상 매출, 로열티율, 최소 보장액, 선급금 회수율을 반영해 기간 로열티 수익, 순이익, ROI, 손익분기 매출을 계산합니다." />
  <meta name="keywords" content="brand licensing, royalty, minimum guarantee, advance recoupment, profit, roi, calculator" />
  <link rel="canonical" href="https://eastsea.monster/tools/brand-licensing-royalty-profit-calculator/" />
  <style>
    :root {
      --bg: #0b1222;
      --panel: #111f3a;
      --line: #2a3d66;
      --text: #eef2ff;
      --muted: #a8b6d9;
      --accent: #7aa6ff;
      --accent-2: #55c2ff;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #1b2f58 0%, var(--bg) 55%);
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px 14px 52px; }
    .head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.8vw, 1.9rem); }
    .sub { margin-top: 8px; color: var(--muted); font-size: 0.93rem; line-height: 1.5; max-width: 72ch; }
    .note { margin-top: 6px; color: #c5d3f4; font-size: 0.82rem; }
    .link {
      text-decoration: none; color: var(--text); border: 1px solid var(--line); border-radius: 10px;
      padding: 8px 11px; background: rgba(255,255,255,0.04); font-size: 0.86rem; white-space: nowrap;
    }
    .grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 12px; }
    .card {
      background: linear-gradient(170deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      border: 1px solid var(--line); border-radius: 14px; padding: 13px; min-width: 0;
    }
    h2 { margin: 0 0 10px; font-size: 1rem; }
    .inputs { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
    label { display: block; color: var(--muted); font-size: 0.78rem; margin-bottom: 5px; }
    input, textarea {
      width: 100%; border: 1px solid #344b79; border-radius: 10px; background: #162745; color: var(--text);
      padding: 9px 10px; font-size: 0.92rem;
    }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button {
      border: none; border-radius: 10px; padding: 9px 12px; font-size: 0.86rem; font-weight: 700;
      cursor: pointer; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #0a1328;
    }
    button.soft { border: 1px solid #3a5587; background: rgba(122,166,255,0.12); color: var(--text); }
    .error { margin-top: 9px; color: var(--bad); font-size: 0.83rem; display: none; min-height: 1.2em; }
    .error.show { display: block; }
    textarea {
      margin-top: 9px; min-height: 130px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.8rem; line-height: 1.4;
    }
    .kpis { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .kpi { border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: rgba(255,255,255,0.02); }
    .k { color: var(--muted); font-size: 0.74rem; }
    .v { margin-top: 4px; font-size: 1.02rem; font-weight: 650; word-break: break-word; }
    .status { margin-top: 10px; border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; background: rgba(255,255,255,0.03); font-size: 0.86rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.86rem; }
    th, td { border-bottom: 1px solid rgba(148,163,184,0.2); padding: 7px 4px; text-align: right; }
    th:first-child, td:first-child { text-align: left; color: var(--muted); }
    .ok { color: var(--good); } .warn { color: var(--warn); } .bad { color: var(--bad); }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .inputs { grid-template-columns: 1fr; }
    }
  </style>
  <!-- Analytics: GA4 + Clarity -->
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🏷️ 브랜드 라이선싱 로열티 수익 계산기</h1>
        <div class="sub">예상 매출, 로열티율, 최소 보장액, 선급금 회수율을 반영해 기간 로열티 수익, 현금 수령액, ROI, 손익분기 매출을 계산합니다.</div>
        <div class="note">선급금 회수율과 에이전트 수수료가 높을수록 실제 현금 수령액이 크게 감소합니다.</div>
      </div>
      <a class="link" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div>
            <label for="forecastSales">예상 기간 매출 (KRW)</label>
            <input id="forecastSales" type="number" min="0" value="120000000" />
          </div>
          <div>
            <label for="royaltyRate">로열티율 (%)</label>
            <input id="royaltyRate" type="number" min="0" max="100" step="0.1" value="8" />
          </div>
          <div>
            <label for="minimumGuarantee">최소 보장액 (KRW)</label>
            <input id="minimumGuarantee" type="number" min="0" value="6000000" />
          </div>
          <div>
            <label for="agentCommission">에이전트 수수료 (%)</label>
            <input id="agentCommission" type="number" min="0" max="100" step="0.1" value="10" />
          </div>
          <div>
            <label for="advanceRemaining">미상환 선급금 잔액 (KRW)</label>
            <input id="advanceRemaining" type="number" min="0" value="10000000" />
          </div>
          <div>
            <label for="recoupRate">선급금 회수율 (%)</label>
            <input id="recoupRate" type="number" min="0" max="100" step="0.1" value="30" />
          </div>
          <div>
            <label for="marketingCost">마케팅/브랜드 지원비 (KRW)</label>
            <input id="marketingCost" type="number" min="0" value="1500000" />
          </div>
          <div>
            <label for="legalCost">법무/관리비 (KRW)</label>
            <input id="legalCost" type="number" min="0" value="800000" />
          </div>
          <div>
            <label for="opsCost">운영/관리비 (KRW)</label>
            <input id="opsCost" type="number" min="0" value="700000" />
          </div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">로열티 확정액</div><div id="royaltyDue" class="v">-</div></div>
          <div class="kpi"><div class="k">기간 현금 수령액</div><div id="cashReceived" class="v">-</div></div>
          <div class="kpi"><div class="k">순이익</div><div id="netProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v">-</div></div>
          <div class="kpi"><div class="k">손익분기 매출</div><div id="breakEvenSales" class="v">-</div></div>
          <div class="kpi"><div class="k">잔여 선급금</div><div id="advanceLeft" class="v">-</div></div>
        </div>
        <div id="status" class="status">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>예상 로열티</th><td id="forecastRoyalty">-</td></tr>
            <tr><th>최소 보장 추가분</th><td id="mgGap">-</td></tr>
            <tr><th>에이전트 수수료</th><td id="agentFee">-</td></tr>
            <tr><th>선급금 회수액</th><td id="recouped">-</td></tr>
            <tr><th>총 지원비</th><td id="totalCosts">-</td></tr>
            <tr><th>유효 테이크율</th><td id="effectiveTake">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script type="module" src="app.mjs"></script>
</body>
</html>
