<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손익분기점 분석기 | Break-Even Analyzer</title>
  <meta name="description" content="고정비·변동비·판매가를 기준으로 손익분기점(BEP), 목표이익 달성량, 안전마진을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#111c33;--line:#284062;--text:#e6efff;--muted:#9eb4d8;--pri:#60a5fa;--pri2:#22d3ee;--ok:#34d399;--warn:#fbbf24;--bad:#fb7185}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0%,#1b2e55,#0f172a 50%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 40px}.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.9rem}
    .back{color:#cfe2ff;text-decoration:none;border:1px solid var(--line);background:#132445;padding:8px 11px;border-radius:10px;font-size:.85rem;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:linear-gradient(160deg,#15264a,#111c33);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 12px 26px rgba(0,0,0,.32)}
    h2{margin:0 0 10px;font-size:1rem}label{display:block;font-size:.8rem;color:var(--muted);margin:0 0 6px;font-weight:700}
    input,button,select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1b33;color:var(--text);font-size:.93rem}
    input:focus,select:focus{outline:2px solid rgba(96,165,250,.28);border-color:#72b0ff}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));font-weight:800;color:#041225}.ghost{background:#15294a;border:1px solid var(--line);color:#d5e5ff}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:#101d37;border:1px solid var(--line);border-radius:12px;padding:10px}.k{font-size:.75rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .msg{margin-top:10px;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0f1a31;line-height:1.45;font-size:.9rem}
    .bar-wrap{margin-top:10px}.bar{height:12px;background:#16274a;border:1px solid #315085;border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#34d399,#22d3ee);transition:width .3s}
    .mini{font-size:.8rem;color:var(--muted);margin-top:6px}
    .table{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:580px}th,td{padding:9px;border-bottom:1px solid #233b5f;font-size:.84rem;text-align:right;white-space:nowrap}th:first-child,td:first-child{text-align:left}th{background:#13274b;color:#b5c8eb;font-size:.78rem}
    @media(max-width:860px){.grid{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📊 손익분기점 분석기</h1>
        <p class="sub">고정비를 회수하려면 몇 개를 팔아야 하는지, 목표 이익까지 한 번에 계산합니다.</p>
      </div>
      <a class="back" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="two">
          <div>
            <label for="fixedCost">월 고정비 (원)</label>
            <input id="fixedCost" type="number" min="0" step="1000" value="12000000" />
          </div>
          <div>
            <label for="variableCost">단위당 변동비 (원)</label>
            <input id="variableCost" type="number" min="0" step="100" value="18000" />
          </div>
          <div>
            <label for="price">단위당 판매가 (원)</label>
            <input id="price" type="number" min="1" step="100" value="42000" />
          </div>
          <div>
            <label for="expectedUnits">예상 판매량 (개/월)</label>
            <input id="expectedUnits" type="number" min="0" step="1" value="650" />
          </div>
          <div>
            <label for="targetProfit">목표 이익 (원/월)</label>
            <input id="targetProfit" type="number" min="0" step="1000" value="5000000" />
          </div>
          <div>
            <label for="taxRate">세금/수수료율 (%)</label>
            <input id="taxRate" type="number" min="0" max="80" step="0.1" value="3.3" />
          </div>
        </div>
        <div class="btns">
          <button id="calcBtn" type="button">분석</button>
          <button id="sampleBtn" class="ghost" type="button">샘플</button>
        </div>
      </article>

      <article class="card">
        <h2>핵심 지표</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">공헌이익(개당)</div><div class="v" id="cmUnit">-</div></div>
          <div class="kpi"><div class="k">공헌이익률</div><div class="v" id="cmRatio">-</div></div>
          <div class="kpi"><div class="k">BEP 판매량</div><div class="v" id="bepUnits">-</div></div>
          <div class="kpi"><div class="k">BEP 매출</div><div class="v" id="bepSales">-</div></div>
          <div class="kpi"><div class="k">목표이익 달성 판매량</div><div class="v" id="targetUnits">-</div></div>
          <div class="kpi"><div class="k">예상 영업이익</div><div class="v" id="expectedProfit">-</div></div>
        </div>
        <div class="bar-wrap">
          <div class="bar"><div class="fill" id="fill"></div></div>
          <div class="mini" id="barText">예상 판매량 대비 손익분기점 진척률</div>
        </div>
        <div class="msg" id="msg">값을 입력하면 자동으로 계산됩니다.</div>
      </article>
    </section>

    <section class="card" style="margin-top:12px">
      <h2>요약 테이블</h2>
      <div class="table">
        <table>
          <thead>
            <tr><th>항목</th><th>값</th><th>해석</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => '₩' + Math.round(n || 0).toLocaleString('ko-KR');
    const pct = (v) => `${(v * 100).toFixed(2)}%`;

    function run() {
      const fixed = Number($('fixedCost').value);
      const variable = Number($('variableCost').value);
      const price = Number($('price').value);
      const expected = Number($('expectedUnits').value);
      const targetProfit = Number($('targetProfit').value);
      const taxRate = Number($('taxRate').value) / 100;

      if (!(price > 0) || fixed < 0 || variable < 0) {
        $('msg').textContent = '판매가/원가 값을 다시 확인해 주세요.';
        return;
      }

      const netPrice = price * (1 - taxRate);
      const cm = netPrice - variable;
      if (!(cm > 0)) {
        $('msg').innerHTML = '⚠️ 공헌이익이 0 이하입니다. <strong>가격 인상</strong> 또는 <strong>변동비 절감</strong>이 우선입니다.';
        ['cmUnit','cmRatio','bepUnits','bepSales','targetUnits','expectedProfit'].forEach(id => $(id).textContent = '-');
        $('fill').style.width = '0%';
        $('rows').innerHTML = '';
        return;
      }

      const cmRatio = cm / netPrice;
      const bepUnits = Math.ceil(fixed / cm);
      const bepSales = bepUnits * price;
      const targetUnits = Math.ceil((fixed + targetProfit) / cm);
      const profit = expected * cm - fixed;
      const safetyMarginUnits = expected - bepUnits;
      const safetyMarginRate = expected > 0 ? safetyMarginUnits / expected : 0;
      const progress = expected > 0 ? Math.min(160, (expected / bepUnits) * 100) : 0;

      $('cmUnit').textContent = fmt(cm);
      $('cmRatio').textContent = pct(cmRatio);
      $('bepUnits').textContent = `${bepUnits.toLocaleString('ko-KR')}개`;
      $('bepSales').textContent = fmt(bepSales);
      $('targetUnits').textContent = `${targetUnits.toLocaleString('ko-KR')}개`;
      $('expectedProfit').textContent = fmt(profit);
      $('expectedProfit').className = `v ${profit >= 0 ? 'ok' : 'bad'}`;

      $('fill').style.width = `${Math.min(100, progress)}%`;
      $('fill').style.background = profit >= 0 ? 'linear-gradient(90deg,#34d399,#22d3ee)' : 'linear-gradient(90deg,#f97316,#fb7185)';
      $('barText').textContent = `예상 판매량 ${expected.toLocaleString('ko-KR')}개 / BEP ${bepUnits.toLocaleString('ko-KR')}개`;

      const tone = profit >= 0 ? 'ok' : 'warn';
      $('msg').innerHTML = profit >= 0
        ? `✅ 현재 가정 기준 월 <strong>${fmt(profit)}</strong> 이익 예상. 안전마진은 <strong>${safetyMarginUnits.toLocaleString('ko-KR')}개 (${pct(Math.max(0,safetyMarginRate))})</strong> 입니다.`
        : `⚠️ 현재 가정으로 월 <strong>${fmt(Math.abs(profit))}</strong> 손실 예상. BEP까지 <strong>${Math.max(0, -safetyMarginUnits).toLocaleString('ko-KR')}개</strong> 추가 판매가 필요합니다.`;
      $('msg').style.borderColor = tone === 'ok' ? '#2a6c65' : '#7b4b25';

      const rows = [
        ['실효 판매가(세금/수수료 반영)', fmt(netPrice), `판매가 ${price.toLocaleString('ko-KR')}원 × (1-${(taxRate*100).toFixed(1)}%)`],
        ['공헌이익률', pct(cmRatio), '1개 판매 시 고정비 회수에 기여하는 비율'],
        ['손익분기점(BEP) 판매량', `${bepUnits.toLocaleString('ko-KR')}개`, '이익 = 0이 되는 최소 판매량'],
        ['목표이익 달성 판매량', `${targetUnits.toLocaleString('ko-KR')}개`, `목표 ${fmt(targetProfit)} 반영`],
        ['예상 안전마진', `${safetyMarginUnits.toLocaleString('ko-KR')}개`, safetyMarginUnits >= 0 ? 'BEP 초과 구간' : 'BEP 미달 구간']
      ];
      $('rows').innerHTML = rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td style="text-align:left;color:#bad0f1">${r[2]}</td></tr>`).join('');
    }

    $('calcBtn').addEventListener('click', run);
    $('sampleBtn').addEventListener('click', () => {
      $('fixedCost').value = 9800000;
      $('variableCost').value = 15500;
      $('price').value = 39000;
      $('expectedUnits').value = 700;
      $('targetProfit').value = 8000000;
      $('taxRate').value = 3.3;
      run();
    });
    ['fixedCost','variableCost','price','expectedUnits','targetProfit','taxRate'].forEach(id => $(id).addEventListener('input', run));
    run();
  </script>
</body>
</html>
