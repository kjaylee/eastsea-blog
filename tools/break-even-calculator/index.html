<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손익분기점 계산기 | Break-even Calculator</title>
  <meta name="description" content="고정비, 변동비, 판매가를 입력해 손익분기점(BEP) 수량/매출과 목표 이익 달성 수량을 계산하고 차트로 확인하세요." />
  <style>
    :root {
      --bg: #0a1020;
      --panel: #101a31;
      --panel-2: #152544;
      --line: #2a3d62;
      --text: #eaf0ff;
      --muted: #9fb3d9;
      --accent: #60a5fa;
      --accent-2: #22d3ee;
      --good: #34d399;
      --bad: #fb7185;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      background: radial-gradient(circle at top, #1b2f58 0%, #0a1020 46%);
      color: var(--text);
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 20px 14px 36px; }
    .top { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.8vw, 1.9rem); }
    .sub { margin: 6px 0 0; color: var(--muted); font-size: 0.92rem; line-height: 1.45; }
    .back {
      text-decoration: none;
      color: #cde0ff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 11px;
      font-weight: 700;
      font-size: 0.84rem;
      background: #132446;
    }
    .grid { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .card {
      background: linear-gradient(160deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }
    h2 { margin: 0 0 10px; font-size: 1rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1a30;
      color: var(--text);
      font-size: 0.95rem;
    }
    input:focus { outline: 2px solid rgba(96, 165, 250, 0.3); border-color: #76b2ff; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .kpi { background: #0f1a30; border: 1px solid #284061; border-radius: 12px; padding: 10px; }
    .k { font-size: 0.76rem; color: var(--muted); }
    .v { margin-top: 4px; font-size: 1.1rem; font-weight: 800; }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .chart-wrap { margin-top: 10px; border: 1px solid var(--line); border-radius: 12px; background: #0d1730; padding: 10px; }
    canvas { width: 100%; height: 260px; display: block; border-radius: 8px; background: #0a1329; }
    .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; font-size: 0.8rem; color: var(--muted); }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
    .note {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #2f4669;
      border-radius: 10px;
      background: #0e1830;
      font-size: 0.88rem;
      line-height: 1.45;
      color: #d4e3ff;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .kpis, .two { grid-template-columns: 1fr; }
      canvas { height: 220px; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📈 손익분기점 계산기</h1>
        <p class="sub">고정비·변동비·판매가를 넣으면 BEP 수량/매출과 예상 이익을 자동 계산하고 그래프로 시각화합니다.</p>
      </div>
      <a class="back" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="two">
          <div>
            <label for="fixedCost">고정비 (원)</label>
            <input id="fixedCost" type="number" min="0" step="1000" value="12000000" />
          </div>
          <div>
            <label for="variableCost">단위당 변동비 (원)</label>
            <input id="variableCost" type="number" min="0" step="100" value="18000" />
          </div>
          <div>
            <label for="price">단위당 판매가 (원)</label>
            <input id="price" type="number" min="1" step="100" value="42000" />
          </div>
          <div>
            <label for="expectedUnits">예상 판매량 (개)</label>
            <input id="expectedUnits" type="number" min="0" step="1" value="650" />
          </div>
          <div>
            <label for="targetProfit">목표 이익 (원)</label>
            <input id="targetProfit" type="number" min="0" step="1000" value="5000000" />
          </div>
          <div>
            <label for="chartMaxUnits">차트 최대 수량 (개)</label>
            <input id="chartMaxUnits" type="number" min="10" step="10" value="1200" />
          </div>
        </div>
      </article>

      <article class="card">
        <h2>계산 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">공헌이익(개당)</div><div id="contribution" class="v">-</div></div>
          <div class="kpi"><div class="k">BEP 수량</div><div id="bepUnits" class="v">-</div></div>
          <div class="kpi"><div class="k">BEP 매출</div><div id="bepSales" class="v">-</div></div>
          <div class="kpi"><div class="k">목표 이익 달성 수량</div><div id="targetUnits" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 매출</div><div id="expectedSales" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 이익</div><div id="expectedProfit" class="v">-</div></div>
        </div>
        <div id="summary" class="note">입력값을 수정하면 즉시 계산됩니다.</div>
      </article>
    </section>

    <section class="card" style="margin-top:12px">
      <h2>손익 곡선 차트</h2>
      <div class="chart-wrap">
        <canvas id="chart" width="900" height="300" aria-label="손익분기점 차트"></canvas>
        <div class="legend">
          <span><i class="dot" style="background:#22d3ee"></i>매출선</span>
          <span><i class="dot" style="background:#fbbf24"></i>총비용선</span>
          <span><i class="dot" style="background:#34d399"></i>BEP 지점</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const money = (n) => `₩${Math.round(Number.isFinite(n) ? n : 0).toLocaleString('ko-KR')}`;
    const units = (n) => `${Math.round(Number.isFinite(n) ? n : 0).toLocaleString('ko-KR')}개`;

    function drawChart(maxUnits, price, variable, fixed, bepUnits) {
      const canvas = $('chart');
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      const pad = { l: 58, r: 20, t: 18, b: 42 };
      const chartW = w - pad.l - pad.r;
      const chartH = h - pad.t - pad.b;

      const revenueAtMax = maxUnits * price;
      const costAtMax = fixed + (maxUnits * variable);
      const yMax = Math.max(revenueAtMax, costAtMax, fixed) * 1.1;

      const x = (u) => pad.l + (u / maxUnits) * chartW;
      const y = (v) => pad.t + chartH - (v / yMax) * chartH;

      ctx.strokeStyle = '#294066';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i += 1) {
        const gy = pad.t + (chartH / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad.l, gy);
        ctx.lineTo(w - pad.r, gy);
        ctx.stroke();
      }

      ctx.strokeStyle = '#3d5d8d';
      ctx.beginPath();
      ctx.moveTo(pad.l, pad.t);
      ctx.lineTo(pad.l, h - pad.b);
      ctx.lineTo(w - pad.r, h - pad.b);
      ctx.stroke();

      ctx.strokeStyle = '#22d3ee';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x(0), y(0));
      ctx.lineTo(x(maxUnits), y(revenueAtMax));
      ctx.stroke();

      ctx.strokeStyle = '#fbbf24';
      ctx.beginPath();
      ctx.moveTo(x(0), y(fixed));
      ctx.lineTo(x(maxUnits), y(costAtMax));
      ctx.stroke();

      if (Number.isFinite(bepUnits) && bepUnits > 0 && bepUnits <= maxUnits) {
        const bepX = x(bepUnits);
        const bepY = y(bepUnits * price);
        ctx.setLineDash([6, 5]);
        ctx.strokeStyle = '#34d399';
        ctx.beginPath();
        ctx.moveTo(bepX, pad.t);
        ctx.lineTo(bepX, h - pad.b);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = '#34d399';
        ctx.beginPath();
        ctx.arc(bepX, bepY, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#b9f6e4';
        ctx.font = '12px sans-serif';
        ctx.fillText(`BEP ${Math.ceil(bepUnits).toLocaleString('ko-KR')}개`, Math.min(bepX + 8, w - 140), Math.max(20, bepY - 10));
      }

      ctx.fillStyle = '#9fb3d9';
      ctx.font = '12px sans-serif';
      ctx.fillText('0', pad.l - 12, h - pad.b + 16);
      ctx.fillText(`${Math.round(maxUnits).toLocaleString('ko-KR')}개`, w - pad.r - 32, h - pad.b + 16);
      ctx.fillText(money(yMax), pad.l + 6, pad.t + 12);
    }

    function update() {
      const fixed = Number($('fixedCost').value);
      const variable = Number($('variableCost').value);
      const price = Number($('price').value);
      const expected = Number($('expectedUnits').value);
      const targetProfit = Number($('targetProfit').value);
      let maxUnits = Number($('chartMaxUnits').value);

      if (!(fixed >= 0) || !(variable >= 0) || !(price > 0)) {
        $('summary').innerHTML = '입력값을 확인해 주세요. 판매가는 0보다 커야 합니다.';
        return;
      }

      const contribution = price - variable;
      $('contribution').textContent = money(contribution);

      if (contribution <= 0) {
        $('bepUnits').textContent = '계산 불가';
        $('bepSales').textContent = '-';
        $('targetUnits').textContent = '-';
        $('expectedSales').textContent = money(expected * price);
        $('expectedProfit').textContent = money(expected * contribution - fixed);
        $('expectedProfit').className = 'v bad';
        $('summary').innerHTML = '단위당 공헌이익이 0 이하입니다. <b>판매가 인상</b> 또는 <b>변동비 절감</b>이 필요합니다.';
        drawChart(Math.max(100, maxUnits || 100), price, variable, fixed, NaN);
        return;
      }

      const bepUnits = fixed / contribution;
      const bepSales = Math.ceil(bepUnits) * price;
      const targetUnits = (fixed + targetProfit) / contribution;
      const expectedSales = expected * price;
      const expectedProfit = expected * contribution - fixed;

      if (!(maxUnits > 0)) {
        maxUnits = Math.ceil(Math.max(bepUnits, targetUnits, expected, 100) * 1.25);
        $('chartMaxUnits').value = maxUnits;
      }
      maxUnits = Math.max(maxUnits, Math.ceil(Math.max(bepUnits, expected, targetUnits, 10)));

      $('bepUnits').textContent = units(Math.ceil(bepUnits));
      $('bepSales').textContent = money(bepSales);
      $('targetUnits').textContent = units(Math.ceil(targetUnits));
      $('expectedSales').textContent = money(expectedSales);
      $('expectedProfit').textContent = money(expectedProfit);
      $('expectedProfit').className = `v ${expectedProfit >= 0 ? 'good' : 'bad'}`;

      const gap = Math.ceil(bepUnits - expected);
      if (expectedProfit >= 0) {
        $('summary').innerHTML = `예상 판매량 기준 <b class="good">${money(expectedProfit)} 이익</b>입니다. BEP를 <b>${units(Math.max(0, expected - Math.ceil(bepUnits)))}</b> 초과했습니다.`;
      } else {
        $('summary').innerHTML = `현재 가정에서는 <b class="bad">${money(Math.abs(expectedProfit))} 손실</b>입니다. BEP까지 <b>${units(Math.max(0, gap))}</b> 추가 판매가 필요합니다.`;
      }

      drawChart(maxUnits, price, variable, fixed, bepUnits);
    }

    ['fixedCost', 'variableCost', 'price', 'expectedUnits', 'targetProfit', 'chartMaxUnits']
      .forEach((id) => $(id).addEventListener('input', update));

    update();
  </script>
</body>
</html>
