<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Break-even ROAS Calculator | 손익분기 ROAS 계산기</title>
  <meta name="description" content="AOV, 마진율, 전환율, 광고비/클릭 데이터를 기반으로 손익분기 ROAS, 최대 CPA/CPC, 현재 수익성을 계산하는 실전 퍼포먼스 마케팅 계산기" />
  <style>
    :root{--bg:#061225;--card:#0f1d38;--line:#29446f;--txt:#e8f0ff;--muted:#9cb3d8;--pri:#60a5fa;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:var(--txt);background:radial-gradient(circle at 8% 0%,#1e3a8a 0%,var(--bg) 52%)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.5}
    .home{white-space:nowrap;color:#dbeafe;text-decoration:none;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#122447}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px}
    .card{border:1px solid var(--line);border-radius:14px;padding:13px;background:linear-gradient(170deg,#152a50,#0f1d38)}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1731;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#3b82f6,#2563eb)}
    .soft{background:#152a52;border:1px solid var(--line)}
    textarea{margin-top:10px;min-height:102px;resize:vertical}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #733a43;background:rgba(248,113,113,.13);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#0d1934;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{color:var(--muted);font-size:.76rem;margin-bottom:4px}
    .v{font-size:1.15rem;font-weight:800}
    .v.sm{font-size:1.01rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#13264c;color:#bfd5fa;font-size:.76rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media (max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📈 손익분기 ROAS 계산기</h1>
        <div class="sub">광고 퍼포먼스가 손익분기점을 넘는지 즉시 확인하고, 허용 가능한 CPA/CPC 상한선을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="aov">평균 주문금액 AOV (KRW)</label><input id="aov" type="number" min="1" value="78000" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="0.1" max="100" step="0.1" value="52" /></div>
          <div><label for="cr">전환율 CR (%)</label><input id="cr" type="number" min="0.01" max="100" step="0.01" value="2.4" /></div>
          <div><label for="spend">광고비 (KRW)</label><input id="spend" type="number" min="0" value="4200000" /></div>
          <div><label for="clicks">클릭수</label><input id="clicks" type="number" min="1" step="1" value="5800" /></div>
          <div><label for="ordersOverride">실제 주문수 (선택)</label><input id="ordersOverride" type="number" min="0" step="1" placeholder="비워두면 CR 기반 계산" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">손익분기 ROAS</div><div id="beRoas" class="v">-</div></div>
          <div class="kpi"><div class="k">현재 ROAS</div><div id="currentRoas" class="v">-</div></div>
          <div class="kpi"><div class="k">허용 최대 CPA</div><div id="maxCpa" class="v sm">-</div></div>
          <div class="kpi"><div class="k">허용 최대 CPC</div><div id="maxCpc" class="v sm">-</div></div>
          <div class="kpi"><div class="k">예상 영업이익</div><div id="profit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">마진 안전여유</div><div id="safety" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">상세 계산</h2>
        <table>
          <tbody>
            <tr><th>예상 주문수</th><td id="orders">-</td></tr>
            <tr><th>매출</th><td id="revenue">-</td></tr>
            <tr><th>매출총이익</th><td id="grossProfit">-</td></tr>
            <tr><th>현재 CPA</th><td id="currentCpa">-</td></tr>
            <tr><th>현재 CPC</th><td id="currentCpc">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      aov: $('aov'), margin: $('margin'), cr: $('cr'), spend: $('spend'), clicks: $('clicks'), ordersOverride: $('ordersOverride'),
      beRoas: $('beRoas'), currentRoas: $('currentRoas'), maxCpa: $('maxCpa'), maxCpc: $('maxCpc'),
      profit: $('profit'), safety: $('safety'), orders: $('orders'), revenue: $('revenue'), grossProfit: $('grossProfit'),
      currentCpa: $('currentCpa'), currentCpc: $('currentCpc'), status: $('status'), error: $('error'),
      summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = { aov: 78000, margin: 52, cr: 2.4, spend: 4200000, clicks: 5800, ordersOverride: '' };
    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const nfmt = (n, d = 2) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });

    function validate(v) {
      if (!Number.isFinite(v.aov) || v.aov <= 0) return 'AOV는 0보다 커야 합니다.';
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return '매출총이익률은 0~100(0 제외) 범위여야 합니다.';
      if (!Number.isFinite(v.cr) || v.cr <= 0 || v.cr > 100) return '전환율은 0~100(0 제외) 범위여야 합니다.';
      if (!Number.isFinite(v.spend) || v.spend < 0) return '광고비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.clicks) || v.clicks <= 0) return '클릭수는 1 이상이어야 합니다.';
      if (v.ordersOverride !== null && (!Number.isFinite(v.ordersOverride) || v.ordersOverride < 0)) return '실제 주문수는 0 이상이어야 합니다.';
      return '';
    }

    function compute(v) {
      const marginRate = v.margin / 100;
      const crRate = v.cr / 100;

      const estimatedOrders = v.clicks * crRate;
      const orders = v.ordersOverride !== null ? v.ordersOverride : estimatedOrders;
      const revenue = orders * v.aov;
      const grossProfit = revenue * marginRate;

      const breakEvenRoas = 1 / marginRate;
      const currentRoas = v.spend > 0 ? revenue / v.spend : (revenue > 0 ? Infinity : 0);
      const maxCpa = v.aov * marginRate;
      const maxCpc = maxCpa * crRate;

      const currentCpa = orders > 0 ? v.spend / orders : Infinity;
      const currentCpc = v.clicks > 0 ? v.spend / v.clicks : Infinity;

      const profit = grossProfit - v.spend;
      const safety = Number.isFinite(currentRoas) ? ((currentRoas / breakEvenRoas) - 1) * 100 : Infinity;

      return { estimatedOrders, orders, revenue, grossProfit, breakEvenRoas, currentRoas, maxCpa, maxCpc, currentCpa, currentCpc, profit, safety };
    }

    function clearOutputs() {
      ['beRoas','currentRoas','maxCpa','maxCpc','profit','safety','orders','revenue','grossProfit','currentCpa','currentCpc'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function render() {
      const rawOrders = refs.ordersOverride.value.trim();
      const v = {
        aov: Number(refs.aov.value),
        margin: Number(refs.margin.value),
        cr: Number(refs.cr.value),
        spend: Number(refs.spend.value),
        clicks: Number(refs.clicks.value),
        ordersOverride: rawOrders === '' ? null : Number(rawOrders)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        clearOutputs();
        return;
      }

      const r = compute(v);

      refs.beRoas.textContent = `${nfmt(r.breakEvenRoas, 2)}x`;
      refs.currentRoas.textContent = Number.isFinite(r.currentRoas) ? `${nfmt(r.currentRoas, 2)}x` : '∞';
      refs.maxCpa.textContent = won(r.maxCpa);
      refs.maxCpc.textContent = won(r.maxCpc);
      refs.profit.textContent = won(r.profit);
      refs.safety.textContent = Number.isFinite(r.safety) ? `${nfmt(r.safety, 1)}%` : '∞';

      refs.orders.textContent = nfmt(r.orders, 1);
      refs.revenue.textContent = won(r.revenue);
      refs.grossProfit.textContent = won(r.grossProfit);
      refs.currentCpa.textContent = Number.isFinite(r.currentCpa) ? won(r.currentCpa) : 'N/A';
      refs.currentCpc.textContent = Number.isFinite(r.currentCpc) ? won(r.currentCpc) : 'N/A';

      if (r.profit > 0) {
        refs.status.innerHTML = `<span class="good">●</span> 현재 퍼포먼스는 손익분기 초과 (이익 ${won(r.profit)})`;
      } else if (Math.abs(r.profit) < 1) {
        refs.status.innerHTML = `<span class="warn">●</span> 손익분기 근접 구간`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> 손익분기 미달 (손실 ${won(Math.abs(r.profit))})`;
      }

      const orderSource = v.ordersOverride !== null ? '실제 주문수 입력값' : '클릭×전환율 추정치';
      refs.summary.value = [
        '[Break-even ROAS 요약]',
        `손익분기 ROAS: ${nfmt(r.breakEvenRoas, 2)}x`,
        `현재 ROAS: ${Number.isFinite(r.currentRoas) ? nfmt(r.currentRoas, 2) + 'x' : '∞'}`,
        `허용 최대 CPA/CPC: ${won(r.maxCpa)} / ${won(r.maxCpc)}`,
        `주문수(${orderSource}): ${nfmt(r.orders, 1)}`,
        `매출/총이익: ${won(r.revenue)} / ${won(r.grossProfit)}`,
        `예상 영업이익: ${won(r.profit)}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, v]) => { refs[k].value = v; });
      render();
    });

    [refs.aov, refs.margin, refs.cr, refs.spend, refs.clicks, refs.ordersOverride].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
