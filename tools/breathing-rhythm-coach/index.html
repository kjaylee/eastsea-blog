<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>호흡 리듬 코치 | Breathing Rhythm Coach</title>
  <meta name="description" content="4-7-8·박스호흡·커스텀 패턴으로 집중/진정 루틴을 진행하는 호흡 타이머. 로컬 저장, 터치/키보드 조작, 사운드 피드백 지원." />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-glow: #19193f;
      --panel: #12122a;
      --panel-2: #1a1a38;
      --line: #2d2d61;
      --text: #eef1ff;
      --muted: #9ca5cb;
      --cyan: #2bd9ff;
      --violet: #ba7bff;
      --green: #39f8c3;
      --orange: #ffbf5e;
      --danger: #ff6f92;
      --shadow: 0 0 0 1px rgba(43, 217, 255, 0.16), 0 0 24px rgba(43, 217, 255, 0.11);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 0% 0%, var(--bg-glow) 0%, var(--bg) 45%), var(--bg);
      min-height: 100dvh;
      padding: 16px 14px 36px;
      line-height: 1.45;
    }

    .wrap { max-width: 920px; margin: 0 auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chip,
    .back-link,
    .install-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(18, 18, 42, 0.84);
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 700;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .install-btn {
      cursor: pointer;
      color: #d6f8ff;
      border-color: rgba(43, 217, 255, 0.5);
      background: rgba(43, 217, 255, 0.12);
    }

    h1 {
      margin: 6px 0 8px;
      font-size: clamp(1.4rem, 4.2vw, 2.05rem);
      text-shadow: 0 0 14px rgba(43, 217, 255, 0.35);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(18, 18, 42, 0.95), rgba(10, 10, 26, 0.94));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 11px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #dffaff;
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.94rem;
    }

    input:focus,
    select:focus,
    button:focus {
      outline: 2px solid var(--cyan);
      outline-offset: 1px;
      border-color: var(--cyan);
    }

    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(16, 16, 36, 0.78);
      padding: 7px 12px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      user-select: none;
    }

    .toggle input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--cyan);
      margin: 0;
      padding: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .btn-primary {
      border: none;
      color: #060612;
      font-weight: 800;
      background: linear-gradient(135deg, rgba(43, 217, 255, 0.98), rgba(186, 123, 255, 0.95));
    }

    .btn-secondary {
      color: #f0e4ff;
      font-weight: 700;
      background: rgba(186, 123, 255, 0.17);
      border-color: rgba(186, 123, 255, 0.55);
    }

    .btn-ghost {
      color: var(--muted);
      font-weight: 700;
      background: rgba(156, 165, 203, 0.09);
    }

    .msg {
      min-height: 1.2em;
      margin-top: 8px;
      font-size: 0.83rem;
      color: var(--danger);
    }

    .session-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .phase-badge {
      border-radius: 999px;
      border: 1px solid rgba(43, 217, 255, 0.42);
      background: rgba(43, 217, 255, 0.12);
      color: #c8f7ff;
      font-size: 0.78rem;
      font-weight: 760;
      padding: 6px 10px;
    }

    .round-info {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .orb-wrap {
      display: grid;
      place-items: center;
      margin: 6px 0 4px;
      touch-action: pan-y;
      user-select: none;
    }

    .orb {
      width: min(62vw, 270px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(43, 217, 255, 0.55);
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.2), transparent 48%),
        radial-gradient(circle at 70% 75%, rgba(186, 123, 255, 0.42), transparent 55%),
        rgba(43, 217, 255, 0.08);
      box-shadow:
        0 0 34px rgba(43, 217, 255, 0.25),
        inset 0 0 18px rgba(43, 217, 255, 0.2);
      display: grid;
      place-items: center;
      position: relative;
      transition: transform 0.5s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      cursor: pointer;
    }

    .orb::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px dashed rgba(156, 165, 203, 0.38);
    }

    .orb .timer {
      font-size: clamp(2.2rem, 9vw, 3.6rem);
      font-weight: 820;
      letter-spacing: 0.02em;
      text-shadow: 0 0 18px rgba(43, 217, 255, 0.45);
    }

    .orb .tap-hint {
      font-size: 0.73rem;
      color: var(--muted);
      margin-top: 2px;
      text-align: center;
      padding: 0 16px;
    }

    .orb.inhale { transform: scale(1.08); }
    .orb.exhale { transform: scale(0.94); }
    .orb.holdIn,
    .orb.holdOut { transform: scale(1); border-color: rgba(255, 191, 94, 0.6); }

    .phase-title {
      text-align: center;
      margin: 10px 0 2px;
      font-size: 1.06rem;
      font-weight: 760;
      color: #dcf7ff;
    }

    .phase-guide {
      text-align: center;
      color: var(--muted);
      font-size: 0.87rem;
      min-height: 1.2em;
      margin-bottom: 6px;
    }

    .progress {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(156, 165, 203, 0.16);
      overflow: hidden;
      border: 1px solid rgba(43, 217, 255, 0.24);
      margin: 8px 0 0;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(43, 217, 255, 0.9), rgba(186, 123, 255, 0.95));
      transition: width 0.12s linear;
    }

    .shortcuts {
      margin-top: 9px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(20, 20, 46, 0.82);
      padding: 9px;
      min-height: 78px;
    }

    .metric .k {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric .v {
      font-size: clamp(0.98rem, 3.1vw, 1.25rem);
      font-weight: 800;
      color: var(--cyan);
    }

    .history {
      display: grid;
      gap: 7px;
      max-height: 220px;
      overflow: auto;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(16, 16, 38, 0.82);
      padding: 8px;
      font-size: 0.82rem;
    }

    .history-time {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.74rem;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 0.86rem;
    }

    @media (max-width: 760px) {
      .fields,
      .stats,
      .actions { grid-template-columns: 1fr; }

      .topbar { flex-wrap: wrap; }
      .chip { margin-left: auto; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back-link" href="../">← 도구 목록</a>
      <button id="installBtn" class="install-btn" type="button" hidden>앱으로 설치</button>
      <span class="chip">터치·키보드 지원</span>
    </div>

    <h1>🫁 호흡 리듬 코치</h1>
    <p class="subtitle">박스 호흡(4-4-4-4), 4-7-8, 커스텀 패턴으로 집중·진정 루틴을 진행하세요. 모든 설정/기록은 이 기기에만 저장됩니다.</p>

    <section class="card" aria-label="호흡 설정">
      <h2>패턴 설정</h2>
      <div class="field" style="margin-bottom:9px;">
        <label for="preset">프리셋</label>
        <select id="preset">
          <option value="box">박스 호흡 4-4-4-4</option>
          <option value="478">4-7-8 릴랙스 호흡</option>
          <option value="coherent">코히런트 5-0-5-0</option>
          <option value="custom">커스텀</option>
        </select>
      </div>

      <div class="fields">
        <div class="field">
          <label for="inhale">들이마시기(초)</label>
          <input id="inhale" type="number" min="1" max="20" value="4" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="holdIn">숨 참기(들숨 후)</label>
          <input id="holdIn" type="number" min="0" max="20" value="4" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="exhale">내쉬기(초)</label>
          <input id="exhale" type="number" min="1" max="20" value="4" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="holdOut">숨 참기(날숨 후)</label>
          <input id="holdOut" type="number" min="0" max="20" value="4" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="rounds">반복 라운드</label>
          <input id="rounds" type="number" min="1" max="40" value="8" inputmode="numeric" />
        </div>
      </div>

      <div class="toggle-row">
        <label class="toggle"><input id="sound" type="checkbox" checked /> 사운드 피드백</label>
        <label class="toggle"><input id="vibration" type="checkbox" checked /> 진동 피드백</label>
      </div>

      <div class="actions">
        <button id="saveBtn" class="btn-primary" type="button">설정 저장</button>
        <button id="defaultBtn" class="btn-secondary" type="button">기본값 복원</button>
        <button id="exportBtn" class="btn-ghost" type="button">기록 내보내기</button>
      </div>
      <p id="msg" class="msg" role="status" aria-live="polite"></p>
    </section>

    <section class="card" aria-label="호흡 세션" id="sessionCard">
      <h2>세션</h2>
      <div class="session-head">
        <span id="phaseBadge" class="phase-badge">준비</span>
        <span id="roundInfo" class="round-info">라운드 0 / 0</span>
      </div>

      <div class="orb-wrap">
        <div id="orb" class="orb" role="button" tabindex="0" aria-label="시작 또는 일시정지">
          <div class="timer" id="timer">00:04</div>
          <div class="tap-hint">탭 또는 스페이스로 시작/일시정지</div>
        </div>
      </div>

      <p id="phaseTitle" class="phase-title">들이마시기</p>
      <p id="phaseGuide" class="phase-guide">코로 천천히 숨을 채우세요</p>
      <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

      <div class="actions">
        <button id="startPauseBtn" class="btn-primary" type="button">시작</button>
        <button id="nextBtn" class="btn-secondary" type="button">다음 단계</button>
        <button id="resetBtn" class="btn-ghost" type="button">초기화</button>
      </div>
      <p class="shortcuts">단축키: <strong>Space</strong> 시작/정지 · <strong>N</strong> 다음 단계 · <strong>←/→</strong> 프리셋 전환 · <strong>R</strong> 초기화</p>
    </section>

    <section class="card" aria-label="세션 기록">
      <h2>세션 기록</h2>
      <div class="stats">
        <div class="metric"><span class="k">총 세션</span><span id="statSessions" class="v">0</span></div>
        <div class="metric"><span class="k">총 호흡 시간</span><span id="statMinutes" class="v">0분</span></div>
        <div class="metric"><span class="k">최근 7일</span><span id="statRecent" class="v">0회</span></div>
      </div>
      <div id="history" class="history"></div>
      <div class="actions" style="margin-top:10px;">
        <button id="clearHistoryBtn" class="btn-ghost" type="button">기록 삭제</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      "use strict";

      const PREFS_KEY = "breathing-rhythm-prefs-v1";
      const HISTORY_KEY = "breathing-rhythm-history-v1";
      const HISTORY_LIMIT = 80;

      const PRESETS = {
        box: { inhale: 4, holdIn: 4, exhale: 4, holdOut: 4, rounds: 8 },
        "478": { inhale: 4, holdIn: 7, exhale: 8, holdOut: 0, rounds: 6 },
        coherent: { inhale: 5, holdIn: 0, exhale: 5, holdOut: 0, rounds: 10 }
      };

      const PHASE_LABEL = {
        inhale: "들이마시기",
        holdIn: "멈춤(들숨)",
        exhale: "내쉬기",
        holdOut: "멈춤(날숨)"
      };

      const PHASE_GUIDE = {
        inhale: "코로 천천히 숨을 채우세요",
        holdIn: "어깨 힘을 빼고 잠시 유지하세요",
        exhale: "입으로 길게 숨을 내보내세요",
        holdOut: "편안하게 비운 상태를 유지하세요"
      };

      const el = {
        preset: document.getElementById("preset"),
        inhale: document.getElementById("inhale"),
        holdIn: document.getElementById("holdIn"),
        exhale: document.getElementById("exhale"),
        holdOut: document.getElementById("holdOut"),
        rounds: document.getElementById("rounds"),
        sound: document.getElementById("sound"),
        vibration: document.getElementById("vibration"),
        saveBtn: document.getElementById("saveBtn"),
        defaultBtn: document.getElementById("defaultBtn"),
        exportBtn: document.getElementById("exportBtn"),
        msg: document.getElementById("msg"),
        phaseBadge: document.getElementById("phaseBadge"),
        roundInfo: document.getElementById("roundInfo"),
        timer: document.getElementById("timer"),
        phaseTitle: document.getElementById("phaseTitle"),
        phaseGuide: document.getElementById("phaseGuide"),
        progressBar: document.getElementById("progressBar"),
        orb: document.getElementById("orb"),
        startPauseBtn: document.getElementById("startPauseBtn"),
        nextBtn: document.getElementById("nextBtn"),
        resetBtn: document.getElementById("resetBtn"),
        sessionCard: document.getElementById("sessionCard"),
        history: document.getElementById("history"),
        statSessions: document.getElementById("statSessions"),
        statMinutes: document.getElementById("statMinutes"),
        statRecent: document.getElementById("statRecent"),
        clearHistoryBtn: document.getElementById("clearHistoryBtn"),
        installBtn: document.getElementById("installBtn")
      };

      let prefs = Object.assign({
        preset: "box",
        inhale: 4,
        holdIn: 4,
        exhale: 4,
        holdOut: 4,
        rounds: 8,
        sound: true,
        vibration: true
      }, loadJSON(PREFS_KEY, {}));

      let history = loadJSON(HISTORY_KEY, []);
      if (!Array.isArray(history)) history = [];

      let phases = [];
      let state = {
        running: false,
        phaseIndex: 0,
        round: 1,
        remainingMs: 0,
        phaseDurationMs: 0,
        totalRounds: 1,
        startedAt: null
      };

      let timerId = null;
      let lastTick = 0;
      let swipeStartX = null;
      let audioCtx = null;
      let deferredPrompt = null;

      init();

      function init() {
        hydrateForm();
        buildPhases();
        resetSession(false);
        bindEvents();
        renderHistory();
        attachManifest();
        hookInstallPrompt();
      }

      function hydrateForm() {
        el.preset.value = pickPresetFromPrefs();
        el.inhale.value = String(clampInt(prefs.inhale, 1, 20, 4));
        el.holdIn.value = String(clampInt(prefs.holdIn, 0, 20, 4));
        el.exhale.value = String(clampInt(prefs.exhale, 1, 20, 4));
        el.holdOut.value = String(clampInt(prefs.holdOut, 0, 20, 4));
        el.rounds.value = String(clampInt(prefs.rounds, 1, 40, 8));
        el.sound.checked = !!prefs.sound;
        el.vibration.checked = !!prefs.vibration;
      }

      function bindEvents() {
        el.preset.addEventListener("change", () => {
          const val = el.preset.value;
          if (val !== "custom") {
            const p = PRESETS[val];
            applyPattern(p, false);
          }
          savePrefs();
          rebuildSessionAfterSettingChange();
          tone("soft");
        });

        [el.inhale, el.holdIn, el.exhale, el.holdOut, el.rounds].forEach((field) => {
          field.addEventListener("change", () => {
            if (el.preset.value !== "custom") el.preset.value = "custom";
            sanitizeInputs();
            savePrefs();
            rebuildSessionAfterSettingChange();
          });
          field.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              if (el.preset.value !== "custom") el.preset.value = "custom";
              sanitizeInputs();
              savePrefs();
              rebuildSessionAfterSettingChange();
            }
          });
        });

        el.sound.addEventListener("change", savePrefs);
        el.vibration.addEventListener("change", savePrefs);

        el.saveBtn.addEventListener("click", () => {
          sanitizeInputs();
          savePrefs();
          rebuildSessionAfterSettingChange();
          setMessage("설정을 저장했어요.", true);
          tone("ok");
        });

        el.defaultBtn.addEventListener("click", () => {
          el.preset.value = "box";
          applyPattern(PRESETS.box, true);
          setMessage("기본 패턴(박스호흡)으로 복원했어요.", true);
        });

        el.exportBtn.addEventListener("click", exportHistory);
        el.clearHistoryBtn.addEventListener("click", clearHistory);

        el.startPauseBtn.addEventListener("click", toggleStartPause);
        el.nextBtn.addEventListener("click", () => advancePhase(true));
        el.resetBtn.addEventListener("click", () => resetSession(true));

        el.orb.addEventListener("click", toggleStartPause);
        el.orb.addEventListener("keydown", (event) => {
          if (event.key === " " || event.key === "Enter") {
            event.preventDefault();
            toggleStartPause();
          }
        });

        el.sessionCard.addEventListener("pointerdown", (event) => {
          swipeStartX = event.clientX;
        });

        el.sessionCard.addEventListener("pointerup", (event) => {
          if (swipeStartX === null) return;
          const dx = event.clientX - swipeStartX;
          swipeStartX = null;
          if (Math.abs(dx) < 56) return;

          if (dx > 0) movePreset(-1);
          else movePreset(1);
        });

        window.addEventListener("keydown", (event) => {
          if (isTypingElement(event.target)) return;

          if (event.key === " " || event.key === "Spacebar") {
            event.preventDefault();
            toggleStartPause();
            return;
          }
          if (event.key.toLowerCase() === "n") {
            event.preventDefault();
            advancePhase(true);
            return;
          }
          if (event.key === "ArrowRight") {
            event.preventDefault();
            movePreset(1);
            return;
          }
          if (event.key === "ArrowLeft") {
            event.preventDefault();
            movePreset(-1);
            return;
          }
          if (event.key.toLowerCase() === "r") {
            event.preventDefault();
            resetSession(true);
          }
        });
      }

      function sanitizeInputs() {
        el.inhale.value = String(clampInt(el.inhale.value, 1, 20, 4));
        el.holdIn.value = String(clampInt(el.holdIn.value, 0, 20, 4));
        el.exhale.value = String(clampInt(el.exhale.value, 1, 20, 4));
        el.holdOut.value = String(clampInt(el.holdOut.value, 0, 20, 4));
        el.rounds.value = String(clampInt(el.rounds.value, 1, 40, 8));
      }

      function buildPhases() {
        sanitizeInputs();
        const draft = [
          { key: "inhale", sec: Number(el.inhale.value) },
          { key: "holdIn", sec: Number(el.holdIn.value) },
          { key: "exhale", sec: Number(el.exhale.value) },
          { key: "holdOut", sec: Number(el.holdOut.value) }
        ];

        phases = draft
          .filter((item) => Number.isFinite(item.sec) && item.sec > 0)
          .map((item) => Object.assign(item, {
            label: PHASE_LABEL[item.key],
            guide: PHASE_GUIDE[item.key]
          }));

        if (!phases.length) {
          phases = [{ key: "inhale", sec: 4, label: PHASE_LABEL.inhale, guide: PHASE_GUIDE.inhale }];
        }
      }

      function resetSession(userInitiated) {
        stopTicker();
        buildPhases();

        state.running = false;
        state.phaseIndex = 0;
        state.round = 1;
        state.totalRounds = clampInt(el.rounds.value, 1, 40, 8);
        state.phaseDurationMs = phases[0].sec * 1000;
        state.remainingMs = state.phaseDurationMs;
        state.startedAt = null;
        lastTick = performance.now();

        renderSession();
        if (userInitiated) {
          setMessage("세션을 초기화했습니다.", true);
          tone("soft");
        }
      }

      function rebuildSessionAfterSettingChange() {
        if (!state.running) {
          resetSession(false);
          return;
        }

        if (!window.confirm("현재 세션을 새 설정으로 다시 시작할까요?")) return;
        resetSession(false);
        setMessage("새 설정으로 세션을 다시 준비했어요.", true);
      }

      function toggleStartPause() {
        if (!state.running) {
          startSession();
        } else {
          pauseSession();
        }
      }

      function startSession() {
        if (!state.startedAt) state.startedAt = new Date().toISOString();
        state.running = true;
        el.startPauseBtn.textContent = "일시정지";
        lastTick = performance.now();
        tone("ok");
        startTicker();
      }

      function pauseSession() {
        state.running = false;
        el.startPauseBtn.textContent = "재개";
        stopTicker();
        tone("soft");
      }

      function startTicker() {
        stopTicker();
        timerId = window.setInterval(tick, 100);
      }

      function stopTicker() {
        if (timerId) {
          window.clearInterval(timerId);
          timerId = null;
        }
      }

      function tick() {
        if (!state.running) return;

        const now = performance.now();
        const delta = now - lastTick;
        lastTick = now;
        state.remainingMs -= delta;

        if (state.remainingMs <= 0) {
          advancePhase(false);
        }

        renderSession();
      }

      function advancePhase(manual) {
        buildPhases();

        if (manual) tone("soft");
        else tone("phase");

        state.phaseIndex += 1;

        if (state.phaseIndex >= phases.length) {
          state.phaseIndex = 0;
          state.round += 1;

          if (state.round > state.totalRounds) {
            finishSession();
            return;
          }
        }

        state.phaseDurationMs = phases[state.phaseIndex].sec * 1000;
        state.remainingMs = state.phaseDurationMs;
        lastTick = performance.now();

        if (prefs.vibration && navigator.vibrate) {
          navigator.vibrate(manual ? 22 : 35);
        }

        renderSession();
      }

      function finishSession() {
        stopTicker();
        state.running = false;
        el.startPauseBtn.textContent = "다시 시작";

        const summary = {
          id: uid(),
          at: new Date().toISOString(),
          preset: el.preset.value,
          inhale: Number(el.inhale.value),
          holdIn: Number(el.holdIn.value),
          exhale: Number(el.exhale.value),
          holdOut: Number(el.holdOut.value),
          rounds: state.totalRounds,
          totalSec: Math.round((sumPhaseSec() * state.totalRounds))
        };

        history.unshift(summary);
        history = history.slice(0, HISTORY_LIMIT);
        saveJSON(HISTORY_KEY, history);

        state.phaseIndex = 0;
        state.round = 1;
        state.phaseDurationMs = phases[0].sec * 1000;
        state.remainingMs = state.phaseDurationMs;
        state.startedAt = null;

        renderSession();
        renderHistory();

        setMessage("세션 완료. 잘하셨어요.", true);
        tone("finish");
        if (prefs.vibration && navigator.vibrate) navigator.vibrate([40, 40, 80]);
      }

      function renderSession() {
        const phase = phases[state.phaseIndex] || phases[0];
        const sec = Math.max(0, state.remainingMs) / 1000;
        const progress = state.phaseDurationMs <= 0
          ? 0
          : ((state.phaseDurationMs - Math.max(0, state.remainingMs)) / state.phaseDurationMs) * 100;

        el.phaseBadge.textContent = state.running ? "진행 중" : "대기";
        el.roundInfo.textContent = `라운드 ${Math.min(state.round, state.totalRounds)} / ${state.totalRounds}`;
        el.timer.textContent = formatTime(sec);
        el.phaseTitle.textContent = phase.label;
        el.phaseGuide.textContent = phase.guide;
        el.progressBar.style.width = `${Math.min(100, Math.max(0, progress))}%`;

        el.orb.classList.remove("inhale", "holdIn", "exhale", "holdOut");
        el.orb.classList.add(phase.key);
      }

      function renderHistory() {
        if (!history.length) {
          el.history.innerHTML = '<div class="empty">아직 완료된 세션이 없습니다. 첫 세션을 시작해 보세요.</div>';
        } else {
          el.history.innerHTML = history.map((item) => {
            return `<div class="history-item">${escapeHTML(presetName(item.preset))} · ${item.rounds}라운드 · ${Math.round(item.totalSec / 60)}분<span class="history-time">${formatDateTime(item.at)} · ${item.inhale}-${item.holdIn}-${item.exhale}-${item.holdOut}</span></div>`;
          }).join("");
        }

        const totalSessions = history.length;
        const totalMinutes = Math.round(history.reduce((sum, item) => sum + (item.totalSec || 0), 0) / 60);
        const recentCount = countRecentDays(history, 7);

        el.statSessions.textContent = String(totalSessions);
        el.statMinutes.textContent = `${totalMinutes}분`;
        el.statRecent.textContent = `${recentCount}회`;
      }

      function applyPattern(pattern, resetPreset) {
        el.inhale.value = String(pattern.inhale);
        el.holdIn.value = String(pattern.holdIn);
        el.exhale.value = String(pattern.exhale);
        el.holdOut.value = String(pattern.holdOut);
        el.rounds.value = String(pattern.rounds);
        if (resetPreset) el.preset.value = "box";
        savePrefs();
        resetSession(false);
      }

      function movePreset(direction) {
        const order = ["box", "478", "coherent", "custom"];
        const current = order.includes(el.preset.value) ? el.preset.value : "custom";
        const idx = order.indexOf(current);
        const next = order[(idx + direction + order.length) % order.length];

        el.preset.value = next;
        if (next !== "custom") applyPattern(PRESETS[next], false);
        savePrefs();
        resetSession(false);
        setMessage(`프리셋: ${presetName(next)}`, true);
        tone("soft");
      }

      function savePrefs() {
        sanitizeInputs();
        prefs = {
          preset: el.preset.value,
          inhale: Number(el.inhale.value),
          holdIn: Number(el.holdIn.value),
          exhale: Number(el.exhale.value),
          holdOut: Number(el.holdOut.value),
          rounds: Number(el.rounds.value),
          sound: !!el.sound.checked,
          vibration: !!el.vibration.checked
        };
        saveJSON(PREFS_KEY, prefs);
      }

      function pickPresetFromPrefs() {
        if (prefs.preset && (prefs.preset in PRESETS || prefs.preset === "custom")) return prefs.preset;
        return "box";
      }

      function clearHistory() {
        if (!window.confirm("세션 기록을 모두 삭제할까요?")) return;
        history = [];
        saveJSON(HISTORY_KEY, history);
        renderHistory();
        setMessage("기록을 삭제했습니다.", true);
        tone("soft");
      }

      function exportHistory() {
        const payload = {
          exportedAt: new Date().toISOString(),
          prefs,
          history
        };

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `breathing-rhythm-history-${todayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);

        setMessage("기록 JSON을 내보냈습니다.", true);
      }

      function sumPhaseSec() {
        return phases.reduce((sum, p) => sum + p.sec, 0);
      }

      function countRecentDays(list, days) {
        const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
        return list.filter(item => new Date(item.at).getTime() >= cutoff).length;
      }

      function presetName(key) {
        if (key === "box") return "박스호흡";
        if (key === "478") return "4-7-8";
        if (key === "coherent") return "코히런트";
        return "커스텀";
      }

      function formatTime(secFloat) {
        const sec = Math.max(0, Math.ceil(secFloat));
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      function formatDateTime(iso) {
        const d = new Date(iso);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        return `${y}.${m}.${day} ${h}:${min}`;
      }

      function todayISO() {
        const d = new Date();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${d.getFullYear()}-${m}-${day}`;
      }

      function setMessage(text, ok) {
        el.msg.textContent = text;
        el.msg.style.color = ok ? "var(--green)" : "var(--danger)";
      }

      function escapeHTML(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function uid() {
        return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function clampInt(value, min, max, fallback) {
        const n = Number(value);
        if (!Number.isFinite(n)) return fallback;
        return Math.min(max, Math.max(min, Math.round(n)));
      }

      function saveJSON(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function loadJSON(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (_) {
          return fallback;
        }
      }

      function isTypingElement(node) {
        if (!node) return false;
        const tag = String(node.tagName || "").toLowerCase();
        return tag === "input" || tag === "textarea" || node.isContentEditable;
      }

      function ensureAudio() {
        if (audioCtx) return;
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        audioCtx = new Ctx();
      }

      function tone(kind) {
        if (!prefs.sound) return;
        ensureAudio();
        if (!audioCtx) return;

        const cfg = {
          ok: { f: 620, t: 0.06, g: 0.045, type: "sine" },
          soft: { f: 500, t: 0.05, g: 0.03, type: "triangle" },
          phase: { f: 720, t: 0.07, g: 0.04, type: "sine" },
          finish: { f: 880, t: 0.1, g: 0.05, type: "triangle" }
        }[kind] || { f: 480, t: 0.05, g: 0.03, type: "sine" };

        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = cfg.type;
        osc.frequency.setValueAtTime(cfg.f, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(cfg.g, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + cfg.t);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + cfg.t + 0.01);
      }

      function attachManifest() {
        try {
          const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="110" fill="#0a0a1a"/><circle cx="256" cy="256" r="168" fill="#151533" stroke="#2bd9ff" stroke-width="14"/><path d="M160 280c37-31 76-47 118-47 42 0 81 16 118 47" fill="none" stroke="#2bd9ff" stroke-width="16" stroke-linecap="round"/><path d="M190 230c20-44 54-73 66-73s46 29 66 73" fill="none" stroke="#39f8c3" stroke-width="15" stroke-linecap="round"/><circle cx="256" cy="323" r="20" fill="#ba7bff"/></svg>`;
          const icon = `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(iconSvg)))}`;
          const manifest = {
            name: "Breathing Rhythm Coach",
            short_name: "BreathCoach",
            start_url: "./",
            display: "standalone",
            background_color: "#0a0a1a",
            theme_color: "#0a0a1a",
            icons: [
              { src: icon, sizes: "192x192", type: "image/svg+xml", purpose: "any" },
              { src: icon, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
            ]
          };
          const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
          const link = document.createElement("link");
          link.rel = "manifest";
          link.href = URL.createObjectURL(blob);
          document.head.appendChild(link);
        } catch (_) {
          // ignore
        }
      }

      function hookInstallPrompt() {
        window.addEventListener("beforeinstallprompt", (event) => {
          event.preventDefault();
          deferredPrompt = event;
          el.installBtn.hidden = false;
        });

        el.installBtn.addEventListener("click", async () => {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          try {
            await deferredPrompt.userChoice;
          } catch (_) {
            // ignore
          }
          deferredPrompt = null;
          el.installBtn.hidden = true;
        });
      }
    })();
  </script>
</body>
</html>
