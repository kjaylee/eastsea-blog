<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bundle Pricing Profit Calculator | 번들 가격 수익 계산기</title>
  <meta name="description" content="상품별 가격/원가, 번들 할인율, 결제수수료, 세율, 고정비를 반영해 번들 순이익·마진·손익분기 주문수를 계산합니다." />
  <style>
    :root{--bg:#081426;--card:#10213f;--line:#2d4a79;--txt:#eaf2ff;--muted:#a7bddf;--pri:#6aa7ff;--ok:#34d399;--warn:#fbbf24;--err:#fca5a5}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#2a4e88 0%,#081426 48%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#deebff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#11244a;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.06fr .94fr;gap:12px}
    .card{background:linear-gradient(165deg,#16305d,#10213f);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .span2{grid-column:1/-1}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0c1a35;color:var(--txt);font-size:.92rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5b80f2);font-weight:700}
    .soft{background:#18335f;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:105px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6d2f39;background:rgba(248,113,113,.12);color:var(--err);font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d39;border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.06rem;font-weight:800}
    .v.sm{font-size:.96rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;margin-top:10px;border-radius:999px;border:1px solid var(--line);background:#183461;color:#cfe1ff;font-size:.75rem}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    @media (max-width:940px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.row3{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🧮 Bundle Pricing Profit Calculator</h1>
        <div class="sub">번들 할인 전략이 실제 순이익을 키우는지, 수수료·세금·원가까지 포함해 검증합니다.</div>
      </div>
      <a class="home" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>상품/비용 입력</h2>

        <div class="inputs">
          <div class="span2 row3">
            <div><label for="priceA">상품 A 가격 (USD)</label><input id="priceA" type="number" min="0" step="0.01" value="49" /></div>
            <div><label for="priceB">상품 B 가격 (USD)</label><input id="priceB" type="number" min="0" step="0.01" value="39" /></div>
            <div><label for="priceC">상품 C 가격 (USD)</label><input id="priceC" type="number" min="0" step="0.01" value="29" /></div>
          </div>
          <div class="span2 row3">
            <div><label for="costA">상품 A 원가 (USD)</label><input id="costA" type="number" min="0" step="0.01" value="8" /></div>
            <div><label for="costB">상품 B 원가 (USD)</label><input id="costB" type="number" min="0" step="0.01" value="6" /></div>
            <div><label for="costC">상품 C 원가 (USD)</label><input id="costC" type="number" min="0" step="0.01" value="5" /></div>
          </div>

          <div><label for="discount">번들 할인율 (%)</label><input id="discount" type="number" min="0" max="95" step="0.1" value="24" /></div>
          <div><label for="bundleOrders">월 번들 주문 수</label><input id="bundleOrders" type="number" min="1" step="1" value="850" /></div>
          <div><label for="standaloneOrders">비교용 월 단품 주문 수</label><input id="standaloneOrders" type="number" min="0" step="1" value="620" /></div>
          <div><label for="feePct">결제 수수료율 (%)</label><input id="feePct" type="number" min="0" max="30" step="0.1" value="3.4" /></div>
          <div><label for="feeFixed">주문당 고정 수수료 (USD)</label><input id="feeFixed" type="number" min="0" step="0.01" value="0.3" /></div>
          <div><label for="taxPct">간접세율 (%)</label><input id="taxPct" type="number" min="0" max="40" step="0.1" value="10" /></div>
          <div class="span2"><label for="fixedCost">월 고정비 (USD)</label><input id="fixedCost" type="number" min="0" step="0.01" value="12000" /></div>
        </div>

        <div class="btns">
          <button id="copy" class="soft" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>번들 성과 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">번들 판매가</div><div id="bundlePrice" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순이익 (Bundle)</div><div id="netProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">순이익률</div><div id="margin" class="v sm">-</div></div>
          <div class="kpi"><div class="k">주문당 공헌이익</div><div id="contribution" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 주문수</div><div id="breakEven" class="v sm">-</div></div>
          <div class="kpi"><div class="k">단품 시나리오 대비 이익 차이</div><div id="profitLift" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">계산 대기</div>

        <h2 style="margin-top:12px">세부 비용 구조</h2>
        <table>
          <tbody>
            <tr><th>월 매출 (Bundle)</th><td id="bundleRevenue">-</td></tr>
            <tr><th>월 변동원가</th><td id="variableCost">-</td></tr>
            <tr><th>결제 수수료</th><td id="feeCost">-</td></tr>
            <tr><th>세금</th><td id="taxCost">-</td></tr>
            <tr><th>월 고정비</th><td id="fixedCostOut">-</td></tr>
            <tr><th>단품 시나리오 순이익</th><td id="standaloneProfit">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      priceA:$('priceA'), priceB:$('priceB'), priceC:$('priceC'), costA:$('costA'), costB:$('costB'), costC:$('costC'),
      discount:$('discount'), bundleOrders:$('bundleOrders'), standaloneOrders:$('standaloneOrders'), feePct:$('feePct'), feeFixed:$('feeFixed'), taxPct:$('taxPct'), fixedCost:$('fixedCost'),
      bundlePrice:$('bundlePrice'), netProfit:$('netProfit'), margin:$('margin'), contribution:$('contribution'), breakEven:$('breakEven'), profitLift:$('profitLift'),
      bundleRevenue:$('bundleRevenue'), variableCost:$('variableCost'), feeCost:$('feeCost'), taxCost:$('taxCost'), fixedCostOut:$('fixedCostOut'), standaloneProfit:$('standaloneProfit'),
      status:$('status'), error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = {
      priceA:49, priceB:39, priceC:29, costA:8, costB:6, costC:5, discount:24, bundleOrders:850, standaloneOrders:620,
      feePct:3.4, feeFixed:0.3, taxPct:10, fixedCost:12000
    };

    const money = (n)=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString('en-US',{maximumFractionDigits:d});

    function validate(v){
      const nums = Object.values(v);
      if (nums.some(n=>!Number.isFinite(n))) return '모든 입력값을 숫자로 입력하세요.';
      if ([v.priceA,v.priceB,v.priceC].some(n=>n<0) || [v.costA,v.costB,v.costC].some(n=>n<0)) return '가격과 원가는 0 이상이어야 합니다.';
      if (v.priceA + v.priceB + v.priceC <= 0) return '상품 가격 합계는 0보다 커야 합니다.';
      if (v.discount < 0 || v.discount > 95) return '번들 할인율은 0~95% 범위여야 합니다.';
      if (!Number.isInteger(v.bundleOrders) || v.bundleOrders < 1) return '월 번들 주문 수는 1 이상의 정수여야 합니다.';
      if (!Number.isInteger(v.standaloneOrders) || v.standaloneOrders < 0) return '비교용 단품 주문 수는 0 이상의 정수여야 합니다.';
      if (v.feePct < 0 || v.feePct > 30) return '결제 수수료율은 0~30% 범위여야 합니다.';
      if (v.feeFixed < 0 || v.feeFixed > 100) return '고정 수수료는 0~100 범위여야 합니다.';
      if (v.taxPct < 0 || v.taxPct > 40) return '세율은 0~40% 범위여야 합니다.';
      if (v.fixedCost < 0) return '월 고정비는 0 이상이어야 합니다.';
      return '';
    }

    function calcScenario(unitPrice, orders, sumCost, feePct, feeFixed, taxPct, fixedCost){
      const revenue = unitPrice * orders;
      const variable = sumCost * orders;
      const fee = revenue * (feePct / 100) + feeFixed * orders;
      const tax = revenue * (taxPct / 100);
      const net = revenue - variable - fee - tax - fixedCost;
      return { revenue, variable, fee, tax, net };
    }

    function compute(v){
      const listPrice = v.priceA + v.priceB + v.priceC;
      const sumCost = v.costA + v.costB + v.costC;
      const bundlePrice = listPrice * (1 - v.discount / 100);
      if (bundlePrice <= 0) throw new Error('번들 판매가가 0 이하입니다. 할인율을 낮춰주세요.');

      const bundle = calcScenario(bundlePrice, v.bundleOrders, sumCost, v.feePct, v.feeFixed, v.taxPct, v.fixedCost);
      const standalone = calcScenario(listPrice, v.standaloneOrders, sumCost, v.feePct, v.feeFixed, v.taxPct, v.fixedCost);

      const contribution = bundlePrice
        - sumCost
        - (bundlePrice * v.feePct / 100)
        - v.feeFixed
        - (bundlePrice * v.taxPct / 100);

      const margin = bundle.revenue > 0 ? (bundle.net / bundle.revenue) * 100 : 0;
      const breakEven = contribution > 0 ? Math.ceil(v.fixedCost / contribution) : Infinity;
      const profitLift = bundle.net - standalone.net;

      const values = [listPrice,sumCost,bundlePrice,bundle.revenue,bundle.variable,bundle.fee,bundle.tax,bundle.net,contribution,margin,profitLift];
      if (values.some(val=>!Number.isFinite(val))) throw new Error('계산 결과가 비정상입니다. 입력값을 확인해주세요.');

      return { listPrice, sumCost, bundlePrice, bundle, standalone, contribution, margin, breakEven, profitLift };
    }

    function render(){
      const v = {
        priceA:Number(refs.priceA.value), priceB:Number(refs.priceB.value), priceC:Number(refs.priceC.value),
        costA:Number(refs.costA.value), costB:Number(refs.costB.value), costC:Number(refs.costC.value),
        discount:Number(refs.discount.value), bundleOrders:Number(refs.bundleOrders.value), standaloneOrders:Number(refs.standaloneOrders.value),
        feePct:Number(refs.feePct.value), feeFixed:Number(refs.feeFixed.value), taxPct:Number(refs.taxPct.value), fixedCost:Number(refs.fixedCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        ['bundlePrice','netProfit','margin','contribution','breakEven','profitLift','bundleRevenue','variableCost','feeCost','taxCost','fixedCostOut','standaloneProfit'].forEach(k=>refs[k].textContent='-');
        refs.status.textContent = '입력값 확인 필요';
        refs.summary.value = '';
        return;
      }

      try {
        const r = compute(v);
        refs.bundlePrice.textContent = money(r.bundlePrice);
        refs.netProfit.textContent = money(r.bundle.net);
        refs.margin.textContent = `${num(r.margin,2)}%`;
        refs.contribution.textContent = money(r.contribution);
        refs.breakEven.textContent = Number.isFinite(r.breakEven) ? `${num(r.breakEven,0)} orders` : '손익분기 불가';
        refs.profitLift.textContent = money(r.profitLift);

        refs.bundleRevenue.textContent = money(r.bundle.revenue);
        refs.variableCost.textContent = money(r.bundle.variable);
        refs.feeCost.textContent = money(r.bundle.fee);
        refs.taxCost.textContent = money(r.bundle.tax);
        refs.fixedCostOut.textContent = money(v.fixedCost);
        refs.standaloneProfit.textContent = money(r.standalone.net);

        refs.status.innerHTML = r.profitLift >= 0
          ? `<span class="ok">●</span> 단품 시나리오 대비 이익 개선 (${money(r.profitLift)})`
          : `<span class="warn">●</span> 단품 시나리오 대비 이익 감소 (${money(Math.abs(r.profitLift))})`;

        refs.summary.value = [
          '[Bundle Pricing Profit Summary]',
          `Bundle price: ${money(r.bundlePrice)} (List total ${money(r.listPrice)})`,
          `Bundle monthly net profit: ${money(r.bundle.net)}`,
          `Net margin: ${num(r.margin,2)}%`,
          `Contribution per order: ${money(r.contribution)}`,
          `Break-even orders: ${Number.isFinite(r.breakEven) ? num(r.breakEven,0) : 'Not reachable'}`,
          `Standalone scenario net profit: ${money(r.standalone.net)}`,
          `Profit delta (bundle - standalone): ${money(r.profitLift)}`
        ].join('\n');
      } catch (e) {
        refs.error.classList.add('show');
        refs.error.textContent = e.message || '계산 중 오류가 발생했습니다.';
      }
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('클립보드 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.priceA,refs.priceB,refs.priceC,refs.costA,refs.costB,refs.costC,refs.discount,refs.bundleOrders,refs.standaloneOrders,refs.feePct,refs.feeFixed,refs.taxPct,refs.fixedCost]
        .forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
