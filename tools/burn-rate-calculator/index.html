<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burn Rate 계산기 | Burn Rate Calculator</title>
  <meta name="description" content="현금 잔액 변화를 기준으로 Gross/Net Burn Rate와 런웨이를 계산합니다." />
  <style>
    :root{--bg:#0d1424;--card:#141f35;--line:#2b3f63;--text:#e6efff;--muted:#9eb2d8;--pri:#818cf8;--pri2:#22d3ee;--ok:#34d399;--warn:#fbbf24;--bad:#fb7185}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% -10%,#21375f,#0d1424 55%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 42px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.85rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.9rem}
    .back{color:#dbe7ff;text-decoration:none;border:1px solid var(--line);background:#132444;padding:8px 11px;border-radius:10px;font-weight:700;font-size:.86rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:linear-gradient(160deg,#1b2d52,#141f35);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 12px 28px rgba(0,0,0,.35)}
    h2{margin:0 0 10px;font-size:1rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin:0 0 6px;font-weight:700}
    input,button{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0f1a31;color:var(--text);font-size:.92rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#071529;font-weight:800}.ghost{background:#16294b;border:1px solid var(--line);color:#cfe0ff}
    .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{border:1px solid var(--line);background:#0f1931;border-radius:12px;padding:10px}.k{font-size:.74rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .msg{margin-top:9px;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0f1a31;font-size:.9rem;line-height:1.45}
    .table{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:620px}th,td{padding:8px;border-bottom:1px solid #243d63;font-size:.82rem;text-align:right}th:first-child,td:first-child{text-align:left}th{background:#13274c;color:#bfd0ef;font-size:.76rem}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>🔥 Burn Rate 계산기</h1>
      <p class="sub">현금 감소 속도를 기반으로 Gross Burn, Net Burn, 런웨이를 계산합니다.</p>
    </div>
    <a class="back" href="/">Back to Portal</a>
  </div>

  <section class="grid">
    <article class="card">
      <h2>입력값</h2>
      <div class="two">
        <div><label for="startCash">기간 시작 현금 (원)</label><input id="startCash" type="number" min="0" step="100000" value="980000000"></div>
        <div><label for="endCash">기간 종료 현금 (원)</label><input id="endCash" type="number" min="0" step="100000" value="860000000"></div>
        <div><label for="months">관찰 기간 (개월)</label><input id="months" type="number" min="1" step="1" value="3"></div>
        <div><label for="monthlyRevenue">현재 월 매출 (원)</label><input id="monthlyRevenue" type="number" min="0" step="100000" value="85000000"></div>
        <div><label for="monthlyExpense">현재 월 비용 (원)</label><input id="monthlyExpense" type="number" min="0" step="100000" value="127000000"></div>
        <div><label for="oneOffAdj">일회성 조정(유입+, 유출-) (원)</label><input id="oneOffAdj" type="number" step="100000" value="0"></div>
      </div>
      <div class="btns">
        <button id="calcBtn" type="button">계산</button>
        <button id="sampleBtn" class="ghost" type="button">샘플</button>
      </div>
    </article>

    <article class="card">
      <h2>결과</h2>
      <div class="kpis">
        <div class="kpi"><div class="k">Gross Burn (월)</div><div class="v" id="grossBurn">-</div></div>
        <div class="kpi"><div class="k">Net Burn (월)</div><div class="v" id="netBurn">-</div></div>
        <div class="kpi"><div class="k">현재 기준 런웨이</div><div class="v" id="runway">-</div></div>
        <div class="kpi"><div class="k">보수 시나리오 런웨이</div><div class="v" id="worstRunway">-</div></div>
        <div class="kpi"><div class="k">현금 고갈 예상일</div><div class="v" id="depletionDate">-</div></div>
        <div class="kpi"><div class="k">현금 변동률</div><div class="v" id="cashChange">-</div></div>
      </div>
      <div class="msg" id="msg">입력값을 변경하면 자동 계산됩니다.</div>
    </article>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>해석 가이드</h2>
    <div class="table">
      <table>
        <thead><tr><th>항목</th><th>값</th><th>해석</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  const $=(id)=>document.getElementById(id);
  const won=(n)=>'₩'+Math.round(n||0).toLocaleString('ko-KR');
  const pct=(v)=>`${(v*100).toFixed(2)}%`;

  function run(){
    const start=Number($('startCash').value);
    const end=Number($('endCash').value);
    const months=Math.max(1,Number($('months').value)||1);
    const revenue=Number($('monthlyRevenue').value);
    const expense=Number($('monthlyExpense').value);
    const adj=Number($('oneOffAdj').value);

    const grossBurn=expense;
    const netBurn=Math.max(0,expense-revenue);
    const observedNetBurn=(start-end-adj)/months;
    const runway=netBurn>0?end/netBurn:Infinity;
    const worstRunway=netBurn>0?end/(netBurn*1.2):Infinity;
    const change=(end-start)/Math.max(1,start);

    $('grossBurn').textContent=won(grossBurn);
    $('netBurn').textContent=won(netBurn);
    $('netBurn').className=`v ${netBurn<=0?'ok':netBurn<=25000000?'warn':'bad'}`;
    $('runway').textContent=isFinite(runway)?`${runway.toFixed(1)}개월`:'∞';
    $('runway').className=`v ${!isFinite(runway)||runway>=18?'ok':runway>=12?'warn':'bad'}`;
    $('worstRunway').textContent=isFinite(worstRunway)?`${worstRunway.toFixed(1)}개월`:'∞';

    if(isFinite(runway)){
      const d=new Date(); d.setMonth(d.getMonth()+Math.ceil(runway));
      $('depletionDate').textContent=d.toLocaleDateString('ko-KR');
    } else $('depletionDate').textContent='고갈 없음';

    $('cashChange').textContent=pct(change);
    $('cashChange').className=`v ${change>=0?'ok':'bad'}`;

    const msg = !isFinite(runway) || runway>=18
      ? '✅ 런웨이가 안정적입니다. 성장 투자 비중을 점검하며 효율 좋은 채널에 집중하세요.'
      : runway>=12
      ? '⚠️ 관리 구간입니다. 비용 증가율을 낮추고 다음 라운드 타이밍을 준비하세요.'
      : '🚨 런웨이 단축 위험 구간입니다. 즉시 비용 구조 재편과 자금 조달 계획이 필요합니다.';
    $('msg').textContent=msg;

    const rows=[
      ['관측 기준 Net Burn',won(observedNetBurn),`(시작현금 - 종료현금 - 일회성조정) ÷ ${months}개월`],
      ['운영 기준 Net Burn',won(netBurn),'월비용 - 월매출'],
      ['Gross Burn',won(grossBurn),'매출을 제외한 월 총 지출 규모'],
      ['현재 런웨이',isFinite(runway)?`${runway.toFixed(1)}개월`:'∞','종료현금 ÷ 운영 기준 Net Burn'],
      ['보수 시나리오 런웨이',isFinite(worstRunway)?`${worstRunway.toFixed(1)}개월`:'∞','Net Burn 20% 악화 가정']
    ];
    $('rows').innerHTML=rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td style="text-align:left;color:#bfd0ef">${r[2]}</td></tr>`).join('');
  }

  $('calcBtn').addEventListener('click',run);
  $('sampleBtn').addEventListener('click',()=>{
    $('startCash').value=760000000;
    $('endCash').value=640000000;
    $('months').value=2;
    $('monthlyRevenue').value=97000000;
    $('monthlyExpense').value=142000000;
    $('oneOffAdj').value=0;
    run();
  });
  ['startCash','endCash','months','monthlyRevenue','monthlyExpense','oneOffAdj'].forEach(id=>$(id).addEventListener('input',run));
  run();
</script>
</body>
</html>
