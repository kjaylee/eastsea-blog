  <style>
    :root {
      --bg1: #ff7b57;
      --bg2: #6a5cf6;
      --bg3: #1d2357;
      --card: rgba(255,255,255,0.14);
      --line: rgba(255,255,255,0.27);
      --text: #fff;
      --muted: rgba(255,255,255,0.86);
      --shadow: 0 18px 40px rgba(17, 14, 68, 0.36);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 700px at -10% -20%, rgba(255,255,255,0.2), transparent 55%),
        radial-gradient(900px 650px at 120% 10%, rgba(255,255,255,0.14), transparent 58%),
        linear-gradient(150deg, var(--bg1), var(--bg2) 46%, var(--bg3));
      padding: calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 20px);
      line-height: 1.52;
    }
    .shell { max-width: 760px; margin: 0 auto; }

    .top-progress {
      display: none;
      position: sticky;
      top: calc(env(safe-area-inset-top) + 8px);
      z-index: 20;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 9px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(24, 18, 73, 0.42);
      backdrop-filter: blur(8px);
    }
    .top-progress.show { display: flex; }
    .progress-track { flex: 1; height: 7px; border-radius: 999px; background: rgba(255,255,255,0.25); overflow: hidden; }
    .progress-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #ffe992, #ffae7f);
      transition: width .25s ease;
    }
    .progress-text { min-width: 56px; text-align: right; font-size: .83rem; color: var(--muted); font-weight: 800; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(9px);
      overflow: hidden;
      animation: fadeUp .28s ease;
    }
    .card-inner { padding: 22px; }

    .lang-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .lang-group { display: inline-flex; gap: 6px; }
    .lang-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 800;
      font-size: .82rem;
      cursor: pointer;
    }
    .lang-btn.active { background: rgba(255,255,255,0.24); border-color: rgba(255,255,255,0.58); }
    .ghost-link {
      text-decoration: none;
      color: var(--muted);
      font-size: .83rem;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
    }
    .ghost-link:hover { color: #fff; border-color: var(--line); }

    h1 { margin: 0; line-height: 1.22; font-size: clamp(1.6rem, 5.3vw, 2.16rem); }
    .subtitle { margin: 10px 0 0; color: var(--muted); font-size: .97rem; line-height: 1.58; }
    .hero-badges { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .81rem;
      font-weight: 700;
    }

    .primary-btn,
    .secondary-btn,
    .choice-btn,
    .share-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 800;
      transition: transform .14s ease, filter .14s ease;
    }
    .primary-btn:active,
    .secondary-btn:active,
    .choice-btn:active,
    .share-btn:active { transform: translateY(1px) scale(.99); }

    .primary-btn {
      margin-top: 20px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #ffe38a, #ffb167);
      color: #3a2300;
      font-size: 1rem;
      box-shadow: 0 10px 24px rgba(255, 197, 118, 0.34);
    }
    .secondary-btn {
      margin-top: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid var(--line);
    }

    .question-title { margin: 0 0 9px; font-size: 1.24rem; line-height: 1.43; }
    .question-hint { margin: 0 0 12px; font-size: .9rem; color: var(--muted); }
    .choices { display: grid; gap: 10px; }
    .choice-btn {
      padding: 14px 14px;
      text-align: left;
      color: #fff;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.32);
      font-size: .96rem;
      line-height: 1.45;
      min-height: 54px;
      touch-action: manipulation;
    }
    .choice-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.6); }

    .analyzing-wrap { text-align: center; padding: 8px 0; }
    .spinner {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,0.22);
      border-top-color: #fff;
      margin: 8px auto 14px;
      animation: spin 1s linear infinite;
    }
    .mini-track { height: 8px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.2); margin-top: 12px; }
    .mini-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #ffe38a, #ff8fa2);
      transition: width .2s ease;
    }
    .mini-text { margin-top: 7px; color: var(--muted); font-size: .9rem; }

    .result-head {
      border: 1px solid rgba(255,255,255,0.34);
      background: rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .result-type { font-size: clamp(1.18rem, 4.6vw, 1.5rem); margin: 6px 0 4px; }
    .result-summary { margin: 0; color: var(--muted); }

    .section-title { margin: 16px 0 10px; font-size: 1rem; letter-spacing: .01em; }
    .detail-text {
      margin: 0;
      white-space: pre-line;
      line-height: 1.64;
      color: rgba(255,255,255,0.95);
      font-size: .96rem;
    }

    .tips-list {
      margin: 10px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
      color: rgba(255,255,255,0.95);
      font-size: .95rem;
    }

    .chart-wrap {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      padding: 10px;
    }
    .chart-wrap canvas {
      width: 100%;
      height: 240px;
      display: block;
    }

    .axis-legend {
      margin-top: 8px;
      display: grid;
      gap: 4px;
      font-size: .82rem;
      color: var(--muted);
    }

    .share-grid {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0,1fr));
    }
    .share-btn {
      padding: 11px 10px;
      font-size: .9rem;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(4px);
    }
    .share-btn:hover { filter: brightness(1.07); }

    .saved-note {
      margin-top: 10px;
      padding: 10px 11px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.1);
      font-size: .85rem;
      color: var(--muted);
    }

    .promo-wrap {
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.25);
      padding-top: 12px;
    }
    .promo-list {
      margin: 8px 0 0;
      display: grid;
      gap: 8px;
    }
    .promo-link {
      text-decoration: none;
      color: #fff;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.11);
      padding: 10px 12px;
      font-size: .9rem;
    }

    .disclaimer {
      margin-top: 12px;
      font-size: .82rem;
      color: rgba(255,255,255,0.75);
      border-top: 1px dashed rgba(255,255,255,0.28);
      padding-top: 10px;
      line-height: 1.45;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 20px);
      transform: translateX(-50%) translateY(20px);
      background: rgba(22,20,46,0.9);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: .86rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 40;
      max-width: calc(100% - 30px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 420px) {
      .card-inner { padding: 18px; }
      .share-grid { grid-template-columns: 1fr; }
      .question-title { font-size: 1.16rem; }
    }
  </style>

      {

      },
      {
        q: { ko: '동료/고객과 소통할 때 내 정서 반응은?', en: 'What is your emotional response in communication with coworkers/clients?' },

      render();
    }

    function setLang(lang) {
      state.lang = lang;
      render();
    }

    function pickAnswer(index) {
      if (state.phase !== 'question') return;
      haptic('selection');
      const item = QUESTIONS[state.current];
      const option = item.options[index];
      if (!option) return;

      state.answers.push({ qIndex: state.current, optionIndex: index });
      for (const key of Object.keys(state.scores)) {
        state.scores[key] += Number(option.score[key] || 0);
      }

      if (state.current >= QUESTIONS.length - 1) {
        goAnalyze();
      } else {
        state.current += 1;
        render();
      }
    }

    function goAnalyze() {
      state.phase = 'analyzing';
      state.analyzingPct = 8;
      render();
      const started = Date.now();
      clearInterval(analyzingTimer);
      analyzingTimer = setInterval(() => {
        const elapsed = Date.now() - started;
        state.analyzingPct = Math.min(100, 8 + Math.round(elapsed / 15));
        const fill = document.getElementById('miniFill');
        const txt = document.getElementById('miniText');
        if (fill) fill.style.width = state.analyzingPct + '%';
        if (txt) txt.textContent = state.analyzingPct + '%';
        if (elapsed > 1500) {
          clearInterval(analyzingTimer);
          finalizeResult();
        }
      }, 40);
    }

    function totalMax() {
      return QUESTIONS.length * 3;
    }

    function normalizeScores() {
      const max = totalMax();
      const e = Math.round((state.scores.energy / max) * 100);
      const x = Math.round((state.scores.exhaustion / max) * 100);
      const c = Math.round((state.scores.cynicism / max) * 100);
      const d = Math.round((state.scores.efficacyDrop / max) * 100);
      return {
        energy: Math.max(0, Math.min(100, e)),
        exhaustion: Math.max(0, Math.min(100, x)),
        cynicism: Math.max(0, Math.min(100, c)),
        efficacyDrop: Math.max(0, Math.min(100, d))
      };
    }

    function resolveType(normalized) {
      const risk = Math.round((normalized.exhaustion * 0.4) + (normalized.efficacyDrop * 0.3) + (normalized.cynicism * 0.2) + ((100 - normalized.energy) * 0.1));

      if ((normalized.exhaustion >= 68 || normalized.efficacyDrop >= 68) && normalized.energy <= 42) {
        return 'exhaustion';
      }
      if (normalized.cynicism >= 66 && normalized.energy <= 46) {
        return 'cynic';
      }
      if (risk >= 48 || normalized.exhaustion >= 46 || normalized.efficacyDrop >= 46) {
        return 'strain';
      }
      return 'stable';
    }

    function finalizeResult() {
      const normalized = normalizeScores();
      const type = resolveType(normalized);
      const result = {
        type,
        normalized,
        savedAt: new Date().toISOString()
      };
      state.result = result;
      saveResult(result);
      state.phase = 'result';
      render();
      setTimeout(drawChart, 30);
    }

    function serviceUrl() {
      return location.origin + '/tools/burnout-check/';
    }

    function composeShareText() {
      const info = RESULTS[state.result.type];
      return tr('shareText', { type: tv(info.name) });
    }

    function shareKakao() {
      const url = serviceUrl();
      const text = encodeURIComponent(composeShareText());
      const target = `https://sharer.kakao.com/talk/friends/picker/link?url=${encodeURIComponent(url)}&text=${text}`;
      window.open(target, '_blank', 'noopener');
    }

    function shareTwitter() {
      const url = serviceUrl();
      const text = encodeURIComponent(composeShareText());
      const target = `https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(url)}`;
      window.open(target, '_blank', 'noopener');
    }

    async function copyLink() {
      const url = serviceUrl();
      try {
        await navigator.clipboard.writeText(url);
      } catch (_) {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      showToast(tr('copyDone'));
    }

    function drawChart() {
      const canvas = document.getElementById('resultChart');
      if (!canvas || !state.result) return;
      const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);

      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const labels = [
        tr('axisEnergy'),
        tr('axisExhaustion'),
        tr('axisCynicism'),
        tr('axisEfficacy')
      ];
      const values = [
        state.result.normalized.energy,
        state.result.normalized.exhaustion,
        state.result.normalized.cynicism,
        state.result.normalized.efficacyDrop
      ];

      const left = 110;
      const right = width - 16;
      const top = 12;
      const barH = 34;
      const gap = 16;

      ctx.font = '600 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Noto Sans KR,sans-serif';
      ctx.textBaseline = 'middle';

      values.forEach((v, i) => {
        const y = top + i * (barH + gap);
        const trackW = right - left;
        const fillW = Math.max(0, Math.min(trackW, (v / 100) * trackW));

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        roundRect(ctx, left, y, trackW, barH, 10);
        ctx.fill();

        const grad = ctx.createLinearGradient(left, y, left + fillW, y);
        grad.addColorStop(0, i === 0 ? '#7ef7be' : '#ffd181');
        grad.addColorStop(1, i === 0 ? '#4de5b5' : '#ff8aa0');
        ctx.fillStyle = grad;
        roundRect(ctx, left, y, fillW, barH, 10);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.fillText(labels[i], 10, y + barH / 2);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.fillText(v + '%', right - 8, y + barH / 2);
        ctx.textAlign = 'left';
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function renderIntro() {
      const saved = state.savedRaw;
      const savedLine = saved
        ? `<div class="saved-note">${tr('prevResult', {
            type: tv(RESULTS[saved.type]?.name || { ko: saved.type, en: saved.type }),
            time: formatSavedTime(saved.savedAt)
          })}</div>`
        : '';

      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="lang-row">
              <div class="lang-group">
                <button class="lang-btn ${state.lang === 'ko' ? 'active' : ''}" data-lang="ko">한국어</button>
                <button class="lang-btn ${state.lang === 'en' ? 'active' : ''}" data-lang="en">English</button>
              </div>
              <a class="ghost-link" href="/tools/">All Tools ↗</a>
            </div>
            <h1>${tr('title')}</h1>
            <p class="subtitle">${tr('subtitle')}</p>
            <div class="hero-badges">
              <span class="badge">${tr('elapsed')}</span>
              <span class="badge">${tr('questionsBadge')}</span>
              <span class="badge">${tr('baseBadge')}</span>
            </div>
            ${savedLine}
            <button class="primary-btn" id="startBtn">${tr('start')}</button>
            <p class="disclaimer">${tr('disclaimer')}</p>
          </div>
        </section>
      `;

      app.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLang(btn.dataset.lang));
      });
      document.getElementById('startBtn').addEventListener('click', startQuiz);
    }

    function renderQuestion() {
      const item = QUESTIONS[state.current];
      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <h2 class="question-title">Q${state.current + 1}. ${tv(item.q)}</h2>
            <p class="question-hint">${tr('hint')}</p>
            <div class="choices">
              ${item.options.map((opt, i) => `<button class="choice-btn" data-index="${i}">${tv(opt.text)}</button>`).join('')}
            </div>
          </div>
        </section>
      `;
      app.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => pickAnswer(Number(btn.dataset.index)));
      });
    }

    function renderAnalyzing() {
      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="analyzing-wrap">
              <div class="spinner"></div>
              <h2>${tr('analyzingTitle')}</h2>
              <p class="subtitle">${tr('analyzingDesc')}</p>
              <div class="mini-track"><div class="mini-fill" id="miniFill" style="width:${state.analyzingPct}%"></div></div>
              <div class="mini-text" id="miniText">${state.analyzingPct}%</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderResult() {
      const info = RESULTS[state.result.type];
      const axes = [
        `${tr('axisEnergy')}: ${state.result.normalized.energy}%`,
        `${tr('axisExhaustion')}: ${state.result.normalized.exhaustion}%`,
        `${tr('axisCynicism')}: ${state.result.normalized.cynicism}%`,
        `${tr('axisEfficacy')}: ${state.result.normalized.efficacyDrop}%`
      ];

      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="result-head">
              <div>${info.emoji}</div>
              <h2 class="result-type">${tr('resultTitle')} · ${tv(info.name)}</h2>
              <p class="result-summary">${tv(info.summary)}</p>
            </div>

            <h3 class="section-title">${tr('chartTitle')}</h3>
            <div class="chart-wrap">
              <canvas id="resultChart" width="640" height="240" aria-label="Burnout score chart"></canvas>
              <div class="axis-legend">${axes.map(v => `<span>${v}</span>`).join('')}</div>
            </div>

            <h3 class="section-title">${tr('tipsTitle')}</h3>
            <p class="detail-text">${tv(info.detail)}</p>
            <ul class="tips-list">
              ${info.tips[state.lang].map(t => `<li>${t}</li>`).join('')}
            </ul>

            <div class="share-grid">
              <button class="share-btn" id="shareKakao">${tr('shareKakao')}</button>
              <button class="share-btn" id="shareTwitter">${tr('shareTwitter')}</button>
              <button class="share-btn" id="shareLink">${tr('shareLink')}</button>
            </div>

            <button class="secondary-btn" id="restartBtn">${tr('restart')}</button>

            <div class="promo-wrap">
              <h3 class="section-title">${tr('promoTitle')}</h3>
              <div class="promo-list">
                ${PROMOS.map(p => `<a class="promo-link" href="${p.href}">${state.lang === 'ko' ? p.ko : p.en}</a>`).join('')}
              </div>
            </div>

            <p class="disclaimer">${tr('disclaimer')}</p>
          </div>
        </section>
      `;

      document.getElementById('shareKakao').addEventListener('click', shareKakao);
      document.getElementById('shareTwitter').addEventListener('click', shareTwitter);
      document.getElementById('shareLink').addEventListener('click', copyLink);
      document.getElementById('restartBtn').addEventListener('click', () => {
        state.phase = 'intro';
        state.current = 0;
        state.scores = freshScores();
        state.answers = [];
        state.result = null;
        render();
      });
    }

    function render() {
      updateTopProgress();
      if (state.phase === 'intro') return renderIntro();
      if (state.phase === 'question') return renderQuestion();
      if (state.phase === 'analyzing') return renderAnalyzing();
      return renderResult();
    }

    window.addEventListener('resize', () => {
      if (state.phase === 'result') drawChart();
    });

    render();
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
