      function calculateResult(score) {
        const ex = score.exhaustion;
        const de = score.detachment;
        const ov = score.overload;
        const re = score.recovery;

        if (re >= ex && re >= de && re >= ov && re >= 20) {
          return 'recovery-rhythm';
        }

        const overloadBias = (ov * 1.15) + (ex * 0.7);
        const detachBias = (de * 1.2) + (ex * 0.35);
        const drainBias = (ex * 1.25) + (ov * 0.5);

        if (overloadBias >= detachBias && overloadBias >= drainBias) return 'overload-stack';
        if (detachBias >= overloadBias && detachBias >= drainBias) return 'detached-mode';
        return 'energy-drain';
      }

      function persistResult() {
        const payload = {
          service: SERVICE_ID,
          resultKey: state.resultKey,
          scores: state.scores,
          at: new Date().toISOString()
        };
        localStorage.setItem(STORE_KEY, JSON.stringify(payload));
        try {
          const historyRaw = localStorage.getItem(STORE_HISTORY);
          const history = historyRaw ? JSON.parse(historyRaw) : [];
          history.unshift(payload);
          localStorage.setItem(STORE_HISTORY, JSON.stringify(history.slice(0, 10)));
        } catch (_) {}
      }

      function drawChart(result) {
        const canvas = document.getElementById('resultChart');
        if (!canvas) return;
        const dpr = window.devicePixelRatio || 1;
        const cssW = canvas.clientWidth || 320;
        const cssH = canvas.clientHeight || 240;
        canvas.width = Math.floor(cssW * dpr);
        canvas.height = Math.floor(cssH * dpr);

        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        ctx.scale(dpr, dpr);

        const labels = state.lang === 'ko'
          ? ['과부하', '에너지 소모', '집중 마찰', '경계 경직', '회복력']
          : ['Load', 'Drain', 'Friction', 'Boundary', 'Recovery'];

        const values = [
          result.traits.load,
          result.traits.drain,
          result.traits.friction,
          result.traits.boundary,
          result.traits.recovery
        ];

        const pad = 18;
        const gap = 10;
        const barW = (cssW - pad * 2 - gap * (values.length - 1)) / values.length;

        ctx.clearRect(0, 0, cssW, cssH);
        ctx.fillStyle = 'rgba(255,255,255,.08)';
        ctx.fillRect(0, 0, cssW, cssH);

        for (let i = 0; i < values.length; i++) {
          const x = pad + i * (barW + gap);
          const barH = Math.max(6, (values[i] / 100) * (cssH - 60));
          const y = cssH - 34 - barH;

          const grad = ctx.createLinearGradient(x, y, x, y + barH);
          grad.addColorStop(0, '#ffe48f');
          grad.addColorStop(1, '#ff8fb5');

          ctx.fillStyle = 'rgba(255,255,255,.16)';
          ctx.fillRect(x, 18, barW, cssH - 52);
          ctx.fillStyle = grad;
          ctx.fillRect(x, y, barW, barH);

          ctx.fillStyle = 'rgba(255,255,255,.95)';
          ctx.font = '12px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(String(values[i]), x + barW / 2, y - 6);
          ctx.fillStyle = 'rgba(255,255,255,.82)';
          wrapLabel(ctx, labels[i], x + barW / 2, cssH - 16, barW + 16, 11);
        }
      }

      function wrapLabel(ctx, text, cx, y, maxW, size) {
        ctx.font = `${size}px sans-serif`;
        const words = text.split(' ');
        let line = '';
        let lines = [];
        words.forEach((w) => {
          const test = line ? `${line} ${w}` : w;
          if (ctx.measureText(test).width > maxW) {
            lines.push(line);
            line = w;
          } else {
            line = test;
          }
        });
        if (line) lines.push(line);
        lines = lines.slice(0, 2);
        lines.forEach((ln, idx) => {
          ctx.fillText(ln, cx, y + idx * 11);
        });
      }

        const url = shareUrl();

        if (kind === 'kakao') {
          if (window.Kakao && window.Kakao.Share) {
            try {
              window.Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                  title: text,
                  description: txt(result.summary),
                  imageUrl: 'https://tools.eastsea.xyz/assets/og-image.png',
                  link: { mobileWebUrl: url, webUrl: url }
                }
              });
              return;
            } catch (_) {}
          }
          openPopup(`https://story.kakao.com/share?url=${encodeURIComponent(url)}`);
          return;
        }

        if (kind === 'twitter') {
          openPopup(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`);
          return;
        }

        navigator.clipboard.writeText(url)
          .then(() => alert(u().copyDone))
          .catch(() => alert(u().copyFail));
      }

      function renderResult() {
        showTop(false);
        const result = RESULTS[state.resultKey] || RESULTS['energy-drain'];

        app.innerHTML = `
          <section class="card">
            <div class="inner">
              ${renderLangRow()}
              <div class="result-head">
                <div>${result.emoji}</div>
                <h2 class="rtype">${txt(result.name)}</h2>
                <p class="rsum">${txt(result.summary)}</p>
                <p class="sub">${u().compat}: <strong>${txt(result.compatible)}</strong></p>
              </div>

              <h3 class="sec">${u().sectionDetail}</h3>
              <p class="detail">${txt(result.detail)}</p>

              <h3 class="sec">${u().sectionTips}</h3>
              <ul class="tips">${result.tips[state.lang].map((tip) => `<li>${tip}</li>`).join('')}</ul>

              <h3 class="sec">${u().sectionChart}</h3>
              <div class="chart"><canvas id="resultChart" aria-label="result chart"></canvas></div>

              <div class="share-grid">
                <button class="share" data-share="kakao">${u().shareKakao}</button>
                <button class="share" data-share="twitter">${u().shareTwitter}</button>
                <button class="share" data-share="copy">${u().shareLink}</button>
              </div>

              <button id="restartBtn" class="btn btn-sub">${u().restart}</button>

              <div class="promo">
                <strong>${u().promoTitle}</strong>
                <div class="promo-list">
                  <a href="/tools/stress-coping/">Stress Coping Style</a>
                  <a href="/tools/resilience-rhythm-check/">Resilience Rhythm Check</a>
                  <a href="/tools/decision-fatigue-check/">Decision Fatigue Check</a>
                </div>
              </div>

              <p class="disclaimer">${u().disclaimer}</p>
            </div>
          </section>
        `;

        bindLangButtons();
        requestAnimationFrame(() => drawChart(result));

        const shareButtons = app.querySelectorAll('[data-share]');
        shareButtons.forEach((btn) => {
          btn.addEventListener('click', () => {
            const kind = btn.dataset.share;
            handleShare(kind, result);
          });
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
          haptic('impact');
          state.screen = 'intro';
          state.index = 0;
          state.answers = [];
          state.scores = blankScore();
          state.resultKey = null;
          render();
        });
      }

      function bindLangButtons() {
        app.querySelectorAll('[data-lang]').forEach((btn) => {
          btn.addEventListener('click', () => {
            setLang(btn.dataset.lang);
          });
        });
      }

      function render() {
        if (state.screen === 'intro') return renderIntro();
        if (state.screen === 'question') return renderQuestion();
        if (state.screen === 'analyzing') return renderAnalyzing();
        return renderResult();
      }

      render();
    })();
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
