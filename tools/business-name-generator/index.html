<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사업체 이름 생성기</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #0f766e;
      --primary-dark: #0d5f58;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 20px;
    }
    .container {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.55rem;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.93rem;
    }
    .form {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.86rem;
      font-weight: 700;
      color: #374151;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 13px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }
    button:hover { background: var(--primary-dark); }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .name-card {
      border: 1px solid #dbe3e8;
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 6px;
    }
    .name {
      font-size: 1.05rem;
      font-weight: 800;
      color: #0f172a;
      word-break: break-word;
    }
    .tag {
      display: inline-block;
      font-size: 0.75rem;
      border-radius: 999px;
      padding: 4px 8px;
      background: #ecfeff;
      color: #155e75;
      border: 1px solid #a5f3fc;
      width: fit-content;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }
    .links a {
      text-decoration: none;
      font-size: 0.82rem;
      color: #0c4a6e;
      border: 1px solid #bae6fd;
      background: #f0f9ff;
      border-radius: 8px;
      padding: 4px 8px;
    }
    .links a:hover { background: #e0f2fe; }

    @media (max-width: 900px) {
      .form { grid-template-columns: 1fr 1fr; }
      .result-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      body { padding: 14px; }
      .form { grid-template-columns: 1fr; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>사업체 이름 생성기</h1>
      <p class="sub">업종·키워드·스타일을 입력하면 AI 없이 조합 알고리즘으로 후보 20개를 생성합니다.</p>

      <div class="form">
        <div>
          <label for="industry">업종</label>
          <input id="industry" placeholder="예: 카페, IT, 교육" />
        </div>
        <div>
          <label for="keywords">키워드 (쉼표로 구분)</label>
          <input id="keywords" placeholder="예: 바다, 빠른, 신뢰" />
        </div>
        <div>
          <label for="style">스타일</label>
          <select id="style">
            <option value="modern">모던</option>
            <option value="classic">클래식</option>
            <option value="humor">유머</option>
            <option value="minimal">미니멀</option>
          </select>
        </div>
        <button id="generateBtn">후보 20개 생성</button>
      </div>
    </section>

    <section class="card">
      <h2 style="margin:0; font-size:1.15rem;">생성 결과</h2>
      <div class="result-grid" id="resultGrid"></div>
    </section>
  </main>

  <script>
    const STYLE_PACK = {
      modern: {
        tag: "모던",
        prefixes: ["넥스트", "모션", "퓨처", "노바", "플로우", "어반", "코어", "미라"],
        suffixes: ["랩", "허브", "웍스", "클라우드", "스튜디오", "브릿지", "원", "링크"]
      },
      classic: {
        tag: "클래식",
        prefixes: ["한빛", "정성", "대한", "동해", "가온", "한결", "신성", "명가"],
        suffixes: ["상회", "기업", "무역", "공방", "산업", "상사", "컴퍼니", "파트너스"]
      },
      humor: {
        tag: "유머",
        prefixes: ["웃픈", "와글", "통통", "요술", "꿀잼", "깜짝", "달달", "엉뚱"],
        suffixes: ["연구소", "창고", "가게", "작전본부", "실험실", "팩토리", "주식회사", "클럽"]
      },
      minimal: {
        tag: "미니멀",
        prefixes: ["온", "루", "에코", "리", "스", "아", "미", "코"],
        suffixes: ["랩", "스튜", "원", "플랜", "노트", "닷", "하우스", "베이스"]
      }
    };

    const INDUSTRY_SEEDS = {
      "카페": ["커피", "빈", "로스터", "브루"],
      "IT": ["테크", "데이터", "코드", "시스템"],
      "교육": ["러닝", "스쿨", "아카데미", "멘토"],
      "뷰티": ["뷰티", "글로우", "스킨", "스타일"],
      "패션": ["모드", "웨어", "디자인", "핏"],
      "푸드": ["키친", "테이블", "푸드", "셰프"],
      "헬스": ["핏", "웰", "라이프", "바디"],
      "부동산": ["리얼티", "프라퍼티", "하우징", "랜드"],
      "금융": ["파이낸스", "캐피탈", "밸류", "머니"]
    };

    const industryInput = document.getElementById("industry");
    const keywordInput = document.getElementById("keywords");
    const styleSelect = document.getElementById("style");
    const resultGrid = document.getElementById("resultGrid");

    function cleanWord(word) {
      return String(word || "").trim().replace(/\s+/g, "");
    }

    function titleCase(word) {
      if (!word) return "";
      const trimmed = cleanWord(word);
      if (/^[a-zA-Z0-9]+$/.test(trimmed)) {
        return trimmed.charAt(0).toUpperCase() + trimmed.slice(1).toLowerCase();
      }
      return trimmed;
    }

    function getIndustryBase(industry) {
      const normalized = String(industry || "").trim();
      if (!normalized) return ["브랜드"];
      const exact = INDUSTRY_SEEDS[normalized];
      if (exact) return exact;
      const found = Object.keys(INDUSTRY_SEEDS).find(k => normalized.includes(k));
      if (found) return INDUSTRY_SEEDS[found];
      return [titleCase(normalized)];
    }

    function domainBase(name, index) {
      const ascii = name.toLowerCase().replace(/[^a-z0-9]/g, "");
      if (ascii.length >= 3) return ascii;
      return `brand${index + 1}`;
    }

    function composeName(style, words, industryWords, index) {
      const s = STYLE_PACK[style];
      const p = s.prefixes[index % s.prefixes.length];
      const sf = s.suffixes[(index * 2 + 1) % s.suffixes.length];
      const kw = words[index % words.length] || industryWords[index % industryWords.length] || "브랜드";
      const ind = industryWords[(index + 1) % industryWords.length] || "코어";

      const patterns = [
        `${p}${kw}${sf}`,
        `${kw}${ind}${sf}`,
        `${p}${ind}`,
        `${kw}${sf}`,
        `${p}${kw}${ind}`
      ];

      return patterns[index % patterns.length];
    }

    function generateNames() {
      const industry = industryInput.value.trim();
      const style = styleSelect.value;
      const rawKeywords = keywordInput.value.split(",").map(cleanWord).filter(Boolean);
      const industryWords = getIndustryBase(industry).map(titleCase);
      const words = rawKeywords.length ? rawKeywords.map(titleCase) : industryWords;

      const unique = new Set();
      const output = [];
      let i = 0;

      while (output.length < 20 && i < 400) {
        const candidate = composeName(style, words, industryWords, i).replace(/\s+/g, "").trim();
        const finalName = candidate.length < 2 ? `${candidate}랩${i}` : candidate;
        if (!unique.has(finalName)) {
          unique.add(finalName);
          output.push(finalName);
        }
        i += 1;
      }

      while (output.length < 20) {
        output.push(`${titleCase(industry || "브랜드")}${output.length + 1}`);
      }

      renderResults(output.slice(0, 20), style);
    }

    function renderResults(list, style) {
      const tag = STYLE_PACK[style].tag;
      resultGrid.innerHTML = list.map((name, idx) => {
        const base = domainBase(name, idx);
        const comLink = `https://instantdomainsearch.com/?q=${encodeURIComponent(base + '.com')}`;
        const krLink = `https://instantdomainsearch.com/?q=${encodeURIComponent(base + '.kr')}`;
        const whoisLink = `https://www.whois.com/whois/${encodeURIComponent(base + '.com')}`;

        return `
          <article class="name-card">
            <div class="name">${idx + 1}. ${name}</div>
            <span class="tag">${tag} 스타일</span>
            <div class="links">
              <a href="${comLink}" target="_blank" rel="noopener">.com 확인</a>
              <a href="${krLink}" target="_blank" rel="noopener">.kr 확인</a>
              <a href="${whoisLink}" target="_blank" rel="noopener">WHOIS</a>
            </div>
          </article>
        `;
      }).join("");
    }

    document.getElementById("generateBtn").addEventListener("click", generateNames);

    industryInput.value = "IT";
    keywordInput.value = "신뢰, 빠른, 클라우드";
    generateNames();
  </script>
</body>
</html>
