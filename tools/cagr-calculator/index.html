<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAGR Calculator | EastSea Tools</title>
  <style>
    :root {
      --bg: #f3f6ff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #4f46e5;
      --accent-2: #06b6d4;
      --good: #059669;
      --bad: #dc2626;
      --shadow: 0 18px 40px rgba(79, 70, 229, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #eef2ff, #f8fbff 45%, #f4f6ff);
      min-height: 100vh;
      padding: 20px;
    }

    .wrap { max-width: 980px; margin: 0 auto; }
    .top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .back {
      text-decoration: none; color: var(--muted); font-weight: 600;
      padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line); background: #fff;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 18px;
    }

    h1 { margin: 4px 0 8px; font-size: clamp(1.4rem, 2.8vw, 2rem); }
    .sub { margin: 0 0 20px; color: var(--muted); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .field label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 1rem;
      background: #fff;
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
    }
    .ghost {
      background: #f8fafc;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .kpi {
      border: 1px solid var(--line);
      background: #fcfdff;
      border-radius: 14px;
      padding: 14px;
    }
    .kpi .label { color: var(--muted); font-size: 0.82rem; margin-bottom: 4px; }
    .kpi .value { font-size: 1.2rem; font-weight: 800; }
    .pos { color: var(--good); }
    .neg { color: var(--bad); }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 580px;
      font-size: 0.92rem;
    }
    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th { background: #f8fbff; font-size: 0.82rem; color: var(--muted); }

    .error { color: var(--bad); font-weight: 600; margin-top: 10px; min-height: 1.4em; }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><a class="back" href="../">← Back to tools</a></div>

    <section class="card">
      <h1>📈 CAGR Calculator</h1>
      <p class="sub">Calculate compound annual growth rate for investments, revenue, users, or any metric over time.</p>

      <div class="grid">
        <div class="field">
          <label for="start">Start Value</label>
          <input id="start" type="number" min="0" step="any" value="10000" />
        </div>
        <div class="field">
          <label for="end">End Value</label>
          <input id="end" type="number" min="0" step="any" value="18000" />
        </div>
        <div class="field">
          <label for="years">Period (Years)</label>
          <input id="years" type="number" min="0.01" step="0.01" value="4" />
        </div>
        <div class="field">
          <label for="currency">Display Currency</label>
          <select id="currency">
            <option value="USD">USD ($)</option>
            <option value="KRW">KRW (₩)</option>
            <option value="EUR">EUR (€)</option>
            <option value="JPY">JPY (¥)</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="calcBtn">Calculate</button>
        <button class="ghost" id="swapBtn">Swap start/end</button>
        <button class="ghost" id="resetBtn">Reset</button>
      </div>

      <div class="error" id="error"></div>

      <div class="kpis">
        <div class="kpi"><div class="label">CAGR</div><div class="value" id="cagrValue">-</div></div>
        <div class="kpi"><div class="label">Total Return</div><div class="value" id="returnValue">-</div></div>
        <div class="kpi"><div class="label">Absolute Gain</div><div class="value" id="gainValue">-</div></div>
        <div class="kpi"><div class="label">Doubling Time</div><div class="value" id="doubleValue">-</div></div>
      </div>
    </section>

    <section class="card">
      <h2 style="margin:0 0 12px;">Year-by-Year Growth Projection</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Year</th>
              <th>Estimated Value</th>
              <th>Growth vs Start</th>
            </tr>
          </thead>
          <tbody id="projectionBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function formatMoney(n) {
      const currency = $('currency').value;
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency,
        maximumFractionDigits: currency === 'KRW' || currency === 'JPY' ? 0 : 2
      }).format(n);
    }

    function pct(n) { return `${(n * 100).toFixed(2)}%`; }

    function setValue(el, text, cls) {
      el.textContent = text;
      el.classList.remove('pos', 'neg');
      if (cls) el.classList.add(cls);
    }

    function calculate() {
      const start = parseFloat($('start').value);
      const end = parseFloat($('end').value);
      const years = parseFloat($('years').value);
      const err = $('error');

      err.textContent = '';
      if (!(start > 0) || !(end > 0) || !(years > 0)) {
        err.textContent = 'Please enter valid values. Start, End, and Years must be greater than 0.';
        return;
      }

      const cagr = Math.pow(end / start, 1 / years) - 1;
      const totalReturn = end / start - 1;
      const gain = end - start;
      const doubling = cagr > 0 ? Math.log(2) / Math.log(1 + cagr) : null;

      setValue($('cagrValue'), pct(cagr), cagr >= 0 ? 'pos' : 'neg');
      setValue($('returnValue'), pct(totalReturn), totalReturn >= 0 ? 'pos' : 'neg');
      setValue($('gainValue'), formatMoney(gain), gain >= 0 ? 'pos' : 'neg');
      setValue($('doubleValue'), doubling ? `${doubling.toFixed(2)} yrs` : 'Not applicable');

      const tbody = $('projectionBody');
      tbody.innerHTML = '';
      const wholeYears = Math.max(1, Math.ceil(years));
      for (let y = 0; y <= wholeYears; y++) {
        const value = start * Math.pow(1 + cagr, y);
        const growth = value / start - 1;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${y}</td>
          <td>${formatMoney(value)}</td>
          <td class="${growth >= 0 ? 'pos' : 'neg'}">${pct(growth)}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    $('calcBtn').addEventListener('click', calculate);
    $('currency').addEventListener('change', calculate);
    ['start', 'end', 'years'].forEach(id => $(id).addEventListener('input', () => {
      if ($('error').textContent) $('error').textContent = '';
    }));

    $('swapBtn').addEventListener('click', () => {
      const a = $('start').value;
      $('start').value = $('end').value;
      $('end').value = a;
      calculate();
    });

    $('resetBtn').addEventListener('click', () => {
      $('start').value = '10000';
      $('end').value = '18000';
      $('years').value = '4';
      $('currency').value = 'USD';
      calculate();
    });

    calculate();
  </script>
</body>
</html>
