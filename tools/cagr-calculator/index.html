<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연평균 성장률(CAGR) 계산기 | CAGR Calculator</title>
  <meta name="description" content="초기값·최종값·기간을 기반으로 CAGR, 누적수익률, 목표 달성 시뮬레이션을 계산합니다." />
  <style>
    :root{--bg:#f4f7ff;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--line:#dbe3f3;--pri:#2563eb;--pri2:#0ea5e9;--good:#059669;--bad:#dc2626}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#eef3ff,#f8fbff);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 40px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)} .sub{margin:6px 0 0;color:var(--muted);font-size:.92rem}
    .back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:#1e3a8a;border:1px solid var(--line);background:#fff;padding:8px 11px;border-radius:10px;font-weight:700;font-size:.88rem}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 10px 30px rgba(37,99,235,.08)}
    h2{margin:0 0 10px;font-size:1rem}
    label{display:block;margin:0 0 6px;color:var(--muted);font-size:.82rem;font-weight:700}
    input,button,select{width:100%;padding:10px 11px;border-radius:10px;border:1px solid var(--line);font-size:.95rem;background:#fff;color:var(--text)}
    input:focus,select:focus{outline:2px solid rgba(37,99,235,.2);border-color:#6ea3ff}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .three{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    button{cursor:pointer;border:0;font-weight:800;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}
    .ghost{background:#f3f6ff;border:1px solid var(--line);color:#1f2937;font-weight:700}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#f9fbff;border-radius:12px;padding:10px}
    .k{font-size:.76rem;color:var(--muted)} .v{margin-top:4px;font-size:1.15rem;font-weight:800}
    .good{color:var(--good)} .bad{color:var(--bad)}
    .msg{margin-top:9px;padding:10px;border-radius:10px;border:1px solid var(--line);background:#f8fbff;font-size:.9rem;line-height:1.45}
    table{width:100%;border-collapse:collapse;min-width:520px}
    .table{margin-top:8px;overflow:auto;border:1px solid var(--line);border-radius:12px}
    th,td{padding:9px;border-bottom:1px solid var(--line);font-size:.85rem;text-align:right;white-space:nowrap}
    th:first-child,td:first-child{text-align:left} th{background:#f1f5ff;color:#4b5563;font-size:.78rem}
    .muted{color:var(--muted);font-size:.8rem}
    @media (max-width:860px){.grid{grid-template-columns:1fr}.three{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📈 연평균 성장률(CAGR) 계산기</h1>
        <p class="sub">매출·사용자·자산의 성장 속도를 연 단위로 표준화해 비교하세요.</p>
      </div>
      <a class="back" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="two">
          <div>
            <label for="start">초기값</label>
            <input id="start" type="number" min="0.0001" step="any" value="10000000" />
          </div>
          <div>
            <label for="end">최종값</label>
            <input id="end" type="number" min="0.0001" step="any" value="18500000" />
          </div>
          <div>
            <label for="years">기간 (년)</label>
            <input id="years" type="number" min="0.1" step="0.1" value="3" />
          </div>
          <div>
            <label for="currency">표시 통화</label>
            <select id="currency">
              <option value="KRW" selected>KRW (₩)</option>
              <option value="USD">USD ($)</option>
              <option value="JPY">JPY (¥)</option>
              <option value="EUR">EUR (€)</option>
            </select>
          </div>
        </div>

        <h2 style="margin-top:12px">목표 시뮬레이션</h2>
        <div class="three">
          <div>
            <label for="targetCagr">목표 CAGR (%)</label>
            <input id="targetCagr" type="number" step="0.1" value="15" />
          </div>
          <div>
            <label for="targetYears">목표 기간 (년)</label>
            <input id="targetYears" type="number" min="0.1" step="0.1" value="5" />
          </div>
          <div>
            <label for="inflation">연 인플레이션 (%)</label>
            <input id="inflation" type="number" step="0.1" value="2.5" />
          </div>
        </div>

        <div class="btns">
          <button id="calcBtn" type="button">계산</button>
          <button id="sampleBtn" class="ghost" type="button">샘플 데이터</button>
        </div>
        <p class="muted">CAGR = (최종값 ÷ 초기값)^(1/기간) - 1</p>
      </article>

      <article class="card">
        <h2>결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">CAGR</div><div class="v" id="cagr">-</div></div>
          <div class="kpi"><div class="k">누적 성장률</div><div class="v" id="totalReturn">-</div></div>
          <div class="kpi"><div class="k">절대 증가분</div><div class="v" id="absoluteGain">-</div></div>
          <div class="kpi"><div class="k">72법칙 기준 배가 시간</div><div class="v" id="doubling">-</div></div>
          <div class="kpi"><div class="k">실질 CAGR (인플레 반영)</div><div class="v" id="realCagr">-</div></div>
          <div class="kpi"><div class="k">목표 달성 시 예상 최종값</div><div class="v" id="targetEnd">-</div></div>
        </div>
        <div class="msg" id="msg">값을 입력 후 계산해 주세요.</div>
      </article>
    </section>

    <section class="card" style="margin-top:12px">
      <h2>연차별 추정 값</h2>
      <div class="table">
        <table>
          <thead>
            <tr><th>연차</th><th>추정값</th><th>시작 대비 성장률</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const els = {
      start: $('start'), end: $('end'), years: $('years'), currency: $('currency'),
      targetCagr: $('targetCagr'), targetYears: $('targetYears'), inflation: $('inflation'),
      cagr: $('cagr'), totalReturn: $('totalReturn'), absoluteGain: $('absoluteGain'), doubling: $('doubling'),
      realCagr: $('realCagr'), targetEnd: $('targetEnd'), msg: $('msg'), rows: $('rows')
    };

    function money(v) {
      const cur = els.currency.value;
      return new Intl.NumberFormat('ko-KR', {
        style: 'currency', currency: cur,
        maximumFractionDigits: cur === 'KRW' || cur === 'JPY' ? 0 : 2
      }).format(v);
    }

    const pct = (v) => `${(v * 100).toFixed(2)}%`;

    function run() {
      const s = Number(els.start.value);
      const e = Number(els.end.value);
      const y = Number(els.years.value);
      const targetRate = Number(els.targetCagr.value) / 100;
      const targetY = Number(els.targetYears.value);
      const inflation = Number(els.inflation.value) / 100;

      if (!(s > 0) || !(e > 0) || !(y > 0)) {
        els.msg.textContent = '초기값·최종값·기간은 0보다 커야 합니다.';
        return;
      }

      const cagr = Math.pow(e / s, 1 / y) - 1;
      const total = e / s - 1;
      const gain = e - s;
      const doubling = cagr > 0 ? 72 / (cagr * 100) : null;
      const real = ((1 + cagr) / (1 + inflation)) - 1;
      const targetEnd = s * Math.pow(1 + targetRate, targetY);

      els.cagr.textContent = pct(cagr);
      els.cagr.className = `v ${cagr >= 0 ? 'good' : 'bad'}`;
      els.totalReturn.textContent = pct(total);
      els.totalReturn.className = `v ${total >= 0 ? 'good' : 'bad'}`;
      els.absoluteGain.textContent = money(gain);
      els.absoluteGain.className = `v ${gain >= 0 ? 'good' : 'bad'}`;
      els.doubling.textContent = doubling ? `${doubling.toFixed(2)}년` : '해당 없음';
      els.realCagr.textContent = pct(real);
      els.realCagr.className = `v ${real >= 0 ? 'good' : 'bad'}`;
      els.targetEnd.textContent = money(targetEnd);

      const tone = cagr >= 0 ? 'good' : 'bad';
      els.msg.innerHTML = cagr >= 0
        ? `현재 성장 속도는 연평균 <strong>${pct(cagr)}</strong> 입니다. 같은 속도를 유지하면 약 <strong>${doubling ? doubling.toFixed(1) : '-'}년</strong>마다 규모가 2배가 됩니다.`
        : `현재 추세는 연평균 <strong>${pct(cagr)}</strong> 감소입니다. 가격·비용·채널 구조 개선으로 성장률 반전이 필요합니다.`;
      els.msg.style.borderColor = tone === 'good' ? '#bfe6d7' : '#f5c7cf';
      els.msg.style.background = tone === 'good' ? '#f2fbf7' : '#fff5f7';

      const years = Math.max(1, Math.ceil(y));
      const rows = [];
      for (let i = 0; i <= years; i++) {
        const val = s * Math.pow(1 + cagr, i);
        rows.push(`<tr><td>${i}년</td><td>${money(val)}</td><td class="${val >= s ? 'good' : 'bad'}">${pct(val / s - 1)}</td></tr>`);
      }
      els.rows.innerHTML = rows.join('');
    }

    $('calcBtn').addEventListener('click', run);
    $('sampleBtn').addEventListener('click', () => {
      els.start.value = 15000000;
      els.end.value = 26000000;
      els.years.value = 4;
      els.targetCagr.value = 18;
      els.targetYears.value = 3;
      els.inflation.value = 3;
      run();
    });
    ['start','end','years','currency','targetCagr','targetYears','inflation'].forEach(id => $(id).addEventListener('input', run));
    run();
  </script>
</body>
</html>
