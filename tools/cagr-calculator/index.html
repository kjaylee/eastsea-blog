<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAGR 계산기 | Compound Annual Growth Rate Calculator</title>
  <meta name="description" content="초기값, 최종값, 기간을 기준으로 CAGR, 누적수익률, 실질 성장률, 두 배 도달 시간, 목표 시나리오를 계산합니다." />
  <style>
    :root{
      --bg:#f5f8fd;--card:#ffffff;--ink:#10233a;--muted:#637488;--line:#dbe5f0;
      --pri:#2563eb;--pri2:#06b6d4;--good:#047857;--bad:#b91c1c;--soft:#eef6ff;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#eef5ff 0%,#f9fbff 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}
    .wrap{max-width:1120px;margin:0 auto;padding:18px 14px 42px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}
    .back{display:inline-flex;align-items:center;gap:6px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#fff;text-decoration:none;color:var(--ink);font-weight:700}
    h1{margin:0;font-size:clamp(1.5rem,3vw,2.05rem)}
    .sub{margin:8px 0 0;color:var(--muted);line-height:1.55}
    .grid{display:grid;grid-template-columns:380px 1fr;gap:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 16px 40px rgba(37,99,235,.08)}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .three{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    label{display:block;margin:0 0 6px;font-size:.83rem;font-weight:800;color:var(--muted)}
    input,select,button{width:100%;padding:12px 13px;border-radius:12px;border:1px solid var(--line);font:inherit;background:#fff;color:var(--ink)}
    input:focus,select:focus{outline:none;border-color:#7ab1ff;box-shadow:0 0 0 4px rgba(37,99,235,.12)}
    button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;font-weight:800}
    .ghost{background:#eef5ff;color:var(--ink);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .kpi{border:1px solid var(--line);border-radius:16px;padding:14px;background:linear-gradient(180deg,#fff,#fafcff)}
    .k{font-size:.78rem;color:var(--muted);font-weight:800}
    .v{margin-top:5px;font-size:1.22rem;font-weight:900;line-height:1.2}
    .good{color:var(--good)} .bad{color:var(--bad)}
    .summary,.note{margin-top:12px;padding:13px 14px;border-radius:14px;border:1px solid var(--line);line-height:1.55}
    .summary{background:var(--soft)}
    .note{background:#fbfdff;color:var(--muted);font-size:.82rem}
    .table-wrap{margin-top:12px;overflow:auto;border:1px solid var(--line);border-radius:16px}
    table{width:100%;border-collapse:collapse;min-width:620px}
    th,td{padding:10px 9px;border-bottom:1px solid var(--line);font-size:.84rem;text-align:right;white-space:nowrap}
    th{background:#f3f7fd;color:#506074;font-size:.77rem}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:640px){.two,.three,.btns,.kpis{grid-template-columns:1fr}}
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📈 CAGR 계산기</h1>
        <p class="sub">성장이 들쭉날쭉했더라도, 시작값과 최종값 사이를 연평균 복리 성장률로 표준화해서 비교할 수 있습니다.</p>
      </div>
      <a class="back" href="/tools/">← 도구 목록</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2 style="margin:0 0 10px">입력</h2>
        <div class="two">
          <div>
            <label for="currency">표시 통화</label>
            <select id="currency">
              <option value="KRW">KRW (₩)</option>
              <option value="USD">USD ($)</option>
              <option value="EUR">EUR (€)</option>
              <option value="JPY">JPY (¥)</option>
            </select>
          </div>
          <div>
            <label for="years">기간 (년)</label>
            <input id="years" type="number" min="0.1" step="0.1" value="3" />
          </div>
          <div>
            <label for="startValue">초기값</label>
            <input id="startValue" type="number" min="0.0001" step="any" value="10000000" />
          </div>
          <div>
            <label for="endValue">최종값</label>
            <input id="endValue" type="number" min="0.0001" step="any" value="18500000" />
          </div>
        </div>

        <h2 style="margin:16px 0 10px">시나리오</h2>
        <div class="three">
          <div>
            <label for="inflation">연 인플레이션 (%)</label>
            <input id="inflation" type="number" step="0.1" value="2.5" />
          </div>
          <div>
            <label for="targetRate">목표 CAGR (%)</label>
            <input id="targetRate" type="number" step="0.1" value="15" />
          </div>
          <div>
            <label for="targetValue">목표 최종값</label>
            <input id="targetValue" type="number" min="0.0001" step="any" value="25000000" />
          </div>
        </div>

        <div class="btns" style="margin-top:12px">
          <button id="calcBtn" type="button">계산하기</button>
          <button id="sampleBtn" class="ghost" type="button">샘플 변경</button>
        </div>

        <div class="note">CAGR은 실제 매년 동일하게 성장했다는 뜻이 아니라, 그 사이를 비교하기 위한 연평균 복리 환산값입니다.</div>
      </article>

      <article class="card">
        <h2 style="margin:0 0 10px">결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">CAGR</div><div class="v" id="cagrValue">-</div></div>
          <div class="kpi"><div class="k">누적 수익률</div><div class="v" id="totalReturn">-</div></div>
          <div class="kpi"><div class="k">절대 증가분</div><div class="v" id="absoluteGain">-</div></div>
          <div class="kpi"><div class="k">실질 CAGR</div><div class="v" id="realCagr">-</div></div>
          <div class="kpi"><div class="k">두 배 도달 시간</div><div class="v" id="doublingTime">-</div></div>
          <div class="kpi"><div class="k">목표값 달성 필요 CAGR</div><div class="v" id="requiredCagr">-</div></div>
        </div>

        <div class="summary" id="summary">값을 입력하면 CAGR과 목표 시나리오를 함께 보여드립니다.</div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>연차</th>
                <th>현재 CAGR 경로</th>
                <th>목표 CAGR 경로</th>
              </tr>
            </thead>
            <tbody id="projectionRows"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <script>
    const CURRENCY_LOCALE = { KRW: 'ko-KR', USD: 'en-US', EUR: 'de-DE', JPY: 'ja-JP' };
    const $ = (id) => document.getElementById(id);

    function calcCagr(beginning, ending, years) {
      return Math.pow(ending / beginning, 1 / years) - 1;
    }

    function calculateCagrMetrics({ startValue, endValue, years, inflation = 0, targetRate = 0, targetValue = 0 }) {
      if (!(startValue > 0) || !(endValue > 0) || !(years > 0)) {
        throw new Error('초기값, 최종값, 기간은 모두 0보다 커야 합니다.');
      }
      const cagr = calcCagr(startValue, endValue, years);
      const totalReturn = endValue / startValue - 1;
      const absoluteGain = endValue - startValue;
      const realCagr = ((1 + cagr) / (1 + inflation / 100)) - 1;
      const doublingTime = cagr > 0 ? Math.log(2) / Math.log(1 + cagr) : null;
      const projectedTargetEnd = startValue * Math.pow(1 + targetRate / 100, years);
      const requiredCagr = targetValue > 0 ? calcCagr(startValue, targetValue, years) : null;
      return { cagr, totalReturn, absoluteGain, realCagr, doublingTime, projectedTargetEnd, requiredCagr };
    }

    function formatMoney(value) {
      const currency = $('currency').value;
      return new Intl.NumberFormat(CURRENCY_LOCALE[currency], {
        style: 'currency',
        currency,
        maximumFractionDigits: currency === 'KRW' || currency === 'JPY' ? 0 : 2
      }).format(value || 0);
    }

    function formatPercent(value) {
      return `${(value * 100).toFixed(2)}%`;
    }

    function render() {
      const startValue = Number($('startValue').value);
      const endValue = Number($('endValue').value);
      const years = Number($('years').value);
      const inflation = Number($('inflation').value || 0);
      const targetRate = Number($('targetRate').value || 0);
      const targetValue = Number($('targetValue').value || 0);

      try {
        const result = calculateCagrMetrics({ startValue, endValue, years, inflation, targetRate, targetValue });
        const tone = result.cagr >= 0 ? 'good' : 'bad';
        $('cagrValue').textContent = formatPercent(result.cagr);
        $('cagrValue').className = `v ${tone}`;
        $('totalReturn').textContent = formatPercent(result.totalReturn);
        $('totalReturn').className = `v ${result.totalReturn >= 0 ? 'good' : 'bad'}`;
        $('absoluteGain').textContent = formatMoney(result.absoluteGain);
        $('absoluteGain').className = `v ${result.absoluteGain >= 0 ? 'good' : 'bad'}`;
        $('realCagr').textContent = formatPercent(result.realCagr);
        $('realCagr').className = `v ${result.realCagr >= 0 ? 'good' : 'bad'}`;
        $('doublingTime').textContent = result.doublingTime ? `${result.doublingTime.toFixed(2)}년` : '해당 없음';
        $('requiredCagr').textContent = result.requiredCagr != null ? formatPercent(result.requiredCagr) : '-';
        $('requiredCagr').className = `v ${result.requiredCagr != null && result.requiredCagr >= 0 ? 'good' : ''}`;

        $('summary').innerHTML = result.cagr >= 0
          ? `현재 구간의 CAGR은 <strong>${formatPercent(result.cagr)}</strong>입니다. 같은 복리 속도가 유지되면 약 <strong>${result.doublingTime ? result.doublingTime.toFixed(1) : '-'}</strong>년마다 규모가 두 배가 됩니다. 목표 CAGR <strong>${targetRate.toFixed(1)}%</strong>를 적용하면 같은 기간 후 <strong>${formatMoney(result.projectedTargetEnd)}</strong> 수준을 기대할 수 있습니다.`
          : `현재 구간은 연평균 <strong>${formatPercent(result.cagr)}</strong> 감소 추세입니다. 가격·채널·제품 믹스를 점검해 성장률 반전이 필요합니다.`;

        const steps = Math.max(1, Math.ceil(years));
        const rows = [];
        for (let i = 0; i <= steps; i++) {
          const actualPath = startValue * Math.pow(1 + result.cagr, i);
          const targetPath = startValue * Math.pow(1 + targetRate / 100, i);
          rows.push(`
            <tr>
              <td>${i}년</td>
              <td>${formatMoney(actualPath)}</td>
              <td>${formatMoney(targetPath)}</td>
            </tr>
          `);
        }
        $('projectionRows').innerHTML = rows.join('');
      } catch (error) {
        $('summary').textContent = error.message;
        ['cagrValue','totalReturn','absoluteGain','realCagr','doublingTime','requiredCagr'].forEach((id) => { $(id).textContent = '-'; $(id).className = 'v'; });
        $('projectionRows').innerHTML = '';
      }
    }

    $('calcBtn').addEventListener('click', render);
    $('sampleBtn').addEventListener('click', () => {
      $('currency').value = 'USD';
      $('startValue').value = 250000;
      $('endValue').value = 460000;
      $('years').value = 4;
      $('inflation').value = 3.2;
      $('targetRate').value = 18;
      $('targetValue').value = 600000;
      render();
    });
    ['currency','startValue','endValue','years','inflation','targetRate','targetValue'].forEach((id) => {
      $(id).addEventListener('input', render);
      $(id).addEventListener('change', render);
    });

    globalThis.__tool = { calcCagr, calculateCagrMetrics };

    render();
  </script>
</body>
</html>
