                <button class="share-btn" id="shareKakao" type="button">${safe(t.shareKakao)}</button>
                <button class="share-btn" id="shareTwitter" type="button">${safe(t.shareTwitter)}</button>
                <button class="share-btn" id="copyLink" type="button">${safe(t.shareCopy)}</button>
              </div>

              <button class="secondary-btn" id="retryBtn" type="button">${safe(t.retry)}</button>
              <p class="disclaimer">${safe(t.disclaimer)}</p>
            </div>
          </section>
        `;

        drawChart(result.normalized || {});

        document.getElementById('shareKakao')?.addEventListener('click', () => {
          haptic();
          shareKakao();
        });
        document.getElementById('shareTwitter')?.addEventListener('click', () => {
          haptic();
          shareTwitter();
        });
        document.getElementById('copyLink')?.addEventListener('click', async () => {
          haptic();
          const ok = await copyLink();
          showToast(ok ? I18N[state.lang].toastCopied : I18N[state.lang].toastCopyFail);
        });
        document.getElementById('retryBtn')?.addEventListener('click', () => {
          haptic();
          resetState();
          render();
        });

        bindLangSwitch();
      }

      function bindLangSwitch() {
        document.getElementById('langKo')?.addEventListener('click', () => {
          if (state.lang !== 'ko') { state.lang = 'ko'; render(); }
        });
        document.getElementById('langEn')?.addEventListener('click', () => {
          if (state.lang !== 'en') { state.lang = 'en'; render(); }
        });
      }

      function resetScores() {
        state.scores = { analysis: 0, people: 0, execution: 0, innovation: 0 };
      }

      function resetState() {
        state.phase = 'intro';
        state.current = 0;
        state.answers = [];
        state.result = null;
        resetScores();
      }

      function startTest() {
        state.phase = 'question';
        state.current = 0;
        state.answers = [];
        state.result = null;
        resetScores();
        render();
      }

      function chooseOption(optionIndex) {
        const q = QUESTIONS[state.current];
        const op = q.options[optionIndex];
        if (!op) return;

        state.answers.push(optionIndex);
        AXES.forEach((axis) => {
          const val = Number(op.scores?.[axis] || 0);
          state.scores[axis] += val * Number(q.weight || 1);
        });

        state.current += 1;

        if (state.current >= QUESTIONS.length) {
          state.phase = 'analyzing';
          render();
          setTimeout(() => {
            state.result = calculateResult();
            saveResult(state.result);
            state.phase = 'result';
            render();
            haptic('success');
          }, 900);
          return;
        }

        state.phase = 'question';
        render();
      }

      function calculateResult() {
        const maxPossible = { analysis: 0, people: 0, execution: 0, innovation: 0 };

        QUESTIONS.forEach((q) => {
          AXES.forEach((axis) => {
            let maxAxis = 0;
            q.options.forEach((op) => {
              maxAxis = Math.max(maxAxis, Number(op.scores?.[axis] || 0));
            });
            maxPossible[axis] += maxAxis * Number(q.weight || 1);
          });
        });

        const normalized = {};
        AXES.forEach((axis) => {
          const raw = Number(state.scores[axis] || 0);
          const max = Number(maxPossible[axis] || 1);
          normalized[axis] = Math.max(0, Math.min(100, Math.round((raw / max) * 100)));
        });

        const rank = [...AXES].sort((a, b) => {
          if (normalized[b] !== normalized[a]) return normalized[b] - normalized[a];
          const tie = { analysis: 4, execution: 3, people: 2, innovation: 1 };
          return tie[b] - tie[a];
        });

        const topAxis = rank[0];
        const type = TYPE_BY_AXIS[topAxis] || 'strategist-analyst';
        const careerFitIndex = Math.round(
          normalized.analysis * 0.29 +
          normalized.people * 0.24 +
          normalized.execution * 0.27 +
          normalized.innovation * 0.20
        );

        return {
          type,
          normalized,
          careerFitIndex,
          savedAt: new Date().toISOString()
        };
      }

      function drawChart(values) {
        const canvas = document.getElementById('resultChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        const labels = AXES.map((a) => AXIS_LABEL[state.lang][a]);
        const vals = AXES.map((a) => Number(values[a] || 0));

        const left = 78;
        const right = w - 18;
        const top = 28;
        const rowH = 52;

        ctx.font = '12px sans-serif';
        ctx.textBaseline = 'middle';

        for (let i = 0; i < labels.length; i++) {
          const y = top + i * rowH;
          const barW = ((right - left) * vals[i]) / 100;

          ctx.fillStyle = 'rgba(255,255,255,0.22)';
          ctx.fillRect(left, y - 12, right - left, 24);

          const grad = ctx.createLinearGradient(left, y, right, y);
          grad.addColorStop(0, '#7fe8ff');
          grad.addColorStop(1, '#ffe29d');
          ctx.fillStyle = grad;
          ctx.fillRect(left, y - 12, barW, 24);

          ctx.fillStyle = '#ffffff';
          ctx.fillText(labels[i], 12, y);
          ctx.fillText(`${vals[i]}점`, right - 42, y);
        }
      }

      function shareKakao() {
        const url = encodeURIComponent(location.href);
        window.open(`https://story.kakao.com/share?url=${url}`, '_blank', 'noopener,noreferrer');
      }

      function shareTwitter() {
        const r = state.result;
        const data = RESULTS[r.type];
        const txt = state.lang === 'ko'
          ? `나의 커리어 핏 유형은 ${data.name.ko} (${r.careerFitIndex}점)!`
          : `My career fit type is ${data.name.en} (${r.careerFitIndex})!`;
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}&url=${encodeURIComponent(location.href)}`;
        window.open(url, '_blank', 'noopener,noreferrer');
      }

      async function copyLink() {
        try {
          await navigator.clipboard.writeText(location.href);
          return true;
        } catch (_) {
          try {
            const ta = document.createElement('textarea');
            ta.value = location.href;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            const ok = document.execCommand('copy');
            ta.remove();
            return !!ok;
          } catch (_e) {
            return false;
          }
        }
      }

      function saveResult(result) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(result));
        } catch (_) {}
      }

      function loadSaved() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.type) return null;
          return parsed;
        } catch (_) {
          return null;
        }
      }

      function render() {
        updateProgress();
        if (state.phase === 'intro') renderIntro();
        else if (state.phase === 'question') renderQuestion();
        else if (state.phase === 'analyzing') renderAnalyzing();
        else renderResult();
      }

      function initTelegram() {
        try {
          window.Telegram?.WebApp?.ready?.();
          window.Telegram?.WebApp?.expand?.();
        } catch (_) {}
        try {
          window.TgSdkWrapper?.init?.();
        } catch (_) {}
      }

      initTelegram();
      render();
    })();
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
