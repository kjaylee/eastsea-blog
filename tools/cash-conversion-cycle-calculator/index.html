<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cash Conversion Cycle Calculator | 현금전환주기(CCC) 계산기</title>
  <meta name="description" content="재고, 매출채권, 매입채무 데이터를 기반으로 DIO/DSO/DPO/CCC와 운전자본 개선 효과를 계산하는 재무 도구" />
  <style>
    :root{--bg:#07111f;--card:#121f36;--line:#2a3e64;--txt:#ebf3ff;--muted:#9fb2d4;--pri:#60a5fa;--ok:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 85% 0%,#263f70 0%,#07111f 52%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 60px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.9vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#dbe7ff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#101a34;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:linear-gradient(165deg,#18294b,#121f36);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1830;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#3b82f6);font-weight:700}
    .soft{background:#172750;border:1px solid var(--line);font-weight:600}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);border-radius:11px;padding:10px;background:#0f1934}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.14rem;font-weight:800}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);font-size:.75rem;background:#14234a;color:#bed0f1;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    textarea{width:100%;min-height:100px;margin-top:10px;background:#0e1630;color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:.84rem;resize:vertical}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>💰 현금전환주기(CCC) 계산기</h1>
        <div class="sub">재고·매출채권·매입채무 회전일수를 통합해 현금 묶임 규모와 개선 시 현금 유입 효과를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="revenue">연 매출 (KRW)</label><input id="revenue" type="number" min="1" value="4200000000" /></div>
          <div><label for="cogs">연 매출원가 (COGS, KRW)</label><input id="cogs" type="number" min="1" value="2700000000" /></div>
          <div><label for="inventory">평균 재고자산 (KRW)</label><input id="inventory" type="number" min="0" value="450000000" /></div>
          <div><label for="ar">평균 매출채권 (AR, KRW)</label><input id="ar" type="number" min="0" value="510000000" /></div>
          <div><label for="ap">평균 매입채무 (AP, KRW)</label><input id="ap" type="number" min="0" value="390000000" /></div>
          <div><label for="target">목표 개선일수 (일)</label><input id="target" type="number" min="0" value="12" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">DIO (재고보유일수)</div><div id="dio" class="v">-</div></div>
          <div class="kpi"><div class="k">DSO (매출채권회수일수)</div><div id="dso" class="v">-</div></div>
          <div class="kpi"><div class="k">DPO (매입채무지급유예일수)</div><div id="dpo" class="v">-</div></div>
          <div class="kpi"><div class="k">CCC</div><div id="ccc" class="v">-</div></div>
          <div class="kpi"><div class="k">일 COGS</div><div id="dailyCogs" class="v">-</div></div>
          <div class="kpi"><div class="k">CCC 운전자본 묶임</div><div id="lockedCash" class="v">-</div></div>
          <div class="kpi"><div class="k">개선 후 목표 CCC</div><div id="targetCcc" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 현금 유입(개선)</div><div id="releasedCash" class="v">-</div></div>
        </div>
        <div id="health" class="pill">지표 해석 대기</div>

        <h2 style="margin-top:12px">단축 실행 체크</h2>
        <table>
          <thead><tr><th>레버</th><th>현재</th><th>권장 방향</th></tr></thead>
          <tbody id="actions"></tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      revenue:$('revenue'), cogs:$('cogs'), inventory:$('inventory'), ar:$('ar'), ap:$('ap'), target:$('target'),
      dio:$('dio'), dso:$('dso'), dpo:$('dpo'), ccc:$('ccc'), dailyCogs:$('dailyCogs'), lockedCash:$('lockedCash'),
      targetCcc:$('targetCcc'), releasedCash:$('releasedCash'), health:$('health'), actions:$('actions'),
      error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };
    const defaults = { revenue:4200000000, cogs:2700000000, inventory:450000000, ar:510000000, ap:390000000, target:12 };
    const money = (n)=> new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const days = (n)=> `${Number(n).toLocaleString('ko-KR',{maximumFractionDigits:1})}일`;

    function validate(v){
      if (!Number.isFinite(v.revenue) || v.revenue <= 0) return '연 매출은 0보다 커야 합니다.';
      if (!Number.isFinite(v.cogs) || v.cogs <= 0) return '연 매출원가(COGS)는 0보다 커야 합니다.';
      if (!Number.isFinite(v.inventory) || v.inventory < 0) return '재고자산은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.ar) || v.ar < 0) return '매출채권은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.ap) || v.ap < 0) return '매입채무는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.target) || v.target < 0) return '목표 개선일수는 0 이상이어야 합니다.';
      return '';
    }

    function compute(v){
      const dio = (v.inventory / v.cogs) * 365;
      const dso = (v.ar / v.revenue) * 365;
      const dpo = (v.ap / v.cogs) * 365;
      const ccc = dio + dso - dpo;
      const dailyCogs = v.cogs / 365;
      const lockedCash = ccc * dailyCogs;
      const targetCcc = ccc - v.target;
      const releasedCash = v.target * dailyCogs;
      return { dio,dso,dpo,ccc,dailyCogs,lockedCash,targetCcc,releasedCash };
    }

    function renderActions(r){
      const arrows = (a,b,goodWhenLower=true)=>{
        if (Math.abs(a-b)<0.1) return '유지';
        const down = goodWhenLower ? '↓ 낮추기' : '↑ 높이기';
        const up = goodWhenLower ? '↑ 재검토' : '↓ 재검토';
        return (goodWhenLower ? a>b : a<b) ? down : up;
      };
      return [
        ['DIO', days(r.dio), arrows(r.dio, 60, true)],
        ['DSO', days(r.dso), arrows(r.dso, 45, true)],
        ['DPO', days(r.dpo), arrows(r.dpo, 45, false)]
      ].map(([k,v,d])=>`<tr><td>${k}</td><td>${v}</td><td>${d}</td></tr>`).join('');
    }

    function render(){
      const v = {
        revenue:Number(refs.revenue.value), cogs:Number(refs.cogs.value), inventory:Number(refs.inventory.value),
        ar:Number(refs.ar.value), ap:Number(refs.ap.value), target:Number(refs.target.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;
      if (err){
        ['dio','dso','dpo','ccc','dailyCogs','lockedCash','targetCcc','releasedCash'].forEach(k=>refs[k].textContent='-');
        refs.actions.innerHTML=''; refs.health.textContent='입력값을 확인하세요'; refs.summary.value='';
        return;
      }

      const r = compute(v);
      refs.dio.textContent = days(r.dio);
      refs.dso.textContent = days(r.dso);
      refs.dpo.textContent = days(r.dpo);
      refs.ccc.textContent = days(r.ccc);
      refs.dailyCogs.textContent = money(r.dailyCogs);
      refs.lockedCash.textContent = money(r.lockedCash);
      refs.targetCcc.textContent = days(r.targetCcc);
      refs.releasedCash.textContent = money(r.releasedCash);
      refs.actions.innerHTML = renderActions(r);

      const health = r.ccc <= 30 ? ['양호', 'var(--ok)'] : (r.ccc <= 70 ? ['보통', 'var(--warn)'] : ['주의', 'var(--bad)']);
      refs.health.innerHTML = `<span style="color:${health[1]}">●</span> CCC ${days(r.ccc)} (${health[0]})`;

      refs.summary.value = [
        '[CCC 분석 요약]',
        `DIO: ${days(r.dio)}`,
        `DSO: ${days(r.dso)}`,
        `DPO: ${days(r.dpo)}`,
        `CCC: ${days(r.ccc)}`,
        `일 COGS: ${money(r.dailyCogs)}`,
        `CCC로 묶인 운전자본: ${money(r.lockedCash)}`,
        `목표 개선(${days(v.target)}) 시 예상 현금 유입: ${money(r.releasedCash)}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.revenue,refs.cogs,refs.inventory,refs.ar,refs.ap,refs.target].forEach(el=>el.addEventListener(ev,render));
    });

    render();
  </script>
</body>
</html>
