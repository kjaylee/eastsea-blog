<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chargeback Loss Impact Calculator | 차지백 손실 영향 계산기</title>
  <meta name="description" content="차지백률 개선 시 월/연 순효과, ROI, 회수기간, 손익분기 개선폭을 계산하는 이커머스 수익성 도구" />
  <style>
    :root{--bg:#071126;--card:#102246;--line:#284b86;--txt:#ecf3ff;--muted:#aec3e8;--pri:#6da8ff;--soft:#183463;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#1d3f76 0%,#071126 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.6vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce9ff;background:#0f2346;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:linear-gradient(165deg,#17355f,#102246);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1a36;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5f84f2);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d39;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d2e3ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🛡️ 차지백 손실 영향 계산기</h1>
        <div class="sub">차지백률 개선 시 회수 가능한 손실, 예방 솔루션 비용, ROI/회수기간을 함께 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="tx">월 거래 건수</label><input id="tx" type="number" min="1" step="1" value="18500" /></div>
          <div><label for="aov">평균 주문금액 (KRW)</label><input id="aov" type="number" min="1" value="62000" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="1" max="95" step="0.1" value="36" /></div>
          <div><label for="currentRate">현재 차지백률 (%)</label><input id="currentRate" type="number" min="0" max="20" step="0.01" value="1.9" /></div>
          <div><label for="targetRate">목표 차지백률 (%)</label><input id="targetRate" type="number" min="0" max="20" step="0.01" value="1.1" /></div>
          <div><label for="feeCase">건당 차지백 수수료 (KRW)</label><input id="feeCase" type="number" min="0" value="19000" /></div>
          <div><label for="winRate">분쟁 승소율 (%)</label><input id="winRate" type="number" min="0" max="100" step="0.1" value="34" /></div>
          <div><label for="monthlyCost">예방 솔루션 월 비용 (KRW)</label><input id="monthlyCost" type="number" min="0" value="3800000" /></div>
          <div><label for="setupCost">초기 구축비 (KRW)</label><input id="setupCost" type="number" min="0" value="9000000" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 순효과</div><div id="annualNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">현재 월 손실</div><div id="currentLoss" class="v sm">-</div></div>
          <div class="kpi"><div class="k">개선 후 월 손실</div><div id="targetLoss" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>건당 기대 손실</th><td id="lossPerCase">-</td></tr>
            <tr><th>월 절감 손실</th><td id="savedLoss">-</td></tr>
            <tr><th>손익분기 필요 개선폭</th><td id="breakEvenLift">-</td></tr>
            <tr><th>손익분기 목표 차지백률</th><td id="breakEvenTarget">-</td></tr>
            <tr><th>월 총이익 보호액(참고)</th><td id="marginProtected">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      tx:$("tx"), aov:$("aov"), margin:$("margin"), currentRate:$("currentRate"), targetRate:$("targetRate"), feeCase:$("feeCase"),
      winRate:$("winRate"), monthlyCost:$("monthlyCost"), setupCost:$("setupCost"),
      monthlyNet:$("monthlyNet"), annualNet:$("annualNet"), roi:$("roi"), payback:$("payback"), currentLoss:$("currentLoss"), targetLoss:$("targetLoss"),
      lossPerCase:$("lossPerCase"), savedLoss:$("savedLoss"), breakEvenLift:$("breakEvenLift"), breakEvenTarget:$("breakEvenTarget"), marginProtected:$("marginProtected"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { tx:18500, aov:62000, margin:36, currentRate:1.9, targetRate:1.1, feeCase:19000, winRate:34, monthlyCost:3800000, setupCost:9000000 };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.tx) || v.tx < 1 || v.tx > 1e8) return "월 거래 건수는 1~100,000,000 범위로 입력하세요.";
      if (!Number.isFinite(v.aov) || v.aov <= 0) return "평균 주문금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 95) return "매출총이익률은 0~95% 범위여야 합니다.";
      if (!Number.isFinite(v.currentRate) || v.currentRate < 0 || v.currentRate > 20) return "현재 차지백률은 0~20% 범위여야 합니다.";
      if (!Number.isFinite(v.targetRate) || v.targetRate < 0 || v.targetRate > 20) return "목표 차지백률은 0~20% 범위여야 합니다.";
      if (v.targetRate > v.currentRate) return "목표 차지백률은 현재 차지백률 이하로 입력하세요.";
      if (!Number.isFinite(v.feeCase) || v.feeCase < 0) return "건당 차지백 수수료는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.winRate) || v.winRate < 0 || v.winRate > 100) return "분쟁 승소율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.monthlyCost) || v.monthlyCost < 0) return "예방 솔루션 월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "초기 구축비는 0 이상이어야 합니다.";
      return "";
    }

    function compute(v){
      const costPerCase = v.aov * (1 - v.winRate / 100) + v.feeCase;
      const currentCases = v.tx * (v.currentRate / 100);
      const targetCases = v.tx * (v.targetRate / 100);
      const currentLoss = currentCases * costPerCase;
      const targetLoss = targetCases * costPerCase;
      const savedLoss = currentLoss - targetLoss;
      const marginProtected = (currentCases - targetCases) * v.aov * (v.margin / 100);

      const annualCost = v.monthlyCost * 12 + v.setupCost;
      const monthlyNet = savedLoss - v.monthlyCost;
      const annualNet = savedLoss * 12 - annualCost;

      const roi = annualCost === 0 ? (annualNet >= 0 ? Infinity : -Infinity) : (annualNet / annualCost) * 100;
      const payback = monthlyNet > 0 ? annualCost / monthlyNet : Infinity;

      const breakEvenLift = (v.monthlyCost + v.setupCost / 12) / (v.tx * costPerCase) * 100;
      const breakEvenTarget = Math.max(0, v.currentRate - breakEvenLift);

      return { costPerCase, currentLoss, targetLoss, savedLoss, marginProtected, monthlyNet, annualNet, roi, payback, breakEvenLift, breakEvenTarget };
    }

    function resetOutputs(){
      ["monthlyNet","annualNet","roi","payback","currentLoss","targetLoss","lossPerCase","savedLoss","breakEvenLift","breakEvenTarget","marginProtected"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        tx:Number(refs.tx.value), aov:Number(refs.aov.value), margin:Number(refs.margin.value), currentRate:Number(refs.currentRate.value), targetRate:Number(refs.targetRate.value),
        feeCase:Number(refs.feeCase.value), winRate:Number(refs.winRate.value), monthlyCost:Number(refs.monthlyCost.value), setupCost:Number(refs.setupCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.annualNet.textContent = money(r.annualNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가";
      refs.currentLoss.textContent = money(r.currentLoss);
      refs.targetLoss.textContent = money(r.targetLoss);
      refs.lossPerCase.textContent = money(r.costPerCase);
      refs.savedLoss.textContent = money(r.savedLoss);
      refs.breakEvenLift.textContent = Number.isFinite(r.breakEvenLift) ? `${num(r.breakEvenLift,3)}%p` : "계산 불가";
      refs.breakEvenTarget.textContent = Number.isFinite(r.breakEvenTarget) ? `${num(r.breakEvenTarget,3)}%` : "계산 불가";
      refs.marginProtected.textContent = money(r.marginProtected);

      refs.status.innerHTML = r.annualNet >= 0
        ? `<span class="ok">●</span> 연간 ${money(r.annualNet)} 순효과`
        : `<span class="warn">●</span> 연간 ${money(Math.abs(r.annualNet))} 순손실`;

      refs.summary.value = [
        "[Chargeback Loss Impact 요약]",
        `현재 월 손실: ${money(r.currentLoss)}`,
        `개선 후 월 손실: ${money(r.targetLoss)}`,
        `월 절감 손실: ${money(r.savedLoss)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `연 순효과: ${money(r.annualNet)}`,
        `연 ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가"}`,
        `손익분기 필요 개선폭: ${Number.isFinite(r.breakEvenLift) ? `${num(r.breakEvenLift,3)}%p` : "계산 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.tx,refs.aov,refs.margin,refs.currentRate,refs.targetRate,refs.feeCase,refs.winRate,refs.monthlyCost,refs.setupCost].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
