<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Abandonment Recovery Calculator | 결제 이탈 복구 ROI 계산기</title>
  <meta name="description" content="결제 이탈 복구율 개선이 만드는 추가 주문, 매출, 순효과, ROI, 손익분기 복구율을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.7vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:104px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.98rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🛒 결제 이탈 복구 ROI 계산기</h1>
        <div class="sub">복구율 목표가 추가 주문·매출·순이익에 미치는 영향을 빠르게 계산하고 손익분기 복구율을 확인합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="checkoutStarts">월 결제 시작 수 (건)</label><input id="checkoutStarts" type="number" min="1" value="20000" /></div>
          <div><label for="abandonRate">결제 이탈률 (%)</label><input id="abandonRate" type="number" min="1" max="99" step="0.1" value="68" /></div>
          <div><label for="currentRecovery">현재 복구율 (%)</label><input id="currentRecovery" type="number" min="0" max="100" step="0.1" value="9" /></div>
          <div><label for="targetRecovery">목표 복구율 (%)</label><input id="targetRecovery" type="number" min="0" max="100" step="0.1" value="14" /></div>
          <div><label for="aov">평균 주문 금액 (KRW)</label><input id="aov" type="number" min="1000" value="72000" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="1" max="100" step="0.1" value="42" /></div>
          <div><label for="incentiveCost">복구 주문당 인센티브 비용 (KRW)</label><input id="incentiveCost" type="number" min="0" value="4000" /></div>
          <div><label for="platformCost">월 플랫폼/툴 비용 (KRW)</label><input id="platformCost" type="number" min="0" value="1500000" /></div>
          <div><label for="setupCost">도입 일회성 비용 (KRW)</label><input id="setupCost" type="number" min="0" value="9000000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 추가 복구 주문</div><div id="incrementalRecovered" class="v">-</div></div>
          <div class="kpi"><div class="k">월 추가 매출</div><div id="incrementalRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">분석기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>월 추가 매출총이익</th><td id="incrementalGrossProfit">-</td></tr>
            <tr><th>월 추가 인센티브 비용</th><td id="incrementalIncentiveCost">-</td></tr>
            <tr><th>현재 복구 주문(월)</th><td id="currentRecoveredOrders">-</td></tr>
            <tr><th>목표 복구 주문(월)</th><td id="targetRecoveredOrders">-</td></tr>
            <tr><th>손익분기 목표 복구율</th><td id="breakEvenRecovery">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      checkoutStarts:$("checkoutStarts"), abandonRate:$("abandonRate"), currentRecovery:$("currentRecovery"), targetRecovery:$("targetRecovery"),
      aov:$("aov"), margin:$("margin"), incentiveCost:$("incentiveCost"), platformCost:$("platformCost"), setupCost:$("setupCost"), months:$("months"),
      incrementalRecovered:$("incrementalRecovered"), incrementalRevenue:$("incrementalRevenue"), monthlyNet:$("monthlyNet"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      incrementalGrossProfit:$("incrementalGrossProfit"), incrementalIncentiveCost:$("incrementalIncentiveCost"), currentRecoveredOrders:$("currentRecoveredOrders"), targetRecoveredOrders:$("targetRecoveredOrders"), breakEvenRecovery:$("breakEvenRecovery"),
      error:$("error"), status:$("status"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { checkoutStarts:20000, abandonRate:68, currentRecovery:9, targetRecovery:14, aov:72000, margin:42, incentiveCost:4000, platformCost:1500000, setupCost:9000000, months:12 };
    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.checkoutStarts) || v.checkoutStarts < 1) return "월 결제 시작 수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.abandonRate) || v.abandonRate <= 0 || v.abandonRate >= 100) return "결제 이탈률은 0 초과 100 미만이어야 합니다.";
      if (!Number.isFinite(v.currentRecovery) || v.currentRecovery < 0 || v.currentRecovery > 100) return "현재 복구율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.targetRecovery) || v.targetRecovery < 0 || v.targetRecovery > 100) return "목표 복구율은 0~100% 범위여야 합니다.";
      if (v.targetRecovery < v.currentRecovery) return "목표 복구율은 현재 복구율 이상이어야 합니다.";
      if (!Number.isFinite(v.aov) || v.aov <= 0) return "평균 주문 금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return "매출총이익률은 0 초과 100 이하 범위여야 합니다.";
      if (!Number.isFinite(v.incentiveCost) || v.incentiveCost < 0) return "인센티브 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.platformCost) || v.platformCost < 0) return "월 플랫폼 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "도입 일회성 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return "분석 기간은 1~60개월 범위여야 합니다.";
      return "";
    }

    function compute(v){
      const abandon = v.abandonRate / 100;
      const current = v.currentRecovery / 100;
      const target = v.targetRecovery / 100;
      const marginRate = v.margin / 100;

      const abandonedCheckouts = v.checkoutStarts * abandon;
      const currentRecoveredOrders = abandonedCheckouts * current;
      const targetRecoveredOrders = abandonedCheckouts * target;
      const incrementalRecovered = Math.max(0, targetRecoveredOrders - currentRecoveredOrders);

      const incrementalRevenue = incrementalRecovered * v.aov;
      const incrementalGrossProfit = incrementalRevenue * marginRate;
      const incrementalIncentiveCost = incrementalRecovered * v.incentiveCost;
      const monthlyNet = incrementalGrossProfit - incrementalIncentiveCost - v.platformCost;
      const periodNet = monthlyNet * v.months - v.setupCost;

      const programCost = (v.platformCost + incrementalIncentiveCost) * v.months + v.setupCost;
      const roi = programCost === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / programCost) * 100;
      const payback = monthlyNet > 0 ? v.setupCost / monthlyNet : Infinity;

      const unitProfitPerRecovered = (v.aov * marginRate) - v.incentiveCost;
      const breakEvenRecovery = (unitProfitPerRecovered <= 0 || abandonedCheckouts <= 0)
        ? Infinity
        : (currentRecoveredOrders + (v.platformCost / unitProfitPerRecovered)) / abandonedCheckouts * 100;

      return { incrementalRecovered, incrementalRevenue, incrementalGrossProfit, incrementalIncentiveCost, monthlyNet, periodNet, roi, payback, currentRecoveredOrders, targetRecoveredOrders, breakEvenRecovery };
    }

    function resetOutputs(){
      ["incrementalRecovered","incrementalRevenue","monthlyNet","periodNet","roi","payback","incrementalGrossProfit","incrementalIncentiveCost","currentRecoveredOrders","targetRecoveredOrders","breakEvenRecovery"].forEach((k)=>refs[k].textContent='-');
      refs.summary.value = "";
    }

    function render(){
      const v = {
        checkoutStarts:Number(refs.checkoutStarts.value), abandonRate:Number(refs.abandonRate.value), currentRecovery:Number(refs.currentRecovery.value), targetRecovery:Number(refs.targetRecovery.value),
        aov:Number(refs.aov.value), margin:Number(refs.margin.value), incentiveCost:Number(refs.incentiveCost.value), platformCost:Number(refs.platformCost.value), setupCost:Number(refs.setupCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.incrementalRecovered.textContent = `${num(r.incrementalRecovered,1)}건`;
      refs.incrementalRevenue.textContent = money(r.incrementalRevenue);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞');
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가';

      refs.incrementalGrossProfit.textContent = money(r.incrementalGrossProfit);
      refs.incrementalIncentiveCost.textContent = money(r.incrementalIncentiveCost);
      refs.currentRecoveredOrders.textContent = `${num(r.currentRecoveredOrders,1)}건`;
      refs.targetRecoveredOrders.textContent = `${num(r.targetRecoveredOrders,1)}건`;
      refs.breakEvenRecovery.textContent = (Number.isFinite(r.breakEvenRecovery) && r.breakEvenRecovery <= 100) ? `${num(r.breakEvenRecovery,2)}%` : '달성 불가';

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> 월 ${money(r.monthlyNet)} 순효과 개선`
        : `<span class="warn">●</span> 월 ${money(Math.abs(r.monthlyNet))} 순효과 감소`;

      refs.summary.value = [
        "[Checkout Abandonment Recovery 요약]",
        `월 추가 복구 주문: ${num(r.incrementalRecovered,1)}건`,
        `월 추가 매출: ${money(r.incrementalRevenue)}`,
        `월 추가 매출총이익: ${money(r.incrementalGrossProfit)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `${v.months}개월 순효과(도입비 반영): ${money(r.periodNet)}`,
        `ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞')}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가'}`,
        `손익분기 목표 복구율: ${(Number.isFinite(r.breakEvenRecovery) && r.breakEvenRecovery <= 100) ? `${num(r.breakEvenRecovery,2)}%` : '달성 불가'}`
      ].join("\n");
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });

    [refs.checkoutStarts,refs.abandonRate,refs.currentRecovery,refs.targetRecovery,refs.aov,refs.margin,refs.incentiveCost,refs.platformCost,refs.setupCost,refs.months].forEach((el)=>{
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
