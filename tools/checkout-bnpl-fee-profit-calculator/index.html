<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout BNPL Fee Profit Calculator | 체크아웃 BNPL 수수료 손익 계산기</title>
  <meta name="description" content="BNPL 도입 시 전환율·객단가 상승과 수수료·대손·운영비를 함께 반영해 월 순효과, 연간 ROI, 회수기간, 손익분기 전환 상승폭을 계산합니다." />
  <meta name="keywords" content="BNPL, buy now pay later, checkout conversion, AOV, 수수료, 손익, ROI, 이커머스" />
  <style>
    :root {
      --bg:#0b1220; --card:#121c31; --line:#2a3a58; --txt:#e9efff; --muted:#a9b8d4;
      --pri:#7aa2ff; --pri2:#4e7cff; --ok:#34d399; --warn:#fbbf24; --bad:#fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      color: var(--txt);
      background: radial-gradient(circle at 10% 0%, #20365f 0%, #0b1220 58%);
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px 14px 56px; }
    .top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:14px; }
    h1 { margin:0; font-size:clamp(1.2rem, 2.9vw, 1.85rem); }
    .sub { margin-top:8px; color:var(--muted); font-size:.95rem; line-height:1.5; }
    .home {
      text-decoration:none; color:#d7e4ff; background:#0e1930; border:1px solid var(--line);
      border-radius:12px; padding:9px 12px; white-space:nowrap;
    }
    .layout { display:grid; grid-template-columns:1.03fr .97fr; gap:12px; }
    .card {
      background: linear-gradient(165deg, #172844, #121c31);
      border:1px solid var(--line); border-radius:14px; padding:13px;
      min-width:0;
    }
    h2 { margin:0 0 10px; font-size:1.03rem; }
    .inputs { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
    label { display:block; color:var(--muted); font-size:.79rem; margin-bottom:5px; }
    input, textarea, button {
      width:100%; border-radius:10px; border:1px solid var(--line);
      background:#0b162b; color:var(--txt); padding:10px; font-size:.93rem;
    }
    button { cursor:pointer; border:none; font-weight:700; background:linear-gradient(135deg,var(--pri2),var(--pri)); }
    .soft { background:#15243f; border:1px solid var(--line); }
    .btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    textarea { min-height:110px; margin-top:10px; resize:vertical; }
    .error {
      display:none; margin-top:10px; border:1px solid #7b3344; border-radius:10px;
      background:rgba(248,113,113,.16); color:var(--bad); padding:9px 10px; font-size:.86rem;
    }
    .error.show { display:block; }
    .kpis { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .kpi { border:1px solid var(--line); background:#0f1b33; border-radius:11px; padding:10px; min-width:0; }
    .k { color:var(--muted); font-size:.76rem; margin-bottom:4px; }
    .v { font-size:1.04rem; font-weight:800; word-break:break-word; }
    .pill {
      display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line);
      background:#192b4c; color:#d4e3ff; border-radius:999px; padding:4px 10px; font-size:.77rem;
      margin-top:10px;
    }
    table { width:100%; border-collapse:collapse; margin-top:11px; table-layout:fixed; font-size:.88rem; }
    th, td { border-bottom:1px solid var(--line); padding:8px 6px; text-align:right; word-break:break-word; }
    th:first-child, td:first-child { text-align:left; }
    .good { color:var(--ok); } .warn { color:var(--warn); }
    @media (max-width: 920px) {
      .layout { grid-template-columns:1fr; }
      .inputs { grid-template-columns:1fr; }
      .top { flex-direction:column; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>💳 체크아웃 BNPL 수수료 손익 계산기</h1>
        <div class="sub">BNPL 도입이 실제 이익으로 이어지는지 빠르게 검증합니다. 전환/객단가 상승과 BNPL 수수료·대손·운영비를 한 번에 반영합니다.</div>
      </div>
      <a class="home" href="/tools/">← Tools</a>
    </div>

    <section class="layout">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="sessions">월 체크아웃 세션 수</label><input id="sessions" type="number" min="0" value="120000" /></div>
          <div><label for="baseCvr">현재 결제 전환율 (%)</label><input id="baseCvr" type="number" min="0" max="100" step="0.01" value="2.6" /></div>
          <div><label for="aov">현재 객단가 AOV (₩)</label><input id="aov" type="number" min="0" value="72000" /></div>
          <div><label for="grossMargin">매출총이익률 (%)</label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="43" /></div>

          <div><label for="bnplShare">BNPL 채택 비중 (%)</label><input id="bnplShare" type="number" min="0" max="100" step="0.1" value="28" /></div>
          <div><label for="bnplLiftPp">BNPL 전환 상승폭 (pp)</label><input id="bnplLiftPp" type="number" min="0" max="30" step="0.01" value="0.9" /></div>
          <div><label for="aovLift">BNPL 객단가 상승률 (%)</label><input id="aovLift" type="number" min="0" max="200" step="0.1" value="11" /></div>

          <div><label for="bnplFeeRate">BNPL 수수료율 (%)</label><input id="bnplFeeRate" type="number" min="0" max="100" step="0.01" value="3.5" /></div>
          <div><label for="bnplFixedFee">BNPL 고정수수료 (건당 ₩)</label><input id="bnplFixedFee" type="number" min="0" value="280" /></div>
          <div><label for="bnplLossRate">대손/차지백률 (%)</label><input id="bnplLossRate" type="number" min="0" max="100" step="0.01" value="0.45" /></div>

          <div><label for="monthlyOps">월 운영비 (₩)</label><input id="monthlyOps" type="number" min="0" value="2500000" /></div>
          <div><label for="setupCost">초기 구축비 (₩)</label><input id="setupCost" type="number" min="0" value="18000000" /></div>
        </div>

        <div class="btns">
          <button type="button" id="copy" class="soft">요약 복사</button>
          <button type="button" id="reset">기본값 복원</button>
        </div>
        <div class="error" id="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 순효과</div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k">연간 순이익</div><div class="v" id="annualNet">-</div></div>
          <div class="kpi"><div class="k">연간 ROI</div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div class="v" id="payback">-</div></div>
          <div class="kpi"><div class="k">월 추가 주문</div><div class="v" id="incrementalOrders">-</div></div>
          <div class="kpi"><div class="k">손익분기 전환 상승폭</div><div class="v" id="breakEvenLift">-</div></div>
        </div>

        <div class="pill" id="status">결과 계산 대기</div>

        <h2 style="margin-top:12px">세부 지표</h2>
        <table>
          <tbody>
            <tr><th>BNPL 주문수</th><td id="bnplOrders">-</td></tr>
            <tr><th>증분 매출총이익</th><td id="incrementalGross">-</td></tr>
            <tr><th>BNPL 변동비 합계</th><td id="bnplVariableCost">-</td></tr>
            <tr><th>월 순이익(구축비 제외)</th><td id="monthlyRunRate">-</td></tr>
            <tr><th>12개월 총투자비</th><td id="annualCost">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="./calculator.js"></script>
</body>
</html>
