<style>
:root {
  --bg: #0d0d0d;
  --card: #181818;
  --card2: #1e1e1e;
  --line: #2a2a2a;
  --accent: #e05c5c;
  --accent2: #60a5fa;
  --accent3: #34d399;
  --text: #f0f0f0;
  --muted: #888;
  --green: #34d399;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --red: #f87171;
  --blue: #60a5fa;
  --radius: 14px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

header {
  background: linear-gradient(135deg, #1a0505 0%, #2d0a0a 50%, #1a0505 100%);
  border-bottom: 1px solid #3a1515;
  padding: 28px 20px 24px;
  text-align: center;
  position: relative;
}
.back-btn {
  position: absolute; top: 18px; left: 18px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  color: #ccc; padding: 6px 14px; border-radius: 20px;
  text-decoration: none; font-size: 13px; transition: all .2s;
}
.back-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
.lang-btn {
  position: absolute; top: 18px; right: 18px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  color: #ccc; padding: 6px 14px; border-radius: 20px;
  cursor: pointer; font-size: 13px; transition: all .2s;
}
.lang-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }

header h1 { font-size: clamp(1.3rem, 4vw, 1.9rem); font-weight: 800; margin-bottom: 6px; }
header h1 span { color: var(--accent); }
header p { color: var(--muted); font-size: 0.9rem; }

main { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 18px; color: var(--accent2); letter-spacing: 0.3px; }

.unit-toggle {
  display: flex; gap: 8px; margin-bottom: 20px;
}
.unit-btn {
  flex: 1; padding: 9px; border: 1px solid var(--line);
  background: var(--card2); color: var(--muted);
  border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s;
}
.unit-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }

.field label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
}
.field-row {
  display: flex; align-items: center;
  background: var(--card2); border: 1px solid var(--line);
  border-radius: 10px; padding: 0 12px; transition: border-color .2s;
}
.field-row:focus-within { border-color: var(--accent2); }
.field-row input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 1.1rem; font-weight: 600; padding: 12px 0;
}
.field-row input::placeholder { color: #555; font-weight: 400; }
.field-row .u { color: var(--muted); font-size: 12px; font-weight: 600; white-space: nowrap; }

.calc-btn {

  background: linear-gradient(135deg, var(--accent) 0%, #c0392b 100%);
  color: #fff; font-size: 1.05rem; font-weight: 700; cursor: pointer;
  transition: transform .15s, opacity .15s; margin-top: 4px;

.calc-btn:hover { opacity: 0.92; }
.calc-btn:active { transform: scale(0.98); }

/* Results */
#results { display: none; }
#results.show { display: block; }

.risk-badge {

  margin-bottom: 16px;
}
.risk-optimal { background: rgba(52,211,153,0.15); color: var(--green); border: 1.5px solid var(--green); }
.risk-normal  { background: rgba(96,165,250,0.15); color: var(--blue); border: 1.5px solid var(--blue); }

.ratio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 500px) { .ratio-grid { grid-template-columns: 1fr; } }

.ratio-card {
  background: var(--card2); border: 1px solid var(--line);
  border-radius: 12px; padding: 16px; position: relative; overflow: hidden;
}
.ratio-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.ratio-card.rc-green::before { background: var(--green); }
.ratio-card.rc-blue::before  { background: var(--blue); }
.ratio-card.rc-yellow::before{ background: var(--yellow); }
.ratio-card.rc-orange::before{ background: var(--orange); }
.ratio-card.rc-red::before   { background: var(--red); }

.ratio-card .rc-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.ratio-card .rc-val   { font-size: 1.7rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.ratio-card .rc-range { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.ratio-card .rc-status{ font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 12px; display: inline-block; }

.rc-green  .rc-val, .rc-green  .rc-status { color: var(--green); }
.rc-blue   .rc-val, .rc-blue   .rc-status { color: var(--blue); }
.rc-yellow .rc-val, .rc-yellow .rc-status { color: var(--yellow); }
.rc-orange .rc-val, .rc-orange .rc-status { color: var(--orange); }
.rc-red    .rc-val, .rc-red    .rc-status { color: var(--red); }

.rc-green  .rc-status { background: rgba(52,211,153,0.12); }
.rc-blue   .rc-status { background: rgba(96,165,250,0.12); }
.rc-yellow .rc-status { background: rgba(251,191,36,0.12); }
.rc-orange .rc-status { background: rgba(251,146,60,0.12); }
.rc-red    .rc-status { background: rgba(248,113,113,0.12); }

.bar-wrap {
  height: 6px; background: var(--line); border-radius: 3px;
  margin-top: 10px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }

.summary-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
.summary-table th {
  text-align: left; font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 10px;
  border-bottom: 1px solid var(--line);
}
.summary-table td { padding: 10px 10px; border-bottom: 1px solid var(--line); }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table .val-col { font-weight: 700; }
.summary-table .flag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.flag-opt  { background: rgba(52,211,153,0.15);  color: var(--green); }
.flag-norm { background: rgba(96,165,250,0.15);  color: var(--blue); }
.flag-bord { background: rgba(251,191,36,0.15);  color: var(--yellow); }
.flag-high { background: rgba(251,146,60,0.15);  color: var(--orange); }
.flag-vh   { background: rgba(248,113,113,0.15); color: var(--red); }

.info-box {
  background: var(--card2); border: 1px solid var(--line);
  border-left: 3px solid var(--accent2);
  border-radius: 8px; padding: 14px 16px; font-size: 13px; color: var(--muted); line-height: 1.7;
}
.info-box b { color: var(--text); }

.disclaimer {
  font-size: 12px; color: #555; text-align: center; margin-top: 20px; line-height: 1.7;
}
</style>
</head>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let lang = 'ko';
let unit = 'mg'; // 'mg' | 'mmol'

// ─── Language ────────────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang === 'ko' ? 'en' : 'ko';
  document.getElementById('langBtn').textContent = lang === 'ko' ? 'EN' : 'KO';
  document.querySelectorAll('[data-ko]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
}

// ─── Unit ────────────────────────────────────────────────────────────────────
function setUnit(u) {
  unit = u;
  document.getElementById('unitMg').classList.toggle('active', u === 'mg');
  document.getElementById('unitMmol').classList.toggle('active', u === 'mmol');
  const label = u === 'mg' ? 'mg/dL' : 'mmol/L';
  ['u1','u2','u3','u4'].forEach(id => document.getElementById(id).textContent = label);
  // Update placeholders
  const pMg   = ['200','130','55','150'];
  const pMmol = ['5.2','3.4','1.4','1.7'];
  const p = u === 'mg' ? pMg : pMmol;
  ['total','ldl','hdl','tg'].forEach((id,i) => document.getElementById(id).placeholder = p[i]);
}

// ─── Convert to mg/dL ────────────────────────────────────────────────────────
function toMg(v) {
  return unit === 'mmol' ? v * 38.67 : v; // approximate for TG use *88.57 but handled below
}
function toMgTG(v) {
  return unit === 'mmol' ? v * 88.57 : v;
}

// ─── Risk Classification Helpers ─────────────────────────────────────────────
// Returns { cls, statusKo, statusEn, color, barPct }
function classifyRatio(name, val) {
  if (name === 'tc_hdl') {
    // Castelli Risk Index I (Total/HDL)
    // <3.5 optimal, 3.5-5 normal, 5-6 borderline, >6 high risk
    if (val < 3.5)  return {cls:'rc-green',  ko:'최적',   en:'Optimal',    color:'var(--green)',  bar:Math.min(val/6*100,100)};
    if (val < 5.0)  return {cls:'rc-blue',   ko:'정상',   en:'Normal',     color:'var(--blue)',   bar:Math.min(val/6*100,100)};
    if (val < 6.0)  return {cls:'rc-yellow', ko:'경계',   en:'Borderline', color:'var(--yellow)', bar:Math.min(val/6*100,100)};
    if (val < 8.0)  return {cls:'rc-orange', ko:'높음',   en:'High',       color:'var(--orange)', bar:Math.min(val/6*100,100)};
    return            {cls:'rc-red',    ko:'매우 높음', en:'Very High',  color:'var(--red)',    bar:100};
  }
  if (name === 'ldl_hdl') {
    // Castelli Risk Index II (LDL/HDL)
    // <1.5 optimal, 1.5-3.0 normal, 3.0-4.0 borderline, >4 high
    if (val < 1.5)  return {cls:'rc-green',  ko:'최적',   en:'Optimal',    color:'var(--green)',  bar:Math.min(val/4*100,100)};
    if (val < 3.0)  return {cls:'rc-blue',   ko:'정상',   en:'Normal',     color:'var(--blue)',   bar:Math.min(val/4*100,100)};
    if (val < 4.0)  return {cls:'rc-yellow', ko:'경계',   en:'Borderline', color:'var(--yellow)', bar:Math.min(val/4*100,100)};
    if (val < 5.0)  return {cls:'rc-orange', ko:'높음',   en:'High',       color:'var(--orange)', bar:Math.min(val/4*100,100)};
    return            {cls:'rc-red',    ko:'매우 높음', en:'Very High',  color:'var(--red)',    bar:100};
  }
  if (name === 'tg_hdl') {
    // TG/HDL ratio (atherogenic index, insulin resistance proxy)
    // <1.0 optimal, 1.0-2.0 normal, 2.0-4.0 borderline, >4.0 high
    if (val < 1.0)  return {cls:'rc-green',  ko:'최적',   en:'Optimal',    color:'var(--green)',  bar:Math.min(val/4*100,100)};
    if (val < 2.0)  return {cls:'rc-blue',   ko:'정상',   en:'Normal',     color:'var(--blue)',   bar:Math.min(val/4*100,100)};
    if (val < 4.0)  return {cls:'rc-yellow', ko:'경계',   en:'Borderline', color:'var(--yellow)', bar:Math.min(val/4*100,100)};
    if (val < 6.0)  return {cls:'rc-orange', ko:'높음',   en:'High',       color:'var(--orange)', bar:Math.min(val/4*100,100)};
    return            {cls:'rc-red',    ko:'매우 높음', en:'Very High',  color:'var(--red)',    bar:100};
  }
  return {cls:'rc-blue', ko:'정상', en:'Normal', color:'var(--blue)', bar:50};
}

function classifyAbs(name, val) {
  // Returns {flag, ko, en} for absolute values
  if (name === 'total') {
    if (val < 170)  return {flag:'flag-opt',  ko:'최적',   en:'Optimal'};
    if (val < 200)  return {flag:'flag-norm', ko:'정상',   en:'Desirable'};
    if (val < 240)  return {flag:'flag-bord', ko:'경계',   en:'Borderline High'};
    if (val < 280)  return {flag:'flag-high', ko:'높음',   en:'High'};
    return            {flag:'flag-vh',   ko:'매우 높음', en:'Very High'};
  }
  if (name === 'ldl') {
    if (val < 100)  return {flag:'flag-opt',  ko:'최적',   en:'Optimal'};
    if (val < 130)  return {flag:'flag-norm', ko:'정상',   en:'Near Optimal'};
    if (val < 160)  return {flag:'flag-bord', ko:'경계',   en:'Borderline High'};
    if (val < 190)  return {flag:'flag-high', ko:'높음',   en:'High'};
    return            {flag:'flag-vh',   ko:'매우 높음', en:'Very High'};
  }
  if (name === 'hdl') {
    if (val >= 60)  return {flag:'flag-opt',  ko:'최적',   en:'Optimal'};
    if (val >= 40)  return {flag:'flag-norm', ko:'정상',   en:'Normal'};
    return            {flag:'flag-high', ko:'낮음',   en:'Low (Risk Factor)'};
  }
  if (name === 'tg') {
    if (val < 100)  return {flag:'flag-opt',  ko:'최적',   en:'Optimal'};
    if (val < 150)  return {flag:'flag-norm', ko:'정상',   en:'Normal'};
    if (val < 200)  return {flag:'flag-bord', ko:'경계',   en:'Borderline High'};
    if (val < 500)  return {flag:'flag-high', ko:'높음',   en:'High'};
    return            {flag:'flag-vh',   ko:'매우 높음', en:'Very High'};
  }
  if (name === 'nonhdl') {
    if (val < 130)  return {flag:'flag-opt',  ko:'최적',   en:'Optimal'};
    if (val < 160)  return {flag:'flag-norm', ko:'정상',   en:'Above Optimal'};
    if (val < 190)  return {flag:'flag-bord', ko:'경계',   en:'Borderline High'};
    return            {flag:'flag-high', ko:'높음',   en:'High'};
  }
  return {flag:'flag-norm', ko:'정상', en:'Normal'};
}

// ─── Overall Risk ──────────────────────────────────────────────────────────
function overallRisk(scores) {
  // scores: array of rc-class strings
  const worst = scores.reduce((acc, s) => {
    const order = ['rc-green','rc-blue','rc-yellow','rc-orange','rc-red'];
    return order.indexOf(s) > order.indexOf(acc) ? s : acc;
  }, 'rc-green');
  const map = {
    'rc-green':  {cls:'risk-optimal',   ko:'🟢 최적 (Optimal)',           en:'🟢 Optimal'},
    'rc-blue':   {cls:'risk-normal',    ko:'🔵 정상 (Normal)',            en:'🔵 Normal'},
    'rc-yellow': {cls:'risk-borderline',ko:'🟡 경계 주의 (Borderline)',   en:'🟡 Borderline — Monitor'},
    'rc-orange': {cls:'risk-high',      ko:'🟠 위험 (High Risk)',         en:'🟠 High Risk'},
    'rc-red':    {cls:'risk-very-high', ko:'🔴 매우 위험 (Very High)',    en:'🔴 Very High Risk'},
  };
  return map[worst];
}

// ─── Main Calculation ─────────────────────────────────────────────────────
function calculate() {
  const totalRaw = parseFloat(document.getElementById('total').value);
  const ldlRaw   = parseFloat(document.getElementById('ldl').value);
  const hdlRaw   = parseFloat(document.getElementById('hdl').value);
  const tgRaw    = parseFloat(document.getElementById('tg').value);

  if ([totalRaw, ldlRaw, hdlRaw, tgRaw].some(v => isNaN(v) || v <= 0)) {
    alert(lang === 'ko' ? '모든 수치를 입력해 주세요.' : 'Please enter all values.');
    return;
  }

  // Convert to mg/dL for calculation
  const total = unit === 'mmol' ? totalRaw * 38.67 : totalRaw;
  const ldl   = unit === 'mmol' ? ldlRaw   * 38.67 : ldlRaw;
  const hdl   = unit === 'mmol' ? hdlRaw   * 38.67 : hdlRaw;
  const tg    = unit === 'mmol' ? tgRaw    * 88.57 : tgRaw;

  if (hdl <= 0) { alert('HDL must be > 0'); return; }

  // Compute ratios
  const tcHdl  = total / hdl;
  const ldlHdl = ldl / hdl;
  const tgHdl  = tg / hdl;
  const nonHdl = total - hdl;

  const clTcHdl  = classifyRatio('tc_hdl', tcHdl);
  const clLdlHdl = classifyRatio('ldl_hdl', ldlHdl);
  const clTgHdl  = classifyRatio('tg_hdl', tgHdl);
  const overall  = overallRisk([clTcHdl.cls, clLdlHdl.cls, clTgHdl.cls]);

  // ── Overall badge ──────────────────────────────────────────────────────────
  document.getElementById('overallBadge').innerHTML =
    `<div class="risk-badge ${overall.cls}">${lang==='ko'?overall.ko:overall.en}</div>`;

  // ── Ratio cards ────────────────────────────────────────────────────────────
  const ratios = [
    { label:'Total / HDL', sub: lang==='ko'?'카스텔리 위험지수 I':'Castelli Risk Index I',
      val: tcHdl.toFixed(2), cl: clTcHdl, range: lang==='ko'?'목표 < 5.0':'Target < 5.0' },
    { label:'LDL / HDL',   sub: lang==='ko'?'카스텔리 위험지수 II':'Castelli Risk Index II',
      val: ldlHdl.toFixed(2), cl: clLdlHdl, range: lang==='ko'?'목표 < 3.0':'Target < 3.0' },
    { label:'TG / HDL',    sub: lang==='ko'?'죽상경화 지수 (AIP)':'Atherogenic Index (AIP)',
      val: tgHdl.toFixed(2), cl: clTgHdl, range: lang==='ko'?'목표 < 2.0':'Target < 2.0' },
    { label:'Non-HDL',     sub: lang==='ko'?'비HDL 콜레스테롤':'Non-HDL Cholesterol',
      val: nonHdl.toFixed(0)+' mg/dL', cl: (() => {
        const fl = classifyAbs('nonhdl', nonHdl);
        const clMap = {'flag-opt':'rc-green','flag-norm':'rc-blue','flag-bord':'rc-yellow','flag-high':'rc-orange','flag-vh':'rc-red'};
        const statusLang = lang==='ko' ? fl.ko : fl.en;
        const c = clMap[fl.flag] || 'rc-blue';
        return {cls:c, ko:fl.ko, en:fl.en, bar: Math.min(nonHdl/200*100,100)};
      })(), range: lang==='ko'?'목표 < 130 mg/dL':'Target < 130 mg/dL' },
  ];

  document.getElementById('ratioGrid').innerHTML = ratios.map(r => {
    const st = lang === 'ko' ? r.cl.ko : r.cl.en;
    return `<div class="ratio-card ${r.cl.cls}">
      <div class="rc-label">${r.sub}</div>
      <div class="rc-val">${r.val}</div>
      <div class="rc-range">${r.range}</div>
      <div class="rc-status">${st}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${r.cl.bar}%;background:${r.cl.color}"></div></div>
    </div>`;
  }).join('');

  // ── Detail Table ───────────────────────────────────────────────────────────
  const dispUnit = unit === 'mg' ? 'mg/dL' : 'mmol/L';
  const rows = [
    { nameKo:'총콜레스테롤', nameEn:'Total Cholesterol', val: totalRaw.toFixed(1)+' '+dispUnit,
      rangeKo:'<200 mg/dL 권장', rangeEn:'<200 mg/dL desirable', ass: classifyAbs('total', total) },
    { nameKo:'LDL 콜레스테롤', nameEn:'LDL Cholesterol', val: ldlRaw.toFixed(1)+' '+dispUnit,
      rangeKo:'<100 mg/dL 최적', rangeEn:'<100 mg/dL optimal',   ass: classifyAbs('ldl', ldl) },
    { nameKo:'HDL 콜레스테롤', nameEn:'HDL Cholesterol', val: hdlRaw.toFixed(1)+' '+dispUnit,
      rangeKo:'≥60 mg/dL 최적', rangeEn:'≥60 mg/dL optimal',    ass: classifyAbs('hdl', hdl) },
    { nameKo:'중성지방 (TG)',   nameEn:'Triglycerides',   val: tgRaw.toFixed(1)+' '+dispUnit,
      rangeKo:'<150 mg/dL 정상', rangeEn:'<150 mg/dL normal',   ass: classifyAbs('tg', tg) },
    { nameKo:'비HDL 콜레스테롤', nameEn:'Non-HDL Cholesterol', val: nonHdl.toFixed(0)+' mg/dL',
      rangeKo:'<130 mg/dL 최적', rangeEn:'<130 mg/dL optimal',  ass: classifyAbs('nonhdl', nonHdl) },
  ];

  document.getElementById('detailTable').innerHTML = rows.map(r => {
    const n = lang === 'ko' ? r.nameKo : r.nameEn;
    const range = lang === 'ko' ? r.rangeKo : r.rangeEn;
    const label = lang === 'ko' ? r.ass.ko : r.ass.en;
    return `<tr>
      <td>${n}</td>
      <td class="val-col">${r.val}</td>
      <td style="color:var(--muted);font-size:12px">${range}</td>
      <td><span class="flag ${r.ass.flag}">${label}</span></td>
    </tr>`;
  }).join('');

  // ── Info Box ───────────────────────────────────────────────────────────────
  const infoKo = `
    <b>Total/HDL 비율 (카스텔리 지수 I)</b>: 3.5 미만이 최적입니다. 5 이상이면 심혈관 질환 위험이 증가합니다.<br>
    <b>LDL/HDL 비율 (카스텔리 지수 II)</b>: 3.0 미만을 목표로 하세요. 4.0 이상은 고위험 수준입니다.<br>
    <b>TG/HDL 비율 (죽상경화 지수)</b>: 2.0 미만이 이상적입니다. 4.0 이상은 인슐린 저항성과 연관될 수 있습니다.<br>
    <b>비HDL 콜레스테롤</b>: 총콜레스테롤에서 HDL을 뺀 값. LDL보다 더 정확한 심혈관 위험 예측 지표입니다.
  `;
  const infoEn = `
    <b>Total/HDL (Castelli Index I)</b>: Below 3.5 is optimal. Above 5.0 indicates elevated cardiovascular risk.<br>
    <b>LDL/HDL (Castelli Index II)</b>: Target below 3.0. Above 4.0 is high risk.<br>
    <b>TG/HDL (Atherogenic Index)</b>: Below 2.0 is ideal. Above 4.0 may indicate insulin resistance and increased CVD risk.<br>
    <b>Non-HDL Cholesterol</b>: Total minus HDL — a stronger predictor of cardiovascular events than LDL alone.
  `;
  document.getElementById('infoBox').innerHTML = lang === 'ko' ? infoKo : infoEn;

  // ── Show results ───────────────────────────────────────────────────────────
  const resultsEl = document.getElementById('results');
  resultsEl.classList.add('show');
  resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
