<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객 이탈률 계산기 | Churn Rate Calculator</title>
  <meta name="description" content="시작 고객, 신규 유입, 종료 고객을 기반으로 로고 이탈률·리텐션·순증률·MRR 이탈률을 계산합니다." />
  <style>
    :root{--bg:#0b1220;--card:#121c31;--line:#2a3d61;--text:#e7efff;--muted:#9eb0d4;--pri:#7c8cff;--pri2:#22d3ee;--ok:#34d399;--warn:#fbbf24;--bad:#fb7185}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% -10%,#233864,#0b1220 50%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:1000px;margin:0 auto;padding:18px 14px 42px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.9rem}
    .back{color:#dbe7ff;text-decoration:none;border:1px solid var(--line);background:#122343;padding:8px 11px;border-radius:10px;font-size:.86rem;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:linear-gradient(160deg,#17274a,#121c31);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 12px 28px rgba(0,0,0,.35)}
    h2{margin:0 0 10px;font-size:1rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin:0 0 6px;font-weight:700}
    input,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1a32;color:var(--text);font-size:.92rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#08152f;font-weight:800}.ghost{background:#15284a;border:1px solid var(--line);color:#cfe0ff}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0f1931;border-radius:12px;padding:10px}.k{font-size:.74rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .msg{margin-top:10px;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1a31;font-size:.9rem;line-height:1.45}
    .table{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:620px}th,td{padding:9px;border-bottom:1px solid #243d63;font-size:.84rem;text-align:right}th:first-child,td:first-child{text-align:left}th{background:#13274c;color:#bfd0ef;font-size:.78rem}
    @media(max-width:860px){.grid{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>📉 고객 이탈률 계산기</h1>
      <p class="sub">로고 churn, retention, 순성장률과 MRR churn까지 한 번에 확인하세요.</p>
    </div>
    <a class="back" href="/">Back to Portal</a>
  </div>

  <section class="grid">
    <article class="card">
      <h2>고객 수 입력</h2>
      <div class="two">
        <div><label for="startCustomers">기간 시작 고객 수</label><input id="startCustomers" type="number" min="0" value="1200"></div>
        <div><label for="newCustomers">기간 내 신규 고객 수</label><input id="newCustomers" type="number" min="0" value="180"></div>
        <div><label for="endCustomers">기간 종료 고객 수</label><input id="endCustomers" type="number" min="0" value="1260"></div>
        <div><label for="months">기간 (개월)</label><input id="months" type="number" min="1" step="1" value="1"></div>
      </div>

      <h2 style="margin-top:12px">MRR(선택)</h2>
      <div class="two">
        <div><label for="startMrr">시작 MRR (원)</label><input id="startMrr" type="number" min="0" step="1000" value="98000000"></div>
        <div><label for="endMrr">종료 MRR (원)</label><input id="endMrr" type="number" min="0" step="1000" value="101500000"></div>
        <div><label for="newMrr">신규 MRR (원)</label><input id="newMrr" type="number" min="0" step="1000" value="9500000"></div>
        <div><label for="expansionMrr">업셀/확장 MRR (원)</label><input id="expansionMrr" type="number" min="0" step="1000" value="2200000"></div>
      </div>

      <div class="btns">
        <button id="calcBtn" type="button">계산</button>
        <button id="sampleBtn" class="ghost" type="button">샘플</button>
      </div>
    </article>

    <article class="card">
      <h2>핵심 결과</h2>
      <div class="kpis">
        <div class="kpi"><div class="k">이탈 고객 수</div><div class="v" id="lostCustomers">-</div></div>
        <div class="kpi"><div class="k">로고 이탈률</div><div class="v" id="churnRate">-</div></div>
        <div class="kpi"><div class="k">고객 유지율</div><div class="v" id="retentionRate">-</div></div>
        <div class="kpi"><div class="k">순성장률</div><div class="v" id="netGrowth">-</div></div>
        <div class="kpi"><div class="k">월 환산 이탈률</div><div class="v" id="monthlyChurn">-</div></div>
        <div class="kpi"><div class="k">연 환산 이탈률</div><div class="v" id="annualChurn">-</div></div>
        <div class="kpi"><div class="k">Gross Revenue Churn</div><div class="v" id="grossRevenueChurn">-</div></div>
        <div class="kpi"><div class="k">Net Revenue Churn</div><div class="v" id="netRevenueChurn">-</div></div>
      </div>
      <div class="msg" id="msg">입력값을 변경하면 자동 계산됩니다.</div>
    </article>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>지표 해석</h2>
    <div class="table">
      <table>
        <thead><tr><th>항목</th><th>값</th><th>해석</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  const $=(id)=>document.getElementById(id);
  const pct=(v)=>`${(v*100).toFixed(2)}%`;
  const won=(n)=>'₩'+Math.round(n||0).toLocaleString('ko-KR');

  function run(){
    const start=Number($('startCustomers').value);
    const add=Number($('newCustomers').value);
    const end=Number($('endCustomers').value);
    const months=Math.max(1,Number($('months').value)||1);
    const startMrr=Number($('startMrr').value);
    const endMrr=Number($('endMrr').value);
    const newMrr=Number($('newMrr').value);
    const expansionMrr=Number($('expansionMrr').value);

    if(start<=0){ $('msg').textContent='시작 고객 수는 1 이상이어야 합니다.'; return; }

    const lost=Math.max(0,start + add - end);
    const churn=lost/start;
    const retention=1-churn;
    const netGrowth=(end-start)/start;

    const monthlyChurn=1-Math.pow(Math.max(0.000001,retention),1/months);
    const annualChurn=1-Math.pow(Math.max(0.000001,1-monthlyChurn),12);

    const churnedMrr=Math.max(0,startMrr + newMrr + expansionMrr - endMrr);
    const grossRevChurn = startMrr>0 ? churnedMrr/startMrr : 0;
    const netRevChurn = startMrr>0 ? (churnedMrr-expansionMrr)/startMrr : 0;

    $('lostCustomers').textContent=`${lost.toLocaleString('ko-KR')}명`;
    $('churnRate').textContent=pct(churn);
    $('churnRate').className=`v ${churn<=0.03?'ok':churn<=0.07?'warn':'bad'}`;
    $('retentionRate').textContent=pct(retention);
    $('retentionRate').className=`v ${retention>=0.95?'ok':retention>=0.9?'warn':'bad'}`;
    $('netGrowth').textContent=pct(netGrowth);
    $('netGrowth').className=`v ${netGrowth>=0?'ok':'bad'}`;
    $('monthlyChurn').textContent=pct(monthlyChurn);
    $('annualChurn').textContent=pct(annualChurn);
    $('grossRevenueChurn').textContent=pct(grossRevChurn);
    $('grossRevenueChurn').className=`v ${grossRevChurn<=0.02?'ok':grossRevChurn<=0.05?'warn':'bad'}`;
    $('netRevenueChurn').textContent=pct(netRevChurn);
    $('netRevenueChurn').className=`v ${netRevChurn<=0?'ok':netRevChurn<=0.03?'warn':'bad'}`;

    const msg = churn <= 0.03
      ? `✅ 건강한 이탈률입니다. 현재 추세를 유지하면서 상위 고객군의 업셀 전략을 강화하세요.`
      : churn <= 0.07
      ? `⚠️ 이탈 관리 구간입니다. 온보딩/활성화 지표(7일, 30일)를 재점검하세요.`
      : `🚨 이탈률이 높습니다. 가격-가치 적합성, CS 응답속도, 핵심 기능 사용률부터 진단이 필요합니다.`;
    $('msg').textContent = msg;

    const rows=[
      ['로고 이탈률',pct(churn),`시작 고객 ${start.toLocaleString('ko-KR')}명 중 ${lost.toLocaleString('ko-KR')}명 이탈`],
      ['유지율',pct(retention),'1 - 이탈률'],
      ['순증/순감률',pct(netGrowth),`종료 고객 ${end.toLocaleString('ko-KR')}명 기준`],
      ['Gross Revenue Churn',pct(grossRevChurn),`추정 이탈 MRR ${won(churnedMrr)} / 시작 MRR ${won(startMrr)}`],
      ['Net Revenue Churn',pct(netRevChurn),'음수면 확장 매출이 이탈 매출을 상쇄함']
    ];
    $('rows').innerHTML=rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td style="text-align:left;color:#bfd0ef">${r[2]}</td></tr>`).join('');
  }

  $('calcBtn').addEventListener('click',run);
  $('sampleBtn').addEventListener('click',()=>{
    $('startCustomers').value=850;
    $('newCustomers').value=95;
    $('endCustomers').value=810;
    $('months').value=1;
    $('startMrr').value=76000000;
    $('endMrr').value=74200000;
    $('newMrr').value=5200000;
    $('expansionMrr').value=1300000;
    run();
  });
  ['startCustomers','newCustomers','endCustomers','months','startMrr','endMrr','newMrr','expansionMrr'].forEach(id=>$(id).addEventListener('input',run));
  run();
</script>
</body>
</html>
