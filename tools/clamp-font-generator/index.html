<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSS Clamp 폰트 생성기 | EastSea Tools</title>
<meta name="description" content="반응형 타이포그래피용 CSS clamp() 값을 계산하고 즉시 미리보기" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--card:#fff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--pri:#2563eb}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:900px;margin:0 auto;padding:18px}
.back{display:inline-block;text-decoration:none;color:var(--muted);margin-bottom:10px}
h1{font-size:1.45rem;margin-bottom:8px}
.desc{color:var(--muted);margin-bottom:14px;font-size:.92rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
label{font-size:.82rem;color:var(--muted);display:block;margin-bottom:4px}
input{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font:inherit}
.btns{display:flex;gap:8px;flex-wrap:wrap}
button{border:0;background:var(--pri);color:#fff;padding:10px 12px;border-radius:10px;cursor:pointer;font-weight:700}
button.ghost{background:#eff6ff;color:#1d4ed8}
.output{padding:12px;border-radius:10px;background:#0f172a;color:#e2e8f0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all}
.preview-shell{border:1px dashed #94a3b8;padding:10px;border-radius:12px;background:#fff}
.preview-box{margin:0 auto;border:1px solid var(--line);border-radius:10px;padding:12px;transition:width .2s}
#previewText{line-height:1.4}
.slider{width:100%}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.85rem;margin-top:6px}
@media (max-width:760px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← 도구 목록</a>
  <h1>🔠 CSS Clamp 폰트 생성기</h1>
  <p class="desc">최소/최대 뷰포트와 폰트 크기를 입력하면 반응형 <code>clamp()</code> 값을 자동으로 생성합니다.</p>

  <section class="card">
    <div class="grid">
      <div><label>최소 뷰포트(px)</label><input id="minVw" type="number" value="360"></div>
      <div><label>최대 뷰포트(px)</label><input id="maxVw" type="number" value="1280"></div>
      <div><label>최소 폰트(px)</label><input id="minFs" type="number" value="16" step="0.1"></div>
      <div><label>최대 폰트(px)</label><input id="maxFs" type="number" value="28" step="0.1"></div>
    </div>
    <div class="btns" style="margin-top:10px">
      <button onclick="calc()">계산</button>
      <button class="ghost" onclick="copyCss()">복사</button>
    </div>
  </section>

  <section class="card">
    <div class="output" id="cssOutput">clamp(16px, 11.3043px + 1.3043vw, 28px)</div>
    <div class="meta"><span id="details">기울기: 1.3043vw / 절편: 11.3043px</span><span id="sizeNow">현재: 16px</span></div>
  </section>

  <section class="card preview-shell">
    <label>미리보기 폭(px)</label>
    <input id="widthRange" class="slider" type="range" min="320" max="1920" value="390" oninput="updatePreview()">
    <div class="meta"><span id="wLabel">390px</span><span>슬라이더로 모바일~데스크톱 확인</span></div>
    <div id="previewBox" class="preview-box" style="width:390px">
      <p id="previewText">반응형 타이포그래피는 작은 화면에서 읽기 쉬우면서 큰 화면에서는 시원한 시각 리듬을 만듭니다.</p>
    </div>
  </section>
</div>

<script>
let lastCss='';
function v(id){return parseFloat(document.getElementById(id).value);}

function calc(){
  const minVw=v('minVw'),maxVw=v('maxVw'),minFs=v('minFs'),maxFs=v('maxFs');
  if(!(minVw>0&&maxVw>minVw&&maxFs>=minFs&&minFs>0)){alert('입력값을 확인하세요.');return;}
  const slope=((maxFs-minFs)/(maxVw-minVw))*100;
  const intercept=minFs-(slope*minVw/100);
  lastCss=`clamp(${minFs}px, ${intercept.toFixed(4)}px + ${slope.toFixed(4)}vw, ${maxFs}px)`;
  document.getElementById('cssOutput').textContent=lastCss;
  document.getElementById('details').textContent=`기울기: ${slope.toFixed(4)}vw / 절편: ${intercept.toFixed(4)}px`;
  updatePreview();
}

function clampValue(viewport,minVw,maxVw,minFs,maxFs){
  if(viewport<=minVw)return minFs;
  if(viewport>=maxVw)return maxFs;
  const t=(viewport-minVw)/(maxVw-minVw);
  return minFs+(maxFs-minFs)*t;
}

function updatePreview(){
  const w=parseInt(document.getElementById('widthRange').value,10);
  document.getElementById('wLabel').textContent=`${w}px`;
  document.getElementById('previewBox').style.width=w+'px';
  const size=clampValue(w,v('minVw'),v('maxVw'),v('minFs'),v('maxFs'));
  document.getElementById('previewText').style.fontSize=size.toFixed(2)+'px';
  document.getElementById('sizeNow').textContent=`현재: ${size.toFixed(2)}px`;
}

function copyCss(){
  if(!lastCss)calc();
  navigator.clipboard.writeText(lastCss).then(()=>alert('CSS가 복사되었습니다.'));
}

calc();
</script>
</body>
</html>
