<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Color Palette Generator Plus - Generate polished 5-color palettes for UI, branding, or social content. Tap any c 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>Color Palette Generator Plus</title>
  <style>
    :root {
      --bg: #0f1222;
      --panel: #151a2f;
      --text: #eef2ff;
      --muted: #a8b3d6;
      --border: #2b3563;
      --accent: #8c6dff;
      --ok: #3ddc97;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(900px 500px at -20% 0%, #2f1f68 0%, transparent 60%),
        radial-gradient(800px 600px at 120% 100%, #1d3664 0%, transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 18px;
    }
    .app {
      width: min(1050px, 100%);
      margin: 0 auto;
      background: rgba(255,255,255,.02);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 45px rgba(0,0,0,.35);
    }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.4vw, 1.8rem); }
    .desc { color: var(--muted); margin: 6px 0 14px; }
    .controls {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      margin-bottom: 14px;
    }
    input[type="color"], select, button {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    input[type="color"] { width: 52px; height: 42px; padding: 4px; }
    button { cursor: pointer; }
    button.primary { border: none; background: linear-gradient(90deg, #7f6bff, #5f9dff); }
    button:hover { filter: brightness(1.08); }

    .palette {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .swatch {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      background: #11152b;
    }
    .color {
      flex: 1;
      min-height: 120px;
      cursor: pointer;
      position: relative;
    }
    .lock {
      position: absolute;
      right: 8px;
      top: 8px;
      border: none;
      border-radius: 9px;
      width: 32px;
      height: 32px;
      background: rgba(0,0,0,.25);
      color: white;
      cursor: pointer;
    }
    .meta { padding: 10px; display: grid; gap: 6px; }
    .hex {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-weight: 700;
      cursor: pointer;
      background: #0b1020;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    textarea {
      width: 100%;
      margin-top: 12px;
      min-height: 90px;
      resize: vertical;
      background: #0b1020;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .note { color: var(--ok); min-height: 18px; font-size: .9rem; margin-top: 8px; }

    @media (max-width: 820px) {
      .palette { grid-template-columns: 1fr 1fr; }
      .swatch:last-child { grid-column: 1 / -1; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="app">
    <h1>Color Palette Generator Plus</h1>
    <p class="desc">Generate polished 5-color palettes for UI, branding, or social content. Tap any color to copy.</p>

    <div class="controls">
      <label>Base <input id="base" type="color" value="#6f62ff" /></label>
      <label>Scheme
        <select id="scheme">
          <option value="analogous">Analogous</option>
          <option value="complementary">Complementary</option>
          <option value="triadic">Triadic</option>
          <option value="monochrome">Monochrome</option>
        </select>
      </label>
      <button class="primary" id="generate">Generate</button>
      <button id="shuffle">Random Base</button>
      <button id="copyCss">Copy CSS Variables</button>
    </div>

    <section class="palette" id="palette"></section>
    <textarea id="cssOut" readonly></textarea>
    <p class="note" id="note"></p>
  </main>

  <script>
    const paletteEl = document.getElementById('palette');
    const baseEl = document.getElementById('base');
    const schemeEl = document.getElementById('scheme');
    const cssOut = document.getElementById('cssOut');
    const note = document.getElementById('note');
    const locks = Array(5).fill(false);
    let current = ['#6f62ff', '#7f9bff', '#73d9ff', '#78ffc6', '#f2ff79'];

    function hexToHsl(hex) {
      let c = hex.replace('#','');
      if (c.length === 3) c = c.split('').map(v => v+v).join('');
      const r = parseInt(c.slice(0,2),16)/255, g = parseInt(c.slice(2,4),16)/255, b = parseInt(c.slice(4,6),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
      let h = 0, s = 0, l = (max + min) / 2;
      if (d) {
        s = d / (1 - Math.abs(2*l - 1));
        switch(max){
          case r: h = ((g-b)/d)%6; break;
          case g: h = (b-r)/d+2; break;
          case b: h = (r-g)/d+4; break;
        }
        h = Math.round(h*60);
        if (h < 0) h += 360;
      }
      return {h,s:Math.round(s*100),l:Math.round(l*100)};
    }

    function hslToHex(h,s,l){
      s/=100; l/=100;
      const c=(1-Math.abs(2*l-1))*s;
      const x=c*(1-Math.abs((h/60)%2-1));
      const m=l-c/2;
      let r=0,g=0,b=0;
      if(h<60){r=c;g=x;} else if(h<120){r=x;g=c;} else if(h<180){g=c;b=x;}
      else if(h<240){g=x;b=c;} else if(h<300){r=x;b=c;} else {r=c;b=x;}
      const toHex = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function buildPalette(){
      const base = hexToHsl(baseEl.value);
      const scheme = schemeEl.value;
      const hues = {
        analogous: [base.h-30, base.h-10, base.h, base.h+20, base.h+40],
        complementary: [base.h, base.h+25, base.h+180, base.h+205, base.h+230],
        triadic: [base.h, base.h+120, base.h+240, base.h+25, base.h+145],
        monochrome: [base.h, base.h, base.h, base.h, base.h]
      }[scheme].map(v => (v+360)%360);

      const lights = scheme === 'monochrome' ? [18, 32, 45, 60, 78] : [30, 42, 52, 62, 74];
      const sats = scheme === 'monochrome' ? [55, 65, 70, 62, 50] : [72, 76, 80, 70, 60];

      const next = hues.map((h,i) => hslToHex(h, sats[i], lights[i]));
      current = current.map((c, i) => locks[i] ? c : next[i]);
      render();
    }

    function copy(text, msg='Copied!') {
      navigator.clipboard.writeText(text).then(() => {
        note.textContent = msg;
        setTimeout(()=> note.textContent='', 1300);
      }).catch(()=> note.textContent='Clipboard blocked');
    }

    function render(){
      paletteEl.innerHTML = '';
      current.forEach((hex, i) => {
        const card = document.createElement('article');
        card.className = 'swatch';
        card.innerHTML = `
          <div class="color" style="background:${hex}">
            <button class="lock" aria-label="toggle lock">${locks[i] ? '🔒' : '🔓'}</button>
          </div>
          <div class="meta">
            <div class="hex">${hex.toUpperCase()}</div>
          </div>
        `;
        card.querySelector('.lock').onclick = (e) => { e.stopPropagation(); locks[i] = !locks[i]; render(); };
        card.querySelector('.color').onclick = () => copy(hex.toUpperCase(), `${hex.toUpperCase()} copied`);
        card.querySelector('.hex').onclick = () => copy(hex.toUpperCase(), `${hex.toUpperCase()} copied`);
        paletteEl.appendChild(card);
      });
      cssOut.value = `:root {\n${current.map((hex, i) => `  --color-${i+1}: ${hex};`).join('\n')}\n}`;
    }

    document.getElementById('generate').onclick = buildPalette;
    document.getElementById('shuffle').onclick = () => {
      baseEl.value = `#${Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')}`;
      buildPalette();
    };
    document.getElementById('copyCss').onclick = () => copy(cssOut.value, 'CSS variables copied');

    buildPalette();
  </script>
</body>
</html>
