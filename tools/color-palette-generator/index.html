<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>브랜드 컬러 팔레트 생성기 | Color Palette Generator</title>
  <meta name="description" content="브랜드/게임 UI용 컬러 팔레트를 생성하고 CSS 변수로 복사/다운로드하는 도구" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a1020;
      --card: #121b34;
      --line: #2c4377;
      --text: #edf2ff;
      --muted: #9db0d9;
      --primary: #7d94ff;
      --ok: #35d39a;
      --danger: #ff7e8d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #1f3268 0%, var(--bg) 50%);
    }
    .wrap { max-width: 1060px; margin: 0 auto; padding: 20px 14px 56px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.8vw, 1.75rem); }
    .sub { margin-top: 6px; color: var(--muted); font-size: .92rem; }
    .home { text-decoration: none; color: var(--text); border: 1px solid var(--line); background: #101936; border-radius: 12px; padding: 8px 12px; font-size: .88rem; white-space: nowrap; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(165deg, #1a2850, var(--card));
      padding: 14px;
    }
    h2 { margin: 0 0 10px; font-size: 1.03rem; }
    .form { display: grid; gap: 10px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: block; margin-bottom: 5px; color: var(--muted); font-size: .81rem; }
    input, select, button, textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1732;
      color: var(--text);
      padding: 10px;
      font: inherit;
      font-size: .92rem;
    }
    input[type="color"] { padding: 4px; min-height: 42px; }
    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #5f76f2);
    }
    .btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .soft { background: #1a2850; border: 1px solid var(--line); font-weight: 600; }
    .status { margin-top: 8px; min-height: 1.3em; color: var(--ok); font-size: .9rem; }
    .error { color: var(--danger); }
    .palette { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .swatch {
      border-radius: 12px;
      border: 1px solid #2f4b82;
      overflow: hidden;
      background: #0d1632;
    }
    .color-preview { height: 72px; display: flex; align-items: flex-end; justify-content: space-between; padding: 8px; font-weight: 700; font-size: .8rem; }
    .color-meta { padding: 8px; font-size: .82rem; color: #d9e4ff; background: #0c1430; }
    .code {
      margin-top: 10px;
      min-height: 190px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #091228;
      color: #dbe6ff;
      padding: 10px;
      white-space: pre;
      overflow: auto;
      font: 12.5px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    @media (max-width: 900px) {
      .grid, .two { grid-template-columns: 1fr; }
      .btns { grid-template-columns: 1fr 1fr; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🎨 브랜드 컬러 팔레트 생성기</h1>
        <div class="sub">기준색 + 조합 규칙으로 UI/브랜딩용 팔레트를 생성하고 CSS/JSON으로 내보냅니다.</div>
      </div>
      <a class="home" href="/tools/">도구 목록</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="form">
          <div class="two">
            <div>
              <label for="baseHex">기준 색상 HEX *</label>
              <input id="baseHex" value="#4f7cff" maxlength="7" />
            </div>
            <div>
              <label for="basePicker">색상 피커</label>
              <input id="basePicker" type="color" value="#4f7cff" />
            </div>
          </div>
          <div class="two">
            <div>
              <label for="scheme">팔레트 유형</label>
              <select id="scheme">
                <option value="analogous">유사색 (Analogous)</option>
                <option value="complementary">보색 (Complementary)</option>
                <option value="triadic">삼각색 (Triadic)</option>
                <option value="monochrome">단색 (Monochrome)</option>
              </select>
            </div>
            <div>
              <label for="saturation">채도 보정 (%)</label>
              <input id="saturation" type="number" min="-40" max="40" value="0" />
            </div>
          </div>
          <div class="two">
            <div>
              <label for="lightness">밝기 범위 (%)</label>
              <input id="lightness" type="number" min="20" max="60" value="36" />
            </div>
            <div>
              <label for="namePrefix">CSS 변수 접두사</label>
              <input id="namePrefix" value="brand" />
            </div>
          </div>
          <div class="btns">
            <button id="generate" type="button">팔레트 생성</button>
            <button id="copy" class="soft" type="button">CSS 복사</button>
            <button id="download" class="soft" type="button">JSON 다운로드</button>
          </div>
          <div id="status" class="status"></div>
        </div>
      </article>

      <article class="card">
        <h2>결과</h2>
        <div id="palette" class="palette"></div>
        <pre id="code" class="code">생성 버튼을 눌러 팔레트를 만들어주세요.</pre>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const E = {
      baseHex: $("baseHex"),
      basePicker: $("basePicker"),
      scheme: $("scheme"),
      saturation: $("saturation"),
      lightness: $("lightness"),
      namePrefix: $("namePrefix"),
      generate: $("generate"),
      copy: $("copy"),
      download: $("download"),
      status: $("status"),
      palette: $("palette"),
      code: $("code")
    };

    let lastCss = "";
    let lastPalette = [];

    const clamp = (v, min, max) => Math.min(max, Math.max(min, v));

    function setStatus(msg, isError = false) {
      E.status.textContent = msg;
      E.status.classList.toggle("error", isError);
    }

    function normalizeHex(hex) {
      const value = hex.trim();
      if (!/^#([0-9a-fA-F]{6})$/.test(value)) return "";
      return value.toLowerCase();
    }

    function hexToRgb(hex) {
      const v = normalizeHex(hex);
      if (!v) return null;
      const n = parseInt(v.slice(1), 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function rgbToHex(r, g, b) {
      return `#${[r, g, b].map((n) => clamp(Math.round(n), 0, 255).toString(16).padStart(2, "0")).join("")}`;
    }

    function rgbToHsl(r, g, b) {
      const rn = r / 255;
      const gn = g / 255;
      const bn = b / 255;
      const max = Math.max(rn, gn, bn);
      const min = Math.min(rn, gn, bn);
      const delta = max - min;
      let h = 0;
      let s = 0;
      const l = (max + min) / 2;

      if (delta !== 0) {
        s = delta / (1 - Math.abs(2 * l - 1));
        if (max === rn) h = 60 * (((gn - bn) / delta) % 6);
        else if (max === gn) h = 60 * (((bn - rn) / delta) + 2);
        else h = 60 * (((rn - gn) / delta) + 4);
      }

      if (h < 0) h += 360;
      return { h, s: s * 100, l: l * 100 };
    }

    function hslToRgb(h, s, l) {
      const sn = clamp(s, 0, 100) / 100;
      const ln = clamp(l, 0, 100) / 100;
      const c = (1 - Math.abs(2 * ln - 1)) * sn;
      const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
      const m = ln - c / 2;
      let r1 = 0, g1 = 0, b1 = 0;

      if (h < 60) [r1, g1, b1] = [c, x, 0];
      else if (h < 120) [r1, g1, b1] = [x, c, 0];
      else if (h < 180) [r1, g1, b1] = [0, c, x];
      else if (h < 240) [r1, g1, b1] = [0, x, c];
      else if (h < 300) [r1, g1, b1] = [x, 0, c];
      else [r1, g1, b1] = [c, 0, x];

      return {
        r: (r1 + m) * 255,
        g: (g1 + m) * 255,
        b: (b1 + m) * 255
      };
    }

    function textColorFor(hex) {
      const rgb = hexToRgb(hex);
      if (!rgb) return "#ffffff";
      const luminance = (0.2126 * rgb.r + 0.7152 * rgb.g + 0.0722 * rgb.b) / 255;
      return luminance > 0.58 ? "#111827" : "#f8fbff";
    }

    function buildHueList(baseHue, scheme) {
      const norm = (h) => (h + 360) % 360;
      if (scheme === "analogous") return [norm(baseHue - 28), norm(baseHue - 12), norm(baseHue), norm(baseHue + 12), norm(baseHue + 28)];
      if (scheme === "complementary") return [norm(baseHue), norm(baseHue + 18), norm(baseHue + 180), norm(baseHue + 200), norm(baseHue - 18)];
      if (scheme === "triadic") return [norm(baseHue), norm(baseHue + 22), norm(baseHue + 120), norm(baseHue + 142), norm(baseHue + 240)];
      return [norm(baseHue), norm(baseHue), norm(baseHue), norm(baseHue), norm(baseHue)];
    }

    function generatePalette() {
      const hex = normalizeHex(E.baseHex.value);
      const prefix = E.namePrefix.value.trim().toLowerCase().replace(/[^a-z0-9-_]/g, "") || "brand";
      const satAdjust = Number(E.saturation.value) || 0;
      const lightRange = clamp(Number(E.lightness.value) || 36, 20, 60);

      if (!hex) {
        setStatus("HEX 형식이 올바르지 않습니다. 예: #4f7cff", true);
        return;
      }

      const rgb = hexToRgb(hex);
      const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
      const hueList = buildHueList(hsl.h, E.scheme.value);
      const lightOffsets = [-lightRange / 2, -lightRange / 4, 0, lightRange / 4, lightRange / 2];
      const roles = ["-900", "-700", "-500", "-300", "-100"];

      lastPalette = hueList.map((hue, i) => {
        const s = clamp(hsl.s + satAdjust, 22, 95);
        const l = clamp(hsl.l + lightOffsets[i], 8, 92);
        const mixed = hslToRgb(hue, s, l);
        const paletteHex = rgbToHex(mixed.r, mixed.g, mixed.b);
        return {
          key: `${prefix}${roles[i]}`,
          hex: paletteHex,
          hsl: `hsl(${Math.round(hue)} ${Math.round(s)}% ${Math.round(l)}%)`,
          text: textColorFor(paletteHex)
        };
      });

      renderPalette(lastPalette);
      buildCode(prefix);
      setStatus("팔레트 생성 완료");
    }

    function renderPalette(items) {
      E.palette.innerHTML = items.map((item) => `
        <div class="swatch">
          <div class="color-preview" style="background:${item.hex};color:${item.text}">
            <span>${item.key}</span>
            <span>${item.hex}</span>
          </div>
          <div class="color-meta">${item.hsl}<br/>권장 텍스트: ${item.text}</div>
        </div>
      `).join("");
    }

    function buildCode(prefix) {
      const cssLines = [":root {"];
      lastPalette.forEach((item) => {
        cssLines.push(`  --${item.key}: ${item.hex};`);
      });
      cssLines.push("}", "", "/* 사용 예시 */", `.btn-primary { background: var(--${prefix}-500); color: #fff; }`);
      lastCss = cssLines.join("\n");
      E.code.textContent = lastCss;
    }

    async function copyCss() {
      if (!lastCss) {
        setStatus("먼저 팔레트를 생성하세요.", true);
        return;
      }
      try {
        await navigator.clipboard.writeText(lastCss);
        setStatus("CSS 변수가 클립보드에 복사되었습니다.");
      } catch {
        setStatus("클립보드 복사에 실패했습니다.", true);
      }
    }

    function downloadJson() {
      if (!lastPalette.length) {
        setStatus("먼저 팔레트를 생성하세요.", true);
        return;
      }
      const data = {
        generatedAt: new Date().toISOString(),
        base: normalizeHex(E.baseHex.value),
        scheme: E.scheme.value,
        palette: lastPalette
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `palette-${(E.namePrefix.value || "brand").replace(/\s+/g, "-").toLowerCase()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus("팔레트 JSON을 다운로드했습니다.");
    }

    E.basePicker.addEventListener("input", () => {
      E.baseHex.value = E.basePicker.value;
    });
    E.baseHex.addEventListener("input", () => {
      const hex = normalizeHex(E.baseHex.value);
      if (hex) E.basePicker.value = hex;
    });

    E.generate.addEventListener("click", generatePalette);
    E.copy.addEventListener("click", copyCss);
    E.download.addEventListener("click", downloadJson);

    generatePalette();
  </script>
</body>
</html>
