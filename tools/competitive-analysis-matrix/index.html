<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>경쟁 분석 매트릭스 | Competitive Analysis Matrix</title>
  <meta name="description" content="경쟁사별 평가기준 점수와 가중치를 입력해 총점을 비교하고 레이더 차트로 시각화하는 경쟁 분석 도구" />
  <style>
    :root {
      --bg: #f4f7fc;
      --card: #fff;
      --line: #d9e2f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary2: #1d4ed8;
      --danger: #dc2626;
      --soft: #eef4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #edf3ff 0%, var(--bg) 260px);
      line-height: 1.5;
      padding: 16px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .back { display: inline-block; margin-bottom: 10px; color: var(--muted); text-decoration: none; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.3rem, 4vw, 2rem); }
    .sub { margin: 0 0 12px; color: var(--muted); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
    .primary { color: #fff; background: linear-gradient(135deg, var(--primary), var(--primary2)); }
    .ghost { background: var(--soft); color: #1e3a8a; }
    .danger { background: #fee2e2; color: #991b1b; }

    .layout { display: grid; grid-template-columns: 1.2fr .8fr; gap: 12px; }
    .box {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
    }
    .box h2 { margin: 0 0 8px; font-size: 1rem; }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 7px; font-size: 0.85rem; text-align: left; }
    th { background: #f6faff; color: #35507a; position: sticky; top: 0; }
    tr:last-child td { border-bottom: 0; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 7px;
      font-size: 0.85rem;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .matrix-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      max-height: 470px;
      background: #fff;
    }
    .matrix-wrap table { min-width: 680px; }
    .matrix-wrap td.total { font-weight: 800; color: #1e3a8a; }

    .chart-box canvas {
      width: 100%;
      height: 330px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
    }
    .legend { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; margin-top: 8px; font-size: 0.82rem; color: var(--muted); }
    .chip { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
    .summary { margin-top: 8px; font-size: 0.85rem; color: #1e3a8a; font-weight: 700; }
    .hint { margin-top: 6px; font-size: 0.8rem; color: var(--muted); }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .mini-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← 도구 목록으로</a>
    <section class="panel">
      <h1>🧩 경쟁 분석 매트릭스</h1>
      <p class="sub">경쟁사 × 평가기준 점수(1~5)와 가중치를 설정하면 총점과 레이더 차트를 자동으로 생성합니다.</p>

      <div class="toolbar">
        <button id="addCompetitorBtn" class="primary" type="button">경쟁사 추가</button>
        <button id="addCriteriaBtn" class="ghost" type="button">평가기준 추가</button>
        <button id="sampleBtn" class="ghost" type="button">샘플 데이터</button>
        <button id="csvBtn" class="ghost" type="button">CSV 내보내기</button>
        <button id="resetBtn" class="danger" type="button">초기화</button>
      </div>

      <div class="layout">
        <section>
          <div class="mini-grid">
            <section class="box">
              <h2>경쟁사(행)</h2>
              <table>
                <thead><tr><th style="width:75%">이름</th><th style="width:25%">삭제</th></tr></thead>
                <tbody id="competitorBody"></tbody>
              </table>
            </section>
            <section class="box">
              <h2>평가기준(열)</h2>
              <table>
                <thead><tr><th style="width:58%">기준</th><th style="width:22%">가중치</th><th style="width:20%">삭제</th></tr></thead>
                <tbody id="criteriaBody"></tbody>
              </table>
            </section>
          </div>

          <section class="matrix-wrap" id="matrixWrap"></section>
        </section>

        <section class="box chart-box">
          <h2>레이더 차트</h2>
          <canvas id="radarCanvas" width="500" height="330"></canvas>
          <div id="legend" class="legend"></div>
          <p id="summary" class="summary"></p>
          <p class="hint">가중치는 총점 계산에 반영됩니다. 레이더 차트는 기준별 원점수(1~5)를 비교합니다.</p>
        </section>
      </div>
    </section>
  </div>

  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const state = {
        competitors: [],
        criteria: [],
        scores: {}
      };
      const colors = ['#2563eb', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#ec4899', '#84cc16'];

      function uid() {
        return Math.random().toString(36).slice(2, 10);
      }

      function scoreKey(compId, criId) {
        return `${compId}__${criId}`;
      }

      function clampScore(v) {
        const n = Number(v || 1);
        return Math.max(1, Math.min(5, n));
      }

      function addCompetitor(name = '') {
        state.competitors.push({ id: uid(), name });
        renderAll();
      }

      function addCriteria(name = '', weight = 1) {
        state.criteria.push({ id: uid(), name, weight: Math.max(0, Number(weight || 0)) });
        renderAll();
      }

      function totals() {
        const weightSum = state.criteria.reduce((s, c) => s + Math.max(0, Number(c.weight || 0)), 0);
        const norm = weightSum > 0 ? weightSum : 1;
        return state.competitors.map((comp) => {
          const weighted = state.criteria.reduce((sum, c) => {
            const score = clampScore(state.scores[scoreKey(comp.id, c.id)] || 1);
            return sum + score * Math.max(0, Number(c.weight || 0));
          }, 0);
          return {
            id: comp.id,
            name: comp.name || '이름 없음',
            score: weighted / norm
          };
        }).sort((a, b) => b.score - a.score);
      }

      function renderCompetitors() {
        const body = $('competitorBody');
        body.innerHTML = '';
        state.competitors.forEach((comp) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input type="text" value="${comp.name.replace(/"/g, '&quot;')}" placeholder="예: 우리 회사" /></td>
            <td><button class="danger" type="button">삭제</button></td>
          `;
          tr.querySelector('input').addEventListener('input', (e) => {
            comp.name = e.target.value;
            renderMatrix();
            renderRadar();
          });
          tr.querySelector('button').addEventListener('click', () => {
            state.competitors = state.competitors.filter((c) => c.id !== comp.id);
            Object.keys(state.scores).forEach((k) => {
              if (k.startsWith(comp.id + '__')) delete state.scores[k];
            });
            renderAll();
          });
          body.appendChild(tr);
        });
        if (!state.competitors.length) {
          body.innerHTML = '<tr><td colspan="2" style="color:#64748b">경쟁사를 추가해 주세요.</td></tr>';
        }
      }

      function renderCriteria() {
        const body = $('criteriaBody');
        body.innerHTML = '';
        state.criteria.forEach((cri) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input type="text" value="${cri.name.replace(/"/g, '&quot;')}" placeholder="예: 가격 경쟁력" /></td>
            <td><input type="number" min="0" step="0.1" value="${cri.weight}" /></td>
            <td><button class="danger" type="button">삭제</button></td>
          `;
          const [nameInput, weightInput] = tr.querySelectorAll('input');
          nameInput.addEventListener('input', () => {
            cri.name = nameInput.value;
            renderMatrix();
            renderRadar();
          });
          weightInput.addEventListener('input', () => {
            cri.weight = Math.max(0, Number(weightInput.value || 0));
            renderMatrix();
            renderRadar();
          });
          tr.querySelector('button').addEventListener('click', () => {
            state.criteria = state.criteria.filter((c) => c.id !== cri.id);
            Object.keys(state.scores).forEach((k) => {
              if (k.endsWith('__' + cri.id)) delete state.scores[k];
            });
            renderAll();
          });
          body.appendChild(tr);
        });
        if (!state.criteria.length) {
          body.innerHTML = '<tr><td colspan="3" style="color:#64748b">평가기준을 추가해 주세요.</td></tr>';
        }
      }

      function renderMatrix() {
        const wrap = $('matrixWrap');
        if (!state.competitors.length || !state.criteria.length) {
          wrap.innerHTML = '<table><tbody><tr><td style="padding:10px;color:#64748b">경쟁사와 평가기준을 각각 1개 이상 추가하세요.</td></tr></tbody></table>';
          $('summary').textContent = '';
          return;
        }

        const thead = `<tr><th>경쟁사 \\ 기준</th>${state.criteria.map((c) => `<th>${c.name || '기준'}<br><small>가중치 ${Number(c.weight || 0).toFixed(1)}</small></th>`).join('')}<th>가중 총점</th></tr>`;

        const rows = state.competitors.map((comp) => {
          const cells = state.criteria.map((cri) => {
            const k = scoreKey(comp.id, cri.id);
            const v = clampScore(state.scores[k] || 3);
            return `<td><input data-k="${k}" type="number" min="1" max="5" step="1" value="${v}" /></td>`;
          }).join('');
          return `<tr><th>${comp.name || '이름 없음'}</th>${cells}<td class="total" data-total="${comp.id}">0.00</td></tr>`;
        }).join('');

        wrap.innerHTML = `<table><thead>${thead}</thead><tbody>${rows}</tbody></table>`;

        wrap.querySelectorAll('input[data-k]').forEach((input) => {
          input.addEventListener('input', () => {
            const k = input.dataset.k;
            state.scores[k] = clampScore(input.value);
            updateTotalsAndSummary();
            renderRadar();
          });
        });

        updateTotalsAndSummary();
      }

      function updateTotalsAndSummary() {
        const ranked = totals();
        ranked.forEach((item) => {
          const td = document.querySelector(`[data-total="${item.id}"]`);
          if (td) td.textContent = item.score.toFixed(2);
        });

        if (!ranked.length) {
          $('summary').textContent = '';
          return;
        }
        const top = ranked[0];
        const weightSum = state.criteria.reduce((s, c) => s + Math.max(0, Number(c.weight || 0)), 0).toFixed(1);
        $('summary').textContent = `1위: ${top.name} (${top.score.toFixed(2)}점) · 가중치 합계 ${weightSum}`;
      }

      function setupCanvas(canvas, ctx) {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const rect = canvas.getBoundingClientRect();
        const w = Math.round(rect.width * dpr);
        const h = Math.round(rect.height * dpr);
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function renderRadar() {
        const canvas = $('radarCanvas');
        const ctx = canvas.getContext('2d');
        setupCanvas(canvas, ctx);

        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        ctx.clearRect(0, 0, w, h);

        const criteria = state.criteria;
        const competitors = state.competitors;
        const legend = $('legend');
        legend.innerHTML = '';

        if (criteria.length < 3 || !competitors.length) {
          ctx.fillStyle = '#64748b';
          ctx.font = '14px -apple-system, Segoe UI, sans-serif';
          ctx.fillText('레이더 차트를 위해 기준 3개 이상, 경쟁사 1개 이상이 필요합니다.', 16, 28);
          return;
        }

        const cx = w / 2;
        const cy = h / 2;
        const maxR = Math.min(w, h) * 0.35;
        const angleStep = (Math.PI * 2) / criteria.length;

        for (let level = 1; level <= 5; level++) {
          const r = (maxR * level) / 5;
          ctx.beginPath();
          criteria.forEach((_, i) => {
            const a = -Math.PI / 2 + i * angleStep;
            const x = cx + Math.cos(a) * r;
            const y = cy + Math.sin(a) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          });
          ctx.closePath();
          ctx.strokeStyle = '#e2e8f0';
          ctx.stroke();

          ctx.fillStyle = '#94a3b8';
          ctx.font = '11px -apple-system, Segoe UI, sans-serif';
          ctx.fillText(String(level), cx + 4, cy - r + 12);
        }

        criteria.forEach((cri, i) => {
          const a = -Math.PI / 2 + i * angleStep;
          const x = cx + Math.cos(a) * maxR;
          const y = cy + Math.sin(a) * maxR;

          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(x, y);
          ctx.strokeStyle = '#cbd5e1';
          ctx.stroke();

          const lx = cx + Math.cos(a) * (maxR + 18);
          const ly = cy + Math.sin(a) * (maxR + 18);
          ctx.fillStyle = '#334155';
          ctx.font = '12px -apple-system, Segoe UI, sans-serif';
          ctx.textAlign = lx < cx - 10 ? 'right' : lx > cx + 10 ? 'left' : 'center';
          ctx.fillText(cri.name || `기준${i + 1}`, lx, ly);
        });

        competitors.forEach((comp, idx) => {
          const color = colors[idx % colors.length];
          ctx.beginPath();
          criteria.forEach((cri, i) => {
            const v = clampScore(state.scores[scoreKey(comp.id, cri.id)] || 3);
            const r = (maxR * v) / 5;
            const a = -Math.PI / 2 + i * angleStep;
            const x = cx + Math.cos(a) * r;
            const y = cy + Math.sin(a) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          });
          ctx.closePath();
          ctx.fillStyle = color + '33';
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.stroke();

          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.innerHTML = `<i class="dot" style="background:${color}"></i>${comp.name || `경쟁사 ${idx + 1}`}`;
          legend.appendChild(chip);
        });
      }

      function exportCsv() {
        if (!state.competitors.length || !state.criteria.length) {
          window.alert('CSV로 내보낼 데이터가 없습니다.');
          return;
        }

        const headers = ['경쟁사', ...state.criteria.map((c) => c.name || '기준'), '가중 총점'];
        const weightRow = ['가중치', ...state.criteria.map((c) => Number(c.weight || 0).toFixed(1)), ''];

        const ranked = totals();
        const totalMap = new Map(ranked.map((x) => [x.id, x.score]));

        const rows = state.competitors.map((comp) => {
          const scores = state.criteria.map((cri) => clampScore(state.scores[scoreKey(comp.id, cri.id)] || 3));
          return [comp.name || '이름 없음', ...scores, (totalMap.get(comp.id) || 0).toFixed(2)];
        });

        const toCsvRow = (row) => row.map((cell) => {
          const s = String(cell ?? '');
          return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
        }).join(',');

        const csv = [headers, weightRow, ...rows].map(toCsvRow).join('\n');
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'competitive-analysis-matrix.csv';
        a.click();
        URL.revokeObjectURL(url);
      }

      function renderAll() {
        renderCompetitors();
        renderCriteria();
        renderMatrix();
        renderRadar();
      }

      function loadSample() {
        state.competitors = [];
        state.criteria = [];
        state.scores = {};

        addCompetitor('우리 서비스');
        addCompetitor('A사');
        addCompetitor('B사');

        addCriteria('가격 경쟁력', 3);
        addCriteria('기능 완성도', 4);
        addCriteria('브랜드 인지도', 2);
        addCriteria('고객 지원', 3);
        addCriteria('확장성', 2);

        const comp = state.competitors;
        const cri = state.criteria;
        const seed = [
          [4, 5, 3, 5, 4],
          [3, 4, 5, 3, 4],
          [5, 3, 2, 4, 3]
        ];

        comp.forEach((c, r) => {
          cri.forEach((k, col) => {
            state.scores[scoreKey(c.id, k.id)] = seed[r][col];
          });
        });

        renderAll();
      }

      $('addCompetitorBtn').addEventListener('click', () => addCompetitor('새 경쟁사'));
      $('addCriteriaBtn').addEventListener('click', () => addCriteria('새 기준', 1));
      $('sampleBtn').addEventListener('click', loadSample);
      $('csvBtn').addEventListener('click', exportCsv);
      $('resetBtn').addEventListener('click', () => {
        if (!window.confirm('모든 데이터를 초기화할까요?')) return;
        state.competitors = [];
        state.criteria = [];
        state.scores = {};
        renderAll();
      });
      window.addEventListener('resize', renderRadar);

      loadSample();
    })();
  </script>
</body>
</html>
