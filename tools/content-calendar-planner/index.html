<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>콘텐츠 캘린더 플래너 | Content Calendar Planner</title>
  <meta name="description" content="월간 콘텐츠 캘린더에서 blog/game/tool/novel 아이템을 관리하고 발행 연속 기록과 공백을 추적하는 플래너" />
  <style>
    :root{--bg:#070d18;--bg2:#0d1528;--card:#101b33;--line:#2a3f68;--txt:#edf4ff;--muted:#a7b8db;--accent:#76acff;--blog:#38bdf8;--game:#a78bfa;--tool:#34d399;--novel:#fb7185;--planned:#f59e0b;--draft:#60a5fa;--published:#22c55e}
    *{box-sizing:border-box}
    body{margin:0;padding:18px;min-height:100vh;color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      background:radial-gradient(980px 700px at 18% -18%,#243963 0,transparent 55%),linear-gradient(145deg,var(--bg),var(--bg2))}
    .wrap{max-width:1240px;margin:0 auto}.back{color:var(--muted);text-decoration:none;font-size:.9rem}
    h1{margin:.45rem 0 .25rem;font-size:clamp(1.35rem,2.6vw,2rem)}.sub{margin:0 0 1rem;color:var(--muted)}
    .grid{display:grid;grid-template-columns:380px 1fr;gap:14px}.card{background:rgba(16,27,51,.88);border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 42px rgba(0,0,0,.35)}
    .inner{padding:14px}.title{font-size:.93rem;font-weight:800;margin:0 0 .6rem}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:9px}label{font-size:.8rem;color:var(--muted);font-weight:700}
    input,select,button{font:inherit;color:var(--txt);background:#0d1730;border:1px solid var(--line);border-radius:10px;padding:10px 11px}
    input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(118,172,255,.2)}
    button{cursor:pointer;font-weight:700}.primary{background:linear-gradient(135deg,#2f67ff,#5ea9ff);border-color:transparent}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}
    .stat{border:1px solid var(--line);border-radius:12px;padding:10px;background:#0c1730}.k{font-size:.73rem;color:var(--muted)}.v{font-size:1.14rem;font-weight:800;margin-top:2px}
    .calendar-head{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .month{font-size:1.05rem;font-weight:800}
    .cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}
    .dow{font-size:.75rem;color:var(--muted);text-align:center;font-weight:800;padding:3px 0}
    .day{border:1px solid var(--line);background:#0c1730;border-radius:11px;min-height:122px;padding:7px;display:flex;flex-direction:column;gap:5px}
    .day.other{opacity:.45}.num{font-size:.78rem;font-weight:800;color:#d8e7ff}
    .chip{display:inline-flex;padding:3px 7px;border-radius:999px;font-size:.68rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .type-blog{background:rgba(56,189,248,.2);color:var(--blog)}
    .type-game{background:rgba(167,139,250,.2);color:var(--game)}
    .type-tool{background:rgba(52,211,153,.2);color:var(--tool)}
    .type-novel{background:rgba(251,113,133,.2);color:var(--novel)}
    .st-planned{outline:1px solid rgba(245,158,11,.45)}
    .st-draft{outline:1px solid rgba(96,165,250,.45)}
    .st-published{outline:1px solid rgba(34,197,94,.45)}
    table{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:10px}
    th,td{padding:8px;border-bottom:1px solid var(--line);font-size:.8rem;text-align:left;vertical-align:top}th{background:#132342;color:#d3e3ff}
    .mini-btn{font-size:.72rem;padding:5px 7px;border-radius:8px}.muted{color:var(--muted)}
    @media (max-width:1060px){.grid{grid-template-columns:1fr}.day{min-height:100px}}
    @media (max-width:740px){.stats{grid-template-columns:1fr}.day{min-height:86px}}
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/tools/">← 도구 목록으로</a>
  <h1>🗓️ 콘텐츠 캘린더 플래너</h1>
  <p class="sub">콘텐츠 스케줄 CRUD · 월간 달력 · Markdown export · 발행 streak/gap 분석</p>

  <div class="grid">
    <section class="card"><div class="inner">
      <h2 class="title" id="formTitle">아이템 추가</h2>
      <input type="hidden" id="editId" />
      <div class="field"><label for="title">제목</label><input id="title" placeholder="예: 신규 게임 론칭 포스트" /></div>
      <div class="row">
        <div class="field" style="flex:1"><label for="type">타입</label>
          <select id="type"><option value="blog">blog</option><option value="game">game</option><option value="tool">tool</option><option value="novel">novel</option></select>
        </div>
        <div class="field" style="flex:1"><label for="status">상태</label>
          <select id="status"><option value="planned">planned</option><option value="draft">draft</option><option value="published">published</option></select>
        </div>
      </div>
      <div class="field"><label for="date">날짜</label><input id="date" type="date" /></div>
      <div class="row">
        <button class="primary" id="saveBtn">저장</button>
        <button id="cancelBtn" style="display:none">수정 취소</button>
        <button id="sampleBtn">샘플</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button id="exportBtn">Markdown export</button>
        <button id="clearBtn">전체 삭제</button>
      </div>

      <div class="stats" id="stats"></div>
    </div></section>

    <section class="card"><div class="inner">
      <div class="calendar-head">
        <div class="row">
          <button id="prevMonth">◀</button>
          <div class="month" id="monthLabel"></div>
          <button id="nextMonth">▶</button>
        </div>
        <span class="muted" id="gapLabel"></span>
      </div>
      <div class="cal" id="calendar"></div>

      <table>
        <thead><tr><th>날짜</th><th>제목</th><th>타입</th><th>상태</th><th>작업</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div></section>
  </div>
</div>

<script>
(() => {
  const KEY = 'es_content_calendar_planner_v2';
  const $ = (id) => document.getElementById(id);
  const DAYS = ['일','월','화','수','목','금','토'];

  const state = load();

  function today(){ return new Date().toISOString().slice(0,10); }
  function monthStart(d){ return d.slice(0,7) + '-01'; }
  function esc(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function defaultState(){
    return { items: [], month: monthStart(today()) };
  }

  function load(){
    try {
      const raw = JSON.parse(localStorage.getItem(KEY) || 'null');
      return raw ? { ...defaultState(), ...raw, items: Array.isArray(raw.items) ? raw.items : [] } : defaultState();
    } catch { return defaultState(); }
  }

  function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

  function itemFromForm(){
    return {
      id: $('editId').value || String(Date.now() + Math.random()),
      title: $('title').value.trim(),
      type: $('type').value,
      status: $('status').value,
      date: $('date').value || today()
    };
  }

  function resetForm(){
    $('editId').value=''; $('title').value=''; $('type').value='blog'; $('status').value='planned'; $('date').value=today();
    $('formTitle').textContent='아이템 추가'; $('cancelBtn').style.display='none';
  }

  function saveItem(){
    const item = itemFromForm();
    if(!item.title){ alert('제목을 입력하세요.'); return; }
    const idx = state.items.findIndex(i => i.id === item.id);
    if(idx >= 0) state.items[idx] = item; else state.items.push(item);
    state.items.sort((a,b) => a.date.localeCompare(b.date));
    save(); resetForm(); render();
  }

  function editItem(id){
    const it = state.items.find(i => i.id === id);
    if(!it) return;
    $('editId').value = it.id; $('title').value = it.title; $('type').value = it.type; $('status').value = it.status; $('date').value = it.date;
    $('formTitle').textContent='아이템 수정'; $('cancelBtn').style.display='inline-block';
  }

  function deleteItem(id){
    if(!confirm('삭제하시겠습니까?')) return;
    state.items = state.items.filter(i => i.id !== id);
    save(); render();
  }

  function colorClass(type, status){ return `type-${type} st-${status}`; }

  function getMonthMeta(){
    const d = new Date(state.month + 'T00:00:00');
    const y = d.getFullYear(), m = d.getMonth();
    const firstDow = new Date(y,m,1).getDay();
    const start = new Date(y,m,1-firstDow);
    return { y, m, start };
  }

  function renderCalendar(){
    const { y, m, start } = getMonthMeta();
    $('monthLabel').textContent = `${y}년 ${m+1}월`;
    const byDate = {};
    state.items.forEach(i => { (byDate[i.date] ||= []).push(i); });

    const html = [];
    DAYS.forEach(d => html.push(`<div class="dow">${d}</div>`));

    for(let i=0;i<42;i++){
      const day = new Date(start); day.setDate(start.getDate()+i);
      const key = day.toISOString().slice(0,10);
      const other = day.getMonth() !== m;
      const items = (byDate[key] || []).slice(0,3);
      html.push(`<div class="day ${other?'other':''}"><div class="num">${day.getDate()}</div>${items.map(it => `<span class="chip ${colorClass(it.type,it.status)}">${esc(it.type)} · ${esc(it.title)}</span>`).join('')}${(byDate[key]||[]).length>3?`<span class="muted" style="font-size:.7rem">+${(byDate[key]||[]).length-3}</span>`:''}</div>`);
    }

    $('calendar').innerHTML = html.join('');
  }

  function calcStreakAndGaps(){
    const published = [...new Set(state.items.filter(i => i.status === 'published').map(i => i.date))].sort();
    if(!published.length) return { totalPublished:0, longest:0, current:0, maxGap:0 };

    let longest = 1, run = 1;
    for(let i=1;i<published.length;i++){
      const prev = new Date(published[i-1]+'T00:00:00');
      const curr = new Date(published[i]+'T00:00:00');
      const diff = Math.round((curr-prev)/86400000);
      if(diff === 1){ run++; longest = Math.max(longest, run); }
      else run = 1;
    }

    let current = 1;
    for(let i=published.length-1;i>0;i--){
      const a = new Date(published[i]+'T00:00:00');
      const b = new Date(published[i-1]+'T00:00:00');
      const diff = Math.round((a-b)/86400000);
      if(diff === 1) current++; else break;
    }

    let maxGap = 0;
    for(let i=1;i<published.length;i++){
      const prev = new Date(published[i-1]+'T00:00:00');
      const curr = new Date(published[i]+'T00:00:00');
      const gap = Math.max(0, Math.round((curr-prev)/86400000)-1);
      maxGap = Math.max(maxGap, gap);
    }

    return { totalPublished: published.length, longest, current, maxGap };
  }

  function calcMonthGapDays(){
    const { y, m } = getMonthMeta();
    const daysInMonth = new Date(y,m+1,0).getDate();
    const occupied = new Set(state.items.filter(i => i.date.startsWith(`${y}-${String(m+1).padStart(2,'0')}`)).map(i => i.date));
    return daysInMonth - occupied.size;
  }

  function renderStats(){
    const total = state.items.length;
    const planned = state.items.filter(i => i.status==='planned').length;
    const draft = state.items.filter(i => i.status==='draft').length;
    const published = state.items.filter(i => i.status==='published').length;
    const sg = calcStreakAndGaps();

    $('stats').innerHTML = [
      ['총 아이템', total],
      ['Published', published],
      ['Current Streak', sg.current + '일'],
      ['Longest Streak', sg.longest + '일'],
      ['Max Gap', sg.maxGap + '일'],
      ['Planned/Draft', `${planned}/${draft}`]
    ].map(([k,v]) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');

    $('gapLabel').textContent = `이번 달 빈 날짜: ${calcMonthGapDays()}일`;
  }

  function renderTable(){
    const rows = [...state.items].sort((a,b)=>a.date.localeCompare(b.date)).map(it => `
      <tr>
        <td>${it.date}</td>
        <td>${esc(it.title)}</td>
        <td><span class="chip ${colorClass(it.type,it.status)}">${it.type}</span></td>
        <td>${it.status}</td>
        <td>
          <button class="mini-btn" data-act="edit" data-id="${it.id}">수정</button>
          <button class="mini-btn" data-act="del" data-id="${it.id}">삭제</button>
        </td>
      </tr>
    `).join('');
    $('tbody').innerHTML = rows || `<tr><td colspan="5" class="muted">데이터가 없습니다.</td></tr>`;
  }

  function exportMarkdown(){
    if(!state.items.length){ alert('내보낼 데이터가 없습니다.'); return; }
    const sorted = [...state.items].sort((a,b)=>a.date.localeCompare(b.date));
    const lines = [
      '# Content Calendar',
      '',
      '| Date | Title | Type | Status |',
      '|---|---|---|---|'
    ];
    sorted.forEach(it => lines.push(`| ${it.date} | ${it.title.replace(/\|/g,'\\|')} | ${it.type} | ${it.status} |`));
    lines.push('');
    const s = calcStreakAndGaps();
    lines.push(`- Published count: ${s.totalPublished}`);
    lines.push(`- Current streak: ${s.current} days`);
    lines.push(`- Longest streak: ${s.longest} days`);
    lines.push(`- Max gap: ${s.maxGap} days`);

    const blob = new Blob([lines.join('\n')], {type:'text/markdown;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `content-calendar-${new Date().toISOString().slice(0,10)}.md`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  function seed(){
    if(state.items.length && !confirm('기존 데이터가 있습니다. 샘플을 추가할까요?')) return;
    const now = new Date();
    const add = (n) => { const d=new Date(now); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
    const samples = [
      {title:'신규 퍼즐 게임 릴리즈 노트', type:'game', status:'published', date:add(-3)},
      {title:'텔레그램 미니앱 운영 팁', type:'blog', status:'published', date:add(-2)},
      {title:'sitemap 자동진단 도구 소개', type:'tool', status:'draft', date:add(1)},
      {title:'연재 12화 업로드', type:'novel', status:'planned', date:add(2)},
      {title:'게임 썸네일 제작 가이드', type:'blog', status:'planned', date:add(4)}
    ].map(v => ({...v,id:String(Date.now()+Math.random())}));
    state.items.push(...samples); save(); render();
  }

  function shiftMonth(delta){
    const d = new Date(state.month + 'T00:00:00'); d.setMonth(d.getMonth()+delta); state.month = monthStart(d.toISOString().slice(0,10)); save(); renderCalendar(); renderStats();
  }

  function wire(){
    $('saveBtn').addEventListener('click', saveItem);
    $('cancelBtn').addEventListener('click', resetForm);
    $('sampleBtn').addEventListener('click', seed);
    $('exportBtn').addEventListener('click', exportMarkdown);
    $('clearBtn').addEventListener('click', () => { if(confirm('전체 데이터 삭제?')){ state.items=[]; save(); render(); }});
    $('prevMonth').addEventListener('click', () => shiftMonth(-1));
    $('nextMonth').addEventListener('click', () => shiftMonth(1));

    $('tbody').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-act]');
      if(!btn) return;
      const id = btn.dataset.id;
      if(btn.dataset.act === 'edit') editItem(id);
      if(btn.dataset.act === 'del') deleteItem(id);
    });
  }

  function render(){ renderCalendar(); renderStats(); renderTable(); }

  $('date').value = today();
  wire();
  render();
})();
</script>
</body>
</html>
