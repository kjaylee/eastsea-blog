<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contract Redline Cycle ROI Calculator | 계약 레드라인 사이클 ROI 계산기</title>
  <meta name="description" content="계약 레드라인 사이클 단축 시 승률 상승과 법무 시간 절감 효과를 합산해 월 순효과, ROI, 회수기간을 계산하는 B2B Revenue Ops 도구" />
  <style>
    :root{--bg:#081426;--card:#102542;--line:#2c4f7f;--txt:#edf3ff;--muted:#a9c1e2;--pri:#7aa2ff;--soft:#173861;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errBg:rgba(248,113,113,.14)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 14% 0%,#224f84 0%,#081426 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px} .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)} .sub{margin-top:6px;color:var(--muted);font-size:.93rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px} .card{background:linear-gradient(165deg,#16345e,#102542);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem} .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px} input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1c36;color:var(--txt);font-size:.93rem}
    textarea{min-height:108px;resize:vertical;margin-top:10px} button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#648af5);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)} .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem} .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px} .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px} .v{font-size:1.06rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word} th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📄 계약 레드라인 사이클 ROI 계산기</h1>
        <div class="sub">계약 왕복 시간을 줄일 때 늘어나는 체결건과 법무 생산성 절감액을 함께 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="contractsPerMonth">월 계약 검토 건수</label><input id="contractsPerMonth" type="number" min="1" value="42" /></div>
          <div><label for="avgContractValue">평균 계약 금액 (₩)</label><input id="avgContractValue" type="number" min="1" value="38000" /></div>
          <div><label for="baseWinRate">기준 승률 (%)</label><input id="baseWinRate" type="number" min="0" max="100" step="0.1" value="29" /></div>
          <div><label for="grossMarginRate">매출총이익률 (%)</label><input id="grossMarginRate" type="number" min="1" max="100" step="0.1" value="68" /></div>
          <div><label for="currentCycleDays">현재 계약 사이클 (일)</label><input id="currentCycleDays" type="number" min="1" value="42" /></div>
          <div><label for="targetCycleDays">개선 목표 사이클 (일)</label><input id="targetCycleDays" type="number" min="1" value="26" /></div>
          <div><label for="liftPer10DaysPp">10일 단축당 승률 상승 (%p)</label><input id="liftPer10DaysPp" type="number" min="0" max="30" step="0.1" value="1.8" /></div>
          <div><label for="hoursSavedPerContract">계약당 절감 법무 시간 (h)</label><input id="hoursSavedPerContract" type="number" min="0" step="0.1" value="3.8" /></div>
          <div><label for="legalHourlyCost">법무 시간당 비용 (₩)</label><input id="legalHourlyCost" type="number" min="0" value="95" /></div>
          <div><label for="toolCostMonthly">도구 월 비용 (₩)</label><input id="toolCostMonthly" type="number" min="0" value="2200" /></div>
          <div><label for="ownerHoursMonthly">운영 담당자 월 투입시간 (h)</label><input id="ownerHoursMonthly" type="number" min="0" step="0.1" value="18" /></div>
          <div><label for="ownerHourlyCost">운영 담당자 시간당 비용 (₩)</label><input id="ownerHourlyCost" type="number" min="0" value="85" /></div>
          <div><label for="implementationCost">초기 구축비 (₩)</label><input id="implementationCost" type="number" min="0" value="18000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">사이클 단축 일수</div><div id="daysReduced" class="v">-</div></div>
          <div class="kpi"><div class="k">개선 후 승률</div><div id="newWinRate" class="v">-</div></div>
          <div class="kpi"><div class="k">월 추가 체결 계약수</div><div id="additionalWonContracts" class="v">-</div></div>
          <div class="kpi"><div class="k">월 추가 매출총이익</div><div id="incrementalGrossProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">월 법무 비용 절감</div><div id="legalCostSavings" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNetImpact" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>연간 순효과</th><td id="annualNetImpact">-</td></tr>
            <tr><th>ROI</th><td id="roiPct">-</td></tr>
            <tr><th>회수기간</th><td id="paybackMonths">-</td></tr>
            <tr><th>손익분기 필요 승률 상승</th><td id="requiredWinLiftPp">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      contractsPerMonth: $("contractsPerMonth"), avgContractValue: $("avgContractValue"), baseWinRate: $("baseWinRate"), grossMarginRate: $("grossMarginRate"),
      currentCycleDays: $("currentCycleDays"), targetCycleDays: $("targetCycleDays"), liftPer10DaysPp: $("liftPer10DaysPp"), hoursSavedPerContract: $("hoursSavedPerContract"),
      legalHourlyCost: $("legalHourlyCost"), toolCostMonthly: $("toolCostMonthly"), ownerHoursMonthly: $("ownerHoursMonthly"), ownerHourlyCost: $("ownerHourlyCost"), implementationCost: $("implementationCost"),
      daysReduced: $("daysReduced"), newWinRate: $("newWinRate"), additionalWonContracts: $("additionalWonContracts"), incrementalGrossProfit: $("incrementalGrossProfit"), legalCostSavings: $("legalCostSavings"),
      monthlyNetImpact: $("monthlyNetImpact"), annualNetImpact: $("annualNetImpact"), roiPct: $("roiPct"), paybackMonths: $("paybackMonths"), requiredWinLiftPp: $("requiredWinLiftPp"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = { contractsPerMonth: 42, avgContractValue: 38000, baseWinRate: 29, grossMarginRate: 68, currentCycleDays: 42, targetCycleDays: 26, liftPer10DaysPp: 1.8, hoursSavedPerContract: 3.8, legalHourlyCost: 95, toolCostMonthly: 2200, ownerHoursMonthly: 18, ownerHourlyCost: 85, implementationCost: 18000 };
    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(Number.isFinite(n) ? n : 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v) {
      if (!Number.isFinite(v.contractsPerMonth) || v.contractsPerMonth <= 0) return "월 계약 검토 건수는 0보다 커야 합니다.";
      if (!Number.isFinite(v.avgContractValue) || v.avgContractValue <= 0) return "평균 계약 금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.baseWinRate) || v.baseWinRate < 0 || v.baseWinRate > 100) return "기준 승률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.grossMarginRate) || v.grossMarginRate <= 0 || v.grossMarginRate > 100) return "매출총이익률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.currentCycleDays) || v.currentCycleDays <= 0) return "현재 계약 사이클은 0보다 커야 합니다.";
      if (!Number.isFinite(v.targetCycleDays) || v.targetCycleDays <= 0) return "목표 계약 사이클은 0보다 커야 합니다.";
      if (!Number.isFinite(v.liftPer10DaysPp) || v.liftPer10DaysPp < 0 || v.liftPer10DaysPp > 30) return "승률 상승 가정은 0~30%p 범위여야 합니다.";
      if (!Number.isFinite(v.hoursSavedPerContract) || v.hoursSavedPerContract < 0) return "절감 법무 시간은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.legalHourlyCost) || v.legalHourlyCost < 0) return "법무 시간당 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.toolCostMonthly) || v.toolCostMonthly < 0) return "도구 월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.ownerHoursMonthly) || v.ownerHoursMonthly < 0) return "운영 담당자 월 투입시간은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.ownerHourlyCost) || v.ownerHourlyCost < 0) return "운영 담당자 시간당 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.implementationCost) || v.implementationCost < 0) return "초기 구축비는 0 이상이어야 합니다.";
      return "";
    }

    function render() {
      const v = {
        contractsPerMonth: Number(refs.contractsPerMonth.value), avgContractValue: Number(refs.avgContractValue.value), baseWinRate: Number(refs.baseWinRate.value), grossMarginRate: Number(refs.grossMarginRate.value),
        currentCycleDays: Number(refs.currentCycleDays.value), targetCycleDays: Number(refs.targetCycleDays.value), liftPer10DaysPp: Number(refs.liftPer10DaysPp.value), hoursSavedPerContract: Number(refs.hoursSavedPerContract.value),
        legalHourlyCost: Number(refs.legalHourlyCost.value), toolCostMonthly: Number(refs.toolCostMonthly.value), ownerHoursMonthly: Number(refs.ownerHoursMonthly.value), ownerHourlyCost: Number(refs.ownerHourlyCost.value), implementationCost: Number(refs.implementationCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err) {
        ["daysReduced","newWinRate","additionalWonContracts","incrementalGrossProfit","legalCostSavings","monthlyNetImpact","annualNetImpact","roiPct","paybackMonths","requiredWinLiftPp"].forEach((k)=>refs[k].textContent="-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const baseWinRate = v.baseWinRate / 100;
      const grossMargin = v.grossMarginRate / 100;
      const daysReduced = v.currentCycleDays - v.targetCycleDays;
      const winLift = (daysReduced / 10) * (v.liftPer10DaysPp / 100);
      const newWinRate = Math.max(0, Math.min(1, baseWinRate + winLift));

      const additionalWonContracts = v.contractsPerMonth * (newWinRate - baseWinRate);
      const incrementalGrossProfit = additionalWonContracts * v.avgContractValue * grossMargin;
      const legalCostSavings = v.contractsPerMonth * v.hoursSavedPerContract * v.legalHourlyCost;
      const monthlyBenefit = incrementalGrossProfit + legalCostSavings;

      const monthlyOperatingCost = v.toolCostMonthly + (v.ownerHoursMonthly * v.ownerHourlyCost);
      const monthlyNetImpact = monthlyBenefit - monthlyOperatingCost;
      const annualNetImpact = monthlyNetImpact * 12 - v.implementationCost;

      const totalInvestment = (monthlyOperatingCost * 12) + v.implementationCost;
      const roiPct = totalInvestment > 0 ? (annualNetImpact / totalInvestment) * 100 : 0;
      const paybackMonths = monthlyNetImpact > 0 ? (v.implementationCost / monthlyNetImpact) : Infinity;

      const denom = v.contractsPerMonth * v.avgContractValue * grossMargin;
      const requiredWinLift = denom > 0 ? (monthlyOperatingCost - legalCostSavings) / denom : Infinity;

      refs.daysReduced.textContent = `${num(daysReduced, 1)}일`;
      refs.newWinRate.textContent = `${num(newWinRate * 100, 2)}%`;
      refs.additionalWonContracts.textContent = `${num(additionalWonContracts, 2)}건`;
      refs.incrementalGrossProfit.textContent = money(incrementalGrossProfit);
      refs.legalCostSavings.textContent = money(legalCostSavings);
      refs.monthlyNetImpact.textContent = money(monthlyNetImpact);
      refs.annualNetImpact.textContent = money(annualNetImpact);
      refs.roiPct.textContent = `${num(roiPct, 2)}%`;
      refs.paybackMonths.textContent = Number.isFinite(paybackMonths) ? `${num(paybackMonths, 2)}개월` : "N/A";
      refs.requiredWinLiftPp.textContent = Number.isFinite(requiredWinLift)
        ? `${num(Math.max(0, requiredWinLift * 100), 2)}%p`
        : "N/A";

      refs.status.innerHTML = monthlyNetImpact > 0
        ? `<span class="ok">●</span> 월 순효과 ${money(monthlyNetImpact)} (투자 회수 가능)`
        : `<span class="warn">●</span> 월 순효과 ${money(monthlyNetImpact)} (가정 조정 필요)`;

      refs.summary.value = [
        "[Contract Redline Cycle ROI 요약]",
        `사이클 단축 일수: ${num(daysReduced, 1)}일`,
        `개선 후 승률: ${num(newWinRate * 100, 2)}%`,
        `월 추가 체결 계약수: ${num(additionalWonContracts, 2)}건`,
        `월 추가 매출총이익: ${money(incrementalGrossProfit)}`,
        `월 법무 비용 절감: ${money(legalCostSavings)}`,
        `월 순효과: ${money(monthlyNetImpact)}`,
        `연간 순효과: ${money(annualNetImpact)}`,
        `ROI: ${num(roiPct, 2)}%`,
        `회수기간: ${Number.isFinite(paybackMonths) ? `${num(paybackMonths, 2)}개월` : "N/A"}`,
        `손익분기 필요 승률 상승: ${Number.isFinite(requiredWinLift) ? `${num(Math.max(0, requiredWinLift * 100), 2)}%p` : "N/A"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k,v]) => refs[k].value = v);
      render();
    });

    [refs.contractsPerMonth, refs.avgContractValue, refs.baseWinRate, refs.grossMarginRate, refs.currentCycleDays, refs.targetCycleDays, refs.liftPer10DaysPp, refs.hoursSavedPerContract, refs.legalHourlyCost, refs.toolCostMonthly, refs.ownerHoursMonthly, refs.ownerHourlyCost, refs.implementationCost].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
