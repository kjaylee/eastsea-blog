<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversion Funnel Revenue Forecast | 전환 퍼널 매출 예측기</title>
  <meta name="description" content="방문자, 리드 전환율, 상담 전환율, 클로징율, 객단가를 기반으로 퍼널 단계별 수량·매출·CAC·ROAS를 계산하고 목표 매출 달성에 필요한 트래픽을 예측하는 계산기" />
  <style>
    :root{--bg:#0a1224;--card:#121d39;--line:#30486d;--txt:#eef2ff;--muted:#a5b4d4;--pri:#a78bfa;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:var(--txt);background:radial-gradient(circle at 9% 0%,#3b2e7e 0%,var(--bg) 52%)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.5}
    .home{white-space:nowrap;color:#ede9fe;text-decoration:none;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#1d2a4f}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#1a2a53,#121d39);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#101a34;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
    .soft{background:#2a2252;border:1px solid var(--line)}
    textarea{margin-top:10px;min-height:102px;resize:vertical}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f3c57;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#101933;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.14rem;font-weight:800}
    .v.sm{font-size:1.01rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#1b2a4f;color:#d6ccff;font-size:.76rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🧮 전환 퍼널 매출 예측기</h1>
        <div class="sub">상단 퍼널부터 결제까지 단계별 전환을 연결해 월 매출과 CAC/ROAS를 예측하고, 목표 매출까지의 트래픽 갭을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="visitors">월 방문자 수</label><input id="visitors" type="number" min="1" step="1" value="120000" /></div>
          <div><label for="optinRate">리드 전환율 (%)</label><input id="optinRate" type="number" min="0" max="100" step="0.01" value="4.2" /></div>
          <div><label for="callRate">상담 전환율 (%)</label><input id="callRate" type="number" min="0" max="100" step="0.01" value="28" /></div>
          <div><label for="closeRate">클로징율 (%)</label><input id="closeRate" type="number" min="0" max="100" step="0.01" value="22" /></div>
          <div><label for="aov">객단가 AOV (KRW)</label><input id="aov" type="number" min="1" value="165000" /></div>
          <div><label for="repeat">구매자당 반복 구매수 (추가)</label><input id="repeat" type="number" min="0" step="0.1" value="0.4" /></div>
          <div><label for="adSpend">광고비 (KRW)</label><input id="adSpend" type="number" min="0" value="18000000" /></div>
          <div><label for="targetRevenue">목표 월 매출 (KRW)</label><input id="targetRevenue" type="number" min="0" value="120000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">예상 월 매출</div><div id="revenue" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 주문수</div><div id="orders" class="v">-</div></div>
          <div class="kpi"><div class="k">CAC (고객획득비용)</div><div id="cac" class="v sm">-</div></div>
          <div class="kpi"><div class="k">ROAS</div><div id="roas" class="v sm">-</div></div>
          <div class="kpi"><div class="k">방문자당 가치</div><div id="revenuePerVisitor" class="v sm">-</div></div>
          <div class="kpi"><div class="k">목표까지 방문자 갭</div><div id="trafficGap" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">퍼널 단계</h2>
        <table>
          <tbody>
            <tr><th>리드 수</th><td id="leads">-</td></tr>
            <tr><th>상담 수</th><td id="calls">-</td></tr>
            <tr><th>신규 구매자 수</th><td id="buyers">-</td></tr>
            <tr><th>총 주문수 (반복 포함)</th><td id="ordersDetail">-</td></tr>
            <tr><th>목표 매출 달성 필요 방문자</th><td id="neededVisitors">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      visitors: $('visitors'), optinRate: $('optinRate'), callRate: $('callRate'), closeRate: $('closeRate'),
      aov: $('aov'), repeat: $('repeat'), adSpend: $('adSpend'), targetRevenue: $('targetRevenue'),
      revenue: $('revenue'), orders: $('orders'), cac: $('cac'), roas: $('roas'), revenuePerVisitor: $('revenuePerVisitor'), trafficGap: $('trafficGap'),
      leads: $('leads'), calls: $('calls'), buyers: $('buyers'), ordersDetail: $('ordersDetail'), neededVisitors: $('neededVisitors'),
      status: $('status'), error: $('error'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = { visitors: 120000, optinRate: 4.2, callRate: 28, closeRate: 22, aov: 165000, repeat: 0.4, adSpend: 18000000, targetRevenue: 120000000 };
    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const nfmt = (n, d = 2) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });

    const inRate = (n) => Number.isFinite(n) && n >= 0 && n <= 100;

    function validate(v) {
      if (!Number.isFinite(v.visitors) || v.visitors <= 0) return '월 방문자 수는 1 이상이어야 합니다.';
      if (!inRate(v.optinRate)) return '리드 전환율은 0~100 범위여야 합니다.';
      if (!inRate(v.callRate)) return '상담 전환율은 0~100 범위여야 합니다.';
      if (!inRate(v.closeRate)) return '클로징율은 0~100 범위여야 합니다.';
      if (!Number.isFinite(v.aov) || v.aov <= 0) return '객단가는 0보다 커야 합니다.';
      if (!Number.isFinite(v.repeat) || v.repeat < 0) return '반복 구매수는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.adSpend) || v.adSpend < 0) return '광고비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.targetRevenue) || v.targetRevenue < 0) return '목표 매출은 0 이상이어야 합니다.';
      return '';
    }

    function compute(v) {
      const leadRate = v.optinRate / 100;
      const callRate = v.callRate / 100;
      const closeRate = v.closeRate / 100;

      const leads = v.visitors * leadRate;
      const calls = leads * callRate;
      const buyers = calls * closeRate;
      const orders = buyers * (1 + v.repeat);

      const revenue = orders * v.aov;
      const cac = buyers > 0 ? v.adSpend / buyers : Infinity;
      const roas = v.adSpend > 0 ? revenue / v.adSpend : (revenue > 0 ? Infinity : 0);
      const revenuePerVisitor = v.visitors > 0 ? revenue / v.visitors : 0;

      const neededVisitors = revenuePerVisitor > 0 ? (v.targetRevenue / revenuePerVisitor) : Infinity;
      const trafficGap = Number.isFinite(neededVisitors) ? neededVisitors - v.visitors : Infinity;

      return { leads, calls, buyers, orders, revenue, cac, roas, revenuePerVisitor, neededVisitors, trafficGap };
    }

    function clearOutputs() {
      ['revenue','orders','cac','roas','revenuePerVisitor','trafficGap','leads','calls','buyers','ordersDetail','neededVisitors'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function render() {
      const v = {
        visitors: Number(refs.visitors.value),
        optinRate: Number(refs.optinRate.value),
        callRate: Number(refs.callRate.value),
        closeRate: Number(refs.closeRate.value),
        aov: Number(refs.aov.value),
        repeat: Number(refs.repeat.value),
        adSpend: Number(refs.adSpend.value),
        targetRevenue: Number(refs.targetRevenue.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        clearOutputs();
        return;
      }

      const r = compute(v);

      refs.revenue.textContent = won(r.revenue);
      refs.orders.textContent = nfmt(r.orders, 1);
      refs.cac.textContent = Number.isFinite(r.cac) ? won(r.cac) : 'N/A';
      refs.roas.textContent = Number.isFinite(r.roas) ? `${nfmt(r.roas, 2)}x` : '∞';
      refs.revenuePerVisitor.textContent = won(r.revenuePerVisitor);
      refs.trafficGap.textContent = Number.isFinite(r.trafficGap) ? `${nfmt(r.trafficGap, 0)}명` : 'N/A';

      refs.leads.textContent = `${nfmt(r.leads, 1)}명`;
      refs.calls.textContent = `${nfmt(r.calls, 1)}건`;
      refs.buyers.textContent = `${nfmt(r.buyers, 1)}명`;
      refs.ordersDetail.textContent = `${nfmt(r.orders, 1)}건`;
      refs.neededVisitors.textContent = Number.isFinite(r.neededVisitors) ? `${nfmt(r.neededVisitors, 0)}명` : 'N/A';

      if (r.revenue >= v.targetRevenue) {
        refs.status.innerHTML = `<span class="good">●</span> 목표 매출 달성 가능 (초과 ${won(r.revenue - v.targetRevenue)})`;
      } else if (r.trafficGap <= v.visitors * 0.1) {
        refs.status.innerHTML = `<span class="warn">●</span> 목표 근접: 방문자 약 ${nfmt(Math.max(r.trafficGap, 0),0)}명 추가 필요`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> 목표 미달: 방문자/전환율 개선 필요`;
      }

      refs.summary.value = [
        '[Conversion Funnel Revenue Forecast 요약]',
        `리드/상담/구매자: ${nfmt(r.leads,1)} / ${nfmt(r.calls,1)} / ${nfmt(r.buyers,1)}`,
        `총 주문수(반복 포함): ${nfmt(r.orders,1)}`,
        `예상 월 매출: ${won(r.revenue)}`,
        `CAC / ROAS: ${Number.isFinite(r.cac) ? won(r.cac) : 'N/A'} / ${Number.isFinite(r.roas) ? nfmt(r.roas,2)+'x' : '∞'}`,
        `목표 매출 달성 필요 방문자: ${Number.isFinite(r.neededVisitors) ? nfmt(r.neededVisitors,0)+'명' : 'N/A'}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, v]) => { refs[k].value = v; });
      render();
    });

    [refs.visitors, refs.optinRate, refs.callRate, refs.closeRate, refs.aov, refs.repeat, refs.adSpend, refs.targetRevenue].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
