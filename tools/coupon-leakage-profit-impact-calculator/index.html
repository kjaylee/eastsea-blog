<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupon Leakage Profit Impact Calculator | 쿠폰 유출 손익 영향 계산기</title>
  <meta name="description" content="쿠폰 유출 통제 시나리오에서 월 순이익 개선, ROI, 회수기간, 손익분기 유출 감소율을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}.head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.8vw,1.7rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}textarea{min-height:100px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.08rem;font-weight:800;word-break:break-word}.v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🧾 쿠폰 유출 손익 영향 계산기</h1>
        <div class="sub" data-i18n="subtitle">쿠폰 유출(남용/무효) 통제 시나리오의 월 순이익 개선, ROI, 회수기간, 손익분기 유출 감소율을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="orders" data-i18n="orders">월 쿠폰 적용 주문수</label><input id="orders" type="number" min="1" value="22000" /></div>
          <div><label for="aov" data-i18n="aov">주문당 평균 매출 (AOV, KRW)</label><input id="aov" type="number" min="1" value="54000" /></div>
          <div><label for="margin" data-i18n="margin">매출총이익률 (%)</label><input id="margin" type="number" min="0" max="100" step="0.1" value="42" /></div>
          <div><label for="validDiscount" data-i18n="validDiscount">정상 쿠폰 할인율 (%)</label><input id="validDiscount" type="number" min="0" max="100" step="0.1" value="12" /></div>
          <div><label for="leakShare" data-i18n="leakShare">유출 주문 비중 (%)</label><input id="leakShare" type="number" min="0" max="100" step="0.1" value="28" /></div>
          <div><label for="extraLeakDiscount" data-i18n="extraLeakDiscount">유출 주문 추가 할인 손실률 (%p)</label><input id="extraLeakDiscount" type="number" min="0" max="100" step="0.1" value="9" /></div>
          <div><label for="platformFee" data-i18n="platformFee">제휴/플랫폼 수수료율 (%)</label><input id="platformFee" type="number" min="0" max="100" step="0.1" value="5" /></div>
          <div><label for="fraudLoss" data-i18n="fraudLoss">유출 주문 사기·차지백 손실률 (%)</label><input id="fraudLoss" type="number" min="0" max="100" step="0.1" value="3" /></div>
          <div><label for="reduction" data-i18n="reduction">유출 감소율 (%)</label><input id="reduction" type="number" min="0" max="100" step="0.1" value="45" /></div>
          <div><label for="toolCost" data-i18n="toolCost">통제 솔루션 월 비용 (KRW)</label><input id="toolCost" type="number" min="0" value="4200000" /></div>
          <div><label for="setup" data-i18n="setup">초기 셋업비 (KRW)</label><input id="setup" type="number" min="0" value="12000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_before">통제 전 월 순이익</div><div id="baselineNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_after">통제 후 월 순이익</div><div id="controlledNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthly">월 순증 순이익</div><div id="monthlyUplift" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_period">기간 순효과(셋업비 반영)</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_leakedBefore">현재 유출 주문수</th><td id="leakedBefore">-</td></tr>
            <tr><th data-i18n="d_leakedAfter">개선 후 유출 주문수</th><td id="leakedAfter">-</td></tr>
            <tr><th data-i18n="d_breakEven">손익분기 유출 감소율</th><td id="breakEvenReduction">-</td></tr>
            <tr><th data-i18n="d_savingsPotential">유출 통제 최대 절감 잠재액(월)</th><td id="savingsPotential">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      orders:$("orders"), aov:$("aov"), margin:$("margin"), validDiscount:$("validDiscount"), leakShare:$("leakShare"), extraLeakDiscount:$("extraLeakDiscount"), platformFee:$("platformFee"), fraudLoss:$("fraudLoss"), reduction:$("reduction"), toolCost:$("toolCost"), setup:$("setup"), months:$("months"),
      baselineNet:$("baselineNet"), controlledNet:$("controlledNet"), monthlyUplift:$("monthlyUplift"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      leakedBefore:$("leakedBefore"), leakedAfter:$("leakedAfter"), breakEvenReduction:$("breakEvenReduction"), savingsPotential:$("savingsPotential"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { orders:22000, aov:54000, margin:42, validDiscount:12, leakShare:28, extraLeakDiscount:9, platformFee:5, fraudLoss:3, reduction:45, toolCost:4200000, setup:12000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"🧾 쿠폰 유출 손익 영향 계산기", subtitle:"쿠폰 유출(남용/무효) 통제 시나리오의 월 순이익 개선, ROI, 회수기간, 손익분기 유출 감소율을 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        orders:"월 쿠폰 적용 주문수", aov:"주문당 평균 매출 (AOV, KRW)", margin:"매출총이익률 (%)", validDiscount:"정상 쿠폰 할인율 (%)", leakShare:"유출 주문 비중 (%)", extraLeakDiscount:"유출 주문 추가 할인 손실률 (%p)", platformFee:"제휴/플랫폼 수수료율 (%)", fraudLoss:"유출 주문 사기·차지백 손실률 (%)", reduction:"유출 감소율 (%)", toolCost:"통제 솔루션 월 비용 (KRW)", setup:"초기 셋업비 (KRW)", months:"분석 기간 (개월)",
        k_before:"통제 전 월 순이익", k_after:"통제 후 월 순이익", k_monthly:"월 순증 순이익", k_period:"기간 순효과(셋업비 반영)", k_roi:"ROI", k_payback:"회수기간",
        d_leakedBefore:"현재 유출 주문수", d_leakedAfter:"개선 후 유출 주문수", d_breakEven:"손익분기 유출 감소율", d_savingsPotential:"유출 통제 최대 절감 잠재액(월)",
        errOrders:"주문 수는 1 이상이어야 합니다.", errAov:"AOV는 0보다 커야 합니다.", errRates:"비율 값은 0~100 범위여야 합니다.", errCosts:"비용 값은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~60개월 범위여야 합니다.",
        impossible:"달성 불가", noPayback:"회수 불가", statusGood:"쿠폰 유출 통제가 수익 개선에 유리합니다", statusBad:"현재 가정에서는 통제 효과가 비용을 상회하지 못합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.", unitMonth:"개월", unitOrders:"건", summaryTitle:"[Coupon Leakage Profit Impact Summary]"
      },
      en: {
        title:"🧾 Coupon Leakage Profit Impact Calculator", subtitle:"Estimate net-profit improvement, ROI, payback, and break-even leakage reduction for coupon leakage controls.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        orders:"Monthly coupon-attributed orders", aov:"Average order value (KRW)", margin:"Gross margin (%)", validDiscount:"Valid coupon discount rate (%)", leakShare:"Leaked order share (%)", extraLeakDiscount:"Extra discount loss on leaked orders (%p)", platformFee:"Affiliate/platform fee rate (%)", fraudLoss:"Fraud/chargeback loss on leaked orders (%)", reduction:"Leakage reduction rate (%)", toolCost:"Control solution monthly cost (KRW)", setup:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_before:"Monthly net profit before control", k_after:"Monthly net profit after control", k_monthly:"Monthly net uplift", k_period:"Period net impact (after setup)", k_roi:"ROI", k_payback:"Payback period",
        d_leakedBefore:"Leaked orders (current)", d_leakedAfter:"Leaked orders (after control)", d_breakEven:"Break-even leakage reduction", d_savingsPotential:"Max monthly savings potential from leakage control",
        errOrders:"Orders must be at least 1.", errAov:"AOV must be greater than 0.", errRates:"Rate values must be between 0 and 100.", errCosts:"Cost values must be >= 0.", errMonths:"Analysis period must be 1 to 60 months.",
        impossible:"Not feasible", noPayback:"No payback", statusGood:"Leakage control is financially favorable", statusBad:"Control effect does not offset cost under current assumptions", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard unavailable. Please copy manually.", unitMonth:"months", unitOrders:"orders", summaryTitle:"[Coupon Leakage Profit Impact Summary]"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.orders) || v.orders < 1) return t("errOrders");
      if (!Number.isFinite(v.aov) || v.aov <= 0) return t("errAov");
      if ([v.margin,v.validDiscount,v.leakShare,v.extraLeakDiscount,v.platformFee,v.fraudLoss,v.reduction].some((n)=>!Number.isFinite(n) || n < 0 || n > 100)) return t("errRates");
      if ([v.toolCost,v.setup].some((n)=>!Number.isFinite(n) || n < 0)) return t("errCosts");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return t("errMonths");
      return "";
    }

    function scenarioNet(v, leakRate){
      const validOrders = v.orders * (1 - leakRate);
      const leakedOrders = v.orders * leakRate;
      const grossProfit = v.orders * v.aov * (v.margin / 100);
      const discountCost = (validOrders * v.aov * (v.validDiscount / 100)) + (leakedOrders * v.aov * ((v.validDiscount + v.extraLeakDiscount) / 100));
      const platformCost = v.orders * v.aov * (v.platformFee / 100);
      const fraudCost = leakedOrders * v.aov * (v.fraudLoss / 100);
      const net = grossProfit - discountCost - platformCost - fraudCost;
      return { validOrders, leakedOrders, grossProfit, discountCost, platformCost, fraudCost, net };
    }

    function compute(v){
      const currentLeakRate = v.leakShare / 100;
      const reducedLeakRate = currentLeakRate * (1 - (v.reduction / 100));

      const before = scenarioNet(v, currentLeakRate);
      const afterRaw = scenarioNet(v, reducedLeakRate);
      const controlledNet = afterRaw.net - v.toolCost;

      const monthlyUplift = controlledNet - before.net;
      const periodNet = (monthlyUplift * v.months) - v.setup;
      const roi = v.setup === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / v.setup) * 100;
      const payback = monthlyUplift > 0 ? (v.setup / monthlyUplift) : Infinity;

      const savingsPotential = v.orders * currentLeakRate * v.aov * ((v.extraLeakDiscount + v.fraudLoss) / 100);
      const breakEvenReduction = savingsPotential > 0 ? ((v.toolCost / savingsPotential) * 100) : Infinity;

      return { before, afterRaw, controlledNet, monthlyUplift, periodNet, roi, payback, savingsPotential, breakEvenReduction };
    }

    function resetOutputs(){
      ["baselineNet","controlledNet","monthlyUplift","periodNet","roi","payback","leakedBefore","leakedAfter","breakEvenReduction","savingsPotential"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        orders:Number(refs.orders.value), aov:Number(refs.aov.value), margin:Number(refs.margin.value), validDiscount:Number(refs.validDiscount.value), leakShare:Number(refs.leakShare.value),
        extraLeakDiscount:Number(refs.extraLeakDiscount.value), platformFee:Number(refs.platformFee.value), fraudLoss:Number(refs.fraudLoss.value), reduction:Number(refs.reduction.value),
        toolCost:Number(refs.toolCost.value), setup:Number(refs.setup.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.baselineNet.textContent = money(r.before.net);
      refs.controlledNet.textContent = money(r.controlledNet);
      refs.monthlyUplift.textContent = money(r.monthlyUplift);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback");
      refs.leakedBefore.textContent = `${num(r.before.leakedOrders,0)} ${t("unitOrders")}`;
      refs.leakedAfter.textContent = `${num(r.afterRaw.leakedOrders,0)} ${t("unitOrders")}`;
      refs.savingsPotential.textContent = money(r.savingsPotential);
      refs.breakEvenReduction.textContent = Number.isFinite(r.breakEvenReduction) && r.breakEvenReduction <= 100
        ? `${num(r.breakEvenReduction,2)}%`
        : t("impossible");

      refs.status.innerHTML = r.monthlyUplift >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_before")}: ${money(r.before.net)}`,
        `${t("k_after")}: ${money(r.controlledNet)}`,
        `${t("k_monthly")}: ${money(r.monthlyUplift)}`,
        `${t("k_period")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("d_breakEven")}: ${Number.isFinite(r.breakEvenReduction) && r.breakEvenReduction <= 100 ? `${num(r.breakEvenReduction,2)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.orders,refs.aov,refs.margin,refs.validDiscount,refs.leakShare,refs.extraLeakDiscount,refs.platformFee,refs.fraudLoss,refs.reduction,refs.toolCost,refs.setup,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
