<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPQ Discount Guardrail ROI Calculator | CPQ 할인 가드레일 ROI 계산기</title>
  <meta name="description" content="할인율 통제(Discount Guardrail) 적용 시 매출총이익 개선, 월/연 순효과, ROI, 회수기간을 계산하는 B2B 가격 운영 도구" />
  <style>
    :root{--bg:#081426;--card:#102542;--line:#2c4f7f;--txt:#edf3ff;--muted:#a9c1e2;--pri:#7aa2ff;--soft:#173861;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errBg:rgba(248,113,113,.14)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#234e85 0%,#081426 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px} .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)} .sub{margin-top:6px;color:var(--muted);font-size:.93rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px} .card{background:linear-gradient(165deg,#16345e,#102542);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem} .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1c36;color:var(--txt);font-size:.93rem}
    textarea{min-height:108px;resize:vertical;margin-top:10px} button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#648af5);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)} .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block} .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0} .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.06rem;font-weight:800;word-break:break-word} .pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word} th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🧮 CPQ 할인 가드레일 ROI 계산기</h1>
        <div class="sub">할인율 통제 시나리오가 만드는 매출총이익 회복분과 투자 회수 기간을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="monthlyQuotes">월 견적 건수</label><input id="monthlyQuotes" type="number" min="1" value="180" /></div>
          <div><label for="avgDealSize">평균 리스트 딜 금액 (₩)</label><input id="avgDealSize" type="number" min="1" value="24000" /></div>
          <div><label for="currentWinRate">현재 승률 (%)</label><input id="currentWinRate" type="number" min="0" max="100" step="0.1" value="27" /></div>
          <div><label for="winRateChangePp">가드레일 적용 후 승률 변화 (%p)</label><input id="winRateChangePp" type="number" min="-50" max="50" step="0.1" value="-1" /></div>
          <div><label for="currentDiscountRate">현재 평균 할인율 (%)</label><input id="currentDiscountRate" type="number" min="0" max="95" step="0.1" value="18" /></div>
          <div><label for="targetDiscountRate">목표 평균 할인율 (%)</label><input id="targetDiscountRate" type="number" min="0" max="95" step="0.1" value="12" /></div>
          <div><label for="grossMarginRate">매출총이익률 (%)</label><input id="grossMarginRate" type="number" min="1" max="100" step="0.1" value="72" /></div>
          <div><label for="platformCostMonthly">CPQ 월 비용 (₩)</label><input id="platformCostMonthly" type="number" min="0" step="1" value="2400" /></div>
          <div><label for="enablementCostMonthly">Enablement 월 비용 (₩)</label><input id="enablementCostMonthly" type="number" min="0" step="1" value="1600" /></div>
          <div><label for="implementationCost">초기 구축비 (₩)</label><input id="implementationCost" type="number" min="0" step="1" value="22000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">현재 월 매출총이익</div><div id="currentGrossProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">개선 후 월 매출총이익</div><div id="newGrossProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">월 매출총이익 개선분</div><div id="monthlyProfitLift" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과 (비용 반영)</div><div id="monthlyNetImpact" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 순효과</div><div id="annualNetImpact" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roiPct" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>회수기간</th><td id="paybackMonths">-</td></tr>
            <tr><th>월 운영비</th><td id="monthlyOperatingCost">-</td></tr>
            <tr><th>추정 손익분기 목표 할인율</th><td id="breakEvenDiscount">-</td></tr>
            <tr><th>개선 후 예상 승률</th><td id="newWinRate">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      monthlyQuotes: $("monthlyQuotes"), avgDealSize: $("avgDealSize"), currentWinRate: $("currentWinRate"), winRateChangePp: $("winRateChangePp"),
      currentDiscountRate: $("currentDiscountRate"), targetDiscountRate: $("targetDiscountRate"), grossMarginRate: $("grossMarginRate"),
      platformCostMonthly: $("platformCostMonthly"), enablementCostMonthly: $("enablementCostMonthly"), implementationCost: $("implementationCost"),
      currentGrossProfit: $("currentGrossProfit"), newGrossProfit: $("newGrossProfit"), monthlyProfitLift: $("monthlyProfitLift"), monthlyNetImpact: $("monthlyNetImpact"),
      annualNetImpact: $("annualNetImpact"), roiPct: $("roiPct"), paybackMonths: $("paybackMonths"), monthlyOperatingCost: $("monthlyOperatingCost"),
      breakEvenDiscount: $("breakEvenDiscount"), newWinRate: $("newWinRate"), status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = { monthlyQuotes: 180, avgDealSize: 24000, currentWinRate: 27, winRateChangePp: -1, currentDiscountRate: 18, targetDiscountRate: 12, grossMarginRate: 72, platformCostMonthly: 2400, enablementCostMonthly: 1600, implementationCost: 22000 };
    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(Number.isFinite(n) ? n : 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v) {
      if (!Number.isFinite(v.monthlyQuotes) || v.monthlyQuotes <= 0) return "월 견적 건수는 0보다 커야 합니다.";
      if (!Number.isFinite(v.avgDealSize) || v.avgDealSize <= 0) return "평균 딜 금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.currentWinRate) || v.currentWinRate < 0 || v.currentWinRate > 100) return "현재 승률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.winRateChangePp) || v.winRateChangePp < -50 || v.winRateChangePp > 50) return "승률 변화는 -50~50%p 범위여야 합니다.";
      if (!Number.isFinite(v.currentDiscountRate) || v.currentDiscountRate < 0 || v.currentDiscountRate >= 95) return "현재 할인율은 0~95% 미만이어야 합니다.";
      if (!Number.isFinite(v.targetDiscountRate) || v.targetDiscountRate < 0 || v.targetDiscountRate >= 95) return "목표 할인율은 0~95% 미만이어야 합니다.";
      if (!Number.isFinite(v.grossMarginRate) || v.grossMarginRate <= 0 || v.grossMarginRate > 100) return "매출총이익률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.platformCostMonthly) || v.platformCostMonthly < 0) return "CPQ 월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.enablementCostMonthly) || v.enablementCostMonthly < 0) return "Enablement 월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.implementationCost) || v.implementationCost < 0) return "초기 구축비는 0 이상이어야 합니다.";
      return "";
    }

    function render() {
      const v = {
        monthlyQuotes: Number(refs.monthlyQuotes.value), avgDealSize: Number(refs.avgDealSize.value), currentWinRate: Number(refs.currentWinRate.value), winRateChangePp: Number(refs.winRateChangePp.value),
        currentDiscountRate: Number(refs.currentDiscountRate.value), targetDiscountRate: Number(refs.targetDiscountRate.value), grossMarginRate: Number(refs.grossMarginRate.value),
        platformCostMonthly: Number(refs.platformCostMonthly.value), enablementCostMonthly: Number(refs.enablementCostMonthly.value), implementationCost: Number(refs.implementationCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err) {
        ["currentGrossProfit","newGrossProfit","monthlyProfitLift","monthlyNetImpact","annualNetImpact","roiPct","paybackMonths","monthlyOperatingCost","breakEvenDiscount","newWinRate"].forEach((k)=>refs[k].textContent="-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const winRate = v.currentWinRate / 100;
      const newWinRate = Math.max(0, Math.min(1, (v.currentWinRate + v.winRateChangePp) / 100));
      const currentDiscount = v.currentDiscountRate / 100;
      const targetDiscount = v.targetDiscountRate / 100;
      const grossMargin = v.grossMarginRate / 100;

      const currentRevenue = v.monthlyQuotes * winRate * v.avgDealSize * (1 - currentDiscount);
      const newRevenue = v.monthlyQuotes * newWinRate * v.avgDealSize * (1 - targetDiscount);
      const currentGrossProfit = currentRevenue * grossMargin;
      const newGrossProfit = newRevenue * grossMargin;
      const monthlyProfitLift = newGrossProfit - currentGrossProfit;

      const monthlyOperatingCost = v.platformCostMonthly + v.enablementCostMonthly;
      const monthlyNetImpact = monthlyProfitLift - monthlyOperatingCost;
      const annualNetImpact = monthlyNetImpact * 12 - v.implementationCost;

      const totalInvestment = (monthlyOperatingCost * 12) + v.implementationCost;
      const roiPct = totalInvestment > 0 ? (annualNetImpact / totalInvestment) * 100 : 0;
      const paybackMonths = monthlyNetImpact > 0 ? (v.implementationCost / monthlyNetImpact) : Infinity;

      const denom = v.monthlyQuotes * newWinRate * v.avgDealSize * grossMargin;
      const breakEvenTargetDiscount = denom > 0 ? 1 - ((currentGrossProfit + monthlyOperatingCost) / denom) : Infinity;

      refs.currentGrossProfit.textContent = money(currentGrossProfit);
      refs.newGrossProfit.textContent = money(newGrossProfit);
      refs.monthlyProfitLift.textContent = money(monthlyProfitLift);
      refs.monthlyNetImpact.textContent = money(monthlyNetImpact);
      refs.annualNetImpact.textContent = money(annualNetImpact);
      refs.roiPct.textContent = `${num(roiPct, 2)}%`;
      refs.paybackMonths.textContent = Number.isFinite(paybackMonths) ? `${num(paybackMonths, 2)}개월` : "N/A";
      refs.monthlyOperatingCost.textContent = money(monthlyOperatingCost);
      refs.breakEvenDiscount.textContent = Number.isFinite(breakEvenTargetDiscount)
        ? `${num(Math.max(0, breakEvenTargetDiscount * 100), 2)}%`
        : "N/A";
      refs.newWinRate.textContent = `${num(newWinRate * 100, 2)}%`;

      refs.status.innerHTML = monthlyNetImpact > 0
        ? `<span class="ok">●</span> 월 순효과 ${money(monthlyNetImpact)} (투자 회수 가능)`
        : `<span class="warn">●</span> 월 순효과 ${money(monthlyNetImpact)} (가정 재점검 필요)`;

      refs.summary.value = [
        "[CPQ Discount Guardrail ROI 요약]",
        `현재 월 매출총이익: ${money(currentGrossProfit)}`,
        `개선 후 월 매출총이익: ${money(newGrossProfit)}`,
        `월 매출총이익 개선분: ${money(monthlyProfitLift)}`,
        `월 운영비: ${money(monthlyOperatingCost)}`,
        `월 순효과: ${money(monthlyNetImpact)}`,
        `연간 순효과: ${money(annualNetImpact)}`,
        `ROI: ${num(roiPct, 2)}%`,
        `회수기간: ${Number.isFinite(paybackMonths) ? `${num(paybackMonths, 2)}개월` : "N/A"}`,
        `손익분기 목표 할인율: ${Number.isFinite(breakEvenTargetDiscount) ? `${num(Math.max(0, breakEvenTargetDiscount * 100), 2)}%` : "N/A"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k,v]) => refs[k].value = v);
      render();
    });

    [refs.monthlyQuotes, refs.avgDealSize, refs.currentWinRate, refs.winRateChangePp, refs.currentDiscountRate, refs.targetDiscountRate, refs.grossMarginRate, refs.platformCostMonthly, refs.enablementCostMonthly, refs.implementationCost].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
