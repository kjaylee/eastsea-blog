<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Affiliate Commission Profit Calculator | 크리에이터 제휴 커미션 수익 계산기</title>
  <meta name="description" content="크리에이터 제휴 판매 프로그램의 클릭·전환·AOV·커미션·환불·수수료를 반영해 월 순이익, ROI, 손익분기 전환율을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}.head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.8vw,1.7rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}textarea{min-height:100px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.08rem;font-weight:800;word-break:break-word}.v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🤝 크리에이터 제휴 커미션 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">클릭 유입 기반 제휴 판매의 월 주문수, 순매출, 순이익, ROI와 손익분기 전환율을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="clicks" data-i18n="clicks">월 클릭 유입 수</label><input id="clicks" type="number" min="1" value="240000" /></div>
          <div><label for="cvr" data-i18n="cvr">클릭→구매 전환율 (%)</label><input id="cvr" type="number" min="0" max="100" step="0.01" value="2.4" /></div>
          <div><label for="aov" data-i18n="aov">평균 주문금액 AOV (KRW)</label><input id="aov" type="number" min="1" value="48000" /></div>
          <div><label for="margin" data-i18n="margin">제품 매출총이익률 (%)</label><input id="margin" type="number" min="0" max="100" step="0.1" value="43" /></div>
          <div><label for="commission" data-i18n="commission">제휴 커미션율 (%)</label><input id="commission" type="number" min="0" max="100" step="0.1" value="14" /></div>
          <div><label for="refund" data-i18n="refund">환불/취소율 (%)</label><input id="refund" type="number" min="0" max="100" step="0.1" value="6" /></div>
          <div><label for="fee" data-i18n="fee">결제/플랫폼 수수료율 (%)</label><input id="fee" type="number" min="0" max="100" step="0.1" value="4.5" /></div>
          <div><label for="contentCost" data-i18n="contentCost">콘텐츠 제작비 (월, KRW)</label><input id="contentCost" type="number" min="0" value="5000000" /></div>
          <div><label for="fixed" data-i18n="fixed">운영 월 고정비 (KRW)</label><input id="fixed" type="number" min="0" value="3200000" /></div>
          <div><label for="setup" data-i18n="setup">초기 셋업비 (KRW)</label><input id="setup" type="number" min="0" value="7000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_orders">월 주문수</div><div id="orders" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_revenue">월 순매출</div><div id="netSales" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_perOrder">주문당 순기여액</div><div id="netPerOrder" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthly">월 순이익</div><div id="monthlyProfit" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_grossSales">월 총매출(환불 전)</th><td id="grossSales">-</td></tr>
            <tr><th data-i18n="d_periodNet">기간 순효과(셋업비 반영)</th><td id="periodNet">-</td></tr>
            <tr><th data-i18n="d_marginPool">월 공헌이익 풀</th><td id="marginPool">-</td></tr>
            <tr><th data-i18n="d_breakEven">손익분기 전환율</th><td id="breakEvenCvr">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      clicks:$("clicks"), cvr:$("cvr"), aov:$("aov"), margin:$("margin"), commission:$("commission"), refund:$("refund"), fee:$("fee"), contentCost:$("contentCost"), fixed:$("fixed"), setup:$("setup"), months:$("months"),
      orders:$("orders"), netSales:$("netSales"), netPerOrder:$("netPerOrder"), monthlyProfit:$("monthlyProfit"), roi:$("roi"), payback:$("payback"), grossSales:$("grossSales"), periodNet:$("periodNet"), marginPool:$("marginPool"), breakEvenCvr:$("breakEvenCvr"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { clicks:240000, cvr:2.4, aov:48000, margin:43, commission:14, refund:6, fee:4.5, contentCost:5000000, fixed:3200000, setup:7000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"🤝 크리에이터 제휴 커미션 수익 계산기", subtitle:"클릭 유입 기반 제휴 판매의 월 주문수, 순매출, 순이익, ROI와 손익분기 전환율을 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        clicks:"월 클릭 유입 수", cvr:"클릭→구매 전환율 (%)", aov:"평균 주문금액 AOV (KRW)", margin:"제품 매출총이익률 (%)", commission:"제휴 커미션율 (%)", refund:"환불/취소율 (%)", fee:"결제/플랫폼 수수료율 (%)", contentCost:"콘텐츠 제작비 (월, KRW)", fixed:"운영 월 고정비 (KRW)", setup:"초기 셋업비 (KRW)", months:"분석 기간 (개월)",
        k_orders:"월 주문수", k_revenue:"월 순매출", k_perOrder:"주문당 순기여액", k_monthly:"월 순이익", k_roi:"ROI", k_payback:"회수기간",
        d_grossSales:"월 총매출(환불 전)", d_periodNet:"기간 순효과(셋업비 반영)", d_marginPool:"월 공헌이익 풀", d_breakEven:"손익분기 전환율",
        errClicks:"클릭 수는 1 이상이어야 합니다.", errRate:"비율 값은 0~100 범위여야 합니다.", errAov:"AOV는 0보다 커야 합니다.", errCosts:"비용 값은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~60개월 범위여야 합니다.",
        impossible:"달성 불가", noPayback:"회수 불가", statusGood:"제휴 프로그램이 수익적으로 유리합니다", statusBad:"현재 가정에서는 월 순이익이 부족합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.", unitMonth:"개월", unitOrders:"건", summaryTitle:"[Creator Affiliate Profit Summary]"
      },
      en: {
        title:"🤝 Creator Affiliate Commission Profit Calculator", subtitle:"Estimate monthly orders, net sales, net profit, ROI, and break-even conversion rate for creator affiliate programs.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        clicks:"Monthly affiliate clicks", cvr:"Click-to-purchase conversion rate (%)", aov:"Average order value (KRW)", margin:"Product gross margin (%)", commission:"Affiliate commission rate (%)", refund:"Refund/cancellation rate (%)", fee:"Payment/platform fee rate (%)", contentCost:"Monthly content production cost (KRW)", fixed:"Monthly fixed operating cost (KRW)", setup:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_orders:"Monthly orders", k_revenue:"Monthly net sales", k_perOrder:"Net contribution per order", k_monthly:"Monthly net profit", k_roi:"ROI", k_payback:"Payback period",
        d_grossSales:"Monthly gross sales (pre-refund)", d_periodNet:"Period net impact (after setup)", d_marginPool:"Monthly contribution pool", d_breakEven:"Break-even conversion rate",
        errClicks:"Clicks must be at least 1.", errRate:"Rate values must be between 0 and 100.", errAov:"AOV must be greater than 0.", errCosts:"Cost values must be >= 0.", errMonths:"Analysis period must be 1 to 60 months.",
        impossible:"Not feasible", noPayback:"No payback", statusGood:"Affiliate program is financially favorable", statusBad:"Monthly profit is insufficient under current assumptions", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard unavailable. Please copy manually.", unitMonth:"months", unitOrders:"orders", summaryTitle:"[Creator Affiliate Profit Summary]"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.clicks) || v.clicks < 1) return t("errClicks");
      if ([v.cvr,v.margin,v.commission,v.refund,v.fee].some((n)=>!Number.isFinite(n) || n < 0 || n > 100)) return t("errRate");
      if (!Number.isFinite(v.aov) || v.aov <= 0) return t("errAov");
      if ([v.contentCost,v.fixed,v.setup].some((n)=>!Number.isFinite(n) || n < 0)) return t("errCosts");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return t("errMonths");
      return "";
    }

    function compute(v){
      const orders = v.clicks * (v.cvr / 100);
      const grossSales = orders * v.aov;
      const netSales = grossSales * (1 - v.refund / 100);
      const marginPool = netSales * ((v.margin - v.commission - v.fee) / 100);
      const netPerOrder = orders > 0 ? marginPool / orders : 0;
      const monthlyProfit = marginPool - v.contentCost - v.fixed;
      const periodNet = (monthlyProfit * v.months) - v.setup;
      const roi = v.setup === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / v.setup) * 100;
      const payback = monthlyProfit > 0 ? (v.setup / monthlyProfit) : Infinity;
      const perOrderContribution = v.aov * (1 - v.refund / 100) * ((v.margin - v.commission - v.fee) / 100);
      const breakEvenCvr = perOrderContribution > 0 ? ((v.contentCost + v.fixed) / (v.clicks * perOrderContribution)) * 100 : Infinity;
      return { orders, grossSales, netSales, marginPool, netPerOrder, monthlyProfit, periodNet, roi, payback, breakEvenCvr };
    }

    function resetOutputs(){
      ["orders","netSales","netPerOrder","monthlyProfit","roi","payback","grossSales","periodNet","marginPool","breakEvenCvr"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        clicks:Number(refs.clicks.value), cvr:Number(refs.cvr.value), aov:Number(refs.aov.value), margin:Number(refs.margin.value), commission:Number(refs.commission.value), refund:Number(refs.refund.value),
        fee:Number(refs.fee.value), contentCost:Number(refs.contentCost.value), fixed:Number(refs.fixed.value), setup:Number(refs.setup.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.orders.textContent = `${num(r.orders,0)} ${t("unitOrders")}`;
      refs.netSales.textContent = money(r.netSales);
      refs.netPerOrder.textContent = money(r.netPerOrder);
      refs.monthlyProfit.textContent = money(r.monthlyProfit);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback");
      refs.grossSales.textContent = money(r.grossSales);
      refs.periodNet.textContent = money(r.periodNet);
      refs.marginPool.textContent = money(r.marginPool);
      refs.breakEvenCvr.textContent = Number.isFinite(r.breakEvenCvr) && r.breakEvenCvr <= 100
        ? `${num(r.breakEvenCvr,3)}%`
        : t("impossible");

      refs.status.innerHTML = r.monthlyProfit >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_orders")}: ${num(r.orders,0)} ${t("unitOrders")}`,
        `${t("k_revenue")}: ${money(r.netSales)}`,
        `${t("k_perOrder")}: ${money(r.netPerOrder)}`,
        `${t("k_monthly")}: ${money(r.monthlyProfit)}`,
        `${t("d_periodNet")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("d_breakEven")}: ${Number.isFinite(r.breakEvenCvr) && r.breakEvenCvr <= 100 ? `${num(r.breakEvenCvr,3)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.clicks,refs.cvr,refs.aov,refs.margin,refs.commission,refs.refund,refs.fee,refs.contentCost,refs.fixed,refs.setup,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
