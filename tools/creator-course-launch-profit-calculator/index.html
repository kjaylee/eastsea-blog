<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Course Launch Profit Calculator | 크리에이터 코스 런칭 수익 계산기</title>
  <meta name="description" content="코스 런칭 퍼널(오디언스→리드→수강생), 환불/수수료/제휴/광고비를 반영해 런칭별 순이익과 ROI를 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}.head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.16rem,2.8vw,1.72rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}textarea{min-height:100px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.1rem;font-weight:800;word-break:break-word}.v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🎓 크리에이터 코스 런칭 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">오디언스 퍼널과 환불·수수료·제휴·광고비를 반영해 런칭별/누적 순이익, ROI, 손익분기 전환율을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="audience" data-i18n="audience">오디언스 규모 (명)</label><input id="audience" type="number" min="1" value="80000" /></div>
          <div><label for="optin" data-i18n="optin">오디언스→리드 전환율 (%)</label><input id="optin" type="number" min="0" max="100" step="0.1" value="14" /></div>
          <div><label for="leadConv" data-i18n="leadConv">리드→수강생 전환율 (%)</label><input id="leadConv" type="number" min="0" max="100" step="0.1" value="3.6" /></div>
          <div><label for="price" data-i18n="price">코스 가격 (KRW)</label><input id="price" type="number" min="1" value="390000" /></div>
          <div><label for="paymentFee" data-i18n="paymentFee">결제 수수료 (%)</label><input id="paymentFee" type="number" min="0" max="100" step="0.1" value="3.3" /></div>
          <div><label for="refund" data-i18n="refund">환불률 (%)</label><input id="refund" type="number" min="0" max="100" step="0.1" value="7" /></div>
          <div><label for="affiliate" data-i18n="affiliate">제휴/파트너 커미션 (%)</label><input id="affiliate" type="number" min="0" max="100" step="0.1" value="18" /></div>
          <div><label for="support" data-i18n="support">수강생 1인당 지원비 (KRW)</label><input id="support" type="number" min="0" value="16000" /></div>
          <div><label for="adSpend" data-i18n="adSpend">런칭당 광고비 (KRW)</label><input id="adSpend" type="number" min="0" value="14000000" /></div>
          <div><label for="production" data-i18n="production">초기 제작비 (KRW)</label><input id="production" type="number" min="0" value="28000000" /></div>
          <div><label for="cycles" data-i18n="cycles">런칭 횟수 (회)</label><input id="cycles" type="number" min="1" max="24" value="3" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_leads">런칭당 리드 수</div><div id="leads" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_students">런칭당 수강생 수</div><div id="students" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_gross">런칭당 총매출</div><div id="grossSales" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_launchNet">런칭당 순이익</div><div id="launchNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_totalNet">누적 순효과(제작비 반영)</div><div id="totalNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_breakEven">손익분기 리드→수강 전환율</th><td id="breakEvenConv">-</td></tr>
            <tr><th data-i18n="d_netPerStudent">수강생 1인당 순기여</th><td id="netPerStudent">-</td></tr>
            <tr><th data-i18n="d_totalAd">총 광고비</th><td id="totalAd">-</td></tr>
            <tr><th data-i18n="d_totalKept">누적 환불반영 매출</th><td id="totalKept">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      audience:$("audience"), optin:$("optin"), leadConv:$("leadConv"), price:$("price"), paymentFee:$("paymentFee"), refund:$("refund"), affiliate:$("affiliate"), support:$("support"), adSpend:$("adSpend"), production:$("production"), cycles:$("cycles"),
      leads:$("leads"), students:$("students"), grossSales:$("grossSales"), launchNet:$("launchNet"), totalNet:$("totalNet"), roi:$("roi"),
      breakEvenConv:$("breakEvenConv"), netPerStudent:$("netPerStudent"), totalAd:$("totalAd"), totalKept:$("totalKept"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { audience:80000, optin:14, leadConv:3.6, price:390000, paymentFee:3.3, refund:7, affiliate:18, support:16000, adSpend:14000000, production:28000000, cycles:3 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"🎓 크리에이터 코스 런칭 수익 계산기", subtitle:"오디언스 퍼널과 환불·수수료·제휴·광고비를 반영해 런칭별/누적 순이익, ROI, 손익분기 전환율을 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        audience:"오디언스 규모 (명)", optin:"오디언스→리드 전환율 (%)", leadConv:"리드→수강생 전환율 (%)", price:"코스 가격 (KRW)", paymentFee:"결제 수수료 (%)", refund:"환불률 (%)", affiliate:"제휴/파트너 커미션 (%)", support:"수강생 1인당 지원비 (KRW)", adSpend:"런칭당 광고비 (KRW)", production:"초기 제작비 (KRW)", cycles:"런칭 횟수 (회)",
        k_leads:"런칭당 리드 수", k_students:"런칭당 수강생 수", k_gross:"런칭당 총매출", k_launchNet:"런칭당 순이익", k_totalNet:"누적 순효과(제작비 반영)", k_roi:"ROI",
        d_breakEven:"손익분기 리드→수강 전환율", d_netPerStudent:"수강생 1인당 순기여", d_totalAd:"총 광고비", d_totalKept:"누적 환불반영 매출",
        errAudience:"오디언스 규모는 1 이상이어야 합니다.", errRates:"전환율/수수료/환불률은 0~100% 범위여야 합니다.", errPrice:"코스 가격은 0보다 커야 합니다.", errCosts:"비용 값은 0 이상이어야 합니다.", errCycles:"런칭 횟수는 1~24 범위여야 합니다.",
        impossible:"달성 불가", statusGood:"코스 런칭이 수익을 창출합니다", statusBad:"가정 재조정이 필요합니다", statusCheck:"입력값을 확인하세요", copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        unitPeople:"명", summaryTitle:"[Creator Course Launch 요약]", summaryBreakEven:"손익분기 전환율"
      },
      en: {
        title:"🎓 Creator Course Launch Profit Calculator", subtitle:"Estimate launch-level and cumulative profit/ROI using audience funnel, refunds, fees, affiliate payouts, and ad spend.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        audience:"Audience size", optin:"Audience → lead rate (%)", leadConv:"Lead → student conversion rate (%)", price:"Course price (KRW)", paymentFee:"Payment processing fee (%)", refund:"Refund rate (%)", affiliate:"Affiliate payout (%)", support:"Support cost per student (KRW)", adSpend:"Ad spend per launch (KRW)", production:"One-time production cost (KRW)", cycles:"Number of launch cycles",
        k_leads:"Leads per launch", k_students:"Students per launch", k_gross:"Gross sales per launch", k_launchNet:"Net profit per launch", k_totalNet:"Total net impact (after production)", k_roi:"ROI",
        d_breakEven:"Break-even lead→student conversion", d_netPerStudent:"Net contribution per student", d_totalAd:"Total ad spend", d_totalKept:"Total kept revenue (post-refund)",
        errAudience:"Audience size must be at least 1.", errRates:"Rates must be between 0 and 100.", errPrice:"Course price must be greater than 0.", errCosts:"Costs must be >= 0.", errCycles:"Launch cycles must be between 1 and 24.",
        impossible:"Not feasible", statusGood:"Course launch is profitable", statusBad:"Re-check assumptions", statusCheck:"Please review input values", copied:"Summary copied to clipboard.", copyFail:"Clipboard unavailable. Please copy manually.",
        unitPeople:"people", summaryTitle:"[Creator Course Launch Summary]", summaryBreakEven:"Break-even conversion"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.audience) || v.audience < 1) return t("errAudience");
      if ([v.optin,v.leadConv,v.paymentFee,v.refund,v.affiliate].some((n)=>!Number.isFinite(n) || n < 0 || n > 100)) return t("errRates");
      if (!Number.isFinite(v.price) || v.price <= 0) return t("errPrice");
      if ([v.support,v.adSpend,v.production].some((n)=>!Number.isFinite(n) || n < 0)) return t("errCosts");
      if (!Number.isFinite(v.cycles) || v.cycles < 1 || v.cycles > 24) return t("errCycles");
      return "";
    }

    function compute(v){
      const leads = v.audience * (v.optin / 100);
      const students = leads * (v.leadConv / 100);
      const grossSales = students * v.price;
      const keptRevenue = grossSales * (1 - v.refund / 100);
      const paymentCost = keptRevenue * (v.paymentFee / 100);
      const affiliateCost = keptRevenue * (v.affiliate / 100);
      const supportCost = students * v.support;
      const launchNet = keptRevenue - paymentCost - affiliateCost - supportCost - v.adSpend;

      const totalNet = launchNet * v.cycles - v.production;
      const totalAd = v.adSpend * v.cycles;
      const totalKept = keptRevenue * v.cycles;
      const invested = totalAd + v.production;
      const roi = invested === 0 ? (totalNet >= 0 ? Infinity : -Infinity) : (totalNet / invested) * 100;

      const contributionPerStudent = v.price * (1 - v.refund / 100) * (1 - (v.paymentFee / 100) - (v.affiliate / 100)) - v.support;
      const breakEvenConv = (leads > 0 && contributionPerStudent > 0)
        ? ((v.adSpend + (v.production / v.cycles)) / (leads * contributionPerStudent)) * 100
        : Infinity;

      return { leads, students, grossSales, launchNet, totalNet, roi, breakEvenConv, contributionPerStudent, totalAd, totalKept };
    }

    function resetOutputs(){
      ["leads","students","grossSales","launchNet","totalNet","roi","breakEvenConv","netPerStudent","totalAd","totalKept"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        audience:Number(refs.audience.value), optin:Number(refs.optin.value), leadConv:Number(refs.leadConv.value), price:Number(refs.price.value), paymentFee:Number(refs.paymentFee.value),
        refund:Number(refs.refund.value), affiliate:Number(refs.affiliate.value), support:Number(refs.support.value), adSpend:Number(refs.adSpend.value), production:Number(refs.production.value), cycles:Number(refs.cycles.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.leads.textContent = `${num(r.leads,0)} ${t("unitPeople")}`;
      refs.students.textContent = `${num(r.students,1)} ${t("unitPeople")}`;
      refs.grossSales.textContent = money(r.grossSales);
      refs.launchNet.textContent = money(r.launchNet);
      refs.totalNet.textContent = money(r.totalNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");

      refs.breakEvenConv.textContent = Number.isFinite(r.breakEvenConv) ? `${num(r.breakEvenConv,2)}%` : t("impossible");
      refs.netPerStudent.textContent = money(r.contributionPerStudent);
      refs.totalAd.textContent = money(r.totalAd);
      refs.totalKept.textContent = money(r.totalKept);

      refs.status.innerHTML = r.totalNet >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_leads")}: ${num(r.leads,0)} ${t("unitPeople")}`,
        `${t("k_students")}: ${num(r.students,1)} ${t("unitPeople")}`,
        `${t("k_gross")}: ${money(r.grossSales)}`,
        `${t("k_launchNet")}: ${money(r.launchNet)}`,
        `${t("k_totalNet")}: ${money(r.totalNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("summaryBreakEven")}: ${Number.isFinite(r.breakEvenConv) ? `${num(r.breakEvenConv,2)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.audience,refs.optin,refs.leadConv,refs.price,refs.paymentFee,refs.refund,refs.affiliate,refs.support,refs.adSpend,refs.production,refs.cycles].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
