<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Membership Tier Revenue Calculator | 크리에이터 멤버십 티어 수익 계산기</title>
  <meta name="description" content="멤버십 티어 가격/비중, 월 유입·이탈, 플랫폼 수수료를 반영해 크리에이터 멤버십의 월·누적 수익성과 ROI를 계산합니다." />
  <style>
    :root{--bg:#08152a;--card:#11233f;--line:#335283;--txt:#ecf4ff;--muted:#aec4e4;--pri:#7c8cff;--soft:#1a2f59;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.15)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 22% 0%,#2d4b8a 0%,#08152a 50%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.8vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#1a3562,#11233f);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5a67f0);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errbg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.97rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#173561;color:#d8e8ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🎬 크리에이터 멤버십 티어 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">티어 가격·비중, 월 유입/이탈, 플랫폼 수수료를 반영해 멤버십의 월·누적 수익성을 시뮬레이션합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="currentMembers" data-i18n="currentMembers">현재 유료 멤버 수 (명)</label><input id="currentMembers" type="number" min="0" value="1200" /></div>
          <div><label for="monthlyNew" data-i18n="monthlyNew">월 신규 멤버 유입 (명)</label><input id="monthlyNew" type="number" min="0" value="260" /></div>
          <div><label for="churn" data-i18n="churn">월 이탈률 (%)</label><input id="churn" type="number" min="0" max="90" step="0.1" value="6.5" /></div>
          <div><label for="platformFee" data-i18n="platformFee">플랫폼 수수료율 (%)</label><input id="platformFee" type="number" min="0" max="70" step="0.1" value="12" /></div>

          <div><label for="priceBasic" data-i18n="priceBasic">Basic 가격 (KRW)</label><input id="priceBasic" type="number" min="0" value="4900" /></div>
          <div><label for="mixBasic" data-i18n="mixBasic">Basic 비중 (%)</label><input id="mixBasic" type="number" min="0" max="100" step="0.1" value="62" /></div>
          <div><label for="pricePro" data-i18n="pricePro">Pro 가격 (KRW)</label><input id="pricePro" type="number" min="0" value="12900" /></div>
          <div><label for="mixPro" data-i18n="mixPro">Pro 비중 (%)</label><input id="mixPro" type="number" min="0" max="100" step="0.1" value="28" /></div>
          <div><label for="priceVip" data-i18n="priceVip">VIP 가격 (KRW)</label><input id="priceVip" type="number" min="0" value="29900" /></div>
          <div><label for="mixVip" data-i18n="mixVip">VIP 비중 (%)</label><input id="mixVip" type="number" min="0" max="100" step="0.1" value="10" /></div>

          <div><label for="variableCost" data-i18n="variableCost">멤버당 월 운영비 (KRW)</label><input id="variableCost" type="number" min="0" value="1800" /></div>
          <div><label for="fixedCost" data-i18n="fixedCost">월 고정 운영비 (KRW)</label><input id="fixedCost" type="number" min="0" value="5200000" /></div>
          <div><label for="setupCost" data-i18n="setupCost">초기 세팅비 (KRW)</label><input id="setupCost" type="number" min="0" value="25000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="36" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_weightedPrice">가중 평균 멤버십 단가</div><div id="weightedPrice" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_membersEnd">최종 활성 멤버</div><div id="membersEnd" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNetEnd">최종 월 순이익</div><div id="monthlyNetEnd" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_termNet">분석기간 순효과</div><div id="termNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수 월</div><div id="paybackMonth" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_month1Members">1개월차 활성 멤버</th><td id="month1Members">-</td></tr>
            <tr><th data-i18n="d_month1Net">1개월차 순이익</th><td id="month1Net">-</td></tr>
            <tr><th data-i18n="d_totalGross">누적 매출 (총액)</th><td id="totalGross">-</td></tr>
            <tr><th data-i18n="d_breakEvenNew">월 손익분기 신규 멤버</th><td id="breakEvenNew">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      currentMembers:$("currentMembers"), monthlyNew:$("monthlyNew"), churn:$("churn"), platformFee:$("platformFee"),
      priceBasic:$("priceBasic"), mixBasic:$("mixBasic"), pricePro:$("pricePro"), mixPro:$("mixPro"), priceVip:$("priceVip"), mixVip:$("mixVip"),
      variableCost:$("variableCost"), fixedCost:$("fixedCost"), setupCost:$("setupCost"), months:$("months"),
      weightedPrice:$("weightedPrice"), membersEnd:$("membersEnd"), monthlyNetEnd:$("monthlyNetEnd"), termNet:$("termNet"), roi:$("roi"), paybackMonth:$("paybackMonth"),
      month1Members:$("month1Members"), month1Net:$("month1Net"), totalGross:$("totalGross"), breakEvenNew:$("breakEvenNew"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = {
      currentMembers:1200, monthlyNew:260, churn:6.5, platformFee:12,
      priceBasic:4900, mixBasic:62, pricePro:12900, mixPro:28, priceVip:29900, mixVip:10,
      variableCost:1800, fixedCost:5200000, setupCost:25000000, months:12
    };

    let currentLang = "ko";
    const i18n = {
      ko: {
        title:"🎬 크리에이터 멤버십 티어 수익 계산기", subtitle:"티어 가격·비중, 월 유입/이탈, 플랫폼 수수료를 반영해 멤버십의 월·누적 수익성을 시뮬레이션합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        currentMembers:"현재 유료 멤버 수 (명)", monthlyNew:"월 신규 멤버 유입 (명)", churn:"월 이탈률 (%)", platformFee:"플랫폼 수수료율 (%)",
        priceBasic:"Basic 가격 (KRW)", mixBasic:"Basic 비중 (%)", pricePro:"Pro 가격 (KRW)", mixPro:"Pro 비중 (%)", priceVip:"VIP 가격 (KRW)", mixVip:"VIP 비중 (%)",
        variableCost:"멤버당 월 운영비 (KRW)", fixedCost:"월 고정 운영비 (KRW)", setupCost:"초기 세팅비 (KRW)", months:"분석 기간 (개월)",
        k_weightedPrice:"가중 평균 멤버십 단가", k_membersEnd:"최종 활성 멤버", k_monthlyNetEnd:"최종 월 순이익", k_termNet:"분석기간 순효과", k_roi:"ROI", k_payback:"회수 월",
        d_month1Members:"1개월차 활성 멤버", d_month1Net:"1개월차 순이익", d_totalGross:"누적 매출 (총액)", d_breakEvenNew:"월 손익분기 신규 멤버",
        errCurrent:"현재 멤버 수는 0 이상이어야 합니다.", errMonthlyNew:"월 신규 멤버는 0 이상이어야 합니다.", errChurn:"월 이탈률은 0~90% 범위여야 합니다.",
        errFee:"플랫폼 수수료율은 0~70% 범위여야 합니다.", errPrice:"티어 가격은 0 이상이어야 합니다.", errMix:"티어 비중은 0~100% 범위여야 합니다.", errMixSum:"티어 비중 합은 100%여야 합니다.",
        errVar:"멤버당 월 운영비는 0 이상이어야 합니다.", errFixed:"월 고정 운영비는 0 이상이어야 합니다.", errSetup:"초기 세팅비는 0 이상이어야 합니다.", errMonths:"분석 기간은 1~36개월 범위여야 합니다.",
        errContribution:"수수료/비용 반영 후 멤버당 기여도가 0보다 커야 합니다.", unitPeople:"명", unitMonth:"개월", noPayback:"회수 불가",
        statusGood:"초기비를 제외해도 수익성이 양호합니다", statusBad:"가정 재조정이 필요합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        summaryTitle:"[Creator Membership Tier 요약]", summaryTerm:"개월 누적 순효과", summaryBreakEven:"월 손익분기 신규 멤버"
      },
      en: {
        title:"🎬 Creator Membership Tier Revenue Calculator", subtitle:"Simulate monthly and cumulative profitability using tier pricing/mix, member inflow/churn, and platform fees.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        currentMembers:"Current paid members", monthlyNew:"New members per month", churn:"Monthly churn rate (%)", platformFee:"Platform fee rate (%)",
        priceBasic:"Basic price (KRW)", mixBasic:"Basic mix (%)", pricePro:"Pro price (KRW)", mixPro:"Pro mix (%)", priceVip:"VIP price (KRW)", mixVip:"VIP mix (%)",
        variableCost:"Monthly variable cost per member (KRW)", fixedCost:"Monthly fixed operating cost (KRW)", setupCost:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_weightedPrice:"Weighted average membership price", k_membersEnd:"Ending active members", k_monthlyNetEnd:"Ending monthly net profit", k_termNet:"Period net impact", k_roi:"ROI", k_payback:"Payback month",
        d_month1Members:"Month 1 active members", d_month1Net:"Month 1 net profit", d_totalGross:"Cumulative gross revenue", d_breakEvenNew:"Break-even new members/month",
        errCurrent:"Current members must be >= 0.", errMonthlyNew:"New members per month must be >= 0.", errChurn:"Monthly churn must be between 0 and 90%.",
        errFee:"Platform fee must be between 0 and 70%.", errPrice:"Tier prices must be >= 0.", errMix:"Tier mix must be between 0 and 100%.", errMixSum:"Tier mix must sum to 100%.",
        errVar:"Variable cost per member must be >= 0.", errFixed:"Monthly fixed cost must be >= 0.", errSetup:"Setup cost must be >= 0.", errMonths:"Analysis period must be between 1 and 36 months.",
        errContribution:"Per-member contribution after fee/cost must be greater than 0.", unitPeople:"members", unitMonth:"months", noPayback:"No payback",
        statusGood:"Economics look healthy beyond setup cost", statusBad:"Re-check assumptions and pricing", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard permission unavailable. Please copy manually.",
        summaryTitle:"[Creator Membership Tier Summary]", summaryTerm:"month cumulative net impact", summaryBreakEven:"Break-even new members/month"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const t = (k)=> i18n[currentLang][k] ?? k;
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.currentMembers) || v.currentMembers < 0) return t("errCurrent");
      if (!Number.isFinite(v.monthlyNew) || v.monthlyNew < 0) return t("errMonthlyNew");
      if (!Number.isFinite(v.churn) || v.churn < 0 || v.churn > 90) return t("errChurn");
      if (!Number.isFinite(v.platformFee) || v.platformFee < 0 || v.platformFee > 70) return t("errFee");
      if ([v.priceBasic,v.pricePro,v.priceVip].some((n)=>!Number.isFinite(n) || n < 0)) return t("errPrice");
      if ([v.mixBasic,v.mixPro,v.mixVip].some((n)=>!Number.isFinite(n) || n < 0 || n > 100)) return t("errMix");
      if (Math.abs((v.mixBasic + v.mixPro + v.mixVip) - 100) > 0.01) return t("errMixSum");
      if (!Number.isFinite(v.variableCost) || v.variableCost < 0) return t("errVar");
      if (!Number.isFinite(v.fixedCost) || v.fixedCost < 0) return t("errFixed");
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return t("errSetup");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 36) return t("errMonths");

      const weightedPrice = (v.priceBasic * (v.mixBasic/100)) + (v.pricePro * (v.mixPro/100)) + (v.priceVip * (v.mixVip/100));
      const unitContribution = (weightedPrice * (1 - v.platformFee/100)) - v.variableCost;
      if (unitContribution <= 0) return t("errContribution");
      return "";
    }

    function compute(v){
      const churnRate = v.churn / 100;
      const feeRate = v.platformFee / 100;
      const weightedPrice = (v.priceBasic * (v.mixBasic/100)) + (v.pricePro * (v.mixPro/100)) + (v.priceVip * (v.mixVip/100));
      const unitContribution = (weightedPrice * (1 - feeRate)) - v.variableCost;

      let members = v.currentMembers;
      let totalGross = 0;
      let totalNet = -v.setupCost;
      let month1Members = 0;
      let month1Net = 0;
      let monthlyNetEnd = 0;
      let paybackMonth = Infinity;

      for (let m=1; m<=v.months; m++){
        members = (members * (1 - churnRate)) + v.monthlyNew;
        const gross = members * weightedPrice;
        const net = (gross * (1 - feeRate)) - (members * v.variableCost) - v.fixedCost;

        totalGross += gross;
        totalNet += net;
        monthlyNetEnd = net;

        if (m === 1){
          month1Members = members;
          month1Net = net;
        }

        if (!Number.isFinite(paybackMonth)) continue;
        const cumulativeWithoutSetup = totalNet + v.setupCost;
        if (paybackMonth === Infinity && cumulativeWithoutSetup >= v.setupCost){
          paybackMonth = m;
        }
      }

      const invested = v.setupCost + v.fixedCost * v.months;
      const roi = invested === 0 ? (totalNet >= 0 ? Infinity : -Infinity) : (totalNet / invested) * 100;

      const breakEvenNew = (()=>{
        if (churnRate > 0){
          return (v.fixedCost * churnRate) / unitContribution;
        }
        return v.fixedCost / unitContribution;
      })();

      return {weightedPrice, membersEnd:members, monthlyNetEnd, totalNet, roi, paybackMonth, month1Members, month1Net, totalGross, breakEvenNew};
    }

    function resetOutputs(){
      ["weightedPrice","membersEnd","monthlyNetEnd","termNet","roi","paybackMonth","month1Members","month1Net","totalGross","breakEvenNew"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        currentMembers:Number(refs.currentMembers.value), monthlyNew:Number(refs.monthlyNew.value), churn:Number(refs.churn.value), platformFee:Number(refs.platformFee.value),
        priceBasic:Number(refs.priceBasic.value), mixBasic:Number(refs.mixBasic.value), pricePro:Number(refs.pricePro.value), mixPro:Number(refs.mixPro.value),
        priceVip:Number(refs.priceVip.value), mixVip:Number(refs.mixVip.value), variableCost:Number(refs.variableCost.value), fixedCost:Number(refs.fixedCost.value),
        setupCost:Number(refs.setupCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.weightedPrice.textContent = money(r.weightedPrice);
      refs.membersEnd.textContent = `${num(r.membersEnd,0)} ${t("unitPeople")}`;
      refs.monthlyNetEnd.textContent = money(r.monthlyNetEnd);
      refs.termNet.textContent = money(r.totalNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.paybackMonth.textContent = Number.isFinite(r.paybackMonth) ? `${num(r.paybackMonth,0)} ${t("unitMonth")}` : t("noPayback");
      refs.month1Members.textContent = `${num(r.month1Members,0)} ${t("unitPeople")}`;
      refs.month1Net.textContent = money(r.month1Net);
      refs.totalGross.textContent = money(r.totalGross);
      refs.breakEvenNew.textContent = Number.isFinite(r.breakEvenNew) ? `${num(r.breakEvenNew,1)} ${t("unitPeople")}` : t("noPayback");

      refs.status.innerHTML = r.totalNet >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_weightedPrice")}: ${money(r.weightedPrice)}`,
        `${t("k_membersEnd")}: ${num(r.membersEnd,0)} ${t("unitPeople")}`,
        `${t("k_monthlyNetEnd")}: ${money(r.monthlyNetEnd)}`,
        `${v.months} ${t("summaryTerm")}: ${money(r.totalNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.paybackMonth) ? `${num(r.paybackMonth,0)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("summaryBreakEven")}: ${Number.isFinite(r.breakEvenNew) ? `${num(r.breakEvenNew,1)} ${t("unitPeople")}` : t("noPayback")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.currentMembers,refs.monthlyNew,refs.churn,refs.platformFee,refs.priceBasic,refs.mixBasic,refs.pricePro,refs.mixPro,refs.priceVip,refs.mixVip,refs.variableCost,refs.fixedCost,refs.setupCost,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
