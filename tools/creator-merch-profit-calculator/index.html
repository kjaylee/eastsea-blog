<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Merch Profit Calculator | 크리에이터 굿즈 수익 계산기</title>
  <meta name="description" content="오디언스 규모, 전환율, AOV, 원가/수수료/반품/물류/마케팅 비용을 반영해 크리에이터 굿즈 런칭 수익성을 계산합니다." />
  <style>
    :root{--bg:#081429;--card:#10223f;--line:#2a4f85;--txt:#e9f2ff;--muted:#aec4e4;--pri:#69a8ff;--soft:#16335d;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.15)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#214b82 0%,#081429 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.8vw,1.76rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#183662,#10223f);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1c36;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#4f83f1);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errbg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.97rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#173561;color:#d8e8ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🧢 크리에이터 굿즈 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">오디언스 기반 굿즈 판매의 월 수익성, ROI, 손익분기 전환율을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="audience" data-i18n="audience">월 오디언스 규모 (명)</label><input id="audience" type="number" min="1" value="180000" /></div>
          <div><label for="conversion" data-i18n="conversion">구매 전환율 (%)</label><input id="conversion" type="number" min="0" max="100" step="0.01" value="1.8" /></div>
          <div><label for="aov" data-i18n="aov">평균 주문금액 AOV (KRW)</label><input id="aov" type="number" min="1" value="46000" /></div>
          <div><label for="cogsRate" data-i18n="cogsRate">제품 원가율 COGS (%)</label><input id="cogsRate" type="number" min="0" max="100" step="0.01" value="37" /></div>
          <div><label for="fulfillment" data-i18n="fulfillment">주문당 포장/물류비 (KRW)</label><input id="fulfillment" type="number" min="0" value="4000" /></div>
          <div><label for="feeRate" data-i18n="feeRate">플랫폼/결제 수수료 (%)</label><input id="feeRate" type="number" min="0" max="100" step="0.01" value="7.5" /></div>
          <div><label for="returnRate" data-i18n="returnRate">반품/환불률 (%)</label><input id="returnRate" type="number" min="0" max="100" step="0.01" value="6" /></div>
          <div><label for="marketing" data-i18n="marketing">월 마케팅비 (KRW)</label><input id="marketing" type="number" min="0" value="22000000" /></div>
          <div><label for="fixedOpex" data-i18n="fixedOpex">월 고정 운영비 (KRW)</label><input id="fixedOpex" type="number" min="0" value="8000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="6" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_orders">예상 월 주문 수</div><div id="orders" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_grossSales">총 굿즈 매출</div><div id="grossSales" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet">월 순이익</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_periodNet">분석기간 순이익</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_beConv">손익분기 전환율</div><div id="breakEvenConv" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_netSales">반품 반영 순매출</th><td id="netSales">-</td></tr>
            <tr><th data-i18n="d_variable">총 변동비</th><td id="variableCost">-</td></tr>
            <tr><th data-i18n="d_contrib">공헌이익</th><td id="contribution">-</td></tr>
            <tr><th data-i18n="d_fixed">월 고정비 합계</th><td id="fixedTotal">-</td></tr>
            <tr><th data-i18n="d_orderUnit">주문당 공헌이익</th><td id="unitContribution">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      audience:$("audience"), conversion:$("conversion"), aov:$("aov"), cogsRate:$("cogsRate"), fulfillment:$("fulfillment"), feeRate:$("feeRate"),
      returnRate:$("returnRate"), marketing:$("marketing"), fixedOpex:$("fixedOpex"), months:$("months"),
      orders:$("orders"), grossSales:$("grossSales"), monthlyNet:$("monthlyNet"), periodNet:$("periodNet"), roi:$("roi"), breakEvenConv:$("breakEvenConv"),
      netSales:$("netSales"), variableCost:$("variableCost"), contribution:$("contribution"), fixedTotal:$("fixedTotal"), unitContribution:$("unitContribution"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { audience:180000, conversion:1.8, aov:46000, cogsRate:37, fulfillment:4000, feeRate:7.5, returnRate:6, marketing:22000000, fixedOpex:8000000, months:6 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"🧢 크리에이터 굿즈 수익 계산기", subtitle:"오디언스 기반 굿즈 판매의 월 수익성, ROI, 손익분기 전환율을 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        audience:"월 오디언스 규모 (명)", conversion:"구매 전환율 (%)", aov:"평균 주문금액 AOV (KRW)", cogsRate:"제품 원가율 COGS (%)", fulfillment:"주문당 포장/물류비 (KRW)",
        feeRate:"플랫폼/결제 수수료 (%)", returnRate:"반품/환불률 (%)", marketing:"월 마케팅비 (KRW)", fixedOpex:"월 고정 운영비 (KRW)", months:"분석 기간 (개월)",
        k_orders:"예상 월 주문 수", k_grossSales:"총 굿즈 매출", k_monthlyNet:"월 순이익", k_periodNet:"분석기간 순이익", k_roi:"ROI", k_beConv:"손익분기 전환율",
        d_netSales:"반품 반영 순매출", d_variable:"총 변동비", d_contrib:"공헌이익", d_fixed:"월 고정비 합계", d_orderUnit:"주문당 공헌이익",
        errAudience:"오디언스 규모는 1 이상이어야 합니다.", errRates:"전환율/원가율/수수료/반품률은 0~100% 범위여야 합니다.", errAov:"AOV는 0보다 커야 합니다.",
        errCost:"비용 입력은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~60개월 범위여야 합니다.",
        people:"건", monthsUnit:"개월", impossible:"달성 불가", statusGood:"월 순이익 흑자", statusBad:"월 순이익 적자", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        summaryTitle:"[Creator Merch Profit 요약]", summaryPeriod:"개월 누적 순이익", summaryBe:"손익분기 전환율"
      },
      en: {
        title:"🧢 Creator Merch Profit Calculator", subtitle:"Estimate monthly merch profitability, ROI, and break-even conversion based on audience and cost stack.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        audience:"Monthly audience size", conversion:"Purchase conversion rate (%)", aov:"Average order value (KRW)", cogsRate:"COGS ratio (%)", fulfillment:"Fulfillment/packaging per order (KRW)",
        feeRate:"Platform/payment fee (%)", returnRate:"Return/refund rate (%)", marketing:"Monthly marketing spend (KRW)", fixedOpex:"Monthly fixed operating cost (KRW)", months:"Analysis period (months)",
        k_orders:"Estimated monthly orders", k_grossSales:"Gross merch sales", k_monthlyNet:"Monthly net profit", k_periodNet:"Period net profit", k_roi:"ROI", k_beConv:"Break-even conversion",
        d_netSales:"Net recognized sales (after returns)", d_variable:"Total variable cost", d_contrib:"Contribution profit", d_fixed:"Total monthly fixed cost", d_orderUnit:"Contribution per order",
        errAudience:"Audience size must be at least 1.", errRates:"Rates must be within 0~100%.", errAov:"AOV must be greater than 0.", errCost:"Cost inputs must be >= 0.", errMonths:"Analysis period must be between 1 and 60 months.",
        people:"orders", monthsUnit:"months", impossible:"Not achievable", statusGood:"Positive monthly net profit", statusBad:"Negative monthly net profit", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard permission unavailable. Please copy manually.",
        summaryTitle:"[Creator Merch Profit Summary]", summaryPeriod:"month cumulative net profit", summaryBe:"Break-even conversion"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.audience) || v.audience < 1) return t("errAudience");
      const rates = [v.conversion,v.cogsRate,v.feeRate,v.returnRate];
      if (rates.some((r)=>!Number.isFinite(r) || r < 0 || r > 100)) return t("errRates");
      if (!Number.isFinite(v.aov) || v.aov <= 0) return t("errAov");
      const costs = [v.fulfillment,v.marketing,v.fixedOpex];
      if (costs.some((c)=>!Number.isFinite(c) || c < 0)) return t("errCost");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return t("errMonths");
      return "";
    }

    function compute(v){
      const conv = v.conversion / 100;
      const cogs = v.cogsRate / 100;
      const fee = v.feeRate / 100;
      const refund = v.returnRate / 100;

      const orders = v.audience * conv;
      const grossSales = orders * v.aov;
      const netSales = grossSales * (1 - refund);

      const cogsCost = netSales * cogs;
      const feeCost = netSales * fee;
      const fulfillmentCost = orders * v.fulfillment;
      const variableCost = cogsCost + feeCost + fulfillmentCost;

      const contribution = netSales - variableCost;
      const fixedTotal = v.marketing + v.fixedOpex;
      const monthlyNet = contribution - fixedTotal;
      const periodNet = monthlyNet * v.months;

      const invested = (variableCost + fixedTotal) * v.months;
      const roi = invested === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / invested) * 100;

      const unitNetSales = v.aov * (1 - refund);
      const unitVariable = (unitNetSales * cogs) + (unitNetSales * fee) + v.fulfillment;
      const unitContribution = unitNetSales - unitVariable;
      const breakEvenOrders = unitContribution > 0 ? fixedTotal / unitContribution : Infinity;
      const breakEvenConv = (breakEvenOrders / v.audience) * 100;

      return { orders, grossSales, netSales, variableCost, contribution, fixedTotal, monthlyNet, periodNet, roi, unitContribution, breakEvenConv };
    }

    function resetOutputs(){
      ["orders","grossSales","monthlyNet","periodNet","roi","breakEvenConv","netSales","variableCost","contribution","fixedTotal","unitContribution"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        audience:Number(refs.audience.value), conversion:Number(refs.conversion.value), aov:Number(refs.aov.value), cogsRate:Number(refs.cogsRate.value), fulfillment:Number(refs.fulfillment.value),
        feeRate:Number(refs.feeRate.value), returnRate:Number(refs.returnRate.value), marketing:Number(refs.marketing.value), fixedOpex:Number(refs.fixedOpex.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.orders.textContent = `${num(r.orders,1)} ${t("people")}`;
      refs.grossSales.textContent = money(r.grossSales);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.breakEvenConv.textContent = Number.isFinite(r.breakEvenConv) && r.breakEvenConv <= 100 ? `${num(r.breakEvenConv,3)}%` : t("impossible");

      refs.netSales.textContent = money(r.netSales);
      refs.variableCost.textContent = money(r.variableCost);
      refs.contribution.textContent = money(r.contribution);
      refs.fixedTotal.textContent = money(r.fixedTotal);
      refs.unitContribution.textContent = money(r.unitContribution);

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> ${t("statusGood")} (${money(r.monthlyNet)})`
        : `<span class="warn">●</span> ${t("statusBad")} (${money(r.monthlyNet)})`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_orders")}: ${num(r.orders,1)} ${t("people")}`,
        `${t("k_grossSales")}: ${money(r.grossSales)}`,
        `${t("d_netSales")}: ${money(r.netSales)}`,
        `${t("d_contrib")}: ${money(r.contribution)}`,
        `${t("k_monthlyNet")}: ${money(r.monthlyNet)}`,
        `${v.months} ${t("summaryPeriod")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("summaryBe")}: ${Number.isFinite(r.breakEvenConv) && r.breakEvenConv <= 100 ? `${num(r.breakEvenConv,3)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.audience,refs.conversion,refs.aov,refs.cogsRate,refs.fulfillment,refs.feeRate,refs.returnRate,refs.marketing,refs.fixedOpex,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
