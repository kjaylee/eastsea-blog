<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Sponsorship Rate Calculator | 크리에이터 스폰서십 단가 계산기</title>
  <meta name="description" content="조회수·참여율·수수료·사용권 가중치를 반영해 크리에이터 협찬 캠페인 제안가와 실수령액을 계산합니다." />
  <style>
    :root{--bg:#0b1220;--card:#172336;--line:#334b69;--txt:#e9f1ff;--muted:#a7b8d1;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#21416f 0%,var(--bg) 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#1a3357;color:#dbeafe;padding:8px 11px;border-radius:10px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#1b2f4d,#121f32);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1a2b;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#223e62;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:#101f34;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}.pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1f3a5f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🎥 크리에이터 스폰서십 단가 계산기</h1>
        <div id="subtitle" class="sub">조회·참여 성과와 제작비, 수수료를 반영해 캠페인 제안가와 실수령액을 계산합니다.</div>
      </div>
      <div class="actions"><button id="langBtn" class="lang" type="button">EN</button><a id="backLink" class="link" href="/">Back to Portal</a></div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값 Inputs</h2>
        <div class="inputs">
          <div><label id="l_followers" for="followers"></label><input id="followers" type="number" min="0" value="180000"></div>
          <div><label id="l_avgViews" for="avgViews"></label><input id="avgViews" type="number" min="0" value="52000"></div>
          <div><label id="l_engagementRate" for="engagementRate"></label><input id="engagementRate" type="number" min="0" max="100" step="0.1" value="4.8"></div>
          <div><label id="l_posts" for="posts"></label><input id="posts" type="number" min="1" max="30" step="1" value="3"></div>
          <div><label id="l_baseCpm" for="baseCpm"></label><input id="baseCpm" type="number" min="0" step="100" value="32000"></div>
          <div><label id="l_cpe" for="cpe"></label><input id="cpe" type="number" min="0" step="10" value="250"></div>
          <div><label id="l_prodCost" for="prodCost"></label><input id="prodCost" type="number" min="0" step="1000" value="450000"></div>
          <div><label id="l_feeRate" for="feeRate"></label><input id="feeRate" type="number" min="0" max="95" step="0.1" value="18"></div>
          <div><label id="l_multiplier" for="multiplier"></label><input id="multiplier" type="number" min="0.5" max="5" step="0.01" value="1.25"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_totalViews"></div><div class="v" id="totalViews">-</div></div>
          <div class="kpi"><div class="k" id="k_engagements"></div><div class="v" id="engagements">-</div></div>
          <div class="kpi"><div class="k" id="k_proposal"></div><div class="v" id="proposal">-</div></div>
          <div class="kpi"><div class="k" id="k_takeHome"></div><div class="v" id="takeHome">-</div></div>
          <div class="kpi"><div class="k" id="k_effectiveCpm"></div><div class="v" id="effectiveCpm">-</div></div>
          <div class="kpi"><div class="k" id="k_viewToFollower"></div><div class="v" id="viewToFollower">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_viewValue"></th><td id="viewValue">-</td></tr>
          <tr><th id="d_engValue"></th><td id="engValue">-</td></tr>
          <tr><th id="d_prodTotal"></th><td id="prodTotal">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={followers:$("followers"),avgViews:$("avgViews"),engagementRate:$("engagementRate"),posts:$("posts"),baseCpm:$("baseCpm"),cpe:$("cpe"),prodCost:$("prodCost"),feeRate:$("feeRate"),multiplier:$("multiplier"),totalViews:$("totalViews"),engagements:$("engagements"),proposal:$("proposal"),takeHome:$("takeHome"),effectiveCpm:$("effectiveCpm"),viewToFollower:$("viewToFollower"),viewValue:$("viewValue"),engValue:$("engValue"),prodTotal:$("prodTotal"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={followers:180000,avgViews:52000,engagementRate:4.8,posts:3,baseCpm:32000,cpe:250,prodCost:450000,feeRate:18,multiplier:1.25};
    const I18N={
      ko:{title:"🎥 크리에이터 스폰서십 단가 계산기",subtitle:"조회·참여 성과와 제작비, 수수료를 반영해 캠페인 제안가와 실수령액을 계산합니다.",inputHeader:"입력값 Inputs",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_followers:"팔로워 수",l_avgViews:"게시물당 평균 조회수",l_engagementRate:"평균 참여율 (%)",l_posts:"캠페인 게시물 수",l_baseCpm:"기본 CPM (₩)",l_cpe:"참여 보너스 단가 CPE (₩)",l_prodCost:"제작 원가 (건당 ₩)",l_feeRate:"에이전시/플랫폼 수수료율 (%)",l_multiplier:"사용권·독점 멀티플라이어",k_totalViews:"총 예상 조회수",k_engagements:"총 예상 참여수",k_proposal:"총 제안가",k_takeHome:"크리에이터 실수령액",k_effectiveCpm:"유효 CPM",k_viewToFollower:"조회/팔로워 비율",d_viewValue:"조회 기반 금액",d_engValue:"참여 기반 금액",d_prodTotal:"총 제작비",ok:"제안가 산출 완료",warn:"수수료율이 높아 견적이 크게 상승합니다",invalid:"입력값을 확인해주세요",e_rate:"비율 값은 0~100 범위여야 합니다.",e_nonneg:"값은 0 이상이어야 합니다.",copied:"요약이 복사되었습니다.",copyFail:"클립보드를 사용할 수 없어 수동 복사가 필요합니다.",summaryTitle:"[크리에이터 스폰서십 단가 요약]"},
      en:{title:"🎥 Creator Sponsorship Rate Calculator",subtitle:"Estimate brand-deal proposal and creator take-home from views, engagement, costs, and fees.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_followers:"Followers",l_avgViews:"Avg views per post",l_engagementRate:"Engagement rate (%)",l_posts:"Number of sponsored posts",l_baseCpm:"Base CPM (KRW)",l_cpe:"Engagement bonus (CPE, KRW)",l_prodCost:"Production cost per post (KRW)",l_feeRate:"Agency/platform fee rate (%)",l_multiplier:"Usage/exclusivity multiplier",k_totalViews:"Total projected views",k_engagements:"Total projected engagements",k_proposal:"Proposed campaign fee",k_takeHome:"Creator take-home",k_effectiveCpm:"Effective CPM",k_viewToFollower:"Views-to-followers ratio",d_viewValue:"View-driven value",d_engValue:"Engagement-driven value",d_prodTotal:"Total production cost",ok:"Pricing output ready",warn:"High fee rate is inflating quote",invalid:"Please review inputs",e_rate:"Rate inputs must stay in 0~100 range.",e_nonneg:"Values must be zero or above.",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Creator Sponsorship Rate Summary]"}
    };
    let lang="ko"; const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang=lang; ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["followers","avgViews","engagementRate","posts","baseCpm","cpe","prodCost","feeRate","multiplier"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["totalViews","engagements","proposal","takeHome","effectiveCpm","viewToFollower"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["viewValue","engValue","prodTotal"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if([v.followers,v.avgViews,v.posts,v.baseCpm,v.cpe,v.prodCost,v.multiplier].some((x)=>!Number.isFinite(x)||x<0)) return t("e_nonneg");
      if([v.engagementRate,v.feeRate].some((x)=>!Number.isFinite(x)||x<0||x>=100)) return t("e_rate");
      if(v.posts<1) return t("e_nonneg");
      return "";
    }

    function render(){
      const v={followers:Number(refs.followers.value),avgViews:Number(refs.avgViews.value),engagementRate:Number(refs.engagementRate.value),posts:Number(refs.posts.value),baseCpm:Number(refs.baseCpm.value),cpe:Number(refs.cpe.value),prodCost:Number(refs.prodCost.value),feeRate:Number(refs.feeRate.value),multiplier:Number(refs.multiplier.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["totalViews","engagements","proposal","takeHome","effectiveCpm","viewToFollower","viewValue","engValue","prodTotal"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const totalViews=v.avgViews*v.posts;
      const engagements=totalViews*(v.engagementRate/100);
      const viewValue=(totalViews/1000)*v.baseCpm;
      const engValue=engagements*v.cpe;
      const prodTotal=v.prodCost*v.posts;
      const grossBeforeFee=(viewValue+engValue+prodTotal)*v.multiplier;
      const proposal=grossBeforeFee/(1-v.feeRate/100);
      const takeHome=proposal*(1-v.feeRate/100);
      const effectiveCpm=totalViews>0?(proposal/totalViews)*1000:0;
      const viewToFollower=v.followers>0?(totalViews/v.followers)*100:0;

      refs.totalViews.textContent=num(totalViews,0); refs.engagements.textContent=num(engagements,0); refs.proposal.textContent=won(proposal); refs.takeHome.textContent=won(takeHome);
      refs.effectiveCpm.textContent=won(effectiveCpm); refs.viewToFollower.textContent=`${num(viewToFollower,1)}%`;
      refs.viewValue.textContent=won(viewValue); refs.engValue.textContent=won(engValue); refs.prodTotal.textContent=won(prodTotal);
      refs.status.innerHTML=v.feeRate>25?`<span class="warn">●</span> ${t("warn")}`:`<span class="good">●</span> ${t("ok")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_totalViews")}: ${num(totalViews,0)}`,`${t("k_engagements")}: ${num(engagements,0)}`,`${t("k_proposal")}: ${won(proposal)}`,`${t("k_takeHome")}: ${won(takeHome)}`,`${t("k_effectiveCpm")}: ${won(effectiveCpm)}`,`${t("k_viewToFollower")}: ${num(viewToFollower,1)}%`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.followers,refs.avgViews,refs.engagementRate,refs.posts,refs.baseCpm,refs.cpe,refs.prodCost,refs.feeRate,refs.multiplier].forEach((el)=>el.addEventListener("input",render));
    applyI18n(); render();
  </script>
</body>
</html>
