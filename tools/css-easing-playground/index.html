<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSS Easing Playground | EastSea Tools</title>
  <meta name="description" content="Build and preview cubic-bezier and steps timing functions for CSS animations." />
  <style>
    :root {
      --bg: #0a0f1f;
      --panel: #121936;
      --panel2: #1a2347;
      --line: #2d3b72;
      --text: #ecf0ff;
      --muted: #aab4df;
      --accent: #7f9cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #2b3e83, var(--bg) 45%);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 18px;
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { margin: 0 0 8px; font-size: clamp(1.35rem, 3vw, 2rem); }
    .sub { margin: 0 0 14px; color: var(--muted); }
    .grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
    @media (min-width: 920px) { .grid { grid-template-columns: 380px 1fr; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }
    .controls { display: grid; gap: 10px; }
    label { font-size: 13px; color: var(--muted); display:block; margin-bottom: 4px; }
    input[type="range"], input[type="number"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--panel2);
      color: var(--text);
      padding: 8px;
    }
    .row { display: grid; grid-template-columns: 1fr 90px; gap: 8px; align-items: center; }
    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .preview {
      height: 58px;
      border: 1px dashed var(--line);
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(90deg, rgba(255,255,255,.03), transparent);
      margin-top: 10px;
    }
    .dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(145deg, #9fb5ff, #6f83e8);
      box-shadow: 0 8px 20px rgba(127,156,255,.4);
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 8px;
    }
    canvas { width: 100%; height: 300px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel2); }
    textarea {
      width: 100%;
      min-height: 80px;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel2);
      color: var(--text);
      padding: 9px;
      font: 500 13px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>CSS Easing Playground</h1>
    <p class="sub">Design timing functions visually and copy production-ready CSS.</p>

    <section class="grid">
      <article class="card controls">
        <div>
          <label for="type">Type</label>
          <select id="type">
            <option value="cubic">cubic-bezier</option>
            <option value="steps">steps</option>
          </select>
        </div>

        <div>
          <label for="preset">Preset</label>
          <select id="preset">
            <option value="ease">ease</option>
            <option value="linear">linear</option>
            <option value="ease-in">ease-in</option>
            <option value="ease-out">ease-out</option>
            <option value="ease-in-out">ease-in-out</option>
            <option value="custom">custom</option>
          </select>
        </div>

        <div id="bezierControls">
          <div class="row"><input type="range" id="x1" min="0" max="1" step="0.01" value="0.25"><input type="number" id="x1n" min="0" max="1" step="0.01" value="0.25"></div>
          <label>x1</label>
          <div class="row"><input type="range" id="y1" min="-1" max="2" step="0.01" value="0.1"><input type="number" id="y1n" min="-1" max="2" step="0.01" value="0.1"></div>
          <label>y1</label>
          <div class="row"><input type="range" id="x2" min="0" max="1" step="0.01" value="0.25"><input type="number" id="x2n" min="0" max="1" step="0.01" value="0.25"></div>
          <label>x2</label>
          <div class="row"><input type="range" id="y2" min="-1" max="2" step="0.01" value="1"><input type="number" id="y2n" min="-1" max="2" step="0.01" value="1"></div>
          <label>y2</label>
        </div>

        <div id="stepsControls" style="display:none;">
          <div>
            <label for="stepsCount">Steps Count</label>
            <input id="stepsCount" type="number" min="1" max="60" value="8">
          </div>
          <div>
            <label for="stepsPos">Step Position</label>
            <select id="stepsPos">
              <option value="end">end</option>
              <option value="start">start</option>
              <option value="jump-none">jump-none</option>
              <option value="jump-both">jump-both</option>
            </select>
          </div>
        </div>

        <button id="playBtn">Replay Preview</button>
      </article>

      <article class="card">
        <canvas id="chart" width="700" height="300"></canvas>
        <div class="preview" id="preview"><div class="dot" id="dot"></div></div>
        <textarea id="code" spellcheck="false"></textarea>
        <button id="copyBtn" style="margin-top:8px;">Copy CSS</button>
      </article>
    </section>
  </main>

  <script>
    const presets = {
      ease: [0.25, 0.1, 0.25, 1],
      linear: [0, 0, 1, 1],
      'ease-in': [0.42, 0, 1, 1],
      'ease-out': [0, 0, 0.58, 1],
      'ease-in-out': [0.42, 0, 0.58, 1]
    };

    const els = {
      type: document.getElementById('type'), preset: document.getElementById('preset'),
      x1: document.getElementById('x1'), y1: document.getElementById('y1'), x2: document.getElementById('x2'), y2: document.getElementById('y2'),
      x1n: document.getElementById('x1n'), y1n: document.getElementById('y1n'), x2n: document.getElementById('x2n'), y2n: document.getElementById('y2n'),
      stepsCount: document.getElementById('stepsCount'), stepsPos: document.getElementById('stepsPos'),
      bezierControls: document.getElementById('bezierControls'), stepsControls: document.getElementById('stepsControls'),
      chart: document.getElementById('chart'), code: document.getElementById('code'), dot: document.getElementById('dot')
    };

    function syncRange(id) {
      els[id].addEventListener('input', () => { els[id + 'n'].value = els[id].value; draw(); });
      els[id + 'n'].addEventListener('input', () => { els[id].value = els[id + 'n'].value; draw(); });
    }
    ['x1','y1','x2','y2'].forEach(syncRange);

    els.preset.addEventListener('change', () => {
      const p = presets[els.preset.value];
      if (!p) return;
      ['x1','y1','x2','y2'].forEach((k, i) => {
        els[k].value = p[i];
        els[k + 'n'].value = p[i];
      });
      draw();
    });

    els.type.addEventListener('change', () => {
      const cubic = els.type.value === 'cubic';
      els.bezierControls.style.display = cubic ? 'block' : 'none';
      els.stepsControls.style.display = cubic ? 'none' : 'block';
      draw();
    });

    els.stepsCount.addEventListener('input', draw);
    els.stepsPos.addEventListener('change', draw);

    function bezierY(t, p0, p1, p2, p3) {
      const c = 1 - t;
      return c*c*c*p0 + 3*c*c*t*p1 + 3*c*t*t*p2 + t*t*t*p3;
    }

    function timingFunction() {
      if (els.type.value === 'steps') {
        return `steps(${Math.max(1, Number(els.stepsCount.value) || 1)}, ${els.stepsPos.value})`;
      }
      return `cubic-bezier(${Number(els.x1.value).toFixed(2)}, ${Number(els.y1.value).toFixed(2)}, ${Number(els.x2.value).toFixed(2)}, ${Number(els.y2.value).toFixed(2)})`;
    }

    function draw() {
      const ctx = els.chart.getContext('2d');
      const w = els.chart.width, h = els.chart.height;
      ctx.clearRect(0,0,w,h);

      ctx.strokeStyle = '#41508f';
      ctx.lineWidth = 1;
      for (let i=0; i<=10; i++) {
        const x = 40 + (w-80) * (i/10);
        const y = 20 + (h-40) * (i/10);
        ctx.beginPath(); ctx.moveTo(x, 20); ctx.lineTo(x, h-20); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(w-40, y); ctx.stroke();
      }

      ctx.strokeStyle = '#9fb1ff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      if (els.type.value === 'steps') {
        const n = Math.max(1, Number(els.stepsCount.value) || 1);
        const sx = (w-80)/n;
        const pos = els.stepsPos.value;
        let py = h-20;
        ctx.moveTo(40, py);
        for (let i=0; i<n; i++) {
          const x = 40 + sx*i;
          const stepLevel = pos === 'start' ? (i+1)/n : i/n;
          const y = h-20 - (h-40)*Math.min(1, Math.max(0, stepLevel));
          ctx.lineTo(x, y);
          ctx.lineTo(x+sx, y);
          py = y;
        }
        ctx.lineTo(w-40, 20);
      } else {
        const x1=Number(els.x1.value), y1=Number(els.y1.value), x2=Number(els.x2.value), y2=Number(els.y2.value);
        for (let i=0; i<=120; i++) {
          const t = i / 120;
          const x = bezierY(t, 0, x1, x2, 1);
          const y = bezierY(t, 0, y1, y2, 1);
          const px = 40 + (w - 80) * x;
          const py = h - 20 - (h - 40) * y;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
      }
      ctx.stroke();

      els.code.value = `/* CSS timing function */\ntransition: all 350ms ${timingFunction()};\n/* or */\nanimation-timing-function: ${timingFunction()};`;
      replay();
    }

    function replay() {
      const track = document.getElementById('preview');
      const max = track.clientWidth - 34;
      els.dot.animate([
        { left: '8px' },
        { left: `${max}px` }
      ], {
        duration: 1400,
        fill: 'forwards',
        easing: timingFunction()
      });
    }

    document.getElementById('playBtn').addEventListener('click', replay);
    document.getElementById('copyBtn').addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(els.code.value); } catch {}
    });

    draw();
  </script>
</body>
</html>
