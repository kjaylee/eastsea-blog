<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CSS Keyframe Builder - Build keyframes visually, preview in real time, then copy production-ready CSS. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>CSS Keyframe Builder</title>
  <style>
    :root {
      --bg: #0e1324;
      --panel: #171f36;
      --panel-2: #1f2945;
      --text: #eef2ff;
      --muted: #a8b3d8;
      --line: rgba(255,255,255,0.14);
      --brand: #7c8cff;
      --brand-2: #4ec8ff;
      --ok: #2fd49f;
      --shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, #2a3f7a 0, transparent 35%),
        radial-gradient(circle at 88% 0, #1e4a76 0, transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }
    .app {
      max-width: 1180px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
    }
    .head {
      padding: 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(124,140,255,.18), transparent);
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.4rem, 2.8vw, 2rem); }
    .sub { margin: 0; color: var(--muted); }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      min-height: 650px;
    }
    .left { border-right: 1px solid var(--line); }
    .panel { padding: 16px 20px; border-bottom: 1px solid var(--line); }
    .label { font-size: .85rem; color: var(--muted); margin-bottom: 6px; display: block; }
    .settings {
      display: grid;
      grid-template-columns: repeat(3, minmax(140px, 1fr));
      gap: 10px;
    }
    input, select, button, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      padding: 10px 12px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(124,140,255,.18);
    }

    .timeline-wrap { padding: 0 20px 20px; }
    .timeline-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0 10px;
      gap: 10px;
    }
    .timeline-head h2 { margin: 0; font-size: 1.03rem; }
    .btn {
      width: auto;
      cursor: pointer;
      transition: .15s ease;
      background: var(--panel-2);
    }
    .btn:hover { transform: translateY(-1px); border-color: var(--brand); }
    .btn.primary {
      background: linear-gradient(135deg, rgba(124,140,255,.35), rgba(78,200,255,.2));
      border-color: rgba(124,140,255,.65);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,.01);
    }
    th, td {
      padding: 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: .88rem;
    }
    th { color: var(--muted); background: rgba(255,255,255,.03); }
    tr:last-child td { border-bottom: none; }
    td input { min-width: 74px; padding: 7px 8px; }

    .right {
      display: grid;
      grid-template-rows: auto auto 1fr;
      background: rgba(0,0,0,.1);
    }
    .preview-area {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }
    .stage {
      border: 1px dashed var(--line);
      border-radius: 14px;
      min-height: 210px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(0deg, rgba(255,255,255,.03) 1px, transparent 1px) 0 0 / 20px 20px,
        #101833;
      overflow: hidden;
    }
    .box {
      width: 74px;
      height: 74px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6b8dff, #3fd2ff);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      animation-name: pulseMove;
      animation-duration: 2s;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-fill-mode: both;
    }
    .preview-controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .code {
      padding: 16px;
      display: grid;
      gap: 8px;
    }
    textarea {
      min-height: 220px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #0d1530;
    }

    .helper { color: var(--muted); font-size: .84rem; margin: 0; }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid var(--line); }
      .settings { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
    @media (max-width: 560px) {
      .settings { grid-template-columns: 1fr; }
      th, td { font-size: .8rem; }
      td input { min-width: 58px; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="app">
    <header class="head">
      <h1>CSS Keyframe Builder</h1>
      <p class="sub">Build keyframes visually, preview in real time, then copy production-ready CSS.</p>
    </header>

    <section class="grid">
      <div class="left">
        <div class="panel settings">
          <div>
            <label class="label" for="name">Animation Name</label>
            <input id="name" value="floatPulse" />
          </div>
          <div>
            <label class="label" for="duration">Duration</label>
            <input id="duration" value="2.2s" />
          </div>
          <div>
            <label class="label" for="timing">Timing</label>
            <select id="timing">
              <option>ease</option>
              <option selected>ease-in-out</option>
              <option>linear</option>
              <option>ease-in</option>
              <option>ease-out</option>
              <option>cubic-bezier(.2,.7,.2,1)</option>
            </select>
          </div>
          <div>
            <label class="label" for="iteration">Iteration</label>
            <input id="iteration" value="infinite" />
          </div>
          <div>
            <label class="label" for="direction">Direction</label>
            <select id="direction">
              <option>normal</option>
              <option>reverse</option>
              <option selected>alternate</option>
              <option>alternate-reverse</option>
            </select>
          </div>
          <div>
            <label class="label" for="fill">Fill Mode</label>
            <select id="fill">
              <option>none</option>
              <option selected>both</option>
              <option>forwards</option>
              <option>backwards</option>
            </select>
          </div>
        </div>

        <div class="timeline-wrap">
          <div class="timeline-head">
            <h2>Keyframe Steps</h2>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button id="addStep" class="btn">+ Add Step</button>
              <button id="reset" class="btn">Reset</button>
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th>%</th><th>X(px)</th><th>Y(px)</th><th>Scale</th><th>Rotate(°)</th><th>Opacity</th><th>BG</th><th></th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
          <p class="helper" style="margin-top:8px;">Tip: keep 0% and 100% for smooth loops. Steps are auto-sorted by percentage.</p>
        </div>
      </div>

      <aside class="right">
        <div class="preview-area">
          <div class="stage">
            <div id="box" class="box"></div>
          </div>
          <div class="preview-controls">
            <button id="togglePlay" class="btn">Pause</button>
            <button id="replay" class="btn">Replay</button>
          </div>
        </div>

        <div class="code">
          <label class="label" for="cssOut">Generated CSS</label>
          <textarea id="cssOut" readonly></textarea>
          <button id="copyCss" class="btn primary">Copy CSS</button>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const rowsEl = document.getElementById('rows');
    const cssOut = document.getElementById('cssOut');
    const box = document.getElementById('box');

    const fields = ['name','duration','timing','iteration','direction','fill'].map(id => document.getElementById(id));
    const state = {
      playing: true,
      steps: [
        {p:0, x:0, y:0, s:1, r:0, o:1, c:''},
        {p:50, x:0, y:-16, s:1.08, r:3, o:1, c:''},
        {p:100, x:0, y:0, s:1, r:0, o:1, c:''}
      ]
    };

    function renderRows() {
      state.steps.sort((a,b)=>a.p-b.p);
      rowsEl.innerHTML = state.steps.map((st, i) => `
        <tr>
          <td><input type="number" min="0" max="100" step="1" value="${st.p}" data-i="${i}" data-k="p"></td>
          <td><input type="number" step="1" value="${st.x}" data-i="${i}" data-k="x"></td>
          <td><input type="number" step="1" value="${st.y}" data-i="${i}" data-k="y"></td>
          <td><input type="number" step="0.01" value="${st.s}" data-i="${i}" data-k="s"></td>
          <td><input type="number" step="1" value="${st.r}" data-i="${i}" data-k="r"></td>
          <td><input type="number" step="0.01" min="0" max="1" value="${st.o}" data-i="${i}" data-k="o"></td>
          <td><input type="text" placeholder="#hex / rgba" value="${st.c}" data-i="${i}" data-k="c"></td>
          <td><button class="btn" data-remove="${i}">✕</button></td>
        </tr>`).join('');
    }

    function num(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function buildCSS() {
      const name = document.getElementById('name').value.trim() || 'myAnim';
      const duration = document.getElementById('duration').value.trim() || '1s';
      const timing = document.getElementById('timing').value.trim() || 'ease';
      const iteration = document.getElementById('iteration').value.trim() || 'infinite';
      const direction = document.getElementById('direction').value.trim() || 'normal';
      const fill = document.getElementById('fill').value.trim() || 'both';

      const blocks = state.steps
        .slice()
        .sort((a,b)=>a.p-b.p)
        .map(st => {
          const p = Math.min(100, Math.max(0, num(st.p)));
          const transform = `translate(${num(st.x)}px, ${num(st.y)}px) scale(${num(st.s,1)}) rotate(${num(st.r)}deg)`;
          const opacity = Math.min(1, Math.max(0, num(st.o,1)));
          const bg = st.c && st.c.trim() ? `\n    background-color: ${st.c.trim()};` : '';
          return `  ${p}% {\n    transform: ${transform};\n    opacity: ${opacity};${bg}\n  }`;
        }).join('\n');

      const css = `@keyframes ${name} {\n${blocks}\n}\n\n.preview-box {\n  animation: ${name} ${duration} ${timing} ${iteration};\n  animation-direction: ${direction};\n  animation-fill-mode: ${fill};\n}`;

      cssOut.value = css;
      return {name, duration, timing, iteration, direction, fill, keyframes: blocks};
    }

    function applyPreview() {
      const data = buildCSS();
      let styleEl = document.getElementById('dynStyle');
      if (!styleEl) {
        styleEl = document.createElement('style');
        styleEl.id = 'dynStyle';
        document.head.appendChild(styleEl);
      }
      styleEl.textContent = `@keyframes ${data.name} {\n${data.keyframes}\n}`;
      box.style.animationName = data.name;
      box.style.animationDuration = data.duration;
      box.style.animationTimingFunction = data.timing;
      box.style.animationIterationCount = data.iteration;
      box.style.animationDirection = data.direction;
      box.style.animationFillMode = data.fill;
    }

    rowsEl.addEventListener('input', (e) => {
      const input = e.target.closest('input');
      if (!input) return;
      const i = Number(input.dataset.i);
      const k = input.dataset.k;
      if (!state.steps[i]) return;
      state.steps[i][k] = input.value;
      applyPreview();
    });

    rowsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-remove]');
      if (!btn) return;
      if (state.steps.length <= 2) return;
      const i = Number(btn.dataset.remove);
      state.steps.splice(i, 1);
      renderRows();
      applyPreview();
    });

    document.getElementById('addStep').addEventListener('click', () => {
      state.steps.push({p:75, x:0, y:-6, s:1, r:0, o:1, c:''});
      renderRows();
      applyPreview();
    });

    document.getElementById('reset').addEventListener('click', () => {
      state.steps = [
        {p:0, x:0, y:0, s:1, r:0, o:1, c:''},
        {p:50, x:0, y:-16, s:1.08, r:3, o:1, c:''},
        {p:100, x:0, y:0, s:1, r:0, o:1, c:''}
      ];
      document.getElementById('name').value = 'floatPulse';
      document.getElementById('duration').value = '2.2s';
      document.getElementById('timing').value = 'ease-in-out';
      document.getElementById('iteration').value = 'infinite';
      document.getElementById('direction').value = 'alternate';
      document.getElementById('fill').value = 'both';
      renderRows();
      applyPreview();
    });

    document.getElementById('togglePlay').addEventListener('click', (e) => {
      state.playing = !state.playing;
      box.style.animationPlayState = state.playing ? 'running' : 'paused';
      e.target.textContent = state.playing ? 'Pause' : 'Play';
    });

    document.getElementById('replay').addEventListener('click', () => {
      box.style.animation = 'none';
      void box.offsetWidth;
      box.style.animation = '';
      applyPreview();
    });

    document.getElementById('copyCss').addEventListener('click', () => {
      navigator.clipboard.writeText(cssOut.value);
    });

    fields.forEach(el => el.addEventListener('input', applyPreview));

    renderRows();
    applyPreview();
  </script>
</body>
</html>
