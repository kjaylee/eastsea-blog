<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Table Viewer — Paste & Analyze CSV Data</title>
<meta name="description" content="Paste CSV data to view as a sortable, filterable table with column statistics. Supports comma, tab, semicolon delimiters.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg2:#0d0d1a;--glass:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);--text:#e0e0e0;--text2:#888;--accent:#10b981;--accent2:#34d399;--warn:#fbbf24;--danger:#f87171;--info:#60a5fa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem}
.container{max-width:1200px;margin:0 auto}
h1{text-align:center;font-size:1.9rem;margin-bottom:.3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.subtitle{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:1.5rem}
.toolbar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.btn{padding:.55rem 1.1rem;border-radius:9px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:var(--glass);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);color:var(--danger)}
.btn-danger:hover{background:rgba(248,113,113,0.2)}
select,input[type=text]{background:var(--glass);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:.5rem .9rem;font-size:.85rem;outline:none;transition:border-color .2s}
select:focus,input:focus{border-color:var(--accent)}
select option{background:#1a1a2e}
.input-area{width:100%;min-height:120px;background:var(--bg2);border:2px dashed var(--border);border-radius:14px;color:var(--text);font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.8rem;resize:vertical;outline:none;padding:1rem;line-height:1.6;transition:border-color .2s;margin-bottom:1rem}
.input-area:focus{border-color:var(--accent)}
.input-area::placeholder{color:var(--text2)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.6rem;margin-bottom:1rem}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;backdrop-filter:blur(10px)}
.stat-label{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
.stat-value{font-size:1.3rem;font-weight:700;color:var(--accent2)}
.filter-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.8rem;align-items:center}
.filter-input{flex:1;min-width:180px}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);margin-bottom:1rem;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead{position:sticky;top:0;z-index:10;background:#111122}
th{padding:.6rem .9rem;text-align:left;color:var(--text2);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:1px solid var(--border);transition:color .15s;background:#111122}
th:hover{color:var(--accent)}
th .sort-icon{margin-left:.3rem;opacity:.4;font-size:.7rem}
th.sorted-asc .sort-icon::after{content:'▲';opacity:1;color:var(--accent)}
th.sorted-desc .sort-icon::after{content:'▼';opacity:1;color:var(--accent)}
th:not(.sorted-asc):not(.sorted-desc) .sort-icon::after{content:'⇅'}
td{padding:.5rem .9rem;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text);max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.78rem}
td.num{color:var(--info);text-align:right}
td.empty{color:var(--danger);opacity:.6;font-style:italic}
tr:hover td{background:rgba(255,255,255,0.025)}
tr:nth-child(even) td{background:rgba(255,255,255,0.015)}
.pagination{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;font-size:.82rem}
.page-btn{padding:.3rem .65rem;background:var(--glass);border:1px solid var(--border);border-radius:7px;color:var(--text);cursor:pointer;transition:all .15s}
.page-btn:hover,.page-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
.page-btn:disabled{opacity:.3;cursor:default}
.col-stats{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;backdrop-filter:blur(10px);display:none}
.col-stats.show{display:block}
.col-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.5rem;margin-top:.6rem}
.cs-item{background:rgba(255,255,255,0.04);border-radius:8px;padding:.5rem .75rem}
.cs-key{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.cs-val{font-size:.9rem;font-weight:600;color:var(--accent2)}
.empty-state{text-align:center;color:var(--text2);padding:3rem;font-size:.9rem}
.badge{display:inline-block;padding:.2rem .55rem;border-radius:6px;font-size:.72rem;font-weight:700}
.badge-green{background:rgba(16,185,129,0.15);color:var(--accent)}
.badge-blue{background:rgba(96,165,250,0.15);color:var(--info)}
.badge-yellow{background:rgba(251,191,36,0.15);color:var(--warn)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--accent);color:#000;padding:.6rem 1.2rem;border-radius:10px;font-weight:700;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
@media(max-width:600px){h1{font-size:1.4rem}td,th{padding:.45rem .6rem}td{max-width:130px}}
</style>
</head>
<body>
<div class="container">
  <h1>📊 CSV Table Viewer</h1>
  <p class="subtitle">Paste CSV data — view, sort, filter, and analyze instantly</p>

  <div class="toolbar">
    <label for="delimSelect" style="font-size:.82rem;color:var(--text2)">Delimiter:</label>
    <select id="delimSelect" onchange="parseCSV()">
      <option value=",">Comma (,)</option>
      <option value="	">Tab (\t)</option>
      <option value=";">Semicolon (;)</option>
      <option value="|">Pipe (|)</option>
    </select>
    <label style="display:flex;align-items:center;gap:.4rem;font-size:.82rem;color:var(--text2);cursor:pointer">
      <input type="checkbox" id="hasHeader" checked onchange="parseCSV()" style="accent-color:var(--accent)"> Has Header Row
    </label>
    <button class="btn btn-ghost" onclick="loadSample()">Load Sample</button>
    <button class="btn btn-danger" onclick="clearAll()">Clear</button>
    <button class="btn btn-ghost" id="exportBtn" onclick="exportCSV()" style="display:none">Export</button>
    <button class="btn btn-ghost" id="copyBtn" onclick="copyTable()" style="display:none">Copy Table</button>
  </div>

  <textarea class="input-area" id="csvInput" placeholder="Paste your CSV data here…

name,age,city,salary
Alice,32,New York,85000
Bob,28,London,72000
Carol,35,Tokyo,91000
Dave,29,Paris,68000"></textarea>

  <div class="stats-row" id="statsRow" style="display:none"></div>

  <div id="colStatsPanel" class="col-stats">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span id="colStatsTitle" style="font-size:.85rem;font-weight:700"></span>
      <button class="btn btn-ghost" style="padding:.25rem .7rem;font-size:.75rem" onclick="document.getElementById('colStatsPanel').classList.remove('show')">×</button>
    </div>
    <div class="col-stats-grid" id="colStatsGrid"></div>
  </div>

  <div class="filter-row" id="filterRow" style="display:none">
    <input type="text" class="filter-input" id="filterInput" placeholder="Filter rows… (searches all columns)" oninput="applyFilter()">
    <span id="rowCountBadge" class="badge badge-green"></span>
    <span id="pageInfo" style="color:var(--text2);font-size:.8rem"></span>
  </div>

  <div class="table-wrap" id="tableWrap" style="display:none">
    <table id="dataTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
  <div class="empty-state" id="emptyState" style="display:none">No rows match your filter.</div>
</div>
<div class="toast" id="toast"></div>

<script>
let allRows = [], headers = [], filteredRows = [], sortCol = -1, sortDir = 1;
let currentPage = 1;
const PAGE_SIZE = 50;

function parseCSV(){
  const raw = document.getElementById('csvInput').value.trim();
  if(!raw){ clearAll(); return; }
  const delim = document.getElementById('delimSelect').value;
  const hasHdr = document.getElementById('hasHeader').checked;

  const lines = raw.split(/\r?\n/).filter(l=>l.trim());
  const parsed = lines.map(line=>splitCSVLine(line,delim));
  const maxCols = Math.max(...parsed.map(r=>r.length));

  if(hasHdr && parsed.length>0){
    headers = parsed[0].map((h,i)=>h||`Col${i+1}`);
    allRows = parsed.slice(1).map(r=>padRow(r,maxCols));
  } else {
    headers = Array.from({length:maxCols},(_,i)=>`Col${i+1}`);
    allRows = parsed.map(r=>padRow(r,maxCols));
  }
  // Pad headers if needed
  while(headers.length<maxCols) headers.push(`Col${headers.length+1}`);

  sortCol=-1; sortDir=1; currentPage=1;
  filteredRows=[...allRows];
  document.getElementById('filterInput').value='';
  renderAll();
}

function splitCSVLine(line,delim){
  if(delim!==',') return line.split(delim).map(s=>s.trim());
  // Handle quoted CSV
  const result=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){
      if(inQ&&line[i+1]==='"'){cur+='"';i++;}
      else inQ=!inQ;
    } else if(line[i]===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=line[i];
  }
  result.push(cur.trim());
  return result;
}
function padRow(r,len){
  while(r.length<len) r.push('');
  return r.slice(0,len);
}

function isNumericCol(colIdx){
  return filteredRows.every(r=>{const v=r[colIdx]; return v===''||!isNaN(parseFloat(v))&&isFinite(v);});
}
function isNumericVal(v){return v!==''&&!isNaN(parseFloat(v))&&isFinite(v);}

function renderAll(){
  renderStats();
  renderTableHead();
  renderTableBody();
  renderPagination();
  const hasData = allRows.length>0;
  document.getElementById('statsRow').style.display = hasData?'grid':'none';
  document.getElementById('tableWrap').style.display = hasData?'block':'none';
  document.getElementById('filterRow').style.display = hasData?'flex':'none';
  document.getElementById('exportBtn').style.display = hasData?'inline-block':'none';
  document.getElementById('copyBtn').style.display = hasData?'inline-block':'none';
}

function renderStats(){
  const totalCells = allRows.length * headers.length;
  const emptyCells = allRows.reduce((acc,r)=>acc+r.filter(c=>c==='').length,0);
  const numCols = headers.filter((_,i)=>isNumericCol(i)).length;
  document.getElementById('statsRow').innerHTML=[
    ['Rows',allRows.length.toLocaleString()],
    ['Columns',headers.length.toLocaleString()],
    ['Numeric Cols',numCols],
    ['Empty Cells',emptyCells.toLocaleString()],
    ['Fill Rate',totalCells?((1-emptyCells/totalCells)*100).toFixed(1)+'%':'—'],
  ].map(([l,v])=>`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value">${v}</div></div>`).join('');
}

function renderTableHead(){
  document.getElementById('tableHead').innerHTML=`<tr>${headers.map((h,i)=>{
    let cls='';
    if(i===sortCol) cls=sortDir===1?'sorted-asc':'sorted-desc';
    return `<th class="${cls}" onclick="sortBy(${i})">${escHtml(h)}<span class="sort-icon"></span></th>`;
  }).join('')}</tr>`;
}

function renderTableBody(){
  const start=(currentPage-1)*PAGE_SIZE, end=start+PAGE_SIZE;
  const pageRows=filteredRows.slice(start,end);
  const numFlags=headers.map((_,i)=>isNumericCol(i));
  if(!pageRows.length){
    document.getElementById('tableBody').innerHTML='';
    document.getElementById('emptyState').style.display='block';
  } else {
    document.getElementById('emptyState').style.display='none';
    document.getElementById('tableBody').innerHTML=pageRows.map(row=>`<tr>${row.map((cell,i)=>{
      let cls=numFlags[i]&&isNumericVal(cell)?'num':(cell===''?'empty':'');
      const display=cell===''?'(empty)':escHtml(cell);
      return `<td class="${cls}" title="${escHtml(cell)}">${display}</td>`;
    }).join('')}</tr>`).join('');
  }
  document.getElementById('rowCountBadge').textContent=`${filteredRows.length.toLocaleString()} rows`;
  document.getElementById('pageInfo').textContent=filteredRows.length>PAGE_SIZE?`Page ${currentPage} of ${Math.ceil(filteredRows.length/PAGE_SIZE)}`:'';
}

function renderPagination(){
  const totalPages=Math.ceil(filteredRows.length/PAGE_SIZE);
  const pag=document.getElementById('pagination');
  if(totalPages<=1){pag.innerHTML='';return;}
  let btns=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
  const range=5, start=Math.max(1,currentPage-2), end=Math.min(totalPages,start+range-1);
  if(start>1) btns+=`<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span style="color:var(--text2)">…</span>':''}`;
  for(let i=start;i<=end;i++) btns+=`<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if(end<totalPages) btns+=`${end<totalPages-1?'<span style="color:var(--text2)">…</span>':''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  btns+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next ›</button>`;
  pag.innerHTML=btns;
}

function goPage(p){
  const total=Math.ceil(filteredRows.length/PAGE_SIZE);
  currentPage=Math.max(1,Math.min(p,total));
  renderTableBody(); renderPagination();
}

function sortBy(colIdx){
  if(sortCol===colIdx) sortDir*=-1;
  else {sortCol=colIdx; sortDir=1;}
  const isNum=isNumericCol(colIdx);
  filteredRows.sort((a,b)=>{
    const va=a[colIdx], vb=b[colIdx];
    if(va===''&&vb!=='') return 1;
    if(vb===''&&va!=='') return -1;
    if(isNum) return (parseFloat(va)-parseFloat(vb))*sortDir;
    return va.localeCompare(vb)*sortDir;
  });
  currentPage=1; renderTableHead(); renderTableBody(); renderPagination();
}

function applyFilter(){
  const q=document.getElementById('filterInput').value.toLowerCase();
  filteredRows=q?allRows.filter(r=>r.some(c=>c.toLowerCase().includes(q))):[...allRows];
  if(sortCol>=0) sortBy(sortCol); // re-apply sort
  else {currentPage=1; renderTableBody(); renderPagination();}
}

function showColStats(colIdx){
  const vals=allRows.map(r=>r[colIdx]);
  const nonEmpty=vals.filter(v=>v!=='');
  const title=headers[colIdx];
  const panel=document.getElementById('colStatsPanel');
  document.getElementById('colStatsTitle').textContent=`Column: ${title}`;
  const stats=[
    ['Total Values',nonEmpty.length],
    ['Empty',vals.length-nonEmpty.length],
    ['Unique',new Set(nonEmpty).size],
  ];
  const nums=nonEmpty.filter(isNumericVal).map(parseFloat);
  if(nums.length){
    const sum=nums.reduce((a,b)=>a+b,0);
    const sorted=[...nums].sort((a,b)=>a-b);
    const mid=Math.floor(sorted.length/2);
    stats.push(['Min',sorted[0].toLocaleString()]);
    stats.push(['Max',sorted[sorted.length-1].toLocaleString()]);
    stats.push(['Mean',(sum/nums.length).toFixed(2)]);
    stats.push(['Median',sorted.length%2?sorted[mid]:((sorted[mid-1]+sorted[mid])/2).toFixed(2)]);
    stats.push(['Sum',sum.toLocaleString()]);
  }
  document.getElementById('colStatsGrid').innerHTML=stats.map(([k,v])=>`<div class="cs-item"><div class="cs-key">${k}</div><div class="cs-val">${v}</div></div>`).join('');
  panel.classList.add('show');
}

function loadSample(){
  document.getElementById('csvInput').value=`name,department,salary,age,city
Alice Johnson,Engineering,95000,32,San Francisco
Bob Smith,Marketing,72000,28,New York
Carol White,Engineering,110000,35,Seattle
Dave Brown,HR,65000,29,Chicago
Eve Davis,Engineering,98000,31,Austin
Frank Miller,Marketing,75000,33,New York
Grace Lee,Product,88000,27,San Francisco
Henry Wilson,Sales,62000,40,Dallas
Iris Moore,Engineering,105000,36,Seattle
Jack Taylor,Design,79000,25,Los Angeles`;
  document.getElementById('delimSelect').value=',';
  document.getElementById('hasHeader').checked=true;
  parseCSV();
}

function clearAll(){
  document.getElementById('csvInput').value='';
  allRows=[]; headers=[]; filteredRows=[]; sortCol=-1; sortDir=1; currentPage=1;
  document.getElementById('statsRow').style.display='none';
  document.getElementById('tableWrap').style.display='none';
  document.getElementById('filterRow').style.display='none';
  document.getElementById('exportBtn').style.display='none';
  document.getElementById('copyBtn').style.display='none';
  document.getElementById('pagination').innerHTML='';
  document.getElementById('colStatsPanel').classList.remove('show');
}

function exportCSV(){
  const delim=',';
  const rows=[headers,...allRows];
  const csv=rows.map(r=>r.map(c=>/[,"\n]/.test(c)?`"${c.replace(/"/g,'""')}"`  :c).join(delim)).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='table.csv'; a.click();
  showToast('CSV exported');
}

function copyTable(){
  const rows=[headers,...allRows];
  const tsv=rows.map(r=>r.join('\t')).join('\n');
  navigator.clipboard.writeText(tsv).then(()=>showToast('Table copied (TSV)'));
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}

// Click column header for stats (shift+click)
document.getElementById('tableWrap').addEventListener('click',e=>{
  if(e.shiftKey&&e.target.closest('th')){
    const th=e.target.closest('th');
    const idx=[...th.parentElement.children].indexOf(th);
    showColStats(idx);
  }
});

// Auto-parse on input
document.getElementById('csvInput').addEventListener('input',()=>parseCSV());
</script>
</body>
</html>
