<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAC 계산기 | Customer Acquisition Cost</title>
  <meta name="description" content="마케팅/세일즈 비용을 기반으로 CAC, 리드 전환률, 회수기간, LTV:CAC 비율을 계산합니다." />
  <style>
    :root{--bg:#f3f7ff;--card:#fff;--line:#dce5f6;--text:#1f2937;--muted:#64748b;--pri:#4f46e5;--pri2:#0ea5e9;--ok:#16a34a;--warn:#d97706;--bad:#dc2626}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eef3ff,#f8fbff);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:1040px;margin:0 auto;padding:18px 14px 42px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.85rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.92rem}
    .back{text-decoration:none;color:#1e3a8a;border:1px solid var(--line);padding:8px 11px;border-radius:10px;background:#fff;font-weight:700;font-size:.88rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 10px 28px rgba(79,70,229,.08)}
    h2{margin:0 0 10px;font-size:1rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin:0 0 6px;font-weight:700}
    input,button{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);font-size:.92rem}
    input:focus{outline:2px solid rgba(79,70,229,.2);border-color:#7b73ff}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;font-weight:800}.ghost{background:#f4f7ff;border:1px solid var(--line);color:#1f2937}
    .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{border:1px solid var(--line);background:#f9fbff;border-radius:12px;padding:10px}.k{font-size:.75rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .msg{margin-top:10px;border:1px solid var(--line);border-radius:10px;background:#f8fbff;padding:10px;font-size:.9rem;line-height:1.45}
    .table{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:700px}th,td{padding:8px;border-bottom:1px solid var(--line);font-size:.82rem;text-align:right}th:first-child,td:first-child{text-align:left}th{background:#f1f5ff;color:#475569;font-size:.76rem}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>🎯 CAC 계산기</h1>
      <p class="sub">고객 획득 비용과 회수 기간을 계산해 채널 효율을 진단하세요.</p>
    </div>
    <a class="back" href="/">Back to Portal</a>
  </div>

  <section class="grid">
    <article class="card">
      <h2>비용 & 성과 입력 (월 기준)</h2>
      <div class="two">
        <div><label for="adSpend">광고비 (원)</label><input id="adSpend" type="number" min="0" step="10000" value="18000000"></div>
        <div><label for="contentSpend">콘텐츠/외주비 (원)</label><input id="contentSpend" type="number" min="0" step="10000" value="3500000"></div>
        <div><label for="salesPayroll">영업 인건비 (원)</label><input id="salesPayroll" type="number" min="0" step="10000" value="12000000"></div>
        <div><label for="toolCost">툴/CRM 비용 (원)</label><input id="toolCost" type="number" min="0" step="10000" value="1200000"></div>
        <div><label for="newCustomers">신규 고객 수</label><input id="newCustomers" type="number" min="1" step="1" value="86"></div>
        <div><label for="qualifiedLeads">유효 리드 수</label><input id="qualifiedLeads" type="number" min="1" step="1" value="520"></div>
      </div>

      <h2 style="margin-top:12px">수익성 가정</h2>
      <div class="two">
        <div><label for="arpu">월 ARPU (원)</label><input id="arpu" type="number" min="0" step="1000" value="145000"></div>
        <div><label for="grossMargin">매출총이익률 (%)</label><input id="grossMargin" type="number" min="1" max="100" step="0.1" value="72"></div>
        <div><label for="lifespan">평균 유지기간 (개월)</label><input id="lifespan" type="number" min="1" step="1" value="18"></div>
        <div><label for="targetLtvCac">목표 LTV:CAC</label><input id="targetLtvCac" type="number" min="1" step="0.1" value="3"></div>
      </div>

      <div class="btns">
        <button id="calcBtn" type="button">계산</button>
        <button id="sampleBtn" class="ghost" type="button">샘플</button>
      </div>
    </article>

    <article class="card">
      <h2>핵심 결과</h2>
      <div class="kpis">
        <div class="kpi"><div class="k">총 획득 비용</div><div class="v" id="totalCost">-</div></div>
        <div class="kpi"><div class="k">CAC</div><div class="v" id="cac">-</div></div>
        <div class="kpi"><div class="k">리드→고객 전환률</div><div class="v" id="leadConv">-</div></div>
        <div class="kpi"><div class="k">회수 기간</div><div class="v" id="payback">-</div></div>
        <div class="kpi"><div class="k">고객 LTV</div><div class="v" id="ltv">-</div></div>
        <div class="kpi"><div class="k">LTV:CAC</div><div class="v" id="ltvCac">-</div></div>
      </div>
      <div class="msg" id="msg">입력값 변경 시 자동 계산됩니다.</div>
    </article>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>진단 표</h2>
    <div class="table">
      <table>
        <thead><tr><th>항목</th><th>값</th><th>해석/권장</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  const $=(id)=>document.getElementById(id);
  const won=(n)=>'₩'+Math.round(n||0).toLocaleString('ko-KR');
  const pct=(v)=>`${(v*100).toFixed(2)}%`;

  function run(){
    const ad=Number($('adSpend').value);
    const content=Number($('contentSpend').value);
    const payroll=Number($('salesPayroll').value);
    const tools=Number($('toolCost').value);
    const customers=Math.max(1,Number($('newCustomers').value)||1);
    const leads=Math.max(1,Number($('qualifiedLeads').value)||1);
    const arpu=Number($('arpu').value);
    const margin=Math.max(0.01,Number($('grossMargin').value)/100);
    const lifespan=Math.max(1,Number($('lifespan').value));
    const targetRatio=Math.max(1,Number($('targetLtvCac').value));

    const total=ad+content+payroll+tools;
    const cac=total/customers;
    const leadConv=customers/leads;
    const monthlyContribution=arpu*margin;
    const payback=monthlyContribution>0?cac/monthlyContribution:Infinity;
    const ltv=monthlyContribution*lifespan;
    const ratio=ltv/Math.max(1,cac);

    $('totalCost').textContent=won(total);
    $('cac').textContent=won(cac);
    $('leadConv').textContent=pct(leadConv);
    $('payback').textContent=isFinite(payback)?`${payback.toFixed(1)}개월`:'계산 불가';
    $('ltv').textContent=won(ltv);
    $('ltvCac').textContent=`${ratio.toFixed(2)}x`;

    $('ltvCac').className=`v ${ratio>=targetRatio?'ok':ratio>=targetRatio*0.8?'warn':'bad'}`;
    $('payback').className=`v ${payback<=12?'ok':payback<=18?'warn':'bad'}`;

    let msg='';
    if(ratio>=targetRatio&&payback<=12) msg='✅ 효율이 양호합니다. 증액 가능한 채널의 예산을 점진적으로 확장하세요.';
    else if(ratio>=2&&payback<=18) msg='⚠️ 관리 가능한 구간입니다. 전환율 개선과 온보딩 강화로 회수기간을 단축하세요.';
    else msg='🚨 CAC 부담이 큽니다. 타깃 정교화, 랜딩 개선, 세일즈 프로세스 단축이 필요합니다.';
    $('msg').textContent=msg;

    const rows=[
      ['CAC',won(cac),`총비용 ${won(total)} ÷ 신규고객 ${customers.toLocaleString('ko-KR')}명`],
      ['리드→고객 전환률',pct(leadConv),leadConv>=0.2?'전환 퍼널 우수':'퍼널 병목(메시지/오퍼/세일즈 핸드오프) 점검 필요'],
      ['월 공헌이익(고객당)',won(monthlyContribution),`ARPU ${won(arpu)} × 총이익률 ${(margin*100).toFixed(1)}%`],
      ['CAC 회수기간',isFinite(payback)?`${payback.toFixed(1)}개월`:'계산 불가',payback<=12?'건강한 수준':payback<=18?'개선 권장':'리스크 높음'],
      ['LTV:CAC',`${ratio.toFixed(2)}x`,`목표 ${targetRatio.toFixed(1)}x 대비 ${ratio>=targetRatio?'달성':'미달'}`]
    ];
    $('rows').innerHTML=rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td style="text-align:left;color:#6b7280">${r[2]}</td></tr>`).join('');
  }

  $('calcBtn').addEventListener('click',run);
  $('sampleBtn').addEventListener('click',()=>{
    $('adSpend').value=22000000;
    $('contentSpend').value=4200000;
    $('salesPayroll').value=15000000;
    $('toolCost').value=1800000;
    $('newCustomers').value=120;
    $('qualifiedLeads').value=780;
    $('arpu').value=168000;
    $('grossMargin').value=75;
    $('lifespan').value=20;
    $('targetLtvCac').value=3;
    run();
  });
  ['adSpend','contentSpend','salesPayroll','toolCost','newCustomers','qualifiedLeads','arpu','grossMargin','lifespan','targetLtvCac'].forEach(id=>$(id).addEventListener('input',run));
  run();
</script>
</body>
</html>
