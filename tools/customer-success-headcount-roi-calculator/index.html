<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Success Headcount ROI Calculator | CS 인력 투자 ROI 계산기</title>
  <meta name="description" content="CS 인력/툴 투자에 따른 churn 개선 및 expansion 기여를 반영해 연 순효과, ROI, 회수기간, 손익분기 churn 목표를 계산합니다." />
  <style>
    :root{--bg:#08111f;--card:#132640;--line:#305788;--txt:#edf3ff;--muted:#b2c7e8;--pri:#7fb1ff;--soft:#1b3a5e;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#254676 0%,#08111f 52%);color:var(--txt)}
    .wrap{max-width:1140px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.6vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce9ff;background:#0f2846;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.06fr .94fr;gap:12px}
    .card{background:linear-gradient(165deg,#1a3558,#132640);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1d35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#6e94f3);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0f2038;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#19385e;color:#d2e3ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🤝 CS 인력 투자 ROI 계산기</h1>
        <div class="sub">CS 인력 확충으로 기대되는 churn 개선·확장매출 효과를 비용과 함께 비교해 손익분기를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="mrr">현재 MRR (KRW)</label><input id="mrr" type="number" min="1" value="640000000" /></div>
          <div><label for="currentChurn">현재 월 Logo Churn (%)</label><input id="currentChurn" type="number" min="0" max="30" step="0.01" value="2.8" /></div>
          <div><label for="targetChurn">목표 월 Logo Churn (%)</label><input id="targetChurn" type="number" min="0" max="30" step="0.01" value="2.0" /></div>
          <div><label for="expansionLift">월 Expansion 기여율 (%)</label><input id="expansionLift" type="number" min="0" max="30" step="0.01" value="1.3" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="1" max="95" step="0.1" value="82" /></div>
          <div><label for="csmCount">추가 CSM 인원 (명)</label><input id="csmCount" type="number" min="1" step="1" value="3" /></div>
          <div><label for="costPerCsm">CSM 1인당 연 인건비 (KRW)</label><input id="costPerCsm" type="number" min="1" value="98000000" /></div>
          <div><label for="toolCost">CS 툴 월 비용 (KRW)</label><input id="toolCost" type="number" min="0" value="2400000" /></div>
          <div><label for="onboardingCost">온보딩/프로세스 초기비 (KRW)</label><input id="onboardingCost" type="number" min="0" value="15000000" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">연간 투자비</div><div id="programCost" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 총 기여이익</div><div id="grossGain" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v sm">-</div></div>
          <div class="kpi"><div class="k">연 순효과</div><div id="annualNet" class="v sm">-</div></div>
          <div class="kpi"><div class="k">연 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>Churn 개선 기여 매출</th><td id="churnRecoveryRev">-</td></tr>
            <tr><th>Expansion 기여 매출</th><td id="expansionRev">-</td></tr>
            <tr><th>손익분기 목표 churn</th><td id="breakEvenChurn">-</td></tr>
            <tr><th>손익분기 필요 expansion</th><td id="breakEvenExpansion">-</td></tr>
            <tr><th>현 목표 churn 달성 난이도</th><td id="deltaChurn">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      mrr:$("mrr"), currentChurn:$("currentChurn"), targetChurn:$("targetChurn"), expansionLift:$("expansionLift"), margin:$("margin"),
      csmCount:$("csmCount"), costPerCsm:$("costPerCsm"), toolCost:$("toolCost"), onboardingCost:$("onboardingCost"),
      programCost:$("programCost"), grossGain:$("grossGain"), monthlyNet:$("monthlyNet"), annualNet:$("annualNet"), roi:$("roi"), payback:$("payback"),
      churnRecoveryRev:$("churnRecoveryRev"), expansionRev:$("expansionRev"), breakEvenChurn:$("breakEvenChurn"), breakEvenExpansion:$("breakEvenExpansion"), deltaChurn:$("deltaChurn"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = {
      mrr:640000000, currentChurn:2.8, targetChurn:2.0, expansionLift:1.3, margin:82,
      csmCount:3, costPerCsm:98000000, toolCost:2400000, onboardingCost:15000000
    };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function retainedRevenue(mrr, churnPct){
      const c = churnPct / 100;
      if (c <= 0) return mrr * 12;
      return mrr * ((1 - Math.pow(1 - c, 12)) / c);
    }

    function validate(v){
      if (!Number.isFinite(v.mrr) || v.mrr <= 0) return "현재 MRR은 0보다 커야 합니다.";
      if (!Number.isFinite(v.currentChurn) || v.currentChurn < 0 || v.currentChurn > 30) return "현재 월 churn은 0~30% 범위여야 합니다.";
      if (!Number.isFinite(v.targetChurn) || v.targetChurn < 0 || v.targetChurn > 30) return "목표 월 churn은 0~30% 범위여야 합니다.";
      if (v.targetChurn > v.currentChurn) return "목표 churn은 현재 churn 이하로 입력하세요.";
      if (!Number.isFinite(v.expansionLift) || v.expansionLift < 0 || v.expansionLift > 30) return "월 Expansion 기여율은 0~30% 범위여야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 95) return "매출총이익률은 0~95% 범위여야 합니다.";
      if (!Number.isFinite(v.csmCount) || v.csmCount < 1 || !Number.isInteger(v.csmCount)) return "추가 CSM 인원은 1 이상의 정수여야 합니다.";
      if (!Number.isFinite(v.costPerCsm) || v.costPerCsm <= 0) return "CSM 연 인건비는 0보다 커야 합니다.";
      if (!Number.isFinite(v.toolCost) || v.toolCost < 0) return "CS 툴 월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.onboardingCost) || v.onboardingCost < 0) return "초기비는 0 이상이어야 합니다.";
      return "";
    }

    function findBreakEvenChurn(v, currentRetained, expansionRev, annualProgramCost){
      const marginFactor = v.margin / 100;
      const gainAt = (churn)=>((retainedRevenue(v.mrr, churn) - currentRetained + expansionRev) * marginFactor) - annualProgramCost;

      if (gainAt(v.currentChurn) >= 0) return v.currentChurn;
      if (gainAt(0) < 0) return Infinity;

      let lo = 0;
      let hi = v.currentChurn;
      for (let i = 0; i < 40; i++) {
        const mid = (lo + hi) / 2;
        if (gainAt(mid) >= 0) hi = mid;
        else lo = mid;
      }
      return hi;
    }

    function compute(v){
      const marginFactor = v.margin / 100;
      const currentRetained = retainedRevenue(v.mrr, v.currentChurn);
      const scenarioRetained = retainedRevenue(v.mrr, v.targetChurn);

      const churnRecoveryRev = scenarioRetained - currentRetained;
      const expansionRev = v.mrr * (v.expansionLift / 100) * 12;
      const grossGain = (churnRecoveryRev + expansionRev) * marginFactor;

      const annualProgramCost = v.csmCount * v.costPerCsm + v.toolCost * 12 + v.onboardingCost;
      const annualNet = grossGain - annualProgramCost;
      const monthlyNet = annualNet / 12;

      const roi = annualProgramCost === 0 ? (annualNet >= 0 ? Infinity : -Infinity) : (annualNet / annualProgramCost) * 100;
      const payback = annualNet > 0 ? annualProgramCost / (annualNet / 12) : Infinity;

      const requiredExpansion = Math.max(0, ((annualProgramCost / marginFactor - churnRecoveryRev) / (v.mrr * 12)) * 100);
      const breakEvenChurn = findBreakEvenChurn(v, currentRetained, expansionRev, annualProgramCost);
      const deltaChurn = v.currentChurn - v.targetChurn;

      return {
        annualProgramCost, grossGain, monthlyNet, annualNet, roi, payback,
        churnRecoveryRev, expansionRev, requiredExpansion, breakEvenChurn, deltaChurn
      };
    }

    function resetOutputs(){
      ["programCost","grossGain","monthlyNet","annualNet","roi","payback","churnRecoveryRev","expansionRev","breakEvenChurn","breakEvenExpansion","deltaChurn"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        mrr:Number(refs.mrr.value), currentChurn:Number(refs.currentChurn.value), targetChurn:Number(refs.targetChurn.value), expansionLift:Number(refs.expansionLift.value),
        margin:Number(refs.margin.value), csmCount:Number(refs.csmCount.value), costPerCsm:Number(refs.costPerCsm.value),
        toolCost:Number(refs.toolCost.value), onboardingCost:Number(refs.onboardingCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.programCost.textContent = money(r.annualProgramCost);
      refs.grossGain.textContent = money(r.grossGain);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.annualNet.textContent = money(r.annualNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가";
      refs.churnRecoveryRev.textContent = money(r.churnRecoveryRev);
      refs.expansionRev.textContent = money(r.expansionRev);
      refs.breakEvenExpansion.textContent = Number.isFinite(r.requiredExpansion) ? `${num(r.requiredExpansion,2)}%` : "계산 불가";
      refs.breakEvenChurn.textContent = Number.isFinite(r.breakEvenChurn) ? `${num(r.breakEvenChurn,2)}%` : "현 조건에서 불가";
      refs.deltaChurn.textContent = `${num(r.deltaChurn,2)}%p 개선 목표`;

      refs.status.innerHTML = r.annualNet >= 0
        ? `<span class="ok">●</span> 연간 ${money(r.annualNet)} 순효과`
        : `<span class="warn">●</span> 연간 ${money(Math.abs(r.annualNet))} 순손실`;

      refs.summary.value = [
        "[Customer Success Headcount ROI 요약]",
        `연간 투자비: ${money(r.annualProgramCost)}`,
        `Churn 개선 기여 매출: ${money(r.churnRecoveryRev)}`,
        `Expansion 기여 매출: ${money(r.expansionRev)}`,
        `연간 총 기여이익: ${money(r.grossGain)}`,
        `연 순효과: ${money(r.annualNet)}`,
        `연 ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가"}`,
        `손익분기 목표 churn: ${Number.isFinite(r.breakEvenChurn) ? `${num(r.breakEvenChurn,2)}%` : "현 조건에서 불가"}`,
        `손익분기 필요 expansion: ${Number.isFinite(r.requiredExpansion) ? `${num(r.requiredExpansion,2)}%` : "계산 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.mrr,refs.currentChurn,refs.targetChurn,refs.expansionLift,refs.margin,refs.csmCount,refs.costPerCsm,refs.toolCost,refs.onboardingCost].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
