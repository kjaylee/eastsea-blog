<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Support AI ROI Calculator | 고객지원 AI ROI 계산기</title>
  <meta name="description" content="고객지원에 AI를 도입했을 때 월 비용 절감, 순효익, ROI, 회수기간, 손익분기 AI 처리비율을 계산하는 ROI 도구" />
  <style>
    :root{--bg:#071022;--card:#101f3d;--line:#2a436f;--txt:#eef4ff;--muted:#a8bcde;--pri:#6f92ff;--ok:#34d399;--warn:#fbbf24;--bad:#fca5a5}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:var(--txt);background:radial-gradient(circle at 0% 0,#223f78 0,#071022 48%)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 60px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.25rem,3vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .portal{white-space:nowrap;text-decoration:none;color:#dbe7ff;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#101a32}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px}
    .card{background:linear-gradient(160deg,#172a50,#101d38);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1831;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5c78ea);font-weight:700}
    .soft{background:#172850;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:104px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f2b3a;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0f1934;border-radius:11px;padding:10px}
    .k{font-size:.75rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:#132246;color:#bed0f1;font-size:.76rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .ok{color:var(--ok)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🤖 고객지원 AI ROI 계산기</h1>
        <div class="sub">AI 응답 자동화 도입 시 티켓 처리비용 절감과 추가 유지/매출 효과를 반영해 ROI와 손익분기 AI 처리비율을 계산합니다.</div>
      </div>
      <a class="portal" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="monthlyTickets">월 티켓 수</label><input id="monthlyTickets" type="number" min="1" value="9000" /></div>
          <div><label for="humanCost">사람 처리 단가/티켓 (KRW)</label><input id="humanCost" type="number" min="1" value="12000" /></div>
          <div><label for="aiCost">AI 처리 단가/티켓 (KRW)</label><input id="aiCost" type="number" min="0" value="1800" /></div>
          <div><label for="aiRate">AI 처리비율 (%)</label><input id="aiRate" type="number" min="0" max="100" step="0.1" value="42" /></div>
          <div><label for="platformCost">월 플랫폼 비용 (KRW)</label><input id="platformCost" type="number" min="0" value="15000000" /></div>
          <div><label for="setupCost">초기 구축비 (KRW)</label><input id="setupCost" type="number" min="0" value="28000000" /></div>
          <div><label for="retentionBenefit">월 추가 매출/유지효과 (KRW)</label><input id="retentionBenefit" type="number" min="0" value="6000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 지표</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">현재 월 지원비</div><div id="currentCost" class="v">-</div></div>
          <div class="kpi"><div class="k">AI 적용 후 월 지원비</div><div id="afterCost" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효익</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 순효익</div><div id="annualNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI (1년)</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 AI 처리비율</div><div id="breakevenRate" class="v sm">-</div></div>
          <div class="kpi"><div class="k">AI 처리 티켓 수(월)</div><div id="aiTickets" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">성과 해석 대기</div>

        <h2 style="margin-top:12px">계산 근거</h2>
        <table>
          <tbody>
            <tr><th>사람 처리 티켓(월)</th><td id="humanTickets">-</td></tr>
            <tr><th>AI 처리비(월)</th><td id="aiVariableCost">-</td></tr>
            <tr><th>기준 절감액(월)</th><td id="baseSavings">-</td></tr>
            <tr><th>ROI 분모(초기+연운영+AI변동)</th><td id="roiBase">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      monthlyTickets: $("monthlyTickets"), humanCost: $("humanCost"), aiCost: $("aiCost"), aiRate: $("aiRate"),
      platformCost: $("platformCost"), setupCost: $("setupCost"), retentionBenefit: $("retentionBenefit"),
      currentCost: $("currentCost"), afterCost: $("afterCost"), monthlyNet: $("monthlyNet"), annualNet: $("annualNet"), roi: $("roi"), payback: $("payback"), breakevenRate: $("breakevenRate"), aiTickets: $("aiTickets"),
      humanTickets: $("humanTickets"), aiVariableCost: $("aiVariableCost"), baseSavings: $("baseSavings"), roiBase: $("roiBase"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = {
      monthlyTickets: 9000, humanCost: 12000, aiCost: 1800, aiRate: 42,
      platformCost: 15000000, setupCost: 28000000, retentionBenefit: 6000000
    };

    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v) {
      if (!Number.isFinite(v.monthlyTickets) || v.monthlyTickets <= 0) return "월 티켓 수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.humanCost) || v.humanCost <= 0) return "사람 처리 단가는 0보다 커야 합니다.";
      if (!Number.isFinite(v.aiCost) || v.aiCost < 0) return "AI 처리 단가는 0 이상이어야 합니다.";
      if (v.aiCost >= v.humanCost) return "AI 처리 단가는 사람 처리 단가보다 작아야 절감 모델이 성립합니다.";
      if (!Number.isFinite(v.aiRate) || v.aiRate < 0 || v.aiRate > 100) return "AI 처리비율은 0~100 범위여야 합니다.";
      if (!Number.isFinite(v.platformCost) || v.platformCost < 0) return "월 플랫폼 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "초기 구축비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.retentionBenefit) || v.retentionBenefit < 0) return "월 추가 매출/유지효과는 0 이상이어야 합니다.";
      return "";
    }

    function compute(v) {
      const aiRatio = v.aiRate / 100;
      const aiTickets = v.monthlyTickets * aiRatio;
      const humanTickets = v.monthlyTickets - aiTickets;

      const currentCost = v.monthlyTickets * v.humanCost;
      const aiVariableCost = aiTickets * v.aiCost;
      const humanVariableCost = humanTickets * v.humanCost;
      const afterCost = aiVariableCost + humanVariableCost + v.platformCost;

      const baseSavings = currentCost - afterCost;
      const monthlyNet = baseSavings + v.retentionBenefit;
      const annualNet = (monthlyNet * 12) - v.setupCost;

      const roiBase = v.setupCost + (v.platformCost * 12) + (aiVariableCost * 12);
      const roi = roiBase === 0 ? Infinity : (annualNet / roiBase) * 100;

      const paybackMonths = monthlyNet > 0 ? (v.setupCost / monthlyNet) : null;

      const diff = v.humanCost - v.aiCost;
      let breakevenRate = null;
      if (diff > 0) {
        breakevenRate = ((v.platformCost - v.retentionBenefit) / (v.monthlyTickets * diff)) * 100;
      }

      return {
        aiTickets,
        humanTickets,
        currentCost,
        afterCost,
        aiVariableCost,
        baseSavings,
        monthlyNet,
        annualNet,
        roiBase,
        roi,
        paybackMonths,
        breakevenRate
      };
    }

    function clearOutputs() {
      ["currentCost", "afterCost", "monthlyNet", "annualNet", "roi", "payback", "breakevenRate", "aiTickets", "humanTickets", "aiVariableCost", "baseSavings", "roiBase"].forEach((k) => refs[k].textContent = "-");
      refs.summary.value = "";
      refs.status.textContent = "입력값을 확인하세요";
    }

    function render() {
      const v = {
        monthlyTickets: Number(refs.monthlyTickets.value),
        humanCost: Number(refs.humanCost.value),
        aiCost: Number(refs.aiCost.value),
        aiRate: Number(refs.aiRate.value),
        platformCost: Number(refs.platformCost.value),
        setupCost: Number(refs.setupCost.value),
        retentionBenefit: Number(refs.retentionBenefit.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err) {
        clearOutputs();
        return;
      }

      const r = compute(v);
      refs.currentCost.textContent = money(r.currentCost);
      refs.afterCost.textContent = money(r.afterCost);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.annualNet.textContent = money(r.annualNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : "∞";
      refs.payback.textContent = r.paybackMonths === null ? "회수 불가" : `${num(r.paybackMonths,1)}개월`;

      if (r.breakevenRate === null) {
        refs.breakevenRate.textContent = "N/A";
      } else if (r.breakevenRate <= 0) {
        refs.breakevenRate.textContent = "0.00%";
      } else if (r.breakevenRate > 100) {
        refs.breakevenRate.textContent = ">100%";
      } else {
        refs.breakevenRate.textContent = `${num(r.breakevenRate,2)}%`;
      }

      refs.aiTickets.textContent = `${num(r.aiTickets,0)}건`;
      refs.humanTickets.textContent = `${num(r.humanTickets,0)}건`;
      refs.aiVariableCost.textContent = money(r.aiVariableCost);
      refs.baseSavings.textContent = money(r.baseSavings);
      refs.roiBase.textContent = money(r.roiBase);

      if (r.roi >= 30) {
        refs.status.innerHTML = `<span class="ok">●</span> ROI ${num(r.roi,1)}% (도입 우선순위 높음)`;
      } else if (r.roi >= 0) {
        refs.status.innerHTML = `<span class="warn">●</span> ROI ${num(r.roi,1)}% (운영조건 최적화 필요)`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> ROI ${num(r.roi,1)}% (재검토 필요)`;
      }

      refs.summary.value = [
        "[Customer Support AI ROI 요약]",
        `현재 월 지원비: ${money(r.currentCost)}`,
        `AI 적용 후 월 지원비: ${money(r.afterCost)}`,
        `월 순효익: ${money(r.monthlyNet)}`,
        `연 순효익(초기비 반영): ${money(r.annualNet)}`,
        `ROI(1년): ${Number.isFinite(r.roi) ? num(r.roi,1) + '%' : '∞'}`,
        `회수기간: ${r.paybackMonths === null ? '회수 불가' : num(r.paybackMonths,1) + '개월'}`,
        `손익분기 AI 처리비율: ${r.breakevenRate === null ? 'N/A' : (r.breakevenRate <= 0 ? '0.00%' : (r.breakevenRate > 100 ? '>100%' : num(r.breakevenRate,2) + '%'))}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert("요약이 복사되었습니다.");
      } catch {
        alert("복사 권한이 없어 수동 복사가 필요합니다.");
      }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.monthlyTickets, refs.humanCost, refs.aiCost, refs.aiRate, refs.platformCost, refs.setupCost, refs.retentionBenefit]
      .forEach((el) => {
        el.addEventListener("input", render);
        el.addEventListener("change", render);
      });

    render();
  </script>
</body>
</html>
