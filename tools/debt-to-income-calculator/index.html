<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부채비율(DTI) 계산기 | Debt-to-Income Calculator</title>
  <meta name="description" content="월 소득 대비 부채 상환 비율(DTI)을 계산하고 추가 대출 시 부담 변화를 확인하세요. 목표 DTI 기준 여유/초과 금액까지 즉시 계산합니다." />
  <meta name="keywords" content="DTI 계산기, 부채비율, Debt-to-Income, 대출 상환, 금융 계산기" />
  <meta property="og:title" content="부채비율(DTI) 계산기" />
  <meta property="og:description" content="현재 DTI와 추가 대출 반영 DTI를 한 번에 계산하세요." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://eastsea.monster/tools/debt-to-income-calculator/" />
  <meta name="twitter:card" content="summary" />
  <style>
    :root{--bg:#f8fafc;--card:#ffffff;--text:#0f172a;--muted:#475569;--line:#e2e8f0;--primary:#2563eb;--primary2:#1d4ed8;--ok:#15803d;--warn:#b45309;--danger:#b91c1c;--radius:14px}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
    .wrap{max-width:860px;margin:0 auto;padding:20px 14px 40px}
    h1{margin:10px 0 6px;font-size:clamp(1.4rem,2.8vw,2rem)}
    .sub{margin:0 0 18px;color:var(--muted);font-size:.95rem}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field label{display:block;font-size:.9rem;font-weight:600;margin-bottom:6px}
    .field input{width:100%;padding:11px 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:1rem;background:#fff;color:var(--text)}
    .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    .btn{margin-top:12px;width:100%;border:0;background:var(--primary);color:#fff;padding:12px 14px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
    .btn:hover{background:var(--primary2)}
    .result{display:none;margin-top:14px}
    .rows{display:grid;gap:8px}
    .row{display:flex;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
    .k{color:var(--muted)}
    .v{font-weight:700;text-align:right}
    .badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:.84rem;font-weight:700}
    .badge.ok{background:#dcfce7;color:var(--ok)}
    .badge.mid{background:#fef9c3;color:#854d0e}
    .badge.warn{background:#ffedd5;color:var(--warn)}
    .badge.danger{background:#fee2e2;color:var(--danger)}
    .tips{margin:10px 0 0;padding-left:18px;color:var(--muted);font-size:.92rem}
    .formula{margin-top:12px;font-size:.88rem;color:#334155;background:#f1f5f9;padding:10px;border-radius:10px}
    .foot{margin-top:14px;color:#64748b;font-size:.83rem}
    @media (max-width:700px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>📊 부채비율(DTI) 계산기</h1>
    <p class="sub">월 소득 대비 부채 상환 부담을 계산하고, 추가 대출 반영 시 DTI 변화를 확인하세요.</p>

    <section class="card" aria-label="DTI 입력 폼">
      <div class="grid">
        <div class="field">
          <label for="monthlyIncome">월 총소득 (원)</label>
          <input id="monthlyIncome" type="number" min="1" step="10000" value="5000000" />
        </div>
        <div class="field">
          <label for="monthlyDebt">현재 월 부채상환액 (원)</label>
          <input id="monthlyDebt" type="number" min="0" step="10000" value="1250000" />
        </div>
        <div class="field">
          <label for="newDebt">추가 월 상환액 (원)</label>
          <input id="newDebt" type="number" min="0" step="10000" value="300000" />
        </div>
        <div class="field">
          <label for="targetRatio">목표 DTI (%)</label>
          <input id="targetRatio" type="number" min="1" max="100" step="1" value="36" />
        </div>
      </div>
      <button id="calculateBtn" class="btn" type="button">계산하기</button>

      <div id="result" class="result" aria-live="polite">
        <div class="rows">
          <div class="row"><span class="k">현재 DTI</span><span class="v" id="currentDti">-</span></div>
          <div class="row"><span class="k">추가 반영 DTI</span><span class="v" id="projectedDti">-</span></div>
          <div class="row"><span class="k">위험도</span><span class="v" id="riskLevel">-</span></div>
          <div class="row"><span class="k">목표 기준 최대 월 상환액</span><span class="v" id="maxDebt">-</span></div>
          <div class="row"><span class="k">목표 대비 여유/초과</span><span class="v" id="margin">-</span></div>
        </div>
        <ul id="tips" class="tips"></ul>
      </div>

      <p class="formula">
        현재 DTI(%) = 월 부채상환액 ÷ 월 총소득 × 100<br>
        예상 DTI(%) = (현재 상환액 + 추가 상환액) ÷ 월 총소득 × 100
      </p>
      <p class="foot">※ 본 계산기는 참고용입니다. 실제 대출 심사/한도/금리는 금융기관 정책에 따라 달라질 수 있습니다.</p>
    </section>
  </main>

  <script>
    const fmtKRW = (n) => Math.round(n).toLocaleString('ko-KR') + '원';
    const fmtPct = (n) => n.toFixed(1) + '%';

    function classifyRisk(ratio) {
      if (ratio <= 20) return { cls: 'ok', text: '안정', tips: ['상환 여력을 유지하며 비상금(3~6개월)을 우선 확보하세요.', '변동금리 대출은 금리상승 시나리오를 주기적으로 점검하세요.'] };
      if (ratio <= 35) return { cls: 'mid', text: '관리 가능', tips: ['추가 대출 전 원리금 증가분을 월 예산에 반영해 보세요.', '고금리 부채부터 우선 상환하면 DTI 개선 속도가 빨라집니다.'] };
      if (ratio <= 43) return { cls: 'warn', text: '주의', tips: ['추가 상환액이 필요한 지출인지 재검토하세요.', '상환 기간 조정/대환 가능성 등 구조 개선안을 먼저 비교하세요.'] };
      return { cls: 'danger', text: '위험', tips: ['신규 대출은 신중히 검토하고, 총상환부담 완화가 우선입니다.', '필수지출을 제외한 고정비를 축소해 현금흐름을 안정화하세요.'] };
    }

    function readNum(id) {
      const v = Number(document.getElementById(id).value);
      return Number.isFinite(v) ? v : 0;
    }

    function setTips(items) {
      const ul = document.getElementById('tips');
      ul.innerHTML = '';
      items.forEach(t => {
        const li = document.createElement('li');
        li.textContent = t;
        ul.appendChild(li);
      });
    }

    function calculate() {
      const income = readNum('monthlyIncome');
      const debt = readNum('monthlyDebt');
      const newDebt = readNum('newDebt');
      const target = readNum('targetRatio');

      if (income <= 0) {
        alert('월 총소득은 0보다 커야 합니다.');
        return;
      }
      if (debt < 0 || newDebt < 0 || target <= 0) {
        alert('입력값을 확인해 주세요.');
        return;
      }

      const currentRatio = (debt / income) * 100;
      const projectedDebt = debt + newDebt;
      const projectedRatio = (projectedDebt / income) * 100;
      const maxDebt = income * (target / 100);
      const margin = maxDebt - projectedDebt;
      const risk = classifyRisk(projectedRatio);

      document.getElementById('currentDti').textContent = fmtPct(currentRatio);
      document.getElementById('projectedDti').textContent = fmtPct(projectedRatio);
      document.getElementById('riskLevel').innerHTML = `<span class="badge ${risk.cls}">${risk.text}</span>`;
      document.getElementById('maxDebt').textContent = fmtKRW(maxDebt);
      document.getElementById('margin').textContent = (margin >= 0 ? '여유 ' : '초과 ') + fmtKRW(Math.abs(margin));
      setTips(risk.tips);

      document.getElementById('result').style.display = 'block';
    }

    document.getElementById('calculateBtn').addEventListener('click', calculate);
  </script>
</body>
</html>
