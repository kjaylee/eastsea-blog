  <style>
    :root {
      --bg1: #1f4dd5;
      --bg2: #704be4;
      --bg3: #0f1d52;
      --card: rgba(255,255,255,0.14);
      --line: rgba(255,255,255,0.27);
      --text: #fff;
      --muted: rgba(255,255,255,0.86);
      --radius: 22px;
      --shadow: 0 18px 42px rgba(9, 18, 62, 0.38);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(980px 760px at -12% -20%, rgba(255,255,255,0.2), transparent 55%),
        radial-gradient(900px 680px at 118% 8%, rgba(255,255,255,0.14), transparent 58%),
        linear-gradient(155deg, var(--bg1), var(--bg2) 46%, var(--bg3));
      padding: calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 20px);
      line-height: 1.55;
    }

    .shell { max-width: 760px; margin: 0 auto; }

    .top-progress {
      display: none;
      position: sticky;
      top: calc(env(safe-area-inset-top) + 8px);
      z-index: 20;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 9px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(14, 22, 70, 0.44);
      backdrop-filter: blur(8px);
    }
    .top-progress.show { display: flex; }
    .progress-track { flex: 1; height: 7px; border-radius: 999px; background: rgba(255,255,255,0.22); overflow: hidden; }
    .progress-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #ffe18a, #9be2ff);
      transition: width .24s ease;
    }
    .progress-text { min-width: 60px; text-align: right; font-size: .84rem; color: var(--muted); font-weight: 800; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(9px);
      overflow: hidden;
      animation: fadeUp .28s ease;
    }
    .card-inner { padding: 22px; }

    h1 { margin: 0; line-height: 1.22; font-size: clamp(1.52rem, 5.4vw, 2.05rem); }
    .subtitle { margin: 10px 0 0; color: var(--muted); font-size: .97rem; line-height: 1.58; }

    .hero-badges { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .81rem;
      font-weight: 700;
    }

    .primary-btn,
    .secondary-btn,
    .choice-btn,
    .share-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 800;
      transition: transform .14s ease, filter .14s ease;
    }
    .primary-btn:active,
    .secondary-btn:active,
    .choice-btn:active,
    .share-btn:active { transform: translateY(1px) scale(.99); }

    .primary-btn {
      margin-top: 20px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #ffe38a, #97ddff);
      color: #13365e;
      font-size: 1rem;
      box-shadow: 0 10px 24px rgba(141, 214, 255, 0.35);
    }
    .secondary-btn {
      margin-top: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid var(--line);
    }

    .question-title { margin: 0 0 10px; font-size: 1.2rem; line-height: 1.43; }
    .question-hint { margin: 0 0 12px; font-size: .9rem; color: var(--muted); }
    .choices { display: grid; gap: 10px; }
    .choice-btn {
      padding: 14px;
      text-align: left;
      color: #fff;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.32);
      font-size: .95rem;
      line-height: 1.45;
      min-height: 54px;
      touch-action: manipulation;
    }
    .choice-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.58); }

    .analyzing-wrap { text-align: center; padding: 8px 0; }
    .spinner {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,0.22);
      border-top-color: #fff;
      margin: 8px auto 14px;
      animation: spin 1s linear infinite;
    }
    .mini-track { height: 8px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.2); margin-top: 12px; }
    .mini-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #ffe38a, #8fd8ff);
      transition: width .2s ease;
    }
    .mini-text { margin-top: 7px; color: var(--muted); font-size: .9rem; font-weight: 700; }

    .result-head {
      border: 1px solid rgba(255,255,255,0.34);
      background: rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .result-type { font-size: clamp(1.16rem, 4.6vw, 1.5rem); margin: 6px 0 4px; }
    .result-summary { margin: 0; color: var(--muted); }

    .section-title { margin: 16px 0 10px; font-size: 1rem; letter-spacing: .01em; }
    .detail-text {
      margin: 0;
      white-space: pre-line;
      line-height: 1.64;
      color: rgba(255,255,255,0.95);
      font-size: .96rem;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .chip {
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.1);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 700;
    }

    .tips-list {
      margin: 10px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
      color: rgba(255,255,255,0.95);
      font-size: .95rem;
    }

    .chart-wrap {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      padding: 10px;
    }
    .chart-wrap canvas {
      width: 100%;
      height: 280px;
      display: block;
    }

    .share-grid {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0,1fr));
    }
    .share-btn {
      padding: 11px 10px;
      font-size: .9rem;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(4px);
    }

    .saved-note {
      margin-top: 12px;
      border: 1px dashed rgba(255,255,255,0.42);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: .88rem;
      color: rgba(255,255,255,0.94);
      background: rgba(255,255,255,0.08);
    }

    .promo-wrap {
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.08);
    }
    .promo-list { display: grid; gap: 8px; }
    .promo-link {
      text-decoration: none;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 11px;
      padding: 9px 11px;
      background: rgba(255,255,255,0.08);
      font-size: .9rem;
    }

    .disclaimer {
      margin-top: 15px;
      font-size: .82rem;
      color: rgba(255,255,255,0.78);
      line-height: 1.58;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 16px);
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.68);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: .84rem;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 50;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      .card-inner { padding: 18px; }
      .share-grid { grid-template-columns: 1fr; }
      .chart-wrap canvas { height: 320px; }
    }
  </style>
<script src="/assets/analytics.js"></script>
</head>

    const TYPE_ORDER = ['clearStrategist', 'recoveryDesigner', 'overloadedJuggler', 'drainedReactor'];

    const PROMOS = [

    const state = {
      phase: 'intro',
      current: 0,
      scores: freshScores(),
      answers: [],
      result: null,
      analyzingPct: 0,
      savedRaw: loadSavedRaw()
    };

    let analyzingTimer = null;
    const app = document.getElementById('app');
    const topProgress = document.getElementById('topProgress');
    const topProgressFill = document.getElementById('topProgressFill');
    const topProgressText = document.getElementById('topProgressText');

    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    try { if (tg && tg.ready) tg.ready(); if (tg && tg.expand) tg.expand(); } catch (_) {}

    function freshScores() {
      return METRICS.reduce(function (acc, key) {
        acc[key] = 0;
        return acc;
      }, {});
    }

    function haptic(kind) {
      try {
        if (!tg || !tg.HapticFeedback) return;
        if (kind === 'selection') tg.HapticFeedback.selectionChanged();
        else tg.HapticFeedback.impactOccurred('light');
      } catch (_) {}
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(function () {
        toast.classList.remove('show');
      }, 1500);
    }

    function updateTopProgress() {
      const show = state.phase === 'question';
      topProgress.classList.toggle('show', show);
      if (!show) return;
      const done = state.current + 1;
      const pct = Math.round((done / QUESTIONS.length) * 100);
      topProgressFill.style.width = pct + '%';
      topProgressText.textContent = done + '/' + QUESTIONS.length;
    }

    function formatSavedTime(iso) {
      try {
        return new Date(iso).toLocaleString('ko-KR', {
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch (_) {
        return iso || '';
      }
    }

    function loadSavedRaw() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !parsed.type) return null;
        return parsed;
      } catch (_) {
        return null;
      }
    }

    function saveResult(result) {
      const payload = {
        type: result.type,
        fatigueIndex: result.fatigueIndex,
        traits: result.traits,
        savedAt: result.savedAt
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      state.savedRaw = payload;
    }

    function startQuiz() {
      haptic('impact');
      clearInterval(analyzingTimer);
      state.phase = 'question';
      state.current = 0;
      state.scores = freshScores();
      state.answers = [];
      state.result = null;
      state.analyzingPct = 0;
      render();
    }

    function pickAnswer(index) {
      if (state.phase !== 'question') return;
      const item = QUESTIONS[state.current];
      if (!item || !item.options[index]) return;
      haptic('selection');

      const option = item.options[index];
      state.answers.push({ qIndex: state.current, optionIndex: index });

      METRICS.forEach(function (axis) {
        state.scores[axis] += Number(option.score[axis] || 0);
      });

      if (state.current >= QUESTIONS.length - 1) {
        goAnalyze();
      } else {
        state.current += 1;
        render();
      }
    }

    function goAnalyze() {
      state.phase = 'analyzing';
      state.analyzingPct = 10;
      render();

      const started = Date.now();
      clearInterval(analyzingTimer);
      analyzingTimer = setInterval(function () {
        const elapsed = Date.now() - started;
        state.analyzingPct = Math.min(100, 10 + Math.round(elapsed / 14));

        const fill = document.getElementById('miniFill');
        const txt = document.getElementById('miniText');
        if (fill) fill.style.width = state.analyzingPct + '%';
        if (txt) txt.textContent = state.analyzingPct + '%';

        if (elapsed > 1500) {
          clearInterval(analyzingTimer);
          finalizeResult();
        }
      }, 40);
    }

    function normalizeAxis(value, max) {
      if (!max) return 0;
      return Math.max(0, Math.min(100, Math.round((value / max) * 100)));
    }

    function classifyType(fatigueIndex) {
      if (fatigueIndex <= 32) return 'clearStrategist';
      if (fatigueIndex <= 52) return 'recoveryDesigner';
      if (fatigueIndex <= 72) return 'overloadedJuggler';
      return 'drainedReactor';
    }

    function finalizeResult() {
      const maxNormal = QUESTIONS.length * 4;
      const maxRecovery = QUESTIONS.length * 4;

      const energy = normalizeAxis(state.scores.energyDrain, maxNormal);
      const clarity = normalizeAxis(state.scores.clarityDrop, maxNormal);
      const impulse = normalizeAxis(state.scores.impulseRisk, maxNormal);
      const recovery = normalizeAxis(state.scores.recoveryHabit, maxRecovery);

      const fatigueIndex = Math.round(
        energy * 0.34 +
        clarity * 0.28 +
        impulse * 0.23 +
        (100 - recovery) * 0.15
      );

      const type = classifyType(fatigueIndex);
      const traits = {
        reserve: Math.max(0, 100 - energy),
        clarity: Math.max(0, 100 - clarity),
        control: Math.max(0, 100 - impulse),
        recovery: recovery
      };

      const result = {
        type: type,
        fatigueIndex: fatigueIndex,
        traits: traits,
        savedAt: new Date().toISOString()
      };

      state.result = result;
      state.phase = 'result';
      saveResult(result);
      render();
      setTimeout(drawChart, 30);
    }

    function serviceUrl() {
      return location.origin + '/tools/decision-fatigue-check/';
    }

    function shareMessage() {
      const typeName = (state.result && RESULTS[state.result.type] ? RESULTS[state.result.type].name : UI.title);
      return UI.shareText.replace('{type}', typeName);

    function shareKakao() {
      const url = serviceUrl();
      const text = shareMessage();
      const target = 'https://sharer.kakao.com/talk/friends/picker/link?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(text);
      window.open(target, '_blank', 'noopener');
      haptic('impact');

    function shareTwitter() {
      const url = serviceUrl();
      const text = shareMessage();
      const target = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url);
      window.open(target, '_blank', 'noopener');
      haptic('impact');
    }

    async function copyLink() {
      const url = serviceUrl();
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(url);
        } else {
          throw new Error('clipboard-unavailable');
        }
      } catch (_) {
        const input = document.createElement('input');
        input.value = url;
        input.setAttribute('readonly', 'readonly');
        input.style.position = 'absolute';
        input.style.left = '-9999px';
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
      }
      showToast(UI.copyDone);
      haptic('selection');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function drawChart() {
      const canvas = document.getElementById('resultChart');
      if (!canvas || !state.result) return;
      const rect = canvas.getBoundingClientRect();
      const ratio = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      const ctx = canvas.getContext('2d');
      if (!ctx) return;
      ctx.scale(ratio, ratio);

      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);

      const labels = ['정신 여유', '판단 선명도', '충동 통제', '회복 루틴'];
      const values = [
        state.result.traits.reserve,
        state.result.traits.clarity,
        state.result.traits.control,
        state.result.traits.recovery
      ];

      const left = 118;
      const right = w - 22;
      const top = 18;
      const rowGap = 58;
      const barH = 24;

      ctx.font = '700 14px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
      ctx.textBaseline = 'middle';

      values.forEach(function (v, idx) {
        const y = top + idx * rowGap;
        const width = Math.max(0, right - left);
        const fillW = Math.round(width * (v / 100));

        ctx.fillStyle = 'rgba(255,255,255,0.86)';
        ctx.fillText(labels[idx], 8, y + barH / 2);

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        roundRect(ctx, left, y, width, barH, 10);
        ctx.fill();

        const grad = ctx.createLinearGradient(left, y, left + width, y);
        grad.addColorStop(0, '#ffe28f');
        grad.addColorStop(1, '#8ed8ff');
        ctx.fillStyle = grad;
        roundRect(ctx, left, y, fillW, barH, 10);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.font = '800 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
        ctx.fillText(v + '점', Math.max(left + 8, left + fillW - 40), y + barH / 2);
        ctx.font = '700 14px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

      const saved = state.savedRaw && RESULTS[state.savedRaw.type]

      const optionsHtml = item.options.map(function (opt, idx) {
        return '<button class="choice-btn" data-idx="' + idx + '">' + escapeHtml(opt.text) + '</button>';

      app.innerHTML =
        '<section class="card"><div class="card-inner">' +
          '<h2 class="question-title">Q' + (state.current + 1) + '. ' + escapeHtml(item.q) + '</h2>' +
          '<p class="question-hint">' + UI.hint + '</p>' +
          '<div class="choices">' + optionsHtml + '</div>' +
        '</div></section>';

      Array.from(document.querySelectorAll('.choice-btn')).forEach(function (button) {
        button.addEventListener('click', function () {
          const idx = Number(button.getAttribute('data-idx'));
          pickAnswer(idx);
        });
      });
    }

    function renderAnalyzing() {
      app.innerHTML =
        '<section class="card"><div class="card-inner">' +
          '<div class="analyzing-wrap">' +
            '<div class="spinner" aria-hidden="true"></div>' +
            '<h2 class="question-title" style="text-align:center;">' + UI.analyzingTitle + '</h2>' +
            '<p class="question-hint" style="text-align:center;">' + UI.analyzingDesc + '</p>' +
            '<div class="mini-track"><div class="mini-fill" id="miniFill" style="width:' + state.analyzingPct + '%"></div></div>' +
            '<div class="mini-text" id="miniText">' + state.analyzingPct + '%</div>' +
          '</div>' +
        '</div></section>';
    }

    function renderResult() {
      if (!state.result || !RESULTS[state.result.type]) return;

      const info = RESULTS[state.result.type];
      const styleChips = info.style.map(function (item) {
        return '<span class="chip">' + escapeHtml(item) + '</span>';
      }).join('');
      const tips = info.tips.map(function (tip) {
        return '<li>' + escapeHtml(tip) + '</li>';
      }).join('');
      const promos = PROMOS.map(function (item) {
        return '<a class="promo-link" href="' + item.href + '">' + escapeHtml(item.title) + '</a>';
      }).join('');

      app.innerHTML =
        '<section class="card"><div class="card-inner">' +
          '<h2 class="question-title">' + UI.resultTitle + '</h2>' +
          '<div class="result-head">' +
            '<div style="font-size:1.95rem;">' + info.emoji + '</div>' +
            '<div class="result-type">' + escapeHtml(info.name) + '</div>' +
            '<p class="result-summary">' + escapeHtml(info.summary) + '</p>' +
            '<p class="question-hint" style="margin-top:8px;">피로 지수: <strong>' + state.result.fatigueIndex + '점</strong></p>' +
          '</div>' +

          '<h3 class="section-title">상세 해석</h3>' +
          '<p class="detail-text">' + escapeHtml(info.detail) + '</p>' +

          '<h3 class="section-title">' + UI.chartTitle + '</h3>' +
          '<div class="chart-wrap"><canvas id="resultChart" width="640" height="280"></canvas></div>' +

          '<h3 class="section-title">' + UI.styleTitle + '</h3>' +
          '<div class="chips">' + styleChips + '</div>' +

          '<h3 class="section-title">' + UI.tipsTitle + '</h3>' +
          '<ul class="tips-list">' + tips + '</ul>' +

          '<div class="share-grid">' +
            '<button class="share-btn" id="shareKakao">' + UI.shareKakao + '</button>' +
            '<button class="share-btn" id="shareTwitter">' + UI.shareTwitter + '</button>' +
            '<button class="share-btn" id="shareLink">' + UI.shareLink + '</button>' +
          '</div>' +

          '<button class="secondary-btn" id="restartBtn">' + UI.restart + '</button>' +

          '<div class="promo-wrap">' +
            '<h3 class="section-title" style="margin-top:0;">' + UI.promoTitle + '</h3>' +
            '<div class="promo-list">' + promos + '</div>' +
          '</div>' +

          '<p class="disclaimer">' + UI.disclaimer + '</p>' +
        '</div></section>';

      const shareKakaoBtn = document.getElementById('shareKakao');
      const shareTwitterBtn = document.getElementById('shareTwitter');
      const shareLinkBtn = document.getElementById('shareLink');
      const restartBtn = document.getElementById('restartBtn');

      if (shareKakaoBtn) shareKakaoBtn.addEventListener('click', shareKakao);
      if (shareTwitterBtn) shareTwitterBtn.addEventListener('click', shareTwitter);
      if (shareLinkBtn) shareLinkBtn.addEventListener('click', copyLink);
      if (restartBtn) restartBtn.addEventListener('click', function () {
        haptic('impact');
        state.phase = 'intro';
        state.current = 0;
        state.scores = freshScores();
        state.answers = [];
        state.result = null;
        state.analyzingPct = 0;
        render();
      });
    }

    function render() {
      updateTopProgress();

      if (state.phase === 'intro') return renderIntro();
      if (state.phase === 'question') return renderQuestion();
      if (state.phase === 'analyzing') return renderAnalyzing();
      if (state.phase === 'result') return renderResult();
      renderIntro();
    }

    render();
  </script>
</body>
</html>
