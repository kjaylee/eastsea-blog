<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="의사결정 저널 - 결정 전 가설과 확신도를 기록하고, 나중에 결과를 회고해 판단 정확도를 높이세요. 모든 데이터는 이 브라우저 localStorage에 저장됩니다. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>의사결정 저널 | Decision Journal</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #13132b;
      --panel-2: #1b1b3d;
      --line: #2d2d63;
      --text: #f4f7ff;
      --muted: #a8afd6;
      --neon: #00f5ff;
      --neon-2: #8b5cf6;
      --danger: #ff4d8d;
      --ok: #10d9a8;
      --warn: #ffca3a;
      --shadow: 0 0 0 1px rgba(0, 245, 255, 0.15), 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 10% -20%, rgba(139, 92, 246, 0.2), transparent 40%),
                  radial-gradient(circle at 100% 0%, rgba(0, 245, 255, 0.12), transparent 45%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .hero {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(0, 245, 255, 0.09), rgba(139, 92, 246, 0.08));
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      letter-spacing: 0.2px;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--neon);
      text-shadow: 0 0 10px rgba(0, 245, 255, 0.4);
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    label {
      font-size: 0.86rem;
      color: var(--muted);
    }

    input, textarea, select, button {
      font: inherit;
    }

    input, textarea, select {
      width: 100%;
      color: var(--text);
      background: rgba(9, 9, 24, 0.88);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    textarea { min-height: 84px; resize: vertical; }

    input:focus, textarea:focus, select:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0, 245, 255, 0.18);
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .range-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .confidence {
      color: var(--neon);
      font-weight: 700;
      min-width: 48px;
      text-align: right;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      color: #fff;
      background: #22224a;
      transition: transform .15s, box-shadow .2s, border-color .2s, opacity .2s;
    }

    button:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--neon), #35b8ff);
      color: #031018;
      font-weight: 700;
    }

    .btn-ghost { border-color: var(--line); }
    .btn-danger { background: rgba(255, 77, 141, 0.18); border-color: rgba(255, 77, 141, 0.45); }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      background: rgba(8, 8, 22, 0.8);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }

    .stat b {
      display: block;
      font-size: 1.2rem;
      margin-top: 5px;
      color: #fff;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      background: rgba(10, 10, 28, 0.82);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .card h3 {
      margin: 0;
      font-size: 1rem;
      word-break: keep-all;
    }

    .meta {
      color: var(--muted);
      font-size: 0.8rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.74rem;
      border: 1px solid;
      white-space: nowrap;
    }

    .need-review { color: var(--warn); border-color: rgba(255, 202, 58, 0.6); background: rgba(255, 202, 58, 0.12); }
    .done { color: var(--ok); border-color: rgba(16, 217, 168, 0.55); background: rgba(16, 217, 168, 0.1); }

    .block {
      border-left: 2px solid rgba(0, 245, 255, 0.35);
      background: rgba(255, 255, 255, 0.02);
      padding: 8px 10px;
      border-radius: 8px;
      color: #dbe2ff;
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(8, 8, 20, 0.6);
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr 1fr; }
      .controls input { grid-column: 1 / -1; }
    }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>의사결정 저널</h1>
      <p>결정 전 가설과 확신도를 기록하고, 나중에 결과를 회고해 판단 정확도를 높이세요. 모든 데이터는 이 브라우저 <b>localStorage</b>에 저장됩니다.</p>
    </section>

    <section class="grid">
      <form id="decisionForm" class="panel" autocomplete="off">
        <h2>새 결정 기록</h2>
        <div class="field">
          <label for="title">결정 제목</label>
          <input id="title" maxlength="80" placeholder="예: 3월 마케팅 채널을 유튜브 중심으로 전환" required />
        </div>

        <div class="row">
          <div class="field">
            <label for="category">카테고리</label>
            <select id="category">
              <option>사업</option>
              <option>개발</option>
              <option>건강</option>
              <option>학습</option>
              <option>금융</option>
              <option>개인</option>
            </select>
          </div>
          <div class="field">
            <label for="reviewDate">검토 날짜</label>
            <input id="reviewDate" type="date" />
          </div>
        </div>

        <div class="field">
          <label for="options">고려한 선택지</label>
          <textarea id="options" placeholder="A안/B안 비교, 포기한 옵션도 적어두세요."></textarea>
        </div>

        <div class="field">
          <label for="rationale">결정 이유 (핵심 근거)</label>
          <textarea id="rationale" placeholder="왜 이 결정을 내렸는지 핵심 근거를 작성하세요." required></textarea>
        </div>

        <div class="field">
          <label for="expected">예상 결과 / 리스크</label>
          <textarea id="expected" placeholder="기대 효과와 실패 가능성, 대안 계획"></textarea>
        </div>

        <div class="field">
          <label for="confidence">확신도</label>
          <div class="range-wrap">
            <input id="confidence" type="range" min="0" max="100" value="70" />
            <div id="confidenceValue" class="confidence">70%</div>
          </div>
        </div>

        <div class="actions">
          <button class="btn-primary" type="submit" id="submitBtn">저장하기</button>
          <button class="btn-ghost" type="button" id="resetBtn">입력 초기화</button>
          <button class="btn-ghost" type="button" id="exportBtn">JSON 내보내기</button>
          <button class="btn-ghost" type="button" id="importBtn">JSON 불러오기</button>
          <input id="importFile" type="file" accept="application/json" hidden />
        </div>
      </form>

      <aside class="panel">
        <h2>요약</h2>
        <div class="stats">
          <div class="stat"><small>총 기록</small><b id="statTotal">0</b></div>
          <div class="stat"><small>검토 필요</small><b id="statNeed">0</b></div>
          <div class="stat"><small>회고 완료</small><b id="statDone">0</b></div>
          <div class="stat"><small>평균 확신도</small><b id="statAvg">0%</b></div>
        </div>
        <p style="margin-top:12px;color:var(--muted);line-height:1.5;font-size:0.9rem;">팁: 검토 날짜가 지난 기록은 자동으로 <span style="color:var(--warn)">검토 필요</span>로 표시됩니다.</p>
      </aside>
    </section>

    <section class="panel">
      <div class="controls">
        <input id="search" placeholder="제목/근거/선택지 검색" />
        <select id="statusFilter">
          <option value="all">전체</option>
          <option value="need">검토 필요</option>
          <option value="done">회고 완료</option>
        </select>
        <button id="clearAllBtn" class="btn-danger" type="button">전체 삭제</button>
      </div>
      <div id="list" class="list" style="margin-top:12px;"></div>
    </section>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = "decision_journal_records_v1";
      const DRAFT_KEY = "decision_journal_draft_v1";

      const form = document.getElementById("decisionForm");
      const titleEl = document.getElementById("title");
      const categoryEl = document.getElementById("category");
      const optionsEl = document.getElementById("options");
      const rationaleEl = document.getElementById("rationale");
      const expectedEl = document.getElementById("expected");
      const confidenceEl = document.getElementById("confidence");
      const confidenceValueEl = document.getElementById("confidenceValue");
      const reviewDateEl = document.getElementById("reviewDate");
      const searchEl = document.getElementById("search");
      const statusFilterEl = document.getElementById("statusFilter");
      const listEl = document.getElementById("list");
      const submitBtn = document.getElementById("submitBtn");

      const statTotal = document.getElementById("statTotal");
      const statNeed = document.getElementById("statNeed");
      const statDone = document.getElementById("statDone");
      const statAvg = document.getElementById("statAvg");

      let records = load(STORAGE_KEY, []);
      let editingId = null;

      applyDraft();
      render();

      confidenceEl.addEventListener("input", () => {
        confidenceValueEl.textContent = `${confidenceEl.value}%`;
        saveDraft();
      });

      [titleEl, categoryEl, optionsEl, rationaleEl, expectedEl, reviewDateEl].forEach((el) => {
        el.addEventListener("input", saveDraft);
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const title = titleEl.value.trim();
        const rationale = rationaleEl.value.trim();

        if (!title || !rationale) return;

        const payload = {
          id: editingId || `${Date.now()}_${Math.random().toString(16).slice(2)}`,
          title,
          category: categoryEl.value,
          options: optionsEl.value.trim(),
          rationale,
          expected: expectedEl.value.trim(),
          confidence: Number(confidenceEl.value),
          reviewDate: reviewDateEl.value || null,
          reviewed: false,
          result: "",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        if (editingId) {
          records = records.map((r) => {
            if (r.id !== editingId) return r;
            return {
              ...r,
              ...payload,
              reviewed: r.reviewed,
              result: r.result,
              createdAt: r.createdAt,
              updatedAt: new Date().toISOString()
            };
          });
        } else {
          records.unshift(payload);
        }

        persist();
        resetForm();
        render();
      });

      document.getElementById("resetBtn").addEventListener("click", () => {
        resetForm();
      });

      searchEl.addEventListener("input", render);
      statusFilterEl.addEventListener("change", render);

      document.getElementById("clearAllBtn").addEventListener("click", () => {
        if (!records.length) return;
        if (!confirm("모든 기록을 삭제할까요? 이 작업은 되돌릴 수 없습니다.")) return;
        records = [];
        persist();
        render();
      });

      document.getElementById("exportBtn").addEventListener("click", () => {
        const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `decision-journal-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      });

      document.getElementById("importBtn").addEventListener("click", () => {
        document.getElementById("importFile").click();
      });

      document.getElementById("importFile").addEventListener("change", (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || "[]"));
            if (!Array.isArray(parsed)) throw new Error("invalid");
            records = parsed.filter((x) => x && x.id && x.title);
            persist();
            render();
            alert("불러오기 완료");
          } catch {
            alert("JSON 형식을 확인해 주세요.");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      });

      listEl.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action]");
        if (!btn) return;
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        const record = records.find((r) => r.id === id);
        if (!record) return;

        if (action === "delete") {
          if (!confirm("이 기록을 삭제할까요?")) return;
          records = records.filter((r) => r.id !== id);
          persist();
          render();
          return;
        }

        if (action === "edit") {
          editingId = record.id;
          titleEl.value = record.title;
          categoryEl.value = record.category;
          optionsEl.value = record.options || "";
          rationaleEl.value = record.rationale || "";
          expectedEl.value = record.expected || "";
          confidenceEl.value = String(record.confidence ?? 50);
          confidenceValueEl.textContent = `${confidenceEl.value}%`;
          reviewDateEl.value = record.reviewDate || "";
          submitBtn.textContent = "수정 저장";
          saveDraft();
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        if (action === "toggle") {
          record.reviewed = !record.reviewed;
          record.updatedAt = new Date().toISOString();
          persist();
          render();
          return;
        }

        if (action === "result") {
          const text = prompt("실제 결과를 기록하세요", record.result || "");
          if (text === null) return;
          record.result = text.trim();
          record.reviewed = !!record.result;
          record.updatedAt = new Date().toISOString();
          persist();
          render();
        }
      });

      function resetForm() {
        editingId = null;
        form.reset();
        confidenceEl.value = "70";
        confidenceValueEl.textContent = "70%";
        submitBtn.textContent = "저장하기";
        localStorage.removeItem(DRAFT_KEY);
      }

      function isNeedReview(item) {
        if (item.reviewed) return false;
        if (!item.reviewDate) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const rd = new Date(item.reviewDate);
        rd.setHours(0, 0, 0, 0);
        return rd <= today;
      }

      function filteredRecords() {
        const keyword = searchEl.value.trim().toLowerCase();
        const status = statusFilterEl.value;
        return records.filter((r) => {
          const hay = [r.title, r.options, r.rationale, r.expected, r.result].join(" ").toLowerCase();
          const keywordOk = !keyword || hay.includes(keyword);
          if (!keywordOk) return false;

          if (status === "need") return isNeedReview(r);
          if (status === "done") return !!r.reviewed;
          return true;
        });
      }

      function render() {
        const list = filteredRecords();

        if (!list.length) {
          listEl.innerHTML = `<div class="empty">기록이 없습니다. 첫 결정을 저장해보세요 ✨</div>`;
        } else {
          listEl.innerHTML = list.map((r) => {
            const need = isNeedReview(r);
            const badge = r.reviewed
              ? '<span class="badge done">회고 완료</span>'
              : need
                ? '<span class="badge need-review">검토 필요</span>'
                : '<span class="badge">진행 중</span>';

            return `
              <article class="card">
                <div class="card-top">
                  <div>
                    <h3>${escapeHtml(r.title)}</h3>
                    <div class="meta">
                      <span>${escapeHtml(r.category || "미분류")}</span>
                      <span>확신도 ${Number(r.confidence || 0)}%</span>
                      <span>검토일 ${r.reviewDate || "미지정"}</span>
                    </div>
                  </div>
                  ${badge}
                </div>
                <div class="block"><b>근거</b>\n${escapeHtml(r.rationale || "-")}</div>
                ${r.options ? `<div class="block"><b>선택지</b>\n${escapeHtml(r.options)}</div>` : ""}
                ${r.expected ? `<div class="block"><b>예상 결과/리스크</b>\n${escapeHtml(r.expected)}</div>` : ""}
                ${r.result ? `<div class="block"><b>실제 결과</b>\n${escapeHtml(r.result)}</div>` : ""}
                <div class="card-actions">
                  <button class="btn-ghost" data-action="edit" data-id="${r.id}">수정</button>
                  <button class="btn-ghost" data-action="result" data-id="${r.id}">결과 기록</button>
                  <button class="btn-ghost" data-action="toggle" data-id="${r.id}">${r.reviewed ? "미완료로" : "완료 처리"}</button>
                  <button class="btn-danger" data-action="delete" data-id="${r.id}">삭제</button>
                </div>
              </article>
            `;
          }).join("");
        }

        const needCount = records.filter(isNeedReview).length;
        const doneCount = records.filter((r) => r.reviewed).length;
        const avg = records.length
          ? Math.round(records.reduce((acc, r) => acc + Number(r.confidence || 0), 0) / records.length)
          : 0;

        statTotal.textContent = String(records.length);
        statNeed.textContent = String(needCount);
        statDone.textContent = String(doneCount);
        statAvg.textContent = `${avg}%`;
      }

      function saveDraft() {
        const draft = {
          title: titleEl.value,
          category: categoryEl.value,
          options: optionsEl.value,
          rationale: rationaleEl.value,
          expected: expectedEl.value,
          confidence: confidenceEl.value,
          reviewDate: reviewDateEl.value
        };
        localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
      }

      function applyDraft() {
        const draft = load(DRAFT_KEY, null);
        if (!draft) {
          confidenceValueEl.textContent = `${confidenceEl.value}%`;
          return;
        }
        titleEl.value = draft.title || "";
        categoryEl.value = draft.category || categoryEl.value;
        optionsEl.value = draft.options || "";
        rationaleEl.value = draft.rationale || "";
        expectedEl.value = draft.expected || "";
        confidenceEl.value = draft.confidence || "70";
        reviewDateEl.value = draft.reviewDate || "";
        confidenceValueEl.textContent = `${confidenceEl.value}%`;
      }

      function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function load(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function escapeHtml(str) {
        return String(str || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
    })();
  </script>
</body>
</html>
