      color: rgba(255,255,255,0.78);

      if (I18N && typeof I18N.t === 'function') {
        text = I18N.t(key, { lang: state.lang }) || '';

      if (!text || text === key) {
        text = UI[state.lang]?.[key] ?? UI.ko?.[key] ?? key;
      }
      return interpolate(text, vars);
    }

    function TV(value) {
      if (value && typeof value === 'object') {
        return value[state.lang] ?? value.ko ?? Object.values(value)[0] ?? '';
      }
      return String(value ?? '');
    }

    function listFor(value) {
      if (!value) return [];
      if (Array.isArray(value)) return value;
      if (typeof value === 'object') {
        const picked = value[state.lang] ?? value.ko ?? value.en;
        return Array.isArray(picked) ? picked : [];
      }
      return [];
    }

    function interpolate(template, vars) {
      return String(template).replace(/\{(\w+)\}/g, (_, token) => (vars[token] ?? ''));
    }

    function haptic(kind = 'impact') {

      state.analyzingPct = 0;

    function pickAnswer(index) {
      if (state.phase !== 'question') return;
      haptic('selection');
      const item = QUESTIONS[state.current];
      const option = item.options[index];
      if (!option) return;

      state.answers.push({ qIndex: state.current, optionIndex: index });
      AXES.forEach(axis => {
        state.scores[axis] += Number(option.score[axis] || 0);
      });

      if (state.current >= QUESTIONS.length - 1) {
        goAnalyzing();
      } else {
        state.current += 1;
        render();
      }
    }

    function goAnalyzing() {
      state.phase = 'analyzing';
      state.analyzingPct = 10;
      render();
      const started = Date.now();
      clearInterval(analyzingTimer);
      analyzingTimer = setInterval(() => {
        const elapsed = Date.now() - started;
        state.analyzingPct = Math.min(100, 10 + Math.round(elapsed / 15));
        const fill = document.getElementById('miniFill');
        const txt = document.getElementById('miniText');
        if (fill) fill.style.width = state.analyzingPct + '%';
        if (txt) txt.textContent = state.analyzingPct + '%';
        if (elapsed > 1600) {
          clearInterval(analyzingTimer);
          finalizeResult();
        }
      }, 40);
    }

    function normalizeScores() {
      const max = QUESTIONS.length * 3;
      return AXES.reduce((acc, axis) => {
        acc[axis] = clamp100(Math.round((state.scores[axis] / max) * 100));
        return acc;
      }, {});
    }

    function clamp100(v) {
      return Math.max(0, Math.min(100, Number(v) || 0));
    }

    function resolveType(normalized) {
      let bestType = 'analytic';
      let bestDiff = Infinity;
      let bestTie = -Infinity;

      Object.entries(TYPE_PROFILES).forEach(([type, profile]) => {
        let diff = 0;
        AXES.forEach(axis => {
          diff += Math.abs((normalized[axis] || 0) - (profile[axis] || 0)) * (AXIS_WEIGHTS[axis] || 1);
        });
        const tieScore = (profile.analytic || 0) + (profile.intuitive || 0);
        if (diff < bestDiff || (diff === bestDiff && tieScore > bestTie)) {
          bestDiff = diff;
          bestType = type;
          bestTie = tieScore;
        }
      });

      return bestType;
    }

    function finalizeResult() {
      const normalized = normalizeScores();
      const type = resolveType(normalized);
      const result = {
        type,
        normalized,
        savedAt: new Date().toISOString()
      };
      state.result = result;
      saveResult(result);
      state.phase = 'result';
      render();
      setTimeout(drawChart, 30);

        await navigator.clipboard.writeText(url);

        const ta = document.createElement('textarea');
        ta.value = url;

    function axisLabel(axis) {
      if (axis === 'analytic') return T('axisAnalytic');
      if (axis === 'intuitive') return T('axisIntuitive');
      if (axis === 'dependent') return T('axisDependent');
      if (axis === 'avoidant') return T('axisAvoidant');

    function drawChart() {
      const canvas = document.getElementById('resultChart');
      if (!canvas || !state.result) return;

      const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);

      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const values = AXES.map(axis => state.result.normalized[axis] || 0);
      const labels = AXES.map(axisLabel);

      const left = 120;
      const right = width - 14;
      const top = 10;
      const rows = values.length;
      const gap = 12;
      const barH = Math.max(24, Math.floor((height - top * 2 - gap * (rows - 1)) / rows));

      ctx.font = '600 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Noto Sans KR,sans-serif';
      ctx.textBaseline = 'middle';

      values.forEach((value, idx) => {
        const y = top + idx * (barH + gap);
        const trackW = right - left;
        const fillW = Math.max(0, Math.min(trackW, (value / 100) * trackW));

        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        roundRect(ctx, left, y, trackW, barH, 10);
        ctx.fill();

        const grad = ctx.createLinearGradient(left, y, left + fillW, y);
        grad.addColorStop(0, idx % 2 === 0 ? '#93ddff' : '#ffd086');
        grad.addColorStop(1, idx % 2 === 0 ? '#66c7ff' : '#ff9db0');
        ctx.fillStyle = grad;
        roundRect(ctx, left, y, fillW, barH, 10);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.textAlign = 'left';
        ctx.fillText(labels[idx], 10, y + barH / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.fillText(value + '%', right - 8, y + barH / 2);
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function renderIntro() {
      const saved = state.savedRaw;
      const savedLine = saved
        ? `<div class="saved-note">${T('prevResult', {
            type: TV(RESULTS[saved.type]?.name || { ko: saved.type, en: saved.type }),
            time: formatSavedTime(saved.savedAt)
          })}</div>`
        : '';

      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="lang-row">
              <div class="lang-group">
                <button class="lang-btn ${state.lang === 'ko' ? 'active' : ''}" data-lang="ko">한국어</button>
                <button class="lang-btn ${state.lang === 'en' ? 'active' : ''}" data-lang="en">English</button>
              </div>
              <a class="ghost-link" href="/tools/">All Tools ↗</a>
            </div>
            <h1>${T('title')}</h1>
            <p class="subtitle">${T('subtitle')}</p>
            <div class="hero-badges">
              <span class="badge">${T('elapsed')}</span>
              <span class="badge">${T('questionsBadge')}</span>
              <span class="badge">${T('baseBadge')}</span>
            </div>
            ${savedLine}
            <button class="primary-btn" id="startBtn">${T('start')}</button>
          </div>
        </section>
      `;

      bindLangButtons();
      document.getElementById('startBtn')?.addEventListener('click', startQuiz);
    }

    function bindLangButtons() {
      app.querySelectorAll('[data-lang]').forEach(btn => {
        btn.addEventListener('click', () => {
          const next = btn.getAttribute('data-lang');
          if (next === 'ko' || next === 'en') setLang(next);
        });
      });
    }

    function renderQuestion() {
      const current = QUESTIONS[state.current];
      const options = current.options.map((option, idx) => `
        <button class="choice-btn" data-opt="${idx}">${TV(option.text)}</button>
      `).join('');

      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <h2 class="question-title">Q${state.current + 1}. ${TV(current.q)}</h2>
            <p class="question-hint">${T('hint')}</p>
            <div class="choices">${options}</div>
          </div>
        </section>
      `;

      app.querySelectorAll('[data-opt]').forEach(btn => {
        btn.addEventListener('click', () => pickAnswer(Number(btn.getAttribute('data-opt'))));
      });
    }

    function renderAnalyzing() {
      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="analyzing-wrap">
              <div class="spinner" aria-hidden="true"></div>
              <h2 class="question-title">${T('analyzingTitle')}</h2>
              <p class="question-hint">${T('analyzingDesc')}</p>
              <div class="mini-track"><div class="mini-fill" id="miniFill" style="width:${state.analyzingPct}%"></div></div>
              <div class="mini-text" id="miniText">${state.analyzingPct}%</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderResult() {
      if (!state.result) return;
      const info = RESULTS[state.result.type];
      const traits = listFor(info.traits).map(item => `<span class="chip">${item}</span>`).join('');
      const tips = listFor(info.tips).map(item => `<li>${item}</li>`).join('');
      const promos = PROMOS.map(item => `<a class="promo-link" href="${item.href}">${state.lang === 'ko' ? item.ko : item.en}</a>`).join('');

      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="result-head">
              <div>${info.emoji}</div>
              <h2 class="result-type">${T('resultTitle')} · ${TV(info.name)}</h2>
              <p class="result-summary">${TV(info.summary)}</p>
            </div>

            <h3 class="section-title">${T('detailTitle')}</h3>
            <p class="detail-text">${TV(info.detail)}</p>

            <div class="chips">${traits}</div>

            <h3 class="section-title">${T('chartTitle')}</h3>
            <div class="chart-wrap"><canvas id="resultChart" width="640" height="280" aria-label="chart" role="img"></canvas></div>

            <h3 class="section-title">${T('tipsTitle')}</h3>
            <ul class="tips-list">${tips}</ul>

            <div class="share-grid">
              <button class="share-btn" id="shareKakao">${T('shareKakao')}</button>
              <button class="share-btn" id="shareTwitter">${T('shareTwitter')}</button>
              <button class="share-btn" id="copyLink">${T('shareLink')}</button>
            </div>

            <button class="secondary-btn" id="restartBtn">${T('restart')}</button>

            <div class="promo-wrap">
              <div class="section-title" style="margin-top:0">${T('promoTitle')}</div>
              <div class="promo-list">${promos}</div>
            </div>

            <p class="disclaimer">${T('disclaimer')}</p>
          </div>
        </section>
      `;

      document.getElementById('shareKakao')?.addEventListener('click', shareKakao);
      document.getElementById('shareTwitter')?.addEventListener('click', shareTwitter);
      document.getElementById('copyLink')?.addEventListener('click', copyLink);
      document.getElementById('restartBtn')?.addEventListener('click', () => {
        clearInterval(analyzingTimer);
        state.phase = 'intro';
        state.current = 0;
        state.answers = [];
        state.scores = freshScores();
        state.result = null;
        state.analyzingPct = 0;
        render();
      });
      requestAnimationFrame(drawChart);
    }

    function render() {
      updateTopProgress();
      if (state.phase === 'intro') renderIntro();
      else if (state.phase === 'question') renderQuestion();
      else if (state.phase === 'analyzing') renderAnalyzing();
      else renderResult();
    }

    render();
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
