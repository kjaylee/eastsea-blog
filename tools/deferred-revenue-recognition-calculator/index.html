<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deferred Revenue Recognition Calculator | 이연수익 인식 계산기</title>
  <meta name="description" content="선결제 계약의 월별 인식매출, 이연수익 잔액, 총이익, ROI를 계산하는 재무 운영 계산기" />
  <style>
    :root{--bg:#081426;--card:#102542;--line:#2c4f7f;--txt:#edf3ff;--muted:#a9c1e2;--pri:#7aa2ff;--soft:#173861;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errBg:rgba(248,113,113,.14)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#244e85 0%,#081426 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.93rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px}
    .card{background:linear-gradient(165deg,#16345e,#102542);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1c36;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#648af5);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:106px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📒 이연수익 인식 계산기</h1>
        <div class="sub">선결제 계약의 매출 인식 타이밍과 이연수익 잔액을 월 단위로 계산해 재무 계획 정확도를 높입니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="contracts">월 신규 계약 수 (건)</label><input id="contracts" type="number" min="1" value="90" /></div>
          <div><label for="acv">계약당 ACV (KRW)</label><input id="acv" type="number" min="1" value="4200000" /></div>
          <div><label for="term">계약 기간 (개월)</label><input id="term" type="number" min="1" max="60" value="12" /></div>
          <div><label for="cancelRate">조기 해지율 (%)</label><input id="cancelRate" type="number" min="0" max="100" step="0.1" value="7" /></div>
          <div><label for="cogsRate">서비스 COGS 비율 (%)</label><input id="cogsRate" type="number" min="0" max="100" step="0.1" value="28" /></div>
          <div><label for="billingFeeRate">청구/수납 수수료율 (%)</label><input id="billingFeeRate" type="number" min="0" max="30" step="0.1" value="1.8" /></div>
          <div><label for="period">분석 기간 (개월)</label><input id="period" type="number" min="1" max="60" value="18" /></div>
          <div><label for="setupCost">일회성 도입비 (KRW)</label><input id="setupCost" type="number" min="0" value="26000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 현금 청구액</div><div id="monthlyBilled" class="v">-</div></div>
          <div class="kpi"><div class="k">마지막 월 인식매출</div><div id="monthRecognized" class="v">-</div></div>
          <div class="kpi"><div class="k">마지막 월 이연수익 잔액</div><div id="deferredEnding" class="v sm">-</div></div>
          <div class="kpi"><div class="k">기간 누적 인식매출</div><div id="totalRecognized" class="v sm">-</div></div>
          <div class="kpi"><div class="k">기간 누적 총이익</div><div id="totalGrossProfit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">기간 ROI</div><div id="roi" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>기간 누적 청구액</th><td id="totalBilled">-</td></tr>
            <tr><th>기간 순효과 (총이익-도입비)</th><td id="periodNet">-</td></tr>
            <tr><th>손익분기 월 신규계약수</th><td id="breakEvenContracts">-</td></tr>
            <tr><th>월 총이익 (마지막 월)</th><td id="monthGrossProfit">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      contracts: $("contracts"), acv: $("acv"), term: $("term"), cancelRate: $("cancelRate"), cogsRate: $("cogsRate"), billingFeeRate: $("billingFeeRate"), period: $("period"), setupCost: $("setupCost"),
      monthlyBilled: $("monthlyBilled"), monthRecognized: $("monthRecognized"), deferredEnding: $("deferredEnding"), totalRecognized: $("totalRecognized"), totalGrossProfit: $("totalGrossProfit"), roi: $("roi"),
      totalBilled: $("totalBilled"), periodNet: $("periodNet"), breakEvenContracts: $("breakEvenContracts"), monthGrossProfit: $("monthGrossProfit"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = { contracts: 90, acv: 4200000, term: 12, cancelRate: 7, cogsRate: 28, billingFeeRate: 1.8, period: 18, setupCost: 26000000 };
    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v) {
      if (!Number.isFinite(v.contracts) || v.contracts < 1) return "월 신규 계약 수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.acv) || v.acv <= 0) return "ACV는 0보다 커야 합니다.";
      if (!Number.isFinite(v.term) || v.term < 1 || v.term > 60) return "계약 기간은 1~60개월 범위여야 합니다.";
      if (!Number.isFinite(v.cancelRate) || v.cancelRate < 0 || v.cancelRate > 100) return "조기 해지율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.cogsRate) || v.cogsRate < 0 || v.cogsRate > 100) return "COGS 비율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.billingFeeRate) || v.billingFeeRate < 0 || v.billingFeeRate > 30) return "청구/수납 수수료율은 0~30% 범위여야 합니다.";
      if (!Number.isFinite(v.period) || v.period < 1 || v.period > 60) return "분석 기간은 1~60개월 범위여야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "일회성 도입비는 0 이상이어야 합니다.";
      return "";
    }

    function calcForContracts(v, contractsPerMonth) {
      const cancel = v.cancelRate / 100;
      const cogs = v.cogsRate / 100;
      const billingFee = v.billingFeeRate / 100;
      const effectiveRatio = 1 - cancel;
      const monthlyBilled = contractsPerMonth * v.acv;
      const monthlyRecognizedPerCohort = (contractsPerMonth * v.acv * effectiveRatio) / v.term;

      let cumulativeBilled = 0;
      let cumulativeRecognized = 0;
      let totalGrossProfit = 0;
      let monthRecognized = 0;
      let monthGrossProfit = 0;
      let deferredEnding = 0;

      for (let m = 1; m <= v.period; m++) {
        const activeCohorts = Math.min(m, v.term);
        monthRecognized = monthlyRecognizedPerCohort * activeCohorts;
        cumulativeBilled += monthlyBilled;
        cumulativeRecognized += monthRecognized;
        deferredEnding = cumulativeBilled - cumulativeRecognized;
        monthGrossProfit = monthRecognized * (1 - cogs) - monthlyBilled * billingFee;
        totalGrossProfit += monthGrossProfit;
      }

      return {
        monthlyBilled,
        monthRecognized,
        deferredEnding,
        totalBilled: cumulativeBilled,
        totalRecognized: cumulativeRecognized,
        monthGrossProfit,
        totalGrossProfit
      };
    }

    function render() {
      const v = {
        contracts: Number(refs.contracts.value), acv: Number(refs.acv.value), term: Number(refs.term.value), cancelRate: Number(refs.cancelRate.value),
        cogsRate: Number(refs.cogsRate.value), billingFeeRate: Number(refs.billingFeeRate.value), period: Number(refs.period.value), setupCost: Number(refs.setupCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err) {
        ["monthlyBilled", "monthRecognized", "deferredEnding", "totalRecognized", "totalGrossProfit", "roi", "totalBilled", "periodNet", "breakEvenContracts", "monthGrossProfit"].forEach((k) => refs[k].textContent = "-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const main = calcForContracts(v, v.contracts);
      const periodNet = main.totalGrossProfit - v.setupCost;
      const roi = v.setupCost === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / v.setupCost) * 100;

      const unit = calcForContracts(v, 1);
      const breakEvenContracts = unit.totalGrossProfit > 0 ? (v.setupCost / unit.totalGrossProfit) : Infinity;

      refs.monthlyBilled.textContent = money(main.monthlyBilled);
      refs.monthRecognized.textContent = money(main.monthRecognized);
      refs.deferredEnding.textContent = money(main.deferredEnding);
      refs.totalRecognized.textContent = money(main.totalRecognized);
      refs.totalGrossProfit.textContent = money(main.totalGrossProfit);
      refs.roi.textContent = Number.isFinite(roi) ? `${num(roi, 1)}%` : (roi > 0 ? "∞" : "-∞");

      refs.totalBilled.textContent = money(main.totalBilled);
      refs.periodNet.textContent = money(periodNet);
      refs.breakEvenContracts.textContent = Number.isFinite(breakEvenContracts) ? `${num(breakEvenContracts, 1)}건/월` : "달성 불가";
      refs.monthGrossProfit.textContent = money(main.monthGrossProfit);

      refs.status.innerHTML = periodNet >= 0
        ? `<span class="ok">●</span> 기간 순효과 ${money(periodNet)} (도입비 회수 가능)`
        : `<span class="warn">●</span> 기간 순효과 ${money(periodNet)} (모델 조정 필요)`;

      refs.summary.value = [
        "[Deferred Revenue Recognition 요약]",
        `월 현금 청구액: ${money(main.monthlyBilled)}`,
        `마지막 월 인식매출: ${money(main.monthRecognized)}`,
        `마지막 월 이연수익 잔액: ${money(main.deferredEnding)}`,
        `${v.period}개월 누적 인식매출: ${money(main.totalRecognized)}`,
        `${v.period}개월 누적 총이익: ${money(main.totalGrossProfit)}`,
        `기간 순효과(도입비 반영): ${money(periodNet)}`,
        `ROI: ${Number.isFinite(roi) ? `${num(roi, 1)}%` : (roi > 0 ? "∞" : "-∞")}`,
        `손익분기 월 신규계약수: ${Number.isFinite(breakEvenContracts) ? `${num(breakEvenContracts, 1)}건` : "달성 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.contracts, refs.acv, refs.term, refs.cancelRate, refs.cogsRate, refs.billingFeeRate, refs.period, refs.setupCost].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
