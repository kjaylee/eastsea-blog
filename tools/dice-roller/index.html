<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Virtual Dice Roller — roll D4, D6, D8, D10, D12, D20 and custom dice with animated results, history, and statistics.">
  <title>Dice Roller</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TVJ4W0GQNG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TVJ4W0GQNG');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal-900: #134e4a;
      --teal-800: #115e59;
      --teal-700: #0f766e;
      --teal-600: #0d9488;
      --teal-500: #14b8a6;
      --teal-400: #2dd4bf;
      --teal-300: #5eead4;
      --teal-100: #ccfbf1;
      --teal-50:  #f0fdfa;
      --gold:     #fbbf24;
      --gold-dark: #d97706;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-600: #475569;
      --slate-400: #94a3b8;
      --slate-200: #e2e8f0;
      --white: #ffffff;
      --red-400: #f87171;
      --green-400: #4ade80;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--teal-900) 0%, var(--slate-800) 100%);
      color: var(--white);
      min-height: 100vh;
      padding: 16px;
    }

    header {
      text-align: center;
      padding: 28px 16px 20px;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--teal-300), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--teal-300); margin-top: 6px; font-size: 0.95rem; }

    .container { max-width: 800px; margin: 0 auto; }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(45,212,191,0.2);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--teal-300);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    /* Dice buttons */
    .dice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 12px;
    }
    .die-btn {
      aspect-ratio: 1;
      border-radius: 14px;
      border: 2px solid rgba(45,212,191,0.3);
      background: rgba(20,184,166,0.1);
      color: var(--white);
      font-size: 1.4rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      position: relative;
    }
    .die-btn:hover {
      background: rgba(20,184,166,0.25);
      border-color: var(--teal-400);
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 20px rgba(20,184,166,0.3);
    }
    .die-btn:active { transform: scale(0.96); }
    .die-btn span { font-size: 0.7rem; color: var(--teal-300); font-weight: 600; }
    .die-btn .count-badge {
      position: absolute;
      top: 6px; right: 6px;
      background: var(--teal-600);
      color: #fff;
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 0.65rem;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }

    /* Custom dice */
    .custom-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .custom-row > div { flex: 1; min-width: 100px; }
    label { font-size: 0.82rem; color: var(--teal-300); margin-bottom: 4px; display: block; }
    input[type="number"] {
      width: 100%;
      padding: 9px 12px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(45,212,191,0.3);
      border-radius: 8px;
      color: var(--white);
      font-size: 0.95rem;
    }
    input[type="number"]:focus { outline: none; border-color: var(--teal-400); }
    input[type="number"]::placeholder { color: var(--slate-400); }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-teal {
      background: linear-gradient(135deg, var(--teal-600), var(--teal-700));
      color: var(--white);
      box-shadow: 0 4px 12px rgba(20,184,166,0.3);
    }
    .btn-teal:hover { background: linear-gradient(135deg, var(--teal-500), var(--teal-600)); transform: translateY(-1px); }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #1c1917; }
    .btn-gold:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    /* Result display */
    .result-area {
      text-align: center;
      padding: 24px 16px;
    }
    #current-roll-label { color: var(--teal-300); font-size: 0.85rem; margin-bottom: 8px; }
    #roll-result {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold), var(--teal-300));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: transform 0.1s;
    }
    #roll-result.rolling { animation: rolling 0.4s ease; }
    @keyframes rolling {
      0% { transform: scale(0.7) rotate(-5deg); opacity: 0.5; }
      50% { transform: scale(1.15) rotate(3deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    #roll-breakdown {
      color: var(--slate-400);
      font-size: 0.9rem;
      margin-top: 8px;
      min-height: 22px;
    }
    #individual-rolls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 12px;
    }
    .roll-pip {
      background: rgba(20,184,166,0.15);
      border: 1px solid var(--teal-600);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    /* Multi-dice selector */
    .quantity-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .quantity-row label { margin: 0; white-space: nowrap; }
    #dice-count {
      width: 70px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(45,212,191,0.3);
      border-radius: 8px;
      color: #fff;
    }
    #modifier { width: 80px; }

    /* History */
    #history-list {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #history-list::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-track { background: transparent; }
    #history-list::-webkit-scrollbar-thumb { background: var(--teal-700); border-radius: 4px; }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
    }
    .history-item .dice-label { color: var(--teal-300); }
    .history-item .result-val { font-weight: 800; color: var(--gold); }
    .history-item .time-val { color: var(--slate-400); font-size: 0.75rem; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-box {
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-box .val { font-size: 1.4rem; font-weight: 800; color: var(--teal-300); }
    .stat-box .lbl { font-size: 0.72rem; color: var(--slate-400); margin-top: 3px; }

    .empty-msg { text-align: center; color: var(--slate-400); font-size: 0.9rem; padding: 20px; }

    .top-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }

    @media (max-width: 500px) {
      .dice-grid { grid-template-columns: repeat(3, 1fr); }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎲 Dice Roller</h1>
    <p>Roll any die — D4 to D100 — with history &amp; stats</p>
  </header>

  <div class="card">
    <h2>Quick Roll</h2>
    <div class="quantity-row">
      <label>Number of dice:</label>
      <input type="number" id="dice-count" value="1" min="1" max="20">
      <label>Modifier:</label>
      <input type="number" id="modifier" value="0" min="-100" max="100" style="width:80px;padding:8px 10px;background:rgba(255,255,255,.08);border:1.5px solid rgba(45,212,191,.3);border-radius:8px;color:#fff;">
    </div>
    <div class="dice-grid">
      <button class="die-btn" onclick="roll(4)" title="Roll D4">🔺<span>D4</span></button>
      <button class="die-btn" onclick="roll(6)" title="Roll D6">⬜<span>D6</span></button>
      <button class="die-btn" onclick="roll(8)" title="Roll D8">💠<span>D8</span></button>
      <button class="die-btn" onclick="roll(10)" title="Roll D10">🔟<span>D10</span></button>
      <button class="die-btn" onclick="roll(12)" title="Roll D12">⬡<span>D12</span></button>
      <button class="die-btn" onclick="roll(20)" title="Roll D20">🎲<span>D20</span></button>
      <button class="die-btn" onclick="roll(100)" title="Roll D100" style="font-size:1rem;">100<span>D100</span></button>
    </div>
  </div>

  <div class="card">
    <h2>Custom Die</h2>
    <div class="custom-row">
      <div>
        <label>Sides</label>
        <input type="number" id="custom-sides" value="6" min="2" max="9999" placeholder="Sides">
      </div>
      <div>
        <label>Count</label>
        <input type="number" id="custom-count" value="1" min="1" max="20" placeholder="How many">
      </div>
      <div>
        <button class="btn btn-gold" onclick="rollCustom()" style="margin-bottom:0;width:100%;height:42px;">Roll Custom</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="result-area">
      <div id="current-roll-label">Click a die to roll</div>
      <div id="roll-result">—</div>
      <div id="roll-breakdown"></div>
      <div id="individual-rolls"></div>
    </div>
  </div>

  <div class="card">
    <h2>Statistics</h2>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="val" id="stat-total">0</div>
        <div class="lbl">Total Rolls</div>
      </div>
      <div class="stat-box">
        <div class="val" id="stat-avg">—</div>
        <div class="lbl">Average</div>
      </div>
      <div class="stat-box">
        <div class="val" id="stat-highest">—</div>
        <div class="lbl">Highest</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2 style="display:flex;justify-content:space-between;align-items:center;">
      Roll History
      <button class="btn btn-sm" onclick="clearHistory()" style="background:rgba(248,113,113,.2);color:var(--red-400);border:1px solid rgba(248,113,113,.3);">Clear</button>
    </h2>
    <div id="history-list"><div class="empty-msg">No rolls yet</div></div>
  </div>
</div>

<script>
const history = [];

function roll(sides) {
  const count = parseInt(document.getElementById('dice-count').value) || 1;
  const mod = parseInt(document.getElementById('modifier').value) || 0;
  const results = [];
  for (let i = 0; i < count; i++) results.push(Math.floor(Math.random() * sides) + 1);
  const sum = results.reduce((a, b) => a + b, 0);
  const total = sum + mod;
  displayResult(total, results, `${count}d${sides}${mod !== 0 ? (mod > 0 ? `+${mod}` : mod) : ''}`);
  addHistory(`${count}d${sides}${mod !== 0 ? (mod > 0 ? `+${mod}` : mod) : ''}`, total);
}

function rollCustom() {
  const sides = parseInt(document.getElementById('custom-sides').value) || 6;
  const count = parseInt(document.getElementById('custom-count').value) || 1;
  const mod = parseInt(document.getElementById('modifier').value) || 0;
  if (sides < 2) return;
  const results = [];
  for (let i = 0; i < count; i++) results.push(Math.floor(Math.random() * sides) + 1);
  const sum = results.reduce((a, b) => a + b, 0);
  const total = sum + mod;
  displayResult(total, results, `${count}d${sides}${mod !== 0 ? (mod > 0 ? `+${mod}` : mod) : ''}`);
  addHistory(`${count}d${sides}`, total);
}

function displayResult(total, results, label) {
  const el = document.getElementById('roll-result');
  el.classList.remove('rolling');
  void el.offsetWidth;
  el.classList.add('rolling');
  el.textContent = total;
  document.getElementById('current-roll-label').textContent = label;
  const mod = parseInt(document.getElementById('modifier').value) || 0;
  const sum = results.reduce((a, b) => a + b, 0);
  if (results.length > 1 || mod !== 0) {
    let bd = `[${results.join(', ')}]`;
    if (mod !== 0) bd += ` ${mod > 0 ? '+' : ''}${mod} = ${total}`;
    document.getElementById('roll-breakdown').textContent = bd;
  } else {
    document.getElementById('roll-breakdown').textContent = '';
  }
  const pips = document.getElementById('individual-rolls');
  pips.innerHTML = '';
  if (results.length > 1) {
    results.forEach(r => {
      const pip = document.createElement('span');
      pip.className = 'roll-pip';
      pip.textContent = r;
      pips.appendChild(pip);
    });
  }
}

function addHistory(label, result) {
  history.unshift({ label, result, time: new Date() });
  if (history.length > 50) history.pop();
  renderHistory();
  updateStats();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) { el.innerHTML = '<div class="empty-msg">No rolls yet</div>'; return; }
  el.innerHTML = history.map(h => `
    <div class="history-item">
      <span class="dice-label">${h.label}</span>
      <span class="result-val">${h.result}</span>
      <span class="time-val">${h.time.toLocaleTimeString()}</span>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('stat-total').textContent = history.length;
  const vals = history.map(h => h.result);
  const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
  document.getElementById('stat-avg').textContent = avg.toFixed(1);
  document.getElementById('stat-highest').textContent = Math.max(...vals);
}

function clearHistory() {
  history.length = 0;
  renderHistory();
  document.getElementById('stat-total').textContent = '0';
  document.getElementById('stat-avg').textContent = '—';
  document.getElementById('stat-highest').textContent = '—';
}

// Keyboard shortcut: space to reroll last
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && history.length && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    const last = history[0].label;
    const m = last.match(/(\d+)d(\d+)/);
    if (m) roll(parseInt(m[2]));
  }
});
</script>
</body>
</html>
