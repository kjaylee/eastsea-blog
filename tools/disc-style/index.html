var TYPE_COLORS = {D:'#E53E3E',I:'#ED8936',S:'#38A169',C:'#3182CE'};

// ── 화면 전환 ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var el = document.getElementById('screen-'+id);
  if (el) { el.classList.add('active'); }
  state.screen = id;
}

// ── 시작 ──
function startTest() {
  state.qi = 0;
  state.scores = {D:0,I:0,S:0,C:0};
  state.answers = [];
  showScreen('question');
  renderQuestion();
  try { if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('medium'); } catch(e){}
}

// ── 질문 렌더 ──
function renderQuestion() {
  var q = QUESTIONS[state.qi];
  var total = QUESTIONS.length;
  var pct = Math.round((state.qi / total) * 100);
  document.getElementById('q-num').textContent = '질문 ' + (state.qi+1) + ' / ' + total;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-label').textContent = 'QUESTION ' + (state.qi+1 < 10 ? '0' : '') + (state.qi+1);
  document.getElementById('q-text').textContent = q.q;
  var optEl = document.getElementById('options');
  optEl.innerHTML = '';
  var letters = ['A','B','C','D'];
  q.opts.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = '<span class="opt-letter">'+letters[i]+'</span><span>'+opt.t+'</span>';
    btn.onclick = function(){ selectAnswer(i); };
    optEl.appendChild(btn);
  });
}

// ── 답변 선택 ──
function selectAnswer(idx) {
  var q = QUESTIONS[state.qi];
  var s = q.opts[idx].s;
  Object.keys(s).forEach(function(k){ state.scores[k] += s[k]; });
  state.answers.push(idx);
  try { if (window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.selectionChanged(); } catch(e){}
  var btns = document.querySelectorAll('.opt-btn');
  if (btns[idx]) btns[idx].classList.add('selected');
  setTimeout(function() {
    state.qi++;
    if (state.qi >= QUESTIONS.length) {
      showScreen('analyzing');
      setTimeout(showResult, 2300);
    } else {
      renderQuestion();
    }
  }, 320);
}

// ── 결과 계산 ──
function calcResult() {
  var scores = state.scores;
  var sorted = Object.keys(scores).sort(function(a,b){ return scores[b]-scores[a]; });
  return {type:sorted[0], scores:scores};
}

// ── Canvas 바 차트 ──
function drawChart(scores, activeType) {
  var canvas = document.getElementById('disc-chart');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var displayW = canvas.offsetWidth || 300;
  var displayH = 200;
  canvas.width = displayW * dpr;
  canvas.height = displayH * dpr;
  ctx.scale(dpr, dpr);
  var types = ['D','I','S','C'];
  var labels = {D:'주도형',I:'사교형',S:'안정형',C:'신중형'};
  var maxVal = Math.max.apply(null, types.map(function(t){ return scores[t] || 0; }));
  maxVal = maxVal || 1;
  var barW = 54, gap = (displayW - types.length * barW) / (types.length + 1);
  var maxH = displayH - 55;
  ctx.clearRect(0, 0, displayW, displayH);
  types.forEach(function(t, i) {
    var x = gap + i * (barW + gap);
    var score = scores[t] || 0;
    var barH = (score / maxVal) * maxH;
    var y = displayH - 38 - barH;
    var color = TYPE_COLORS[t];
    var grad = ctx.createLinearGradient(x, y, x, displayH - 38);
    grad.addColorStop(0, color);
    grad.addColorStop(1, color + '66');
    ctx.fillStyle = t === activeType ? color : color + 'BB';
    ctx.beginPath();
    if (ctx.roundRect) { ctx.roundRect(x, y, barW, barH, [6,6,0,0]); }
    else { ctx.rect(x, y, barW, barH); }
    ctx.fill();
    if (t === activeType) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.fillStyle = '#2D3748';
    ctx.font = 'bold 13px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(score, x + barW/2, y - 6);
    ctx.fillStyle = color;
    ctx.font = 'bold 13px -apple-system,sans-serif';
    ctx.fillText(t, x + barW/2, displayH - 22);
    ctx.fillStyle = '#718096';
    ctx.font = '10px -apple-system,sans-serif';
    ctx.fillText(labels[t], x + barW/2, displayH - 8);
  });
}

// ── localStorage ──
function saveResult(type, scores) {
  try {
    var history = JSON.parse(localStorage.getItem('disc_history') || '[]');
    history.unshift({type:type, scores:scores, date:new Date().toISOString()});
    if (history.length > 10) history.pop();
    localStorage.setItem('disc_history', JSON.stringify(history));
    localStorage.setItem('disc_latest', JSON.stringify({type:type, scores:scores, date:new Date().toISOString()}));
  } catch(e) {}
}

// ── 파티클 배경 (LittleJS 없이도 동작하는 Canvas 애니메이션) ──
(function() {
  var canvas = document.getElementById('lj-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var particles = [];
  var colors = ['#E53E3E','#ED8936','#38A169','#3182CE','#6B46C1'];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (var i = 0; i < 25; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 18 + 6,
      dx: (Math.random() - 0.5) * 0.4,
      dy: (Math.random() - 0.5) * 0.4,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: Math.random() * 0.12 + 0.04
    });
  }
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) {
      p.x += p.dx; p.y += p.dy;
      if (p.x < -30) p.x = canvas.width + 30;
      if (p.x > canvas.width + 30) p.x = -30;
      if (p.y < -30) p.y = canvas.height + 30;
      if (p.y > canvas.height + 30) p.y = -30;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    });
    requestAnimationFrame(animate);
  }
  animate();
  // LittleJS enhancement check (non-blocking)
  setTimeout(function() {
    if (window._ljReady && typeof engineInit === 'function') {
      console.log('LittleJS loaded - particle system enhanced');
    }
  }, 2000);
})();
