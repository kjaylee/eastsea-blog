<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discount Campaign Profit Lift Calculator | 할인 캠페인 수익 리프트 계산기</title>
  <meta name="description" content="트래픽, 전환율, 할인율, 원가율, 수수료, 광고비를 반영해 할인 캠페인의 순이익 변화와 손익분기 전환율 리프트를 계산합니다." />
  <style>
    :root{--bg:#0f1221;--card:#171a2f;--line:#2d3357;--txt:#eff2ff;--muted:#b8bfdd;--pri:#60a5fa;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 0% 0%,#1a2558,var(--bg) 52%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.15rem,2.7vw,1.72rem)}
    .sub{margin-top:6px;font-size:.92rem;color:var(--muted);line-height:1.5}
    .home{color:#dbeafe;text-decoration:none;white-space:nowrap;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#1f2c5a}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(160deg,#1b2040,#141931);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1529;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb)}
    .soft{background:#1f2d5e;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3341;background:rgba(239,68,68,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    textarea{margin-top:10px;min-height:102px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#0f1529;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1b2651;color:#e8eeff;font-size:.76rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🏷️ 할인 캠페인 수익 리프트 계산기</h1>
        <div class="sub">할인율 적용 시 주문 증가와 마진 희석을 함께 반영해 <strong>순이익 변화</strong>와 <strong>손익분기 전환율 리프트</strong>를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="visitors">캠페인 방문자 수</label><input id="visitors" type="number" min="1" step="1" value="80000" /></div>
          <div><label for="baseCvr">기준 전환율 (%)</label><input id="baseCvr" type="number" min="0.01" max="100" step="0.01" value="2.4" /></div>
          <div><label for="lift">예상 전환율 리프트 (%)</label><input id="lift" type="number" min="0" step="0.1" value="18" /></div>
          <div><label for="aov">기준 객단가 AOV (KRW)</label><input id="aov" type="number" min="1" step="100" value="69000" /></div>
          <div><label for="discount">할인율 (%)</label><input id="discount" type="number" min="0" max="95" step="0.1" value="12" /></div>
          <div><label for="cogs">원가율 (%)</label><input id="cogs" type="number" min="0" max="100" step="0.1" value="41" /></div>
          <div><label for="fee">결제/마켓 수수료율 (%)</label><input id="fee" type="number" min="0" max="40" step="0.1" value="4.2" /></div>
          <div><label for="campaignSpend">캠페인 비용 (KRW)</label><input id="campaignSpend" type="number" min="0" step="1000" value="12000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">할인 적용 후 순이익</div><div id="campaignProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">기준 순이익</div><div id="baselineProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">순이익 증감</div><div id="profitLift" class="v sm">-</div></div>
          <div class="kpi"><div class="k">캠페인 ROI (비용 대비)</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">할인 후 마진율</div><div id="campaignMargin" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 리프트</div><div id="breakEvenLift" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">세부 지표</h2>
        <table>
          <tbody>
            <tr><th>기준 주문수</th><td id="baselineOrders">-</td></tr>
            <tr><th>캠페인 주문수</th><td id="campaignOrders">-</td></tr>
            <tr><th>할인 후 매출</th><td id="campaignRevenue">-</td></tr>
            <tr><th>매출 증감</th><td id="revenueLift">-</td></tr>
            <tr><th>캠페인 적용 전/후 전환율</th><td id="cvrCompare">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      visitors: $('visitors'), baseCvr: $('baseCvr'), lift: $('lift'), aov: $('aov'), discount: $('discount'), cogs: $('cogs'), fee: $('fee'), campaignSpend: $('campaignSpend'),
      campaignProfit: $('campaignProfit'), baselineProfit: $('baselineProfit'), profitLift: $('profitLift'), roi: $('roi'), campaignMargin: $('campaignMargin'), breakEvenLift: $('breakEvenLift'),
      baselineOrders: $('baselineOrders'), campaignOrders: $('campaignOrders'), campaignRevenue: $('campaignRevenue'), revenueLift: $('revenueLift'), cvrCompare: $('cvrCompare'),
      error: $('error'), status: $('status'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = { visitors: 80000, baseCvr: 2.4, lift: 18, aov: 69000, discount: 12, cogs: 41, fee: 4.2, campaignSpend: 12000000 };

    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });
    const pct = (n, d = 2) => `${num(n, d)}%`;
    const finite = (v) => Number.isFinite(v);

    function validate(v) {
      if (!finite(v.visitors) || v.visitors <= 0) return '캠페인 방문자 수는 1 이상이어야 합니다.';
      if (!finite(v.baseCvr) || v.baseCvr <= 0 || v.baseCvr > 100) return '기준 전환율은 0 초과 100 이하로 입력하세요.';
      if (!finite(v.lift) || v.lift < 0 || v.lift > 1000) return '예상 전환율 리프트는 0~1000% 범위로 입력하세요.';
      if (!finite(v.aov) || v.aov <= 0) return '기준 AOV는 0보다 커야 합니다.';
      if (!finite(v.discount) || v.discount < 0 || v.discount >= 100) return '할인율은 0 이상 100 미만이어야 합니다.';
      if (!finite(v.cogs) || v.cogs < 0 || v.cogs > 100) return '원가율은 0~100 범위여야 합니다.';
      if (!finite(v.fee) || v.fee < 0 || v.fee > 100) return '수수료율은 0~100 범위여야 합니다.';
      if (!finite(v.campaignSpend) || v.campaignSpend < 0) return '캠페인 비용은 0 이상이어야 합니다.';
      const marginAfterDiscount = (1 - v.discount / 100) * (1 - (v.cogs + v.fee) / 100);
      if (marginAfterDiscount <= 0) return '현재 할인/원가/수수료 조합에서 주문당 마진이 0 이하입니다.';
      return '';
    }

    function compute(v) {
      const baseCvr = v.baseCvr / 100;
      const campaignCvr = baseCvr * (1 + v.lift / 100);
      const discountedAov = v.aov * (1 - v.discount / 100);
      const marginRate = 1 - (v.cogs + v.fee) / 100;
      const baselineOrders = v.visitors * baseCvr;
      const campaignOrders = v.visitors * campaignCvr;

      const baselineRevenue = baselineOrders * v.aov;
      const campaignRevenue = campaignOrders * discountedAov;

      const baselineProfit = baselineRevenue * marginRate;
      const campaignProfit = campaignRevenue * marginRate - v.campaignSpend;

      const profitLift = campaignProfit - baselineProfit;
      const roi = v.campaignSpend > 0 ? profitLift / v.campaignSpend : NaN;

      const neededCampaignCvr = (baselineProfit + v.campaignSpend) / (v.visitors * discountedAov * marginRate);
      const breakEvenLift = neededCampaignCvr > 0 ? ((neededCampaignCvr / baseCvr) - 1) * 100 : Infinity;

      return {
        baselineOrders, campaignOrders, baselineRevenue, campaignRevenue, baselineProfit, campaignProfit, profitLift, roi, marginRate, campaignCvr, breakEvenLift
      };
    }

    function resetOutputs() {
      ['campaignProfit','baselineProfit','profitLift','roi','campaignMargin','breakEvenLift','baselineOrders','campaignOrders','campaignRevenue','revenueLift','cvrCompare'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function render() {
      const v = {
        visitors: Number(refs.visitors.value),
        baseCvr: Number(refs.baseCvr.value),
        lift: Number(refs.lift.value),
        aov: Number(refs.aov.value),
        discount: Number(refs.discount.value),
        cogs: Number(refs.cogs.value),
        fee: Number(refs.fee.value),
        campaignSpend: Number(refs.campaignSpend.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.campaignProfit.textContent = won(r.campaignProfit);
      refs.baselineProfit.textContent = won(r.baselineProfit);
      refs.profitLift.textContent = won(r.profitLift);
      refs.roi.textContent = Number.isFinite(r.roi) ? pct(r.roi * 100, 1) : 'N/A';
      refs.campaignMargin.textContent = pct(r.marginRate * 100, 2);
      refs.breakEvenLift.textContent = Number.isFinite(r.breakEvenLift) ? pct(r.breakEvenLift, 2) : 'N/A';

      refs.baselineOrders.textContent = `${num(r.baselineOrders, 1)}건`;
      refs.campaignOrders.textContent = `${num(r.campaignOrders, 1)}건`;
      refs.campaignRevenue.textContent = won(r.campaignRevenue);
      refs.revenueLift.textContent = won(r.campaignRevenue - r.baselineRevenue);
      refs.cvrCompare.textContent = `${pct(v.baseCvr,2)} → ${pct(r.campaignCvr * 100,2)}`;

      if (r.profitLift > 0) {
        refs.status.innerHTML = `<span class="good">●</span> 예상 순이익 증가 ${won(r.profitLift)}`;
      } else if (Math.abs(r.profitLift) < 1) {
        refs.status.innerHTML = `<span class="warn">●</span> 거의 손익분기 수준`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> 예상 순이익 감소 ${won(Math.abs(r.profitLift))}`;
      }

      refs.summary.value = [
        '[Discount Campaign Profit Lift 요약]',
        `기준 전환율: ${pct(v.baseCvr,2)} / 예상 리프트: ${pct(v.lift,1)}`,
        `주문수: ${num(r.baselineOrders,1)}건 → ${num(r.campaignOrders,1)}건`,
        `순이익: ${won(r.baselineProfit)} → ${won(r.campaignProfit)}`,
        `순이익 증감: ${won(r.profitLift)}`,
        `캠페인 비용 대비 ROI: ${Number.isFinite(r.roi) ? pct(r.roi * 100,1) : 'N/A'}`,
        `손익분기 전환율 리프트: ${Number.isFinite(r.breakEvenLift) ? pct(r.breakEvenLift,2) : 'N/A'}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.visitors, refs.baseCvr, refs.lift, refs.aov, refs.discount, refs.cogs, refs.fee, refs.campaignSpend].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
