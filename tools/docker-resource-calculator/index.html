<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docker 리소스 계산기 | Docker Memory CPU Limit Calculator</title>
  <meta name="description" content="Docker 컨테이너 메모리·CPU 제한과 요청값을 계산하세요. Kubernetes 리소스 쿼터, JVM 힙 크기, Node.js 메모리 플래그, docker-compose 설정까지 자동 생성. Docker container resource limit calculator.">
  <meta property="og:title" content="Docker 리소스 계산기 | Memory CPU Limits">
  <meta property="og:description" content="Docker/K8s 컨테이너 메모리·CPU 자동 계산. docker-compose, Kubernetes manifest 코드 생성.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eastsea.kr/tools/docker-resource-calculator/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Docker 리소스 계산기">
  <meta name="twitter:description" content="Docker 컨테이너 메모리·CPU 제한 계산기. docker-compose 및 K8s 설정 자동 생성.">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f0fdf4;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --accent-color: #16a34a;
      --accent-hover: #15803d;
      --border: #e2e8f0;
      --shadow: rgba(0,0,0,0.06);
      --card-bg: #ffffff;
      --input-bg: #ffffff;
      --code-bg: #0f172a;
      --code-text: #e2e8f0;
      --tag-bg: #dcfce7;
      --tag-text: #166534;
      --warn-bg: #fefce8;
      --warn-border: #fde047;
      --warn-text: #a16207;
      --good-bg: #f0fdf4;
      --good-border: #86efac;
    }
    [data-theme="dark"] {
      --bg-primary: #0f0f0f;
      --bg-secondary: #0a0f0a;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #1f2937;
      --shadow: rgba(0,0,0,0.4);
      --card-bg: #1a1a1a;
      --input-bg: #2a2a2a;
      --tag-bg: #14532d;
      --tag-text: #86efac;
      --warn-bg: #1c1200;
      --warn-border: #854d0e;
      --warn-text: #fde68a;
      --good-bg: #052e16;
      --good-border: #166534;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      position: sticky; top:0; z-index:100;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .header-left { display:flex; align-items:center; gap:12px; }
    .back-btn {
      text-decoration:none; color:var(--text-secondary);
      display:flex; align-items:center; gap:4px; font-weight:500;
      padding:6px 12px; border-radius:8px; border:1px solid var(--border); transition:all .2s;
    }
    .back-btn:hover { background:var(--bg-secondary); color:var(--text-primary); }
    h1 { font-size:1.1rem; font-weight:700; }
    .theme-btn {
      background:none; border:1px solid var(--border); color:var(--text-primary);
      padding:6px 12px; border-radius:8px; cursor:pointer; font-size:.85rem; transition:all .2s;
    }
    .theme-btn:hover { background:var(--bg-secondary); }

    .main { max-width:1000px; margin:0 auto; padding:24px 20px; }
    .desc { font-size:.9rem; color:var(--text-secondary); margin-bottom:24px; }

    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
    .card {
      background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:20px;
    }
    .card h2 { font-size:.95rem; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:6px; }

    .field { margin-bottom:14px; }
    .field label { display:block; font-size:.82rem; font-weight:600; color:var(--text-secondary); margin-bottom:5px; }
    .field-row { display:flex; gap:8px; align-items:center; }
    input[type=number], input[type=range], select {
      background:var(--input-bg); color:var(--text-primary);
      border:1px solid var(--border); border-radius:8px;
      padding:8px 12px; font-size:.88rem; outline:none; transition:border .2s;
    }
    input[type=number]:focus, select:focus { border-color:var(--accent-color); }
    input[type=number] { width:100px; }
    select { padding:8px 12px; }
    .unit-label { font-size:.82rem; color:var(--text-secondary); white-space:nowrap; }
    input[type=range] {
      flex:1; padding:0; height:4px; accent-color:var(--accent-color); cursor:pointer;
      border:none;
    }
    .range-val { font-size:.82rem; font-weight:600; color:var(--accent-color); min-width:40px; text-align:right; }

    /* Preset buttons */
    .preset-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
    .preset-btn {
      padding:5px 12px; border-radius:20px; font-size:.78rem; font-weight:600;
      border:1px solid var(--border); background:var(--card-bg); color:var(--text-primary);
      cursor:pointer; transition:all .2s;
    }
    .preset-btn:hover { background:var(--tag-bg); color:var(--tag-text); border-color:var(--accent-color); }

    /* Results */
    .results-card {
      background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:20px;
      margin-bottom:20px;
    }
    .results-card h2 { font-size:.95rem; font-weight:700; margin-bottom:14px; }
    .results-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:16px; }
    .result-item {
      background:var(--bg-secondary); border-radius:10px; padding:12px 14px;
    }
    .result-item .label { font-size:.75rem; color:var(--text-secondary); font-weight:600; margin-bottom:4px; }
    .result-item .value { font-size:1.05rem; font-weight:700; color:var(--accent-color); font-family:monospace; }
    .result-item .sub { font-size:.75rem; color:var(--text-secondary); margin-top:2px; }

    /* Alert */
    .alert {
      border-radius:8px; padding:10px 14px; font-size:.83rem; margin-bottom:12px;
      display:flex; align-items:flex-start; gap:8px;
    }
    .alert-warn { background:var(--warn-bg); border:1px solid var(--warn-border); color:var(--warn-text); }
    .alert-good { background:var(--good-bg); border:1px solid var(--good-border); color:#15803d; }
    [data-theme="dark"] .alert-good { color:#86efac; }

    /* Code output */
    .code-tabs { display:flex; gap:0; margin-bottom:0; border-radius:10px 10px 0 0; overflow:hidden; }
    .code-tab {
      padding:8px 18px; font-size:.82rem; font-weight:600; cursor:pointer;
      background:var(--bg-secondary); color:var(--text-secondary); border:1px solid var(--border);
      border-bottom:none; transition:all .2s;
    }
    .code-tab.active { background:var(--code-bg); color:var(--code-text); border-color:var(--code-bg); }
    .code-block {
      background:var(--code-bg); color:var(--code-text);
      border-radius:0 10px 10px 10px; padding:18px;
      font-family:'JetBrains Mono','Fira Code','Courier New',monospace;
      font-size:.82rem; line-height:1.8; white-space:pre; overflow-x:auto;
      border:1px solid var(--border);
      position:relative;
    }
    .copy-code-btn {
      position:absolute; top:10px; right:10px;
      background:rgba(255,255,255,.15); color:var(--code-text);
      border:1px solid rgba(255,255,255,.2); border-radius:6px;
      padding:4px 10px; font-size:.75rem; cursor:pointer; transition:all .2s;
    }
    .copy-code-btn:hover { background:rgba(255,255,255,.25); }

    @media(max-width:680px) {
      .grid-2 { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="/tools/" class="back-btn">← 홈</a>
    <h1>🐳 Docker 리소스 계산기</h1>
  </div>
  <button class="theme-btn" id="themeToggle">🌙 다크</button>
</header>

<div class="main">
  <p class="desc">Docker 컨테이너의 메모리·CPU 제한값을 계산하고 docker-compose 및 Kubernetes 설정 코드를 자동 생성합니다. / Calculate Docker container resource limits and generate config code.</p>

  <!-- Presets -->
  <div class="card" style="margin-bottom:20px;">
    <h2>⚡ 프리셋 / Presets</h2>
    <div class="preset-row">
      <button class="preset-btn" onclick="applyPreset('nodejs')">🟩 Node.js App</button>
      <button class="preset-btn" onclick="applyPreset('java')">☕ Java/Spring</button>
      <button class="preset-btn" onclick="applyPreset('python')">🐍 Python/FastAPI</button>
      <button class="preset-btn" onclick="applyPreset('nginx')">🌐 Nginx</button>
      <button class="preset-btn" onclick="applyPreset('postgres')">🐘 PostgreSQL</button>
      <button class="preset-btn" onclick="applyPreset('redis')">🔴 Redis</button>
      <button class="preset-btn" onclick="applyPreset('mongo')">🍃 MongoDB</button>
    </div>
  </div>

  <div class="grid-2">
    <!-- Memory -->
    <div class="card">
      <h2>💾 메모리 설정 / Memory</h2>
      <div class="field">
        <label>실제 애플리케이션 메모리 사용량 / App Memory Usage</label>
        <div class="field-row">
          <input type="number" id="appMem" value="256" min="1" max="65536">
          <span class="unit-label">MB</span>
        </div>
      </div>
      <div class="field">
        <label>버퍼/오버헤드 비율 / Buffer Overhead</label>
        <div class="field-row">
          <input type="range" id="memBuffer" min="10" max="100" value="30" oninput="document.getElementById('memBufferVal').textContent=this.value+'%'">
          <span class="range-val" id="memBufferVal">30%</span>
        </div>
      </div>
      <div class="field">
        <label>호스트 총 메모리 / Host Total Memory</label>
        <div class="field-row">
          <input type="number" id="hostMem" value="8192" min="512" max="1048576">
          <span class="unit-label">MB</span>
        </div>
      </div>
      <div class="field">
        <label>컨테이너 수 / Containers</label>
        <div class="field-row">
          <input type="number" id="containerCount" value="3" min="1" max="100">
          <span class="unit-label">개</span>
        </div>
      </div>
    </div>

    <!-- CPU -->
    <div class="card">
      <h2>⚙️ CPU 설정 / CPU</h2>
      <div class="field">
        <label>예상 CPU 사용률 / Expected CPU Usage</label>
        <div class="field-row">
          <input type="number" id="cpuUsage" value="25" min="1" max="100">
          <span class="unit-label">%</span>
        </div>
      </div>
      <div class="field">
        <label>피크 배수 / Peak Multiplier</label>
        <div class="field-row">
          <input type="range" id="cpuPeak" min="100" max="400" value="200" step="25" oninput="document.getElementById('cpuPeakVal').textContent=this.value+'%'">
          <span class="range-val" id="cpuPeakVal">200%</span>
        </div>
      </div>
      <div class="field">
        <label>호스트 CPU 코어 / Host CPU Cores</label>
        <div class="field-row">
          <input type="number" id="hostCpuCores" value="4" min="1" max="256">
          <span class="unit-label">cores</span>
        </div>
      </div>
      <div class="field">
        <label>런타임 / Runtime</label>
        <select id="runtime">
          <option value="nodejs">Node.js</option>
          <option value="java">Java (JVM)</option>
          <option value="python">Python</option>
          <option value="go">Go</option>
          <option value="rust">Rust</option>
          <option value="other">기타 / Other</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="results-card" id="resultsCard">
    <h2>📊 계산 결과 / Results</h2>
    <div class="results-grid" id="resultsGrid"></div>
    <div id="alertBox"></div>
  </div>

  <!-- Code output -->
  <div class="results-card">
    <h2>📋 설정 코드 / Config Code</h2>
    <div class="code-tabs">
      <button class="code-tab active" data-tab="compose" onclick="switchTab(this,'compose')">docker-compose</button>
      <button class="code-tab" data-tab="k8s" onclick="switchTab(this,'k8s')">Kubernetes</button>
      <button class="code-tab" data-tab="run" onclick="switchTab(this,'run')">docker run</button>
      <button class="code-tab" data-tab="runtime" onclick="switchTab(this,'runtime')">런타임 플래그</button>
    </div>
    <div class="code-block" id="codeBlock">
      <button class="copy-code-btn" onclick="copyCode()">📋 복사</button>
      <span id="codeContent"></span>
    </div>
  </div>
</div>

<script src="/assets/analytics.js"></script>
<script>
// ── Theme ──────────────────────────────────────────────────────────
const themeBtn = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
themeBtn.textContent = savedTheme === 'dark' ? '☀️ 라이트' : '🌙 다크';
themeBtn.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  themeBtn.textContent = next === 'dark' ? '☀️ 라이트' : '🌙 다크';
});

// ── Presets ────────────────────────────────────────────────────────
const PRESETS = {
  nodejs:   { appMem:256,  memBuffer:30, hostMem:8192, containerCount:3, cpuUsage:25, cpuPeak:200, hostCpuCores:4, runtime:'nodejs' },
  java:     { appMem:512,  memBuffer:50, hostMem:8192, containerCount:2, cpuUsage:30, cpuPeak:300, hostCpuCores:4, runtime:'java' },
  python:   { appMem:256,  memBuffer:40, hostMem:8192, containerCount:4, cpuUsage:20, cpuPeak:200, hostCpuCores:4, runtime:'python' },
  nginx:    { appMem:64,   memBuffer:20, hostMem:8192, containerCount:2, cpuUsage:10, cpuPeak:150, hostCpuCores:4, runtime:'other' },
  postgres: { appMem:512,  memBuffer:60, hostMem:8192, containerCount:1, cpuUsage:40, cpuPeak:300, hostCpuCores:4, runtime:'other' },
  redis:    { appMem:256,  memBuffer:20, hostMem:8192, containerCount:1, cpuUsage:10, cpuPeak:150, hostCpuCores:4, runtime:'other' },
  mongo:    { appMem:512,  memBuffer:50, hostMem:8192, containerCount:1, cpuUsage:30, cpuPeak:250, hostCpuCores:4, runtime:'other' },
};

function applyPreset(key) {
  const p = PRESETS[key];
  document.getElementById('appMem').value = p.appMem;
  document.getElementById('memBuffer').value = p.memBuffer;
  document.getElementById('memBufferVal').textContent = p.memBuffer + '%';
  document.getElementById('hostMem').value = p.hostMem;
  document.getElementById('containerCount').value = p.containerCount;
  document.getElementById('cpuUsage').value = p.cpuUsage;
  document.getElementById('cpuPeak').value = p.cpuPeak;
  document.getElementById('cpuPeakVal').textContent = p.cpuPeak + '%';
  document.getElementById('hostCpuCores').value = p.hostCpuCores;
  document.getElementById('runtime').value = p.runtime;
  calculate();
}

// ── Calculation ────────────────────────────────────────────────────
let currentTab = 'compose';
let calcState = {};

function roundToNice(mb) {
  const nice = [32,64,128,192,256,384,512,768,1024,1280,1536,2048,3072,4096,6144,8192];
  return nice.find(v => v >= mb) || Math.ceil(mb / 256) * 256;
}

function fmtMem(mb) {
  if (mb >= 1024) return (mb/1024).toFixed(mb%1024===0?0:2) + 'G';
  return mb + 'M';
}

function calculate() {
  const appMem    = parseFloat(document.getElementById('appMem').value) || 256;
  const buffer    = parseFloat(document.getElementById('memBuffer').value) / 100 || 0.3;
  const hostMem   = parseFloat(document.getElementById('hostMem').value) || 8192;
  const count     = parseFloat(document.getElementById('containerCount').value) || 1;
  const cpuPct    = parseFloat(document.getElementById('cpuUsage').value) || 25;
  const peakMult  = parseFloat(document.getElementById('cpuPeak').value) / 100 || 2;
  const hostCores = parseFloat(document.getElementById('hostCpuCores').value) || 4;
  const runtime   = document.getElementById('runtime').value;

  // Memory calculations
  const memLimit = roundToNice(Math.ceil(appMem * (1 + buffer)));
  const memRequest = roundToNice(Math.ceil(appMem * 0.8));
  const totalMemUsed = memLimit * count;
  const memUsagePct = Math.round(totalMemUsed / hostMem * 100);

  // CPU calculations (in millicores)
  const baseCpu = Math.round(hostCores * (cpuPct / 100) * 1000 / count);
  const cpuLimit = Math.round(baseCpu * peakMult);
  const cpuRequest = Math.round(baseCpu * 0.75);
  const totalCpuUsed = cpuLimit * count / 1000;

  // JVM heap (70% of limit)
  const jvmHeap = Math.round(memLimit * 0.70);

  calcState = { appMem, memLimit, memRequest, hostMem, count, cpuPct, cpuLimit, cpuRequest,
                hostCores, totalMemUsed, memUsagePct, totalCpuUsed, jvmHeap, runtime, buffer };

  // Render results
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = `
    <div class="result-item">
      <div class="label">메모리 제한 / Memory Limit</div>
      <div class="value">${fmtMem(memLimit)}</div>
      <div class="sub">${memLimit} MB</div>
    </div>
    <div class="result-item">
      <div class="label">메모리 요청 / Memory Request</div>
      <div class="value">${fmtMem(memRequest)}</div>
      <div class="sub">K8s requests.memory</div>
    </div>
    <div class="result-item">
      <div class="label">CPU 제한 / CPU Limit</div>
      <div class="value">${cpuLimit}m</div>
      <div class="sub">${(cpuLimit/1000).toFixed(2)} cores</div>
    </div>
    <div class="result-item">
      <div class="label">CPU 요청 / CPU Request</div>
      <div class="value">${cpuRequest}m</div>
      <div class="sub">K8s requests.cpu</div>
    </div>
    <div class="result-item">
      <div class="label">총 메모리 사용 / Total Memory</div>
      <div class="value">${fmtMem(totalMemUsed)}</div>
      <div class="sub">${memUsagePct}% of host (${fmtMem(hostMem)})</div>
    </div>
    <div class="result-item">
      <div class="label">총 CPU 사용 / Total CPU</div>
      <div class="value">${totalCpuUsed.toFixed(1)} cores</div>
      <div class="sub">of ${hostCores} host cores</div>
    </div>
    ${runtime === 'java' ? `
    <div class="result-item">
      <div class="label">JVM 힙 크기 / JVM Heap</div>
      <div class="value">${jvmHeap}M</div>
      <div class="sub">-Xmx${jvmHeap}m -Xms${Math.round(jvmHeap*0.5)}m</div>
    </div>` : ''}
    ${runtime === 'nodejs' ? `
    <div class="result-item">
      <div class="label">Node.js 힙 / Node Heap</div>
      <div class="value">${Math.round(memLimit*0.75)}M</div>
      <div class="sub">--max-old-space-size=${Math.round(memLimit*0.75)}</div>
    </div>` : ''}
  `;

  // Alerts
  const alerts = [];
  if (memUsagePct > 80) {
    alerts.push({ type:'warn', msg:`⚠️ ${count}개 컨테이너 총 메모리(${fmtMem(totalMemUsed)})가 호스트의 ${memUsagePct}%입니다. OOM 위험! / ${count} containers use ${memUsagePct}% of host memory — OOM risk!` });
  } else {
    alerts.push({ type:'good', msg:`✅ 메모리 사용률 ${memUsagePct}% — 안전 범위 (권장: < 80%) / Memory usage ${memUsagePct}% is within safe range.` });
  }
  if (totalCpuUsed > hostCores * 0.8) {
    alerts.push({ type:'warn', msg:`⚠️ 총 CPU 제한(${totalCpuUsed.toFixed(1)} cores)이 호스트의 ${Math.round(totalCpuUsed/hostCores*100)}%입니다. CPU throttling 가능. / CPU over-allocation risk.` });
  }

  document.getElementById('alertBox').innerHTML = alerts.map(a =>
    `<div class="alert alert-${a.type}">${a.msg}</div>`
  ).join('');

  updateCode();
}

// ── Code generation ────────────────────────────────────────────────
function switchTab(btn, tab) {
  document.querySelectorAll('.code-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = tab;
  updateCode();
}

function updateCode() {
  const s = calcState;
  if (!s.memLimit) return;
  let code = '';

  if (currentTab === 'compose') {
    let runtimeFlags = '';
    if (s.runtime === 'java') runtimeFlags = `\n      environment:\n        - JAVA_OPTS=-Xms${Math.round(s.jvmHeap*0.5)}m -Xmx${s.jvmHeap}m -XX:+UseContainerSupport`;
    if (s.runtime === 'nodejs') runtimeFlags = `\n      environment:\n        - NODE_OPTIONS=--max-old-space-size=${Math.round(s.memLimit*0.75)}`;
    code = `version: '3.8'
services:
  app:
    image: your-app:latest
    deploy:
      resources:
        limits:
          memory: ${fmtMem(s.memLimit)}
          cpus: '${(s.cpuLimit/1000).toFixed(2)}'
        reservations:
          memory: ${fmtMem(s.memRequest)}
          cpus: '${(s.cpuRequest/1000).toFixed(2)}'${runtimeFlags}
    restart: unless-stopped`;
  } else if (currentTab === 'k8s') {
    code = `apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: ${s.count}
  template:
    spec:
      containers:
        - name: app
          image: your-app:latest
          resources:
            requests:
              memory: "${fmtMem(s.memRequest)}"
              cpu: "${s.cpuRequest}m"
            limits:
              memory: "${fmtMem(s.memLimit)}"
              cpu: "${s.cpuLimit}m"`;
    if (s.runtime === 'java') {
      code += `\n          env:\n            - name: JAVA_OPTS\n              value: "-Xms${Math.round(s.jvmHeap*0.5)}m -Xmx${s.jvmHeap}m -XX:+UseContainerSupport"`;
    }
    if (s.runtime === 'nodejs') {
      code += `\n          env:\n            - name: NODE_OPTIONS\n              value: "--max-old-space-size=${Math.round(s.memLimit*0.75)}"`;
    }
  } else if (currentTab === 'run') {
    code = `docker run \\
  --memory=${fmtMem(s.memLimit)} \\
  --memory-reservation=${fmtMem(s.memRequest)} \\
  --cpus=${(s.cpuLimit/1000).toFixed(2)} \\
  --cpu-shares=${Math.round(s.cpuRequest/1000*1024)} \\`;
    if (s.runtime === 'java') code += `\n  -e JAVA_OPTS="-Xms${Math.round(s.jvmHeap*0.5)}m -Xmx${s.jvmHeap}m" \\`;
    if (s.runtime === 'nodejs') code += `\n  -e NODE_OPTIONS="--max-old-space-size=${Math.round(s.memLimit*0.75)}" \\`;
    code += `\n  your-app:latest`;
  } else if (currentTab === 'runtime') {
    if (s.runtime === 'java') {
      code = `# JVM 메모리 플래그 / JVM Memory Flags
JAVA_OPTS="-Xms${Math.round(s.jvmHeap*0.5)}m -Xmx${s.jvmHeap}m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

# 또는 / Or with container-aware settings:
JAVA_OPTS="-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"

# GC 최적화 (권장) / GC tuning (recommended):
JAVA_OPTS+=" -XX:+UseG1GC -XX:MaxGCPauseMillis=200"`;
    } else if (s.runtime === 'nodejs') {
      code = `# Node.js 메모리 플래그 / Node.js Memory Flags
NODE_OPTIONS="--max-old-space-size=${Math.round(s.memLimit*0.75)}"

# package.json 시작 스크립트 / Start script:
"start": "node --max-old-space-size=${Math.round(s.memLimit*0.75)} src/index.js"

# 메모리 사용량 확인 / Check memory:
node -e "console.log(process.memoryUsage())"`;
    } else if (s.runtime === 'python') {
      code = `# Python 메모리 최적화 / Python Memory Hints
# Gunicorn workers 수 (공식: 2*CPU+1)
workers = ${Math.max(1, s.hostCores * 2 + 1)}
# worker_class = 'uvicorn.workers.UvicornWorker'  # for FastAPI/async

# 메모리 제한 (MB) / Memory limit:
# ${fmtMem(s.memLimit)} → ${s.memLimit} MB per container

# ulimit 설정 / ulimit:
ulimit -v ${s.memLimit * 1024}  # virtual memory in KB`;
    } else {
      code = `# 컨테이너 메모리 사용량 확인 / Check container memory:
docker stats --no-stream --format "table {{.Name}}\\t{{.MemUsage}}\\t{{.CPUPerc}}"

# 현재 컨테이너 제한 확인 / Inspect limits:
docker inspect <container> | grep -i memory

# 메모리 이벤트 확인 / Check OOM events:
docker events --filter event=oom`;
    }
  }

  document.getElementById('codeContent').textContent = code;
}

function fmtMem(mb) {
  if (mb >= 1024 && mb % 1024 === 0) return (mb/1024) + 'G';
  if (mb >= 1024) return (mb/1024).toFixed(2) + 'G';
  return mb + 'M';
}

function copyCode() {
  const code = document.getElementById('codeContent').textContent;
  navigator.clipboard.writeText(code);
  const btn = event.target;
  btn.textContent = '✅ 복사됨!';
  setTimeout(() => btn.textContent = '📋 복사', 1500);
}

// ── Event listeners ────────────────────────────────────────────────
['appMem','hostMem','containerCount','cpuUsage','hostCpuCores'].forEach(id => {
  document.getElementById(id).addEventListener('input', calculate);
});
document.getElementById('memBuffer').addEventListener('input', calculate);
document.getElementById('cpuPeak').addEventListener('input', calculate);
document.getElementById('runtime').addEventListener('change', calculate);

calculate();
</script>
</body>
</html>
