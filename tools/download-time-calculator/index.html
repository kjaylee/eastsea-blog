<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>다운로드 시간 계산기 | Download Time Calculator</title>
  <meta name="description" content="파일 크기와 네트워크 속도로 다운로드/업로드 예상 시간을 계산하세요.">
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --panel-soft: #171736;
      --line: #2a2a52;
      --text: #e9eeff;
      --muted: #9aa3c7;
      --cyan: #25d0ff;
      --violet: #a855f7;
      --green: #2dd4bf;
      --danger: #fb7185;
      --shadow: 0 0 0 1px rgba(37, 208, 255, 0.12), 0 0 24px rgba(37, 208, 255, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 10% 0%, #161634 0%, var(--bg) 45%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding: 20px 16px 40px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.92rem;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(18, 18, 42, 0.7);
    }

    h1 {
      margin: 10px 0 6px;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.01em;
      text-shadow: 0 0 12px rgba(37, 208, 255, 0.35);
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(18, 18, 42, 0.94), rgba(12, 12, 28, 0.94));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 650;
      margin-bottom: 6px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 8px;
    }

    input, select, button {
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      font-size: 1rem;
      padding: 10px 12px;
    }

    input:focus, select:focus, button:focus {
      outline: 2px solid var(--cyan);
      outline-offset: 1px;
      border-color: var(--cyan);
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .chip {
      background: rgba(37, 208, 255, 0.1);
      color: #b8f4ff;
      border: 1px solid rgba(37, 208, 255, 0.35);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 8px 12px;
    }

    .chip:active { transform: translateY(1px); }

    .slider-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      width: 100%;
      min-height: 34px;
      padding: 0;
      accent-color: var(--cyan);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      background: rgba(23, 23, 54, 0.72);
      border-radius: 12px;
      padding: 12px;
    }

    .metric-label {
      display: block;
      font-size: 0.76rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .metric-value {
      display: block;
      font-size: clamp(1.05rem, 3.6vw, 1.45rem);
      font-weight: 800;
      color: var(--cyan);
      word-break: break-word;
    }

    .metric-value.violet { color: #d4b4ff; text-shadow: 0 0 10px rgba(168, 85, 247, 0.35); }
    .metric-value.green { color: #77f7dd; }

    .timeline {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .step {
      display: grid;
      grid-template-columns: 70px 1fr;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(122, 136, 184, 0.18);
      border: 1px solid rgba(122, 136, 184, 0.3);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--violet), var(--cyan));
      width: 0;
    }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .danger { color: var(--danger); }

    @media (max-width: 560px) {
      .metric-grid { grid-template-columns: 1fr; }
      .input-row { grid-template-columns: 1fr 120px; }
      .step { grid-template-columns: 62px 1fr; }
    }
  </style>
  <!-- Analytics: GA4 + Clarity -->
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <a class="back-link" href="../">← 도구 목록</a>
    </div>

    <h1>⚡ 다운로드 시간 계산기</h1>
    <p class="subtitle">파일 용량 + 네트워크 속도 + 효율(오버헤드)로 다운로드/업로드 예상 시간을 계산합니다.</p>

    <section class="card grid" aria-label="입력 폼">
      <div class="field">
        <label for="sizeValue">파일 크기</label>
        <div class="input-row">
          <input id="sizeValue" type="number" min="0" step="any" value="1.5" inputmode="decimal" />
          <select id="sizeUnit">
            <option value="B">Bytes</option>
            <option value="KB">KB</option>
            <option value="MB">MB</option>
            <option value="GB" selected>GB</option>
            <option value="TB">TB</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="speedValue">회선 속도</label>
        <div class="input-row">
          <input id="speedValue" type="number" min="0" step="any" value="100" inputmode="decimal" />
          <select id="speedUnit">
            <option value="Kbps">Kbps</option>
            <option value="Mbps" selected>Mbps</option>
            <option value="Gbps">Gbps</option>
            <option value="KBps">KB/s</option>
            <option value="MBps">MB/s</option>
            <option value="GBps">GB/s</option>
          </select>
        </div>
        <div class="presets" role="group" aria-label="속도 프리셋">
          <button class="chip" data-speed="10" data-unit="Mbps" type="button">4G (10 Mbps)</button>
          <button class="chip" data-speed="100" data-unit="Mbps" type="button">Wi-Fi (100 Mbps)</button>
          <button class="chip" data-speed="500" data-unit="Mbps" type="button">5G (500 Mbps)</button>
          <button class="chip" data-speed="1" data-unit="Gbps" type="button">광랜 (1 Gbps)</button>
          <button class="chip" data-speed="2.5" data-unit="Gbps" type="button">2.5G LAN</button>
        </div>
      </div>

      <div class="field">
        <label for="efficiency">실효 효율 (프로토콜/혼잡 반영)</label>
        <div class="slider-row">
          <input id="efficiency" type="range" min="50" max="100" value="92" />
          <strong id="efficiencyLabel">92%</strong>
        </div>
      </div>
    </section>

    <section class="card" aria-live="polite" aria-label="계산 결과">
      <div class="metric-grid">
        <div class="metric">
          <span class="metric-label">예상 소요 시간</span>
          <span id="timeText" class="metric-value violet">-</span>
        </div>
        <div class="metric">
          <span class="metric-label">완료 시각</span>
          <span id="finishText" class="metric-value">-</span>
        </div>
        <div class="metric">
          <span class="metric-label">실효 속도</span>
          <span id="effectiveSpeed" class="metric-value green">-</span>
        </div>
        <div class="metric">
          <span class="metric-label">총 전송량</span>
          <span id="sizeText" class="metric-value">-</span>
        </div>
      </div>
      <p id="warning" class="hint"></p>
    </section>

    <section class="card" aria-label="진행률 타임라인">
      <strong style="display:block; margin-bottom:8px;">진행률 타임라인</strong>
      <div class="timeline" id="timeline"></div>
      <p class="hint">* 실효 효율은 무선 간섭, 서버 상태, RTT, 패킷 손실 등 현실 조건을 단순 반영한 값입니다.</p>
    </section>
  </main>

  <script>
    const sizeValueEl = document.getElementById('sizeValue');
    const sizeUnitEl = document.getElementById('sizeUnit');
    const speedValueEl = document.getElementById('speedValue');
    const speedUnitEl = document.getElementById('speedUnit');
    const efficiencyEl = document.getElementById('efficiency');
    const efficiencyLabelEl = document.getElementById('efficiencyLabel');

    const timeTextEl = document.getElementById('timeText');
    const finishTextEl = document.getElementById('finishText');
    const effectiveSpeedEl = document.getElementById('effectiveSpeed');
    const sizeTextEl = document.getElementById('sizeText');
    const timelineEl = document.getElementById('timeline');
    const warningEl = document.getElementById('warning');

    const sizeUnits = {
      B: 1,
      KB: 1e3,
      MB: 1e6,
      GB: 1e9,
      TB: 1e12
    };

    const speedUnitsToBps = {
      Kbps: 1e3 / 8,
      Mbps: 1e6 / 8,
      Gbps: 1e9 / 8,
      KBps: 1e3,
      MBps: 1e6,
      GBps: 1e9
    };

    function formatNumber(num, frac = 2) {
      return Number(num).toLocaleString('ko-KR', { maximumFractionDigits: frac });
    }

    function formatBytes(bytes) {
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let value = bytes;
      let idx = 0;
      while (value >= 1000 && idx < units.length - 1) {
        value /= 1000;
        idx += 1;
      }
      return `${formatNumber(value, value < 10 ? 3 : 2)} ${units[idx]}`;
    }

    function formatDuration(seconds) {
      if (!isFinite(seconds) || seconds < 0) return '-';
      if (seconds < 1) return `${Math.round(seconds * 1000)} ms`;

      const s = Math.round(seconds);
      const d = Math.floor(s / 86400);
      const h = Math.floor((s % 86400) / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;

      const parts = [];
      if (d) parts.push(`${d}일`);
      if (h || d) parts.push(`${h}시간`);
      if (m || h || d) parts.push(`${m}분`);
      parts.push(`${sec}초`);
      return parts.join(' ');
    }

    function formatClock(date) {
      return date.toLocaleString('ko-KR', {
        month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
    }

    function updateTimeline(totalSeconds) {
      const marks = [25, 50, 75, 100];
      timelineEl.innerHTML = '';
      const now = Date.now();

      marks.forEach((mark) => {
        const sec = totalSeconds * (mark / 100);
        const finish = new Date(now + sec * 1000);

        const row = document.createElement('div');
        row.className = 'step';
        row.innerHTML = `
          <strong>${mark}%</strong>
          <div>
            <div class="bar"><span style="width:${mark}%"></span></div>
            <div class="hint">${formatClock(finish)} · ${formatDuration(sec)}</div>
          </div>
        `;
        timelineEl.appendChild(row);
      });
    }

    function calculate() {
      const sizeValue = parseFloat(sizeValueEl.value);
      const speedValue = parseFloat(speedValueEl.value);
      const sizeUnit = sizeUnitEl.value;
      const speedUnit = speedUnitEl.value;
      const efficiency = parseFloat(efficiencyEl.value);

      efficiencyLabelEl.textContent = `${efficiency}%`;
      warningEl.textContent = '';
      warningEl.classList.remove('danger');

      if (!(sizeValue > 0) || !(speedValue > 0)) {
        timeTextEl.textContent = '-';
        finishTextEl.textContent = '-';
        effectiveSpeedEl.textContent = '-';
        sizeTextEl.textContent = '-';
        timelineEl.innerHTML = '';
        warningEl.textContent = '파일 크기와 속도는 0보다 크게 입력해 주세요.';
        warningEl.classList.add('danger');
        return;
      }

      const totalBytes = sizeValue * sizeUnits[sizeUnit];
      const rawBps = speedValue * speedUnitsToBps[speedUnit];
      const effectiveBps = rawBps * (efficiency / 100);
      const totalSeconds = totalBytes / effectiveBps;

      const finish = new Date(Date.now() + totalSeconds * 1000);
      const effectiveMbps = effectiveBps * 8 / 1e6;
      const effectiveMBps = effectiveBps / 1e6;

      timeTextEl.textContent = formatDuration(totalSeconds);
      finishTextEl.textContent = formatClock(finish);
      effectiveSpeedEl.textContent = `${formatNumber(effectiveMbps, 2)} Mbps (${formatNumber(effectiveMBps, 2)} MB/s)`;
      sizeTextEl.textContent = formatBytes(totalBytes);

      if (totalSeconds > 86400 * 3) {
        warningEl.textContent = '예상 소요가 3일 이상입니다. 파일 분할/압축 또는 더 빠른 회선을 고려해 주세요.';
        warningEl.classList.add('danger');
      }

      updateTimeline(totalSeconds);
    }

    document.querySelectorAll('input, select').forEach((el) => {
      el.addEventListener('input', calculate);
      el.addEventListener('change', calculate);
    });

    document.querySelectorAll('.chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        speedValueEl.value = chip.dataset.speed;
        speedUnitEl.value = chip.dataset.unit;
        calculate();
      });
    });

    calculate();
  </script>
</body>
</html>
