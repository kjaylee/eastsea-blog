<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dunning Recovery Revenue Calculator | 결제 실패 회수 매출 계산기</title>
  <meta name="description" content="구독 결제 실패 회수율 개선 시 월/연 순효과, ROI, 회수기간, 손익분기 목표 회수율을 계산하는 수익화 도구" />
  <style>
    :root{--bg:#11110b;--card:#282416;--line:#4a4125;--txt:#fff9e8;--muted:#e0d4ac;--pri:#f6c453;--soft:#312a18;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#5b4c1f 0%,#11110b 54%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.6vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#fff2cc;background:#2b2516;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:linear-gradient(165deg,#342e1a,#282416);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#1a170f;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#d79d2f);font-weight:700;color:#181307}
    .soft{background:var(--soft);border:1px solid var(--line);color:var(--txt)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#211d12;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.98rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#352d18;color:#ffeebf;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>💳 결제 실패 회수 매출 계산기</h1>
        <div class="sub">Dunning 회수율 개선이 만드는 추가 매출/이익과 ROI, 손익분기 목표 회수율을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="failed">월 결제 실패 건수</label><input id="failed" type="number" min="1" step="1" value="6800" /></div>
          <div><label for="arpu">회수 1건당 월 구독금액 (KRW)</label><input id="arpu" type="number" min="1" value="29000" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="1" max="95" step="0.1" value="78" /></div>
          <div><label for="currentRecovery">현재 회수율 (%)</label><input id="currentRecovery" type="number" min="0" max="100" step="0.1" value="34" /></div>
          <div><label for="targetRecovery">목표 회수율 (%)</label><input id="targetRecovery" type="number" min="0" max="100" step="0.1" value="47" /></div>
          <div><label for="retainedMonths">회수 고객 평균 유지 개월</label><input id="retainedMonths" type="number" min="1" max="60" step="0.1" value="6" /></div>
          <div><label for="platformCost">Dunning 툴 월 비용 (KRW)</label><input id="platformCost" type="number" min="0" value="3600000" /></div>
          <div><label for="opsCost">운영 인건비 월 비용 (KRW)</label><input id="opsCost" type="number" min="0" value="1800000" /></div>
          <div><label for="setupCost">초기 구축비 (KRW)</label><input id="setupCost" type="number" min="0" value="5500000" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 순효과</div><div id="annualNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">추가 회수 건수(월)</div><div id="extraRecovered" class="v sm">-</div></div>
          <div class="kpi"><div class="k">추가 총이익(월)</div><div id="extraGrossProfit" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>현재 회수 건수(월)</th><td id="currentRecovered">-</td></tr>
            <tr><th>목표 회수 건수(월)</th><td id="targetRecovered">-</td></tr>
            <tr><th>추가 회수 매출(월)</th><td id="extraRevenue">-</td></tr>
            <tr><th>LTV 총이익(추가 회수분)</th><td id="ltvGross">-</td></tr>
            <tr><th>손익분기 목표 회수율</th><td id="breakEvenRecovery">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      failed:$("failed"), arpu:$("arpu"), margin:$("margin"), currentRecovery:$("currentRecovery"), targetRecovery:$("targetRecovery"), retainedMonths:$("retainedMonths"),
      platformCost:$("platformCost"), opsCost:$("opsCost"), setupCost:$("setupCost"),
      monthlyNet:$("monthlyNet"), annualNet:$("annualNet"), roi:$("roi"), payback:$("payback"), extraRecovered:$("extraRecovered"), extraGrossProfit:$("extraGrossProfit"),
      currentRecovered:$("currentRecovered"), targetRecovered:$("targetRecovered"), extraRevenue:$("extraRevenue"), ltvGross:$("ltvGross"), breakEvenRecovery:$("breakEvenRecovery"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { failed:6800, arpu:29000, margin:78, currentRecovery:34, targetRecovery:47, retainedMonths:6, platformCost:3600000, opsCost:1800000, setupCost:5500000 };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.failed) || v.failed < 1 || v.failed > 1e8) return "월 결제 실패 건수는 1~100,000,000 범위여야 합니다.";
      if (!Number.isFinite(v.arpu) || v.arpu <= 0) return "회수 1건당 월 구독금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 95) return "매출총이익률은 0~95% 범위여야 합니다.";
      if (!Number.isFinite(v.currentRecovery) || v.currentRecovery < 0 || v.currentRecovery > 100) return "현재 회수율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.targetRecovery) || v.targetRecovery < 0 || v.targetRecovery > 100) return "목표 회수율은 0~100% 범위여야 합니다.";
      if (v.targetRecovery < v.currentRecovery) return "목표 회수율은 현재 회수율 이상이어야 합니다.";
      if (!Number.isFinite(v.retainedMonths) || v.retainedMonths <= 0 || v.retainedMonths > 60) return "평균 유지 개월은 0~60 범위여야 합니다.";
      if (!Number.isFinite(v.platformCost) || v.platformCost < 0) return "Dunning 툴 월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.opsCost) || v.opsCost < 0) return "운영 인건비 월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "초기 구축비는 0 이상이어야 합니다.";
      return "";
    }

    function compute(v){
      const margin = v.margin / 100;
      const currentRecovered = v.failed * (v.currentRecovery / 100);
      const targetRecovered = v.failed * (v.targetRecovery / 100);
      const extraRecovered = targetRecovered - currentRecovered;

      const extraRevenue = extraRecovered * v.arpu;
      const extraGrossProfit = extraRevenue * margin;
      const ltvGross = extraRecovered * v.arpu * v.retainedMonths * margin;

      const monthlyCost = v.platformCost + v.opsCost;
      const monthlyNet = extraGrossProfit - monthlyCost;
      const annualCost = monthlyCost * 12 + v.setupCost;
      const annualNet = extraGrossProfit * 12 - annualCost;

      const roi = annualCost === 0 ? (annualNet >= 0 ? Infinity : -Infinity) : (annualNet / annualCost) * 100;
      const payback = monthlyNet > 0 ? (v.setupCost > 0 ? v.setupCost / monthlyNet : 0) : Infinity;

      const unitGross = v.failed * v.arpu * margin;
      const requiredLift = unitGross > 0 ? ((monthlyCost + v.setupCost / 12) / unitGross) * 100 : Infinity;
      const breakEvenRecovery = Number.isFinite(requiredLift) ? v.currentRecovery + requiredLift : Infinity;

      return { currentRecovered, targetRecovered, extraRecovered, extraRevenue, extraGrossProfit, ltvGross, monthlyNet, annualNet, roi, payback, breakEvenRecovery };
    }

    function resetOutputs(){
      ["monthlyNet","annualNet","roi","payback","extraRecovered","extraGrossProfit","currentRecovered","targetRecovered","extraRevenue","ltvGross","breakEvenRecovery"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        failed:Number(refs.failed.value), arpu:Number(refs.arpu.value), margin:Number(refs.margin.value), currentRecovery:Number(refs.currentRecovery.value), targetRecovery:Number(refs.targetRecovery.value),
        retainedMonths:Number(refs.retainedMonths.value), platformCost:Number(refs.platformCost.value), opsCost:Number(refs.opsCost.value), setupCost:Number(refs.setupCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.annualNet.textContent = money(r.annualNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가";
      refs.extraRecovered.textContent = `${num(r.extraRecovered,0)}건`;
      refs.extraGrossProfit.textContent = money(r.extraGrossProfit);
      refs.currentRecovered.textContent = `${num(r.currentRecovered,0)}건`;
      refs.targetRecovered.textContent = `${num(r.targetRecovered,0)}건`;
      refs.extraRevenue.textContent = money(r.extraRevenue);
      refs.ltvGross.textContent = money(r.ltvGross);
      refs.breakEvenRecovery.textContent = Number.isFinite(r.breakEvenRecovery) ? `${num(r.breakEvenRecovery,2)}%` : "계산 불가";

      refs.status.innerHTML = r.annualNet >= 0
        ? `<span class="ok">●</span> 연간 ${money(r.annualNet)} 순효과`
        : `<span class="warn">●</span> 연간 ${money(Math.abs(r.annualNet))} 순손실`;

      refs.summary.value = [
        "[Dunning Recovery Revenue 요약]",
        `현재 회수 건수(월): ${num(r.currentRecovered,0)}건`,
        `목표 회수 건수(월): ${num(r.targetRecovered,0)}건`,
        `추가 회수 건수(월): ${num(r.extraRecovered,0)}건`,
        `추가 회수 매출(월): ${money(r.extraRevenue)}`,
        `추가 총이익(월): ${money(r.extraGrossProfit)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `연 순효과: ${money(r.annualNet)}`,
        `연 ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `손익분기 목표 회수율: ${Number.isFinite(r.breakEvenRecovery) ? `${num(r.breakEvenRecovery,2)}%` : "계산 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.failed,refs.arpu,refs.margin,refs.currentRecovery,refs.targetRecovery,refs.retainedMonths,refs.platformCost,refs.opsCost,refs.setupCost].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
