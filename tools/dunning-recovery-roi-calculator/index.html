<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dunning Recovery ROI Calculator | 결제실패 회수 ROI 계산기</title>
  <meta name="description" content="구독 결제실패(인볼런터리 이탈) 회수 전략의 재무 효과를 계산합니다. 회수율 개선, 순월간효과, 회수기간, NPV, 손익분기 회수율을 제공합니다." />
  <style>
    :root{--bg:#0b1020;--card:#141b34;--line:#2b3a67;--txt:#eef2ff;--muted:#a8b4dd;--pri:#38bdf8;--ok:#22c55e;--warn:#f59e0b}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at top,#1f2a4f 0%,#0b1020 52%);color:var(--txt)}
    .wrap{max-width:1060px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#dbeafe;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#1c2546;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#1f2950,#141b34);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;border-radius:10px;border:1px solid var(--line);background:#111833;color:var(--txt);padding:10px;font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,#38bdf8,#0ea5e9);font-weight:700}
    .soft{background:#202b53;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:104px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f1d1d;background:rgba(248,113,113,.14);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{padding:10px;border:1px solid var(--line);border-radius:10px;background:#0f1630}
    .k{font-size:.75rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.05rem;font-weight:800}
    .pill{display:inline-flex;gap:6px;align-items:center;margin-top:10px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#1d2850;color:#dbeafe;font-size:.78rem}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>💳 결제실패 회수 ROI 계산기</h1>
        <div class="sub">Dunning 도입으로 인볼런터리 이탈을 얼마나 줄이고 이익을 늘릴지 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="mrrAtRisk">월 결제실패 위험 MRR (KRW)</label><input id="mrrAtRisk" type="number" min="1" value="120000000" /></div>
          <div><label for="currentRecovery">현재 회수율 (%)</label><input id="currentRecovery" type="number" min="0" max="100" step="0.1" value="42" /></div>
          <div><label for="targetRecovery">목표 회수율 (%)</label><input id="targetRecovery" type="number" min="0" max="100" step="0.1" value="61" /></div>
          <div><label for="grossMargin">매출총이익률 (%)</label><input id="grossMargin" type="number" min="1" max="100" step="0.1" value="78" /></div>
          <div><label for="savedChurnMRR">추가 방어 이탈 MRR (KRW/월)</label><input id="savedChurnMRR" type="number" min="0" value="9000000" /></div>
          <div><label for="toolCost">월 Dunning 툴 비용 (KRW)</label><input id="toolCost" type="number" min="0" value="3500000" /></div>
          <div><label for="implementationCost">초기 도입비 (KRW)</label><input id="implementationCost" type="number" min="0" value="19000000" /></div>
          <div><label for="analysisMonths">분석 기간 (개월)</label><input id="analysisMonths" type="number" min="1" max="36" value="12" /></div>
          <div><label for="annualDiscountRate">연 할인율 (%)</label><input id="annualDiscountRate" type="number" min="0" max="40" step="0.1" value="10" /></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">증가 회수 MRR</div><div id="incRecovered" class="v">-</div></div>
          <div class="kpi"><div class="k">순 월간 효과</div><div id="netMonthly" class="v">-</div></div>
          <div class="kpi"><div class="k">기간 누적 순효과</div><div id="totalNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI (도입비 기준)</div><div id="roi" class="v">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v">-</div></div>
          <div class="kpi"><div class="k">손익분기 회수율 uplift</div><div id="beUplift" class="v">-</div></div>
        </div>
        <div id="status" class="pill">계산 대기 중</div>

        <h2 style="margin-top:12px">세부 지표</h2>
        <table>
          <tbody>
            <tr><th>회수율 개선 폭</th><td id="recoveryDelta">-</td></tr>
            <tr><th>월간 총편익(이익 기준)</th><td id="grossMonthlyBenefit">-</td></tr>
            <tr><th>NPV (분석기간)</th><td id="npv">-</td></tr>
            <tr><th>월 툴 비용</th><td id="toolCostOut">-</td></tr>
            <tr><th>초기 도입비</th><td id="implementationOut">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      mrrAtRisk:$('mrrAtRisk'), currentRecovery:$('currentRecovery'), targetRecovery:$('targetRecovery'), grossMargin:$('grossMargin'),
      savedChurnMRR:$('savedChurnMRR'), toolCost:$('toolCost'), implementationCost:$('implementationCost'), analysisMonths:$('analysisMonths'), annualDiscountRate:$('annualDiscountRate'),
      incRecovered:$('incRecovered'), netMonthly:$('netMonthly'), totalNet:$('totalNet'), roi:$('roi'), payback:$('payback'), beUplift:$('beUplift'),
      recoveryDelta:$('recoveryDelta'), grossMonthlyBenefit:$('grossMonthlyBenefit'), npv:$('npv'), toolCostOut:$('toolCostOut'), implementationOut:$('implementationOut'),
      status:$('status'), summary:$('summary'), error:$('error'), copy:$('copy'), reset:$('reset')
    };

    const defaults = {
      mrrAtRisk:120000000, currentRecovery:42, targetRecovery:61, grossMargin:78, savedChurnMRR:9000000,
      toolCost:3500000, implementationCost:19000000, analysisMonths:12, annualDiscountRate:10
    };

    const won = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.mrrAtRisk) || v.mrrAtRisk <= 0) return '월 결제실패 위험 MRR은 0보다 커야 합니다.';
      if (!Number.isFinite(v.currentRecovery) || v.currentRecovery < 0 || v.currentRecovery > 100) return '현재 회수율은 0~100% 범위여야 합니다.';
      if (!Number.isFinite(v.targetRecovery) || v.targetRecovery < 0 || v.targetRecovery > 100) return '목표 회수율은 0~100% 범위여야 합니다.';
      if (!Number.isFinite(v.grossMargin) || v.grossMargin <= 0 || v.grossMargin > 100) return '매출총이익률은 0 초과 100 이하 범위여야 합니다.';
      if (!Number.isFinite(v.savedChurnMRR) || v.savedChurnMRR < 0) return '추가 방어 이탈 MRR은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.toolCost) || v.toolCost < 0) return '월 툴 비용은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.implementationCost) || v.implementationCost < 0) return '초기 도입비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.analysisMonths) || v.analysisMonths < 1 || v.analysisMonths > 36) return '분석 기간은 1~36개월 범위여야 합니다.';
      if (!Number.isFinite(v.annualDiscountRate) || v.annualDiscountRate < 0 || v.annualDiscountRate > 40) return '연 할인율은 0~40% 범위여야 합니다.';
      return '';
    }

    function compute(v){
      const margin = v.grossMargin / 100;
      const deltaRecoveryPp = v.targetRecovery - v.currentRecovery;
      const incRecoveredMRR = v.mrrAtRisk * (deltaRecoveryPp / 100);
      const recoveryProfit = incRecoveredMRR * margin;
      const savedChurnProfit = v.savedChurnMRR * margin;
      const grossMonthlyBenefit = recoveryProfit + savedChurnProfit;
      const netMonthly = grossMonthlyBenefit - v.toolCost;
      const totalNet = (netMonthly * v.analysisMonths) - v.implementationCost;
      const roi = v.implementationCost === 0 ? Infinity : (totalNet / v.implementationCost) * 100;
      const payback = v.implementationCost === 0 ? 0 : (netMonthly > 0 ? v.implementationCost / netMonthly : Infinity);
      const denom = v.mrrAtRisk * margin;
      const beUplift = denom <= 0 ? Infinity : ((v.toolCost - savedChurnProfit) / denom) * 100;

      const monthRate = (v.annualDiscountRate / 100) / 12;
      let npv = -v.implementationCost;
      for (let m=1; m<=v.analysisMonths; m++) {
        npv += netMonthly / Math.pow(1 + monthRate, m);
      }

      return { deltaRecoveryPp, incRecoveredMRR, grossMonthlyBenefit, netMonthly, totalNet, roi, payback, beUplift, npv };
    }

    function render(){
      const v = {
        mrrAtRisk:Number(refs.mrrAtRisk.value), currentRecovery:Number(refs.currentRecovery.value), targetRecovery:Number(refs.targetRecovery.value),
        grossMargin:Number(refs.grossMargin.value), savedChurnMRR:Number(refs.savedChurnMRR.value), toolCost:Number(refs.toolCost.value),
        implementationCost:Number(refs.implementationCost.value), analysisMonths:Number(refs.analysisMonths.value), annualDiscountRate:Number(refs.annualDiscountRate.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        ['incRecovered','netMonthly','totalNet','roi','payback','beUplift','recoveryDelta','grossMonthlyBenefit','npv','toolCostOut','implementationOut'].forEach(k=>refs[k].textContent='-');
        refs.summary.value = '';
        refs.status.textContent = '입력값을 확인하세요';
        return;
      }

      const r = compute(v);
      refs.incRecovered.textContent = won(r.incRecoveredMRR);
      refs.netMonthly.textContent = won(r.netMonthly);
      refs.totalNet.textContent = won(r.totalNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : '∞';
      refs.payback.textContent = r.payback === 0 ? '즉시' : (Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가');
      refs.beUplift.textContent = Number.isFinite(r.beUplift) ? `${num(r.beUplift,2)}%p` : '∞';
      refs.recoveryDelta.textContent = `${num(r.deltaRecoveryPp,2)}%p`;
      refs.grossMonthlyBenefit.textContent = won(r.grossMonthlyBenefit);
      refs.npv.textContent = won(r.npv);
      refs.toolCostOut.textContent = won(v.toolCost);
      refs.implementationOut.textContent = won(v.implementationCost);

      if (r.netMonthly > 0) {
        refs.status.innerHTML = `<span class="ok">●</span> 월 순효과 ${won(r.netMonthly)} (회수율 개선 유의미)`;
      } else if (r.netMonthly === 0) {
        refs.status.innerHTML = `● 월 손익분기`;
      } else {
        refs.status.innerHTML = `<span class="warn">●</span> 월 순효과 ${won(r.netMonthly)} (도입조건 재점검 필요)`;
      }

      refs.summary.value = [
        '[Dunning Recovery ROI 요약]',
        `회수율 개선: ${num(r.deltaRecoveryPp,2)}%p`,
        `증가 회수 MRR: ${won(r.incRecoveredMRR)}`,
        `월간 총편익(이익 기준): ${won(r.grossMonthlyBenefit)}`,
        `월간 순효과: ${won(r.netMonthly)}`,
        `${v.analysisMonths}개월 누적 순효과: ${won(r.totalNet)}`,
        `ROI(도입비 기준): ${Number.isFinite(r.roi) ? num(r.roi,1)+'%' : '∞'}`,
        `회수기간: ${r.payback===0 ? '즉시' : (Number.isFinite(r.payback)?num(r.payback,1)+'개월':'회수 불가')}`,
        `손익분기 회수율 uplift: ${Number.isFinite(r.beUplift) ? num(r.beUplift,2)+'%p' : '∞'}`,
        `NPV(${v.analysisMonths}개월): ${won(r.npv)}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('클립보드 권한이 없어 수동 복사가 필요합니다.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.mrrAtRisk, refs.currentRecovery, refs.targetRecovery, refs.grossMargin, refs.savedChurnMRR,
      refs.toolCost, refs.implementationCost, refs.analysisMonths, refs.annualDiscountRate].forEach(el=>{
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
