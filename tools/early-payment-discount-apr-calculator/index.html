<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Early Payment Discount APR Calculator | 조기결제 할인 APR 계산기</title>
  <meta name="description" content="조기결제 할인(예: 2/10 Net30) 정책의 할인비용, 자금비용 절감, 부실채권 절감, ROI, 손익분기 채택률을 계산합니다." />
  <style>
    :root{--bg:#061324;--card:#10233f;--line:#2b4a78;--txt:#ecf3ff;--muted:#a9bfdf;--pri:#6eb3ff;--soft:#18365d;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#1e4a80 0%,#061324 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.7vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2444;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#18365d,#10233f);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b34;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5f88f5);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:104px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d37;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.98rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#173560;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>💸 조기결제 할인 APR 계산기</h1>
        <div class="sub">조기결제 할인 정책의 진짜 비용(할인 APR)과 현금회수 개선 효과를 동시에 계산해 채택 여부를 판단합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="invoiceVolume">월 인보이스 발행액 (KRW)</label><input id="invoiceVolume" type="number" min="1000000" value="920000000" /></div>
          <div><label for="currentDso">현재 DSO (일)</label><input id="currentDso" type="number" min="1" max="180" step="0.1" value="47" /></div>
          <div><label for="targetDso">조기결제 대상 DSO (일)</label><input id="targetDso" type="number" min="0.1" max="180" step="0.1" value="18" /></div>
          <div><label for="discountRate">조기결제 할인율 (%)</label><input id="discountRate" type="number" min="0" max="30" step="0.01" value="2" /></div>
          <div><label for="adoptionRate">고객 채택률 (%)</label><input id="adoptionRate" type="number" min="0" max="100" step="0.1" value="38" /></div>
          <div><label for="badDebtReduction">채택분 부실채권 감소율 (%)</label><input id="badDebtReduction" type="number" min="0" max="10" step="0.01" value="0.45" /></div>
          <div><label for="annualFinancingRate">연 자금조달/기회비용 (%)</label><input id="annualFinancingRate" type="number" min="0" max="60" step="0.1" value="11" /></div>
          <div><label for="opsSavings">월 A/R 운영 절감액 (KRW)</label><input id="opsSavings" type="number" min="0" value="1000000" /></div>
          <div><label for="programCost">월 프로그램/툴 비용 (KRW)</label><input id="programCost" type="number" min="0" value="2200000" /></div>
          <div><label for="setupCost">일회성 도입비 (KRW)</label><input id="setupCost" type="number" min="0" value="6000000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 할인 비용</div><div id="discountCost" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">분석기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">할인 조건 연환산 APR</div><div id="effectiveApr" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>월 자금비용 절감액</th><td id="financingSavings">-</td></tr>
            <tr><th>월 부실채권 절감액</th><td id="badDebtSavings">-</td></tr>
            <tr><th>월 운전자본 개선(회수분)</th><td id="capitalReleased">-</td></tr>
            <tr><th>손익분기 채택률</th><td id="breakEvenAdoption">-</td></tr>
            <tr><th>분석기간 총 투자비(할인+프로그램+도입)</th><td id="totalInvestment">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      invoiceVolume:$("invoiceVolume"), currentDso:$("currentDso"), targetDso:$("targetDso"), discountRate:$("discountRate"), adoptionRate:$("adoptionRate"), badDebtReduction:$("badDebtReduction"),
      annualFinancingRate:$("annualFinancingRate"), opsSavings:$("opsSavings"), programCost:$("programCost"), setupCost:$("setupCost"), months:$("months"),
      discountCost:$("discountCost"), monthlyNet:$("monthlyNet"), periodNet:$("periodNet"), roi:$("roi"), effectiveApr:$("effectiveApr"), payback:$("payback"),
      financingSavings:$("financingSavings"), badDebtSavings:$("badDebtSavings"), capitalReleased:$("capitalReleased"), breakEvenAdoption:$("breakEvenAdoption"), totalInvestment:$("totalInvestment"),
      error:$("error"), status:$("status"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = {
      invoiceVolume:920000000, currentDso:47, targetDso:18, discountRate:2, adoptionRate:38, badDebtReduction:0.45,
      annualFinancingRate:11, opsSavings:1000000, programCost:2200000, setupCost:6000000, months:12
    };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.invoiceVolume) || v.invoiceVolume <= 0) return "월 인보이스 발행액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.currentDso) || v.currentDso <= 0 || v.currentDso > 180) return "현재 DSO는 0 초과 180일 이하 범위여야 합니다.";
      if (!Number.isFinite(v.targetDso) || v.targetDso <= 0 || v.targetDso > 180) return "조기결제 대상 DSO는 0 초과 180일 이하 범위여야 합니다.";
      if (v.targetDso >= v.currentDso) return "조기결제 대상 DSO는 현재 DSO보다 짧아야 합니다.";
      if (!Number.isFinite(v.discountRate) || v.discountRate < 0 || v.discountRate > 30) return "할인율은 0~30% 범위여야 합니다.";
      if (!Number.isFinite(v.adoptionRate) || v.adoptionRate < 0 || v.adoptionRate > 100) return "채택률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.badDebtReduction) || v.badDebtReduction < 0 || v.badDebtReduction > 10) return "부실채권 감소율은 0~10% 범위여야 합니다.";
      if (!Number.isFinite(v.annualFinancingRate) || v.annualFinancingRate < 0 || v.annualFinancingRate > 60) return "연 자금비용은 0~60% 범위여야 합니다.";
      if (!Number.isFinite(v.opsSavings) || v.opsSavings < 0) return "A/R 운영 절감액은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.programCost) || v.programCost < 0) return "월 프로그램 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "도입비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return "분석 기간은 1~60개월 범위여야 합니다.";
      return "";
    }

    function compute(v){
      const adoption = v.adoptionRate / 100;
      const discount = v.discountRate / 100;
      const badDebtReduction = v.badDebtReduction / 100;
      const annualRate = v.annualFinancingRate / 100;
      const dsoGap = v.currentDso - v.targetDso;

      const discountCost = v.invoiceVolume * adoption * discount;
      const capitalReleased = v.invoiceVolume * adoption * (dsoGap / 30);
      const financingSavings = capitalReleased * (annualRate / 12);
      const badDebtSavings = v.invoiceVolume * adoption * badDebtReduction;

      const monthlyNet = financingSavings + badDebtSavings + v.opsSavings - discountCost - v.programCost;
      const periodNet = (monthlyNet * v.months) - v.setupCost;

      const totalInvestment = ((discountCost + v.programCost) * v.months) + v.setupCost;
      const roi = totalInvestment === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / totalInvestment) * 100;
      const payback = monthlyNet > 0 ? (v.setupCost / monthlyNet) : Infinity;

      const effectiveApr = discount > 0 && dsoGap > 0
        ? (discount / (1 - discount)) * (365 / dsoGap) * 100
        : 0;

      const adoptionCoefficient = v.invoiceVolume * ((annualRate / 12) * (dsoGap / 30) + badDebtReduction - discount);
      let breakEvenAdoption = Infinity;
      if (adoptionCoefficient > 0) {
        const needed = (v.programCost - v.opsSavings) / adoptionCoefficient;
        if (needed <= 0) breakEvenAdoption = 0;
        else breakEvenAdoption = needed * 100;
      }

      return {
        discountCost, capitalReleased, financingSavings, badDebtSavings,
        monthlyNet, periodNet, totalInvestment, roi, payback, effectiveApr, breakEvenAdoption
      };
    }

    function resetOutputs(){
      ["discountCost","monthlyNet","periodNet","roi","effectiveApr","payback","financingSavings","badDebtSavings","capitalReleased","breakEvenAdoption","totalInvestment"].forEach((k)=>refs[k].textContent='-');
      refs.summary.value = "";
    }

    function render(){
      const v = {
        invoiceVolume:Number(refs.invoiceVolume.value), currentDso:Number(refs.currentDso.value), targetDso:Number(refs.targetDso.value), discountRate:Number(refs.discountRate.value),
        adoptionRate:Number(refs.adoptionRate.value), badDebtReduction:Number(refs.badDebtReduction.value), annualFinancingRate:Number(refs.annualFinancingRate.value),
        opsSavings:Number(refs.opsSavings.value), programCost:Number(refs.programCost.value), setupCost:Number(refs.setupCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.discountCost.textContent = money(r.discountCost);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞');
      refs.effectiveApr.textContent = `${num(r.effectiveApr,2)}%`;
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가';

      refs.financingSavings.textContent = money(r.financingSavings);
      refs.badDebtSavings.textContent = money(r.badDebtSavings);
      refs.capitalReleased.textContent = money(r.capitalReleased);
      refs.totalInvestment.textContent = money(r.totalInvestment);

      if (!Number.isFinite(r.breakEvenAdoption) || r.breakEvenAdoption > 100) {
        refs.breakEvenAdoption.textContent = '달성 불가';
      } else {
        refs.breakEvenAdoption.textContent = `${num(Math.max(0,r.breakEvenAdoption),2)}%`;
      }

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> 월 ${money(r.monthlyNet)} 순효과 개선`
        : `<span class="warn">●</span> 월 ${money(Math.abs(r.monthlyNet))} 순효과 감소`;

      const beText = (!Number.isFinite(r.breakEvenAdoption) || r.breakEvenAdoption > 100)
        ? '달성 불가'
        : `${num(Math.max(0,r.breakEvenAdoption),2)}%`;

      refs.summary.value = [
        "[조기결제 할인 APR 요약]",
        `월 할인 비용: ${money(r.discountCost)}`,
        `월 자금비용 절감액: ${money(r.financingSavings)}`,
        `월 부실채권 절감액: ${money(r.badDebtSavings)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `${v.months}개월 순효과(도입비 반영): ${money(r.periodNet)}`,
        `ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞')}`,
        `할인 조건 연환산 APR: ${num(r.effectiveApr,2)}%`,
        `손익분기 채택률: ${beText}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가'}`
      ].join("\n");
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });

    [refs.invoiceVolume,refs.currentDso,refs.targetDso,refs.discountRate,refs.adoptionRate,refs.badDebtReduction,refs.annualFinancingRate,refs.opsSavings,refs.programCost,refs.setupCost,refs.months].forEach((el)=>{
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
