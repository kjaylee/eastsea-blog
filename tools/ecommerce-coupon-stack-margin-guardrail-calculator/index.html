<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-commerce Coupon Stack Margin Guardrail Calculator | 이커머스 쿠폰 중복할인 마진 가드레일 계산기</title>
  <meta name="description" content="쿠폰 중복할인으로 발생하는 마진 누수와 가드레일 도입 시 회수 이익/ROI를 계산합니다." />
  <style>
    :root{--bg:#1a1022;--card:#2b1836;--line:#6a4280;--text:#f8ebff;--muted:#dfc0ef;--pri:#d946ef;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#5c2170 0%,var(--bg) 58%);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.84rem)}.sub{margin-top:6px;color:var(--muted);font-size:.94rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btnLink,.lang{border:1px solid var(--line);background:#532d66;color:#ffe9ff;text-decoration:none;border-radius:10px;padding:8px 11px;font-size:.88rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(160deg,#47265b,#2a1934);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#281533;color:var(--text);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;background:linear-gradient(135deg,#ef6cf8,#c026d3);font-weight:700}.soft{background:#5a376a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7d3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:#2a1635;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.04rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#5f3572;color:#ffe8ff;font-size:.77rem;margin-top:10px}
    .good{color:var(--good)}.warn{color:var(--warn)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.actions{justify-content:flex-start}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🛒 쿠폰 중복할인 마진 가드레일 계산기</h1>
        <div class="sub" id="subtitle">쿠폰 스택 주문으로 손실되는 마진과 가드레일 도입 시 회수되는 이익을 시뮬레이션합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a class="btnLink" href="/" id="backLink">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값 Inputs</h2>
        <div class="inputs">
          <div><label for="monthlyOrders" id="l_monthlyOrders"></label><input id="monthlyOrders" type="number" min="0" value="18000"></div>
          <div><label for="aov" id="l_aov"></label><input id="aov" type="number" min="0" step="100" value="67000"></div>
          <div><label for="grossMargin" id="l_grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="42"></div>
          <div><label for="baseDiscount" id="l_baseDiscount"></label><input id="baseDiscount" type="number" min="0" max="100" step="0.1" value="10"></div>
          <div><label for="stackShare" id="l_stackShare"></label><input id="stackShare" type="number" min="0" max="100" step="0.1" value="22"></div>
          <div><label for="extraStackDiscount" id="l_extraStackDiscount"></label><input id="extraStackDiscount" type="number" min="0" max="100" step="0.1" value="9"></div>
          <div><label for="paymentFee" id="l_paymentFee"></label><input id="paymentFee" type="number" min="0" max="100" step="0.1" value="2.9"></div>
          <div><label for="fulfillmentCost" id="l_fulfillmentCost"></label><input id="fulfillmentCost" type="number" min="0" step="100" value="4200"></div>
          <div><label for="effectiveness" id="l_effectiveness"></label><input id="effectiveness" type="number" min="0" max="100" step="0.1" value="58"></div>
          <div><label for="annualGuardrailCost" id="l_annualGuardrailCost"></label><input id="annualGuardrailCost" type="number" min="0" step="100000" value="48000000"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button"></button>
          <button id="reset" type="button"></button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_currentContribution"></div><div id="currentContribution" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyLeakage"></div><div id="monthlyLeakage" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyRecovered"></div><div id="monthlyRecovered" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_annualRecovered"></div><div id="annualRecovered" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_netAnnual"></div><div id="netAnnual" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill"></div>

        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table>
          <tbody>
            <tr><th id="d_baseProfitOrder"></th><td id="baseProfitOrder">-</td></tr>
            <tr><th id="d_stackProfitOrder"></th><td id="stackProfitOrder">-</td></tr>
            <tr><th id="d_stackOrders"></th><td id="stackOrders">-</td></tr>
            <tr><th id="d_breakEven"></th><td id="breakEven">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={
      monthlyOrders:$("monthlyOrders"),aov:$("aov"),grossMargin:$("grossMargin"),baseDiscount:$("baseDiscount"),stackShare:$("stackShare"),extraStackDiscount:$("extraStackDiscount"),paymentFee:$("paymentFee"),fulfillmentCost:$("fulfillmentCost"),effectiveness:$("effectiveness"),annualGuardrailCost:$("annualGuardrailCost"),
      currentContribution:$("currentContribution"),monthlyLeakage:$("monthlyLeakage"),monthlyRecovered:$("monthlyRecovered"),annualRecovered:$("annualRecovered"),netAnnual:$("netAnnual"),roi:$("roi"),baseProfitOrder:$("baseProfitOrder"),stackProfitOrder:$("stackProfitOrder"),stackOrders:$("stackOrders"),breakEven:$("breakEven"),
      copy:$("copy"),reset:$("reset"),summary:$("summary"),error:$("error"),status:$("status"),langBtn:$("langBtn")
    };
    const defaults={monthlyOrders:18000,aov:67000,grossMargin:42,baseDiscount:10,stackShare:22,extraStackDiscount:9,paymentFee:2.9,fulfillmentCost:4200,effectiveness:58,annualGuardrailCost:48000000};

    const I18N={
      ko:{title:"🛒 쿠폰 중복할인 마진 가드레일 계산기",subtitle:"쿠폰 스택 주문으로 손실되는 마진과 가드레일 도입 시 회수되는 이익을 시뮬레이션합니다.",inputHeader:"입력값 Inputs",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",
      l_monthlyOrders:"월 주문 수",l_aov:"객단가 AOV (₩)",l_grossMargin:"매출총이익률 (%)",l_baseDiscount:"기본 할인율 (%)",l_stackShare:"중복할인 주문 비중 (%)",l_extraStackDiscount:"중복 추가 할인 (%p)",l_paymentFee:"결제 수수료율 (%)",l_fulfillmentCost:"주문당 물류비 (₩)",l_effectiveness:"가드레일 차단 효과 (%)",l_annualGuardrailCost:"가드레일 연간 비용 (₩)",
      k_currentContribution:"현재 월 공헌이익",k_monthlyLeakage:"월 중복할인 누수",k_monthlyRecovered:"월 회수이익",k_annualRecovered:"연간 회수이익",k_netAnnual:"연간 순효과",k_roi:"ROI",
      d_baseProfitOrder:"기본 할인 주문당 이익",d_stackProfitOrder:"중복할인 주문당 이익",d_stackOrders:"월 중복할인 주문수",d_breakEven:"손익분기 필요 효과율",waiting:"입력값 확인 필요",good:"가드레일 도입 경제성 양호",bad:"효과 또는 비용 가정 재검토 필요",invalid:"입력값을 확인해 주세요",
      e_range:"비율 입력은 0~100 범위여야 합니다.",e_discount:"기본 할인율 + 추가 할인율 합은 100% 미만이어야 합니다.",copied:"요약이 복사되었습니다.",copyFail:"복사 권한이 없어 수동 복사가 필요합니다.",summaryTitle:"[쿠폰 스택 가드레일 요약]"},
      en:{title:"🛒 E-commerce Coupon Stack Margin Guardrail Calculator",subtitle:"Estimate margin leakage from coupon stacking and recovered profit after guardrail rollout.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",
      l_monthlyOrders:"Monthly orders",l_aov:"AOV (KRW)",l_grossMargin:"Gross margin (%)",l_baseDiscount:"Base discount (%)",l_stackShare:"Stacked-order share (%)",l_extraStackDiscount:"Extra stack discount (%p)",l_paymentFee:"Payment fee rate (%)",l_fulfillmentCost:"Fulfillment cost per order (KRW)",l_effectiveness:"Guardrail effectiveness (%)",l_annualGuardrailCost:"Annual guardrail cost (KRW)",
      k_currentContribution:"Current monthly contribution",k_monthlyLeakage:"Monthly stack leakage",k_monthlyRecovered:"Monthly recovered profit",k_annualRecovered:"Annual recovered profit",k_netAnnual:"Net annual impact",k_roi:"ROI",
      d_baseProfitOrder:"Profit per base-discount order",d_stackProfitOrder:"Profit per stacked-discount order",d_stackOrders:"Monthly stacked orders",d_breakEven:"Break-even effectiveness",waiting:"Check your inputs",good:"Guardrail economics look good",bad:"Review effectiveness/cost assumptions",invalid:"Please review inputs",
      e_range:"Percentage inputs must be within 0 to 100.",e_discount:"Base discount + extra stack discount must stay below 100%.",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Coupon Stack Guardrail Summary]"}
    };

    let lang="ko";
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString("en-US",{maximumFractionDigits:d});
    const t=(k)=>I18N[lang][k]||k;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["monthlyOrders","aov","grossMargin","baseDiscount","stackShare","extraStackDiscount","paymentFee","fulfillmentCost","effectiveness","annualGuardrailCost"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["currentContribution","monthlyLeakage","monthlyRecovered","annualRecovered","netAnnual","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["baseProfitOrder","stackProfitOrder","stackOrders","breakEven"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      const rates=[v.grossMargin,v.baseDiscount,v.stackShare,v.extraStackDiscount,v.paymentFee,v.effectiveness];
      if(rates.some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("e_range");
      if(v.baseDiscount+v.extraStackDiscount>=100) return t("e_discount");
      return "";
    }

    function render(){
      const v={monthlyOrders:Number(refs.monthlyOrders.value),aov:Number(refs.aov.value),grossMargin:Number(refs.grossMargin.value),baseDiscount:Number(refs.baseDiscount.value),stackShare:Number(refs.stackShare.value),extraStackDiscount:Number(refs.extraStackDiscount.value),paymentFee:Number(refs.paymentFee.value),fulfillmentCost:Number(refs.fulfillmentCost.value),effectiveness:Number(refs.effectiveness.value),annualGuardrailCost:Number(refs.annualGuardrailCost.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["currentContribution","monthlyLeakage","monthlyRecovered","annualRecovered","netAnnual","roi","baseProfitOrder","stackProfitOrder","stackOrders","breakEven"].forEach((k)=>refs[k].textContent="-");refs.status.textContent=t("invalid");refs.summary.value="";return;}

      const gm=v.grossMargin/100, baseD=v.baseDiscount/100, stackExtra=v.extraStackDiscount/100, fee=v.paymentFee/100;
      const stackOrders=v.monthlyOrders*(v.stackShare/100), nonStack=v.monthlyOrders-stackOrders;
      const baseProfitPerOrder=v.aov*(1-baseD)*gm - v.aov*fee - v.fulfillmentCost;
      const stackProfitPerOrder=v.aov*(1-baseD-stackExtra)*gm - v.aov*fee - v.fulfillmentCost;
      const leakPerStack=Math.max(0,baseProfitPerOrder-stackProfitPerOrder);
      const monthlyLeakage=stackOrders*leakPerStack;
      const currentContribution=nonStack*baseProfitPerOrder + stackOrders*stackProfitPerOrder;
      const monthlyRecovered=monthlyLeakage*(v.effectiveness/100);
      const annualRecovered=monthlyRecovered*12;
      const netAnnual=annualRecovered-v.annualGuardrailCost;
      const roi=v.annualGuardrailCost>0?(netAnnual/v.annualGuardrailCost)*100:0;
      const breakEvenEff=monthlyLeakage>0?(v.annualGuardrailCost/(monthlyLeakage*12))*100:NaN;

      refs.currentContribution.textContent=won(currentContribution);
      refs.monthlyLeakage.textContent=won(monthlyLeakage);
      refs.monthlyRecovered.textContent=won(monthlyRecovered);
      refs.annualRecovered.textContent=won(annualRecovered);
      refs.netAnnual.textContent=won(netAnnual);
      refs.roi.textContent=`${num(roi,2)}%`;
      refs.baseProfitOrder.textContent=won(baseProfitPerOrder);
      refs.stackProfitOrder.textContent=won(stackProfitPerOrder);
      refs.stackOrders.textContent=num(stackOrders,0);
      refs.breakEven.textContent=Number.isFinite(breakEvenEff)?`${num(breakEvenEff,2)}%`:"N/A";
      refs.status.innerHTML=netAnnual>=0?`<span class="good">●</span> ${t("good")}`:`<span class="warn">●</span> ${t("bad")}`;

      refs.summary.value=[
        t("summaryTitle"),
        `${t("k_currentContribution")}: ${won(currentContribution)}`,
        `${t("k_monthlyLeakage")}: ${won(monthlyLeakage)}`,
        `${t("k_monthlyRecovered")}: ${won(monthlyRecovered)}`,
        `${t("k_annualRecovered")}: ${won(annualRecovered)}`,
        `${t("k_netAnnual")}: ${won(netAnnual)}`,
        `${t("k_roi")}: ${num(roi,2)}%`,
        `${t("d_breakEven")}: ${Number.isFinite(breakEvenEff)?`${num(breakEvenEff,2)}%`:"N/A"}`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.monthlyOrders,refs.aov,refs.grossMargin,refs.baseDiscount,refs.stackShare,refs.extraStackDiscount,refs.paymentFee,refs.fulfillmentCost,refs.effectiveness,refs.annualGuardrailCost].forEach((el)=>el.addEventListener("input",render));

    applyI18n();
    render();
  </script>
</body>
</html>
