<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-commerce Repeat Purchase LTV Uplift Calculator | 이커머스 재구매 LTV 상승 계산기</title>
  <meta name="description" content="재구매율 개선 전략이 코호트 LTV와 공헌이익, ROI에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#0b1120;--card:#121a30;--line:#2a3b5a;--txt:#eef3ff;--muted:#a8b6cf;--pri:#6c8cff;--soft:#17243f;--ok:#34d399;--warn:#f59e0b;--err:#fecaca;--errBg:rgba(248,113,113,.16)}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#243a61 0%,#0b1120 55%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 56px}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.15rem,2.8vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f1b33;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px}.card{background:linear-gradient(165deg,#172844,#121a30);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c162b;color:var(--txt);font-size:.93rem}
    textarea{min-height:112px;resize:vertical;margin-top:10px}button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#8aa7ff);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0e1a32;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.05rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#1a2c4c;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)}.warn{color:var(--warn)}table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🛍️ 이커머스 재구매 LTV 상승 계산기</h1>
        <div class="sub">Repeat purchase uplift가 cohort contribution margin과 ROI에 미치는 영향을 확인합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값 Inputs</h2>
        <div class="inputs">
          <div><label for="newCustomers">월 신규 고객 수</label><input id="newCustomers" type="number" min="0" value="8000" /></div>
          <div><label for="firstAov">첫 구매 AOV (₩)</label><input id="firstAov" type="number" min="0" value="68000" /></div>
          <div><label for="repeatAovRatio">재구매 AOV 비율 (%)</label><input id="repeatAovRatio" type="number" min="0" max="300" step="0.1" value="75" /></div>
          <div><label for="baseRepeatRate">기본 재구매율 (%)</label><input id="baseRepeatRate" type="number" min="0" max="100" step="0.1" value="28" /></div>
          <div><label for="targetRepeatRate">목표 재구매율 (%)</label><input id="targetRepeatRate" type="number" min="0" max="100" step="0.1" value="39" /></div>
          <div><label for="extraOrders">재구매 고객당 추가 주문 수(연)</label><input id="extraOrders" type="number" min="0" step="0.1" value="2.4" /></div>
          <div><label for="refundRate">환불률 (%)</label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="6" /></div>
          <div><label for="grossMargin">매출총이익률 (%)</label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="42" /></div>
          <div><label for="crmCost">고객당 CRM 비용 (₩)</label><input id="crmCost" type="number" min="0" value="2500" /></div>
          <div><label for="loyaltyCost">재구매 고객당 로열티 비용 (₩)</label><input id="loyaltyCost" type="number" min="0" value="3400" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">기준 공헌이익</div><div id="baseContribution" class="v">-</div></div>
          <div class="kpi"><div class="k">목표 공헌이익</div><div id="targetContribution" class="v">-</div></div>
          <div class="kpi"><div class="k">순증 공헌이익</div><div id="incrementalContribution" class="v">-</div></div>
          <div class="kpi"><div class="k">프로그램 총비용</div><div id="programCost" class="v">-</div></div>
          <div class="kpi"><div class="k">순효과 (Net Uplift)</div><div id="netImpact" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roiPct" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">세부 지표 Detail</h2>
        <table>
          <tbody>
            <tr><th>재구매 AOV</th><td id="repeatAov">-</td></tr>
            <tr><th>기준 반복 주문 수</th><td id="baseRepeatOrders">-</td></tr>
            <tr><th>목표 반복 주문 수</th><td id="targetRepeatOrders">-</td></tr>
            <tr><th>기준 코호트 매출</th><td id="baseRevenue">-</td></tr>
            <tr><th>목표 코호트 매출</th><td id="targetRevenue">-</td></tr>
            <tr><th>손익분기 재구매율</th><td id="breakEvenRate">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      newCustomers: $("newCustomers"), firstAov: $("firstAov"), repeatAovRatio: $("repeatAovRatio"), baseRepeatRate: $("baseRepeatRate"), targetRepeatRate: $("targetRepeatRate"),
      extraOrders: $("extraOrders"), refundRate: $("refundRate"), grossMargin: $("grossMargin"), crmCost: $("crmCost"), loyaltyCost: $("loyaltyCost"),
      baseContribution: $("baseContribution"), targetContribution: $("targetContribution"), incrementalContribution: $("incrementalContribution"), programCost: $("programCost"), netImpact: $("netImpact"), roiPct: $("roiPct"),
      repeatAov: $("repeatAov"), baseRepeatOrders: $("baseRepeatOrders"), targetRepeatOrders: $("targetRepeatOrders"), baseRevenue: $("baseRevenue"), targetRevenue: $("targetRevenue"), breakEvenRate: $("breakEvenRate"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = {
      newCustomers: 8000, firstAov: 68000, repeatAovRatio: 75, baseRepeatRate: 28, targetRepeatRate: 39,
      extraOrders: 2.4, refundRate: 6, grossMargin: 42, crmCost: 2500, loyaltyCost: 3400
    };

    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(Number.isFinite(n) ? n : 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v){
      if (!Number.isFinite(v.newCustomers) || v.newCustomers < 0) return "신규 고객 수는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.firstAov) || v.firstAov < 0) return "첫 구매 AOV는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.repeatAovRatio) || v.repeatAovRatio < 0) return "재구매 AOV 비율은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.baseRepeatRate) || v.baseRepeatRate < 0 || v.baseRepeatRate > 100) return "기본 재구매율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.targetRepeatRate) || v.targetRepeatRate < 0 || v.targetRepeatRate > 100) return "목표 재구매율은 0~100% 범위여야 합니다.";
      if (v.targetRepeatRate < v.baseRepeatRate) return "목표 재구매율은 기본 재구매율 이상으로 입력하세요.";
      if (!Number.isFinite(v.extraOrders) || v.extraOrders < 0) return "추가 주문 수는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.refundRate) || v.refundRate < 0 || v.refundRate > 100) return "환불률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.grossMargin) || v.grossMargin < 0 || v.grossMargin > 100) return "매출총이익률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.crmCost) || v.crmCost < 0) return "CRM 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.loyaltyCost) || v.loyaltyCost < 0) return "로열티 비용은 0 이상이어야 합니다.";
      return "";
    }

    function cohortCalc(v, repeatRate){
      const repeatAov = v.firstAov * (v.repeatAovRatio / 100);
      const firstRevenue = v.newCustomers * v.firstAov;
      const repeatOrders = v.newCustomers * repeatRate * v.extraOrders;
      const repeatRevenue = repeatOrders * repeatAov;
      const totalRevenue = firstRevenue + repeatRevenue;
      const contribution = totalRevenue * (1 - v.refundRate / 100) * (v.grossMargin / 100);
      return { repeatAov, repeatOrders, totalRevenue, contribution };
    }

    function render(){
      const v = {
        newCustomers: Number(refs.newCustomers.value), firstAov: Number(refs.firstAov.value), repeatAovRatio: Number(refs.repeatAovRatio.value),
        baseRepeatRate: Number(refs.baseRepeatRate.value), targetRepeatRate: Number(refs.targetRepeatRate.value), extraOrders: Number(refs.extraOrders.value),
        refundRate: Number(refs.refundRate.value), grossMargin: Number(refs.grossMargin.value), crmCost: Number(refs.crmCost.value), loyaltyCost: Number(refs.loyaltyCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err){
        ["baseContribution","targetContribution","incrementalContribution","programCost","netImpact","roiPct","repeatAov","baseRepeatOrders","targetRepeatOrders","baseRevenue","targetRevenue","breakEvenRate"].forEach((k)=>refs[k].textContent="-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const base = cohortCalc(v, v.baseRepeatRate / 100);
      const target = cohortCalc(v, v.targetRepeatRate / 100);
      const incremental = target.contribution - base.contribution;
      const cost = v.newCustomers * v.crmCost + v.newCustomers * (v.targetRepeatRate / 100) * v.loyaltyCost;
      const net = incremental - cost;
      const roi = cost > 0 ? (net / cost) * 100 : 0;

      const denom = v.newCustomers * v.extraOrders * base.repeatAov * (1 - v.refundRate / 100) * (v.grossMargin / 100);
      const breakEvenRate = denom > 0 ? (v.baseRepeatRate / 100) + (cost / denom) : Infinity;

      refs.baseContribution.textContent = money(base.contribution);
      refs.targetContribution.textContent = money(target.contribution);
      refs.incrementalContribution.textContent = money(incremental);
      refs.programCost.textContent = money(cost);
      refs.netImpact.textContent = money(net);
      refs.roiPct.textContent = `${num(roi, 2)}%`;

      refs.repeatAov.textContent = money(base.repeatAov);
      refs.baseRepeatOrders.textContent = num(base.repeatOrders, 2);
      refs.targetRepeatOrders.textContent = num(target.repeatOrders, 2);
      refs.baseRevenue.textContent = money(base.totalRevenue);
      refs.targetRevenue.textContent = money(target.totalRevenue);
      refs.breakEvenRate.textContent = Number.isFinite(breakEvenRate) ? `${num(Math.max(0, breakEvenRate * 100), 2)}%` : "N/A";

      refs.status.innerHTML = net >= 0
        ? `<span class="ok">●</span> 순효과 ${money(net)} (재구매 전략 유효)`
        : `<span class="warn">●</span> 순효과 ${money(net)} (비용 구조 재검토)`;

      refs.summary.value = [
        "[E-commerce Repeat Purchase LTV Uplift 요약]",
        `기준 공헌이익: ${money(base.contribution)}`,
        `목표 공헌이익: ${money(target.contribution)}`,
        `순증 공헌이익: ${money(incremental)}`,
        `프로그램 비용: ${money(cost)}`,
        `순효과: ${money(net)}`,
        `ROI: ${num(roi,2)}%`,
        `손익분기 재구매율: ${Number.isFinite(breakEvenRate) ? `${num(Math.max(0, breakEvenRate * 100),2)}%` : "N/A"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.newCustomers, refs.firstAov, refs.repeatAovRatio, refs.baseRepeatRate, refs.targetRepeatRate, refs.extraOrders, refs.refundRate, refs.grossMargin, refs.crmCost, refs.loyaltyCost].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
