<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이메일 제목 효과 분석기 | Email Subject Tester</title>
  <meta name="description" content="이메일 제목 길이, 숫자, 이모지, 스팸 단어, 개인화 요소를 분석해 오픈율 개선 힌트를 제공합니다." />
  <style>
    :root{--bg:#f6f8ff;--card:#fff;--line:#dce5f5;--text:#1f2937;--muted:#64748b;--pri:#4f46e5;--pri2:#06b6d4;--ok:#16a34a;--warn:#d97706;--bad:#dc2626}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eef2ff,#f8fbff);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:1080px;margin:0 auto;padding:18px 14px 40px}
    .top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.92rem}
    .back{display:inline-flex;text-decoration:none;color:#1e3a8a;border:1px solid var(--line);padding:8px 11px;border-radius:10px;background:#fff;font-weight:700;font-size:.88rem}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 10px 28px rgba(79,70,229,.08)}
    h2{margin:0 0 10px;font-size:1rem}
    textarea,input,button{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 11px;font-size:.93rem;background:#fff;color:var(--text)}
    textarea{min-height:180px;resize:vertical;line-height:1.45}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin:0 0 6px;font-weight:700}
    .btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
    button{cursor:pointer;border:0;font-weight:800;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}
    .ghost{background:#f3f5ff;color:#1f2937;border:1px solid var(--line)}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .kpi{border:1px solid var(--line);border-radius:12px;padding:10px;background:#f9fbff}.k{font-size:.75rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .msg{margin-top:8px;padding:10px;border:1px solid var(--line);border-radius:10px;background:#f8fbff;font-size:.9rem;line-height:1.45}
    .table{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:840px}
    th,td{padding:8px 9px;border-bottom:1px solid var(--line);font-size:.82rem;text-align:left;vertical-align:top}
    th{background:#f1f5ff;color:#475569;font-size:.76rem;text-transform:uppercase;letter-spacing:.02em}
    .score{font-weight:800}.ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .chip{display:inline-block;padding:2px 7px;border-radius:999px;font-size:.72rem;background:#eef2ff;border:1px solid #d9e1f6;color:#475569;margin-right:4px;margin-bottom:4px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.btns{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>✉️ 이메일 제목 효과 분석기</h1>
        <p class="sub">길이·숫자·이모지·스팸 단어·개인화 요소를 기반으로 제목 품질을 점수화합니다.</p>
      </div>
      <a class="back" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>제목 입력 (줄바꿈으로 여러 개 테스트)</h2>
        <textarea id="subjects">[이름]님, 이번 주 베스트셀러 20% 할인 안내
딱 24시간! 장바구니 쿠폰 지금 확인하세요
2월 업데이트: 팀 생산성을 2배 높이는 자동화 체크리스트
무료!!! 지금 클릭하고 100% 혜택 받기</textarea>

        <div class="two" style="margin-top:8px">
          <div>
            <label for="idealMin">권장 길이 최소(자)</label>
            <input id="idealMin" type="number" min="10" max="80" value="24" />
          </div>
          <div>
            <label for="idealMax">권장 길이 최대(자)</label>
            <input id="idealMax" type="number" min="10" max="100" value="45" />
          </div>
        </div>

        <div class="btns">
          <button id="analyzeBtn" type="button">분석</button>
          <button id="sampleBtn" class="ghost" type="button">샘플 복원</button>
          <button id="copyBestBtn" class="ghost" type="button">최고 점수 복사</button>
        </div>
      </article>

      <article class="card">
        <h2>요약</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">분석 제목 수</div><div class="v" id="count">-</div></div>
          <div class="kpi"><div class="k">평균 점수</div><div class="v" id="avg">-</div></div>
          <div class="kpi"><div class="k">추천 1순위</div><div class="v" id="bestScore">-</div></div>
        </div>
        <div class="msg" id="bestText">분석을 실행하면 추천 제목이 표시됩니다.</div>
        <div id="tips" style="margin-top:10px"></div>
      </article>
    </section>

    <section class="card" style="margin-top:12px">
      <h2>상세 결과</h2>
      <div class="table">
        <table>
          <thead>
            <tr>
              <th>#</th><th>제목</th><th>점수</th><th>길이(자/바이트)</th><th>숫자</th><th>이모지</th><th>개인화</th><th>스팸 위험</th><th>코멘트</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const spamWords = ['무료', '공짜', '100%', '지금 클릭', '긴급', '보장', '대박', '당첨', '현금', '!!!'];
    const urgencyWords = ['오늘', '마감', '지금', '이번 주', '24시간', '한정'];
    const emojiRegex = /[\p{Extended_Pictographic}]/gu;

    function analyzeOne(text, idealMin, idealMax) {
      const clean = text.trim();
      const chars = clean.length;
      const bytes = new TextEncoder().encode(clean).length;
      const numbers = (clean.match(/[0-9]/g) || []).length;
      const emojis = (clean.match(emojiRegex) || []).length;
      const hasPersonalization = /\[[^\]]+\]|\{[^\}]+\}|님|고객/.test(clean);
      const spamCount = spamWords.filter(w => clean.toLowerCase().includes(w.toLowerCase())).length;
      const urgencyCount = urgencyWords.filter(w => clean.includes(w)).length;

      let score = 100;
      const comments = [];

      if (chars < idealMin) { score -= 18; comments.push('제목이 다소 짧습니다.'); }
      else if (chars > idealMax) { score -= Math.min(30, (chars - idealMax) * 1.5); comments.push('제목이 길어 모바일에서 잘릴 수 있습니다.'); }
      else { score += 6; comments.push('권장 길이 범위입니다.'); }

      if (numbers > 0) { score += 5; comments.push('숫자 사용으로 구체성이 높습니다.'); }
      if (emojis >= 1 && emojis <= 2) { score += 4; comments.push('이모지 사용이 적절합니다.'); }
      if (emojis >= 3) { score -= 10; comments.push('이모지가 많아 스팸 인상 우려가 있습니다.'); }
      if (hasPersonalization) { score += 7; comments.push('개인화 요소가 포함되었습니다.'); }
      if (urgencyCount > 0) { score += 4; comments.push('긴급/행동 유도 요소가 있습니다.'); }
      if (spamCount > 0) { score -= spamCount * 14; comments.push('스팸 필터에 불리한 단어가 포함되었습니다.'); }
      if (/!{3,}/.test(clean)) { score -= 8; comments.push('느낌표 과다 사용은 신뢰를 낮출 수 있습니다.'); }

      score = Math.max(0, Math.min(100, Math.round(score)));
      return { clean, chars, bytes, numbers, emojis, hasPersonalization, spamCount, score, comments };
    }

    function run() {
      const idealMin = Number($('idealMin').value) || 24;
      const idealMax = Number($('idealMax').value) || 45;
      const lines = $('subjects').value.split('\n').map(v => v.trim()).filter(Boolean);

      const results = lines.map(t => analyzeOne(t, idealMin, idealMax)).sort((a, b) => b.score - a.score);
      $('count').textContent = `${results.length}개`;
      if (!results.length) {
        $('avg').textContent = '-';
        $('bestScore').textContent = '-';
        $('bestText').textContent = '제목을 입력해 주세요.';
        $('rows').innerHTML = '';
        $('tips').innerHTML = '';
        return;
      }

      const avg = results.reduce((a, b) => a + b.score, 0) / results.length;
      const best = results[0];
      $('avg').textContent = `${avg.toFixed(1)}점`;
      $('bestScore').textContent = `${best.score}점`;
      $('bestText').innerHTML = `추천 제목: <strong>${best.clean}</strong>`;

      const rowHtml = results.map((r, i) => {
        const cls = r.score >= 80 ? 'ok' : r.score >= 60 ? 'warn' : 'bad';
        const spamLabel = r.spamCount === 0 ? '<span class="ok">낮음</span>' : `<span class="bad">높음 (${r.spamCount})</span>`;
        return `<tr>
          <td>${i + 1}</td>
          <td>${r.clean}</td>
          <td class="score ${cls}">${r.score}</td>
          <td>${r.chars} / ${r.bytes}</td>
          <td>${r.numbers}</td>
          <td>${r.emojis}</td>
          <td>${r.hasPersonalization ? '있음' : '없음'}</td>
          <td>${spamLabel}</td>
          <td>${r.comments.join(' ')}</td>
        </tr>`;
      }).join('');
      $('rows').innerHTML = rowHtml;

      const tips = [
        `권장 길이: ${idealMin}~${idealMax}자`,
        '숫자/혜택/기간을 포함하면 클릭률 개선에 유리',
        '스팸성 단어(무료/100%/!!!) 과다 사용 주의',
        '개인화 태그([이름], {company})를 테스트 그룹으로 분리 권장'
      ];
      $('tips').innerHTML = tips.map(t => `<span class="chip">${t}</span>`).join('');

      window.__bestSubject = best.clean;
    }

    $('analyzeBtn').addEventListener('click', run);
    $('sampleBtn').addEventListener('click', () => {
      $('subjects').value = `[이름]님, 이번 주 베스트셀러 20% 할인 안내\n딱 24시간! 장바구니 쿠폰 지금 확인하세요\n2월 업데이트: 팀 생산성을 2배 높이는 자동화 체크리스트\n무료!!! 지금 클릭하고 100% 혜택 받기`;
      run();
    });
    $('copyBestBtn').addEventListener('click', async () => {
      const best = window.__bestSubject;
      if (!best) return alert('먼저 분석을 실행해 주세요.');
      try { await navigator.clipboard.writeText(best); alert('추천 제목을 복사했습니다.'); }
      catch { alert('클립보드 접근 권한이 없습니다.'); }
    });
    ['subjects','idealMin','idealMax'].forEach(id => $(id).addEventListener('input', run));
    run();
  </script>
</body>
</html>
