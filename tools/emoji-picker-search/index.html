<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emoji Picker & Search</title>
  <style>
    :root {
      --bg: #101220;
      --panel: #171a2e;
      --border: #2f355c;
      --text: #eef1ff;
      --muted: #9ca8ce;
      --accent: #7f95ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(900px 600px at 10% -15%, #34306b 0%, transparent 60%),
        radial-gradient(800px 500px at 100% 120%, #155675 0%, transparent 60%),
        var(--bg);
      padding: 18px;
    }
    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,.02);
      box-shadow: 0 18px 40px rgba(0,0,0,.3);
    }
    h1 { margin: 4px 0; font-size: clamp(1.2rem,2.3vw,1.8rem); }
    .desc { margin: 6px 0 14px; color: var(--muted); }
    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 10px;
    }
    input {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0e1327;
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
      width: 100%;
    }
    button {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #141b35;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { background: #1a2240; }
    .recent, .grid {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel);
      padding: 10px;
    }
    .label { color: var(--muted); font-size: .86rem; margin: 2px 0 8px; }
    .chips, .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
      gap: 8px;
    }
    .emoji-btn {
      border: 1px solid #364071;
      background: #0f152d;
      border-radius: 10px;
      font-size: 1.5rem;
      height: 48px;
      line-height: 1;
      display: grid;
      place-items: center;
    }
    .emoji-btn:hover { transform: translateY(-1px); background: #162044; }
    .hint { color: #8effc8; min-height: 18px; margin-top: 8px; font-size: .9rem; }
    @media (max-width: 700px) { .top { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="app">
    <h1>Emoji Picker & Search</h1>
    <p class="desc">Search by keyword, click an emoji to copy it instantly, and reuse your recent picks.</p>

    <div class="top">
      <input id="q" placeholder="Search: smile, heart, food, travel, idea..." />
      <button id="copyAllRecent">Copy Recent</button>
    </div>

    <section class="recent">
      <div class="label">Recent</div>
      <div id="recent" class="chips"></div>
    </section>

    <section class="grid" style="margin-top:10px">
      <div class="label" id="count">0 results</div>
      <div id="list" class="emoji-grid"></div>
    </section>
    <p id="hint" class="hint"></p>
  </main>

  <script>
    const EMOJIS = [
      ['😀','grinning smile happy'],['😄','smile laugh happy'],['😂','joy tears laugh'],['😊','blush smile pleased'],
      ['😍','love heart eyes'],['😎','cool sunglasses'],['🤔','thinking idea'],['😭','cry sad tears'],['😡','angry mad'],
      ['🥳','party celebrate'],['🤯','mind blown surprise'],['😴','sleep tired'],['🤗','hug love'],['👍','thumbs up yes'],
      ['👎','thumbs down no'],['👏','clap applause'],['🙏','pray thanks please'],['🔥','fire hot trend'],['✨','sparkles shine'],
      ['🎉','party popper celebration'],['❤️','heart love'],['💔','broken heart'],['💯','hundred perfect'],['✅','check done'],
      ['❌','x cancel'],['⚡','lightning fast'],['🌈','rainbow color'],['☀️','sun weather'],['🌙','moon night'],['⭐','star favorite'],
      ['🍎','apple fruit food'],['🍕','pizza food'],['🍔','burger food'],['🍜','ramen noodle food'],['☕','coffee drink'],
      ['🍺','beer drink'],['🎂','cake birthday'],['🍀','clover luck'],['🌸','flower spring'],['🌊','wave ocean sea'],
      ['🏝️','island travel beach'],['✈️','airplane travel'],['🚗','car travel'],['🚀','rocket launch'],['🎧','music headphone'],
      ['🎮','game controller'],['📚','books study'],['💡','idea bulb'],['🧠','brain think'],['⌛','hourglass time'],
      ['📅','calendar schedule'],['📝','note write'],['🔒','lock secure'],['🔓','unlock open'],['🔑','key password'],
      ['💻','laptop coding'],['📱','mobile phone'],['🛠️','tools build'],['📦','package box'],['🔍','search find'],
      ['📈','chart growth'],['💰','money cash'],['🏆','trophy win'],['⚽','soccer sports'],['🏀','basketball sports'],
      ['🐶','dog pet'],['🐱','cat pet'],['🦊','fox animal'],['🐼','panda animal'],['🐧','penguin animal'],
      ['🐟','fish sea'],['🍋','lemon fruit'],['🥑','avocado food'],['🌮','taco food'],['🍣','sushi food'],
      ['🧩','puzzle'],['🎯','target goal'],['🧪','science lab'],['🩺','health medical'],['🏃','run fitness'],
      ['🧘','meditation calm'],['💤','sleep'],['🧭','compass direction'],['🗺️','map travel'],['📷','camera photo'],
      ['🎬','movie film'],['🎤','microphone sing'],['📢','announcement'],['💬','chat message'],['📎','paperclip attach']
    ];

    const q = document.getElementById('q');
    const list = document.getElementById('list');
    const count = document.getElementById('count');
    const hint = document.getElementById('hint');
    const recentEl = document.getElementById('recent');

    let recent = JSON.parse(localStorage.getItem('emojiRecent') || '[]');

    function copy(text, msg) {
      navigator.clipboard.writeText(text).then(() => {
        hint.textContent = msg;
        setTimeout(() => hint.textContent = '', 1200);
      }).catch(() => hint.textContent = 'Clipboard blocked');
    }

    function remember(emoji) {
      recent = [emoji, ...recent.filter(e => e !== emoji)].slice(0, 12);
      localStorage.setItem('emojiRecent', JSON.stringify(recent));
      renderRecent();
    }

    function emojiButton(emoji, desc='') {
      const btn = document.createElement('button');
      btn.className = 'emoji-btn';
      btn.title = desc;
      btn.textContent = emoji;
      btn.onclick = () => {
        copy(emoji, `${emoji} copied`);
        remember(emoji);
      };
      return btn;
    }

    function renderRecent() {
      recentEl.innerHTML = '';
      if (!recent.length) {
        recentEl.innerHTML = '<span style="color:var(--muted);font-size:.9rem">No recent emojis yet</span>';
        return;
      }
      recent.forEach(e => recentEl.appendChild(emojiButton(e, 'recent')));
    }

    function render() {
      const term = q.value.trim().toLowerCase();
      const result = EMOJIS.filter(([emoji, keywords]) =>
        !term || emoji.includes(term) || keywords.includes(term)
      );
      list.innerHTML = '';
      result.forEach(([emoji, keywords]) => list.appendChild(emojiButton(emoji, keywords)));
      count.textContent = `${result.length} results`;
    }

    q.addEventListener('input', render);
    document.getElementById('copyAllRecent').onclick = () => {
      if (!recent.length) return hint.textContent = 'No recent emojis';
      copy(recent.join(' '), 'Recent emojis copied');
    };

    renderRecent();
    render();
  </script>
</body>
</html>
