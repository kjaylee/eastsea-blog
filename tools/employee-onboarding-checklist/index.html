<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신입 온보딩 체크리스트 생성기 | Employee Onboarding Checklist</title>
  <meta name="description" content="신입사원 온보딩 체크리스트를 자동 생성하고 복사/다운로드할 수 있는 도구" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --card: #121a32;
      --card-2: #192546;
      --line: #2d4175;
      --text: #edf2ff;
      --muted: #9fb0d8;
      --primary: #7c93ff;
      --ok: #35d49a;
      --warn: #ffb45c;
      --danger: #ff7a88;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 20% 0%, #1d2f63 0%, var(--bg) 52%);
      color: var(--text);
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 20px 14px 56px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.8vw, 1.75rem); }
    .sub { margin-top: 6px; color: var(--muted); font-size: .92rem; }
    .home {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--line);
      background: #101735;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: .88rem;
      white-space: nowrap;
    }
    .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 12px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(165deg, var(--card-2), var(--card));
      padding: 14px;
    }
    h2 { margin: 0 0 10px; font-size: 1.05rem; }
    .form { display: grid; gap: 10px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: block; margin-bottom: 5px; color: var(--muted); font-size: .81rem; }
    input, textarea, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1733;
      color: var(--text);
      padding: 10px;
      font: inherit;
      font-size: .93rem;
    }
    textarea { min-height: 100px; resize: vertical; }
    .btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #5c71ec);
    }
    .soft { background: #1a2850; border: 1px solid var(--line); font-weight: 600; }
    .result-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px;
      background: #0f1836;
    }
    .k { color: var(--muted); font-size: .76rem; margin-bottom: 4px; }
    .v { font-size: .98rem; font-weight: 700; }
    .phase {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #101a3b;
      padding: 10px;
      margin-bottom: 8px;
    }
    .phase h3 { margin: 0 0 8px; font-size: .93rem; color: #dfe7ff; }
    .tasks { display: grid; gap: 6px; }
    .task {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: .9rem;
      padding: 6px 7px;
      border-radius: 8px;
      background: #0c1430;
    }
    .task.done { opacity: .62; text-decoration: line-through; }
    .status {
      margin-top: 10px;
      font-size: .9rem;
      color: var(--ok);
      min-height: 1.3em;
    }
    .error { color: var(--danger); }
    .preview {
      white-space: pre-wrap;
      background: #0a1229;
      border: 1px dashed #35508b;
      border-radius: 10px;
      padding: 10px;
      color: #d9e4ff;
      max-height: 180px;
      overflow: auto;
      font-size: .84rem;
      margin-top: 8px;
    }
    @media (max-width: 860px) {
      .grid, .two { grid-template-columns: 1fr; }
      .btns { grid-template-columns: 1fr 1fr; }
      .result-meta { grid-template-columns: 1fr; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🧾 신입사원 온보딩 체크리스트 생성기</h1>
        <div class="sub">입력값 기반으로 D-7, Day 1, Week 1, Month 1 체크리스트를 자동 생성합니다.</div>
      </div>
      <a class="home" href="/tools/">도구 목록</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="form">
          <div class="two">
            <div>
              <label for="company">회사명 *</label>
              <input id="company" placeholder="예: 동해소프트" />
            </div>
            <div>
              <label for="name">신입사원 이름 *</label>
              <input id="name" placeholder="예: 김지은" />
            </div>
          </div>
          <div class="two">
            <div>
              <label for="role">직무 *</label>
              <input id="role" placeholder="예: 게임 클라이언트 개발자" />
            </div>
            <div>
              <label for="department">소속 팀</label>
              <input id="department" placeholder="예: 게임개발본부" />
            </div>
          </div>
          <div class="two">
            <div>
              <label for="startDate">입사일 *</label>
              <input id="startDate" type="date" />
            </div>
            <div>
              <label for="workType">근무 형태</label>
              <select id="workType">
                <option value="office">오피스 근무</option>
                <option value="hybrid">하이브리드</option>
                <option value="remote">원격 근무</option>
              </select>
            </div>
          </div>
          <div class="two">
            <div>
              <label for="employmentType">고용 형태</label>
              <select id="employmentType">
                <option>정규직</option>
                <option>계약직</option>
                <option>인턴</option>
              </select>
            </div>
            <div>
              <label for="mentor">멘토/버디</label>
              <input id="mentor" placeholder="예: 이현우 리드" />
            </div>
          </div>
          <div>
            <label for="custom">맞춤 체크리스트 (줄바꿈으로 여러 개 입력)</label>
            <textarea id="custom" placeholder="예:\n개발 PC 지급 확인\n게임 빌드 환경 세팅\n1:1 목표 설정 미팅"></textarea>
          </div>
          <div class="btns">
            <button id="generate" type="button">체크리스트 생성</button>
            <button id="copy" class="soft" type="button">마크다운 복사</button>
            <button id="download" class="soft" type="button">파일 다운로드</button>
          </div>
        </div>
        <div id="status" class="status"></div>
      </article>

      <article class="card">
        <h2>결과</h2>
        <div class="result-meta">
          <div class="pill"><div class="k">총 항목 수</div><div id="totalCount" class="v">0개</div></div>
          <div class="pill"><div class="k">완료율</div><div id="progress" class="v">0%</div></div>
          <div class="pill"><div class="k">입사 D-Day</div><div id="dDay" class="v">-</div></div>
        </div>
        <div id="result"></div>
        <div id="preview" class="preview">생성 버튼을 눌러 체크리스트를 만들어주세요.</div>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const E = {
      company: $("company"),
      name: $("name"),
      role: $("role"),
      department: $("department"),
      startDate: $("startDate"),
      workType: $("workType"),
      employmentType: $("employmentType"),
      mentor: $("mentor"),
      custom: $("custom"),
      generate: $("generate"),
      copy: $("copy"),
      download: $("download"),
      result: $("result"),
      preview: $("preview"),
      status: $("status"),
      totalCount: $("totalCount"),
      progress: $("progress"),
      dDay: $("dDay")
    };

    const phaseBase = {
      "D-7 준비": [
        "인사정보/계정 생성 (이메일, 협업툴, 사내 위키)",
        "필요 장비 준비 (노트북, 보안키, 헤드셋)",
        "입사 첫 주 일정 공유"
      ],
      "Day 1": [
        "팀/조직 오리엔테이션 진행",
        "업무용 툴 로그인 및 보안 교육",
        "직무 목표와 첫 30일 기대치 정렬"
      ],
      "Week 1": [
        "핵심 제품/서비스 데모 체험",
        "코드/문서/프로세스 탐색 세션",
        "멘토와 1:1 주간 체크인"
      ],
      "Month 1": [
        "첫 성과 리뷰 및 피드백 회고",
        "개인 목표(KPI/OKR) 확정",
        "온보딩 만족도 설문 작성"
      ]
    };

    let lastMarkdown = "";
    let checkCount = 0;
    let checkedCount = 0;

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function daysFromToday(dateStr) {
      if (!dateStr) return "-";
      const target = new Date(dateStr + "T00:00:00");
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diff = Math.round((target - today) / 86400000);
      if (diff === 0) return "D-Day";
      return diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
    }

    function validate() {
      if (!E.company.value.trim()) return "회사명을 입력하세요.";
      if (!E.name.value.trim()) return "신입사원 이름을 입력하세요.";
      if (!E.role.value.trim()) return "직무를 입력하세요.";
      if (!E.startDate.value) return "입사일을 선택하세요.";
      return "";
    }

    function buildChecklist() {
      const company = E.company.value.trim();
      const name = E.name.value.trim();
      const role = E.role.value.trim();
      const department = E.department.value.trim() || "미지정 팀";
      const workType = E.workType.value;
      const employmentType = E.employmentType.value;
      const mentor = E.mentor.value.trim() || "미정";
      const startDate = E.startDate.value;
      const customTasks = E.custom.value
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean);

      const phase = JSON.parse(JSON.stringify(phaseBase));

      if (workType === "remote") {
        phase["D-7 준비"].push("원격 접속 VPN/보안 인증 사전 점검");
        phase["Day 1"].push("원격 협업 규칙(응답 SLA, 회의 규칙) 공유");
      } else if (workType === "hybrid") {
        phase["Week 1"].push("오피스/원격 근무일 캘린더 합의");
      } else {
        phase["D-7 준비"].push("사무실 좌석/출입카드 발급 확인");
      }

      if (employmentType === "인턴") {
        phase["Month 1"].push("인턴십 학습 목표 및 중간 평가 일정 확정");
      }
      if (employmentType === "계약직") {
        phase["Day 1"].push("계약 기간/업무 범위 재확인");
      }

      if (customTasks.length) {
        phase["맞춤 항목"] = customTasks;
      }

      let html = "";
      let markdown = `# ${company} 온보딩 체크리스트\n\n`;
      markdown += `- 대상: ${name} (${role})\n`;
      markdown += `- 소속: ${department}\n`;
      markdown += `- 입사일: ${startDate}\n`;
      markdown += `- 고용형태: ${employmentType}\n`;
      markdown += `- 근무형태: ${E.workType.options[E.workType.selectedIndex].text}\n`;
      markdown += `- 멘토: ${mentor}\n\n`;

      checkCount = 0;
      checkedCount = 0;

      Object.entries(phase).forEach(([phaseName, tasks], phaseIndex) => {
        markdown += `## ${phaseName}\n`;
        const taskItems = tasks.map((task, taskIndex) => {
          const id = `c-${phaseIndex}-${taskIndex}`;
          checkCount += 1;
          return `<label class="task" for="${id}"><input data-check="1" id="${id}" type="checkbox" /> <span>${escapeHtml(task)}</span></label>`;
        }).join("");

        markdown += tasks.map((task) => `- [ ] ${task}`).join("\n") + "\n\n";
        html += `<section class="phase"><h3>${escapeHtml(phaseName)}</h3><div class="tasks">${taskItems}</div></section>`;
      });

      const dday = daysFromToday(startDate);
      E.dDay.textContent = dday;
      E.totalCount.textContent = `${checkCount}개`;
      E.progress.textContent = "0%";

      lastMarkdown = markdown;
      E.result.innerHTML = html;
      E.preview.textContent = markdown;
      E.status.textContent = "체크리스트가 생성되었습니다.";
      E.status.classList.remove("error");
      bindProgress();
    }

    function bindProgress() {
      E.result.querySelectorAll('input[data-check="1"]').forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const wrapper = checkbox.closest(".task");
          if (wrapper) wrapper.classList.toggle("done", checkbox.checked);
          checkedCount = E.result.querySelectorAll('input[data-check="1"]:checked').length;
          const ratio = checkCount ? Math.round((checkedCount / checkCount) * 100) : 0;
          E.progress.textContent = `${ratio}%`;
        });
      });
    }

    async function copyMarkdown() {
      if (!lastMarkdown) {
        E.status.textContent = "먼저 체크리스트를 생성하세요.";
        E.status.classList.add("error");
        return;
      }
      try {
        await navigator.clipboard.writeText(lastMarkdown);
        E.status.textContent = "마크다운이 클립보드에 복사되었습니다.";
        E.status.classList.remove("error");
      } catch (error) {
        E.status.textContent = "복사 권한이 없어 실패했습니다.";
        E.status.classList.add("error");
      }
    }

    function downloadMarkdown() {
      if (!lastMarkdown) {
        E.status.textContent = "먼저 체크리스트를 생성하세요.";
        E.status.classList.add("error");
        return;
      }
      const safeName = (E.name.value.trim() || "onboarding").replace(/\s+/g, "-").toLowerCase();
      const fileName = `onboarding-checklist-${safeName}.md`;
      const blob = new Blob([lastMarkdown], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      E.status.textContent = "체크리스트 파일을 다운로드했습니다.";
      E.status.classList.remove("error");
    }

    E.generate.addEventListener("click", () => {
      const error = validate();
      if (error) {
        E.status.textContent = error;
        E.status.classList.add("error");
        return;
      }
      buildChecklist();
    });
    E.copy.addEventListener("click", copyMarkdown);
    E.download.addEventListener("click", downloadMarkdown);

    E.startDate.value = new Date().toISOString().slice(0, 10);
  </script>
</body>
</html>
