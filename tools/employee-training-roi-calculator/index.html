<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Training ROI Calculator | 직원 교육 ROI 계산기</title>
  <meta name="description" content="직원 교육 프로그램의 총 투자비, 연간 기대효익, ROI, 회수기간, 손익분기 생산성 향상률을 계산하는 비즈니스 ROI 도구" />
  <style>
    :root{--bg:#071021;--card:#111f3a;--line:#2b3f68;--txt:#edf3ff;--muted:#a9bbdb;--pri:#6d8eff;--bad:#fca5a5;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:var(--txt);background:radial-gradient(circle at 10% 0,#20396f 0,#071021 50%)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 60px}
    .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.25rem,3vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .portal{white-space:nowrap;text-decoration:none;color:#dbe7ff;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#101a32}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(160deg,#172a50,#101d38);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0e1831;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5c78ea);font-weight:700}
    .soft{background:#172850;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{margin-top:10px;min-height:104px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f2b3a;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0f1934;border-radius:11px;padding:10px}
    .k{font-size:.75rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{margin-top:10px;display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:#132246;color:#bed0f1;font-size:.76rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🎓 직원 교육 ROI 계산기</h1>
        <div class="sub">교육비 + 기회비용 대비 생산성 향상 효과를 숫자로 검증하고, 회수기간과 손익분기 향상률을 빠르게 계산합니다.</div>
      </div>
      <a class="portal" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="employees">직원 수</label><input id="employees" type="number" min="1" value="40" /></div>
          <div><label for="trainingHours">직원당 교육 시간 (h)</label><input id="trainingHours" type="number" min="0.1" step="0.1" value="12" /></div>
          <div><label for="hourlyCost">시간당 인건비 (KRW)</label><input id="hourlyCost" type="number" min="0" value="35000" /></div>
          <div><label for="annualRevenuePerEmployee">직원당 연매출 (KRW)</label><input id="annualRevenuePerEmployee" type="number" min="1" value="120000000" /></div>
          <div><label for="productivityGain">생산성 향상률 (%)</label><input id="productivityGain" type="number" min="0.1" max="100" step="0.1" value="4.5" /></div>
          <div><label for="realizationRate">효과 실현율 (%)</label><input id="realizationRate" type="number" min="1" max="100" step="0.1" value="75" /></div>
          <div><label for="programCost">프로그램 비용 (KRW)</label><input id="programCost" type="number" min="0" value="24000000" /></div>
          <div><label for="annualSupportCost">연 운영비 (KRW)</label><input id="annualSupportCost" type="number" min="0" value="6000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 지표</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">총 투자비 (교육+기회비용)</div><div id="investment" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 기대효익(총)</div><div id="grossBenefit" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 순효익</div><div id="netBenefit" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI (1년)</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 생산성 향상률</div><div id="breakevenGain" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">성과 해석 대기</div>

        <h2 style="margin-top:12px">계산 근거</h2>
        <table>
          <tbody>
            <tr><th>교육 기회비용</th><td id="opportunityCost">-</td></tr>
            <tr><th>효익 실현계수</th><td id="realizationFactor">-</td></tr>
            <tr><th>연 순현금효과(초기비 제외)</th><td id="annualCashEffect">-</td></tr>
            <tr><th>ROI 산식</th><td id="formula">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      employees: $("employees"), trainingHours: $("trainingHours"), hourlyCost: $("hourlyCost"),
      annualRevenuePerEmployee: $("annualRevenuePerEmployee"), productivityGain: $("productivityGain"), realizationRate: $("realizationRate"),
      programCost: $("programCost"), annualSupportCost: $("annualSupportCost"),
      investment: $("investment"), grossBenefit: $("grossBenefit"), netBenefit: $("netBenefit"), roi: $("roi"), payback: $("payback"), breakevenGain: $("breakevenGain"),
      opportunityCost: $("opportunityCost"), realizationFactor: $("realizationFactor"), annualCashEffect: $("annualCashEffect"), formula: $("formula"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = {
      employees: 40, trainingHours: 12, hourlyCost: 35000, annualRevenuePerEmployee: 120000000,
      productivityGain: 4.5, realizationRate: 75, programCost: 24000000, annualSupportCost: 6000000
    };

    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v) {
      if (!Number.isFinite(v.employees) || v.employees < 1) return "직원 수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.trainingHours) || v.trainingHours <= 0) return "직원당 교육 시간은 0보다 커야 합니다.";
      if (!Number.isFinite(v.hourlyCost) || v.hourlyCost < 0) return "시간당 인건비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.annualRevenuePerEmployee) || v.annualRevenuePerEmployee <= 0) return "직원당 연매출은 0보다 커야 합니다.";
      if (!Number.isFinite(v.productivityGain) || v.productivityGain <= 0 || v.productivityGain > 100) return "생산성 향상률은 0~100 범위(0 제외)여야 합니다.";
      if (!Number.isFinite(v.realizationRate) || v.realizationRate <= 0 || v.realizationRate > 100) return "실현율은 0~100 범위(0 제외)여야 합니다.";
      if (!Number.isFinite(v.programCost) || v.programCost < 0) return "프로그램 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.annualSupportCost) || v.annualSupportCost < 0) return "연 운영비는 0 이상이어야 합니다.";
      return "";
    }

    function compute(v) {
      const opportunityCost = v.employees * v.trainingHours * v.hourlyCost;
      const totalInvestment = opportunityCost + v.programCost;
      const realization = v.realizationRate / 100;
      const annualGrossBenefit = v.employees * v.annualRevenuePerEmployee * (v.productivityGain / 100) * realization;
      const annualNetBenefit = annualGrossBenefit - v.annualSupportCost;
      const annualCashEffect = annualNetBenefit;
      const roi = totalInvestment === 0 ? Infinity : ((annualNetBenefit - totalInvestment) / totalInvestment) * 100;
      const paybackMonths = annualCashEffect > 0 ? totalInvestment / (annualCashEffect / 12) : null;
      const breakevenGain = realization > 0
        ? ((totalInvestment + v.annualSupportCost) / (v.employees * v.annualRevenuePerEmployee * realization)) * 100
        : null;

      return {
        opportunityCost,
        totalInvestment,
        annualGrossBenefit,
        annualNetBenefit,
        annualCashEffect,
        roi,
        paybackMonths,
        breakevenGain
      };
    }

    function clearOutputs() {
      ["investment", "grossBenefit", "netBenefit", "roi", "payback", "breakevenGain", "opportunityCost", "realizationFactor", "annualCashEffect", "formula"].forEach((key) => refs[key].textContent = "-");
      refs.summary.value = "";
      refs.status.textContent = "입력값을 확인하세요";
    }

    function render() {
      const v = {
        employees: Number(refs.employees.value),
        trainingHours: Number(refs.trainingHours.value),
        hourlyCost: Number(refs.hourlyCost.value),
        annualRevenuePerEmployee: Number(refs.annualRevenuePerEmployee.value),
        productivityGain: Number(refs.productivityGain.value),
        realizationRate: Number(refs.realizationRate.value),
        programCost: Number(refs.programCost.value),
        annualSupportCost: Number(refs.annualSupportCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err) {
        clearOutputs();
        return;
      }

      const r = compute(v);
      refs.investment.textContent = money(r.totalInvestment);
      refs.grossBenefit.textContent = money(r.annualGrossBenefit);
      refs.netBenefit.textContent = money(r.annualNetBenefit);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi, 1)}%` : "∞";
      refs.payback.textContent = r.paybackMonths === null ? "회수 불가" : `${num(r.paybackMonths, 1)}개월`;
      refs.breakevenGain.textContent = r.breakevenGain === null ? "N/A" : `${num(r.breakevenGain, 2)}%`;

      refs.opportunityCost.textContent = money(r.opportunityCost);
      refs.realizationFactor.textContent = `${num(v.realizationRate, 1)}%`;
      refs.annualCashEffect.textContent = money(r.annualCashEffect);
      refs.formula.textContent = `(연순효익 - 총투자비) / 총투자비`;

      if (r.roi >= 30) {
        refs.status.innerHTML = `<span class="good">●</span> ROI ${num(r.roi,1)}% (확장 투자 후보)`;
      } else if (r.roi >= 0) {
        refs.status.innerHTML = `<span class="warn">●</span> ROI ${num(r.roi,1)}% (개선 후 검토)`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> ROI ${num(r.roi,1)}% (재설계 필요)`;
      }

      refs.summary.value = [
        "[Employee Training ROI 요약]",
        `총 투자비: ${money(r.totalInvestment)}`,
        `연간 기대효익: ${money(r.annualGrossBenefit)}`,
        `연간 순효익: ${money(r.annualNetBenefit)}`,
        `ROI(1년): ${Number.isFinite(r.roi) ? num(r.roi,1) + '%' : '∞'}`,
        `회수기간: ${r.paybackMonths === null ? '회수 불가' : num(r.paybackMonths,1) + '개월'}`,
        `손익분기 생산성 향상률: ${r.breakevenGain === null ? 'N/A' : num(r.breakevenGain,2) + '%'}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert("요약이 복사되었습니다.");
      } catch {
        alert("복사 권한이 없어 수동 복사가 필요합니다.");
      }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.employees, refs.trainingHours, refs.hourlyCost, refs.annualRevenuePerEmployee, refs.productivityGain, refs.realizationRate, refs.programCost, refs.annualSupportCost]
      .forEach((el) => {
        el.addEventListener("input", render);
        el.addEventListener("change", render);
      });

    render();
  </script>
</body>
</html>
