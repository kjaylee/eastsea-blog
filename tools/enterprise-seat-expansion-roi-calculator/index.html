<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise Seat Expansion ROI Calculator | 엔터프라이즈 좌석 확장 ROI 계산기</title>
  <meta name="description" content="엔터프라이즈 계정의 좌석 확장(upsell) 시 기대 ARR, 총이익, ROI, 회수기간, 손익분기 도입률을 계산합니다." />
  <style>
    :root{--bg:#0b1220;--card:#121c2f;--line:#2b3a55;--txt:#f0f4ff;--muted:#a6b4cc;--pri:#5b8dff;--soft:#17253e;--ok:#34d399;--warn:#f59e0b;--err:#fecaca;--errBg:rgba(248,113,113,.16)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#23395d 0%,#0b1220 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px} .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)} .sub{margin-top:6px;color:var(--muted);font-size:.93rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f1b33;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px} .card{background:linear-gradient(165deg,#172844,#121c2f);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem} .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px} input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c162b;color:var(--txt);font-size:.93rem}
    textarea{min-height:110px;resize:vertical;margin-top:10px} button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#7aa6ff);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)} .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem} .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px} .kpi{border:1px solid var(--line);background:#0e1a32;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px} .v{font-size:1.05rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#1a2c4c;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word} th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🏢 엔터프라이즈 좌석 확장 ROI 계산기</h1>
        <div class="sub">좌석 확장(upsell) 전략의 ARR·총이익·ROI·회수기간을 빠르게 산출합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="targetAccounts">타깃 계정 수</label><input id="targetAccounts" type="number" min="1" value="40" /></div>
          <div><label for="takeRate">좌석 확장 도입률 (%)</label><input id="takeRate" type="number" min="0" max="100" step="0.1" value="35" /></div>
          <div><label for="expansionSeats">계정당 확장 좌석</label><input id="expansionSeats" type="number" min="1" value="12" /></div>
          <div><label for="pricePerSeat">좌석당 월 요금 (₩)</label><input id="pricePerSeat" type="number" min="1" value="50000" /></div>
          <div><label for="discountRate">확장 할인율 (%)</label><input id="discountRate" type="number" min="0" max="100" step="0.1" value="10" /></div>
          <div><label for="grossMargin">매출총이익률 (%)</label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="80" /></div>
          <div><label for="commissionRate">영업 커미션 (%)</label><input id="commissionRate" type="number" min="0" max="100" step="0.1" value="8" /></div>
          <div><label for="supportCost">확장 계정당 월 지원비 (₩)</label><input id="supportCost" type="number" min="0" value="120000" /></div>
          <div><label for="analysisMonths">분석 기간 (개월)</label><input id="analysisMonths" type="number" min="1" value="12" /></div>
          <div><label for="enablementCost">초기 Enablement 비용 (₩)</label><input id="enablementCost" type="number" min="0" value="24000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 확장 매출</div><div id="monthlyRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">확장 ARR</div><div id="annualArr" class="v">-</div></div>
          <div class="kpi"><div class="k">월 총이익</div><div id="monthlyGross" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roiPct" class="v">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>기간 총이익</th><td id="totalGross">-</td></tr>
            <tr><th>총 비용(커미션+지원+초기)</th><td id="totalCost">-</td></tr>
            <tr><th>기간 순효과</th><td id="netImpact">-</td></tr>
            <tr><th>손익분기 도입률</th><td id="breakEven">-</td></tr>
            <tr><th>계정당 월 마진</th><td id="marginPerAccount">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      targetAccounts: $("targetAccounts"), takeRate: $("takeRate"), expansionSeats: $("expansionSeats"), pricePerSeat: $("pricePerSeat"), discountRate: $("discountRate"), grossMargin: $("grossMargin"), commissionRate: $("commissionRate"),
      supportCost: $("supportCost"), analysisMonths: $("analysisMonths"), enablementCost: $("enablementCost"),
      monthlyRevenue: $("monthlyRevenue"), annualArr: $("annualArr"), monthlyGross: $("monthlyGross"), monthlyNet: $("monthlyNet"), roiPct: $("roiPct"), payback: $("payback"),
      totalGross: $("totalGross"), totalCost: $("totalCost"), netImpact: $("netImpact"), breakEven: $("breakEven"), marginPerAccount: $("marginPerAccount"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = {
      targetAccounts: 40, takeRate: 35, expansionSeats: 12, pricePerSeat: 50000, discountRate: 10, grossMargin: 80, commissionRate: 8,
      supportCost: 120000, analysisMonths: 12, enablementCost: 24000000
    };

    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(Number.isFinite(n) ? n : 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v){
      if (!Number.isFinite(v.targetAccounts) || v.targetAccounts <= 0) return "타깃 계정 수는 0보다 커야 합니다.";
      if (!Number.isFinite(v.takeRate) || v.takeRate < 0 || v.takeRate > 100) return "도입률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.expansionSeats) || v.expansionSeats <= 0) return "계정당 확장 좌석은 0보다 커야 합니다.";
      if (!Number.isFinite(v.pricePerSeat) || v.pricePerSeat <= 0) return "좌석당 요금은 0보다 커야 합니다.";
      if (!Number.isFinite(v.discountRate) || v.discountRate < 0 || v.discountRate > 100) return "할인율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.grossMargin) || v.grossMargin < 0 || v.grossMargin > 100) return "매출총이익률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.commissionRate) || v.commissionRate < 0 || v.commissionRate > 100) return "커미션율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.supportCost) || v.supportCost < 0) return "지원비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.analysisMonths) || v.analysisMonths <= 0) return "분석 기간은 1개월 이상이어야 합니다.";
      if (!Number.isFinite(v.enablementCost) || v.enablementCost < 0) return "초기 비용은 0 이상이어야 합니다.";
      return "";
    }

    function render(){
      const v = {
        targetAccounts: Number(refs.targetAccounts.value), takeRate: Number(refs.takeRate.value), expansionSeats: Number(refs.expansionSeats.value), pricePerSeat: Number(refs.pricePerSeat.value),
        discountRate: Number(refs.discountRate.value), grossMargin: Number(refs.grossMargin.value), commissionRate: Number(refs.commissionRate.value),
        supportCost: Number(refs.supportCost.value), analysisMonths: Number(refs.analysisMonths.value), enablementCost: Number(refs.enablementCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err){
        ["monthlyRevenue","annualArr","monthlyGross","monthlyNet","roiPct","payback","totalGross","totalCost","netImpact","breakEven","marginPerAccount"].forEach((k)=>refs[k].textContent="-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const takeRate = v.takeRate / 100;
      const discount = v.discountRate / 100;
      const gm = v.grossMargin / 100;
      const commission = v.commissionRate / 100;

      const unitRevenue = v.expansionSeats * v.pricePerSeat * (1 - discount);
      const monthlyRevenue = v.targetAccounts * takeRate * unitRevenue;
      const annualArr = monthlyRevenue * 12;
      const monthlyGross = monthlyRevenue * gm;
      const monthlyCommission = monthlyRevenue * commission;
      const monthlySupport = v.targetAccounts * takeRate * v.supportCost;
      const monthlyNet = monthlyGross - monthlyCommission - monthlySupport;
      const totalGross = monthlyGross * v.analysisMonths;
      const totalCost = (monthlyCommission + monthlySupport) * v.analysisMonths + v.enablementCost;
      const netImpact = totalGross - totalCost;
      const roiPct = totalCost > 0 ? (netImpact / totalCost) * 100 : 0;
      const payback = monthlyNet > 0 ? v.enablementCost / monthlyNet : Infinity;

      const marginPerAccount = unitRevenue * (gm - commission) - v.supportCost;
      const breakEven = marginPerAccount > 0 ? v.enablementCost / (v.targetAccounts * marginPerAccount * v.analysisMonths) : Infinity;

      refs.monthlyRevenue.textContent = money(monthlyRevenue);
      refs.annualArr.textContent = money(annualArr);
      refs.monthlyGross.textContent = money(monthlyGross);
      refs.monthlyNet.textContent = money(monthlyNet);
      refs.roiPct.textContent = `${num(roiPct,2)}%`;
      refs.payback.textContent = Number.isFinite(payback) ? `${num(payback,2)}개월` : "N/A";
      refs.totalGross.textContent = money(totalGross);
      refs.totalCost.textContent = money(totalCost);
      refs.netImpact.textContent = money(netImpact);
      refs.breakEven.textContent = Number.isFinite(breakEven) ? `${num(Math.max(0, breakEven * 100),2)}%` : "N/A";
      refs.marginPerAccount.textContent = money(marginPerAccount);

      refs.status.innerHTML = monthlyNet > 0
        ? `<span class="ok">●</span> 월 순효과 ${money(monthlyNet)} (확장 전략 타당)`
        : `<span class="warn">●</span> 월 순효과 ${money(monthlyNet)} (가정 조정 필요)`;

      refs.summary.value = [
        "[Enterprise Seat Expansion ROI 요약]",
        `월 확장 매출: ${money(monthlyRevenue)}`,
        `확장 ARR: ${money(annualArr)}`,
        `월 총이익: ${money(monthlyGross)}`,
        `월 순효과: ${money(monthlyNet)}`,
        `기간 순효과: ${money(netImpact)}`,
        `ROI: ${num(roiPct,2)}%`,
        `회수기간: ${Number.isFinite(payback) ? `${num(payback,2)}개월` : "N/A"}`,
        `손익분기 도입률: ${Number.isFinite(breakEven) ? `${num(Math.max(0, breakEven*100),2)}%` : "N/A"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k,v]) => refs[k].value = v);
      render();
    });

    [refs.targetAccounts, refs.takeRate, refs.expansionSeats, refs.pricePerSeat, refs.discountRate, refs.grossMargin, refs.commissionRate, refs.supportCost, refs.analysisMonths, refs.enablementCost].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
