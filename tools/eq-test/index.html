  <style>
    :root {

      --bg2: #6f55f5;

      --line: rgba(255,255,255,0.28);
      --text: #fff;
      --muted: rgba(255,255,255,0.86);
      --radius: 22px;
      --shadow: 0 18px 44px rgba(17, 27, 80, 0.4);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(980px 720px at -20% -28%, rgba(255,255,255,0.2), transparent 62%),
        radial-gradient(960px 680px at 120% 10%, rgba(255,255,255,0.14), transparent 58%),

      padding: calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 20px);
      line-height: 1.55;
    }

    .shell { max-width: 760px; margin: 0 auto; }

    .top-progress {
      display: none;
      position: sticky;
      top: calc(env(safe-area-inset-top) + 8px);
      z-index: 20;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 9px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(16, 25, 74, 0.42);
      backdrop-filter: blur(8px);
    }
    .top-progress.show { display: flex; }
    .progress-track { flex: 1; height: 7px; border-radius: 999px; background: rgba(255,255,255,0.22); overflow: hidden; }
    .progress-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #ffe38a, #9be4ff);
      transition: width .24s ease;
    }
    .progress-text { min-width: 62px; text-align: right; font-size: .84rem; color: var(--muted); font-weight: 800; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
      animation: fadeUp .28s ease;
    }
    .card-inner { padding: 22px; }

    h1 { margin: 0; line-height: 1.22; font-size: clamp(1.52rem, 5.2vw, 2.08rem); }
    .subtitle { margin: 10px 0 0; color: var(--muted); font-size: .97rem; line-height: 1.58; }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .ghost-link {
      text-decoration: none;
      color: var(--muted);
      font-size: .83rem;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
    }
    .ghost-link:hover { color: #fff; border-color: var(--line); }

    .hero-badges { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .81rem;
      font-weight: 700;
    }

    .primary-btn,
    .secondary-btn,
    .choice-btn,
    .share-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 800;
      transition: transform .14s ease, filter .14s ease;
    }
    .primary-btn:active,
    .secondary-btn:active,
    .choice-btn:active,
    .share-btn:active { transform: translateY(1px) scale(.99); }

    .primary-btn {
      margin-top: 20px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #ffe28a, #9adfff);
      color: #163657;
      font-size: 1rem;
      box-shadow: 0 10px 24px rgba(141, 214, 255, 0.34);
    }
    .secondary-btn {
      margin-top: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid var(--line);
    }

    .question-title { margin: 0 0 9px; font-size: 1.2rem; line-height: 1.43; }
    .question-hint { margin: 0 0 12px; font-size: .9rem; color: var(--muted); }
    .choices { display: grid; gap: 10px; }
    .choice-btn {
      padding: 14px 14px;
      text-align: left;
      color: #fff;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.32);
      font-size: .95rem;
      line-height: 1.45;
      min-height: 54px;
      touch-action: manipulation;
    }
    .choice-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.6); }

    .analyzing-wrap { text-align: center; padding: 8px 0; }
    .spinner {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,0.22);
      border-top-color: #fff;
      margin: 8px auto 14px;
      animation: spin 1s linear infinite;

    .mini-track { height: 8px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.2); margin-top: 12px; }
    .mini-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #ffe38a, #8fd8ff);
      transition: width .2s ease;
    }
    .mini-text { margin-top: 7px; color: var(--muted); font-size: .9rem; font-weight: 700; }

    .result-head {
      border: 1px solid rgba(255,255,255,0.34);
      background: rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .result-type { font-size: clamp(1.16rem, 4.6vw, 1.5rem); margin: 6px 0 4px; }
    .result-summary { margin: 0; color: var(--muted); }

    .section-title { margin: 16px 0 10px; font-size: 1rem; letter-spacing: .01em; }
    .detail-text {
      margin: 0;
      white-space: pre-line;
      line-height: 1.64;
      color: rgba(255,255,255,0.95);
      font-size: .96rem;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .chip {
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.1);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 700;
    }

    .tips-list {
      margin: 10px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
      color: rgba(255,255,255,0.95);
      font-size: .95rem;
    }

    .chart-wrap {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      padding: 10px;
    }
    .chart-wrap canvas {
      width: 100%;
      height: 280px;
      display: block;
    }

    .share-grid {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0,1fr));
    }
    .share-btn {
      padding: 11px 10px;
      font-size: .9rem;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(4px);
    }
    .share-btn:hover { filter: brightness(1.08); }

    .saved-note {
      margin-top: 12px;
      border: 1px dashed rgba(255,255,255,0.42);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: .88rem;
      color: rgba(255,255,255,0.94);
      background: rgba(255,255,255,0.08);
    }

    .promo-wrap {
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.08);
    }
    .promo-list { display: grid; gap: 8px; }
    .promo-link {
      text-decoration: none;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 11px;
      padding: 9px 11px;
      background: rgba(255,255,255,0.08);
      font-size: .9rem;
    }
    .promo-link:hover { background: rgba(255,255,255,0.17); }

    .disclaimer {
      margin-top: 15px;
      font-size: .82rem;
      color: rgba(255,255,255,0.78);
      line-height: 1.58;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 16px);
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.68);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: .84rem;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 50;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      .card-inner { padding: 18px; }
      .share-grid { grid-template-columns: 1fr; }
      .chart-wrap canvas { height: 320px; }
    }
  </style>
</head>

      state.result = result;
      saveResult(result);
      state.phase = 'result';
      render();
      setTimeout(drawChart, 30);
    }

    function serviceUrl() {
      return location.origin + '/tools/eq-test/';
    }

    function composeShareText() {
      const info = RESULTS[state.result.type];
      return UI.shareText.replace('{type}', info.name);
    }

    function shareKakao() {
      const url = serviceUrl();
      const text = encodeURIComponent(composeShareText());
      const target = 'https://sharer.kakao.com/talk/friends/picker/link?url=' + encodeURIComponent(url) + '&text=' + text;
      window.open(target, '_blank', 'noopener');
    }

    function shareTwitter() {
      const url = serviceUrl();
      const text = encodeURIComponent(composeShareText());
      const target = 'https://twitter.com/intent/tweet?text=' + text + '&url=' + encodeURIComponent(url);
      window.open(target, '_blank', 'noopener');
    }

    async function copyLink() {
      const url = serviceUrl();
      try {
        await navigator.clipboard.writeText(url);
      } catch (_) {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      showToast(UI.copyDone);
    }

    function axisLabel(axis) {
      const map = {
        selfAwareness: UI.axisSelfAwareness,
        selfRegulation: UI.axisSelfRegulation,
        motivation: UI.axisMotivation,
        empathy: UI.axisEmpathy,
        socialSkill: UI.axisSocialSkill
      };
      return map[axis] || axis;
    }

    function drawChart() {
      const canvas = document.getElementById('resultChart');
      if (!canvas || !state.result) return;

      const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);

      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);

      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const values = AXES.map(function (axis) {
        return state.result.normalized[axis] || 0;
      });
      const labels = AXES.map(axisLabel);

      const left = 108;
      const right = width - 14;
      const top = 10;
      const rows = values.length;
      const gap = 10;
      const barH = Math.max(24, Math.floor((height - top * 2 - gap * (rows - 1)) / rows));

      ctx.font = '600 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Noto Sans KR,sans-serif';
      ctx.textBaseline = 'middle';

      values.forEach(function (v, i) {
        const y = top + i * (barH + gap);
        const trackW = right - left;
        const fillW = Math.max(0, Math.min(trackW, (v / 100) * trackW));

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        roundRect(ctx, left, y, trackW, barH, 10);
        ctx.fill();

        const grad = ctx.createLinearGradient(left, y, left + fillW, y);
        grad.addColorStop(0, i % 2 === 0 ? '#9be3ff' : '#ffd181');
        grad.addColorStop(1, i % 2 === 0 ? '#67c8ff' : '#ff95b0');
        ctx.fillStyle = grad;
        roundRect(ctx, left, y, fillW, barH, 10);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.fillText(labels[i], 10, y + barH / 2);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.fillText(v + '%', right - 8, y + barH / 2);
        ctx.textAlign = 'left';
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function renderIntro() {
      const saved = state.savedRaw;
      const savedLine = saved
        ? '<div class="saved-note">' + UI.prevResult
          .replace('{type}', (RESULTS[saved.type] ? RESULTS[saved.type].name : saved.type))
          .replace('{time}', formatSavedTime(saved.savedAt)) + '</div>'
        : '';

      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="top-row">
              <strong>EQ Profile</strong>
              <a class="ghost-link" href="/tools/">All Tools ↗</a>
            </div>
            <h1>${UI.title}</h1>
            <p class="subtitle">${UI.subtitle}</p>
            <div class="hero-badges">
              <span class="badge">${UI.elapsed}</span>
              <span class="badge">${UI.questionsBadge}</span>
              <span class="badge">${UI.baseBadge}</span>
            </div>
            ${savedLine}
            <button class="primary-btn" id="startBtn">${UI.start}</button>
            <p class="disclaimer">${UI.disclaimer}</p>
          </div>
        </section>
      `;

      document.getElementById('startBtn').addEventListener('click', startQuiz);
    }

    function renderQuestion() {
      const item = QUESTIONS[state.current];
      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <h2 class="question-title">Q${state.current + 1}. ${item.q}</h2>
            <p class="question-hint">${UI.hint}</p>
            <div class="choices">
              ${item.options.map(function (opt, idx) {
                return '<button class="choice-btn" data-idx="' + idx + '">' + opt.text + '</button>';
              }).join('')}
            </div>
          </div>
        </section>
      `;

      app.querySelectorAll('.choice-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          pickAnswer(Number(btn.dataset.idx));
        });
      });
    }

    function renderAnalyzing() {
      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="analyzing-wrap">
              <div class="spinner" aria-hidden="true"></div>
              <h2>${UI.analyzingTitle}</h2>
              <p class="subtitle">${UI.analyzingDesc}</p>
              <div class="mini-track"><div class="mini-fill" id="miniFill" style="width:${state.analyzingPct}%;"></div></div>
              <div class="mini-text" id="miniText">${state.analyzingPct}%</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderResult() {
      const typeInfo = RESULTS[state.result.type];
      app.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="result-head">
              <div>${UI.resultTitle}</div>
              <h2 class="result-type">${typeInfo.emoji} ${typeInfo.name}</h2>
              <p class="result-summary">${typeInfo.summary}</p>
            </div>

            <h3 class="section-title">${UI.chartTitle}</h3>
            <div class="chart-wrap"><canvas id="resultChart" width="640" height="280"></canvas></div>

            <h3 class="section-title">${UI.rolesTitle}</h3>
            <div class="chips">
              ${typeInfo.roles.map(function (item) { return '<span class="chip">' + item + '</span>'; }).join('')}
            </div>

            <h3 class="section-title">${UI.tipsTitle}</h3>
            <p class="detail-text">${typeInfo.detail}</p>
            <ul class="tips-list">
              ${typeInfo.tips.map(function (item) { return '<li>' + item + '</li>'; }).join('')}
            </ul>

            <div class="share-grid">
              <button class="share-btn" id="shareKakao">${UI.shareKakao}</button>
              <button class="share-btn" id="shareTwitter">${UI.shareTwitter}</button>
              <button class="share-btn" id="shareLink">${UI.shareLink}</button>
            </div>

            <button class="secondary-btn" id="restartBtn">${UI.restart}</button>

            <div class="promo-wrap">
              <div class="section-title" style="margin-top:0;">${UI.promoTitle}</div>
              <div class="promo-list">
                ${PROMOS.map(function (p) { return '<a class="promo-link" href="' + p.href + '">' + p.title + '</a>'; }).join('')}
              </div>
            </div>

            <p class="disclaimer">${UI.disclaimer}</p>
          </div>
        </section>
      `;

      document.getElementById('shareKakao').addEventListener('click', shareKakao);
      document.getElementById('shareTwitter').addEventListener('click', shareTwitter);
      document.getElementById('shareLink').addEventListener('click', copyLink);
      document.getElementById('restartBtn').addEventListener('click', function () {
        haptic('impact');
        state.phase = 'intro';
        state.current = 0;
        state.scores = freshScores();
        state.answers = [];
        state.result = null;
        render();
      });

      drawChart();
    }

    function render() {
      updateTopProgress();
      if (state.phase === 'intro') renderIntro();
      else if (state.phase === 'question') renderQuestion();
      else if (state.phase === 'analyzing') renderAnalyzing();
      else renderResult();
    }

    render();
    window.addEventListener('resize', function () {
      if (state.phase === 'result') drawChart();
    });
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
