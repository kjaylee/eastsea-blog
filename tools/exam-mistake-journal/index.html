<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오답 저널 & 복습 플래너</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-soft: #111127;
      --card: #171733;
      --text: #eef3ff;
      --muted: #9aa6c7;
      --neon: #00f5d4;
      --neon-2: #8a7dff;
      --danger: #ff5f8a;
      --warn: #ffd166;
      --ok: #55f07f;
      --border: rgba(138, 125, 255, 0.25);
      --shadow: 0 0 0 1px rgba(0, 245, 212, 0.08), 0 8px 26px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: radial-gradient(1200px 700px at 20% -20%, rgba(0, 245, 212, 0.08), transparent 50%),
                  radial-gradient(1000px 600px at 100% -10%, rgba(138, 125, 255, 0.15), transparent 45%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1080px, 94vw);
      margin: 24px auto 48px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.35rem, 3.5vw, 2rem);
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .panel {
      margin-top: 16px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)), var(--bg-soft);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .stat {
      background: var(--card);
      border: 1px solid rgba(0, 245, 212, 0.18);
      border-radius: 12px;
      padding: 12px;
      min-height: 84px;
    }

    .stat .k { color: var(--muted); font-size: 0.83rem; }
    .stat .v { margin-top: 8px; font-size: 1.45rem; font-weight: 750; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(138, 125, 255, 0.28);
      border-radius: 14px;
      padding: 14px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--neon);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label { display: block; font-size: 0.84rem; color: var(--muted); margin-bottom: 6px; }

    input, select, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0f1026;
      color: var(--text);
      padding: 10px 11px;
      font-size: 0.95rem;
    }

    textarea { min-height: 84px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.15);
    }

    .actions { display: flex; gap: 8px; margin-top: 10px; }

    button {
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.16);
      font-weight: 650;
      transition: 0.18s ease;
    }

    .primary {
      background: linear-gradient(135deg, var(--neon), #1ee4ff);
      color: #00111a;
      border-color: rgba(0, 245, 212, 0.5);
    }

    .secondary {
      background: #141634;
      color: var(--text);
    }

    .danger {
      background: #311427;
      border-color: rgba(255,95,138,0.35);
      color: #ffb4ca;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.04); }

    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .list {
      display: grid;
      gap: 10px;
      max-height: 60vh;
      overflow: auto;
      padding-right: 2px;
    }

    .item {
      border: 1px solid rgba(255,255,255,0.1);
      border-left: 4px solid var(--neon-2);
      border-radius: 12px;
      padding: 11px;
      background: #0e1028;
    }

    .item.overdue { border-left-color: var(--danger); }
    .item.today { border-left-color: var(--warn); }
    .item.ok { border-left-color: var(--ok); }

    .item-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 700;
      font-size: 0.96rem;
    }

    .pill {
      display: inline-block;
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--muted);
      margin-right: 6px;
      margin-top: 6px;
    }

    .memo {
      margin-top: 8px;
      color: #d0d8ef;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .item-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .item-actions button { padding: 8px; font-size: 0.85rem; }

    .empty {
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      font-size: 0.93rem;
    }

    .footnote {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    @media (max-width: 920px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .container { width: 94vw; margin-top: 16px; }
      .grid-2, .toolbar { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .item-title { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="title">오답 저널 & 복습 플래너</h1>
    <p class="subtitle">카테고리: 교육 · 시험/학습 중 틀린 문제를 기록하고 간격 반복으로 복습 일정을 자동 관리합니다.</p>

    <section class="panel stats" id="stats"></section>

    <section class="layout">
      <article class="card">
        <h2>오답 추가</h2>
        <form id="entryForm">
          <div class="grid-2">
            <div>
              <label for="subject">과목</label>
              <input id="subject" placeholder="예: 수학, 영어, 알고리즘" required />
            </div>
            <div>
              <label for="mistakeType">실수 유형</label>
              <select id="mistakeType" required>
                <option value="">선택하세요</option>
                <option>개념 미흡</option>
                <option>계산 실수</option>
                <option>시간 관리</option>
                <option>문제 해석</option>
                <option>암기 누락</option>
                <option>기타</option>
              </select>
            </div>
          </div>

          <div style="margin-top:10px;">
            <label for="topic">문제/개념 제목</label>
            <input id="topic" placeholder="예: 확률 조건부 사건 12번" required />
          </div>

          <div style="margin-top:10px;">
            <label for="memo">원인/해결 메모</label>
            <textarea id="memo" placeholder="왜 틀렸는지, 다음엔 어떻게 풀지 적어두세요."></textarea>
          </div>

          <div class="grid-2" style="margin-top:10px;">
            <div>
              <label for="difficulty">체감 난이도</label>
              <select id="difficulty">
                <option value="1">1 (쉬움)</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
                <option value="5">5 (어려움)</option>
              </select>
            </div>
            <div>
              <label for="customDate">첫 복습일(선택)</label>
              <input id="customDate" type="date" />
            </div>
          </div>

          <div class="actions">
            <button class="primary" type="submit">오답 저장</button>
            <button class="secondary" type="button" id="resetForm">입력 초기화</button>
          </div>
        </form>

        <div class="footnote">
          기본 복습 간격: 1일 → 3일 → 7일 → 14일 → 30일. 저장 내용은 브라우저에 자동 보관됩니다.
        </div>
      </article>

      <article class="card">
        <h2>오답 목록</h2>
        <div class="toolbar">
          <input id="search" placeholder="과목/제목/메모 검색" />
          <select id="filterStatus">
            <option value="all">전체</option>
            <option value="today">오늘 복습</option>
            <option value="overdue">지연 복습</option>
            <option value="mastered">숙달(4회+)</option>
          </select>
          <select id="sortBy">
            <option value="due">복습일 빠른순</option>
            <option value="recent">최근 추가순</option>
            <option value="hard">난이도 높은순</option>
          </select>
        </div>

        <div class="actions" style="margin-bottom:10px;">
          <button class="secondary" type="button" id="exportBtn">JSON 내보내기</button>
          <button class="secondary" type="button" id="importBtn">JSON 불러오기</button>
          <button class="danger" type="button" id="clearAllBtn">전체 삭제</button>
          <input id="importInput" type="file" accept="application/json" hidden />
        </div>

        <div class="list" id="list"></div>
      </article>
    </section>
  </main>

  <script>
    (() => {
      const KEY = "exam-mistake-journal-v1";
      const REVIEW_INTERVALS = [1, 3, 7, 14, 30];

      const $ = (id) => document.getElementById(id);
      const state = {
        items: [],
        query: "",
        filterStatus: "all",
        sortBy: "due",
      };

      const todayISO = () => {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        return d.toISOString().slice(0, 10);
      };

      const formatDate = (iso) => {
        const d = new Date(iso + "T00:00:00");
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleDateString("ko-KR", { year: "numeric", month: "short", day: "numeric", weekday: "short" });
      };

      const addDaysISO = (baseISO, days) => {
        const d = new Date(baseISO + "T00:00:00");
        d.setDate(d.getDate() + days);
        return d.toISOString().slice(0, 10);
      };

      const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);

      function save() {
        localStorage.setItem(KEY, JSON.stringify({
          items: state.items,
          query: state.query,
          filterStatus: state.filterStatus,
          sortBy: state.sortBy,
        }));
      }

      function load() {
        try {
          const raw = localStorage.getItem(KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.items)) return;
          state.items = parsed.items;
          state.query = parsed.query || "";
          state.filterStatus = parsed.filterStatus || "all";
          state.sortBy = parsed.sortBy || "due";
        } catch (_) {}
      }

      function statusOf(item) {
        const today = todayISO();
        if (item.nextReview < today) return "overdue";
        if (item.nextReview === today) return "today";
        return "ok";
      }

      function masteryRate(items) {
        if (!items.length) return 0;
        const mastered = items.filter((i) => (i.stage || 0) >= 4).length;
        return Math.round((mastered / items.length) * 100);
      }

      function renderStats() {
        const total = state.items.length;
        const today = todayISO();
        const todayCount = state.items.filter((i) => i.nextReview === today).length;
        const overdue = state.items.filter((i) => i.nextReview < today).length;
        const mastery = masteryRate(state.items);

        $("stats").innerHTML = `
          <div class="stat"><div class="k">총 오답</div><div class="v">${total}</div></div>
          <div class="stat"><div class="k">오늘 복습</div><div class="v" style="color:var(--warn)">${todayCount}</div></div>
          <div class="stat"><div class="k">지연 복습</div><div class="v" style="color:var(--danger)">${overdue}</div></div>
          <div class="stat"><div class="k">숙달률</div><div class="v" style="color:var(--neon)">${mastery}%</div></div>
        `;
      }

      function filteredItems() {
        const q = state.query.trim().toLowerCase();
        const today = todayISO();
        let list = state.items.filter((item) => {
          const text = `${item.subject} ${item.topic} ${item.memo} ${item.mistakeType}`.toLowerCase();
          const queryMatch = !q || text.includes(q);
          if (!queryMatch) return false;

          if (state.filterStatus === "today") return item.nextReview === today;
          if (state.filterStatus === "overdue") return item.nextReview < today;
          if (state.filterStatus === "mastered") return (item.stage || 0) >= 4;
          return true;
        });

        if (state.sortBy === "due") {
          list.sort((a, b) => a.nextReview.localeCompare(b.nextReview));
        } else if (state.sortBy === "recent") {
          list.sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
        } else if (state.sortBy === "hard") {
          list.sort((a, b) => (b.difficulty || 0) - (a.difficulty || 0));
        }
        return list;
      }

      function escapeHtml(str = "") {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderList() {
        const listEl = $("list");
        const list = filteredItems();

        if (!list.length) {
          listEl.innerHTML = `<div class="empty">조건에 맞는 오답이 없습니다. 왼쪽에서 첫 오답을 추가해 주세요.</div>`;
          return;
        }

        listEl.innerHTML = list.map((item) => {
          const status = statusOf(item);
          const stage = item.stage || 0;
          const statusText = status === "overdue" ? "지연 복습" : status === "today" ? "오늘 복습" : "예정";
          return `
            <div class="item ${status}">
              <div class="item-title">
                <span>${escapeHtml(item.subject)} · ${escapeHtml(item.topic)}</span>
                <span>${statusText}</span>
              </div>
              <div>
                <span class="pill">${escapeHtml(item.mistakeType)}</span>
                <span class="pill">난이도 ${item.difficulty || 3}</span>
                <span class="pill">복습 ${stage}회</span>
              </div>
              ${item.memo ? `<div class="memo">${escapeHtml(item.memo)}</div>` : ""}
              <div class="meta">
                다음 복습: ${formatDate(item.nextReview)} · 등록일: ${formatDate(item.createdAt.slice(0, 10))}
              </div>
              <div class="item-actions">
                <button class="primary" data-act="review" data-id="${item.id}">복습 완료 + 다음 일정</button>
                <button class="danger" data-act="delete" data-id="${item.id}">삭제</button>
              </div>
            </div>
          `;
        }).join("");
      }

      function renderAll() {
        renderStats();
        renderList();
      }

      function addEntry(e) {
        e.preventDefault();
        const subject = $("subject").value.trim();
        const mistakeType = $("mistakeType").value;
        const topic = $("topic").value.trim();
        const memo = $("memo").value.trim();
        const difficulty = Number($("difficulty").value || 3);
        const customDate = $("customDate").value;

        if (!subject || !mistakeType || !topic) {
          alert("과목, 실수 유형, 문제/개념 제목은 필수입니다.");
          return;
        }

        const createdISO = new Date().toISOString();
        const base = customDate || todayISO();

        const item = {
          id: uid(),
          subject,
          mistakeType,
          topic,
          memo,
          difficulty,
          stage: 0,
          nextReview: base,
          createdAt: createdISO,
        };

        state.items.unshift(item);
        save();
        renderAll();
        e.target.reset();
        $("difficulty").value = "3";
      }

      function reviewDone(id) {
        const idx = state.items.findIndex((i) => i.id === id);
        if (idx < 0) return;

        const item = state.items[idx];
        const stage = Math.min((item.stage || 0) + 1, 999);
        const interval = REVIEW_INTERVALS[Math.min(stage - 1, REVIEW_INTERVALS.length - 1)];
        const next = addDaysISO(todayISO(), interval);

        item.stage = stage;
        item.nextReview = next;

        save();
        renderAll();
      }

      function deleteItem(id) {
        if (!confirm("이 오답 기록을 삭제할까요?")) return;
        state.items = state.items.filter((i) => i.id !== id);
        save();
        renderAll();
      }

      function clearAll() {
        if (!state.items.length) return;
        if (!confirm("전체 오답 데이터를 삭제할까요? 이 작업은 되돌릴 수 없습니다.")) return;
        state.items = [];
        save();
        renderAll();
      }

      function exportJson() {
        const blob = new Blob([JSON.stringify(state.items, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `exam-mistake-journal-${todayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function importJson(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            if (!Array.isArray(data)) throw new Error();
            const cleaned = data.filter((x) => x && x.id && x.subject && x.topic && x.nextReview);
            state.items = cleaned;
            save();
            renderAll();
            alert(`${cleaned.length}개 항목을 불러왔습니다.`);
          } catch {
            alert("올바른 JSON 파일이 아닙니다.");
          }
        };
        reader.readAsText(file);
      }

      function bindEvents() {
        $("entryForm").addEventListener("submit", addEntry);
        $("resetForm").addEventListener("click", () => $("entryForm").reset());

        $("search").addEventListener("input", (e) => {
          state.query = e.target.value;
          save();
          renderList();
        });

        $("filterStatus").addEventListener("change", (e) => {
          state.filterStatus = e.target.value;
          save();
          renderList();
        });

        $("sortBy").addEventListener("change", (e) => {
          state.sortBy = e.target.value;
          save();
          renderList();
        });

        $("list").addEventListener("click", (e) => {
          const btn = e.target.closest("button[data-act]");
          if (!btn) return;
          const id = btn.dataset.id;
          const act = btn.dataset.act;
          if (act === "review") reviewDone(id);
          if (act === "delete") deleteItem(id);
        });

        $("clearAllBtn").addEventListener("click", clearAll);
        $("exportBtn").addEventListener("click", exportJson);
        $("importBtn").addEventListener("click", () => $("importInput").click());
        $("importInput").addEventListener("change", (e) => importJson(e.target.files[0]));
      }

      function init() {
        load();
        $("search").value = state.query;
        $("filterStatus").value = state.filterStatus;
        $("sortBy").value = state.sortBy;
        bindEvents();
        renderAll();
      }

      init();
    })();
  </script>
</body>
</html>
