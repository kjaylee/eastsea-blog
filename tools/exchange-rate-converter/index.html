<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>실시간 환율 계산기 | Exchange Rate Converter</title>
  <meta name="description" content="실시간 환율을 불러와 기준 통화와 대상 통화 환전 금액을 계산하고 수수료를 반영한 실수령액과 최근 이력을 저장합니다." />
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-soft: #141432;
      --panel: #111129;
      --panel-soft: #1b1b3f;
      --line: #30306b;
      --text: #eef1ff;
      --muted: #9ca4cf;
      --cyan: #39ddff;
      --violet: #b875ff;
      --green: #3effc4;
      --danger: #ff6f95;
      --shadow: 0 0 0 1px rgba(57, 221, 255, 0.2), 0 0 28px rgba(57, 221, 255, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at 8% 0%, #171744 0%, var(--bg) 40%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      min-height: 100vh;
      line-height: 1.5;
      padding: 16px 14px 38px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .link-btn,
    .ghost-btn,
    .primary-btn {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 44px;
      font-size: 0.93rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    .link-btn,
    .ghost-btn {
      background: rgba(17, 17, 41, 0.76);
      color: var(--muted);
    }

    .primary-btn {
      border: 0;
      background: linear-gradient(135deg, rgba(57, 221, 255, 0.98), rgba(184, 117, 255, 0.96));
      color: #060611;
      font-weight: 900;
    }

    .link-btn:focus,
    .ghost-btn:focus,
    .primary-btn:focus,
    input:focus,
    select:focus {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
      border-color: var(--cyan);
    }

    h1 {
      margin: 8px 0 8px;
      font-size: clamp(1.5rem, 4.4vw, 2.12rem);
      text-shadow: 0 0 16px rgba(57, 221, 255, 0.36);
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(17, 17, 41, 0.95), rgba(10, 10, 26, 0.95));
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.02rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.84rem;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      font-size: 1rem;
      padding: 10px 12px;
    }

    .inline-buttons {
      margin-top: 11px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .status-row {
      margin-top: 8px;
      min-height: 1.3em;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .status-row.error {
      color: var(--danger);
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }

    .metric {
      border: 1px solid var(--line);
      background: rgba(24, 24, 58, 0.72);
      border-radius: 12px;
      padding: 10px;
      min-height: 95px;
    }

    .metric .label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .metric .value {
      display: block;
      font-size: clamp(0.96rem, 3.6vw, 1.2rem);
      color: var(--cyan);
      font-weight: 800;
      word-break: keep-all;
    }

    .metric .value.violet { color: #e3cdff; }
    .metric .value.green { color: #a4ffe7; }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      border: 1px solid rgba(62, 255, 196, 0.35);
      background: rgba(62, 255, 196, 0.12);
      color: #c8ffef;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 700;
    }

    .chip.active {
      background: rgba(57, 221, 255, 0.2);
      border-color: rgba(57, 221, 255, 0.55);
      color: #d9faff;
      box-shadow: 0 0 14px rgba(57, 221, 255, 0.28);
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(20, 20, 46, 0.8);
      padding: 10px;
      cursor: pointer;
    }

    .history-item:hover {
      border-color: rgba(57, 221, 255, 0.64);
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .history-title {
      font-size: 0.93rem;
      color: #dce3ff;
      font-weight: 800;
    }

    .history-date {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .history-meta {
      margin-top: 4px;
      color: #b8c1ee;
      font-size: 0.84rem;
      display: grid;
      gap: 2px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      color: var(--muted);
      padding: 12px;
      font-size: 0.9rem;
    }

    .help {
      margin-top: 10px;
      border: 1px dashed rgba(57, 221, 255, 0.45);
      background: rgba(57, 221, 255, 0.08);
      border-radius: 12px;
      padding: 10px;
      color: #cdefff;
      font-size: 0.87rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 820px) {
      .grid,
      .result-grid,
      .inline-buttons {
        grid-template-columns: 1fr 1fr;
      }

      .inline-buttons .primary-btn {
        grid-column: span 2;
      }
    }

    @media (max-width: 560px) {
      body { padding: 14px 11px 34px; }

      .grid,
      .result-grid,
      .inline-buttons {
        grid-template-columns: 1fr;
      }

      .inline-buttons .primary-btn {
        grid-column: span 1;
      }

      .topbar {
        flex-wrap: wrap;
      }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="link-btn" href="../">← 도구 목록</a>
      <button type="button" class="ghost-btn" id="refreshBtn">환율 새로고침</button>
    </div>

    <h1>💱 실시간 환율 계산기</h1>
    <p class="subtitle">금액·통화·수수료를 입력하면 실시간 환율 기준 환전 금액과 실수령액을 계산하고 최근 이력을 저장합니다.</p>

    <section class="card" aria-labelledby="inputTitle">
      <h2 id="inputTitle">입력</h2>
      <div class="grid">
        <div class="field">
          <label for="amount">금액</label>
          <input id="amount" type="number" inputmode="decimal" min="0" step="0.01" value="100000" />
        </div>
        <div class="field">
          <label for="baseCurrency">기준 통화</label>
          <select id="baseCurrency"></select>
        </div>
        <div class="field">
          <label for="targetCurrency">대상 통화</label>
          <select id="targetCurrency"></select>
        </div>
        <div class="field">
          <label for="feePercent">수수료(%)</label>
          <input id="feePercent" type="number" inputmode="decimal" min="0" step="0.01" value="1.75" />
        </div>
        <div class="field">
          <label for="fixedFee">고정 수수료 (대상 통화)</label>
          <input id="fixedFee" type="number" inputmode="decimal" min="0" step="0.01" value="0" />
        </div>
        <div class="field">
          <label for="roundUnit">반올림 단위</label>
          <select id="roundUnit">
            <option value="0">반올림 안 함</option>
            <option value="1">1 단위</option>
            <option value="10">10 단위</option>
            <option value="100">100 단위</option>
          </select>
        </div>
      </div>
      <div class="inline-buttons">
        <button type="button" class="ghost-btn" id="swapBtn">통화 바꾸기</button>
        <button type="button" class="ghost-btn" id="resetBtn">초기화</button>
        <button type="button" class="primary-btn" id="calcBtn">계산하기</button>
      </div>
      <div class="status-row" id="statusRow" role="status" aria-live="polite"></div>
      <div class="chip-row" id="pairChips" aria-label="빠른 통화쌍"></div>
    </section>

    <section class="card" aria-labelledby="resultTitle">
      <h2 id="resultTitle">결과</h2>
      <div class="result-grid" id="resultGrid">
        <article class="metric">
          <span class="label">적용 환율</span>
          <span class="value" id="rateValue">-</span>
        </article>
        <article class="metric">
          <span class="label">환전 금액</span>
          <span class="value violet" id="convertedValue">-</span>
        </article>
        <article class="metric">
          <span class="label">총 수수료</span>
          <span class="value" id="feeValue">-</span>
        </article>
        <article class="metric">
          <span class="label">실수령액</span>
          <span class="value green" id="finalValue">-</span>
        </article>
      </div>
      <p class="help" id="updateText">환율을 불러오면 업데이트 시각이 표시됩니다.</p>
    </section>

    <section class="card" aria-labelledby="historyTitle">
      <div class="history-head">
        <h2 id="historyTitle">최근 계산 이력</h2>
        <button type="button" class="ghost-btn" id="clearHistoryBtn">이력 비우기</button>
      </div>
      <div id="historyList" class="history-list" aria-live="polite"></div>
      <p class="sr-only" id="historyHint">이력 항목을 누르면 입력값이 다시 채워집니다.</p>
    </section>
  </div>

  <script>
    (function () {
      const CURRENCIES = [
        { code: "KRW", name: "대한민국 원" },
        { code: "USD", name: "미국 달러" },
        { code: "JPY", name: "일본 엔" },
        { code: "EUR", name: "유로" },
        { code: "CNY", name: "중국 위안" },
        { code: "GBP", name: "영국 파운드" },
        { code: "HKD", name: "홍콩 달러" },
        { code: "SGD", name: "싱가포르 달러" },
        { code: "AUD", name: "호주 달러" },
        { code: "CAD", name: "캐나다 달러" },
        { code: "THB", name: "태국 바트" },
        { code: "VND", name: "베트남 동" },
        { code: "TWD", name: "대만 달러" }
      ];

      const FAVORITE_PAIRS = ["KRW-USD", "USD-KRW", "KRW-JPY", "KRW-EUR", "KRW-CNY"];
      const STORAGE_SETTINGS = "exchangeRateToolSettings";
      const STORAGE_HISTORY = "exchangeRateToolHistory";
      const STORAGE_CACHE = "exchangeRateToolCachedRates";

      const amountEl = document.getElementById("amount");
      const baseEl = document.getElementById("baseCurrency");
      const targetEl = document.getElementById("targetCurrency");
      const feePercentEl = document.getElementById("feePercent");
      const fixedFeeEl = document.getElementById("fixedFee");
      const roundUnitEl = document.getElementById("roundUnit");

      const rateValueEl = document.getElementById("rateValue");
      const convertedValueEl = document.getElementById("convertedValue");
      const feeValueEl = document.getElementById("feeValue");
      const finalValueEl = document.getElementById("finalValue");
      const updateTextEl = document.getElementById("updateText");
      const statusRowEl = document.getElementById("statusRow");
      const historyListEl = document.getElementById("historyList");
      const pairChipsEl = document.getElementById("pairChips");

      const calcBtn = document.getElementById("calcBtn");
      const swapBtn = document.getElementById("swapBtn");
      const resetBtn = document.getElementById("resetBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const clearHistoryBtn = document.getElementById("clearHistoryBtn");

      function formatNumber(value, maxDigits) {
        return new Intl.NumberFormat("ko-KR", {
          minimumFractionDigits: 0,
          maximumFractionDigits: maxDigits
        }).format(value);
      }

      function formatCurrency(value, currencyCode) {
        const noDecimal = currencyCode === "KRW" || currencyCode === "JPY" || currencyCode === "VND";
        return new Intl.NumberFormat("ko-KR", {
          style: "currency",
          currency: currencyCode,
          minimumFractionDigits: noDecimal ? 0 : 2,
          maximumFractionDigits: noDecimal ? 0 : 2
        }).format(value);
      }

      function toNumber(input, fallback) {
        const n = Number(input);
        return Number.isFinite(n) ? n : fallback;
      }

      function saveSettings() {
        const payload = {
          amount: toNumber(amountEl.value, 100000),
          base: baseEl.value,
          target: targetEl.value,
          feePercent: toNumber(feePercentEl.value, 0),
          fixedFee: toNumber(fixedFeeEl.value, 0),
          roundUnit: toNumber(roundUnitEl.value, 0)
        };
        localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(payload));
      }

      function loadSettings() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_SETTINGS) || "{}");
          amountEl.value = toNumber(parsed.amount, 100000);
          baseEl.value = parsed.base || "KRW";
          targetEl.value = parsed.target || "USD";
          feePercentEl.value = toNumber(parsed.feePercent, 1.75);
          fixedFeeEl.value = toNumber(parsed.fixedFee, 0);
          roundUnitEl.value = String(toNumber(parsed.roundUnit, 0));
        } catch (error) {
          amountEl.value = 100000;
          baseEl.value = "KRW";
          targetEl.value = "USD";
          feePercentEl.value = 1.75;
          fixedFeeEl.value = 0;
          roundUnitEl.value = "0";
        }
      }

      function readHistory() {
        try {
          const list = JSON.parse(localStorage.getItem(STORAGE_HISTORY) || "[]");
          return Array.isArray(list) ? list : [];
        } catch (error) {
          return [];
        }
      }

      function writeHistory(list) {
        localStorage.setItem(STORAGE_HISTORY, JSON.stringify(list.slice(0, 20)));
      }

      function readRateCache() {
        try {
          const cache = JSON.parse(localStorage.getItem(STORAGE_CACHE) || "{}");
          return cache && typeof cache === "object" ? cache : {};
        } catch (error) {
          return {};
        }
      }

      function writeRateCache(cache) {
        localStorage.setItem(STORAGE_CACHE, JSON.stringify(cache));
      }

      function renderCurrencySelect(selectEl) {
        selectEl.innerHTML = CURRENCIES.map((currency) => {
          return `<option value="${currency.code}">${currency.code} · ${currency.name}</option>`;
        }).join("");
      }

      function renderPairChips() {
        const activePair = `${baseEl.value}-${targetEl.value}`;
        pairChipsEl.innerHTML = FAVORITE_PAIRS.map((pair) => {
          const [base, target] = pair.split("-");
          const active = pair === activePair ? "active" : "";
          return `<button type="button" class="chip ${active}" data-base="${base}" data-target="${target}">${base} → ${target}</button>`;
        }).join("");
      }

      function setStatus(message, isError) {
        statusRowEl.textContent = message || "";
        statusRowEl.classList.toggle("error", Boolean(isError));
      }

      function roundValue(value, unit) {
        if (!unit || unit <= 0) return value;
        return Math.round(value / unit) * unit;
      }

      function renderHistory() {
        const history = readHistory();
        if (!history.length) {
          historyListEl.innerHTML = '<div class="empty">아직 계산 이력이 없습니다. 계산 후 자동으로 저장됩니다.</div>';
          return;
        }

        historyListEl.innerHTML = history.map((item, idx) => {
          return `
            <button type="button" class="history-item" data-index="${idx}" aria-label="${item.base}에서 ${item.target}로 계산 이력 불러오기">
              <div class="history-top">
                <span class="history-title">${formatCurrency(item.amount, item.base)} → ${formatCurrency(item.final, item.target)}</span>
                <span class="history-date">${new Date(item.timestamp).toLocaleString("ko-KR")}</span>
              </div>
              <div class="history-meta">
                <span>환율: 1 ${item.base} = ${formatNumber(item.rate, 6)} ${item.target}</span>
                <span>수수료: ${formatNumber(item.feePercent, 2)}% + ${formatCurrency(item.fixedFee, item.target)}</span>
              </div>
            </button>
          `;
        }).join("");
      }

      async function fetchRates(base, forceNetwork) {
        const cache = readRateCache();
        const cached = cache[base];

        if (!forceNetwork && cached && cached.rates) {
          return { ...cached, source: "cache" };
        }

        const url = `https://open.er-api.com/v6/latest/${encodeURIComponent(base)}`;
        const response = await fetch(url, { method: "GET" });
        if (!response.ok) {
          throw new Error("환율 API 응답 오류");
        }

        const data = await response.json();
        if (!data || data.result !== "success" || !data.rates) {
          throw new Error("환율 데이터 형식 오류");
        }

        const record = {
          base,
          rates: data.rates,
          fetchedAt: new Date().toISOString(),
          providerUpdate: data.time_last_update_utc || ""
        };

        cache[base] = record;
        writeRateCache(cache);
        return { ...record, source: "network" };
      }

      async function calculate(forceNetwork) {
        const amount = Math.max(0, toNumber(amountEl.value, 0));
        const feePercent = Math.max(0, toNumber(feePercentEl.value, 0));
        const fixedFee = Math.max(0, toNumber(fixedFeeEl.value, 0));
        const roundUnit = Math.max(0, toNumber(roundUnitEl.value, 0));
        const base = baseEl.value;
        const target = targetEl.value;

        if (!base || !target) {
          setStatus("기준 통화와 대상 통화를 선택해 주세요.", true);
          return;
        }

        if (base === target) {
          setStatus("기준 통화와 대상 통화가 같습니다. 다른 통화를 선택해 주세요.", true);
          return;
        }

        if (amount <= 0) {
          setStatus("금액은 0보다 커야 합니다.", true);
          return;
        }

        calcBtn.disabled = true;
        calcBtn.textContent = "계산 중...";
        setStatus("환율 데이터를 불러오는 중입니다...", false);

        try {
          let rateRecord;
          try {
            rateRecord = await fetchRates(base, forceNetwork);
          } catch (networkError) {
            if (!forceNetwork) {
              rateRecord = await fetchRates(base, false);
            } else {
              throw networkError;
            }
          }

          const rate = toNumber(rateRecord.rates[target], 0);
          if (!rate) {
            throw new Error("선택한 통화 환율을 찾을 수 없습니다.");
          }

          const converted = amount * rate;
          const fee = converted * (feePercent / 100) + fixedFee;
          const finalRaw = Math.max(0, converted - fee);
          const final = roundValue(finalRaw, roundUnit);

          rateValueEl.textContent = `1 ${base} = ${formatNumber(rate, 6)} ${target}`;
          convertedValueEl.textContent = formatCurrency(converted, target);
          feeValueEl.textContent = formatCurrency(fee, target);
          finalValueEl.textContent = formatCurrency(final, target);

          const providerTime = rateRecord.providerUpdate ? new Date(rateRecord.providerUpdate).toLocaleString("ko-KR") : "-";
          const fetchedTime = rateRecord.fetchedAt ? new Date(rateRecord.fetchedAt).toLocaleString("ko-KR") : "-";
          const sourceLabel = rateRecord.source === "network" ? "실시간" : "캐시";
          updateTextEl.textContent = `${sourceLabel} 환율 기준 · 제공 업데이트: ${providerTime} · 마지막 조회: ${fetchedTime}`;

          const history = readHistory();
          history.unshift({
            timestamp: new Date().toISOString(),
            amount,
            base,
            target,
            rate,
            converted,
            feePercent,
            fixedFee,
            fee,
            final,
            roundUnit
          });
          writeHistory(history);
          renderHistory();

          saveSettings();
          renderPairChips();
          setStatus("계산 완료: 최근 이력에 저장되었습니다.", false);
        } catch (error) {
          setStatus(`계산 실패: ${error.message} (네트워크를 확인해 주세요)`, true);
        } finally {
          calcBtn.disabled = false;
          calcBtn.textContent = "계산하기";
        }
      }

      function resetInputs() {
        amountEl.value = 100000;
        baseEl.value = "KRW";
        targetEl.value = "USD";
        feePercentEl.value = 1.75;
        fixedFeeEl.value = 0;
        roundUnitEl.value = "0";
        saveSettings();
        renderPairChips();
        setStatus("기본값으로 초기화했습니다.", false);
      }

      function attachEvents() {
        calcBtn.addEventListener("click", function () { calculate(false); });
        refreshBtn.addEventListener("click", function () { calculate(true); });

        swapBtn.addEventListener("click", function () {
          const base = baseEl.value;
          baseEl.value = targetEl.value;
          targetEl.value = base;
          renderPairChips();
          saveSettings();
          calculate(false);
        });

        resetBtn.addEventListener("click", function () {
          resetInputs();
          calculate(false);
        });

        clearHistoryBtn.addEventListener("click", function () {
          localStorage.removeItem(STORAGE_HISTORY);
          renderHistory();
          setStatus("계산 이력을 비웠습니다.", false);
        });

        [amountEl, baseEl, targetEl, feePercentEl, fixedFeeEl, roundUnitEl].forEach((el) => {
          el.addEventListener("change", saveSettings);
        });

        pairChipsEl.addEventListener("click", function (event) {
          const target = event.target;
          if (!(target instanceof HTMLElement)) return;
          if (!target.classList.contains("chip")) return;
          const base = target.getAttribute("data-base");
          const quote = target.getAttribute("data-target");
          if (!base || !quote) return;
          baseEl.value = base;
          targetEl.value = quote;
          renderPairChips();
          saveSettings();
          calculate(false);
        });

        historyListEl.addEventListener("click", function (event) {
          const target = event.target;
          if (!(target instanceof Element)) return;
          const item = target.closest(".history-item");
          if (!item) return;
          const idx = Number(item.getAttribute("data-index"));
          const history = readHistory();
          const selected = history[idx];
          if (!selected) return;

          amountEl.value = selected.amount;
          baseEl.value = selected.base;
          targetEl.value = selected.target;
          feePercentEl.value = selected.feePercent;
          fixedFeeEl.value = selected.fixedFee;
          roundUnitEl.value = String(selected.roundUnit || 0);
          saveSettings();
          renderPairChips();
          setStatus("선택한 이력으로 입력값을 복원했습니다.", false);
          calculate(false);
        });
      }

      function init() {
        renderCurrencySelect(baseEl);
        renderCurrencySelect(targetEl);
        loadSettings();

        if (baseEl.value === targetEl.value) {
          targetEl.value = baseEl.value === "USD" ? "KRW" : "USD";
        }

        renderPairChips();
        renderHistory();
        attachEvents();
        calculate(false);
      }

      init();
    })();
  </script>
</body>
</html>
