<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유통기한 추적기 | 만료일 관리 도구</title>
  <meta name="description" content="식품/약품/화장품 유통기한을 한 번에 관리하고 임박 항목을 빠르게 확인하는 무료 웹 도구" />
  <meta name="theme-color" content="#0a0a1a" />
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #11112a;
      --panel-2: #171738;
      --line: #2a2a58;
      --text: #edf2ff;
      --muted: #9aa4d1;
      --cyan: #00f5ff;
      --violet: #8b5cf6;
      --pink: #ff4d9a;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --shadow: 0 0 0 1px rgba(139,92,246,.16), 0 10px 30px rgba(0,0,0,.45);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 10% -10%, rgba(0,245,255,.15), transparent 40%),
        radial-gradient(circle at 90% -20%, rgba(139,92,246,.2), transparent 42%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
    }

    .wrap {
      width: min(1100px, 92vw);
      margin: 24px auto 40px;
    }

    .title {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3.8vw, 2rem);
      letter-spacing: -0.01em;
      text-shadow: 0 0 12px rgba(0,245,255,.35);
    }

    .sub {
      color: var(--muted);
      font-size: .95rem;
      margin: 6px 0 0;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-top: 12px;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(12, 1fr);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-6 { grid-column: span 6; }
    .col-12 { grid-column: span 12; }

    label {
      color: var(--muted);
      font-size: .86rem;
    }

    input, select, button, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #32326b;
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      outline: none;
      transition: .2s ease;
    }

    textarea { min-height: 44px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,245,255,.2);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      width: auto;
      min-width: 120px;
    }

    .primary {
      background: linear-gradient(135deg, var(--cyan), #14b8a6);
      color: #031018;
      border: none;
    }

    .ghost {
      background: transparent;
      border: 1px solid #3a3a73;
      color: var(--text);
    }

    .danger {
      background: linear-gradient(135deg, #fb7185, #ef4444);
      border: none;
      color: #1b0206;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .stat .k { color: var(--muted); font-size: .82rem; }
    .stat .v { font-size: 1.4rem; font-weight: 800; margin-top: 4px; }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .item-list {
      display: grid;
      gap: 10px;
    }

    .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .name {
      font-weight: 800;
      font-size: 1.02rem;
    }

    .meta { color: var(--muted); font-size: .86rem; }

    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .b-good { color: #9af7b6; border-color: rgba(34,197,94,.45); background: rgba(34,197,94,.12); }
    .b-warn { color: #ffd98d; border-color: rgba(245,158,11,.45); background: rgba(245,158,11,.12); }
    .b-bad { color: #ffb2bb; border-color: rgba(239,68,68,.45); background: rgba(239,68,68,.12); }

    .item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini {
      min-width: auto;
      padding: 7px 10px;
      border-radius: 10px;
      font-size: .82rem;
      font-weight: 700;
    }

    .history {
      margin-top: 8px;
      color: var(--muted);
      font-size: .85rem;
      max-height: 140px;
      overflow: auto;
      border-top: 1px dashed #32326b;
      padding-top: 8px;
    }

    .history ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 4px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px;
      border: 1px dashed #3b3b79;
      border-radius: 14px;
      background: rgba(255,255,255,.01);
    }

    @media (max-width: 820px) {
      .col-3, .col-4, .col-6 { grid-column: span 12; }
      .stats { grid-template-columns: 1fr; }
      button { min-width: 0; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="title">
      <div>
        <h1>🧊 유통기한 추적기</h1>
        <p class="sub">냉장고·약통·화장품 만료일을 저장하고 임박 항목을 빠르게 관리하세요.</p>
      </div>
    </section>

    <section class="panel" aria-label="항목 추가">
      <form id="item-form" class="grid">
        <div class="field col-4">
          <label for="name">항목 이름</label>
          <input id="name" name="name" placeholder="예: 우유 1L" maxlength="50" required />
        </div>

        <div class="field col-3">
          <label for="category">카테고리</label>
          <select id="category" name="category">
            <option value="식품">식품</option>
            <option value="약품">약품</option>
            <option value="화장품">화장품</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="field col-3">
          <label for="expiry">유통기한</label>
          <input id="expiry" name="expiry" type="date" required />
        </div>

        <div class="field col-2">
          <label for="qty">수량</label>
          <input id="qty" name="qty" type="number" min="1" max="999" value="1" />
        </div>

        <div class="field col-12">
          <label for="memo">메모 (선택)</label>
          <textarea id="memo" name="memo" maxlength="100" placeholder="예: 냉장보관, 개봉 후 3일"></textarea>
        </div>

        <div class="field col-12">
          <div class="btn-row">
            <button class="primary" type="submit">항목 저장</button>
            <button class="ghost" type="reset">입력 초기화</button>
          </div>
        </div>
      </form>
    </section>

    <section class="panel" aria-label="설정">
      <div class="grid">
        <div class="field col-3">
          <label for="alert-days">임박 기준(일)</label>
          <input id="alert-days" type="number" min="1" max="60" value="7" />
        </div>

        <div class="field col-3">
          <label for="sort-mode">정렬</label>
          <select id="sort-mode">
            <option value="remain">남은 일수 오름차순</option>
            <option value="newest">최근 등록순</option>
            <option value="name">이름순</option>
          </select>
        </div>

        <div class="field col-3">
          <label for="filter-category">카테고리 필터</label>
          <select id="filter-category">
            <option value="all">전체</option>
            <option value="식품">식품</option>
            <option value="약품">약품</option>
            <option value="화장품">화장품</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="field col-3">
          <label><input id="hide-expired" type="checkbox" style="width:auto; margin-right:8px;" /> 만료 항목 숨기기</label>
          <div class="btn-row" style="margin-top: 10px;">
            <button id="clear-expired" class="danger mini" type="button">만료 항목 삭제</button>
          </div>
        </div>
      </div>

      <div class="stats" aria-live="polite">
        <div class="stat">
          <div class="k">전체 항목</div>
          <div class="v" id="stat-total">0</div>
        </div>
        <div class="stat">
          <div class="k">임박 항목</div>
          <div class="v" id="stat-warn" style="color: var(--warn);">0</div>
        </div>
        <div class="stat">
          <div class="k">만료 항목</div>
          <div class="v" id="stat-expired" style="color: var(--bad);">0</div>
        </div>
      </div>
    </section>

    <section class="panel" aria-label="목록">
      <div class="list-head">
        <strong>보관 목록</strong>
        <small id="saved-at" class="meta">저장됨: -</small>
      </div>
      <div id="item-list" class="item-list"></div>

      <div class="history">
        <strong>최근 기록</strong>
        <ul id="history-list"></ul>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'expiryDateTracker.v1';

    const state = {
      items: [],
      settings: {
        alertDays: 7,
        sortMode: 'remain',
        filterCategory: 'all',
        hideExpired: false
      },
      history: [],
      updatedAt: null
    };

    const el = {
      form: document.getElementById('item-form'),
      name: document.getElementById('name'),
      category: document.getElementById('category'),
      expiry: document.getElementById('expiry'),
      qty: document.getElementById('qty'),
      memo: document.getElementById('memo'),
      alertDays: document.getElementById('alert-days'),
      sortMode: document.getElementById('sort-mode'),
      filterCategory: document.getElementById('filter-category'),
      hideExpired: document.getElementById('hide-expired'),
      clearExpired: document.getElementById('clear-expired'),
      list: document.getElementById('item-list'),
      historyList: document.getElementById('history-list'),
      statTotal: document.getElementById('stat-total'),
      statWarn: document.getElementById('stat-warn'),
      statExpired: document.getElementById('stat-expired'),
      savedAt: document.getElementById('saved-at')
    };

    function getTodayStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function daysLeft(dateStr) {
      const target = new Date(dateStr + 'T00:00:00');
      const diff = target - getTodayStart();
      return Math.ceil(diff / 86400000);
    }

    function safeText(value) {
      return String(value || '').replace(/[&<>"']/g, (m) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[m]));
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      if (Number.isNaN(d.getTime())) return '-';
      return new Intl.DateTimeFormat('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }).format(d);
    }

    function formatDateTime(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return new Intl.DateTimeFormat('ko-KR', { dateStyle: 'medium', timeStyle: 'short' }).format(d);
    }

    function pushHistory(message) {
      state.history.unshift({ message, at: new Date().toISOString() });
      state.history = state.history.slice(0, 12);
    }

    function save() {
      state.updatedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      el.savedAt.textContent = `저장됨: ${formatDateTime(state.updatedAt)}`;
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed.items)) state.items = parsed.items;
        if (parsed.settings && typeof parsed.settings === 'object') {
          state.settings = { ...state.settings, ...parsed.settings };
        }
        if (Array.isArray(parsed.history)) state.history = parsed.history;
        if (parsed.updatedAt) state.updatedAt = parsed.updatedAt;
      } catch (error) {
        console.error('저장 데이터 로드 실패:', error);
      }

      el.alertDays.value = state.settings.alertDays;
      el.sortMode.value = state.settings.sortMode;
      el.filterCategory.value = state.settings.filterCategory;
      el.hideExpired.checked = state.settings.hideExpired;
      if (state.updatedAt) {
        el.savedAt.textContent = `저장됨: ${formatDateTime(state.updatedAt)}`;
      }
    }

    function getStatus(remain) {
      if (remain < 0) return { text: `만료 ${Math.abs(remain)}일`, cls: 'b-bad' };
      if (remain === 0) return { text: '오늘 만료', cls: 'b-warn' };
      if (remain <= Number(state.settings.alertDays)) return { text: `${remain}일 남음`, cls: 'b-warn' };
      return { text: `${remain}일 남음`, cls: 'b-good' };
    }

    function renderStats(filteredItems) {
      const total = filteredItems.length;
      const warn = filteredItems.filter((item) => {
        const d = daysLeft(item.expiry);
        return d >= 0 && d <= Number(state.settings.alertDays);
      }).length;
      const expired = filteredItems.filter((item) => daysLeft(item.expiry) < 0).length;

      el.statTotal.textContent = String(total);
      el.statWarn.textContent = String(warn);
      el.statExpired.textContent = String(expired);
    }

    function renderHistory() {
      if (!state.history.length) {
        el.historyList.innerHTML = '<li>기록이 없습니다.</li>';
        return;
      }
      el.historyList.innerHTML = state.history
        .map((h) => `<li>${safeText(h.message)} · ${safeText(formatDateTime(h.at))}</li>`)
        .join('');
    }

    function renderList() {
      let items = [...state.items];

      if (state.settings.filterCategory !== 'all') {
        items = items.filter((item) => item.category === state.settings.filterCategory);
      }

      if (state.settings.hideExpired) {
        items = items.filter((item) => daysLeft(item.expiry) >= 0);
      }

      if (state.settings.sortMode === 'remain') {
        items.sort((a, b) => daysLeft(a.expiry) - daysLeft(b.expiry));
      } else if (state.settings.sortMode === 'newest') {
        items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      } else if (state.settings.sortMode === 'name') {
        items.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
      }

      renderStats(items);

      if (!items.length) {
        el.list.innerHTML = '<div class="empty">저장된 항목이 없습니다. 위 폼에서 새 항목을 추가해 주세요.</div>';
        renderHistory();
        return;
      }

      el.list.innerHTML = items.map((item) => {
        const remain = daysLeft(item.expiry);
        const status = getStatus(remain);
        const qtyText = Number(item.qty) > 1 ? ` · 수량 ${item.qty}` : '';
        const memo = item.memo ? `<div class="meta">메모: ${safeText(item.memo)}</div>` : '';

        return `
          <article class="item">
            <div class="item-top">
              <div>
                <div class="name">${safeText(item.name)}</div>
                <div class="meta">${safeText(item.category)}${qtyText} · 만료일 ${safeText(formatDate(item.expiry))}</div>
              </div>
              <span class="badge ${status.cls}">${status.text}</span>
            </div>
            ${memo}
            <div class="item-actions">
              <button class="ghost mini" type="button" onclick="duplicateItem('${item.id}')">복사 추가</button>
              <button class="danger mini" type="button" onclick="removeItem('${item.id}')">삭제</button>
            </div>
          </article>
        `;
      }).join('');

      renderHistory();
    }

    function updateSettings(next = {}) {
      state.settings = { ...state.settings, ...next };
      save();
      renderList();
    }

    function addItem(data) {
      const item = {
        id: `i_${Date.now()}_${Math.random().toString(16).slice(2, 8)}`,
        name: data.name.trim(),
        category: data.category,
        expiry: data.expiry,
        qty: Math.max(1, Number(data.qty || 1)),
        memo: data.memo.trim(),
        createdAt: new Date().toISOString()
      };
      state.items.push(item);
      pushHistory(`추가: ${item.name} (${item.category})`);
      save();
      renderList();
    }

    function removeItem(id) {
      const target = state.items.find((i) => i.id === id);
      if (!target) return;
      const ok = confirm(`"${target.name}" 항목을 삭제할까요?`);
      if (!ok) return;
      state.items = state.items.filter((i) => i.id !== id);
      pushHistory(`삭제: ${target.name}`);
      save();
      renderList();
    }

    function duplicateItem(id) {
      const target = state.items.find((i) => i.id === id);
      if (!target) return;
      addItem({ ...target, name: `${target.name} (복사)` });
    }

    function clearExpiredItems() {
      const before = state.items.length;
      state.items = state.items.filter((i) => daysLeft(i.expiry) >= 0);
      const removed = before - state.items.length;
      if (!removed) {
        alert('삭제할 만료 항목이 없습니다.');
        return;
      }
      pushHistory(`만료 ${removed}개 일괄 삭제`);
      save();
      renderList();
    }

    window.removeItem = removeItem;
    window.duplicateItem = duplicateItem;

    el.form.addEventListener('submit', (event) => {
      event.preventDefault();

      const payload = {
        name: el.name.value,
        category: el.category.value,
        expiry: el.expiry.value,
        qty: el.qty.value,
        memo: el.memo.value
      };

      if (!payload.name.trim()) {
        alert('항목 이름을 입력해 주세요.');
        el.name.focus();
        return;
      }
      if (!payload.expiry) {
        alert('유통기한을 선택해 주세요.');
        el.expiry.focus();
        return;
      }

      addItem(payload);
      el.form.reset();
      el.qty.value = 1;
      el.name.focus();
    });

    el.alertDays.addEventListener('change', () => {
      const value = Math.min(60, Math.max(1, Number(el.alertDays.value || 7)));
      el.alertDays.value = value;
      updateSettings({ alertDays: value });
    });

    el.sortMode.addEventListener('change', () => updateSettings({ sortMode: el.sortMode.value }));
    el.filterCategory.addEventListener('change', () => updateSettings({ filterCategory: el.filterCategory.value }));
    el.hideExpired.addEventListener('change', () => updateSettings({ hideExpired: el.hideExpired.checked }));
    el.clearExpired.addEventListener('click', clearExpiredItems);

    load();
    renderList();
  </script>
</body>
</html>
