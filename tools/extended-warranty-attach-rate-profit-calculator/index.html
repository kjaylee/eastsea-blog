<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extended Warranty Attach Rate Profit Calculator | 연장 보증 부착률 수익 계산기</title>
  <meta name="description" content="연장 보증(제품 보호 플랜) 부착률 개선이 만드는 추가 계약 수, 순매출, 공헌이익, 월 순이익, ROI, 회수기간, 손익분기 부착률을 계산합니다." />
  <meta name="keywords" content="extended warranty, protection plan, attach rate, ecommerce, roi, profit, 보증 플랜, 부착률, 손익" />
  <style>
    :root {
      --bg:#0b1220; --card:#121c31; --line:#2a3a58; --txt:#e9efff; --muted:#a9b8d4;
      --pri:#7aa2ff; --pri2:#4e7cff; --ok:#34d399; --warn:#fbbf24; --bad:#fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      color: var(--txt);
      background: radial-gradient(circle at 10% 0%, #20365f 0%, #0b1220 58%);
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 20px 14px 56px; }
    .top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:14px; }
    h1 { margin:0; font-size:clamp(1.2rem, 2.9vw, 1.85rem); }
    .sub { margin-top:8px; color:var(--muted); font-size:.95rem; line-height:1.5; }
    .home {
      text-decoration:none; color:#d7e4ff; background:#0e1930; border:1px solid var(--line);
      border-radius:12px; padding:9px 12px; white-space:nowrap;
    }
    .layout { display:grid; grid-template-columns:1.03fr .97fr; gap:12px; }
    .card {
      background: linear-gradient(165deg, #172844, #121c31);
      border:1px solid var(--line); border-radius:14px; padding:13px; min-width:0;
    }
    h2 { margin:0 0 10px; font-size:1.03rem; }
    .inputs { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
    label { display:block; color:var(--muted); font-size:.79rem; margin-bottom:5px; }
    input, textarea, button {
      width:100%; border-radius:10px; border:1px solid var(--line);
      background:#0b162b; color:var(--txt); padding:10px; font-size:.93rem;
    }
    button { cursor:pointer; border:none; font-weight:700; background:linear-gradient(135deg,var(--pri2),var(--pri)); }
    .soft { background:#15243f; border:1px solid var(--line); }
    .btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    textarea { min-height:110px; margin-top:10px; resize:vertical; }
    .error {
      display:none; margin-top:10px; border:1px solid #7b3344; border-radius:10px;
      background:rgba(248,113,113,.16); color:var(--bad); padding:9px 10px; font-size:.86rem;
    }
    .error.show { display:block; }
    .kpis { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .kpi { border:1px solid var(--line); background:#0f1b33; border-radius:11px; padding:10px; min-width:0; }
    .k { color:var(--muted); font-size:.76rem; margin-bottom:4px; }
    .v { font-size:1.04rem; font-weight:800; word-break:break-word; }
    .pill {
      display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line);
      background:#192b4c; color:#d4e3ff; border-radius:999px; padding:4px 10px; font-size:.77rem;
      margin-top:10px;
    }
    table { width:100%; border-collapse:collapse; margin-top:11px; table-layout:fixed; font-size:.88rem; }
    th, td { border-bottom:1px solid var(--line); padding:8px 6px; text-align:right; word-break:break-word; }
    th:first-child, td:first-child { text-align:left; }
    .good { color:var(--ok); } .warn { color:var(--warn); }
    @media (max-width: 920px) {
      .layout { grid-template-columns:1fr; }
      .inputs { grid-template-columns:1fr; }
      .top { flex-direction:column; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🛡️ 연장 보증 부착률 수익 계산기</h1>
        <div class="sub">제품 보호 플랜(extended warranty) 부착률 개선이 만드는 추가 계약 수, 순매출, 공헌이익, ROI, 회수기간, 손익분기 부착률을 한 번에 계산합니다.</div>
      </div>
      <a class="home" href="/tools/">← Tools</a>
    </div>

    <section class="layout">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="ordersPerMonth">월 주문 수</label><input id="ordersPerMonth" type="number" min="0" value="12000" /></div>
          <div><label for="currentAttachRate">현재 부착률 (%)</label><input id="currentAttachRate" type="number" min="0" max="100" step="0.1" value="4.5" /></div>
          <div><label for="targetAttachRate">목표 부착률 (%)</label><input id="targetAttachRate" type="number" min="0" max="100" step="0.1" value="7.5" /></div>
          <div><label for="planPrice">보증 플랜 가격 (₩)</label><input id="planPrice" type="number" min="0" step="100" value="8900" /></div>
          <div><label for="claimRate">클레임/보상 원가율 (%)</label><input id="claimRate" type="number" min="0" max="100" step="0.1" value="25" /></div>
          <div><label for="refundRate">환불률 (%)</label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="6" /></div>
          <div><label for="paymentFeeRate">결제/플랫폼 수수료율 (%)</label><input id="paymentFeeRate" type="number" min="0" max="100" step="0.1" value="3" /></div>
          <div><label for="opsCostPerContract">계약당 운영비 (₩)</label><input id="opsCostPerContract" type="number" min="0" step="100" value="800" /></div>
          <div><label for="monthlyFixedCost">월 고정 운영비 (₩)</label><input id="monthlyFixedCost" type="number" min="0" step="10000" value="1500000" /></div>
          <div><label for="setupCost">초기 구축비 (₩)</label><input id="setupCost" type="number" min="0" step="100000" value="12000000" /></div>
        </div>

        <div class="btns">
          <button type="button" id="copy" class="soft">요약 복사</button>
          <button type="button" id="reset">기본값 복원</button>
        </div>
        <div class="error" id="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 순이익</div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k">연간 ROI</div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div class="v" id="payback">-</div></div>
          <div class="kpi"><div class="k">추가 보증 계약</div><div class="v" id="incrementalContracts">-</div></div>
          <div class="kpi"><div class="k">순매출</div><div class="v" id="netRevenue">-</div></div>
          <div class="kpi"><div class="k">공헌이익</div><div class="v" id="contributionProfit">-</div></div>
          <div class="kpi"><div class="k">손익분기 목표 부착률</div><div class="v" id="breakEvenAttachRate">-</div></div>
        </div>
        <div class="pill" id="status">-</div>

        <h2 style="margin-top:12px">세부 지표</h2>
        <table>
          <tbody>
            <tr><th>부착률 상승폭</th><td id="attachUplift">-</td></tr>
            <tr><th>추가 매출</th><td id="grossRevenue">-</td></tr>
            <tr><th>환불액</th><td id="refunds">-</td></tr>
            <tr><th>클레임/보상 원가</th><td id="claimCost">-</td></tr>
            <tr><th>결제 수수료</th><td id="paymentFee">-</td></tr>
            <tr><th>계약당 공헌이익</th><td id="contributionPerContract">-</td></tr>
            <tr><th>연간 총비용</th><td id="annualCost">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="calculator.js"></script>
</body>
</html>
