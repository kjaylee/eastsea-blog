<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Data Generator - 테스트 데이터 생성기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f9fa;--bg2:#fff;--text:#212529;--text2:#6c757d;--accent:#667eea;--accent2:#764ba2;--border:#dee2e6;--shadow:rgba(0,0,0,.08);--code-bg:#f1f3f5;--tag-bg:#e9ecef}
[data-theme="dark"]{--bg:#0f0f0f;--bg2:#1a1a2e;--text:#e8e8e8;--text2:#adb5bd;--accent:#7c8cf8;--accent2:#9b6dff;--border:#2d2d44;--shadow:rgba(0,0,0,.3);--code-bg:#16162a;--tag-bg:#252540}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:all .3s}
.container{max-width:900px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0 20px}
h1{font-size:2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.subtitle{color:var(--text2);font-size:.95rem}
.theme-btn{position:fixed;top:16px;right:16px;width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--bg2);cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;z-index:99;box-shadow:0 2px 8px var(--shadow)}
.config{background:var(--bg2);border-radius:16px;padding:24px;margin:20px 0;box-shadow:0 4px 20px var(--shadow)}
.config h2{font-size:1.1rem;margin-bottom:16px;color:var(--accent)}
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.field-btn{padding:10px 14px;border:2px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-size:.85rem;color:var(--text);transition:all .2s;text-align:center}
.field-btn.active{border-color:var(--accent);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.field-btn:hover{border-color:var(--accent)}
.row-config{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.row-config label{font-size:.9rem;color:var(--text2)}
.row-config input,.row-config select{padding:8px 12px;border:2px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.9rem}
.row-config input[type="number"]{width:80px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(102,126,234,.4)}
.btn-secondary{background:var(--tag-bg);color:var(--text)}
.btn-secondary:hover{background:var(--border)}
.output{background:var(--bg2);border-radius:16px;margin-top:20px;box-shadow:0 4px 20px var(--shadow);overflow:hidden}
.output-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.output-header h2{font-size:1rem;color:var(--accent)}
.output-actions{display:flex;gap:8px}
.output-body{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{background:var(--tag-bg);padding:10px 14px;text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0}
td{padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:var(--code-bg)}
.json-view{padding:16px 20px;font-family:'Fira Code',monospace;font-size:.82rem;white-space:pre-wrap;max-height:500px;overflow:auto;color:var(--text);background:var(--code-bg);line-height:1.5}
.format-tabs{display:flex;gap:0;margin-left:12px}
.format-tab{padding:6px 14px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-size:.8rem;transition:all .2s}
.format-tab:first-child{border-radius:6px 0 0 6px}
.format-tab:last-child{border-radius:0 6px 6px 0}
.format-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-size:.9rem;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:600px){h1{font-size:1.5rem}.field-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.row-config{flex-direction:column;align-items:flex-start}}
</style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()">🌓</button>
<div class="container">
<header>
<h1>🧪 Fake Data Generator</h1>
<p class="subtitle">테스트 및 개발용 가짜 데이터를 즉시 생성하세요</p>
</header>

<div class="config">
<h2>📋 필드 선택</h2>
<div class="field-grid" id="fieldGrid"></div>
<div class="row-config">
<label>행 수: <input type="number" id="rowCount" value="10" min="1" max="1000"></label>
<label>언어:
<select id="locale">
<option value="ko">한국어</option>
<option value="en">English</option>
</select>
</label>
</div>
<div class="actions">
<button class="btn btn-primary" onclick="generate()">⚡ 생성</button>
<button class="btn btn-secondary" onclick="selectAll()">전체 선택</button>
<button class="btn btn-secondary" onclick="deselectAll()">전체 해제</button>
</div>
</div>

<div class="output" id="output" style="display:none">
<div class="output-header">
<div style="display:flex;align-items:center">
<h2>📊 생성 결과</h2>
<div class="format-tabs">
<div class="format-tab active" onclick="setFormat('table')">Table</div>
<div class="format-tab" onclick="setFormat('json')">JSON</div>
<div class="format-tab" onclick="setFormat('csv')">CSV</div>
<div class="format-tab" onclick="setFormat('sql')">SQL</div>
</div>
</div>
<div class="output-actions">
<button class="btn btn-secondary" onclick="copyOutput()">📋 복사</button>
<button class="btn btn-secondary" onclick="downloadOutput()">💾 다운로드</button>
</div>
</div>
<div class="output-body" id="outputBody"></div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
const FIELDS=[
{id:'id',label:'🔢 ID',icon:'🔢'},
{id:'uuid',label:'🆔 UUID',icon:'🆔'},
{id:'name',label:'👤 이름',icon:'👤'},
{id:'email',label:'📧 이메일',icon:'📧'},
{id:'phone',label:'📱 전화번호',icon:'📱'},
{id:'address',label:'🏠 주소',icon:'🏠'},
{id:'company',label:'🏢 회사명',icon:'🏢'},
{id:'job',label:'💼 직업',icon:'💼'},
{id:'date',label:'📅 날짜',icon:'📅'},
{id:'ip',label:'🌐 IP 주소',icon:'🌐'},
{id:'url',label:'🔗 URL',icon:'🔗'},
{id:'username',label:'👾 사용자명',icon:'👾'},
{id:'password',label:'🔑 비밀번호',icon:'🔑'},
{id:'creditcard',label:'💳 카드번호',icon:'💳'},
{id:'color',label:'🎨 색상코드',icon:'🎨'},
{id:'avatar',label:'🖼️ 아바타URL',icon:'🖼️'},
{id:'lat',label:'📍 위도',icon:'📍'},
{id:'lng',label:'📍 경도',icon:'📍'},
{id:'text',label:'📝 문장',icon:'📝'},
{id:'number',label:'🔢 숫자',icon:'🔢'},
{id:'boolean',label:'✅ 불리언',icon:'✅'},
{id:'age',label:'🎂 나이',icon:'🎂'},
{id:'gender',label:'⚧ 성별',icon:'⚧'},
{id:'mac',label:'🖥️ MAC 주소',icon:'🖥️'}
];

const KO_FIRST=['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남','심','노','하','곽','성','차','주','우','구','민'];
const KO_GIVEN=['민준','서준','도윤','예준','시우','하준','지호','주원','지후','준서','건우','현우','서연','서윤','지우','하은','하윤','민서','지유','윤서','채원','수아','지민','소율','예은','다은','수빈','은서','지원','채은'];
const EN_FIRST=['James','Mary','John','Patricia','Robert','Jennifer','Michael','Linda','David','Elizabeth','William','Barbara','Richard','Susan','Joseph','Jessica','Thomas','Sarah','Charles','Karen','Emma','Olivia','Liam','Noah'];
const EN_LAST=['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','Thompson'];
const COMPANIES_KO=['삼성전자','SK하이닉스','네이버','카카오','LG전자','현대자동차','쿠팡','배달의민족','토스','당근마켓','라인','넥슨','엔씨소프트','크래프톤','하이브','두나무','야놀자','무신사','마켓컬리','직방'];
const COMPANIES_EN=['TechNova','CloudSphere','DataPulse','ByteForge','NeuralWave','PixelCraft','CodeVault','AeroSync','QuantumLeap','CyberGrid','MindBridge','FluxCore','ZenithLab','PrimePath','VertexAI'];
const JOBS_KO=['소프트웨어 엔지니어','백엔드 개발자','프론트엔드 개발자','데이터 분석가','UX 디자이너','프로덕트 매니저','마케팅 매니저','인사 담당자','회계사','변호사','의사','교사','경영 컨설턴트','그래픽 디자이너','시스템 관리자'];
const JOBS_EN=['Software Engineer','Backend Developer','Frontend Developer','Data Analyst','UX Designer','Product Manager','Marketing Manager','HR Specialist','Accountant','Lawyer','Doctor','Teacher','Consultant','Graphic Designer','SysAdmin'];
const STREETS_KO=['강남대로','테헤란로','을지로','종로','세종대로','반포대로','영동대로','올림픽로','도산대로','압구정로','삼성로','봉은사로','선릉로','역삼로','논현로'];
const CITIES_KO=['서울','부산','인천','대구','대전','광주','울산','수원','성남','고양','용인','창원','제주','청주','천안'];
const TEXTS_KO=['빠른 갈색 여우가 게으른 개를 뛰어넘었습니다.','오늘 날씨가 정말 좋습니다.','새로운 프로젝트가 시작되었습니다.','회의는 오후 3시에 진행됩니다.','데이터베이스 마이그레이션이 완료되었습니다.','테스트 코드를 작성하는 것이 중요합니다.','사용자 경험을 최우선으로 생각합니다.','배포 파이프라인을 자동화했습니다.'];
const TEXTS_EN=['The quick brown fox jumps over the lazy dog.','Lorem ipsum dolor sit amet, consectetur adipiscing elit.','Innovation distinguishes between a leader and a follower.','Testing is an essential part of software development.','The best way to predict the future is to create it.'];
const DOMAINS=['gmail.com','naver.com','kakao.com','daum.net','outlook.com','yahoo.com','icloud.com','hanmail.net','hotmail.com'];

let selectedFields=new Set(['id','name','email','phone']);
let generatedData=[];
let currentFormat='table';

function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function uuid(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)})}
function randIP(){return `${randInt(1,255)}.${randInt(0,255)}.${randInt(0,255)}.${randInt(1,254)}`}
function randMAC(){return Array.from({length:6},()=>randInt(0,255).toString(16).padStart(2,'0')).join(':')}
function randHex(){return '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}
function randCC(){return Array.from({length:4},()=>randInt(1000,9999)).join(' ')}
function randPW(){const c='abcdefghijkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#$%';return Array.from({length:randInt(8,14)},()=>c[randInt(0,c.length-1)]).join('')}
function randDate(){const y=randInt(1990,2025),m=String(randInt(1,12)).padStart(2,'0'),d=String(randInt(1,28)).padStart(2,'0');return`${y}-${m}-${d}`}

function genRow(i,locale){
  const ko=locale==='ko';
  const name=ko?rand(KO_FIRST)+rand(KO_GIVEN):rand(EN_FIRST)+' '+rand(EN_LAST);
  const uname=ko?name.replace(/\s/g,'')+(randInt(1,99)):name.split(' ')[0].toLowerCase()+randInt(1,999);
  const email=uname.toLowerCase().replace(/[^a-z0-9]/g,'')+'@'+rand(DOMAINS);
  const row={};
  for(const f of selectedFields){
    switch(f){
      case'id':row['ID']=i+1;break;
      case'uuid':row['UUID']=uuid();break;
      case'name':row[ko?'이름':'Name']=name;break;
      case'email':row[ko?'이메일':'Email']=email;break;
      case'phone':row[ko?'전화번호':'Phone']=ko?`010-${randInt(1000,9999)}-${randInt(1000,9999)}`:`+1-${randInt(200,999)}-${randInt(100,999)}-${randInt(1000,9999)}`;break;
      case'address':row[ko?'주소':'Address']=ko?`${rand(CITIES_KO)} ${rand(STREETS_KO)} ${randInt(1,500)}번길 ${randInt(1,30)}`:`${randInt(100,9999)} ${rand(EN_LAST)} St, Suite ${randInt(1,500)}`;break;
      case'company':row[ko?'회사':'Company']=ko?rand(COMPANIES_KO):rand(COMPANIES_EN);break;
      case'job':row[ko?'직업':'Job']=ko?rand(JOBS_KO):rand(JOBS_EN);break;
      case'date':row[ko?'날짜':'Date']=randDate();break;
      case'ip':row['IP']=randIP();break;
      case'url':row['URL']=`https://${rand(['www.','','app.','api.'])}${rand(COMPANIES_EN).toLowerCase()}.${rand(['com','io','dev','co','net'])}/${rand(['about','products','api','docs','blog'])}`;break;
      case'username':row[ko?'사용자명':'Username']=uname;break;
      case'password':row[ko?'비밀번호':'Password']=randPW();break;
      case'creditcard':row[ko?'카드번호':'Card']=randCC();break;
      case'color':row[ko?'색상':'Color']=randHex();break;
      case'avatar':row[ko?'아바타':'Avatar']=`https://api.dicebear.com/7.x/avataaars/svg?seed=${uname}`;break;
      case'lat':row[ko?'위도':'Lat']=(Math.random()*180-90).toFixed(6);break;
      case'lng':row[ko?'경도':'Lng']=(Math.random()*360-180).toFixed(6);break;
      case'text':row[ko?'문장':'Text']=ko?rand(TEXTS_KO):rand(TEXTS_EN);break;
      case'number':row[ko?'숫자':'Number']=randInt(1,10000);break;
      case'boolean':row[ko?'불리언':'Boolean']=Math.random()>.5;break;
      case'age':row[ko?'나이':'Age']=randInt(18,75);break;
      case'gender':row[ko?'성별':'Gender']=ko?rand(['남','여']):rand(['Male','Female','Other']);break;
      case'mac':row['MAC']=randMAC();break;
    }
  }
  return row;
}

function initFields(){
  const grid=document.getElementById('fieldGrid');
  grid.innerHTML=FIELDS.map(f=>`<div class="field-btn${selectedFields.has(f.id)?' active':''}" data-id="${f.id}" onclick="toggleField('${f.id}',this)">${f.label}</div>`).join('');
}

function toggleField(id,el){
  if(selectedFields.has(id)){selectedFields.delete(id);el.classList.remove('active')}
  else{selectedFields.add(id);el.classList.add('active')}
}

function selectAll(){selectedFields=new Set(FIELDS.map(f=>f.id));initFields()}
function deselectAll(){selectedFields.clear();initFields()}

function generate(){
  if(!selectedFields.size)return toast('최소 1개 필드를 선택하세요');
  const n=Math.min(parseInt(document.getElementById('rowCount').value)||10,1000);
  const locale=document.getElementById('locale').value;
  generatedData=Array.from({length:n},(_,i)=>genRow(i,locale));
  document.getElementById('output').style.display='block';
  renderOutput();
  document.getElementById('output').scrollIntoView({behavior:'smooth'});
}

function setFormat(f){
  currentFormat=f;
  document.querySelectorAll('.format-tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase()===f));
  renderOutput();
}

function renderOutput(){
  const body=document.getElementById('outputBody');
  if(currentFormat==='table'){
    if(!generatedData.length)return;
    const keys=Object.keys(generatedData[0]);
    body.innerHTML=`<table><thead><tr>${keys.map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>${generatedData.map(r=>`<tr>${keys.map(k=>`<td>${r[k]}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  }else if(currentFormat==='json'){
    body.innerHTML=`<div class="json-view">${JSON.stringify(generatedData,null,2)}</div>`;
  }else if(currentFormat==='csv'){
    const keys=Object.keys(generatedData[0]);
    const csv=keys.join(',')+'\n'+generatedData.map(r=>keys.map(k=>{const v=String(r[k]);return v.includes(',')?`"${v}"`:v}).join(',')).join('\n');
    body.innerHTML=`<div class="json-view">${csv}</div>`;
  }else if(currentFormat==='sql'){
    const keys=Object.keys(generatedData[0]);
    const tbl='fake_data';
    const sql=`CREATE TABLE ${tbl} (\n${keys.map(k=>`  ${k.replace(/[^a-zA-Z0-9_]/g,'_')} TEXT`).join(',\n')}\n);\n\n`+generatedData.map(r=>`INSERT INTO ${tbl} (${keys.map(k=>k.replace(/[^a-zA-Z0-9_]/g,'_')).join(', ')}) VALUES (${keys.map(k=>`'${String(r[k]).replace(/'/g,"''")}'`).join(', ')});`).join('\n');
    body.innerHTML=`<div class="json-view">${sql}</div>`;
  }
}

function getOutputText(){
  if(currentFormat==='table'||currentFormat==='json')return JSON.stringify(generatedData,null,2);
  if(currentFormat==='csv'){const keys=Object.keys(generatedData[0]);return keys.join(',')+'\n'+generatedData.map(r=>keys.map(k=>{const v=String(r[k]);return v.includes(',')?`"${v}"`:v}).join(',')).join('\n')}
  if(currentFormat==='sql'){const keys=Object.keys(generatedData[0]);const tbl='fake_data';return`CREATE TABLE ${tbl} (\n${keys.map(k=>`  ${k.replace(/[^a-zA-Z0-9_]/g,'_')} TEXT`).join(',\n')}\n);\n\n`+generatedData.map(r=>`INSERT INTO ${tbl} (${keys.map(k=>k.replace(/[^a-zA-Z0-9_]/g,'_')).join(', ')}) VALUES (${keys.map(k=>`'${String(r[k]).replace(/'/g,"''")}'`).join(', ')});`).join('\n')}
}

function copyOutput(){navigator.clipboard.writeText(getOutputText()).then(()=>toast('클립보드에 복사되었습니다!'))}
function downloadOutput(){
  const ext={table:'json',json:'json',csv:'csv',sql:'sql'}[currentFormat];
  const blob=new Blob([getOutputText()],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`fake_data.${ext}`;a.click();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function toggleTheme(){const d=document.documentElement;const c=d.getAttribute('data-theme')==='dark'?'light':'dark';d.setAttribute('data-theme',c);localStorage.setItem('theme',c)}
document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');
initFields();
</script>
</body>
</html>
