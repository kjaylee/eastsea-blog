<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Favicon Text Studio</title>
  <style>
    :root{--bg:#0d1020;--panel:#171c35;--line:#2d375f;--txt:#eef2ff;--muted:#acb6dc;--acc:#6b8cff;--acc2:#34d7bc;--radius:15px}
    *{box-sizing:border-box}
    body{margin:0;padding:16px;min-height:100vh;background:radial-gradient(circle at 20% 10%,rgba(107,140,255,.24),transparent 33%),var(--bg);color:var(--txt);font-family:Inter,Pretendard,system-ui,sans-serif}
    .wrap{max-width:1080px;margin:0 auto;display:grid;grid-template-columns:360px 1fr;gap:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
    h1{margin:0 0 6px;font-size:1.24rem}.muted{color:var(--muted);font-size:.9rem}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:6px}
    .stack>*+*{margin-top:10px}
    input,select,button{font:inherit}
    input[type="text"],input[type="color"],input[type="range"],select{width:100%;background:#0b122a;border:1px solid #34436f;border-radius:10px;color:var(--txt);padding:8px}
    input[type="range"]{padding:0;height:34px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .btns{display:flex;gap:8px;flex-wrap:wrap}
    button{border:0;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer;background:#2a3660;color:#fff}
    button.primary{background:linear-gradient(120deg,var(--acc),#725fff)}
    button.good{background:linear-gradient(120deg,var(--acc2),#18bca5)}
    .preview{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
    .tile{background:#0b1227;border:1px solid #32426a;border-radius:12px;padding:10px;text-align:center}
    canvas{width:64px;height:64px;background:transparent;image-rendering:pixelated}
    .tile small{display:block;color:var(--muted);margin-top:7px}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <section class="card stack">
      <h1>Favicon Text Studio</h1>
      <p class="muted">Turn text or emoji into clean multi-size favicons (PNG).</p>

      <div>
        <label for="text">Text / Emoji (1–2 chars)</label>
        <input id="text" type="text" maxlength="2" value="E" />
      </div>

      <div class="row">
        <div>
          <label for="shape">Shape</label>
          <select id="shape">
            <option value="rounded">Rounded square</option>
            <option value="square">Square</option>
            <option value="circle">Circle</option>
          </select>
        </div>
        <div>
          <label for="font">Font weight</label>
          <select id="font">
            <option value="700">Bold</option>
            <option value="800" selected>Extra Bold</option>
            <option value="600">Semi Bold</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="bg">Background</label>
          <input id="bg" type="color" value="#6b8cff" />
        </div>
        <div>
          <label for="fg">Text color</label>
          <input id="fg" type="color" value="#ffffff" />
        </div>
      </div>

      <div>
        <label for="radius">Corner roundness <span id="rv" class="muted">22%</span></label>
        <input id="radius" type="range" min="0" max="50" value="22" />
      </div>

      <div class="btns">
        <button class="primary" id="renderBtn">Render</button>
        <button class="good" id="download32">Download 32x32</button>
        <button id="downloadAll">Download all sizes</button>
      </div>
    </section>

    <section class="card stack">
      <div class="preview" id="preview"></div>
      <p class="muted">Suggested tag: <code>&lt;link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32"&gt;</code></p>
    </section>
  </main>

  <script>
    const sizes = [16, 32, 48, 64, 128, 180, 192, 512];
    const $ = s => document.querySelector(s);
    const preview = $('#preview');
    const canvases = new Map();

    function draw(size){
      let c = canvases.get(size);
      if(!c){ c = document.createElement('canvas'); c.width = c.height = size; canvases.set(size,c); }
      const ctx = c.getContext('2d');
      const text = ($('#text').value || 'E').slice(0,2);
      const bg = $('#bg').value;
      const fg = $('#fg').value;
      const shape = $('#shape').value;
      const fw = $('#font').value;
      const roundPct = Number($('#radius').value);

      ctx.clearRect(0,0,size,size);
      ctx.fillStyle = bg;

      if(shape==='circle'){
        ctx.beginPath(); ctx.arc(size/2,size/2,size/2,0,Math.PI*2); ctx.fill();
      } else {
        const r = shape==='square' ? 0 : size * (roundPct/100);
        const w=size, h=size;
        ctx.beginPath();
        ctx.moveTo(r,0); ctx.lineTo(w-r,0); ctx.quadraticCurveTo(w,0,w,r);
        ctx.lineTo(w,h-r); ctx.quadraticCurveTo(w,h,w-r,h);
        ctx.lineTo(r,h); ctx.quadraticCurveTo(0,h,0,h-r);
        ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
        ctx.closePath(); ctx.fill();
      }

      ctx.fillStyle = fg;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.font = `${fw} ${Math.round(size*0.58)}px Inter, system-ui, sans-serif`;
      ctx.fillText(text, size/2, size/2 + size*0.03);
      return c;
    }

    function renderPreview(){
      $('#rv').textContent = $('#radius').value + '%';
      preview.innerHTML='';
      for(const size of sizes){
        const tile=document.createElement('div'); tile.className='tile';
        const c = draw(size);
        const tiny=document.createElement('canvas'); tiny.width=tiny.height=64;
        tiny.getContext('2d').drawImage(c,0,0,64,64);
        tile.appendChild(tiny);
        const s=document.createElement('small'); s.textContent=`${size}x${size}`;
        tile.appendChild(s);
        preview.appendChild(tile);
      }
    }

    function download(size){
      const c = draw(size);
      const a=document.createElement('a');
      a.href=c.toDataURL('image/png');
      a.download=`favicon-${size}x${size}.png`;
      a.click();
    }

    $('#renderBtn').onclick=renderPreview;
    ['text','shape','font','bg','fg','radius'].forEach(id=>$('#'+id).addEventListener('input',renderPreview));
    $('#download32').onclick=()=>download(32);

    $('#downloadAll').onclick=()=>{
      sizes.forEach((s,i)=>setTimeout(()=>download(s),i*180));
    };

    renderPreview();
  </script>
</body>
</html>
