<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파일명 일괄 정리기 | Filename Batch Renamer</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #111129;
      --panel-2: #161634;
      --text: #eaf2ff;
      --muted: #9aa5ce;
      --neon: #00f5d4;
      --neon-2: #7c4dff;
      --warn: #ffd166;
      --danger: #ff4d6d;
      --ok: #52ffa8;
      --border: rgba(124, 77, 255, 0.35);
      --radius: 14px;
      --shadow: 0 0 0 1px rgba(0, 245, 212, 0.1), 0 16px 40px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 245, 212, 0.12), transparent 35%),
        radial-gradient(circle at 85% 0%, rgba(124, 77, 255, 0.2), transparent 40%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding: 20px;
    }

    .container {
      width: min(1100px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)), var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.4vw, 1.8rem);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-size: .78rem;
      color: var(--bg);
      background: linear-gradient(120deg, var(--neon), #6ef8e4);
      padding: 3px 8px;
      border-radius: 99px;
      font-weight: 700;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 860px) {
      .grid {
        grid-template-columns: 1.05fr 0.95fr;
      }
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: .88rem;
    }

    textarea,
    input,
    select,
    button {
      font: inherit;
      color: var(--text);
    }

    textarea,
    input,
    select {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 10px;
      padding: 10px 11px;
      outline: none;
    }

    textarea {
      min-height: 240px;
      resize: vertical;
      white-space: pre;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 2px rgba(0, 245, 212, .18);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .full { grid-column: 1 / -1; }

    .inline {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
      font-size: .9rem;
      color: var(--muted);
    }

    input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--neon);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      background: #1d1d46;
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: 700;
    }

    button:hover { opacity: .95; }
    button:active { transform: translateY(1px); }

    .primary {
      background: linear-gradient(120deg, var(--neon), #59f8de);
      color: #031713;
      border: 0;
      box-shadow: 0 8px 20px rgba(0, 245, 212, 0.24);
    }

    .accent {
      background: linear-gradient(120deg, var(--neon-2), #9d7aff);
      border: 0;
      box-shadow: 0 8px 20px rgba(124, 77, 255, 0.24);
    }

    .danger {
      background: rgba(255, 77, 109, 0.17);
      border-color: rgba(255, 77, 109, 0.45);
      color: #ffdce3;
    }

    .stats {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 10px;
      padding: 8px;
    }

    .stat .k {
      color: var(--muted);
      font-size: .8rem;
    }

    .stat .v {
      margin-top: 3px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: .83rem;
    }

    .status {
      margin-top: 8px;
      font-size: .86rem;
      color: var(--ok);
      min-height: 1.2em;
    }

    .warning { color: var(--warn); }
    .error { color: var(--danger); }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>파일명 일괄 정리기 <span class="badge">로컬 저장</span></h1>
      <p class="subtitle">파일명을 여러 줄로 붙여넣고 규칙을 적용해 한 번에 정리하세요. 결과는 자동으로 저장됩니다.</p>
    </section>

    <section class="grid">
      <article class="card">
        <label for="inputNames">원본 파일명 (줄바꿈으로 구분)</label>
        <textarea id="inputNames" placeholder="예시:
여행 사진 01.JPG
여행 사진 02.JPG
최종_리뷰본.pdf"></textarea>

        <div class="hint">* 확장자는 자동 유지됩니다. (예: .jpg, .pdf)</div>
      </article>

      <article class="card">
        <div class="controls">
          <div>
            <label for="findText">찾을 텍스트</label>
            <input id="findText" type="text" placeholder="예: 사진" />
          </div>
          <div>
            <label for="replaceText">바꿀 텍스트</label>
            <input id="replaceText" type="text" placeholder="예: photo" />
          </div>

          <div>
            <label for="prefixText">접두어</label>
            <input id="prefixText" type="text" placeholder="예: project-" />
          </div>
          <div>
            <label for="suffixText">접미어</label>
            <input id="suffixText" type="text" placeholder="예: -final" />
          </div>

          <div>
            <label for="caseMode">문자 변환</label>
            <select id="caseMode">
              <option value="keep">유지</option>
              <option value="lower">소문자</option>
              <option value="upper">대문자</option>
              <option value="kebab">kebab-case</option>
              <option value="snake">snake_case</option>
            </select>
          </div>

          <div>
            <label for="numbering">번호 붙이기</label>
            <select id="numbering">
              <option value="off">사용 안 함</option>
              <option value="on">사용</option>
            </select>
          </div>

          <div>
            <label for="startNum">시작 번호</label>
            <input id="startNum" type="number" min="0" value="1" />
          </div>
          <div>
            <label for="padNum">자리수 (0 채움)</label>
            <input id="padNum" type="number" min="1" max="8" value="3" />
          </div>

          <div class="full check">
            <input id="trimSpaces" type="checkbox" checked />
            <label for="trimSpaces" style="margin:0">공백/특수문자 정리 (연속 구분자 제거)</label>
          </div>

          <div class="full check">
            <input id="safeChars" type="checkbox" checked />
            <label for="safeChars" style="margin:0">안전 문자만 남기기 (영문/숫자/한글/-/_/. 허용)</label>
          </div>
        </div>

        <div class="btn-row">
          <button class="primary" id="runBtn">변환하기</button>
          <button class="accent" id="copyBtn">결과 복사</button>
          <button id="downloadBtn">CSV 다운로드</button>
          <button class="danger" id="resetBtn">초기화</button>
        </div>

        <div class="status" id="status"></div>
      </article>
    </section>

    <section class="card">
      <label for="outputNames">변환 결과</label>
      <textarea id="outputNames" readonly placeholder="변환 결과가 여기에 표시됩니다."></textarea>

      <div class="stats">
        <div class="stat"><div class="k">입력 개수</div><div class="v" id="countIn">0</div></div>
        <div class="stat"><div class="k">출력 개수</div><div class="v" id="countOut">0</div></div>
        <div class="stat"><div class="k">중복 파일명</div><div class="v" id="countDup">0</div></div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = 'filename-batch-renamer-v1';

      const els = {
        inputNames: document.getElementById('inputNames'),
        findText: document.getElementById('findText'),
        replaceText: document.getElementById('replaceText'),
        prefixText: document.getElementById('prefixText'),
        suffixText: document.getElementById('suffixText'),
        caseMode: document.getElementById('caseMode'),
        numbering: document.getElementById('numbering'),
        startNum: document.getElementById('startNum'),
        padNum: document.getElementById('padNum'),
        trimSpaces: document.getElementById('trimSpaces'),
        safeChars: document.getElementById('safeChars'),
        outputNames: document.getElementById('outputNames'),
        countIn: document.getElementById('countIn'),
        countOut: document.getElementById('countOut'),
        countDup: document.getElementById('countDup'),
        status: document.getElementById('status'),
        runBtn: document.getElementById('runBtn'),
        copyBtn: document.getElementById('copyBtn'),
        downloadBtn: document.getElementById('downloadBtn'),
        resetBtn: document.getElementById('resetBtn')
      };

      const stateFields = [
        'inputNames', 'findText', 'replaceText', 'prefixText', 'suffixText',
        'caseMode', 'numbering', 'startNum', 'padNum', 'trimSpaces', 'safeChars', 'outputNames'
      ];

      const splitExt = (name) => {
        const i = name.lastIndexOf('.');
        if (i <= 0 || i === name.length - 1) return { base: name, ext: '' };
        return { base: name.slice(0, i), ext: name.slice(i) };
      };

      const normalizeSep = (str, sep = '-') => {
        return str
          .normalize('NFC')
          .replace(/[\s/\\|]+/g, sep)
          .replace(new RegExp(`${sep}{2,}`, 'g'), sep)
          .replace(/^[-_.]+|[-_.]+$/g, '');
      };

      const sanitizeSafe = (str) => str.replace(/[^0-9a-zA-Z가-힣._-]+/g, '');

      const applyCase = (str, mode) => {
        if (!str) return str;
        switch (mode) {
          case 'lower': return str.toLowerCase();
          case 'upper': return str.toUpperCase();
          case 'kebab': return normalizeSep(str, '-').toLowerCase();
          case 'snake': return normalizeSep(str, '_').toLowerCase();
          default: return str;
        }
      };

      const escapeCsv = (s) => {
        const v = String(s ?? '');
        if (/[",\n]/.test(v)) return `"${v.replace(/"/g, '""')}"`;
        return v;
      };

      const setStatus = (msg, type = 'ok') => {
        els.status.textContent = msg;
        els.status.className = 'status';
        if (type === 'warn') els.status.classList.add('warning');
        if (type === 'error') els.status.classList.add('error');
      };

      const saveState = () => {
        const payload = {};
        for (const key of stateFields) {
          const el = els[key];
          payload[key] = el.type === 'checkbox' ? el.checked : el.value;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      };

      const loadState = () => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const saved = JSON.parse(raw);
          for (const key of stateFields) {
            if (!(key in saved) || !els[key]) continue;
            const el = els[key];
            if (el.type === 'checkbox') el.checked = !!saved[key];
            else el.value = saved[key];
          }
        } catch {
          setStatus('저장된 데이터를 불러오지 못했습니다.', 'warn');
        }
      };

      const getLines = () => {
        return els.inputNames.value
          .split('\n')
          .map(v => v.trim())
          .filter(Boolean);
      };

      const transform = () => {
        const input = getLines();
        const find = els.findText.value;
        const replace = els.replaceText.value;
        const prefix = els.prefixText.value;
        const suffix = els.suffixText.value;
        const mode = els.caseMode.value;
        const numberingOn = els.numbering.value === 'on';
        const start = Math.max(0, parseInt(els.startNum.value || '0', 10));
        const pad = Math.min(8, Math.max(1, parseInt(els.padNum.value || '3', 10)));
        const trimSpaces = els.trimSpaces.checked;
        const safeChars = els.safeChars.checked;

        const output = [];

        input.forEach((name, idx) => {
          const { base, ext } = splitExt(name);
          let next = base;

          if (find) next = next.split(find).join(replace);
          if (trimSpaces) next = normalizeSep(next, '-');
          next = applyCase(next, mode);
          if (safeChars) next = sanitizeSafe(next);

          next = `${prefix}${next}${suffix}`;
          if (!next) next = `file-${idx + 1}`;

          if (numberingOn) {
            const n = String(start + idx).padStart(pad, '0');
            next = `${n}_${next}`;
          }

          if (trimSpaces) next = next.replace(/[-_]{2,}/g, '-').replace(/^[-_.]+|[-_.]+$/g, '');
          if (!next) next = `file-${idx + 1}`;

          output.push(next + ext);
        });

        const counts = new Map();
        output.forEach(v => counts.set(v, (counts.get(v) || 0) + 1));
        const dup = [...counts.values()].filter(v => v > 1).reduce((a, b) => a + b, 0);

        els.outputNames.value = output.join('\n');
        els.countIn.textContent = String(input.length);
        els.countOut.textContent = String(output.length);
        els.countDup.textContent = String(dup);

        if (dup > 0) setStatus(`중복 파일명 ${dup}개가 감지되었습니다. 규칙을 조정해 주세요.`, 'warn');
        else setStatus(`변환 완료: ${output.length}개`, 'ok');

        saveState();
      };

      const copyOutput = async () => {
        if (!els.outputNames.value.trim()) {
          setStatus('복사할 결과가 없습니다. 먼저 변환해 주세요.', 'warn');
          return;
        }
        try {
          await navigator.clipboard.writeText(els.outputNames.value);
          setStatus('결과를 클립보드에 복사했습니다.', 'ok');
        } catch {
          els.outputNames.select();
          document.execCommand('copy');
          setStatus('결과를 복사했습니다. (대체 방식)', 'ok');
        }
      };

      const downloadCsv = () => {
        const input = getLines();
        const output = els.outputNames.value.split('\n').filter(Boolean);
        if (!output.length) {
          setStatus('다운로드할 결과가 없습니다.', 'warn');
          return;
        }

        const rows = ['원본,변환'];
        for (let i = 0; i < output.length; i++) {
          rows.push(`${escapeCsv(input[i] || '')},${escapeCsv(output[i])}`);
        }

        const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'filename-rename-result.csv';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        setStatus('CSV 다운로드를 완료했습니다.', 'ok');
      };

      const resetAll = () => {
        if (!confirm('입력/설정/결과를 모두 초기화할까요?')) return;
        localStorage.removeItem(STORAGE_KEY);
        els.inputNames.value = '';
        els.findText.value = '';
        els.replaceText.value = '';
        els.prefixText.value = '';
        els.suffixText.value = '';
        els.caseMode.value = 'keep';
        els.numbering.value = 'off';
        els.startNum.value = '1';
        els.padNum.value = '3';
        els.trimSpaces.checked = true;
        els.safeChars.checked = true;
        els.outputNames.value = '';
        els.countIn.textContent = '0';
        els.countOut.textContent = '0';
        els.countDup.textContent = '0';
        setStatus('초기화했습니다.', 'ok');
      };

      const autoFields = [
        'inputNames', 'findText', 'replaceText', 'prefixText', 'suffixText',
        'caseMode', 'numbering', 'startNum', 'padNum', 'trimSpaces', 'safeChars'
      ];

      autoFields.forEach((k) => {
        const el = els[k];
        const eventName = el.type === 'checkbox' || el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventName, () => {
          saveState();
          transform();
        });
      });

      els.runBtn.addEventListener('click', transform);
      els.copyBtn.addEventListener('click', copyOutput);
      els.downloadBtn.addEventListener('click', downloadCsv);
      els.resetBtn.addEventListener('click', resetAll);

      loadState();
      transform();
    })();
  </script>
</body>
</html>
