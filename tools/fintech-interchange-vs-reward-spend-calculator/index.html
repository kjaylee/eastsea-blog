<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fintech Interchange vs Reward Spend Calculator | 핀테크 인터체인지·리워드 원가 계산기</title>
  <meta name="description" content="카드 프로그램의 인터체인지 수익, 리워드 비용, 네트워크/손실 비용을 비교해 월 공헌이익과 손익분기 리워드율을 계산합니다." />
  <style>
    :root{--bg:#0f1920;--card:#162734;--line:#2f5368;--text:#ecfaff;--muted:#acd3e4;--pri:#22d3ee;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#1b5a73 0%,var(--bg) 60%);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.84rem)}.sub{margin-top:6px;color:var(--muted);font-size:.94rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btnLink,.lang{border:1px solid var(--line);background:#173647;color:#d8f7ff;text-decoration:none;border-radius:10px;padding:8px 11px;font-size:.88rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#1a3848,#13232f);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#102633;color:var(--text);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;background:linear-gradient(135deg,#44e6ff,#0ea5e9);font-weight:700;color:#04222e}.soft{background:#1f475b;border:1px solid var(--line);color:#d8f7ff}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7d3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:#112833;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.04rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1c4254;color:#d8f7ff;font-size:.77rem;margin-top:10px}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.actions{justify-content:flex-start}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">💳 핀테크 인터체인지·리워드 원가 계산기</h1>
        <div class="sub" id="subtitle">카드 사용액 기반 수익/비용 구조를 계산해 월 공헌이익과 손익분기 리워드율을 확인합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a class="btnLink" href="/" id="backLink">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값 Inputs</h2>
        <div class="inputs">
          <div><label for="activeCards" id="l_activeCards"></label><input id="activeCards" type="number" min="0" value="85000"></div>
          <div><label for="spendPerCard" id="l_spendPerCard"></label><input id="spendPerCard" type="number" min="0" step="1000" value="410000"></div>
          <div><label for="interchangeRate" id="l_interchangeRate"></label><input id="interchangeRate" type="number" min="0" max="100" step="0.01" value="1.35"></div>
          <div><label for="rewardRate" id="l_rewardRate"></label><input id="rewardRate" type="number" min="0" max="100" step="0.01" value="0.9"></div>
          <div><label for="redemptionRate" id="l_redemptionRate"></label><input id="redemptionRate" type="number" min="0" max="100" step="0.1" value="82"></div>
          <div><label for="networkRate" id="l_networkRate"></label><input id="networkRate" type="number" min="0" max="100" step="0.01" value="0.22"></div>
          <div><label for="fraudRate" id="l_fraudRate"></label><input id="fraudRate" type="number" min="0" max="100" step="0.01" value="0.08"></div>
          <div><label for="annualFixedCost" id="l_annualFixedCost"></label><input id="annualFixedCost" type="number" min="0" step="100000" value="360000000"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button"></button>
          <button id="reset" type="button"></button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_gmv"></div><div id="gmv" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_interchange"></div><div id="interchange" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_rewardCost"></div><div id="rewardCost" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyContribution"></div><div id="monthlyContribution" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_marginBps"></div><div id="marginBps" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_netAnnual"></div><div id="netAnnual" class="v">-</div></div>
        </div>
        <div id="status" class="pill"></div>

        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table>
          <tbody>
            <tr><th id="d_networkCost"></th><td id="networkCost">-</td></tr>
            <tr><th id="d_fraudCost"></th><td id="fraudCost">-</td></tr>
            <tr><th id="d_breakEvenReward"></th><td id="breakEvenReward">-</td></tr>
            <tr><th id="d_gapToBreakEven"></th><td id="gapToBreakEven">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={
      activeCards:$("activeCards"),spendPerCard:$("spendPerCard"),interchangeRate:$("interchangeRate"),rewardRate:$("rewardRate"),redemptionRate:$("redemptionRate"),networkRate:$("networkRate"),fraudRate:$("fraudRate"),annualFixedCost:$("annualFixedCost"),
      gmv:$("gmv"),interchange:$("interchange"),rewardCost:$("rewardCost"),monthlyContribution:$("monthlyContribution"),marginBps:$("marginBps"),netAnnual:$("netAnnual"),networkCost:$("networkCost"),fraudCost:$("fraudCost"),breakEvenReward:$("breakEvenReward"),gapToBreakEven:$("gapToBreakEven"),
      copy:$("copy"),reset:$("reset"),summary:$("summary"),error:$("error"),status:$("status"),langBtn:$("langBtn")
    };
    const defaults={activeCards:85000,spendPerCard:410000,interchangeRate:1.35,rewardRate:0.9,redemptionRate:82,networkRate:0.22,fraudRate:0.08,annualFixedCost:360000000};

    const I18N={
      ko:{title:"💳 핀테크 인터체인지·리워드 원가 계산기",subtitle:"카드 사용액 기반 수익/비용 구조를 계산해 월 공헌이익과 손익분기 리워드율을 확인합니다.",inputHeader:"입력값 Inputs",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",
      l_activeCards:"활성 카드 수",l_spendPerCard:"카드당 월 사용액 (₩)",l_interchangeRate:"인터체인지율 (%)",l_rewardRate:"리워드 적립률 (%)",l_redemptionRate:"리워드 사용률 (%)",l_networkRate:"네트워크/프로세싱 비용률 (%)",l_fraudRate:"부정사용·손실률 (%)",l_annualFixedCost:"연간 고정 운영비 (₩)",
      k_gmv:"월 GMV",k_interchange:"월 인터체인지 수익",k_rewardCost:"월 리워드 비용",k_monthlyContribution:"월 공헌이익",k_marginBps:"공헌이익률 (bps)",k_netAnnual:"연간 순효과",
      d_networkCost:"월 네트워크/프로세싱 비용",d_fraudCost:"월 손실비용",d_breakEvenReward:"손익분기 리워드율",d_gapToBreakEven:"현재 대비 여유/초과",good:"보상정책이 손익분기 이내",bad:"리워드 정책이 과도할 수 있음",invalid:"입력값을 확인해 주세요",
      e_range:"비율 값은 0~100 범위여야 합니다.",copied:"요약이 복사되었습니다.",copyFail:"복사 권한이 없어 수동 복사가 필요합니다.",summaryTitle:"[인터체인지 vs 리워드 요약]"},
      en:{title:"💳 Fintech Interchange vs Reward Spend Calculator",subtitle:"Model monthly contribution and break-even reward rate from card program economics.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",
      l_activeCards:"Active cards",l_spendPerCard:"Monthly spend per card (KRW)",l_interchangeRate:"Interchange rate (%)",l_rewardRate:"Reward earn rate (%)",l_redemptionRate:"Reward redemption rate (%)",l_networkRate:"Network & processing cost rate (%)",l_fraudRate:"Fraud & loss rate (%)",l_annualFixedCost:"Annual fixed operating cost (KRW)",
      k_gmv:"Monthly GMV",k_interchange:"Monthly interchange revenue",k_rewardCost:"Monthly reward cost",k_monthlyContribution:"Monthly contribution",k_marginBps:"Contribution margin (bps)",k_netAnnual:"Net annual impact",
      d_networkCost:"Monthly network/processing cost",d_fraudCost:"Monthly fraud/loss cost",d_breakEvenReward:"Break-even reward rate",d_gapToBreakEven:"Headroom / overage vs current",good:"Reward policy is within break-even",bad:"Reward policy may be too generous",invalid:"Please review inputs",
      e_range:"Percentage inputs must be within 0 to 100.",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Interchange vs Reward Summary]"}
    };

    let lang="ko";
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString("en-US",{maximumFractionDigits:d});
    const t=(k)=>I18N[lang][k]||k;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["activeCards","spendPerCard","interchangeRate","rewardRate","redemptionRate","networkRate","fraudRate","annualFixedCost"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["gmv","interchange","rewardCost","monthlyContribution","marginBps","netAnnual"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["networkCost","fraudCost","breakEvenReward","gapToBreakEven"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      const rates=[v.interchangeRate,v.rewardRate,v.redemptionRate,v.networkRate,v.fraudRate];
      if(rates.some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("e_range");
      return "";
    }

    function render(){
      const v={activeCards:Number(refs.activeCards.value),spendPerCard:Number(refs.spendPerCard.value),interchangeRate:Number(refs.interchangeRate.value),rewardRate:Number(refs.rewardRate.value),redemptionRate:Number(refs.redemptionRate.value),networkRate:Number(refs.networkRate.value),fraudRate:Number(refs.fraudRate.value),annualFixedCost:Number(refs.annualFixedCost.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["gmv","interchange","rewardCost","monthlyContribution","marginBps","netAnnual","networkCost","fraudCost","breakEvenReward","gapToBreakEven"].forEach((k)=>refs[k].textContent="-");refs.status.textContent=t("invalid");refs.summary.value="";return;}

      const gmv=v.activeCards*v.spendPerCard;
      const interchange=gmv*(v.interchangeRate/100);
      const rewardCost=gmv*(v.rewardRate/100)*(v.redemptionRate/100);
      const networkCost=gmv*(v.networkRate/100);
      const fraudCost=gmv*(v.fraudRate/100);
      const monthlyContribution=interchange-rewardCost-networkCost-fraudCost;
      const marginBps=gmv>0?(monthlyContribution/gmv)*10000:0;
      const netAnnual=monthlyContribution*12-v.annualFixedCost;

      const breakEvenReward=(v.redemptionRate>0)?((v.interchangeRate-v.networkRate-v.fraudRate)/(v.redemptionRate/100)):NaN;
      const gap=Number.isFinite(breakEvenReward)?breakEvenReward-v.rewardRate:NaN;

      refs.gmv.textContent=won(gmv); refs.interchange.textContent=won(interchange); refs.rewardCost.textContent=won(rewardCost); refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.marginBps.textContent=`${num(marginBps,1)} bps`; refs.netAnnual.textContent=won(netAnnual);
      refs.networkCost.textContent=won(networkCost); refs.fraudCost.textContent=won(fraudCost);
      refs.breakEvenReward.textContent=Number.isFinite(breakEvenReward)?`${num(breakEvenReward,3)}%`:"N/A";
      refs.gapToBreakEven.textContent=Number.isFinite(gap)?`${gap>=0?"+":""}${num(gap,3)}%p`:"N/A";
      refs.status.innerHTML=gap>=0?`<span class="good">●</span> ${t("good")}`:`<span class="warn">●</span> ${t("bad")}`;

      refs.summary.value=[
        t("summaryTitle"),
        `${t("k_gmv")}: ${won(gmv)}`,
        `${t("k_interchange")}: ${won(interchange)}`,
        `${t("k_rewardCost")}: ${won(rewardCost)}`,
        `${t("k_monthlyContribution")}: ${won(monthlyContribution)}`,
        `${t("k_marginBps")}: ${num(marginBps,1)} bps`,
        `${t("k_netAnnual")}: ${won(netAnnual)}`,
        `${t("d_breakEvenReward")}: ${Number.isFinite(breakEvenReward)?`${num(breakEvenReward,3)}%`:"N/A"}`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.activeCards,refs.spendPerCard,refs.interchangeRate,refs.rewardRate,refs.redemptionRate,refs.networkRate,refs.fraudRate,refs.annualFixedCost].forEach((el)=>el.addEventListener("input",render));

    applyI18n();
    render();
  </script>
</body>
</html>
