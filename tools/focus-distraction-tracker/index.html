<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="집중 방해 트래커 - 카테고리: 생산성 · 집중 세션을 기록하고 방해 요인을 추적해 오늘의 몰입 점수를 확인하세요. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>집중 방해 트래커</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --text: #e9ecff;
      --muted: #9aa3c7;
      --neon: #00f5d4;
      --neon-2: #7c4dff;
      --danger: #ff4d8d;
      --ok: #4dff88;
      --border: rgba(124, 77, 255, 0.25);
      --shadow: 0 0 0 1px rgba(0, 245, 212, 0.15), 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: radial-gradient(1200px 600px at 80% -10%, rgba(124, 77, 255, 0.2), transparent 45%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 4.5vw, 2rem);
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 820px) {
      .grid {
        grid-template-columns: 1.2fr 0.8fr;
      }
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 45%), var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #d8deff;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    @media (min-width: 640px) {
      .row.two { grid-template-columns: 1fr 140px; }
      .row.three { grid-template-columns: repeat(3, 1fr); }
    }

    label {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 5px;
    }

    input, button, select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: #0f1030;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 11px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.2);
    }

    .btn {
      cursor: pointer;
      font-weight: 700;
      border: 1px solid transparent;
      transition: 0.18s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--neon), #35ff8f);
      color: #041214;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #1f214f, #2f3268);
      color: #e8ebff;
      border-color: rgba(124, 77, 255, 0.45);
    }

    .btn-danger {
      background: linear-gradient(135deg, #53203a, #7d274d);
      border-color: rgba(255, 77, 141, 0.55);
      color: #ffd8e7;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .timer {
      text-align: center;
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 800;
      margin: 8px 0 6px;
      color: var(--neon);
      text-shadow: 0 0 22px rgba(0, 245, 212, 0.4);
      font-variant-numeric: tabular-nums;
    }

    .task-now {
      text-align: center;
      color: var(--muted);
      margin-bottom: 10px;
      min-height: 1.2em;
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 8px 0;
    }

    @media (min-width: 640px) {
      .quick { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    .quick .chip {
      background: #1a1d45;
      border: 1px solid rgba(0, 245, 212, 0.35);
      color: #d8fff7;
      font-weight: 600;
      padding: 9px 6px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .stat {
      background: #111338;
      border: 1px solid rgba(124, 77, 255, 0.35);
      border-radius: 11px;
      padding: 10px 8px;
      text-align: center;
    }

    .stat .k {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
      margin-bottom: 3px;
    }

    .stat .v {
      font-size: 1.05rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .tag {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.74rem;
      border: 1px solid rgba(0, 245, 212, 0.45);
      color: #c7fff6;
      margin-right: 5px;
      margin-bottom: 6px;
      background: rgba(0, 245, 212, 0.1);
    }

    .list {
      margin-top: 8px;
      max-height: 360px;
      overflow: auto;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(5, 6, 18, 0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.87rem;
    }

    th, td {
      padding: 9px 8px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: #101332;
      z-index: 1;
      color: #dbe1ff;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 8px;
    }

    .footer {
      margin-top: 10px;
      color: #8f9ad0;
      font-size: 0.8rem;
    }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <h1>집중 방해 트래커</h1>
    <p class="sub">카테고리: 생산성 · 집중 세션을 기록하고 방해 요인을 추적해 오늘의 몰입 점수를 확인하세요.</p>

    <div class="grid">
      <section class="card">
        <h2>집중 세션</h2>
        <div class="row two">
          <div>
            <label for="taskInput">할 일 이름</label>
            <input id="taskInput" type="text" placeholder="예: 기획서 작성" maxlength="50" />
          </div>
          <div>
            <label for="goalInput">목표(분)</label>
            <input id="goalInput" type="number" min="5" max="240" step="5" value="25" />
          </div>
        </div>

        <div class="timer" id="timerDisplay">00:00</div>
        <div class="task-now" id="nowTask">세션 대기 중</div>

        <div class="row three">
          <button class="btn btn-primary" id="startBtn">세션 시작</button>
          <button class="btn btn-secondary" id="interruptBtn" disabled>방해 기록</button>
          <button class="btn btn-danger" id="endBtn" disabled>세션 종료</button>
        </div>

        <h2 style="margin-top:14px">방해 빠른 기록</h2>
        <div class="quick" id="quickButtons">
          <button class="chip btn" data-type="알림">알림</button>
          <button class="chip btn" data-type="메신저">메신저</button>
          <button class="chip btn" data-type="SNS">SNS</button>
          <button class="chip btn" data-type="전화">전화</button>
          <button class="chip btn" data-type="잡생각">잡생각</button>
          <button class="chip btn" data-type="주변소음">주변소음</button>
        </div>

        <div class="row two">
          <div>
            <label for="customInterrupt">직접 입력 (선택)</label>
            <input id="customInterrupt" type="text" placeholder="예: 급한 문의 응답" maxlength="40" />
          </div>
          <div style="align-self:end">
            <button class="btn btn-secondary" id="addCustomBtn">직접 기록 추가</button>
          </div>
        </div>

        <div id="interruptTags"></div>
      </section>

      <aside class="card">
        <h2>오늘 요약</h2>
        <div class="stats">
          <div class="stat"><span class="k">완료 세션</span><span class="v" id="statSessions">0회</span></div>
          <div class="stat"><span class="k">집중 시간</span><span class="v" id="statFocus">0분</span></div>
          <div class="stat"><span class="k">방해 횟수</span><span class="v" id="statInterrupt">0회</span></div>
        </div>

        <div class="stats" style="grid-template-columns:1fr; margin-top:8px;">
          <div class="stat" style="border-color:rgba(0,245,212,.4)">
            <span class="k">몰입 점수</span>
            <span class="v" id="statScore" style="color:var(--ok)">100점</span>
          </div>
        </div>

        <h2 style="margin-top:14px">세션 기록</h2>
        <div class="list">
          <table>
            <thead>
              <tr>
                <th>시작</th>
                <th>할 일</th>
                <th>집중</th>
                <th>방해</th>
              </tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
          <div class="empty" id="emptyMsg">아직 완료된 세션이 없습니다.</div>
        </div>

        <div class="row" style="margin-top:10px;">
          <button class="btn btn-secondary" id="downloadBtn">JSON 내보내기</button>
          <button class="btn btn-danger" id="clearBtn">전체 데이터 초기화</button>
        </div>

        <div class="footer">데이터는 브라우저 localStorage에 자동 저장됩니다.</div>
      </aside>
    </div>
  </div>

  <script>
    (function () {
      const KEY = 'focusDistractionTracker_v1';
      const $ = (id) => document.getElementById(id);

      const els = {
        taskInput: $('taskInput'),
        goalInput: $('goalInput'),
        timerDisplay: $('timerDisplay'),
        nowTask: $('nowTask'),
        startBtn: $('startBtn'),
        interruptBtn: $('interruptBtn'),
        endBtn: $('endBtn'),
        quickButtons: $('quickButtons'),
        customInterrupt: $('customInterrupt'),
        addCustomBtn: $('addCustomBtn'),
        interruptTags: $('interruptTags'),
        statSessions: $('statSessions'),
        statFocus: $('statFocus'),
        statInterrupt: $('statInterrupt'),
        statScore: $('statScore'),
        logBody: $('logBody'),
        emptyMsg: $('emptyMsg'),
        downloadBtn: $('downloadBtn'),
        clearBtn: $('clearBtn'),
      };

      let state = loadState();
      let tickTimer = null;

      function loadState() {
        try {
          const parsed = JSON.parse(localStorage.getItem(KEY) || '{}');
          return {
            sessions: Array.isArray(parsed.sessions) ? parsed.sessions : [],
            current: parsed.current && typeof parsed.current === 'object' ? parsed.current : null,
            prefs: parsed.prefs && typeof parsed.prefs === 'object' ? parsed.prefs : { goalMin: 25, lastTask: '' },
          };
        } catch {
          return { sessions: [], current: null, prefs: { goalMin: 25, lastTask: '' } };
        }
      }

      function saveState() {
        localStorage.setItem(KEY, JSON.stringify(state));
      }

      function pad(n) { return String(n).padStart(2, '0'); }

      function formatSec(sec) {
        const s = Math.max(0, Math.floor(sec));
        const mm = Math.floor(s / 60);
        const ss = s % 60;
        return `${pad(mm)}:${pad(ss)}`;
      }

      function formatDate(ts) {
        const d = new Date(ts);
        return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      function todayKey(ts) {
        const d = new Date(ts);
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      }

      function getCurrentElapsedSec() {
        if (!state.current) return 0;
        return (Date.now() - state.current.startedAt) / 1000;
      }

      function addInterrupt(type) {
        if (!state.current) {
          alert('먼저 세션을 시작해 주세요.');
          return;
        }
        const label = (type || '').trim();
        if (!label) return;
        state.current.interruptions.push({ type: label, at: Date.now() });
        saveState();
        renderCurrentInterruptTags();
        renderStats();
      }

      function startSession() {
        if (state.current) {
          alert('이미 진행 중인 세션이 있습니다.');
          return;
        }
        const task = els.taskInput.value.trim() || '이름 없는 작업';
        const goal = Number(els.goalInput.value) || 25;

        state.current = {
          task,
          goalMin: Math.min(240, Math.max(5, goal)),
          startedAt: Date.now(),
          interruptions: [],
        };

        state.prefs.goalMin = state.current.goalMin;
        state.prefs.lastTask = task;
        saveState();
        renderAll();
      }

      function endSession() {
        if (!state.current) return;

        const endedAt = Date.now();
        const durationMin = Math.max(1, Math.round((endedAt - state.current.startedAt) / 60000));
        const interruptionCount = state.current.interruptions.length;

        state.sessions.unshift({
          task: state.current.task,
          goalMin: state.current.goalMin,
          startedAt: state.current.startedAt,
          endedAt,
          durationMin,
          interruptions: state.current.interruptions,
          interruptionCount,
        });

        state.sessions = state.sessions.slice(0, 300);
        state.current = null;
        saveState();
        renderAll();
      }

      function renderCurrentInterruptTags() {
        els.interruptTags.innerHTML = '';
        if (!state.current || !state.current.interruptions.length) {
          els.interruptTags.innerHTML = '<span class="tag">방해 기록 없음</span>';
          return;
        }

        const map = {};
        state.current.interruptions.forEach((i) => {
          map[i.type] = (map[i.type] || 0) + 1;
        });

        Object.entries(map).forEach(([k, v]) => {
          const span = document.createElement('span');
          span.className = 'tag';
          span.textContent = `${k} ×${v}`;
          els.interruptTags.appendChild(span);
        });
      }

      function renderTimerAndButtons() {
        if (tickTimer) {
          clearInterval(tickTimer);
          tickTimer = null;
        }

        const running = !!state.current;
        els.startBtn.disabled = running;
        els.interruptBtn.disabled = !running;
        els.endBtn.disabled = !running;

        if (running) {
          els.nowTask.textContent = `진행 중: ${state.current.task} (목표 ${state.current.goalMin}분)`;
          const draw = () => {
            const sec = getCurrentElapsedSec();
            els.timerDisplay.textContent = formatSec(sec);

            const goalSec = state.current.goalMin * 60;
            if (sec >= goalSec) {
              els.timerDisplay.style.color = '#4dff88';
            } else {
              els.timerDisplay.style.color = 'var(--neon)';
            }
          };
          draw();
          tickTimer = setInterval(draw, 1000);
        } else {
          els.timerDisplay.textContent = '00:00';
          els.nowTask.textContent = '세션 대기 중';
        }
      }

      function renderStats() {
        const today = todayKey(Date.now());
        let sessions = 0;
        let focusMin = 0;
        let interruptions = 0;

        state.sessions.forEach((s) => {
          if (todayKey(s.startedAt) === today) {
            sessions += 1;
            focusMin += s.durationMin;
            interruptions += s.interruptionCount;
          }
        });

        if (state.current && todayKey(state.current.startedAt) === today) {
          focusMin += Math.floor(getCurrentElapsedSec() / 60);
          interruptions += state.current.interruptions.length;
        }

        const scoreRaw = focusMin * 2 - interruptions * 5 + sessions * 3;
        const score = Math.max(0, Math.min(100, Math.round(scoreRaw || 0)));

        els.statSessions.textContent = `${sessions}회`;
        els.statFocus.textContent = `${focusMin}분`;
        els.statInterrupt.textContent = `${interruptions}회`;
        els.statScore.textContent = `${score}점`;

        if (score >= 80) els.statScore.style.color = '#4dff88';
        else if (score >= 50) els.statScore.style.color = '#ffe66d';
        else els.statScore.style.color = '#ff7aa8';
      }

      function renderLogs() {
        els.logBody.innerHTML = '';

        if (!state.sessions.length) {
          els.emptyMsg.style.display = 'block';
          return;
        }

        els.emptyMsg.style.display = 'none';
        state.sessions.forEach((s) => {
          const tr = document.createElement('tr');
          const tags = Object.entries(
            s.interruptions.reduce((acc, cur) => {
              acc[cur.type] = (acc[cur.type] || 0) + 1;
              return acc;
            }, {})
          )
          .map(([k, v]) => `${k}×${v}`)
          .join(', ') || '-';

          tr.innerHTML = `
            <td>${formatDate(s.startedAt)}</td>
            <td>${escapeHtml(s.task)}</td>
            <td>${s.durationMin}분</td>
            <td>${escapeHtml(tags)}</td>
          `;
          els.logBody.appendChild(tr);
        });
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function exportJson() {
        const payload = {
          exportedAt: new Date().toISOString(),
          category: '생산성',
          sessions: state.sessions,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `focus-distraction-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      }

      function clearAll() {
        if (!confirm('모든 세션 데이터를 삭제할까요? 이 작업은 되돌릴 수 없습니다.')) return;
        state = { sessions: [], current: null, prefs: { goalMin: 25, lastTask: '' } };
        saveState();
        renderAll();
      }

      function bindEvents() {
        els.startBtn.addEventListener('click', startSession);
        els.endBtn.addEventListener('click', endSession);
        els.interruptBtn.addEventListener('click', () => addInterrupt('기타'));
        els.addCustomBtn.addEventListener('click', () => {
          const v = els.customInterrupt.value.trim();
          if (!v) return;
          addInterrupt(v);
          els.customInterrupt.value = '';
          els.customInterrupt.focus();
        });

        els.quickButtons.addEventListener('click', (e) => {
          const btn = e.target.closest('button[data-type]');
          if (!btn) return;
          addInterrupt(btn.dataset.type);
        });

        els.downloadBtn.addEventListener('click', exportJson);
        els.clearBtn.addEventListener('click', clearAll);

        els.taskInput.addEventListener('input', () => {
          state.prefs.lastTask = els.taskInput.value;
          saveState();
        });

        els.goalInput.addEventListener('change', () => {
          const v = Math.min(240, Math.max(5, Number(els.goalInput.value) || 25));
          els.goalInput.value = String(v);
          state.prefs.goalMin = v;
          saveState();
        });
      }

      function renderAll() {
        els.taskInput.value = state.prefs.lastTask || '';
        els.goalInput.value = String(state.prefs.goalMin || 25);
        renderTimerAndButtons();
        renderCurrentInterruptTags();
        renderStats();
        renderLogs();
      }

      bindEvents();
      renderAll();
    })();
  </script>
</body>
</html>
