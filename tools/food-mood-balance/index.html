        toastEl.classList.add('show');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => toastEl.classList.remove('show'), 1700);
      }

      function updateTopProgress() {
        if (state.phase === 'question') {
          topProgress.classList.add('show');
          const current = Math.min(QUESTIONS.length, state.current + 1);
          const ratio = (current / QUESTIONS.length) * 100;
          progressFill.style.width = `${Math.max(0, Math.min(100, ratio))}%`;
          progressText.textContent = `${current}/${QUESTIONS.length}`;
          return;
        }
        topProgress.classList.remove('show');
        progressFill.style.width = '0%';
        progressText.textContent = `0/${QUESTIONS.length}`;
      }

      function getAxisLabel(axis) {
        return pick(AXIS_LABEL[axis], axis);
      }

      function getSavedResult() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.type || !RESULTS[parsed.type]) return null;
          return parsed;
        } catch (_) {
          return null;
        }
      }

      function saveResult(payload) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        } catch (_) {}
      }

      function renderLangSwitch() {
        return `
          <div class="lang-wrap" aria-label="language switcher">
            <button class="lang-btn ${currentLang === 'ko' ? 'active' : ''}" type="button" data-lang="ko">KR</button>
            <button class="lang-btn ${currentLang === 'en' ? 'active' : ''}" type="button" data-lang="en">EN</button>
          </div>
        `;
      }

      function bindLangSwitch() {
        app.querySelectorAll('[data-lang]').forEach((el) => {
          el.addEventListener('click', () => {
            const next = el.getAttribute('data-lang') === 'ko' ? 'ko' : 'en';
            if (next === currentLang) return;
            currentLang = next;
            document.documentElement.lang = currentLang;
            rerenderByPhase();
          });
        });
      }

      function renderIntro() {
        const saved = getSavedResult();
        const savedView = saved ? `
          <div class="saved-note" id="savedResultNote">
            ${escapeHtml(T('savedPrefix'))}: <strong>${escapeHtml(pick(RESULTS[saved.type].name))}</strong>
            · ${escapeHtml(T('moodScore'))} ${Number(saved.moodBalanceIndex || 0)}
          </div>
        ` : '';

        app.innerHTML = `
          <div class="card-inner">
            <div class="top-row">
              <a class="ghost-link" href="/tools/" aria-label="tools">${escapeHtml(T('backToTools'))}</a>
              ${renderLangSwitch()}
            </div>
            <h1>🍽️ ${escapeHtml(T('pageTitle'))}</h1>
            <p class="subtitle">${escapeHtml(T('introDesc'))}</p>
            <div class="hero-badges">
              <span class="badge">${escapeHtml(T('badgesQ'))}</span>
              <span class="badge">${escapeHtml(T('badgesTime'))}</span>
              <span class="badge">${escapeHtml(T('badgesSave'))}</span>
            </div>
            <button id="startBtn" class="primary-btn" type="button">${escapeHtml(T('start'))}</button>
            ${savedView}
            <p class="notice">${escapeHtml(T('disclaimer'))}</p>
          </div>
        `;

        document.getElementById('startBtn').addEventListener('click', () => {
          triggerHaptic();
          startQuiz();
        });
        bindLangSwitch();
      }

      function renderQuestion() {
        const q = QUESTIONS[state.current];
        const qNum = state.current + 1;
        const optionsHtml = q.options.map((opt, idx) => {
          return `<button class="choice-btn" type="button" data-option="${idx}">${escapeHtml(pick(opt.text))}</button>`;
        }).join('');

        app.innerHTML = `
          <div class="card-inner">
            <div class="top-row" style="margin-bottom:10px;">
              <div style="font-weight:700; opacity:.9;">Q${qNum}</div>
              ${renderLangSwitch()}
            </div>
            <h2 class="question-title">Q${qNum}. ${escapeHtml(pick(q.q))}</h2>
            <p class="question-hint">${escapeHtml(T('pickOne'))}</p>
            <div class="choices">${optionsHtml}</div>
          </div>
        `;

        app.querySelectorAll('[data-option]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const idx = Number(btn.getAttribute('data-option'));
            answerQuestion(idx);
          });
        });
        bindLangSwitch();
      }

      function renderAnalyzing() {
        app.innerHTML = `
          <div class="card-inner analyzing-wrap">
            <div class="top-row" style="justify-content:flex-end; margin-bottom:0;">${renderLangSwitch()}</div>
            <div class="spinner" aria-hidden="true"></div>
            <h2 style="margin:0;">${escapeHtml(T('analyzingTitle'))}</h2>
            <p class="subtitle">${escapeHtml(T('analyzingDesc'))}</p>
            <div class="mini-track"><div class="mini-fill" id="miniFill"></div></div>
            <div class="mini-text" id="miniText">0%</div>
          </div>
        `;
        bindLangSwitch();

        const miniFill = document.getElementById('miniFill');
        const miniText = document.getElementById('miniText');
        let p = 0;

        clearInterval(state.progressTimer);
        state.progressTimer = setInterval(() => {
          p = Math.min(100, p + 10);
          miniFill.style.width = `${p}%`;
          miniText.textContent = `${p}%`;
          if (p >= 100) clearInterval(state.progressTimer);
        }, 130);

        clearTimeout(state.analyzingTimer);
        state.analyzingTimer = setTimeout(finalizeResult, 1350);
      }

      function renderResult(result) {
        const info = RESULTS[result.type];
        const chips = AXES.map((axis) => {
          return `<span class="chip">${escapeHtml(getAxisLabel(axis))} ${Number(result.normalized[axis] || 0)}</span>`;
        }).join('');
        const tips = (info.tips[currentLang] || info.tips.en || []).map((tip) => `<li>${escapeHtml(tip)}</li>`).join('');

        app.innerHTML = `
          <div class="card-inner">
            <div class="top-row" style="margin-bottom:10px;">${renderLangSwitch()}</div>
            <div class="result-head">
              <div>${info.emoji} ${escapeHtml(T('resultType'))}</div>
              <h2 class="result-type">${escapeHtml(pick(info.name))}</h2>
              <p class="result-summary">${escapeHtml(pick(info.summary))}</p>
              <p style="margin:8px 0 0; font-weight:700;">${escapeHtml(T('moodScore'))}: ${Number(result.moodBalanceIndex)} / 100</p>
            </div>

            <h3 class="section-title">${escapeHtml(T('detail'))}</h3>
            <p class="detail-text" id="resultDetail">${escapeHtml(pick(info.detail))}</p>

            <div class="chips">${chips}</div>

            <h3 class="section-title">${escapeHtml(T('tips'))}</h3>
            <ul class="tips-list">${tips}</ul>

            <h3 class="section-title">${escapeHtml(T('chart'))}</h3>
            <div class="chart-wrap">
              <canvas id="resultChart" width="640" height="280" aria-label="result chart"></canvas>
            </div>

            <h3 class="section-title">${escapeHtml(T('share'))}</h3>
            <div class="share-grid">
              <button id="shareKakao" class="share-btn" type="button">${escapeHtml(T('kakao'))}</button>
              <button id="shareTwitter" class="share-btn" type="button">${escapeHtml(T('twitter'))}</button>
              <button id="copyLink" class="share-btn" type="button">${escapeHtml(T('copy'))}</button>
            </div>

            <button id="retryBtn" class="secondary-btn" type="button">${escapeHtml(T('retry'))}</button>

            <div class="recommend">
              <strong>${escapeHtml(T('recTitle'))}</strong>
              <ul style="margin:8px 0 0; padding-left:18px;">
                <li><a href="/tools/stress-coping/">${currentLang === 'ko' ? '스트레스 대처 스타일 테스트' : 'Stress Coping Style Test'}</a></li>
                <li><a href="/tools/decision-style/">${currentLang === 'ko' ? '의사결정 스타일 검사' : 'Decision Style Test'}</a></li>
                <li><a href="/tools/eq-test/">${currentLang === 'ko' ? 'EQ 감정지능 테스트' : 'EQ Emotional Intelligence Test'}</a></li>
              </ul>
            </div>

            <p class="notice">${escapeHtml(T('noDiag'))}</p>
          </div>
        `;

        requestAnimationFrame(() => {
          drawBarChart(document.getElementById('resultChart'), result.normalized);
        });

        document.getElementById('shareKakao').addEventListener('click', () => shareResult('kakao', result));
        document.getElementById('shareTwitter').addEventListener('click', () => shareResult('twitter', result));
        document.getElementById('copyLink').addEventListener('click', () => copyResultLink(result));
        document.getElementById('retryBtn').addEventListener('click', resetQuiz);
        bindLangSwitch();
      }

      function drawBarChart(canvas, values) {
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const cssW = canvas.clientWidth || 640;
        const cssH = 280;
        canvas.width = Math.floor(cssW * dpr);
        canvas.height = Math.floor(cssH * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const w = cssW;
        const h = cssH;
        ctx.clearRect(0, 0, w, h);

        const labels = AXES.map((a) => getAxisLabel(a));
        const vals = AXES.map((a) => Number(values[a] || 0));

        const left = 24;
        const right = w - 24;
        const top = 20;
        const bottom = h - 44;
        const chartW = right - left;
        const chartH = bottom - top;

        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
          const y = top + (chartH / 4) * i;
          ctx.beginPath();
          ctx.moveTo(left, y);
          ctx.lineTo(right, y);
          ctx.stroke();
        }

        const barGap = 16;
        const barW = (chartW - barGap * (vals.length - 1)) / vals.length;

        vals.forEach((v, i) => {
          const x = left + i * (barW + barGap);
          const bh = chartH * (Math.max(0, Math.min(100, v)) / 100);
          const y = bottom - bh;

          const grad = ctx.createLinearGradient(0, y, 0, bottom);
          grad.addColorStop(0, '#ffe39f');
          grad.addColorStop(1, '#8ce9ff');
          ctx.fillStyle = grad;
          roundRect(ctx, x, y, barW, bh, 10);
          ctx.fill();

          ctx.fillStyle = 'rgba(255,255,255,0.96)';
          ctx.font = '700 12px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(`${v}`, x + barW / 2, y - 6);

          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.font = '600 12px sans-serif';
          const label = labels[i].length > 9 ? `${labels[i].slice(0, 9)}…` : labels[i];
          ctx.fillText(label, x + barW / 2, h - 18);
        });
      }

      function roundRect(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function startQuiz() {
        clearTimers();
        state.phase = 'question';
        state.current = 0;
        state.answers = [];
        state.scores = createZeroScores();
        state.lastResult = null;
        updateTopProgress();
        renderQuestion();
      }

      function answerQuestion(optionIndex) {
        const q = QUESTIONS[state.current];
        const option = q.options[optionIndex];
        if (!option) return;

        const weight = Number(q.weight || 1);
        AXES.forEach((axis) => {
          state.scores[axis] += Number(option.scores?.[axis] || 0) * weight;
        });

        state.answers.push({ q: state.current, option: optionIndex, weight });
        triggerHaptic();

        state.current += 1;
        if (state.current >= QUESTIONS.length) {
          state.phase = 'analyzing';
          updateTopProgress();
          renderAnalyzing();
          return;
        }

        updateTopProgress();
        renderQuestion();
      }

      function computeNormalized() {
        const maxPerAxis = createZeroScores();
        QUESTIONS.forEach((q) => {
          const w = Number(q.weight || 1);
          AXES.forEach((axis) => {
            maxPerAxis[axis] += 4 * w;
          });
        });

        const normalized = createZeroScores();
        AXES.forEach((axis) => {
          const raw = Number(state.scores[axis] || 0);
          const max = Number(maxPerAxis[axis] || 1);
          normalized[axis] = Math.round((raw / max) * 100);
        });
        return normalized;
      }

      function decideType(normalized) {
        const sorted = [...AXES].sort((a, b) => normalized[b] - normalized[a]);
        if (normalized[sorted[0]] !== normalized[sorted[1]]) {
          return RESULT_BY_AXIS[sorted[0]];
        }

        if (normalized.balanceControl >= normalized.comfortWarmth) {
          return RESULT_BY_AXIS.balanceControl;
        }
        return RESULT_BY_AXIS.comfortWarmth;
      }

      function finalizeResult() {
        const normalized = computeNormalized();
        const type = decideType(normalized);
        const moodBalanceIndex = Math.round(
          normalized.comfortWarmth * 0.26 +
          normalized.noveltyDrive * 0.22 +
          normalized.balanceControl * 0.30 +
          normalized.socialFlavor * 0.22
        );

        const result = {
          type,
          normalized,
          moodBalanceIndex,
          savedAt: new Date().toISOString(),
          lang: currentLang
        };

        saveResult(result);
        state.lastResult = result;
        state.phase = 'result';
        updateTopProgress();
        renderResult(result);
      }

      function getShareText(result) {
        const info = RESULTS[result.type];
        if (currentLang === 'ko') {
          return `나의 푸드 무드 유형은 ${pick(info.name)} (${result.moodBalanceIndex}점)! 당신도 테스트해보세요.`;
        }
        return `My Food Mood type is ${pick(info.name)} (${result.moodBalanceIndex})! Try this test too.`;
      }

      function openShare(url) {
        try {
          window.open(url, '_blank', 'noopener,noreferrer');
          return true;
        } catch (_) {
          return false;
        }
      }

      function shareResult(channel, result) {
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent(getShareText(result));

        if (channel === 'kakao') {
          openShare(`https://story.kakao.com/share?url=${url}`);
          showToast(T('openKakao'));
          return;
        }

        if (channel === 'twitter') {
          openShare(`https://twitter.com/intent/tweet?text=${text}&url=${url}`);
          showToast(T('openTwitter'));
        }
      }

      async function copyResultLink(result) {
        const text = `${getShareText(result)} ${window.location.href}`;
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            fallbackCopy(text);
          }
          showToast(T('copied'));
        } catch (_) {
          try {
            fallbackCopy(text);
            showToast(T('copied'));
          } catch (__){
            showToast(T('copyFail'));
          }
        }
      }

      function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }

      function clearTimers() {
        clearTimeout(state.analyzingTimer);
        clearInterval(state.progressTimer);
      }

      function resetQuiz() {
        clearTimers();
        state.phase = 'intro';
        state.current = 0;
        state.answers = [];
        state.scores = createZeroScores();
        state.lastResult = null;
        updateTopProgress();
        renderIntro();
      }

      function rerenderByPhase() {
        if (state.phase === 'intro') return renderIntro();
        if (state.phase === 'question') return renderQuestion();
        if (state.phase === 'analyzing') return renderAnalyzing();
        if (state.phase === 'result' && state.lastResult) return renderResult(state.lastResult);
        return renderIntro();
      }

      function initTelegram() {
        try {
          if (window.TG && typeof window.TG.init === 'function') {
            window.TG.init();
          } else {
            window.Telegram?.WebApp?.ready?.();
            window.Telegram?.WebApp?.expand?.();
          }
        } catch (_) {}
      }

      function init() {
        initTelegram();
        updateTopProgress();
        renderIntro();
      }

      init();
    })();
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
