<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraud Prevention ROI Calculator | 사기 방지 ROI 계산기</title>
  <meta name="description" content="사기 주문 차단으로 절감되는 손실과 오탐 손실, 운영비를 함께 반영해 월/기간 ROI와 회수기간을 계산합니다." />
  <meta name="keywords" content="fraud prevention roi, chargeback savings, ecommerce risk, profit calculator" />
  <link rel="canonical" href="https://eastsea.monster/tools/fraud-prevention-roi-calculator/" />
  <style>
    :root {
      --bg: #0b1220;
      --card: #131d33;
      --line: #2a3a5f;
      --text: #e8eefc;
      --muted: #9eb0d6;
      --brand: #60a5fa;
      --brand-2: #2563eb;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 12% 0%, #17325f 0%, var(--bg) 58%);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 14px 56px;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.7vw, 1.8rem);
      letter-spacing: -0.01em;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
      max-width: 70ch;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .link {
      border: 1px solid var(--line);
      background: #182947;
      color: #dbeafe;
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 0.88rem;
      text-decoration: none;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.03fr 0.97fr;
      gap: 12px;
    }
    .card {
      background: linear-gradient(165deg, #17294a, #101b31 62%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      min-width: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 5px;
    }
    input, button, textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1b33;
      color: var(--text);
      font-size: 0.93rem;
      padding: 10px;
    }
    .btns {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      cursor: pointer;
      border: none;
      font-weight: 700;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #eff6ff;
    }
    .soft {
      background: #1c3459;
      border: 1px solid var(--line);
    }
    textarea {
      min-height: 120px;
      margin-top: 10px;
      resize: vertical;
    }
    .error {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid #6d2f39;
      color: #fecaca;
      font-size: 0.85rem;
      display: none;
    }
    .error.show { display: block; }

    .kpis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .kpi {
      border: 1px solid var(--line);
      background: #0d1b36;
      border-radius: 11px;
      padding: 10px;
    }
    .k { font-size: 0.76rem; color: var(--muted); margin-bottom: 4px; }
    .v { font-size: 1.08rem; font-weight: 800; }

    .pill {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      margin-top: 10px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #163260;
      color: #c4d8fb;
      font-size: 0.75rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.88rem;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: right;
    }
    th:first-child, td:first-child { text-align: left; }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .inputs { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: 1fr 1fr; }
    }
  </style>
  <!-- Analytics: GA4 + Clarity -->
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🛡️ 사기 방지 ROI 계산기</h1>
        <div class="sub">사기 주문 차단으로 절감되는 손실과 오탐 손실, 운영비를 함께 반영해 ROI와 회수기간을 계산합니다.</div>
      </div>
      <div class="actions">
        <a class="link" href="/">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="orders">월 주문 수 (건)</label><input id="orders" type="number" min="1" value="12000" /></div>
          <div><label for="aov">평균 주문 금액 (KRW)</label><input id="aov" type="number" min="1" value="58000" /></div>
          <div><label for="fraudRate">사기 주문 비율 (%)</label><input id="fraudRate" type="number" min="0" max="100" step="0.1" value="1.2" /></div>
          <div><label for="chargebackFee">차지백 수수료 (KRW/건)</label><input id="chargebackFee" type="number" min="0" value="25000" /></div>
          <div><label for="blockRate">탐지/차단 성공률 (%)</label><input id="blockRate" type="number" min="0" max="100" step="0.1" value="60" /></div>
          <div><label for="falsePositiveRate">정상 주문 오탐율 (%)</label><input id="falsePositiveRate" type="number" min="0" max="100" step="0.1" value="0.4" /></div>
          <div><label for="grossMargin">주문당 기여이익률 (%)</label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="45" /></div>
          <div><label for="monthlyCost">월 운영비 (KRW)</label><input id="monthlyCost" type="number" min="0" value="3000000" /></div>
          <div><label for="setupCost">도입 비용 (KRW)</label><input id="setupCost" type="number" min="0" value="8000000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" value="12" /></div>
        </div>
        <div class="btns">
          <button id="copyBtn" type="button" class="soft">요약 복사</button>
          <button id="resetBtn" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 사기 손실(기준)</div><div id="baselineLoss" class="v">-</div></div>
          <div class="kpi"><div class="k">월 차단 방어액</div><div id="preventedLoss" class="v">-</div></div>
          <div class="kpi"><div class="k">월 오탐 손실</div><div id="falsePosLoss" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v">-</div></div>
          <div class="kpi"><div class="k">손익분기 차단율</div><div id="breakEven" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>차단 후 잔여 사기 손실</th><td id="remainingLoss">-</td></tr>
            <tr><th>사기 주문 수</th><td id="fraudOrders">-</td></tr>
            <tr><th>차단 주문 수</th><td id="preventedOrders">-</td></tr>
            <tr><th>오탐 주문 수</th><td id="falsePosOrders">-</td></tr>
            <tr><th>총 운영비(기간)</th><td id="totalCost">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
