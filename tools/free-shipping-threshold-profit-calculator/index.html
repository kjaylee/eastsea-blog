<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Shipping Threshold Profit Calculator | 무료배송 임계값 손익 계산기</title>
  <meta name="description" content="무료배송 기준 변경 시 주문수·AOV·배송비 구조를 반영해 월 순효과, ROI, 회수기간, 손익분기 AOV 상승률을 계산합니다." />
  <style>
    :root{--bg:#071428;--card:#112747;--line:#2f5488;--txt:#edf4ff;--muted:#b3c7e5;--pri:#70b1ff;--soft:#173763;--err:#fecaca;--errBg:rgba(248,113,113,.15);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#21518b 0%,#071428 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.12rem,2.8vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2448;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#173764,#112747);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b36;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5e88f4);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:108px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7c3140;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1e3a;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.06rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.98rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163864;color:#d4e4ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🚚 무료배송 임계값 손익 계산기</h1>
        <div class="sub">무료배송 기준 조정 시 주문수/객단가/배송비 구조 변화를 반영해 실제 손익 개선 여부를 빠르게 검증합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="orders">월 주문 수 (건)</label><input id="orders" type="number" min="1" value="18000" /></div>
          <div><label for="aov">현재 객단가 AOV (KRW)</label><input id="aov" type="number" min="1000" value="58000" /></div>
          <div><label for="currentEligible">현재 무료배송 해당 비율 (%)</label><input id="currentEligible" type="number" min="0" max="100" step="0.1" value="62" /></div>
          <div><label for="targetEligible">변경 후 무료배송 해당 비율 (%)</label><input id="targetEligible" type="number" min="0" max="100" step="0.1" value="49" /></div>
          <div><label for="conversionImpact">주문 전환율 영향 (%)</label><input id="conversionImpact" type="number" min="-80" max="80" step="0.1" value="-2.5" /></div>
          <div><label for="aovLift">AOV 상승률 가정 (%)</label><input id="aovLift" type="number" min="-50" max="200" step="0.1" value="6" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="1" max="100" step="0.1" value="44" /></div>
          <div><label for="shippingFee">비무료배송 주문의 고객 배송비 (KRW)</label><input id="shippingFee" type="number" min="0" value="3000" /></div>
          <div><label for="shippingCost">주문당 실제 배송 원가 (KRW)</label><input id="shippingCost" type="number" min="0" value="3800" /></div>
          <div><label for="monthlyCost">월 운영/캠페인 비용 (KRW)</label><input id="monthlyCost" type="number" min="0" value="1200000" /></div>
          <div><label for="setupCost">일회성 세팅 비용 (KRW)</label><input id="setupCost" type="number" min="0" value="7500000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">기준안 월 공헌이익</div><div id="baselineContribution" class="v">-</div></div>
          <div class="kpi"><div class="k">변경안 월 공헌이익</div><div id="scenarioContribution" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">분석기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>기준안 월 주문 수</th><td id="baselineOrders">-</td></tr>
            <tr><th>변경안 월 주문 수</th><td id="scenarioOrders">-</td></tr>
            <tr><th>변경안 AOV</th><td id="scenarioAov">-</td></tr>
            <tr><th>기준안 월 배송비 순효과</th><td id="baselineShippingNet">-</td></tr>
            <tr><th>변경안 월 배송비 순효과</th><td id="scenarioShippingNet">-</td></tr>
            <tr><th>손익분기 필요 AOV 상승률</th><td id="breakEvenAovLift">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      orders:$("orders"), aov:$("aov"), currentEligible:$("currentEligible"), targetEligible:$("targetEligible"), conversionImpact:$("conversionImpact"), aovLift:$("aovLift"),
      margin:$("margin"), shippingFee:$("shippingFee"), shippingCost:$("shippingCost"), monthlyCost:$("monthlyCost"), setupCost:$("setupCost"), months:$("months"),
      baselineContribution:$("baselineContribution"), scenarioContribution:$("scenarioContribution"), monthlyNet:$("monthlyNet"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      baselineOrders:$("baselineOrders"), scenarioOrders:$("scenarioOrders"), scenarioAov:$("scenarioAov"), baselineShippingNet:$("baselineShippingNet"), scenarioShippingNet:$("scenarioShippingNet"), breakEvenAovLift:$("breakEvenAovLift"),
      error:$("error"), status:$("status"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = {
      orders:18000, aov:58000, currentEligible:62, targetEligible:49, conversionImpact:-2.5, aovLift:6,
      margin:44, shippingFee:3000, shippingCost:3800, monthlyCost:1200000, setupCost:7500000, months:12
    };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.orders) || v.orders < 1) return "월 주문 수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.aov) || v.aov <= 0) return "AOV는 0보다 커야 합니다.";
      if (!Number.isFinite(v.currentEligible) || v.currentEligible < 0 || v.currentEligible > 100) return "현재 무료배송 비율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.targetEligible) || v.targetEligible < 0 || v.targetEligible > 100) return "변경 후 무료배송 비율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.conversionImpact) || v.conversionImpact < -80 || v.conversionImpact > 80) return "전환율 영향은 -80%~80% 범위여야 합니다.";
      if (!Number.isFinite(v.aovLift) || v.aovLift < -50 || v.aovLift > 200) return "AOV 상승률 가정은 -50%~200% 범위여야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return "매출총이익률은 0 초과 100 이하 범위여야 합니다.";
      if (!Number.isFinite(v.shippingFee) || v.shippingFee < 0) return "고객 배송비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.shippingCost) || v.shippingCost < 0) return "배송 원가는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.monthlyCost) || v.monthlyCost < 0) return "월 운영비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "세팅비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return "분석 기간은 1~60개월 범위여야 합니다.";
      return "";
    }

    function compute(v){
      const marginRate = v.margin / 100;
      const currentShare = v.currentEligible / 100;
      const targetShare = v.targetEligible / 100;
      const conversionRate = 1 + (v.conversionImpact / 100);
      const scenarioAov = v.aov * (1 + v.aovLift / 100);

      const baselineOrders = v.orders;
      const scenarioOrders = v.orders * conversionRate;

      const baselineRevenue = baselineOrders * v.aov;
      const scenarioRevenue = scenarioOrders * scenarioAov;

      const baselineGross = baselineRevenue * marginRate;
      const scenarioGross = scenarioRevenue * marginRate;

      const baselineShippingSubsidy = baselineOrders * currentShare * v.shippingCost;
      const baselineShippingCollected = baselineOrders * (1 - currentShare) * v.shippingFee;
      const baselineShippingNet = baselineShippingCollected - baselineShippingSubsidy;

      const scenarioShippingSubsidy = scenarioOrders * targetShare * v.shippingCost;
      const scenarioShippingCollected = scenarioOrders * (1 - targetShare) * v.shippingFee;
      const scenarioShippingNet = scenarioShippingCollected - scenarioShippingSubsidy;

      const baselineContribution = baselineGross + baselineShippingNet;
      const scenarioContribution = scenarioGross + scenarioShippingNet;

      const monthlyNet = scenarioContribution - baselineContribution - v.monthlyCost;
      const periodNet = (monthlyNet * v.months) - v.setupCost;

      const investment = (v.monthlyCost * v.months) + v.setupCost;
      const roi = investment === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / investment) * 100;
      const payback = monthlyNet > 0 ? (v.setupCost / monthlyNet) : Infinity;

      const denom = scenarioOrders * marginRate;
      let breakEvenAovLift = Infinity;
      if (denom > 0) {
        const requiredGross = baselineContribution + v.monthlyCost - scenarioShippingNet;
        const requiredAov = requiredGross / denom;
        breakEvenAovLift = ((requiredAov / v.aov) - 1) * 100;
      }

      return {
        baselineOrders, scenarioOrders, scenarioAov,
        baselineShippingNet, scenarioShippingNet,
        baselineContribution, scenarioContribution,
        monthlyNet, periodNet, roi, payback, breakEvenAovLift
      };
    }

    function resetOutputs(){
      ["baselineContribution","scenarioContribution","monthlyNet","periodNet","roi","payback","baselineOrders","scenarioOrders","scenarioAov","baselineShippingNet","scenarioShippingNet","breakEvenAovLift"].forEach((k)=>refs[k].textContent='-');
      refs.summary.value = "";
    }

    function render(){
      const v = {
        orders:Number(refs.orders.value), aov:Number(refs.aov.value), currentEligible:Number(refs.currentEligible.value), targetEligible:Number(refs.targetEligible.value),
        conversionImpact:Number(refs.conversionImpact.value), aovLift:Number(refs.aovLift.value), margin:Number(refs.margin.value), shippingFee:Number(refs.shippingFee.value),
        shippingCost:Number(refs.shippingCost.value), monthlyCost:Number(refs.monthlyCost.value), setupCost:Number(refs.setupCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.baselineContribution.textContent = money(r.baselineContribution);
      refs.scenarioContribution.textContent = money(r.scenarioContribution);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞');
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가';

      refs.baselineOrders.textContent = `${num(r.baselineOrders,0)}건`;
      refs.scenarioOrders.textContent = `${num(r.scenarioOrders,0)}건`;
      refs.scenarioAov.textContent = money(r.scenarioAov);
      refs.baselineShippingNet.textContent = money(r.baselineShippingNet);
      refs.scenarioShippingNet.textContent = money(r.scenarioShippingNet);

      if (!Number.isFinite(r.breakEvenAovLift)) {
        refs.breakEvenAovLift.textContent = '달성 불가';
      } else if (r.breakEvenAovLift <= 0) {
        refs.breakEvenAovLift.textContent = `0% 이하 (이미 손익분기)`;
      } else {
        refs.breakEvenAovLift.textContent = `${num(r.breakEvenAovLift,2)}%`;
      }

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> 월 ${money(r.monthlyNet)} 순효과 개선`
        : `<span class="warn">●</span> 월 ${money(Math.abs(r.monthlyNet))} 순효과 감소`;

      const beText = !Number.isFinite(r.breakEvenAovLift)
        ? '달성 불가'
        : (r.breakEvenAovLift <= 0 ? '0% 이하 (이미 손익분기)' : `${num(r.breakEvenAovLift,2)}%`);

      refs.summary.value = [
        "[무료배송 임계값 손익 요약]",
        `기준안 월 공헌이익: ${money(r.baselineContribution)}`,
        `변경안 월 공헌이익: ${money(r.scenarioContribution)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `${v.months}개월 순효과(세팅비 반영): ${money(r.periodNet)}`,
        `ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞')}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가'}`,
        `손익분기 필요 AOV 상승률: ${beText}`,
        `변경안 월 주문 수: ${num(r.scenarioOrders,0)}건, 변경안 AOV: ${money(r.scenarioAov)}`
      ].join("\n");
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });

    [refs.orders,refs.aov,refs.currentEligible,refs.targetEligible,refs.conversionImpact,refs.aovLift,refs.margin,refs.shippingFee,refs.shippingCost,refs.monthlyCost,refs.setupCost,refs.months].forEach((el)=>{
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
