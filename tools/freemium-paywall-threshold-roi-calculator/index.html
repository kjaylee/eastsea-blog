<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freemium Paywall Threshold ROI Calculator | 프리미엄 페이월 임계점 ROI 계산기</title>
  <meta name="description" content="페이월 노출 임계점 조정으로 유료 전환 모수를 확대한 경우의 월 순이익, ROI, 회수기간, 손익분기 노출률을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🧱 프리미엄 페이월 임계점 ROI 계산기</h1>
        <div class="sub" id="subtitle">페이월 노출률 상향 시 유료 전환 모수 확대로 발생하는 월 순이익과 회수기간을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_users" for="users"></label><input id="users" type="number" min="1" value="420000"></div>
          <div><label id="l_currentExposure" for="currentExposure"></label><input id="currentExposure" type="number" min="0" max="100" step="0.1" value="18"></div>
          <div><label id="l_targetExposure" for="targetExposure"></label><input id="targetExposure" type="number" min="0" max="100" step="0.1" value="26"></div>
          <div><label id="l_conversion" for="conversion"></label><input id="conversion" type="number" min="0" max="100" step="0.1" value="7.2"></div>
          <div><label id="l_arppu" for="arppu"></label><input id="arppu" type="number" min="0" step="100" value="12000"></div>
          <div><label id="l_margin" for="margin"></label><input id="margin" type="number" min="0" max="100" step="0.1" value="82"></div>
          <div><label id="l_fee" for="fee"></label><input id="fee" type="number" min="0" max="100" step="0.1" value="6"></div>
          <div><label id="l_supportCost" for="supportCost"></label><input id="supportCost" type="number" min="0" step="100" value="1200"></div>
          <div><label id="l_fixedCost" for="fixedCost"></label><input id="fixedCost" type="number" min="0" step="10000" value="7500000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="12000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_newPaid"></div><div class="v" id="newPaid">-</div></div>
          <div class="kpi"><div class="k" id="k_perPaidNet"></div><div class="v" id="perPaidNet">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_exposureDelta"></div><div class="v" id="exposureDelta">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_breakEvenExposure"></th><td id="breakEvenExposure">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_monthlyContribution"></th><td id="monthlyContribution">-</td></tr>
          <tr><th id="d_totalProgramCost"></th><td id="totalProgramCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={users:$("users"),currentExposure:$("currentExposure"),targetExposure:$("targetExposure"),conversion:$("conversion"),arppu:$("arppu"),margin:$("margin"),fee:$("fee"),supportCost:$("supportCost"),fixedCost:$("fixedCost"),setup:$("setup"),months:$("months"),newPaid:$("newPaid"),perPaidNet:$("perPaidNet"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),exposureDelta:$("exposureDelta"),breakEvenExposure:$("breakEvenExposure"),payback:$("payback"),monthlyContribution:$("monthlyContribution"),totalProgramCost:$("totalProgramCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={users:420000,currentExposure:18,targetExposure:26,conversion:7.2,arppu:12000,margin:82,fee:6,supportCost:1200,fixedCost:7500000,setup:12000000,months:12};
    const I18N={
      ko:{title:"🧱 프리미엄 페이월 임계점 ROI 계산기",subtitle:"페이월 노출률 상향 시 유료 전환 모수 확대로 발생하는 월 순이익과 회수기간을 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_users:"월 활성 무료 사용자 수",l_currentExposure:"현재 페이월 노출률 (%)",l_targetExposure:"목표 페이월 노출률 (%)",l_conversion:"노출 대비 유료 전환율 (%)",l_arppu:"유료 플랜 월 ARPPU (₩)",l_margin:"매출총이익률 (%)",l_fee:"결제/플랫폼 수수료율 (%)",l_supportCost:"신규 유료 사용자당 지원 비용 (₩)",l_fixedCost:"월 고정 운영비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_newPaid:"순증 유료 사용자",k_perPaidNet:"유료 1인당 월 순기여",k_monthlyNet:"월 순증 순이익",k_roi:"ROI",k_periodNet:"기간 순효과",k_exposureDelta:"노출률 증가폭",d_breakEvenExposure:"손익분기 목표 노출률",d_payback:"회수기간",d_monthlyContribution:"월 순증 총기여액",d_totalProgramCost:"기간 총 프로그램비",ok:"페이월 임계점 수익성 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 사용자 수/기간은 1 이상이어야 합니다.",logicErr:"목표 노출률은 현재 노출률 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[프리미엄 페이월 임계점 ROI 요약]",unitMonths:"개월"},
      en:{title:"🧱 Freemium Paywall Threshold ROI Calculator",subtitle:"Estimate monthly profit, payback, and ROI from increasing paywall exposure threshold coverage.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_users:"Monthly active free users",l_currentExposure:"Current paywall exposure rate (%)",l_targetExposure:"Target paywall exposure rate (%)",l_conversion:"Exposure-to-paid conversion rate (%)",l_arppu:"Paid plan monthly ARPPU (KRW)",l_margin:"Gross margin (%)",l_fee:"Payment/platform fee rate (%)",l_supportCost:"Support cost per new paid user (KRW)",l_fixedCost:"Monthly fixed operating cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_newPaid:"Net new paid users",k_perPaidNet:"Monthly net contribution per paid user",k_monthlyNet:"Monthly net profit",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_exposureDelta:"Exposure rate delta",d_breakEvenExposure:"Break-even target exposure",d_payback:"Payback period",d_monthlyContribution:"Monthly total contribution uplift",d_totalProgramCost:"Total program cost (period)",ok:"Paywall threshold economics ready",warn:"Monthly net profit is negative with current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and users/months must be >= 1.",logicErr:"Target exposure rate must be greater than or equal to current exposure rate.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Freemium Paywall Threshold ROI Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["users","currentExposure","targetExposure","conversion","arppu","margin","fee","supportCost","fixedCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["newPaid","perPaidNet","monthlyNet","roi","periodNet","exposureDelta"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenExposure","payback","monthlyContribution","totalProgramCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.users)||v.users<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.arppu,v.supportCost,v.fixedCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.currentExposure,v.targetExposure,v.conversion,v.margin,v.fee].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetExposure<v.currentExposure) return t("logicErr");
      return "";
    }

    function render(){
      const v={users:Number(refs.users.value),currentExposure:Number(refs.currentExposure.value),targetExposure:Number(refs.targetExposure.value),conversion:Number(refs.conversion.value),arppu:Number(refs.arppu.value),margin:Number(refs.margin.value),fee:Number(refs.fee.value),supportCost:Number(refs.supportCost.value),fixedCost:Number(refs.fixedCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["newPaid","perPaidNet","monthlyNet","roi","periodNet","exposureDelta","breakEvenExposure","payback","monthlyContribution","totalProgramCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const currentPaid=v.users*(v.currentExposure/100)*(v.conversion/100);
      const targetPaid=v.users*(v.targetExposure/100)*(v.conversion/100);
      const newPaid=Math.max(0,targetPaid-currentPaid);
      const perPaidNet=(v.arppu*(v.margin/100))-(v.arppu*(v.fee/100))-v.supportCost;
      const monthlyContribution=newPaid*perPaidNet;
      const monthlyNet=monthlyContribution-v.fixedCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.fixedCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const exposureDelta=v.targetExposure-v.currentExposure;

      const requiredPaid=perPaidNet>0?(v.fixedCost/perPaidNet):Infinity;
      const breakEvenExposure=Number.isFinite(requiredPaid)&&v.users>0&&v.conversion>0?v.currentExposure+((requiredPaid/(v.users*(v.conversion/100)))*100):Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.newPaid.textContent=num(newPaid,0);
      refs.perPaidNet.textContent=won(perPaidNet);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.exposureDelta.textContent=pct(exposureDelta,1);
      refs.breakEvenExposure.textContent=(Number.isFinite(breakEvenExposure)&&breakEvenExposure<=100)?pct(breakEvenExposure,2):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.totalProgramCost.textContent=won(totalProgramCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_newPaid")}: ${num(newPaid,0)}`,`${t("k_perPaidNet")}: ${won(perPaidNet)}`,`${t("d_monthlyContribution")}: ${won(monthlyContribution)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenExposure")}: ${(Number.isFinite(breakEvenExposure)&&breakEvenExposure<=100)?pct(breakEvenExposure,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.users,refs.currentExposure,refs.targetExposure,refs.conversion,refs.arppu,refs.margin,refs.fee,refs.supportCost,refs.fixedCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
