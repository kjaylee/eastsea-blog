<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freemium to Paid Conversion Revenue Calculator | 프리미엄 전환 수익 계산기</title>
  <meta name="description" content="무료 사용자 기반의 유료 전환율 개선이 추가 매출, 월 순효과, 회수기간, ROI에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#071428;--card:#10213d;--line:#284a7f;--txt:#eaf2ff;--muted:#afc4e4;--pri:#67a7ff;--soft:#16325b;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.15)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#224a82 0%,#071428 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.8vw,1.76rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#183561,#10213d);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#4f83f1);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errbg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.97rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#173561;color:#d8e8ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">💳 프리미엄 전환 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">무료 사용자 기반에서 유료 전환율 개선 시 추가 매출·순이익·회수기간을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="activeUsers" data-i18n="activeUsers">월 활성 사용자 수 (명)</label><input id="activeUsers" type="number" min="1" value="180000" /></div>
          <div><label for="baseRate" data-i18n="baseRate">현재 유료 전환율 (%)</label><input id="baseRate" type="number" min="0" max="100" step="0.01" value="2.8" /></div>
          <div><label for="targetRate" data-i18n="targetRate">목표 유료 전환율 (%)</label><input id="targetRate" type="number" min="0" max="100" step="0.01" value="3.5" /></div>
          <div><label for="arpu" data-i18n="arpu">유료 사용자 월 ARPU (KRW)</label><input id="arpu" type="number" min="1" value="19000" /></div>
          <div><label for="margin" data-i18n="margin">공헌마진율 (%)</label><input id="margin" type="number" min="1" max="100" step="0.1" value="74" /></div>
          <div><label for="svcCost" data-i18n="svcCost">유료 1인당 월 추가 서비스비 (KRW)</label><input id="svcCost" type="number" min="0" value="1300" /></div>
          <div><label for="monthlyCost" data-i18n="monthlyCost">월 운영/실험비 (KRW)</label><input id="monthlyCost" type="number" min="0" value="4200000" /></div>
          <div><label for="setupCost" data-i18n="setupCost">초기 도입비 (KRW)</label><input id="setupCost" type="number" min="0" value="18000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="48" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_incPaid">추가 유료 사용자 (월)</div><div id="incPaid" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_incRevenue">추가 매출 (월)</div><div id="incRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_termNet">분석기간 순효과</div><div id="termNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_basePaid">현재 유료 사용자</th><td id="basePaid">-</td></tr>
            <tr><th data-i18n="d_targetPaid">목표 유료 사용자</th><td id="targetPaid">-</td></tr>
            <tr><th data-i18n="d_contrib">추가 공헌이익 (월)</th><td id="incrementalContribution">-</td></tr>
            <tr><th data-i18n="d_beRate">손익분기 목표 전환율</th><td id="breakEvenRate">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      activeUsers:$("activeUsers"), baseRate:$("baseRate"), targetRate:$("targetRate"), arpu:$("arpu"), margin:$("margin"),
      svcCost:$("svcCost"), monthlyCost:$("monthlyCost"), setupCost:$("setupCost"), months:$("months"),
      incPaid:$("incPaid"), incRevenue:$("incRevenue"), monthlyNet:$("monthlyNet"), termNet:$("termNet"), roi:$("roi"), payback:$("payback"),
      basePaid:$("basePaid"), targetPaid:$("targetPaid"), incrementalContribution:$("incrementalContribution"), breakEvenRate:$("breakEvenRate"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { activeUsers:180000, baseRate:2.8, targetRate:3.5, arpu:19000, margin:74, svcCost:1300, monthlyCost:4200000, setupCost:18000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"💳 프리미엄 전환 수익 계산기", subtitle:"무료 사용자 기반에서 유료 전환율 개선 시 추가 매출·순이익·회수기간을 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        activeUsers:"월 활성 사용자 수 (명)", baseRate:"현재 유료 전환율 (%)", targetRate:"목표 유료 전환율 (%)", arpu:"유료 사용자 월 ARPU (KRW)",
        margin:"공헌마진율 (%)", svcCost:"유료 1인당 월 추가 서비스비 (KRW)", monthlyCost:"월 운영/실험비 (KRW)", setupCost:"초기 도입비 (KRW)", months:"분석 기간 (개월)",
        k_incPaid:"추가 유료 사용자 (월)", k_incRevenue:"추가 매출 (월)", k_monthlyNet:"월 순효과", k_termNet:"분석기간 순효과", k_roi:"ROI", k_payback:"회수기간",
        d_basePaid:"현재 유료 사용자", d_targetPaid:"목표 유료 사용자", d_contrib:"추가 공헌이익 (월)", d_beRate:"손익분기 목표 전환율",
        errActive:"월 활성 사용자 수는 1 이상이어야 합니다.", errRate:"전환율은 0~100% 범위여야 합니다.", errTarget:"목표 전환율은 현재 전환율 이상이어야 합니다.",
        errArpu:"ARPU는 0보다 커야 합니다.", errMargin:"공헌마진율은 0 초과 100 이하 범위여야 합니다.", errSvc:"서비스비는 0 이상이어야 합니다.",
        errMonthly:"월 운영비는 0 이상이어야 합니다.", errSetup:"초기 도입비는 0 이상이어야 합니다.", errMonths:"분석 기간은 1~48개월 범위여야 합니다.", errUnit:"공헌마진 기반 단위 기여도가 0보다 커야 합니다.",
        unitPeople:"명", unitMonth:"개월", impossible:"달성 불가", cannotPayback:"회수 불가", immediate:"즉시",
        statusGood:"월 순효과 개선", statusBad:"월 순효과 악화", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        summaryTitle:"[Freemium to Paid Conversion 요약]", summaryMonths:"개월 누적 순효과", summaryBe:"손익분기 목표 전환율"
      },
      en: {
        title:"💳 Freemium-to-Paid Conversion Revenue Calculator", subtitle:"Estimate incremental revenue, net impact, payback period, and ROI from conversion-rate improvements.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        activeUsers:"Monthly active users", baseRate:"Current paid conversion rate (%)", targetRate:"Target paid conversion rate (%)", arpu:"Paid user monthly ARPU (KRW)",
        margin:"Contribution margin (%)", svcCost:"Extra monthly service cost per paid user (KRW)", monthlyCost:"Monthly program/experiment cost (KRW)", setupCost:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_incPaid:"Incremental paid users (monthly)", k_incRevenue:"Incremental revenue (monthly)", k_monthlyNet:"Net monthly impact", k_termNet:"Period net impact", k_roi:"ROI", k_payback:"Payback period",
        d_basePaid:"Current paid users", d_targetPaid:"Target paid users", d_contrib:"Incremental contribution (monthly)", d_beRate:"Break-even target conversion",
        errActive:"Monthly active users must be at least 1.", errRate:"Conversion rates must be between 0 and 100%.", errTarget:"Target conversion rate must be equal to or higher than current rate.",
        errArpu:"ARPU must be greater than 0.", errMargin:"Contribution margin must be >0 and <=100.", errSvc:"Service cost must be >= 0.",
        errMonthly:"Monthly program cost must be >= 0.", errSetup:"Setup cost must be >= 0.", errMonths:"Analysis period must be between 1 and 48 months.", errUnit:"Unit contribution after margin/service cost must be greater than 0.",
        unitPeople:"users", unitMonth:"months", impossible:"Not achievable", cannotPayback:"No payback", immediate:"Immediate",
        statusGood:"Positive monthly net impact", statusBad:"Negative monthly net impact", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard permission unavailable. Please copy manually.",
        summaryTitle:"[Freemium to Paid Conversion Summary]", summaryMonths:"month cumulative net impact", summaryBe:"Break-even target conversion"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.activeUsers) || v.activeUsers < 1) return t("errActive");
      if (!Number.isFinite(v.baseRate) || !Number.isFinite(v.targetRate) || v.baseRate < 0 || v.baseRate > 100 || v.targetRate < 0 || v.targetRate > 100) return t("errRate");
      if (v.targetRate < v.baseRate) return t("errTarget");
      if (!Number.isFinite(v.arpu) || v.arpu <= 0) return t("errArpu");
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return t("errMargin");
      if (!Number.isFinite(v.svcCost) || v.svcCost < 0) return t("errSvc");
      if (!Number.isFinite(v.monthlyCost) || v.monthlyCost < 0) return t("errMonthly");
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return t("errSetup");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 48) return t("errMonths");
      const unitContribution = (v.arpu * (v.margin/100)) - v.svcCost;
      if (unitContribution <= 0) return t("errUnit");
      return "";
    }

    function compute(v){
      const baseRate = v.baseRate / 100;
      const targetRate = v.targetRate / 100;
      const marginRate = v.margin / 100;

      const basePaid = v.activeUsers * baseRate;
      const targetPaid = v.activeUsers * targetRate;
      const incrementalPaid = targetPaid - basePaid;

      const incrementalRevenue = incrementalPaid * v.arpu;
      const incrementalContribution = (incrementalRevenue * marginRate) - (incrementalPaid * v.svcCost);
      const monthlyNet = incrementalContribution - v.monthlyCost;
      const termNet = monthlyNet * v.months - v.setupCost;

      const invested = v.setupCost + (v.monthlyCost * v.months);
      const roi = invested === 0 ? (termNet >= 0 ? Infinity : -Infinity) : (termNet / invested) * 100;
      const payback = monthlyNet > 0 ? (v.setupCost / monthlyNet) : Infinity;

      const unitContribution = (v.arpu * marginRate) - v.svcCost;
      const breakEvenIncPaid = v.monthlyCost / unitContribution;
      const breakEvenRate = ((basePaid + breakEvenIncPaid) / v.activeUsers) * 100;

      return {basePaid,targetPaid,incrementalPaid,incrementalRevenue,incrementalContribution,monthlyNet,termNet,roi,payback,breakEvenRate};
    }

    function resetOutputs(){
      ["incPaid","incRevenue","monthlyNet","termNet","roi","payback","basePaid","targetPaid","incrementalContribution","breakEvenRate"].forEach(k=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        activeUsers:Number(refs.activeUsers.value), baseRate:Number(refs.baseRate.value), targetRate:Number(refs.targetRate.value), arpu:Number(refs.arpu.value),
        margin:Number(refs.margin.value), svcCost:Number(refs.svcCost.value), monthlyCost:Number(refs.monthlyCost.value), setupCost:Number(refs.setupCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.incPaid.textContent = `${num(r.incrementalPaid,1)} ${t("unitPeople")}`;
      refs.incRevenue.textContent = money(r.incrementalRevenue);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.termNet.textContent = money(r.termNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("cannotPayback");
      refs.basePaid.textContent = `${num(r.basePaid,1)} ${t("unitPeople")}`;
      refs.targetPaid.textContent = `${num(r.targetPaid,1)} ${t("unitPeople")}`;
      refs.incrementalContribution.textContent = money(r.incrementalContribution);
      refs.breakEvenRate.textContent = Number.isFinite(r.breakEvenRate) ? `${num(r.breakEvenRate,3)}%` : t("impossible");

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> ${t("statusGood")} (${money(r.monthlyNet)})`
        : `<span class="warn">●</span> ${t("statusBad")} (${money(r.monthlyNet)})`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_incPaid")}: ${num(r.incrementalPaid,1)} ${t("unitPeople")}`,
        `${t("k_incRevenue")}: ${money(r.incrementalRevenue)}`,
        `${t("d_contrib")}: ${money(r.incrementalContribution)}`,
        `${t("k_monthlyNet")}: ${money(r.monthlyNet)}`,
        `${v.months} ${t("summaryMonths")}: ${money(r.termNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("cannotPayback")}`,
        `${t("summaryBe")}: ${Number.isFinite(r.breakEvenRate) ? `${num(r.breakEvenRate,3)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.activeUsers,refs.baseRate,refs.targetRate,refs.arpu,refs.margin,refs.svcCost,refs.monthlyCost,refs.setupCost,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
