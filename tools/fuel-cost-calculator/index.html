<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주유비 계산기 | Fuel Cost Calculator</title>
  <meta name="description" content="거리, 연비, 유가를 입력해 예상 주유비와 1인당 비용을 계산하는 도구" />
  <style>
    :root{--bg:#f4f7fb;--panel:#fff;--text:#13213b;--muted:#5e6c84;--line:#d9e2f1;--pri:#2563eb;--pri2:#1d4ed8}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);padding:16px;line-height:1.5}
    .wrap{max-width:860px;margin:0 auto}
    .back{display:inline-block;margin-bottom:10px;color:var(--muted);text-decoration:none}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 8px 28px rgba(15,23,42,.06)}
    h1{font-size:clamp(1.4rem,4.5vw,2rem);margin-bottom:6px}
    .sub{color:var(--muted);font-size:.95rem;margin-bottom:14px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    label{font-size:.83rem;font-weight:700;color:#32415f;display:block;margin-bottom:5px}
    input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:1rem}
    input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(37,99,235,.14)}
    .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    button{border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
    .primary{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}
    .ghost{background:#eef3ff;color:#1e3a8a}
    .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}
    .card{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fbfdff}
    .k{font-size:.8rem;color:var(--muted);font-weight:700}
    .v{margin-top:4px;font-size:1.15rem;font-weight:800}
    .note{margin-top:12px;font-size:.83rem;color:var(--muted)}
    @media (max-width:700px){.grid,.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/tools/">← 도구 목록으로</a>
    <section class="panel">
      <h1>⛽ 주유비 계산기</h1>
      <p class="sub">여행/출퇴근 이동 비용을 빠르게 계산하세요. 통행료·주차비·동승자 분담까지 반영합니다.</p>

      <div class="grid">
        <div>
          <label for="distance">이동 거리 (km)</label>
          <input id="distance" type="number" min="0" step="0.1" value="120" />
        </div>
        <div>
          <label for="efficiency">연비 (km/L)</label>
          <input id="efficiency" type="number" min="0.1" step="0.1" value="12.5" />
        </div>
        <div>
          <label for="fuelPrice">유가 (원/L)</label>
          <input id="fuelPrice" type="number" min="0" step="1" value="1690" />
        </div>
        <div>
          <label for="extra">통행료 + 주차비 등 추가비용 (원)</label>
          <input id="extra" type="number" min="0" step="100" value="0" />
        </div>
        <div>
          <label for="people">동승 인원 (본인 포함)</label>
          <input id="people" type="number" min="1" step="1" value="1" />
        </div>
        <div>
          <label for="roundTrip">왕복 거리 자동 계산</label>
          <input id="roundTrip" type="checkbox" style="width:auto;transform:scale(1.25);margin-top:12px" />
        </div>
      </div>

      <div class="btns">
        <button class="primary" id="calcBtn">계산하기</button>
        <button class="ghost" id="resetBtn">초기화</button>
      </div>

      <div class="cards" id="result"></div>
      <p class="note">※ 실제 연비와 교통 상황에 따라 비용이 달라질 수 있습니다.</p>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const won = (n) => '₩' + Math.round(n).toLocaleString('ko-KR');

    function calculate(){
      let distance = Number($("distance").value || 0);
      const efficiency = Number($("efficiency").value || 0);
      const fuelPrice = Number($("fuelPrice").value || 0);
      const extra = Number($("extra").value || 0);
      const people = Math.max(1, Number($("people").value || 1));
      const isRound = $("roundTrip").checked;

      if(isRound) distance *= 2;
      if(efficiency <= 0){
        $("result").innerHTML = '<div class="card"><div class="k">오류</div><div class="v">연비는 0보다 커야 합니다.</div></div>';
        return;
      }

      const liters = distance / efficiency;
      const fuelCost = liters * fuelPrice;
      const total = fuelCost + extra;
      const perPerson = total / people;

      $("result").innerHTML = `
        <article class="card"><div class="k">총 이동 거리</div><div class="v">${distance.toLocaleString('ko-KR')} km</div></article>
        <article class="card"><div class="k">예상 연료 사용량</div><div class="v">${liters.toFixed(2)} L</div></article>
        <article class="card"><div class="k">예상 주유비</div><div class="v">${won(fuelCost)}</div></article>
        <article class="card"><div class="k">총 이동 비용</div><div class="v">${won(total)}</div></article>
        <article class="card"><div class="k">1인당 분담 비용</div><div class="v">${won(perPerson)}</div></article>
        <article class="card"><div class="k">km당 평균 비용</div><div class="v">${won(distance ? total / distance : 0)}</div></article>
      `;
    }

    function reset(){
      $("distance").value = 120;
      $("efficiency").value = 12.5;
      $("fuelPrice").value = 1690;
      $("extra").value = 0;
      $("people").value = 1;
      $("roundTrip").checked = false;
      calculate();
    }

    $("calcBtn").addEventListener("click", calculate);
    $("resetBtn").addEventListener("click", reset);
    ["distance","efficiency","fuelPrice","extra","people","roundTrip"].forEach(id=>$(id).addEventListener("input", calculate));
    calculate();
  </script>
</body>
</html>
