<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="게임 임베드 코드 생성기 - games.eastsea.xyz 배포용 iframe + itch.io + CrazyGames + Telegram Mini App 링크를 한 번에 생성합니다. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>게임 임베드 코드 생성기 - Game Embed Generator</title>
  <style>
    :root {
      --bg: #070b16;
      --panel: #111a2f;
      --panel-2: #172442;
      --line: #2a3d68;
      --text: #ecf2ff;
      --muted: #a8b7d9;
      --accent: #5aa9ff;
      --ok: #34d399;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(900px 700px at 10% -10%, #203767 0%, transparent 45%), var(--bg);
      padding: 16px;
    }
    .app { max-width: 1180px; margin: 0 auto; display: grid; gap: 14px; }
    .hero h1 { margin: 0; font-size: clamp(1.35rem, 3.6vw, 2rem); }
    .hero p { margin: 6px 0 0; color: var(--muted); }
    .card {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .grid { display: grid; gap: 10px; }
    .grid-2 { display: grid; grid-template-columns: 1.1fr 1fr; gap: 14px; }
    .form-grid { display: grid; gap: 10px; grid-template-columns: repeat(4, minmax(0, 1fr)); }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 0.9rem; }
    input, textarea, button {
      width: 100%;
      border: 1px solid #355087;
      background: #0b1428;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(180deg, #3d76d8, #2f5fb7);
    }
    .ghost { background: #132241; }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .output-header strong { font-size: 0.95rem; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
    }
    .switch {
      width: auto;
      transform: translateY(1px);
      accent-color: var(--accent);
    }
    .preview-wrap {
      border: 1px dashed #4a6aa5;
      border-radius: 12px;
      padding: 10px;
      background: #0a1224;
      min-height: 260px;
    }
    .preview-label { color: var(--muted); font-size: 0.9rem; margin-bottom: 8px; }
    #previewFrame {
      width: 100%;
      border: 1px solid #2f4a7d;
      border-radius: 10px;
      background: #060b16;
    }
    .status { color: var(--ok); font-size: 0.88rem; min-height: 1.2rem; }
    @media (max-width: 980px) {
      .grid-2 { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>게임 임베드 코드 생성기</h1>
      <p>games.eastsea.xyz 배포용 iframe + itch.io + CrazyGames + Telegram Mini App 링크를 한 번에 생성합니다.</p>
    </header>

    <section class="card grid">
      <div class="form-grid">
        <label>게임 URL
          <input id="gameUrl" type="url" value="https://games.eastsea.xyz/shadow-legion-idle/" />
        </label>
        <label>너비
          <input id="width" type="text" value="100%" />
        </label>
        <label>높이(px)
          <input id="height" type="number" min="200" value="720" />
        </label>
        <label>Telegram Bot Username
          <input id="botUser" type="text" value="eastsea_games_bot" />
        </label>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <label class="pill"><input id="responsive" class="switch" type="checkbox" checked /> 반응형 iframe 래퍼 사용</label>
        <button id="generateBtn" style="max-width:200px;">코드 생성</button>
        <button id="sampleBtn" class="ghost" style="max-width:200px;">샘플 URL 적용</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="grid-2">
      <div class="card grid">
        <div class="output-header"><strong>Iframe 임베드 코드</strong><button data-copy="iframeCode">복사</button></div>
        <textarea id="iframeCode" readonly></textarea>

        <div class="output-header"><strong>itch.io Widget HTML (템플릿)</strong><button data-copy="itchCode">복사</button></div>
        <textarea id="itchCode" readonly></textarea>

        <div class="output-header"><strong>CrazyGames 제출 링크 템플릿</strong><button data-copy="crazyCode">복사</button></div>
        <textarea id="crazyCode" readonly></textarea>

        <div class="output-header"><strong>Telegram Mini App URL</strong><button data-copy="telegramCode">복사</button></div>
        <textarea id="telegramCode" readonly></textarea>
      </div>

      <div class="card grid">
        <div class="preview-label">실시간 임베드 미리보기</div>
        <div class="preview-wrap" id="previewWrap">
          <iframe id="previewFrame" title="Game Embed Preview" loading="lazy" allowfullscreen></iframe>
        </div>
        <div class="pill">※ X-Frame-Options 정책이 있는 외부 URL은 미리보기가 차단될 수 있습니다.</div>
      </div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function normalizeUrl(raw) {
      try {
        const url = new URL(raw.trim());
        return url.href;
      } catch {
        return "";
      }
    }

    function getSlug(url) {
      try {
        const u = new URL(url);
        const parts = u.pathname.split('/').filter(Boolean);
        return parts[parts.length - 1] || 'game-slug';
      } catch {
        return 'game-slug';
      }
    }

    function buildCodes() {
      const gameUrl = normalizeUrl($("gameUrl").value);
      const width = $("width").value.trim() || '100%';
      const height = Math.max(200, Number($("height").value) || 720);
      const responsive = $("responsive").checked;
      const botUser = ($("botUser").value || 'eastsea_games_bot').replace('@', '').trim();

      if (!gameUrl) {
        $("status").textContent = '유효한 게임 URL을 입력해주세요.';
        return;
      }

      const slug = getSlug(gameUrl);
      const title = slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      const ratio = ((height / 1280) * 100).toFixed(2);

      const iframeCode = responsive
        ? `<div style="position:relative;width:100%;max-width:${width};padding-top:${ratio}%;overflow:hidden;border-radius:12px;">\n  <iframe src="${gameUrl}" title="${title}" loading="lazy" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:0;"></iframe>\n</div>`
        : `<iframe src="${gameUrl}" title="${title}" width="${width}" height="${height}" loading="lazy" allowfullscreen style="border:0;border-radius:12px;"></iframe>`;

      const itchCode = `<!-- Replace ITCH_PROJECT_ID with your actual numeric project id -->\n<iframe frameborder="0" src="https://itch.io/embed/ITCH_PROJECT_ID" width="${String(width).replace('%', '') || '960'}" height="${Math.max(167, Math.round(height * 0.3))}">\n  <a href="${gameUrl}">${title} by EastSea</a>\n</iframe>`;

      const crazyLink = `https://www.crazygames.com/developers?submit=1&game_title=${encodeURIComponent(title)}&game_url=${encodeURIComponent(gameUrl)}&source=${encodeURIComponent('games.eastsea.xyz')}`;

      const telegramUrl = `https://t.me/${botUser}/${slug}?startapp=${encodeURIComponent(slug)}\n# direct webapp fallback\n${gameUrl}`;

      $("iframeCode").value = iframeCode;
      $("itchCode").value = itchCode;
      $("crazyCode").value = crazyLink;
      $("telegramCode").value = telegramUrl;

      const frame = $("previewFrame");
      frame.src = gameUrl;
      frame.style.height = `${height}px`;

      $("status").textContent = `생성 완료: ${slug}`;
    }

    async function copyFrom(targetId, btn) {
      const text = $(targetId).value;
      if (!text) return;
      await navigator.clipboard.writeText(text);
      const prev = btn.textContent;
      btn.textContent = '복사됨!';
      setTimeout(() => (btn.textContent = prev), 1000);
    }

    document.querySelectorAll('[data-copy]').forEach((btn) => {
      btn.addEventListener('click', () => copyFrom(btn.dataset.copy, btn));
    });

    ['gameUrl', 'width', 'height', 'botUser', 'responsive'].forEach((id) => {
      $(id).addEventListener('input', buildCodes);
      $(id).addEventListener('change', buildCodes);
    });

    $("generateBtn").addEventListener('click', buildCodes);
    $("sampleBtn").addEventListener('click', () => {
      $("gameUrl").value = 'https://games.eastsea.xyz/shadow-legion-idle/';
      $("width").value = '100%';
      $("height").value = 720;
      $("responsive").checked = true;
      buildCodes();
    });

    buildCodes();
  </script>
</body>
</html>
