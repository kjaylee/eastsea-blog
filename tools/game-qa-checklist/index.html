<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>게임 QA 체크리스트 - Game QA Checklist</title>
<meta name="description" content="게임 출시 전 모바일 터치, 저장, 반응형, 성능, 오디오, SEO, 구조화 데이터를 점검하는 인터랙티브 QA 체크리스트" />
<style>
:root{
  --bg:#070b14;
  --bg2:#0f172a;
  --card:#111b31;
  --card2:#0d1527;
  --text:#e5ecff;
  --muted:#9db0d1;
  --line:#243656;
  --accent:#56b2ff;
  --good:#34d399;
  --warn:#f59e0b;
  --bad:#f87171;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:radial-gradient(1200px 800px at 90% -10%,#1f3358 0%,var(--bg) 50%) fixed;color:var(--text);padding:18px}
.container{max-width:1200px;margin:0 auto}
h1{margin:0 0 6px;font-size:clamp(1.4rem,3vw,2rem)}
.sub{margin:0 0 18px;color:var(--muted)}
.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:1fr 1fr}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
label{display:block;font-size:.9rem;color:var(--muted);margin-bottom:6px}
input,textarea,button{font:inherit}
input[type="url"],textarea{width:100%;background:#0b1222;border:1px solid var(--line);color:var(--text);padding:11px 12px;border-radius:10px}
textarea{min-height:120px;resize:vertical}
.row{display:flex;gap:8px;flex-wrap:wrap}
.btn{background:#172742;color:#dbeafe;border:1px solid #29446e;padding:9px 12px;border-radius:10px;cursor:pointer}
.btn.primary{background:linear-gradient(135deg,#1c6ed6,#3da8ff);border:none;color:#fff;font-weight:700}
.btn:hover{filter:brightness(1.08)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;font-size:.75rem;font-weight:700;border:1px solid var(--line);background:#0a1220;color:var(--muted)}
.badge.good{color:#c6ffe9;border-color:#1e6d5c;background:#0c2c24}
.badge.warn{color:#ffe7b4;border-color:#755520;background:#2f2411}
.badge.bad{color:#ffc9c9;border-color:#7e3434;background:#2f1414}
.category{margin-bottom:12px;padding:10px;border:1px solid var(--line);border-radius:12px;background:#0b1426}
.category h3{margin:0 0 8px;font-size:1rem}
.item{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px dashed #1f3150}
.item:last-child{border-bottom:0}
.item input{margin-top:3px}
.item-meta{font-size:.78rem;color:var(--muted)}
.item .mark{margin-left:auto}
.status-list{font-size:.9rem;line-height:1.65;color:#c9d8f5;padding-left:18px}
iframe{width:100%;height:360px;border:1px solid var(--line);border-radius:12px;background:#050912}
.summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.kpi{background:#0a1325;border:1px solid var(--line);border-radius:10px;padding:10px}
.kpi b{display:block;font-size:1.35rem;margin-top:4px}
.out{width:100%;height:220px;background:#080f1f;border:1px solid var(--line);border-radius:10px;color:#dbebff;padding:10px}
@media (max-width:900px){.grid-2{grid-template-columns:1fr}iframe{height:240px}.summary{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="container">
  <h1>🎮 게임 QA 체크리스트</h1>
  <p class="sub">출시 전 핵심 품질/SEO 항목을 자동 + 수동으로 점검하고 마크다운 리포트로 내보내세요.</p>

  <div class="card">
    <label for="urlInput">게임 URL</label>
    <div class="row">
      <input id="urlInput" type="url" placeholder="https://games.eastsea.xyz/your-game/" style="flex:1" />
      <button id="autoBtn" class="btn primary">자동 점검</button>
      <button id="sampleBtn" class="btn">샘플 URL</button>
      <button id="resetBtn" class="btn">초기화</button>
    </div>
    <div class="row" style="margin-top:8px">
      <span id="fetchStatus" class="badge">대기중</span>
      <span id="frameStatus" class="badge">iframe 미로드</span>
    </div>
  </div>

  <div class="grid grid-2" style="margin-top:14px">
    <div class="card">
      <h2 style="margin:0 0 10px;font-size:1.1rem">✅ 체크리스트</h2>
      <div class="summary" id="summary"></div>
      <div style="margin-top:12px" id="checklistWrap"></div>
      <div class="row" style="margin-top:12px">
        <button id="exportBtn" class="btn primary">Markdown 내보내기</button>
        <button id="copyBtn" class="btn">복사</button>
      </div>
      <textarea id="mdOutput" class="out" placeholder="여기에 마크다운 리포트가 생성됩니다."></textarea>
    </div>

    <div class="grid" style="gap:14px">
      <div class="card">
        <h2 style="margin:0 0 10px;font-size:1.1rem">🖼️ 게임 미리보기 (iframe)</h2>
        <iframe id="gameFrame" src="about:blank" loading="lazy"></iframe>
      </div>
      <div class="card">
        <h2 style="margin:0 0 10px;font-size:1.1rem">🤖 자동 분석 결과</h2>
        <ul id="autoNotes" class="status-list"></ul>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = (s) => document.querySelector(s);
  const dom = {
    url: $('#urlInput'),
    autoBtn: $('#autoBtn'),
    sampleBtn: $('#sampleBtn'),
    resetBtn: $('#resetBtn'),
    fetchStatus: $('#fetchStatus'),
    frameStatus: $('#frameStatus'),
    checklistWrap: $('#checklistWrap'),
    summary: $('#summary'),
    autoNotes: $('#autoNotes'),
    frame: $('#gameFrame'),
    exportBtn: $('#exportBtn'),
    copyBtn: $('#copyBtn'),
    mdOutput: $('#mdOutput')
  };

  const checklist = [
    { category: '모바일 터치 (Tap/Swipe)', items: [
      { id: 'touch-tap', label: '탭 입력이 정상 동작한다', mode: 'manual' },
      { id: 'touch-swipe', label: '스와이프 제스처가 스크롤과 충돌하지 않는다', mode: 'manual' },
      { id: 'touch-detect', label: '터치/포인터 이벤트 코드가 감지된다', mode: 'auto' }
    ]},
    { category: 'localStorage Save/Load', items: [
      { id: 'ls-save-load-manual', label: '저장 후 새로고침해도 불러오기가 된다', mode: 'manual' },
      { id: 'ls-detect', label: 'localStorage API 사용 코드가 감지된다', mode: 'auto' }
    ]},
    { category: '반응형 레이아웃', items: [
      { id: 'responsive-viewport', label: 'viewport 메타 태그가 존재한다', mode: 'auto' },
      { id: 'responsive-manual', label: '모바일/태블릿 화면에서 레이아웃이 깨지지 않는다', mode: 'manual' }
    ]},
    { category: '성능 (FPS)', items: [
      { id: 'perf-manual', label: '모바일 기준 55~60 FPS를 유지한다', mode: 'manual' },
      { id: 'perf-detect', label: 'requestAnimationFrame/performance 코드가 감지된다', mode: 'auto' }
    ]},
    { category: '오디오', items: [
      { id: 'audio-manual', label: '유저 제스처 후 오디오 재생이 정상 동작한다', mode: 'manual' },
      { id: 'audio-detect', label: '오디오 관련 API/태그가 감지된다', mode: 'auto' }
    ]},
    { category: 'SEO 메타 태그', items: [
      { id: 'seo-core', label: 'title + description 메타 태그가 존재한다', mode: 'auto' },
      { id: 'seo-social', label: 'Open Graph/Twitter 메타가 존재한다', mode: 'auto' }
    ]},
    { category: 'Structured Data', items: [
      { id: 'structured', label: 'JSON-LD 구조화 데이터 스크립트가 존재한다', mode: 'auto' }
    ]}
  ];

  function normalizeUrl(v){
    let u = (v || '').trim();
    if(!u) return '';
    if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
    return u;
  }

  function setBadge(el, text, type=''){
    el.textContent = text;
    el.className = 'badge' + (type ? ' ' + type : '');
  }

  function renderChecklist(){
    dom.checklistWrap.innerHTML = checklist.map(cat => `
      <section class="category">
        <h3>${cat.category}</h3>
        ${cat.items.map(it => `
          <label class="item" for="${it.id}">
            <input id="${it.id}" type="checkbox" />
            <span>
              ${it.label}
              <div class="item-meta">${it.mode === 'auto' ? '자동/수동 수정 가능' : '수동 확인'}</div>
            </span>
            <span class="mark badge">${it.mode}</span>
          </label>
        `).join('')}
      </section>`).join('');

    dom.checklistWrap.querySelectorAll('input[type="checkbox"]').forEach(c => c.addEventListener('change', renderSummary));
    renderSummary();
  }

  function allItems(){
    return checklist.flatMap(c => c.items);
  }

  function renderSummary(){
    const items = allItems();
    const total = items.length;
    const checked = items.filter(it => document.getElementById(it.id)?.checked).length;
    const autoTotal = items.filter(i => i.mode === 'auto').length;
    const autoChecked = items.filter(i => i.mode === 'auto' && document.getElementById(i.id)?.checked).length;
    dom.summary.innerHTML = `
      <div class="kpi"><small>전체 완료</small><b>${checked}/${total}</b></div>
      <div class="kpi"><small>완료율</small><b>${Math.round((checked/total)*100)}%</b></div>
      <div class="kpi"><small>자동 항목</small><b>${autoChecked}/${autoTotal}</b></div>
    `;
  }

  async function fetchHtmlWithFallback(url){
    const attempts = [
      url,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      `https://r.jina.ai/http://${url.replace(/^https?:\/\//i,'')}`
    ];

    let lastErr = new Error('failed');
    for (const endpoint of attempts){
      try {
        const res = await fetch(endpoint);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        if (text && text.length > 60) return text;
      } catch (err){
        lastErr = err;
      }
    }
    throw lastErr;
  }

  function detectFromHtml(html){
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const whole = html.toLowerCase();

    const title = (doc.querySelector('title')?.textContent || '').trim();
    const desc = doc.querySelector('meta[name="description"]')?.getAttribute('content')?.trim() || '';
    const hasOg = !!doc.querySelector('meta[property="og:title"],meta[property="og:description"],meta[property="og:image"]');
    const hasTw = !!doc.querySelector('meta[name="twitter:card"],meta[name="twitter:title"],meta[name="twitter:description"]');
    const viewport = !!doc.querySelector('meta[name="viewport"]');
    const structuredCount = doc.querySelectorAll('script[type="application/ld+json"]').length;

    return {
      seoCore: !!(title && desc),
      seoSocial: hasOg || hasTw,
      viewport,
      structured: structuredCount > 0,
      touchDetect: /touchstart|touchmove|ontouchstart|pointerdown|pointermove/.test(whole),
      lsDetect: /localstorage\s*\.|setitem\s*\(|getitem\s*\(/.test(whole),
      perfDetect: /requestanimationframe|performance\.now|fps/.test(whole),
      audioDetect: /<audio|new\s+audio\(|audiocontext|howler|howl\(/.test(whole),
      title,
      desc,
      structuredCount
    };
  }

  function applyAutoChecks(result){
    const mapping = {
      'touch-detect': result.touchDetect,
      'ls-detect': result.lsDetect,
      'responsive-viewport': result.viewport,
      'perf-detect': result.perfDetect,
      'audio-detect': result.audioDetect,
      'seo-core': result.seoCore,
      'seo-social': result.seoSocial,
      'structured': result.structured
    };

    Object.entries(mapping).forEach(([id,val]) => {
      const el = document.getElementById(id);
      if(el) el.checked = !!val;
    });
    renderSummary();

    const notes = [
      `Title: ${result.title ? result.title : '없음'}`,
      `Description: ${result.desc ? `${result.desc.slice(0, 90)}${result.desc.length>90?'...':''}` : '없음'}`,
      `JSON-LD 개수: ${result.structuredCount}`,
      `터치 코드 감지: ${result.touchDetect ? '예' : '아니오'}`,
      `localStorage 코드 감지: ${result.lsDetect ? '예' : '아니오'}`,
      `오디오 코드 감지: ${result.audioDetect ? '예' : '아니오'}`,
      `성능 코드 감지: ${result.perfDetect ? '예' : '아니오'}`
    ];
    dom.autoNotes.innerHTML = notes.map(n => `<li>${n}</li>`).join('');
  }

  async function runAutoCheck(){
    const url = normalizeUrl(dom.url.value);
    if(!url){
      alert('게임 URL을 입력하세요.');
      return;
    }
    dom.url.value = url;

    setBadge(dom.fetchStatus, '분석중...', 'warn');
    setBadge(dom.frameStatus, 'iframe 로딩중...', 'warn');

    dom.frame.src = url;
    let frameLoaded = false;
    const frameTimeout = setTimeout(() => {
      if(!frameLoaded) setBadge(dom.frameStatus, 'iframe 상태 확인 필요 (X-Frame-Options 가능)', 'warn');
    }, 3000);

    dom.frame.onload = () => {
      frameLoaded = true;
      clearTimeout(frameTimeout);
      setBadge(dom.frameStatus, 'iframe 로드됨', 'good');
    };

    try {
      const html = await fetchHtmlWithFallback(url);
      const result = detectFromHtml(html);
      applyAutoChecks(result);
      setBadge(dom.fetchStatus, '자동 분석 완료', 'good');
    } catch (err){
      setBadge(dom.fetchStatus, '자동 분석 실패 (CORS/네트워크)', 'bad');
      dom.autoNotes.innerHTML = `<li>자동 분석 실패: ${err.message || err}</li><li>수동 항목을 중심으로 점검하세요.</li>`;
    }
  }

  function markdownReport(){
    const url = normalizeUrl(dom.url.value) || '(미입력)';
    const now = new Date().toLocaleString('ko-KR');
    const items = allItems();
    const done = items.filter(it => document.getElementById(it.id)?.checked).length;
    const lines = [];
    lines.push(`# 게임 QA 체크리스트 리포트`);
    lines.push(`- URL: ${url}`);
    lines.push(`- 생성시각: ${now}`);
    lines.push(`- 완료율: ${done}/${items.length} (${Math.round((done/items.length)*100)}%)`);
    lines.push('');

    checklist.forEach(cat => {
      lines.push(`## ${cat.category}`);
      cat.items.forEach(it => {
        const checked = document.getElementById(it.id)?.checked ? 'x' : ' ';
        lines.push(`- [${checked}] ${it.label} _(${it.mode})_`);
      });
      lines.push('');
    });

    dom.mdOutput.value = lines.join('\n');
  }

  dom.autoBtn.addEventListener('click', runAutoCheck);
  dom.sampleBtn.addEventListener('click', () => {
    dom.url.value = 'https://games.eastsea.xyz/';
  });
  dom.resetBtn.addEventListener('click', () => {
    dom.url.value = '';
    dom.frame.src = 'about:blank';
    dom.autoNotes.innerHTML = '';
    setBadge(dom.fetchStatus, '대기중');
    setBadge(dom.frameStatus, 'iframe 미로드');
    allItems().forEach(it => {
      const el = document.getElementById(it.id);
      if(el) el.checked = false;
    });
    renderSummary();
    dom.mdOutput.value = '';
  });
  dom.exportBtn.addEventListener('click', markdownReport);
  dom.copyBtn.addEventListener('click', async () => {
    if(!dom.mdOutput.value.trim()) markdownReport();
    try {
      await navigator.clipboard.writeText(dom.mdOutput.value);
      alert('마크다운 리포트를 복사했습니다.');
    } catch {
      alert('복사 실패: 브라우저 권한을 확인하세요.');
    }
  });

  renderChecklist();
})();
</script>
</body>
</html>
