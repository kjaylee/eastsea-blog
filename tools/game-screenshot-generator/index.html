<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게임 스크린샷 생성기 | Game Screenshot Generator</title>
  <meta name="description" content="게임 URL을 기준으로 16:9/9:16/1:1/3:1 스크린샷을 만들고 텍스트 오버레이를 추가해 PNG로 다운로드합니다." />
  <style>
    :root{
      --bg:#070d18;--bg2:#0c1428;--card:#0f1b33;--line:#263a63;--text:#eaf1ff;--muted:#a5b6d8;--accent:#6fa8ff;
      --radius:16px;--shadow:0 18px 44px rgba(0,0,0,.34);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:var(--text);
      background:radial-gradient(1100px 700px at 20% -10%,#1e335f 0,transparent 55%),linear-gradient(145deg,var(--bg),var(--bg2));
      min-height:100vh;padding:18px}
    .wrap{max-width:1220px;margin:0 auto}
    a.back{color:var(--muted);text-decoration:none;font-size:.9rem}
    h1{margin:.45rem 0 .25rem;font-size:clamp(1.35rem,2.7vw,2rem)}
    .sub{color:var(--muted);margin:0 0 1rem}
    .grid{display:grid;grid-template-columns:390px 1fr;gap:14px}
    .card{background:rgba(15,27,51,.88);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .inner{padding:14px}
    .title{font-size:.93rem;font-weight:800;margin:0 0 .7rem}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:9px}
    label{font-size:.8rem;color:var(--muted);font-weight:700}
    input,select,button{font:inherit;color:var(--text);border:1px solid var(--line);background:#0c1730;border-radius:10px;padding:10px 11px}
    input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(111,168,255,.2)}
    button{cursor:pointer;font-weight:700}
    button.primary{background:linear-gradient(135deg,#2e67ff,#58a9ff);border-color:transparent}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .preset{padding:8px 10px;font-size:.84rem}
    .preset.active{background:#1a2c54;border-color:#4f79d3;color:#bed8ff}
    .note{font-size:.77rem;color:var(--muted)}
    .preview-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:12px 14px}
    .viewport-wrap{padding:12px;display:grid;place-items:center;min-height:520px}
    .viewport{
      border:1px solid #34507f;border-radius:14px;overflow:hidden;background:#070f20;box-shadow:inset 0 0 0 1px #445f93;
      transform-origin:top center;transition:.25s ease;
    }
    iframe{display:block;border:0;background:#fff}
    .batch-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .batch-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .downloads{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
    .shot{border:1px solid var(--line);border-radius:12px;padding:8px;background:#0c1730}
    .shot img{width:100%;display:block;border-radius:8px;border:1px solid #31476e}
    .shot .meta{font-size:.78rem;color:var(--muted);margin:.4rem 0}
    .shot a{display:inline-block;color:#d7e8ff;text-decoration:none;font-size:.82rem;border:1px solid var(--line);padding:6px 8px;border-radius:8px}
    @media (max-width:1000px){.grid{grid-template-columns:1fr}.viewport-wrap{min-height:420px}}
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/tools/">← 도구 목록으로</a>
  <h1>🖼️ 게임 스크린샷 생성기</h1>
  <p class="sub">게임 URL + 오버레이 텍스트로 배너/스토어용 PNG를 빠르게 생성</p>

  <div class="grid">
    <section class="card"><div class="inner">
      <h2 class="title">1) 기본 설정</h2>
      <div class="field"><label for="urlInput">게임 URL</label><input id="urlInput" value="https://games.eastsea.xyz" placeholder="https://games.eastsea.xyz/slug/"/></div>
      <div class="field"><label for="titleInput">오버레이 텍스트</label><input id="titleInput" placeholder="게임 제목" /></div>
      <div class="row">
        <div class="field" style="flex:1"><label for="fontSize">폰트 크기(px)</label><input id="fontSize" type="number" min="20" max="140" value="62"></div>
        <div class="field" style="flex:1"><label for="fontColor">폰트 색상</label><input id="fontColor" type="color" value="#ffffff"></div>
      </div>
      <div class="field"><label for="position">텍스트 위치</label>
        <select id="position">
          <option value="top-left">상단 좌측</option>
          <option value="top-center">상단 중앙</option>
          <option value="top-right">상단 우측</option>
          <option value="middle-center" selected>중앙</option>
          <option value="bottom-left">하단 좌측</option>
          <option value="bottom-center">하단 중앙</option>
          <option value="bottom-right">하단 우측</option>
        </select>
      </div>

      <h2 class="title" style="margin-top:1rem">2) 프리셋 캡처</h2>
      <div class="row" id="presetBtns"></div>
      <div class="row" style="margin-top:6px">
        <button class="primary" id="loadBtn">프리뷰 로드</button>
        <button id="captureBtn">현재 프리셋 PNG 저장</button>
      </div>

      <h2 class="title" style="margin-top:1rem">3) 배치 모드 (4개 크기)</h2>
      <div class="batch-grid" id="batchInputs"></div>
      <button class="primary" id="batchBtn" style="margin-top:8px;width:100%">배치 생성 (4개)</button>
      <p class="note" id="status"></p>
    </div></section>

    <section class="card">
      <div class="preview-head"><strong>프리뷰 iframe</strong><span class="note" id="sizeLabel"></span></div>
      <div class="viewport-wrap" id="viewportWrap"><div class="viewport" id="viewport"><iframe id="gameFrame"></iframe></div></div>
      <div class="inner">
        <h2 class="title" style="margin-bottom:.35rem">생성 결과</h2>
        <p class="note">교차 출처 iframe 캡처 제한으로, PNG 렌더링은 공개 썸네일 API(thum.io) 이미지를 canvas 합성하여 생성합니다.</p>
        <div class="downloads" id="downloads"></div>
      </div>
    </section>
  </div>
</div>

<script>
(() => {
  const presets = [
    { id:'landscape', label:'16:9 랜드스케이프', width:1920, height:1080 },
    { id:'portrait', label:'9:16 포트레이트', width:1080, height:1920 },
    { id:'square', label:'1:1 스퀘어', width:1080, height:1080 },
    { id:'banner', label:'3:1 배너', width:1800, height:600 }
  ];
  const state = { preset: presets[0] };
  const $ = (id) => document.getElementById(id);

  function normalizeUrl(raw){
    let u = (raw || '').trim();
    if(!u) return '';
    if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
    try { return new URL(u).toString(); } catch { return ''; }
  }

  function esc(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function setPreset(p){
    state.preset = p;
    [...$('presetBtns').querySelectorAll('button')].forEach(btn => btn.classList.toggle('active', btn.dataset.id === p.id));
    const frame = $('gameFrame');
    frame.style.width = p.width + 'px';
    frame.style.height = p.height + 'px';
    $('viewport').style.width = p.width + 'px';
    $('viewport').style.height = p.height + 'px';
    $('sizeLabel').textContent = `${p.label} · ${p.width}×${p.height}`;
    fitPreview();
  }

  function fitPreview(){
    const wrap = $('viewportWrap').getBoundingClientRect();
    const p = state.preset;
    const scale = Math.min((wrap.width - 24) / p.width, (Math.max(wrap.height, 340) - 24) / p.height, 1);
    $('viewport').style.transform = `scale(${scale})`;
  }

  function overlayText(ctx, w, h){
    const title = $('titleInput').value.trim();
    if(!title) return;
    const fs = Math.max(20, Math.min(160, Number($('fontSize').value) || 62));
    const color = $('fontColor').value || '#fff';
    const pos = $('position').value;
    const pad = Math.max(26, Math.round(Math.min(w, h) * 0.04));

    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.fillRect(0, h * .72, w, h * .28);
    ctx.font = `800 ${fs}px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif`;
    ctx.fillStyle = color;
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.7)';
    ctx.shadowBlur = 12;

    let x = pad, y = pad + fs / 2, align = 'left';
    if(pos.includes('center')) { x = w / 2; align = 'center'; }
    if(pos.includes('right')) { x = w - pad; align = 'right'; }
    if(pos.startsWith('middle')) y = h / 2;
    if(pos.startsWith('bottom')) y = h - pad - fs / 2;
    ctx.textAlign = align;

    wrapText(ctx, title, x, y, w - pad * 2, fs * 1.16, align);
    ctx.restore();
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight, align){
    const words = text.split(/\s+/);
    const lines = [];
    let line = '';
    for(const word of words){
      const test = line ? `${line} ${word}` : word;
      if(ctx.measureText(test).width <= maxWidth || !line) line = test;
      else { lines.push(line); line = word; }
    }
    if(line) lines.push(line);
    const startY = y - ((lines.length - 1) * lineHeight / 2);
    lines.slice(0, 3).forEach((l, i) => ctx.fillText(l, x, startY + i * lineHeight));
  }

  function getThumbUrl(url, width){
    const safeW = Math.max(600, Math.min(3000, Math.round(width)));
    return `https://image.thum.io/get/width/${safeW}/${encodeURIComponent(url)}`;
  }

  async function loadImage(src){
    return await new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  async function renderShot(width, height, label){
    const url = normalizeUrl($('urlInput').value);
    if(!url) throw new Error('유효한 URL을 입력하세요.');

    const thumbUrl = getThumbUrl(url, Math.max(width, height) * 1.4);
    const source = await loadImage(thumbUrl);

    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#090f1f';
    ctx.fillRect(0, 0, width, height);

    const scale = Math.max(width / source.width, height / source.height);
    const dw = source.width * scale;
    const dh = source.height * scale;
    const dx = (width - dw) / 2;
    const dy = (height - dh) / 2;
    ctx.drawImage(source, dx, dy, dw, dh);

    ctx.fillStyle = 'rgba(8,14,28,.2)';
    ctx.fillRect(0, 0, width, height);

    overlayText(ctx, width, height);

    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    if(!blob) throw new Error('PNG 생성 실패');
    const objectUrl = URL.createObjectURL(blob);

    return { objectUrl, width, height, label };
  }

  function addDownloadCard(result){
    const id = Math.random().toString(36).slice(2);
    const title = $('titleInput').value.trim() || 'game-shot';
    const file = `${title.toLowerCase().replace(/[^a-z0-9가-힣]+/gi,'-').replace(/^-+|-+$/g,'') || 'game-shot'}-${result.width}x${result.height}.png`;
    const card = document.createElement('div');
    card.className = 'shot';
    card.innerHTML = `
      <img src="${result.objectUrl}" alt="${esc(result.label)}" />
      <div class="meta">${esc(result.label)} · ${result.width}×${result.height}</div>
      <a href="${result.objectUrl}" download="${esc(file)}">PNG 다운로드</a>
    `;
    card.dataset.url = result.objectUrl;
    card.dataset.id = id;
    $('downloads').prepend(card);
  }

  async function captureCurrent(){
    try {
      setStatus('현재 프리셋 캡처 중...');
      const p = state.preset;
      const shot = await renderShot(p.width, p.height, p.label);
      addDownloadCard(shot);
      setStatus(`완료: ${p.width}x${p.height}`);
    } catch(err){
      setStatus('실패: ' + err.message);
      alert(err.message);
    }
  }

  async function captureBatch(){
    const rows = [...$('batchInputs').querySelectorAll('[data-row]')];
    try {
      setStatus('배치 생성 시작...');
      for(let i=0;i<rows.length;i++){
        const w = Number(rows[i].querySelector('[data-w]').value);
        const h = Number(rows[i].querySelector('[data-h]').value);
        if(!(w>100 && h>100)) throw new Error(`${i+1}번 사이즈가 올바르지 않습니다.`);
        setStatus(`배치 ${i+1}/4 생성 중 (${w}x${h})...`);
        const shot = await renderShot(w, h, `Batch ${i+1}`);
        addDownloadCard(shot);
      }
      setStatus('배치 생성 완료 ✓');
    } catch(err){
      setStatus('실패: ' + err.message);
      alert(err.message);
    }
  }

  function setStatus(text){ $('status').textContent = text; }

  function loadPreview(){
    const url = normalizeUrl($('urlInput').value);
    if(!url){ alert('유효한 URL을 입력하세요.'); return; }
    $('gameFrame').src = url;
    setStatus('iframe 프리뷰 로드 완료');
  }

  function makeBatchInputs(){
    $('batchInputs').innerHTML = presets.map((p, idx) => `
      <div class="batch-row" data-row>
        <input data-w type="number" min="200" value="${p.width}" aria-label="batch ${idx+1} width" />
        <input data-h type="number" min="200" value="${p.height}" aria-label="batch ${idx+1} height" />
      </div>
    `).join('');
  }

  function wire(){
    $('presetBtns').innerHTML = presets.map(p => `<button class="preset ${p.id===state.preset.id?'active':''}" data-id="${p.id}">${p.label}</button>`).join('');
    $('presetBtns').addEventListener('click', (e) => {
      const b = e.target.closest('[data-id]');
      if(!b) return;
      const p = presets.find(x => x.id === b.dataset.id);
      if(p) setPreset(p);
    });

    $('loadBtn').addEventListener('click', loadPreview);
    $('captureBtn').addEventListener('click', captureCurrent);
    $('batchBtn').addEventListener('click', captureBatch);
    window.addEventListener('resize', fitPreview);
  }

  makeBatchInputs();
  wire();
  setPreset(state.preset);
  loadPreview();
})();
</script>
</body>
</html>
