<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.gitignore Generator — Select Tech Stacks</title>
<meta name="description" content="Generate .gitignore files by selecting your tech stacks. Node, Python, Rust, Go, Swift, Android, Unity, Xcode, and more.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--glass:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);--text:#e0e0e0;--text2:#888;--accent:#7c3aed;--accent2:#a78bfa;--success:#00b894;--chip:#1e1e2e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem}
.container{max-width:1000px;margin:0 auto}
h1{text-align:center;font-size:1.9rem;margin-bottom:.3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.subtitle{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:1.5rem}
.search-row{display:flex;gap:.75rem;margin-bottom:1.2rem;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:var(--glass);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:.65rem 1rem;font-size:.95rem;outline:none;transition:border-color .2s;backdrop-filter:blur(10px)}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text2)}
.btn{padding:.65rem 1.4rem;border-radius:10px;border:none;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:var(--glass);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.categories{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.cat-tab{padding:.35rem .9rem;background:var(--glass);border:1px solid var(--border);border-radius:20px;font-size:.8rem;cursor:pointer;transition:all .2s;color:var(--text2)}
.cat-tab:hover,.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.stacks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem;margin-bottom:1.5rem}
.stack-chip{display:flex;align-items:center;gap:.5rem;background:var(--chip);border:2px solid var(--border);border-radius:10px;padding:.55rem .8rem;cursor:pointer;transition:all .2s;user-select:none}
.stack-chip:hover{border-color:var(--accent);background:rgba(124,58,237,0.1)}
.stack-chip.selected{border-color:var(--accent);background:rgba(124,58,237,0.2)}
.stack-chip .icon{font-size:1.2rem;line-height:1}
.stack-chip .name{font-size:.8rem;font-weight:600;color:var(--text)}
.stack-chip.selected .name{color:var(--accent2)}
.selected-bar{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;margin-bottom:1rem;backdrop-filter:blur(10px);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;min-height:3rem}
.selected-tag{background:rgba(124,58,237,0.25);border:1px solid rgba(167,139,250,0.4);border-radius:20px;padding:.25rem .75rem;font-size:.78rem;color:var(--accent2);display:flex;align-items:center;gap:.4rem}
.selected-tag .rm{cursor:pointer;opacity:.6;font-size:1rem;line-height:1}
.selected-tag .rm:hover{opacity:1}
.output-section{display:none}
.output-section.show{display:block}
.output-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;flex-wrap:gap}
.output-title{font-size:1rem;font-weight:700;color:var(--text)}
.output-actions{display:flex;gap:.5rem}
.code-block{background:#0d0d1a;border:1px solid var(--border);border-radius:12px;padding:1rem;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.78rem;line-height:1.7;color:#cdd6f4;white-space:pre;overflow-x:auto;max-height:500px;overflow-y:auto}
.code-block .comment{color:#6c7086}
.code-block .section-head{color:var(--accent2);font-weight:700}
.line-count{color:var(--text2);font-size:.78rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--success);color:#000;padding:.6rem 1.2rem;border-radius:10px;font-weight:700;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.empty-state{text-align:center;color:var(--text2);padding:2rem;font-size:.9rem}
@media(max-width:600px){h1{font-size:1.4rem}.stacks-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}}
</style>
</head>
<body>
<div class="container">
  <h1>🚫 .gitignore Generator</h1>
  <p class="subtitle">Select your tech stacks to generate a combined .gitignore file</p>

  <div class="search-row">
    <input class="search-input" id="searchInput" placeholder="Search stacks… (Node, Python, Swift…)" oninput="filterStacks()">
    <button class="btn btn-ghost" onclick="clearAll()">Clear All</button>
    <button class="btn btn-primary" onclick="generate()">Generate ↓</button>
  </div>

  <div class="categories" id="categories"></div>

  <div class="selected-bar" id="selectedBar">
    <span style="color:var(--text2);font-size:.82rem">No stacks selected — click chips below to add</span>
  </div>

  <div class="stacks-grid" id="stacksGrid"></div>

  <div class="output-section" id="outputSection">
    <div class="output-header">
      <div>
        <span class="output-title">.gitignore</span>
        <span class="line-count" id="lineCount"></span>
      </div>
      <div class="output-actions">
        <button class="btn btn-ghost" style="font-size:.8rem;padding:.45rem 1rem" onclick="copyOutput()">Copy</button>
        <button class="btn btn-primary" style="font-size:.8rem;padding:.45rem 1rem" onclick="downloadOutput()">Download</button>
      </div>
    </div>
    <div class="code-block" id="outputBlock"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

const CATEGORIES = ['All',...[...new Set(STACKS.map(s=>s.cat))]];
let selectedIds = new Set();
let activeCategory = 'All';
let searchQuery = '';

function init(){
  // Render categories
  const catEl = document.getElementById('categories');
  catEl.innerHTML = CATEGORIES.map(c=>`<div class="cat-tab${c==='All'?' active':''}" onclick="setCategory('${c}')">${c}</div>`).join('');
  renderStacks();
}

function setCategory(cat){
  activeCategory = cat;
  document.querySelectorAll('.cat-tab').forEach(el=>{
    el.classList.toggle('active', el.textContent===cat);
  });
  renderStacks();
}

function filterStacks(){
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  renderStacks();
}

function renderStacks(){
  const filtered = STACKS.filter(s=>{
    const catOk = activeCategory==='All' || s.cat===activeCategory;
    const searchOk = !searchQuery || s.name.toLowerCase().includes(searchQuery) || s.id.includes(searchQuery);
    return catOk && searchOk;
  });
  const grid = document.getElementById('stacksGrid');
  if(!filtered.length){
    grid.innerHTML = '<div class="empty-state">No stacks match your search.</div>';
    return;
  }
  grid.innerHTML = filtered.map(s=>`
    <div class="stack-chip${selectedIds.has(s.id)?' selected':''}" onclick="toggleStack('${s.id}')" data-id="${s.id}">
      <span class="icon">${s.icon}</span>
      <span class="name">${s.name}</span>
    </div>`).join('');
}

function toggleStack(id){
  if(selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderSelectedBar();
  renderStacks();
  if(selectedIds.size>0) generate();
  else document.getElementById('outputSection').classList.remove('show');
}

function renderSelectedBar(){
  const bar = document.getElementById('selectedBar');
  if(!selectedIds.size){
    bar.innerHTML = '<span style="color:var(--text2);font-size:.82rem">No stacks selected — click chips below to add</span>';
    return;
  }
  bar.innerHTML = [...selectedIds].map(id=>{
    const s = STACKS.find(x=>x.id===id);
    return s ? `<div class="selected-tag">${s.icon} ${s.name} <span class="rm" onclick="toggleStack('${id}')">×</span></div>` : '';
  }).join('');
}

function generate(){
  if(!selectedIds.size){
    document.getElementById('outputSection').classList.remove('show');
    return;
  }
  const parts = [];
  const header = `# .gitignore — Generated by eastsea.xyz/tools/gitignore-generator
# Stacks: ${[...selectedIds].map(id=>STACKS.find(s=>s.id===id)?.name).join(', ')}
# Generated: ${new Date().toISOString().split('T')[0]}
`;
  parts.push(header);
  for(const id of selectedIds){
    const stack = STACKS.find(s=>s.id===id);
    if(stack) parts.push(stack.rules);
  }
  const output = parts.join('\n');
  const lines = output.split('\n').length;
  document.getElementById('lineCount').textContent = ` — ${lines} lines`;

  // Syntax highlight
  const highlighted = output.replace(/^(# .+)$/gm, '<span class="comment">$1</span>');
  document.getElementById('outputBlock').innerHTML = highlighted;
  window._gitignoreOutput = output;
  document.getElementById('outputSection').classList.add('show');
}

function copyOutput(){
  navigator.clipboard.writeText(window._gitignoreOutput||'').then(()=>showToast('Copied to clipboard!'));
}
function downloadOutput(){
  const blob = new Blob([window._gitignoreOutput||''], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '.gitignore';
  a.click();
  showToast('Downloaded .gitignore');
}
function clearAll(){
  selectedIds.clear();
  renderSelectedBar();
  renderStacks();
  document.getElementById('outputSection').classList.remove('show');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

init();
</script>
