<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gitignore Pattern Tester</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #131e37;
      --panel2: #1a2a48;
      --line: rgba(255,255,255,.14);
      --text: #ecf1ff;
      --muted: #a6b2d8;
      --brand: #8198ff;
      --good: #40d3a2;
      --bad: #ff7b93;
      --shadow: 0 18px 45px rgba(0,0,0,.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, #23386a 0, transparent 35%),
        radial-gradient(circle at 88% 0, #184a6c 0, transparent 30%),
        var(--bg);
    }
    .app {
      max-width: 1220px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      box-shadow: var(--shadow);
    }
    .head {
      padding: 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(129,152,255,.17), transparent);
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.4rem, 3vw, 2rem); }
    .sub { margin: 0; color: var(--muted); }

    .toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: rgba(0,0,0,.12);
    }
    .btn, textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }
    .btn {
      padding: 8px 12px;
      cursor: pointer;
      transition: .15s ease;
    }
    .btn:hover { border-color: var(--brand); transform: translateY(-1px); }
    .btn.primary {
      background: linear-gradient(135deg, rgba(129,152,255,.35), rgba(64,211,162,.2));
      border-color: rgba(129,152,255,.65);
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 640px;
    }
    .pane {
      border-right: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto auto 1fr;
    }
    .pane:last-child { border-right: none; }
    .pane h2 {
      margin: 0;
      padding: 12px 14px;
      font-size: 1rem;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.02);
    }
    .pane p {
      margin: 0;
      padding: 10px 14px;
      color: var(--muted);
      font-size: .84rem;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.02);
    }

    textarea {
      border-radius: 0;
      border: 0;
      resize: none;
      width: 100%;
      padding: 14px;
      outline: none;
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #0f1832;
    }

    .result-wrap {
      overflow: auto;
      border-top: 1px solid var(--line);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    th {
      color: var(--muted);
      position: sticky;
      top: 0;
      background: #12203d;
      z-index: 1;
    }
    .ignored { color: var(--bad); }
    .included { color: var(--good); }

    @media (max-width: 980px) {
      .split { grid-template-columns: 1fr; }
      .pane { border-right: none; border-bottom: 1px solid var(--line); }
      .pane:last-child { border-bottom: none; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="app">
    <header class="head">
      <h1>Gitignore Pattern Tester</h1>
      <p class="sub">Validate how .gitignore patterns match file paths, including negation and pattern order.</p>
    </header>

    <div class="toolbar">
      <button id="runBtn" class="btn primary">Run Test</button>
      <button id="sampleNode" class="btn">Load Node Sample</button>
      <button id="samplePython" class="btn">Load Python Sample</button>
      <button id="copyPatterns" class="btn">Copy Patterns</button>
    </div>

    <section class="split">
      <section class="pane">
        <h2>.gitignore Patterns</h2>
        <p>One pattern per line. Use <code>!</code> to re-include files.</p>
        <textarea id="patterns"></textarea>
      </section>

      <section class="pane" style="grid-template-rows:auto auto 220px 1fr;">
        <h2>Paths to Test</h2>
        <p>Enter relative paths (one per line) from repository root.</p>
        <textarea id="paths"></textarea>
        <div class="result-wrap">
          <table>
            <thead>
              <tr><th>Path</th><th>Status</th><th>Matched Pattern</th></tr>
            </thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script>
    const patternsEl = document.getElementById('patterns');
    const pathsEl = document.getElementById('paths');
    const bodyEl = document.getElementById('resultBody');

    const nodeSamplePatterns = `# Dependencies
node_modules/
.pnp/

# Build artifacts
dist/
coverage/
*.log

# Env
.env
.env.*

# Keep production env sample
!.env.example`;

    const nodeSamplePaths = `node_modules/react/index.js
src/main.ts
dist/app.js
coverage/lcov.info
.env
.env.example
npm-debug.log`;

    const pySamplePatterns = `# Python cache
__pycache__/
*.pyc

# Virtual env
.venv/
venv/

# Build
dist/
build/

# Keep docs build config
!build/docs.yml`;

    const pySamplePaths = `app/__pycache__/main.cpython-311.pyc
app/main.py
.venv/bin/python
build/docs.yml
build/temp/file.o
dist/app.whl`;

    function escapeRegex(str) {
      return str.replace(/[|\\{}()[\]^$+?.]/g, '\\$&');
    }

    function globToRegex(pattern) {
      // simplified gitignore-like matcher
      let p = pattern.trim();
      if (!p || p.startsWith('#')) return null;

      let negate = false;
      if (p.startsWith('!')) {
        negate = true;
        p = p.slice(1);
      }

      const dirOnly = p.endsWith('/');
      if (dirOnly) p = p.slice(0, -1);

      const anchored = p.startsWith('/');
      if (anchored) p = p.slice(1);

      const hasSlash = p.includes('/');

      let rx = '';
      for (let i = 0; i < p.length; i++) {
        const ch = p[i];
        const next = p[i + 1];

        if (ch === '*' && next === '*') {
          rx += '.*';
          i++;
        } else if (ch === '*') {
          rx += '[^/]*';
        } else if (ch === '?') {
          rx += '[^/]';
        } else {
          rx += escapeRegex(ch);
        }
      }

      let final;
      if (anchored) {
        final = '^' + rx + (dirOnly ? '(?:/.*)?$' : '$');
      } else if (hasSlash) {
        final = '^(?:.*\/)?' + rx + (dirOnly ? '(?:/.*)?$' : '$');
      } else {
        final = '^(?:.*\/)?' + rx + (dirOnly ? '(?:/.*)?$' : '(?:$|\/.*$)');
      }

      return { negate, raw: pattern, regex: new RegExp(final) };
    }

    function evaluate(path, compiled) {
      const p = path.replace(/^\.\//, '').trim();
      let ignored = false;
      let matched = '(none)';

      compiled.forEach(rule => {
        if (!rule) return;
        if (rule.regex.test(p)) {
          ignored = !rule.negate;
          matched = rule.raw;
        }
      });

      return { path: p, ignored, matched };
    }

    function run() {
      const compiled = patternsEl.value.split(/\r?\n/).map(globToRegex);
      const paths = pathsEl.value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);

      if (!paths.length) {
        bodyEl.innerHTML = '<tr><td colspan="3">Add at least one path to test.</td></tr>';
        return;
      }

      bodyEl.innerHTML = paths.map(p => {
        const r = evaluate(p, compiled);
        const status = r.ignored
          ? `<span class="ignored">IGNORED</span>`
          : `<span class="included">INCLUDED</span>`;
        return `<tr>
          <td>${r.path}</td>
          <td>${status}</td>
          <td>${r.matched}</td>
        </tr>`;
      }).join('');
    }

    document.getElementById('runBtn').addEventListener('click', run);

    document.getElementById('sampleNode').addEventListener('click', () => {
      patternsEl.value = nodeSamplePatterns;
      pathsEl.value = nodeSamplePaths;
      run();
    });

    document.getElementById('samplePython').addEventListener('click', () => {
      patternsEl.value = pySamplePatterns;
      pathsEl.value = pySamplePaths;
      run();
    });

    document.getElementById('copyPatterns').addEventListener('click', () => {
      if (!patternsEl.value.trim()) return;
      navigator.clipboard.writeText(patternsEl.value);
    });

    patternsEl.value = nodeSamplePatterns;
    pathsEl.value = nodeSamplePaths;
    run();
  </script>
</body>
</html>
