<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Gradient CSS Generator - Create modern gradients, preview instantly, and copy production-ready CSS. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>Gradient CSS Generator</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121b32;
      --border: #2a3a66;
      --text: #ecf2ff;
      --muted: #a5b1d4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(700px 480px at 110% -10%, #2f2f88 0%, transparent 60%),
        radial-gradient(900px 600px at -10% 110%, #144b67 0%, transparent 55%),
        var(--bg);
      padding: 18px;
    }
    .app {
      width: min(1000px, 100%);
      margin: 0 auto;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 20px 45px rgba(0,0,0,.3);
    }
    h1 { margin: 4px 0; font-size: clamp(1.2rem, 2.2vw, 1.8rem); }
    p { color: var(--muted); margin-top: 6px; }
    .grid { display: grid; grid-template-columns: 360px 1fr; gap: 14px; }
    .panel {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: var(--panel);
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    label { display: grid; gap: 5px; color: var(--muted); font-size: .88rem; }
    input, select, button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0c142a;
      color: var(--text);
      padding: 9px;
      font: inherit;
    }
    input[type="color"] { padding: 2px; height: 40px; }
    button { cursor: pointer; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .preview {
      border-radius: 14px;
      min-height: 330px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .badge {
      position: absolute;
      right: 12px;
      bottom: 12px;
      font-size: .78rem;
      color: #dbe6ff;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      padding: 6px 10px;
      backdrop-filter: blur(5px);
    }
    textarea {
      width: 100%;
      margin-top: 10px;
      min-height: 100px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #091022;
      color: var(--text);
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .preview { min-height: 240px; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="app">
    <h1>Gradient CSS Generator</h1>
    <p>Create modern gradients, preview instantly, and copy production-ready CSS.</p>

    <section class="grid">
      <div class="panel">
        <div class="row">
          <label>Type
            <select id="type">
              <option value="linear">Linear</option>
              <option value="radial">Radial</option>
            </select>
          </label>
          <label>Angle
            <input id="angle" type="range" min="0" max="360" value="135" />
          </label>
        </div>
        <div class="row">
          <label>Color 1 <input id="c1" type="color" value="#7c6cff" /></label>
          <label>Stop 1 (%) <input id="s1" type="number" min="0" max="100" value="0" /></label>
        </div>
        <div class="row">
          <label>Color 2 <input id="c2" type="color" value="#39d0ff" /></label>
          <label>Stop 2 (%) <input id="s2" type="number" min="0" max="100" value="50" /></label>
        </div>
        <div class="row">
          <label>Color 3 <input id="c3" type="color" value="#43f3b4" /></label>
          <label>Stop 3 (%) <input id="s3" type="number" min="0" max="100" value="100" /></label>
        </div>
        <div class="actions">
          <button id="random">Randomize</button>
          <button id="copy">Copy CSS</button>
        </div>
      </div>

      <div class="panel">
        <div id="preview" class="preview"><span id="badge" class="badge"></span></div>
        <textarea id="css" readonly></textarea>
      </div>
    </section>
  </main>

  <script>
    const ids = ['type','angle','c1','c2','c3','s1','s2','s3'];
    const els = Object.fromEntries(ids.map(id => [id, document.getElementById(id)]));
    const preview = document.getElementById('preview');
    const cssOut = document.getElementById('css');
    const badge = document.getElementById('badge');

    const clamp = n => Math.max(0, Math.min(100, Number(n) || 0));

    function buildGradient() {
      const s1 = clamp(els.s1.value), s2 = clamp(els.s2.value), s3 = clamp(els.s3.value);
      const stops = `${els.c1.value} ${s1}%, ${els.c2.value} ${s2}%, ${els.c3.value} ${s3}%`;
      const value = els.type.value === 'linear'
        ? `linear-gradient(${els.angle.value}deg, ${stops})`
        : `radial-gradient(circle at center, ${stops})`;
      preview.style.background = value;
      badge.textContent = els.type.value === 'linear' ? `${els.angle.value}°` : 'radial';
      cssOut.value = `background: ${value};`;
    }

    function randomColor() {
      return `#${Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')}`;
    }

    ids.forEach(id => els[id].addEventListener('input', buildGradient));

    document.getElementById('random').onclick = () => {
      els.c1.value = randomColor();
      els.c2.value = randomColor();
      els.c3.value = randomColor();
      els.angle.value = Math.floor(Math.random() * 361);
      els.s1.value = 0;
      els.s2.value = 35 + Math.floor(Math.random() * 30);
      els.s3.value = 100;
      buildGradient();
    };

    document.getElementById('copy').onclick = async () => {
      try {
        await navigator.clipboard.writeText(cssOut.value);
        badge.textContent = 'Copied!';
        setTimeout(buildGradient, 1100);
      } catch {
        badge.textContent = 'Clipboard blocked';
      }
    };

    buildGradient();
  </script>
</body>
</html>
