<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매출총이익률 계산기 | Gross Margin Calculator</title>
  <meta name="description" content="매출, 매출원가를 기반으로 매출총이익률, 공헌이익, 목표 마진을 계산합니다." />
  <style>
    :root{--bg:#f5f7ff;--card:#fff;--line:#dce5f6;--text:#1f2937;--muted:#64748b;--pri:#4f46e5;--pri2:#0ea5e9;--ok:#16a34a;--warn:#d97706;--bad:#dc2626}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edf3ff,#f8fbff);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 42px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.92rem}
    .back{text-decoration:none;color:#1e3a8a;border:1px solid var(--line);background:#fff;padding:8px 11px;border-radius:10px;font-weight:700;font-size:.88rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 10px 28px rgba(79,70,229,.08)}
    h2{margin:0 0 10px;font-size:1rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:700}
    input,button{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);font-size:.92rem}
    input:focus{outline:2px solid rgba(79,70,229,.2);border-color:#7b73ff}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;font-weight:800}.ghost{background:#f4f7ff;border:1px solid var(--line);color:#1f2937}
    .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{border:1px solid var(--line);background:#f9fbff;border-radius:12px;padding:10px}.k{font-size:.75rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .msg{margin-top:8px;border:1px solid var(--line);border-radius:10px;background:#f8fbff;padding:10px;font-size:.9rem;line-height:1.45}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>📊 매출총이익률 계산기</h1>
      <p class="sub">매출, 매출원가, 목표 마진을 입력해 손익 구조를 분석합니다.</p>
    </div>
    <a class="back" href="/">Back to Portal</a>
  </div>

  <section class="grid">
    <article class="card">
      <h2>입력</h2>
      <div class="two">
        <div><label for="revenue">매출 (원)</label><input id="revenue" type="number" min="0" step="1000" value="85000000"></div>
        <div><label for="cogs">매출원가 (원)</label><input id="cogs" type="number" min="0" step="1000" value="46000000"></div>
        <div><label for="units">판매 수량 (개)</label><input id="units" type="number" min="1" step="1" value="1200"></div>
        <div><label for="targetMargin">목표 매출총이익률 (%)</label><input id="targetMargin" type="number" min="0" max="100" step="0.1" value="55"></div>
      </div>
      <div class="btns">
        <button id="calcBtn" type="button">계산</button>
        <button id="sampleBtn" class="ghost" type="button">샘플</button>
      </div>
    </article>

    <article class="card">
      <h2>결과</h2>
      <div class="kpis">
        <div class="kpi"><div class="k">매출총이익</div><div class="v" id="grossProfit">-</div></div>
        <div class="kpi"><div class="k">매출총이익률</div><div class="v" id="grossMargin">-</div></div>
        <div class="kpi"><div class="k">단위 공헌이익</div><div class="v" id="unitMargin">-</div></div>
        <div class="kpi"><div class="k">손익분기 매출(목표 마진)</div><div class="v" id="targetRevenue">-</div></div>
        <div class="kpi"><div class="k">목표 마진 대비 차이</div><div class="v" id="gap">-</div></div>
        <div class="kpi"><div class="k">원가율</div><div class="v" id="cogsRatio">-</div></div>
      </div>
      <div class="msg" id="msg">입력값을 바꾸면 자동 계산됩니다.</div>
    </article>
  </section>
</main>

<script>
  const $=(id)=>document.getElementById(id);
  const won=(n)=>'₩'+Math.round(n||0).toLocaleString('ko-KR');
  const pct=(v)=>`${(v*100).toFixed(2)}%`;

  function run(){
    const revenue=Number($('revenue').value);
    const cogs=Number($('cogs').value);
    const units=Math.max(1,Number($('units').value)||1);
    const target=Number($('targetMargin').value)/100;

    if(revenue<=0){ $('msg').textContent='매출은 0보다 커야 합니다.'; return; }

    const grossProfit=revenue-cogs;
    const margin=grossProfit/revenue;
    const unitMargin=grossProfit/units;
    const targetRevenue=target>0?cogs/(1-target):0;
    const gap=margin-target;
    const cogsRatio=cogs/revenue;

    $('grossProfit').textContent=won(grossProfit);
    $('grossMargin').textContent=pct(margin);
    $('grossMargin').className=`v ${margin>=target?'ok':'warn'}`;
    $('unitMargin').textContent=won(unitMargin);
    $('targetRevenue').textContent=target>0?won(targetRevenue):'-';
    $('gap').textContent=pct(gap);
    $('gap').className=`v ${gap>=0?'ok':'bad'}`;
    $('cogsRatio').textContent=pct(cogsRatio);

    const msg = gap>=0
      ? '✅ 목표 매출총이익률을 충족합니다. 가격 경쟁력과 비용 통제를 지속하세요.'
      : '⚠️ 목표 마진 미달입니다. 가격 조정 또는 원가 절감이 필요합니다.';
    $('msg').textContent=msg;
  }

  $('calcBtn').addEventListener('click',run);
  $('sampleBtn').addEventListener('click',()=>{
    $('revenue').value=92000000;
    $('cogs').value=51000000;
    $('units').value=1400;
    $('targetMargin').value=52;
    run();
  });
  ['revenue','cogs','units','targetMargin'].forEach(id=>$(id).addEventListener('input',run));
  run();
</script>
</body>
</html>
