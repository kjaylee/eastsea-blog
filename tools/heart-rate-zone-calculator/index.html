<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심박수 존 계산기 | EastSea Tools</title>
<meta name="description" content="최대심박수/안정시 심박수를 기반으로 운동 강도별 목표 심박수 존 계산">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--card:#fff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--pri:#dc2626}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:860px;margin:0 auto;padding:18px}
a{color:var(--muted);text-decoration:none}
h1{margin:10px 0;font-size:1.5rem}
.desc{color:var(--muted);font-size:.92rem;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
label{display:block;font-size:.84rem;color:var(--muted);margin-bottom:4px}
input,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font:inherit}
button{margin-top:10px;border:0;background:var(--pri);color:#fff;padding:10px 12px;border-radius:10px;font-weight:700;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:8px}
th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;font-size:.92rem}
th{font-size:.84rem;color:var(--muted)}
.zone-badge{padding:4px 8px;border-radius:999px;font-size:.75rem;font-weight:700;color:#fff}
.z1{background:#60a5fa}.z2{background:#34d399}.z3{background:#f59e0b}.z4{background:#f97316}.z5{background:#ef4444}
.note{font-size:.86rem;color:var(--muted);margin-top:8px;line-height:1.5}
@media (max-width:680px){.grid{grid-template-columns:1fr}}
</style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<div class="wrap">
  <a href="/">← 도구 목록</a>
  <h1>❤️ 심박수 존 계산기</h1>
  <p class="desc">운동 목적(지방연소, 지구력, 인터벌)에 맞춰 목표 심박수 범위를 빠르게 계산하세요.</p>

  <section class="card">
    <div class="grid">
      <div>
        <label>나이</label>
        <input id="age" type="number" min="10" max="100" value="30">
      </div>
      <div>
        <label>안정시 심박수 (bpm)</label>
        <input id="rest" type="number" min="35" max="120" value="60">
      </div>
      <div>
        <label>최대 심박수 계산식</label>
        <select id="formula" onchange="syncMaxHr()">
          <option value="220">220 - 나이 (기본)</option>
          <option value="tanaka">208 - 0.7×나이 (Tanaka)</option>
          <option value="manual">직접 입력</option>
        </select>
      </div>
      <div>
        <label>최대 심박수 (bpm)</label>
        <input id="max" type="number" value="190">
      </div>
      <div>
        <label>계산 방식</label>
        <select id="mode">
          <option value="karvonen">Karvonen (권장)</option>
          <option value="max">% Max HR</option>
        </select>
      </div>
    </div>
    <button onclick="calculate()">계산하기</button>
  </section>

  <section class="card">
    <div id="summary" class="note">나이와 심박수를 입력한 뒤 계산하세요.</div>
    <table>
      <thead><tr><th>존</th><th>강도</th><th>목표 심박수</th><th>목적</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <p class="note">※ 의학적 진단이 아닌 일반 피트니스 참고용입니다. 기저질환이 있다면 전문가와 상담하세요.</p>
  </section>
</div>

<script>
const ZONES=[
  {name:'Zone 1',cls:'z1',range:[0.5,0.6],intensity:'매우 가벼움',goal:'회복, 워밍업'},
  {name:'Zone 2',cls:'z2',range:[0.6,0.7],intensity:'가벼움',goal:'지방 연소, 유산소 베이스'},
  {name:'Zone 3',cls:'z3',range:[0.7,0.8],intensity:'중간',goal:'심폐 지구력 향상'},
  {name:'Zone 4',cls:'z4',range:[0.8,0.9],intensity:'높음',goal:'템포/임계치 훈련'},
  {name:'Zone 5',cls:'z5',range:[0.9,1.0],intensity:'최대',goal:'인터벌, 스피드'}
];

function byId(id){return document.getElementById(id);}

function syncMaxHr(){
  const age=parseFloat(byId('age').value)||0;
  const f=byId('formula').value;
  if(f==='220')byId('max').value=Math.round(220-age);
  else if(f==='tanaka')byId('max').value=Math.round(208-0.7*age);
  byId('max').disabled=f!=='manual';
}

function calculate(){
  const age=parseFloat(byId('age').value);
  const rest=parseFloat(byId('rest').value);
  const max=parseFloat(byId('max').value);
  const mode=byId('mode').value;
  if(!(age>=10&&age<=100&&rest>0&&max>rest)){alert('입력값을 확인하세요.');return;}

  const rows=ZONES.map(z=>{
    let low,high;
    if(mode==='karvonen'){
      low=Math.round((max-rest)*z.range[0]+rest);
      high=Math.round((max-rest)*z.range[1]+rest);
    }else{
      low=Math.round(max*z.range[0]);
      high=Math.round(max*z.range[1]);
    }
    return `<tr>
      <td><span class="zone-badge ${z.cls}">${z.name}</span></td>
      <td>${z.intensity}</td>
      <td><strong>${low} ~ ${high} bpm</strong></td>
      <td>${z.goal}</td>
    </tr>`;
  }).join('');

  byId('rows').innerHTML=rows;
  byId('summary').textContent=`최대 심박수 ${max} bpm · 안정시 ${rest} bpm · 계산법 ${mode==='karvonen'?'Karvonen':'% Max HR'}`;
}

byId('age').addEventListener('input',()=>{if(byId('formula').value!=='manual')syncMaxHr();});
syncMaxHr();
calculate();
</script>
</body>
</html>
