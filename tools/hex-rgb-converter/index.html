  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card2: #16213e;
      --line: #2a2a4a;
      --text: #e4e4f0;
      --sub: #8888aa;
      --accent: #ec4899;
      --accent2: #f472b6;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif; min-height: 100vh; padding: 20px; }
    .wrap { max-width: 720px; margin: 0 auto; }
    header { text-align: center; padding: 30px 0 24px; }
    h1 { font-size: clamp(1.4rem, 4vw, 2rem); color: var(--accent2); margin-bottom: 8px; }
    .lead { color: var(--sub); font-size: 0.92rem; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; margin-bottom: 14px; }
    .color-preview { width: 100%; height: 120px; border-radius: 10px; margin-bottom: 18px; border: 2px solid var(--line); transition: background-color .15s; position: relative; overflow: hidden; cursor: pointer; }
    .preview-label { position: absolute; bottom: 10px; right: 14px; font-size: 0.78rem; color: rgba(255,255,255,.7); background: rgba(0,0,0,.35); padding: 3px 8px; border-radius: 20px; }
    .picker-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    input[type="color"] { width: 52px; height: 52px; border: none; border-radius: 8px; cursor: pointer; padding: 0; background: none; flex-shrink: 0; }

    .field input { width: 100%; background: var(--card2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 10px 40px 10px 12px; font-size: 0.95rem; font-family: 'Courier New', monospace; outline: none; transition: border-color .2s; }

    .slider-row label span { color: var(--text); font-weight: 600; }
    input[type="range"] { width: 100%; appearance: none; -webkit-appearance: none; height: 6px; border-radius: 3px; outline: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent2); border: 2px solid #fff; cursor: pointer; }

    .css-copy:hover { border-color: var(--accent); color: var(--accent2); }

    .harmony-swatch:hover { transform: scale(1.08); border-color: rgba(255,255,255,.3); }
    .harmony-label { font-size: 0.72rem; color: var(--sub); text-align: center; margin-top: 4px; }

<body>
<div class="wrap">
  <header>
    <h1>HEX ↔ RGB ↔ HSL</h1>
    <p class="lead">색상 코드 즉시 변환 · HEX, RGB, HSL, HSV · CSS 복사 지원</p>
  </header>

  <div class="card">
    <div class="color-preview" id="preview" onclick="document.getElementById('colorPicker').click()">
      <div class="preview-label">클릭하여 피커 열기</div>
    </div>
    <div class="picker-row">
      <input type="color" id="colorPicker" value="#7c3aed" oninput="fromPicker(this.value)" />
      <span class="picker-hint">색상 피커로 선택하거나 아래에 직접 입력하세요<br>Pick a color or type values below</span>
    </div>
    <div class="inputs-grid">
      <div class="field">
        <label>HEX</label>
        <input type="text" id="hexInput" value="#7c3aed" placeholder="#rrggbb" oninput="fromHex(this.value)" />
        <span class="copy-icon" onclick="copyField('hexInput', this)">📋</span>
      </div>
      <div class="field">
        <label>RGB</label>
        <input type="text" id="rgbInput" value="rgb(124, 58, 237)" placeholder="rgb(r, g, b)" oninput="fromRgb(this.value)" />
        <span class="copy-icon" onclick="copyField('rgbInput', this)">📋</span>
      </div>
      <div class="field">
        <label>HSL</label>
        <input type="text" id="hslInput" value="hsl(263, 84%, 58%)" placeholder="hsl(h, s%, l%)" oninput="fromHsl(this.value)" />
        <span class="copy-icon" onclick="copyField('hslInput', this)">📋</span>
      </div>
      <div class="field">
        <label>HSV</label>
        <input type="text" id="hsvInput" value="hsv(263, 75%, 93%)" placeholder="hsv(h, s%, v%)" readonly />
        <span class="copy-icon" onclick="copyField('hsvInput', this)">📋</span>
      </div>
    </div>
    <div class="sliders">
      <div class="slider-row">
        <label>R (Red) <span id="rVal">124</span></label>
        <input type="range" id="rSlider" min="0" max="255" value="124" oninput="fromSliders()" style="background:linear-gradient(to right,#000,#f00)" />
      </div>
      <div class="slider-row">
        <label>G (Green) <span id="gVal">58</span></label>
        <input type="range" id="gSlider" min="0" max="255" value="58" oninput="fromSliders()" style="background:linear-gradient(to right,#000,#0f0)" />
      </div>
      <div class="slider-row">
        <label>B (Blue) <span id="bVal">237</span></label>
        <input type="range" id="bSlider" min="0" max="255" value="237" oninput="fromSliders()" style="background:linear-gradient(to right,#000,#00f)" />
      </div>
    </div>
    <div class="css-output">
      <h3>CSS 코드</h3>
      <div class="css-line"><span id="cssHex">#7c3aed</span><button class="css-copy" onclick="copyText(document.getElementById('cssHex').textContent, this)">Copy</button></div>
      <div class="css-line"><span id="cssRgb">rgb(124, 58, 237)</span><button class="css-copy" onclick="copyText(document.getElementById('cssRgb').textContent, this)">Copy</button></div>
      <div class="css-line"><span id="cssHsl">hsl(263, 84%, 58%)</span><button class="css-copy" onclick="copyText(document.getElementById('cssHsl').textContent, this)">Copy</button></div>
    </div>
  </div>

  <div class="card">
    <div class="swatches-title">색상 조화 (Color Harmony)</div>
    <div class="harmony-grid" id="harmonyGrid"></div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px" id="harmonyLabels"></div>
  </div>

  <div class="card">
    <div class="swatches-title">빠른 색상 선택 · Quick Swatches</div>
    <div class="swatches" id="swatches"></div>
  </div>
</div>

<script>
const SWATCHES = ['#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#14b8a6','#06b6d4','#0ea5e9','#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899','#f43f5e','#ffffff','#d1d5db','#6b7280','#374151','#1f2937','#111827','#000000','#7c3aed','#dc2626','#16a34a','#ca8a04','#0284c7','#7e22ce','#db2777'];

function hexToRgb(hex) {
  hex = hex.replace(/^#/, '');
  if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
  if (hex.length !== 6) return null;
  const n = parseInt(hex, 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function rgbToHex(r,g,b) { return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join(''); }
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}
    h/=6;
  }
  return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}
function hslToRgb(h,s,l) {
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1);};
  return { r: Math.round(f(0)*255), g: Math.round(f(8)*255), b: Math.round(f(4)*255) };
}
function rgbToHsv(r,g,b) {
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0;
  if(d){if(max===r)h=(g-b)/d%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=Math.round(h*60);if(h<0)h+=360;}
  return {h,s:max?Math.round(d/max*100):0,v:Math.round(max*100)};
}

function updateAll(r,g,b) {
  const hex = rgbToHex(r,g,b);
  const hsl = rgbToHsl(r,g,b);
  const hsv = rgbToHsv(r,g,b);
  document.getElementById('hexInput').value = hex;
  document.getElementById('rgbInput').value = `rgb(${r}, ${g}, ${b})`;
  document.getElementById('hslInput').value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
  document.getElementById('hsvInput').value = `hsv(${hsv.h}, ${hsv.s}%, ${hsv.v}%)`;
  document.getElementById('rSlider').value = r;
  document.getElementById('gSlider').value = g;
  document.getElementById('bSlider').value = b;
  document.getElementById('rVal').textContent = r;
  document.getElementById('gVal').textContent = g;
  document.getElementById('bVal').textContent = b;
  document.getElementById('preview').style.backgroundColor = hex;
  document.getElementById('colorPicker').value = hex;
  document.getElementById('cssHex').textContent = hex;
  document.getElementById('cssRgb').textContent = `rgb(${r}, ${g}, ${b})`;
  document.getElementById('cssHsl').textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
  buildHarmony(hsl.h, hsl.s, hsl.l);
}

function fromPicker(v) { const c=hexToRgb(v); if(c) updateAll(c.r,c.g,c.b); }
function fromHex(v) { const c=hexToRgb(v.trim()); if(c) updateAll(c.r,c.g,c.b); }
function fromRgb(v) { const m=v.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/); if(m) updateAll(+m[1],+m[2],+m[3]); }
function fromHsl(v) { const m=v.match(/(\d+)[,\s]+(\d+)%?[,\s]+(\d+)%?/); if(m){const c=hslToRgb(+m[1],+m[2],+m[3]);updateAll(c.r,c.g,c.b);} }
function fromSliders() {
  const r=+document.getElementById('rSlider').value;
  const g=+document.getElementById('gSlider').value;
  const b=+document.getElementById('bSlider').value;
  updateAll(r,g,b);
}

function buildHarmony(h, s, l) {
  const harmonies = [
    {name:'Base', h, s, l},
    {name:'Comp', h:(h+180)%360, s, l},
    {name:'Tri 1', h:(h+120)%360, s, l},
    {name:'Tri 2', h:(h+240)%360, s, l},
    {name:'Analog', h:(h+30)%360, s, l},
  ];
  const grid = document.getElementById('harmonyGrid');
  grid.innerHTML = harmonies.map(({name,h:hh,s:ss,l:ll}) => {
    const c=hslToRgb(hh,ss,ll); const hex=rgbToHex(c.r,c.g,c.b);
    return `<div><div class="harmony-swatch" style="background:${hex}" title="${hex}" onclick="updateAll(${c.r},${c.g},${c.b})"></div><div class="harmony-label">${name}<br><span style="font-size:.68rem;color:var(--text)">${hex}</span></div></div>`;
  }).join('');
}

function buildSwatches() {
  const el = document.getElementById('swatches');
  el.innerHTML = SWATCHES.map(c => {
    const rgb = hexToRgb(c);
    return `<div class="swatch" style="background:${c}" title="${c}" onclick="updateAll(${rgb.r},${rgb.g},${rgb.b})"></div>`;
  }).join('');
}

function copyField(id, icon) {
  navigator.clipboard.writeText(document.getElementById(id).value).then(() => {
    icon.textContent = '✓'; icon.classList.add('copied');
    setTimeout(() => { icon.textContent = '📋'; icon.classList.remove('copied'); }, 1500);
  });
}
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!'; btn.style.color = '#22c55e';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 1500);
  });
}

buildSwatches();
fromPicker('#7c3aed');
</script>
</body>
</html>
