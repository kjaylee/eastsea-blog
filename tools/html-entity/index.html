<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 엔티티 변환기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .converter-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            resize: vertical;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .reference-table {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
        }

        .reference-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .entity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .entity-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .entity-char {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .entity-code {
            color: #666;
        }

        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .success-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .entity-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            }

            .container {
                background: #2a2a3e;
                color: #e0e0e0;
            }

            .subtitle {
                color: #a0a0a0;
            }

            .section-title {
                color: #e0e0e0;
            }

            textarea {
                background: #1a1a2e;
                color: #e0e0e0;
                border-color: #444;
            }

            .reference-table {
                background: #1a1a2e;
            }

            .reference-title {
                color: #e0e0e0;
            }

            .entity-item {
                background: #2a2a3e;
                border: 1px solid #444;
            }

            .entity-code {
                color: #a0a0a0;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <h1>🔤 HTML 엔티티 변환기</h1>
        <p class="subtitle">특수문자와 HTML 엔티티 코드를 상호 변환하세요</p>

        <div class="converter-section">
            <div class="section-title">📝 입력 텍스트</div>
            <textarea id="inputText" placeholder="변환할 텍스트를 입력하세요...&#10;예: <div>Hello &amp; Welcome!</div>"></textarea>
            <div class="btn-group">
                <button class="btn" onclick="encodeToEntity()">→ 엔티티로 인코딩</button>
                <button class="btn btn-secondary" onclick="decodeFromEntity()">← 엔티티 디코딩</button>
            </div>
        </div>

        <div class="converter-section">
            <div class="section-title">✨ 결과</div>
            <textarea id="outputText" readonly placeholder="변환 결과가 여기에 표시됩니다"></textarea>
            <div class="btn-group">
                <button class="btn" onclick="copyResult()">📋 결과 복사</button>
                <button class="btn btn-secondary" onclick="clearAll()">🗑️ 초기화</button>
            </div>
        </div>

        <div class="reference-table">
            <div class="reference-title">📚 자주 사용되는 HTML 엔티티</div>
            <div class="entity-grid">
                <div class="entity-item">
                    <span class="entity-char">&lt;</span>
                    <span class="entity-code">&amp;lt;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">&gt;</span>
                    <span class="entity-code">&amp;gt;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">&amp;</span>
                    <span class="entity-code">&amp;amp;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">"</span>
                    <span class="entity-code">&amp;quot;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">'</span>
                    <span class="entity-code">&amp;apos;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char"> </span>
                    <span class="entity-code">&amp;nbsp;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">©</span>
                    <span class="entity-code">&amp;copy;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">®</span>
                    <span class="entity-code">&amp;reg;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">™</span>
                    <span class="entity-code">&amp;trade;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">€</span>
                    <span class="entity-code">&amp;euro;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">£</span>
                    <span class="entity-code">&amp;pound;</span>
                </div>
                <div class="entity-item">
                    <span class="entity-char">¥</span>
                    <span class="entity-code">&amp;yen;</span>
                </div>
            </div>
        </div>
    </div>

    <div class="success-message" id="successMessage">
        ✓ 클립보드에 복사되었습니다!
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const successMessage = document.getElementById('successMessage');

        function encodeToEntity() {
            const text = inputText.value;
            if (!text) {
                alert('변환할 텍스트를 입력하세요.');
                return;
            }

            const encoded = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');

            outputText.value = encoded;
        }

        function decodeFromEntity() {
            const text = inputText.value;
            if (!text) {
                alert('변환할 텍스트를 입력하세요.');
                return;
            }

            const textarea = document.createElement('textarea');
            textarea.innerHTML = text;
            outputText.value = textarea.value;
        }

        function copyResult() {
            if (!outputText.value) {
                alert('복사할 결과가 없습니다.');
                return;
            }

            outputText.select();
            navigator.clipboard.writeText(outputText.value).then(() => {
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 2000);
            });
        }

        function clearAll() {
            inputText.value = '';
            outputText.value = '';
        }

        // 샘플 텍스트
        inputText.value = '<div class="container">\n  <p>Hello & Welcome!</p>\n  <a href="#">Click "here"</a>\n</div>';
    </script>
</body>
</html>
