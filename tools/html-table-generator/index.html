<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HTML Table Generator — create styled HTML tables with custom rows, columns, headers, and CSS. Copy-paste ready code instantly.">
  <title>HTML Table Generator</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TVJ4W0GQNG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TVJ4W0GQNG');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber-50: #fffbeb;
      --amber-100: #fef3c7;
      --amber-200: #fde68a;
      --amber-400: #fbbf24;
      --amber-500: #f59e0b;
      --amber-600: #d97706;
      --amber-700: #b45309;
      --stone-50: #fafaf9;
      --stone-100: #f5f5f4;
      --stone-200: #e7e5e4;
      --stone-300: #d6d3d1;
      --stone-500: #78716c;
      --stone-700: #44403c;
      --stone-900: #1c1917;
      --green-500: #22c55e;
      --red-500: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--amber-50);
      color: var(--stone-900);
      min-height: 100vh;
      padding: 16px;
    }

    header {
      text-align: center;
      padding: 24px 16px 16px;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      color: var(--amber-700);
      letter-spacing: -0.02em;
    }
    header p { color: var(--stone-500); margin-top: 6px; font-size: 0.95rem; }

    .container { max-width: 1100px; margin: 0 auto; }

    .card {
      background: #fff;
      border-radius: 14px;
      border: 1.5px solid var(--amber-200);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(245,158,11,0.08);
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--amber-700);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--stone-700); margin-bottom: 5px; }
    input[type="number"], select {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid var(--stone-300);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--stone-50);
      color: var(--stone-900);
      transition: border-color 0.2s;
    }
    input[type="number"]:focus, select:focus {
      outline: none;
      border-color: var(--amber-500);
    }
    input[type="checkbox"] { accent-color: var(--amber-500); width: 16px; height: 16px; margin-right: 6px; }
    .checkbox-row { display: flex; align-items: center; font-size: 0.9rem; color: var(--stone-700); padding-top: 22px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--amber-500); color: #fff; }
    .btn-primary:hover { background: var(--amber-600); transform: translateY(-1px); }
    .btn-secondary { background: var(--stone-100); color: var(--stone-700); border: 1.5px solid var(--stone-300); }
    .btn-secondary:hover { background: var(--stone-200); }
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

    /* Editable table */
    .table-wrapper { overflow-x: auto; }
    #editable-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 300px;
    }
    #editable-table td, #editable-table th {
      border: 2px solid var(--amber-200);
      padding: 0;
      min-width: 80px;
    }
    #editable-table th { background: var(--amber-100); }
    #editable-table td input, #editable-table th input {
      border: none;
      background: transparent;
      padding: 8px 10px;
      width: 100%;
      font-size: 0.9rem;
      color: var(--stone-900);
      font-weight: inherit;
    }
    #editable-table th input { font-weight: 700; }
    #editable-table td input:focus, #editable-table th input:focus { outline: none; background: var(--amber-50); }

    .style-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .style-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 2px solid var(--stone-200);
      background: var(--stone-50);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--stone-700);
      transition: all 0.15s;
      text-align: center;
    }
    .style-btn.active { border-color: var(--amber-500); background: var(--amber-50); color: var(--amber-700); }

    /* Preview table styles */
    #preview-area { overflow-x: auto; }
    .tbl-basic { border-collapse: collapse; width: 100%; }
    .tbl-basic th, .tbl-basic td { border: 1px solid #aaa; padding: 8px 12px; }
    .tbl-basic th { background: #f0f0f0; }
    .tbl-striped { border-collapse: collapse; width: 100%; }
    .tbl-striped th, .tbl-striped td { padding: 10px 14px; border-bottom: 1px solid #e0e0e0; }
    .tbl-striped th { background: var(--amber-500); color: #fff; }
    .tbl-striped tr:nth-child(even) td { background: #fff8e1; }
    .tbl-modern { border-collapse: separate; border-spacing: 0; width: 100%; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    .tbl-modern th { background: var(--stone-900); color: #fff; padding: 12px 16px; text-align: left; }
    .tbl-modern td { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; }
    .tbl-modern tr:last-child td { border-bottom: none; }
    .tbl-minimal { border-collapse: collapse; width: 100%; }
    .tbl-minimal th, .tbl-minimal td { padding: 10px 14px; border-bottom: 2px solid var(--amber-200); text-align: left; }
    .tbl-minimal th { border-bottom: 3px solid var(--amber-500); font-weight: 800; }

    textarea {
      width: 100%;
      padding: 14px;
      border: 1.5px solid var(--stone-300);
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      background: var(--stone-900);
      color: #e0e0e0;
      resize: vertical;
      min-height: 160px;
      line-height: 1.6;
    }

    .copy-success { color: var(--green-500); font-size: 0.85rem; font-weight: 600; }

    @media (max-width: 600px) {
      body { padding: 10px; }
      .btn { padding: 8px 14px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>⊞ HTML Table Generator</h1>
    <p>Build, style, and export HTML tables in seconds</p>
  </header>

  <!-- Config -->
  <div class="card">
    <h2>⚙️ Table Configuration</h2>
    <div class="controls-grid">
      <div>
        <label for="rows">Rows</label>
        <input type="number" id="rows" value="4" min="1" max="30">
      </div>
      <div>
        <label for="cols">Columns</label>
        <input type="number" id="cols" value="4" min="1" max="20">
      </div>
      <div>
        <label for="caption">Caption (optional)</label>
        <input type="text" id="caption" placeholder="Table caption…" style="padding:8px 12px;border:1.5px solid var(--stone-300);border-radius:8px;font-size:.9rem;background:var(--stone-50);width:100%;">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="hasHeader" checked>
        <label for="hasHeader" style="margin:0;display:inline">First row as header</label>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="buildTable()">🔨 Build Table</button>
    </div>
  </div>

  <!-- Editable table -->
  <div class="card">
    <h2>✏️ Edit Table Data</h2>
    <div class="table-wrapper">
      <table id="editable-table"></table>
    </div>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="addRow()">+ Add Row</button>
      <button class="btn btn-secondary" onclick="addCol()">+ Add Column</button>
      <button class="btn btn-secondary" onclick="removeRow()" style="color:var(--red-500)">− Remove Row</button>
      <button class="btn btn-secondary" onclick="removeCol()" style="color:var(--red-500)">− Remove Column</button>
    </div>
  </div>

  <!-- Style -->
  <div class="card">
    <h2>🎨 Table Style</h2>
    <div class="style-options">
      <div class="style-btn active" onclick="setStyle('basic',this)">Basic</div>
      <div class="style-btn" onclick="setStyle('striped',this)">Striped</div>
      <div class="style-btn" onclick="setStyle('modern',this)">Modern Dark</div>
      <div class="style-btn" onclick="setStyle('minimal',this)">Minimal</div>
    </div>
    <h2>👁 Preview</h2>
    <div id="preview-area"></div>
  </div>

  <!-- Output -->
  <div class="card">
    <h2>💾 Generated HTML</h2>
    <textarea id="output" readonly></textarea>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="generateCode()">⚡ Generate Code</button>
      <button class="btn btn-secondary" onclick="copyCode()">📋 Copy</button>
      <span id="copy-msg" class="copy-success" style="display:none">✓ Copied!</span>
    </div>
  </div>
</div>

<script>
let currentStyle = 'basic';

function buildTable() {
  const rows = parseInt(document.getElementById('rows').value) || 4;
  const cols = parseInt(document.getElementById('cols').value) || 4;
  const hasHeader = document.getElementById('hasHeader').checked;
  const tbl = document.getElementById('editable-table');
  tbl.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    const tr = tbl.insertRow();
    for (let c = 0; c < cols; c++) {
      const isHeader = hasHeader && r === 0;
      const cell = isHeader ? document.createElement('th') : tr.insertCell();
      if (isHeader) tr.appendChild(cell);
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.value = isHeader ? `Header ${c+1}` : `Cell ${r},${c+1}`;
      inp.placeholder = isHeader ? `Header ${c+1}` : '';
      cell.appendChild(inp);
    }
  }
  generateCode();
}

function addRow() {
  const tbl = document.getElementById('editable-table');
  const cols = tbl.rows[0] ? tbl.rows[0].cells.length : 3;
  const tr = tbl.insertRow();
  const r = tbl.rows.length;
  for (let c = 0; c < cols; c++) {
    const td = tr.insertCell();
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = `Cell ${r},${c+1}`;
    td.appendChild(inp);
  }
  generateCode();
}

function addCol() {
  const tbl = document.getElementById('editable-table');
  for (let r = 0; r < tbl.rows.length; r++) {
    const row = tbl.rows[r];
    const isHeader = row.querySelectorAll('th').length > 0;
    const cell = isHeader ? document.createElement('th') : row.insertCell();
    if (isHeader) row.appendChild(cell);
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = isHeader ? `Header ${row.cells.length}` : `Cell ${r+1},${row.cells.length}`;
    cell.appendChild(inp);
  }
  generateCode();
}

function removeRow() {
  const tbl = document.getElementById('editable-table');
  if (tbl.rows.length > 1) tbl.deleteRow(tbl.rows.length - 1);
  generateCode();
}

function removeCol() {
  const tbl = document.getElementById('editable-table');
  for (let r = 0; r < tbl.rows.length; r++) {
    const row = tbl.rows[r];
    if (row.cells.length > 1) row.deleteCell(row.cells.length - 1);
  }
  generateCode();
}

function setStyle(style, el) {
  currentStyle = style;
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  generateCode();
}

function getTableData() {
  const tbl = document.getElementById('editable-table');
  const data = [];
  for (let r = 0; r < tbl.rows.length; r++) {
    const row = [];
    const isHeaderRow = tbl.rows[r].querySelectorAll('th').length > 0;
    row._isHeader = isHeaderRow;
    for (let c = 0; c < tbl.rows[r].cells.length; c++) {
      const inp = tbl.rows[r].cells[c].querySelector('input');
      row.push(inp ? inp.value : '');
    }
    data.push(row);
  }
  return data;
}

const styleClasses = { basic: 'tbl-basic', striped: 'tbl-striped', modern: 'tbl-modern', minimal: 'tbl-minimal' };

const styleCss = {
  basic: `table{border-collapse:collapse;width:100%}th,td{border:1px solid #aaa;padding:8px 12px}th{background:#f0f0f0}`,
  striped: `table{border-collapse:collapse;width:100%}th,td{padding:10px 14px;border-bottom:1px solid #e0e0e0}th{background:#f59e0b;color:#fff}tr:nth-child(even)td{background:#fff8e1}`,
  modern: `table{border-collapse:separate;border-spacing:0;width:100%;border-radius:10px;overflow:hidden;border:1px solid #e0e0e0}th{background:#1c1917;color:#fff;padding:12px 16px;text-align:left}td{padding:10px 16px;border-bottom:1px solid #f0f0f0}tr:last-child td{border-bottom:none}`,
  minimal: `table{border-collapse:collapse;width:100%}th,td{padding:10px 14px;border-bottom:2px solid #fde68a;text-align:left}th{border-bottom:3px solid #f59e0b;font-weight:800}`
};

function generateCode() {
  const data = getTableData();
  const caption = document.getElementById('caption').value;
  const cls = styleClasses[currentStyle];
  let html = `<style>\n${styleCss[currentStyle]}\n</style>\n\n<table class="${cls}">\n`;
  if (caption) html += `  <caption>${caption}</caption>\n`;
  data.forEach(row => {
    html += '  <tr>\n';
    const tag = row._isHeader ? 'th' : 'td';
    row.forEach(cell => { html += `    <${tag}>${cell}</${tag}>\n`; });
    html += '  </tr>\n';
  });
  html += '</table>';
  document.getElementById('output').value = html;
  renderPreview(data, cls);
}

function renderPreview(data, cls) {
  let html = `<table class="${cls}">`;
  data.forEach(row => {
    html += '<tr>';
    const tag = row._isHeader ? 'th' : 'td';
    row.forEach(cell => { html += `<${tag}>${cell}</${tag}>`; });
    html += '</tr>';
  });
  html += '</table>';
  document.getElementById('preview-area').innerHTML = html;
}

function copyCode() {
  const txt = document.getElementById('output').value;
  navigator.clipboard.writeText(txt).then(() => {
    const msg = document.getElementById('copy-msg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 2000);
  });
}

// Init
buildTable();
</script>
</body>
</html>
