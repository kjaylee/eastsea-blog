<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP 상태 코드 참조 | 웹 도구 모음</title>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f8f9fa;
            --text-primary: #212529; --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6; --shadow: rgba(0,0,0,0.1); --card-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a1a; --bg-secondary: #121212;
            --text-primary: #f8f9fa; --text-secondary: #adb5bd;
            --border: #444; --shadow: rgba(0,0,0,0.3); --card-bg: #2d2d2d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary); color: var(--text-primary);
            line-height: 1.6; padding: 20px; min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn { text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .back-btn:hover { color: var(--text-primary); }
        .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.5rem; }
        .card {
            background: var(--card-bg); border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px var(--shadow); border: 1px solid var(--border); margin-bottom: 20px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; background: var(--accent); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .desc { color: var(--text-secondary); margin-bottom: 20px; }
        .search-box {
            width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: 14px;
            background: var(--bg-primary); color: var(--text-primary); font-size: 1.1rem;
            outline: none; margin-bottom: 20px;
        }
        .search-box:focus { border-color: #667eea; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
        .filter-btn {
            padding: 8px 16px; border: 2px solid var(--border); border-radius: 10px;
            background: var(--bg-primary); cursor: pointer; font-size: 0.85rem;
            color: var(--text-primary); transition: all 0.2s; font-weight: 500;
        }
        .filter-btn:hover { border-color: #667eea; }
        .filter-btn.active { border-color: #667eea; background: rgba(102,126,234,0.1); }
        .code-group { margin-bottom: 24px; }
        .group-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
        .code-item {
            display: grid; grid-template-columns: 70px 1fr; gap: 12px;
            padding: 12px; border-radius: 10px; margin-bottom: 4px; cursor: pointer;
            transition: background 0.15s;
        }
        .code-item:hover { background: var(--bg-secondary); }
        .code-num { font-family: 'Courier New', monospace; font-weight: 700; font-size: 1.05rem; }
        .code-1xx .code-num { color: #17a2b8; }
        .code-2xx .code-num { color: #28a745; }
        .code-3xx .code-num { color: #fd7e14; }
        .code-4xx .code-num { color: #dc3545; }
        .code-5xx .code-num { color: #6f42c1; }
        .code-name { font-weight: 600; }
        .code-desc { color: var(--text-secondary); font-size: 0.9rem; margin-top: 2px; }
        .code-detail {
            display: none; margin-top: 8px; padding: 12px; background: var(--bg-secondary);
            border-radius: 8px; border: 1px solid var(--border); font-size: 0.9rem;
        }
        .code-detail.open { display: block; }
        .count-badge { font-size: 0.8rem; color: var(--text-secondary); margin-left: 4px; }
        .no-results { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 1.1rem; }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-btn">← 목록으로</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </header>

        <div class="card">
            <h1>📡 HTTP 상태 코드 참조</h1>
            <p class="desc">HTTP 상태 코드를 빠르게 검색하고 참조합니다. 코드를 클릭하면 상세 설명을 볼 수 있습니다.</p>

            <input type="text" class="search-box" id="search" placeholder="코드 번호 또는 이름으로 검색... (예: 404, not found)" oninput="filter()">

            <div class="filter-bar">
                <button class="filter-btn active" data-group="all" onclick="setFilter('all')">전체</button>
                <button class="filter-btn" data-group="1xx" onclick="setFilter('1xx')">1xx 정보</button>
                <button class="filter-btn" data-group="2xx" onclick="setFilter('2xx')">2xx 성공</button>
                <button class="filter-btn" data-group="3xx" onclick="setFilter('3xx')">3xx 리다이렉션</button>
                <button class="filter-btn" data-group="4xx" onclick="setFilter('4xx')">4xx 클라이언트 오류</button>
                <button class="filter-btn" data-group="5xx" onclick="setFilter('5xx')">5xx 서버 오류</button>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const CODES = [
            // 1xx
            [100,"Continue","클라이언트가 요청을 계속해도 됨","서버가 요청의 초기 부분을 받았으며, 클라이언트가 나머지를 보내도 됩니다. 주로 Expect: 100-continue 헤더와 함께 사용됩니다."],
            [101,"Switching Protocols","프로토콜 전환","서버가 클라이언트의 Upgrade 요청을 수락하여 프로토콜을 전환합니다. WebSocket 연결 시 사용됩니다."],
            [102,"Processing","처리 중 (WebDAV)","서버가 요청을 수신하여 처리하고 있지만 아직 응답이 없습니다."],
            [103,"Early Hints","사전 힌트","최종 응답 전에 일부 헤더를 보냅니다. Link 헤더로 리소스 프리로딩에 사용됩니다."],
            // 2xx
            [200,"OK","성공","요청이 성공적으로 처리되었습니다. GET 요청에 대한 리소스가 응답 본문에 포함됩니다."],
            [201,"Created","생성됨","요청이 성공적으로 처리되어 새 리소스가 생성되었습니다. POST 요청의 일반적 응답입니다."],
            [202,"Accepted","수락됨","요청이 수락되었으나 아직 처리되지 않았습니다. 비동기 작업에서 사용됩니다."],
            [203,"Non-Authoritative Information","비인증 정보","프록시가 원본 서버의 200 응답을 수정한 경우 사용됩니다."],
            [204,"No Content","내용 없음","요청이 성공했지만 반환할 콘텐츠가 없습니다. DELETE 요청의 일반적 응답입니다."],
            [205,"Reset Content","콘텐츠 리셋","클라이언트에게 문서 뷰를 리셋하라고 알립니다. 폼 초기화에 사용됩니다."],
            [206,"Partial Content","부분 콘텐츠","Range 헤더를 사용한 부분 요청이 성공했습니다. 대용량 파일 다운로드에 사용됩니다."],
            [207,"Multi-Status","다중 상태 (WebDAV)","여러 리소스에 대한 상태 정보를 XML 응답으로 반환합니다."],
            [208,"Already Reported","이미 보고됨 (WebDAV)","DAV 바인딩의 멤버가 이미 열거되어 다시 포함하지 않습니다."],
            [226,"IM Used","IM 사용됨","서버가 GET 요청을 처리했으며, 인스턴스 조작이 적용된 결과를 반환합니다."],
            // 3xx
            [300,"Multiple Choices","다중 선택","요청한 리소스에 여러 표현이 있으며, 사용자가 선택해야 합니다."],
            [301,"Moved Permanently","영구 이동","요청한 리소스가 새 URL로 영구 이동했습니다. SEO에서 매우 중요합니다."],
            [302,"Found","임시 이동","요청한 리소스가 일시적으로 다른 URL에 있습니다. 원래 URL을 계속 사용해야 합니다."],
            [303,"See Other","기타 참조","클라이언트가 GET을 사용하여 다른 URI로 요청해야 합니다. POST 후 리다이렉트에 사용됩니다."],
            [304,"Not Modified","수정되지 않음","캐시된 리소스가 여전히 유효합니다. 본문을 다시 보내지 않아 대역폭을 절약합니다."],
            [307,"Temporary Redirect","임시 리다이렉트","302와 유사하지만, HTTP 메서드가 변경되지 않는 것을 보장합니다."],
            [308,"Permanent Redirect","영구 리다이렉트","301과 유사하지만, HTTP 메서드가 변경되지 않는 것을 보장합니다."],
            // 4xx
            [400,"Bad Request","잘못된 요청","서버가 요청을 이해할 수 없습니다. 잘못된 구문이나 유효하지 않은 파라미터 때문입니다."],
            [401,"Unauthorized","인증 필요","요청에 유효한 인증 정보가 필요합니다. WWW-Authenticate 헤더가 포함됩니다."],
            [403,"Forbidden","접근 금지","서버가 요청을 이해했지만 권한 부족으로 거부합니다. 인증과는 다릅니다."],
            [404,"Not Found","찾을 수 없음","요청한 리소스를 서버에서 찾을 수 없습니다. 가장 흔한 에러 코드입니다."],
            [405,"Method Not Allowed","허용되지 않는 메서드","요청한 HTTP 메서드가 해당 리소스에서 지원되지 않습니다."],
            [406,"Not Acceptable","수용 불가","Accept 헤더 조건에 맞는 콘텐츠를 생성할 수 없습니다."],
            [407,"Proxy Authentication Required","프록시 인증 필요","프록시 서버에 인증이 필요합니다."],
            [408,"Request Timeout","요청 시간 초과","서버가 클라이언트의 요청을 기다리다 시간이 초과되었습니다."],
            [409,"Conflict","충돌","요청이 서버의 현재 상태와 충돌합니다. 동시 편집 등에서 발생합니다."],
            [410,"Gone","사라짐","리소스가 영구적으로 삭제되었습니다. 404와 달리 의도적 삭제를 나타냅니다."],
            [411,"Length Required","길이 필요","Content-Length 헤더가 필요합니다."],
            [412,"Precondition Failed","전제조건 실패","조건부 요청의 전제조건이 충족되지 않았습니다."],
            [413,"Payload Too Large","요청 본문 너무 큼","요청 본문이 서버가 처리할 수 있는 크기를 초과했습니다."],
            [414,"URI Too Long","URI 너무 김","요청 URI가 서버가 처리할 수 있는 길이를 초과했습니다."],
            [415,"Unsupported Media Type","지원하지 않는 미디어 타입","요청 본문의 미디어 타입을 서버가 지원하지 않습니다."],
            [416,"Range Not Satisfiable","범위 불만족","Range 헤더에 지정된 범위를 충족할 수 없습니다."],
            [418,"I'm a teapot","나는 주전자","1998년 만우절 장난으로 만들어진 코드입니다 🫖. RFC 2324 (HTCPCP) 에서 정의됩니다."],
            [422,"Unprocessable Entity","처리 불가 (WebDAV)","요청 구문은 올바르지만 의미적으로 처리할 수 없습니다. 유효성 검사 실패에 사용됩니다."],
            [429,"Too Many Requests","요청 과다","클라이언트가 너무 많은 요청을 보냈습니다. Rate Limiting에 사용됩니다."],
            [451,"Unavailable For Legal Reasons","법적 이유로 불가","법적 요구에 의해 접근이 차단되었습니다. 검열이나 저작권 관련에 사용됩니다."],
            // 5xx
            [500,"Internal Server Error","내부 서버 오류","서버에 예기치 않은 오류가 발생했습니다. 가장 일반적인 서버 에러입니다."],
            [501,"Not Implemented","미구현","서버가 요청한 기능을 지원하지 않습니다."],
            [502,"Bad Gateway","잘못된 게이트웨이","게이트웨이/프록시 서버가 업스트림 서버로부터 유효하지 않은 응답을 받았습니다."],
            [503,"Service Unavailable","서비스 불가","서버가 일시적으로 요청을 처리할 수 없습니다. 과부하 또는 유지보수 중입니다."],
            [504,"Gateway Timeout","게이트웨이 시간 초과","게이트웨이/프록시 서버가 업스트림 서버의 응답을 제때 받지 못했습니다."],
            [505,"HTTP Version Not Supported","HTTP 버전 미지원","서버가 요청에 사용된 HTTP 버전을 지원하지 않습니다."],
            [507,"Insufficient Storage","저장 공간 부족 (WebDAV)","서버에 요청을 완료할 충분한 저장 공간이 없습니다."],
            [508,"Loop Detected","루프 감지 (WebDAV)","서버가 요청을 처리하는 동안 무한 루프를 감지했습니다."],
            [511,"Network Authentication Required","네트워크 인증 필요","네트워크 접근을 위해 인증이 필요합니다. 캡티브 포털에서 사용됩니다."],
        ];

        const GROUP_LABELS = {'1xx':'ℹ️ 1xx — 정보','2xx':'✅ 2xx — 성공','3xx':'↪️ 3xx — 리다이렉션','4xx':'❌ 4xx — 클라이언트 오류','5xx':'💥 5xx — 서버 오류'};
        let currentFilter = 'all';

        function getGroup(code) { return Math.floor(code/100) + 'xx'; }

        function setFilter(g) {
            currentFilter = g;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.group === g));
            filter();
        }

        function filter() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            const filtered = CODES.filter(c => {
                const grp = getGroup(c[0]);
                if (currentFilter !== 'all' && grp !== currentFilter) return false;
                if (!q) return true;
                return String(c[0]).includes(q) || c[1].toLowerCase().includes(q) || c[2].toLowerCase().includes(q) || c[3].toLowerCase().includes(q);
            });
            render(filtered);
        }

        function render(items) {
            const container = document.getElementById('results');
            if (!items.length) { container.innerHTML = '<div class="card no-results">검색 결과가 없습니다 😅</div>'; return; }
            const groups = {};
            items.forEach(c => {
                const g = getGroup(c[0]);
                if (!groups[g]) groups[g] = [];
                groups[g].push(c);
            });
            let html = '';
            Object.keys(groups).sort().forEach(g => {
                html += `<div class="card code-group"><div class="group-title">${GROUP_LABELS[g]} <span class="count-badge">(${groups[g].length})</span></div>`;
                groups[g].forEach(c => {
                    html += `<div class="code-item code-${g}" onclick="this.querySelector('.code-detail').classList.toggle('open')">
                        <div class="code-num">${c[0]}</div>
                        <div><div class="code-name">${c[1]}</div><div class="code-desc">${c[2]}</div>
                        <div class="code-detail">${c[3]}</div></div></div>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
        }
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        filter();
    </script>
</body>
</html>
