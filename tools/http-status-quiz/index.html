<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Status Code Quiz | HTTP 상태 코드 퀴즈</title>
    <meta name="description" content="HTTP 상태 코드를 퀴즈로 학습하세요. 200, 301, 404, 500 등 전체 HTTP 상태 코드 완벽 정리와 인터랙티브 퀴즈.">
    <meta name="keywords" content="http status code, http quiz, 상태 코드, 404, 500, REST API, web development">
    <meta property="og:title" content="HTTP Status Code Quiz">
    <meta property="og:description" content="HTTP 상태 코드를 퀴즈로 학습하고 레퍼런스로 활용하세요.">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#fff;--bg2:#f8f9fa;--text:#212529;--text2:#6c757d;--accent:#6366f1;--border:#dee2e6;--shadow:rgba(0,0,0,.08);--card:#fff;--success:#10b981;--error:#ef4444;--warning:#f59e0b}
        [data-theme="dark"]{--bg:#0f0f1a;--bg2:#16162a;--text:#e4e4f0;--text2:#9898b0;--border:#2a2a40;--shadow:rgba(0,0,0,.4);--card:#1e1e30}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg2);color:var(--text);padding:20px;min-height:100vh;transition:all .3s}
        .container{max-width:900px;margin:0 auto}
        header{text-align:center;margin-bottom:28px}
        h1{font-size:1.9rem;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .subtitle{color:var(--text2);font-size:.95rem}
        .theme-toggle{position:fixed;top:15px;right:15px;background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .2s}
        .home-btn{position:fixed;top:15px;left:15px;text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;z-index:10;transition:all .2s}
        .home-btn:hover,.theme-toggle:hover{transform:scale(1.1)}
        .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);padding:4px;border-radius:12px}
        .tab{flex:1;padding:10px 16px;border:none;border-radius:10px;background:none;cursor:pointer;font-size:.92rem;font-weight:600;color:var(--text2);transition:all .2s}
        .tab.active{background:var(--card);color:var(--accent);box-shadow:0 2px 8px var(--shadow)}
        .panel{background:var(--card);border-radius:12px;padding:24px;box-shadow:0 2px 10px var(--shadow);margin-bottom:20px}
        .panel h2{font-size:1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}

        /* Quiz Mode */
        .quiz-progress{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
        .quiz-dot{width:28px;height:6px;border-radius:3px;background:var(--border);transition:background .3s}
        .quiz-dot.correct{background:var(--success)}
        .quiz-dot.wrong{background:var(--error)}
        .quiz-dot.current{background:var(--accent)}
        .quiz-question{font-size:1.1rem;font-weight:600;margin-bottom:6px;line-height:1.5}
        .quiz-code{font-size:3.5rem;font-weight:800;text-align:center;padding:20px;margin:16px 0;border-radius:12px;font-variant-numeric:tabular-nums;letter-spacing:.05em}
        .quiz-code.c1xx{background:linear-gradient(135deg,rgba(96,165,250,.15),rgba(96,165,250,.05));color:#3b82f6}
        .quiz-code.c2xx{background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(16,185,129,.05));color:#10b981}
        .quiz-code.c3xx{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.05));color:#f59e0b}
        .quiz-code.c4xx{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(239,68,68,.05));color:#ef4444}
        .quiz-code.c5xx{background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(168,85,247,.05));color:#a855f7}
        .quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
        .quiz-opt{padding:14px 16px;border:2px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);cursor:pointer;font-size:.92rem;font-weight:500;transition:all .2s;text-align:left;line-height:1.4}
        .quiz-opt:hover:not(.disabled){border-color:var(--accent);background:rgba(99,102,241,.06)}
        .quiz-opt.selected-correct{border-color:var(--success);background:rgba(16,185,129,.1);color:var(--success)}
        .quiz-opt.selected-wrong{border-color:var(--error);background:rgba(239,68,68,.1);color:var(--error)}
        .quiz-opt.show-correct{border-color:var(--success);background:rgba(16,185,129,.06)}
        .quiz-opt.disabled{cursor:default;opacity:.8}
        .quiz-explanation{margin-top:16px;padding:14px;background:var(--bg2);border-radius:10px;border-left:4px solid var(--accent);font-size:.88rem;line-height:1.6;display:none}
        .quiz-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
        .qs-card{text-align:center;padding:16px;background:var(--bg2);border-radius:10px}
        .qs-val{font-size:2rem;font-weight:700}
        .qs-label{font-size:.78rem;color:var(--text2);margin-top:4px}
        .btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
        .btn-primary{background:linear-gradient(135deg,#6366f1,#ec4899);color:#fff}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,.35)}
        .btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
        .btn-row{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
        .hidden{display:none!important}

        /* Reference Mode */
        .search-bar{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:.92rem;background:var(--bg);color:var(--text);margin-bottom:16px}
        .search-bar:focus{outline:none;border-color:var(--accent)}
        .category-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
        .ctab{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:var(--bg);cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s}
        .ctab:hover,.ctab.active{color:#fff;border-color:transparent}
        .ctab[data-cat="1xx"]{--cc:#3b82f6}.ctab[data-cat="1xx"].active,.ctab[data-cat="1xx"]:hover{background:#3b82f6}
        .ctab[data-cat="2xx"]{--cc:#10b981}.ctab[data-cat="2xx"].active,.ctab[data-cat="2xx"]:hover{background:#10b981}
        .ctab[data-cat="3xx"]{--cc:#f59e0b}.ctab[data-cat="3xx"].active,.ctab[data-cat="3xx"]:hover{background:#f59e0b}
        .ctab[data-cat="4xx"]{--cc:#ef4444}.ctab[data-cat="4xx"].active,.ctab[data-cat="4xx"]:hover{background:#ef4444}
        .ctab[data-cat="5xx"]{--cc:#a855f7}.ctab[data-cat="5xx"].active,.ctab[data-cat="5xx"]:hover{background:#a855f7}
        .ctab[data-cat="all"].active{background:var(--accent);color:#fff}
        .ref-grid{display:grid;gap:10px}
        .ref-card{display:grid;grid-template-columns:80px 1fr;gap:12px;padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);transition:all .2s;cursor:pointer}
        .ref-card:hover{border-color:var(--accent);transform:translateX(2px)}
        .ref-code{font-size:1.4rem;font-weight:800;font-variant-numeric:tabular-nums;align-self:center}
        .ref-code.c1{color:#3b82f6}.ref-code.c2{color:#10b981}.ref-code.c3{color:#f59e0b}.ref-code.c4{color:#ef4444}.ref-code.c5{color:#a855f7}
        .ref-info h3{font-size:.9rem;font-weight:700;margin-bottom:4px}
        .ref-info p{font-size:.82rem;color:var(--text2);line-height:1.5}
        .ref-detail{display:none;margin-top:8px;padding:10px;background:var(--bg2);border-radius:8px;font-size:.82rem;color:var(--text2);line-height:1.6}
        .ref-card.expanded .ref-detail{display:block}
        .count-badge{font-size:.78rem;color:var(--text2);background:var(--bg2);padding:3px 10px;border-radius:20px;margin-left:auto}
        @media(max-width:640px){.quiz-options{grid-template-columns:1fr}.quiz-code{font-size:2.5rem}.quiz-stats{grid-template-columns:1fr}h1{font-size:1.4rem}}
    </style>
    <script src="/assets/analytics.js"></script>
</head>
<body>
<a href="/" class="home-btn" title="도구 목록">🏠</a>
<button class="theme-toggle" onclick="toggleTheme()" title="테마">🌓</button>
<div class="container">
    <header>
        <h1>🎯 HTTP Status Code Quiz</h1>
        <p class="subtitle">HTTP 상태 코드를 퀴즈로 학습하고 레퍼런스로 활용하세요</p>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="switchMode('quiz',this)">🎮 퀴즈 모드</button>
        <button class="tab" onclick="switchMode('ref',this)">📖 레퍼런스</button>
    </div>

    <!-- Quiz Mode -->
    <div id="quizMode">
        <div class="quiz-stats" id="quizStats">
            <div class="qs-card"><div class="qs-val" id="qsScore" style="color:var(--success)">0</div><div class="qs-label">정답</div></div>
            <div class="qs-card"><div class="qs-val" id="qsTotal">0</div><div class="qs-label">문제 수</div></div>
            <div class="qs-card"><div class="qs-val" id="qsStreak" style="color:var(--warning)">0</div><div class="qs-label">연속 정답</div></div>
        </div>
        <div class="quiz-progress" id="quizProgress"></div>
        <div class="panel" id="quizPanel">
            <div class="quiz-question" id="quizQuestion"></div>
            <div class="quiz-code" id="quizCode"></div>
            <div class="quiz-options" id="quizOptions"></div>
            <div class="quiz-explanation" id="quizExplanation"></div>
            <div class="btn-row" id="quizActions">
                <button class="btn btn-primary hidden" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
            </div>
        </div>
        <div class="panel hidden" id="quizResult">
            <h2 style="text-align:center;font-size:1.3rem;margin-bottom:20px">🏆 퀴즈 완료!</h2>
            <div class="quiz-stats">
                <div class="qs-card"><div class="qs-val" id="finalScore" style="color:var(--success)">0</div><div class="qs-label">정답</div></div>
                <div class="qs-card"><div class="qs-val" id="finalTotal">0</div><div class="qs-label">전체</div></div>
                <div class="qs-card"><div class="qs-val" id="finalPct" style="color:var(--accent)">0%</div><div class="qs-label">정답률</div></div>
            </div>
            <div id="finalMessage" style="text-align:center;font-size:1.1rem;margin:16px 0;font-weight:600"></div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="startQuiz(10)">🔄 다시 도전 (10문제)</button>
                <button class="btn btn-secondary" onclick="startQuiz(20)">📝 20문제 도전</button>
            </div>
        </div>
        <div class="panel" id="quizStart" style="text-align:center;padding:40px 20px">
            <div style="font-size:3rem;margin-bottom:16px">🎯</div>
            <h2 style="font-size:1.2rem;margin-bottom:10px">HTTP 상태 코드 퀴즈</h2>
            <p style="color:var(--text2);margin-bottom:24px">상태 코드의 의미를 맞춰보세요!</p>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="startQuiz(10)">🎮 10문제 시작</button>
                <button class="btn btn-secondary" onclick="startQuiz(20)">📝 20문제</button>
                <button class="btn btn-secondary" onclick="startQuiz(0)">♾️ 무한 모드</button>
            </div>
        </div>
    </div>

    <!-- Reference Mode -->
    <div id="refMode" class="hidden">
        <input class="search-bar" id="refSearch" placeholder="🔍 코드 번호, 이름, 또는 설명으로 검색..." oninput="filterRef()">
        <div class="category-tabs">
            <button class="ctab active" data-cat="all" onclick="filterCat('all',this)">전체</button>
            <button class="ctab" data-cat="1xx" onclick="filterCat('1xx',this)">1xx 정보</button>
            <button class="ctab" data-cat="2xx" onclick="filterCat('2xx',this)">2xx 성공</button>
            <button class="ctab" data-cat="3xx" onclick="filterCat('3xx',this)">3xx 리다이렉트</button>
            <button class="ctab" data-cat="4xx" onclick="filterCat('4xx',this)">4xx 클라이언트 에러</button>
            <button class="ctab" data-cat="5xx" onclick="filterCat('5xx',this)">5xx 서버 에러</button>
        </div>
        <div style="display:flex;align-items:center;margin-bottom:12px">
            <span style="font-weight:700">상태 코드</span>
            <span class="count-badge" id="refCount">0</span>
        </div>
        <div class="ref-grid" id="refGrid"></div>
    </div>
</div>

<script>
const CODES = [
    {code:100,name:'Continue',desc:'서버가 요청 헤더를 수신했으며 클라이언트가 본문을 보내야 합니다.',detail:'Expect: 100-continue 헤더와 함께 사용. 대용량 업로드 전 서버 확인 용도.',cat:'1xx'},
    {code:101,name:'Switching Protocols',desc:'서버가 프로토콜 전환을 수락했습니다.',detail:'WebSocket 업그레이드 시 사용. Upgrade 헤더와 함께 반환.',cat:'1xx'},
    {code:103,name:'Early Hints',desc:'최종 응답 전에 일부 헤더를 미리 전송합니다.',detail:'Link 헤더로 리소스 프리로드 힌트 제공. 성능 최적화용.',cat:'1xx'},
    {code:200,name:'OK',desc:'요청이 성공적으로 처리되었습니다.',detail:'가장 일반적인 성공 응답. GET, POST, PUT 등 모든 메서드에 사용.',cat:'2xx'},
    {code:201,name:'Created',desc:'요청이 성공하여 새 리소스가 생성되었습니다.',detail:'POST 요청 후 리소스 생성 시 사용. Location 헤더로 새 리소스 URI 제공.',cat:'2xx'},
    {code:202,name:'Accepted',desc:'요청이 수락되었지만 아직 처리되지 않았습니다.',detail:'비동기 작업에 사용. 배치 처리, 이메일 발송 큐잉 등.',cat:'2xx'},
    {code:204,name:'No Content',desc:'요청 성공, 반환할 콘텐츠 없음.',detail:'DELETE 성공 또는 PUT 업데이트 후 본문 불필요 시. 응답 본문이 비어있음.',cat:'2xx'},
    {code:206,name:'Partial Content',desc:'Range 요청에 대한 부분 콘텐츠 응답.',detail:'대용량 파일 다운로드 재개, 비디오 스트리밍에 사용. Content-Range 헤더 포함.',cat:'2xx'},
    {code:301,name:'Moved Permanently',desc:'리소스가 영구적으로 새 URL로 이동했습니다.',detail:'SEO에 중요 — 검색엔진이 새 URL로 인덱스 업데이트. 북마크도 갱신해야 함.',cat:'3xx'},
    {code:302,name:'Found',desc:'리소스가 임시로 다른 URL에 있습니다.',detail:'로그인 후 리다이렉트 등에 사용. 원래 URL이 여전히 유효함.',cat:'3xx'},
    {code:303,name:'See Other',desc:'다른 URL에서 GET으로 리소스를 가져오세요.',detail:'POST 후 결과 페이지로 리다이렉트 (PRG 패턴). 중복 제출 방지.',cat:'3xx'},
    {code:304,name:'Not Modified',desc:'캐시된 버전을 사용해도 됩니다.',detail:'조건부 GET 요청(If-Modified-Since, ETag)에 대한 응답. 대역폭 절약.',cat:'3xx'},
    {code:307,name:'Temporary Redirect',desc:'임시 리다이렉트 (메서드 유지).',detail:'302와 유사하지만 HTTP 메서드가 변경되지 않음. POST → POST 유지.',cat:'3xx'},
    {code:308,name:'Permanent Redirect',desc:'영구 리다이렉트 (메서드 유지).',detail:'301과 유사하지만 HTTP 메서드가 변경되지 않음. API에서 선호.',cat:'3xx'},
    {code:400,name:'Bad Request',desc:'잘못된 요청 — 서버가 이해할 수 없습니다.',detail:'잘못된 JSON, 필수 파라미터 누락, 유효성 검사 실패 등.',cat:'4xx'},
    {code:401,name:'Unauthorized',desc:'인증이 필요합니다.',detail:'로그인하지 않은 상태. WWW-Authenticate 헤더 포함. "Unauthenticated"가 더 정확한 이름.',cat:'4xx'},
    {code:403,name:'Forbidden',desc:'권한이 없어 접근이 거부되었습니다.',detail:'인증은 되었지만 해당 리소스에 대한 권한이 없음. 관리자 전용 페이지 등.',cat:'4xx'},
    {code:404,name:'Not Found',desc:'요청한 리소스를 찾을 수 없습니다.',detail:'가장 유명한 에러 코드. URL 오타, 삭제된 페이지, 잘못된 API 엔드포인트.',cat:'4xx'},
    {code:405,name:'Method Not Allowed',desc:'해당 리소스에서 이 HTTP 메서드는 허용되지 않습니다.',detail:'GET만 지원하는 엔드포인트에 POST 요청 시. Allow 헤더로 허용 메서드 명시.',cat:'4xx'},
    {code:408,name:'Request Timeout',desc:'서버가 요청을 기다리다 시간이 초과되었습니다.',detail:'클라이언트가 너무 느리게 데이터를 전송할 때. 서버가 연결을 닫음.',cat:'4xx'},
    {code:409,name:'Conflict',desc:'요청이 현재 리소스 상태와 충돌합니다.',detail:'동시 편집 충돌, 이미 존재하는 리소스 생성 시도 등.',cat:'4xx'},
    {code:410,name:'Gone',desc:'리소스가 영구적으로 삭제되었습니다.',detail:'404와 달리 의도적으로 삭제되었음을 명시. SEO에서 인덱스 제거 신호.',cat:'4xx'},
    {code:413,name:'Payload Too Large',desc:'요청 본문이 서버 제한을 초과합니다.',detail:'파일 업로드 크기 제한 초과. Nginx의 client_max_body_size 등.',cat:'4xx'},
    {code:415,name:'Unsupported Media Type',desc:'서버가 지원하지 않는 미디어 타입입니다.',detail:'Content-Type이 잘못된 경우. application/json을 기대하는데 text/plain 전송 등.',cat:'4xx'},
    {code:418,name:"I'm a Teapot",desc:'서버는 찻주전자이므로 커피를 내릴 수 없습니다.',detail:'1998년 만우절 RFC 2324. 실제 프로덕션에서는 사용하지 않음. 개발자 유머.',cat:'4xx'},
    {code:422,name:'Unprocessable Entity',desc:'요청은 이해했지만 처리할 수 없습니다.',detail:'JSON 구조는 올바르지만 비즈니스 로직 검증 실패. 이메일 형식 오류 등.',cat:'4xx'},
    {code:429,name:'Too Many Requests',desc:'요청이 너무 많습니다 (레이트 리밋).',detail:'API 속도 제한 초과. Retry-After 헤더로 재시도 시점 안내. 봇 방지.',cat:'4xx'},
    {code:451,name:'Unavailable For Legal Reasons',desc:'법적 이유로 접근이 차단되었습니다.',detail:'레이 브래드버리의 화씨 451도에서 따온 코드. GDPR 차단, 저작권 등.',cat:'4xx'},
    {code:500,name:'Internal Server Error',desc:'서버 내부 오류가 발생했습니다.',detail:'가장 일반적인 서버 에러. 코드 버그, 예외 미처리, DB 연결 실패 등.',cat:'5xx'},
    {code:501,name:'Not Implemented',desc:'서버가 요청 메서드를 지원하지 않습니다.',detail:'서버가 해당 기능을 아직 구현하지 않았음. 405와 다르게 서버 능력 부재.',cat:'5xx'},
    {code:502,name:'Bad Gateway',desc:'게이트웨이/프록시가 잘못된 응답을 받았습니다.',detail:'Nginx가 백엔드로부터 유효하지 않은 응답 수신. 업스트림 서버 다운.',cat:'5xx'},
    {code:503,name:'Service Unavailable',desc:'서버가 현재 요청을 처리할 수 없습니다.',detail:'서버 과부하, 유지보수 중. Retry-After 헤더 사용 권장.',cat:'5xx'},
    {code:504,name:'Gateway Timeout',desc:'게이트웨이/프록시가 응답 시간 초과.',detail:'백엔드 서버가 제시간에 응답하지 못함. 느린 쿼리, 외부 API 지연.',cat:'5xx'},
];

// --- QUIZ ---
let quizQuestions=[], quizIndex=0, quizScore=0, quizStreak=0, quizMaxStreak=0, quizTotal=0, quizAnswered=false, quizInfinite=false;

function startQuiz(count) {
    quizInfinite = count === 0;
    quizTotal = quizInfinite ? 999 : count;
    quizIndex = 0; quizScore = 0; quizStreak = 0; quizMaxStreak = 0;
    quizQuestions = shuffle([...CODES]).slice(0, quizInfinite ? CODES.length : Math.min(count, CODES.length));
    document.getElementById('quizStart').classList.add('hidden');
    document.getElementById('quizResult').classList.add('hidden');
    document.getElementById('quizPanel').classList.remove('hidden');
    renderProgress();
    showQuestion();
}

function showQuestion() {
    if (quizIndex >= quizQuestions.length) {
        if (quizInfinite) {
            quizQuestions = shuffle([...CODES]);
            quizIndex = 0;
        } else {
            finishQuiz(); return;
        }
    }
    quizAnswered = false;
    const q = quizQuestions[quizIndex];
    const mode = Math.random() < 0.5 ? 'code-to-name' : 'name-to-code';

    if (mode === 'code-to-name') {
        document.getElementById('quizQuestion').textContent = '이 상태 코드의 의미는?';
        const cClass = 'c' + String(q.code)[0] + 'xx';
        document.getElementById('quizCode').textContent = q.code;
        document.getElementById('quizCode').className = 'quiz-code ' + cClass;
        const wrongs = shuffle(CODES.filter(c => c.code !== q.code)).slice(0, 3);
        const opts = shuffle([q, ...wrongs]);
        document.getElementById('quizOptions').innerHTML = opts.map((o, i) =>
            `<button class="quiz-opt" onclick="answer(${i},${opts.indexOf(q)},'code-to-name')" id="qopt${i}">${o.name}</button>`
        ).join('');
    } else {
        document.getElementById('quizQuestion').textContent = `"${q.name}"에 해당하는 상태 코드는?`;
        document.getElementById('quizCode').textContent = '???';
        document.getElementById('quizCode').className = 'quiz-code';
        const wrongs = shuffle(CODES.filter(c => c.code !== q.code)).slice(0, 3);
        const opts = shuffle([q, ...wrongs]);
        document.getElementById('quizOptions').innerHTML = opts.map((o, i) =>
            `<button class="quiz-opt" onclick="answer(${i},${opts.indexOf(q)},'name-to-code')" id="qopt${i}">${o.code}</button>`
        ).join('');
    }

    document.getElementById('quizExplanation').style.display = 'none';
    document.getElementById('nextBtn').classList.add('hidden');
    updateStats();
}

function answer(selected, correct, mode) {
    if (quizAnswered) return;
    quizAnswered = true;
    const q = quizQuestions[quizIndex];
    const isCorrect = selected === correct;

    document.querySelectorAll('.quiz-opt').forEach(b => b.classList.add('disabled'));
    document.getElementById(`qopt${selected}`).classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
    if (!isCorrect) document.getElementById(`qopt${correct}`).classList.add('show-correct');

    if (isCorrect) {
        quizScore++;
        quizStreak++;
        if (quizStreak > quizMaxStreak) quizMaxStreak = quizStreak;
    } else {
        quizStreak = 0;
    }

    if (mode === 'name-to-code') {
        const cClass = 'c' + String(q.code)[0] + 'xx';
        document.getElementById('quizCode').textContent = q.code;
        document.getElementById('quizCode').className = 'quiz-code ' + cClass;
    }

    const expl = document.getElementById('quizExplanation');
    expl.innerHTML = `<strong>${q.code} ${q.name}</strong><br>${q.desc}<br><br><em>${q.detail}</em>`;
    expl.style.display = 'block';

    document.getElementById('nextBtn').classList.remove('hidden');
    updateProgress(isCorrect);
    updateStats();
}

function nextQuestion() {
    quizIndex++;
    showQuestion();
}

function finishQuiz() {
    document.getElementById('quizPanel').classList.add('hidden');
    document.getElementById('quizResult').classList.remove('hidden');
    const total = quizQuestions.length;
    const pct = Math.round((quizScore / total) * 100);
    document.getElementById('finalScore').textContent = quizScore;
    document.getElementById('finalTotal').textContent = total;
    document.getElementById('finalPct').textContent = pct + '%';
    let msg = '';
    if (pct === 100) msg = '🎉 완벽합니다! HTTP 마스터!';
    else if (pct >= 80) msg = '👏 훌륭해요! 거의 다 맞혔습니다!';
    else if (pct >= 60) msg = '💪 좋아요! 조금 더 연습하면 완벽!';
    else msg = '📚 더 공부해보세요! 레퍼런스 탭을 활용하세요.';
    document.getElementById('finalMessage').textContent = msg;
}

function renderProgress() {
    const total = quizInfinite ? 10 : quizQuestions.length;
    document.getElementById('quizProgress').innerHTML = Array.from({length:total}, (_,i) =>
        `<div class="quiz-dot" id="qdot${i}"></div>`
    ).join('');
}

function updateProgress(correct) {
    const total = quizInfinite ? 10 : quizQuestions.length;
    const idx = quizInfinite ? quizIndex % total : quizIndex;
    const dot = document.getElementById(`qdot${idx}`);
    if (dot) dot.className = 'quiz-dot ' + (correct ? 'correct' : 'wrong');
}

function updateStats() {
    document.getElementById('qsScore').textContent = quizScore;
    document.getElementById('qsTotal').textContent = quizIndex + (quizAnswered ? 1 : 0);
    document.getElementById('qsStreak').textContent = quizStreak;
}

// --- REFERENCE ---
let currentCat = 'all';

function switchMode(mode, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('quizMode').classList.toggle('hidden', mode !== 'quiz');
    document.getElementById('refMode').classList.toggle('hidden', mode !== 'ref');
    if (mode === 'ref') renderRef();
}

function filterCat(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.ctab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    filterRef();
}

function filterRef() {
    const q = document.getElementById('refSearch').value.toLowerCase();
    const filtered = CODES.filter(c => {
        const catMatch = currentCat === 'all' || c.cat === currentCat;
        const textMatch = !q || String(c.code).includes(q) || c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q);
        return catMatch && textMatch;
    });
    document.getElementById('refCount').textContent = filtered.length + ' 코드';
    const grid = document.getElementById('refGrid');
    grid.innerHTML = filtered.map(c => {
        const cClass = 'c' + String(c.code)[0];
        return `<div class="ref-card" onclick="this.classList.toggle('expanded')">
            <div class="ref-code ${cClass}">${c.code}</div>
            <div class="ref-info">
                <h3>${esc(c.name)}</h3>
                <p>${esc(c.desc)}</p>
                <div class="ref-detail">${esc(c.detail)}</div>
            </div>
        </div>`;
    }).join('');
}

function renderRef() { filterRef(); }

// --- UTIL ---
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleTheme() {
    const d = document.documentElement;
    d.dataset.theme = d.dataset.theme === 'dark' ? '' : 'dark';
    localStorage.setItem('theme', d.dataset.theme);
}

(function() {
    if (localStorage.getItem('theme') === 'dark') document.documentElement.dataset.theme = 'dark';
})();
</script>
