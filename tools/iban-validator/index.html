<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IBAN Validator - 국제계좌번호 검사기</title>
<meta name="description" content="IBAN(국제 은행 계좌번호) 길이/형식/MOD-97 체크섬 검증 도구" />
<style>
:root{--bg:#ecfeff;--card:#fff;--line:#cffafe;--txt:#083344;--muted:#0f766e;--a:#0d9488;--b:#06b6d4;--ok:#16a34a;--bad:#dc2626}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:linear-gradient(180deg,#ccfbf1 0,#f0fdfa 30%,#f8fafc 100%);color:var(--txt)}
.wrap{max-width:980px;margin:0 auto;padding:16px}
.hero{border-radius:16px;background:linear-gradient(120deg,var(--a),var(--b));color:#fff;padding:18px;box-shadow:0 10px 24px rgba(13,148,136,.25)}
.hero h1{margin:0;font-size:1.34rem}.hero p{margin:6px 0 0;font-size:.92rem;opacity:.95}
.card{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}
label{display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:6px}
textarea,input{width:100%;border:1px solid #99f6e4;border-radius:10px;padding:10px;font:inherit;background:#fff}
textarea{min-height:140px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
button{border:none;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer;background:#ccfbf1;color:#115e59}
button.primary{background:linear-gradient(120deg,var(--a),var(--b));color:#fff}
.result{margin-top:10px;padding:10px;border-radius:10px;border:1px solid #99f6e4;background:#f0fdfa;font-size:.9rem;line-height:1.5}
.ok{color:var(--ok)}.bad{color:var(--bad)}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:.76rem;padding:4px 9px;border-radius:999px;background:#ecfeff;border:1px solid #99f6e4;color:#0f766e}
.table{margin-top:10px;border:1px solid #99f6e4;border-radius:10px;overflow:auto}
.table table{width:100%;border-collapse:collapse;font-size:.83rem}
th,td{padding:8px 10px;border-bottom:1px solid #ccfbf1;text-align:left}
th{background:#ecfeff;position:sticky;top:0}
small{display:block;color:#0f766e;margin-top:8px;line-height:1.45}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>🏦 IBAN Validator</h1>
    <p>국가 코드별 길이 확인 + MOD-97 체크섬으로 국제 계좌번호 유효성 검증</p>
  </section>

  <section class="card">
    <label for="iban">IBAN 입력 (여러 줄 가능)</label>
    <textarea id="iban" spellcheck="false">GB82 WEST 1234 5698 7654 32
DE89 3704 0044 0532 0130 00
FR14 2004 1010 0505 0001 3M02 606
KR12 1234 5678 9012 3456 78</textarea>
    <div class="actions">
      <button class="primary" id="validate">검사 실행</button>
      <button id="formatOnly">공백 포맷</button>
      <button id="copy">결과 복사</button>
      <button id="clear">초기화</button>
    </div>

    <div class="badges" id="summary"></div>
    <div class="table" id="table"></div>
    <small>참고: IBAN은 국가마다 길이가 다릅니다. 이 도구는 대표 국가 길이 사전 + MOD-97 규칙으로 클라이언트에서 검증합니다.</small>
  </section>
</div>

<script>
const $ = (id)=>document.getElementById(id);
const LEN = {
  AL:28,AD:24,AT:20,AZ:28,BH:22,BE:16,BA:20,BR:29,BG:22,CR:22,HR:21,CY:28,CZ:24,
  DK:18,DO:28,EE:20,FO:18,FI:18,FR:27,GE:22,DE:22,GI:23,GR:27,GL:18,GT:28,HU:28,
  IS:26,IE:22,IL:23,IT:27,JO:30,KZ:20,XK:20,KW:30,LV:21,LB:28,LI:21,LT:20,LU:20,
  MT:31,MR:27,MU:30,MD:24,MC:27,ME:22,NL:18,MK:19,NO:15,PK:24,PS:29,PL:28,PT:25,
  QA:29,RO:24,SM:27,SA:24,RS:22,SK:24,SI:19,ES:24,SE:24,CH:21,TN:24,TR:26,AE:23,
  GB:22,VG:24,BY:28,SV:28,LC:32,SC:31,ST:25,TL:23,UA:29,VA:22,IQ:23
};

function normalize(s){ return s.toUpperCase().replace(/\s+/g,''); }
function formatIban(s){ return normalize(s).replace(/(.{4})/g,'$1 ').trim(); }

function mod97(iban){
  const moved = iban.slice(4) + iban.slice(0,4);
  let expanded = '';
  for(const ch of moved){
    if(/[A-Z]/.test(ch)) expanded += String(ch.charCodeAt(0)-55);
    else expanded += ch;
  }
  let rem = 0;
  for(const c of expanded){
    rem = (rem * 10 + Number(c)) % 97;
  }
  return rem;
}

function validateOne(raw){
  const iban = normalize(raw);
  if(!iban) return null;
  if(!/^[A-Z]{2}\d{2}[A-Z0-9]+$/.test(iban)){
    return { input:raw, iban, ok:false, reason:'기본 형식 오류 (국가코드2 + 체크숫자2 + 본문)' };
  }
  const country = iban.slice(0,2);
  const expectedLen = LEN[country];
  if(expectedLen && iban.length !== expectedLen){
    return { input:raw, iban, ok:false, reason:`길이 불일치 (${iban.length}, 기대 ${expectedLen})`, country, expectedLen };
  }
  const rem = mod97(iban);
  if(rem !== 1){
    return { input:raw, iban, ok:false, reason:`체크섬 오류 (MOD-97=${rem})`, country, expectedLen: expectedLen || '-' };
  }
  return { input:raw, iban, ok:true, reason:'유효한 IBAN', country, expectedLen: expectedLen || '-', formatted: formatIban(iban) };
}

function render(rows){
  const valid = rows.filter(r=>r && r.ok).length;
  const invalid = rows.filter(r=>r && !r.ok).length;
  $('summary').innerHTML = `<span class="badge">총 ${rows.length}건</span><span class="badge">유효 ${valid}</span><span class="badge">오류 ${invalid}</span>`;

  let html = '<table><thead><tr><th>#</th><th>입력</th><th>국가</th><th>길이</th><th>결과</th><th>메시지</th></tr></thead><tbody>';
  rows.forEach((r,i)=>{
    if(!r) return;
    html += `<tr><td>${i+1}</td><td>${formatIban(r.iban)}</td><td>${r.country || '-'}</td><td>${r.iban.length}${r.expectedLen && r.expectedLen!=='-' ? '/' + r.expectedLen : ''}</td><td class="${r.ok?'ok':'bad'}">${r.ok?'PASS':'FAIL'}</td><td>${r.reason}</td></tr>`;
  });
  html += '</tbody></table>';
  $('table').innerHTML = html;
}

function run(){
  const lines = $('iban').value.split(/\r?\n/).map(v=>v.trim()).filter(Boolean);
  const rows = lines.map(validateOne).filter(Boolean);
  render(rows);
  localStorage.setItem('iban-validator-input', $('iban').value);
}

$('validate').addEventListener('click', run);
$('formatOnly').addEventListener('click', ()=>{
  const lines = $('iban').value.split(/\r?\n/).map(v=>v.trim()).filter(Boolean).map(formatIban);
  $('iban').value = lines.join('\n');
  localStorage.setItem('iban-validator-input', $('iban').value);
});
$('copy').addEventListener('click', async()=>{
  const rows = [...$('table').querySelectorAll('tbody tr')].map(tr => [...tr.children].map(td=>td.textContent.trim()).join('\t')).join('\n');
  if(rows) await navigator.clipboard.writeText(rows);
});
$('clear').addEventListener('click', ()=>{$('iban').value='';$('summary').innerHTML='';$('table').innerHTML='';localStorage.removeItem('iban-validator-input');});

(function init(){
  const saved = localStorage.getItem('iban-validator-input');
  if(saved) $('iban').value = saved;
  run();
})();
</script>
</body>
</html>
