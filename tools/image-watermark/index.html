<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="🖼️ Image Watermark - 이미지에 텍스트 워터마크 추가 무료 온라인 도구 | Free online tool at eastsea.monster" />
    <title>Image Watermark Tool - EastSea Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f8f9fa; --bg-tertiary: #e9ecef;
            --text-primary: #212529; --text-secondary: #6c757d;
            --accent: #8b5cf6; --accent2: #7c3aed;
            --border: #dee2e6; --shadow: rgba(0,0,0,0.1);
            --green: #10b981;
        }
        [data-theme="dark"] {
            --bg-primary: #0f0f23; --bg-secondary: #1a1a2e; --bg-tertiary: #16213e;
            --text-primary: #e4e4e7; --text-secondary: #a1a1aa;
            --border: #27272a; --shadow: rgba(0,0,0,0.5);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            padding: 20px; min-height: 100vh; transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 24px; }
        h1 { font-size: 1.9rem; color: var(--accent); margin-bottom: 6px; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; width: 44px; height: 44px;
            border-radius: 50%; background: var(--bg-secondary); border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; cursor: pointer; z-index: 1000; box-shadow: 0 2px 8px var(--shadow);
        }

        /* Layout */
        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }

        /* Controls Panel */
        .controls {
            background: var(--bg-secondary); border-radius: 14px; padding: 18px;
            border: 1px solid var(--border); display: flex; flex-direction: column; gap: 18px;
            height: fit-content;
        }
        .section-title {
            font-weight: 700; font-size: 0.85rem; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.82rem; color: var(--text-secondary); font-weight: 600; }
        input[type="text"], input[type="number"], select, textarea {
            padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg-primary); color: var(--text-primary);
            font-size: 0.88rem; outline: none; width: 100%;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        .range-row { display: flex; align-items: center; gap: 10px; }
        .range-row input[type="range"] { flex: 1; }
        .range-val { font-size: 0.8rem; color: var(--accent); font-weight: 700; min-width: 36px; text-align: right; }
        .color-row { display: flex; align-items: center; gap: 8px; }
        .color-row input[type="color"] { width: 40px; height: 32px; padding: 2px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: none; }
        .color-hex { flex: 1; }

        /* Position Grid */
        .position-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
        }
        .pos-btn {
            aspect-ratio: 1; border: 2px solid var(--border); border-radius: 8px;
            background: var(--bg-primary); cursor: pointer; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; color: var(--text-secondary);
        }
        .pos-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-tertiary); }
        .pos-btn.active { border-color: var(--accent); background: var(--accent); color: white; font-weight: 700; }

        /* Divider */
        .divider { border: none; border-top: 1px solid var(--border); }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--border); border-radius: 14px; padding: 40px 20px;
            text-align: center; cursor: pointer; transition: all 0.2s;
            background: var(--bg-secondary);
        }
        .upload-area:hover, .upload-area.drag-over { border-color: var(--accent); background: rgba(139,92,246,0.05); }
        .upload-area .upload-icon { font-size: 3rem; margin-bottom: 12px; }
        .upload-area p { color: var(--text-secondary); font-size: 0.9rem; }
        .upload-area .upload-hint { font-size: 0.78rem; margin-top: 6px; color: var(--text-secondary); }

        /* Canvas Wrapper */
        .canvas-wrapper {
            border-radius: 14px; overflow: hidden; border: 1px solid var(--border);
            background: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%) 0 0 / 20px 20px;
            display: flex; align-items: center; justify-content: center; min-height: 300px;
            position: relative;
        }
        [data-theme="dark"] .canvas-wrapper {
            background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 0 0 / 20px 20px;
        }
        canvas { max-width: 100%; max-height: 600px; display: block; }

        /* Image Info */
        .image-info {
            background: var(--bg-secondary); border-radius: 10px; padding: 10px 14px;
            border: 1px solid var(--border); display: flex; gap: 16px; flex-wrap: wrap;
            font-size: 0.8rem; color: var(--text-secondary); margin-top: 10px;
        }
        .image-info span strong { color: var(--text-primary); }

        /* Preview Panel */
        .preview-panel { display: flex; flex-direction: column; gap: 12px; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 10px;
            font-weight: 700; cursor: pointer; font-size: 0.88rem;
            transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; gap: 6px;
        }
        .btn:hover { opacity: 0.85; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Download options */
        .download-opts {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            background: var(--bg-secondary); border-radius: 10px; padding: 10px 14px;
            border: 1px solid var(--border);
        }
        .download-opts label { font-size: 0.82rem; color: var(--text-secondary); }
        .download-opts select { width: auto; padding: 5px 10px; }
        .download-opts input[type="range"] { width: 100px; }

        /* Checkbox row */
        .check-row { display: flex; align-items: center; gap: 8px; }
        .check-row input[type="checkbox"] { accent-color: var(--accent); }
        .check-row label { font-size: 0.85rem; cursor: pointer; }

        @media (max-width: 800px) {
            .layout { grid-template-columns: 1fr; }
            .controls { order: 2; }
            .preview-panel { order: 1; }
        }
    </style>
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <div class="container">
        <header>
            <h1>🖼️ Image Watermark</h1>
            <p class="subtitle">이미지에 텍스트 워터마크 추가 — 완전 클라이언트 처리, 서버로 업로드되지 않습니다</p>
        </header>

        <div class="layout">
            <!-- Controls -->
            <div class="controls">
                <!-- Watermark Text -->
                <div>
                    <div class="section-title">💬 워터마크 텍스트</div>
                    <div class="form-group">
                        <label>텍스트</label>
                        <input type="text" id="wm-text" value="© EastSea" placeholder="워터마크 텍스트" oninput="render()">
                    </div>
                </div>

                <hr class="divider">

                <!-- Font Settings -->
                <div>
                    <div class="section-title">🔤 폰트 설정</div>
                    <div class="form-group">
                        <label>폰트</label>
                        <select id="wm-font" onchange="render()">
                            <option value="Arial">Arial</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Impact">Impact</option>
                            <option value="Trebuchet MS">Trebuchet MS</option>
                            <option value="Verdana">Verdana</option>
                            <option value="Times New Roman">Times New Roman</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-top:10px">
                        <label>크기</label>
                        <div class="range-row">
                            <input type="range" id="wm-size" min="10" max="200" value="36" oninput="syncRange(this,'wm-size-val');render()">
                            <span class="range-val" id="wm-size-val">36px</span>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:10px">
                        <label>색상</label>
                        <div class="color-row">
                            <input type="color" id="wm-color" value="#ffffff" oninput="syncColor()">
                            <input type="text" class="color-hex" id="wm-color-hex" value="#ffffff" maxlength="7" oninput="syncHex()">
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:10px">
                        <label>불투명도</label>
                        <div class="range-row">
                            <input type="range" id="wm-opacity" min="1" max="100" value="60" oninput="syncRange(this,'wm-opacity-val');render()">
                            <span class="range-val" id="wm-opacity-val">60%</span>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:10px">
                        <label>회전 각도</label>
                        <div class="range-row">
                            <input type="range" id="wm-rotate" min="-90" max="90" value="-30" oninput="syncRange(this,'wm-rotate-val');render()">
                            <span class="range-val" id="wm-rotate-val">-30°</span>
                        </div>
                    </div>
                </div>

                <hr class="divider">

                <!-- Position -->
                <div>
                    <div class="section-title">📍 위치</div>
                    <div class="position-grid" id="position-grid">
                        <button class="pos-btn" data-pos="top-left"     onclick="setPos(this)">↖</button>
                        <button class="pos-btn" data-pos="top-center"   onclick="setPos(this)">↑</button>
                        <button class="pos-btn" data-pos="top-right"    onclick="setPos(this)">↗</button>
                        <button class="pos-btn" data-pos="mid-left"     onclick="setPos(this)">←</button>
                        <button class="pos-btn" data-pos="center"       onclick="setPos(this)">●</button>
                        <button class="pos-btn" data-pos="mid-right"    onclick="setPos(this)">→</button>
                        <button class="pos-btn" data-pos="bot-left"     onclick="setPos(this)">↙</button>
                        <button class="pos-btn" data-pos="bot-center"   onclick="setPos(this)">↓</button>
                        <button class="pos-btn active" data-pos="bot-right" onclick="setPos(this)">↘</button>
                    </div>
                    <div class="check-row" style="margin-top:12px">
                        <input type="checkbox" id="wm-tile" onchange="render()">
                        <label for="wm-tile">타일 반복 (전체 이미지에 배치)</label>
                    </div>
                    <div class="form-group" id="tile-gap-row" style="margin-top:10px; display:none">
                        <label>타일 간격</label>
                        <div class="range-row">
                            <input type="range" id="wm-tile-gap" min="50" max="400" value="150" oninput="syncRange(this,'wm-tile-gap-val');render()">
                            <span class="range-val" id="wm-tile-gap-val">150px</span>
                        </div>
                    </div>
                </div>

                <hr class="divider">

                <!-- Style extras -->
                <div>
                    <div class="section-title">✨ 스타일 효과</div>
                    <div class="check-row">
                        <input type="checkbox" id="wm-shadow" checked onchange="render()">
                        <label for="wm-shadow">텍스트 그림자</label>
                    </div>
                    <div class="check-row" style="margin-top:8px">
                        <input type="checkbox" id="wm-stroke" onchange="render()">
                        <label for="wm-stroke">외곽선 (검정)</label>
                    </div>
                    <div class="check-row" style="margin-top:8px">
                        <input type="checkbox" id="wm-bold" onchange="render()">
                        <label for="wm-bold">굵게 (Bold)</label>
                    </div>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="preview-panel">
                <!-- Upload -->
                <div id="upload-area" class="upload-area"
                     onclick="document.getElementById('file-input').click()"
                     ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
                    <div class="upload-icon">🖼️</div>
                    <p><strong>클릭하거나 이미지를 드래그하세요</strong></p>
                    <p class="upload-hint">JPG, PNG, WebP, GIF 지원 · 파일이 서버로 전송되지 않습니다</p>
                </div>
                <input type="file" id="file-input" accept="image/*" style="display:none" onchange="loadFile(this)">

                <!-- Canvas -->
                <div class="canvas-wrapper" id="canvas-wrapper" style="display:none">
                    <canvas id="canvas"></canvas>
                </div>

                <!-- Image info -->
                <div class="image-info" id="image-info" style="display:none">
                    <span>📐 <strong id="img-dims">—</strong></span>
                    <span>📁 <strong id="img-name">—</strong></span>
                    <span>💾 <strong id="img-size">—</strong></span>
                </div>

                <!-- Download -->
                <div class="download-opts" id="download-opts" style="display:none">
                    <label>포맷</label>
                    <select id="dl-format">
                        <option value="image/png">PNG</option>
                        <option value="image/jpeg" selected>JPEG</option>
                        <option value="image/webp">WebP</option>
                    </select>
                    <label>품질</label>
                    <input type="range" id="dl-quality" min="50" max="100" value="92" oninput="document.getElementById('dl-quality-val').textContent=this.value+'%'">
                    <span id="dl-quality-val" style="font-size:0.8rem;color:var(--accent);font-weight:700">92%</span>
                    <div class="btn-row" style="margin-left:auto">
                        <button class="btn btn-secondary" onclick="resetImage()" id="btn-reset">🔄 이미지 변경</button>
                        <button class="btn btn-primary" onclick="downloadImage()" id="btn-download">⬇️ 워터마크 저장</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ── State ── */
        let sourceImage = null;
        let currentPos = 'bot-right';
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        /* ── Theme ── */
        function initTheme() {
            const s = localStorage.getItem('imwm-theme') || 'light';
            document.documentElement.setAttribute('data-theme', s);
            document.getElementById('theme-btn').textContent = s === 'light' ? '🌙' : '☀️';
        }
        function toggleTheme() {
            const c = document.documentElement.getAttribute('data-theme') || 'light';
            const n = c === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', n);
            localStorage.setItem('imwm-theme', n);
            document.getElementById('theme-btn').textContent = n === 'light' ? '🌙' : '☀️';
        }

        /* ── UI Helpers ── */
        function syncRange(el, valId) {
            const unit = valId.includes('rotate') ? '°' : valId.includes('opacity') ? '%' : 'px';
            document.getElementById(valId).textContent = el.value + unit;
        }
        function syncColor() {
            const hex = document.getElementById('wm-color').value;
            document.getElementById('wm-color-hex').value = hex;
            render();
        }
        function syncHex() {
            let hex = document.getElementById('wm-color-hex').value;
            if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
                document.getElementById('wm-color').value = hex;
                render();
            }
        }
        function setPos(btn) {
            document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPos = btn.dataset.pos;
            render();
        }

        /* Tile gap toggle */
        document.getElementById('wm-tile').addEventListener('change', function() {
            document.getElementById('tile-gap-row').style.display = this.checked ? 'block' : 'none';
            render();
        });

        /* ── File Loading ── */
        function formatBytes(b) {
            if (b < 1024) return b + ' B';
            if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
            return (b/1024/1024).toFixed(2) + ' MB';
        }

        function loadFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    sourceImage = img;
                    document.getElementById('upload-area').style.display = 'none';
                    document.getElementById('canvas-wrapper').style.display = 'flex';
                    document.getElementById('image-info').style.display = 'flex';
                    document.getElementById('download-opts').style.display = 'flex';
                    document.getElementById('img-dims').textContent = img.naturalWidth + ' × ' + img.naturalHeight;
                    document.getElementById('img-name').textContent = file.name;
                    document.getElementById('img-size').textContent = formatBytes(file.size);
                    render();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function resetImage() {
            sourceImage = null;
            document.getElementById('upload-area').style.display = 'block';
            document.getElementById('canvas-wrapper').style.display = 'none';
            document.getElementById('image-info').style.display = 'none';
            document.getElementById('download-opts').style.display = 'none';
            document.getElementById('file-input').value = '';
        }

        /* ── Drag & Drop ── */
        function onDragOver(e) { e.preventDefault(); document.getElementById('upload-area').classList.add('drag-over'); }
        function onDragLeave(e) { document.getElementById('upload-area').classList.remove('drag-over'); }
        function onDrop(e) {
            e.preventDefault();
            document.getElementById('upload-area').classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const dt = new DataTransfer();
                dt.items.add(file);
                document.getElementById('file-input').files = dt.files;
                loadFile(document.getElementById('file-input'));
            }
        }

        /* ── Render Watermark ── */
        function render() {
            if (!sourceImage) return;

            // Set canvas to image dimensions
            canvas.width  = sourceImage.naturalWidth;
            canvas.height = sourceImage.naturalHeight;

            // Draw base image
            ctx.drawImage(sourceImage, 0, 0);

            const text    = document.getElementById('wm-text').value || '© Watermark';
            const font    = document.getElementById('wm-font').value;
            const size    = parseInt(document.getElementById('wm-size').value);
            const opacity = parseInt(document.getElementById('wm-opacity').value) / 100;
            const color   = document.getElementById('wm-color').value;
            const rotate  = parseInt(document.getElementById('wm-rotate').value) * Math.PI / 180;
            const shadow  = document.getElementById('wm-shadow').checked;
            const stroke  = document.getElementById('wm-stroke').checked;
            const bold    = document.getElementById('wm-bold').checked;
            const tile    = document.getElementById('wm-tile').checked;
            const gap     = parseInt(document.getElementById('wm-tile-gap').value);

            ctx.save();
            ctx.globalAlpha = opacity;

            const weight = bold ? 'bold ' : '';
            ctx.font = `${weight}${size}px "${font}"`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (shadow) {
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = Math.ceil(size * 0.15);
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
            }

            const W = canvas.width;
            const H = canvas.height;

            if (tile) {
                // Tile mode: draw across entire canvas
                for (let y = gap / 2; y < H + gap; y += gap) {
                    for (let x = gap / 2; x < W + gap; x += gap) {
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(rotate);
                        if (stroke) {
                            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                            ctx.lineWidth = size * 0.04;
                            ctx.strokeText(text, 0, 0);
                        }
                        ctx.fillText(text, 0, 0);
                        ctx.restore();
                    }
                }
            } else {
                // Single position mode
                const metrics = ctx.measureText(text);
                const tw = metrics.width;
                const th = size;
                const pad = Math.max(10, size * 0.4);
                let x, y;

                switch (currentPos) {
                    case 'top-left':    x = pad + tw/2;       y = pad + th/2;      break;
                    case 'top-center':  x = W/2;              y = pad + th/2;      break;
                    case 'top-right':   x = W - pad - tw/2;   y = pad + th/2;      break;
                    case 'mid-left':    x = pad + tw/2;       y = H/2;             break;
                    case 'center':      x = W/2;              y = H/2;             break;
                    case 'mid-right':   x = W - pad - tw/2;   y = H/2;             break;
                    case 'bot-left':    x = pad + tw/2;       y = H - pad - th/2;  break;
                    case 'bot-center':  x = W/2;              y = H - pad - th/2;  break;
                    case 'bot-right':   x = W - pad - tw/2;   y = H - pad - th/2;  break;
                    default:            x = W/2;              y = H/2;
                }

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotate);
                if (stroke) {
                    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                    ctx.lineWidth = size * 0.04;
                    ctx.strokeText(text, 0, 0);
                }
                ctx.fillText(text, 0, 0);
                ctx.restore();
            }

            ctx.restore();
        }

        /* ── Download ── */
        function downloadImage() {
            if (!sourceImage) return;
            const format  = document.getElementById('dl-format').value;
            const quality = parseInt(document.getElementById('dl-quality').value) / 100;
            const ext = format === 'image/png' ? 'png' : format === 'image/webp' ? 'webp' : 'jpg';
            const a = document.createElement('a');
            a.href = canvas.toDataURL(format, quality);
            a.download = 'watermarked.' + ext;
            a.click();
        }

        initTheme();
    </script>
</body>
</html>
