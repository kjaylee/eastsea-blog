<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In-app Purchase Conversion Uplift Calculator | 인앱결제 전환율 상승 수익 계산기</title>
  <meta name="description" content="인앱결제 전환율 개선 시 순증 payer 기반의 월 순이익, ROI, 회수기간, 손익분기 전환율을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🎮 인앱결제 전환율 상승 수익 계산기</h1>
        <div class="sub" id="subtitle">결제 전환율 개선으로 순증 payer가 늘어날 때 월 순이익, ROI, 손익분기를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_mau" for="mau"></label><input id="mau" type="number" min="1" value="1200000"></div>
          <div><label id="l_currentConv" for="currentConv"></label><input id="currentConv" type="number" min="0" max="100" step="0.1" value="2.4"></div>
          <div><label id="l_targetConv" for="targetConv"></label><input id="targetConv" type="number" min="0" max="100" step="0.1" value="3.1"></div>
          <div><label id="l_purchasesPerPayer" for="purchasesPerPayer"></label><input id="purchasesPerPayer" type="number" min="0" step="0.1" value="3.2"></div>
          <div><label id="l_aov" for="aov"></label><input id="aov" type="number" min="0" step="100" value="8900"></div>
          <div><label id="l_platformFee" for="platformFee"></label><input id="platformFee" type="number" min="0" max="100" step="0.1" value="30"></div>
          <div><label id="l_refundRate" for="refundRate"></label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="4"></div>
          <div><label id="l_cogsRate" for="cogsRate"></label><input id="cogsRate" type="number" min="0" max="100" step="0.1" value="18"></div>
          <div><label id="l_liveOpsCost" for="liveOpsCost"></label><input id="liveOpsCost" type="number" min="0" step="100" value="2100"></div>
          <div><label id="l_fixedCost" for="fixedCost"></label><input id="fixedCost" type="number" min="0" step="10000" value="9000000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="15000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_newPayers"></div><div class="v" id="newPayers">-</div></div>
          <div class="kpi"><div class="k" id="k_perPayerNet"></div><div class="v" id="perPayerNet">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_convDelta"></div><div class="v" id="convDelta">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_breakEvenConv"></th><td id="breakEvenConv">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_monthlyContribution"></th><td id="monthlyContribution">-</td></tr>
          <tr><th id="d_totalProgramCost"></th><td id="totalProgramCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={mau:$("mau"),currentConv:$("currentConv"),targetConv:$("targetConv"),purchasesPerPayer:$("purchasesPerPayer"),aov:$("aov"),platformFee:$("platformFee"),refundRate:$("refundRate"),cogsRate:$("cogsRate"),liveOpsCost:$("liveOpsCost"),fixedCost:$("fixedCost"),setup:$("setup"),months:$("months"),newPayers:$("newPayers"),perPayerNet:$("perPayerNet"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),convDelta:$("convDelta"),breakEvenConv:$("breakEvenConv"),payback:$("payback"),monthlyContribution:$("monthlyContribution"),totalProgramCost:$("totalProgramCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={mau:1200000,currentConv:2.4,targetConv:3.1,purchasesPerPayer:3.2,aov:8900,platformFee:30,refundRate:4,cogsRate:18,liveOpsCost:2100,fixedCost:9000000,setup:15000000,months:12};
    const I18N={
      ko:{title:"🎮 인앱결제 전환율 상승 수익 계산기",subtitle:"결제 전환율 개선으로 순증 payer가 늘어날 때 월 순이익, ROI, 손익분기를 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_mau:"월 활성 사용자 (MAU)",l_currentConv:"현재 결제 전환율 (%)",l_targetConv:"목표 결제 전환율 (%)",l_purchasesPerPayer:"payer 1인당 월 결제 횟수",l_aov:"1회 평균 결제금액 (₩)",l_platformFee:"플랫폼 수수료율 (%)",l_refundRate:"환불률 (%)",l_cogsRate:"콘텐츠/리워드 원가율 (%)",l_liveOpsCost:"payer 1인당 라이브옵스 비용 (₩)",l_fixedCost:"월 고정 운영비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_newPayers:"순증 payer 수",k_perPayerNet:"payer 1인당 월 순기여",k_monthlyNet:"월 순증 순이익",k_roi:"ROI",k_periodNet:"기간 순효과",k_convDelta:"전환율 증가폭",d_breakEvenConv:"손익분기 목표 전환율",d_payback:"회수기간",d_monthlyContribution:"월 순증 총기여액",d_totalProgramCost:"기간 총 프로그램비",ok:"IAP 전환 상승 시나리오 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, MAU/기간은 1 이상이어야 합니다.",logicErr:"목표 전환율은 현재 전환율 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[인앱결제 전환율 상승 수익 요약]",unitMonths:"개월"},
      en:{title:"🎮 In-app Purchase Conversion Uplift Calculator",subtitle:"Estimate monthly profit, payback, and ROI from improving payer conversion rate.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_mau:"Monthly active users (MAU)",l_currentConv:"Current payer conversion rate (%)",l_targetConv:"Target payer conversion rate (%)",l_purchasesPerPayer:"Monthly purchases per payer",l_aov:"Average order value per purchase (KRW)",l_platformFee:"Platform fee rate (%)",l_refundRate:"Refund rate (%)",l_cogsRate:"Content/reward COGS rate (%)",l_liveOpsCost:"Live-ops cost per payer (KRW)",l_fixedCost:"Monthly fixed operating cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_newPayers:"Net new payers",k_perPayerNet:"Monthly net contribution per payer",k_monthlyNet:"Monthly net profit",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_convDelta:"Conversion rate delta",d_breakEvenConv:"Break-even target conversion",d_payback:"Payback period",d_monthlyContribution:"Monthly total contribution uplift",d_totalProgramCost:"Total program cost (period)",ok:"IAP conversion uplift economics ready",warn:"Monthly net profit is negative with current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and MAU/months must be >= 1.",logicErr:"Target conversion rate must be greater than or equal to current conversion rate.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[In-app Purchase Conversion Uplift Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["mau","currentConv","targetConv","purchasesPerPayer","aov","platformFee","refundRate","cogsRate","liveOpsCost","fixedCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["newPayers","perPayerNet","monthlyNet","roi","periodNet","convDelta"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenConv","payback","monthlyContribution","totalProgramCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.mau)||v.mau<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.purchasesPerPayer,v.aov,v.liveOpsCost,v.fixedCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.currentConv,v.targetConv,v.platformFee,v.refundRate,v.cogsRate].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetConv<v.currentConv) return t("logicErr");
      return "";
    }

    function render(){
      const v={mau:Number(refs.mau.value),currentConv:Number(refs.currentConv.value),targetConv:Number(refs.targetConv.value),purchasesPerPayer:Number(refs.purchasesPerPayer.value),aov:Number(refs.aov.value),platformFee:Number(refs.platformFee.value),refundRate:Number(refs.refundRate.value),cogsRate:Number(refs.cogsRate.value),liveOpsCost:Number(refs.liveOpsCost.value),fixedCost:Number(refs.fixedCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["newPayers","perPayerNet","monthlyNet","roi","periodNet","convDelta","breakEvenConv","payback","monthlyContribution","totalProgramCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const currentPayers=v.mau*(v.currentConv/100);
      const targetPayers=v.mau*(v.targetConv/100);
      const newPayers=Math.max(0,targetPayers-currentPayers);
      const perPayerNet=(v.purchasesPerPayer*v.aov*(1-v.platformFee/100-v.refundRate/100)*(1-v.cogsRate/100))-v.liveOpsCost;
      const monthlyContribution=newPayers*perPayerNet;
      const monthlyNet=monthlyContribution-v.fixedCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.fixedCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const convDelta=v.targetConv-v.currentConv;

      const requiredPayers=perPayerNet>0?(v.fixedCost/perPayerNet):Infinity;
      const breakEvenConv=Number.isFinite(requiredPayers)&&v.mau>0?v.currentConv+((requiredPayers/v.mau)*100):Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.newPayers.textContent=num(newPayers,0);
      refs.perPayerNet.textContent=won(perPayerNet);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.convDelta.textContent=pct(convDelta,2);
      refs.breakEvenConv.textContent=(Number.isFinite(breakEvenConv)&&breakEvenConv<=100)?pct(breakEvenConv,3):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.totalProgramCost.textContent=won(totalProgramCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_newPayers")}: ${num(newPayers,0)}`,`${t("k_perPayerNet")}: ${won(perPayerNet)}`,`${t("d_monthlyContribution")}: ${won(monthlyContribution)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenConv")}: ${(Number.isFinite(breakEvenConv)&&breakEvenConv<=100)?pct(breakEvenConv,3):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.mau,refs.currentConv,refs.targetConv,refs.purchasesPerPayer,refs.aov,refs.platformFee,refs.refundRate,refs.cogsRate,refs.liveOpsCost,refs.fixedCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
