<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In-app Tip Jar Profit Calculator | 인앱 팁 Jar 수익 계산기</title>
  <meta name="description" content="팁(후원) 기능의 노출률, 전환율, 평균 팁, 수수료를 반영해 월 순이익, 연간 ROI, 회수기간, 손익분기 전환율을 계산합니다." />
  <meta name="keywords" content="tip jar, creator tips, monetization, profit, roi, in-app purchase, donation, calculator" />
  <link rel="canonical" href="https://eastsea.monster/tools/in-app-tip-jar-profit-calculator/" />
  <style>
    :root {
      --bg: #0b1222;
      --panel: #121f3b;
      --line: #2a3d66;
      --text: #eef2ff;
      --muted: #a8b6d9;
      --accent: #7aa6ff;
      --accent-2: #55c2ff;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #1c2f57 0%, var(--bg) 55%);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 14px 52px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.8vw, 1.9rem);
    }
    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.5;
      max-width: 74ch;
    }
    .note {
      margin-top: 6px;
      color: #c5d3f4;
      font-size: 0.82rem;
    }
    .link {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 11px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.86rem;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 12px;
    }
    .card {
      background: linear-gradient(170deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      min-width: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 5px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #344b79;
      border-radius: 10px;
      background: #162745;
      color: var(--text);
      padding: 9px 10px;
      font-size: 0.92rem;
    }
    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0a1328;
    }
    button.soft {
      border: 1px solid #3a5587;
      background: rgba(122, 166, 255, 0.12);
      color: var(--text);
    }
    .error {
      margin-top: 9px;
      color: var(--bad);
      font-size: 0.83rem;
      display: none;
      min-height: 1.2em;
    }
    .error.show { display: block; }
    textarea {
      margin-top: 9px;
      min-height: 130px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.8rem;
      line-height: 1.4;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .kpi {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.02);
    }
    .k {
      color: var(--muted);
      font-size: 0.74rem;
    }
    .v {
      margin-top: 4px;
      font-size: 1.02rem;
      font-weight: 650;
      word-break: break-word;
    }
    .status {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.03);
      font-size: 0.86rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.86rem;
    }
    th, td {
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      padding: 7px 4px;
      text-align: right;
    }
    th:first-child, td:first-child { text-align: left; color: var(--muted); }
    .ok { color: var(--good); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .inputs { grid-template-columns: 1fr; }
    }
  </style>
  <!-- Analytics: GA4 + Clarity -->
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>💸 인앱 팁 Jar 수익 계산기</h1>
        <div class="sub">팁(후원) 기능의 노출률, 전환율, 평균 팁, 수수료를 반영해 월 순이익, 연간 ROI, 회수기간, 손익분기 전환율을 계산합니다.</div>
        <div class="note">팁 횟수/인과 수수료 구조가 바뀌면 손익분기 전환율이 크게 달라집니다.</div>
      </div>
      <a class="link" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="mau">월간 활성 사용자 (MAU)</label><input id="mau" type="number" min="1" value="50000" /></div>
          <div><label for="exposureRate">팁 노출률 (%)</label><input id="exposureRate" type="number" min="0" max="100" step="0.1" value="40" /></div>
          <div><label for="conversionRate">팁 전환율 (%)</label><input id="conversionRate" type="number" min="0" max="100" step="0.01" value="1.2" /></div>
          <div><label for="tipsPerTipper">1인당 월 평균 팁 횟수</label><input id="tipsPerTipper" type="number" min="0" step="0.1" value="1.4" /></div>
          <div><label for="avgTip">평균 팁 금액 (KRW)</label><input id="avgTip" type="number" min="0" value="3500" /></div>
          <div><label for="platformFee">플랫폼 수수료 (%)</label><input id="platformFee" type="number" min="0" max="100" step="0.1" value="15" /></div>
          <div><label for="paymentFee">결제 처리 수수료 (%)</label><input id="paymentFee" type="number" min="0" max="100" step="0.1" value="3.4" /></div>
          <div><label for="fixedFee">결제 고정 수수료 (KRW/건)</label><input id="fixedFee" type="number" min="0" value="40" /></div>
          <div><label for="monthlyCost">월 운영비 (KRW)</label><input id="monthlyCost" type="number" min="0" value="500000" /></div>
          <div><label for="implementationCost">1회 구축비 (KRW)</label><input id="implementationCost" type="number" min="0" value="4000000" /></div>
        </div>
        <div class="btns">
          <button class="soft" type="button" id="copy">요약 복사</button>
          <button type="button" id="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 총 팁 매출</div><div id="gross" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순매출</div><div id="netRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순이익</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 ROI</div><div id="annualRoi" class="v">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v">-</div></div>
          <div class="kpi"><div class="k">손익분기 전환율</div><div id="breakEven" class="v">-</div></div>
        </div>
        <div id="status" class="status">성과 해석 대기</div>

        <h2 style="margin-top:12px">상세 계산</h2>
        <table>
          <tbody>
            <tr><th>팁 노출 사용자</th><td id="exposure">-</td></tr>
            <tr><th>팁 사용자</th><td id="tippers">-</td></tr>
            <tr><th>팁 거래 건수</th><td id="transactions">-</td></tr>
            <tr><th>총 수수료</th><td id="fees">-</td></tr>
            <tr><th>순팁 단가</th><td id="netPerTip">-</td></tr>
            <tr><th>월 운영비</th><td id="monthlyCostOut">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script type="module" src="./app.mjs"></script>
</body>
</html>
