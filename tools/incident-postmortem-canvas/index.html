<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>사고 포스트모템 캔버스</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #11152b;
      --panel-2: #161c38;
      --text: #e8ecff;
      --muted: #98a2c8;
      --neon: #68f0ff;
      --neon-2: #b388ff;
      --danger: #ff6b8a;
      --ok: #51f6a9;
      --line: #2a335d;
      --shadow: 0 0 0 1px rgba(104,240,255,.15), 0 14px 36px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: radial-gradient(circle at 10% 0%, rgba(104,240,255,.08), transparent 30%),
                  radial-gradient(circle at 90% 10%, rgba(179,136,255,.1), transparent 35%),
                  var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 14px 50px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(104,240,255,.1), rgba(179,136,255,.12));
      border: 1px solid rgba(104,240,255,.28);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.3rem, 2.6vw, 2rem);
      letter-spacing: .2px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: .94rem;
      line-height: 1.5;
    }

    .toolbar {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button, .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      color: #04121f;
      background: linear-gradient(135deg, var(--neon), #4ec9ff);
      cursor: pointer;
      font-weight: 700;
      transition: transform .12s ease, box-shadow .2s ease, opacity .2s;
      box-shadow: 0 6px 22px rgba(78,201,255,.35);
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }

    .btn-secondary {
      color: #efe9ff;
      background: linear-gradient(135deg, #6f56c8, var(--neon-2));
      box-shadow: 0 6px 22px rgba(179,136,255,.28);
    }

    .btn-ghost {
      color: var(--text);
      background: #202949;
      border: 1px solid #3a477f;
      box-shadow: none;
    }

    .btn-danger {
      color: #ffe9ee;
      background: linear-gradient(135deg, #a31f49, var(--danger));
      box-shadow: 0 6px 22px rgba(255,107,138,.32);
    }

    .status {
      margin-left: auto;
      align-self: center;
      font-size: .84rem;
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 9px;
      background: rgba(18, 24, 50, .9);
      border: 1px solid #2a335d;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .card {
      grid-column: span 12;
      background: linear-gradient(180deg, rgba(22,28,56,.96), rgba(14,18,38,.96));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1.03rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 0 4px rgba(104,240,255,.15), 0 0 18px rgba(104,240,255,.95);
    }

    .two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    label {
      display: block;
      font-size: .84rem;
      color: var(--muted);
      margin: 0 0 6px;
      letter-spacing: .1px;
    }

    input, select, textarea {
      width: 100%;
      background: #0f1430;
      border: 1px solid #2f3b70;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 11px;
      outline: none;
      font: inherit;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(104,240,255,.13);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
      line-height: 1.45;
    }

    .kpi {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .pill {
      border: 1px solid #2f3b70;
      background: #0f1430;
      border-radius: 12px;
      padding: 12px;
    }

    .pill b {
      display: block;
      font-size: .77rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .pill span {
      color: var(--text);
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: .2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: .92rem;
    }

    th, td {
      border-bottom: 1px solid #2a335d;
      padding: 8px 6px;
      vertical-align: top;
    }

    th {
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      font-size: .8rem;
    }

    td input, td select {
      min-width: 100%;
      padding: 8px 9px;
      font-size: .9rem;
    }

    .table-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 9px;
      gap: 8px;
    }

    .small {
      font-size: .78rem;
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .2px;
      border: 1px solid #33507e;
      color: #cbf7ff;
      background: rgba(104,240,255,.09);
      margin-left: 6px;
    }

    .severity-glow {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 0 26px rgba(255,107,138,.18);
    }

    @media (max-width: 900px) {
      .two, .three, .kpi { grid-template-columns: 1fr; }
      .status { margin-left: 0; width: 100%; }
      .toolbar { align-items: stretch; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>사고 포스트모템 캔버스 <span class="badge">로컬 저장</span></h1>
      <p class="sub">운영 장애 회고를 빠르게 정리하고 재발 방지 액션까지 관리하세요. 입력값은 브라우저 localStorage에 자동 저장됩니다.</p>
      <div class="toolbar">
        <button id="saveBtn">저장</button>
        <button id="copyBtn" class="btn-secondary">Markdown 복사</button>
        <button id="exportBtn" class="btn-ghost">JSON 내보내기</button>
        <button id="resetBtn" class="btn-danger">초기화</button>
        <div class="status" id="status">자동 저장 대기 중</div>
      </div>
    </section>

    <div class="grid">
      <section class="card">
        <h2><span class="dot"></span>1) 사고 개요</h2>
        <div class="two">
          <div>
            <label for="incidentTitle">사건 제목</label>
            <input id="incidentTitle" placeholder="예: 결제 API 500 에러 급증" />
          </div>
          <div>
            <label for="incidentDate">발생 일시</label>
            <input id="incidentDate" type="datetime-local" />
          </div>
        </div>
        <div class="three" style="margin-top:10px;">
          <div>
            <label for="severity">심각도</label>
            <select id="severity" class="severity-glow">
              <option value="SEV-1">SEV-1 (치명)</option>
              <option value="SEV-2">SEV-2 (높음)</option>
              <option value="SEV-3">SEV-3 (중간)</option>
              <option value="SEV-4">SEV-4 (낮음)</option>
            </select>
          </div>
          <div>
            <label for="owner">사고 오너</label>
            <input id="owner" placeholder="예: 백엔드 온콜" />
          </div>
          <div>
            <label for="service">영향 서비스</label>
            <input id="service" placeholder="예: 결제, 주문, 로그인" />
          </div>
        </div>
        <div style="margin-top:10px;">
          <label for="summary">요약</label>
          <textarea id="summary" placeholder="무슨 일이 발생했는지 3~5줄로 요약"></textarea>
        </div>
      </section>

      <section class="card">
        <h2><span class="dot"></span>2) 영향도 지표</h2>
        <div class="two">
          <div>
            <label for="startAt">장애 시작 시각</label>
            <input id="startAt" type="datetime-local" />
          </div>
          <div>
            <label for="resolvedAt">복구 완료 시각</label>
            <input id="resolvedAt" type="datetime-local" />
          </div>
        </div>
        <div class="kpi" style="margin-top:10px;">
          <div class="pill"><b>MTTR</b><span id="mttr">-</span></div>
          <div class="pill"><b>영향 사용자(명)</b><span><input id="impactedUsers" type="number" min="0" placeholder="0" /></span></div>
          <div class="pill"><b>실패 요청 수</b><span><input id="failedReq" type="number" min="0" placeholder="0" /></span></div>
          <div class="pill"><b>추정 손실(원)</b><span><input id="estLoss" type="number" min="0" placeholder="0" /></span></div>
        </div>
      </section>

      <section class="card">
        <h2><span class="dot"></span>3) 타임라인</h2>
        <p class="small">사건 전개를 시간순으로 기록하세요. (예: 14:03 알람 발생 → 14:12 롤백 시작)</p>
        <table>
          <thead>
            <tr><th style="width:26%">시각</th><th>이벤트</th><th style="width:24%">담당</th><th style="width:72px">삭제</th></tr>
          </thead>
          <tbody id="timelineBody"></tbody>
        </table>
        <div class="table-actions">
          <button class="btn-ghost" id="addTimeline">타임라인 행 추가</button>
        </div>
      </section>

      <section class="card">
        <h2><span class="dot"></span>4) 원인 분석 (5 Whys)</h2>
        <div class="three">
          <div><label for="why1">Why #1</label><textarea id="why1" placeholder="직접 원인"></textarea></div>
          <div><label for="why2">Why #2</label><textarea id="why2" placeholder="한 단계 더 깊은 원인"></textarea></div>
          <div><label for="why3">Why #3</label><textarea id="why3" placeholder="프로세스/시스템 관점"></textarea></div>
        </div>
        <div class="two" style="margin-top:10px;">
          <div><label for="why4">Why #4</label><textarea id="why4" placeholder="조직/운영 관점"></textarea></div>
          <div><label for="why5">Why #5</label><textarea id="why5" placeholder="근본적 구조 원인"></textarea></div>
        </div>
      </section>

      <section class="card">
        <h2><span class="dot"></span>5) 재발 방지 액션 아이템</h2>
        <table>
          <thead>
            <tr><th>액션</th><th style="width:24%">담당</th><th style="width:20%">기한</th><th style="width:20%">상태</th><th style="width:72px">삭제</th></tr>
          </thead>
          <tbody id="actionBody"></tbody>
        </table>
        <div class="table-actions">
          <button class="btn-ghost" id="addAction">액션 행 추가</button>
        </div>
      </section>

      <section class="card">
        <h2><span class="dot"></span>6) 회고 결론</h2>
        <div class="two">
          <div>
            <label for="wentWell">잘한 점</label>
            <textarea id="wentWell" placeholder="예: 온콜 대응 속도, 롤백 절차 준수"></textarea>
          </div>
          <div>
            <label for="toImprove">개선할 점</label>
            <textarea id="toImprove" placeholder="예: 알림 임계치 조정, 배포 체크리스트 강화"></textarea>
          </div>
        </div>
        <div style="margin-top:10px;">
          <label for="finalNote">최종 메모</label>
          <textarea id="finalNote" placeholder="다음 회의 공유용 핵심 결론"></textarea>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = 'incidentPostmortemCanvas.v1';
      const $ = (id) => document.getElementById(id);
      const stateLabel = $('status');

      const baseFields = [
        'incidentTitle','incidentDate','severity','owner','service','summary',
        'startAt','resolvedAt','impactedUsers','failedReq','estLoss',
        'why1','why2','why3','why4','why5','wentWell','toImprove','finalNote'
      ];

      const defaultState = () => ({
        incidentTitle: '',
        incidentDate: '',
        severity: 'SEV-2',
        owner: '',
        service: '',
        summary: '',
        startAt: '',
        resolvedAt: '',
        impactedUsers: '',
        failedReq: '',
        estLoss: '',
        timeline: [
          { time: '', event: '', owner: '' },
          { time: '', event: '', owner: '' }
        ],
        why1: '', why2: '', why3: '', why4: '', why5: '',
        actions: [
          { task: '', owner: '', due: '', status: '미착수' }
        ],
        wentWell: '',
        toImprove: '',
        finalNote: ''
      });

      let saveTimer = null;

      function setStatus(text, type) {
        stateLabel.textContent = text;
        stateLabel.style.color = type === 'ok' ? 'var(--ok)' : type === 'warn' ? '#ffd67b' : 'var(--muted)';
      }

      function readStateFromForm() {
        const data = {};
        baseFields.forEach((id) => data[id] = $(id).value || '');

        data.timeline = Array.from(document.querySelectorAll('#timelineBody tr')).map((tr) => ({
          time: tr.querySelector('[data-k="time"]').value || '',
          event: tr.querySelector('[data-k="event"]').value || '',
          owner: tr.querySelector('[data-k="owner"]').value || ''
        }));

        data.actions = Array.from(document.querySelectorAll('#actionBody tr')).map((tr) => ({
          task: tr.querySelector('[data-k="task"]').value || '',
          owner: tr.querySelector('[data-k="owner"]').value || '',
          due: tr.querySelector('[data-k="due"]').value || '',
          status: tr.querySelector('[data-k="status"]').value || '미착수'
        }));

        return data;
      }

      function writeStateToForm(data) {
        const state = { ...defaultState(), ...data };
        baseFields.forEach((id) => { if ($(id)) $(id).value = state[id] || ''; });

        renderTimeline(state.timeline || []);
        renderActions(state.actions || []);
        updateMttr();
      }

      function saveNow(showToast = true) {
        try {
          const data = readStateFromForm();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          if (showToast) setStatus('저장 완료 · ' + new Date().toLocaleTimeString('ko-KR'), 'ok');
        } catch (e) {
          setStatus('저장 실패: localStorage 접근 오류', 'warn');
        }
      }

      function autoSave() {
        clearTimeout(saveTimer);
        setStatus('자동 저장 중…');
        saveTimer = setTimeout(() => saveNow(false), 350);
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            writeStateToForm(defaultState());
            setStatus('새 캔버스로 시작합니다.');
            return;
          }
          const parsed = JSON.parse(raw);
          writeStateToForm(parsed);
          setStatus('이전 작업을 불러왔습니다.');
        } catch (e) {
          writeStateToForm(defaultState());
          setStatus('저장 데이터가 손상되어 초기 상태로 복구했습니다.', 'warn');
        }
      }

      function renderTimeline(rows) {
        const body = $('timelineBody');
        body.innerHTML = '';
        (rows.length ? rows : [{ time: '', event: '', owner: '' }]).forEach((row) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input type="datetime-local" data-k="time" value="${escapeHtml(row.time || '')}" /></td>
            <td><input data-k="event" placeholder="이벤트 내용" value="${escapeHtml(row.event || '')}" /></td>
            <td><input data-k="owner" placeholder="담당" value="${escapeHtml(row.owner || '')}" /></td>
            <td><button class="btn-danger" data-act="del">삭제</button></td>
          `;
          body.appendChild(tr);
        });
      }

      function renderActions(rows) {
        const body = $('actionBody');
        body.innerHTML = '';
        (rows.length ? rows : [{ task: '', owner: '', due: '', status: '미착수' }]).forEach((row) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input data-k="task" placeholder="예: 배포 전 스키마 검증 자동화" value="${escapeHtml(row.task || '')}" /></td>
            <td><input data-k="owner" placeholder="담당자" value="${escapeHtml(row.owner || '')}" /></td>
            <td><input type="date" data-k="due" value="${escapeHtml(row.due || '')}" /></td>
            <td>
              <select data-k="status">
                ${['미착수','진행중','완료','보류'].map(s => `<option ${row.status === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </td>
            <td><button class="btn-danger" data-act="del">삭제</button></td>
          `;
          body.appendChild(tr);
        });
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function updateMttr() {
        const s = $('startAt').value;
        const e = $('resolvedAt').value;
        if (!s || !e) {
          $('mttr').textContent = '-';
          return;
        }
        const start = new Date(s).getTime();
        const end = new Date(e).getTime();
        if (Number.isNaN(start) || Number.isNaN(end) || end <= start) {
          $('mttr').textContent = '시간 입력 확인';
          return;
        }
        const min = Math.floor((end - start) / 60000);
        const h = Math.floor(min / 60);
        const m = min % 60;
        $('mttr').textContent = `${h}시간 ${m}분`;
      }

      function toMarkdown(data) {
        const safe = (v) => (v || '').toString().trim() || '-';

        const timeline = (data.timeline || []).map((r, i) =>
          `${i + 1}. **${safe(r.time)}** — ${safe(r.event)} (${safe(r.owner)})`
        ).join('\n') || '-';

        const actions = (data.actions || []).map((r, i) =>
          `${i + 1}. [${safe(r.status)}] ${safe(r.task)} / 담당: ${safe(r.owner)} / 기한: ${safe(r.due)}`
        ).join('\n') || '-';

        return `# 사고 포스트모템\n\n` +
`## 1. 사고 개요\n` +
`- 사건 제목: ${safe(data.incidentTitle)}\n` +
`- 발생 일시: ${safe(data.incidentDate)}\n` +
`- 심각도: ${safe(data.severity)}\n` +
`- 오너: ${safe(data.owner)}\n` +
`- 영향 서비스: ${safe(data.service)}\n` +
`- 요약: ${safe(data.summary)}\n\n` +
`## 2. 영향도\n` +
`- 장애 시작: ${safe(data.startAt)}\n` +
`- 복구 완료: ${safe(data.resolvedAt)}\n` +
`- MTTR: ${$('mttr').textContent}\n` +
`- 영향 사용자(명): ${safe(data.impactedUsers)}\n` +
`- 실패 요청 수: ${safe(data.failedReq)}\n` +
`- 추정 손실(원): ${safe(data.estLoss)}\n\n` +
`## 3. 타임라인\n${timeline}\n\n` +
`## 4. 5 Whys\n` +
`1) ${safe(data.why1)}\n2) ${safe(data.why2)}\n3) ${safe(data.why3)}\n4) ${safe(data.why4)}\n5) ${safe(data.why5)}\n\n` +
`## 5. 재발 방지 액션\n${actions}\n\n` +
`## 6. 회고 결론\n` +
`- 잘한 점: ${safe(data.wentWell)}\n` +
`- 개선할 점: ${safe(data.toImprove)}\n` +
`- 최종 메모: ${safe(data.finalNote)}\n`;
      }

      function exportJson(data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const title = (data.incidentTitle || 'incident-postmortem').replace(/[^\w\-가-힣]+/g, '-').slice(0, 50);
        a.href = url;
        a.download = `${title || 'incident-postmortem'}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function bindEvents() {
        document.addEventListener('input', (e) => {
          if (e.target.closest('input, textarea, select')) {
            if (e.target.id === 'startAt' || e.target.id === 'resolvedAt') updateMttr();
            autoSave();
          }
        });

        document.addEventListener('change', (e) => {
          if (e.target.closest('input, textarea, select')) {
            if (e.target.id === 'startAt' || e.target.id === 'resolvedAt') updateMttr();
            autoSave();
          }
        });

        $('saveBtn').addEventListener('click', () => saveNow(true));

        $('copyBtn').addEventListener('click', async () => {
          const md = toMarkdown(readStateFromForm());
          try {
            await navigator.clipboard.writeText(md);
            setStatus('Markdown이 클립보드에 복사되었습니다.', 'ok');
          } catch {
            setStatus('복사 실패: 브라우저 권한을 확인해주세요.', 'warn');
          }
        });

        $('exportBtn').addEventListener('click', () => exportJson(readStateFromForm()));

        $('resetBtn').addEventListener('click', () => {
          if (!confirm('정말 초기화할까요? 저장된 localStorage 데이터도 삭제됩니다.')) return;
          localStorage.removeItem(STORAGE_KEY);
          writeStateToForm(defaultState());
          saveNow(false);
          setStatus('초기화 완료');
        });

        $('addTimeline').addEventListener('click', () => {
          const rows = readStateFromForm().timeline;
          rows.push({ time: '', event: '', owner: '' });
          renderTimeline(rows);
          autoSave();
        });

        $('addAction').addEventListener('click', () => {
          const rows = readStateFromForm().actions;
          rows.push({ task: '', owner: '', due: '', status: '미착수' });
          renderActions(rows);
          autoSave();
        });

        $('timelineBody').addEventListener('click', (e) => {
          if (e.target.matches('[data-act="del"]')) {
            e.target.closest('tr')?.remove();
            if (!document.querySelector('#timelineBody tr')) renderTimeline([]);
            autoSave();
          }
        });

        $('actionBody').addEventListener('click', (e) => {
          if (e.target.matches('[data-act="del"]')) {
            e.target.closest('tr')?.remove();
            if (!document.querySelector('#actionBody tr')) renderActions([]);
            autoSave();
          }
        });
      }

      loadState();
      bindEvents();
      updateMttr();
    })();
  </script>
</body>
</html>
