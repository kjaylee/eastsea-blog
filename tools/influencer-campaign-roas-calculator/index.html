<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Influencer Campaign ROAS Calculator | 인플루언서 캠페인 ROAS 계산기</title>
  <meta name="description" content="노출, CTR, 전환율, AOV, 마진, 캠페인 비용을 기반으로 인플루언서 캠페인의 ROAS, ROI, 손익분기 주문수를 계산합니다." />
  <style>
    :root{--bg:#071424;--card:#11253f;--line:#284b77;--txt:#e8f0ff;--muted:#9cb3d8;--pri:#38bdf8;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#173f6b 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.5}
    .home{color:#e0f2fe;text-decoration:none;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#113453;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(160deg,#15365c,#10233d);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1a32;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#38bdf8,#0284c7)}
    .soft{background:#134767;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f3640;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    textarea{margin-top:10px;min-height:104px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#0d1d37;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#13395a;color:#d4ebff;font-size:.76rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📣 인플루언서 캠페인 ROAS 계산기</h1>
        <div class="sub">노출·전환 퍼널과 비용 구조를 함께 반영해 캠페인의 실제 수익성과 손익분기 주문수를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="impressions">캠페인 노출수</label><input id="impressions" type="number" min="1" step="1" value="180000" /></div>
          <div><label for="ctr">클릭률 CTR (%)</label><input id="ctr" type="number" min="0" max="100" step="0.01" value="1.8" /></div>
          <div><label for="conv">클릭→구매 전환율 (%)</label><input id="conv" type="number" min="0" max="100" step="0.01" value="3.2" /></div>
          <div><label for="aov">평균 주문금액 AOV (KRW)</label><input id="aov" type="number" min="1" step="100" value="69000" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="0.01" max="100" step="0.1" value="58" /></div>
          <div><label for="discount">프로모션 할인율 (%)</label><input id="discount" type="number" min="0" max="99.9" step="0.1" value="10" /></div>
          <div><label for="creatorFee">크리에이터 고정비 (KRW)</label><input id="creatorFee" type="number" min="0" step="1000" value="1500000" /></div>
          <div><label for="adSpend">광고 증폭비 (KRW)</label><input id="adSpend" type="number" min="0" step="1000" value="900000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">예상 순매출</div><div id="netRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">총이익</div><div id="grossProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">총 캠페인 비용</div><div id="totalSpend" class="v sm">-</div></div>
          <div class="kpi"><div class="k">순이익</div><div id="netProfit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">ROAS</div><div id="roas" class="v sm">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">퍼널 / 분기점</h2>
        <table>
          <tbody>
            <tr><th>예상 클릭수</th><td id="clicks">-</td></tr>
            <tr><th>예상 주문수</th><td id="orders">-</td></tr>
            <tr><th>손익분기 주문수</th><td id="beOrders">-</td></tr>
            <tr><th>손익분기 매출</th><td id="beRevenue">-</td></tr>
            <tr><th>허용 최대 CPC</th><td id="maxCpc">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      impressions: $('impressions'), ctr: $('ctr'), conv: $('conv'), aov: $('aov'), margin: $('margin'), discount: $('discount'), creatorFee: $('creatorFee'), adSpend: $('adSpend'),
      netRevenue: $('netRevenue'), grossProfit: $('grossProfit'), totalSpend: $('totalSpend'), netProfit: $('netProfit'), roas: $('roas'), roi: $('roi'),
      clicks: $('clicks'), orders: $('orders'), beOrders: $('beOrders'), beRevenue: $('beRevenue'), maxCpc: $('maxCpc'),
      status: $('status'), error: $('error'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = {
      impressions: 180000, ctr: 1.8, conv: 3.2, aov: 69000, margin: 58, discount: 10, creatorFee: 1500000, adSpend: 900000
    };

    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });

    const inRange = (v, min, max) => Number.isFinite(v) && v >= min && v <= max;

    function validate(v) {
      if (!Number.isFinite(v.impressions) || v.impressions <= 0) return '캠페인 노출수는 1 이상이어야 합니다.';
      if (!inRange(v.ctr, 0, 100)) return 'CTR은 0~100 범위여야 합니다.';
      if (!inRange(v.conv, 0, 100)) return '전환율은 0~100 범위여야 합니다.';
      if (!Number.isFinite(v.aov) || v.aov <= 0) return '평균 주문금액은 0보다 커야 합니다.';
      if (!inRange(v.margin, 0.01, 100)) return '매출총이익률은 0 초과 100 이하이어야 합니다.';
      if (!inRange(v.discount, 0, 99.9)) return '프로모션 할인율은 0~99.9 범위여야 합니다.';
      if (!Number.isFinite(v.creatorFee) || v.creatorFee < 0) return '크리에이터 고정비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.adSpend) || v.adSpend < 0) return '광고 증폭비는 0 이상이어야 합니다.';
      if (v.creatorFee + v.adSpend <= 0) return '총 캠페인 비용이 0이면 ROAS/ROI 계산이 의미가 없습니다. 최소 1원 이상 입력하세요.';
      return '';
    }

    function compute(v) {
      const ctrRate = v.ctr / 100;
      const convRate = v.conv / 100;
      const marginRate = v.margin / 100;
      const discountRate = v.discount / 100;

      const clicks = v.impressions * ctrRate;
      const orders = clicks * convRate;
      const grossRevenue = orders * v.aov;
      const netRevenue = grossRevenue * (1 - discountRate);
      const grossProfit = netRevenue * marginRate;

      const totalSpend = v.creatorFee + v.adSpend;
      const netProfit = grossProfit - totalSpend;
      const roas = totalSpend > 0 ? netRevenue / totalSpend : NaN;
      const roi = totalSpend > 0 ? netProfit / totalSpend : NaN;

      const contributionPerOrder = v.aov * (1 - discountRate) * marginRate;
      const breakEvenOrders = contributionPerOrder > 0 ? totalSpend / contributionPerOrder : Infinity;
      const breakEvenRevenue = marginRate > 0 ? totalSpend / marginRate : Infinity;
      const maxCpc = clicks > 0 ? grossProfit / clicks : Infinity;

      return { clicks, orders, netRevenue, grossProfit, totalSpend, netProfit, roas, roi, breakEvenOrders, breakEvenRevenue, maxCpc };
    }

    function resetOutputs() {
      ['netRevenue','grossProfit','totalSpend','netProfit','roas','roi','clicks','orders','beOrders','beRevenue','maxCpc'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function fmtMaybe(v, formatter) {
      return Number.isFinite(v) ? formatter(v) : 'N/A';
    }

    function render() {
      const v = {
        impressions: Number(refs.impressions.value),
        ctr: Number(refs.ctr.value),
        conv: Number(refs.conv.value),
        aov: Number(refs.aov.value),
        margin: Number(refs.margin.value),
        discount: Number(refs.discount.value),
        creatorFee: Number(refs.creatorFee.value),
        adSpend: Number(refs.adSpend.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.netRevenue.textContent = won(r.netRevenue);
      refs.grossProfit.textContent = won(r.grossProfit);
      refs.totalSpend.textContent = won(r.totalSpend);
      refs.netProfit.textContent = won(r.netProfit);
      refs.roas.textContent = fmtMaybe(r.roas, (x) => `${num(x, 2)}x`);
      refs.roi.textContent = fmtMaybe(r.roi, (x) => `${num(x * 100, 1)}%`);

      refs.clicks.textContent = `${num(r.clicks, 0)}회`;
      refs.orders.textContent = `${num(r.orders, 1)}건`;
      refs.beOrders.textContent = fmtMaybe(r.breakEvenOrders, (x) => `${num(x, 1)}건`);
      refs.beRevenue.textContent = fmtMaybe(r.breakEvenRevenue, won);
      refs.maxCpc.textContent = fmtMaybe(r.maxCpc, (x) => `${won(x)}/click`);

      if (r.netProfit > 0) {
        refs.status.innerHTML = `<span class="good">●</span> 예상 순이익 ${won(r.netProfit)} (수익성 양호)`;
      } else if (Math.abs(r.netProfit) < 1) {
        refs.status.innerHTML = `<span class="warn">●</span> 손익분기점 근접`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> 예상 손실 ${won(Math.abs(r.netProfit))} (비용/퍼널 개선 필요)`;
      }

      refs.summary.value = [
        '[Influencer Campaign ROAS 요약]',
        `예상 클릭/주문: ${num(r.clicks,0)} / ${num(r.orders,1)}`,
        `순매출: ${won(r.netRevenue)}`,
        `총이익: ${won(r.grossProfit)}`,
        `총비용: ${won(r.totalSpend)}`,
        `순이익: ${won(r.netProfit)}`,
        `ROAS / ROI: ${num(r.roas,2)}x / ${num(r.roi * 100,1)}%`,
        `손익분기 주문수: ${fmtMaybe(r.breakEvenOrders, (x) => num(x,1))}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.impressions, refs.ctr, refs.conv, refs.aov, refs.margin, refs.discount, refs.creatorFee, refs.adSpend].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
