<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인터벌 운동 타이머 | Interval Workout Timer</title>
  <meta name="description" content="운동/휴식 시간을 반복하는 HIIT 인터벌 타이머" />
  <style>
    :root{--bg:#0f172a;--panel:#111c34;--text:#ecf2ff;--muted:#9fb0d3;--line:#2a3a5f;--work:#22c55e;--rest:#f59e0b;--prep:#60a5fa}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at top,#1e2f55,#0b1224 65%);color:var(--text);min-height:100vh;padding:16px}
    .wrap{max-width:820px;margin:0 auto}
    .back{display:inline-block;color:var(--muted);text-decoration:none;margin-bottom:10px}
    .panel{background:rgba(17,28,52,.92);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 20px 46px rgba(0,0,0,.35)}
    h1{font-size:clamp(1.35rem,4.5vw,2rem);margin-bottom:6px}
    .sub{color:var(--muted);font-size:.94rem;margin-bottom:14px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    label{display:block;font-size:.82rem;color:#c6d4f2;margin-bottom:5px;font-weight:700}
    input{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;background:#0d1830;color:var(--text);font-size:1rem}
    input:focus{outline:none;border-color:#5fa6ff;box-shadow:0 0 0 3px rgba(96,165,250,.2)}
    .stage{margin-top:14px;border:1px solid var(--line);border-radius:14px;padding:14px;background:#0d1730}
    .pill{display:inline-flex;padding:4px 9px;border-radius:999px;font-size:.78rem;font-weight:800}
    .t{font-size:clamp(2.1rem,9vw,4.4rem);font-weight:900;letter-spacing:.03em;margin:10px 0 4px}
    .meta{color:var(--muted);font-size:.95rem}
    .bar{margin-top:12px;height:12px;background:#1f2d4d;border-radius:999px;overflow:hidden}
    .bar>span{display:block;height:100%;width:0%;background:linear-gradient(90deg,#60a5fa,#22c55e);transition:width .15s linear}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    button{border:none;padding:10px 14px;border-radius:10px;font-weight:800;cursor:pointer}
    .start{background:#22c55e;color:#05230f}
    .pause{background:#f59e0b;color:#382205}
    .reset{background:#334155;color:#f8fafc}
    .ghost{background:#1e293b;color:#cbd5e1}
    @media (max-width:700px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/tools/">← 도구 목록으로</a>
    <section class="panel">
      <h1>🏃 인터벌 운동 타이머</h1>
      <p class="sub">HIIT, 홈트, 러닝 인터벌에 맞춰 운동/휴식 구간을 자동 반복합니다.</p>

      <div class="grid">
        <div>
          <label for="prep">준비 시간 (초)</label>
          <input id="prep" type="number" min="0" step="1" value="10" />
        </div>
        <div>
          <label for="work">운동 시간 (초)</label>
          <input id="work" type="number" min="1" step="1" value="40" />
        </div>
        <div>
          <label for="rest">휴식 시간 (초)</label>
          <input id="rest" type="number" min="0" step="1" value="20" />
        </div>
        <div>
          <label for="rounds">라운드 수</label>
          <input id="rounds" type="number" min="1" max="100" step="1" value="8" />
        </div>
      </div>

      <div class="stage">
        <span id="phase" class="pill">준비</span>
        <div id="timer" class="t">00:10</div>
        <div id="meta" class="meta">1 / 8 라운드</div>
        <div class="bar"><span id="progress"></span></div>
      </div>

      <div class="actions">
        <button class="start" id="startBtn">시작</button>
        <button class="pause" id="pauseBtn">일시정지</button>
        <button class="reset" id="resetBtn">리셋</button>
        <button class="ghost" id="sampleBtn">빠른 4라운드</button>
      </div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let timerId = null;
    let ctx = null;

    const state = {
      running: false,
      round: 1,
      phase: 'prep',
      phaseLeft: 10,
      phaseTotal: 10
    };

    function mmss(sec){
      const s = Math.max(0, Math.floor(sec));
      const m = String(Math.floor(s / 60)).padStart(2,'0');
      const r = String(s % 60).padStart(2,'0');
      return `${m}:${r}`;
    }

    function phaseStyle(name){
      const el = $("phase");
      if(name==='work'){el.style.background='rgba(34,197,94,.2)';el.style.color='#86efac';el.textContent='운동';}
      else if(name==='rest'){el.style.background='rgba(245,158,11,.2)';el.style.color='#fde68a';el.textContent='휴식';}
      else if(name==='done'){el.style.background='rgba(148,163,184,.2)';el.style.color='#e2e8f0';el.textContent='완료';}
      else {el.style.background='rgba(96,165,250,.2)';el.style.color='#bfdbfe';el.textContent='준비';}
    }

    function currentConfig(){
      return {
        prep: Math.max(0, Number($("prep").value || 0)),
        work: Math.max(1, Number($("work").value || 1)),
        rest: Math.max(0, Number($("rest").value || 0)),
        rounds: Math.max(1, Number($("rounds").value || 1))
      };
    }

    function beep(freq=880,dur=0.11){
      try{
        if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = freq;
        osc.type='sine';
        gain.gain.value = 0.05;
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + dur);
      }catch(e){}
    }

    function setPhase(name, sec){
      state.phase = name;
      state.phaseLeft = sec;
      state.phaseTotal = Math.max(1, sec);
      phaseStyle(name);
      render();
    }

    function nextPhase(){
      const cfg = currentConfig();

      if (state.phase === 'prep') {
        setPhase('work', cfg.work);
        beep(950, 0.12);
        return;
      }

      if (state.phase === 'work') {
        if (cfg.rest > 0) {
          setPhase('rest', cfg.rest);
          beep(740, 0.12);
          return;
        }
        if (state.round < cfg.rounds) {
          state.round += 1;
          setPhase('work', cfg.work);
          beep(950, 0.12);
          return;
        }
        finish();
        return;
      }

      if (state.phase === 'rest') {
        if (state.round < cfg.rounds) {
          state.round += 1;
          setPhase('work', cfg.work);
          beep(950, 0.12);
          return;
        }
        finish();
      }
    }

    function tick(){
      if (!state.running) return;
      state.phaseLeft -= 1;
      if (state.phaseLeft <= 0) {
        nextPhase();
      } else {
        render();
      }
    }

    function finish(){
      state.running = false;
      clearInterval(timerId);
      timerId = null;
      state.phase = 'done';
      state.phaseLeft = 0;
      state.phaseTotal = 1;
      phaseStyle('done');
      beep(1200, 0.2);
      setTimeout(()=>beep(1400,0.2), 160);
      render();
    }

    function start(){
      if (state.running) return;
      if (state.phase === 'done') reset();
      state.running = true;
      if (!timerId) timerId = setInterval(tick, 1000);
    }

    function pause(){
      state.running = false;
      clearInterval(timerId);
      timerId = null;
    }

    function reset(){
      pause();
      const cfg = currentConfig();
      state.round = 1;
      if (cfg.prep > 0) setPhase('prep', cfg.prep);
      else setPhase('work', cfg.work);
      render();
    }

    function render(){
      const cfg = currentConfig();
      $("timer").textContent = mmss(state.phaseLeft);
      $("meta").textContent = state.phase === 'done'
        ? `총 ${cfg.rounds}라운드 완료!`
        : `${Math.min(state.round, cfg.rounds)} / ${cfg.rounds} 라운드`;

      const doneRatio = ((state.phaseTotal - state.phaseLeft) / state.phaseTotal) * 100;
      $("progress").style.width = `${Math.max(0, Math.min(100, doneRatio))}%`;
    }

    $("startBtn").addEventListener('click', start);
    $("pauseBtn").addEventListener('click', pause);
    $("resetBtn").addEventListener('click', reset);
    $("sampleBtn").addEventListener('click', () => {
      $("prep").value = 5;
      $("work").value = 30;
      $("rest").value = 15;
      $("rounds").value = 4;
      reset();
    });

    ["prep","work","rest","rounds"].forEach(id => {
      $(id).addEventListener('input', () => { if(!state.running) reset(); });
    });

    reset();
  </script>
</body>
</html>
