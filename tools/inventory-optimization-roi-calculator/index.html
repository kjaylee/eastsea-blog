<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Optimization ROI Calculator | 재고 최적화 ROI 계산기</title>
  <meta name="description" content="재고 최적화 프로젝트의 연간 절감액, 순효과, 회수기간, 3년 NPV, 손익분기 재고감소율을 계산합니다." />
  <style>
    :root{--bg:#0f1124;--card:#1a1f42;--line:#3e4b86;--txt:#edf1ff;--muted:#acb8de;--pri:#9b7bff;--err:#f87171;--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#3b3f8d 0%,#0f1124 50%);color:var(--txt)}
    .wrap{max-width:1060px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#e7dcff;text-decoration:none;border:1px solid var(--line);background:#1f2352;padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#272d63,#1a1f42);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#171c3b;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#7f5df2);font-weight:700}
    .soft{background:#252a5c;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:96px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);border-radius:11px;padding:10px;background:#171c39}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;gap:6px;align-items:center;margin-top:10px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:#262c66;color:#d2ccff;font-size:.75rem}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📦 재고 최적화 ROI 계산기</h1>
        <div class="sub">재고 유지비 절감과 리스크 비용을 함께 반영해 투자 타당성을 빠르게 판단합니다.</div>
      </div>
      <a class="home" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="avgInventory">평균 재고자산 (KRW)</label><input id="avgInventory" type="number" min="1" value="850000000" /></div>
          <div><label for="carryingRate">재고 유지비율 (%)</label><input id="carryingRate" type="number" step="0.1" min="0.1" max="100" value="24" /></div>
          <div><label for="reductionRate">재고 감소율 (%)</label><input id="reductionRate" type="number" step="0.1" min="0.1" max="100" value="14" /></div>
          <div><label for="stockoutCost">연간 재고부족 리스크 비용 (KRW)</label><input id="stockoutCost" type="number" min="0" value="18000000" /></div>
          <div><label for="annualSoftware">연간 솔루션 비용 (KRW)</label><input id="annualSoftware" type="number" min="0" value="9000000" /></div>
          <div><label for="implCost">초기 구축비 (KRW)</label><input id="implCost" type="number" min="0" value="42000000" /></div>
          <div><label for="discountRate">할인율 (%)</label><input id="discountRate" type="number" step="0.1" min="0" max="50" value="9" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">연간 총절감</div><div id="grossSavings" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 순효과</div><div id="netAnnual" class="v">-</div></div>
          <div class="kpi"><div class="k">1년 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">3년 NPV</div><div id="npv" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 감소율</div><div id="beReduction" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>절감 대상 유지비</th><td id="baselineCarrying">-</td></tr>
            <tr><th>연간 비용 합계(리스크+솔루션)</th><td id="annualCostTotal">-</td></tr>
            <tr><th>초기 구축비</th><td id="implCostOut">-</td></tr>
            <tr><th>할인율</th><td id="discountOut">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      avgInventory:$('avgInventory'), carryingRate:$('carryingRate'), reductionRate:$('reductionRate'), stockoutCost:$('stockoutCost'),
      annualSoftware:$('annualSoftware'), implCost:$('implCost'), discountRate:$('discountRate'),
      grossSavings:$('grossSavings'), netAnnual:$('netAnnual'), roi:$('roi'), payback:$('payback'), npv:$('npv'), beReduction:$('beReduction'),
      baselineCarrying:$('baselineCarrying'), annualCostTotal:$('annualCostTotal'), implCostOut:$('implCostOut'), discountOut:$('discountOut'),
      status:$('status'), error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = {
      avgInventory:850000000, carryingRate:24, reductionRate:14, stockoutCost:18000000, annualSoftware:9000000, implCost:42000000, discountRate:9
    };

    const money = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.avgInventory) || v.avgInventory <= 0) return '평균 재고자산은 0보다 커야 합니다.';
      if (!Number.isFinite(v.carryingRate) || v.carryingRate <= 0 || v.carryingRate > 100) return '재고 유지비율은 0 초과 100 이하로 입력하세요.';
      if (!Number.isFinite(v.reductionRate) || v.reductionRate <= 0 || v.reductionRate > 100) return '재고 감소율은 0 초과 100 이하로 입력하세요.';
      if (!Number.isFinite(v.stockoutCost) || v.stockoutCost < 0) return '재고부족 리스크 비용은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.annualSoftware) || v.annualSoftware < 0) return '연간 솔루션 비용은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.implCost) || v.implCost < 0) return '초기 구축비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.discountRate) || v.discountRate < 0 || v.discountRate > 50) return '할인율은 0~50 범위여야 합니다.';
      return '';
    }

    function compute(v){
      const carryingDecimal = v.carryingRate / 100;
      const reductionDecimal = v.reductionRate / 100;
      const baselineCarrying = v.avgInventory * carryingDecimal;
      const grossSavings = baselineCarrying * reductionDecimal;
      const annualCostTotal = v.stockoutCost + v.annualSoftware;
      const netAnnual = grossSavings - annualCostTotal;
      const roi = v.implCost === 0 ? Infinity : ((netAnnual - v.implCost) / v.implCost) * 100;
      const payback = v.implCost === 0 ? 0 : (netAnnual <= 0 ? Infinity : v.implCost / (netAnnual / 12));
      const r = v.discountRate / 100;
      let npv = -v.implCost;
      for (let y=1; y<=3; y++) npv += netAnnual / Math.pow(1 + r, y);
      const beReduction = baselineCarrying === 0 ? Infinity : (annualCostTotal / baselineCarrying) * 100;
      return { baselineCarrying, grossSavings, annualCostTotal, netAnnual, roi, payback, npv, beReduction };
    }

    function render(){
      const v = {
        avgInventory:Number(refs.avgInventory.value), carryingRate:Number(refs.carryingRate.value), reductionRate:Number(refs.reductionRate.value),
        stockoutCost:Number(refs.stockoutCost.value), annualSoftware:Number(refs.annualSoftware.value), implCost:Number(refs.implCost.value),
        discountRate:Number(refs.discountRate.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        ['grossSavings','netAnnual','roi','payback','npv','beReduction','baselineCarrying','annualCostTotal','implCostOut','discountOut'].forEach(k=>refs[k].textContent='-');
        refs.status.textContent='입력값을 확인하세요';
        refs.summary.value='';
        return;
      }

      const r = compute(v);
      refs.grossSavings.textContent = money(r.grossSavings);
      refs.netAnnual.textContent = money(r.netAnnual);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : '∞';
      refs.payback.textContent = r.payback === 0 ? '즉시' : (Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가');
      refs.npv.textContent = money(r.npv);
      refs.beReduction.textContent = `${num(r.beReduction,2)}%`;
      refs.baselineCarrying.textContent = money(r.baselineCarrying);
      refs.annualCostTotal.textContent = money(r.annualCostTotal);
      refs.implCostOut.textContent = money(v.implCost);
      refs.discountOut.textContent = `${num(v.discountRate,1)}%`;

      refs.status.innerHTML = r.netAnnual > 0
        ? `<span class="ok">●</span> 연간 순효과 ${money(r.netAnnual)}`
        : (r.netAnnual === 0 ? `● 손익분기` : `<span class="warn">●</span> 연간 순손실 ${money(Math.abs(r.netAnnual))}`);

      refs.summary.value = [
        '[Inventory Optimization ROI 요약]',
        `연간 총절감: ${money(r.grossSavings)}`,
        `연간 비용(리스크+솔루션): ${money(r.annualCostTotal)}`,
        `연간 순효과: ${money(r.netAnnual)}`,
        `1년 ROI: ${Number.isFinite(r.roi) ? num(r.roi,1)+'%' : '∞'}`,
        `회수기간: ${r.payback===0?'즉시':(Number.isFinite(r.payback)?num(r.payback,1)+'개월':'회수 불가')}`,
        `3년 NPV: ${money(r.npv)}`,
        `손익분기 필요 재고감소율: ${num(r.beReduction,2)}%`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.avgInventory,refs.carryingRate,refs.reductionRate,refs.stockoutCost,refs.annualSoftware,refs.implCost,refs.discountRate].forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
