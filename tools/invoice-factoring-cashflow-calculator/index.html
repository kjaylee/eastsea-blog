<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Factoring Cashflow Calculator | 매출채권 팩토링 현금흐름 계산기</title>
  <meta name="description" content="인보이스 금액, 선지급률, 팩토링 수수료, 지급일, 월 소진액을 기반으로 즉시 현금 유입, 유효 APR, 런웨이 연장 효과를 계산합니다." />
  <style>
    :root{--bg:#111422;--card:#1a1f34;--line:#333c63;--txt:#eef2ff;--muted:#b9c2e4;--pri:#22d3ee;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 100% 0%,#193e4f,var(--bg) 52%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.15rem,2.7vw,1.72rem)}
    .sub{margin-top:6px;font-size:.92rem;color:var(--muted);line-height:1.5}
    .home{color:#cffafe;text-decoration:none;white-space:nowrap;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#16465b}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px}
    .card{background:linear-gradient(160deg,#21284a,#161c34);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#11172c;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#22d3ee,#0891b2)}
    .soft{background:#1d3f55;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3341;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    textarea{margin-top:10px;min-height:102px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#11172c;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1a3852;color:#ecfeff;font-size:.76rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>💸 매출채권 팩토링 현금흐름 계산기</h1>
        <div class="sub">송장 대금 입금 대기 기간을 팩토링으로 앞당길 때, <strong>즉시 현금 유입</strong>, <strong>총 수수료</strong>, <strong>런웨이 연장</strong>, <strong>유효 APR</strong>을 빠르게 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="invoiceAmount">송장 금액 (KRW)</label><input id="invoiceAmount" type="number" min="1" step="10000" value="90000000" /></div>
          <div><label for="advanceRate">선지급률 (%)</label><input id="advanceRate" type="number" min="1" max="99" step="0.1" value="85" /></div>
          <div><label for="feeRate30">팩토링 수수료율 (30일 기준, %)</label><input id="feeRate30" type="number" min="0" max="20" step="0.01" value="2.1" /></div>
          <div><label for="daysToPayment">고객 결제까지 남은 일수</label><input id="daysToPayment" type="number" min="1" max="365" step="1" value="58" /></div>
          <div><label for="extraFee">기타 정액 수수료 (KRW)</label><input id="extraFee" type="number" min="0" step="1000" value="350000" /></div>
          <div><label for="monthlyBurn">월 순현금 소진액 (KRW)</label><input id="monthlyBurn" type="number" min="1" step="10000" value="28000000" /></div>
          <div><label for="cashOnHand">현재 보유 현금 (KRW)</label><input id="cashOnHand" type="number" min="0" step="10000" value="76000000" /></div>
          <div><label for="altCreditApr">대체 운전자금 APR (%)</label><input id="altCreditApr" type="number" min="0" max="200" step="0.1" value="13" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">즉시 유입 현금</div><div id="advanceCash" class="v">-</div></div>
          <div class="kpi"><div class="k">총 팩토링 비용</div><div id="totalCost" class="v">-</div></div>
          <div class="kpi"><div class="k">유효 APR</div><div id="effectiveApr" class="v sm">-</div></div>
          <div class="kpi"><div class="k">즉시 런웨이 증가</div><div id="runwayGainDays" class="v sm">-</div></div>
          <div class="kpi"><div class="k">정산 후 총 런웨이 증가</div><div id="totalRunwayGain" class="v sm">-</div></div>
          <div class="kpi"><div class="k">대체 대출 대비 절감/추가비용</div><div id="creditDelta" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">세부 지표</h2>
        <table>
          <tbody>
            <tr><th>보류금(리저브)</th><td id="reserveAmount">-</td></tr>
            <tr><th>정산 시 수령금</th><td id="settlementCash">-</td></tr>
            <tr><th>팩토링 총 수령액</th><td id="totalReceived">-</td></tr>
            <tr><th>비용/송장 비율</th><td id="costRate">-</td></tr>
            <tr><th>현재 런웨이 (일)</th><td id="baselineRunway">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      invoiceAmount: $('invoiceAmount'), advanceRate: $('advanceRate'), feeRate30: $('feeRate30'), daysToPayment: $('daysToPayment'), extraFee: $('extraFee'), monthlyBurn: $('monthlyBurn'), cashOnHand: $('cashOnHand'), altCreditApr: $('altCreditApr'),
      advanceCash: $('advanceCash'), totalCost: $('totalCost'), effectiveApr: $('effectiveApr'), runwayGainDays: $('runwayGainDays'), totalRunwayGain: $('totalRunwayGain'), creditDelta: $('creditDelta'),
      reserveAmount: $('reserveAmount'), settlementCash: $('settlementCash'), totalReceived: $('totalReceived'), costRate: $('costRate'), baselineRunway: $('baselineRunway'),
      error: $('error'), status: $('status'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = { invoiceAmount: 90000000, advanceRate: 85, feeRate30: 2.1, daysToPayment: 58, extraFee: 350000, monthlyBurn: 28000000, cashOnHand: 76000000, altCreditApr: 13 };

    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });
    const pct = (n, d = 2) => `${num(n, d)}%`;

    function validate(v) {
      if (!Number.isFinite(v.invoiceAmount) || v.invoiceAmount <= 0) return '송장 금액은 0보다 커야 합니다.';
      if (!Number.isFinite(v.advanceRate) || v.advanceRate <= 0 || v.advanceRate >= 100) return '선지급률은 0 초과 100 미만이어야 합니다.';
      if (!Number.isFinite(v.feeRate30) || v.feeRate30 < 0 || v.feeRate30 > 20) return '팩토링 수수료율은 0~20% 범위여야 합니다.';
      if (!Number.isFinite(v.daysToPayment) || v.daysToPayment <= 0 || v.daysToPayment > 365) return '결제 대기 일수는 1~365 범위여야 합니다.';
      if (!Number.isFinite(v.extraFee) || v.extraFee < 0) return '기타 정액 수수료는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.monthlyBurn) || v.monthlyBurn <= 0) return '월 소진액은 0보다 커야 합니다.';
      if (!Number.isFinite(v.cashOnHand) || v.cashOnHand < 0) return '현재 보유 현금은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.altCreditApr) || v.altCreditApr < 0 || v.altCreditApr > 200) return '대체 운전자금 APR은 0~200% 범위여야 합니다.';
      return '';
    }

    function compute(v) {
      const advanceCash = v.invoiceAmount * (v.advanceRate / 100);
      const reserveAmount = v.invoiceAmount - advanceCash;
      const timeAdjustedFee = v.invoiceAmount * (v.feeRate30 / 100) * (v.daysToPayment / 30);
      const totalCost = timeAdjustedFee + v.extraFee;
      const settlementCash = reserveAmount - totalCost;
      const totalReceived = advanceCash + settlementCash;
      const costRate = (totalCost / v.invoiceAmount) * 100;

      const effectiveApr = advanceCash > 0
        ? ((totalCost / advanceCash) * (365 / v.daysToPayment) * 100)
        : NaN;

      const baselineRunway = (v.cashOnHand / v.monthlyBurn) * 30;
      const runwayWithAdvance = ((v.cashOnHand + advanceCash) / v.monthlyBurn) * 30;
      const runwayWithSettlement = ((v.cashOnHand + totalReceived) / v.monthlyBurn) * 30;
      const runwayGainDays = runwayWithAdvance - baselineRunway;
      const totalRunwayGain = runwayWithSettlement - baselineRunway;

      const altCreditCost = v.invoiceAmount * (v.altCreditApr / 100) * (v.daysToPayment / 365);
      const creditDelta = altCreditCost - totalCost;

      return {
        advanceCash, reserveAmount, totalCost, settlementCash, totalReceived, costRate,
        effectiveApr, baselineRunway, runwayGainDays, totalRunwayGain, creditDelta
      };
    }

    function resetOutputs() {
      ['advanceCash','totalCost','effectiveApr','runwayGainDays','totalRunwayGain','creditDelta','reserveAmount','settlementCash','totalReceived','costRate','baselineRunway'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function render() {
      const v = {
        invoiceAmount: Number(refs.invoiceAmount.value),
        advanceRate: Number(refs.advanceRate.value),
        feeRate30: Number(refs.feeRate30.value),
        daysToPayment: Number(refs.daysToPayment.value),
        extraFee: Number(refs.extraFee.value),
        monthlyBurn: Number(refs.monthlyBurn.value),
        cashOnHand: Number(refs.cashOnHand.value),
        altCreditApr: Number(refs.altCreditApr.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.advanceCash.textContent = won(r.advanceCash);
      refs.totalCost.textContent = won(r.totalCost);
      refs.effectiveApr.textContent = Number.isFinite(r.effectiveApr) ? pct(r.effectiveApr, 2) : 'N/A';
      refs.runwayGainDays.textContent = `${num(r.runwayGainDays,1)}일`;
      refs.totalRunwayGain.textContent = `${num(r.totalRunwayGain,1)}일`;
      refs.creditDelta.textContent = `${r.creditDelta >= 0 ? '+' : '-'}${won(Math.abs(r.creditDelta))}`;

      refs.reserveAmount.textContent = won(r.reserveAmount);
      refs.settlementCash.textContent = won(r.settlementCash);
      refs.totalReceived.textContent = won(r.totalReceived);
      refs.costRate.textContent = pct(r.costRate, 2);
      refs.baselineRunway.textContent = `${num(r.baselineRunway,1)}일`;

      if (r.settlementCash < 0) {
        refs.error.classList.add('show');
        refs.error.textContent = '수수료가 리저브를 초과해 정산 시 추가 공제가 발생합니다. 조건을 재검토하세요.';
      }

      if (r.totalRunwayGain > 0) {
        refs.status.innerHTML = `<span class="good">●</span> 총 런웨이 ${num(r.totalRunwayGain,1)}일 증가`;
      } else if (Math.abs(r.totalRunwayGain) < 0.1) {
        refs.status.innerHTML = `<span class="warn">●</span> 런웨이 개선 효과가 거의 없습니다`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> 조건상 총 런웨이가 감소합니다`;
      }

      refs.summary.value = [
        '[Invoice Factoring Cashflow 요약]',
        `즉시 선지급금: ${won(r.advanceCash)}`,
        `총 수수료 비용: ${won(r.totalCost)} (${pct(r.costRate,2)})`,
        `유효 APR: ${Number.isFinite(r.effectiveApr) ? pct(r.effectiveApr,2) : 'N/A'}`,
        `현재 런웨이: ${num(r.baselineRunway,1)}일`,
        `즉시 런웨이 증가: ${num(r.runwayGainDays,1)}일`,
        `정산 반영 총 런웨이 증가: ${num(r.totalRunwayGain,1)}일`,
        `대체 대출 대비 비용 차이: ${r.creditDelta >= 0 ? '+' : '-'}${won(Math.abs(r.creditDelta))}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.invoiceAmount, refs.advanceRate, refs.feeRate30, refs.daysToPayment, refs.extraFee, refs.monthlyBurn, refs.cashOnHand, refs.altCreditApr].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
