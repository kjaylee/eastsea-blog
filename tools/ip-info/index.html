<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="🌐 IP 주소 정보 조회 - IP 주소의 위치 및 네트워크 정보를 확인하세요 무료 온라인 도구 | Free online tool at eastsea.monster" />
    <title>IP 주소 정보 조회 | IP Address Lookup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #495057;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px var(--shadow);
            margin-bottom: 20px;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px var(--shadow);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px var(--shadow);
            transition: transform 0.2s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .info-item {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        [data-theme="dark"] .error {
            background: #332701;
            border-color: #997404;
            color: #ffc107;
        }

        .my-ip {
            text-align: center;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
        }

        .my-ip-value {
            font-size: 2rem;
            font-weight: 700;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="container">
        <a href="../" class="back-button">← 뒤로 가기</a>

        <header>
            <h1>🌐 IP 주소 정보 조회</h1>
            <p style="color: var(--text-secondary);">IP 주소의 위치 및 네트워크 정보를 확인하세요</p>
        </header>

        <div class="card">
            <div class="my-ip" id="my-ip-section" style="display: none;">
                <div style="color: var(--text-secondary); font-size: 0.9rem;">내 IP 주소</div>
                <div class="my-ip-value" id="my-ip"></div>
            </div>

            <div class="input-group">
                <input type="text" id="ip-input" placeholder="IP 주소 입력 (예: 8.8.8.8)" value="8.8.8.8">
                <button onclick="lookupIP()" id="lookup-btn">🔍 조회</button>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>조회 중...</p>
            </div>

            <div id="error" class="error" style="display: none;"></div>

            <div id="result" style="display: none;">
                <h3 style="margin-bottom: 15px;">📊 조회 결과</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">🌐 IP 주소</div>
                        <div class="info-value" id="ip"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">📍 국가</div>
                        <div class="info-value" id="country"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🏙️ 도시</div>
                        <div class="info-value" id="city"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🗺️ 지역</div>
                        <div class="info-value" id="region"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">📮 우편번호</div>
                        <div class="info-value" id="postal"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🧭 좌표</div>
                        <div class="info-value" id="location"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🏢 ISP</div>
                        <div class="info-value" id="isp"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🏛️ 조직</div>
                        <div class="info-value" id="org"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">⏰ 시간대</div>
                        <div class="info-value" id="timezone"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // 내 IP 가져오기
        async function getMyIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('my-ip').textContent = data.ip;
                document.getElementById('my-ip-section').style.display = 'block';
            } catch (e) {
                console.error('Failed to get my IP:', e);
            }
        }

        async function lookupIP() {
            const ipInput = document.getElementById('ip-input').value.trim();
            
            if (!ipInput) {
                showError('IP 주소를 입력해주세요');
                return;
            }

            // IP 형식 검증 (간단한 버전)
            const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
            if (!ipRegex.test(ipInput)) {
                showError('올바른 IP 주소 형식이 아닙니다 (예: 8.8.8.8)');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('lookup-btn').disabled = true;

            try {
                // ip-api.com 무료 API 사용 (상업적 사용 시 pro.ip-api.com 필요)
                const response = await fetch(`https://ip-api.com/json/${ipInput}?fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,query`);
                const data = await response.json();

                if (data.status === 'fail') {
                    showError(data.message || '조회에 실패했습니다');
                    return;
                }

                displayResult(data);
            } catch (e) {
                showError('조회 중 오류가 발생했습니다: ' + e.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('lookup-btn').disabled = false;
            }
        }

        function displayResult(data) {
            document.getElementById('ip').textContent = data.query || '-';
            document.getElementById('country').textContent = `${data.country || '-'} (${data.countryCode || '-'})`;
            document.getElementById('city').textContent = data.city || '-';
            document.getElementById('region').textContent = data.regionName || '-';
            document.getElementById('postal').textContent = data.zip || '-';
            document.getElementById('location').textContent = data.lat && data.lon 
                ? `${data.lat.toFixed(4)}, ${data.lon.toFixed(4)}` 
                : '-';
            document.getElementById('isp').textContent = data.isp || '-';
            document.getElementById('org').textContent = data.org || '-';
            document.getElementById('timezone').textContent = data.timezone || '-';

            document.getElementById('result').style.display = 'block';
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '⚠️ ' + message;
            errorEl.style.display = 'block';
        }

        // Enter 키로 조회
        document.getElementById('ip-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                lookupIP();
            }
        });

        // 페이지 로드 시 내 IP 표시
        getMyIP();
    </script>
</body>
</html>
