<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="⚡ JS Minifier & Beautifier - JavaScript 코드 압축 및 정리 무료 온라인 도구 | Free online tool at eastsea.monster" />
    <title>JS Minifier & Beautifier - EastSea Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f8f9fa; --bg-tertiary: #e9ecef;
            --text-primary: #212529; --text-secondary: #6c757d;
            --accent: #f59e0b; --accent2: #d97706;
            --border: #dee2e6; --shadow: rgba(0,0,0,0.1);
            --green: #10b981; --red: #ef4444;
        }
        [data-theme="dark"] {
            --bg-primary: #0f0f23; --bg-secondary: #1a1a2e; --bg-tertiary: #16213e;
            --text-primary: #e4e4e7; --text-secondary: #a1a1aa;
            --border: #27272a; --shadow: rgba(0,0,0,0.5);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            padding: 20px; min-height: 100vh; transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 960px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 24px; }
        h1 { font-size: 1.9rem; color: var(--accent); margin-bottom: 6px; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; }
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; width: 44px; height: 44px;
            border-radius: 50%; background: var(--bg-secondary); border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; cursor: pointer; z-index: 1000; box-shadow: 0 2px 8px var(--shadow);
        }

        /* Options Bar */
        .options {
            background: var(--bg-secondary); border-radius: 12px; padding: 14px 18px;
            border: 1px solid var(--border); margin-bottom: 16px;
            display: flex; gap: 18px; flex-wrap: wrap; align-items: center;
        }
        .options-title { font-weight: 700; font-size: 0.85rem; color: var(--accent); white-space: nowrap; }
        .options label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
        .options input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent); }

        /* Editors */
        .editors { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
        .editor-box {
            background: var(--bg-secondary); border-radius: 12px; padding: 14px;
            border: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px;
        }
        .editor-header { display: flex; justify-content: space-between; align-items: center; }
        .editor-title { font-weight: 700; font-size: 0.9rem; color: var(--accent); }
        .editor-meta { font-size: 0.75rem; color: var(--text-secondary); }
        textarea {
            width: 100%; height: 420px; padding: 12px; border: 1px solid var(--border);
            border-radius: 10px; background: var(--bg-primary); color: var(--text-primary);
            font-family: 'SF Mono', 'Fira Code', Monaco, monospace; font-size: 0.82rem;
            resize: vertical; line-height: 1.5; tab-size: 2; outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--accent); }
        .editor-footer { display: flex; gap: 8px; justify-content: flex-end; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
        .btn {
            padding: 10px 22px; border: none; border-radius: 10px;
            font-weight: 700; cursor: pointer; font-size: 0.9rem;
            transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; gap: 6px;
        }
        .btn:hover { opacity: 0.85; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #1a1a1a; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-sm { padding: 4px 12px; font-size: 0.78rem; border-radius: 8px; }

        /* Stats Bar */
        .stats-bar {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
            background: var(--bg-secondary); border-radius: 12px; padding: 16px;
            border: 1px solid var(--border); margin-bottom: 16px;
        }
        .stat { text-align: center; }
        .stat-label { font-size: 0.72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-top: 2px; }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }

        /* Error Banner */
        .error-banner {
            background: rgba(239,68,68,0.1); border: 1px solid var(--red);
            border-radius: 10px; padding: 10px 16px; color: var(--red);
            font-size: 0.85rem; margin-bottom: 14px; display: none;
        }
        .error-banner.show { display: block; }

        /* Keyboard shortcut hint */
        .kbd-hint { font-size: 0.75rem; color: var(--text-secondary); text-align: center; }
        kbd {
            background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 4px; padding: 1px 6px; font-size: 0.75rem; font-family: monospace;
        }

        @media (max-width: 700px) {
            .editors { grid-template-columns: 1fr; }
            textarea { height: 280px; }
            .stats-bar { gap: 12px; }
            .stat-value { font-size: 1.2rem; }
        }
    </style>
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <div class="container">
        <header>
            <h1>⚡ JS Minifier & Beautifier</h1>
            <p class="subtitle">JavaScript 코드 압축 & 정리 — 클라이언트에서 완전히 처리, 코드가 서버로 전송되지 않습니다</p>
        </header>

        <div class="options">
            <span class="options-title">옵션</span>
            <label><input type="checkbox" id="opt-line-comments" checked> 한 줄 주석 제거 <code style="font-size:0.75rem">//</code></label>
            <label><input type="checkbox" id="opt-block-comments" checked> 블록 주석 제거 <code style="font-size:0.75rem">/* */</code></label>
            <label><input type="checkbox" id="opt-whitespace" checked> 공백 축소</label>
            <label><input type="checkbox" id="opt-console"> console.* 제거</label>
            <label><input type="checkbox" id="opt-debugger"> debugger 제거</label>
        </div>

        <div class="error-banner" id="error-banner"></div>

        <div class="editors">
            <div class="editor-box">
                <div class="editor-header">
                    <span class="editor-title">JavaScript 입력</span>
                    <span class="editor-meta" id="input-size">0 B</span>
                </div>
                <textarea id="js-input" placeholder="JavaScript 코드를 붙여넣으세요...

// This is a comment
function greet(name) {
    console.log('Hello, ' + name);
    return 'Hello, ' + name;
}

const result = greet('World');
" oninput="updateInputMeta()"></textarea>
                <div class="editor-footer">
                    <button class="btn btn-secondary btn-sm" onclick="loadExample()">예제 불러오기</button>
                    <button class="btn btn-secondary btn-sm" onclick="clearInput()">지우기</button>
                </div>
            </div>
            <div class="editor-box">
                <div class="editor-header">
                    <span class="editor-title">결과</span>
                    <span class="editor-meta" id="output-size">0 B</span>
                </div>
                <textarea id="js-output" readonly placeholder="여기에 결과가 표시됩니다..."></textarea>
                <div class="editor-footer">
                    <button class="btn btn-secondary btn-sm" onclick="copyOutput()" id="copy-btn">📋 복사</button>
                    <button class="btn btn-secondary btn-sm" onclick="downloadOutput()">⬇️ 저장</button>
                </div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="minify()">⚡ 압축하기</button>
            <button class="btn btn-secondary" onclick="beautify()">✨ 정리하기</button>
        </div>

        <p class="kbd-hint" style="margin-bottom:14px">
            단축키: <kbd>Ctrl</kbd>+<kbd>Enter</kbd> 압축 &nbsp;|&nbsp; <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Enter</kbd> 정리
        </p>

        <div class="stats-bar" id="stats-bar" style="display:none">
            <div class="stat">
                <div class="stat-label">원본 크기</div>
                <div class="stat-value" id="stat-orig">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">압축 크기</div>
                <div class="stat-value" id="stat-min">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">절약</div>
                <div class="stat-value green" id="stat-save">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">압축률</div>
                <div class="stat-value" id="stat-ratio">—</div>
            </div>
        </div>
    </div>

    <script>
        /* ── Theme ── */
        function initTheme() {
            const s = localStorage.getItem('jsmin-theme') || 'light';
            document.documentElement.setAttribute('data-theme', s);
            document.getElementById('theme-btn').textContent = s === 'light' ? '🌙' : '☀️';
        }
        function toggleTheme() {
            const c = document.documentElement.getAttribute('data-theme') || 'light';
            const n = c === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', n);
            localStorage.setItem('jsmin-theme', n);
            document.getElementById('theme-btn').textContent = n === 'light' ? '🌙' : '☀️';
        }

        /* ── Helpers ── */
        function formatBytes(b) {
            if (b === 0) return '0 B';
            if (b < 1024) return b + ' B';
            return (b / 1024).toFixed(2) + ' KB';
        }
        function byteSize(str) { return new Blob([str]).size; }

        function updateInputMeta() {
            const sz = byteSize(document.getElementById('js-input').value);
            document.getElementById('input-size').textContent = formatBytes(sz);
        }

        function showError(msg) {
            const el = document.getElementById('error-banner');
            el.textContent = '⚠️ ' + msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        /* ── String Extractor ── */
        // Safely extract string/regex/template literals so we don't mangle them
        function extractLiterals(code) {
            const literals = [];
            let result = '';
            let i = 0;
            const n = code.length;

            while (i < n) {
                const ch = code[i];

                // Single/double quoted string
                if (ch === '"' || ch === "'") {
                    let s = ch; i++;
                    while (i < n) {
                        if (code[i] === '\\' && i + 1 < n) { s += code[i] + code[i+1]; i += 2; continue; }
                        s += code[i];
                        if (code[i] === ch) { i++; break; }
                        i++;
                    }
                    const idx = literals.length;
                    literals.push(s);
                    result += '\x00L' + idx + '\x00';
                    continue;
                }

                // Template literal (backtick)
                if (ch === '`') {
                    let s = '`'; i++;
                    let depth = 0;
                    while (i < n) {
                        if (code[i] === '\\' && i + 1 < n) { s += code[i] + code[i+1]; i += 2; continue; }
                        if (code[i] === '$' && code[i+1] === '{') { depth++; s += '${'; i += 2; continue; }
                        if (depth > 0 && code[i] === '}') { depth--; s += '}'; i++; continue; }
                        s += code[i];
                        if (depth === 0 && code[i] === '`') { i++; break; }
                        i++;
                    }
                    const idx = literals.length;
                    literals.push(s);
                    result += '\x00L' + idx + '\x00';
                    continue;
                }

                result += ch;
                i++;
            }

            return { code: result, literals };
        }

        function restoreLiterals(code, literals) {
            return code.replace(/\x00L(\d+)\x00/g, (_, i) => literals[parseInt(i)]);
        }

        /* ── Minifier ── */
        function minify() {
            const input = document.getElementById('js-input').value;
            if (!input.trim()) { showError('코드를 입력해 주세요.'); return; }

            const opts = {
                lineComments:  document.getElementById('opt-line-comments').checked,
                blockComments: document.getElementById('opt-block-comments').checked,
                whitespace:    document.getElementById('opt-whitespace').checked,
                console:       document.getElementById('opt-console').checked,
                debugger:      document.getElementById('opt-debugger').checked,
            };

            try {
                let code = input;
                const origSize = byteSize(code);

                // 1. Extract string/template literals
                const { code: stripped, literals } = extractLiterals(code);
                code = stripped;

                // 2. Remove line comments
                if (opts.lineComments) {
                    code = code.replace(/\/\/[^\n]*/g, '');
                }

                // 3. Remove block comments
                if (opts.blockComments) {
                    code = code.replace(/\/\*[\s\S]*?\*\//g, '');
                }

                // 4. Remove console.* calls (simple single-line form)
                if (opts.console) {
                    code = code.replace(/\bconsole\s*\.\s*(log|warn|error|info|debug|trace|dir|assert|count|time|timeEnd|group|groupEnd)\s*\([^)]*\)\s*;?/g, '');
                }

                // 5. Remove debugger statements
                if (opts.debugger) {
                    code = code.replace(/\bdebugger\s*;?/g, '');
                }

                // 6. Collapse whitespace
                if (opts.whitespace) {
                    // Collapse runs of spaces/tabs to single space
                    code = code.replace(/[ \t]+/g, ' ');
                    // Remove space around punctuation/operators
                    code = code.replace(/ *([{}()\[\];,]) */g, '$1');
                    code = code.replace(/ *([=<>!+\-*\/%&|^~?:]) */g, '$1');
                    // Collapse multiple blank lines
                    code = code.replace(/\n[ \t]*\n[ \t]*/g, '\n');
                    // Remove trailing/leading spaces per line
                    code = code.replace(/^ +| +$/gm, '');
                    // Join lines where safe (after ; { } ,)
                    code = code.replace(/([;{},])\n/g, '$1');
                    code = code.replace(/\n([;{},])/g, '$1');
                    // Collapse remaining newlines
                    code = code.replace(/\n+/g, '\n');
                }

                // 7. Restore literals
                code = restoreLiterals(code, literals);
                code = code.trim();

                document.getElementById('js-output').value = code;

                const minSize = byteSize(code);
                const saved = origSize > 0 ? ((1 - minSize / origSize) * 100).toFixed(1) : 0;
                const ratio = origSize > 0 ? (minSize / origSize).toFixed(3) : 1;

                document.getElementById('stat-orig').textContent = formatBytes(origSize);
                document.getElementById('stat-min').textContent = formatBytes(minSize);
                document.getElementById('stat-save').textContent = saved + '%';
                document.getElementById('stat-ratio').textContent = ratio + 'x';
                document.getElementById('output-size').textContent = formatBytes(minSize);
                document.getElementById('stats-bar').style.display = '';

            } catch(e) {
                showError('처리 중 오류가 발생했습니다: ' + e.message);
            }
        }

        /* ── Beautifier ── */
        function beautify() {
            const raw = document.getElementById('js-output').value || document.getElementById('js-input').value;
            if (!raw.trim()) { showError('정리할 코드를 입력하거나 먼저 압축을 실행해 주세요.'); return; }

            try {
                let code = raw;
                const origSize = byteSize(code);

                // Basic beautifier: track brace depth
                let result = '';
                let indent = 0;
                const TAB = '    ';

                // Normalize whitespace first
                code = code.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

                // Add newlines after { ; } if missing
                code = code.replace(/\{(?!\n)/g, '{\n');
                code = code.replace(/\}(?!\n)/g, '}\n');
                code = code.replace(/;(?!\n)/g, ';\n');

                const lines = code.split('\n');
                const out = [];

                for (let raw of lines) {
                    const line = raw.trim();
                    if (!line) continue;

                    // Decrease indent before closing brace
                    if (line.startsWith('}') || line.startsWith(']') || line.startsWith(')')) {
                        indent = Math.max(0, indent - 1);
                    }

                    out.push(TAB.repeat(indent) + line);

                    // Increase indent after opening brace
                    const opens  = (line.match(/[{([]/g) || []).length;
                    const closes = (line.match(/[})\]]/g) || []).length;
                    indent = Math.max(0, indent + opens - closes);
                    if (line.startsWith('}') || line.startsWith(']') || line.startsWith(')')) {
                        indent = Math.max(0, indent);
                    }
                }

                result = out.join('\n');
                document.getElementById('js-input').value = result;
                document.getElementById('js-output').value = '';

                const outSize = byteSize(result);
                document.getElementById('input-size').textContent = formatBytes(outSize);
                document.getElementById('output-size').textContent = '—';

            } catch(e) {
                showError('정리 중 오류가 발생했습니다: ' + e.message);
            }
        }

        /* ── UI Actions ── */
        function copyOutput() {
            const txt = document.getElementById('js-output').value;
            if (!txt) { showError('복사할 결과가 없습니다.'); return; }
            navigator.clipboard.writeText(txt).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = '✅ 복사됨';
                setTimeout(() => btn.textContent = '📋 복사', 1500);
            });
        }

        function downloadOutput() {
            const txt = document.getElementById('js-output').value;
            if (!txt) { showError('저장할 결과가 없습니다.'); return; }
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([txt], { type: 'text/javascript' }));
            a.download = 'minified.js';
            a.click();
        }

        function clearInput() {
            document.getElementById('js-input').value = '';
            document.getElementById('js-output').value = '';
            document.getElementById('input-size').textContent = '0 B';
            document.getElementById('output-size').textContent = '0 B';
            document.getElementById('stats-bar').style.display = 'none';
        }

        function loadExample() {
            document.getElementById('js-input').value = `/**
 * EastSea Example Module
 * Demonstrates typical JavaScript patterns for minification.
 */

// Constants
const MAX_RETRIES = 3;
const BASE_URL = 'https://api.example.com/v1';

// Utility helpers
function debounce(fn, delay) {
    let timer = null;
    return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
    };
}

// Fetch with retry logic
async function fetchWithRetry(url, options = {}, retries = MAX_RETRIES) {
    for (let attempt = 1; attempt <= retries; attempt++) {
        try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(\`HTTP \${response.status}\`);
            return await response.json();
        } catch (err) {
            console.log(\`Attempt \${attempt} failed: \${err.message}\`);
            if (attempt === retries) throw err;
            await new Promise(r => setTimeout(r, attempt * 500));
        }
    }
}

// Simple event emitter
class EventEmitter {
    constructor() {
        this._events = {};
    }

    on(event, listener) {
        if (!this._events[event]) this._events[event] = [];
        this._events[event].push(listener);
        return this;
    }

    emit(event, ...args) {
        const listeners = this._events[event] || [];
        listeners.forEach(fn => fn(...args));
        return this;
    }

    off(event, listener) {
        if (this._events[event]) {
            this._events[event] = this._events[event].filter(fn => fn !== listener);
        }
        return this;
    }
}

// Export
const emitter = new EventEmitter();
debugger; // remove in production
console.log('Module loaded');
export { fetchWithRetry, debounce, EventEmitter, emitter };
`;
            updateInputMeta();
            minify();
        }

        /* ── Keyboard Shortcuts ── */
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (e.shiftKey) beautify(); else minify();
                }
            }
        });

        initTheme();
        updateInputMeta();
    </script>
</body>
</html>
