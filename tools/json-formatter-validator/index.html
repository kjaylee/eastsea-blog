  <style>
    :root {
      --bg: #0a0a1a;
      --bg-elev: #10122a;
      --bg-soft: #151838;
      --line: #2b2f64;
      --text: #e9ecff;
      --muted: #9da4d6;
      --primary: #62f3ff;
      --primary-2: #8b7bff;
      --ok: #58f7a4;
      --err: #ff6b9a;
      --warn: #ffca58;
      --key: #b8c4ff;
      --string: #9bffcb;
      --number: #7dc6ff;
      --bool: #ff9bd9;
      --null: #8f98c7;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --glow: 0 0 0 1px rgba(98, 243, 255, 0.35), 0 0 24px rgba(98, 243, 255, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      background: radial-gradient(1200px 700px at 20% -20%, #1f2252 0%, var(--bg) 45%), var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(1200px, 94vw);
      margin: 24px auto 48px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .back {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }

    .back:hover { color: var(--primary); }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.8vw, 2rem);
      letter-spacing: 0.2px;
      background: linear-gradient(120deg, var(--primary), #89b9ff, var(--primary-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 22px rgba(98, 243, 255, 0.18);
    }

    .sub {
      margin: 8px 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(16, 18, 42, 0.9), rgba(16, 18, 42, 0.75));
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(8, 10, 28, 0.8);
    }

    .btn, .select, .toggle {
      border: 1px solid var(--line);
      background: var(--bg-soft);
      color: var(--text);
      border-radius: 10px;
      font-size: 13px;
      padding: 9px 12px;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(120deg, #2744ff, #2fb3ff);
      border-color: #4e77ff;
      box-shadow: var(--glow);
      font-weight: 700;
    }

    .btn:hover, .select:hover, .toggle:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px); }

    .toolbar .spacer { flex: 1; }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      cursor: pointer;
    }

    .toggle input { accent-color: var(--primary); }

    .status {
      display: none;
      margin: 10px 12px 0;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
    }

    .status.ok {
      display: block;
      color: var(--ok);
      border: 1px solid rgba(88, 247, 164, 0.35);
      background: rgba(88, 247, 164, 0.09);
    }

    .status.err {
      display: block;
      color: var(--err);
      border: 1px solid rgba(255, 107, 154, 0.4);
      background: rgba(255, 107, 154, 0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
    }

    .card {
      background: rgba(12, 14, 34, 0.85);
      border: 1px solid var(--line);
      border-radius: 12px;
      min-height: 280px;
      overflow: hidden;
    }

    .card h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: #dbe3ff;
    }

    textarea {
      width: 100%;
      min-height: 330px;
      resize: vertical;
      border: 0;
      outline: 0;
      background: transparent;
      color: #dff2ff;
      padding: 12px;
      font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
      tab-size: 2;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      padding: 0 12px 10px;
    }

    .tree-wrap {
      padding: 10px 12px 14px;
      max-height: 410px;
      overflow: auto;
      font: 12px/1.65 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
    }

    details { margin-left: 10px; }
    summary {
      cursor: pointer;
      list-style: none;
      padding: 1px 0;
    }
    summary::-webkit-details-marker { display: none; }
    .arrow {
      display: inline-block;
      width: 14px;
      color: #7f89bf;
    }
    details > summary .arrow::before { content: '▸'; }
    details[open] > summary .arrow::before { content: '▾'; }

    .leaf { margin-left: 24px; }
    .k { color: var(--key); }
    .s { color: var(--string); }
    .n { color: var(--number); }
    .b { color: var(--bool); }
    .nl { color: var(--null); }
    .meta { color: #7f89bf; }

    .foot {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      textarea { min-height: 240px; }
      .tree-wrap { max-height: 320px; }
    }
  </style>
<script src="/assets/analytics.js"></script>

<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="../">← 도구 목록</a>
    </div>

    <h1>JSON 포맷터 & 검증기</h1>
    <p class="sub">JSON을 붙여넣고 <strong>검증</strong>, <strong>포맷팅</strong>, <strong>트리뷰</strong>를 한 번에 처리하세요. (Ctrl/Cmd + Enter = 포맷)</p>

    <section class="panel" aria-label="JSON 도구 패널">
      <div class="toolbar">
        <button class="btn primary" id="formatBtn">포맷</button>
        <button class="btn" id="validateBtn">검증</button>
        <button class="btn" id="minifyBtn">압축(Minify)</button>
        <button class="btn" id="sampleBtn">샘플</button>
        <button class="btn" id="clearBtn">초기화</button>
        <button class="btn" id="copyBtn">결과 복사</button>
        <button class="btn" id="downloadBtn">JSON 저장</button>
        <span class="spacer"></span>
        <label class="toggle"><input type="checkbox" id="sortKeys" /> 키 정렬</label>
        <select class="select" id="indent" aria-label="들여쓰기">
          <option value="2">들여쓰기 2칸</option>
          <option value="4">들여쓰기 4칸</option>
          <option value="tab">탭</option>
        </select>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <div class="grid">
        <article class="card">
          <h2>입력 JSON</h2>
          <textarea id="input" spellcheck="false" placeholder="여기에 JSON을 붙여넣으세요"></textarea>
          <div class="hint">오류 발생 시 가능한 위치(라인/열)를 안내하고 입력 영역을 해당 지점으로 이동합니다.</div>
        </article>

        <article class="card">
          <h2>결과 JSON</h2>
          <textarea id="output" spellcheck="false" readonly placeholder="포맷/검증 결과가 여기에 표시됩니다"></textarea>
          <div class="hint">검증만 실행한 경우 결과 출력은 기존 상태를 유지합니다.</div>
        </article>

        <article class="card" style="grid-column: 1 / -1;">
          <h2>트리 뷰</h2>
          <div class="tree-wrap" id="tree">아직 파싱된 데이터가 없습니다.</div>
        </article>
      </div>
    </section>

    <div class="foot">Neon Dark Theme · Background #0a0a1a · eastsea.xyz/tools</div>
  </div>

  <script>
    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');
    const treeEl = document.getElementById('tree');
    const statusEl = document.getElementById('status');
    const indentEl = document.getElementById('indent');
    const sortKeysEl = document.getElementById('sortKeys');

    const escapeHtml = (v) => String(v)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');

    function showStatus(message, type = 'ok') {
      statusEl.textContent = message;
      statusEl.className = 'status ' + type;
    }

    function clearStatus() {
      statusEl.textContent = '';
      statusEl.className = 'status';
    }

    function getIndent() {
      return indentEl.value === 'tab' ? '\t' : Number(indentEl.value);
    }

    function sortDeep(value) {
      if (Array.isArray(value)) return value.map(sortDeep);
      if (value && typeof value === 'object') {
        return Object.keys(value).sort((a, b) => a.localeCompare(b, 'ko')).reduce((acc, key) => {
          acc[key] = sortDeep(value[key]);
          return acc;
        }, {});
      }
      return value;
    }

    function parseJson() {
      const raw = inputEl.value.trim();
      if (!raw) throw new Error('입력값이 비어 있습니다. JSON을 붙여넣어 주세요.');
      return JSON.parse(raw);
    }

    function getLineColByPos(text, pos) {
      let line = 1, col = 1;
      for (let i = 0; i < pos; i++) {
        if (text[i] === '\n') { line++; col = 1; }
        else col++;
      }
      return { line, col };
    }

    function markErrorPosition(errorMessage) {
      const match = errorMessage.match(/position\s(\d+)/i);
      if (!match) return '';

      const pos = Number(match[1]);
      const text = inputEl.value;
      const { line, col } = getLineColByPos(text, pos);
      inputEl.focus();
      inputEl.setSelectionRange(pos, pos + 1);
      return ` (라인 ${line}, 열 ${col})`;
    }

    function valueSpan(v) {
      const t = typeof v;
      if (v === null) return `<span class="nl">null</span>`;
      if (t === 'string') return `<span class="s">"${escapeHtml(v)}"</span>`;
      if (t === 'number') return `<span class="n">${String(v)}</span>`;
      if (t === 'boolean') return `<span class="b">${String(v)}</span>`;
      return `<span>${escapeHtml(String(v))}</span>`;
    }

    function renderTreeNode(key, value, depth = 0) {
      const keyHtml = key === null ? '' : `<span class="k">${escapeHtml(String(key))}</span>: `;

      if (Array.isArray(value)) {
        if (value.length === 0) return `<div class="leaf">${keyHtml}<span class="meta">[ ]</span></div>`;
        const open = depth < 1 ? ' open' : '';
        const children = value.map((item, i) => renderTreeNode(i, item, depth + 1)).join('');
        return `<details${open}><summary><span class="arrow"></span>${keyHtml}<span class="meta">[${value.length}]</span></summary>${children}</details>`;
      }

      if (value && typeof value === 'object') {
        const keys = Object.keys(value);
        if (keys.length === 0) return `<div class="leaf">${keyHtml}<span class="meta">{ }</span></div>`;
        const open = depth < 1 ? ' open' : '';
        const children = keys.map((k) => renderTreeNode(k, value[k], depth + 1)).join('');
        return `<details${open}><summary><span class="arrow"></span>${keyHtml}<span class="meta">{${keys.length}}</span></summary>${children}</details>`;
      }

      return `<div class="leaf">${keyHtml}${valueSpan(value)}</div>`;
    }

    function renderTree(value) {
      treeEl.innerHTML = renderTreeNode(null, value);
    }

    function processJson(mode) {
      clearStatus();
      try {
        let parsed = parseJson();
        if (sortKeysEl.checked) parsed = sortDeep(parsed);

        if (mode === 'format') {
          outputEl.value = JSON.stringify(parsed, null, getIndent());
          showStatus('✅ 유효한 JSON입니다. 포맷팅이 완료되었습니다.', 'ok');
        } else if (mode === 'minify') {
          outputEl.value = JSON.stringify(parsed);
          showStatus('✅ 유효한 JSON입니다. 압축(Minify) 완료.', 'ok');
        } else {
          showStatus('✅ 유효한 JSON입니다. 검증 통과.', 'ok');
        }

        renderTree(parsed);
      } catch (error) {
        const tail = markErrorPosition(error.message);
        showStatus(`❌ JSON 오류: ${error.message}${tail}`, 'err');
        treeEl.textContent = '오류가 있어 트리뷰를 표시할 수 없습니다.';
      }
    }

    async function copyOutput() {
      const txt = outputEl.value.trim() || inputEl.value.trim();
      if (!txt) {
        showStatus('⚠️ 복사할 텍스트가 없습니다.', 'err');
        return;
      }
      try {
        await navigator.clipboard.writeText(txt);
        showStatus('📋 클립보드에 복사되었습니다.', 'ok');
      } catch {
        showStatus('❌ 클립보드 복사에 실패했습니다. 브라우저 권한을 확인해주세요.', 'err');
      }
    }

    function downloadJson() {
      const txt = outputEl.value.trim() || inputEl.value.trim();
      if (!txt) {
        showStatus('⚠️ 저장할 JSON이 없습니다.', 'err');
        return;
      }
      const blob = new Blob([txt], { type: 'application/json;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'formatted.json';
      a.click();
      URL.revokeObjectURL(a.href);
      showStatus('💾 JSON 파일로 저장되었습니다.', 'ok');
    }

    function loadSample() {
      inputEl.value = JSON.stringify({
        project: 'eastsea.tools',
        version: 1,
        active: true,
        tags: ['json', 'formatter', 'validator', 'tree'],
        profile: {
          owner: 'Jay Lee',
          locale: 'ko-KR',
          timezone: 'Asia/Seoul'
        },
        items: [
          { id: 101, name: 'alpha', price: 10.5 },
          { id: 102, name: 'beta', price: 15.75 }
        ],
        nullable: null
      }, null, 2);
      outputEl.value = '';
      treeEl.textContent = '샘플이 입력되었습니다. 포맷 또는 검증을 눌러주세요.';
      showStatus('샘플 JSON을 불러왔습니다.', 'ok');
    }

    function clearAll() {
      inputEl.value = '';
      outputEl.value = '';
      treeEl.textContent = '아직 파싱된 데이터가 없습니다.';
      clearStatus();
      inputEl.focus();
    }

    document.getElementById('formatBtn').addEventListener('click', () => processJson('format'));
    document.getElementById('validateBtn').addEventListener('click', () => processJson('validate'));
    document.getElementById('minifyBtn').addEventListener('click', () => processJson('minify'));
    document.getElementById('copyBtn').addEventListener('click', copyOutput);
    document.getElementById('downloadBtn').addEventListener('click', downloadJson);
    document.getElementById('sampleBtn').addEventListener('click', loadSample);
    document.getElementById('clearBtn').addEventListener('click', clearAll);

    inputEl.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        processJson('format');
      }
    });
  </script>
</body>
