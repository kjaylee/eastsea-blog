<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Patch Lab | RFC 6902 생성기</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #13132a;
      --panel-2: #1b1b37;
      --text: #f2f5ff;
      --muted: #a8b0cc;
      --line: #2b2f52;
      --accent: #6aa8ff;
      --accent-2: #8e7bff;
      --danger: #ff7387;
      --ok: #4dd8a1;
      --radius: 14px;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.22rem, 1.7vw, 1.6rem);
      letter-spacing: 0.2px;
    }

    p.sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .btns, .inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button {
      border: 1px solid var(--line);
      color: var(--text);
      background: #202043;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: transform .06s ease, opacity .16s ease, border-color .16s ease;
    }
    button:hover { border-color: #3f4580; }
    button:active { transform: translateY(1px); }

    .primary {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      font-weight: 700;
    }

    .danger {
      color: #ffd7df;
      background: #3c1f2c;
      border-color: #5a2c3f;
    }

    .grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      min-height: 280px;
    }

    label {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0f1024;
      color: #eff3ff;
      padding: 12px;
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13.5px;
      outline: none;
    }

    textarea:focus {
      border-color: #4e6ce1;
      box-shadow: 0 0 0 2px rgba(106, 168, 255, 0.2);
    }

    .patch {
      margin-top: 12px;
    }

    .status {
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #111329;
      padding: 10px 12px;
      font-size: 0.92rem;
      line-height: 1.5;
      color: var(--muted);
      min-height: 46px;
      white-space: pre-wrap;
    }

    .ok { color: var(--ok); }
    .err { color: var(--danger); }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
    }

    .footer {
      margin-top: 14px;
      font-size: 0.82rem;
      color: #8f97bb;
      text-align: right;
    }

    .pill {
      font-size: 0.78rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      color: var(--muted);
      background: #151734;
    }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 data-i18n="title">JSON Patch Lab (RFC 6902)</h1>
          <p class="sub" data-i18n="subtitle">원본/수정 JSON을 비교해 Patch를 생성하고 즉시 적용 결과를 검증하세요.</p>
        </div>
        <div class="inline">
          <span class="pill" data-i18n="autosave">자동 저장: 켜짐</span>
          <button id="langBtn" aria-label="language toggle">EN</button>
        </div>
      </div>

      <div class="grid">
        <div class="field">
          <label for="original" data-i18n="original">원본 JSON</label>
          <textarea id="original" spellcheck="false"></textarea>
        </div>
        <div class="field">
          <label for="modified" data-i18n="modified">수정 JSON</label>
          <textarea id="modified" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="btns" style="margin-top: 12px;">
        <button id="generateBtn" class="primary" data-i18n="generate">Patch 생성</button>
        <button id="applyBtn" data-i18n="apply">Patch 적용 → 결과를 수정 JSON에 반영</button>
        <button id="sampleBtn" data-i18n="sample">샘플 불러오기</button>
        <button id="clearBtn" class="danger" data-i18n="clear">초기화</button>
      </div>

      <div class="patch field">
        <label for="patch" data-i18n="patch">JSON Patch (배열)</label>
        <textarea id="patch" spellcheck="false"></textarea>
      </div>

      <div class="btns" style="margin-top: 10px;">
        <button id="formatBtn" data-i18n="format">JSON 정렬</button>
        <button id="copyBtn" data-i18n="copy">Patch 복사</button>
        <button id="downloadBtn" data-i18n="download">patch.json 다운로드</button>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div class="hint" data-i18n="hint">참고: 배열은 변경 시 전체 replace로 처리합니다(안전/일관성 우선).</div>
      <div class="footer">JSON Patch Lab · No external libraries</div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      const els = {
        original: document.getElementById('original'),
        modified: document.getElementById('modified'),
        patch: document.getElementById('patch'),
        status: document.getElementById('status'),
        generateBtn: document.getElementById('generateBtn'),
        applyBtn: document.getElementById('applyBtn'),
        sampleBtn: document.getElementById('sampleBtn'),
        clearBtn: document.getElementById('clearBtn'),
        formatBtn: document.getElementById('formatBtn'),
        copyBtn: document.getElementById('copyBtn'),
        downloadBtn: document.getElementById('downloadBtn'),
        langBtn: document.getElementById('langBtn')
      };

      const STORAGE_KEY = 'jsonPatchLab.v1';

      const I18N = {
        ko: {
          title: 'JSON Patch Lab (RFC 6902)',
          subtitle: '원본/수정 JSON을 비교해 Patch를 생성하고 즉시 적용 결과를 검증하세요.',
          autosave: '자동 저장: 켜짐',
          original: '원본 JSON',
          modified: '수정 JSON',
          patch: 'JSON Patch (배열)',
          generate: 'Patch 생성',
          apply: 'Patch 적용 → 결과를 수정 JSON에 반영',
          sample: '샘플 불러오기',
          clear: '초기화',
          format: 'JSON 정렬',
          copy: 'Patch 복사',
          download: 'patch.json 다운로드',
          hint: '참고: 배열은 변경 시 전체 replace로 처리합니다(안전/일관성 우선).',
          generated: (n) => `✅ Patch 생성 완료 (${n}개 연산)`,
          noDiff: 'ℹ️ 변경점이 없어 빈 Patch([])가 생성되었습니다.',
          applyOk: '✅ Patch 적용 성공. 결과를 수정 JSON 영역에 반영했습니다.',
          copied: '✅ Patch를 클립보드에 복사했습니다.',
          downloaded: '✅ patch.json 파일을 다운로드했습니다.',
          resetDone: '🧹 입력값과 저장된 설정을 초기화했습니다.',
          formatted: '✅ JSON 정렬 완료',
          parseErr: '❌ JSON 파싱 오류:',
          patchErr: '❌ Patch 적용 오류:',
          patchTypeErr: '❌ Patch는 JSON 배열이어야 합니다.',
          sampleLoaded: '✅ 샘플 데이터를 불러왔습니다.',
          copyFail: '⚠️ 복사 실패. 브라우저 권한을 확인해주세요.',
          ready: '준비 완료. JSON을 붙여넣고 Patch를 생성하세요.'
        },
        en: {
          title: 'JSON Patch Lab (RFC 6902)',
          subtitle: 'Compare original/modified JSON, generate a patch, and verify by applying it instantly.',
          autosave: 'Auto-save: On',
          original: 'Original JSON',
          modified: 'Modified JSON',
          patch: 'JSON Patch (array)',
          generate: 'Generate Patch',
          apply: 'Apply Patch → write result to Modified JSON',
          sample: 'Load Sample',
          clear: 'Reset',
          format: 'Format JSON',
          copy: 'Copy Patch',
          download: 'Download patch.json',
          hint: 'Note: arrays are replaced as a whole when changed (safety + consistency).',
          generated: (n) => `✅ Patch generated (${n} operation${n === 1 ? '' : 's'})`,
          noDiff: 'ℹ️ No differences found. Empty patch [] generated.',
          applyOk: '✅ Patch applied. Result written to Modified JSON.',
          copied: '✅ Patch copied to clipboard.',
          downloaded: '✅ patch.json downloaded.',
          resetDone: '🧹 Inputs and saved settings cleared.',
          formatted: '✅ JSON formatted',
          parseErr: '❌ JSON parse error:',
          patchErr: '❌ Patch apply error:',
          patchTypeErr: '❌ Patch must be a JSON array.',
          sampleLoaded: '✅ Sample loaded.',
          copyFail: '⚠️ Copy failed. Check browser permissions.',
          ready: 'Ready. Paste JSON and generate a patch.'
        }
      };

      const savedState = loadState();
      let lang = savedState.lang || ((navigator.language || 'en').toLowerCase().startsWith('ko') ? 'ko' : 'en');

      function t(key, ...args) {
        const pack = I18N[lang] || I18N.en;
        const fallback = I18N.en;
        const val = pack[key] !== undefined ? pack[key] : fallback[key];
        return typeof val === 'function' ? val(...args) : (val ?? key);
      }

      function applyI18n() {
        document.documentElement.lang = lang === 'ko' ? 'ko' : 'en';
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          el.textContent = t(key);
        });
        els.langBtn.textContent = lang === 'ko' ? 'EN' : 'KO';
      }

      function setStatus(message, kind = 'info') {
        els.status.classList.remove('ok', 'err');
        if (kind === 'ok') els.status.classList.add('ok');
        if (kind === 'err') els.status.classList.add('err');
        els.status.textContent = message;
      }

      function parseJson(text) {
        return JSON.parse(text);
      }

      function stableStringify(value) {
        return JSON.stringify(value);
      }

      function isObject(v) {
        return v && typeof v === 'object' && !Array.isArray(v);
      }

      function esc(segment) {
        return String(segment).replace(/~/g, '~0').replace(/\//g, '~1');
      }

      function makePath(base, key) {
        return base + '/' + esc(key);
      }

      function deepEqual(a, b) {
        return stableStringify(a) === stableStringify(b);
      }

      function generatePatch(orig, mod, path = '') {
        if (deepEqual(orig, mod)) return [];

        const ta = typeof orig;
        const tb = typeof mod;

        if (orig === null || mod === null || ta !== 'object' || tb !== 'object') {
          return [{ op: path === '' ? 'replace' : 'replace', path, value: mod }];
        }

        if (Array.isArray(orig) || Array.isArray(mod)) {
          return [{ op: path === '' ? 'replace' : 'replace', path, value: mod }];
        }

        const ops = [];
        const oKeys = Object.keys(orig);
        const mKeys = Object.keys(mod);

        for (const k of oKeys) {
          if (!(k in mod)) {
            ops.push({ op: 'remove', path: makePath(path, k) });
          }
        }

        for (const k of mKeys) {
          if (!(k in orig)) {
            ops.push({ op: 'add', path: makePath(path, k), value: mod[k] });
          }
        }

        for (const k of mKeys) {
          if (k in orig) {
            ops.push(...generatePatch(orig[k], mod[k], makePath(path, k)));
          }
        }

        return ops;
      }

      function clone(v) {
        return JSON.parse(JSON.stringify(v));
      }

      function decode(seg) {
        return seg.replace(/~1/g, '/').replace(/~0/g, '~');
      }

      function parsePointer(path) {
        if (path === '') return [];
        if (!path.startsWith('/')) throw new Error('Invalid JSON Pointer: ' + path);
        return path.slice(1).split('/').map(decode);
      }

      function getContainerAndKey(doc, pointer, create = false) {
        const parts = parsePointer(pointer);
        if (parts.length === 0) return { root: true, container: null, key: null };

        let cur = doc;
        for (let i = 0; i < parts.length - 1; i++) {
          const p = parts[i];
          if (Array.isArray(cur)) {
            const idx = p === '-' ? cur.length : Number(p);
            if (!Number.isInteger(idx) || idx < 0 || idx > cur.length) {
              throw new Error('Invalid array index in path: ' + p);
            }
            if (idx === cur.length) {
              if (!create) throw new Error('Path does not exist: ' + pointer);
              cur[idx] = {};
            }
            cur = cur[idx];
          } else {
            if (!isObject(cur)) throw new Error('Path traversal on non-object at: ' + p);
            if (!(p in cur)) {
              if (!create) throw new Error('Path does not exist: ' + pointer);
              cur[p] = {};
            }
            cur = cur[p];
          }
        }
        return { root: false, container: cur, key: parts[parts.length - 1] };
      }

      function applySingle(doc, op) {
        const kind = op.op;
        const pointer = op.path;
        const target = getContainerAndKey(doc, pointer, kind === 'add');

        if (target.root) {
          if (kind === 'replace' || kind === 'add') return clone(op.value);
          if (kind === 'remove') return null;
          throw new Error('Unsupported root operation: ' + kind);
        }

        const { container, key } = target;

        if (Array.isArray(container)) {
          if (key === '-' && kind !== 'add') throw new Error('"-" is only allowed for add op');
          const idx = key === '-' ? container.length : Number(key);
          if (!Number.isInteger(idx) || idx < 0 || idx > container.length) {
            throw new Error('Invalid array index: ' + key);
          }

          if (kind === 'add') {
            container.splice(idx, 0, clone(op.value));
          } else if (kind === 'remove') {
            if (idx >= container.length) throw new Error('Remove index out of range: ' + idx);
            container.splice(idx, 1);
          } else if (kind === 'replace') {
            if (idx >= container.length) throw new Error('Replace index out of range: ' + idx);
            container[idx] = clone(op.value);
          } else {
            throw new Error('Unsupported op: ' + kind);
          }
          return doc;
        }

        if (!isObject(container)) throw new Error('Target container is not object/array');

        if (kind === 'add' || kind === 'replace') {
          container[key] = clone(op.value);
        } else if (kind === 'remove') {
          if (!(key in container)) throw new Error('Remove target not found: ' + key);
          delete container[key];
        } else {
          throw new Error('Unsupported op: ' + kind);
        }
        return doc;
      }

      function applyPatch(documentValue, patch) {
        let doc = clone(documentValue);
        for (const op of patch) {
          if (!op || typeof op !== 'object') throw new Error('Invalid patch entry');
          if (!op.op || typeof op.path !== 'string') throw new Error('Patch entry needs op/path');
          doc = applySingle(doc, op);
        }
        return doc;
      }

      function saveState() {
        const state = {
          original: els.original.value,
          modified: els.modified.value,
          patch: els.patch.value,
          lang
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {};
        } catch {
          return {};
        }
      }

      function restore() {
        const state = loadState();
        if (state.original) els.original.value = state.original;
        if (state.modified) els.modified.value = state.modified;
        if (state.patch) els.patch.value = state.patch;
      }

      function prettyJsonIn(el) {
        if (!el.value.trim()) return;
        const value = parseJson(el.value);
        el.value = JSON.stringify(value, null, 2);
      }

      function initSample() {
        const a = {
          user: { id: 7, name: 'Minji', role: 'editor', active: true },
          tags: ['alpha', 'beta'],
          meta: { version: 1 }
        };
        const b = {
          user: { id: 7, name: 'Minji Kim', role: 'admin', active: true },
          tags: ['alpha', 'beta', 'gamma'],
          meta: { version: 2 },
          locale: 'ko-KR'
        };
        els.original.value = JSON.stringify(a, null, 2);
        els.modified.value = JSON.stringify(b, null, 2);
        els.patch.value = '';
        saveState();
        setStatus(t('sampleLoaded'), 'ok');
      }

      function onGenerate() {
        try {
          const orig = parseJson(els.original.value || 'null');
          const mod = parseJson(els.modified.value || 'null');
          const ops = generatePatch(orig, mod);
          els.patch.value = JSON.stringify(ops, null, 2);
          saveState();
          if (ops.length === 0) setStatus(t('noDiff'));
          else setStatus(t('generated', ops.length), 'ok');
        } catch (e) {
          setStatus(`${t('parseErr')} ${e.message}`, 'err');
        }
      }

      function onApply() {
        try {
          const orig = parseJson(els.original.value || 'null');
          const patch = parseJson(els.patch.value || '[]');
          if (!Array.isArray(patch)) {
            setStatus(t('patchTypeErr'), 'err');
            return;
          }
          const result = applyPatch(orig, patch);
          els.modified.value = JSON.stringify(result, null, 2);
          saveState();
          setStatus(t('applyOk'), 'ok');
        } catch (e) {
          setStatus(`${t('patchErr')} ${e.message}`, 'err');
        }
      }

      function onFormat() {
        try {
          prettyJsonIn(els.original);
          prettyJsonIn(els.modified);
          prettyJsonIn(els.patch);
          saveState();
          setStatus(t('formatted'), 'ok');
        } catch (e) {
          setStatus(`${t('parseErr')} ${e.message}`, 'err');
        }
      }

      async function onCopy() {
        try {
          await navigator.clipboard.writeText(els.patch.value || '[]');
          setStatus(t('copied'), 'ok');
        } catch {
          setStatus(t('copyFail'), 'err');
        }
      }

      function onDownload() {
        const content = els.patch.value || '[]';
        const blob = new Blob([content], { type: 'application/json;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'patch.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
        setStatus(t('downloaded'), 'ok');
      }

      function onClear() {
        els.original.value = '';
        els.modified.value = '';
        els.patch.value = '';
        localStorage.removeItem(STORAGE_KEY);
        setStatus(t('resetDone'));
      }

      function debounce(fn, ms = 250) {
        let timer;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), ms);
        };
      }

      els.generateBtn.addEventListener('click', onGenerate);
      els.applyBtn.addEventListener('click', onApply);
      els.formatBtn.addEventListener('click', onFormat);
      els.copyBtn.addEventListener('click', onCopy);
      els.downloadBtn.addEventListener('click', onDownload);
      els.sampleBtn.addEventListener('click', initSample);
      els.clearBtn.addEventListener('click', onClear);
      els.langBtn.addEventListener('click', () => {
        lang = lang === 'ko' ? 'en' : 'ko';
        applyI18n();
        saveState();
      });

      const autosave = debounce(saveState, 220);
      [els.original, els.modified, els.patch].forEach(el => el.addEventListener('input', autosave));

      restore();
      applyI18n();
      setStatus(t('ready'));
      if (!els.original.value && !els.modified.value) {
        initSample();
      }
    })();
  </script>
</body>
</html>
