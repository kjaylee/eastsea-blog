<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="JSON ↔ YAML 양방향 무료 변환기. 실시간 미리보기, 에러 하이라이팅, 복사/다운로드, 파일 드래그앤드롭 지원. Free online JSON YAML converter | eastsea.monster">
  <title>JSON ↔ YAML 변환기 - Converter | eastsea.monster</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="JSON ↔ YAML 변환기 - Free Online Converter">
  <meta property="og:description" content="JSON과 YAML을 즉시 양방향 변환합니다. 실시간 미리보기, 에러 라인 표시, 다운로드 지원.">
  <meta property="og:url" content="https://eastsea.monster/tools/json-yaml-converter/">
  <meta property="og:site_name" content="eastsea.monster">

  <!-- Analytics: GA4 + Clarity -->
  <script src="/assets/analytics.js"></script>

  <!-- js-yaml v4 CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"
    integrity="sha512-CSBhVREyzHAjAiPfkR3p/5OFtPFTFJBSEQb0uNH4BHWwJceTUEMkLJo+c12wBGBaynkOHuvZFb9jb0pFm3bMw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --bg-panel: #2a2a2a;
      --bg-input: #1e1e1e;
      --text-primary: #e9ecef;
      --text-secondary: #adb5bd;
      --border-color: #3a3a3a;
      --accent-color: #3d8bfd;
      --accent-hover: #5a9eff;
      --success-color: #4caf50;
      --error-color: #f44336;
      --warning-color: #ff9800;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --radius: 10px;
      --toolbar-h: 58px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    /* ── Header ── */
    header {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .back-link {
      display: inline-block;
      color: var(--accent-color);
      text-decoration: none;
      font-size: 0.88rem;
      margin-bottom: 10px;
      transition: color .15s;
    }
    .back-link:hover { color: var(--accent-hover); }
    h1 { font-size: 1.55rem; font-weight: 700; letter-spacing: -.3px; }
    .subtitle { color: var(--text-secondary); font-size: 0.88rem; margin-top: 4px; }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }

    .mode-group { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }

    .mode-btn {
      padding: 7px 18px;
      background: var(--bg-panel);
      color: var(--text-secondary);
      border: none;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background .15s, color .15s;
    }
    .mode-btn.active {
      background: var(--accent-color);
      color: #fff;
    }
    .mode-btn:hover:not(.active) {
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .separator { width: 1px; height: 28px; background: var(--border-color); }

    .indent-group { display: flex; align-items: center; gap: 8px; }
    .indent-group label { font-size: 0.82rem; color: var(--text-secondary); white-space: nowrap; }
    .indent-group select {
      background: var(--bg-panel);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* ── Panels ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-color);
    }

    .panel-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .panel-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--bg-input);
      color: var(--text-secondary);
    }

    .textarea-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      height: 380px;
      padding: 14px;
      border: none;
      border-radius: 0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      background: var(--bg-input);
      color: var(--text-primary);
      resize: vertical;
      outline: none;
      tab-size: 2;
      caret-color: var(--accent-color);
    }

    textarea::placeholder { color: #555; }

    textarea.has-error {
      border-left: 3px solid var(--error-color) !important;
    }

    .panel-drop-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(61,139,253,.12);
      border: 2px dashed var(--accent-color);
      border-radius: 0 0 var(--radius) var(--radius);
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--accent-color);
      font-weight: 600;
      pointer-events: none;
      z-index: 10;
    }
    .panel-drop-overlay.active { display: flex; }

    /* ── Action bar ── */
    .action-bar {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      box-shadow: var(--shadow);
    }

    button {
      padding: 7px 16px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background .15s, transform .1s;
    }
    button:active { transform: scale(.97); }

    .btn-primary {
      background: var(--accent-color);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--bg-panel);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    .btn-secondary:hover { background: var(--bg-input); }

    .btn-success {
      background: #1e4d2b;
      color: #4caf50;
      border: 1px solid #2e7d32;
    }
    .btn-success:hover { background: #2e7d32; }

    .btn-danger {
      background: #3b1212;
      color: #f44336;
      border: 1px solid #c62828;
    }
    .btn-danger:hover { background: #c62828; color: #fff; }

    /* ── Status bar ── */
    .status-bar {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.78rem;
      color: var(--text-secondary);
      box-shadow: var(--shadow);
    }

    .status-item { display: flex; align-items: center; gap: 5px; }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-secondary);
      flex-shrink: 0;
    }
    .status-dot.ok { background: var(--success-color); }
    .status-dot.error { background: var(--error-color); }

    .error-msg {
      color: var(--error-color);
      font-size: 0.78rem;
      font-weight: 500;
    }
    .error-line {
      background: rgba(244,67,54,.12);
      border-left: 3px solid var(--error-color);
      padding: 4px 10px;
      margin: 4px 0;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.75rem;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 18px;
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      z-index: 1000;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      body { padding: 12px; }
      .panels { grid-template-columns: 1fr; }
      h1 { font-size: 1.25rem; }
      .mode-btn { padding: 7px 12px; font-size: 0.82rem; }
      textarea { height: 260px; }
      .action-bar { gap: 8px; }
      button { padding: 7px 12px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <a href="../" class="back-link">← 도구 목록</a>
    <h1>🔄 JSON ↔ YAML 변환기</h1>
    <p class="subtitle">JSON과 YAML을 즉시 양방향 변환 · 실시간 미리보기 · 에러 라인 표시</p>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="mode-group">
      <button class="mode-btn active" id="btnJsonToYaml" onclick="setMode('json-to-yaml')">JSON → YAML</button>
      <button class="mode-btn" id="btnYamlToJson" onclick="setMode('yaml-to-json')">YAML → JSON</button>
    </div>
    <div class="separator"></div>
    <div class="indent-group">
      <label for="indentSelect">들여쓰기</label>
      <select id="indentSelect" onchange="scheduleConvert()">
        <option value="2" selected>2 spaces</option>
        <option value="4">4 spaces</option>
      </select>
    </div>
  </div>

  <!-- Panels -->
  <div class="panels">
    <!-- Input Panel -->
    <div class="panel" id="inputPanel">
      <div class="panel-header">
        <span class="panel-title" id="inputLabel">INPUT — JSON</span>
        <span class="panel-badge" id="inputBadge">0 bytes</span>
      </div>
      <div class="textarea-wrap"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <textarea id="inputArea"
          placeholder="JSON을 여기에 입력하거나 파일을 드래그하세요…"
          oninput="scheduleConvert(); updateBadges()"
          spellcheck="false"></textarea>
        <div class="panel-drop-overlay" id="dropOverlay">📂 파일을 여기에 드롭</div>
      </div>
    </div>

    <!-- Output Panel -->
    <div class="panel" id="outputPanel">
      <div class="panel-header">
        <span class="panel-title" id="outputLabel">OUTPUT — YAML</span>
        <span class="panel-badge" id="outputBadge">0 bytes</span>
      </div>
      <div class="textarea-wrap">
        <textarea id="outputArea" readonly
          placeholder="변환 결과가 여기에 나타납니다…"
          spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <!-- Action Bar -->
  <div class="action-bar">
    <button class="btn-primary" onclick="doConvert()">🔄 변환</button>
    <button class="btn-secondary" onclick="loadSample()">📋 샘플 데이터</button>
    <button class="btn-secondary" onclick="clearAll()">🗑 초기화</button>
    <button class="btn-success" onclick="copyOutput()">📋 출력 복사</button>
    <button class="btn-secondary" onclick="downloadOutput()">⬇ 다운로드</button>
    <label class="btn-secondary" style="cursor:pointer; display:inline-block;">
      📂 파일 열기
      <input type="file" id="fileInput" accept=".json,.yaml,.yml" style="display:none" onchange="onFileSelect(event)">
    </label>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-item">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">대기 중</span>
    </div>
    <div id="errorLine" style="display:none; flex:1"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Converter logic -->
<script src="converter.js"></script>
<script>
  /* ── State ─────────────────────────────────────────── */
  let mode = 'json-to-yaml';   // 'json-to-yaml' | 'yaml-to-json'
  let debounceTimer = null;

  /* ── Mode ──────────────────────────────────────────── */
  function setMode(m) {
    mode = m;
    document.getElementById('btnJsonToYaml').classList.toggle('active', m === 'json-to-yaml');
    document.getElementById('btnYamlToJson').classList.toggle('active', m === 'yaml-to-json');

    const inputArea = document.getElementById('inputArea');
    const isJ2Y = m === 'json-to-yaml';

    document.getElementById('inputLabel').textContent = isJ2Y ? 'INPUT — JSON' : 'INPUT — YAML';
    document.getElementById('outputLabel').textContent = isJ2Y ? 'OUTPUT — YAML' : 'OUTPUT — JSON';
    inputArea.placeholder = isJ2Y
      ? 'JSON을 여기에 입력하거나 파일을 드래그하세요…'
      : 'YAML을 여기에 입력하거나 파일을 드래그하세요…';

    // Auto-detect: swap panels if user typed in the other format
    const current = inputArea.value.trim();
    if (current) {
      const detected = Converter.detectType(current);
      if ((isJ2Y && detected === 'yaml') || (!isJ2Y && detected === 'json')) {
        // swap
        const out = document.getElementById('outputArea').value;
        inputArea.value = out;
        document.getElementById('outputArea').value = current;
      }
    }
    scheduleConvert();
  }

  /* ── Convert ───────────────────────────────────────── */
  function scheduleConvert() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(doConvert, 300);
  }

  function doConvert() {
    const input = document.getElementById('inputArea').value;
    const indent = parseInt(document.getElementById('indentSelect').value, 10);
    const outputArea = document.getElementById('outputArea');
    const inputArea = document.getElementById('inputArea');

    if (!input.trim()) {
      outputArea.value = '';
      outputArea.classList.remove('has-error');
      inputArea.classList.remove('has-error');
      setStatus('idle', '', null);
      updateBadges();
      return;
    }

    let res;
    if (mode === 'json-to-yaml') {
      res = Converter.jsonToYaml(input, indent);
    } else {
      res = Converter.yamlToJson(input, indent);
    }

    if (res.error) {
      outputArea.value = '';
      outputArea.classList.remove('has-error');
      inputArea.classList.add('has-error');
      setStatus('error', res.error, res.errorLine);
    } else {
      outputArea.value = res.result;
      outputArea.classList.remove('has-error');
      inputArea.classList.remove('has-error');
      const outSize = new TextEncoder().encode(res.result).length;
      setStatus('ok', `변환 완료 · 출력 ${formatBytes(outSize)}`, null);
    }
    updateBadges();
  }

  /* ── Status ────────────────────────────────────────── */
  function setStatus(type, msg, errorLine) {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const errEl = document.getElementById('errorLine');

    dot.className = 'status-dot ' + (type === 'ok' ? 'ok' : type === 'error' ? 'error' : '');
    text.textContent = type === 'idle' ? '대기 중' : msg;
    text.style.color = type === 'error' ? 'var(--error-color)' : '';

    if (type === 'error' && errorLine) {
      errEl.style.display = 'block';
      errEl.innerHTML = `<div class="error-line">⚠ 오류 위치: ${errorLine}번째 줄</div>`;
    } else {
      errEl.style.display = 'none';
      errEl.innerHTML = '';
    }
  }

  /* ── Badges ────────────────────────────────────────── */
  function updateBadges() {
    const inp = document.getElementById('inputArea').value;
    const out = document.getElementById('outputArea').value;
    document.getElementById('inputBadge').textContent = formatBytes(new TextEncoder().encode(inp).length);
    document.getElementById('outputBadge').textContent = formatBytes(new TextEncoder().encode(out).length);
  }

  function formatBytes(n) {
    if (n === 0) return '0 bytes';
    if (n < 1024) return n + ' bytes';
    return (n / 1024).toFixed(1) + ' KB';
  }

  /* ── Actions ───────────────────────────────────────── */
  function loadSample() {
    const sample = {
      project: "eastsea-tools",
      version: "1.0.0",
      description: "JSON ↔ YAML 변환기 샘플",
      features: ["실시간 변환", "에러 하이라이팅", "파일 업로드"],
      config: {
        indent: 2,
        encoding: "utf-8",
        themes: { dark: true, light: false }
      },
      dependencies: [
        { name: "js-yaml", version: "4.1.0" }
      ]
    };
    const inputArea = document.getElementById('inputArea');
    if (mode === 'json-to-yaml') {
      inputArea.value = JSON.stringify(sample, null, 2);
    } else {
      // YAML sample
      inputArea.value = [
        'project: eastsea-tools',
        'version: 1.0.0',
        'description: "JSON ↔ YAML 변환기 샘플"',
        'features:',
        '  - 실시간 변환',
        '  - 에러 하이라이팅',
        '  - 파일 업로드',
        'config:',
        '  indent: 2',
        '  encoding: utf-8',
        '  themes:',
        '    dark: true',
        '    light: false',
        'dependencies:',
        '  - name: js-yaml',
        '    version: 4.1.0',
      ].join('\n');
    }
    scheduleConvert();
    updateBadges();
    toast('샘플 데이터 로드');
  }

  function clearAll() {
    document.getElementById('inputArea').value = '';
    document.getElementById('outputArea').value = '';
    document.getElementById('inputArea').classList.remove('has-error');
    document.getElementById('outputArea').classList.remove('has-error');
    setStatus('idle', '', null);
    updateBadges();
  }

  function copyOutput() {
    const out = document.getElementById('outputArea').value;
    if (!out) { toast('복사할 내용이 없습니다'); return; }
    navigator.clipboard.writeText(out).then(() => toast('클립보드에 복사 완료!'))
      .catch(() => { document.getElementById('outputArea').select(); document.execCommand('copy'); toast('복사 완료'); });
  }

  function downloadOutput() {
    const out = document.getElementById('outputArea').value;
    if (!out) { toast('다운로드할 내용이 없습니다'); return; }
    const ext = mode === 'json-to-yaml' ? 'yaml' : 'json';
    const blob = new Blob([out], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `converted.${ext}`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast(`converted.${ext} 다운로드`);
  }

  /* ── File Upload ────────────────────────────────────── */
  function onFileSelect(e) {
    const file = e.target.files[0];
    if (file) readFile(file);
    e.target.value = '';
  }

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const content = ev.target.result;
      document.getElementById('inputArea').value = content;

      // Auto-detect format from extension
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === 'json' && mode !== 'json-to-yaml') setMode('json-to-yaml');
      if ((ext === 'yaml' || ext === 'yml') && mode !== 'yaml-to-json') setMode('yaml-to-json');

      scheduleConvert();
      updateBadges();
      toast(`${file.name} 로드 완료`);
    };
    reader.readAsText(file, 'utf-8');
  }

  /* ── Drag & Drop ────────────────────────────────────── */
  function onDragOver(e) {
    e.preventDefault();
    e.stopPropagation();
    document.getElementById('dropOverlay').classList.add('active');
  }

  function onDragLeave(e) {
    e.stopPropagation();
    document.getElementById('dropOverlay').classList.remove('active');
  }

  function onDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    document.getElementById('dropOverlay').classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  }

  /* ── Toast ──────────────────────────────────────────── */
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  /* ── Init ───────────────────────────────────────────── */
  updateBadges();
</script>
</body>
</html>
