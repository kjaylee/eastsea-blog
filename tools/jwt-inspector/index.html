<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JWT Inspector - Decode & Claim Checker</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a30;
      --line: #29324f;
      --text: #eaf0ff;
      --muted: #a6b0cc;
      --accent: #6ea8fe;
      --good: #2dd4bf;
      --warn: #fbbf24;
      --bad: #fb7185;
      --shadow: 0 12px 32px rgba(0,0,0,.35);
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 900px at 10% -10%, #243b74 0%, transparent 45%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 18px;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .hero { margin-bottom: 14px; }
    h1 { margin: 0 0 8px; font-size: clamp(1.3rem, 3.8vw, 2rem); }
    .sub { margin: 0; color: var(--muted); }
    .card {
      background: linear-gradient(180deg, #15203a, var(--card));
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .grid { display: grid; gap: 12px; }
    @media (min-width: 900px) { .grid-2 { grid-template-columns: 1.1fr .9fr; } }
    textarea, input, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #334263;
      background: #0e1730;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    button {
      cursor: pointer;
      background: linear-gradient(180deg, #2e63ce, #2855b0);
      border-color: #4f79d4;
      font-weight: 700;
      transition: transform .08s ease, opacity .2s;
    }
    button:hover { opacity: .95; }
    button:active { transform: translateY(1px); }
    .actions { display: grid; gap: 8px; grid-template-columns: repeat(3, minmax(0,1fr)); }
    .actions .ghost { background: #1a2746; }
    .label { color: var(--muted); font-size: .88rem; margin-bottom: 6px; }
    .row { display: grid; gap: 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: #132448;
      border: 1px solid #355189;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: .82rem;
    }
    .chip.good { border-color: #1a8f7f; background: #0d2f2a; color: #8ff4e7; }
    .chip.warn { border-color: #8b6a0a; background: #2d2409; color: #ffe18c; }
    .chip.bad { border-color: #8f2a44; background: #341321; color: #ffc0cf; }
    pre {
      margin: 0;
      max-height: 280px;
      overflow: auto;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0a1329;
      padding: 10px;
      line-height: 1.45;
      font-size: .9rem;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .status { font-size: .9rem; margin-top: 8px; color: var(--muted); }
    .signature {
      overflow-wrap: anywhere;
      border: 1px dashed #41527e;
      border-radius: 10px;
      padding: 10px;
      background: #0b142c;
      font-size: .84rem;
      color: #c6d5ff;
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap grid">
    <div class="hero">
      <h1>JWT Inspector</h1>
      <p class="sub">Decode JSON Web Tokens locally, inspect claims, and quickly check expiration state.</p>
    </div>

    <section class="card grid grid-2">
      <div class="row">
        <label class="label" for="token">JWT Token</label>
        <textarea id="token" class="mono" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...."></textarea>
        <div class="actions">
          <button id="decodeBtn">Decode JWT</button>
          <button id="sampleBtn" class="ghost">Load Sample</button>
          <button id="clearBtn" class="ghost">Clear</button>
        </div>
        <div id="status" class="status">Paste a token to begin.</div>
      </div>
      <div class="row">
        <div class="label">Claim Health</div>
        <div id="chips" class="chips"></div>
      </div>
    </section>

    <section class="grid grid-2">
      <article class="card row">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <strong>Header</strong>
          <button data-copy="header" class="ghost" style="max-width:150px">Copy JSON</button>
        </div>
        <pre id="headerOut" class="mono">{}</pre>
      </article>
      <article class="card row">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <strong>Payload</strong>
          <button data-copy="payload" class="ghost" style="max-width:150px">Copy JSON</button>
        </div>
        <pre id="payloadOut" class="mono">{}</pre>
      </article>
    </section>

    <section class="card row">
      <strong>Signature (base64url)</strong>
      <div id="sigOut" class="signature mono">-</div>
      <p class="sub" style="margin:0">No keys are sent anywhere. This tool does not verify cryptographic signatures.</p>
    </section>
  </div>

  <script>
    const el = (id) => document.getElementById(id);
    const tokenEl = el('token');
    const headerOut = el('headerOut');
    const payloadOut = el('payloadOut');
    const sigOut = el('sigOut');
    const chips = el('chips');
    const statusEl = el('status');

    function base64UrlDecode(seg) {
      const b64 = seg.replace(/-/g, '+').replace(/_/g, '/');
      const pad = '='.repeat((4 - (b64.length % 4)) % 4);
      const raw = atob(b64 + pad);
      const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    function pretty(obj) {
      return JSON.stringify(obj, null, 2);
    }

    function tsLabel(epoch) {
      if (!Number.isFinite(epoch)) return 'invalid';
      const d = new Date(epoch * 1000);
      return `${d.toLocaleString()} (${Math.floor((Date.now()/1000-epoch)/60)} min ago)`;
    }

    function addChip(text, type='') {
      const div = document.createElement('div');
      div.className = `chip ${type}`;
      div.textContent = text;
      chips.appendChild(div);
    }

    function analyzeClaims(payload) {
      chips.innerHTML = '';
      addChip(`iss: ${payload.iss ?? 'n/a'}`);
      addChip(`sub: ${payload.sub ?? 'n/a'}`);
      addChip(`aud: ${Array.isArray(payload.aud) ? payload.aud.join(', ') : (payload.aud ?? 'n/a')}`);

      const now = Math.floor(Date.now() / 1000);
      if (payload.iat != null) addChip(`iat: ${tsLabel(Number(payload.iat))}`);

      if (payload.nbf != null) {
        const nbf = Number(payload.nbf);
        addChip(now < nbf ? `nbf: not active yet` : `nbf: active`, now < nbf ? 'warn' : 'good');
      } else addChip('nbf: n/a');

      if (payload.exp != null) {
        const exp = Number(payload.exp);
        const left = exp - now;
        if (!Number.isFinite(exp)) addChip('exp: invalid', 'bad');
        else if (left <= 0) addChip(`exp: expired ${Math.abs(Math.floor(left/60))}m ago`, 'bad');
        else if (left < 600) addChip(`exp: expires in ${Math.floor(left/60)}m`, 'warn');
        else addChip(`exp: valid (${Math.floor(left/3600)}h left)`, 'good');
      } else addChip('exp: none', 'warn');
    }

    function decodeToken() {
      const token = tokenEl.value.trim();
      if (!token) {
        statusEl.textContent = 'Paste a JWT first.';
        return;
      }
      const parts = token.split('.');
      if (parts.length < 2) {
        statusEl.textContent = 'Invalid JWT format. Need at least header.payload';
        return;
      }
      try {
        const header = JSON.parse(base64UrlDecode(parts[0]));
        const payload = JSON.parse(base64UrlDecode(parts[1]));
        const signature = parts[2] || '(none)';

        headerOut.textContent = pretty(header);
        payloadOut.textContent = pretty(payload);
        sigOut.textContent = signature;
        analyzeClaims(payload);
        statusEl.textContent = 'Decoded successfully.';
      } catch (err) {
        statusEl.textContent = 'Could not decode JWT: ' + err.message;
      }
    }

    function loadSample() {
      const header = btoa(JSON.stringify({ alg: 'HS256', typ: 'JWT' })).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      const payloadObj = {
        sub: '1234567890',
        name: 'Miss Kim',
        role: 'admin',
        iat: Math.floor(Date.now()/1000) - 120,
        exp: Math.floor(Date.now()/1000) + 3600,
        iss: 'tools.eastsea.xyz'
      };
      const payload = btoa(JSON.stringify(payloadObj)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      tokenEl.value = `${header}.${payload}.signature_example`;
      decodeToken();
    }

    document.getElementById('decodeBtn').addEventListener('click', decodeToken);
    document.getElementById('sampleBtn').addEventListener('click', loadSample);
    document.getElementById('clearBtn').addEventListener('click', () => {
      tokenEl.value = '';
      headerOut.textContent = '{}';
      payloadOut.textContent = '{}';
      sigOut.textContent = '-';
      chips.innerHTML = '';
      statusEl.textContent = 'Cleared.';
    });

    document.querySelectorAll('[data-copy]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const type = btn.getAttribute('data-copy');
        const txt = type === 'header' ? headerOut.textContent : payloadOut.textContent;
        try {
          await navigator.clipboard.writeText(txt);
          statusEl.textContent = `${type} JSON copied.`;
        } catch {
          statusEl.textContent = 'Clipboard permission blocked.';
        }
      });
    });
  </script>
</body>
</html>
