<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>칸반 보드 | Kanban Board</title>
  <meta name="description" content="To Do / In Progress / Done 칸반 보드. 카드 추가·편집·삭제, 드래그앤드롭 이동, 라벨 색상·우선순위·기한 관리, localStorage 저장, JSON 내보내기/가져오기 지원." />
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --line: #dbe2ee;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --todo: #2563eb;
      --prog: #d97706;
      --done: #16a34a;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container { max-width: 1260px; margin: 0 auto; padding: 18px; }
    .top {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0; font-size: 1.35rem; }
    .sub { margin: 4px 0 0; color: var(--muted); font-size: 0.88rem; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    button, input, select, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-soft { background: #e7efff; color: #1d4ed8; }
    .btn-ghost { background: #eef2f7; color: #334155; }
    .board {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .col {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 460px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
    }
    .col.drag-over { outline: 2px dashed var(--primary); outline-offset: -6px; }
    .col-head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .count { font-size: 0.82rem; color: var(--muted); background: #f1f5f9; padding: 3px 8px; border-radius: 999px; }
    .cards {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 360px;
      flex: 1;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--muted);
      text-align: center;
      padding: 12px;
      font-size: 0.86rem;
      background: #fafcff;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
      cursor: grab;
    }
    .card.dragging { opacity: 0.45; }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #334155;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      max-width: 100%;
    }
    .label i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .title { font-weight: 700; margin-top: 8px; word-break: break-word; }
    .desc { color: #475569; margin-top: 6px; font-size: 0.84rem; white-space: pre-wrap; word-break: break-word; }
    .meta { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; font-size: 0.78rem; color: #475569; }
    .badge {
      border-radius: 999px;
      padding: 3px 8px;
      background: #f1f5f9;
      border: 1px solid var(--line);
    }
    .priority-high { color: #b91c1c; background: #fee2e2; border-color: #fecaca; }
    .priority-medium { color: #a16207; background: #fef3c7; border-color: #fde68a; }
    .priority-low { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
    .overdue { color: #b91c1c; font-weight: 700; }
    .card-btns { display: flex; gap: 4px; }
    .icon-btn {
      border: 0;
      background: #eef2ff;
      color: #1e40af;
      border-radius: 8px;
      padding: 4px 7px;
      font-size: 0.76rem;
      cursor: pointer;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 30;
    }
    .modal.open { display: flex; }
    .dialog {
      width: min(560px, 100%);
      background: #fff;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 16px;
    }
    .dialog h2 { margin: 0; font-size: 1.1rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: block; margin: 10px 0 5px; color: var(--muted); font-size: 0.84rem; font-weight: 700; }
    input[type="text"], input[type="date"], select, textarea, input[type="color"] {
      width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 9px 10px;
    }
    textarea { resize: vertical; min-height: 90px; }
    .status { margin-top: 10px; min-height: 20px; color: #065f46; font-size: 0.84rem; }
    @media (max-width: 980px) {
      .board { grid-template-columns: 1fr; }
      .col { min-height: auto; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="container">
    <div class="top">
      <div>
        <h1>📋 칸반 보드</h1>
        <p class="sub">To Do / In Progress / Done · 카드 편집 · 라벨/우선순위/기한 · JSON 백업</p>
      </div>
      <div class="actions">
        <button class="btn-primary" id="addCardBtn">카드 추가</button>
        <button class="btn-soft" id="exportBtn">JSON 내보내기</button>
        <button class="btn-soft" id="importBtn">JSON 가져오기</button>
        <button class="btn-ghost" id="resetBtn">전체 초기화</button>
        <input id="importFile" type="file" accept="application/json" style="display:none" />
      </div>
    </div>

    <div class="board" id="board"></div>
    <div class="status" id="status"></div>
  </div>

  <div class="modal" id="modal">
    <div class="dialog">
      <h2 id="modalTitle">카드 추가</h2>
      <div class="grid2">
        <div>
          <label for="fColumn">컬럼</label>
          <select id="fColumn">
            <option value="todo">To Do</option>
            <option value="inprogress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div>
          <label for="fPriority">우선순위</label>
          <select id="fPriority">
            <option value="low">낮음</option>
            <option value="medium" selected>보통</option>
            <option value="high">높음</option>
          </select>
        </div>
      </div>

      <label for="fTitle">제목</label>
      <input id="fTitle" type="text" maxlength="120" placeholder="예) 결제 모듈 예외 처리" />

      <label for="fDesc">설명</label>
      <textarea id="fDesc" maxlength="800" placeholder="상세 내용 (선택)"></textarea>

      <div class="grid2">
        <div>
          <label for="fLabel">라벨</label>
          <input id="fLabel" type="text" maxlength="24" placeholder="예) 백엔드" />
        </div>
        <div>
          <label for="fColor">라벨 색상</label>
          <input id="fColor" type="color" value="#2563eb" />
        </div>
      </div>

      <label for="fDue">기한</label>
      <input id="fDue" type="date" />

      <div class="actions" style="margin-top:12px;justify-content:flex-end">
        <button class="btn-ghost" id="cancelBtn">취소</button>
        <button class="btn-primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var LS_KEY = 'kanban-board-v3';
      var COLS = [
        { id: 'todo', title: 'To Do', color: 'var(--todo)' },
        { id: 'inprogress', title: 'In Progress', color: 'var(--prog)' },
        { id: 'done', title: 'Done', color: 'var(--done)' }
      ];

      var state = {
        todo: [],
        inprogress: [],
        done: []
      };

      var editCardId = null;
      var dragCardId = null;
      var dragFromCol = null;

      var board = document.getElementById('board');
      var statusEl = document.getElementById('status');
      var modal = document.getElementById('modal');

      function gid() {
        return 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }

      function save() {
        localStorage.setItem(LS_KEY, JSON.stringify(state));
      }

      function load() {
        try {
          var raw = localStorage.getItem(LS_KEY);
          if (!raw) return;
          var parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') {
            COLS.forEach(function (c) {
              if (Array.isArray(parsed[c.id])) state[c.id] = parsed[c.id];
            });
          }
        } catch (e) {}
      }

      function msg(text, isError) {
        statusEl.style.color = isError ? '#b91c1c' : '#065f46';
        statusEl.textContent = text;
      }

      function esc(s) {
        return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function priorityText(p) {
        if (p === 'high') return '높음';
        if (p === 'medium') return '보통';
        return '낮음';
      }

      function isOverdue(due) {
        if (!due) return false;
        var d = new Date(due + 'T23:59:59');
        return d < new Date();
      }

      function render() {
        board.innerHTML = COLS.map(function (col) {
          var cards = state[col.id] || [];
          return [
            '<section class="col" data-col="' + col.id + '">',
            '<div class="col-head">',
            '<div><span class="dot" style="background:' + col.color + '"></span><strong>' + col.title + '</strong></div>',
            '<span class="count">' + cards.length + '개</span>',
            '</div>',
            '<div class="cards" data-col="' + col.id + '">',
            cards.length ? cards.map(function (card) { return cardHtml(card, col.id); }).join('') : '<div class="empty">카드를 드래그하거나 새로 추가하세요.</div>',
            '</div>',
            '</section>'
          ].join('');
        }).join('');
      }

      function cardHtml(card, colId) {
        var overdueClass = isOverdue(card.dueDate) ? ' overdue' : '';
        var pClass = 'priority-' + (card.priority || 'medium');

        return [
          '<article class="card" draggable="true" data-card="' + esc(card.id) + '" data-col="' + colId + '">',
          '<div class="card-top">',
          '<span class="label"><i style="background:' + esc(card.labelColor || '#64748b') + '"></i>' + esc(card.label || '라벨 없음') + '</span>',
          '<div class="card-btns">',
          '<button class="icon-btn" data-act="edit" data-card="' + esc(card.id) + '">수정</button>',
          '<button class="icon-btn" data-act="del" data-card="' + esc(card.id) + '">삭제</button>',
          '</div>',
          '</div>',
          '<div class="title">' + esc(card.title) + '</div>',
          card.desc ? '<div class="desc">' + esc(card.desc) + '</div>' : '',
          '<div class="meta">',
          '<span class="badge ' + pClass + '">우선순위: ' + priorityText(card.priority) + '</span>',
          '<span class="badge' + overdueClass + '">기한: ' + (card.dueDate ? esc(card.dueDate) : '없음') + '</span>',
          '</div>',
          '</article>'
        ].join('');
      }

      function openModal(editCard, colId) {
        document.getElementById('modalTitle').textContent = editCard ? '카드 수정' : '카드 추가';
        editCardId = editCard ? editCard.id : null;
        document.getElementById('fColumn').value = colId || 'todo';
        document.getElementById('fTitle').value = editCard ? editCard.title : '';
        document.getElementById('fDesc').value = editCard ? editCard.desc : '';
        document.getElementById('fLabel').value = editCard ? editCard.label : '';
        document.getElementById('fColor').value = editCard ? (editCard.labelColor || '#2563eb') : '#2563eb';
        document.getElementById('fPriority').value = editCard ? (editCard.priority || 'medium') : 'medium';
        document.getElementById('fDue').value = editCard ? (editCard.dueDate || '') : '';
        modal.classList.add('open');
      }

      function closeModal() {
        modal.classList.remove('open');
      }

      function findCard(cardId) {
        for (var i = 0; i < COLS.length; i += 1) {
          var colId = COLS[i].id;
          var idx = state[colId].findIndex(function (c) { return c.id === cardId; });
          if (idx !== -1) {
            return { colId: colId, idx: idx, card: state[colId][idx] };
          }
        }
        return null;
      }

      function saveCard() {
        var targetCol = document.getElementById('fColumn').value;
        var title = document.getElementById('fTitle').value.trim();
        var desc = document.getElementById('fDesc').value.trim();
        var label = document.getElementById('fLabel').value.trim();
        var labelColor = document.getElementById('fColor').value;
        var priority = document.getElementById('fPriority').value;
        var dueDate = document.getElementById('fDue').value;

        if (!title) {
          msg('제목을 입력하세요.', true);
          return;
        }

        if (editCardId) {
          var found = findCard(editCardId);
          if (!found) return;

          var updated = {
            id: found.card.id,
            title: title,
            desc: desc,
            label: label,
            labelColor: labelColor,
            priority: priority,
            dueDate: dueDate,
            updatedAt: new Date().toISOString()
          };

          state[found.colId].splice(found.idx, 1);
          state[targetCol].push(updated);
          msg('카드를 수정했습니다.', false);
        } else {
          state[targetCol].push({
            id: gid(),
            title: title,
            desc: desc,
            label: label,
            labelColor: labelColor,
            priority: priority,
            dueDate: dueDate,
            createdAt: new Date().toISOString()
          });
          msg('카드를 추가했습니다.', false);
        }

        save();
        render();
        closeModal();
      }

      function deleteCard(cardId) {
        var found = findCard(cardId);
        if (!found) return;
        if (!confirm('카드를 삭제할까요?')) return;
        state[found.colId].splice(found.idx, 1);
        save();
        render();
        msg('카드를 삭제했습니다.', false);
      }

      function moveCard(cardId, fromCol, toCol, beforeCardId) {
        if (!cardId || !fromCol || !toCol) return;
        var fromArr = state[fromCol];
        var idx = fromArr.findIndex(function (c) { return c.id === cardId; });
        if (idx === -1) return;
        var card = fromArr.splice(idx, 1)[0];

        var toArr = state[toCol];
        if (beforeCardId) {
          var targetIdx = toArr.findIndex(function (c) { return c.id === beforeCardId; });
          if (targetIdx >= 0) toArr.splice(targetIdx, 0, card);
          else toArr.push(card);
        } else {
          toArr.push(card);
        }

        save();
        render();
      }

      function setupDnD() {
        board.addEventListener('dragstart', function (e) {
          var card = e.target.closest('.card');
          if (!card) return;
          dragCardId = card.getAttribute('data-card');
          dragFromCol = card.getAttribute('data-col');
          card.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', dragCardId || '');
        });

        board.addEventListener('dragend', function (e) {
          var card = e.target.closest('.card');
          if (card) card.classList.remove('dragging');
          dragCardId = null;
          dragFromCol = null;
          Array.prototype.forEach.call(document.querySelectorAll('.col.drag-over'), function (c) {
            c.classList.remove('drag-over');
          });
        });

        board.addEventListener('dragover', function (e) {
          var col = e.target.closest('.col');
          if (!col) return;
          e.preventDefault();
          col.classList.add('drag-over');
        });

        board.addEventListener('dragleave', function (e) {
          var col = e.target.closest('.col');
          if (!col) return;
          if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
        });

        board.addEventListener('drop', function (e) {
          var col = e.target.closest('.cards');
          if (!col) return;
          e.preventDefault();
          var toCol = col.getAttribute('data-col');
          var beforeCard = e.target.closest('.card');
          var beforeId = beforeCard ? beforeCard.getAttribute('data-card') : null;
          moveCard(dragCardId, dragFromCol, toCol, beforeId);
        });
      }

      function exportJson() {
        var data = JSON.stringify(state, null, 2);
        var blob = new Blob([data], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'kanban-board-' + new Date().toISOString().slice(0, 10) + '.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        msg('JSON을 내보냈습니다.', false);
      }

      function importJson(file) {
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var parsed = JSON.parse(reader.result);
            var next = { todo: [], inprogress: [], done: [] };
            COLS.forEach(function (col) {
              var arr = Array.isArray(parsed[col.id]) ? parsed[col.id] : [];
              next[col.id] = arr.map(function (c) {
                return {
                  id: c.id || gid(),
                  title: String(c.title || '').slice(0, 120),
                  desc: String(c.desc || '').slice(0, 800),
                  label: String(c.label || '').slice(0, 24),
                  labelColor: /^#[0-9a-fA-F]{6}$/.test(c.labelColor || '') ? c.labelColor : '#2563eb',
                  priority: c.priority === 'high' || c.priority === 'low' ? c.priority : 'medium',
                  dueDate: /^\d{4}-\d{2}-\d{2}$/.test(c.dueDate || '') ? c.dueDate : '',
                  createdAt: c.createdAt || new Date().toISOString(),
                  updatedAt: c.updatedAt || ''
                };
              });
            });
            state = next;
            save();
            render();
            msg('JSON 가져오기를 완료했습니다.', false);
          } catch (e) {
            msg('가져오기에 실패했습니다. 올바른 JSON 파일인지 확인하세요.', true);
          }
        };
        reader.readAsText(file, 'utf-8');
      }

      function bind() {
        document.getElementById('addCardBtn').addEventListener('click', function () {
          openModal(null, 'todo');
        });

        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        document.getElementById('saveBtn').addEventListener('click', saveCard);

        document.getElementById('exportBtn').addEventListener('click', exportJson);
        document.getElementById('importBtn').addEventListener('click', function () {
          document.getElementById('importFile').click();
        });
        document.getElementById('importFile').addEventListener('change', function (e) {
          var file = e.target.files && e.target.files[0];
          if (file) importJson(file);
          e.target.value = '';
        });

        document.getElementById('resetBtn').addEventListener('click', function () {
          if (!confirm('모든 카드를 초기화할까요?')) return;
          state = { todo: [], inprogress: [], done: [] };
          save();
          render();
          msg('전체 초기화 완료', false);
        });

        board.addEventListener('click', function (e) {
          var btn = e.target.closest('button[data-act]');
          if (!btn) return;
          var act = btn.getAttribute('data-act');
          var cardId = btn.getAttribute('data-card');
          if (act === 'del') {
            deleteCard(cardId);
          } else if (act === 'edit') {
            var found = findCard(cardId);
            if (found) openModal(found.card, found.colId);
          }
        });

        modal.addEventListener('click', function (e) {
          if (e.target === modal) closeModal();
        });
      }

      load();
      render();
      bind();
      setupDnD();
      msg('준비 완료', false);
    })();
  </script>
</body>
</html>
