<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한/영 자판 전환 복원기</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #11112a;
      --panel-2: #171735;
      --text: #e8ecff;
      --muted: #9aa3d8;
      --neon: #00f5ff;
      --neon-2: #9d4dff;
      --ok: #39ff88;
      --danger: #ff5d8f;
      --border: #2a2a52;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, rgba(157, 77, 255, 0.18), transparent 45%),
                  radial-gradient(circle at bottom left, rgba(0, 245, 255, 0.15), transparent 40%),
                  var(--bg);
      color: var(--text);
      padding: 20px 14px 40px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(165deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(3px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 2.5vw, 1.7rem);
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    .pane {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #b9c2ff;
      font-size: 0.9rem;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      resize: vertical;
      border: 1px solid #323268;
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      padding: 12px;
      font-size: 15px;
      line-height: 1.55;
      outline: none;
    }

    textarea:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0,245,255,0.15);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0;
    }

    button {
      border: 1px solid #36408b;
      background: #1b2050;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.92rem;
      transition: 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--neon);
    }

    button.primary {
      background: linear-gradient(90deg, rgba(0,245,255,0.18), rgba(157,77,255,0.22));
      border-color: #46d9ff;
      box-shadow: 0 0 16px rgba(0,245,255,0.18);
    }

    .status {
      margin-top: 12px;
      font-size: 0.88rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.03);
    }

    .ok { color: var(--ok); }
    .danger { color: var(--danger); }

    @media (min-width: 760px) {
      .grid { grid-template-columns: 1fr 1fr; }
      textarea { min-height: 280px; }
    }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>한/영 자판 전환 복원기</h1>
      <p class="sub">
        비밀번호 입력창이나 메신저에서 <strong>영문 상태로 한글을 치거나</strong>, 반대로 <strong>한글 상태로 영문을 친 문장</strong>을 복원합니다.
        입력 내용은 브라우저에 자동 저장됩니다.
      </p>

      <div class="controls">
        <button class="primary" id="autoBtn">자동 변환</button>
        <button id="enToKoBtn">EN → KO</button>
        <button id="koToEnBtn">KO → EN</button>
        <button id="swapBtn">입력/결과 교체</button>
        <button id="copyBtn">결과 복사</button>
        <button id="clearBtn">전체 지우기</button>
      </div>

      <div class="grid">
        <div class="pane">
          <div class="label"><span>입력</span><span id="inCount">0자</span></div>
          <textarea id="input" placeholder="예) dkssudgktpdy → 안녕하세요"></textarea>
        </div>
        <div class="pane">
          <div class="label"><span>변환 결과</span><span id="outCount">0자</span></div>
          <textarea id="output" readonly placeholder="변환 버튼을 눌러주세요"></textarea>
        </div>
      </div>

      <div class="status">
        <span class="chip" id="modeChip">모드: 자동</span>
        <span class="chip" id="saveChip">저장 상태: 대기</span>
        <span class="chip" id="hintChip">팁: Shift 포함 입력도 인식</span>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = 'keyboard-layout-switcher-v1';

      const inputEl = document.getElementById('input');
      const outputEl = document.getElementById('output');
      const inCountEl = document.getElementById('inCount');
      const outCountEl = document.getElementById('outCount');
      const modeChip = document.getElementById('modeChip');
      const saveChip = document.getElementById('saveChip');

      const keyToJamo = {
        r:'ㄱ', R:'ㄲ', s:'ㄴ', e:'ㄷ', E:'ㄸ', f:'ㄹ', a:'ㅁ', q:'ㅂ', Q:'ㅃ', t:'ㅅ', T:'ㅆ', d:'ㅇ',
        w:'ㅈ', W:'ㅉ', c:'ㅊ', z:'ㅋ', x:'ㅌ', v:'ㅍ', g:'ㅎ',
        k:'ㅏ', o:'ㅐ', i:'ㅑ', O:'ㅒ', j:'ㅓ', p:'ㅔ', u:'ㅕ', P:'ㅖ', h:'ㅗ', y:'ㅛ', n:'ㅜ', b:'ㅠ', m:'ㅡ', l:'ㅣ'
      };

      const jamoToKey = {
        'ㄱ':'r','ㄲ':'R','ㄴ':'s','ㄷ':'e','ㄸ':'E','ㄹ':'f','ㅁ':'a','ㅂ':'q','ㅃ':'Q','ㅅ':'t','ㅆ':'T','ㅇ':'d',
        'ㅈ':'w','ㅉ':'W','ㅊ':'c','ㅋ':'z','ㅌ':'x','ㅍ':'v','ㅎ':'g',
        'ㅏ':'k','ㅐ':'o','ㅑ':'i','ㅒ':'O','ㅓ':'j','ㅔ':'p','ㅕ':'u','ㅖ':'P','ㅗ':'h','ㅛ':'y','ㅜ':'n','ㅠ':'b','ㅡ':'m','ㅣ':'l',
        'ㅘ':'hk','ㅙ':'ho','ㅚ':'hl','ㅝ':'nj','ㅞ':'np','ㅟ':'nl','ㅢ':'ml',
        'ㄳ':'rt','ㄵ':'sw','ㄶ':'sg','ㄺ':'fr','ㄻ':'fa','ㄼ':'fq','ㄽ':'ft','ㄾ':'fx','ㄿ':'fv','ㅀ':'fg','ㅄ':'qt'
      };

      const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
      const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
      const JONG = ['', 'ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

      const CHO_INDEX = Object.fromEntries(CHO.map((c, i) => [c, i]));
      const JUNG_INDEX = Object.fromEntries(JUNG.map((c, i) => [c, i]));
      const JONG_INDEX = Object.fromEntries(JONG.map((c, i) => [c, i]));

      const COMBINE_VOWEL = {
        'ㅗㅏ':'ㅘ','ㅗㅐ':'ㅙ','ㅗㅣ':'ㅚ',
        'ㅜㅓ':'ㅝ','ㅜㅔ':'ㅞ','ㅜㅣ':'ㅟ',
        'ㅡㅣ':'ㅢ'
      };

      const COMBINE_FINAL = {
        'ㄱㅅ':'ㄳ','ㄴㅈ':'ㄵ','ㄴㅎ':'ㄶ','ㄹㄱ':'ㄺ','ㄹㅁ':'ㄻ',
        'ㄹㅂ':'ㄼ','ㄹㅅ':'ㄽ','ㄹㅌ':'ㄾ','ㄹㅍ':'ㄿ','ㄹㅎ':'ㅀ','ㅂㅅ':'ㅄ'
      };

      const isConsonant = ch => CHO.includes(ch) || ['ㄳ','ㄵ','ㄶ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅄ'].includes(ch);
      const isVowel = ch => JUNG.includes(ch);
      const isHangulSyllable = ch => /[가-힣]/.test(ch);
      const isJamo = ch => /[ㄱ-ㅎㅏ-ㅣ]/.test(ch);

      function splitFinal(final) {
        const reverse = {
          'ㄳ':['ㄱ','ㅅ'], 'ㄵ':['ㄴ','ㅈ'], 'ㄶ':['ㄴ','ㅎ'], 'ㄺ':['ㄹ','ㄱ'], 'ㄻ':['ㄹ','ㅁ'],
          'ㄼ':['ㄹ','ㅂ'], 'ㄽ':['ㄹ','ㅅ'], 'ㄾ':['ㄹ','ㅌ'], 'ㄿ':['ㄹ','ㅍ'], 'ㅀ':['ㄹ','ㅎ'], 'ㅄ':['ㅂ','ㅅ']
        };
        return reverse[final] || [final];
      }

      function decomposeHangul(ch) {
        const code = ch.charCodeAt(0);
        if (code < 0xAC00 || code > 0xD7A3) return null;
        const sIndex = code - 0xAC00;
        const l = Math.floor(sIndex / (21 * 28));
        const v = Math.floor((sIndex % (21 * 28)) / 28);
        const t = sIndex % 28;
        return { cho: CHO[l], jung: JUNG[v], jong: JONG[t] };
      }

      function composeSyllable(cho, jung, jong = '') {
        if (CHO_INDEX[cho] == null || JUNG_INDEX[jung] == null) return cho + jung + jong;
        const l = CHO_INDEX[cho];
        const v = JUNG_INDEX[jung];
        const t = JONG_INDEX[jong] || 0;
        return String.fromCharCode(0xAC00 + (l * 21 + v) * 28 + t);
      }

      function parseVowel(jamos, i) {
        let v = jamos[i];
        if (!isVowel(v)) return [null, i];
        if (i + 1 < jamos.length) {
          const pair = v + jamos[i + 1];
          if (COMBINE_VOWEL[pair]) {
            return [COMBINE_VOWEL[pair], i + 2];
          }
        }
        return [v, i + 1];
      }

      function enToKo(text) {
        const jamos = [];
        for (const ch of text) {
          jamos.push(keyToJamo[ch] || ch);
        }

        let out = '';
        let i = 0;

        while (i < jamos.length) {
          const cur = jamos[i];

          if (!isConsonant(cur) && !isVowel(cur)) {
            out += cur;
            i += 1;
            continue;
          }

          let cho = null;
          let jung = null;
          let jong = '';

          if (isConsonant(cur) && i + 1 < jamos.length && isVowel(jamos[i + 1])) {
            cho = cur;
            [jung, i] = parseVowel(jamos, i + 1);
          } else if (isVowel(cur)) {
            cho = 'ㅇ';
            [jung, i] = parseVowel(jamos, i);
          } else {
            out += cur;
            i += 1;
            continue;
          }

          if (!jung) {
            out += cho || '';
            continue;
          }

          if (i < jamos.length && isConsonant(jamos[i])) {
            const c1 = jamos[i];
            const hasVowelAfterC1 = i + 1 < jamos.length && isVowel(jamos[i + 1]);

            if (!hasVowelAfterC1) {
              jong = c1;
              i += 1;

              if (i < jamos.length && isConsonant(jamos[i])) {
                const pair = jong + jamos[i];
                const canCombine = COMBINE_FINAL[pair];
                const hasVowelAfterC2 = i + 1 < jamos.length && isVowel(jamos[i + 1]);
                if (canCombine && !hasVowelAfterC2) {
                  jong = canCombine;
                  i += 1;
                }
              }
            }
          }

          out += composeSyllable(cho, jung, jong);
        }

        return out;
      }

      function koToEn(text) {
        let out = '';

        for (const ch of text) {
          if (isHangulSyllable(ch)) {
            const d = decomposeHangul(ch);
            if (!d) {
              out += ch;
              continue;
            }
            out += (jamoToKey[d.cho] || d.cho);
            out += (jamoToKey[d.jung] || d.jung);
            if (d.jong) {
              out += (jamoToKey[d.jong] || splitFinal(d.jong).map(x => jamoToKey[x] || x).join(''));
            }
          } else if (isJamo(ch)) {
            out += (jamoToKey[ch] || ch);
          } else {
            out += ch;
          }
        }

        return out;
      }

      function detectMode(text) {
        const latin = (text.match(/[A-Za-z]/g) || []).length;
        const hangul = (text.match(/[가-힣ㄱ-ㅎㅏ-ㅣ]/g) || []).length;
        return latin >= hangul ? 'en2ko' : 'ko2en';
      }

      function setCounts() {
        inCountEl.textContent = `${inputEl.value.length}자`;
        outCountEl.textContent = `${outputEl.value.length}자`;
      }

      function setSaveStatus(msg, ok = true) {
        saveChip.textContent = `저장 상태: ${msg}`;
        saveChip.classList.toggle('ok', ok);
        saveChip.classList.toggle('danger', !ok);
      }

      function saveState(mode = '자동') {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            input: inputEl.value,
            output: outputEl.value,
            mode,
            ts: Date.now()
          }));
          setSaveStatus('저장됨', true);
        } catch {
          setSaveStatus('저장 실패', false);
        }
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          inputEl.value = data.input || '';
          outputEl.value = data.output || '';
          modeChip.textContent = `모드: ${data.mode || '자동'}`;
          setSaveStatus('복원됨', true);
        } catch {
          setSaveStatus('복원 실패', false);
        }
      }

      function run(mode) {
        const src = inputEl.value || '';
        let finalMode = mode;

        if (mode === 'auto') {
          finalMode = detectMode(src);
        }

        if (finalMode === 'en2ko') {
          outputEl.value = enToKo(src);
          modeChip.textContent = '모드: EN → KO';
          saveState('EN → KO');
        } else {
          outputEl.value = koToEn(src);
          modeChip.textContent = '모드: KO → EN';
          saveState('KO → EN');
        }

        setCounts();
      }

      document.getElementById('autoBtn').addEventListener('click', () => run('auto'));
      document.getElementById('enToKoBtn').addEventListener('click', () => run('en2ko'));
      document.getElementById('koToEnBtn').addEventListener('click', () => run('ko2en'));

      document.getElementById('swapBtn').addEventListener('click', () => {
        const t = inputEl.value;
        inputEl.value = outputEl.value;
        outputEl.value = t;
        setCounts();
        saveState('입력/결과 교체');
      });

      document.getElementById('copyBtn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(outputEl.value);
          setSaveStatus('복사 완료', true);
        } catch {
          setSaveStatus('복사 실패', false);
        }
      });

      document.getElementById('clearBtn').addEventListener('click', () => {
        inputEl.value = '';
        outputEl.value = '';
        setCounts();
        saveState('초기화');
      });

      inputEl.addEventListener('input', () => {
        setCounts();
        saveState('입력 중');
      });

      loadState();
      setCounts();
    })();
  </script>
</body>
</html>
