<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국어 조사 도우미</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #11132a;
      --panel-2: #161937;
      --text: #e9ecff;
      --muted: #98a0cc;
      --neon: #00f5d4;
      --neon-2: #7c4dff;
      --danger: #ff6b8a;
      --line: #2a2f5d;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: radial-gradient(1200px 800px at 80% -10%, #1e1f4a 0%, var(--bg) 45%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
    }

    .wrap {
      width: min(980px, 94vw);
      margin: 24px auto 36px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: linear-gradient(145deg, rgba(22,25,55,.95), rgba(16,18,40,.95));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 0 0 1px rgba(124, 77, 255, .15) inset, 0 14px 24px rgba(0, 0, 0, .28);
    }

    h1 {
      font-size: clamp(1.35rem, 2.4vw, 1.9rem);
      margin: 0 0 6px;
      letter-spacing: .2px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 860px) {
      .grid { grid-template-columns: 1.05fr .95fr; }
    }

    label {
      display: block;
      font-size: .92rem;
      margin-bottom: 6px;
      color: #cfd5ff;
    }

    input, select, textarea, button {
      font: inherit;
      color: inherit;
    }

    input, select, textarea {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 10px;
      padding: 11px 12px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--neon-2);
      box-shadow: 0 0 0 3px rgba(124, 77, 255, .2);
    }

    textarea { min-height: 142px; resize: vertical; }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 620px) {
      .row-2 { grid-template-columns: 1.2fr .8fr; }
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(0,245,212,.13), rgba(124,77,255,.16));
      border-radius: 10px;
      padding: 10px 13px;
      cursor: pointer;
      transition: transform .08s ease, border-color .2s ease, opacity .2s ease;
    }

    button:hover { border-color: var(--neon); }
    button:active { transform: translateY(1px); }

    .ghost {
      background: #13162f;
      border-color: #2a305f;
    }

    .danger {
      color: #ffdbe4;
      border-color: #553045;
      background: rgba(255, 107, 138, .12);
    }

    .output {
      background: #0f1229;
      border: 1px dashed #33408d;
      border-radius: 10px;
      padding: 10px 12px;
      min-height: 56px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 1.02rem;
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 9px;
    }

    .chip {
      border: 1px solid #35568d;
      background: rgba(0, 245, 212, .08);
      color: #cbfff7;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .84rem;
      cursor: pointer;
      user-select: none;
    }

    .muted { color: var(--muted); font-size: .9rem; }

    .footer {
      color: #8d95c4;
      font-size: .82rem;
      text-align: center;
      margin-top: 2px;
    }

    .ok { color: #9fffe8; }
    .warn { color: #ffd3df; }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>한국어 조사 도우미</h1>
      <p class="sub">단어의 <strong>받침 유무</strong>를 자동 판별해서 조사를 붙여드립니다. (은/는, 이/가, 을/를, 과/와, 으로/로 등)</p>
    </section>

    <section class="grid">
      <article class="card">
        <div class="row row-2">
          <div>
            <label for="word">단어 입력</label>
            <input id="word" type="text" placeholder="예: 사과, 집, 바늘, AI" autocomplete="off" />
          </div>
          <div>
            <label for="pair">조사 쌍 선택</label>
            <select id="pair">
              <option value="은/는">은 / 는</option>
              <option value="이/가">이 / 가</option>
              <option value="을/를">을 / 를</option>
              <option value="과/와">과 / 와</option>
              <option value="으로/로">으로 / 로</option>
              <option value="이에요/예요">이에요 / 예요</option>
              <option value="이다/다">이다 / 다</option>
            </select>
          </div>
        </div>

        <div class="btns">
          <button id="applyBtn">단일 적용</button>
          <button class="ghost" id="copySingleBtn">결과 복사</button>
        </div>

        <p class="muted" style="margin:11px 0 6px;">단일 결과</p>
        <div id="singleOutput" class="output">여기에 결과가 표시됩니다.</div>

        <p class="muted" style="margin:14px 0 6px;">최근 사용 (탭하여 재적용)</p>
        <div id="history" class="chip-wrap"></div>
      </article>

      <article class="card">
        <label for="batch">일괄 처리 (줄바꿈으로 여러 단어 입력)</label>
        <textarea id="batch" placeholder="예:\n사과\n집\n연필\n서울"></textarea>

        <div class="btns">
          <button id="batchBtn">일괄 적용</button>
          <button class="ghost" id="copyBatchBtn">일괄 결과 복사</button>
          <button class="danger" id="clearBtn">입력/기록 초기화</button>
        </div>

        <p class="muted" style="margin:11px 0 6px;">일괄 결과</p>
        <div id="batchOutput" class="output">여기에 여러 줄 결과가 표시됩니다.</div>
        <p id="status" class="muted" style="margin:10px 0 0;"></p>
      </article>
    </section>

    <p class="footer">오프라인 동작 · 입력 상태는 브라우저 localStorage에 자동 저장됩니다.</p>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const els = {
      word: $("word"),
      pair: $("pair"),
      batch: $("batch"),
      singleOutput: $("singleOutput"),
      batchOutput: $("batchOutput"),
      history: $("history"),
      status: $("status")
    };

    const STATE_KEY = "koreanJosaHelperStateV1";
    const HISTORY_KEY = "koreanJosaHelperHistoryV1";

    let history = [];

    function getLastMeaningfulChar(text = "") {
      const cleaned = (text || "").trim().replace(/[\s\]\[(){}<>"'`~!@#$%^&*_=+|\\;:,./?]+$/g, "");
      return cleaned ? cleaned[cleaned.length - 1] : "";
    }

    function getJongseongIndex(char) {
      const code = char.charCodeAt(0);
      if (code < 0xac00 || code > 0xd7a3) return null;
      return (code - 0xac00) % 28;
    }

    function hasBatchim(word) {
      const last = getLastMeaningfulChar(word);
      if (!last) return false;
      const jong = getJongseongIndex(last);
      if (jong === null) {
        return /[0-9bcdfghjklmnpqrstvwxyz]$/i.test(word.trim());
      }
      return jong !== 0;
    }

    function pickParticle(word, pair) {
      const [first, second] = pair.split("/");
      const last = getLastMeaningfulChar(word);
      if (!last) return "";

      const jong = getJongseongIndex(last);
      const batchim = hasBatchim(word);

      if (pair === "으로/로") {
        if (jong !== null) {
          if (jong === 0 || jong === 8) return second;
          return first;
        }
        return batchim ? first : second;
      }

      return batchim ? first : second;
    }

    function applyToWord(word, pair) {
      const w = (word || "").trim();
      if (!w) return "";
      return w + pickParticle(w, pair);
    }

    function renderHistory() {
      els.history.innerHTML = "";
      if (!history.length) {
        els.history.innerHTML = '<span class="muted">아직 기록이 없습니다.</span>';
        return;
      }
      history.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.type = "button";
        btn.textContent = `${item.word} + ${item.pair}`;
        btn.addEventListener("click", () => {
          els.word.value = item.word;
          els.pair.value = item.pair;
          runSingle();
        });
        els.history.appendChild(btn);
      });
    }

    function updateStatus(message, type = "ok") {
      els.status.textContent = message;
      els.status.className = type === "warn" ? "muted warn" : "muted ok";
    }

    function saveState() {
      const state = {
        word: els.word.value,
        pair: els.pair.value,
        batch: els.batch.value
      };
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function loadState() {
      try {
        const state = JSON.parse(localStorage.getItem(STATE_KEY) || "{}");
        els.word.value = state.word || "";
        els.pair.value = state.pair || "은/는";
        els.batch.value = state.batch || "";

        history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        if (!Array.isArray(history)) history = [];
      } catch {
        history = [];
      }
      renderHistory();
    }

    function pushHistory(word, pair) {
      const key = `${word}__${pair}`;
      history = [{ word, pair, key }, ...history.filter(h => h.key !== key)].slice(0, 16);
      renderHistory();
      saveState();
    }

    function runSingle() {
      const word = els.word.value.trim();
      const pair = els.pair.value;
      if (!word) {
        els.singleOutput.textContent = "단어를 먼저 입력해주세요.";
        updateStatus("단어가 비어 있어요. 입력 후 다시 시도해주세요.", "warn");
        return;
      }

      const out = applyToWord(word, pair);
      els.singleOutput.textContent = out;
      pushHistory(word, pair);
      updateStatus("단일 적용 완료", "ok");
    }

    function runBatch() {
      const pair = els.pair.value;
      const lines = els.batch.value
        .split(/\r?\n/)
        .map(v => v.trim())
        .filter(Boolean);

      if (!lines.length) {
        els.batchOutput.textContent = "일괄 입력란에 단어를 한 줄씩 입력해주세요.";
        updateStatus("일괄 입력이 비어 있어요.", "warn");
        return;
      }

      const result = lines.map(word => applyToWord(word, pair)).join("\n");
      els.batchOutput.textContent = result;
      updateStatus(`일괄 적용 완료 (${lines.length}개)`, "ok");
      saveState();
    }

    async function copyText(text) {
      if (!text || text.includes("표시됩니다") || text.includes("입력해주세요")) {
        updateStatus("복사할 유효한 결과가 없습니다.", "warn");
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        updateStatus("클립보드에 복사했어요.", "ok");
      } catch {
        updateStatus("복사에 실패했어요. 브라우저 권한을 확인해주세요.", "warn");
      }
    }

    $("applyBtn").addEventListener("click", runSingle);
    $("batchBtn").addEventListener("click", runBatch);
    $("copySingleBtn").addEventListener("click", () => copyText(els.singleOutput.textContent));
    $("copyBatchBtn").addEventListener("click", () => copyText(els.batchOutput.textContent));

    $("clearBtn").addEventListener("click", () => {
      if (!confirm("입력값과 최근 사용 기록을 모두 초기화할까요?")) return;
      els.word.value = "";
      els.batch.value = "";
      els.singleOutput.textContent = "여기에 결과가 표시됩니다.";
      els.batchOutput.textContent = "여기에 여러 줄 결과가 표시됩니다.";
      history = [];
      renderHistory();
      localStorage.removeItem(STATE_KEY);
      localStorage.removeItem(HISTORY_KEY);
      updateStatus("초기화를 완료했습니다.", "ok");
    });

    ["input", "change"].forEach(evt => {
      els.word.addEventListener(evt, saveState);
      els.pair.addEventListener(evt, saveState);
      els.batch.addEventListener(evt, saveState);
    });

    loadState();
    if (els.word.value.trim()) runSingle();
  </script>
</body>
</html>
