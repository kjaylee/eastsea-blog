<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한글 로마자 변환기</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --line: #2a2a4f;
      --text: #e8ecff;
      --muted: #9aa3c7;
      --neon: #00f5ff;
      --neon2: #ff38b8;
      --ok: #5cff95;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 10% -20%, #1a1a45 0%, var(--bg) 45%), var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap {
      width: min(980px, 94vw);
      margin: 24px auto 48px;
    }
    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .badge {
      font-size: 12px;
      border: 1px solid var(--neon);
      color: var(--neon);
      border-radius: 999px;
      padding: 4px 10px;
      box-shadow: 0 0 14px rgba(0,245,255,.25);
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 32px);
      letter-spacing: 0.2px;
    }
    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 840px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.02), transparent 20%), var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 12px 34px rgba(0,0,0,.35);
    }
    .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid #313160;
      background: #0f0f25;
      color: var(--text);
      padding: 12px;
      font-size: 15px;
      outline: none;
      transition: .2s;
    }
    textarea:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0,245,255,.16);
    }
    .controls {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
      align-items: center;
    }
    .row label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--neon2);
    }
    select, button {
      border-radius: 10px;
      border: 1px solid #3b3b6f;
      background: #101030;
      color: var(--text);
      font-size: 14px;
      padding: 9px 11px;
    }
    button {
      cursor: pointer;
      background: linear-gradient(120deg, rgba(0,245,255,.16), rgba(255,56,184,.16));
      border-color: #4b4b82;
      font-weight: 600;
    }
    button:hover { border-color: var(--neon); }
    .result {
      min-height: 120px;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0d0d22;
      border: 1px solid #30305b;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--ok);
      margin-top: 8px;
      min-height: 16px;
    }
    .history {
      margin-top: 12px;
      border-top: 1px dashed #2e2e56;
      padding-top: 10px;
    }
    .history h3 {
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .history ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }
    .history button {
      width: 100%;
      text-align: left;
      border: 1px solid #2f2f55;
      background: #0f0f26;
      padding: 8px 10px;
      font-weight: 500;
    }
    .history small {
      color: var(--muted);
      display: block;
      margin-top: 4px;
      font-weight: 400;
    }
    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }
    .neon { color: var(--neon); }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="title">
      <span class="badge">UTILITY</span>
      <h1>한글 로마자 변환기</h1>
    </div>
    <p class="sub">한글 문장을 로마자로 빠르게 변환합니다. 입력값·옵션·최근 기록은 기기에 저장됩니다.</p>

    <section class="grid">
      <article class="card">
        <div class="label">원문 입력</div>
        <textarea id="source" placeholder="예) 오늘은 바람이 정말 시원하네요."></textarea>

        <div class="controls">
          <div class="row">
            <label><input id="uppercase" type="checkbox" /> 대문자 변환</label>
            <label><input id="spaceHyphen" type="checkbox" /> 공백을 하이픈(-)으로</label>
          </div>
          <div class="row">
            <label for="mode">받침 처리</label>
            <select id="mode">
              <option value="revised">표준형(권장)</option>
              <option value="simple">간략형(읽기 쉬움)</option>
            </select>
            <button id="clearBtn" type="button">입력 지우기</button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="label">로마자 결과</div>
        <div id="result" class="result"></div>
        <div class="row" style="margin-top:10px">
          <button id="copyBtn" type="button">결과 복사</button>
          <button id="saveBtn" type="button">기록 저장</button>
        </div>
        <div id="status" class="pill"></div>

        <div class="history">
          <h3>최근 기록 (최대 8개)</h3>
          <ul id="historyList"></ul>
        </div>
      </article>
    </section>

    <p class="footer">테마: <span class="neon">#0a0a1a</span> · 오프라인 동작 · localStorage 저장</p>
  </main>

  <script>
    const KEY = 'koreanRomanizationHelperState_v1';

    const L = ['g','kk','n','d','tt','r','m','b','pp','s','ss','','j','jj','ch','k','t','p','h'];
    const V = ['a','ae','ya','yae','eo','e','yeo','ye','o','wa','wae','oe','yo','u','wo','we','wi','yu','eu','ui','i'];
    const T_REVISED = ['', 'k','k','ks','n','nj','nh','t','l','lk','lm','lb','ls','lt','lp','lh','m','p','ps','t','t','ng','t','t','k','t','p','h'];
    const T_SIMPLE  = ['', 'k','k','k','n','n','n','t','l','lk','lm','lb','ls','lt','lp','l','m','p','p','t','t','ng','t','t','k','t','p','h'];

    const source = document.getElementById('source');
    const uppercase = document.getElementById('uppercase');
    const spaceHyphen = document.getElementById('spaceHyphen');
    const mode = document.getElementById('mode');
    const result = document.getElementById('result');
    const status = document.getElementById('status');
    const historyList = document.getElementById('historyList');

    function romanizeHangulChar(ch) {
      const code = ch.charCodeAt(0);
      if (code < 0xAC00 || code > 0xD7A3) return ch;

      const index = code - 0xAC00;
      const l = Math.floor(index / 588);
      const v = Math.floor((index % 588) / 28);
      const t = index % 28;

      const tailMap = mode.value === 'simple' ? T_SIMPLE : T_REVISED;
      return L[l] + V[v] + tailMap[t];
    }

    function romanize(text) {
      let out = '';
      for (const ch of text) out += romanizeHangulChar(ch);
      if (spaceHyphen.checked) out = out.replace(/\s+/g, '-');
      if (uppercase.checked) out = out.toUpperCase();
      return out;
    }

    function saveState() {
      const state = loadState();
      state.input = source.value;
      state.uppercase = uppercase.checked;
      state.spaceHyphen = spaceHyphen.checked;
      state.mode = mode.value;
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(KEY)) || { input: '', uppercase: false, spaceHyphen: false, mode: 'revised', history: [] };
      } catch {
        return { input: '', uppercase: false, spaceHyphen: false, mode: 'revised', history: [] };
      }
    }

    function render() {
      const output = romanize(source.value);
      result.textContent = output || '여기에 변환 결과가 표시됩니다.';
      saveState();
    }

    function flash(msg, ok = true) {
      status.textContent = msg;
      status.style.color = ok ? 'var(--ok)' : '#ff8aa8';
      clearTimeout(flash.t);
      flash.t = setTimeout(() => status.textContent = '', 1800);
    }

    function renderHistory() {
      const { history = [] } = loadState();
      historyList.innerHTML = '';
      if (!history.length) {
        const li = document.createElement('li');
        li.innerHTML = '<small>아직 저장된 기록이 없습니다.</small>';
        historyList.appendChild(li);
        return;
      }

      history.forEach((item, idx) => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.innerHTML = `<div>${item.output.slice(0, 80) || '(빈 결과)'}</div><small>${item.time}</small>`;
        btn.addEventListener('click', () => {
          source.value = item.input;
          render();
          flash(`${idx + 1}번 기록을 불러왔습니다.`);
        });
        li.appendChild(btn);
        historyList.appendChild(li);
      });
    }

    function pushHistory() {
      const state = loadState();
      const output = romanize(source.value).trim();
      if (!source.value.trim()) return flash('입력 문장을 먼저 작성해 주세요.', false);
      const entry = {
        input: source.value,
        output,
        time: new Date().toLocaleString('ko-KR', { hour12: false })
      };
      state.history = [entry, ...(state.history || [])].slice(0, 8);
      localStorage.setItem(KEY, JSON.stringify(state));
      renderHistory();
      flash('기록에 저장했습니다.');
    }

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const text = result.textContent === '여기에 변환 결과가 표시됩니다.' ? '' : result.textContent;
      if (!text.trim()) return flash('복사할 결과가 없습니다.', false);
      try {
        await navigator.clipboard.writeText(text);
        flash('결과를 클립보드에 복사했습니다.');
      } catch {
        flash('복사에 실패했습니다. 브라우저 권한을 확인해 주세요.', false);
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      source.value = '';
      render();
      flash('입력을 지웠습니다.');
    });

    document.getElementById('saveBtn').addEventListener('click', pushHistory);

    [source, uppercase, spaceHyphen, mode].forEach(el => el.addEventListener('input', render));
    [uppercase, spaceHyphen, mode].forEach(el => el.addEventListener('change', render));

    (function init() {
      const state = loadState();
      source.value = state.input || '';
      uppercase.checked = !!state.uppercase;
      spaceHyphen.checked = !!state.spaceHyphen;
      mode.value = state.mode || 'revised';
      render();
      renderHistory();
    })();
  </script>
</body>
</html>
