<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Response Time ROI Calculator | 리드 응답속도 ROI 계산기</title>
  <meta name="description" content="리드 응답 시간을 단축했을 때 전환율 개선, 추가 수주, 추가 이익, ROI, 회수기간을 계산하는 세일즈 ROI 도구" />
  <style>
    :root{--bg:#081124;--card:#101e3b;--line:#29406b;--txt:#edf3ff;--muted:#a8bbdd;--pri:#6f8fff;--ok:#34d399;--warn:#fbbf24;--bad:#fca5a5}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:var(--txt);background:radial-gradient(circle at 85% -10%,#25407a 0,#081124 52%)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 60px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.25rem,3vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .portal{white-space:nowrap;text-decoration:none;color:#dbe7ff;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#101a32}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px}
    .card{background:linear-gradient(160deg,#172a50,#101d38);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1831;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5c77ea);font-weight:700}
    .soft{background:#172750;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:104px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f2b3a;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0f1934;border-radius:11px;padding:10px}
    .k{font-size:.75rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:#132246;color:#bed0f1;font-size:.76rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .ok{color:var(--ok)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>⚡ 리드 응답속도 ROI 계산기</h1>
        <div class="sub">리드 응답시간 단축이 전환율과 매출총이익에 주는 영향을 계산해, 세일즈 자동화/인력 투자 타당성을 빠르게 검토합니다.</div>
      </div>
      <a class="portal" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="monthlyLeads">월 리드 수</label><input id="monthlyLeads" type="number" min="1" value="1200" /></div>
          <div><label for="currentResponse">현재 평균 응답시간 (분)</label><input id="currentResponse" type="number" min="1" value="90" /></div>
          <div><label for="targetResponse">목표 응답시간 (분)</label><input id="targetResponse" type="number" min="0" value="20" /></div>
          <div><label for="currentConversion">현재 전환율 (%)</label><input id="currentConversion" type="number" min="0.1" max="100" step="0.1" value="8" /></div>
          <div><label for="upliftPer10">10분 단축당 전환율 개선 (%)</label><input id="upliftPer10" type="number" min="0" step="0.1" value="3" /></div>
          <div><label for="avgDeal">평균 계약금액 (KRW)</label><input id="avgDeal" type="number" min="1" value="1600000" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="0.1" max="100" step="0.1" value="45" /></div>
          <div><label for="setupCost">초기 도입비 (KRW)</label><input id="setupCost" type="number" min="0" value="18000000" /></div>
          <div><label for="monthlyCost">월 운영비 (KRW)</label><input id="monthlyCost" type="number" min="0" value="1500000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 지표</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">개선 후 전환율</div><div id="improvedConversion" class="v sm">-</div></div>
          <div class="kpi"><div class="k">추가 수주 (월)</div><div id="incrementalDeals" class="v sm">-</div></div>
          <div class="kpi"><div class="k">추가 이익 (월)</div><div id="incrementalMonthlyProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">추가 이익 (연)</div><div id="incrementalAnnualProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI (1년)</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">성과 해석 대기</div>

        <h2 style="margin-top:12px">계산 근거</h2>
        <table>
          <tbody>
            <tr><th>현재 수주 (월)</th><td id="currentDeals">-</td></tr>
            <tr><th>개선 후 수주 (월)</th><td id="improvedDeals">-</td></tr>
            <tr><th>시간 단축 (분)</th><td id="timeReduction">-</td></tr>
            <tr><th>연간 비용 (초기+운영)</th><td id="annualCost">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      monthlyLeads: $("monthlyLeads"), currentResponse: $("currentResponse"), targetResponse: $("targetResponse"),
      currentConversion: $("currentConversion"), upliftPer10: $("upliftPer10"), avgDeal: $("avgDeal"), margin: $("margin"), setupCost: $("setupCost"), monthlyCost: $("monthlyCost"),
      improvedConversion: $("improvedConversion"), incrementalDeals: $("incrementalDeals"), incrementalMonthlyProfit: $("incrementalMonthlyProfit"), incrementalAnnualProfit: $("incrementalAnnualProfit"), roi: $("roi"), payback: $("payback"),
      currentDeals: $("currentDeals"), improvedDeals: $("improvedDeals"), timeReduction: $("timeReduction"), annualCost: $("annualCost"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = {
      monthlyLeads: 1200, currentResponse: 90, targetResponse: 20, currentConversion: 8,
      upliftPer10: 3, avgDeal: 1600000, margin: 45, setupCost: 18000000, monthlyCost: 1500000
    };

    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v) {
      if (!Number.isFinite(v.monthlyLeads) || v.monthlyLeads <= 0) return "월 리드 수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.currentResponse) || v.currentResponse <= 0) return "현재 응답시간은 0보다 커야 합니다.";
      if (!Number.isFinite(v.targetResponse) || v.targetResponse < 0) return "목표 응답시간은 0 이상이어야 합니다.";
      if (v.targetResponse >= v.currentResponse) return "목표 응답시간은 현재 응답시간보다 작아야 합니다.";
      if (!Number.isFinite(v.currentConversion) || v.currentConversion <= 0 || v.currentConversion > 100) return "현재 전환율은 0~100 범위(0 제외)여야 합니다.";
      if (!Number.isFinite(v.upliftPer10) || v.upliftPer10 < 0) return "10분 단축당 개선율은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.avgDeal) || v.avgDeal <= 0) return "평균 계약금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return "이익률은 0~100 범위(0 제외)여야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "초기 도입비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.monthlyCost) || v.monthlyCost < 0) return "월 운영비는 0 이상이어야 합니다.";
      return "";
    }

    function compute(v) {
      const timeReduction = v.currentResponse - v.targetResponse;
      const upliftMultiplier = 1 + (timeReduction / 10) * (v.upliftPer10 / 100);
      const improvedConversion = Math.min(100, v.currentConversion * upliftMultiplier);

      const currentDeals = v.monthlyLeads * (v.currentConversion / 100);
      const improvedDeals = v.monthlyLeads * (improvedConversion / 100);
      const incrementalDeals = improvedDeals - currentDeals;

      const incrementalMonthlyProfit = incrementalDeals * v.avgDeal * (v.margin / 100);
      const incrementalAnnualProfit = incrementalMonthlyProfit * 12;
      const annualCost = v.setupCost + (v.monthlyCost * 12);
      const annualNet = incrementalAnnualProfit - annualCost;
      const roi = annualCost === 0 ? Infinity : (annualNet / annualCost) * 100;

      const monthlyNetAfterCost = incrementalMonthlyProfit - v.monthlyCost;
      const paybackMonths = monthlyNetAfterCost > 0
        ? (v.setupCost / monthlyNetAfterCost)
        : null;

      return {
        timeReduction,
        improvedConversion,
        currentDeals,
        improvedDeals,
        incrementalDeals,
        incrementalMonthlyProfit,
        incrementalAnnualProfit,
        annualCost,
        annualNet,
        roi,
        paybackMonths
      };
    }

    function clearOutputs() {
      ["improvedConversion", "incrementalDeals", "incrementalMonthlyProfit", "incrementalAnnualProfit", "roi", "payback", "currentDeals", "improvedDeals", "timeReduction", "annualCost"].forEach((k) => refs[k].textContent = "-");
      refs.summary.value = "";
      refs.status.textContent = "입력값을 확인하세요";
    }

    function render() {
      const v = {
        monthlyLeads: Number(refs.monthlyLeads.value),
        currentResponse: Number(refs.currentResponse.value),
        targetResponse: Number(refs.targetResponse.value),
        currentConversion: Number(refs.currentConversion.value),
        upliftPer10: Number(refs.upliftPer10.value),
        avgDeal: Number(refs.avgDeal.value),
        margin: Number(refs.margin.value),
        setupCost: Number(refs.setupCost.value),
        monthlyCost: Number(refs.monthlyCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err) {
        clearOutputs();
        return;
      }

      const r = compute(v);
      refs.improvedConversion.textContent = `${num(r.improvedConversion, 2)}%`;
      refs.incrementalDeals.textContent = `${num(r.incrementalDeals, 2)}건`;
      refs.incrementalMonthlyProfit.textContent = money(r.incrementalMonthlyProfit);
      refs.incrementalAnnualProfit.textContent = money(r.incrementalAnnualProfit);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi, 1)}%` : "∞";
      refs.payback.textContent = r.paybackMonths === null ? "회수 불가" : `${num(r.paybackMonths, 1)}개월`;

      refs.currentDeals.textContent = `${num(r.currentDeals, 2)}건`;
      refs.improvedDeals.textContent = `${num(r.improvedDeals, 2)}건`;
      refs.timeReduction.textContent = `${num(r.timeReduction, 0)}분`;
      refs.annualCost.textContent = money(r.annualCost);

      if (r.roi >= 40) {
        refs.status.innerHTML = `<span class="ok">●</span> ROI ${num(r.roi,1)}% (우선 투자 권장)`;
      } else if (r.roi >= 0) {
        refs.status.innerHTML = `<span class="warn">●</span> ROI ${num(r.roi,1)}% (운영비 최적화 권장)`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> ROI ${num(r.roi,1)}% (가정 재검토 필요)`;
      }

      refs.summary.value = [
        "[Lead Response Time ROI 요약]",
        `응답시간 단축: ${num(r.timeReduction,0)}분`,
        `전환율: ${num(v.currentConversion,2)}% → ${num(r.improvedConversion,2)}%`,
        `추가 수주(월): ${num(r.incrementalDeals,2)}건`,
        `추가 이익(월): ${money(r.incrementalMonthlyProfit)}`,
        `추가 이익(연): ${money(r.incrementalAnnualProfit)}`,
        `ROI(1년): ${Number.isFinite(r.roi) ? num(r.roi,1)+'%' : '∞'}`,
        `회수기간: ${r.paybackMonths === null ? '회수 불가' : num(r.paybackMonths,1)+'개월'}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert("요약이 복사되었습니다.");
      } catch {
        alert("복사 권한이 없어 수동 복사가 필요합니다.");
      }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.monthlyLeads, refs.currentResponse, refs.targetResponse, refs.currentConversion, refs.upliftPer10, refs.avgDeal, refs.margin, refs.setupCost, refs.monthlyCost]
      .forEach((el) => {
        el.addEventListener("input", render);
        el.addEventListener("change", render);
      });

    render();
  </script>
</body>
</html>
