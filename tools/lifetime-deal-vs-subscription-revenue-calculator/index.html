<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lifetime Deal vs Subscription Revenue Calculator | LTD vs 구독 수익 비교 계산기</title>
  <meta name="description" content="LTD 일시결제와 월 구독 모델의 매출·총이익·손익분기 유지개월을 비교하는 수익화 계산기" />
  <style>
    :root{--bg:#0d1324;--card:#15213b;--line:#2a3e65;--txt:#e6eeff;--muted:#a7badf;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 0% 0%,#244b86 0%,var(--bg) 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#1b335a;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#1a3158,#121f38);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1b32;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#23426f;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10203a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1d3a63;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">♾️ LTD vs 구독 수익 비교 계산기</h1>
        <div class="sub" id="subtitle">일시결제(Lifetime Deal)와 월 구독 모델의 실질 총이익과 역전 유지개월을 비교합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_customers" for="customers"></label><input id="customers" type="number" min="1" step="1" value="1000"></div>
          <div><label id="l_ltdPrice" for="ltdPrice"></label><input id="ltdPrice" type="number" min="0" step="1000" value="179000"></div>
          <div><label id="l_subPrice" for="subPrice"></label><input id="subPrice" type="number" min="0" step="100" value="19000"></div>
          <div><label id="l_retentionMonths" for="retentionMonths"></label><input id="retentionMonths" type="number" min="1" step="1" value="14"></div>
          <div><label id="l_refundRate" for="refundRate"></label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="4"></div>
          <div><label id="l_feeRate" for="feeRate"></label><input id="feeRate" type="number" min="0" max="100" step="0.1" value="3.2"></div>
          <div><label id="l_variableCost" for="variableCost"></label><input id="variableCost" type="number" min="0" max="100" step="0.1" value="18"></div>
          <div><label id="l_cac" for="cac"></label><input id="cac" type="number" min="0" step="100" value="42000"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_ltdNetRevenue"></div><div class="v" id="ltdNetRevenue">-</div></div>
          <div class="kpi"><div class="k" id="k_subNetRevenue"></div><div class="v" id="subNetRevenue">-</div></div>
          <div class="kpi"><div class="k" id="k_ltdProfit"></div><div class="v" id="ltdProfit">-</div></div>
          <div class="kpi"><div class="k" id="k_subProfit"></div><div class="v" id="subProfit">-</div></div>
          <div class="kpi"><div class="k" id="k_profitDelta"></div><div class="v" id="profitDelta">-</div></div>
          <div class="kpi"><div class="k" id="k_breakEvenMonths"></div><div class="v" id="breakEvenMonths">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_totalCAC"></th><td id="totalCAC">-</td></tr>
          <tr><th id="d_ltdVariableCost"></th><td id="ltdVariableCost">-</td></tr>
          <tr><th id="d_subVariableCost"></th><td id="subVariableCost">-</td></tr>
          <tr><th id="d_subMonthlyContribution"></th><td id="subMonthlyContribution">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={customers:$("customers"),ltdPrice:$("ltdPrice"),subPrice:$("subPrice"),retentionMonths:$("retentionMonths"),refundRate:$("refundRate"),feeRate:$("feeRate"),variableCost:$("variableCost"),cac:$("cac"),ltdNetRevenue:$("ltdNetRevenue"),subNetRevenue:$("subNetRevenue"),ltdProfit:$("ltdProfit"),subProfit:$("subProfit"),profitDelta:$("profitDelta"),breakEvenMonths:$("breakEvenMonths"),totalCAC:$("totalCAC"),ltdVariableCost:$("ltdVariableCost"),subVariableCost:$("subVariableCost"),subMonthlyContribution:$("subMonthlyContribution"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={customers:1000,ltdPrice:179000,subPrice:19000,retentionMonths:14,refundRate:4,feeRate:3.2,variableCost:18,cac:42000};
    const I18N={
      ko:{title:"♾️ LTD vs 구독 수익 비교 계산기",subtitle:"일시결제(Lifetime Deal)와 월 구독 모델의 실질 총이익과 역전 유지개월을 비교합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_customers:"신규 고객 수 (코호트)",l_ltdPrice:"LTD 판매가 (₩)",l_subPrice:"월 구독료 (₩)",l_retentionMonths:"평균 유지 개월 수",l_refundRate:"환불률 (%)",l_feeRate:"결제 수수료율 (%)",l_variableCost:"변동원가율 (%)",l_cac:"고객당 CAC (₩)",k_ltdNetRevenue:"LTD 순매출",k_subNetRevenue:"구독 누적 순매출",k_ltdProfit:"LTD 총이익",k_subProfit:"구독 총이익",k_profitDelta:"구독 - LTD 총이익 차이",k_breakEvenMonths:"구독 역전 유지개월",d_totalCAC:"총 CAC",d_ltdVariableCost:"LTD 변동원가",d_subVariableCost:"구독 변동원가",d_subMonthlyContribution:"구독 월 공헌이익/고객",okSub:"해당 가정에서는 구독 모델 총이익이 더 높습니다",okLtd:"해당 가정에서는 LTD 모델 총이익이 더 높습니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"고객/가격/개월은 0 초과(또는 CAC는 0 이상)여야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[LTD vs 구독 수익 요약]",months:"개월"},
      en:{title:"♾️ Lifetime Deal vs Subscription Revenue Calculator",subtitle:"Compare real revenue and gross profit between one-time LTD pricing and recurring subscription.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_customers:"New customers in cohort",l_ltdPrice:"LTD price (KRW)",l_subPrice:"Monthly subscription price (KRW)",l_retentionMonths:"Average retention months",l_refundRate:"Refund rate (%)",l_feeRate:"Payment fee rate (%)",l_variableCost:"Variable cost ratio (%)",l_cac:"CAC per customer (KRW)",k_ltdNetRevenue:"LTD net revenue",k_subNetRevenue:"Subscription cumulative net revenue",k_ltdProfit:"LTD gross profit",k_subProfit:"Subscription gross profit",k_profitDelta:"Profit delta (Sub - LTD)",k_breakEvenMonths:"Break-even retention months",d_totalCAC:"Total CAC",d_ltdVariableCost:"LTD variable cost",d_subVariableCost:"Subscription variable cost",d_subMonthlyContribution:"Monthly contribution / subscriber",okSub:"Subscription model yields higher gross profit under current assumptions",okLtd:"LTD model yields higher gross profit under current assumptions",invalid:"Please review inputs",rangeErr:"Rate fields must be between 0 and 100.",numErr:"Customers/prices/months must be > 0 (CAC can be 0).",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[LTD vs Subscription Summary]",months:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["customers","ltdPrice","subPrice","retentionMonths","refundRate","feeRate","variableCost","cac"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["ltdNetRevenue","subNetRevenue","ltdProfit","subProfit","profitDelta","breakEvenMonths"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["totalCAC","ltdVariableCost","subVariableCost","subMonthlyContribution"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if([v.refundRate,v.feeRate,v.variableCost].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(!Number.isFinite(v.customers)||v.customers<=0||!Number.isFinite(v.ltdPrice)||v.ltdPrice<=0||!Number.isFinite(v.subPrice)||v.subPrice<=0||!Number.isFinite(v.retentionMonths)||v.retentionMonths<=0||!Number.isFinite(v.cac)||v.cac<0) return t("numErr");
      return "";
    }

    function render(){
      const v={customers:Number(refs.customers.value),ltdPrice:Number(refs.ltdPrice.value),subPrice:Number(refs.subPrice.value),retentionMonths:Number(refs.retentionMonths.value),refundRate:Number(refs.refundRate.value),feeRate:Number(refs.feeRate.value),variableCost:Number(refs.variableCost.value),cac:Number(refs.cac.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["ltdNetRevenue","subNetRevenue","ltdProfit","subProfit","profitDelta","breakEvenMonths","totalCAC","ltdVariableCost","subVariableCost","subMonthlyContribution"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const netRate=(1-v.refundRate/100)*(1-v.feeRate/100);
      const varRate=v.variableCost/100;
      const totalCAC=v.customers*v.cac;

      const ltdGross=v.customers*v.ltdPrice;
      const ltdNetRevenue=ltdGross*netRate;
      const ltdVariableCost=ltdGross*varRate;
      const ltdProfit=ltdNetRevenue-ltdVariableCost-totalCAC;

      const subGross=v.customers*v.subPrice*v.retentionMonths;
      const subNetRevenue=subGross*netRate;
      const subVariableCost=subGross*varRate;
      const subProfit=subNetRevenue-subVariableCost-totalCAC;

      const profitDelta=subProfit-ltdProfit;
      const monthlyContributionPerSub=(v.subPrice*netRate)-(v.subPrice*varRate);
      const ltdContributionPerUser=(v.ltdPrice*netRate)-(v.ltdPrice*varRate);
      const breakEvenMonths=(monthlyContributionPerSub>0)?(ltdContributionPerUser/monthlyContributionPerSub):Infinity;

      refs.ltdNetRevenue.textContent=won(ltdNetRevenue);
      refs.subNetRevenue.textContent=won(subNetRevenue);
      refs.ltdProfit.textContent=won(ltdProfit);
      refs.subProfit.textContent=won(subProfit);
      refs.profitDelta.textContent=won(profitDelta);
      refs.breakEvenMonths.textContent=Number.isFinite(breakEvenMonths)?`${num(breakEvenMonths,1)} ${t("months")}`:t("na");

      refs.totalCAC.textContent=won(totalCAC);
      refs.ltdVariableCost.textContent=won(ltdVariableCost);
      refs.subVariableCost.textContent=won(subVariableCost);
      refs.subMonthlyContribution.textContent=won(monthlyContributionPerSub);

      refs.status.innerHTML=profitDelta>=0?`<span style="color:var(--good)">●</span> ${t("okSub")}`:`<span style="color:var(--warn)">●</span> ${t("okLtd")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_ltdProfit")}: ${won(ltdProfit)}`,`${t("k_subProfit")}: ${won(subProfit)}`,`${t("k_profitDelta")}: ${won(profitDelta)}`,`${t("k_breakEvenMonths")}: ${Number.isFinite(breakEvenMonths)?`${num(breakEvenMonths,1)} ${t("months")}`:t("na")}`,`${t("d_totalCAC")}: ${won(totalCAC)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.customers,refs.ltdPrice,refs.subPrice,refs.retentionMonths,refs.refundRate,refs.feeRate,refs.variableCost,refs.cac].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
