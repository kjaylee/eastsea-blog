<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Calculator | 대출 상환 계산기</title>
  <meta name="description" content="원금, 이자율, 기간을 입력해 월 납입금, 총이자, 상환 스케줄을 계산하는 대출 상환 계산기" />
  <style>
    :root {
      --bg: #0a0a1a;
      --card: #12122a;
      --card-soft: #181836;
      --text: #e8ecff;
      --muted: #9aa4d1;
      --neon: #33d6ff;
      --neon-2: #9b5cff;
      --ok: #33e5a5;
      --warn: #ff6b9f;
      --border: rgba(141, 159, 255, 0.25);
      --shadow: 0 0 0 1px rgba(51, 214, 255, 0.22), 0 12px 28px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(51, 214, 255, 0.18), transparent 60%),
        radial-gradient(1000px 500px at 100% 0%, rgba(155, 92, 255, 0.2), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.5;
      padding: 20px;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)), var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 1rem + 2vw, 2rem);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: #07101f;
      background: linear-gradient(90deg, var(--neon), #7ee8ff);
      box-shadow: 0 0 18px rgba(51, 214, 255, 0.5);
    }

    .sub {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 600px) {
      body { padding: 14px; }
      .panel { padding: 14px; border-radius: 14px; }
      .grid { grid-template-columns: 1fr; }
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.9rem;
      color: #b9c2ef;
    }

    input, select, button {
      border: 1px solid rgba(132, 153, 255, 0.35);
      background: var(--card-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.98rem;
      outline: none;
      width: 100%;
    }

    input:focus, select:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(51, 214, 255, 0.2);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 700px) {
      .actions { grid-template-columns: 1fr; }
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.12s ease, box-shadow 0.2s ease;
    }

    button:active { transform: translateY(1px) scale(0.998); }

    .btn-primary {
      border-color: rgba(51, 214, 255, 0.6);
      background: linear-gradient(90deg, rgba(51, 214, 255, 0.22), rgba(155, 92, 255, 0.25));
      box-shadow: 0 0 20px rgba(51, 214, 255, 0.22);
    }

    .btn-ghost { background: transparent; }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 760px) {
      .summary { grid-template-columns: 1fr; }
    }

    .metric {
      border: 1px solid rgba(155, 92, 255, 0.35);
      background: linear-gradient(180deg, rgba(155, 92, 255, 0.12), rgba(51, 214, 255, 0.06));
      border-radius: 12px;
      padding: 12px;
    }

    .metric h2 {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .metric p {
      margin: 6px 0 0;
      font-size: clamp(1.05rem, 0.8rem + 1vw, 1.45rem);
      font-weight: 800;
      letter-spacing: 0.01em;
      color: #f4f7ff;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .err {
      margin-top: 10px;
      color: #ffd8e6;
      background: rgba(255, 107, 159, 0.18);
      border: 1px solid rgba(255, 107, 159, 0.45);
      padding: 9px 10px;
      border-radius: 10px;
      display: none;
    }

    .table-wrap {
      margin-top: 14px;
      border: 1px solid rgba(132, 153, 255, 0.35);
      border-radius: 12px;
      overflow: auto;
      max-height: 420px;
      background: rgba(7, 10, 27, 0.65);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 680px;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(132, 153, 255, 0.18);
      text-align: right;
      white-space: nowrap;
    }

    th:first-child, td:first-child { text-align: center; }
    th:nth-child(2), td:nth-child(2) { text-align: center; }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #11142d;
      color: #d3dbff;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
    }

    tfoot td {
      background: #121736;
      font-weight: 700;
      color: #e6ecff;
    }

    .footer-note {
      color: var(--muted);
      font-size: 0.84rem;
      margin-top: 8px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 8px;
      user-select: none;
    }

    .toggle input { width: auto; margin: 0; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1><span class="badge">NEW</span> Loan Calculator</h1>
      <p class="sub">원금, 연이율, 상환기간을 기준으로 <strong>월 납입금</strong>, <strong>총 상환액</strong>, <strong>총 이자</strong>, 월별 상환 스케줄을 계산합니다.</p>
    </section>

    <section class="panel" aria-label="입력">
      <div class="grid">
        <div class="field">
          <label for="principal">원금 (₩)</label>
          <input id="principal" type="number" min="0" step="10000" inputmode="decimal" placeholder="예: 30000000" />
        </div>
        <div class="field">
          <label for="annualRate">연이율 (%)</label>
          <input id="annualRate" type="number" min="0" step="0.01" inputmode="decimal" placeholder="예: 4.2" />
        </div>
        <div class="field">
          <label for="years">상환 기간 (년)</label>
          <input id="years" type="number" min="1" max="50" step="1" inputmode="numeric" placeholder="예: 10" />
        </div>
        <div class="field">
          <label for="startDate">시작일</label>
          <input id="startDate" type="date" />
        </div>
      </div>

      <label class="toggle" for="soundEnabled">
        <input id="soundEnabled" type="checkbox" checked />
        계산 시 사운드 알림
      </label>

      <div class="actions">
        <button id="calcBtn" class="btn-primary" type="button">계산하기</button>
        <button id="csvBtn" class="btn-ghost" type="button">CSV 다운로드</button>
        <button id="resetBtn" class="btn-ghost" type="button">입력 초기화</button>
      </div>

      <div id="error" class="err" role="alert"></div>
    </section>

    <section class="panel" aria-label="결과">
      <div class="summary">
        <article class="metric">
          <h2>월 납입금</h2>
          <p id="monthlyPayment">-</p>
        </article>
        <article class="metric">
          <h2>총 이자</h2>
          <p id="totalInterest">-</p>
        </article>
        <article class="metric">
          <h2>총 상환액</h2>
          <p id="totalPaid">-</p>
        </article>
      </div>
      <div id="meta" class="meta">입력 후 계산하기를 눌러주세요.</div>

      <div class="table-wrap" aria-label="월별 상환표">
        <table>
          <thead>
            <tr>
              <th>회차</th>
              <th>납부일</th>
              <th>납입금</th>
              <th>원금</th>
              <th>이자</th>
              <th>잔액</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
          <tfoot>
            <tr>
              <td colspan="2">합계</td>
              <td id="sumPayment">-</td>
              <td id="sumPrincipal">-</td>
              <td id="sumInterest">-</td>
              <td>-</td>
            </tr>
          </tfoot>
        </table>
      </div>
      <p class="footer-note">※ 계산 결과는 참고용이며 실제 금융기관 산식/중도상환/수수료/세금 등에 따라 달라질 수 있습니다.</p>
    </section>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = 'loan-calculator-state-v1';

      const el = {
        principal: document.getElementById('principal'),
        annualRate: document.getElementById('annualRate'),
        years: document.getElementById('years'),
        startDate: document.getElementById('startDate'),
        soundEnabled: document.getElementById('soundEnabled'),
        calcBtn: document.getElementById('calcBtn'),
        csvBtn: document.getElementById('csvBtn'),
        resetBtn: document.getElementById('resetBtn'),
        error: document.getElementById('error'),
        monthlyPayment: document.getElementById('monthlyPayment'),
        totalInterest: document.getElementById('totalInterest'),
        totalPaid: document.getElementById('totalPaid'),
        meta: document.getElementById('meta'),
        scheduleBody: document.getElementById('scheduleBody'),
        sumPayment: document.getElementById('sumPayment'),
        sumPrincipal: document.getElementById('sumPrincipal'),
        sumInterest: document.getElementById('sumInterest')
      };

      let scheduleCache = [];
      let audioCtx;

      const fmtCurrency = (v) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(v);
      const fmtNum = (v) => new Intl.NumberFormat('ko-KR', { maximumFractionDigits: 0 }).format(v);

      function toNumber(value) {
        const n = Number(value);
        return Number.isFinite(n) ? n : NaN;
      }

      function monthShift(date, addMonths) {
        const d = new Date(date);
        d.setMonth(d.getMonth() + addMonths);
        return d;
      }

      function dateText(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }

      function showError(msg) {
        el.error.textContent = msg;
        el.error.style.display = msg ? 'block' : 'none';
      }

      function saveState() {
        const state = {
          principal: el.principal.value,
          annualRate: el.annualRate.value,
          years: el.years.value,
          startDate: el.startDate.value,
          soundEnabled: el.soundEnabled.checked
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) {
          const now = new Date();
          el.startDate.value = dateText(now);
          return;
        }
        try {
          const state = JSON.parse(saved);
          el.principal.value = state.principal ?? '';
          el.annualRate.value = state.annualRate ?? '';
          el.years.value = state.years ?? '';
          el.startDate.value = state.startDate || dateText(new Date());
          el.soundEnabled.checked = state.soundEnabled !== false;
        } catch {
          el.startDate.value = dateText(new Date());
        }
      }

      function clearResult() {
        el.monthlyPayment.textContent = '-';
        el.totalInterest.textContent = '-';
        el.totalPaid.textContent = '-';
        el.sumPayment.textContent = '-';
        el.sumPrincipal.textContent = '-';
        el.sumInterest.textContent = '-';
        el.meta.textContent = '입력 후 계산하기를 눌러주세요.';
        el.scheduleBody.innerHTML = '';
        scheduleCache = [];
      }

      function playTone(freq = 720, duration = 0.08) {
        if (!el.soundEnabled.checked) return;
        try {
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + duration + 0.02);
        } catch {
          // ignore audio errors silently
        }
      }

      function calcSchedule({ principal, annualRate, years, startDate }) {
        const months = Math.round(years * 12);
        const monthlyRate = annualRate / 100 / 12;

        const basePayment = monthlyRate === 0
          ? principal / months
          : principal * monthlyRate / (1 - Math.pow(1 + monthlyRate, -months));

        let balance = principal;
        let totalPayment = 0;
        let totalInterest = 0;
        let totalPrincipal = 0;
        const rows = [];

        for (let i = 1; i <= months; i += 1) {
          const interest = monthlyRate === 0 ? 0 : balance * monthlyRate;
          let principalPart = basePayment - interest;
          let payment = basePayment;

          if (i === months || principalPart > balance) {
            principalPart = balance;
            payment = principalPart + interest;
          }

          balance = Math.max(0, balance - principalPart);

          totalPayment += payment;
          totalInterest += interest;
          totalPrincipal += principalPart;

          rows.push({
            month: i,
            dueDate: dateText(monthShift(startDate, i - 1)),
            payment,
            principal: principalPart,
            interest,
            balance
          });
        }

        return {
          monthlyPayment: basePayment,
          totalPayment,
          totalInterest,
          totalPrincipal,
          months,
          rows
        };
      }

      function render(result) {
        el.monthlyPayment.textContent = fmtCurrency(result.monthlyPayment);
        el.totalInterest.textContent = fmtCurrency(result.totalInterest);
        el.totalPaid.textContent = fmtCurrency(result.totalPayment);

        el.sumPayment.textContent = fmtCurrency(result.totalPayment);
        el.sumPrincipal.textContent = fmtCurrency(result.totalPrincipal);
        el.sumInterest.textContent = fmtCurrency(result.totalInterest);

        el.meta.textContent = `${result.months}개월 상환 · 월 ${fmtCurrency(result.monthlyPayment)} · 총 이자 ${fmtNum(Math.round(result.totalInterest))}원`;

        const rowsHtml = result.rows.map((row) => `
          <tr>
            <td>${row.month}</td>
            <td>${row.dueDate}</td>
            <td>${fmtCurrency(row.payment)}</td>
            <td>${fmtCurrency(row.principal)}</td>
            <td>${fmtCurrency(row.interest)}</td>
            <td>${fmtCurrency(row.balance)}</td>
          </tr>
        `).join('');

        el.scheduleBody.innerHTML = rowsHtml;
      }

      function handleCalculate() {
        showError('');

        const principal = toNumber(el.principal.value);
        const annualRate = toNumber(el.annualRate.value);
        const years = toNumber(el.years.value);
        const startDateInput = el.startDate.value;

        if (!Number.isFinite(principal) || principal <= 0) {
          showError('원금을 0보다 큰 값으로 입력해 주세요.');
          playTone(220, 0.12);
          return;
        }
        if (!Number.isFinite(annualRate) || annualRate < 0 || annualRate > 100) {
          showError('연이율은 0~100 사이 숫자로 입력해 주세요.');
          playTone(220, 0.12);
          return;
        }
        if (!Number.isFinite(years) || years <= 0 || years > 50) {
          showError('상환 기간은 1~50년 범위로 입력해 주세요.');
          playTone(220, 0.12);
          return;
        }

        const startDate = startDateInput ? new Date(startDateInput) : new Date();
        if (Number.isNaN(startDate.getTime())) {
          showError('시작일 형식이 올바르지 않습니다.');
          playTone(220, 0.12);
          return;
        }

        const result = calcSchedule({ principal, annualRate, years, startDate });
        scheduleCache = result.rows;
        render(result);
        saveState();
        playTone(780, 0.08);
      }

      function downloadCSV() {
        if (!scheduleCache.length) {
          showError('먼저 계산을 실행해 주세요.');
          playTone(220, 0.12);
          return;
        }
        showError('');

        const header = ['회차', '납부일', '납입금', '원금', '이자', '잔액'];
        const lines = [header.join(',')];
        for (const row of scheduleCache) {
          lines.push([
            row.month,
            row.dueDate,
            Math.round(row.payment),
            Math.round(row.principal),
            Math.round(row.interest),
            Math.round(row.balance)
          ].join(','));
        }

        const blob = new Blob([`\ufeff${lines.join('\n')}`], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'loan-amortization-schedule.csv';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        playTone(640, 0.07);
      }

      function resetAll() {
        el.principal.value = '';
        el.annualRate.value = '';
        el.years.value = '';
        el.startDate.value = dateText(new Date());
        showError('');
        clearResult();
        saveState();
        playTone(380, 0.09);
      }

      [el.principal, el.annualRate, el.years, el.startDate, el.soundEnabled].forEach((node) => {
        node.addEventListener('change', saveState);
      });

      el.calcBtn.addEventListener('click', handleCalculate);
      el.csvBtn.addEventListener('click', downloadCSV);
      el.resetBtn.addEventListener('click', resetAll);

      loadState();
      clearResult();
    })();
  </script>
</body>
</html>
