<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가챠 루트 테이블 밸런스 시뮬레이터</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #10122b;
      --panel-2: #15183a;
      --text: #e8ecff;
      --muted: #9aa4d6;
      --neon: #00f5d4;
      --neon-2: #7c4dff;
      --danger: #ff4d8d;
      --line: #29305f;
      --ok: #39ffa1;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: radial-gradient(circle at top right, rgba(124,77,255,.16), transparent 34%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 0 0 1px rgba(0,245,212,.08), 0 12px 40px rgba(0,0,0,.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 2.4vw, 1.7rem);
      letter-spacing: .2px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: .93rem;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    label {
      display: block;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #0e1128;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: .95rem;
      outline: none;
      transition: .16s ease;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .82rem;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0,245,212,.13);
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      cursor: pointer;
      font-weight: 650;
    }

    .primary {
      background: linear-gradient(90deg, var(--neon), #00c2ff);
      color: #071122;
      border: 0;
    }

    .ghost {
      background: transparent;
      border: 1px solid var(--line);
    }

    .warn {
      border: 1px solid rgba(255,77,141,.5);
      color: #ffd7e8;
      background: rgba(255,77,141,.1);
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--line);
    }

    table {
      width: 100%;
      min-width: 700px;
      border-collapse: collapse;
      font-size: .9rem;
    }

    th, td {
      padding: 9px;
      border-bottom: 1px solid rgba(41,48,95,.7);
      text-align: left;
    }

    th {
      color: #adbbff;
      font-weight: 650;
      background: rgba(124,77,255,.08);
    }

    .row-actions {
      display: flex;
      gap: 6px;
    }

    .row-actions button {
      padding: 7px 8px;
      font-size: .8rem;
      border-radius: 8px;
    }

    .kpi {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .kpi-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px;
      background: rgba(10,13,34,.66);
    }

    .kpi-label {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--neon);
    }

    .bars {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .bar-line {
      display: grid;
      grid-template-columns: 120px 1fr 64px;
      align-items: center;
      gap: 8px;
      font-size: .86rem;
    }

    .bar-track {
      height: 10px;
      background: #0d1026;
      border-radius: 999px;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-2), var(--neon));
    }

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .hint { color: var(--muted); font-size: .82rem; margin-top: 8px; }

    @media (max-width: 920px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .kpi { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
      .kpi { grid-template-columns: 1fr; }
      .bar-line { grid-template-columns: 90px 1fr 54px; font-size: .8rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>🎯 가챠 루트 테이블 밸런스 시뮬레이터</h1>
      <p class="sub">게임 드랍/가챠 구성의 기대값과 희귀 아이템 체감 확률을 빠르게 검증합니다. 설정은 자동 저장됩니다.</p>
    </section>

    <section class="card">
      <div class="grid">
        <div>
          <label for="pulls">세션당 뽑기 횟수</label>
          <input id="pulls" type="number" min="1" max="5000" />
        </div>
        <div>
          <label for="runs">시뮬레이션 반복 수</label>
          <input id="runs" type="number" min="100" max="200000" step="100" />
        </div>
        <div>
          <label for="pityEvery">천장 간격 (0=사용 안함)</label>
          <input id="pityEvery" type="number" min="0" max="1000" />
        </div>
        <div>
          <label for="pityRarity">천장 최소 등급</label>
          <select id="pityRarity">
            <option value="희귀">희귀 이상</option>
            <option value="영웅">영웅 이상</option>
            <option value="전설">전설만</option>
          </select>
        </div>
      </div>
      <div class="btns">
        <button class="primary" id="runBtn">시뮬레이션 실행</button>
        <button class="ghost" id="addRowBtn">아이템 행 추가</button>
        <button class="warn" id="resetBtn">기본값 복원</button>
      </div>
      <p class="hint">팁: 반복 수를 높이면 결과가 안정화됩니다. (권장 3,000 이상)</p>
    </section>

    <section class="card">
      <h2>아이템 테이블</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>아이템명</th>
              <th>등급</th>
              <th>가중치</th>
              <th>가치(임의 점수)</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody id="itemBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>결과 요약</h2>
      <div class="kpi" id="kpi"></div>
      <div class="bars" id="rarityBars"></div>
      <h3 style="margin:14px 0 8px">아이템별 기대 획득량 (세션당)</h3>
      <textarea id="itemResult" readonly></textarea>
      <p class="hint">`가치`는 경제 밸런스 비교용 지표입니다. 실제 재화 가치와 1:1일 필요는 없습니다.</p>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'loot-table-balance-simulator-v1';
    const rarityRank = { 일반: 1, 희귀: 2, 영웅: 3, 전설: 4 };
    const rarityList = Object.keys(rarityRank);

    const defaults = {
      pulls: 50,
      runs: 5000,
      pityEvery: 0,
      pityRarity: '희귀',
      items: [
        { name: '골드 주머니', rarity: '일반', weight: 55, value: 10 },
        { name: '강화석', rarity: '일반', weight: 24, value: 16 },
        { name: '희귀 장비 상자', rarity: '희귀', weight: 13, value: 60 },
        { name: '영웅 스킬북', rarity: '영웅', weight: 6, value: 220 },
        { name: '전설 코어', rarity: '전설', weight: 2, value: 1200 }
      ]
    };

    let state = loadState();

    const pullsEl = document.getElementById('pulls');
    const runsEl = document.getElementById('runs');
    const pityEveryEl = document.getElementById('pityEvery');
    const pityRarityEl = document.getElementById('pityRarity');
    const itemBodyEl = document.getElementById('itemBody');
    const kpiEl = document.getElementById('kpi');
    const rarityBarsEl = document.getElementById('rarityBars');
    const itemResultEl = document.getElementById('itemResult');

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaults);
        const parsed = JSON.parse(raw);
        return {
          pulls: validNum(parsed.pulls, defaults.pulls),
          runs: validNum(parsed.runs, defaults.runs),
          pityEvery: validNum(parsed.pityEvery, defaults.pityEvery),
          pityRarity: rarityRank[parsed.pityRarity] ? parsed.pityRarity : defaults.pityRarity,
          items: Array.isArray(parsed.items) && parsed.items.length
            ? parsed.items.map(normalizeItem).filter(Boolean)
            : structuredClone(defaults.items)
        };
      } catch {
        return structuredClone(defaults);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function validNum(v, fallback) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function normalizeItem(item) {
      if (!item || typeof item !== 'object') return null;
      const rarity = rarityRank[item.rarity] ? item.rarity : '일반';
      const weight = Math.max(0, validNum(item.weight, 0));
      const value = Math.max(0, validNum(item.value, 0));
      const name = String(item.name || '').trim() || '새 아이템';
      return { name, rarity, weight, value };
    }

    function renderControls() {
      pullsEl.value = state.pulls;
      runsEl.value = state.runs;
      pityEveryEl.value = state.pityEvery;
      pityRarityEl.value = state.pityRarity;
    }

    function renderItems() {
      itemBodyEl.innerHTML = '';
      state.items.forEach((item, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input data-field="name" data-idx="${idx}" value="${escapeHtml(item.name)}" /></td>
          <td>
            <select data-field="rarity" data-idx="${idx}">
              ${rarityList.map(r => `<option value="${r}" ${item.rarity === r ? 'selected' : ''}>${r}</option>`).join('')}
            </select>
          </td>
          <td><input type="number" min="0" step="0.1" data-field="weight" data-idx="${idx}" value="${item.weight}" /></td>
          <td><input type="number" min="0" step="1" data-field="value" data-idx="${idx}" value="${item.value}" /></td>
          <td>
            <div class="row-actions">
              <button class="ghost" data-action="dup" data-idx="${idx}">복제</button>
              <button class="warn" data-action="del" data-idx="${idx}">삭제</button>
            </div>
          </td>
        `;
        itemBodyEl.appendChild(tr);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function pickWeighted(items) {
      const valid = items.filter(i => i.weight > 0);
      if (!valid.length) return null;
      const total = valid.reduce((sum, i) => sum + i.weight, 0);
      let r = Math.random() * total;
      for (const item of valid) {
        r -= item.weight;
        if (r <= 0) return item;
      }
      return valid[valid.length - 1];
    }

    function runSimulation() {
      const items = state.items.map(normalizeItem).filter(Boolean);
      if (!items.length) {
        alert('아이템을 최소 1개 이상 추가해 주세요.');
        return;
      }
      const pulls = Math.max(1, Math.floor(validNum(state.pulls, 50)));
      const runs = Math.max(100, Math.floor(validNum(state.runs, 5000)));
      const pityEvery = Math.max(0, Math.floor(validNum(state.pityEvery, 0)));
      const pityRarity = state.pityRarity;

      const itemHits = Object.fromEntries(items.map(i => [i.name, 0]));
      const rarityHits = Object.fromEntries(rarityList.map(r => [r, 0]));
      let totalValue = 0;
      let runsWithLegend = 0;

      const pityPool = items.filter(i => rarityRank[i.rarity] >= rarityRank[pityRarity]);

      for (let s = 0; s < runs; s++) {
        let legendInRun = false;
        for (let p = 1; p <= pulls; p++) {
          const pool = (pityEvery > 0 && p % pityEvery === 0 && pityPool.length) ? pityPool : items;
          const got = pickWeighted(pool);
          if (!got) continue;
          itemHits[got.name] = (itemHits[got.name] || 0) + 1;
          rarityHits[got.rarity] = (rarityHits[got.rarity] || 0) + 1;
          totalValue += got.value;
          if (got.rarity === '전설') legendInRun = true;
        }
        if (legendInRun) runsWithLegend++;
      }

      const totalPulls = pulls * runs;
      const avgValuePerRun = totalValue / runs;
      const avgValuePerPull = totalValue / totalPulls;
      const legendRunRate = (runsWithLegend / runs) * 100;
      const pityApplied = pityEvery > 0 ? `${pityEvery}회마다 ${pityRarity}+` : '미사용';

      const kpis = [
        ['총 샘플 뽑기', totalPulls.toLocaleString() + '회'],
        ['세션당 평균 가치', avgValuePerRun.toFixed(2)],
        ['1회 뽑기 기대 가치', avgValuePerPull.toFixed(3)],
        ['전설 1개 이상 세션 비율', legendRunRate.toFixed(2) + '%'],
        ['천장 설정', pityApplied]
      ];

      kpiEl.innerHTML = kpis.map(([label, value]) => `
        <div class="kpi-item">
          <div class="kpi-label">${label}</div>
          <div class="kpi-value">${value}</div>
        </div>
      `).join('');

      const rarityTotal = Object.values(rarityHits).reduce((a, b) => a + b, 0) || 1;
      rarityBarsEl.innerHTML = rarityList.map(r => {
        const rate = (rarityHits[r] / rarityTotal) * 100;
        return `
          <div class="bar-line">
            <span>${r}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${rate.toFixed(2)}%"></div></div>
            <span class="mono">${rate.toFixed(2)}%</span>
          </div>
        `;
      }).join('');

      const lines = items
        .map(i => {
          const count = itemHits[i.name] || 0;
          const avg = count / runs;
          const rate = (count / totalPulls) * 100;
          return `${i.name.padEnd(14, ' ')} | 세션당 ${avg.toFixed(3)}개 | 비율 ${rate.toFixed(3)}%`;
        })
        .join('\n');

      itemResultEl.value = lines;
    }

    function syncStateFromControl() {
      state.pulls = Math.max(1, Math.floor(validNum(pullsEl.value, 50)));
      state.runs = Math.max(100, Math.floor(validNum(runsEl.value, 5000)));
      state.pityEvery = Math.max(0, Math.floor(validNum(pityEveryEl.value, 0)));
      state.pityRarity = rarityRank[pityRarityEl.value] ? pityRarityEl.value : '희귀';
      saveState();
    }

    function addItem() {
      state.items.push({ name: '새 아이템', rarity: '희귀', weight: 1, value: 100 });
      saveState();
      renderItems();
    }

    function resetAll() {
      if (!confirm('기본값으로 복원할까요? 현재 설정은 덮어씁니다.')) return;
      state = structuredClone(defaults);
      saveState();
      renderControls();
      renderItems();
      runSimulation();
    }

    itemBodyEl.addEventListener('input', (e) => {
      const idx = Number(e.target.dataset.idx);
      const field = e.target.dataset.field;
      if (!Number.isInteger(idx) || !field || !state.items[idx]) return;
      if (field === 'name') state.items[idx].name = e.target.value.trim() || '새 아이템';
      if (field === 'rarity') state.items[idx].rarity = rarityRank[e.target.value] ? e.target.value : '일반';
      if (field === 'weight') state.items[idx].weight = Math.max(0, validNum(e.target.value, 0));
      if (field === 'value') state.items[idx].value = Math.max(0, validNum(e.target.value, 0));
      saveState();
    });

    itemBodyEl.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const idx = Number(btn.dataset.idx);
      if (!Number.isInteger(idx) || !state.items[idx]) return;

      if (btn.dataset.action === 'del') {
        if (state.items.length === 1) {
          alert('아이템은 최소 1개 필요합니다.');
          return;
        }
        state.items.splice(idx, 1);
      }

      if (btn.dataset.action === 'dup') {
        const src = state.items[idx];
        state.items.splice(idx + 1, 0, { ...src, name: src.name + ' 복제' });
      }

      saveState();
      renderItems();
    });

    [pullsEl, runsEl, pityEveryEl, pityRarityEl].forEach(el => {
      el.addEventListener('change', () => {
        syncStateFromControl();
      });
    });

    document.getElementById('runBtn').addEventListener('click', () => {
      syncStateFromControl();
      runSimulation();
    });

    document.getElementById('addRowBtn').addEventListener('click', addItem);
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    renderControls();
    renderItems();
    runSimulation();
  </script>
</body>
</html>
