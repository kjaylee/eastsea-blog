<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Lorem Ipsum Studio - Generate polished placeholder text for UI/UX, docs, and mockups. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>Lorem Ipsum Studio</title>
  <style>
    :root{--bg:#0e1020;--panel:#171b33;--line:#2d355c;--txt:#ecf0ff;--muted:#a8b2dc;--acc:#6d87ff;--acc2:#3ad0b0;--radius:14px}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;padding:16px;font-family:Inter,Pretendard,system-ui,sans-serif;color:var(--txt);background:radial-gradient(circle at 10% 10%,rgba(109,135,255,.2),transparent 35%),var(--bg)}
    .wrap{max-width:1080px;margin:0 auto;display:grid;grid-template-columns:340px 1fr;gap:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
    h1{margin:0 0 4px;font-size:1.25rem}.muted{color:var(--muted);font-size:.9rem}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;background:#0b1126;border:1px solid #34406c;border-radius:10px;color:var(--txt);padding:8px}
    textarea{height:430px;resize:vertical;line-height:1.65}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stack>*+*{margin-top:10px}
    .btns{display:flex;gap:8px;flex-wrap:wrap}
    button{border:0;border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:700;background:#2a365f;color:#fff}
    button.primary{background:linear-gradient(120deg,var(--acc),#705dff)}
    button.good{background:linear-gradient(120deg,var(--acc2),#1db5a2)}
    .counter{display:flex;gap:10px;flex-wrap:wrap;font-size:.84rem;color:var(--muted)}
    .counter b{color:#fff}
    @media(max-width:920px){.wrap{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <section class="card stack">
      <h1>Lorem Ipsum Studio</h1>
      <p class="muted">Generate polished placeholder text for UI/UX, docs, and mockups.</p>

      <div>
        <label for="mode">Generate by</label>
        <select id="mode">
          <option value="paragraphs">Paragraphs</option>
          <option value="sentences">Sentences</option>
          <option value="words">Words</option>
        </select>
      </div>

      <div class="row">
        <div>
          <label for="amount">Amount</label>
          <input id="amount" type="number" min="1" max="120" value="4" />
        </div>
        <div>
          <label for="tone">Style</label>
          <select id="tone">
            <option value="classic">Classic lorem</option>
            <option value="product">Product copy-ish</option>
            <option value="dev">Developer docs-ish</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="minWords">Min words / sentence</label>
          <input id="minWords" type="number" min="3" max="30" value="8" />
        </div>
        <div>
          <label for="maxWords">Max words / sentence</label>
          <input id="maxWords" type="number" min="4" max="40" value="18" />
        </div>
      </div>

      <label><input id="startLorem" type="checkbox" checked style="width:auto;margin-right:6px"/>Start first paragraph with “Lorem ipsum…”</label>

      <div class="btns">
        <button class="primary" id="generateBtn">Generate</button>
        <button class="good" id="copyBtn">Copy</button>
        <button id="downloadBtn">Download .txt</button>
      </div>
    </section>

    <section class="card stack">
      <textarea id="output" spellcheck="false"></textarea>
      <div class="counter">
        <span>Words: <b id="wc">0</b></span>
        <span>Characters: <b id="cc">0</b></span>
        <span>Paragraphs: <b id="pc">0</b></span>
      </div>
    </section>
  </main>

  <script>
    const dict = {
      classic: 'lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat'.split(' '),
      product: 'seamless intuitive reliable scalable flexible engaging optimized streamlined collaborative smart adaptive robust delightful modern efficient responsive trusted secure'.split(' '),
      dev: 'api endpoint schema payload request response middleware compile deploy runtime cache query mutation versioning lint refactor integration benchmark rollback observability'.split(' ')
    };

    const $ = s=>document.querySelector(s);

    function r(min,max){return Math.floor(Math.random()*(max-min+1))+min}
    function pick(arr){return arr[r(0,arr.length-1)]}

    function makeSentence(tone,minW,maxW){
      const words=[];
      const len=r(minW,maxW);
      for(let i=0;i<len;i++) words.push(pick(dict[tone]));
      words[0]=words[0].charAt(0).toUpperCase()+words[0].slice(1);
      return words.join(' ') + '.';
    }

    function generate(){
      const mode=$('#mode').value;
      const amount=Math.max(1,Number($('#amount').value)||1);
      const tone=$('#tone').value;
      const minW=Math.max(3,Number($('#minWords').value)||8);
      const maxW=Math.max(minW,Number($('#maxWords').value)||18);
      const startLorem=$('#startLorem').checked;

      let text='';
      if(mode==='words'){
        const words=[];
        for(let i=0;i<amount;i++) words.push(pick(dict[tone]));
        text=words.join(' ');
      } else if(mode==='sentences'){
        const lines=[];
        for(let i=0;i<amount;i++) lines.push(makeSentence(tone,minW,maxW));
        text=lines.join(' ');
      } else {
        const paras=[];
        for(let p=0;p<amount;p++){
          const sentCount=r(3,6);
          const s=[];
          for(let i=0;i<sentCount;i++) s.push(makeSentence(tone,minW,maxW));
          paras.push(s.join(' '));
        }
        if(startLorem && paras.length){
          paras[0]='Lorem ipsum dolor sit amet, consectetur adipiscing elit. ' + paras[0];
        }
        text=paras.join('\n\n');
      }
      $('#output').value=text.trim();
      updateCounts();
    }

    function updateCounts(){
      const t=$('#output').value.trim();
      $('#wc').textContent=t? t.split(/\s+/).length:0;
      $('#cc').textContent=t.length;
      $('#pc').textContent=t? t.split(/\n\s*\n/).length:0;
    }

    $('#generateBtn').onclick=generate;
    $('#output').addEventListener('input',updateCounts);

    $('#copyBtn').onclick=async()=>{
      try{await navigator.clipboard.writeText($('#output').value);
        const b=$('#copyBtn');const old=b.textContent;b.textContent='Copied!';setTimeout(()=>b.textContent=old,1000);
      }catch{}
    };

    $('#downloadBtn').onclick=()=>{
      const blob=new Blob([$('#output').value],{type:'text/plain;charset=utf-8'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);a.download='lorem-ipsum.txt';a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    };

    generate();
  </script>
</body>
</html>
