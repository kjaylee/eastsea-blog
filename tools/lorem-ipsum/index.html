<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator - 더미 텍스트 생성기</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --primary: #06b6d4;
            --primary-hover: #0891b2;
            --secondary: #8b5cf6;
            --success: #10b981;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-dim: #64748b;
            --primary: #0891b2;
            --primary-hover: #0e7490;
            --secondary: #7c3aed;
            --success: #059669;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a2332 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 16px;
            color: var(--text-dim);
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: flex-end;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px var(--shadow);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--shadow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-icon {
            padding: 10px;
            min-width: 44px;
            justify-content: center;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 24px var(--shadow);
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        select, input[type="number"] {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--primary);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: linear-gradient(135deg, var(--border), var(--surface));
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .output-area {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            line-height: 1.9;
            font-size: 15px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .output-area:focus {
            outline: none;
            border-color: var(--primary);
        }

        .output-area p {
            margin-bottom: 20px;
            text-align: justify;
        }

        .output-area.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-style: italic;
            font-size: 16px;
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        .success-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
            z-index: 1000;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .success-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 28px;
            }
            .card {
                padding: 20px;
            }
            .controls {
                grid-template-columns: 1fr;
            }
            .stats {
                flex-direction: column;
                gap: 15px;
            }
            .button-group {
                flex-direction: column;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Lorem Ipsum Generator</h1>
            <p>한국어와 영어 더미 텍스트를 손쉽게 생성하세요</p>
        </div>

        <div class="toolbar">
            <button class="btn btn-secondary btn-icon" id="themeBtn" title="Toggle theme">🌙</button>
        </div>

        <div class="card">
            <div class="controls">
                <div class="control-group">
                    <label>🌐 언어 / Language</label>
                    <select id="language">
                        <option value="ko">한국어 (Korean)</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>📊 생성 단위 / Unit</label>
                    <select id="unitType">
                        <option value="paragraphs">문단 / Paragraphs</option>
                        <option value="sentences">문장 / Sentences</option>
                        <option value="words">단어 / Words</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>🔢 개수 / Count</label>
                    <input type="number" id="count" value="3" min="1" max="100">
                </div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="charCount">0</div>
                    <div class="stat-label">Characters</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">Words</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="paraCount">0</div>
                    <div class="stat-label">Paragraphs</div>
                </div>
            </div>

            <div class="output-area empty" id="output" contenteditable="true">
                Click "Generate" to create dummy text
            </div>

            <div class="button-group">
                <button class="btn" onclick="generateText()">
                    <span>✨</span>
                    <span>Generate</span>
                </button>
                <button class="btn btn-secondary" onclick="copyText()">
                    <span>📋</span>
                    <span>Copy</span>
                </button>
                <button class="btn btn-secondary" onclick="clearText()">
                    <span>🗑️</span>
                    <span>Clear</span>
                </button>
            </div>
        </div>
    </div>

    <div class="success-toast" id="successToast">
        <span>✓</span>
        <span>Copied to clipboard!</span>
    </div>

    <script>
        const koreanWords = [
            '것이다', '있다', '없다', '되다', '하다', '이다', '아니다', '같다',
            '다르다', '많다', '적다', '크다', '작다', '좋다', '나쁘다', '높다',
            '낮다', '길다', '짧다', '넓다', '좁다', '무겁다', '가볍다', '빠르다',
            '느리다', '강하다', '약하다', '밝다', '어둡다', '따뜻하다', '차갑다'
        ];

        const koreanNouns = [
            '시스템', '데이터', '프로세스', '서비스', '플랫폼', '사용자', '개발자',
            '관리자', '정보', '문서', '보고서', '계획', '방안', '전략', '기능',
            '구조', '설계', '개발', '운영', '관리', '최적화', '성능', '효율',
            '안정성', '확장성', '유지보수', '분석', '처리', '제어', '검증'
        ];

        const koreanPredicates = [
            '효과적으로 작동한다', '안정적으로 운영된다', '지속적으로 개선된다',
            '체계적으로 관리된다', '효율적으로 처리된다', '적절히 구성된다',
            '명확하게 정의된다', '정확하게 측정된다', '꾸준히 발전한다',
            '원활하게 진행된다', '성공적으로 완료된다', '신속하게 대응한다',
            '체계적으로 구축된다', '효과적으로 통합된다', '안전하게 보호된다'
        ];

        const englishWords = [
            'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing',
            'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore',
            'et', 'dolore', 'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam',
            'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip',
            'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'in',
            'reprehenderit', 'voluptate', 'velit', 'esse', 'cillum', 'fugiat', 'nulla',
            'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident',
            'sunt', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'id',
            'est', 'laborum'
        ];

        function random(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateKoreanSentence() {
            const noun = random(koreanNouns);
            const word1 = random(koreanWords);
            const word2 = random(koreanWords);
            const predicate = random(koreanPredicates);
            return `${noun}은 ${word1} ${word2} ${predicate}.`;
        }

        function generateEnglishSentence(length = 8) {
            const words = [];
            for (let i = 0; i < length; i++) {
                words.push(random(englishWords));
            }
            const sentence = words.join(' ');
            return sentence.charAt(0).toUpperCase() + sentence.slice(1) + '.';
        }

        function generateParagraph(language, sentenceCount = 5) {
            const sentences = [];
            for (let i = 0; i < sentenceCount; i++) {
                sentences.push(
                    language === 'ko' 
                        ? generateKoreanSentence() 
                        : generateEnglishSentence(Math.floor(Math.random() * 8) + 6)
                );
            }
            return sentences.join(' ');
        }

        function generateText() {
            const language = document.getElementById('language').value;
            const unitType = document.getElementById('unitType').value;
            const count = parseInt(document.getElementById('count').value);
            const output = document.getElementById('output');

            let result = '';

            if (unitType === 'paragraphs') {
                const paragraphs = [];
                for (let i = 0; i < count; i++) {
                    paragraphs.push(`<p>${generateParagraph(language, 5)}</p>`);
                }
                result = paragraphs.join('');
            } else if (unitType === 'sentences') {
                const sentences = [];
                for (let i = 0; i < count; i++) {
                    sentences.push(
                        language === 'ko' 
                            ? generateKoreanSentence() 
                            : generateEnglishSentence()
                    );
                }
                result = `<p>${sentences.join(' ')}</p>`;
            } else if (unitType === 'words') {
                const words = [];
                const wordList = language === 'ko' ? koreanWords : englishWords;
                for (let i = 0; i < count; i++) {
                    words.push(random(wordList));
                }
                result = `<p>${words.join(' ')}</p>`;
            }

            output.innerHTML = result;
            output.classList.remove('empty');
            updateStats();
        }

        function updateStats() {
            const output = document.getElementById('output');
            const text = output.innerText;
            
            const charCount = text.replace(/\s/g, '').length;
            const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
            const paraCount = output.querySelectorAll('p').length;

            document.getElementById('charCount').textContent = charCount.toLocaleString();
            document.getElementById('wordCount').textContent = wordCount.toLocaleString();
            document.getElementById('paraCount').textContent = paraCount.toLocaleString();
        }

        function copyText() {
            const output = document.getElementById('output');
            const text = output.innerText;
            
            if (!text || output.classList.contains('empty')) {
                alert('No text to copy. Generate some text first!');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('successToast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        }

        function clearText() {
            const output = document.getElementById('output');
            output.innerHTML = 'Click "Generate" to create dummy text';
            output.classList.add('empty');
            
            document.getElementById('charCount').textContent = '0';
            document.getElementById('wordCount').textContent = '0';
            document.getElementById('paraCount').textContent = '0';
        }

        // Theme toggle
        const themeBtn = document.getElementById('themeBtn');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        let currentTheme = localStorage.getItem('lorem-theme') || (prefersDark.matches ? 'dark' : 'light');

        function applyTheme(theme) {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeBtn.textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
            }
            currentTheme = theme;
            localStorage.setItem('lorem-theme', theme);
        }

        applyTheme(currentTheme);

        themeBtn.addEventListener('click', () => {
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Auto-generate on load
        window.addEventListener('load', () => {
            generateText();
        });

        // Re-generate on option change
        document.getElementById('language').addEventListener('change', generateText);
        document.getElementById('unitType').addEventListener('change', generateText);
        document.getElementById('count').addEventListener('input', () => {
            clearTimeout(window.generateTimeout);
            window.generateTimeout = setTimeout(generateText, 500);
        });
    </script>
</body>
</html>
