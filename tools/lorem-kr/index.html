<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="📝 한국어 Lorem Ipsum - 더미 텍스트가 필요할 때, 자연스러운 한국어로 무료 온라인 도구 | Free online tool at eastsea.monster" />
    <title>한국어 Lorem Ipsum 생성기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select, input[type="number"] {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: white;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .output-area {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 25px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 1rem;
        }

        .output-area p {
            margin-bottom: 15px;
        }

        .output-area.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-style: italic;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .success-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            }

            .container {
                background: #2a2a3e;
                color: #e0e0e0;
            }

            .subtitle {
                color: #a0a0a0;
            }

            label {
                color: #e0e0e0;
            }

            select, input[type="number"] {
                background: #1a1a2e;
                color: #e0e0e0;
                border-color: #444;
            }

            .output-area {
                background: #1a1a2e;
                color: #e0e0e0;
                border-color: #444;
            }

            .stats {
                background: #1a1a2e;
            }

            .stat-label {
                color: #a0a0a0;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <h1>📝 한국어 Lorem Ipsum</h1>
        <p class="subtitle">더미 텍스트가 필요할 때, 자연스러운 한국어로</p>

        <div class="controls">
            <div class="control-group">
                <label>📊 생성 단위</label>
                <select id="unitType">
                    <option value="paragraphs">문단</option>
                    <option value="sentences">문장</option>
                    <option value="words">단어</option>
                </select>
            </div>
            <div class="control-group">
                <label>🔢 개수</label>
                <input type="number" id="count" value="3" min="1" max="50">
            </div>
            <div class="control-group">
                <label>🎨 스타일</label>
                <select id="style">
                    <option value="formal">격식체</option>
                    <option value="casual">구어체</option>
                    <option value="technical">기술문서</option>
                </select>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="charCount">0</div>
                <div class="stat-label">글자 수</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wordCount">0</div>
                <div class="stat-label">단어 수</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="paraCount">0</div>
                <div class="stat-label">문단 수</div>
            </div>
        </div>

        <div class="output-area empty" id="output">
            생성 버튼을 눌러 텍스트를 만들어보세요
        </div>

        <div class="btn-group">
            <button class="btn" onclick="generateText()">✨ 생성하기</button>
            <button class="btn btn-secondary" onclick="copyText()">📋 복사하기</button>
        </div>
    </div>

    <div class="success-message" id="successMessage">
        ✓ 클립보드에 복사되었습니다!
    </div>

    <script>
        const words = {
            formal: [
                '것이다', '있다', '없다', '되다', '하다', '이다', '아니다', '그러하다',
                '그렇다', '이렇다', '저렇다', '어떻다', '같다', '다르다', '많다', '적다',
                '크다', '작다', '좋다', '나쁘다', '높다', '낮다', '길다', '짧다',
                '넓다', '좁다', '무겁다', '가볍다', '빠르다', '느리다', '강하다', '약하다'
            ],
            casual: [
                '거야', '있어', '없어', '돼', '해', '이야', '아니야', '그래',
                '그렇지', '이래', '저래', '어때', '같아', '달라', '많아', '적어',
                '커', '작아', '좋아', '나빠', '높아', '낮아', '길어', '짧아',
                '넓어', '좁아', '무거워', '가벼워', '빨라', '느려', '강해', '약해'
            ],
            technical: [
                '시스템', '데이터', '프로세스', '인터페이스', '모듈', '컴포넌트', '서비스', '플랫폼',
                '구조', '설계', '개발', '구현', '배포', '운영', '관리', '최적화',
                '성능', '효율', '안정성', '확장성', '유지보수', '통합', '연동', '호환',
                '분석', '처리', '제어', '검증', '테스트', '모니터링', '로깅', '디버깅'
            ]
        };

        const subjects = [
            '이 시스템은', '해당 기능은', '프로젝트는', '서비스는', '플랫폼은',
            '사용자는', '개발자는', '관리자는', '데이터는', '정보는',
            '문서는', '보고서는', '계획은', '방안은', '전략은'
        ];

        const predicates = [
            '효과적으로 작동한다', '안정적으로 운영된다', '지속적으로 개선된다',
            '체계적으로 관리된다', '효율적으로 처리된다', '적절히 구성된다',
            '명확하게 정의된다', '정확하게 측정된다', '꾸준히 발전한다',
            '원활하게 진행된다', '성공적으로 완료된다', '신속하게 대응한다'
        ];

        function generateSentence(style) {
            const wordList = words[style];
            const subject = subjects[Math.floor(Math.random() * subjects.length)];
            const predicate = predicates[Math.floor(Math.random() * predicates.length)];
            const word1 = wordList[Math.floor(Math.random() * wordList.length)];
            const word2 = wordList[Math.floor(Math.random() * wordList.length)];
            
            return `${subject} ${word1} ${word2} ${predicate}.`;
        }

        function generateParagraph(style, sentenceCount = 5) {
            const sentences = [];
            for (let i = 0; i < sentenceCount; i++) {
                sentences.push(generateSentence(style));
            }
            return sentences.join(' ');
        }

        function generateText() {
            const unitType = document.getElementById('unitType').value;
            const count = parseInt(document.getElementById('count').value);
            const style = document.getElementById('style').value;
            const output = document.getElementById('output');

            let result = '';

            if (unitType === 'paragraphs') {
                const paragraphs = [];
                for (let i = 0; i < count; i++) {
                    paragraphs.push(`<p>${generateParagraph(style, 5)}</p>`);
                }
                result = paragraphs.join('');
            } else if (unitType === 'sentences') {
                const sentences = [];
                for (let i = 0; i < count; i++) {
                    sentences.push(generateSentence(style));
                }
                result = `<p>${sentences.join(' ')}</p>`;
            } else if (unitType === 'words') {
                const wordList = words[style];
                const selectedWords = [];
                for (let i = 0; i < count; i++) {
                    selectedWords.push(wordList[Math.floor(Math.random() * wordList.length)]);
                }
                result = `<p>${selectedWords.join(' ')}</p>`;
            }

            output.innerHTML = result;
            output.classList.remove('empty');
            updateStats();
        }

        function updateStats() {
            const output = document.getElementById('output');
            const text = output.innerText;
            
            document.getElementById('charCount').textContent = text.length;
            document.getElementById('wordCount').textContent = text.split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('paraCount').textContent = output.querySelectorAll('p').length;
        }

        function copyText() {
            const output = document.getElementById('output');
            const text = output.innerText;
            
            if (!text || output.classList.contains('empty')) {
                alert('복사할 텍스트가 없습니다.');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                const successMessage = document.getElementById('successMessage');
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 2000);
            });
        }

        // 초기 생성
        generateText();
    </script>
</body>
</html>
