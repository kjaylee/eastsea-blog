          en: 'You prioritize independence and often secure safety through emotional distance.'
        },
        detail: {
          ko: '회피형은 스스로를 지키는 능력이 뛰어나고 위기에서 감정적으로 무너지지 않는 강점을 가집니다. 다만 관계가 깊어질수록 "부담" 신호를 빠르게 감지해 자신도 모르게 닫히는 패턴이 나타날 수 있습니다. 상대는 이를 무관심으로 받아들이기 쉽고, 그 결과 오해가 누적되며 관계 만족도가 하락합니다. 핵심은 감정을 크게 터뜨리는 것이 아니라, 작은 단위로 연결을 유지하는 것입니다. 예컨대 긴 대화가 어렵다면 "지금은 정리 시간이 필요해, 저녁에 15분 얘기하자"처럼 예고형 소통을 사용하면 상대 불안을 줄이면서 자율성도 지킬 수 있습니다. 회피형의 독립성은 관계를 깨는 요소가 아니라 구조화하면 강력한 장점이 됩니다. 감정 언어를 한 단계만 늘리고, 침묵 대신 시간 약속을 제시하는 습관을 만들면 안정성과 친밀감이 동시에 상승합니다.',
          en: 'Avoidant style offers strong self-regulation and resilience under stress. The challenge appears as intimacy grows: closeness may be read as pressure, leading to automatic withdrawal. Partners often interpret this as indifference, and misunderstanding builds. Improvement does not require dramatic emotional exposure. Start with structured connection: if you need space, communicate timing and return plans. This preserves autonomy while reducing partner insecurity. Your independence can become a relationship asset when paired with predictable communication and small, consistent emotional signals.'
        },
        tips: {
          ko: ['거리두기가 필요할 때 "복귀 시간"을 함께 말해 주세요.', '긴 대화 대신 짧은 체크인 루틴을 먼저 고정하세요.', '감정 표현은 100점이 아니라 10점만 올려도 관계 체감이 크게 바뀝니다.'],
          en: ['When taking space, include a clear return time.', 'Use short check-ins before attempting long talks.', 'A small increase in emotional expression creates large relational gains.']
        }
      },
      fearful: {
        emoji: '🌪️',
        name: { ko: '혼란형 (Fearful-Avoidant)', en: 'Fearful-Avoidant' },
        summary: {
          ko: '가까워지고 싶은 욕구와 상처받을 두려움이 동시에 강하게 작동하는 유형입니다.',
          en: 'You strongly want closeness, yet strongly fear being hurt at the same time.'
        },
        detail: {
          ko: '혼란형은 애정 욕구와 방어 본능이 빠르게 교차하면서 관계 리듬이 흔들리기 쉽습니다. 상대를 깊이 원하다가도 불안이 치솟는 순간 스스로 거리를 만들고, 이후 죄책감과 외로움이 뒤따르는 순환이 반복될 수 있습니다. 이 패턴은 의지 부족이 아니라 신경계 수준의 안전 감지 문제와 연결되는 경우가 많기 때문에, 자기비난보다 "예측 가능한 안정 루틴"을 만드는 접근이 중요합니다. 감정이 급상승할 때 즉시 결론 내리기보다 20분 진정 루틴을 두고, 이후 짧은 사실 중심 대화로 복귀하는 방식이 효과적입니다. 또한 관계에서 허용 가능한 친밀 속도와 금지 신호를 미리 정의하면 급격한 밀당 패턴을 줄일 수 있습니다. 혼란형은 어려운 만큼 성장 곡선이 가파른 유형입니다. 일관된 자기조절과 안전한 소통 구조를 만들면 신뢰 형성이 빠르게 개선됩니다.',
          en: 'Fearful-avoidant style often swings between longing and protection. You may seek deep connection, then pull away when fear spikes, followed by guilt and loneliness. This is not weakness; it is often a safety-detection issue under stress. Focus on predictable regulation rather than self-blame: pause, settle, and return to concise fact-based communication. Define acceptable pacing and red flags in advance to reduce push-pull cycles. With consistent regulation and clear communication structure, relational trust can improve significantly over time.'
        },
        tips: {
          ko: ['감정 급등 시 20분 진정 루틴(호흡/산책/기록) 후 대화로 복귀하세요.', '"가까움 속도"와 "불편 신호"를 사전에 합의하면 급변을 줄일 수 있습니다.', '혼자 버티기보다 신뢰 가능한 지원체계를 미리 정해두세요.'],
          en: ['Use a 20-minute regulation pause before re-engaging.', 'Pre-agree intimacy pacing and discomfort signals.', 'Prepare reliable support channels instead of isolating.']
        }
      }
    };

    const PROMOS = [
      { href: '/tools/mbti-quick/', ko: '🧠 MBTI 빠른 진단', en: '🧠 Quick MBTI Test' },
      { href: '/tools/big5-ocean/', ko: '🌊 Big Five 성격분석', en: '🌊 Big Five Analysis' },
      { href: '/tools/eq-test/', ko: '💡 감성지능(EQ) 테스트', en: '💡 EQ Test' }
    ];

    const state = {
      lang: detectLang(),
      phase: 'intro',
      current: 0,
      scores: freshScores(),
      answers: [],
      result: null,
      analyzingPct: 0,
      savedRaw: loadSavedRaw()
    };

    let analyzingTimer = null;

    const app = document.getElementById('app');
    const topProgress = document.getElementById('topProgress');
    const topProgressFill = document.getElementById('topProgressFill');
    const topProgressText = document.getElementById('topProgressText');

    const tg = window.Telegram?.WebApp;
    try {
      tg?.ready?.();
      tg?.expand?.();
    } catch (_) {}

    const maybeI18n = typeof window.GameI18n === 'function'
      ? window.GameI18n({ defaultLang: state.lang, messages: UI })
      : null;

    function detectLang() {
      const nav = (navigator.language || 'ko').toLowerCase();
      return nav.startsWith('ko') ? 'ko' : 'en';
    }

    function freshScores() {
      return { secure: 0, anxious: 0, avoidant: 0, fearful: 0 };
    }

    function tr(key, vars = {}) {
      if (maybeI18n && typeof maybeI18n.t === 'function') {
        const byI18n = maybeI18n.t(key, { lang: state.lang });
        if (byI18n && byI18n !== key) return interpolate(byI18n, vars);
      }
      const raw = UI[state.lang]?.[key] ?? UI.ko?.[key] ?? key;
      return interpolate(raw, vars);
    }

    function tv(obj) {
      return obj?.[state.lang] ?? obj?.ko ?? obj?.en ?? '';
    }

    function interpolate(str, vars) {
      if (!vars || typeof str !== 'string') return str;
      return str.replace(/\{(\w+)\}/g, (_, k) => String(vars[k] ?? ''));
    }

    function haptic(kind = 'selection') {
      try {
        if (!tg?.HapticFeedback) return;
        if (kind === 'impact') tg.HapticFeedback.impactOccurred('light');
        else tg.HapticFeedback.selectionChanged();
      } catch (_) {}
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function updateTopProgress() {
      const show = state.phase === 'question';
      topProgress.classList.toggle('show', show);
      if (!show) return;
      const done = state.current + 1;
      const pct = Math.round((done / QUESTIONS.length) * 100);
      topProgressFill.style.width = pct + '%';
      topProgressText.textContent = `${done}/${QUESTIONS.length}`;
    }

    function formatSavedTime(iso) {
      try {
        return new Date(iso).toLocaleString(state.lang === 'ko' ? 'ko-KR' : 'en-US', {
          month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        });
      } catch (_) {
        return iso;
      }
    }

    function loadSavedRaw() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && parsed.type ? parsed : null;
      } catch (_) {
        return null;
      }
    }

    function saveResult(result) {
      const payload = {
        type: result.type,
        scores: result.normalized,
        savedAt: result.savedAt
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      state.savedRaw = payload;
    }

    function startQuiz() {
      haptic('impact');
      state.phase = 'question';
      state.current = 0;
      state.scores = freshScores();
      state.answers = [];
      state.result = null;
      clearInterval(analyzingTimer);
      render();
    }

    function setLang(lang) {
      state.lang = lang;
      render();
    }

    function pickAnswer(index) {
      const q = QUESTIONS[state.current];
      const picked = q.options[index];
      Object.entries(picked.score).forEach(([k, v]) => {
        state.scores[k] += v;
      });
      state.answers.push({ qIndex: state.current, optionIndex: index, weight: picked.score });
      haptic('selection');

      if (state.current < QUESTIONS.length - 1) {
        state.current += 1;
        render();
      } else {
        goAnalyze();
      }
    }

    function goAnalyze() {
      state.phase = 'analyzing';
      state.analyzingPct = 0;
      render();

      clearInterval(analyzingTimer);
      analyzingTimer = setInterval(() => {
        state.analyzingPct += Math.floor(Math.random() * 16) + 8;
        if (state.analyzingPct >= 100) {
          state.analyzingPct = 100;
          clearInterval(analyzingTimer);
          finalizeResult();
        }
        const fill = document.getElementById('miniFill');
        const txt = document.getElementById('miniText');
        if (fill) fill.style.width = state.analyzingPct + '%';
        if (txt) txt.textContent = state.analyzingPct + '%';
      }, 170);
    }

    function scoreEntries() {
      return Object.entries(state.scores).sort((a, b) => b[1] - a[1]);
    }

    function resolveTypeWithTie() {
      const sorted = scoreEntries();
      if (sorted[0][1] !== sorted[1][1]) return sorted[0][0];

      for (let i = state.answers.length - 1; i >= 0; i--) {
        const weight = state.answers[i].weight;
        const pair = Object.entries(weight).sort((a, b) => b[1] - a[1]);
        if (pair[0][1] !== pair[1][1]) return pair[0][0];
      }
      return sorted[0][0];
    }

    function normalizeScores() {
      const entries = Object.entries(state.scores);
      const total = entries.reduce((acc, [, v]) => acc + v, 0) || 1;
      const out = {};
      entries.forEach(([k, v]) => {
        out[k] = Math.round((v / total) * 100);
      });
      let diff = 100 - Object.values(out).reduce((a, b) => a + b, 0);
      if (diff !== 0) {
        out.secure += diff;
      }
      return out;
    }

    function finalizeResult() {
      const type = resolveTypeWithTie();
      const normalized = normalizeScores();
      state.result = {
        type,
        meta: RESULTS[type],
        normalized,
        savedAt: new Date().toISOString()
      };
      saveResult(state.result);
      state.phase = 'result';
      haptic('impact');
      render();
    }

    function composeShareText() {
      const typeLabel = tv(state.result.meta.name);
      return tr('shareText', { type: typeLabel });
    }

    function serviceUrl() {
      return `${location.origin}/love-attachment/`;
    }

    function shareKakao() {
      const url = serviceUrl();
      const text = encodeURIComponent(composeShareText());
      const target = `https://sharer.kakao.com/talk/friends/picker/link?url=${encodeURIComponent(url)}&text=${text}`;
      window.open(target, '_blank', 'noopener');
    }

    function shareTwitter() {
      const url = serviceUrl();
      const text = encodeURIComponent(composeShareText());
      const target = `https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(url)}`;
      window.open(target, '_blank', 'noopener');
    }

    async function copyLink() {
      try {
        await navigator.clipboard.writeText(serviceUrl());
        showToast(tr('copyDone'));
      } catch (_) {
        prompt('Copy this URL', serviceUrl());
      }
    }

    function drawChart() {
      const canvas = document.getElementById('resultChart');
      if (!canvas || !state.result) return;

      const ratio = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);

      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);

      const labels = [
        { key: 'secure', label: tr('axisSecure'), color: '#86efac' },
        { key: 'anxious', label: tr('axisAnxious'), color: '#fbbf24' },
        { key: 'avoidant', label: tr('axisAvoidant'), color: '#93c5fd' },
        { key: 'fearful', label: tr('axisFearful'), color: '#fda4af' }
      ];

      const left = 18;
      const top = 18;
      const barH = 26;
      const gap = 16;
      const usable = w - left - 132;

      labels.forEach((item, idx) => {
        const y = top + idx * (barH + gap);
        const pct = state.result.normalized[item.key] || 0;

        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(left, y, usable, barH);

        ctx.fillStyle = item.color;
        ctx.fillRect(left, y, Math.max(4, usable * (pct / 100)), barH);

        ctx.fillStyle = 'rgba(16,8,38,0.8)';
        ctx.font = '600 12px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif';
        ctx.fillText(item.label, left + 8, y + 17);

        ctx.fillStyle = '#fff';
        ctx.font = '700 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif';
        ctx.fillText(`${pct}%`, left + usable + 10, y + 17);
      });
    }

    function renderIntro() {
      const saved = state.savedRaw
        ? `<div class="saved-note">${tr('prevResult', { type: state.savedRaw.type, time: formatSavedTime(state.savedRaw.savedAt) })}</div>`
        : '';

      app.innerHTML = `
        <section class="card"><div class="card-inner">
          <div class="lang-row">
            <div class="lang-group">
              <button class="lang-btn ${state.lang === 'ko' ? 'active' : ''}" data-lang="ko">한국어</button>
              <button class="lang-btn ${state.lang === 'en' ? 'active' : ''}" data-lang="en">English</button>
            </div>
            <a class="ghost-link" href="/tools/">All Tools</a>
          </div>

          <h1>${tr('title')}</h1>
          <p class="subtitle">${tr('subtitle')}</p>

          <div class="hero-badges">
            <span class="badge">⏱ ${tr('elapsed')}</span>
            <span class="badge">📝 ${tr('questionsBadge')}</span>
            <span class="badge">📚 ${tr('baseBadge')}</span>
          </div>

          ${saved}

          <button id="startBtn" class="primary-btn">${tr('start')}</button>

          <p class="disclaimer">${tr('disclaimer')}</p>
        </div></section>
      `;

      app.querySelectorAll('[data-lang]').forEach(btn => {
        btn.addEventListener('click', () => setLang(btn.dataset.lang));
      });
      document.getElementById('startBtn').addEventListener('click', startQuiz);
    }

    function renderQuestion() {
      const q = QUESTIONS[state.current];
      app.innerHTML = `
        <section class="card"><div class="card-inner">
          <h2 class="question-title">Q${state.current + 1}. ${tv(q.q)}</h2>
          <p class="question-hint">${tr('hint')}</p>
          <div class="choices">
            ${q.options.map((opt, idx) => `<button class="choice-btn" data-idx="${idx}">${tv(opt.text)}</button>`).join('')}
          </div>
        </div></section>
      `;

      app.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => pickAnswer(Number(btn.dataset.idx)));
      });
    }

    function renderAnalyzing() {
      app.innerHTML = `
        <section class="card"><div class="card-inner">
          <div class="analyzing-wrap">
            <div class="spinner" aria-hidden="true"></div>
            <h2>${tr('analyzingTitle')}</h2>
            <p class="subtitle">${tr('analyzingDesc')}</p>
            <div class="mini-track"><div id="miniFill" class="mini-fill" style="width:${state.analyzingPct}%"></div></div>
            <div id="miniText" class="mini-text">${state.analyzingPct}%</div>
          </div>
        </div></section>
      `;
    }

    function renderResult() {
      const result = state.result;
      app.innerHTML = `
        <section class="card"><div class="card-inner">
          <div class="result-header">
            <div class="result-badge">${result.meta.emoji} ${tv(result.meta.name)}</div>
            <h2 style="margin:0;">${tr('resultTitle')}</h2>
            <p class="result-summary">${tv(result.meta.summary)}</p>
          </div>

          <p class="result-detail">${tv(result.meta.detail)}</p>

          <div class="tips">
            <h3>${tr('tipsTitle')}</h3>
            <ul>${result.meta.tips[state.lang].map(v => `<li>${v}</li>`).join('')}</ul>
          </div>

          <div class="chart-wrap">
            <strong style="display:block;margin:0 0 8px;font-size:.92rem;">${tr('chartTitle')}</strong>
            <canvas id="resultChart" width="640" height="230" aria-label="Attachment score chart"></canvas>
          </div>

          <div class="share-grid">
            <button id="shareKakao" class="share-btn">${tr('shareKakao')}</button>
            <button id="shareTwitter" class="share-btn">${tr('shareTwitter')}</button>
            <button id="shareLink" class="share-btn">${tr('shareLink')}</button>
          </div>

          <button id="restartBtn" class="secondary-btn">${tr('restart')}</button>

          <div class="promo">
            <h3>${tr('promoTitle')}</h3>
            <div class="promo-grid">
              ${PROMOS.map(p => `<a href="${p.href}">${state.lang === 'ko' ? p.ko : p.en}</a>`).join('')}
            </div>
          </div>

          <p class="disclaimer">${tr('disclaimer')}</p>
        </div></section>
      `;

      document.getElementById('shareKakao').addEventListener('click', shareKakao);
      document.getElementById('shareTwitter').addEventListener('click', shareTwitter);
      document.getElementById('shareLink').addEventListener('click', copyLink);
      document.getElementById('restartBtn').addEventListener('click', () => {
        haptic('impact');
        state.phase = 'intro';
        state.current = 0;
        state.scores = freshScores();
        state.answers = [];
        state.result = null;
        render();
      });

      drawChart();
    }

    function render() {
      updateTopProgress();
      if (state.phase === 'intro') renderIntro();
      else if (state.phase === 'question') renderQuestion();
      else if (state.phase === 'analyzing') renderAnalyzing();
      else renderResult();
    }

    window.addEventListener('resize', () => {
      if (state.phase === 'result') drawChart();
    });

    render();
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
