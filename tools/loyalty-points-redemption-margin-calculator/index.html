<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loyalty Points Redemption Margin Calculator | 로열티 포인트 리뎀션 마진 계산기</title>
  <meta name="description" content="포인트 리뎀션율 변화가 순증 멤버 기반 월 순이익, ROI, 회수기간, 손익분기 리뎀션율에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🎯 로열티 포인트 리뎀션 마진 계산기</h1>
        <div class="sub" id="subtitle">포인트 사용률 변화가 멤버십 매출 마진에 미치는 영향을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_members" for="members"></label><input id="members" type="number" min="1" value="520000"></div>
          <div><label id="l_currentRate" for="currentRate"></label><input id="currentRate" type="number" min="0" max="100" step="0.1" value="14"></div>
          <div><label id="l_targetRate" for="targetRate"></label><input id="targetRate" type="number" min="0" max="100" step="0.1" value="21"></div>
          <div><label id="l_ordersPerMember" for="ordersPerMember"></label><input id="ordersPerMember" type="number" min="0" step="0.1" value="1.9"></div>
          <div><label id="l_aov" for="aov"></label><input id="aov" type="number" min="0" step="100" value="41000"></div>
          <div><label id="l_grossMargin" for="grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="48"></div>
          <div><label id="l_pointsCostRate" for="pointsCostRate"></label><input id="pointsCostRate" type="number" min="0" max="100" step="0.1" value="9"></div>
          <div><label id="l_feeRate" for="feeRate"></label><input id="feeRate" type="number" min="0" max="100" step="0.1" value="2.9"></div>
          <div><label id="l_returnRate" for="returnRate"></label><input id="returnRate" type="number" min="0" max="100" step="0.1" value="6"></div>
          <div><label id="l_opsPerMember" for="opsPerMember"></label><input id="opsPerMember" type="number" min="0" step="100" value="1300"></div>
          <div><label id="l_monthlyCost" for="monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="6500000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="9000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_incrementalMembers"></div><div class="v" id="incrementalMembers">-</div></div>
          <div class="kpi"><div class="k" id="k_netPerMember"></div><div class="v" id="netPerMember">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_rateDelta"></div><div class="v" id="rateDelta">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_breakEvenRate"></th><td id="breakEvenRate">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_monthlyContribution"></th><td id="monthlyContribution">-</td></tr>
          <tr><th id="d_totalProgramCost"></th><td id="totalProgramCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={members:$("members"),currentRate:$("currentRate"),targetRate:$("targetRate"),ordersPerMember:$("ordersPerMember"),aov:$("aov"),grossMargin:$("grossMargin"),pointsCostRate:$("pointsCostRate"),feeRate:$("feeRate"),returnRate:$("returnRate"),opsPerMember:$("opsPerMember"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),incrementalMembers:$("incrementalMembers"),netPerMember:$("netPerMember"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),rateDelta:$("rateDelta"),breakEvenRate:$("breakEvenRate"),payback:$("payback"),monthlyContribution:$("monthlyContribution"),totalProgramCost:$("totalProgramCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={members:520000,currentRate:14,targetRate:21,ordersPerMember:1.9,aov:41000,grossMargin:48,pointsCostRate:9,feeRate:2.9,returnRate:6,opsPerMember:1300,monthlyCost:6500000,setup:9000000,months:12};
    const I18N={
      ko:{title:"🎯 로열티 포인트 리뎀션 마진 계산기",subtitle:"포인트 사용률 변화가 멤버십 매출 마진에 미치는 영향을 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_members:"활성 멤버 수",l_currentRate:"현재 리뎀션율 (%)",l_targetRate:"목표 리뎀션율 (%)",l_ordersPerMember:"리뎀션 멤버당 월 주문 수",l_aov:"평균 객단가 AOV (₩)",l_grossMargin:"매출총이익률 (%)",l_pointsCostRate:"포인트 비용률 (%)",l_feeRate:"결제 수수료율 (%)",l_returnRate:"반품률 (%)",l_opsPerMember:"리뎀션 멤버당 운영비 (₩)",l_monthlyCost:"월 고정 프로그램비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_incrementalMembers:"순증 리뎀션 멤버",k_netPerMember:"멤버당 월 순기여",k_monthlyNet:"월 순이익",k_roi:"ROI",k_periodNet:"기간 순효과",k_rateDelta:"리뎀션율 증가폭",d_breakEvenRate:"손익분기 목표 리뎀션율",d_payback:"회수기간",d_monthlyContribution:"월 순증 총기여",d_totalProgramCost:"기간 총 프로그램비",ok:"리뎀션 마진 수익성 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 멤버 수/기간은 1 이상이어야 합니다.",logicErr:"목표 리뎀션율은 현재 리뎀션율 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[로열티 포인트 리뎀션 마진 요약]",unitMonths:"개월"},
      en:{title:"🎯 Loyalty Points Redemption Margin Calculator",subtitle:"Estimate monthly net profit and ROI impact from changing loyalty point redemption rate.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_members:"Active members",l_currentRate:"Current redemption rate (%)",l_targetRate:"Target redemption rate (%)",l_ordersPerMember:"Monthly orders per redeemer",l_aov:"Average order value (KRW)",l_grossMargin:"Gross margin (%)",l_pointsCostRate:"Points cost rate (%)",l_feeRate:"Payment fee rate (%)",l_returnRate:"Return rate (%)",l_opsPerMember:"Ops cost per redeemer (KRW)",l_monthlyCost:"Monthly fixed program cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_incrementalMembers:"Incremental redeemers",k_netPerMember:"Monthly net contribution per redeemer",k_monthlyNet:"Monthly net profit",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_rateDelta:"Redemption-rate delta",d_breakEvenRate:"Break-even target redemption rate",d_payback:"Payback period",d_monthlyContribution:"Monthly total contribution uplift",d_totalProgramCost:"Total program cost (period)",ok:"Redemption margin economics ready",warn:"Monthly net profit is negative with current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and members/months must be >= 1.",logicErr:"Target redemption rate must be greater than or equal to current rate.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Loyalty Points Redemption Margin Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["members","currentRate","targetRate","ordersPerMember","aov","grossMargin","pointsCostRate","feeRate","returnRate","opsPerMember","monthlyCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["incrementalMembers","netPerMember","monthlyNet","roi","periodNet","rateDelta"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenRate","payback","monthlyContribution","totalProgramCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.members)||v.members<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.ordersPerMember,v.aov,v.opsPerMember,v.monthlyCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.currentRate,v.targetRate,v.grossMargin,v.pointsCostRate,v.feeRate,v.returnRate].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetRate<v.currentRate) return t("logicErr");
      return "";
    }

    function render(){
      const v={members:Number(refs.members.value),currentRate:Number(refs.currentRate.value),targetRate:Number(refs.targetRate.value),ordersPerMember:Number(refs.ordersPerMember.value),aov:Number(refs.aov.value),grossMargin:Number(refs.grossMargin.value),pointsCostRate:Number(refs.pointsCostRate.value),feeRate:Number(refs.feeRate.value),returnRate:Number(refs.returnRate.value),opsPerMember:Number(refs.opsPerMember.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["incrementalMembers","netPerMember","monthlyNet","roi","periodNet","rateDelta","breakEvenRate","payback","monthlyContribution","totalProgramCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const currentMembers=v.members*(v.currentRate/100);
      const targetMembers=v.members*(v.targetRate/100);
      const incrementalMembers=Math.max(0,targetMembers-currentMembers);
      const netSalesPerOrder=v.aov*(1-v.returnRate/100);
      const grossProfitPerOrder=netSalesPerOrder*(v.grossMargin/100);
      const pointsCostPerOrder=netSalesPerOrder*(v.pointsCostRate/100);
      const feePerOrder=netSalesPerOrder*(v.feeRate/100);
      const netPerOrder=grossProfitPerOrder-pointsCostPerOrder-feePerOrder;
      const netPerMember=(v.ordersPerMember*netPerOrder)-v.opsPerMember;
      const monthlyContribution=incrementalMembers*netPerMember;
      const monthlyNet=monthlyContribution-v.monthlyCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const rateDelta=v.targetRate-v.currentRate;

      const requiredMembers=netPerMember>0?(v.monthlyCost/netPerMember):Infinity;
      const breakEvenRate=Number.isFinite(requiredMembers)&&v.members>0?v.currentRate+((requiredMembers/v.members)*100):Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.incrementalMembers.textContent=num(incrementalMembers,0);
      refs.netPerMember.textContent=won(netPerMember);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.rateDelta.textContent=pct(rateDelta,1);
      refs.breakEvenRate.textContent=(Number.isFinite(breakEvenRate)&&breakEvenRate<=100)?pct(breakEvenRate,2):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.totalProgramCost.textContent=won(totalProgramCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_incrementalMembers")}: ${num(incrementalMembers,0)}`,`${t("k_netPerMember")}: ${won(netPerMember)}`,`${t("d_monthlyContribution")}: ${won(monthlyContribution)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenRate")}: ${(Number.isFinite(breakEvenRate)&&breakEvenRate<=100)?pct(breakEvenRate,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.members,refs.currentRate,refs.targetRate,refs.ordersPerMember,refs.aov,refs.grossMargin,refs.pointsCostRate,refs.feeRate,refs.returnRate,refs.opsPerMember,refs.monthlyCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
