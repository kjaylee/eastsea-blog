<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객 생애가치(LTV) 계산기 | LTV Calculator</title>
  <meta name="description" content="ARPU, 마진, 이탈률 기반으로 고객 생애가치(LTV), LTV:CAC, 회수기간을 계산합니다." />
  <style>
    :root{--bg:#f4f7ff;--card:#fff;--line:#dce5f6;--text:#1f2937;--muted:#64748b;--pri:#2563eb;--pri2:#0ea5e9;--ok:#16a34a;--warn:#d97706;--bad:#dc2626}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edf3ff,#f8fbff);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 42px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.92rem}
    .back{text-decoration:none;color:#1e3a8a;border:1px solid var(--line);background:#fff;padding:8px 11px;border-radius:10px;font-weight:700;font-size:.88rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 10px 28px rgba(37,99,235,.08)}
    h2{margin:0 0 10px;font-size:1rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:700}
    input,button{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font-size:.92rem;background:#fff;color:var(--text)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;font-weight:800}.ghost{background:#f4f7ff;border:1px solid var(--line);color:#1f2937}
    .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{border:1px solid var(--line);background:#f9fbff;border-radius:12px;padding:10px}.k{font-size:.75rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .msg{margin-top:8px;border:1px solid var(--line);border-radius:10px;background:#f8fbff;padding:10px;font-size:.9rem;line-height:1.45}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>🧮 고객 생애가치(LTV) 계산기</h1>
      <p class="sub">고객 1명의 장기 가치와 CAC 대비 효율을 빠르게 진단합니다.</p>
    </div>
    <a class="back" href="/">Back to Portal</a>
  </div>

  <section class="grid">
    <article class="card">
      <h2>입력값</h2>
      <div class="two">
        <div><label for="arpu">월 ARPU (원)</label><input id="arpu" type="number" min="0" step="1000" value="145000"></div>
        <div><label for="grossMargin">매출총이익률 (%)</label><input id="grossMargin" type="number" min="1" max="100" step="0.1" value="72"></div>
        <div><label for="monthlyChurn">월 이탈률 (%)</label><input id="monthlyChurn" type="number" min="0.1" max="100" step="0.1" value="4.5"></div>
        <div><label for="discountRate">할인율(연, %) </label><input id="discountRate" type="number" min="0" max="50" step="0.1" value="10"></div>
        <div><label for="cac">CAC (원)</label><input id="cac" type="number" min="0" step="1000" value="420000"></div>
        <div><label for="paybackTarget">목표 회수기간 (개월)</label><input id="paybackTarget" type="number" min="1" step="1" value="12"></div>
      </div>
      <div class="btns">
        <button id="calcBtn" type="button">계산</button>
        <button id="sampleBtn" class="ghost" type="button">샘플</button>
      </div>
    </article>

    <article class="card">
      <h2>결과</h2>
      <div class="kpis">
        <div class="kpi"><div class="k">예상 고객 수명</div><div class="v" id="life">-</div></div>
        <div class="kpi"><div class="k">월 공헌이익(고객당)</div><div class="v" id="monthlyContribution">-</div></div>
        <div class="kpi"><div class="k">단순 LTV</div><div class="v" id="ltvSimple">-</div></div>
        <div class="kpi"><div class="k">할인 반영 LTV</div><div class="v" id="ltvDiscounted">-</div></div>
        <div class="kpi"><div class="k">LTV:CAC</div><div class="v" id="ratio">-</div></div>
        <div class="kpi"><div class="k">CAC 회수기간</div><div class="v" id="payback">-</div></div>
      </div>
      <div class="msg" id="msg">값을 변경하면 자동 계산됩니다.</div>
    </article>
  </section>
</main>

<script>
  const $=(id)=>document.getElementById(id);
  const won=(n)=>'₩'+Math.round(n||0).toLocaleString('ko-KR');

  function run(){
    const arpu=Number($('arpu').value);
    const margin=Math.max(0.01,Number($('grossMargin').value)/100);
    const churn=Math.max(0.001,Number($('monthlyChurn').value)/100);
    const annualDiscount=Number($('discountRate').value)/100;
    const monthlyDiscount=Math.pow(1+annualDiscount,1/12)-1;
    const cac=Number($('cac').value);
    const paybackTarget=Math.max(1,Number($('paybackTarget').value));

    const lifeMonths=1/churn;
    const contrib=arpu*margin;
    const ltvSimple=contrib*lifeMonths;

    // 무한급수 기반 할인 LTV
    const survival=1-churn;
    const ltvDiscounted=contrib*survival/(1+monthlyDiscount-survival);

    const ratio=ltvDiscounted/Math.max(1,cac);
    const payback=contrib>0?cac/contrib:Infinity;

    $('life').textContent=`${lifeMonths.toFixed(1)}개월`;
    $('monthlyContribution').textContent=won(contrib);
    $('ltvSimple').textContent=won(ltvSimple);
    $('ltvDiscounted').textContent=won(ltvDiscounted);
    $('ratio').textContent=`${ratio.toFixed(2)}x`;
    $('payback').textContent=isFinite(payback)?`${payback.toFixed(1)}개월`:'계산 불가';

    $('ratio').className=`v ${ratio>=3?'ok':ratio>=2?'warn':'bad'}`;
    $('payback').className=`v ${payback<=paybackTarget?'ok':payback<=paybackTarget*1.4?'warn':'bad'}`;

    const msg = ratio>=3 && payback<=paybackTarget
      ? '✅ LTV/CAC 구조가 건강합니다. 상위 전환 채널에 예산 확장을 고려해볼 수 있습니다.'
      : ratio>=2
      ? '⚠️ 개선 여지가 있습니다. 온보딩/리텐션 개선으로 이탈률을 낮추는 것이 우선입니다.'
      : '🚨 단위경제가 약합니다. CAC 절감 또는 ARPU/마진 개선 전략이 필요합니다.';
    $('msg').textContent=msg;
  }

  $('calcBtn').addEventListener('click',run);
  $('sampleBtn').addEventListener('click',()=>{
    $('arpu').value=168000;
    $('grossMargin').value=78;
    $('monthlyChurn').value=3.2;
    $('discountRate').value=12;
    $('cac').value=390000;
    $('paybackTarget').value=10;
    run();
  });
  ['arpu','grossMargin','monthlyChurn','discountRate','cac','paybackTarget'].forEach(id=>$(id).addEventListener('input',run));
  run();
</script>
</body>
</html>
