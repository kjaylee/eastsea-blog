<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매크로 비율 계산기 | Macro Split Calculator</title>
  <meta name="description" content="총 섭취 칼로리와 탄단지 비율로 하루 매크로(g)와 식사당 섭취량을 계산하는 건강 도구" />
  <style>
    :root{--bg:#f6faf8;--card:#fff;--text:#163022;--muted:#60756a;--line:#d8e7df;--pri:#16a34a;--pri2:#15803d;--warn:#b45309}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);padding:16px;line-height:1.55}
    .wrap{max-width:960px;margin:0 auto}
    .back{display:inline-block;margin-bottom:10px;color:var(--muted);text-decoration:none}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.05)}
    h1{font-size:clamp(1.3rem,4.4vw,2rem);margin-bottom:6px}
    .sub{font-size:.94rem;color:var(--muted);margin-bottom:12px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .field{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fbfefd}
    label{display:block;font-size:.82rem;font-weight:700;color:#335647;margin-bottom:4px}
    input,select{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:.93rem}
    input:focus,select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 2px}
    button{border:none;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer}
    .primary{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}
    .ghost{background:#e9f9ef;color:#14532d}
    .warn{color:var(--warn);font-weight:700;font-size:.86rem;min-height:1.2em;margin-top:6px}
    .cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}
    .card{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}
    .k{font-size:.82rem;color:var(--muted);font-weight:700}
    .v{font-size:1.15rem;font-weight:800;margin-top:4px}
    .meter{height:12px;background:#ecf6f0;border-radius:999px;overflow:hidden;margin-top:8px}
    .bar{height:100%;transition:width .25s ease}
    .small{font-size:.82rem;color:var(--muted);margin-top:6px}
    @media (max-width:820px){.grid,.cards{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← 도구 목록으로</a>
  <section class="panel">
    <h1>🥗 매크로 비율 계산기</h1>
    <p class="sub">칼로리 목표와 탄수화물/단백질/지방 비율을 입력해 하루 섭취 g과 식사당 분배를 계산합니다.</p>

    <div class="grid">
      <div class="field">
        <label for="calories">하루 목표 칼로리 (kcal)</label>
        <input id="calories" type="number" min="800" max="7000" step="10" value="2200" />
      </div>
      <div class="field">
        <label for="meals">하루 식사 횟수</label>
        <input id="meals" type="number" min="1" max="10" step="1" value="3" />
      </div>
      <div class="field">
        <label for="carb">탄수화물 비율 (%)</label>
        <input id="carb" type="number" min="0" max="100" step="1" value="40" />
      </div>
      <div class="field">
        <label for="protein">단백질 비율 (%)</label>
        <input id="protein" type="number" min="0" max="100" step="1" value="30" />
      </div>
      <div class="field">
        <label for="fat">지방 비율 (%)</label>
        <input id="fat" type="number" min="0" max="100" step="1" value="30" />
      </div>
      <div class="field">
        <label for="preset">프리셋</label>
        <select id="preset">
          <option value="custom">직접 입력</option>
          <option value="balanced">균형형 (40/30/30)</option>
          <option value="lowcarb">저탄수 (25/40/35)</option>
          <option value="highcarb">고탄수 (55/25/20)</option>
          <option value="keto">키토형 (10/25/65)</option>
        </select>
      </div>
    </div>

    <div class="toolbar">
      <button class="primary" id="calcBtn">계산하기</button>
      <button class="ghost" id="roundBtn">비율 자동 보정(합계 100)</button>
    </div>
    <p class="warn" id="warn"></p>

    <div class="cards">
      <article class="card">
        <div class="k">탄수화물</div>
        <div class="v" id="carbGram">0 g</div>
        <div class="small" id="carbKcal">0 kcal</div>
        <div class="meter"><div class="bar" id="barCarb" style="width:0;background:#0ea5e9"></div></div>
      </article>
      <article class="card">
        <div class="k">단백질</div>
        <div class="v" id="proteinGram">0 g</div>
        <div class="small" id="proteinKcal">0 kcal</div>
        <div class="meter"><div class="bar" id="barProtein" style="width:0;background:#16a34a"></div></div>
      </article>
      <article class="card">
        <div class="k">지방</div>
        <div class="v" id="fatGram">0 g</div>
        <div class="small" id="fatKcal">0 kcal</div>
        <div class="meter"><div class="bar" id="barFat" style="width:0;background:#f59e0b"></div></div>
      </article>
    </div>

    <div class="cards" style="grid-template-columns:1fr 1fr;margin-top:10px">
      <article class="card">
        <div class="k">식사 1회당 탄단지</div>
        <div class="small" id="perMeal">-</div>
      </article>
      <article class="card">
        <div class="k">요약</div>
        <div class="small" id="summary">입력 후 계산을 눌러 주세요.</div>
      </article>
    </div>
  </section>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  const presets = {
    balanced: [40, 30, 30],
    lowcarb: [25, 40, 35],
    highcarb: [55, 25, 20],
    keto: [10, 25, 65]
  };

  function setPreset() {
    const val = $('preset').value;
    if (!presets[val]) return;
    const [c, p, f] = presets[val];
    $('carb').value = c;
    $('protein').value = p;
    $('fat').value = f;
    calculate();
  }

  function normalize() {
    const c = Math.max(0, Number($('carb').value || 0));
    const p = Math.max(0, Number($('protein').value || 0));
    const f = Math.max(0, Number($('fat').value || 0));
    const sum = c + p + f;
    if (sum === 0) return;

    const nc = Math.round((c / sum) * 100);
    const np = Math.round((p / sum) * 100);
    const nf = Math.max(0, 100 - nc - np);

    $('carb').value = nc;
    $('protein').value = np;
    $('fat').value = nf;
    $('preset').value = 'custom';
    calculate();
  }

  function calculate() {
    const kcal = Math.max(0, Number($('calories').value || 0));
    const meals = Math.max(1, Number($('meals').value || 1));
    const cPct = Math.max(0, Number($('carb').value || 0));
    const pPct = Math.max(0, Number($('protein').value || 0));
    const fPct = Math.max(0, Number($('fat').value || 0));
    const sum = cPct + pPct + fPct;

    $('warn').textContent = sum === 100 ? '' : `비율 합계가 ${sum}% 입니다. 100%가 되도록 조정하세요.`;

    const cKcal = kcal * (cPct / 100);
    const pKcal = kcal * (pPct / 100);
    const fKcal = kcal * (fPct / 100);

    const cGram = cKcal / 4;
    const pGram = pKcal / 4;
    const fGram = fKcal / 9;

    $('carbGram').textContent = `${cGram.toFixed(1)} g`;
    $('proteinGram').textContent = `${pGram.toFixed(1)} g`;
    $('fatGram').textContent = `${fGram.toFixed(1)} g`;

    $('carbKcal').textContent = `${cKcal.toFixed(0)} kcal (${cPct.toFixed(0)}%)`;
    $('proteinKcal').textContent = `${pKcal.toFixed(0)} kcal (${pPct.toFixed(0)}%)`;
    $('fatKcal').textContent = `${fKcal.toFixed(0)} kcal (${fPct.toFixed(0)}%)`;

    $('barCarb').style.width = `${Math.min(100, cPct)}%`;
    $('barProtein').style.width = `${Math.min(100, pPct)}%`;
    $('barFat').style.width = `${Math.min(100, fPct)}%`;

    $('perMeal').textContent = `탄수 ${ (cGram / meals).toFixed(1) }g · 단백질 ${ (pGram / meals).toFixed(1) }g · 지방 ${ (fGram / meals).toFixed(1) }g (총 ${(kcal / meals).toFixed(0)} kcal)`;
    $('summary').textContent = `하루 ${kcal.toFixed(0)} kcal 기준으로 탄단지 목표는 ${cGram.toFixed(1)}g / ${pGram.toFixed(1)}g / ${fGram.toFixed(1)}g 입니다.`;
  }

  ['calories', 'meals', 'carb', 'protein', 'fat'].forEach(id => {
    $(id).addEventListener('input', () => {
      $('preset').value = 'custom';
      calculate();
    });
  });

  $('preset').addEventListener('change', setPreset);
  $('roundBtn').addEventListener('click', normalize);
  $('calcBtn').addEventListener('click', calculate);

  calculate();
})();
</script>
</body>
</html>
