<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makefile Generator | Makefile 생성기</title>
    <meta name="description" content="Node.js, Python, Go, Rust, C++ 프로젝트용 Makefile을 빠르게 생성하세요. 빌드/테스트/린트/배포 타겟 자동 생성.">
    <meta name="keywords" content="makefile generator, makefile 생성기, build automation, make, cmake, 빌드 자동화">
    <meta property="og:title" content="Makefile Generator">
    <meta property="og:description" content="Node.js, Python, Go, Rust, C++ 프로젝트용 Makefile을 빠르게 생성하세요.">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#fff;--bg2:#f8f9fa;--text:#212529;--text2:#6c757d;--accent:#f59e0b;--accent2:#d97706;--border:#dee2e6;--shadow:rgba(0,0,0,.08);--card:#fff;--code-bg:#1e1e2e;--code-text:#cdd6f4}
        [data-theme="dark"]{--bg:#0f0f23;--bg2:#1a1a2e;--text:#e4e4e7;--text2:#a1a1aa;--border:#27272a;--shadow:rgba(0,0,0,.4);--card:#16213e;--code-bg:#0d0d1a;--code-text:#cdd6f4}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg2);color:var(--text);padding:20px;min-height:100vh;transition:all .3s}
        .container{max-width:1100px;margin:0 auto}
        header{text-align:center;margin-bottom:28px}
        h1{font-size:1.9rem;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .subtitle{color:var(--text2);font-size:.95rem}
        .theme-toggle{position:fixed;top:15px;right:15px;background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .2s}
        .home-btn{position:fixed;top:15px;left:15px;text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;z-index:10;transition:all .2s}
        .home-btn:hover,.theme-toggle:hover{transform:scale(1.1)}
        .grid{display:grid;grid-template-columns:360px 1fr;gap:20px}
        .panel{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 10px var(--shadow)}
        .panel h2{font-size:1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--text)}
        .field{margin-bottom:14px}
        label{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
        input[type=text],select{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--bg);color:var(--text);transition:border .2s}
        input[type=text]:focus,select:focus{outline:none;border-color:var(--accent)}
        .checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
        .check-item{display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:.85rem;transition:all .2s}
        .check-item:hover{border-color:var(--accent);background:rgba(245,158,11,.06)}
        .check-item input{accent-color:var(--accent);cursor:pointer}
        .check-item.checked{border-color:var(--accent);background:rgba(245,158,11,.1);font-weight:600}
        .preset-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
        .preset{padding:7px 16px;border-radius:20px;border:2px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:.83rem;font-weight:600;transition:all .2s}
        .preset:hover,.preset.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .output-wrap{position:relative}
        .output{width:100%;min-height:520px;padding:18px;border-radius:10px;font-family:'SF Mono',Monaco,Menlo,Consolas,monospace;font-size:.82rem;line-height:1.65;background:var(--code-bg);color:var(--code-text);resize:vertical;overflow:auto;border:none;white-space:pre;tab-size:4}
        .btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
        .btn{padding:9px 20px;border:none;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:6px}
        .btn-primary{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(245,158,11,.4)}
        .btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
        .btn-secondary:hover{background:var(--border)}
        .section-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
        .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:.88rem;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none}
        .toast.show{opacity:1}
        @media(max-width:768px){.grid{grid-template-columns:1fr}.checkbox-grid{grid-template-columns:1fr 1fr}.output{min-height:320px}h1{font-size:1.4rem}}
    </style>
    <script src="/assets/analytics.js"></script>
</head>
<body>
<a href="/" class="home-btn" title="도구 목록">🏠</a>
<button class="theme-toggle" onclick="toggleTheme()" title="테마">🌓</button>
<div class="container">
    <header>
        <h1>🔧 Makefile Generator</h1>
        <p class="subtitle">프로젝트 유형을 선택하면 Makefile을 자동 생성합니다</p>
    </header>

    <div class="preset-row">
        <button class="preset active" onclick="applyPreset('nodejs')">⬢ Node.js</button>
        <button class="preset" onclick="applyPreset('python')">🐍 Python</button>
        <button class="preset" onclick="applyPreset('go')">🐹 Go</button>
        <button class="preset" onclick="applyPreset('rust')">🦀 Rust</button>
        <button class="preset" onclick="applyPreset('cpp')">⚙️ C/C++</button>
        <button class="preset" onclick="applyPreset('docker')">🐳 Docker App</button>
    </div>

    <div class="grid">
        <div>
            <div class="panel">
                <h2>📋 프로젝트 설정</h2>
                <div class="field">
                    <label>프로젝트 이름</label>
                    <input type="text" id="projectName" value="my-app" oninput="generate()">
                </div>
                <div class="field">
                    <label>바이너리/출력 이름</label>
                    <input type="text" id="binaryName" value="app" oninput="generate()">
                </div>
                <div class="field">
                    <label>소스 디렉토리</label>
                    <input type="text" id="srcDir" value="src" oninput="generate()">
                </div>
                <div class="field">
                    <label>빌드 출력 디렉토리</label>
                    <input type="text" id="buildDir" value="dist" oninput="generate()">
                </div>
            </div>

            <div class="panel" style="margin-top:16px">
                <h2>🎯 포함할 타겟</h2>
                <div class="checkbox-grid">
                    <label class="check-item checked" id="ci-build"><input type="checkbox" checked onchange="updateCheck(this,'ci-build');generate()"> 🏗️ build</label>
                    <label class="check-item checked" id="ci-test"><input type="checkbox" checked onchange="updateCheck(this,'ci-test');generate()"> 🧪 test</label>
                    <label class="check-item checked" id="ci-lint"><input type="checkbox" checked onchange="updateCheck(this,'ci-lint');generate()"> 🔍 lint</label>
                    <label class="check-item checked" id="ci-clean"><input type="checkbox" checked onchange="updateCheck(this,'ci-clean');generate()"> 🧹 clean</label>
                    <label class="check-item checked" id="ci-run"><input type="checkbox" checked onchange="updateCheck(this,'ci-run');generate()"> ▶️ run</label>
                    <label class="check-item checked" id="ci-install"><input type="checkbox" checked onchange="updateCheck(this,'ci-install');generate()"> 📦 install</label>
                    <label class="check-item" id="ci-docker"><input type="checkbox" onchange="updateCheck(this,'ci-docker');generate()"> 🐳 docker</label>
                    <label class="check-item" id="ci-deploy"><input type="checkbox" onchange="updateCheck(this,'ci-deploy');generate()"> 🚀 deploy</label>
                    <label class="check-item" id="ci-docs"><input type="checkbox" onchange="updateCheck(this,'ci-docs');generate()"> 📚 docs</label>
                    <label class="check-item" id="ci-fmt"><input type="checkbox" onchange="updateCheck(this,'ci-fmt');generate()"> ✨ fmt/format</label>
                    <label class="check-item" id="ci-bench"><input type="checkbox" onchange="updateCheck(this,'ci-bench');generate()"> ⚡ bench</label>
                    <label class="check-item" id="ci-release"><input type="checkbox" onchange="updateCheck(this,'ci-release');generate()"> 📦 release</label>
                </div>
            </div>

            <div class="panel" style="margin-top:16px">
                <h2>⚙️ 추가 옵션</h2>
                <div class="checkbox-grid">
                    <label class="check-item checked" id="opt-phony"><input type="checkbox" checked onchange="updateCheck(this,'opt-phony');generate()"> .PHONY 선언</label>
                    <label class="check-item checked" id="opt-help"><input type="checkbox" checked onchange="updateCheck(this,'opt-help');generate()"> help 타겟</label>
                    <label class="check-item" id="opt-env"><input type="checkbox" onchange="updateCheck(this,'opt-env');generate()"> .env 로딩</label>
                    <label class="check-item" id="opt-verbose"><input type="checkbox" onchange="updateCheck(this,'opt-verbose');generate()"> VERBOSE 변수</label>
                    <label class="check-item" id="opt-version"><input type="checkbox" onchange="updateCheck(this,'opt-version');generate()"> VERSION 변수</label>
                    <label class="check-item" id="opt-color"><input type="checkbox" onchange="updateCheck(this,'opt-color');generate()"> 컬러 출력</label>
                </div>
            </div>
        </div>

        <div>
            <div class="panel">
                <h2>📄 생성된 Makefile</h2>
                <div class="output-wrap">
                    <textarea class="output" id="output" readonly spellcheck="false"></textarea>
                </div>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="copyOutput()">📋 복사</button>
                    <button class="btn btn-secondary" onclick="downloadOutput()">💾 다운로드</button>
                    <button class="btn btn-secondary" onclick="resetAll()">🔄 초기화</button>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
let currentPreset = 'nodejs';

const presets = {
    nodejs: { binary:'app', src:'src', build:'dist', defaultLang:'node' },
    python: { binary:'app', src:'src', build:'dist', defaultLang:'python' },
    go: { binary:'app', src:'cmd/app', build:'bin', defaultLang:'go' },
    rust: { binary:'app', src:'src', build:'target', defaultLang:'rust' },
    cpp: { binary:'app', src:'src', build:'build', defaultLang:'cpp' },
    docker: { binary:'app', src:'src', build:'dist', defaultLang:'docker' },
};

function applyPreset(name) {
    currentPreset = name;
    document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    const p = presets[name];
    document.getElementById('binaryName').value = p.binary;
    document.getElementById('srcDir').value = p.src;
    document.getElementById('buildDir').value = p.build;
    // preset-specific defaults
    const dockerCheck = document.querySelector('#ci-docker input');
    if (name === 'docker') { dockerCheck.checked = true; updateCheck(dockerCheck, 'ci-docker'); }
    generate();
}

function updateCheck(cb, id) {
    document.getElementById(id).classList.toggle('checked', cb.checked);
}

function getChecked(id) {
    return document.querySelector(`#${id} input`).checked;
}

function generate() {
    const proj = document.getElementById('projectName').value || 'my-app';
    const bin = document.getElementById('binaryName').value || 'app';
    const src = document.getElementById('srcDir').value || 'src';
    const build = document.getElementById('buildDir').value || 'dist';
    const lang = currentPreset;

    const usePhony = getChecked('opt-phony');
    const useHelp = getChecked('opt-help');
    const useEnv = getChecked('opt-env');
    const useVerbose = getChecked('opt-verbose');
    const useVersion = getChecked('opt-version');
    const useColor = getChecked('opt-color');

    const wantBuild = getChecked('ci-build');
    const wantTest = getChecked('ci-test');
    const wantLint = getChecked('ci-lint');
    const wantClean = getChecked('ci-clean');
    const wantRun = getChecked('ci-run');
    const wantInstall = getChecked('ci-install');
    const wantDocker = getChecked('ci-docker');
    const wantDeploy = getChecked('ci-deploy');
    const wantDocs = getChecked('ci-docs');
    const wantFmt = getChecked('ci-fmt');
    const wantBench = getChecked('ci-bench');
    const wantRelease = getChecked('ci-release');

    let lines = [];

    // Header
    lines.push(`# Makefile for ${proj}`);
    lines.push(`# Generated by eastsea.xyz/tools/makefile-generator`);
    lines.push('');

    // Variables
    lines.push(`PROJECT  := ${proj}`);
    lines.push(`BINARY   := ${bin}`);
    lines.push(`SRC_DIR  := ${src}`);
    lines.push(`BUILD_DIR := ${build}`);
    if (useVersion) lines.push(`VERSION  := $(shell git describe --tags --always --dirty 2>/dev/null || echo "dev")`);
    if (useVerbose) lines.push(`VERBOSE  := 0`);

    if (lang === 'go') {
        lines.push(`GOOS     ?= $(shell go env GOOS)`);
        lines.push(`GOARCH   ?= $(shell go env GOARCH)`);
        lines.push(`LDFLAGS  := -ldflags "-s -w${useVersion ? ' -X main.Version=$(VERSION)' : ''}"`);
    } else if (lang === 'rust') {
        lines.push(`CARGO    := cargo`);
        lines.push(`TARGET   := target/release/$(BINARY)`);
    } else if (lang === 'cpp') {
        lines.push(`CC       := gcc`);
        lines.push(`CXX      := g++`);
        lines.push(`CXXFLAGS := -std=c++17 -Wall -Wextra -O2`);
        lines.push(`SOURCES  := $(wildcard $(SRC_DIR)/*.cpp)`);
        lines.push(`OBJECTS  := $(SOURCES:$(SRC_DIR)/%.cpp=$(BUILD_DIR)/%.o)`);
    } else if (lang === 'python') {
        lines.push(`PYTHON   := python3`);
        lines.push(`PIP      := pip3`);
        lines.push(`VENV     := .venv`);
    } else if (lang === 'nodejs') {
        lines.push(`NODE     := node`);
        lines.push(`NPM      := npm`);
    }

    if (useColor) {
        lines.push('');
        lines.push(`# Colors`);
        lines.push(`RED    := \\033[0;31m`);
        lines.push(`GREEN  := \\033[0;32m`);
        lines.push(`YELLOW := \\033[1;33m`);
        lines.push(`NC     := \\033[0m`);
    }

    if (useEnv) {
        lines.push('');
        lines.push(`# Load .env if exists`);
        lines.push(`-include .env`);
        lines.push(`export`);
    }

    lines.push('');

    // Default target
    if (useHelp) {
        lines.push(`.DEFAULT_GOAL := help`);
        lines.push('');
    }

    // Phony declaration
    const targets = [];
    if (useHelp) targets.push('help');
    if (wantInstall) targets.push('install');
    if (wantBuild) targets.push('build');
    if (wantRun) targets.push('run');
    if (wantTest) targets.push('test');
    if (wantLint) targets.push('lint');
    if (wantFmt) targets.push('fmt');
    if (wantBench) targets.push('bench');
    if (wantDocs) targets.push('docs');
    if (wantDocker) targets.push('docker-build', 'docker-run', 'docker-push');
    if (wantDeploy) targets.push('deploy');
    if (wantRelease) targets.push('release');
    if (wantClean) targets.push('clean');

    if (usePhony && targets.length > 0) {
        lines.push(`.PHONY: ${targets.join(' ')}`);
        lines.push('');
    }

    // Help target
    if (useHelp) {
        lines.push(`## help: Show this help message`);
        lines.push(`help:`);
        lines.push(`\t@echo "Usage: make [target]"`);
        lines.push(`\t@echo ""`);
        lines.push(`\t@sed -n 's/^## //p' $(MAKEFILE_LIST) | column -t -s ':' | sed -e 's/^/  /'`);
        lines.push('');
    }

    // Install
    if (wantInstall) {
        lines.push(`## install: Install dependencies`);
        lines.push(`install:`);
        if (lang === 'nodejs') lines.push(`\t$(NPM) install`);
        else if (lang === 'python') {
            lines.push(`\t$(PYTHON) -m venv $(VENV)`);
            lines.push(`\t$(VENV)/bin/pip install -r requirements.txt`);
        } else if (lang === 'go') lines.push(`\tgo mod download`);
        else if (lang === 'rust') lines.push(`\t$(CARGO) fetch`);
        else if (lang === 'cpp') lines.push(`\t@echo "No package manager — install system deps manually"`);
        else if (lang === 'docker') lines.push(`\t$(NPM) install`);
        lines.push('');
    }

    // Build
    if (wantBuild) {
        lines.push(`## build: Build the project`);
        lines.push(`build:`);
        if (lang === 'nodejs') {
            lines.push(`\t$(NPM) run build`);
        } else if (lang === 'python') {
            lines.push(`\t$(PYTHON) -m build`);
        } else if (lang === 'go') {
            lines.push(`\t@mkdir -p $(BUILD_DIR)`);
            lines.push(`\tCGO_ENABLED=0 go build $(LDFLAGS) -o $(BUILD_DIR)/$(BINARY) ./...`);
        } else if (lang === 'rust') {
            lines.push(`\t$(CARGO) build --release`);
        } else if (lang === 'cpp') {
            lines.push(`\t@mkdir -p $(BUILD_DIR)`);
            lines.push(`\t$(CXX) $(CXXFLAGS) $(SOURCES) -o $(BUILD_DIR)/$(BINARY)`);
        } else if (lang === 'docker') {
            lines.push(`\t$(NPM) run build`);
        }
        lines.push('');
    }

    // Run
    if (wantRun) {
        lines.push(`## run: Run the project`);
        lines.push(`run:`);
        if (lang === 'nodejs') lines.push(`\t$(NPM) start`);
        else if (lang === 'python') lines.push(`\t$(VENV)/bin/python -m $(PROJECT)`);
        else if (lang === 'go') lines.push(`\tgo run ./...`);
        else if (lang === 'rust') lines.push(`\t$(CARGO) run`);
        else if (lang === 'cpp') lines.push(`\t./$(BUILD_DIR)/$(BINARY)`);
        else if (lang === 'docker') lines.push(`\tdocker compose up`);
        lines.push('');
    }

    // Test
    if (wantTest) {
        lines.push(`## test: Run tests`);
        lines.push(`test:`);
        if (lang === 'nodejs') lines.push(`\t$(NPM) test`);
        else if (lang === 'python') lines.push(`\t$(VENV)/bin/pytest`);
        else if (lang === 'go') lines.push(`\tgo test -v -race ./...`);
        else if (lang === 'rust') lines.push(`\t$(CARGO) test`);
        else if (lang === 'cpp') lines.push(`\t$(CXX) $(CXXFLAGS) -DTEST $(SOURCES) -o $(BUILD_DIR)/test && ./$(BUILD_DIR)/test`);
        else if (lang === 'docker') lines.push(`\t$(NPM) test`);
        lines.push('');
    }

    // Lint
    if (wantLint) {
        lines.push(`## lint: Run linter`);
        lines.push(`lint:`);
        if (lang === 'nodejs') lines.push(`\t$(NPM) run lint`);
        else if (lang === 'python') lines.push(`\t$(VENV)/bin/flake8 $(SRC_DIR)`);
        else if (lang === 'go') lines.push(`\tgolangci-lint run ./...`);
        else if (lang === 'rust') lines.push(`\t$(CARGO) clippy -- -D warnings`);
        else if (lang === 'cpp') lines.push(`\tcppcheck --enable=all $(SRC_DIR)`);
        else if (lang === 'docker') lines.push(`\t$(NPM) run lint`);
        lines.push('');
    }

    // Format
    if (wantFmt) {
        lines.push(`## fmt: Format source code`);
        lines.push(`fmt:`);
        if (lang === 'nodejs') lines.push(`\t$(NPM) run format`);
        else if (lang === 'python') lines.push(`\t$(VENV)/bin/black $(SRC_DIR)`);
        else if (lang === 'go') lines.push(`\tgofmt -w .`);
        else if (lang === 'rust') lines.push(`\t$(CARGO) fmt`);
        else if (lang === 'cpp') lines.push(`\tclang-format -i $(SOURCES)`);
        else if (lang === 'docker') lines.push(`\t$(NPM) run format`);
        lines.push('');
    }

    // Bench
    if (wantBench) {
        lines.push(`## bench: Run benchmarks`);
        lines.push(`bench:`);
        if (lang === 'nodejs') lines.push(`\t$(NPM) run bench`);
        else if (lang === 'python') lines.push(`\t$(VENV)/bin/pytest --benchmark-only`);
        else if (lang === 'go') lines.push(`\tgo test -bench=. -benchmem ./...`);
        else if (lang === 'rust') lines.push(`\t$(CARGO) bench`);
        else if (lang === 'cpp') lines.push(`\t./$(BUILD_DIR)/$(BINARY) --bench`);
        else if (lang === 'docker') lines.push(`\t$(NPM) run bench`);
        lines.push('');
    }

    // Docs
    if (wantDocs) {
        lines.push(`## docs: Generate documentation`);
        lines.push(`docs:`);
        if (lang === 'nodejs') lines.push(`\tnpx typedoc`);
        else if (lang === 'python') lines.push(`\t$(VENV)/bin/sphinx-build docs docs/_build`);
        else if (lang === 'go') lines.push(`\tgodoc -http=:6060`);
        else if (lang === 'rust') lines.push(`\t$(CARGO) doc --open`);
        else if (lang === 'cpp') lines.push(`\tdoxygen Doxyfile`);
        else if (lang === 'docker') lines.push(`\tnpx typedoc`);
        lines.push('');
    }

    // Docker
    if (wantDocker) {
        const img = `$(PROJECT):$(${useVersion ? 'VERSION' : "'latest'"})`;
        lines.push(`## docker-build: Build Docker image`);
        lines.push(`docker-build:`);
        lines.push(`\tdocker build -t ${proj}:\${${useVersion?'VERSION':'shell echo latest'}} .`);
        lines.push('');
        lines.push(`## docker-run: Run Docker container`);
        lines.push(`docker-run:`);
        lines.push(`\tdocker run --rm -it -p 8080:8080 ${proj}:latest`);
        lines.push('');
        lines.push(`## docker-push: Push Docker image to registry`);
        lines.push(`docker-push: docker-build`);
        lines.push(`\tdocker push ${proj}:latest`);
        lines.push('');
    }

    // Deploy
    if (wantDeploy) {
        lines.push(`## deploy: Deploy to production`);
        lines.push(`deploy: build`);
        if (lang === 'nodejs' || lang === 'docker') {
            lines.push(`\t@echo "Deploying $(PROJECT) v$(VERSION)..."`);
            lines.push(`\tscp -r $(BUILD_DIR)/* user@server:/var/www/$(PROJECT)/`);
        } else if (lang === 'go') {
            lines.push(`\t@echo "Deploying $(BINARY) v$(VERSION)..."`);
            lines.push(`\tscp $(BUILD_DIR)/$(BINARY) user@server:/usr/local/bin/`);
        } else {
            lines.push(`\t@echo "Deploying $(PROJECT)..."`);
        }
        lines.push('');
    }

    // Release
    if (wantRelease) {
        lines.push(`## release: Create a release build`);
        lines.push(`release: clean build test`);
        lines.push(`\t@echo "Release $(${useVersion?'VERSION':'PROJECT'}) ready in $(BUILD_DIR)/"`);
        lines.push('');
    }

    // Clean
    if (wantClean) {
        lines.push(`## clean: Remove build artifacts`);
        lines.push(`clean:`);
        if (lang === 'nodejs') lines.push(`\trm -rf $(BUILD_DIR) node_modules/.cache`);
        else if (lang === 'python') lines.push(`\trm -rf $(BUILD_DIR) __pycache__ .pytest_cache *.egg-info`);
        else if (lang === 'go') lines.push(`\trm -rf $(BUILD_DIR)`);
        else if (lang === 'rust') lines.push(`\t$(CARGO) clean`);
        else if (lang === 'cpp') lines.push(`\trm -rf $(BUILD_DIR)`);
        else if (lang === 'docker') lines.push(`\trm -rf $(BUILD_DIR)`);
        lines.push('');
    }

    document.getElementById('output').value = lines.join('\n');
}

function copyOutput() {
    const text = document.getElementById('output').value;
    navigator.clipboard.writeText(text).then(() => showToast('📋 클립보드에 복사됨!'));
}

function downloadOutput() {
    const text = document.getElementById('output').value;
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Makefile';
    a.click(); URL.revokeObjectURL(url);
    showToast('💾 Makefile 다운로드 완료!');
}

function resetAll() {
    applyPreset('nodejs');
    document.getElementById('projectName').value = 'my-app';
    document.getElementById('binaryName').value = 'app';
    document.getElementById('srcDir').value = 'src';
    document.getElementById('buildDir').value = 'dist';
    generate();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

function toggleTheme() {
    const d = document.documentElement;
    d.dataset.theme = d.dataset.theme === 'dark' ? '' : 'dark';
    localStorage.setItem('theme', d.dataset.theme);
}

// Init
(function() {
    const t = localStorage.getItem('theme');
    if (t === 'dark') document.documentElement.dataset.theme = 'dark';
    generate();
})();
</script>
</body>
