<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="마크다운 프리뷰어 - 실시간으로 마크다운을 HTML로 변환하세요 무료 온라인 도구 | Free online tool at eastsea.monster" />
    <title>마크다운 프리뷰어 | Markdown Preview</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --code-bg: #f6f8fa;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #495057;
            --shadow: rgba(0, 0, 0, 0.3);
            --code-bg: #2d2d2d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px var(--shadow);
            transition: transform 0.2s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .split-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 200px);
        }

        .panel {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        #markdown-input {
            flex: 1;
            width: 100%;
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            transition: border-color 0.3s ease;
        }

        #markdown-input:focus {
            outline: none;
            border-color: #667eea;
        }

        #preview {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
        }

        /* Markdown Styling */
        #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }

        #preview h1 { font-size: 2em; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        #preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        #preview h3 { font-size: 1.25em; }
        #preview h4 { font-size: 1em; }

        #preview p {
            margin-bottom: 16px;
            line-height: 1.7;
        }

        #preview code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        #preview pre {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        #preview pre code {
            background: none;
            padding: 0;
        }

        #preview blockquote {
            border-left: 4px solid #667eea;
            padding-left: 16px;
            margin: 16px 0;
            color: var(--text-secondary);
        }

        #preview ul, #preview ol {
            margin-bottom: 16px;
            padding-left: 32px;
        }

        #preview li {
            margin-bottom: 8px;
        }

        #preview a {
            color: #667eea;
            text-decoration: none;
        }

        #preview a:hover {
            text-decoration: underline;
        }

        #preview table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 16px;
        }

        #preview th, #preview td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        #preview th {
            background: var(--bg-secondary);
            font-weight: 600;
        }

        #preview img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        #preview hr {
            border: none;
            border-top: 2px solid var(--border);
            margin: 24px 0;
        }

        @media (max-width: 1024px) {
            .split-view {
                grid-template-columns: 1fr;
                height: auto;
            }

            .panel {
                min-height: 400px;
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.5rem;
            }

            .panel {
                padding: 15px;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="container">
        <header>
            <h1>마크다운 프리뷰어</h1>
            <p style="color: var(--text-secondary);">실시간으로 마크다운을 HTML로 변환하세요</p>
        </header>

        <div class="controls">
            <button onclick="loadSample()">샘플 로드</button>
            <button onclick="copyMarkdown()" class="secondary">복사</button>
            <button onclick="downloadMarkdown()" class="secondary">다운로드</button>
            <button onclick="clearAll()" class="secondary">지우기</button>
        </div>

        <div class="split-view">
            <div class="panel">
                <div class="panel-title">📝 마크다운 입력</div>
                <textarea id="markdown-input" placeholder="# 제목

여기에 마크다운을 입력하세요..."></textarea>
            </div>

            <div class="panel">
                <div class="panel-title">👁️ 프리뷰</div>
                <div id="preview"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        marked.setOptions({
            breaks: true,
            gfm: true
        });

        function updatePreview() {
            const markdown = document.getElementById('markdown-input').value;
            const preview = document.getElementById('preview');
            
            if (!markdown.trim()) {
                preview.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">프리뷰가 여기에 표시됩니다...</p>';
                return;
            }

            try {
                preview.innerHTML = marked.parse(markdown);
            } catch (e) {
                preview.innerHTML = `<p style="color: red;">오류: ${e.message}</p>`;
            }
        }

        function loadSample() {
            const sample = `# 마크다운 샘플

## 텍스트 서식

**굵게**, *기울임*, ~~취소선~~, \`인라인 코드\`

## 목록

### 순서 없는 목록
- 항목 1
- 항목 2
  - 하위 항목 2.1
  - 하위 항목 2.2

### 순서 있는 목록
1. 첫 번째
2. 두 번째
3. 세 번째

## 링크와 이미지

[OpenAI](https://openai.com)

![Alt text](https://via.placeholder.com/300x150)

## 코드 블록

\`\`\`javascript
function hello() {
  console.log("Hello, World!");
}
\`\`\`

## 인용구

> 이것은 인용구입니다.
> 여러 줄로 작성할 수 있습니다.

## 표

| 이름 | 나이 | 직업 |
|------|------|------|
| 홍길동 | 30 | 개발자 |
| 김철수 | 25 | 디자이너 |

## 수평선

---

## 체크리스트

- [x] 완료된 항목
- [ ] 미완료 항목
- [ ] 또 다른 항목
`;
            document.getElementById('markdown-input').value = sample;
            updatePreview();
        }

        function copyMarkdown() {
            const textarea = document.getElementById('markdown-input');
            if (!textarea.value) {
                alert('복사할 내용이 없습니다.');
                return;
            }
            textarea.select();
            navigator.clipboard.writeText(textarea.value);
            showToast('마크다운이 복사되었습니다!');
        }

        function downloadMarkdown() {
            const markdown = document.getElementById('markdown-input').value;
            if (!markdown) {
                alert('다운로드할 내용이 없습니다.');
                return;
            }

            const blob = new Blob([markdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.md';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearAll() {
            document.getElementById('markdown-input').value = '';
            updatePreview();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 80px;
                right: 20px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 15px 25px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // Real-time preview
        document.getElementById('markdown-input').addEventListener('input', updatePreview);

        // Load saved content from localStorage
        const saved = localStorage.getItem('markdown-content');
        if (saved) {
            document.getElementById('markdown-input').value = saved;
            updatePreview();
        }

        // Auto-save
        document.getElementById('markdown-input').addEventListener('input', function() {
            localStorage.setItem('markdown-content', this.value);
        });

        // Initialize
        updatePreview();
    </script>

    <style>
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }
    </style>
</body>
</html>
