<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Markdown Table Aligner - Paste messy markdown tables and get clean, aligned output with configurable column alig 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>Markdown Table Aligner</title>
  <style>
    :root {
      --bg: #0d1221;
      --panel: #131c34;
      --panel2: #1b2745;
      --line: rgba(255,255,255,.14);
      --text: #edf2ff;
      --muted: #a8b2d6;
      --brand: #7f96ff;
      --accent: #45d1ff;
      --shadow: 0 20px 50px rgba(0,0,0,.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at 10% 6%, #243565 0, transparent 34%),
        radial-gradient(circle at 90% 2%, #18496b 0, transparent 30%),
        var(--bg);
    }
    .app {
      max-width: 1200px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
    }
    .head {
      padding: 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(127,150,255,.17), transparent);
    }
    h1 { margin: 0 0 6px; font-size: clamp(1.4rem, 3vw, 2rem); }
    .sub { margin: 0; color: var(--muted); }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,.1);
    }
    .btn, select, textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }
    .btn {
      padding: 9px 12px;
      cursor: pointer;
      transition: .15s ease;
    }
    .btn:hover { border-color: var(--brand); transform: translateY(-1px); }
    .btn.primary {
      background: linear-gradient(135deg, rgba(127,150,255,.36), rgba(69,209,255,.2));
      border-color: rgba(127,150,255,.65);
    }
    select {
      padding: 9px 10px;
      min-width: 170px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 620px;
    }
    .pane {
      display: grid;
      grid-template-rows: auto 1fr;
      border-right: 1px solid var(--line);
    }
    .pane:last-child { border-right: none; }
    .pane h2 {
      margin: 0;
      padding: 12px 14px;
      font-size: 1rem;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.02);
    }
    textarea {
      border: 0;
      border-radius: 0;
      width: 100%;
      resize: none;
      padding: 14px;
      line-height: 1.45;
      outline: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #0f1832;
    }

    .foot {
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.4;
      background: rgba(0,0,0,.12);
    }

    @media (max-width: 900px) {
      .split { grid-template-columns: 1fr; }
      .pane { border-right: none; border-bottom: 1px solid var(--line); }
      .pane:last-child { border-bottom: none; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="app">
    <header class="head">
      <h1>Markdown Table Aligner</h1>
      <p class="sub">Paste messy markdown tables and get clean, aligned output with configurable column alignment.</p>
    </header>

    <div class="toolbar">
      <button id="formatBtn" class="btn primary">Format Table</button>
      <button id="minifyBtn" class="btn">Minify</button>
      <button id="sampleBtn" class="btn">Load Sample</button>
      <button id="copyBtn" class="btn">Copy Output</button>
      <select id="defaultAlign" title="Default alignment for columns without delimiter hints">
        <option value="left">Default: Left</option>
        <option value="center">Default: Center</option>
        <option value="right">Default: Right</option>
      </select>
    </div>

    <section class="split">
      <div class="pane">
        <h2>Input</h2>
        <textarea id="input" placeholder="| name | score|country|\n|---|:---:|---:|\n|kim|98|KR|\n|lee|87|US|"></textarea>
      </div>
      <div class="pane">
        <h2>Output</h2>
        <textarea id="output" readonly placeholder="Formatted table will appear here"></textarea>
      </div>
    </section>

    <footer class="foot">
      Supports standard markdown pipe tables. If delimiter row is missing, a header + delimiter will be generated automatically.
    </footer>
  </main>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const defaultAlign = document.getElementById('defaultAlign');

    function parseLine(line) {
      let s = line.trim();
      if (s.startsWith('|')) s = s.slice(1);
      if (s.endsWith('|')) s = s.slice(0, -1);
      return s.split('|').map(c => c.trim());
    }

    function isDelimiterCell(c) {
      return /^:?-{3,}:?$/.test(c.trim());
    }

    function detectAlignment(cells) {
      return cells.map(c => {
        const t = c.trim();
        if (!isDelimiterCell(t)) return null;
        const left = t.startsWith(':');
        const right = t.endsWith(':');
        if (left && right) return 'center';
        if (right) return 'right';
        return 'left';
      });
    }

    function normalizeRows(raw) {
      const lines = raw.split(/\r?\n/).filter(l => l.trim());
      if (!lines.length) return {rows: [], align: []};
      const rows = lines.map(parseLine);

      const hasDelimiter = rows.length > 1 && rows[1].every(isDelimiterCell);
      const header = rows[0];
      const body = hasDelimiter ? rows.slice(2) : rows.slice(1);
      const maxCols = Math.max(...rows.map(r => r.length));

      const padded = [header, ...body].map(r => {
        const copy = [...r];
        while (copy.length < maxCols) copy.push('');
        return copy;
      });

      let align = hasDelimiter ? detectAlignment(rows[1]) : [];
      while (align.length < maxCols) align.push(defaultAlign.value);
      align = align.map(a => a || defaultAlign.value);

      return { rows: padded, align };
    }

    function padCell(text, width, align='left') {
      const s = String(text ?? '');
      if (align === 'right') return ' ' + s.padStart(width, ' ') + ' ';
      if (align === 'center') {
        const total = width - s.length;
        const left = Math.floor(total / 2);
        const right = total - left;
        return ' ' + ' '.repeat(left) + s + ' '.repeat(right) + ' ';
      }
      return ' ' + s.padEnd(width, ' ') + ' ';
    }

    function formatTable(raw) {
      const {rows, align} = normalizeRows(raw);
      if (!rows.length) return '';
      const cols = rows[0].length;
      const widths = Array.from({length: cols}, (_, i) => {
        let w = 3;
        rows.forEach(r => { w = Math.max(w, (r[i] || '').length); });
        return w;
      });

      const header = `|${rows[0].map((c,i)=>padCell(c,widths[i],align[i])).join('|')}|`;
      const divider = `|${widths.map((w,i) => {
        const d = '-'.repeat(w);
        if (align[i] === 'center') return `:${d}:`;
        if (align[i] === 'right') return `${d}:`;
        return `:${d}`;
      }).map(s => ` ${s} `).join('|')}|`;

      const body = rows.slice(1).map(r => `|${r.map((c,i)=>padCell(c,widths[i],align[i])).join('|')}|`);
      return [header, divider, ...body].join('\n');
    }

    function minifyTable(raw) {
      const {rows, align} = normalizeRows(raw);
      if (!rows.length) return '';
      const header = `|${rows[0].join('|')}|`;
      const divider = `|${align.map(a => a === 'center' ? ':---:' : a === 'right' ? '---:' : ':---').join('|')}|`;
      const body = rows.slice(1).map(r => `|${r.join('|')}|`);
      return [header, divider, ...body].join('\n');
    }

    document.getElementById('formatBtn').addEventListener('click', () => {
      output.value = formatTable(input.value);
    });

    document.getElementById('minifyBtn').addEventListener('click', () => {
      output.value = minifyTable(input.value);
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      if (!output.value.trim()) return;
      navigator.clipboard.writeText(output.value);
    });

    document.getElementById('sampleBtn').addEventListener('click', () => {
      input.value = `| Name| Role | Score| Country |
|---|:---:|---:|---|
| Kim | Developer|98|KR |
| Lee|Designer |87| US|
| Park| PM | 92 | JP |`;
      output.value = formatTable(input.value);
    });

    input.addEventListener('input', () => {
      if (!input.value.trim()) output.value = '';
    });

    defaultAlign.addEventListener('change', () => {
      if (input.value.trim()) output.value = formatTable(input.value);
    });
  </script>
</body>
</html>
