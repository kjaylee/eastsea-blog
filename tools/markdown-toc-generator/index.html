<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markdown TOC Generator - 마크다운 목차 생성기</title>
<meta name="description" content="마크다운 헤딩을 분석해 GitHub 스타일 Table of Contents(TOC)를 자동 생성합니다." />
<style>
:root {
  --bg: #f3f5ff;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --line: #e5e7eb;
  --accent: #4f46e5;
  --accent2: #06b6d4;
  --ok: #16a34a;
  --shadow: 0 10px 30px rgba(79, 70, 229, 0.12);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
  background: radial-gradient(circle at 20% 0%, #eef2ff 0, #f8fafc 45%, #eef2ff 100%);
  color: var(--text);
}
.wrap { max-width: 1100px; margin: 0 auto; padding: 20px 14px 28px; }
.hero {
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  color: #fff;
  border-radius: 18px;
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
}
.hero h1 { margin: 0 0 6px; font-size: 1.4rem; }
.hero p { margin: 0; opacity: .95; font-size: .95rem; }
.grid { display: grid; grid-template-columns: 1.2fr .8fr; gap: 14px; }
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 5px 18px rgba(15, 23, 42, .06);
}
label { display: block; font-size: .83rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
textarea, input, select {
  width: 100%;
  border: 1px solid #d1d5db;
  background: #fff;
  color: var(--text);
  border-radius: 10px;
  padding: 10px 11px;
  font: inherit;
}
textarea { min-height: 240px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; line-height: 1.45; }
.row { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; }
.inline { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
button {
  border: none;
  border-radius: 10px;
  padding: 9px 12px;
  font-weight: 700;
  cursor: pointer;
  background: #e5e7eb;
  color: #111827;
}
button.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
button.ghost { background: #eef2ff; color: #3730a3; }
.stats { display: flex; gap: 10px; flex-wrap: wrap; margin: 8px 0 0; }
.badge {
  background: #f8fafc;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px 10px;
  font-size: .78rem;
  color: var(--muted);
}
.check { display: flex; align-items: center; gap: 6px; font-size: .85rem; color: var(--muted); margin-top: 8px; }
.check input { width: 16px; height: 16px; }
#status { font-size: .85rem; color: var(--ok); min-height: 1.2em; margin-top: 6px; }
small.help { color: var(--muted); display: block; margin-top: 8px; line-height: 1.4; }
@media (max-width: 860px) {
  .grid { grid-template-columns: 1fr; }
  textarea { min-height: 200px; }
}
</style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>📚 Markdown TOC Generator</h1>
      <p>문서의 헤딩(# ~ ######)을 분석해 GitHub 스타일 목차를 생성합니다.</p>
    </section>

    <div class="grid">
      <section class="card">
        <label for="md">Markdown 원문</label>
        <textarea id="md" spellcheck="false"># 프로젝트 문서

## 소개
### 목표
### 범위

## 설치 방법
### 요구사항
### 빠른 시작

## FAQ
### 자주 묻는 질문 1
### 자주 묻는 질문 2</textarea>
        <div class="inline">
          <button class="primary" id="generate">목차 생성</button>
          <button id="clear">초기화</button>
          <button class="ghost" id="sample">샘플 넣기</button>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <div>
            <label for="minLevel">최소 헤딩 레벨</label>
            <select id="minLevel"><option>1</option><option selected>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select>
          </div>
          <div>
            <label for="maxLevel">최대 헤딩 레벨</label>
            <select id="maxLevel"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option><option>6</option></select>
          </div>
        </div>

        <div class="check"><input id="ordered" type="checkbox" /> <label for="ordered" style="margin:0">번호 목록(Ordered List) 사용</label></div>
        <div class="check"><input id="links" type="checkbox" checked /> <label for="links" style="margin:0">링크 앵커 포함</label></div>
        <div class="check"><input id="tight" type="checkbox" /> <label for="tight" style="margin:0">들여쓰기 간격 2칸(기본 4칸)</label></div>

        <label for="out" style="margin-top:10px">생성된 목차</label>
        <textarea id="out" spellcheck="false"></textarea>

        <div class="inline">
          <button class="primary" id="copy">복사</button>
          <button id="download">.md 다운로드</button>
        </div>
        <div id="status"></div>
        <div class="stats" id="stats"></div>
        <small class="help">GitHub 슬러그 규칙과 유사하게 앵커를 생성하며, 중복 헤딩은 -1, -2 접미사를 붙입니다.</small>
      </section>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const els = {
  md: $('md'), out: $('out'), min: $('minLevel'), max: $('maxLevel'),
  ordered: $('ordered'), links: $('links'), tight: $('tight'),
  status: $('status'), stats: $('stats')
};

function slugify(text){
  return text
    .toLowerCase()
    .trim()
    .replace(/<[^>]*>/g, '')
    .replace(/["'`~!@#$%^&*()+={}\[\]|\\:;,.?<>]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-');
}

function parseHeadings(markdown){
  const lines = markdown.split(/\r?\n/);
  const headings = [];
  for (const line of lines) {
    const m = line.match(/^(#{1,6})\s+(.+?)\s*$/);
    if (!m) continue;
    const level = m[1].length;
    const text = m[2].replace(/\s+#*\s*$/, '').trim();
    headings.push({ level, text });
  }
  return headings;
}

function buildTOC(){
  const minL = +els.min.value;
  const maxL = +els.max.value;
  if (minL > maxL){
    els.status.textContent = '최소 레벨은 최대 레벨보다 클 수 없습니다.';
    return;
  }

  const seen = new Map();
  const all = parseHeadings(els.md.value);
  const targets = all.filter(h => h.level >= minL && h.level <= maxL);

  const indentSize = els.tight.checked ? 2 : 4;
  const list = targets.map((h, i) => {
    const base = slugify(h.text) || 'section';
    const n = seen.get(base) || 0;
    seen.set(base, n + 1);
    const anchor = n === 0 ? base : `${base}-${n}`;

    const depth = h.level - minL;
    const indent = ' '.repeat(Math.max(depth,0) * indentSize);
    const bullet = els.ordered.checked ? `${i + 1}.` : '-';
    const label = els.links.checked ? `[${h.text}](#${anchor})` : h.text;
    return `${indent}${bullet} ${label}`;
  });

  els.out.value = list.join('\n');
  els.stats.innerHTML = `
    <span class="badge">총 헤딩 ${all.length}개</span>
    <span class="badge">목차 항목 ${targets.length}개</span>
    <span class="badge">레벨 H${minL}~H${maxL}</span>
  `;
  els.status.textContent = targets.length ? '목차를 생성했습니다.' : '선택한 레벨에 해당하는 헤딩이 없습니다.';
  save();
}

function save(){
  const payload = {
    md: els.md.value,
    min: els.min.value,
    max: els.max.value,
    ordered: els.ordered.checked,
    links: els.links.checked,
    tight: els.tight.checked
  };
  localStorage.setItem('md-toc-generator-v1', JSON.stringify(payload));
}

function load(){
  const raw = localStorage.getItem('md-toc-generator-v1');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    els.md.value = d.md ?? els.md.value;
    els.min.value = d.min ?? '2';
    els.max.value = d.max ?? '3';
    els.ordered.checked = !!d.ordered;
    els.links.checked = d.links !== false;
    els.tight.checked = !!d.tight;
  } catch(_){}
}

$('generate').addEventListener('click', buildTOC);
$('clear').addEventListener('click', () => { els.md.value=''; els.out.value=''; els.stats.innerHTML=''; els.status.textContent=''; save(); });
$('sample').addEventListener('click', () => {
  els.md.value = `# API Guide\n\n## Authentication\n### Access Token\n### Refresh Token\n\n## Endpoints\n### GET /users\n### POST /users\n\n## Errors\n### 400 Bad Request\n### 401 Unauthorized`;
  buildTOC();
});
$('copy').addEventListener('click', async () => {
  if (!els.out.value.trim()) return;
  await navigator.clipboard.writeText(els.out.value);
  els.status.textContent = '목차를 클립보드에 복사했습니다.';
});
$('download').addEventListener('click', () => {
  const blob = new Blob([els.out.value || ''], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'table-of-contents.md';
  a.click();
  URL.revokeObjectURL(a.href);
});

['input','change'].forEach(evt => {
  [els.md, els.min, els.max, els.ordered, els.links, els.tight].forEach(el => el.addEventListener(evt, () => { save(); if (evt==='change') buildTOC(); }));
});

load();
buildTOC();
</script>
</body>
</html>
