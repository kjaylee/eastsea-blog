<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Budget Allocation Planner | 마케팅 예산 배분 플래너</title>
  <meta name="description" content="채널별 ROAS, 집행한도, 신뢰도를 기반으로 마케팅 예산을 자동 배분하고 기대 매출·순이익·ROI를 계산합니다." />
  <style>
    :root{--bg:#f3f6fb;--card:#fff;--line:#d5dff1;--text:#101c34;--muted:#647694;--pri:#3366ff;--soft:#ebf1ff;--ok:#059669;--warn:#d97706;--bad:#dc2626}
    @media (prefers-color-scheme: dark){
      :root{--bg:#0a1220;--card:#0f1a30;--line:#243657;--text:#e7eeff;--muted:#9bb0d3;--pri:#7d9eff;--soft:#14223d;--ok:#34d399;--warn:#fbbf24;--bad:#f87171}
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}
    .wrap{max-width:1180px;margin:0 auto;padding:20px 14px 56px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.25rem,2.7vw,1.8rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.94rem;line-height:1.45}
    .home{white-space:nowrap;border:1px solid var(--line);border-radius:12px;padding:9px 12px;text-decoration:none;color:var(--text);background:var(--card)}
    .grid{display:grid;grid-template-columns:1.12fr .88fr;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
    h2{margin:0 0 10px;font-size:1rem}
    .topInputs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px 11px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:.92rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right;vertical-align:middle}
    th:first-child,td:first-child{text-align:left}
    th{color:var(--muted);font-weight:700}
    .cellInput{width:100%;min-width:74px;padding:8px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text)}
    .nameInput{min-width:90px}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{border:none;background:var(--pri);color:#fff;font-weight:700;cursor:pointer}
    .ghost{background:var(--soft);color:var(--text);border:1px solid var(--line);font-weight:600}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid rgba(220,38,38,.4);background:rgba(220,38,38,.08);color:var(--bad);font-size:.86rem}
    .error.show{display:block}
    textarea{min-height:88px;margin-top:10px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{padding:10px;border-radius:12px;border:1px solid var(--line);background:linear-gradient(180deg,var(--card),var(--soft))}
    .k{font-size:.77rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800}
    .pill{display:inline-flex;align-items:center;gap:7px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:var(--soft);font-size:.78rem;margin-top:10px}
    .up{color:var(--ok)}.mid{color:var(--warn)}.down{color:var(--bad)}
    .deltaPlus{color:var(--ok);font-weight:700}.deltaMinus{color:var(--bad);font-weight:700}
    @media(max-width:980px){.grid{grid-template-columns:1fr}.topInputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📊 마케팅 예산 배분 플래너</h1>
        <div class="sub">채널별 <strong>예상 ROAS × 신뢰도</strong> 기반으로 예산을 재배분해, 기대 순이익과 개선 효과를 빠르게 검토합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>기본 설정</h2>
        <div class="topInputs">
          <div><label for="totalBudget">총 월 예산 (KRW)</label><input id="totalBudget" type="number" min="0" value="20000000"></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="0" max="100" step="0.1" value="55"></div>
          <div><label for="fixedCost">월 고정 운영비 (KRW)</label><input id="fixedCost" type="number" min="0" value="2500000"></div>
        </div>

        <h2 style="margin-top:12px">채널 입력 (최대 5개)</h2>
        <table>
          <thead>
            <tr>
              <th>채널</th>
              <th>현재 예산</th>
              <th>예상 ROAS</th>
              <th>집행한도</th>
              <th>신뢰도(%)</th>
            </tr>
          </thead>
          <tbody id="channelBody"></tbody>
        </table>

        <div class="btns">
          <button class="ghost" type="button" id="copyBtn">요약 복사</button>
          <button type="button" id="resetBtn">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>추천 배분 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">추천안 총매출</div><div id="recRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">추천안 순이익</div><div id="recNet" class="v">-</div></div>
          <div class="kpi"><div class="k">추천안 ROI</div><div id="recRoi" class="v">-</div></div>
          <div class="kpi"><div class="k">추천안 블렌디드 ROAS</div><div id="recRoas" class="v">-</div></div>
          <div class="kpi"><div class="k">기존 대비 순이익 변화</div><div id="deltaNet" class="v">-</div></div>
          <div class="kpi"><div class="k">미배정 예산</div><div id="remaining" class="v">-</div></div>
        </div>

        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">채널별 배분 상세</h2>
        <table>
          <thead><tr><th>채널</th><th>현재 예산</th><th>추천 예산</th><th>증감</th><th>예상 매출</th></tr></thead>
          <tbody id="resultBody"></tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const channelDefaults = [
      {name:'검색광고', current:7000000, roas:4.2, cap:9000000, conf:85},
      {name:'메타 광고', current:5000000, roas:3.4, cap:7500000, conf:75},
      {name:'유튜브', current:3000000, roas:2.8, cap:5500000, conf:65},
      {name:'인플루언서', current:2500000, roas:3.1, cap:4500000, conf:60},
      {name:'CRM 리타겟팅', current:2500000, roas:5.6, cap:4200000, conf:92}
    ];

    const $ = (id)=>document.getElementById(id);
    const refs = {
      totalBudget:$('totalBudget'), margin:$('margin'), fixedCost:$('fixedCost'), channelBody:$('channelBody'),
      recRevenue:$('recRevenue'), recNet:$('recNet'), recRoi:$('recRoi'), recRoas:$('recRoas'), deltaNet:$('deltaNet'), remaining:$('remaining'),
      resultBody:$('resultBody'), status:$('status'), error:$('error'), summary:$('summary'), copyBtn:$('copyBtn'), resetBtn:$('resetBtn')
    };

    const won = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function renderChannelRows(){
      refs.channelBody.innerHTML = channelDefaults.map((c,i)=>`
        <tr>
          <td><input class="cellInput nameInput" data-k="name" data-i="${i}" value="${c.name}"></td>
          <td><input class="cellInput" data-k="current" data-i="${i}" type="number" min="0" value="${c.current}"></td>
          <td><input class="cellInput" data-k="roas" data-i="${i}" type="number" min="0" step="0.1" value="${c.roas}"></td>
          <td><input class="cellInput" data-k="cap" data-i="${i}" type="number" min="0" value="${c.cap}"></td>
          <td><input class="cellInput" data-k="conf" data-i="${i}" type="number" min="0" max="100" value="${c.conf}"></td>
        </tr>
      `).join('');
    }

    function readChannels(){
      const rows = [...refs.channelBody.querySelectorAll('tr')];
      return rows.map((row)=>{
        const get = (k)=>row.querySelector(`[data-k="${k}"]`).value;
        return {
          name:get('name').trim() || '채널',
          current:Number(get('current')),
          roas:Number(get('roas')),
          cap:Number(get('cap')),
          conf:Number(get('conf'))
        };
      });
    }

    function validate(v, channels){
      if (!Number.isFinite(v.totalBudget) || v.totalBudget <= 0) return '총 월 예산은 0보다 커야 합니다.';
      if (!Number.isFinite(v.margin) || v.margin < 0 || v.margin > 100) return '매출총이익률은 0~100 범위여야 합니다.';
      if (!Number.isFinite(v.fixedCost) || v.fixedCost < 0) return '고정 운영비는 0 이상이어야 합니다.';
      for (const c of channels){
        if (!Number.isFinite(c.current) || c.current < 0) return `${c.name}: 현재 예산은 0 이상이어야 합니다.`;
        if (!Number.isFinite(c.roas) || c.roas < 0) return `${c.name}: 예상 ROAS는 0 이상이어야 합니다.`;
        if (!Number.isFinite(c.cap) || c.cap < 0) return `${c.name}: 집행한도는 0 이상이어야 합니다.`;
        if (!Number.isFinite(c.conf) || c.conf < 0 || c.conf > 100) return `${c.name}: 신뢰도는 0~100 범위여야 합니다.`;
      }
      if (channels.every(c => c.cap === 0)) return '모든 채널 집행한도가 0이면 배분할 수 없습니다.';
      return '';
    }

    function allocate(totalBudget, channels){
      const rec = channels.map(()=>0);
      let remaining = totalBudget;
      let guard = 0;

      while (remaining > 1 && guard < 30){
        guard += 1;
        const actives = channels.map((c,i)=>({i,w:Math.max(0.01,c.roas*(c.conf/100))})).filter(({i})=>rec[i] + 1 < channels[i].cap);
        if (!actives.length) break;
        const wSum = actives.reduce((s,a)=>s+a.w,0);
        let moved = 0;

        for (const a of actives){
          const idx = a.i;
          const share = a.w / wSum;
          const add = Math.min(remaining * share, channels[idx].cap - rec[idx]);
          rec[idx] += add;
          moved += add;
        }
        if (moved < 1) break;
        remaining -= moved;
      }

      return {rec, remaining};
    }

    function calcRevenue(channels, budgets){
      return channels.reduce((sum,c,i)=>sum + budgets[i] * c.roas, 0);
    }

    function render(){
      const v = { totalBudget:Number(refs.totalBudget.value), margin:Number(refs.margin.value), fixedCost:Number(refs.fixedCost.value) };
      const channels = readChannels();
      const err = validate(v, channels);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        refs.summary.value='';
        refs.status.textContent='입력값을 확인하세요';
        refs.resultBody.innerHTML='';
        ['recRevenue','recNet','recRoi','recRoas','deltaNet','remaining'].forEach(k=>refs[k].textContent='-');
        return;
      }

      const marginRate = v.margin / 100;
      const currentBudgets = channels.map(c=>c.current);
      const curRevenue = calcRevenue(channels, currentBudgets);
      const curNet = curRevenue * marginRate - currentBudgets.reduce((s,n)=>s+n,0) - v.fixedCost;

      const alloc = allocate(v.totalBudget, channels);
      const recRevenueNum = calcRevenue(channels, alloc.rec);
      const recNetNum = recRevenueNum * marginRate - v.totalBudget - v.fixedCost;
      const recRoiNum = (recNetNum / (v.totalBudget + v.fixedCost)) * 100;
      const recRoasNum = recRevenueNum / v.totalBudget;
      const deltaNetNum = recNetNum - curNet;

      refs.recRevenue.textContent = won(recRevenueNum);
      refs.recNet.textContent = won(recNetNum);
      refs.recRoi.textContent = `${num(recRoiNum,1)}%`;
      refs.recRoas.textContent = `${num(recRoasNum,2)}x`;
      refs.deltaNet.textContent = won(deltaNetNum);
      refs.deltaNet.className = `v ${deltaNetNum >= 0 ? 'deltaPlus' : 'deltaMinus'}`;
      refs.remaining.textContent = won(alloc.remaining);

      refs.status.innerHTML = recNetNum > curNet
        ? `<span class="up">●</span> 추천안이 기존안보다 순이익이 높습니다`
        : recNetNum === curNet
          ? `<span class="mid">●</span> 기존안과 추천안 수익성이 유사합니다`
          : `<span class="down">●</span> 현재 입력 기준으로 기존안이 더 유리합니다`;

      refs.resultBody.innerHTML = channels.map((c,i)=>{
        const delta = alloc.rec[i] - c.current;
        const deltaCls = delta >= 0 ? 'deltaPlus' : 'deltaMinus';
        return `<tr>
          <td>${c.name}</td>
          <td>${won(c.current)}</td>
          <td>${won(alloc.rec[i])}</td>
          <td class="${deltaCls}">${delta>=0?'+':''}${won(delta)}</td>
          <td>${won(alloc.rec[i] * c.roas)}</td>
        </tr>`;
      }).join('');

      refs.summary.value = [
        '[마케팅 예산 배분 요약]',
        `총 예산: ${won(v.totalBudget)}`,
        `매출총이익률: ${num(v.margin,1)}%`,
        `추천안 매출: ${won(recRevenueNum)}`,
        `추천안 순이익: ${won(recNetNum)}`,
        `추천안 ROI: ${num(recRoiNum,1)}%`,
        `블렌디드 ROAS: ${num(recRoasNum,2)}x`,
        `기존 대비 순이익 변화: ${won(deltaNetNum)}`,
        `미배정 예산: ${won(alloc.remaining)}`,
        '--- 채널별 추천 예산 ---',
        ...channels.map((c,i)=>`${c.name}: ${won(alloc.rec[i])}`)
      ].join('\n');
    }

    refs.copyBtn.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약을 복사했습니다.'); }
      catch { alert('클립보드 권한이 없어 수동 복사가 필요합니다.'); }
    });

    refs.resetBtn.addEventListener('click', ()=>{
      refs.totalBudget.value = 20000000;
      refs.margin.value = 55;
      refs.fixedCost.value = 2500000;
      renderChannelRows();
      bindRowEvents();
      render();
    });

    function bindRowEvents(){
      refs.channelBody.querySelectorAll('input').forEach((el)=>{
        ['input','change'].forEach((ev)=>el.addEventListener(ev, render));
      });
    }

    ['input','change'].forEach((ev)=>{
      [refs.totalBudget, refs.margin, refs.fixedCost].forEach((el)=>el.addEventListener(ev, render));
    });

    renderChannelRows();
    bindRowEvents();
    render();
  </script>
</body>
</html>
