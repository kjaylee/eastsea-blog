<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing ROI Calculator | 마케팅 ROI 계산기</title>
  <meta name="description" content="광고비, 클릭, 전환, 객단가를 기반으로 매출·순이익·ROI·ROAS·CPA를 계산하고 손익분기 전환수를 추정하는 마케팅 ROI 계산기" />
  <style>
    :root{--bg:#081124;--card:#111d38;--line:#2c3f69;--txt:#ebf2ff;--muted:#9fb2d3;--pri:#6b8dff;--err:#f87171;--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#243b73 0%,#081124 48%);color:var(--txt)}
    .wrap{max-width:1060px;margin:0 auto;padding:20px 14px 60px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#dbe7ff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#101a34;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#17264b,#111d38);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1831;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5b73ea);font-weight:700}
    .soft{background:#172750;border:1px solid var(--line);font-weight:600}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:98px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);border-radius:11px;padding:10px;background:#0f1934}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.16rem;font-weight:800}
    .v.sm{font-size:1.02rem}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);font-size:.75rem;background:#14234a;color:#bed0f1;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📣 마케팅 ROI 계산기</h1>
        <div class="sub">광고 캠페인의 매출/이익성과를 즉시 계산해 예산 유지·확대·중단 의사결정을 지원합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="adSpend">광고비 (KRW)</label><input id="adSpend" type="number" min="0" value="1500000" /></div>
          <div><label for="clicks">클릭 수</label><input id="clicks" type="number" min="1" value="12000" /></div>
          <div><label for="conversions">전환 수</label><input id="conversions" type="number" min="0" value="360" /></div>
          <div><label for="aov">객단가 AOV (KRW)</label><input id="aov" type="number" min="1" value="85000" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="0.1" max="100" step="0.1" value="58" /></div>
          <div><label for="fixedCost">추가 고정비 (KRW)</label><input id="fixedCost" type="number" min="0" value="300000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">총매출</div><div id="revenue" class="v">-</div></div>
          <div class="kpi"><div class="k">순이익</div><div id="netProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">ROAS</div><div id="roas" class="v sm">-</div></div>
          <div class="kpi"><div class="k">CPA</div><div id="cpa" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 전환수</div><div id="beConv" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">성과 해석 대기</div>

        <h2 style="margin-top:12px">핵심 계산 근거</h2>
        <table>
          <tbody>
            <tr><th>매출총이익</th><td id="grossProfit">-</td></tr>
            <tr><th>총투자비(광고+고정비)</th><td id="totalCost">-</td></tr>
            <tr><th>전환율 (CVR)</th><td id="cvr">-</td></tr>
            <tr><th>클릭당 비용 (CPC)</th><td id="cpc">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      adSpend: $('adSpend'), clicks: $('clicks'), conversions: $('conversions'), aov: $('aov'), margin: $('margin'), fixedCost: $('fixedCost'),
      revenue: $('revenue'), netProfit: $('netProfit'), roi: $('roi'), roas: $('roas'), cpa: $('cpa'), beConv: $('beConv'),
      grossProfit: $('grossProfit'), totalCost: $('totalCost'), cvr: $('cvr'), cpc: $('cpc'),
      error: $('error'), summary: $('summary'), status: $('status'), copy: $('copy'), reset: $('reset')
    };

    const defaults = { adSpend:1500000, clicks:12000, conversions:360, aov:85000, margin:58, fixedCost:300000 };
    const money = (n)=> new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=> Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.adSpend) || v.adSpend < 0) return '광고비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.clicks) || v.clicks <= 0) return '클릭 수는 1 이상이어야 합니다.';
      if (!Number.isFinite(v.conversions) || v.conversions < 0) return '전환 수는 0 이상이어야 합니다.';
      if (v.conversions > v.clicks) return '전환 수는 클릭 수를 초과할 수 없습니다.';
      if (!Number.isFinite(v.aov) || v.aov <= 0) return '객단가(AOV)는 0보다 커야 합니다.';
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return '매출총이익률은 0~100 범위(0 제외)여야 합니다.';
      if (!Number.isFinite(v.fixedCost) || v.fixedCost < 0) return '추가 고정비는 0 이상이어야 합니다.';
      if (v.adSpend === 0 && v.fixedCost === 0) return 'ROI 계산을 위해 광고비 또는 고정비 중 하나 이상 필요합니다.';
      return '';
    }

    function compute(v){
      const revenue = v.conversions * v.aov;
      const grossProfit = revenue * (v.margin / 100);
      const totalCost = v.adSpend + v.fixedCost;
      const netProfit = grossProfit - totalCost;
      const roi = (netProfit / totalCost) * 100;
      const roas = v.adSpend === 0 ? Infinity : revenue / v.adSpend;
      const cpa = v.conversions === 0 ? null : v.adSpend / v.conversions;
      const beConv = Math.ceil(totalCost / (v.aov * (v.margin/100)));
      const cvr = (v.conversions / v.clicks) * 100;
      const cpc = v.adSpend / v.clicks;
      return { revenue, grossProfit, totalCost, netProfit, roi, roas, cpa, beConv, cvr, cpc };
    }

    function render(){
      const v = {
        adSpend: Number(refs.adSpend.value), clicks: Number(refs.clicks.value), conversions: Number(refs.conversions.value),
        aov: Number(refs.aov.value), margin: Number(refs.margin.value), fixedCost: Number(refs.fixedCost.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;
      if (err){
        ['revenue','netProfit','roi','roas','cpa','beConv','grossProfit','totalCost','cvr','cpc'].forEach(k=>refs[k].textContent='-');
        refs.status.textContent = '입력값을 확인하세요';
        refs.summary.value = '';
        return;
      }

      const r = compute(v);
      refs.revenue.textContent = money(r.revenue);
      refs.netProfit.textContent = money(r.netProfit);
      refs.roi.textContent = `${num(r.roi,1)}%`;
      refs.roas.textContent = Number.isFinite(r.roas) ? `${num(r.roas,2)}x` : '∞';
      refs.cpa.textContent = r.cpa === null ? 'N/A' : money(r.cpa);
      refs.beConv.textContent = `${num(r.beConv,0)}건`;

      refs.grossProfit.textContent = money(r.grossProfit);
      refs.totalCost.textContent = money(r.totalCost);
      refs.cvr.textContent = `${num(r.cvr,2)}%`;
      refs.cpc.textContent = money(r.cpc);

      const level = r.roi >= 30 ? 'good' : (r.roi >= 0 ? 'warn' : '');
      refs.status.innerHTML = level === 'good'
        ? `<span class="ok">●</span> ROI ${num(r.roi,1)}% (확장 후보)`
        : level === 'warn'
          ? `<span class="warn">●</span> ROI ${num(r.roi,1)}% (개선 필요)`
          : `● ROI ${num(r.roi,1)}% (재설계 권고)`;

      refs.summary.value = [
        '[Marketing ROI 요약]',
        `총매출: ${money(r.revenue)}`,
        `매출총이익: ${money(r.grossProfit)}`,
        `순이익: ${money(r.netProfit)}`,
        `ROI: ${num(r.roi,1)}%`,
        `ROAS: ${Number.isFinite(r.roas) ? num(r.roas,2)+'x' : '∞'}`,
        `CPA: ${r.cpa===null ? 'N/A' : money(r.cpa)}`,
        `손익분기 전환수: ${num(r.beConv,0)}건`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.adSpend,refs.clicks,refs.conversions,refs.aov,refs.margin,refs.fixedCost].forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
