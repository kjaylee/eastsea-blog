<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Buyer Membership Uplift Calculator | 마켓플레이스 구매자 멤버십 수익 계산기</title>
  <meta name="description" content="멤버십 가입률 확대 시 멤버십 구독 순수익과 주문 빈도 uplift를 반영해 월 순이익, ROI, 손익분기 가입률을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🛍️ 마켓플레이스 구매자 멤버십 수익 계산기</h1>
        <div class="sub" id="subtitle">멤버십 가입률 확대에 따른 구독 순수익 + 주문 공헌이익 상승을 합산해 ROI를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_buyers" for="buyers"></label><input id="buyers" type="number" min="1" value="320000"></div>
          <div><label id="l_currentPen" for="currentPen"></label><input id="currentPen" type="number" min="0" max="100" step="0.1" value="4"></div>
          <div><label id="l_targetPen" for="targetPen"></label><input id="targetPen" type="number" min="0" max="100" step="0.1" value="9"></div>
          <div><label id="l_membershipFee" for="membershipFee"></label><input id="membershipFee" type="number" min="0" step="100" value="4900"></div>
          <div><label id="l_baseOrders" for="baseOrders"></label><input id="baseOrders" type="number" min="0" step="0.01" value="1.1"></div>
          <div><label id="l_orderUplift" for="orderUplift"></label><input id="orderUplift" type="number" min="0" max="1000" step="0.1" value="24"></div>
          <div><label id="l_aov" for="aov"></label><input id="aov" type="number" min="0" step="100" value="39000"></div>
          <div><label id="l_contribMargin" for="contribMargin"></label><input id="contribMargin" type="number" min="0" max="100" step="0.1" value="21"></div>
          <div><label id="l_paymentFee" for="paymentFee"></label><input id="paymentFee" type="number" min="0" max="100" step="0.1" value="3.2"></div>
          <div><label id="l_perkCost" for="perkCost"></label><input id="perkCost" type="number" min="0" step="100" value="1300"></div>
          <div><label id="l_fixedCost" for="fixedCost"></label><input id="fixedCost" type="number" min="0" step="10000" value="5000000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="8000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_newMembers"></div><div class="v" id="newMembers">-</div></div>
          <div class="kpi"><div class="k" id="k_memberNet"></div><div class="v" id="memberNet">-</div></div>
          <div class="kpi"><div class="k" id="k_orderUpliftProfit"></div><div class="v" id="orderUpliftProfit">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_perMemberTotal"></th><td id="perMemberTotal">-</td></tr>
          <tr><th id="d_breakEvenPen"></th><td id="breakEvenPen">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_programCost"></th><td id="programCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={buyers:$("buyers"),currentPen:$("currentPen"),targetPen:$("targetPen"),membershipFee:$("membershipFee"),baseOrders:$("baseOrders"),orderUplift:$("orderUplift"),aov:$("aov"),contribMargin:$("contribMargin"),paymentFee:$("paymentFee"),perkCost:$("perkCost"),fixedCost:$("fixedCost"),setup:$("setup"),months:$("months"),newMembers:$("newMembers"),memberNet:$("memberNet"),orderUpliftProfit:$("orderUpliftProfit"),monthlyNet:$("monthlyNet"),periodNet:$("periodNet"),roi:$("roi"),perMemberTotal:$("perMemberTotal"),breakEvenPen:$("breakEvenPen"),payback:$("payback"),programCost:$("programCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={buyers:320000,currentPen:4,targetPen:9,membershipFee:4900,baseOrders:1.1,orderUplift:24,aov:39000,contribMargin:21,paymentFee:3.2,perkCost:1300,fixedCost:5000000,setup:8000000,months:12};
    const I18N={
      ko:{title:"🛍️ 마켓플레이스 구매자 멤버십 수익 계산기",subtitle:"멤버십 가입률 확대에 따른 구독 순수익 + 주문 공헌이익 상승을 합산해 ROI를 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_buyers:"월 활성 구매자 수",l_currentPen:"현재 멤버십 가입률 (%)",l_targetPen:"목표 멤버십 가입률 (%)",l_membershipFee:"멤버십 월 구독료 (₩)",l_baseOrders:"비회원 1인당 월 주문수",l_orderUplift:"회원 주문수 uplift (%)",l_aov:"평균 주문금액 AOV (₩)",l_contribMargin:"주문당 공헌이익률 (%)",l_paymentFee:"멤버십 결제 수수료율 (%)",l_perkCost:"멤버십 혜택 원가 (회원당 월, ₩)",l_fixedCost:"월 고정 운영비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_newMembers:"순증 멤버 수",k_memberNet:"멤버십 순수익(월)",k_orderUpliftProfit:"추가 주문 공헌이익(월)",k_monthlyNet:"월 순증 순이익",k_periodNet:"기간 순효과",k_roi:"ROI",d_perMemberTotal:"순증 회원 1인당 월 총기여",d_breakEvenPen:"손익분기 목표 가입률",d_payback:"회수기간",d_programCost:"기간 총 프로그램비",ok:"멤버십 수익성 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 구매자 수/기간은 1 이상이어야 합니다.",logicErr:"목표 가입률은 현재 가입률 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[구매자 멤버십 수익 계산 요약]",unitMonths:"개월"},
      en:{title:"🛍️ Marketplace Buyer Membership Uplift Calculator",subtitle:"Model net membership revenue plus incremental order contribution from higher membership penetration.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_buyers:"Monthly active buyers",l_currentPen:"Current membership penetration (%)",l_targetPen:"Target membership penetration (%)",l_membershipFee:"Monthly membership fee (KRW)",l_baseOrders:"Monthly orders per non-member",l_orderUplift:"Member order uplift (%)",l_aov:"Average order value (KRW)",l_contribMargin:"Contribution margin per order (%)",l_paymentFee:"Membership payment fee (%)",l_perkCost:"Membership perk cost (per member/month, KRW)",l_fixedCost:"Monthly fixed operating cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_newMembers:"Net new members",k_memberNet:"Monthly membership net revenue",k_orderUpliftProfit:"Monthly incremental order contribution",k_monthlyNet:"Monthly net profit",k_periodNet:"Cumulative net impact",k_roi:"ROI",d_perMemberTotal:"Total monthly contribution per new member",d_breakEvenPen:"Break-even penetration",d_payback:"Payback period",d_programCost:"Total program cost (period)",ok:"Membership economics ready",warn:"Monthly net profit is negative with current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and buyers/months must be >= 1.",logicErr:"Target penetration must be greater than or equal to current penetration.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Buyer Membership Uplift Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["buyers","currentPen","targetPen","membershipFee","baseOrders","orderUplift","aov","contribMargin","paymentFee","perkCost","fixedCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["newMembers","memberNet","orderUpliftProfit","monthlyNet","periodNet","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["perMemberTotal","breakEvenPen","payback","programCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.buyers)||v.buyers<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.membershipFee,v.baseOrders,v.aov,v.perkCost,v.fixedCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.currentPen,v.targetPen,v.contribMargin,v.paymentFee].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(!Number.isFinite(v.orderUplift)||v.orderUplift<0) return t("numErr");
      if(v.targetPen<v.currentPen) return t("logicErr");
      return "";
    }

    function render(){
      const v={buyers:Number(refs.buyers.value),currentPen:Number(refs.currentPen.value),targetPen:Number(refs.targetPen.value),membershipFee:Number(refs.membershipFee.value),baseOrders:Number(refs.baseOrders.value),orderUplift:Number(refs.orderUplift.value),aov:Number(refs.aov.value),contribMargin:Number(refs.contribMargin.value),paymentFee:Number(refs.paymentFee.value),perkCost:Number(refs.perkCost.value),fixedCost:Number(refs.fixedCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["newMembers","memberNet","orderUpliftProfit","monthlyNet","periodNet","roi","perMemberTotal","breakEvenPen","payback","programCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const currentMembers=v.buyers*(v.currentPen/100);
      const targetMembers=v.buyers*(v.targetPen/100);
      const newMembers=Math.max(0,targetMembers-currentMembers);
      const perMemberMembershipNet=v.membershipFee*(1-v.paymentFee/100)-v.perkCost;
      const incrementalOrdersPerMember=v.baseOrders*(v.orderUplift/100);
      const perMemberOrderContribution=incrementalOrdersPerMember*v.aov*(v.contribMargin/100);
      const perMemberTotal=perMemberMembershipNet+perMemberOrderContribution;

      const memberNet=newMembers*perMemberMembershipNet;
      const orderUpliftProfit=newMembers*perMemberOrderContribution;
      const monthlyNet=memberNet+orderUpliftProfit-v.fixedCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const programCost=(v.fixedCost*v.months)+v.setup;
      const roi=programCost>0?(periodNet/programCost)*100:0;

      const needMembers=perMemberTotal>0?(v.fixedCost/perMemberTotal):Infinity;
      const breakEvenPen=Number.isFinite(needMembers)?v.currentPen+((needMembers/v.buyers)*100):Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.newMembers.textContent=num(newMembers,0);
      refs.memberNet.textContent=won(memberNet);
      refs.orderUpliftProfit.textContent=won(orderUpliftProfit);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.periodNet.textContent=won(periodNet);
      refs.roi.textContent=pct(roi,1);
      refs.perMemberTotal.textContent=won(perMemberTotal);
      refs.breakEvenPen.textContent=(Number.isFinite(breakEvenPen)&&breakEvenPen<=100)?pct(breakEvenPen,2):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.programCost.textContent=won(programCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_newMembers")}: ${num(newMembers,0)}`,`${t("k_memberNet")}: ${won(memberNet)}`,`${t("k_orderUpliftProfit")}: ${won(orderUpliftProfit)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenPen")}: ${(Number.isFinite(breakEvenPen)&&breakEvenPen<=100)?pct(breakEvenPen,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.buyers,refs.currentPen,refs.targetPen,refs.membershipFee,refs.baseOrders,refs.orderUplift,refs.aov,refs.contribMargin,refs.paymentFee,refs.perkCost,refs.fixedCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
