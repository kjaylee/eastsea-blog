<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Fee Profit Calculator | 마켓플레이스 수수료 손익 계산기</title>
  <meta name="description" content="판매가, 원가, 배송비, 플랫폼/결제 수수료, 광고비, 반품률을 반영해 주문당 기대이익과 손익분기 가격을 계산합니다." />
  <style>
    :root{--bg:#071327;--card:#102246;--line:#2c4f86;--txt:#ebf3ff;--muted:#a9bddd;--pri:#69a8ff;--err:#fca5a5;--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#224b86 0%,#071327 50%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#e5eeff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#122a55;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px}
    .card{background:linear-gradient(160deg,#17315f,#102246);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0b1a36;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5883ee);font-weight:700}
    .soft{background:#183562;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:var(--err);font-size:.86rem}
    .error.show{display:block}
    textarea{min-height:98px;margin-top:10px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1c3d;border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 9px;border-radius:999px;border:1px solid var(--line);background:#173767;color:#d4e3ff;font-size:.75rem}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🧮 Marketplace Fee Profit Calculator</h1>
        <div class="sub">수수료·광고비·반품 리스크를 반영해 주문당 기대이익, 손익분기 가격, 목표 마진 가격을 계산합니다.</div>
      </div>
      <a class="home" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="price">판매가 (KRW)</label><input id="price" type="number" min="1" value="42000" /></div>
          <div><label for="cogs">상품 원가 COGS (KRW)</label><input id="cogs" type="number" min="0" value="15000" /></div>
          <div><label for="shipping">출고 배송비 (KRW)</label><input id="shipping" type="number" min="0" value="3200" /></div>
          <div><label for="adSpend">주문당 광고비 (KRW)</label><input id="adSpend" type="number" min="0" value="2800" /></div>
          <div><label for="marketRate">플랫폼 수수료율 (%)</label><input id="marketRate" type="number" min="0" max="99.99" step="0.01" value="12" /></div>
          <div><label for="marketFixed">플랫폼 고정 수수료 (KRW)</label><input id="marketFixed" type="number" min="0" value="400" /></div>
          <div><label for="paymentRate">결제 수수료율 (%)</label><input id="paymentRate" type="number" min="0" max="99.99" step="0.01" value="3.2" /></div>
          <div><label for="paymentFixed">결제 고정 수수료 (KRW)</label><input id="paymentFixed" type="number" min="0" value="120" /></div>
          <div><label for="returnRate">반품률 (%)</label><input id="returnRate" type="number" min="0" max="99.99" step="0.01" value="6" /></div>
          <div><label for="returnLoss">반품 1건당 손실액 (KRW)</label><input id="returnLoss" type="number" min="0" value="4500" /></div>
          <div style="grid-column:1/-1"><label for="targetMargin">목표 순마진 (%)</label><input id="targetMargin" type="number" min="0" max="95" step="0.1" value="15" /></div>
        </div>
        <div class="btns">
          <button class="soft" id="copy" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>손익 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">기대 순이익 / 주문</div><div id="expectedProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">기대 순마진</div><div id="expectedMargin" class="v">-</div></div>
          <div class="kpi"><div class="k">주문당 총 수수료 부담</div><div id="feeBurden" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 판매가</div><div id="breakEvenPrice" class="v sm">-</div></div>
          <div class="kpi"><div class="k">목표 마진 달성 판매가</div><div id="targetPrice" class="v sm">-</div></div>
          <div class="kpi"><div class="k">기대 실현매출 / 주문</div><div id="expectedRevenue" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">계산 대기</div>

        <h2 style="margin-top:12px">세부 계산</h2>
        <table>
          <tbody>
            <tr><th>플랫폼 수수료(변동+고정)</th><td id="marketFeeOut">-</td></tr>
            <tr><th>결제 수수료(변동+고정)</th><td id="paymentFeeOut">-</td></tr>
            <tr><th>반품 기대손실</th><td id="expectedReturnLoss">-</td></tr>
            <tr><th>기타 비용 합계 (원가+배송+광고)</th><td id="baseCostOut">-</td></tr>
            <tr><th>가격 민감 계수 k</th><td id="kFactor">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      price:$('price'), cogs:$('cogs'), shipping:$('shipping'), adSpend:$('adSpend'), marketRate:$('marketRate'), marketFixed:$('marketFixed'),
      paymentRate:$('paymentRate'), paymentFixed:$('paymentFixed'), returnRate:$('returnRate'), returnLoss:$('returnLoss'), targetMargin:$('targetMargin'),
      expectedProfit:$('expectedProfit'), expectedMargin:$('expectedMargin'), feeBurden:$('feeBurden'), breakEvenPrice:$('breakEvenPrice'), targetPrice:$('targetPrice'),
      expectedRevenue:$('expectedRevenue'), marketFeeOut:$('marketFeeOut'), paymentFeeOut:$('paymentFeeOut'), expectedReturnLoss:$('expectedReturnLoss'),
      baseCostOut:$('baseCostOut'), kFactor:$('kFactor'), status:$('status'), error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = {
      price:42000, cogs:15000, shipping:3200, adSpend:2800, marketRate:12, marketFixed:400,
      paymentRate:3.2, paymentFixed:120, returnRate:6, returnLoss:4500, targetMargin:15
    };

    const won = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const fmt = (n,d=2)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      const percentKeys = ['marketRate','paymentRate','returnRate'];
      if (!Number.isFinite(v.price) || v.price <= 0) return '판매가는 0보다 커야 합니다.';
      for (const key of ['cogs','shipping','adSpend','marketFixed','paymentFixed','returnLoss']) {
        if (!Number.isFinite(v[key]) || v[key] < 0) return `${key} 값은 0 이상이어야 합니다.`;
      }
      for (const key of percentKeys) {
        if (!Number.isFinite(v[key]) || v[key] < 0 || v[key] >= 100) return `${key} 값은 0 이상 100 미만이어야 합니다.`;
      }
      if (!Number.isFinite(v.targetMargin) || v.targetMargin < 0 || v.targetMargin >= 95) return '목표 순마진은 0% 이상 95% 미만이어야 합니다.';
      return '';
    }

    function compute(v){
      const r = v.returnRate / 100;
      const mp = v.marketRate / 100;
      const pp = v.paymentRate / 100;
      const tm = v.targetMargin / 100;

      const marketFee = v.price * mp + v.marketFixed;
      const paymentFee = v.price * pp + v.paymentFixed;
      const feeBurden = marketFee + paymentFee;
      const expectedRevenue = v.price * (1 - r);
      const expectedReturnLoss = r * v.returnLoss;
      const baseCost = v.cogs + v.shipping + v.adSpend;

      const expectedProfit = expectedRevenue - (baseCost + feeBurden + expectedReturnLoss);
      const expectedMargin = (expectedProfit / v.price) * 100;

      const kFactor = (1 - r) - (mp + pp);
      if (kFactor <= 0) throw new Error('현재 수수료/반품 조합에서는 가격이 올라도 손익분기 계산이 불가능합니다.');

      const breakEvenPrice = (baseCost + v.marketFixed + v.paymentFixed + expectedReturnLoss) / kFactor;
      const targetDenom = kFactor - tm;
      if (targetDenom <= 0) throw new Error('목표 마진이 너무 높아 달성 가격을 계산할 수 없습니다. 목표 마진을 낮추세요.');
      const targetPrice = (baseCost + v.marketFixed + v.paymentFixed + expectedReturnLoss) / targetDenom;

      return { marketFee, paymentFee, feeBurden, expectedRevenue, expectedReturnLoss, baseCost, expectedProfit, expectedMargin, breakEvenPrice, targetPrice, kFactor };
    }

    function render(){
      const v = {
        price:Number(refs.price.value), cogs:Number(refs.cogs.value), shipping:Number(refs.shipping.value), adSpend:Number(refs.adSpend.value),
        marketRate:Number(refs.marketRate.value), marketFixed:Number(refs.marketFixed.value), paymentRate:Number(refs.paymentRate.value),
        paymentFixed:Number(refs.paymentFixed.value), returnRate:Number(refs.returnRate.value), returnLoss:Number(refs.returnLoss.value), targetMargin:Number(refs.targetMargin.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err) {
        ['expectedProfit','expectedMargin','feeBurden','breakEvenPrice','targetPrice','expectedRevenue','marketFeeOut','paymentFeeOut','expectedReturnLoss','baseCostOut','kFactor']
          .forEach(k=>refs[k].textContent='-');
        refs.status.textContent = '입력값을 확인하세요';
        refs.summary.value = '';
        return;
      }

      try {
        const r = compute(v);
        refs.expectedProfit.textContent = won(r.expectedProfit);
        refs.expectedMargin.textContent = `${fmt(r.expectedMargin,2)}%`;
        refs.feeBurden.textContent = won(r.feeBurden);
        refs.breakEvenPrice.textContent = won(r.breakEvenPrice);
        refs.targetPrice.textContent = won(r.targetPrice);
        refs.expectedRevenue.textContent = won(r.expectedRevenue);

        refs.marketFeeOut.textContent = won(r.marketFee);
        refs.paymentFeeOut.textContent = won(r.paymentFee);
        refs.expectedReturnLoss.textContent = won(r.expectedReturnLoss);
        refs.baseCostOut.textContent = won(r.baseCost);
        refs.kFactor.textContent = fmt(r.kFactor,4);

        refs.status.innerHTML = r.expectedProfit >= 0
          ? `<span class="ok">●</span> 주문당 기대이익 ${won(r.expectedProfit)}`
          : `<span class="warn">●</span> 주문당 기대손실 ${won(Math.abs(r.expectedProfit))}`;

        refs.summary.value = [
          '[Marketplace Fee Profit 요약]',
          `기대 실현매출/주문: ${won(r.expectedRevenue)}`,
          `기대 순이익/주문: ${won(r.expectedProfit)}`,
          `기대 순마진: ${fmt(r.expectedMargin,2)}%`,
          `주문당 총 수수료 부담: ${won(r.feeBurden)}`,
          `손익분기 판매가: ${won(r.breakEvenPrice)}`,
          `목표 마진(${fmt(v.targetMargin,1)}%) 판매가: ${won(r.targetPrice)}`
        ].join('\n');
      } catch (e) {
        refs.error.classList.add('show');
        refs.error.textContent = e.message || '계산 중 오류가 발생했습니다.';
        refs.status.textContent = '입력값을 확인하세요';
      }
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.price,refs.cogs,refs.shipping,refs.adSpend,refs.marketRate,refs.marketFixed,refs.paymentRate,refs.paymentFixed,refs.returnRate,refs.returnLoss,refs.targetMargin]
        .forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
