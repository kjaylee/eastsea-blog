<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Promoted Listing ROI Calculator | 마켓플레이스 프로모티드 리스팅 ROI 계산기</title>
  <meta name="description" content="노출, CTR, 전환율, CPC, 수수료, 반품률을 반영해 마켓플레이스 프로모티드 리스팅의 월 순이익과 ROI를 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 5% 0%,#1e3b67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🛒 마켓플레이스 프로모티드 리스팅 ROI 계산기</h1>
        <div class="sub" id="subtitle">노출→클릭→주문 흐름으로 광고비 대비 순이익과 손익분기 CPC를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_impressions" for="impressions"></label><input id="impressions" type="number" min="0" value="220000"></div>
          <div><label id="l_ctr" for="ctr"></label><input id="ctr" type="number" min="0" max="100" step="0.01" value="2.8"></div>
          <div><label id="l_cvr" for="cvr"></label><input id="cvr" type="number" min="0" max="100" step="0.01" value="4.2"></div>
          <div><label id="l_aov" for="aov"></label><input id="aov" type="number" min="0" step="100" value="54000"></div>
          <div><label id="l_margin" for="margin"></label><input id="margin" type="number" min="0" max="100" step="0.1" value="46"></div>
          <div><label id="l_cpc" for="cpc"></label><input id="cpc" type="number" min="0" step="1" value="430"></div>
          <div><label id="l_fee" for="fee"></label><input id="fee" type="number" min="0" max="100" step="0.1" value="11"></div>
          <div><label id="l_refund" for="refund"></label><input id="refund" type="number" min="0" max="100" step="0.1" value="4.5"></div>
          <div><label id="l_fixedCost" for="fixedCost"></label><input id="fixedCost" type="number" min="0" step="10000" value="1200000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="3500000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_clicks"></div><div class="v" id="clicks">-</div></div>
          <div class="kpi"><div class="k" id="k_orders"></div><div class="v" id="orders">-</div></div>
          <div class="kpi"><div class="k" id="k_netSales"></div><div class="v" id="netSales">-</div></div>
          <div class="kpi"><div class="k" id="k_adSpend"></div><div class="v" id="adSpend">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_contribution"></th><td id="contribution">-</td></tr>
          <tr><th id="d_breakEvenCpc"></th><td id="breakEvenCpc">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_periodNet"></th><td id="periodNet">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={impressions:$("impressions"),ctr:$("ctr"),cvr:$("cvr"),aov:$("aov"),margin:$("margin"),cpc:$("cpc"),fee:$("fee"),refund:$("refund"),fixedCost:$("fixedCost"),setup:$("setup"),months:$("months"),clicks:$("clicks"),orders:$("orders"),netSales:$("netSales"),adSpend:$("adSpend"),monthlyNet:$("monthlyNet"),roi:$("roi"),contribution:$("contribution"),breakEvenCpc:$("breakEvenCpc"),payback:$("payback"),periodNet:$("periodNet"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={impressions:220000,ctr:2.8,cvr:4.2,aov:54000,margin:46,cpc:430,fee:11,refund:4.5,fixedCost:1200000,setup:3500000,months:12};
    const I18N={
      ko:{title:"🛒 마켓플레이스 프로모티드 리스팅 ROI 계산기",subtitle:"노출→클릭→주문 흐름으로 광고비 대비 순이익과 손익분기 CPC를 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_impressions:"월 프로모티드 노출수",l_ctr:"CTR (%)",l_cvr:"전환율 CVR (%)",l_aov:"평균 주문금액 AOV (₩)",l_margin:"매출총이익률 (%)",l_cpc:"평균 CPC (₩)",l_fee:"마켓플레이스 수수료율 (%)",l_refund:"반품/환불률 (%)",l_fixedCost:"월 고정 운영비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_clicks:"월 클릭수",k_orders:"월 주문수",k_netSales:"환불 반영 순매출",k_adSpend:"월 광고비",k_monthlyNet:"월 순이익",k_roi:"ROI",d_contribution:"광고 전 공헌이익",d_breakEvenCpc:"손익분기 CPC",d_payback:"회수기간",d_periodNet:"기간 누적 순효과",ok:"캠페인 수익성 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율은 0~100 범위여야 합니다.",numErr:"값은 0 이상이어야 하며 기간은 1 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[프로모티드 리스팅 ROI 요약]",unitMonths:"개월"},
      en:{title:"🛒 Marketplace Promoted Listing ROI Calculator",subtitle:"Model impression→click→order economics to estimate net profit and break-even CPC.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_impressions:"Monthly promoted impressions",l_ctr:"CTR (%)",l_cvr:"Conversion rate CVR (%)",l_aov:"Average order value (KRW)",l_margin:"Gross margin (%)",l_cpc:"Average CPC (KRW)",l_fee:"Marketplace fee rate (%)",l_refund:"Refund/return rate (%)",l_fixedCost:"Monthly fixed campaign cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_clicks:"Monthly clicks",k_orders:"Monthly orders",k_netSales:"Net sales after refunds",k_adSpend:"Monthly ad spend",k_monthlyNet:"Monthly net profit",k_roi:"ROI",d_contribution:"Contribution profit before ads",d_breakEvenCpc:"Break-even CPC",d_payback:"Payback period",d_periodNet:"Cumulative net impact",ok:"Campaign economics ready",warn:"Monthly net profit is negative with current assumptions",invalid:"Please review inputs",rangeErr:"Rates must be between 0 and 100.",numErr:"Values must be >= 0 and months must be >= 1.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Promoted Listing ROI Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["impressions","ctr","cvr","aov","margin","cpc","fee","refund","fixedCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["clicks","orders","netSales","adSpend","monthlyNet","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["contribution","breakEvenCpc","payback","periodNet"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if([v.impressions,v.aov,v.cpc,v.fixedCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if(!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.ctr,v.cvr,v.margin,v.fee,v.refund].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      return "";
    }

    function render(){
      const v={impressions:Number(refs.impressions.value),ctr:Number(refs.ctr.value),cvr:Number(refs.cvr.value),aov:Number(refs.aov.value),margin:Number(refs.margin.value),cpc:Number(refs.cpc.value),fee:Number(refs.fee.value),refund:Number(refs.refund.value),fixedCost:Number(refs.fixedCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["clicks","orders","netSales","adSpend","monthlyNet","roi","contribution","breakEvenCpc","payback","periodNet"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const clicks=v.impressions*(v.ctr/100);
      const orders=clicks*(v.cvr/100);
      const grossSales=orders*v.aov;
      const netSales=grossSales*(1-v.refund/100);
      const contribution=(netSales*(v.margin/100))-(netSales*(v.fee/100));
      const adSpend=clicks*v.cpc;
      const monthlyNet=contribution-adSpend-v.fixedCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalInvestment=(adSpend*v.months)+(v.fixedCost*v.months)+v.setup;
      const roi=totalInvestment>0?(periodNet/totalInvestment)*100:0;
      const breakEvenCpc=clicks>0?Math.max(0,(contribution-v.fixedCost)/clicks):NaN;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.clicks.textContent=num(clicks,0);
      refs.orders.textContent=num(orders,1);
      refs.netSales.textContent=won(netSales);
      refs.adSpend.textContent=won(adSpend);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.contribution.textContent=won(contribution);
      refs.breakEvenCpc.textContent=Number.isFinite(breakEvenCpc)?won(breakEvenCpc):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.periodNet.textContent=won(periodNet);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_clicks")}: ${num(clicks,0)}`,`${t("k_orders")}: ${num(orders,1)}`,`${t("k_netSales")}: ${won(netSales)}`,`${t("d_contribution")}: ${won(contribution)}`,`${t("k_adSpend")}: ${won(adSpend)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("d_breakEvenCpc")}: ${Number.isFinite(breakEvenCpc)?won(breakEvenCpc):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.impressions,refs.ctr,refs.cvr,refs.aov,refs.margin,refs.cpc,refs.fee,refs.refund,refs.fixedCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
