<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Seller Subscription Uplift Calculator | 마켓플레이스 셀러 구독 전환 수익 계산기</title>
  <meta name="description" content="마켓플레이스 셀러 유료 플랜 전환 시 구독매출 + GMV uplift 테이크레이트 수익의 순효과를 계산합니다." />
  <style>
    :root{--bg:#0d1324;--card:#15213b;--line:#2a3e65;--txt:#e6eeff;--muted:#a7badf;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 0% 0%,#25506e 0%,var(--bg) 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#1b335a;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#1a3158,#121f38);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1b32;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#23426f;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10203a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1d3a63;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🏪 마켓플레이스 셀러 구독 전환 수익 계산기</h1>
        <div class="sub" id="subtitle">셀러 유료 플랜 전환과 거래액 상승이 만드는 순수익과 ROI를 추정합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_activeSellers" for="activeSellers"></label><input id="activeSellers" type="number" min="1" step="1" value="12500"></div>
          <div><label id="l_conversionRate" for="conversionRate"></label><input id="conversionRate" type="number" min="0" max="100" step="0.1" value="8.5"></div>
          <div><label id="l_planPrice" for="planPrice"></label><input id="planPrice" type="number" min="0" step="100" value="39000"></div>
          <div><label id="l_gmvUplift" for="gmvUplift"></label><input id="gmvUplift" type="number" min="0" step="1000" value="780000"></div>
          <div><label id="l_takeRate" for="takeRate"></label><input id="takeRate" type="number" min="0" max="100" step="0.01" value="7.5"></div>
          <div><label id="l_processingRate" for="processingRate"></label><input id="processingRate" type="number" min="0" max="100" step="0.1" value="11"></div>
          <div><label id="l_supportCost" for="supportCost"></label><input id="supportCost" type="number" min="0" step="100" value="15000"></div>
          <div><label id="l_fixedOps" for="fixedOps"></label><input id="fixedOps" type="number" min="0" step="10000" value="58000000"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_paidSellers"></div><div class="v" id="paidSellers">-</div></div>
          <div class="kpi"><div class="k" id="k_subscriptionRevenue"></div><div class="v" id="subscriptionRevenue">-</div></div>
          <div class="kpi"><div class="k" id="k_takeRateRevenue"></div><div class="v" id="takeRateRevenue">-</div></div>
          <div class="kpi"><div class="k" id="k_totalRevenue"></div><div class="v" id="totalRevenue">-</div></div>
          <div class="kpi"><div class="k" id="k_netProfit"></div><div class="v" id="netProfit">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_incrementalGmv"></th><td id="incrementalGmv">-</td></tr>
          <tr><th id="d_processingCost"></th><td id="processingCost">-</td></tr>
          <tr><th id="d_supportCostTotal"></th><td id="supportCostTotal">-</td></tr>
          <tr><th id="d_breakEvenConversion"></th><td id="breakEvenConversion">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={activeSellers:$("activeSellers"),conversionRate:$("conversionRate"),planPrice:$("planPrice"),gmvUplift:$("gmvUplift"),takeRate:$("takeRate"),processingRate:$("processingRate"),supportCost:$("supportCost"),fixedOps:$("fixedOps"),paidSellers:$("paidSellers"),subscriptionRevenue:$("subscriptionRevenue"),takeRateRevenue:$("takeRateRevenue"),totalRevenue:$("totalRevenue"),netProfit:$("netProfit"),roi:$("roi"),incrementalGmv:$("incrementalGmv"),processingCost:$("processingCost"),supportCostTotal:$("supportCostTotal"),breakEvenConversion:$("breakEvenConversion"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={activeSellers:12500,conversionRate:8.5,planPrice:39000,gmvUplift:780000,takeRate:7.5,processingRate:11,supportCost:15000,fixedOps:58000000};
    const I18N={
      ko:{title:"🏪 마켓플레이스 셀러 구독 전환 수익 계산기",subtitle:"셀러 유료 플랜 전환과 거래액 상승이 만드는 순수익과 ROI를 추정합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_activeSellers:"활성 셀러 수",l_conversionRate:"유료 플랜 전환율 (%)",l_planPrice:"월 플랜 가격 (₩)",l_gmvUplift:"전환 셀러당 월 GMV 증가 (₩)",l_takeRate:"플랫폼 Take rate (%)",l_processingRate:"매출 처리원가율 (%)",l_supportCost:"유료 셀러당 지원비 (₩/월)",l_fixedOps:"월 고정 운영비 (₩)",k_paidSellers:"유료 전환 셀러 수",k_subscriptionRevenue:"구독 매출",k_takeRateRevenue:"증가 거래액 수수료 매출",k_totalRevenue:"총 증가 매출",k_netProfit:"월 순이익",k_roi:"ROI",d_incrementalGmv:"증가 GMV",d_processingCost:"처리원가",d_supportCostTotal:"지원비 총액",d_breakEvenConversion:"손익분기 전환율",ok:"유료 플랜 전략이 손익분기 이상입니다",warn:"현재 가정에서는 적자입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율은 0~100 범위여야 합니다.",numErr:"수량/금액은 0 이상이며 활성 셀러는 1 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[마켓플레이스 셀러 구독 전환 수익 요약]"},
      en:{title:"🏪 Marketplace Seller Subscription Uplift Calculator",subtitle:"Estimate net uplift from converting sellers to paid plans and increasing seller GMV.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_activeSellers:"Active sellers",l_conversionRate:"Paid-plan conversion rate (%)",l_planPrice:"Monthly plan price (KRW)",l_gmvUplift:"Monthly GMV uplift per converted seller (KRW)",l_takeRate:"Platform take rate (%)",l_processingRate:"Revenue processing cost ratio (%)",l_supportCost:"Support cost per paid seller (KRW/mo)",l_fixedOps:"Fixed monthly operating cost (KRW)",k_paidSellers:"Converted paid sellers",k_subscriptionRevenue:"Subscription revenue",k_takeRateRevenue:"Take-rate revenue from uplift GMV",k_totalRevenue:"Total incremental revenue",k_netProfit:"Monthly net profit",k_roi:"ROI",d_incrementalGmv:"Incremental GMV",d_processingCost:"Processing cost",d_supportCostTotal:"Total support cost",d_breakEvenConversion:"Break-even conversion rate",ok:"Paid-plan strategy is above break-even",warn:"Strategy is unprofitable under current assumptions",invalid:"Please review inputs",rangeErr:"Rate fields must be between 0 and 100.",numErr:"Counts/amounts must be >= 0 and active sellers must be >= 1.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Marketplace Seller Subscription Uplift Summary]"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["activeSellers","conversionRate","planPrice","gmvUplift","takeRate","processingRate","supportCost","fixedOps"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["paidSellers","subscriptionRevenue","takeRateRevenue","totalRevenue","netProfit","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["incrementalGmv","processingCost","supportCostTotal","breakEvenConversion"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if([v.conversionRate,v.takeRate,v.processingRate].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(!Number.isFinite(v.activeSellers)||v.activeSellers<1||[v.planPrice,v.gmvUplift,v.supportCost,v.fixedOps].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      return "";
    }

    function render(){
      const v={activeSellers:Number(refs.activeSellers.value),conversionRate:Number(refs.conversionRate.value),planPrice:Number(refs.planPrice.value),gmvUplift:Number(refs.gmvUplift.value),takeRate:Number(refs.takeRate.value),processingRate:Number(refs.processingRate.value),supportCost:Number(refs.supportCost.value),fixedOps:Number(refs.fixedOps.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["paidSellers","subscriptionRevenue","takeRateRevenue","totalRevenue","netProfit","roi","incrementalGmv","processingCost","supportCostTotal","breakEvenConversion"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const paidSellers=v.activeSellers*(v.conversionRate/100);
      const subscriptionRevenue=paidSellers*v.planPrice;
      const incrementalGmv=paidSellers*v.gmvUplift;
      const takeRateRevenue=incrementalGmv*(v.takeRate/100);
      const totalRevenue=subscriptionRevenue+takeRateRevenue;

      const processingCost=totalRevenue*(v.processingRate/100);
      const supportCostTotal=paidSellers*v.supportCost;
      const totalCost=processingCost+supportCostTotal+v.fixedOps;
      const netProfit=totalRevenue-totalCost;
      const roi=totalCost>0?(netProfit/totalCost)*100:0;

      const contributionPerPaid=(v.planPrice+v.gmvUplift*(v.takeRate/100))*(1-v.processingRate/100)-v.supportCost;
      const breakEvenConversion=(contributionPerPaid>0)?(v.fixedOps/(v.activeSellers*contributionPerPaid))*100:Infinity;

      refs.paidSellers.textContent=num(paidSellers,1);
      refs.subscriptionRevenue.textContent=won(subscriptionRevenue);
      refs.takeRateRevenue.textContent=won(takeRateRevenue);
      refs.totalRevenue.textContent=won(totalRevenue);
      refs.netProfit.textContent=won(netProfit);
      refs.roi.textContent=pct(roi,1);
      refs.incrementalGmv.textContent=won(incrementalGmv);
      refs.processingCost.textContent=won(processingCost);
      refs.supportCostTotal.textContent=won(supportCostTotal);
      refs.breakEvenConversion.textContent=Number.isFinite(breakEvenConversion)?pct(breakEvenConversion,2):t("na");
      refs.status.innerHTML=netProfit>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_paidSellers")}: ${num(paidSellers,1)}`,`${t("k_totalRevenue")}: ${won(totalRevenue)}`,`${t("k_netProfit")}: ${won(netProfit)}`,`${t("k_roi")}: ${pct(roi,1)}`,`${t("d_breakEvenConversion")}: ${Number.isFinite(breakEvenConversion)?pct(breakEvenConversion,2):t("na")}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.activeSellers,refs.conversionRate,refs.planPrice,refs.gmvUplift,refs.takeRate,refs.processingRate,refs.supportCost,refs.fixedOps].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
