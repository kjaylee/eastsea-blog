<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Take-rate Optimization Calculator | 마켓플레이스 Take-rate 최적화 계산기</title>
  <meta name="description" content="take-rate 및 판매자 인센티브 조정 시 GMV 변화를 반영해 월 순효과, ROI, 회수기간, 손익분기 take-rate를 계산합니다." />
  <style>
    :root{--bg:#081425;--card:#122741;--line:#2d4f79;--txt:#e6f0ff;--muted:#a8c0df;--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#1d416e 0%,#081425 58%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 60px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.82rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#17355c;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17345e,#10213a);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 data-i18n="title">🛍️ 마켓플레이스 Take-rate 최적화 계산기</h1>
        <div class="sub" data-i18n="subtitle">수수료율(take-rate)과 인센티브율 변경이 GMV 변화와 결합될 때의 순기여 개선을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="chip" type="button">EN</button>
        <a class="chip" href="/" data-i18n="back">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="currentGMV" data-i18n="l_currentGMV"></label><input id="currentGMV" type="number" min="1" step="100000" value="2400000000"></div>
          <div><label for="currentTake" data-i18n="l_currentTake"></label><input id="currentTake" type="number" min="0" max="100" step="0.01" value="11.5"></div>
          <div><label for="targetTake" data-i18n="l_targetTake"></label><input id="targetTake" type="number" min="0" max="100" step="0.01" value="12.2"></div>
          <div><label for="gmvChange" data-i18n="l_gmvChange"></label><input id="gmvChange" type="number" min="-90" max="300" step="0.1" value="4.5"></div>
          <div><label for="processingRate" data-i18n="l_processingRate"></label><input id="processingRate" type="number" min="0" max="100" step="0.01" value="2.8"></div>
          <div><label for="currentIncentive" data-i18n="l_currentIncentive"></label><input id="currentIncentive" type="number" min="0" max="100" step="0.01" value="1.4"></div>
          <div><label for="targetIncentive" data-i18n="l_targetIncentive"></label><input id="targetIncentive" type="number" min="0" max="100" step="0.01" value="1.9"></div>
          <div><label for="monthlyCost" data-i18n="l_monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="5100000"></div>
          <div><label for="setup" data-i18n="l_setup"></label><input id="setup" type="number" min="0" step="10000" value="22000000"></div>
          <div><label for="months" data-i18n="l_months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button" data-i18n="copy"></button><button id="reset" type="button" data-i18n="reset"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_currentMonthly"></div><div class="v" id="currentMonthly">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_targetMonthly"></div><div class="v" id="targetMonthly">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback"></div><div class="v" id="payback">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 style="margin-top:12px" data-i18n="detailHeader"></h2>
        <table><tbody>
          <tr><th data-i18n="d_targetGMV"></th><td id="targetGMV">-</td></tr>
          <tr><th data-i18n="d_currentNetRate"></th><td id="currentNetRate">-</td></tr>
          <tr><th data-i18n="d_targetNetRate"></th><td id="targetNetRate">-</td></tr>
          <tr><th data-i18n="d_breakEvenTake"></th><td id="breakEvenTake">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={currentGMV:$("currentGMV"),currentTake:$("currentTake"),targetTake:$("targetTake"),gmvChange:$("gmvChange"),processingRate:$("processingRate"),currentIncentive:$("currentIncentive"),targetIncentive:$("targetIncentive"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),currentMonthly:$("currentMonthly"),targetMonthly:$("targetMonthly"),monthlyNet:$("monthlyNet"),periodNet:$("periodNet"),roi:$("roi"),payback:$("payback"),targetGMV:$("targetGMV"),currentNetRate:$("currentNetRate"),targetNetRate:$("targetNetRate"),breakEvenTake:$("breakEvenTake"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={currentGMV:2400000000,currentTake:11.5,targetTake:12.2,gmvChange:4.5,processingRate:2.8,currentIncentive:1.4,targetIncentive:1.9,monthlyCost:5100000,setup:22000000,months:12};
    let lang="ko";

    const I18N={
      ko:{title:"🛍️ 마켓플레이스 Take-rate 최적화 계산기",subtitle:"수수료율(take-rate)과 인센티브율 변경이 GMV 변화와 결합될 때의 순기여 개선을 계산합니다.",back:"포털로",inputs:"입력값",copy:"요약 복사",reset:"기본값 복원",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",l_currentGMV:"현재 월 GMV (₩)",l_currentTake:"현재 take-rate (%)",l_targetTake:"목표 take-rate (%)",l_gmvChange:"예상 GMV 변화율 (%)",l_processingRate:"결제/정산 비용률 (%)",l_currentIncentive:"현재 판매자 인센티브율 (%)",l_targetIncentive:"목표 판매자 인센티브율 (%)",l_monthlyCost:"월 운영비 (₩)",l_setup:"초기 시행비 (₩)",l_months:"분석 기간 (개월)",k_currentMonthly:"현재 월 순기여",k_targetMonthly:"개선 후 월 순기여",k_monthlyNet:"월 순효과",k_periodNet:"기간 순효과",k_roi:"ROI",k_payback:"회수기간",d_targetGMV:"개선 후 월 GMV",d_currentNetRate:"현재 순기여율",d_targetNetRate:"목표 순기여율",d_breakEvenTake:"손익분기 목표 take-rate",ok:"Take-rate 최적화 시나리오가 유효합니다",warn:"현재 가정에서는 월 순효과가 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율은 지정된 범위를 벗어날 수 없습니다.",numErr:"GMV/기간은 1 이상, 비용은 0 이상이어야 합니다.",na:"N/A",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",unitMonths:"개월",summaryTitle:"[Marketplace Take-rate Optimization 요약]"},
      en:{title:"🛍️ Marketplace Take-rate Optimization Calculator",subtitle:"Estimate contribution impact when changing take-rate and seller incentives with expected GMV shift.",back:"Back to Portal",inputs:"Inputs",copy:"Copy Summary",reset:"Reset Defaults",kpiHeader:"Key KPIs",detailHeader:"Details",l_currentGMV:"Current monthly GMV (KRW)",l_currentTake:"Current take-rate (%)",l_targetTake:"Target take-rate (%)",l_gmvChange:"Expected GMV change (%)",l_processingRate:"Payment/settlement cost rate (%)",l_currentIncentive:"Current seller incentive rate (%)",l_targetIncentive:"Target seller incentive rate (%)",l_monthlyCost:"Monthly operating cost (KRW)",l_setup:"One-time rollout cost (KRW)",l_months:"Analysis period (months)",k_currentMonthly:"Current monthly net contribution",k_targetMonthly:"Optimized monthly net contribution",k_monthlyNet:"Monthly net impact",k_periodNet:"Period net impact",k_roi:"ROI",k_payback:"Payback period",d_targetGMV:"Optimized monthly GMV",d_currentNetRate:"Current net contribution rate",d_targetNetRate:"Target net contribution rate",d_breakEvenTake:"Break-even target take-rate",ok:"Take-rate optimization is financially favorable",warn:"Monthly net impact is negative under current assumptions",invalid:"Please review inputs",rangeErr:"Rate values are out of allowed range.",numErr:"GMV/months must be >= 1 and costs >= 0.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",unitMonths:"months",summaryTitle:"[Marketplace Take-rate Optimization Summary]"}
    };

    const t=(k)=>I18N[lang][k]||k;
    const locale=()=>lang==="ko"?"ko-KR":"en-US";
    const won=(n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const pct=(n,d=2)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
      refs.langBtn.textContent=lang==="ko"?"EN":"KO";
    }

    function validate(v){
      if(!Number.isFinite(v.currentGMV)||v.currentGMV<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.monthlyCost,v.setup].some(n=>!Number.isFinite(n)||n<0)) return t("numErr");
      if(!Number.isFinite(v.gmvChange)||v.gmvChange<-90||v.gmvChange>300) return t("rangeErr");
      if([v.currentTake,v.targetTake,v.processingRate,v.currentIncentive,v.targetIncentive].some(n=>!Number.isFinite(n)||n<0||n>100)) return t("rangeErr");
      return "";
    }

    function render(){
      const v={currentGMV:Number(refs.currentGMV.value),currentTake:Number(refs.currentTake.value),targetTake:Number(refs.targetTake.value),gmvChange:Number(refs.gmvChange.value),processingRate:Number(refs.processingRate.value),currentIncentive:Number(refs.currentIncentive.value),targetIncentive:Number(refs.targetIncentive.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v);
      refs.error.classList.toggle("show",Boolean(err));
      refs.error.textContent=err;
      if(err){
        ["currentMonthly","targetMonthly","monthlyNet","periodNet","roi","payback","targetGMV","currentNetRate","targetNetRate","breakEvenTake"].forEach(k=>refs[k].textContent="-");
        refs.status.textContent=t("invalid"); refs.summary.value=""; return;
      }

      const targetGMV=v.currentGMV*(1+v.gmvChange/100);
      const currentNetRate=v.currentTake-v.processingRate-v.currentIncentive;
      const targetNetRate=v.targetTake-v.processingRate-v.targetIncentive;
      const currentMonthly=v.currentGMV*(currentNetRate/100);
      const targetMonthlyRaw=targetGMV*(targetNetRate/100);
      const targetMonthly=targetMonthlyRaw-v.monthlyCost;
      const monthlyNet=targetMonthly-currentMonthly;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const payback=monthlyNet>0?v.setup/monthlyNet:Infinity;
      const breakEvenTake=(targetGMV>0)?(((currentMonthly+v.monthlyCost)/targetGMV)*100+v.processingRate+v.targetIncentive):Infinity;

      refs.currentMonthly.textContent=won(currentMonthly);
      refs.targetMonthly.textContent=won(targetMonthly);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.periodNet.textContent=won(periodNet);
      refs.roi.textContent=pct(roi,1);
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.targetGMV.textContent=won(targetGMV);
      refs.currentNetRate.textContent=pct(currentNetRate,2);
      refs.targetNetRate.textContent=pct(targetNetRate,2);
      refs.breakEvenTake.textContent=Number.isFinite(breakEvenTake)?pct(breakEvenTake,2):t("na");
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--ok)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[
        t("summaryTitle"),
        `${t("k_currentMonthly")}: ${won(currentMonthly)}`,
        `${t("k_targetMonthly")}: ${won(targetMonthly)}`,
        `${t("k_monthlyNet")}: ${won(monthlyNet)}`,
        `${t("k_periodNet")}: ${won(periodNet)}`,
        `${t("k_roi")}: ${pct(roi,1)}`,
        `${t("k_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,
        `${t("d_breakEvenTake")}: ${Number.isFinite(breakEvenTake)?pct(breakEvenTake,2):t("na")}`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim())return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.currentGMV,refs.currentTake,refs.targetTake,refs.gmvChange,refs.processingRate,refs.currentIncentive,refs.targetIncentive,refs.monthlyCost,refs.setup,refs.months].forEach(el=>el.addEventListener("input",render));

    applyI18n();
    render();
  </script>
</body>
</html>
