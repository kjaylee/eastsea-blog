<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Take Rate Profit Calculator | 마켓플레이스 수수료율 손익 계산기</title>
  <meta name="description" content="마켓플레이스 Take Rate 조정 시 월/연 순효과, ROI, 회수기간, 손익분기 수수료율과 허용 GMV 하락률을 계산합니다." />
  <style>
    :root{--bg:#081422;--card:#12263f;--line:#29476d;--txt:#edf4ff;--muted:#b8cae4;--pri:#67b4ff;--soft:#163355;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#1f446b 0%,#081422 54%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.6vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce9ff;background:#0f2346;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:linear-gradient(165deg,#183455,#12263f);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1b31;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#4d8eed);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1f35;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.98rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d2e3ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🏪 마켓플레이스 수수료율 손익 계산기</h1>
        <div class="sub">Take Rate 조정과 GMV 변동을 함께 반영해 월/연 순효과, ROI, 손익분기 임계치를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="gmv">월 GMV (KRW)</label><input id="gmv" type="number" min="1" value="1500000000" /></div>
          <div><label for="orders">월 주문 수</label><input id="orders" type="number" min="1" step="1" value="42000" /></div>
          <div><label for="currentRate">현재 Take Rate (%)</label><input id="currentRate" type="number" min="0" max="50" step="0.01" value="11.5" /></div>
          <div><label for="targetRate">목표 Take Rate (%)</label><input id="targetRate" type="number" min="0" max="50" step="0.01" value="13" /></div>
          <div><label for="gmvChange">목표 적용 후 GMV 변화율 (%)</label><input id="gmvChange" type="number" min="-95" max="300" step="0.1" value="-4" /></div>
          <div><label for="paymentFee">결제 수수료율 (%)</label><input id="paymentFee" type="number" min="0" max="20" step="0.01" value="2.8" /></div>
          <div><label for="opsPerOrder">주문당 변동 운영비 (KRW)</label><input id="opsPerOrder" type="number" min="0" value="820" /></div>
          <div><label for="fixedCost">월 고정 운영비 (KRW)</label><input id="fixedCost" type="number" min="0" value="25000000" /></div>
          <div><label for="rolloutCost">수수료 정책 롤아웃 월 비용 (KRW)</label><input id="rolloutCost" type="number" min="0" value="4500000" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 순효과</div><div id="annualNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">현재 월 이익</div><div id="currentProfit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">목표 월 이익</div><div id="targetProfit" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>현재 월 수수료 매출</th><td id="currentRevenue">-</td></tr>
            <tr><th>목표 월 수수료 매출</th><td id="targetRevenue">-</td></tr>
            <tr><th>손익분기 최소 Take Rate</th><td id="breakEvenRate">-</td></tr>
            <tr><th>손익분기 대비 여유</th><td id="rateBuffer">-</td></tr>
            <tr><th>허용 가능한 최대 GMV 하락률</th><td id="maxDecline">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      gmv:$("gmv"), orders:$("orders"), currentRate:$("currentRate"), targetRate:$("targetRate"), gmvChange:$("gmvChange"), paymentFee:$("paymentFee"),
      opsPerOrder:$("opsPerOrder"), fixedCost:$("fixedCost"), rolloutCost:$("rolloutCost"),
      monthlyNet:$("monthlyNet"), annualNet:$("annualNet"), roi:$("roi"), payback:$("payback"), currentProfit:$("currentProfit"), targetProfit:$("targetProfit"),
      currentRevenue:$("currentRevenue"), targetRevenue:$("targetRevenue"), breakEvenRate:$("breakEvenRate"), rateBuffer:$("rateBuffer"), maxDecline:$("maxDecline"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { gmv:1500000000, orders:42000, currentRate:11.5, targetRate:13, gmvChange:-4, paymentFee:2.8, opsPerOrder:820, fixedCost:25000000, rolloutCost:4500000 };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.gmv) || v.gmv <= 0) return "월 GMV는 0보다 커야 합니다.";
      if (!Number.isFinite(v.orders) || v.orders < 1 || v.orders > 1e8) return "월 주문 수는 1~100,000,000 범위여야 합니다.";
      if (!Number.isFinite(v.currentRate) || v.currentRate < 0 || v.currentRate > 50) return "현재 Take Rate는 0~50% 범위여야 합니다.";
      if (!Number.isFinite(v.targetRate) || v.targetRate < 0 || v.targetRate > 50) return "목표 Take Rate는 0~50% 범위여야 합니다.";
      if (!Number.isFinite(v.gmvChange) || v.gmvChange <= -95 || v.gmvChange > 300) return "GMV 변화율은 -95% 초과 ~ 300% 범위여야 합니다.";
      if (!Number.isFinite(v.paymentFee) || v.paymentFee < 0 || v.paymentFee > 20) return "결제 수수료율은 0~20% 범위여야 합니다.";
      if (!Number.isFinite(v.opsPerOrder) || v.opsPerOrder < 0) return "주문당 변동 운영비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.fixedCost) || v.fixedCost < 0) return "월 고정 운영비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.rolloutCost) || v.rolloutCost < 0) return "롤아웃 월 비용은 0 이상이어야 합니다.";
      const targetGMV = v.gmv * (1 + v.gmvChange/100);
      if (!Number.isFinite(targetGMV) || targetGMV <= 0) return "GMV 변화율로 인해 목표 GMV가 0 이하가 됩니다. 값을 조정하세요.";
      return "";
    }

    function compute(v){
      const cRate = v.currentRate / 100;
      const tRate = v.targetRate / 100;
      const feeRate = v.paymentFee / 100;
      const targetGMV = v.gmv * (1 + v.gmvChange/100);
      const targetOrders = v.orders * (1 + v.gmvChange/100);

      const currentRevenue = v.gmv * cRate;
      const targetRevenue = targetGMV * tRate;

      const currentProfit = currentRevenue - (v.gmv * feeRate) - (v.orders * v.opsPerOrder) - v.fixedCost;
      const targetProfit = targetRevenue - (targetGMV * feeRate) - (targetOrders * v.opsPerOrder) - v.fixedCost - v.rolloutCost;

      const monthlyNet = targetProfit - currentProfit;
      const annualNet = monthlyNet * 12;
      const annualInvestment = v.rolloutCost * 12;
      const roi = annualInvestment === 0 ? (annualNet >= 0 ? Infinity : -Infinity) : (annualNet / annualInvestment) * 100;
      const payback = monthlyNet > 0 ? (v.rolloutCost > 0 ? v.rolloutCost / monthlyNet : 0) : Infinity;

      const breakEvenRate = targetGMV > 0
        ? ((currentProfit + (targetGMV * feeRate) + (targetOrders * v.opsPerOrder) + v.fixedCost + v.rolloutCost) / targetGMV) * 100
        : Infinity;
      const rateBuffer = Number.isFinite(breakEvenRate) ? v.targetRate - breakEvenRate : NaN;

      const denom = (v.gmv * (tRate - feeRate)) - (v.orders * v.opsPerOrder);
      const mBreakEven = denom > 0 ? (currentProfit + v.fixedCost + v.rolloutCost) / denom : Infinity;
      const maxDecline = Number.isFinite(mBreakEven) ? (1 - mBreakEven) * 100 : NaN;

      return { targetGMV, currentRevenue, targetRevenue, currentProfit, targetProfit, monthlyNet, annualNet, roi, payback, breakEvenRate, rateBuffer, maxDecline };
    }

    function safeText(el, text){ el.textContent = text; }

    function resetOutputs(){
      ["monthlyNet","annualNet","roi","payback","currentProfit","targetProfit","currentRevenue","targetRevenue","breakEvenRate","rateBuffer","maxDecline"].forEach((k)=>safeText(refs[k], "-"));
      refs.summary.value = "";
    }

    function render(){
      const v = {
        gmv:Number(refs.gmv.value), orders:Number(refs.orders.value), currentRate:Number(refs.currentRate.value), targetRate:Number(refs.targetRate.value), gmvChange:Number(refs.gmvChange.value),
        paymentFee:Number(refs.paymentFee.value), opsPerOrder:Number(refs.opsPerOrder.value), fixedCost:Number(refs.fixedCost.value), rolloutCost:Number(refs.rolloutCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);
      safeText(refs.monthlyNet, money(r.monthlyNet));
      safeText(refs.annualNet, money(r.annualNet));
      safeText(refs.roi, Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞"));
      safeText(refs.payback, Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가");
      safeText(refs.currentProfit, money(r.currentProfit));
      safeText(refs.targetProfit, money(r.targetProfit));
      safeText(refs.currentRevenue, money(r.currentRevenue));
      safeText(refs.targetRevenue, money(r.targetRevenue));
      safeText(refs.breakEvenRate, Number.isFinite(r.breakEvenRate) ? `${num(r.breakEvenRate,3)}%` : "계산 불가");
      safeText(refs.rateBuffer, Number.isFinite(r.rateBuffer) ? `${num(r.rateBuffer,3)}%p` : "계산 불가");
      safeText(refs.maxDecline, Number.isFinite(r.maxDecline) ? `${num(r.maxDecline,2)}%` : "계산 불가");

      refs.status.innerHTML = r.annualNet >= 0
        ? `<span class="ok">●</span> 연간 ${money(r.annualNet)} 순효과`
        : `<span class="warn">●</span> 연간 ${money(Math.abs(r.annualNet))} 순손실`;

      refs.summary.value = [
        "[Marketplace Take Rate Profit 요약]",
        `현재 월 이익: ${money(r.currentProfit)}`,
        `목표 월 이익: ${money(r.targetProfit)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `연 순효과: ${money(r.annualNet)}`,
        `연 ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가"}`,
        `손익분기 최소 Take Rate: ${Number.isFinite(r.breakEvenRate) ? `${num(r.breakEvenRate,3)}%` : "계산 불가"}`,
        `허용 가능한 최대 GMV 하락률: ${Number.isFinite(r.maxDecline) ? `${num(r.maxDecline,2)}%` : "계산 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.gmv,refs.orders,refs.currentRate,refs.targetRate,refs.gmvChange,refs.paymentFee,refs.opsPerOrder,refs.fixedCost,refs.rolloutCost].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
