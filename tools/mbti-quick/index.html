      state.result = null;
      clearInterval(analyzingTimer);
      render();
    }

    function pickAnswer(idx) {
      const q = QUESTIONS[state.current];
      const picked = q.options[idx];
      Object.entries(picked.score).forEach(([k, v]) => {
        state.scores[k] += v;
      });
      state.answers.push({ qIndex: state.current, optIndex: idx });
      haptic('selection');

      if (state.current < TOTAL - 1) {
        state.current += 1;
        render();
      } else {
        goAnalyze();
      }
    }

    function goAnalyze() {
      state.phase = 'analyzing';
      state.analyzingPct = 0;
      render();
      clearInterval(analyzingTimer);
      analyzingTimer = setInterval(() => {
        state.analyzingPct += Math.floor(Math.random() * 17) + 9;
        if (state.analyzingPct >= 100) {
          state.analyzingPct = 100;
          clearInterval(analyzingTimer);
          finalizeResult();
        }
        const fill = document.getElementById('miniFill');
        const txt = document.getElementById('miniText');
        if (fill) fill.style.width = state.analyzingPct + '%';
        if (txt) txt.textContent = state.analyzingPct + '%';
      }, 180);
    }

    function resolveLetter(a, b, axisIndexes) {
      const as = state.scores[a];
      const bs = state.scores[b];
      if (as !== bs) return as > bs ? a : b;
      for (let i = axisIndexes.length - 1; i >= 0; i--) {
        const idx = axisIndexes[i];
        const answer = state.answers.find(v => v.qIndex === idx);
        if (!answer) continue;
        const score = QUESTIONS[idx].options[answer.optIndex].score;
        if ((score[a] || 0) !== (score[b] || 0)) return (score[a] || 0) > (score[b] || 0) ? a : b;
      }
      return a;
    }

    function buildPair(a, b, axisName) {
      const sa = state.scores[a];
      const sb = state.scores[b];
      const total = sa + sb || 1;
      const pctA = Math.round((sa / total) * 100);
      const pctB = 100 - pctA;
      const winner = sa === sb ? a : (sa > sb ? a : b);
      const confidence = Math.max(pctA, pctB);
      return { axisName, a, b, sa, sb, pctA, pctB, winner, confidence };
    }

    function detailedText(type, meta, pairs) {
      const tone = state.lang === 'ko'
        ? [

          ].join('')
        : [
            `The core of ${type} (${meta.nick.en}) is this: ${meta.core.en} Your scores across E/I, S/N, T/F, and J/P suggest you are not a one-note personality but a flexible pattern user who combines strengths based on context. In collaboration, your natural edge often appears through ${meta.strengths.en[0].toLowerCase()} and ${meta.strengths.en[1].toLowerCase()}.\n\nUnder stress, however, ${meta.weaknesses.en[0].toLowerCase()} or ${meta.weaknesses.en[1].toLowerCase()} can surface and slow your impact. A simple routine—weekly reflection, explicit priorities, and short execution checkpoints—helps convert your potential into stable outcomes. Keep your signature strengths, but add pacing and emotional calibration to unlock stronger consistency over time.`

      return tone;
    }

    function calculateFromCurrentScores() {
      const axisMap = {
        EI: QUESTIONS.map((q, i) => ({ q, i })).filter(v => v.q.axis[0] === 'E').map(v => v.i),
        SN: QUESTIONS.map((q, i) => ({ q, i })).filter(v => v.q.axis[0] === 'S').map(v => v.i),
        TF: QUESTIONS.map((q, i) => ({ q, i })).filter(v => v.q.axis[0] === 'T').map(v => v.i),
        JP: QUESTIONS.map((q, i) => ({ q, i })).filter(v => v.q.axis[0] === 'J').map(v => v.i)
      };

      const first = resolveLetter('E', 'I', axisMap.EI);
      const second = resolveLetter('S', 'N', axisMap.SN);
      const third = resolveLetter('T', 'F', axisMap.TF);
      const fourth = resolveLetter('J', 'P', axisMap.JP);
      const type = `${first}${second}${third}${fourth}`;
      const meta = TYPE_META[type] || TYPE_META.INTJ;

      const pairs = [
        buildPair('E', 'I', tr('axisEI')),
        buildPair('S', 'N', tr('axisSN')),
        buildPair('T', 'F', tr('axisTF')),
        buildPair('J', 'P', tr('axisJP'))
      ];

      const detail = detailedText(type, meta, pairs);
      return {
        type,
        meta,
        pairs,
        detail,
        scores: { ...state.scores },
        savedAt: new Date().toISOString()
      };
    }

    function drawRadar(pairs, typeColor) {
      const canvas = document.getElementById('radarCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;
      const cx = W / 2;
      const cy = H / 2;
      const radius = Math.min(W, H) * 0.34;
      const labels = ['E/I', 'S/N', 'T/F', 'J/P'];

      const values = pairs.map(p => p.confidence);

      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1;

      for (let step = 1; step <= 5; step++) {
        const r = radius * (step / 5);
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const angle = (-Math.PI / 2) + (Math.PI * 2 * i / 4);
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }

      for (let i = 0; i < 4; i++) {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * i / 4);
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(x, y);
        ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        ctx.font = '600 12px sans-serif';
        const lx = cx + Math.cos(angle) * (radius + 22);
        const ly = cy + Math.sin(angle) * (radius + 22);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(labels[i], lx, ly);
      }

      ctx.beginPath();
      values.forEach((v, i) => {
        const ratio = Math.max(0, Math.min(100, v)) / 100;
        const r = radius * ratio;
        const angle = (-Math.PI / 2) + (Math.PI * 2 * i / 4);
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fillStyle = hexToRgba(typeColor, 0.28);
      ctx.strokeStyle = typeColor;
      ctx.lineWidth = 2;
      ctx.fill();
      ctx.stroke();

      values.forEach((v, i) => {
        const ratio = Math.max(0, Math.min(100, v)) / 100;
        const r = radius * ratio;
        const angle = (-Math.PI / 2) + (Math.PI * 2 * i / 4);
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        ctx.beginPath();
        ctx.arc(x, y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = typeColor;
        ctx.fill();
      });
    }

    function hexToRgba(hex, alpha) {
      const h = hex.replace('#', '');
      const bigint = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

          <div class="analyzing-wrap">
            <div class="spinner"></div>
            <h2 class="analyzing-title">${tr('analyzing')}</h2>
            <p class="analyzing-sub">${tr('analyzingSub')}</p>
            <div class="mini-track"><div id="miniFill" class="mini-fill" style="width:${state.analyzingPct}%"></div></div>
            <div id="miniText" class="mini-text">${state.analyzingPct}%</div>
          </div>
        </section>
      `;
    }

    function renderResult() {
      const r = state.result;
      if (!r) return;
      const meta = r.meta;
      const nick = state.lang === 'ko' ? meta.nick.ko : meta.nick.en;
      const summary = state.lang === 'ko' ? meta.summary.ko : meta.summary.en;
      const strengths = state.lang === 'ko' ? meta.strengths.ko : meta.strengths.en;
      const weaknesses = state.lang === 'ko' ? meta.weaknesses.ko : meta.weaknesses.en;
      const compatibleText = state.lang === 'ko'
        ? `${r.meta.compatible} 유형과 상호 보완 관계를 만들기 좋습니다.`
        : `Often complementary with ${r.meta.compatible} in communication and balance.`;
      const jobs = state.lang === 'ko' ? meta.jobs.ko : meta.jobs.en;

      const pairRows = r.pairs.map(p => {
        const leftLabel = `${p.a} ${p.pctA}%`;
        const rightLabel = `${p.b} ${p.pctB}%`;
        return `
          <div class="pair-item">
            <div class="pair-top">
              <span>${p.axisName} · ${leftLabel}</span>
              <strong style="color:#fff;">${rightLabel}</strong>
            </div>
            <div class="pair-bar"><span style="width:${p.pctA}%;"></span></div>
          </div>
        `;
      }).join('');

      const promos = PROMOS.map(p => `
        <a class="promo-link" href="${p.href}">${p.emoji} ${state.lang === 'ko' ? p.ko : p.en}</a>
      `).join('');

      app.innerHTML = `
        <section class="card">
          <header class="result-head" style="background: linear-gradient(135deg, ${hexToRgba(meta.color, 0.92)}, ${hexToRgba(meta.color, 0.68)});">
            <div class="lang-row" style="margin-bottom:8px;">
              <div class="lang-group">
                <button class="lang-btn ${state.lang === 'ko' ? 'active' : ''}" data-lang="ko">한국어</button>
                <button class="lang-btn ${state.lang === 'en' ? 'active' : ''}" data-lang="en">English</button>
              </div>
              <button id="restartBtn" class="ghost-link" type="button">${tr('retry')}</button>
            </div>
            <div class="type-emoji">${meta.emoji}</div>
            <h2 class="type-code">${r.type}</h2>
            <p class="type-name">${nick}</p>
            <p class="result-summary">${summary}</p>
          </header>

          <div class="result-body">
            <div class="radar-wrap">
              <p class="radar-title">${tr('radarTitle')}</p>
              <canvas id="radarCanvas" width="340" height="300"></canvas>
            </div>
            <div class="pair-grid">${pairRows}</div>

            <h3 class="section-title">${tr('detail')}</h3>
            <p class="detail-text">${r.detail}</p>

            <h3 class="section-title">${tr('strengths')}</h3>
            <ul class="list">${strengths.map(s => `<li>${s}</li>`).join('')}</ul>

            <h3 class="section-title">${tr('weaknesses')}</h3>
            <ul class="list">${weaknesses.map(s => `<li>${s}</li>`).join('')}</ul>

            <h3 class="section-title">${tr('compatible')}</h3>
            <div class="chips">
              <span class="chip">💞 ${r.meta.compatible}</span>
              <span class="chip">${compatibleText}</span>
            </div>

            <h3 class="section-title">${tr('careers')}</h3>
            <p class="detail-text" style="line-height:1.62;">${jobs}</p>

            <h3 class="section-title">${tr('share')}</h3>
            <div class="share-grid">
              <button id="shareKakao" class="share-btn kakao">${tr('kakao')}</button>
              <button id="shareTwitter" class="share-btn twitter">${tr('twitter')}</button>
              <button id="shareCopy" class="share-btn copy">${tr('copy')}</button>
            </div>

            <button id="retryBtn" class="primary-btn" style="margin-top:12px;">${tr('retry')}</button>

            <h3 class="section-title">${tr('promo')}</h3>
            <div class="promo-grid">${promos}</div>

            <div class="disclaimer">${tr('disclaimer')}</div>
          </div>
        </section>
      `;

      app.querySelectorAll('[data-lang]').forEach(btn => {
        btn.addEventListener('click', () => setLang(btn.dataset.lang));
      });
      app.querySelector('#restartBtn')?.addEventListener('click', startQuiz);
      app.querySelector('#retryBtn')?.addEventListener('click', startQuiz);
      app.querySelector('#shareKakao')?.addEventListener('click', shareKakao);
      app.querySelector('#shareTwitter')?.addEventListener('click', shareTwitter);
      app.querySelector('#shareCopy')?.addEventListener('click', copyLink);

      drawRadar(r.pairs, meta.color);
    }

    function render() {
      updateTopProgress();
      if (state.phase === 'intro') renderIntro();
      else if (state.phase === 'question') renderQuestion();
      else if (state.phase === 'analyzing') renderAnalyzing();
      else renderResult();
    }

    render();
  })();
  </script>
</body>
</html>
