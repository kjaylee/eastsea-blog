<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 식단 플래너 | East Sea Tools</title>
<meta name="description" content="일주일 식단을 간편하게 계획하세요. 아침, 점심, 저녁, 간식까지 관리하고 저장할 수 있습니다.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4F46E5;--primary-light:#6366F1;--bg:#f8fafc;--surface:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.1);--radius:12px}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--text-secondary:#94a3b8;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.8rem;text-align:center;margin:20px 0 8px;color:var(--primary)}
.desc{text-align:center;color:var(--text-secondary);margin-bottom:24px;font-size:.95rem}
.toolbar{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:10px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:var(--primary-light)}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-danger{background:#ef4444}
.btn-danger:hover{background:#dc2626}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;overflow-x:auto}
@media(max-width:768px){.week-grid{grid-template-columns:1fr;max-height:none}}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);min-width:120px}
.day-header{background:var(--primary);color:#fff;padding:10px;text-align:center;font-weight:700;font-size:.95rem}
.day-header.today{background:var(--primary-light);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--primary)}
.meal-section{padding:8px}
.meal-label{font-size:.75rem;font-weight:700;color:var(--primary);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.meal-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:.82rem;background:var(--bg);color:var(--text);margin-bottom:6px;resize:none;min-height:28px;font-family:inherit}
.meal-input:focus{outline:none;border-color:var(--primary)}
.templates{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:16px;box-shadow:var(--shadow)}
.templates h3{font-size:.95rem;margin-bottom:12px}
.template-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:4px 12px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:.8rem;cursor:pointer;transition:all .2s}
.chip:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
footer{text-align:center;padding:32px 0 16px;color:var(--text-secondary);font-size:.8rem}
.status{text-align:center;color:var(--text-secondary);font-size:.8rem;margin-top:8px}
</style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<div class="container">
<h1>🍽️ 주간 식단 플래너</h1>
<p class="desc">일주일 식단을 계획하고 관리하세요. 자동 저장됩니다.</p>

<div class="toolbar">
<button class="btn" onclick="saveData()">💾 저장</button>
<button class="btn btn-outline" onclick="exportText()">📋 텍스트 복사</button>
<button class="btn btn-danger" onclick="clearAll()">🗑️ 전체 초기화</button>
</div>

<div class="week-grid" id="weekGrid"></div>
<div class="status" id="status"></div>

<div class="templates">
<h3>🍱 빠른 추가 (클릭하여 복사)</h3>
<div class="template-chips">
<span class="chip" onclick="copyMeal('밥 + 된장찌개 + 나물')">밥+된장찌개</span>
<span class="chip" onclick="copyMeal('김치볶음밥')">김치볶음밥</span>
<span class="chip" onclick="copyMeal('비빔밥')">비빔밥</span>
<span class="chip" onclick="copyMeal('제육볶음 + 밥')">제육볶음</span>
<span class="chip" onclick="copyMeal('샐러드 + 닭가슴살')">샐러드+닭가슴살</span>
<span class="chip" onclick="copyMeal('떡볶이')">떡볶이</span>
<span class="chip" onclick="copyMeal('라면 + 계란')">라면+계란</span>
<span class="chip" onclick="copyMeal('삼겹살 + 쌈')">삼겹살+쌈</span>
<span class="chip" onclick="copyMeal('파스타')">파스타</span>
<span class="chip" onclick="copyMeal('돈까스')">돈까스</span>
<span class="chip" onclick="copyMeal('김밥')">김밥</span>
<span class="chip" onclick="copyMeal('짜장면')">짜장면</span>
<span class="chip" onclick="copyMeal('치킨')">치킨</span>
<span class="chip" onclick="copyMeal('피자')">피자</span>
<span class="chip" onclick="copyMeal('샌드위치 + 커피')">샌드위치+커피</span>
<span class="chip" onclick="copyMeal('오트밀 + 과일')">오트밀+과일</span>
<span class="chip" onclick="copyMeal('요거트 + 그래놀라')">요거트+그래놀라</span>
<span class="chip" onclick="copyMeal('두부 + 야채볶음')">두부+야채볶음</span>
</div>
</div>
</div>
<footer>© 2026 East Sea</footer>

<script>
const DAYS=['월','화','수','목','금','토','일'];
const MEALS=[
{key:'breakfast',label:'🌅 아침',emoji:'🌅'},
{key:'lunch',label:'☀️ 점심',emoji:'☀️'},
{key:'dinner',label:'🌙 저녁',emoji:'🌙'},
{key:'snack',label:'🍪 간식',emoji:'🍪'}
];
const STORAGE_KEY='meal-planner-data';

function getToday(){return new Date().getDay()||7;} // Mon=1 ... Sun=7

function init(){
const grid=document.getElementById('weekGrid');
const today=getToday();
grid.innerHTML='';

const saved=loadData();

DAYS.forEach((day,i)=>{
const card=document.createElement('div');
card.className='day-card';
const isToday=(i+1)===today;
card.innerHTML=`
<div class="day-header${isToday?' today'}">${day}요일${isToday?' (오늘)':''}</div>
${MEALS.map(m=>`
<div class="meal-section">
<div class="meal-label">${m.label}</div>
<textarea class="meal-input" data-day="${i}" data-meal="${m.key}" placeholder="${m.emoji}"
oninput="autoSave()">${saved[i]?.[m.key]||''}</textarea>
</div>
`).join('')}
`;
grid.appendChild(card);
});
}

function loadData(){
try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}
catch{return{};}
}

function gatherData(){
const data={};
document.querySelectorAll('.meal-input').forEach(el=>{
const d=el.dataset.day;
const m=el.dataset.meal;
if(!data[d])data[d]={};
data[d][m]=el.value;
});
return data;
}

function saveData(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(gatherData()));
showStatus('✅ 저장되었습니다!');
}

let autoSaveTimer;
function autoSave(){
clearTimeout(autoSaveTimer);
autoSaveTimer=setTimeout(()=>{
localStorage.setItem(STORAGE_KEY,JSON.stringify(gatherData()));
showStatus('자동 저장됨');
},1000);
}

function showStatus(msg){
const el=document.getElementById('status');
el.textContent=msg;
setTimeout(()=>el.textContent='',2000);
}

function clearAll(){
if(!confirm('모든 식단을 초기화하시겠습니까?'))return;
localStorage.removeItem(STORAGE_KEY);
init();
showStatus('🗑️ 초기화 완료');
}

function exportText(){
const data=gatherData();
let text='📋 주간 식단표\n'+('═'.repeat(30))+'\n\n';
DAYS.forEach((day,i)=>{
text+=`【${day}요일】\n`;
MEALS.forEach(m=>{
const val=data[i]?.[m.key]||'-';
text+=`  ${m.label}: ${val}\n`;
});
text+='\n';
});
navigator.clipboard.writeText(text).then(()=>showStatus('📋 클립보드에 복사되었습니다!'));
}

function copyMeal(text){
navigator.clipboard.writeText(text).then(()=>showStatus(`"${text}" 복사됨 — 원하는 칸에 붙여넣기`));
}

init();
</script>
</body>
</html>
