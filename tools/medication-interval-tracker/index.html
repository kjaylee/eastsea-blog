<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>복약 간격 계산기 | Medication Interval Tracker</title>
  <meta name="description" content="마지막 복용 시각과 복약 간격으로 다음 복용 시간을 계산하고 복약 기록을 저장하세요." />
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-glow: #151533;
      --panel: #13132b;
      --panel-soft: #1a1a36;
      --line: #2c2c5b;
      --text: #ecf0ff;
      --muted: #9aa3c9;
      --cyan: #2bd9ff;
      --violet: #b26dff;
      --green: #36f7c2;
      --orange: #ffb454;
      --danger: #ff6b8a;
      --shadow: 0 0 0 1px rgba(43, 217, 255, 0.16), 0 0 24px rgba(43, 217, 255, 0.08);
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 0% 0%, var(--bg-glow) 0%, var(--bg) 48%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding: 20px 14px 46px;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .back-link {
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(19, 19, 43, 0.78);
      font-weight: 600;
      font-size: 0.9rem;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: clamp(1.45rem, 4.1vw, 2.05rem);
      letter-spacing: 0.01em;
      text-shadow: 0 0 14px rgba(43, 217, 255, 0.34);
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(19, 19, 43, 0.96), rgba(11, 11, 28, 0.95));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px;
      box-shadow: var(--shadow);
      margin-bottom: 13px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field { min-width: 0; }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 650;
    }

    input, select, button {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      font-size: 0.98rem;
      padding: 10px 12px;
    }

    input:focus, select:focus, button:focus {
      outline: 2px solid var(--cyan);
      outline-offset: 1px;
      border-color: var(--cyan);
    }

    .interval-row {
      display: grid;
      grid-template-columns: 1fr 84px;
      gap: 8px;
    }

    .chips {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      width: auto;
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(43, 217, 255, 0.1);
      color: #bbf4ff;
      border: 1px solid rgba(43, 217, 255, 0.35);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .actions {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .primary {
      background: linear-gradient(135deg, rgba(43, 217, 255, 0.95), rgba(178, 109, 255, 0.95));
      color: #050511;
      border: none;
      font-weight: 800;
    }

    .secondary {
      background: rgba(178, 109, 255, 0.16);
      border-color: rgba(178, 109, 255, 0.5);
      color: #e9ddff;
      font-weight: 700;
    }

    .ghost {
      background: rgba(154, 163, 201, 0.08);
      color: var(--muted);
      font-weight: 700;
    }

    .error {
      margin-top: 10px;
      color: var(--danger);
      font-size: 0.86rem;
      min-height: 1.2em;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(26, 26, 54, 0.72);
      padding: 12px;
      min-height: 98px;
    }

    .metric-label {
      display: block;
      font-size: 0.76rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .metric-value {
      display: block;
      font-size: clamp(1rem, 3.6vw, 1.35rem);
      font-weight: 800;
      color: var(--cyan);
      word-break: keep-all;
    }

    .metric-value.violet { color: #dcbcff; }
    .metric-value.green { color: #95ffe6; }
    .metric-value.orange { color: #ffd58d; }
    .metric-value.danger { color: #ff9bb0; }

    .schedule {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .schedule-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border: 1px dashed rgba(43, 217, 255, 0.28);
      border-radius: 10px;
      background: rgba(43, 217, 255, 0.06);
      padding: 9px 10px;
      font-size: 0.88rem;
    }

    .hint {
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .history-head h2 {
      margin: 0;
      font-size: 1.02rem;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(21, 21, 43, 0.8);
      padding: 10px;
    }

    .history-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }

    .history-name {
      font-weight: 800;
      font-size: 0.94rem;
      color: #dff8ff;
    }

    .history-meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .history-next {
      font-size: 0.84rem;
      color: #b9f4ff;
    }

    .tiny-btn {
      min-height: 32px;
      width: auto;
      padding: 6px 10px;
      font-size: 0.8rem;
      background: rgba(255, 107, 138, 0.12);
      border-color: rgba(255, 107, 138, 0.4);
      color: #ffd0da;
    }

    .empty {
      color: var(--muted);
      font-size: 0.88rem;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .notice {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }

    @media (max-width: 720px) {
      .field-grid,
      .result-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <a class="back-link" href="../">← 도구 목록</a>
    </div>

    <h1>💊 복약 간격 계산기</h1>
    <p class="subtitle">마지막 복용 시간과 간격을 입력하면 다음 복용 시각, 남은 시간, 하루 복용 횟수를 계산하고 기록을 저장합니다.</p>

    <section class="card" aria-label="복약 입력">
      <div class="field-grid">
        <div class="field">
          <label for="medicineName">약 이름</label>
          <input id="medicineName" type="text" maxlength="40" placeholder="예: 타이레놀" autocomplete="off" />
        </div>
        <div class="field">
          <label for="doseMemo">복용 메모 (선택)</label>
          <input id="doseMemo" type="text" maxlength="60" placeholder="예: 500mg 1정" autocomplete="off" />
        </div>
        <div class="field">
          <label for="lastTaken">마지막 복용 시각</label>
          <input id="lastTaken" type="datetime-local" />
        </div>
        <div class="field">
          <label for="intervalHours">복약 간격</label>
          <div class="interval-row">
            <input id="intervalHours" type="number" min="1" max="168" step="0.5" inputmode="decimal" value="6" />
            <select id="intervalUnit" aria-label="간격 단위">
              <option value="hours" selected>시간</option>
            </select>
          </div>
          <div class="chips" role="group" aria-label="간격 프리셋">
            <button class="chip" type="button" data-hours="4">4시간</button>
            <button class="chip" type="button" data-hours="6">6시간</button>
            <button class="chip" type="button" data-hours="8">8시간</button>
            <button class="chip" type="button" data-hours="12">12시간</button>
            <button class="chip" type="button" data-hours="24">24시간</button>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="calcBtn" class="primary" type="button">다음 복용 계산</button>
        <button id="logBtn" class="secondary" type="button">지금 복용 기록 추가</button>
        <button id="resetBtn" class="ghost" type="button">입력 초기화</button>
      </div>

      <p id="errorMsg" class="error" aria-live="polite"></p>
    </section>

    <section class="card" aria-label="계산 결과">
      <div class="result-grid">
        <article class="metric">
          <span class="metric-label">다음 복용 시각</span>
          <span id="nextDoseText" class="metric-value violet">-</span>
        </article>
        <article class="metric">
          <span class="metric-label">남은 시간</span>
          <span id="remainingText" class="metric-value">-</span>
        </article>
        <article class="metric">
          <span class="metric-label">24시간 기준</span>
          <span id="dailyCountText" class="metric-value green">-</span>
        </article>
      </div>
      <div id="schedule" class="schedule" aria-live="polite"></div>
      <p class="hint">※ 본 도구는 일정 관리용 계산기입니다. 실제 복약은 의사·약사 지시에 따라 주세요.</p>
    </section>

    <section class="card" aria-label="복약 기록">
      <div class="history-head">
        <h2>복약 기록 (최근 100개)</h2>
        <button id="clearHistoryBtn" class="tiny-btn" type="button">기록 전체 삭제</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>

    <p class="notice">설정/기록은 현재 브라우저의 localStorage에 저장됩니다.</p>
  </main>

  <script>
    (function () {
      const SETTINGS_KEY = "medicationIntervalTracker.settings.v1";
      const HISTORY_KEY = "medicationIntervalTracker.history.v1";
      const MAX_HISTORY = 100;

      const medicineNameEl = document.getElementById("medicineName");
      const doseMemoEl = document.getElementById("doseMemo");
      const lastTakenEl = document.getElementById("lastTaken");
      const intervalHoursEl = document.getElementById("intervalHours");
      const nextDoseTextEl = document.getElementById("nextDoseText");
      const remainingTextEl = document.getElementById("remainingText");
      const dailyCountTextEl = document.getElementById("dailyCountText");
      const scheduleEl = document.getElementById("schedule");
      const historyListEl = document.getElementById("historyList");
      const errorMsgEl = document.getElementById("errorMsg");

      const calcBtn = document.getElementById("calcBtn");
      const logBtn = document.getElementById("logBtn");
      const resetBtn = document.getElementById("resetBtn");
      const clearHistoryBtn = document.getElementById("clearHistoryBtn");

      let historyItems = loadJson(HISTORY_KEY, []);
      if (!Array.isArray(historyItems)) historyItems = [];

      let latestResult = null;

      function pad(num) {
        return String(num).padStart(2, "0");
      }

      function toDatetimeLocalValue(date) {
        return [
          date.getFullYear(),
          "-",
          pad(date.getMonth() + 1),
          "-",
          pad(date.getDate()),
          "T",
          pad(date.getHours()),
          ":",
          pad(date.getMinutes())
        ].join("");
      }

      function formatDateTime(date) {
        return date.toLocaleString("ko-KR", {
          month: "2-digit",
          day: "2-digit",
          weekday: "short",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        });
      }

      function formatDuration(ms) {
        const sign = ms < 0 ? -1 : 1;
        let remain = Math.abs(ms);
        const minutes = Math.round(remain / 60000);
        const d = Math.floor(minutes / (60 * 24));
        const h = Math.floor((minutes % (60 * 24)) / 60);
        const m = minutes % 60;

        const parts = [];
        if (d) parts.push(d + "일");
        if (h || d) parts.push(h + "시간");
        parts.push(m + "분");

        if (sign < 0) return "지남 " + parts.join(" ");
        return parts.join(" ");
      }

      function loadJson(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return fallback;
          return JSON.parse(raw);
        } catch (error) {
          return fallback;
        }
      }

      function saveJson(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function showError(message) {
        errorMsgEl.textContent = message || "";
      }

      function getInputData() {
        const medicineName = medicineNameEl.value.trim() || "복용약";
        const doseMemo = doseMemoEl.value.trim();
        const lastTakenRaw = lastTakenEl.value;
        const intervalHours = Number(intervalHoursEl.value);

        if (!lastTakenRaw) {
          showError("마지막 복용 시각을 입력해 주세요.");
          return null;
        }

        if (!Number.isFinite(intervalHours) || intervalHours <= 0 || intervalHours > 168) {
          showError("복약 간격은 0보다 크고 168시간 이하로 입력해 주세요.");
          return null;
        }

        const lastTakenDate = new Date(lastTakenRaw);
        if (Number.isNaN(lastTakenDate.getTime())) {
          showError("올바른 날짜/시간 형식이 아닙니다.");
          return null;
        }

        showError("");

        return {
          medicineName,
          doseMemo,
          lastTakenDate,
          intervalHours
        };
      }

      function calculate() {
        const data = getInputData();
        if (!data) return null;

        const intervalMs = data.intervalHours * 60 * 60 * 1000;
        const nextDoseDate = new Date(data.lastTakenDate.getTime() + intervalMs);
        const now = new Date();
        const remainingMs = nextDoseDate.getTime() - now.getTime();
        const perDay = 24 / data.intervalHours;

        latestResult = {
          ...data,
          nextDoseDate,
          remainingMs,
          perDay
        };

        renderResult(latestResult);
        persistSettings();

        return latestResult;
      }

      function renderResult(result) {
        nextDoseTextEl.textContent = formatDateTime(result.nextDoseDate);

        remainingTextEl.textContent = formatDuration(result.remainingMs);
        remainingTextEl.classList.remove("danger", "orange", "green");
        if (result.remainingMs < 0) {
          remainingTextEl.classList.add("danger");
        } else if (result.remainingMs <= 60 * 60 * 1000) {
          remainingTextEl.classList.add("orange");
        } else {
          remainingTextEl.classList.add("green");
        }

        const roundedPerDay = Math.round(result.perDay * 10) / 10;
        dailyCountTextEl.textContent = "약 " + roundedPerDay + "회";

        scheduleEl.innerHTML = "";
        for (let i = 1; i <= 3; i += 1) {
          const d = new Date(result.nextDoseDate.getTime() + (i - 1) * result.intervalHours * 60 * 60 * 1000);
          const item = document.createElement("div");
          item.className = "schedule-item";
          item.innerHTML = "<strong>다음 " + i + "회차</strong><span>" + formatDateTime(d) + "</span>";
          scheduleEl.appendChild(item);
        }
      }

      function persistSettings() {
        const settings = {
          medicineName: medicineNameEl.value,
          doseMemo: doseMemoEl.value,
          lastTaken: lastTakenEl.value,
          intervalHours: intervalHoursEl.value
        };
        saveJson(SETTINGS_KEY, settings);
      }

      function restoreSettings() {
        const settings = loadJson(SETTINGS_KEY, null);
        if (settings && typeof settings === "object") {
          medicineNameEl.value = settings.medicineName || "";
          doseMemoEl.value = settings.doseMemo || "";
          intervalHoursEl.value = settings.intervalHours || "6";
          if (settings.lastTaken) {
            lastTakenEl.value = settings.lastTaken;
          }
        }

        if (!lastTakenEl.value) {
          lastTakenEl.value = toDatetimeLocalValue(new Date());
        }
      }

      function addHistoryFromResult(result) {
        if (!result) return;

        const newItem = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 8),
          medicineName: result.medicineName,
          doseMemo: result.doseMemo,
          lastTakenISO: result.lastTakenDate.toISOString(),
          intervalHours: result.intervalHours,
          nextDoseISO: result.nextDoseDate.toISOString(),
          createdAtISO: new Date().toISOString()
        };

        historyItems.unshift(newItem);
        historyItems = historyItems.slice(0, MAX_HISTORY);
        saveJson(HISTORY_KEY, historyItems);
        renderHistory();
      }

      function deleteHistory(id) {
        historyItems = historyItems.filter((item) => item.id !== id);
        saveJson(HISTORY_KEY, historyItems);
        renderHistory();
      }

      function clearHistory() {
        if (!historyItems.length) return;
        const ok = window.confirm("복약 기록을 모두 삭제할까요?");
        if (!ok) return;
        historyItems = [];
        saveJson(HISTORY_KEY, historyItems);
        renderHistory();
      }

      function renderHistory() {
        historyListEl.innerHTML = "";

        if (!historyItems.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "아직 저장된 복약 기록이 없습니다.";
          historyListEl.appendChild(empty);
          return;
        }

        historyItems.forEach((item) => {
          const wrapper = document.createElement("article");
          wrapper.className = "history-item";

          const lastTakenDate = new Date(item.lastTakenISO);
          const nextDoseDate = new Date(item.nextDoseISO);

          wrapper.innerHTML = [
            '<div class="history-main">',
            '  <div>',
            '    <div class="history-name">' + escapeHtml(item.medicineName) + '</div>',
            '    <div class="history-meta">복용: ' + formatDateTime(lastTakenDate) + ' · 간격: ' + item.intervalHours + '시간' + (item.doseMemo ? ' · ' + escapeHtml(item.doseMemo) : '') + '</div>',
            '  </div>',
            '  <button class="tiny-btn" type="button" data-delete-id="' + item.id + '">삭제</button>',
            '</div>',
            '<div class="history-next">다음 복용: ' + formatDateTime(nextDoseDate) + '</div>'
          ].join("");

          historyListEl.appendChild(wrapper);
        });
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function resetInputs() {
        medicineNameEl.value = "";
        doseMemoEl.value = "";
        intervalHoursEl.value = "6";
        lastTakenEl.value = toDatetimeLocalValue(new Date());
        latestResult = null;
        nextDoseTextEl.textContent = "-";
        remainingTextEl.textContent = "-";
        remainingTextEl.classList.remove("danger", "orange", "green");
        dailyCountTextEl.textContent = "-";
        scheduleEl.innerHTML = "";
        showError("");
        persistSettings();
      }

      function bindEvents() {
        calcBtn.addEventListener("click", calculate);

        logBtn.addEventListener("click", function () {
          const result = calculate();
          if (!result) return;
          addHistoryFromResult(result);
        });

        resetBtn.addEventListener("click", resetInputs);

        clearHistoryBtn.addEventListener("click", clearHistory);

        document.querySelectorAll(".chip").forEach((chip) => {
          chip.addEventListener("click", function () {
            intervalHoursEl.value = chip.getAttribute("data-hours") || "6";
            persistSettings();
            calculate();
          });
        });

        [medicineNameEl, doseMemoEl, lastTakenEl, intervalHoursEl].forEach((el) => {
          el.addEventListener("change", persistSettings);
        });

        historyListEl.addEventListener("click", function (event) {
          const target = event.target;
          if (!(target instanceof HTMLElement)) return;
          const id = target.getAttribute("data-delete-id");
          if (id) deleteHistory(id);
        });
      }

      function startRemainingTimer() {
        window.setInterval(function () {
          if (!latestResult) return;
          latestResult.remainingMs = latestResult.nextDoseDate.getTime() - Date.now();
          renderResult(latestResult);
        }, 60000);
      }

      restoreSettings();
      bindEvents();
      renderHistory();
      calculate();
      startRemainingTimer();
    })();
  </script>
</body>
</html>
