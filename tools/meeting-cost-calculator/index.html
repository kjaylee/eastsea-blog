<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회의 비용 계산기</title>
  <meta name="description" content="참석자 수·시급·시간으로 회의 1회/연간 비용을 계산하고 절감 시나리오를 비교합니다." />
  <style>
    :root {
      --bg: #0b1220;
      --panel: #131c31;
      --panel-2: #0f172a;
      --line: #2a3a61;
      --text: #ecf2ff;
      --muted: #9eb0d7;
      --primary: #6f8dff;
      --good: #2fd09f;
      --warn: #ffc268;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(circle at 10% -20%, #243765 0%, var(--bg) 42%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 20px 14px 56px; }
    .head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(1.15rem, 2.8vw, 1.7rem); }
    .sub { margin-top: 6px; color: var(--muted); font-size: .92rem; }
    .home {
      text-decoration: none; color: #d9e5ff; border: 1px solid var(--line);
      background: #121b30; border-radius: 12px; padding: 8px 12px; white-space: nowrap; font-size: .86rem;
    }
    .grid { display: grid; gap: 12px; grid-template-columns: 1.05fr .95fr; }
    .card {
      background: linear-gradient(165deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .card h2 { margin: 0 0 10px; font-size: 1rem; }
    .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    label { display: block; color: var(--muted); font-size: .8rem; margin-bottom: 6px; }
    input, select {
      width: 100%; border-radius: 10px; border: 1px solid var(--line);
      background: #0d1528; color: var(--text); padding: 10px; font-size: .92rem;
    }
    input:focus, select:focus { outline: 2px solid rgba(111,141,255,.35); border-color: #5f7bf0; }
    .split { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #334975; }
    .stats { display: grid; gap: 9px; grid-template-columns: 1fr 1fr; }
    .pill {
      background: #0f1830; border: 1px solid var(--line); border-radius: 12px;
      padding: 10px;
    }
    .k { color: var(--muted); font-size: .78rem; margin-bottom: 5px; }
    .v { font-size: 1.08rem; font-weight: 800; }
    .main { color: #7cc7ff; font-size: 1.2rem; }
    .saving { color: var(--good); }
    .bar-wrap {
      margin-top: 12px; background: #162344; border: 1px solid #2c4474;
      border-radius: 999px; overflow: hidden; height: 14px;
    }
    .bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--warn), #ff8d6b); transition: width .25s ease; }
    .hint { margin-top: 7px; color: var(--muted); font-size: .78rem; line-height: 1.4; }
    .result {
      margin-top: 10px; border: 1px solid var(--line); border-radius: 12px;
      padding: 11px; background: #0f1730; color: #dce7ff; font-size: .9rem; line-height: 1.45;
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .inputs, .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>💼 회의 비용 계산기</h1>
        <div class="sub">참석자 수 × 시급 × 시간으로 1회/연간 회의 비용을 즉시 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>기본 입력</h2>
        <div class="inputs">
          <div>
            <label for="people">참석자 수 (명)</label>
            <input id="people" type="number" min="1" value="8" />
          </div>
          <div>
            <label for="hourlyRate">1인 평균 시급</label>
            <input id="hourlyRate" type="number" min="0" value="45000" />
          </div>
          <div>
            <label for="duration">회의 시간 (분)</label>
            <input id="duration" type="number" min="1" value="60" />
          </div>
          <div>
            <label for="currency">통화</label>
            <select id="currency">
              <option value="KRW" selected>KRW</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="JPY">JPY</option>
            </select>
          </div>
          <div>
            <label for="perWeek">주간 회의 횟수</label>
            <input id="perWeek" type="number" min="0" step="0.1" value="4" />
          </div>
          <div>
            <label for="weeks">연간 운영 주수</label>
            <input id="weeks" type="number" min="1" value="48" />
          </div>
          <div style="grid-column:1 / -1;">
            <label for="overhead">간접비율 (%) — 복리후생/관리비 포함</label>
            <input id="overhead" type="number" min="0" value="25" />
          </div>
        </div>

        <div class="split">
          <h2>절감 시나리오</h2>
          <div class="inputs">
            <div>
              <label for="reduceTime">회의 시간 단축률 (%)</label>
              <input id="reduceTime" type="number" min="0" max="95" value="20" />
            </div>
            <div>
              <label for="reducePeople">참석자 감축 (명)</label>
              <input id="reducePeople" type="number" min="0" value="1" />
            </div>
          </div>
          <div class="hint">예: 20% 시간 단축 + 1명 감축 시 연간 절감액을 자동 계산합니다.</div>
        </div>
      </article>

      <article class="card">
        <h2>결과</h2>
        <div class="stats">
          <div class="pill"><div class="k">회의 1회 비용</div><div id="oneCost" class="v">-</div></div>
          <div class="pill"><div class="k">1인당 1회 비용</div><div id="perPerson" class="v">-</div></div>
          <div class="pill"><div class="k">월간 비용 (평균)</div><div id="monthly" class="v">-</div></div>
          <div class="pill"><div class="k">연간 회의 비용</div><div id="annual" class="v main">-</div></div>
          <div class="pill"><div class="k">개선 후 연간 비용</div><div id="optimizedAnnual" class="v">-</div></div>
          <div class="pill"><div class="k">연간 절감액</div><div id="saved" class="v saving">-</div></div>
        </div>
        <div class="bar-wrap"><div id="bar" class="bar"></div></div>
        <div class="hint" id="barText">회의 비용 중 절감 가능한 비중</div>

        <div id="summary" class="result">입력값을 조정하면 ROI 요약이 여기에 표시됩니다.</div>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      people: $('people'), hourlyRate: $('hourlyRate'), duration: $('duration'), currency: $('currency'),
      perWeek: $('perWeek'), weeks: $('weeks'), overhead: $('overhead'),
      reduceTime: $('reduceTime'), reducePeople: $('reducePeople'),
      oneCost: $('oneCost'), perPerson: $('perPerson'), monthly: $('monthly'), annual: $('annual'),
      optimizedAnnual: $('optimizedAnnual'), saved: $('saved'), bar: $('bar'), barText: $('barText'), summary: $('summary')
    };

    function num(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function formatMoney(value, currency) {
      return new Intl.NumberFormat('ko-KR', {
        style: 'currency',
        currency,
        maximumFractionDigits: currency === 'KRW' || currency === 'JPY' ? 0 : 2
      }).format(value);
    }

    function calc() {
      const people = Math.max(1, Math.round(num(refs.people.value, 1)));
      const hourlyRate = Math.max(0, num(refs.hourlyRate.value));
      const durationMin = Math.max(1, num(refs.duration.value, 1));
      const perWeek = Math.max(0, num(refs.perWeek.value));
      const weeks = Math.max(1, Math.round(num(refs.weeks.value, 1)));
      const overhead = Math.max(0, num(refs.overhead.value));
      const reduceTime = Math.min(95, Math.max(0, num(refs.reduceTime.value)));
      const reducePeople = Math.max(0, Math.round(num(refs.reducePeople.value)));
      const currency = refs.currency.value;

      const durationHour = durationMin / 60;
      const oneCost = people * hourlyRate * durationHour * (1 + overhead / 100);
      const annual = oneCost * perWeek * weeks;
      const monthly = annual / 12;

      const optimizedPeople = Math.max(1, people - reducePeople);
      const optimizedDurationMin = Math.max(5, durationMin * (1 - reduceTime / 100));
      const optimizedOne = optimizedPeople * hourlyRate * (optimizedDurationMin / 60) * (1 + overhead / 100);
      const optimizedAnnual = optimizedOne * perWeek * weeks;
      const saved = Math.max(0, annual - optimizedAnnual);
      const savingRate = annual > 0 ? (saved / annual) * 100 : 0;

      refs.oneCost.textContent = formatMoney(oneCost, currency);
      refs.perPerson.textContent = formatMoney(oneCost / people, currency);
      refs.monthly.textContent = formatMoney(monthly, currency);
      refs.annual.textContent = formatMoney(annual, currency);
      refs.optimizedAnnual.textContent = formatMoney(optimizedAnnual, currency);
      refs.saved.textContent = formatMoney(saved, currency);
      refs.bar.style.width = `${Math.min(100, Math.max(0, savingRate)).toFixed(1)}%`;
      refs.barText.textContent = `절감률 ${savingRate.toFixed(1)}% (시간 ${reduceTime.toFixed(0)}% 단축, 참석자 ${reducePeople}명 감축)`;

      const meetingsPerYear = perWeek * weeks;
      refs.summary.textContent = `연간 약 ${meetingsPerYear.toFixed(1)}회의 기준으로 ${formatMoney(annual, currency)}가 소요됩니다. ` +
        `현재 시나리오를 적용하면 ${formatMoney(saved, currency)} 절감되어, 연간 회의비가 ${formatMoney(optimizedAnnual, currency)}로 감소합니다.`;
    }

    Object.values(refs).forEach((node) => {
      if (node && (node.tagName === 'INPUT' || node.tagName === 'SELECT')) {
        node.addEventListener('input', calc);
        node.addEventListener('change', calc);
      }
    });

    calc();
  </script>
</body>
</html>
