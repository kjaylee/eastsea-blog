<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="회의록 타이머 - 모든 내용은 브라우저 localStorage에 자동 저장됩니다. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>회의록 타이머</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #101327;
      --panel-2: #151a33;
      --text: #e8ecff;
      --muted: #9aa4d0;
      --neon: #00f5d4;
      --neon-2: #8b5cf6;
      --danger: #ff5c8a;
      --line: #27305c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: radial-gradient(1200px 600px at 100% -10%, #1a1f45 0%, transparent 60%), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }

    .title {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 14px var(--neon);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      letter-spacing: 0.2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1 1 180px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1330;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .timer {
      text-align: center;
      font-size: clamp(1.8rem, 8vw, 3rem);
      font-weight: 700;
      letter-spacing: 1.2px;
      margin: 8px 0 14px;
      color: var(--neon);
      text-shadow: 0 0 12px rgba(0, 245, 212, 0.35);
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    button {
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      border-color: var(--neon);
      box-shadow: 0 0 0 1px rgba(0, 245, 212, 0.3) inset;
    }

    button:active { transform: translateY(1px); }

    .primary {
      background: linear-gradient(120deg, rgba(0,245,212,0.2), rgba(139,92,246,0.24));
      border-color: rgba(0,245,212,0.55);
    }

    .danger { border-color: rgba(255,92,138,0.6); color: #ffd4e2; }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      max-height: 380px;
      overflow: auto;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #0e1229;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(0,245,212,0.55);
      color: #affff3;
      background: rgba(0,245,212,0.08);
      font-size: 0.75rem;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .item-actions button {
      padding: 7px 9px;
      font-size: 0.78rem;
    }

    .hint {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 8px;
      line-height: 1.45;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .wrap { padding: 14px; }
      .panel { padding: 12px; }
    }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="title">
      <span class="dot" aria-hidden="true"></span>
      <h1>회의록 타이머</h1>
    </div>

    <section class="panel" style="margin-bottom:14px;">
      <div class="row">
        <div>
          <label for="meetingTitle">회의 제목</label>
          <input id="meetingTitle" placeholder="예: 3월 서비스 개선 회의" />
        </div>
        <div>
          <label for="meetingDate">회의 날짜</label>
          <input id="meetingDate" type="date" />
        </div>
      </div>
      <p class="hint">모든 내용은 브라우저 <strong>localStorage</strong>에 자동 저장됩니다.</p>
    </section>

    <div class="grid">
      <section class="panel">
        <div class="timer" id="timerText">00:00:00</div>
        <div class="btn-row">
          <button class="primary" id="startBtn">시작</button>
          <button id="pauseBtn">일시정지</button>
          <button class="danger" id="resetBtn">초기화</button>
        </div>
        <div class="meta">
          <span id="runningState">상태: 정지</span>
          <span id="entryCount">기록 0개</span>
        </div>
      </section>

      <section class="panel">
        <label for="entryType">항목 유형</label>
        <select id="entryType">
          <option value="안건">안건</option>
          <option value="결정">결정</option>
          <option value="액션아이템">액션아이템</option>
          <option value="메모">메모</option>
        </select>

        <label for="entryText" style="margin-top:10px;">내용</label>
        <textarea id="entryText" placeholder="회의 중 핵심 내용을 입력하세요."></textarea>

        <div class="row" style="margin-top:10px;">
          <button class="primary" id="addEntryBtn">타임스탬프 기록 추가</button>
          <button id="exportBtn">마크다운 내보내기</button>
        </div>
      </section>
    </div>

    <section class="panel" style="margin-top:14px;">
      <h2 style="margin:0 0 10px;font-size:1rem;">기록 목록</h2>
      <ul class="list" id="entryList"></ul>
    </section>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'meetingMinutesTimerStateV1';
      const $ = (id) => document.getElementById(id);

      const els = {
        meetingTitle: $('meetingTitle'),
        meetingDate: $('meetingDate'),
        timerText: $('timerText'),
        runningState: $('runningState'),
        entryCount: $('entryCount'),
        entryType: $('entryType'),
        entryText: $('entryText'),
        entryList: $('entryList'),
        startBtn: $('startBtn'),
        pauseBtn: $('pauseBtn'),
        resetBtn: $('resetBtn'),
        addEntryBtn: $('addEntryBtn'),
        exportBtn: $('exportBtn')
      };

      const defaultState = {
        meetingTitle: '',
        meetingDate: new Date().toISOString().slice(0, 10),
        elapsedMs: 0,
        startedAt: null,
        entries: [],
        draftType: '안건',
        draftText: ''
      };

      let state = loadState();
      let timer = null;

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return { ...defaultState };
          const parsed = JSON.parse(raw);
          return {
            ...defaultState,
            ...parsed,
            entries: Array.isArray(parsed.entries) ? parsed.entries : []
          };
        } catch {
          return { ...defaultState };
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function nowElapsedMs() {
        if (!state.startedAt) return state.elapsedMs;
        return state.elapsedMs + (Date.now() - state.startedAt);
      }

      function formatMs(ms) {
        const sec = Math.floor(ms / 1000);
        const h = String(Math.floor(sec / 3600)).padStart(2, '0');
        const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        return `${h}:${m}:${s}`;
      }

      function renderTimer() {
        els.timerText.textContent = formatMs(nowElapsedMs());
        els.runningState.textContent = `상태: ${state.startedAt ? '진행 중' : '정지'}`;
      }

      function renderEntries() {
        els.entryCount.textContent = `기록 ${state.entries.length}개`;
        if (!state.entries.length) {
          els.entryList.innerHTML = '<li class="item" style="text-align:center;color:var(--muted)">아직 기록이 없습니다.</li>';
          return;
        }

        els.entryList.innerHTML = state.entries
          .map((entry) => {
            const safeText = escapeHtml(entry.text || '');
            const safeType = escapeHtml(entry.type || '메모');
            return `
              <li class="item" data-id="${entry.id}">
                <div class="item-top">
                  <span><span class="badge">${safeType}</span> · ${formatMs(entry.tsMs || 0)}</span>
                  <span>${new Date(entry.createdAt).toLocaleTimeString('ko-KR', { hour12: false })}</span>
                </div>
                <div>${safeText.replace(/\n/g, '<br>')}</div>
                <div class="item-actions">
                  <button data-action="edit">수정</button>
                  <button data-action="delete" class="danger">삭제</button>
                </div>
              </li>`;
          })
          .join('');
      }

      function escapeHtml(str) {
        return str
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function setDraftFromInputs() {
        state.meetingTitle = els.meetingTitle.value;
        state.meetingDate = els.meetingDate.value;
        state.draftType = els.entryType.value;
        state.draftText = els.entryText.value;
        saveState();
      }

      function startTimer() {
        if (state.startedAt) return;
        state.startedAt = Date.now();
        saveState();
        renderTimer();
        if (timer) clearInterval(timer);
        timer = setInterval(renderTimer, 250);
      }

      function pauseTimer() {
        if (!state.startedAt) return;
        state.elapsedMs += (Date.now() - state.startedAt);
        state.startedAt = null;
        saveState();
        renderTimer();
        if (timer) clearInterval(timer);
      }

      function resetTimer() {
        const ok = confirm('타이머와 기록을 모두 초기화할까요?');
        if (!ok) return;
        state.elapsedMs = 0;
        state.startedAt = null;
        state.entries = [];
        saveState();
        renderTimer();
        renderEntries();
        if (timer) clearInterval(timer);
      }

      function addEntry() {
        const text = els.entryText.value.trim();
        if (!text) {
          alert('기록 내용을 입력해 주세요.');
          return;
        }

        state.entries.unshift({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
          type: els.entryType.value,
          text,
          tsMs: nowElapsedMs(),
          createdAt: new Date().toISOString()
        });

        els.entryText.value = '';
        state.draftText = '';
        saveState();
        renderEntries();
      }

      function exportMarkdown() {
        const lines = [];
        lines.push(`# ${state.meetingTitle || '회의록'}`);
        lines.push('');
        lines.push(`- 날짜: ${state.meetingDate || '-'}`);
        lines.push(`- 총 회의 시간: ${formatMs(nowElapsedMs())}`);
        lines.push('');
        lines.push('## 기록');
        lines.push('');

        if (!state.entries.length) {
          lines.push('- 기록 없음');
        } else {
          const reversed = [...state.entries].reverse();
          reversed.forEach((e) => {
            lines.push(`- [${formatMs(e.tsMs || 0)}] **${e.type}**: ${e.text.replace(/\n/g, ' ')}`);
          });
        }

        const text = lines.join('\n');
        navigator.clipboard.writeText(text)
          .then(() => alert('마크다운이 클립보드에 복사되었습니다.'))
          .catch(() => alert('복사에 실패했습니다. 수동 복사를 이용해 주세요.'));
      }

      function handleListClick(e) {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const item = e.target.closest('.item');
        if (!item) return;

        const id = item.dataset.id;
        const idx = state.entries.findIndex((x) => x.id === id);
        if (idx < 0) return;

        const action = btn.dataset.action;
        if (action === 'delete') {
          state.entries.splice(idx, 1);
          saveState();
          renderEntries();
          return;
        }

        if (action === 'edit') {
          const next = prompt('내용 수정', state.entries[idx].text);
          if (next == null) return;
          state.entries[idx].text = next.trim();
          saveState();
          renderEntries();
        }
      }

      function bindEvents() {
        [els.meetingTitle, els.meetingDate, els.entryType, els.entryText].forEach((el) => {
          el.addEventListener('input', setDraftFromInputs);
          el.addEventListener('change', setDraftFromInputs);
        });

        els.startBtn.addEventListener('click', startTimer);
        els.pauseBtn.addEventListener('click', pauseTimer);
        els.resetBtn.addEventListener('click', resetTimer);
        els.addEntryBtn.addEventListener('click', addEntry);
        els.exportBtn.addEventListener('click', exportMarkdown);
        els.entryList.addEventListener('click', handleListClick);

        window.addEventListener('beforeunload', () => {
          if (state.startedAt) {
            state.elapsedMs += (Date.now() - state.startedAt);
            state.startedAt = Date.now();
          }
          setDraftFromInputs();
        });
      }

      function init() {
        els.meetingTitle.value = state.meetingTitle;
        els.meetingDate.value = state.meetingDate;
        els.entryType.value = state.draftType;
        els.entryText.value = state.draftText;

        renderTimer();
        renderEntries();
        bindEvents();

        if (state.startedAt) {
          if (timer) clearInterval(timer);
          timer = setInterval(renderTimer, 250);
        }
      }

      init();
    })();
  </script>
</body>
</html>
