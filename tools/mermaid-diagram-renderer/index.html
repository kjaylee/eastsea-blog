<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid 다이어그램 렌더러 | Mermaid Diagram Live Editor</title>
  <meta name="description" content="Mermaid.js 다이어그램을 실시간으로 렌더링하세요. 플로우차트, 시퀀스 다이어그램, ER 다이어그램, 간트 차트 등을 코드로 작성하고 즉시 미리보기. Render Mermaid diagrams online — flowcharts, sequence, ER, Gantt, and more.">
  <meta property="og:title" content="Mermaid 다이어그램 렌더러 | Live Editor">
  <meta property="og:description" content="Mermaid.js 코드로 다이어그램을 실시간 렌더링. 플로우차트·시퀀스·ER·간트 지원.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eastsea.kr/tools/mermaid-diagram-renderer/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mermaid 다이어그램 렌더러">
  <meta name="twitter:description" content="Mermaid.js 코드로 다이어그램을 실시간 렌더링. 온라인 Mermaid 에디터.">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --accent-color: #7c3aed;
      --accent-hover: #6d28d9;
      --border: #dee2e6;
      --shadow: rgba(0,0,0,0.08);
      --card-bg: #ffffff;
      --input-bg: #ffffff;
      --code-bg: #f3f4f6;
      --success: #10b981;
      --error: #ef4444;
      --tag-bg: #ede9fe;
      --tag-text: #5b21b6;
    }
    [data-theme="dark"] {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #2d2d2d;
      --shadow: rgba(0,0,0,0.4);
      --card-bg: #1e1e1e;
      --input-bg: #2a2a2a;
      --code-bg: #2d2d2d;
      --tag-bg: #3b2b6e;
      --tag-text: #c4b5fd;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .header-left { display:flex; align-items:center; gap:12px; }
    .back-btn {
      text-decoration:none; color:var(--text-secondary);
      display:flex; align-items:center; gap:4px; font-weight:500;
      padding:6px 12px; border-radius:8px; border:1px solid var(--border);
      transition:all .2s;
    }
    .back-btn:hover { background:var(--bg-secondary); color:var(--text-primary); }
    h1 { font-size:1.1rem; font-weight:700; }
    .theme-btn {
      background:none; border:1px solid var(--border); color:var(--text-primary);
      padding:6px 12px; border-radius:8px; cursor:pointer; font-size:.85rem;
      transition:all .2s;
    }
    .theme-btn:hover { background:var(--bg-secondary); }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 60px);
    }
    .editor-panel, .preview-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-panel { border-right: 1px solid var(--border); }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      font-size:.85rem; font-weight:600;
    }
    .examples-row {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display:flex; gap:6px; flex-wrap:wrap;
    }
    .example-btn {
      background: var(--tag-bg); color: var(--tag-text);
      border:none; padding:3px 10px; border-radius:20px;
      font-size:.78rem; cursor:pointer; font-weight:500; transition:opacity .2s;
    }
    .example-btn:hover { opacity:.8; }
    #code-editor {
      flex: 1;
      width: 100%;
      resize: none;
      border: none;
      outline: none;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: .88rem;
      line-height: 1.7;
      background: var(--input-bg);
      color: var(--text-primary);
      tab-size: 2;
    }
    .preview-panel {
      background: var(--bg-primary);
    }
    .preview-actions {
      display:flex; gap:8px;
    }
    #preview-area {
      flex:1; overflow:auto; padding:24px;
      display:flex; align-items:flex-start; justify-content:center;
    }
    #mermaid-output {
      max-width:100%;
    }
    #mermaid-output svg {
      max-width: 100%;
      height: auto;
    }
    .error-msg {
      color: var(--error);
      background: #fef2f2;
      border:1px solid #fecaca;
      border-radius:8px;
      padding:12px 16px;
      font-size:.85rem;
      font-family: monospace;
    }
    [data-theme="dark"] .error-msg {
      background: #2d1515;
      border-color: #7f1d1d;
    }
    .action-btn {
      padding:5px 12px; border-radius:8px; border:1px solid var(--border);
      background:var(--card-bg); color:var(--text-primary);
      font-size:.8rem; cursor:pointer; display:flex; align-items:center; gap:4px;
      transition:all .2s;
    }
    .action-btn:hover { background:var(--accent-color); color:#fff; border-color:var(--accent-color); }
    .action-btn.primary { background:var(--accent-color); color:#fff; border-color:var(--accent-color); }
    .action-btn.primary:hover { background:var(--accent-hover); }
    .status-indicator {
      display:flex; align-items:center; gap:6px; font-size:.78rem; color:var(--text-secondary);
    }
    .status-dot {
      width:8px; height:8px; border-radius:50%; background:var(--success);
    }
    .status-dot.error { background:var(--error); }
    .theme-select {
      background:var(--input-bg); color:var(--text-primary);
      border:1px solid var(--border); border-radius:6px;
      padding:3px 8px; font-size:.78rem; cursor:pointer;
    }
    /* Info footer */
    .info-section {
      padding:32px 20px;
      max-width:900px;
      margin:0 auto;
    }
    .info-section h2 { font-size:1.1rem; margin-bottom:8px; }
    .info-section p { font-size:.88rem; color:var(--text-secondary); line-height:1.8; }
    .examples-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; margin-top:12px;
    }
    .eg-card {
      background:var(--card-bg); border:1px solid var(--border); border-radius:10px;
      padding:10px 12px; font-size:.8rem; cursor:pointer; transition:all .2s;
      display:flex; flex-direction:column; gap:4px;
    }
    .eg-card:hover { border-color:var(--accent-color); background:var(--tag-bg); }
    .eg-card strong { font-size:.85rem; }
    @media(max-width:700px) {
      .workspace { grid-template-columns:1fr; height:auto; }
      .editor-panel { height:45vh; }
      .preview-panel { height:50vh; }
      .editor-panel { border-right:none; border-bottom:1px solid var(--border); }
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="/tools/" class="back-btn">← 홈</a>
    <h1>🧩 Mermaid 다이어그램 렌더러</h1>
  </div>
  <button class="theme-btn" id="themeToggle">🌙 다크</button>
</header>

<div class="workspace">
  <!-- Editor -->
  <div class="editor-panel">
    <div class="panel-header">
      <span>📝 Mermaid 코드 / Code</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <span style="font-size:.75rem;color:var(--text-secondary)">테마 / Theme</span>
        <select class="theme-select" id="mermaidTheme">
          <option value="default">Default</option>
          <option value="forest">Forest</option>
          <option value="dark">Dark</option>
          <option value="neutral">Neutral</option>
          <option value="base">Base</option>
        </select>
      </div>
    </div>
    <div class="examples-row">
      <button class="example-btn" onclick="loadExample('flowchart')">Flowchart</button>
      <button class="example-btn" onclick="loadExample('sequence')">Sequence</button>
      <button class="example-btn" onclick="loadExample('er')">ER Diagram</button>
      <button class="example-btn" onclick="loadExample('gantt')">Gantt</button>
      <button class="example-btn" onclick="loadExample('class')">Class</button>
      <button class="example-btn" onclick="loadExample('state')">State</button>
      <button class="example-btn" onclick="loadExample('pie')">Pie Chart</button>
      <button class="example-btn" onclick="loadExample('mindmap')">Mindmap</button>
    </div>
    <textarea id="code-editor" spellcheck="false" placeholder="Mermaid 코드를 입력하세요..."></textarea>
  </div>

  <!-- Preview -->
  <div class="preview-panel">
    <div class="panel-header">
      <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">준비 / Ready</span>
      </div>
      <div class="preview-actions">
        <button class="action-btn" onclick="copyAsSVG()">📋 SVG 복사</button>
        <button class="action-btn" onclick="downloadSVG()">⬇️ SVG 저장</button>
        <button class="action-btn primary" onclick="renderNow()">▶ 렌더링</button>
      </div>
    </div>
    <div id="preview-area">
      <div id="mermaid-output"></div>
    </div>
  </div>
</div>

<script src="/assets/analytics.js"></script>
<script>
// ── Theme ──────────────────────────────────────────────────────────
const themeBtn = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
themeBtn.textContent = savedTheme === 'dark' ? '☀️ 라이트' : '🌙 다크';
themeBtn.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  themeBtn.textContent = next === 'dark' ? '☀️ 라이트' : '🌙 다크';
});

// ── Mermaid init ───────────────────────────────────────────────────
function getMermaidTheme() {
  return document.getElementById('mermaidTheme').value;
}

function reinitMermaid() {
  mermaid.initialize({
    startOnLoad: false,
    theme: getMermaidTheme(),
    securityLevel: 'loose',
    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
  });
}
reinitMermaid();
document.getElementById('mermaidTheme').addEventListener('change', () => { reinitMermaid(); renderNow(); });

// ── Examples ───────────────────────────────────────────────────────
const examples = {
  flowchart: `flowchart TD
    A([🚀 시작]) --> B{입력 검증}
    B -->|유효| C[데이터 처리]
    B -->|오류| D[오류 메시지 표시]
    C --> E[DB 저장]
    E --> F{성공?}
    F -->|Yes| G([✅ 완료])
    F -->|No| H[재시도]
    H --> C
    D --> I([❌ 종료])`,

  sequence: `sequenceDiagram
    actor 사용자 as 👤 사용자
    participant FE as 프론트엔드
    participant API as API 서버
    participant DB as 데이터베이스

    사용자->>FE: 로그인 요청
    FE->>API: POST /auth/login
    API->>DB: 사용자 조회
    DB-->>API: 사용자 정보
    API-->>FE: JWT 토큰
    FE-->>사용자: 로그인 성공 ✅`,

  er: `erDiagram
    USER {
        int id PK
        string email UK
        string name
        datetime created_at
    }
    POST {
        int id PK
        string title
        text content
        int user_id FK
        datetime published_at
    }
    COMMENT {
        int id PK
        text body
        int post_id FK
        int user_id FK
    }
    TAG {
        int id PK
        string name UK
    }
    USER ||--o{ POST : "작성"
    POST ||--o{ COMMENT : "포함"
    USER ||--o{ COMMENT : "작성"
    POST }o--o{ TAG : "태그됨"`,

  gantt: `gantt
    title 프로젝트 개발 일정
    dateFormat YYYY-MM-DD
    section 기획
    요구사항 분석    :a1, 2025-01-01, 7d
    와이어프레임     :a2, after a1, 5d
    section 개발
    백엔드 개발     :b1, after a2, 14d
    프론트엔드 개발  :b2, after a2, 14d
    section QA
    테스트          :c1, after b1, 7d
    버그 수정       :c2, after c1, 5d
    section 배포
    스테이징 배포    :d1, after c2, 2d
    프로덕션 배포    :d2, after d1, 1d`,

  class: `classDiagram
    class Animal {
        +String name
        +int age
        +makeSound() String
        +move() void
    }
    class Dog {
        +String breed
        +fetch() void
        +makeSound() String
    }
    class Cat {
        +boolean indoor
        +purr() void
        +makeSound() String
    }
    class Bird {
        +float wingspan
        +fly() void
        +makeSound() String
    }
    Animal <|-- Dog
    Animal <|-- Cat
    Animal <|-- Bird`,

  state: `stateDiagram-v2
    [*] --> 대기중
    대기중 --> 처리중 : 주문 접수
    처리중 --> 배송준비 : 결제 완료
    처리중 --> 취소됨 : 주문 취소
    배송준비 --> 배송중 : 출고 완료
    배송중 --> 배송완료 : 배달 완료
    배송중 --> 반품처리 : 반품 요청
    배송완료 --> 반품처리 : 반품 요청
    반품처리 --> 환불완료 : 환불 처리
    취소됨 --> [*]
    배송완료 --> [*]
    환불완료 --> [*]`,

  pie: `pie title 2024 기술 스택 사용 현황
    "TypeScript" : 42
    "Python" : 28
    "Rust" : 12
    "Go" : 10
    "기타" : 8`,

  mindmap: `mindmap
  root((AI 개발))
    LLM
      GPT-4o
      Claude 3.5
      Gemini 2.0
    프레임워크
      LangChain
      LlamaIndex
      Haystack
    인프라
      AWS Bedrock
      GCP Vertex AI
      Azure OpenAI
    활용 사례
      챗봇
      코드 생성
      문서 요약`
};

function loadExample(type) {
  document.getElementById('code-editor').value = examples[type];
  renderNow();
}

// ── Render ─────────────────────────────────────────────────────────
let renderTimer = null;
const editor = document.getElementById('code-editor');
const output = document.getElementById('mermaid-output');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

editor.addEventListener('input', () => {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderNow, 600);
});

async function renderNow() {
  const code = editor.value.trim();
  if (!code) {
    output.innerHTML = '<p style="color:var(--text-secondary);font-size:.9rem;">코드를 입력하면 다이어그램이 여기 표시됩니다.<br>Enter code to see your diagram.</p>';
    return;
  }
  try {
    const id = 'mermaid-svg-' + Date.now();
    const { svg } = await mermaid.render(id, code);
    output.innerHTML = svg;
    statusDot.className = 'status-dot';
    statusText.textContent = '렌더링 성공 ✓';
  } catch(e) {
    output.innerHTML = `<div class="error-msg">⚠️ 렌더링 오류<br><br>${e.message || e}</div>`;
    statusDot.className = 'status-dot error';
    statusText.textContent = '오류 / Error';
  }
}

function copyAsSVG() {
  const svg = output.querySelector('svg');
  if (!svg) return alert('렌더링된 SVG가 없습니다.');
  navigator.clipboard.writeText(svg.outerHTML).then(() => {
    const btn = event.target;
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => btn.textContent = '📋 SVG 복사', 1500);
  });
}

function downloadSVG() {
  const svg = output.querySelector('svg');
  if (!svg) return alert('렌더링된 SVG가 없습니다.');
  const blob = new Blob([svg.outerHTML], { type:'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'diagram.svg';
  a.click();
}

// ── Init ───────────────────────────────────────────────────────────
loadExample('flowchart');
</script>
</body>
</html>
