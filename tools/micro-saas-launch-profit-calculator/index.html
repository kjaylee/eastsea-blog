<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro SaaS Launch Profit Calculator | 마이크로 SaaS 런칭 수익 계산기</title>
  <meta name="description" content="마이크로 SaaS 런칭 가정을 입력하면 예상 유료 고객 수, MRR, 월 순이익, 12개월 ROI, 회수기간, 손익분기 유료 고객 수를 계산합니다." />
  <style>
    :root{--bg:#f6f7fb;--card:#ffffff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--primary:#6366f1;--primary-soft:#e0e7ff;--ok:#16a34a;--warn:#f97316;--danger:#ef4444}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:22px 16px 48px}
    header{margin-bottom:16px}
    h1{margin:0;font-size:clamp(1.3rem,2.6vw,1.9rem)}
    .sub{margin:6px 0 0;color:var(--muted);font-size:.95rem}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 6px 18px rgba(15,23,42,.05)}
    h2{margin:0 0 10px;font-size:1.02rem}
    label{display:block;color:var(--muted);font-size:.82rem;margin-bottom:6px;font-weight:600}
    input,button,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 11px;font:inherit;background:#fff}
    input{font-size:.95rem}
    button{cursor:pointer;border:none;background:var(--primary);color:#fff;font-weight:700}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .soft{background:#f1f5ff;color:#3730a3;border:1px solid #c7d2fe}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);border-radius:10px;padding:10px;background:#fafbff}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;border:1px solid var(--line);background:#f8fafc;color:#334155;font-size:.78rem;margin-top:8px}
    .pill.ok{border-color:#86efac;color:var(--ok);background:#ecfdf3}
    .pill.warn{border-color:#fdba74;color:var(--warn);background:#fff7ed}
    .pill.danger{border-color:#fca5a5;color:var(--danger);background:#fef2f2}
    textarea{min-height:98px;resize:vertical;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .error{display:none;margin-top:10px;padding:8px 10px;border-radius:10px;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;font-size:.86rem}
    .error.show{display:block}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>🚀 마이크로 SaaS 런칭 수익 계산기</h1>
      <p class="sub">방문 → 트라이얼 → 유료 전환과 비용 구조를 입력해 MRR, 월 순이익, 12개월 ROI, 회수기간을 빠르게 확인하세요.</p>
    </header>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="visitors">월 방문자 수 (명)</label><input id="visitors" type="number" min="0" value="50000" /></div>
          <div><label for="trialRate">방문→트라이얼 전환율 (%)</label><input id="trialRate" type="number" min="0" max="100" step="0.1" value="8" /></div>
          <div><label for="paidRate">트라이얼→유료 전환율 (%)</label><input id="paidRate" type="number" min="0" max="100" step="0.1" value="5" /></div>
          <div><label for="price">월 구독 가격 (KRW)</label><input id="price" type="number" min="0" value="24000" /></div>
          <div><label for="feeRate">결제 수수료 (%)</label><input id="feeRate" type="number" min="0" max="100" step="0.1" value="3.5" /></div>
          <div><label for="varCost">유료 1인당 월 변동비 (KRW)</label><input id="varCost" type="number" min="0" value="2000" /></div>
          <div><label for="fixedCost">월 고정비 (KRW)</label><input id="fixedCost" type="number" min="0" value="1200000" /></div>
          <div><label for="marketing">월 마케팅 비용 (KRW)</label><input id="marketing" type="number" min="0" value="1000000" /></div>
          <div><label for="launchCost">1회성 런칭 비용 (KRW)</label><input id="launchCost" type="number" min="0" value="5000000" /></div>
          <div><label for="churnRate">월 이탈률 (%)</label><input id="churnRate" type="number" min="0" max="100" step="0.1" value="4" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">예상 유료 고객 수</div><div id="paidUsers" class="v">-</div></div>
          <div class="kpi"><div class="k">월 총매출 (MRR)</div><div id="mrr" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순이익</div><div id="net" class="v">-</div></div>
          <div class="kpi"><div class="k">12개월 ROI</div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">상세 지표</h2>
        <table>
          <tbody>
            <tr><th>12개월 누적 순이익</th><td id="yearNet">-</td></tr>
            <tr><th>회수기간 (개월)</th><td id="payback">-</td></tr>
            <tr><th>손익분기 유료 고객 수</th><td id="breakEven">-</td></tr>
            <tr><th>유료 1인 LTV</th><td id="ltv">-</td></tr>
            <tr><th>월 총비용</th><td id="totalCost">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      visitors:$("visitors"), trialRate:$("trialRate"), paidRate:$("paidRate"), price:$("price"), feeRate:$("feeRate"), varCost:$("varCost"), fixedCost:$("fixedCost"), marketing:$("marketing"), launchCost:$("launchCost"), churnRate:$("churnRate"),
      paidUsers:$("paidUsers"), mrr:$("mrr"), net:$("net"), roi:$("roi"), yearNet:$("yearNet"), payback:$("payback"), breakEven:$("breakEven"), ltv:$("ltv"), totalCost:$("totalCost"),
      status:$("status"), summary:$("summary"), error:$("error"), reset:$("reset"), copy:$("copy")
    };

    const defaults = {
      visitors:50000, trialRate:8, paidRate:5, price:24000, feeRate:3.5, varCost:2000, fixedCost:1200000, marketing:1000000, launchCost:5000000, churnRate:4
    };

    const fmtMoney = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const fmtNum = (n,d=0)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});
    const fmtPct = (n)=>`${Number(n).toLocaleString("ko-KR",{maximumFractionDigits:1})}%`;

    function setText(id, value){ refs[id].textContent = value; }

    function validate(v){
      if ([v.trialRate,v.paidRate,v.feeRate,v.churnRate].some(n=>!Number.isFinite(n) || n<0 || n>100)) return "비율 값은 0~100% 범위여야 합니다.";
      if ([v.visitors,v.price,v.varCost,v.fixedCost,v.marketing,v.launchCost].some(n=>!Number.isFinite(n) || n<0)) return "금액/수치는 0 이상이어야 합니다.";
      return "";
    }

    function compute(v){
      const paidUsers = v.visitors * (v.trialRate/100) * (v.paidRate/100);
      const mrr = paidUsers * v.price;
      const fee = mrr * (v.feeRate/100);
      const variable = paidUsers * v.varCost;
      const totalCost = fee + variable + v.fixedCost + v.marketing;
      const net = mrr - totalCost;
      const yearNet = (net * 12) - v.launchCost;
      const roi = v.launchCost === 0 ? (yearNet >= 0 ? Infinity : -Infinity) : (yearNet / v.launchCost) * 100;
      const payback = net > 0 ? (v.launchCost / net) : Infinity;
      const marginPerUser = v.price * (1 - v.feeRate/100) - v.varCost;
      const breakEven = marginPerUser > 0 ? (v.fixedCost + v.marketing) / marginPerUser : Infinity;
      const ltv = v.churnRate > 0 && marginPerUser > 0 ? marginPerUser / (v.churnRate/100) : (marginPerUser > 0 ? Infinity : -Infinity);
      return { paidUsers, mrr, net, yearNet, roi, payback, breakEven, ltv, totalCost };
    }

    function statusBadge(net){
      refs.status.classList.remove("ok","warn","danger");
      if (net > 0){ refs.status.classList.add("ok"); refs.status.textContent = "수익 구간입니다"; return; }
      if (net === 0){ refs.status.classList.add("warn"); refs.status.textContent = "손익분기 상태입니다"; return; }
      refs.status.classList.add("danger"); refs.status.textContent = "가정 재조정이 필요합니다";
    }

    function formatMaybe(v, unit){
      if (v === Infinity) return "∞";
      if (v === -Infinity) return "불가";
      if (!Number.isFinite(v)) return "-";
      return unit ? `${fmtNum(v,1)}${unit}` : fmtNum(v,1);
    }

    function render(){
      const v = {
        visitors:Number(refs.visitors.value), trialRate:Number(refs.trialRate.value), paidRate:Number(refs.paidRate.value), price:Number(refs.price.value), feeRate:Number(refs.feeRate.value), varCost:Number(refs.varCost.value),
        fixedCost:Number(refs.fixedCost.value), marketing:Number(refs.marketing.value), launchCost:Number(refs.launchCost.value), churnRate:Number(refs.churnRate.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        ["paidUsers","mrr","net","roi","yearNet","payback","breakEven","ltv","totalCost"].forEach((id)=>setText(id,"-"));
        refs.summary.value = "";
        refs.status.textContent = "입력값을 확인하세요";
        return;
      }

      const r = compute(v);
      setText("paidUsers", `${fmtNum(r.paidUsers,1)}명`);
      setText("mrr", fmtMoney(r.mrr));
      setText("net", fmtMoney(r.net));
      setText("roi", r.roi === Infinity ? "∞" : r.roi === -Infinity ? "불가" : fmtPct(r.roi));
      setText("yearNet", fmtMoney(r.yearNet));
      setText("payback", r.payback === Infinity ? "불가" : `${fmtNum(r.payback,1)}개월`);
      setText("breakEven", r.breakEven === Infinity ? "불가" : `${fmtNum(r.breakEven,0)}명`);
      setText("ltv", r.ltv === Infinity ? "∞" : r.ltv === -Infinity ? "불가" : fmtMoney(r.ltv));
      setText("totalCost", fmtMoney(r.totalCost));
      statusBadge(r.net);

      refs.summary.value = `[Micro SaaS Launch 요약]\n`+
        `유료 고객 ${fmtNum(r.paidUsers,1)}명, MRR ${fmtMoney(r.mrr)}, 월 순이익 ${fmtMoney(r.net)}\n`+
        `12개월 ROI ${r.roi === Infinity ? "∞" : r.roi === -Infinity ? "불가" : fmtPct(r.roi)}, 회수기간 ${r.payback === Infinity ? "불가" : fmtNum(r.payback,1)+"개월"}\n`+
        `손익분기 유료 고객 ${r.breakEven === Infinity ? "불가" : fmtNum(r.breakEven,0)+"명"}, LTV ${r.ltv === Infinity ? "∞" : r.ltv === -Infinity ? "불가" : fmtMoney(r.ltv)}.`;
    }

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>{ refs[k].value = v; });
      render();
    });

    refs.copy.addEventListener("click", async ()=>{
      try{
        await navigator.clipboard.writeText(refs.summary.value || "");
        refs.copy.textContent = "복사 완료";
        setTimeout(()=>{ refs.copy.textContent = "요약 복사"; }, 1200);
      }catch(e){
        refs.copy.textContent = "복사 실패";
        setTimeout(()=>{ refs.copy.textContent = "요약 복사"; }, 1200);
      }
    });

    ["visitors","trialRate","paidRate","price","feeRate","varCost","fixedCost","marketing","launchCost","churnRate"].forEach((id)=>{
      refs[id].addEventListener("input", render);
      refs[id].addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
