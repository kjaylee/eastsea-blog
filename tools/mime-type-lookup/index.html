<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIME Type Lookup | MIME 타입 검색기</title>
  <meta name="description" content="Look up MIME types by file extension or Content-Type string. Comprehensive reference with copy support. Free, instant, no signup required.">
  <meta name="keywords" content="MIME type lookup, Content-Type header, file extension MIME, HTTP content type, MIME type reference, media type">
  <meta property="og:title" content="MIME Type Lookup">
  <meta property="og:description" content="Find MIME types by extension or type string. Instant lookup, copy to clipboard.">
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b; --accent: #0ea5e9;
      --accent-bg: #e0f2fe; --accent-fg: #0369a1;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --border: #334155;
      --text: #f1f5f9; --muted: #94a3b8; --accent: #38bdf8;
      --accent-bg: #0c4a6e; --accent-fg: #7dd3fc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: .75rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--card); position: sticky; top: 0; z-index: 10; }
    .topbar-title { font-size: 1rem; font-weight: 700; }
    .topbar-sub { font-size: .72rem; color: var(--muted); }
    .theme-btn { background: none; border: 1px solid var(--border); border-radius: .5rem; padding: .35rem .75rem; cursor: pointer; font-size: .8rem; color: var(--text); }
    main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    .desc { text-align: center; color: var(--muted); font-size: .875rem; margin-bottom: 1.25rem; line-height: 1.6; }
    .search-wrap { position: relative; margin-bottom: .75rem; }
    .search-wrap input { width: 100%; padding: .75rem 1rem .75rem 2.75rem; border: 2px solid var(--border); border-radius: .75rem; background: var(--card); color: var(--text); font: 1rem/1 inherit; transition: border-color .15s; }
    .search-wrap input:focus { outline: none; border-color: var(--accent); }
    .search-wrap .search-icon { position: absolute; left: .875rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1.1rem; pointer-events: none; }
    .search-wrap input::placeholder { color: var(--muted); }
    .cats { display: flex; gap: .375rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .cat-btn { padding: .3rem .75rem; border: 1px solid var(--border); border-radius: 9999px; background: var(--card); color: var(--muted); font-size: .78rem; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-fg); font-weight: 600; }
    #count-info { font-size: .78rem; color: var(--muted); margin-bottom: .75rem; }
    .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .75rem; }
    .mime-card { background: var(--card); border: 1px solid var(--border); border-radius: .75rem; padding: .875rem 1rem; }
    .mime-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; margin-bottom: .5rem; }
    .mime-type { font-size: .88rem; font-weight: 700; color: var(--text); word-break: break-all; line-height: 1.4; flex: 1; }
    .copy-btn { flex-shrink: 0; padding: .2rem .55rem; border: 1px solid var(--border); border-radius: .375rem; background: none; color: var(--muted); font-size: .7rem; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .copy-btn:hover { background: var(--accent-bg); color: var(--accent-fg); border-color: var(--accent); }
    .copy-btn.copied { background: #dcfce7; color: #15803d; border-color: #22c55e; }
    .mime-desc { font-size: .78rem; color: var(--muted); margin-bottom: .4rem; line-height: 1.4; }
    .mime-exts { display: flex; gap: .25rem; flex-wrap: wrap; margin-bottom: .4rem; }
    .ext-tag { font-size: .7rem; padding: .1rem .45rem; border-radius: .3rem; background: var(--accent-bg); color: var(--accent-fg); font-family: monospace; font-weight: 600; }
    .mime-footer { display: flex; align-items: center; justify-content: space-between; }
    .cat-pill { font-size: .68rem; padding: .1rem .5rem; border-radius: 9999px; border: 1px solid var(--border); color: var(--muted); }
    .flags { display: flex; gap: .25rem; }
    .flag { font-size: .65rem; padding: .1rem .4rem; border-radius: .25rem; }
    .flag-compress { background: #dbeafe; color: #1d4ed8; }
    .flag-binary { background: #fef3c7; color: #92400e; }
    [data-theme="dark"] .flag-compress { background: #1e3a5f; color: #93c5fd; }
    [data-theme="dark"] .flag-binary { background: #3d2b00; color: #fcd34d; }
    .no-results { text-align: center; padding: 2.5rem 1rem; color: var(--muted); }
    footer { text-align: center; padding: 2rem 1rem; font-size: .72rem; color: var(--muted); }
  </style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title">MIME Type Lookup</div>
    <div class="topbar-sub">MIME 타입 검색기</div>
  </div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
</div>

<main>
  <p class="desc">
    파일 확장자 또는 MIME 타입으로 Content-Type을 빠르게 검색하세요<br>
    Search by file extension (e.g. <code>.png</code>) or MIME type string (e.g. <code>application/json</code>)
  </p>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Type extension (png, mp4) or MIME type (application/json)…" oninput="onSearch()" autocomplete="off" spellcheck="false">
  </div>

  <div class="cats" id="cats"></div>
  <div id="count-info"></div>
  <div class="results-grid" id="results"></div>
</main>

<footer>Covers 200+ common MIME types · 브라우저에서 즉시 검색, 서버 요청 없음</footer>
<script src="app.js"></script>
</body>
</html>
