<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Ad Frequency Cap ROI Calculator | 모바일 광고 빈도 캡 ROI 계산기</title>
  <meta name="description" content="모바일 앱/게임의 광고 빈도 캡 조정 시 광고 매출 변화와 리텐션 개선 가치를 합산해 월 순효과, ROI, 회수기간, 손익분기 노출수를 계산합니다." />
  <meta name="keywords" content="mobile ads, frequency cap, ecpm, retention, roi, monetization, game revenue" />
  <link rel="canonical" href="https://eastsea.monster/tools/mobile-ad-frequency-cap-roi-calculator/" />
  <style>
    :root {
      --bg: #0b1220;
      --card: #131d33;
      --line: #2a3a5f;
      --text: #e8eefc;
      --muted: #9eb0d6;
      --brand: #60a5fa;
      --brand-2: #2563eb;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 14% 0%, #17325f 0%, var(--bg) 58%);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 14px 56px;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.7vw, 1.82rem);
      letter-spacing: -0.01em;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
      max-width: 72ch;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .link {
      border: 1px solid var(--line);
      background: #182947;
      color: #dbeafe;
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 0.88rem;
      text-decoration: none;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.04fr 0.96fr;
      gap: 12px;
    }
    .card {
      background: linear-gradient(165deg, #17294a, #101b31 62%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      min-width: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 5px;
    }
    input, button, textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1b33;
      color: var(--text);
      font-size: 0.93rem;
      padding: 10px;
    }
    .btns {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      cursor: pointer;
      border: none;
      font-weight: 700;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #eff6ff;
    }
    .soft {
      background: #1c3459;
      border: 1px solid var(--line);
    }
    .err {
      margin-top: 10px;
      border: 1px solid #7b3444;
      background: rgba(248, 113, 113, 0.12);
      color: #fecaca;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 0.86rem;
      display: none;
    }
    .err.show { display: block; }
    textarea {
      margin-top: 10px;
      min-height: 132px;
      resize: vertical;
    }

    .kpis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .kpi {
      border: 1px solid var(--line);
      background: #10203a;
      border-radius: 11px;
      padding: 10px;
    }
    .k {
      color: var(--muted);
      font-size: 0.76rem;
      margin-bottom: 4px;
    }
    .v {
      font-size: 1.03rem;
      font-weight: 800;
      word-break: break-word;
    }
    .pill {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #1a355c;
      color: #dbeafe;
      padding: 6px 10px;
      font-size: 0.78rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.85rem;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 7px 6px;
      text-align: right;
    }
    th:first-child, td:first-child { text-align: left; }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .inputs { grid-template-columns: 1fr; }
      .top { flex-direction: column; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🎯 모바일 광고 빈도 캡 ROI 계산기</h1>
        <div class="sub">광고 노출수 변화에 따른 즉시 광고이익과 리텐션 개선 가치를 함께 반영해 월 순효과·ROI·회수기간·손익분기 목표 노출수를 계산합니다.</div>
      </div>
      <div class="actions">
        <a class="link" href="/tools/">도구 목록</a>
        <a class="link" href="/">포털</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="dau">일 활성 사용자 (DAU)</label><input id="dau" type="number" min="1" step="1" value="120000" /></div>
          <div><label for="currentImpressions">현재 1인당 일 광고 노출수</label><input id="currentImpressions" type="number" min="0" step="0.1" value="9.5" /></div>
          <div><label for="targetImpressions">목표 1인당 일 광고 노출수</label><input id="targetImpressions" type="number" min="0" step="0.1" value="8.2" /></div>
          <div><label for="ecpm">eCPM (₩)</label><input id="ecpm" type="number" min="0" step="10" value="6400" /></div>
          <div><label for="fillRate">Fill rate (%)</label><input id="fillRate" type="number" min="0" max="100" step="0.1" value="92" /></div>
          <div><label for="publisherShare">퍼블리셔 정산율 (%)</label><input id="publisherShare" type="number" min="0" max="100" step="0.1" value="68" /></div>
          <div><label for="servingCostCpm">광고 서빙 비용 (CPM, ₩)</label><input id="servingCostCpm" type="number" min="0" step="1" value="260" /></div>
          <div><label for="retentionLift">리텐션 개선폭 (pp)</label><input id="retentionLift" type="number" min="0" max="100" step="0.01" value="0.45" /></div>
          <div><label for="profitPerRetainedUser">잔존 유저 1인당 월 공헌이익 (₩)</label><input id="profitPerRetainedUser" type="number" min="0" step="100" value="3700" /></div>
          <div><label for="monthlyProgramCost">월 운영비 (₩)</label><input id="monthlyProgramCost" type="number" min="0" step="10000" value="2800000" /></div>
          <div><label for="setupCost">초기 구축비 (₩)</label><input id="setupCost" type="number" min="0" step="10000" value="12000000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" step="1" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copyBtn" class="soft" type="button">요약 복사</button>
          <button id="resetBtn" type="button">기본값 복원</button>
        </div>

        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">현재 월 광고이익</div><div class="v" id="currentAdProfit">-</div></div>
          <div class="kpi"><div class="k">목표 월 광고이익</div><div class="v" id="targetAdProfit">-</div></div>
          <div class="kpi"><div class="k">광고이익 증감</div><div class="v" id="adDelta">-</div></div>
          <div class="kpi"><div class="k">리텐션 가치(월)</div><div class="v" id="retentionValue">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div class="v" id="roi">-</div></div>
        </div>

        <div id="status" class="pill">계산 대기</div>

        <table>
          <tbody>
            <tr><th>기간 순효과</th><td id="periodNet">-</td></tr>
            <tr><th>회수기간</th><td id="payback">-</td></tr>
            <tr><th>손익분기 목표 노출수</th><td id="breakEvenTargetImpressions">-</td></tr>
            <tr><th>추정 유지 유저(월)</th><td id="retainedUsers">-</td></tr>
            <tr><th>기간 총 투자비</th><td id="totalInvestment">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
