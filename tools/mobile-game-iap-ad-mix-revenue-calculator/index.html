<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Game IAP + Ad Mix Revenue Calculator | 모바일 게임 IAP+광고 믹스 수익 계산기</title>
  <meta name="description" content="모바일 게임의 IAP·광고 수익과 UA/서버/라이브옵스 비용을 함께 반영해 월 순이익, 손익분기 결제전환율, ROI를 계산합니다." />
  <style>
    :root{--bg:#111827;--card:#1f2937;--line:#374151;--text:#f9fafb;--muted:#cbd5e1;--pri:#60a5fa;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#1e3a8a 0%,var(--bg) 58%);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.18rem,2.8vw,1.85rem)}.sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btnLink,.lang{border:1px solid var(--line);background:#233247;color:#e5edff;text-decoration:none;border-radius:10px;padding:8px 11px;font-size:.88rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#253447,#1a2433);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#111b2a;color:var(--text);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;background:linear-gradient(135deg,#60a5fa,#2563eb);font-weight:700;color:#eff6ff}.soft{background:#334155;border:1px solid var(--line);color:#e2e8f0}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f1d1d;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:#182234;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.04rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#22324a;color:#dbeafe;font-size:.77rem;margin-top:10px}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.actions{justify-content:flex-start}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🎮 모바일 게임 IAP+광고 믹스 수익 계산기</h1>
        <div class="sub" id="subtitle">결제와 광고 수익을 통합해 월 순이익, 손익분기 전환율, 회수기간을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a class="btnLink" href="/" id="backLink">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값 Inputs</h2>
        <div class="inputs">
          <div><label for="mau" id="l_mau"></label><input id="mau" type="number" min="1" step="100" value="250000"></div>
          <div><label for="payerConv" id="l_payerConv"></label><input id="payerConv" type="number" min="0" max="100" step="0.01" value="2.4"></div>
          <div><label for="arppu" id="l_arppu"></label><input id="arppu" type="number" min="0" step="100" value="18500"></div>
          <div><label for="dauMau" id="l_dauMau"></label><input id="dauMau" type="number" min="0" max="100" step="0.1" value="24"></div>
          <div><label for="adArpdau" id="l_adArpdau"></label><input id="adArpdau" type="number" min="0" step="1" value="62"></div>
          <div><label for="adFill" id="l_adFill"></label><input id="adFill" type="number" min="0" max="100" step="0.1" value="88"></div>
          <div><label for="platformFee" id="l_platformFee"></label><input id="platformFee" type="number" min="0" max="100" step="0.01" value="30"></div>
          <div><label for="paymentFee" id="l_paymentFee"></label><input id="paymentFee" type="number" min="0" max="100" step="0.01" value="3"></div>
          <div><label for="adMediationFee" id="l_adMediationFee"></label><input id="adMediationFee" type="number" min="0" max="100" step="0.01" value="8"></div>
          <div><label for="serverPerMau" id="l_serverPerMau"></label><input id="serverPerMau" type="number" min="0" step="1" value="420"></div>
          <div><label for="uaSpend" id="l_uaSpend"></label><input id="uaSpend" type="number" min="0" step="10000" value="28000000"></div>
          <div><label for="liveopsCost" id="l_liveopsCost"></label><input id="liveopsCost" type="number" min="0" step="10000" value="15000000"></div>
          <div><label for="oneTimeCost" id="l_oneTimeCost"></label><input id="oneTimeCost" type="number" min="0" step="10000" value="95000000"></div>
          <div><label for="months" id="l_months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button"></button>
          <button id="reset" type="button"></button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_iapNet"></div><div id="iapNet" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_adNet"></div><div id="adNet" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_totalNetRevenue"></div><div id="totalNetRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNetProfit"></div><div id="monthlyNetProfit" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_blendedArpu"></div><div id="blendedArpu" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill"></div>

        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table>
          <tbody>
            <tr><th id="d_monthlyTotalCost"></th><td id="monthlyTotalCost">-</td></tr>
            <tr><th id="d_breakEvenPayerConv"></th><td id="breakEvenPayerConv">-</td></tr>
            <tr><th id="d_paybackMonths"></th><td id="paybackMonths">-</td></tr>
            <tr><th id="d_cumulativeNet"></th><td id="cumulativeNet">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={
      mau:$("mau"),payerConv:$("payerConv"),arppu:$("arppu"),dauMau:$("dauMau"),adArpdau:$("adArpdau"),adFill:$("adFill"),platformFee:$("platformFee"),paymentFee:$("paymentFee"),adMediationFee:$("adMediationFee"),serverPerMau:$("serverPerMau"),uaSpend:$("uaSpend"),liveopsCost:$("liveopsCost"),oneTimeCost:$("oneTimeCost"),months:$("months"),
      iapNet:$("iapNet"),adNet:$("adNet"),totalNetRevenue:$("totalNetRevenue"),monthlyNetProfit:$("monthlyNetProfit"),blendedArpu:$("blendedArpu"),roi:$("roi"),monthlyTotalCost:$("monthlyTotalCost"),breakEvenPayerConv:$("breakEvenPayerConv"),paybackMonths:$("paybackMonths"),cumulativeNet:$("cumulativeNet"),
      copy:$("copy"),reset:$("reset"),summary:$("summary"),error:$("error"),status:$("status"),langBtn:$("langBtn")
    };
    const defaults={mau:250000,payerConv:2.4,arppu:18500,dauMau:24,adArpdau:62,adFill:88,platformFee:30,paymentFee:3,adMediationFee:8,serverPerMau:420,uaSpend:28000000,liveopsCost:15000000,oneTimeCost:95000000,months:12};

    const I18N={
      ko:{title:"🎮 모바일 게임 IAP+광고 믹스 수익 계산기",subtitle:"결제와 광고 수익을 통합해 월 순이익, 손익분기 전환율, 회수기간을 계산합니다.",inputHeader:"입력값 Inputs",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",
      l_mau:"월간 활성 사용자 MAU",l_payerConv:"결제 전환율 (%)",l_arppu:"ARPPU (₩)",l_dauMau:"DAU/MAU 비율 (%)",l_adArpdau:"광고 ARPDAU (₩)",l_adFill:"광고 Fill Rate (%)",l_platformFee:"IAP 플랫폼 수수료율 (%)",l_paymentFee:"결제 수수료율 (%)",l_adMediationFee:"광고 미디에이션 수수료율 (%)",l_serverPerMau:"MAU당 서버비 (₩)",l_uaSpend:"월 UA 집행비 (₩)",l_liveopsCost:"월 라이브옵스 비용 (₩)",l_oneTimeCost:"원타임 기능 개발비 (₩)",l_months:"분석 기간 (개월)",
      k_iapNet:"월 IAP 순수익",k_adNet:"월 광고 순수익",k_totalNetRevenue:"월 총 순매출",k_monthlyNetProfit:"월 순이익",k_blendedArpu:"블렌디드 ARPU",k_roi:"ROI (기간)",
      d_monthlyTotalCost:"월 총비용",d_breakEvenPayerConv:"손익분기 결제전환율",d_paybackMonths:"회수기간",d_cumulativeNet:"누적 순효과",good:"월 순이익이 플러스입니다",bad:"현재 조건에서는 월 손실 구조입니다",invalid:"입력값을 확인해 주세요",
      e_rate:"비율 값은 0~100 범위여야 합니다.",e_fee:"IAP 수수료 합계는 100% 미만이어야 합니다.",e_months:"분석 기간은 1개월 이상이어야 합니다.",copied:"요약이 복사되었습니다.",copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",summaryTitle:"[모바일 게임 IAP+광고 믹스 요약]"},
      en:{title:"🎮 Mobile Game IAP + Ad Mix Revenue Calculator",subtitle:"Combine IAP and ad monetization with UA/server/live-ops costs to estimate profitability.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",
      l_mau:"Monthly active users (MAU)",l_payerConv:"Paying conversion (%)",l_arppu:"ARPPU (KRW)",l_dauMau:"DAU/MAU ratio (%)",l_adArpdau:"Ad ARPDAU (KRW)",l_adFill:"Ad fill rate (%)",l_platformFee:"IAP platform fee (%)",l_paymentFee:"Payment fee (%)",l_adMediationFee:"Ad mediation fee (%)",l_serverPerMau:"Server cost per MAU (KRW)",l_uaSpend:"Monthly UA spend (KRW)",l_liveopsCost:"Monthly live-ops cost (KRW)",l_oneTimeCost:"One-time feature cost (KRW)",l_months:"Analysis period (months)",
      k_iapNet:"Monthly IAP net revenue",k_adNet:"Monthly ad net revenue",k_totalNetRevenue:"Monthly total net revenue",k_monthlyNetProfit:"Monthly net profit",k_blendedArpu:"Blended ARPU",k_roi:"ROI (period)",
      d_monthlyTotalCost:"Monthly total cost",d_breakEvenPayerConv:"Break-even payer conversion",d_paybackMonths:"Payback period",d_cumulativeNet:"Cumulative net impact",good:"Monthly profit is positive",bad:"Current setup is loss-making",invalid:"Please review your inputs",
      e_rate:"Rate inputs must stay within 0 to 100.",e_fee:"Combined IAP fees must stay below 100%.",e_months:"Analysis period must be at least 1 month.",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Mobile Game IAP + Ad Mix Summary]"}
    };

    let lang="ko";
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString("en-US",{maximumFractionDigits:d});
    const t=(k)=>I18N[lang][k]||k;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["mau","payerConv","arppu","dauMau","adArpdau","adFill","platformFee","paymentFee","adMediationFee","serverPerMau","uaSpend","liveopsCost","oneTimeCost","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["iapNet","adNet","totalNetRevenue","monthlyNetProfit","blendedArpu","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["monthlyTotalCost","breakEvenPayerConv","paybackMonths","cumulativeNet"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      const rates=[v.payerConv,v.dauMau,v.adFill,v.platformFee,v.paymentFee,v.adMediationFee];
      if(rates.some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("e_rate");
      if(v.platformFee+v.paymentFee>=100) return t("e_fee");
      if(!Number.isFinite(v.months)||v.months<1) return t("e_months");
      return "";
    }

    function render(){
      const v={mau:Number(refs.mau.value),payerConv:Number(refs.payerConv.value),arppu:Number(refs.arppu.value),dauMau:Number(refs.dauMau.value),adArpdau:Number(refs.adArpdau.value),adFill:Number(refs.adFill.value),platformFee:Number(refs.platformFee.value),paymentFee:Number(refs.paymentFee.value),adMediationFee:Number(refs.adMediationFee.value),serverPerMau:Number(refs.serverPerMau.value),uaSpend:Number(refs.uaSpend.value),liveopsCost:Number(refs.liveopsCost.value),oneTimeCost:Number(refs.oneTimeCost.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["iapNet","adNet","totalNetRevenue","monthlyNetProfit","blendedArpu","roi","monthlyTotalCost","breakEvenPayerConv","paybackMonths","cumulativeNet"].forEach((k)=>refs[k].textContent="-");refs.status.textContent=t("invalid");refs.summary.value="";return;}

      const payerRate=v.payerConv/100, dauRate=v.dauMau/100, fillRate=v.adFill/100;
      const iapFeeRate=(v.platformFee+v.paymentFee)/100;
      const iapGross=v.mau*payerRate*v.arppu;
      const iapNet=iapGross*(1-iapFeeRate);

      const adGross=v.mau*dauRate*30*v.adArpdau*fillRate;
      const adNet=adGross*(1-v.adMediationFee/100);

      const totalNetRevenue=iapNet+adNet;
      const monthlyTotalCost=v.mau*v.serverPerMau+v.uaSpend+v.liveopsCost;
      const monthlyNetProfit=totalNetRevenue-monthlyTotalCost;
      const blendedArpu=v.mau>0?totalNetRevenue/v.mau:0;

      const cumulativeNet=monthlyNetProfit*v.months-v.oneTimeCost;
      const roiBase=v.oneTimeCost>0?v.oneTimeCost:(monthlyTotalCost*v.months||1);
      const roi=cumulativeNet/roiBase;

      const denom=v.mau*v.arppu*(1-iapFeeRate);
      const nonIapPart=adNet-monthlyTotalCost;
      const bePayerConv=denom>0?Math.max(0,(-nonIapPart/denom)*100):NaN;
      const paybackMonths=(v.oneTimeCost>0&&monthlyNetProfit>0)?(v.oneTimeCost/monthlyNetProfit):NaN;

      refs.iapNet.textContent=won(iapNet);
      refs.adNet.textContent=won(adNet);
      refs.totalNetRevenue.textContent=won(totalNetRevenue);
      refs.monthlyNetProfit.textContent=won(monthlyNetProfit);
      refs.blendedArpu.textContent=won(blendedArpu);
      refs.roi.textContent=`${num(roi*100,1)}%`;
      refs.monthlyTotalCost.textContent=won(monthlyTotalCost);
      refs.breakEvenPayerConv.textContent=Number.isFinite(bePayerConv)?`${num(bePayerConv,3)}%`:"N/A";
      refs.paybackMonths.textContent=Number.isFinite(paybackMonths)?`${num(paybackMonths,2)} mo`:"N/A";
      refs.cumulativeNet.textContent=won(cumulativeNet);
      refs.status.innerHTML=monthlyNetProfit>=0?`<span class="good">●</span> ${t("good")}`:`<span class="bad">●</span> ${t("bad")}`;

      refs.summary.value=[
        t("summaryTitle"),
        `${t("k_iapNet")}: ${won(iapNet)}`,
        `${t("k_adNet")}: ${won(adNet)}`,
        `${t("k_totalNetRevenue")}: ${won(totalNetRevenue)}`,
        `${t("d_monthlyTotalCost")}: ${won(monthlyTotalCost)}`,
        `${t("k_monthlyNetProfit")}: ${won(monthlyNetProfit)}`,
        `${t("d_breakEvenPayerConv")}: ${Number.isFinite(bePayerConv)?`${num(bePayerConv,3)}%`:"N/A"}`,
        `${t("d_cumulativeNet")} (${num(v.months,0)}m): ${won(cumulativeNet)}`,
        `${t("k_roi")}: ${num(roi*100,1)}%`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.mau,refs.payerConv,refs.arppu,refs.dauMau,refs.adArpdau,refs.adFill,refs.platformFee,refs.paymentFee,refs.adMediationFee,refs.serverPerMau,refs.uaSpend,refs.liveopsCost,refs.oneTimeCost,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n();
    render();
  </script>
</body>
</html>
