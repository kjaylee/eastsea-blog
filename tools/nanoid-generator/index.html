<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoID 생성기 | NanoID Generator</title>
  <meta name="description" content="NanoID를 브라우저에서 즉시 생성. 길이(기본 21), 알파벳(영숫자/16진수/커스텀) 설정, 배치 생성(최대 1000개), 충돌 확률 계산. eastsea.kr 무료 개발자 도구.">
  <meta property="og:title" content="NanoID 생성기 | NanoID Generator">
  <meta property="og:description" content="NanoID 설정(길이, 알파벳)으로 즉시 생성. 배치 생성 및 충돌 확률 계산.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eastsea.kr/tools/nanoid-generator/">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --border: #dee2e6;
      --shadow: rgba(0,0,0,0.08);
      --card-bg: #ffffff;
      --input-bg: #ffffff;
      --accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --accent-color: #f5576c;
    }
    [data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text-primary: #f8f9fa;
      --text-secondary: #adb5bd;
      --border: #495057;
      --shadow: rgba(0,0,0,0.3);
      --card-bg: #2a2a2a;
      --input-bg: #1e1e1e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif; background: var(--bg-secondary); color: var(--text-primary); min-height: 100vh; transition: background 0.3s, color 0.3s; }
    .container { max-width: 860px; margin: 0 auto; padding: 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); text-decoration: none; font-size: 0.88rem; transition: transform 0.2s; }
    .back-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
    .theme-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; cursor: pointer; font-size: 0.88rem; color: var(--text-primary); }
    header { text-align: center; margin-bottom: 28px; }
    h1 { background: var(--accent); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; margin-bottom: 8px; }
    header p { color: var(--text-secondary); font-size: 0.95rem; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px var(--shadow); margin-bottom: 20px; }
    label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px; }
    input[type="range"] { width: 100%; margin: 8px 0; accent-color: var(--accent-color); }
    input[type="number"], input[type="text"] { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.88rem; background: var(--input-bg); color: var(--text-primary); width: 100%; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: var(--accent-color); }
    .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
    .btn-primary { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; border-radius: 7px; }
    .btn-icon { padding: 6px 10px; font-size: 0.8rem; border-radius: 7px; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 14px; }
    @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
    .alphabet-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .preset-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.8rem; cursor: pointer; background: var(--bg-secondary); color: var(--text-primary); transition: background 0.2s; }
    .preset-btn.active { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border-color: transparent; }
    .preset-btn:hover:not(.active) { background: var(--border); }
    .single-id {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(240,147,251,0.1), rgba(245,87,108,0.1));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }
    .single-id-text { font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; color: var(--text-primary); flex: 1; word-break: break-all; }
    .id-list { list-style: none; }
    .id-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .id-item:hover { background: var(--bg-secondary); }
    .id-item:last-child { border-bottom: none; }
    .id-num { font-size: 0.75rem; color: var(--text-secondary); min-width: 28px; }
    .id-val { font-family: 'Courier New', monospace; font-size: 0.88rem; flex: 1; word-break: break-all; }
    .id-copy { opacity: 0; transition: opacity 0.2s; }
    .id-item:hover .id-copy { opacity: 1; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .stat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
    .stat-val { font-size: 1.2rem; font-weight: 700; color: var(--accent-color); word-break: break-all; }
    .stat-label { font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px; }
    .prob-bar { height: 8px; background: var(--border); border-radius: 4px; margin-top: 8px; overflow: hidden; }
    .prob-fill { height: 100%; background: linear-gradient(90deg, #28a745, #ffc107, #dc3545); border-radius: 4px; transition: width 0.3s; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 0.85rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000; }
    .toast.show { opacity: 1; }
    .range-val { display: inline-block; min-width: 28px; text-align: center; font-weight: 700; color: var(--accent-color); }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .results-header h3 { font-size: 0.95rem; }
    .overflow-list { max-height: 340px; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="/tools/" class="back-btn">← 도구 목록</a>
      <button class="theme-btn" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>
    <header>
      <h1>🔑 NanoID 생성기</h1>
      <p>URL-safe한 고유 ID를 빠르게 생성하세요</p>
    </header>

    <!-- Settings -->
    <div class="card">
      <div class="settings-grid">
        <div>
          <label>길이: <span class="range-val" id="lenVal">21</span></label>
          <input type="range" id="lengthRange" min="4" max="128" value="21" oninput="updateLen()">
          <div style="display:flex;gap:8px;margin-top:6px;">
            <input type="number" id="lengthNum" value="21" min="4" max="128" style="width:90px;" oninput="syncLen()">
            <span style="font-size:0.82rem;color:var(--text-secondary);align-self:center;">문자</span>
          </div>
        </div>
        <div>
          <label>배치 생성 수</label>
          <input type="number" id="batchNum" value="10" min="1" max="1000" placeholder="1-1000">
          <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:4px;">최대 1,000개</div>
        </div>
      </div>

      <div style="margin-bottom:14px;">
        <label>알파벳 프리셋</label>
        <div class="alphabet-presets">
          <span class="preset-btn active" onclick="setPreset('alphanum', this)">영숫자 (기본)</span>
          <span class="preset-btn" onclick="setPreset('hex', this)">16진수 (소문자)</span>
          <span class="preset-btn" onclick="setPreset('hex_upper', this)">16진수 (대문자)</span>
          <span class="preset-btn" onclick="setPreset('numeric', this)">숫자만</span>
          <span class="preset-btn" onclick="setPreset('alpha', this)">알파벳만</span>
          <span class="preset-btn" onclick="setPreset('url_safe', this)">URL Safe</span>
          <span class="preset-btn" onclick="setPreset('custom', this)">커스텀</span>
        </div>
        <input type="text" id="alphabetInput" value="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789" placeholder="사용할 문자를 입력하세요" oninput="setPreset('custom', null)">
        <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:4px;">알파벳 길이: <span id="alphaLen" style="font-weight:600;">62</span>자</div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="generateAll()">⚡ 생성</button>
        <button class="btn btn-secondary" onclick="copyAll()">📋 전체 복사</button>
        <button class="btn btn-secondary" onclick="downloadAll()">⬇️ 다운로드</button>
      </div>
    </div>

    <!-- Single ID highlight -->
    <div class="card" id="singleCard" style="display:none;">
      <div class="single-id">
        <span class="single-id-text" id="singleId"></span>
        <button class="btn btn-primary btn-sm" onclick="copySingle()">복사</button>
        <button class="btn btn-secondary btn-sm" onclick="generateAll()">↻ 재생성</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="card" id="statsCard" style="display:none;">
      <div style="font-weight:700;font-size:0.9rem;margin-bottom:14px;">📊 충돌 확률 분석</div>
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <!-- Batch list -->
    <div class="card" id="batchCard" style="display:none;">
      <div class="results-header">
        <h3 id="batchTitle">생성된 ID 목록</h3>
        <button class="btn btn-secondary btn-sm" onclick="copyAll()">📋 전체 복사</button>
      </div>
      <div class="overflow-list">
        <ul class="id-list" id="idList"></ul>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.addEventListener('DOMContentLoaded', () => {
          const btn = document.querySelector('.theme-btn');
          if (btn) btn.textContent = '☀️ 라이트 모드';
        });
      }
    })();

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.theme-btn').textContent = isDark ? '🌙 다크 모드' : '☀️ 라이트 모드';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    const PRESETS = {
      alphanum: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
      hex: '0123456789abcdef',
      hex_upper: '0123456789ABCDEF',
      numeric: '0123456789',
      alpha: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
      url_safe: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_'
    };

    let currentAlphabet = PRESETS.alphanum;

    function setPreset(key, el) {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      if (el) el.classList.add('active');
      if (key !== 'custom') {
        document.getElementById('alphabetInput').value = PRESETS[key];
        currentAlphabet = PRESETS[key];
      } else {
        if (el) el.classList.add('active');
        currentAlphabet = document.getElementById('alphabetInput').value;
      }
      document.getElementById('alphaLen').textContent = currentAlphabet.length;
    }

    document.getElementById('alphabetInput').addEventListener('input', function() {
      currentAlphabet = this.value;
      document.getElementById('alphaLen').textContent = currentAlphabet.length;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.preset-btn')[6]?.classList.add('active');
    });

    function updateLen() {
      const v = parseInt(document.getElementById('lengthRange').value);
      document.getElementById('lenVal').textContent = v;
      document.getElementById('lengthNum').value = v;
    }

    function syncLen() {
      let v = parseInt(document.getElementById('lengthNum').value);
      if (isNaN(v)) return;
      v = Math.max(4, Math.min(128, v));
      document.getElementById('lengthRange').value = v;
      document.getElementById('lenVal').textContent = v;
    }

    function nanoid(size, alphabet) {
      size = size || 21;
      alphabet = alphabet || PRESETS.alphanum;
      const bytes = new Uint8Array(size * 2);
      crypto.getRandomValues(bytes);
      let id = '';
      for (let i = 0; i < bytes.length && id.length < size; i++) {
        id += alphabet[bytes[i] % alphabet.length];
      }
      return id;
    }

    function collisionProbability(n, size, alphabetLen) {
      // Birthday problem approximation: P ≈ 1 - e^(-n²/(2·A^size))
      // where A^size = total possible IDs
      const logA = Math.log(alphabetLen) * size;
      const log2 = logA / Math.LN2;
      // For n IDs: probability ≈ n² / (2 * alphabet^size)
      const logProb = 2 * Math.log(n) - logA - Math.log(2);
      if (logProb < -50) return '< 10⁻²⁰ (극히 낮음)';
      const prob = Math.exp(logProb);
      if (prob < 1e-15) return `~${prob.toExponential(2)}`;
      return `~${(prob * 100).toFixed(8)}%`;
    }

    function formatBigNum(n) {
      if (n === Infinity) return '∞';
      const log10 = Math.log10(n);
      if (log10 > 15) return `10^${log10.toFixed(1)}`;
      return n.toLocaleString();
    }

    let generatedIds = [];

    function generateAll() {
      const len = parseInt(document.getElementById('lengthRange').value) || 21;
      const batch = Math.min(1000, Math.max(1, parseInt(document.getElementById('batchNum').value) || 10));
      currentAlphabet = document.getElementById('alphabetInput').value || PRESETS.alphanum;

      if (currentAlphabet.length < 2) {
        showToast('알파벳은 최소 2자 이상이어야 합니다.');
        return;
      }

      generatedIds = [];
      for (let i = 0; i < batch; i++) {
        generatedIds.push(nanoid(len, currentAlphabet));
      }

      // Single highlight
      document.getElementById('singleId').textContent = generatedIds[0];
      document.getElementById('singleCard').style.display = '';

      // Stats
      const totalCombos = Math.pow(currentAlphabet.length, len);
      const prob1B = collisionProbability(1e9, len, currentAlphabet.length);
      const prob1M = collisionProbability(1e6, len, currentAlphabet.length);
      const bits = Math.log2(totalCombos);
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-val">${len}</div>
          <div class="stat-label">ID 길이</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${currentAlphabet.length}</div>
          <div class="stat-label">알파벳 크기</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${bits < 1000 ? bits.toFixed(1) + ' bits' : bits.toFixed(0) + ' bits'}</div>
          <div class="stat-label">엔트로피 (비트)</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="font-size:0.85rem;">${prob1M}</div>
          <div class="stat-label">100만 개 생성 시 충돌 확률</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="font-size:0.85rem;">${prob1B}</div>
          <div class="stat-label">10억 개 생성 시 충돌 확률</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${batch}</div>
          <div class="stat-label">생성된 ID 수</div>
        </div>
      `;
      document.getElementById('statsCard').style.display = '';

      // List
      if (batch > 1) {
        let listHtml = '';
        generatedIds.forEach((id, i) => {
          listHtml += `<li class="id-item">
            <span class="id-num">${i + 1}</span>
            <span class="id-val">${id}</span>
            <button class="btn btn-secondary btn-icon id-copy" onclick="copyOne('${id}')">복사</button>
          </li>`;
        });
        document.getElementById('idList').innerHTML = listHtml;
        document.getElementById('batchTitle').textContent = `생성된 ID 목록 (${batch}개)`;
        document.getElementById('batchCard').style.display = '';
      } else {
        document.getElementById('batchCard').style.display = 'none';
      }
    }

    function copyOne(id) {
      navigator.clipboard.writeText(id).then(() => showToast('복사되었습니다!'));
    }

    function copySingle() {
      const id = document.getElementById('singleId').textContent;
      if (id) navigator.clipboard.writeText(id).then(() => showToast('ID가 복사되었습니다!'));
    }

    function copyAll() {
      if (!generatedIds.length) { showToast('먼저 ID를 생성하세요.'); return; }
      navigator.clipboard.writeText(generatedIds.join('\n')).then(() => showToast(`${generatedIds.length}개 ID가 복사되었습니다!`));
    }

    function downloadAll() {
      if (!generatedIds.length) { showToast('먼저 ID를 생성하세요.'); return; }
      const blob = new Blob([generatedIds.join('\n')], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `nanoids_${generatedIds[0].substring(0,8)}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Auto generate on load
    window.addEventListener('DOMContentLoaded', () => {
      generateAll();
    });
  </script>
</body>
</html>
