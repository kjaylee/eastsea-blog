<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter Paid Upgrade Revenue Calculator | 뉴스레터 유료 업그레이드 수익 계산기</title>
  <meta name="description" content="무료 뉴스레터 독자의 유료 전환율 개선이 추가 MRR, 순효과, ROI, 손익분기 전환율에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#071428;--card:#10213d;--line:#284a7f;--txt:#eaf2ff;--muted:#afc4e4;--pri:#67a7ff;--soft:#16325b;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.15)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#224a82 0%,#071428 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.8vw,1.76rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#183561,#10213d);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#4f83f1);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errbg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.97rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#173561;color:#d8e8ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">📨 뉴스레터 유료 업그레이드 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">무료 구독자의 유료 전환 개선 시 추가 MRR, 순효과, ROI를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="freeSubs" data-i18n="freeSubs">월 활성 무료 구독자 (명)</label><input id="freeSubs" type="number" min="1" value="240000" /></div>
          <div><label for="currentRate" data-i18n="currentRate">현재 유료 전환율 (%)</label><input id="currentRate" type="number" min="0" max="100" step="0.01" value="2.4" /></div>
          <div><label for="targetRate" data-i18n="targetRate">목표 유료 전환율 (%)</label><input id="targetRate" type="number" min="0" max="100" step="0.01" value="3.1" /></div>
          <div><label for="price" data-i18n="price">유료 구독 월 가격 (KRW)</label><input id="price" type="number" min="1" value="12000" /></div>
          <div><label for="churn" data-i18n="churn">월 유료 이탈률 (%)</label><input id="churn" type="number" min="0" max="100" step="0.01" value="4.5" /></div>
          <div><label for="fee" data-i18n="fee">결제/플랫폼 수수료 (%)</label><input id="fee" type="number" min="0" max="100" step="0.01" value="6" /></div>
          <div><label for="varCost" data-i18n="varCost">유료 1인당 월 운영비 (KRW)</label><input id="varCost" type="number" min="0" value="1700" /></div>
          <div><label for="monthlyCost" data-i18n="monthlyCost">월 캠페인/툴 비용 (KRW)</label><input id="monthlyCost" type="number" min="0" value="7000000" /></div>
          <div><label for="setupCost" data-i18n="setupCost">초기 세팅 비용 (KRW)</label><input id="setupCost" type="number" min="0" value="18000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_incPaid">추가 유료 구독자 (월)</div><div id="incPaid" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_grossMrr">추가 MRR (총액)</div><div id="grossMrr" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_periodNet">분석기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_netMrr">순증 MRR (이탈/수수료 반영)</th><td id="netMrr">-</td></tr>
            <tr><th data-i18n="d_varCost">증분 변동비</th><td id="incVarCost">-</td></tr>
            <tr><th data-i18n="d_currentPaid">현재 유료 구독자</th><td id="currentPaid">-</td></tr>
            <tr><th data-i18n="d_targetPaid">목표 유료 구독자</th><td id="targetPaid">-</td></tr>
            <tr><th data-i18n="d_breakEven">손익분기 목표 전환율</th><td id="breakEvenRate">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      freeSubs:$("freeSubs"), currentRate:$("currentRate"), targetRate:$("targetRate"), price:$("price"), churn:$("churn"), fee:$("fee"),
      varCost:$("varCost"), monthlyCost:$("monthlyCost"), setupCost:$("setupCost"), months:$("months"),
      incPaid:$("incPaid"), grossMrr:$("grossMrr"), monthlyNet:$("monthlyNet"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      netMrr:$("netMrr"), incVarCost:$("incVarCost"), currentPaid:$("currentPaid"), targetPaid:$("targetPaid"), breakEvenRate:$("breakEvenRate"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { freeSubs:240000, currentRate:2.4, targetRate:3.1, price:12000, churn:4.5, fee:6, varCost:1700, monthlyCost:7000000, setupCost:18000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"📨 뉴스레터 유료 업그레이드 수익 계산기", subtitle:"무료 구독자의 유료 전환 개선 시 추가 MRR, 순효과, ROI를 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        freeSubs:"월 활성 무료 구독자 (명)", currentRate:"현재 유료 전환율 (%)", targetRate:"목표 유료 전환율 (%)", price:"유료 구독 월 가격 (KRW)",
        churn:"월 유료 이탈률 (%)", fee:"결제/플랫폼 수수료 (%)", varCost:"유료 1인당 월 운영비 (KRW)", monthlyCost:"월 캠페인/툴 비용 (KRW)", setupCost:"초기 세팅 비용 (KRW)", months:"분석 기간 (개월)",
        k_incPaid:"추가 유료 구독자 (월)", k_grossMrr:"추가 MRR (총액)", k_monthlyNet:"월 순효과", k_periodNet:"분석기간 순효과", k_roi:"ROI", k_payback:"회수기간",
        d_netMrr:"순증 MRR (이탈/수수료 반영)", d_varCost:"증분 변동비", d_currentPaid:"현재 유료 구독자", d_targetPaid:"목표 유료 구독자", d_breakEven:"손익분기 목표 전환율",
        errFree:"무료 구독자 수는 1 이상이어야 합니다.", errRate:"전환율/이탈률/수수료는 0~100% 범위여야 합니다.", errTarget:"목표 전환율은 현재 전환율 이상이어야 합니다.",
        errPrice:"구독 가격은 0보다 커야 합니다.", errCost:"비용 입력은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~60개월 범위여야 합니다.", errUnit:"단위 기여도가 0 이하입니다. 가격/비용/수수료를 조정하세요.",
        people:"명", monthsUnit:"개월", impossible:"달성 불가", noPayback:"회수 불가", statusGood:"월 순효과 개선", statusBad:"월 순효과 악화", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        summaryTitle:"[Newsletter Paid Upgrade 요약]", summaryPeriod:"개월 누적 순효과", summaryBe:"손익분기 목표 전환율"
      },
      en: {
        title:"📨 Newsletter Paid Upgrade Revenue Calculator", subtitle:"Estimate incremental MRR, net impact, ROI, and break-even conversion from paid-upgrade improvements.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        freeSubs:"Monthly active free subscribers", currentRate:"Current paid conversion rate (%)", targetRate:"Target paid conversion rate (%)", price:"Paid plan monthly price (KRW)",
        churn:"Monthly paid churn (%)", fee:"Payment/platform fee (%)", varCost:"Variable monthly cost per paid subscriber (KRW)", monthlyCost:"Monthly campaign/tool cost (KRW)", setupCost:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_incPaid:"Incremental paid subscribers (monthly)", k_grossMrr:"Incremental MRR (gross)", k_monthlyNet:"Net monthly impact", k_periodNet:"Period net impact", k_roi:"ROI", k_payback:"Payback period",
        d_netMrr:"Net incremental MRR (retention + fees adjusted)", d_varCost:"Incremental variable cost", d_currentPaid:"Current paid subscribers", d_targetPaid:"Target paid subscribers", d_breakEven:"Break-even target conversion",
        errFree:"Free subscriber count must be at least 1.", errRate:"Rates must be within 0~100%.", errTarget:"Target conversion must be greater than or equal to current conversion.",
        errPrice:"Price must be greater than 0.", errCost:"Costs must be greater than or equal to 0.", errMonths:"Analysis period must be between 1 and 60 months.", errUnit:"Unit contribution is not positive. Adjust price/cost/fee assumptions.",
        people:"users", monthsUnit:"months", impossible:"Not achievable", noPayback:"No payback", statusGood:"Positive monthly net impact", statusBad:"Negative monthly net impact", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard permission unavailable. Please copy manually.",
        summaryTitle:"[Newsletter Paid Upgrade Summary]", summaryPeriod:"month cumulative net impact", summaryBe:"Break-even target conversion"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.freeSubs) || v.freeSubs < 1) return t("errFree");
      const rates = [v.currentRate,v.targetRate,v.churn,v.fee];
      if (rates.some((r)=>!Number.isFinite(r) || r < 0 || r > 100)) return t("errRate");
      if (v.targetRate < v.currentRate) return t("errTarget");
      if (!Number.isFinite(v.price) || v.price <= 0) return t("errPrice");
      const costs = [v.varCost,v.monthlyCost,v.setupCost];
      if (costs.some((c)=>!Number.isFinite(c) || c < 0)) return t("errCost");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return t("errMonths");

      const retention = 1 - (v.churn / 100);
      const unitContribution = v.price * retention * (1 - v.fee/100) - v.varCost;
      if (unitContribution <= 0) return t("errUnit");
      return "";
    }

    function compute(v){
      const currentRate = v.currentRate / 100;
      const targetRate = v.targetRate / 100;
      const retention = 1 - (v.churn / 100);
      const feeFactor = 1 - (v.fee / 100);

      const currentPaid = v.freeSubs * currentRate;
      const targetPaid = v.freeSubs * targetRate;
      const incPaid = targetPaid - currentPaid;

      const grossMrr = incPaid * v.price;
      const netMrr = grossMrr * retention * feeFactor;
      const incVarCost = incPaid * v.varCost;
      const monthlyNet = netMrr - incVarCost - v.monthlyCost;
      const periodNet = (monthlyNet * v.months) - v.setupCost;

      const invested = ((incVarCost + v.monthlyCost) * v.months) + v.setupCost;
      const roi = invested === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / invested) * 100;
      const payback = monthlyNet > 0 ? v.setupCost / monthlyNet : Infinity;

      const unitContribution = v.price * retention * feeFactor - v.varCost;
      const beIncPaid = v.monthlyCost / unitContribution;
      const breakEvenRate = ((currentPaid + beIncPaid) / v.freeSubs) * 100;

      return { currentPaid, targetPaid, incPaid, grossMrr, netMrr, incVarCost, monthlyNet, periodNet, roi, payback, breakEvenRate };
    }

    function resetOutputs(){
      ["incPaid","grossMrr","monthlyNet","periodNet","roi","payback","netMrr","incVarCost","currentPaid","targetPaid","breakEvenRate"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        freeSubs:Number(refs.freeSubs.value), currentRate:Number(refs.currentRate.value), targetRate:Number(refs.targetRate.value), price:Number(refs.price.value),
        churn:Number(refs.churn.value), fee:Number(refs.fee.value), varCost:Number(refs.varCost.value), monthlyCost:Number(refs.monthlyCost.value),
        setupCost:Number(refs.setupCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.incPaid.textContent = `${num(r.incPaid,1)} ${t("people")}`;
      refs.grossMrr.textContent = money(r.grossMrr);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("monthsUnit")}` : t("noPayback");

      refs.netMrr.textContent = money(r.netMrr);
      refs.incVarCost.textContent = money(r.incVarCost);
      refs.currentPaid.textContent = `${num(r.currentPaid,1)} ${t("people")}`;
      refs.targetPaid.textContent = `${num(r.targetPaid,1)} ${t("people")}`;
      refs.breakEvenRate.textContent = Number.isFinite(r.breakEvenRate) && r.breakEvenRate <= 100 ? `${num(r.breakEvenRate,3)}%` : t("impossible");

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> ${t("statusGood")} (${money(r.monthlyNet)})`
        : `<span class="warn">●</span> ${t("statusBad")} (${money(r.monthlyNet)})`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_incPaid")}: ${num(r.incPaid,1)} ${t("people")}`,
        `${t("k_grossMrr")}: ${money(r.grossMrr)}`,
        `${t("d_netMrr")}: ${money(r.netMrr)}`,
        `${t("k_monthlyNet")}: ${money(r.monthlyNet)}`,
        `${v.months} ${t("summaryPeriod")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("monthsUnit")}` : t("noPayback")}`,
        `${t("summaryBe")}: ${Number.isFinite(r.breakEvenRate) && r.breakEvenRate <= 100 ? `${num(r.breakEvenRate,3)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.freeSubs,refs.currentRate,refs.targetRate,refs.price,refs.churn,refs.fee,refs.varCost,refs.monthlyCost,refs.setupCost,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
