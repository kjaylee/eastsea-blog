<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter Sponsorship Pricing Calculator | 뉴스레터 스폰서십 단가 계산기</title>
  <meta name="description" content="구독자, 오픈율, CTR, CPM/CPC 기준으로 뉴스레터 스폰서십 권장 단가를 계산하는 수익화 도구" />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--pri:#60a5fa;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#1f3f74 0%,var(--bg) 58%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📧 뉴스레터 스폰서십 단가 계산기</h1>
        <div class="sub" id="subtitle">오픈/클릭 성과를 기반으로 스폰서 고정 단가(보수·기준·공격)를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값 Inputs</h2>
        <div class="inputs">
          <div><label id="l_subscribers" for="subscribers"></label><input id="subscribers" type="number" min="0" value="45000"></div>
          <div><label id="l_openRate" for="openRate"></label><input id="openRate" type="number" min="0" max="100" step="0.1" value="38"></div>
          <div><label id="l_ctr" for="ctr"></label><input id="ctr" type="number" min="0" max="100" step="0.1" value="3.2"></div>
          <div><label id="l_slots" for="slots"></label><input id="slots" type="number" min="1" max="10" step="1" value="2"></div>
          <div><label id="l_cpm" for="cpm"></label><input id="cpm" type="number" min="0" step="100" value="38000"></div>
          <div><label id="l_cpc" for="cpc"></label><input id="cpc" type="number" min="0" step="10" value="900"></div>
          <div><label id="l_weight" for="weight"></label><input id="weight" type="number" min="0.2" max="3" step="0.01" value="1.15"></div>
          <div><label id="l_cost" for="cost"></label><input id="cost" type="number" min="0" step="1000" value="120000"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_opens"></div><div class="v" id="opens">-</div></div>
          <div class="kpi"><div class="k" id="k_clicks"></div><div class="v" id="clicks">-</div></div>
          <div class="kpi"><div class="k" id="k_basePrice"></div><div class="v" id="basePrice">-</div></div>
          <div class="kpi"><div class="k" id="k_netPrice"></div><div class="v" id="netPrice">-</div></div>
          <div class="kpi"><div class="k" id="k_conservative"></div><div class="v" id="conservative">-</div></div>
          <div class="kpi"><div class="k" id="k_aggressive"></div><div class="v" id="aggressive">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_cpmPrice"></th><td id="cpmPrice">-</td></tr>
          <tr><th id="d_cpcPrice"></th><td id="cpcPrice">-</td></tr>
          <tr><th id="d_cost"></th><td id="costOut">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={subscribers:$("subscribers"),openRate:$("openRate"),ctr:$("ctr"),slots:$("slots"),cpm:$("cpm"),cpc:$("cpc"),weight:$("weight"),cost:$("cost"),opens:$("opens"),clicks:$("clicks"),basePrice:$("basePrice"),netPrice:$("netPrice"),conservative:$("conservative"),aggressive:$("aggressive"),cpmPrice:$("cpmPrice"),cpcPrice:$("cpcPrice"),costOut:$("costOut"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={subscribers:45000,openRate:38,ctr:3.2,slots:2,cpm:38000,cpc:900,weight:1.15,cost:120000};
    const I18N={
      ko:{title:"📧 뉴스레터 스폰서십 단가 계산기",subtitle:"오픈/클릭 성과를 기반으로 스폰서 고정 단가(보수·기준·공격)를 계산합니다.",inputHeader:"입력값 Inputs",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_subscribers:"구독자 수",l_openRate:"평균 오픈율 (%)",l_ctr:"클릭률 CTR (%)",l_slots:"스폰서 링크 수",l_cpm:"기준 CPM (₩)",l_cpc:"기준 CPC (₩)",l_weight:"배치 위치 가중치",l_cost:"제작·운영비 (회당 ₩)",k_opens:"예상 오픈 수",k_clicks:"예상 클릭 수",k_basePrice:"기준 권장 단가",k_netPrice:"비용 반영 순단가",k_conservative:"보수 단가",k_aggressive:"공격 단가",d_cpmPrice:"CPM 기반 단가",d_cpcPrice:"CPC 기반 단가",d_cost:"반영 비용",ok:"권장 단가 산출 완료",bad:"비용이 높아 순단가가 낮습니다",invalid:"입력값을 확인해주세요",e_range:"비율은 0~100 범위여야 합니다.",e_number:"값은 0 이상이어야 합니다.",copied:"요약이 복사되었습니다.",copyFail:"클립보드를 사용할 수 없어 수동 복사가 필요합니다.",summaryTitle:"[뉴스레터 스폰서십 단가 요약]"},
      en:{title:"📧 Newsletter Sponsorship Pricing Calculator",subtitle:"Estimate sponsor flat fee ranges from opens, CTR, and CPM/CPC benchmarks.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_subscribers:"Subscribers",l_openRate:"Average open rate (%)",l_ctr:"Click-through rate (%)",l_slots:"Sponsor links per issue",l_cpm:"Benchmark CPM (KRW)",l_cpc:"Benchmark CPC (KRW)",l_weight:"Placement weight",l_cost:"Production/ops cost per issue (KRW)",k_opens:"Expected opens",k_clicks:"Expected clicks",k_basePrice:"Baseline recommended fee",k_netPrice:"Net fee after cost",k_conservative:"Conservative fee",k_aggressive:"Aggressive fee",d_cpmPrice:"CPM-based fee",d_cpcPrice:"CPC-based fee",d_cost:"Included cost",ok:"Pricing recommendation ready",bad:"High cost is compressing net fee",invalid:"Please review inputs",e_range:"Rates must be between 0 and 100.",e_number:"Values must be zero or above.",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Newsletter Sponsorship Pricing Summary]"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["subscribers","openRate","ctr","slots","cpm","cpc","weight","cost"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["opens","clicks","basePrice","netPrice","conservative","aggressive"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["cpmPrice","cpcPrice","cost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if([v.subscribers,v.slots,v.cpm,v.cpc,v.weight,v.cost].some((x)=>!Number.isFinite(x)||x<0)) return t("e_number");
      if([v.openRate,v.ctr].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("e_range");
      if(v.slots<1) return t("e_number");
      return "";
    }

    function render(){
      const v={subscribers:Number(refs.subscribers.value),openRate:Number(refs.openRate.value),ctr:Number(refs.ctr.value),slots:Number(refs.slots.value),cpm:Number(refs.cpm.value),cpc:Number(refs.cpc.value),weight:Number(refs.weight.value),cost:Number(refs.cost.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["opens","clicks","basePrice","netPrice","conservative","aggressive","cpmPrice","cpcPrice","costOut"].forEach((k)=>refs[k].textContent="-");refs.status.textContent=t("invalid");refs.summary.value="";return;}
      const opens=v.subscribers*(v.openRate/100);
      const clicks=opens*(v.ctr/100)*v.slots;
      const cpmPrice=(opens/1000)*v.cpm*v.weight;
      const cpcPrice=clicks*v.cpc*v.weight;
      const basePrice=(cpmPrice+cpcPrice)/2;
      const netPrice=Math.max(0,basePrice-v.cost);
      const conservative=netPrice*0.85;
      const aggressive=netPrice*1.2;

      refs.opens.textContent=`${num(opens,0)}`; refs.clicks.textContent=`${num(clicks,0)}`;
      refs.basePrice.textContent=won(basePrice); refs.netPrice.textContent=won(netPrice); refs.conservative.textContent=won(conservative); refs.aggressive.textContent=won(aggressive);
      refs.cpmPrice.textContent=won(cpmPrice); refs.cpcPrice.textContent=won(cpcPrice); refs.costOut.textContent=won(v.cost);
      refs.status.innerHTML=netPrice>0?`<span class="good">●</span> ${t("ok")}`:`<span class="warn">●</span> ${t("bad")}`;
      refs.summary.value=[t("summaryTitle"),`${t("k_opens")}: ${num(opens,0)}`,`${t("k_clicks")}: ${num(clicks,0)}`,`${t("d_cpmPrice")}: ${won(cpmPrice)}`,`${t("d_cpcPrice")}: ${won(cpcPrice)}`,`${t("k_netPrice")}: ${won(netPrice)}`,`${t("k_conservative")}: ${won(conservative)}`,`${t("k_aggressive")}: ${won(aggressive)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.subscribers,refs.openRate,refs.ctr,refs.slots,refs.cpm,refs.cpc,refs.weight,refs.cost].forEach((el)=>el.addEventListener("input",render));
    applyI18n(); render();
  </script>
</body>
</html>
