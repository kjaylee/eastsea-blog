<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Format Inspector | 숫자 포맷 탐색기</title>
    <meta name="description" content="숫자가 전 세계 로케일별로 어떻게 표시되는지 확인하세요. 통화, 퍼센트, 과학 표기법 등 Intl.NumberFormat 완전 탐색.">
    <meta name="keywords" content="number format, locale, intl.numberformat, currency format, number localization, 숫자 포맷, 통화 표시">
    <meta property="og:title" content="Number Format Inspector">
    <meta property="og:description" content="숫자가 전 세계 로케일별로 어떻게 표시되는지 확인합니다.">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#fff;--bg2:#f8f9fa;--text:#212529;--text2:#6c757d;--accent:#059669;--border:#dee2e6;--shadow:rgba(0,0,0,.08);--card:#fff}
        [data-theme="dark"]{--bg:#0d1117;--bg2:#161b22;--text:#c9d1d9;--text2:#8b949e;--border:#21262d;--shadow:rgba(0,0,0,.4);--card:#161b22}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg2);color:var(--text);padding:20px;min-height:100vh;transition:all .3s}
        .container{max-width:1050px;margin:0 auto}
        header{text-align:center;margin-bottom:28px}
        h1{font-size:1.9rem;background:linear-gradient(135deg,#059669,#0ea5e9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .subtitle{color:var(--text2);font-size:.95rem}
        .theme-toggle{position:fixed;top:15px;right:15px;background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .2s}
        .home-btn{position:fixed;top:15px;left:15px;text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;z-index:10;transition:all .2s}
        .home-btn:hover,.theme-toggle:hover{transform:scale(1.1)}
        .top-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
        .panel{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 10px var(--shadow);margin-bottom:20px}
        .panel h2{font-size:1rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .input-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap}
        .field{flex:1;min-width:140px}
        label{display:block;font-size:.78rem;font-weight:700;margin-bottom:5px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
        input[type=number],input[type=text],select{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-size:.95rem;background:var(--bg);color:var(--text);transition:border .2s}
        input:focus,select:focus{outline:none;border-color:var(--accent)}
        .number-big{font-size:2.8rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent);text-align:center;padding:20px;background:var(--bg2);border-radius:10px;letter-spacing:.02em}
        .format-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
        .ftab{padding:7px 14px;border:2px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s}
        .ftab:hover,.ftab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .locale-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
        .locale-card{background:var(--card);border-radius:10px;padding:14px 16px;border:1px solid var(--border);transition:all .2s;cursor:pointer}
        .locale-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px var(--shadow)}
        .locale-card.highlighted{border-color:var(--accent);background:rgba(5,150,105,.06)}
        .locale-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .locale-flag{font-size:1.4rem}
        .locale-name{font-weight:700;font-size:.9rem}
        .locale-code{font-size:.72rem;color:var(--text2);margin-left:auto;font-family:monospace;background:var(--bg2);padding:2px 6px;border-radius:4px}
        .locale-number{font-size:1.25rem;font-weight:600;font-variant-numeric:tabular-nums}
        .locale-note{font-size:.72rem;color:var(--text2);margin-top:4px}
        .options-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
        .option-group{background:var(--bg2);border-radius:8px;padding:12px}
        .option-group label{font-size:.78rem;font-weight:700;color:var(--text2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
        .option-group select,
        .option-group input[type=number]{background:var(--bg);font-size:.85rem;padding:7px 10px}
        .range-row{display:flex;gap:10px;align-items:center}
        .range-row input[type=number]{width:70px}
        .range-sep{color:var(--text2)}
        .search-bar{width:100%;padding:9px 14px;border:2px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--bg);color:var(--text);margin-bottom:16px}
        .search-bar:focus{outline:none;border-color:var(--accent)}
        .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
        .count-badge{font-size:.78rem;color:var(--text2);background:var(--bg2);padding:4px 10px;border-radius:20px}
        @media(max-width:700px){.top-section{grid-template-columns:1fr}.input-row{flex-direction:column}.number-big{font-size:2rem}h1{font-size:1.4rem}}
    </style>
    <script src="/assets/analytics.js"></script>
</head>
<body>
<a href="/" class="home-btn" title="도구 목록">🏠</a>
<button class="theme-toggle" onclick="toggleTheme()" title="테마">🌓</button>
<div class="container">
    <header>
        <h1>🌍 Number Format Inspector</h1>
        <p class="subtitle">숫자가 전 세계 로케일에서 어떻게 표시되는지 실시간으로 확인하세요</p>
    </header>

    <div class="top-section">
        <div class="panel">
            <h2>🔢 숫자 입력</h2>
            <input type="number" id="numberInput" value="1234567.89" step="any" oninput="updateAll()" style="font-size:1.5rem;padding:12px;text-align:center;margin-bottom:12px;border-radius:10px">
            <div class="format-tabs">
                <button class="ftab active" onclick="setStyle('decimal',this)">숫자</button>
                <button class="ftab" onclick="setStyle('currency',this)">통화</button>
                <button class="ftab" onclick="setStyle('percent',this)">퍼센트</button>
                <button class="ftab" onclick="setStyle('unit',this)">단위</button>
                <button class="ftab" onclick="setStyle('scientific',this)">과학</button>
                <button class="ftab" onclick="setStyle('compact',this)">간결</button>
            </div>
            <div id="extraOptions"></div>
        </div>
        <div class="panel">
            <h2>⚙️ 포맷 옵션</h2>
            <div class="options-row">
                <div class="option-group">
                    <label>소수점 최소</label>
                    <input type="number" id="optMinFrac" value="2" min="0" max="20" oninput="updateAll()">
                </div>
                <div class="option-group">
                    <label>소수점 최대</label>
                    <input type="number" id="optMaxFrac" value="2" min="0" max="20" oninput="updateAll()">
                </div>
                <div class="option-group">
                    <label>유효 숫자 최대</label>
                    <input type="number" id="optMaxSig" value="" min="1" max="21" placeholder="기본값" oninput="updateAll()">
                </div>
                <div class="option-group">
                    <label>부호 표시</label>
                    <select id="optSign" onchange="updateAll()">
                        <option value="auto">auto</option>
                        <option value="always">always (+/-)</option>
                        <option value="exceptZero">exceptZero</option>
                        <option value="never">never</option>
                    </select>
                </div>
            </div>
            <div class="number-big" id="localPreview">—</div>
            <div style="text-align:center;font-size:.78rem;color:var(--text2);margin-top:8px" id="localLocale">브라우저 로케일</div>
        </div>
    </div>

    <div class="panel">
        <div class="section-header">
            <h2>🌐 로케일별 포맷</h2>
            <span class="count-badge" id="localeCount">0 로케일</span>
        </div>
        <input class="search-bar" id="searchBar" placeholder="🔍 국가, 언어, 통화 코드로 검색..." oninput="filterLocales()">
        <div class="locale-grid" id="localeGrid"></div>
    </div>
</div>

<script>
const LOCALES = [
    { code:'en-US', flag:'🇺🇸', name:'English (US)', currency:'USD', note:'Comma thousand sep, dot decimal' },
    { code:'en-GB', flag:'🇬🇧', name:'English (UK)', currency:'GBP', note:'Pound sterling' },
    { code:'en-AU', flag:'🇦🇺', name:'English (AU)', currency:'AUD', note:'Australian dollar' },
    { code:'ko-KR', flag:'🇰🇷', name:'한국어', currency:'KRW', note:'원화, no decimal in currency' },
    { code:'ja-JP', flag:'🇯🇵', name:'日本語', currency:'JPY', note:'Yen, no decimal' },
    { code:'zh-CN', flag:'🇨🇳', name:'中文 (简体)', currency:'CNY', note:'Chinese yuan' },
    { code:'zh-TW', flag:'🇹🇼', name:'中文 (繁體)', currency:'TWD', note:'Taiwan dollar' },
    { code:'de-DE', flag:'🇩🇪', name:'Deutsch', currency:'EUR', note:'Dot thousand, comma decimal' },
    { code:'fr-FR', flag:'🇫🇷', name:'Français', currency:'EUR', note:'Space thousand separator' },
    { code:'es-ES', flag:'🇪🇸', name:'Español (ES)', currency:'EUR', note:'European Spanish' },
    { code:'es-MX', flag:'🇲🇽', name:'Español (MX)', currency:'MXN', note:'Mexican peso' },
    { code:'pt-BR', flag:'🇧🇷', name:'Português (BR)', currency:'BRL', note:'Brazilian real' },
    { code:'pt-PT', flag:'🇵🇹', name:'Português (PT)', currency:'EUR', note:'European Portuguese' },
    { code:'it-IT', flag:'🇮🇹', name:'Italiano', currency:'EUR', note:'Italian format' },
    { code:'ru-RU', flag:'🇷🇺', name:'Русский', currency:'RUB', note:'Space thousands, comma decimal' },
    { code:'ar-SA', flag:'🇸🇦', name:'العربية', currency:'SAR', note:'Arabic numerals, RTL' },
    { code:'ar-EG', flag:'🇪🇬', name:'العربية (مصر)', currency:'EGP', note:'Eastern Arabic numerals' },
    { code:'hi-IN', flag:'🇮🇳', name:'हिन्दी', currency:'INR', note:'Lakh/crore system' },
    { code:'id-ID', flag:'🇮🇩', name:'Bahasa Indonesia', currency:'IDR', note:'Indonesian rupiah' },
    { code:'th-TH', flag:'🇹🇭', name:'ภาษาไทย', currency:'THB', note:'Thai baht' },
    { code:'vi-VN', flag:'🇻🇳', name:'Tiếng Việt', currency:'VND', note:'Vietnamese dong' },
    { code:'tr-TR', flag:'🇹🇷', name:'Türkçe', currency:'TRY', note:'Turkish lira' },
    { code:'pl-PL', flag:'🇵🇱', name:'Polski', currency:'PLN', note:'Polish zloty' },
    { code:'nl-NL', flag:'🇳🇱', name:'Nederlands', currency:'EUR', note:'Dutch format' },
    { code:'sv-SE', flag:'🇸🇪', name:'Svenska', currency:'SEK', note:'Swedish krona, space thousands' },
    { code:'nb-NO', flag:'🇳🇴', name:'Norsk', currency:'NOK', note:'Norwegian krone' },
    { code:'da-DK', flag:'🇩🇰', name:'Dansk', currency:'DKK', note:'Danish krone' },
    { code:'fi-FI', flag:'🇫🇮', name:'Suomi', currency:'EUR', note:'Finnish format' },
    { code:'cs-CZ', flag:'🇨🇿', name:'Čeština', currency:'CZK', note:'Czech koruna' },
    { code:'hu-HU', flag:'🇭🇺', name:'Magyar', currency:'HUF', note:'Hungarian forint' },
    { code:'he-IL', flag:'🇮🇱', name:'עברית', currency:'ILS', note:'Israeli shekel, RTL' },
    { code:'uk-UA', flag:'🇺🇦', name:'Українська', currency:'UAH', note:'Ukrainian hryvnia' },
    { code:'fa-IR', flag:'🇮🇷', name:'فارسی', currency:'IRR', note:'Persian numerals, RTL' },
    { code:'ms-MY', flag:'🇲🇾', name:'Bahasa Melayu', currency:'MYR', note:'Malaysian ringgit' },
    { code:'bn-BD', flag:'🇧🇩', name:'বাংলা', currency:'BDT', note:'Bengali numerals' },
    { code:'af-ZA', flag:'🇿🇦', name:'Afrikaans', currency:'ZAR', note:'South African rand' },
];

let currentStyle = 'decimal';
let currentCurrency = 'USD';
let currentUnit = 'kilometer';
let filtered = [...LOCALES];

function setStyle(style, btn) {
    currentStyle = style;
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderExtraOptions();
    updateAll();
}

function renderExtraOptions() {
    const el = document.getElementById('extraOptions');
    if (currentStyle === 'currency') {
        el.innerHTML = `<div class="option-group" style="margin-top:10px">
            <label>통화</label>
            <select id="currencySelect" onchange="currentCurrency=this.value;updateAll()">
                ${['USD','EUR','KRW','JPY','GBP','CNY','AUD','CAD','CHF','HKD','SGD','MXN','BRL','INR','RUB','THB','IDR','MYR','VND','TWD'].map(c=>`<option value="${c}"${c===currentCurrency?' selected':''}>${c}</option>`).join('')}
            </select>
        </div>`;
    } else if (currentStyle === 'unit') {
        el.innerHTML = `<div class="option-group" style="margin-top:10px">
            <label>단위</label>
            <select id="unitSelect" onchange="currentUnit=this.value;updateAll()">
                ${['kilometer','mile','meter','inch','foot','centimeter','kilogram','pound','gram','ounce','liter','gallon','millisecond','second','minute','hour','day','byte','kilobyte','megabyte','gigabyte','terabyte','celsius','fahrenheit','degree'].map(u=>`<option value="${u}"${u===currentUnit?' selected':''}>${u}</option>`).join('')}
            </select>
        </div>`;
    } else {
        el.innerHTML = '';
    }
}

function getOptions() {
    const minFrac = parseInt(document.getElementById('optMinFrac').value) || 0;
    const maxFrac = parseInt(document.getElementById('optMaxFrac').value) || 0;
    const maxSig = document.getElementById('optMaxSig').value;
    const signDisplay = document.getElementById('optSign').value;

    const opts = { signDisplay };
    if (currentStyle === 'currency') {
        opts.style = 'currency';
        opts.currency = currentCurrency;
    } else if (currentStyle === 'percent') {
        opts.style = 'percent';
        opts.minimumFractionDigits = minFrac;
        opts.maximumFractionDigits = maxFrac;
    } else if (currentStyle === 'unit') {
        opts.style = 'unit';
        opts.unit = currentUnit;
        opts.unitDisplay = 'long';
    } else if (currentStyle === 'scientific') {
        opts.notation = 'scientific';
        opts.minimumFractionDigits = minFrac;
        opts.maximumFractionDigits = maxFrac;
    } else if (currentStyle === 'compact') {
        opts.notation = 'compact';
        opts.compactDisplay = 'short';
    } else {
        opts.minimumFractionDigits = minFrac;
        opts.maximumFractionDigits = maxFrac;
    }
    if (maxSig) opts.maximumSignificantDigits = parseInt(maxSig);
    return opts;
}

function formatNumber(locale, value, opts) {
    try {
        return new Intl.NumberFormat(locale, opts).format(value);
    } catch (e) {
        return '—';
    }
}

function updateAll() {
    const raw = document.getElementById('numberInput').value;
    const value = parseFloat(raw);
    const opts = getOptions();

    // Local preview
    const localFmt = formatNumber(navigator.language, value, opts);
    document.getElementById('localPreview').textContent = isNaN(value) ? '—' : localFmt;
    document.getElementById('localLocale').textContent = `브라우저 로케일: ${navigator.language}`;

    filterLocales();
}

function filterLocales() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    filtered = LOCALES.filter(l =>
        !q ||
        l.name.toLowerCase().includes(q) ||
        l.code.toLowerCase().includes(q) ||
        l.currency.toLowerCase().includes(q) ||
        l.note.toLowerCase().includes(q)
    );
    renderLocales();
}

function renderLocales() {
    const raw = document.getElementById('numberInput').value;
    const value = parseFloat(raw);
    const opts = getOptions();
    const userLang = navigator.language;

    document.getElementById('localeCount').textContent = `${filtered.length} 로케일`;
    const grid = document.getElementById('localeGrid');
    grid.innerHTML = filtered.map(l => {
        const formatted = isNaN(value) ? '—' : formatNumber(l.code, value, opts);
        const isUser = l.code === userLang || userLang.startsWith(l.code.split('-')[0]);
        return `<div class="locale-card${isUser?' highlighted':''}" onclick="copyFormatted('${escQ(formatted)}','${escQ(l.name)}')">
            <div class="locale-header">
                <span class="locale-flag">${l.flag}</span>
                <span class="locale-name">${escHtml(l.name)}</span>
                <span class="locale-code">${l.code}</span>
            </div>
            <div class="locale-number" dir="${['ar-SA','ar-EG','he-IL','fa-IR'].includes(l.code)?'rtl':'ltr'}">${escHtml(formatted)}</div>
            <div class="locale-note">${escHtml(l.note)}</div>
        </div>`;
    }).join('');
}

function copyFormatted(text, locale) {
    navigator.clipboard.writeText(text).then(() => {
        showToast(`📋 복사: ${text} (${locale})`);
    });
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escQ(s) { return String(s).replace(/'/g,"\\'"); }

function showToast(msg) {
    let t = document.getElementById('toast');
    if (!t) { t = document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:.88rem;opacity:0;transition:opacity .3s;z-index:100'; document.body.appendChild(t); }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; }, 2200);
}

function toggleTheme() {
    const d = document.documentElement;
    d.dataset.theme = d.dataset.theme === 'dark' ? '' : 'dark';
    localStorage.setItem('theme', d.dataset.theme);
}

(function() {
    if (localStorage.getItem('theme') === 'dark') document.documentElement.dataset.theme = 'dark';
    renderExtraOptions();
    updateAll();
})();
</script>
</body>
</html>
