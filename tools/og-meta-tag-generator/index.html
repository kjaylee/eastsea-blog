<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta name="description" content="Open Graph Meta Tag Generator - SNS 공유용 OG/Twitter 메타태그를 빠르게 생성하고 미리보기로 확인하세요. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>Open Graph Meta Tag Generator - OG 메타태그 생성기</title>
  <style>
    :root{
      --bg:#0f1324;--panel:#151c35;--panel2:#1b2545;--line:rgba(255,255,255,.12);
      --text:#eef3ff;--muted:#a5b5d9;--accent:#7c8cff;--ok:#38d39f;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,"Noto Sans KR",sans-serif;color:var(--text);
      background:radial-gradient(1000px 500px at 85% -15%, #233160 0, transparent 60%), var(--bg);padding:20px}
    .wrap{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:16px}
    h1{margin:0 0 6px;font-size:1.25rem}.sub{margin:0 0 14px;color:var(--muted);font-size:.92rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{margin-bottom:10px}
    label{display:flex;justify-content:space-between;gap:8px;color:#d7e0f7;font-size:.86rem;margin-bottom:6px}
    .counter{color:var(--muted);font-size:.75rem}
    input,textarea,select,button{width:100%;border:1px solid var(--line);background:#101735;color:var(--text);border-radius:12px;padding:10px 12px;font-size:.92rem}
    textarea{min-height:84px;resize:vertical}
    button{background:linear-gradient(135deg,var(--accent),#5b6dfb);border:none;font-weight:700;cursor:pointer}
    button.secondary{background:#111a3a;border:1px solid var(--line);font-weight:600}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    pre{margin:0;background:#0c122b;border:1px solid var(--line);padding:12px;border-radius:12px;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-word}
    .preview{
      background:#fff;color:#111;border-radius:14px;overflow:hidden;border:1px solid #d7d7d7;box-shadow:0 18px 50px rgba(0,0,0,.2)
    }
    .pv-img{height:220px;background:#d9deef center/cover no-repeat}
    .pv-body{padding:12px}.pv-site{color:#6a6a6a;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
    .pv-title{font-size:1.02rem;font-weight:700;margin:6px 0 4px}
    .pv-desc{color:#4f4f4f;font-size:.88rem;line-height:1.4}
    .hint{color:var(--muted);font-size:.82rem;margin-top:8px}
    @media (max-width:940px){.wrap{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Open Graph Meta Tag Generator</h1>
      <p class="sub">SNS 공유용 OG/Twitter 메타태그를 빠르게 생성하고 미리보기로 확인하세요.</p>

      <div class="field">
        <label for="title">페이지 제목 <span class="counter" id="titleCnt">0 / 60</span></label>
        <input id="title" placeholder="예) 최고의 생산성 툴 모음" />
      </div>

      <div class="field">
        <label for="desc">설명 <span class="counter" id="descCnt">0 / 155</span></label>
        <textarea id="desc" placeholder="공유 카드에 표시될 설명을 입력하세요."></textarea>
      </div>

      <div class="grid">
        <div class="field">
          <label for="url">페이지 URL</label>
          <input id="url" placeholder="https://example.com/post" />
        </div>
        <div class="field">
          <label for="img">이미지 URL (1200×630 권장)</label>
          <input id="img" placeholder="https://example.com/og-image.jpg" />
        </div>
      </div>

      <div class="grid">
        <div class="field">
          <label for="site">사이트명</label>
          <input id="site" placeholder="EastSea Tools" value="EastSea Tools" />
        </div>
        <div class="field">
          <label for="locale">로케일</label>
          <input id="locale" value="ko_KR" />
        </div>
      </div>

      <div class="grid">
        <div class="field">
          <label for="type">og:type</label>
          <select id="type">
            <option>website</option>
            <option>article</option>
            <option>product</option>
            <option>profile</option>
          </select>
        </div>
        <div class="field">
          <label for="card">twitter:card</label>
          <select id="card">
            <option>summary_large_image</option>
            <option>summary</option>
            <option>app</option>
            <option>player</option>
          </select>
        </div>
      </div>

      <div class="btns">
        <button id="copy">메타태그 복사</button>
        <button id="sample" class="secondary">샘플 입력</button>
      </div>
      <p class="hint">복사 후 HTML &lt;head&gt; 안에 붙여넣으세요.</p>
    </section>

    <section class="card">
      <h2 style="margin:0 0 10px;font-size:1rem">실시간 미리보기</h2>
      <div class="preview">
        <div id="pvImg" class="pv-img"></div>
        <div class="pv-body">
          <div id="pvSite" class="pv-site">EASTSEA TOOLS</div>
          <div id="pvTitle" class="pv-title">제목을 입력하세요</div>
          <div id="pvDesc" class="pv-desc">설명을 입력하면 공유 카드에 어떻게 보이는지 확인할 수 있습니다.</div>
        </div>
      </div>
      <h2 style="margin:14px 0 10px;font-size:1rem">생성된 코드</h2>
      <pre id="output"></pre>
    </section>
  </div>

  <script>
    const ids = ['title','desc','url','img','site','locale','type','card'];
    const $ = id => document.getElementById(id);

    function esc(v=''){
      return v.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render(){
      const v = Object.fromEntries(ids.map(id => [id, $(id).value.trim()]));
      $('titleCnt').textContent = `${v.title.length} / 60`;
      $('descCnt').textContent = `${v.desc.length} / 155`;

      $('pvTitle').textContent = v.title || '제목을 입력하세요';
      $('pvDesc').textContent = v.desc || '설명을 입력하면 공유 카드에 어떻게 보이는지 확인할 수 있습니다.';
      $('pvSite').textContent = (v.site || 'SITE').toUpperCase();
      $('pvImg').style.backgroundImage = v.img ? `url('${v.img.replace(/'/g, "%27")}')` : 'linear-gradient(135deg,#d9deef,#b7c3e8)';

      const meta = [
        `<meta property="og:type" content="${esc(v.type || 'website')}">`,
        `<meta property="og:locale" content="${esc(v.locale || 'ko_KR')}">`,
        `<meta property="og:site_name" content="${esc(v.site)}">`,
        `<meta property="og:title" content="${esc(v.title)}">`,
        `<meta property="og:description" content="${esc(v.desc)}">`,
        `<meta property="og:url" content="${esc(v.url)}">`,
        `<meta property="og:image" content="${esc(v.img)}">`,
        '',
        `<meta name="twitter:card" content="${esc(v.card || 'summary_large_image')}">`,
        `<meta name="twitter:title" content="${esc(v.title)}">`,
        `<meta name="twitter:description" content="${esc(v.desc)}">`,
        `<meta name="twitter:image" content="${esc(v.img)}">`
      ].join('\n');

      $('output').textContent = meta;
    }

    ids.forEach(id => $(id).addEventListener('input', render));

    $('copy').addEventListener('click', async () => {
      try{
        await navigator.clipboard.writeText($('output').textContent);
        $('copy').textContent = '복사 완료!';
        setTimeout(()=> $('copy').textContent = '메타태그 복사', 1200);
      }catch{ alert('클립보드 복사에 실패했습니다.'); }
    });

    $('sample').addEventListener('click', () => {
      $('title').value = 'Open Graph 완벽 가이드: 클릭률 올리는 공유 카드 만들기';
      $('desc').value = 'OG 메타태그, Twitter 카드, 이미지 규격까지 한 번에 정리한 실전 체크리스트.';
      $('url').value = 'https://tools.eastsea.xyz/blog/open-graph-guide';
      $('img').value = 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200';
      $('site').value = 'EastSea Tools';
      $('locale').value = 'ko_KR';
      $('type').value = 'article';
      $('card').value = 'summary_large_image';
      render();
    });

    render();
  </script>
</body>
</html>
