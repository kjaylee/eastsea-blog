<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding Time-to-Value ROI Calculator | 온보딩 TTV ROI 계산기</title>
  <meta name="description" content="온보딩 Time-to-Value 개선으로 활성화율·초기 유지율·CSM 효율이 얼마나 수익을 만드는지 계산하는 SaaS 운영 ROI 도구" />
  <style>
    :root{--bg:#081426;--card:#102542;--line:#2c4f7f;--txt:#edf3ff;--muted:#a9c1e2;--pri:#7aa2ff;--soft:#173861;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errBg:rgba(248,113,113,.14)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#244f87 0%,#081426 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px} .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)} .sub{margin-top:6px;color:var(--muted);font-size:.93rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px} .card{background:linear-gradient(165deg,#16345e,#102542);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem} .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px} input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1c36;color:var(--txt);font-size:.93rem}
    textarea{min-height:108px;resize:vertical;margin-top:10px} button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#648af5);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)} .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem} .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px} .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px} .v{font-size:1.06rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word} th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🚀 온보딩 Time-to-Value ROI 계산기</h1>
        <div class="sub">활성화율/초기 유지율 개선과 CSM 시간 절감이 만드는 순효과를 월·연 단위로 확인합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="newCustomersPerMonth">월 신규 고객 수</label><input id="newCustomersPerMonth" type="number" min="1" value="240" /></div>
          <div><label for="arpa">ARPA (월, ₩)</label><input id="arpa" type="number" min="1" value="420" /></div>
          <div><label for="grossMarginRate">매출총이익률 (%)</label><input id="grossMarginRate" type="number" min="1" max="100" step="0.1" value="79" /></div>
          <div><label for="activationCurrent">현재 활성화율 (%)</label><input id="activationCurrent" type="number" min="0" max="100" step="0.1" value="56" /></div>
          <div><label for="activationTarget">목표 활성화율 (%)</label><input id="activationTarget" type="number" min="0" max="100" step="0.1" value="68" /></div>
          <div><label for="retentionCurrent">현재 3개월 유지율 (%)</label><input id="retentionCurrent" type="number" min="0" max="100" step="0.1" value="74" /></div>
          <div><label for="retentionTarget">목표 3개월 유지율 (%)</label><input id="retentionTarget" type="number" min="0" max="100" step="0.1" value="82" /></div>
          <div><label for="csmHoursSaved">활성고객당 CSM 절감 시간 (h)</label><input id="csmHoursSaved" type="number" min="0" step="0.1" value="1.4" /></div>
          <div><label for="csmHourlyCost">CSM 시간당 비용 (₩)</label><input id="csmHourlyCost" type="number" min="0" value="52" /></div>
          <div><label for="platformCostMonthly">플랫폼 월 비용 (₩)</label><input id="platformCostMonthly" type="number" min="0" value="3600" /></div>
          <div><label for="implementationCost">초기 구축비 (₩)</label><input id="implementationCost" type="number" min="0" value="26000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">기준 Qualified MRR</div><div id="baselineQualifiedMrr" class="v">-</div></div>
          <div class="kpi"><div class="k">개선 후 Qualified MRR</div><div id="improvedQualifiedMrr" class="v">-</div></div>
          <div class="kpi"><div class="k">월 추가 매출총이익</div><div id="incrementalGrossProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">월 CSM 비용 절감</div><div id="csmSavings" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNetImpact" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roiPct" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>연간 순효과</th><td id="annualNetImpact">-</td></tr>
            <tr><th>회수기간</th><td id="paybackMonths">-</td></tr>
            <tr><th>손익분기 필요 활성화율(목표 유지율 가정)</th><td id="breakEvenActivation">-</td></tr>
            <tr><th>활성화율 개선 폭</th><td id="activationLiftPp">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      newCustomersPerMonth: $("newCustomersPerMonth"), arpa: $("arpa"), grossMarginRate: $("grossMarginRate"), activationCurrent: $("activationCurrent"), activationTarget: $("activationTarget"),
      retentionCurrent: $("retentionCurrent"), retentionTarget: $("retentionTarget"), csmHoursSaved: $("csmHoursSaved"), csmHourlyCost: $("csmHourlyCost"), platformCostMonthly: $("platformCostMonthly"), implementationCost: $("implementationCost"),
      baselineQualifiedMrr: $("baselineQualifiedMrr"), improvedQualifiedMrr: $("improvedQualifiedMrr"), incrementalGrossProfit: $("incrementalGrossProfit"), csmSavings: $("csmSavings"), monthlyNetImpact: $("monthlyNetImpact"),
      roiPct: $("roiPct"), annualNetImpact: $("annualNetImpact"), paybackMonths: $("paybackMonths"), breakEvenActivation: $("breakEvenActivation"), activationLiftPp: $("activationLiftPp"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = { newCustomersPerMonth: 240, arpa: 420, grossMarginRate: 79, activationCurrent: 56, activationTarget: 68, retentionCurrent: 74, retentionTarget: 82, csmHoursSaved: 1.4, csmHourlyCost: 52, platformCostMonthly: 3600, implementationCost: 26000 };
    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(Number.isFinite(n) ? n : 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v) {
      if (!Number.isFinite(v.newCustomersPerMonth) || v.newCustomersPerMonth <= 0) return "월 신규 고객 수는 0보다 커야 합니다.";
      if (!Number.isFinite(v.arpa) || v.arpa <= 0) return "ARPA는 0보다 커야 합니다.";
      if (!Number.isFinite(v.grossMarginRate) || v.grossMarginRate <= 0 || v.grossMarginRate > 100) return "매출총이익률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.activationCurrent) || v.activationCurrent < 0 || v.activationCurrent > 100) return "현재 활성화율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.activationTarget) || v.activationTarget < 0 || v.activationTarget > 100) return "목표 활성화율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.retentionCurrent) || v.retentionCurrent < 0 || v.retentionCurrent > 100) return "현재 유지율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.retentionTarget) || v.retentionTarget < 0 || v.retentionTarget > 100) return "목표 유지율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.csmHoursSaved) || v.csmHoursSaved < 0) return "CSM 절감 시간은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.csmHourlyCost) || v.csmHourlyCost < 0) return "CSM 시간당 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.platformCostMonthly) || v.platformCostMonthly < 0) return "플랫폼 월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.implementationCost) || v.implementationCost < 0) return "초기 구축비는 0 이상이어야 합니다.";
      return "";
    }

    function render() {
      const v = {
        newCustomersPerMonth: Number(refs.newCustomersPerMonth.value), arpa: Number(refs.arpa.value), grossMarginRate: Number(refs.grossMarginRate.value),
        activationCurrent: Number(refs.activationCurrent.value), activationTarget: Number(refs.activationTarget.value), retentionCurrent: Number(refs.retentionCurrent.value), retentionTarget: Number(refs.retentionTarget.value),
        csmHoursSaved: Number(refs.csmHoursSaved.value), csmHourlyCost: Number(refs.csmHourlyCost.value), platformCostMonthly: Number(refs.platformCostMonthly.value), implementationCost: Number(refs.implementationCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err) {
        ["baselineQualifiedMrr","improvedQualifiedMrr","incrementalGrossProfit","csmSavings","monthlyNetImpact","roiPct","annualNetImpact","paybackMonths","breakEvenActivation","activationLiftPp"].forEach((k)=>refs[k].textContent="-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const gm = v.grossMarginRate / 100;
      const activationCurrent = v.activationCurrent / 100;
      const activationTarget = v.activationTarget / 100;
      const retentionCurrent = v.retentionCurrent / 100;
      const retentionTarget = v.retentionTarget / 100;

      const baselineQualifiedMrr = v.newCustomersPerMonth * activationCurrent * retentionCurrent * v.arpa;
      const improvedQualifiedMrr = v.newCustomersPerMonth * activationTarget * retentionTarget * v.arpa;

      const incrementalGrossProfit = (improvedQualifiedMrr - baselineQualifiedMrr) * gm;
      const csmSavings = v.newCustomersPerMonth * activationTarget * v.csmHoursSaved * v.csmHourlyCost;
      const monthlyBenefit = incrementalGrossProfit + csmSavings;

      const monthlyNetImpact = monthlyBenefit - v.platformCostMonthly;
      const annualNetImpact = monthlyNetImpact * 12 - v.implementationCost;

      const totalInvestment = (v.platformCostMonthly * 12) + v.implementationCost;
      const roiPct = totalInvestment > 0 ? (annualNetImpact / totalInvestment) * 100 : 0;
      const paybackMonths = monthlyNetImpact > 0 ? (v.implementationCost / monthlyNetImpact) : Infinity;

      const activationDenom = v.newCustomersPerMonth * ((v.arpa * gm * retentionTarget) + (v.csmHoursSaved * v.csmHourlyCost));
      const activationNumer = v.platformCostMonthly + (v.newCustomersPerMonth * activationCurrent * retentionCurrent * v.arpa * gm);
      const breakEvenActivation = activationDenom > 0 ? activationNumer / activationDenom : Infinity;

      refs.baselineQualifiedMrr.textContent = money(baselineQualifiedMrr);
      refs.improvedQualifiedMrr.textContent = money(improvedQualifiedMrr);
      refs.incrementalGrossProfit.textContent = money(incrementalGrossProfit);
      refs.csmSavings.textContent = money(csmSavings);
      refs.monthlyNetImpact.textContent = money(monthlyNetImpact);
      refs.roiPct.textContent = `${num(roiPct, 2)}%`;
      refs.annualNetImpact.textContent = money(annualNetImpact);
      refs.paybackMonths.textContent = Number.isFinite(paybackMonths) ? `${num(paybackMonths, 2)}개월` : "N/A";
      refs.breakEvenActivation.textContent = Number.isFinite(breakEvenActivation) ? `${num(Math.max(0, breakEvenActivation * 100), 2)}%` : "N/A";
      refs.activationLiftPp.textContent = `${num((activationTarget - activationCurrent) * 100, 2)}%p`;

      refs.status.innerHTML = monthlyNetImpact > 0
        ? `<span class="ok">●</span> 월 순효과 ${money(monthlyNetImpact)} (TTV 개선 투자 타당)`
        : `<span class="warn">●</span> 월 순효과 ${money(monthlyNetImpact)} (가정 조정 필요)`;

      refs.summary.value = [
        "[Onboarding Time-to-Value ROI 요약]",
        `기준 Qualified MRR: ${money(baselineQualifiedMrr)}`,
        `개선 후 Qualified MRR: ${money(improvedQualifiedMrr)}`,
        `월 추가 매출총이익: ${money(incrementalGrossProfit)}`,
        `월 CSM 비용 절감: ${money(csmSavings)}`,
        `월 순효과: ${money(monthlyNetImpact)}`,
        `연간 순효과: ${money(annualNetImpact)}`,
        `ROI: ${num(roiPct, 2)}%`,
        `회수기간: ${Number.isFinite(paybackMonths) ? `${num(paybackMonths, 2)}개월` : "N/A"}`,
        `손익분기 필요 활성화율: ${Number.isFinite(breakEvenActivation) ? `${num(Math.max(0, breakEvenActivation * 100), 2)}%` : "N/A"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k,v]) => refs[k].value = v);
      render();
    });

    [refs.newCustomersPerMonth, refs.arpa, refs.grossMarginRate, refs.activationCurrent, refs.activationTarget, refs.retentionCurrent, refs.retentionTarget, refs.csmHoursSaved, refs.csmHourlyCost, refs.platformCostMonthly, refs.implementationCost].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
