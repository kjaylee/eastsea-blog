<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAPI 스키마 뷰어 | Swagger Viewer</title>
  <meta name="description" content="OpenAPI/Swagger JSON 또는 YAML을 붙여넣으면 엔드포인트를 시각화합니다. GET/POST/PUT/DELETE 색상 배지, 파라미터, 요청 본문, 응답 정보 확인. eastsea.kr 무료 개발자 도구.">
  <meta property="og:title" content="OpenAPI 스키마 뷰어 | Swagger Viewer">
  <meta property="og:description" content="OpenAPI/Swagger JSON·YAML → 엔드포인트 시각화. 메서드 배지, 파라미터, 응답 상세 확인.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eastsea.kr/tools/openapi-schema-viewer/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="OpenAPI 스키마 뷰어">
  <meta name="twitter:description" content="OpenAPI/Swagger 스키마를 시각적으로 탐색하세요.">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --border: #dee2e6;
      --shadow: rgba(0,0,0,0.08);
      --card-bg: #ffffff;
      --input-bg: #ffffff;
      --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --accent-color: #667eea;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --info: #17a2b8;
      --get: #28a745;
      --post: #007bff;
      --put: #ffc107;
      --delete: #dc3545;
      --patch: #17a2b8;
      --options: #6c757d;
      --head: #6c757d;
    }
    [data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text-primary: #f8f9fa;
      --text-secondary: #adb5bd;
      --border: #495057;
      --shadow: rgba(0,0,0,0.3);
      --card-bg: #2a2a2a;
      --input-bg: #1e1e1e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    header { text-align: center; margin-bottom: 28px; }
    h1 {
      background: var(--accent);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2rem;
      margin-bottom: 8px;
    }
    header p { color: var(--text-secondary); font-size: 0.95rem; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.88rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .back-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
    .theme-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.88rem;
      color: var(--text-primary);
      transition: background 0.2s;
    }
    .theme-btn:hover { background: var(--border); }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 8px var(--shadow);
      margin-bottom: 20px;
    }
    .input-area {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px; }
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      background: var(--input-bg);
      color: var(--text-primary);
      resize: vertical;
      transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: var(--accent-color); }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
    .btn-primary {
      background: var(--accent);
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-sm {
      padding: 5px 12px;
      font-size: 0.8rem;
      border-radius: 7px;
    }
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }
    .search-bar input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--text-primary);
      font-size: 0.9rem;
    }
    .search-bar input:focus { outline: none; border-color: var(--accent-color); }
    .api-info { margin-bottom: 18px; }
    .api-title { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); }
    .api-version { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }
    .api-description { font-size: 0.9rem; color: var(--text-secondary); margin-top: 6px; }
    .server-badge {
      display: inline-block;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.78rem;
      font-family: monospace;
      margin-right: 6px;
      margin-top: 6px;
    }
    .path-group { margin-bottom: 10px; }
    .path-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 8px;
      transition: box-shadow 0.2s;
    }
    .path-item:hover { box-shadow: 0 2px 10px var(--shadow); }
    .path-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      background: var(--card-bg);
      user-select: none;
      transition: background 0.2s;
    }
    .path-header:hover { background: var(--bg-secondary); }
    .method-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      min-width: 58px;
      text-align: center;
      color: white;
      flex-shrink: 0;
    }
    .method-GET { background: #28a745; }
    .method-POST { background: #007bff; }
    .method-PUT { background: #e07b00; color: #fff; }
    .method-PATCH { background: #17a2b8; }
    .method-DELETE { background: #dc3545; }
    .method-OPTIONS, .method-HEAD { background: #6c757d; }
    .path-url {
      font-family: monospace;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }
    .path-summary {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .chevron { font-size: 0.85rem; transition: transform 0.2s; flex-shrink: 0; }
    .chevron.open { transform: rotate(90deg); }
    .path-details {
      display: none;
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    .path-details.open { display: block; }
    .detail-section { margin-bottom: 14px; }
    .detail-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }
    .param-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .param-table th {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-weight: 600;
    }
    .param-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .param-in {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.73rem;
      font-weight: 600;
    }
    .param-required { color: #dc3545; font-size: 0.75rem; font-weight: 600; }
    .type-badge {
      background: #e8f4fd;
      color: #0066cc;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.73rem;
      font-family: monospace;
    }
    [data-theme="dark"] .type-badge { background: #1a3a5c; color: #7eb8f7; }
    .response-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 6px;
      font-size: 0.83rem;
    }
    .status-code {
      padding: 2px 8px;
      border-radius: 5px;
      font-family: monospace;
      font-weight: 700;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .status-2xx { background: #d4edda; color: #155724; }
    .status-3xx { background: #d1ecf1; color: #0c5460; }
    .status-4xx { background: #fff3cd; color: #856404; }
    .status-5xx { background: #f8d7da; color: #721c24; }
    [data-theme="dark"] .status-2xx { background: #1a4d2e; color: #6fcf97; }
    [data-theme="dark"] .status-3xx { background: #0c3b42; color: #56ccf2; }
    [data-theme="dark"] .status-4xx { background: #4d3900; color: #f2c94c; }
    [data-theme="dark"] .status-5xx { background: #4d1a1a; color: #eb5757; }
    .json-block {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 0.78rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 220px;
      overflow-y: auto;
    }
    .copy-btn-wrap { display: flex; justify-content: flex-end; margin-top: 8px; }
    .stats-bar {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .stat-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.85rem;
    }
    .stat-num { font-size: 1.3rem; font-weight: 700; }
    .stat-label { color: var(--text-secondary); font-size: 0.75rem; }
    .tag-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .tag-chip {
      padding: 4px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .tag-chip.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-color: transparent;
    }
    .tag-chip:hover:not(.active) { background: var(--border); }
    .error-msg {
      background: #f8d7da;
      color: #721c24;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      display: none;
    }
    [data-theme="dark"] .error-msg { background: #4d1a1a; color: #f5b3b3; }
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .sample-btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #333;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      .path-url { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="/tools/" class="back-btn">← 도구 목록</a>
      <button class="theme-btn" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>
    <header>
      <h1>📄 OpenAPI 스키마 뷰어</h1>
      <p>OpenAPI/Swagger JSON 또는 YAML을 붙여넣어 엔드포인트를 시각화하세요</p>
    </header>

    <div class="card">
      <div class="input-area">
        <div>
          <label>OpenAPI JSON / YAML 붙여넣기</label>
          <textarea id="schemaInput" placeholder='{"openapi":"3.0.0","info":{"title":"My API","version":"1.0.0"},"paths":{"/users":{"get":{"summary":"사용자 목록","responses":{"200":{"description":"성공"}}}}}}' spellcheck="false"></textarea>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="parseSchema()">🔍 스키마 파싱</button>
          <button class="btn btn-secondary" onclick="loadSample()">📋 샘플 불러오기</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ 초기화</button>
        </div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div id="resultSection" style="display:none;">
      <div class="card">
        <div class="api-info" id="apiInfo"></div>
        <div class="stats-bar" id="statsBar"></div>
        <div class="tag-filter" id="tagFilter"></div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="엔드포인트 검색... (예: /users, GET)" oninput="filterEndpoints()">
          <button class="btn btn-secondary btn-sm" onclick="expandAll()">모두 펼치기</button>
          <button class="btn btn-secondary btn-sm" onclick="collapseAll()">모두 접기</button>
        </div>
        <div id="endpointList"></div>
      </div>
    </div>

    <div id="emptyState" class="card">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>OpenAPI/Swagger 스키마를 붙여넣고 파싱하세요</p>
        <p style="font-size:0.82rem;margin-top:8px;">JSON 또는 YAML 형식 모두 지원합니다</p>
        <div class="sample-btn-row">
          <button class="btn btn-secondary btn-sm" onclick="loadSample()">📋 샘플 Pet Store 스키마 불러오기</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let parsedSchema = null;
    let allTags = [];
    let activeTag = null;

    function toggleTheme() {
      const el = document.documentElement;
      const isDark = el.getAttribute('data-theme') === 'dark';
      el.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.theme-btn').textContent = isDark ? '🌙 다크 모드' : '☀️ 라이트 모드';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.addEventListener('DOMContentLoaded', () => {
          const btn = document.querySelector('.theme-btn');
          if (btn) btn.textContent = '☀️ 라이트 모드';
        });
      }
    })();

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    // Minimal YAML-to-JSON fallback (handles basic key:value, lists, quoted strings)
    function parseYAMLFallback(yaml) {
      // Only for simple cases; complex YAML → use JSON
      const lines = yaml.split('\n');
      function processLines(lines, baseIndent) {
        const result = {};
        let i = 0;
        while (i < lines.length) {
          const line = lines[i];
          if (!line.trim() || line.trim().startsWith('#')) { i++; continue; }
          const indent = line.search(/\S/);
          if (indent < baseIndent) break;
          const colonIdx = line.indexOf(':');
          if (colonIdx === -1) { i++; continue; }
          const key = line.substring(indent, colonIdx).trim();
          const rest = line.substring(colonIdx + 1).trim();
          if (rest === '' || rest === '|' || rest === '>') {
            // Object or array follows
            const childLines = [];
            i++;
            while (i < lines.length) {
              const nextLine = lines[i];
              if (!nextLine.trim()) { childLines.push(''); i++; continue; }
              const nextIndent = nextLine.search(/\S/);
              if (nextIndent <= indent) break;
              childLines.push(nextLine.substring(indent + 2));
              i++;
            }
            if (childLines.length && childLines[0].trim().startsWith('-')) {
              result[key] = childLines.filter(l => l.trim().startsWith('-')).map(l => {
                const v = l.trim().substring(1).trim();
                if (v === 'true') return true;
                if (v === 'false') return false;
                if (!isNaN(v) && v !== '') return Number(v);
                return v.replace(/^['"]|['"]$/g, '');
              });
            } else {
              result[key] = processLines(childLines, 0);
            }
          } else {
            let val = rest.replace(/^['"]|['"]$/g, '');
            if (val === 'true') val = true;
            else if (val === 'false') val = false;
            else if (!isNaN(val) && val !== '') val = Number(val);
            result[key] = val;
            i++;
          }
        }
        return result;
      }
      return processLines(lines, 0);
    }

    function parseSchema() {
      hideError();
      const raw = document.getElementById('schemaInput').value.trim();
      if (!raw) { showError('스키마를 입력해주세요.'); return; }

      let schema;
      try {
        schema = JSON.parse(raw);
      } catch(e) {
        // Try YAML
        try {
          schema = parseYAMLFallback(raw);
          if (!schema || typeof schema !== 'object' || !schema.paths) {
            showError('JSON 파싱 실패: ' + e.message + '\n(YAML 파싱도 실패했습니다. JSON 형식을 권장합니다.)');
            return;
          }
        } catch(e2) {
          showError('파싱 오류: ' + e.message);
          return;
        }
      }

      if (!schema.paths && !schema.openapi && !schema.swagger) {
        showError('유효한 OpenAPI/Swagger 스키마가 아닙니다. paths 필드를 확인해주세요.');
        return;
      }

      parsedSchema = schema;
      renderSchema(schema);
    }

    function renderSchema(schema) {
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('resultSection').style.display = 'block';

      // API Info
      const info = schema.info || {};
      const version = schema.openapi || schema.swagger || '?';
      let infoHtml = `<div class="api-title">${info.title || '(제목 없음)'}</div>`;
      infoHtml += `<div class="api-version">OpenAPI ${version}${info.version ? ' | v' + info.version : ''}</div>`;
      if (info.description) infoHtml += `<div class="api-description">${info.description}</div>`;
      const servers = schema.servers || (schema.host ? [{ url: schema.host }] : []);
      if (servers.length) {
        infoHtml += '<div style="margin-top:8px;">';
        servers.forEach(s => { infoHtml += `<span class="server-badge">${s.url}</span>`; });
        infoHtml += '</div>';
      }
      document.getElementById('apiInfo').innerHTML = infoHtml;

      // Count endpoints
      const paths = schema.paths || {};
      const endpoints = [];
      const methods = ['get','post','put','patch','delete','options','head'];
      const tagSet = new Set(['전체']);

      for (const [path, ops] of Object.entries(paths)) {
        for (const method of methods) {
          if (ops[method]) {
            const op = ops[method];
            const tags = op.tags || ['default'];
            tags.forEach(t => tagSet.add(t));
            endpoints.push({ path, method: method.toUpperCase(), op, tags });
          }
        }
      }

      allTags = [...tagSet];
      activeTag = '전체';

      // Stats
      const methodCounts = {};
      endpoints.forEach(e => { methodCounts[e.method] = (methodCounts[e.method] || 0) + 1; });
      let statsHtml = `<div class="stat-item"><div class="stat-num">${endpoints.length}</div><div class="stat-label">전체 엔드포인트</div></div>`;
      for (const [m, c] of Object.entries(methodCounts)) {
        statsHtml += `<div class="stat-item"><div class="stat-num"><span class="method-badge method-${m}" style="font-size:0.7rem;padding:2px 7px;">${m}</span> ${c}</div></div>`;
      }
      document.getElementById('statsBar').innerHTML = statsHtml;

      // Tag filter
      let tagHtml = '';
      allTags.forEach(t => {
        tagHtml += `<span class="tag-chip ${t === '전체' ? 'active' : ''}" onclick="filterByTag('${t}')" data-tag="${t}">${t}</span>`;
      });
      document.getElementById('tagFilter').innerHTML = tagHtml;

      renderEndpoints(endpoints);
    }

    function renderEndpoints(endpoints) {
      const container = document.getElementById('endpointList');
      if (!endpoints.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없습니다</p></div>';
        return;
      }
      let html = '';
      endpoints.forEach((e, idx) => {
        const opId = `op_${idx}`;
        const summary = e.op.summary || e.op.description || '';
        html += `
          <div class="path-item" data-path="${e.path}" data-method="${e.method}" data-tags="${e.tags.join(',')}">
            <div class="path-header" onclick="toggleEndpoint('${opId}')">
              <span class="method-badge method-${e.method}">${e.method}</span>
              <span class="path-url">${e.path}</span>
              <span class="path-summary">${summary}</span>
              <span class="chevron" id="chev_${opId}">▶</span>
            </div>
            <div class="path-details" id="${opId}">
              ${renderDetails(e.op)}
              <div class="copy-btn-wrap">
                <button class="btn btn-secondary btn-sm" onclick="copyEndpointInfo(${idx})">📋 복사</button>
              </div>
            </div>
          </div>`;
      });
      container.innerHTML = html;
    }

    function renderDetails(op) {
      let html = '';
      if (op.description) {
        html += `<div class="detail-section"><div class="detail-title">설명</div><div style="font-size:0.85rem;">${op.description}</div></div>`;
      }
      if (op.operationId) {
        html += `<div class="detail-section"><div class="detail-title">Operation ID</div><code style="font-size:0.82rem;">${op.operationId}</code></div>`;
      }
      // Parameters
      const params = op.parameters || [];
      if (params.length) {
        html += `<div class="detail-section"><div class="detail-title">파라미터 (${params.length})</div>
          <table class="param-table">
            <thead><tr><th>이름</th><th>위치</th><th>타입</th><th>필수</th><th>설명</th></tr></thead><tbody>`;
        params.forEach(p => {
          const schema = p.schema || {};
          const type = schema.type || p.type || '-';
          html += `<tr>
            <td><code>${p.name}</code></td>
            <td><span class="param-in">${p.in}</span></td>
            <td><span class="type-badge">${type}${schema.format ? '/' + schema.format : ''}</span></td>
            <td>${p.required ? '<span class="param-required">필수</span>' : '선택'}</td>
            <td style="color:var(--text-secondary);font-size:0.8rem;">${p.description || ''}</td>
          </tr>`;
        });
        html += '</tbody></table></div>';
      }
      // Request Body
      const reqBody = op.requestBody;
      if (reqBody) {
        const content = reqBody.content || {};
        const first = Object.keys(content)[0];
        const schema = first && content[first].schema ? content[first].schema : null;
        html += `<div class="detail-section"><div class="detail-title">요청 본문 ${reqBody.required ? '<span class="param-required">필수</span>' : ''}</div>`;
        if (first) html += `<div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:6px;">Content-Type: <code>${first}</code></div>`;
        if (schema) html += `<div class="json-block">${JSON.stringify(schema, null, 2)}</div>`;
        html += '</div>';
      }
      // Responses
      const responses = op.responses || {};
      if (Object.keys(responses).length) {
        html += `<div class="detail-section"><div class="detail-title">응답</div>`;
        for (const [code, resp] of Object.entries(responses)) {
          const cls = code.startsWith('2') ? 'status-2xx' : code.startsWith('3') ? 'status-3xx' : code.startsWith('4') ? 'status-4xx' : code.startsWith('5') ? 'status-5xx' : '';
          html += `<div class="response-item">
            <span class="status-code ${cls}">${code}</span>
            <span style="font-size:0.83rem;">${resp.description || ''}</span>
          </div>`;
        }
        html += '</div>';
      }
      return html;
    }

    function toggleEndpoint(id) {
      const el = document.getElementById(id);
      const chev = document.getElementById('chev_' + id);
      const isOpen = el.classList.contains('open');
      el.classList.toggle('open');
      chev.classList.toggle('open');
    }

    function expandAll() {
      document.querySelectorAll('.path-details').forEach(el => el.classList.add('open'));
      document.querySelectorAll('.chevron').forEach(el => el.classList.add('open'));
    }

    function collapseAll() {
      document.querySelectorAll('.path-details').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.chevron').forEach(el => el.classList.remove('open'));
    }

    function filterByTag(tag) {
      activeTag = tag;
      document.querySelectorAll('.tag-chip').forEach(el => {
        el.classList.toggle('active', el.dataset.tag === tag);
      });
      filterEndpoints();
    }

    function filterEndpoints() {
      const q = (document.getElementById('searchInput').value || '').toLowerCase();
      document.querySelectorAll('.path-item').forEach(el => {
        const path = el.dataset.path.toLowerCase();
        const method = el.dataset.method.toLowerCase();
        const tags = el.dataset.tags.toLowerCase();
        const matchTag = activeTag === '전체' || tags.includes(activeTag.toLowerCase());
        const matchSearch = !q || path.includes(q) || method.includes(q);
        el.style.display = matchTag && matchSearch ? '' : 'none';
      });
    }

    function copyEndpointInfo(idx) {
      if (!parsedSchema) return;
      const paths = parsedSchema.paths || {};
      const endpoints = [];
      const methods = ['get','post','put','patch','delete','options','head'];
      for (const [path, ops] of Object.entries(paths)) {
        for (const method of methods) {
          if (ops[method]) endpoints.push({ path, method: method.toUpperCase(), op: ops[method] });
        }
      }
      const e = endpoints[idx];
      if (!e) return;
      const text = `${e.method} ${e.path}\n${e.op.summary || ''}\n${JSON.stringify(e.op, null, 2)}`;
      navigator.clipboard.writeText(text).then(() => showToast('엔드포인트 정보가 복사되었습니다!'));
    }

    function clearAll() {
      document.getElementById('schemaInput').value = '';
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      hideError();
      parsedSchema = null;
    }
