<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페이지 속도 추정기 | Page Speed Estimator</title>
  <meta name="description" content="URL 또는 붙여넣은 HTML을 분석해 리소스 수, 전송량, 렌더블로킹, FCP 추정 점수를 계산하는 페이지 속도 추정 도구" />
  <style>
    :root{--bg:#070d18;--bg2:#0d1529;--card:#101a33;--line:#2a3f67;--txt:#edf4ff;--muted:#a8b8db;--accent:#76adff;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444}
    *{box-sizing:border-box}
    body{margin:0;padding:18px;color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      min-height:100vh;background:radial-gradient(1000px 700px at 20% -15%,#233861 0,transparent 56%),linear-gradient(145deg,var(--bg),var(--bg2))}
    .wrap{max-width:1260px;margin:0 auto}.back{color:var(--muted);text-decoration:none;font-size:.9rem}
    h1{margin:.45rem 0 .25rem;font-size:clamp(1.35rem,2.6vw,2rem)}.sub{margin:0 0 1rem;color:var(--muted)}
    .grid{display:grid;grid-template-columns:430px 1fr;gap:14px}
    .card{background:rgba(16,26,51,.88);border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 40px rgba(0,0,0,.35)}
    .inner{padding:14px}.title{font-size:.93rem;font-weight:800;margin:0 0 .6rem}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:9px}label{font-size:.8rem;color:var(--muted);font-weight:700}
    input,textarea,button{font:inherit;color:var(--txt);background:#0d1730;border:1px solid var(--line);border-radius:10px;padding:10px 11px}
    textarea{min-height:96px;resize:vertical}input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(118,173,255,.2)}
    button{cursor:pointer;font-weight:700}.primary{background:linear-gradient(135deg,#2f67ff,#5da9ff);border-color:transparent}
    .row{display:flex;gap:8px;flex-wrap:wrap}.status{font-size:.8rem;color:var(--muted);min-height:1.2em}
    .results{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .metric{border:1px solid var(--line);border-radius:12px;padding:10px;background:#0c1730;margin-bottom:8px}
    .m-title{font-size:.76rem;color:var(--muted)}.m-value{font-size:1.15rem;font-weight:800;margin-top:2px}
    .bar{height:9px;background:#1a2a4a;border-radius:999px;overflow:hidden;margin-top:6px}
    .bar>i{display:block;height:100%;background:linear-gradient(90deg,#4f8cff,#74b7ff)}
    .mini{font-size:.78rem;color:var(--muted)}
    table{width:100%;border-collapse:collapse;margin-top:10px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
    th,td{padding:9px 8px;border-bottom:1px solid var(--line);font-size:.8rem;text-align:left}th{background:#132241;color:#cfe1ff}
    .good{color:var(--ok)}.mid{color:var(--warn)}.bad{color:var(--bad)}
    @media (max-width:1060px){.grid{grid-template-columns:1fr}.results{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/tools/">← 도구 목록으로</a>
  <h1>⚡ 페이지 속도 추정기</h1>
  <p class="sub">URL/HTML 분석으로 리소스 무게와 렌더블로킹을 빠르게 추정</p>

  <div class="grid">
    <section class="card"><div class="inner">
      <h2 class="title">분석 입력</h2>
      <div class="field"><label for="urlA">URL A</label><input id="urlA" value="https://tools.eastsea.xyz" /></div>
      <div class="field"><label for="htmlA">HTML 소스 A (CORS fallback)</label><textarea id="htmlA" placeholder="직접 HTML 붙여넣기"></textarea></div>

      <div class="field"><label for="urlB">URL B (비교용)</label><input id="urlB" value="https://games.eastsea.xyz" /></div>
      <div class="field"><label for="htmlB">HTML 소스 B (선택)</label><textarea id="htmlB" placeholder="선택 사항"></textarea></div>

      <div class="row">
        <button class="primary" id="analyzeA">A만 분석</button>
        <button class="primary" id="analyzeBoth">A/B 비교 분석</button>
      </div>
      <p class="status" id="status"></p>
    </div></section>

    <section class="card"><div class="inner">
      <div class="results" id="results"></div>
      <div id="compareWrap"></div>
    </div></section>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  function setStatus(msg){ $('status').textContent = msg; }
  function esc(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function norm(raw){
    let u = (raw || '').trim(); if(!u) return '';
    if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
    try { return new URL(u).toString(); } catch { return ''; }
  }

  async function fetchHtml(url){
    const methods = [
      async () => {
        const r = await fetch(url); if(!r.ok) throw new Error('HTTP '+r.status); return { text: await r.text(), source:'direct' };
      },
      async () => {
        const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
        const r = await fetch(proxy); if(!r.ok) throw new Error('allorigins '+r.status); return { text: await r.text(), source:'allorigins' };
      },
      async () => {
        const proxy = 'https://r.jina.ai/https://' + url.replace(/^https?:\/\//,'');
        const r = await fetch(proxy); if(!r.ok) throw new Error('jina '+r.status); return { text: await r.text(), source:'jina' };
      }
    ];
    let last;
    for(const fn of methods){
      try {
        const res = await fn();
        if(res.text?.length > 40) return res;
      } catch (e){ last = e; }
    }
    throw last || new Error('fetch failed');
  }

  function parseResourceModel(html, baseUrl){
    const looksLikeHtml = /<html|<head|<body|<script|<link|<img/i.test(html);
    const model = {
      htmlBytes: html.length,
      scripts: 0,
      styles: 0,
      images: 0,
      fonts: 0,
      fetchHints: 0,
      inlineScriptBytes: 0,
      inlineStyleBytes: 0,
      blockingScripts: 0,
      blockingStyles: 0,
      requests: 0
    };

    if(looksLikeHtml){
      const doc = new DOMParser().parseFromString(html, 'text/html');

      const scripts = [...doc.querySelectorAll('script')];
      const links = [...doc.querySelectorAll('link')];
      const imgs = [...doc.querySelectorAll('img')];

      model.scripts = scripts.filter(s => s.src).length;
      model.inlineScriptBytes = scripts.filter(s => !s.src).reduce((a,s)=>a+(s.textContent||'').length,0);
      model.styles = links.filter(l => (l.rel||'').toLowerCase().includes('stylesheet')).length;
      model.inlineStyleBytes = [...doc.querySelectorAll('style')].reduce((a,s)=>a+(s.textContent||'').length,0);
      model.images = imgs.length;
      model.fonts = links.filter(l => /(font|woff|ttf|otf)/i.test(l.href||'') || (l.as||'').toLowerCase()==='font').length;
      model.fetchHints = links.filter(l => ['preload','prefetch','preconnect'].includes((l.rel||'').toLowerCase())).length;

      const head = doc.querySelector('head');
      const headScripts = head ? [...head.querySelectorAll('script')] : [];
      model.blockingScripts = headScripts.filter(s => s.src && !s.defer && !s.async && (s.type||'').toLowerCase() !== 'module').length;
      model.blockingStyles = model.styles;
    } else {
      const count = (re) => (html.match(re) || []).length;
      model.scripts = count(/\.js(\?|\b)/gi);
      model.styles = count(/\.css(\?|\b)/gi);
      model.images = count(/\.(png|jpg|jpeg|gif|webp|svg)(\?|\b)/gi);
      model.fonts = count(/\.(woff2?|ttf|otf)(\?|\b)/gi);
      model.fetchHints = count(/(preload|prefetch|preconnect)/gi);
      model.blockingScripts = Math.round(model.scripts * .5);
      model.blockingStyles = model.styles;
      model.inlineScriptBytes = Math.round(model.htmlBytes * .12);
      model.inlineStyleBytes = Math.round(model.htmlBytes * .05);
    }

    model.requests = model.scripts + model.styles + model.images + model.fonts;
    return model;
  }

  function estimateScores(m){
    const kb = (m.htmlBytes + m.inlineScriptBytes + m.inlineStyleBytes) / 1024
      + m.scripts * 48
      + m.styles * 30
      + m.images * 170
      + m.fonts * 80;

    const blocking = m.blockingScripts + m.blockingStyles;
    const fcp = Math.max(0.8, 0.9 + blocking * 0.22 + m.requests * 0.025 + kb * 0.0017);

    const weightScore = Math.max(0, Math.min(100, 100 - kb * 0.085));
    const blockPenalty = Math.min(45, blocking * 4.2);
    const fcpScore = Math.max(0, Math.min(100, 100 - (fcp - 1) * 22 - blockPenalty));

    const textHeavyKB = (m.htmlBytes + m.inlineScriptBytes + m.inlineStyleBytes) / 1024;
    const compressionChance = Math.max(0, Math.min(100, 35 + textHeavyKB * 0.25 + m.scripts * 1.4 + m.styles * 1.1));

    return {
      totalKB: Math.round(kb),
      blocking,
      fcp: Number(fcp.toFixed(2)),
      weightScore: Math.round(weightScore),
      fcpScore: Math.round(fcpScore),
      compressionChance: Math.round(compressionChance)
    };
  }

  function scoreClass(v){ return v >= 80 ? 'good' : v >= 55 ? 'mid' : 'bad'; }

  function renderResult(name, url, model, score, source){
    return `
      <div class="metric">
        <div class="m-title">${esc(name)} · ${esc(url || '-')}</div>
        <div class="mini">source: ${esc(source || 'manual')}</div>
        <div class="m-value">FCP 추정 ${score.fcp}s</div>
        <div class="mini">요청 ${model.requests}개 / 추정 전송량 ${score.totalKB}KB / 렌더블로킹 ${score.blocking}개</div>
      </div>
      <div class="metric">
        <div class="m-title">리소스 구성</div>
        <div class="mini">script ${model.scripts}, style ${model.styles}, image ${model.images}, font ${model.fonts}</div>
      </div>
      ${renderScoreBar('FCP Score', score.fcpScore)}
      ${renderScoreBar('Resource Weight Score', score.weightScore)}
      ${renderScoreBar('Compression Opportunity', score.compressionChance)}
    `;
  }

  function renderScoreBar(label, value){
    return `
      <div class="metric">
        <div class="m-title">${esc(label)} <span class="${scoreClass(value)}">${value}</span></div>
        <div class="bar"><i style="width:${value}%"></i></div>
      </div>
    `;
  }

  function renderComparison(a, b){
    if(!a || !b) return '';
    const deltaFcp = (b.score.fcp - a.score.fcp).toFixed(2);
    const deltaWeight = b.score.totalKB - a.score.totalKB;
    const deltaReq = b.model.requests - a.model.requests;

    return `
      <table>
        <thead><tr><th>비교 항목</th><th>A</th><th>B</th><th>차이(B-A)</th></tr></thead>
        <tbody>
          <tr><td>FCP 추정</td><td>${a.score.fcp}s</td><td>${b.score.fcp}s</td><td class="${deltaFcp<=0?'good':'bad'}">${deltaFcp}s</td></tr>
          <tr><td>추정 전송량</td><td>${a.score.totalKB}KB</td><td>${b.score.totalKB}KB</td><td class="${deltaWeight<=0?'good':'bad'}">${deltaWeight}KB</td></tr>
          <tr><td>요청 수</td><td>${a.model.requests}</td><td>${b.model.requests}</td><td class="${deltaReq<=0?'good':'bad'}">${deltaReq}</td></tr>
          <tr><td>렌더블로킹</td><td>${a.score.blocking}</td><td>${b.score.blocking}</td><td class="${(b.score.blocking-a.score.blocking)<=0?'good':'bad'}">${b.score.blocking-a.score.blocking}</td></tr>
          <tr><td>Compression Opportunity</td><td>${a.score.compressionChance}</td><td>${b.score.compressionChance}</td><td>${b.score.compressionChance-a.score.compressionChance}</td></tr>
        </tbody>
      </table>
    `;
  }

  async function analyzeOne(name, urlInputId, htmlInputId){
    const url = norm($(urlInputId).value);
    const manualHtml = $(htmlInputId).value.trim();

    let html = manualHtml;
    let source = manualHtml ? 'pasted-html' : '';

    if(!html){
      if(!url) throw new Error(`${name}: 유효한 URL이 필요합니다.`);
      const fetched = await fetchHtml(url);
      html = fetched.text;
      source = fetched.source;
    }

    const model = parseResourceModel(html, url);
    const score = estimateScores(model);
    return { name, url, model, score, source };
  }

  async function run(needB){
    try {
      setStatus('분석 시작...');
      const a = await analyzeOne('A', 'urlA', 'htmlA');
      let b = null;
      if(needB){
        setStatus('B 분석 중...');
        b = await analyzeOne('B', 'urlB', 'htmlB');
      }

      const cards = [
        `<div class="card"><div class="inner">${renderResult('A', a.url, a.model, a.score, a.source)}</div></div>`
      ];
      if(b) cards.push(`<div class="card"><div class="inner">${renderResult('B', b.url, b.model, b.score, b.source)}</div></div>`);

      $('results').innerHTML = cards.join('');
      $('compareWrap').innerHTML = renderComparison(a, b);
      setStatus('완료 ✓');
    } catch(err){
      setStatus('실패: ' + err.message);
      alert(err.message);
    }
  }

  $('analyzeA').addEventListener('click', () => run(false));
  $('analyzeBoth').addEventListener('click', () => run(true));
})();
</script>
</body>
</html>
