<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Channel Commission Split Calculator | 파트너 채널 수수료 분배 계산기</title>
  <meta name="description" content="매출, 환불률, 파트너 커미션, 플랫폼·결제 수수료, 원가를 반영해 채널 공헌이익과 손익분기 매출을 계산합니다." />
  <style>
    :root{--bg:#081425;--card:#122340;--line:#2f4a6a;--txt:#ecf4ff;--muted:#9fb6d9;--pri:#22d3ee;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#1f5078 0,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 60px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.15rem,2.8vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.5}
    .home{text-decoration:none;color:#cffafe;background:#123351;border:1px solid var(--line);border-radius:11px;padding:8px 12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.06fr .94fr;gap:12px}
    .card{background:linear-gradient(165deg,#173054,var(--card));border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#22d3ee,#0891b2)}
    .soft{background:#164264;border:1px solid var(--line)}
    textarea{resize:vertical;min-height:96px;margin-top:10px}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7a363d;background:rgba(248,113,113,.13);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#11203a;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#154163;color:#d5f1ff;font-size:.78rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🤝 파트너 채널 수수료 분배 계산기</h1>
        <div class="sub">환불/커미션/플랫폼/결제/원가를 분리해 채널별 실질 공헌이익과 손익분기 매출을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="grossSales">총 거래매출 (KRW)</label><input id="grossSales" type="number" min="1" step="1000" value="180000000" /></div>
          <div><label for="orders">주문 수</label><input id="orders" type="number" min="1" step="1" value="2400" /></div>

          <div><label for="refundRate">환불률 (%)</label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="6.5" /></div>
          <div><label for="partnerRate">파트너 커미션율 (%)</label><input id="partnerRate" type="number" min="0" max="100" step="0.1" value="20" /></div>
          <div><label for="platformRate">플랫폼 수수료율 (%)</label><input id="platformRate" type="number" min="0" max="100" step="0.1" value="8" /></div>
          <div><label for="paymentRate">결제 수수료율 (%)</label><input id="paymentRate" type="number" min="0" max="100" step="0.1" value="2.9" /></div>
          <div><label for="cogsRate">매출원가율 (%)</label><input id="cogsRate" type="number" min="0" max="100" step="0.1" value="24" /></div>

          <div><label for="opsCost">월 운영 고정비 (KRW)</label><input id="opsCost" type="number" min="0" step="1000" value="18000000" /></div>
          <div><label for="channelMarketingCost">채널 마케팅비 (KRW)</label><input id="channelMarketingCost" type="number" min="0" step="1000" value="12000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">실수취 매출(환불 차감)</div><div id="collectibleRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">채널 공헌이익</div><div id="contribution" class="v">-</div></div>
          <div class="kpi"><div class="k">유효 테이크레이트</div><div id="effectiveTakeRate" class="v">-</div></div>
          <div class="kpi"><div class="k">주문당 순이익</div><div id="netPerOrder" class="v">-</div></div>
          <div class="kpi"><div class="k">손익분기 총매출</div><div id="breakEvenSales" class="v">-</div></div>
          <div class="kpi"><div class="k">허용 최대 파트너 커미션율</div><div id="maxPartnerRate" class="v">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">비용 분해</h2>
        <table>
          <tbody>
            <tr><th>환불 금액</th><td id="refundAmount">-</td></tr>
            <tr><th>파트너 정산</th><td id="partnerPayout">-</td></tr>
            <tr><th>플랫폼 수수료</th><td id="platformFee">-</td></tr>
            <tr><th>결제 수수료</th><td id="paymentFee">-</td></tr>
            <tr><th>매출원가</th><td id="cogs">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      grossSales: $('grossSales'), orders: $('orders'), refundRate: $('refundRate'), partnerRate: $('partnerRate'), platformRate: $('platformRate'),
      paymentRate: $('paymentRate'), cogsRate: $('cogsRate'), opsCost: $('opsCost'), channelMarketingCost: $('channelMarketingCost'),
      collectibleRevenue: $('collectibleRevenue'), contribution: $('contribution'), effectiveTakeRate: $('effectiveTakeRate'), netPerOrder: $('netPerOrder'),
      breakEvenSales: $('breakEvenSales'), maxPartnerRate: $('maxPartnerRate'), refundAmount: $('refundAmount'), partnerPayout: $('partnerPayout'),
      platformFee: $('platformFee'), paymentFee: $('paymentFee'), cogs: $('cogs'), status: $('status'), error: $('error'), summary: $('summary'),
      copy: $('copy'), reset: $('reset')
    };

    const defaults = {
      grossSales: 180000000, orders: 2400, refundRate: 6.5, partnerRate: 20, platformRate: 8, paymentRate: 2.9, cogsRate: 24,
      opsCost: 18000000, channelMarketingCost: 12000000
    };

    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const nfmt = (n, d = 1) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });
    const inRange = (n, min, max) => Number.isFinite(n) && n >= min && n <= max;

    function validate(v) {
      if (!inRange(v.grossSales, 1, 100_000_000_000)) return '총 거래매출은 1원 이상이어야 합니다.';
      if (!Number.isInteger(v.orders) || !inRange(v.orders, 1, 1_000_000_000)) return '주문 수는 1 이상의 정수여야 합니다.';

      const rates = [v.refundRate, v.partnerRate, v.platformRate, v.paymentRate, v.cogsRate];
      if (!rates.every((r) => inRange(r, 0, 100))) return '모든 비율 값은 0~100% 범위여야 합니다.';
      if (!inRange(v.opsCost, 0, 10_000_000_000)) return '월 운영 고정비는 0 이상이어야 합니다.';
      if (!inRange(v.channelMarketingCost, 0, 10_000_000_000)) return '채널 마케팅비는 0 이상이어야 합니다.';

      if (v.refundRate >= 100) return '환불률이 100%이면 실수취 매출이 0이 됩니다. 값을 조정하세요.';
      return '';
    }

    function compute(v) {
      const refundRate = v.refundRate / 100;
      const partnerRate = v.partnerRate / 100;
      const platformRate = v.platformRate / 100;
      const paymentRate = v.paymentRate / 100;
      const cogsRate = v.cogsRate / 100;

      const refundAmount = v.grossSales * refundRate;
      const collectibleRevenue = v.grossSales - refundAmount;

      const partnerPayout = collectibleRevenue * partnerRate;
      const platformFee = collectibleRevenue * platformRate;
      const paymentFee = collectibleRevenue * paymentRate;
      const cogs = collectibleRevenue * cogsRate;

      const fixedCosts = v.opsCost + v.channelMarketingCost;
      const contribution = collectibleRevenue - partnerPayout - platformFee - paymentFee - cogs - fixedCosts;
      const effectiveTakeRate = (contribution / v.grossSales) * 100;
      const netPerOrder = contribution / v.orders;

      const postRefundFactor = 1 - refundRate;
      const variableDeductionRate = partnerRate + platformRate + paymentRate + cogsRate;
      const contributionPerGross = postRefundFactor * (1 - variableDeductionRate);

      const breakEvenSales = contributionPerGross > 0 ? (fixedCosts / contributionPerGross) : null;

      const maxPartnerRate = collectibleRevenue > 0
        ? 1 - (v.opsCost + v.channelMarketingCost) / collectibleRevenue - platformRate - paymentRate - cogsRate
        : null;

      return {
        refundAmount, collectibleRevenue, partnerPayout, platformFee, paymentFee, cogs,
        contribution, effectiveTakeRate, netPerOrder, breakEvenSales, maxPartnerRate
      };
    }

    function clearOutputs() {
      ['collectibleRevenue', 'contribution', 'effectiveTakeRate', 'netPerOrder', 'breakEvenSales', 'maxPartnerRate', 'refundAmount', 'partnerPayout', 'platformFee', 'paymentFee', 'cogs'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function render() {
      const v = {
        grossSales: Number(refs.grossSales.value),
        orders: Number(refs.orders.value),
        refundRate: Number(refs.refundRate.value),
        partnerRate: Number(refs.partnerRate.value),
        platformRate: Number(refs.platformRate.value),
        paymentRate: Number(refs.paymentRate.value),
        cogsRate: Number(refs.cogsRate.value),
        opsCost: Number(refs.opsCost.value),
        channelMarketingCost: Number(refs.channelMarketingCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        clearOutputs();
        return;
      }

      const r = compute(v);

      refs.collectibleRevenue.textContent = won(r.collectibleRevenue);
      refs.contribution.textContent = won(r.contribution);
      refs.effectiveTakeRate.textContent = `${nfmt(r.effectiveTakeRate, 2)}%`;
      refs.netPerOrder.textContent = won(r.netPerOrder);
      refs.breakEvenSales.textContent = r.breakEvenSales === null ? '미도달(변동 공제율 과다)' : won(r.breakEvenSales);

      if (r.maxPartnerRate === null) {
        refs.maxPartnerRate.textContent = '-';
      } else {
        refs.maxPartnerRate.textContent = `${nfmt(r.maxPartnerRate * 100, 2)}%`;
      }

      refs.refundAmount.textContent = won(r.refundAmount);
      refs.partnerPayout.textContent = won(r.partnerPayout);
      refs.platformFee.textContent = won(r.platformFee);
      refs.paymentFee.textContent = won(r.paymentFee);
      refs.cogs.textContent = won(r.cogs);

      if (r.contribution > 0) refs.status.innerHTML = `<span class="good">●</span> 채널 운영 흑자 (${won(r.contribution)})`;
      else if (Math.abs(r.contribution) < 1) refs.status.innerHTML = `<span class="warn">●</span> 손익분기 근접`;
      else refs.status.innerHTML = `<span class="bad">●</span> 채널 운영 적자 (${won(r.contribution)})`;

      refs.summary.value = [
        '[Partner Channel Commission Split Calculator 요약]',
        `총 거래매출: ${won(v.grossSales)} / 주문수: ${nfmt(v.orders, 0)}건`,
        `환불률: ${nfmt(v.refundRate,2)}% / 파트너 커미션: ${nfmt(v.partnerRate,2)}%`,
        `실수취 매출: ${won(r.collectibleRevenue)}`,
        `채널 공헌이익: ${won(r.contribution)} (유효 테이크레이트 ${nfmt(r.effectiveTakeRate,2)}%)`,
        `주문당 순이익: ${won(r.netPerOrder)}`,
        `손익분기 총매출: ${r.breakEvenSales === null ? '미도달' : won(r.breakEvenSales)}`,
        `허용 최대 파트너 커미션율: ${r.maxPartnerRate === null ? '-' : `${nfmt(r.maxPartnerRate * 100,2)}%`}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, val]) => { refs[k].value = val; });
      render();
    });

    [
      refs.grossSales, refs.orders, refs.refundRate, refs.partnerRate, refs.platformRate,
      refs.paymentRate, refs.cogsRate, refs.opsCost, refs.channelMarketingCost
    ].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
