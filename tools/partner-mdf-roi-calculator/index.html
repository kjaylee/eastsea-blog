<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner MDF ROI Calculator | 파트너 MDF ROI 계산기</title>
  <meta name="description" content="파트너 MDF(마케팅 개발 펀드) 투자 대비 파이프라인, 매출, 총이익, ROI, 손익분기 승률을 계산합니다." />
  <style>
    :root{--bg:#0b1120;--card:#121a30;--line:#2a3b5a;--txt:#eef3ff;--muted:#a8b6cf;--pri:#6c8cff;--soft:#17243f;--ok:#34d399;--warn:#f59e0b;--err:#fecaca;--errBg:rgba(248,113,113,.16)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#243a61 0%,#0b1120 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px} .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)} .sub{margin-top:6px;color:var(--muted);font-size:.93rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f1b33;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px} .card{background:linear-gradient(165deg,#172844,#121a30);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem} .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px} input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c162b;color:var(--txt);font-size:.93rem}
    textarea{min-height:110px;resize:vertical;margin-top:10px} button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#8aa7ff);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)} .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem} .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px} .kpi{border:1px solid var(--line);background:#0e1a32;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px} .v{font-size:1.05rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#1a2c4c;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word} th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🤝 파트너 MDF ROI 계산기</h1>
        <div class="sub">MDF 투자로 기대되는 파이프라인·매출·ROI를 계산해 파트너 캠페인 우선순위를 정합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="mdfBudget">MDF 예산 (₩)</label><input id="mdfBudget" type="number" min="0" value="50000000" /></div>
          <div><label for="partnerCoinvest">파트너 Co-invest (₩)</label><input id="partnerCoinvest" type="number" min="0" value="20000000" /></div>
          <div><label for="internalOpsCost">내부 운영비 (₩)</label><input id="internalOpsCost" type="number" min="0" value="8000000" /></div>
          <div><label for="leads">리드 수</label><input id="leads" type="number" min="0" value="600" /></div>
          <div><label for="leadToOpp">리드→오퍼튜니티 전환율 (%)</label><input id="leadToOpp" type="number" min="0" max="100" step="0.1" value="25" /></div>
          <div><label for="winRate">승률 (%)</label><input id="winRate" type="number" min="0" max="100" step="0.1" value="22" /></div>
          <div><label for="avgDeal">평균 계약 금액(ACV, ₩)</label><input id="avgDeal" type="number" min="0" value="18000000" /></div>
          <div><label for="grossMargin">매출총이익률 (%)</label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="70" /></div>
          <div><label for="rebateRate">파트너 리베이트 (%)</label><input id="rebateRate" type="number" min="0" max="100" step="0.1" value="5" /></div>
          <div><label for="salesCycle">세일즈 사이클 (개월)</label><input id="salesCycle" type="number" min="0" value="4" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">예상 매출(ARR)</div><div id="revenue" class="v">-</div></div>
          <div class="kpi"><div class="k">총이익</div><div id="grossProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">순이익</div><div id="netProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roiPct" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 체결 건수</div><div id="deals" class="v">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>오퍼튜니티 수</th><td id="opps">-</td></tr>
            <tr><th>리베이트 비용</th><td id="rebateCost">-</td></tr>
            <tr><th>오너 비용(내부+MDF)</th><td id="ownerCost">-</td></tr>
            <tr><th>총 캠페인 지출</th><td id="campaignSpend">-</td></tr>
            <tr><th>손익분기 승률</th><td id="breakEvenWin">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      mdfBudget: $("mdfBudget"), partnerCoinvest: $("partnerCoinvest"), internalOpsCost: $("internalOpsCost"), leads: $("leads"), leadToOpp: $("leadToOpp"), winRate: $("winRate"),
      avgDeal: $("avgDeal"), grossMargin: $("grossMargin"), rebateRate: $("rebateRate"), salesCycle: $("salesCycle"),
      revenue: $("revenue"), grossProfit: $("grossProfit"), netProfit: $("netProfit"), roiPct: $("roiPct"), deals: $("deals"), payback: $("payback"),
      opps: $("opps"), rebateCost: $("rebateCost"), ownerCost: $("ownerCost"), campaignSpend: $("campaignSpend"), breakEvenWin: $("breakEvenWin"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = {
      mdfBudget: 50000000, partnerCoinvest: 20000000, internalOpsCost: 8000000, leads: 600, leadToOpp: 25, winRate: 22,
      avgDeal: 18000000, grossMargin: 70, rebateRate: 5, salesCycle: 4
    };

    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(Number.isFinite(n) ? n : 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v){
      if (!Number.isFinite(v.mdfBudget) || v.mdfBudget < 0) return "MDF 예산은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.partnerCoinvest) || v.partnerCoinvest < 0) return "Co-invest 금액은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.internalOpsCost) || v.internalOpsCost < 0) return "내부 운영비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.leads) || v.leads < 0) return "리드 수는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.leadToOpp) || v.leadToOpp < 0 || v.leadToOpp > 100) return "리드→오퍼튜니티 전환율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.winRate) || v.winRate < 0 || v.winRate > 100) return "승률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.avgDeal) || v.avgDeal < 0) return "평균 계약 금액은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.grossMargin) || v.grossMargin < 0 || v.grossMargin > 100) return "매출총이익률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.rebateRate) || v.rebateRate < 0 || v.rebateRate > 100) return "리베이트율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.salesCycle) || v.salesCycle < 0) return "세일즈 사이클은 0 이상이어야 합니다.";
      return "";
    }

    function render(){
      const v = {
        mdfBudget: Number(refs.mdfBudget.value), partnerCoinvest: Number(refs.partnerCoinvest.value), internalOpsCost: Number(refs.internalOpsCost.value),
        leads: Number(refs.leads.value), leadToOpp: Number(refs.leadToOpp.value), winRate: Number(refs.winRate.value),
        avgDeal: Number(refs.avgDeal.value), grossMargin: Number(refs.grossMargin.value), rebateRate: Number(refs.rebateRate.value), salesCycle: Number(refs.salesCycle.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err){
        ["revenue","grossProfit","netProfit","roiPct","deals","payback","opps","rebateCost","ownerCost","campaignSpend","breakEvenWin"].forEach((k)=>refs[k].textContent="-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const leadToOpp = v.leadToOpp / 100;
      const winRate = v.winRate / 100;
      const grossMargin = v.grossMargin / 100;
      const rebateRate = v.rebateRate / 100;

      const opps = v.leads * leadToOpp;
      const deals = opps * winRate;
      const revenue = deals * v.avgDeal;
      const grossProfit = revenue * grossMargin;
      const rebateCost = revenue * rebateRate;
      const ownerCost = v.mdfBudget + v.internalOpsCost;
      const netProfit = grossProfit - rebateCost - ownerCost;
      const roiPct = ownerCost > 0 ? (netProfit / ownerCost) * 100 : 0;
      const monthlyGross = grossProfit / 12;
      const payback = monthlyGross > 0 ? (v.salesCycle + (ownerCost / monthlyGross)) : Infinity;
      const campaignSpend = v.mdfBudget + v.partnerCoinvest;

      const perDealMargin = v.avgDeal * (grossMargin - rebateRate);
      const breakEvenWin = perDealMargin > 0 && v.leads > 0 && leadToOpp > 0 ? (ownerCost / (v.leads * leadToOpp * perDealMargin)) : Infinity;

      refs.revenue.textContent = money(revenue);
      refs.grossProfit.textContent = money(grossProfit);
      refs.netProfit.textContent = money(netProfit);
      refs.roiPct.textContent = `${num(roiPct,2)}%`;
      refs.deals.textContent = num(deals, 2);
      refs.payback.textContent = Number.isFinite(payback) ? `${num(payback,2)}개월` : "N/A";
      refs.opps.textContent = num(opps, 2);
      refs.rebateCost.textContent = money(rebateCost);
      refs.ownerCost.textContent = money(ownerCost);
      refs.campaignSpend.textContent = money(campaignSpend);
      refs.breakEvenWin.textContent = Number.isFinite(breakEvenWin) ? `${num(Math.max(0, breakEvenWin * 100),2)}%` : "N/A";

      refs.status.innerHTML = netProfit > 0
        ? `<span class="ok">●</span> 순이익 ${money(netProfit)} (MDF 투자 타당)`
        : `<span class="warn">●</span> 순이익 ${money(netProfit)} (가정 재검토 필요)`;

      refs.summary.value = [
        "[Partner MDF ROI 요약]",
        `오퍼튜니티: ${num(opps,2)}건`,
        `체결 건수: ${num(deals,2)}건`,
        `예상 매출: ${money(revenue)}`,
        `총이익: ${money(grossProfit)}`,
        `순이익: ${money(netProfit)}`,
        `ROI: ${num(roiPct,2)}%`,
        `회수기간: ${Number.isFinite(payback) ? `${num(payback,2)}개월` : "N/A"}`,
        `손익분기 승률: ${Number.isFinite(breakEvenWin) ? `${num(Math.max(0, breakEvenWin*100),2)}%` : "N/A"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k,v]) => refs[k].value = v);
      render();
    });

    [refs.mdfBudget, refs.partnerCoinvest, refs.internalOpsCost, refs.leads, refs.leadToOpp, refs.winRate, refs.avgDeal, refs.grossMargin, refs.rebateRate, refs.salesCycle].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
