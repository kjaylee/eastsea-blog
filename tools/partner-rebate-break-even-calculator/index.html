<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Rebate Break-even Calculator | 파트너 리베이트 손익분기 계산기</title>
  <meta name="description" content="리베이트 정책이 파트너 채널 매출에 미치는 영향을 분석하고 손익분기 판매 리프트와 ROI를 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.7vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:98px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🤝 파트너 리베이트 손익분기 계산기</h1>
        <div class="sub">리베이트 인센티브가 실제로 이익을 키우는지, 필요한 판매 리프트가 얼마인지 빠르게 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="baseDeals">월 기준 파트너 판매건수 (건)</label><input id="baseDeals" type="number" min="1" value="180" /></div>
          <div><label for="dealValue">평균 계약 금액 (KRW)</label><input id="dealValue" type="number" min="1" value="1450000" /></div>
          <div><label for="margin">공헌마진율 (%)</label><input id="margin" type="number" min="1" max="100" step="0.1" value="38" /></div>
          <div><label for="rebate">리베이트율 (%)</label><input id="rebate" type="number" min="0" max="80" step="0.1" value="8" /></div>
          <div><label for="lift">예상 판매 리프트 (%)</label><input id="lift" type="number" min="-50" max="300" step="0.1" value="18" /></div>
          <div><label for="enablement">월 파트너 운영비 (KRW)</label><input id="enablement" type="number" min="0" value="3800000" /></div>
          <div><label for="setup">정책 도입 일회성 비용 (KRW)</label><input id="setup" type="number" min="0" value="12000000" /></div>
          <div><label for="termMonths">평가 기간 (개월)</label><input id="termMonths" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 순이익 증감</div><div id="monthlyDelta" class="v">-</div></div>
          <div class="kpi"><div class="k">평가기간 순효과</div><div id="termNet" class="v">-</div></div>
          <div class="kpi"><div class="k">정책 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">기준 월 공헌이익</div><div id="baseProfit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">정책 적용 월 공헌이익</div><div id="newProfit" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>리베이트 총비용(월)</th><td id="rebateCost">-</td></tr>
            <tr><th>예상 월 판매건수</th><td id="newDeals">-</td></tr>
            <tr><th>손익분기 판매 리프트</th><td id="breakEvenLift">-</td></tr>
            <tr><th>월 매출 증분</th><td id="revenueLift">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      baseDeals:$("baseDeals"), dealValue:$("dealValue"), margin:$("margin"), rebate:$("rebate"), lift:$("lift"), enablement:$("enablement"), setup:$("setup"), termMonths:$("termMonths"),
      monthlyDelta:$("monthlyDelta"), termNet:$("termNet"), roi:$("roi"), payback:$("payback"), baseProfit:$("baseProfit"), newProfit:$("newProfit"),
      rebateCost:$("rebateCost"), newDeals:$("newDeals"), breakEvenLift:$("breakEvenLift"), revenueLift:$("revenueLift"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { baseDeals:180, dealValue:1450000, margin:38, rebate:8, lift:18, enablement:3800000, setup:12000000, termMonths:12 };
    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.baseDeals) || v.baseDeals < 1) return "기준 파트너 판매건수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.dealValue) || v.dealValue <= 0) return "평균 계약 금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return "공헌마진율은 0 초과 100 이하 범위여야 합니다.";
      if (!Number.isFinite(v.rebate) || v.rebate < 0 || v.rebate > 80) return "리베이트율은 0~80% 범위여야 합니다.";
      if (!Number.isFinite(v.lift) || v.lift < -50 || v.lift > 300) return "판매 리프트는 -50~300% 범위여야 합니다.";
      if (!Number.isFinite(v.enablement) || v.enablement < 0) return "월 파트너 운영비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setup) || v.setup < 0) return "일회성 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.termMonths) || v.termMonths < 1 || v.termMonths > 60) return "평가 기간은 1~60개월 범위여야 합니다.";
      if (v.rebate >= v.margin) return "리베이트율은 공헌마진율보다 낮아야 합니다.";
      if (v.baseDeals * (1 + v.lift / 100) <= 0) return "리프트 적용 후 판매건수가 0 이하입니다.";
      return "";
    }

    function compute(v){
      const marginRate = v.margin / 100;
      const rebateRate = v.rebate / 100;

      const baseDeals = v.baseDeals;
      const newDeals = v.baseDeals * (1 + v.lift / 100);

      const baseRevenue = baseDeals * v.dealValue;
      const newRevenue = newDeals * v.dealValue;
      const revenueLift = newRevenue - baseRevenue;

      const baseProfit = baseRevenue * marginRate;
      const rebateCost = newRevenue * rebateRate;
      const newProfit = newRevenue * marginRate - rebateCost - v.enablement;

      const monthlyDelta = newProfit - baseProfit;
      const termNet = monthlyDelta * v.termMonths - v.setup;
      const invested = v.setup + v.enablement * v.termMonths;
      const roi = invested === 0 ? (termNet >= 0 ? Infinity : -Infinity) : (termNet / invested) * 100;
      const payback = monthlyDelta > 0 ? (v.setup / monthlyDelta) : Infinity;

      const denom = (marginRate - rebateRate);
      const breakEvenLift = denom <= 0
        ? Infinity
        : ((rebateRate + (v.enablement / (baseDeals * v.dealValue))) / denom) * 100;

      return { newDeals, revenueLift, baseProfit, rebateCost, newProfit, monthlyDelta, termNet, roi, payback, breakEvenLift };
    }

    function resetOutputs(){
      ["monthlyDelta","termNet","roi","payback","baseProfit","newProfit","rebateCost","newDeals","breakEvenLift","revenueLift"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        baseDeals:Number(refs.baseDeals.value), dealValue:Number(refs.dealValue.value), margin:Number(refs.margin.value), rebate:Number(refs.rebate.value),
        lift:Number(refs.lift.value), enablement:Number(refs.enablement.value), setup:Number(refs.setup.value), termMonths:Number(refs.termMonths.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.monthlyDelta.textContent = money(r.monthlyDelta);
      refs.termNet.textContent = money(r.termNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가";
      refs.baseProfit.textContent = money(r.baseProfit);
      refs.newProfit.textContent = money(r.newProfit);
      refs.rebateCost.textContent = money(r.rebateCost);
      refs.newDeals.textContent = `${num(r.newDeals,1)}건`;
      refs.breakEvenLift.textContent = Number.isFinite(r.breakEvenLift) ? `${num(r.breakEvenLift,2)}%` : "달성 불가";
      refs.revenueLift.textContent = money(r.revenueLift);

      refs.status.innerHTML = r.monthlyDelta >= 0
        ? `<span class="ok">●</span> 월 ${money(r.monthlyDelta)} 순이익 개선`
        : `<span class="warn">●</span> 월 ${money(Math.abs(r.monthlyDelta))} 순이익 감소`;

      refs.summary.value = [
        "[Partner Rebate Break-even 요약]",
        `기준 월 공헌이익: ${money(r.baseProfit)}`,
        `정책 적용 월 공헌이익: ${money(r.newProfit)}`,
        `월 순이익 증감: ${money(r.monthlyDelta)}`,
        `${v.termMonths}개월 순효과(일회성 비용 반영): ${money(r.termNet)}`,
        `정책 ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가"}`,
        `손익분기 판매 리프트: ${Number.isFinite(r.breakEvenLift) ? `${num(r.breakEvenLift,2)}%` : "달성 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.baseDeals,refs.dealValue,refs.margin,refs.rebate,refs.lift,refs.enablement,refs.setup,refs.termMonths].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
