<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Gateway Fee Margin Calculator | 결제 게이트웨이 수수료 마진 계산기</title>
  <meta name="description" content="결제 게이트웨이 변경 시 수수료·승인율 상승·마진을 반영해 월 순기여, ROI, 손익분기 승인율을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 22% 0%,#244a82 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.7vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:98px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🏦 결제 게이트웨이 수수료 마진 계산기</h1>
        <div class="sub">수수료 체계와 승인율 상승 효과를 동시에 반영해, 게이트웨이 교체의 실질 수익성을 점검합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="tx">월 거래 건수 (건)</label><input id="tx" type="number" min="1" value="4200" /></div>
          <div><label for="aov">평균 결제금액 (KRW)</label><input id="aov" type="number" min="1" value="63000" /></div>
          <div><label for="margin">상품 공헌마진율 (%)</label><input id="margin" type="number" min="1" max="100" step="0.1" value="47" /></div>
          <div><label for="approvalUplift">신규 승인율 상승폭 (%)</label><input id="approvalUplift" type="number" min="-30" max="30" step="0.1" value="2.4" /></div>

          <div><label for="currPct">현재 PG 비율 수수료 (%)</label><input id="currPct" type="number" min="0" max="20" step="0.01" value="3.5" /></div>
          <div><label for="currFixed">현재 PG 건당 수수료 (KRW)</label><input id="currFixed" type="number" min="0" value="120" /></div>
          <div><label for="newPct">신규 PG 비율 수수료 (%)</label><input id="newPct" type="number" min="0" max="20" step="0.01" value="2.9" /></div>
          <div><label for="newFixed">신규 PG 건당 수수료 (KRW)</label><input id="newFixed" type="number" min="0" value="155" /></div>

          <div><label for="chargebackRate">차지백 발생률 (%)</label><input id="chargebackRate" type="number" min="0" max="10" step="0.01" value="0.45" /></div>
          <div><label for="chargebackCost">건당 차지백 비용 (KRW)</label><input id="chargebackCost" type="number" min="0" value="28000" /></div>
          <div><label for="monthlyPlatformFee">신규 PG 월 고정비 (KRW)</label><input id="monthlyPlatformFee" type="number" min="0" value="350000" /></div>
          <div><label for="migrationCost">마이그레이션 일회성 비용 (KRW)</label><input id="migrationCost" type="number" min="0" value="22000000" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 순기여 증감</div><div id="monthlyDelta" class="v">-</div></div>
          <div class="kpi"><div class="k">연 순효과</div><div id="annualNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">현재 월 순기여</div><div id="currentNet" class="v sm">-</div></div>
          <div class="kpi"><div class="k">신규 월 순기여</div><div id="newNet" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>현재 월 거래금액</th><td id="currentGmv">-</td></tr>
            <tr><th>신규 월 거래금액</th><td id="newGmv">-</td></tr>
            <tr><th>손익분기 승인율 상승폭</th><td id="breakEvenUplift">-</td></tr>
            <tr><th>월 수수료 절감액</th><td id="feeSavings">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      tx:$("tx"), aov:$("aov"), margin:$("margin"), approvalUplift:$("approvalUplift"),
      currPct:$("currPct"), currFixed:$("currFixed"), newPct:$("newPct"), newFixed:$("newFixed"),
      chargebackRate:$("chargebackRate"), chargebackCost:$("chargebackCost"), monthlyPlatformFee:$("monthlyPlatformFee"), migrationCost:$("migrationCost"),
      monthlyDelta:$("monthlyDelta"), annualNet:$("annualNet"), roi:$("roi"), payback:$("payback"), currentNet:$("currentNet"), newNet:$("newNet"),
      currentGmv:$("currentGmv"), newGmv:$("newGmv"), breakEvenUplift:$("breakEvenUplift"), feeSavings:$("feeSavings"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = {
      tx:4200, aov:63000, margin:47, approvalUplift:2.4,
      currPct:3.5, currFixed:120, newPct:2.9, newFixed:155,
      chargebackRate:0.45, chargebackCost:28000, monthlyPlatformFee:350000, migrationCost:22000000
    };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.tx) || v.tx < 1) return "월 거래 건수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.aov) || v.aov <= 0) return "평균 결제금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return "공헌마진율은 0 초과 100 이하로 입력하세요.";
      if (!Number.isFinite(v.approvalUplift) || v.approvalUplift < -30 || v.approvalUplift > 30) return "승인율 상승폭은 -30~30 범위여야 합니다.";
      if (!Number.isFinite(v.currPct) || v.currPct < 0 || v.currPct > 20) return "현재 PG 비율 수수료는 0~20% 범위여야 합니다.";
      if (!Number.isFinite(v.newPct) || v.newPct < 0 || v.newPct > 20) return "신규 PG 비율 수수료는 0~20% 범위여야 합니다.";
      if (!Number.isFinite(v.currFixed) || v.currFixed < 0) return "현재 건당 수수료는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.newFixed) || v.newFixed < 0) return "신규 건당 수수료는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.chargebackRate) || v.chargebackRate < 0 || v.chargebackRate > 10) return "차지백 발생률은 0~10% 범위여야 합니다.";
      if (!Number.isFinite(v.chargebackCost) || v.chargebackCost < 0) return "차지백 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.monthlyPlatformFee) || v.monthlyPlatformFee < 0) return "신규 PG 월 고정비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.migrationCost) || v.migrationCost < 0) return "마이그레이션 비용은 0 이상이어야 합니다.";
      if (v.tx * (1 + v.approvalUplift / 100) <= 0) return "승인율 상승폭으로 계산된 신규 거래 건수가 0 이하입니다.";
      return "";
    }

    function compute(v){
      const marginRate = v.margin / 100;
      const currPctRate = v.currPct / 100;
      const newPctRate = v.newPct / 100;
      const cbRate = v.chargebackRate / 100;

      const currTx = v.tx;
      const nextTx = v.tx * (1 + v.approvalUplift / 100);

      const currentGmv = currTx * v.aov;
      const newGmv = nextTx * v.aov;

      const currentFee = currentGmv * currPctRate + currTx * v.currFixed + currTx * cbRate * v.chargebackCost;
      const newFee = newGmv * newPctRate + nextTx * v.newFixed + nextTx * cbRate * v.chargebackCost + v.monthlyPlatformFee;

      const currentNet = currentGmv * marginRate - currentFee;
      const newNet = newGmv * marginRate - newFee;
      const monthlyDelta = newNet - currentNet;
      const annualNet = monthlyDelta * 12 - v.migrationCost;

      const roi = v.migrationCost === 0 ? (annualNet >= 0 ? Infinity : -Infinity) : (annualNet / v.migrationCost) * 100;
      const payback = monthlyDelta > 0 ? (v.migrationCost / monthlyDelta) : Infinity;

      const perTxNewNet = v.aov * (marginRate - newPctRate) - v.newFixed - cbRate * v.chargebackCost;
      const neededTx = perTxNewNet <= 0
        ? Infinity
        : (currentNet + v.monthlyPlatformFee) / perTxNewNet;
      const breakEvenUplift = Number.isFinite(neededTx)
        ? ((neededTx / currTx) - 1) * 100
        : Infinity;

      const feeSavings = currentFee - newFee;

      return { currentGmv, newGmv, currentNet, newNet, monthlyDelta, annualNet, roi, payback, breakEvenUplift, feeSavings };
    }

    function resetOutputs(){
      ["monthlyDelta","annualNet","roi","payback","currentNet","newNet","currentGmv","newGmv","breakEvenUplift","feeSavings"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        tx:Number(refs.tx.value), aov:Number(refs.aov.value), margin:Number(refs.margin.value), approvalUplift:Number(refs.approvalUplift.value),
        currPct:Number(refs.currPct.value), currFixed:Number(refs.currFixed.value), newPct:Number(refs.newPct.value), newFixed:Number(refs.newFixed.value),
        chargebackRate:Number(refs.chargebackRate.value), chargebackCost:Number(refs.chargebackCost.value), monthlyPlatformFee:Number(refs.monthlyPlatformFee.value), migrationCost:Number(refs.migrationCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.monthlyDelta.textContent = money(r.monthlyDelta);
      refs.annualNet.textContent = money(r.annualNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가";
      refs.currentNet.textContent = money(r.currentNet);
      refs.newNet.textContent = money(r.newNet);
      refs.currentGmv.textContent = money(r.currentGmv);
      refs.newGmv.textContent = money(r.newGmv);
      refs.breakEvenUplift.textContent = Number.isFinite(r.breakEvenUplift) ? `${num(r.breakEvenUplift,2)}%` : "달성 불가";
      refs.feeSavings.textContent = money(r.feeSavings);

      refs.status.innerHTML = r.monthlyDelta >= 0
        ? `<span class="ok">●</span> 월 ${money(r.monthlyDelta)} 순기여 개선`
        : `<span class="warn">●</span> 월 ${money(Math.abs(r.monthlyDelta))} 순기여 감소`;

      refs.summary.value = [
        "[Payment Gateway Fee Margin 요약]",
        `현재 월 순기여: ${money(r.currentNet)}`,
        `신규 월 순기여: ${money(r.newNet)}`,
        `월 순기여 증감: ${money(r.monthlyDelta)}`,
        `연 순효과(마이그레이션 비용 반영): ${money(r.annualNet)}`,
        `연 ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가"}`,
        `손익분기 승인율 상승폭: ${Number.isFinite(r.breakEvenUplift) ? `${num(r.breakEvenUplift,2)}%` : "달성 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.tx,refs.aov,refs.margin,refs.approvalUplift,refs.currPct,refs.currFixed,refs.newPct,refs.newFixed,refs.chargebackRate,refs.chargebackCost,refs.monthlyPlatformFee,refs.migrationCost].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
