<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paywall Conversion Lift Calculator | 페이월 전환율 상승 손익 계산기</title>
  <meta name="description" content="페이월 전환율 개선 시 추가 유료 사용자, 월/연 순효과, ROI, 회수기간, 손익분기 목표 전환율을 계산하는 수익화 도구" />
  <style>
    :root{--bg:#160b1f;--card:#2b1840;--line:#56306f;--txt:#f8efff;--muted:#d8c1ea;--pri:#b884ff;--soft:#341d4d;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#60358b 0%,#160b1f 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.6vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#f4e7ff;background:#2a1740;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:linear-gradient(165deg,#381f56,#2b1840);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#201132;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#9a63ef);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#251539;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.98rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#3b2257;color:#ecd8ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🧱 페이월 전환율 상승 손익 계산기</h1>
        <div class="sub">전환율 개선이 만드는 추가 유료 사용자와 월/연 순효과, ROI, 손익분기 목표 전환율을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="visitors">월 페이월 유입 사용자 수</label><input id="visitors" type="number" min="1" step="1" value="120000" /></div>
          <div><label for="currentConv">현재 전환율 (%)</label><input id="currentConv" type="number" min="0" max="100" step="0.01" value="2.2" /></div>
          <div><label for="targetConv">목표 전환율 (%)</label><input id="targetConv" type="number" min="0" max="100" step="0.01" value="3.1" /></div>
          <div><label for="arppu">월 ARPPU (KRW)</label><input id="arppu" type="number" min="1" value="17500" /></div>
          <div><label for="retention">유료 사용자 평균 유지 개월</label><input id="retention" type="number" min="1" max="60" step="0.1" value="8" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="1" max="95" step="0.1" value="82" /></div>
          <div><label for="serviceCost">유료 1인당 월 서비스 원가 (KRW)</label><input id="serviceCost" type="number" min="0" value="1200" /></div>
          <div><label for="monthlyToolCost">실험/툴 월 비용 (KRW)</label><input id="monthlyToolCost" type="number" min="0" value="5200000" /></div>
          <div><label for="setupCost">초기 구현비 (KRW)</label><input id="setupCost" type="number" min="0" value="9800000" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 순효과</div><div id="annualNet" class="v">-</div></div>
          <div class="kpi"><div class="k">연 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">추가 유료 사용자(월)</div><div id="extraPaid" class="v sm">-</div></div>
          <div class="kpi"><div class="k">추가 총이익(월)</div><div id="extraGrossProfit" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>현재 유료 사용자(월 신규)</th><td id="currentPaid">-</td></tr>
            <tr><th>목표 유료 사용자(월 신규)</th><td id="targetPaid">-</td></tr>
            <tr><th>추가 MRR</th><td id="extraMrr">-</td></tr>
            <tr><th>LTV 총이익(추가 유저)</th><td id="ltvGross">-</td></tr>
            <tr><th>손익분기 목표 전환율</th><td id="breakEvenConv">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      visitors:$("visitors"), currentConv:$("currentConv"), targetConv:$("targetConv"), arppu:$("arppu"), retention:$("retention"), margin:$("margin"),
      serviceCost:$("serviceCost"), monthlyToolCost:$("monthlyToolCost"), setupCost:$("setupCost"),
      monthlyNet:$("monthlyNet"), annualNet:$("annualNet"), roi:$("roi"), payback:$("payback"), extraPaid:$("extraPaid"), extraGrossProfit:$("extraGrossProfit"),
      currentPaid:$("currentPaid"), targetPaid:$("targetPaid"), extraMrr:$("extraMrr"), ltvGross:$("ltvGross"), breakEvenConv:$("breakEvenConv"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { visitors:120000, currentConv:2.2, targetConv:3.1, arppu:17500, retention:8, margin:82, serviceCost:1200, monthlyToolCost:5200000, setupCost:9800000 };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.visitors) || v.visitors < 1 || v.visitors > 1e9) return "월 유입 사용자 수는 1~1,000,000,000 범위여야 합니다.";
      if (!Number.isFinite(v.currentConv) || v.currentConv < 0 || v.currentConv > 100) return "현재 전환율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.targetConv) || v.targetConv < 0 || v.targetConv > 100) return "목표 전환율은 0~100% 범위여야 합니다.";
      if (v.targetConv < v.currentConv) return "목표 전환율은 현재 전환율 이상이어야 합니다.";
      if (!Number.isFinite(v.arppu) || v.arppu <= 0) return "월 ARPPU는 0보다 커야 합니다.";
      if (!Number.isFinite(v.retention) || v.retention <= 0 || v.retention > 60) return "평균 유지 개월은 0~60 범위여야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 95) return "매출총이익률은 0~95% 범위여야 합니다.";
      if (!Number.isFinite(v.serviceCost) || v.serviceCost < 0) return "유료 1인당 월 서비스 원가는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.monthlyToolCost) || v.monthlyToolCost < 0) return "월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "초기 구현비는 0 이상이어야 합니다.";
      const unitGp = v.arppu * (v.margin / 100) - v.serviceCost;
      if (unitGp <= 0) return "단위 총이익(ARPPU×마진-원가)이 0 이하입니다. 가격/마진/원가를 조정하세요.";
      return "";
    }

    function compute(v){
      const margin = v.margin / 100;
      const currentPaid = v.visitors * (v.currentConv / 100);
      const targetPaid = v.visitors * (v.targetConv / 100);
      const extraPaid = targetPaid - currentPaid;

      const extraMrr = extraPaid * v.arppu;
      const extraGrossProfit = (extraMrr * margin) - (extraPaid * v.serviceCost);
      const ltvGross = extraPaid * ((v.arppu * margin) - v.serviceCost) * v.retention;

      const monthlyNet = extraGrossProfit - v.monthlyToolCost;
      const annualCost = (v.monthlyToolCost * 12) + v.setupCost;
      const annualNet = (extraGrossProfit * 12) - annualCost;

      const roi = annualCost === 0 ? (annualNet >= 0 ? Infinity : -Infinity) : (annualNet / annualCost) * 100;
      const payback = monthlyNet > 0 ? (v.setupCost > 0 ? v.setupCost / monthlyNet : 0) : Infinity;

      const unitGross = (v.arppu * margin) - v.serviceCost;
      const neededExtraPaid = unitGross > 0 ? (v.monthlyToolCost + v.setupCost / 12) / unitGross : Infinity;
      const neededLift = Number.isFinite(neededExtraPaid) ? (neededExtraPaid / v.visitors) * 100 : Infinity;
      const breakEvenConv = Number.isFinite(neededLift) ? v.currentConv + neededLift : Infinity;

      return { currentPaid, targetPaid, extraPaid, extraMrr, extraGrossProfit, ltvGross, monthlyNet, annualNet, roi, payback, breakEvenConv };
    }

    function resetOutputs(){
      ["monthlyNet","annualNet","roi","payback","extraPaid","extraGrossProfit","currentPaid","targetPaid","extraMrr","ltvGross","breakEvenConv"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        visitors:Number(refs.visitors.value), currentConv:Number(refs.currentConv.value), targetConv:Number(refs.targetConv.value), arppu:Number(refs.arppu.value),
        retention:Number(refs.retention.value), margin:Number(refs.margin.value), serviceCost:Number(refs.serviceCost.value), monthlyToolCost:Number(refs.monthlyToolCost.value), setupCost:Number(refs.setupCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.annualNet.textContent = money(r.annualNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가";
      refs.extraPaid.textContent = `${num(r.extraPaid,0)}명`;
      refs.extraGrossProfit.textContent = money(r.extraGrossProfit);
      refs.currentPaid.textContent = `${num(r.currentPaid,0)}명`;
      refs.targetPaid.textContent = `${num(r.targetPaid,0)}명`;
      refs.extraMrr.textContent = money(r.extraMrr);
      refs.ltvGross.textContent = money(r.ltvGross);
      refs.breakEvenConv.textContent = Number.isFinite(r.breakEvenConv) ? `${num(r.breakEvenConv,3)}%` : "계산 불가";

      refs.status.innerHTML = r.annualNet >= 0
        ? `<span class="ok">●</span> 연간 ${money(r.annualNet)} 순효과`
        : `<span class="warn">●</span> 연간 ${money(Math.abs(r.annualNet))} 순손실`;

      refs.summary.value = [
        "[Paywall Conversion Lift 요약]",
        `현재 월 신규 유료: ${num(r.currentPaid,0)}명`,
        `목표 월 신규 유료: ${num(r.targetPaid,0)}명`,
        `추가 월 신규 유료: ${num(r.extraPaid,0)}명`,
        `추가 MRR: ${money(r.extraMrr)}`,
        `추가 총이익(월): ${money(r.extraGrossProfit)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `연 순효과: ${money(r.annualNet)}`,
        `연 ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `손익분기 목표 전환율: ${Number.isFinite(r.breakEvenConv) ? `${num(r.breakEvenConv,3)}%` : "계산 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.visitors,refs.currentConv,refs.targetConv,refs.arppu,refs.retention,refs.margin,refs.serviceCost,refs.monthlyToolCost,refs.setupCost].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
