<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paywall Intro Offer ROI Calculator | 페이월 인트로 오퍼 ROI 계산기</title>
  <meta name="description" content="페이월 인트로 오퍼 전환 전략의 순증 유료 구독자, 월 순이익, ROI, 회수기간, 손익분기 전환율을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}.head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.8vw,1.7rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}textarea{min-height:100px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.08rem;font-weight:800;word-break:break-word}.v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🧱 페이월 인트로 오퍼 ROI 계산기</h1>
        <div class="sub" data-i18n="subtitle">인트로 오퍼 도입 전후 유료 전환 차이를 바탕으로 순증 수익, ROI, 회수기간, 손익분기 전환율을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="visitors" data-i18n="visitors">월 paywall 방문자 수</label><input id="visitors" type="number" min="1" value="260000" /></div>
          <div><label for="baseConv" data-i18n="baseConv">기존 유료 전환율 (%)</label><input id="baseConv" type="number" min="0" max="100" step="0.1" value="1.8" /></div>
          <div><label for="introConv" data-i18n="introConv">인트로 오퍼 전환율 (%)</label><input id="introConv" type="number" min="0" max="100" step="0.1" value="2.6" /></div>
          <div><label for="introPrice" data-i18n="introPrice">Intro 1개월 가격 (KRW)</label><input id="introPrice" type="number" min="1" value="2900" /></div>
          <div><label for="renewPrice" data-i18n="renewPrice">2개월차 정가 (KRW)</label><input id="renewPrice" type="number" min="1" value="8900" /></div>
          <div><label for="retention" data-i18n="retention">2개월차 유지율 (%)</label><input id="retention" type="number" min="0" max="100" step="0.1" value="62" /></div>
          <div><label for="fee" data-i18n="fee">결제수수료율 (%)</label><input id="fee" type="number" min="0" max="100" step="0.1" value="3.4" /></div>
          <div><label for="refund" data-i18n="refund">환불률 (%)</label><input id="refund" type="number" min="0" max="100" step="0.1" value="5" /></div>
          <div><label for="serviceCost" data-i18n="serviceCost">신규 유료 1인당 서비스비(2개월, KRW)</label><input id="serviceCost" type="number" min="0" value="2200" /></div>
          <div><label for="fixed" data-i18n="fixed">운영 월 고정비 (KRW)</label><input id="fixed" type="number" min="0" value="6000000" /></div>
          <div><label for="setup" data-i18n="setup">초기 셋업비 (KRW)</label><input id="setup" type="number" min="0" value="18000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_incrementalSubs">월 순증 유료 구독자</div><div id="incrementalSubs" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_netPerSub">순증 구독자당 2개월 순기여액</div><div id="netPerSub" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthly">월 순증 순이익</div><div id="monthlyUplift" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_period">기간 순효과(셋업비 반영)</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_baseSubs">기존 월 유료 가입자</th><td id="baseSubs">-</td></tr>
            <tr><th data-i18n="d_introSubs">인트로 오퍼 월 유료 가입자</th><td id="introSubs">-</td></tr>
            <tr><th data-i18n="d_breakEven">손익분기 intro 전환율</th><td id="breakEvenConv">-</td></tr>
            <tr><th data-i18n="d_twoMonthRevenue">순증 구독자당 2개월 매출(할인+유지 반영)</th><td id="twoMonthRevenue">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      visitors:$("visitors"), baseConv:$("baseConv"), introConv:$("introConv"), introPrice:$("introPrice"), renewPrice:$("renewPrice"), retention:$("retention"), fee:$("fee"), refund:$("refund"), serviceCost:$("serviceCost"), fixed:$("fixed"), setup:$("setup"), months:$("months"),
      incrementalSubs:$("incrementalSubs"), netPerSub:$("netPerSub"), monthlyUplift:$("monthlyUplift"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      baseSubs:$("baseSubs"), introSubs:$("introSubs"), breakEvenConv:$("breakEvenConv"), twoMonthRevenue:$("twoMonthRevenue"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { visitors:260000, baseConv:1.8, introConv:2.6, introPrice:2900, renewPrice:8900, retention:62, fee:3.4, refund:5, serviceCost:2200, fixed:6000000, setup:18000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"🧱 페이월 인트로 오퍼 ROI 계산기", subtitle:"인트로 오퍼 도입 전후 유료 전환 차이를 바탕으로 순증 수익, ROI, 회수기간, 손익분기 전환율을 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        visitors:"월 paywall 방문자 수", baseConv:"기존 유료 전환율 (%)", introConv:"인트로 오퍼 전환율 (%)", introPrice:"Intro 1개월 가격 (KRW)", renewPrice:"2개월차 정가 (KRW)", retention:"2개월차 유지율 (%)", fee:"결제수수료율 (%)", refund:"환불률 (%)", serviceCost:"신규 유료 1인당 서비스비(2개월, KRW)", fixed:"운영 월 고정비 (KRW)", setup:"초기 셋업비 (KRW)", months:"분석 기간 (개월)",
        k_incrementalSubs:"월 순증 유료 구독자", k_netPerSub:"순증 구독자당 2개월 순기여액", k_monthly:"월 순증 순이익", k_period:"기간 순효과(셋업비 반영)", k_roi:"ROI", k_payback:"회수기간",
        d_baseSubs:"기존 월 유료 가입자", d_introSubs:"인트로 오퍼 월 유료 가입자", d_breakEven:"손익분기 intro 전환율", d_twoMonthRevenue:"순증 구독자당 2개월 매출(할인+유지 반영)",
        errVisitors:"방문자 수는 1 이상이어야 합니다.", errRates:"비율 값은 0~100 범위여야 합니다.", errConv:"인트로 오퍼 전환율은 기존 전환율 이상이어야 합니다.", errPrice:"가격은 0보다 커야 합니다.", errCosts:"비용 값은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~60개월 범위여야 합니다.",
        impossible:"달성 불가", noPayback:"회수 불가", statusGood:"인트로 오퍼 전략이 수익적으로 유리합니다", statusBad:"현재 가정에서는 순증 수익이 부족합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.", unitMonth:"개월", unitSubs:"명", summaryTitle:"[Paywall Intro Offer ROI Summary]"
      },
      en: {
        title:"🧱 Paywall Intro Offer ROI Calculator", subtitle:"Estimate incremental paid subscribers and financial ROI from introducing an intro paywall offer.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        visitors:"Monthly paywall visitors", baseConv:"Baseline paid conversion (%)", introConv:"Intro-offer conversion (%)", introPrice:"Intro month-1 price (KRW)", renewPrice:"Month-2 standard price (KRW)", retention:"Month-2 retention (%)", fee:"Payment fee rate (%)", refund:"Refund rate (%)", serviceCost:"Service cost per incremental paid user (2 months, KRW)", fixed:"Monthly fixed operating cost (KRW)", setup:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_incrementalSubs:"Incremental paid subscribers / month", k_netPerSub:"2-month net contribution per incremental subscriber", k_monthly:"Monthly net uplift", k_period:"Period net impact (after setup)", k_roi:"ROI", k_payback:"Payback period",
        d_baseSubs:"Baseline paid signups / month", d_introSubs:"Intro-offer paid signups / month", d_breakEven:"Break-even intro conversion", d_twoMonthRevenue:"2-month revenue per incremental subscriber (intro + retention)",
        errVisitors:"Visitors must be at least 1.", errRates:"Rate values must be between 0 and 100.", errConv:"Intro conversion must be greater than or equal to baseline conversion.", errPrice:"Prices must be greater than 0.", errCosts:"Cost values must be >= 0.", errMonths:"Analysis period must be 1 to 60 months.",
        impossible:"Not feasible", noPayback:"No payback", statusGood:"Intro-offer strategy is financially favorable", statusBad:"Incremental economics are insufficient under current assumptions", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard unavailable. Please copy manually.", unitMonth:"months", unitSubs:"subs", summaryTitle:"[Paywall Intro Offer ROI Summary]"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.visitors) || v.visitors < 1) return t("errVisitors");
      if ([v.baseConv,v.introConv,v.retention,v.fee,v.refund].some((n)=>!Number.isFinite(n) || n < 0 || n > 100)) return t("errRates");
      if (v.introConv < v.baseConv) return t("errConv");
      if (!Number.isFinite(v.introPrice) || !Number.isFinite(v.renewPrice) || v.introPrice <= 0 || v.renewPrice <= 0) return t("errPrice");
      if ([v.serviceCost,v.fixed,v.setup].some((n)=>!Number.isFinite(n) || n < 0)) return t("errCosts");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return t("errMonths");
      return "";
    }

    function compute(v){
      const baseSubs = v.visitors * (v.baseConv / 100);
      const introSubs = v.visitors * (v.introConv / 100);
      const incrementalSubs = introSubs - baseSubs;
      const twoMonthRevenue = v.introPrice + (v.renewPrice * (v.retention / 100));
      const netPerSub = (twoMonthRevenue * (1 - v.refund / 100) * (1 - v.fee / 100)) - v.serviceCost;
      const monthlyUplift = (incrementalSubs * netPerSub) - v.fixed;
      const periodNet = (monthlyUplift * v.months) - v.setup;
      const roi = v.setup === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / v.setup) * 100;
      const payback = monthlyUplift > 0 ? (v.setup / monthlyUplift) : Infinity;
      const breakEvenConv = netPerSub > 0 ? (v.baseConv + ((v.fixed / (v.visitors * netPerSub)) * 100)) : Infinity;
      return { baseSubs, introSubs, incrementalSubs, twoMonthRevenue, netPerSub, monthlyUplift, periodNet, roi, payback, breakEvenConv };
    }

    function resetOutputs(){
      ["incrementalSubs","netPerSub","monthlyUplift","periodNet","roi","payback","baseSubs","introSubs","breakEvenConv","twoMonthRevenue"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        visitors:Number(refs.visitors.value), baseConv:Number(refs.baseConv.value), introConv:Number(refs.introConv.value), introPrice:Number(refs.introPrice.value), renewPrice:Number(refs.renewPrice.value),
        retention:Number(refs.retention.value), fee:Number(refs.fee.value), refund:Number(refs.refund.value), serviceCost:Number(refs.serviceCost.value), fixed:Number(refs.fixed.value), setup:Number(refs.setup.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.incrementalSubs.textContent = `${num(r.incrementalSubs,0)} ${t("unitSubs")}`;
      refs.netPerSub.textContent = money(r.netPerSub);
      refs.monthlyUplift.textContent = money(r.monthlyUplift);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback");
      refs.baseSubs.textContent = `${num(r.baseSubs,0)} ${t("unitSubs")}`;
      refs.introSubs.textContent = `${num(r.introSubs,0)} ${t("unitSubs")}`;
      refs.twoMonthRevenue.textContent = money(r.twoMonthRevenue);
      refs.breakEvenConv.textContent = Number.isFinite(r.breakEvenConv) && r.breakEvenConv <= 100 ? `${num(r.breakEvenConv,2)}%` : t("impossible");

      refs.status.innerHTML = r.monthlyUplift >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_incrementalSubs")}: ${num(r.incrementalSubs,0)} ${t("unitSubs")}`,
        `${t("k_netPerSub")}: ${money(r.netPerSub)}`,
        `${t("k_monthly")}: ${money(r.monthlyUplift)}`,
        `${t("k_period")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("d_breakEven")}: ${Number.isFinite(r.breakEvenConv) && r.breakEvenConv <= 100 ? `${num(r.breakEvenConv,2)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.visitors,refs.baseConv,refs.introConv,refs.introPrice,refs.renewPrice,refs.retention,refs.fee,refs.refund,refs.serviceCost,refs.fixed,refs.setup,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
