<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>식물 물주기 추적기 | Plant Watering Tracker</title>
  <meta name="description" content="반려식물 물주기 주기와 마지막 물 준 날짜를 저장하고, 오늘/지연/예정 항목을 한 번에 관리하세요." />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-soft: #14142d;
      --panel: #12122a;
      --panel-2: #1a1a38;
      --line: #2d2d61;
      --text: #eef1ff;
      --muted: #9ca5cb;
      --cyan: #2bd9ff;
      --violet: #ba7bff;
      --green: #39f8c3;
      --orange: #ffbf5e;
      --red: #ff6f92;
      --shadow: 0 0 0 1px rgba(43,217,255,.16), 0 0 26px rgba(43,217,255,.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 0% 0%, #18183b 0%, var(--bg) 46%), var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 16px 14px 38px;
      line-height: 1.45;
    }

    .wrap { max-width: 920px; margin: 0 auto; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .back-link,
    .tiny-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(18, 18, 42, .86);
      color: var(--muted);
      text-decoration: none;
      font-size: .78rem;
      font-weight: 700;
      white-space: nowrap;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: clamp(1.4rem, 4.2vw, 2.06rem);
      text-shadow: 0 0 14px rgba(43,217,255,.36);
      letter-spacing: .01em;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: .94rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(18,18,42,.95), rgba(10,10,26,.94));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 11px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #dffaff;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 700;
    }

    input, select, textarea, button {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font-size: .95rem;
    }

    textarea { min-height: 76px; resize: vertical; }

    input:focus, select:focus, textarea:focus, button:focus {
      outline: 2px solid var(--cyan);
      outline-offset: 1px;
      border-color: var(--cyan);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .btn-primary {
      border: none;
      font-weight: 800;
      color: #050511;
      background: linear-gradient(135deg, rgba(43,217,255,.98), rgba(186,123,255,.95));
    }

    .btn-secondary {
      background: rgba(186,123,255,.17);
      border-color: rgba(186,123,255,.55);
      color: #f0e4ff;
      font-weight: 700;
    }

    .btn-ghost {
      background: rgba(156,165,203,.08);
      color: var(--muted);
      font-weight: 700;
    }

    .btn-danger {
      background: rgba(255,111,146,.12);
      border-color: rgba(255,111,146,.45);
      color: #ffd0dc;
      font-weight: 700;
    }

    .msg {
      min-height: 1.2em;
      margin-top: 8px;
      font-size: .84rem;
      color: var(--red);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: rgba(24,24,52,.73);
      min-height: 78px;
    }

    .metric .k {
      display: block;
      color: var(--muted);
      font-size: .76rem;
      margin-bottom: 5px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .metric .v {
      font-size: clamp(1rem, 3.2vw, 1.28rem);
      font-weight: 800;
      color: var(--cyan);
    }

    .filters {
      display: grid;
      grid-template-columns: 1.1fr .8fr .8fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: .83rem;
      color: var(--muted);
      user-select: none;
      margin-top: 6px;
    }

    .toggle input {
      width: 20px;
      min-height: 20px;
      accent-color: var(--cyan);
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .plant {
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 10px;
      background: rgba(20,20,46,.84);
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
    }

    .plant::after {
      content: "👉 오른쪽으로 스와이프하면 물 준 것으로 기록";
      position: absolute;
      right: 10px;
      bottom: 8px;
      font-size: .66rem;
      color: rgba(156,165,203,.7);
      pointer-events: none;
    }

    .plant-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .plant-title {
      font-weight: 760;
      font-size: .98rem;
    }

    .plant-meta {
      color: var(--muted);
      font-size: .79rem;
      margin-top: 2px;
      line-height: 1.35;
    }

    .chip {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: .74rem;
      font-weight: 780;
      white-space: nowrap;
    }

    .chip-overdue {
      color: #ffd3de;
      background: rgba(255,111,146,.16);
      border-color: rgba(255,111,146,.43);
    }

    .chip-today {
      color: #ffe7bf;
      background: rgba(255,191,94,.16);
      border-color: rgba(255,191,94,.45);
    }

    .chip-upcoming {
      color: #d1f6ff;
      background: rgba(43,217,255,.13);
      border-color: rgba(43,217,255,.4);
    }

    .chip-safe {
      color: #c8ffe9;
      background: rgba(57,248,195,.13);
      border-color: rgba(57,248,195,.4);
    }

    .plant-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 8px;
    }

    .pill {
      border: 1px dashed rgba(43,217,255,.33);
      border-radius: 10px;
      padding: 7px;
      font-size: .77rem;
      color: #d9faff;
      background: rgba(43,217,255,.06);
      line-height: 1.35;
    }

    .plant-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .hint {
      margin-top: 6px;
      color: var(--muted);
      font-size: .77rem;
    }

    .empty {
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 18px 12px;
      color: var(--muted);
      font-size: .9rem;
    }

    .log-list {
      max-height: 180px;
      overflow: auto;
      display: grid;
      gap: 7px;
    }

    .log-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      font-size: .79rem;
      background: rgba(14,14,34,.82);
    }

    .log-time {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: .73rem;
    }

    @media (max-width: 760px) {
      .field-grid, .summary, .filters, .plant-grid { grid-template-columns: 1fr; }
      .actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .plant-actions { grid-template-columns: 1fr; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back-link" href="../">← 도구 목록</a>
      <span class="tiny-chip">로컬 저장 · 오프라인 사용</span>
    </div>

    <h1>🌿 식물 물주기 추적기</h1>
    <p class="subtitle">식물별 물주기 주기와 마지막 물 준 날짜를 저장하고, 오늘/지연/예정 상태를 자동 분류해 관리합니다.</p>

    <section class="card" aria-label="식물 등록">
      <h2>식물 등록/수정</h2>
      <div class="field-grid">
        <div class="field">
          <label for="name">식물 이름</label>
          <input id="name" type="text" maxlength="60" placeholder="예: 몬스테라" />
        </div>
        <div class="field">
          <label for="zone">위치</label>
          <input id="zone" type="text" maxlength="30" placeholder="예: 거실 창가" />
        </div>
        <div class="field">
          <label for="cycle">물주기 주기(일)</label>
          <input id="cycle" type="number" min="1" max="90" value="7" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="lastDate">마지막 물 준 날짜</label>
          <input id="lastDate" type="date" />
        </div>
      </div>
      <div class="field" style="margin-top:10px;">
        <label for="memo">메모 (선택)</label>
        <textarea id="memo" maxlength="240" placeholder="햇빛, 흙 상태, 비료 주기 등을 기록해두세요"></textarea>
      </div>

      <div class="actions">
        <button id="saveBtn" class="btn-primary" type="button">저장</button>
        <button id="resetBtn" class="btn-secondary" type="button">입력 초기화</button>
        <button id="exportBtn" class="btn-ghost" type="button">내보내기</button>
        <label class="btn-ghost" style="display:flex;align-items:center;justify-content:center;cursor:pointer;">
          가져오기
          <input id="importInput" type="file" accept="application/json" style="display:none;" />
        </label>
      </div>
      <label class="toggle"><input id="soundToggle" type="checkbox" checked /> 사운드 피드백</label>
      <p id="msg" class="msg" role="status" aria-live="polite"></p>
      <p class="hint">키보드: <strong>⌘/Ctrl+S</strong> 저장, <strong>/</strong> 검색창 포커스, <strong>N</strong> 새 입력</p>
    </section>

    <section class="card" aria-label="필터와 통계">
      <h2>상태 대시보드</h2>
      <div class="summary">
        <div class="metric"><span class="k">총 식물</span><span class="v" id="mTotal">0</span></div>
        <div class="metric"><span class="k">오늘 물주기</span><span class="v" id="mToday" style="color:var(--orange)">0</span></div>
        <div class="metric"><span class="k">지연</span><span class="v" id="mOverdue" style="color:var(--red)">0</span></div>
        <div class="metric"><span class="k">7일 내 예정</span><span class="v" id="mUpcoming" style="color:var(--green)">0</span></div>
      </div>

      <div class="filters">
        <div class="field">
          <label for="search">검색</label>
          <input id="search" type="search" placeholder="식물명 또는 위치" />
        </div>
        <div class="field">
          <label for="statusFilter">상태 필터</label>
          <select id="statusFilter">
            <option value="all">전체</option>
            <option value="overdue">지연</option>
            <option value="today">오늘</option>
            <option value="upcoming">7일 내 예정</option>
            <option value="safe">여유 있음</option>
          </select>
        </div>
        <div class="field">
          <label for="sortBy">정렬</label>
          <select id="sortBy">
            <option value="dueAsc">다음 물주기 임박순</option>
            <option value="nameAsc">이름 가나다순</option>
            <option value="updatedDesc">최근 수정순</option>
          </select>
        </div>
      </div>

      <div id="list" class="list"></div>
    </section>

    <section class="card" aria-label="최근 기록">
      <h2>최근 기록</h2>
      <div id="logList" class="log-list"></div>
      <div class="actions" style="margin-top:10px;">
        <button id="clearLogBtn" class="btn-ghost" type="button">기록 비우기</button>
        <button id="clearAllBtn" class="btn-danger" type="button">전체 데이터 삭제</button>
      </div>
    </section>
  </div>

  <script>
    (() => {
      "use strict";

      const KEY_ITEMS = "plant-watering-tracker-items-v1";
      const KEY_PREFS = "plant-watering-tracker-prefs-v1";
      const KEY_LOGS = "plant-watering-tracker-logs-v1";
      const LOG_LIMIT = 60;

      const el = {
        name: document.getElementById("name"),
        zone: document.getElementById("zone"),
        cycle: document.getElementById("cycle"),
        lastDate: document.getElementById("lastDate"),
        memo: document.getElementById("memo"),
        saveBtn: document.getElementById("saveBtn"),
        resetBtn: document.getElementById("resetBtn"),
        exportBtn: document.getElementById("exportBtn"),
        importInput: document.getElementById("importInput"),
        msg: document.getElementById("msg"),
        soundToggle: document.getElementById("soundToggle"),
        search: document.getElementById("search"),
        statusFilter: document.getElementById("statusFilter"),
        sortBy: document.getElementById("sortBy"),
        list: document.getElementById("list"),
        mTotal: document.getElementById("mTotal"),
        mToday: document.getElementById("mToday"),
        mOverdue: document.getElementById("mOverdue"),
        mUpcoming: document.getElementById("mUpcoming"),
        logList: document.getElementById("logList"),
        clearLogBtn: document.getElementById("clearLogBtn"),
        clearAllBtn: document.getElementById("clearAllBtn")
      };

      let items = loadJSON(KEY_ITEMS, []);
      let logs = loadJSON(KEY_LOGS, []);
      let prefs = Object.assign({
        search: "",
        statusFilter: "all",
        sortBy: "dueAsc",
        sound: true
      }, loadJSON(KEY_PREFS, {}));
      let editingId = null;

      let audioCtx = null;

      init();
      attachManifest();

      function init() {
        if (!Array.isArray(items)) items = [];
        if (!Array.isArray(logs)) logs = [];

        el.lastDate.value = todayISO();
        el.search.value = prefs.search || "";
        el.statusFilter.value = prefs.statusFilter || "all";
        el.sortBy.value = prefs.sortBy || "dueAsc";
        el.soundToggle.checked = prefs.sound !== false;

        bindEvents();
        render();
        renderLogs();
      }

      function bindEvents() {
        el.saveBtn.addEventListener("click", savePlant);
        el.resetBtn.addEventListener("click", () => {
          resetForm();
          tone("soft");
        });
        el.exportBtn.addEventListener("click", exportJSON);
        el.importInput.addEventListener("change", importJSON);
        el.clearLogBtn.addEventListener("click", clearLogs);
        el.clearAllBtn.addEventListener("click", clearAll);

        [el.search, el.statusFilter, el.sortBy, el.soundToggle].forEach(node => {
          node.addEventListener("input", persistPrefsAndRender);
          node.addEventListener("change", persistPrefsAndRender);
        });

        ["pointerdown", "keydown"].forEach(eventName => {
          window.addEventListener(eventName, ensureAudio, { once: true, passive: true });
        });

        window.addEventListener("keydown", (event) => {
          const key = event.key;
          if ((event.ctrlKey || event.metaKey) && key.toLowerCase() === "s") {
            event.preventDefault();
            savePlant();
            return;
          }
          if (key === "/" && document.activeElement !== el.search) {
            event.preventDefault();
            el.search.focus();
            el.search.select();
            tone("soft");
            return;
          }
          if (key.toLowerCase() === "n" && !isTypingElement(document.activeElement)) {
            event.preventDefault();
            resetForm();
            el.name.focus();
            tone("soft");
          }
        });

        [el.name, el.zone, el.cycle, el.lastDate].forEach(field => {
          field.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              savePlant();
            }
          });
        });
      }

      function persistPrefsAndRender() {
        prefs.search = el.search.value.trim();
        prefs.statusFilter = el.statusFilter.value;
        prefs.sortBy = el.sortBy.value;
        prefs.sound = !!el.soundToggle.checked;
        saveJSON(KEY_PREFS, prefs);
        render();
      }

      function savePlant() {
        const name = el.name.value.trim();
        if (!name) {
          setMessage("식물 이름을 입력해 주세요.");
          tone("error");
          el.name.focus();
          return;
        }

        const cycle = clamp(toInt(el.cycle.value, 7), 1, 90);
        const lastDate = el.lastDate.value || todayISO();

        const payload = {
          id: editingId || uid(),
          name: name.slice(0, 60),
          zone: el.zone.value.trim().slice(0, 30),
          cycle,
          lastDate,
          memo: el.memo.value.trim().slice(0, 240),
          createdAt: editingId ? getPlant(editingId).createdAt : new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        if (editingId) {
          const idx = items.findIndex(item => item.id === editingId);
          if (idx > -1) {
            items[idx] = payload;
            pushLog(`수정: ${payload.name}`);
            setMessage("식물 정보를 수정했습니다.", true);
          }
        } else {
          items.unshift(payload);
          pushLog(`추가: ${payload.name}`);
          setMessage("식물을 저장했습니다.", true);
        }

        saveJSON(KEY_ITEMS, items);
        resetForm(false);
        render();
        renderLogs();
        tone("ok");
      }

      function resetForm(resetDate = true) {
        editingId = null;
        el.name.value = "";
        el.zone.value = "";
        el.cycle.value = "7";
        if (resetDate) el.lastDate.value = todayISO();
        el.memo.value = "";
        el.saveBtn.textContent = "저장";
        setMessage("");
      }

      function render() {
        const enriched = items.map(enrich);

        const statusCount = {
          total: enriched.length,
          today: enriched.filter(item => item.status === "today").length,
          overdue: enriched.filter(item => item.status === "overdue").length,
          upcoming: enriched.filter(item => item.daysLeft >= 1 && item.daysLeft <= 7).length
        };

        el.mTotal.textContent = String(statusCount.total);
        el.mToday.textContent = String(statusCount.today);
        el.mOverdue.textContent = String(statusCount.overdue);
        el.mUpcoming.textContent = String(statusCount.upcoming);

        let list = enriched.filter(item => {
          const q = (prefs.search || "").toLowerCase();
          if (q) {
            const hit = `${item.name} ${item.zone || ""}`.toLowerCase().includes(q);
            if (!hit) return false;
          }

          if (prefs.statusFilter === "all") return true;
          if (prefs.statusFilter === "upcoming") return item.daysLeft >= 1 && item.daysLeft <= 7;
          return item.status === prefs.statusFilter;
        });

        list.sort((a, b) => {
          if (prefs.sortBy === "nameAsc") return a.name.localeCompare(b.name, "ko");
          if (prefs.sortBy === "updatedDesc") return new Date(b.updatedAt) - new Date(a.updatedAt);
          return toDate(a.nextDate) - toDate(b.nextDate);
        });

        if (!list.length) {
          el.list.innerHTML = '<div class="empty">조건에 맞는 식물이 없습니다. 첫 식물을 등록해 보세요.</div>';
          return;
        }

        el.list.innerHTML = list.map(item => {
          const chipClass = `chip-${item.status}`;
          const chipLabel = statusLabel(item);
          return `
            <article class="plant" data-id="${item.id}">
              <div class="plant-head">
                <div>
                  <div class="plant-title">${escapeHTML(item.name)}</div>
                  <div class="plant-meta">${escapeHTML(item.zone || "위치 미입력")} · ${item.cycle}일 주기</div>
                </div>
                <span class="chip ${chipClass}">${chipLabel}</span>
              </div>

              <div class="plant-grid">
                <div class="pill">마지막 물 준 날<br><strong>${formatDate(item.lastDate)}</strong></div>
                <div class="pill">다음 예정일<br><strong>${formatDate(item.nextDate)}</strong></div>
                <div class="pill">남은/지연 일수<br><strong>${dayDeltaLabel(item.daysLeft)}</strong></div>
              </div>

              ${item.memo ? `<div class="plant-meta" style="margin-bottom:8px;">메모: ${escapeHTML(item.memo)}</div>` : ""}

              <div class="plant-actions">
                <button class="btn-primary" type="button" data-action="water" data-id="${item.id}">지금 물 줌 기록</button>
                <button class="btn-secondary" type="button" data-action="edit" data-id="${item.id}">수정</button>
                <button class="btn-danger" type="button" data-action="delete" data-id="${item.id}">삭제</button>
              </div>
            </article>
          `;
        }).join("");

        bindListEvents();
      }

      function bindListEvents() {
        el.list.querySelectorAll("button[data-action]").forEach(button => {
          button.addEventListener("click", () => {
            const id = button.getAttribute("data-id");
            const action = button.getAttribute("data-action");
            if (action === "water") markWatered(id, true);
            if (action === "edit") startEdit(id);
            if (action === "delete") removePlant(id);
          });
        });

        el.list.querySelectorAll(".plant").forEach(card => {
          let startX = 0;
          let moved = false;

          card.addEventListener("pointerdown", (event) => {
            startX = event.clientX;
            moved = false;
          });

          card.addEventListener("pointermove", (event) => {
            if (Math.abs(event.clientX - startX) > 12) moved = true;
          });

          card.addEventListener("pointerup", (event) => {
            if (!moved) return;
            const deltaX = event.clientX - startX;
            if (deltaX > 70) {
              const id = card.getAttribute("data-id");
              markWatered(id, false);
            }
          });
        });
      }

      function markWatered(id, fromButton) {
        const plant = getPlant(id);
        if (!plant) return;
        plant.lastDate = todayISO();
        plant.updatedAt = new Date().toISOString();
        saveJSON(KEY_ITEMS, items);
        pushLog(`물줌 완료: ${plant.name}`);
        render();
        renderLogs();
        setMessage(`${plant.name}에 물 준 것으로 기록했습니다.`, true);
        tone("ok");
        if (!fromButton && navigator.vibrate) navigator.vibrate(20);
      }

      function startEdit(id) {
        const plant = getPlant(id);
        if (!plant) return;

        editingId = id;
        el.name.value = plant.name || "";
        el.zone.value = plant.zone || "";
        el.cycle.value = String(plant.cycle || 7);
        el.lastDate.value = plant.lastDate || todayISO();
        el.memo.value = plant.memo || "";
        el.saveBtn.textContent = "수정 저장";
        setMessage("수정 모드입니다.", true);
        window.scrollTo({ top: 0, behavior: "smooth" });
        tone("soft");
      }

      function removePlant(id) {
        const plant = getPlant(id);
        if (!plant) return;
        if (!window.confirm(`'${plant.name}' 항목을 삭제할까요?`)) return;

        items = items.filter(item => item.id !== id);
        saveJSON(KEY_ITEMS, items);
        pushLog(`삭제: ${plant.name}`);
        render();
        renderLogs();
        setMessage("항목을 삭제했습니다.", true);
        tone("error");
      }

      function clearLogs() {
        if (!window.confirm("기록을 모두 비울까요?")) return;
        logs = [];
        saveJSON(KEY_LOGS, logs);
        renderLogs();
        tone("soft");
      }

      function clearAll() {
        if (!window.confirm("정말 전체 데이터를 삭제할까요?")) return;
        items = [];
        logs = [];
        editingId = null;
        saveJSON(KEY_ITEMS, items);
        saveJSON(KEY_LOGS, logs);
        resetForm();
        render();
        renderLogs();
        setMessage("전체 데이터를 삭제했습니다.", true);
        tone("error");
      }

      function renderLogs() {
        if (!logs.length) {
          el.logList.innerHTML = '<div class="empty">아직 기록이 없습니다.</div>';
          return;
        }

        el.logList.innerHTML = logs.map(log => {
          return `<div class="log-item">${escapeHTML(log.text)}<span class="log-time">${formatDateTime(log.at)}</span></div>`;
        }).join("");
      }

      function pushLog(text) {
        logs.unshift({ text, at: new Date().toISOString() });
        logs = logs.slice(0, LOG_LIMIT);
        saveJSON(KEY_LOGS, logs);
      }

      function exportJSON() {
        const payload = {
          exportedAt: new Date().toISOString(),
          items,
          prefs
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `plant-watering-tracker-${todayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        setMessage("JSON을 내보냈습니다.", true);
        tone("soft");
      }

      function importJSON(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || "{}"));
            if (!Array.isArray(parsed.items)) throw new Error("invalid");
            items = parsed.items.map(normalizePlant).filter(Boolean);
            prefs = Object.assign(prefs, parsed.prefs || {});
            saveJSON(KEY_ITEMS, items);
            saveJSON(KEY_PREFS, prefs);
            pushLog(`가져오기: ${items.length}개 항목`);
            el.search.value = prefs.search || "";
            el.statusFilter.value = prefs.statusFilter || "all";
            el.sortBy.value = prefs.sortBy || "dueAsc";
            el.soundToggle.checked = prefs.sound !== false;
            render();
            renderLogs();
            setMessage("가져오기를 완료했습니다.", true);
            tone("ok");
          } catch (_) {
            setMessage("JSON 형식이 올바르지 않습니다.");
            tone("error");
          } finally {
            event.target.value = "";
          }
        };
        reader.readAsText(file);
      }

      function getPlant(id) {
        return items.find(item => item.id === id);
      }

      function enrich(item) {
        const nextDate = addDaysISO(item.lastDate, item.cycle);
        const daysLeft = diffDays(new Date(todayISO()), toDate(nextDate));

        let status = "safe";
        if (daysLeft < 0) status = "overdue";
        else if (daysLeft === 0) status = "today";
        else if (daysLeft <= 7) status = "upcoming";

        return Object.assign({}, item, { nextDate, daysLeft, status });
      }

      function normalizePlant(raw) {
        if (!raw || typeof raw !== "object" || !raw.name) return null;
        return {
          id: raw.id || uid(),
          name: String(raw.name).slice(0, 60),
          zone: String(raw.zone || "").slice(0, 30),
          cycle: clamp(toInt(raw.cycle, 7), 1, 90),
          lastDate: String(raw.lastDate || todayISO()).slice(0, 10),
          memo: String(raw.memo || "").slice(0, 240),
          createdAt: raw.createdAt || new Date().toISOString(),
          updatedAt: raw.updatedAt || new Date().toISOString()
        };
      }

      function statusLabel(item) {
        if (item.status === "overdue") return `지연 ${Math.abs(item.daysLeft)}일`;
        if (item.status === "today") return "오늘 물주기";
        if (item.status === "upcoming") return `D-${item.daysLeft}`;
        return `여유 ${item.daysLeft}일`;
      }

      function dayDeltaLabel(daysLeft) {
        if (daysLeft < 0) return `${Math.abs(daysLeft)}일 지연`;
        if (daysLeft === 0) return "오늘";
        return `${daysLeft}일 남음`;
      }

      function setMessage(text, ok = false) {
        el.msg.textContent = text;
        el.msg.style.color = ok ? "var(--green)" : "var(--red)";
      }

      function saveJSON(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function loadJSON(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (_) {
          return fallback;
        }
      }

      function uid() {
        return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function toInt(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? Math.round(n) : fallback;
      }

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function todayISO() {
        const d = new Date();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${d.getFullYear()}-${m}-${day}`;
      }

      function toDate(iso) {
        const [y, m, d] = String(iso).split("-").map(Number);
        return new Date(y, (m || 1) - 1, d || 1);
      }

      function addDaysISO(iso, days) {
        const d = toDate(iso);
        d.setDate(d.getDate() + Number(days || 0));
        return toISODate(d);
      }

      function toISODate(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function diffDays(a, b) {
        const ms = 24 * 60 * 60 * 1000;
        const utcA = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
        const utcB = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
        return Math.floor((utcB - utcA) / ms);
      }

      function formatDate(iso) {
        const d = toDate(iso);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
      }

      function formatDateTime(iso) {
        const d = new Date(iso);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }

      function escapeHTML(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function isTypingElement(node) {
        if (!node) return false;
        const tag = String(node.tagName || "").toLowerCase();
        return tag === "input" || tag === "textarea" || node.isContentEditable;
      }

      function ensureAudio() {
        if (audioCtx) return;
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        audioCtx = new Ctx();
      }

      function tone(kind) {
        if (!prefs.sound) return;
        ensureAudio();
        if (!audioCtx) return;

        const cfg = {
          ok: { f: 680, t: 0.06, type: "sine", gain: 0.045 },
          soft: { f: 520, t: 0.045, type: "triangle", gain: 0.035 },
          error: { f: 220, t: 0.08, type: "sawtooth", gain: 0.04 }
        }[kind] || { f: 480, t: 0.05, type: "sine", gain: 0.03 };

        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = cfg.type;
        osc.frequency.setValueAtTime(cfg.f, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(cfg.gain, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + cfg.t);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + cfg.t + 0.01);
      }

      function attachManifest() {
        try {
          const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="110" fill="#0a0a1a"/><path d="M156 352c0-52 38-98 92-108-6-84 53-145 130-152-6 55-30 108-73 142 31 5 68-5 103-28-6 55-29 92-67 112-35 19-77 21-115 11-8 11-18 20-29 28-14 10-28 17-41 22v-27z" fill="#2bd9ff"/><circle cx="191" cy="355" r="57" fill="#39f8c3"/></svg>`;
          const icon = `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(iconSvg)))}`;
          const manifest = {
            name: "Plant Watering Tracker",
            short_name: "PlantWater",
            start_url: "./",
            display: "standalone",
            background_color: "#0a0a1a",
            theme_color: "#0a0a1a",
            icons: [
              { src: icon, sizes: "192x192", type: "image/svg+xml", purpose: "any" },
              { src: icon, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
            ]
          };
          const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
          const link = document.createElement("link");
          link.rel = "manifest";
          link.href = URL.createObjectURL(blob);
          document.head.appendChild(link);
        } catch (_) {
          // ignore silently
        }
      }
    })();
  </script>
</body>
