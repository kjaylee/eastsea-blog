<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast Dynamic Ad Insertion ROI Calculator | 팟캐스트 DAI ROI 계산기</title>
  <meta name="description" content="팟캐스트 Dynamic Ad Insertion(DAI) 도입 시 fill rate/eCPM 개선이 월 순이익, ROI, 회수기간에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}.head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.8vw,1.7rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}textarea{min-height:100px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.08rem;font-weight:800;word-break:break-word}.v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🎙️ 팟캐스트 DAI ROI 계산기</h1>
        <div class="sub" data-i18n="subtitle">Dynamic Ad Insertion 도입으로 fill rate/eCPM이 개선될 때 월 순증 수익과 투자 회수 가능성을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="downloads" data-i18n="downloads">월 다운로드 수</label><input id="downloads" type="number" min="1" value="1400000" /></div>
          <div><label for="slots" data-i18n="slots">에피소드당 광고 슬롯 수</label><input id="slots" type="number" min="1" value="2" /></div>
          <div><label for="fill" data-i18n="fill">현재 Fill rate (%)</label><input id="fill" type="number" min="0" max="100" step="0.1" value="58" /></div>
          <div><label for="ecpm" data-i18n="ecpm">현재 eCPM (KRW)</label><input id="ecpm" type="number" min="1" value="19000" /></div>
          <div><label for="fillLift" data-i18n="fillLift">DAI 후 Fill 개선폭 (%p)</label><input id="fillLift" type="number" min="0" max="100" step="0.1" value="18" /></div>
          <div><label for="ecpmLift" data-i18n="ecpmLift">DAI 후 eCPM 개선폭 (%)</label><input id="ecpmLift" type="number" min="0" max="500" step="0.1" value="12" /></div>
          <div><label for="share" data-i18n="share">광고 매출 쉐어/수수료율 (%)</label><input id="share" type="number" min="0" max="99" step="0.1" value="25" /></div>
          <div><label for="ops" data-i18n="ops">광고 운영비 (월, KRW)</label><input id="ops" type="number" min="0" value="2800000" /></div>
          <div><label for="toolCost" data-i18n="toolCost">DAI 플랫폼 월 비용 (KRW)</label><input id="toolCost" type="number" min="0" value="3600000" /></div>
          <div><label for="setup" data-i18n="setup">초기 셋업비 (KRW)</label><input id="setup" type="number" min="0" value="9000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_before">도입 전 월 순이익</div><div id="beforeNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_after">도입 후 월 순이익</div><div id="afterNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthly">월 순증 순이익</div><div id="monthlyUplift" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_period">기간 순효과(셋업비 반영)</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_beforeGross">도입 전 월 총광고매출</th><td id="beforeGross">-</td></tr>
            <tr><th data-i18n="d_afterGross">도입 후 월 총광고매출</th><td id="afterGross">-</td></tr>
            <tr><th data-i18n="d_afterFill">도입 후 Fill rate</th><td id="afterFill">-</td></tr>
            <tr><th data-i18n="d_breakEven">손익분기 Fill 개선폭</th><td id="breakEvenFillLift">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      downloads:$("downloads"), slots:$("slots"), fill:$("fill"), ecpm:$("ecpm"), fillLift:$("fillLift"), ecpmLift:$("ecpmLift"), share:$("share"),
      ops:$("ops"), toolCost:$("toolCost"), setup:$("setup"), months:$("months"),
      beforeNet:$("beforeNet"), afterNet:$("afterNet"), monthlyUplift:$("monthlyUplift"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      beforeGross:$("beforeGross"), afterGross:$("afterGross"), afterFill:$("afterFill"), breakEvenFillLift:$("breakEvenFillLift"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { downloads:1400000, slots:2, fill:58, ecpm:19000, fillLift:18, ecpmLift:12, share:25, ops:2800000, toolCost:3600000, setup:9000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"🎙️ 팟캐스트 DAI ROI 계산기", subtitle:"Dynamic Ad Insertion 도입으로 fill rate/eCPM이 개선될 때 월 순증 수익과 투자 회수 가능성을 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        downloads:"월 다운로드 수", slots:"에피소드당 광고 슬롯 수", fill:"현재 Fill rate (%)", ecpm:"현재 eCPM (KRW)", fillLift:"DAI 후 Fill 개선폭 (%p)", ecpmLift:"DAI 후 eCPM 개선폭 (%)", share:"광고 매출 쉐어/수수료율 (%)", ops:"광고 운영비 (월, KRW)", toolCost:"DAI 플랫폼 월 비용 (KRW)", setup:"초기 셋업비 (KRW)", months:"분석 기간 (개월)",
        k_before:"도입 전 월 순이익", k_after:"도입 후 월 순이익", k_monthly:"월 순증 순이익", k_period:"기간 순효과(셋업비 반영)", k_roi:"ROI", k_payback:"회수기간",
        d_beforeGross:"도입 전 월 총광고매출", d_afterGross:"도입 후 월 총광고매출", d_afterFill:"도입 후 Fill rate", d_breakEven:"손익분기 Fill 개선폭",
        errDownloads:"다운로드 수와 슬롯 수는 1 이상이어야 합니다.", errRate:"비율 값은 0~100 범위여야 합니다.", errFillLift:"Fill 개선폭을 더한 값이 100%를 초과할 수 없습니다.", errEcpm:"eCPM은 0보다 커야 합니다.", errShare:"수수료율은 0~99 범위여야 합니다.", errCosts:"비용 값은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~60개월 범위여야 합니다.",
        impossible:"달성 불가", noPayback:"회수 불가", statusGood:"DAI 도입이 수익적으로 유리합니다", statusBad:"현재 가정에서는 DAI 순증 이익이 부족합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.", unitMonth:"개월", summaryTitle:"[Podcast DAI ROI Summary]"
      },
      en: {
        title:"🎙️ Podcast Dynamic Ad Insertion ROI Calculator", subtitle:"Estimate monthly incremental profit, ROI, and payback from fill-rate/eCPM improvements after DAI adoption.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        downloads:"Monthly downloads", slots:"Ad slots per episode", fill:"Current fill rate (%)", ecpm:"Current eCPM (KRW)", fillLift:"Fill-rate uplift after DAI (%p)", ecpmLift:"eCPM uplift after DAI (%)", share:"Revenue share / commission rate (%)", ops:"Ad operations cost per month (KRW)", toolCost:"DAI platform monthly cost (KRW)", setup:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_before:"Monthly net profit before DAI", k_after:"Monthly net profit after DAI", k_monthly:"Monthly net uplift", k_period:"Period net impact (after setup)", k_roi:"ROI", k_payback:"Payback period",
        d_beforeGross:"Monthly gross ad revenue (before)", d_afterGross:"Monthly gross ad revenue (after)", d_afterFill:"Fill rate after DAI", d_breakEven:"Break-even fill uplift",
        errDownloads:"Downloads and ad slots must be at least 1.", errRate:"Rate values must be between 0 and 100.", errFillLift:"Current fill + uplift cannot exceed 100%.", errEcpm:"eCPM must be greater than 0.", errShare:"Revenue share must be between 0 and 99.", errCosts:"Cost values must be >= 0.", errMonths:"Analysis period must be 1 to 60 months.",
        impossible:"Not feasible", noPayback:"No payback", statusGood:"DAI adoption is financially favorable", statusBad:"Incremental DAI economics are insufficient under current assumptions", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard unavailable. Please copy manually.", unitMonth:"months", summaryTitle:"[Podcast DAI ROI Summary]"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.downloads) || v.downloads < 1 || !Number.isFinite(v.slots) || v.slots < 1) return t("errDownloads");
      if ([v.fill,v.fillLift,v.ecpmLift].some((n)=>!Number.isFinite(n) || n < 0 || n > 100)) return t("errRate");
      if (v.fill + v.fillLift > 100) return t("errFillLift");
      if (!Number.isFinite(v.ecpm) || v.ecpm <= 0) return t("errEcpm");
      if (!Number.isFinite(v.share) || v.share < 0 || v.share >= 100) return t("errShare");
      if ([v.ops,v.toolCost,v.setup].some((n)=>!Number.isFinite(n) || n < 0)) return t("errCosts");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return t("errMonths");
      return "";
    }

    function compute(v){
      const impressions = v.downloads * v.slots;
      const beforeGross = (impressions / 1000) * v.ecpm * (v.fill / 100);
      const afterFill = v.fill + v.fillLift;
      const afterEcpm = v.ecpm * (1 + v.ecpmLift / 100);
      const afterGross = (impressions / 1000) * afterEcpm * (afterFill / 100);
      const beforeNet = (beforeGross * (1 - v.share / 100)) - v.ops;
      const afterNet = (afterGross * (1 - v.share / 100)) - v.ops - v.toolCost;
      const monthlyUplift = afterNet - beforeNet;
      const periodNet = (monthlyUplift * v.months) - v.setup;
      const roi = v.setup === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / v.setup) * 100;
      const payback = monthlyUplift > 0 ? (v.setup / monthlyUplift) : Infinity;

      const shareKeep = (1 - v.share / 100);
      const grossRequired = beforeGross + (v.toolCost / shareKeep);
      const denom = (impressions / 1000) * afterEcpm;
      const breakEvenFill = denom > 0 ? (grossRequired / denom) * 100 : Infinity;
      const breakEvenFillLift = breakEvenFill - v.fill;

      return { beforeGross, afterGross, beforeNet, afterNet, afterFill, monthlyUplift, periodNet, roi, payback, breakEvenFillLift };
    }

    function resetOutputs(){
      ["beforeNet","afterNet","monthlyUplift","periodNet","roi","payback","beforeGross","afterGross","afterFill","breakEvenFillLift"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        downloads:Number(refs.downloads.value), slots:Number(refs.slots.value), fill:Number(refs.fill.value), ecpm:Number(refs.ecpm.value), fillLift:Number(refs.fillLift.value),
        ecpmLift:Number(refs.ecpmLift.value), share:Number(refs.share.value), ops:Number(refs.ops.value), toolCost:Number(refs.toolCost.value), setup:Number(refs.setup.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.beforeNet.textContent = money(r.beforeNet);
      refs.afterNet.textContent = money(r.afterNet);
      refs.monthlyUplift.textContent = money(r.monthlyUplift);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback");
      refs.beforeGross.textContent = money(r.beforeGross);
      refs.afterGross.textContent = money(r.afterGross);
      refs.afterFill.textContent = `${num(r.afterFill,2)}%`;
      refs.breakEvenFillLift.textContent = Number.isFinite(r.breakEvenFillLift) && r.breakEvenFillLift >= 0 && (v.fill + r.breakEvenFillLift) <= 100
        ? `${num(r.breakEvenFillLift,2)}%p`
        : t("impossible");

      refs.status.innerHTML = r.monthlyUplift >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_before")}: ${money(r.beforeNet)}`,
        `${t("k_after")}: ${money(r.afterNet)}`,
        `${t("k_monthly")}: ${money(r.monthlyUplift)}`,
        `${t("k_period")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("d_breakEven")}: ${Number.isFinite(r.breakEvenFillLift) && r.breakEvenFillLift >= 0 && (v.fill + r.breakEvenFillLift) <= 100 ? `${num(r.breakEvenFillLift,2)}%p` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.downloads,refs.slots,refs.fill,refs.ecpm,refs.fillLift,refs.ecpmLift,refs.share,refs.ops,refs.toolCost,refs.setup,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
