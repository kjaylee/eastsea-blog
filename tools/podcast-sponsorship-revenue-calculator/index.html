<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast Sponsorship Revenue Calculator | 팟캐스트 스폰서십 수익 계산기</title>
  <meta name="description" content="에피소드 수, 다운로드, 광고 슬롯, CPM, fill rate, 네트워크 수수료를 반영해 팟캐스트 스폰서십 월 순이익, ROI, 손익분기 CPM을 계산합니다." />
  <style>
    :root{--bg:#081622;--card:#11273f;--line:#2c4f77;--txt:#ebf4ff;--muted:#adc3de;--pri:#6eb1ff;--soft:#1b3d60;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.15)}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#1f4d76 0%,#081622 57%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#14365b;color:#ddecff;border-radius:10px;padding:8px 12px;text-decoration:none;font-size:.86rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173b61,#11273f);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d2035;color:var(--txt);font-size:.93rem}
    button{border:none;cursor:pointer;background:linear-gradient(135deg,var(--pri),#4f81ed);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{margin-top:10px;min-height:108px;resize:vertical}.error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7a3440;background:var(--errbg);color:var(--err);font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0e2137;border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.05rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#163c61;color:#d9e9ff;font-size:.77rem;margin-top:10px}.ok{color:var(--ok)}.warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.86rem;table-layout:fixed}th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🎙️ 팟캐스트 스폰서십 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">다운로드·광고 슬롯·Fill rate·CPM 기반으로 스폰서십 월 순이익, ROI, 손익분기 CPM을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" class="chip" type="button">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="episodes" data-i18n="episodes">월 에피소드 수</label><input id="episodes" type="number" min="1" value="12"></div>
          <div><label for="downloads" data-i18n="downloads">에피소드당 평균 다운로드</label><input id="downloads" type="number" min="1" value="38000"></div>
          <div><label for="slots" data-i18n="slots">에피소드당 광고 슬롯 수</label><input id="slots" type="number" min="1" value="2"></div>
          <div><label for="fillRate" data-i18n="fillRate">슬롯 판매율 Fill rate (%)</label><input id="fillRate" type="number" min="0" max="100" step="0.1" value="72"></div>
          <div><label for="cpm" data-i18n="cpm">기준 CPM (KRW)</label><input id="cpm" type="number" min="1" value="52000"></div>
          <div><label for="premium" data-i18n="premium">호스트리드 프리미엄 배수</label><input id="premium" type="number" min="0.1" step="0.01" value="1.2"></div>
          <div><label for="networkFee" data-i18n="networkFee">네트워크/대행 수수료율 (%)</label><input id="networkFee" type="number" min="0" max="100" step="0.1" value="18"></div>
          <div><label for="prodCost" data-i18n="prodCost">에피소드당 제작비 (KRW)</label><input id="prodCost" type="number" min="0" value="850000"></div>
          <div><label for="monthlyOpex" data-i18n="monthlyOpex">월 고정 운영비 (KRW)</label><input id="monthlyOpex" type="number" min="0" value="4200000"></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="36" value="12"></div>
          <div><label for="oneTime" data-i18n="oneTime">원타임 세일즈킷 비용 (KRW)</label><input id="oneTime" type="number" min="0" value="9000000"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpi">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_gross">월 총 스폰서십 매출</div><div id="grossRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_afterFee">월 수수료 차감 후 매출</div><div id="afterFeeRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_cost">월 총 비용</div><div id="monthlyCost" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_net">월 순이익</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_period">분석기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detail">세부 지표</h2>
        <table><tbody>
          <tr><th data-i18n="d_impressions">월 유효 광고 노출(천회)</th><td id="impressionsK">-</td></tr>
          <tr><th data-i18n="d_breakEvenCpm">손익분기 CPM</th><td id="breakEvenCpm">-</td></tr>
          <tr><th data-i18n="d_breakEvenFill">손익분기 Fill rate</th><td id="breakEvenFill">-</td></tr>
          <tr><th data-i18n="d_feeAmt">월 수수료 금액</th><td id="feeAmount">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      episodes:$("episodes"), downloads:$("downloads"), slots:$("slots"), fillRate:$("fillRate"), cpm:$("cpm"), premium:$("premium"), networkFee:$("networkFee"), prodCost:$("prodCost"), monthlyOpex:$("monthlyOpex"), months:$("months"), oneTime:$("oneTime"),
      grossRevenue:$("grossRevenue"), afterFeeRevenue:$("afterFeeRevenue"), monthlyCost:$("monthlyCost"), monthlyNet:$("monthlyNet"), periodNet:$("periodNet"), roi:$("roi"), impressionsK:$("impressionsK"), breakEvenCpm:$("breakEvenCpm"), breakEvenFill:$("breakEvenFill"), feeAmount:$("feeAmount"),
      error:$("error"), summary:$("summary"), status:$("status"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { episodes:12, downloads:38000, slots:2, fillRate:72, cpm:52000, premium:1.2, networkFee:18, prodCost:850000, monthlyOpex:4200000, months:12, oneTime:9000000 };
    let lang = "ko";

    const i18n = {
      ko:{
        title:"🎙️ 팟캐스트 스폰서십 수익 계산기", subtitle:"다운로드·광고 슬롯·Fill rate·CPM 기반으로 스폰서십 월 순이익, ROI, 손익분기 CPM을 계산합니다.", back:"Back to Portal",
        inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpi:"핵심 KPI", waiting:"결과 계산 대기", detail:"세부 지표",
        episodes:"월 에피소드 수", downloads:"에피소드당 평균 다운로드", slots:"에피소드당 광고 슬롯 수", fillRate:"슬롯 판매율 Fill rate (%)", cpm:"기준 CPM (KRW)", premium:"호스트리드 프리미엄 배수", networkFee:"네트워크/대행 수수료율 (%)", prodCost:"에피소드당 제작비 (KRW)", monthlyOpex:"월 고정 운영비 (KRW)", months:"분석 기간 (개월)", oneTime:"원타임 세일즈킷 비용 (KRW)",
        k_gross:"월 총 스폰서십 매출", k_afterFee:"월 수수료 차감 후 매출", k_cost:"월 총 비용", k_net:"월 순이익", k_period:"분석기간 순효과", k_roi:"ROI",
        d_impressions:"월 유효 광고 노출(천회)", d_breakEvenCpm:"손익분기 CPM", d_breakEvenFill:"손익분기 Fill rate", d_feeAmt:"월 수수료 금액",
        errPositive:"에피소드/다운로드/슬롯/CPM/배수/개월은 0보다 커야 합니다.", errRate:"Fill rate와 수수료율은 0~100 범위여야 합니다.", errCost:"비용 값은 0 이상이어야 합니다.",
        statusGood:"현재 가정에서 월 순이익이 양수입니다", statusWarn:"현재 가정에서 월 순이익이 음수입니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        impossible:"달성 불가", summaryTitle:"[팟캐스트 스폰서십 수익 요약]"
      },
      en:{
        title:"🎙️ Podcast Sponsorship Revenue Calculator", subtitle:"Estimate monthly sponsorship profit, ROI, and break-even CPM using downloads, ad slots, fill rate, and fee structure.", back:"Back to Portal",
        inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpi:"Key KPIs", waiting:"Waiting for calculation", detail:"Details",
        episodes:"Episodes per month", downloads:"Avg downloads per episode", slots:"Ad slots per episode", fillRate:"Slot fill rate (%)", cpm:"Benchmark CPM (KRW)", premium:"Host-read premium multiplier", networkFee:"Network/agency fee (%)", prodCost:"Production cost per episode (KRW)", monthlyOpex:"Monthly fixed opex (KRW)", months:"Analysis period (months)", oneTime:"One-time sales kit cost (KRW)",
        k_gross:"Monthly gross sponsorship revenue", k_afterFee:"Monthly revenue after fee", k_cost:"Monthly total cost", k_net:"Monthly net profit", k_period:"Period net impact", k_roi:"ROI",
        d_impressions:"Monthly effective ad impressions (thousands)", d_breakEvenCpm:"Break-even CPM", d_breakEvenFill:"Break-even fill rate", d_feeAmt:"Monthly fee amount",
        errPositive:"Episodes/downloads/slots/CPM/multiplier/months must be greater than 0.", errRate:"Fill rate and fee must be between 0 and 100.", errCost:"Cost inputs must be zero or above.",
        statusGood:"Monthly net profit is positive with current assumptions", statusWarn:"Monthly net profit is negative with current assumptions", statusCheck:"Please review input values",
        copied:"Summary copied.", copyFail:"Clipboard unavailable. Please copy manually.",
        impossible:"Not achievable", summaryTitle:"[Podcast Sponsorship Revenue Summary]"
      }
    };

    const t=(k)=>i18n[lang][k] ?? k;
    const locale=()=>lang==="ko"?"ko-KR":"en-US";
    const money=(n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang=lang;
      document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});
      refs.lang.textContent=lang==='ko'?'EN':'KO';
    }

    function validate(v){
      if([v.episodes,v.downloads,v.slots,v.cpm,v.premium,v.months].some(x=>!Number.isFinite(x)||x<=0)) return t('errPositive');
      if([v.fillRate,v.networkFee].some(x=>!Number.isFinite(x)||x<0||x>100)) return t('errRate');
      if([v.prodCost,v.monthlyOpex,v.oneTime].some(x=>!Number.isFinite(x)||x<0)) return t('errCost');
      return '';
    }

    function compute(v){
      const impressionsK = (v.episodes * v.downloads * v.slots * (v.fillRate/100)) / 1000;
      const grossRevenue = impressionsK * v.cpm * v.premium;
      const feeAmount = grossRevenue * (v.networkFee/100);
      const afterFeeRevenue = grossRevenue - feeAmount;
      const monthlyCost = (v.episodes * v.prodCost) + v.monthlyOpex;
      const monthlyNet = afterFeeRevenue - monthlyCost;
      const periodNet = (monthlyNet * v.months) - v.oneTime;
      const invested = (monthlyCost * v.months) + v.oneTime;
      const roi = invested === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / invested) * 100;

      const denomCpm = impressionsK * (1 - v.networkFee/100);
      const breakEvenCpm = denomCpm > 0 ? (monthlyCost + (v.oneTime / v.months)) / denomCpm : Infinity;

      const denomFill = (v.episodes * v.downloads * v.slots / 1000) * v.cpm * v.premium * (1 - v.networkFee/100);
      const breakEvenFill = denomFill > 0 ? ((monthlyCost + (v.oneTime / v.months)) / denomFill) * 100 : Infinity;

      return {impressionsK,grossRevenue,feeAmount,afterFeeRevenue,monthlyCost,monthlyNet,periodNet,roi,breakEvenCpm,breakEvenFill};
    }

    function resetOutputs(){
      ["grossRevenue","afterFeeRevenue","monthlyCost","monthlyNet","periodNet","roi","impressionsK","breakEvenCpm","breakEvenFill","feeAmount"].forEach(k=>refs[k].textContent='-');
      refs.summary.value='';
    }

    function render(){
      const v={
        episodes:Number(refs.episodes.value), downloads:Number(refs.downloads.value), slots:Number(refs.slots.value), fillRate:Number(refs.fillRate.value), cpm:Number(refs.cpm.value), premium:Number(refs.premium.value), networkFee:Number(refs.networkFee.value), prodCost:Number(refs.prodCost.value), monthlyOpex:Number(refs.monthlyOpex.value), months:Number(refs.months.value), oneTime:Number(refs.oneTime.value)
      };
      const err=validate(v);
      refs.error.classList.toggle('show',!!err);
      refs.error.textContent=err;

      if(err){ refs.status.textContent=t('statusCheck'); resetOutputs(); return; }

      const r=compute(v);
      refs.grossRevenue.textContent=money(r.grossRevenue);
      refs.afterFeeRevenue.textContent=money(r.afterFeeRevenue);
      refs.monthlyCost.textContent=money(r.monthlyCost);
      refs.monthlyNet.textContent=money(r.monthlyNet);
      refs.periodNet.textContent=money(r.periodNet);
      refs.roi.textContent=Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞');

      refs.impressionsK.textContent=num(r.impressionsK,1);
      refs.breakEvenCpm.textContent=Number.isFinite(r.breakEvenCpm)&&r.breakEvenCpm>=0?money(r.breakEvenCpm):t('impossible');
      refs.breakEvenFill.textContent=Number.isFinite(r.breakEvenFill)&&r.breakEvenFill>=0&&r.breakEvenFill<=1000?`${num(r.breakEvenFill,2)}%`:t('impossible');
      refs.feeAmount.textContent=money(r.feeAmount);

      refs.status.innerHTML=r.monthlyNet>=0
        ? `<span class="ok">●</span> ${t('statusGood')}`
        : `<span class="warn">●</span> ${t('statusWarn')}`;

      refs.summary.value=[
        t('summaryTitle'),
        `${t('k_gross')}: ${money(r.grossRevenue)}`,
        `${t('k_afterFee')}: ${money(r.afterFeeRevenue)}`,
        `${t('k_cost')}: ${money(r.monthlyCost)}`,
        `${t('k_net')}: ${money(r.monthlyNet)}`,
        `${t('k_period')}: ${money(r.periodNet)}`,
        `${t('k_roi')}: ${Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞')}`,
        `${t('d_breakEvenCpm')}: ${Number.isFinite(r.breakEvenCpm)&&r.breakEvenCpm>=0?money(r.breakEvenCpm):t('impossible')}`,
        `${t('d_breakEvenFill')}: ${Number.isFinite(r.breakEvenFill)&&r.breakEvenFill>=0&&r.breakEvenFill<=1000?`${num(r.breakEvenFill,2)}%`:t('impossible')}`
      ].join('\n');
    }

    refs.copy.addEventListener('click',async()=>{ if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value);alert(t('copied'));}catch{alert(t('copyFail'));} });
    refs.reset.addEventListener('click',()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });
    [refs.episodes,refs.downloads,refs.slots,refs.fillRate,refs.cpm,refs.premium,refs.networkFee,refs.prodCost,refs.monthlyOpex,refs.months,refs.oneTime].forEach(el=>{el.addEventListener('input',render);el.addEventListener('change',render);});
    refs.lang.addEventListener('click',()=>{lang=lang==='ko'?'en':'ko';applyI18n();render();});

    applyI18n();
    render();
  </script>
</body>
</html>
