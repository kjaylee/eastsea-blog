<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pomodoro Task Timer Studio</title>
  <style>
    :root {
      --bg: #0f1222;
      --panel: #171a2e;
      --soft: #222645;
      --text: #ecf0ff;
      --muted: #aeb6d9;
      --accent: #7c8cff;
      --accent-2: #40d9c6;
      --danger: #ff6b81;
      --success: #37d996;
      --radius: 18px;
      --shadow: 0 10px 30px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 10%, #24326d 0, transparent 35%),
                  radial-gradient(circle at 90% 20%, #14403f 0, transparent 30%),
                  var(--bg);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .app {
      width: min(940px, 100%);
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 16px;
    }
    .card {
      background: linear-gradient(160deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    h1 { margin: 0 0 4px; font-size: 1.35rem; }
    .sub { margin: 0; color: var(--muted); font-size: .92rem; }
    .timer-wrap { display: grid; justify-items: center; gap: 10px; margin: 18px 0 8px; }
    .ring {
      width: min(300px, 68vw);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--accent) var(--progress, 0%), rgba(255,255,255,.08) 0);
      padding: 16px;
      transition: background .4s ease;
    }
    .ring-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #0f1330;
      border: 1px solid rgba(255,255,255,.08);
      display: grid;
      place-items: center;
      text-align: center;
    }
    .phase { font-size: .86rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
    .time { font-size: clamp(2rem, 8vw, 3rem); font-weight: 800; line-height: 1; }
    .task { color: var(--accent-2); font-weight: 600; margin-top: 6px; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    button {
      border: 0;
      border-radius: 12px;
      background: var(--soft);
      color: var(--text);
      padding: 10px 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary { background: linear-gradient(120deg,var(--accent),#5fa7ff); }
    button.good { background: linear-gradient(120deg,var(--success),#1abf98); }
    button.warn { background: linear-gradient(120deg,var(--danger),#ff8b6a); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .grid { display: grid; gap: 10px; }
    .settings { margin-top: 10px; grid-template-columns: repeat(3, 1fr); }
    .field { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 10px; }
    .field label { display: block; color: var(--muted); font-size: .8rem; margin-bottom: 6px; }
    input, select {
      width: 100%;
      background: #0d1128;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 10px;
      padding: 8px;
      font: inherit;
    }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .stat { background: rgba(255,255,255,.04); border-radius: 12px; padding: 10px; text-align: center; }
    .stat strong { display: block; font-size: 1.15rem; }
    .todo-list { margin-top: 12px; max-height: 280px; overflow: auto; display: grid; gap: 8px; }
    .todo {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 8px;
    }
    .todo.done span { text-decoration: line-through; color: var(--muted); }
    .todo small { color: var(--muted); }
    .pill {
      display: inline-block;
      padding: 3px 8px;
      background: rgba(64,217,198,.15);
      color: #6ef5e1;
      border-radius: 999px;
      font-size: .72rem;
    }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .settings { grid-template-columns: repeat(2,1fr); }
      .stats { grid-template-columns: repeat(3,1fr); }
    }
    @media (max-width: 520px) {
      .settings { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Pomodoro Task Timer Studio</h1>
      <p class="sub">Focus timer + task queue + session analytics in one screen.</p>

      <div class="timer-wrap">
        <div class="ring" id="ring">
          <div class="ring-inner">
            <div class="phase" id="phase">Focus</div>
            <div class="time" id="time">25:00</div>
            <div class="task" id="activeTask">No active task</div>
          </div>
        </div>
        <div class="btn-row">
          <button id="startBtn" class="primary">Start</button>
          <button id="pauseBtn">Pause</button>
          <button id="skipBtn">Skip Phase</button>
          <button id="resetBtn" class="warn">Reset</button>
        </div>
      </div>

      <div class="grid settings">
        <div class="field">
          <label for="focus">Focus (min)</label>
          <input id="focus" type="number" min="5" max="90" value="25" />
        </div>
        <div class="field">
          <label for="shortBreak">Short Break (min)</label>
          <input id="shortBreak" type="number" min="1" max="30" value="5" />
        </div>
        <div class="field">
          <label for="longBreak">Long Break (min)</label>
          <input id="longBreak" type="number" min="5" max="60" value="15" />
        </div>
      </div>

      <div class="stats">
        <div class="stat"><small>Cycles Today</small><strong id="cycles">0</strong></div>
        <div class="stat"><small>Focus Minutes</small><strong id="minutes">0</strong></div>
        <div class="stat"><small>Completed Tasks</small><strong id="completed">0</strong></div>
      </div>
    </section>

    <section class="card">
      <h2 style="margin:0 0 10px">Task Queue</h2>
      <div class="row">
        <input id="taskInput" placeholder="Add a task (e.g. Draft homepage copy)" />
        <button id="addTaskBtn" class="good">Add</button>
      </div>
      <div class="todo-list" id="todoList"></div>
      <p class="sub" style="margin-top:10px">Tip: Click ▶ on a task to set it as active, and ✓ when done.</p>
    </section>
  </main>

  <script>
    const $ = s => document.querySelector(s);
    const storeKey = 'pomodoro-task-timer-v1';

    const state = {
      focus: 25,
      shortBreak: 5,
      longBreak: 15,
      phase: 'focus',
      remaining: 25 * 60,
      running: false,
      cycles: 0,
      minutes: 0,
      completed: 0,
      activeTaskId: null,
      tasks: []
    };

    let timer = null;

    function load() {
      const raw = localStorage.getItem(storeKey);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        Object.assign(state, data);
      } catch {}
    }

    function save() {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function fmt(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function phaseDuration(phase = state.phase) {
      if (phase === 'focus') return state.focus * 60;
      if (phase === 'short') return state.shortBreak * 60;
      return state.longBreak * 60;
    }

    function phaseLabel() {
      return state.phase === 'focus' ? 'Focus' : (state.phase === 'short' ? 'Short Break' : 'Long Break');
    }

    function setInputs() {
      $('#focus').value = state.focus;
      $('#shortBreak').value = state.shortBreak;
      $('#longBreak').value = state.longBreak;
    }

    function updateRing() {
      const total = phaseDuration();
      const done = Math.max(0, total - state.remaining);
      const pct = total ? (done / total) * 100 : 0;
      $('#ring').style.setProperty('--progress', `${pct}%`);
    }

    function activeTaskText() {
      const t = state.tasks.find(t => t.id === state.activeTaskId);
      return t ? t.text : 'No active task';
    }

    function renderTasks() {
      const list = $('#todoList');
      list.innerHTML = '';
      if (!state.tasks.length) {
        list.innerHTML = '<p class="sub">No tasks yet. Add one to keep your focus sessions grounded.</p>';
        return;
      }

      for (const t of state.tasks) {
        const row = document.createElement('div');
        row.className = 'todo' + (t.done ? ' done' : '');
        row.innerHTML = `
          <button data-act="activate" data-id="${t.id}" title="Set active">▶</button>
          <span>${t.text} ${t.id === state.activeTaskId ? '<span class="pill">Active</span>' : ''}<br><small>${t.pomos} pomodoro(s)</small></span>
          <div style="display:flex;gap:6px">
            <button data-act="done" data-id="${t.id}">✓</button>
            <button data-act="del" data-id="${t.id}">✕</button>
          </div>
        `;
        list.appendChild(row);
      }
    }

    function render() {
      $('#phase').textContent = phaseLabel();
      $('#time').textContent = fmt(state.remaining);
      $('#cycles').textContent = state.cycles;
      $('#minutes').textContent = state.minutes;
      $('#completed').textContent = state.completed;
      $('#activeTask').textContent = activeTaskText();
      setInputs();
      updateRing();
      renderTasks();
      save();
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = 740;
        gain.gain.value = .05;
        osc.connect(gain).connect(ctx.destination);
        osc.start();
        setTimeout(() => { osc.frequency.value = 520; }, 130);
        setTimeout(() => { osc.stop(); ctx.close(); }, 320);
      } catch {}
    }

    function notify(text) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(text);
      }
    }

    function toNextPhase() {
      if (state.phase === 'focus') {
        state.cycles += 1;
        state.minutes += state.focus;
        const t = state.tasks.find(x => x.id === state.activeTaskId);
        if (t) t.pomos += 1;
        state.phase = state.cycles % 4 === 0 ? 'long' : 'short';
      } else {
        state.phase = 'focus';
      }
      state.remaining = phaseDuration();
      beep();
      notify(`${phaseLabel()} started`);
      render();
    }

    function start() {
      if (state.running) return;
      state.running = true;
      timer = setInterval(() => {
        state.remaining -= 1;
        if (state.remaining <= 0) toNextPhase();
        render();
      }, 1000);
      render();
    }

    function pause() {
      state.running = false;
      clearInterval(timer);
      render();
    }

    function reset() {
      pause();
      state.phase = 'focus';
      state.remaining = phaseDuration('focus');
      render();
    }

    $('#startBtn').addEventListener('click', () => {
      if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
      start();
    });
    $('#pauseBtn').addEventListener('click', pause);
    $('#skipBtn').addEventListener('click', toNextPhase);
    $('#resetBtn').addEventListener('click', reset);

    ['focus', 'shortBreak', 'longBreak'].forEach(id => {
      $('#' + id).addEventListener('change', (e) => {
        const val = Math.max(1, Number(e.target.value) || 1);
        state[id] = val;
        if (id === 'focus' && state.phase === 'focus') state.remaining = val * 60;
        if (id === 'shortBreak' && state.phase === 'short') state.remaining = val * 60;
        if (id === 'longBreak' && state.phase === 'long') state.remaining = val * 60;
        render();
      });
    });

    $('#addTaskBtn').addEventListener('click', () => {
      const text = $('#taskInput').value.trim();
      if (!text) return;
      const t = { id: crypto.randomUUID(), text, done: false, pomos: 0 };
      state.tasks.unshift(t);
      if (!state.activeTaskId) state.activeTaskId = t.id;
      $('#taskInput').value = '';
      render();
    });

    $('#taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') $('#addTaskBtn').click();
    });

    $('#todoList').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-act]');
      if (!btn) return;
      const id = btn.dataset.id;
      const t = state.tasks.find(x => x.id === id);
      if (!t) return;
      const act = btn.dataset.act;
      if (act === 'activate') state.activeTaskId = id;
      if (act === 'done') {
        t.done = !t.done;
        if (t.done) state.completed += 1;
        else state.completed = Math.max(0, state.completed - 1);
      }
      if (act === 'del') {
        if (t.done) state.completed = Math.max(0, state.completed - 1);
        state.tasks = state.tasks.filter(x => x.id !== id);
        if (state.activeTaskId === id) state.activeTaskId = state.tasks[0]?.id || null;
      }
      render();
    });

    load();
    state.remaining = Math.min(state.remaining, phaseDuration());
    render();
  </script>
</body>
</html>
