<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출산 예정일 계산기 | 웹 도구 모음</title>
    <meta name="description" content="마지막 생리일 또는 수정일로 출산 예정일, 임신 주수, 삼분기를 계산하세요. Naegele 공식 기반 정확한 예정일 계산.">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent-solid: #f5576c;
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #121212;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #444;
            --shadow: rgba(0, 0, 0, 0.3);
            --card-bg: #2d2d2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 520px; margin: 0 auto; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .back-btn { text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .back-btn:hover { color: var(--text-primary); }
        .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.5rem; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .method-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .method-tab {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .method-tab.active {
            border-color: var(--accent-solid);
            background: linear-gradient(135deg, rgba(240,147,251,0.1), rgba(245,87,108,0.1));
            color: var(--accent-solid);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; color: var(--text-secondary); }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 0 15px;
        }
        .input-wrapper:focus-within { border-color: var(--accent-solid); }

        input[type="date"] {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-primary);
            padding: 12px 0;
            font-size: 1.1rem;
            outline: none;
            font-family: inherit;
        }

        .calc-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .calc-btn:active { transform: scale(0.98); }

        .result-card {
            margin-top: 25px;
            display: none;
        }
        .result-card.show { display: block; }

        .edd-display {
            text-align: center;
            padding: 25px;
            background: var(--bg-secondary);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .edd-label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; margin-bottom: 5px; }
        .edd-date { font-size: 2.2rem; font-weight: 800; background: var(--accent); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .edd-sub { font-size: 0.9rem; color: var(--text-secondary); margin-top: 5px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--accent-solid); }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; }

        .progress-section { margin-bottom: 20px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
        .progress-bar {
            height: 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .trimester-info {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tri-block {
            flex: 1;
            padding: 10px 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            border: 2px solid transparent;
        }
        .tri-block.current {
            border-color: var(--accent-solid);
            color: var(--accent-solid);
            background: linear-gradient(135deg, rgba(240,147,251,0.08), rgba(245,87,108,0.08));
        }

        .milestones { list-style: none; }
        .milestones li {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .milestones li:last-child { border-bottom: none; }
        .milestone-icon { font-size: 1.2rem; }
        .milestone-week { font-weight: 700; color: var(--accent-solid); min-width: 55px; }
        .milestone-passed { opacity: 0.5; }

        .disclaimer {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-btn">← 목록으로</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </header>

        <div class="card">
            <h1>🤰 출산 예정일 계산기</h1>

            <div class="method-tabs">
                <button class="method-tab active" onclick="setMethod('lmp')">마지막 생리 시작일</button>
                <button class="method-tab" onclick="setMethod('conception')">수정일 (배란일)</button>
            </div>

            <div class="input-group">
                <label id="date-label">마지막 생리 시작일</label>
                <div class="input-wrapper">
                    <input type="date" id="input-date">
                </div>
            </div>

            <button class="calc-btn" onclick="calculate()">계산하기</button>

            <div id="result" class="result-card">
                <div class="edd-display">
                    <div class="edd-label">출산 예정일</div>
                    <div class="edd-date" id="edd-date"></div>
                    <div class="edd-sub" id="edd-dday"></div>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-value" id="gest-age"></div>
                        <div class="stat-label">현재 임신 주수</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="weeks-left"></div>
                        <div class="stat-label">남은 주수</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="trimester"></div>
                        <div class="stat-label">삼분기</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="days-pregnant"></div>
                        <div class="stat-label">임신 일수</div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="progress-header">
                        <span>진행률</span>
                        <span id="progress-pct">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
                    </div>
                </div>

                <div class="trimester-info">
                    <div class="tri-block" id="tri1">1삼분기<br><small>1~13주</small></div>
                    <div class="tri-block" id="tri2">2삼분기<br><small>14~27주</small></div>
                    <div class="tri-block" id="tri3">3삼분기<br><small>28~40주</small></div>
                </div>

                <h3 style="font-size:1rem; margin-bottom:10px;">📅 주요 이정표</h3>
                <ul class="milestones" id="milestones"></ul>

                <div class="disclaimer">
                    ⚠️ 이 계산기는 Naegele 공식(마지막 생리일 + 280일)에 기반한 <strong>추정값</strong>입니다. 정확한 예정일은 산부인과 전문의와 상담하세요. 실제 출산일은 예정일 전후 2주 범위에서 달라질 수 있습니다.
                </div>
            </div>
        </div>
    </div>

    <script>
        let method = 'lmp';

        const milestoneData = [
            { week: 6, icon: '💓', text: '심장 박동 확인 가능' },
            { week: 8, icon: '🫘', text: '초음파 확인 가능 (약 1.6cm)' },
            { week: 12, icon: '🔬', text: '1차 기형아 검사 (NT 검사)' },
            { week: 13, icon: '✅', text: '1삼분기 종료' },
            { week: 16, icon: '🦶', text: '태동 느낄 수 있음' },
            { week: 20, icon: '📋', text: '정밀 초음파 (해부학적 검사)' },
            { week: 24, icon: '👁️', text: '눈을 뜨기 시작' },
            { week: 27, icon: '✅', text: '2삼분기 종료' },
            { week: 28, icon: '💉', text: '임신성 당뇨 검사 (GDM)' },
            { week: 32, icon: '👶', text: '태아 위치 확인' },
            { week: 36, icon: '🏥', text: '분만 준비 시작' },
            { week: 37, icon: '🎉', text: '만삭 (Full Term)' },
            { week: 40, icon: '🍼', text: '출산 예정일' },
        ];

        function setMethod(m) {
            method = m;
            document.querySelectorAll('.method-tab').forEach((tab, i) => {
                tab.classList.toggle('active', (i === 0 && m === 'lmp') || (i === 1 && m === 'conception'));
            });
            document.getElementById('date-label').textContent = m === 'lmp' ? '마지막 생리 시작일' : '수정일 (배란일)';
        }

        function calculate() {
            const dateStr = document.getElementById('input-date').value;
            if (!dateStr) return;

            const inputDate = new Date(dateStr + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Calculate LMP date
            let lmpDate;
            if (method === 'lmp') {
                lmpDate = new Date(inputDate);
            } else {
                // Conception is ~14 days after LMP
                lmpDate = new Date(inputDate);
                lmpDate.setDate(lmpDate.getDate() - 14);
            }

            // EDD = LMP + 280 days
            const edd = new Date(lmpDate);
            edd.setDate(edd.getDate() + 280);

            // Check if date is in the future
            if (lmpDate > today) {
                alert('날짜가 미래입니다. 올바른 날짜를 입력해주세요.');
                return;
            }

            // Gestational age in days
            const gestDays = Math.floor((today - lmpDate) / (1000 * 60 * 60 * 24));
            const gestWeeks = Math.floor(gestDays / 7);
            const gestRemainder = gestDays % 7;

            // Past due check
            if (gestDays > 294) { // 42 weeks
                alert('입력한 날짜가 42주를 초과합니다. 날짜를 확인해주세요.');
                return;
            }

            // Weeks remaining
            const daysToEdd = Math.floor((edd - today) / (1000 * 60 * 60 * 24));
            const weeksLeft = Math.max(0, Math.ceil(daysToEdd / 7));

            // Trimester
            let triNum, triText;
            if (gestWeeks < 13) { triNum = 1; triText = '1삼분기'; }
            else if (gestWeeks < 28) { triNum = 2; triText = '2삼분기'; }
            else { triNum = 3; triText = '3삼분기'; }

            // Progress
            const progress = Math.min(100, Math.max(0, (gestDays / 280) * 100));

            // Format EDD
            const eddStr = `${edd.getFullYear()}. ${edd.getMonth() + 1}. ${edd.getDate()}.`;

            // D-day
            let ddayText;
            if (daysToEdd > 0) ddayText = `D-${daysToEdd}`;
            else if (daysToEdd === 0) ddayText = 'D-Day! 🎉';
            else ddayText = `D+${Math.abs(daysToEdd)}`;

            // Update UI
            document.getElementById('edd-date').textContent = eddStr;
            document.getElementById('edd-dday').textContent = ddayText;
            document.getElementById('gest-age').textContent = `${gestWeeks}주 ${gestRemainder}일`;
            document.getElementById('weeks-left').textContent = `${weeksLeft}주`;
            document.getElementById('trimester').textContent = triText;
            document.getElementById('days-pregnant').textContent = `${gestDays}일`;
            document.getElementById('progress-pct').textContent = `${progress.toFixed(1)}%`;
            document.getElementById('progress-fill').style.width = `${progress}%`;

            // Trimester highlight
            document.getElementById('tri1').classList.toggle('current', triNum === 1);
            document.getElementById('tri2').classList.toggle('current', triNum === 2);
            document.getElementById('tri3').classList.toggle('current', triNum === 3);

            // Milestones
            const mlList = document.getElementById('milestones');
            mlList.innerHTML = milestoneData.map(m => {
                const passed = gestWeeks >= m.week;
                return `<li class="${passed ? 'milestone-passed' : ''}">
                    <span class="milestone-icon">${m.icon}</span>
                    <span class="milestone-week">${m.week}주</span>
                    <span>${m.text}</span>
                    ${passed ? '<span style="margin-left:auto;font-size:0.8rem;">✓</span>' : ''}
                </li>`;
            }).join('');

            document.getElementById('result').classList.add('show');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
