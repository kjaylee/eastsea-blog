<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Localization Margin Calculator | 현지화 가격 마진 계산기</title>
  <meta name="description" content="환율, VAT, 마켓플레이스 수수료, 환불률을 반영해 현지 판매가와 목표 마진 달성 가격을 계산하는 글로벌 가격 전략 도구" />
  <style>
    :root{--bg:#081426;--card:#102542;--line:#2c4f7f;--txt:#edf3ff;--muted:#a9c1e2;--pri:#7aa2ff;--soft:#173861;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errBg:rgba(248,113,113,.14)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#234e85 0%,#081426 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.93rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#16345e,#102542);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1c36;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#648af5);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:106px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🌍 현지화 가격 마진 계산기</h1>
        <div class="sub">환율·부가세·플랫폼 수수료·환불률까지 반영해 권장 현지 판매가와 목표 마진 달성 가격을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="currency">현지 통화 코드 (예: USD, JPY)</label><input id="currency" type="text" value="USD" maxlength="6" /></div>
          <div><label for="basePriceKrw">국내 기준 순가격 (KRW, 부가세 제외)</label><input id="basePriceKrw" type="number" min="1" value="59000" /></div>
          <div><label for="fxRate">환율 (현지통화 / KRW)</label><input id="fxRate" type="number" min="0.000001" step="0.000001" value="0.00072" /></div>
          <div><label for="roundUnit">현지 가격 반올림 단위</label><input id="roundUnit" type="number" min="0.0001" step="0.0001" value="0.99" /></div>
          <div><label for="vatRate">현지 VAT/GST (%)</label><input id="vatRate" type="number" min="0" max="100" step="0.1" value="10" /></div>
          <div><label for="marketFeeRate">플랫폼 수수료율 (%)</label><input id="marketFeeRate" type="number" min="0" max="100" step="0.1" value="15" /></div>
          <div><label for="paymentFeeRate">결제 수수료율 (%)</label><input id="paymentFeeRate" type="number" min="0" max="100" step="0.1" value="3.2" /></div>
          <div><label for="refundRate">환불률 (%)</label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="4.5" /></div>
          <div><label for="cogsRate">COGS 비율 (%)</label><input id="cogsRate" type="number" min="0" max="100" step="0.1" value="34" /></div>
          <div><label for="supportCost">주문당 현지 지원비 (현지통화)</label><input id="supportCost" type="number" min="0" step="0.01" value="1.4" /></div>
          <div><label for="targetMargin">목표 영업마진 (%)</label><input id="targetMargin" type="number" min="0" max="95" step="0.1" value="20" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">환산 순가격(현지, VAT 제외)</div><div id="convertedNet" class="v">-</div></div>
          <div class="kpi"><div class="k">권장 현지 판매가(VAT 포함)</div><div id="recommendedList" class="v">-</div></div>
          <div class="kpi"><div class="k">수수료/환불 반영 순매출</div><div id="realizedNet" class="v sm">-</div></div>
          <div class="kpi"><div class="k">주문당 영업이익</div><div id="operatingProfit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">실현 영업마진</div><div id="operatingMargin" class="v sm">-</div></div>
          <div class="kpi"><div class="k">목표 마진 달성 판매가</div><div id="requiredList" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>권장가 기준 VAT 제외 매출</th><td id="netExVat">-</td></tr>
            <tr><th>목표 대비 마진 격차</th><td id="marginGap">-</td></tr>
            <tr><th>플랫폼+결제+환불 차감률</th><td id="totalVariableLoss">-</td></tr>
            <tr><th>권장가(원화 환산)</th><td id="recommendedKrw">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      currency: $("currency"), basePriceKrw: $("basePriceKrw"), fxRate: $("fxRate"), roundUnit: $("roundUnit"), vatRate: $("vatRate"), marketFeeRate: $("marketFeeRate"), paymentFeeRate: $("paymentFeeRate"), refundRate: $("refundRate"), cogsRate: $("cogsRate"), supportCost: $("supportCost"), targetMargin: $("targetMargin"),
      convertedNet: $("convertedNet"), recommendedList: $("recommendedList"), realizedNet: $("realizedNet"), operatingProfit: $("operatingProfit"), operatingMargin: $("operatingMargin"), requiredList: $("requiredList"),
      netExVat: $("netExVat"), marginGap: $("marginGap"), totalVariableLoss: $("totalVariableLoss"), recommendedKrw: $("recommendedKrw"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = { currency: "USD", basePriceKrw: 59000, fxRate: 0.00072, roundUnit: 0.99, vatRate: 10, marketFeeRate: 15, paymentFeeRate: 3.2, refundRate: 4.5, cogsRate: 34, supportCost: 1.4, targetMargin: 20 };
    const krw = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function currencyFormatter(code) {
      const c = (code || "USD").trim().toUpperCase();
      try {
        const f = new Intl.NumberFormat("en-US", { style: "currency", currency: c, maximumFractionDigits: 2 });
        return { code: c, format: (n) => f.format(n || 0) };
      } catch {
        return { code: "LOCAL", format: (n) => `${num(n, 2)} LOCAL` };
      }
    }

    function roundUp(value, unit) {
      if (!Number.isFinite(value) || !Number.isFinite(unit) || unit <= 0) return value;
      return Math.ceil((value + 1e-9) / unit) * unit;
    }

    function validate(v) {
      if (!Number.isFinite(v.basePriceKrw) || v.basePriceKrw <= 0) return "국내 기준 순가격은 0보다 커야 합니다.";
      if (!Number.isFinite(v.fxRate) || v.fxRate <= 0) return "환율은 0보다 커야 합니다.";
      if (!Number.isFinite(v.roundUnit) || v.roundUnit <= 0) return "반올림 단위는 0보다 커야 합니다.";
      if (!Number.isFinite(v.vatRate) || v.vatRate < 0 || v.vatRate >= 100) return "VAT/GST는 0~100 미만 범위여야 합니다.";
      if (!Number.isFinite(v.marketFeeRate) || v.marketFeeRate < 0 || v.marketFeeRate > 100) return "플랫폼 수수료율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.paymentFeeRate) || v.paymentFeeRate < 0 || v.paymentFeeRate > 100) return "결제 수수료율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.refundRate) || v.refundRate < 0 || v.refundRate > 100) return "환불률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.cogsRate) || v.cogsRate < 0 || v.cogsRate > 100) return "COGS 비율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.supportCost) || v.supportCost < 0) return "주문당 지원비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.targetMargin) || v.targetMargin < 0 || v.targetMargin >= 95) return "목표 영업마진은 0~95 미만 범위여야 합니다.";
      return "";
    }

    function render() {
      const v = {
        currency: refs.currency.value,
        basePriceKrw: Number(refs.basePriceKrw.value), fxRate: Number(refs.fxRate.value), roundUnit: Number(refs.roundUnit.value),
        vatRate: Number(refs.vatRate.value), marketFeeRate: Number(refs.marketFeeRate.value), paymentFeeRate: Number(refs.paymentFeeRate.value),
        refundRate: Number(refs.refundRate.value), cogsRate: Number(refs.cogsRate.value), supportCost: Number(refs.supportCost.value), targetMargin: Number(refs.targetMargin.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err) {
        ["convertedNet", "recommendedList", "realizedNet", "operatingProfit", "operatingMargin", "requiredList", "netExVat", "marginGap", "totalVariableLoss", "recommendedKrw"].forEach((k) => refs[k].textContent = "-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const fmt = currencyFormatter(v.currency);
      const vat = v.vatRate / 100;
      const market = v.marketFeeRate / 100;
      const pay = v.paymentFeeRate / 100;
      const refund = v.refundRate / 100;
      const cogs = v.cogsRate / 100;
      const target = v.targetMargin / 100;

      const convertedNet = v.basePriceKrw * v.fxRate;
      const baseListVat = convertedNet * (1 + vat);
      const recommendedList = roundUp(baseListVat, v.roundUnit);
      const netExVat = recommendedList / (1 + vat);
      const realizedNet = netExVat * (1 - market - pay - refund);
      const operatingProfit = realizedNet - netExVat * cogs - v.supportCost;
      const operatingMargin = netExVat > 0 ? (operatingProfit / netExVat) * 100 : -Infinity;
      const marginGap = operatingMargin - v.targetMargin;
      const totalVariableLoss = (market + pay + refund) * 100;

      const denom = 1 - market - pay - refund - cogs - target;
      const requiredNetExVat = denom > 0 ? (v.supportCost / denom) : Infinity;
      const requiredList = Number.isFinite(requiredNetExVat) ? roundUp(requiredNetExVat * (1 + vat), v.roundUnit) : Infinity;
      const recommendedKrw = recommendedList / v.fxRate;

      refs.convertedNet.textContent = fmt.format(convertedNet);
      refs.recommendedList.textContent = fmt.format(recommendedList);
      refs.realizedNet.textContent = fmt.format(realizedNet);
      refs.operatingProfit.textContent = fmt.format(operatingProfit);
      refs.operatingMargin.textContent = `${num(operatingMargin, 2)}%`;
      refs.requiredList.textContent = Number.isFinite(requiredList) ? fmt.format(requiredList) : "달성 불가";

      refs.netExVat.textContent = fmt.format(netExVat);
      refs.marginGap.textContent = `${num(marginGap, 2)}%p`;
      refs.totalVariableLoss.textContent = `${num(totalVariableLoss, 2)}%`;
      refs.recommendedKrw.textContent = krw(recommendedKrw);

      refs.status.innerHTML = marginGap >= 0
        ? `<span class="ok">●</span> 목표 대비 ${num(marginGap, 2)}%p 초과 달성`
        : `<span class="warn">●</span> 목표 대비 ${num(Math.abs(marginGap), 2)}%p 부족 (가격/비용 조정 필요)`;

      refs.summary.value = [
        "[Price Localization Margin 요약]",
        `환산 순가격(부가세 제외): ${fmt.format(convertedNet)}`,
        `권장 판매가(VAT 포함): ${fmt.format(recommendedList)}`,
        `권장가 기준 순매출: ${fmt.format(realizedNet)}`,
        `주문당 영업이익: ${fmt.format(operatingProfit)}`,
        `실현 영업마진: ${num(operatingMargin, 2)}%`,
        `목표 대비 마진 격차: ${num(marginGap, 2)}%p`,
        `목표 마진 달성 판매가: ${Number.isFinite(requiredList) ? fmt.format(requiredList) : "달성 불가"}`,
        `권장가 원화 환산: ${krw(recommendedKrw)}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.currency, refs.basePriceKrw, refs.fxRate, refs.roundUnit, refs.vatRate, refs.marketFeeRate, refs.paymentFeeRate, refs.refundRate, refs.cogsRate, refs.supportCost, refs.targetMargin].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
