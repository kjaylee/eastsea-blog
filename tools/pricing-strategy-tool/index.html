<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가격 전략 시뮬레이터 | Pricing Strategy Tool</title>
  <meta name="description" content="원가, 고정비, 기준 가격, 수요 탄력성을 바탕으로 가격대별 매출/이익을 비교하는 가격 전략 도구입니다." />
  <style>
    :root{--bg:#0e1424;--card:#131d33;--line:#2b3f63;--text:#e6eeff;--muted:#9eb2d8;--pri:#818cf8;--pri2:#22d3ee;--ok:#34d399;--warn:#fbbf24;--bad:#fb7185}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% -5%,#243b68,#0e1424 55%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:1080px;margin:0 auto;padding:18px 14px 44px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.85rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.9rem}
    .back{color:#dbe7ff;text-decoration:none;border:1px solid var(--line);background:#132444;padding:8px 11px;border-radius:10px;font-size:.86rem;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:linear-gradient(160deg,#1a2b4f,#131d33);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 12px 28px rgba(0,0,0,.35)}
    h2{margin:0 0 10px;font-size:1rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:700}
    input,button,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0f1931;color:var(--text);font-size:.92rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#08152f;font-weight:800}.ghost{background:#16294b;border:1px solid var(--line);color:#cfe0ff}
    .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{border:1px solid var(--line);border-radius:12px;padding:10px;background:#0f1931}.k{font-size:.74rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .msg{margin-top:9px;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0f1a31;font-size:.9rem;line-height:1.45}
    .table{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:780px}th,td{padding:8px;border-bottom:1px solid #243d63;font-size:.82rem;text-align:right;white-space:nowrap}th:first-child,td:first-child{text-align:left}th{background:#13274c;color:#bfd0ef;font-size:.76rem}
    .pill{display:inline-block;padding:2px 6px;border-radius:999px;border:1px solid #335485;font-size:.7rem;color:#cfe0ff}
    @media(max-width:920px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>💹 가격 전략 시뮬레이터</h1>
      <p class="sub">가격 변화가 수요/매출/이익에 미치는 영향을 빠르게 비교해 최적 가격대를 찾으세요.</p>
    </div>
    <a class="back" href="/">Back to Portal</a>
  </div>

  <section class="grid">
    <article class="card">
      <h2>기본 가정</h2>
      <div class="two">
        <div><label for="unitCost">단위당 원가 (원)</label><input id="unitCost" type="number" min="0" step="10" value="28000"></div>
        <div><label for="fixedCost">월 고정비 (원)</label><input id="fixedCost" type="number" min="0" step="100000" value="25000000"></div>
        <div><label for="basePrice">현재 판매가 (원)</label><input id="basePrice" type="number" min="1" step="100" value="49000"></div>
        <div><label for="baseVolume">현재 월 판매량 (개)</label><input id="baseVolume" type="number" min="1" step="1" value="1500"></div>
        <div><label for="elasticity">수요 탄력성 (절대값)</label><input id="elasticity" type="number" min="0.1" step="0.1" value="1.4"></div>
        <div><label for="competitorPrice">경쟁사 평균가 (원)</label><input id="competitorPrice" type="number" min="0" step="100" value="47000"></div>
      </div>
      <div class="btns">
        <button id="calcBtn" type="button">시뮬레이션</button>
        <button id="sampleBtn" class="ghost" type="button">샘플</button>
      </div>
    </article>

    <article class="card">
      <h2>추천 가격</h2>
      <div class="kpis">
        <div class="kpi"><div class="k">이익 최대 가격</div><div class="v" id="bestProfitPrice">-</div></div>
        <div class="kpi"><div class="k">예상 월영업이익</div><div class="v" id="bestProfitValue">-</div></div>
        <div class="kpi"><div class="k">매출 최대 가격</div><div class="v" id="bestRevenuePrice">-</div></div>
        <div class="kpi"><div class="k">예상 월매출</div><div class="v" id="bestRevenueValue">-</div></div>
        <div class="kpi"><div class="k">현재 가격 대비 차이</div><div class="v" id="deltaFromBase">-</div></div>
        <div class="kpi"><div class="k">경쟁사 대비</div><div class="v" id="vsCompetitor">-</div></div>
      </div>
      <div class="msg" id="msg">입력값을 바꾸면 자동 계산됩니다.</div>
    </article>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>가격 구간별 결과 (기준가 대비 -30% ~ +30%)</h2>
    <div class="table">
      <table>
        <thead>
          <tr><th>가격</th><th>변화율</th><th>예상 판매량</th><th>월 매출</th><th>월 변동비</th><th>월 공헌이익</th><th>월 영업이익</th><th>비고</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  const $=(id)=>document.getElementById(id);
  const won=(n)=>'₩'+Math.round(n||0).toLocaleString('ko-KR');
  const pct=(v)=>`${(v*100).toFixed(1)}%`;

  function demand(baseVol, basePrice, price, elasticity){
    return Math.max(0, baseVol * Math.pow(price/basePrice, -Math.abs(elasticity)));
  }

  function run(){
    const unitCost=Number($('unitCost').value);
    const fixedCost=Number($('fixedCost').value);
    const basePrice=Number($('basePrice').value);
    const baseVolume=Number($('baseVolume').value);
    const elasticity=Math.max(0.1,Number($('elasticity').value)||1);
    const competitor=Number($('competitorPrice').value);
    if(basePrice<=0||baseVolume<=0){$('msg').textContent='기준 가격/판매량은 1 이상이어야 합니다.';return;}

    const scenarios=[];
    for(let i=-30;i<=30;i+=5){
      const price=basePrice*(1+i/100);
      const volume=demand(baseVolume,basePrice,price,elasticity);
      const revenue=price*volume;
      const varCost=unitCost*volume;
      const contrib=revenue-varCost;
      const profit=contrib-fixedCost;
      scenarios.push({price,change:i/100,volume,revenue,varCost,contrib,profit});
    }

    const byProfit=[...scenarios].sort((a,b)=>b.profit-a.profit)[0];
    const byRevenue=[...scenarios].sort((a,b)=>b.revenue-a.revenue)[0];

    $('bestProfitPrice').textContent=won(byProfit.price);
    $('bestProfitValue').textContent=won(byProfit.profit);
    $('bestProfitValue').className=`v ${byProfit.profit>=0?'ok':'bad'}`;
    $('bestRevenuePrice').textContent=won(byRevenue.price);
    $('bestRevenueValue').textContent=won(byRevenue.revenue);

    const delta=(byProfit.price-basePrice)/basePrice;
    $('deltaFromBase').textContent=pct(delta);
    $('deltaFromBase').className=`v ${delta>0?'warn':delta<0?'ok':'"'}`;

    const comp = competitor>0 ? (byProfit.price-competitor)/competitor : 0;
    $('vsCompetitor').textContent=competitor>0 ? `${pct(comp)} (${comp>=0?'고가':'저가'})` : '입력 필요';

    const recommendation = byProfit.price > basePrice
      ? '프리미엄/스키밍 전략'
      : byProfit.price < basePrice
      ? '침투/점유율 확대 전략'
      : '현 가격 유지 전략';

    $('msg').innerHTML = `추천: <strong>${recommendation}</strong>. 이익 최대 구간은 <strong>${won(byProfit.price)}</strong>이며 예상 월영업이익은 <strong>${won(byProfit.profit)}</strong> 입니다.`;

    $('rows').innerHTML=scenarios.map(s=>{
      const note = s.price===byProfit.price ? '<span class="pill">이익 최대</span>' : s.price===byRevenue.price ? '<span class="pill">매출 최대</span>' : '';
      return `<tr>
        <td>${won(s.price)}</td>
        <td>${pct(s.change)}</td>
        <td>${Math.round(s.volume).toLocaleString('ko-KR')}개</td>
        <td>${won(s.revenue)}</td>
        <td>${won(s.varCost)}</td>
        <td>${won(s.contrib)}</td>
        <td class="${s.profit>=0?'ok':'bad'}">${won(s.profit)}</td>
        <td style="text-align:left">${note}</td>
      </tr>`;
    }).join('');
  }

  $('calcBtn').addEventListener('click',run);
  $('sampleBtn').addEventListener('click',()=>{
    $('unitCost').value=21500;
    $('fixedCost').value=18000000;
    $('basePrice').value=39000;
    $('baseVolume').value=2200;
    $('elasticity').value=1.1;
    $('competitorPrice').value=37000;
    run();
  });
  ['unitCost','fixedCost','basePrice','baseVolume','elasticity','competitorPrice'].forEach(id=>$(id).addEventListener('input',run));
  run();
</script>
</body>
</html>
