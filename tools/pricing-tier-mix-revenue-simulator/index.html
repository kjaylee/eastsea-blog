<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing Tier Mix Revenue Simulator | 가격 티어 믹스 매출 시뮬레이터</title>
  <meta name="description" content="Basic/Pro/Enterprise 고객 비중과 가격·원가를 입력해 티어별 매출, ARPU, 순이익, 손익분기 고객수를 계산합니다." />
  <style>
    :root{--bg:#0f1527;--card:#161f3a;--line:#324267;--txt:#eef4ff;--muted:#a8b7d6;--pri:#60a5fa;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#27417a 0,var(--bg) 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 60px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.15rem,2.8vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.5}
    .home{text-decoration:none;color:#dbeafe;background:#14294e;border:1px solid var(--line);border-radius:11px;padding:8px 12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.08fr .92fr;gap:12px}
    .card{background:linear-gradient(165deg,#1a2a4d,var(--card));border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#10182f;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb)}
    .soft{background:#18345f;border:1px solid var(--line)}
    textarea{resize:vertical;min-height:96px;margin-top:10px}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3d45;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#101b35;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#173457;color:#d9eaff;font-size:.78rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>💼 가격 티어 믹스 매출 시뮬레이터</h1>
        <div class="sub">고객 티어 비중, 가격, 원가, 할인율을 조합해 총 매출·마진·손익분기 고객수를 빠르게 검증합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="totalCustomers">총 유료 고객 수</label><input id="totalCustomers" type="number" min="1" step="1" value="3200" /></div>
          <div><label for="discountPct">평균 할인율 (%)</label><input id="discountPct" type="number" min="0" max="80" step="0.1" value="8" /></div>

          <div><label for="basicShare">Basic 비중 (%)</label><input id="basicShare" type="number" min="0" max="100" step="0.1" value="54" /></div>
          <div><label for="basicPrice">Basic 월 가격 (KRW)</label><input id="basicPrice" type="number" min="1" step="100" value="19000" /></div>
          <div><label for="basicCost">Basic 1인 원가 (KRW)</label><input id="basicCost" type="number" min="0" step="100" value="3200" /></div>

          <div><label for="proShare">Pro 비중 (%)</label><input id="proShare" type="number" min="0" max="100" step="0.1" value="34" /></div>
          <div><label for="proPrice">Pro 월 가격 (KRW)</label><input id="proPrice" type="number" min="1" step="100" value="59000" /></div>
          <div><label for="proCost">Pro 1인 원가 (KRW)</label><input id="proCost" type="number" min="0" step="100" value="11200" /></div>

          <div><label for="enterpriseShare">Enterprise 비중 (%)</label><input id="enterpriseShare" type="number" min="0" max="100" step="0.1" value="12" /></div>
          <div><label for="enterprisePrice">Enterprise 월 가격 (KRW)</label><input id="enterprisePrice" type="number" min="1" step="100" value="159000" /></div>
          <div><label for="enterpriseCost">Enterprise 1인 원가 (KRW)</label><input id="enterpriseCost" type="number" min="0" step="100" value="30500" /></div>

          <div><label for="fixedMonthlyCost">월 고정비 (KRW)</label><input id="fixedMonthlyCost" type="number" min="0" step="1000" value="42000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 총매출</div><div id="totalRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순이익</div><div id="netProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">ARPU</div><div id="arpu" class="v">-</div></div>
          <div class="kpi"><div class="k">총 마진율</div><div id="grossMargin" class="v">-</div></div>
          <div class="kpi"><div class="k">순이익률</div><div id="netMargin" class="v">-</div></div>
          <div class="kpi"><div class="k">손익분기 고객수</div><div id="breakEvenCustomers" class="v">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">티어별 결과</h2>
        <table>
          <tbody>
            <tr><th>Basic 고객/매출</th><td id="basicLine">-</td></tr>
            <tr><th>Pro 고객/매출</th><td id="proLine">-</td></tr>
            <tr><th>Enterprise 고객/매출</th><td id="entLine">-</td></tr>
            <tr><th>총 원가</th><td id="totalCost">-</td></tr>
            <tr><th>총 공헌이익(고정비 차감 전)</th><td id="contribution">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      totalCustomers: $('totalCustomers'), discountPct: $('discountPct'),
      basicShare: $('basicShare'), basicPrice: $('basicPrice'), basicCost: $('basicCost'),
      proShare: $('proShare'), proPrice: $('proPrice'), proCost: $('proCost'),
      enterpriseShare: $('enterpriseShare'), enterprisePrice: $('enterprisePrice'), enterpriseCost: $('enterpriseCost'),
      fixedMonthlyCost: $('fixedMonthlyCost'),
      totalRevenue: $('totalRevenue'), netProfit: $('netProfit'), arpu: $('arpu'), grossMargin: $('grossMargin'), netMargin: $('netMargin'),
      breakEvenCustomers: $('breakEvenCustomers'), basicLine: $('basicLine'), proLine: $('proLine'), entLine: $('entLine'), totalCost: $('totalCost'),
      contribution: $('contribution'), status: $('status'), error: $('error'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = {
      totalCustomers: 3200, discountPct: 8,
      basicShare: 54, basicPrice: 19000, basicCost: 3200,
      proShare: 34, proPrice: 59000, proCost: 11200,
      enterpriseShare: 12, enterprisePrice: 159000, enterpriseCost: 30500,
      fixedMonthlyCost: 42000000
    };

    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const nfmt = (n, d = 1) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });
    const inRange = (n, min, max) => Number.isFinite(n) && n >= min && n <= max;

    function validate(v) {
      if (!Number.isInteger(v.totalCustomers) || !inRange(v.totalCustomers, 1, 100_000_000)) return '총 유료 고객 수는 1 이상의 정수여야 합니다.';
      if (!inRange(v.discountPct, 0, 80)) return '평균 할인율은 0~80% 범위여야 합니다.';
      if (![v.basicShare, v.proShare, v.enterpriseShare].every((x) => inRange(x, 0, 100))) return '티어 비중은 각각 0~100% 범위여야 합니다.';

      const sumShare = v.basicShare + v.proShare + v.enterpriseShare;
      if (Math.abs(sumShare - 100) > 0.05) return `티어 비중 합계가 100%가 아닙니다. (현재 ${nfmt(sumShare, 2)}%)`;

      const priceFields = [v.basicPrice, v.proPrice, v.enterprisePrice];
      if (!priceFields.every((x) => inRange(x, 1, 100_000_000))) return '각 티어 가격은 1원 이상이어야 합니다.';

      const costFields = [v.basicCost, v.proCost, v.enterpriseCost];
      if (!costFields.every((x) => inRange(x, 0, 100_000_000))) return '각 티어 원가는 0 이상이어야 합니다.';

      if (!inRange(v.fixedMonthlyCost, 0, 10_000_000_000)) return '월 고정비는 0 이상이어야 합니다.';
      return '';
    }

    function compute(v) {
      const discountFactor = 1 - v.discountPct / 100;

      const tier = {
        basic: {
          customers: v.totalCustomers * (v.basicShare / 100),
          price: v.basicPrice * discountFactor,
          cost: v.basicCost
        },
        pro: {
          customers: v.totalCustomers * (v.proShare / 100),
          price: v.proPrice * discountFactor,
          cost: v.proCost
        },
        enterprise: {
          customers: v.totalCustomers * (v.enterpriseShare / 100),
          price: v.enterprisePrice * discountFactor,
          cost: v.enterpriseCost
        }
      };

      for (const k of Object.keys(tier)) {
        tier[k].revenue = tier[k].customers * tier[k].price;
        tier[k].cogs = tier[k].customers * tier[k].cost;
      }

      const totalRevenue = tier.basic.revenue + tier.pro.revenue + tier.enterprise.revenue;
      const totalCost = tier.basic.cogs + tier.pro.cogs + tier.enterprise.cogs;
      const contribution = totalRevenue - totalCost;
      const netProfit = contribution - v.fixedMonthlyCost;
      const arpu = totalRevenue / v.totalCustomers;
      const grossMargin = totalRevenue > 0 ? (contribution / totalRevenue) * 100 : 0;
      const netMargin = totalRevenue > 0 ? (netProfit / totalRevenue) * 100 : 0;

      const weightedContributionPerCustomer = contribution / v.totalCustomers;
      const breakEvenCustomers = weightedContributionPerCustomer > 0 ? (v.fixedMonthlyCost / weightedContributionPerCustomer) : null;

      return { tier, totalRevenue, totalCost, contribution, netProfit, arpu, grossMargin, netMargin, breakEvenCustomers };
    }

    function clearOutputs() {
      ['totalRevenue', 'netProfit', 'arpu', 'grossMargin', 'netMargin', 'breakEvenCustomers', 'basicLine', 'proLine', 'entLine', 'totalCost', 'contribution'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function render() {
      const v = {
        totalCustomers: Number(refs.totalCustomers.value),
        discountPct: Number(refs.discountPct.value),
        basicShare: Number(refs.basicShare.value), basicPrice: Number(refs.basicPrice.value), basicCost: Number(refs.basicCost.value),
        proShare: Number(refs.proShare.value), proPrice: Number(refs.proPrice.value), proCost: Number(refs.proCost.value),
        enterpriseShare: Number(refs.enterpriseShare.value), enterprisePrice: Number(refs.enterprisePrice.value), enterpriseCost: Number(refs.enterpriseCost.value),
        fixedMonthlyCost: Number(refs.fixedMonthlyCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        clearOutputs();
        return;
      }

      const r = compute(v);

      refs.totalRevenue.textContent = won(r.totalRevenue);
      refs.netProfit.textContent = won(r.netProfit);
      refs.arpu.textContent = won(r.arpu);
      refs.grossMargin.textContent = `${nfmt(r.grossMargin, 2)}%`;
      refs.netMargin.textContent = `${nfmt(r.netMargin, 2)}%`;
      refs.breakEvenCustomers.textContent = r.breakEvenCustomers === null ? '미도달(공헌이익/고객 ≤ 0)' : `${nfmt(r.breakEvenCustomers, 1)}명`;

      refs.basicLine.textContent = `${nfmt(r.tier.basic.customers, 1)}명 / ${won(r.tier.basic.revenue)}`;
      refs.proLine.textContent = `${nfmt(r.tier.pro.customers, 1)}명 / ${won(r.tier.pro.revenue)}`;
      refs.entLine.textContent = `${nfmt(r.tier.enterprise.customers, 1)}명 / ${won(r.tier.enterprise.revenue)}`;
      refs.totalCost.textContent = won(r.totalCost);
      refs.contribution.textContent = won(r.contribution);

      if (r.netProfit > 0) refs.status.innerHTML = `<span class="good">●</span> 현재 티어 믹스는 월 흑자 (${won(r.netProfit)})`;
      else if (Math.abs(r.netProfit) < 1) refs.status.innerHTML = `<span class="warn">●</span> 손익분기 근접`;
      else refs.status.innerHTML = `<span class="bad">●</span> 월 적자 (${won(r.netProfit)})`;

      refs.summary.value = [
        '[Pricing Tier Mix Revenue Simulator 요약]',
        `총 고객수: ${nfmt(v.totalCustomers, 0)}명 / 할인율: ${nfmt(v.discountPct, 2)}%`,
        `티어 비중(B/P/E): ${nfmt(v.basicShare,1)}% / ${nfmt(v.proShare,1)}% / ${nfmt(v.enterpriseShare,1)}%`,
        `월 총매출: ${won(r.totalRevenue)}`,
        `월 공헌이익: ${won(r.contribution)} / 월 순이익: ${won(r.netProfit)}`,
        `ARPU: ${won(r.arpu)} / 총 마진율: ${nfmt(r.grossMargin,2)}%`,
        `손익분기 고객수: ${r.breakEvenCustomers === null ? '미도달' : `${nfmt(r.breakEvenCustomers,1)}명`}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, val]) => { refs[k].value = val; });
      render();
    });

    [
      refs.totalCustomers, refs.discountPct, refs.basicShare, refs.basicPrice, refs.basicCost,
      refs.proShare, refs.proPrice, refs.proCost, refs.enterpriseShare, refs.enterprisePrice,
      refs.enterpriseCost, refs.fixedMonthlyCost
    ].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
