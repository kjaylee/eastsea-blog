<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing Uplift ROI Calculator | 가격 인상 ROI 계산기</title>
  <meta name="description" content="가격 인상 시 판매량 변화까지 반영해 월/연 증분이익, ROI, 회수기간, 허용 가능한 판매량 감소율을 계산합니다." />
  <style>
    :root{--bg:#071325;--card:#10203d;--line:#2d4878;--txt:#ebf3ff;--muted:#a8bad8;--pri:#6aa7ff;--err:#f87171;--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#22467f 0%,#071325 47%);color:var(--txt)}
    .wrap{max-width:1060px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.22rem,2.8vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#dbe8ff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#0f1f3d;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#162e58,#10203d);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0c1831;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5b80f2);font-weight:700}
    .soft{background:#18315f;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:96px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1b36;border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;gap:6px;align-items:center;margin-top:10px;padding:4px 9px;border:1px solid var(--line);border-radius:999px;background:#163260;color:#c4d8fb;font-size:.75rem}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>💸 가격 인상 ROI 계산기</h1>
        <div class="sub">가격 인상률과 판매량 변화율을 함께 반영해 실제 이익 개선 효과를 검증합니다.</div>
      </div>
      <a class="home" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="units">월 판매량 (건)</label><input id="units" type="number" min="1" value="4200" /></div>
          <div><label for="price">현재 단가 (KRW)</label><input id="price" type="number" min="1" value="38000" /></div>
          <div><label for="cost">단위 원가 (KRW)</label><input id="cost" type="number" min="0" value="21000" /></div>
          <div><label for="uplift">가격 인상률 (%)</label><input id="uplift" type="number" step="0.1" min="-90" max="300" value="8" /></div>
          <div><label for="volumeChange">예상 판매량 변화율 (%)</label><input id="volumeChange" type="number" step="0.1" min="-99" max="300" value="-4" /></div>
          <div><label for="implCost">실행비용 (KRW)</label><input id="implCost" type="number" min="0" value="12000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 증분이익</div><div id="monthlyDelta" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 증분이익</div><div id="annualDelta" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI (연간)</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">현재 월 총이익</div><div id="currentGross" class="v sm">-</div></div>
          <div class="kpi"><div class="k">인상 후 월 총이익</div><div id="newGross" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>인상 후 단가</th><td id="newPrice">-</td></tr>
            <tr><th>인상 후 예상 판매량</th><td id="newUnits">-</td></tr>
            <tr><th>허용 가능한 최대 판매량 감소율</th><td id="maxDrop">-</td></tr>
            <tr><th>실행비용</th><td id="implCostOut">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      units:$('units'), price:$('price'), cost:$('cost'), uplift:$('uplift'), volumeChange:$('volumeChange'), implCost:$('implCost'),
      monthlyDelta:$('monthlyDelta'), annualDelta:$('annualDelta'), roi:$('roi'), payback:$('payback'), currentGross:$('currentGross'), newGross:$('newGross'),
      newPrice:$('newPrice'), newUnits:$('newUnits'), maxDrop:$('maxDrop'), implCostOut:$('implCostOut'),
      status:$('status'), error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = { units:4200, price:38000, cost:21000, uplift:8, volumeChange:-4, implCost:12000000 };
    const money = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.units) || v.units <= 0) return '월 판매량은 1 이상이어야 합니다.';
      if (!Number.isFinite(v.price) || v.price <= 0) return '현재 단가는 0보다 커야 합니다.';
      if (!Number.isFinite(v.cost) || v.cost < 0) return '단위 원가는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.uplift) || v.uplift <= -90 || v.uplift > 300) return '가격 인상률은 -90 초과 ~ 300 이하로 입력하세요.';
      if (!Number.isFinite(v.volumeChange) || v.volumeChange <= -99 || v.volumeChange > 300) return '판매량 변화율은 -99 초과 ~ 300 이하로 입력하세요.';
      if (!Number.isFinite(v.implCost) || v.implCost < 0) return '실행비용은 0 이상이어야 합니다.';
      const newPrice = v.price * (1 + v.uplift / 100);
      if (newPrice <= v.cost) return '인상 후 단가가 단위 원가보다 커야 합니다.';
      const newUnits = v.units * (1 + v.volumeChange / 100);
      if (newUnits <= 0) return '인상 후 예상 판매량이 0보다 커야 합니다.';
      return '';
    }

    function compute(v){
      const newPrice = v.price * (1 + v.uplift / 100);
      const newUnits = v.units * (1 + v.volumeChange / 100);
      const currentGross = v.units * (v.price - v.cost);
      const newGross = newUnits * (newPrice - v.cost);
      const monthlyDelta = newGross - currentGross;
      const annualDelta = monthlyDelta * 12;
      const roi = v.implCost === 0 ? Infinity : ((annualDelta - v.implCost) / v.implCost) * 100;
      const payback = v.implCost === 0 ? 0 : (monthlyDelta <= 0 ? Infinity : v.implCost / monthlyDelta);
      const requiredUnitsForBreakEven = currentGross / (newPrice - v.cost);
      const maxDrop = (1 - requiredUnitsForBreakEven / v.units) * 100;
      return { newPrice, newUnits, currentGross, newGross, monthlyDelta, annualDelta, roi, payback, maxDrop };
    }

    function render(){
      const v = {
        units:Number(refs.units.value), price:Number(refs.price.value), cost:Number(refs.cost.value),
        uplift:Number(refs.uplift.value), volumeChange:Number(refs.volumeChange.value), implCost:Number(refs.implCost.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        ['monthlyDelta','annualDelta','roi','payback','currentGross','newGross','newPrice','newUnits','maxDrop','implCostOut'].forEach(k=>refs[k].textContent='-');
        refs.status.textContent = '입력값을 확인하세요';
        refs.summary.value = '';
        return;
      }

      const r = compute(v);
      refs.monthlyDelta.textContent = money(r.monthlyDelta);
      refs.annualDelta.textContent = money(r.annualDelta);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : '∞';
      refs.payback.textContent = r.payback === 0 ? '즉시' : (Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가');
      refs.currentGross.textContent = money(r.currentGross);
      refs.newGross.textContent = money(r.newGross);
      refs.newPrice.textContent = money(r.newPrice);
      refs.newUnits.textContent = `${num(r.newUnits,0)}건`;
      refs.maxDrop.textContent = `${num(r.maxDrop,2)}%`;
      refs.implCostOut.textContent = money(v.implCost);

      refs.status.innerHTML = r.monthlyDelta > 0
        ? `<span class="ok">●</span> 월 ${money(r.monthlyDelta)} 이익 개선`
        : (r.monthlyDelta === 0 ? `● 증분이익 없음` : `<span class="warn">●</span> 월 ${money(Math.abs(r.monthlyDelta))} 이익 감소`);

      refs.summary.value = [
        '[Pricing Uplift ROI 요약]',
        `현재 월 총이익: ${money(r.currentGross)}`,
        `인상 후 월 총이익: ${money(r.newGross)}`,
        `월 증분이익: ${money(r.monthlyDelta)}`,
        `연간 증분이익: ${money(r.annualDelta)}`,
        `ROI(연간): ${Number.isFinite(r.roi) ? num(r.roi,1)+'%' : '∞'}`,
        `회수기간: ${r.payback===0?'즉시':(Number.isFinite(r.payback)?num(r.payback,1)+'개월':'회수 불가')}`,
        `허용 가능한 최대 판매량 감소율: ${num(r.maxDrop,2)}%`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.units,refs.price,refs.cost,refs.uplift,refs.volumeChange,refs.implCost].forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
