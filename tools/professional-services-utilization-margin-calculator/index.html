<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Services Utilization & Margin Calculator | 프로페셔널 서비스 가동률·마진 계산기</title>
  <meta name="description" content="프로페셔널 서비스 팀의 가동률, 청구 요율, 비용 구조를 바탕으로 월 매출·마진·손익분기 가동률을 계산합니다." />
  <style>
    :root{--bg:#0b1222;--card:#111c30;--line:#2c3f61;--txt:#edf3ff;--muted:#a8b6cf;--pri:#6a8bff;--soft:#172640;--ok:#34d399;--warn:#f59e0b;--err:#fecaca;--errBg:rgba(248,113,113,.16)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#243a63 0%,#0b1222 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px} .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)} .sub{margin-top:6px;color:var(--muted);font-size:.93rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f1b33;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px} .card{background:linear-gradient(165deg,#172844,#111c30);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem} .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px} input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c162b;color:var(--txt);font-size:.93rem}
    textarea{min-height:110px;resize:vertical;margin-top:10px} button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#8aa7ff);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)} .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem} .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px} .kpi{border:1px solid var(--line);background:#0e1a32;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px} .v{font-size:1.05rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#1a2c4c;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word} th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🛠️ 프로페셔널 서비스 가동률·마진 계산기</h1>
        <div class="sub">가동률과 요율을 바꾸었을 때 월 매출, 운영이익, 손익분기 가동률을 빠르게 확인합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="headcount">컨설턴트 인원</label><input id="headcount" type="number" min="1" value="18" /></div>
          <div><label for="hoursPerConsultant">1인 월 가용 시간 (h)</label><input id="hoursPerConsultant" type="number" min="1" value="160" /></div>
          <div><label for="utilizationRate">가동률 (%)</label><input id="utilizationRate" type="number" min="0" max="100" step="0.1" value="72" /></div>
          <div><label for="billableRate">시간당 청구 요율 (₩)</label><input id="billableRate" type="number" min="1" value="180000" /></div>
          <div><label for="monthlyCost">컨설턴트 월 비용 (₩)</label><input id="monthlyCost" type="number" min="0" value="7500000" /></div>
          <div><label for="subcontractorMix">외주 믹스 (%)</label><input id="subcontractorMix" type="number" min="0" max="100" step="0.1" value="15" /></div>
          <div><label for="subcontractorCost">외주 시간당 비용 (₩)</label><input id="subcontractorCost" type="number" min="0" value="110000" /></div>
          <div><label for="overheadRate">오버헤드 비율 (%)</label><input id="overheadRate" type="number" min="0" max="100" step="0.1" value="18" /></div>
          <div><label for="toolingCost">1인 월 툴 비용 (₩)</label><input id="toolingCost" type="number" min="0" value="250000" /></div>
          <div><label for="targetMargin">목표 운영 마진 (%)</label><input id="targetMargin" type="number" min="0" max="100" step="0.1" value="25" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 청구 매출</div><div id="revenue" class="v">-</div></div>
          <div class="kpi"><div class="k">운영이익</div><div id="operatingProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">운영 마진</div><div id="operatingMargin" class="v">-</div></div>
          <div class="kpi"><div class="k">손익분기 가동률</div><div id="breakEvenUtil" class="v">-</div></div>
          <div class="kpi"><div class="k">목표 마진 요율</div><div id="requiredRate" class="v">-</div></div>
          <div class="kpi"><div class="k">1인당 이익</div><div id="profitPerConsultant" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>빌러블 시간</th><td id="billableHours">-</td></tr>
            <tr><th>내부 인건비</th><td id="internalCost">-</td></tr>
            <tr><th>외주 비용</th><td id="subCost">-</td></tr>
            <tr><th>오버헤드 비용</th><td id="overheadCost">-</td></tr>
            <tr><th>툴 비용</th><td id="toolingTotal">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      headcount: $("headcount"), hoursPerConsultant: $("hoursPerConsultant"), utilizationRate: $("utilizationRate"), billableRate: $("billableRate"), monthlyCost: $("monthlyCost"),
      subcontractorMix: $("subcontractorMix"), subcontractorCost: $("subcontractorCost"), overheadRate: $("overheadRate"), toolingCost: $("toolingCost"), targetMargin: $("targetMargin"),
      revenue: $("revenue"), operatingProfit: $("operatingProfit"), operatingMargin: $("operatingMargin"), breakEvenUtil: $("breakEvenUtil"), requiredRate: $("requiredRate"), profitPerConsultant: $("profitPerConsultant"),
      billableHours: $("billableHours"), internalCost: $("internalCost"), subCost: $("subCost"), overheadCost: $("overheadCost"), toolingTotal: $("toolingTotal"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = {
      headcount: 18, hoursPerConsultant: 160, utilizationRate: 72, billableRate: 180000, monthlyCost: 7500000,
      subcontractorMix: 15, subcontractorCost: 110000, overheadRate: 18, toolingCost: 250000, targetMargin: 25
    };

    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(Number.isFinite(n) ? n : 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v){
      if (!Number.isFinite(v.headcount) || v.headcount <= 0) return "컨설턴트 인원은 1명 이상이어야 합니다.";
      if (!Number.isFinite(v.hoursPerConsultant) || v.hoursPerConsultant <= 0) return "가용 시간은 0보다 커야 합니다.";
      if (!Number.isFinite(v.utilizationRate) || v.utilizationRate < 0 || v.utilizationRate > 100) return "가동률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.billableRate) || v.billableRate <= 0) return "청구 요율은 0보다 커야 합니다.";
      if (!Number.isFinite(v.monthlyCost) || v.monthlyCost < 0) return "월 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.subcontractorMix) || v.subcontractorMix < 0 || v.subcontractorMix > 100) return "외주 믹스는 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.subcontractorCost) || v.subcontractorCost < 0) return "외주 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.overheadRate) || v.overheadRate < 0 || v.overheadRate > 100) return "오버헤드는 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.toolingCost) || v.toolingCost < 0) return "툴 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.targetMargin) || v.targetMargin < 0 || v.targetMargin > 100) return "목표 마진은 0~100% 범위여야 합니다.";
      return "";
    }

    function render(){
      const v = {
        headcount: Number(refs.headcount.value), hoursPerConsultant: Number(refs.hoursPerConsultant.value), utilizationRate: Number(refs.utilizationRate.value), billableRate: Number(refs.billableRate.value), monthlyCost: Number(refs.monthlyCost.value),
        subcontractorMix: Number(refs.subcontractorMix.value), subcontractorCost: Number(refs.subcontractorCost.value), overheadRate: Number(refs.overheadRate.value), toolingCost: Number(refs.toolingCost.value), targetMargin: Number(refs.targetMargin.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err){
        ["revenue","operatingProfit","operatingMargin","breakEvenUtil","requiredRate","profitPerConsultant","billableHours","internalCost","subCost","overheadCost","toolingTotal"].forEach((k)=>refs[k].textContent="-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const utilization = v.utilizationRate / 100;
      const subMix = v.subcontractorMix / 100;
      const overhead = v.overheadRate / 100;
      const targetMargin = v.targetMargin / 100;

      const billableHours = v.headcount * v.hoursPerConsultant * utilization;
      const revenue = billableHours * v.billableRate;
      const internalCost = v.headcount * v.monthlyCost;
      const subHours = billableHours * subMix;
      const subCost = subHours * v.subcontractorCost;
      const toolingTotal = v.headcount * v.toolingCost;
      const overheadCost = revenue * overhead;
      const operatingProfit = revenue - internalCost - subCost - toolingTotal - overheadCost;
      const operatingMargin = revenue > 0 ? (operatingProfit / revenue) * 100 : 0;
      const profitPerConsultant = v.headcount > 0 ? operatingProfit / v.headcount : 0;

      const denomUtil = v.headcount * v.hoursPerConsultant * (v.billableRate * (1 - overhead) - (subMix * v.subcontractorCost));
      const breakEvenUtil = denomUtil > 0 ? (internalCost + toolingTotal) / denomUtil : Infinity;

      const denomRate = billableHours * (1 - overhead - targetMargin);
      const requiredRate = denomRate > 0 ? (billableHours * subMix * v.subcontractorCost + internalCost + toolingTotal) / denomRate : Infinity;

      refs.revenue.textContent = money(revenue);
      refs.operatingProfit.textContent = money(operatingProfit);
      refs.operatingMargin.textContent = `${num(operatingMargin,2)}%`;
      refs.breakEvenUtil.textContent = Number.isFinite(breakEvenUtil) ? `${num(Math.max(0, breakEvenUtil * 100),2)}%` : "N/A";
      refs.requiredRate.textContent = Number.isFinite(requiredRate) ? `${money(requiredRate)}/h` : "N/A";
      refs.profitPerConsultant.textContent = money(profitPerConsultant);
      refs.billableHours.textContent = `${num(billableHours,2)}h`;
      refs.internalCost.textContent = money(internalCost);
      refs.subCost.textContent = money(subCost);
      refs.overheadCost.textContent = money(overheadCost);
      refs.toolingTotal.textContent = money(toolingTotal);

      refs.status.innerHTML = operatingProfit > 0
        ? `<span class="ok">●</span> 운영이익 ${money(operatingProfit)} (수익성 양호)`
        : `<span class="warn">●</span> 운영이익 ${money(operatingProfit)} (가동률/요율 조정 필요)`;

      refs.summary.value = [
        "[Professional Services Utilization 요약]",
        `월 청구 매출: ${money(revenue)}`,
        `운영이익: ${money(operatingProfit)}`,
        `운영 마진: ${num(operatingMargin,2)}%`,
        `손익분기 가동률: ${Number.isFinite(breakEvenUtil) ? `${num(Math.max(0, breakEvenUtil*100),2)}%` : "N/A"}`,
        `목표 마진 요율: ${Number.isFinite(requiredRate) ? `${money(requiredRate)}/h` : "N/A"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k,v]) => refs[k].value = v);
      render();
    });

    [refs.headcount, refs.hoursPerConsultant, refs.utilizationRate, refs.billableRate, refs.monthlyCost, refs.subcontractorMix, refs.subcontractorCost, refs.overheadRate, refs.toolingCost, refs.targetMargin].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
