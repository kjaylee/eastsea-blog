<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Resource Capacity Planner | 프로젝트 리소스 용량 플래너</title>
  <meta name="description" content="프로젝트 기간, 필요 공수, 팀별 가용시간을 기반으로 용량 부족분, 필요 인력(FTE), 예상 인건비를 계산합니다." />
  <style>
    :root{--bg:#f4f7fc;--card:#fff;--line:#d8e2f3;--text:#12223f;--muted:#63779a;--pri:#365dff;--soft:#ebf2ff;--ok:#059669;--warn:#d97706;--bad:#dc2626}
    @media (prefers-color-scheme: dark){
      :root{--bg:#0a1220;--card:#101a2f;--line:#243756;--text:#e8efff;--muted:#99afd3;--pri:#80a2ff;--soft:#14233f;--ok:#34d399;--warn:#fbbf24;--bad:#f87171}
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}
    .wrap{max-width:1180px;margin:0 auto;padding:20px 14px 56px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.24rem,2.6vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.94rem;line-height:1.45}
    .home{white-space:nowrap;border:1px solid var(--line);border-radius:12px;padding:9px 12px;text-decoration:none;color:var(--text);background:var(--card)}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
    h2{margin:0 0 10px;font-size:1rem}
    .base{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px 11px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:.92rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right;vertical-align:middle}
    th:first-child,td:first-child{text-align:left}
    th{color:var(--muted)}
    .cellInput{width:100%;padding:8px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text)}
    .role{min-width:86px}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{border:none;background:var(--pri);color:#fff;font-weight:700;cursor:pointer}
    .ghost{background:var(--soft);color:var(--text);border:1px solid var(--line);font-weight:600}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid rgba(220,38,38,.4);border-radius:10px;background:rgba(220,38,38,.08);color:var(--bad);font-size:.86rem}
    .error.show{display:block}
    textarea{min-height:88px;margin-top:10px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{padding:10px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,var(--card),var(--soft))}
    .k{font-size:.77rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800}
    .pill{display:inline-flex;gap:7px;align-items:center;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:var(--soft);font-size:.78rem;margin-top:10px}
    .up{color:var(--ok)}.mid{color:var(--warn)}.down{color:var(--bad)}
    @media(max-width:980px){.grid{grid-template-columns:1fr}.base{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🗂️ 프로젝트 리소스 용량 플래너</h1>
        <div class="sub">프로젝트 기간과 팀별 투입 역량을 비교해 <strong>용량 부족/초과, 추가 필요 FTE, 예상 인건비</strong>를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>프로젝트 기본정보</h2>
        <div class="base">
          <div><label for="startDate">시작일</label><input id="startDate" type="date"></div>
          <div><label for="endDate">종료일</label><input id="endDate" type="date"></div>
          <div><label for="requiredHours">기준 필요공수 (시간)</label><input id="requiredHours" type="number" min="1" value="2200"></div>
          <div><label for="riskBuffer">리스크 버퍼 (%)</label><input id="riskBuffer" type="number" min="0" max="200" step="1" value="15"></div>
          <div><label for="externalCost">외주/툴 고정비 (KRW)</label><input id="externalCost" type="number" min="0" value="5000000"></div>
          <div><label for="billRate">내부 청구단가(참고, KRW/시간)</label><input id="billRate" type="number" min="0" value="120000"></div>
        </div>

        <h2 style="margin-top:12px">팀 구성</h2>
        <table>
          <thead>
            <tr>
              <th>역할</th>
              <th>인원</th>
              <th>주당시간</th>
              <th>가동률(%)</th>
              <th>시간당 비용</th>
            </tr>
          </thead>
          <tbody id="teamBody"></tbody>
        </table>

        <div class="btns">
          <button class="ghost" type="button" id="copyBtn">요약 복사</button>
          <button type="button" id="resetBtn">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>용량 분석 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">프로젝트 기간</div><div id="weeks" class="v">-</div></div>
          <div class="kpi"><div class="k">버퍼 반영 필요공수</div><div id="needHours" class="v">-</div></div>
          <div class="kpi"><div class="k">팀 가용공수</div><div id="availHours" class="v">-</div></div>
          <div class="kpi"><div class="k">용량 차이(가용-필요)</div><div id="gapHours" class="v">-</div></div>
          <div class="kpi"><div class="k">추가 필요 인력 (FTE)</div><div id="needFte" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 총원가</div><div id="totalCost" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 내부매출(참고)</div><div id="estimatedRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 마진율</div><div id="marginRate" class="v">-</div></div>
        </div>

        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">시나리오(요구공수 변화)</h2>
        <table>
          <thead><tr><th>시나리오</th><th>필요공수</th><th>용량 차이</th><th>권장조치</th></tr></thead>
          <tbody id="scenarioBody"></tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const teamDefaults = [
      {role:'PM', head:1, hours:25, util:70, cost:65000},
      {role:'디자이너', head:1, hours:32, util:80, cost:58000},
      {role:'개발자', head:3, hours:38, util:82, cost:72000},
      {role:'QA', head:1, hours:30, util:75, cost:50000}
    ];

    const $ = (id)=>document.getElementById(id);
    const refs = {
      startDate:$('startDate'), endDate:$('endDate'), requiredHours:$('requiredHours'), riskBuffer:$('riskBuffer'), externalCost:$('externalCost'), billRate:$('billRate'),
      teamBody:$('teamBody'), weeks:$('weeks'), needHours:$('needHours'), availHours:$('availHours'), gapHours:$('gapHours'), needFte:$('needFte'), totalCost:$('totalCost'), estimatedRevenue:$('estimatedRevenue'), marginRate:$('marginRate'),
      status:$('status'), scenarioBody:$('scenarioBody'), error:$('error'), summary:$('summary'), copyBtn:$('copyBtn'), resetBtn:$('resetBtn')
    };

    const won = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=1)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function setDefaultDates(){
      const now = new Date();
      const end = new Date(now.getTime() + 84 * 24 * 60 * 60 * 1000);
      const toStr = (d)=>d.toISOString().slice(0,10);
      refs.startDate.value = toStr(now);
      refs.endDate.value = toStr(end);
    }

    function renderTeamRows(){
      refs.teamBody.innerHTML = teamDefaults.map((t,i)=>`
        <tr>
          <td><input class="cellInput role" data-k="role" data-i="${i}" value="${t.role}"></td>
          <td><input class="cellInput" data-k="head" data-i="${i}" type="number" min="0" value="${t.head}"></td>
          <td><input class="cellInput" data-k="hours" data-i="${i}" type="number" min="0" value="${t.hours}"></td>
          <td><input class="cellInput" data-k="util" data-i="${i}" type="number" min="0" max="100" value="${t.util}"></td>
          <td><input class="cellInput" data-k="cost" data-i="${i}" type="number" min="0" value="${t.cost}"></td>
        </tr>
      `).join('');
    }

    function readTeam(){
      return [...refs.teamBody.querySelectorAll('tr')].map((row)=>{
        const get = (k)=>row.querySelector(`[data-k="${k}"]`).value;
        return {
          role:get('role').trim()||'역할',
          head:Number(get('head')),
          hours:Number(get('hours')),
          util:Number(get('util')),
          cost:Number(get('cost'))
        };
      });
    }

    function validate(v, team){
      if (!v.startDate || !v.endDate) return '시작일과 종료일을 입력하세요.';
      if (new Date(v.endDate) <= new Date(v.startDate)) return '종료일은 시작일보다 뒤여야 합니다.';
      if (!Number.isFinite(v.requiredHours) || v.requiredHours <= 0) return '필요공수는 0보다 커야 합니다.';
      if (!Number.isFinite(v.riskBuffer) || v.riskBuffer < 0 || v.riskBuffer > 200) return '리스크 버퍼는 0~200 범위여야 합니다.';
      if (!Number.isFinite(v.externalCost) || v.externalCost < 0) return '외주/툴 고정비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.billRate) || v.billRate < 0) return '내부 청구단가는 0 이상이어야 합니다.';
      for (const t of team){
        if (!Number.isFinite(t.head) || t.head < 0) return `${t.role}: 인원은 0 이상이어야 합니다.`;
        if (!Number.isFinite(t.hours) || t.hours < 0) return `${t.role}: 주당시간은 0 이상이어야 합니다.`;
        if (!Number.isFinite(t.util) || t.util < 0 || t.util > 100) return `${t.role}: 가동률은 0~100 범위여야 합니다.`;
        if (!Number.isFinite(t.cost) || t.cost < 0) return `${t.role}: 시간당 비용은 0 이상이어야 합니다.`;
      }
      if (team.every(t=>t.head===0)) return '최소 1개 역할의 인원이 필요합니다.';
      return '';
    }

    function compute(v, team){
      const ms = new Date(v.endDate) - new Date(v.startDate);
      const weeks = ms / (1000*60*60*24*7);
      const needHours = v.requiredHours * (1 + v.riskBuffer / 100);

      const roleAvail = team.map(t => t.head * t.hours * (t.util / 100) * weeks);
      const availHours = roleAvail.reduce((s,n)=>s+n,0);
      const gapHours = availHours - needHours;

      const totalHead = team.reduce((s,t)=>s+t.head,0);
      const avgEffPerFteWeek = totalHead === 0 ? 0 : team.reduce((s,t)=>s + (t.hours * (t.util/100) * t.head),0) / totalHead;
      const needFte = gapHours >= 0 || avgEffPerFteWeek === 0 ? 0 : Math.abs(gapHours) / (weeks * avgEffPerFteWeek);

      let laborCost = 0;
      if (availHours > 0){
        team.forEach((t,idx)=>{
          const used = Math.min(roleAvail[idx], needHours * (roleAvail[idx] / availHours));
          laborCost += used * t.cost;
        });
      }
      const totalCost = laborCost + v.externalCost;
      const estimatedRevenue = needHours * v.billRate;
      const marginRate = estimatedRevenue === 0 ? 0 : ((estimatedRevenue - totalCost) / estimatedRevenue) * 100;

      return { weeks, needHours, availHours, gapHours, needFte, totalCost, estimatedRevenue, marginRate };
    }

    function actionText(gap){
      if (gap >= 120) return '여유 있음 (병행 프로젝트 가능)';
      if (gap >= 0) return '적정 (현 인력 유지)';
      if (gap > -160) return '경미 부족 (우선순위 조정)';
      return '부족 심각 (인력 보강 권장)';
    }

    function render(){
      const v = {
        startDate: refs.startDate.value, endDate: refs.endDate.value, requiredHours:Number(refs.requiredHours.value),
        riskBuffer:Number(refs.riskBuffer.value), externalCost:Number(refs.externalCost.value), billRate:Number(refs.billRate.value)
      };
      const team = readTeam();
      const err = validate(v, team);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        refs.summary.value='';
        refs.status.textContent='입력값을 확인하세요';
        refs.scenarioBody.innerHTML='';
        ['weeks','needHours','availHours','gapHours','needFte','totalCost','estimatedRevenue','marginRate'].forEach(k=>refs[k].textContent='-');
        return;
      }

      const r = compute(v, team);
      refs.weeks.textContent = `${num(r.weeks,1)}주`;
      refs.needHours.textContent = `${num(r.needHours,0)}h`;
      refs.availHours.textContent = `${num(r.availHours,0)}h`;
      refs.gapHours.textContent = `${r.gapHours>=0?'+':''}${num(r.gapHours,0)}h`;
      refs.needFte.textContent = `${num(r.needFte,2)}명`;
      refs.totalCost.textContent = won(r.totalCost);
      refs.estimatedRevenue.textContent = won(r.estimatedRevenue);
      refs.marginRate.textContent = `${num(r.marginRate,1)}%`;

      refs.status.innerHTML = r.gapHours >= 0
        ? `<span class="up">●</span> 현재 인력으로 납기 대응 가능`
        : r.gapHours > -120
          ? `<span class="mid">●</span> 납기 리스크 존재 (일정/범위 조정 필요)`
          : `<span class="down">●</span> 인력 보강 없이는 납기 위험이 큼`;

      const scenarios = [
        {name:'낙관 (-10%)', factor:0.9},
        {name:'기준 (현재)', factor:1.0},
        {name:'비관 (+15%)', factor:1.15}
      ];
      refs.scenarioBody.innerHTML = scenarios.map(s=>{
        const need = r.needHours * s.factor;
        const gap = r.availHours - need;
        return `<tr>
          <td>${s.name}</td>
          <td>${num(need,0)}h</td>
          <td>${gap>=0?'+':''}${num(gap,0)}h</td>
          <td>${actionText(gap)}</td>
        </tr>`;
      }).join('');

      refs.summary.value = [
        '[프로젝트 리소스 용량 요약]',
        `기간: ${v.startDate} ~ ${v.endDate} (${num(r.weeks,1)}주)`,
        `버퍼 반영 필요공수: ${num(r.needHours,0)}h`,
        `팀 가용공수: ${num(r.availHours,0)}h`,
        `용량 차이: ${r.gapHours>=0?'+':''}${num(r.gapHours,0)}h`,
        `추가 필요 인력(FTE): ${num(r.needFte,2)}명`,
        `예상 총원가: ${won(r.totalCost)}`,
        `예상 내부매출(참고): ${won(r.estimatedRevenue)}`,
        `예상 마진율: ${num(r.marginRate,1)}%`
      ].join('\n');
    }

    refs.copyBtn.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약을 복사했습니다.'); }
      catch { alert('클립보드 권한이 없어 수동 복사가 필요합니다.'); }
    });

    refs.resetBtn.addEventListener('click', ()=>{
      setDefaultDates();
      refs.requiredHours.value = 2200;
      refs.riskBuffer.value = 15;
      refs.externalCost.value = 5000000;
      refs.billRate.value = 120000;
      renderTeamRows();
      bindTeamEvents();
      render();
    });

    function bindTeamEvents(){
      refs.teamBody.querySelectorAll('input').forEach((el)=>{
        ['input','change'].forEach((ev)=>el.addEventListener(ev, render));
      });
    }

    ['input','change'].forEach((ev)=>{
      [refs.startDate, refs.endDate, refs.requiredHours, refs.riskBuffer, refs.externalCost, refs.billRate].forEach((el)=>el.addEventListener(ev, render));
    });

    setDefaultDates();
    renderTeamRows();
    bindTeamEvents();
    render();
  </script>
</body>
</html>
