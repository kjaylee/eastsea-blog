<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR 코드 일괄 생성기 | EastSea Tools</title>
  <meta name="description" content="텍스트/CSV를 붙여넣어 QR 코드를 한 번에 생성하고 ZIP으로 다운로드하세요." />
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --line: #dbe3ef;
      --text: #0f172a;
      --sub: #475569;
      --brand: #2563eb;
      --brand-2: #1d4ed8;
      --ok: #059669;
      --warn: #b45309;
      --radius: 14px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }
    h1 {
      margin: 8px 0 4px;
      font-size: clamp(1.35rem, 4vw, 2rem);
    }
    .lead {
      color: var(--sub);
      margin: 0 0 18px;
      font-size: 0.96rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    label {
      font-size: 0.88rem;
      font-weight: 700;
      display: block;
      margin: 6px 0;
    }
    textarea, input, select, button {
      font: inherit;
    }
    textarea, input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
    }
    textarea { min-height: 240px; resize: vertical; }
    .row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
    }
    .hint {
      margin-top: 8px;
      color: var(--sub);
      font-size: 0.82rem;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      white-space: pre-wrap;
    }
    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .primary { background: var(--brand); color: #fff; }
    .primary:hover { background: var(--brand-2); }
    .ghost {
      background: #eef2ff;
      color: #1e3a8a;
      border: 1px solid #c7d2fe;
    }
    .ok { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .warn { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
    .status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--sub);
      min-height: 1.3em;
    }
    .toolbar {
      margin: 14px 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .count {
      font-weight: 700;
      color: #1d4ed8;
    }
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }
    .item canvas {
      width: 100%;
      height: auto;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
    }
    .item .name {
      margin-top: 8px;
      font-size: 0.83rem;
      font-weight: 700;
      word-break: break-all;
    }
    .item .text {
      margin-top: 4px;
      font-size: 0.74rem;
      color: var(--sub);
      max-height: 3.1em;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item .download {
      margin-top: 8px;
      width: 100%;
      padding: 8px 10px;
      font-size: 0.82rem;
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }
    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>QR 코드 일괄 생성기</h1>
    <p class="lead">여러 줄 텍스트 또는 CSV를 입력하면 QR 코드를 한 번에 생성하고 ZIP으로 내려받을 수 있습니다.</p>

    <section class="grid">
      <article class="card">
        <label for="bulkInput">입력 데이터</label>
        <textarea id="bulkInput" placeholder="한 줄에 하나씩 또는 CSV 형식으로 입력하세요.
예시 (줄바꿈):
https://eastsea.blog
결제용 코드 1001

예시 (CSV):
text,label
https://eastsea.blog,홈페이지
010-1234-5678,고객센터"></textarea>

        <div class="row">
          <div>
            <label for="mode">해석 모드</label>
            <select id="mode">
              <option value="auto">자동 감지</option>
              <option value="lines">줄바꿈 텍스트</option>
              <option value="csv">CSV (text,label)</option>
            </select>
          </div>
          <div>
            <label for="size">QR 크기(px)</label>
            <input id="size" type="number" min="120" max="1200" step="10" value="280" />
          </div>
          <div>
            <label for="margin">여백</label>
            <input id="margin" type="number" min="0" max="8" step="1" value="2" />
          </div>
        </div>

        <div class="hint">CSV는 첫 열을 QR 내용(text/data), 두 번째 열을 파일명(label)로 사용합니다.
헤더(text,label)는 자동으로 건너뜁니다.</div>

        <div class="btns">
          <button class="primary" id="generateBtn">QR 일괄 생성</button>
          <button class="ghost" id="sampleBtn">샘플 데이터 넣기</button>
          <button class="warn" id="clearBtn">초기화</button>
        </div>
        <p class="status" id="status">입력 후 "QR 일괄 생성"을 누르세요.</p>
      </article>

      <article class="card">
        <div class="toolbar">
          <span class="count" id="countText">생성된 QR: 0개</span>
          <div class="btns" style="margin:0">
            <button class="ok" id="zipBtn" disabled>ZIP 다운로드</button>
            <button class="ghost" id="csvBtn" disabled>파일명 CSV 다운로드</button>
          </div>
        </div>
        <div class="results" id="results"></div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const els = {
      input: document.getElementById('bulkInput'),
      mode: document.getElementById('mode'),
      size: document.getElementById('size'),
      margin: document.getElementById('margin'),
      status: document.getElementById('status'),
      countText: document.getElementById('countText'),
      results: document.getElementById('results'),
      zipBtn: document.getElementById('zipBtn'),
      csvBtn: document.getElementById('csvBtn'),
      generateBtn: document.getElementById('generateBtn')
    };

    let generatedItems = [];

    function parseCSVLine(line) {
      const cols = [];
      let cur = '';
      let inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuote && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQuote = !inQuote;
          }
        } else if (ch === ',' && !inQuote) {
          cols.push(cur.trim());
          cur = '';
        } else {
          cur += ch;
        }
      }
      cols.push(cur.trim());
      return cols;
    }

    function sanitizeName(name, index) {
      const cleaned = (name || `qr-${index + 1}`)
        .replace(/[\\/:*?"<>|\u0000-\u001F]/g, '_')
        .replace(/\s+/g, '_')
        .replace(/^_+|_+$/g, '')
        .slice(0, 50);
      return cleaned || `qr-${index + 1}`;
    }

    function parseInput(raw, mode) {
      const lines = raw.split(/\r?\n/).map(v => v.trim()).filter(Boolean);
      if (!lines.length) return [];

      const items = [];
      lines.forEach((line, i) => {
        let finalMode = mode;
        if (mode === 'auto') {
          finalMode = line.includes(',') ? 'csv' : 'lines';
        }

        if (finalMode === 'csv') {
          const [text = '', label = ''] = parseCSVLine(line);
          if (!text) return;

          if (i === 0) {
            const t = text.toLowerCase();
            const l = label.toLowerCase();
            const isHeader = /^(text|data|payload|내용)$/i.test(t) && /^(label|name|filename|파일명|title)$/i.test(l);
            if (isHeader) return;
          }

          items.push({ text, label: sanitizeName(label || text, items.length) });
        } else {
          items.push({ text: line, label: sanitizeName('', items.length) });
        }
      });

      return items;
    }

    function setStatus(msg, isError = false) {
      els.status.textContent = msg;
      els.status.style.color = isError ? '#b91c1c' : '#475569';
    }

    function updateMeta() {
      els.countText.textContent = `생성된 QR: ${generatedItems.length}개`;
      els.zipBtn.disabled = generatedItems.length === 0;
      els.csvBtn.disabled = generatedItems.length === 0;
    }

    async function renderBatch(items, size, margin) {
      els.results.innerHTML = '';
      generatedItems = [];

      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const canvas = document.createElement('canvas');

        await QRCode.toCanvas(canvas, item.text, {
          errorCorrectionLevel: 'M',
          width: size,
          margin,
          color: { dark: '#000000', light: '#ffffff' }
        });

        const box = document.createElement('div');
        box.className = 'item';
        const fileName = sanitizeName(item.label, i);

        const nameEl = document.createElement('div');
        nameEl.className = 'name';
        nameEl.textContent = `${fileName}.png`;

        const txtEl = document.createElement('div');
        txtEl.className = 'text';
        txtEl.textContent = item.text;

        const dlBtn = document.createElement('button');
        dlBtn.className = 'download';
        dlBtn.textContent = '개별 다운로드';
        dlBtn.addEventListener('click', () => downloadCanvas(canvas, `${fileName}.png`));

        box.append(canvas, nameEl, txtEl, dlBtn);
        els.results.appendChild(box);

        generatedItems.push({ fileName, text: item.text, canvas });
      }

      updateMeta();
    }

    function downloadCanvas(canvas, fileName) {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1200);
      }, 'image/png');
    }

    async function downloadZip() {
      if (!generatedItems.length) return;
      els.zipBtn.disabled = true;
      els.zipBtn.textContent = 'ZIP 생성 중...';

      try {
        const zip = new JSZip();
        const metaRows = ['index,file_name,text'];

        for (let i = 0; i < generatedItems.length; i++) {
          const { fileName, text, canvas } = generatedItems[i];
          const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
          zip.file(`${String(i + 1).padStart(3, '0')}_${fileName}.png`, blob);
          metaRows.push(`${i + 1},"${fileName}.png","${text.replace(/"/g, '""')}"`);
        }

        zip.file('manifest.csv', metaRows.join('\n'));
        const blob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `qr-batch-${new Date().toISOString().slice(0, 10)}.zip`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1800);
      } catch (err) {
        console.error(err);
        setStatus('ZIP 생성에 실패했습니다. 다시 시도해주세요.', true);
      } finally {
        els.zipBtn.disabled = false;
        els.zipBtn.textContent = 'ZIP 다운로드';
      }
    }

    function downloadCSV() {
      if (!generatedItems.length) return;
      const rows = ['index,file_name,text'];
      generatedItems.forEach((item, idx) => {
        rows.push(`${idx + 1},"${item.fileName}.png","${item.text.replace(/"/g, '""')}"`);
      });
      const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `qr-batch-map-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function handleGenerate() {
      const raw = els.input.value.trim();
      if (!raw) {
        setStatus('먼저 QR로 만들 데이터를 입력해주세요.', true);
        return;
      }

      const size = Math.min(1200, Math.max(120, Number(els.size.value) || 280));
      const margin = Math.min(8, Math.max(0, Number(els.margin.value) || 2));
      const items = parseInput(raw, els.mode.value);

      if (!items.length) {
        setStatus('유효한 입력을 찾지 못했습니다. 형식을 확인해주세요.', true);
        return;
      }
      if (items.length > 500) {
        setStatus('최대 500개까지 지원합니다. 데이터를 나눠서 생성해주세요.', true);
        return;
      }

      try {
        els.generateBtn.disabled = true;
        setStatus(`QR 생성 중... (${items.length}개)`);
        await renderBatch(items, size, margin);
        setStatus(`${items.length}개의 QR 코드를 생성했습니다.`);
      } catch (err) {
        console.error(err);
        setStatus('QR 생성 중 오류가 발생했습니다.', true);
      } finally {
        els.generateBtn.disabled = false;
      }
    }

    document.getElementById('sampleBtn').addEventListener('click', () => {
      els.input.value = [
        'text,label',
        'https://eastsea.blog,홈페이지',
        'PAY:ORDER-2026-001,주문_001',
        '010-1234-5678,고객센터',
        '재고코드:A-19-77,물류_코드'
      ].join('\n');
      setStatus('샘플 데이터를 불러왔습니다.');
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      els.input.value = '';
      els.results.innerHTML = '';
      generatedItems = [];
      updateMeta();
      setStatus('초기화되었습니다.');
    });

    els.generateBtn.addEventListener('click', handleGenerate);
    els.zipBtn.addEventListener('click', downloadZip);
    els.csvBtn.addEventListener('click', downloadCSV);

    updateMeta();
  </script>
</body>
</html>
