<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="📖 읽기 시간 측정기 - 브라우저에서 바로 사용할 수 있는 빠른 계산/생성 도구입니다. 무료 온라인 도구 | Free online tool at eastsea.monster" />
    <title>읽기 시간 측정기 | 웹 도구 모음</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #121212;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #444;
            --shadow: rgba(0, 0, 0, 0.3);
            --card-bg: #2d2d2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: 0 auto; }
        
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--text-primary); }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #667eea;
        }

        .settings {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 10px;
            align-items: center;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-item label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .setting-item input {
            width: 70px;
            padding: 6px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            text-align: center;
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .settings { flex-direction: column; align-items: stretch; }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-btn">← 목록으로</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </header>

        <div class="card">
            <h1>📖 읽기 시간 측정기</h1>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="readingTime">0분</div>
                    <div class="stat-label">읽기 시간</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">단어 수</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="charCount">0</div>
                    <div class="stat-label">글자 수</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="lineCount">0</div>
                    <div class="stat-label">줄 수</div>
                </div>
            </div>

            <textarea id="textInput" placeholder="텍스트를 입력하거나 붙여넣으세요..."></textarea>

            <div class="settings">
                <div class="setting-item">
                    <label>읽기 속도 (단어/분)</label>
                    <input type="number" id="wpm" value="200" min="50" max="500" onchange="calculate()">
                </div>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        
        textInput.addEventListener('input', calculate);

        function calculate() {
            const text = textInput.value;
            const wpm = parseInt(document.getElementById('wpm').value) || 200;

            // Word count (한글+영문)
            const koreanWords = (text.match(/[가-힣]+/g) || []).join('').length;
            const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
            const totalWords = koreanWords + englishWords;

            // Character count (excluding spaces)
            const chars = text.replace(/\s/g, '').length;

            // Line count
            const lines = text.split('\n').length;

            // Reading time
            const minutes = Math.ceil(totalWords / wpm);
            const readingTime = minutes === 0 ? '1분 미만' : `${minutes}분`;

            // Update UI
            document.getElementById('readingTime').textContent = readingTime;
            document.getElementById('wordCount').textContent = totalWords.toLocaleString();
            document.getElementById('charCount').textContent = chars.toLocaleString();
            document.getElementById('lineCount').textContent = lines.toLocaleString();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Sample text
        const sampleText = `웹 개발은 끊임없이 변화하는 분야입니다. 새로운 기술과 프레임워크가 계속 등장하며, 개발자들은 최신 트렌드를 따라잡기 위해 노력합니다.

React, Vue, Angular와 같은 프론트엔드 프레임워크는 현대 웹 개발의 필수 도구가 되었습니다. 이들은 컴포넌트 기반 아키텍처를 제공하여 재사용 가능하고 유지보수가 쉬운 코드를 작성할 수 있게 합니다.`;

        textInput.value = sampleText;
        calculate();
    </script>
</body>
</html>
