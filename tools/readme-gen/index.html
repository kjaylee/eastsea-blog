<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README.md 생성기 | README Generator</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#fff;--bg2:#f8f9fa;--text:#212529;--text2:#6c757d;--accent:#667eea;--border:#dee2e6;--shadow:rgba(0,0,0,.1);--card:#fff;--code-bg:#f1f3f5}
        [data-theme="dark"]{--bg:#1a1a1a;--bg2:#2d2d2d;--text:#f8f9fa;--text2:#adb5bd;--border:#495057;--shadow:rgba(0,0,0,.3);--card:#2d2d2d;--code-bg:#3d3d3d}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg2);color:var(--text);padding:20px;min-height:100vh;transition:all .3s}
        .container{max-width:1000px;margin:0 auto}
        header{text-align:center;margin-bottom:30px}
        h1{font-size:1.8rem;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .subtitle{color:var(--text2);font-size:.95rem}
        .theme-toggle{position:fixed;top:15px;right:15px;background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;z-index:10}
        .home-btn{position:fixed;top:15px;left:15px;text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;z-index:10}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .panel{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px var(--shadow)}
        .panel h2{font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .field{margin-bottom:10px}
        label{display:block;font-size:.82rem;font-weight:600;margin-bottom:4px;color:var(--text2)}
        input,select,textarea{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--bg);color:var(--text);transition:border .3s;font-family:inherit}
        input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
        textarea{resize:vertical;min-height:60px}
        .section-toggle{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
        .toggle-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:.8rem;transition:all .2s}
        .toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .toggle-btn:hover{border-color:var(--accent)}
        .output-col{position:sticky;top:20px;height:fit-content}
        .output{width:100%;min-height:600px;padding:16px;border:1px solid var(--border);border-radius:8px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.8rem;line-height:1.6;background:var(--code-bg);color:var(--text);resize:vertical;white-space:pre-wrap}
        .btn-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
        .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
        .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.4)}
        .btn-secondary{background:#e9ecef;color:var(--text)}
        [data-theme="dark"] .btn-secondary{background:#3d3d3d}
        .badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
        .badge-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-size:.75rem;transition:all .2s}
        .badge-btn.active{background:#51cf66;color:#fff;border-color:#51cf66}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;z-index:100}
        .toast.show{opacity:1}
        @media(max-width:700px){.grid{grid-template-columns:1fr}h1{font-size:1.4rem}.output{min-height:300px}}
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <a href="/" class="home-btn" title="도구 목록">🏠</a>
    <button class="theme-toggle" onclick="toggleTheme()" title="테마 전환">🌓</button>
    <div class="container">
        <header>
            <h1>📄 README.md 생성기</h1>
            <p class="subtitle">프로젝트 정보를 입력하면 README.md를 자동 생성합니다</p>
        </header>
        <div class="section-toggle" id="sections">
            <button class="toggle-btn active" data-section="basic">📋 기본</button>
            <button class="toggle-btn active" data-section="badges">🏷️ 배지</button>
            <button class="toggle-btn active" data-section="features">✨ 기능</button>
            <button class="toggle-btn active" data-section="install">📦 설치</button>
            <button class="toggle-btn active" data-section="usage">🚀 사용법</button>
            <button class="toggle-btn active" data-section="api">📡 API</button>
            <button class="toggle-btn active" data-section="contributing">🤝 기여</button>
            <button class="toggle-btn active" data-section="license">📜 라이선스</button>
        </div>
        <div class="grid">
            <div>
                <div class="panel" data-for="basic">
                    <h2>📋 기본 정보</h2>
                    <div class="field"><label>프로젝트 이름</label><input type="text" id="projName" value="My Awesome Project" oninput="gen()"></div>
                    <div class="field"><label>한 줄 설명</label><input type="text" id="projDesc" value="프로젝트에 대한 간단한 설명을 입력하세요" oninput="gen()"></div>
                    <div class="field"><label>상세 설명</label><textarea id="projLongDesc" rows="3" oninput="gen()">이 프로젝트는 ...</textarea></div>
                    <div class="field"><label>GitHub 사용자/레포</label><input type="text" id="ghRepo" value="username/repo" oninput="gen()"></div>
                    <div class="field"><label>데모 URL</label><input type="text" id="demoUrl" placeholder="https://demo.example.com" oninput="gen()"></div>
                    <div class="field"><label>스크린샷 URL</label><input type="text" id="screenshot" placeholder="https://via.placeholder.com/800x400" oninput="gen()"></div>
                </div>
                <div class="panel" data-for="badges">
                    <h2>🏷️ 배지</h2>
                    <div class="badge-row" id="badgeList">
                        <button class="badge-btn active" data-badge="license" onclick="toggleBadge(this)">License</button>
                        <button class="badge-btn" data-badge="version" onclick="toggleBadge(this)">Version</button>
                        <button class="badge-btn" data-badge="build" onclick="toggleBadge(this)">Build</button>
                        <button class="badge-btn" data-badge="stars" onclick="toggleBadge(this)">Stars</button>
                        <button class="badge-btn" data-badge="forks" onclick="toggleBadge(this)">Forks</button>
                        <button class="badge-btn" data-badge="issues" onclick="toggleBadge(this)">Issues</button>
                        <button class="badge-btn" data-badge="prs" onclick="toggleBadge(this)">PRs Welcome</button>
                        <button class="badge-btn" data-badge="npm" onclick="toggleBadge(this)">npm</button>
                        <button class="badge-btn" data-badge="downloads" onclick="toggleBadge(this)">Downloads</button>
                        <button class="badge-btn" data-badge="coverage" onclick="toggleBadge(this)">Coverage</button>
                    </div>
                </div>
                <div class="panel" data-for="features">
                    <h2>✨ 주요 기능</h2>
                    <textarea id="features" rows="5" oninput="gen()" placeholder="기능을 한 줄에 하나씩 입력하세요">빠른 성능
모바일 반응형 디자인
다크 모드 지원
TypeScript 지원
쉬운 설정</textarea>
                </div>
                <div class="panel" data-for="install">
                    <h2>📦 설치</h2>
                    <div class="field"><label>패키지 매니저</label>
                        <select id="pkgManager" onchange="gen()">
                            <option value="npm">npm</option><option value="yarn">yarn</option><option value="pnpm">pnpm</option><option value="pip">pip</option><option value="cargo">cargo</option><option value="go">go</option>
                        </select>
                    </div>
                    <div class="field"><label>패키지 이름</label><input type="text" id="pkgName" value="my-awesome-project" oninput="gen()"></div>
                    <div class="field"><label>추가 설치 단계</label><textarea id="installSteps" rows="3" oninput="gen()" placeholder="cp .env.example .env&#10;npm run setup"></textarea></div>
                </div>
                <div class="panel" data-for="usage">
                    <h2>🚀 사용법</h2>
                    <div class="field"><label>언어</label>
                        <select id="codeLang" onchange="gen()">
                            <option value="javascript">JavaScript</option><option value="typescript">TypeScript</option><option value="python">Python</option><option value="rust">Rust</option><option value="go">Go</option><option value="bash">Bash</option>
                        </select>
                    </div>
                    <div class="field"><label>코드 예제</label><textarea id="codeExample" rows="5" oninput="gen()">import { createApp } from 'my-awesome-project';

const app = createApp({ debug: true });
app.start();</textarea></div>
                </div>
                <div class="panel" data-for="api">
                    <h2>📡 API</h2>
                    <textarea id="apiDocs" rows="5" oninput="gen()" placeholder="| 메서드 | 설명 |&#10;|--------|------|&#10;| createApp(opts) | 앱 인스턴스 생성 |">| 메서드 | 설명 |
|--------|------|
| createApp(opts) | 앱 인스턴스 생성 |
| app.start() | 앱 시작 |
| app.stop() | 앱 정지 |</textarea>
                </div>
                <div class="panel" data-for="contributing">
                    <h2>🤝 기여 가이드</h2>
                    <select id="contribStyle" onchange="gen()">
                        <option value="standard">표준 (Fork & PR)</option>
                        <option value="simple">간단</option>
                        <option value="detailed">상세</option>
                    </select>
                </div>
                <div class="panel" data-for="license">
                    <h2>📜 라이선스</h2>
                    <select id="licenseType" onchange="gen()">
                        <option value="MIT">MIT</option><option value="Apache-2.0">Apache 2.0</option><option value="GPL-3.0">GPL 3.0</option><option value="BSD-3-Clause">BSD 3-Clause</option><option value="ISC">ISC</option><option value="Unlicense">Unlicense</option>
                    </select>
                    <div class="field" style="margin-top:8px"><label>저작자</label><input type="text" id="author" value="Your Name" oninput="gen()"></div>
                </div>
            </div>
            <div class="output-col">
                <textarea class="output" id="output" readonly></textarea>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="copyOutput()">📋 복사</button>
                    <button class="btn btn-secondary" onclick="downloadMd()">💾 다운로드</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
<script>
const activeSections=new Set(['basic','badges','features','install','usage','api','contributing','license']);
document.querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        const s=btn.dataset.section;
        if(activeSections.has(s)){activeSections.delete(s);btn.classList.remove('active');}
        else{activeSections.add(s);btn.classList.add('active');}
        gen();
    });
});

function toggleBadge(el){el.classList.toggle('active');gen();}

function gen(){
    const name=document.getElementById('projName').value;
    const desc=document.getElementById('projDesc').value;
    const longDesc=document.getElementById('projLongDesc').value;
    const repo=document.getElementById('ghRepo').value;
    const demo=document.getElementById('demoUrl').value;
    const screenshot=document.getElementById('screenshot').value;
    const features=document.getElementById('features').value;
    const pkg=document.getElementById('pkgManager').value;
    const pkgName=document.getElementById('pkgName').value;
    const installSteps=document.getElementById('installSteps').value;
    const codeLang=document.getElementById('codeLang').value;
    const codeExample=document.getElementById('codeExample').value;
    const apiDocs=document.getElementById('apiDocs').value;
    const contribStyle=document.getElementById('contribStyle').value;
    const license=document.getElementById('licenseType').value;
    const author=document.getElementById('author').value;

    let md='';

    if(activeSections.has('basic')){
        md+=`# ${name}\n\n`;
        if(desc)md+=`> ${desc}\n\n`;

        if(activeSections.has('badges')){
            const badges=[];
            document.querySelectorAll('.badge-btn.active').forEach(b=>{
                const t=b.dataset.badge;
                if(t==='license')badges.push(`[![License](https://img.shields.io/github/license/${repo})](LICENSE)`);
                if(t==='version')badges.push(`[![Version](https://img.shields.io/github/v/release/${repo})](https://github.com/${repo}/releases)`);
                if(t==='build')badges.push(`[![Build](https://img.shields.io/github/actions/workflow/status/${repo}/ci.yml)](https://github.com/${repo}/actions)`);
                if(t==='stars')badges.push(`[![Stars](https://img.shields.io/github/stars/${repo})](https://github.com/${repo}/stargazers)`);
                if(t==='forks')badges.push(`[![Forks](https://img.shields.io/github/forks/${repo})](https://github.com/${repo}/network)`);
                if(t==='issues')badges.push(`[![Issues](https://img.shields.io/github/issues/${repo})](https://github.com/${repo}/issues)`);
                if(t==='prs')badges.push(`[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg)](https://github.com/${repo}/pulls)`);
                if(t==='npm')badges.push(`[![npm](https://img.shields.io/npm/v/${pkgName})](https://www.npmjs.com/package/${pkgName})`);
                if(t==='downloads')badges.push(`[![Downloads](https://img.shields.io/npm/dm/${pkgName})](https://www.npmjs.com/package/${pkgName})`);
                if(t==='coverage')badges.push(`[![Coverage](https://img.shields.io/codecov/c/github/${repo})](https://codecov.io/gh/${repo})`);
            });
            if(badges.length)md+=badges.join(' ')+'\n\n';
        }

        if(longDesc)md+=longDesc+'\n\n';
        if(demo)md+=`🔗 **[Live Demo](${demo})**\n\n`;
        if(screenshot)md+=`![Screenshot](${screenshot})\n\n`;
    }

    if(activeSections.has('features')&&features.trim()){
        md+=`## ✨ Features\n\n`;
        features.split('\n').filter(l=>l.trim()).forEach(f=>{md+=`- ${f.trim()}\n`;});
        md+='\n';
    }

    if(activeSections.has('install')){
        md+=`## 📦 Installation\n\n`;
        const cmds={npm:`npm install ${pkgName}`,yarn:`yarn add ${pkgName}`,pnpm:`pnpm add ${pkgName}`,pip:`pip install ${pkgName}`,cargo:`cargo add ${pkgName}`,go:`go get github.com/${repo}`};
        md+=`\`\`\`bash\n${cmds[pkg]||cmds.npm}\n\`\`\`\n\n`;
        if(installSteps.trim()){md+=installSteps.split('\n').filter(l=>l.trim()).map(l=>'```bash\n'+l.trim()+'\n```').join('\n\n')+'\n\n';}
    }

    if(activeSections.has('usage')&&codeExample.trim()){
        md+=`## 🚀 Usage\n\n\`\`\`${codeLang}\n${codeExample}\n\`\`\`\n\n`;
    }

    if(activeSections.has('api')&&apiDocs.trim()){
        md+=`## 📡 API Reference\n\n${apiDocs}\n\n`;
    }

    if(activeSections.has('contributing')){
        md+=`## 🤝 Contributing\n\n`;
        if(contribStyle==='simple'){
            md+=`Contributions are welcome! Please open an issue or submit a PR.\n\n`;
        }else if(contribStyle==='detailed'){
            md+=`We love contributions! Here's how:\n\n1. Fork the repository\n2. Create your branch: \`git checkout -b feature/amazing-feature\`\n3. Make your changes and add tests\n4. Ensure all tests pass: \`npm test\`\n5. Commit: \`git commit -m 'feat: add amazing feature'\`\n6. Push: \`git push origin feature/amazing-feature\`\n7. Open a Pull Request\n\nPlease read our [Contributing Guide](CONTRIBUTING.md) for details.\n\n`;
        }else{
            md+=`1. Fork the Project\n2. Create your Feature Branch (\`git checkout -b feature/AmazingFeature\`)\n3. Commit your Changes (\`git commit -m 'Add some AmazingFeature'\`)\n4. Push to the Branch (\`git push origin feature/AmazingFeature\`)\n5. Open a Pull Request\n\n`;
        }
    }

    if(activeSections.has('license')){
        md+=`## 📜 License\n\nDistributed under the ${license} License. See [LICENSE](LICENSE) for more information.\n\n`;
        if(author)md+=`---\n\nMade with ❤️ by [${author}](https://github.com/${repo.split('/')[0]})\n`;
    }

    document.getElementById('output').value=md;
}

function copyOutput(){navigator.clipboard.writeText(document.getElementById('output').value).then(()=>showToast('README.md 복사됨! ✅'));}
function downloadMd(){
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([document.getElementById('output').value],{type:'text/markdown'}));
    a.download='README.md';a.click();showToast('다운로드 완료! 💾');
}
function toggleTheme(){const d=document.documentElement;const t=d.getAttribute('data-theme')==='dark'?'':'dark';d.setAttribute('data-theme',t);localStorage.setItem('theme',t);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');
gen();
</script>
</body>
</html>
