<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>분리배출 가이드 | 재활용 분류 도우미</title>
  <meta name="description" content="품목명을 검색하면 분리배출 방법을 바로 안내하는 생활형 도구. 최근 검색/즐겨찾기를 저장해 반복 확인을 빠르게 도와줍니다.">
  <meta name="theme-color" content="#0a0a1a">
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --panel-2: #18183a;
      --line: #2f2f66;
      --text: #edf1ff;
      --muted: #a3add8;
      --cyan: #00f5ff;
      --violet: #8b5cf6;
      --pink: #ff4da6;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #f43f5e;
      --radius: 16px;
      --shadow: 0 0 0 1px rgba(139,92,246,0.2), 0 14px 35px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      line-height: 1.5;
      background:
        radial-gradient(circle at 15% -10%, rgba(0,245,255,0.15), transparent 38%),
        radial-gradient(circle at 85% -20%, rgba(139,92,246,0.22), transparent 42%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      width: min(1100px, 92vw);
      margin: 24px auto 40px;
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3.9vw, 2rem);
      text-shadow: 0 0 16px rgba(0,245,255,0.35);
      letter-spacing: -0.01em;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-top: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 10px;
    }

    .col-4 { grid-column: span 4; }
    .col-6 { grid-column: span 6; }
    .col-8 { grid-column: span 8; }
    .col-12 { grid-column: span 12; }

    label {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
      margin-bottom: 6px;
    }

    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #363673;
      background: var(--panel-2);
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,245,255,0.2);
    }

    .inline {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #363673;
      border-radius: 12px;
      padding: 9px 12px;
      min-height: 44px;
      background: var(--panel-2);
    }

    .check input {
      width: auto;
      margin: 0;
      accent-color: var(--cyan);
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-main {
      border: none;
      color: #032023;
      background: linear-gradient(135deg, var(--cyan), #20d3c2);
    }

    .btn-sub {
      border: 1px solid #5050a0;
      background: rgba(139,92,246,0.16);
      color: var(--text);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .chip {
      width: auto;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid #41418a;
      background: #151538;
      color: var(--text);
      font-size: 0.84rem;
      cursor: pointer;
    }

    .chip.active {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(0,245,255,0.18);
      color: var(--cyan);
    }

    .result {
      border: 1px solid #3a3a7c;
      border-radius: 14px;
      background: rgba(0,0,0,0.2);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .result h2 {
      margin: 0;
      font-size: 1.08rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .b-good { color: #9af7b6; border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.12); }
    .b-warn { color: #ffd48a; border-color: rgba(245,158,11,0.5); background: rgba(245,158,11,0.12); }
    .b-bad { color: #ffb4c3; border-color: rgba(244,63,94,0.48); background: rgba(244,63,94,0.12); }

    .guide {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
      color: #dce3ff;
      font-size: 0.95rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .item {
      border: 1px solid #33336f;
      border-radius: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.02);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .item-title {
      margin: 0;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .item-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .mini {
      width: auto;
      min-width: 78px;
      padding: 7px 10px;
      font-size: 0.8rem;
      border-radius: 10px;
    }

    .muted-box {
      border: 1px dashed #40408b;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      background: rgba(255,255,255,0.01);
    }

    .stats {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .stat {
      border: 1px solid #343471;
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      padding: 11px;
    }

    .stat .k {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .stat .v {
      font-weight: 800;
      margin-top: 4px;
      font-size: 1.2rem;
      color: #f0f4ff;
    }

    .warn {
      color: #ffd48a;
      font-size: 0.88rem;
      margin: 6px 0 0;
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 0.82rem;
    }

    @media (max-width: 860px) {
      .col-4, .col-6, .col-8 { grid-column: span 12; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div>
        <h1>♻️ 분리배출 가이드</h1>
        <p class="sub">품목명을 검색하면 배출 카테고리·처리 방법·주의사항을 바로 안내합니다.</p>
      </div>
    </section>

    <section class="panel">
      <div class="grid">
        <div class="col-8">
          <label for="itemInput">품목 검색</label>
          <input id="itemInput" type="text" placeholder="예: 페트병, 택배 박스, 고무장갑" autocomplete="off">
        </div>
        <div class="col-4">
          <label for="homeType">거주 형태</label>
          <select id="homeType">
            <option value="아파트">아파트</option>
            <option value="주택">주택</option>
            <option value="오피스텔">오피스텔</option>
          </select>
        </div>
        <div class="col-6">
          <label>검색 옵션</label>
          <div class="check">
            <input id="rinseReminder" type="checkbox">
            <span>세척/건조 안내를 항상 강조하기</span>
          </div>
        </div>
        <div class="col-6">
          <label>실행</label>
          <div class="inline">
            <button id="searchBtn" class="btn-main">검색</button>
            <button id="randomBtn" class="btn-sub">랜덤 추천</button>
            <button id="resetBtn" class="btn-sub">초기화</button>
          </div>
        </div>
      </div>

      <div class="chips" id="quickChips"></div>
      <p class="warn">※ 지역별 배출 요일/봉투 정책은 다를 수 있으니 최종 배출 전 지자체 공지를 확인해 주세요.</p>
    </section>

    <section class="panel" aria-live="polite">
      <div class="result" id="resultBox">
        <h2>검색 결과를 기다리는 중입니다</h2>
        <p class="meta">품목을 입력하거나 카테고리 칩을 눌러 빠르게 확인해 보세요.</p>
      </div>
    </section>

    <section class="panel stats" id="statsWrap">
      <article class="stat">
        <div class="k">저장된 최근 검색</div>
        <div class="v" id="historyCount">0건</div>
      </article>
      <article class="stat">
        <div class="k">즐겨찾기 품목</div>
        <div class="v" id="favoriteCount">0개</div>
      </article>
      <article class="stat">
        <div class="k">현재 거주 형태</div>
        <div class="v" id="homeTypeStat">아파트</div>
      </article>
    </section>

    <section class="panel grid">
      <div class="col-6">
        <h3>⭐ 즐겨찾기</h3>
        <div id="favoriteList" class="list"></div>
      </div>
      <div class="col-6">
        <h3>🕘 최근 검색</h3>
        <div id="historyList" class="list"></div>
      </div>
      <div class="col-12 inline">
        <button id="clearHistoryBtn" class="btn-sub">검색 이력 비우기</button>
        <button id="clearFavoriteBtn" class="btn-sub">즐겨찾기 비우기</button>
      </div>
    </section>

    <footer>localStorage에 설정/이력/즐겨찾기를 저장합니다. 브라우저 데이터 삭제 시 함께 삭제됩니다.</footer>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'recyclingSortGuide.v1';
      const MAX_HISTORY = 30;

      const ITEM_DB = [
        { name: '페트병', keywords: ['생수병', '음료병', 'pet'], category: '플라스틱', level: 'good',
          steps: ['내용물을 완전히 비우고 물로 한 번 헹궈 주세요.', '라벨과 뚜껑을 분리해 각각 배출합니다.', '압착해 부피를 줄인 뒤 투명 페트 분리함에 넣으세요.'], caution: '기름·양념이 심하게 묻으면 일반쓰레기 처리' },
        { name: '우유팩', keywords: ['종이팩', '멸균팩', '두유팩'], category: '종이팩', level: 'good',
          steps: ['내용물을 비우고 내부를 세척합니다.', '말려서 펼친 뒤 종이팩 수거함에 배출합니다.', '종이류와 분리해 배출하세요.'], caution: '종이팩 수거함이 없으면 주민센터 수거정책 확인' },
        { name: '택배 박스', keywords: ['박스', '골판지', '상자'], category: '종이류', level: 'good',
          steps: ['테이프·운송장 스티커를 제거합니다.', '박스를 접어서 끈으로 묶습니다.', '비에 젖지 않게 배출합니다.'], caution: '오염된 종이는 일반쓰레기' },
        { name: '종이컵', keywords: ['일회용컵', '컵'], category: '일반쓰레기', level: 'bad',
          steps: ['음료 잔여물을 비웁니다.', '코팅된 종이컵은 일반쓰레기로 배출합니다.'], caution: '지자체에 따라 분리수거 가능 구역 존재' },
        { name: '알루미늄 캔', keywords: ['맥주캔', '음료캔', '캔'], category: '캔/고철', level: 'good',
          steps: ['내용물을 비우고 헹굽니다.', '가능하면 찌그러뜨려 배출합니다.', '플라스틱 뚜껑은 분리합니다.'], caution: '담배꽁초·이물질 제거 필수' },
        { name: '스프레이 캔', keywords: ['부탄가스', '에어졸'], category: '캔/고철', level: 'warn',
          steps: ['완전히 사용 후 내용물이 남지 않게 합니다.', '환기된 장소에서 구멍을 뚫어 잔여 가스를 제거합니다.', '캔류로 분리 배출합니다.'], caution: '화기 근처에서 절대 천공 금지' },
        { name: '유리병', keywords: ['소주병', '맥주병', '병'], category: '유리', level: 'good',
          steps: ['병 안 내용물을 비우고 헹굽니다.', '병뚜껑·라벨을 제거합니다.', '색상별 수거함이 있으면 구분해 배출합니다.'], caution: '깨진 유리는 신문지로 감싸 일반쓰레기(특수 규정 확인)' },
        { name: '비닐봉지', keywords: ['봉투', '포장비닐', '비닐'], category: '비닐류', level: 'warn',
          steps: ['음식물·이물질을 제거합니다.', '깨끗한 비닐만 모아 투명/비닐류로 배출합니다.'], caution: '오염 심한 비닐은 일반쓰레기' },
        { name: '라면봉지', keywords: ['과자봉지', '포장지'], category: '비닐류', level: 'warn',
          steps: ['내용물을 비우고 오염 부분을 닦습니다.', '여러 장을 모아 비닐류로 배출합니다.'], caution: '양념 오염 심하면 일반쓰레기' },
        { name: '고무장갑', keywords: ['고무', '장갑'], category: '일반쓰레기', level: 'bad',
          steps: ['오염물 제거 후 종량제 봉투에 배출합니다.'], caution: '재질 특성상 재활용 어려움' },
        { name: '칫솔', keywords: ['칫솔모'], category: '일반쓰레기', level: 'bad',
          steps: ['종량제 봉투에 배출합니다.'], caution: '플라스틱+합성섬유 혼합재질' },
        { name: '건전지', keywords: ['배터리', 'aa', 'aaa'], category: '폐건전지', level: 'warn',
          steps: ['양극 단자를 테이프로 감싸 안전하게 보관합니다.', '전용 수거함(주민센터/아파트)에 배출합니다.'], caution: '일반쓰레기 혼합 배출 금지' },
        { name: '형광등', keywords: ['전구', '램프'], category: '폐형광등', level: 'warn',
          steps: ['깨지지 않도록 원형 그대로 보관합니다.', '전용 수거함에 배출합니다.'], caution: '깨질 경우 마스크 착용 후 밀폐 처리' },
        { name: '보온병', keywords: ['텀블러', '스테인리스'], category: '캔/고철', level: 'warn',
          steps: ['플라스틱/고무 패킹을 분리합니다.', '금속 본체는 캔·고철류로 배출합니다.'], caution: '분리 불가 복합재질은 일반쓰레기' },
        { name: '음식물 쓰레기', keywords: ['음식물', '잔반'], category: '음식물', level: 'warn',
          steps: ['물기를 최대한 제거합니다.', '지정된 음식물 전용 용기/봉투에 배출합니다.'], caution: '조개껍데기·뼈·씨앗은 일반쓰레기' },
        { name: '아이스팩', keywords: ['젤팩', '냉매'], category: '일반쓰레기', level: 'bad',
          steps: ['겉비닐을 정리해 종량제 봉투로 배출합니다.', '일부 지자체는 전용 수거함 운영 여부를 확인합니다.'], caution: '내용물 하수구 배출 금지' },
        { name: '헌옷', keywords: ['의류', '옷'], category: '의류수거', level: 'good',
          steps: ['깨끗하고 건조한 상태로 봉투에 담습니다.', '의류수거함 또는 지정 수거일에 배출합니다.'], caution: '젖은 옷·오염된 옷은 일반쓰레기' }
      ];

      const CATEGORY_LABEL = {
        '플라스틱': 'b-good',
        '종이팩': 'b-good',
        '종이류': 'b-good',
        '캔/고철': 'b-good',
        '유리': 'b-good',
        '의류수거': 'b-good',
        '비닐류': 'b-warn',
        '음식물': 'b-warn',
        '폐건전지': 'b-warn',
        '폐형광등': 'b-warn',
        '일반쓰레기': 'b-bad'
      };

      const QUICK_CATEGORIES = ['플라스틱', '종이류', '비닐류', '캔/고철', '유리', '일반쓰레기', '폐건전지'];

      const $ = (id) => document.getElementById(id);
      const els = {
        itemInput: $('itemInput'),
        homeType: $('homeType'),
        rinseReminder: $('rinseReminder'),
        resultBox: $('resultBox'),
        searchBtn: $('searchBtn'),
        randomBtn: $('randomBtn'),
        resetBtn: $('resetBtn'),
        quickChips: $('quickChips'),
        historyList: $('historyList'),
        favoriteList: $('favoriteList'),
        clearHistoryBtn: $('clearHistoryBtn'),
        clearFavoriteBtn: $('clearFavoriteBtn'),
        historyCount: $('historyCount'),
        favoriteCount: $('favoriteCount'),
        homeTypeStat: $('homeTypeStat')
      };

      let state = {
        settings: { homeType: '아파트', rinseReminder: true },
        history: [],
        favorites: []
      };

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') {
            state.settings = Object.assign({}, state.settings, parsed.settings || {});
            state.history = Array.isArray(parsed.history) ? parsed.history.slice(0, MAX_HISTORY) : [];
            state.favorites = Array.isArray(parsed.favorites) ? parsed.favorites : [];
          }
        } catch (error) {
          console.error('저장 데이터 로드 실패:', error);
        }
      }

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (error) {
          console.error('저장 실패:', error);
        }
      }

      function normalize(text) {
        return String(text || '').trim().toLowerCase().replace(/\s+/g, '');
      }

      function findMatches(query) {
        const q = normalize(query);
        if (!q) return [];
        return ITEM_DB.filter((item) => {
          const nameMatch = normalize(item.name).includes(q);
          const keywordMatch = item.keywords.some((kw) => normalize(kw).includes(q));
          return nameMatch || keywordMatch;
        });
      }

      function levelBadge(item) {
        if (item.level === 'good') return '재활용 우선';
        if (item.level === 'warn') return '조건부 재활용';
        return '일반 배출 권장';
      }

      function renderResult(item, queryText) {
        if (!item) {
          els.resultBox.innerHTML = [
            '<h2>정확히 일치하는 품목을 찾지 못했어요</h2>',
            '<p class="meta">아래 원칙으로 판단해 보세요.</p>',
            '<ul class="guide">',
            '<li>재질이 2개 이상 붙어 있고 분리가 어렵다면 일반쓰레기에 가까워요.</li>',
            '<li>음식물·기름 오염이 심하면 재활용보다 일반쓰레기가 안전합니다.</li>',
            '<li>건전지/형광등/의약품은 반드시 전용 수거함을 이용하세요.</li>',
            '</ul>'
          ].join('');
          return;
        }

        const badgeClass = CATEGORY_LABEL[item.category] || 'b-warn';
        const steps = item.steps.map((step) => '<li>' + step + '</li>').join('');
        const rinseTip = state.settings.rinseReminder
          ? '<li>배출 전 세척 후 충분히 건조하면 재활용 효율이 높아집니다.</li>'
          : '';

        const isFavorite = state.favorites.includes(item.name);
        const favLabel = isFavorite ? '★ 즐겨찾기 해제' : '☆ 즐겨찾기';

        els.resultBox.innerHTML = [
          '<h2>' + item.name + ' <span class="badge ' + badgeClass + '">' + item.category + '</span> <span class="badge ' + (item.level === 'bad' ? 'b-bad' : item.level === 'warn' ? 'b-warn' : 'b-good') + '">' + levelBadge(item) + '</span></h2>',
          '<ul class="guide">' + steps + rinseTip + '</ul>',
          '<p class="meta">주의사항: ' + item.caution + '</p>',
          '<div class="inline"><button id="favToggleBtn" class="btn-sub mini">' + favLabel + '</button><span class="meta">검색어: ' + queryText + ' · 기준: ' + state.settings.homeType + '</span></div>'
        ].join('');

        $('favToggleBtn').addEventListener('click', function () {
          toggleFavorite(item.name);
          renderResult(item, queryText);
        });
      }

      function addHistory(query, item) {
        const entry = {
          query: query,
          name: item ? item.name : '검색 결과 없음',
          category: item ? item.category : '판단 필요',
          ts: Date.now()
        };
        state.history.unshift(entry);
        state.history = state.history.slice(0, MAX_HISTORY);
        saveState();
        renderHistory();
        renderStats();
      }

      function renderHistory() {
        if (!state.history.length) {
          els.historyList.innerHTML = '<div class="muted-box">아직 검색 이력이 없습니다.</div>';
          return;
        }

        els.historyList.innerHTML = state.history.map(function (item) {
          const time = new Date(item.ts).toLocaleString('ko-KR', { hour12: false });
          return '<article class="item">'
            + '<div><p class="item-title">' + item.query + ' → ' + item.name + '</p><p class="item-sub">' + item.category + ' · ' + time + '</p></div>'
            + '<button class="mini btn-sub" data-requery="' + encodeURIComponent(item.query) + '">다시 검색</button>'
            + '</article>';
        }).join('');

        Array.from(els.historyList.querySelectorAll('[data-requery]')).forEach(function (btn) {
          btn.addEventListener('click', function () {
            const query = decodeURIComponent(btn.getAttribute('data-requery'));
            els.itemInput.value = query;
            runSearch(query);
          });
        });
      }

      function toggleFavorite(name) {
        const idx = state.favorites.indexOf(name);
        if (idx >= 0) {
          state.favorites.splice(idx, 1);
        } else {
          state.favorites.unshift(name);
        }
        saveState();
        renderFavorites();
        renderStats();
      }

      function renderFavorites() {
        if (!state.favorites.length) {
          els.favoriteList.innerHTML = '<div class="muted-box">즐겨찾기한 품목이 없습니다.</div>';
          return;
        }

        const items = state.favorites
          .map((name) => ITEM_DB.find((it) => it.name === name))
          .filter(Boolean);

        els.favoriteList.innerHTML = items.map(function (item) {
          return '<article class="item">'
            + '<div><p class="item-title">' + item.name + '</p><p class="item-sub">' + item.category + ' · ' + item.caution + '</p></div>'
            + '<button class="mini btn-sub" data-open="' + encodeURIComponent(item.name) + '">열기</button>'
            + '</article>';
        }).join('');

        Array.from(els.favoriteList.querySelectorAll('[data-open]')).forEach(function (btn) {
          btn.addEventListener('click', function () {
            const name = decodeURIComponent(btn.getAttribute('data-open'));
            els.itemInput.value = name;
            runSearch(name);
          });
        });
      }

      function renderStats() {
        els.historyCount.textContent = state.history.length + '건';
        els.favoriteCount.textContent = state.favorites.length + '개';
        els.homeTypeStat.textContent = state.settings.homeType;
      }

      function saveSettingsFromForm() {
        state.settings.homeType = els.homeType.value;
        state.settings.rinseReminder = els.rinseReminder.checked;
        saveState();
        renderStats();
      }

      function runSearch(rawQuery) {
        const query = String(rawQuery || '').trim();
        if (!query) {
          renderResult(null, '');
          return;
        }

        const matches = findMatches(query);
        const picked = matches[0] || null;
        renderResult(picked, query);
        addHistory(query, picked);
      }

      function renderQuickChips() {
        els.quickChips.innerHTML = QUICK_CATEGORIES.map(function (cat) {
          return '<button class="chip" data-category="' + cat + '">' + cat + '</button>';
        }).join('');

        Array.from(els.quickChips.querySelectorAll('[data-category]')).forEach(function (chip) {
          chip.addEventListener('click', function () {
            const category = chip.getAttribute('data-category');
            const first = ITEM_DB.find((item) => item.category === category);
            Array.from(els.quickChips.querySelectorAll('.chip')).forEach((c) => c.classList.remove('active'));
            chip.classList.add('active');
            if (first) {
              els.itemInput.value = first.name;
              runSearch(first.name);
            }
          });
        });
      }

      function bindEvents() {
        els.searchBtn.addEventListener('click', function () {
          runSearch(els.itemInput.value);
        });

        els.itemInput.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            runSearch(els.itemInput.value);
          }
        });

        els.randomBtn.addEventListener('click', function () {
          const randomItem = ITEM_DB[Math.floor(Math.random() * ITEM_DB.length)];
          els.itemInput.value = randomItem.name;
          runSearch(randomItem.name);
        });

        els.resetBtn.addEventListener('click', function () {
          els.itemInput.value = '';
          Array.from(els.quickChips.querySelectorAll('.chip')).forEach((c) => c.classList.remove('active'));
          renderResult(null, '');
        });

        els.homeType.addEventListener('change', saveSettingsFromForm);
        els.rinseReminder.addEventListener('change', saveSettingsFromForm);

        els.clearHistoryBtn.addEventListener('click', function () {
          state.history = [];
          saveState();
          renderHistory();
          renderStats();
        });

        els.clearFavoriteBtn.addEventListener('click', function () {
          state.favorites = [];
          saveState();
          renderFavorites();
          renderStats();
          if (els.itemInput.value.trim()) runSearch(els.itemInput.value.trim());
        });
      }

      function init() {
        loadState();
        els.homeType.value = state.settings.homeType;
        els.rinseReminder.checked = !!state.settings.rinseReminder;
        renderQuickChips();
        renderHistory();
        renderFavorites();
        renderStats();
        bindEvents();
      }

      init();
    })();
  </script>
</body>
</html>
