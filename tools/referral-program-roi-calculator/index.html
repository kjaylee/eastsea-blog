<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Referral Program ROI Calculator | 추천인 프로그램 ROI 계산기</title>
  <meta name="description" content="추천인 퍼널과 보상비용을 바탕으로 월 순효과, ROI, 회수기간, 손익분기 참여율을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.7vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:104px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.98rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🎁 추천인 프로그램 ROI 계산기</h1>
        <div class="sub">추천 퍼널의 각 전환율과 보상정책을 넣으면 신규 유료고객·순효과·손익분기 참여율을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="activeCustomers">월 활성 고객 수 (명)</label><input id="activeCustomers" type="number" min="1" value="60000" /></div>
          <div><label for="participationRate">추천 참여율 (%)</label><input id="participationRate" type="number" min="0" max="100" step="0.1" value="6" /></div>
          <div><label for="invitesPerParticipant">참여자 1인당 평균 초대 수</label><input id="invitesPerParticipant" type="number" min="0" step="0.1" value="3.2" /></div>
          <div><label for="inviteToSignup">초대→회원가입 전환율 (%)</label><input id="inviteToSignup" type="number" min="0" max="100" step="0.1" value="22" /></div>
          <div><label for="signupToPaid">회원가입→유료 전환율 (%)</label><input id="signupToPaid" type="number" min="0" max="100" step="0.1" value="18" /></div>
          <div><label for="profitPerPaid">성공 추천 1건당 매출총이익 (KRW)</label><input id="profitPerPaid" type="number" min="0" value="280000" /></div>
          <div><label for="rewardPerPaid">성공 추천 1건당 보상비용 (KRW)</label><input id="rewardPerPaid" type="number" min="0" value="70000" /></div>
          <div><label for="opsCostRate">부정/운영 비용률 (%)</label><input id="opsCostRate" type="number" min="0" max="100" step="0.1" value="6" /></div>
          <div><label for="monthlyToolCost">월 프로그램 운영 툴 비용 (KRW)</label><input id="monthlyToolCost" type="number" min="0" value="2200000" /></div>
          <div><label for="setupCost">도입 일회성 비용 (KRW)</label><input id="setupCost" type="number" min="0" value="14000000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 신규 유료 추천 고객</div><div id="paidReferrals" class="v">-</div></div>
          <div class="kpi"><div class="k">월 추천 매출총이익</div><div id="grossProfit" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">분석기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>월 총 초대 수</th><td id="totalInvites">-</td></tr>
            <tr><th>월 신규 가입 수</th><td id="signups">-</td></tr>
            <tr><th>월 보상비용</th><td id="rewardCost">-</td></tr>
            <tr><th>월 부정/운영 비용</th><td id="opsCost">-</td></tr>
            <tr><th>손익분기 참여율</th><td id="breakEvenParticipation">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      activeCustomers:$("activeCustomers"), participationRate:$("participationRate"), invitesPerParticipant:$("invitesPerParticipant"), inviteToSignup:$("inviteToSignup"), signupToPaid:$("signupToPaid"),
      profitPerPaid:$("profitPerPaid"), rewardPerPaid:$("rewardPerPaid"), opsCostRate:$("opsCostRate"), monthlyToolCost:$("monthlyToolCost"), setupCost:$("setupCost"), months:$("months"),
      paidReferrals:$("paidReferrals"), grossProfit:$("grossProfit"), monthlyNet:$("monthlyNet"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      totalInvites:$("totalInvites"), signups:$("signups"), rewardCost:$("rewardCost"), opsCost:$("opsCost"), breakEvenParticipation:$("breakEvenParticipation"),
      error:$("error"), status:$("status"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { activeCustomers:60000, participationRate:6, invitesPerParticipant:3.2, inviteToSignup:22, signupToPaid:18, profitPerPaid:280000, rewardPerPaid:70000, opsCostRate:6, monthlyToolCost:2200000, setupCost:14000000, months:12 };
    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.activeCustomers) || v.activeCustomers < 1) return "월 활성 고객 수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.participationRate) || v.participationRate < 0 || v.participationRate > 100) return "추천 참여율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.invitesPerParticipant) || v.invitesPerParticipant < 0) return "평균 초대 수는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.inviteToSignup) || v.inviteToSignup < 0 || v.inviteToSignup > 100) return "초대→회원가입 전환율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.signupToPaid) || v.signupToPaid < 0 || v.signupToPaid > 100) return "회원가입→유료 전환율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.profitPerPaid) || v.profitPerPaid < 0) return "성공 추천 1건당 매출총이익은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.rewardPerPaid) || v.rewardPerPaid < 0) return "성공 추천 1건당 보상비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.opsCostRate) || v.opsCostRate < 0 || v.opsCostRate > 100) return "부정/운영 비용률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.monthlyToolCost) || v.monthlyToolCost < 0) return "월 툴 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "도입 일회성 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return "분석 기간은 1~60개월 범위여야 합니다.";
      return "";
    }

    function compute(v){
      const p = v.participationRate / 100;
      const s1 = v.inviteToSignup / 100;
      const s2 = v.signupToPaid / 100;
      const opsRate = v.opsCostRate / 100;

      const participants = v.activeCustomers * p;
      const totalInvites = participants * v.invitesPerParticipant;
      const signups = totalInvites * s1;
      const paidReferrals = signups * s2;

      const grossProfit = paidReferrals * v.profitPerPaid;
      const rewardCost = paidReferrals * v.rewardPerPaid;
      const opsCost = grossProfit * opsRate;
      const monthlyNet = grossProfit - rewardCost - opsCost - v.monthlyToolCost;
      const periodNet = monthlyNet * v.months - v.setupCost;

      const investment = (rewardCost + opsCost + v.monthlyToolCost) * v.months + v.setupCost;
      const roi = investment === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / investment) * 100;
      const payback = monthlyNet > 0 ? v.setupCost / monthlyNet : Infinity;

      const unitNet = v.profitPerPaid * (1 - opsRate) - v.rewardPerPaid;
      const breakEvenParticipation = (unitNet <= 0 || v.activeCustomers <= 0 || v.invitesPerParticipant <= 0 || s1 <= 0 || s2 <= 0)
        ? Infinity
        : (v.monthlyToolCost / (v.activeCustomers * v.invitesPerParticipant * s1 * s2 * unitNet)) * 100;

      return { totalInvites, signups, paidReferrals, grossProfit, rewardCost, opsCost, monthlyNet, periodNet, roi, payback, breakEvenParticipation };
    }

    function resetOutputs(){
      ["paidReferrals","grossProfit","monthlyNet","periodNet","roi","payback","totalInvites","signups","rewardCost","opsCost","breakEvenParticipation"].forEach((k)=>refs[k].textContent='-');
      refs.summary.value = "";
    }

    function render(){
      const v = {
        activeCustomers:Number(refs.activeCustomers.value), participationRate:Number(refs.participationRate.value), invitesPerParticipant:Number(refs.invitesPerParticipant.value), inviteToSignup:Number(refs.inviteToSignup.value), signupToPaid:Number(refs.signupToPaid.value),
        profitPerPaid:Number(refs.profitPerPaid.value), rewardPerPaid:Number(refs.rewardPerPaid.value), opsCostRate:Number(refs.opsCostRate.value), monthlyToolCost:Number(refs.monthlyToolCost.value), setupCost:Number(refs.setupCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.paidReferrals.textContent = `${num(r.paidReferrals,1)}건`;
      refs.grossProfit.textContent = money(r.grossProfit);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞');
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가';

      refs.totalInvites.textContent = `${num(r.totalInvites,1)}건`;
      refs.signups.textContent = `${num(r.signups,1)}건`;
      refs.rewardCost.textContent = money(r.rewardCost);
      refs.opsCost.textContent = money(r.opsCost);
      refs.breakEvenParticipation.textContent = (Number.isFinite(r.breakEvenParticipation) && r.breakEvenParticipation <= 100) ? `${num(r.breakEvenParticipation,2)}%` : '달성 불가';

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> 월 ${money(r.monthlyNet)} 순효과 개선`
        : `<span class="warn">●</span> 월 ${money(Math.abs(r.monthlyNet))} 순효과 감소`;

      refs.summary.value = [
        "[Referral Program ROI 요약]",
        `월 신규 유료 추천 고객: ${num(r.paidReferrals,1)}건`,
        `월 추천 매출총이익: ${money(r.grossProfit)}`,
        `월 보상비용: ${money(r.rewardCost)}`,
        `월 부정/운영 비용: ${money(r.opsCost)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `${v.months}개월 순효과(도입비 반영): ${money(r.periodNet)}`,
        `ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞')}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가'}`,
        `손익분기 참여율: ${(Number.isFinite(r.breakEvenParticipation) && r.breakEvenParticipation <= 100) ? `${num(r.breakEvenParticipation,2)}%` : '달성 불가'}`
      ].join("\n");
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });

    [refs.activeCustomers,refs.participationRate,refs.invitesPerParticipant,refs.inviteToSignup,refs.signupToPaid,refs.profitPerPaid,refs.rewardPerPaid,refs.opsCostRate,refs.monthlyToolCost,refs.setupCost,refs.months].forEach((el)=>{
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
