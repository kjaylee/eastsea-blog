<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Refund Rate Profit Impact Calculator | 환불률 손익 영향 계산기</title>
  <meta name="description" content="주문수, AOV, 원가율, 결제 수수료, 환불률 가정으로 순이익·마진·손익분기 환불률을 계산합니다." />
  <style>
    :root{--bg:#081023;--card:#132347;--line:#314f86;--txt:#eef4ff;--muted:#aac0e4;--pri:#5ea2ff;--ok:#34d399;--warn:#fbbf24;--err:#fda4af}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 14% 0%,#2a4e89 0%,#081023 52%);color:var(--txt)}
    .wrap{max-width:1140px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#deebff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#142a51;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#193564,#132347);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0b1936;color:var(--txt);font-size:.92rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#4e84ec);font-weight:700}
    .soft{background:#1b3761;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:108px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f3443;background:rgba(248,113,113,.12);color:var(--err);font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0e1c3b;border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.05rem;font-weight:800}
    .v.sm{font-size:.95rem}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;margin-top:10px;border-radius:999px;border:1px solid var(--line);background:#183662;color:#cfe1ff;font-size:.76rem}
    .table-wrap{margin-top:10px;border:1px solid var(--line);border-radius:10px;overflow:auto;max-height:300px}
    table{width:100%;border-collapse:collapse;font-size:.82rem}
    th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>↩️ Refund Rate Profit Impact Calculator</h1>
        <div class="sub">환불률 변화가 매출/이익에 미치는 실제 충격을 수치로 확인하고 허용 가능한 환불 임계치를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="orders">월 주문 수</label><input id="orders" type="number" min="1" step="1" value="3200" /></div>
          <div><label for="aov">평균 주문 금액 AOV (USD)</label><input id="aov" type="number" min="0.01" step="0.01" value="74" /></div>
          <div><label for="cogs">매출원가율 (%)</label><input id="cogs" type="number" min="0" max="95" step="0.1" value="38" /></div>
          <div><label for="fee">결제/플랫폼 수수료율 (%)</label><input id="fee" type="number" min="0" max="30" step="0.01" value="3.6" /></div>
          <div><label for="refundRate">환불률 (%)</label><input id="refundRate" type="number" min="0" max="100" step="0.01" value="7.5" /></div>
          <div><label for="lossRate">환불 건 비회수 손실률 (%)</label><input id="lossRate" type="number" min="0" max="100" step="0.1" value="22" /></div>
          <div><label for="supportCost">환불 1건당 처리비용 (USD)</label><input id="supportCost" type="number" min="0" step="0.01" value="4.8" /></div>
          <div><label for="fixedCost">월 고정비 (USD)</label><input id="fixedCost" type="number" min="0" step="0.01" value="54000" /></div>
        </div>

        <div class="btns">
          <button id="copy" class="soft" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>손익 분석 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">총 결제 매출</div><div id="grossRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">환불 후 인식 매출</div><div id="netRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">환불·비회수 손실</div><div id="refundLoss" class="v sm">-</div></div>
          <div class="kpi"><div class="k">환불처리 운영비</div><div id="supportSpend" class="v sm">-</div></div>
          <div class="kpi"><div class="k">월 순이익</div><div id="netProfit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">이익 마진 (Gross 기준)</div><div id="profitMargin" class="v sm">-</div></div>
          <div class="kpi"><div class="k">무환불 대비 이익 차이</div><div id="delta" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 환불률</div><div id="breakEvenRefund" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">계산 대기</div>

        <h2 style="margin-top:12px">환불률 민감도</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>환불률</th>
                <th>인식 매출</th>
                <th>순이익</th>
                <th>마진</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      orders:$('orders'), aov:$('aov'), cogs:$('cogs'), fee:$('fee'), refundRate:$('refundRate'), lossRate:$('lossRate'), supportCost:$('supportCost'), fixedCost:$('fixedCost'),
      grossRevenue:$('grossRevenue'), netRevenue:$('netRevenue'), refundLoss:$('refundLoss'), supportSpend:$('supportSpend'), netProfit:$('netProfit'), profitMargin:$('profitMargin'), delta:$('delta'), breakEvenRefund:$('breakEvenRefund'),
      tbody:$('tbody'), status:$('status'), error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = { orders:3200, aov:74, cogs:38, fee:3.6, refundRate:7.5, lossRate:22, supportCost:4.8, fixedCost:54000 };
    const money = (n) => new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', maximumFractionDigits:2 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString('en-US', { maximumFractionDigits:d });

    function validate(v) {
      if (Object.values(v).some((x) => !Number.isFinite(x))) return '모든 입력값은 유한한 숫자여야 합니다.';
      if (!Number.isInteger(v.orders) || v.orders < 1 || v.orders > 10000000) return '월 주문 수는 1~10,000,000 정수여야 합니다.';
      if (v.aov <= 0 || v.aov > 100000) return 'AOV는 0 초과 100,000 이하 범위여야 합니다.';
      if (v.cogs < 0 || v.cogs > 95) return '매출원가율은 0~95% 범위여야 합니다.';
      if (v.fee < 0 || v.fee > 30) return '수수료율은 0~30% 범위여야 합니다.';
      if (v.refundRate < 0 || v.refundRate > 100) return '환불률은 0~100% 범위여야 합니다.';
      if (v.lossRate < 0 || v.lossRate > 100) return '환불 건 비회수 손실률은 0~100% 범위여야 합니다.';
      if (v.supportCost < 0 || v.supportCost > 1000) return '환불 처리비용은 0~1,000 범위여야 합니다.';
      if (v.fixedCost < 0 || v.fixedCost > 1000000000) return '고정비는 0 이상 1,000,000,000 이하 범위여야 합니다.';
      return '';
    }

    function scenarioProfit(v, refundRatePct) {
      const r = refundRatePct / 100;
      const cogs = v.cogs / 100;
      const fee = v.fee / 100;
      const loss = v.lossRate / 100;

      const grossRevenue = v.orders * v.aov;
      const refundRevenue = grossRevenue * r;
      const netRevenue = grossRevenue - refundRevenue;
      const cogsOnKept = netRevenue * cogs;
      const paymentFees = grossRevenue * fee;
      const refundLoss = refundRevenue * loss;
      const supportSpend = (v.orders * r) * v.supportCost;
      const netProfit = netRevenue - cogsOnKept - paymentFees - refundLoss - supportSpend - v.fixedCost;
      const margin = grossRevenue === 0 ? 0 : (netProfit / grossRevenue) * 100;

      const values = [grossRevenue, netRevenue, refundLoss, supportSpend, netProfit, margin];
      if (values.some((x) => !Number.isFinite(x) || Math.abs(x) > 1e15)) throw new Error('계산 결과가 비정상입니다. 입력 범위를 줄여주세요.');

      return { grossRevenue, netRevenue, refundRevenue, cogsOnKept, paymentFees, refundLoss, supportSpend, netProfit, margin };
    }

    function breakEvenRate(v) {
      const G = v.orders * v.aov;
      const O = v.orders;
      const c = v.cogs / 100;
      const f = v.fee / 100;
      const L = v.lossRate / 100;
      const s = v.supportCost;

      const constant = G * ((1 - c) - f) - v.fixedCost;
      const coeff = G * ((1 - c) + L) + O * s;
      if (coeff <= 0) return null;
      const r = constant / coeff;
      return r * 100;
    }

    function compute(v) {
      const base = scenarioProfit(v, v.refundRate);
      const zeroRefund = scenarioProfit(v, 0);
      const delta = base.netProfit - zeroRefund.netProfit;
      const be = breakEvenRate(v);

      const rates = [0, 2.5, 5, 7.5, 10, 12.5, 15, 20, 25].map((x) => Math.min(100, Math.max(0, x)));
      const uniqueRates = [...new Set([v.refundRate, ...rates])].sort((a, b) => a - b);
      const sensitivity = uniqueRates.map((rate) => ({ rate, ...scenarioProfit(v, rate) }));

      return { base, delta, be, sensitivity };
    }

    function render() {
      const v = {
        orders:Number(refs.orders.value), aov:Number(refs.aov.value), cogs:Number(refs.cogs.value), fee:Number(refs.fee.value), refundRate:Number(refs.refundRate.value),
        lossRate:Number(refs.lossRate.value), supportCost:Number(refs.supportCost.value), fixedCost:Number(refs.fixedCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;
      refs.tbody.innerHTML = '';

      if (err) {
        ['grossRevenue','netRevenue','refundLoss','supportSpend','netProfit','profitMargin','delta','breakEvenRefund'].forEach((k) => refs[k].textContent = '-');
        refs.status.textContent = '입력값 확인 필요';
        refs.summary.value = '';
        return;
      }

      try {
        const r = compute(v);
        refs.grossRevenue.textContent = money(r.base.grossRevenue);
        refs.netRevenue.textContent = money(r.base.netRevenue);
        refs.refundLoss.textContent = money(r.base.refundLoss);
        refs.supportSpend.textContent = money(r.base.supportSpend);
        refs.netProfit.textContent = money(r.base.netProfit);
        refs.profitMargin.textContent = `${num(r.base.margin, 2)}%`;
        refs.delta.textContent = money(r.delta);

        if (r.be === null) refs.breakEvenRefund.textContent = 'N/A';
        else if (r.be < 0) refs.breakEvenRefund.textContent = '0% 미만 (현재도 적자)';
        else if (r.be > 100) refs.breakEvenRefund.textContent = '> 100%';
        else refs.breakEvenRefund.textContent = `${num(r.be, 2)}%`;

        if (r.base.netProfit >= 0) {
          refs.status.innerHTML = `<span style="color:var(--ok)">●</span> 현재 가정에서 월 순이익 +${money(r.base.netProfit)}`;
        } else {
          refs.status.innerHTML = `<span style="color:var(--warn)">●</span> 현재 가정에서 월 순이익 -${money(Math.abs(r.base.netProfit))}`;
        }

        refs.tbody.innerHTML = r.sensitivity.map((s) => `
          <tr>
            <td>${num(s.rate, 2)}%</td>
            <td>${money(s.netRevenue)}</td>
            <td>${money(s.netProfit)}</td>
            <td>${num(s.margin, 2)}%</td>
          </tr>
        `).join('');

        refs.summary.value = [
          '[Refund Rate Profit Impact Summary]',
          `Gross charged revenue: ${money(r.base.grossRevenue)}`,
          `Recognized revenue after refunds: ${money(r.base.netRevenue)}`,
          `Refund + non-recoverable loss: ${money(r.base.refundLoss)}`,
          `Refund operation spend: ${money(r.base.supportSpend)}`,
          `Net profit: ${money(r.base.netProfit)} (${num(r.base.margin, 2)}%)`,
          `Profit delta vs 0% refund: ${money(r.delta)}`,
          `Break-even refund rate: ${r.be === null ? 'N/A' : num(r.be, 2) + '%'}`
        ].join('\n');
      } catch (e) {
        refs.error.classList.add('show');
        refs.error.textContent = e.message || '계산 중 오류가 발생했습니다.';
      }
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('클립보드 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, v]) => refs[k].value = v);
      render();
    });

    ['input','change'].forEach((ev) => {
      [refs.orders,refs.aov,refs.cogs,refs.fee,refs.refundRate,refs.lossRate,refs.supportCost,refs.fixedCost].forEach((el) => el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
