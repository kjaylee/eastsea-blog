<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정규식 테스터 + 치트시트 | Eastsea Tools</title>
  <meta name="description" content="정규식 패턴을 실시간으로 테스트하고 매칭 결과를 하이라이트로 확인하세요. 캡처 그룹 확인과 치트시트 예제까지 한 번에 제공합니다.">

  <script>
    (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src='https://www.clarity.ms/tag/'+i;

  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --panel-2: #171739;
      --line: #2f2f68;
      --text: #eef0ff;
      --muted: #a4a8d8;
      --accent: #2ee6ff;
      --accent-2: #b14cff;
      --good: #42f5b3;
      --warn: #ffbe5c;
      --danger: #ff6d8e;
      --mark-bg: #fffa84;
      --mark-text: #231400;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at -10% -20%, rgba(177, 76, 255, 0.22), transparent 55%),
        radial-gradient(1000px 600px at 120% -10%, rgba(46, 230, 255, 0.2), transparent 55%),
        var(--bg);
      padding: 16px;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 0 0 1px rgba(46, 230, 255, 0.06), 0 14px 36px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 4.8vw, 2rem);
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .layout {
      display: grid;
      gap: 12px;
    }

    @media (min-width: 940px) {
      .layout {
        grid-template-columns: 1.2fr 0.8fr;
      }
    }

    .cols {
      display: grid;
      gap: 10px;
    }

    @media (min-width: 860px) {
      .cols {
        grid-template-columns: 1fr 1fr;
      }
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="text"], textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #3e3e82;
      background: #0d0d24;
      color: var(--text);
      font: inherit;
      padding: 10px 12px;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.55;
    }

    input[type="text"]:focus, textarea:focus, button:focus {
      outline: 2px solid rgba(46, 230, 255, 0.6);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1;
      min-width: 0;
    }

    .btn {
      cursor: pointer;
      border: 1px solid #4b4b9b;
      background: linear-gradient(180deg, #1a1a46, #141433);
      font-weight: 700;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .btn:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .btn.primary {
      background: linear-gradient(180deg, #22c6e8, #157fca);
      border-color: #36d6f5;
      color: #051425;
    }

    .btn.secondary {
      background: linear-gradient(180deg, #924dff, #6527ca);
      border-color: #b07dff;
      color: #fff;
    }

    .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .flag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      border: 1px solid #3f3f86;
      background: #131335;
      padding: 7px 11px;
      font-size: 0.86rem;
      color: #d7dbff;
    }

    .flag input { width: auto; }

    .status {
      font-size: 0.88rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px dashed #3a3a79;
      padding-top: 8px;
      margin-top: 8px;
    }

    .status strong { color: var(--good); }
    .status .error { color: var(--danger); font-weight: 700; }
    .status .warn { color: var(--warn); }

    .preview {
      min-height: 220px;
      border: 1px dashed #4a4a94;
      border-radius: 12px;
      background: #09091f;
      padding: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    mark {
      background: var(--mark-bg);
      color: var(--mark-text);
      border-radius: 4px;
      padding: 1px 2px;
    }

    .muted {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .match-list {
      max-height: 320px;
      overflow: auto;
      border-radius: 10px;
      border: 1px solid #3a3a79;
      background: rgba(9, 9, 31, 0.8);
    }

    .match-item {
      padding: 10px;
      border-bottom: 1px solid #2c2c60;
    }

    .match-item:last-child { border-bottom: 0; }

    .match-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 0.9rem;
    }

    .match-value {
      color: #c4f9ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.84rem;
      margin-top: 6px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .group {
      margin-top: 6px;
      color: #cfc8ff;
      font-size: 0.83rem;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
    }

    .chip {
      border: 1px solid #444492;
      border-radius: 12px;
      background: linear-gradient(180deg, #171742, #111130);
      padding: 10px;
      text-align: left;
      color: inherit;
      cursor: pointer;
    }

    .chip:hover {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 1px rgba(177, 76, 255, 0.25) inset;
    }

    .chip-title {
      color: #f0e6ff;
      font-weight: 700;
      margin-bottom: 5px;
      font-size: 0.9rem;
    }

    .chip-code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.84rem;
      color: #98eefe;
      margin-bottom: 6px;
      display: block;
    }

    .chip-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .aside-title {
      margin: 0;
      font-size: 1.05rem;
    }

    .aside-sub {
      margin: 0;
    }

    .footer-note {
      text-align: center;
      color: #8f93c5;
      font-size: 0.78rem;
      margin-top: 3px;
    }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>정규식 테스터 + 치트시트</h1>
      <p class="sub">패턴 입력 → 실시간 매칭 하이라이트 → 캡처 그룹 확인까지 한 화면에서 처리합니다. 아래 치트시트 버튼을 눌러 빠르게 시작해 보세요.</p>
    </section>

    <section class="card grid">
      <div class="row">
        <div>
          <label for="pattern">정규식 패턴</label>
          <input id="pattern" type="text" autocomplete="off" spellcheck="false" value="\\b[가-힣A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b" placeholder="예: ^[A-Za-z0-9_]{4,20}$">
        </div>
      </div>

      <div>
        <label>플래그 선택</label>
        <div class="flags" id="flags">
          <label class="flag"><input type="checkbox" value="g" checked> g (전체 검색)</label>
          <label class="flag"><input type="checkbox" value="i" checked> i (대소문자 무시)</label>
          <label class="flag"><input type="checkbox" value="m"> m (멀티라인)</label>
          <label class="flag"><input type="checkbox" value="s"> s (dotAll)</label>
          <label class="flag"><input type="checkbox" value="u"> u (유니코드)</label>
          <label class="flag"><input type="checkbox" value="y"> y (sticky)</label>
        </div>
      </div>

      <div class="row">
        <button class="btn primary" id="runBtn" type="button">실행</button>
        <button class="btn" id="clearBtn" type="button">초기화</button>
        <button class="btn secondary" id="sampleBtn" type="button">샘플 불러오기</button>
      </div>

      <div class="status" id="statusBar">
        <span id="statusText">준비됨</span>
        <span id="metaText">매칭 0개</span>
      </div>
    </section>

    <section class="layout">
      <article class="card cols">
        <div class="grid">
          <div>
            <label for="sourceText">테스트 텍스트</label>
            <textarea id="sourceText" spellcheck="false">문의: hello@eastsea.xyz, support-team@eastsea-blog.com
전화: 010-1234-5678
주문코드: ORD-2026-AB12
날짜: 2026-02-28</textarea>
          </div>
          <p class="muted">팁: g 플래그를 켜면 모든 매칭을 찾고, 끄면 첫 번째 매칭만 표시됩니다.</p>
        </div>

        <div class="grid">
          <div>
            <label>하이라이트 결과</label>
            <div id="preview" class="preview" aria-live="polite"></div>
          </div>
          <div>
            <label>매칭 상세</label>
            <div id="matchList" class="match-list"></div>
          </div>
        </div>
      </article>

      <aside class="card grid">
        <h2 class="aside-title">빠른 치트시트</h2>
        <p class="muted aside-sub">항목을 탭하면 패턴과 예시 텍스트가 자동 입력됩니다.</p>
        <div id="cheats" class="chips"></div>
      </aside>
    </section>

    <p class="footer-note">Regex CheatSheet Lab · 모바일 반응형 · 네온 다크 UI</p>
  </div>

  <script>
    (function () {
      'use strict';

      const patternEl = document.getElementById('pattern');
      const sourceEl = document.getElementById('sourceText');
      const previewEl = document.getElementById('preview');
      const matchListEl = document.getElementById('matchList');
      const statusTextEl = document.getElementById('statusText');
      const metaTextEl = document.getElementById('metaText');
      const runBtn = document.getElementById('runBtn');
      const clearBtn = document.getElementById('clearBtn');
      const sampleBtn = document.getElementById('sampleBtn');
      const cheatsEl = document.getElementById('cheats');

      const sampleText = [
        '문의: hello@eastsea.xyz, support-team@eastsea-blog.com',
        '전화: 010-1234-5678',
        '주문코드: ORD-2026-AB12',
        '날짜: 2026-02-28'
      ].join('\n');

      const cheatItems = [
        {
          title: '이메일',
          pattern: '\\b[가-힣A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b',
          desc: '일반 이메일 형식 매칭',
          text: sampleText
        },
        {
          title: '휴대폰 번호',
          pattern: '01[016789]-?\\d{3,4}-?\\d{4}',
          desc: '010-1234-5678 / 01012345678',
          text: '연락처: 010-9876-1234, 01012345678, 011-222-3333'
        },
        {
          title: '한글 포함 4~12자 ID',
          pattern: '^[가-힣A-Za-z0-9_]{4,12}$',
          desc: '문자열 전체 검사 예시',
          text: 'misskim_01'
        },
        {
          title: '주문 코드',
          pattern: 'ORD-(\\d{4})-([A-Z0-9]{4})',
          desc: '캡처 그룹 2개 확인',
          text: '주문: ORD-2026-AB12 / ORD-2025-ZX90'
        },
        {
          title: '날짜(YYYY-MM-DD)',
          pattern: '\\b(19|20)\\d{2}-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])\\b',
          desc: '날짜 형식 검증용 기초 패턴',
          text: '출시일 2026-02-28, 마감 2026-13-40'
        },
        {
          title: 'URL',
          pattern: 'https?:\\/\\/[\\w.-]+(?:\\/[\\w\\-./?%&=]*)?',
          desc: 'http/https 링크 추출',
          text: '참고: https://eastsea.xyz/tools 와 https://test.local/page?a=1'
        }
      ];

      const htmlEscape = (value) => String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');

      const selectedFlags = () => {
        const checks = document.querySelectorAll('#flags input:checked');
        return Array.from(checks).map((node) => node.value).join('');
      };

      function buildCheatSheet() {
        const frag = document.createDocumentFragment();
        cheatItems.forEach((item) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'chip';
          btn.innerHTML = [
            '<div class="chip-title">' + htmlEscape(item.title) + '</div>',
            '<code class="chip-code">' + htmlEscape(item.pattern) + '</code>',
            '<div class="chip-desc">' + htmlEscape(item.desc) + '</div>'
          ].join('');
          btn.addEventListener('click', () => {
            patternEl.value = item.pattern;
            sourceEl.value = item.text;
            ensureGlobalChecked();
            runRegex();
          });
          frag.appendChild(btn);
        });
        cheatsEl.appendChild(frag);
      }

      function ensureGlobalChecked() {
        const gCheck = document.querySelector('#flags input[value="g"]');
        if (gCheck && !gCheck.checked) {
          gCheck.checked = true;
        }
      }

      function renderNoMatch(text) {
        previewEl.textContent = text;
        matchListEl.innerHTML = '<div class="match-item muted">매칭 결과가 없습니다.</div>';
      }

      function runRegex() {
        const source = patternEl.value;
        const flags = selectedFlags();
        const text = sourceEl.value;

        let startedAt = performance.now();
        let regex;

        try {
          regex = new RegExp(source, flags);
        } catch (error) {
          statusTextEl.innerHTML = '<span class="error">정규식 오류: ' + htmlEscape(error.message) + '</span>';
          metaTextEl.textContent = '매칭 0개';
          renderNoMatch(text);
          return;
        }

        const matches = [];

        if (flags.includes('g')) {
          let guard = 0;
          for (const item of text.matchAll(regex)) {
            matches.push(item);
            guard += 1;
            if (item[0] === '' && regex.lastIndex <= text.length) {
              regex.lastIndex += 1;
            }
            if (guard >= 5000) {
              statusTextEl.innerHTML = '<span class="warn">매칭 5000개 도달(성능 보호로 중단)</span>';
              break;
            }
          }
        } else {
          const first = regex.exec(text);
          if (first) matches.push(first);
        }

        const elapsed = (performance.now() - startedAt).toFixed(2);

        if (!matches.length) {
          statusTextEl.textContent = '실행 완료';
          metaTextEl.textContent = '매칭 0개 · ' + elapsed + 'ms';
          renderNoMatch(text);
          return;
        }

        const ranges = matches
          .filter((m) => typeof m.index === 'number' && m[0].length > 0)
          .map((m) => [m.index, m.index + m[0].length]);

        if (!ranges.length) {
          previewEl.textContent = text;
        } else {
          let cursor = 0;
          let out = '';
          for (const [start, end] of ranges) {
            out += htmlEscape(text.slice(cursor, start));
            out += '<mark>' + htmlEscape(text.slice(start, end)) + '</mark>';
            cursor = end;
          }
          out += htmlEscape(text.slice(cursor));
          previewEl.innerHTML = out;
        }

        const frag = document.createDocumentFragment();
        matches.forEach((m, idx) => {
          const row = document.createElement('div');
          row.className = 'match-item';

          const value = m[0] === '' ? '(빈 문자열 매칭)' : m[0];
          const index = typeof m.index === 'number' ? m.index : '-';

          let groups = '';
          if (m.length > 1) {
            const pieces = [];
            for (let i = 1; i < m.length; i += 1) {
              const g = m[i] == null ? 'null' : m[i];
              pieces.push('g' + i + ': ' + g);
            }
            groups = '<div class="group">' + htmlEscape(pieces.join(' | ')) + '</div>';
          }

          row.innerHTML = [
            '<div class="match-head"><strong>#' + (idx + 1) + '</strong><span class="muted">index: ' + index + '</span></div>',
            '<div class="match-value">' + htmlEscape(value) + '</div>',
            groups
          ].join('');

          frag.appendChild(row);
        });

        matchListEl.innerHTML = '';
        matchListEl.appendChild(frag);

        statusTextEl.innerHTML = '<strong>실행 완료</strong>  /' + htmlEscape(source) + '/' + htmlEscape(flags);
        metaTextEl.textContent = '매칭 ' + matches.length + '개 · ' + elapsed + 'ms';
      }

      function resetAll() {
        patternEl.value = '';
        sourceEl.value = '';
        previewEl.textContent = '';
        matchListEl.innerHTML = '<div class="match-item muted">입력 후 실행해 주세요.</div>';
        statusTextEl.textContent = '초기화 완료';
        metaTextEl.textContent = '매칭 0개';
      }

      function loadSample() {
        patternEl.value = '\\b[가-힣A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b';
        sourceEl.value = sampleText;
        const iCheck = document.querySelector('#flags input[value="i"]');
        const gCheck = document.querySelector('#flags input[value="g"]');
        if (iCheck) iCheck.checked = true;
        if (gCheck) gCheck.checked = true;
        runRegex();
      }

      runBtn.addEventListener('click', runRegex);
      clearBtn.addEventListener('click', resetAll);
      sampleBtn.addEventListener('click', loadSample);
      patternEl.addEventListener('input', runRegex);
      sourceEl.addEventListener('input', runRegex);
      document.querySelectorAll('#flags input').forEach((node) => {
        node.addEventListener('change', runRegex);
      });

      buildCheatSheet();
      loadSample();
    })();
  </script>
</body>
</html>
