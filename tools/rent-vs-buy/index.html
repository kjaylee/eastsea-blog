<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전세 vs 매매 비교 계산기 | East Sea Tools</title>
<meta name="description" content="전세와 매매 중 어떤 것이 유리한지 비교 분석해보세요. 기회비용, 대출이자, 시세차익까지 종합 비교.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4F46E5;--primary-light:#6366F1;--bg:#f8fafc;--surface:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.1);--radius:12px;--green:#10b981;--red:#ef4444}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--text-secondary:#94a3b8;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.container{max-width:700px;width:100%}
h1{font-size:1.8rem;text-align:center;margin:20px 0 8px;color:var(--primary)}
.desc{text-align:center;color:var(--text-secondary);margin-bottom:24px;font-size:.95rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.card h2{font-size:1.1rem;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--primary)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.grid{grid-template-columns:1fr}}
label{display:block;font-weight:600;margin-bottom:4px;font-size:.85rem}
input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;background:var(--bg);color:var(--text);margin-bottom:12px}
input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px}
.btn:hover{background:var(--primary-light)}
.result{display:none}
.comparison{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:500px){.comparison{grid-template-columns:1fr}}
.option{border-radius:var(--radius);padding:20px;text-align:center;border:2px solid var(--border)}
.option.winner{border-color:var(--green);background:rgba(16,185,129,.05)}
.option h3{font-size:1rem;margin-bottom:12px}
.option .cost{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.option .sub{font-size:.8rem;color:var(--text-secondary)}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.9rem}
.detail-row:last-child{border:none}
.verdict{text-align:center;padding:16px;border-radius:8px;font-weight:700;font-size:1.1rem;margin-top:8px}
.verdict.buy{background:rgba(79,70,229,.1);color:var(--primary)}
.verdict.rent{background:rgba(16,185,129,.1);color:var(--green)}
footer{text-align:center;padding:32px 0 16px;color:var(--text-secondary);font-size:.8rem}
.note{font-size:.8rem;color:var(--text-secondary);margin-top:12px;line-height:1.5}
</style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<div class="container">
<h1>🏠 전세 vs 매매 비교 계산기</h1>
<p class="desc">전세와 매매, 어떤 선택이 더 유리한지 종합 비교합니다.</p>

<div class="card">
<h2>🏢 매매 조건</h2>
<div class="grid">
<div><label>매매가 (만원)</label><input type="number" id="buyPrice" value="50000" min="0"></div>
<div><label>대출금액 (만원)</label><input type="number" id="buyLoan" value="30000" min="0"></div>
<div><label>대출 금리 (%/년)</label><input type="number" id="buyRate" value="3.5" min="0" step="0.1"></div>
<div><label>예상 시세상승률 (%/년)</label><input type="number" id="appreciation" value="2" step="0.1"></div>
</div>
</div>

<div class="card">
<h2>🔑 전세 조건</h2>
<div class="grid">
<div><label>전세보증금 (만원)</label><input type="number" id="rentDeposit" value="30000" min="0"></div>
<div><label>전세대출금액 (만원)</label><input type="number" id="rentLoan" value="20000" min="0"></div>
<div><label>전세대출 금리 (%/년)</label><input type="number" id="rentRate" value="3.0" min="0" step="0.1"></div>
<div><label>여유자금 투자수익률 (%/년)</label><input type="number" id="investRate" value="4" min="0" step="0.1"></div>
</div>
</div>

<div class="card">
<h2>⏱️ 비교 기간</h2>
<label>거주 기간 (년)</label>
<input type="number" id="years" value="5" min="1" max="30">
<button class="btn" onclick="calculate()">비교 분석</button>
</div>

<div class="card result" id="result">
<div class="comparison">
<div class="option" id="buyOption">
<h3>🏠 매매</h3>
<div class="cost" id="buyCost"></div>
<div class="sub">순비용 (기간 합계)</div>
</div>
<div class="option" id="rentOption">
<h3>🔑 전세</h3>
<div class="cost" id="rentCost"></div>
<div class="sub">순비용 (기간 합계)</div>
</div>
</div>

<h3 style="margin-bottom:12px">📊 매매 상세</h3>
<div class="detail-row"><span>대출이자 합계</span><span id="dBuyInterest"></span></div>
<div class="detail-row"><span>취득세 (약 1.1%)</span><span id="dAcqTax"></span></div>
<div class="detail-row"><span>예상 시세차익</span><span id="dAppreciation"></span></div>
<div class="detail-row"><span>자기자본 기회비용</span><span id="dBuyOpp"></span></div>

<h3 style="margin:16px 0 12px">📊 전세 상세</h3>
<div class="detail-row"><span>대출이자 합계</span><span id="dRentInterest"></span></div>
<div class="detail-row"><span>여유자금 투자수익</span><span id="dInvest"></span></div>
<div class="detail-row"><span>자기자본 기회비용</span><span id="dRentOpp"></span></div>

<div class="verdict" id="verdict"></div>
<p class="note">※ 간이 계산이며 실제 세금, 중개수수료, 유지보수비 등은 별도 고려 필요합니다. 투자수익률은 보장되지 않습니다.</p>
</div>
</div>
<footer>© 2026 East Sea</footer>

<script>
function fmt(n){return Math.round(n).toLocaleString('ko-KR')+'만원'}

function calculate(){
const buyPrice=+document.getElementById('buyPrice').value;
const buyLoan=+document.getElementById('buyLoan').value;
const buyRate=+document.getElementById('buyRate').value/100;
const appreciation=+document.getElementById('appreciation').value/100;
const rentDeposit=+document.getElementById('rentDeposit').value;
const rentLoan=+document.getElementById('rentLoan').value;
const rentRate=+document.getElementById('rentRate').value/100;
const investRate=+document.getElementById('investRate').value/100;
const years=+document.getElementById('years').value;

// 매매
const buyEquity=buyPrice-buyLoan;
const buyInterest=buyLoan*buyRate*years;
const acqTax=buyPrice*0.011;
const futurePrice=buyPrice*Math.pow(1+appreciation,years);
const appreciationGain=futurePrice-buyPrice;
const buyOppCost=buyEquity*investRate*years;
const buyCostTotal=buyInterest+acqTax+buyOppCost-appreciationGain;

// 전세
const rentEquity=rentDeposit-rentLoan;
const rentInterest=rentLoan*rentRate*years;
const surplus=buyEquity-rentEquity;
const investGain=surplus>0?surplus*investRate*years:0;
const rentOppCost=rentEquity*investRate*years;
const rentCostTotal=rentInterest+rentOppCost-investGain;

document.getElementById('buyCost').textContent=fmt(buyCostTotal);
document.getElementById('rentCost').textContent=fmt(rentCostTotal);
document.getElementById('dBuyInterest').textContent=fmt(buyInterest);
document.getElementById('dAcqTax').textContent=fmt(acqTax);
document.getElementById('dAppreciation').textContent='+'+fmt(appreciationGain);
document.getElementById('dBuyOpp').textContent=fmt(buyOppCost);
document.getElementById('dRentInterest').textContent=fmt(rentInterest);
document.getElementById('dInvest').textContent='+'+fmt(investGain);
document.getElementById('dRentOpp').textContent=fmt(rentOppCost);

const buyEl=document.getElementById('buyOption');
const rentEl=document.getElementById('rentOption');
const verdict=document.getElementById('verdict');
buyEl.classList.remove('winner');rentEl.classList.remove('winner');

if(buyCostTotal<rentCostTotal){
buyEl.classList.add('winner');
verdict.className='verdict buy';
verdict.textContent='🏠 매매가 '+fmt(rentCostTotal-buyCostTotal)+' 더 유리합니다';
}else{
rentEl.classList.add('winner');
verdict.className='verdict rent';
verdict.textContent='🔑 전세가 '+fmt(buyCostTotal-rentCostTotal)+' 더 유리합니다';
}

document.getElementById('result').style.display='block';
}
</script>
</body>
</html>
