<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reseller Margin Waterfall Calculator | 리셀러 마진 워터폴 계산기</title>
  <meta name="description" content="채널 판매에서 할인·리셀러/디스트리뷰터 마진·리베이트를 반영해 순매출 워터폴, 순이익, ROI를 계산합니다." />
  <style>
    :root{--bg:#0a1120;--card:#17253f;--line:#33527a;--txt:#eef3ff;--muted:#b4c5df;--pri:#7cb8ff;--soft:#1f3457;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.13)}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#243f6a 0%,#0a1120 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#1a3358;color:#deebff;border-radius:10px;padding:8px 12px;text-decoration:none;font-size:.86rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#1f3760,#17253f);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0e1b33;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{border:none;cursor:pointer;background:linear-gradient(135deg,var(--pri),#598ae8);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    textarea{margin-top:10px;min-height:108px;resize:vertical}.error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7a3341;background:var(--errbg);color:var(--err);font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#101f39;border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.04rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#1c3a61;color:#d9e8ff;font-size:.77rem;margin-top:10px}.ok{color:var(--ok)}.warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.86rem;table-layout:fixed}th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🧮 리셀러 마진 워터폴 계산기</h1>
        <div class="sub" data-i18n="subtitle">채널 할인, 리셀러/디스트리뷰터 마진, 리베이트를 반영해 월 순매출 워터폴과 ROI를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" class="chip" type="button">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="deals" data-i18n="deals">월 딜 수</label><input id="deals" type="number" min="1" value="38"></div>
          <div><label for="listPrice" data-i18n="listPrice">딜당 리스트 가격 (KRW)</label><input id="listPrice" type="number" min="1" value="7800000"></div>
          <div><label for="discount" data-i18n="discount">평균 할인율 (%)</label><input id="discount" type="number" min="0" max="100" step="0.1" value="18"></div>
          <div><label for="resellerMargin" data-i18n="resellerMargin">리셀러 마진율 (%)</label><input id="resellerMargin" type="number" min="0" max="100" step="0.1" value="22"></div>
          <div><label for="distributorMargin" data-i18n="distributorMargin">디스트리뷰터 마진율 (%)</label><input id="distributorMargin" type="number" min="0" max="100" step="0.1" value="6"></div>
          <div><label for="rebateRate" data-i18n="rebateRate">백엔드 리베이트율 (%)</label><input id="rebateRate" type="number" min="0" max="100" step="0.1" value="4"></div>
          <div><label for="deliveryCost" data-i18n="deliveryCost">딜당 구축/납품비 (KRW)</label><input id="deliveryCost" type="number" min="0" value="490000"></div>
          <div><label for="supportCost" data-i18n="supportCost">딜당 지원비 (KRW)</label><input id="supportCost" type="number" min="0" value="250000"></div>
          <div><label for="incentive" data-i18n="incentive">딜당 인센티브 (KRW)</label><input id="incentive" type="number" min="0" value="170000"></div>
          <div><label for="programCost" data-i18n="programCost">월 채널 프로그램비 (KRW)</label><input id="programCost" type="number" min="0" value="3600000"></div>
          <div><label for="oneTime" data-i18n="oneTime">원타임 Enablement 비용 (KRW)</label><input id="oneTime" type="number" min="0" value="15000000"></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpi">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_booked">할인 후 월 매출</div><div id="bookedRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_netChannel">월 채널 순매출</div><div id="netChannelRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_totalCost">월 총비용</div><div id="totalCost" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet">월 순이익</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_breakEvenDiscount">손익분기 최대 할인율</div><div id="breakEvenDiscount" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detail">워터폴 상세</h2>
        <table><tbody>
          <tr><th data-i18n="d_resellerPayout">리셀러 지급액</th><td id="resellerPayout">-</td></tr>
          <tr><th data-i18n="d_distributorPayout">디스트리뷰터 지급액</th><td id="distributorPayout">-</td></tr>
          <tr><th data-i18n="d_rebate">리베이트</th><td id="rebateAmount">-</td></tr>
          <tr><th data-i18n="d_payback">회수기간</th><td id="payback">-</td></tr>
          <tr><th data-i18n="d_periodNet">기간 누적 순효과</th><td id="periodNet">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={
      deals:$("deals"),listPrice:$("listPrice"),discount:$("discount"),resellerMargin:$("resellerMargin"),distributorMargin:$("distributorMargin"),rebateRate:$("rebateRate"),deliveryCost:$("deliveryCost"),supportCost:$("supportCost"),incentive:$("incentive"),programCost:$("programCost"),oneTime:$("oneTime"),months:$("months"),
      bookedRevenue:$("bookedRevenue"),netChannelRevenue:$("netChannelRevenue"),totalCost:$("totalCost"),monthlyNet:$("monthlyNet"),breakEvenDiscount:$("breakEvenDiscount"),roi:$("roi"),resellerPayout:$("resellerPayout"),distributorPayout:$("distributorPayout"),rebateAmount:$("rebateAmount"),payback:$("payback"),periodNet:$("periodNet"),
      error:$("error"),summary:$("summary"),status:$("status"),copy:$("copy"),reset:$("reset"),lang:$("lang")
    };

    const defaults={deals:38,listPrice:7800000,discount:18,resellerMargin:22,distributorMargin:6,rebateRate:4,deliveryCost:490000,supportCost:250000,incentive:170000,programCost:3600000,oneTime:15000000,months:12};
    let lang="ko";

    const i18n={
      ko:{
        title:"🧮 리셀러 마진 워터폴 계산기",subtitle:"채널 할인, 리셀러/디스트리뷰터 마진, 리베이트를 반영해 월 순매출 워터폴과 ROI를 계산합니다.",back:"Back to Portal",
        inputs:"입력값",copy:"요약 복사",reset:"기본값 복원",kpi:"핵심 KPI",waiting:"결과 계산 대기",detail:"워터폴 상세",
        deals:"월 딜 수",listPrice:"딜당 리스트 가격 (KRW)",discount:"평균 할인율 (%)",resellerMargin:"리셀러 마진율 (%)",distributorMargin:"디스트리뷰터 마진율 (%)",rebateRate:"백엔드 리베이트율 (%)",deliveryCost:"딜당 구축/납품비 (KRW)",supportCost:"딜당 지원비 (KRW)",incentive:"딜당 인센티브 (KRW)",programCost:"월 채널 프로그램비 (KRW)",oneTime:"원타임 Enablement 비용 (KRW)",months:"분석 기간 (개월)",
        k_booked:"할인 후 월 매출",k_netChannel:"월 채널 순매출",k_totalCost:"월 총비용",k_monthlyNet:"월 순이익",k_breakEvenDiscount:"손익분기 최대 할인율",k_roi:"ROI",
        d_resellerPayout:"리셀러 지급액",d_distributorPayout:"디스트리뷰터 지급액",d_rebate:"리베이트",d_payback:"회수기간",d_periodNet:"기간 누적 순효과",
        errDeals:"딜 수/가격은 1 이상이어야 합니다.",errRate:"비율 값은 0~100 범위여야 합니다.",errTake:"채널 마진+리베이트 합이 100% 이상이면 계산할 수 없습니다.",errCost:"비용/기간 값을 확인하세요.",
        statusGood:"채널 프로그램 수익성이 양수입니다",statusWarn:"현재 가정에서 월 순이익이 음수입니다",statusCheck:"입력값을 확인하세요",
        impossible:"달성 불가",monthsUnit:"개월",summaryTitle:"[리셀러 마진 워터폴 계산 요약]",copied:"요약이 복사되었습니다.",copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다."
      },
      en:{
        title:"🧮 Reseller Margin Waterfall Calculator",subtitle:"Model channel revenue waterfall after discount, reseller/distributor margins, and rebates.",back:"Back to Portal",
        inputs:"Inputs",copy:"Copy Summary",reset:"Reset Defaults",kpi:"Key KPIs",waiting:"Waiting for calculation",detail:"Waterfall details",
        deals:"Deals per month",listPrice:"List price per deal (KRW)",discount:"Average discount (%)",resellerMargin:"Reseller margin (%)",distributorMargin:"Distributor margin (%)",rebateRate:"Back-end rebate (%)",deliveryCost:"Delivery cost per deal (KRW)",supportCost:"Support cost per deal (KRW)",incentive:"Sales incentive per deal (KRW)",programCost:"Monthly channel program cost (KRW)",oneTime:"One-time enablement cost (KRW)",months:"Analysis period (months)",
        k_booked:"Booked revenue after discount",k_netChannel:"Net channel revenue",k_totalCost:"Monthly total cost",k_monthlyNet:"Monthly net profit",k_breakEvenDiscount:"Break-even max discount",k_roi:"ROI",
        d_resellerPayout:"Reseller payout",d_distributorPayout:"Distributor payout",d_rebate:"Rebate amount",d_payback:"Payback period",d_periodNet:"Cumulative net impact",
        errDeals:"Deals and list price must be at least 1.",errRate:"Rate inputs must be between 0 and 100.",errTake:"Combined channel take (margin+rebate) must be below 100%.",errCost:"Please review cost and period inputs.",
        statusGood:"Channel motion is profitable",statusWarn:"Monthly net profit is negative with current assumptions",statusCheck:"Please review input values",
        impossible:"Not achievable",monthsUnit:"months",summaryTitle:"[Reseller Margin Waterfall Summary]",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually."
      }
    };

    const t=(k)=>i18n[lang][k]??k;
    const locale=()=>lang==='ko'?'ko-KR':'en-US';
    const money=(n)=>new Intl.NumberFormat(locale(),{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang=lang;
      document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
      refs.lang.textContent=lang==='ko'?'EN':'KO';
    }

    function validate(v){
      if(!Number.isFinite(v.deals)||v.deals<1||!Number.isFinite(v.listPrice)||v.listPrice<1) return t('errDeals');
      if([v.discount,v.resellerMargin,v.distributorMargin,v.rebateRate].some(x=>!Number.isFinite(x)||x<0||x>100)) return t('errRate');
      if(v.resellerMargin+v.distributorMargin+v.rebateRate>=100) return t('errTake');
      if([v.deliveryCost,v.supportCost,v.incentive,v.programCost,v.oneTime].some(x=>!Number.isFinite(x)||x<0)||!Number.isFinite(v.months)||v.months<1) return t('errCost');
      return '';
    }

    function compute(v){
      const grossList = v.deals*v.listPrice;
      const bookedRevenue = grossList*(1-v.discount/100);
      const resellerPayout = bookedRevenue*(v.resellerMargin/100);
      const distributorPayout = bookedRevenue*(v.distributorMargin/100);
      const rebateAmount = bookedRevenue*(v.rebateRate/100);
      const netChannelRevenue = bookedRevenue-resellerPayout-distributorPayout-rebateAmount;

      const variableCost = v.deals*(v.deliveryCost+v.supportCost+v.incentive);
      const totalCost = variableCost+v.programCost;
      const monthlyNet = netChannelRevenue-totalCost;

      const periodNet = monthlyNet*v.months-v.oneTime;
      const invested = totalCost*v.months+v.oneTime;
      const roi = invested===0 ? (periodNet>=0?Infinity:-Infinity) : (periodNet/invested)*100;

      const coeff = 1-(v.resellerMargin+v.distributorMargin+v.rebateRate)/100;
      const requiredBooked = totalCost+(v.oneTime/v.months);
      const rawMaxDiscount = 1-(requiredBooked/(v.deals*v.listPrice*coeff));
      const breakEvenDiscount = Number.isFinite(rawMaxDiscount)&&rawMaxDiscount>=0 ? Math.min(rawMaxDiscount*100,100) : Infinity;

      const payback = monthlyNet>0 ? v.oneTime/monthlyNet : Infinity;
      return {bookedRevenue,resellerPayout,distributorPayout,rebateAmount,netChannelRevenue,totalCost,monthlyNet,periodNet,roi,breakEvenDiscount,payback};
    }

    function resetOutputs(){
      ['bookedRevenue','netChannelRevenue','totalCost','monthlyNet','breakEvenDiscount','roi','resellerPayout','distributorPayout','rebateAmount','payback','periodNet'].forEach(k=>refs[k].textContent='-');
      refs.summary.value='';
    }

    function render(){
      const v={
        deals:Number(refs.deals.value),listPrice:Number(refs.listPrice.value),discount:Number(refs.discount.value),resellerMargin:Number(refs.resellerMargin.value),distributorMargin:Number(refs.distributorMargin.value),rebateRate:Number(refs.rebateRate.value),deliveryCost:Number(refs.deliveryCost.value),supportCost:Number(refs.supportCost.value),incentive:Number(refs.incentive.value),programCost:Number(refs.programCost.value),oneTime:Number(refs.oneTime.value),months:Number(refs.months.value)
      };

      const err=validate(v);
      refs.error.classList.toggle('show',!!err);
      refs.error.textContent=err;
      if(err){refs.status.textContent=t('statusCheck');resetOutputs();return;}

      const r=compute(v);
      refs.bookedRevenue.textContent=money(r.bookedRevenue);
      refs.netChannelRevenue.textContent=money(r.netChannelRevenue);
      refs.totalCost.textContent=money(r.totalCost);
      refs.monthlyNet.textContent=money(r.monthlyNet);
      refs.breakEvenDiscount.textContent=Number.isFinite(r.breakEvenDiscount)?`${num(r.breakEvenDiscount,2)}%`:t('impossible');
      refs.roi.textContent=Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞');

      refs.resellerPayout.textContent=money(r.resellerPayout);
      refs.distributorPayout.textContent=money(r.distributorPayout);
      refs.rebateAmount.textContent=money(r.rebateAmount);
      refs.payback.textContent=Number.isFinite(r.payback)?`${num(r.payback,1)} ${t('monthsUnit')}`:t('impossible');
      refs.periodNet.textContent=money(r.periodNet);

      refs.status.innerHTML=r.monthlyNet>=0
        ? `<span class="ok">●</span> ${t('statusGood')}`
        : `<span class="warn">●</span> ${t('statusWarn')}`;

      refs.summary.value=[
        t('summaryTitle'),
        `${t('k_booked')}: ${money(r.bookedRevenue)}`,
        `${t('d_resellerPayout')}: ${money(r.resellerPayout)}`,
        `${t('d_distributorPayout')}: ${money(r.distributorPayout)}`,
        `${t('d_rebate')}: ${money(r.rebateAmount)}`,
        `${t('k_netChannel')}: ${money(r.netChannelRevenue)}`,
        `${t('k_totalCost')}: ${money(r.totalCost)}`,
        `${t('k_monthlyNet')}: ${money(r.monthlyNet)}`,
        `${t('k_breakEvenDiscount')}: ${Number.isFinite(r.breakEvenDiscount)?`${num(r.breakEvenDiscount,2)}%`:t('impossible')}`,
        `${t('k_roi')}: ${Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞')}`
      ].join('\n');
    }

    refs.copy.addEventListener('click',async()=>{
      if(!refs.summary.value.trim()) return;
      try{await navigator.clipboard.writeText(refs.summary.value);alert(t('copied'));}
      catch{alert(t('copyFail'));}
    });
    refs.reset.addEventListener('click',()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.deals,refs.listPrice,refs.discount,refs.resellerMargin,refs.distributorMargin,refs.rebateRate,refs.deliveryCost,refs.supportCost,refs.incentive,refs.programCost,refs.oneTime,refs.months].forEach(el=>{el.addEventListener('input',render);el.addEventListener('change',render);});
    refs.lang.addEventListener('click',()=>{lang=lang==='ko'?'en':'ko';applyI18n();render();});

    applyI18n();
    render();
  </script>
</body>
</html>
