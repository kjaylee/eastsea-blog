<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder - 이력서 빌더</title>
    <meta name="description" content="마크다운 또는 폼으로 이력서를 작성하고 3가지 템플릿으로 PDF 출력하세요">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border: #dee2e6;
            --accent: #667eea;
            --accent-dark: #5568d3;
            --shadow: rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-card: #252525;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #404040;
            --shadow: rgba(0, 0, 0, 0.4);
            --glass-bg: rgba(37, 37, 37, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px var(--shadow);
            transition: transform 0.2s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
        }

        .btn-secondary.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        .editor-panel, .preview-panel {
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
        }

        .panel-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        textarea {
            width: 100%;
            min-height: 600px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.95rem;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .preview-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px var(--shadow);
            min-height: 600px;
        }

        /* Resume Templates */
        .resume {
            color: #333;
            line-height: 1.6;
        }

        .resume h1 {
            color: #333;
            -webkit-text-fill-color: #333;
            margin-bottom: 5px;
        }

        .resume h2 {
            color: #555;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .resume h3 {
            color: #666;
            margin-top: 15px;
            margin-bottom: 8px;
        }

        .resume p {
            margin-bottom: 10px;
            color: #555;
        }

        .resume ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .resume li {
            margin-bottom: 5px;
            color: #555;
        }

        /* Minimal Template */
        .template-minimal h1 {
            font-size: 2.5rem;
            text-align: center;
        }

        .template-minimal .contact {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .template-minimal h2 {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Modern Template */
        .template-modern {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
        }

        .template-modern .sidebar {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .template-modern .sidebar h1 {
            font-size: 1.8rem;
        }

        .template-modern h2 {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        /* Creative Template */
        .template-creative h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .template-creative h2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
        }

        .template-creative .contact {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        @media print {
            body {
                background: white;
            }
            .toolbar, .editor-panel, .theme-toggle, header {
                display: none !important;
            }
            .main-content {
                grid-template-columns: 1fr;
            }
            .preview-panel {
                box-shadow: none;
                border: none;
                background: white;
            }
            .preview-container {
                box-shadow: none;
                padding: 0;
            }
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>

    <script src="/assets/analytics.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">🌓</button>

    <div class="container">
        <header>
            <h1>📄 Resume Builder</h1>
            <p class="subtitle">프로페셔널한 이력서를 쉽게 만들어보세요</p>
        </header>

        <div class="toolbar">
            <button class="btn btn-secondary active" data-template="minimal" onclick="changeTemplate('minimal')">
                미니멀
            </button>
            <button class="btn btn-secondary" data-template="modern" onclick="changeTemplate('modern')">
                모던
            </button>
            <button class="btn btn-secondary" data-template="creative" onclick="changeTemplate('creative')">
                크리에이티브
            </button>
            <div style="flex: 1"></div>
            <button class="btn btn-secondary" onclick="loadSample()">
                📋 샘플 불러오기
            </button>
            <button class="btn btn-secondary" onclick="clearData()">
                🗑️ 초기화
            </button>
            <button class="btn btn-primary" onclick="exportPDF()">
                💾 PDF로 저장
            </button>
        </div>

        <div class="main-content">
            <div class="editor-panel">
                <div class="panel-title">✍️ 이력서 작성 (마크다운)</div>
                <textarea id="markdownInput" placeholder="# 홍길동

## 학력

2016.03 - 2020.02

## 기술 스택
- 프론트엔드: React, Vue.js, TypeScript
- 백엔드: Node.js, Python

## 프로젝트
### 프로젝트명
설명..."></textarea>
            </div>

            <div class="preview-panel">
                <div class="panel-title">👁️ 실시간 미리보기</div>
                <div class="preview-container">
                    <div id="preview" class="resume template-minimal">
                        <p style="text-align: center; color: #999; margin-top: 100px;">
                            왼쪽에 이력서 내용을 입력하세요
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTemplate = 'minimal';
        const input = document.getElementById('markdownInput');
        const preview = document.getElementById('preview');

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function parseMarkdown(text) {
            let html = text;

            // Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Lists
            html = html.replace(/^\- (.*$)/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // Line breaks
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');

            // Wrap in paragraphs
            html = '<p>' + html + '</p>';

            // Clean up
            html = html.replace(/<p><h/g, '<h');
            html = html.replace(/<\/h([1-3])><\/p>/g, '</h$1>');
            html = html.replace(/<p><ul>/g, '<ul>');
            html = html.replace(/<\/ul><\/p>/g, '</ul>');
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p><br>/g, '<p>');

            return html;
        }

        function updatePreview() {
            const markdown = input.value;
            if (!markdown.trim()) {
                preview.innerHTML = '<p style="text-align: center; color: #999; margin-top: 100px;">왼쪽에 이력서 내용을 입력하세요</p>';
                return;
            }

            let html = parseMarkdown(markdown);

            // Extract contact info from first lines
            const lines = markdown.split('\n');
            let contactInfo = '';
            if (lines.length > 1 && lines[1].includes('|')) {
                contactInfo = `<div class="contact">${lines[1]}</div>`;
                html = html.replace(/<p>.*?\|.*?<\/p>/, '');
            }

            // Apply template structure
            if (currentTemplate === 'modern') {
                const nameMatch = html.match(/<h1>(.*?)<\/h1>/);
                const name = nameMatch ? nameMatch[1] : '';
                html = html.replace(/<h1>.*?<\/h1>/, '');

                preview.innerHTML = `
                    <div class="sidebar">
                        <h1>${name}</h1>
                        ${contactInfo}
                    </div>
                    <div class="main-content">
                        ${html}
                    </div>
                `;
            } else if (currentTemplate === 'creative') {
                preview.innerHTML = html.replace(/<div class="contact">/, contactInfo ? '<div class="contact">' : '');
            } else {
                preview.innerHTML = html.replace(/<h1>/, contactInfo ? '<h1>' : '<h1>') + (contactInfo || '');
            }

            localStorage.setItem('resume-content', markdown);
        }

        function changeTemplate(template) {
            currentTemplate = template;
            preview.className = `resume template-${template}`;

            // Update button states
            document.querySelectorAll('[data-template]').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-template="${template}"]`).classList.add('active');

            updatePreview();
            localStorage.setItem('resume-template', template);
        }

        function loadSample() {

            updatePreview();
        }

        function clearData() {
            if (confirm('모든 내용을 삭제하시겠습니까?')) {
                input.value = '';
                updatePreview();
            }
        }

        function exportPDF() {
            window.print();
        }

        // Auto-save and restore
        input.addEventListener('input', updatePreview);

        // Load saved content
        const savedContent = localStorage.getItem('resume-content');
        if (savedContent) {
            input.value = savedContent;
        }

        const savedTemplate = localStorage.getItem('resume-template');
        if (savedTemplate) {
            changeTemplate(savedTemplate);
        }

        updatePreview();
    </script>
</body>
