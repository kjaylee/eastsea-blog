<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retention Campaign ROI Calculator | 이탈 방지 캠페인 ROI 계산기</title>
  <meta name="description" content="고객 이탈 방지 캠페인의 월 유지 고객 수, 보호 매출, 순효과, ROI, 회수기간을 계산합니다." />
  <style>
    :root{--bg:#08121f;--card:#102338;--line:#2f4f70;--txt:#ebf3ff;--muted:#9db0cb;--pri:#53c7b8;--err:#f87171;--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#1f4f66 0%,#08121f 50%);color:var(--txt)}
    .wrap{max-width:1060px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#d8ecff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#102539;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#153450,#102338);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1b2f;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#45a89c);font-weight:700}
    .soft{background:#1a3550;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:96px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);border-radius:11px;padding:10px;background:#0f1f34}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;gap:6px;align-items:center;margin-top:10px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:#173552;color:#c3d9f2;font-size:.75rem}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🧲 이탈 방지 캠페인 ROI 계산기</h1>
        <div class="sub">이탈률 개선폭(pp)이 실제 이익으로 얼마나 전환되는지 정량 검증합니다.</div>
      </div>
      <a class="home" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="totalCustomers">전체 고객 수</label><input id="totalCustomers" type="number" min="1" value="18000" /></div>
          <div><label for="targetCustomers">캠페인 대상 고객 수</label><input id="targetCustomers" type="number" min="1" value="9000" /></div>
          <div><label for="churnRate">현재 월 이탈률 (%)</label><input id="churnRate" type="number" step="0.1" min="0.1" max="100" value="5.5" /></div>
          <div><label for="improvePp">이탈률 개선폭 (pp)</label><input id="improvePp" type="number" step="0.1" min="0.1" value="1.8" /></div>
          <div><label for="arpu">고객당 월매출 (KRW)</label><input id="arpu" type="number" min="1" value="42000" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" step="0.1" min="0.1" max="100" value="62" /></div>
          <div><label for="campaignCost">캠페인 비용 (KRW)</label><input id="campaignCost" type="number" min="0" value="15000000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="36" value="6" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 유지 고객 수</div><div id="savedCustomers" class="v">-</div></div>
          <div class="kpi"><div class="k">월 보호 매출</div><div id="protectedRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">월 증분 총이익</div><div id="monthlyProfitGain" class="v">-</div></div>
          <div class="kpi"><div class="k">기간 총이익</div><div id="totalProfitGain" class="v">-</div></div>
          <div class="kpi"><div class="k">순효과</div><div id="netGain" class="v sm">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>개선 후 월 이탈률</th><td id="improvedChurn">-</td></tr>
            <tr><th>회수기간</th><td id="payback">-</td></tr>
            <tr><th>유지 고객 1인당 비용</th><td id="costPerSaved">-</td></tr>
            <tr><th>분석 기간</th><td id="monthsOut">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      totalCustomers:$('totalCustomers'), targetCustomers:$('targetCustomers'), churnRate:$('churnRate'), improvePp:$('improvePp'),
      arpu:$('arpu'), margin:$('margin'), campaignCost:$('campaignCost'), months:$('months'),
      savedCustomers:$('savedCustomers'), protectedRevenue:$('protectedRevenue'), monthlyProfitGain:$('monthlyProfitGain'), totalProfitGain:$('totalProfitGain'),
      netGain:$('netGain'), roi:$('roi'), improvedChurn:$('improvedChurn'), payback:$('payback'), costPerSaved:$('costPerSaved'), monthsOut:$('monthsOut'),
      status:$('status'), error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = {
      totalCustomers:18000, targetCustomers:9000, churnRate:5.5, improvePp:1.8, arpu:42000, margin:62, campaignCost:15000000, months:6
    };

    const money = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.totalCustomers) || v.totalCustomers <= 0) return '전체 고객 수는 1 이상이어야 합니다.';
      if (!Number.isFinite(v.targetCustomers) || v.targetCustomers <= 0) return '대상 고객 수는 1 이상이어야 합니다.';
      if (v.targetCustomers > v.totalCustomers) return '대상 고객 수는 전체 고객 수를 초과할 수 없습니다.';
      if (!Number.isFinite(v.churnRate) || v.churnRate <= 0 || v.churnRate > 100) return '현재 월 이탈률은 0 초과 100 이하로 입력하세요.';
      if (!Number.isFinite(v.improvePp) || v.improvePp <= 0) return '이탈률 개선폭은 0보다 커야 합니다.';
      if (v.improvePp > v.churnRate) return '개선폭(pp)은 현재 이탈률보다 클 수 없습니다.';
      if (!Number.isFinite(v.arpu) || v.arpu <= 0) return '고객당 월매출은 0보다 커야 합니다.';
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return '매출총이익률은 0 초과 100 이하로 입력하세요.';
      if (!Number.isFinite(v.campaignCost) || v.campaignCost < 0) return '캠페인 비용은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.months) || v.months <= 0 || v.months > 36) return '분석 기간은 1~36개월 범위여야 합니다.';
      return '';
    }

    function compute(v){
      const improvedChurn = v.churnRate - v.improvePp;
      const savedCustomers = v.targetCustomers * (v.improvePp / 100);
      const protectedRevenue = savedCustomers * v.arpu;
      const monthlyProfitGain = protectedRevenue * (v.margin / 100);
      const totalProfitGain = monthlyProfitGain * v.months;
      const netGain = totalProfitGain - v.campaignCost;
      const roi = v.campaignCost === 0 ? Infinity : (netGain / v.campaignCost) * 100;
      const payback = v.campaignCost === 0 ? 0 : (monthlyProfitGain <= 0 ? Infinity : v.campaignCost / monthlyProfitGain);
      const costPerSaved = savedCustomers * v.months === 0 ? Infinity : v.campaignCost / (savedCustomers * v.months);
      return { improvedChurn, savedCustomers, protectedRevenue, monthlyProfitGain, totalProfitGain, netGain, roi, payback, costPerSaved };
    }

    function render(){
      const v = {
        totalCustomers:Number(refs.totalCustomers.value), targetCustomers:Number(refs.targetCustomers.value), churnRate:Number(refs.churnRate.value),
        improvePp:Number(refs.improvePp.value), arpu:Number(refs.arpu.value), margin:Number(refs.margin.value),
        campaignCost:Number(refs.campaignCost.value), months:Number(refs.months.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        ['savedCustomers','protectedRevenue','monthlyProfitGain','totalProfitGain','netGain','roi','improvedChurn','payback','costPerSaved','monthsOut'].forEach(k=>refs[k].textContent='-');
        refs.status.textContent='입력값을 확인하세요';
        refs.summary.value='';
        return;
      }

      const r = compute(v);
      refs.savedCustomers.textContent = `${num(r.savedCustomers,1)}명`;
      refs.protectedRevenue.textContent = money(r.protectedRevenue);
      refs.monthlyProfitGain.textContent = money(r.monthlyProfitGain);
      refs.totalProfitGain.textContent = money(r.totalProfitGain);
      refs.netGain.textContent = money(r.netGain);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : '∞';
      refs.improvedChurn.textContent = `${num(r.improvedChurn,2)}%`;
      refs.payback.textContent = r.payback === 0 ? '즉시' : (Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가');
      refs.costPerSaved.textContent = Number.isFinite(r.costPerSaved) ? money(r.costPerSaved) : '∞';
      refs.monthsOut.textContent = `${num(v.months,0)}개월`;

      refs.status.innerHTML = r.netGain > 0
        ? `<span class="ok">●</span> 순효과 ${money(r.netGain)} (캠페인 확장 후보)`
        : (r.netGain === 0 ? `● 손익분기` : `<span class="warn">●</span> 순손실 ${money(Math.abs(r.netGain))}`);

      refs.summary.value = [
        '[Retention Campaign ROI 요약]',
        `월 유지 고객 수: ${num(r.savedCustomers,1)}명`,
        `월 보호 매출: ${money(r.protectedRevenue)}`,
        `월 증분 총이익: ${money(r.monthlyProfitGain)}`,
        `기간 총이익(${num(v.months,0)}개월): ${money(r.totalProfitGain)}`,
        `순효과: ${money(r.netGain)}`,
        `ROI: ${Number.isFinite(r.roi) ? num(r.roi,1)+'%' : '∞'}`,
        `회수기간: ${r.payback===0?'즉시':(Number.isFinite(r.payback)?num(r.payback,1)+'개월':'회수 불가')}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.totalCustomers,refs.targetCustomers,refs.churnRate,refs.improvePp,refs.arpu,refs.margin,refs.campaignCost,refs.months].forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
