<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revenue-based Financing Cost Calculator | 매출연동 상환 금융비용 계산기</title>
  <meta name="description" content="파이낸싱 금액, 팩터레이트, 매출연동 상환비율을 기준으로 총상환액, 상환기간, 평균 월상환액, 추정 유효 APR(IRR)을 계산합니다." />
  <style>
    :root{--bg:#1b1121;--card:#2f1c3a;--line:#69457b;--txt:#fdf2ff;--muted:#e2bfe9;--pri:#d946ef;--ok:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#5f236c 0%,var(--bg) 58%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 72px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .home{color:#fee7ff;text-decoration:none;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#5a2f68;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(160deg,#4a2959,#2a1934);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#23122d;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#e879f9,#c026d3)}
    .soft{background:#563566;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7a3641;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    textarea{margin-top:10px;min-height:114px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#281531;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.06rem;font-weight:800}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;margin-top:10px;border:1px solid var(--line);border-radius:999px;background:#4a2b57;color:#ffeaff;font-size:.77rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.84rem}
    th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .ok{color:var(--ok)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:880px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>💸 매출연동 상환 금융비용 계산기</h1>
        <div class="sub">Revenue-based Financing 조건(팩터레이트·매출연동 상환율·성장률)으로 <b>총상환액, 예상 상환개월, 추정 APR</b>를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력 (Inputs)</h2>
        <div class="inputs">
          <div><label for="financingAmount">조달 금액 Financing Amount (KRW)</label><input id="financingAmount" type="number" min="1" step="10000" value="80000000" /></div>
          <div><label for="factorRate">팩터 레이트 Factor Rate (x)</label><input id="factorRate" type="number" min="1" step="0.01" value="1.32" /></div>
          <div><label for="revenueShare">매출연동 상환율 Revenue Share (%)</label><input id="revenueShare" type="number" min="0.1" max="100" step="0.1" value="8" /></div>
          <div><label for="monthlyRevenue">현재 월매출 Current Monthly Revenue (KRW)</label><input id="monthlyRevenue" type="number" min="1" step="1000" value="42000000" /></div>
          <div><label for="monthlyGrowth">월매출 성장률 Monthly Growth (%)</label><input id="monthlyGrowth" type="number" min="-50" max="100" step="0.1" value="2" /></div>
          <div><label for="minPayment">월 최소 상환액 Minimum Payment (KRW)</label><input id="minPayment" type="number" min="0" step="1000" value="1800000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사 Copy</button>
          <button id="reset" type="button">기본값 복원 Reset</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">총 상환액 Total Payback</div><div id="totalPayback" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 상환기간</div><div id="monthsToRepay" class="v">-</div></div>
          <div class="kpi"><div class="k">평균 월상환액</div><div id="avgPayment" class="v">-</div></div>
          <div class="kpi"><div class="k">추정 유효 APR (IRR)</div><div id="apr" class="v">-</div></div>
          <div class="kpi"><div class="k">총 금융비용 (Payback - Principal)</div><div id="totalCost" class="v">-</div></div>
          <div class="kpi"><div class="k">최종월 상환액</div><div id="lastPayment" class="v">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">상환 스케줄 (최대 12개월 미리보기)</h2>
        <table>
          <thead>
            <tr><th>Month</th><th>Revenue</th><th>Payment</th><th>Remaining</th></tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      financingAmount:$("financingAmount"), factorRate:$("factorRate"), revenueShare:$("revenueShare"), monthlyRevenue:$("monthlyRevenue"), monthlyGrowth:$("monthlyGrowth"), minPayment:$("minPayment"),
      totalPayback:$("totalPayback"), monthsToRepay:$("monthsToRepay"), avgPayment:$("avgPayment"), apr:$("apr"), totalCost:$("totalCost"), lastPayment:$("lastPayment"),
      scheduleBody:$("scheduleBody"), status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { financingAmount:80000000, factorRate:1.32, revenueShare:8, monthlyRevenue:42000000, monthlyGrowth:2, minPayment:1800000 };

    const won = (n) => new Intl.NumberFormat("ko-KR", {style:"currency", currency:"KRW", maximumFractionDigits:0}).format(n || 0);
    const num = (n, d=2) => Number(n).toLocaleString("ko-KR", {maximumFractionDigits:d});
    const pct = (x, d=2) => `${num(x*100,d)}%`;
    const inRange = (v,min,max)=>Number.isFinite(v)&&v>=min&&v<=max;

    function validate(v){
      if (!Number.isFinite(v.financingAmount) || v.financingAmount <= 0) return "조달 금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.factorRate) || v.factorRate < 1) return "팩터 레이트는 1 이상이어야 합니다.";
      if (!inRange(v.revenueShare,0.1,100)) return "매출연동 상환율은 0.1~100 범위여야 합니다.";
      if (!Number.isFinite(v.monthlyRevenue) || v.monthlyRevenue <= 0) return "현재 월매출은 0보다 커야 합니다.";
      if (!inRange(v.monthlyGrowth,-50,100)) return "월매출 성장률은 -50%~100% 범위여야 합니다.";
      if (!Number.isFinite(v.minPayment) || v.minPayment < 0) return "월 최소 상환액은 0 이상이어야 합니다.";
      return "";
    }

    function simulate(v){
      const totalPayback = v.financingAmount * v.factorRate;
      const growth = v.monthlyGrowth / 100;
      const share = v.revenueShare / 100;
      let revenue = v.monthlyRevenue;
      let remaining = totalPayback;
      const rows = [];

      for (let m = 1; m <= 240 && remaining > 0; m++) {
        if (m > 1) revenue = Math.max(0, revenue * (1 + growth));
        const variablePay = revenue * share;
        let payment = Math.max(variablePay, v.minPayment);
        payment = Math.min(payment, remaining);
        remaining -= payment;
        rows.push({ month:m, revenue, payment, remaining });
      }

      const monthsToRepay = remaining <= 0 ? rows.length : Infinity;
      const totalPaid = rows.reduce((a,b)=>a+b.payment,0);
      const avgPayment = rows.length ? totalPaid / rows.length : 0;
      const lastPayment = rows.length ? rows[rows.length-1].payment : 0;
      const apr = estimateApr(v.financingAmount, rows.map(r=>r.payment));

      return { totalPayback, rows, monthsToRepay, avgPayment, totalPaid, lastPayment, apr };
    }

    function npv(monthlyRate, principal, payments){
      let acc = principal;
      for (let i = 0; i < payments.length; i++) {
        acc -= payments[i] / Math.pow(1 + monthlyRate, i + 1);
      }
      return acc;
    }

    function estimateApr(principal, payments){
      if (!payments.length) return NaN;
      let lo = -0.95;
      let hi = 5;
      let fLo = npv(lo, principal, payments);
      let fHi = npv(hi, principal, payments);
      if (!Number.isFinite(fLo) || !Number.isFinite(fHi) || fLo * fHi > 0) return NaN;

      for (let i = 0; i < 120; i++) {
        const mid = (lo + hi) / 2;
        const fMid = npv(mid, principal, payments);
        if (!Number.isFinite(fMid)) return NaN;
        if (Math.abs(fMid) < 1e-7) {
          const annual = Math.pow(1 + mid, 12) - 1;
          return annual;
        }
        if (fLo * fMid <= 0) { hi = mid; fHi = fMid; }
        else { lo = mid; fLo = fMid; }
      }

      const monthly = (lo + hi) / 2;
      return Math.pow(1 + monthly, 12) - 1;
    }

    function resetOutput(){
      ["totalPayback","monthsToRepay","avgPayment","apr","totalCost","lastPayment"].forEach((k)=>refs[k].textContent='-');
      refs.scheduleBody.innerHTML = "";
      refs.status.textContent = "입력을 확인하세요";
      refs.summary.value = "";
    }

    function renderSchedule(rows){
      const preview = rows.slice(0, 12);
      refs.scheduleBody.innerHTML = preview.map((r) =>
        `<tr><td>${r.month}</td><td>${won(r.revenue)}</td><td>${won(r.payment)}</td><td>${won(Math.max(0,r.remaining))}</td></tr>`
      ).join("");
      if (rows.length > 12) {
        const last = rows[rows.length - 1];
        refs.scheduleBody.innerHTML += `<tr><td>... → ${last.month}</td><td>${won(last.revenue)}</td><td>${won(last.payment)}</td><td>${won(Math.max(0,last.remaining))}</td></tr>`;
      }
    }

    function render(){
      const v = {
        financingAmount:Number(refs.financingAmount.value), factorRate:Number(refs.factorRate.value), revenueShare:Number(refs.revenueShare.value),
        monthlyRevenue:Number(refs.monthlyRevenue.value), monthlyGrowth:Number(refs.monthlyGrowth.value), minPayment:Number(refs.minPayment.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", Boolean(err));
      refs.error.textContent = err;
      if (err){ resetOutput(); return; }

      const r = simulate(v);
      refs.totalPayback.textContent = won(r.totalPayback);
      refs.totalCost.textContent = won(r.totalPayback - v.financingAmount);
      refs.monthsToRepay.textContent = Number.isFinite(r.monthsToRepay) ? `${num(r.monthsToRepay,0)}개월` : "240개월+ (조건 재검토)";
      refs.avgPayment.textContent = won(r.avgPayment);
      refs.lastPayment.textContent = won(r.lastPayment);
      refs.apr.textContent = Number.isFinite(r.apr) ? pct(r.apr,2) : "N/A";

      renderSchedule(r.rows);

      if (!Number.isFinite(r.monthsToRepay)) refs.status.innerHTML = `<span class="bad">●</span> 240개월 내 상환 불가 — 팩터/상환율/매출 성장 가정 점검 필요`;
      else if (r.monthsToRepay <= 24) refs.status.innerHTML = `<span class="ok">●</span> 예상 상환기간 ${r.monthsToRepay}개월`;
      else refs.status.innerHTML = `<span class="warn">●</span> 장기 상환 구조 (${r.monthsToRepay}개월)`;

      refs.summary.value = [
        "[Revenue-based Financing Cost 요약]",
        `조달원금: ${won(v.financingAmount)}`,
        `총상환액: ${won(r.totalPayback)} (금융비용 ${won(r.totalPayback - v.financingAmount)})`,
        `상환기간: ${Number.isFinite(r.monthsToRepay) ? `${r.monthsToRepay}개월` : '240개월+'}`,
        `평균 월상환액: ${won(r.avgPayment)} / 최종월 상환액: ${won(r.lastPayment)}`,
        `추정 APR(IRR): ${Number.isFinite(r.apr) ? pct(r.apr,2) : 'N/A'}`,
        `조건: Revenue Share ${v.revenueShare}% · Monthly Growth ${v.monthlyGrowth}%`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 사용해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k,v]) => refs[k].value = v);
      render();
    });

    [refs.financingAmount, refs.factorRate, refs.revenueShare, refs.monthlyRevenue, refs.monthlyGrowth, refs.minPayment].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
