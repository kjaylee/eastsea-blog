<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>수익 대시보드 계산기 - Revenue Dashboard Calculator</title>
<meta name="description" content="AdSense, Telegram Stars, Direct Sales, itch.io 수익을 통합 계산하고 월간 목표 달성률 및 12개월 예측 차트를 제공합니다." />
<style>
:root{
  --bg:#070f1d;
  --card:#101b31;
  --card2:#0b1426;
  --line:#274267;
  --text:#e9f0ff;
  --muted:#a6b8db;
  --accent:#4ca8ff;
  --good:#34d399;
  --warn:#f59e0b;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:radial-gradient(960px 700px at 88% -10%,#28446f 0%,var(--bg) 50%) fixed;color:var(--text);padding:18px}
.container{max-width:1180px;margin:0 auto}
h1{margin:0 0 6px;font-size:clamp(1.4rem,3vw,2rem)}
.sub{margin:0 0 16px;color:var(--muted)}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.24)}
.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
label{display:block;color:var(--muted);font-size:.85rem;margin-bottom:5px}
input,button{font:inherit}
input{width:100%;padding:9px 11px;border-radius:10px;border:1px solid var(--line);background:#0a1222;color:var(--text)}
.field{margin-bottom:10px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:9px 12px;border-radius:10px;border:1px solid #2f4f82;background:#182a49;color:#e6efff;cursor:pointer}
.btn.primary{border:0;background:linear-gradient(135deg,#1a70d8,#4ba8ff);font-weight:700}
.btn:hover{filter:brightness(1.08)}
.kpi{background:#0a1326;border:1px solid var(--line);border-radius:12px;padding:10px}
.kpi small{color:#a7bcde}
.kpi b{display:block;font-size:1.28rem;margin-top:4px}
.goal{margin-top:6px}
.bar{height:12px;background:#0b1529;border:1px solid var(--line);border-radius:999px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#33d29d,#58b4ff);width:0%}
canvas{width:100%;height:290px;background:#080f1d;border:1px solid var(--line);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:.9rem}
th,td{padding:8px;border-bottom:1px dashed #224067;text-align:left}
th{color:#c6d7f6}
.note{font-size:.84rem;color:var(--muted)}
@media(max-width:980px){.grid-2,.grid-4{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.grid-2,.grid-4{grid-template-columns:1fr}}
</style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<div class="container">
  <h1>💰 수익 대시보드 계산기</h1>
  <p class="sub">수익원을 통합 계산하고 목표 달성률 + 12개월 성장 시나리오를 확인하세요.</p>

  <div class="grid grid-2">
    <div class="card">
      <h2 style="margin:0 0 10px;font-size:1.1rem">입력값</h2>
      <div class="grid grid-2">
        <div>
          <div class="field"><label>AdSense CPM ($)</label><input id="adsCpm" type="number" step="0.01" min="0" value="3.5" /></div>
          <div class="field"><label>AdSense 월 페이지뷰</label><input id="adsViews" type="number" min="0" value="120000" /></div>

          <div class="field"><label>Telegram Stars 수량</label><input id="starsCount" type="number" min="0" value="6000" /></div>
          <div class="field"><label>Stars 환산율 ($/star)</label><input id="starsRate" type="number" step="0.0001" min="0" value="0.013" /></div>
        </div>

        <div>
          <div class="field"><label>Direct Sales 판매 수량</label><input id="directUnits" type="number" min="0" value="80" /></div>
          <div class="field"><label>Direct Sales 단가 ($)</label><input id="directPrice" type="number" step="0.01" min="0" value="9.99" /></div>

          <div class="field"><label>itch.io 총매출 ($)</label><input id="itchGross" type="number" step="0.01" min="0" value="1200" /></div>
          <div class="field"><label>itch.io 수익 배분율 (%)</label><input id="itchShare" type="number" step="0.1" min="0" max="100" value="90" /></div>
        </div>
      </div>

      <div class="grid grid-2">
        <div class="field"><label>월 성장률 가정 (%)</label><input id="growth" type="number" step="0.1" value="6" /></div>
        <div class="field"><label>월 목표 수익 ($)</label><input id="goal" type="number" step="0.01" min="0" value="5000" /></div>
      </div>

      <div class="row" style="margin-top:6px">
        <button id="calcBtn" class="btn primary">계산</button>
        <button id="saveBtn" class="btn">저장</button>
        <button id="loadBtn" class="btn">불러오기</button>
        <button id="sampleBtn" class="btn">샘플 프리셋</button>
      </div>
      <p id="status" class="note" style="margin-top:8px"></p>
    </div>

    <div class="card">
      <h2 style="margin:0 0 10px;font-size:1.1rem">월 수익 요약</h2>
      <div id="kpiGrid" class="grid grid-4"></div>
      <div class="goal">
        <div class="note" id="goalText">Target $0/month — 0% achieved</div>
        <div class="bar"><div id="goalFill" class="fill"></div></div>
      </div>
      <table style="margin-top:10px">
        <thead><tr><th>Source</th><th>월 수익</th><th>연 환산</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="card" style="margin-top:14px">
    <h2 style="margin:0 0 10px;font-size:1.1rem">📉 12개월 수익 프로젝션</h2>
    <canvas id="chart" width="1100" height="290"></canvas>
    <p class="note" style="margin-top:8px">현재 월 수익을 기준으로 월 성장률을 적용한 단순 예측입니다.</p>
  </div>
</div>

<script>
(() => {
  const STORAGE_KEY = 'eastsea-revenue-dashboard-v1';
  const $ = (s) => document.querySelector(s);
  const ids = ['adsCpm','adsViews','starsCount','starsRate','directUnits','directPrice','itchGross','itchShare','growth','goal'];
  const dom = Object.fromEntries(ids.map(id => [id, document.getElementById(id)]));
  dom.calcBtn = $('#calcBtn'); dom.saveBtn = $('#saveBtn'); dom.loadBtn = $('#loadBtn'); dom.sampleBtn = $('#sampleBtn');
  dom.status = $('#status'); dom.kpiGrid = $('#kpiGrid'); dom.tbody = $('#tbody'); dom.goalText = $('#goalText'); dom.goalFill = $('#goalFill'); dom.chart = $('#chart');

  const num = (id) => Number(dom[id].value || 0);
  const usd = (v) => '$' + v.toLocaleString(undefined,{maximumFractionDigits:2,minimumFractionDigits:2});

  function calculate(){
    const adsense = (num('adsViews') / 1000) * num('adsCpm');
    const stars = num('starsCount') * num('starsRate');
    const direct = num('directUnits') * num('directPrice');
    const itch = num('itchGross') * (num('itchShare') / 100);
    const total = adsense + stars + direct + itch;

    const target = num('goal');
    const achieved = target > 0 ? (total / target * 100) : 0;
    const growth = num('growth') / 100;
    const monthly = Array.from({length:12}, (_,i) => total * Math.pow(1 + growth, i));

    return { adsense, stars, direct, itch, total, target, achieved, monthly };
  }

  function render(data){
    dom.kpiGrid.innerHTML = [
      ['AdSense', data.adsense],
      ['Telegram Stars', data.stars],
      ['Direct Sales', data.direct],
      ['itch.io', data.itch],
      ['총 월 수익', data.total]
    ].map(([k,v]) => `<div class="kpi"><small>${k}</small><b>${usd(v)}</b></div>`).join('');

    dom.tbody.innerHTML = [
      ['AdSense', data.adsense],
      ['Telegram Stars', data.stars],
      ['Direct Sales', data.direct],
      ['itch.io', data.itch],
      ['TOTAL', data.total]
    ].map(([name,val]) => `<tr><td>${name}</td><td>${usd(val)}</td><td>${usd(val*12)}</td></tr>`).join('');

    const pct = Math.max(0, Math.min(400, data.achieved));
    dom.goalText.textContent = `Target ${usd(data.target)}/month — ${pct.toFixed(1)}% achieved`;
    dom.goalFill.style.width = `${Math.min(100, pct)}%`;

    drawChart(data.monthly);
  }

  function drawChart(values){
    const canvas = dom.chart;
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(290 * dpr);
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width, H = 290;
    ctx.clearRect(0,0,W,H);

    const pad = {l:54,r:20,t:22,b:34};
    const w = W - pad.l - pad.r;
    const h = H - pad.t - pad.b;

    const max = Math.max(...values, 1);
    const min = 0;

    ctx.strokeStyle = '#29456f';
    ctx.lineWidth = 1;
    for(let i=0;i<=4;i++){
      const y = pad.t + h*(i/4);
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
      const val = max - (max-min)*(i/4);
      ctx.fillStyle = '#9fb4d8';
      ctx.font = '12px sans-serif';
      ctx.fillText('$'+Math.round(val).toLocaleString(), 6, y+4);
    }

    ctx.beginPath();
    values.forEach((v,i)=>{
      const x = pad.l + (i/(values.length-1))*w;
      const y = pad.t + h*(1 - (v-min)/(max-min || 1));
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.strokeStyle = '#57b2ff';
    ctx.lineWidth = 3;
    ctx.stroke();

    values.forEach((v,i)=>{
      const x = pad.l + (i/(values.length-1))*w;
      const y = pad.t + h*(1 - (v-min)/(max-min || 1));
      ctx.fillStyle = '#8ed7ff';
      ctx.beginPath(); ctx.arc(x,y,3.2,0,Math.PI*2); ctx.fill();
      if(i % 2 === 0 || i === values.length-1){
        ctx.fillStyle = '#a9bde0';
        ctx.font = '11px sans-serif';
        ctx.fillText(`M${i+1}`, x-10, H-12);
      }
    });
  }

  function getState(){
    return Object.fromEntries(ids.map(id => [id, dom[id].value]));
  }

  function setState(obj){
    ids.forEach(id => {
      if(obj && obj[id] != null) dom[id].value = obj[id];
    });
  }

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(getState()));
    dom.status.textContent = '저장되었습니다.';
  }

  function load(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){
      dom.status.textContent = '저장된 데이터가 없습니다.';
      return;
    }
    setState(JSON.parse(raw));
    dom.status.textContent = '불러왔습니다.';
    run();
  }

  function sample(){
    setState({
      adsCpm: 4.2,
      adsViews: 250000,
      starsCount: 12000,
      starsRate: 0.013,
      directUnits: 180,
      directPrice: 12.99,
      itchGross: 2400,
      itchShare: 90,
      growth: 8,
      goal: 10000
    });
    run();
    dom.status.textContent = '샘플 프리셋 적용';
  }

  function run(){
    const data = calculate();
    render(data);
  }

  dom.calcBtn.addEventListener('click', run);
  dom.saveBtn.addEventListener('click', save);
  dom.loadBtn.addEventListener('click', load);
  dom.sampleBtn.addEventListener('click', sample);
  window.addEventListener('resize', run);

  run();
})();
</script>
</body>
</html>
