<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>robots.txt 생성기 | East Sea Tools</title>
<meta name="description" content="robots.txt 파일을 쉽게 만들어보세요. 크롤러별 허용/차단 규칙, 사이트맵 설정까지 한번에.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4F46E5;--primary-light:#6366F1;--bg:#f8fafc;--surface:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.1);--radius:12px}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--text-secondary:#94a3b8;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.container{max-width:700px;width:100%}
h1{font-size:1.8rem;text-align:center;margin:20px 0 8px;color:var(--primary)}
.desc{text-align:center;color:var(--text-secondary);margin-bottom:24px;font-size:.95rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.card h2{font-size:1.1rem;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--primary)}
label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}
input,select,textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;background:var(--bg);color:var(--text);margin-bottom:12px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.btn{padding:12px 24px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:var(--primary-light)}
.btn-full{width:100%}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-danger{background:#ef4444;font-size:.8rem;padding:6px 12px}
.btn-danger:hover{background:#dc2626}
.btn-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.rule-group{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;position:relative}
.rule-group .remove{position:absolute;top:8px;right:8px}
.rule-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.rule-row select{width:120px;margin:0}
.rule-row input{flex:1;margin:0}
.rule-row button{flex-shrink:0}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.checkbox-row input{width:auto;margin:0}
.checkbox-row label{margin:0;font-weight:400;font-size:.9rem}
.output{position:relative}
.output pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.85rem;overflow-x:auto;white-space:pre;line-height:1.6;min-height:100px}
.copy-btn{position:absolute;top:8px;right:8px;padding:6px 12px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem}
.presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.preset{padding:6px 14px;background:var(--bg);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:.82rem;transition:all .2s}
.preset:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
footer{text-align:center;padding:32px 0 16px;color:var(--text-secondary);font-size:.8rem}
</style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<div class="container">
<h1>🤖 robots.txt 생성기</h1>
<p class="desc">검색엔진 크롤러 제어를 위한 robots.txt를 쉽게 만드세요.</p>

<div class="card">
<h2>⚡ 프리셋</h2>
<div class="presets">
<span class="preset" onclick="applyPreset('all')">모든 크롤러 허용</span>
<span class="preset" onclick="applyPreset('block')">모든 크롤러 차단</span>
<span class="preset" onclick="applyPreset('standard')">표준 설정</span>
<span class="preset" onclick="applyPreset('wordpress')">워드프레스</span>
<span class="preset" onclick="applyPreset('noai')">AI 크롤러 차단</span>
</div>
</div>

<div class="card">
<h2>📋 규칙 설정</h2>
<div id="ruleGroups"></div>
<button class="btn btn-outline" onclick="addGroup()">+ 에이전트 그룹 추가</button>
</div>

<div class="card">
<h2>🗺️ 사이트맵</h2>
<label>사이트맵 URL</label>
<input type="url" id="sitemap" placeholder="https://example.com/sitemap.xml">
<div class="checkbox-row">
<input type="checkbox" id="addCrawlDelay">
<label for="addCrawlDelay">Crawl-delay 추가</label>
</div>
<div id="crawlDelayWrap" style="display:none">
<label>Crawl-delay (초)</label>
<input type="number" id="crawlDelay" value="10" min="1" max="120">
</div>
</div>

<button class="btn btn-full" onclick="generate()" style="margin-bottom:16px">🤖 robots.txt 생성</button>

<div class="card output">
<h2>📄 결과</h2>
<button class="copy-btn" onclick="copyResult()">📋 복사</button>
<pre id="output"># 위 설정을 완료하고 생성 버튼을 클릭하세요</pre>
</div>
</div>
<footer>© 2026 East Sea</footer>

<script>
let groups=[];

document.getElementById('addCrawlDelay').addEventListener('change',e=>{
document.getElementById('crawlDelayWrap').style.display=e.target.checked?'block':'none';
});

function addGroup(agent='*',rules=[{type:'Allow',path:'/'}]){
const id=Date.now();
groups.push({id,agent,rules});
renderGroups();
}

function removeGroup(id){
groups=groups.filter(g=>g.id!==id);
renderGroups();
}

function addRule(groupId){
const g=groups.find(g=>g.id===groupId);
if(g){g.rules.push({type:'Disallow',path:''});renderGroups();}
}

function removeRule(groupId,ruleIdx){
const g=groups.find(g=>g.id===groupId);
if(g&&g.rules.length>1){g.rules.splice(ruleIdx,1);renderGroups();}
}

function renderGroups(){
const el=document.getElementById('ruleGroups');
el.innerHTML=groups.map(g=>`
<div class="rule-group">
<button class="btn btn-danger remove" onclick="removeGroup(${g.id})">✕ 삭제</button>
<label>User-agent</label>
<input type="text" value="${g.agent}" onchange="updateAgent(${g.id},this.value)" placeholder="* (모든 크롤러)" style="margin-bottom:12px">
${g.rules.map((r,i)=>`
<div class="rule-row">
<select onchange="updateRuleType(${g.id},${i},this.value)">
<option value="Allow"${r.type==='Allow'?' selected':''}>Allow</option>
<option value="Disallow"${r.type==='Disallow'?' selected':''}>Disallow</option>
</select>
<input type="text" value="${r.path}" onchange="updateRulePath(${g.id},${i},this.value)" placeholder="/">
<button class="btn btn-danger" onclick="removeRule(${g.id},${i})">✕</button>
</div>
`).join('')}
<button class="btn btn-outline" style="font-size:.8rem;padding:6px 12px;margin-top:4px" onclick="addRule(${g.id})">+ 규칙 추가</button>
</div>
`).join('');
}

function updateAgent(id,val){const g=groups.find(g=>g.id===id);if(g)g.agent=val;}
function updateRuleType(id,idx,val){const g=groups.find(g=>g.id===id);if(g)g.rules[idx].type=val;}
function updateRulePath(id,idx,val){const g=groups.find(g=>g.id===id);if(g)g.rules[idx].path=val;}

function generate(){
let output='# robots.txt\n# Generated by East Sea Tools\n# https://eastsea.monster/tools/robots-txt-gen/\n\n';
for(const g of groups){
output+=`User-agent: ${g.agent}\n`;
for(const r of g.rules){
output+=`${r.type}: ${r.path}\n`;
}
if(document.getElementById('addCrawlDelay').checked){
output+=`Crawl-delay: ${document.getElementById('crawlDelay').value}\n`;
}
output+='\n';
}
const sitemap=document.getElementById('sitemap').value.trim();
if(sitemap)output+=`Sitemap: ${sitemap}\n`;
document.getElementById('output').textContent=output;
}

function copyResult(){
const text=document.getElementById('output').textContent;
navigator.clipboard.writeText(text).then(()=>{
const btn=document.querySelector('.copy-btn');
btn.textContent='✅ 복사됨!';
setTimeout(()=>btn.textContent='📋 복사',1500);
});
}

function applyPreset(type){
groups=[];
switch(type){
case'all':
addGroup('*',[{type:'Allow',path:'/'}]);
break;
case'block':
addGroup('*',[{type:'Disallow',path:'/'}]);
break;
case'standard':
addGroup('*',[{type:'Allow',path:'/'},{type:'Disallow',path:'/admin/'},{type:'Disallow',path:'/private/'},{type:'Disallow',path:'/tmp/'}]);
break;
case'wordpress':
addGroup('*',[{type:'Allow',path:'/'},{type:'Disallow',path:'/wp-admin/'},{type:'Allow',path:'/wp-admin/admin-ajax.php'},{type:'Disallow',path:'/wp-includes/'},{type:'Disallow',path:'/wp-content/plugins/'},{type:'Disallow',path:'/trackback/'},{type:'Disallow',path:'/?s='},{type:'Disallow',path:'/search/'}]);
break;
case'noai':
addGroup('*',[{type:'Allow',path:'/'}]);
addGroup('GPTBot',[{type:'Disallow',path:'/'}]);
addGroup('ChatGPT-User',[{type:'Disallow',path:'/'}]);
addGroup('CCBot',[{type:'Disallow',path:'/'}]);
addGroup('anthropic-ai',[{type:'Disallow',path:'/'}]);
addGroup('Google-Extended',[{type:'Disallow',path:'/'}]);
addGroup('ClaudeBot',[{type:'Disallow',path:'/'}]);
break;
}
generate();
}

// Init with one default group
addGroup();
</script>
</body>
</html>
