<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>robots.txt 테스터 | Robots.txt Tester</title>
  <meta name="description" content="robots.txt 규칙을 입력하고 특정 URL이 크롤링 허용인지 검사합니다. user-agent별 규칙 해석과 매칭 규칙을 제공합니다.">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fff;--bg2:#f6f7fb;--text:#1f2937;--muted:#6b7280;--card:#fff;--border:#e5e7eb;--accent:#6366f1;--ok:#10b981;--warn:#f59e0b;--err:#ef4444}
    [data-theme="dark"]{--bg:#111827;--bg2:#0f172a;--text:#f3f4f6;--muted:#9ca3af;--card:#1f2937;--border:#374151;--accent:#818cf8}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg2);color:var(--text);padding:20px;min-height:100vh}
    .container{max-width:980px;margin:0 auto}
    h1{text-align:center;font-size:1.9rem;background:linear-gradient(135deg,#6366f1,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
    .sub{text-align:center;color:var(--muted);margin-bottom:24px;font-size:.95rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
    label{display:block;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
    textarea,input[type="text"]{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:.9rem}
    textarea{min-height:180px;font-family:ui-monospace,Menlo,monospace;resize:vertical;line-height:1.5}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .btn{padding:9px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.85rem}
    .btn.primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
    .btn.gray{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
    .result{padding:12px;border-radius:10px;font-weight:700;margin-top:10px}
    .result.allow{background:#d1fae5;color:#065f46}
    .result.disallow{background:#fee2e2;color:#991b1b}
    [data-theme="dark"] .result.allow{background:#064e3b;color:#6ee7b7}
    [data-theme="dark"] .result.disallow{background:#7f1d1d;color:#fca5a5}
    .match{font-family:ui-monospace,Menlo,monospace;font-size:.85rem;margin-top:6px;color:var(--muted)}
    .top-btn{position:fixed;top:14px;width:40px;height:40px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--card);text-decoration:none;font-size:1.1rem}
    .home{left:14px}.theme{right:14px;cursor:pointer;border:1px solid var(--border)}
    @media(max-width:820px){.grid{grid-template-columns:1fr}}
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <a class="top-btn home" href="/">🏠</a>
  <button class="top-btn theme" onclick="toggleTheme()">🌓</button>
  <div class="container">
    <h1>🤖 robots.txt 테스터</h1>
    <p class="sub">robots.txt 규칙을 해석하여 특정 URL이 허용/차단인지 테스트합니다.</p>

    <div class="card grid">
      <div>
        <label>robots.txt 내용</label>
        <textarea id="robotsInput" oninput="test()"></textarea>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn primary" onclick="test()">테스트</button>
          <button class="btn gray" onclick="loadSample()">샘플</button>
          <button class="btn gray" onclick="clearAll()">초기화</button>
        </div>
      </div>
      <div>
        <label>User-agent</label>
        <input type="text" id="uaInput" value="Googlebot" oninput="test()">
        <label style="margin-top:10px">테스트 URL (경로 포함)</label>
        <input type="text" id="urlInput" value="https://example.com/private/page" oninput="test()">
        <div id="result" class="result" style="display:none"></div>
        <div id="match" class="match"></div>
      </div>
    </div>

    <div class="card">
      <label>해석 규칙</label>
      <div style="font-size:.85rem;color:var(--muted);line-height:1.5">
        <ul style="padding-left:18px">
          <li>사용자 에이전트가 가장 잘 매칭되는 그룹을 선택합니다.</li>
          <li>경로 매칭은 가장 긴 규칙이 우선합니다.</li>
          <li>길이가 같은 경우 Allow가 Disallow보다 우선합니다.</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    function loadSample(){
      document.getElementById('robotsInput').value = `User-agent: *
Disallow: /private/
Allow: /private/public/

User-agent: Googlebot
Disallow: /no-google/
Allow: /private/public/

Sitemap: https://example.com/sitemap.xml`;
      test();
    }

    function clearAll(){
      document.getElementById('robotsInput').value='';
      document.getElementById('uaInput').value='Googlebot';
      document.getElementById('urlInput').value='https://example.com/private/page';
      document.getElementById('result').style.display='none';
      document.getElementById('match').textContent='';
    }

    function test(){
      const robots = document.getElementById('robotsInput').value;
      const ua = document.getElementById('uaInput').value.trim() || '*';
      const urlStr = document.getElementById('urlInput').value.trim();
      if (!robots || !urlStr) { document.getElementById('result').style.display='none'; return; }
      let path = '/';
      try {
        const u = new URL(urlStr);
        path = u.pathname + (u.search||'');
      } catch(e) {
        path = urlStr; // fallback
      }

      const groups = parseRobots(robots);
      const group = pickGroup(groups, ua);
      const result = matchRules(group.rules, path);

      const resEl = document.getElementById('result');
      resEl.style.display='block';
      if (result.allow) {
        resEl.className='result allow';
        resEl.textContent='✅ 크롤링 허용';
      } else {
        resEl.className='result disallow';
        resEl.textContent='⛔ 크롤링 차단';
      }

      document.getElementById('match').textContent = `적용 그룹: ${group.ua.join(', ') || '*'} | 매칭 규칙: ${result.rule || '없음'} (길이 ${result.len})`;
    }

    function parseRobots(text){
      const lines = text.split(/\n+/).map(l => l.trim());
      const groups = [];
      let current = null;
      for (const line of lines) {
        if (!line || line.startsWith('#')) continue;
        const [rawKey,...rest] = line.split(':');
        const key = rawKey.trim().toLowerCase();
        const value = rest.join(':').trim();
        if (key === 'user-agent') {
          if (!current || current.hasRules) {
            current = {ua:[], rules:[], hasRules:false};
            groups.push(current);
          }
          current.ua.push(value.toLowerCase());
        } else if (key === 'disallow' || key === 'allow') {
          if (!current) { current = {ua:['*'], rules:[], hasRules:false}; groups.push(current); }
          current.rules.push({type:key, path:value});
          current.hasRules = true;
        }
      }
      return groups.length ? groups : [{ua:['*'], rules:[]}];
    }

    function pickGroup(groups, ua){
      const target = ua.toLowerCase();
      let best = groups[0];
      let bestScore = -1;
      for (const g of groups) {
        let score = -1;
        for (const agent of g.ua) {
          if (agent === '*') score = Math.max(score, 0);
          else if (agent === target) score = Math.max(score, 2);
          else if (target.includes(agent)) score = Math.max(score, 1);
        }
        if (score > bestScore) { bestScore = score; best = g; }
      }
      return best;
    }

    function matchRules(rules, path){
      let best = {allow:true, len:0, rule:''}; // default allow
      for (const r of rules) {
        if (r.path === '') continue; // empty disallow => allow all
        if (ruleMatch(r.path, path)) {
          const len = r.path.replace(/\*/g,'').length;
          if (len > best.len || (len === best.len && r.type==='allow')) {
            best = {allow: r.type==='allow', len, rule:`${r.type.toUpperCase()}: ${r.path}`};
          }
        }
      }
      return best;
    }

    function ruleMatch(rule, path){
      // Convert robots wildcard * and $ to regex
      let pattern = rule.replace(/[.+?^${}()|[\]\\]/g,'\\$&');
      pattern = pattern.replace(/\*/g,'.*');
      if (pattern.endsWith('$')) {
        pattern = pattern.slice(0,-1) + '$';
      }
      const rx = new RegExp('^' + pattern);
      return rx.test(path);
    }

    function toggleTheme(){
      const t = document.documentElement.getAttribute('data-theme')==='dark' ? '' : 'dark';
      document.documentElement.setAttribute('data-theme',t);
      localStorage.setItem('theme',t);
    }
    if (localStorage.getItem('theme')==='dark') document.documentElement.setAttribute('data-theme','dark');
  </script>
</body>
</html>
