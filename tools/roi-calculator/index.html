<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROI 계산기 | ROI Calculator</title>
  <meta name="description" content="초기 투자금/순이익 기반 ROI 계산, 월·분기·연 비교, 복리 투자 수익 시뮬레이션 차트, 목표 ROI 역산을 제공하는 ROI 계산기" />
  <style>
    :root {
      --bg: #f3f5fb;
      --panel: #ffffff;
      --line: #d9e0ec;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --ok: #059669;
      --warn: #d97706;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr 1fr;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0 0 6px; font-size: 1.55rem; }
    h2 { margin: 0; font-size: 1.08rem; }
    .sub { margin: 0; color: var(--muted); font-size: 0.92rem; }
    label {
      display: block;
      margin: 10px 0 5px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }
    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
    }
    button {
      cursor: pointer;
      border: 0;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      margin-top: 10px;
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .kpi {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fafcff;
    }
    .kpi .t { color: var(--muted); font-size: 0.79rem; }
    .kpi .v { font-weight: 800; margin-top: 3px; font-size: 1.07rem; }
    .v.ok { color: var(--ok); }
    .v.warn { color: var(--warn); }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .row button { width: auto; padding: 8px 12px; margin-top: 0; }
    canvas {
      width: 100%;
      height: 280px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fcfdff;
      margin-top: 10px;
    }
    .hint { color: var(--muted); font-size: 0.8rem; margin-top: 8px; }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>📈 ROI 계산기</h1>
      <p class="sub">기본 ROI 계산 + 기간별 비교 + 목표 ROI 역산</p>

      <div class="grid2">
        <div>
          <label for="initial">초기 투자금 (원)</label>
          <input id="initial" type="number" min="0" step="1000" value="10000000" />
        </div>
        <div>
          <label for="netProfit">순이익 (원)</label>
          <input id="netProfit" type="number" step="1000" value="2200000" />
        </div>
      </div>

      <button id="calcBasicBtn">ROI 계산</button>

      <div class="grid3" style="margin-top:10px">
        <div class="kpi"><div class="t">ROI (%)</div><div class="v" id="roiPct">-</div></div>
        <div class="kpi"><div class="t">총 회수금액 (투자+이익)</div><div class="v" id="totalReturn">-</div></div>
        <div class="kpi"><div class="t">수익/손실 상태</div><div class="v" id="profitState">-</div></div>
      </div>

      <hr style="border:0;border-top:1px solid var(--line);margin:16px 0" />
      <h2>기간별 ROI 비교</h2>
      <div class="grid3" style="margin-top:8px">
        <div>
          <label for="monthlyProfit">월 순이익</label>
          <input id="monthlyProfit" type="number" value="300000" />
        </div>
        <div>
          <label for="quarterProfit">분기 순이익</label>
          <input id="quarterProfit" type="number" value="900000" />
        </div>
        <div>
          <label for="yearlyProfit">연 순이익</label>
          <input id="yearlyProfit" type="number" value="3600000" />
        </div>
      </div>
      <div class="grid3" style="margin-top:8px">
        <div class="kpi"><div class="t">월 ROI</div><div class="v" id="roiMonth">-</div></div>
        <div class="kpi"><div class="t">분기 ROI</div><div class="v" id="roiQuarter">-</div></div>
        <div class="kpi"><div class="t">연 ROI</div><div class="v" id="roiYear">-</div></div>
      </div>

      <hr style="border:0;border-top:1px solid var(--line);margin:16px 0" />
      <h2>목표 ROI 역산</h2>
      <div class="grid2" style="margin-top:8px">
        <div>
          <label for="targetRoi">목표 ROI (%)</label>
          <input id="targetRoi" type="number" value="35" step="0.1" />
        </div>
        <div>
          <label for="targetPeriod">기준 기간</label>
          <select id="targetPeriod">
            <option value="month">월</option>
            <option value="quarter">분기</option>
            <option value="year" selected>연</option>
          </select>
        </div>
      </div>
      <button id="calcTargetBtn">필요 순이익 계산</button>
      <div class="kpi" style="margin-top:8px">
        <div class="t">목표 달성을 위한 필요 순이익</div>
        <div class="v" id="requiredProfit">-</div>
      </div>
    </section>

    <section class="card">
      <h2>💹 복리 투자 수익 시뮬레이션</h2>
      <p class="sub" style="margin-top:5px">Canvas 차트로 기간별 자산 증가를 확인하세요.</p>

      <div class="grid2" style="margin-top:8px">
        <div>
          <label for="simPrincipal">초기 원금 (원)</label>
          <input id="simPrincipal" type="number" value="10000000" step="1000" />
        </div>
        <div>
          <label for="simRate">예상 연 수익률 (%)</label>
          <input id="simRate" type="number" value="7.5" step="0.1" />
        </div>
      </div>

      <div class="grid2">
        <div>
          <label for="simYears">투자 기간 (년)</label>
          <input id="simYears" type="number" value="10" min="1" max="50" />
        </div>
        <div>
          <label for="simMonthlyAdd">월 추가 납입금 (원)</label>
          <input id="simMonthlyAdd" type="number" value="300000" step="1000" />
        </div>
      </div>

      <div class="grid2">
        <div>
          <label for="compoundFreq">복리 주기</label>
          <select id="compoundFreq">
            <option value="12" selected>월복리</option>
            <option value="4">분기복리</option>
            <option value="1">연복리</option>
          </select>
        </div>
        <div>
          <label for="inflation">연 인플레이션 반영(%)</label>
          <input id="inflation" type="number" value="0" step="0.1" />
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <button id="simulateBtn">시뮬레이션 실행</button>
      </div>

      <canvas id="chart" width="860" height="330" aria-label="복리 수익 시뮬레이션 차트"></canvas>
      <div class="grid3" style="margin-top:8px">
        <div class="kpi"><div class="t">최종 평가금액</div><div class="v" id="finalAmount">-</div></div>
        <div class="kpi"><div class="t">총 납입 원금</div><div class="v" id="totalPrincipal">-</div></div>
        <div class="kpi"><div class="t">총 수익</div><div class="v" id="totalGain">-</div></div>
      </div>
      <p class="hint">※ 시뮬레이션 결과는 참고용입니다. 실제 투자 수익은 변동성과 수수료에 따라 달라질 수 있습니다.</p>
    </section>
  </div>

  <script>
    (function () {
      function n(id) {
        return Number(document.getElementById(id).value || 0);
      }
      function fMoney(v) {
        return new Intl.NumberFormat('ko-KR').format(Math.round(v)) + '원';
      }
      function roiPct(profit, initial) {
        if (!initial) return 0;
        return (profit / initial) * 100;
      }

      function setText(id, text, cls) {
        var el = document.getElementById(id);
        el.textContent = text;
        el.className = 'v' + (cls ? ' ' + cls : '');
      }

      function calcBasic() {
        var initial = n('initial');
        var profit = n('netProfit');
        var pct = roiPct(profit, initial);

        setText('roiPct', pct.toFixed(2) + '%', pct >= 0 ? 'ok' : 'warn');
        setText('totalReturn', fMoney(initial + profit), pct >= 0 ? 'ok' : 'warn');
        setText('profitState', pct >= 0 ? '수익 구간' : '손실 구간', pct >= 0 ? 'ok' : 'warn');

        var m = roiPct(n('monthlyProfit'), initial).toFixed(2) + '%';
        var q = roiPct(n('quarterProfit'), initial).toFixed(2) + '%';
        var y = roiPct(n('yearlyProfit'), initial).toFixed(2) + '%';
        setText('roiMonth', m, '');
        setText('roiQuarter', q, '');
        setText('roiYear', y, '');
      }

      function calcTarget() {
        var initial = n('initial');
        var target = n('targetRoi');
        var period = document.getElementById('targetPeriod').value;
        var required = initial * (target / 100);

        var mult = period === 'month' ? '월 기준' : period === 'quarter' ? '분기 기준' : '연 기준';
        setText('requiredProfit', fMoney(required) + ' (' + mult + ')', 'ok');
      }

      function simulate() {
        var principal = n('simPrincipal');
        var annualRate = n('simRate') / 100;
        var years = Math.max(1, Math.floor(n('simYears')));
        var monthlyAdd = n('simMonthlyAdd');
        var freq = Math.max(1, n('compoundFreq'));
        var inflation = n('inflation') / 100;

        var points = [];
        var balance = principal;
        var totalPrincipal = principal;
        var months = years * 12;
        var monthlyRate = Math.pow(1 + annualRate / freq, freq / 12) - 1;
        var realMonthlyFactor = inflation > 0 ? Math.pow(1 + inflation, 1 / 12) : 1;

        points.push({ month: 0, nominal: balance, real: balance / realMonthlyFactor });

        for (var m = 1; m <= months; m += 1) {
          balance = balance * (1 + monthlyRate) + monthlyAdd;
          totalPrincipal += monthlyAdd;
          var real = inflation > 0 ? balance / Math.pow(realMonthlyFactor, m) : balance;
          points.push({ month: m, nominal: balance, real: real });
        }

        drawChart(points);

        var finalAmount = points[points.length - 1].nominal;
        var gain = finalAmount - totalPrincipal;
        setText('finalAmount', fMoney(finalAmount), 'ok');
        setText('totalPrincipal', fMoney(totalPrincipal), '');
        setText('totalGain', fMoney(gain), gain >= 0 ? 'ok' : 'warn');
      }

      function drawChart(points) {
        var canvas = document.getElementById('chart');
        var ctx = canvas.getContext('2d');
        var w = canvas.width;
        var h = canvas.height;
        var pad = { l: 58, r: 20, t: 22, b: 40 };

        ctx.clearRect(0, 0, w, h);

        var maxY = points.reduce(function (m, p) {
          return Math.max(m, p.nominal, p.real);
        }, 1);
        var minY = 0;

        function x(i) {
          return pad.l + (i / (points.length - 1)) * (w - pad.l - pad.r);
        }
        function y(v) {
          return pad.t + (1 - (v - minY) / (maxY - minY || 1)) * (h - pad.t - pad.b);
        }

        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 1;
        for (var gy = 0; gy <= 5; gy += 1) {
          var yy = pad.t + ((h - pad.t - pad.b) * gy) / 5;
          ctx.beginPath();
          ctx.moveTo(pad.l, yy);
          ctx.lineTo(w - pad.r, yy);
          ctx.stroke();

          var val = maxY * (1 - gy / 5);
          ctx.fillStyle = '#64748b';
          ctx.font = '12px sans-serif';
          ctx.fillText((val / 10000).toFixed(0) + '만', 8, yy + 4);
        }

        var labels = [0, 0.25, 0.5, 0.75, 1];
        labels.forEach(function (r) {
          var idx = Math.round((points.length - 1) * r);
          var xx = x(idx);
          ctx.beginPath();
          ctx.moveTo(xx, h - pad.b);
          ctx.lineTo(xx, h - pad.b + 6);
          ctx.strokeStyle = '#94a3b8';
          ctx.stroke();
          ctx.fillStyle = '#64748b';
          ctx.fillText((points[idx].month / 12).toFixed(0) + '년', xx - 10, h - 10);
        });

        ctx.beginPath();
        points.forEach(function (p, i) {
          if (i === 0) ctx.moveTo(x(i), y(p.nominal));
          else ctx.lineTo(x(i), y(p.nominal));
        });
        ctx.lineWidth = 2.4;
        ctx.strokeStyle = '#2563eb';
        ctx.stroke();

        ctx.beginPath();
        points.forEach(function (p, i) {
          if (i === 0) ctx.moveTo(x(i), y(p.real));
          else ctx.lineTo(x(i), y(p.real));
        });
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#16a34a';
        ctx.stroke();

        ctx.fillStyle = '#1e3a8a';
        ctx.fillRect(w - 210, 20, 10, 10);
        ctx.fillStyle = '#334155';
        ctx.fillText('명목 평가금액', w - 194, 29);

        ctx.fillStyle = '#16a34a';
        ctx.fillRect(w - 210, 40, 10, 10);
        ctx.fillStyle = '#334155';
        ctx.fillText('실질 평가금액', w - 194, 49);
      }

      function bind() {
        document.getElementById('calcBasicBtn').addEventListener('click', calcBasic);
        document.getElementById('calcTargetBtn').addEventListener('click', calcTarget);
        document.getElementById('simulateBtn').addEventListener('click', simulate);

        [
          'initial', 'netProfit', 'monthlyProfit', 'quarterProfit', 'yearlyProfit',
          'targetRoi', 'targetPeriod'
        ].forEach(function (id) {
          document.getElementById(id).addEventListener('input', function () {
            calcBasic();
            calcTarget();
          });
          document.getElementById(id).addEventListener('change', function () {
            calcBasic();
            calcTarget();
          });
        });
      }

      bind();
      calcBasic();
      calcTarget();
      simulate();
    })();
  </script>
</body>
</html>
