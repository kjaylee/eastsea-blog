<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roman Numeral Converter - 로마 숫자 변환기</title>
<meta name="description" content="정수 ↔ 로마 숫자 변환, 유효성 검사, 정규화 검증을 제공하는 로마 숫자 컨버터" />
<style>
:root{--bg:#f8fafc;--card:#fff;--line:#e2e8f0;--txt:#0f172a;--muted:#64748b;--a:#ef4444;--b:#f59e0b;--ok:#16a34a;--bad:#dc2626}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 0 0,#fee2e2 0,#fff7ed 38%,#f8fafc 100%);color:var(--txt)}
.wrap{max-width:920px;margin:0 auto;padding:16px}
.hero{padding:18px;border-radius:16px;background:linear-gradient(120deg,var(--a),var(--b));color:#fff;box-shadow:0 10px 24px rgba(239,68,68,.24)}
.hero h1{margin:0;font-size:1.35rem}.hero p{margin:6px 0 0;font-size:.93rem;opacity:.95}
.grid{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}
label{display:block;margin-bottom:6px;color:var(--muted);font-size:.82rem;font-weight:700}
input,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px;font:inherit}
textarea{min-height:130px;resize:vertical}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
button{border:none;border-radius:9px;padding:9px 12px;font-weight:700;cursor:pointer;background:#e2e8f0;color:#0f172a}
button.primary{background:linear-gradient(120deg,var(--a),var(--b));color:#fff}
.status{margin-top:8px;font-size:.88rem;min-height:1.2em}
.ok{color:var(--ok)}.bad{color:var(--bad)}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:.76rem;background:#f8fafc;border:1px solid var(--line);padding:4px 8px;border-radius:999px;color:#334155}
.table{margin-top:10px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.table table{border-collapse:collapse;width:100%;font-size:.85rem}
th,td{padding:8px 10px;border-bottom:1px solid #e2e8f0;text-align:left}
th{background:#f8fafc}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>🏛️ Roman Numeral Converter</h1>
    <p>숫자 ↔ 로마 숫자 변환 + 잘못된 표기 검사(정규화 비교)까지 한 번에.</p>
  </section>

  <div class="grid">
    <section class="card">
      <label for="num">정수 입력 (1 ~ 3999)</label>
      <input id="num" type="number" min="1" max="3999" value="2026" />
      <label for="romanOut" style="margin-top:9px">로마 숫자 결과</label>
      <input id="romanOut" readonly />
      <div class="actions">
        <button class="primary" id="toRoman">숫자 → 로마 숫자</button>
        <button id="copyRoman">복사</button>
      </div>
      <div class="status" id="numStatus"></div>
    </section>

    <section class="card">
      <label for="romanIn">로마 숫자 입력</label>
      <input id="romanIn" placeholder="예: MMXXVI" value="MMXXVI" />
      <label for="numOut" style="margin-top:9px">숫자 결과</label>
      <input id="numOut" readonly />
      <div class="actions">
        <button class="primary" id="toNumber">로마 숫자 → 숫자</button>
        <button id="copyNumber">복사</button>
      </div>
      <div class="status" id="romanStatus"></div>
    </section>
  </div>

  <section class="card" style="margin-top:12px">
    <div class="stats" id="stats"></div>
    <div class="table">
      <table>
        <thead><tr><th>기호</th><th>값</th><th>설명</th></tr></thead>
        <tbody>
          <tr><td>I, V, X</td><td>1, 5, 10</td><td>일의 자리 기본 기호</td></tr>
          <tr><td>L, C</td><td>50, 100</td><td>십/백의 자리 기호</td></tr>
          <tr><td>D, M</td><td>500, 1000</td><td>오백/천 기호</td></tr>
          <tr><td>IV, IX</td><td>4, 9</td><td>작은 수를 앞에 둔 감산 표기</td></tr>
          <tr><td>XL, XC, CD, CM</td><td>40, 90, 400, 900</td><td>대표 감산 조합</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</div>

<script>
const $ = id => document.getElementById(id);
const MAP = [
  [1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],
  [50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']
];

function toRoman(num){
  if(!Number.isInteger(num) || num < 1 || num > 3999) return null;
  let n = num, out = '';
  for(const [v, s] of MAP){
    while(n >= v){ out += s; n -= v; }
  }
  return out;
}

function romanToInt(roman){
  if(!roman) return null;
  const s = roman.toUpperCase().trim();
  if(!/^[IVXLCDM]+$/.test(s)) return null;
  const vals = {I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
  let total = 0;
  for(let i=0;i<s.length;i++){
    const cur = vals[s[i]], next = vals[s[i+1]] || 0;
    total += cur < next ? -cur : cur;
  }
  if(total < 1 || total > 3999) return null;
  return total;
}

function convertFromNumber(){
  const n = +$('num').value;
  const r = toRoman(n);
  if(!r){
    $('romanOut').value='';
    $('numStatus').textContent='1~3999 범위의 정수를 입력하세요.';
    $('numStatus').className='status bad';
    return;
  }
  $('romanOut').value = r;
  $('numStatus').textContent = '변환 성공';
  $('numStatus').className='status ok';
  renderStats(n, r, true);
  localStorage.setItem('roman-num', String(n));
}

function convertFromRoman(){
  const raw = $('romanIn').value;
  const n = romanToInt(raw);
  if(!n){
    $('numOut').value='';
    $('romanStatus').textContent='유효한 로마 숫자를 입력하세요 (I,V,X,L,C,D,M).';
    $('romanStatus').className='status bad';
    return;
  }
  const normalized = toRoman(n);
  const isCanonical = normalized === raw.toUpperCase().trim();
  $('numOut').value = String(n);
  $('romanStatus').textContent = isCanonical ? '유효한 표기입니다.' : `해석은 가능하지만 비표준 표기입니다. 권장: ${normalized}`;
  $('romanStatus').className = 'status ' + (isCanonical ? 'ok' : 'bad');
  renderStats(n, normalized, isCanonical);
  localStorage.setItem('roman-input', raw);
}

function renderStats(num, roman, canonical){
  $('stats').innerHTML = `
    <span class="badge">숫자 ${num}</span>
    <span class="badge">로마 ${roman}</span>
    <span class="badge">자릿수 ${String(num).length}</span>
    <span class="badge">표기 길이 ${roman.length}</span>
    <span class="badge">정규화 ${canonical ? 'OK' : 'Needs Fix'}</span>
  `;
}

$('toRoman').addEventListener('click', convertFromNumber);
$('toNumber').addEventListener('click', convertFromRoman);
$('copyRoman').addEventListener('click', async()=>{ if($('romanOut').value) await navigator.clipboard.writeText($('romanOut').value); });
$('copyNumber').addEventListener('click', async()=>{ if($('numOut').value) await navigator.clipboard.writeText($('numOut').value); });
$('num').addEventListener('input', convertFromNumber);
$('romanIn').addEventListener('input', convertFromRoman);

(function init(){
  const n = localStorage.getItem('roman-num');
  const r = localStorage.getItem('roman-input');
  if(n) $('num').value = n;
  if(r) $('romanIn').value = r;
  convertFromNumber();
  convertFromRoman();
})();
</script>
</body>
</html>
