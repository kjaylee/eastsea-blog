<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스타트업 런웨이 계산기 | Runway Calculator</title>
  <meta name="description" content="현금 보유액, 월 매출, 월 비용, 성장률을 반영해 런웨이(생존 개월 수)와 고갈 시점을 예측합니다." />
  <style>
    :root{--bg:#f4f7ff;--card:#fff;--line:#dde6f7;--text:#1f2937;--muted:#64748b;--pri:#2563eb;--pri2:#06b6d4;--ok:#16a34a;--warn:#d97706;--bad:#dc2626}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edf3ff,#f8fbff);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:1040px;margin:0 auto;padding:18px 14px 42px}.top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.85rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.92rem}
    .back{display:inline-flex;text-decoration:none;color:#1e3a8a;border:1px solid var(--line);background:#fff;padding:8px 11px;border-radius:10px;font-weight:700;font-size:.88rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 10px 28px rgba(37,99,235,.08)}
    h2{margin:0 0 10px;font-size:1rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin:0 0 6px;font-weight:700}
    input,button{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font-size:.93rem;background:#fff;color:var(--text)}
    input:focus{outline:2px solid rgba(37,99,235,.2);border-color:#75a7ff}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;font-weight:800}.ghost{background:#f4f7ff;border:1px solid var(--line);color:#1f2937}
    .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{border:1px solid var(--line);background:#f9fbff;border-radius:12px;padding:10px}.k{font-size:.75rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .msg{margin-top:8px;padding:10px;border:1px solid var(--line);border-radius:10px;background:#f8fbff;font-size:.9rem;line-height:1.45}
    .table{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:8px;border-bottom:1px solid var(--line);font-size:.82rem;text-align:right;white-space:nowrap}th:first-child,td:first-child{text-align:left}th{background:#f1f5ff;color:#475569;font-size:.76rem}
    .progress{margin-top:8px}.bar{height:12px;border-radius:999px;background:#e8eefc;border:1px solid #cfdaf4;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#16a34a,#06b6d4);transition:width .3s}
    .mini{font-size:.8rem;color:var(--muted);margin-top:6px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>🚀 스타트업 런웨이 계산기</h1>
      <p class="sub">현금 소진 속도(Burn Rate)와 성장 가정을 함께 반영해 생존 가능 기간을 계산합니다.</p>
    </div>
    <a class="back" href="/">Back to Portal</a>
  </div>

  <section class="grid">
    <article class="card">
      <h2>입력</h2>
      <div class="two">
        <div><label for="cash">보유 현금 (원)</label><input id="cash" type="number" min="0" step="100000" value="850000000"></div>
        <div><label for="revenue">현재 월 매출 (원)</label><input id="revenue" type="number" min="0" step="100000" value="95000000"></div>
        <div><label for="fixedCost">월 고정비 (원)</label><input id="fixedCost" type="number" min="0" step="100000" value="125000000"></div>
        <div><label for="variableCost">월 변동비 (원)</label><input id="variableCost" type="number" min="0" step="100000" value="18000000"></div>
        <div><label for="revGrowth">월 매출 성장률 (%)</label><input id="revGrowth" type="number" step="0.1" value="3"></div>
        <div><label for="costGrowth">월 비용 증가율 (%)</label><input id="costGrowth" type="number" step="0.1" value="1.2"></div>
      </div>
      <div class="btns">
        <button id="calcBtn" type="button">계산</button>
        <button id="sampleBtn" class="ghost" type="button">샘플</button>
      </div>
    </article>

    <article class="card">
      <h2>결과</h2>
      <div class="kpis">
        <div class="kpi"><div class="k">현재 순소진액 (월)</div><div class="v" id="netBurn">-</div></div>
        <div class="kpi"><div class="k">런웨이</div><div class="v" id="runwayMonths">-</div></div>
        <div class="kpi"><div class="k">현금 고갈 예상일</div><div class="v" id="runwayDate">-</div></div>
        <div class="kpi"><div class="k">12개월 후 예상 현금</div><div class="v" id="cash12">-</div></div>
        <div class="kpi"><div class="k">월 매출 손익분기 시점</div><div class="v" id="breakevenMonth">-</div></div>
        <div class="kpi"><div class="k">권장 상태</div><div class="v" id="health">-</div></div>
      </div>
      <div class="progress">
        <div class="bar"><div class="fill" id="fill"></div></div>
        <div class="mini" id="fillText">목표 런웨이 18개월 대비</div>
      </div>
      <div class="msg" id="msg">입력값을 바꾸면 자동 재계산됩니다.</div>
    </article>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>시나리오 비교 (월 순소진액 기준)</h2>
    <div class="table">
      <table>
        <thead>
          <tr><th>시나리오</th><th>가정</th><th>예상 런웨이</th><th>설명</th></tr>
        </thead>
        <tbody id="scenarioRows"></tbody>
      </table>
    </div>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>월별 현금 추정 (최대 24개월)</h2>
    <div class="table">
      <table>
        <thead>
          <tr><th>월</th><th>매출</th><th>총비용</th><th>순현금흐름</th><th>누적 현금</th></tr>
        </thead>
        <tbody id="monthlyRows"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  const $=(id)=>document.getElementById(id);
  const won=(n)=>'₩'+Math.round(n||0).toLocaleString('ko-KR');

  function simulate({cash,revenue,cost,revg,costg,months=120}){
    let c=cash, r=revenue, k=cost;
    const rows=[];
    let runway=Infinity, breakEven=null;
    for(let m=1;m<=months;m++){
      const flow=r-k;
      c+=flow;
      if(breakEven===null && flow>=0) breakEven=m;
      rows.push({m,revenue:r,cost:k,flow,cash:c});
      if(c<=0){runway=m + Math.max(0,(c-flow)/Math.max(1,Math.abs(flow))); break;}
      r*=1+revg; k*=1+costg;
    }
    return {rows,runway,breakEven,cashEnd:c};
  }

  function runwayLabel(v){ if(!isFinite(v)) return '∞ (소진 없음)'; return `${v.toFixed(1)}개월`; }

  function run(){
    const cash=Number($('cash').value);
    const revenue=Number($('revenue').value);
    const cost=Number($('fixedCost').value)+Number($('variableCost').value);
    const revg=Number($('revGrowth').value)/100;
    const costg=Number($('costGrowth').value)/100;
    if(cash<0||revenue<0||cost<0){$('msg').textContent='입력값을 확인해 주세요.';return;}

    const base=simulate({cash,revenue,cost,revg,costg});
    const netBurn=cost-revenue;
    $('netBurn').textContent=won(netBurn);
    $('netBurn').className=`v ${netBurn<=0?'ok':netBurn<=30000000?'warn':'bad'}`;
    $('runwayMonths').textContent=runwayLabel(base.runway);
    $('runwayMonths').className=`v ${!isFinite(base.runway)||base.runway>=18?'ok':base.runway>=12?'warn':'bad'}`;

    if(isFinite(base.runway)){
      const d=new Date(); d.setMonth(d.getMonth()+Math.ceil(base.runway));
      $('runwayDate').textContent=d.toLocaleDateString('ko-KR');
    }else $('runwayDate').textContent='고갈 없음';

    const month12=base.rows[Math.min(11,base.rows.length-1)];
    $('cash12').textContent=month12?won(month12.cash):won(cash);
    $('cash12').className=`v ${(month12&&month12.cash>=0)?'ok':'bad'}`;

    $('breakevenMonth').textContent=base.breakEven?`${base.breakEven}개월차`:'미도달';
    const health=!isFinite(base.runway)||base.runway>=18?'안전':base.runway>=12?'주의':'위험';
    $('health').textContent=health;
    $('health').className=`v ${health==='안전'?'ok':health==='주의'?'warn':'bad'}`;

    const progress=Math.min(100, (isFinite(base.runway)?base.runway:24)/18*100);
    $('fill').style.width=`${progress}%`;
    $('fill').style.background=health==='안전'?'linear-gradient(90deg,#16a34a,#06b6d4)':health==='주의'?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#ef4444,#fb7185)';
    $('fillText').textContent=`목표 런웨이 18개월 대비 ${runwayLabel(base.runway)}`;

    $('msg').textContent = health==='안전'
      ? '✅ 런웨이가 비교적 안정적입니다. 성장률 유지 + 비상 자금 라인 확보를 병행하세요.'
      : health==='주의'
      ? '⚠️ 12~18개월 구간입니다. 채용 속도/마케팅 효율을 관리하며 다음 라운드를 준비하세요.'
      : '🚨 런웨이 12개월 미만입니다. 비용 절감, 가격 전략 조정, 브릿지 자금 확보를 즉시 검토하세요.';

    const scenarios=[
      {name:'Base', rev:revenue, cost, label:'입력값 기준'},
      {name:'Best', rev:revenue*1.12, cost:cost*0.92, label:'매출 +12%, 비용 -8%'},
      {name:'Worst', rev:revenue*0.9, cost:cost*1.1, label:'매출 -10%, 비용 +10%'}
    ];
    $('scenarioRows').innerHTML=scenarios.map(s=>{
      const r=simulate({cash,revenue:s.rev,cost:s.cost,revg,costg});
      return `<tr><td>${s.name}</td><td>${s.label}</td><td>${runwayLabel(r.runway)}</td><td>${!isFinite(r.runway)?'흑자 또는 현금 증가 상태':'현금 소진까지 예상 기간'}</td></tr>`;
    }).join('');

    $('monthlyRows').innerHTML=base.rows.slice(0,24).map(v=>`<tr>
      <td>${v.m}개월</td><td>${won(v.revenue)}</td><td>${won(v.cost)}</td>
      <td class="${v.flow>=0?'ok':'bad'}">${won(v.flow)}</td>
      <td class="${v.cash>=0?'ok':'bad'}">${won(v.cash)}</td>
    </tr>`).join('');
  }

  $('calcBtn').addEventListener('click',run);
  $('sampleBtn').addEventListener('click',()=>{
    $('cash').value=620000000;
    $('revenue').value=78000000;
    $('fixedCost').value=104000000;
    $('variableCost').value=16000000;
    $('revGrowth').value=4.2;
    $('costGrowth').value=1.0;
    run();
  });
  ['cash','revenue','fixedCost','variableCost','revGrowth','costGrowth'].forEach(id=>$(id).addEventListener('input',run));
  run();
</script>
</body>
</html>
