<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Feature Gating Revenue Uplift Calculator | SaaS 기능 게이팅 수익 상승 계산기</title>
  <meta name="description" content="무료 사용자 기능 게이팅 도입 시 유료 전환, MRR 상승, ROI, 회수기간을 계산하는 SaaS 수익화 도구" />
  <style>
    :root{--bg:#0b1220;--card:#111a2e;--line:#24324d;--txt:#e5e7eb;--muted:#93a4bf;--pri:#60a5fa;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 0% 0%,#1d4f91 0%,var(--bg) 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 56px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.5vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.btn,.link{border:1px solid var(--line);background:#16335d;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}.card{background:linear-gradient(165deg,#162742,#101a30);border:1px solid var(--line);border-radius:14px;padding:13px}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1a2f;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{border:none;cursor:pointer;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.ghost{background:#1f3f6a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:110px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:#10203a;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.02rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:#19345b;color:#dbeafe;font-size:.78rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.86rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🔓 SaaS 기능 게이팅 수익 상승 계산기</h1>
        <div class="sub" id="subtitle">무료 사용자 기능 잠금 전략의 유료 전환·순이익·ROI를 빠르게 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="btn" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_freeUsers" for="freeUsers"></label><input id="freeUsers" type="number" min="0" value="80000"></div>
          <div><label id="l_engagement" for="engagement"></label><input id="engagement" type="number" min="0" max="100" step="0.1" value="36"></div>
          <div><label id="l_exposure" for="exposure"></label><input id="exposure" type="number" min="0" max="100" step="0.1" value="70"></div>
          <div><label id="l_upgrade" for="upgrade"></label><input id="upgrade" type="number" min="0" max="100" step="0.01" value="6.5"></div>
          <div><label id="l_arpu" for="arpu"></label><input id="arpu" type="number" min="0" step="1000" value="29000"></div>
          <div><label id="l_margin" for="margin"></label><input id="margin" type="number" min="0" max="100" step="0.1" value="82"></div>
          <div><label id="l_support" for="support"></label><input id="support" type="number" min="0" step="100" value="2400"></div>
          <div><label id="l_program" for="program"></label><input id="program" type="number" min="0" step="10000" value="1800000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="9000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="ghost" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_eligible"></div><div class="v" id="eligible">-</div></div>
          <div class="kpi"><div class="k" id="k_newPaid"></div><div class="v" id="newPaid">-</div></div>
          <div class="kpi"><div class="k" id="k_incMrr"></div><div class="v" id="incMrr">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_payback"></div><div class="v" id="payback">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_grossProfit"></th><td id="grossProfit">-</td></tr>
          <tr><th id="d_monthlyCost"></th><td id="monthlyCost">-</td></tr>
          <tr><th id="d_breakEvenUpgrade"></th><td id="breakEvenUpgrade">-</td></tr>
          <tr><th id="d_periodNet"></th><td id="periodNet">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={freeUsers:$("freeUsers"),engagement:$("engagement"),exposure:$("exposure"),upgrade:$("upgrade"),arpu:$("arpu"),margin:$("margin"),support:$("support"),program:$("program"),setup:$("setup"),months:$("months"),eligible:$("eligible"),newPaid:$("newPaid"),incMrr:$("incMrr"),monthlyNet:$("monthlyNet"),roi:$("roi"),payback:$("payback"),grossProfit:$("grossProfit"),monthlyCost:$("monthlyCost"),breakEvenUpgrade:$("breakEvenUpgrade"),periodNet:$("periodNet"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={freeUsers:80000,engagement:36,exposure:70,upgrade:6.5,arpu:29000,margin:82,support:2400,program:1800000,setup:9000000,months:12};
    const I18N={
      ko:{title:"🔓 SaaS 기능 게이팅 수익 상승 계산기",subtitle:"무료 사용자 기능 잠금 전략의 유료 전환·순이익·ROI를 빠르게 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_freeUsers:"월간 활성 무료 사용자",l_engagement:"기능 참여율 (%)",l_exposure:"게이트 노출률 (%)",l_upgrade:"업그레이드 전환율 (%)",l_arpu:"유료 ARPU (₩/월)",l_margin:"매출총이익률 (%)",l_support:"업그레이드 사용자 지원비 (₩/월)",l_program:"월 운영 프로그램 비용 (₩)",l_setup:"초기 구축비 (₩)",l_months:"분석 기간 (개월)",k_eligible:"노출 대상 사용자",k_newPaid:"월 신규 유료 사용자",k_incMrr:"증가 MRR",k_monthlyNet:"월 순이익",k_roi:"ROI",k_payback:"회수기간",d_grossProfit:"증가 매출총이익",d_monthlyCost:"월 총비용",d_breakEvenUpgrade:"손익분기 전환율",d_periodNet:"기간 누적 순효과",ok:"수익 시뮬레이션 완료",warn:"월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율은 0~100 범위여야 합니다.",numErr:"값은 0 이상이어야 하며 기간은 1 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 접근 불가: 수동 복사하세요.",summaryTitle:"[SaaS 기능 게이팅 수익 요약]",unitMonths:"개월"},
      en:{title:"🔓 SaaS Feature Gating Revenue Uplift Calculator",subtitle:"Estimate paid upgrades, net profit, and ROI from feature-gating free users.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_freeUsers:"Monthly active free users",l_engagement:"Feature engagement rate (%)",l_exposure:"Gate exposure rate (%)",l_upgrade:"Upgrade conversion rate (%)",l_arpu:"Paid ARPU (KRW/mo)",l_margin:"Gross margin (%)",l_support:"Support cost per upgraded user (KRW/mo)",l_program:"Monthly program cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_eligible:"Eligible users",k_newPaid:"New paid users / month",k_incMrr:"Incremental MRR",k_monthlyNet:"Monthly net profit",k_roi:"ROI",k_payback:"Payback period",d_grossProfit:"Incremental gross profit",d_monthlyCost:"Monthly total cost",d_breakEvenUpgrade:"Break-even upgrade rate",d_periodNet:"Cumulative net impact",ok:"Revenue simulation complete",warn:"Monthly net profit is negative",invalid:"Please check your inputs",rangeErr:"Rates must be between 0 and 100.",numErr:"Values must be >= 0 and months must be >= 1.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Copy manually.",summaryTitle:"[SaaS Feature Gating Revenue Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=2)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["freeUsers","engagement","exposure","upgrade","arpu","margin","support","program","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["eligible","newPaid","incMrr","monthlyNet","roi","payback"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["grossProfit","monthlyCost","breakEvenUpgrade","periodNet"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if([v.freeUsers,v.arpu,v.support,v.program,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if(!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.engagement,v.exposure,v.upgrade,v.margin].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      return "";
    }

    function render(){
      const v={freeUsers:Number(refs.freeUsers.value),engagement:Number(refs.engagement.value),exposure:Number(refs.exposure.value),upgrade:Number(refs.upgrade.value),arpu:Number(refs.arpu.value),margin:Number(refs.margin.value),support:Number(refs.support.value),program:Number(refs.program.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["eligible","newPaid","incMrr","monthlyNet","roi","payback","grossProfit","monthlyCost","breakEvenUpgrade","periodNet"].forEach((k)=>refs[k].textContent="-");refs.status.textContent=t("invalid");refs.summary.value="";return;}

      const eligible=v.freeUsers*(v.engagement/100)*(v.exposure/100);
      const newPaid=eligible*(v.upgrade/100);
      const incMrr=newPaid*v.arpu;
      const grossProfit=incMrr*(v.margin/100);
      const monthlyCost=(newPaid*v.support)+v.program;
      const monthlyNet=grossProfit-monthlyCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalInvestment=(monthlyCost*v.months)+v.setup;
      const roi=totalInvestment>0?(periodNet/totalInvestment)*100:0;

      const perEligibleContribution=(v.arpu*(v.margin/100))-v.support;
      let breakEvenUpgrade=NaN;
      if(eligible>0&&perEligibleContribution>0){
        breakEvenUpgrade=(v.program/(eligible*perEligibleContribution))*100;
      }

      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.eligible.textContent=num(eligible,0);
      refs.newPaid.textContent=num(newPaid,1);
      refs.incMrr.textContent=won(incMrr);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.grossProfit.textContent=won(grossProfit);
      refs.monthlyCost.textContent=won(monthlyCost);
      refs.breakEvenUpgrade.textContent=Number.isFinite(breakEvenUpgrade)?pct(breakEvenUpgrade,2):t("na");
      refs.periodNet.textContent=won(periodNet);

      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_eligible")}: ${num(eligible,0)}`,`${t("k_newPaid")}: ${num(newPaid,1)}`,`${t("k_incMrr")}: ${won(incMrr)}`,`${t("d_grossProfit")}: ${won(grossProfit)}`,`${t("d_monthlyCost")}: ${won(monthlyCost)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("d_breakEvenUpgrade")}: ${Number.isFinite(breakEvenUpgrade)?pct(breakEvenUpgrade,2):t("na")}`,`${t("k_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.freeUsers,refs.engagement,refs.exposure,refs.upgrade,refs.arpu,refs.margin,refs.support,refs.program,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
