<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS LTV:CAC Analyzer | SaaS LTV/CAC 분석기</title>
  <meta name="description" content="ARPA, 마진, 이탈률, CAC를 기반으로 SaaS LTV:CAC 비율과 회수기간을 계산하는 유닛 이코노믹스 분석기" />
  <style>
    :root{--bg:#071322;--card:#102640;--line:#294968;--txt:#ecf4ff;--muted:#a9c0de;--pri:#60a5fa;--ok:#34d399;--warn:#fbbf24;--bad:#fda4af}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#234f7d 0%,#071322 50%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#deebff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#132b47;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:linear-gradient(165deg,#17375b,#102640);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0a1b31;color:var(--txt);font-size:.92rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#4f86ef);font-weight:700}
    .soft{background:#183a5f;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:106px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f3240;background:rgba(248,113,113,.12);color:var(--bad);font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#0d1f38;border:1px solid var(--line);border-radius:10px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.04rem;font-weight:800}
    .v.sm{font-size:.95rem}
    .status{margin-top:10px;padding:7px 10px;border:1px solid var(--line);border-radius:999px;display:inline-flex;align-items:center;gap:7px;background:#163659;color:#d7e9ff;font-size:.78rem}
    .table-wrap{margin-top:12px;border:1px solid var(--line);border-radius:10px;overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:.82rem}
    th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📊 SaaS LTV:CAC Analyzer</h1>
        <div class="sub">LTV, CAC 회수기간, 목표 LTV:CAC 달성을 위한 허용 CAC 한도를 빠르게 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="arpa">월 ARPA (USD)</label><input id="arpa" type="number" min="0.01" step="0.01" value="89" /></div>
          <div><label for="grossMargin">매출총이익률 (%)</label><input id="grossMargin" type="number" min="1" max="100" step="0.1" value="78" /></div>
          <div><label for="churn">월 로고 이탈률 (%)</label><input id="churn" type="number" min="0.1" max="50" step="0.01" value="3.1" /></div>
          <div><label for="expansion">월 ARPA 순성장률 (%)</label><input id="expansion" type="number" min="-80" max="200" step="0.1" value="1.5" /></div>
          <div><label for="cac">신규 고객 CAC (USD)</label><input id="cac" type="number" min="0" step="0.01" value="1350" /></div>
          <div><label for="onboarding">온보딩/세팅 비용 (USD)</label><input id="onboarding" type="number" min="0" step="0.01" value="250" /></div>
          <div><label for="targetRatio">목표 LTV:CAC 비율</label><input id="targetRatio" type="number" min="1" max="15" step="0.1" value="3" /></div>
          <div><label for="horizon">참고 분석 기간 (개월)</label><input id="horizon" type="number" min="3" max="60" step="1" value="24" /></div>
        </div>

        <div class="btns">
          <button id="copy" class="soft" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>유닛 이코노믹스 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">기본 LTV (ARPA×GM/Churn)</div><div id="ltvBase" class="v">-</div></div>
          <div class="kpi"><div class="k">확장 반영 LTV</div><div id="ltvAdj" class="v">-</div></div>
          <div class="kpi"><div class="k">Blended CAC (CAC+온보딩)</div><div id="cacBlend" class="v sm">-</div></div>
          <div class="kpi"><div class="k">LTV:CAC 비율</div><div id="ratio" class="v sm">-</div></div>
          <div class="kpi"><div class="k">CAC 회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">목표비율 기준 허용 CAC</div><div id="maxCac" class="v sm">-</div></div>
        </div>
        <div id="status" class="status">계산 대기</div>

        <h2 style="margin-top:12px">민감도 (월 이탈률 시나리오)</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>월 이탈률</th>
                <th>LTV</th>
                <th>LTV:CAC</th>
                <th>회수기간</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      arpa: $('arpa'), grossMargin: $('grossMargin'), churn: $('churn'), expansion: $('expansion'), cac: $('cac'), onboarding: $('onboarding'), targetRatio: $('targetRatio'), horizon: $('horizon'),
      ltvBase: $('ltvBase'), ltvAdj: $('ltvAdj'), cacBlend: $('cacBlend'), ratio: $('ratio'), payback: $('payback'), maxCac: $('maxCac'), status: $('status'), tbody: $('tbody'),
      summary: $('summary'), error: $('error'), copy: $('copy'), reset: $('reset')
    };

    const defaults = { arpa: 89, grossMargin: 78, churn: 3.1, expansion: 1.5, cac: 1350, onboarding: 250, targetRatio: 3, horizon: 24 };
    const money = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString('en-US', { maximumFractionDigits: d });

    function validate(v) {
      if (Object.values(v).some((x) => !Number.isFinite(x))) return '모든 입력값은 유한한 숫자여야 합니다.';
      if (v.arpa <= 0 || v.arpa > 100000) return '월 ARPA는 0 초과 100,000 이하로 입력하세요.';
      if (v.grossMargin <= 0 || v.grossMargin > 100) return '매출총이익률은 0 초과 100 이하 범위여야 합니다.';
      if (v.churn <= 0 || v.churn > 50) return '월 이탈률은 0 초과 50 이하 범위여야 합니다.';
      if (v.expansion < -80 || v.expansion > 200) return '월 ARPA 순성장률은 -80% ~ 200% 범위여야 합니다.';
      if (v.cac < 0 || v.cac > 200000) return 'CAC는 0 이상 200,000 이하로 입력하세요.';
      if (v.onboarding < 0 || v.onboarding > 100000) return '온보딩 비용은 0 이상 100,000 이하로 입력하세요.';
      if (v.targetRatio < 1 || v.targetRatio > 15) return '목표 LTV:CAC 비율은 1~15 범위여야 합니다.';
      if (!Number.isInteger(v.horizon) || v.horizon < 3 || v.horizon > 60) return '분석 기간은 3~60개월 정수여야 합니다.';
      return '';
    }

    function compute(v) {
      const gm = v.grossMargin / 100;
      const churn = v.churn / 100;
      const expansion = v.expansion / 100;
      const blendedCac = v.cac + v.onboarding;

      const monthlyContributionBase = v.arpa * gm;
      const monthlyContributionAdj = v.arpa * (1 + expansion) * gm;
      if (monthlyContributionAdj <= 0) throw new Error('확장 반영 월 기여이익이 0 이하입니다. ARPA 성장률을 조정하세요.');

      const ltvBase = monthlyContributionBase / churn;
      const ltvAdj = monthlyContributionAdj / churn;
      if (![ltvBase, ltvAdj].every((n) => Number.isFinite(n) && n >= 0 && n < 1e12)) {
        throw new Error('계산 결과가 비정상입니다. 입력 범위를 줄여주세요.');
      }

      const ratio = blendedCac === 0 ? null : ltvAdj / blendedCac;
      const payback = blendedCac === 0 ? 0 : blendedCac / monthlyContributionAdj;
      const maxCac = ltvAdj / v.targetRatio;
      const bufferToTarget = maxCac - blendedCac;

      const scenarios = [];
      const deltas = [-2, -1, 0, 1, 2];
      for (const d of deltas) {
        const churnPct = Math.min(60, Math.max(0.2, v.churn + d));
        const scenarioChurn = churnPct / 100;
        const scenarioLtv = monthlyContributionAdj / scenarioChurn;
        const scenarioRatio = blendedCac === 0 ? null : scenarioLtv / blendedCac;
        const scenarioPayback = blendedCac === 0 ? 0 : blendedCac / monthlyContributionAdj;
        scenarios.push({ churnPct, scenarioLtv, scenarioRatio, scenarioPayback });
      }

      let rollingRevenue = 0;
      let active = 1;
      for (let m = 1; m <= v.horizon; m++) {
        const arpaM = v.arpa * Math.pow(1 + expansion, m - 1);
        rollingRevenue += active * arpaM;
        active *= (1 - churn);
      }
      const horizonGrossProfit = rollingRevenue * gm;

      return { ltvBase, ltvAdj, blendedCac, ratio, payback, maxCac, bufferToTarget, scenarios, horizonGrossProfit };
    }

    function healthText(r) {
      if (r.ratio === null) return { text: '● CAC가 0으로 입력되어 비율은 무한대(∞)입니다.', tone: 'ok' };
      if (r.ratio >= 3 && r.payback <= 12) return { text: `● 건강한 유닛이코노믹스: LTV:CAC ${num(r.ratio, 2)}x, 회수 ${num(r.payback, 1)}개월`, tone: 'ok' };
      if (r.ratio >= 2) return { text: `● 개선 여지 있음: LTV:CAC ${num(r.ratio, 2)}x, 회수 ${num(r.payback, 1)}개월`, tone: 'warn' };
      return { text: `● 위험 신호: LTV:CAC ${num(r.ratio, 2)}x, CAC 회수 구조 재점검 필요`, tone: 'bad' };
    }

    function render() {
      const v = {
        arpa: Number(refs.arpa.value), grossMargin: Number(refs.grossMargin.value), churn: Number(refs.churn.value), expansion: Number(refs.expansion.value),
        cac: Number(refs.cac.value), onboarding: Number(refs.onboarding.value), targetRatio: Number(refs.targetRatio.value), horizon: Number(refs.horizon.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;
      refs.tbody.innerHTML = '';

      if (err) {
        ['ltvBase','ltvAdj','cacBlend','ratio','payback','maxCac'].forEach((k) => refs[k].textContent = '-');
        refs.status.textContent = '입력값 확인 필요';
        refs.summary.value = '';
        return;
      }

      try {
        const r = compute(v);
        refs.ltvBase.textContent = money(r.ltvBase);
        refs.ltvAdj.textContent = money(r.ltvAdj);
        refs.cacBlend.textContent = money(r.blendedCac);
        refs.ratio.textContent = r.ratio === null ? '∞' : `${num(r.ratio, 2)}x`;
        refs.payback.textContent = `${num(r.payback, 1)}개월`;
        refs.maxCac.textContent = money(r.maxCac);

        const h = healthText(r);
        const color = h.tone === 'ok' ? 'var(--ok)' : h.tone === 'warn' ? 'var(--warn)' : 'var(--bad)';
        refs.status.innerHTML = `<span style="color:${color}">●</span> ${h.text.replace(/^●\s*/, '')}`;

        refs.tbody.innerHTML = r.scenarios.map((s) => `
          <tr>
            <td>${num(s.churnPct, 2)}%</td>
            <td>${money(s.scenarioLtv)}</td>
            <td>${s.scenarioRatio === null ? '∞' : `${num(s.scenarioRatio, 2)}x`}</td>
            <td>${num(s.scenarioPayback, 1)}개월</td>
          </tr>
        `).join('');

        refs.summary.value = [
          '[SaaS LTV:CAC Summary]',
          `LTV (base): ${money(r.ltvBase)}`,
          `LTV (expansion adjusted): ${money(r.ltvAdj)}`,
          `Blended CAC: ${money(r.blendedCac)}`,
          `LTV:CAC Ratio: ${r.ratio === null ? '∞' : num(r.ratio, 2) + 'x'}`,
          `Payback Period: ${num(r.payback, 1)} months`,
          `Max CAC at target ratio: ${money(r.maxCac)}`,
          `CAC headroom to target: ${money(r.bufferToTarget)}`,
          `Horizon gross profit (${v.horizon}m): ${money(r.horizonGrossProfit)}`
        ].join('\n');
      } catch (e) {
        refs.error.classList.add('show');
        refs.error.textContent = e.message || '계산 중 오류가 발생했습니다.';
      }
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('클립보드 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, v]) => refs[k].value = v);
      render();
    });

    ['input','change'].forEach((ev) => {
      [refs.arpa,refs.grossMargin,refs.churn,refs.expansion,refs.cac,refs.onboarding,refs.targetRatio,refs.horizon].forEach((el) => el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
