<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Proration Revenue Leakage Calculator | SaaS 업그레이드 크레딧 매출누수 계산기</title>
  <meta name="description" content="SaaS 업그레이드 시 잔여기간 크레딧 정책에 따른 매출 누수, 회수 가능 매출, ROI를 계산합니다." />
  <style>
    :root{--bg:#0b1220;--card:#121c31;--line:#2a3d64;--text:#ecf3ff;--muted:#9db1d4;--pri:#6ea8ff;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#22365a 0%,var(--bg) 58%);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.85rem)} .sub{margin-top:6px;color:var(--muted);font-size:.94rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .btnLink,.lang{border:1px solid var(--line);background:#13233e;color:#dce9ff;text-decoration:none;border-radius:10px;padding:8px 11px;font-size:.88rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#172742,#111b30);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.03rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1b31;color:var(--text);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#8fc1ff);color:#07152b;font-weight:700}
    .soft{background:#1a2a49;color:#dce9ff;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7d3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    textarea{margin-top:10px;min-height:110px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#0f1a2e;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.05rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#192b4a;color:#d8e8ff;font-size:.77rem;margin-top:10px}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.86rem} th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right} th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.actions{justify-content:flex-start}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📉 SaaS 업그레이드 크레딧 매출누수 계산기</h1>
        <div class="sub" id="subtitle">업그레이드 시점의 잔여기간 크레딧 정책을 조정할 때 연간 회수 매출과 ROI를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a class="btnLink" href="/" id="backLink">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값 Inputs</h2>
        <div class="inputs">
          <div><label for="activeAccounts" id="l_activeAccounts"></label><input id="activeAccounts" type="number" min="0" value="2400"></div>
          <div><label for="upgradeRate" id="l_upgradeRate"></label><input id="upgradeRate" type="number" min="0" max="100" step="0.1" value="6"></div>
          <div><label for="daysRemaining" id="l_daysRemaining"></label><input id="daysRemaining" type="number" min="0" max="31" step="0.1" value="14"></div>
          <div><label for="oldPlanMrr" id="l_oldPlanMrr"></label><input id="oldPlanMrr" type="number" min="0" step="1000" value="59000"></div>
          <div><label for="currentCreditPolicy" id="l_currentCreditPolicy"></label><input id="currentCreditPolicy" type="number" min="0" max="100" step="0.1" value="100"></div>
          <div><label for="targetCreditPolicy" id="l_targetCreditPolicy"></label><input id="targetCreditPolicy" type="number" min="0" max="100" step="0.1" value="40"></div>
          <div><label for="utilizationRate" id="l_utilizationRate"></label><input id="utilizationRate" type="number" min="0" max="100" step="0.1" value="35"></div>
          <div><label for="annualPlatformCost" id="l_annualPlatformCost"></label><input id="annualPlatformCost" type="number" min="0" step="100000" value="22000000"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button"></button>
          <button id="reset" type="button"></button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_monthlyUpgrades"></div><div id="monthlyUpgrades" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_currentLeakage"></div><div id="currentLeakage" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_targetLeakage"></div><div id="targetLeakage" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_recoveredAnnual"></div><div id="recoveredAnnual" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_netAnnual"></div><div id="netAnnual" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill"></div>

        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table>
          <tbody>
            <tr><th id="d_unusedValue"></th><td id="unusedValue">-</td></tr>
            <tr><th id="d_currentCredit"></th><td id="currentCredit">-</td></tr>
            <tr><th id="d_targetCredit"></th><td id="targetCredit">-</td></tr>
            <tr><th id="d_breakEven"></th><td id="breakEven">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      activeAccounts:$("activeAccounts"), upgradeRate:$("upgradeRate"), daysRemaining:$("daysRemaining"), oldPlanMrr:$("oldPlanMrr"),
      currentCreditPolicy:$("currentCreditPolicy"), targetCreditPolicy:$("targetCreditPolicy"), utilizationRate:$("utilizationRate"), annualPlatformCost:$("annualPlatformCost"),
      monthlyUpgrades:$("monthlyUpgrades"), currentLeakage:$("currentLeakage"), targetLeakage:$("targetLeakage"), recoveredAnnual:$("recoveredAnnual"), netAnnual:$("netAnnual"), roi:$("roi"),
      unusedValue:$("unusedValue"), currentCredit:$("currentCredit"), targetCredit:$("targetCredit"), breakEven:$("breakEven"),
      copy:$("copy"), reset:$("reset"), summary:$("summary"), error:$("error"), status:$("status"), langBtn:$("langBtn")
    };

    const defaults = {activeAccounts:2400,upgradeRate:6,daysRemaining:14,oldPlanMrr:59000,currentCreditPolicy:100,targetCreditPolicy:40,utilizationRate:35,annualPlatformCost:22000000};

    const I18N = {
      ko: {
        title:"📉 SaaS 업그레이드 크레딧 매출누수 계산기",
        subtitle:"업그레이드 시점의 잔여기간 크레딧 정책을 조정할 때 연간 회수 매출과 ROI를 계산합니다.",
        inputHeader:"입력값 Inputs", kpiHeader:"핵심 KPI", detailHeader:"세부 지표",
        back:"포털로", copy:"요약 복사", reset:"기본값 복원",
        l_activeAccounts:"월 활성 계정 수", l_upgradeRate:"월 업그레이드율 (%)", l_daysRemaining:"업그레이드 시 평균 잔여일", l_oldPlanMrr:"기존 플랜 월 요금 (₩)",
        l_currentCreditPolicy:"현재 크레딧 정책 (% of unused value)", l_targetCreditPolicy:"목표 크레딧 정책 (%)", l_utilizationRate:"크레딧 가치 활용률 (%)", l_annualPlatformCost:"연간 플랫폼 비용 (₩)",
        k_monthlyUpgrades:"월 업그레이드 계정", k_currentLeakage:"현재 월 누수", k_targetLeakage:"목표 월 누수", k_recoveredAnnual:"연간 회수 매출", k_netAnnual:"연간 순효과", k_roi:"ROI",
        d_unusedValue:"업그레이드 1건당 미사용 가치", d_currentCredit:"현재 1건당 크레딧", d_targetCredit:"목표 1건당 크레딧", d_breakEven:"손익분기 목표 크레딧 정책",
        waiting:"입력값을 확인하세요", good:"정책 조정 시 연간 순효과 플러스", bad:"비용 대비 효과가 부족합니다", invalid:"입력값을 확인해 주세요",
        e_target:"목표 크레딧 정책은 현재 정책보다 클 수 없습니다.", e_range:"모든 비율 값은 0~100 범위여야 합니다.",
        copied:"요약이 복사되었습니다.", copyFail:"복사 권한이 없어 수동 복사가 필요합니다.",
        summaryTitle:"[SaaS 크레딧 매출누수 요약]"
      },
      en: {
        title:"📉 SaaS Proration Revenue Leakage Calculator",
        subtitle:"Estimate annual recovered revenue and ROI by tightening upgrade proration credit policy.",
        inputHeader:"Inputs", kpiHeader:"Key KPIs", detailHeader:"Details",
        back:"Back to Portal", copy:"Copy Summary", reset:"Reset Defaults",
        l_activeAccounts:"Monthly active accounts", l_upgradeRate:"Monthly upgrade rate (%)", l_daysRemaining:"Avg days remaining at upgrade", l_oldPlanMrr:"Old plan monthly price (KRW)",
        l_currentCreditPolicy:"Current credit policy (% of unused value)", l_targetCreditPolicy:"Target credit policy (%)", l_utilizationRate:"Value utilization rate (%)", l_annualPlatformCost:"Annual platform cost (KRW)",
        k_monthlyUpgrades:"Monthly upgrades", k_currentLeakage:"Current leakage / month", k_targetLeakage:"Target leakage / month", k_recoveredAnnual:"Recovered revenue / year", k_netAnnual:"Net annual impact", k_roi:"ROI",
        d_unusedValue:"Unused value per upgrade", d_currentCredit:"Current credit per upgrade", d_targetCredit:"Target credit per upgrade", d_breakEven:"Break-even target credit policy",
        waiting:"Check your inputs", good:"Positive annual net impact", bad:"Insufficient impact vs cost", invalid:"Please review inputs",
        e_target:"Target credit policy cannot exceed current policy.", e_range:"All percentage values must be within 0 to 100.",
        copied:"Summary copied.", copyFail:"Clipboard unavailable. Please copy manually.",
        summaryTitle:"[SaaS Proration Leakage Summary]"
      }
    };

    let lang = "ko";
    const won = (n)=> new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=> Number(n).toLocaleString("en-US",{maximumFractionDigits:d});

    function t(k){ return I18N[lang][k] || k; }

    function applyI18n(){
      document.documentElement.lang = lang;
      $("title").textContent = t("title");
      $("subtitle").textContent = t("subtitle");
      $("inputHeader").textContent = t("inputHeader");
      $("kpiHeader").textContent = t("kpiHeader");
      $("detailHeader").textContent = t("detailHeader");
      $("backLink").textContent = t("back");
      refs.copy.textContent = t("copy");
      refs.reset.textContent = t("reset");
      ["activeAccounts","upgradeRate","daysRemaining","oldPlanMrr","currentCreditPolicy","targetCreditPolicy","utilizationRate","annualPlatformCost"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["monthlyUpgrades","currentLeakage","targetLeakage","recoveredAnnual","netAnnual","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["unusedValue","currentCredit","targetCredit","breakEven"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
      refs.langBtn.textContent = lang === "ko" ? "EN" : "KO";
    }

    function validate(v){
      const rates = [v.upgradeRate,v.currentCreditPolicy,v.targetCreditPolicy,v.utilizationRate];
      if (rates.some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("e_range");
      if (v.targetCreditPolicy > v.currentCreditPolicy) return t("e_target");
      return "";
    }

    function render(){
      const v = {
        activeAccounts:Number(refs.activeAccounts.value), upgradeRate:Number(refs.upgradeRate.value), daysRemaining:Number(refs.daysRemaining.value), oldPlanMrr:Number(refs.oldPlanMrr.value),
        currentCreditPolicy:Number(refs.currentCreditPolicy.value), targetCreditPolicy:Number(refs.targetCreditPolicy.value), utilizationRate:Number(refs.utilizationRate.value), annualPlatformCost:Number(refs.annualPlatformCost.value)
      };
      const err = validate(v);
      refs.error.classList.toggle("show", Boolean(err));
      refs.error.textContent = err;
      if (err){
        ["monthlyUpgrades","currentLeakage","targetLeakage","recoveredAnnual","netAnnual","roi","unusedValue","currentCredit","targetCredit","breakEven"].forEach((k)=>refs[k].textContent="-");
        refs.status.textContent = t("invalid");
        refs.summary.value = "";
        return;
      }

      const upgrades = v.activeAccounts * (v.upgradeRate/100);
      const unusedValuePerUpgrade = v.oldPlanMrr * (v.daysRemaining/30);
      const currentCreditPerUpgrade = unusedValuePerUpgrade * (v.currentCreditPolicy/100);
      const targetCreditPerUpgrade = unusedValuePerUpgrade * (v.targetCreditPolicy/100);
      const util = v.utilizationRate/100;

      const currentLeakage = Math.max(0, currentCreditPerUpgrade * (1-util)) * upgrades;
      const targetLeakage = Math.max(0, targetCreditPerUpgrade * (1-util)) * upgrades;
      const recoveredAnnual = (currentLeakage - targetLeakage) * 12;
      const netAnnual = recoveredAnnual - v.annualPlatformCost;
      const roi = v.annualPlatformCost > 0 ? (netAnnual / v.annualPlatformCost) * 100 : 0;

      const denom = upgrades * unusedValuePerUpgrade * (1-util) * 12;
      const breakEvenTarget = denom > 0 ? Math.max(0, (v.currentCreditPolicy/100) - (v.annualPlatformCost / denom)) * 100 : NaN;

      refs.monthlyUpgrades.textContent = num(upgrades,1);
      refs.currentLeakage.textContent = won(currentLeakage);
      refs.targetLeakage.textContent = won(targetLeakage);
      refs.recoveredAnnual.textContent = won(recoveredAnnual);
      refs.netAnnual.textContent = won(netAnnual);
      refs.roi.textContent = `${num(roi,2)}%`;
      refs.unusedValue.textContent = won(unusedValuePerUpgrade);
      refs.currentCredit.textContent = won(currentCreditPerUpgrade);
      refs.targetCredit.textContent = won(targetCreditPerUpgrade);
      refs.breakEven.textContent = Number.isFinite(breakEvenTarget) ? `${num(breakEvenTarget,2)}%` : "N/A";

      refs.status.innerHTML = netAnnual >= 0 ? `<span class="good">●</span> ${t("good")}` : `<span class="warn">●</span> ${t("bad")}`;
      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_monthlyUpgrades")}: ${num(upgrades,1)}`,
        `${t("k_currentLeakage")}: ${won(currentLeakage)}`,
        `${t("k_targetLeakage")}: ${won(targetLeakage)}`,
        `${t("k_recoveredAnnual")}: ${won(recoveredAnnual)}`,
        `${t("k_netAnnual")}: ${won(netAnnual)}`,
        `${t("k_roi")}: ${num(roi,2)}%`,
        `${t("d_breakEven")}: ${Number.isFinite(breakEvenTarget) ? `${num(breakEvenTarget,2)}%` : "N/A"}`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click", ()=>{ lang = lang === "ko" ? "en" : "ko"; applyI18n(); render(); });
    refs.copy.addEventListener("click", async ()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });
    refs.reset.addEventListener("click", ()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });
    [refs.activeAccounts,refs.upgradeRate,refs.daysRemaining,refs.oldPlanMrr,refs.currentCreditPolicy,refs.targetCreditPolicy,refs.utilizationRate,refs.annualPlatformCost].forEach((el)=>el.addEventListener("input",render));

    applyI18n();
    render();
  </script>
</body>
</html>
