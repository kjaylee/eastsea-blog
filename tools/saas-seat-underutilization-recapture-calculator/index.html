<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Seat Underutilization Recapture Calculator | SaaS 유휴 좌석 회수 수익 계산기</title>
  <meta name="description" content="SaaS 계약의 유휴 좌석 회수율 개선 시 순증 회수 좌석, 월 순이익, ROI, 회수기간, 손익분기 회수율을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🪑 SaaS 유휴 좌석 회수 수익 계산기</h1>
        <div class="sub" id="subtitle">유휴 좌석 회수율 개선이 월 순이익·ROI에 미치는 영향을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_contractedSeats" for="contractedSeats"></label><input id="contractedSeats" type="number" min="1" value="18000"></div>
          <div><label id="l_underutilizedRate" for="underutilizedRate"></label><input id="underutilizedRate" type="number" min="0" max="100" step="0.1" value="22"></div>
          <div><label id="l_currentRecapture" for="currentRecapture"></label><input id="currentRecapture" type="number" min="0" max="100" step="0.1" value="28"></div>
          <div><label id="l_targetRecapture" for="targetRecapture"></label><input id="targetRecapture" type="number" min="0" max="100" step="0.1" value="44"></div>
          <div><label id="l_seatPrice" for="seatPrice"></label><input id="seatPrice" type="number" min="0" step="100" value="58000"></div>
          <div><label id="l_grossMargin" for="grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="84"></div>
          <div><label id="l_riskCost" for="riskCost"></label><input id="riskCost" type="number" min="0" step="100" value="4200"></div>
          <div><label id="l_billingCost" for="billingCost"></label><input id="billingCost" type="number" min="0" step="100" value="2000"></div>
          <div><label id="l_monthlyCost" for="monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="8500000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="13000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_incrementalSeats"></div><div class="v" id="incrementalSeats">-</div></div>
          <div class="kpi"><div class="k" id="k_netPerSeat"></div><div class="v" id="netPerSeat">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_recaptureDelta"></div><div class="v" id="recaptureDelta">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_breakEvenRecapture"></th><td id="breakEvenRecapture">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_monthlyContribution"></th><td id="monthlyContribution">-</td></tr>
          <tr><th id="d_totalProgramCost"></th><td id="totalProgramCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={contractedSeats:$("contractedSeats"),underutilizedRate:$("underutilizedRate"),currentRecapture:$("currentRecapture"),targetRecapture:$("targetRecapture"),seatPrice:$("seatPrice"),grossMargin:$("grossMargin"),riskCost:$("riskCost"),billingCost:$("billingCost"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),incrementalSeats:$("incrementalSeats"),netPerSeat:$("netPerSeat"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),recaptureDelta:$("recaptureDelta"),breakEvenRecapture:$("breakEvenRecapture"),payback:$("payback"),monthlyContribution:$("monthlyContribution"),totalProgramCost:$("totalProgramCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={contractedSeats:18000,underutilizedRate:22,currentRecapture:28,targetRecapture:44,seatPrice:58000,grossMargin:84,riskCost:4200,billingCost:2000,monthlyCost:8500000,setup:13000000,months:12};
    const I18N={
      ko:{title:"🪑 SaaS 유휴 좌석 회수 수익 계산기",subtitle:"유휴 좌석 회수율 개선이 월 순이익·ROI에 미치는 영향을 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_contractedSeats:"계약 좌석 수",l_underutilizedRate:"유휴 좌석 비율 (%)",l_currentRecapture:"현재 유휴 좌석 회수율 (%)",l_targetRecapture:"목표 유휴 좌석 회수율 (%)",l_seatPrice:"좌석당 월 요금 (₩)",l_grossMargin:"매출총이익률 (%)",l_riskCost:"회수 좌석당 리스크 완충비 (₩)",l_billingCost:"회수 좌석당 청구/운영비 (₩)",l_monthlyCost:"월 프로그램 운영비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_incrementalSeats:"순증 회수 좌석",k_netPerSeat:"좌석당 월 순기여",k_monthlyNet:"월 순이익",k_roi:"ROI",k_periodNet:"기간 순효과",k_recaptureDelta:"회수율 증가폭",d_breakEvenRecapture:"손익분기 목표 회수율",d_payback:"회수기간",d_monthlyContribution:"월 순증 총기여",d_totalProgramCost:"기간 총 프로그램비",ok:"유휴 좌석 회수 수익성 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 좌석 수/기간은 1 이상이어야 합니다.",logicErr:"목표 회수율은 현재 회수율 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[SaaS 유휴 좌석 회수 수익 요약]",unitMonths:"개월"},
      en:{title:"🪑 SaaS Seat Underutilization Recapture Calculator",subtitle:"Estimate monthly net profit and ROI from improving underutilized-seat recapture rate.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_contractedSeats:"Contracted seats",l_underutilizedRate:"Underutilized seat rate (%)",l_currentRecapture:"Current recapture rate (%)",l_targetRecapture:"Target recapture rate (%)",l_seatPrice:"Monthly price per seat (KRW)",l_grossMargin:"Gross margin (%)",l_riskCost:"Risk buffer cost per recaptured seat (KRW)",l_billingCost:"Billing/ops cost per recaptured seat (KRW)",l_monthlyCost:"Monthly program cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_incrementalSeats:"Incremental recaptured seats",k_netPerSeat:"Monthly net contribution per seat",k_monthlyNet:"Monthly net profit",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_recaptureDelta:"Recapture-rate delta",d_breakEvenRecapture:"Break-even target recapture rate",d_payback:"Payback period",d_monthlyContribution:"Monthly total contribution uplift",d_totalProgramCost:"Total program cost (period)",ok:"Seat recapture economics ready",warn:"Monthly net profit is negative with current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and seats/months must be >= 1.",logicErr:"Target recapture rate must be greater than or equal to current rate.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[SaaS Seat Underutilization Recapture Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["contractedSeats","underutilizedRate","currentRecapture","targetRecapture","seatPrice","grossMargin","riskCost","billingCost","monthlyCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["incrementalSeats","netPerSeat","monthlyNet","roi","periodNet","recaptureDelta"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenRecapture","payback","monthlyContribution","totalProgramCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.contractedSeats)||v.contractedSeats<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.seatPrice,v.riskCost,v.billingCost,v.monthlyCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.underutilizedRate,v.currentRecapture,v.targetRecapture,v.grossMargin].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetRecapture<v.currentRecapture) return t("logicErr");
      return "";
    }

    function render(){
      const v={contractedSeats:Number(refs.contractedSeats.value),underutilizedRate:Number(refs.underutilizedRate.value),currentRecapture:Number(refs.currentRecapture.value),targetRecapture:Number(refs.targetRecapture.value),seatPrice:Number(refs.seatPrice.value),grossMargin:Number(refs.grossMargin.value),riskCost:Number(refs.riskCost.value),billingCost:Number(refs.billingCost.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["incrementalSeats","netPerSeat","monthlyNet","roi","periodNet","recaptureDelta","breakEvenRecapture","payback","monthlyContribution","totalProgramCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const underutilizedSeats=v.contractedSeats*(v.underutilizedRate/100);
      const currentRecaptured=underutilizedSeats*(v.currentRecapture/100);
      const targetRecaptured=underutilizedSeats*(v.targetRecapture/100);
      const incrementalSeats=Math.max(0,targetRecaptured-currentRecaptured);
      const netPerSeat=(v.seatPrice*(v.grossMargin/100))-v.riskCost-v.billingCost;
      const monthlyContribution=incrementalSeats*netPerSeat;
      const monthlyNet=monthlyContribution-v.monthlyCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const recaptureDelta=v.targetRecapture-v.currentRecapture;

      const requiredSeats=netPerSeat>0?(v.monthlyCost/netPerSeat):Infinity;
      const breakEvenRecapture=Number.isFinite(requiredSeats)&&underutilizedSeats>0?v.currentRecapture+((requiredSeats/underutilizedSeats)*100):Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.incrementalSeats.textContent=num(incrementalSeats,0);
      refs.netPerSeat.textContent=won(netPerSeat);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.recaptureDelta.textContent=pct(recaptureDelta,1);
      refs.breakEvenRecapture.textContent=(Number.isFinite(breakEvenRecapture)&&breakEvenRecapture<=100)?pct(breakEvenRecapture,2):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.totalProgramCost.textContent=won(totalProgramCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_incrementalSeats")}: ${num(incrementalSeats,0)}`,`${t("k_netPerSeat")}: ${won(netPerSeat)}`,`${t("d_monthlyContribution")}: ${won(monthlyContribution)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenRecapture")}: ${(Number.isFinite(breakEvenRecapture)&&breakEvenRecapture<=100)?pct(breakEvenRecapture,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.contractedSeats,refs.underutilizedRate,refs.currentRecapture,refs.targetRecapture,refs.seatPrice,refs.grossMargin,refs.riskCost,refs.billingCost,refs.monthlyCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
