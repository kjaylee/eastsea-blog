<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Trial Conversion Revenue Forecast | SaaS 체험전환 매출 예측기</title>
  <meta name="description" content="월 체험 가입자, 전환율, 가격, 이탈률, 획득비용을 입력해 SaaS 매출/순이익/ROI/손익분기 전환율을 시뮬레이션합니다." />
  <style>
    :root{--bg:#0b1220;--card:#111b31;--line:#2a3a62;--txt:#e8eefc;--muted:#9eb0d8;--pri:#38bdf8;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#1d3a6c 0,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 62px}
    .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.15rem,2.8vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.5}
    .home{white-space:nowrap;text-decoration:none;color:#e0f2fe;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#112544}
    .grid{display:grid;grid-template-columns:1.06fr .94fr;gap:12px}
    .card{background:linear-gradient(165deg,#162644,var(--card));border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1730;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#38bdf8,#0284c7)}
    .soft{background:#15315a;border:1px solid var(--line)}
    textarea{resize:vertical;min-height:98px;margin-top:10px}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #78343a;background:rgba(248,113,113,.13);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#0f1b34;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800}
    .pill{margin-top:10px;display:inline-flex;align-items:center;gap:6px;font-size:.78rem;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#143052;color:#d3e8ff}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:880px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📈 SaaS 체험전환 매출 예측기</h1>
        <div class="sub">체험 유입, 전환율, 이탈률, 비용 구조를 반영해 누적 순이익과 손익분기 전환율을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="monthlyTrials">월 체험 가입자 수</label><input id="monthlyTrials" type="number" min="1" step="1" value="2800" /></div>
          <div><label for="trialGrowthPct">체험 유입 월 성장률 (%)</label><input id="trialGrowthPct" type="number" min="-90" max="500" step="0.1" value="3.5" /></div>
          <div><label for="conversionPct">체험→유료 전환율 (%)</label><input id="conversionPct" type="number" min="0.1" max="100" step="0.1" value="11.5" /></div>
          <div><label for="monthlyPrice">월 구독 가격 (KRW)</label><input id="monthlyPrice" type="number" min="1" step="100" value="29000" /></div>
          <div><label for="churnPct">월 유료 이탈률 (%)</label><input id="churnPct" type="number" min="0" max="99" step="0.1" value="4.2" /></div>
          <div><label for="variableCostPct">변동비율 (% of 매출)</label><input id="variableCostPct" type="number" min="0" max="95" step="0.1" value="18" /></div>
          <div><label for="costPerTrial">체험 1명당 획득비용 (KRW)</label><input id="costPerTrial" type="number" min="0" step="100" value="3200" /></div>
          <div><label for="fixedMonthlyCost">월 고정 운영비 (KRW)</label><input id="fixedMonthlyCost" type="number" min="0" step="1000" value="3000000" /></div>
          <div><label for="setupCost">초기 셋업비 (KRW)</label><input id="setupCost" type="number" min="0" step="1000" value="8000000" /></div>
          <div><label for="months">예측 기간 (개월)</label><input id="months" type="number" min="1" max="60" step="1" value="12" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">예측 종료 활성 유료고객</div><div id="endActive" class="v">-</div></div>
          <div class="kpi"><div class="k">종료월 MRR</div><div id="endingMrr" class="v">-</div></div>
          <div class="kpi"><div class="k">누적 매출</div><div id="cumRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">누적 순이익</div><div id="cumNet" class="v">-</div></div>
          <div class="kpi"><div class="k">총 ROI</div><div id="roi" class="v">-</div></div>
          <div class="kpi"><div class="k">손익분기 도달월</div><div id="payback" class="v">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>누적 유료 전환 고객</th><td id="cumConverted">-</td></tr>
            <tr><th>누적 획득비용</th><td id="cumAcq">-</td></tr>
            <tr><th>누적 변동비</th><td id="cumVar">-</td></tr>
            <tr><th>손익분기 전환율(추정)</th><td id="breakEvenConv">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      monthlyTrials: $('monthlyTrials'), trialGrowthPct: $('trialGrowthPct'), conversionPct: $('conversionPct'), monthlyPrice: $('monthlyPrice'),
      churnPct: $('churnPct'), variableCostPct: $('variableCostPct'), costPerTrial: $('costPerTrial'), fixedMonthlyCost: $('fixedMonthlyCost'),
      setupCost: $('setupCost'), months: $('months'),
      endActive: $('endActive'), endingMrr: $('endingMrr'), cumRevenue: $('cumRevenue'), cumNet: $('cumNet'), roi: $('roi'), payback: $('payback'),
      cumConverted: $('cumConverted'), cumAcq: $('cumAcq'), cumVar: $('cumVar'), breakEvenConv: $('breakEvenConv'),
      status: $('status'), error: $('error'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = {
      monthlyTrials: 2800, trialGrowthPct: 3.5, conversionPct: 11.5, monthlyPrice: 29000, churnPct: 4.2,
      variableCostPct: 18, costPerTrial: 3200, fixedMonthlyCost: 3000000, setupCost: 8000000, months: 12
    };

    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const nfmt = (n, d = 1) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });

    const isNum = (n) => Number.isFinite(n);
    const inRange = (n, min, max) => isNum(n) && n >= min && n <= max;

    function validate(v) {
      if (!inRange(v.monthlyTrials, 1, 1_000_000_000)) return '월 체험 가입자 수는 1 이상이어야 합니다.';
      if (!inRange(v.trialGrowthPct, -90, 500)) return '체험 유입 월 성장률은 -90%~500% 범위여야 합니다.';
      if (!inRange(v.conversionPct, 0.1, 100)) return '체험→유료 전환율은 0.1%~100% 범위여야 합니다.';
      if (!inRange(v.monthlyPrice, 1, 100_000_000)) return '월 구독 가격은 1원 이상이어야 합니다.';
      if (!inRange(v.churnPct, 0, 99)) return '월 유료 이탈률은 0%~99% 범위여야 합니다.';
      if (!inRange(v.variableCostPct, 0, 95)) return '변동비율은 0%~95% 범위여야 합니다.';
      if (!inRange(v.costPerTrial, 0, 10_000_000)) return '체험 1명당 획득비용은 0 이상이어야 합니다.';
      if (!inRange(v.fixedMonthlyCost, 0, 10_000_000_000)) return '월 고정 운영비는 0 이상이어야 합니다.';
      if (!inRange(v.setupCost, 0, 10_000_000_000)) return '초기 셋업비는 0 이상이어야 합니다.';
      if (!Number.isInteger(v.months) || !inRange(v.months, 1, 60)) return '예측 기간은 1~60개월 정수여야 합니다.';
      if (1 + v.trialGrowthPct / 100 <= 0) return '성장률로 인해 체험 유입이 음수가 됩니다. 값을 조정하세요.';
      return '';
    }

    function simulate(v, convOverride = null) {
      const growth = 1 + v.trialGrowthPct / 100;
      const conv = (convOverride ?? v.conversionPct) / 100;
      const churn = v.churnPct / 100;
      const varRate = v.variableCostPct / 100;

      let active = 0;
      let cumRevenue = 0;
      let cumNet = -v.setupCost;
      let cumVar = 0;
      let cumAcq = 0;
      let cumConverted = 0;
      let payback = null;
      let endingMrr = 0;

      for (let m = 1; m <= v.months; m++) {
        const trials = v.monthlyTrials * Math.pow(growth, m - 1);
        const converted = trials * conv;
        const churned = active * churn;
        active = active - churned + converted;

        const revenue = active * v.monthlyPrice;
        const varCost = revenue * varRate;
        const acqCost = trials * v.costPerTrial;
        const net = revenue - varCost - acqCost - v.fixedMonthlyCost;

        cumRevenue += revenue;
        cumVar += varCost;
        cumAcq += acqCost;
        cumConverted += converted;
        cumNet += net;
        endingMrr = revenue;

        if (payback === null && cumNet >= 0) payback = m;
      }

      const totalCosts = v.setupCost + cumVar + cumAcq + v.fixedMonthlyCost * v.months;
      const roi = totalCosts > 0 ? (cumNet / totalCosts) * 100 : 0;

      return { active, endingMrr, cumRevenue, cumNet, roi, payback, cumConverted, cumAcq, cumVar };
    }

    function estimateBreakEvenConv(v) {
      const atMin = simulate(v, 0.1).cumNet;
      const atMax = simulate(v, 100).cumNet;
      if (atMax < 0) return null;
      if (atMin >= 0) return 0.1;

      let lo = 0.1;
      let hi = 100;
      for (let i = 0; i < 45; i++) {
        const mid = (lo + hi) / 2;
        const net = simulate(v, mid).cumNet;
        if (net >= 0) hi = mid;
        else lo = mid;
      }
      return hi;
    }

    function clearOutputs() {
      ['endActive', 'endingMrr', 'cumRevenue', 'cumNet', 'roi', 'payback', 'cumConverted', 'cumAcq', 'cumVar', 'breakEvenConv'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function render() {
      const v = {
        monthlyTrials: Number(refs.monthlyTrials.value),
        trialGrowthPct: Number(refs.trialGrowthPct.value),
        conversionPct: Number(refs.conversionPct.value),
        monthlyPrice: Number(refs.monthlyPrice.value),
        churnPct: Number(refs.churnPct.value),
        variableCostPct: Number(refs.variableCostPct.value),
        costPerTrial: Number(refs.costPerTrial.value),
        fixedMonthlyCost: Number(refs.fixedMonthlyCost.value),
        setupCost: Number(refs.setupCost.value),
        months: Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        clearOutputs();
        return;
      }

      const r = simulate(v);
      const be = estimateBreakEvenConv(v);

      refs.endActive.textContent = `${nfmt(r.active, 1)}명`;
      refs.endingMrr.textContent = won(r.endingMrr);
      refs.cumRevenue.textContent = won(r.cumRevenue);
      refs.cumNet.textContent = won(r.cumNet);
      refs.roi.textContent = `${nfmt(r.roi, 2)}%`;
      refs.payback.textContent = r.payback ? `${r.payback}개월` : '미도달';
      refs.cumConverted.textContent = `${nfmt(r.cumConverted, 1)}명`;
      refs.cumAcq.textContent = won(r.cumAcq);
      refs.cumVar.textContent = won(r.cumVar);
      refs.breakEvenConv.textContent = be === null ? '100% 초과(미도달)' : `${nfmt(be, 2)}%`;

      if (r.cumNet > 0) refs.status.innerHTML = `<span class="good">●</span> ${v.months}개월 누적 흑자 (${won(r.cumNet)})`;
      else if (Math.abs(r.cumNet) < 1) refs.status.innerHTML = `<span class="warn">●</span> 손익분기 근접`;
      else refs.status.innerHTML = `<span class="bad">●</span> ${v.months}개월 누적 적자 (${won(r.cumNet)})`;

      refs.summary.value = [
        '[SaaS Trial Conversion Revenue Forecast 요약]',
        `예측 기간: ${v.months}개월`,
        `월 체험 가입자: ${nfmt(v.monthlyTrials, 0)}명 / 전환율: ${nfmt(v.conversionPct, 2)}%`,
        `종료 활성 유료고객: ${nfmt(r.active, 1)}명`,
        `종료월 MRR: ${won(r.endingMrr)}`,
        `누적 매출: ${won(r.cumRevenue)}`,
        `누적 순이익: ${won(r.cumNet)} / ROI: ${nfmt(r.roi, 2)}%`,
        `손익분기 전환율(추정): ${be === null ? '미도달' : `${nfmt(be, 2)}%`}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, val]) => { refs[k].value = val; });
      render();
    });

    [
      refs.monthlyTrials, refs.trialGrowthPct, refs.conversionPct, refs.monthlyPrice, refs.churnPct,
      refs.variableCostPct, refs.costPerTrial, refs.fixedMonthlyCost, refs.setupCost, refs.months
    ].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
