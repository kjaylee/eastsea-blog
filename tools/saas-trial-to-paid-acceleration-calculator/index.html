<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Trial-to-Paid Acceleration Calculator | SaaS 체험→유료 전환 가속 계산기</title>
  <meta name="description" content="SaaS trial-to-paid 전환율 개선 시 월 순이익, ROI, 회수기간, 손익분기 목표 전환율을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🚀 SaaS 체험→유료 전환 가속 계산기</h1>
        <div class="sub" id="subtitle">온보딩·세일즈 지원으로 trial-to-paid 전환율을 높였을 때 월 순이익과 ROI를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_trials" for="trials"></label><input id="trials" type="number" min="1" value="9500"></div>
          <div><label id="l_currentConv" for="currentConv"></label><input id="currentConv" type="number" min="0" max="100" step="0.1" value="14"></div>
          <div><label id="l_targetConv" for="targetConv"></label><input id="targetConv" type="number" min="0" max="100" step="0.1" value="20"></div>
          <div><label id="l_price" for="price"></label><input id="price" type="number" min="0" step="100" value="39000"></div>
          <div><label id="l_margin" for="margin"></label><input id="margin" type="number" min="0" max="100" step="0.1" value="78"></div>
          <div><label id="l_discount" for="discount"></label><input id="discount" type="number" min="0" max="100" step="0.1" value="15"></div>
          <div><label id="l_onboardingCost" for="onboardingCost"></label><input id="onboardingCost" type="number" min="0" step="100" value="1100"></div>
          <div><label id="l_salesCost" for="salesCost"></label><input id="salesCost" type="number" min="0" step="100" value="8500"></div>
          <div><label id="l_fixedCost" for="fixedCost"></label><input id="fixedCost" type="number" min="0" step="10000" value="6000000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="10000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_newPaid"></div><div class="v" id="newPaid">-</div></div>
          <div class="kpi"><div class="k" id="k_perPaidNet"></div><div class="v" id="perPaidNet">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_convDelta"></div><div class="v" id="convDelta">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_breakEvenConv"></th><td id="breakEvenConv">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_monthlyContribution"></th><td id="monthlyContribution">-</td></tr>
          <tr><th id="d_totalProgramCost"></th><td id="totalProgramCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={trials:$("trials"),currentConv:$("currentConv"),targetConv:$("targetConv"),price:$("price"),margin:$("margin"),discount:$("discount"),onboardingCost:$("onboardingCost"),salesCost:$("salesCost"),fixedCost:$("fixedCost"),setup:$("setup"),months:$("months"),newPaid:$("newPaid"),perPaidNet:$("perPaidNet"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),convDelta:$("convDelta"),breakEvenConv:$("breakEvenConv"),payback:$("payback"),monthlyContribution:$("monthlyContribution"),totalProgramCost:$("totalProgramCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={trials:9500,currentConv:14,targetConv:20,price:39000,margin:78,discount:15,onboardingCost:1100,salesCost:8500,fixedCost:6000000,setup:10000000,months:12};
    const I18N={
      ko:{title:"🚀 SaaS 체험→유료 전환 가속 계산기",subtitle:"온보딩·세일즈 지원으로 trial-to-paid 전환율을 높였을 때 월 순이익과 ROI를 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_trials:"월 trial 가입 수",l_currentConv:"현재 trial→paid 전환율 (%)",l_targetConv:"목표 trial→paid 전환율 (%)",l_price:"유료 플랜 월 구독료 (₩)",l_margin:"매출총이익률 (%)",l_discount:"첫 달 프로모션 할인율 (%)",l_onboardingCost:"trial 1건당 온보딩 비용 (₩)",l_salesCost:"전환 고객 1인당 세일즈/CS 비용 (₩)",l_fixedCost:"월 고정 프로그램비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_newPaid:"순증 유료 계정",k_perPaidNet:"계정 1건당 순기여",k_monthlyNet:"월 순증 순이익",k_roi:"ROI",k_periodNet:"기간 순효과",k_convDelta:"전환율 증가폭",d_breakEvenConv:"손익분기 목표 전환율",d_payback:"회수기간",d_monthlyContribution:"월 순증 총기여액",d_totalProgramCost:"기간 총 프로그램비",ok:"Trial 가속 시나리오 수익성 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, trial 수/기간은 1 이상이어야 합니다.",logicErr:"목표 전환율은 현재 전환율 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[SaaS Trial-to-Paid 가속 요약]",unitMonths:"개월"},
      en:{title:"🚀 SaaS Trial-to-Paid Acceleration Calculator",subtitle:"Estimate monthly profit, payback, and ROI from improving trial-to-paid conversion with onboarding and sales assist.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_trials:"Monthly trial signups",l_currentConv:"Current trial-to-paid conversion (%)",l_targetConv:"Target trial-to-paid conversion (%)",l_price:"Paid plan monthly subscription price (KRW)",l_margin:"Gross margin (%)",l_discount:"First-month promo discount (%)",l_onboardingCost:"Onboarding cost per trial (KRW)",l_salesCost:"Sales/CS cost per converted account (KRW)",l_fixedCost:"Monthly fixed program cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_newPaid:"Net new paid accounts",k_perPaidNet:"Net contribution per paid account",k_monthlyNet:"Monthly net profit",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_convDelta:"Conversion rate delta",d_breakEvenConv:"Break-even target conversion",d_payback:"Payback period",d_monthlyContribution:"Monthly total contribution uplift",d_totalProgramCost:"Total program cost (period)",ok:"Trial acceleration economics ready",warn:"Monthly net profit is negative with current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and trials/months must be >= 1.",logicErr:"Target conversion must be greater than or equal to current conversion.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[SaaS Trial-to-Paid Acceleration Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["trials","currentConv","targetConv","price","margin","discount","onboardingCost","salesCost","fixedCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["newPaid","perPaidNet","monthlyNet","roi","periodNet","convDelta"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenConv","payback","monthlyContribution","totalProgramCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.trials)||v.trials<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.price,v.onboardingCost,v.salesCost,v.fixedCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.currentConv,v.targetConv,v.margin,v.discount].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetConv<v.currentConv) return t("logicErr");
      return "";
    }

    function render(){
      const v={trials:Number(refs.trials.value),currentConv:Number(refs.currentConv.value),targetConv:Number(refs.targetConv.value),price:Number(refs.price.value),margin:Number(refs.margin.value),discount:Number(refs.discount.value),onboardingCost:Number(refs.onboardingCost.value),salesCost:Number(refs.salesCost.value),fixedCost:Number(refs.fixedCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["newPaid","perPaidNet","monthlyNet","roi","periodNet","convDelta","breakEvenConv","payback","monthlyContribution","totalProgramCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const currentPaid=v.trials*(v.currentConv/100);
      const targetPaid=v.trials*(v.targetConv/100);
      const newPaid=Math.max(0,targetPaid-currentPaid);
      const perPaidNet=(v.price*(1-v.discount/100)*(v.margin/100))-v.salesCost;
      const monthlyTrialCost=v.trials*v.onboardingCost;
      const monthlyContribution=newPaid*perPaidNet;
      const monthlyNet=monthlyContribution-monthlyTrialCost-v.fixedCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=((monthlyTrialCost+v.fixedCost)*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const convDelta=v.targetConv-v.currentConv;

      const requiredPaid=perPaidNet>0?((monthlyTrialCost+v.fixedCost)/perPaidNet):Infinity;
      const breakEvenConv=Number.isFinite(requiredPaid)&&v.trials>0?v.currentConv+((requiredPaid/v.trials)*100):Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.newPaid.textContent=num(newPaid,0);
      refs.perPaidNet.textContent=won(perPaidNet);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.convDelta.textContent=pct(convDelta,1);
      refs.breakEvenConv.textContent=(Number.isFinite(breakEvenConv)&&breakEvenConv<=100)?pct(breakEvenConv,2):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.totalProgramCost.textContent=won(totalProgramCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_newPaid")}: ${num(newPaid,0)}`,`${t("k_perPaidNet")}: ${won(perPaidNet)}`,`${t("d_monthlyContribution")}: ${won(monthlyContribution)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenConv")}: ${(Number.isFinite(breakEvenConv)&&breakEvenConv<=100)?pct(breakEvenConv,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.trials,refs.currentConv,refs.targetConv,refs.price,refs.margin,refs.discount,refs.onboardingCost,refs.salesCost,refs.fixedCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
