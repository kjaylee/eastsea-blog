<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Unit Economics Calculator | SaaS 유닛 이코노믹스 계산기</title>
  <meta name="description" content="고객 수, ARPA, 마진, 이탈률, CAC로 LTV, LTV:CAC, 회수기간을 계산하는 SaaS 핵심 지표 계산기" />
  <style>
    :root{--bg:#081124;--card:#111d38;--line:#2c3f69;--txt:#ebf2ff;--muted:#9fb2d3;--pri:#6b8dff;--ok:#34d399;--warn:#fbbf24;--err:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#243b73 0%,#081124 48%);color:var(--txt)}
    .wrap{max-width:1060px;margin:0 auto;padding:20px 14px 60px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#dbe7ff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#101a34;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:linear-gradient(165deg,#17264b,#111d38);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1831;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5b73ea);font-weight:700}
    .soft{background:#172750;border:1px solid var(--line);font-weight:600}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);border-radius:11px;padding:10px;background:#0f1934}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.18rem;font-weight:800}
    .v.sm{font-size:1.02rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);font-size:.75rem;background:#14234a;color:#bed0f1;margin-top:10px}
    .good{color:var(--ok)}.warn{color:var(--warn)}
    textarea{width:100%;min-height:100px;margin-top:10px;background:#0e1630;color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:.84rem;resize:vertical}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📊 SaaS 유닛 이코노믹스 계산기</h1>
        <div class="sub">LTV, CAC 회수기간, LTV:CAC 비율을 빠르게 점검해 투자/성장 효율을 판단합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="customers">활성 고객 수 (명)</label><input id="customers" type="number" min="1" value="1200" /></div>
          <div><label for="arpa">ARPA (고객당 월매출, KRW)</label><input id="arpa" type="number" min="1" value="49000" /></div>
          <div><label for="margin">총마진율 (%)</label><input id="margin" type="number" min="1" max="100" step="0.1" value="78" /></div>
          <div><label for="churn">월 이탈률 (%)</label><input id="churn" type="number" min="0.1" max="99" step="0.1" value="3.2" /></div>
          <div><label for="cac">CAC (고객획득비용, KRW)</label><input id="cac" type="number" min="0" value="720000" /></div>
          <div><label for="growth">월 MRR 성장률 (%)</label><input id="growth" type="number" step="0.1" value="5.5" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 MRR</div><div id="mrr" class="v">-</div></div>
          <div class="kpi"><div class="k">월 총이익 MRR</div><div id="grossMrr" class="v">-</div></div>
          <div class="kpi"><div class="k">LTV</div><div id="ltv" class="v">-</div></div>
          <div class="kpi"><div class="k">LTV : CAC</div><div id="ratio" class="v sm">-</div></div>
          <div class="kpi"><div class="k">CAC 회수기간</div><div id="payback" class="v sm">-</div></div>
          <div class="kpi"><div class="k">Rule of 40 프록시</div><div id="rule40" class="v sm">-</div></div>
        </div>
        <div id="health" class="pill">지표 해석 대기</div>

        <h2 style="margin-top:12px">이탈률 민감도</h2>
        <table>
          <thead><tr><th>시나리오</th><th>LTV</th><th>LTV:CAC</th></tr></thead>
          <tbody id="scenarios"></tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      customers: $('customers'), arpa: $('arpa'), margin: $('margin'), churn: $('churn'), cac: $('cac'), growth: $('growth'),
      mrr: $('mrr'), grossMrr: $('grossMrr'), ltv: $('ltv'), ratio: $('ratio'), payback: $('payback'), rule40: $('rule40'),
      scenarios: $('scenarios'), health: $('health'), summary: $('summary'), error: $('error'), copy: $('copy'), reset: $('reset')
    };

    const defaults = { customers:1200, arpa:49000, margin:78, churn:3.2, cac:720000, growth:5.5 };
    const money = (n)=> new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=> Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.customers) || v.customers <= 0) return '활성 고객 수는 1 이상이어야 합니다.';
      if (!Number.isFinite(v.arpa) || v.arpa <= 0) return 'ARPA는 0보다 커야 합니다.';
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return '총마진율은 0~100% 범위여야 합니다.';
      if (!Number.isFinite(v.churn) || v.churn <= 0 || v.churn >= 100) return '월 이탈률은 0~100% 사이(0 제외)여야 합니다.';
      if (!Number.isFinite(v.cac) || v.cac < 0) return 'CAC는 0 이상이어야 합니다.';
      return '';
    }

    function compute(v){
      const mrr = v.customers * v.arpa;
      const grossProfitMrr = mrr * (v.margin/100);
      const contribPerCustomer = v.arpa * (v.margin/100);
      const churnDec = v.churn / 100;
      const ltv = contribPerCustomer / churnDec;
      const ratio = v.cac === 0 ? Infinity : ltv / v.cac;
      const payback = v.cac === 0 ? 0 : v.cac / contribPerCustomer;
      const rule40 = v.growth + v.margin;
      return { mrr, grossProfitMrr, ltv, ratio, payback, rule40 };
    }

    function scenarioRows(v){
      const churns = [Math.max(0.2, v.churn-1), v.churn, Math.min(95, v.churn+1)];
      return churns.map(c=>{
        const ltv = (v.arpa*(v.margin/100)) / (c/100);
        const ratio = v.cac===0 ? Infinity : ltv/v.cac;
        const label = c===v.churn ? `기준 (${num(c,1)}%)` : (c<v.churn?`낮은 이탈 (${num(c,1)}%)`:`높은 이탈 (${num(c,1)}%)`);
        const ratioTxt = Number.isFinite(ratio) ? `${num(ratio,2)}x` : '∞';
        return `<tr><td>${label}</td><td>${money(ltv)}</td><td>${ratioTxt}</td></tr>`;
      }).join('');
    }

    function render(){
      const v = {
        customers: Number(refs.customers.value), arpa: Number(refs.arpa.value), margin: Number(refs.margin.value),
        churn: Number(refs.churn.value), cac: Number(refs.cac.value), growth: Number(refs.growth.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;
      if (err){
        ['mrr','grossMrr','ltv','ratio','payback','rule40'].forEach(k=>refs[k].textContent='-');
        refs.scenarios.innerHTML='';
        refs.health.textContent='입력값을 확인하세요';
        refs.summary.value='';
        return;
      }

      const r = compute(v);
      refs.mrr.textContent = money(r.mrr);
      refs.grossMrr.textContent = money(r.grossProfitMrr);
      refs.ltv.textContent = money(r.ltv);
      refs.ratio.textContent = Number.isFinite(r.ratio) ? `${num(r.ratio,2)}x` : '∞';
      refs.payback.textContent = `${num(r.payback,1)}개월`;
      refs.rule40.textContent = `${num(r.rule40,1)}점`;
      refs.scenarios.innerHTML = scenarioRows(v);

      const quality = Number.isFinite(r.ratio) && r.ratio >= 3 ? '우수' : (Number.isFinite(r.ratio) && r.ratio >= 2 ? '보통' : '개선 필요');
      refs.health.innerHTML = quality === '우수'
        ? `<span class="good">●</span> LTV:CAC ${refs.ratio.textContent} (우수)`
        : quality === '보통'
          ? `<span class="warn">●</span> LTV:CAC ${refs.ratio.textContent} (보통)`
          : `<span>●</span> LTV:CAC ${refs.ratio.textContent} (개선 필요)`;

      refs.summary.value = [
        '[SaaS Unit Economics 요약]',
        `월 MRR: ${money(r.mrr)}`,
        `월 총이익 MRR: ${money(r.grossProfitMrr)}`,
        `LTV: ${money(r.ltv)}`,
        `LTV:CAC: ${Number.isFinite(r.ratio)?num(r.ratio,2)+'x':'∞'}`,
        `CAC 회수기간: ${num(r.payback,1)}개월`,
        `Rule of 40(성장+마진): ${num(r.rule40,1)}점`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value = v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.customers,refs.arpa,refs.margin,refs.churn,refs.cac,refs.growth].forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
