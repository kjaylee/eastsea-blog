<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Usage Overage Revenue Calculator | SaaS 오버리지 수익 계산기</title>
  <meta name="description" content="SaaS 사용량 기반 과금에서 오버리지 매출, 비용, 순이익, ROI, 손익분기 초과 사용량을 계산합니다." />
  <style>
    :root{--bg:#071423;--card:#102640;--line:#2a4d7c;--txt:#e8f2ff;--muted:#adc4e2;--pri:#74a8ff;--soft:#1a3d67;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.13)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#1f4978 0%,#071423 58%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#143159;color:#deebff;border-radius:10px;padding:8px 12px;text-decoration:none;font-size:.86rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17385f,#102640);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1f39;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{border:none;cursor:pointer;background:linear-gradient(135deg,var(--pri),#4f7eef);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    textarea{margin-top:10px;min-height:108px;resize:vertical}.error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7a3341;background:var(--errbg);color:var(--err);font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0c1f38;border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.04rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#163763;color:#d9e8ff;font-size:.77rem;margin-top:10px}.ok{color:var(--ok)}.warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.86rem;table-layout:fixed}th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">📈 SaaS 오버리지 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">사용량 기반 과금의 초과 사용 매출과 비용을 반영해 월 순이익, ROI, 손익분기 오버리지 사용량을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" class="chip" type="button">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="accounts" data-i18n="accounts">활성 계정 수</label><input id="accounts" type="number" min="1" value="420"></div>
          <div><label for="includedUnits" data-i18n="includedUnits">계정당 포함 사용량</label><input id="includedUnits" type="number" min="0" value="15000"></div>
          <div><label for="avgUsage" data-i18n="avgUsage">계정당 평균 사용량</label><input id="avgUsage" type="number" min="0" value="19600"></div>
          <div><label for="overagePrice" data-i18n="overagePrice">오버리지 단가 (KRW/단위)</label><input id="overagePrice" type="number" min="0" step="0.1" value="3.2"></div>
          <div><label for="grossMargin" data-i18n="grossMargin">오버리지 총마진율 (%)</label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="78"></div>
          <div><label for="collectionRate" data-i18n="collectionRate">청구 수금율 (%)</label><input id="collectionRate" type="number" min="0" max="100" step="0.1" value="97"></div>
          <div><label for="supportCost" data-i18n="supportCost">계정당 월 지원비 (KRW)</label><input id="supportCost" type="number" min="0" value="1800"></div>
          <div><label for="meteringCostK" data-i18n="meteringCostK">1,000 단위당 미터링 비용 (KRW)</label><input id="meteringCostK" type="number" min="0" step="0.1" value="21"></div>
          <div><label for="programCost" data-i18n="programCost">월 프로그램 운영비 (KRW)</label><input id="programCost" type="number" min="0" value="1400000"></div>
          <div><label for="oneTime" data-i18n="oneTime">원타임 구축비 (KRW)</label><input id="oneTime" type="number" min="0" value="12000000"></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpi">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_overageUnits">월 오버리지 사용량</div><div id="overageUnits" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_netRevenue">월 순오버리지 매출</div><div id="netRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_totalCost">월 총비용</div><div id="totalCost" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet">월 순이익</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_breakEven">손익분기 오버리지</div><div id="breakEvenUnits" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detail">세부 지표</h2>
        <table><tbody>
          <tr><th data-i18n="d_billed">월 오버리지 청구액</th><td id="billedOverage">-</td></tr>
          <tr><th data-i18n="d_collected">월 수금 오버리지 매출</th><td id="collectedOverage">-</td></tr>
          <tr><th data-i18n="d_payback">회수기간</th><td id="payback">-</td></tr>
          <tr><th data-i18n="d_periodNet">기간 누적 순효과</th><td id="periodNet">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      accounts:$("accounts"),includedUnits:$("includedUnits"),avgUsage:$("avgUsage"),overagePrice:$("overagePrice"),grossMargin:$("grossMargin"),collectionRate:$("collectionRate"),supportCost:$("supportCost"),meteringCostK:$("meteringCostK"),programCost:$("programCost"),oneTime:$("oneTime"),months:$("months"),
      overageUnits:$("overageUnits"),netRevenue:$("netRevenue"),totalCost:$("totalCost"),monthlyNet:$("monthlyNet"),breakEvenUnits:$("breakEvenUnits"),roi:$("roi"),billedOverage:$("billedOverage"),collectedOverage:$("collectedOverage"),payback:$("payback"),periodNet:$("periodNet"),
      error:$("error"),summary:$("summary"),status:$("status"),copy:$("copy"),reset:$("reset"),lang:$("lang")
    };

    const defaults = {accounts:420,includedUnits:15000,avgUsage:19600,overagePrice:3.2,grossMargin:78,collectionRate:97,supportCost:1800,meteringCostK:21,programCost:1400000,oneTime:12000000,months:12};
    let lang = "ko";

    const i18n = {
      ko:{
        title:"📈 SaaS 오버리지 수익 계산기", subtitle:"사용량 기반 과금의 초과 사용 매출과 비용을 반영해 월 순이익, ROI, 손익분기 오버리지 사용량을 계산합니다.", back:"Back to Portal",
        inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpi:"핵심 KPI", waiting:"결과 계산 대기", detail:"세부 지표",
        accounts:"활성 계정 수", includedUnits:"계정당 포함 사용량", avgUsage:"계정당 평균 사용량", overagePrice:"오버리지 단가 (KRW/단위)", grossMargin:"오버리지 총마진율 (%)", collectionRate:"청구 수금율 (%)", supportCost:"계정당 월 지원비 (KRW)", meteringCostK:"1,000 단위당 미터링 비용 (KRW)", programCost:"월 프로그램 운영비 (KRW)", oneTime:"원타임 구축비 (KRW)", months:"분석 기간 (개월)",
        k_overageUnits:"월 오버리지 사용량", k_netRevenue:"월 순오버리지 매출", k_totalCost:"월 총비용", k_monthlyNet:"월 순이익", k_breakEven:"손익분기 오버리지", k_roi:"ROI",
        d_billed:"월 오버리지 청구액", d_collected:"월 수금 오버리지 매출", d_payback:"회수기간", d_periodNet:"기간 누적 순효과",
        errAccounts:"활성 계정 수는 1 이상이어야 합니다.", errUsage:"사용량/단가는 0 이상이어야 합니다.", errRate:"비율 값은 0~100 범위여야 합니다.", errCost:"비용/기간 값을 확인하세요.",
        statusGood:"오버리지 프로그램 수익성이 양수입니다", statusWarn:"현재 가정에서 월 순이익이 음수입니다", statusCheck:"입력값을 확인하세요",
        impossible:"달성 불가", monthsUnit:"개월", summaryTitle:"[SaaS 오버리지 수익 계산 요약]", copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다."
      },
      en:{
        title:"📈 SaaS Usage Overage Revenue Calculator", subtitle:"Estimate monthly overage economics, break-even usage units, payback, and ROI for usage-based pricing.", back:"Back to Portal",
        inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpi:"Key KPIs", waiting:"Waiting for calculation", detail:"Details",
        accounts:"Active accounts", includedUnits:"Included units per account", avgUsage:"Average usage per account", overagePrice:"Overage price (KRW/unit)", grossMargin:"Overage gross margin (%)", collectionRate:"Collection rate (%)", supportCost:"Support cost per account / month (KRW)", meteringCostK:"Metering cost per 1,000 units (KRW)", programCost:"Monthly program cost (KRW)", oneTime:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_overageUnits:"Monthly overage units", k_netRevenue:"Monthly net overage revenue", k_totalCost:"Monthly total cost", k_monthlyNet:"Monthly net profit", k_breakEven:"Break-even overage units", k_roi:"ROI",
        d_billed:"Monthly billed overage", d_collected:"Monthly collected overage", d_payback:"Payback period", d_periodNet:"Cumulative net impact",
        errAccounts:"Active accounts must be at least 1.", errUsage:"Usage and price inputs must be zero or above.", errRate:"Rate inputs must be between 0 and 100.", errCost:"Please review cost and period inputs.",
        statusGood:"Overage program is profitable", statusWarn:"Monthly net profit is negative with current assumptions", statusCheck:"Please review input values",
        impossible:"Not achievable", monthsUnit:"months", summaryTitle:"[SaaS Usage Overage Revenue Summary]", copied:"Summary copied.", copyFail:"Clipboard unavailable. Please copy manually."
      }
    };

    const t=(k)=>i18n[lang][k]??k;
    const locale=()=>lang==="ko"?"ko-KR":"en-US";
    const money=(n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang=lang;
      document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
      refs.lang.textContent=lang==='ko'?'EN':'KO';
    }

    function validate(v){
      if(!Number.isFinite(v.accounts)||v.accounts<1) return t('errAccounts');
      if([v.includedUnits,v.avgUsage,v.overagePrice].some(x=>!Number.isFinite(x)||x<0)) return t('errUsage');
      if([v.grossMargin,v.collectionRate].some(x=>!Number.isFinite(x)||x<0||x>100)) return t('errRate');
      if([v.supportCost,v.meteringCostK,v.programCost,v.oneTime].some(x=>!Number.isFinite(x)||x<0)||!Number.isFinite(v.months)||v.months<1) return t('errCost');
      return '';
    }

    function compute(v){
      const totalUsage = v.accounts*v.avgUsage;
      const totalIncluded = v.accounts*v.includedUnits;
      const overageUnits = Math.max(totalUsage-totalIncluded,0);
      const billedOverage = overageUnits*v.overagePrice;
      const collectedOverage = billedOverage*(v.collectionRate/100);
      const cogs = collectedOverage*(1-v.grossMargin/100);
      const support = v.accounts*v.supportCost;
      const metering = (totalUsage/1000)*v.meteringCostK;
      const totalCost = cogs+support+metering+v.programCost;
      const monthlyNet = collectedOverage-totalCost;

      const periodNet = monthlyNet*v.months-v.oneTime;
      const invested = totalCost*v.months+v.oneTime;
      const roi = invested===0 ? (periodNet>=0?Infinity:-Infinity) : (periodNet/invested)*100;

      const contributionPerUnit = v.overagePrice*(v.collectionRate/100)*(v.grossMargin/100);
      const fixedBreakEven = support+metering+v.programCost+(v.oneTime/v.months);
      const breakEvenUnits = contributionPerUnit>0 ? fixedBreakEven/contributionPerUnit : Infinity;
      const payback = monthlyNet>0 ? v.oneTime/monthlyNet : Infinity;

      return {overageUnits,billedOverage,collectedOverage,totalCost,monthlyNet,periodNet,roi,breakEvenUnits,payback};
    }

    function resetOutputs(){
      ['overageUnits','netRevenue','totalCost','monthlyNet','breakEvenUnits','roi','billedOverage','collectedOverage','payback','periodNet'].forEach(k=>refs[k].textContent='-');
      refs.summary.value='';
    }

    function render(){
      const v={
        accounts:Number(refs.accounts.value),includedUnits:Number(refs.includedUnits.value),avgUsage:Number(refs.avgUsage.value),overagePrice:Number(refs.overagePrice.value),grossMargin:Number(refs.grossMargin.value),collectionRate:Number(refs.collectionRate.value),supportCost:Number(refs.supportCost.value),meteringCostK:Number(refs.meteringCostK.value),programCost:Number(refs.programCost.value),oneTime:Number(refs.oneTime.value),months:Number(refs.months.value)
      };

      const err=validate(v);
      refs.error.classList.toggle('show',!!err);
      refs.error.textContent=err;
      if(err){
        refs.status.textContent=t('statusCheck');
        resetOutputs();
        return;
      }

      const r=compute(v);
      refs.overageUnits.textContent=num(r.overageUnits,0);
      refs.netRevenue.textContent=money(r.collectedOverage);
      refs.totalCost.textContent=money(r.totalCost);
      refs.monthlyNet.textContent=money(r.monthlyNet);
      refs.breakEvenUnits.textContent=Number.isFinite(r.breakEvenUnits)&&r.breakEvenUnits>=0?num(r.breakEvenUnits,0):t('impossible');
      refs.roi.textContent=Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞');

      refs.billedOverage.textContent=money(r.billedOverage);
      refs.collectedOverage.textContent=money(r.collectedOverage);
      refs.payback.textContent=Number.isFinite(r.payback)?`${num(r.payback,1)} ${t('monthsUnit')}`:t('impossible');
      refs.periodNet.textContent=money(r.periodNet);

      refs.status.innerHTML=r.monthlyNet>=0
        ? `<span class="ok">●</span> ${t('statusGood')}`
        : `<span class="warn">●</span> ${t('statusWarn')}`;

      refs.summary.value=[
        t('summaryTitle'),
        `${t('k_overageUnits')}: ${num(r.overageUnits,0)}`,
        `${t('d_billed')}: ${money(r.billedOverage)}`,
        `${t('d_collected')}: ${money(r.collectedOverage)}`,
        `${t('k_totalCost')}: ${money(r.totalCost)}`,
        `${t('k_monthlyNet')}: ${money(r.monthlyNet)}`,
        `${t('k_breakEven')}: ${Number.isFinite(r.breakEvenUnits)&&r.breakEvenUnits>=0?num(r.breakEvenUnits,0):t('impossible')}`,
        `${t('d_payback')}: ${Number.isFinite(r.payback)?`${num(r.payback,1)} ${t('monthsUnit')}`:t('impossible')}`,
        `${t('k_roi')}: ${Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞')}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if(!refs.summary.value.trim()) return;
      try{await navigator.clipboard.writeText(refs.summary.value);alert(t('copied'));}
      catch{alert(t('copyFail'));}
    });

    refs.reset.addEventListener('click',()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.accounts,refs.includedUnits,refs.avgUsage,refs.overagePrice,refs.grossMargin,refs.collectionRate,refs.supportCost,refs.meteringCostK,refs.programCost,refs.oneTime,refs.months].forEach(el=>{el.addEventListener('input',render);el.addEventListener('change',render);});
    refs.lang.addEventListener('click',()=>{lang=lang==='ko'?'en':'ko';applyI18n();render();});

    applyI18n();
    render();
  </script>
</body>
</html>
