<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사주팔자 + 토정비결 운세 | Eastsea Tools</title>
    <meta name="description" content="무료 사주팔자 및 토정비결 운세 서비스. 생년월일시 입력으로 정확한 사주 명식과 올해 운세를 확인하세요.">
    <meta name="keywords" content="사주, 사주팔자, 토정비결, 운세, 만세력, 무료운세, 사주보기">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #8B0000;
            --color-secondary: #FFD700;
            --color-dark: #1a0000;
            --color-light: #FFF8DC;
            --color-border: #8B0000;
            --shadow: 0 4px 20px rgba(139, 0, 0, 0.2);
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #330000 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--color-light);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--color-secondary);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--color-light);
            opacity: 0.9;
        }

        .card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 248, 220, 0.95));
            border: 3px solid var(--color-border);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            color: var(--color-dark);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--color-primary);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background: white;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--color-secondary);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            font-weight: normal;
        }

        .radio-label input {
            width: auto;
            margin-right: 8px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--color-primary), #660000);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(139, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result-section {
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .saju-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            box-shadow: var(--shadow);
        }

        .saju-table th, .saju-table td {
            border: 2px solid var(--color-border);
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
        }

        .saju-table th {
            background: linear-gradient(135deg, var(--color-primary), #660000);
            color: white;
            font-weight: 700;
        }

        .saju-table td {
            background: white;
            font-weight: 600;
            font-size: 1.3rem;
        }

        .element-chart {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .element-item {
            text-align: center;
            padding: 15px;
            background: white;
            border: 2px solid var(--color-border);
            border-radius: 10px;
            min-width: 80px;
        }

        .element-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .element-name {
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 5px;
        }

        .element-count {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-secondary);
        }

        .fortune-text {
            line-height: 1.8;
            padding: 20px;
            background: white;
            border-left: 4px solid var(--color-secondary);
            border-radius: 5px;
            margin: 20px 0;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 20px;
            background: white;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .tab.active {
            background: var(--color-primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: 2px solid var(--color-secondary);
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.3);
        }

        .warning {
            background: #fff3cd;
            border: 2px solid #856404;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #856404;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            .saju-table th, .saju-table td {
                padding: 10px;
                font-size: 0.9rem;
            }

            .element-chart {
                gap: 10px;
            }

            .element-item {
                min-width: 60px;
                padding: 10px;
            }

            .tabs {
                gap: 5px;
            }

            .tab {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <a href="../" class="back-btn">← 도구 목록으로</a>

        <div class="header">
            <h1>🔮 사주팔자 + 토정비결</h1>
            <p class="subtitle">생년월일시 입력으로 사주 명식과 운세를 확인하세요</p>
        </div>

        <div class="card" id="input-section">
            <form id="saju-form">
                <div class="form-group">
                    <label>생년월일</label>
                    <input type="date" id="birth-date" required max="2026-12-31" min="1900-01-01">
                </div>

                <div class="form-group">
                    <label>음력/양력</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="calendar" value="solar" checked>
                            양력
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="calendar" value="lunar">
                            음력
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>태어난 시간 (시주 계산용)</label>
                    <select id="birth-hour" required>
                        <option value="">시간 선택</option>
                        <option value="0">자시 (子時) 23:30~01:29</option>
                        <option value="1">축시 (丑時) 01:30~03:29</option>
                        <option value="2">인시 (寅時) 03:30~05:29</option>
                        <option value="3">묘시 (卯時) 05:30~07:29</option>
                        <option value="4">진시 (辰時) 07:30~09:29</option>
                        <option value="5">사시 (巳時) 09:30~11:29</option>
                        <option value="6">오시 (午時) 11:30~13:29</option>
                        <option value="7">미시 (未時) 13:30~15:29</option>
                        <option value="8">신시 (申時) 15:30~17:29</option>
                        <option value="9">유시 (酉時) 17:30~19:29</option>
                        <option value="10">술시 (戌時) 19:30~21:29</option>
                        <option value="11">해시 (亥時) 21:30~23:29</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="M" checked>
                            남성
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="F">
                            여성
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn">사주 보기 🔮</button>
            </form>

            <div class="warning">
                ⚠️ 참고용 서비스입니다. 실제 의사결정에 전적으로 의존하지 마세요. 음력 변환 및 절기 보정은 근사치입니다.
            </div>
        </div>

        <div class="result-section" id="result-section">
            <div class="card">
                <h2 style="text-align: center; color: var(--color-primary); margin-bottom: 30px;">📜 사주 명식</h2>
                
                <table class="saju-table">
                    <thead>
                        <tr>
                            <th>년주 (年柱)</th>
                            <th>월주 (月柱)</th>
                            <th>일주 (日柱)</th>
                            <th>시주 (時柱)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="year-gan-ji">甲子</td>
                            <td id="month-gan-ji">丙寅</td>
                            <td id="day-gan-ji">戊辰</td>
                            <td id="hour-gan-ji">庚午</td>
                        </tr>
                    </tbody>
                </table>

                <h3 style="text-align: center; color: var(--color-primary); margin: 30px 0 20px;">🌟 오행 분포</h3>
                <div class="element-chart">
                    <div class="element-item">
                        <div class="element-icon">🌳</div>
                        <div class="element-name">木 (목)</div>
                        <div class="element-count" id="wood-count">0</div>
                    </div>
                    <div class="element-item">
                        <div class="element-icon">🔥</div>
                        <div class="element-name">火 (화)</div>
                        <div class="element-count" id="fire-count">0</div>
                    </div>
                    <div class="element-item">
                        <div class="element-icon">🏔️</div>
                        <div class="element-name">土 (토)</div>
                        <div class="element-count" id="earth-count">0</div>
                    </div>
                    <div class="element-item">
                        <div class="element-icon">⚔️</div>
                        <div class="element-name">金 (금)</div>
                        <div class="element-count" id="metal-count">0</div>
                    </div>
                    <div class="element-item">
                        <div class="element-icon">💧</div>
                        <div class="element-name">水 (수)</div>
                        <div class="element-count" id="water-count">0</div>
                    </div>
                </div>

                <h3 style="color: var(--color-primary); margin: 30px 0 15px;">📖 일주론 (성격 특성)</h3>
                <div class="fortune-text" id="day-analysis"></div>

                <h3 style="color: var(--color-primary); margin: 30px 0 15px;">🔮 토정비결 (2026년 운세)</h3>
                
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('overview')">총론</div>
                    <div class="tab" onclick="switchTab('monthly')">월별 운세</div>
                </div>

                <div class="tab-content active" id="overview-content">
                    <div class="fortune-text" id="fortune-overview"></div>
                </div>

                <div class="tab-content" id="monthly-content">
                    <div id="monthly-fortune"></div>
                </div>

                <button class="btn" onclick="resetForm()" style="margin-top: 30px;">다시 보기</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 천간지지 데이터 =====
        const HEAVENLY_STEMS = ['갑(甲)', '을(乙)', '병(丙)', '정(丁)', '무(戊)', '기(己)', '경(庚)', '신(辛)', '임(壬)', '계(癸)'];
        const EARTHLY_BRANCHES = ['자(子)', '축(丑)', '인(寅)', '묘(卯)', '진(辰)', '사(巳)', '오(午)', '미(未)', '신(申)', '유(酉)', '술(戌)', '해(亥)'];

        const DAY_PILLAR_ANALYSIS = {
            '갑자': '지혜롭고 창의적이나 때로 고집이 셉니다. 물의 유연함과 나무의 성장성을 함께 가진 타입입니다.',

            },
            { // 12월
                overview: '한 해를 마무리하며 감사하는 마음으로 마음을 정리하세요.',
                monthly: '새해 준비를 차근차근 하시고, 무리한 투자나 큰 결정은 피하세요. 가족의 건강을 챙기세요.'
            }
        ];

        // ===== 메인 로직 =====
        document.getElementById('saju-form').addEventListener('submit', function(e) {
            e.preventDefault();
            calculateSaju();
        });

        function calculateSaju() {
            const birthDate = document.getElementById('birth-date').value;
            const birthHour = parseInt(document.getElementById('birth-hour').value);
            const calendar = document.querySelector('input[name="calendar"]:checked').value;
            const gender = document.querySelector('input[name="gender"]:checked').value;

            if (!birthDate || birthHour === '') {
                alert('생년월일과 시간을 모두 입력해주세요.');
                return;
            }

            const date = new Date(birthDate);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();

            // 간단한 갑자 계산 (실제로는 절기 보정 필요)
            const yearGanJi = getYearGanJi(year);
            const monthGanJi = getMonthGanJi(year, month);
            const dayGanJi = getDayGanJi(year, month, day);
            const hourGanJi = getHourGanJi(dayGanJi, birthHour);

            // 결과 표시
            document.getElementById('year-gan-ji').textContent = yearGanJi;
            document.getElementById('month-gan-ji').textContent = monthGanJi;
            document.getElementById('day-gan-ji').textContent = dayGanJi;
            document.getElementById('hour-gan-ji').textContent = hourGanJi;

            // 오행 분석
            analyzeElements([yearGanJi, monthGanJi, dayGanJi, hourGanJi]);

            // 일주론 해석
            const dayKey = dayGanJi.substring(0, 2);
            const analysis = DAY_PILLAR_ANALYSIS[dayKey] || DAY_PILLAR_ANALYSIS['default'];
            document.getElementById('day-analysis').textContent = analysis;

            // 토정비결 (간단한 해시 기반)
            const fortuneIndex = (year + month + day) % 12;
            const fortune = TOJEONG_FORTUNES[fortuneIndex];
            document.getElementById('fortune-overview').textContent = fortune.overview;

            // 월별 운세
            let monthlyHTML = '';
            TOJEONG_FORTUNES.forEach((f, i) => {
                monthlyHTML += `
                    <div class="fortune-text">
                        <strong style="color: var(--color-primary);">${i + 1}월:</strong> ${f.monthly}
                    </div>
                `;
            });
            document.getElementById('monthly-fortune').innerHTML = monthlyHTML;

            // 결과 화면 표시
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('result-section').classList.add('show');
            window.scrollTo(0, 0);
        }

        function getYearGanJi(year) {
            // 1984년이 갑자년 (60갑자 시작)
            const baseYear = 1984;
            const offset = (year - baseYear) % 60;
            const ganIndex = offset % 10;
            const jiIndex = offset % 12;
            return HEAVENLY_STEMS[ganIndex] + EARTHLY_BRANCHES[jiIndex];
        }

        function getMonthGanJi(year, month) {
            // 간단한 월주 계산 (실제로는 절기 기준)
            const ganIndex = ((year - 1984) * 12 + month - 1) % 10;
            const jiIndex = (month + 1) % 12;
            return HEAVENLY_STEMS[ganIndex] + EARTHLY_BRANCHES[jiIndex];
        }

        function getDayGanJi(year, month, day) {
            // 1900년 1월 1일 기준 일진 계산 (근사치)
            const baseDate = new Date(1900, 0, 1);
            const targetDate = new Date(year, month - 1, day);
            const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
            const ganIndex = (diffDays + 6) % 10;
            const jiIndex = (diffDays + 6) % 12;
            return HEAVENLY_STEMS[ganIndex] + EARTHLY_BRANCHES[jiIndex];
        }

        function getHourGanJi(dayGanJi, hourIndex) {
            // 일간 기준 시간 천간 계산
            const dayGan = dayGanJi.substring(0, 3);
            const dayGanIndex = HEAVENLY_STEMS.indexOf(dayGan);
            
            // 시간 천간 공식
            let hourGanIndex;
            if (dayGanIndex === 0 || dayGanIndex === 5) { // 갑, 기일
                hourGanIndex = hourIndex % 10;
            } else if (dayGanIndex === 1 || dayGanIndex === 6) { // 을, 경일
                hourGanIndex = (hourIndex + 2) % 10;
            } else if (dayGanIndex === 2 || dayGanIndex === 7) { // 병, 신일
                hourGanIndex = (hourIndex + 4) % 10;
            } else if (dayGanIndex === 3 || dayGanIndex === 8) { // 정, 임일
                hourGanIndex = (hourIndex + 6) % 10;
            } else { // 무, 계일
                hourGanIndex = (hourIndex + 8) % 10;
            }

            return HEAVENLY_STEMS[hourGanIndex] + HOUR_BRANCHES[hourIndex];
        }

        function analyzeElements(ganji) {
            const elements = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
            
            ganji.forEach(gj => {
                for (let key in ELEMENT_MAP) {
                    if (gj.includes(key)) {
                        elements[ELEMENT_MAP[key]]++;
                    }
                }
            });

            document.getElementById('wood-count').textContent = elements['木'];
            document.getElementById('fire-count').textContent = elements['火'];
            document.getElementById('earth-count').textContent = elements['土'];
            document.getElementById('metal-count').textContent = elements['金'];
            document.getElementById('water-count').textContent = elements['水'];
        }

        function switchTab(tab) {
            // 탭 버튼 active 전환
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // 컨텐츠 전환
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab + '-content').classList.add('active');
        }

        function resetForm() {
            document.getElementById('input-section').style.display = 'block';
            document.getElementById('result-section').classList.remove('show');
            window.scrollTo(0, 0);
        }

        // 날짜 입력 기본값 설정 (오늘 날짜)
        const today = new Date();
        const defaultDate = today.toISOString().split('T')[0];
        document.getElementById('birth-date').value = defaultDate;
    </script>
</body>
