<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연봉·월급·시급 변환기 | Salary to Hourly Converter</title>
  <meta name="description" content="연봉, 월급, 시급을 세전/세후 기준으로 빠르게 변환하고 국가별 세율 프리셋과 근무시간 설정까지 한 번에 계산하세요." />
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2e;
      --panel-2: #16233d;
      --line: #2a3b5d;
      --text: #eaf1ff;
      --muted: #9fb1d1;
      --accent: #60a5fa;
      --accent-2: #22d3ee;
      --good: #34d399;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1a2950 0%, #0b1220 45%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 20px 14px 36px; }
    .top { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.8vw, 1.9rem); }
    .sub { margin: 6px 0 0; color: var(--muted); font-size: 0.92rem; line-height: 1.45; }
    .back {
      text-decoration: none;
      color: #cde0ff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 11px;
      font-weight: 700;
      font-size: 0.84rem;
      background: #132446;
    }
    .grid { display: grid; gap: 12px; grid-template-columns: 1.05fr 1fr; }
    .card {
      background: linear-gradient(160deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }
    h2 { margin: 0 0 10px; font-size: 1rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0e1830;
      color: var(--text);
      font-size: 0.95rem;
    }
    input:focus, select:focus { outline: 2px solid rgba(96, 165, 250, 0.3); border-color: #76b2ff; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .one { margin-bottom: 8px; }
    .small { color: var(--muted); font-size: 0.78rem; margin-top: 6px; line-height: 1.4; }
    .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .kpi { background: #0f1a30; border: 1px solid #284061; border-radius: 12px; padding: 10px; }
    .k { font-size: 0.76rem; color: var(--muted); }
    .v { margin-top: 4px; font-size: 1.1rem; font-weight: 800; }
    .table-wrap { margin-top: 10px; border: 1px solid var(--line); border-radius: 12px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 560px; }
    th, td { border-bottom: 1px solid #223655; padding: 9px; font-size: 0.84rem; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
    th { background: #132648; color: #b9cbee; font-size: 0.78rem; }
    .note {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #2f4669;
      border-radius: 10px;
      background: #0e1830;
      font-size: 0.88rem;
      line-height: 1.45;
      color: #d4e3ff;
    }
    .accent { color: var(--good); font-weight: 700; }
    .warning { color: var(--warn); font-weight: 700; }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: 1fr; }
      .two { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>💼 연봉·월급·시급 변환기</h1>
        <p class="sub">세전/세후 기준, 국가별 세율 프리셋, 근무일/시간 커스텀으로 실수령 기준 시급을 즉시 확인하세요.</p>
      </div>
      <a class="back" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력 설정</h2>
        <div class="one">
          <label for="inputType">기준 금액 종류</label>
          <select id="inputType">
            <option value="annual">연봉 기준 (원/년)</option>
            <option value="monthly">월급 기준 (원/월)</option>
            <option value="hourly">시급 기준 (원/시간)</option>
          </select>
        </div>
        <div class="one">
          <label for="amount">기준 금액</label>
          <input id="amount" type="number" min="0" step="1000" value="42000000" />
        </div>
        <div class="two">
          <div>
            <label for="basis">입력 금액 기준</label>
            <select id="basis">
              <option value="gross">세전 (Gross)</option>
              <option value="net">세후 (Net)</option>
            </select>
          </div>
          <div>
            <label for="country">국가별 세율 프리셋</label>
            <select id="country">
              <option value="kr">대한민국 (예시 22%)</option>
              <option value="us">미국 (예시 24%)</option>
              <option value="jp">일본 (예시 20%)</option>
              <option value="de">독일 (예시 28%)</option>
              <option value="custom">직접 입력</option>
            </select>
          </div>
          <div>
            <label for="taxRate">예상 세율 (%)</label>
            <input id="taxRate" type="number" min="0" max="70" step="0.1" value="22" />
          </div>
          <div>
            <label for="weeks">연간 근무 주수</label>
            <input id="weeks" type="number" min="1" max="53" step="0.5" value="52" />
          </div>
          <div>
            <label for="daysPerWeek">주당 근무일수</label>
            <input id="daysPerWeek" type="number" min="1" max="7" step="0.5" value="5" />
          </div>
          <div>
            <label for="hoursPerDay">일 근무시간</label>
            <input id="hoursPerDay" type="number" min="1" max="24" step="0.5" value="8" />
          </div>
        </div>
        <p class="small">※ 세율은 단순 추정값입니다. 실제 실수령액은 공제 항목(4대보험, 비과세, 부양가족 등)에 따라 달라질 수 있습니다.</p>
      </article>

      <article class="card">
        <h2>변환 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">연간 총 근무시간</div><div id="workHours" class="v">-</div></div>
          <div class="kpi"><div class="k">실효 세율</div><div id="effectiveTax" class="v">-</div></div>
          <div class="kpi"><div class="k">세전 시급</div><div id="grossHourly" class="v">-</div></div>
          <div class="kpi"><div class="k">세후 시급</div><div id="netHourly" class="v">-</div></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>구분</th>
                <th>연간</th>
                <th>월간</th>
                <th>시간당</th>
              </tr>
            </thead>
            <tbody id="resultRows"></tbody>
          </table>
        </div>
        <div id="summary" class="note">값을 입력하면 결과가 자동 계산됩니다.</div>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const presets = { kr: 22, us: 24, jp: 20, de: 28 };

    const fmtWon = (n) => `₩${Math.round(Number.isFinite(n) ? n : 0).toLocaleString('ko-KR')}`;
    const fmtHour = (n) => `${Math.round(Number.isFinite(n) ? n : 0).toLocaleString('ko-KR')}시간`;

    function setPresetTax() {
      const country = $('country').value;
      if (country !== 'custom') {
        $('taxRate').value = presets[country];
      }
      update();
    }

    function normalizeIncome(type, amount, annualHours) {
      if (type === 'annual') return amount;
      if (type === 'monthly') return amount * 12;
      return amount * annualHours;
    }

    function update() {
      const inputType = $('inputType').value;
      const amount = Number($('amount').value);
      const basis = $('basis').value;
      const taxRate = Math.max(0, Math.min(70, Number($('taxRate').value))) / 100;
      const weeks = Math.max(1, Number($('weeks').value));
      const daysPerWeek = Math.max(1, Number($('daysPerWeek').value));
      const hoursPerDay = Math.max(1, Number($('hoursPerDay').value));

      const annualHours = weeks * daysPerWeek * hoursPerDay;
      $('workHours').textContent = fmtHour(annualHours);
      $('effectiveTax').textContent = `${(taxRate * 100).toFixed(1)}%`;

      if (!(amount >= 0) || !(annualHours > 0)) {
        $('summary').innerHTML = '<span class="warning">입력값을 확인해 주세요.</span> 금액과 근무시간은 0보다 커야 합니다.';
        $('resultRows').innerHTML = '';
        $('grossHourly').textContent = '-';
        $('netHourly').textContent = '-';
        return;
      }

      let grossAnnual;
      if (basis === 'gross') {
        grossAnnual = normalizeIncome(inputType, amount, annualHours);
      } else {
        const netAnnual = normalizeIncome(inputType, amount, annualHours);
        grossAnnual = taxRate < 1 ? netAnnual / (1 - taxRate) : 0;
      }

      const grossMonthly = grossAnnual / 12;
      const grossHourly = grossAnnual / annualHours;

      const netAnnual = grossAnnual * (1 - taxRate);
      const netMonthly = netAnnual / 12;
      const netHourly = netAnnual / annualHours;

      $('grossHourly').textContent = fmtWon(grossHourly);
      $('netHourly').textContent = fmtWon(netHourly);

      const rows = [
        ['세전 (Gross)', fmtWon(grossAnnual), fmtWon(grossMonthly), fmtWon(grossHourly)],
        ['세후 (Net)', fmtWon(netAnnual), fmtWon(netMonthly), fmtWon(netHourly)]
      ];
      $('resultRows').innerHTML = rows
        .map((r) => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`)
        .join('');

      const diff = grossHourly - netHourly;
      $('summary').innerHTML = `
        현재 설정 기준으로 실수령 시급은 <span class="accent">${fmtWon(netHourly)}</span> 입니다.
        세금·공제 반영으로 시간당 약 <span class="warning">${fmtWon(diff)}</span> 차이가 납니다.
      `;
    }

    ['inputType', 'amount', 'basis', 'taxRate', 'weeks', 'daysPerWeek', 'hoursPerDay']
      .forEach((id) => $(id).addEventListener('input', update));

    $('country').addEventListener('change', setPresetTax);

    update();
  </script>
</body>
</html>
