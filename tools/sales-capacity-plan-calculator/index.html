<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Capacity Plan Calculator | 영업 수용량 계획 계산기</title>
  <meta name="description" content="매출 목표 달성을 위한 AE 필요 인원, 파이프라인 커버리지, 채용 갭을 계산하는 B2B 세일즈 계획 도구입니다." />
  <style>
    :root{--bg:#0f172a;--card:#1e293b;--line:#334155;--txt:#f1f5f9;--muted:#94a3b8;--pri:#8b5cf6;--pri2:#6366f1;--good:#4ade80;--warn:#facc15;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
    .head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:12px}
    h1{margin:0;font-size:clamp(1.2rem,4vw,1.8rem);background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{margin:6px 0 0;color:var(--muted);font-size:.9rem}
    .home{text-decoration:none;color:var(--txt);background:var(--card);border:1px solid var(--line);padding:8px 14px;border-radius:10px;font-size:.85rem;font-weight:600;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
    h2{margin:0 0 16px;font-size:1.1rem;color:var(--txt)}
    .inputs{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
    .inp-g{margin-bottom:4px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px}
    input{width:100%;background:#0f172a;border:1px solid var(--line);color:var(--txt);padding:10px;border-radius:8px;font-size:.95rem}
    input:focus{outline:2px solid var(--pri);border-color:transparent}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
    button{cursor:pointer;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;color:#fff;padding:12px;border-radius:8px;font-weight:700;font-size:.95rem}
    button.sec{background:#334155;color:var(--txt)}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .kpi{background:#0f172a;border:1px solid var(--line);border-radius:10px;padding:14px}
    .k-lbl{font-size:.8rem;color:var(--muted);margin-bottom:4px}
    .k-val{font-size:1.25rem;font-weight:800}
    .err{color:var(--bad);font-size:.9rem;background:rgba(248,113,113,0.1);padding:10px;border-radius:8px;border:1px solid var(--bad);margin-top:12px;display:none}
    textarea{width:100%;height:100px;margin-top:16px;background:#0f172a;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:10px;font-size:.85rem;resize:none}
    .stat{margin-top:16px;padding:12px;border-radius:8px;background:#0f172a;border:1px solid var(--line);font-size:.9rem}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    @media(max-width:768px){.grid{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>Sales Capacity Plan Calculator</h1>
        <p class="sub">영업 목표와 인력 현황을 기반으로 달성 가능성을 시뮬레이션하고 채용 필요 인원을 도출합니다.</p>
      </div>
      <a href="/" class="home">Back to Portal</a>
    </div>

    <div class="grid">
      <section class="card">
        <h2>📊 Plan Inputs</h2>
        <div class="inputs">
          <div class="inp-g">
            <label>연간 매출 목표 (Target Booking)</label>
            <input type="number" id="targetRevenue" value="1200000000" min="0" step="1000000">
          </div>
          <div class="inp-g">
            <label>평균 계약 규모 (ACV/Deal Size)</label>
            <input type="number" id="avgDealSize" value="30000000" min="0" step="100000">
          </div>
          <div class="inp-g">
            <label>영업 기회 수주율 (Win Rate %)</label>
            <input type="number" id="winRate" value="25" min="0" max="100" step="0.1">
          </div>
          <div class="inp-g">
            <label>목표 파이프라인 커버리지 (배수)</label>
            <input type="number" id="pipelineCoverage" value="4.0" min="1" step="0.1">
          </div>
          <div class="inp-g">
            <label>총 AE 인원 (Total Headcount)</label>
            <input type="number" id="totalReps" value="6" min="1">
          </div>
          <div class="inp-g">
            <label>온보딩 중인 AE (Ramping Reps)</label>
            <input type="number" id="rampingReps" value="2" min="0">
          </div>
          <div class="inp-g">
            <label>온보딩 AE 생산성 (Ramping %)</label>
            <input type="number" id="rampingProductivity" value="50" min="0" max="100">
          </div>
          <div class="inp-g">
            <label>현재 보유 파이프라인 (Current Pipe)</label>
            <input type="number" id="currentPipeline" value="3500000000" min="0" step="1000000">
          </div>
        </div>
        
        <div id="errorMsg" class="err"></div>

        <div class="btns">
          <button type="button" id="copyBtn" class="sec">요약 복사</button>
          <button type="button" id="resetBtn">초기화</button>
        </div>

        <textarea id="summaryArea" readonly></textarea>
      </section>

      <section class="card">
        <h2>📈 Capacity & Gap Analysis</h2>
        <div class="kpis">
          <div class="kpi">
            <div class="k-lbl">유효 영업 인력 (FTE)</div>
            <div class="k-val" id="fteCount">-</div>
          </div>
          <div class="kpi">
            <div class="k-lbl">필요 수주 건수</div>
            <div class="k-val" id="dealsWon">-</div>
          </div>
          <div class="kpi">
            <div class="k-lbl">필요 파이프라인</div>
            <div class="k-val" id="reqPipeline">-</div>
          </div>
          <div class="kpi">
            <div class="k-lbl">현재 커버리지 비율</div>
            <div class="k-val" id="currCoverage">-</div>
          </div>
          <div class="kpi">
            <div class="k-lbl">인당 목표 할당액 (Quota)</div>
            <div class="k-val" id="quotaPerFte">-</div>
          </div>
          <div class="kpi">
            <div class="k-lbl">예상 달성률 (Forecast)</div>
            <div class="k-val" id="forecastAttainment">-</div>
          </div>
        </div>

        <div class="stat" id="statusBox">
          계산 결과가 여기에 표시됩니다.
        </div>
      </section>
    </div>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const fmt = n => n?.toLocaleString('ko-KR');
    const money = n => '₩' + fmt(Math.round(n));

    const els = {
      targetRevenue: $('targetRevenue'),
      avgDealSize: $('avgDealSize'),
      winRate: $('winRate'),
      pipelineCoverage: $('pipelineCoverage'),
      totalReps: $('totalReps'),
      rampingReps: $('rampingReps'),
      rampingProductivity: $('rampingProductivity'),
      currentPipeline: $('currentPipeline'),
      errorMsg: $('errorMsg'),
      summaryArea: $('summaryArea'),
      statusBox: $('statusBox'),
      copyBtn: $('copyBtn'),
      resetBtn: $('resetBtn')
    };

    const outputs = {
      fteCount: $('fteCount'),
      dealsWon: $('dealsWon'),
      reqPipeline: $('reqPipeline'),
      currCoverage: $('currCoverage'),
      quotaPerFte: $('quotaPerFte'),
      forecastAttainment: $('forecastAttainment')
    };

    function calc() {
      els.errorMsg.style.display = 'none';
      
      // Get values
      const target = Number(els.targetRevenue.value);
      const acv = Number(els.avgDealSize.value);
      const winRate = Number(els.winRate.value);
      const targetCov = Number(els.pipelineCoverage.value);
      const totalReps = Number(els.totalReps.value);
      const rampingReps = Number(els.rampingReps.value);
      const rampProd = Number(els.rampingProductivity.value);
      const currPipe = Number(els.currentPipeline.value);

      // Validation
      if (rampingReps > totalReps) {
        els.errorMsg.textContent = '온보딩 인원은 총 인원보다 클 수 없습니다.';
        els.errorMsg.style.display = 'block';
        return;
      }
      if (target <= 0 || acv <= 0 || winRate <= 0) {
        return; // Silent fail for incomplete input
      }

      // Calculations
      const fullyRampedReps = totalReps - rampingReps;
      const fte = fullyRampedReps + (rampingReps * (rampProd / 100));
      
      const dealsNeeded = Math.ceil(target / acv);
      const reqPipe = target / (winRate / 100); // Or dealsNeeded * acv * (1/winRate) ? simpler: target / winRate%
      
      // Alternative reqPipe based on coverage target input? 
      // Usually Required Pipeline = Target * Coverage Ratio OR Target / Win Rate.
      // If user inputs Coverage Ratio, we usually trust that or compare.
      // Let's use Target / WinRate as "Mathematically Required" and compare with Target * Coverage Input.
      // Actually, Coverage Ratio is typically 1/WinRate. If WinRate is 25%, Coverage needed is 4x.
      // Let's calculate Required Pipeline based on Win Rate (Real requirement).
      
      const mathReqPipe = target / (winRate / 100);
      const targetBasedReqPipe = target * targetCov; // Based on user's policy
      
      // We will show the Math based requirement for hitting target at given Win Rate
      const finalReqPipe = mathReqPipe;

      const currCovRatio = target > 0 ? currPipe / target : 0;
      const quotaPerFte = fte > 0 ? target / fte : 0;
      
      // Forecast: Current Pipe * Win Rate + (Capacity?? No, forecast based on pipe usually)
      // Or Capacity based forecast: FTE * Quota? No that's circular.
      // Let's do Forecast = Current Pipeline * Win Rate
      const forecastRevenue = currPipe * (winRate / 100);
      const attainment = target > 0 ? (forecastRevenue / target) * 100 : 0;

      // Outputs
      outputs.fteCount.textContent = fte.toFixed(1);
      outputs.dealsWon.textContent = fmt(dealsNeeded) + '건';
      outputs.reqPipeline.textContent = money(finalReqPipe);
      outputs.currCoverage.textContent = currCovRatio.toFixed(1) + 'x';
      outputs.quotaPerFte.textContent = money(quotaPerFte);
      outputs.forecastAttainment.textContent = attainment.toFixed(1) + '%';

      // Status
      const pipeGap = finalReqPipe - currPipe;
      let statusHtml = '';
      if (pipeGap > 0) {
        statusHtml += `<div class="bad">⚠️ 파이프라인 부족: ${money(pipeGap)} 추가 발굴 필요</div>`;
      } else {
        statusHtml += `<div class="good">✅ 파이프라인 충분: 목표 대비 초과 확보 중</div>`;
      }
      
      if (attainment < 80) {
        statusHtml += `<div class="warn" style="margin-top:4px">📉 예상 달성률 저조 (${attainment.toFixed(1)}%). 파이프라인 확충 또는 승률 개선 시급.</div>`;
      }

      els.statusBox.innerHTML = statusHtml || '계산 완료';

      // Summary
      const summaryText = `[Sales Capacity Plan 요약]
- 목표 매출: ${money(target)}
- 유효 인력(FTE): ${fte.toFixed(1)}명 (총 ${totalReps}명 중 온보딩 ${rampingReps}명)
- 필요 파이프라인: ${money(finalReqPipe)} (승률 ${winRate}% 기준)
- 현재 파이프라인: ${money(currPipe)} (${currCovRatio.toFixed(1)}x 커버리지)
- 예상 달성률: ${attainment.toFixed(1)}% (${money(forecastRevenue)})
- 인당 할당 목표: ${money(quotaPerFte)}`;
      
      els.summaryArea.value = summaryText;
    }

    els.copyBtn.addEventListener('click', () => {
      if(!els.summaryArea.value) return;
      navigator.clipboard.writeText(els.summaryArea.value).then(() => {
        alert('요약이 복사되었습니다.');
      });
    });

    els.resetBtn.addEventListener('click', () => {
      location.reload();
    });

    // Event Listeners
    Object.values(els).forEach(el => {
      if(el.tagName === 'INPUT') {
        el.addEventListener('input', calc);
      }
    });

    // Init
    calc();

  </script>
</body>
</html>
