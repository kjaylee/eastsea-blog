<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Commission Accelerator Calculator | 영업 커미션 가속 구간 계산기</title>
  <meta name="description" content="쿼터 달성률, 가속 커미션, 지급 캡, 마진을 반영해 커미션 플랜의 수익성과 손익분기 매출을 계산하는 도구" />
  <style>
    :root{--bg:#081426;--card:#102542;--line:#2c4f7f;--txt:#edf3ff;--muted:#a9c1e2;--pri:#7aa2ff;--soft:#173861;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errBg:rgba(248,113,113,.14)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 15% 0%,#234e85 0%,#081426 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.8rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.93rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#16345e,#102542);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1c36;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#648af5);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:106px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>💸 영업 커미션 가속 구간 계산기</h1>
        <div class="sub">기본/가속 구간 커미션, 지급 캡, SPIFF를 함께 반영해 플랜이 실제로 마진을 지키는지 점검합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="teamSize">팀 인원 (명)</label><input id="teamSize" type="number" min="1" value="14" /></div>
          <div><label for="quota">Rep당 쿼터 (KRW/기간)</label><input id="quota" type="number" min="1" value="160000000" /></div>
          <div><label for="bookings">Rep당 실제 매출 (KRW/기간)</label><input id="bookings" type="number" min="0" value="198000000" /></div>
          <div><label for="baseRate">기본 커미션율 (%)</label><input id="baseRate" type="number" min="0" max="100" step="0.1" value="6" /></div>
          <div><label for="threshold">가속 시작 임계치 (% of quota)</label><input id="threshold" type="number" min="50" max="200" step="0.1" value="100" /></div>
          <div><label for="acceleratorRate">가속 커미션율 (%)</label><input id="acceleratorRate" type="number" min="0" max="100" step="0.1" value="11" /></div>
          <div><label for="cap">지급 산정 캡 (% of quota)</label><input id="cap" type="number" min="50" max="400" step="0.1" value="160" /></div>
          <div><label for="marginRate">매출총이익률 (%)</label><input id="marginRate" type="number" min="0" max="100" step="0.1" value="68" /></div>
          <div><label for="spiff">기간당 SPIFF 풀 (KRW)</label><input id="spiff" type="number" min="0" value="22000000" /></div>
          <div><label for="periods">분석 기간 수 (개)</label><input id="periods" type="number" min="1" max="24" value="4" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">쿼터 달성률</div><div id="attainment" class="v">-</div></div>
          <div class="kpi"><div class="k">총 커미션 지급액</div><div id="totalCommission" class="v">-</div></div>
          <div class="kpi"><div class="k">Blended 커미션율</div><div id="blendedRate" class="v sm">-</div></div>
          <div class="kpi"><div class="k">커미션 차감 후 총이익</div><div id="grossProfitAfter" class="v sm">-</div></div>
          <div class="kpi"><div class="k">커미션/총이익 비중</div><div id="commissionToGp" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 Rep 매출</div><div id="breakEvenRepBookings" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>지급 산정 매출(캡 적용)</th><td id="eligibleBookings">-</td></tr>
            <tr><th>기본 구간 지급액</th><td id="baseCommission">-</td></tr>
            <tr><th>가속 구간 지급액</th><td id="acceleratorCommission">-</td></tr>
            <tr><th>커미션 차감 전 총이익</th><td id="grossProfitBefore">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      teamSize: $("teamSize"), quota: $("quota"), bookings: $("bookings"), baseRate: $("baseRate"), threshold: $("threshold"), acceleratorRate: $("acceleratorRate"), cap: $("cap"), marginRate: $("marginRate"), spiff: $("spiff"), periods: $("periods"),
      attainment: $("attainment"), totalCommission: $("totalCommission"), blendedRate: $("blendedRate"), grossProfitAfter: $("grossProfitAfter"), commissionToGp: $("commissionToGp"), breakEvenRepBookings: $("breakEvenRepBookings"),
      eligibleBookings: $("eligibleBookings"), baseCommission: $("baseCommission"), acceleratorCommission: $("acceleratorCommission"), grossProfitBefore: $("grossProfitBefore"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = { teamSize: 14, quota: 160000000, bookings: 198000000, baseRate: 6, threshold: 100, acceleratorRate: 11, cap: 160, marginRate: 68, spiff: 22000000, periods: 4 };
    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v) {
      if (!Number.isFinite(v.teamSize) || v.teamSize < 1) return "팀 인원은 1명 이상이어야 합니다.";
      if (!Number.isFinite(v.quota) || v.quota <= 0) return "Rep당 쿼터는 0보다 커야 합니다.";
      if (!Number.isFinite(v.bookings) || v.bookings < 0) return "Rep당 실제 매출은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.baseRate) || v.baseRate < 0 || v.baseRate > 100) return "기본 커미션율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.threshold) || v.threshold < 50 || v.threshold > 200) return "가속 시작 임계치는 50~200% 범위여야 합니다.";
      if (!Number.isFinite(v.acceleratorRate) || v.acceleratorRate < 0 || v.acceleratorRate > 100) return "가속 커미션율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.cap) || v.cap < v.threshold || v.cap > 400) return "지급 산정 캡은 임계치 이상, 400% 이하여야 합니다.";
      if (!Number.isFinite(v.marginRate) || v.marginRate < 0 || v.marginRate > 100) return "매출총이익률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.spiff) || v.spiff < 0) return "SPIFF 풀은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.periods) || v.periods < 1 || v.periods > 24) return "분석 기간 수는 1~24 범위여야 합니다.";
      return "";
    }

    function commissionPerRep(v, repBookings) {
      const base = v.baseRate / 100;
      const acc = v.acceleratorRate / 100;
      const thresholdAmount = v.quota * (v.threshold / 100);
      const capAmount = v.quota * (v.cap / 100);
      const eligible = Math.min(repBookings, capAmount);
      const basePortion = Math.min(eligible, thresholdAmount);
      const accPortion = Math.max(eligible - thresholdAmount, 0);
      const commission = basePortion * base + accPortion * acc;
      return { thresholdAmount, capAmount, eligible, basePortion, accPortion, commission };
    }

    function findBreakEvenPerRep(v) {
      const margin = v.marginRate / 100;
      if (margin <= 0) return Infinity;

      const spiffPerRep = v.spiff / v.teamSize;
      const net = (x) => {
        const c = commissionPerRep(v, x).commission;
        return x * margin - c - spiffPerRep;
      };

      let low = 0;
      let high = Math.max(v.quota, 1);
      let guard = 0;
      while (net(high) < 0 && high < v.quota * 200 && guard < 100) {
        high *= 2;
        guard++;
      }
      if (net(high) < 0) return Infinity;

      for (let i = 0; i < 80; i++) {
        const mid = (low + high) / 2;
        if (net(mid) >= 0) high = mid;
        else low = mid;
      }
      return high;
    }

    function render() {
      const v = {
        teamSize: Number(refs.teamSize.value), quota: Number(refs.quota.value), bookings: Number(refs.bookings.value), baseRate: Number(refs.baseRate.value),
        threshold: Number(refs.threshold.value), acceleratorRate: Number(refs.acceleratorRate.value), cap: Number(refs.cap.value), marginRate: Number(refs.marginRate.value),
        spiff: Number(refs.spiff.value), periods: Number(refs.periods.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err) {
        ["attainment", "totalCommission", "blendedRate", "grossProfitAfter", "commissionToGp", "breakEvenRepBookings", "eligibleBookings", "baseCommission", "acceleratorCommission", "grossProfitBefore"].forEach((k) => refs[k].textContent = "-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const c = commissionPerRep(v, v.bookings);
      const attainment = (v.bookings / v.quota) * 100;

      const perPeriodBaseCommission = c.basePortion * (v.baseRate / 100) * v.teamSize;
      const perPeriodAcceleratorCommission = c.accPortion * (v.acceleratorRate / 100) * v.teamSize;
      const perPeriodCommission = c.commission * v.teamSize + v.spiff;

      const totalBookings = v.bookings * v.teamSize * v.periods;
      const totalEligibleBookings = c.eligible * v.teamSize * v.periods;
      const totalCommission = perPeriodCommission * v.periods;
      const grossProfitBefore = totalBookings * (v.marginRate / 100);
      const grossProfitAfter = grossProfitBefore - totalCommission;
      const blendedRate = totalBookings > 0 ? (totalCommission / totalBookings) * 100 : 0;
      const commissionToGp = grossProfitBefore > 0 ? (totalCommission / grossProfitBefore) * 100 : Infinity;
      const breakEvenRepBookings = findBreakEvenPerRep(v);

      refs.attainment.textContent = `${num(attainment, 1)}%`;
      refs.totalCommission.textContent = money(totalCommission);
      refs.blendedRate.textContent = `${num(blendedRate, 2)}%`;
      refs.grossProfitAfter.textContent = money(grossProfitAfter);
      refs.commissionToGp.textContent = Number.isFinite(commissionToGp) ? `${num(commissionToGp, 1)}%` : "∞";
      refs.breakEvenRepBookings.textContent = Number.isFinite(breakEvenRepBookings) ? money(breakEvenRepBookings) : "달성 불가";

      refs.eligibleBookings.textContent = money(totalEligibleBookings);
      refs.baseCommission.textContent = money(perPeriodBaseCommission * v.periods);
      refs.acceleratorCommission.textContent = money(perPeriodAcceleratorCommission * v.periods);
      refs.grossProfitBefore.textContent = money(grossProfitBefore);

      const capped = v.bookings > c.capAmount;
      refs.status.innerHTML = grossProfitAfter >= 0
        ? `<span class="ok">●</span> 플랜 적용 후 총이익 ${money(grossProfitAfter)}${capped ? " (지급 캡 적용)" : ""}`
        : `<span class="warn">●</span> 플랜 적용 후 총이익 ${money(grossProfitAfter)} (재설계 필요)`;

      refs.summary.value = [
        "[Sales Commission Accelerator 요약]",
        `쿼터 달성률: ${num(attainment, 1)}%`,
        `총 지급 커미션: ${money(totalCommission)}`,
        `Blended 커미션율: ${num(blendedRate, 2)}%`,
        `커미션 차감 전 총이익: ${money(grossProfitBefore)}`,
        `커미션 차감 후 총이익: ${money(grossProfitAfter)}`,
        `커미션/총이익 비중: ${Number.isFinite(commissionToGp) ? `${num(commissionToGp, 1)}%` : "∞"}`,
        `손익분기 Rep 매출: ${Number.isFinite(breakEvenRepBookings) ? money(breakEvenRepBookings) : "달성 불가"}`,
        `지급 캡 적용 여부: ${capped ? "예" : "아니오"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.teamSize, refs.quota, refs.bookings, refs.baseRate, refs.threshold, refs.acceleratorRate, refs.cap, refs.marginRate, refs.spiff, refs.periods].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
