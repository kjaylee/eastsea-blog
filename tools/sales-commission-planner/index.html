<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Commission Planner | 세일즈 커미션 플래너</title>
  <meta name="description" content="할당량(Quota) 달성률과 구간별 가속(Accelerator) 요율을 반영해 커미션과 월 총보상을 계산하는 영업 보상 플래너" />
  <style>
    :root{--bg:#091022;--card:#131f3a;--line:#2e4268;--txt:#ebf2ff;--muted:#a0b3d5;--pri:#818cf8;--ok:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#2b3974 0%,#091022 50%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 60px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.9vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#dbe7ff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#101a34;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}
    .card{background:linear-gradient(165deg,#192a4f,#131f3a);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1831;color:var(--txt);font-size:.92rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#6366f1);font-weight:700}
    .soft{background:#172750;border:1px solid var(--line);font-weight:600}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);border-radius:11px;padding:10px;background:#0f1934}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.14rem;font-weight:800}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);font-size:.75rem;background:#14234a;color:#bed0f1;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.87rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    textarea{width:100%;min-height:90px;margin-top:10px;background:#0e1630;color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:.84rem;resize:vertical}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🎯 세일즈 커미션 플래너</h1>
        <div class="sub">달성률 구간별 가속(Accelerator) 요율로 커미션을 계산하고 월 총보상을 시뮬레이션합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="base">월 기본급 (KRW)</label><input id="base" type="number" min="0" value="3500000" /></div>
          <div><label for="quota">월 Quota (KRW)</label><input id="quota" type="number" min="1" value="100000000" /></div>
          <div><label for="achieved">실적 매출 (KRW)</label><input id="achieved" type="number" min="0" value="138000000" /></div>
          <div><label for="th1">구간1 상한 (% of Quota)</label><input id="th1" type="number" min="1" max="99" value="80" /></div>
          <div><label for="th2">구간3 상한 (% of Quota)</label><input id="th2" type="number" min="101" value="120" /></div>
          <div><label for="r1">구간1 요율 (%)</label><input id="r1" type="number" min="0" step="0.1" value="1" /></div>
          <div><label for="r2">구간2 요율 (%)</label><input id="r2" type="number" min="0" step="0.1" value="3" /></div>
          <div><label for="r3">구간3 요율 (%)</label><input id="r3" type="number" min="0" step="0.1" value="6" /></div>
          <div><label for="r4">초과 구간 요율 (%)</label><input id="r4" type="number" min="0" step="0.1" value="9" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">달성률</div><div id="attainment" class="v">-</div></div>
          <div class="kpi"><div class="k">총 커미션</div><div id="commission" class="v">-</div></div>
          <div class="kpi"><div class="k">유효 커미션율</div><div id="effRate" class="v">-</div></div>
          <div class="kpi"><div class="k">월 총보상</div><div id="totalComp" class="v">-</div></div>
        </div>
        <div id="health" class="pill">지표 해석 대기</div>

        <h2 style="margin-top:12px">구간별 지급 내역</h2>
        <table>
          <thead><tr><th>구간</th><th>대상 매출</th><th>요율</th><th>커미션</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      base:$('base'), quota:$('quota'), achieved:$('achieved'), th1:$('th1'), th2:$('th2'), r1:$('r1'), r2:$('r2'), r3:$('r3'), r4:$('r4'),
      attainment:$('attainment'), commission:$('commission'), effRate:$('effRate'), totalComp:$('totalComp'), rows:$('rows'),
      health:$('health'), error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };
    const defaults = { base:3500000, quota:100000000, achieved:138000000, th1:80, th2:120, r1:1, r2:3, r3:6, r4:9 };
    const money = (n)=> new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const pct = (n,d=1)=> `${Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d})}%`;

    function validate(v){
      if (!Number.isFinite(v.base) || v.base < 0) return '기본급은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.quota) || v.quota <= 0) return 'Quota는 0보다 커야 합니다.';
      if (!Number.isFinite(v.achieved) || v.achieved < 0) return '실적 매출은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.th1) || v.th1 <= 0 || v.th1 >= 100) return '구간1 상한은 0~100% 사이여야 합니다.';
      if (!Number.isFinite(v.th2) || v.th2 <= 100) return '구간3 상한은 100% 초과여야 합니다.';
      if (v.th2 <= v.th1) return '구간3 상한은 구간1 상한보다 커야 합니다.';
      for (const r of [v.r1,v.r2,v.r3,v.r4]) if (!Number.isFinite(r) || r < 0) return '요율은 0 이상이어야 합니다.';
      return '';
    }

    function calc(v){
      const b1 = v.quota * (v.th1/100);
      const b2 = v.quota;
      const b3 = v.quota * (v.th2/100);
      const s1 = Math.min(v.achieved, b1);
      const s2 = Math.min(Math.max(v.achieved-b1,0), Math.max(b2-b1,0));
      const s3 = Math.min(Math.max(v.achieved-b2,0), Math.max(b3-b2,0));
      const s4 = Math.max(v.achieved-b3,0);
      const c1 = s1*(v.r1/100), c2 = s2*(v.r2/100), c3 = s3*(v.r3/100), c4 = s4*(v.r4/100);
      const totalCommission = c1+c2+c3+c4;
      const attainment = (v.achieved/v.quota)*100;
      const effectiveRate = v.achieved>0 ? (totalCommission/v.achieved)*100 : 0;
      const totalComp = v.base + totalCommission;
      return {attainment,effectiveRate,totalCommission,totalComp,b1,b2,b3,s1,s2,s3,s4,c1,c2,c3,c4};
    }

    function row(name,sales,rate,commission){
      return `<tr><td>${name}</td><td>${money(sales)}</td><td>${pct(rate,1)}</td><td>${money(commission)}</td></tr>`;
    }

    function render(){
      const v = {
        base:Number(refs.base.value), quota:Number(refs.quota.value), achieved:Number(refs.achieved.value),
        th1:Number(refs.th1.value), th2:Number(refs.th2.value), r1:Number(refs.r1.value), r2:Number(refs.r2.value), r3:Number(refs.r3.value), r4:Number(refs.r4.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;
      if (err){
        ['attainment','commission','effRate','totalComp'].forEach(k=>refs[k].textContent='-');
        refs.rows.innerHTML=''; refs.health.textContent='입력값을 확인하세요'; refs.summary.value='';
        return;
      }

      const r = calc(v);
      refs.attainment.textContent = pct(r.attainment,1);
      refs.commission.textContent = money(r.totalCommission);
      refs.effRate.textContent = pct(r.effectiveRate,2);
      refs.totalComp.textContent = money(r.totalComp);
      refs.rows.innerHTML = [
        row(`0~${v.th1}%`, r.s1, v.r1, r.c1),
        row(`${v.th1}~100%`, r.s2, v.r2, r.c2),
        row(`100~${v.th2}%`, r.s3, v.r3, r.c3),
        row(`${v.th2}%+`, r.s4, v.r4, r.c4)
      ].join('');

      const tone = r.attainment >= 120 ? ['강한 초과달성', 'var(--ok)'] : (r.attainment >= 100 ? ['목표 달성', 'var(--warn)'] : ['미달', 'var(--bad)']);
      refs.health.innerHTML = `<span style="color:${tone[1]}">●</span> ${tone[0]} (${pct(r.attainment,1)})`;

      refs.summary.value = [
        '[Sales Commission 요약]',
        `달성률: ${pct(r.attainment,1)}`,
        `총 커미션: ${money(r.totalCommission)}`,
        `유효 커미션율: ${pct(r.effectiveRate,2)}`,
        `월 총보상: ${money(r.totalComp)}`,
        `구간별: 0~${v.th1}% ${money(r.c1)} / ${v.th1}~100% ${money(r.c2)} / 100~${v.th2}% ${money(r.c3)} / ${v.th2}%+ ${money(r.c4)}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.base,refs.quota,refs.achieved,refs.th1,refs.th2,refs.r1,refs.r2,refs.r3,refs.r4].forEach(el=>el.addEventListener(ev,render));
    });

    render();
  </script>
</body>
</html>
