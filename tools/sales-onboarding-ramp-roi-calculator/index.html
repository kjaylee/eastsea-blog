<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Onboarding Ramp ROI Calculator | 영업 온보딩 램프업 ROI 계산기</title>
  <meta name="description" content="신규 영업 인력의 램프업 기간 단축이 만드는 추가 수주/이익, ROI, 회수기간, 손익분기 램프업 기간을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102440;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.7vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#17335f,#102440);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:104px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.98rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📈 영업 온보딩 램프업 ROI 계산기</h1>
        <div class="sub">신규 영업 인력의 램프업 기간 단축이 만드는 추가 수주·이익을 계량화해 투자 타당성을 판단합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="reps">신규 영업 인원 (명)</label><input id="reps" type="number" min="1" value="12" /></div>
          <div><label for="currentRamp">현재 풀램프 기간 (개월)</label><input id="currentRamp" type="number" min="1" max="24" step="0.1" value="7" /></div>
          <div><label for="targetRamp">목표 풀램프 기간 (개월)</label><input id="targetRamp" type="number" min="0.5" max="24" step="0.1" value="4" /></div>
          <div><label for="monthlyQuota">풀램프 시 월 쿼터/인당 (KRW)</label><input id="monthlyQuota" type="number" min="1000000" value="38000000" /></div>
          <div><label for="attainment">풀램프 달성률 (%)</label><input id="attainment" type="number" min="1" max="200" step="0.1" value="78" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="1" max="100" step="0.1" value="71" /></div>
          <div><label for="commission">커미션율 (%)</label><input id="commission" type="number" min="0" max="100" step="0.1" value="9" /></div>
          <div><label for="onboardingInvest">추가 온보딩 투자비/인당 (KRW)</label><input id="onboardingInvest" type="number" min="0" value="1800000" /></div>
          <div><label for="platformCost">월 Enablement 플랫폼 비용 (KRW)</label><input id="platformCost" type="number" min="0" value="2400000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="36" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">분석기간 추가 수주액</div><div id="incrementalBookings" class="v">-</div></div>
          <div class="kpi"><div class="k">분석기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">총 추가 투자비</div><div id="totalInvestment" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>현재 램프 모델 수주액</th><td id="bookingsCurrent">-</td></tr>
            <tr><th>목표 램프 모델 수주액</th><td id="bookingsTarget">-</td></tr>
            <tr><th>추가 매출총이익</th><td id="incrementalGrossProfit">-</td></tr>
            <tr><th>추가 커미션 비용</th><td id="incrementalCommission">-</td></tr>
            <tr><th>손익분기 목표 램프 기간</th><td id="breakEvenRamp">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      reps:$("reps"), currentRamp:$("currentRamp"), targetRamp:$("targetRamp"), monthlyQuota:$("monthlyQuota"), attainment:$("attainment"), margin:$("margin"),
      commission:$("commission"), onboardingInvest:$("onboardingInvest"), platformCost:$("platformCost"), months:$("months"),
      incrementalBookings:$("incrementalBookings"), periodNet:$("periodNet"), monthlyNet:$("monthlyNet"), totalInvestment:$("totalInvestment"), roi:$("roi"), payback:$("payback"),
      bookingsCurrent:$("bookingsCurrent"), bookingsTarget:$("bookingsTarget"), incrementalGrossProfit:$("incrementalGrossProfit"), incrementalCommission:$("incrementalCommission"), breakEvenRamp:$("breakEvenRamp"),
      error:$("error"), status:$("status"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = {
      reps:12, currentRamp:7, targetRamp:4, monthlyQuota:38000000, attainment:78, margin:71, commission:9, onboardingInvest:1800000, platformCost:2400000, months:12
    };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.reps) || v.reps < 1) return "신규 영업 인원은 1명 이상이어야 합니다.";
      if (!Number.isFinite(v.currentRamp) || v.currentRamp <= 0 || v.currentRamp > 24) return "현재 램프 기간은 0 초과 24개월 이하여야 합니다.";
      if (!Number.isFinite(v.targetRamp) || v.targetRamp <= 0 || v.targetRamp > 24) return "목표 램프 기간은 0 초과 24개월 이하여야 합니다.";
      if (v.targetRamp >= v.currentRamp) return "목표 램프 기간은 현재 램프 기간보다 짧아야 합니다.";
      if (!Number.isFinite(v.monthlyQuota) || v.monthlyQuota <= 0) return "월 쿼터는 0보다 커야 합니다.";
      if (!Number.isFinite(v.attainment) || v.attainment <= 0 || v.attainment > 200) return "달성률은 0 초과 200% 이하 범위여야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 100) return "매출총이익률은 0 초과 100 이하 범위여야 합니다.";
      if (!Number.isFinite(v.commission) || v.commission < 0 || v.commission > 100) return "커미션율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.onboardingInvest) || v.onboardingInvest < 0) return "온보딩 투자비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.platformCost) || v.platformCost < 0) return "월 플랫폼 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 36) return "분석 기간은 1~36개월 범위여야 합니다.";
      return "";
    }

    function rampFactor(month, rampMonths){
      return Math.min(1, month / rampMonths);
    }

    function sumRamp(rampMonths, months){
      let total = 0;
      for (let m=1; m<=months; m++) total += rampFactor(m, rampMonths);
      return total;
    }

    function periodNetForTargetRamp(v, testTargetRamp){
      const fullMonthly = v.monthlyQuota * (v.attainment / 100);
      const bookingsCurrent = v.reps * fullMonthly * sumRamp(v.currentRamp, v.months);
      const bookingsTarget = v.reps * fullMonthly * sumRamp(testTargetRamp, v.months);
      const incrementalBookings = Math.max(0, bookingsTarget - bookingsCurrent);
      const incrementalGrossProfit = incrementalBookings * (v.margin / 100);
      const incrementalCommission = incrementalBookings * (v.commission / 100);
      const totalInvestment = (v.reps * v.onboardingInvest) + (v.platformCost * v.months);
      return incrementalGrossProfit - incrementalCommission - totalInvestment;
    }

    function findBreakEvenRamp(v){
      let found = Infinity;
      for (let r=v.currentRamp - 0.1; r>=0.5; r-=0.1){
        const net = periodNetForTargetRamp(v, Number(r.toFixed(1)));
        if (net >= 0){
          found = Number(r.toFixed(1));
          break;
        }
      }
      return found;
    }

    function compute(v){
      const fullMonthly = v.monthlyQuota * (v.attainment / 100);
      const bookingsCurrent = v.reps * fullMonthly * sumRamp(v.currentRamp, v.months);
      const bookingsTarget = v.reps * fullMonthly * sumRamp(v.targetRamp, v.months);

      const incrementalBookings = Math.max(0, bookingsTarget - bookingsCurrent);
      const incrementalGrossProfit = incrementalBookings * (v.margin / 100);
      const incrementalCommission = incrementalBookings * (v.commission / 100);

      const totalInvestment = (v.reps * v.onboardingInvest) + (v.platformCost * v.months);
      const periodNet = incrementalGrossProfit - incrementalCommission - totalInvestment;
      const monthlyNet = periodNet / v.months;

      const roi = totalInvestment === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / totalInvestment) * 100;

      const monthlyContributionBeforePlatform = (incrementalGrossProfit - incrementalCommission) / v.months;
      const monthlyContributionAfterPlatform = monthlyContributionBeforePlatform - v.platformCost;
      const upfrontCost = v.reps * v.onboardingInvest;
      const payback = monthlyContributionAfterPlatform > 0 ? (upfrontCost / monthlyContributionAfterPlatform) : Infinity;

      const breakEvenRamp = findBreakEvenRamp(v);

      return {
        bookingsCurrent, bookingsTarget, incrementalBookings, incrementalGrossProfit, incrementalCommission,
        totalInvestment, periodNet, monthlyNet, roi, payback, breakEvenRamp
      };
    }

    function resetOutputs(){
      ["incrementalBookings","periodNet","monthlyNet","totalInvestment","roi","payback","bookingsCurrent","bookingsTarget","incrementalGrossProfit","incrementalCommission","breakEvenRamp"].forEach((k)=>refs[k].textContent='-');
      refs.summary.value = "";
    }

    function render(){
      const v = {
        reps:Number(refs.reps.value), currentRamp:Number(refs.currentRamp.value), targetRamp:Number(refs.targetRamp.value), monthlyQuota:Number(refs.monthlyQuota.value), attainment:Number(refs.attainment.value),
        margin:Number(refs.margin.value), commission:Number(refs.commission.value), onboardingInvest:Number(refs.onboardingInvest.value), platformCost:Number(refs.platformCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.incrementalBookings.textContent = money(r.incrementalBookings);
      refs.periodNet.textContent = money(r.periodNet);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.totalInvestment.textContent = money(r.totalInvestment);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞');
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가';

      refs.bookingsCurrent.textContent = money(r.bookingsCurrent);
      refs.bookingsTarget.textContent = money(r.bookingsTarget);
      refs.incrementalGrossProfit.textContent = money(r.incrementalGrossProfit);
      refs.incrementalCommission.textContent = money(r.incrementalCommission);
      refs.breakEvenRamp.textContent = Number.isFinite(r.breakEvenRamp) ? `${num(r.breakEvenRamp,1)}개월` : '달성 불가';

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> 월 ${money(r.monthlyNet)} 순효과 개선`
        : `<span class="warn">●</span> 월 ${money(Math.abs(r.monthlyNet))} 순효과 감소`;

      refs.summary.value = [
        "[영업 온보딩 램프업 ROI 요약]",
        `분석기간 추가 수주액: ${money(r.incrementalBookings)}`,
        `추가 매출총이익: ${money(r.incrementalGrossProfit)}`,
        `추가 커미션 비용: ${money(r.incrementalCommission)}`,
        `총 추가 투자비: ${money(r.totalInvestment)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `${v.months}개월 순효과: ${money(r.periodNet)}`,
        `ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞')}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가'}`,
        `손익분기 목표 램프 기간: ${Number.isFinite(r.breakEvenRamp) ? `${num(r.breakEvenRamp,1)}개월` : '달성 불가'}`
      ].join("\n");
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });

    [refs.reps,refs.currentRamp,refs.targetRamp,refs.monthlyQuota,refs.attainment,refs.margin,refs.commission,refs.onboardingInvest,refs.platformCost,refs.months].forEach((el)=>{
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
