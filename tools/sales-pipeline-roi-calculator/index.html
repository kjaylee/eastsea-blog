<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Pipeline ROI Calculator | 세일즈 파이프라인 ROI 계산기</title>
  <meta name="description" content="리드 수와 단계별 전환율, 평균 계약금액, 세일즈 운영비를 입력해 예상 수주·매출·ROI를 계산하는 세일즈 파이프라인 ROI 계산기" />
  <style>
    :root{--bg:#071226;--card:#0f1b36;--line:#29406b;--txt:#eef4ff;--muted:#9ab0d5;--pri:#60a5fa;--ok:#34d399;--warn:#fbbf24;--err:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#214582 0%,#071226 52%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 60px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#dbe7ff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#101a34;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#17264b,#0f1b36);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c162f;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#3f8df3);font-weight:700}
    .soft{background:#172750;border:1px solid var(--line);font-weight:600}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    textarea{min-height:98px;margin-top:10px;resize:vertical}
    .error{display:none;margin-top:10px;padding:9px 10px;border:1px solid #6d2f39;border-radius:10px;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);border-radius:11px;padding:10px;background:#0d1833}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.15rem;font-weight:800}
    .v.sm{font-size:1.01rem}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);font-size:.75rem;background:#14234a;color:#bed0f1;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🧭 세일즈 파이프라인 ROI 계산기</h1>
        <div class="sub">단계별 전환율을 반영한 예상 수주/매출/ROI를 계산해 파이프라인 우선순위를 정합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="leads">총 리드 수</label><input id="leads" type="number" min="1" value="2000" /></div>
          <div><label for="mqlRate">MQL 전환율 (%)</label><input id="mqlRate" type="number" min="0" max="100" step="0.1" value="32" /></div>
          <div><label for="sqlRate">SQL 전환율 (%)</label><input id="sqlRate" type="number" min="0" max="100" step="0.1" value="45" /></div>
          <div><label for="proposalRate">제안 단계 전환율 (%)</label><input id="proposalRate" type="number" min="0" max="100" step="0.1" value="55" /></div>
          <div><label for="winRate">수주율 (%)</label><input id="winRate" type="number" min="0" max="100" step="0.1" value="38" /></div>
          <div><label for="avgDeal">평균 계약금액 (KRW)</label><input id="avgDeal" type="number" min="1" value="4800000" /></div>
          <div style="grid-column:1 / -1"><label for="salesCost">월 세일즈 운영비 (인건비+툴+프로모션, KRW)</label><input id="salesCost" type="number" min="0" value="24000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">예상 수주 건수</div><div id="wins" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 매출</div><div id="revenue" class="v">-</div></div>
          <div class="kpi"><div class="k">세일즈 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">리드당 기대매출</div><div id="revPerLead" class="v sm">-</div></div>
          <div class="kpi"><div class="k">수주당 비용</div><div id="costPerWin" class="v sm">-</div></div>
          <div class="kpi"><div class="k">리드당 비용</div><div id="costPerLead" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">파이프라인 진단 대기</div>

        <h2 style="margin-top:12px">단계별 볼륨</h2>
        <table>
          <tbody>
            <tr><th>MQL</th><td id="mql">-</td></tr>
            <tr><th>SQL</th><td id="sql">-</td></tr>
            <tr><th>Proposal</th><td id="proposal">-</td></tr>
            <tr><th>Win</th><td id="win">-</td></tr>
            <tr><th>전체 Lead→Win 전환율</th><td id="fullRate">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      leads: $('leads'), mqlRate: $('mqlRate'), sqlRate: $('sqlRate'), proposalRate: $('proposalRate'), winRate: $('winRate'), avgDeal: $('avgDeal'), salesCost: $('salesCost'),
      wins: $('wins'), revenue: $('revenue'), roi: $('roi'), revPerLead: $('revPerLead'), costPerWin: $('costPerWin'), costPerLead: $('costPerLead'),
      mql: $('mql'), sql: $('sql'), proposal: $('proposal'), win: $('win'), fullRate: $('fullRate'),
      status: $('status'), error: $('error'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = { leads:2000, mqlRate:32, sqlRate:45, proposalRate:55, winRate:38, avgDeal:4800000, salesCost:24000000 };
    const money = (n)=> new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=> Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validRate(n){ return Number.isFinite(n) && n >= 0 && n <= 100; }

    function validate(v){
      if (!Number.isFinite(v.leads) || v.leads <= 0) return '총 리드 수는 1 이상이어야 합니다.';
      if (![v.mqlRate,v.sqlRate,v.proposalRate,v.winRate].every(validRate)) return '전환율은 0~100 범위여야 합니다.';
      if (!Number.isFinite(v.avgDeal) || v.avgDeal <= 0) return '평균 계약금액은 0보다 커야 합니다.';
      if (!Number.isFinite(v.salesCost) || v.salesCost < 0) return '세일즈 운영비는 0 이상이어야 합니다.';
      return '';
    }

    function compute(v){
      const mql = v.leads * (v.mqlRate/100);
      const sql = mql * (v.sqlRate/100);
      const proposal = sql * (v.proposalRate/100);
      const wins = proposal * (v.winRate/100);
      const revenue = wins * v.avgDeal;
      const roi = v.salesCost === 0 ? Infinity : ((revenue - v.salesCost) / v.salesCost) * 100;
      const revPerLead = revenue / v.leads;
      const costPerLead = v.salesCost / v.leads;
      const costPerWin = wins === 0 ? null : v.salesCost / wins;
      const fullRate = (wins / v.leads) * 100;
      return { mql, sql, proposal, wins, revenue, roi, revPerLead, costPerLead, costPerWin, fullRate };
    }

    function render(){
      const v = {
        leads:Number(refs.leads.value), mqlRate:Number(refs.mqlRate.value), sqlRate:Number(refs.sqlRate.value),
        proposalRate:Number(refs.proposalRate.value), winRate:Number(refs.winRate.value), avgDeal:Number(refs.avgDeal.value), salesCost:Number(refs.salesCost.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        ['wins','revenue','roi','revPerLead','costPerWin','costPerLead','mql','sql','proposal','win','fullRate'].forEach(k=>refs[k].textContent='-');
        refs.status.textContent = '입력값을 확인하세요';
        refs.summary.value = '';
        return;
      }

      const r = compute(v);
      refs.wins.textContent = `${num(r.wins,1)}건`;
      refs.revenue.textContent = money(r.revenue);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : '∞';
      refs.revPerLead.textContent = money(r.revPerLead);
      refs.costPerLead.textContent = money(r.costPerLead);
      refs.costPerWin.textContent = r.costPerWin === null ? 'N/A' : money(r.costPerWin);

      refs.mql.textContent = `${num(r.mql,1)}건`;
      refs.sql.textContent = `${num(r.sql,1)}건`;
      refs.proposal.textContent = `${num(r.proposal,1)}건`;
      refs.win.textContent = `${num(r.wins,1)}건`;
      refs.fullRate.textContent = `${num(r.fullRate,2)}%`;

      const health = Number.isFinite(r.roi) && r.roi >= 40 ? 'strong' : (Number.isFinite(r.roi) && r.roi >= 0 ? 'mid' : 'weak');
      refs.status.innerHTML = health === 'strong'
        ? `<span class="ok">●</span> ROI ${num(r.roi,1)}% (강한 파이프라인)`
        : health === 'mid'
          ? `<span class="warn">●</span> ROI ${num(r.roi,1)}% (개선 여지)`
          : `● ROI ${Number.isFinite(r.roi)?num(r.roi,1)+'%':'∞'} (전환/비용 재조정 필요)`;

      refs.summary.value = [
        '[Sales Pipeline ROI 요약]',
        `예상 수주 건수: ${num(r.wins,1)}건`,
        `예상 매출: ${money(r.revenue)}`,
        `세일즈 ROI: ${Number.isFinite(r.roi)?num(r.roi,1)+'%':'∞'}`,
        `리드당 기대매출: ${money(r.revPerLead)}`,
        `수주당 비용: ${r.costPerWin===null ? 'N/A' : money(r.costPerWin)}`,
        `Lead→Win 전환율: ${num(r.fullRate,2)}%`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.leads,refs.mqlRate,refs.sqlRate,refs.proposalRate,refs.winRate,refs.avgDeal,refs.salesCost].forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
