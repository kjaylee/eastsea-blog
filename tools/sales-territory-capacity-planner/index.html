<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Territory Capacity Planner | 세일즈 영업 커버리지 수용량 플래너</title>
  <meta name="description" content="매출 목표를 달성하기 위한 영업 인력 수요, 충원 갭, ROI, 손익분기 승률 리프트를 계산하는 B2B 세일즈 계획 도구" />
  <style>
    :root{--bg:#081224;--card:#12284a;--line:#2c548d;--txt:#edf3ff;--muted:#aec5e8;--pri:#75adff;--soft:#1a3a68;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#244679 0%,#081224 52%);color:var(--txt)}
    .wrap{max-width:1140px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.6vw,1.74rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce9ff;background:#10284b;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.06fr .94fr;gap:12px}
    .card{background:linear-gradient(165deg,#193a64,#12284a);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1f39;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#648ef4);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0f2140;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.1rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#1a3965;color:#d2e3ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📈 세일즈 영업 커버리지 수용량 플래너</h1>
        <div class="sub">매출 목표를 기준으로 필요한 영업 인원, 충원 비용, 기대 순효과와 손익분기 승률 리프트를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="targetRevenue">연 매출 목표 (KRW)</label><input id="targetRevenue" type="number" min="1" value="7200000000" /></div>
          <div><label for="avgDeal">평균 딜 금액 (KRW)</label><input id="avgDeal" type="number" min="1" value="28000000" /></div>
          <div><label for="winRate">현재 승률 (%)</label><input id="winRate" type="number" min="0.1" max="100" step="0.1" value="24" /></div>
          <div><label for="oppsPerMonth">1인당 월 처리 기회 수 (건)</label><input id="oppsPerMonth" type="number" min="0.1" max="500" step="0.1" value="16" /></div>
          <div><label for="productiveDays">연간 생산일수 (일)</label><input id="productiveDays" type="number" min="120" max="260" step="1" value="212" /></div>
          <div><label for="currentReps">현재 AE 인원 (명)</label><input id="currentReps" type="number" min="1" step="1" value="8" /></div>
          <div><label for="costPerRep">1인당 연 인건비 (KRW)</label><input id="costPerRep" type="number" min="1" value="118000000" /></div>
          <div><label for="rampMonths">신규 AE 램프업 기간 (개월)</label><input id="rampMonths" type="number" min="0" max="12" step="1" value="5" /></div>
          <div><label for="enablement">세일즈 이네이블먼트 비용 (KRW)</label><input id="enablement" type="number" min="0" value="26000000" /></div>
          <div><label for="margin">매출총이익률 (%)</label><input id="margin" type="number" min="1" max="95" step="0.1" value="68" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">필요 AE 인원</div><div id="requiredReps" class="v">-</div></div>
          <div class="kpi"><div class="k">충원 갭</div><div id="hiringGap" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 투자액</div><div id="investment" class="v sm">-</div></div>
          <div class="kpi"><div class="k">연 순효과</div><div id="annualNet" class="v sm">-</div></div>
          <div class="kpi"><div class="k">연 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>1인당 연 매출 생산성</th><td id="revenuePerRep">-</td></tr>
            <tr><th>현재 팀 연 매출 수용량</th><td id="currentCapacity">-</td></tr>
            <tr><th>충원 후(램프업 반영) 수용량</th><td id="newCapacity">-</td></tr>
            <tr><th>손익분기 승률 리프트</th><td id="breakEvenLift">-</td></tr>
            <tr><th>무충원 목표 달성 필요 승률</th><td id="requiredWinNoHire">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      targetRevenue:$("targetRevenue"), avgDeal:$("avgDeal"), winRate:$("winRate"), oppsPerMonth:$("oppsPerMonth"), productiveDays:$("productiveDays"),
      currentReps:$("currentReps"), costPerRep:$("costPerRep"), rampMonths:$("rampMonths"), enablement:$("enablement"), margin:$("margin"),
      requiredReps:$("requiredReps"), hiringGap:$("hiringGap"), investment:$("investment"), annualNet:$("annualNet"), roi:$("roi"), payback:$("payback"),
      revenuePerRep:$("revenuePerRep"), currentCapacity:$("currentCapacity"), newCapacity:$("newCapacity"), breakEvenLift:$("breakEvenLift"), requiredWinNoHire:$("requiredWinNoHire"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = {
      targetRevenue:7200000000, avgDeal:28000000, winRate:24, oppsPerMonth:16, productiveDays:212,
      currentReps:8, costPerRep:118000000, rampMonths:5, enablement:26000000, margin:68
    };

    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.targetRevenue) || v.targetRevenue <= 0) return "연 매출 목표는 0보다 커야 합니다.";
      if (!Number.isFinite(v.avgDeal) || v.avgDeal <= 0) return "평균 딜 금액은 0보다 커야 합니다.";
      if (!Number.isFinite(v.winRate) || v.winRate <= 0 || v.winRate > 100) return "현재 승률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.oppsPerMonth) || v.oppsPerMonth <= 0 || v.oppsPerMonth > 500) return "월 처리 기회 수는 0~500 범위여야 합니다.";
      if (!Number.isFinite(v.productiveDays) || v.productiveDays < 120 || v.productiveDays > 260) return "연간 생산일수는 120~260일 범위여야 합니다.";
      if (!Number.isFinite(v.currentReps) || v.currentReps < 1 || !Number.isInteger(v.currentReps)) return "현재 AE 인원은 1 이상의 정수여야 합니다.";
      if (!Number.isFinite(v.costPerRep) || v.costPerRep <= 0) return "1인당 연 인건비는 0보다 커야 합니다.";
      if (!Number.isFinite(v.rampMonths) || v.rampMonths < 0 || v.rampMonths > 12 || !Number.isInteger(v.rampMonths)) return "램프업 기간은 0~12개월 정수여야 합니다.";
      if (!Number.isFinite(v.enablement) || v.enablement < 0) return "이네이블먼트 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.margin) || v.margin <= 0 || v.margin > 95) return "매출총이익률은 0~95% 범위여야 합니다.";
      return "";
    }

    function compute(v){
      const oppsPerRepYear = v.oppsPerMonth * 12 * (v.productiveDays / 220);
      const closedDealsPerRepYear = oppsPerRepYear * (v.winRate / 100);
      const revenuePerRep = closedDealsPerRepYear * v.avgDeal;

      const requiredReps = Math.ceil(v.targetRevenue / revenuePerRep);
      const hiringGap = Math.max(0, requiredReps - v.currentReps);

      const rampFactor = Math.min(1, Math.max(0.4, 1 - v.rampMonths / 24));
      const currentCapacity = v.currentReps * revenuePerRep;
      const newCapacity = currentCapacity + hiringGap * revenuePerRep * rampFactor;

      const addedRevenue = Math.max(0, newCapacity - currentCapacity);
      const addedGrossProfit = addedRevenue * (v.margin / 100);

      const investment = hiringGap * v.costPerRep + (hiringGap > 0 ? v.enablement : 0);
      const annualNet = addedGrossProfit - investment;
      const roi = investment === 0 ? (annualNet >= 0 ? Infinity : -Infinity) : (annualNet / investment) * 100;
      const payback = annualNet > 0 ? investment / (annualNet / 12) : Infinity;

      const breakEvenLift = investment === 0
        ? 0
        : investment / (requiredReps * oppsPerRepYear * v.avgDeal * (v.margin / 100)) * 100;

      const requiredWinNoHire = v.targetRevenue / (v.currentReps * oppsPerRepYear * v.avgDeal) * 100;

      return {
        oppsPerRepYear, revenuePerRep, requiredReps, hiringGap, currentCapacity, newCapacity,
        investment, annualNet, roi, payback, breakEvenLift, requiredWinNoHire
      };
    }

    function resetOutputs(){
      ["requiredReps","hiringGap","investment","annualNet","roi","payback","revenuePerRep","currentCapacity","newCapacity","breakEvenLift","requiredWinNoHire"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        targetRevenue:Number(refs.targetRevenue.value), avgDeal:Number(refs.avgDeal.value), winRate:Number(refs.winRate.value), oppsPerMonth:Number(refs.oppsPerMonth.value),
        productiveDays:Number(refs.productiveDays.value), currentReps:Number(refs.currentReps.value), costPerRep:Number(refs.costPerRep.value),
        rampMonths:Number(refs.rampMonths.value), enablement:Number(refs.enablement.value), margin:Number(refs.margin.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.requiredReps.textContent = `${num(r.requiredReps,0)}명`;
      refs.hiringGap.textContent = `${num(r.hiringGap,0)}명`;
      refs.investment.textContent = money(r.investment);
      refs.annualNet.textContent = money(r.annualNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가";
      refs.revenuePerRep.textContent = money(r.revenuePerRep);
      refs.currentCapacity.textContent = money(r.currentCapacity);
      refs.newCapacity.textContent = money(r.newCapacity);
      refs.breakEvenLift.textContent = Number.isFinite(r.breakEvenLift) ? `${num(r.breakEvenLift,2)}%p` : "계산 불가";
      refs.requiredWinNoHire.textContent = Number.isFinite(r.requiredWinNoHire) ? `${num(r.requiredWinNoHire,2)}%` : "계산 불가";

      refs.status.innerHTML = r.annualNet >= 0
        ? `<span class="ok">●</span> 연간 ${money(r.annualNet)} 순효과`
        : `<span class="warn">●</span> 연간 ${money(Math.abs(r.annualNet))} 순손실`;

      refs.summary.value = [
        "[Sales Territory Capacity 요약]",
        `필요 AE 인원: ${num(r.requiredReps,0)}명`,
        `충원 갭: ${num(r.hiringGap,0)}명`,
        `연간 투자액: ${money(r.investment)}`,
        `연 순효과: ${money(r.annualNet)}`,
        `연 ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : "회수 불가"}`,
        `손익분기 승률 리프트: ${Number.isFinite(r.breakEvenLift) ? `${num(r.breakEvenLift,2)}%p` : "계산 불가"}`,
        `무충원 목표 달성 필요 승률: ${Number.isFinite(r.requiredWinNoHire) ? `${num(r.requiredWinNoHire,2)}%` : "계산 불가"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.targetRevenue,refs.avgDeal,refs.winRate,refs.oppsPerMonth,refs.productiveDays,refs.currentReps,refs.costPerRep,refs.rampMonths,refs.enablement,refs.margin].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
