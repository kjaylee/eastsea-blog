<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>저축 목표 시뮬레이터 | Savings Goal Simulator</title>
  <meta name="description" content="목표 금액, 기간, 월 저축액, 이율을 입력해 목표 달성 여부와 필요 월 납입금을 계산합니다." />
  <style>
    :root{--bg:#f4f7ff;--card:#fff;--line:#dce5f6;--text:#1f2937;--muted:#64748b;--pri:#2563eb;--pri2:#0ea5e9;--ok:#16a34a;--warn:#d97706;--bad:#dc2626}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#edf3ff,#f8fbff);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 42px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin:6px 0 0;color:var(--muted);font-size:.92rem}
    .back{text-decoration:none;color:#1e3a8a;border:1px solid var(--line);background:#fff;padding:8px 11px;border-radius:10px;font-weight:700;font-size:.88rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 10px 28px rgba(37,99,235,.08)}
    h2{margin:0 0 10px;font-size:1rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:700}
    input,button{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);font-size:.92rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}button{cursor:pointer;border:0;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;font-weight:800}.ghost{background:#f4f7ff;border:1px solid var(--line);color:#1f2937}
    .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{border:1px solid var(--line);background:#f9fbff;border-radius:12px;padding:10px}.k{font-size:.75rem;color:var(--muted)}.v{margin-top:4px;font-size:1.1rem;font-weight:800}
    .ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .msg{margin-top:8px;border:1px solid var(--line);border-radius:10px;background:#f8fbff;padding:10px;font-size:.9rem;line-height:1.45}
    .table{margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:600px}th,td{padding:8px;border-bottom:1px solid var(--line);font-size:.82rem;text-align:right}th:first-child,td:first-child{text-align:left}th{background:#f1f5ff;color:#475569;font-size:.76rem}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>💰 저축 목표 시뮬레이터</h1>
      <p class="sub">목표 금액을 달성하기 위한 월 저축액과 예상 달성 시점을 계산합니다.</p>
    </div>
    <a class="back" href="/">Back to Portal</a>
  </div>

  <section class="grid">
    <article class="card">
      <h2>입력</h2>
      <div class="two">
        <div><label for="goal">목표 금액 (원)</label><input id="goal" type="number" min="0" step="100000" value="50000000"></div>
        <div><label for="current">현재 보유액 (원)</label><input id="current" type="number" min="0" step="100000" value="8000000"></div>
        <div><label for="monthlySave">월 저축액 (원)</label><input id="monthlySave" type="number" min="0" step="10000" value="1200000"></div>
        <div><label for="months">목표 기간 (개월)</label><input id="months" type="number" min="1" step="1" value="36"></div>
        <div><label for="annualRate">연 이율 (%)</label><input id="annualRate" type="number" step="0.1" value="3.2"></div>
        <div><label for="inflation">연 인플레이션 (%)</label><input id="inflation" type="number" step="0.1" value="2"></div>
      </div>
      <div class="btns">
        <button id="calcBtn" type="button">계산</button>
        <button id="sampleBtn" class="ghost" type="button">샘플</button>
      </div>
    </article>

    <article class="card">
      <h2>결과</h2>
      <div class="kpis">
        <div class="kpi"><div class="k">예상 최종 잔액</div><div class="v" id="futureValue">-</div></div>
        <div class="kpi"><div class="k">목표 대비 초과/부족</div><div class="v" id="gap">-</div></div>
        <div class="kpi"><div class="k">필요 월 저축액</div><div class="v" id="neededMonthly">-</div></div>
        <div class="kpi"><div class="k">실질 목표 금액</div><div class="v" id="realGoal">-</div></div>
        <div class="kpi"><div class="k">목표 달성 예상 월</div><div class="v" id="reachMonth">-</div></div>
        <div class="kpi"><div class="k">실질 이율</div><div class="v" id="realRate">-</div></div>
      </div>
      <div class="msg" id="msg">입력값 변경 시 자동 계산됩니다.</div>
    </article>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>월별 시뮬레이션 (최대 24개월)</h2>
    <div class="table">
      <table>
        <thead><tr><th>월</th><th>기초 잔액</th><th>이자</th><th>저축</th><th>기말 잔액</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  const $=(id)=>document.getElementById(id);
  const won=(n)=>'₩'+Math.round(n||0).toLocaleString('ko-KR');

  function futureValue(current,monthly,rate,months){
    let balance=current;
    const rows=[];
    for(let i=1;i<=months;i++){
      const interest=balance*rate;
      balance+=interest+monthly;
      rows.push({month:i,start:balance-interest-monthly,interest,save:monthly,end:balance});
    }
    return {balance,rows};
  }

  function calcNeeded(goal,current,rate,months){
    // FV = current*(1+r)^n + PMT*((1+r)^n -1)/r
    const factor=Math.pow(1+rate,months);
    if(rate===0) return (goal-current)/months;
    return (goal - current*factor) * rate / (factor-1);
  }

  function run(){
    const goal=Number($('goal').value);
    const current=Number($('current').value);
    const monthly=Number($('monthlySave').value);
    const months=Math.max(1,Number($('months').value)||1);
    const annual=Number($('annualRate').value)/100;
    const infl=Number($('inflation').value)/100;
    const monthlyRate=Math.pow(1+annual,1/12)-1;
    const realRate=((1+annual)/(1+infl))-1;

    const sim=futureValue(current,monthly,monthlyRate,months);
    const gap=sim.balance-goal;
    const needed=calcNeeded(goal,current,monthlyRate,months);
    const realGoal=goal*Math.pow(1+infl,months/12);

    let reach='미도달';
    const simFull=futureValue(current,monthly,monthlyRate,240);
    const idx=simFull.rows.find(r=>r.end>=goal);
    if(idx) reach=`${idx.month}개월`;

    $('futureValue').textContent=won(sim.balance);
    $('gap').textContent=won(gap);
    $('gap').className=`v ${gap>=0?'ok':'bad'}`;
    $('neededMonthly').textContent=won(Math.max(0,needed));
    $('realGoal').textContent=won(realGoal);
    $('reachMonth').textContent=reach;
    $('realRate').textContent=`${(realRate*100).toFixed(2)}%`;

    const msg = gap>=0
      ? '✅ 목표 금액 달성 가능. 여유 자금을 리스크 낮은 상품으로 분산해 보세요.'
      : '⚠️ 목표 금액이 부족합니다. 월 저축액 확대 또는 기간 연장이 필요합니다.';
    $('msg').textContent=msg;

    $('rows').innerHTML=sim.rows.slice(0,24).map(r=>`<tr>
      <td>${r.month}개월</td>
      <td>${won(r.start)}</td>
      <td>${won(r.interest)}</td>
      <td>${won(r.save)}</td>
      <td>${won(r.end)}</td>
    </tr>`).join('');
  }

  $('calcBtn').addEventListener('click',run);
  $('sampleBtn').addEventListener('click',()=>{
    $('goal').value=80000000;
    $('current').value=12000000;
    $('monthlySave').value=1500000;
    $('months').value=48;
    $('annualRate').value=3.8;
    $('inflation').value=2.2;
    run();
  });
  ['goal','current','monthlySave','months','annualRate','inflation'].forEach(id=>$(id).addEventListener('input',run));
  run();
</script>
</body>
</html>
