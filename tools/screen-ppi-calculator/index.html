<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화면 PPI 계산기 | 웹 도구 모음</title>
    <meta name="description" content="화면 크기와 해상도를 입력하면 PPI(인치당 픽셀 수), 도트 피치, 총 픽셀 수를 계산합니다. 모니터, 노트북, 스마트폰 비교에 유용합니다.">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #00c9ff 0%, #92fe9d 100%);
            --accent-solid: #00b4d8;
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
            --input-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #121212;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #444;
            --shadow: rgba(0, 0, 0, 0.3);
            --card-bg: #2d2d2d;
            --input-bg: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 640px; margin: 0 auto; }
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn { text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .back-btn:hover { color: var(--text-primary); }
        .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.5rem; }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        h2 { font-size: 1.05rem; margin-bottom: 15px; color: var(--text-secondary); }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; color: var(--text-secondary); }
        input[type="number"], select {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent-solid); }
        .row { display: flex; gap: 12px; }
        .row .input-group { flex: 1; }
        .preset-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .preset-btn {
            padding: 8px 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .preset-btn:hover, .preset-btn.active {
            border-color: var(--accent-solid);
            background: var(--accent-solid);
            color: #fff;
        }
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 180, 216, 0.3); }
        .result { display: none; }
        .result.show { display: block; }
        .ppi-hero {
            text-align: center;
            padding: 30px 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .ppi-number { font-size: 3.5rem; font-weight: 900; background: var(--accent); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .ppi-label { font-size: 1rem; color: var(--text-secondary); margin-top: 5px; }
        .ppi-grade { font-size: 1.1rem; font-weight: 700; margin-top: 10px; padding: 6px 16px; border-radius: 20px; display: inline-block; }
        .grade-low { background: #fff3cd; color: #856404; }
        .grade-mid { background: #d1ecf1; color: #0c5460; }
        .grade-high { background: #d4edda; color: #155724; }
        .grade-ultra { background: #e8daef; color: #6c3483; }
        [data-theme="dark"] .grade-low { background: #5c4813; color: #ffd166; }
        [data-theme="dark"] .grade-mid { background: #134e5e; color: #76c7c0; }
        [data-theme="dark"] .grade-high { background: #1b4332; color: #95d5b2; }
        [data-theme="dark"] .grade-ultra { background: #3c1361; color: #c39bd3; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .detail-item { text-align: center; padding: 15px 8px; background: var(--bg-secondary); border-radius: 12px; }
        .detail-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; }
        .detail-value { font-size: 1.15rem; font-weight: 700; }
        .compare-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .compare-table th {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 2px solid var(--border);
            color: var(--text-secondary);
            font-weight: 700;
        }
        .compare-table td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
        }
        .compare-table tr.current { background: rgba(0, 180, 216, 0.1); font-weight: 700; }
        .tip {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 15px;
            line-height: 1.7;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 12px;
        }
        @media (max-width: 480px) {
            .detail-grid { grid-template-columns: 1fr 1fr; }
            h1 { font-size: 1.4rem; }
            .ppi-number { font-size: 2.5rem; }
            .row { flex-direction: column; gap: 0; }
            .compare-table { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-btn">← 도구 목록</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </header>

        <div class="card">
            <h1>🖥️ 화면 PPI 계산기</h1>

            <label>빠른 프리셋</label>
            <div class="preset-group">
                <button class="preset-btn" onclick="setPreset(6.1,1179,2556,this)">iPhone 15</button>
                <button class="preset-btn" onclick="setPreset(6.7,1290,2796,this)">iPhone 15 Pro Max</button>
                <button class="preset-btn" onclick="setPreset(6.2,1080,2340,this)">Galaxy S24</button>
                <button class="preset-btn" onclick="setPreset(11,2420,2668,this)">iPad Pro 11"</button>
                <button class="preset-btn" onclick="setPreset(13.6,2560,1664,this)">MacBook Air 13"</button>
                <button class="preset-btn" onclick="setPreset(14.2,3024,1964,this)">MacBook Pro 14"</button>
                <button class="preset-btn" onclick="setPreset(27,3840,2160,this)">27" 4K</button>
                <button class="preset-btn" onclick="setPreset(32,3840,2160,this)">32" 4K</button>
                <button class="preset-btn" onclick="setPreset(27,5120,2880,this)">Studio Display</button>
                <button class="preset-btn" onclick="setPreset(32,6016,3384,this)">Pro Display XDR</button>
            </div>

            <div class="input-group">
                <label>화면 대각선 크기 (인치)</label>
                <input type="number" id="diagonal" placeholder="27" min="1" max="120" step="0.1" value="27">
            </div>
            <div class="row">
                <div class="input-group">
                    <label>가로 해상도 (px)</label>
                    <input type="number" id="resW" placeholder="3840" min="1" max="20000" value="3840">
                </div>
                <div class="input-group">
                    <label>세로 해상도 (px)</label>
                    <input type="number" id="resH" placeholder="2160" min="1" max="20000" value="2160">
                </div>
            </div>

            <button class="calc-btn" onclick="calculate()">PPI 계산하기</button>
        </div>

        <div class="card result" id="result">
            <div class="ppi-hero">
                <div class="ppi-number" id="ppiValue">-</div>
                <div class="ppi-label">PPI (Pixels Per Inch)</div>
                <div class="ppi-grade" id="ppiGrade">-</div>
            </div>

            <div class="detail-grid">
                <div class="detail-item">
                    <div class="detail-label">총 픽셀 수</div>
                    <div class="detail-value" id="totalPx">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">도트 피치</div>
                    <div class="detail-value" id="dotPitch">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">화면 비율</div>
                    <div class="detail-value" id="aspect">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">실제 가로</div>
                    <div class="detail-value" id="physW">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">실제 세로</div>
                    <div class="detail-value" id="physH">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">화면 면적</div>
                    <div class="detail-value" id="screenArea">-</div>
                </div>
            </div>

            <h2>📋 인기 디스플레이 비교</h2>
            <table class="compare-table">
                <thead>
                    <tr><th>기기</th><th>크기</th><th>해상도</th><th>PPI</th></tr>
                </thead>
                <tbody id="compareBody"></tbody>
            </table>

            <div class="tip">
                💡 <strong>참고:</strong> 일반적으로 PPI 100~120은 일반 모니터, 160~220은 고해상도 노트북/태블릿, 300 이상은 Retina급(맨눈으로 픽셀 구분 불가)입니다. 같은 해상도라도 화면이 작을수록 PPI가 높아 더 선명합니다.
            </div>
        </div>
    </div>

    <script>
        const devices = [
            { name: 'iPhone 15 Pro Max', diag: 6.7, w: 1290, h: 2796 },
            { name: 'Galaxy S24 Ultra', diag: 6.8, w: 1440, h: 3120 },
            { name: 'iPad Pro 11"', diag: 11, w: 2420, h: 2668 },
            { name: 'MacBook Air 13"', diag: 13.6, w: 2560, h: 1664 },
            { name: 'MacBook Pro 14"', diag: 14.2, w: 3024, h: 1964 },
            { name: '27" 4K 모니터', diag: 27, w: 3840, h: 2160 },
            { name: '32" 4K 모니터', diag: 32, w: 3840, h: 2160 },
            { name: 'Studio Display', diag: 27, w: 5120, h: 2880 },
            { name: 'Pro Display XDR', diag: 32, w: 6016, h: 3384 },
        ];

        function gcd(a, b) { return b ? gcd(b, a % b) : a; }

        function calcPPI(diag, w, h) {
            return Math.sqrt(w * w + h * h) / diag;
        }

        function setPreset(diag, w, h, btn) {
            document.getElementById('diagonal').value = diag;
            document.getElementById('resW').value = w;
            document.getElementById('resH').value = h;
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            calculate();
        }

        function calculate() {
            const diag = parseFloat(document.getElementById('diagonal').value) || 0;
            const w = parseInt(document.getElementById('resW').value) || 0;
            const h = parseInt(document.getElementById('resH').value) || 0;
            if (!diag || !w || !h) return;

            const diagPx = Math.sqrt(w * w + h * h);
            const ppi = diagPx / diag;

            document.getElementById('ppiValue').textContent = Math.round(ppi);

            // Grade
            const gradeEl = document.getElementById('ppiGrade');
            gradeEl.className = 'ppi-grade';
            if (ppi < 110) {
                gradeEl.textContent = '일반 (Standard)';
                gradeEl.classList.add('grade-low');
            } else if (ppi < 200) {
                gradeEl.textContent = '고해상도 (HiDPI)';
                gradeEl.classList.add('grade-mid');
            } else if (ppi < 350) {
                gradeEl.textContent = 'Retina급 선명도';
                gradeEl.classList.add('grade-high');
            } else {
                gradeEl.textContent = '초고밀도 (Ultra)';
                gradeEl.classList.add('grade-ultra');
            }

            // Details
            const totalPx = w * h;
            const mp = totalPx / 1000000;
            document.getElementById('totalPx').textContent = mp.toFixed(1) + 'MP';

            const dotPitch = 25.4 / ppi;
            document.getElementById('dotPitch').textContent = dotPitch.toFixed(3) + 'mm';

            const g = gcd(w, h);
            document.getElementById('aspect').textContent = (w / g) + ':' + (h / g);

            const physWin = w / ppi;
            const physHin = h / ppi;
            document.getElementById('physW').textContent = (physWin * 2.54).toFixed(1) + 'cm';
            document.getElementById('physH').textContent = (physHin * 2.54).toFixed(1) + 'cm';

            const areaCm2 = physWin * physHin * 2.54 * 2.54;
            document.getElementById('screenArea').textContent = (areaCm2 / 10000).toFixed(3) + '㎡';

            // Compare table
            const tbody = document.getElementById('compareBody');
            const userPPI = Math.round(ppi);
            const allDevices = [...devices];
            const userEntry = { name: '▶ 내 화면', diag, w, h };

            let rows = allDevices.map(d => ({
                ...d,
                ppi: Math.round(calcPPI(d.diag, d.w, d.h)),
                current: false
            }));
            rows.push({ ...userEntry, ppi: userPPI, current: true });
            rows.sort((a, b) => b.ppi - a.ppi);

            tbody.innerHTML = rows.map(r =>
                `<tr class="${r.current ? 'current' : ''}">
                    <td>${r.name}</td>
                    <td>${r.diag}"</td>
                    <td>${r.w}×${r.h}</td>
                    <td>${r.ppi}</td>
                </tr>`
            ).join('');

            document.getElementById('result').classList.add('show');
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
    </script>
</body>
</html>
