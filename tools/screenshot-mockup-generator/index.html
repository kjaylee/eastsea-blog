<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screenshot Mockup Generator - 디바이스 목업 생성기</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#121a31;
      --panel-2:#1a2444;
      --text:#eaf0ff;
      --muted:#9fb0d4;
      --accent:#6ea8fe;
      --accent2:#8b5cf6;
      --line:rgba(255,255,255,.12);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100dvh;
      font-family:Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background:radial-gradient(1200px 600px at 10% -10%, #1f2a52 0, transparent 60%),
                 radial-gradient(1200px 600px at 90% 120%, #2d1a57 0, transparent 65%),
                 var(--bg);
      color:var(--text);
      line-height:1.4;
      padding:20px;
    }
    .wrap{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:360px 1fr;gap:16px}
    .panel{
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 10px 40px rgba(0,0,0,.3);
      padding:16px;
    }
    h1{font-size:1.2rem;margin:0 0 6px}
    .sub{margin:0 0 14px;color:var(--muted);font-size:.92rem}
    .group{margin:12px 0}
    label{display:block;font-size:.86rem;color:#c9d7f7;margin-bottom:6px}
    input,select,button{
      width:100%;border:1px solid var(--line);background:#0f1730;color:var(--text);
      border-radius:12px;padding:10px 12px;font-size:.92rem;
    }
    input[type="range"]{padding:0;height:36px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    button{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;font-weight:700;cursor:pointer;transition:.2s transform;
    }
    button:hover{transform:translateY(-1px)}
    .ghost{background:#111a35;border:1px solid var(--line)}
    .canvas-wrap{display:grid;gap:10px;align-content:start}
    #preview{
      width:100%;max-height:75dvh;background:#0b1020;border-radius:14px;border:1px solid var(--line);
      box-shadow:0 14px 50px rgba(0,0,0,.35);
    }
    .meta{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:.83rem}
    .chip{background:#0e1630;border:1px solid var(--line);padding:6px 9px;border-radius:999px}
    @media (max-width:900px){.wrap{grid-template-columns:1fr}.canvas-wrap{order:-1}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>Screenshot Mockup Generator</h1>
      <p class="sub">앱 스크린샷을 디바이스 목업에 넣고 PNG로 저장하세요.</p>

      <div class="group">
        <label for="upload">스크린샷 업로드</label>
        <input id="upload" type="file" accept="image/*" />
      </div>

      <div class="row">
        <div class="group">
          <label for="device">디바이스</label>
          <select id="device">
            <option value="iphone">iPhone 15 Pro</option>
            <option value="pixel">Pixel 8</option>
            <option value="tablet">Tablet</option>
            <option value="browser">Browser Window</option>
          </select>
        </div>
        <div class="group">
          <label for="bgStyle">배경</label>
          <select id="bgStyle">
            <option value="aurora">Aurora</option>
            <option value="midnight">Midnight</option>
            <option value="sunset">Sunset</option>
            <option value="solid">Solid Color</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label for="colorA">색상 A</label>
          <input id="colorA" type="color" value="#5b7cfa" />
        </div>
        <div class="group">
          <label for="colorB">색상 B</label>
          <input id="colorB" type="color" value="#8b5cf6" />
        </div>
      </div>

      <div class="group">
        <label for="padding">여백 <span id="paddingV">70</span>px</label>
        <input id="padding" type="range" min="20" max="180" value="70" />
      </div>
      <div class="group">
        <label for="radius">라운드 <span id="radiusV">34</span>px</label>
        <input id="radius" type="range" min="8" max="80" value="34" />
      </div>
      <div class="group">
        <label for="shadow">그림자 강도 <span id="shadowV">28</span></label>
        <input id="shadow" type="range" min="0" max="60" value="28" />
      </div>
      <div class="group">
        <label for="scale">출력 너비</label>
        <select id="scale">
          <option value="1200">1200px</option>
          <option value="1600">1600px</option>
          <option value="2000">2000px</option>
        </select>
      </div>

      <div class="row">
        <button id="download">PNG 다운로드</button>
        <button id="reset" class="ghost">초기화</button>
      </div>
    </section>

    <section class="canvas-wrap">
      <canvas id="preview" width="1200" height="1500"></canvas>
      <div class="meta">
        <span class="chip" id="sizeInfo">1200 × 1500</span>
        <span class="chip">Tip: 브라우저에서 바로 편집/다운로드</span>
      </div>
    </section>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    const c = $('#preview');
    const ctx = c.getContext('2d');
    let img = new Image();
    let hasImage = false;

    const devicePresets = {
      iphone:{w:390,h:844,bezel:26,notch:true,ratio:0.46},
      pixel:{w:412,h:915,bezel:24,notch:false,ratio:0.45},
      tablet:{w:834,h:1112,bezel:30,notch:false,ratio:0.73},
      browser:{w:1366,h:768,bezel:16,notch:false,ratio:1.2}
    };

    function roundRect(x,y,w,h,r){
      const rr = Math.min(r, w/2, h/2);
      ctx.beginPath();
      ctx.moveTo(x+rr,y);
      ctx.arcTo(x+w,y,x+w,y+h,rr);
      ctx.arcTo(x+w,y+h,x,y+h,rr);
      ctx.arcTo(x,y+h,x,y,rr);
      ctx.arcTo(x,y,x+w,y,rr);
      ctx.closePath();
    }

    function drawBG(){
      const mode = $('#bgStyle').value;
      const a = $('#colorA').value;
      const b = $('#colorB').value;
      if(mode === 'solid'){
        ctx.fillStyle = a;
        ctx.fillRect(0,0,c.width,c.height);
        return;
      }
      const g = ctx.createLinearGradient(0,0,c.width,c.height);
      if(mode === 'midnight'){
        g.addColorStop(0,'#0b1020'); g.addColorStop(0.6,a); g.addColorStop(1,b);
      } else if(mode === 'sunset'){
        g.addColorStop(0,a); g.addColorStop(0.5,'#ff9966'); g.addColorStop(1,b);
      } else {
        g.addColorStop(0,a); g.addColorStop(1,b);
      }
      ctx.fillStyle = g;
      ctx.fillRect(0,0,c.width,c.height);

      for(let i=0;i<3;i++){
        const rg = ctx.createRadialGradient(
          Math.random()*c.width, Math.random()*c.height, 20,
          Math.random()*c.width, Math.random()*c.height, 500
        );
        rg.addColorStop(0,'rgba(255,255,255,.22)');
        rg.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle = rg; ctx.fillRect(0,0,c.width,c.height);
      }
    }

    function draw(){
      const preset = devicePresets[$('#device').value];
      const outputW = +$('#scale').value;
      c.width = outputW;
      c.height = Math.round(outputW * (preset.h / preset.w) + 420);
      $('#sizeInfo').textContent = `${c.width} × ${c.height}`;

      drawBG();

      const pad = +$('#padding').value;
      const radius = +$('#radius').value;
      const shadow = +$('#shadow').value;

      const areaW = c.width - pad*2;
      const deviceW = Math.min(areaW, c.width * 0.72);
      const deviceH = Math.round(deviceW / preset.ratio);
      const x = (c.width - deviceW)/2;
      const y = (c.height - deviceH)/2;

      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,.45)';
      ctx.shadowBlur = shadow * 2;
      ctx.shadowOffsetY = Math.max(8, shadow);
      roundRect(x,y,deviceW,deviceH,radius);
      ctx.fillStyle = '#0f111a';
      ctx.fill();
      ctx.restore();

      const bezel = Math.round(deviceW * (preset.bezel/390));
      const sx = x + bezel;
      const sy = y + bezel + ($('#device').value === 'browser' ? 22 : 0);
      const sw = deviceW - bezel*2;
      const sh = deviceH - bezel*2;

      if($('#device').value === 'browser'){
        ctx.save();
        roundRect(x+2,y+2,deviceW-4,44,12);
        ctx.fillStyle = '#1f2433';
        ctx.fill();
        ['#ff5f57','#febc2e','#28c840'].forEach((col,i)=>{
          ctx.beginPath();
          ctx.arc(x+24 + i*18, y+22, 6.3, 0, Math.PI*2);
          ctx.fillStyle = col; ctx.fill();
        });
        ctx.restore();
      }

      ctx.save();
      roundRect(sx,sy,sw,sh,Math.max(10,radius-12));
      ctx.clip();
      if(hasImage){
        const r = Math.max(sw / img.width, sh / img.height);
        const iw = img.width * r, ih = img.height * r;
        ctx.drawImage(img, sx + (sw-iw)/2, sy + (sh-ih)/2, iw, ih);
      } else {
        const ph = ctx.createLinearGradient(sx,sy,sx+sw,sy+sh);
        ph.addColorStop(0,'#303a5f'); ph.addColorStop(1,'#1f2334');
        ctx.fillStyle = ph; ctx.fillRect(sx,sy,sw,sh);
        ctx.fillStyle = 'rgba(255,255,255,.75)';
        ctx.font = `600 ${Math.max(20,sw*0.06)}px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText('Upload Screenshot', sx + sw/2, sy + sh/2);
      }
      ctx.restore();

      if(preset.notch){
        const nw = deviceW*0.38, nh = deviceH*0.035;
        roundRect(x + (deviceW-nw)/2, y + bezel*0.3, nw, nh, nh/2);
        ctx.fillStyle = '#090b12';
        ctx.fill();
      }
    }

    $('#upload').addEventListener('change', e => {
      const file = e.target.files?.[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        img.onload = () => { hasImage = true; draw(); };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    ['device','bgStyle','colorA','colorB','scale'].forEach(id => $("#"+id).addEventListener('input', draw));
    [['padding','paddingV'],['radius','radiusV'],['shadow','shadowV']].forEach(([i,v])=>{
      const input = $('#'+i), out = $('#'+v);
      input.addEventListener('input',()=>{ out.textContent = input.value; draw(); });
    });

    $('#download').addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = c.toDataURL('image/png');
      a.download = 'mockup.png';
      a.click();
    });

    $('#reset').addEventListener('click', () => {
      $('#device').value='iphone'; $('#bgStyle').value='aurora';
      $('#colorA').value='#5b7cfa'; $('#colorB').value='#8b5cf6';
      $('#padding').value=70; $('#paddingV').textContent='70';
      $('#radius').value=34; $('#radiusV').textContent='34';
      $('#shadow').value=28; $('#shadowV').textContent='28';
      $('#scale').value='1200';
      hasImage=false; $('#upload').value='';
      draw();
    });

    draw();
  </script>
</body>
</html>
