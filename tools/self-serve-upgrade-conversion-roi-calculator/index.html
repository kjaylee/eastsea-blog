<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self-serve Upgrade Conversion ROI Calculator | 셀프서브 업그레이드 전환 ROI 계산기</title>
  <meta name="description" content="셀프서브 업그레이드 전환율 개선 시 순증 업그레이드, 월 순효과, ROI, 회수기간, 손익분기 전환율을 계산하는 수익화 도구" />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🧭 셀프서브 업그레이드 전환 ROI 계산기</h1>
        <div class="sub" id="subtitle">업그레이드 퍼널 전환율 개선이 월 순효과와 회수기간에 주는 영향을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_exposedUsers" for="exposedUsers"></label><input id="exposedUsers" type="number" min="1" value="180000"></div>
          <div><label id="l_baseConv" for="baseConv"></label><input id="baseConv" type="number" min="0" max="100" step="0.1" value="1.8"></div>
          <div><label id="l_targetConv" for="targetConv"></label><input id="targetConv" type="number" min="0" max="100" step="0.1" value="2.6"></div>
          <div><label id="l_arpuDelta" for="arpuDelta"></label><input id="arpuDelta" type="number" min="0" step="100" value="29000"></div>
          <div><label id="l_marginRate" for="marginRate"></label><input id="marginRate" type="number" min="0" max="100" step="0.1" value="79"></div>
          <div><label id="l_supportCost" for="supportCost"></label><input id="supportCost" type="number" min="0" step="100" value="1900"></div>
          <div><label id="l_monthlyCost" for="monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="9000000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="15000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_incrementalUpgrades"></div><div class="v" id="incrementalUpgrades">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyContribution"></div><div class="v" id="monthlyContribution">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_breakEvenConv"></div><div class="v" id="breakEvenConv">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_unitContribution"></th><td id="unitContribution">-</td></tr>
          <tr><th id="d_baseUpgrades"></th><td id="baseUpgrades">-</td></tr>
          <tr><th id="d_targetUpgrades"></th><td id="targetUpgrades">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={exposedUsers:$("exposedUsers"),baseConv:$("baseConv"),targetConv:$("targetConv"),arpuDelta:$("arpuDelta"),marginRate:$("marginRate"),supportCost:$("supportCost"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),incrementalUpgrades:$("incrementalUpgrades"),monthlyContribution:$("monthlyContribution"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),breakEvenConv:$("breakEvenConv"),unitContribution:$("unitContribution"),baseUpgrades:$("baseUpgrades"),targetUpgrades:$("targetUpgrades"),payback:$("payback"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={exposedUsers:180000,baseConv:1.8,targetConv:2.6,arpuDelta:29000,marginRate:79,supportCost:1900,monthlyCost:9000000,setup:15000000,months:12};
    const I18N={
      ko:{title:"🧭 셀프서브 업그레이드 전환 ROI 계산기",subtitle:"업그레이드 퍼널 전환율 개선이 월 순효과와 회수기간에 주는 영향을 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_exposedUsers:"월 업그레이드 노출 사용자 수",l_baseConv:"현재 업그레이드 전환율 (%)",l_targetConv:"목표 업그레이드 전환율 (%)",l_arpuDelta:"업그레이드 월 ARPU 증분 (₩)",l_marginRate:"공헌마진율 (%)",l_supportCost:"업그레이드 사용자당 월 추가 지원비 (₩)",l_monthlyCost:"월 운영비 (₩)",l_setup:"초기 실험비 (₩)",l_months:"분석 기간 (개월)",k_incrementalUpgrades:"순증 업그레이드 수",k_monthlyContribution:"월 증분 공헌이익",k_monthlyNet:"월 순효과",k_roi:"ROI",k_periodNet:"기간 순효과",k_breakEvenConv:"손익분기 목표 전환율",d_unitContribution:"업그레이드 1명당 순기여",d_baseUpgrades:"현재 업그레이드 수",d_targetUpgrades:"목표 업그레이드 수",d_payback:"회수기간",ok:"셀프서브 업그레이드 경제성 계산 완료",warn:"현재 가정에서는 월 순효과가 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 사용자수/기간은 1 이상이어야 합니다.",convErr:"목표 전환율은 현재 전환율 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[Self-serve Upgrade Conversion 요약]",unitMonths:"개월"},
      en:{title:"🧭 Self-serve Upgrade Conversion ROI Calculator",subtitle:"Model profitability impact from improving self-serve upgrade conversion.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_exposedUsers:"Monthly users exposed to upgrade",l_baseConv:"Current upgrade conversion (%)",l_targetConv:"Target upgrade conversion (%)",l_arpuDelta:"Incremental monthly ARPU per upgrader (KRW)",l_marginRate:"Contribution margin (%)",l_supportCost:"Monthly support cost per upgrader (KRW)",l_monthlyCost:"Monthly operating cost (KRW)",l_setup:"One-time experiment cost (KRW)",l_months:"Analysis period (months)",k_incrementalUpgrades:"Incremental upgrades",k_monthlyContribution:"Monthly incremental contribution",k_monthlyNet:"Monthly net impact",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_breakEvenConv:"Break-even target conversion",d_unitContribution:"Net contribution per upgrader",d_baseUpgrades:"Baseline upgrades",d_targetUpgrades:"Target upgrades",d_payback:"Payback period",ok:"Self-serve upgrade economics ready",warn:"Monthly net impact is negative under current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and users/months must be >= 1.",convErr:"Target conversion must be greater than or equal to baseline conversion.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Self-serve Upgrade Conversion Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["exposedUsers","baseConv","targetConv","arpuDelta","marginRate","supportCost","monthlyCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["incrementalUpgrades","monthlyContribution","monthlyNet","roi","periodNet","breakEvenConv"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["unitContribution","baseUpgrades","targetUpgrades","payback"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.exposedUsers)||v.exposedUsers<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.arpuDelta,v.supportCost,v.monthlyCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.baseConv,v.targetConv,v.marginRate].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetConv<v.baseConv) return t("convErr");
      return "";
    }

    function render(){
      const v={exposedUsers:Number(refs.exposedUsers.value),baseConv:Number(refs.baseConv.value),targetConv:Number(refs.targetConv.value),arpuDelta:Number(refs.arpuDelta.value),marginRate:Number(refs.marginRate.value),supportCost:Number(refs.supportCost.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["incrementalUpgrades","monthlyContribution","monthlyNet","roi","periodNet","breakEvenConv","unitContribution","baseUpgrades","targetUpgrades","payback"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const baseRate=v.baseConv/100;
      const targetRate=v.targetConv/100;
      const margin=v.marginRate/100;
      const baseUpgrades=v.exposedUsers*baseRate;
      const targetUpgrades=v.exposedUsers*targetRate;
      const incrementalUpgrades=Math.max(0,targetUpgrades-baseUpgrades);
      const unitContribution=(v.arpuDelta*margin)-v.supportCost;
      const monthlyContribution=incrementalUpgrades*unitContribution;
      const monthlyNet=monthlyContribution-v.monthlyCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalCost>0?(periodNet/totalCost)*100:0;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      let breakEvenConv=Infinity;
      if(unitContribution>0 && v.exposedUsers>0){
        const targetUpgradesNeeded=baseUpgrades+(v.monthlyCost/unitContribution);
        breakEvenConv=(targetUpgradesNeeded/v.exposedUsers)*100;
      }

      refs.incrementalUpgrades.textContent=num(incrementalUpgrades,0);
      refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.breakEvenConv.textContent=(Number.isFinite(breakEvenConv)&&breakEvenConv>=0&&breakEvenConv<=100)?pct(breakEvenConv,2):t("na");
      refs.unitContribution.textContent=won(unitContribution);
      refs.baseUpgrades.textContent=num(baseUpgrades,0);
      refs.targetUpgrades.textContent=num(targetUpgrades,0);
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_incrementalUpgrades")}: ${num(incrementalUpgrades,0)}`,`${t("d_unitContribution")}: ${won(unitContribution)}`,`${t("k_monthlyContribution")}: ${won(monthlyContribution)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("k_breakEvenConv")}: ${(Number.isFinite(breakEvenConv)&&breakEvenConv>=0&&breakEvenConv<=100)?pct(breakEvenConv,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.exposedUsers,refs.baseConv,refs.targetConv,refs.arpuDelta,refs.marginRate,refs.supportCost,refs.monthlyCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
