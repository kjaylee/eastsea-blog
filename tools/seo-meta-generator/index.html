<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO 메타태그 생성기 | SEO Meta Generator</title>
  <meta name="description" content="SEO/OG/Twitter 메타태그와 JSON-LD를 빠르게 생성하는 도구" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a1020;
      --card: #121b35;
      --line: #2a3f77;
      --text: #eef3ff;
      --muted: #9db0dd;
      --primary: #7a92ff;
      --ok: #2fd399;
      --warn: #ffba64;
      --danger: #ff7e8e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% 0%, #1f3167 0%, var(--bg) 48%);
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 20px 14px 56px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.8vw, 1.75rem); }
    .sub { margin-top: 6px; color: var(--muted); font-size: .92rem; }
    .home { text-decoration: none; color: var(--text); border: 1px solid var(--line); background: #111938; border-radius: 12px; padding: 8px 12px; font-size: .88rem; white-space: nowrap; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(165deg, #19284e, var(--card));
      padding: 14px;
    }
    h2 { margin: 0 0 10px; font-size: 1.04rem; }
    .form { display: grid; gap: 10px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: block; margin-bottom: 5px; color: var(--muted); font-size: .81rem; }
    input, textarea, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1732;
      color: var(--text);
      padding: 10px;
      font: inherit;
      font-size: .92rem;
    }
    textarea { min-height: 92px; resize: vertical; }
    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #5e74f1);
    }
    .btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
    .soft { background: #1a2850; border: 1px solid var(--line); font-weight: 600; }
    .status { margin-top: 8px; min-height: 1.3em; color: var(--ok); font-size: .9rem; }
    .error { color: var(--danger); }
    .meta-box {
      width: 100%;
      min-height: 290px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #091127;
      color: #dce8ff;
      padding: 12px;
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre;
      overflow: auto;
    }
    .preview {
      margin-top: 10px;
      border: 1px solid #385596;
      background: #0b142f;
      border-radius: 12px;
      padding: 10px;
    }
    .snippet-url { color: #84b4ff; font-size: .82rem; margin-bottom: 4px; overflow-wrap: anywhere; }
    .snippet-title { color: #9cc2ff; font-size: 1.02rem; font-weight: 700; margin-bottom: 5px; }
    .snippet-desc { color: #d8e4ff; font-size: .88rem; line-height: 1.4; }
    .meta { color: var(--muted); font-size: .78rem; margin-top: 6px; }
    @media (max-width: 900px) {
      .grid, .two { grid-template-columns: 1fr; }
      .btns { grid-template-columns: 1fr 1fr; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🔎 SEO 메타태그 생성기</h1>
        <div class="sub">페이지 정보 입력 → 메타태그 생성 → 복사/다운로드까지 한 번에 처리합니다.</div>
      </div>
      <a class="home" href="/tools/">도구 목록</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="form">
          <div>
            <label for="title">페이지 제목 * (권장 30~60자)</label>
            <input id="title" maxlength="90" placeholder="예: 2026 모바일 게임 트렌드 리포트" />
          </div>
          <div>
            <label for="description">설명 * (권장 70~160자)</label>
            <textarea id="description" maxlength="220" placeholder="검색 결과에서 보일 요약 설명을 입력하세요."></textarea>
          </div>
          <div class="two">
            <div>
              <label for="url">정식 URL * (https://)</label>
              <input id="url" type="url" placeholder="https://example.com/page" />
            </div>
            <div>
              <label for="siteName">사이트명 *</label>
              <input id="siteName" placeholder="예: EastSea Blog" />
            </div>
          </div>
          <div class="two">
            <div>
              <label for="image">대표 이미지 URL (OG 이미지)</label>
              <input id="image" type="url" placeholder="https://example.com/og.jpg" />
            </div>
            <div>
              <label for="keywords">키워드 (쉼표 구분)</label>
              <input id="keywords" placeholder="모바일게임,게임개발,유저획득" />
            </div>
          </div>
          <div class="two">
            <div>
              <label for="ogType">OG 타입</label>
              <select id="ogType">
                <option>website</option>
                <option>article</option>
                <option>product</option>
              </select>
            </div>
            <div>
              <label for="locale">로케일</label>
              <input id="locale" value="ko_KR" />
            </div>
          </div>
          <div class="two">
            <div>
              <label for="twitter">트위터 계정 (선택, @없이)</label>
              <input id="twitter" placeholder="eastseablog" />
            </div>
            <div>
              <label for="schemaType">Schema 타입</label>
              <select id="schemaType">
                <option>WebPage</option>
                <option>Article</option>
                <option>Product</option>
              </select>
            </div>
          </div>
          <div class="btns">
            <button id="generate" type="button">태그 생성</button>
            <button id="copy" class="soft" type="button">태그 복사</button>
            <button id="download" class="soft" type="button">파일 다운로드</button>
          </div>
          <div id="status" class="status"></div>
        </div>
      </article>

      <article class="card">
        <h2>결과</h2>
        <pre id="output" class="meta-box">생성 버튼을 누르면 메타태그가 표시됩니다.</pre>
        <div class="preview">
          <div class="snippet-url" id="pvUrl">https://example.com/page</div>
          <div class="snippet-title" id="pvTitle">검색 결과 제목 미리보기</div>
          <div class="snippet-desc" id="pvDesc">설명을 입력하면 검색 스니펫 미리보기가 표시됩니다.</div>
          <div class="meta" id="metaInfo">제목 길이: 0자 · 설명 길이: 0자</div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const E = {
      title: $("title"),
      description: $("description"),
      url: $("url"),
      siteName: $("siteName"),
      image: $("image"),
      keywords: $("keywords"),
      ogType: $("ogType"),
      locale: $("locale"),
      twitter: $("twitter"),
      schemaType: $("schemaType"),
      generate: $("generate"),
      copy: $("copy"),
      download: $("download"),
      status: $("status"),
      output: $("output"),
      pvUrl: $("pvUrl"),
      pvTitle: $("pvTitle"),
      pvDesc: $("pvDesc"),
      metaInfo: $("metaInfo")
    };

    let lastOutput = "";

    const escapeAttr = (value) => value.replace(/&/g, "&amp;").replace(/"/g, "&quot;").trim();
    const isHttpUrl = (value) => {
      try {
        const u = new URL(value);
        return u.protocol === "http:" || u.protocol === "https:";
      } catch {
        return false;
      }
    };

    function validateInput() {
      const title = E.title.value.trim();
      const description = E.description.value.trim();
      const url = E.url.value.trim();
      const siteName = E.siteName.value.trim();
      const image = E.image.value.trim();

      if (!title) return "페이지 제목을 입력하세요.";
      if (!description) return "설명을 입력하세요.";
      if (!url) return "정식 URL을 입력하세요.";
      if (!siteName) return "사이트명을 입력하세요.";
      if (!isHttpUrl(url)) return "정식 URL은 http 또는 https로 시작해야 합니다.";
      if (image && !isHttpUrl(image)) return "대표 이미지 URL 형식이 올바르지 않습니다.";
      if (description.length < 50) return "설명은 최소 50자 이상 권장됩니다.";
      return "";
    }

    function updatePreview() {
      const title = E.title.value.trim();
      const description = E.description.value.trim();
      const url = E.url.value.trim();
      E.pvTitle.textContent = title || "검색 결과 제목 미리보기";
      E.pvDesc.textContent = description || "설명을 입력하면 검색 스니펫 미리보기가 표시됩니다.";
      E.pvUrl.textContent = url || "https://example.com/page";
      E.metaInfo.textContent = `제목 길이: ${title.length}자 · 설명 길이: ${description.length}자`;
    }

    function buildMetaTags() {
      const title = E.title.value.trim();
      const description = E.description.value.trim();
      const url = E.url.value.trim();
      const siteName = E.siteName.value.trim();
      const image = E.image.value.trim();
      const keywords = E.keywords.value.trim();
      const ogType = E.ogType.value;
      const locale = E.locale.value.trim() || "ko_KR";
      const twitter = E.twitter.value.trim();
      const schemaType = E.schemaType.value;

      const tagLines = [
        `<!-- 기본 SEO -->`,
        `<title>${title}</title>`,
        `<meta name="description" content="${escapeAttr(description)}" />`,
        `<meta name="robots" content="index,follow,max-image-preview:large" />`,
        `<link rel="canonical" href="${escapeAttr(url)}" />`
      ];

      if (keywords) {
        tagLines.push(`<meta name="keywords" content="${escapeAttr(keywords)}" />`);
      }

      tagLines.push(
        "",
        "<!-- Open Graph -->",
        `<meta property="og:type" content="${escapeAttr(ogType)}" />`,
        `<meta property="og:locale" content="${escapeAttr(locale)}" />`,
        `<meta property="og:site_name" content="${escapeAttr(siteName)}" />`,
        `<meta property="og:title" content="${escapeAttr(title)}" />`,
        `<meta property="og:description" content="${escapeAttr(description)}" />`,
        `<meta property="og:url" content="${escapeAttr(url)}" />`
      );

      if (image) {
        tagLines.push(`<meta property="og:image" content="${escapeAttr(image)}" />`);
      }

      tagLines.push(
        "",
        "<!-- Twitter Card -->",
        `<meta name="twitter:card" content="summary_large_image" />`,
        `<meta name="twitter:title" content="${escapeAttr(title)}" />`,
        `<meta name="twitter:description" content="${escapeAttr(description)}" />`
      );

      if (image) {
        tagLines.push(`<meta name="twitter:image" content="${escapeAttr(image)}" />`);
      }
      if (twitter) {
        tagLines.push(`<meta name="twitter:site" content="@${escapeAttr(twitter.replace(/^@/, ""))}" />`);
      }

      const schemaData = {
        "@context": "https://schema.org",
        "@type": schemaType,
        name: title,
        description,
        url,
        inLanguage: locale.replace("_", "-"),
        publisher: {
          "@type": "Organization",
          name: siteName
        }
      };
      if (image) schemaData.image = image;

      tagLines.push(
        "",
        "<!-- JSON-LD -->",
        `<script type="application/ld+json">`,
        `${JSON.stringify(schemaData, null, 2)}`,
        `<\/script>`
      );

      return tagLines.join("\n");
    }

    async function copyOutput() {
      if (!lastOutput) {
        setStatus("먼저 태그를 생성하세요.", true);
        return;
      }
      try {
        await navigator.clipboard.writeText(lastOutput);
        setStatus("메타태그가 클립보드에 복사되었습니다.");
      } catch {
        setStatus("클립보드 복사에 실패했습니다.", true);
      }
    }

    function downloadOutput() {
      if (!lastOutput) {
        setStatus("먼저 태그를 생성하세요.", true);
        return;
      }
      const slug = (E.title.value.trim() || "seo-meta").toLowerCase().replace(/[^a-z0-9가-힣]+/g, "-").replace(/(^-|-$)/g, "");
      const blob = new Blob([lastOutput], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${slug || "seo-meta"}-tags.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus("메타태그 파일을 다운로드했습니다.");
    }

    function setStatus(message, isError = false) {
      E.status.textContent = message;
      E.status.classList.toggle("error", isError);
    }

    E.generate.addEventListener("click", () => {
      const error = validateInput();
      if (error) {
        setStatus(error, true);
        return;
      }
      lastOutput = buildMetaTags();
      E.output.textContent = lastOutput;
      setStatus("메타태그 생성 완료");
      updatePreview();
    });

    E.copy.addEventListener("click", copyOutput);
    E.download.addEventListener("click", downloadOutput);
    [E.title, E.description, E.url].forEach((node) => node.addEventListener("input", updatePreview));

    E.siteName.value = "EastSea Blog";
    E.url.value = "https://eastsea.blog/example-page";
    updatePreview();
  </script>
</body>
</html>
