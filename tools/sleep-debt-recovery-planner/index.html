<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수면 부채 회복 플래너 | Neon Utility</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #111128;
      --text: #e9ecff;
      --muted: #a7aed6;
      --line: #2a2f58;
      --neon: #00f5d4;
      --neon-2: #7c4dff;
      --danger: #ff5d8f;
      --warn: #ffd166;
      --ok: #4cff86;
      --radius: 16px;
      --shadow: 0 0 0 1px rgba(0, 245, 212, 0.2), 0 12px 28px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% -10%, rgba(124, 77, 255, 0.25), transparent 40%),
        radial-gradient(circle at 100% 0%, rgba(0, 245, 212, 0.15), transparent 35%),
        var(--bg);
      min-height: 100vh;
      line-height: 1.45;
    }

    .wrap {
      width: min(980px, 92vw);
      margin: 28px auto 48px;
      display: grid;
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    h1 {
      font-size: clamp(1.35rem, 2.5vw, 2rem);
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      font-size: 0.72rem;
      color: #001b17;
      background: var(--neon);
      border-radius: 999px;
      padding: 4px 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }

    .field {
      grid-column: span 4;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.87rem;
      color: var(--muted);
    }

    input[type="number"] {
      width: 100%;
      background: #0d1022;
      border: 1px solid #2f3566;
      color: var(--text);
      padding: 10px 11px;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.2);
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(60px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .day {
      background: #0e1230;
      border: 1px solid #313974;
      border-radius: 12px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .day span {
      font-size: 0.76rem;
      color: var(--muted);
    }

    .day input {
      font-size: 0.9rem;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #39438b;
      background: #0a0f2a;
      color: var(--text);
      width: 100%;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: 1px solid #355680;
      background: #0d1f38;
      color: #dff7ff;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.88rem;
    }

    button.primary {
      background: linear-gradient(120deg, rgba(0,245,212,.18), rgba(124,77,255,.25));
      border-color: rgba(0,245,212,.6);
      color: #eafffb;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 4px;
    }

    .metric {
      background: #0e1435;
      border: 1px solid #2b356f;
      border-radius: 12px;
      padding: 12px;
    }

    .metric p {
      margin: 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 1.16rem;
    }

    .neon { color: var(--neon); }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .danger { color: var(--danger); }

    .bar-wrap {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #141a3b;
      border: 1px solid #2a3472;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--neon), #31a8ff);
      transition: width .3s ease;
    }

    .plan {
      margin-top: 12px;
      background: #0d1230;
      border: 1px dashed #3a468e;
      border-radius: 12px;
      padding: 12px;
      color: #dbe4ff;
      font-size: 0.92rem;
      white-space: pre-wrap;
    }

    .footer {
      color: #8f98c8;
      font-size: 0.78rem;
      margin-top: 6px;
    }

    @media (max-width: 860px) {
      .field { grid-column: span 6; }
      .result-grid { grid-template-columns: 1fr; }
      .week-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 560px) {
      .wrap { width: 94vw; margin-top: 18px; }
      .card { padding: 14px; }
      .field { grid-column: span 12; }
      .week-grid { grid-template-columns: repeat(2, 1fr); }
      button { width: 100%; }
    }
  </style>
<script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>수면 부채 회복 플래너 <span class="badge">LOCAL ONLY</span></h1>
      <p class="sub">최근 수면 부족량(부채)을 계산하고, 무리하지 않는 회복 플랜을 제안합니다. 입력값은 브라우저에 자동 저장됩니다.</p>
    </section>

    <section class="card">
      <div class="grid">
        <div class="field">
          <label for="targetSleep">목표 수면 (시간/일)</label>
          <input id="targetSleep" type="number" min="4" max="12" step="0.1" value="8" />
        </div>
        <div class="field">
          <label for="recoveryDays">회복 기간 (일)</label>
          <input id="recoveryDays" type="number" min="1" max="30" step="1" value="7" />
        </div>
        <div class="field">
          <label for="maxExtra">일일 추가 수면 상한 (시간)</label>
          <input id="maxExtra" type="number" min="0.5" max="4" step="0.1" value="1.5" />
        </div>
      </div>

      <h3 style="margin:16px 0 6px; font-size:1rem;">최근 7일 실제 수면 시간</h3>
      <div class="week-grid" id="weekInputs"></div>

      <div class="actions">
        <button class="primary" id="calcBtn">계산하기</button>
        <button id="presetTired">예시: 평일 부족형</button>
        <button id="presetGood">예시: 균형형</button>
        <button id="resetBtn">초기화</button>
      </div>
    </section>

    <section class="card">
      <div class="result-grid">
        <article class="metric">
          <p>최근 7일 수면 부채</p>
          <strong id="debtVal" class="neon">0.0시간</strong>
        </article>
        <article class="metric">
          <p>권장 일일 추가 수면</p>
          <strong id="dailyExtraVal" class="ok">+0.0시간</strong>
        </article>
        <article class="metric">
          <p>회복 가능성</p>
          <strong id="feasibilityVal" class="warn">검토 필요</strong>
        </article>
      </div>

      <div class="bar-wrap">
        <div style="display:flex;justify-content:space-between;font-size:.84rem;color:var(--muted);">
          <span>부채 회복 진행 예상</span>
          <span id="barLabel">0%</span>
        </div>
        <div class="bar"><i id="progressBar"></i></div>
      </div>

      <div id="planText" class="plan">입력 후 "계산하기"를 눌러 주세요.</div>
      <p class="footer">⚠️ 본 도구는 일반적인 생활 관리용 참고 자료이며, 의학적 진단을 대체하지 않습니다.</p>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const STORAGE_KEY = 'sleepDebtRecoveryPlanner.v1';

    const dayLabels = ['월', '화', '수', '목', '금', '토', '일'];
    const weekInputs = $('weekInputs');

    function createDayInputs() {
      weekInputs.innerHTML = '';
      for (let i = 0; i < 7; i++) {
        const box = document.createElement('label');
        box.className = 'day';
        box.innerHTML = `<span>${dayLabels[i]}</span><input type="number" min="0" max="14" step="0.1" data-day="${i}" value="7.0" aria-label="${dayLabels[i]} 수면 시간">`;
        weekInputs.appendChild(box);
      }
    }

    function getDayValues() {
      return [...weekInputs.querySelectorAll('input')].map(input => clamp(parseFloat(input.value) || 0, 0, 14));
    }

    function setDayValues(values = []) {
      const inputs = [...weekInputs.querySelectorAll('input')];
      inputs.forEach((input, i) => {
        const v = typeof values[i] === 'number' ? values[i] : 7;
        input.value = Number(v).toFixed(1);
      });
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function fmt(v) {
      return `${v.toFixed(1)}시간`;
    }

    function saveState() {
      const state = {
        targetSleep: parseFloat($('targetSleep').value) || 8,
        recoveryDays: parseInt($('recoveryDays').value, 10) || 7,
        maxExtra: parseFloat($('maxExtra').value) || 1.5,
        days: getDayValues()
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);
        if (state.targetSleep) $('targetSleep').value = state.targetSleep;
        if (state.recoveryDays) $('recoveryDays').value = state.recoveryDays;
        if (state.maxExtra) $('maxExtra').value = state.maxExtra;
        if (Array.isArray(state.days)) setDayValues(state.days);
      } catch (_) {}
    }

    function calculate() {
      const target = clamp(parseFloat($('targetSleep').value) || 8, 4, 12);
      const recoveryDays = clamp(parseInt($('recoveryDays').value, 10) || 7, 1, 30);
      const maxExtra = clamp(parseFloat($('maxExtra').value) || 1.5, 0.5, 4);
      const days = getDayValues();

      $('targetSleep').value = target;
      $('recoveryDays').value = recoveryDays;
      $('maxExtra').value = maxExtra;

      const expected = target * 7;
      const actual = days.reduce((a, b) => a + b, 0);
      const debt = Math.max(0, expected - actual);
      const perDayNeed = debt / recoveryDays;
      const feasibleExtra = Math.min(perDayNeed, maxExtra);
      const progress = debt === 0 ? 100 : clamp((feasibleExtra * recoveryDays / debt) * 100, 0, 100);

      $('debtVal').textContent = fmt(debt);
      $('dailyExtraVal').textContent = `+${feasibleExtra.toFixed(1)}시간`;

      const feasibilityEl = $('feasibilityVal');
      feasibilityEl.className = '';

      let feasibilityText = '';
      if (debt === 0) {
        feasibilityText = '부채 없음';
        feasibilityEl.classList.add('ok');
      } else if (perDayNeed <= maxExtra) {
        feasibilityText = '현실적';
        feasibilityEl.classList.add('ok');
      } else {
        feasibilityText = '기간/상한 조정 필요';
        feasibilityEl.classList.add('danger');
      }
      feasibilityEl.textContent = feasibilityText;

      $('progressBar').style.width = `${progress.toFixed(1)}%`;
      $('barLabel').textContent = `${progress.toFixed(0)}%`;

      const bedtimeShiftMinutes = Math.round(feasibleExtra * 60);
      const missing = Math.max(0, debt - feasibleExtra * recoveryDays);

      let plan = '';
      if (debt === 0) {
        plan = '✅ 최근 7일 기준 수면 부채가 없습니다.\n현재 패턴을 유지하세요.\n\n추천: 취침/기상 시간을 주말에도 ±1시간 이내로 맞추면 컨디션 유지에 유리합니다.';
      } else {
        plan = [
          `최근 7일 목표(${target.toFixed(1)}h × 7일): ${expected.toFixed(1)}시간`,
          `실제 수면 합계: ${actual.toFixed(1)}시간`,
          `수면 부채: ${debt.toFixed(1)}시간`,
          '',
          `회복 ${recoveryDays}일 계획`,
          `- 매일 목표 수면: ${(target + feasibleExtra).toFixed(1)}시간`,
          `- 기존보다 약 ${bedtimeShiftMinutes}분 일찍 취침 권장`,
          `- 낮잠은 20~30분 이내(늦은 오후 제외) 권장`,
          '',
          missing > 0
            ? `⚠️ 현재 조건으로는 약 ${missing.toFixed(1)}시간이 남습니다.\n   회복 기간을 늘리거나 일일 상한을 조정해 주세요.`
            : '✅ 현재 조건으로 전량 회복 가능한 플랜입니다.'
        ].join('\n');
      }

      $('planText').textContent = plan;
      saveState();
    }

    function bindEvents() {
      const autoSaveTargets = ['targetSleep', 'recoveryDays', 'maxExtra'];
      autoSaveTargets.forEach(id => {
        $(id).addEventListener('input', () => { saveState(); calculate(); });
      });

      weekInputs.addEventListener('input', (e) => {
        if (e.target.matches('input')) {
          saveState();
          calculate();
        }
      });

      $('calcBtn').addEventListener('click', calculate);

      $('presetTired').addEventListener('click', () => {
        setDayValues([5.8, 6.2, 5.9, 6.1, 6.0, 8.3, 8.1]);
        $('targetSleep').value = 8;
        $('recoveryDays').value = 7;
        $('maxExtra').value = 1.5;
        calculate();
      });

      $('presetGood').addEventListener('click', () => {
        setDayValues([7.5, 7.8, 8.0, 7.9, 8.1, 8.2, 7.7]);
        $('targetSleep').value = 8;
        $('recoveryDays').value = 5;
        $('maxExtra').value = 1.0;
        calculate();
      });

      $('resetBtn').addEventListener('click', () => {
        $('targetSleep').value = 8;
        $('recoveryDays').value = 7;
        $('maxExtra').value = 1.5;
        setDayValues([7,7,7,7,7,7,7]);
        localStorage.removeItem(STORAGE_KEY);
        calculate();
      });
    }

    createDayInputs();
    loadState();
    bindEvents();
    calculate();
  </script>
</body>
</html>
