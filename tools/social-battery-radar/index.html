      function drawChart(canvas, traits) {
        if (!canvas) return;
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const rect = canvas.getBoundingClientRect();
        const width = Math.max(300, Math.floor(rect.width));
        const height = 280;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, width, height);

        const entries = [
          { label: state.lang === 'ko' ? '관계 에너지' : 'Social', value: traits.social, color: '#f59e0b' },
          { label: state.lang === 'ko' ? '집중 밀도' : 'Focus', value: traits.focus, color: '#60a5fa' },
          { label: state.lang === 'ko' ? '공감 조율' : 'Empathy', value: traits.empathy, color: '#34d399' },
          { label: state.lang === 'ko' ? '회복 탄력' : 'Recovery', value: traits.recovery, color: '#a78bfa' }
        ];

        const left = 108;
        const top = 22;
        const barH = 36;
        const gap = 18;
        const maxW = width - left - 24;

        ctx.font = '13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
        ctx.textBaseline = 'middle';

        entries.forEach((e, i) => {
          const y = top + i * (barH + gap);
          const w = Math.round((e.value / 100) * maxW);

          ctx.fillStyle = 'rgba(255,255,255,.2)';
          roundRect(ctx, left, y, maxW, barH, 10);
          ctx.fill();

          const grad = ctx.createLinearGradient(left, y, left + Math.max(8, w), y);
          grad.addColorStop(0, e.color);
          grad.addColorStop(1, 'rgba(255,255,255,.9)');
          ctx.fillStyle = grad;
          roundRect(ctx, left, y, Math.max(8, w), barH, 10);
          ctx.fill();

          ctx.fillStyle = 'rgba(255,255,255,.92)';
          ctx.fillText(e.label, 8, y + barH / 2);

          ctx.fillStyle = '#fff';
          ctx.font = '700 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
          ctx.fillText(`${e.value}`, left + Math.min(maxW - 26, w + 8), y + barH / 2);
          ctx.font = '13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
        });
      }

      function roundRect(ctx, x, y, w, h, r) {
        const rr = Math.min(r, h / 2, w / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

        const fill = document.getElementById('miniFill');
        const label = document.getElementById('miniLabel');

        const timer = setInterval(() => {
          value = Math.min(96, value + Math.floor(Math.random() * 11) + 5);
          fill.style.width = value + '%';
          label.textContent = `${value}%`;
        }, 180);

        setTimeout(() => {
          clearInterval(timer);
          fill.style.width = '100%';
          label.textContent = '100%';
          state.resultType = computeResultType();
          saveResult(state.resultType);
          state.screen = 'result';
          render();
          haptic('success');
        }, 1600);
      }

      function renderAnalyzing() {
        app.innerHTML = `
          <section class="card">
            <div class="card-inner analyzing">
              <div class="spinner"></div>
              <h2>${t('analyzingTitle')}</h2>
              <p class="subtitle">${t('analyzingDesc')}</p>
              <div class="mini-track"><div class="mini-fill" id="miniFill"></div></div>
              <div class="mini-text" id="miniLabel">6%</div>
            </div>
          </section>
        `;
      }

      function renderResult() {
        const result = RESULTS[state.resultType];
        const traits = getNormalizedTraits();
        app.innerHTML = `
          <section class="card">
            <div class="card-inner">
              <div class="result-head">
                <div>${t('resultTitle')}</div>
                <h2 class="result-type">${result.emoji} ${pick(result.name)}</h2>
                <p class="result-summary">${pick(result.summary)}</p>
              </div>

              <h3 class="section-title">${t('detailTitle')}</h3>
              <p class="detail">${pick(result.detail)}</p>

              <h3 class="section-title">${t('tipsTitle')}</h3>
              <ul class="tips">
                ${pick(result.tips).map((tip) => `<li>${tip}</li>`).join('')}
              </ul>

              <h3 class="section-title">${t('chartTitle')}</h3>
              <div class="chart-wrap"><canvas id="resultChart" aria-label="result chart"></canvas></div>

              <h3 class="section-title">${t('shareTitle')}</h3>
              <div class="share-grid">
                <button class="share-btn" id="shareKakao">${t('shareKakao')}</button>
                <button class="share-btn" id="shareTwitter">${t('shareTwitter')}</button>
                <button class="share-btn" id="shareLink">${t('shareLink')}</button>
              </div>

              <button class="btn secondary" id="restartBtn">${t('restart')}</button>
              <div class="saved">${t('saved')}</div>
              <div class="disclaimer">${t('disclaimer')}</div>
            </div>
          </section>
        `;

        drawChart(document.getElementById('resultChart'), traits);

        document.getElementById('shareKakao').addEventListener('click', shareKakao);
        document.getElementById('shareTwitter').addEventListener('click', shareTwitter);
        document.getElementById('shareLink').addEventListener('click', copyLink);
        document.getElementById('restartBtn').addEventListener('click', () => {
          haptic('impact');
          resetState();
          render();
        });
      }

      function render() {
        if (state.screen === 'intro') renderIntro();
        else if (state.screen === 'question') renderQuestion();
        else if (state.screen === 'analyzing') renderAnalyzing();
        else renderResult();
      }

      render();
    })();
  </script>
  <script src="/games/cross-promo.js"></script>
</body>
</html>
