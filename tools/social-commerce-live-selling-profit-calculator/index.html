<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Commerce Live Selling Profit Calculator | 라이브커머스 수익 계산기</title>
  <meta name="description" content="라이브 세션·시청자·전환율·반품률·수수료·물류비를 반영해 라이브커머스 월 순이익, 손익분기 전환율, ROI를 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#172554;--line:#3b82f6;--text:#eff6ff;--muted:#c7d2fe;--pri:#38bdf8;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#2563eb 0%,var(--bg) 58%);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.18rem,2.8vw,1.84rem)}.sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btnLink,.lang{border:1px solid var(--line);background:#1e3a8a;color:#dbeafe;text-decoration:none;border-radius:10px;padding:8px 11px;font-size:.88rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#1d2f6f,#142353);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#10204d;color:var(--text);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;background:linear-gradient(135deg,#7dd3fc,#38bdf8);font-weight:700;color:#082f49}.soft{background:#1e3a8a;border:1px solid var(--line);color:#dbeafe}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f1d1d;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:#13275f;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.04rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1e3a8a;color:#dbeafe;font-size:.77rem;margin-top:10px}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.actions{justify-content:flex-start}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📹 라이브커머스 수익 계산기</h1>
        <div class="sub" id="subtitle">라이브 세션 운영의 주문·GMV·순이익·손익분기 전환율을 빠르게 시뮬레이션합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a class="btnLink" href="/" id="backLink">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값 Inputs</h2>
        <div class="inputs">
          <div><label for="sessions" id="l_sessions"></label><input id="sessions" type="number" min="1" step="1" value="26"></div>
          <div><label for="viewers" id="l_viewers"></label><input id="viewers" type="number" min="0" step="10" value="4300"></div>
          <div><label for="conversion" id="l_conversion"></label><input id="conversion" type="number" min="0" max="100" step="0.01" value="2.7"></div>
          <div><label for="aov" id="l_aov"></label><input id="aov" type="number" min="0" step="100" value="52000"></div>
          <div><label for="returnRate" id="l_returnRate"></label><input id="returnRate" type="number" min="0" max="100" step="0.1" value="9"></div>
          <div><label for="cogsRate" id="l_cogsRate"></label><input id="cogsRate" type="number" min="0" max="100" step="0.1" value="46"></div>
          <div><label for="feeRate" id="l_feeRate"></label><input id="feeRate" type="number" min="0" max="100" step="0.1" value="12"></div>
          <div><label for="logisticsPerOrder" id="l_logisticsPerOrder"></label><input id="logisticsPerOrder" type="number" min="0" step="100" value="3600"></div>
          <div><label for="hostPayout" id="l_hostPayout"></label><input id="hostPayout" type="number" min="0" step="10000" value="380000"></div>
          <div><label for="promoSpend" id="l_promoSpend"></label><input id="promoSpend" type="number" min="0" step="10000" value="12500000"></div>
          <div><label for="setupCost" id="l_setupCost"></label><input id="setupCost" type="number" min="0" step="10000" value="18000000"></div>
          <div><label for="months" id="l_months"></label><input id="months" type="number" min="1" step="1" value="6"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button"></button>
          <button id="reset" type="button"></button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_orders"></div><div id="orders" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_gmv"></div><div id="gmv" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_netRevenue"></div><div id="netRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_contribution"></div><div id="contribution" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNetProfit"></div><div id="monthlyNetProfit" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill"></div>

        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table>
          <tbody>
            <tr><th id="d_breakEvenConversion"></th><td id="breakEvenConversion">-</td></tr>
            <tr><th id="d_paybackMonths"></th><td id="paybackMonths">-</td></tr>
            <tr><th id="d_cumulativeNet"></th><td id="cumulativeNet">-</td></tr>
            <tr><th id="d_monthlyFixed"></th><td id="monthlyFixed">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={
      sessions:$("sessions"),viewers:$("viewers"),conversion:$("conversion"),aov:$("aov"),returnRate:$("returnRate"),cogsRate:$("cogsRate"),feeRate:$("feeRate"),logisticsPerOrder:$("logisticsPerOrder"),hostPayout:$("hostPayout"),promoSpend:$("promoSpend"),setupCost:$("setupCost"),months:$("months"),
      orders:$("orders"),gmv:$("gmv"),netRevenue:$("netRevenue"),contribution:$("contribution"),monthlyNetProfit:$("monthlyNetProfit"),roi:$("roi"),breakEvenConversion:$("breakEvenConversion"),paybackMonths:$("paybackMonths"),cumulativeNet:$("cumulativeNet"),monthlyFixed:$("monthlyFixed"),
      copy:$("copy"),reset:$("reset"),summary:$("summary"),error:$("error"),status:$("status"),langBtn:$("langBtn")
    };
    const defaults={sessions:26,viewers:4300,conversion:2.7,aov:52000,returnRate:9,cogsRate:46,feeRate:12,logisticsPerOrder:3600,hostPayout:380000,promoSpend:12500000,setupCost:18000000,months:6};

    const I18N={
      ko:{title:"📹 라이브커머스 수익 계산기",subtitle:"라이브 세션 운영의 주문·GMV·순이익·손익분기 전환율을 빠르게 시뮬레이션합니다.",inputHeader:"입력값 Inputs",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",
      l_sessions:"월 라이브 세션 수",l_viewers:"세션당 평균 시청자",l_conversion:"시청→구매 전환율 (%)",l_aov:"객단가 AOV (₩)",l_returnRate:"반품/취소율 (%)",l_cogsRate:"원가율 COGS (%)",l_feeRate:"플랫폼+결제 수수료율 (%)",l_logisticsPerOrder:"주문당 물류비 (₩)",l_hostPayout:"세션당 호스트 비용 (₩)",l_promoSpend:"월 프로모션비 (₩)",l_setupCost:"원타임 셋업비 (₩)",l_months:"분석 기간 (개월)",
      k_orders:"월 주문수",k_gmv:"월 GMV",k_netRevenue:"월 실현 순매출",k_contribution:"월 공헌이익",k_monthlyNetProfit:"월 순이익",k_roi:"ROI (기간)",
      d_breakEvenConversion:"손익분기 전환율",d_paybackMonths:"회수기간",d_cumulativeNet:"누적 순효과",d_monthlyFixed:"월 고정비(호스트+프로모션)",good:"라이브커머스가 순이익을 내고 있습니다",bad:"현재 조건에서는 손실 가능성이 큽니다",invalid:"입력값을 확인해 주세요",
      e_rate:"비율 값은 0~100 범위여야 합니다.",e_months:"분석 기간은 1개월 이상이어야 합니다.",copied:"요약이 복사되었습니다.",copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",summaryTitle:"[라이브커머스 수익 요약]"},
      en:{title:"📹 Social Commerce Live Selling Profit Calculator",subtitle:"Model orders, GMV, net profit, and break-even conversion for live-commerce sessions.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",
      l_sessions:"Live sessions per month",l_viewers:"Average viewers per session",l_conversion:"Viewer-to-buyer conversion (%)",l_aov:"Average order value (KRW)",l_returnRate:"Return/cancel rate (%)",l_cogsRate:"COGS rate (%)",l_feeRate:"Platform + payment fee rate (%)",l_logisticsPerOrder:"Logistics per order (KRW)",l_hostPayout:"Host payout per session (KRW)",l_promoSpend:"Monthly promo spend (KRW)",l_setupCost:"One-time setup cost (KRW)",l_months:"Analysis period (months)",
      k_orders:"Monthly orders",k_gmv:"Monthly GMV",k_netRevenue:"Net realized revenue",k_contribution:"Monthly contribution",k_monthlyNetProfit:"Monthly net profit",k_roi:"ROI (period)",
      d_breakEvenConversion:"Break-even conversion",d_paybackMonths:"Payback period",d_cumulativeNet:"Cumulative net impact",d_monthlyFixed:"Monthly fixed cost (host + promo)",good:"Live commerce is net-positive",bad:"Current setup may be loss-making",invalid:"Please review your inputs",
      e_rate:"Rate inputs must stay within 0 to 100.",e_months:"Analysis period must be at least 1 month.",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Social Commerce Profit Summary]"}
    };

    let lang="ko";
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString("en-US",{maximumFractionDigits:d});
    const t=(k)=>I18N[lang][k]||k;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["sessions","viewers","conversion","aov","returnRate","cogsRate","feeRate","logisticsPerOrder","hostPayout","promoSpend","setupCost","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["orders","gmv","netRevenue","contribution","monthlyNetProfit","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenConversion","paybackMonths","cumulativeNet","monthlyFixed"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      const rates=[v.conversion,v.returnRate,v.cogsRate,v.feeRate];
      if(rates.some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("e_rate");
      if(!Number.isFinite(v.months)||v.months<1) return t("e_months");
      return "";
    }

    function render(){
      const v={sessions:Number(refs.sessions.value),viewers:Number(refs.viewers.value),conversion:Number(refs.conversion.value),aov:Number(refs.aov.value),returnRate:Number(refs.returnRate.value),cogsRate:Number(refs.cogsRate.value),feeRate:Number(refs.feeRate.value),logisticsPerOrder:Number(refs.logisticsPerOrder.value),hostPayout:Number(refs.hostPayout.value),promoSpend:Number(refs.promoSpend.value),setupCost:Number(refs.setupCost.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["orders","gmv","netRevenue","contribution","monthlyNetProfit","roi","breakEvenConversion","paybackMonths","cumulativeNet","monthlyFixed"].forEach((k)=>refs[k].textContent="-");refs.status.textContent=t("invalid");refs.summary.value="";return;}

      const orders=v.sessions*v.viewers*(v.conversion/100);
      const gmv=orders*v.aov;
      const netRevenue=gmv*(1-v.returnRate/100);
      const grossProfit=netRevenue*(1-v.cogsRate/100);
      const feeCost=netRevenue*(v.feeRate/100);
      const logisticsCost=orders*v.logisticsPerOrder;
      const contribution=grossProfit-feeCost-logisticsCost;
      const monthlyFixed=v.sessions*v.hostPayout+v.promoSpend;
      const monthlyNetProfit=contribution-monthlyFixed;

      const cumulativeNet=monthlyNetProfit*v.months-v.setupCost;
      const roiBase=v.setupCost>0?v.setupCost:(monthlyFixed*v.months||1);
      const roi=cumulativeNet/roiBase;

      const orderUnitProfit=v.aov*(1-v.returnRate/100)*(1-v.cogsRate/100-v.feeRate/100)-v.logisticsPerOrder;
      const audience=v.sessions*v.viewers;
      const breakEvenConversion=(orderUnitProfit>0&&audience>0)?Math.max(0,(monthlyFixed/(audience*orderUnitProfit))*100):NaN;
      const paybackMonths=(v.setupCost>0&&monthlyNetProfit>0)?(v.setupCost/monthlyNetProfit):NaN;

      refs.orders.textContent=num(orders,1);
      refs.gmv.textContent=won(gmv);
      refs.netRevenue.textContent=won(netRevenue);
      refs.contribution.textContent=won(contribution);
      refs.monthlyNetProfit.textContent=won(monthlyNetProfit);
      refs.roi.textContent=`${num(roi*100,1)}%`;
      refs.breakEvenConversion.textContent=Number.isFinite(breakEvenConversion)?`${num(breakEvenConversion,3)}%`:"N/A";
      refs.paybackMonths.textContent=Number.isFinite(paybackMonths)?`${num(paybackMonths,2)} mo`:"N/A";
      refs.cumulativeNet.textContent=won(cumulativeNet);
      refs.monthlyFixed.textContent=won(monthlyFixed);
      refs.status.innerHTML=monthlyNetProfit>=0?`<span class="good">●</span> ${t("good")}`:`<span class="bad">●</span> ${t("bad")}`;

      refs.summary.value=[
        t("summaryTitle"),
        `${t("k_orders")}: ${num(orders,1)}`,
        `${t("k_gmv")}: ${won(gmv)}`,
        `${t("k_netRevenue")}: ${won(netRevenue)}`,
        `${t("k_contribution")}: ${won(contribution)}`,
        `${t("k_monthlyNetProfit")}: ${won(monthlyNetProfit)}`,
        `${t("d_breakEvenConversion")}: ${Number.isFinite(breakEvenConversion)?`${num(breakEvenConversion,3)}%`:"N/A"}`,
        `${t("d_cumulativeNet")} (${num(v.months,0)}m): ${won(cumulativeNet)}`,
        `${t("k_roi")}: ${num(roi*100,1)}%`
      ].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.sessions,refs.viewers,refs.conversion,refs.aov,refs.returnRate,refs.cogsRate,refs.feeRate,refs.logisticsPerOrder,refs.hostPayout,refs.promoSpend,refs.setupCost,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n();
    render();
  </script>
</body>
</html>
