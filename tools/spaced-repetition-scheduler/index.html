<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>간격 반복 스케줄러 | EastSea Tools</title>
<meta name="description" content="SM-2 기반으로 복습 주기를 자동 계산하는 학습 스케줄러">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--card:#fff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--pri:#4f46e5}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:920px;margin:0 auto;padding:18px}
.back{color:var(--muted);text-decoration:none}
h1{margin:10px 0;font-size:1.5rem}
.desc{font-size:.92rem;color:var(--muted);margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.form{display:grid;grid-template-columns:2fr 1fr auto;gap:8px}
input,select{padding:10px;border:1px solid var(--line);border-radius:10px;font:inherit;width:100%}
button{border:0;background:var(--pri);color:#fff;padding:10px 12px;border-radius:10px;font-weight:700;cursor:pointer}
button.ghost{background:#eef2ff;color:#3730a3}
.stats{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:#f1f5f9;padding:7px 10px;border-radius:999px;font-size:.82rem}
.item{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px}
.top{display:flex;justify-content:space-between;gap:8px;align-items:center}
.title{font-weight:700;word-break:break-word}
.meta{font-size:.84rem;color:var(--muted);margin-top:4px}
.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.actions button{padding:7px 9px;font-size:.8rem}
.delete{background:#fee2e2;color:#b91c1c}
.due{outline:2px solid #f59e0b;background:#fff7ed}
@media (max-width:700px){.form{grid-template-columns:1fr 1fr}.form input{grid-column:1/-1}.form button{grid-column:1/-1}}
</style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← 도구 목록</a>
  <h1>📚 간격 반복 스케줄러</h1>
  <p class="desc">학습 항목을 등록하고 복습 결과(Again/Good/Easy)를 누르면 다음 복습일이 자동 계산됩니다.</p>

  <section class="card">
    <div class="form">
      <input id="topic" type="text" placeholder="학습 항목 (예: HTTP 캐싱 헤더)">
      <select id="preset">
        <option value="hard">어려움 (초기 1일)</option>
        <option value="normal" selected>보통 (초기 2일)</option>
        <option value="easy">쉬움 (초기 4일)</option>
      </select>
      <button onclick="addItem()">추가</button>
    </div>
  </section>

  <section class="card" style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
    <div class="stats" id="stats"></div>
    <button class="ghost" onclick="clearAll()">전체 삭제</button>
  </section>

  <section class="card" id="list"></section>
</div>

<script>
const KEY='es_spaced_repetition_items_v1';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');

function todayYmd(){return new Date().toISOString().slice(0,10);}
function addDays(dateStr,days){const d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);} 
function save(){localStorage.setItem(KEY,JSON.stringify(items));}
function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function addItem(){
  const topic=document.getElementById('topic').value.trim();
  const preset=document.getElementById('preset').value;
  if(!topic){alert('학습 항목을 입력하세요.');return;}
  const interval=preset==='hard'?1:preset==='easy'?4:2;
  const now=todayYmd();
  items.unshift({
    id:Date.now()+Math.random(),
    topic,
    ef:2.5,
    reps:0,
    interval,
    due:addDays(now,interval),
    lastReview:now
  });
  document.getElementById('topic').value='';
  save();render();
}

function review(id,quality){
  const item=items.find(v=>v.id===id); if(!item)return;
  const today=todayYmd();

  if(quality<3){
    item.reps=0;
    item.interval=1;
  }else{
    item.reps+=1;
    if(item.reps===1)item.interval=1;
    else if(item.reps===2)item.interval=6;
    else item.interval=Math.max(1,Math.round(item.interval*item.ef));
  }

  item.ef=Math.max(1.3,item.ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)));
  item.lastReview=today;
  item.due=addDays(today,item.interval);
  save();render();
}

function removeItem(id){items=items.filter(v=>v.id!==id);save();render();}

function clearAll(){if(!items.length)return;if(!confirm('모든 학습 항목을 삭제할까요?'))return;items=[];save();render();}

function render(){
  const today=todayYmd();
  items.sort((a,b)=>a.due.localeCompare(b.due));

  const dueCount=items.filter(i=>i.due<=today).length;
  document.getElementById('stats').innerHTML=`
    <span class="pill">총 ${items.length}개</span>
    <span class="pill">오늘 복습 ${dueCount}개</span>
    <span class="pill">완료 후 자동 재스케줄</span>`;

  const list=document.getElementById('list');
  if(!items.length){list.innerHTML='<p style="color:#64748b;font-size:.9rem">항목을 추가해 학습 루틴을 시작하세요.</p>';return;}

  list.innerHTML=items.map(i=>`
    <div class="item ${i.due<=today?'due':''}">
      <div class="top">
        <div>
          <div class="title">${esc(i.topic)}</div>
          <div class="meta">다음 복습: ${i.due} · interval ${i.interval}일 · EF ${i.ef.toFixed(2)} · reps ${i.reps}</div>
        </div>
        <button class="delete" onclick="removeItem(${i.id})">삭제</button>
      </div>
      <div class="actions">
        <button onclick="review(${i.id},2)">Again</button>
        <button onclick="review(${i.id},4)">Good</button>
        <button onclick="review(${i.id},5)">Easy</button>
      </div>
    </div>
  `).join('');
}

render();
</script>
</body>
</html>
