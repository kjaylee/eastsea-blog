<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="음성 인식 - 음성을 실시간으로 텍스트로 변환합니다 무료 온라인 도구 | Free online tool at eastsea.monster" />
    <title>음성 인식 - Speech to Text</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
            --accent-color: #0d6efd;
            --accent-hover: #0b5ed7;
            --success-color: #198754;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1a1a;
                --bg-secondary: #2d2d2d;
                --text-primary: #e9ecef;
                --text-secondary: #adb5bd;
                --border-color: #495057;
                --accent-color: #3d8bfd;
                --accent-hover: #5a9eff;
                --shadow: 0 2px 8px rgba(0,0,0,0.3);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .back-link {
            display: inline-block;
            color: var(--accent-color);
            text-decoration: none;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: var(--accent-hover);
        }

        .recorder-section {
            background: var(--bg-primary);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            text-align: center;
        }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: var(--accent-color);
            color: white;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-button:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .mic-button.recording {
            background: var(--danger-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .status.info {
            background: rgba(13, 110, 253, 0.1);
            color: var(--accent-color);
        }

        .status.recording {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger-color);
        }

        .status.success {
            background: rgba(25, 135, 84, 0.1);
            color: var(--success-color);
        }

        .status.error {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger-color);
        }

        .settings {
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .setting-group {
            margin-bottom: 16px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .result-section {
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .result-section h3 {
            margin-bottom: 16px;
        }

        .transcript {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 8px;
            min-height: 200px;
            margin-bottom: 16px;
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .transcript.empty {
            color: var(--text-secondary);
            font-style: italic;
        }

        .interim {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button.secondary {
            background: var(--text-secondary);
        }

        button.secondary:hover {
            background: var(--text-primary);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .mic-button {
                width: 100px;
                height: 100px;
                font-size: 2.5rem;
            }

            .actions {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-link">← 목록으로</a>
            <h1>음성 인식</h1>
            <p class="subtitle">음성을 실시간으로 텍스트로 변환합니다</p>
        </header>

        <div class="recorder-section">
            <div id="status" class="status info">마이크 버튼을 눌러 음성 인식을 시작하세요</div>
            <button class="mic-button" id="micBtn" onclick="toggleRecording()">🎤</button>
        </div>

        <div class="settings">
            <h3 style="margin-bottom: 16px;">설정</h3>
            <div class="setting-group">
                <label for="language">언어 선택</label>
                <select id="language">
                    <option value="ko-KR">한국어</option>
                    <option value="en-US">English (US)</option>
                    <option value="ja-JP">日本語</option>
                    <option value="zh-CN">中文 (简体)</option>
                    <option value="es-ES">Español</option>
                    <option value="fr-FR">Français</option>
                    <option value="de-DE">Deutsch</option>
                </select>
            </div>
            <div class="setting-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="continuous" checked>
                    <label for="continuous" style="margin: 0;">연속 인식 모드</label>
                </div>
            </div>
        </div>

        <div class="result-section">
            <h3>인식 결과</h3>
            <div class="transcript empty" id="transcript">인식된 텍스트가 여기에 표시됩니다</div>
            <div class="actions">
                <button onclick="copyTranscript()">복사</button>
                <button onclick="downloadTranscript()">다운로드</button>
                <button class="secondary" onclick="clearTranscript()">초기화</button>
            </div>
        </div>
    </div>

    <script>
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';
        let interimTranscript = '';

        const micBtn = document.getElementById('micBtn');
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');
        const languageSelect = document.getElementById('language');
        const continuousCheckbox = document.getElementById('continuous');

        // Check browser support
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                setStatus('음성 인식 중... 말씀하세요', 'recording');
            };

            recognition.onresult = function(event) {
                interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                updateTranscript();
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                let errorMsg = '오류가 발생했습니다';
                
                switch(event.error) {
                    case 'no-speech':
                        errorMsg = '음성이 감지되지 않았습니다';
                        break;
                    case 'audio-capture':
                        errorMsg = '마이크에 접근할 수 없습니다';
                        break;
                    case 'not-allowed':
                        errorMsg = '마이크 권한이 거부되었습니다';
                        break;
                }
                
                setStatus(errorMsg, 'error');
                stopRecording();
            };

            recognition.onend = function() {
                if (isRecording && continuousCheckbox.checked) {
                    recognition.start();
                } else {
                    stopRecording();
                }
            };
        } else {
            setStatus('이 브라우저는 음성 인식을 지원하지 않습니다', 'error');
            micBtn.disabled = true;
        }

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            if (!recognition) return;

            recognition.lang = languageSelect.value;
            recognition.continuous = continuousCheckbox.checked;
            
            try {
                recognition.start();
                isRecording = true;
                micBtn.classList.add('recording');
                micBtn.textContent = '⏸️';
            } catch (error) {
                console.error('Start recording error:', error);
            }
        }

        function stopRecording() {
            if (!recognition) return;

            try {
                recognition.stop();
            } catch (error) {
                console.error('Stop recording error:', error);
            }
            
            isRecording = false;
            micBtn.classList.remove('recording');
            micBtn.textContent = '🎤';
            setStatus('음성 인식이 중지되었습니다', 'info');
        }

        function updateTranscript() {
            const text = finalTranscript + (interimTranscript ? `<span class="interim">${interimTranscript}</span>` : '');
            
            if (text.trim()) {
                transcriptEl.innerHTML = text;
                transcriptEl.classList.remove('empty');
            } else {
                transcriptEl.textContent = '인식된 텍스트가 여기에 표시됩니다';
                transcriptEl.classList.add('empty');
            }
        }

        function copyTranscript() {
            const text = finalTranscript.trim();
            if (!text) {
                alert('복사할 텍스트가 없습니다');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                alert('클립보드에 복사되었습니다!');
            }).catch(err => {
                alert('복사 실패: ' + err.message);
            });
        }

        function downloadTranscript() {
            const text = finalTranscript.trim();
            if (!text) {
                alert('다운로드할 텍스트가 없습니다');
                return;
            }

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'transcript-' + new Date().toISOString().slice(0, 10) + '.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearTranscript() {
            if (finalTranscript && !confirm('인식된 텍스트를 삭제하시겠습니까?')) {
                return;
            }
            
            finalTranscript = '';
            interimTranscript = '';
            updateTranscript();
        }

        function setStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }

        // Stop recording on page unload
        window.addEventListener('beforeunload', () => {
            if (isRecording) {
                recognition.stop();
            }
        });
    </script>
</body>
</html>
