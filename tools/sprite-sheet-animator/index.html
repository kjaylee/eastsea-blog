<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprite Sheet Animator | 스프라이트 시트 애니메이터</title>
  <meta name="description" content="스프라이트 시트를 업로드하고 프레임을 자동 감지해 GIF/APNG 애니메이션으로 내보내세요." />
  <style>
    :root{
      --bg:#f3f6ff;--card:#ffffff;--text:#13213d;--muted:#5c6e92;--line:#d8e1f3;
      --primary:#3b5bfd;--primary2:#6f7bff;--soft:#eaf0ff;--chip:#f7f9ff;
      --shadow:0 14px 36px rgba(31,56,125,.12);
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#090f1d;--card:#0f1830;--text:#e8efff;--muted:#9caed4;--line:#233453;
        --primary:#83a2ff;--primary2:#6f7bff;--soft:#142345;--chip:#122039;
        --shadow:0 16px 36px rgba(0,0,0,.35);
      }
    }
    :root[data-theme="light"]{
      --bg:#f3f6ff;--card:#ffffff;--text:#13213d;--muted:#5c6e92;--line:#d8e1f3;
      --primary:#3b5bfd;--primary2:#6f7bff;--soft:#eaf0ff;--chip:#f7f9ff;
      --shadow:0 14px 36px rgba(31,56,125,.12);
    }
    :root[data-theme="dark"]{
      --bg:#090f1d;--card:#0f1830;--text:#e8efff;--muted:#9caed4;--line:#233453;
      --primary:#83a2ff;--primary2:#6f7bff;--soft:#142345;--chip:#122039;
      --shadow:0 16px 36px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.4;
    }
    .page{max-width:1220px;margin:0 auto;padding:18px 14px 60px}

    .hero{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      border-radius:20px;
      padding:18px 18px 16px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }
    .hero-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    h1{margin:0;font-size:clamp(1.24rem,2.6vw,1.9rem)}
    .desc{margin-top:7px;opacity:.92;font-size:.95rem}
    .hero-actions{display:flex;gap:8px;flex-wrap:wrap}

    .btn,.ghost,input,select,label.upload-btn{
      border-radius:12px;border:1px solid var(--line);font-size:.92rem;
    }
    .btn,.ghost,label.upload-btn{
      padding:9px 12px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
    }
    .btn{background:var(--primary);border-color:transparent;color:#fff;font-weight:700}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .ghost{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)}

    .layout{display:grid;grid-template-columns:350px 1fr;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:var(--shadow)}
    .card h2{margin:0 0 10px;font-size:1rem}
    .muted{color:var(--muted);font-size:.84rem}

    .dropzone{
      border:2px dashed var(--line);
      border-radius:14px;
      background:var(--chip);
      padding:14px;
      text-align:center;
      transition:.2s ease;
      margin-bottom:10px;
    }
    .dropzone.dragover{border-color:var(--primary);background:var(--soft)}
    .drop-title{font-weight:700;margin-bottom:6px}
    .upload-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    input[type="file"]{display:none}

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .field label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:4px}
    input,select{
      width:100%;padding:9px 10px;
      background:var(--bg);
      color:var(--text);
    }
    input[type="color"]{padding:2px;height:40px}
    input[type="range"]{padding:0}

    .mini-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .mini-actions .btn{font-size:.84rem;padding:8px}
    .mini-actions .btn.full{grid-column:1/-1}

    .fps-wrap{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
    .fps-value{font-weight:700;color:var(--primary)}

    .preview-head{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
    .chip{background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:5px 10px;font-size:.79rem;color:var(--muted)}

    .preview-wrap{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:var(--chip);
      position:relative;
      min-height:280px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .checker{
      position:absolute;inset:0;
      background-image:
        linear-gradient(45deg, rgba(120,130,160,.17) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(120,130,160,.17) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(120,130,160,.17) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(120,130,160,.17) 75%);
      background-size:18px 18px;
      background-position:0 0,0 9px,9px -9px,-9px 0;
      opacity:.45;
    }
    #previewCanvas{
      max-width:100%;
      max-height:60vh;
      border-radius:8px;
      position:relative;
      z-index:1;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
    }
    .empty-note{position:absolute;z-index:1;color:var(--muted);font-size:.9rem;text-align:center;padding:0 8px}

    .controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .controls .btn{padding:8px 11px;font-size:.87rem}
    .controls .ghost{background:var(--chip);border-color:var(--line);color:var(--text)}

    .mode-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
    .mode-row label{
      font-size:.83rem;
      background:var(--chip);
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .thumb-strip{
      margin-top:11px;
      display:flex;
      gap:8px;
      overflow:auto;
      padding-bottom:6px;
    }
    .thumb-btn{
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--chip);
      padding:4px;
      cursor:pointer;
      flex:0 0 auto;
      position:relative;
    }
    .thumb-btn.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(59,91,253,.25)}
    .thumb-canvas{display:block;border-radius:7px;background:transparent}
    .thumb-num{position:absolute;right:5px;bottom:5px;background:rgba(0,0,0,.68);color:#fff;font-size:.67rem;border-radius:6px;padding:2px 4px}

    .status{margin-top:10px;padding:8px 10px;border-radius:10px;background:var(--chip);border:1px solid var(--line);font-size:.83rem;color:var(--muted)}

    @media (max-width:980px){
      .layout{grid-template-columns:1fr}
      .preview-wrap{min-height:230px}
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="hero-top">
        <div>
          <h1>🎞️ 스프라이트 시트 애니메이터</h1>
          <div class="desc">스프라이트 시트 업로드 → 프레임 자동 감지/수동 조정 → 실시간 미리보기 → GIF/APNG 내보내기</div>
        </div>
        <div class="hero-actions">
          <button id="themeToggle" class="ghost" type="button">🌙 다크모드</button>
          <a class="ghost" href="/tools/">🧰 도구 포털</a>
        </div>
      </div>
    </header>

    <section class="layout">
      <aside class="card">
        <h2>1) 스프라이트 시트 업로드</h2>
        <div id="dropzone" class="dropzone" aria-label="이미지 드롭 영역">
          <div class="drop-title">이미지를 드래그 &amp; 드롭</div>
          <div class="muted">PNG/WebP/GIF/JPG 지원</div>
          <div class="upload-row" style="margin-top:8px">
            <label class="upload-btn btn" for="fileInput">📁 파일 선택</label>
            <button id="sampleBtn" class="btn" type="button" style="background:var(--soft);color:var(--text);border-color:var(--line)">샘플 테스트</button>
          </div>
          <input id="fileInput" type="file" accept="image/*" />
        </div>

        <div class="status" id="sheetInfo">시트를 업로드하면 자동 감지를 시작합니다.</div>

        <h2 style="margin-top:12px">2) 프레임 설정</h2>
        <div class="grid2">
          <div class="field"><label for="frameW">프레임 너비(px)</label><input id="frameW" type="number" min="1" value="64" /></div>
          <div class="field"><label for="frameH">프레임 높이(px)</label><input id="frameH" type="number" min="1" value="64" /></div>
          <div class="field"><label for="cols">열(Columns)</label><input id="cols" type="number" min="1" value="1" /></div>
          <div class="field"><label for="rows">행(Rows)</label><input id="rows" type="number" min="1" value="1" /></div>
        </div>
        <div class="mini-actions">
          <button id="autoDetectBtn" type="button" class="btn full">🧠 자동 감지</button>
          <button id="fromCellBtn" type="button" class="btn" style="background:var(--soft);color:var(--text);border-color:var(--line)">크기→행열 계산</button>
          <button id="fromGridBtn" type="button" class="btn" style="background:var(--soft);color:var(--text);border-color:var(--line)">행열→크기 계산</button>
        </div>
        <div class="status" id="frameInfo">총 프레임: 1</div>

        <h2 style="margin-top:12px">3) 재생 &amp; 배경</h2>
        <div class="field">
          <label for="fps">FPS (1~60)</label>
          <div class="fps-wrap">
            <input id="fps" type="range" min="1" max="60" step="1" value="12" />
            <span id="fpsValue" class="fps-value">12 fps</span>
          </div>
        </div>

        <div class="mode-row" role="radiogroup" aria-label="재생 모드">
          <label><input type="radio" name="playMode" value="loop" checked /> 루프</label>
          <label><input type="radio" name="playMode" value="pingpong" /> 핑퐁</label>
          <label><input type="radio" name="playMode" value="once" /> 단일재생</label>
        </div>

        <div class="grid2" style="margin-top:10px">
          <div class="field">
            <label for="bgMode">배경</label>
            <select id="bgMode">
              <option value="transparent">투명</option>
              <option value="white">흰색</option>
              <option value="black">검정</option>
              <option value="custom">커스텀</option>
            </select>
          </div>
          <div class="field">
            <label for="bgColor">커스텀 색상</label>
            <input id="bgColor" type="color" value="#1d4ed8" disabled />
          </div>
        </div>

        <div class="controls" style="margin-top:12px">
          <button id="exportGifBtn" class="btn" type="button" disabled>GIF 내보내기</button>
          <button id="exportApngBtn" class="btn" type="button" disabled style="background:var(--soft);color:var(--text);border-color:var(--line)">APNG 내보내기</button>
        </div>
        <div class="status" id="exportStatus">내보내기 준비 대기</div>
      </aside>

      <section class="card">
        <div class="preview-head">
          <h2 style="margin:0">실시간 미리보기</h2>
          <div id="frameBadge" class="chip">프레임 1 / 1</div>
        </div>

        <div class="preview-wrap" id="previewWrap">
          <div class="checker"></div>
          <canvas id="previewCanvas" width="256" height="256" aria-label="애니메이션 미리보기"></canvas>
          <div id="emptyNote" class="empty-note">이미지를 올리면 애니메이션이 재생됩니다.</div>
        </div>

        <div class="controls">
          <button id="prevBtn" class="btn ghost" type="button">⏮ 이전 프레임</button>
          <button id="playPauseBtn" class="btn" type="button" disabled>▶ 재생</button>
          <button id="nextBtn" class="btn ghost" type="button">⏭ 다음 프레임</button>
          <button id="restartBtn" class="btn ghost" type="button">🔁 처음으로</button>
        </div>

        <h2 style="margin-top:14px">프레임 순서 썸네일</h2>
        <div id="thumbStrip" class="thumb-strip" aria-label="프레임 썸네일 스트립"></div>
        <div class="muted">썸네일을 탭/클릭하면 해당 프레임으로 이동합니다.</div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      themeToggle: $('themeToggle'),
      dropzone: $('dropzone'), fileInput: $('fileInput'), sampleBtn: $('sampleBtn'),
      sheetInfo: $('sheetInfo'), frameInfo: $('frameInfo'), exportStatus: $('exportStatus'),
      frameW: $('frameW'), frameH: $('frameH'), cols: $('cols'), rows: $('rows'),
      autoDetectBtn: $('autoDetectBtn'), fromCellBtn: $('fromCellBtn'), fromGridBtn: $('fromGridBtn'),
      fps: $('fps'), fpsValue: $('fpsValue'),
      bgMode: $('bgMode'), bgColor: $('bgColor'),
      playPauseBtn: $('playPauseBtn'), prevBtn: $('prevBtn'), nextBtn: $('nextBtn'), restartBtn: $('restartBtn'),
      exportGifBtn: $('exportGifBtn'), exportApngBtn: $('exportApngBtn'),
      previewCanvas: $('previewCanvas'), previewWrap: $('previewWrap'), emptyNote: $('emptyNote'),
      frameBadge: $('frameBadge'), thumbStrip: $('thumbStrip')
    };

    const state = {
      image: null,
      imageName: 'sprite-sheet',
      objectUrl: '',
      frameW: 64,
      frameH: 64,
      cols: 1,
      rows: 1,
      fps: 12,
      playMode: 'loop',
      bgMode: 'transparent',
      bgColor: '#1d4ed8',
      currentFrame: 0,
      totalFrames: 1,
      isPlaying: false,
      direction: 1,
      lastTs: 0,
      accumulator: 0,
      thumbButtons: []
    };

    const previewCtx = refs.previewCanvas.getContext('2d', { alpha: true });

    function initTheme(){
      const saved = localStorage.getItem('sprite-theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      }
      updateThemeButton();
    }

    function toggleTheme(){
      const root = document.documentElement;
      const current = root.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('sprite-theme', next);
      updateThemeButton();
    }

    function updateThemeButton(){
      const current = document.documentElement.getAttribute('data-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      refs.themeToggle.textContent = current === 'dark' ? '☀️ 라이트모드' : '🌙 다크모드';
    }

    function setSheetInfo(msg){ refs.sheetInfo.textContent = msg; }
    function setExportStatus(msg){ refs.exportStatus.textContent = msg; }

    function toInt(value, fallback = 1){
      const n = Number(value);
      return Number.isFinite(n) ? Math.max(1, Math.floor(n)) : fallback;
    }

    function readInputs(){
      state.frameW = toInt(refs.frameW.value, state.frameW);
      state.frameH = toInt(refs.frameH.value, state.frameH);
      state.cols = toInt(refs.cols.value, state.cols);
      state.rows = toInt(refs.rows.value, state.rows);
      state.fps = Math.min(60, Math.max(1, toInt(refs.fps.value, state.fps)));
      state.bgMode = refs.bgMode.value;
      state.bgColor = refs.bgColor.value;
      state.playMode = document.querySelector('input[name="playMode"]:checked')?.value || 'loop';
    }

    function writeInputs(){
      refs.frameW.value = String(state.frameW);
      refs.frameH.value = String(state.frameH);
      refs.cols.value = String(state.cols);
      refs.rows.value = String(state.rows);
      refs.fps.value = String(state.fps);
      refs.fpsValue.textContent = `${state.fps} fps`;
      refs.bgMode.value = state.bgMode;
      refs.bgColor.value = state.bgColor;
      refs.bgColor.disabled = state.bgMode !== 'custom';
    }

    function clampSettingsToImage(){
      if (!state.image) return;
      const w = state.image.width;
      const h = state.image.height;

      state.frameW = Math.min(Math.max(1, state.frameW), w);
      state.frameH = Math.min(Math.max(1, state.frameH), h);

      const maxCols = Math.max(1, Math.floor(w / state.frameW));
      const maxRows = Math.max(1, Math.floor(h / state.frameH));
      state.cols = Math.min(Math.max(1, state.cols), maxCols);
      state.rows = Math.min(Math.max(1, state.rows), maxRows);

      state.totalFrames = Math.max(1, state.cols * state.rows);
      state.currentFrame = Math.min(state.currentFrame, state.totalFrames - 1);
      refs.frameInfo.textContent = `총 프레임: ${state.totalFrames} (시트 ${w}×${h}px)`;
      refs.frameBadge.textContent = `프레임 ${state.currentFrame + 1} / ${state.totalFrames}`;
    }

    function getFrameRect(frameIndex){
      const i = Math.max(0, Math.min(frameIndex, state.totalFrames - 1));
      const col = i % state.cols;
      const row = Math.floor(i / state.cols);
      return {
        sx: col * state.frameW,
        sy: row * state.frameH,
        sw: state.frameW,
        sh: state.frameH
      };
    }

    function getBackgroundFill(){
      if (state.bgMode === 'transparent') return null;
      if (state.bgMode === 'white') return '#ffffff';
      if (state.bgMode === 'black') return '#000000';
      return state.bgColor;
    }

    function drawFrame(targetCtx, frameIndex, width, height){
      const bg = getBackgroundFill();
      targetCtx.clearRect(0, 0, width, height);
      if (bg) {
        targetCtx.fillStyle = bg;
        targetCtx.fillRect(0, 0, width, height);
      }
      if (!state.image) return;
      const r = getFrameRect(frameIndex);
      targetCtx.drawImage(state.image, r.sx, r.sy, r.sw, r.sh, 0, 0, width, height);
    }

    function renderPreview(){
      refs.emptyNote.style.display = state.image ? 'none' : 'block';
      if (!state.image) return;

      if (refs.previewCanvas.width !== state.frameW || refs.previewCanvas.height !== state.frameH) {
        refs.previewCanvas.width = state.frameW;
        refs.previewCanvas.height = state.frameH;
      }

      drawFrame(previewCtx, state.currentFrame, state.frameW, state.frameH);
      refs.frameBadge.textContent = `프레임 ${state.currentFrame + 1} / ${state.totalFrames}`;
      highlightCurrentThumb();
    }

    function stepForPlayback(){
      if (state.totalFrames <= 1) return;

      if (state.playMode === 'loop') {
        state.currentFrame = (state.currentFrame + 1) % state.totalFrames;
        return;
      }

      if (state.playMode === 'once') {
        if (state.currentFrame >= state.totalFrames - 1) {
          state.isPlaying = false;
          refs.playPauseBtn.textContent = '▶ 재생';
          return;
        }
        state.currentFrame += 1;
        return;
      }

      if (state.playMode === 'pingpong') {
        if (state.totalFrames === 2) {
          state.currentFrame = state.currentFrame === 0 ? 1 : 0;
          return;
        }
        if (state.currentFrame >= state.totalFrames - 1) state.direction = -1;
        else if (state.currentFrame <= 0) state.direction = 1;
        state.currentFrame += state.direction;
      }
    }

    function playPause(){
      if (!state.image) return;
      if (state.playMode === 'once' && state.currentFrame >= state.totalFrames - 1) {
        state.currentFrame = 0;
      }
      state.isPlaying = !state.isPlaying;
      refs.playPauseBtn.textContent = state.isPlaying ? '⏸ 일시정지' : '▶ 재생';
      state.lastTs = 0;
      state.accumulator = 0;
    }

    function prevFrame(){
      if (!state.image) return;
      state.isPlaying = false;
      refs.playPauseBtn.textContent = '▶ 재생';
      state.currentFrame = (state.currentFrame - 1 + state.totalFrames) % state.totalFrames;
      renderPreview();
    }

    function nextFrame(){
      if (!state.image) return;
      state.isPlaying = false;
      refs.playPauseBtn.textContent = '▶ 재생';
      state.currentFrame = (state.currentFrame + 1) % state.totalFrames;
      renderPreview();
    }

    function restart(){
      if (!state.image) return;
      state.currentFrame = 0;
      state.direction = 1;
      renderPreview();
    }

    function rafLoop(ts){
      if (state.isPlaying && state.image) {
        if (!state.lastTs) state.lastTs = ts;
        const delta = ts - state.lastTs;
        state.lastTs = ts;
        state.accumulator += delta;
        const frameInterval = 1000 / state.fps;

        while (state.accumulator >= frameInterval) {
          stepForPlayback();
          state.accumulator -= frameInterval;
        }
      } else {
        state.lastTs = ts;
      }

      renderPreview();
      requestAnimationFrame(rafLoop);
    }

    function getBooleanOccupancyByAlpha(data, width, height){
      const col = new Array(width).fill(false);
      const row = new Array(height).fill(false);
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const alpha = data[(y * width + x) * 4 + 3];
          if (alpha > 10) {
            col[x] = true;
            row[y] = true;
          }
        }
      }
      return { col, row };
    }

    function trueSegments(boolArr){
      const out = [];
      let start = -1;
      for (let i = 0; i < boolArr.length; i++) {
        if (boolArr[i] && start < 0) start = i;
        if ((!boolArr[i] || i === boolArr.length - 1) && start >= 0) {
          const end = boolArr[i] ? i : i - 1;
          out.push({ start, end, len: end - start + 1 });
          start = -1;
        }
      }
      return out;
    }

    function divisors(n){
      const d = [];
      for (let i = 1; i * i <= n; i++) {
        if (n % i === 0) {
          d.push(i);
          if (i !== n / i) d.push(n / i);
        }
      }
      return d.sort((a, b) => a - b);
    }

    function boundaryTransparency(imgData, w, h, fw, fh){
      const data = imgData.data;
      let sum = 0;
      let cnt = 0;
      const stepY = Math.max(1, Math.floor(h / 140));
      const stepX = Math.max(1, Math.floor(w / 140));

      for (let x = fw; x < w; x += fw) {
        for (let y = 0; y < h; y += stepY) {
          const a = data[(y * w + x) * 4 + 3];
          sum += (255 - a) / 255;
          cnt++;
        }
      }
      for (let y = fh; y < h; y += fh) {
        for (let x = 0; x < w; x += stepX) {
          const a = data[(y * w + x) * 4 + 3];
          sum += (255 - a) / 255;
          cnt++;
        }
      }
      return cnt ? sum / cnt : 0;
    }

    function autoDetectGrid(image){
      const off = document.createElement('canvas');
      off.width = image.width;
      off.height = image.height;
      const ctx = off.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(image, 0, 0);
      const imgData = ctx.getImageData(0, 0, off.width, off.height);

      const w = off.width;
      const h = off.height;
      const { col, row } = getBooleanOccupancyByAlpha(imgData.data, w, h);
      const colSeg = trueSegments(col);
      const rowSeg = trueSegments(row);

      let guess = null;
      if (colSeg.length >= 2 && rowSeg.length >= 2) {
        const avgW = Math.round(colSeg.reduce((s, s2) => s + s2.len, 0) / colSeg.length);
        const avgH = Math.round(rowSeg.reduce((s, s2) => s + s2.len, 0) / rowSeg.length);
        if (avgW > 0 && avgH > 0 && w % avgW === 0 && h % avgH === 0) {
          guess = {
            frameW: avgW,
            frameH: avgH,
            cols: Math.floor(w / avgW),
            rows: Math.floor(h / avgH),
            reason: '투명 경계 기반'
          };
        }
      }

      const wDiv = divisors(w).filter((n) => n >= 4 && n <= w);
      const hDiv = divisors(h).filter((n) => n >= 4 && n <= h);
      let best = null;

      for (const fw of wDiv) {
        const cols = w / fw;
        if (!Number.isInteger(cols) || cols > 200) continue;
        for (const fh of hDiv) {
          const rows = h / fh;
          if (!Number.isInteger(rows) || rows > 200) continue;
          const total = cols * rows;
          if (total > 1200) continue;

          const ratioPenalty = Math.abs(Math.log(fw / fh)) * 0.82;
          const countPenalty = Math.abs(Math.log2(total) - 4) * 0.18;
          const singlePenalty = total === 1 ? 1.3 : 0;
          const tinyPenalty = fw < 8 || fh < 8 ? 0.7 : 0;
          const borderBonus = boundaryTransparency(imgData, w, h, fw, fh) * 1.45;
          const score = ratioPenalty + countPenalty + singlePenalty + tinyPenalty - borderBonus;

          if (!best || score < best.score) {
            best = { score, frameW: fw, frameH: fh, cols, rows, reason: '격자 점수 기반' };
          }
        }
      }

      if (guess && best) {
        const guessTotal = guess.cols * guess.rows;
        const bestTotal = best.cols * best.rows;
        const useGuess = Math.abs(guessTotal - bestTotal) <= Math.max(4, Math.floor(bestTotal * 0.35));
        return useGuess ? guess : best;
      }

      return guess || best || { frameW: w, frameH: h, cols: 1, rows: 1, reason: '기본값' };
    }

    function applyGridFromInputs(reason = '수동 설정'){
      readInputs();
      clampSettingsToImage();
      writeInputs();
      state.direction = 1;
      state.totalFrames = Math.max(1, state.cols * state.rows);
      refs.frameInfo.textContent = `총 프레임: ${state.totalFrames} · ${reason}`;
      renderThumbnails();
      renderPreview();
    }

    function applyAutoDetect(){
      if (!state.image) return;
      const found = autoDetectGrid(state.image);
      state.frameW = found.frameW;
      state.frameH = found.frameH;
      state.cols = found.cols;
      state.rows = found.rows;
      clampSettingsToImage();
      writeInputs();
      setSheetInfo(`감지 결과: ${state.image.width}×${state.image.height}px / ${state.cols}열 × ${state.rows}행 (${found.reason})`);
      applyGridFromInputs('자동 감지');
    }

    function calcGridFromCell(){
      if (!state.image) return;
      readInputs();
      state.cols = Math.max(1, Math.floor(state.image.width / Math.max(1, state.frameW)));
      state.rows = Math.max(1, Math.floor(state.image.height / Math.max(1, state.frameH)));
      applyGridFromInputs('크기→행열 계산');
    }

    function calcCellFromGrid(){
      if (!state.image) return;
      readInputs();
      state.frameW = Math.max(1, Math.floor(state.image.width / Math.max(1, state.cols)));
      state.frameH = Math.max(1, Math.floor(state.image.height / Math.max(1, state.rows)));
      applyGridFromInputs('행열→크기 계산');
    }

    function updateButtonsEnabled(){
      const ready = !!state.image;
      refs.playPauseBtn.disabled = !ready;
      refs.exportGifBtn.disabled = !ready;
      refs.exportApngBtn.disabled = !ready;
      refs.prevBtn.disabled = !ready;
      refs.nextBtn.disabled = !ready;
      refs.restartBtn.disabled = !ready;
    }

    function clearThumbs(){
      refs.thumbStrip.innerHTML = '';
      state.thumbButtons = [];
    }

    function drawThumbCanvas(ctx, idx, size = 64){
      ctx.clearRect(0, 0, size, size);
      const bg = getBackgroundFill();
      if (bg) {
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, size, size);
      } else {
        ctx.fillStyle = '#c4cada';
        ctx.globalAlpha = 0.35;
        for (let y = 0; y < size; y += 8) {
          for (let x = 0; x < size; x += 8) {
            if (((x + y) / 8) % 2 === 0) ctx.fillRect(x, y, 8, 8);
          }
        }
        ctx.globalAlpha = 1;
      }

      const r = getFrameRect(idx);
      const scale = Math.min((size - 6) / r.sw, (size - 6) / r.sh);
      const dw = Math.max(1, Math.floor(r.sw * scale));
      const dh = Math.max(1, Math.floor(r.sh * scale));
      const dx = Math.floor((size - dw) / 2);
      const dy = Math.floor((size - dh) / 2);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(state.image, r.sx, r.sy, r.sw, r.sh, dx, dy, dw, dh);
    }

    function renderThumbnails(){
      clearThumbs();
      if (!state.image) return;

      const maxThumb = 400;
      const count = Math.min(state.totalFrames, maxThumb);
      for (let i = 0; i < count; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'thumb-btn';
        btn.title = `${i + 1}번 프레임`;

        const cvs = document.createElement('canvas');
        cvs.width = 64;
        cvs.height = 64;
        cvs.className = 'thumb-canvas';
        drawThumbCanvas(cvs.getContext('2d'), i);

        const num = document.createElement('span');
        num.className = 'thumb-num';
        num.textContent = String(i + 1);

        btn.appendChild(cvs);
        btn.appendChild(num);
        btn.addEventListener('click', () => {
          state.currentFrame = i;
          state.isPlaying = false;
          refs.playPauseBtn.textContent = '▶ 재생';
          renderPreview();
        });
        refs.thumbStrip.appendChild(btn);
        state.thumbButtons.push(btn);
      }

      if (state.totalFrames > maxThumb) {
        const note = document.createElement('div');
        note.className = 'muted';
        note.style.alignSelf = 'center';
        note.style.padding = '8px 4px';
        note.textContent = `… ${state.totalFrames - maxThumb}개 프레임은 성능을 위해 생략`;
        refs.thumbStrip.appendChild(note);
      }

      highlightCurrentThumb();
    }

    function highlightCurrentThumb(){
      if (!state.thumbButtons.length) return;
      state.thumbButtons.forEach((btn, idx) => {
        btn.classList.toggle('active', idx === state.currentFrame);
      });
    }

    async function loadFile(file){
      if (!file || !file.type.startsWith('image/')) {
        setSheetInfo('이미지 파일만 업로드할 수 있습니다.');
        return;
      }

      if (state.objectUrl) URL.revokeObjectURL(state.objectUrl);
      const url = URL.createObjectURL(file);
      state.objectUrl = url;
      state.imageName = (file.name || 'sprite-sheet').replace(/\.[^.]+$/, '');

      const img = new Image();
      img.src = url;
      try {
        await img.decode();
      } catch {
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
        });
      }

      state.image = img;
      state.currentFrame = 0;
      state.direction = 1;
      state.isPlaying = false;
      refs.playPauseBtn.textContent = '▶ 재생';
      updateButtonsEnabled();

      applyAutoDetect();
      setExportStatus('내보내기 준비 완료');
    }

    function makeSampleSheet(){
      const fw = 80, fh = 80, cols = 6, rows = 2;
      const canvas = document.createElement('canvas');
      canvas.width = fw * cols;
      canvas.height = fh * rows;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < cols * rows; i++) {
        const cx = (i % cols) * fw + fw / 2;
        const cy = Math.floor(i / cols) * fh + fh / 2;
        const t = i / (cols * rows - 1 || 1);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(Math.PI * 2 * t);
        ctx.fillStyle = `hsl(${Math.floor(240 - t * 180)} 85% 56% / 0.95)`;
        ctx.fillRect(-16, -26, 32, 52);
        ctx.fillStyle = 'rgba(255,255,255,.95)';
        ctx.fillRect(-20, -6, 40, 14);
        ctx.fillStyle = `hsl(${Math.floor(340 - t * 160)} 92% 62% / .95)`;
        ctx.beginPath();
        ctx.arc(0, -30, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      return new Promise((resolve) => {
        canvas.toBlob((blob) => {
          const sampleFile = new File([blob], 'sample-sprite.png', { type: 'image/png' });
          resolve(sampleFile);
        }, 'image/png');
      });
    }

    function exportFrameOrder(){
      const forward = Array.from({ length: state.totalFrames }, (_, i) => i);
      if (state.playMode !== 'pingpong' || state.totalFrames <= 2) return forward;
      const backward = Array.from({ length: state.totalFrames - 2 }, (_, i) => state.totalFrames - 2 - i);
      return forward.concat(backward);
    }

    function downloadBlob(blob, fileName){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    async function exportGIF(){
      if (!state.image || typeof GIF === 'undefined') {
        setExportStatus('GIF 라이브러리를 불러오지 못했습니다.');
        return;
      }

      refs.exportGifBtn.disabled = true;
      refs.exportApngBtn.disabled = true;
      setExportStatus('GIF 인코딩 준비 중...');

      const order = exportFrameOrder();
      const delay = Math.max(16, Math.round(1000 / state.fps));
      const off = document.createElement('canvas');
      off.width = state.frameW;
      off.height = state.frameH;
      const offCtx = off.getContext('2d', { alpha: true });

      const gif = new GIF({
        workers: 2,
        quality: 10,
        width: state.frameW,
        height: state.frameH,
        repeat: state.playMode === 'once' ? -1 : 0,
        workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
      });

      order.forEach((idx) => {
        drawFrame(offCtx, idx, state.frameW, state.frameH);
        gif.addFrame(off, { copy: true, delay });
      });

      gif.on('progress', (p) => {
        setExportStatus(`GIF 인코딩 중... ${Math.round(p * 100)}%`);
      });

      gif.on('finished', (blob) => {
        downloadBlob(blob, `${state.imageName}-${state.fps}fps.gif`);
        setExportStatus('GIF 내보내기 완료 ✅');
        refs.exportGifBtn.disabled = false;
        refs.exportApngBtn.disabled = false;
      });

      gif.on('abort', () => {
        setExportStatus('GIF 인코딩이 중단되었습니다.');
        refs.exportGifBtn.disabled = false;
        refs.exportApngBtn.disabled = false;
      });

      try {
        gif.render();
      } catch (err) {
        setExportStatus(`GIF 인코딩 실패: ${err.message}`);
        refs.exportGifBtn.disabled = false;
        refs.exportApngBtn.disabled = false;
      }
    }

    async function exportAPNG(){
      if (!state.image || typeof UPNG === 'undefined') {
        setExportStatus('APNG 라이브러리를 불러오지 못했습니다.');
        return;
      }

      refs.exportGifBtn.disabled = true;
      refs.exportApngBtn.disabled = true;
      setExportStatus('APNG 인코딩 준비 중...');

      const order = exportFrameOrder();
      const delay = Math.max(16, Math.round(1000 / state.fps));
      const delays = order.map(() => delay);

      const off = document.createElement('canvas');
      off.width = state.frameW;
      off.height = state.frameH;
      const offCtx = off.getContext('2d', { alpha: true, willReadFrequently: true });

      const rgbaBuffers = [];
      for (let i = 0; i < order.length; i++) {
        drawFrame(offCtx, order[i], state.frameW, state.frameH);
        const frame = offCtx.getImageData(0, 0, state.frameW, state.frameH);
        rgbaBuffers.push(frame.data.buffer.slice(0));
        if ((i + 1) % 12 === 0 || i === order.length - 1) {
          setExportStatus(`APNG 프레임 수집 중... ${i + 1}/${order.length}`);
          await new Promise((r) => setTimeout(r, 0));
        }
      }

      try {
        const pngBytes = UPNG.encode(rgbaBuffers, state.frameW, state.frameH, 0, delays);
        const blob = new Blob([pngBytes], { type: 'image/png' });
        downloadBlob(blob, `${state.imageName}-${state.fps}fps.apng.png`);
        setExportStatus('APNG 내보내기 완료 ✅');
      } catch (err) {
        setExportStatus(`APNG 인코딩 실패: ${err.message}`);
      } finally {
        refs.exportGifBtn.disabled = false;
        refs.exportApngBtn.disabled = false;
      }
    }

    function bindUploadEvents(){
      refs.fileInput.addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (file) loadFile(file);
      });

      ['dragenter', 'dragover'].forEach((ev) => {
        refs.dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          refs.dropzone.classList.add('dragover');
        });
      });

      ['dragleave', 'drop'].forEach((ev) => {
        refs.dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          refs.dropzone.classList.remove('dragover');
        });
      });

      refs.dropzone.addEventListener('drop', (e) => {
        const file = e.dataTransfer?.files?.[0];
        if (file) loadFile(file);
      });

      refs.sampleBtn.addEventListener('click', async () => {
        const file = await makeSampleSheet();
        loadFile(file);
      });
    }

    function bindControlEvents(){
      refs.themeToggle.addEventListener('click', toggleTheme);

      [refs.frameW, refs.frameH, refs.cols, refs.rows].forEach((el) => {
        ['input', 'change'].forEach((ev) => {
          el.addEventListener(ev, () => {
            if (!state.image) return;
            applyGridFromInputs('수동 조정');
          });
        });
      });

      refs.autoDetectBtn.addEventListener('click', applyAutoDetect);
      refs.fromCellBtn.addEventListener('click', calcGridFromCell);
      refs.fromGridBtn.addEventListener('click', calcCellFromGrid);

      refs.fps.addEventListener('input', () => {
        readInputs();
        writeInputs();
      });

      refs.bgMode.addEventListener('change', () => {
        readInputs();
        writeInputs();
        if (state.image) {
          renderThumbnails();
          renderPreview();
        }
      });
      refs.bgColor.addEventListener('input', () => {
        readInputs();
        if (state.image) {
          renderThumbnails();
          renderPreview();
        }
      });

      document.querySelectorAll('input[name="playMode"]').forEach((radio) => {
        radio.addEventListener('change', () => {
          readInputs();
          state.direction = 1;
        });
      });

      refs.playPauseBtn.addEventListener('click', playPause);
      refs.prevBtn.addEventListener('click', prevFrame);
      refs.nextBtn.addEventListener('click', nextFrame);
      refs.restartBtn.addEventListener('click', restart);
      refs.exportGifBtn.addEventListener('click', exportGIF);
      refs.exportApngBtn.addEventListener('click', exportAPNG);
    }

    function init(){
      initTheme();
      writeInputs();
      bindUploadEvents();
      bindControlEvents();
      updateButtonsEnabled();
      requestAnimationFrame(rafLoop);
    }

    init();
  </script>
</body>
</html>
