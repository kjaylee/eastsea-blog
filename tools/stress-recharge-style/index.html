      margin-bottom: 12px;
      padding: 9px 11px;

    .card {

      border: 1px solid var(--line);
      border-radius: var(--radius);

      gap: 8px;

      color: #fff;
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.16);

      margin-top: 16px;

      pointer-events: none;
      transition: all .2s ease;
      z-index: 40;
      max-width: calc(100% - 32px);
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @keyframes spin { to { transform: rotate(360deg);} }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }

    @media (max-width: 420px) {
      .card-inner { padding: 18px; }
      .share-grid { grid-template-columns: 1fr; }
      .question-title { font-size: 1.1rem; }
    }
  </style>

      function drawBarChart(canvas, values) {
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const cssW = canvas.clientWidth || 640;
        const cssH = 280;
        canvas.width = Math.floor(cssW * dpr);
        canvas.height = Math.floor(cssH * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const w = cssW;
        const h = cssH;
        ctx.clearRect(0, 0, w, h);

        const labels = AXES.map((a) => AXIS_LABEL[a]);
        const vals = AXES.map((a) => Number(values[a] || 0));

        const left = 24;
        const right = w - 24;
        const top = 20;
        const bottom = h - 44;
        const chartW = right - left;
        const chartH = bottom - top;

        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
          const y = top + (chartH / 4) * i;
          ctx.beginPath();
          ctx.moveTo(left, y);
          ctx.lineTo(right, y);
          ctx.stroke();
        }

        const barGap = 16;
        const barW = (chartW - barGap * (vals.length - 1)) / vals.length;
        vals.forEach((v, i) => {
          const x = left + i * (barW + barGap);
          const bh = chartH * (Math.max(0, Math.min(100, v)) / 100);
          const y = bottom - bh;

          const grad = ctx.createLinearGradient(0, y, 0, bottom);
          grad.addColorStop(0, '#ffe39f');
          grad.addColorStop(1, '#9fe8ff');
          ctx.fillStyle = grad;
          roundRect(ctx, x, y, barW, bh, 10);
          ctx.fill();

          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.font = '700 12px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(`${v}`, x + barW / 2, y - 6);

          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.font = '600 12px sans-serif';
          const label = labels[i].length > 7 ? labels[i].slice(0, 7) + '…' : labels[i];
          ctx.fillText(label, x + barW / 2, h - 18);
        });
      }

      function roundRect(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function startQuiz() {
        clearTimers();
        state.phase = 'question';
        state.current = 0;
        state.answers = [];
        state.scores = createZeroScores();
        state.lastResult = null;
        updateTopProgress();
        renderQuestion();
      }

      function answerQuestion(optionIndex) {
        const q = QUESTIONS[state.current];
        const option = q.options[optionIndex];
        if (!option) return;

        const weight = Number(q.weight || 1);
        AXES.forEach((axis) => {
          state.scores[axis] += Number(option.scores?.[axis] || 0) * weight;
        });
        state.answers.push({ q: state.current, option: optionIndex, weight });
        triggerHaptic();

        state.current += 1;
        if (state.current >= QUESTIONS.length) {
          state.phase = 'analyzing';
          updateTopProgress();
          renderAnalyzing();
          return;
        }

        updateTopProgress();
        renderQuestion();
      }

      function computeNormalized() {
        const maxPerAxis = createZeroScores();
        QUESTIONS.forEach((q) => {
          const w = Number(q.weight || 1);
          AXES.forEach((axis) => {
            maxPerAxis[axis] += 4 * w;
          });
        });

        const normalized = createZeroScores();
        AXES.forEach((axis) => {
          const raw = Number(state.scores[axis] || 0);
          const max = Number(maxPerAxis[axis] || 1);
          normalized[axis] = Math.round((raw / max) * 100);
        });
        return normalized;
      }

      function decideType(normalized) {
        const sorted = [...AXES].sort((a, b) => normalized[b] - normalized[a]);
        if (normalized[sorted[0]] !== normalized[sorted[1]]) return RESULT_BY_AXIS[sorted[0]];

        const boundaryBoost = normalized.boundaryControl >= 70 ? 'boundaryControl' : sorted[0];
        return RESULT_BY_AXIS[boundaryBoost] || RESULT_BY_AXIS[sorted[0]];
      }

      function finalizeResult() {
        const normalized = computeNormalized();
        const resilienceIndex = Math.round(
          normalized.bodyReset * 0.27 +
          normalized.socialCharge * 0.24 +
          normalized.meaningFocus * 0.25 +
          normalized.boundaryControl * 0.24
        );
        const type = decideType(normalized);

        const result = {
          type,
          normalized,
          resilienceIndex,
          savedAt: new Date().toISOString()
        };

        saveResult(result);
        state.lastResult = result;
        state.phase = 'result';
        updateTopProgress();
        renderResult(result);
      }

      function getShareText(result) {
        const info = RESULTS[result.type];
        return `나의 스트레스 회복 스타일은 ${info.name} (${result.resilienceIndex}점)! 당신도 테스트해보세요.`;
      }

      function openShare(url) {
        try {
          window.open(url, '_blank', 'noopener,noreferrer');
          return true;
        } catch (_) {
          return false;
        }
      }

      function shareResult(channel, result) {
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent(getShareText(result));

        if (channel === 'kakao') {
          const shareUrl = `https://story.kakao.com/share?url=${url}`;
          openShare(shareUrl);
          showToast('카카오 공유 창을 열었어요.');
          return;
        }

        if (channel === 'twitter') {
          const shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
          openShare(shareUrl);
          showToast('트위터 공유 창을 열었어요.');
        }
      }

      async function copyResultLink(result) {
        const text = `${getShareText(result)} ${window.location.href}`;
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            fallbackCopy(text);
          }
          showToast('링크가 복사되었습니다.');
        } catch (_) {
          try {
            fallbackCopy(text);
            showToast('링크가 복사되었습니다.');
          } catch (__){
            showToast('복사에 실패했어요. 수동으로 복사해주세요.');
          }
        }
      }

      function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }

      function resetQuiz() {
        clearTimers();
        state.phase = 'intro';
        state.current = 0;
        state.answers = [];
        state.scores = createZeroScores();
        state.lastResult = null;
        updateTopProgress();
        renderIntro();
      }

      function clearTimers() {
        clearTimeout(state.analyzingTimer);
        clearInterval(state.progressTimer);
      }

      function init() {
        updateTopProgress();
        renderIntro();
      }

      init();
    })();
  </script>
</body>
</html>
