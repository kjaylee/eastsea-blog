<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subnet Calculator — IPv4 CIDR Network Tool</title>
<meta name="description" content="IPv4 subnet calculator. Enter IP/CIDR to get network address, broadcast, host range, subnet mask, wildcard mask, and more.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg2:#0f1117;--glass:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);--text:#e0e0e0;--text2:#888;--accent:#00b4d8;--accent2:#48cae4;--success:#00b894;--warn:#ffd166;--danger:#ef476f}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem}
.container{max-width:860px;margin:0 auto}
h1{text-align:center;font-size:1.9rem;margin-bottom:.3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.subtitle{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:2rem}
.input-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.input-group{flex:1;min-width:200px}
label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.4rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
input,select{width:100%;background:var(--glass);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:.75rem 1rem;font-size:1rem;outline:none;transition:border-color .2s;backdrop-filter:blur(10px)}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text2)}
select option{background:#1a1a2e;color:var(--text)}
.btn{padding:.75rem 1.8rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#000;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-row{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.card{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:1.25rem;backdrop-filter:blur(20px);margin-bottom:1rem}
.card-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:.8rem}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.6rem}
.result-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:.6rem .9rem;gap:.5rem}
.result-key{font-size:.8rem;color:var(--text2);white-space:nowrap}
.result-val{font-size:.85rem;font-family:'SF Mono',Monaco,Consolas,monospace;color:var(--text);font-weight:600;word-break:break-all;text-align:right;cursor:pointer;transition:color .15s}
.result-val:hover{color:var(--accent)}
.binary-section{margin-top:1rem}
.binary-row{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.8rem;line-height:1.9;color:var(--text2);word-break:break-all}
.binary-row span.highlight{color:var(--accent);font-weight:700}
.binary-row span.host-part{color:var(--warn)}
.error{background:rgba(239,71,111,0.1);border:1px solid var(--danger);border-radius:10px;padding:.75rem 1rem;color:var(--danger);font-size:.9rem;margin-bottom:1rem;display:none}
.error.show{display:block}
.cidr-bar{display:flex;gap:.2rem;margin-top:.5rem;flex-wrap:wrap}
.cidr-bit{width:18px;height:18px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;font-family:monospace;font-weight:700;border:1px solid var(--border)}
.cidr-bit.net{background:rgba(0,180,216,0.2);color:var(--accent);border-color:rgba(0,180,216,0.3)}
.cidr-bit.host{background:rgba(255,209,102,0.1);color:var(--warn);border-color:rgba(255,209,102,0.2)}
.badge{display:inline-block;padding:.2rem .5rem;border-radius:6px;font-size:.75rem;font-weight:700}
.badge-blue{background:rgba(0,180,216,0.15);color:var(--accent)}
.badge-green{background:rgba(0,184,148,0.15);color:var(--success)}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}
.split-table{width:100%;border-collapse:collapse;font-size:.82rem;font-family:'SF Mono',Monaco,Consolas,monospace}
.split-table th{text-align:left;padding:.5rem .75rem;color:var(--text2);font-size:.75rem;text-transform:uppercase;border-bottom:1px solid var(--border)}
.split-table td{padding:.4rem .75rem;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text)}
.split-table tr:hover td{background:rgba(255,255,255,0.03)}
.range-slider{width:100%;margin:.5rem 0}
.usable-tip{font-size:.75rem;color:var(--text2);margin-top:.3rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--success);color:#000;padding:.6rem 1.2rem;border-radius:10px;font-weight:700;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
@media(max-width:600px){h1{font-size:1.4rem}.result-grid{grid-template-columns:1fr}.cidr-bit{width:14px;height:14px;font-size:.5rem}}
</style>
</head>
<body>
<div class="container">
  <h1>🌐 Subnet Calculator</h1>
  <p class="subtitle">IPv4 CIDR network calculator — address, mask, range, hosts</p>

  <div class="input-row">
    <div class="input-group" style="flex:2;min-width:220px">
      <label>IP Address / CIDR Notation</label>
      <input type="text" id="ipInput" placeholder="e.g. 192.168.1.0/24 or 10.0.5.0" value="192.168.1.0/24">
    </div>
    <div class="input-group" style="flex:1;min-width:160px">
      <label>Prefix Length</label>
      <select id="prefixSelect">
        <option value="">— auto from CIDR —</option>
      </select>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="calculate()">Calculate</button>
    <button class="btn" style="background:var(--glass);border:1px solid var(--border);color:var(--text);font-weight:600" onclick="loadExample()">Example</button>
  </div>

  <div class="error" id="errorBox"></div>
  <div id="results" style="display:none">

    <div class="card">
      <div class="card-title">Network Information</div>
      <div class="result-grid" id="mainInfo"></div>
    </div>

    <div class="card">
      <div class="card-title">Binary Representation</div>
      <div class="binary-section" id="binaryView"></div>
      <div style="margin-top:.8rem;font-size:.75rem;color:var(--text2)">
        <span style="color:var(--accent)">■</span> Network bits &nbsp;
        <span style="color:var(--warn)">■</span> Host bits
      </div>
    </div>

    <div class="card">
      <div class="card-title">Subnet Split — divide into smaller subnets</div>
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.8rem;flex-wrap:wrap">
        <label style="margin:0;font-size:.8rem;color:var(--text2)">Split into /<span id="splitLabel">26</span></label>
        <input type="range" class="range-slider" id="splitSlider" min="1" max="32" value="26" style="flex:1;min-width:120px;accent-color:var(--accent)" oninput="updateSplit()">
        <span id="splitCount" class="badge badge-blue">4 subnets</span>
      </div>
      <div id="splitTable"></div>
      <p class="usable-tip" id="splitTip"></p>
    </div>

  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
// Populate prefix select
const sel = document.getElementById('prefixSelect');
for(let i=1;i<=32;i++){
  const o=document.createElement('option');
  o.value=i; o.text='/'+i; sel.appendChild(o);
}

function ipToInt(ip){
  const p=ip.split('.').map(Number);
  if(p.length!==4||p.some(x=>isNaN(x)||x<0||x>255)) throw new Error('Invalid IP: '+ip);
  return (p[0]<<24|p[1]<<16|p[2]<<8|p[3])>>>0;
}
function intToIp(n){
  n=n>>>0;
  return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');
}
function ipToBinary(ip){
  return ip.split('.').map(n=>parseInt(n).toString(2).padStart(8,'0')).join('.');
}
function maskFromPrefix(p){return p===0?0:(0xFFFFFFFF<<(32-p))>>>0}
function prefixFromMask(m){
  let c=0,n=m>>>0;
  while(n){c+=(n&1);n>>>=1;}
  return c;
}

function calculate(){
  const raw=document.getElementById('ipInput').value.trim();
  const selVal=document.getElementById('prefixSelect').value;
  const errBox=document.getElementById('errorBox');
  errBox.classList.remove('show');
  document.getElementById('results').style.display='none';

  try{
    let ipStr,prefix;
    if(raw.includes('/')){
      [ipStr,prefix]=[raw.split('/')[0],parseInt(raw.split('/')[1])];
    } else {
      ipStr=raw;
      prefix=selVal?parseInt(selVal):24;
      document.getElementById('prefixSelect').value=prefix;
    }
    if(isNaN(prefix)||prefix<0||prefix>32) throw new Error('Prefix must be 0-32');
    const ipInt=ipToInt(ipStr);
    const mask=maskFromPrefix(prefix);
    const network=ipInt&mask;
    const broadcast=network|(~mask>>>0);
    const firstHost=prefix<31?network+1:network;
    const lastHost=prefix<31?broadcast-1:broadcast;
    const hostCount=prefix>=31?Math.pow(2,32-prefix):Math.pow(2,32-prefix)-2;
    const totalAddr=Math.pow(2,32-prefix);
    const wildcard=~mask>>>0;
    const classLabel=getClass(network>>>24);

    document.getElementById('mainInfo').innerHTML=[
      ['Input IP', ipStr],
      ['Network Address', intToIp(network)],
      ['Broadcast Address', intToIp(broadcast)],
      ['Subnet Mask', intToIp(mask)],
      ['Wildcard Mask', intToIp(wildcard)],
      ['CIDR Notation', intToIp(network)+'/'+prefix],
      ['First Usable Host', prefix<=30?intToIp(firstHost):'N/A'],
      ['Last Usable Host', prefix<=30?intToIp(lastHost):'N/A'],
      ['Usable Hosts', hostCount.toLocaleString()],
      ['Total Addresses', totalAddr.toLocaleString()],
      ['IP Class', classLabel],
      ['RFC 1918 Private', isPrivate(network)?'✅ Yes':'❌ No'],
    ].map(([k,v])=>`<div class="result-item"><span class="result-key">${k}</span><span class="result-val" onclick="copyVal(this)">${v}</span></div>`).join('');

    // Binary view
    const ipBin=ipToBinary(ipStr);
    const maskBin=ipToBinary(intToIp(mask));
    const netBin=ipToBinary(intToIp(network));
    const bcBin=ipToBinary(intToIp(broadcast));
    document.getElementById('binaryView').innerHTML=[
      ['IP Address', ipBin, prefix],
      ['Subnet Mask', maskBin, -1],
      ['Network Address', netBin, prefix],
      ['Broadcast Address', bcBin, -1],
    ].map(([lbl,bin,pf])=>{
      const bits=bin.replace(/\./g,'');
      let html='';
      if(pf>=0){
        for(let i=0;i<32;i++){
          if(i===8||i===16||i===24) html+='.';
          html+=`<span class="${i<pf?'highlight':'host-part'}">${bits[i]}</span>`;
        }
      } else html=bin.replace(/([01]+)/g,'<span>$1</span>');
      return `<div class="binary-row"><span style="color:var(--text2);font-size:.72rem;display:inline-block;width:130px;font-family:sans-serif">${lbl}</span>${html}</div>`;
    }).join('');

    // Split slider setup
    const slider=document.getElementById('splitSlider');
    slider.min=prefix+1; slider.max=32;
    if(parseInt(slider.value)<=prefix) slider.value=Math.min(prefix+2,32);
    updateSplit();

    document.getElementById('results').style.display='block';
    window._subnetData={network,prefix,mask,broadcast};
  }catch(e){
    errBox.textContent='⚠️ '+e.message; errBox.classList.add('show');
  }
}

function updateSplit(){
  if(!window._subnetData) return;
  const {network,prefix}=window._subnetData;
  const newPrefix=parseInt(document.getElementById('splitSlider').value);
  document.getElementById('splitLabel').textContent=newPrefix;
  const count=Math.pow(2,newPrefix-prefix);
  document.getElementById('splitCount').textContent=count.toLocaleString()+' subnet'+(count!==1?'s':'');
  const hostsEach=newPrefix>=31?Math.pow(2,32-newPrefix):Math.pow(2,32-newPrefix)-2;
  document.getElementById('splitTip').textContent=`Each /${newPrefix} subnet has ${hostsEach.toLocaleString()} usable host${hostsEach!==1?'s':''}.`;

  const show=Math.min(count,12);
  const subnetSize=Math.pow(2,32-newPrefix);
  let rows='';
  for(let i=0;i<show;i++){
    const netI=(network+i*subnetSize)>>>0;
    const bcI=(netI+subnetSize-1)>>>0;
    const firstH=newPrefix<31?intToIp((netI+1)>>>0):'—';
    const lastH=newPrefix<31?intToIp((bcI-1)>>>0):'—';
    rows+=`<tr><td>#${i+1}</td><td>${intToIp(netI)}/${newPrefix}</td><td>${intToIp(netI)}</td><td>${intToIp(bcI)}</td><td>${firstH} – ${lastH}</td></tr>`;
  }
  if(count>12) rows+=`<tr><td colspan="5" style="color:var(--text2);text-align:center">... and ${(count-12).toLocaleString()} more subnets</td></tr>`;

  document.getElementById('splitTable').innerHTML=`<table class="split-table"><thead><tr><th>#</th><th>CIDR</th><th>Network</th><th>Broadcast</th><th>Host Range</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function getClass(first){
  if(first<128) return 'A';
  if(first<192) return 'B';
  if(first<224) return 'C';
  if(first<240) return 'D (Multicast)';
  return 'E (Reserved)';
}
function isPrivate(n){
  const f=(n>>>24)&255,s=(n>>>16)&255;
  return f===10||(f===172&&s>=16&&s<=31)||(f===192&&s===168);
}
function loadExample(){
  const examples=['10.0.0.0/8','172.16.0.0/16','192.168.1.0/24','203.0.113.0/27','100.64.0.0/10'];
  document.getElementById('ipInput').value=examples[Math.floor(Math.random()*examples.length)];
  document.getElementById('prefixSelect').value='';
  calculate();
}
function copyVal(el){
  navigator.clipboard.writeText(el.textContent).then(()=>{
    const t=document.getElementById('toast');
    t.textContent='Copied: '+el.textContent;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1800);
  });
}
// Auto-calculate on enter
document.getElementById('ipInput').addEventListener('keydown',e=>{if(e.key==='Enter')calculate()});
calculate();
</script>
</body>
</html>
