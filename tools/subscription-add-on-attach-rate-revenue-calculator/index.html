<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Add-on Attach Rate Revenue Calculator | 구독 Add-on 부착률 수익 계산기</title>
  <meta name="description" content="구독 서비스의 Add-on 부착률 개선이 월 순이익, ROI, 회수기간, 손익분기 목표 부착률에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}.head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.8vw,1.7rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}textarea{min-height:100px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.08rem;font-weight:800;word-break:break-word}.v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">📦 구독 Add-on 부착률 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">현재/목표 Add-on attach rate 차이가 월 순이익, 기간 순효과, 회수기간에 미치는 영향을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="subs" data-i18n="subs">활성 구독자 수</label><input id="subs" type="number" min="1" value="48000" /></div>
          <div><label for="currentAttach" data-i18n="currentAttach">현재 attach rate (%)</label><input id="currentAttach" type="number" min="0" max="100" step="0.1" value="6.5" /></div>
          <div><label for="targetAttach" data-i18n="targetAttach">목표 attach rate (%)</label><input id="targetAttach" type="number" min="0" max="100" step="0.1" value="9.2" /></div>
          <div><label for="price" data-i18n="price">Add-on 월 가격 (KRW)</label><input id="price" type="number" min="1" value="8900" /></div>
          <div><label for="margin" data-i18n="margin">Add-on 매출총이익률 (%)</label><input id="margin" type="number" min="0" max="100" step="0.1" value="78" /></div>
          <div><label for="loss" data-i18n="loss">결제실패/환불 손실률 (%)</label><input id="loss" type="number" min="0" max="100" step="0.1" value="3" /></div>
          <div><label for="support" data-i18n="support">사용자당 월 지원비 (KRW)</label><input id="support" type="number" min="0" value="1100" /></div>
          <div><label for="fixed" data-i18n="fixed">운영 월 고정비 (KRW)</label><input id="fixed" type="number" min="0" value="3500000" /></div>
          <div><label for="setup" data-i18n="setup">초기 셋업비 (KRW)</label><input id="setup" type="number" min="0" value="14000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_users">순증 Add-on 사용자</div><div id="deltaUsers" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_perUser">사용자당 순기여액</div><div id="netPerUser" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthly">월 순증 순이익</div><div id="monthlyUplift" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_period">기간 순효과(셋업비 반영)</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_currentUsers">현재 Add-on 사용자</th><td id="currentUsers">-</td></tr>
            <tr><th data-i18n="d_targetUsers">목표 Add-on 사용자</th><td id="targetUsers">-</td></tr>
            <tr><th data-i18n="d_breakEven">손익분기 목표 attach rate</th><td id="breakEvenAttach">-</td></tr>
            <tr><th data-i18n="d_attachGap">현재 대비 목표 증분(%p)</th><td id="attachGap">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      subs:$("subs"), currentAttach:$("currentAttach"), targetAttach:$("targetAttach"), price:$("price"), margin:$("margin"), loss:$("loss"), support:$("support"), fixed:$("fixed"), setup:$("setup"), months:$("months"),
      deltaUsers:$("deltaUsers"), netPerUser:$("netPerUser"), monthlyUplift:$("monthlyUplift"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      currentUsers:$("currentUsers"), targetUsers:$("targetUsers"), breakEvenAttach:$("breakEvenAttach"), attachGap:$("attachGap"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { subs:48000, currentAttach:6.5, targetAttach:9.2, price:8900, margin:78, loss:3, support:1100, fixed:3500000, setup:14000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"📦 구독 Add-on 부착률 수익 계산기", subtitle:"현재/목표 Add-on attach rate 차이가 월 순이익, 기간 순효과, 회수기간에 미치는 영향을 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        subs:"활성 구독자 수", currentAttach:"현재 attach rate (%)", targetAttach:"목표 attach rate (%)", price:"Add-on 월 가격 (KRW)", margin:"Add-on 매출총이익률 (%)", loss:"결제실패/환불 손실률 (%)", support:"사용자당 월 지원비 (KRW)", fixed:"운영 월 고정비 (KRW)", setup:"초기 셋업비 (KRW)", months:"분석 기간 (개월)",
        k_users:"순증 Add-on 사용자", k_perUser:"사용자당 순기여액", k_monthly:"월 순증 순이익", k_period:"기간 순효과(셋업비 반영)", k_roi:"ROI", k_payback:"회수기간",
        d_currentUsers:"현재 Add-on 사용자", d_targetUsers:"목표 Add-on 사용자", d_breakEven:"손익분기 목표 attach rate", d_attachGap:"현재 대비 목표 증분(%p)",
        errSubs:"활성 구독자 수는 1 이상이어야 합니다.", errAttach:"attach rate는 0~100 범위여야 합니다.", errTarget:"목표 attach rate는 현재 attach rate 이상이어야 합니다.", errPrice:"가격은 0보다 커야 합니다.", errRates:"비율 값은 0~100 범위여야 합니다.", errCosts:"비용 값은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~60개월 범위여야 합니다.",
        impossible:"달성 불가", noPayback:"회수 불가", statusGood:"attach rate 개선이 수익적으로 유리합니다", statusBad:"가정상 순증 이익이 부족합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.", unitMonth:"개월", unitUsers:"명", summaryTitle:"[Subscription Add-on Attach Rate Summary]"
      },
      en: {
        title:"📦 Subscription Add-on Attach Rate Revenue Calculator", subtitle:"Estimate how improving add-on attach rate impacts monthly net uplift, period net impact, and payback.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        subs:"Active subscribers", currentAttach:"Current attach rate (%)", targetAttach:"Target attach rate (%)", price:"Add-on monthly price (KRW)", margin:"Add-on gross margin (%)", loss:"Payment failure/refund loss rate (%)", support:"Support cost per add-on user (KRW)", fixed:"Monthly fixed operating cost (KRW)", setup:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_users:"Incremental add-on users", k_perUser:"Net contribution per user", k_monthly:"Monthly net uplift", k_period:"Period net impact (after setup)", k_roi:"ROI", k_payback:"Payback period",
        d_currentUsers:"Current add-on users", d_targetUsers:"Target add-on users", d_breakEven:"Break-even target attach rate", d_attachGap:"Target increment vs current (%p)",
        errSubs:"Active subscribers must be at least 1.", errAttach:"Attach rates must be between 0 and 100.", errTarget:"Target attach rate must be greater than or equal to current.", errPrice:"Price must be greater than 0.", errRates:"Rate values must be between 0 and 100.", errCosts:"Cost values must be >= 0.", errMonths:"Analysis period must be 1 to 60 months.",
        impossible:"Not feasible", noPayback:"No payback", statusGood:"Attach-rate improvement is financially favorable", statusBad:"Incremental economics are not sufficient under current assumptions", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard unavailable. Please copy manually.", unitMonth:"months", unitUsers:"users", summaryTitle:"[Subscription Add-on Attach Rate Summary]"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.subs) || v.subs < 1) return t("errSubs");
      if ([v.currentAttach,v.targetAttach,v.margin,v.loss].some((n)=>!Number.isFinite(n) || n < 0 || n > 100)) return t("errAttach");
      if (v.targetAttach < v.currentAttach) return t("errTarget");
      if (!Number.isFinite(v.price) || v.price <= 0) return t("errPrice");
      if (!Number.isFinite(v.support) || !Number.isFinite(v.fixed) || !Number.isFinite(v.setup) || [v.support,v.fixed,v.setup].some((n)=>n < 0)) return t("errCosts");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return t("errMonths");
      return "";
    }

    function compute(v){
      const currentUsers = v.subs * (v.currentAttach / 100);
      const targetUsers = v.subs * (v.targetAttach / 100);
      const deltaUsers = targetUsers - currentUsers;
      const netPerUser = (v.price * (1 - v.loss / 100) * (v.margin / 100)) - v.support;
      const monthlyUplift = (deltaUsers * netPerUser) - v.fixed;
      const periodNet = (monthlyUplift * v.months) - v.setup;
      const roi = v.setup === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / v.setup) * 100;
      const payback = monthlyUplift > 0 ? (v.setup / monthlyUplift) : Infinity;
      const breakEvenAttach = netPerUser > 0 ? (v.currentAttach + ((v.fixed / (v.subs * netPerUser)) * 100)) : Infinity;
      return { currentUsers, targetUsers, deltaUsers, netPerUser, monthlyUplift, periodNet, roi, payback, breakEvenAttach };
    }

    function resetOutputs(){
      ["deltaUsers","netPerUser","monthlyUplift","periodNet","roi","payback","currentUsers","targetUsers","breakEvenAttach","attachGap"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        subs:Number(refs.subs.value), currentAttach:Number(refs.currentAttach.value), targetAttach:Number(refs.targetAttach.value), price:Number(refs.price.value), margin:Number(refs.margin.value),
        loss:Number(refs.loss.value), support:Number(refs.support.value), fixed:Number(refs.fixed.value), setup:Number(refs.setup.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.deltaUsers.textContent = `${num(r.deltaUsers,0)} ${t("unitUsers")}`;
      refs.netPerUser.textContent = money(r.netPerUser);
      refs.monthlyUplift.textContent = money(r.monthlyUplift);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback");
      refs.currentUsers.textContent = `${num(r.currentUsers,0)} ${t("unitUsers")}`;
      refs.targetUsers.textContent = `${num(r.targetUsers,0)} ${t("unitUsers")}`;
      refs.attachGap.textContent = `${num(v.targetAttach - v.currentAttach,2)}%p`;

      refs.breakEvenAttach.textContent = Number.isFinite(r.breakEvenAttach) && r.breakEvenAttach <= 100
        ? `${num(r.breakEvenAttach,2)}%`
        : t("impossible");

      refs.status.innerHTML = r.monthlyUplift >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_users")}: ${num(r.deltaUsers,0)} ${t("unitUsers")}`,
        `${t("k_perUser")}: ${money(r.netPerUser)}`,
        `${t("k_monthly")}: ${money(r.monthlyUplift)}`,
        `${t("k_period")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("d_breakEven")}: ${Number.isFinite(r.breakEvenAttach) && r.breakEvenAttach <= 100 ? `${num(r.breakEvenAttach,2)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.subs,refs.currentAttach,refs.targetAttach,refs.price,refs.margin,refs.loss,refs.support,refs.fixed,refs.setup,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
