<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Bundle Migration ROI Calculator | 구독 번들 전환 ROI 계산기</title>
  <meta name="description" content="기본 요금제에서 번들 요금제로의 이관 비중 변화가 월 순이익, ROI, 회수기간, 손익분기 번들 비중에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📦 구독 번들 전환 ROI 계산기</h1>
        <div class="sub" id="subtitle">기본 요금제에서 번들 요금제로의 이관 비중 변화가 월 순이익과 회수기간에 주는 영향을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_accounts" for="accounts"></label><input id="accounts" type="number" min="1" value="82000"></div>
          <div><label id="l_currentShare" for="currentShare"></label><input id="currentShare" type="number" min="0" max="100" step="0.1" value="9"></div>
          <div><label id="l_targetShare" for="targetShare"></label><input id="targetShare" type="number" min="0" max="100" step="0.1" value="15"></div>
          <div><label id="l_basePrice" for="basePrice"></label><input id="basePrice" type="number" min="0" step="100" value="9900"></div>
          <div><label id="l_bundlePrice" for="bundlePrice"></label><input id="bundlePrice" type="number" min="0" step="100" value="14900"></div>
          <div><label id="l_bundleMargin" for="bundleMargin"></label><input id="bundleMargin" type="number" min="0" max="100" step="0.1" value="74"></div>
          <div><label id="l_extraCost" for="extraCost"></label><input id="extraCost" type="number" min="0" step="100" value="1200"></div>
          <div><label id="l_incentive" for="incentive"></label><input id="incentive" type="number" min="0" step="100" value="2100"></div>
          <div><label id="l_fixedCost" for="fixedCost"></label><input id="fixedCost" type="number" min="0" step="10000" value="4500000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="10000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_migrated"></div><div class="v" id="migrated">-</div></div>
          <div class="kpi"><div class="k" id="k_perMemberNet"></div><div class="v" id="perMemberNet">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_targetDelta"></div><div class="v" id="targetDelta">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_breakEvenShare"></th><td id="breakEvenShare">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_monthlyContribution"></th><td id="monthlyContribution">-</td></tr>
          <tr><th id="d_totalProgramCost"></th><td id="totalProgramCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={accounts:$("accounts"),currentShare:$("currentShare"),targetShare:$("targetShare"),basePrice:$("basePrice"),bundlePrice:$("bundlePrice"),bundleMargin:$("bundleMargin"),extraCost:$("extraCost"),incentive:$("incentive"),fixedCost:$("fixedCost"),setup:$("setup"),months:$("months"),migrated:$("migrated"),perMemberNet:$("perMemberNet"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),targetDelta:$("targetDelta"),breakEvenShare:$("breakEvenShare"),payback:$("payback"),monthlyContribution:$("monthlyContribution"),totalProgramCost:$("totalProgramCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={accounts:82000,currentShare:9,targetShare:15,basePrice:9900,bundlePrice:14900,bundleMargin:74,extraCost:1200,incentive:2100,fixedCost:4500000,setup:10000000,months:12};
    const I18N={
      ko:{title:"📦 구독 번들 전환 ROI 계산기",subtitle:"기본 요금제에서 번들 요금제로의 이관 비중 변화가 월 순이익과 회수기간에 주는 영향을 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_accounts:"활성 기본 요금제 계정 수",l_currentShare:"현재 번들 비중 (%)",l_targetShare:"목표 번들 비중 (%)",l_basePrice:"기본 요금제 월 가격 (₩)",l_bundlePrice:"번들 요금제 월 가격 (₩)",l_bundleMargin:"번들 매출총이익률 (%)",l_extraCost:"번들 추가 제공 원가 (계정당, ₩)",l_incentive:"이관 인센티브 (계정당, ₩)",l_fixedCost:"월 고정 운영비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_migrated:"순증 번들 계정",k_perMemberNet:"계정당 월 순기여",k_monthlyNet:"월 순증 순이익",k_roi:"ROI",k_periodNet:"기간 순효과",k_targetDelta:"목표 비중 증가폭",d_breakEvenShare:"손익분기 목표 번들 비중",d_payback:"회수기간",d_monthlyContribution:"월 순증 총기여액",d_totalProgramCost:"기간 총 프로그램비",ok:"전환 시나리오 수익성 계산 완료",warn:"현재 입력에서는 월 순이익이 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 계정 수/기간은 1 이상이어야 합니다.",logicErr:"목표 번들 비중은 현재 비중 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[구독 번들 전환 ROI 요약]",unitMonths:"개월"},
      en:{title:"📦 Subscription Bundle Migration ROI Calculator",subtitle:"Estimate monthly profit, payback, and ROI from increasing bundle-plan migration share.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_accounts:"Active base-plan accounts",l_currentShare:"Current bundle share (%)",l_targetShare:"Target bundle share (%)",l_basePrice:"Base plan monthly price (KRW)",l_bundlePrice:"Bundle plan monthly price (KRW)",l_bundleMargin:"Bundle gross margin (%)",l_extraCost:"Extra bundle service cost (per account, KRW)",l_incentive:"Migration incentive (per account, KRW)",l_fixedCost:"Monthly fixed operating cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_migrated:"Net new bundle accounts",k_perMemberNet:"Monthly net contribution/account",k_monthlyNet:"Monthly net profit",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_targetDelta:"Target share delta",d_breakEvenShare:"Break-even bundle share",d_payback:"Payback period",d_monthlyContribution:"Monthly total contribution uplift",d_totalProgramCost:"Total program cost (period)",ok:"Bundle migration economics ready",warn:"Monthly net profit is negative with current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and accounts/months must be >= 1.",logicErr:"Target bundle share must be greater than or equal to current share.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Subscription Bundle Migration ROI Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["accounts","currentShare","targetShare","basePrice","bundlePrice","bundleMargin","extraCost","incentive","fixedCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["migrated","perMemberNet","monthlyNet","roi","periodNet","targetDelta"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenShare","payback","monthlyContribution","totalProgramCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.accounts)||v.accounts<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.basePrice,v.bundlePrice,v.extraCost,v.incentive,v.fixedCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if([v.currentShare,v.targetShare,v.bundleMargin].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(v.targetShare<v.currentShare) return t("logicErr");
      return "";
    }

    function render(){
      const v={accounts:Number(refs.accounts.value),currentShare:Number(refs.currentShare.value),targetShare:Number(refs.targetShare.value),basePrice:Number(refs.basePrice.value),bundlePrice:Number(refs.bundlePrice.value),bundleMargin:Number(refs.bundleMargin.value),extraCost:Number(refs.extraCost.value),incentive:Number(refs.incentive.value),fixedCost:Number(refs.fixedCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["migrated","perMemberNet","monthlyNet","roi","periodNet","targetDelta","breakEvenShare","payback","monthlyContribution","totalProgramCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const currentBundle=v.accounts*(v.currentShare/100);
      const targetBundle=v.accounts*(v.targetShare/100);
      const migrated=Math.max(0,targetBundle-currentBundle);
      const priceDelta=v.bundlePrice-v.basePrice;
      const perMemberNet=(priceDelta*(v.bundleMargin/100))-v.extraCost-v.incentive;
      const monthlyContribution=migrated*perMemberNet;
      const monthlyNet=monthlyContribution-v.fixedCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.fixedCost*v.months)+(migrated*v.incentive*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const deltaShare=v.targetShare-v.currentShare;

      const requiredMigrated=perMemberNet>0?(v.fixedCost/perMemberNet):Infinity;
      const breakEvenShare=Number.isFinite(requiredMigrated)?v.currentShare+((requiredMigrated/v.accounts)*100):Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.migrated.textContent=num(migrated,0);
      refs.perMemberNet.textContent=won(perMemberNet);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.targetDelta.textContent=pct(deltaShare,1);
      refs.breakEvenShare.textContent=(Number.isFinite(breakEvenShare)&&breakEvenShare<=100)?pct(breakEvenShare,2):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.totalProgramCost.textContent=won(totalProgramCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_migrated")}: ${num(migrated,0)}`,`${t("k_perMemberNet")}: ${won(perMemberNet)}`,`${t("d_monthlyContribution")}: ${won(monthlyContribution)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenShare")}: ${(Number.isFinite(breakEvenShare)&&breakEvenShare<=100)?pct(breakEvenShare,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.accounts,refs.currentShare,refs.targetShare,refs.basePrice,refs.bundlePrice,refs.bundleMargin,refs.extraCost,refs.incentive,refs.fixedCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
