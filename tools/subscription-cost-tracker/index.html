<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구독 비용 트래커 | Subscription Cost Tracker</title>
  <meta name="description" content="월간/연간 구독 금액을 서비스별로 기록하고 총 월·연 비용 및 카테고리별 지출을 즉시 확인하세요." />
  <style>
    :root {
      --bg: #0b1220;
      --panel: #101a31;
      --panel-2: #152544;
      --line: #2a3d62;
      --text: #eaf0ff;
      --muted: #9fb3d9;
      --accent: #60a5fa;
      --accent-2: #22d3ee;
      --good: #34d399;
      --warn: #fbbf24;
      --danger: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1b2f58 0%, #0a1020 46%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 20px 14px 36px; }
    .top { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.8vw, 1.9rem); }
    .sub { margin: 6px 0 0; color: var(--muted); font-size: 0.92rem; line-height: 1.45; }
    .back {
      text-decoration: none;
      color: #cde0ff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 11px;
      font-weight: 700;
      font-size: 0.84rem;
      background: #132446;
    }
    .card {
      background: linear-gradient(160deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }
    .bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 800;
      font-size: 0.86rem;
    }
    .pri { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #041225; }
    .ghost { background: #132446; color: #d2e3ff; border: 1px solid var(--line); }
    .danger { background: #402033; color: #ffd5e1; border: 1px solid #73405c; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 9px; border-bottom: 1px solid #223655; font-size: 0.84rem; }
    th { background: #132648; color: #b9cbee; font-size: 0.78rem; text-align: left; }
    input, select {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0f1a30;
      color: var(--text);
      padding: 8px;
      font-size: 0.85rem;
    }
    input:focus, select:focus { outline: 2px solid rgba(96, 165, 250, 0.3); border-color: #76b2ff; }
    .kpis { margin-top: 12px; display: grid; gap: 8px; grid-template-columns: repeat(3, 1fr); }
    .kpi { background: #0f1a30; border: 1px solid #284061; border-radius: 12px; padding: 10px; }
    .k { font-size: 0.76rem; color: var(--muted); }
    .v { margin-top: 4px; font-size: 1.1rem; font-weight: 800; }
    .small { color: var(--muted); font-size: 0.8rem; margin-top: 8px; }
    .category-wrap { margin-top: 12px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    .category-title { margin: 0; background: #132648; padding: 10px; font-size: 0.85rem; color: #b9cbee; }
    .category-table { width: 100%; border-collapse: collapse; min-width: 320px; }
    .category-table td { border-bottom: 1px solid #223655; padding: 9px; font-size: 0.84rem; }
    .category-table td:last-child { text-align: right; }
    .empty { color: var(--muted); padding: 12px; font-size: 0.86rem; }
    @media (max-width: 860px) {
      .kpis { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📦 구독 비용 트래커</h1>
        <p class="sub">서비스별 월간/연간 구독료를 기록하고 총 월 비용, 총 연 비용, 카테고리별 지출 비중을 즉시 확인하세요.</p>
      </div>
      <a class="back" href="/">Back to Portal</a>
    </div>

    <section class="card">
      <div class="bar">
        <button id="addRow" class="pri" type="button">+ 구독 추가</button>
        <button id="sample" class="ghost" type="button">샘플 채우기</button>
        <button id="clearAll" class="danger" type="button">전체 비우기</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:24%">서비스명</th>
              <th style="width:22%">카테고리</th>
              <th style="width:18%">결제 주기</th>
              <th style="width:20%">금액 (원)</th>
              <th style="width:13%">월 환산</th>
              <th style="width:3%">삭제</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="kpis">
        <div class="kpi"><div class="k">등록 서비스 수</div><div id="serviceCount" class="v">0개</div></div>
        <div class="kpi"><div class="k">총 월 구독비</div><div id="monthlyTotal" class="v">₩0</div></div>
        <div class="kpi"><div class="k">총 연 구독비</div><div id="annualTotal" class="v">₩0</div></div>
      </div>

      <div class="category-wrap">
        <h2 class="category-title">카테고리별 지출 요약</h2>
        <table class="category-table">
          <tbody id="categoryRows">
            <tr><td class="empty">아직 데이터가 없습니다.</td></tr>
          </tbody>
        </table>
      </div>

      <p class="small">※ 연간 결제는 월 환산(÷12)으로 함께 계산합니다. 데이터는 브라우저에 자동 저장됩니다.</p>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'subscription-cost-tracker-v1';
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => `₩${Math.round(Number.isFinite(n) ? n : 0).toLocaleString('ko-KR')}`;

    const categoryOptions = ['영상/음악', '생산성', '개발도구', '클라우드/AI', '뉴스/교육', '건강/운동', '기타'];

    function categorySelect(value = '기타') {
      return `<select class="category">${categoryOptions
        .map((c) => `<option value="${c}" ${c === value ? 'selected' : ''}>${c}</option>`)
        .join('')}</select>`;
    }

    function addRow(data = {}) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input class="name" type="text" placeholder="예: Netflix" value="${data.name || ''}" /></td>
        <td>${categorySelect(data.category || '기타')}</td>
        <td>
          <select class="cycle">
            <option value="monthly" ${(data.cycle || 'monthly') === 'monthly' ? 'selected' : ''}>월간</option>
            <option value="annual" ${(data.cycle || 'monthly') === 'annual' ? 'selected' : ''}>연간</option>
          </select>
        </td>
        <td><input class="amount" type="number" min="0" step="100" value="${data.amount || ''}" placeholder="금액" /></td>
        <td class="monthly-equivalent">₩0</td>
        <td><button type="button" class="danger remove">✕</button></td>
      `;
      $('rows').appendChild(tr);

      tr.querySelectorAll('input,select').forEach((el) => {
        el.addEventListener('input', update);
        el.addEventListener('change', update);
      });
      tr.querySelector('.remove').addEventListener('click', () => {
        tr.remove();
        update();
      });
    }

    function getRowsData() {
      return Array.from($('rows').querySelectorAll('tr')).map((tr) => ({
        name: tr.querySelector('.name').value.trim(),
        category: tr.querySelector('.category').value,
        cycle: tr.querySelector('.cycle').value,
        amount: Number(tr.querySelector('.amount').value) || 0
      }));
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(getRowsData()));
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : null;
      } catch {
        return null;
      }
    }

    function update() {
      const rows = Array.from($('rows').querySelectorAll('tr'));
      let monthlyTotal = 0;
      let annualTotal = 0;
      let validCount = 0;
      const categories = {};

      rows.forEach((tr) => {
        const name = tr.querySelector('.name').value.trim();
        const category = tr.querySelector('.category').value;
        const cycle = tr.querySelector('.cycle').value;
        const amount = Math.max(0, Number(tr.querySelector('.amount').value) || 0);
        const monthlyEquivalent = cycle === 'annual' ? amount / 12 : amount;
        const annualEquivalent = cycle === 'annual' ? amount : amount * 12;

        tr.querySelector('.monthly-equivalent').textContent = fmt(monthlyEquivalent);

        if (name || amount > 0) {
          validCount += 1;
          monthlyTotal += monthlyEquivalent;
          annualTotal += annualEquivalent;

          if (!categories[category]) categories[category] = { monthly: 0, annual: 0 };
          categories[category].monthly += monthlyEquivalent;
          categories[category].annual += annualEquivalent;
        }
      });

      $('serviceCount').textContent = `${validCount}개`;
      $('monthlyTotal').textContent = fmt(monthlyTotal);
      $('annualTotal').textContent = fmt(annualTotal);

      const categoryEntries = Object.entries(categories).sort((a, b) => b[1].monthly - a[1].monthly);
      if (!categoryEntries.length) {
        $('categoryRows').innerHTML = '<tr><td class="empty">아직 데이터가 없습니다.</td></tr>';
      } else {
        $('categoryRows').innerHTML = categoryEntries
          .map(([name, val]) => `<tr><td>${name}</td><td>월 ${fmt(val.monthly)} / 연 ${fmt(val.annual)}</td></tr>`)
          .join('');
      }

      save();
    }

    $('addRow').addEventListener('click', () => {
      addRow();
      update();
    });

    $('sample').addEventListener('click', () => {
      $('rows').innerHTML = '';
      [
        { name: 'Netflix', category: '영상/음악', cycle: 'monthly', amount: 17000 },
        { name: 'YouTube Premium', category: '영상/음악', cycle: 'monthly', amount: 14900 },
        { name: 'Notion Plus', category: '생산성', cycle: 'annual', amount: 120000 },
        { name: 'ChatGPT Plus', category: '클라우드/AI', cycle: 'monthly', amount: 29000 },
        { name: 'GitHub Copilot', category: '개발도구', cycle: 'annual', amount: 144000 }
      ].forEach(addRow);
      update();
    });

    $('clearAll').addEventListener('click', () => {
      if (!confirm('등록된 구독 항목을 모두 삭제할까요?')) return;
      $('rows').innerHTML = '';
      addRow();
      update();
    });

    const saved = load();
    if (saved && saved.length) {
      saved.forEach(addRow);
    } else {
      addRow();
    }
    update();
  </script>
</body>
</html>
