<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Downgrade Prevention ROI Calculator | 구독 다운그레이드 방지 ROI 계산기</title>
  <meta name="description" content="위험군 구독자의 다운그레이드 방지 캠페인 효과를 기반으로 보존 MRR, 순효과, ROI, 손익분기 개선률을 계산합니다." />
  <style>
    :root{--bg:#071524;--card:#112840;--line:#2a4f79;--txt:#e9f3ff;--muted:#adc4de;--pri:#71b1ff;--soft:#1b3e63;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.15)}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#224b78 0%,#071524 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.15rem,2.7vw,1.78rem)}.sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#15365a;color:#deebff;border-radius:10px;padding:8px 12px;text-decoration:none;font-size:.86rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173a61,#112840);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0e2037;color:var(--txt);font-size:.93rem}
    button{border:none;cursor:pointer;background:linear-gradient(135deg,var(--pri),#4f82ef);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{margin-top:10px;min-height:108px;resize:vertical}.error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7a3340;background:var(--errbg);color:var(--err);font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0e2038;border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.04rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#163a61;color:#d9e9ff;font-size:.77rem;margin-top:10px}.ok{color:var(--ok)}.warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.86rem;table-layout:fixed}th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🛡️ 구독 다운그레이드 방지 ROI 계산기</h1>
        <div class="sub" data-i18n="subtitle">다운그레이드 개선률 가정으로 보존 MRR, 월 순효과, ROI, 손익분기 개선률을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" class="chip" type="button">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="atRisk" data-i18n="atRisk">월 위험군 프리미엄 구독자 수</label><input id="atRisk" type="number" min="1" value="24000"></div>
          <div><label for="baselineDowngrade" data-i18n="baselineDowngrade">기준 다운그레이드율 (%)</label><input id="baselineDowngrade" type="number" min="0" max="100" step="0.1" value="11"></div>
          <div><label for="improvement" data-i18n="improvement">다운그레이드율 개선률 (%)</label><input id="improvement" type="number" min="0" max="100" step="0.1" value="22"></div>
          <div><label for="premiumArpu" data-i18n="premiumArpu">프리미엄 ARPU (KRW)</label><input id="premiumArpu" type="number" min="1" value="29000"></div>
          <div><label for="downgradedArpu" data-i18n="downgradedArpu">다운그레이드 후 ARPU (KRW)</label><input id="downgradedArpu" type="number" min="0" value="13000"></div>
          <div><label for="margin" data-i18n="margin">매출총이익률 (%)</label><input id="margin" type="number" min="0" max="100" step="0.1" value="72"></div>
          <div><label for="retainedMonths" data-i18n="retainedMonths">보존 효과 지속 개월 수</label><input id="retainedMonths" type="number" min="0.1" step="0.1" value="5"></div>
          <div><label for="campaignCost" data-i18n="campaignCost">위험군 1인당 캠페인 비용 (KRW)</label><input id="campaignCost" type="number" min="0" value="900"></div>
          <div><label for="fixedMonthly" data-i18n="fixedMonthly">월 고정 운영비 (KRW)</label><input id="fixedMonthly" type="number" min="0" value="4500000"></div>
          <div><label for="oneTime" data-i18n="oneTime">원타임 구축비 (KRW)</label><input id="oneTime" type="number" min="0" value="18000000"></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="36" value="10"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpi">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_prevented">월 방지 건수</div><div id="prevented" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_preservedMrr">월 보존 MRR</div><div id="preservedMrr" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_preservedGp">월 보존 총이익(코호트)</div><div id="preservedGp" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyCost">월 캠페인 총비용</div><div id="monthlyCost" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detail">세부 지표</h2>
        <table><tbody>
          <tr><th data-i18n="d_periodNet">분석기간 순효과</th><td id="periodNet">-</td></tr>
          <tr><th data-i18n="d_payback">회수기간</th><td id="payback">-</td></tr>
          <tr><th data-i18n="d_breakEvenImprove">손익분기 개선률</th><td id="breakEvenImprove">-</td></tr>
          <tr><th data-i18n="d_deltaArpu">프리미엄-다운그레이드 ARPU 차이</th><td id="deltaArpu">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      atRisk:$("atRisk"), baselineDowngrade:$("baselineDowngrade"), improvement:$("improvement"), premiumArpu:$("premiumArpu"), downgradedArpu:$("downgradedArpu"), margin:$("margin"), retainedMonths:$("retainedMonths"), campaignCost:$("campaignCost"), fixedMonthly:$("fixedMonthly"), oneTime:$("oneTime"), months:$("months"),
      prevented:$("prevented"), preservedMrr:$("preservedMrr"), preservedGp:$("preservedGp"), monthlyCost:$("monthlyCost"), monthlyNet:$("monthlyNet"), roi:$("roi"), periodNet:$("periodNet"), payback:$("payback"), breakEvenImprove:$("breakEvenImprove"), deltaArpu:$("deltaArpu"),
      error:$("error"), summary:$("summary"), status:$("status"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { atRisk:24000, baselineDowngrade:11, improvement:22, premiumArpu:29000, downgradedArpu:13000, margin:72, retainedMonths:5, campaignCost:900, fixedMonthly:4500000, oneTime:18000000, months:10 };
    let lang = "ko";

    const i18n = {
      ko:{
        title:"🛡️ 구독 다운그레이드 방지 ROI 계산기", subtitle:"다운그레이드 개선률 가정으로 보존 MRR, 월 순효과, ROI, 손익분기 개선률을 계산합니다.", back:"Back to Portal",
        inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpi:"핵심 KPI", waiting:"결과 계산 대기", detail:"세부 지표",
        atRisk:"월 위험군 프리미엄 구독자 수", baselineDowngrade:"기준 다운그레이드율 (%)", improvement:"다운그레이드율 개선률 (%)", premiumArpu:"프리미엄 ARPU (KRW)", downgradedArpu:"다운그레이드 후 ARPU (KRW)", margin:"매출총이익률 (%)", retainedMonths:"보존 효과 지속 개월 수", campaignCost:"위험군 1인당 캠페인 비용 (KRW)", fixedMonthly:"월 고정 운영비 (KRW)", oneTime:"원타임 구축비 (KRW)", months:"분석 기간 (개월)",
        k_prevented:"월 방지 건수", k_preservedMrr:"월 보존 MRR", k_preservedGp:"월 보존 총이익(코호트)", k_monthlyCost:"월 캠페인 총비용", k_monthlyNet:"월 순효과", k_roi:"ROI",
        d_periodNet:"분석기간 순효과", d_payback:"회수기간", d_breakEvenImprove:"손익분기 개선률", d_deltaArpu:"프리미엄-다운그레이드 ARPU 차이",
        errPositive:"위험군/ARPU/개월은 0보다 커야 합니다.", errRate:"비율 값은 0~100 범위여야 합니다.", errCost:"비용은 0 이상이어야 합니다.", errArpuGap:"프리미엄 ARPU는 다운그레이드 ARPU보다 커야 합니다.",
        statusGood:"현재 가정에서 월 순효과가 양수입니다", statusWarn:"현재 가정에서 월 순효과가 음수입니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        impossible:"달성 불가", noPayback:"회수 불가", summaryTitle:"[구독 다운그레이드 방지 ROI 요약]"
      },
      en:{
        title:"🛡️ Subscription Downgrade Prevention ROI Calculator", subtitle:"Estimate preserved MRR, monthly net impact, ROI, and break-even improvement rate from downgrade prevention programs.", back:"Back to Portal",
        inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpi:"Key KPIs", waiting:"Waiting for calculation", detail:"Details",
        atRisk:"At-risk premium subscribers per month", baselineDowngrade:"Baseline downgrade rate (%)", improvement:"Downgrade improvement rate (%)", premiumArpu:"Premium ARPU (KRW)", downgradedArpu:"Post-downgrade ARPU (KRW)", margin:"Gross margin (%)", retainedMonths:"Retained effect duration (months)", campaignCost:"Campaign cost per at-risk subscriber (KRW)", fixedMonthly:"Fixed monthly operating cost (KRW)", oneTime:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_prevented:"Downgrades prevented / month", k_preservedMrr:"Preserved MRR / month", k_preservedGp:"Preserved gross profit / month (cohort)", k_monthlyCost:"Monthly campaign total cost", k_monthlyNet:"Monthly net impact", k_roi:"ROI",
        d_periodNet:"Period net impact", d_payback:"Payback", d_breakEvenImprove:"Break-even improvement", d_deltaArpu:"Premium vs downgraded ARPU gap",
        errPositive:"At-risk users/ARPU/month values must be greater than 0.", errRate:"Rate inputs must be between 0 and 100.", errCost:"Cost inputs must be zero or above.", errArpuGap:"Premium ARPU must be greater than downgraded ARPU.",
        statusGood:"Monthly net impact is positive with current assumptions", statusWarn:"Monthly net impact is negative with current assumptions", statusCheck:"Please review input values",
        copied:"Summary copied.", copyFail:"Clipboard unavailable. Please copy manually.",
        impossible:"Not achievable", noPayback:"No payback", summaryTitle:"[Subscription Downgrade Prevention ROI Summary]"
      }
    };

    const t=(k)=>i18n[lang][k] ?? k;
    const locale=()=>lang==="ko"?"ko-KR":"en-US";
    const money=(n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang=lang;
      document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});
      refs.lang.textContent=lang==='ko'?'EN':'KO';
    }

    function validate(v){
      if([v.atRisk,v.premiumArpu,v.retainedMonths,v.months].some(x=>!Number.isFinite(x)||x<=0)) return t('errPositive');
      if(!Number.isFinite(v.downgradedArpu)||v.downgradedArpu<0) return t('errPositive');
      if(v.premiumArpu<=v.downgradedArpu) return t('errArpuGap');
      if([v.baselineDowngrade,v.improvement,v.margin].some(x=>!Number.isFinite(x)||x<0||x>100)) return t('errRate');
      if([v.campaignCost,v.fixedMonthly,v.oneTime].some(x=>!Number.isFinite(x)||x<0)) return t('errCost');
      return '';
    }

    function compute(v){
      const prevented = v.atRisk * (v.baselineDowngrade/100) * (v.improvement/100);
      const deltaArpu = v.premiumArpu - v.downgradedArpu;
      const preservedMrr = prevented * deltaArpu;
      const preservedGp = preservedMrr * (v.margin/100) * v.retainedMonths;
      const monthlyCost = (v.atRisk * v.campaignCost) + v.fixedMonthly;
      const monthlyNet = preservedGp - monthlyCost;
      const periodNet = (monthlyNet * v.months) - v.oneTime;
      const invested = (monthlyCost * v.months) + v.oneTime;
      const roi = invested === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / invested) * 100;
      const payback = monthlyNet > 0 ? v.oneTime / monthlyNet : Infinity;

      const denom = v.atRisk * (v.baselineDowngrade/100) * deltaArpu * (v.margin/100) * v.retainedMonths;
      const breakEvenImprove = denom > 0 ? ((monthlyCost + (v.oneTime / v.months)) / denom) * 100 : Infinity;

      return {prevented,deltaArpu,preservedMrr,preservedGp,monthlyCost,monthlyNet,periodNet,roi,payback,breakEvenImprove};
    }

    function resetOutputs(){
      ["prevented","preservedMrr","preservedGp","monthlyCost","monthlyNet","roi","periodNet","payback","breakEvenImprove","deltaArpu"].forEach(k=>refs[k].textContent='-');
      refs.summary.value='';
    }

    function render(){
      const v={
        atRisk:Number(refs.atRisk.value), baselineDowngrade:Number(refs.baselineDowngrade.value), improvement:Number(refs.improvement.value), premiumArpu:Number(refs.premiumArpu.value), downgradedArpu:Number(refs.downgradedArpu.value), margin:Number(refs.margin.value), retainedMonths:Number(refs.retainedMonths.value), campaignCost:Number(refs.campaignCost.value), fixedMonthly:Number(refs.fixedMonthly.value), oneTime:Number(refs.oneTime.value), months:Number(refs.months.value)
      };
      const err=validate(v);
      refs.error.classList.toggle('show',!!err);
      refs.error.textContent=err;
      if(err){ refs.status.textContent=t('statusCheck'); resetOutputs(); return; }

      const r=compute(v);
      refs.prevented.textContent=num(r.prevented,0);
      refs.preservedMrr.textContent=money(r.preservedMrr);
      refs.preservedGp.textContent=money(r.preservedGp);
      refs.monthlyCost.textContent=money(r.monthlyCost);
      refs.monthlyNet.textContent=money(r.monthlyNet);
      refs.roi.textContent=Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞');

      refs.periodNet.textContent=money(r.periodNet);
      refs.payback.textContent=Number.isFinite(r.payback)?`${num(r.payback,1)} ${lang==='ko'?'개월':'months'}`:t('noPayback');
      refs.breakEvenImprove.textContent=Number.isFinite(r.breakEvenImprove)&&r.breakEvenImprove>=0&&r.breakEvenImprove<=1000?`${num(r.breakEvenImprove,2)}%`:t('impossible');
      refs.deltaArpu.textContent=money(r.deltaArpu);

      refs.status.innerHTML=r.monthlyNet>=0
        ? `<span class="ok">●</span> ${t('statusGood')}`
        : `<span class="warn">●</span> ${t('statusWarn')}`;

      refs.summary.value=[
        t('summaryTitle'),
        `${t('k_prevented')}: ${num(r.prevented,0)}`,
        `${t('k_preservedMrr')}: ${money(r.preservedMrr)}`,
        `${t('k_preservedGp')}: ${money(r.preservedGp)}`,
        `${t('k_monthlyCost')}: ${money(r.monthlyCost)}`,
        `${t('k_monthlyNet')}: ${money(r.monthlyNet)}`,
        `${t('d_periodNet')}: ${money(r.periodNet)}`,
        `${t('k_roi')}: ${Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞')}`,
        `${t('d_breakEvenImprove')}: ${Number.isFinite(r.breakEvenImprove)&&r.breakEvenImprove>=0&&r.breakEvenImprove<=1000?`${num(r.breakEvenImprove,2)}%`:t('impossible')}`
      ].join('\n');
    }

    refs.copy.addEventListener('click',async()=>{ if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value);alert(t('copied'));}catch{alert(t('copyFail'));} });
    refs.reset.addEventListener('click',()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });
    [refs.atRisk,refs.baselineDowngrade,refs.improvement,refs.premiumArpu,refs.downgradedArpu,refs.margin,refs.retainedMonths,refs.campaignCost,refs.fixedMonthly,refs.oneTime,refs.months].forEach(el=>{el.addEventListener('input',render);el.addEventListener('change',render);});
    refs.lang.addEventListener('click',()=>{lang=lang==='ko'?'en':'ko';applyI18n();render();});

    applyI18n();
    render();
  </script>
</body>
</html>
