<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Family Plan Upgrade Revenue Calculator | 구독 패밀리 플랜 업그레이드 수익 계산기</title>
  <meta name="description" content="개인 플랜에서 패밀리 플랜 업그레이드 비중 개선이 월 순이익, ROI, 회수기간, 손익분기 목표 비중에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}.head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.8vw,1.7rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}textarea{min-height:100px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.08rem;font-weight:800;word-break:break-word}.v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">👨‍👩‍👧 구독 패밀리 플랜 업그레이드 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">개인 플랜 사용자의 패밀리 플랜 업그레이드 비중 개선이 월 순이익과 ROI에 미치는 효과를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="accounts" data-i18n="accounts">활성 유료 계정 수</label><input id="accounts" type="number" min="1" value="62000" /></div>
          <div><label for="currentShare" data-i18n="currentShare">현재 패밀리 플랜 비중 (%)</label><input id="currentShare" type="number" min="0" max="100" step="0.1" value="11" /></div>
          <div><label for="targetShare" data-i18n="targetShare">목표 패밀리 플랜 비중 (%)</label><input id="targetShare" type="number" min="0" max="100" step="0.1" value="16" /></div>
          <div><label for="soloPrice" data-i18n="soloPrice">개인 플랜 월 가격 (KRW)</label><input id="soloPrice" type="number" min="1" value="7900" /></div>
          <div><label for="familyPrice" data-i18n="familyPrice">패밀리 플랜 월 가격 (KRW)</label><input id="familyPrice" type="number" min="1" value="12900" /></div>
          <div><label for="margin" data-i18n="margin">패밀리 플랜 매출총이익률 (%)</label><input id="margin" type="number" min="0" max="100" step="0.1" value="76" /></div>
          <div><label for="incentive" data-i18n="incentive">업그레이드 인센티브 (계정당 KRW)</label><input id="incentive" type="number" min="0" value="1500" /></div>
          <div><label for="support" data-i18n="support">패밀리 추가 지원비 (계정당 KRW)</label><input id="support" type="number" min="0" value="900" /></div>
          <div><label for="fixed" data-i18n="fixed">운영 월 고정비 (KRW)</label><input id="fixed" type="number" min="0" value="4200000" /></div>
          <div><label for="setup" data-i18n="setup">초기 셋업비 (KRW)</label><input id="setup" type="number" min="0" value="12000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_delta">순증 패밀리 계정</div><div id="deltaAccounts" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_netPer">계정당 월 순기여액</div><div id="netPerAccount" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthly">월 순증 순이익</div><div id="monthlyUplift" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_period">기간 순효과(셋업비 반영)</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_current">현재 패밀리 계정</th><td id="currentFamily">-</td></tr>
            <tr><th data-i18n="d_target">목표 패밀리 계정</th><td id="targetFamily">-</td></tr>
            <tr><th data-i18n="d_gap">현재 대비 목표 증분(%p)</th><td id="shareGap">-</td></tr>
            <tr><th data-i18n="d_breakEven">손익분기 목표 패밀리 비중</th><td id="breakEvenShare">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      accounts:$("accounts"), currentShare:$("currentShare"), targetShare:$("targetShare"), soloPrice:$("soloPrice"), familyPrice:$("familyPrice"), margin:$("margin"),
      incentive:$("incentive"), support:$("support"), fixed:$("fixed"), setup:$("setup"), months:$("months"),
      deltaAccounts:$("deltaAccounts"), netPerAccount:$("netPerAccount"), monthlyUplift:$("monthlyUplift"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      currentFamily:$("currentFamily"), targetFamily:$("targetFamily"), shareGap:$("shareGap"), breakEvenShare:$("breakEvenShare"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { accounts:62000, currentShare:11, targetShare:16, soloPrice:7900, familyPrice:12900, margin:76, incentive:1500, support:900, fixed:4200000, setup:12000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"👨‍👩‍👧 구독 패밀리 플랜 업그레이드 수익 계산기", subtitle:"개인 플랜 사용자의 패밀리 플랜 업그레이드 비중 개선이 월 순이익과 ROI에 미치는 효과를 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        accounts:"활성 유료 계정 수", currentShare:"현재 패밀리 플랜 비중 (%)", targetShare:"목표 패밀리 플랜 비중 (%)", soloPrice:"개인 플랜 월 가격 (KRW)", familyPrice:"패밀리 플랜 월 가격 (KRW)", margin:"패밀리 플랜 매출총이익률 (%)", incentive:"업그레이드 인센티브 (계정당 KRW)", support:"패밀리 추가 지원비 (계정당 KRW)", fixed:"운영 월 고정비 (KRW)", setup:"초기 셋업비 (KRW)", months:"분석 기간 (개월)",
        k_delta:"순증 패밀리 계정", k_netPer:"계정당 월 순기여액", k_monthly:"월 순증 순이익", k_period:"기간 순효과(셋업비 반영)", k_roi:"ROI", k_payback:"회수기간",
        d_current:"현재 패밀리 계정", d_target:"목표 패밀리 계정", d_gap:"현재 대비 목표 증분(%p)", d_breakEven:"손익분기 목표 패밀리 비중",
        errAccounts:"활성 계정 수는 1 이상이어야 합니다.", errShare:"비중 값은 0~100 범위여야 합니다.", errTarget:"목표 비중은 현재 비중 이상이어야 합니다.", errPrice:"가격은 0보다 커야 하며 패밀리 가격은 개인 가격보다 커야 합니다.", errMargin:"매출총이익률은 0~100 범위여야 합니다.", errCosts:"비용 값은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~60개월 범위여야 합니다.",
        impossible:"달성 불가", noPayback:"회수 불가", statusGood:"패밀리 업그레이드 전략이 수익적으로 유리합니다", statusBad:"현재 가정에서는 순증 이익이 부족합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.", unitMonth:"개월", unitAccounts:"계정", summaryTitle:"[Subscription Family Plan Upgrade Summary]"
      },
      en: {
        title:"👨‍👩‍👧 Subscription Family Plan Upgrade Revenue Calculator", subtitle:"Estimate how increasing family-plan upgrade mix impacts monthly net uplift, ROI, and payback.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        accounts:"Active paid accounts", currentShare:"Current family plan share (%)", targetShare:"Target family plan share (%)", soloPrice:"Individual plan monthly price (KRW)", familyPrice:"Family plan monthly price (KRW)", margin:"Family plan gross margin (%)", incentive:"Upgrade incentive per account (KRW)", support:"Additional support cost per family account (KRW)", fixed:"Monthly fixed operating cost (KRW)", setup:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_delta:"Incremental family accounts", k_netPer:"Net contribution per account", k_monthly:"Monthly net uplift", k_period:"Period net impact (after setup)", k_roi:"ROI", k_payback:"Payback period",
        d_current:"Current family accounts", d_target:"Target family accounts", d_gap:"Target increment vs current (%p)", d_breakEven:"Break-even family share",
        errAccounts:"Active account count must be at least 1.", errShare:"Share values must be between 0 and 100.", errTarget:"Target share must be greater than or equal to current share.", errPrice:"Prices must be greater than 0 and family price must exceed individual price.", errMargin:"Gross margin must be between 0 and 100.", errCosts:"Cost values must be >= 0.", errMonths:"Analysis period must be 1 to 60 months.",
        impossible:"Not feasible", noPayback:"No payback", statusGood:"Family-plan upgrade strategy is financially favorable", statusBad:"Incremental economics are insufficient under current assumptions", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard unavailable. Please copy manually.", unitMonth:"months", unitAccounts:"accounts", summaryTitle:"[Subscription Family Plan Upgrade Summary]"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.accounts) || v.accounts < 1) return t("errAccounts");
      if ([v.currentShare,v.targetShare].some((n)=>!Number.isFinite(n) || n < 0 || n > 100)) return t("errShare");
      if (v.targetShare < v.currentShare) return t("errTarget");
      if (!Number.isFinite(v.soloPrice) || !Number.isFinite(v.familyPrice) || v.soloPrice <= 0 || v.familyPrice <= 0 || v.familyPrice <= v.soloPrice) return t("errPrice");
      if (!Number.isFinite(v.margin) || v.margin < 0 || v.margin > 100) return t("errMargin");
      if ([v.incentive,v.support,v.fixed,v.setup].some((n)=>!Number.isFinite(n) || n < 0)) return t("errCosts");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return t("errMonths");
      return "";
    }

    function compute(v){
      const currentFamily = v.accounts * (v.currentShare / 100);
      const targetFamily = v.accounts * (v.targetShare / 100);
      const deltaAccounts = targetFamily - currentFamily;
      const incrementalPrice = v.familyPrice - v.soloPrice;
      const netPerAccount = (incrementalPrice * (v.margin / 100)) - v.incentive - v.support;
      const monthlyUplift = (deltaAccounts * netPerAccount) - v.fixed;
      const periodNet = (monthlyUplift * v.months) - v.setup;
      const roi = v.setup === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / v.setup) * 100;
      const payback = monthlyUplift > 0 ? (v.setup / monthlyUplift) : Infinity;
      const breakEvenShare = netPerAccount > 0 ? (v.currentShare + ((v.fixed / (v.accounts * netPerAccount)) * 100)) : Infinity;
      return { currentFamily, targetFamily, deltaAccounts, netPerAccount, monthlyUplift, periodNet, roi, payback, breakEvenShare };
    }

    function resetOutputs(){
      ["deltaAccounts","netPerAccount","monthlyUplift","periodNet","roi","payback","currentFamily","targetFamily","shareGap","breakEvenShare"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        accounts:Number(refs.accounts.value), currentShare:Number(refs.currentShare.value), targetShare:Number(refs.targetShare.value), soloPrice:Number(refs.soloPrice.value), familyPrice:Number(refs.familyPrice.value),
        margin:Number(refs.margin.value), incentive:Number(refs.incentive.value), support:Number(refs.support.value), fixed:Number(refs.fixed.value), setup:Number(refs.setup.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.deltaAccounts.textContent = `${num(r.deltaAccounts,0)} ${t("unitAccounts")}`;
      refs.netPerAccount.textContent = money(r.netPerAccount);
      refs.monthlyUplift.textContent = money(r.monthlyUplift);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback");
      refs.currentFamily.textContent = `${num(r.currentFamily,0)} ${t("unitAccounts")}`;
      refs.targetFamily.textContent = `${num(r.targetFamily,0)} ${t("unitAccounts")}`;
      refs.shareGap.textContent = `${num(v.targetShare - v.currentShare,2)}%p`;

      refs.breakEvenShare.textContent = Number.isFinite(r.breakEvenShare) && r.breakEvenShare <= 100
        ? `${num(r.breakEvenShare,2)}%`
        : t("impossible");

      refs.status.innerHTML = r.monthlyUplift >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_delta")}: ${num(r.deltaAccounts,0)} ${t("unitAccounts")}`,
        `${t("k_netPer")}: ${money(r.netPerAccount)}`,
        `${t("k_monthly")}: ${money(r.monthlyUplift)}`,
        `${t("k_period")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("d_breakEven")}: ${Number.isFinite(r.breakEvenShare) && r.breakEvenShare <= 100 ? `${num(r.breakEvenShare,2)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.accounts,refs.currentShare,refs.targetShare,refs.soloPrice,refs.familyPrice,refs.margin,refs.incentive,refs.support,refs.fixed,refs.setup,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
