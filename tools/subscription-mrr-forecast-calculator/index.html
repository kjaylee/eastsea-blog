<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription MRR Forecast Calculator | 구독 MRR 예측 계산기</title>
  <meta name="description" content="시작 고객수, ARPU, 신규 유입, 이탈률, ARPU 성장률로 구독 비즈니스의 MRR·누적매출·이익을 월별로 예측합니다." />
  <style>
    :root{--bg:#071325;--card:#10203d;--line:#2d4878;--txt:#ebf3ff;--muted:#a8bad8;--pri:#6aa7ff;--err:#fca5a5;--ok:#34d399}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214680 0%,#071325 48%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#e2ecff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#12254a;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#162e58,#10203d);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0c1831;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5b80f2);font-weight:700}
    .soft{background:#18315f;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6d2f39;background:rgba(248,113,113,.12);color:var(--err);font-size:.86rem}
    .error.show{display:block}
    textarea{min-height:98px;margin-top:10px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1b36;border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800}
    .v.sm{font-size:1rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}
    th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .table-wrap{max-height:260px;overflow:auto;border:1px solid var(--line);border-radius:10px}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;margin-top:10px;border-radius:999px;border:1px solid var(--line);background:#17315e;color:#cfe0ff;font-size:.75rem}
    .ok{color:var(--ok)}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📈 Subscription MRR Forecast Calculator</h1>
        <div class="sub">구독형 서비스의 고객/ARPU 변화를 반영해 MRR·누적매출·누적이익을 예측합니다.</div>
      </div>
      <a class="home" href='/'>Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="startCustomers">시작 고객 수</label><input id="startCustomers" type="number" min="1" step="1" value="450" /></div>
          <div><label for="initialArpu">초기 ARPU (KRW)</label><input id="initialArpu" type="number" min="1" value="38000" /></div>
          <div><label for="monthlyNew">월 신규 고객 수</label><input id="monthlyNew" type="number" min="0" step="1" value="55" /></div>
          <div><label for="churnRate">월 이탈률 (%)</label><input id="churnRate" type="number" min="0" max="99.99" step="0.01" value="3.2" /></div>
          <div><label for="arpuGrowth">월 ARPU 성장률 (%)</label><input id="arpuGrowth" type="number" min="-50" max="200" step="0.1" value="1.2" /></div>
          <div><label for="months">예측 기간 (개월)</label><input id="months" type="number" min="1" max="36" step="1" value="12" /></div>
          <div style="grid-column:1/-1"><label for="fixedCost">월 고정비 (KRW)</label><input id="fixedCost" type="number" min="0" value="8500000" /></div>
        </div>
        <div class="btns">
          <button class="soft" id="copy" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 결과</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">기간 종료 고객 수</div><div id="endCustomers" class="v">-</div></div>
          <div class="kpi"><div class="k">종료 시점 MRR</div><div id="endMrr" class="v">-</div></div>
          <div class="kpi"><div class="k">누적 매출</div><div id="cumRevenue" class="v sm">-</div></div>
          <div class="kpi"><div class="k">누적 이익(고정비 반영)</div><div id="cumProfit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">순 MRR 증가분</div><div id="netMrrGain" class="v sm">-</div></div>
          <div class="kpi"><div class="k">평균 월 MRR 성장률</div><div id="avgGrowth" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">계산 대기</div>

        <h2 style="margin-top:12px">월별 예측 (최대 12개월 표시)</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>월</th><th>종료 고객수</th><th>ARPU</th><th>MRR</th><th>월 이탈고객</th></tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      startCustomers:$('startCustomers'), initialArpu:$('initialArpu'), monthlyNew:$('monthlyNew'),
      churnRate:$('churnRate'), arpuGrowth:$('arpuGrowth'), months:$('months'), fixedCost:$('fixedCost'),
      endCustomers:$('endCustomers'), endMrr:$('endMrr'), cumRevenue:$('cumRevenue'), cumProfit:$('cumProfit'),
      netMrrGain:$('netMrrGain'), avgGrowth:$('avgGrowth'), tbody:$('tbody'), status:$('status'),
      error:$('error'), summary:$('summary'), copy:$('copy'), reset:$('reset')
    };

    const defaults = { startCustomers:450, initialArpu:38000, monthlyNew:55, churnRate:3.2, arpuGrowth:1.2, months:12, fixedCost:8500000 };
    const won = (n)=>new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n||0);
    const fmt = (n,d=1)=>Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.startCustomers) || v.startCustomers <= 0) return '시작 고객 수는 1 이상이어야 합니다.';
      if (!Number.isFinite(v.initialArpu) || v.initialArpu <= 0) return '초기 ARPU는 0보다 커야 합니다.';
      if (!Number.isFinite(v.monthlyNew) || v.monthlyNew < 0) return '월 신규 고객 수는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.churnRate) || v.churnRate < 0 || v.churnRate >= 100) return '월 이탈률은 0 이상 100 미만이어야 합니다.';
      if (!Number.isFinite(v.arpuGrowth) || v.arpuGrowth < -50 || v.arpuGrowth > 200) return '월 ARPU 성장률은 -50% ~ 200% 범위여야 합니다.';
      if (!Number.isFinite(v.months) || !Number.isInteger(v.months) || v.months < 1 || v.months > 36) return '예측 기간은 1~36개월 정수여야 합니다.';
      if (!Number.isFinite(v.fixedCost) || v.fixedCost < 0) return '월 고정비는 0 이상이어야 합니다.';
      return '';
    }

    function simulate(v){
      let customers = v.startCustomers;
      let arpu = v.initialArpu;
      let cumulativeRevenue = 0;
      const rows = [];

      for (let m = 1; m <= v.months; m++) {
        const churned = customers * (v.churnRate / 100);
        const retained = Math.max(0, customers - churned);
        const endCustomers = retained + v.monthlyNew;
        const nextArpu = arpu * (1 + v.arpuGrowth / 100);
        const mrr = endCustomers * nextArpu;

        if (!Number.isFinite(mrr) || !Number.isFinite(endCustomers)) throw new Error('계산 결과가 유효하지 않습니다. 입력값 범위를 줄여주세요.');

        cumulativeRevenue += mrr;
        rows.push({ month:m, endCustomers, arpu:nextArpu, mrr, churned });

        customers = endCustomers;
        arpu = nextArpu;
      }

      const startMrr = v.startCustomers * v.initialArpu;
      const endMrr = rows[rows.length - 1].mrr;
      const netMrrGain = endMrr - startMrr;
      const avgGrowth = startMrr > 0 ? ((Math.pow(endMrr / startMrr, 1 / v.months) - 1) * 100) : 0;
      const cumulativeProfit = cumulativeRevenue - (v.fixedCost * v.months);

      return { endCustomers:customers, endMrr, cumulativeRevenue, cumulativeProfit, netMrrGain, avgGrowth, rows };
    }

    function render(){
      const v = {
        startCustomers:Number(refs.startCustomers.value), initialArpu:Number(refs.initialArpu.value), monthlyNew:Number(refs.monthlyNew.value),
        churnRate:Number(refs.churnRate.value), arpuGrowth:Number(refs.arpuGrowth.value), months:Number(refs.months.value), fixedCost:Number(refs.fixedCost.value)
      };
      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;
      refs.tbody.innerHTML = '';

      if (err){
        ['endCustomers','endMrr','cumRevenue','cumProfit','netMrrGain','avgGrowth'].forEach(k=>refs[k].textContent='-');
        refs.status.textContent = '입력값을 확인하세요';
        refs.summary.value = '';
        return;
      }

      try {
        const r = simulate(v);
        refs.endCustomers.textContent = `${fmt(r.endCustomers,0)}명`;
        refs.endMrr.textContent = won(r.endMrr);
        refs.cumRevenue.textContent = won(r.cumulativeRevenue);
        refs.cumProfit.textContent = won(r.cumulativeProfit);
        refs.netMrrGain.textContent = won(r.netMrrGain);
        refs.avgGrowth.textContent = `${fmt(r.avgGrowth,2)}%`;

        const topRows = r.rows.slice(0, 12).map(row =>
          `<tr><td>M${row.month}</td><td>${fmt(row.endCustomers,0)}</td><td>${won(row.arpu)}</td><td>${won(row.mrr)}</td><td>${fmt(row.churned,1)}</td></tr>`
        ).join('');
        refs.tbody.innerHTML = topRows;

        refs.status.innerHTML = r.netMrrGain >= 0
          ? `<span class="ok">●</span> 시작 대비 MRR ${won(r.netMrrGain)} 증가`
          : `● 시작 대비 MRR ${won(Math.abs(r.netMrrGain))} 감소`;

        refs.summary.value = [
          '[Subscription MRR Forecast 요약]',
          `종료 고객 수: ${fmt(r.endCustomers,0)}명`,
          `종료 시점 MRR: ${won(r.endMrr)}`,
          `누적 매출: ${won(r.cumulativeRevenue)}`,
          `누적 이익: ${won(r.cumulativeProfit)}`,
          `순 MRR 증가분: ${won(r.netMrrGain)}`,
          `평균 월 MRR 성장률: ${fmt(r.avgGrowth,2)}%`
        ].join('\n');
      } catch (e) {
        refs.error.classList.add('show');
        refs.error.textContent = e.message || '계산 중 오류가 발생했습니다.';
      }
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    ['input','change'].forEach(ev=>{
      [refs.startCustomers, refs.initialArpu, refs.monthlyNew, refs.churnRate, refs.arpuGrowth, refs.months, refs.fixedCost]
        .forEach(el=>el.addEventListener(ev, render));
    });

    render();
  </script>
</body>
</html>
