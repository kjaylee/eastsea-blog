<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Pause Save Revenue Calculator | 구독 일시정지 세이브 수익 계산기</title>
  <meta name="description" content="해지 위험 구독자에게 pause-save 플로우를 적용했을 때 보존 매출, 순효과, ROI, 손익분기 수락률을 계산합니다." />
  <style>
    :root{--bg:#08152a;--card:#112440;--line:#2b5188;--txt:#eaf2ff;--muted:#b0c5e5;--pri:#6baaff;--soft:#17355f;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.15)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#214c84 0%,#08152a 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.8vw,1.76rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#183864,#112440);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1d38;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#4f83f1);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:102px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errbg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.97rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#173561;color:#d8e8ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">⏸️ 구독 일시정지 세이브 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">pause-save 플로우로 보존되는 구독자와 순수익 개선 효과를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="atRisk" data-i18n="atRisk">월 해지 위험 구독자 (명)</label><input id="atRisk" type="number" min="1" value="32000" /></div>
          <div><label for="baselineChurn" data-i18n="baselineChurn">기준 이탈률 (%)</label><input id="baselineChurn" type="number" min="0" max="100" step="0.01" value="18" /></div>
          <div><label for="acceptRate" data-i18n="acceptRate">일시정지 수락률 (%)</label><input id="acceptRate" type="number" min="0" max="100" step="0.01" value="34" /></div>
          <div><label for="reactivationRate" data-i18n="reactivationRate">일시정지 후 재활성화율 (%)</label><input id="reactivationRate" type="number" min="0" max="100" step="0.01" value="58" /></div>
          <div><label for="arpu" data-i18n="arpu">월 ARPU (KRW)</label><input id="arpu" type="number" min="1" value="21000" /></div>
          <div><label for="margin" data-i18n="margin">매출총이익률 (%)</label><input id="margin" type="number" min="0" max="100" step="0.01" value="72" /></div>
          <div><label for="incentive" data-i18n="incentive">세이브 1인당 인센티브 비용 (KRW)</label><input id="incentive" type="number" min="0" value="2400" /></div>
          <div><label for="monthlyCost" data-i18n="monthlyCost">월 프로그램 비용 (KRW)</label><input id="monthlyCost" type="number" min="0" value="6500000" /></div>
          <div><label for="setupCost" data-i18n="setupCost">도입 일회성 비용 (KRW)</label><input id="setupCost" type="number" min="0" value="25000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_saved">세이브 구독자 (월)</div><div id="savedUsers" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_preservedMrr">보존 MRR</div><div id="preservedMrr" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_periodNet">분석기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_wouldChurn">프로그램 미도입 시 이탈자</th><td id="wouldChurn">-</td></tr>
            <tr><th data-i18n="d_pauseAccepted">일시정지 수락자</th><td id="pauseAccepted">-</td></tr>
            <tr><th data-i18n="d_preservedGp">보존 매출총이익</th><td id="preservedGrossProfit">-</td></tr>
            <tr><th data-i18n="d_incentiveCost">인센티브 비용</th><td id="incentiveCost">-</td></tr>
            <tr><th data-i18n="d_breakEven">손익분기 수락률</th><td id="breakEvenAccept">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      atRisk:$("atRisk"), baselineChurn:$("baselineChurn"), acceptRate:$("acceptRate"), reactivationRate:$("reactivationRate"), arpu:$("arpu"), margin:$("margin"),
      incentive:$("incentive"), monthlyCost:$("monthlyCost"), setupCost:$("setupCost"), months:$("months"),
      savedUsers:$("savedUsers"), preservedMrr:$("preservedMrr"), monthlyNet:$("monthlyNet"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      wouldChurn:$("wouldChurn"), pauseAccepted:$("pauseAccepted"), preservedGrossProfit:$("preservedGrossProfit"), incentiveCost:$("incentiveCost"), breakEvenAccept:$("breakEvenAccept"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { atRisk:32000, baselineChurn:18, acceptRate:34, reactivationRate:58, arpu:21000, margin:72, incentive:2400, monthlyCost:6500000, setupCost:25000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"⏸️ 구독 일시정지 세이브 수익 계산기", subtitle:"pause-save 플로우로 보존되는 구독자와 순수익 개선 효과를 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        atRisk:"월 해지 위험 구독자 (명)", baselineChurn:"기준 이탈률 (%)", acceptRate:"일시정지 수락률 (%)", reactivationRate:"일시정지 후 재활성화율 (%)",
        arpu:"월 ARPU (KRW)", margin:"매출총이익률 (%)", incentive:"세이브 1인당 인센티브 비용 (KRW)", monthlyCost:"월 프로그램 비용 (KRW)", setupCost:"도입 일회성 비용 (KRW)", months:"분석 기간 (개월)",
        k_saved:"세이브 구독자 (월)", k_preservedMrr:"보존 MRR", k_monthlyNet:"월 순효과", k_periodNet:"분석기간 순효과", k_roi:"ROI", k_payback:"회수기간",
        d_wouldChurn:"프로그램 미도입 시 이탈자", d_pauseAccepted:"일시정지 수락자", d_preservedGp:"보존 매출총이익", d_incentiveCost:"인센티브 비용", d_breakEven:"손익분기 수락률",
        errAtRisk:"해지 위험 구독자 수는 1 이상이어야 합니다.", errRates:"비율 입력은 0~100% 범위여야 합니다.", errArpu:"ARPU는 0보다 커야 합니다.", errCost:"비용 입력은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~60개월 범위여야 합니다.", errUnit:"세이브 1인당 순기여도가 0 이하입니다.",
        people:"명", monthsUnit:"개월", impossible:"달성 불가", noPayback:"회수 불가", statusGood:"월 순효과 개선", statusBad:"월 순효과 악화", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        summaryTitle:"[Subscription Pause Save 요약]", summaryPeriod:"개월 누적 순효과", summaryBe:"손익분기 수락률"
      },
      en: {
        title:"⏸️ Subscription Pause Save Revenue Calculator", subtitle:"Estimate preserved subscribers and net impact from a pause-save retention flow.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        atRisk:"Monthly at-risk subscribers", baselineChurn:"Baseline churn rate (%)", acceptRate:"Pause-offer accept rate (%)", reactivationRate:"Reactivation after pause (%)",
        arpu:"Monthly ARPU (KRW)", margin:"Gross margin (%)", incentive:"Incentive cost per saved user (KRW)", monthlyCost:"Monthly program/tool cost (KRW)", setupCost:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_saved:"Saved subscribers (monthly)", k_preservedMrr:"Preserved MRR", k_monthlyNet:"Net monthly impact", k_periodNet:"Period net impact", k_roi:"ROI", k_payback:"Payback period",
        d_wouldChurn:"Churn without pause flow", d_pauseAccepted:"Pause accepted users", d_preservedGp:"Preserved gross profit", d_incentiveCost:"Incentive cost", d_breakEven:"Break-even accept rate",
        errAtRisk:"At-risk subscriber count must be at least 1.", errRates:"Rates must be within 0~100%.", errArpu:"ARPU must be greater than 0.", errCost:"Cost inputs must be >= 0.", errMonths:"Analysis period must be between 1 and 60 months.", errUnit:"Net unit contribution per saved user is not positive.",
        people:"users", monthsUnit:"months", impossible:"Not achievable", noPayback:"No payback", statusGood:"Positive monthly net impact", statusBad:"Negative monthly net impact", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard permission unavailable. Please copy manually.",
        summaryTitle:"[Subscription Pause Save Summary]", summaryPeriod:"month cumulative net impact", summaryBe:"Break-even accept rate"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.atRisk) || v.atRisk < 1) return t("errAtRisk");
      const rates = [v.baselineChurn,v.acceptRate,v.reactivationRate,v.margin];
      if (rates.some((r)=>!Number.isFinite(r) || r < 0 || r > 100)) return t("errRates");
      if (!Number.isFinite(v.arpu) || v.arpu <= 0) return t("errArpu");
      const costs = [v.incentive,v.monthlyCost,v.setupCost];
      if (costs.some((c)=>!Number.isFinite(c) || c < 0)) return t("errCost");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return t("errMonths");

      const unitContribution = (v.arpu * (v.margin/100)) - v.incentive;
      if (unitContribution <= 0) return t("errUnit");
      return "";
    }

    function compute(v){
      const churn = v.baselineChurn / 100;
      const accept = v.acceptRate / 100;
      const reactivate = v.reactivationRate / 100;
      const marginRate = v.margin / 100;

      const wouldChurn = v.atRisk * churn;
      const pauseAccepted = wouldChurn * accept;
      const savedUsers = pauseAccepted * reactivate;

      const preservedMrr = savedUsers * v.arpu;
      const preservedGrossProfit = preservedMrr * marginRate;
      const incentiveCost = savedUsers * v.incentive;
      const monthlyNet = preservedGrossProfit - incentiveCost - v.monthlyCost;
      const periodNet = (monthlyNet * v.months) - v.setupCost;

      const invested = ((incentiveCost + v.monthlyCost) * v.months) + v.setupCost;
      const roi = invested === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / invested) * 100;
      const payback = monthlyNet > 0 ? v.setupCost / monthlyNet : Infinity;

      const unitContribution = (v.arpu * marginRate) - v.incentive;
      const denominator = v.atRisk * churn * reactivate;
      const breakEvenAccept = (unitContribution <= 0 || denominator <= 0)
        ? Infinity
        : (v.monthlyCost / (unitContribution * denominator)) * 100;

      return { wouldChurn, pauseAccepted, savedUsers, preservedMrr, preservedGrossProfit, incentiveCost, monthlyNet, periodNet, roi, payback, breakEvenAccept };
    }

    function resetOutputs(){
      ["savedUsers","preservedMrr","monthlyNet","periodNet","roi","payback","wouldChurn","pauseAccepted","preservedGrossProfit","incentiveCost","breakEvenAccept"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        atRisk:Number(refs.atRisk.value), baselineChurn:Number(refs.baselineChurn.value), acceptRate:Number(refs.acceptRate.value), reactivationRate:Number(refs.reactivationRate.value),
        arpu:Number(refs.arpu.value), margin:Number(refs.margin.value), incentive:Number(refs.incentive.value), monthlyCost:Number(refs.monthlyCost.value), setupCost:Number(refs.setupCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.savedUsers.textContent = `${num(r.savedUsers,1)} ${t("people")}`;
      refs.preservedMrr.textContent = money(r.preservedMrr);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("monthsUnit")}` : t("noPayback");

      refs.wouldChurn.textContent = `${num(r.wouldChurn,1)} ${t("people")}`;
      refs.pauseAccepted.textContent = `${num(r.pauseAccepted,1)} ${t("people")}`;
      refs.preservedGrossProfit.textContent = money(r.preservedGrossProfit);
      refs.incentiveCost.textContent = money(r.incentiveCost);
      refs.breakEvenAccept.textContent = Number.isFinite(r.breakEvenAccept) && r.breakEvenAccept <= 100 ? `${num(r.breakEvenAccept,3)}%` : t("impossible");

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> ${t("statusGood")} (${money(r.monthlyNet)})`
        : `<span class="warn">●</span> ${t("statusBad")} (${money(r.monthlyNet)})`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_saved")}: ${num(r.savedUsers,1)} ${t("people")}`,
        `${t("k_preservedMrr")}: ${money(r.preservedMrr)}`,
        `${t("d_preservedGp")}: ${money(r.preservedGrossProfit)}`,
        `${t("k_monthlyNet")}: ${money(r.monthlyNet)}`,
        `${v.months} ${t("summaryPeriod")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("monthsUnit")}` : t("noPayback")}`,
        `${t("summaryBe")}: ${Number.isFinite(r.breakEvenAccept) && r.breakEvenAccept <= 100 ? `${num(r.breakEvenAccept,3)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.atRisk,refs.baselineChurn,refs.acceptRate,refs.reactivationRate,refs.arpu,refs.margin,refs.incentive,refs.monthlyCost,refs.setupCost,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
