<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Price Increase Impact Calculator | 구독 가격 인상 영향 계산기</title>
  <meta name="description" content="구독자 수, 현재 요금, 가격 인상률, 이탈률 변화, 변동비 비율을 입력해 가격 인상 전후 MRR·총이익·순영향을 계산하는 구독 비즈니스 수익성 계산기" />
  <style>
    :root{--bg:#081323;--card:#102039;--line:#2a486b;--txt:#eaf2ff;--muted:#9bb2d6;--pri:#22c55e;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#194f78 0%,var(--bg) 53%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.74rem)}
    .sub{margin-top:6px;font-size:.92rem;color:var(--muted);line-height:1.5}
    .home{color:#dcfce7;text-decoration:none;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#14344c;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#163154,#102039);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1a33;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#22c55e,#16a34a)}
    .soft{background:#174b3a;border:1px solid var(--line)}
    textarea{margin-top:10px;min-height:102px;resize:vertical}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f3640;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#0f1d37;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.14rem;font-weight:800}
    .v.sm{font-size:1.01rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#14364e;color:#c8e8ff;font-size:.76rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>💳 구독 가격 인상 영향 계산기</h1>
        <div class="sub">가격 인상으로 생기는 매출 상승과 이탈 증가를 동시에 반영해, 실제 총이익 개선 여부를 판단합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="subs">현재 활성 구독자 수</label><input id="subs" type="number" min="1" step="1" value="4200" /></div>
          <div><label for="price">현재 월 구독료 (KRW)</label><input id="price" type="number" min="1" value="13900" /></div>
          <div><label for="increasePct">가격 인상률 (%)</label><input id="increasePct" type="number" min="-99" max="500" step="0.1" value="12" /></div>
          <div><label for="baseChurn">기준 월 이탈률 (%)</label><input id="baseChurn" type="number" min="0" max="100" step="0.1" value="4.5" /></div>
          <div><label for="churnDelta">인상 후 이탈률 변화 (%p)</label><input id="churnDelta" type="number" min="-100" max="100" step="0.1" value="1.2" /></div>
          <div><label for="newSubs">월 신규 유입 구독자 수</label><input id="newSubs" type="number" min="0" step="1" value="310" /></div>
          <div><label for="variableCost">변동비 비율 (%)</label><input id="variableCost" type="number" min="0" max="100" step="0.1" value="22" /></div>
          <div><label for="oneTimeChurn">추가 일회성 해지율 (%)</label><input id="oneTimeChurn" type="number" min="0" max="100" step="0.1" value="0.8" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">인상 전 MRR</div><div id="beforeMrr" class="v">-</div></div>
          <div class="kpi"><div class="k">인상 후 MRR</div><div id="afterMrr" class="v">-</div></div>
          <div class="kpi"><div class="k">인상 전 총이익</div><div id="beforeGp" class="v sm">-</div></div>
          <div class="kpi"><div class="k">인상 후 총이익</div><div id="afterGp" class="v sm">-</div></div>
          <div class="kpi"><div class="k">순 총이익 변화</div><div id="gpDelta" class="v sm">-</div></div>
          <div class="kpi"><div class="k">구독자 순변화</div><div id="subsDelta" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">전/후 비교</h2>
        <table>
          <tbody>
            <tr><th>인상 후 가격</th><td id="newPrice">-</td></tr>
            <tr><th>인상 전 말 구독자</th><td id="beforeEndSubs">-</td></tr>
            <tr><th>인상 후 말 구독자</th><td id="afterEndSubs">-</td></tr>
            <tr><th>인상 전 이탈자</th><td id="beforeChurnCount">-</td></tr>
            <tr><th>인상 후 이탈자(일회성 포함)</th><td id="afterChurnCount">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      subs: $('subs'), price: $('price'), increasePct: $('increasePct'), baseChurn: $('baseChurn'),
      churnDelta: $('churnDelta'), newSubs: $('newSubs'), variableCost: $('variableCost'), oneTimeChurn: $('oneTimeChurn'),
      beforeMrr: $('beforeMrr'), afterMrr: $('afterMrr'), beforeGp: $('beforeGp'), afterGp: $('afterGp'), gpDelta: $('gpDelta'), subsDelta: $('subsDelta'),
      newPrice: $('newPrice'), beforeEndSubs: $('beforeEndSubs'), afterEndSubs: $('afterEndSubs'), beforeChurnCount: $('beforeChurnCount'), afterChurnCount: $('afterChurnCount'),
      status: $('status'), error: $('error'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = { subs: 4200, price: 13900, increasePct: 12, baseChurn: 4.5, churnDelta: 1.2, newSubs: 310, variableCost: 22, oneTimeChurn: 0.8 };
    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const nfmt = (n, d = 2) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });

    const inRange = (n, min, max) => Number.isFinite(n) && n >= min && n <= max;

    function validate(v) {
      if (!Number.isFinite(v.subs) || v.subs <= 0) return '현재 활성 구독자 수는 1 이상이어야 합니다.';
      if (!Number.isFinite(v.price) || v.price <= 0) return '현재 월 구독료는 0보다 커야 합니다.';
      if (!Number.isFinite(v.increasePct) || v.increasePct <= -100) return '가격 인상률은 -100%보다 커야 합니다.';
      if (!inRange(v.baseChurn, 0, 100)) return '기준 월 이탈률은 0~100 범위여야 합니다.';
      if (!inRange(v.churnDelta, -100, 100)) return '이탈률 변화는 -100~100 범위여야 합니다.';
      if (!Number.isFinite(v.newSubs) || v.newSubs < 0) return '월 신규 유입 구독자 수는 0 이상이어야 합니다.';
      if (!inRange(v.variableCost, 0, 100)) return '변동비 비율은 0~100 범위여야 합니다.';
      if (!inRange(v.oneTimeChurn, 0, 100)) return '추가 일회성 해지율은 0~100 범위여야 합니다.';

      const churnAfter = v.baseChurn + v.churnDelta + v.oneTimeChurn;
      if (churnAfter < 0 || churnAfter > 100) return '인상 후 총 이탈률(기준+변화+일회성)이 0~100 범위를 벗어났습니다.';

      const newPrice = v.price * (1 + v.increasePct / 100);
      if (newPrice <= 0) return '인상 후 가격이 0 이하입니다. 가격 인상률을 조정하세요.';
      return '';
    }

    function compute(v) {
      const baseChurnRate = v.baseChurn / 100;
      const afterChurnRate = (v.baseChurn + v.churnDelta + v.oneTimeChurn) / 100;
      const variableCostRate = v.variableCost / 100;
      const newPrice = v.price * (1 + v.increasePct / 100);

      const beforeChurnCount = v.subs * baseChurnRate;
      const afterChurnCount = v.subs * afterChurnRate;

      const beforeEndSubs = v.subs - beforeChurnCount + v.newSubs;
      const afterEndSubs = v.subs - afterChurnCount + v.newSubs;

      const beforeMrr = beforeEndSubs * v.price;
      const afterMrr = afterEndSubs * newPrice;

      const beforeGp = beforeMrr * (1 - variableCostRate);
      const afterGp = afterMrr * (1 - variableCostRate);

      const gpDelta = afterGp - beforeGp;
      const subsDelta = afterEndSubs - beforeEndSubs;

      return { newPrice, beforeChurnCount, afterChurnCount, beforeEndSubs, afterEndSubs, beforeMrr, afterMrr, beforeGp, afterGp, gpDelta, subsDelta };
    }

    function clearOutputs() {
      ['beforeMrr','afterMrr','beforeGp','afterGp','gpDelta','subsDelta','newPrice','beforeEndSubs','afterEndSubs','beforeChurnCount','afterChurnCount'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function render() {
      const v = {
        subs: Number(refs.subs.value),
        price: Number(refs.price.value),
        increasePct: Number(refs.increasePct.value),
        baseChurn: Number(refs.baseChurn.value),
        churnDelta: Number(refs.churnDelta.value),
        newSubs: Number(refs.newSubs.value),
        variableCost: Number(refs.variableCost.value),
        oneTimeChurn: Number(refs.oneTimeChurn.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        clearOutputs();
        return;
      }

      const r = compute(v);

      refs.beforeMrr.textContent = won(r.beforeMrr);
      refs.afterMrr.textContent = won(r.afterMrr);
      refs.beforeGp.textContent = won(r.beforeGp);
      refs.afterGp.textContent = won(r.afterGp);
      refs.gpDelta.textContent = won(r.gpDelta);
      refs.subsDelta.textContent = `${nfmt(r.subsDelta, 1)}명`;

      refs.newPrice.textContent = won(r.newPrice);
      refs.beforeEndSubs.textContent = `${nfmt(r.beforeEndSubs, 1)}명`;
      refs.afterEndSubs.textContent = `${nfmt(r.afterEndSubs, 1)}명`;
      refs.beforeChurnCount.textContent = `${nfmt(r.beforeChurnCount, 1)}명`;
      refs.afterChurnCount.textContent = `${nfmt(r.afterChurnCount, 1)}명`;

      if (r.gpDelta > 0) {
        refs.status.innerHTML = `<span class="good">●</span> 가격 인상 시 총이익 개선 예상 (+${won(r.gpDelta)})`;
      } else if (Math.abs(r.gpDelta) < 1) {
        refs.status.innerHTML = `<span class="warn">●</span> 총이익 변화 거의 없음`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> 이탈 영향으로 총이익 감소 예상 (${won(r.gpDelta)})`;
      }

      refs.summary.value = [
        '[Subscription Price Increase Impact 요약]',
        `인상 전/후 가격: ${won(v.price)} → ${won(r.newPrice)}`,
        `인상 전/후 말 구독자: ${nfmt(r.beforeEndSubs,1)}명 → ${nfmt(r.afterEndSubs,1)}명`,
        `인상 전/후 MRR: ${won(r.beforeMrr)} → ${won(r.afterMrr)}`,
        `인상 전/후 총이익: ${won(r.beforeGp)} → ${won(r.afterGp)}`,
        `순 총이익 변화: ${won(r.gpDelta)}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, v]) => { refs[k].value = v; });
      render();
    });

    [refs.subs, refs.price, refs.increasePct, refs.baseChurn, refs.churnDelta, refs.newSubs, refs.variableCost, refs.oneTimeChurn].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
