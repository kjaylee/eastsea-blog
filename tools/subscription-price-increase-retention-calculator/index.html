<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Price Increase Retention Calculator | 구독 가격 인상 유지율 계산기</title>
  <meta name="description" content="구독 가격 인상 시 추가 이탈을 반영해 월 순효과, ROI, 회수기간, 손익분기 추가 이탈률을 계산하는 수익화 도구" />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">💸 구독 가격 인상 유지율 계산기</h1>
        <div class="sub" id="subtitle">가격 인상으로 인한 추가 이탈을 반영해 월 순효과, ROI, 회수기간을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_subscribers" for="subscribers"></label><input id="subscribers" type="number" min="1" value="24000"></div>
          <div><label id="l_currentPrice" for="currentPrice"></label><input id="currentPrice" type="number" min="0" step="100" value="39000"></div>
          <div><label id="l_priceIncrease" for="priceIncrease"></label><input id="priceIncrease" type="number" min="0" max="300" step="0.1" value="12"></div>
          <div><label id="l_extraChurn" for="extraChurn"></label><input id="extraChurn" type="number" min="0" max="100" step="0.1" value="2.8"></div>
          <div><label id="l_grossMargin" for="grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="82"></div>
          <div><label id="l_feeRate" for="feeRate"></label><input id="feeRate" type="number" min="0" max="100" step="0.1" value="3.1"></div>
          <div><label id="l_supportCost" for="supportCost"></label><input id="supportCost" type="number" min="0" step="100" value="2400"></div>
          <div><label id="l_monthlyCost" for="monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="8000000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="14000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_newPrice"></div><div class="v" id="newPrice">-</div></div>
          <div class="kpi"><div class="k" id="k_retainedSubs"></div><div class="v" id="retainedSubs">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_churnDelta"></div><div class="v" id="churnDelta">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_breakEvenChurn"></th><td id="breakEvenChurn">-</td></tr>
          <tr><th id="d_payback"></th><td id="payback">-</td></tr>
          <tr><th id="d_monthlyContribution"></th><td id="monthlyContribution">-</td></tr>
          <tr><th id="d_totalProgramCost"></th><td id="totalProgramCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={subscribers:$("subscribers"),currentPrice:$("currentPrice"),priceIncrease:$("priceIncrease"),extraChurn:$("extraChurn"),grossMargin:$("grossMargin"),feeRate:$("feeRate"),supportCost:$("supportCost"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),newPrice:$("newPrice"),retainedSubs:$("retainedSubs"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),churnDelta:$("churnDelta"),breakEvenChurn:$("breakEvenChurn"),payback:$("payback"),monthlyContribution:$("monthlyContribution"),totalProgramCost:$("totalProgramCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={subscribers:24000,currentPrice:39000,priceIncrease:12,extraChurn:2.8,grossMargin:82,feeRate:3.1,supportCost:2400,monthlyCost:8000000,setup:14000000,months:12};
    const I18N={
      ko:{title:"💸 구독 가격 인상 유지율 계산기",subtitle:"가격 인상으로 인한 추가 이탈을 반영해 월 순효과, ROI, 회수기간을 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_subscribers:"활성 유료 구독자 수",l_currentPrice:"현재 월 구독 가격 (₩)",l_priceIncrease:"가격 인상률 (%)",l_extraChurn:"인상으로 인한 추가 이탈률 (%p)",l_grossMargin:"매출총이익률 (%)",l_feeRate:"결제 수수료율 (%)",l_supportCost:"구독자당 월 지원비 (₩)",l_monthlyCost:"월 운영비 (₩)",l_setup:"초기 셋업비 (₩)",l_months:"분석 기간 (개월)",k_newPrice:"인상 후 구독 가격",k_retainedSubs:"유지 구독자 수",k_monthlyNet:"월 순이익 변화",k_roi:"ROI",k_periodNet:"기간 순효과",k_churnDelta:"추가 이탈률",d_breakEvenChurn:"손익분기 추가 이탈률",d_payback:"회수기간",d_monthlyContribution:"월 증분 총기여",d_totalProgramCost:"기간 총 프로그램비",ok:"가격 인상 수익성 계산 완료",warn:"현재 가정에서는 월 순이익 변화가 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",priceErr:"가격 인상률은 0~300 범위여야 합니다.",numErr:"값은 0 이상, 구독자 수/기간은 1 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[구독 가격 인상 유지율 요약]",unitMonths:"개월"},
      en:{title:"💸 Subscription Price Increase Retention Calculator",subtitle:"Model net profit impact, ROI, and payback after a subscription price increase with incremental churn.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_subscribers:"Active paid subscribers",l_currentPrice:"Current monthly subscription price (KRW)",l_priceIncrease:"Price increase rate (%)",l_extraChurn:"Incremental churn from price change (%p)",l_grossMargin:"Gross margin (%)",l_feeRate:"Payment fee rate (%)",l_supportCost:"Monthly support cost per subscriber (KRW)",l_monthlyCost:"Monthly operating cost (KRW)",l_setup:"One-time setup cost (KRW)",l_months:"Analysis period (months)",k_newPrice:"New subscription price",k_retainedSubs:"Retained subscribers",k_monthlyNet:"Monthly net impact",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_churnDelta:"Incremental churn",d_breakEvenChurn:"Break-even incremental churn",d_payback:"Payback period",d_monthlyContribution:"Monthly incremental contribution",d_totalProgramCost:"Total program cost (period)",ok:"Price increase economics ready",warn:"Monthly net impact is negative under current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",priceErr:"Price increase rate must be between 0 and 300.",numErr:"Values must be >= 0 and subscribers/months must be >= 1.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Subscription Price Increase Retention Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["subscribers","currentPrice","priceIncrease","extraChurn","grossMargin","feeRate","supportCost","monthlyCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["newPrice","retainedSubs","monthlyNet","roi","periodNet","churnDelta"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["breakEvenChurn","payback","monthlyContribution","totalProgramCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.subscribers)||v.subscribers<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.currentPrice,v.supportCost,v.monthlyCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if(!Number.isFinite(v.priceIncrease)||v.priceIncrease<0||v.priceIncrease>300) return t("priceErr");
      if([v.extraChurn,v.grossMargin,v.feeRate].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      return "";
    }

    function render(){
      const v={subscribers:Number(refs.subscribers.value),currentPrice:Number(refs.currentPrice.value),priceIncrease:Number(refs.priceIncrease.value),extraChurn:Number(refs.extraChurn.value),grossMargin:Number(refs.grossMargin.value),feeRate:Number(refs.feeRate.value),supportCost:Number(refs.supportCost.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["newPrice","retainedSubs","monthlyNet","roi","periodNet","churnDelta","breakEvenChurn","payback","monthlyContribution","totalProgramCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const gm=v.grossMargin/100;
      const fee=v.feeRate/100;
      const churn=v.extraChurn/100;
      const newPrice=v.currentPrice*(1+v.priceIncrease/100);
      const retainedSubs=Math.max(0,v.subscribers*(1-churn));

      const coeffAfter=(newPrice*(gm-fee))-v.supportCost;
      const coeffBefore=(v.currentPrice*(gm-fee))-v.supportCost;
      const monthlyContribution=(retainedSubs*coeffAfter)-(v.subscribers*coeffBefore);
      const monthlyNet=monthlyContribution-v.monthlyCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;

      const retainedNeeded=coeffAfter>0?(v.monthlyCost+(v.subscribers*coeffBefore))/(v.subscribers*coeffAfter):Infinity;
      const breakEvenChurn=Number.isFinite(retainedNeeded)?(1-retainedNeeded)*100:Infinity;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      refs.newPrice.textContent=won(newPrice);
      refs.retainedSubs.textContent=num(retainedSubs,0);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.churnDelta.textContent=pct(v.extraChurn,2);
      refs.breakEvenChurn.textContent=(Number.isFinite(breakEvenChurn)&&breakEvenChurn>=0&&breakEvenChurn<=100)?pct(breakEvenChurn,2):t("na");
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.monthlyContribution.textContent=won(monthlyContribution);
      refs.totalProgramCost.textContent=won(totalProgramCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_newPrice")}: ${won(newPrice)}`,`${t("k_retainedSubs")}: ${num(retainedSubs,0)}`,`${t("d_monthlyContribution")}: ${won(monthlyContribution)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("d_breakEvenChurn")}: ${(Number.isFinite(breakEvenChurn)&&breakEvenChurn>=0&&breakEvenChurn<=100)?pct(breakEvenChurn,2):t("na")}`,`${t("d_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.subscribers,refs.currentPrice,refs.priceIncrease,refs.extraChurn,refs.grossMargin,refs.feeRate,refs.supportCost,refs.monthlyCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
