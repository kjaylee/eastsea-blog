<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Winback Campaign ROI Calculator | 구독 윈백 캠페인 ROI 계산기</title>
  <meta name="description" content="해지 고객 윈백 캠페인의 재활성화 수, 매출, 순이익, ROI, 손익분기 재활성화율을 계산하는 도구" />
  <style>
    :root{--bg:#0d1324;--card:#15213b;--line:#2a3e65;--txt:#e6eeff;--muted:#a7badf;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 0% 0%,#214c79 0%,var(--bg) 55%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#1b335a;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#1a3158,#121f38);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1b32;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#23426f;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10203a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1d3a63;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">🔁 구독 윈백 캠페인 ROI 계산기</h1>
        <div class="sub" id="subtitle">해지 고객 대상 재활성화 캠페인의 매출 회수와 순수익을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_churned" for="churned"></label><input id="churned" type="number" min="1" step="1" value="18000"></div>
          <div><label id="l_contactRate" for="contactRate"></label><input id="contactRate" type="number" min="0" max="100" step="0.1" value="62"></div>
          <div><label id="l_responseRate" for="responseRate"></label><input id="responseRate" type="number" min="0" max="100" step="0.1" value="24"></div>
          <div><label id="l_reactivationRate" for="reactivationRate"></label><input id="reactivationRate" type="number" min="0" max="100" step="0.1" value="18"></div>
          <div><label id="l_arpu" for="arpu"></label><input id="arpu" type="number" min="0" step="100" value="18000"></div>
          <div><label id="l_discountRate" for="discountRate"></label><input id="discountRate" type="number" min="0" max="100" step="0.1" value="25"></div>
          <div><label id="l_retainedMonths" for="retainedMonths"></label><input id="retainedMonths" type="number" min="1" step="1" value="6"></div>
          <div><label id="l_variableCost" for="variableCost"></label><input id="variableCost" type="number" min="0" max="100" step="0.1" value="22"></div>
          <div><label id="l_campaignCost" for="campaignCost"></label><input id="campaignCost" type="number" min="0" step="1000" value="32000000"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_reactivated"></div><div class="v" id="reactivated">-</div></div>
          <div class="kpi"><div class="k" id="k_discountedArpu"></div><div class="v" id="discountedArpu">-</div></div>
          <div class="kpi"><div class="k" id="k_grossRevenue"></div><div class="v" id="grossRevenue">-</div></div>
          <div class="kpi"><div class="k" id="k_contributionProfit"></div><div class="v" id="contributionProfit">-</div></div>
          <div class="kpi"><div class="k" id="k_netProfit"></div><div class="v" id="netProfit">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_contacts"></th><td id="contacts">-</td></tr>
          <tr><th id="d_responders"></th><td id="responders">-</td></tr>
          <tr><th id="d_breakEvenReactivated"></th><td id="breakEvenReactivated">-</td></tr>
          <tr><th id="d_breakEvenRate"></th><td id="breakEvenRate">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={churned:$("churned"),contactRate:$("contactRate"),responseRate:$("responseRate"),reactivationRate:$("reactivationRate"),arpu:$("arpu"),discountRate:$("discountRate"),retainedMonths:$("retainedMonths"),variableCost:$("variableCost"),campaignCost:$("campaignCost"),reactivated:$("reactivated"),discountedArpu:$("discountedArpu"),grossRevenue:$("grossRevenue"),contributionProfit:$("contributionProfit"),netProfit:$("netProfit"),roi:$("roi"),contacts:$("contacts"),responders:$("responders"),breakEvenReactivated:$("breakEvenReactivated"),breakEvenRate:$("breakEvenRate"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={churned:18000,contactRate:62,responseRate:24,reactivationRate:18,arpu:18000,discountRate:25,retainedMonths:6,variableCost:22,campaignCost:32000000};
    const I18N={
      ko:{title:"🔁 구독 윈백 캠페인 ROI 계산기",subtitle:"해지 고객 대상 재활성화 캠페인의 매출 회수와 순수익을 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_churned:"해지 고객 풀(명)",l_contactRate:"캠페인 접촉률 (%)",l_responseRate:"응답률 (%)",l_reactivationRate:"응답자 재활성화율 (%)",l_arpu:"정가 월 ARPU (₩)",l_discountRate:"윈백 할인율 (%)",l_retainedMonths:"재활성화 후 평균 유지개월",l_variableCost:"변동원가율 (%)",l_campaignCost:"캠페인 총비용 (₩)",k_reactivated:"재활성화 고객 수",k_discountedArpu:"할인 적용 ARPU",k_grossRevenue:"누적 매출",k_contributionProfit:"공헌이익",k_netProfit:"순이익",k_roi:"ROI",d_contacts:"접촉 고객 수",d_responders:"응답 고객 수",d_breakEvenReactivated:"손익분기 재활성화 고객수",d_breakEvenRate:"손익분기 재활성화율",ok:"캠페인이 손익분기 이상입니다",warn:"현재 가정에서는 캠페인이 적자입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율은 0~100 범위여야 합니다.",numErr:"고객/금액/개월은 0 이상(개월은 1 이상)이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[구독 윈백 캠페인 ROI 요약]"},
      en:{title:"🔁 Subscription Winback Campaign ROI Calculator",subtitle:"Estimate reactivation count, recovered revenue, net profit, and ROI for churn winback campaigns.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_churned:"Churned customer pool",l_contactRate:"Campaign contact rate (%)",l_responseRate:"Response rate (%)",l_reactivationRate:"Reactivation rate from responders (%)",l_arpu:"List-price monthly ARPU (KRW)",l_discountRate:"Winback discount (%)",l_retainedMonths:"Average retained months after winback",l_variableCost:"Variable cost ratio (%)",l_campaignCost:"Total campaign cost (KRW)",k_reactivated:"Reactivated customers",k_discountedArpu:"Discounted ARPU",k_grossRevenue:"Recovered revenue",k_contributionProfit:"Contribution profit",k_netProfit:"Net profit",k_roi:"ROI",d_contacts:"Contacted customers",d_responders:"Responding customers",d_breakEvenReactivated:"Break-even reactivated customers",d_breakEvenRate:"Break-even reactivation rate",ok:"Campaign is above break-even",warn:"Campaign is unprofitable under current assumptions",invalid:"Please review inputs",rangeErr:"Rate fields must be between 0 and 100.",numErr:"Customer/amount fields must be >= 0 (months >= 1).",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Subscription Winback ROI Summary]"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["churned","contactRate","responseRate","reactivationRate","arpu","discountRate","retainedMonths","variableCost","campaignCost"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["reactivated","discountedArpu","grossRevenue","contributionProfit","netProfit","roi"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["contacts","responders","breakEvenReactivated","breakEvenRate"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if([v.contactRate,v.responseRate,v.reactivationRate,v.discountRate,v.variableCost].some((x)=>!Number.isFinite(x)||x<0||x>100)) return t("rangeErr");
      if(!Number.isFinite(v.churned)||v.churned<0||!Number.isFinite(v.arpu)||v.arpu<0||!Number.isFinite(v.retainedMonths)||v.retainedMonths<1||!Number.isFinite(v.campaignCost)||v.campaignCost<0) return t("numErr");
      return "";
    }

    function render(){
      const v={churned:Number(refs.churned.value),contactRate:Number(refs.contactRate.value),responseRate:Number(refs.responseRate.value),reactivationRate:Number(refs.reactivationRate.value),arpu:Number(refs.arpu.value),discountRate:Number(refs.discountRate.value),retainedMonths:Number(refs.retainedMonths.value),variableCost:Number(refs.variableCost.value),campaignCost:Number(refs.campaignCost.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["reactivated","discountedArpu","grossRevenue","contributionProfit","netProfit","roi","contacts","responders","breakEvenReactivated","breakEvenRate"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const contacts=v.churned*(v.contactRate/100);
      const responders=contacts*(v.responseRate/100);
      const reactivated=responders*(v.reactivationRate/100);
      const discountedArpu=v.arpu*(1-v.discountRate/100);
      const grossRevenue=reactivated*discountedArpu*v.retainedMonths;
      const contributionProfit=grossRevenue*(1-v.variableCost/100);
      const netProfit=contributionProfit-v.campaignCost;
      const roi=v.campaignCost>0?(netProfit/v.campaignCost)*100:0;

      const contributionPerReactivated=discountedArpu*v.retainedMonths*(1-v.variableCost/100);
      const breakEvenReactivated=contributionPerReactivated>0?v.campaignCost/contributionPerReactivated:Infinity;
      const denom=v.churned*(v.contactRate/100)*(v.responseRate/100);
      const breakEvenRate=(denom>0&&Number.isFinite(breakEvenReactivated))?(breakEvenReactivated/denom)*100:Infinity;

      refs.reactivated.textContent=num(reactivated,1);
      refs.discountedArpu.textContent=won(discountedArpu);
      refs.grossRevenue.textContent=won(grossRevenue);
      refs.contributionProfit.textContent=won(contributionProfit);
      refs.netProfit.textContent=won(netProfit);
      refs.roi.textContent=pct(roi,1);
      refs.contacts.textContent=num(contacts,1);
      refs.responders.textContent=num(responders,1);
      refs.breakEvenReactivated.textContent=Number.isFinite(breakEvenReactivated)?num(breakEvenReactivated,1):t("na");
      refs.breakEvenRate.textContent=Number.isFinite(breakEvenRate)?pct(breakEvenRate,2):t("na");
      refs.status.innerHTML=netProfit>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_reactivated")}: ${num(reactivated,1)}`,`${t("k_grossRevenue")}: ${won(grossRevenue)}`,`${t("k_contributionProfit")}: ${won(contributionProfit)}`,`${t("k_netProfit")}: ${won(netProfit)}`,`${t("k_roi")}: ${pct(roi,1)}`,`${t("d_breakEvenRate")}: ${Number.isFinite(breakEvenRate)?pct(breakEvenRate,2):t("na")}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.churned,refs.contactRate,refs.responseRate,refs.reactivationRate,refs.arpu,refs.discountRate,refs.retainedMonths,refs.variableCost,refs.campaignCost].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
