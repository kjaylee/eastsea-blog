<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG → PNG 변환기 | 웹 도구 모음</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #121212;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #444;
            --shadow: rgba(0, 0, 0, 0.3);
            --card-bg: #2d2d2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1000px; margin: 0 auto; }
        
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--text-primary); }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-area {
            border: 3px dashed var(--border);
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-secondary);
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: var(--bg-primary);
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: var(--bg-primary);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        input[type="number"], select {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        button:active { transform: scale(0.98); }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .preview-area {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            background: var(--bg-secondary);
            border-radius: 15px;
            border: 1px solid var(--border);
            padding: 20px;
            overflow: auto;
        }

        .preview-area img, .preview-area svg {
            max-width: 100%;
            max-height: 500px;
        }

        .info-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .controls { grid-template-columns: 1fr; }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-btn">← 목록으로</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </header>

        <div class="card">
            <h1>🖼️ SVG → PNG 변환기</h1>
            
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📁</div>
                <div style="font-size: 1.2rem; font-weight: 600; margin-bottom: 10px;">
                    클릭하거나 SVG 파일을 드래그하세요
                </div>
                <div class="info-text">지원 형식: .svg</div>
            </div>
            <input type="file" id="fileInput" accept=".svg,image/svg+xml" onchange="handleFile(event)">

            <div class="controls">
                <div class="control-group">
                    <label>너비 (px)</label>
                    <input type="number" id="width" value="800" min="1" max="4096">
                </div>
                <div class="control-group">
                    <label>높이 (px)</label>
                    <input type="number" id="height" value="600" min="1" max="4096">
                </div>
                <div class="control-group">
                    <label>배경색</label>
                    <select id="bgColor">
                        <option value="transparent" selected>투명</option>
                        <option value="#FFFFFF">흰색</option>
                        <option value="#000000">검정색</option>
                        <option value="custom">사용자 정의</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>스케일 배율</label>
                    <select id="scale">
                        <option value="1">1x</option>
                        <option value="2" selected>2x (Retina)</option>
                        <option value="3">3x</option>
                        <option value="4">4x</option>
                    </select>
                </div>
            </div>

            <button onclick="convertToPNG()" id="convertBtn" disabled>PNG로 변환 및 다운로드</button>
        </div>

        <div class="card">
            <h1>📸 미리보기</h1>
            <div class="preview-area" id="previewArea">
                <div class="info-text">SVG 파일을 업로드하면 미리보기가 표시됩니다</div>
            </div>
        </div>
    </div>

    <script>
        let svgContent = null;
        let svgElement = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                loadSVG(files[0]);
            }
        });

        function handleFile(event) {
            const file = event.target.files[0];
            if (file) {
                loadSVG(file);
            }
        }

        function loadSVG(file) {
            if (!file.type.includes('svg')) {
                alert('SVG 파일만 업로드할 수 있습니다');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                svgContent = e.target.result;
                displayPreview(svgContent);
                document.getElementById('convertBtn').disabled = false;
            };
            reader.readAsText(file);
        }

        function displayPreview(svgText) {
            const previewArea = document.getElementById('previewArea');
            previewArea.innerHTML = svgText;
            svgElement = previewArea.querySelector('svg');
            
            if (svgElement) {
                // Get original dimensions
                const viewBox = svgElement.getAttribute('viewBox');
                if (viewBox) {
                    const [, , w, h] = viewBox.split(' ').map(Number);
                    document.getElementById('width').value = Math.round(w);
                    document.getElementById('height').value = Math.round(h);
                } else if (svgElement.width && svgElement.height) {
                    const w = parseFloat(svgElement.getAttribute('width'));
                    const h = parseFloat(svgElement.getAttribute('height'));
                    document.getElementById('width').value = Math.round(w);
                    document.getElementById('height').value = Math.round(h);
                }
            }
        }

        async function convertToPNG() {
            if (!svgContent) {
                alert('먼저 SVG 파일을 업로드하세요');
                return;
            }

            const width = parseInt(document.getElementById('width').value);
            const height = parseInt(document.getElementById('height').value);
            const scale = parseInt(document.getElementById('scale').value);
            const bgColor = document.getElementById('bgColor').value;

            const canvas = document.createElement('canvas');
            canvas.width = width * scale;
            canvas.height = height * scale;
            const ctx = canvas.getContext('2d');

            // Set background
            if (bgColor !== 'transparent') {
                ctx.fillStyle = bgColor === 'custom' ? prompt('배경색을 입력하세요 (예: #FF0000):', '#FFFFFF') : bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Create blob from SVG
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);

            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Download
                canvas.toBlob((pngBlob) => {
                    const downloadUrl = URL.createObjectURL(pngBlob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = `converted-${Date.now()}.png`;
                    a.click();
                    URL.revokeObjectURL(downloadUrl);
                });

                URL.revokeObjectURL(url);
            };

            img.onerror = () => {
                alert('SVG 변환 중 오류가 발생했습니다. SVG 파일이 손상되었거나 외부 리소스를 참조하고 있을 수 있습니다.');
                URL.revokeObjectURL(url);
            };

            img.src = url;
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
