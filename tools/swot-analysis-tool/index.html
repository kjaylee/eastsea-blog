<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SWOT 분석 도구 | SWOT Analysis Tool</title>
  <meta name="description" content="강점/약점/기회/위협 항목과 중요도를 기반으로 SO/WO/ST/WT 전략을 자동 생성하는 SWOT 분석 도구" />
  <style>
    :root {
      --bg: #f3f6ff;
      --card: #ffffff;
      --line: #d7e0f4;
      --text: #1f2937;
      --muted: #64748b;
      --primary: #3b82f6;
      --good: #10b981;
      --warn: #f59e0b;
      --bad: #ef4444;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef3ff 0%, #f8faff 100%);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px 14px 42px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.9rem);
    }
    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button, input, textarea, select {
      font: inherit;
    }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #1e293b;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn.primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: 0;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .kpi {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      padding: 12px;
      box-shadow: 0 6px 20px rgba(30, 41, 59, 0.05);
    }
    .k {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .v {
      margin-top: 6px;
      font-size: 1.2rem;
      font-weight: 800;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      padding: 12px;
      box-shadow: 0 6px 20px rgba(30, 41, 59, 0.05);
    }
    .card h2 {
      margin: 0;
      font-size: 1.03rem;
    }
    .tone-strengths { color: #0f766e; }
    .tone-weaknesses { color: #b45309; }
    .tone-opportunities { color: #1d4ed8; }
    .tone-threats { color: #b91c1c; }
    .small {
      margin-top: 4px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .add-row {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 90px auto;
      gap: 8px;
    }
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      resize: vertical;
      min-height: 78px;
    }
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }
    .list {
      margin-top: 10px;
      display: grid;
      gap: 8px;
      min-height: 64px;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbff;
      padding: 9px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .item-text {
      font-size: 0.9rem;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .badge {
      flex-shrink: 0;
      align-self: flex-start;
      border: 1px solid #c4d3f7;
      border-radius: 999px;
      background: #eaf1ff;
      color: #1e3a8a;
      padding: 3px 8px;
      font-size: 0.77rem;
      font-weight: 700;
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }
    .delete {
      border: 0;
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 3px 7px;
      cursor: pointer;
      font-size: 0.74rem;
      margin-left: 6px;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--muted);
      background: #fcfdff;
      text-align: center;
      padding: 11px;
      font-size: 0.85rem;
    }
    .matrix {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      padding: 12px;
      box-shadow: 0 6px 20px rgba(30, 41, 59, 0.05);
    }
    .matrix h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }
    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 10px;
    }
    .strategy {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdff;
      padding: 10px;
    }
    .strategy h3 {
      margin: 0 0 8px;
      font-size: 0.95rem;
    }
    .strategy ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 5px;
    }
    .strategy li {
      font-size: 0.88rem;
      line-height: 1.35;
    }
    .status {
      margin-top: 10px;
      min-height: 20px;
      font-size: 0.86rem;
      color: #047857;
    }

    @media (max-width: 980px) {
      .board, .matrix-grid { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .add-row { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: #fff; }
      .actions, .add-row, .delete, .status { display: none !important; }
      .card, .kpi, .matrix, .strategy { box-shadow: none; }
      .wrap { max-width: 100%; padding: 0; }
      .top { margin-bottom: 8px; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <header class="top">
      <div>
        <h1>📌 SWOT 분석 도구</h1>
        <p class="sub">강점/약점/기회/위협 항목을 입력하고 중요도(1~5)를 부여하면 SO/WO/ST/WT 전략이 자동 생성됩니다.</p>
      </div>
      <div class="actions">
        <button class="btn primary" id="sampleBtn" type="button">샘플 채우기</button>
        <button class="btn" id="printBtn" type="button">인쇄 / PDF 저장</button>
        <button class="btn" id="resetBtn" type="button">초기화</button>
      </div>
    </header>

    <section class="kpi-grid">
      <article class="kpi"><div class="k">강점 평균 중요도</div><div class="v" id="kpiStrengths">0.0</div></article>
      <article class="kpi"><div class="k">약점 평균 중요도</div><div class="v" id="kpiWeaknesses">0.0</div></article>
      <article class="kpi"><div class="k">기회 평균 중요도</div><div class="v" id="kpiOpportunities">0.0</div></article>
      <article class="kpi"><div class="k">위협 평균 중요도</div><div class="v" id="kpiThreats">0.0</div></article>
    </section>

    <section class="board" id="swotBoard"></section>

    <section class="matrix">
      <h2>전략 매트릭스 (자동 생성)</h2>
      <div class="matrix-grid" id="matrixGrid"></div>
      <div class="status" id="status"></div>
    </section>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'tool-swot-analysis-v1';
      const TYPES = {
        strengths: { title: 'Strengths (강점)', className: 'tone-strengths', hint: '내부 경쟁력, 자원, 강점 요소' },
        weaknesses: { title: 'Weaknesses (약점)', className: 'tone-weaknesses', hint: '내부 한계, 부족한 역량, 리스크' },
        opportunities: { title: 'Opportunities (기회)', className: 'tone-opportunities', hint: '시장 변화, 신사업 기회, 성장 요인' },
        threats: { title: 'Threats (위협)', className: 'tone-threats', hint: '경쟁, 규제, 경기 침체 등 외부 위협' }
      };

      const state = loadState();

      function loadState() {
        const base = { strengths: [], weaknesses: [], opportunities: [], threats: [] };
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return base;
          const parsed = JSON.parse(raw);
          Object.keys(base).forEach((key) => {
            if (Array.isArray(parsed[key])) {
              base[key] = parsed[key]
                .filter((item) => item && typeof item.text === 'string')
                .map((item) => ({
                  id: item.id || uid(),
                  text: item.text.trim(),
                  importance: clamp(Number(item.importance) || 1, 1, 5)
                }))
                .filter((item) => item.text.length > 0);
            }
          });
          return base;
        } catch (error) {
          return base;
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function uid() {
        return Math.random().toString(36).slice(2, 10);
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function averageImportance(type) {
        const list = state[type];
        if (!list.length) return 0;
        const sum = list.reduce((acc, item) => acc + item.importance, 0);
        return sum / list.length;
      }

      function renderBoard() {
        const root = document.getElementById('swotBoard');
        root.innerHTML = Object.entries(TYPES).map(([type, info]) => {
          const items = state[type];
          const listMarkup = items.length
            ? items
                .map((item) => `
                  <div class="item">
                    <div class="item-text">${escapeHtml(item.text)}</div>
                    <div>
                      <span class="badge">중요도 ${item.importance}
                        <button class="delete" type="button" data-action="remove" data-type="${type}" data-id="${item.id}">삭제</button>
                      </span>
                    </div>
                  </div>
                `)
                .join('')
            : '<div class="empty">아직 입력된 항목이 없습니다.</div>';

          return `
            <article class="card">
              <h2 class="${info.className}">${info.title}</h2>
              <div class="small">${info.hint}</div>
              <div class="add-row">
                <textarea id="input-${type}" placeholder="${info.hint}"></textarea>
                <select id="importance-${type}" aria-label="${info.title} 중요도">
                  <option value="1">중요도 1</option>
                  <option value="2">중요도 2</option>
                  <option value="3" selected>중요도 3</option>
                  <option value="4">중요도 4</option>
                  <option value="5">중요도 5</option>
                </select>
                <button class="btn primary" type="button" data-action="add" data-type="${type}">추가</button>
              </div>
              <div class="list">${listMarkup}</div>
            </article>
          `;
        }).join('');
      }

      function topItems(type, limit) {
        return [...state[type]].sort((a, b) => b.importance - a.importance).slice(0, limit);
      }

      function buildStrategies() {
        const s = topItems('strengths', 3);
        const w = topItems('weaknesses', 3);
        const o = topItems('opportunities', 3);
        const t = topItems('threats', 3);

        return {
          so: combineStrategies('SO', s, o),
          wo: combineStrategies('WO', w, o),
          st: combineStrategies('ST', s, t),
          wt: combineStrategies('WT', w, t)
        };
      }

      function combineStrategies(type, left, right) {
        if (!left.length || !right.length) {
          return [];
        }
        const candidates = [];
        left.forEach((a) => {
          right.forEach((b) => {
            const score = a.importance + b.importance;
            let text = '';
            if (type === 'SO') text = `${a.text} 강점을 활용해 ${b.text} 기회를 선점합니다.`;
            if (type === 'WO') text = `${b.text} 기회를 활용해 ${a.text} 약점을 개선합니다.`;
            if (type === 'ST') text = `${a.text} 강점으로 ${b.text} 위협에 선제 대응합니다.`;
            if (type === 'WT') text = `${a.text} 약점과 ${b.text} 위협을 동시에 완화하는 방어 전략을 실행합니다.`;
            candidates.push({ score, text });
          });
        });
        return candidates
          .sort((a, b) => b.score - a.score)
          .slice(0, 5);
      }

      function renderMatrix() {
        const labels = {
          so: 'SO 전략 (강점 × 기회)',
          wo: 'WO 전략 (약점 × 기회)',
          st: 'ST 전략 (강점 × 위협)',
          wt: 'WT 전략 (약점 × 위협)'
        };
        const strategy = buildStrategies();
        const grid = document.getElementById('matrixGrid');
        grid.innerHTML = Object.keys(labels)
          .map((key) => {
            const rows = strategy[key];
            const body = rows.length
              ? `<ul>${rows.map((item) => `<li><strong>우선순위 ${item.score}</strong> · ${escapeHtml(item.text)}</li>`).join('')}</ul>`
              : '<div class="empty">해당 전략을 생성하려면 양쪽 항목을 1개 이상 입력하세요.</div>';
            return `<article class="strategy"><h3>${labels[key]}</h3>${body}</article>`;
          })
          .join('');
      }

      function renderKpi() {
        document.getElementById('kpiStrengths').textContent = averageImportance('strengths').toFixed(1);
        document.getElementById('kpiWeaknesses').textContent = averageImportance('weaknesses').toFixed(1);
        document.getElementById('kpiOpportunities').textContent = averageImportance('opportunities').toFixed(1);
        document.getElementById('kpiThreats').textContent = averageImportance('threats').toFixed(1);
      }

      function setStatus(text, isError) {
        const node = document.getElementById('status');
        node.style.color = isError ? '#b91c1c' : '#047857';
        node.textContent = text;
      }

      function refresh(statusText) {
        renderBoard();
        renderKpi();
        renderMatrix();
        saveState();
        if (statusText) setStatus(statusText, false);
      }

      function addItem(type) {
        const textEl = document.getElementById(`input-${type}`);
        const importanceEl = document.getElementById(`importance-${type}`);
        const text = textEl.value.trim();
        const importance = clamp(Number(importanceEl.value) || 1, 1, 5);

        if (!text) {
          setStatus('항목 내용을 입력해 주세요.', true);
          textEl.focus();
          return;
        }

        state[type].push({ id: uid(), text, importance });
        textEl.value = '';
        importanceEl.value = '3';
        refresh('항목이 추가되었습니다.');
      }

      function removeItem(type, id) {
        state[type] = state[type].filter((item) => item.id !== id);
        refresh('항목이 삭제되었습니다.');
      }

      function loadSample() {
        state.strengths = [
          { id: uid(), text: '업계 평균 대비 높은 고객 재구매율', importance: 5 },
          { id: uid(), text: '빠른 의사결정이 가능한 소규모 팀', importance: 4 }
        ];
        state.weaknesses = [
          { id: uid(), text: '브랜드 인지도 부족', importance: 4 },
          { id: uid(), text: '데이터 분석 인력 부족', importance: 3 }
        ];
        state.opportunities = [
          { id: uid(), text: '특정 세그먼트 시장의 빠른 성장', importance: 5 },
          { id: uid(), text: '정부 지원사업 확대', importance: 3 }
        ];
        state.threats = [
          { id: uid(), text: '대형 경쟁사의 가격 인하 가능성', importance: 5 },
          { id: uid(), text: '원자재 단가 상승', importance: 3 }
        ];
        refresh('샘플 데이터가 적용되었습니다.');
      }

      function resetAll() {
        if (!confirm('입력한 SWOT 항목을 모두 삭제할까요?')) return;
        Object.keys(state).forEach((key) => { state[key] = []; });
        refresh('모든 항목이 초기화되었습니다.');
      }

      document.body.addEventListener('click', (event) => {
        const button = event.target.closest('button');
        if (!button) return;

        const action = button.dataset.action;
        const type = button.dataset.type;
        if (action === 'add' && type) {
          addItem(type);
          return;
        }
        if (action === 'remove' && type) {
          removeItem(type, button.dataset.id);
        }
      });

      document.getElementById('printBtn').addEventListener('click', () => {
        window.print();
      });

      document.getElementById('sampleBtn').addEventListener('click', loadSample);
      document.getElementById('resetBtn').addEventListener('click', resetAll);

      refresh('입력값은 브라우저에 자동 저장됩니다.');
    })();
  </script>
</body>
</html>
