<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tailwind Class Searcher - Search utility classes quickly, build your class string, and copy instantly. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>Tailwind Class Searcher</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --panel-2: #192542;
      --text: #e8ecff;
      --muted: #a6b0d6;
      --line: rgba(255,255,255,0.12);
      --brand: #7c9bff;
      --brand-2: #4dd4ff;
      --ok: #37d39a;
      --shadow: 0 16px 40px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, #20346b 0%, transparent 35%),
        radial-gradient(circle at 90% 5%, #17406b 0%, transparent 30%),
        var(--bg);
      min-height: 100vh;
      padding: 18px;
    }
    .app {
      max-width: 1080px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .header {
      padding: 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(124,155,255,.16), transparent 60%);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 3vw, 2rem);
      letter-spacing: .2px;
    }
    .sub { margin: 0; color: var(--muted); }

    .controls {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,.12);
    }
    input, select, button, textarea {
      font: inherit;
      color: inherit;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 12px 14px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(124,155,255,.18);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      min-height: 540px;
    }
    .results {
      padding: 14px;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    }
    .count {
      padding: 8px 10px;
      color: var(--muted);
      font-size: .92rem;
    }
    .list {
      display: grid;
      gap: 10px;
      max-height: 620px;
      overflow: auto;
      padding: 4px;
    }
    .item {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .token {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: rgba(124,155,255,.15);
      border: 1px solid rgba(124,155,255,.4);
      color: #d7e1ff;
      border-radius: 8px;
      padding: 3px 8px;
      font-size: .85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .desc { color: var(--muted); font-size: .92rem; line-height: 1.35; }
    .meta {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .cat {
      font-size: .78rem;
      color: #9ee8ff;
      background: rgba(77,212,255,.12);
      border: 1px solid rgba(77,212,255,.35);
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .actions { display: flex; gap: 8px; }
    .btn {
      border: 1px solid var(--line);
      background: var(--panel-2);
      padding: 6px 10px;
      border-radius: 9px;
      cursor: pointer;
      font-size: .85rem;
    }
    .btn:hover { border-color: var(--brand); transform: translateY(-1px); }
    .btn.primary {
      background: linear-gradient(135deg, rgba(124,155,255,.35), rgba(77,212,255,.25));
      border-color: rgba(124,155,255,.7);
    }

    .side {
      padding: 16px;
      background: rgba(0,0,0,.14);
      display: grid;
      align-content: start;
      gap: 12px;
    }
    .side h2 {
      margin: 6px 0 0;
      font-size: 1.02rem;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 46px;
      padding: 8px;
      border-radius: 12px;
      border: 1px dashed var(--line);
      background: rgba(255,255,255,.02);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: ui-monospace, monospace;
      background: rgba(55,211,154,.12);
      color: #b5f5de;
      border: 1px solid rgba(55,211,154,.4);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: .82rem;
    }
    .chip button {
      border: none;
      background: transparent;
      color: inherit;
      padding: 0;
      cursor: pointer;
      font-weight: 700;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: ui-monospace, monospace;
      background: #0d1428;
    }
    .helper {
      color: var(--muted);
      font-size: .85rem;
      line-height: 1.4;
    }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #0f1f32;
      border: 1px solid rgba(55,211,154,.6);
      color: #b5f5de;
      border-radius: 10px;
      padding: 8px 12px;
      opacity: 0;
      transform: translateY(12px);
      transition: .2s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
      .controls { grid-template-columns: 1fr; }
      .layout { grid-template-columns: 1fr; }
      .results { border-right: none; border-bottom: 1px solid var(--line); }
      .list { max-height: 430px; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Tailwind Class Searcher</h1>
      <p class="sub">Search utility classes quickly, build your class string, and copy instantly.</p>
    </header>

    <section class="controls">
      <input id="search" type="text" placeholder="Search classes, e.g. flex, text-xl, rounded, md:grid..." />
      <select id="category"></select>
    </section>

    <section class="layout">
      <div class="results">
        <div id="count" class="count"></div>
        <div id="list" class="list"></div>
      </div>

      <aside class="side">
        <h2>Selected Classes</h2>
        <div id="chips" class="chips"></div>
        <textarea id="output" readonly placeholder="Selected classes will appear here..."></textarea>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="copyAll" class="btn primary">Copy Class String</button>
          <button id="clear" class="btn">Clear</button>
        </div>
        <p class="helper">Tip: click <b>Add</b> to build reusable utility sets for buttons, cards, layouts, and more.</p>
      </aside>
    </section>
  </div>
  <div id="toast" class="toast">Copied!</div>

  <script>
    const CLASSES = [
      ['layout','container','Center content with max width and horizontal padding'],['layout','block','Display block'],['layout','inline-block','Display inline-block'],['layout','hidden','Hide element'],['layout','flex','Display flex'],['layout','inline-flex','Display inline flex'],['layout','grid','Display grid'],['layout','contents','Display contents'],['layout','relative','Position relative'],['layout','absolute','Position absolute'],['layout','fixed','Position fixed'],['layout','sticky','Position sticky'],
      ['flexbox','flex-row','Horizontal main axis'],['flexbox','flex-col','Vertical main axis'],['flexbox','flex-wrap','Allow wrapping'],['flexbox','items-center','Align items center'],['flexbox','items-start','Align items start'],['flexbox','justify-between','Distribute items between'],['flexbox','justify-center','Center main axis'],['flexbox','gap-2','Gap 0.5rem'],['flexbox','gap-4','Gap 1rem'],['flexbox','self-end','Align single item to end'],
      ['grid','grid-cols-2','2 equal columns'],['grid','grid-cols-3','3 equal columns'],['grid','grid-cols-12','12-column grid'],['grid','col-span-2','Span 2 columns'],['grid','col-span-6','Span 6 columns'],['grid','place-items-center','Center items both axes'],
      ['spacing','p-2','Padding 0.5rem'],['spacing','p-4','Padding 1rem'],['spacing','px-4','Horizontal padding 1rem'],['spacing','py-2','Vertical padding 0.5rem'],['spacing','m-2','Margin 0.5rem'],['spacing','mt-4','Top margin 1rem'],['spacing','mb-6','Bottom margin 1.5rem'],['spacing','space-y-2','Vertical spacing between children'],['spacing','space-x-4','Horizontal spacing between children'],
      ['sizing','w-full','Width 100%'],['sizing','w-screen','Width viewport'],['sizing','w-64','Width 16rem'],['sizing','h-full','Height 100%'],['sizing','h-screen','Height viewport'],['sizing','max-w-md','Max width medium'],['sizing','max-w-3xl','Max width 48rem'],['sizing','min-h-screen','Min height viewport'],
      ['typography','text-sm','Small text'],['typography','text-base','Base text'],['typography','text-lg','Large text'],['typography','text-xl','Extra large text'],['typography','font-medium','Medium font weight'],['typography','font-bold','Bold font weight'],['typography','leading-relaxed','Relaxed line height'],['typography','tracking-wide','Wider letter spacing'],['typography','uppercase','Uppercase text'],['typography','truncate','Single-line ellipsis'],
      ['color','text-white','Text color white'],['color','text-gray-600','Text gray 600'],['color','text-slate-900','Text slate 900'],['color','bg-white','Background white'],['color','bg-gray-100','Background gray 100'],['color','bg-slate-900','Background slate 900'],['color','bg-blue-600','Background blue 600'],['color','bg-emerald-500','Background emerald 500'],['color','border-gray-200','Border gray 200'],['color','ring-blue-500','Ring blue 500'],
      ['borders','border','1px border'],['borders','border-2','2px border'],['borders','rounded','Rounded 0.25rem'],['borders','rounded-md','Rounded medium'],['borders','rounded-xl','Rounded xl'],['borders','rounded-full','Fully rounded'],['borders','divide-y','Add vertical dividers'],
      ['effects','shadow','Small shadow'],['effects','shadow-md','Medium shadow'],['effects','shadow-xl','Extra large shadow'],['effects','opacity-50','50% opacity'],['effects','mix-blend-multiply','Blend mode multiply'],['effects','backdrop-blur','Backdrop blur'],
      ['state','hover:bg-blue-700','Hover background blue'],['state','hover:shadow-lg','Hover larger shadow'],['state','focus:outline-none','Remove focus outline'],['state','focus:ring-2','Focus ring width 2'],['state','focus:ring-offset-2','Focus ring offset'],['state','disabled:opacity-50','Dim disabled elements'],
      ['responsive','sm:block','Apply from small screens'],['responsive','md:flex','Apply from medium screens'],['responsive','md:grid-cols-2','2 columns on md+'],['responsive','lg:max-w-5xl','Wider container on lg+'],['responsive','xl:text-2xl','Larger text on xl+'],['responsive','2xl:px-8','Padding on 2xl+'],
      ['animation','transition','Enable transition'],['animation','transition-colors','Animate color changes'],['animation','duration-300','Duration 300ms'],['animation','ease-in-out','Ease in-out'],['animation','animate-spin','Spin animation'],['animation','animate-pulse','Pulse animation'],['animation','animate-bounce','Bounce animation'],
      ['misc','overflow-hidden','Hide overflow'],['misc','overflow-x-auto','Horizontal scroll if needed'],['misc','cursor-pointer','Pointer cursor'],['misc','select-none','Disable text selection'],['misc','z-10','z-index 10'],['misc','isolate','Create new stacking context']
    ].map(([cat,name,desc]) => ({cat,name,desc}));

    const searchEl = document.getElementById('search');
    const catEl = document.getElementById('category');
    const listEl = document.getElementById('list');
    const countEl = document.getElementById('count');
    const chipsEl = document.getElementById('chips');
    const outputEl = document.getElementById('output');
    const toastEl = document.getElementById('toast');

    const selected = [];

    function toast(msg='Copied!') {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 1300);
    }

    function copy(text) {
      navigator.clipboard.writeText(text).then(() => toast()).catch(() => toast('Copy failed'));
    }

    function uniqueCats() {
      const arr = [...new Set(CLASSES.map(c => c.cat))];
      return ['all', ...arr];
    }

    function buildCategory() {
      catEl.innerHTML = uniqueCats().map(c => `<option value="${c}">${c === 'all' ? 'All categories' : c}</option>`).join('');
    }

    function filtered() {
      const q = searchEl.value.trim().toLowerCase();
      const cat = catEl.value;
      return CLASSES.filter(item => {
        const catOk = cat === 'all' || item.cat === cat;
        const qOk = !q || item.name.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q) || item.cat.includes(q);
        return catOk && qOk;
      });
    }

    function renderResults() {
      const rows = filtered();
      countEl.textContent = `${rows.length} class${rows.length === 1 ? '' : 'es'} found`;
      listEl.innerHTML = rows.map(r => {
        const added = selected.includes(r.name);
        return `
          <article class="item">
            <div class="item-top">
              <span class="token">${r.name}</span>
              <div class="actions">
                <button class="btn" data-copy="${r.name}">Copy</button>
                <button class="btn ${added ? '' : 'primary'}" data-add="${r.name}">${added ? 'Added' : 'Add'}</button>
              </div>
            </div>
            <p class="desc">${r.desc}</p>
            <div class="meta"><span class="cat">${r.cat}</span></div>
          </article>
        `;
      }).join('') || `<div class="item"><p class="desc">No matches found. Try a shorter keyword.</p></div>`;
    }

    function renderSelected() {
      chipsEl.innerHTML = selected.map(name => `<span class="chip">${name}<button data-remove="${name}" title="Remove">×</button></span>`).join('');
      outputEl.value = selected.join(' ');
    }

    function addClass(name) {
      if (!selected.includes(name)) selected.push(name);
      renderSelected();
      renderResults();
    }

    listEl.addEventListener('click', (e) => {
      const copyBtn = e.target.closest('[data-copy]');
      const addBtn = e.target.closest('[data-add]');
      if (copyBtn) copy(copyBtn.dataset.copy);
      if (addBtn) addClass(addBtn.dataset.add);
    });

    chipsEl.addEventListener('click', (e) => {
      const rm = e.target.closest('[data-remove]');
      if (!rm) return;
      const idx = selected.indexOf(rm.dataset.remove);
      if (idx > -1) selected.splice(idx, 1);
      renderSelected();
      renderResults();
    });

    document.getElementById('copyAll').addEventListener('click', () => {
      if (!outputEl.value.trim()) return toast('Nothing to copy');
      copy(outputEl.value);
    });

    document.getElementById('clear').addEventListener('click', () => {
      selected.length = 0;
      renderSelected();
      renderResults();
    });

    searchEl.addEventListener('input', renderResults);
    catEl.addEventListener('change', renderResults);

    buildCategory();
    renderResults();
    renderSelected();
  </script>
</body>
</html>
