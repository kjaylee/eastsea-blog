<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CSS 색상 팔레트 | Tailwind Color Palette Browser</title>
  <meta name="description" content="Tailwind CSS 전체 색상 팔레트를 한눈에 확인하고 HEX, RGB, HSL 값을 복사하세요. Tailwind v3 & v4 색상 검색, 클립보드 복사, 다크모드 미리보기. Browse all Tailwind CSS colors with HEX/RGB/HSL copy.">
  <meta property="og:title" content="Tailwind CSS 색상 팔레트 브라우저">
  <meta property="og:description" content="Tailwind CSS v3 전체 색상을 검색하고 HEX/RGB 코드를 복사. 무료 온라인 Tailwind 컬러 피커.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eastsea.kr/tools/tailwind-color-palette/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tailwind CSS 색상 팔레트">
  <meta name="twitter:description" content="Tailwind 전체 색상 팔레트. HEX/RGB/HSL 클릭 복사, 다크모드 미리보기.">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --shadow: rgba(0,0,0,0.06);
      --card-bg: #ffffff;
      --input-bg: #ffffff;
      --accent-color: #0ea5e9;
      --toast-bg: #1e293b;
      --toast-text: #f1f5f9;
    }
    [data-theme="dark"] {
      --bg-primary: #0f0f0f;
      --bg-secondary: #111827;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #1f2937;
      --shadow: rgba(0,0,0,0.4);
      --card-bg: #1e1e1e;
      --input-bg: #2a2a2a;
      --toast-bg: #f1f5f9;
      --toast-text: #0f172a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      position: sticky; top:0; z-index:200;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .header-left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; flex:1; }
    .back-btn {
      text-decoration:none; color:var(--text-secondary);
      display:flex; align-items:center; gap:4px; font-weight:500;
      padding:6px 12px; border-radius:8px; border:1px solid var(--border); transition:all .2s;
      white-space:nowrap;
    }
    .back-btn:hover { background:var(--bg-secondary); color:var(--text-primary); }
    h1 { font-size:1.1rem; font-weight:700; white-space:nowrap; }
    .search-input {
      flex:1; min-width:160px; max-width:300px;
      padding:7px 14px; border-radius:10px; border:1px solid var(--border);
      background:var(--input-bg); color:var(--text-primary);
      font-size:.88rem; outline:none; transition:border .2s;
    }
    .search-input:focus { border-color:var(--accent-color); }
    .theme-btn {
      background:none; border:1px solid var(--border); color:var(--text-primary);
      padding:6px 12px; border-radius:8px; cursor:pointer; font-size:.85rem; transition:all .2s;
      white-space:nowrap;
    }
    .theme-btn:hover { background:var(--bg-secondary); }

    .main { max-width:1280px; margin:0 auto; padding:20px; }

    /* Format toggle */
    .format-row {
      display:flex; align-items:center; gap:8px; margin-bottom:20px; flex-wrap:wrap;
    }
    .format-row span { font-size:.85rem; color:var(--text-secondary); font-weight:500; }
    .fmt-btn {
      padding:5px 14px; border-radius:20px; font-size:.82rem; font-weight:500;
      border:1px solid var(--border); background:var(--card-bg); color:var(--text-primary);
      cursor:pointer; transition:all .2s;
    }
    .fmt-btn.active { background:var(--accent-color); color:#fff; border-color:var(--accent-color); }
    .fmt-btn:hover:not(.active) { background:var(--bg-secondary); }

    /* Color group */
    .color-group { margin-bottom:28px; }
    .group-name {
      font-size:.9rem; font-weight:700; margin-bottom:10px;
      text-transform:capitalize; display:flex; align-items:center; gap:8px;
    }
    .group-count { font-size:.75rem; color:var(--text-secondary); font-weight:400; }
    .swatches-row {
      display:flex; flex-wrap:wrap; gap:6px;
    }
    .swatch {
      position:relative; width:52px; cursor:pointer;
      transition:transform .15s;
    }
    .swatch:hover { transform:scale(1.08); z-index:10; }
    .swatch-box {
      width:52px; height:40px; border-radius:8px;
      box-shadow:0 1px 4px rgba(0,0,0,.12);
      border: 1px solid rgba(0,0,0,.06);
    }
    .swatch-label {
      text-align:center; font-size:.65rem; font-weight:600;
      color:var(--text-secondary); margin-top:3px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .swatch-tooltip {
      position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
      background:var(--toast-bg); color:var(--toast-text);
      padding:6px 10px; border-radius:8px; font-size:.75rem; white-space:nowrap;
      opacity:0; pointer-events:none; transition:opacity .15s; z-index:100;
      box-shadow:0 4px 12px rgba(0,0,0,.2);
    }
    .swatch:hover .swatch-tooltip { opacity:1; }
    .swatch-tooltip::after {
      content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
      border:5px solid transparent; border-top-color:var(--toast-bg);
    }

    /* Toast */
    #toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--toast-bg); color:var(--toast-text);
      padding:10px 20px; border-radius:10px; font-size:.88rem; font-weight:500;
      opacity:0; transition:all .3s; pointer-events:none; z-index:9999;
      box-shadow:0 4px 16px rgba(0,0,0,.25);
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* No results */
    .no-results { text-align:center; color:var(--text-secondary); padding:60px 20px; font-size:.95rem; }

    @media(max-width:500px) {
      .swatch { width:40px; }
      .swatch-box { width:40px; height:32px; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="/tools/" class="back-btn">← 홈</a>
    <h1>🎨 Tailwind 색상 팔레트</h1>
    <input type="search" class="search-input" id="searchInput" placeholder="색상 검색... (예: blue, #3b82f6)">
  </div>
  <button class="theme-btn" id="themeToggle">🌙 다크</button>
</header>

<div class="main">
  <div class="format-row">
    <span>복사 형식 / Copy format:</span>
    <button class="fmt-btn active" data-fmt="hex">HEX</button>
    <button class="fmt-btn" data-fmt="rgb">RGB</button>
    <button class="fmt-btn" data-fmt="hsl">HSL</button>
    <button class="fmt-btn" data-fmt="class">CSS Class</button>
    <button class="fmt-btn" data-fmt="var">CSS Var</button>
  </div>

  <div id="palette"></div>
  <div id="noResults" class="no-results" style="display:none">
    검색 결과가 없습니다. / No results found.
  </div>
</div>

<div id="toast"></div>
<script src="/assets/analytics.js"></script>
<script>
// ── Theme ──────────────────────────────────────────────────────────
const themeBtn = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
themeBtn.textContent = savedTheme === 'dark' ? '☀️ 라이트' : '🌙 다크';
themeBtn.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  themeBtn.textContent = next === 'dark' ? '☀️ 라이트' : '🌙 다크';
});

// ── Tailwind v3 Colors ─────────────────────────────────────────────
const COLORS = {
  slate:   {50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a',950:'#020617'},
  gray:    {50:'#f9fafb',100:'#f3f4f6',200:'#e5e7eb',300:'#d1d5db',400:'#9ca3af',500:'#6b7280',600:'#4b5563',700:'#374151',800:'#1f2937',900:'#111827',950:'#030712'},
  zinc:    {50:'#fafafa',100:'#f4f4f5',200:'#e4e4e7',300:'#d4d4d8',400:'#a1a1aa',500:'#71717a',600:'#52525b',700:'#3f3f46',800:'#27272a',900:'#18181b',950:'#09090b'},
  neutral: {50:'#fafafa',100:'#f5f5f5',200:'#e5e5e5',300:'#d4d4d4',400:'#a3a3a3',500:'#737373',600:'#525252',700:'#404040',800:'#262626',900:'#171717',950:'#0a0a0a'},
  stone:   {50:'#fafaf9',100:'#f5f5f4',200:'#e7e5e4',300:'#d6d3d1',400:'#a8a29e',500:'#78716c',600:'#57534e',700:'#44403c',800:'#292524',900:'#1c1917',950:'#0c0a09'},
  red:     {50:'#fef2f2',100:'#fee2e2',200:'#fecaca',300:'#fca5a5',400:'#f87171',500:'#ef4444',600:'#dc2626',700:'#b91c1c',800:'#991b1b',900:'#7f1d1d',950:'#450a0a'},
  orange:  {50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',500:'#f97316',600:'#ea580c',700:'#c2410c',800:'#9a3412',900:'#7c2d12',950:'#431407'},
  amber:   {50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f',950:'#451a03'},
  yellow:  {50:'#fefce8',100:'#fef9c3',200:'#fef08a',300:'#fde047',400:'#facc15',500:'#eab308',600:'#ca8a04',700:'#a16207',800:'#854d0e',900:'#713f12',950:'#422006'},
  lime:    {50:'#f7fee7',100:'#ecfccb',200:'#d9f99d',300:'#bef264',400:'#a3e635',500:'#84cc16',600:'#65a30d',700:'#4d7c0f',800:'#3f6212',900:'#365314',950:'#1a2e05'},
  green:   {50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d',950:'#052e16'},
  emerald: {50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46',900:'#064e3b',950:'#022c22'},
  teal:    {50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',300:'#5eead4',400:'#2dd4bf',500:'#14b8a6',600:'#0d9488',700:'#0f766e',800:'#115e59',900:'#134e4a',950:'#042f2e'},
  cyan:    {50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63',950:'#083344'},
  sky:     {50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e',950:'#082f49'},
  blue:    {50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a',950:'#172554'},
  indigo:  {50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b'},
  violet:  {50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9',800:'#5b21b6',900:'#4c1d95',950:'#2e1065'},
  purple:  {50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',400:'#c084fc',500:'#a855f7',600:'#9333ea',700:'#7e22ce',800:'#6b21a8',900:'#581c87',950:'#3b0764'},
  fuchsia: {50:'#fdf4ff',100:'#fae8ff',200:'#f5d0fe',300:'#f0abfc',400:'#e879f9',500:'#d946ef',600:'#c026d3',700:'#a21caf',800:'#86198f',900:'#701a75',950:'#4a044e'},
  pink:    {50:'#fdf2f8',100:'#fce7f3',200:'#fbcfe8',300:'#f9a8d4',400:'#f472b6',500:'#ec4899',600:'#db2777',700:'#be185d',800:'#9d174d',900:'#831843',950:'#500724'},
  rose:    {50:'#fff1f2',100:'#ffe4e6',200:'#fecdd3',300:'#fda4af',400:'#fb7185',500:'#f43f5e',600:'#e11d48',700:'#be123c',800:'#9f1239',900:'#881337',950:'#4c0519'},
};

// Special colors
const SPECIAL = {
  black: '#000000',
  white: '#ffffff',
  transparent: 'transparent',
  current: 'currentColor',
  inherit: 'inherit',
};

// ── Helpers ────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function hexToHsl(hex) {
  let {r,g,b} = hexToRgb(hex);
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}
    h/=6;
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function isLight(hex) {
  if (!hex || !hex.startsWith('#')) return true;
  const {r,g,b} = hexToRgb(hex);
  return (r*299+g*587+b*114)/1000 > 128;
}

let copyFormat = 'hex';

function getFormattedValue(hex, colorName, shade) {
  if (!hex || !hex.startsWith('#')) return hex;
  switch(copyFormat) {
    case 'hex':   return hex;
    case 'rgb': { const {r,g,b}=hexToRgb(hex); return `rgb(${r}, ${g}, ${b})`; }
    case 'hsl': { const {h,s,l}=hexToHsl(hex); return `hsl(${h}, ${s}%, ${l}%)`; }
    case 'class': return shade ? `${colorName}-${shade}` : colorName;
    case 'var':   return shade ? `--color-${colorName}-${shade}` : `--color-${colorName}`;
    default: return hex;
  }
}

// ── Format buttons ─────────────────────────────────────────────────
document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    copyFormat = btn.dataset.fmt;
  });
});

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── Render palette ─────────────────────────────────────────────────
function renderPalette(query='') {
  const container = document.getElementById('palette');
  const noResults = document.getElementById('noResults');
  container.innerHTML = '';
  let found = 0;

  const q = query.toLowerCase().trim();

  Object.entries(COLORS).forEach(([name, shades]) => {
    const shadeEntries = Object.entries(shades);

    // Filter: match name or hex
    const matchedShades = q
      ? shadeEntries.filter(([shade, hex]) =>
          name.includes(q) || shade.includes(q) ||
          hex.toLowerCase().includes(q) ||
          `${name}-${shade}`.includes(q))
      : shadeEntries;

    if (matchedShades.length === 0) return;
    found++;

    const group = document.createElement('div');
    group.className = 'color-group';
    group.innerHTML = `<div class="group-name">${name} <span class="group-count">${matchedShades.length} shades</span></div>`;

    const row = document.createElement('div');
    row.className = 'swatches-row';

    matchedShades.forEach(([shade, hex]) => {
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      const displayVal = getFormattedValue(hex, name, shade);
      swatch.innerHTML = `
        <div class="swatch-box" style="background:${hex}"></div>
        <div class="swatch-label">${shade}</div>
        <div class="swatch-tooltip">${name}-${shade}<br>${hex}</div>
      `;
      swatch.addEventListener('click', () => {
        const val = getFormattedValue(hex, name, shade);
        navigator.clipboard.writeText(val);
        showToast(`📋 복사됨: ${val}`);
      });
      row.appendChild(swatch);
    });

    group.appendChild(row);
    container.appendChild(group);
  });

  noResults.style.display = found === 0 ? 'block' : 'none';
}

// ── Search ─────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderPalette(e.target.value), 200);
});

renderPalette();
</script>
</body>
</html>
