<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>텔레그램 미니앱 테스터 | Telegram Mini App Tester</title>
  <meta name="description" content="텔레그램 WebApp URL을 디바이스별로 미리보기하고 viewport/터치/HTTPS/반응형 힌트를 점검하는 실전 테스터" />
  <style>
    :root{
      --bg:#060b16;
      --bg2:#0b1224;
      --card:#101a30;
      --muted:#9eb0d8;
      --text:#ebf2ff;
      --line:#243456;
      --accent:#6ea8ff;
      --ok:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --radius:16px;
      --shadow:0 16px 44px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      color:var(--text);
      background:radial-gradient(1200px 700px at 20% -20%,#1d2d56 0%,transparent 55%),
                 radial-gradient(900px 600px at 120% 10%,#1f3b66 0%,transparent 55%),
                 linear-gradient(145deg,var(--bg),var(--bg2));
      min-height:100vh;
      padding:18px;
    }
    .wrap{max-width:1200px;margin:0 auto}
    .back{color:var(--muted);text-decoration:none;font-size:.92rem}
    .back:hover{color:var(--accent)}
    h1{font-size:clamp(1.35rem,2.6vw,2rem);margin:.5rem 0 .25rem}
    .sub{color:var(--muted);margin:0 0 1rem}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:14px}
    .card{background:rgba(16,26,48,.88);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card .inner{padding:14px}
    .section-title{font-size:.93rem;font-weight:800;margin:0 0 .65rem;color:#d8e6ff}
    .field{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
    label{font-size:.82rem;color:var(--muted);font-weight:700}
    input,textarea,select,button{
      font:inherit;
      color:var(--text);
      border-radius:10px;
      border:1px solid var(--line);
      background:#0d1730;
      padding:10px 12px;
    }
    textarea{min-height:92px;resize:vertical}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(110,168,255,.18)}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .btn{cursor:pointer;font-weight:700}
    .btn.primary{background:linear-gradient(135deg,#2d63ff,#56a0ff);border-color:transparent}
    .btn.ghost{background:#0a1427}
    .device-btn{padding:8px 10px;font-size:.84rem}
    .device-btn.active{background:#1b2b51;border-color:#4b77d5;color:#b8d4ff}
    .preview-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line)}
    .preview-shell{padding:14px;display:grid;place-items:center;min-height:520px}
    .phone{
      background:#070d18;
      border:1px solid #2b3b5d;
      border-radius:28px;
      padding:10px;
      box-shadow:inset 0 0 0 1px #3e537f, 0 20px 50px rgba(0,0,0,.45);
      transition:.25s ease;
    }
    .frame{
      border-radius:20px;
      overflow:hidden;
      border:1px solid #2f446e;
      background:#091225;
    }
    iframe{display:block;border:0;background:#fff}
    .note{font-size:.78rem;color:var(--muted)}
    .checks{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}
    .check{border:1px solid var(--line);border-radius:12px;padding:10px;background:#0b1630}
    .check .k{font-size:.75rem;color:var(--muted);margin-bottom:4px}
    .state{font-weight:800;font-size:.9rem}
    .state.ok{color:var(--ok)} .state.warn{color:var(--warn)} .state.bad{color:var(--bad)}
    pre{
      margin:0;
      white-space:pre-wrap;
      background:#0a1327;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      font-size:.78rem;
      line-height:1.45;
      color:#cbe0ff;
    }
    .copy{margin-top:6px;width:100%;padding:8px;font-size:.82rem}
    .status{font-size:.8rem;color:var(--muted);min-height:1.2em}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.preview-shell{min-height:420px}}
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/tools/">← 도구 목록으로</a>
  <h1>📱 텔레그램 미니앱 테스터</h1>
  <p class="sub">URL 검증 + 디바이스 프리뷰 + BotFather 템플릿/코드 스니펫</p>

  <div class="grid">
    <section class="card"><div class="inner">
      <h2 class="section-title">1) WebApp URL</h2>
      <div class="field">
        <label for="urlInput">미니앱 URL</label>
        <input id="urlInput" placeholder="https://example.com/app" value="https://tools.eastsea.xyz" />
      </div>
      <div class="row">
        <button class="btn primary" id="loadBtn">프리뷰 로드 & 검증</button>
        <button class="btn ghost" id="resetBtn">초기화</button>
      </div>
      <p class="note" style="margin:.55rem 0 0">CORS로 원본 HTML 읽기가 막히면 프록시 fallback으로 휴리스틱 분석을 수행합니다.</p>

      <h2 class="section-title" style="margin-top:1rem">2) 디바이스 프리셋</h2>
      <div class="row" id="deviceBtns"></div>
      <p class="note" id="deviceMeta"></p>

      <h2 class="section-title" style="margin-top:1rem">3) 자동 검증 결과</h2>
      <div class="checks" id="checks"></div>
      <p class="status" id="fetchStatus"></p>

      <h2 class="section-title" style="margin-top:1rem">4) BotFather /newapp 템플릿</h2>
      <pre id="botfatherOut"></pre>
      <button class="btn copy" data-copy="botfatherOut">복사</button>

      <h2 class="section-title" style="margin-top:1rem">5) WebApp 코드 스니펫</h2>
      <pre id="snippetOut"></pre>
      <button class="btn copy" data-copy="snippetOut">복사</button>
    </div></section>

    <section class="card">
      <div class="preview-head">
        <strong>미니앱 프리뷰</strong>
        <span class="note" id="frameSizeLabel"></span>
      </div>
      <div class="preview-shell">
        <div class="phone" id="phoneShell">
          <div class="frame"><iframe id="previewFrame" title="miniapp preview"></iframe></div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
(() => {
  const devices = [
    { id:'se', name:'iPhone SE', width:375, height:667 },
    { id:'ip14', name:'iPhone 14', width:390, height:844 },
    { id:'android', name:'Android', width:412, height:915 }
  ];

  const state = { device:devices[1], html:'', normalizedUrl:'' };
  const $ = (id) => document.getElementById(id);

  function normalizeUrl(raw){
    let u = (raw || '').trim();
    if(!u) return '';
    if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
    try { return new URL(u).toString(); } catch { return ''; }
  }

  function esc(text){
    return String(text || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function setDevice(d){
    state.device = d;
    const frame = $('previewFrame');
    frame.style.width = d.width + 'px';
    frame.style.height = d.height + 'px';
    $('phoneShell').style.width = (d.width + 20) + 'px';
    $('frameSizeLabel').textContent = `${d.name} · ${d.width}×${d.height}`;
    $('deviceMeta').textContent = `${d.name} viewport: ${d.width}px × ${d.height}px`;
    [...$('deviceBtns').querySelectorAll('button')].forEach(btn => btn.classList.toggle('active', btn.dataset.id === d.id));
  }

  async function fetchHtml(url){
    const fetchers = [
      async () => {
        const r = await fetch(url, { method:'GET' });
        if(!r.ok) throw new Error('HTTP ' + r.status);
        return await r.text();
      },
      async () => {
        const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
        const r = await fetch(proxy);
        if(!r.ok) throw new Error('allorigins ' + r.status);
        return await r.text();
      },
      async () => {
        const proxy = 'https://r.jina.ai/https://' + url.replace(/^https?:\/\//, '');
        const r = await fetch(proxy);
        if(!r.ok) throw new Error('jina ' + r.status);
        return await r.text();
      }
    ];

    let lastErr = null;
    for(const fn of fetchers){
      try {
        const text = await fn();
        if(text && text.length > 50) return text;
      } catch(err){ lastErr = err; }
    }
    throw lastErr || new Error('fetch failed');
  }

  function detectViewport(html){
    const m = html.match(/<meta[^>]+name=["']viewport["'][^>]*content=["']([^"']+)["'][^>]*>/i)
      || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]*name=["']viewport["'][^>]*>/i);
    if(!m) return {state:'bad', text:'없음', detail:'viewport meta 없음'};
    const content = (m[1] || '').toLowerCase();
    const hasDevice = content.includes('width=device-width');
    const hasInitial = content.includes('initial-scale');
    if(hasDevice && hasInitial) return {state:'ok', text:'양호', detail:content};
    return {state:'warn', text:'부분 충족', detail:content};
  }

  function detectTouch(html){
    const lowered = html.toLowerCase();
    const hasTouch = /(touchstart|touchend|ontouchstart|pointerdown|pointerup)/.test(lowered);
    return hasTouch
      ? {state:'ok', text:'터치 이벤트 힌트 있음', detail:'touch/pointer 관련 코드 탐지'}
      : {state:'warn', text:'명시적 터치 코드 미탐지', detail:'모던 프레임워크는 추상화되어 감지되지 않을 수 있음'};
  }

  function detectResponsive(html){
    const lowered = html.toLowerCase();
    const mediaQuery = /@media\s*\(/.test(lowered);
    const fluidHints = /(max-width:\s*100%|width:\s*100vw|clamp\(|min\(|max\()/i.test(html);
    if(mediaQuery && fluidHints) return {state:'ok', text:'반응형 힌트 양호', detail:'@media + fluid CSS 탐지'};
    if(mediaQuery || fluidHints) return {state:'warn', text:'부분 반응형', detail:'한 가지 힌트만 탐지'};
    return {state:'bad', text:'반응형 힌트 부족', detail:'고정폭 레이아웃 가능성'};
  }

  function renderChecks(results){
    const cards = [
      ['HTTPS', results.https],
      ['Viewport Meta', results.viewport],
      ['Touch Events', results.touch],
      ['Responsive Layout', results.responsive]
    ].map(([label, item]) => `
      <div class="check">
        <div class="k">${esc(label)}</div>
        <div class="state ${item.state}">${esc(item.text)}</div>
        <div class="note">${esc(item.detail || '')}</div>
      </div>
    `).join('');
    $('checks').innerHTML = cards;
  }

  function buildBotfatherTemplate(url){
    const host = new URL(url).host;
    return [
      '/newapp',
      '@YOUR_BOT_USERNAME',
      'EastSea Mini App',
      url,
      '',
      '# 설명 템플릿',
      `Name: EastSea Mini App`,
      `Domain: ${host}`,
      'Short description: Fast mobile-first web app for Telegram users.',
      'Menu button text: Open App'
    ].join('\n');
  }

  function buildSnippet(){
    return `// Telegram WebApp ready/close snippet\n(function(){\n  const tg = window.Telegram?.WebApp;\n  if (!tg) return console.warn('Telegram WebApp SDK not detected');\n\n  tg.ready();\n  tg.expand();\n\n  document.getElementById('closeBtn')?.addEventListener('click', () => {\n    tg.close();\n  });\n})();\n\n// HTML example\n// <button id="closeBtn">Close Mini App</button>`;
  }

  async function run(){
    const normalized = normalizeUrl($('urlInput').value);
    if(!normalized){
      alert('유효한 URL을 입력해주세요.');
      return;
    }
    state.normalizedUrl = normalized;
    $('previewFrame').src = normalized;
    $('fetchStatus').textContent = 'HTML 분석 중...';

    const https = normalized.startsWith('https://')
      ? {state:'ok', text:'HTTPS 사용', detail:'Telegram Mini App 배포 조건 충족'}
      : {state:'bad', text:'HTTPS 아님', detail:'반드시 HTTPS 필요'};

    let viewport = {state:'warn', text:'확인 불가', detail:'HTML 접근 실패'};
    let touch = {state:'warn', text:'확인 불가', detail:'HTML 접근 실패'};
    let responsive = {state:'warn', text:'확인 불가', detail:'HTML 접근 실패'};

    try {
      const html = await fetchHtml(normalized);
      state.html = html;
      viewport = detectViewport(html);
      touch = detectTouch(html);
      responsive = detectResponsive(html);
      $('fetchStatus').textContent = `분석 완료 · 소스 길이 ${html.length.toLocaleString()} chars`;
    } catch(err){
      $('fetchStatus').textContent = '직접 분석 실패(CORS/보안). HTTPS 검증과 프리뷰는 계속 사용 가능합니다.';
    }

    renderChecks({ https, viewport, touch, responsive });
    $('botfatherOut').textContent = buildBotfatherTemplate(normalized);
    $('snippetOut').textContent = buildSnippet();
  }

  function wire(){
    $('deviceBtns').innerHTML = devices.map(d => `<button class="btn device-btn ${d.id===state.device.id?'active':''}" data-id="${d.id}">${d.name}</button>`).join('');
    $('deviceBtns').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-id]');
      if(!btn) return;
      const d = devices.find(x => x.id === btn.dataset.id);
      if(d) setDevice(d);
    });

    $('loadBtn').addEventListener('click', run);
    $('resetBtn').addEventListener('click', () => {
      $('urlInput').value = 'https://tools.eastsea.xyz';
      $('previewFrame').src = 'about:blank';
      $('checks').innerHTML = '';
      $('fetchStatus').textContent = '';
      $('botfatherOut').textContent = '';
      $('snippetOut').textContent = '';
    });

    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-copy]');
      if(!btn) return;
      const target = $(btn.dataset.copy);
      if(!target?.textContent.trim()) return;
      try {
        await navigator.clipboard.writeText(target.textContent);
        const old = btn.textContent;
        btn.textContent = '복사됨 ✓';
        setTimeout(() => btn.textContent = old, 1100);
      } catch {
        alert('클립보드 복사 권한이 필요합니다.');
      }
    });
  }

  setDevice(state.device);
  wire();
  $('snippetOut').textContent = buildSnippet();
})();
</script>
</body>
</html>
