<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>텍스트 클린업 스튜디오 | 미스김 툴즈</title>
  <meta name="description" content="불필요한 공백/빈 줄/중복 줄을 정리하고 찾기·바꾸기를 수행하는 한국어 텍스트 처리 도구" />
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #11142b;
      --panel-soft: #171a36;
      --text: #ecf1ff;
      --muted: #9aa5d1;
      --neon: #00f5ff;
      --neon-2: #ff2bd6;
      --ok: #3cffb3;
      --warn: #ffd166;
      --border: rgba(0, 245, 255, 0.28);
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(0, 245, 255, 0.08) inset;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 800px at 10% -10%, rgba(0, 245, 255, 0.18), transparent 55%),
        radial-gradient(1000px 700px at 100% 0%, rgba(255, 43, 214, 0.16), transparent 45%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1120px, 92vw);
      margin: 28px auto 36px;
    }

    .hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.35rem, 2.4vw, 2rem);
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--neon), var(--neon-2));
      box-shadow: 0 0 18px var(--neon);
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .chip {
      color: #061018;
      background: linear-gradient(135deg, var(--neon), #7af9ff);
      border: 0;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)), var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 16px;
      margin-bottom: 14px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }

    .group {
      grid-column: span 6;
      background: var(--panel-soft);
      border: 1px solid rgba(154, 165, 209, 0.2);
      border-radius: 12px;
      padding: 12px;
    }

    .group h3 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      color: #d8e2ff;
    }

    .option-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    label.checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.35;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 8px 10px;
    }

    input[type="checkbox"] {
      accent-color: var(--neon);
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .inline-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .input,
    textarea {
      width: 100%;
      border: 1px solid rgba(154,165,209,0.35);
      background: #0f1228;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .input:focus,
    textarea:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0,245,255,0.17);
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .pane {
      padding: 12px;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pane-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pane-title {
      margin: 0;
      font-size: 1rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.8rem;
    }

    textarea {
      flex: 1;
      resize: vertical;
      min-height: 260px;
      line-height: 1.5;
      font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.87rem;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 1px solid rgba(0,245,255,0.35);
      background: linear-gradient(180deg, rgba(0,245,255,0.15), rgba(0,245,255,0.07));
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.86rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .18s ease, border-color .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--neon);
      box-shadow: 0 0 18px rgba(0,245,255,0.2);
    }

    button.secondary {
      background: linear-gradient(180deg, rgba(255,43,214,0.15), rgba(255,43,214,0.08));
      border-color: rgba(255,43,214,0.4);
    }

    button.ghost {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.18);
    }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(60,255,179,0.1);
      border: 1px solid rgba(60,255,179,0.35);
      color: #c9ffec;
      font-size: 0.86rem;
      min-height: 20px;
    }

    .status.warn {
      background: rgba(255,209,102,0.1);
      border-color: rgba(255,209,102,0.45);
      color: #ffeec2;
    }

    .footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: right;
    }

    @media (max-width: 920px) {
      .controls { grid-template-columns: 1fr; }
      .group { grid-column: span 1; }
      .workspace { grid-template-columns: 1fr; }
      .option-list { grid-template-columns: 1fr; }
      .hero { align-items: flex-start; flex-direction: column; }
      .chip { align-self: flex-start; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <div>
        <h1 class="title"><span class="dot" aria-hidden="true"></span>텍스트 클린업 스튜디오</h1>
        <p class="subtitle">공백/빈 줄/중복 줄 정리 + 찾기·바꾸기를 한 번에 처리하는 텍스트 정리 도구입니다.</p>
      </div>
      <div class="chip">카테고리 · 텍스트 처리</div>
    </section>

    <section class="controls card">
      <div class="group">
        <h3>1) 클린업 옵션</h3>
        <div class="option-list">
          <label class="checkbox"><input type="checkbox" id="trimLines" checked>각 줄 앞뒤 공백 제거</label>
          <label class="checkbox"><input type="checkbox" id="collapseSpaces">연속 공백 1칸으로 축소</label>
          <label class="checkbox"><input type="checkbox" id="normalizeBlank" checked>빈 줄 1개로 압축</label>
          <label class="checkbox"><input type="checkbox" id="dedupeLines">완전히 같은 줄 중복 제거</label>
          <label class="checkbox"><input type="checkbox" id="removeEmptyHeadTail" checked>맨 앞/뒤 빈 줄 제거</label>
          <label class="checkbox"><input type="checkbox" id="convertTabs">탭을 공백 2칸으로 변환</label>
        </div>
      </div>

      <div class="group">
        <h3>2) 찾기·바꾸기</h3>
        <div class="inline-row">
          <input id="findText" class="input" type="text" placeholder="찾을 텍스트" />
          <input id="replaceText" class="input" type="text" placeholder="바꿀 텍스트" />
        </div>
        <div class="option-list" style="margin-top:8px; grid-template-columns: 1fr 1fr;">
          <label class="checkbox"><input type="checkbox" id="useRegex">정규식 사용</label>
          <label class="checkbox"><input type="checkbox" id="caseSensitive">대소문자 구분</label>
        </div>
        <p class="hint">정규식 모드에서 패턴 오류가 있으면 안전하게 건너뜁니다.</p>
      </div>
    </section>

    <section class="workspace">
      <article class="pane card">
        <div class="pane-head">
          <h2 class="pane-title">입력 텍스트</h2>
          <span class="meta" id="inputMeta">0자 · 0줄</span>
        </div>
        <textarea id="inputText" placeholder="정리할 텍스트를 붙여넣으세요."></textarea>
        <div class="buttons">
          <button id="runBtn">클린업 실행</button>
          <button id="replaceBtn" class="secondary">찾기·바꾸기 적용</button>
          <button id="clearBtn" class="ghost">입력 비우기</button>
        </div>
      </article>

      <article class="pane card">
        <div class="pane-head">
          <h2 class="pane-title">결과 텍스트</h2>
          <span class="meta" id="outputMeta">0자 · 0줄</span>
        </div>
        <textarea id="outputText" readonly placeholder="결과가 여기에 표시됩니다."></textarea>
        <div class="buttons">
          <button id="copyBtn">결과 복사</button>
          <button id="swapBtn" class="secondary">결과를 입력으로</button>
          <button id="downloadBtn" class="ghost">TXT 저장</button>
        </div>
      </article>
    </section>

    <div class="status" id="status">준비 완료. 텍스트를 입력해 주세요.</div>
    <div class="footer">상태는 브라우저에 자동 저장됩니다 (localStorage).</div>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'mk_text_cleanup_studio_v1';

      const els = {
        inputText: document.getElementById('inputText'),
        outputText: document.getElementById('outputText'),
        trimLines: document.getElementById('trimLines'),
        collapseSpaces: document.getElementById('collapseSpaces'),
        normalizeBlank: document.getElementById('normalizeBlank'),
        dedupeLines: document.getElementById('dedupeLines'),
        removeEmptyHeadTail: document.getElementById('removeEmptyHeadTail'),
        convertTabs: document.getElementById('convertTabs'),
        findText: document.getElementById('findText'),
        replaceText: document.getElementById('replaceText'),
        useRegex: document.getElementById('useRegex'),
        caseSensitive: document.getElementById('caseSensitive'),
        runBtn: document.getElementById('runBtn'),
        replaceBtn: document.getElementById('replaceBtn'),
        clearBtn: document.getElementById('clearBtn'),
        copyBtn: document.getElementById('copyBtn'),
        swapBtn: document.getElementById('swapBtn'),
        downloadBtn: document.getElementById('downloadBtn'),
        inputMeta: document.getElementById('inputMeta'),
        outputMeta: document.getElementById('outputMeta'),
        status: document.getElementById('status')
      };

      function getState() {
        return {
          inputText: els.inputText.value,
          outputText: els.outputText.value,
          trimLines: els.trimLines.checked,
          collapseSpaces: els.collapseSpaces.checked,
          normalizeBlank: els.normalizeBlank.checked,
          dedupeLines: els.dedupeLines.checked,
          removeEmptyHeadTail: els.removeEmptyHeadTail.checked,
          convertTabs: els.convertTabs.checked,
          findText: els.findText.value,
          replaceText: els.replaceText.value,
          useRegex: els.useRegex.checked,
          caseSensitive: els.caseSensitive.checked
        };
      }

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(getState()));
        } catch (err) {
          setStatus('저장 공간이 부족해 상태 저장에 실패했습니다.', true);
        }
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const state = JSON.parse(raw);
          Object.keys(state).forEach((key) => {
            if (!Object.prototype.hasOwnProperty.call(els, key)) return;
            if (typeof els[key].checked === 'boolean') {
              els[key].checked = Boolean(state[key]);
            } else {
              els[key].value = state[key] ?? '';
            }
          });
        } catch (_) {
          // ignore parse errors
        }
      }

      function countMeta(text) {
        if (!text) return { chars: 0, lines: 0 };
        return {
          chars: text.length,
          lines: text.split('\n').length
        };
      }

      function updateMeta() {
        const inMeta = countMeta(els.inputText.value);
        const outMeta = countMeta(els.outputText.value);
        els.inputMeta.textContent = `${inMeta.chars.toLocaleString()}자 · ${inMeta.lines.toLocaleString()}줄`;
        els.outputMeta.textContent = `${outMeta.chars.toLocaleString()}자 · ${outMeta.lines.toLocaleString()}줄`;
      }

      function setStatus(message, warn = false) {
        els.status.textContent = message;
        els.status.classList.toggle('warn', warn);
      }

      function cleanText(input) {
        let text = input.replace(/\r\n?/g, '\n');

        if (els.convertTabs.checked) {
          text = text.replace(/\t/g, '  ');
        }

        let lines = text.split('\n');

        if (els.trimLines.checked) {
          lines = lines.map((line) => line.trim());
        }

        if (els.collapseSpaces.checked) {
          lines = lines.map((line) => line.replace(/[ \u00A0]{2,}/g, ' '));
        }

        if (els.dedupeLines.checked) {
          const seen = new Set();
          lines = lines.filter((line) => {
            if (seen.has(line)) return false;
            seen.add(line);
            return true;
          });
        }

        text = lines.join('\n');

        if (els.normalizeBlank.checked) {
          text = text.replace(/\n{3,}/g, '\n\n');
        }

        if (els.removeEmptyHeadTail.checked) {
          text = text.replace(/^\n+|\n+$/g, '');
        }

        return text;
      }

      function applyFindReplace(text) {
        const find = els.findText.value;
        const rep = els.replaceText.value;
        if (!find) return { text, replaced: 0, skipped: true };

        if (els.useRegex.checked) {
          try {
            const flags = `g${els.caseSensitive.checked ? '' : 'i'}`;
            const regex = new RegExp(find, flags);
            let replaced = 0;
            const next = text.replace(regex, () => {
              replaced += 1;
              return rep;
            });
            return { text: next, replaced, skipped: false };
          } catch (_) {
            return { text, replaced: 0, skipped: true, error: '정규식 패턴이 올바르지 않습니다.' };
          }
        }

        const source = els.caseSensitive.checked ? text : text.toLowerCase();
        const needle = els.caseSensitive.checked ? find : find.toLowerCase();
        if (!needle) return { text, replaced: 0, skipped: true };

        let cursor = 0;
        let replaced = 0;
        let out = '';

        while (true) {
          const idx = source.indexOf(needle, cursor);
          if (idx === -1) {
            out += text.slice(cursor);
            break;
          }
          out += text.slice(cursor, idx) + rep;
          cursor = idx + find.length;
          replaced += 1;
        }

        return { text: out, replaced, skipped: false };
      }

      function runCleanup() {
        const input = els.inputText.value;
        const cleaned = cleanText(input);
        els.outputText.value = cleaned;
        const before = countMeta(input).chars;
        const after = countMeta(cleaned).chars;
        const diff = before - after;
        setStatus(`클린업 완료: ${before.toLocaleString()}자 → ${after.toLocaleString()}자 (${diff >= 0 ? '-' : '+'}${Math.abs(diff).toLocaleString()}자)`);
        updateMeta();
        saveState();
      }

      function runReplace() {
        const base = els.outputText.value || els.inputText.value;
        const result = applyFindReplace(base);
        els.outputText.value = result.text;
        updateMeta();
        saveState();

        if (result.error) {
          setStatus(result.error, true);
          return;
        }
        if (result.skipped) {
          setStatus('찾을 텍스트가 없어 바꾸기를 건너뛰었습니다.', true);
          return;
        }
        setStatus(`찾기·바꾸기 완료: ${result.replaced.toLocaleString()}건 변경`);
      }

      async function copyOutput() {
        const text = els.outputText.value;
        if (!text) {
          setStatus('복사할 결과가 없습니다.', true);
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          setStatus('결과 텍스트를 클립보드에 복사했습니다.');
        } catch (_) {
          setStatus('클립보드 접근이 차단되어 복사에 실패했습니다.', true);
        }
      }

      function moveOutputToInput() {
        if (!els.outputText.value) {
          setStatus('결과 텍스트가 비어 있습니다.', true);
          return;
        }
        els.inputText.value = els.outputText.value;
        setStatus('결과를 입력 영역으로 이동했습니다.');
        updateMeta();
        saveState();
      }

      function clearInput() {
        els.inputText.value = '';
        els.outputText.value = '';
        updateMeta();
        saveState();
        setStatus('입력/결과 텍스트를 초기화했습니다.');
      }

      function downloadTxt() {
        const text = els.outputText.value;
        if (!text) {
          setStatus('저장할 결과가 없습니다.', true);
          return;
        }
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
        a.href = url;
        a.download = `cleaned-text-${stamp}.txt`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        setStatus('TXT 파일로 저장했습니다.');
      }

      function bind() {
        els.runBtn.addEventListener('click', runCleanup);
        els.replaceBtn.addEventListener('click', runReplace);
        els.copyBtn.addEventListener('click', copyOutput);
        els.swapBtn.addEventListener('click', moveOutputToInput);
        els.clearBtn.addEventListener('click', clearInput);
        els.downloadBtn.addEventListener('click', downloadTxt);

        const autos = [
          'inputText', 'outputText', 'trimLines', 'collapseSpaces', 'normalizeBlank',
          'dedupeLines', 'removeEmptyHeadTail', 'convertTabs',
          'findText', 'replaceText', 'useRegex', 'caseSensitive'
        ];

        autos.forEach((key) => {
          const eventName = (els[key].tagName === 'TEXTAREA' || els[key].tagName === 'INPUT' && els[key].type === 'text') ? 'input' : 'change';
          els[key].addEventListener(eventName, () => {
            updateMeta();
            saveState();
          });
        });
      }

      loadState();
      bind();
      updateMeta();
    })();
  </script>
</body>
</html>
