<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고급 텍스트 통계 분석기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        body.dark .container {
            background: #2d2d44;
            color: #e0e0e0;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        body.dark h1 {
            color: #818cf8;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        body.dark .subtitle {
            color: #999;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }

        .theme-toggle {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        body.dark .theme-toggle {
            background: #818cf8;
        }

        textarea {
            width: 100%;
            min-height: 250px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            line-height: 1.6;
            resize: vertical;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        body.dark textarea {
            background: #1a1a2e;
            color: #e0e0e0;
            border-color: #444;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body.dark .stat-card {
            background: #1a1a2e;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        body.dark .stat-value {
            color: #818cf8;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            font-weight: 500;
        }

        body.dark .stat-label {
            color: #999;
        }

        .advanced-stats {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        body.dark .advanced-stats {
            background: #1a1a2e;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 20px;
        }

        body.dark .section-title {
            color: #818cf8;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        body.dark .stat-row {
            border-bottom-color: #444;
        }

        .stat-row-label {
            font-weight: 500;
            color: #333;
        }

        body.dark .stat-row-label {
            color: #e0e0e0;
        }

        .stat-row-value {
            font-family: monospace;
            color: #667eea;
            font-weight: 600;
        }

        body.dark .stat-row-value {
            color: #818cf8;
        }

        .reading-level {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .level-easy {
            background: #d1fae5;
            color: #065f46;
        }

        .level-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .level-hard {
            background: #fee2e2;
            color: #991b1b;
        }

        body.dark .level-easy {
            background: #064e3b;
            color: #6ee7b7;
        }

        body.dark .level-medium {
            background: #78350f;
            color: #fcd34d;
        }

        body.dark .level-hard {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        body.dark button {
            background: #818cf8;
        }

        body.dark button:hover {
            background: #6366f1;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .controls {
                flex-direction: column;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1>📊 고급 텍스트 통계 분석기</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 다크모드</button>
        </div>
        <p class="subtitle">문단, 문장, 단어, 음절 수와 가독성 지수를 자동으로 분석합니다</p>

        <textarea id="textInput" placeholder="분석할 텍스트를 입력하세요...&#10;&#10;여러 문단과 문장을 입력하면 자동으로 통계를 계산합니다."></textarea>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="paragraphCount">0</div>
                <div class="stat-label">문단</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sentenceCount">0</div>
                <div class="stat-label">문장</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="wordCount">0</div>
                <div class="stat-label">단어</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="charCount">0</div>
                <div class="stat-label">글자</div>
            </div>
        </div>

        <div class="advanced-stats">
            <div class="section-title">📈 상세 분석</div>
            <div class="stat-row">
                <span class="stat-row-label">공백 제외 글자 수</span>
                <span class="stat-row-value" id="charNoSpaces">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-row-label">음절 수 (추정)</span>
                <span class="stat-row-value" id="syllableCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-row-label">평균 단어 길이</span>
                <span class="stat-row-value" id="avgWordLength">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-row-label">평균 문장 길이</span>
                <span class="stat-row-value" id="avgSentenceLength">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-row-label">읽기 시간 (분)</span>
                <span class="stat-row-value" id="readingTime">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-row-label">가독성 레벨</span>
                <span class="stat-row-value" id="readabilityLevel">-</span>
            </div>
        </div>

        <div class="button-group">
            <button onclick="loadSample()">📝 샘플 텍스트</button>
            <button onclick="clearText()">🗑️ 초기화</button>
            <button onclick="exportStats()">💾 통계 내보내기</button>
        </div>
    </div>

    <script>
        function init() {
            const textArea = document.getElementById('textInput');
            textArea.addEventListener('input', analyzeText);
            analyzeText();
        }

        function analyzeText() {
            const text = document.getElementById('textInput').value;

            if (!text.trim()) {
                resetStats();
                return;
            }

            // 문단 수
            const paragraphs = text.split(/\n\n+/).filter(p => p.trim().length > 0);
            const paragraphCount = paragraphs.length;

            // 문장 수
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
            const sentenceCount = sentences.length;

            // 단어 수
            const words = text.match(/[\w\u3131-\uD79D]+/g) || [];
            const wordCount = words.length;

            // 글자 수
            const charCount = text.length;
            const charNoSpaces = text.replace(/\s/g, '').length;

            // 음절 수 추정
            const syllableCount = estimateSyllables(text);

            // 평균 단어 길이
            const avgWordLength = wordCount > 0 ? (charNoSpaces / wordCount).toFixed(1) : 0;

            // 평균 문장 길이
            const avgSentenceLength = sentenceCount > 0 ? (wordCount / sentenceCount).toFixed(1) : 0;

            // 읽기 시간 (분) - 평균 읽기 속도 200 단어/분
            const readingTime = (wordCount / 200).toFixed(1);

            // 가독성 레벨 (Flesch Reading Ease 변형)
            const readability = calculateReadability(sentenceCount, wordCount, syllableCount);

            // UI 업데이트
            document.getElementById('paragraphCount').textContent = paragraphCount.toLocaleString();
            document.getElementById('sentenceCount').textContent = sentenceCount.toLocaleString();
            document.getElementById('wordCount').textContent = wordCount.toLocaleString();
            document.getElementById('charCount').textContent = charCount.toLocaleString();
            document.getElementById('charNoSpaces').textContent = charNoSpaces.toLocaleString();
            document.getElementById('syllableCount').textContent = syllableCount.toLocaleString();
            document.getElementById('avgWordLength').textContent = avgWordLength;
            document.getElementById('avgSentenceLength').textContent = avgSentenceLength;
            document.getElementById('readingTime').textContent = readingTime;

            updateReadabilityLevel(readability);
        }

        function estimateSyllables(text) {
            // 간단한 음절 추정 (영어 기준)
            const words = text.match(/[\w]+/g) || [];
            let syllables = 0;

            words.forEach(word => {
                word = word.toLowerCase();
                if (word.length <= 3) {
                    syllables += 1;
                } else {
                    const vowelGroups = word.match(/[aeiouy]+/g);
                    if (vowelGroups) {
                        syllables += vowelGroups.length;
                        // 끝의 묵음 'e' 처리
                        if (word.endsWith('e')) syllables -= 1;
                    }
                    if (syllables === 0) syllables = 1;
                }
            });

            return syllables;
        }

        function calculateReadability(sentences, words, syllables) {
            if (sentences === 0 || words === 0) return 0;

            // Flesch Reading Ease formula
            const score = 206.835 - 1.015 * (words / sentences) - 84.6 * (syllables / words);
            return Math.max(0, Math.min(100, score));
        }

        function updateReadabilityLevel(score) {
            let level, className;

            if (score >= 60) {
                level = '쉬움 (읽기 쉬운 텍스트)';
                className = 'level-easy';
            } else if (score >= 30) {
                level = '보통 (일반적인 텍스트)';
                className = 'level-medium';
            } else {
                level = '어려움 (복잡한 텍스트)';
                className = 'level-hard';
            }

            const html = `<span class="reading-level ${className}">${level} (${Math.round(score)}점)</span>`;
            document.getElementById('readabilityLevel').innerHTML = html;
        }

        function resetStats() {
            document.getElementById('paragraphCount').textContent = '0';
            document.getElementById('sentenceCount').textContent = '0';
            document.getElementById('wordCount').textContent = '0';
            document.getElementById('charCount').textContent = '0';
            document.getElementById('charNoSpaces').textContent = '0';
            document.getElementById('syllableCount').textContent = '0';
            document.getElementById('avgWordLength').textContent = '0';
            document.getElementById('avgSentenceLength').textContent = '0';
            document.getElementById('readingTime').textContent = '0';
            document.getElementById('readabilityLevel').textContent = '-';
        }

        function loadSample() {
            const sample = `인공지능은 현대 사회에서 점점 더 중요한 역할을 하고 있습니다. 기계학습과 딥러닝 기술의 발전으로 AI는 다양한 분야에서 활용되고 있습니다.

의료 분야에서는 질병 진단과 신약 개발에 AI가 사용됩니다. 자율주행 자동차는 교통 안전을 향상시킬 것으로 기대됩니다. 금융 서비스에서는 사기 탐지와 투자 분석에 AI가 활용됩니다.

그러나 AI 기술의 발전과 함께 윤리적 문제도 제기되고 있습니다. 개인정보 보호, 알고리즘 편향성, 일자리 대체 등의 문제를 해결해야 합니다. 우리는 AI의 혜택을 누리면서도 책임감 있게 사용해야 합니다.`;

            document.getElementById('textInput').value = sample;
            analyzeText();
        }

        function clearText() {
            document.getElementById('textInput').value = '';
            analyzeText();
        }

        function exportStats() {
            const stats = {
                paragraphs: document.getElementById('paragraphCount').textContent,
                sentences: document.getElementById('sentenceCount').textContent,
                words: document.getElementById('wordCount').textContent,
                characters: document.getElementById('charCount').textContent,
                charactersNoSpaces: document.getElementById('charNoSpaces').textContent,
                syllables: document.getElementById('syllableCount').textContent,
                avgWordLength: document.getElementById('avgWordLength').textContent,
                avgSentenceLength: document.getElementById('avgSentenceLength').textContent,
                readingTime: document.getElementById('readingTime').textContent,
                readabilityLevel: document.getElementById('readabilityLevel').textContent
            };

            const json = JSON.stringify(stats, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `text-stats-${Date.now()}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('dark') ? '☀️ 라이트모드' : '🌙 다크모드';
        }

        init();
    </script>
</body>
</html>
