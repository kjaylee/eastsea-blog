<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타일·바닥재 소요량 계산기 | 웹 도구 모음</title>
    <meta name="description" content="방 크기와 타일 사이즈를 입력하면 필요한 타일 수량, 줄눈 길이, 예상 비용을 계산합니다.">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-solid: #667eea;
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
            --input-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #121212;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #444;
            --shadow: rgba(0, 0, 0, 0.3);
            --card-bg: #2d2d2d;
            --input-bg: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn { text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .back-btn:hover { color: var(--text-primary); }
        .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.5rem; }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        h2 { font-size: 1.1rem; margin-bottom: 15px; color: var(--text-secondary); }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; color: var(--text-secondary); }
        input[type="number"], select {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent-solid); }
        .row { display: flex; gap: 12px; }
        .row .input-group { flex: 1; }
        .preset-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .preset-btn {
            padding: 8px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .preset-btn.active, .preset-btn:hover {
            border-color: var(--accent-solid);
            background: var(--accent-solid);
            color: #fff;
        }
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3); }
        .result { display: none; }
        .result.show { display: block; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .result-item { text-align: center; padding: 18px 12px; background: var(--bg-secondary); border-radius: 14px; }
        .result-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; }
        .result-value { font-size: 1.4rem; font-weight: 800; }
        .result-value.highlight { color: var(--accent-solid); }
        .cost-summary {
            background: var(--bg-secondary);
            border-radius: 14px;
            padding: 20px;
            margin-top: 15px;
        }
        .cost-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .cost-row:last-child { border-bottom: none; font-weight: 700; font-size: 1.1rem; }
        .visual {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 14px;
        }
        .visual canvas { width: 100%; border-radius: 10px; }
        .tip {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 15px;
            line-height: 1.7;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 12px;
        }
        @media (max-width: 480px) {
            .result-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.4rem; }
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-btn">← 도구 목록</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </header>

        <div class="card">
            <h1>🪨 타일·바닥재 소요량 계산기</h1>

            <h2>📐 방 크기</h2>
            <div class="row">
                <div class="input-group">
                    <label>가로 (m)</label>
                    <input type="number" id="roomW" placeholder="3.6" min="0.1" max="100" step="0.1" value="3.6">
                </div>
                <div class="input-group">
                    <label>세로 (m)</label>
                    <input type="number" id="roomH" placeholder="4.2" min="0.1" max="100" step="0.1" value="4.2">
                </div>
            </div>

            <h2>🧱 타일 사이즈</h2>
            <label>프리셋 선택</label>
            <div class="preset-group">
                <button class="preset-btn" onclick="setTile(200,200,this)">200×200</button>
                <button class="preset-btn" onclick="setTile(300,300,this)">300×300</button>
                <button class="preset-btn active" onclick="setTile(600,600,this)">600×600</button>
                <button class="preset-btn" onclick="setTile(800,800,this)">800×800</button>
                <button class="preset-btn" onclick="setTile(300,600,this)">300×600</button>
                <button class="preset-btn" onclick="setTile(600,1200,this)">600×1200</button>
            </div>
            <div class="row">
                <div class="input-group">
                    <label>타일 가로 (mm)</label>
                    <input type="number" id="tileW" value="600" min="10" max="3000">
                </div>
                <div class="input-group">
                    <label>타일 세로 (mm)</label>
                    <input type="number" id="tileH" value="600" min="10" max="3000">
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>줄눈 폭 (mm)</label>
                    <input type="number" id="groutWidth" value="3" min="0" max="20" step="0.5">
                </div>
                <div class="input-group">
                    <label>여유분 (%)</label>
                    <input type="number" id="waste" value="10" min="0" max="50">
                </div>
            </div>

            <h2>💰 비용 (선택사항)</h2>
            <div class="row">
                <div class="input-group">
                    <label>타일 단가 (원/장)</label>
                    <input type="number" id="tilePrice" placeholder="3000" min="0">
                </div>
                <div class="input-group">
                    <label>시공비 (원/㎡)</label>
                    <input type="number" id="laborPrice" placeholder="25000" min="0">
                </div>
            </div>

            <button class="calc-btn" onclick="calculate()">계산하기</button>
        </div>

        <div class="card result" id="result">
            <h2>📊 계산 결과</h2>
            <div class="result-grid">
                <div class="result-item">
                    <div class="result-label">방 면적</div>
                    <div class="result-value" id="roomArea">-</div>
                </div>
                <div class="result-item">
                    <div class="result-label">타일 1장 면적</div>
                    <div class="result-value" id="tileArea">-</div>
                </div>
                <div class="result-item">
                    <div class="result-label">필요 수량 (여유분 포함)</div>
                    <div class="result-value highlight" id="tileCount">-</div>
                </div>
                <div class="result-item">
                    <div class="result-label">박스 수 (6장/박스 기준)</div>
                    <div class="result-value" id="boxCount">-</div>
                </div>
                <div class="result-item">
                    <div class="result-label">가로 배열</div>
                    <div class="result-value" id="colCount">-</div>
                </div>
                <div class="result-item">
                    <div class="result-label">세로 배열</div>
                    <div class="result-value" id="rowCount">-</div>
                </div>
            </div>

            <div class="cost-summary" id="costSummary" style="display:none;">
                <h2>💰 예상 비용</h2>
                <div class="cost-row">
                    <span>타일 비용</span>
                    <span id="tileCost">-</span>
                </div>
                <div class="cost-row">
                    <span>시공 비용</span>
                    <span id="laborCost">-</span>
                </div>
                <div class="cost-row">
                    <span>총 예상 비용</span>
                    <span id="totalCost">-</span>
                </div>
            </div>

            <div class="visual">
                <h2>🗺️ 배치 미리보기</h2>
                <canvas id="layoutCanvas" height="300"></canvas>
            </div>

            <div class="tip">
                💡 <strong>시공 팁:</strong> 대형 타일(600×600 이상)은 접착제 시공 권장. 줄눈 폭 2~3mm가 일반적. 대각선 시공 시 여유분 15% 이상 권장. 박스 단위 구매가 경제적입니다.
            </div>
        </div>
    </div>

    <script>
        function setTile(w, h, btn) {
            document.getElementById('tileW').value = w;
            document.getElementById('tileH').value = h;
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function calculate() {
            const roomW = parseFloat(document.getElementById('roomW').value) || 0;
            const roomH = parseFloat(document.getElementById('roomH').value) || 0;
            const tileW = parseFloat(document.getElementById('tileW').value) || 600;
            const tileH = parseFloat(document.getElementById('tileH').value) || 600;
            const grout = parseFloat(document.getElementById('groutWidth').value) || 0;
            const waste = parseFloat(document.getElementById('waste').value) || 0;
            const tilePrice = parseFloat(document.getElementById('tilePrice').value) || 0;
            const laborPrice = parseFloat(document.getElementById('laborPrice').value) || 0;

            const roomAreaM2 = roomW * roomH;
            const tileMW = (tileW + grout) / 1000;
            const tileMH = (tileH + grout) / 1000;
            const tileAreaM2 = (tileW / 1000) * (tileH / 1000);

            const cols = Math.ceil(roomW / tileMW);
            const rows = Math.ceil(roomH / tileMH);
            const exactCount = cols * rows;
            const withWaste = Math.ceil(exactCount * (1 + waste / 100));
            const boxes = Math.ceil(withWaste / 6);

            document.getElementById('roomArea').textContent = roomAreaM2.toFixed(2) + ' ㎡';
            document.getElementById('tileArea').textContent = (tileAreaM2 * 10000).toFixed(0) + ' ㎠';
            document.getElementById('tileCount').textContent = withWaste + '장';
            document.getElementById('boxCount').textContent = boxes + '박스';
            document.getElementById('colCount').textContent = cols + '장';
            document.getElementById('rowCount').textContent = rows + '장';

            // Cost
            const costSection = document.getElementById('costSummary');
            if (tilePrice > 0 || laborPrice > 0) {
                const tc = withWaste * tilePrice;
                const lc = roomAreaM2 * laborPrice;
                document.getElementById('tileCost').textContent = tc.toLocaleString() + '원';
                document.getElementById('laborCost').textContent = lc.toLocaleString() + '원';
                document.getElementById('totalCost').textContent = (tc + lc).toLocaleString() + '원';
                costSection.style.display = 'block';
            } else {
                costSection.style.display = 'none';
            }

            // Draw layout
            drawLayout(roomW, roomH, tileW / 1000, tileH / 1000, cols, rows, grout / 1000);

            document.getElementById('result').classList.add('show');
        }

        function drawLayout(rw, rh, tw, th, cols, rows, g) {
            const canvas = document.getElementById('layoutCanvas');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const displayW = canvas.clientWidth;
            const scale = displayW / rw;
            const displayH = Math.min(300, rh * scale);
            canvas.width = displayW * dpr;
            canvas.height = displayH * dpr;
            canvas.style.height = displayH + 'px';
            ctx.scale(dpr, dpr);

            const finalScale = Math.min(displayW / rw, displayH / rh) * 0.9;
            const ox = (displayW - rw * finalScale) / 2;
            const oy = (displayH - rh * finalScale) / 2;

            // Background
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            ctx.fillStyle = isDark ? '#1a1a1a' : '#f0f0f0';
            ctx.fillRect(0, 0, displayW, displayH);

            // Room outline
            ctx.strokeStyle = isDark ? '#666' : '#999';
            ctx.lineWidth = 2;
            ctx.strokeRect(ox, oy, rw * finalScale, rh * finalScale);

            // Tiles
            const colors = isDark
                ? ['#3a506b', '#3d5a80', '#415a77', '#344e6f']
                : ['#a8dadc', '#b5e2e0', '#c8eae8', '#9dd0d3'];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = ox + c * (tw + g) * finalScale;
                    const y = oy + r * (th + g) * finalScale;
                    const w = Math.min(tw * finalScale, ox + rw * finalScale - x);
                    const h = Math.min(th * finalScale, oy + rh * finalScale - y);
                    if (w > 0 && h > 0) {
                        ctx.fillStyle = colors[(r + c) % colors.length];
                        ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
                    }
                }
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
    </script>
</body>
</html>
