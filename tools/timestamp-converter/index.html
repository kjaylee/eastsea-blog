<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타임스탬프 변환기 | Timestamp Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #495057;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px var(--shadow);
            margin-bottom: 20px;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px var(--shadow);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px var(--shadow);
            transition: transform 0.2s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            margin-bottom: 20px;
        }

        .current-time {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .current-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .current-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }

        .current-date {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 15px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="datetime-local"] {
            font-family: 'Courier New', monospace;
        }

        button {
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border);
            box-shadow: none;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .result-item {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result-value {
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .copy-btn {
            padding: 6px 12px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #28a745;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
            animation: slideIn 0.3s ease;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .current-value {
                font-size: 1.8rem;
            }

            .result-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="container">
        <a href="../" class="back-button">← 뒤로 가기</a>

        <header>
            <h1>⏰ 타임스탬프 변환기</h1>
            <p style="color: var(--text-secondary);">Unix 타임스탬프와 날짜를 상호 변환하세요</p>
        </header>

        <div class="card">
            <div class="current-time">
                <div class="current-label">현재 Unix 타임스탬프</div>
                <div class="current-value" id="current-timestamp"></div>
                <div class="current-date" id="current-date"></div>
            </div>
        </div>

        <div class="card">
            <label>🔢 타임스탬프 → 날짜</label>
            <input type="number" id="timestamp-input" placeholder="예: 1609459200">
            <button onclick="timestampToDate()">변환</button>
            <button class="secondary" onclick="useNow()">현재 시간 사용</button>

            <div id="ts-result" style="display: none;">
                <div class="result-grid">
                    <div class="result-item">
                        <div class="result-label">로컬 시간</div>
                        <div class="result-value" id="local-time"></div>
                        <button class="copy-btn" onclick="copyText('local-time')">📋 복사</button>
                    </div>
                    <div class="result-item">
                        <div class="result-label">UTC 시간</div>
                        <div class="result-value" id="utc-time"></div>
                        <button class="copy-btn" onclick="copyText('utc-time')">📋 복사</button>
                    </div>
                    <div class="result-item">
                        <div class="result-label">ISO 8601</div>
                        <div class="result-value" id="iso-time"></div>
                        <button class="copy-btn" onclick="copyText('iso-time')">📋 복사</button>
                    </div>
                    <div class="result-item">
                        <div class="result-label">상대 시간</div>
                        <div class="result-value" id="relative-time"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <label>📅 날짜 → 타임스탬프</label>
            <input type="datetime-local" id="date-input">
            <button onclick="dateToTimestamp()">변환</button>

            <div id="date-result" style="display: none;">
                <div class="result-grid">
                    <div class="result-item">
                        <div class="result-label">Unix 타임스탬프 (초)</div>
                        <div class="result-value" id="seconds-ts"></div>
                        <button class="copy-btn" onclick="copyText('seconds-ts')">📋 복사</button>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Unix 타임스탬프 (밀리초)</div>
                        <div class="result-value" id="millis-ts"></div>
                        <button class="copy-btn" onclick="copyText('millis-ts')">📋 복사</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">복사되었습니다! 📋</div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function updateCurrentTime() {
            const now = new Date();
            const timestamp = Math.floor(now.getTime() / 1000);
            
            document.getElementById('current-timestamp').textContent = timestamp;
            document.getElementById('current-date').textContent = now.toLocaleString('ko-KR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                weekday: 'long'
            });
        }

        function timestampToDate() {
            const input = document.getElementById('timestamp-input').value;
            
            if (!input) {
                alert('⚠️ 타임스탬프를 입력해주세요');
                return;
            }

            const timestamp = parseInt(input);
            
            // 밀리초 단위인지 초 단위인지 자동 감지
            const date = timestamp > 10000000000 
                ? new Date(timestamp) 
                : new Date(timestamp * 1000);

            if (isNaN(date.getTime())) {
                alert('⚠️ 유효하지 않은 타임스탬프입니다');
                return;
            }

            document.getElementById('local-time').textContent = date.toLocaleString('ko-KR', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                weekday: 'long'
            });

            document.getElementById('utc-time').textContent = date.toUTCString();
            document.getElementById('iso-time').textContent = date.toISOString();
            document.getElementById('relative-time').textContent = getRelativeTime(date);

            document.getElementById('ts-result').style.display = 'block';
        }

        function getRelativeTime(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 0) {
                const future = Math.abs(diff);
                if (future < 60) return `${future}초 후`;
                if (future < 3600) return `${Math.floor(future / 60)}분 후`;
                if (future < 86400) return `${Math.floor(future / 3600)}시간 후`;
                return `${Math.floor(future / 86400)}일 후`;
            }

            if (diff < 60) return `${diff}초 전`;
            if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
            if (diff < 2592000) return `${Math.floor(diff / 86400)}일 전`;
            if (diff < 31536000) return `${Math.floor(diff / 2592000)}개월 전`;
            return `${Math.floor(diff / 31536000)}년 전`;
        }

        function dateToTimestamp() {
            const input = document.getElementById('date-input').value;
            
            if (!input) {
                alert('⚠️ 날짜를 선택해주세요');
                return;
            }

            const date = new Date(input);
            const seconds = Math.floor(date.getTime() / 1000);
            const millis = date.getTime();

            document.getElementById('seconds-ts').textContent = seconds;
            document.getElementById('millis-ts').textContent = millis;

            document.getElementById('date-result').style.display = 'block';
        }

        function useNow() {
            const now = Math.floor(Date.now() / 1000);
            document.getElementById('timestamp-input').value = now;
            timestampToDate();
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 현재 시간 업데이트 (1초마다)
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);

        // 현재 시간으로 날짜 선택기 초기화
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('date-input').value = now.toISOString().slice(0, 16);

        // 샘플 타임스탬프
        document.getElementById('timestamp-input').value = '1609459200';
    </script>
</body>
</html>
