            ko: `당신은 갈등의 완벽한 해답보다 실행 가능한 균형점을 빠르게 찾는 능력이 뛰어납니다. 각자의 요구를 100% 충족하지는 못하더라도, 전체 손실을 줄이고 프로젝트를 앞으로 움직이게 하는 현실 감각이 강점입니다. 특히 이해관계자가 많고 시간이 부족한 환경에서 당신의 조율력은 팀의 마찰비용을 크게 줄여줍니다. 다만 반복적으로 절충만 하면 근본 원인이 누적되어 비슷한 갈등이 재발할 수 있습니다. 따라서 중요한 사안에서는 ‘이번 임시합의’와 ‘근본개선 작업’을 분리해 관리하는 것이 좋습니다. 당신의 핵심 경쟁력은 빠른 합의 기술이며, 여기에 장기 개선 루프를 붙이면 단기 성과와 구조적 안정성을 동시에 잡을 수 있습니다.`,
            en: `You are a practical bridge-builder. Your trade-offs keep teams moving. Pair short-term deals with a later root-cause pass so unresolved tension does not resurface.`
          },
          compatible: { ko: '협력 설계형, 경쟁 주도형', en: 'Collaborate Architect, Compete Driver' },
          tips: {
            ko: ['절충안 제시 시 “포기한 것/지킨 것”을 함께 명시하기', '타협 적용 기간을 먼저 정하고 재협상 날짜 박기', '반복 갈등 항목은 별도 개선 백로그로 분리하기'],
            en: ['State both gains and concessions.', 'Set an expiration date for temporary compromises.', 'Move recurring friction into a dedicated improvement backlog.']

        AVOID: {
          emoji: '🌫️',
          name: { ko: '회피 완충형', en: 'Avoid Buffer' },
          summary: {
            ko: '감정 과열을 차단하고 상황을 안정화한 뒤 대응하는 진정형.',
            en: 'Protects emotional bandwidth by pausing and de-escalating first.'
          },
          detail: {
            ko: `당신은 갈등이 과열되었을 때 즉시 맞붙기보다 온도를 낮추는 선택을 선호합니다. 감정이 높아진 상태에서는 어떤 논리도 왜곡되기 쉽다는 점을 잘 알고 있기 때문에, 거리두기와 시간 확보를 통해 관계 파손을 줄이는 데 강점이 있습니다. 이 접근은 특히 공격적 커뮤니케이션이 오가는 환경에서 소모를 줄여 주는 보호 전략이 됩니다. 다만 회피가 길어지면 중요한 쟁점이 미해결 상태로 남아 신뢰가 약화될 수 있습니다. 그래서 “지금은 멈추되, 언제 어떤 방식으로 다시 다룰지”를 함께 합의하는 것이 중요합니다. 당신의 과제는 회피를 포기가 아닌 ‘준비된 지연’으로 설계해, 안정성과 해결력을 동시에 확보하는 것입니다.`,
            en: `You are skilled at cooling conflict before it burns relationships. Add explicit return timing and agenda so pauses become strategic resets, not silent avoidance.`
          },
          compatible: { ko: '수용 지원형, 협력 설계형', en: 'Accommodate Supporter, Collaborate Architect' },
          tips: {
            ko: ['대화 중단 시 재개 시점(예: 24시간 이내) 명시하기', '회피 이유를 감정 언어가 아닌 업무 언어로 전달하기', '재개 회의는 의제 2개 이하로 짧게 설계하기'],
            en: ['When pausing, set a clear return window.', 'Explain pause in task language, not blame language.', 'Restart with a short agenda and narrow scope.']

        ACCOMMODATE: {
          emoji: '🫶',
          name: { ko: '수용 지원형', en: 'Accommodate Supporter' },
          summary: {
            ko: '관계를 우선해 신뢰와 협력 분위기를 먼저 지키는 관계형.',
            en: 'Relationship-first style that preserves trust and team cohesion.'
          },
          detail: {
            ko: `당신은 갈등에서 이기고 지는 문제보다 관계의 지속 가능성을 먼저 봅니다. 상대의 입장을 살피고 양보를 통해 긴장을 완화하는 능력이 뛰어나, 팀 내 심리적 안전감을 높이는 데 큰 기여를 합니다. 특히 불확실성이 큰 시기에는 당신의 배려가 조직의 결속을 지켜주는 중요한 기반이 됩니다. 다만 자신의 기준을 반복적으로 뒤로 미루면 피로와 억울함이 쌓여 뒤늦은 이탈로 이어질 수 있습니다. 건강한 수용을 위해서는 양보 전에 최소 기준(시간, 품질, 역할)을 짧게라도 명확히 해야 합니다. 당신의 강점은 사람을 연결하는 힘이며, 여기에 경계 설정을 더하면 신뢰와 자기보호를 동시에 달성할 수 있습니다.`,
            en: `You preserve trust and reduce interpersonal damage. Keep your style sustainable by naming minimum boundaries before yielding—care for others and self can coexist.`
          },
          compatible: { ko: '회피 완충형, 협력 설계형', en: 'Avoid Buffer, Collaborate Architect' },
          tips: {
            ko: ['양보 전 “이 세 가지는 지켜야 한다” 최소선 선언하기', '도움 요청을 수락할 때 범위·기한을 함께 합의하기', '관계 배려 뒤 자기회고(피로도/불만도) 점검 루틴 만들기'],
            en: ['Name your non-negotiable baseline first.', 'When helping, define scope and deadline.', 'Track your own fatigue to prevent silent burnout.']
          }
        }
      };

      const QUESTIONS = [
        { id:'Q1',  q:{ko:'새 프로젝트 방향을 두고 의견이 정면으로 갈릴 때, 당신의 첫 반응은?', en:'When project direction is split, your first move is…'} },
        { id:'Q2',  q:{ko:'마감이 임박했는데 팀 내 우선순위가 충돌하면?', en:'Deadline is near and priorities clash. You…'} },
        { id:'Q3',  q:{ko:'내 제안이 공개 회의에서 강하게 반박될 때?', en:'Your idea gets challenged in a public meeting. You…'} },
        { id:'Q4',  q:{ko:'업무 방식 때문에 동료와 계속 마찰이 반복된다면?', en:'A recurring friction with a teammate about work style appears. You…'} },
        { id:'Q5',  q:{ko:'상대가 감정적으로 말해 대화가 거칠어질 때?', en:'The conversation gets emotionally heated. You…'} },
        { id:'Q6',  q:{ko:'고객 요구와 내부 정책이 충돌하는 상황이라면?', en:'Client request conflicts with internal policy. You…'} },
        { id:'Q7',  q:{ko:'리소스가 부족해 팀 간 경쟁이 생겼을 때?', en:'Resource scarcity creates competition between teams. You…'} },
        { id:'Q8',  q:{ko:'책임 소재가 불분명해 서로 미루는 분위기라면?', en:'Ownership is unclear and people start deflecting. You…'} },
        { id:'Q9',  q:{ko:'의사결정이 늦어 손실이 커지는 상황이면?', en:'Decision delay is causing visible loss. You…'} },
        { id:'Q10', q:{ko:'메신저 오해로 관계가 어색해졌을 때?', en:'A chat misunderstanding made the relationship awkward. You…'} },
        { id:'Q11', q:{ko:'반복 실수가 팀 신뢰를 깎고 있다고 느끼면?', en:'Repeated mistakes are hurting team trust. You…'} },
        { id:'Q12', q:{ko:'상급자 지시와 현장 의견이 충돌할 때?', en:'Leadership directive conflicts with frontline feedback. You…'} },
        { id:'Q13', q:{ko:'협상 테이블에서 상대가 강경한 조건을 제시하면?', en:'At negotiation, the other side pushes hard terms. You…'} },
        { id:'Q14', q:{ko:'원격 협업 중 메시지 톤 때문에 갈등이 생기면?', en:'Remote collaboration conflict arises due to message tone. You…'} },
        { id:'Q15', q:{ko:'품질과 속도 사이에서 팀이 둘로 갈릴 때?', en:'Team splits between quality and speed. You…'} },
        { id:'Q16', q:{ko:'보상/역할의 공정성 이슈가 터졌을 때?', en:'A fairness issue around role or reward appears. You…'} },
        { id:'Q17', q:{ko:'갈등 상대가 명백히 나를 오해하고 있을 때?', en:'Someone is clearly misunderstanding your intent. You…'} },
        { id:'Q18', q:{ko:'친한 사이에서 민감한 불만이 제기되면?', en:'A close relationship raises a sensitive complaint. You…'} },
        { id:'Q19', q:{ko:'서로 양보 없이 같은 주장만 반복할 때?', en:'Both sides keep repeating without yielding. You…'} },
        { id:'Q20', q:{ko:'갈등이 일단 정리된 후, 당신이 가장 먼저 하는 것은?', en:'After conflict seems resolved, your first follow-up is…'} }
      ];

      const OPTIONS = {
        ko: [
          { t:'원칙과 기준을 분명히 하고 내 안을 중심으로 결론을 밀어붙인다.', w:{COMPETE:3, COMPROMISE:1} },
          { t:'서로의 핵심 니즈를 정리해 둘 다 이기는 구조를 설계한다.', w:{COLLABORATE:3, COMPROMISE:1, ACCOMMODATE:1} },
          { t:'핵심 몇 가지만 지키고 빠르게 절충 가능한 중간안을 만든다.', w:{COMPROMISE:3, COLLABORATE:1} },
          { t:'감정이 가라앉을 때까지 거리를 두고 타이밍을 다시 잡는다.', w:{AVOID:3, ACCOMMODATE:1} },
          { t:'관계를 우선해 이번에는 상대 입장을 먼저 수용한다.', w:{ACCOMMODATE:3, AVOID:1} }
        ],
        en: [
          { t:'Set clear standards and push a decision around your proposal.', w:{COMPETE:3, COMPROMISE:1} },
          { t:'Map both sides’ needs and design a genuine win-win structure.', w:{COLLABORATE:3, COMPROMISE:1, ACCOMMODATE:1} },
          { t:'Protect key points and move quickly with a practical middle ground.', w:{COMPROMISE:3, COLLABORATE:1} },
          { t:'Pause, cool down the temperature, then revisit at a better time.', w:{AVOID:3, ACCOMMODATE:1} },
          { t:'Prioritize relationship and accommodate the other side this round.', w:{ACCOMMODATE:3, AVOID:1} }
        ]
      };

      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
      if (tg) {
        try { tg.ready(); tg.expand(); } catch (_) {}
      }

      const state = {
        lang: detectLang(),
        screen: 'intro',
        qIndex: 0,
        scores: initScores(),
        answers: [],
        result: null,
        chartDrawn: false
      };

      let analyzeTimer = null;
      let littleInitDone = false;
      let clickSfx = null;

      function detectLang() {
        const q = new URLSearchParams(location.search).get('lang');
        if (q === 'en' || q === 'ko') return q;
        const nav = (navigator.language || 'ko').toLowerCase();
        return nav.startsWith('ko') ? 'ko' : 'en';
      }

      function t(key, ...args) {
        const pack = I18N[state.lang] || I18N.ko;
        const v = pack[key];
        if (typeof v === 'function') return v(...args);
        return (v !== undefined && v !== null) ? v : '';
      }

      function initScores() {
        return { COMPETE:0, COLLABORATE:0, COMPROMISE:0, AVOID:0, ACCOMMODATE:0 };
      }

      function impact(kind='light') {
        try { tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred(kind); } catch (_) {}
      }

      function initLittleJS() {
        if (littleInitDone || typeof window.engineInit !== 'function') return;
        littleInitDone = true;
        try {
          engineInit(
            () => {
              if (window.mainCanvas) {
                mainCanvas.style.position = 'fixed';
                mainCanvas.style.inset = '0';
                mainCanvas.style.zIndex = '0';
                mainCanvas.style.opacity = '.34';
                mainCanvas.style.pointerEvents = 'none';
              }
              cameraPos = vec2(16, 9);
              cameraScale = 42;
              clickSfx = new Sound([.7,,260,.02,.04,.08,1,1.8,,,,,,.08,.4,.25,.07]);

              new ParticleEmitter(
                vec2(16,9), 0, 20, 0, 30, Math.PI,
                tile(0,16),
                rgb(.96,.80,.46), rgb(.53,.83,.95),
                rgb(.96,.80,.46,0), rgb(.53,.83,.95,0),
                1.3, .12, .03, .05, .25,
                .98, 1, .18, Math.PI, .08,
                .35, 0, 1, 1, 0
              );
            },
            () => {},
            () => {},
            () => {
              const tt = typeof time === 'number' ? time : 0;
              for (let i=0; i<9; i++) {
                const y = 2 + i*1.9;
                const wobble = Math.sin(tt*.35 + i*.6) * 3.8;
                drawRect(vec2(16+wobble, y), vec2(35, .12), rgb(1,1,1,.06));
              }
            },
            () => {}
          );
        } catch (e) {
          console.warn('LittleJS init failed:', e && e.message ? e.message : e);
        }
      }

      function pulseFx() {
        try {
          if (clickSfx && typeof clickSfx.play === 'function') clickSfx.play(.35);
        } catch (_) {}
        try {
          if (typeof window.ParticleEmitter === 'function' && typeof window.vec2 === 'function' && typeof window.tile === 'function' && typeof window.rgb === 'function') {
            new ParticleEmitter(
              vec2(15 + Math.random()*2, 8 + Math.random()*2), 0, .2, .06, 65, Math.PI,
              tile(0,16),
              rgb(.98,.88,.58), rgb(.60,.88,.99),
              rgb(.98,.88,.58,0), rgb(.60,.88,.99,0),
              .7, .12, .02, .08, .3,
              .95, 1, .25, Math.PI, .1,
              .4, 0, 1, 1, 0
            );
          }
        } catch (_) {}
      }

      function render() {
        const app = document.getElementById('app');
        const progress = state.screen === 'question'
          ? `<div class="progress-shell show"><div class="bar"><i style="width:${Math.round((state.qIndex/QUESTIONS.length)*100)}%"></i></div><div class="progress-label">${t('qCounter', state.qIndex+1, QUESTIONS.length)}</div></div>`
          : `<div class="progress-shell"></div>`;

        if (state.screen === 'intro') {
          const saved = loadLast();
          const savedBlock = saved
            ? `<div class="saved">${t('savedPrefix')} <strong>${escapeHtml(saved.name || '')}</strong> · ${t('savedAt')}: ${new Date(saved.at).toLocaleString()}</div>`
            : '';
          app.innerHTML = `
            ${progress}
            <section class="panel in">
              <div class="pad">
                <h1>${t('title')}</h1>
                <p class="lead">${t('subtitle')}</p>
                <div class="badges">${(I18N[state.lang].badges || []).map(v=>`<span class="badge">${escapeHtml(v)}</span>`).join('')}</div>
                ${savedBlock}
                <button class="btn primary" id="startBtn">${t('start')}</button>
              </div>
            </section>
          `;
          document.getElementById('startBtn').addEventListener('click', startQuiz);
          return;
        }

        if (state.screen === 'question') {
          const q = QUESTIONS[state.qIndex];
          const options = OPTIONS[state.lang] || OPTIONS.ko;
          app.innerHTML = `
            ${progress}
            <section class="panel in">
              <div class="pad">
                <h2 class="q-title">${escapeHtml(q.q[state.lang])}</h2>
                <p class="q-guide">${t('guide')}</p>
                <div class="choices">
                  ${options.map((op, idx)=>`<button class="choice" data-idx="${idx}">${escapeHtml(op.t)}</button>`).join('')}
                </div>
              </div>
            </section>
          `;
          app.querySelectorAll('.choice').forEach((el)=>{
            el.addEventListener('click', () => pickOption(Number(el.dataset.idx)));
          });
          return;
        }

        if (state.screen === 'analyzing') {
          app.innerHTML = `
            ${progress}
            <section class="panel in">
              <div class="pad analyze">
                <div class="spin" aria-hidden="true"></div>
                <h2>${t('analyzing')}</h2>
                <p class="lead">${t('analyzingSub')}</p>
                <div class="mini">
                  <div class="mini-track"><i id="miniBar"></i></div>
                  <div class="mini-txt" id="miniTxt">0%</div>
                </div>
              </div>
            </section>
          `;
          runAnalyzing();
          return;
        }

        if (state.screen === 'result' && state.result) {
          const rs = RESULTS[state.result.type];
          app.innerHTML = `
            ${progress}
            <section class="panel in">
              <div class="pad">
                <div class="result-top">
                  <p>${t('resultTitle')}</p>
                  <h2 class="result-type">${rs.emoji} ${escapeHtml(rs.name[state.lang])}</h2>
                  <p class="result-summary">${escapeHtml(rs.summary[state.lang])}</p>
                </div>

                <div class="sec">
                  <h3>${t('detailTitle')}</h3>
                  <p class="detail">${escapeHtml(rs.detail[state.lang])}</p>
                </div>

                <div class="sec">
                  <h3>${t('chartTitle')}</h3>
                  <div class="chart-box"><canvas id="resultChart" width="640" height="260"></canvas></div>
                </div>

                <div class="sec">
                  <h3>${t('tipsTitle')}</h3>
                  <ul class="tips">${rs.tips[state.lang].map(v=>`<li>${escapeHtml(v)}</li>`).join('')}</ul>
                  <div class="chips"><span class="chip">${t('compatTitle')}: ${escapeHtml(rs.compatible[state.lang])}</span></div>
                </div>

                <div class="sec">
                  <h3>${t('shareTitle')}</h3>
                  <div class="share-grid">
                    <button class="share-btn kakao" id="shareKakao">${t('kakao')}</button>
                    <button class="share-btn x" id="shareX">${t('twitter')}</button>
                    <button class="share-btn link" id="shareLink">${t('copy')}</button>
                  </div>
                </div>

                <button class="btn secondary" id="restartBtn">${t('restart')}</button>
                <p class="disclaimer">${t('legal')}</p>

                <div class="sec">
                  <h3>${t('recoTitle')}</h3>
                  <div class="reco">
                    <a href="/tools/burnout-check/">번아웃 지수 측정</a>
                    <a href="/tools/love-attachment/">연애 애착유형 검사</a>
                    <a href="/tools/big5-workstyle-map/">Big5 워크스타일 맵</a>
                  </div>
                </div>
              </div>
            </section>
          `;

          drawChart(state.result.percentage);
          bindResultActions();
          return;
        }
      }

      function startQuiz() {
        impact('light');
        pulseFx();
        state.screen = 'question';
        state.qIndex = 0;
        state.scores = initScores();
        state.answers = [];
        state.result = null;
        render();
      }

      function pickOption(idx) {
        const op = (OPTIONS[state.lang] || OPTIONS.ko)[idx];
        if (!op || !op.w) return;
        impact('soft');
        pulseFx();
        Object.keys(op.w).forEach((k) => {
          state.scores[k] = (state.scores[k] || 0) + op.w[k];
        });
        state.answers.push({ q: QUESTIONS[state.qIndex].id, option: idx });

        if (state.qIndex < QUESTIONS.length - 1) {
          state.qIndex += 1;
          render();
          return;
        }

        state.screen = 'analyzing';
        render();
      }

      function runAnalyzing() {
        const bar = document.getElementById('miniBar');
        const txt = document.getElementById('miniTxt');
        let p = 0;
        if (analyzeTimer) clearInterval(analyzeTimer);
        analyzeTimer = setInterval(() => {
          p += 8;
          if (bar) bar.style.width = Math.min(100, p) + '%';
          if (txt) txt.textContent = Math.min(100, p) + '%';
          if (p >= 100) {
            clearInterval(analyzeTimer);
            analyzeTimer = null;
            finalizeResult();
          }
        }, 95);
      }

      function finalizeResult() {
        const percentage = normalizeScores(state.scores);
        const type = pickTopType(state.scores);
        state.result = { type, percentage };
        saveResult(type, percentage);
        state.screen = 'result';
        render();
      }

      function normalizeScores(scores) {
        const total = Object.values(scores).reduce((a,b)=>a+b,0) || 1;
        const raw = {
          COMPETE: Math.round((scores.COMPETE/total)*100),
          COLLABORATE: Math.round((scores.COLLABORATE/total)*100),
          COMPROMISE: Math.round((scores.COMPROMISE/total)*100),
          AVOID: Math.round((scores.AVOID/total)*100),
          ACCOMMODATE: Math.round((scores.ACCOMMODATE/total)*100)
        };
        return raw;
      }

      function pickTopType(scores) {
        let bestType = STYLE_ORDER[0];
        let bestScore = -Infinity;
        for (const type of STYLE_ORDER) {
          const s = scores[type] || 0;
          if (s > bestScore) {
            bestScore = s;
            bestType = type;
          }
        }
        return bestType;
      }

      function drawChart(points) {
        const cvs = document.getElementById('resultChart');
        if (!cvs) return;
        const ctx = cvs.getContext('2d');
        if (!ctx) return;

        const dpr = window.devicePixelRatio || 1;
        const w = Math.floor(cvs.clientWidth || 640);
        const h = Math.floor(cvs.clientHeight || 260);
        cvs.width = w * dpr;
        cvs.height = h * dpr;
        ctx.setTransform(dpr,0,0,dpr,0,0);

        ctx.clearRect(0,0,w,h);

        const labels = [
          STYLE_LABELS[state.lang].COMPETE,
          STYLE_LABELS[state.lang].COLLABORATE,
          STYLE_LABELS[state.lang].COMPROMISE,
          STYLE_LABELS[state.lang].AVOID,
          STYLE_LABELS[state.lang].ACCOMMODATE
        ];
        const values = [points.COMPETE||0, points.COLLABORATE||0, points.COMPROMISE||0, points.AVOID||0, points.ACCOMMODATE||0];
        const colors = ['#f2bc6b','#87d6c5','#9fc7ff','#c3b4ff','#ffd7bf'];

        const left = 52;
        const right = 14;
        const top = 16;
        const bottom = 34;
        const chartW = w - left - right;
        const chartH = h - top - bottom;
        const barW = Math.max(24, Math.floor(chartW / values.length) - 12);
        const gap = (chartW - barW*values.length) / (values.length - 1 || 1);

        ctx.strokeStyle = 'rgba(255,255,255,.24)';
        ctx.lineWidth = 1;
        ctx.font = '11px -apple-system, Segoe UI, sans-serif';
        ctx.fillStyle = 'rgba(240,248,255,.78)';

        for (let y=0; y<=100; y+=20) {
          const yy = top + chartH - (y/100)*chartH;
          ctx.beginPath();
          ctx.moveTo(left, yy);
          ctx.lineTo(left+chartW, yy);
          ctx.stroke();
          ctx.fillText(String(y), 20, yy+4);
        }

        values.forEach((v, i) => {
          const x = left + i*(barW+gap);
          const bh = Math.max(2, (v/100)*chartH);
          const y = top + chartH - bh;

          const grad = ctx.createLinearGradient(0, y, 0, y+bh);
          grad.addColorStop(0, colors[i]);
          grad.addColorStop(1, 'rgba(255,255,255,0.2)');
          ctx.fillStyle = grad;
          roundRect(ctx, x, y, barW, bh, 8);
          ctx.fill();

          ctx.fillStyle = '#f5fbff';
          ctx.font = '700 12px -apple-system, Segoe UI, sans-serif';
          ctx.fillText(v + '%', x + 6, y - 6);

          ctx.fillStyle = 'rgba(244,248,255,.9)';
          ctx.font = '11px -apple-system, Segoe UI, sans-serif';
          const label = shortLabel(labels[i]);
          ctx.fillText(label, x + 2, h - 12);
        });
      }

      function shortLabel(s) {
        if (state.lang === 'ko') {
          return s.replace('형','');
        }
        const parts = s.split(' ');
        return parts[0] || s;
      }

      function roundRect(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w/2, h/2);
        ctx.beginPath();
        ctx.moveTo(x+rr, y);
        ctx.arcTo(x+w, y, x+w, y+h, rr);
        ctx.arcTo(x+w, y+h, x, y+h, rr);
        ctx.arcTo(x, y+h, x, y, rr);
        ctx.arcTo(x, y, x+w, y, rr);
        ctx.closePath();
      }

      function bindResultActions() {
        const k = document.getElementById('shareKakao');
        const x = document.getElementById('shareX');
        const c = document.getElementById('shareLink');
        const r = document.getElementById('restartBtn');

        if (k) k.addEventListener('click', shareKakao);
        if (x) x.addEventListener('click', shareTwitter);
        if (c) c.addEventListener('click', copyLink);
        if (r) r.addEventListener('click', () => {
          impact('light');
          pulseFx();
          state.screen = 'intro';
          render();
        });
      }

      function sharePayload() {
        const result = state.result && RESULTS[state.result.type] ? RESULTS[state.result.type] : null;
        const resultName = result ? result.name[state.lang] : t('title');
        const text = `[${t('oneLiner')}] ${resultName} · ${t('title')}`;
        return {
          text,
          url: location.origin && location.origin !== 'null'
            ? `${location.origin}${location.pathname}?result=${encodeURIComponent(state.result.type)}&lang=${state.lang}`
            : location.href
        };
      }

      function shareKakao() {
        impact('light');
        const p = sharePayload();
        const u = `https://story.kakao.com/share?url=${encodeURIComponent(p.url)}`;
        window.open(u, '_blank', 'noopener,noreferrer');
      }

      function shareTwitter() {
        impact('light');
        const p = sharePayload();
        const u = `https://twitter.com/intent/tweet?text=${encodeURIComponent(p.text)}&url=${encodeURIComponent(p.url)}`;
        window.open(u, '_blank', 'noopener,noreferrer');
      }

      async function copyLink() {
        impact('soft');
        const p = sharePayload();
        try {
          await navigator.clipboard.writeText(p.url);
          alert(t('copied'));
        } catch (_) {
          alert(`${t('copyFail')}\n${p.url}`);
        }
      }

      function saveResult(type, percentage) {
        const item = {
          type,
          name: RESULTS[type].name[state.lang],
          percentage,
          at: new Date().toISOString(),
          answers: state.answers.slice()
        };
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(item));
          const prev = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
          const next = [item, ...prev].slice(0, 5);
          localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
        } catch (_) {}
      }

      function loadLast() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        } catch (_) {
          return null;
        }
      }

      function escapeHtml(v) {
        return String(v)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      initLittleJS();
      render();
    })();
  </script>
