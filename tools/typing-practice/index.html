<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타이핑 연습 | 웹 도구 모음</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #121212;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #444;
            --shadow: rgba(0, 0, 0, 0.3);
            --card-bg: #2d2d2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }
        
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--text-primary); }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mode-select {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--accent);
            color: white;
            border-color: transparent;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #667eea;
        }

        .text-display {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            font-size: 1.3rem;
            line-height: 2;
            margin-bottom: 20px;
            min-height: 150px;
            letter-spacing: 0.05em;
        }

        .text-display span {
            padding: 2px 0;
        }

        .text-display .correct {
            color: #28a745;
            background: rgba(40, 167, 69, 0.1);
        }

        .text-display .incorrect {
            color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
            text-decoration: underline;
        }

        .text-display .current {
            background: rgba(102, 126, 234, 0.2);
            border-bottom: 3px solid #667eea;
        }

        .input-area {
            width: 100%;
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1.2rem;
            outline: none;
            font-family: inherit;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .input-area:focus {
            border-color: #667eea;
        }

        .control-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .control-btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .text-display { font-size: 1.1rem; padding: 20px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-btn">← 목록으로</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </header>

        <div class="card">
            <h1>⌨️ 타이핑 연습</h1>
            
            <div class="mode-select">
                <button class="mode-btn active" onclick="setMode('korean')">🇰🇷 한글</button>
                <button class="mode-btn" onclick="setMode('english')">🇺🇸 영문</button>
                <button class="mode-btn" onclick="setMode('mixed')">🌐 혼합</button>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">WPM</div>
                    <div class="stat-value" id="wpm">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">정확도</div>
                    <div class="stat-value" id="accuracy">100%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">시간</div>
                    <div class="stat-value" id="time">0s</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">진행률</div>
                    <div class="stat-value" id="progress">0%</div>
                </div>
            </div>

            <div class="text-display" id="textDisplay"></div>

            <textarea class="input-area" id="inputArea" placeholder="여기에 타이핑하세요..." oninput="handleInput()" disabled></textarea>

            <button class="control-btn" id="startBtn" onclick="startPractice()">시작하기</button>
        </div>
    </div>

    <script>
        const texts = {
            korean: [
                '빠른 갈색 여우가 게으른 개를 뛰어넘습니다',
                '안녕하세요 반갑습니다 좋은 하루 되세요',
                '오늘 날씨가 참 좋네요 산책하기 딱 좋은 날입니다',
                '연습하면 누구나 잘할 수 있습니다 포기하지 마세요',
                '타이핑 실력이 점점 늘고 있어요 조금만 더 힘내세요'
            ],
            english: [
                'The quick brown fox jumps over the lazy dog',
                'Practice makes perfect keep going and never give up',
                'Typing speed improves with consistent practice',
                'Hello world this is a typing practice exercise',
                'Focus on accuracy first then speed will follow'
            ],
            mixed: [
                'Hello 안녕하세요 World 세계',
                'Practice 연습 Makes 만든다 Perfect 완벽을',
                'Typing 타이핑 Speed 속도 Test 테스트',
                'Good 좋은 Morning 아침 Have 가지세요 Nice 좋은 Day 하루',
                'Keep 계속 Going 가세요 Never 절대 Give 포기 Up 하지마세요'
            ]
        };

        let currentMode = 'korean';
        let currentText = '';
        let startTime = null;
        let timerInterval = null;
        let isStarted = false;

        function setMode(mode) {
            if (isStarted) return;
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function startPractice() {
            const textArray = texts[currentMode];
            currentText = textArray[Math.floor(Math.random() * textArray.length)];
            
            displayText();
            
            document.getElementById('inputArea').value = '';
            document.getElementById('inputArea').disabled = false;
            document.getElementById('inputArea').focus();
            document.getElementById('startBtn').textContent = '재시작';
            
            startTime = Date.now();
            isStarted = true;
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);
            
            resetStats();
        }

        function displayText() {
            const display = document.getElementById('textDisplay');
            display.innerHTML = currentText.split('').map((char, i) => 
                `<span id="char-${i}">${char}</span>`
            ).join('');
        }

        function handleInput() {
            const input = document.getElementById('inputArea').value;
            const chars = currentText.split('');
            
            let correct = 0;
            let incorrect = 0;
            
            chars.forEach((char, i) => {
                const span = document.getElementById(`char-${i}`);
                span.className = '';
                
                if (i < input.length) {
                    if (input[i] === char) {
                        span.classList.add('correct');
                        correct++;
                    } else {
                        span.classList.add('incorrect');
                        incorrect++;
                    }
                } else if (i === input.length) {
                    span.classList.add('current');
                }
            });
            
            const accuracy = chars.length > 0 ? Math.round((correct / (correct + incorrect)) * 100) : 100;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            const progress = Math.round((input.length / chars.length) * 100);
            document.getElementById('progress').textContent = Math.min(progress, 100) + '%';
            
            const elapsed = (Date.now() - startTime) / 1000 / 60;
            const words = input.length / 5;
            const wpm = Math.round(words / elapsed);
            document.getElementById('wpm').textContent = wpm || 0;
            
            if (input.length === chars.length && correct === chars.length) {
                finishPractice();
            }
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').textContent = elapsed + 's';
        }

        function finishPractice() {
            clearInterval(timerInterval);
            isStarted = false;
            document.getElementById('inputArea').disabled = true;
            alert('🎉 완료! 다시 시작하려면 재시작 버튼을 누르세요.');
        }

        function resetStats() {
            document.getElementById('wpm').textContent = '0';
            document.getElementById('accuracy').textContent = '100%';
            document.getElementById('time').textContent = '0s';
            document.getElementById('progress').textContent = '0%';
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
