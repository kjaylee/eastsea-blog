<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UGC Creator Package Pricing Calculator | 크리에이터 UGC 패키지 단가 계산기</title>
  <meta name="description" content="UGC 크리에이터의 영상/스토리 패키지 제안가를 조회수, 비용, 사용권, 화이트리스팅, 수수료 기준으로 계산하는 단가 계산기." />
  <style>
    :root {
      --bg: #081326;
      --card: #11213f;
      --line: #2d4d79;
      --text: #ebf4ff;
      --muted: #9fb5d8;
      --primary: #63a8ff;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 15% 0%, #1e3f72 0%, var(--bg) 58%);
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 14px 54px;
    }
    .head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.7vw, 1.85rem);
    }
    .sub {
      margin-top: 7px;
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.55;
    }
    .home {
      text-decoration: none;
      color: #dbe8ff;
      border: 1px solid var(--line);
      background: #12274c;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.04fr 0.96fr;
      gap: 12px;
    }
    .card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      background: linear-gradient(160deg, #18305a, #11213f);
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    input, button, textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0d1b36;
      color: var(--text);
      padding: 10px;
      font-size: 0.93rem;
    }
    button {
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), #5e7df2);
      font-weight: 700;
    }
    .soft {
      background: #1b3460;
      border: 1px solid var(--line);
    }
    .btns {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    textarea {
      margin-top: 10px;
      min-height: 120px;
      resize: vertical;
    }
    .error {
      display: none;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #7a3340;
      background: rgba(248, 113, 113, 0.13);
      color: #fecaca;
      padding: 9px 10px;
      font-size: 0.85rem;
    }
    .error.show { display: block; }
    .kpis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .kpi {
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #0f1f3a;
      padding: 10px;
    }
    .k { color: var(--muted); font-size: 0.75rem; margin-bottom: 4px; }
    .v { font-size: 1.07rem; font-weight: 800; }
    .v.sm { font-size: 0.98rem; }
    .status {
      margin-top: 10px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #19345f;
      color: #cfe3ff;
      padding: 5px 10px;
      font-size: 0.77rem;
    }
    .dot.good { color: var(--good); }
    .dot.warn { color: var(--warn); }
    .dot.bad { color: var(--bad); }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.87rem;
    }
    th, td {
      text-align: right;
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
    }
    th:first-child, td:first-child { text-align: left; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .inputs { grid-template-columns: 1fr; }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <header class="head">
      <div>
        <h1>📈 크리에이터 UGC 패키지 단가 계산기</h1>
        <p class="sub">
          영상/스토리 구성, 제작비, 사용권, 화이트리스팅, 에이전시 수수료까지 반영해
          브랜드 제안가와 실수령액을 즉시 계산합니다.
        </p>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </header>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="avgVideoViews">영상 1개 평균 조회수</label><input id="avgVideoViews" type="number" min="1" /></div>
          <div><label for="avgStoryViews">스토리 1개 평균 조회수</label><input id="avgStoryViews" type="number" min="0" /></div>
          <div><label for="engagementRatePct">영상 참여율 (%)</label><input id="engagementRatePct" type="number" min="0" max="100" step="0.1" /></div>
          <div><label for="packageVideos">패키지 영상 수</label><input id="packageVideos" type="number" min="1" max="20" step="1" /></div>
          <div><label for="packageStories">패키지 스토리 수</label><input id="packageStories" type="number" min="0" max="30" step="1" /></div>
          <div><label for="benchmarkCpm">벤치마크 CPM (KRW)</label><input id="benchmarkCpm" type="number" min="0" step="100" /></div>
          <div><label for="productionCostPerVideo">영상 1개 제작비 (KRW)</label><input id="productionCostPerVideo" type="number" min="0" step="1000" /></div>
          <div><label for="revisionCostPerRound">수정 1회 비용 (KRW)</label><input id="revisionCostPerRound" type="number" min="0" step="1000" /></div>
          <div><label for="revisionsPerVideo">영상당 수정 횟수</label><input id="revisionsPerVideo" type="number" min="0" max="10" step="1" /></div>
          <div><label for="usageMonths">유상 사용권 개월 수</label><input id="usageMonths" type="number" min="0" max="36" step="1" /></div>
          <div><label for="usageFeePerMonthPerVideo">영상당 월 사용권 비용 (KRW)</label><input id="usageFeePerMonthPerVideo" type="number" min="0" step="1000" /></div>
          <div><label for="whitelistingPct">화이트리스팅 가산율 (%)</label><input id="whitelistingPct" type="number" min="0" max="200" step="0.1" /></div>
          <div><label for="agencyFeePct">에이전시 수수료율 (%)</label><input id="agencyFeePct" type="number" min="0" max="95" step="0.1" /></div>
          <div><label for="targetMarginPct">목표 마진율 (%)</label><input id="targetMarginPct" type="number" min="0" max="90" step="0.1" /></div>
          <div><label for="expectedSales">브랜드 예상 판매 수량</label><input id="expectedSales" type="number" min="0" step="1" /></div>
          <div><label for="grossProfitPerSale">브랜드 건당 총이익 (KRW)</label><input id="grossProfitPerSale" type="number" min="0" step="100" /></div>
        </div>
        <div class="btns">
          <button id="copyBtn" class="soft" type="button">요약 복사</button>
          <button id="resetBtn" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">브랜드 제안가</div><div id="quoteToBrand" class="v">-</div></div>
          <div class="kpi"><div class="k">크리에이터 실수령액</div><div id="creatorTakeHome" class="v">-</div></div>
          <div class="kpi"><div class="k">유효 CPM</div><div id="effectiveCpm" class="v sm">-</div></div>
          <div class="kpi"><div class="k">브랜드 ROI 추정</div><div id="projectedBrandRoi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">총 도달 조회수</div><div id="totalReachViews" class="v sm">-</div></div>
          <div class="kpi"><div class="k">예상 참여수</div><div id="estimatedEngagements" class="v sm">-</div></div>
        </div>

        <div id="status" class="status">결과 계산 대기</div>

        <h2 style="margin-top:12px;">비용 구성</h2>
        <table>
          <tbody>
            <tr><th>도달가치(벤치마크)</th><td id="reachValue">-</td></tr>
            <tr><th>제작+수정 원가</th><td id="creatorHardCost">-</td></tr>
            <tr><th>사용권 비용</th><td id="usageFee">-</td></tr>
            <tr><th>화이트리스팅 비용</th><td id="whitelistingFee">-</td></tr>
            <tr><th>수수료 금액</th><td id="agencyFeeAmount">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script type="module" src="./app.mjs"></script>
</body>
</html>
