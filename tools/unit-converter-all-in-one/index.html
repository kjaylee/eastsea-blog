<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단위 환산 올인원 | EastSea Tools</title>
  <meta name="description" content="길이, 무게, 온도, 속도, 데이터 등 20개+ 카테고리를 지원하는 통합 단위 변환기" />
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #dbe3ef;
      --text: #0f172a;
      --sub: #475569;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --radius: 14px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }
    h1 {
      margin: 6px 0 4px;
      font-size: clamp(1.36rem, 4vw, 2rem);
    }
    .lead { color: var(--sub); margin: 0 0 14px; font-size: 0.95rem; }
    .badge {
      display: inline-block;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e40af;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.78rem;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.88rem;
      font-weight: 700;
    }
    select, input, button {
      font: inherit;
    }
    select, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      background: #fff;
      color: var(--text);
    }
    .convert-row {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: end;
    }
    .swap {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e40af;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
      height: 42px;
    }
    .result {
      margin-top: 12px;
      border: 1px solid #bfdbfe;
      background: #f8fbff;
      border-radius: 12px;
      padding: 12px;
    }
    .result-value {
      font-size: clamp(1.12rem, 3.6vw, 1.6rem);
      font-weight: 800;
      color: #1e3a8a;
      word-break: break-all;
    }
    .result-meta {
      margin-top: 6px;
      color: var(--sub);
      font-size: 0.85rem;
    }
    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button.action {
      border: 1px solid var(--line);
      background: #fff;
      color: #1e293b;
      border-radius: 9px;
      padding: 8px 11px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.84rem;
    }
    button.action.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    button.action.primary:hover { background: var(--brand-dark); }
    .status {
      margin-top: 8px;
      min-height: 1.2em;
      color: var(--sub);
      font-size: 0.87rem;
    }
    .table-wrap { margin-top: 10px; overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 340px;
      font-size: 0.86rem;
    }
    th, td {
      border-bottom: 1px solid #e2e8f0;
      padding: 8px 6px;
      text-align: left;
    }
    th { color: #1e3a8a; font-size: 0.8rem; }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .convert-row { grid-template-columns: 1fr; }
      .swap { width: 100%; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <h1>단위 환산 올인원</h1>
    <p class="lead">길이, 면적, 부피, 무게, 온도, 속도, 데이터 등 <strong>24개 카테고리</strong>를 한 화면에서 변환합니다.</p>
    <span class="badge">비즈니스/실무용 빠른 단위 변환</span>

    <section class="layout">
      <article class="card">
        <div class="grid">
          <div>
            <label for="category">카테고리</label>
            <select id="category"></select>
          </div>
          <div>
            <label for="inputValue">변환할 값</label>
            <input id="inputValue" type="number" step="any" value="1" />
          </div>
        </div>

        <div class="convert-row">
          <div>
            <label for="fromUnit">변환 전</label>
            <select id="fromUnit"></select>
          </div>

          <button class="swap" id="swapBtn" type="button">↔ 단위 바꾸기</button>

          <div>
            <label for="toUnit">변환 후</label>
            <select id="toUnit"></select>
          </div>
        </div>

        <div class="result">
          <div class="result-value" id="resultValue">-</div>
          <div class="result-meta" id="resultMeta">값을 입력하면 즉시 계산됩니다.</div>
        </div>

        <div class="actions">
          <button class="action primary" id="copyBtn" type="button">결과 복사</button>
          <button class="action" id="resetBtn" type="button">초기화</button>
        </div>
        <p class="status" id="status"></p>
      </article>

      <article class="card">
        <strong>선택 카테고리 빠른 환산표</strong>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>단위</th><th>환산값</th></tr>
            </thead>
            <tbody id="quickTable"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <script>
    const categories = {
      length: { name: '길이', type: 'linear', units: {
        m: ['미터 (m)', 1], km: ['킬로미터 (km)', 1000], cm: ['센티미터 (cm)', 0.01], mm: ['밀리미터 (mm)', 0.001],
        in: ['인치 (in)', 0.0254], ft: ['피트 (ft)', 0.3048], yd: ['야드 (yd)', 0.9144], mi: ['마일 (mi)', 1609.344], nm: ['해리 (nmi)', 1852]
      }},
      area: { name: '면적', type: 'linear', units: {
        m2: ['제곱미터 (m²)', 1], km2: ['제곱킬로미터 (km²)', 1e6], cm2: ['제곱센티미터 (cm²)', 0.0001],
        ft2: ['제곱피트 (ft²)', 0.09290304], acre: ['에이커 (acre)', 4046.8564224], ha: ['헥타르 (ha)', 10000], pyeong: ['평', 3.305785]
      }},
      volume: { name: '부피', type: 'linear', units: {
        m3: ['세제곱미터 (m³)', 1], l: ['리터 (L)', 0.001], ml: ['밀리리터 (mL)', 0.000001],
        cm3: ['세제곱센티미터 (cm³)', 0.000001], ft3: ['세제곱피트 (ft³)', 0.028316846592], gal_us: ['갤런(US)', 0.003785411784], gal_uk: ['갤런(UK)', 0.00454609]
      }},
      mass: { name: '질량/무게', type: 'linear', units: {
        kg: ['킬로그램 (kg)', 1], g: ['그램 (g)', 0.001], mg: ['밀리그램 (mg)', 0.000001], t: ['톤 (t)', 1000],
        lb: ['파운드 (lb)', 0.45359237], oz: ['온스 (oz)', 0.028349523125]
      }},
      temperature: { name: '온도', type: 'temperature', units: {
        c: ['섭씨 (°C)'], f: ['화씨 (°F)'], k: ['켈빈 (K)']
      }},
      speed: { name: '속도', type: 'linear', units: {
        ms: ['m/s', 1], kmh: ['km/h', 0.2777777778], mph: ['mph', 0.44704], knot: ['knot', 0.5144444444], fts: ['ft/s', 0.3048], mach: ['Mach', 340.29]
      }},
      time: { name: '시간', type: 'linear', units: {
        s: ['초 (s)', 1], ms: ['밀리초 (ms)', 0.001], min: ['분 (min)', 60], h: ['시간 (h)', 3600], day: ['일 (day)', 86400], week: ['주 (week)', 604800], month: ['월(평균)', 2629800], year: ['년(평균)', 31557600]
      }},
      pressure: { name: '압력', type: 'linear', units: {
        pa: ['파스칼 (Pa)', 1], kpa: ['킬로파스칼 (kPa)', 1000], bar: ['바 (bar)', 100000], psi: ['psi', 6894.757293168], atm: ['기압 (atm)', 101325], torr: ['토르 (Torr)', 133.3223684211]
      }},
      force: { name: '힘', type: 'linear', units: {
        n: ['뉴턴 (N)', 1], kn: ['킬로뉴턴 (kN)', 1000], kgf: ['kgf', 9.80665], lbf: ['파운드힘 (lbf)', 4.4482216153]
      }},
      energy: { name: '에너지', type: 'linear', units: {
        j: ['줄 (J)', 1], kj: ['킬로줄 (kJ)', 1000], cal: ['칼로리 (cal)', 4.184], kcal: ['킬로칼로리 (kcal)', 4184], wh: ['와트시 (Wh)', 3600], kwh: ['킬로와트시 (kWh)', 3600000], ev: ['전자볼트 (eV)', 1.602176634e-19]
      }},
      power: { name: '전력', type: 'linear', units: {
        w: ['와트 (W)', 1], kw: ['킬로와트 (kW)', 1000], mw: ['메가와트 (MW)', 1e6], hp: ['마력 (hp)', 745.6998716], btu_h: ['BTU/h', 0.29307107]
      }},
      data: { name: '데이터 용량', type: 'linear', units: {
        b: ['비트 (bit)', 0.125], B: ['바이트 (B)', 1], KB: ['KB', 1000], MB: ['MB', 1e6], GB: ['GB', 1e9], TB: ['TB', 1e12],
        KiB: ['KiB', 1024], MiB: ['MiB', 1048576], GiB: ['GiB', 1073741824], TiB: ['TiB', 1099511627776]
      }},
      dataRate: { name: '데이터 전송률', type: 'linear', units: {
        bps: ['bps', 1], Kbps: ['Kbps', 1000], Mbps: ['Mbps', 1e6], Gbps: ['Gbps', 1e9], Bps: ['B/s', 8], KBps: ['KB/s', 8000], MBps: ['MB/s', 8e6]
      }},
      angle: { name: '각도', type: 'linear', units: {
        deg: ['도 (°)', 1], rad: ['라디안 (rad)', 57.29577951308232], grad: ['그라디안 (gon)', 0.9], arcmin: ['분각 (′)', 1 / 60], arcsec: ['초각 (″)', 1 / 3600]
      }},
      frequency: { name: '주파수', type: 'linear', units: {
        hz: ['Hz', 1], khz: ['kHz', 1000], mhz: ['MHz', 1e6], ghz: ['GHz', 1e9], rpm: ['RPM', 1 / 60]
      }},
      acceleration: { name: '가속도', type: 'linear', units: {
        ms2: ['m/s²', 1], g: ['중력가속도 g', 9.80665], fts2: ['ft/s²', 0.3048]
      }},
      flowRate: { name: '유량', type: 'linear', units: {
        m3s: ['m³/s', 1], lps: ['L/s', 0.001], lpm: ['L/min', 1 / 60000], m3h: ['m³/h', 1 / 3600], cfm: ['CFM', 0.00047194745], gpm_us: ['GPM(US)', 0.0000630901964]
      }},
      density: { name: '밀도', type: 'linear', units: {
        kgm3: ['kg/m³', 1], gcm3: ['g/cm³', 1000], lbft3: ['lb/ft³', 16.01846337], gl: ['g/L', 1], mgml: ['mg/mL', 1]
      }},
      electricCurrent: { name: '전류', type: 'linear', units: {
        a: ['암페어 (A)', 1], ma: ['밀리암페어 (mA)', 0.001], ua: ['마이크로암페어 (μA)', 0.000001], ka: ['킬로암페어 (kA)', 1000]
      }},
      voltage: { name: '전압', type: 'linear', units: {
        v: ['볼트 (V)', 1], mv: ['밀리볼트 (mV)', 0.001], kv: ['킬로볼트 (kV)', 1000]
      }},
      resistance: { name: '저항', type: 'linear', units: {
        ohm: ['옴 (Ω)', 1], mohm: ['mΩ', 0.001], kohm: ['kΩ', 1000], Mohm: ['MΩ', 1e6]
      }},
      capacitance: { name: '정전용량', type: 'linear', units: {
        F: ['패럿 (F)', 1], mF: ['mF', 0.001], uF: ['μF', 0.000001], nF: ['nF', 1e-9], pF: ['pF', 1e-12]
      }},
      inductance: { name: '인덕턴스', type: 'linear', units: {
        H: ['헨리 (H)', 1], mH: ['mH', 0.001], uH: ['μH', 0.000001]
      }},
      torque: { name: '토크', type: 'linear', units: {
        Nm: ['N·m', 1], kgfm: ['kgf·m', 9.80665], lbfft: ['lbf·ft', 1.3558179483], lbfin: ['lbf·in', 0.112984829]
      }},
      fuelEconomy: { name: '연비', type: 'fuel', units: {
        kmpl: ['km/L'], l100km: ['L/100km'], mpg_us: ['mpg (US)'], mpg_uk: ['mpg (UK)']
      }}
    };

    const categoryEl = document.getElementById('category');
    const inputEl = document.getElementById('inputValue');
    const fromEl = document.getElementById('fromUnit');
    const toEl = document.getElementById('toUnit');
    const swapBtn = document.getElementById('swapBtn');
    const resultValueEl = document.getElementById('resultValue');
    const resultMetaEl = document.getElementById('resultMeta');
    const statusEl = document.getElementById('status');
    const quickTableEl = document.getElementById('quickTable');
    const copyBtn = document.getElementById('copyBtn');
    const resetBtn = document.getElementById('resetBtn');

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.style.color = isError ? '#b91c1c' : '#475569';
    }

    function formatNum(v) {
      if (!Number.isFinite(v)) return '∞';
      const abs = Math.abs(v);
      if ((abs !== 0 && abs < 1e-6) || abs >= 1e9) return v.toExponential(8).replace(/\.0+e/, 'e');
      return new Intl.NumberFormat('ko-KR', { maximumFractionDigits: 10 }).format(v);
    }

    function convertTemperature(value, from, to) {
      let c;
      if (from === 'c') c = value;
      else if (from === 'f') c = (value - 32) * 5 / 9;
      else c = value - 273.15;

      if (to === 'c') return c;
      if (to === 'f') return c * 9 / 5 + 32;
      return c + 273.15;
    }

    function convertFuel(value, from, to) {
      const toKmpl = (v, unit) => {
        if (unit === 'kmpl') return v;
        if (unit === 'l100km') return v === 0 ? Infinity : 100 / v;
        if (unit === 'mpg_us') return v * 0.425143707;
        return v * 0.3540061899;
      };
      const fromKmpl = (v, unit) => {
        if (unit === 'kmpl') return v;
        if (unit === 'l100km') return v === 0 ? Infinity : 100 / v;
        if (unit === 'mpg_us') return v / 0.425143707;
        return v / 0.3540061899;
      };
      return fromKmpl(toKmpl(value, from), to);
    }

    function convert(value, categoryKey, from, to) {
      const cat = categories[categoryKey];
      if (!cat) return NaN;

      if (cat.type === 'temperature') return convertTemperature(value, from, to);
      if (cat.type === 'fuel') return convertFuel(value, from, to);

      const fromFactor = cat.units[from]?.[1];
      const toFactor = cat.units[to]?.[1];
      if (!fromFactor || !toFactor) return NaN;
      const base = value * fromFactor;
      return base / toFactor;
    }

    function unitLabel(categoryKey, unitKey) {
      return categories[categoryKey].units[unitKey][0];
    }

    function fillCategories() {
      categoryEl.innerHTML = '';
      Object.entries(categories).forEach(([key, cat]) => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = cat.name;
        categoryEl.appendChild(opt);
      });
    }

    function fillUnits(categoryKey) {
      const units = categories[categoryKey].units;
      fromEl.innerHTML = '';
      toEl.innerHTML = '';

      Object.keys(units).forEach((unitKey, idx) => {
        const label = unitLabel(categoryKey, unitKey);
        const o1 = document.createElement('option');
        o1.value = unitKey;
        o1.textContent = label;

        const o2 = document.createElement('option');
        o2.value = unitKey;
        o2.textContent = label;

        fromEl.appendChild(o1);
        toEl.appendChild(o2);

        if (idx === 0) fromEl.value = unitKey;
        if (idx === 1) toEl.value = unitKey;
      });

      if (toEl.value === fromEl.value) {
        const keys = Object.keys(units);
        toEl.value = keys[Math.min(1, keys.length - 1)];
      }
    }

    function renderQuickTable(value, categoryKey, fromUnit) {
      const units = Object.keys(categories[categoryKey].units);
      quickTableEl.innerHTML = '';

      units.slice(0, 9).forEach(unit => {
        const tr = document.createElement('tr');
        const converted = convert(value, categoryKey, fromUnit, unit);
        tr.innerHTML = `<td>${unitLabel(categoryKey, unit)}</td><td>${formatNum(converted)}</td>`;
        quickTableEl.appendChild(tr);
      });
    }

    function recalc() {
      const value = Number(inputEl.value);
      if (!Number.isFinite(value)) {
        resultValueEl.textContent = '-';
        resultMetaEl.textContent = '숫자 값을 입력해주세요.';
        quickTableEl.innerHTML = '';
        setStatus('');
        return;
      }

      const category = categoryEl.value;
      const from = fromEl.value;
      const to = toEl.value;
      const converted = convert(value, category, from, to);

      if (!Number.isFinite(converted)) {
        resultValueEl.textContent = '계산 불가';
        resultMetaEl.textContent = '입력 범위를 확인해주세요.';
        setStatus('유효하지 않은 입력입니다.', true);
        return;
      }

      resultValueEl.textContent = `${formatNum(converted)} ${to}`;
      const ratio = convert(1, category, from, to);
      resultMetaEl.textContent = `1 ${from} = ${formatNum(ratio)} ${to}`;
      renderQuickTable(value, category, from);
      setStatus('변환 완료');
    }

    async function copyResult() {
      const text = resultValueEl.textContent;
      if (!text || text === '-') return;
      try {
        await navigator.clipboard.writeText(text);
        setStatus('결과를 클립보드에 복사했습니다.');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        setStatus('결과를 클립보드에 복사했습니다.');
      }
    }

    function resetForm() {
      categoryEl.value = 'length';
      fillUnits('length');
      inputEl.value = '1';
      recalc();
      setStatus('초기화되었습니다.');
    }

    fillCategories();
    categoryEl.value = 'length';
    fillUnits('length');
    recalc();

    categoryEl.addEventListener('change', () => {
      fillUnits(categoryEl.value);
      recalc();
    });
    [inputEl, fromEl, toEl].forEach(el => el.addEventListener('input', recalc));

    swapBtn.addEventListener('click', () => {
      const a = fromEl.value;
      fromEl.value = toEl.value;
      toEl.value = a;
      recalc();
    });

    copyBtn.addEventListener('click', copyResult);
    resetBtn.addEventListener('click', resetForm);
  </script>
</body>
</html>
