<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="만능 단위 변환기 - 길이 · 무게 · 온도 · 속도 · 면적 · 부피 · 데이터 · 시간 단위를 실시간으로 변환하세요. 무료 온라인 도구 | Free online tool at eastsea.monster" />
  <title>만능 단위 변환기</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #4f46e5;
      --primary-weak: #eef2ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      padding: 20px;
    }
    .app {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
      margin-top: 14px;
    }
    label {
      display: block;
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #374151;
    }
    input, select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font: inherit;
      background: #fff;
      color: inherit;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .swap {
      background: var(--primary-weak);
      color: var(--primary);
      border: 1px solid #c7d2fe;
      min-width: 72px;
    }
    .favorite-btn {
      background: var(--primary);
      color: #fff;
      margin-top: 12px;
    }
    .result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #c7d2fe;
      background: #eef2ff;
    }
    .result strong {
      font-size: 1.28rem;
      color: #3730a3;
      word-break: break-all;
    }
    .table-wrap {
      overflow-x: auto;
      margin-top: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 9px;
      font-size: 0.9rem;
      text-align: left;
    }
    th {
      color: #374151;
      background: #f9fafb;
      position: sticky;
      top: 0;
    }
    .favorites {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .fav-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
    }
    .fav-item .go {
      background: #111827;
      color: #fff;
      padding: 7px 9px;
      border-radius: 8px;
      font-size: 0.8rem;
    }
    .fav-item .remove {
      background: #fee2e2;
      color: #b91c1c;
      margin-left: 6px;
      padding: 7px 9px;
      border-radius: 8px;
      font-size: 0.8rem;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 560px) {
      body { padding: 14px; }
      .grid { grid-template-columns: 1fr; }
      .swap { width: 100%; }
    }
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>만능 단위 변환기</h1>
      <p class="sub">길이 · 무게 · 온도 · 속도 · 면적 · 부피 · 데이터 · 시간 단위를 실시간으로 변환하세요.</p>

      <div class="grid">
        <div>
          <label for="category">카테고리</label>
          <select id="category"></select>
        </div>
        <div>
          <label for="fromUnit">변환 전 단위</label>
          <select id="fromUnit"></select>
        </div>
        <div>
          <label for="toUnit">변환 후 단위</label>
          <select id="toUnit"></select>
        </div>
        <button class="swap" id="swapBtn">↔ 교체</button>
      </div>

      <div class="grid" style="grid-template-columns:1fr; margin-top:10px;">
        <div>
          <label for="inputValue">입력 값</label>
          <input id="inputValue" type="number" step="any" value="1" />
        </div>
      </div>

      <button class="favorite-btn" id="saveFavoriteBtn">현재 변환 즐겨찾기 추가</button>

      <div class="result" id="resultBox">
        <div>결과</div>
        <strong id="resultText">-</strong>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>단위</th><th>변환값</th></tr>
          </thead>
          <tbody id="allResults"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2 style="margin:0; font-size:1.1rem;">즐겨찾기 변환</h2>
      <p class="sub" style="margin-top:4px;">자주 쓰는 변환 조합을 저장해 빠르게 불러올 수 있습니다.</p>
      <div class="favorites" id="favoritesList"></div>
    </section>
  </main>

  <script>
    const DATA = {
      length: {
        label: "길이",
        units: {
          m: ["미터 (m)", 1],
          km: ["킬로미터 (km)", 1000],
          cm: ["센티미터 (cm)", 0.01],
          mm: ["밀리미터 (mm)", 0.001],
          in: ["인치 (in)", 0.0254],
          ft: ["피트 (ft)", 0.3048],
          yd: ["야드 (yd)", 0.9144],
          mi: ["마일 (mi)", 1609.344]
        }
      },
      weight: {
        label: "무게",
        units: {
          kg: ["킬로그램 (kg)", 1],
          g: ["그램 (g)", 0.001],
          mg: ["밀리그램 (mg)", 0.000001],
          t: ["톤 (t)", 1000],
          lb: ["파운드 (lb)", 0.45359237],
          oz: ["온스 (oz)", 0.028349523125]
        }
      },
      temperature: {
        label: "온도",
        units: {
          C: ["섭씨 (°C)"],
          F: ["화씨 (°F)"],
          K: ["켈빈 (K)"]
        }
      },
      speed: {
        label: "속도",
        units: {
          ms: ["m/s", 1],
          kmh: ["km/h", 0.2777777778],
          mph: ["mph", 0.44704],
          knot: ["노트 (kn)", 0.514444]
        }
      },
      area: {
        label: "면적",
        units: {
          m2: ["제곱미터 (m²)", 1],
          km2: ["제곱킬로미터 (km²)", 1000000],
          cm2: ["제곱센티미터 (cm²)", 0.0001],
          ha: ["헥타르 (ha)", 10000],
          acre: ["에이커 (acre)", 4046.8564224],
          ft2: ["제곱피트 (ft²)", 0.09290304],
          py: ["평", 3.305785]
        }
      },
      volume: {
        label: "부피",
        units: {
          l: ["리터 (L)", 1],
          ml: ["밀리리터 (mL)", 0.001],
          m3: ["세제곱미터 (m³)", 1000],
          gal: ["갤런 (US)", 3.785411784],
          qt: ["쿼트 (US)", 0.946352946],
          cup: ["컵 (US)", 0.2365882365]
        }
      },
      data: {
        label: "데이터",
        units: {
          b: ["비트 (b)", 0.125],
          B: ["바이트 (B)", 1],
          KB: ["KB", 1024],
          MB: ["MB", 1048576],
          GB: ["GB", 1073741824],
          TB: ["TB", 1099511627776]
        }
      },
      time: {
        label: "시간",
        units: {
          s: ["초 (s)", 1],
          min: ["분 (min)", 60],
          h: ["시간 (h)", 3600],
          day: ["일 (day)", 86400],
          week: ["주 (week)", 604800],
          month: ["월 (30일)", 2592000],
          year: ["년 (365일)", 31536000]
        }
      }
    };

    const FAVORITE_KEY = "unit-converter-favorites-v1";

    const categoryEl = document.getElementById("category");
    const fromUnitEl = document.getElementById("fromUnit");
    const toUnitEl = document.getElementById("toUnit");
    const inputValueEl = document.getElementById("inputValue");
    const resultTextEl = document.getElementById("resultText");
    const allResultsEl = document.getElementById("allResults");
    const favoritesListEl = document.getElementById("favoritesList");

    function formatNumber(num) {
      if (!Number.isFinite(num)) return "-";
      if (Math.abs(num) >= 1000000 || (Math.abs(num) > 0 && Math.abs(num) < 0.000001)) {
        return num.toExponential(6);
      }
      return new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 10 }).format(num);
    }

    function convertTemperature(value, from, to) {
      let c;
      if (from === "C") c = value;
      if (from === "F") c = (value - 32) * 5 / 9;
      if (from === "K") c = value - 273.15;
      if (to === "C") return c;
      if (to === "F") return c * 9 / 5 + 32;
      if (to === "K") return c + 273.15;
      return value;
    }

    function convertValue(category, value, from, to) {
      if (category === "temperature") return convertTemperature(value, from, to);
      const fromFactor = DATA[category].units[from][1];
      const toFactor = DATA[category].units[to][1];
      return value * fromFactor / toFactor;
    }

    function buildCategoryOptions() {
      categoryEl.innerHTML = Object.entries(DATA)
        .map(([key, cfg]) => `<option value="${key}">${cfg.label}</option>`)
        .join("");
    }

    function buildUnitOptions(category) {
      const units = DATA[category].units;
      const options = Object.entries(units)
        .map(([key, [label]]) => `<option value="${key}">${label}</option>`)
        .join("");
      fromUnitEl.innerHTML = options;
      toUnitEl.innerHTML = options;

      const keys = Object.keys(units);
      fromUnitEl.value = keys[0];
      toUnitEl.value = keys[1] || keys[0];
    }

    function renderAllResults() {
      const category = categoryEl.value;
      const value = parseFloat(inputValueEl.value);
      if (!Number.isFinite(value)) {
        allResultsEl.innerHTML = `<tr><td colspan="2">숫자를 입력해 주세요.</td></tr>`;
        resultTextEl.textContent = "-";
        return;
      }

      const from = fromUnitEl.value;
      const to = toUnitEl.value;
      const converted = convertValue(category, value, from, to);

      const fromLabel = DATA[category].units[from][0];
      const toLabel = DATA[category].units[to][0];
      resultTextEl.textContent = `${formatNumber(converted)} ${toLabel}`;

      const rows = Object.entries(DATA[category].units)
        .map(([unitKey, [unitLabel]]) => {
          const out = convertValue(category, value, from, unitKey);
          return `<tr><td>${unitLabel}</td><td>${formatNumber(out)}</td></tr>`;
        }).join("");
      allResultsEl.innerHTML = rows;
    }

    function swapUnits() {
      const currentFrom = fromUnitEl.value;
      fromUnitEl.value = toUnitEl.value;
      toUnitEl.value = currentFrom;
      renderAllResults();
    }

    function getFavorites() {
      try {
        const parsed = JSON.parse(localStorage.getItem(FAVORITE_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveFavorites(favorites) {
      localStorage.setItem(FAVORITE_KEY, JSON.stringify(favorites.slice(0, 30)));
    }

    function renderFavorites() {
      const favorites = getFavorites();
      if (!favorites.length) {
        favoritesListEl.innerHTML = `<div class="sub">아직 저장된 즐겨찾기가 없습니다.</div>`;
        return;
      }

      favoritesListEl.innerHTML = favorites.map((fav, idx) => {
        const cLabel = DATA[fav.category]?.label || fav.category;
        const fromLabel = DATA[fav.category]?.units?.[fav.from]?.[0] || fav.from;
        const toLabel = DATA[fav.category]?.units?.[fav.to]?.[0] || fav.to;
        return `
          <div class="fav-item">
            <div><strong>${cLabel}</strong> · ${fromLabel} → ${toLabel}</div>
            <div>
              <button class="go" data-idx="${idx}" data-act="go">불러오기</button>
              <button class="remove" data-idx="${idx}" data-act="remove">삭제</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function addCurrentFavorite() {
      const favorite = {
        category: categoryEl.value,
        from: fromUnitEl.value,
        to: toUnitEl.value
      };
      const favorites = getFavorites();
      const exists = favorites.some(item => item.category === favorite.category && item.from === favorite.from && item.to === favorite.to);
      if (!exists) {
        favorites.unshift(favorite);
        saveFavorites(favorites);
        renderFavorites();
      }
    }

    function handleFavoriteClick(event) {
      const btn = event.target.closest("button[data-act]");
      if (!btn) return;
      const idx = Number(btn.dataset.idx);
      const favorites = getFavorites();
      const item = favorites[idx];
      if (!item) return;

      if (btn.dataset.act === "remove") {
        favorites.splice(idx, 1);
        saveFavorites(favorites);
        renderFavorites();
        return;
      }

      categoryEl.value = item.category;
      buildUnitOptions(item.category);
      fromUnitEl.value = item.from;
      toUnitEl.value = item.to;
      renderAllResults();
    }

    categoryEl.addEventListener("change", () => {
      buildUnitOptions(categoryEl.value);
      renderAllResults();
    });
    [fromUnitEl, toUnitEl, inputValueEl].forEach(el => el.addEventListener("input", renderAllResults));
    document.getElementById("swapBtn").addEventListener("click", swapUnits);
    document.getElementById("saveFavoriteBtn").addEventListener("click", addCurrentFavorite);
    favoritesListEl.addEventListener("click", handleFavoriteClick);

    buildCategoryOptions();
    buildUnitOptions("length");
    renderAllResults();
    renderFavorites();
  </script>
</body>
</html>
