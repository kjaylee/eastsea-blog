<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upsell Attach Rate Revenue Calculator | 업셀 부착률 매출 계산기</title>
  <meta name="description" content="업셀 부착률 개선 시 추가 주문, 매출총이익, 순효과, ROI, 손익분기 부착률을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.14rem,2.7vw,1.72rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.45}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f2447;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}
    .card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.01rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:104px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.08rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:.98rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>📦 업셀 부착률 매출 계산기</h1>
        <div class="sub">핵심 상품 주문량 대비 업셀 부착률 목표를 입력하면 추가 매출, 순효과, ROI, 손익분기 부착률을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값</h2>
        <div class="inputs">
          <div><label for="baseOrders">월 핵심상품 주문 수 (건)</label><input id="baseOrders" type="number" min="1" value="14000" /></div>
          <div><label for="currentAttach">현재 업셀 부착률 (%)</label><input id="currentAttach" type="number" min="0" max="100" step="0.1" value="11" /></div>
          <div><label for="targetAttach">목표 업셀 부착률 (%)</label><input id="targetAttach" type="number" min="0" max="100" step="0.1" value="16" /></div>
          <div><label for="upsellPrice">업셀 상품 정가 (KRW)</label><input id="upsellPrice" type="number" min="1000" value="39000" /></div>
          <div><label for="discountRate">업셀 평균 할인율 (%)</label><input id="discountRate" type="number" min="0" max="95" step="0.1" value="12" /></div>
          <div><label for="upsellMargin">업셀 매출총이익률 (%)</label><input id="upsellMargin" type="number" min="1" max="100" step="0.1" value="55" /></div>
          <div><label for="feeRate">결제/플랫폼 수수료율 (%)</label><input id="feeRate" type="number" min="0" max="50" step="0.1" value="3.4" /></div>
          <div><label for="enablementCost">월 운영/교육 비용 (KRW)</label><input id="enablementCost" type="number" min="0" value="1800000" /></div>
          <div><label for="setupCost">도입 일회성 비용 (KRW)</label><input id="setupCost" type="number" min="0" value="8500000" /></div>
          <div><label for="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="60" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 추가 업셀 주문</div><div id="incrementalOrders" class="v">-</div></div>
          <div class="kpi"><div class="k">월 추가 업셀 매출</div><div id="incrementalRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순효과</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k">분석기간 순효과</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">추가 지표</h2>
        <table>
          <tbody>
            <tr><th>할인 반영 업셀 판매단가</th><td id="effectivePrice">-</td></tr>
            <tr><th>월 추가 매출총이익</th><td id="incrementalGrossProfit">-</td></tr>
            <tr><th>월 수수료 비용</th><td id="feeCost">-</td></tr>
            <tr><th>현재 업셀 주문(월)</th><td id="currentUpsellOrders">-</td></tr>
            <tr><th>목표 업셀 주문(월)</th><td id="targetUpsellOrders">-</td></tr>
            <tr><th>손익분기 목표 부착률</th><td id="breakEvenAttach">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      baseOrders:$("baseOrders"), currentAttach:$("currentAttach"), targetAttach:$("targetAttach"), upsellPrice:$("upsellPrice"), discountRate:$("discountRate"), upsellMargin:$("upsellMargin"),
      feeRate:$("feeRate"), enablementCost:$("enablementCost"), setupCost:$("setupCost"), months:$("months"),
      incrementalOrders:$("incrementalOrders"), incrementalRevenue:$("incrementalRevenue"), monthlyNet:$("monthlyNet"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      effectivePrice:$("effectivePrice"), incrementalGrossProfit:$("incrementalGrossProfit"), feeCost:$("feeCost"), currentUpsellOrders:$("currentUpsellOrders"), targetUpsellOrders:$("targetUpsellOrders"), breakEvenAttach:$("breakEvenAttach"),
      error:$("error"), status:$("status"), summary:$("summary"), copy:$("copy"), reset:$("reset")
    };

    const defaults = { baseOrders:14000, currentAttach:11, targetAttach:16, upsellPrice:39000, discountRate:12, upsellMargin:55, feeRate:3.4, enablementCost:1800000, setupCost:8500000, months:12 };
    const money = (n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(n||0);
    const num = (n,d=2)=>Number(n).toLocaleString("ko-KR",{maximumFractionDigits:d});

    function validate(v){
      if (!Number.isFinite(v.baseOrders) || v.baseOrders < 1) return "월 핵심상품 주문 수는 1 이상이어야 합니다.";
      if (!Number.isFinite(v.currentAttach) || v.currentAttach < 0 || v.currentAttach > 100) return "현재 부착률은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.targetAttach) || v.targetAttach < 0 || v.targetAttach > 100) return "목표 부착률은 0~100% 범위여야 합니다.";
      if (v.targetAttach < v.currentAttach) return "목표 부착률은 현재 부착률 이상이어야 합니다.";
      if (!Number.isFinite(v.upsellPrice) || v.upsellPrice <= 0) return "업셀 상품 정가는 0보다 커야 합니다.";
      if (!Number.isFinite(v.discountRate) || v.discountRate < 0 || v.discountRate >= 100) return "평균 할인율은 0 이상 100 미만이어야 합니다.";
      if (!Number.isFinite(v.upsellMargin) || v.upsellMargin <= 0 || v.upsellMargin > 100) return "업셀 매출총이익률은 0 초과 100 이하 범위여야 합니다.";
      if (!Number.isFinite(v.feeRate) || v.feeRate < 0 || v.feeRate > 100) return "수수료율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.enablementCost) || v.enablementCost < 0) return "월 운영/교육 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return "도입 일회성 비용은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 60) return "분석 기간은 1~60개월 범위여야 합니다.";
      return "";
    }

    function compute(v){
      const current = v.currentAttach / 100;
      const target = v.targetAttach / 100;
      const marginRate = v.upsellMargin / 100;
      const fee = v.feeRate / 100;
      const effectivePrice = v.upsellPrice * (1 - v.discountRate / 100);

      const currentUpsellOrders = v.baseOrders * current;
      const targetUpsellOrders = v.baseOrders * target;
      const incrementalOrders = Math.max(0, targetUpsellOrders - currentUpsellOrders);

      const incrementalRevenue = incrementalOrders * effectivePrice;
      const incrementalGrossProfit = incrementalRevenue * marginRate;
      const feeCost = incrementalRevenue * fee;
      const monthlyNet = incrementalGrossProfit - feeCost - v.enablementCost;
      const periodNet = monthlyNet * v.months - v.setupCost;

      const investment = (feeCost + v.enablementCost) * v.months + v.setupCost;
      const roi = investment === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / investment) * 100;
      const payback = monthlyNet > 0 ? v.setupCost / monthlyNet : Infinity;

      const netPerUpsellOrder = effectivePrice * (marginRate - fee);
      const breakEvenAttach = (netPerUpsellOrder <= 0 || v.baseOrders <= 0)
        ? Infinity
        : ((currentUpsellOrders + (v.enablementCost / netPerUpsellOrder)) / v.baseOrders) * 100;

      return { effectivePrice, currentUpsellOrders, targetUpsellOrders, incrementalOrders, incrementalRevenue, incrementalGrossProfit, feeCost, monthlyNet, periodNet, roi, payback, breakEvenAttach };
    }

    function resetOutputs(){
      ["incrementalOrders","incrementalRevenue","monthlyNet","periodNet","roi","payback","effectivePrice","incrementalGrossProfit","feeCost","currentUpsellOrders","targetUpsellOrders","breakEvenAttach"].forEach((k)=>refs[k].textContent='-');
      refs.summary.value = "";
    }

    function render(){
      const v = {
        baseOrders:Number(refs.baseOrders.value), currentAttach:Number(refs.currentAttach.value), targetAttach:Number(refs.targetAttach.value), upsellPrice:Number(refs.upsellPrice.value), discountRate:Number(refs.discountRate.value), upsellMargin:Number(refs.upsellMargin.value),
        feeRate:Number(refs.feeRate.value), enablementCost:Number(refs.enablementCost.value), setupCost:Number(refs.setupCost.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = "입력값을 확인하세요";
        resetOutputs();
        return;
      }

      const r = compute(v);
      refs.incrementalOrders.textContent = `${num(r.incrementalOrders,1)}건`;
      refs.incrementalRevenue.textContent = money(r.incrementalRevenue);
      refs.monthlyNet.textContent = money(r.monthlyNet);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞');
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가';

      refs.effectivePrice.textContent = money(r.effectivePrice);
      refs.incrementalGrossProfit.textContent = money(r.incrementalGrossProfit);
      refs.feeCost.textContent = money(r.feeCost);
      refs.currentUpsellOrders.textContent = `${num(r.currentUpsellOrders,1)}건`;
      refs.targetUpsellOrders.textContent = `${num(r.targetUpsellOrders,1)}건`;
      refs.breakEvenAttach.textContent = (Number.isFinite(r.breakEvenAttach) && r.breakEvenAttach <= 100) ? `${num(r.breakEvenAttach,2)}%` : '달성 불가';

      refs.status.innerHTML = r.monthlyNet >= 0
        ? `<span class="ok">●</span> 월 ${money(r.monthlyNet)} 순효과 개선`
        : `<span class="warn">●</span> 월 ${money(Math.abs(r.monthlyNet))} 순효과 감소`;

      refs.summary.value = [
        "[Upsell Attach Rate Revenue 요약]",
        `월 추가 업셀 주문: ${num(r.incrementalOrders,1)}건`,
        `할인 반영 업셀 판매단가: ${money(r.effectivePrice)}`,
        `월 추가 업셀 매출: ${money(r.incrementalRevenue)}`,
        `월 추가 매출총이익: ${money(r.incrementalGrossProfit)}`,
        `월 순효과: ${money(r.monthlyNet)}`,
        `${v.months}개월 순효과(도입비 반영): ${money(r.periodNet)}`,
        `ROI: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? '∞' : '-∞')}`,
        `회수기간: ${Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가'}`,
        `손익분기 목표 부착률: ${(Number.isFinite(r.breakEvenAttach) && r.breakEvenAttach <= 100) ? `${num(r.breakEvenAttach,2)}%` : '달성 불가'}`
      ].join("\n");
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('복사 권한이 없어 수동 복사를 해주세요.'); }
    });

    refs.reset.addEventListener('click', ()=>{ Object.entries(defaults).forEach(([k,v])=>refs[k].value=v); render(); });

    [refs.baseOrders,refs.currentAttach,refs.targetAttach,refs.upsellPrice,refs.discountRate,refs.upsellMargin,refs.feeRate,refs.enablementCost,refs.setupCost,refs.months].forEach((el)=>{
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
