<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upsell Conversion Profit Calculator | 업셀 전환 수익 계산기</title>
  <meta name="description" content="월 주문수, 업셀 부착률, 환불률, 원가/비용을 반영해 업셀 전략의 순이익, AOV 상승, 손익분기 부착률, 투자 회수기간을 계산합니다." />
  <style>
    :root{--bg:#10101f;--card:#1f1f38;--line:#3d3d69;--txt:#f3f3ff;--muted:#b9b9d8;--pri:#a78bfa;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#3b2f78 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.78rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.5}
    .home{color:#ede9fe;text-decoration:none;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#342f63;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(160deg,#312d59,#1c1b35);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#17162b;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#a78bfa,#7c3aed)}
    .soft{background:#3a3568;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f3640;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    textarea{margin-top:10px;min-height:104px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#1a1830;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#2f2a59;color:#efeaff;font-size:.76rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🛒 업셀 전환 수익 계산기</h1>
        <div class="sub">업셀 부착률/환불률과 원가·운영비를 반영해 월 순이익, AOV 상승, 손익분기 부착률, 회수기간을 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="monthlyOrders">월 주문수</label><input id="monthlyOrders" type="number" min="1" step="1" value="4200" /></div>
          <div><label for="baseAov">기존 AOV (KRW)</label><input id="baseAov" type="number" min="0" step="100" value="47000" /></div>
          <div><label for="attachRate">업셀 부착률 (%)</label><input id="attachRate" type="number" min="0" max="100" step="0.1" value="9.5" /></div>
          <div><label for="upsellPrice">업셀 판매가 (KRW)</label><input id="upsellPrice" type="number" min="1" step="100" value="19000" /></div>
          <div><label for="upsellCogs">업셀 원가 (1개, KRW)</label><input id="upsellCogs" type="number" min="0" step="10" value="5200" /></div>
          <div><label for="fulfillment">업셀 처리비 (1개, KRW)</label><input id="fulfillment" type="number" min="0" step="10" value="1300" /></div>
          <div><label for="refundRate">업셀 환불률 (%)</label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="5" /></div>
          <div><label for="toolCost">월 앱/툴 비용 (KRW)</label><input id="toolCost" type="number" min="0" step="1000" value="320000" /></div>
          <div><label for="adCost">월 추가 운영/광고비 (KRW)</label><input id="adCost" type="number" min="0" step="1000" value="450000" /></div>
          <div><label for="setupCost">초기 셋업비 (KRW)</label><input id="setupCost" type="number" min="0" step="1000" value="1800000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">월 순업셀 매출</div><div id="netUpsellRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">월 공헌이익</div><div id="contribution" class="v">-</div></div>
          <div class="kpi"><div class="k">월 순이익 (고정비 반영)</div><div id="netMonthlyProfit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">고정비 대비 ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k">AOV 상승분</div><div id="aovLift" class="v sm">-</div></div>
          <div class="kpi"><div class="k">업셀 적용 후 AOV</div><div id="newAov" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">세부 지표</h2>
        <table>
          <tbody>
            <tr><th>업셀 판매 수량</th><td id="upsellUnits">-</td></tr>
            <tr><th>환불 수량</th><td id="refundedUnits">-</td></tr>
            <tr><th>손익분기 부착률</th><td id="breakEvenAttach">-</td></tr>
            <tr><th>초기비용 회수기간</th><td id="paybackMonths">-</td></tr>
            <tr><th>월 고정비 (툴+운영)</th><td id="fixedCost">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      monthlyOrders: $('monthlyOrders'), baseAov: $('baseAov'), attachRate: $('attachRate'), upsellPrice: $('upsellPrice'), upsellCogs: $('upsellCogs'),
      fulfillment: $('fulfillment'), refundRate: $('refundRate'), toolCost: $('toolCost'), adCost: $('adCost'), setupCost: $('setupCost'),
      netUpsellRevenue: $('netUpsellRevenue'), contribution: $('contribution'), netMonthlyProfit: $('netMonthlyProfit'), roi: $('roi'), aovLift: $('aovLift'), newAov: $('newAov'),
      upsellUnits: $('upsellUnits'), refundedUnits: $('refundedUnits'), breakEvenAttach: $('breakEvenAttach'), paybackMonths: $('paybackMonths'), fixedCost: $('fixedCost'),
      status: $('status'), error: $('error'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = {
      monthlyOrders: 4200, baseAov: 47000, attachRate: 9.5, upsellPrice: 19000, upsellCogs: 5200, fulfillment: 1300, refundRate: 5, toolCost: 320000, adCost: 450000, setupCost: 1800000
    };

    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });
    const inRange = (v, min, max) => Number.isFinite(v) && v >= min && v <= max;

    function validate(v) {
      if (!Number.isFinite(v.monthlyOrders) || v.monthlyOrders <= 0) return '월 주문수는 1 이상이어야 합니다.';
      if (!Number.isFinite(v.baseAov) || v.baseAov < 0) return '기존 AOV는 0 이상이어야 합니다.';
      if (!inRange(v.attachRate, 0, 100)) return '업셀 부착률은 0~100 범위여야 합니다.';
      if (!Number.isFinite(v.upsellPrice) || v.upsellPrice <= 0) return '업셀 판매가는 0보다 커야 합니다.';
      if (!Number.isFinite(v.upsellCogs) || v.upsellCogs < 0) return '업셀 원가는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.fulfillment) || v.fulfillment < 0) return '업셀 처리비는 0 이상이어야 합니다.';
      if (!inRange(v.refundRate, 0, 100)) return '업셀 환불률은 0~100 범위여야 합니다.';
      if (!Number.isFinite(v.toolCost) || v.toolCost < 0) return '월 앱/툴 비용은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.adCost) || v.adCost < 0) return '월 추가 운영/광고비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.setupCost) || v.setupCost < 0) return '초기 셋업비는 0 이상이어야 합니다.';
      return '';
    }

    function compute(v) {
      const attachRate = v.attachRate / 100;
      const refundRate = v.refundRate / 100;

      const upsellUnits = v.monthlyOrders * attachRate;
      const refundedUnits = upsellUnits * refundRate;
      const grossUpsellRevenue = upsellUnits * v.upsellPrice;
      const refundAmount = refundedUnits * v.upsellPrice;
      const netUpsellRevenue = grossUpsellRevenue - refundAmount;

      const variableCost = upsellUnits * (v.upsellCogs + v.fulfillment);
      const contribution = netUpsellRevenue - variableCost;

      const fixedCost = v.toolCost + v.adCost;
      const netMonthlyProfit = contribution - fixedCost;
      const roi = fixedCost > 0 ? netMonthlyProfit / fixedCost : NaN;

      const aovLift = v.monthlyOrders > 0 ? netUpsellRevenue / v.monthlyOrders : 0;
      const newAov = v.baseAov + aovLift;

      const perUpsellContribution = v.upsellPrice * (1 - refundRate) - (v.upsellCogs + v.fulfillment);
      const breakEvenUnits = perUpsellContribution > 0 ? fixedCost / perUpsellContribution : Infinity;
      const breakEvenAttach = Number.isFinite(breakEvenUnits) && v.monthlyOrders > 0 ? (breakEvenUnits / v.monthlyOrders) * 100 : Infinity;

      const paybackMonths = v.setupCost > 0 && netMonthlyProfit > 0 ? v.setupCost / netMonthlyProfit : Infinity;

      return { upsellUnits, refundedUnits, netUpsellRevenue, contribution, fixedCost, netMonthlyProfit, roi, aovLift, newAov, breakEvenAttach, paybackMonths, perUpsellContribution };
    }

    function resetOutputs() {
      ['netUpsellRevenue','contribution','netMonthlyProfit','roi','aovLift','newAov','upsellUnits','refundedUnits','breakEvenAttach','paybackMonths','fixedCost'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function fmtMaybe(v, formatter) {
      return Number.isFinite(v) ? formatter(v) : 'N/A';
    }

    function render() {
      const v = {
        monthlyOrders: Number(refs.monthlyOrders.value),
        baseAov: Number(refs.baseAov.value),
        attachRate: Number(refs.attachRate.value),
        upsellPrice: Number(refs.upsellPrice.value),
        upsellCogs: Number(refs.upsellCogs.value),
        fulfillment: Number(refs.fulfillment.value),
        refundRate: Number(refs.refundRate.value),
        toolCost: Number(refs.toolCost.value),
        adCost: Number(refs.adCost.value),
        setupCost: Number(refs.setupCost.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        resetOutputs();
        return;
      }

      const r = compute(v);
      if (r.perUpsellContribution <= 0) {
        refs.error.classList.add('show');
        refs.error.textContent = '업셀 1건당 공헌이익이 0 이하입니다. 가격/원가/환불률을 조정하세요.';
      }

      refs.netUpsellRevenue.textContent = won(r.netUpsellRevenue);
      refs.contribution.textContent = won(r.contribution);
      refs.netMonthlyProfit.textContent = won(r.netMonthlyProfit);
      refs.roi.textContent = fmtMaybe(r.roi, (x) => `${num(x * 100, 1)}%`);
      refs.aovLift.textContent = won(r.aovLift);
      refs.newAov.textContent = won(r.newAov);

      refs.upsellUnits.textContent = `${num(r.upsellUnits, 1)}건`;
      refs.refundedUnits.textContent = `${num(r.refundedUnits, 1)}건`;
      refs.breakEvenAttach.textContent = fmtMaybe(r.breakEvenAttach, (x) => `${num(x, 2)}%`);
      refs.paybackMonths.textContent = fmtMaybe(r.paybackMonths, (x) => `${num(x, 2)}개월`);
      refs.fixedCost.textContent = won(r.fixedCost);

      if (r.netMonthlyProfit > 0) {
        refs.status.innerHTML = `<span class="good">●</span> 월 순이익 ${won(r.netMonthlyProfit)} (회수 ${fmtMaybe(r.paybackMonths, (x) => num(x,1)+'개월')})`;
      } else if (Math.abs(r.netMonthlyProfit) < 1) {
        refs.status.innerHTML = `<span class="warn">●</span> 손익분기점 수준`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> 월 손실 ${won(Math.abs(r.netMonthlyProfit))} — 부착률/원가 구조 점검 필요`;
      }

      refs.summary.value = [
        '[Upsell Conversion Profit 요약]',
        `월 업셀 수량(환불 전/후): ${num(r.upsellUnits,1)} / ${num(r.upsellUnits - r.refundedUnits,1)}건`,
        `순업셀매출: ${won(r.netUpsellRevenue)}`,
        `월 공헌이익: ${won(r.contribution)}`,
        `월 고정비: ${won(r.fixedCost)}`,
        `월 순이익: ${won(r.netMonthlyProfit)}`,
        `손익분기 부착률: ${fmtMaybe(r.breakEvenAttach, (x) => num(x,2)+'%')}`,
        `AOV: ${won(v.baseAov)} → ${won(r.newAov)}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.monthlyOrders, refs.baseAov, refs.attachRate, refs.upsellPrice, refs.upsellCogs, refs.fulfillment, refs.refundRate, refs.toolCost, refs.adCost, refs.setupCost].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
