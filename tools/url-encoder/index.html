<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL 인코더/디코더 | URL Encoder/Decoder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #495057;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px var(--shadow);
            margin-bottom: 20px;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px var(--shadow);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px var(--shadow);
            transition: transform 0.2s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            resize: vertical;
            margin-bottom: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border);
            box-shadow: none;
        }

        .info-box {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .info-box h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .info-box ul {
            margin-left: 20px;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #28a745;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
            animation: slideIn 0.3s ease;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="container">
        <a href="../" class="back-button">← 뒤로 가기</a>

        <header>
            <h1>🔗 URL 인코더/디코더</h1>
            <p style="color: var(--text-secondary);">URL을 인코딩하거나 디코딩하세요</p>
        </header>

        <div class="card">
            <label>원본 텍스트</label>
            <textarea id="input-text" placeholder="예: https://example.com/search?q=한글 검색어&page=1"></textarea>
            
            <div class="button-group">
                <button onclick="encode()">🔒 인코딩</button>
                <button onclick="encodeComponent()">🔐 인코딩 (Component)</button>
                <button class="secondary" onclick="clearInput()">지우기</button>
            </div>
        </div>

        <div class="card">
            <label>인코딩된 텍스트</label>
            <textarea id="output-text" placeholder="예: https://example.com/search?q=%ED%95%9C%EA%B8%80%20%EA%B2%80%EC%83%89%EC%96%B4&page=1"></textarea>
            
            <div class="button-group">
                <button onclick="decode()">🔓 디코딩</button>
                <button onclick="decodeComponent()">🔑 디코딩 (Component)</button>
                <button class="secondary" onclick="copyOutput()">📋 복사</button>
            </div>
        </div>

        <div class="info-box">
            <h3>💡 사용 가이드</h3>
            <ul>
                <li><strong>인코딩</strong>: URL에 안전한 문자로 변환 (공백 → %20)</li>
                <li><strong>인코딩 (Component)</strong>: 쿼리 파라미터 등 부분 인코딩 (/, ? 등도 변환)</li>
                <li><strong>디코딩</strong>: %XX 형태를 원래 문자로 복원</li>
                <li><strong>사용 예</strong>: API 호출 시 한글 파라미터 전달, URL 쿼리스트링 생성</li>
            </ul>
        </div>
    </div>

    <div class="toast" id="toast">복사되었습니다! 📋</div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function encode() {
            const input = document.getElementById('input-text').value;
            try {
                const encoded = encodeURI(input);
                document.getElementById('output-text').value = encoded;
            } catch (e) {
                alert('⚠️ 인코딩 중 오류가 발생했습니다: ' + e.message);
            }
        }

        function encodeComponent() {
            const input = document.getElementById('input-text').value;
            try {
                const encoded = encodeURIComponent(input);
                document.getElementById('output-text').value = encoded;
            } catch (e) {
                alert('⚠️ 인코딩 중 오류가 발생했습니다: ' + e.message);
            }
        }

        function decode() {
            const input = document.getElementById('output-text').value;
            try {
                const decoded = decodeURI(input);
                document.getElementById('input-text').value = decoded;
            } catch (e) {
                alert('⚠️ 디코딩 중 오류가 발생했습니다: ' + e.message);
            }
        }

        function decodeComponent() {
            const input = document.getElementById('output-text').value;
            try {
                const decoded = decodeURIComponent(input);
                document.getElementById('input-text').value = decoded;
            } catch (e) {
                alert('⚠️ 디코딩 중 오류가 발생했습니다: ' + e.message);
            }
        }

        function clearInput() {
            document.getElementById('input-text').value = '';
            document.getElementById('output-text').value = '';
        }

        function copyOutput() {
            const output = document.getElementById('output-text').value;
            if (!output) {
                alert('⚠️ 복사할 내용이 없습니다');
                return;
            }
            
            navigator.clipboard.writeText(output).then(() => {
                showToast();
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 샘플 데이터
        document.getElementById('input-text').value = 'https://example.com/search?q=한글 검색어&page=1';
    </script>
</body>
</html>
