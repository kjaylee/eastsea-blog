<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>URL Shortener (Client-side Hash) - URL 해시 단축기</title>
  <style>
    :root{--bg:#0e1324;--panel:#141d38;--panel2:#1a2648;--line:rgba(255,255,255,.13);--text:#ecf2ff;--muted:#9eb0da;--accent:#6aa6ff}
    *{box-sizing:border-box}
    body{margin:0;padding:20px;font-family:Inter,system-ui,"Noto Sans KR",sans-serif;color:var(--text);
      background:radial-gradient(1000px 420px at 20% -20%,#23325d 0,transparent 62%),var(--bg)}
    .wrap{max-width:920px;margin:0 auto;display:grid;gap:14px}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;padding:16px}
    h1{margin:0 0 6px;font-size:1.2rem}.sub{margin:0;color:var(--muted);font-size:.9rem}
    label{display:block;margin:10px 0 6px;color:#cfdbfa;font-size:.86rem}
    input,textarea,button{width:100%;border:1px solid var(--line);background:#101a34;color:var(--text);border-radius:12px;padding:10px 12px;font-size:.92rem}
    textarea{min-height:78px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    button{background:linear-gradient(135deg,var(--accent),#536bff);font-weight:700;border:none;cursor:pointer}
    .ghost{background:#111a33;border:1px solid var(--line)}
    .out{background:#0c1329;border:1px dashed var(--line);padding:10px;border-radius:12px;word-break:break-all}
    .small{font-size:.82rem;color:var(--muted)}
    .pill{display:inline-block;padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:#101a33;color:#cdddff;font-size:.78rem}
    .hidden{display:none}
    @media (max-width:760px){.row{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>URL Shortener (Client-side Hash)</h1>
      <p class="sub">서버 없이 URL을 해시(fragment)로 인코딩합니다. 같은 링크에서 복원/이동이 가능합니다.</p>

      <label for="longUrl">원본 URL</label>
      <textarea id="longUrl" placeholder="https://example.com/very/long?utm_source=..." spellcheck="false"></textarea>

      <div class="row">
        <button id="make">해시 링크 생성</button>
        <button id="pasteDecode" class="ghost">붙여넣기 후 복원</button>
      </div>

      <label for="shortUrl">생성된 링크</label>
      <div id="shortUrl" class="out">아직 생성된 링크가 없습니다.</div>
      <div style="margin-top:8px" class="row">
        <button id="copy" class="ghost">링크 복사</button>
        <button id="open" class="ghost">새 탭에서 열기</button>
      </div>
      <p id="stats" class="small">인코딩 정보를 여기에 표시합니다.</p>
    </section>

    <section id="resolver" class="card hidden">
      <div class="pill">Incoming Hash Link</div>
      <h2 style="margin:10px 0 8px;font-size:1.04rem">복원된 목적지 URL</h2>
      <div id="decoded" class="out"></div>
      <p class="small">3초 후 자동 이동합니다. 취소하려면 페이지에 머무르세요.</p>
      <div class="row">
        <button id="goNow">지금 이동</button>
        <button id="cancel" class="ghost">자동 이동 취소</button>
      </div>
    </section>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let currentShort = '';
    let redirectTimer = null;

    function normalizeUrl(v){
      v = (v || '').trim();
      if(!v) return '';
      if(!/^https?:\/\//i.test(v)) v = 'https://' + v;
      return v;
    }

    const bytesToB64Url = bytes => btoa(String.fromCharCode(...bytes)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const b64UrlToBytes = str => {
      const b64 = str.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((str.length+3)%4);
      const bin = atob(b64);
      return Uint8Array.from(bin, c => c.charCodeAt(0));
    };

    async function compressText(text){
      const encoder = new TextEncoder();
      const raw = encoder.encode(text);
      if(window.CompressionStream){
        const cs = new CompressionStream('gzip');
        const writer = cs.writable.getWriter();
        writer.write(raw); writer.close();
        const out = new Uint8Array(await new Response(cs.readable).arrayBuffer());
        return {mode:'gz', bytes:out};
      }
      return {mode:'b64', bytes:raw};
    }

    async function decompressText(mode, payload){
      const bytes = b64UrlToBytes(payload);
      if(mode === 'gz' && window.DecompressionStream){
        const ds = new DecompressionStream('gzip');
        const writer = ds.writable.getWriter();
        writer.write(bytes); writer.close();
        const out = new Uint8Array(await new Response(ds.readable).arrayBuffer());
        return new TextDecoder().decode(out);
      }
      return new TextDecoder().decode(bytes);
    }

    async function makeShort(){
      const url = normalizeUrl($('longUrl').value);
      if(!url){ alert('URL을 입력하세요.'); return; }
      try{ new URL(url); }catch{ alert('유효한 URL 형식이 아닙니다.'); return; }

      const packed = await compressText(url);
      const token = `${packed.mode}.${bytesToB64Url(packed.bytes)}`;
      currentShort = `${location.origin}${location.pathname}#u=${token}`;
      $('shortUrl').textContent = currentShort;

      const ratio = ((currentShort.length / url.length) * 100).toFixed(1);
      $('stats').textContent = `원본 ${url.length}자 → 링크 ${currentShort.length}자 (${ratio}%). 모드: ${packed.mode}`;
    }

    async function decodeFromLink(link){
      const input = link || $('longUrl').value.trim();
      let token = '';
      try{
        if(input.includes('#u=')) token = input.split('#u=')[1];
        else if(location.hash.startsWith('#u=')) token = location.hash.slice(3);
        else return null;
      }catch{return null;}
      if(!token || !token.includes('.')) return null;
      const [mode, payload] = token.split('.',2);
      try{
        const url = await decompressText(mode, payload);
        new URL(normalizeUrl(url));
        return normalizeUrl(url);
      }catch{return null;}
    }

    async function showResolver(url){
      $('resolver').classList.remove('hidden');
      $('decoded').textContent = url;
      if(redirectTimer) clearTimeout(redirectTimer);
      redirectTimer = setTimeout(() => location.href = url, 3000);
    }

    $('make').addEventListener('click', makeShort);

    $('copy').addEventListener('click', async ()=>{
      if(!currentShort){ alert('먼저 링크를 생성하세요.'); return; }
      await navigator.clipboard.writeText(currentShort);
      $('copy').textContent = '복사 완료!';
      setTimeout(()=> $('copy').textContent = '링크 복사', 1100);
    });

    $('open').addEventListener('click', ()=>{
      if(!currentShort){ alert('생성된 링크가 없습니다.'); return; }
      window.open(currentShort, '_blank', 'noopener');
    });

    $('pasteDecode').addEventListener('click', async ()=>{
      const decoded = await decodeFromLink();
      if(!decoded){ alert('해시 링크를 찾지 못했습니다.'); return; }
      $('decoded').textContent = decoded;
      $('resolver').classList.remove('hidden');
    });

    $('goNow').addEventListener('click', ()=>{
      const url = $('decoded').textContent.trim();
      if(url) location.href = url;
    });
    $('cancel').addEventListener('click', ()=>{
      if(redirectTimer) clearTimeout(redirectTimer);
      $('cancel').textContent = '취소됨';
      setTimeout(()=> $('cancel').textContent = '자동 이동 취소', 1000);
    });

    (async()=>{
      if(location.hash.startsWith('#u=')){
        const decoded = await decodeFromLink(location.href);
        if(decoded) showResolver(decoded);
      }
    })();
  </script>
</body>
</html>
