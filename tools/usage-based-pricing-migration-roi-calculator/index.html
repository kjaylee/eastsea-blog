<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usage-based Pricing Migration ROI Calculator | 사용량 과금 전환 ROI 계산기</title>
  <meta name="description" content="좌석형에서 사용량 기반 과금으로 전환할 때 월 순효과, ROI, 회수기간, 손익분기 usage 단가를 계산하는 비즈니스 수익화 도구" />
  <style>
    :root{--bg:#0f172a;--card:#13233f;--line:#29466d;--txt:#e5efff;--muted:#9fb6d9;--good:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 8% 0%,#1f3a67 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#183259;color:#dbeafe;border-radius:10px;padding:8px 11px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#173059,#11203b);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d36;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#1f406a;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#10213a;border:1px solid var(--line);border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#19375f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📦 사용량 과금 전환 ROI 계산기</h1>
        <div class="sub" id="subtitle">좌석형에서 usage-based 과금으로 전환할 때 수익성과 회수기간을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="langBtn" class="lang" type="button">EN</button>
        <a id="backLink" class="link" href="/">포털로</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값</h2>
        <div class="inputs">
          <div><label id="l_accounts" for="accounts"></label><input id="accounts" type="number" min="1" value="1800"></div>
          <div><label id="l_currentArpa" for="currentArpa"></label><input id="currentArpa" type="number" min="0" step="1000" value="96000"></div>
          <div><label id="l_currentUsage" for="currentUsage"></label><input id="currentUsage" type="number" min="0" step="1" value="120"></div>
          <div><label id="l_targetUnitPrice" for="targetUnitPrice"></label><input id="targetUnitPrice" type="number" min="0" step="1" value="900"></div>
          <div><label id="l_targetUsage" for="targetUsage"></label><input id="targetUsage" type="number" min="0" step="1" value="135"></div>
          <div><label id="l_grossMargin" for="grossMargin"></label><input id="grossMargin" type="number" min="0" max="100" step="0.1" value="82"></div>
          <div><label id="l_unitCost" for="unitCost"></label><input id="unitCost" type="number" min="0" step="1" value="120"></div>
          <div><label id="l_monthlyCost" for="monthlyCost"></label><input id="monthlyCost" type="number" min="0" step="10000" value="14000000"></div>
          <div><label id="l_setup" for="setup"></label><input id="setup" type="number" min="0" step="10000" value="28000000"></div>
          <div><label id="l_months" for="months"></label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_targetRevenue"></div><div class="v" id="targetRevenue">-</div></div>
          <div class="kpi"><div class="k" id="k_monthlyNet"></div><div class="v" id="monthlyNet">-</div></div>
          <div class="kpi"><div class="k" id="k_roi"></div><div class="v" id="roi">-</div></div>
          <div class="kpi"><div class="k" id="k_periodNet"></div><div class="v" id="periodNet">-</div></div>
          <div class="kpi"><div class="k" id="k_payback"></div><div class="v" id="payback">-</div></div>
          <div class="kpi"><div class="k" id="k_breakEvenPrice"></div><div class="v" id="breakEvenPrice">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_baseRevenue"></th><td id="baseRevenue">-</td></tr>
          <tr><th id="d_baseGross"></th><td id="baseGross">-</td></tr>
          <tr><th id="d_targetGross"></th><td id="targetGross">-</td></tr>
          <tr><th id="d_totalProgramCost"></th><td id="totalProgramCost">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={accounts:$("accounts"),currentArpa:$("currentArpa"),currentUsage:$("currentUsage"),targetUnitPrice:$("targetUnitPrice"),targetUsage:$("targetUsage"),grossMargin:$("grossMargin"),unitCost:$("unitCost"),monthlyCost:$("monthlyCost"),setup:$("setup"),months:$("months"),targetRevenue:$("targetRevenue"),monthlyNet:$("monthlyNet"),roi:$("roi"),periodNet:$("periodNet"),payback:$("payback"),breakEvenPrice:$("breakEvenPrice"),baseRevenue:$("baseRevenue"),baseGross:$("baseGross"),targetGross:$("targetGross"),totalProgramCost:$("totalProgramCost"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={accounts:1800,currentArpa:96000,currentUsage:120,targetUnitPrice:900,targetUsage:135,grossMargin:82,unitCost:120,monthlyCost:14000000,setup:28000000,months:12};
    const I18N={
      ko:{title:"📦 사용량 과금 전환 ROI 계산기",subtitle:"좌석형에서 usage-based 과금으로 전환할 때 수익성과 회수기간을 계산합니다.",inputHeader:"입력값",kpiHeader:"핵심 KPI",detailHeader:"세부 지표",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_accounts:"월 활성 계정 수",l_currentArpa:"현재 계정당 월 매출 (₩)",l_currentUsage:"현재 평균 사용량 (units/account)",l_targetUnitPrice:"목표 usage 단가 (₩/unit)",l_targetUsage:"목표 평균 사용량 (units/account)",l_grossMargin:"매출총이익률 (%)",l_unitCost:"과금/인프라 단위비용 (₩/unit)",l_monthlyCost:"월 운영비 (₩)",l_setup:"초기 전환비 (₩)",l_months:"분석 기간 (개월)",k_targetRevenue:"전환 후 월 매출",k_monthlyNet:"월 순효과",k_roi:"ROI",k_periodNet:"기간 순효과",k_payback:"회수기간",k_breakEvenPrice:"손익분기 usage 단가",d_baseRevenue:"현재 월 매출",d_baseGross:"현재 월 총이익",d_targetGross:"전환 후 월 총이익",d_totalProgramCost:"기간 총 프로그램비",ok:"Usage 과금 전환 경제성 계산 완료",warn:"현재 가정에서는 월 순효과가 음수입니다",invalid:"입력값을 확인해주세요",rangeErr:"비율 값은 0~100 범위여야 합니다.",numErr:"값은 0 이상, 계정수/기간은 1 이상이어야 합니다.",na:"계산 불가",copied:"요약이 복사되었습니다.",copyFail:"클립보드 사용 불가: 수동 복사하세요.",summaryTitle:"[Usage-based Pricing Migration 요약]",unitMonths:"개월"},
      en:{title:"📦 Usage-based Pricing Migration ROI Calculator",subtitle:"Estimate ROI, payback, and break-even unit price when migrating from seat-based pricing to usage-based billing.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Details",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_accounts:"Monthly active accounts",l_currentArpa:"Current monthly revenue per account (KRW)",l_currentUsage:"Current average usage (units/account)",l_targetUnitPrice:"Target usage unit price (KRW/unit)",l_targetUsage:"Target average usage (units/account)",l_grossMargin:"Gross margin (%)",l_unitCost:"Billing/infrastructure unit cost (KRW/unit)",l_monthlyCost:"Monthly operating cost (KRW)",l_setup:"One-time migration cost (KRW)",l_months:"Analysis period (months)",k_targetRevenue:"Post-migration monthly revenue",k_monthlyNet:"Monthly net impact",k_roi:"ROI",k_periodNet:"Cumulative net impact",k_payback:"Payback period",k_breakEvenPrice:"Break-even usage unit price",d_baseRevenue:"Current monthly revenue",d_baseGross:"Current monthly gross profit",d_targetGross:"Post-migration monthly gross profit",d_totalProgramCost:"Total program cost (period)",ok:"Usage migration economics ready",warn:"Monthly net impact is negative under current assumptions",invalid:"Please review inputs",rangeErr:"Rate values must be between 0 and 100.",numErr:"Values must be >= 0 and accounts/months must be >= 1.",na:"N/A",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[Usage-based Pricing Migration Summary]",unitMonths:"months"}
    };
    let lang="ko";
    const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});
    const pct=(n,d=1)=>`${num(n,d)}%`;

    function applyI18n(){
      document.documentElement.lang=lang;
      ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["accounts","currentArpa","currentUsage","targetUnitPrice","targetUsage","grossMargin","unitCost","monthlyCost","setup","months"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["targetRevenue","monthlyNet","roi","periodNet","payback","breakEvenPrice"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["baseRevenue","baseGross","targetGross","totalProgramCost"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if(!Number.isFinite(v.accounts)||v.accounts<1||!Number.isFinite(v.months)||v.months<1) return t("numErr");
      if([v.currentArpa,v.currentUsage,v.targetUnitPrice,v.targetUsage,v.unitCost,v.monthlyCost,v.setup].some((x)=>!Number.isFinite(x)||x<0)) return t("numErr");
      if(!Number.isFinite(v.grossMargin)||v.grossMargin<0||v.grossMargin>100) return t("rangeErr");
      return "";
    }

    function render(){
      const v={accounts:Number(refs.accounts.value),currentArpa:Number(refs.currentArpa.value),currentUsage:Number(refs.currentUsage.value),targetUnitPrice:Number(refs.targetUnitPrice.value),targetUsage:Number(refs.targetUsage.value),grossMargin:Number(refs.grossMargin.value),unitCost:Number(refs.unitCost.value),monthlyCost:Number(refs.monthlyCost.value),setup:Number(refs.setup.value),months:Number(refs.months.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["targetRevenue","monthlyNet","roi","periodNet","payback","breakEvenPrice","baseRevenue","baseGross","targetGross","totalProgramCost"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const gm=v.grossMargin/100;
      const baseRevenue=v.accounts*v.currentArpa;
      const targetRevenue=v.accounts*v.targetUsage*v.targetUnitPrice;
      const baseGross=(baseRevenue*gm)-(v.accounts*v.currentUsage*v.unitCost);
      const targetGross=(targetRevenue*gm)-(v.accounts*v.targetUsage*v.unitCost);
      const monthlyNet=(targetGross-baseGross)-v.monthlyCost;
      const periodNet=(monthlyNet*v.months)-v.setup;
      const totalProgramCost=(v.monthlyCost*v.months)+v.setup;
      const roi=totalProgramCost>0?(periodNet/totalProgramCost)*100:0;
      const payback=monthlyNet>0?(v.setup/monthlyNet):Infinity;

      let breakEvenPrice=Infinity;
      if(gm>0 && v.accounts>0 && v.targetUsage>0){
        const requiredTargetGross=baseGross+v.monthlyCost;
        breakEvenPrice=((requiredTargetGross/(v.accounts*v.targetUsage))+v.unitCost)/gm;
      }

      refs.targetRevenue.textContent=won(targetRevenue);
      refs.monthlyNet.textContent=won(monthlyNet);
      refs.roi.textContent=pct(roi,1);
      refs.periodNet.textContent=won(periodNet);
      refs.payback.textContent=Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na");
      refs.breakEvenPrice.textContent=Number.isFinite(breakEvenPrice)&&breakEvenPrice>=0?won(breakEvenPrice):t("na");
      refs.baseRevenue.textContent=won(baseRevenue);
      refs.baseGross.textContent=won(baseGross);
      refs.targetGross.textContent=won(targetGross);
      refs.totalProgramCost.textContent=won(totalProgramCost);
      refs.status.innerHTML=monthlyNet>=0?`<span style="color:var(--good)">●</span> ${t("ok")}`:`<span style="color:var(--warn)">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("d_baseRevenue")}: ${won(baseRevenue)}`,`${t("k_targetRevenue")}: ${won(targetRevenue)}`,`${t("d_baseGross")}: ${won(baseGross)}`,`${t("d_targetGross")}: ${won(targetGross)}`,`${t("k_monthlyNet")}: ${won(monthlyNet)}`,`${t("k_periodNet")}: ${won(periodNet)}`,`${t("k_breakEvenPrice")}: ${Number.isFinite(breakEvenPrice)&&breakEvenPrice>=0?won(breakEvenPrice):t("na")}`,`${t("k_payback")}: ${Number.isFinite(payback)?`${num(payback,1)} ${t("unitMonths")}`:t("na")}`,`${t("k_roi")}: ${pct(roi,1)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return; try{await navigator.clipboard.writeText(refs.summary.value); alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.accounts,refs.currentArpa,refs.currentUsage,refs.targetUnitPrice,refs.targetUsage,refs.grossMargin,refs.unitCost,refs.monthlyCost,refs.setup,refs.months].forEach((el)=>el.addEventListener("input",render));

    applyI18n(); render();
  </script>
</body>
</html>
