<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>중고거래 손익 계산기 | Used Goods Profit Calculator</title>
  <meta name="description" content="중고거래 판매가, 수수료, 배송비, 수리비를 반영해 순이익·이익률·손익분기 판매가를 계산하고 기록을 저장하세요." />
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-soft: #151533;
      --panel: #11112a;
      --panel-2: #1a1a3a;
      --line: #2d2d61;
      --text: #edf1ff;
      --muted: #99a4cc;
      --cyan: #2bd9ff;
      --violet: #ba7bff;
      --green: #39f8c3;
      --red: #ff6f92;
      --yellow: #ffd166;
      --shadow: 0 0 0 1px rgba(43, 217, 255, 0.15), 0 0 28px rgba(43, 217, 255, 0.1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 0% 0%, var(--bg-soft) 0%, var(--bg) 48%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px 14px 44px;
      line-height: 1.5;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .back-link, .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.83rem;
      text-decoration: none;
      color: var(--muted);
      background: rgba(17, 17, 42, 0.72);
      font-weight: 700;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: clamp(1.4rem, 4.3vw, 2.05rem);
      letter-spacing: 0.01em;
      text-shadow: 0 0 16px rgba(43, 217, 255, 0.35);
    }

    .desc {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(17, 17, 42, 0.96), rgba(10, 10, 26, 0.94));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 10px;
      color: #e1faff;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 650;
    }

    input, button {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.96rem;
    }

    input:focus, button:focus {
      outline: 2px solid var(--cyan);
      outline-offset: 1px;
      border-color: var(--cyan);
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .toggle-row input {
      width: 18px;
      min-height: 18px;
      margin: 0;
      accent-color: var(--cyan);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .btn-primary {
      border: none;
      color: #050512;
      font-weight: 800;
      background: linear-gradient(135deg, rgba(43, 217, 255, 0.96), rgba(186, 123, 255, 0.96));
    }

    .btn-sub {
      color: #ece2ff;
      font-weight: 700;
      background: rgba(186, 123, 255, 0.16);
      border-color: rgba(186, 123, 255, 0.5);
    }

    .btn-ghost {
      color: var(--muted);
      font-weight: 700;
      background: rgba(153, 164, 204, 0.09);
    }

    .btn-danger {
      color: #ffd5df;
      font-weight: 700;
      background: rgba(255, 111, 146, 0.12);
      border-color: rgba(255, 111, 146, 0.48);
    }

    .message {
      min-height: 1.3em;
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--yellow);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(24, 24, 54, 0.75);
      padding: 10px;
      min-height: 86px;
    }

    .metric .k {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .metric .v {
      font-size: clamp(1rem, 3.4vw, 1.28rem);
      font-weight: 800;
      color: var(--cyan);
      word-break: keep-all;
    }

    .metric .v.positive { color: var(--green); }
    .metric .v.negative { color: var(--red); }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: rgba(20, 20, 46, 0.78);
      display: grid;
      gap: 8px;
    }

    .history-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .history-title {
      font-weight: 760;
      font-size: 0.95rem;
    }

    .history-meta {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 3px;
      line-height: 1.4;
    }

    .profit-chip {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.76rem;
      font-weight: 780;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .chip-up {
      color: #b8ffe9;
      background: rgba(57, 248, 195, 0.14);
      border-color: rgba(57, 248, 195, 0.46);
    }

    .chip-down {
      color: #ffd0db;
      background: rgba(255, 111, 146, 0.14);
      border-color: rgba(255, 111, 146, 0.52);
    }

    .history-actions {
      display: flex;
      gap: 8px;
    }

    .history-actions button {
      min-height: 36px;
      font-size: 0.84rem;
      padding: 7px 10px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.79rem;
      margin-top: 10px;
    }

    @media (max-width: 860px) {
      .grid,
      .metrics,
      .actions {
        grid-template-columns: 1fr;
      }

      .history-main {
        flex-direction: column;
      }

      .history-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back-link" href="../">← 도구 목록</a>
      <span class="chip">중고거래 · 생활 계산기</span>
    </div>

    <h1>중고거래 손익 계산기</h1>
    <p class="desc">판매가와 각종 비용을 반영해 <strong>순이익/손익분기점</strong>을 계산하고 최근 기록을 저장합니다.</p>

    <section class="card" aria-labelledby="inputTitle">
      <h2 id="inputTitle">입력값</h2>
      <div class="grid">
        <div class="field">
          <label for="itemName">물품명</label>
          <input id="itemName" type="text" maxlength="50" placeholder="예: 아이패드 케이스" />
        </div>
        <div class="field">
          <label for="purchasePrice">구매가 (원)</label>
          <input id="purchasePrice" type="number" min="0" step="100" placeholder="50000" />
        </div>
        <div class="field">
          <label for="repairCost">수리/세척비 (원)</label>
          <input id="repairCost" type="number" min="0" step="100" placeholder="5000" />
        </div>
        <div class="field">
          <label for="shippingCost">포장/배송비 (원)</label>
          <input id="shippingCost" type="number" min="0" step="100" placeholder="3500" />
        </div>
        <div class="field">
          <label for="otherCost">기타비용 (원)</label>
          <input id="otherCost" type="number" min="0" step="100" placeholder="2000" />
        </div>
        <div class="field">
          <label for="feeRate">플랫폼 수수료율 (%)</label>
          <input id="feeRate" type="number" min="0" max="90" step="0.1" placeholder="10" />
        </div>
        <div class="field">
          <label for="salePrice">예상 판매가 (원)</label>
          <input id="salePrice" type="number" min="0" step="100" placeholder="80000" />
        </div>
        <div class="field">
          <label for="targetProfit">목표 순이익 (원)</label>
          <input id="targetProfit" type="number" min="0" step="100" placeholder="15000" />
        </div>
      </div>

      <div class="toggle-row">
        <input id="autoSave" type="checkbox" />
        <label for="autoSave">계산 시 최근 입력값 자동 저장</label>
      </div>
      <p class="hint">팁: 수수료율 0%~90% 사이 값을 권장합니다.</p>

      <div class="actions">
        <button id="calcBtn" class="btn-primary" type="button">계산하기</button>
        <button id="saveBtn" class="btn-sub" type="button">기록 저장</button>
        <button id="loadBtn" class="btn-ghost" type="button">마지막 값 불러오기</button>
        <button id="resetBtn" class="btn-danger" type="button">입력 초기화</button>
      </div>
      <p id="message" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="card" aria-labelledby="resultTitle">
      <h2 id="resultTitle">계산 결과</h2>
      <div class="metrics">
        <article class="metric"><span class="k">플랫폼 수수료</span><strong id="feeAmount" class="v">₩0</strong></article>
        <article class="metric"><span class="k">총원가</span><strong id="totalCost" class="v">₩0</strong></article>
        <article class="metric"><span class="k">순이익</span><strong id="netProfit" class="v">₩0</strong></article>
        <article class="metric"><span class="k">순이익률</span><strong id="profitMargin" class="v">0%</strong></article>
        <article class="metric"><span class="k">손익분기 판매가</span><strong id="breakEvenPrice" class="v">₩0</strong></article>
        <article class="metric"><span class="k">목표이익 달성 판매가</span><strong id="targetSalePrice" class="v">₩0</strong></article>
      </div>
    </section>

    <section class="card" aria-labelledby="historyTitle">
      <div class="history-head">
        <h2 id="historyTitle">최근 계산 기록</h2>
        <button id="clearHistoryBtn" class="btn-danger" type="button" style="width:auto;min-height:36px;padding:8px 11px;">기록 전체 삭제</button>
      </div>
      <div id="historyStats" class="hint" style="margin-top:0;margin-bottom:8px;">저장된 기록 0건</div>
      <div id="historyList" class="history-list"></div>
    </section>

    <p class="footer-note">모든 데이터는 브라우저 localStorage에만 저장됩니다.</p>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = "usedGoodsProfitCalculator.v1";
      const HISTORY_KEY = "usedGoodsProfitCalculator.history.v1";
      const HISTORY_LIMIT = 40;

      const els = {
        itemName: document.getElementById("itemName"),
        purchasePrice: document.getElementById("purchasePrice"),
        repairCost: document.getElementById("repairCost"),
        shippingCost: document.getElementById("shippingCost"),
        otherCost: document.getElementById("otherCost"),
        feeRate: document.getElementById("feeRate"),
        salePrice: document.getElementById("salePrice"),
        targetProfit: document.getElementById("targetProfit"),
        autoSave: document.getElementById("autoSave"),
        message: document.getElementById("message"),
        feeAmount: document.getElementById("feeAmount"),
        totalCost: document.getElementById("totalCost"),
        netProfit: document.getElementById("netProfit"),
        profitMargin: document.getElementById("profitMargin"),
        breakEvenPrice: document.getElementById("breakEvenPrice"),
        targetSalePrice: document.getElementById("targetSalePrice"),
        historyList: document.getElementById("historyList"),
        historyStats: document.getElementById("historyStats"),
        calcBtn: document.getElementById("calcBtn"),
        saveBtn: document.getElementById("saveBtn"),
        loadBtn: document.getElementById("loadBtn"),
        resetBtn: document.getElementById("resetBtn"),
        clearHistoryBtn: document.getElementById("clearHistoryBtn")
      };

      let lastResult = null;

      const toNumber = (value) => {
        const num = Number(value);
        return Number.isFinite(num) ? num : 0;
      };

      const won = (value) => new Intl.NumberFormat("ko-KR", {
        style: "currency",
        currency: "KRW",
        maximumFractionDigits: 0
      }).format(Math.round(value || 0));

      const percent = (value) => `${(Number.isFinite(value) ? value : 0).toFixed(2)}%`;

      const nowLabel = () => new Date().toLocaleString("ko-KR", { hour12: false });

      function setMessage(text, isError) {
        els.message.textContent = text || "";
        els.message.style.color = isError ? "var(--red)" : "var(--yellow)";
      }

      function getInputs() {
        const data = {
          itemName: els.itemName.value.trim(),
          purchasePrice: toNumber(els.purchasePrice.value),
          repairCost: toNumber(els.repairCost.value),
          shippingCost: toNumber(els.shippingCost.value),
          otherCost: toNumber(els.otherCost.value),
          feeRate: toNumber(els.feeRate.value),
          salePrice: toNumber(els.salePrice.value),
          targetProfit: toNumber(els.targetProfit.value)
        };

        if (!data.itemName) data.itemName = "이름 없는 물품";
        return data;
      }

      function validate(data) {
        if (data.feeRate < 0 || data.feeRate >= 100) {
          return "수수료율은 0 이상 100 미만으로 입력해 주세요.";
        }
        if (data.salePrice <= 0) {
          return "예상 판매가는 0보다 커야 합니다.";
        }
        if (["purchasePrice", "repairCost", "shippingCost", "otherCost", "targetProfit"].some((k) => data[k] < 0)) {
          return "비용과 목표 이익은 음수가 될 수 없습니다.";
        }
        return "";
      }

      function calculate() {
        const data = getInputs();
        const error = validate(data);
        if (error) {
          setMessage(error, true);
          return null;
        }

        const feeAmount = data.salePrice * (data.feeRate / 100);
        const fixedCosts = data.purchasePrice + data.repairCost + data.shippingCost + data.otherCost;
        const totalCost = fixedCosts + feeAmount;
        const netProfit = data.salePrice - totalCost;
        const profitMargin = data.salePrice ? (netProfit / data.salePrice) * 100 : 0;
        const denominator = 1 - data.feeRate / 100;
        const breakEvenPrice = denominator > 0 ? fixedCosts / denominator : 0;
        const targetSalePrice = denominator > 0 ? (fixedCosts + data.targetProfit) / denominator : 0;

        const result = {
          id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          createdAt: nowLabel(),
          ...data,
          feeAmount,
          fixedCosts,
          totalCost,
          netProfit,
          profitMargin,
          breakEvenPrice,
          targetSalePrice
        };

        drawResult(result);
        lastResult = result;

        if (els.autoSave.checked) {
          saveSettings();
        }

        setMessage("계산이 완료되었습니다. 필요하면 [기록 저장]을 눌러주세요.", false);
        return result;
      }

      function drawResult(result) {
        els.feeAmount.textContent = won(result.feeAmount);
        els.totalCost.textContent = won(result.totalCost);
        els.netProfit.textContent = won(result.netProfit);
        els.profitMargin.textContent = percent(result.profitMargin);
        els.breakEvenPrice.textContent = won(result.breakEvenPrice);
        els.targetSalePrice.textContent = won(result.targetSalePrice);

        els.netProfit.classList.remove("positive", "negative");
        els.profitMargin.classList.remove("positive", "negative");
        const trendClass = result.netProfit >= 0 ? "positive" : "negative";
        els.netProfit.classList.add(trendClass);
        els.profitMargin.classList.add(trendClass);
      }

      function saveSettings() {
        const settings = {
          autoSave: !!els.autoSave.checked,
          lastInputs: getInputs(),
          savedAt: new Date().toISOString()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      }

      function loadSettings() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          els.autoSave.checked = true;
          return;
        }

        try {
          const settings = JSON.parse(raw);
          els.autoSave.checked = settings.autoSave !== false;

          if (settings.lastInputs) {
            const i = settings.lastInputs;
            els.itemName.value = i.itemName || "";
            els.purchasePrice.value = i.purchasePrice || "";
            els.repairCost.value = i.repairCost || "";
            els.shippingCost.value = i.shippingCost || "";
            els.otherCost.value = i.otherCost || "";
            els.feeRate.value = Number.isFinite(i.feeRate) ? i.feeRate : "";
            els.salePrice.value = i.salePrice || "";
            els.targetProfit.value = i.targetProfit || "";
          }
        } catch (err) {
          els.autoSave.checked = true;
        }
      }

      function getHistory() {
        try {
          const arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
          return Array.isArray(arr) ? arr : [];
        } catch (err) {
          return [];
        }
      }

      function setHistory(items) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
      }

      function saveHistory(result) {
        const current = getHistory();
        current.unshift(result);
        setHistory(current);
        renderHistory();
      }

      function removeHistory(id) {
        const filtered = getHistory().filter((item) => item.id !== id);
        setHistory(filtered);
        renderHistory();
      }

      function renderHistory() {
        const history = getHistory();
        if (!history.length) {
          els.historyList.innerHTML = '<div class="empty">아직 저장된 기록이 없습니다. 계산 후 기록 저장을 눌러주세요.</div>';
          els.historyStats.textContent = "저장된 기록 0건";
          return;
        }

        const totalProfit = history.reduce((sum, h) => sum + toNumber(h.netProfit), 0);
        els.historyStats.textContent = `저장된 기록 ${history.length}건 · 누적 순이익 ${won(totalProfit)}`;

        els.historyList.innerHTML = history.map((item) => {
          const chipClass = item.netProfit >= 0 ? "chip-up" : "chip-down";
          const chipLabel = item.netProfit >= 0 ? "흑자" : "적자";
          return `
            <article class="history-item">
              <div class="history-main">
                <div>
                  <div class="history-title">${escapeHtml(item.itemName || "이름 없는 물품")}</div>
                  <div class="history-meta">
                    판매가 ${won(item.salePrice)} · 총원가 ${won(item.totalCost)}<br>
                    수수료율 ${Number(item.feeRate || 0).toFixed(1)}% · ${item.createdAt || "-"}
                  </div>
                </div>
                <span class="profit-chip ${chipClass}">${chipLabel} ${won(item.netProfit)}</span>
              </div>
              <div class="history-actions">
                <button type="button" class="btn-ghost" data-action="load" data-id="${item.id}">불러오기</button>
                <button type="button" class="btn-danger" data-action="delete" data-id="${item.id}">삭제</button>
              </div>
            </article>
          `;
        }).join("");
      }

      function loadHistoryItem(id) {
        const item = getHistory().find((row) => row.id === id);
        if (!item) {
          setMessage("기록을 찾지 못했습니다.", true);
          return;
        }

        els.itemName.value = item.itemName || "";
        els.purchasePrice.value = item.purchasePrice || 0;
        els.repairCost.value = item.repairCost || 0;
        els.shippingCost.value = item.shippingCost || 0;
        els.otherCost.value = item.otherCost || 0;
        els.feeRate.value = item.feeRate || 0;
        els.salePrice.value = item.salePrice || 0;
        els.targetProfit.value = item.targetProfit || 0;

        drawResult(item);
        lastResult = item;
        saveSettings();
        setMessage("기록을 불러왔습니다.", false);
      }

      function clearInputs() {
        els.itemName.value = "";
        els.purchasePrice.value = "";
        els.repairCost.value = "";
        els.shippingCost.value = "";
        els.otherCost.value = "";
        els.feeRate.value = "";
        els.salePrice.value = "";
        els.targetProfit.value = "";
        lastResult = null;
        drawResult({ feeAmount: 0, totalCost: 0, netProfit: 0, profitMargin: 0, breakEvenPrice: 0, targetSalePrice: 0 });
        saveSettings();
        setMessage("입력값을 초기화했습니다.", false);
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      els.calcBtn.addEventListener("click", calculate);
      els.saveBtn.addEventListener("click", () => {
        const result = lastResult || calculate();
        if (!result) return;
        saveHistory(result);
        setMessage("기록에 저장했습니다.", false);
      });
      els.loadBtn.addEventListener("click", () => {
        loadSettings();
        const result = calculate();
        if (result) setMessage("마지막 입력값을 불러왔습니다.", false);
      });
      els.resetBtn.addEventListener("click", clearInputs);

      els.clearHistoryBtn.addEventListener("click", () => {
        if (!confirm("저장된 기록을 모두 삭제할까요?")) return;
        localStorage.removeItem(HISTORY_KEY);
        renderHistory();
        setMessage("모든 기록을 삭제했습니다.", false);
      });

      els.historyList.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const id = button.getAttribute("data-id");
        const action = button.getAttribute("data-action");
        if (action === "load") loadHistoryItem(id);
        if (action === "delete") {
          removeHistory(id);
          setMessage("기록 1건을 삭제했습니다.", false);
        }
      });

      [els.itemName, els.purchasePrice, els.repairCost, els.shippingCost, els.otherCost, els.feeRate, els.salePrice, els.targetProfit].forEach((el) => {
        el.addEventListener("input", () => {
          if (els.autoSave.checked) saveSettings();
        });
      });

      els.autoSave.addEventListener("change", saveSettings);

      loadSettings();
      drawResult({ feeAmount: 0, totalCost: 0, netProfit: 0, profitMargin: 0, breakEvenPrice: 0, targetSalePrice: 0 });
      renderHistory();
    })();
  </script>
</body>
</html>
