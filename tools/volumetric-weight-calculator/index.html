<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>택배 부피무게 계산기 | Volumetric Weight Calculator</title>
  <meta name="description" content="가로·세로·높이와 실제 무게를 입력해 부피무게(체적무게)와 과금무게를 계산하고 최근 이력을 저장하세요." />
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-soft: #151533;
      --panel: #11112a;
      --panel-soft: #1b1b3b;
      --line: #2c2c5f;
      --text: #ecf0ff;
      --muted: #9aa3c9;
      --cyan: #2bd9ff;
      --violet: #b26dff;
      --green: #3df5be;
      --warning: #ffb454;
      --danger: #ff6b8a;
      --shadow: 0 0 0 1px rgba(43, 217, 255, 0.18), 0 0 24px rgba(43, 217, 255, 0.1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 0%, #1b1b40 0%, var(--bg) 42%), var(--bg);
      min-height: 100vh;
      padding: 18px 14px 42px;
      line-height: 1.5;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .back-link {
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      background: rgba(17, 17, 42, 0.82);
      font-size: 0.9rem;
      font-weight: 600;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: clamp(1.45rem, 4.5vw, 2.1rem);
      text-shadow: 0 0 16px rgba(43, 217, 255, 0.35);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(17, 17, 42, 0.95), rgba(10, 10, 26, 0.95));
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 15px;
      margin-bottom: 13px;
    }

    .card-title {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #c4d0ff;
      letter-spacing: 0.02em;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 650;
    }

    input, select, button {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      font-size: 0.98rem;
      padding: 10px 12px;
    }

    input:focus, select:focus, button:focus {
      outline: 2px solid var(--cyan);
      outline-offset: 1px;
      border-color: var(--cyan);
    }

    .inline-help {
      margin-top: 6px;
      color: #8eb4ff;
      font-size: 0.78rem;
    }

    .actions {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .btn-primary {
      border: none;
      font-weight: 800;
      color: #060613;
      background: linear-gradient(135deg, rgba(43, 217, 255, 0.98), rgba(178, 109, 255, 0.95));
    }

    .btn-secondary {
      color: #e8dcff;
      border-color: rgba(178, 109, 255, 0.52);
      background: rgba(178, 109, 255, 0.15);
      font-weight: 700;
    }

    .btn-ghost {
      color: var(--muted);
      background: rgba(154, 163, 201, 0.07);
      font-weight: 700;
    }

    .error {
      margin-top: 10px;
      color: var(--danger);
      min-height: 1.25em;
      font-size: 0.86rem;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(27, 27, 59, 0.7);
      padding: 12px;
      min-height: 98px;
    }

    .metric-label {
      display: block;
      font-size: 0.76rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 7px;
    }

    .metric-value {
      display: block;
      font-size: clamp(1rem, 3.8vw, 1.34rem);
      font-weight: 800;
      color: var(--cyan);
      word-break: keep-all;
    }

    .metric-value.violet { color: #ddc5ff; }
    .metric-value.green { color: #9effdd; }
    .metric-value.warning { color: #ffd089; }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .history-count {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(21, 21, 51, 0.8);
      padding: 9px 10px;
      display: grid;
      gap: 4px;
      font-size: 0.84rem;
    }

    .history-item b {
      color: #b9e7ff;
      font-weight: 750;
    }

    .history-meta {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .empty {
      color: var(--muted);
      font-size: 0.88rem;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .tips {
      margin-top: 8px;
      color: #9ab6ff;
      font-size: 0.83rem;
    }

    @media (max-width: 760px) {
      .field-grid,
      .result-grid,
      .actions {
        grid-template-columns: 1fr;
      }

      body {
        padding-left: 12px;
        padding-right: 12px;
      }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back-link" href="../">← 도구 목록</a>
    </div>

    <h1>📦 택배 부피무게 계산기</h1>
    <p class="subtitle">가로·세로·높이와 실제 무게를 기준으로 <strong>부피무게(체적무게)</strong>와 <strong>과금무게</strong>를 빠르게 계산합니다.</p>

    <section class="card" aria-label="입력">
      <h2 class="card-title">입력 정보</h2>
      <div class="field-grid">
        <div class="field">
          <label for="length">가로 (cm)</label>
          <input id="length" type="number" min="0" step="0.1" inputmode="decimal" placeholder="예: 40" />
        </div>
        <div class="field">
          <label for="width">세로 (cm)</label>
          <input id="width" type="number" min="0" step="0.1" inputmode="decimal" placeholder="예: 30" />
        </div>
        <div class="field">
          <label for="height">높이 (cm)</label>
          <input id="height" type="number" min="0" step="0.1" inputmode="decimal" placeholder="예: 20" />
        </div>
        <div class="field">
          <label for="actualWeight">실제 무게 (kg)</label>
          <input id="actualWeight" type="number" min="0" step="0.01" inputmode="decimal" placeholder="예: 3.8" />
        </div>

        <div class="field">
          <label for="quantity">박스 수량</label>
          <input id="quantity" type="number" min="1" step="1" inputmode="numeric" value="1" />
        </div>

        <div class="field">
          <label for="divisorPreset">부피무게 나눗값</label>
          <select id="divisorPreset">
            <option value="6000">항공/국제 일반 (6000)</option>
            <option value="5000">국제 특송/택배 (5000)</option>
            <option value="4000">국내 택배/퀵 기준 (4000)</option>
            <option value="custom">직접 입력</option>
          </select>
        </div>

        <div class="field">
          <label for="customDivisor">직접 입력 나눗값</label>
          <input id="customDivisor" type="number" min="1" step="1" inputmode="numeric" value="5000" disabled />
          <p class="inline-help">공식: (가로 × 세로 × 높이) ÷ 나눗값</p>
        </div>

        <div class="field">
          <label for="rounding">과금무게 반올림 규칙</label>
          <select id="rounding">
            <option value="none">반올림 없음 (소수점 2자리 표시)</option>
            <option value="0.1">0.1kg 단위 올림</option>
            <option value="0.5">0.5kg 단위 올림</option>
            <option value="1" selected>1kg 단위 올림</option>
          </select>
        </div>

        <div class="field">
          <label for="baseFee">기본 요금 (원, 선택)</label>
          <input id="baseFee" type="number" min="0" step="1" inputmode="numeric" value="0" />
        </div>

        <div class="field">
          <label for="perKgFee">kg당 요금 (원, 선택)</label>
          <input id="perKgFee" type="number" min="0" step="1" inputmode="numeric" value="0" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="calcBtn" type="button">계산하기</button>
        <button class="btn-secondary" id="saveBtn" type="button">현재 결과 저장</button>
        <button class="btn-ghost" id="resetBtn" type="button">입력 초기화</button>
      </div>
      <p class="error" id="error" role="alert" aria-live="polite"></p>
      <p class="tips">TIP: 실제 무게와 부피무게 중 큰 값이 과금무게로 사용됩니다.</p>
    </section>

    <section class="card" aria-label="계산 결과">
      <h2 class="card-title">계산 결과</h2>
      <div class="result-grid">
        <div class="metric">
          <span class="metric-label">박스 1개 부피무게</span>
          <span class="metric-value" id="volumetricPerBox">-</span>
        </div>
        <div class="metric">
          <span class="metric-label">총 부피무게</span>
          <span class="metric-value violet" id="volumetricTotal">-</span>
        </div>
        <div class="metric">
          <span class="metric-label">총 실제무게</span>
          <span class="metric-value green" id="actualTotal">-</span>
        </div>
        <div class="metric">
          <span class="metric-label">총 과금무게</span>
          <span class="metric-value warning" id="chargeableTotal">-</span>
        </div>
      </div>
      <p class="tips" id="summary">치수를 입력하고 계산 버튼을 눌러 주세요.</p>
    </section>

    <section class="card" aria-label="최근 이력">
      <div class="history-head">
        <h2 class="card-title" style="margin:0;">최근 계산 이력</h2>
        <span class="history-count" id="historyCount">0건</span>
      </div>
      <ul class="history-list" id="historyList"></ul>
      <div style="margin-top: 10px;">
        <button class="btn-ghost" id="clearHistoryBtn" type="button">이력 전체 삭제</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = 'volumetric-weight-calculator-v1';
      const HISTORY_LIMIT = 20;

      const els = {
        length: document.getElementById('length'),
        width: document.getElementById('width'),
        height: document.getElementById('height'),
        actualWeight: document.getElementById('actualWeight'),
        quantity: document.getElementById('quantity'),
        divisorPreset: document.getElementById('divisorPreset'),
        customDivisor: document.getElementById('customDivisor'),
        rounding: document.getElementById('rounding'),
        baseFee: document.getElementById('baseFee'),
        perKgFee: document.getElementById('perKgFee'),
        calcBtn: document.getElementById('calcBtn'),
        saveBtn: document.getElementById('saveBtn'),
        resetBtn: document.getElementById('resetBtn'),
        clearHistoryBtn: document.getElementById('clearHistoryBtn'),
        error: document.getElementById('error'),
        volumetricPerBox: document.getElementById('volumetricPerBox'),
        volumetricTotal: document.getElementById('volumetricTotal'),
        actualTotal: document.getElementById('actualTotal'),
        chargeableTotal: document.getElementById('chargeableTotal'),
        summary: document.getElementById('summary'),
        historyList: document.getElementById('historyList'),
        historyCount: document.getElementById('historyCount')
      };

      let state = {
        settings: {
          length: '',
          width: '',
          height: '',
          actualWeight: '',
          quantity: 1,
          divisorPreset: '6000',
          customDivisor: 5000,
          rounding: '1',
          baseFee: 0,
          perKgFee: 0
        },
        lastResult: null,
        history: []
      };

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') {
            state = {
              settings: { ...state.settings, ...(parsed.settings || {}) },
              lastResult: parsed.lastResult || null,
              history: Array.isArray(parsed.history) ? parsed.history : []
            };
          }
        } catch (err) {
          console.warn('load failed', err);
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function toNumber(value) {
        const num = Number(value);
        return Number.isFinite(num) ? num : NaN;
      }

      function formatKg(value) {
        return `${value.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} kg`;
      }

      function formatWon(value) {
        return `${Math.round(value).toLocaleString('ko-KR')}원`;
      }

      function setError(message) {
        els.error.textContent = message || '';
      }

      function getDivisor() {
        if (els.divisorPreset.value === 'custom') {
          return toNumber(els.customDivisor.value);
        }
        return toNumber(els.divisorPreset.value);
      }

      function ceilByStep(value, step) {
        if (!step || step <= 0) return value;
        return Math.ceil(value / step) * step;
      }

      function applyRounding(value, rule) {
        if (rule === 'none') return value;
        const step = Number(rule);
        if (!Number.isFinite(step) || step <= 0) return value;
        return ceilByStep(value, step);
      }

      function collectInput() {
        const length = toNumber(els.length.value);
        const width = toNumber(els.width.value);
        const height = toNumber(els.height.value);
        const actualWeight = toNumber(els.actualWeight.value);
        const quantityRaw = toNumber(els.quantity.value);
        const divisor = getDivisor();
        const baseFee = Math.max(0, toNumber(els.baseFee.value) || 0);
        const perKgFee = Math.max(0, toNumber(els.perKgFee.value) || 0);

        const quantity = Number.isFinite(quantityRaw) && quantityRaw > 0 ? Math.floor(quantityRaw) : NaN;

        const invalid = [length, width, height, actualWeight, quantity, divisor].some(v => !Number.isFinite(v) || v <= 0);
        if (invalid) {
          throw new Error('모든 필수 값을 0보다 크게 입력해 주세요.');
        }

        return {
          length,
          width,
          height,
          actualWeight,
          quantity,
          divisor,
          rounding: els.rounding.value,
          baseFee,
          perKgFee
        };
      }

      function calculate(data) {
        const volumeCm3 = data.length * data.width * data.height;
        const volumetricPerBox = volumeCm3 / data.divisor;
        const actualTotal = data.actualWeight * data.quantity;
        const volumetricTotal = volumetricPerBox * data.quantity;

        const chargeablePerBoxRaw = Math.max(data.actualWeight, volumetricPerBox);
        const chargeablePerBox = applyRounding(chargeablePerBoxRaw, data.rounding);
        const chargeableTotal = chargeablePerBox * data.quantity;

        const estimateFee = data.baseFee + (chargeableTotal * data.perKgFee);

        return {
          ...data,
          volumeCm3,
          volumetricPerBox,
          actualTotal,
          volumetricTotal,
          chargeablePerBox,
          chargeableTotal,
          estimateFee,
          createdAt: new Date().toISOString()
        };
      }

      function renderResult(result) {
        if (!result) return;

        els.volumetricPerBox.textContent = formatKg(result.volumetricPerBox);
        els.volumetricTotal.textContent = formatKg(result.volumetricTotal);
        els.actualTotal.textContent = formatKg(result.actualTotal);
        els.chargeableTotal.textContent = formatKg(result.chargeableTotal);

        const larger = result.volumetricPerBox > result.actualWeight ? '부피무게' : '실제무게';
        const feeText = (result.baseFee > 0 || result.perKgFee > 0)
          ? ` · 예상요금 ${formatWon(result.estimateFee)}`
          : '';

        els.summary.textContent = `1박스 기준 ${larger} 적용 (${formatKg(result.chargeablePerBox)}) / 총 ${result.quantity}박스 과금무게 ${formatKg(result.chargeableTotal)}${feeText}`;
      }

      function renderHistory() {
        const items = state.history;
        els.historyCount.textContent = `${items.length}건`;

        if (!items.length) {
          els.historyList.innerHTML = '<li class="empty">아직 저장된 이력이 없습니다. 계산 후 "현재 결과 저장"을 눌러주세요.</li>';
          return;
        }

        els.historyList.innerHTML = items.map((item) => {
          const date = new Date(item.createdAt);
          const dateText = Number.isNaN(date.getTime()) ? '-' : date.toLocaleString('ko-KR');
          return `
            <li class="history-item">
              <div><b>${item.length}×${item.width}×${item.height}cm</b> · ${item.quantity}박스 · 나눗값 ${item.divisor}</div>
              <div>부피무게 ${formatKg(item.volumetricTotal)} / 실제무게 ${formatKg(item.actualTotal)} / 과금무게 <b>${formatKg(item.chargeableTotal)}</b></div>
              <div class="history-meta">${dateText}${(item.baseFee > 0 || item.perKgFee > 0) ? ` · 예상요금 ${formatWon(item.estimateFee)}` : ''}</div>
            </li>
          `;
        }).join('');
      }

      function syncInputsFromState() {
        const s = state.settings;
        els.length.value = s.length;
        els.width.value = s.width;
        els.height.value = s.height;
        els.actualWeight.value = s.actualWeight;
        els.quantity.value = s.quantity;
        els.divisorPreset.value = s.divisorPreset;
        els.customDivisor.value = s.customDivisor;
        els.rounding.value = s.rounding;
        els.baseFee.value = s.baseFee;
        els.perKgFee.value = s.perKgFee;
        toggleCustomDivisor();
      }

      function persistSettings() {
        state.settings = {
          length: els.length.value,
          width: els.width.value,
          height: els.height.value,
          actualWeight: els.actualWeight.value,
          quantity: toNumber(els.quantity.value) || 1,
          divisorPreset: els.divisorPreset.value,
          customDivisor: toNumber(els.customDivisor.value) || 5000,
          rounding: els.rounding.value,
          baseFee: Math.max(0, toNumber(els.baseFee.value) || 0),
          perKgFee: Math.max(0, toNumber(els.perKgFee.value) || 0)
        };
      }

      function toggleCustomDivisor() {
        const isCustom = els.divisorPreset.value === 'custom';
        els.customDivisor.disabled = !isCustom;
      }

      function handleCalculate() {
        setError('');
        try {
          persistSettings();
          const input = collectInput();
          const result = calculate(input);
          state.lastResult = result;
          saveState();
          renderResult(result);
        } catch (err) {
          setError(err.message || '계산 중 오류가 발생했습니다.');
        }
      }

      function handleSaveHistory() {
        setError('');
        if (!state.lastResult) {
          setError('먼저 계산을 실행해 주세요.');
          return;
        }

        state.history.unshift(state.lastResult);
        state.history = state.history.slice(0, HISTORY_LIMIT);
        saveState();
        renderHistory();
      }

      function resetInputs() {
        ['length', 'width', 'height', 'actualWeight'].forEach((key) => {
          els[key].value = '';
        });
        els.quantity.value = 1;
        els.divisorPreset.value = '6000';
        els.customDivisor.value = 5000;
        els.rounding.value = '1';
        els.baseFee.value = 0;
        els.perKgFee.value = 0;
        state.lastResult = null;

        els.volumetricPerBox.textContent = '-';
        els.volumetricTotal.textContent = '-';
        els.actualTotal.textContent = '-';
        els.chargeableTotal.textContent = '-';
        els.summary.textContent = '치수를 입력하고 계산 버튼을 눌러 주세요.';
        setError('');

        persistSettings();
        saveState();
        toggleCustomDivisor();
      }

      function clearHistory() {
        if (!window.confirm('저장된 계산 이력을 모두 삭제할까요?')) return;
        state.history = [];
        saveState();
        renderHistory();
      }

      function bindEvents() {
        els.calcBtn.addEventListener('click', handleCalculate);
        els.saveBtn.addEventListener('click', handleSaveHistory);
        els.resetBtn.addEventListener('click', resetInputs);
        els.clearHistoryBtn.addEventListener('click', clearHistory);

        els.divisorPreset.addEventListener('change', () => {
          toggleCustomDivisor();
          persistSettings();
          saveState();
        });

        [
          els.length,
          els.width,
          els.height,
          els.actualWeight,
          els.quantity,
          els.customDivisor,
          els.rounding,
          els.baseFee,
          els.perKgFee
        ].forEach((el) => {
          el.addEventListener('change', () => {
            persistSettings();
            saveState();
          });
        });
      }

      function init() {
        loadState();
        syncInputsFromState();
        bindEvents();

        if (state.lastResult) {
          renderResult(state.lastResult);
        }
        renderHistory();
      }

      init();
    })();
  </script>
</body>
</html>
