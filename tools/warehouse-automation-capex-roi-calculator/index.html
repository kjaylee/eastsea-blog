<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warehouse Automation CAPEX ROI Calculator | 창고 자동화 CAPEX ROI 계산기</title>
  <meta name="description" content="창고 자동화 투자에서 인건비 절감, 품질비용 절감, 처리량 증가 효과를 합산해 ROI, 회수기간, NPV, 손익분기 절감률을 계산합니다." />
  <style>
    :root{--bg:#0f172a;--card:#111827;--line:#334155;--txt:#e5e7eb;--muted:#94a3b8;--pri:#22c55e;--warn:#f59e0b;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at top,#1e293b 0%,#0b1120 52%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 56px}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.7rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{color:#dcfce7;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:12px;background:#152035;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px}
    .card{background:linear-gradient(165deg,#1e293b,#111827);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
    input,button,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#0f172a;color:var(--txt);padding:10px;font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);font-weight:700}
    .ghost{background:#1e293b;border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:104px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f1d1d;background:rgba(248,113,113,.14);color:#fecaca;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{padding:10px;border:1px solid var(--line);border-radius:10px;background:#0b1220}
    .k{font-size:.75rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.06rem;font-weight:800}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#172033;color:#d1fae5;font-size:.78rem}
    .ok{color:var(--pri)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:right}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🏭 창고 자동화 CAPEX ROI 계산기</h1>
        <div class="sub">인건비·품질비·처리량 효과를 합산해 자동화 투자 타당성을 빠르게 점검합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="laborCost">현재 연간 인건비 (KRW)</label><input id="laborCost" type="number" min="1" value="620000000" /></div>
          <div><label for="laborSaveRate">자동화 인건비 절감률 (%)</label><input id="laborSaveRate" type="number" step="0.1" min="0" max="100" value="18" /></div>
          <div><label for="qualityCost">연간 품질/오류 비용 (KRW)</label><input id="qualityCost" type="number" min="0" value="95000000" /></div>
          <div><label for="qualityReduction">품질 비용 절감률 (%)</label><input id="qualityReduction" type="number" step="0.1" min="0" max="100" value="30" /></div>
          <div><label for="addUnits">월 추가 처리 물량 (units)</label><input id="addUnits" type="number" min="0" value="2200" /></div>
          <div><label for="unitContribution">단위당 공헌이익 (KRW)</label><input id="unitContribution" type="number" min="0" value="4800" /></div>
          <div><label for="annualMaintenance">연간 유지비/OPEX (KRW)</label><input id="annualMaintenance" type="number" min="0" value="84000000" /></div>
          <div><label for="capex">초기 CAPEX (KRW)</label><input id="capex" type="number" min="0" value="430000000" /></div>
          <div><label for="discountRate">할인율 (%)</label><input id="discountRate" type="number" step="0.1" min="0" max="50" value="9" /></div>
          <div><label for="years">분석 기간 (년)</label><input id="years" type="number" min="1" max="10" value="5" /></div>
        </div>
        <div class="btns">
          <button id="copy" class="ghost" type="button">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">연간 총편익</div><div id="grossBenefit" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 순편익</div><div id="netBenefit" class="v">-</div></div>
          <div class="kpi"><div class="k">1년 ROI</div><div id="roi" class="v">-</div></div>
          <div class="kpi"><div class="k">회수기간</div><div id="payback" class="v">-</div></div>
          <div class="kpi"><div class="k">NPV</div><div id="npv" class="v">-</div></div>
          <div class="kpi"><div class="k">손익분기 인건비 절감률</div><div id="beRate" class="v">-</div></div>
        </div>
        <div id="status" class="pill">계산 대기 중</div>

        <h2 style="margin-top:12px">세부 구성</h2>
        <table>
          <tbody>
            <tr><th>인건비 절감액</th><td id="laborSavings">-</td></tr>
            <tr><th>품질비 절감액</th><td id="qualitySavings">-</td></tr>
            <tr><th>처리량 증가 공헌이익</th><td id="throughputBenefit">-</td></tr>
            <tr><th>연간 유지비</th><td id="maintOut">-</td></tr>
            <tr><th>초기 CAPEX</th><td id="capexOut">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      laborCost: $('laborCost'), laborSaveRate: $('laborSaveRate'), qualityCost: $('qualityCost'), qualityReduction: $('qualityReduction'),
      addUnits: $('addUnits'), unitContribution: $('unitContribution'), annualMaintenance: $('annualMaintenance'), capex: $('capex'),
      discountRate: $('discountRate'), years: $('years'),
      grossBenefit: $('grossBenefit'), netBenefit: $('netBenefit'), roi: $('roi'), payback: $('payback'), npv: $('npv'), beRate: $('beRate'),
      laborSavings: $('laborSavings'), qualitySavings: $('qualitySavings'), throughputBenefit: $('throughputBenefit'), maintOut: $('maintOut'), capexOut: $('capexOut'),
      summary: $('summary'), copy: $('copy'), reset: $('reset'), error: $('error'), status: $('status')
    };

    const defaults = {
      laborCost: 620000000, laborSaveRate: 18, qualityCost: 95000000, qualityReduction: 30,
      addUnits: 2200, unitContribution: 4800, annualMaintenance: 84000000, capex: 430000000, discountRate: 9, years: 5
    };

    const won = (n) => new Intl.NumberFormat('ko-KR', { style:'currency', currency:'KRW', maximumFractionDigits:0 }).format(n || 0);
    const num = (n, d=2) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits:d });

    function validate(v){
      if (!Number.isFinite(v.laborCost) || v.laborCost <= 0) return '현재 연간 인건비는 0보다 커야 합니다.';
      if (!Number.isFinite(v.laborSaveRate) || v.laborSaveRate < 0 || v.laborSaveRate > 100) return '인건비 절감률은 0~100% 범위여야 합니다.';
      if (!Number.isFinite(v.qualityCost) || v.qualityCost < 0) return '연간 품질/오류 비용은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.qualityReduction) || v.qualityReduction < 0 || v.qualityReduction > 100) return '품질 비용 절감률은 0~100% 범위여야 합니다.';
      if (!Number.isFinite(v.addUnits) || v.addUnits < 0) return '월 추가 처리 물량은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.unitContribution) || v.unitContribution < 0) return '단위당 공헌이익은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.annualMaintenance) || v.annualMaintenance < 0) return '연간 유지비는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.capex) || v.capex < 0) return '초기 CAPEX는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.discountRate) || v.discountRate < 0 || v.discountRate > 50) return '할인율은 0~50% 범위여야 합니다.';
      if (!Number.isFinite(v.years) || v.years < 1 || v.years > 10) return '분석 기간은 1~10년 범위여야 합니다.';
      return '';
    }

    function compute(v){
      const laborSavings = v.laborCost * (v.laborSaveRate / 100);
      const qualitySavings = v.qualityCost * (v.qualityReduction / 100);
      const throughputBenefit = v.addUnits * v.unitContribution * 12;
      const grossBenefit = laborSavings + qualitySavings + throughputBenefit;
      const netBenefit = grossBenefit - v.annualMaintenance;
      const roi = v.capex === 0 ? Infinity : ((netBenefit - v.capex) / v.capex) * 100;
      const payback = v.capex === 0 ? 0 : (netBenefit > 0 ? v.capex / (netBenefit / 12) : Infinity);
      const r = v.discountRate / 100;
      let npv = -v.capex;
      for (let y = 1; y <= v.years; y++) npv += netBenefit / Math.pow(1 + r, y);
      const beRate = v.laborCost === 0 ? Infinity : ((v.annualMaintenance - qualitySavings - throughputBenefit) / v.laborCost) * 100;
      return { laborSavings, qualitySavings, throughputBenefit, grossBenefit, netBenefit, roi, payback, npv, beRate };
    }

    function render(){
      const v = {
        laborCost: Number(refs.laborCost.value), laborSaveRate: Number(refs.laborSaveRate.value), qualityCost: Number(refs.qualityCost.value),
        qualityReduction: Number(refs.qualityReduction.value), addUnits: Number(refs.addUnits.value), unitContribution: Number(refs.unitContribution.value),
        annualMaintenance: Number(refs.annualMaintenance.value), capex: Number(refs.capex.value), discountRate: Number(refs.discountRate.value), years: Number(refs.years.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', !!err);
      refs.error.textContent = err;
      if (err){
        ['grossBenefit','netBenefit','roi','payback','npv','beRate','laborSavings','qualitySavings','throughputBenefit','maintOut','capexOut'].forEach(k=>refs[k].textContent='-');
        refs.summary.value = '';
        refs.status.textContent = '입력값을 확인하세요';
        return;
      }

      const r = compute(v);
      refs.grossBenefit.textContent = won(r.grossBenefit);
      refs.netBenefit.textContent = won(r.netBenefit);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : '∞';
      refs.payback.textContent = r.payback === 0 ? '즉시' : (Number.isFinite(r.payback) ? `${num(r.payback,1)}개월` : '회수 불가');
      refs.npv.textContent = won(r.npv);
      refs.beRate.textContent = Number.isFinite(r.beRate) ? `${num(r.beRate,2)}%` : '∞';

      refs.laborSavings.textContent = won(r.laborSavings);
      refs.qualitySavings.textContent = won(r.qualitySavings);
      refs.throughputBenefit.textContent = won(r.throughputBenefit);
      refs.maintOut.textContent = won(v.annualMaintenance);
      refs.capexOut.textContent = won(v.capex);

      if (r.netBenefit > 0) {
        refs.status.innerHTML = `<span class="ok">●</span> 연간 순편익 ${won(r.netBenefit)} (투자 검토 유망)`;
      } else if (r.netBenefit === 0) {
        refs.status.innerHTML = `● 손익분기 수준`;
      } else {
        refs.status.innerHTML = `<span class="warn">●</span> 연간 순손익 ${won(r.netBenefit)} (가정 재점검 필요)`;
      }

      refs.summary.value = [
        '[Warehouse Automation CAPEX ROI 요약]',
        `연간 총편익: ${won(r.grossBenefit)}`,
        `연간 순편익: ${won(r.netBenefit)}`,
        `1년 ROI: ${Number.isFinite(r.roi) ? num(r.roi,1)+'%' : '∞'}`,
        `회수기간: ${r.payback===0 ? '즉시' : (Number.isFinite(r.payback)?num(r.payback,1)+'개월':'회수 불가')}`,
        `${v.years}년 NPV: ${won(r.npv)}`,
        `손익분기 인건비 절감률: ${Number.isFinite(r.beRate) ? num(r.beRate,2)+'%' : '∞'}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert('요약이 복사되었습니다.'); }
      catch { alert('클립보드 권한이 없어 수동 복사가 필요합니다.'); }
    });

    refs.reset.addEventListener('click', ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [
      refs.laborCost, refs.laborSaveRate, refs.qualityCost, refs.qualityReduction, refs.addUnits,
      refs.unitContribution, refs.annualMaintenance, refs.capex, refs.discountRate, refs.years
    ].forEach(el=>{
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
