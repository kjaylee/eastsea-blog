<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>보증기간·반품기한 추적기 | Warranty Expiry Tracker</title>
  <meta name="description" content="가전·전자제품·생활용품의 구매일, 보증기간, 반품기한을 저장하고 만료 임박 항목을 한눈에 관리하세요." />
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-glow: #151533;
      --panel: #12122a;
      --panel-soft: #1a1a38;
      --line: #2d2d61;
      --text: #eef1ff;
      --muted: #9ca5cb;
      --cyan: #2bd9ff;
      --violet: #ba7bff;
      --green: #39f8c3;
      --orange: #ffbf5e;
      --danger: #ff6f92;
      --shadow: 0 0 0 1px rgba(43, 217, 255, 0.16), 0 0 26px rgba(43, 217, 255, 0.1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 0% 0%, var(--bg-glow) 0%, var(--bg) 48%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 18px 14px 40px;
      line-height: 1.45;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      background: rgba(18, 18, 42, 0.8);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .badge {
      border: 1px solid rgba(43, 217, 255, 0.4);
      color: #b8f4ff;
      background: rgba(43, 217, 255, 0.08);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }

    h1 {
      margin: 8px 0 8px;
      font-size: clamp(1.42rem, 4.3vw, 2.05rem);
      letter-spacing: 0.01em;
      text-shadow: 0 0 14px rgba(43, 217, 255, 0.36);
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(18, 18, 42, 0.96), rgba(10, 10, 26, 0.95));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #dffaff;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 650;
    }

    input, select, textarea, button {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel-soft);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.96rem;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus, button:focus {
      outline: 2px solid var(--cyan);
      outline-offset: 1px;
      border-color: var(--cyan);
    }

    .inline-field {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 8px;
      align-items: end;
    }

    .actions {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .primary {
      border: none;
      color: #050511;
      font-weight: 800;
      background: linear-gradient(135deg, rgba(43, 217, 255, 0.95), rgba(186, 123, 255, 0.95));
    }

    .secondary {
      background: rgba(186, 123, 255, 0.17);
      border-color: rgba(186, 123, 255, 0.55);
      color: #f0e4ff;
      font-weight: 700;
    }

    .ghost {
      background: rgba(156, 165, 203, 0.08);
      color: var(--muted);
      font-weight: 700;
    }

    .danger {
      background: rgba(255, 111, 146, 0.12);
      border-color: rgba(255, 111, 146, 0.45);
      color: #ffc8d6;
      font-weight: 700;
    }

    .msg {
      min-height: 1.2em;
      font-size: 0.85rem;
      margin-top: 8px;
      color: var(--danger);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(26, 26, 56, 0.72);
      padding: 10px;
      min-height: 82px;
    }

    .metric .k {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric .v {
      font-weight: 800;
      font-size: clamp(1.05rem, 3.5vw, 1.34rem);
      color: var(--cyan);
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(21, 21, 48, 0.78);
      padding: 10px;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      align-items: start;
    }

    .item-title {
      font-weight: 760;
      font-size: 0.97rem;
    }

    .item-meta {
      font-size: 0.79rem;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.4;
    }

    .status-chip {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.74rem;
      font-weight: 780;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .status-active {
      color: #baf7ff;
      background: rgba(43, 217, 255, 0.14);
      border-color: rgba(43, 217, 255, 0.4);
    }

    .status-soon {
      color: #ffe3b0;
      background: rgba(255, 191, 94, 0.15);
      border-color: rgba(255, 191, 94, 0.42);
    }

    .status-expired {
      color: #ffc6d5;
      background: rgba(255, 111, 146, 0.15);
      border-color: rgba(255, 111, 146, 0.42);
    }

    .status-returnable {
      color: #b2ffe8;
      background: rgba(57, 248, 195, 0.15);
      border-color: rgba(57, 248, 195, 0.43);
    }

    .item-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-top: 8px;
    }

    .pill {
      border: 1px dashed rgba(43, 217, 255, 0.33);
      border-radius: 10px;
      padding: 8px;
      font-size: 0.78rem;
      color: #d4f8ff;
      background: rgba(43, 217, 255, 0.06);
    }

    .item-actions {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .empty {
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 18px 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .history-list {
      display: grid;
      gap: 7px;
      max-height: 210px;
      overflow: auto;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: rgba(16, 16, 38, 0.8);
      font-size: 0.8rem;
      color: #dde4ff;
    }

    .history-time {
      color: var(--muted);
      font-size: 0.74rem;
      margin-top: 3px;
      display: block;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.79rem;
    }

    @media (max-width: 760px) {
      .field-grid,
      .stats,
      .controls,
      .item-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
  <script src="/assets/analytics.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back-link" href="../">← 도구 목록</a>
      <span class="badge">오프라인 저장</span>
    </div>

    <h1>🛡️ 보증기간·반품기한 추적기</h1>
    <p class="subtitle">구매일·보증개월·반품 가능일을 저장하고 만료 임박 항목을 자동으로 분류합니다.</p>

    <section class="card" aria-label="제품 등록">
      <h2>제품 등록/수정</h2>
      <div class="field-grid">
        <div class="field">
          <label for="name">제품명</label>
          <input id="name" type="text" placeholder="예: 무선 이어폰" maxlength="60" />
        </div>
        <div class="field">
          <label for="category">카테고리</label>
          <select id="category">
            <option value="전자기기">전자기기</option>
            <option value="가전">가전</option>
            <option value="생활용품">생활용품</option>
            <option value="가구">가구</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="field">
          <label for="purchaseDate">구매일</label>
          <input id="purchaseDate" type="date" />
        </div>
        <div class="field">
          <label for="warrantyMonths">보증기간</label>
          <div class="inline-field">
            <input id="warrantyMonths" type="number" min="0" max="120" value="12" />
            <span class="badge" style="display:inline-flex;align-items:center;justify-content:center;min-height:44px;">개월</span>
          </div>
        </div>
        <div class="field">
          <label for="returnDays">반품 가능기간</label>
          <div class="inline-field">
            <input id="returnDays" type="number" min="0" max="90" value="7" />
            <span class="badge" style="display:inline-flex;align-items:center;justify-content:center;min-height:44px;">일</span>
          </div>
        </div>
        <div class="field">
          <label for="price">구매 금액(선택)</label>
          <input id="price" type="number" min="0" step="100" placeholder="예: 129000" />
        </div>
        <div class="field">
          <label for="seller">구매처(선택)</label>
          <input id="seller" type="text" placeholder="예: 쿠팡" maxlength="40" />
        </div>
        <div class="field">
          <label for="serial">모델/시리얼(선택)</label>
          <input id="serial" type="text" placeholder="예: WF-1000XM5" maxlength="50" />
        </div>
      </div>
      <div class="field" style="margin-top:10px;">
        <label for="memo">메모(선택)</label>
        <textarea id="memo" placeholder="AS센터 번호, 증상, 영수증 위치 등"></textarea>
      </div>

      <div class="actions">
        <button id="saveBtn" class="primary" type="button">저장</button>
        <button id="resetBtn" class="secondary" type="button">입력 초기화</button>
        <button id="exportBtn" class="ghost" type="button">내보내기(JSON)</button>
        <label class="ghost" style="display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:44px;">
          가져오기
          <input id="importInput" type="file" accept="application/json" style="display:none;" />
        </label>
      </div>
      <p id="msg" class="msg" role="status" aria-live="polite"></p>
    </section>

    <section class="card" aria-label="설정 및 필터">
      <h2>설정 & 필터</h2>
      <div class="controls">
        <div class="field">
          <label for="alertDays">임박 기준(일)</label>
          <input id="alertDays" type="number" min="1" max="365" value="30" />
        </div>
        <div class="field">
          <label for="statusFilter">상태 필터</label>
          <select id="statusFilter">
            <option value="all">전체</option>
            <option value="returnable">반품 가능</option>
            <option value="active">보증 유효</option>
            <option value="soon">만료 임박</option>
            <option value="expired">만료됨</option>
          </select>
        </div>
        <div class="field">
          <label for="sortBy">정렬</label>
          <select id="sortBy">
            <option value="expiryAsc">보증 만료 임박순</option>
            <option value="purchaseDesc">최신 구매순</option>
            <option value="priceDesc">금액 높은순</option>
          </select>
        </div>
      </div>
      <p class="hint">설정은 자동 저장됩니다. 임박 기준일은 만료 예정 알림 분류에 사용됩니다.</p>
    </section>

    <section class="card" aria-label="현황 요약">
      <h2>현황 요약</h2>
      <div class="stats">
        <div class="metric"><span class="k">총 제품</span><span class="v" id="totalCount">0</span></div>
        <div class="metric"><span class="k">반품 가능</span><span class="v" id="returnableCount" style="color:var(--green);">0</span></div>
        <div class="metric"><span class="k">임박</span><span class="v" id="soonCount" style="color:var(--orange);">0</span></div>
        <div class="metric"><span class="k">만료</span><span class="v" id="expiredCount" style="color:var(--danger);">0</span></div>
      </div>
      <div id="list" class="list"></div>
    </section>

    <section class="card" aria-label="최근 변경 이력">
      <h2>최근 변경 이력</h2>
      <div id="historyList" class="history-list"></div>
      <div class="actions" style="margin-top:10px;">
        <button id="clearHistoryBtn" class="ghost" type="button">이력 비우기</button>
        <button id="clearAllBtn" class="danger" type="button">전체 데이터 삭제</button>
      </div>
    </section>
  </div>

  <script>
    (function () {
      "use strict";

      const STORAGE_KEY = "warranty-tracker-items-v1";
      const PREFS_KEY = "warranty-tracker-prefs-v1";
      const HISTORY_KEY = "warranty-tracker-history-v1";
      const HISTORY_LIMIT = 50;

      const el = {
        name: document.getElementById("name"),
        category: document.getElementById("category"),
        purchaseDate: document.getElementById("purchaseDate"),
        warrantyMonths: document.getElementById("warrantyMonths"),
        returnDays: document.getElementById("returnDays"),
        price: document.getElementById("price"),
        seller: document.getElementById("seller"),
        serial: document.getElementById("serial"),
        memo: document.getElementById("memo"),
        saveBtn: document.getElementById("saveBtn"),
        resetBtn: document.getElementById("resetBtn"),
        exportBtn: document.getElementById("exportBtn"),
        importInput: document.getElementById("importInput"),
        msg: document.getElementById("msg"),
        alertDays: document.getElementById("alertDays"),
        statusFilter: document.getElementById("statusFilter"),
        sortBy: document.getElementById("sortBy"),
        list: document.getElementById("list"),
        historyList: document.getElementById("historyList"),
        clearHistoryBtn: document.getElementById("clearHistoryBtn"),
        clearAllBtn: document.getElementById("clearAllBtn"),
        totalCount: document.getElementById("totalCount"),
        returnableCount: document.getElementById("returnableCount"),
        soonCount: document.getElementById("soonCount"),
        expiredCount: document.getElementById("expiredCount")
      };

      let items = loadJSON(STORAGE_KEY, []);
      let history = loadJSON(HISTORY_KEY, []);
      let prefs = Object.assign({
        alertDays: 30,
        statusFilter: "all",
        sortBy: "expiryAsc"
      }, loadJSON(PREFS_KEY, {}));

      let editingId = null;

      init();

      function init() {
        if (!Array.isArray(items)) items = [];
        if (!Array.isArray(history)) history = [];

        el.alertDays.value = String(clamp(toInt(prefs.alertDays, 30), 1, 365));
        el.statusFilter.value = prefs.statusFilter || "all";
        el.sortBy.value = prefs.sortBy || "expiryAsc";
        el.purchaseDate.value = todayISO();

        bindEvents();
        render();
        renderHistory();
      }

      function bindEvents() {
        el.saveBtn.addEventListener("click", handleSave);
        el.resetBtn.addEventListener("click", resetForm);
        el.exportBtn.addEventListener("click", exportJSON);
        el.importInput.addEventListener("change", importJSON);
        el.clearHistoryBtn.addEventListener("click", clearHistory);
        el.clearAllBtn.addEventListener("click", clearAllData);

        [el.alertDays, el.statusFilter, el.sortBy].forEach(node => {
          node.addEventListener("change", () => {
            prefs.alertDays = clamp(toInt(el.alertDays.value, 30), 1, 365);
            prefs.statusFilter = el.statusFilter.value;
            prefs.sortBy = el.sortBy.value;
            saveJSON(PREFS_KEY, prefs);
            render();
          });
        });
      }

      function handleSave() {
        const name = el.name.value.trim();
        const purchaseDate = el.purchaseDate.value;
        const warrantyMonths = clamp(toInt(el.warrantyMonths.value, 12), 0, 120);
        const returnDays = clamp(toInt(el.returnDays.value, 7), 0, 90);
        const price = Math.max(0, toInt(el.price.value, 0));

        if (!name) {
          setMessage("제품명을 입력해 주세요.");
          return;
        }
        if (!purchaseDate) {
          setMessage("구매일을 입력해 주세요.");
          return;
        }

        const payload = {
          id: editingId || uid(),
          name,
          category: el.category.value,
          purchaseDate,
          warrantyMonths,
          returnDays,
          price,
          seller: el.seller.value.trim(),
          serial: el.serial.value.trim(),
          memo: el.memo.value.trim(),
          createdAt: editingId ? findItem(editingId).createdAt : new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        if (editingId) {
          const idx = items.findIndex(i => i.id === editingId);
          if (idx >= 0) {
            items[idx] = payload;
            pushHistory(`수정: ${payload.name}`);
            setMessage("항목을 수정했어요.", true);
          }
        } else {
          items.unshift(payload);
          pushHistory(`추가: ${payload.name}`);
          setMessage("항목을 저장했어요.", true);
        }

        saveJSON(STORAGE_KEY, items);
        resetForm(false);
        render();
        renderHistory();
      }

      function resetForm(resetDate = true) {
        editingId = null;
        el.name.value = "";
        el.category.value = "전자기기";
        el.warrantyMonths.value = "12";
        el.returnDays.value = "7";
        el.price.value = "";
        el.seller.value = "";
        el.serial.value = "";
        el.memo.value = "";
        if (resetDate) el.purchaseDate.value = todayISO();
        el.saveBtn.textContent = "저장";
        setMessage("");
      }

      function render() {
        const alertDays = clamp(toInt(el.alertDays.value, 30), 1, 365);
        const enriched = items.map(item => withStatus(item, alertDays));
        const filtered = enriched.filter(item => {
          if (prefs.statusFilter === "all") return true;
          if (prefs.statusFilter === "returnable") return item.returnable;
          if (prefs.statusFilter === "expired") return item.status === "expired";
          if (prefs.statusFilter === "soon") return item.status === "soon";
          if (prefs.statusFilter === "active") return item.status === "active";
          return true;
        });

        filtered.sort((a, b) => {
          if (prefs.sortBy === "purchaseDesc") {
            return toDate(b.purchaseDate) - toDate(a.purchaseDate);
          }
          if (prefs.sortBy === "priceDesc") {
            return (b.price || 0) - (a.price || 0);
          }
          return toDate(a.warrantyEndDate) - toDate(b.warrantyEndDate);
        });

        el.totalCount.textContent = String(enriched.length);
        el.returnableCount.textContent = String(enriched.filter(x => x.returnable).length);
        el.soonCount.textContent = String(enriched.filter(x => x.status === "soon").length);
        el.expiredCount.textContent = String(enriched.filter(x => x.status === "expired").length);

        if (!filtered.length) {
          el.list.innerHTML = '<div class="empty">조건에 맞는 항목이 없습니다. 위 폼에서 첫 제품을 추가해 보세요.</div>';
          return;
        }

        el.list.innerHTML = filtered.map(item => {
          const statusClass = statusClassName(item);
          const statusLabel = statusText(item);
          const priceText = item.price ? `${item.price.toLocaleString("ko-KR")}원` : "-";

          return `
            <article class="item">
              <div class="item-head">
                <div>
                  <div class="item-title">${escapeHTML(item.name)}</div>
                  <div class="item-meta">${escapeHTML(item.category)} · 구매처 ${escapeHTML(item.seller || "미입력")}</div>
                </div>
                <span class="status-chip ${statusClass}">${statusLabel}</span>
              </div>

              <div class="item-grid">
                <div class="pill">구매일<br><strong>${formatDate(item.purchaseDate)}</strong></div>
                <div class="pill">보증 만료일<br><strong>${formatDate(item.warrantyEndDate)}</strong></div>
                <div class="pill">반품 마감일<br><strong>${formatDate(item.returnEndDate)}</strong></div>
                <div class="pill">보증 남은 일수<br><strong>${item.warrantyDaysLeft}일</strong></div>
                <div class="pill">금액<br><strong>${priceText}</strong></div>
                <div class="pill">모델/시리얼<br><strong>${escapeHTML(item.serial || "-")}</strong></div>
              </div>

              ${item.memo ? `<div class="item-meta" style="margin-top:8px;">메모: ${escapeHTML(item.memo)}</div>` : ""}

              <div class="item-actions">
                <button type="button" class="secondary" data-action="edit" data-id="${item.id}">수정</button>
                <button type="button" class="danger" data-action="delete" data-id="${item.id}">삭제</button>
              </div>
            </article>
          `;
        }).join("");

        el.list.querySelectorAll("button[data-action]").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-id");
            const action = btn.getAttribute("data-action");
            if (action === "edit") beginEdit(id);
            if (action === "delete") removeItem(id);
          });
        });
      }

      function beginEdit(id) {
        const item = findItem(id);
        if (!item) return;

        editingId = id;
        el.name.value = item.name || "";
        el.category.value = item.category || "전자기기";
        el.purchaseDate.value = item.purchaseDate || todayISO();
        el.warrantyMonths.value = String(item.warrantyMonths || 12);
        el.returnDays.value = String(item.returnDays || 7);
        el.price.value = item.price || "";
        el.seller.value = item.seller || "";
        el.serial.value = item.serial || "";
        el.memo.value = item.memo || "";
        el.saveBtn.textContent = "수정 저장";
        setMessage("수정 모드입니다.", true);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function removeItem(id) {
        const item = findItem(id);
        if (!item) return;
        if (!window.confirm(`'${item.name}' 항목을 삭제할까요?`)) return;

        items = items.filter(i => i.id !== id);
        saveJSON(STORAGE_KEY, items);
        pushHistory(`삭제: ${item.name}`);
        render();
        renderHistory();
        setMessage("항목을 삭제했어요.", true);

        if (editingId === id) resetForm();
      }

      function clearHistory() {
        if (!window.confirm("변경 이력을 비울까요?")) return;
        history = [];
        saveJSON(HISTORY_KEY, history);
        renderHistory();
      }

      function clearAllData() {
        if (!window.confirm("정말 전체 데이터를 삭제할까요?")) return;
        items = [];
        history = [];
        editingId = null;
        saveJSON(STORAGE_KEY, items);
        saveJSON(HISTORY_KEY, history);
        resetForm();
        render();
        renderHistory();
        setMessage("전체 데이터를 삭제했어요.", true);
      }

      function exportJSON() {
        const payload = {
          exportedAt: new Date().toISOString(),
          items,
          prefs
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `warranty-tracker-${todayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function importJSON(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || "{}"));
            if (!Array.isArray(parsed.items)) throw new Error("invalid");

            items = parsed.items.map(normalizeItem).filter(Boolean);
            prefs = Object.assign(prefs, parsed.prefs || {});
            saveJSON(STORAGE_KEY, items);
            saveJSON(PREFS_KEY, prefs);
            pushHistory(`가져오기: ${items.length}개 항목`);

            el.alertDays.value = String(clamp(toInt(prefs.alertDays, 30), 1, 365));
            el.statusFilter.value = prefs.statusFilter || "all";
            el.sortBy.value = prefs.sortBy || "expiryAsc";
            render();
            renderHistory();
            setMessage("JSON 가져오기를 완료했어요.", true);
          } catch (err) {
            setMessage("JSON 형식이 올바르지 않아요.");
          } finally {
            event.target.value = "";
          }
        };
        reader.readAsText(file);
      }

      function renderHistory() {
        if (!history.length) {
          el.historyList.innerHTML = '<div class="empty">아직 변경 이력이 없습니다.</div>';
          return;
        }
        el.historyList.innerHTML = history.map(log => {
          return `<div class="history-item">${escapeHTML(log.text)}<span class="history-time">${formatDateTime(log.at)}</span></div>`;
        }).join("");
      }

      function pushHistory(text) {
        history.unshift({ text, at: new Date().toISOString() });
        history = history.slice(0, HISTORY_LIMIT);
        saveJSON(HISTORY_KEY, history);
      }

      function withStatus(item, alertDays) {
        const warrantyEndDate = addMonthsISO(item.purchaseDate, toInt(item.warrantyMonths, 12));
        const returnEndDate = addDaysISO(item.purchaseDate, toInt(item.returnDays, 7));
        const today = new Date(todayISO());
        const warrantyEnd = toDate(warrantyEndDate);
        const returnEnd = toDate(returnEndDate);

        const warrantyDaysLeft = diffDays(today, warrantyEnd);
        const returnDaysLeft = diffDays(today, returnEnd);

        let status = "active";
        if (warrantyDaysLeft < 0) status = "expired";
        else if (warrantyDaysLeft <= alertDays) status = "soon";

        const returnable = returnDaysLeft >= 0;

        return Object.assign({}, item, {
          warrantyEndDate,
          returnEndDate,
          warrantyDaysLeft,
          returnDaysLeft,
          status,
          returnable
        });
      }

      function statusClassName(item) {
        if (item.returnable) return "status-returnable";
        if (item.status === "expired") return "status-expired";
        if (item.status === "soon") return "status-soon";
        return "status-active";
      }

      function statusText(item) {
        if (item.returnable) return `반품 가능 D-${item.returnDaysLeft}`;
        if (item.status === "expired") return `보증 만료 ${Math.abs(item.warrantyDaysLeft)}일`;
        if (item.status === "soon") return `만료 임박 D-${item.warrantyDaysLeft}`;
        return `보증 유효 D-${item.warrantyDaysLeft}`;
      }

      function normalizeItem(raw) {
        if (!raw || typeof raw !== "object") return null;
        if (!raw.name || !raw.purchaseDate) return null;
        return {
          id: raw.id || uid(),
          name: String(raw.name).slice(0, 60),
          category: String(raw.category || "전자기기").slice(0, 20),
          purchaseDate: String(raw.purchaseDate).slice(0, 10),
          warrantyMonths: clamp(toInt(raw.warrantyMonths, 12), 0, 120),
          returnDays: clamp(toInt(raw.returnDays, 7), 0, 90),
          price: Math.max(0, toInt(raw.price, 0)),
          seller: String(raw.seller || "").slice(0, 40),
          serial: String(raw.serial || "").slice(0, 50),
          memo: String(raw.memo || "").slice(0, 500),
          createdAt: raw.createdAt || new Date().toISOString(),
          updatedAt: raw.updatedAt || new Date().toISOString()
        };
      }

      function findItem(id) {
        return items.find(i => i.id === id);
      }

      function setMessage(text, ok) {
        el.msg.textContent = text;
        el.msg.style.color = ok ? "var(--green)" : "var(--danger)";
      }

      function saveJSON(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function loadJSON(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (_) {
          return fallback;
        }
      }

      function uid() {
        return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function toInt(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? Math.round(n) : fallback;
      }

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function todayISO() {
        const d = new Date();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${d.getFullYear()}-${m}-${day}`;
      }

      function toDate(iso) {
        const [y, m, d] = String(iso).split("-").map(Number);
        return new Date(y, (m || 1) - 1, d || 1);
      }

      function addMonthsISO(iso, months) {
        const base = toDate(iso);
        const d = new Date(base);
        const targetMonth = d.getMonth() + months;
        d.setMonth(targetMonth);
        if (d.getDate() !== base.getDate()) {
          d.setDate(0);
        }
        return toISODate(d);
      }

      function addDaysISO(iso, days) {
        const d = toDate(iso);
        d.setDate(d.getDate() + days);
        return toISODate(d);
      }

      function diffDays(a, b) {
        const ms = 24 * 60 * 60 * 1000;
        const ua = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
        const ub = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
        return Math.floor((ub - ua) / ms);
      }

      function toISODate(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function formatDate(iso) {
        const d = toDate(iso);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
      }

      function formatDateTime(iso) {
        const d = new Date(iso);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        return `${y}.${m}.${day} ${h}:${min}`;
      }

      function escapeHTML(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    })();
  </script>
</body>
</html>
