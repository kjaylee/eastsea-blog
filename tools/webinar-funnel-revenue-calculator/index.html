<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webinar Funnel Revenue Calculator | 웨비나 퍼널 수익 계산기</title>
  <meta name="description" content="웨비나 퍼널 등록→참석→세일즈→구매 데이터를 기반으로 월 순이익, 손익분기 전환율, ROI를 계산합니다." />
  <style>
    :root{--bg:#081121;--card:#152642;--line:#355784;--txt:#edf4ff;--muted:#b7c9e5;--pri:#7cb2ff;--soft:#1e365d;--ok:#34d399;--warn:#fbbf24;--err:#fecaca;--errbg:rgba(248,113,113,.13)}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#284874 0%,#081121 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 56px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);font-size:.93rem;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#17365e;color:#deebff;border-radius:10px;padding:8px 12px;text-decoration:none;font-size:.86rem;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#1d3963,#152642);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1d37;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{border:none;cursor:pointer;background:linear-gradient(135deg,var(--pri),#5f8eed);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    textarea{margin-top:10px;min-height:108px;resize:vertical}.error{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7a3341;background:var(--errbg);color:var(--err);font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0f203b;border-radius:11px;padding:10px}.k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.04rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#1b3d66;color:#d9e8ff;font-size:.77rem;margin-top:10px}.ok{color:var(--ok)}.warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.86rem;table-layout:fixed}th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🎤 웨비나 퍼널 수익 계산기</h1>
        <div class="sub" data-i18n="subtitle">등록→참석→피치→구매 퍼널에서 환불/수수료/광고비를 반영해 순이익과 손익분기 전환율을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" class="chip" type="button">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="registrants" data-i18n="registrants">월 등록자 수</label><input id="registrants" type="number" min="1" value="6200"></div>
          <div><label for="showRate" data-i18n="showRate">참석률 (%)</label><input id="showRate" type="number" min="0" max="100" step="0.1" value="41"></div>
          <div><label for="pitchRate" data-i18n="pitchRate">피치 도달률 (%)</label><input id="pitchRate" type="number" min="0" max="100" step="0.1" value="92"></div>
          <div><label for="orderRate" data-i18n="orderRate">피치→구매 전환율 (%)</label><input id="orderRate" type="number" min="0" max="100" step="0.1" value="7.8"></div>
          <div><label for="aov" data-i18n="aov">평균 결제액 AOV (KRW)</label><input id="aov" type="number" min="1" value="159000"></div>
          <div><label for="refundRate" data-i18n="refundRate">환불률 (%)</label><input id="refundRate" type="number" min="0" max="100" step="0.1" value="6"></div>
          <div><label for="paymentFee" data-i18n="paymentFee">결제 수수료율 (%)</label><input id="paymentFee" type="number" min="0" max="100" step="0.1" value="3.2"></div>
          <div><label for="affiliateRate" data-i18n="affiliateRate">어필리에이트 커미션율 (%)</label><input id="affiliateRate" type="number" min="0" max="100" step="0.1" value="12"></div>
          <div><label for="deliveryCost" data-i18n="deliveryCost">구매자당 전달비용 (KRW)</label><input id="deliveryCost" type="number" min="0" value="9800"></div>
          <div><label for="adSpend" data-i18n="adSpend">월 광고비 (KRW)</label><input id="adSpend" type="number" min="0" value="28000000"></div>
          <div><label for="opsCost" data-i18n="opsCost">월 툴/운영비 (KRW)</label><input id="opsCost" type="number" min="0" value="3900000"></div>
          <div><label for="oneTime" data-i18n="oneTime">원타임 구축비 (KRW)</label><input id="oneTime" type="number" min="0" value="10000000"></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" step="1" value="12"></div>
        </div>
        <div class="btns">
          <button id="copy" class="soft" type="button" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpi">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_attendees">월 참석자 수</div><div id="attendees" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_buyers">월 구매자 수</div><div id="buyers" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_netRevenue">월 실현 매출</div><div id="netRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_totalCost">월 총비용</div><div id="totalCost" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyNet">월 순이익</div><div id="monthlyNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_breakEvenOrder">손익분기 구매전환율</div><div id="breakEvenOrderRate" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detail">세부 지표</h2>
        <table><tbody>
          <tr><th data-i18n="d_grossSales">월 총 매출</th><td id="grossSales">-</td></tr>
          <tr><th data-i18n="d_paymentFeeAmt">결제 수수료</th><td id="paymentFeeAmount">-</td></tr>
          <tr><th data-i18n="d_affiliateAmt">어필리에이트 커미션</th><td id="affiliateAmount">-</td></tr>
          <tr><th data-i18n="d_payback">회수기간</th><td id="payback">-</td></tr>
          <tr><th data-i18n="d_periodNet">기간 누적 순효과</th><td id="periodNet">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={
      registrants:$("registrants"),showRate:$("showRate"),pitchRate:$("pitchRate"),orderRate:$("orderRate"),aov:$("aov"),refundRate:$("refundRate"),paymentFee:$("paymentFee"),affiliateRate:$("affiliateRate"),deliveryCost:$("deliveryCost"),adSpend:$("adSpend"),opsCost:$("opsCost"),oneTime:$("oneTime"),months:$("months"),
      attendees:$("attendees"),buyers:$("buyers"),netRevenue:$("netRevenue"),totalCost:$("totalCost"),monthlyNet:$("monthlyNet"),breakEvenOrderRate:$("breakEvenOrderRate"),roi:$("roi"),grossSales:$("grossSales"),paymentFeeAmount:$("paymentFeeAmount"),affiliateAmount:$("affiliateAmount"),payback:$("payback"),periodNet:$("periodNet"),
      error:$("error"),summary:$("summary"),status:$("status"),copy:$("copy"),reset:$("reset"),lang:$("lang")
    };

    const defaults={registrants:6200,showRate:41,pitchRate:92,orderRate:7.8,aov:159000,refundRate:6,paymentFee:3.2,affiliateRate:12,deliveryCost:9800,adSpend:28000000,opsCost:3900000,oneTime:10000000,months:12};
    let lang='ko';

    const i18n={
      ko:{
        title:"🎤 웨비나 퍼널 수익 계산기",subtitle:"등록→참석→피치→구매 퍼널에서 환불/수수료/광고비를 반영해 순이익과 손익분기 전환율을 계산합니다.",back:"Back to Portal",
        inputs:"입력값",copy:"요약 복사",reset:"기본값 복원",kpi:"핵심 KPI",waiting:"결과 계산 대기",detail:"세부 지표",
        registrants:"월 등록자 수",showRate:"참석률 (%)",pitchRate:"피치 도달률 (%)",orderRate:"피치→구매 전환율 (%)",aov:"평균 결제액 AOV (KRW)",refundRate:"환불률 (%)",paymentFee:"결제 수수료율 (%)",affiliateRate:"어필리에이트 커미션율 (%)",deliveryCost:"구매자당 전달비용 (KRW)",adSpend:"월 광고비 (KRW)",opsCost:"월 툴/운영비 (KRW)",oneTime:"원타임 구축비 (KRW)",months:"분석 기간 (개월)",
        k_attendees:"월 참석자 수",k_buyers:"월 구매자 수",k_netRevenue:"월 실현 매출",k_totalCost:"월 총비용",k_monthlyNet:"월 순이익",k_breakEvenOrder:"손익분기 구매전환율",k_roi:"ROI",
        d_grossSales:"월 총 매출",d_paymentFeeAmt:"결제 수수료",d_affiliateAmt:"어필리에이트 커미션",d_payback:"회수기간",d_periodNet:"기간 누적 순효과",
        errRegistrants:"등록자 수와 AOV는 1 이상이어야 합니다.",errRate:"비율 값은 0~100 범위여야 합니다.",errTake:"결제+어필리에이트 수수료 합이 100% 이상이면 계산할 수 없습니다.",errCost:"비용/기간 값을 확인하세요.",
        statusGood:"웨비나 퍼널 수익성이 양수입니다",statusWarn:"현재 가정에서 월 순이익이 음수입니다",statusCheck:"입력값을 확인하세요",
        impossible:"달성 불가",monthsUnit:"개월",summaryTitle:"[웨비나 퍼널 수익 계산 요약]",copied:"요약이 복사되었습니다.",copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다."
      },
      en:{
        title:"🎤 Webinar Funnel Revenue Calculator",subtitle:"Model webinar registration-to-sale funnel economics with refunds, fees, and ad spend.",back:"Back to Portal",
        inputs:"Inputs",copy:"Copy Summary",reset:"Reset Defaults",kpi:"Key KPIs",waiting:"Waiting for calculation",detail:"Details",
        registrants:"Monthly registrants",showRate:"Show-up rate (%)",pitchRate:"Pitch reach rate (%)",orderRate:"Pitch-to-order conversion (%)",aov:"Average order value (KRW)",refundRate:"Refund rate (%)",paymentFee:"Payment fee rate (%)",affiliateRate:"Affiliate commission rate (%)",deliveryCost:"Delivery cost per buyer (KRW)",adSpend:"Monthly ad spend (KRW)",opsCost:"Monthly tools/ops cost (KRW)",oneTime:"One-time setup cost (KRW)",months:"Analysis period (months)",
        k_attendees:"Monthly attendees",k_buyers:"Monthly buyers",k_netRevenue:"Monthly realized revenue",k_totalCost:"Monthly total cost",k_monthlyNet:"Monthly net profit",k_breakEvenOrder:"Break-even order conversion",k_roi:"ROI",
        d_grossSales:"Monthly gross sales",d_paymentFeeAmt:"Payment fee",d_affiliateAmt:"Affiliate commission",d_payback:"Payback period",d_periodNet:"Cumulative net impact",
        errRegistrants:"Registrants and AOV must be at least 1.",errRate:"Rate inputs must be between 0 and 100.",errTake:"Payment + affiliate fee must stay below 100%.",errCost:"Please review cost and period inputs.",
        statusGood:"Webinar funnel is profitable",statusWarn:"Monthly net profit is negative with current assumptions",statusCheck:"Please review input values",
        impossible:"Not achievable",monthsUnit:"months",summaryTitle:"[Webinar Funnel Revenue Summary]",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually."
      }
    };

    const t=(k)=>i18n[lang][k]??k;
    const locale=()=>lang==='ko'?'ko-KR':'en-US';
    const money=(n)=>new Intl.NumberFormat(locale(),{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang=lang;
      document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
      refs.lang.textContent=lang==='ko'?'EN':'KO';
    }

    function validate(v){
      if(!Number.isFinite(v.registrants)||v.registrants<1||!Number.isFinite(v.aov)||v.aov<1) return t('errRegistrants');
      if([v.showRate,v.pitchRate,v.orderRate,v.refundRate,v.paymentFee,v.affiliateRate].some(x=>!Number.isFinite(x)||x<0||x>100)) return t('errRate');
      if(v.paymentFee+v.affiliateRate>=100) return t('errTake');
      if([v.deliveryCost,v.adSpend,v.opsCost,v.oneTime].some(x=>!Number.isFinite(x)||x<0)||!Number.isFinite(v.months)||v.months<1) return t('errCost');
      return '';
    }

    function compute(v){
      const attendees=v.registrants*(v.showRate/100);
      const pitched=attendees*(v.pitchRate/100);
      const buyers=pitched*(v.orderRate/100);
      const grossSales=buyers*v.aov;
      const realized=grossSales*(1-v.refundRate/100);
      const paymentFeeAmount=realized*(v.paymentFee/100);
      const affiliateAmount=realized*(v.affiliateRate/100);
      const deliveryTotal=buyers*v.deliveryCost;
      const totalCost=paymentFeeAmount+affiliateAmount+deliveryTotal+v.adSpend+v.opsCost;
      const monthlyNet=realized-totalCost;

      const periodNet=monthlyNet*v.months-v.oneTime;
      const invested=totalCost*v.months+v.oneTime;
      const roi=invested===0?(periodNet>=0?Infinity:-Infinity):(periodNet/invested)*100;

      const contributionPerBuyer=v.aov*(1-v.refundRate/100)*(1-(v.paymentFee+v.affiliateRate)/100)-v.deliveryCost;
      const requiredBuyers=contributionPerBuyer>0?(v.adSpend+v.opsCost+(v.oneTime/v.months))/contributionPerBuyer:Infinity;
      const breakEvenOrderRate=pitched>0&&Number.isFinite(requiredBuyers)?(requiredBuyers/pitched)*100:Infinity;
      const payback=monthlyNet>0?v.oneTime/monthlyNet:Infinity;

      return {attendees,buyers,grossSales,realized,paymentFeeAmount,affiliateAmount,totalCost,monthlyNet,periodNet,roi,breakEvenOrderRate,payback};
    }

    function resetOutputs(){
      ['attendees','buyers','netRevenue','totalCost','monthlyNet','breakEvenOrderRate','roi','grossSales','paymentFeeAmount','affiliateAmount','payback','periodNet'].forEach(k=>refs[k].textContent='-');
      refs.summary.value='';
    }

    function render(){
      const v={
        registrants:Number(refs.registrants.value),showRate:Number(refs.showRate.value),pitchRate:Number(refs.pitchRate.value),orderRate:Number(refs.orderRate.value),aov:Number(refs.aov.value),refundRate:Number(refs.refundRate.value),paymentFee:Number(refs.paymentFee.value),affiliateRate:Number(refs.affiliateRate.value),deliveryCost:Number(refs.deliveryCost.value),adSpend:Number(refs.adSpend.value),opsCost:Number(refs.opsCost.value),oneTime:Number(refs.oneTime.value),months:Number(refs.months.value)
      };

      const err=validate(v);
      refs.error.classList.toggle('show',!!err);
      refs.error.textContent=err;
      if(err){refs.status.textContent=t('statusCheck');resetOutputs();return;}

      const r=compute(v);
      refs.attendees.textContent=num(r.attendees,0);
      refs.buyers.textContent=num(r.buyers,0);
      refs.netRevenue.textContent=money(r.realized);
      refs.totalCost.textContent=money(r.totalCost);
      refs.monthlyNet.textContent=money(r.monthlyNet);
      refs.breakEvenOrderRate.textContent=Number.isFinite(r.breakEvenOrderRate)?`${num(r.breakEvenOrderRate,2)}%`:t('impossible');
      refs.roi.textContent=Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞');

      refs.grossSales.textContent=money(r.grossSales);
      refs.paymentFeeAmount.textContent=money(r.paymentFeeAmount);
      refs.affiliateAmount.textContent=money(r.affiliateAmount);
      refs.payback.textContent=Number.isFinite(r.payback)?`${num(r.payback,1)} ${t('monthsUnit')}`:t('impossible');
      refs.periodNet.textContent=money(r.periodNet);

      refs.status.innerHTML=r.monthlyNet>=0
        ? `<span class="ok">●</span> ${t('statusGood')}`
        : `<span class="warn">●</span> ${t('statusWarn')}`;

      refs.summary.value=[
        t('summaryTitle'),
        `${t('k_attendees')}: ${num(r.attendees,0)}`,
        `${t('k_buyers')}: ${num(r.buyers,0)}`,
        `${t('d_grossSales')}: ${money(r.grossSales)}`,
        `${t('k_netRevenue')}: ${money(r.realized)}`,
        `${t('k_totalCost')}: ${money(r.totalCost)}`,
        `${t('k_monthlyNet')}: ${money(r.monthlyNet)}`,
        `${t('k_breakEvenOrder')}: ${Number.isFinite(r.breakEvenOrderRate)?`${num(r.breakEvenOrderRate,2)}%`:t('impossible')}`,
        `${t('k_roi')}: ${Number.isFinite(r.roi)?`${num(r.roi,1)}%`:(r.roi>0?'∞':'-∞')}`
      ].join('\n');
    }

    refs.copy.addEventListener('click',async()=>{
      if(!refs.summary.value.trim()) return;
      try{await navigator.clipboard.writeText(refs.summary.value);alert(t('copied'));}
      catch{alert(t('copyFail'));}
    });
    refs.reset.addEventListener('click',()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.registrants,refs.showRate,refs.pitchRate,refs.orderRate,refs.aov,refs.refundRate,refs.paymentFee,refs.affiliateRate,refs.deliveryCost,refs.adSpend,refs.opsCost,refs.oneTime,refs.months].forEach(el=>{el.addEventListener('input',render);el.addEventListener('change',render);});
    refs.lang.addEventListener('click',()=>{lang=lang==='ko'?'en':'ko';applyI18n();render();});

    applyI18n();
    render();
  </script>
</body>
</html>
