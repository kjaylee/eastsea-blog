<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket 테스터 | WebSocket Tester</title>
  <meta name="description" content="WebSocket 서버에 연결하고 메시지를 실시간 전송/수신. ws:// 및 wss:// 지원, 색상으로 구분되는 메시지 로그, 자동 재연결, 메시지 히스토리. eastsea.kr 무료 개발자 도구.">
  <meta property="og:title" content="WebSocket 테스터 | WebSocket Tester">
  <meta property="og:description" content="WebSocket 연결 테스트, 실시간 메시지 송수신, 자동 재연결 지원.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eastsea.kr/tools/websocket-tester/">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --border: #dee2e6;
      --shadow: rgba(0,0,0,0.08);
      --card-bg: #ffffff;
      --input-bg: #ffffff;
      --accent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --accent-color: #4facfe;
      --msg-bg: #1a1a2e;
      --sent-bg: #1a3a5c;
      --sent-text: #7eb8f7;
      --recv-bg: #1a4d2e;
      --recv-text: #6fcf97;
      --sys-bg: #2d2d2d;
      --sys-text: #adb5bd;
      --error-bg: #4d1a1a;
      --error-text: #f5b3b3;
    }
    [data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text-primary: #f8f9fa;
      --text-secondary: #adb5bd;
      --border: #495057;
      --shadow: rgba(0,0,0,0.3);
      --card-bg: #2a2a2a;
      --input-bg: #1e1e1e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif; background: var(--bg-secondary); color: var(--text-primary); min-height: 100vh; transition: background 0.3s, color 0.3s; }
    .container { max-width: 960px; margin: 0 auto; padding: 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); text-decoration: none; font-size: 0.88rem; transition: transform 0.2s; }
    .back-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
    .theme-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; cursor: pointer; font-size: 0.88rem; color: var(--text-primary); }
    header { text-align: center; margin-bottom: 24px; }
    h1 { background: var(--accent); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; margin-bottom: 8px; }
    header p { color: var(--text-secondary); font-size: 0.95rem; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px var(--shadow); margin-bottom: 16px; }
    label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 5px; }
    input[type="text"], input[type="number"] { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.88rem; background: var(--input-bg); color: var(--text-primary); transition: border-color 0.2s; }
    input:focus { outline: none; border-color: var(--accent-color); }
    .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #111; }
    .btn-danger { background: linear-gradient(135deg, #f5576c, #f093fb); color: white; }
    .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; border-radius: 7px; }
    .connect-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .connect-row > div:first-child { flex: 1; min-width: 200px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 7px; }
    .status-disconnected { background: #adb5bd; }
    .status-connecting { background: #ffc107; animation: pulse 1s infinite; }
    .status-connected { background: #28a745; animation: pulse 2s infinite; }
    .status-error { background: #dc3545; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-bar {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border-radius: 10px;
      margin-top: 12px;
      font-size: 0.88rem;
    }
    .stats-mini {
      margin-left: auto;
      display: flex;
      gap: 14px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .stats-mini span { white-space: nowrap; }
    .msg-log {
      background: var(--msg-bg);
      border-radius: 12px;
      padding: 12px;
      min-height: 340px;
      max-height: 480px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
    }
    .msg-item {
      display: flex;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      align-items: flex-start;
    }
    .msg-item.sent { background: var(--sent-bg); }
    .msg-item.received { background: var(--recv-bg); }
    .msg-item.system { background: var(--sys-bg); }
    .msg-item.error { background: var(--error-bg); }
    .msg-ts { font-size: 0.72rem; color: #666; flex-shrink: 0; padding-top: 2px; }
    .msg-dir {
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
      padding: 1px 6px;
      border-radius: 4px;
      margin-top: 1px;
    }
    .sent .msg-dir { background: #1e3f6b; color: var(--sent-text); }
    .received .msg-dir { background: #1a4527; color: var(--recv-text); }
    .system .msg-dir { background: #444; color: var(--sys-text); }
    .error .msg-dir { background: #6b1a1a; color: var(--error-text); }
    .sent .msg-text { color: var(--sent-text); }
    .received .msg-text { color: var(--recv-text); }
    .system .msg-text { color: var(--sys-text); }
    .error .msg-text { color: var(--error-text); }
    .msg-text { flex: 1; word-break: break-all; white-space: pre-wrap; }
    .log-controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
    .log-controls label { margin: 0; font-size: 0.82rem; font-weight: 600; }
    .log-filter { display: flex; gap: 6px; margin-left: auto; }
    .filter-chip { padding: 3px 10px; border-radius: 14px; font-size: 0.75rem; cursor: pointer; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-secondary); transition: background 0.15s; }
    .filter-chip.active-sent { background: var(--sent-bg); color: var(--sent-text); border-color: transparent; }
    .filter-chip.active-received { background: var(--recv-bg); color: var(--recv-text); border-color: transparent; }
    .filter-chip.active-system { background: var(--sys-bg); color: var(--sys-text); border-color: transparent; }
    .send-area textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Courier New', monospace; font-size: 0.85rem; background: var(--input-bg); color: var(--text-primary); resize: vertical; }
    .send-area textarea:focus { outline: none; border-color: var(--accent-color); }
    .send-options { display: flex; gap: 12px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .send-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
    .checkbox-label input { accent-color: var(--accent-color); }
    .history-list { list-style: none; max-height: 160px; overflow-y: auto; }
    .history-item { display: flex; gap: 8px; align-items: center; padding: 5px 8px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.82rem; }
    .history-item:hover { background: var(--bg-secondary); }
    .history-item:last-child { border-bottom: none; }
    .history-text { flex: 1; font-family: monospace; color: var(--accent-color); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty-log { text-align: center; padding: 50px; color: #555; }
    .quick-msg-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .quick-btn { padding: 4px 10px; background: #1e2a3a; color: #7eb8f7; border: 1px solid #1e3f6b; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: monospace; transition: background 0.15s; }
    .quick-btn:hover { background: var(--sent-bg); }
    .reconnect-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      padding: 4px 10px;
      background: #ffc107;
      color: #333;
      border-radius: 20px;
      margin-left: 10px;
    }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 0.85rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000; }
    .toast.show { opacity: 1; }
    .header-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
    .header-key, .header-val { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 0.82rem; background: var(--input-bg); color: var(--text-primary); }
    @media (max-width: 600px) { .connect-row { flex-direction: column; } .connect-row > div:first-child { width: 100%; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="/tools/" class="back-btn">← 도구 목록</a>
      <button class="theme-btn" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>
    <header>
      <h1>🔌 WebSocket 테스터</h1>
      <p>WebSocket 서버에 연결하고 실시간 메시지를 송수신하세요</p>
    </header>

    <!-- Connection -->
    <div class="card">
      <div class="connect-row">
        <div>
          <label>WebSocket URL</label>
          <input type="text" id="wsUrl" value="wss://echo.websocket.org" placeholder="ws://localhost:8080 또는 wss://...">
        </div>
        <button class="btn btn-primary" id="connectBtn" onclick="connect()">연결</button>
        <button class="btn btn-danger" id="disconnectBtn" onclick="disconnect()" disabled>연결 끊기</button>
      </div>
      <div class="status-bar">
        <span class="status-dot status-disconnected" id="statusDot"></span>
        <span id="statusText">연결 안 됨</span>
        <span id="reconnectBadge" style="display:none;" class="reconnect-badge">🔄 재연결 중...</span>
        <div class="stats-mini">
          <span>📤 전송: <strong id="sentCount">0</strong></span>
          <span>📥 수신: <strong id="recvCount">0</strong></span>
        </div>
      </div>
      <div style="margin-top:12px;">
        <label class="checkbox-label" style="display:inline-flex;">
          <input type="checkbox" id="autoReconnect">
          자동 재연결 (연결 끊김 시 5초 후)
        </label>
      </div>
    </div>

    <!-- Message Log -->
    <div class="card" style="padding-bottom:14px;">
      <div class="log-controls">
        <label>📋 메시지 로그</label>
        <div style="display:flex;gap:8px;margin-left:auto;">
          <button class="btn btn-secondary btn-sm" onclick="clearLog()">🗑️ 지우기</button>
          <button class="btn btn-secondary btn-sm" onclick="copyLog()">📋 복사</button>
          <button class="btn btn-secondary btn-sm" onclick="downloadLog()">⬇️ 저장</button>
        </div>
      </div>
      <div class="msg-log" id="msgLog">
        <div class="empty-log">
          <div style="font-size:2rem;margin-bottom:10px;">🔌</div>
          <div>WebSocket URL을 입력하고 연결하세요</div>
          <div style="font-size:0.8rem;margin-top:6px;color:#666;">wss://echo.websocket.org 샘플 에코 서버를 사용해보세요</div>
        </div>
      </div>
    </div>

    <!-- Send -->
    <div class="card send-area">
      <label>메시지 전송</label>
      <div class="quick-msg-row">
        <span class="quick-btn" onclick="setMsg('ping')">ping</span>
        <span class="quick-btn" onclick="setMsg('hello')">hello</span>
        <span class="quick-btn" onclick='setMsg(JSON.stringify({type:"ping",ts:Date.now()}))'>{"type":"ping"}</span>
        <span class="quick-btn" onclick='setMsg(JSON.stringify({action:"subscribe",channel:"test"}))'>{"action":"subscribe"}</span>
        <span class="quick-btn" onclick='setMsg(JSON.stringify({id:1,method:"echo",params:["test"]}))'>JSON-RPC</span>
      </div>
      <textarea id="msgInput" placeholder='메시지를 입력하세요. 텍스트 또는 JSON 모두 지원합니다.&#10;예: {"event": "join", "room": "lobby"}'></textarea>
      <div class="send-options">
        <label class="checkbox-label">
          <input type="checkbox" id="formatJson">
          JSON 자동 포맷
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="saveHistory" checked>
          히스토리 저장
        </label>
      </div>
      <div class="send-row">
        <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn" disabled>전송 →</button>
        <button class="btn btn-secondary btn-sm" onclick="formatMsg()">JSON 포맷</button>
        <button class="btn btn-secondary btn-sm" onclick="clearMsg()">지우기</button>
      </div>
    </div>

    <!-- History -->
    <div class="card" id="historyCard" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <label style="margin:0;">📜 전송 히스토리</label>
        <button class="btn btn-secondary btn-sm" onclick="clearHistory()">지우기</button>
      </div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.addEventListener('DOMContentLoaded', () => {
          const btn = document.querySelector('.theme-btn');
          if (btn) btn.textContent = '☀️ 라이트 모드';
        });
      }
    })();

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.theme-btn').textContent = isDark ? '🌙 다크 모드' : '☀️ 라이트 모드';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    let ws = null;
    let sentCount = 0;
    let recvCount = 0;
    let msgHistory = [];
    let reconnectTimer = null;
    let reconnectCount = 0;
    let logEntries = [];

    function setStatus(state, text) {
      const dot = document.getElementById('statusDot');
      dot.className = 'status-dot status-' + state;
      document.getElementById('statusText').textContent = text;
    }

    function connect() {
      const url = document.getElementById('wsUrl').value.trim();
      if (!url) { showToast('WebSocket URL을 입력하세요.'); return; }
      if (!url.startsWith('ws://') && !url.startsWith('wss://')) {
        showToast('URL은 ws:// 또는 wss://로 시작해야 합니다.');
        return;
      }

      if (ws && ws.readyState !== WebSocket.CLOSED) {
        ws.close();
      }

      addLog('system', 'SYSTEM', `연결 시도: ${url}`);
      setStatus('connecting', '연결 중...');
      document.getElementById('connectBtn').disabled = true;

      try {
        ws = new WebSocket(url);

        ws.onopen = () => {
          setStatus('connected', `연결됨: ${url}`);
          document.getElementById('connectBtn').disabled = true;
          document.getElementById('disconnectBtn').disabled = false;
          document.getElementById('sendBtn').disabled = false;
          document.getElementById('reconnectBadge').style.display = 'none';
          reconnectCount = 0;
          addLog('system', 'OPEN', '연결 성공 ✓');
        };

        ws.onmessage = (e) => {
          recvCount++;
          document.getElementById('recvCount').textContent = recvCount;
          let displayData = e.data;
          try {
            const parsed = JSON.parse(e.data);
            displayData = JSON.stringify(parsed, null, 2);
          } catch(ex) { /* not JSON */ }
          addLog('received', '← IN', displayData);
        };

        ws.onclose = (e) => {
          setStatus('disconnected', `연결 끊김 (코드: ${e.code})`);
          document.getElementById('connectBtn').disabled = false;
          document.getElementById('disconnectBtn').disabled = true;
          document.getElementById('sendBtn').disabled = true;
          addLog('system', 'CLOSE', `연결 종료 (code: ${e.code}, reason: ${e.reason || '없음'})`);

          if (document.getElementById('autoReconnect').checked && reconnectCount < 10) {
            reconnectCount++;
            const delay = 5000;
            document.getElementById('reconnectBadge').style.display = '';
            addLog('system', 'SYSTEM', `${delay/1000}초 후 재연결 시도 (${reconnectCount}회)...`);
            reconnectTimer = setTimeout(() => {
              if (document.getElementById('autoReconnect').checked) connect();
            }, delay);
          } else {
            document.getElementById('reconnectBadge').style.display = 'none';
          }
        };

        ws.onerror = (e) => {
          setStatus('error', '연결 오류');
          addLog('error', 'ERROR', '연결 오류 발생. URL 및 서버 상태를 확인하세요.');
        };

      } catch(e) {
        setStatus('error', '오류');
        addLog('error', 'ERROR', e.message);
        document.getElementById('connectBtn').disabled = false;
      }
    }

    function disconnect() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      document.getElementById('autoReconnect').checked = false;
      document.getElementById('reconnectBadge').style.display = 'none';
      if (ws) ws.close(1000, '사용자가 연결을 종료했습니다.');
    }

    function sendMessage() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        showToast('연결되지 않았습니다. 먼저 연결하세요.');
        return;
      }
      let msg = document.getElementById('msgInput').value;
      if (!msg.trim()) { showToast('메시지를 입력하세요.'); return; }

      if (document.getElementById('formatJson').checked) {
        try { msg = JSON.stringify(JSON.parse(msg)); } catch(e) { /* send as-is */ }
      }

      ws.send(msg);
      sentCount++;
      document.getElementById('sentCount').textContent = sentCount;
      addLog('sent', '→ OUT', msg);

      if (document.getElementById('saveHistory').checked) {
        addToHistory(msg);
      }
    }

    function addLog(type, dir, text) {
      const ts = new Date().toLocaleTimeString('ko-KR', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' }) +
        '.' + String(new Date().getMilliseconds()).padStart(3,'0');

      logEntries.push({ ts, dir, text, type });

      const log = document.getElementById('msgLog');
      const isEmpty = log.querySelector('.empty-log');
      if (isEmpty) isEmpty.remove();

      const item = document.createElement('div');
      item.className = `msg-item ${type}`;
      item.innerHTML = `<span class="msg-ts">${ts}</span><span class="msg-dir">${dir}</span><span class="msg-text">${escLog(text)}</span>`;
      log.appendChild(item);

      // Auto-scroll
      log.scrollTop = log.scrollHeight;
    }

    function escLog(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function clearLog() {
      logEntries = [];
      sentCount = 0;
      recvCount = 0;
      document.getElementById('sentCount').textContent = 0;
      document.getElementById('recvCount').textContent = 0;
      document.getElementById('msgLog').innerHTML = '<div class="empty-log"><div style="font-size:2rem;margin-bottom:10px;">🔌</div><div>로그가 비워졌습니다.</div></div>';
    }

    function copyLog() {
      const lines = logEntries.map(e => `[${e.ts}] [${e.dir}] ${e.text}`).join('\n');
      navigator.clipboard.writeText(lines).then(() => showToast('로그가 복사되었습니다!'));
    }

    function downloadLog() {
      const lines = logEntries.map(e => `[${e.ts}] [${e.dir}] ${e.text}`).join('\n');
      const blob = new Blob([lines], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `websocket-log-${new Date().toISOString().slice(0,10)}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function formatMsg() {
      const input = document.getElementById('msgInput');
      try {
        const parsed = JSON.parse(input.value);
        input.value = JSON.stringify(parsed, null, 2);
      } catch(e) {
        showToast('유효한 JSON이 아닙니다.');
      }
    }

    function clearMsg() { document.getElementById('msgInput').value = ''; }

    function setMsg(msg) {
      document.getElementById('msgInput').value = msg;
    }

    function addToHistory(msg) {
      msgHistory = msgHistory.filter(m => m !== msg);
      msgHistory.unshift(msg);
      if (msgHistory.length > 20) msgHistory.pop();
      renderHistory();
    }

    function renderHistory() {
      if (!msgHistory.length) {
        document.getElementById('historyCard').style.display = 'none';
        return;
      }
      document.getElementById('historyCard').style.display = '';
      let html = '';
      msgHistory.forEach((m, i) => {
        html += `<li class="history-item" onclick="setMsg(this.querySelector('.history-text').title)">
          <span class="history-text" title="${m.replace(/"/g,'&quot;')}">${escLog(m.length > 80 ? m.slice(0,80) + '…' : m)}</span>
          <button class="btn btn-secondary btn-sm" style="flex-shrink:0;" onclick="event.stopPropagation();removeHistory(${i})">✕</button>
        </li>`;
      });
      document.getElementById('historyList').innerHTML = html;
    }

    function removeHistory(i) {
      msgHistory.splice(i, 1);
      renderHistory();
    }

    function clearHistory() {
      msgHistory = [];
      renderHistory();
    }

    // Keyboard shortcut: Ctrl+Enter to send
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('msgInput').addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          sendMessage();
        }
      });
    });

    window.addEventListener('beforeunload', () => {
      if (ws) ws.close();
    });
  </script>
</body>
</html>
