<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wholesale Margin Pricing Calculator | 도매 마진 가격 계산기</title>
  <meta name="description" content="도매 단가, 원가, 수수료, 반품 손실, 물류비를 반영해 주문별 예상 마진과 손익분기/목표 달성 단가를 계산합니다." />
  <style>
    :root{--bg:#081120;--card:#16253b;--line:#2a425f;--txt:#edf4ff;--muted:#a3b5cb;--pri:#60a5fa;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 10% 0%,#204067 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 14px 64px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.8vw,1.78rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.5}
    .home{color:#dbeafe;text-decoration:none;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#1a3757;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(160deg,#1b3554,#15253d);border:1px solid var(--line);border-radius:14px;padding:13px}
    h2{margin:0 0 10px;font-size:1rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1a2e;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb)}
    .soft{background:#264664;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #6f3640;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}
    .err.show{display:block}
    textarea{margin-top:10px;min-height:104px;resize:vertical}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{background:#0f1d32;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1a324f;color:#dbeafe;font-size:.76rem}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.89rem}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
    th:first-child,td:first-child{text-align:left}
    .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>📦 도매 마진 가격 계산기</h1>
        <div class="sub">수수료·반품·물류·간접비까지 포함한 실질 손익을 계산하고, 손익분기/목표 마진 달성 단가를 즉시 확인합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력</h2>
        <div class="inputs">
          <div><label for="unitPrice">도매 판매단가 (1개, KRW)</label><input id="unitPrice" type="number" min="1" step="10" value="21000" /></div>
          <div><label for="units">주문 수량 (개)</label><input id="units" type="number" min="1" step="1" value="120" /></div>
          <div><label for="unitCogs">상품 원가 (1개, KRW)</label><input id="unitCogs" type="number" min="0" step="10" value="9000" /></div>
          <div><label for="packFulfill">포장/풀필먼트 (1개, KRW)</label><input id="packFulfill" type="number" min="0" step="10" value="1200" /></div>
          <div><label for="shipping">주문당 물류비 (KRW)</label><input id="shipping" type="number" min="0" step="100" value="70000" /></div>
          <div><label for="feePct">플랫폼/정산 수수료 (%)</label><input id="feePct" type="number" min="0" max="99.9" step="0.1" value="8" /></div>
          <div><label for="returnRate">반품률 (%)</label><input id="returnRate" type="number" min="0" max="100" step="0.1" value="6" /></div>
          <div><label for="returnLoss">반품 시 매출손실 비중 (%)</label><input id="returnLoss" type="number" min="0" max="100" step="0.1" value="65" /></div>
          <div><label for="overhead">주문당 간접비 (KRW)</label><input id="overhead" type="number" min="0" step="100" value="45000" /></div>
          <div><label for="targetMargin">목표 순마진율 (%)</label><input id="targetMargin" type="number" min="0" max="95" step="0.1" value="18" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">주문 매출</div><div id="orderRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k">총 예상비용</div><div id="totalCost" class="v">-</div></div>
          <div class="kpi"><div class="k">예상 순이익</div><div id="netProfit" class="v sm">-</div></div>
          <div class="kpi"><div class="k">순마진율</div><div id="marginPct" class="v sm">-</div></div>
          <div class="kpi"><div class="k">손익분기 단가</div><div id="breakEvenPrice" class="v sm">-</div></div>
          <div class="kpi"><div class="k">목표마진 단가</div><div id="targetPrice" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill">입력을 확인하세요</div>

        <h2 style="margin-top:12px">세부 구성</h2>
        <table>
          <tbody>
            <tr><th>수수료</th><td id="platformFee">-</td></tr>
            <tr><th>기본 원가 + 물류 + 간접비</th><td id="baseCost">-</td></tr>
            <tr><th>예상 반품손실</th><td id="returnLossCost">-</td></tr>
            <tr><th>순이익 (1개당)</th><td id="profitPerUnit">-</td></tr>
            <tr><th>목표마진 달성 시 잉여/부족</th><td id="gapToTarget">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      unitPrice: $('unitPrice'), units: $('units'), unitCogs: $('unitCogs'), packFulfill: $('packFulfill'), shipping: $('shipping'), feePct: $('feePct'),
      returnRate: $('returnRate'), returnLoss: $('returnLoss'), overhead: $('overhead'), targetMargin: $('targetMargin'),
      orderRevenue: $('orderRevenue'), totalCost: $('totalCost'), netProfit: $('netProfit'), marginPct: $('marginPct'), breakEvenPrice: $('breakEvenPrice'), targetPrice: $('targetPrice'),
      platformFee: $('platformFee'), baseCost: $('baseCost'), returnLossCost: $('returnLossCost'), profitPerUnit: $('profitPerUnit'), gapToTarget: $('gapToTarget'),
      status: $('status'), error: $('error'), summary: $('summary'), copy: $('copy'), reset: $('reset')
    };

    const defaults = {
      unitPrice: 21000, units: 120, unitCogs: 9000, packFulfill: 1200, shipping: 70000, feePct: 8, returnRate: 6, returnLoss: 65, overhead: 45000, targetMargin: 18
    };

    const won = (n) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(n || 0);
    const num = (n, d = 2) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });
    const inRange = (v, min, max) => Number.isFinite(v) && v >= min && v <= max;

    function validate(v) {
      if (!Number.isFinite(v.unitPrice) || v.unitPrice <= 0) return '도매 판매단가는 0보다 커야 합니다.';
      if (!Number.isFinite(v.units) || v.units <= 0) return '주문 수량은 1 이상이어야 합니다.';
      if (!Number.isFinite(v.unitCogs) || v.unitCogs < 0) return '상품 원가는 0 이상이어야 합니다.';
      if (!Number.isFinite(v.packFulfill) || v.packFulfill < 0) return '포장/풀필먼트 비용은 0 이상이어야 합니다.';
      if (!Number.isFinite(v.shipping) || v.shipping < 0) return '주문당 물류비는 0 이상이어야 합니다.';
      if (!inRange(v.feePct, 0, 99.9)) return '수수료는 0~99.9 범위여야 합니다.';
      if (!inRange(v.returnRate, 0, 100)) return '반품률은 0~100 범위여야 합니다.';
      if (!inRange(v.returnLoss, 0, 100)) return '반품 매출손실 비중은 0~100 범위여야 합니다.';
      if (!Number.isFinite(v.overhead) || v.overhead < 0) return '간접비는 0 이상이어야 합니다.';
      if (!inRange(v.targetMargin, 0, 95)) return '목표 순마진율은 0~95 범위여야 합니다.';

      const feeRate = v.feePct / 100;
      const targetRate = v.targetMargin / 100;
      if (1 - feeRate <= 0) return '수수료가 100%에 가까워 손익 계산이 불가능합니다.';
      if (1 - feeRate - targetRate <= 0) return '현재 수수료 구조에서 입력한 목표 마진율은 달성 불가능합니다. 목표 마진율을 낮추세요.';
      return '';
    }

    function compute(v) {
      const feeRate = v.feePct / 100;
      const returnRate = v.returnRate / 100;
      const returnLossRate = v.returnLoss / 100;
      const targetRate = v.targetMargin / 100;

      const orderRevenue = v.unitPrice * v.units;
      const platformFee = orderRevenue * feeRate;
      const perUnitCost = v.unitCogs + v.packFulfill;
      const baseCost = perUnitCost * v.units + v.shipping + v.overhead;
      const returnLossCost = orderRevenue * returnRate * returnLossRate;
      const totalCost = platformFee + baseCost + returnLossCost;

      const netProfit = orderRevenue - totalCost;
      const marginPct = orderRevenue > 0 ? (netProfit / orderRevenue) * 100 : NaN;
      const profitPerUnit = v.units > 0 ? netProfit / v.units : NaN;

      const breakEvenDenom = v.units * (1 - feeRate);
      const breakEvenPrice = breakEvenDenom > 0 ? (baseCost + returnLossCost) / breakEvenDenom : Infinity;

      const targetDenom = v.units * (1 - feeRate - targetRate);
      const targetPrice = targetDenom > 0 ? (baseCost + returnLossCost) / targetDenom : Infinity;
      const targetOrderProfit = orderRevenue * targetRate;
      const gapToTarget = netProfit - targetOrderProfit;

      return { orderRevenue, platformFee, baseCost, returnLossCost, totalCost, netProfit, marginPct, profitPerUnit, breakEvenPrice, targetPrice, gapToTarget };
    }

    function resetOutputs() {
      ['orderRevenue','totalCost','netProfit','marginPct','breakEvenPrice','targetPrice','platformFee','baseCost','returnLossCost','profitPerUnit','gapToTarget'].forEach((k) => refs[k].textContent = '-');
      refs.status.textContent = '입력을 확인하세요';
      refs.summary.value = '';
    }

    function fmtMaybe(v, formatter) {
      return Number.isFinite(v) ? formatter(v) : 'N/A';
    }

    function render() {
      const v = {
        unitPrice: Number(refs.unitPrice.value),
        units: Number(refs.units.value),
        unitCogs: Number(refs.unitCogs.value),
        packFulfill: Number(refs.packFulfill.value),
        shipping: Number(refs.shipping.value),
        feePct: Number(refs.feePct.value),
        returnRate: Number(refs.returnRate.value),
        returnLoss: Number(refs.returnLoss.value),
        overhead: Number(refs.overhead.value),
        targetMargin: Number(refs.targetMargin.value)
      };

      const err = validate(v);
      refs.error.classList.toggle('show', Boolean(err));
      refs.error.textContent = err;
      if (err) {
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.orderRevenue.textContent = won(r.orderRevenue);
      refs.totalCost.textContent = won(r.totalCost);
      refs.netProfit.textContent = won(r.netProfit);
      refs.marginPct.textContent = fmtMaybe(r.marginPct, (x) => `${num(x, 2)}%`);
      refs.breakEvenPrice.textContent = fmtMaybe(r.breakEvenPrice, won);
      refs.targetPrice.textContent = fmtMaybe(r.targetPrice, won);

      refs.platformFee.textContent = won(r.platformFee);
      refs.baseCost.textContent = won(r.baseCost);
      refs.returnLossCost.textContent = won(r.returnLossCost);
      refs.profitPerUnit.textContent = fmtMaybe(r.profitPerUnit, won);
      refs.gapToTarget.textContent = won(r.gapToTarget);

      if (r.netProfit > 0) {
        refs.status.innerHTML = `<span class="good">●</span> 주문당 순이익 ${won(r.netProfit)} (마진 ${num(r.marginPct,1)}%)`;
      } else if (Math.abs(r.netProfit) < 1) {
        refs.status.innerHTML = `<span class="warn">●</span> 손익분기점 수준`;
      } else {
        refs.status.innerHTML = `<span class="bad">●</span> 주문당 예상 손실 ${won(Math.abs(r.netProfit))}`;
      }

      refs.summary.value = [
        '[Wholesale Margin Pricing 요약]',
        `주문 매출: ${won(r.orderRevenue)}`,
        `총 예상비용: ${won(r.totalCost)}`,
        `예상 순이익: ${won(r.netProfit)} (${num(r.marginPct,2)}%)`,
        `손익분기 단가: ${fmtMaybe(r.breakEvenPrice, won)}`,
        `목표마진 달성 단가: ${fmtMaybe(r.targetPrice, won)}`,
        `목표마진 대비 잉여/부족: ${won(r.gapToTarget)}`
      ].join('\n');
    }

    refs.copy.addEventListener('click', async () => {
      if (!refs.summary.value.trim()) return;
      try {
        await navigator.clipboard.writeText(refs.summary.value);
        alert('요약이 복사되었습니다.');
      } catch {
        alert('복사 권한이 없어 수동 복사를 사용해주세요.');
      }
    });

    refs.reset.addEventListener('click', () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.unitPrice, refs.units, refs.unitCogs, refs.packFulfill, refs.shipping, refs.feePct, refs.returnRate, refs.returnLoss, refs.overhead, refs.targetMargin].forEach((el) => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    render();
  </script>
</body>
</html>
