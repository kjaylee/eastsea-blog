<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wholesale vs DTC Margin Calculator | 도매 vs DTC 마진 계산기</title>
  <meta name="description" content="도매/직접판매(DTC) 채널 비중 변경이 월 공헌이익, 누적 순효과, ROI, 손익분기 DTC 비중에 미치는 영향을 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}
    .head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.18rem,2.7vw,1.75rem)}
    .sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:12px}
    .card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}
    .inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    textarea{min-height:98px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}
    .error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}
    .v{font-size:1.12rem;font-weight:800;word-break:break-word}
    .v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">🏷️ 도매 vs DTC 마진 계산기</h1>
        <div class="sub" data-i18n="subtitle">채널 믹스를 도매에서 DTC로 조정할 때 월 이익 변화와 손익분기 DTC 비중을 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="units" data-i18n="units">월 판매 수량 (개)</label><input id="units" type="number" min="1" value="28000" /></div>
          <div><label for="dtcPrice" data-i18n="dtcPrice">DTC 판매가 (KRW/개)</label><input id="dtcPrice" type="number" min="1" value="42000" /></div>
          <div><label for="whDiscount" data-i18n="whDiscount">도매 할인율 (% of DTC)</label><input id="whDiscount" type="number" min="0" max="90" step="0.1" value="32" /></div>
          <div><label for="currentDtc" data-i18n="currentDtc">현재 DTC 비중 (%)</label><input id="currentDtc" type="number" min="0" max="100" step="0.1" value="38" /></div>
          <div><label for="targetDtc" data-i18n="targetDtc">목표 DTC 비중 (%)</label><input id="targetDtc" type="number" min="0" max="100" step="0.1" value="52" /></div>
          <div><label for="cogs" data-i18n="cogs">단위 원가 COGS (KRW)</label><input id="cogs" type="number" min="0" value="14500" /></div>
          <div><label for="dtcVar" data-i18n="dtcVar">DTC 단위 변동비 (KRW)</label><input id="dtcVar" type="number" min="0" value="5100" /></div>
          <div><label for="whVar" data-i18n="whVar">도매 단위 변동비 (KRW)</label><input id="whVar" type="number" min="0" value="1900" /></div>
          <div><label for="extraMonthly" data-i18n="extraMonthly">믹스 전환 추가 월 운영비 (KRW)</label><input id="extraMonthly" type="number" min="0" value="7800000" /></div>
          <div><label for="setup" data-i18n="setup">초기 전환 비용 (KRW)</label><input id="setup" type="number" min="0" value="34000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="48" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_baseProfit">현재 채널 월 이익</div><div id="baseProfit" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_targetProfit">목표 채널 월 이익</div><div id="targetProfit" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_monthlyDelta">월 순이익 증감</div><div id="monthlyDelta" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_termNet">분석기간 순효과</div><div id="termNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_unitDtc">DTC 단위 이익</th><td id="unitDtc">-</td></tr>
            <tr><th data-i18n="d_unitWh">도매 단위 이익</th><td id="unitWh">-</td></tr>
            <tr><th data-i18n="d_whPrice">도매 단가</th><td id="whPrice">-</td></tr>
            <tr><th data-i18n="d_breakEvenShare">손익분기 DTC 비중</th><td id="breakEvenShare">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      units:$("units"), dtcPrice:$("dtcPrice"), whDiscount:$("whDiscount"), currentDtc:$("currentDtc"), targetDtc:$("targetDtc"),
      cogs:$("cogs"), dtcVar:$("dtcVar"), whVar:$("whVar"), extraMonthly:$("extraMonthly"), setup:$("setup"), months:$("months"),
      baseProfit:$("baseProfit"), targetProfit:$("targetProfit"), monthlyDelta:$("monthlyDelta"), termNet:$("termNet"), roi:$("roi"), payback:$("payback"),
      unitDtc:$("unitDtc"), unitWh:$("unitWh"), whPrice:$("whPrice"), breakEvenShare:$("breakEvenShare"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { units:28000, dtcPrice:42000, whDiscount:32, currentDtc:38, targetDtc:52, cogs:14500, dtcVar:5100, whVar:1900, extraMonthly:7800000, setup:34000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"🏷️ 도매 vs DTC 마진 계산기", subtitle:"채널 믹스를 도매에서 DTC로 조정할 때 월 이익 변화와 손익분기 DTC 비중을 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        units:"월 판매 수량 (개)", dtcPrice:"DTC 판매가 (KRW/개)", whDiscount:"도매 할인율 (% of DTC)", currentDtc:"현재 DTC 비중 (%)", targetDtc:"목표 DTC 비중 (%)",
        cogs:"단위 원가 COGS (KRW)", dtcVar:"DTC 단위 변동비 (KRW)", whVar:"도매 단위 변동비 (KRW)", extraMonthly:"믹스 전환 추가 월 운영비 (KRW)", setup:"초기 전환 비용 (KRW)", months:"분석 기간 (개월)",
        k_baseProfit:"현재 채널 월 이익", k_targetProfit:"목표 채널 월 이익", k_monthlyDelta:"월 순이익 증감", k_termNet:"분석기간 순효과", k_roi:"ROI", k_payback:"회수기간",
        d_unitDtc:"DTC 단위 이익", d_unitWh:"도매 단위 이익", d_whPrice:"도매 단가", d_breakEvenShare:"손익분기 DTC 비중",
        errUnits:"월 판매 수량은 1 이상이어야 합니다.", errDtcPrice:"DTC 판매가는 0보다 커야 합니다.", errDiscount:"도매 할인율은 0~90% 범위여야 합니다.", errShare:"채널 비중은 0~100% 범위여야 합니다.",
        errCosts:"원가/변동비는 0 이상이어야 합니다.", errMonthly:"추가 월 운영비는 0 이상이어야 합니다.", errSetup:"초기 전환비는 0 이상이어야 합니다.", errMonths:"분석 기간은 1~48개월 범위여야 합니다.",
        errUnitProfit:"DTC/도매 중 최소 1개 채널의 단위 이익이 양수여야 합니다.", noPayback:"회수 불가", impossible:"달성 불가", unitMonth:"개월", unitItem:"개",
        statusGood:"믹스 전환이 월 순이익을 개선합니다", statusBad:"가정 재조정이 필요합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.",
        summaryTitle:"[Wholesale vs DTC Margin 요약]", summaryTerm:"개월 누적 순효과", summaryBreakEven:"손익분기 DTC 비중"
      },
      en: {
        title:"🏷️ Wholesale vs DTC Margin Calculator", subtitle:"Estimate profit impact and break-even DTC mix when shifting channel composition from wholesale to DTC.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        units:"Monthly units sold", dtcPrice:"DTC selling price (KRW/unit)", whDiscount:"Wholesale discount (% of DTC)", currentDtc:"Current DTC share (%)", targetDtc:"Target DTC share (%)",
        cogs:"COGS per unit (KRW)", dtcVar:"DTC variable cost per unit (KRW)", whVar:"Wholesale variable cost per unit (KRW)", extraMonthly:"Extra monthly operating cost for mix shift (KRW)", setup:"One-time transition cost (KRW)", months:"Analysis period (months)",
        k_baseProfit:"Current monthly channel profit", k_targetProfit:"Target monthly channel profit", k_monthlyDelta:"Monthly net delta", k_termNet:"Period net impact", k_roi:"ROI", k_payback:"Payback period",
        d_unitDtc:"DTC unit profit", d_unitWh:"Wholesale unit profit", d_whPrice:"Wholesale unit price", d_breakEvenShare:"Break-even DTC share",
        errUnits:"Monthly units sold must be at least 1.", errDtcPrice:"DTC price must be greater than 0.", errDiscount:"Wholesale discount must be between 0 and 90%.", errShare:"Channel shares must be between 0 and 100%.",
        errCosts:"COGS and variable costs must be >= 0.", errMonthly:"Extra monthly cost must be >= 0.", errSetup:"Transition setup cost must be >= 0.", errMonths:"Analysis period must be between 1 and 48 months.",
        errUnitProfit:"At least one channel unit profit should be positive.", noPayback:"No payback", impossible:"Not achievable", unitMonth:"months", unitItem:"units",
        statusGood:"Channel mix shift improves monthly net profit", statusBad:"Re-check your assumptions", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard permission unavailable. Please copy manually.",
        summaryTitle:"[Wholesale vs DTC Margin Summary]", summaryTerm:"month cumulative net impact", summaryBreakEven:"Break-even DTC share"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.units) || v.units < 1) return t("errUnits");
      if (!Number.isFinite(v.dtcPrice) || v.dtcPrice <= 0) return t("errDtcPrice");
      if (!Number.isFinite(v.whDiscount) || v.whDiscount < 0 || v.whDiscount > 90) return t("errDiscount");
      if (!Number.isFinite(v.currentDtc) || !Number.isFinite(v.targetDtc) || v.currentDtc < 0 || v.currentDtc > 100 || v.targetDtc < 0 || v.targetDtc > 100) return t("errShare");
      if ([v.cogs,v.dtcVar,v.whVar].some((n)=>!Number.isFinite(n) || n < 0)) return t("errCosts");
      if (!Number.isFinite(v.extraMonthly) || v.extraMonthly < 0) return t("errMonthly");
      if (!Number.isFinite(v.setup) || v.setup < 0) return t("errSetup");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 48) return t("errMonths");

      const whPrice = v.dtcPrice * (1 - v.whDiscount/100);
      const unitDtc = v.dtcPrice - v.cogs - v.dtcVar;
      const unitWh = whPrice - v.cogs - v.whVar;
      if (unitDtc <= 0 && unitWh <= 0) return t("errUnitProfit");
      return "";
    }

    function compute(v){
      const currentShare = v.currentDtc / 100;
      const targetShare = v.targetDtc / 100;
      const whPrice = v.dtcPrice * (1 - v.whDiscount/100);
      const unitDtc = v.dtcPrice - v.cogs - v.dtcVar;
      const unitWh = whPrice - v.cogs - v.whVar;

      const baseProfit = v.units * ((currentShare * unitDtc) + ((1 - currentShare) * unitWh));
      const targetGrossProfit = v.units * ((targetShare * unitDtc) + ((1 - targetShare) * unitWh));
      const targetProfit = targetGrossProfit - v.extraMonthly;
      const monthlyDelta = targetProfit - baseProfit;
      const termNet = monthlyDelta * v.months - v.setup;

      const invested = v.setup + (v.extraMonthly * v.months);
      const roi = invested === 0 ? (termNet >= 0 ? Infinity : -Infinity) : (termNet / invested) * 100;
      const payback = monthlyDelta > 0 ? (v.setup / monthlyDelta) : Infinity;

      const denom = v.units * (unitDtc - unitWh);
      const breakEvenShare = denom === 0 ? Infinity : currentShare + (v.extraMonthly / denom);

      return {whPrice, unitDtc, unitWh, baseProfit, targetProfit, monthlyDelta, termNet, roi, payback, breakEvenShare};
    }

    function resetOutputs(){
      ["baseProfit","targetProfit","monthlyDelta","termNet","roi","payback","unitDtc","unitWh","whPrice","breakEvenShare"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        units:Number(refs.units.value), dtcPrice:Number(refs.dtcPrice.value), whDiscount:Number(refs.whDiscount.value), currentDtc:Number(refs.currentDtc.value), targetDtc:Number(refs.targetDtc.value),
        cogs:Number(refs.cogs.value), dtcVar:Number(refs.dtcVar.value), whVar:Number(refs.whVar.value), extraMonthly:Number(refs.extraMonthly.value), setup:Number(refs.setup.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.baseProfit.textContent = money(r.baseProfit);
      refs.targetProfit.textContent = money(r.targetProfit);
      refs.monthlyDelta.textContent = money(r.monthlyDelta);
      refs.termNet.textContent = money(r.termNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback");
      refs.unitDtc.textContent = money(r.unitDtc);
      refs.unitWh.textContent = money(r.unitWh);
      refs.whPrice.textContent = money(r.whPrice);
      refs.breakEvenShare.textContent = Number.isFinite(r.breakEvenShare) && r.breakEvenShare >= 0 && r.breakEvenShare <= 1
        ? `${num(r.breakEvenShare * 100,2)}%`
        : t("impossible");

      refs.status.innerHTML = r.monthlyDelta >= 0
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_baseProfit")}: ${money(r.baseProfit)}`,
        `${t("k_targetProfit")}: ${money(r.targetProfit)}`,
        `${t("k_monthlyDelta")}: ${money(r.monthlyDelta)}`,
        `${v.months} ${t("summaryTerm")}: ${money(r.termNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,1)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("summaryBreakEven")}: ${Number.isFinite(r.breakEvenShare) && r.breakEvenShare >= 0 && r.breakEvenShare <= 1 ? `${num(r.breakEvenShare*100,2)}%` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.units,refs.dtcPrice,refs.whDiscount,refs.currentDtc,refs.targetDtc,refs.cogs,refs.dtcVar,refs.whVar,refs.extraMonthly,refs.setup,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
