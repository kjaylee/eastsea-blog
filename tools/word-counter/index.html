<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="글자수 세기 - 실시간으로 글자수, 단어수, 문장수를 세어보세요 무료 온라인 도구 | Free online tool at eastsea.monster" />
    <title>글자수 세기 | Word Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --border: #495057;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px var(--shadow);
            transition: transform 0.2s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px var(--shadow);
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.8;
            resize: vertical;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            flex: 1;
            min-width: 120px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .reading-time {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .reading-time strong {
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-value {
                font-size: 1.5rem;
            }

            textarea {
                min-height: 300px;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="container">
        <header>
            <h1>글자수 세기</h1>
            <p style="color: var(--text-secondary);">실시간으로 글자수, 단어수, 문장수를 세어보세요</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">글자수 (공백 포함)</div>
                <div class="stat-value" id="chars-with-spaces">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">글자수 (공백 제외)</div>
                <div class="stat-value" id="chars-no-spaces">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">단어수</div>
                <div class="stat-value" id="words">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">문장수</div>
                <div class="stat-value" id="sentences">0</div>
            </div>
        </div>

        <div class="card">
            <textarea id="text-input" placeholder="여기에 텍스트를 입력하거나 붙여넣으세요..."></textarea>
            
            <div class="controls">
                <button onclick="copyText()" class="secondary">복사</button>
                <button onclick="clearText()" class="secondary">지우기</button>
                <button onclick="loadSample()">샘플 텍스트</button>
            </div>

            <div class="reading-time">
                <strong id="reading-time">0분</strong> 예상 읽기 시간
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function countStats() {
            const text = document.getElementById('text-input').value;

            // Characters with spaces
            const charsWithSpaces = text.length;

            // Characters without spaces
            const charsNoSpaces = text.replace(/\s/g, '').length;

            // Words (한글, 영어, 숫자 포함)
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;

            // Sentences (마침표, 느낌표, 물음표로 구분)
            const sentences = text.trim() ? text.split(/[.!?。！？]+/).filter(s => s.trim().length > 0).length : 0;

            // Reading time (분당 200단어 기준)
            const readingTime = Math.ceil(words / 200) || 0;

            document.getElementById('chars-with-spaces').textContent = charsWithSpaces.toLocaleString();
            document.getElementById('chars-no-spaces').textContent = charsNoSpaces.toLocaleString();
            document.getElementById('words').textContent = words.toLocaleString();
            document.getElementById('sentences').textContent = sentences.toLocaleString();
            document.getElementById('reading-time').textContent = readingTime + '분';
        }

        function copyText() {
            const textarea = document.getElementById('text-input');
            if (!textarea.value) {
                alert('복사할 내용이 없습니다.');
                return;
            }
            textarea.select();
            navigator.clipboard.writeText(textarea.value);
            showToast('텍스트가 복사되었습니다!');
        }

        function clearText() {
            document.getElementById('text-input').value = '';
            countStats();
        }

        function loadSample() {
            const sample = `안녕하세요! 이것은 샘플 텍스트입니다.

글자수 세기 도구는 실시간으로 텍스트의 통계를 분석합니다. 한글과 영어를 모두 지원하며, 단어수, 문장수, 예상 읽기 시간까지 계산해줍니다.

This tool also works with English text! It counts words, sentences, and provides reading time estimates.

블로그 글, 보고서, 이메일 등을 작성할 때 유용하게 사용하실 수 있습니다. 공백 포함/제외 글자수를 모두 확인할 수 있어요.`;

            document.getElementById('text-input').value = sample;
            countStats();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 80px;
                right: 20px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 15px 25px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // Real-time counting
        document.getElementById('text-input').addEventListener('input', countStats);

        // Initialize
        countStats();
    </script>

    <style>
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }
    </style>
</body>
</html>
