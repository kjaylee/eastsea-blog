<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Working Capital Interest Savings Calculator | 운전자본 이자절감 계산기</title>
  <meta name="description" content="DSO 단축으로 확보되는 운전자본, 이자절감, 대손절감, ROI, 회수기간을 계산하는 재무 계산기" />
  <style>
    :root{--bg:#0b1120;--card:#121a30;--line:#2a3b5a;--txt:#eef3ff;--muted:#a8b6cf;--pri:#6c8cff;--soft:#17243f;--ok:#34d399;--warn:#f59e0b;--err:#fecaca;--errBg:rgba(248,113,113,.16)}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 18% 0%,#243a61 0%,#0b1120 55%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 56px}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.15rem,2.8vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .home{display:inline-block;text-decoration:none;color:#dce8ff;background:#0f1b33;border:1px solid var(--line);padding:8px 12px;border-radius:12px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.02fr .98fr;gap:12px}.card{background:linear-gradient(165deg,#172844,#121a30);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c162b;color:var(--txt);font-size:.93rem}
    textarea{min-height:112px;resize:vertical;margin-top:10px}button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#8aa7ff);font-weight:700}
    .soft{background:var(--soft);border:1px solid var(--line)}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0e1a32;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.05rem;font-weight:800;word-break:break-word}
    .pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#1a2c4c;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)}.warn{color:var(--warn)}table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>🏦 운전자본 이자절감 계산기</h1>
        <div class="sub">DSO 개선으로 확보되는 현금과 financing cost 절감 효과를 계산합니다.</div>
      </div>
      <a class="home" href="/">Back to Portal</a>
    </div>

    <section class="grid">
      <article class="card">
        <h2>입력값 Inputs</h2>
        <div class="inputs">
          <div><label for="creditSales">연간 외상 매출 (₩)</label><input id="creditSales" type="number" min="0" value="9600000000" /></div>
          <div><label for="currentDso">현재 DSO (days)</label><input id="currentDso" type="number" min="0" value="64" /></div>
          <div><label for="targetDso">목표 DSO (days)</label><input id="targetDso" type="number" min="0" value="49" /></div>
          <div><label for="borrowRate">단기 차입금리 (연 %)</label><input id="borrowRate" type="number" min="0" max="100" step="0.1" value="8.5" /></div>
          <div><label for="currentBadDebt">현재 대손율 (%)</label><input id="currentBadDebt" type="number" min="0" max="100" step="0.1" value="1.8" /></div>
          <div><label for="badDebtImprove">대손율 개선폭 (%p)</label><input id="badDebtImprove" type="number" min="0" max="100" step="0.1" value="0.6" /></div>
          <div><label for="implementationCost">도입 일회성 비용 (₩)</label><input id="implementationCost" type="number" min="0" value="45000000" /></div>
          <div><label for="annualOpex">연간 운영 비용 (₩)</label><input id="annualOpex" type="number" min="0" value="18000000" /></div>
        </div>
        <div class="btns">
          <button id="copy" type="button" class="soft">요약 복사</button>
          <button id="reset" type="button">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2>핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k">확보 운전자본</div><div id="releasedCash" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 이자 절감액</div><div id="interestSavings" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 대손 절감액</div><div id="badDebtSavings" class="v">-</div></div>
          <div class="kpi"><div class="k">연간 총편익</div><div id="annualBenefit" class="v">-</div></div>
          <div class="kpi"><div class="k">1년 순효과</div><div id="netImpact" class="v">-</div></div>
          <div class="kpi"><div class="k">1년 ROI</div><div id="roiPct" class="v">-</div></div>
        </div>
        <div id="status" class="pill">결과 계산 대기</div>

        <h2 style="margin-top:12px">세부 지표 Detail</h2>
        <table>
          <tbody>
            <tr><th>DSO 단축 일수</th><td id="dsoDelta">-</td></tr>
            <tr><th>총 투자비(1년)</th><td id="totalCost">-</td></tr>
            <tr><th>월평균 편익</th><td id="monthlyBenefit">-</td></tr>
            <tr><th>회수기간</th><td id="paybackMonths">-</td></tr>
            <tr><th>손익분기 DSO 단축</th><td id="breakEvenDays">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const refs = {
      creditSales: $("creditSales"), currentDso: $("currentDso"), targetDso: $("targetDso"), borrowRate: $("borrowRate"), currentBadDebt: $("currentBadDebt"), badDebtImprove: $("badDebtImprove"), implementationCost: $("implementationCost"), annualOpex: $("annualOpex"),
      releasedCash: $("releasedCash"), interestSavings: $("interestSavings"), badDebtSavings: $("badDebtSavings"), annualBenefit: $("annualBenefit"), netImpact: $("netImpact"), roiPct: $("roiPct"),
      dsoDelta: $("dsoDelta"), totalCost: $("totalCost"), monthlyBenefit: $("monthlyBenefit"), paybackMonths: $("paybackMonths"), breakEvenDays: $("breakEvenDays"),
      status: $("status"), error: $("error"), summary: $("summary"), copy: $("copy"), reset: $("reset")
    };

    const defaults = {
      creditSales: 9600000000, currentDso: 64, targetDso: 49, borrowRate: 8.5, currentBadDebt: 1.8, badDebtImprove: 0.6, implementationCost: 45000000, annualOpex: 18000000
    };

    const money = (n) => new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW", maximumFractionDigits: 0 }).format(Number.isFinite(n) ? n : 0);
    const num = (n, d = 2) => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: d });

    function validate(v){
      if (!Number.isFinite(v.creditSales) || v.creditSales < 0) return "연간 외상 매출은 0 이상이어야 합니다.";
      if (!Number.isFinite(v.currentDso) || v.currentDso < 0) return "현재 DSO는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.targetDso) || v.targetDso < 0) return "목표 DSO는 0 이상이어야 합니다.";
      if (v.targetDso > v.currentDso) return "목표 DSO는 현재 DSO 이하로 입력하세요.";
      if (!Number.isFinite(v.borrowRate) || v.borrowRate < 0 || v.borrowRate > 100) return "차입금리는 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.currentBadDebt) || v.currentBadDebt < 0 || v.currentBadDebt > 100) return "현재 대손율은 0~100% 범위여야 합니다.";
      if (!Number.isFinite(v.badDebtImprove) || v.badDebtImprove < 0 || v.badDebtImprove > 100) return "대손 개선폭은 0~100 범위여야 합니다.";
      if (!Number.isFinite(v.implementationCost) || v.implementationCost < 0) return "도입비는 0 이상이어야 합니다.";
      if (!Number.isFinite(v.annualOpex) || v.annualOpex < 0) return "연 운영비는 0 이상이어야 합니다.";
      return "";
    }

    function render(){
      const v = {
        creditSales: Number(refs.creditSales.value), currentDso: Number(refs.currentDso.value), targetDso: Number(refs.targetDso.value),
        borrowRate: Number(refs.borrowRate.value), currentBadDebt: Number(refs.currentBadDebt.value), badDebtImprove: Number(refs.badDebtImprove.value),
        implementationCost: Number(refs.implementationCost.value), annualOpex: Number(refs.annualOpex.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;
      if (err){
        ["releasedCash","interestSavings","badDebtSavings","annualBenefit","netImpact","roiPct","dsoDelta","totalCost","monthlyBenefit","paybackMonths","breakEvenDays"].forEach((k)=>refs[k].textContent="-");
        refs.status.textContent = "입력값을 확인하세요";
        refs.summary.value = "";
        return;
      }

      const dsoDelta = Math.max(0, v.currentDso - v.targetDso);
      const releasedCash = (v.creditSales / 365) * dsoDelta;
      const interestSavings = releasedCash * (v.borrowRate / 100);
      const badDebtSavings = v.creditSales * Math.min(v.currentBadDebt / 100, v.badDebtImprove / 100);
      const annualBenefit = interestSavings + badDebtSavings;
      const totalCost = v.implementationCost + v.annualOpex;
      const netImpact = annualBenefit - totalCost;
      const roi = totalCost > 0 ? (netImpact / totalCost) * 100 : 0;
      const monthlyBenefit = annualBenefit / 12;
      const payback = monthlyBenefit > 0 ? totalCost / monthlyBenefit : Infinity;

      const benefitPerDay = (v.creditSales / 365) * (v.borrowRate / 100);
      const breakEvenDays = benefitPerDay > 0 ? Math.max(0, (totalCost - badDebtSavings) / benefitPerDay) : Infinity;

      refs.releasedCash.textContent = money(releasedCash);
      refs.interestSavings.textContent = money(interestSavings);
      refs.badDebtSavings.textContent = money(badDebtSavings);
      refs.annualBenefit.textContent = money(annualBenefit);
      refs.netImpact.textContent = money(netImpact);
      refs.roiPct.textContent = `${num(roi, 2)}%`;

      refs.dsoDelta.textContent = `${num(dsoDelta, 1)}일`;
      refs.totalCost.textContent = money(totalCost);
      refs.monthlyBenefit.textContent = money(monthlyBenefit);
      refs.paybackMonths.textContent = Number.isFinite(payback) ? `${num(payback, 2)}개월` : "N/A";
      refs.breakEvenDays.textContent = Number.isFinite(breakEvenDays) ? `${num(breakEvenDays, 2)}일` : "N/A";

      refs.status.innerHTML = netImpact >= 0
        ? `<span class="ok">●</span> 1년 순효과 ${money(netImpact)} (도입 타당)`
        : `<span class="warn">●</span> 1년 순효과 ${money(netImpact)} (개선폭/비용 재검토)`;

      refs.summary.value = [
        "[Working Capital Interest Savings 요약]",
        `확보 운전자본: ${money(releasedCash)}`,
        `연간 이자 절감: ${money(interestSavings)}`,
        `연간 대손 절감: ${money(badDebtSavings)}`,
        `연간 총편익: ${money(annualBenefit)}`,
        `1년 순효과: ${money(netImpact)}`,
        `1년 ROI: ${num(roi,2)}%`,
        `회수기간: ${Number.isFinite(payback) ? `${num(payback,2)}개월` : "N/A"}`,
        `손익분기 DSO 단축: ${Number.isFinite(breakEvenDays) ? `${num(breakEvenDays,2)}일` : "N/A"}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async () => {
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert("요약이 복사되었습니다."); }
      catch { alert("복사 권한이 없어 수동 복사를 해주세요."); }
    });

    refs.reset.addEventListener("click", () => {
      Object.entries(defaults).forEach(([k, val]) => refs[k].value = val);
      render();
    });

    [refs.creditSales, refs.currentDso, refs.targetDso, refs.borrowRate, refs.currentBadDebt, refs.badDebtImprove, refs.implementationCost, refs.annualOpex].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
