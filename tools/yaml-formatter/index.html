<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="📄 YAML 포맷터 - YAML을 포맷팅하고 JSON과 상호 변환합니다. YAML 문법 검증도 지원합니다. 무료 온라인 도구 | Free online tool at eastsea.monster" />
    <title>YAML 포맷터 | 웹 도구 모음</title>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f8f9fa;
            --text-primary: #212529; --text-secondary: #6c757d;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --border: #dee2e6; --shadow: rgba(0,0,0,0.1); --card-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a1a; --bg-secondary: #121212;
            --text-primary: #f8f9fa; --text-secondary: #adb5bd;
            --border: #444; --shadow: rgba(0,0,0,0.3); --card-bg: #2d2d2d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg-secondary); color: var(--text-primary);
            line-height: 1.6; padding: 20px; min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn { text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .back-btn:hover { color: var(--text-primary); }
        .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.5rem; }
        .card {
            background: var(--card-bg); border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px var(--shadow); border: 1px solid var(--border); margin-bottom: 20px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; background: var(--accent); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .desc { color: var(--text-secondary); margin-bottom: 20px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .tool-btn {
            padding: 8px 16px; border: 2px solid var(--border); border-radius: 10px;
            background: var(--bg-primary); cursor: pointer; font-size: 0.85rem;
            color: var(--text-primary); transition: all 0.2s; font-weight: 500;
        }
        .tool-btn:hover { border-color: #667eea; background: rgba(102,126,234,0.1); }
        .tool-btn.active { border-color: #667eea; background: rgba(102,126,234,0.15); }
        .editors { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .editor-col { display: flex; flex-direction: column; }
        .editor-label {
            font-size: 0.85rem; font-weight: 700; color: var(--text-secondary);
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        textarea {
            width: 100%; height: 400px; padding: 16px; border: 2px solid var(--border);
            border-radius: 12px; background: var(--bg-primary); color: var(--text-primary);
            font-size: 0.9rem; font-family: 'Courier New', monospace; resize: vertical;
            outline: none; tab-size: 2; line-height: 1.5;
        }
        textarea:focus { border-color: #667eea; }
        .copy-btn {
            padding: 4px 10px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 6px; cursor: pointer; font-size: 0.75rem; color: var(--text-primary);
        }
        .copy-btn:hover { background: var(--bg-primary); }
        .status-bar {
            margin-top: 12px; padding: 10px 16px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 500;
        }
        .status-ok { background: rgba(40,167,69,0.1); color: #28a745; border: 1px solid rgba(40,167,69,0.2); }
        .status-err { background: rgba(220,53,69,0.1); color: #dc3545; border: 1px solid rgba(220,53,69,0.2); }
        .indent-opts { display: flex; gap: 8px; align-items: center; }
        .indent-opts label { font-weight: 400; font-size: 0.85rem; cursor: pointer; margin: 0; }
        .indent-opts input[type="radio"] { width: auto; margin: 0; }
        @media (max-width: 768px) { .editors { grid-template-columns: 1fr; } textarea { height: 250px; } }
    </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-btn">← 목록으로</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </header>

        <div class="card">
            <h1>📄 YAML 포맷터</h1>
            <p class="desc">YAML을 포맷팅하고 JSON과 상호 변환합니다. YAML 문법 검증도 지원합니다.</p>

            <div class="toolbar">
                <button class="tool-btn active" id="modeYaml" onclick="setMode('yaml')">YAML → JSON</button>
                <button class="tool-btn" id="modeJson" onclick="setMode('json')">JSON → YAML</button>
                <button class="tool-btn" onclick="formatYaml()">🔧 포맷팅</button>
                <button class="tool-btn" onclick="minify()">📦 압축</button>
                <button class="tool-btn" onclick="loadSample()">📋 샘플</button>
            </div>

            <div class="editors">
                <div class="editor-col">
                    <div class="editor-label">
                        <span id="inputLabel">YAML 입력</span>
                        <button class="copy-btn" onclick="copyText('input')">복사</button>
                    </div>
                    <textarea id="input" placeholder="YAML 또는 JSON을 입력하세요..." oninput="convert()"></textarea>
                </div>
                <div class="editor-col">
                    <div class="editor-label">
                        <span id="outputLabel">JSON 출력</span>
                        <button class="copy-btn" onclick="copyText('output')">복사</button>
                    </div>
                    <textarea id="output" readonly placeholder="변환 결과가 여기 표시됩니다..."></textarea>
                </div>
            </div>

            <div id="status" class="status-bar status-ok" style="margin-top:16px;">입력을 기다리는 중...</div>

            <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                <div class="indent-opts">
                    <strong style="font-size:0.85rem;">들여쓰기:</strong>
                    <label><input type="radio" name="indent" value="2" checked onchange="convert()"> 2칸</label>
                    <label><input type="radio" name="indent" value="4" onchange="convert()"> 4칸</label>
                </div>
            </div>
        </div>
    </div>

    <!-- js-yaml CDN -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script>
        let mode = 'yaml'; // yaml = YAML→JSON, json = JSON→YAML

        function getIndent() {
            return +document.querySelector('input[name="indent"]:checked').value;
        }

        function setMode(m) {
            mode = m;
            document.getElementById('modeYaml').classList.toggle('active', m === 'yaml');
            document.getElementById('modeJson').classList.toggle('active', m === 'json');
            document.getElementById('inputLabel').textContent = m === 'yaml' ? 'YAML 입력' : 'JSON 입력';
            document.getElementById('outputLabel').textContent = m === 'yaml' ? 'JSON 출력' : 'YAML 출력';
            convert();
        }

        function convert() {
            const input = document.getElementById('input').value.trim();
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            if (!input) {
                output.value = '';
                status.className = 'status-bar status-ok';
                status.textContent = '입력을 기다리는 중...';
                return;
            }
            try {
                if (mode === 'yaml') {
                    const parsed = jsyaml.load(input);
                    output.value = JSON.stringify(parsed, null, getIndent());
                    status.className = 'status-bar status-ok';
                    status.textContent = `✅ 유효한 YAML — 변환 완료 (${typeof parsed === 'object' ? Object.keys(parsed || {}).length + '개 키' : typeof parsed})`;
                } else {
                    const parsed = JSON.parse(input);
                    output.value = jsyaml.dump(parsed, { indent: getIndent(), lineWidth: -1, noRefs: true });
                    status.className = 'status-bar status-ok';
                    status.textContent = `✅ 유효한 JSON — 변환 완료`;
                }
            } catch (e) {
                output.value = '';
                status.className = 'status-bar status-err';
                status.textContent = `❌ 오류: ${e.message}`;
            }
        }

        function formatYaml() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;
            try {
                if (mode === 'yaml') {
                    const parsed = jsyaml.load(input);
                    document.getElementById('input').value = jsyaml.dump(parsed, { indent: getIndent(), lineWidth: -1, noRefs: true });
                } else {
                    const parsed = JSON.parse(input);
                    document.getElementById('input').value = JSON.stringify(parsed, null, getIndent());
                }
                convert();
            } catch (e) {
                document.getElementById('status').className = 'status-bar status-err';
                document.getElementById('status').textContent = `❌ 포맷팅 오류: ${e.message}`;
            }
        }

        function minify() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;
            try {
                if (mode === 'yaml') {
                    const parsed = jsyaml.load(input);
                    document.getElementById('output').value = JSON.stringify(parsed);
                } else {
                    const parsed = JSON.parse(input);
                    document.getElementById('output').value = JSON.stringify(parsed);
                }
            } catch (e) {
                document.getElementById('status').className = 'status-bar status-err';
                document.getElementById('status').textContent = `❌ 오류: ${e.message}`;
            }
        }

        function loadSample() {
            if (mode === 'yaml') {
                document.getElementById('input').value = `# Docker Compose 예시
version: "3.8"
services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./html:/usr/share/nginx/html
    environment:
      - NODE_ENV=production
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:`;
            } else {
                document.getElementById('input').value = JSON.stringify({
                    name: "my-project",
                    version: "1.0.0",
                    dependencies: { react: "^18.2.0", next: "^14.0.0" },
                    scripts: { dev: "next dev", build: "next build", start: "next start" }
                }, null, 2);
            }
            convert();
        }

        function copyText(id) {
            const text = document.getElementById(id).value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector(`#${id}`).closest('.editor-col').querySelector('.copy-btn');
                btn.textContent = '복사됨!';
                setTimeout(() => btn.textContent = '복사', 1500);
            });
        }

        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
        }
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    </script>
</body>
</html>
