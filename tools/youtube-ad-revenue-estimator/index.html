<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Ad Revenue Estimator | 유튜브 광고 수익 추정기</title>
  <meta name="description" content="롱폼/쇼츠 조회수, RPM, 수익화 재생 비율을 입력해 월 광고 매출과 순이익을 추정하는 유튜브 수익화 계산기" />
  <style>
    :root{--bg:#111827;--card:#1b263b;--line:#365071;--txt:#eff5ff;--muted:#b2c3df;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 12% 0%,#274a7f 0%,var(--bg) 56%);color:var(--txt)}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 14px 64px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:clamp(1.2rem,2.7vw,1.8rem)}.sub{margin-top:6px;color:var(--muted);line-height:1.5;font-size:.94rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.lang,.link{border:1px solid var(--line);background:#1a3357;color:#dbeafe;padding:8px 11px;border-radius:10px;font-size:.88rem;text-decoration:none;cursor:pointer}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#22395d,#18263e);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}input,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#111f35;color:var(--txt);font-size:.93rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#eff6ff}.soft{background:#234168;border:1px solid var(--line)}
    .err{display:none;margin-top:10px;padding:9px 10px;border-radius:10px;border:1px solid #7f3344;background:rgba(248,113,113,.12);color:#fecaca;font-size:.86rem}.err.show{display:block}
    textarea{margin-top:10px;min-height:112px;resize:vertical}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:#13223a;border:1px solid var(--line);border-radius:11px;padding:10px}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.03rem;font-weight:800;word-break:break-word}.pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#1e3a5f;color:#dbeafe;font-size:.77rem;margin-top:10px}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)} table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85rem}th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}th:first-child,td:first-child{text-align:left}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 id="title">📺 유튜브 광고 수익 추정기</h1>
        <div id="subtitle" class="sub">롱폼/쇼츠 RPM과 수익화 비율을 바탕으로 월 광고 매출·순이익·시나리오를 추정합니다.</div>
      </div>
      <div class="actions"><button id="langBtn" class="lang" type="button">EN</button><a id="backLink" class="link" href="/">Back to Portal</a></div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 id="inputHeader">입력값 Inputs</h2>
        <div class="inputs">
          <div><label id="l_longViews" for="longViews"></label><input id="longViews" type="number" min="0" step="1000" value="850000"></div>
          <div><label id="l_monetizedRate" for="monetizedRate"></label><input id="monetizedRate" type="number" min="0" max="100" step="0.1" value="62"></div>
          <div><label id="l_longRpm" for="longRpm"></label><input id="longRpm" type="number" min="0" step="10" value="4300"></div>
          <div><label id="l_shortViews" for="shortViews"></label><input id="shortViews" type="number" min="0" step="1000" value="2200000"></div>
          <div><label id="l_shortRpm" for="shortRpm"></label><input id="shortRpm" type="number" min="0" step="1" value="95"></div>
          <div><label id="l_seasonality" for="seasonality"></label><input id="seasonality" type="number" min="0.2" max="3" step="0.01" value="1.05"></div>
          <div><label id="l_fixedCost" for="fixedCost"></label><input id="fixedCost" type="number" min="0" step="10000" value="1800000"></div>
        </div>
        <div class="btns"><button id="copy" class="soft" type="button"></button><button id="reset" type="button"></button></div>
        <div id="error" class="err"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 id="kpiHeader">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" id="k_longRevenue"></div><div id="longRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_shortRevenue"></div><div id="shortRevenue" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_gross"></div><div id="gross" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_net"></div><div id="net" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_breakEven"></div><div id="breakEven" class="v">-</div></div>
          <div class="kpi"><div class="k" id="k_monetizedViews"></div><div id="monetizedViews" class="v">-</div></div>
        </div>
        <div id="status" class="pill"></div>
        <h2 id="detailHeader" style="margin-top:12px"></h2>
        <table><tbody>
          <tr><th id="d_conservative"></th><td id="conservative">-</td></tr>
          <tr><th id="d_base"></th><td id="baseScenario">-</td></tr>
          <tr><th id="d_optimistic"></th><td id="optimistic">-</td></tr>
        </tbody></table>
      </article>
    </section>
  </main>

  <script>
    const $=(id)=>document.getElementById(id);
    const refs={longViews:$("longViews"),monetizedRate:$("monetizedRate"),longRpm:$("longRpm"),shortViews:$("shortViews"),shortRpm:$("shortRpm"),seasonality:$("seasonality"),fixedCost:$("fixedCost"),longRevenue:$("longRevenue"),shortRevenue:$("shortRevenue"),gross:$("gross"),net:$("net"),breakEven:$("breakEven"),monetizedViews:$("monetizedViews"),conservative:$("conservative"),baseScenario:$("baseScenario"),optimistic:$("optimistic"),status:$("status"),error:$("error"),summary:$("summary"),copy:$("copy"),reset:$("reset"),langBtn:$("langBtn")};
    const defaults={longViews:850000,monetizedRate:62,longRpm:4300,shortViews:2200000,shortRpm:95,seasonality:1.05,fixedCost:1800000};
    const I18N={
      ko:{title:"📺 유튜브 광고 수익 추정기",subtitle:"롱폼/쇼츠 RPM과 수익화 비율을 바탕으로 월 광고 매출·순이익·시나리오를 추정합니다.",inputHeader:"입력값 Inputs",kpiHeader:"핵심 KPI",detailHeader:"시나리오",back:"포털로",copy:"요약 복사",reset:"기본값 복원",l_longViews:"월 롱폼 조회수",l_monetizedRate:"롱폼 수익화 재생 비율 (%)",l_longRpm:"롱폼 RPM (₩)",l_shortViews:"월 쇼츠 조회수",l_shortRpm:"쇼츠 RPM (₩)",l_seasonality:"지역·시즌 가중치",l_fixedCost:"월 고정 제작비 (₩)",k_longRevenue:"롱폼 광고 수익",k_shortRevenue:"쇼츠 광고 수익",k_gross:"총 광고 매출",k_net:"순이익 (제작비 차감)",k_breakEven:"손익분기 롱폼 조회수",k_monetizedViews:"수익화 롱폼 조회수",d_conservative:"보수 시나리오 (-20%)",d_base:"기준 시나리오",d_optimistic:"낙관 시나리오 (+20%)",ok:"광고 매출 추정 완료",warn:"현재 추정은 적자 구간입니다",invalid:"입력값을 확인해주세요",e_rate:"비율은 0~100 범위여야 합니다.",e_nonneg:"값은 0 이상이어야 합니다.",copied:"요약이 복사되었습니다.",copyFail:"클립보드를 사용할 수 없어 수동 복사가 필요합니다.",summaryTitle:"[유튜브 광고 수익 요약]"},
      en:{title:"📺 YouTube Ad Revenue Estimator",subtitle:"Estimate monthly ad revenue, net income, and scenarios from long-form/shorts RPM assumptions.",inputHeader:"Inputs",kpiHeader:"Key KPIs",detailHeader:"Scenarios",back:"Back to Portal",copy:"Copy Summary",reset:"Reset Defaults",l_longViews:"Monthly long-form views",l_monetizedRate:"Monetized playback rate (%)",l_longRpm:"Long-form RPM (KRW)",l_shortViews:"Monthly Shorts views",l_shortRpm:"Shorts RPM (KRW)",l_seasonality:"Geo/seasonality multiplier",l_fixedCost:"Monthly fixed production cost (KRW)",k_longRevenue:"Long-form ad revenue",k_shortRevenue:"Shorts ad revenue",k_gross:"Total ad revenue",k_net:"Net income after cost",k_breakEven:"Break-even long-form views",k_monetizedViews:"Monetized long-form views",d_conservative:"Conservative scenario (-20%)",d_base:"Base scenario",d_optimistic:"Optimistic scenario (+20%)",ok:"Revenue estimate ready",warn:"Current estimate is below break-even",invalid:"Please review inputs",e_rate:"Rate input must be between 0 and 100.",e_nonneg:"Values must be zero or above.",copied:"Summary copied.",copyFail:"Clipboard unavailable. Please copy manually.",summaryTitle:"[YouTube Ad Revenue Summary]"}
    };
    let lang="ko"; const t=(k)=>I18N[lang][k]||k;
    const won=(n)=>new Intl.NumberFormat("ko-KR",{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num=(n,d=1)=>Number(n).toLocaleString(lang==="ko"?"ko-KR":"en-US",{maximumFractionDigits:d});

    function applyI18n(){
      document.documentElement.lang=lang; ["title","subtitle","inputHeader","kpiHeader","detailHeader"].forEach((k)=>$(k).textContent=t(k));
      $("backLink").textContent=t("back"); refs.copy.textContent=t("copy"); refs.reset.textContent=t("reset"); refs.langBtn.textContent=lang==="ko"?"EN":"KO";
      ["longViews","monetizedRate","longRpm","shortViews","shortRpm","seasonality","fixedCost"].forEach((k)=>$("l_"+k).textContent=t("l_"+k));
      ["longRevenue","shortRevenue","gross","net","breakEven","monetizedViews"].forEach((k)=>$("k_"+k).textContent=t("k_"+k));
      ["conservative","base","optimistic"].forEach((k)=>$("d_"+k).textContent=t("d_"+k));
    }

    function validate(v){
      if([v.longViews,v.longRpm,v.shortViews,v.shortRpm,v.seasonality,v.fixedCost].some((x)=>!Number.isFinite(x)||x<0)) return t("e_nonneg");
      if(!Number.isFinite(v.monetizedRate)||v.monetizedRate<0||v.monetizedRate>100) return t("e_rate");
      return "";
    }

    function render(){
      const v={longViews:Number(refs.longViews.value),monetizedRate:Number(refs.monetizedRate.value),longRpm:Number(refs.longRpm.value),shortViews:Number(refs.shortViews.value),shortRpm:Number(refs.shortRpm.value),seasonality:Number(refs.seasonality.value),fixedCost:Number(refs.fixedCost.value)};
      const err=validate(v); refs.error.classList.toggle("show",Boolean(err)); refs.error.textContent=err;
      if(err){["longRevenue","shortRevenue","gross","net","breakEven","monetizedViews","conservative","baseScenario","optimistic"].forEach((k)=>refs[k].textContent="-"); refs.status.textContent=t("invalid"); refs.summary.value=""; return;}

      const monetizedViews=v.longViews*(v.monetizedRate/100);
      const longRevenue=(monetizedViews/1000)*v.longRpm*v.seasonality;
      const shortRevenue=(v.shortViews/1000)*v.shortRpm*v.seasonality;
      const gross=longRevenue+shortRevenue;
      const net=gross-v.fixedCost;
      const conservative=gross*0.8;
      const optimistic=gross*1.2;
      const denom=(v.longRpm*v.seasonality/1000)*(v.monetizedRate/100);
      const breakEven=denom>0?Math.max(0,(v.fixedCost-shortRevenue)/denom):0;

      refs.longRevenue.textContent=won(longRevenue); refs.shortRevenue.textContent=won(shortRevenue); refs.gross.textContent=won(gross); refs.net.textContent=won(net);
      refs.breakEven.textContent=`${num(breakEven,0)}`; refs.monetizedViews.textContent=`${num(monetizedViews,0)}`;
      refs.conservative.textContent=won(conservative); refs.baseScenario.textContent=won(gross); refs.optimistic.textContent=won(optimistic);
      refs.status.innerHTML=net>=0?`<span class="good">●</span> ${t("ok")}`:`<span class="warn">●</span> ${t("warn")}`;

      refs.summary.value=[t("summaryTitle"),`${t("k_monetizedViews")}: ${num(monetizedViews,0)}`,`${t("k_longRevenue")}: ${won(longRevenue)}`,`${t("k_shortRevenue")}: ${won(shortRevenue)}`,`${t("k_gross")}: ${won(gross)}`,`${t("k_net")}: ${won(net)}`,`${t("k_breakEven")}: ${num(breakEven,0)}`].join("\n");
    }

    refs.langBtn.addEventListener("click",()=>{lang=lang==="ko"?"en":"ko";applyI18n();render();});
    refs.copy.addEventListener("click",async()=>{if(!refs.summary.value.trim()) return;try{await navigator.clipboard.writeText(refs.summary.value);alert(t("copied"));}catch{alert(t("copyFail"));}});
    refs.reset.addEventListener("click",()=>{Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);render();});
    [refs.longViews,refs.monetizedRate,refs.longRpm,refs.shortViews,refs.shortRpm,refs.seasonality,refs.fixedCost].forEach((el)=>el.addEventListener("input",render));
    applyI18n(); render();
  </script>
</body>
</html>
