<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Membership Break-even Calculator | 유튜브 멤버십 손익분기 계산기</title>
  <meta name="description" content="유튜브 멤버십 전환율, 이탈률, 수익배분, 운영비를 반영해 월 순이익·손익분기 멤버 수·ROI를 계산합니다." />
  <style>
    :root{--bg:#071427;--card:#102441;--line:#2b4e80;--txt:#ecf3ff;--muted:#aac0df;--pri:#6ca8ff;--soft:#17335f;--err:#fecaca;--errBg:rgba(248,113,113,.14);--ok:#34d399;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:radial-gradient(circle at 20% 0%,#214a81 0%,#071427 52%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 54px}.head{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.16rem,2.8vw,1.72rem)}.sub{margin-top:6px;color:var(--muted);font-size:.92rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#102547;color:#dceaff;border-radius:11px;padding:8px 12px;text-decoration:none;cursor:pointer;font-size:.85rem;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:12px}.card{background:linear-gradient(165deg,#17335f,#102441);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0}
    h2{margin:0 0 10px;font-size:1.02rem}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:5px}
    input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0c1b35;color:var(--txt);font-size:.93rem}
    button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--pri),#5d84f2);font-weight:700}.soft{background:var(--soft);border:1px solid var(--line)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}textarea{min-height:100px;resize:vertical;margin-top:10px}
    .error{display:none;margin-top:10px;border:1px solid #7a313f;background:var(--errBg);color:var(--err);padding:9px 10px;border-radius:10px;font-size:.86rem}.error.show{display:block}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{border:1px solid var(--line);background:#0d1d38;border-radius:11px;padding:10px;min-width:0}
    .k{font-size:.76rem;color:var(--muted);margin-bottom:4px}.v{font-size:1.1rem;font-weight:800;word-break:break-word}.v.sm{font-size:1rem}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:#163561;color:#d1e2ff;font-size:.76rem;margin-top:10px}
    .ok{color:var(--ok)} .warn{color:var(--warn)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.88rem;table-layout:fixed}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;word-break:break-word}
    th:first-child,td:first-child{text-align:left}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
  </style>
    <!-- Analytics: GA4 + Clarity -->
    <script src="/assets/analytics.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="title">📺 유튜브 멤버십 손익분기 계산기</h1>
        <div class="sub" data-i18n="subtitle">전환율·이탈률·수익배분·운영비를 반영해 멤버십 월 순이익과 손익분기 멤버 수를 계산합니다.</div>
      </div>
      <div class="actions">
        <button id="lang" type="button" class="chip">EN</button>
        <a class="chip" href="/" data-i18n="back">Back to Portal</a>
      </div>
    </div>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="inputs">입력값</h2>
        <div class="inputs">
          <div><label for="subs" data-i18n="subs">채널 구독자 수</label><input id="subs" type="number" min="1" value="120000" /></div>
          <div><label for="conv" data-i18n="conv">월 신규 멤버 전환율 (%)</label><input id="conv" type="number" min="0" max="100" step="0.01" value="0.35" /></div>
          <div><label for="price" data-i18n="price">멤버십 월 가격 (KRW)</label><input id="price" type="number" min="1" value="6900" /></div>
          <div><label for="share" data-i18n="share">크리에이터 정산 비율 (%)</label><input id="share" type="number" min="1" max="100" step="0.1" value="70" /></div>
          <div><label for="churn" data-i18n="churn">월 멤버 이탈률 (%)</label><input id="churn" type="number" min="0" max="100" step="0.1" value="8" /></div>
          <div><label for="perk" data-i18n="perk">멤버 1인당 월 혜택/운영비 (KRW)</label><input id="perk" type="number" min="0" value="1100" /></div>
          <div><label for="fixed" data-i18n="fixed">월 고정 운영비 (KRW)</label><input id="fixed" type="number" min="0" value="2400000" /></div>
          <div><label for="setup" data-i18n="setup">초기 세팅비 (KRW)</label><input id="setup" type="number" min="0" value="9000000" /></div>
          <div><label for="months" data-i18n="months">분석 기간 (개월)</label><input id="months" type="number" min="1" max="48" value="12" /></div>
        </div>

        <div class="btns">
          <button id="copy" type="button" class="soft" data-i18n="copy">요약 복사</button>
          <button id="reset" type="button" data-i18n="reset">기본값 복원</button>
        </div>
        <div id="error" class="error"></div>
        <textarea id="summary" readonly></textarea>
      </article>

      <article class="card">
        <h2 data-i18n="kpiTitle">핵심 KPI</h2>
        <div class="kpis">
          <div class="kpi"><div class="k" data-i18n="k_new">월 신규 멤버 수</div><div id="newMembers" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_active">기간 종료 활성 멤버</div><div id="endActive" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_latestNet">최신월 순이익</div><div id="latestNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_period">기간 순효과(세팅비 반영)</div><div id="periodNet" class="v">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_roi">ROI</div><div id="roi" class="v sm">-</div></div>
          <div class="kpi"><div class="k" data-i18n="k_payback">회수기간</div><div id="payback" class="v sm">-</div></div>
        </div>
        <div id="status" class="pill" data-i18n="waiting">결과 계산 대기</div>

        <h2 style="margin-top:12px" data-i18n="detailTitle">추가 지표</h2>
        <table>
          <tbody>
            <tr><th data-i18n="d_breakEven">손익분기 활성 멤버 수</th><td id="breakEven">-</td></tr>
            <tr><th data-i18n="d_memberMargin">멤버 1인당 공헌이익</th><td id="memberMargin">-</td></tr>
            <tr><th data-i18n="d_periodRevenue">기간 총 정산매출</th><td id="periodRevenue">-</td></tr>
            <tr><th data-i18n="d_periodCost">기간 총 운영비(변동+고정)</th><td id="periodCost">-</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    const refs = {
      subs:$("subs"), conv:$("conv"), price:$("price"), share:$("share"), churn:$("churn"), perk:$("perk"), fixed:$("fixed"), setup:$("setup"), months:$("months"),
      newMembers:$("newMembers"), endActive:$("endActive"), latestNet:$("latestNet"), periodNet:$("periodNet"), roi:$("roi"), payback:$("payback"),
      breakEven:$("breakEven"), memberMargin:$("memberMargin"), periodRevenue:$("periodRevenue"), periodCost:$("periodCost"),
      status:$("status"), error:$("error"), summary:$("summary"), copy:$("copy"), reset:$("reset"), lang:$("lang")
    };

    const defaults = { subs:120000, conv:0.35, price:6900, share:70, churn:8, perk:1100, fixed:2400000, setup:9000000, months:12 };
    let currentLang = "ko";

    const i18n = {
      ko: {
        title:"📺 유튜브 멤버십 손익분기 계산기", subtitle:"전환율·이탈률·수익배분·운영비를 반영해 멤버십 월 순이익과 손익분기 멤버 수를 계산합니다.",
        back:"Back to Portal", inputs:"입력값", copy:"요약 복사", reset:"기본값 복원", kpiTitle:"핵심 KPI", waiting:"결과 계산 대기", detailTitle:"추가 지표",
        subs:"채널 구독자 수", conv:"월 신규 멤버 전환율 (%)", price:"멤버십 월 가격 (KRW)", share:"크리에이터 정산 비율 (%)", churn:"월 멤버 이탈률 (%)", perk:"멤버 1인당 월 혜택/운영비 (KRW)", fixed:"월 고정 운영비 (KRW)", setup:"초기 세팅비 (KRW)", months:"분석 기간 (개월)",
        k_new:"월 신규 멤버 수", k_active:"기간 종료 활성 멤버", k_latestNet:"최신월 순이익", k_period:"기간 순효과(세팅비 반영)", k_roi:"ROI", k_payback:"회수기간",
        d_breakEven:"손익분기 활성 멤버 수", d_memberMargin:"멤버 1인당 공헌이익", d_periodRevenue:"기간 총 정산매출", d_periodCost:"기간 총 운영비(변동+고정)",
        errSubs:"구독자 수는 1 이상이어야 합니다.", errConv:"전환율은 0~100% 범위여야 합니다.", errPrice:"가격은 0보다 커야 합니다.", errShare:"정산 비율은 0초과 100이하여야 합니다.",
        errChurn:"이탈률은 0~100% 범위여야 합니다.", errCost:"비용 값은 0 이상이어야 합니다.", errMonths:"분석 기간은 1~48개월 범위여야 합니다.",
        noPayback:"회수 불가", impossible:"달성 불가", statusGood:"멤버십 모델이 수익을 창출합니다", statusBad:"가정 재조정이 필요합니다", statusCheck:"입력값을 확인하세요",
        copied:"요약이 복사되었습니다.", copyFail:"클립보드 권한이 없어 수동 복사가 필요합니다.", unitMonth:"개월", unitMember:"명",
        summaryTitle:"[YouTube Membership 요약]", summaryBreakEven:"손익분기 멤버 수"
      },
      en: {
        title:"📺 YouTube Membership Break-even Calculator", subtitle:"Estimate monthly membership net profit, break-even members, and ROI using conversion, churn, revenue share, and operating costs.",
        back:"Back to Portal", inputs:"Inputs", copy:"Copy Summary", reset:"Reset Defaults", kpiTitle:"Key KPIs", waiting:"Waiting for calculation", detailTitle:"Additional Metrics",
        subs:"Channel subscribers", conv:"Monthly new-member conversion rate (%)", price:"Membership monthly price (KRW)", share:"Creator revenue share (%)", churn:"Monthly member churn (%)", perk:"Per-member monthly perk/ops cost (KRW)", fixed:"Monthly fixed ops cost (KRW)", setup:"One-time setup cost (KRW)", months:"Analysis period (months)",
        k_new:"New members per month", k_active:"Ending active members", k_latestNet:"Latest-month net profit", k_period:"Period net impact (after setup)", k_roi:"ROI", k_payback:"Payback period",
        d_breakEven:"Break-even active members", d_memberMargin:"Contribution per member", d_periodRevenue:"Total creator revenue (period)", d_periodCost:"Total operating cost (period)",
        errSubs:"Subscribers must be at least 1.", errConv:"Conversion rate must be between 0 and 100.", errPrice:"Price must be greater than 0.", errShare:"Revenue share must be > 0 and <= 100.",
        errChurn:"Churn must be between 0 and 100.", errCost:"Costs must be >= 0.", errMonths:"Analysis period must be 1 to 48 months.",
        noPayback:"No payback", impossible:"Not feasible", statusGood:"Membership model is profitable", statusBad:"Re-check assumptions", statusCheck:"Please review input values",
        copied:"Summary copied to clipboard.", copyFail:"Clipboard unavailable. Please copy manually.", unitMonth:"months", unitMember:"members",
        summaryTitle:"[YouTube Membership Summary]", summaryBreakEven:"Break-even active members"
      }
    };

    const locale = ()=> currentLang === "ko" ? "ko-KR" : "en-US";
    const money = (n)=>new Intl.NumberFormat(locale(),{style:"currency",currency:"KRW",maximumFractionDigits:0}).format(Number.isFinite(n)?n:0);
    const num = (n,d=2)=>Number(n).toLocaleString(locale(),{maximumFractionDigits:d});
    const t = (k)=> i18n[currentLang][k] ?? k;

    function applyI18n(){
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el)=>{ el.textContent = t(el.dataset.i18n); });
      refs.lang.textContent = currentLang === "ko" ? "EN" : "KO";
      render();
    }

    function validate(v){
      if (!Number.isFinite(v.subs) || v.subs < 1) return t("errSubs");
      if (!Number.isFinite(v.conv) || v.conv < 0 || v.conv > 100) return t("errConv");
      if (!Number.isFinite(v.price) || v.price <= 0) return t("errPrice");
      if (!Number.isFinite(v.share) || v.share <= 0 || v.share > 100) return t("errShare");
      if (!Number.isFinite(v.churn) || v.churn < 0 || v.churn > 100) return t("errChurn");
      if ([v.perk,v.fixed,v.setup].some((n)=>!Number.isFinite(n) || n < 0)) return t("errCost");
      if (!Number.isFinite(v.months) || v.months < 1 || v.months > 48) return t("errMonths");
      return "";
    }

    function compute(v){
      const newMembers = v.subs * (v.conv / 100);
      const share = v.share / 100;
      const churn = v.churn / 100;
      const memberMargin = (v.price * share) - v.perk;

      let active = 0;
      let totalRevenue = 0;
      let totalOpsCost = 0;
      let latestNet = 0;
      let payback = Infinity;
      let cumulativeAfterSetup = -v.setup;

      for (let m = 1; m <= v.months; m++) {
        active = (active * (1 - churn)) + newMembers;
        const revenue = active * v.price * share;
        const variableCost = active * v.perk;
        const monthlyNet = revenue - variableCost - v.fixed;

        totalRevenue += revenue;
        totalOpsCost += variableCost + v.fixed;
        latestNet = monthlyNet;

        cumulativeAfterSetup += monthlyNet;
        if (!Number.isFinite(payback) && cumulativeAfterSetup >= 0) {
          payback = m;
        }
      }

      const periodNet = totalRevenue - totalOpsCost - v.setup;
      const invested = v.setup + (v.fixed * v.months);
      const roi = invested === 0 ? (periodNet >= 0 ? Infinity : -Infinity) : (periodNet / invested) * 100;
      const breakEven = memberMargin > 0 ? (v.fixed / memberMargin) : Infinity;

      return { newMembers, endActive:active, latestNet, periodNet, roi, payback, breakEven, memberMargin, totalRevenue, totalOpsCost };
    }

    function resetOutputs(){
      ["newMembers","endActive","latestNet","periodNet","roi","payback","breakEven","memberMargin","periodRevenue","periodCost"].forEach((k)=>refs[k].textContent="-");
      refs.summary.value = "";
    }

    function render(){
      const v = {
        subs:Number(refs.subs.value), conv:Number(refs.conv.value), price:Number(refs.price.value), share:Number(refs.share.value), churn:Number(refs.churn.value),
        perk:Number(refs.perk.value), fixed:Number(refs.fixed.value), setup:Number(refs.setup.value), months:Number(refs.months.value)
      };

      const err = validate(v);
      refs.error.classList.toggle("show", !!err);
      refs.error.textContent = err;

      if (err){
        refs.status.textContent = t("statusCheck");
        resetOutputs();
        return;
      }

      const r = compute(v);

      refs.newMembers.textContent = `${num(r.newMembers,1)} ${t("unitMember")}`;
      refs.endActive.textContent = `${num(r.endActive,1)} ${t("unitMember")}`;
      refs.latestNet.textContent = money(r.latestNet);
      refs.periodNet.textContent = money(r.periodNet);
      refs.roi.textContent = Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞");
      refs.payback.textContent = Number.isFinite(r.payback) ? `${num(r.payback,0)} ${t("unitMonth")}` : t("noPayback");

      refs.breakEven.textContent = Number.isFinite(r.breakEven) ? `${num(r.breakEven,1)} ${t("unitMember")}` : t("impossible");
      refs.memberMargin.textContent = money(r.memberMargin);
      refs.periodRevenue.textContent = money(r.totalRevenue);
      refs.periodCost.textContent = money(r.totalOpsCost);

      const profitable = r.latestNet >= 0 && r.memberMargin > 0;
      refs.status.innerHTML = profitable
        ? `<span class="ok">●</span> ${t("statusGood")}`
        : `<span class="warn">●</span> ${t("statusBad")}`;

      refs.summary.value = [
        t("summaryTitle"),
        `${t("k_new")}: ${num(r.newMembers,1)} ${t("unitMember")}`,
        `${t("k_active")}: ${num(r.endActive,1)} ${t("unitMember")}`,
        `${t("k_latestNet")}: ${money(r.latestNet)}`,
        `${t("k_period")}: ${money(r.periodNet)}`,
        `${t("k_roi")}: ${Number.isFinite(r.roi) ? `${num(r.roi,1)}%` : (r.roi > 0 ? "∞" : "-∞")}`,
        `${t("k_payback")}: ${Number.isFinite(r.payback) ? `${num(r.payback,0)} ${t("unitMonth")}` : t("noPayback")}`,
        `${t("summaryBreakEven")}: ${Number.isFinite(r.breakEven) ? `${num(r.breakEven,1)} ${t("unitMember")}` : t("impossible")}`
      ].join("\n");
    }

    refs.copy.addEventListener("click", async()=>{
      if (!refs.summary.value.trim()) return;
      try { await navigator.clipboard.writeText(refs.summary.value); alert(t("copied")); }
      catch { alert(t("copyFail")); }
    });

    refs.reset.addEventListener("click", ()=>{
      Object.entries(defaults).forEach(([k,v])=>refs[k].value=v);
      render();
    });

    [refs.subs,refs.conv,refs.price,refs.share,refs.churn,refs.perk,refs.fixed,refs.setup,refs.months].forEach((el)=>{
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    refs.lang.addEventListener("click", ()=>{
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
